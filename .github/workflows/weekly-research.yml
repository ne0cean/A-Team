name: Weekly Auto-Research (Eternal Growth)

on:
  schedule:
    # 매주 월요일 18:00 UTC = 화요일 03:00 KST
    - cron: '0 18 * * 1'
  workflow_dispatch:  # 수동 실행 허용

permissions:
  contents: write
  pull-requests: write

jobs:
  research:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: |
          npm ci
          # Anthropic SDK는 optional dependency — weekly research에서만 활성화
          npm install @anthropic-ai/sdk

      - name: Set WEEK_TAG
        id: tag
        run: echo "week=$(date +%Y-W%V)" >> $GITHUB_OUTPUT

      - name: Run weekly research
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ATEAM_ROOT: ${{ github.workspace }}
        run: node scripts/weekly-research.mjs

      - name: Create Pull Request
        if: success()
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: research/${{ steps.tag.outputs.week }}
          title: "research(${{ steps.tag.outputs.week }}): weekly auto-analysis"
          body: |
            ## Weekly Auto-Research ${{ steps.tag.outputs.week }}

            `scripts/weekly-research.mjs` 자동 생성. GitHub trending 분석 + Claude API 평가.

            ### 포함
            - `docs/research/${{ steps.tag.outputs.week }}/SUMMARY.md` — 주간 리포트
            - `docs/research/${{ steps.tag.outputs.week }}/trending-raw.json` — 원본 데이터
            - `docs/research/${{ steps.tag.outputs.week }}/evaluation-raw.json` — Claude 평가

            ### Human Gate (Sovereignty)
            - [ ] SUMMARY.md 검토
            - [ ] ACCEPT 후보 → 별도 RFC 착수 판단
            - [ ] REJECT 후보 → `final/REJECTED.md` 업데이트
            - [ ] Drift alert 확인 (이전 수용과 충돌 여부)
            - [ ] 자동 merge 금지 — 수동 승인

            🤖 Generated by Stage 10 Eternal Growth
          labels: |
            auto-research
            needs-review
          base: master
          commit-message: "research(${{ steps.tag.outputs.week }}): auto-generated weekly analysis"
          delete-branch: false

      - name: Upload artifacts (failure case)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: weekly-research-logs-${{ steps.tag.outputs.week }}
          path: |
            docs/research/${{ steps.tag.outputs.week }}/
            *.log
