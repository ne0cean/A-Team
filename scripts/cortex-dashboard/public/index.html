<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0d1117">
<link rel="manifest" href="/manifest.json">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="apple-touch-icon" href="/favicon.svg">
<title>Cortex</title>
<link rel="stylesheet" href="/css/main.css">
</head>
<body>

<div class="header">
  <div>
    <h1>Cortex</h1>
    <span style="font-size:9px;color:#484f58;font-style:italic;margin-left:8px">Don't think, just do.</span>
  </div>
  <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;margin:0 12px">
    <div class="vision" id="visionText2" contenteditable="true" onblur="saveGoalText(this.textContent)" style="text-align:center;font-size:10px;color:#8b949e;line-height:1.3;width:100%"></div>
    <div style="display:flex;align-items:center;justify-content:center;gap:4px"><span style="font-size:8px;color:#6e7681">EX</span><div class="workout-bar" id="workoutBar"></div></div>
  </div>
  <div class="nav" id="scheduleNav">
    <button id="viewToggle" onclick="toggleView()">Full Month</button>
    <button onclick="prevPeriod()">&#9664;</button>
    <span class="month-label" id="monthLabel"></span>
    <button onclick="nextPeriod()">&#9654;</button>
    <span class="search-btn" onclick="undoMonth()" title="Undo" style="font-size:11px;letter-spacing:-1px">↩</span>
    <span class="search-btn" onclick="openSearch()">&#128269;</span>
  </div>
</div>

<!-- Tab Content -->
<div id="tabSchedule" class="tab-content active">
  <div id="calendarContainer"></div>
  <div class="stats" id="stats"></div>
  <div class="panels">
    <div class="panel">
      <div class="panel-header" onclick="togglePanel('visionPanel')">
        <h2>Vision & Milestones</h2>
        <span class="panel-toggle" id="visionPanelToggle">&#9654;</span>
      </div>
      <div class="panel-body" id="visionPanel"></div>
    </div>
    <div class="panel">
      <div class="panel-header" onclick="togglePanel('soPanel')">
        <h2>Standing Orders / Monthly / Yearly</h2>
        <span class="panel-toggle" id="soPanelToggle">&#9654;</span>
      </div>
      <div class="panel-body" id="soPanel"></div>
    </div>
    <div class="panel">
      <div class="panel-header" onclick="togglePanel('framesPanel')">
        <h2>Day Frames (Admin)</h2>
        <span class="panel-toggle" id="framesPanelToggle">&#9654;</span>
      </div>
      <div class="panel-body" id="framesPanel"></div>
    </div>
  </div>
</div>

<div id="tabNotes" class="tab-content">
  <div id="cortexPanel" style="padding:8px"></div>
</div>

<div id="tabCapture" class="tab-content">
  <div style="padding:16px;text-align:center;color:#484f58">Coming soon</div>
</div>

<!-- Link Popup -->
<div class="link-popup" id="linkPopup">
  <input type="text" id="linkUrl" placeholder="URL (https://...)">
  <div class="link-popup-btns">
    <button class="btn-remove" onclick="removeLink()">Remove</button>
    <button class="btn-cancel" onclick="closeLinkPopup()">Cancel</button>
    <button class="btn-save" onclick="saveLink()">Save</button>
  </div>
</div>

<!-- Search Overlay -->
<div class="search-overlay" id="searchOverlay" onclick="if(event.target===this)closeSearch()">
  <div class="search-box">
    <input type="text" id="searchInput" placeholder="Search..." oninput="debounceSearch()" onkeydown="if(event.key==='Escape')closeSearch()">
  </div>
  <div class="search-results" id="searchResults"></div>
</div>

<!-- Bottom Tab Bar -->
<div class="tab-bar">
  <div class="tab-bar-item active" onclick="switchTab('Schedule')" id="tabBarSchedule">
    <span class="tab-bar-icon">📅</span>
    <span class="tab-bar-label">Schedule</span>
  </div>
  <div class="tab-bar-item" onclick="switchTab('Notes')" id="tabBarNotes">
    <span class="tab-bar-icon">📝</span>
    <span class="tab-bar-label">Notes</span>
  </div>
  <div class="tab-bar-item" onclick="switchTab('Capture')" id="tabBarCapture">
    <span class="tab-bar-icon">📥</span>
    <span class="tab-bar-label">Capture</span>
  </div>
</div>

<script src="/js/app.js"></script>
</body>
</html>
