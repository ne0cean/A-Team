<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0d1117">
<link rel="manifest" href="/manifest.json">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="apple-touch-icon" href="/favicon.svg">
<title>Cortex</title>
<link rel="stylesheet" href="/css/main.css">
</head>
<body>

<!-- Sidebar: cortex note tree -->
<div class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <span style="font-size:13px;font-weight:700;color:#f0c040">Cortex</span>
    <span style="display:flex;gap:8px;align-items:center">
      <span onclick="createNewNote()" style="cursor:pointer;color:#56d364;font-size:16px" title="New note" role="button" tabindex="0" aria-label="새 노트 만들기">+</span>
      <span class="sidebar-close" onclick="toggleSidebar()" role="button" tabindex="0" aria-label="사이드바 닫기">&#10005;</span>
    </span>
  </div>
  <input class="tree-search" id="sidebarSearch" placeholder="Search notes..." aria-label="노트 검색" oninput="debounceSidebarSearch(this.value)" onkeydown="if(event.key==='Enter')searchCortex(this.value);else if(event.key==='Escape'){this.value='';loadSidebarTree();}">
  <div class="sidebar-tree" id="sidebarTree"></div>
</div>

<!-- Sidebar overlay (mobile) -->
<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

<!-- Main content -->
<div class="main" id="main">
  <!-- Header -->
  <div class="header">
    <div style="display:flex;align-items:center;gap:8px">
      <span class="sidebar-toggle" onclick="toggleSidebar()" title="Notes" role="button" tabindex="0" aria-label="노트 사이드바 열기">&#9776;</span>
      <div>
        <h1 onclick="goTodayWeek()" style="cursor:pointer" title="오늘 Week View로 이동">Cortex</h1>
        <span style="font-size:9px;color:#484f58;font-style:italic">Don't think, just do.</span>
      </div>
    </div>
    <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;margin:0 12px">
      <div class="vision" id="visionText2" contenteditable="true" onblur="saveGoalText(this.textContent)" style="text-align:center;font-size:10px;color:#8b949e;line-height:1.3;width:100%" role="textbox" aria-label="목표 텍스트" aria-multiline="false"></div>
      <div style="display:flex;align-items:center;justify-content:center;gap:4px"><span style="font-size:8px;color:#6e7681">EX</span><div class="workout-bar" id="workoutBar"></div></div>
    </div>
    <div class="nav" id="scheduleNav">
      <button id="viewToggle" onclick="toggleView()">Full Month</button>
      <button onclick="prevPeriod()" aria-label="이전 기간">&#9664;</button>
      <span class="month-label" id="monthLabel"></span>
      <button onclick="nextPeriod()" aria-label="다음 기간">&#9654;</button>
      <span class="search-btn" onclick="undoMonth()" title="Undo" style="font-size:11px;letter-spacing:-1px" role="button" tabindex="0" aria-label="되돌리기">&#8630;</span>
      <span class="search-btn" onclick="openSearch()" role="button" tabindex="0" aria-label="검색">&#128269;</span>
    </div>
  </div>

  <!-- Dashboard (default view) -->
  <div id="dashboardView">
    <div id="calendarContainer"></div>
    <div class="stats" id="stats"></div>
    <div class="panels">
      <div class="panel">
        <div class="panel-header" onclick="togglePanel('soPanel')" role="button" tabindex="0" aria-expanded="true" aria-controls="soPanel">
          <h2>Standing Orders / Monthly / Yearly</h2>
          <span class="panel-toggle" id="soPanelToggle" aria-hidden="true">&#9660;</span>
        </div>
        <div class="panel-body open" id="soPanel"></div>
      </div>
      <div class="panel">
        <div class="panel-header" onclick="togglePanel('framesPanel')" role="button" tabindex="0" aria-expanded="true" aria-controls="framesPanel">
          <h2>Day Frames (Admin)</h2>
          <span class="panel-toggle" id="framesPanelToggle" aria-hidden="true">&#9660;</span>
        </div>
        <div class="panel-body open" id="framesPanel"></div>
      </div>
      <div class="panel">
        <div class="panel-header" onclick="togglePanel('visionPanel')" role="button" tabindex="0" aria-expanded="false" aria-controls="visionPanel">
          <h2>Vision & Milestones</h2>
          <span class="panel-toggle" id="visionPanelToggle" aria-hidden="true">&#9654;</span>
        </div>
        <div class="panel-body" id="visionPanel"></div>
      </div>
    </div>
  </div>

  <!-- Note viewer (shown when note is selected from sidebar) -->
  <div id="noteView" style="display:none;padding:12px">
    <div id="noteContent"></div>
  </div>
</div>

<!-- Capture Bar (fixed bottom) -->
<div class="capture-bar" id="captureBar">
  <input type="text" id="captureInput" placeholder="Quick memo... or '28 w meeting'" aria-label="빠른 메모 입력" onkeydown="if(event.key==='Enter')submitCapture()">
  <label style="cursor:pointer;color:#58a6ff;font-size:16px;padding:0 6px" aria-label="이미지 첨부">&#128247;<input type="file" accept="image/*" style="display:none" onchange="captureImage(this.files[0])"></label>
  <button onclick="submitCapture()" aria-label="메모 저장">&#10148;</button>
</div>

<!-- Link Popup -->
<div class="link-popup" id="linkPopup">
  <input type="text" id="linkUrl" placeholder="URL (https://...)" aria-label="링크 URL 입력">
  <div class="link-popup-btns">
    <button class="btn-remove" onclick="removeLink()">Remove</button>
    <button class="btn-cancel" onclick="closeLinkPopup()">Cancel</button>
    <button class="btn-save" onclick="saveLink()">Save</button>
  </div>
</div>

<!-- Search Overlay -->
<div class="search-overlay" id="searchOverlay" onclick="if(event.target===this)closeSearch()">
  <div class="search-box">
    <input type="text" id="searchInput" placeholder="Search..." aria-label="검색어 입력" oninput="debounceSearch()" onkeydown="if(event.key==='Escape')closeSearch()">
  </div>
  <div class="search-results" id="searchResults"></div>
</div>

<script src="/js/app.js"></script>
</body>
</html>
