<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cortex — Ritual & Routine</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, 'Pretendard', sans-serif; background: #0d1117; color: #e0e0e0; font-size: 12px; }

  .header { padding: 8px 16px; background: #161b22; border-bottom: 1px solid #30363d; display: flex; justify-content: space-between; align-items: center; }
  .header h1 { font-size: 14px; color: #f0c040; }
  .vision { font-size: 10px; color: #8b949e; margin-top: 2px; }
  .nav { display: flex; gap: 6px; align-items: center; }
  .nav button { background: #21262d; border: 1px solid #30363d; color: #c9d1d9; padding: 3px 10px; border-radius: 4px; cursor: pointer; font-size: 11px; }
  .nav button:hover { background: #30363d; }
  .nav .month-label { font-size: 14px; font-weight: 600; min-width: 100px; text-align: center; }

  .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; background: #21262d; }
  .day-header { background: #161b22; padding: 4px; text-align: center; font-weight: 600; color: #8b949e; font-size: 11px; }
  .day-header.sun { color: #f85149; }
  .day-header.sat { color: #58a6ff; }

  .day-cell { background: #0d1117; min-height: 110px; padding: 4px; position: relative; transition: background 0.1s; overflow-y: auto; max-height: 300px; }
  .day-cell:hover { background: #131820; }
  .day-cell.today { box-shadow: inset 0 0 0 2px #f0c040; }
  .day-cell.other-month { opacity: 0.25; }
  .day-num { font-weight: 700; font-size: 12px; margin-bottom: 3px; display: flex; justify-content: space-between; align-items: center; }
  .day-num.sun { color: #f85149; }
  .day-num.sat { color: #58a6ff; }
  .day-num .add-btn { font-size: 14px; cursor: pointer; color: #484f58; display: none; line-height: 1; }
  .day-cell:hover .add-btn { display: inline; }
  .add-btn:hover { color: #f0c040; }

  .one-thing { background: #1c3a1c; padding: 2px 4px; border-radius: 2px; font-size: 10px; color: #56d364; margin-bottom: 3px; cursor: text; min-height: 14px; }
  .one-thing:empty::before { content: '★ One Thing...'; color: #2d5a2d; }
  .one-thing:focus { outline: 1px solid #56d364; background: #1a3a1a; }

  .category { margin-bottom: 2px; }
  .cat-label { font-size: 8px; color: #f0c040; font-weight: 600; text-transform: uppercase; letter-spacing: 0.3px; cursor: default; display: flex; justify-content: space-between; }
  .cat-label .cat-add { cursor: pointer; color: #484f58; font-size: 10px; display: none; }
  .category:hover .cat-add { display: inline; }
  .cat-add:hover { color: #f0c040; }

  .item { display: flex; align-items: flex-start; gap: 3px; padding: 1px 0; font-size: 11px; line-height: 1.3; }
  .item input[type="checkbox"] { margin-top: 2px; accent-color: #56d364; cursor: pointer; flex-shrink: 0; }
  .item.done .item-text { text-decoration: line-through; color: #484f58; }
  .item-text { flex: 1; min-height: 14px; cursor: text; }
  .item-text:focus { outline: none; background: #161b22; border-radius: 2px; }
  .item-text a { color: #58a6ff; text-decoration: none; pointer-events: auto; }
  .item-text a:hover { text-decoration: underline; }
  .item .del-btn { color: #484f58; cursor: pointer; font-size: 10px; display: none; padding: 0 2px; }
  .item:hover .del-btn { display: inline; }
  .del-btn:hover { color: #f85149; }

  .stats { padding: 6px 16px; background: #161b22; border-top: 1px solid #30363d; display: flex; gap: 20px; font-size: 11px; color: #8b949e; }
  .stats .stat-value { color: #56d364; font-weight: 600; }

  .templates-section { padding: 12px 16px; background: #161b22; border-top: 1px solid #30363d; }
  .templates-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; cursor: pointer; }
  .templates-header h2 { font-size: 12px; color: #f0c040; }
  .templates-header .toggle { color: #484f58; font-size: 10px; }
  .templates-body { display: none; }
  .templates-body.open { display: block; }
  .tpl-group { margin-bottom: 8px; }
  .tpl-group-label { font-size: 10px; color: #8b949e; font-weight: 600; text-transform: uppercase; margin-bottom: 4px; }
  .tpl-item { display: flex; align-items: center; gap: 6px; padding: 2px 0; font-size: 11px; }
  .tpl-item .tpl-cat { color: #f0c040; font-size: 9px; min-width: 36px; }
  .tpl-item .tpl-del { color: #484f58; cursor: pointer; font-size: 10px; }
  .tpl-item .tpl-del:hover { color: #f85149; }
  .tpl-add { display: flex; gap: 4px; margin-top: 4px; }
  .tpl-add select, .tpl-add input { background: #0d1117; border: 1px solid #30363d; color: #e0e0e0; font-size: 11px; padding: 2px 4px; border-radius: 2px; }
  .tpl-add input { flex: 1; }
  .tpl-add button { background: #238636; border: none; color: #fff; padding: 2px 8px; border-radius: 2px; cursor: pointer; font-size: 11px; }
  .inject-btn { background: #238636; border: none; color: #fff; padding: 3px 10px; border-radius: 4px; cursor: pointer; font-size: 11px; margin-left: 8px; }
  .inject-btn:hover { background: #2ea043; }

  /* New item input */
  .new-item { display: none; padding: 2px 0; }
  .new-item.active { display: flex; gap: 3px; align-items: center; }
  .new-item input { background: #0d1117; border: 1px solid #30363d; color: #e0e0e0; font-size: 11px; padding: 2px 4px; border-radius: 2px; width: 100%; }
  .new-item input:focus { outline: 1px solid #f0c040; }
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>Cortex — Ritual & Routine</h1>
    <div class="vision">Vision: "아침에 일어나서 원하는 것을 할 수 있는 것, 즉 자유" | Cha · Fam · Soli · Inter · Life · Ass</div>
  </div>
  <div class="nav">
    <button onclick="prevMonth()">◀</button>
    <span class="month-label" id="monthLabel"></span>
    <button onclick="nextMonth()">▶</button>
    <button onclick="goToday()">Today</button>
  </div>
</div>

<div class="grid" id="calendarGrid"></div>

<div class="stats" id="stats"></div>

<div class="templates-section">
  <div class="templates-header" onclick="toggleTemplates()">
    <h2>상시 업무 / Recurring Templates</h2>
    <span class="toggle" id="tplToggle">▶ 펼치기</span>
    <button class="inject-btn" onclick="event.stopPropagation();injectToday()">오늘에 주입</button>
  </div>
  <div class="templates-body" id="tplBody">
    <div class="tpl-group">
      <div class="tpl-group-label">Daily (매일)</div>
      <div id="tplDaily"></div>
      <div class="tpl-add">
        <select id="tplCat">
          <option value="ritual">R&R</option>
          <option value="input">Input</option>
          <option value="work">Work</option>
          <option value="outcome">Out</option>
        </select>
        <input type="text" id="tplText" placeholder="새 상시 항목..."
          onkeydown="if(event.key==='Enter')addTemplate()">
        <button onclick="addTemplate()">추가</button>
      </div>
    </div>
    <div class="tpl-group">
      <div class="tpl-group-label">Monthly (월간)</div>
      <div id="tplMonthly"><span style="color:#484f58;font-size:10px">항목 없음</span></div>
    </div>
    <div class="tpl-group">
      <div class="tpl-group-label">Yearly (연간)</div>
      <div id="tplYearly"><span style="color:#484f58;font-size:10px">항목 없음</span></div>
    </div>
  </div>
</div>

<script>
const API = '';
let currentYear, currentMonth, monthData;
const CATS = ['ritual','input','work','outcome'];
const CAT_NAMES = {ritual:'R&R', input:'Input', work:'Work', outcome:'Out'};

function init() {
  const now = new Date();
  currentYear = now.getFullYear();
  currentMonth = now.getMonth() + 1;
  loadMonth();
}

function ym() { return `${currentYear}-${String(currentMonth).padStart(2,'0')}`; }

async function loadMonth() {
  const res = await fetch(`${API}/api/month?ym=${ym()}`);
  monthData = await res.json();
  if (!monthData.days) monthData.days = {};
  render();
}

async function save() {
  await fetch(`${API}/api/month`, {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ ym: ym(), data: monthData })
  });
}

function ensureDay(d) {
  const k = String(d);
  if (!monthData.days[k]) monthData.days[k] = {};
  for (const c of CATS) {
    if (!monthData.days[k][c]) monthData.days[k][c] = [];
  }
  return monthData.days[k];
}

function render() {
  document.getElementById('monthLabel').textContent = `${currentYear}년 ${currentMonth}월`;
  const grid = document.getElementById('calendarGrid');
  const days = ['일','월','화','수','목','금','토'];
  let html = days.map((d,i) =>
    `<div class="day-header ${i===0?'sun':''} ${i===6?'sat':''}">${d}</div>`
  ).join('');

  const firstDay = new Date(currentYear, currentMonth-1, 1).getDay();
  const daysInMonth = new Date(currentYear, currentMonth, 0).getDate();
  const today = new Date();
  const isCurrentMonth = today.getFullYear()===currentYear && today.getMonth()+1===currentMonth;

  // Prev month padding
  const prevDays = new Date(currentYear, currentMonth-1, 0).getDate();
  for (let i = firstDay-1; i >= 0; i--)
    html += `<div class="day-cell other-month"><div class="day-num">${prevDays-i}</div></div>`;

  // Days
  for (let d = 1; d <= daysInMonth; d++) {
    const dow = new Date(currentYear, currentMonth-1, d).getDay();
    const isToday = isCurrentMonth && today.getDate()===d;
    const dayData = monthData.days?.[String(d)] || {};

    html += `<div class="day-cell ${isToday?'today':''}">`;
    html += `<div class="day-num ${dow===0?'sun':''} ${dow===6?'sat':''}">
      <span>${d}</span>
      <span class="add-btn" onclick="addItemPrompt(${d})">+</span>
    </div>`;

    // One Thing - editable
    const ot = dayData.one_thing || '';
    html += `<div class="one-thing" contenteditable="true"
      onblur="saveOneThing(${d}, this.textContent)"
      onkeydown="if(event.key==='Enter'){event.preventDefault();this.blur();}"
    >${ot}</div>`;

    // Categories
    for (const cat of CATS) {
      const items = dayData[cat] || [];
      if (items.length === 0 && !isToday && !monthData.days[String(d)]?._editing) continue;

      html += `<div class="category">
        <div class="cat-label">
          <span>${CAT_NAMES[cat]}</span>
          <span class="cat-add" onclick="addItemInline(${d},'${cat}',this)">+</span>
        </div>`;

      items.forEach((item, idx) => {
        const doneClass = item.done ? 'done' : '';
        const checked = item.done ? 'checked' : '';
        const textContent = item.url
          ? `<a href="${escHtml(item.url)}" target="_blank">${escHtml(item.text)}</a>`
          : escHtml(item.text);

        html += `<div class="item ${doneClass}" data-d="${d}" data-cat="${cat}" data-idx="${idx}">
          <input type="checkbox" ${checked} onchange="toggleItem(${d},'${cat}',${idx})">
          <span class="item-text" contenteditable="true"
            onclick="this.focus()"
            onblur="editItem(${d},'${cat}',${idx},this.textContent)"
            onkeydown="handleItemKey(event,${d},'${cat}',${idx})"
          >${escHtml(item.text)}</span>
          <span class="del-btn" onclick="delItem(${d},'${cat}',${idx})">×</span>
        </div>`;
      });

      // Inline new item input (hidden by default)
      html += `<div class="new-item" id="new-${d}-${cat}">
        <input type="text" placeholder="새 항목..."
          onkeydown="if(event.key==='Enter'){addNewItem(${d},'${cat}',this.value);this.value='';this.parentElement.classList.remove('active');}"
          onblur="this.parentElement.classList.remove('active');">
      </div>`;

      html += `</div>`;
    }

    // Show empty categories for today
    if (isToday) {
      for (const cat of CATS) {
        const items = dayData[cat] || [];
        if (items.length > 0) continue;
        html += `<div class="category">
          <div class="cat-label">
            <span>${CAT_NAMES[cat]}</span>
            <span class="cat-add" onclick="addItemInline(${d},'${cat}',this)">+</span>
          </div>
          <div class="new-item" id="new-${d}-${cat}">
            <input type="text" placeholder="새 항목..."
              onkeydown="if(event.key==='Enter'){addNewItem(${d},'${cat}',this.value);this.value='';}"
              onblur="this.parentElement.classList.remove('active');">
          </div>
        </div>`;
      }
    }

    html += `</div>`;
  }

  // Next month padding
  const totalCells = firstDay + daysInMonth;
  const remaining = totalCells % 7 === 0 ? 0 : 7 - (totalCells % 7);
  for (let i = 1; i <= remaining; i++)
    html += `<div class="day-cell other-month"><div class="day-num">${i}</div></div>`;

  grid.innerHTML = html;
  renderStats();
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderStats() {
  let total=0, done=0;
  for (const d of Object.values(monthData.days||{})) {
    for (const cat of CATS) {
      const items = d[cat]||[];
      total += items.length;
      done += items.filter(i=>i.done).length;
    }
  }
  const pct = total>0 ? Math.round(done/total*100) : 0;
  document.getElementById('stats').innerHTML = `
    <span>이번달: <span class="stat-value">${done}/${total}</span> (${pct}%)</span>
    <span>오늘: ${new Date().toLocaleDateString('ko-KR',{weekday:'long',month:'long',day:'numeric'})}</span>
  `;
}

// --- Data operations ---

async function toggleItem(d, cat, idx) {
  const day = ensureDay(d);
  day[cat][idx].done = !day[cat][idx].done;
  await save();
  render();
}

async function editItem(d, cat, idx, newText) {
  const day = ensureDay(d);
  if (newText.trim() === '') return;
  day[cat][idx].text = newText.trim();
  await save();
  // Don't re-render — preserve undo history and focus
}

function handleItemKey(event, d, cat, idx) {
  if (event.key === 'Enter') {
    event.preventDefault();
    const text = event.target.textContent.trim();
    if (text) editItem(d, cat, idx, text);
    // Create new item below and focus it
    addNewItemAfter(d, cat, idx);
  } else if (event.key === 'Backspace' && event.target.textContent.trim() === '') {
    event.preventDefault();
    delItem(d, cat, idx);
  }
}

async function addNewItemAfter(d, cat, afterIdx) {
  const day = ensureDay(d);
  day[cat].splice(afterIdx + 1, 0, { text: '', url: '', done: false });
  await save();
  render();
  // Focus the new item
  setTimeout(() => {
    const items = document.querySelectorAll(`.item[data-d="${d}"][data-cat="${cat}"]`);
    const target = items[afterIdx + 1];
    if (target) {
      const span = target.querySelector('.item-text');
      span.focus();
    }
  }, 30);
}

async function delItem(d, cat, idx) {
  const day = ensureDay(d);
  day[cat].splice(idx, 1);
  await save();
  render();
}

async function saveOneThing(d, text) {
  const day = ensureDay(d);
  day.one_thing = text.trim();
  await save();
}

function addItemInline(d, cat, el) {
  const container = document.getElementById(`new-${d}-${cat}`);
  if (container) {
    container.classList.add('active');
    container.querySelector('input').focus();
  }
}

async function addNewItem(d, cat, text) {
  if (!text.trim()) return;
  const day = ensureDay(d);
  day[cat].push({ text: text.trim(), url: '', done: false });
  await save();
  render();
}

function addItemPrompt(d) {
  // Show all categories for this day (mark as editing so render shows them)
  ensureDay(d);
  monthData.days[String(d)]._editing = true;
  render();
  // Focus on first available new-item
  setTimeout(() => {
    for (const cat of CATS) {
      const container = document.getElementById(`new-${d}-${cat}`);
      if (container) {
        container.classList.add('active');
        container.querySelector('input').focus();
        return;
      }
    }
  }, 50);
}

// --- Navigation ---
function prevMonth() { currentMonth--; if(currentMonth<1){currentMonth=12;currentYear--;} loadMonth(); }
function nextMonth() { currentMonth++; if(currentMonth>12){currentMonth=1;currentYear++;} loadMonth(); }
function goToday() { const n=new Date(); currentYear=n.getFullYear(); currentMonth=n.getMonth()+1; loadMonth(); }

// --- Templates ---
let templates = { daily: [], monthly: [], yearly: [] };

async function loadTemplates() {
  const res = await fetch(`${API}/api/templates`);
  templates = await res.json();
  renderTemplates();
}

function renderTemplates() {
  const el = document.getElementById('tplDaily');
  if (!templates.daily.length) {
    el.innerHTML = '<span style="color:#484f58;font-size:10px">항목 없음</span>';
    return;
  }
  el.innerHTML = templates.daily.map((t, i) =>
    `<div class="tpl-item">
      <span class="tpl-cat">${CAT_NAMES[t.category]||t.category}</span>
      <span>${escHtml(t.text)}</span>
      <span class="tpl-del" onclick="delTemplate(${i})">×</span>
    </div>`
  ).join('');
}

async function addTemplate() {
  const cat = document.getElementById('tplCat').value;
  const text = document.getElementById('tplText').value.trim();
  if (!text) return;
  templates.daily.push({ category: cat, text });
  await fetch(`${API}/api/templates`, {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify(templates)
  });
  document.getElementById('tplText').value = '';
  renderTemplates();
}

async function delTemplate(idx) {
  templates.daily.splice(idx, 1);
  await fetch(`${API}/api/templates`, {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify(templates)
  });
  renderTemplates();
}

async function injectToday() {
  const today = new Date().getDate();
  await fetch(`${API}/api/inject`, {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ ym: ym(), day: String(today) })
  });
  await loadMonth();
}

function toggleTemplates() {
  const body = document.getElementById('tplBody');
  const toggle = document.getElementById('tplToggle');
  body.classList.toggle('open');
  toggle.textContent = body.classList.contains('open') ? '▼ 접기' : '▶ 펼치기';
}

init();
loadTemplates();
</script>
</body>
</html>
