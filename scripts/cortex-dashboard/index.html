<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0d1117">
<link rel="manifest" href="/manifest.json">
<title>Cortex — Ritual & Routine</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, 'Pretendard', sans-serif; background: #0d1117; color: #e0e0e0; font-size: 12px;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left); }

  /* Header */
  .header { padding: 8px 16px; background: #161b22; border-bottom: 1px solid #30363d; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 6px; }
  .header h1 { font-size: 14px; color: #f0c040; }
  .vision { font-size: 10px; color: #8b949e; margin-top: 2px; }
  .nav { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
  .nav button, .view-toggle button { background: #21262d; border: 1px solid #30363d; color: #c9d1d9; padding: 3px 10px; border-radius: 4px; cursor: pointer; font-size: 11px; }
  .nav button:hover, .view-toggle button:hover { background: #30363d; }
  .nav .month-label { font-size: 14px; font-weight: 600; min-width: 100px; text-align: center; }
  .view-toggle { display: flex; gap: 2px; }
  .view-toggle button.active { background: #f0c040; color: #0d1117; border-color: #f0c040; }
  .search-btn { background: none !important; border: none !important; font-size: 16px; cursor: pointer; color: #8b949e; padding: 2px 6px !important; }
  .search-btn:hover { color: #f0c040; }

  /* Calendar grid */
  .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; background: #21262d; }
  .day-header { background: #161b22; padding: 4px; text-align: center; font-weight: 600; color: #8b949e; font-size: 11px; }
  .day-header.sun { color: #f85149; }
  .day-header.sat { color: #58a6ff; }

  .day-cell { background: #0d1117; min-height: 110px; padding: 4px; position: relative; transition: background 0.1s; overflow-y: auto; max-height: 300px; }
  .day-cell:hover { background: #131820; }
  .day-cell.today { box-shadow: inset 0 0 0 2px #f0c040; }
  .day-cell.other-month { opacity: 0.25; pointer-events: none; }
  .day-cell.type-block { border-left: 3px solid #58a6ff; }
  .day-cell.type-flow { border-left: 3px solid #56d364; }
  .day-cell.type-hf { border-left: 3px solid #f0c040; }
  .day-cell.type-vacation { border-left: 3px solid #bc8cff; }

  .day-num { font-weight: 700; font-size: 12px; margin-bottom: 3px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; background: inherit; z-index: 1; padding: 2px 0; }
  .day-num.sun { color: #f85149; }
  .day-num.sat { color: #58a6ff; }
  .day-num .add-btn { font-size: 14px; cursor: pointer; color: #484f58; display: none; line-height: 1; }
  .day-cell:hover .add-btn { display: inline; }
  .add-btn:hover { color: #f0c040 !important; }

  .day-type-badge { font-size: 8px; padding: 1px 4px; border-radius: 3px; cursor: pointer; font-weight: 600; margin-left: 3px; }
  .badge-block { background: #1c3050; color: #58a6ff; }
  .badge-flow { background: #1c3a1c; color: #56d364; }
  .badge-hf { background: #3a3000; color: #f0c040; }
  .badge-vacation { background: #2d1c50; color: #bc8cff; }

  .one-thing { background: #1c3a1c; padding: 2px 4px; border-radius: 2px; font-size: 10px; color: #56d364; margin-bottom: 3px; cursor: text; min-height: 14px; }
  .one-thing:empty::before { content: 'ONE THING...'; color: #2d5a2d; }
  .one-thing:focus { outline: 1px solid #56d364; background: #1a3a1a; }

  .category { margin-bottom: 2px; border-left: 2px solid transparent; padding-left: 3px; }
  .category.cat-ritual { border-left-color: #f0c040; }
  .category.cat-input { border-left-color: #58a6ff; }
  .category.cat-work { border-left-color: #56d364; }
  .category.cat-outcome { border-left-color: #bc8cff; }
  .cat-label { font-size: 8px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.3px; display: flex; justify-content: space-between; }
  .cat-label.cl-ritual { color: #f0c040; }
  .cat-label.cl-input { color: #58a6ff; }
  .cat-label.cl-work { color: #56d364; }
  .cat-label.cl-outcome { color: #bc8cff; }
  .cat-label .cat-add { cursor: pointer; color: #484f58; font-size: 10px; display: none; }
  .category:hover .cat-add { display: inline; }
  .cat-add:hover { color: #f0c040 !important; }

  .item { display: flex; align-items: flex-start; gap: 3px; padding: 1px 0; font-size: 11px; line-height: 1.3; }
  .item input[type="checkbox"] { margin-top: 2px; accent-color: #56d364; cursor: pointer; flex-shrink: 0; width: 12px; height: 12px; }
  .item.done .item-text { text-decoration: line-through; color: #484f58; }
  .item-text { flex: 1; min-height: 14px; cursor: text; word-break: break-word; }
  .item-text:focus { outline: none; background: #161b22; border-radius: 2px; }
  .item-text a { color: #58a6ff; text-decoration: none; }
  .item .del-btn { color: #484f58; cursor: pointer; font-size: 10px; display: none; padding: 0 2px; }
  .item:hover .del-btn { display: inline; }
  .del-btn:hover { color: #f85149 !important; }

  /* Dragging */
  .item.dragging { opacity: 0.4; }
  .item.drag-over { border-top: 2px solid #f0c040; }

  /* Notes */
  .day-notes { font-size: 10px; color: #8b949e; margin-top: 3px; padding: 2px 4px; background: #161b22; border-radius: 2px; min-height: 14px; display: none; }
  .day-notes.has-content { display: block; }
  .day-notes:focus { outline: 1px solid #484f58; color: #c9d1d9; }

  /* New item input */
  .new-item { display: none; padding: 2px 0; }
  .new-item.active { display: flex; gap: 3px; align-items: center; }
  .new-item input { background: #0d1117; border: 1px solid #30363d; color: #e0e0e0; font-size: 11px; padding: 2px 4px; border-radius: 2px; width: 100%; }
  .new-item input:focus { outline: 1px solid #f0c040; }

  /* Stats bar */
  .stats { padding: 6px 16px; background: #161b22; border-top: 1px solid #30363d; display: flex; gap: 16px; font-size: 11px; color: #8b949e; flex-wrap: wrap; align-items: center; }
  .stat-value { color: #56d364; font-weight: 600; }
  .stat-bar { display: inline-flex; gap: 1px; align-items: flex-end; height: 16px; }
  .stat-bar-day { width: 4px; background: #21262d; border-radius: 1px; }
  .stat-bar-day.has { background: #238636; }

  /* Heatmap */
  .heatmap { display: flex; gap: 2px; flex-wrap: wrap; align-items: center; }
  .heat-cell { width: 10px; height: 10px; border-radius: 2px; }
  .heat-0 { background: #161b22; }
  .heat-1 { background: #0e4429; }
  .heat-2 { background: #006d32; }
  .heat-3 { background: #26a641; }
  .heat-4 { background: #39d353; }

  /* Collapsed past week */
  .collapsed-week { padding: 6px 16px; background: #161b22; border-bottom: 1px solid #21262d; display: flex; justify-content: space-between; align-items: center; cursor: pointer; font-size: 11px; color: #8b949e; }
  .collapsed-week:hover { background: #21262d; }

  /* Week view */
  .week-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; background: #21262d; }
  .week-cell { background: #0d1117; min-height: 400px; padding: 8px; overflow-y: auto; max-height: 80vh; }
  .week-cell.today { box-shadow: inset 0 0 0 2px #f0c040; }
  .week-cell .day-num { font-size: 14px; margin-bottom: 6px; }
  .week-cell .item { font-size: 12px; padding: 2px 0; }
  .week-cell .item input[type="checkbox"] { width: 13px; height: 13px; }
  .week-cell .cat-label { font-size: 9px; margin-top: 6px; }

  /* Bottom panels */
  .panels { border-top: 1px solid #30363d; }
  .panel { background: #161b22; }
  .panel-header { padding: 8px 16px; cursor: pointer; user-select: none; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #21262d; }
  .panel-header h2 { font-size: 12px; color: #f0c040; }
  .panel-toggle { color: #484f58; font-size: 10px; }
  .panel-body { display: none; padding: 8px 16px; }
  .panel-body.open { display: block; }

  /* Tabs */
  .tabs { display: flex; gap: 2px; margin-bottom: 8px; }
  .tab { padding: 4px 12px; font-size: 11px; cursor: pointer; background: #21262d; border: 1px solid #30363d; border-radius: 4px; color: #8b949e; }
  .tab.active { background: #f0c040; color: #0d1117; border-color: #f0c040; }

  .so-item { display: flex; align-items: center; gap: 6px; padding: 3px 0; font-size: 11px; }
  .so-item input[type="checkbox"] { accent-color: #56d364; }
  .so-monthly-item { padding: 2px 0; font-size: 11px; color: #c9d1d9; }
  .so-yearly-item { padding: 2px 0; font-size: 11px; }
  .so-yearly-item .month-tag { font-size: 9px; color: #f0c040; margin-right: 4px; }
  .so-yearly-item.current-month { color: #56d364; font-weight: 600; }

  .hf-badge { display: inline-block; background: #3a3000; color: #f0c040; padding: 2px 6px; border-radius: 3px; font-size: 10px; margin: 2px; }

  /* Recurring template controls */
  .rtpl-toolbar { display: flex; gap: 6px; align-items: center; margin-bottom: 8px; flex-wrap: wrap; }
  .rtpl-toolbar select, .rtpl-toolbar input { background: #0d1117; border: 1px solid #30363d; color: #e0e0e0; font-size: 11px; padding: 3px 5px; border-radius: 3px; }
  .rtpl-toolbar input.rtpl-name { flex: 1; min-width: 140px; }
  .rtpl-toolbar button { background: #238636; border: none; color: #fff; padding: 3px 10px; border-radius: 3px; cursor: pointer; font-size: 11px; }

  .rtpl-item { display: flex; align-items: center; gap: 5px; padding: 3px 2px; font-size: 11px; border-radius: 3px; }
  .rtpl-item:hover { background: #21262d; }
  .rtpl-toggle { cursor: pointer; font-size: 13px; flex-shrink: 0; }
  .rtpl-toggle.on { color: #56d364; }
  .rtpl-toggle.off { color: #484f58; }
  .rtpl-cat { color: #f0c040; font-size: 9px; min-width: 34px; flex-shrink: 0; }
  .rtpl-sched { font-size: 9px; color: #484f58; flex-shrink: 0; }
  .rtpl-del { color: #484f58; cursor: pointer; font-size: 11px; padding: 0 3px; }
  .rtpl-del:hover { color: #f85149; }

  /* Search overlay */
  .search-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 100; padding: 40px 16px; }
  .search-overlay.open { display: flex; flex-direction: column; align-items: center; }
  .search-box { width: 100%; max-width: 500px; }
  .search-box input { width: 100%; background: #0d1117; border: 2px solid #f0c040; color: #e0e0e0; font-size: 16px; padding: 10px 14px; border-radius: 8px; outline: none; }
  .search-results { width: 100%; max-width: 500px; margin-top: 12px; max-height: 60vh; overflow-y: auto; }
  .search-result { padding: 8px 12px; background: #161b22; border-radius: 4px; margin-bottom: 4px; cursor: pointer; }
  .search-result:hover { background: #21262d; }
  .search-result .sr-date { color: #f0c040; font-size: 11px; font-weight: 600; }
  .search-result .sr-match { font-size: 11px; color: #c9d1d9; margin-top: 2px; }
  .search-result .sr-cat { font-size: 9px; color: #8b949e; }
  mark { background: #f0c04060; color: #f0c040; border-radius: 2px; }

  /* Mobile */
  @media (max-width: 768px) {
    .header { padding: 8px; }
    .header h1 { font-size: 12px; }
    .vision { display: none; }
    .grid { grid-template-columns: repeat(7, 1fr); }
    .day-cell { min-height: 60px; max-height: 200px; padding: 2px; font-size: 10px; }
    .day-cell .cat-label { font-size: 7px; }
    .day-cell .item { font-size: 9px; }
    .day-num { font-size: 10px; }
    .one-thing { font-size: 8px; }
    .week-grid { grid-template-columns: 1fr; }
    .week-cell { min-height: auto; max-height: none; }
    .stats { padding: 6px 8px; gap: 8px; font-size: 10px; }
    .item input[type="checkbox"] { width: 14px; height: 14px; }
  }
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>Cortex — Ritual & Routine</h1>
    <div class="vision" id="visionText"></div>
  </div>
  <div class="nav">
    <button id="viewToggle" onclick="toggleView()">Full Month</button>
    <button onclick="prevPeriod()">&#9664;</button>
    <span class="month-label" id="monthLabel"></span>
    <button onclick="nextPeriod()">&#9654;</button>
    <button onclick="goToday()">Today</button>
    <span class="search-btn" onclick="openSearch()">&#128269;</span>
  </div>
</div>

<div id="calendarContainer"></div>

<div class="stats" id="stats"></div>

<div class="panels">
  <!-- Standing Orders Panel -->
  <div class="panel">
    <div class="panel-header" onclick="togglePanel('soPanel')">
      <h2>Standing Orders / Monthly / Yearly</h2>
      <span class="panel-toggle" id="soPanelToggle">&#9654;</span>
    </div>
    <div class="panel-body" id="soPanel"></div>
  </div>

  <!-- Recurring Templates Panel -->
  <div class="panel">
    <div class="panel-header" onclick="togglePanel('rtPanel')">
      <h2>Recurring Templates</h2>
      <span class="panel-toggle" id="rtPanelToggle">&#9654;</span>
    </div>
    <div class="panel-body" id="rtPanel"></div>
  </div>
</div>

<!-- Search Overlay -->
<div class="search-overlay" id="searchOverlay" onclick="if(event.target===this)closeSearch()">
  <div class="search-box">
    <input type="text" id="searchInput" placeholder="Search..." oninput="debounceSearch()" onkeydown="if(event.key==='Escape')closeSearch()">
  </div>
  <div class="search-results" id="searchResults"></div>
</div>

<script>
const API = '';
const CATS = ['ritual','input','work','outcome'];
const CAT_NAMES = {ritual:'R&R', input:'Input', work:'Work', outcome:'Out'};
const DAY_NAMES = ['일','월','화','수','목','금','토'];
const TYPE_LABELS = {block:'BLOCK',flow:'FLOW',hf:'HF',vacation:'휴가'};
const TYPE_COLORS = {block:'badge-block',flow:'badge-flow',hf:'badge-hf',vacation:'badge-vacation'};
const TYPES = ['block','flow','hf','vacation'];

let currentYear, currentMonth, currentWeekStart, monthData, standingData, recurringData;
let viewMode = 'week'; // 'week' (default) or 'month'

// --- Init ---
function init() {
  const now = new Date();
  currentYear = now.getFullYear();
  currentMonth = now.getMonth() + 1;
  currentWeekStart = getWeekStart(now);
  loadMonth();
  loadStandingOrders();
  loadRecurringTemplates();
  registerSW();
}

function registerSW() {
  // Unregister stale SW during dev; re-enable for production
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.getRegistrations().then(regs => regs.forEach(r => r.unregister()));
    caches.keys().then(keys => keys.forEach(k => caches.delete(k)));
  }
}

function ym() { return `${currentYear}-${String(currentMonth).padStart(2,'0')}`; }

function getWeekStart(date) {
  const d = new Date(date);
  d.setDate(d.getDate() - d.getDay());
  return d;
}

// --- Data loading ---
async function loadMonth() {
  const res = await fetch(`${API}/api/month?ym=${ym()}`);
  monthData = await res.json();
  document.getElementById('visionText').textContent = monthData.goals?.goal || '';
  updateLabel();
  render();
}

function updateLabel() {
  document.getElementById('monthLabel').textContent = viewMode === 'month'
    ? `${currentYear}. ${currentMonth}` : formatWeekLabel();
  document.getElementById('viewToggle').textContent = viewMode === 'week' ? 'Full Month' : 'This Week';
}

function formatWeekLabel() {
  const end = new Date(currentWeekStart);
  end.setDate(end.getDate() + 6);
  return `${currentWeekStart.getMonth()+1}/${currentWeekStart.getDate()} - ${end.getMonth()+1}/${end.getDate()}`;
}

async function loadStandingOrders() {
  const res = await fetch(`${API}/api/standing-orders`);
  standingData = await res.json();
  renderStandingOrders();
}

async function loadRecurringTemplates() {
  const res = await fetch(`${API}/api/recurring-templates`);
  recurringData = await res.json();
  renderRecurringTemplates();
}

// --- View toggle ---
function toggleView() {
  viewMode = viewMode === 'week' ? 'month' : 'week';
  document.getElementById('viewToggle').textContent = viewMode === 'week' ? 'Full Month' : 'This Week';
  document.getElementById('monthLabel').textContent = viewMode === 'month'
    ? `${currentYear}. ${currentMonth}` : formatWeekLabel();
  render();
}

function prevPeriod() {
  if (viewMode === 'month') { currentMonth--; if(currentMonth<1){currentMonth=12;currentYear--;} loadMonth(); }
  else { currentWeekStart.setDate(currentWeekStart.getDate() - 7); syncMonthFromWeek(); loadMonth(); }
}
function nextPeriod() {
  if (viewMode === 'month') { currentMonth++; if(currentMonth>12){currentMonth=1;currentYear++;} loadMonth(); }
  else { currentWeekStart.setDate(currentWeekStart.getDate() + 7); syncMonthFromWeek(); loadMonth(); }
}
function goToday() {
  const now = new Date();
  currentYear = now.getFullYear();
  currentMonth = now.getMonth() + 1;
  currentWeekStart = getWeekStart(now);
  loadMonth();
}
function syncMonthFromWeek() {
  const mid = new Date(currentWeekStart);
  mid.setDate(mid.getDate() + 3);
  currentYear = mid.getFullYear();
  currentMonth = mid.getMonth() + 1;
}

// --- Render ---
function render() {
  const container = document.getElementById('calendarContainer');
  container.innerHTML = viewMode === 'month' ? renderMonthView() : renderWeekView();
  renderStats();
}

function renderMonthView() {
  const daysInMonth = new Date(currentYear, currentMonth, 0).getDate();
  const today = new Date();
  const isCurrentMonth = today.getFullYear() === currentYear && today.getMonth() + 1 === currentMonth;
  const todayDate = isCurrentMonth ? today.getDate() : -1;

  // Group days into weeks
  const weeks = [];
  let weekDays = [];
  for (let d = 1; d <= daysInMonth; d++) {
    weekDays.push(d);
    const dow = new Date(currentYear, currentMonth - 1, d).getDay();
    if (dow === 6 || d === daysInMonth) {
      weeks.push([...weekDays]);
      weekDays = [];
    }
  }

  // Determine which week is "current" (contains today, or last week if past month)
  let currentWeekIdx = weeks.length - 1;
  if (isCurrentMonth) {
    currentWeekIdx = weeks.findIndex(w => w.includes(todayDate));
    if (currentWeekIdx === -1) currentWeekIdx = weeks.length - 1;
  }

  let html = '';
  weeks.forEach((week, wIdx) => {
    const isPast = wIdx < currentWeekIdx;
    const isCurrent = wIdx === currentWeekIdx;
    const weekStart = week[0];
    const weekEnd = week[week.length - 1];

    // Collapsed past weeks — click to expand
    if (isPast) {
      // Summary: count done/total for the week
      let wTotal = 0, wDone = 0;
      week.forEach(d => {
        const dd = monthData.days[String(d)] || {};
        CATS.forEach(cat => {
          const items = dd[cat] || [];
          wTotal += items.length;
          wDone += items.filter(i => i.done).length;
        });
      });
      const pct = wTotal > 0 ? Math.round(wDone / wTotal * 100) : 0;
      html += `<div class="collapsed-week" onclick="expandWeek(this)">
        <span>${currentMonth}/${weekStart} - ${currentMonth}/${weekEnd}</span>
        <span style="color:#56d364">${wDone}/${wTotal} (${pct}%)</span>
        <span style="color:#484f58">&#9654; expand</span>
      </div>`;
      // Hidden grid
      html += `<div class="week-expandable" style="display:none">`;
    }

    // Week grid
    html += '<div class="grid">';
    DAY_NAMES.forEach((n, i) => {
      const cls = i === 0 ? ' sun' : i === 6 ? ' sat' : '';
      html += `<div class="day-header${cls}">${n}</div>`;
    });
    // Pad start of week
    const firstDow = new Date(currentYear, currentMonth - 1, weekStart).getDay();
    for (let i = 0; i < firstDow; i++)
      html += `<div class="day-cell other-month"></div>`;
    // Days
    week.forEach(d => {
      const isToday = d === todayDate;
      html += renderDayCell(d, isToday, false);
    });
    // Pad end of week
    const lastDow = new Date(currentYear, currentMonth - 1, weekEnd).getDay();
    for (let i = lastDow + 1; i < 7; i++)
      html += `<div class="day-cell other-month"></div>`;
    html += '</div>';

    if (isPast) html += '</div>'; // close week-expandable
  });

  return html;
}

function expandWeek(el) {
  const expandable = el.nextElementSibling;
  if (expandable) {
    const isOpen = expandable.style.display !== 'none';
    expandable.style.display = isOpen ? 'none' : '';
    el.querySelector('span:last-child').innerHTML = isOpen ? '&#9654; expand' : '&#9660; collapse';
  }
}

function renderWeekView() {
  const today = new Date();
  let html = '<div class="week-grid">';
  // Headers
  DAY_NAMES.forEach((n, i) => {
    const cls = i === 0 ? ' sun' : i === 6 ? ' sat' : '';
    html += `<div class="day-header${cls}">${n}</div>`;
  });
  // 7 days
  for (let i = 0; i < 7; i++) {
    const date = new Date(currentWeekStart);
    date.setDate(date.getDate() + i);
    const d = date.getDate();
    const isToday = date.toDateString() === today.toDateString();
    const isSameMonth = date.getMonth() + 1 === currentMonth;
    html += `<div class="week-cell${isToday ? ' today' : ''}">`;
    html += renderDayCellContent(d, isToday, true);
    html += '</div>';
  }
  html += '</div>';
  return html;
}

function renderDayCell(d, isToday, isWeek) {
  const dayData = monthData.days[String(d)] || {};
  const dow = new Date(currentYear, currentMonth - 1, d).getDay();
  const typeClass = dayData.day_type ? ` type-${dayData.day_type}` : '';
  const todayClass = isToday ? ' today' : '';

  return `<div class="day-cell${todayClass}${typeClass}">${renderDayCellContent(d, isToday, isWeek)}</div>`;
}

function renderDayCellContent(d, isToday, isWeek) {
  const dayData = monthData.days[String(d)] || {};
  const dow = new Date(currentYear, currentMonth - 1, d).getDay();
  const dowClass = dow === 0 ? ' sun' : dow === 6 ? ' sat' : '';

  const badgeHtml = dayData.day_type
    ? ` <span class="day-type-badge ${TYPE_COLORS[dayData.day_type]}" onclick="event.stopPropagation();cycleDayType(${d})">${TYPE_LABELS[dayData.day_type]}</span>`
    : '';
  let html = `<div class="day-num${dowClass}" onclick="cycleDayType(${d})" style="cursor:pointer" title="Set day type">
    <span>${d}${badgeHtml}</span>
    <span class="add-btn" onclick="event.stopPropagation();addItemPrompt(${d})">+</span>
  </div>`;

  // One Thing
  const ot = dayData.one_thing || '';
  html += `<div class="one-thing" contenteditable="true"
    onblur="saveOneThing(${d}, this.textContent)"
    onkeydown="if(event.key==='Enter'){event.preventDefault();this.blur();}"
  >${esc(ot)}</div>`;

  // Categories
  for (const cat of CATS) {
    const items = dayData[cat] || [];
    if (items.length === 0 && !isToday) continue;

    html += `<div class="category cat-${cat}">
      <div class="cat-label cl-${cat}">
        <span>${CAT_NAMES[cat]}</span>
        <span class="cat-add" onclick="addItemInline(${d},'${cat}')">+</span>
      </div>`;

    items.forEach((item, idx) => {
      const doneClass = item.done ? 'done' : '';
      const checked = item.done ? 'checked' : '';
      html += `<div class="item ${doneClass}" draggable="true"
        ondragstart="dragStart(event,${d},'${cat}',${idx})"
        ondragover="dragOver(event)" ondragleave="dragLeave(event)"
        ondrop="drop(event,${d},'${cat}',${idx})">
        <input type="checkbox" ${checked} onchange="toggleItem(${d},'${cat}',${idx})">
        <span class="item-text" contenteditable="true"
          onblur="editItem(${d},'${cat}',${idx},this.textContent)"
          onkeydown="handleItemKey(event,${d},'${cat}',${idx})"
        >${esc(item.text)}</span>
        <span class="del-btn" onclick="delItem(${d},'${cat}',${idx})">&#215;</span>
      </div>`;
    });

    html += `<div class="new-item" id="new-${d}-${cat}">
      <input type="text" placeholder="..."
        onkeydown="if(event.key==='Enter'){addNewItem(${d},'${cat}',this.value);this.value='';this.parentElement.classList.remove('active');}"
        onblur="setTimeout(()=>this.parentElement.classList.remove('active'),100)">
    </div></div>`;
  }

  // Empty cats for today
  if (isToday) {
    for (const cat of CATS) {
      if ((dayData[cat] || []).length > 0) continue;
      html += `<div class="category cat-${cat}"><div class="cat-label cl-${cat}"><span>${CAT_NAMES[cat]}</span>
        <span class="cat-add" onclick="addItemInline(${d},'${cat}')">+</span></div>
        <div class="new-item" id="new-${d}-${cat}">
          <input type="text" placeholder="..." onkeydown="if(event.key==='Enter'){addNewItem(${d},'${cat}',this.value);this.value='';}"
            onblur="setTimeout(()=>this.parentElement.classList.remove('active'),100)">
        </div></div>`;
    }
  }

  // Notes
  const notes = dayData.notes || '';
  const notesCls = notes ? 'day-notes has-content' : 'day-notes';
  html += `<div class="${notesCls}" id="notes-${d}" contenteditable="true"
    onblur="saveNotes(${d}, this.textContent)"
    onkeydown="if(event.key==='Escape')this.blur()"
  >${esc(notes)}</div>`;

  return html;
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// --- Stats ---
function renderStats() {
  const daysInMonth = new Date(currentYear, currentMonth, 0).getDate();
  let total=0, done=0;
  const catStats = {};
  CATS.forEach(c => catStats[c] = {total:0, done:0});
  const dailyDone = [];

  for (let d = 1; d <= daysInMonth; d++) {
    const dd = monthData.days[String(d)] || {};
    let dayDone = 0, dayTotal = 0;
    for (const cat of CATS) {
      const items = dd[cat] || [];
      total += items.length; catStats[cat].total += items.length;
      dayTotal += items.length;
      const dc = items.filter(i=>i.done).length;
      done += dc; catStats[cat].done += dc;
      dayDone += dc;
    }
    dailyDone.push(dayTotal > 0 ? dayDone / dayTotal : 0);
  }

  const pct = total > 0 ? Math.round(done/total*100) : 0;

  let html = `<span>Total: <span class="stat-value">${done}/${total}</span> (${pct}%)</span>`;

  // Per-category
  for (const cat of CATS) {
    const s = catStats[cat];
    const p = s.total > 0 ? Math.round(s.done/s.total*100) : 0;
    html += `<span>${CAT_NAMES[cat]}: ${p}%</span>`;
  }

  // Mini heatmap
  html += '<span class="heatmap">';
  for (let d = 0; d < dailyDone.length; d++) {
    const pct = dailyDone[d];
    const level = pct === 0 ? 0 : pct < 0.25 ? 1 : pct < 0.5 ? 2 : pct < 0.75 ? 3 : 4;
    html += `<div class="heat-cell heat-${level}" title="Day ${d+1}: ${Math.round(pct*100)}%"></div>`;
  }
  html += '</span>';

  document.getElementById('stats').innerHTML = html;
}

// --- Data operations ---
async function save() {
  await fetch(`${API}/api/month`, {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ ym: ym(), data: monthData })
  });
}

function ensureDay(d) {
  const key = String(d);
  if (!monthData.days[key]) monthData.days[key] = {};
  return monthData.days[key];
}

async function toggleItem(d, cat, idx) {
  ensureDay(d)[cat][idx].done = !ensureDay(d)[cat][idx].done;
  await save(); render();
}

async function editItem(d, cat, idx, newText) {
  if (!newText.trim()) return;
  ensureDay(d)[cat][idx].text = newText.trim();
  await save();
}

function handleItemKey(e, d, cat, idx) {
  if (e.key === 'Enter') {
    e.preventDefault();
    editItem(d, cat, idx, e.target.textContent.trim());
    addNewItemAfter(d, cat, idx);
  } else if (e.key === 'Backspace' && e.target.textContent.trim() === '') {
    e.preventDefault(); delItem(d, cat, idx);
  }
}

async function addNewItemAfter(d, cat, afterIdx) {
  const day = ensureDay(d);
  if (!day[cat]) day[cat] = [];
  day[cat].splice(afterIdx + 1, 0, { text: '', url: '', done: false });
  await save(); render();
  setTimeout(() => {
    const items = document.querySelectorAll(`.item[draggable]`);
    // Find the right item by scanning
    let count = 0;
    for (const item of items) {
      const span = item.querySelector('.item-text');
      if (span && span.textContent === '') { span.focus(); break; }
    }
  }, 50);
}

async function delItem(d, cat, idx) {
  ensureDay(d)[cat].splice(idx, 1);
  await save(); render();
}

async function addNewItem(d, cat, text) {
  if (!text.trim()) return;
  const day = ensureDay(d);
  if (!day[cat]) day[cat] = [];
  day[cat].push({ text: text.trim(), url: '', done: false });
  await save(); render();
}

function addItemInline(d, cat) {
  const c = document.getElementById(`new-${d}-${cat}`);
  if (c) { c.classList.add('active'); c.querySelector('input').focus(); }
}

function addItemPrompt(d) {
  ensureDay(d);
  render();
  setTimeout(() => {
    for (const cat of CATS) {
      const c = document.getElementById(`new-${d}-${cat}`);
      if (c) { c.classList.add('active'); c.querySelector('input').focus(); return; }
    }
  }, 50);
}

async function saveOneThing(d, text) {
  ensureDay(d).one_thing = text.trim();
  await save();
}

async function saveNotes(d, text) {
  const dd = ensureDay(d);
  if (text.trim()) dd.notes = text.trim();
  else delete dd.notes;
  await save();
}

function toggleNotes(d) {
  const el = document.getElementById(`notes-${d}`);
  if (el) { el.classList.toggle('editing'); if (el.classList.contains('editing')) el.focus(); }
}

// --- Day Type ---
async function cycleDayType(d) {
  const dd = ensureDay(d);
  const current = dd.day_type || null;
  const idx = current ? TYPES.indexOf(current) : -1;
  const next = idx >= TYPES.length - 1 ? null : TYPES[idx + 1];

  await fetch(`${API}/api/day-type`, {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ ym: ym(), day: String(d), type: next })
  });

  if (next) dd.day_type = next;
  else delete dd.day_type;
  render();
}

// --- Drag and Drop ---
let dragData = null;
function dragStart(e, d, cat, idx) {
  dragData = { d, cat, idx };
  e.target.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
}
function dragOver(e) { e.preventDefault(); e.currentTarget.classList.add('drag-over'); }
function dragLeave(e) { e.currentTarget.classList.remove('drag-over'); }
async function drop(e, d, cat, toIdx) {
  e.preventDefault(); e.currentTarget.classList.remove('drag-over');
  if (!dragData || dragData.cat !== cat || dragData.d !== d) return;
  const fromIdx = dragData.idx;
  if (fromIdx === toIdx) return;
  await fetch(`${API}/api/reorder`, {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ ym: ym(), day: String(d), category: cat, fromIdx, toIdx })
  });
  const items = ensureDay(d)[cat];
  const [moved] = items.splice(fromIdx, 1);
  items.splice(toIdx, 0, moved);
  render();
  dragData = null;
}

// --- Search ---
let searchTimer;
function openSearch() {
  const overlay = document.getElementById('searchOverlay');
  overlay.classList.add('open');
  document.getElementById('searchInput').focus();
}
function closeSearch() {
  document.getElementById('searchOverlay').classList.remove('open');
  document.getElementById('searchInput').value = '';
  document.getElementById('searchResults').innerHTML = '';
}
function debounceSearch() {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(doSearch, 300);
}
async function doSearch() {
  const q = document.getElementById('searchInput').value.trim();
  if (q.length < 2) { document.getElementById('searchResults').innerHTML = ''; return; }
  const res = await fetch(`${API}/api/search?q=${encodeURIComponent(q)}`);
  const results = await res.json();
  const container = document.getElementById('searchResults');
  if (!results.length) { container.innerHTML = '<div style="color:#484f58;text-align:center;padding:20px">No results</div>'; return; }
  container.innerHTML = results.slice(0, 50).map(r => {
    const matchHtml = r.matches.map(m => {
      const highlighted = esc(m.text).replace(new RegExp(esc(q), 'gi'), '<mark>$&</mark>');
      return `<div class="sr-match"><span class="sr-cat">${m.field}</span> ${highlighted}</div>`;
    }).join('');
    return `<div class="search-result" onclick="goToResult('${r.ym}',${r.day})">
      <div class="sr-date">${r.ym} / ${r.day}일</div>${matchHtml}</div>`;
  }).join('');
}
function goToResult(resultYm, day) {
  closeSearch();
  const [y, m] = resultYm.split('-').map(Number);
  currentYear = y; currentMonth = m;
  loadMonth();
}

// --- Standing Orders Panel ---
function renderStandingOrders() {
  if (!standingData) return;
  const currentMonthNum = currentMonth;
  const ymKey = ym();

  let html = '<div class="tabs">';
  html += '<div class="tab active" onclick="showSOTab(\'standing\',this)">Standing</div>';
  html += '<div class="tab" onclick="showSOTab(\'monthly\',this)">This Month</div>';
  html += '<div class="tab" onclick="showSOTab(\'yearly\',this)">Yearly</div>';
  html += '</div>';

  // Standing
  html += '<div id="soTab-standing">';
  (standingData.standing || []).forEach(s => {
    html += `<div class="so-item"><input type="checkbox" ${s.active?'checked':''} disabled> ${esc(s.text)}</div>`;
  });
  // HF dates
  const hfThisMonth = (standingData.happy_friday || []).filter(d => d.startsWith(ymKey));
  if (hfThisMonth.length) {
    html += '<div style="margin-top:6px;font-size:10px;color:#8b949e">Happy Friday:</div>';
    hfThisMonth.forEach(d => { html += `<span class="hf-badge">${d.split('-')[2]}일</span>`; });
  }
  // Holiday
  const holidaysThisMonth = Object.entries(standingData.holidays || {}).filter(([k]) => k.startsWith(ymKey));
  if (holidaysThisMonth.length) {
    html += '<div style="margin-top:6px;font-size:10px;color:#8b949e">Holidays:</div>';
    holidaysThisMonth.forEach(([d, name]) => { html += `<div class="so-monthly-item">${d.split('-')[2]}일 — ${esc(name)}</div>`; });
  }
  html += '</div>';

  // Monthly
  html += '<div id="soTab-monthly" style="display:none">';
  const monthlyItems = standingData.monthly?.[ymKey] || [];
  if (monthlyItems.length) {
    monthlyItems.forEach(i => { html += `<div class="so-monthly-item">- ${esc(typeof i === 'string' ? i : i.text || i)}</div>`; });
  } else {
    html += '<div style="color:#484f58;font-size:10px">No items for this month</div>';
  }
  html += '</div>';

  // Yearly
  html += '<div id="soTab-yearly" style="display:none">';
  (standingData.yearly || []).forEach(y => {
    const isCurrent = y.month === currentMonthNum;
    html += `<div class="so-yearly-item ${isCurrent ? 'current-month' : ''}">
      <span class="month-tag">${y.month}월</span>${esc(y.text)}</div>`;
  });
  html += '</div>';

  document.getElementById('soPanel').innerHTML = html;
}

function showSOTab(name, el) {
  ['standing','monthly','yearly'].forEach(t => {
    document.getElementById(`soTab-${t}`).style.display = t === name ? '' : 'none';
  });
  el.parentElement.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
}

// --- Recurring Templates Panel ---
function renderRecurringTemplates() {
  if (!recurringData) return;
  let html = `<div class="rtpl-toolbar">
    <select id="rtplCat">${CATS.map(c=>`<option value="${c}">${CAT_NAMES[c]}</option>`).join('')}</select>
    <input type="text" id="rtplName" class="rtpl-name" placeholder="New recurring..." onkeydown="if(event.key==='Enter')addRT()">
    <select id="rtplType" onchange="updateRTExtra()">
      <option value="daily">Daily</option><option value="weekly">Weekly</option><option value="monthly">Monthly</option>
    </select>
    <span id="rtplExtra"></span>
    <button onclick="addRT()">Add</button>
  </div>`;

  const templates = recurringData.templates || [];
  if (!templates.length) { html += '<div style="color:#484f58;font-size:10px">No templates</div>'; }
  else {
    templates.forEach(t => {
      const onCls = t.enabled ? 'on' : 'off';
      const icon = t.enabled ? '&#9679;' : '&#9675;';
      const sched = schedLabel(t.schedule);
      html += `<div class="rtpl-item">
        <span class="rtpl-toggle ${onCls}" onclick="toggleRT('${t.id}')">${icon}</span>
        <span class="rtpl-cat">${CAT_NAMES[t.category]||t.category}</span>
        <span style="flex:1;color:#c9d1d9">${esc(t.name)}</span>
        <span class="rtpl-sched">${esc(sched)}</span>
        <span class="rtpl-del" onclick="delRT('${t.id}')">&#215;</span>
      </div>`;
    });
  }
  document.getElementById('rtPanel').innerHTML = html;
  updateRTExtra();
}

function schedLabel(s) {
  if (!s) return '';
  if (s.type === 'daily') return 'Daily';
  if (s.type === 'weekly') return (s.days||[]).map(d=>DAY_NAMES[d]).join('/');
  if (s.type === 'monthly') return (s.dates||[]).join(',') + '일';
  return s.type;
}

function updateRTExtra() {
  const type = document.getElementById('rtplType')?.value;
  const el = document.getElementById('rtplExtra');
  if (!el) return;
  if (type === 'daily') el.innerHTML = '';
  else if (type === 'weekly') el.innerHTML = DAY_NAMES.map((n,i)=>`<label style="font-size:10px;cursor:pointer"><input type="checkbox" name="rt-dow" value="${i}"> ${n}</label>`).join(' ');
  else if (type === 'monthly') el.innerHTML = '<input type="number" id="rtMonthDate" min="1" max="31" value="1" style="width:50px;background:#0d1117;border:1px solid #30363d;color:#e0e0e0;font-size:11px;padding:2px;border-radius:3px">';
}

async function addRT() {
  const name = document.getElementById('rtplName')?.value.trim();
  const category = document.getElementById('rtplCat')?.value;
  const type = document.getElementById('rtplType')?.value;
  if (!name) return;
  let schedule = { type };
  if (type === 'weekly') schedule.days = [...document.querySelectorAll('input[name="rt-dow"]:checked')].map(c=>+c.value);
  if (type === 'monthly') schedule.dates = [+(document.getElementById('rtMonthDate')?.value || 1)];
  await fetch(`${API}/api/recurring-templates`, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({name,category,schedule,enabled:true}) });
  document.getElementById('rtplName').value = '';
  loadRecurringTemplates();
}

async function toggleRT(id) {
  const t = recurringData.templates.find(t=>t.id===id);
  if (!t) return;
  await fetch(`${API}/api/recurring-templates/${id}`, { method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify({enabled:!t.enabled}) });
  loadRecurringTemplates();
}

async function delRT(id) {
  await fetch(`${API}/api/recurring-templates/${id}`, { method:'DELETE' });
  loadRecurringTemplates();
}

// --- Panel toggle ---
function togglePanel(id) {
  const body = document.getElementById(id);
  body.classList.toggle('open');
  document.getElementById(id+'Toggle').innerHTML = body.classList.contains('open') ? '&#9660;' : '&#9654;';
}

// --- Navigation ---
function prevMonth() { prevPeriod(); }
function nextMonth() { nextPeriod(); }

init();
</script>
