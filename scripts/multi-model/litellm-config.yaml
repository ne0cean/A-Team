model_list:
  # Planner (Opus) - 설계/기획/복잡한 판단
  - model_name: planner
    litellm_params:
      model: claude-sonnet-4-20250514
      api_key: os.environ/ANTHROPIC_API_KEY

  # Coder (Sonnet) - 구현/수정
  - model_name: coder
    litellm_params:
      model: claude-sonnet-4-20250514
      api_key: os.environ/ANTHROPIC_API_KEY

  # Local Fast (7B) - 요약/정리/포맷
  - model_name: local-fast
    litellm_params:
      model: ollama/qwen2:7b
      api_base: http://host.docker.internal:11434

  # Local Strong (32B) - 코딩
  - model_name: local-strong
    litellm_params:
      model: ollama/qwen2.5-coder:32b
      api_base: http://host.docker.internal:11434

  # Groq Free Tier (무료, 빠름)
  - model_name: groq-free
    litellm_params:
      model: groq/llama-3.3-70b-versatile
      api_key: os.environ/GROQ_API_KEY

  # Groq Fast (무료, 초고속)
  - model_name: groq-fast
    litellm_params:
      model: groq/llama-3.1-8b-instant
      api_key: os.environ/GROQ_API_KEY

router_settings:
  routing_strategy: "usage-based-routing"
  enable_pre_call_checks: true
  num_retries: 1
  timeout: 60
  max_parallel_requests: 2

general_settings:
  master_key: "sk-ateam-litellm"

litellm_settings:
  drop_params: true
  set_verbose: false
  max_budget: 10.0
  budget_duration: "1d"
