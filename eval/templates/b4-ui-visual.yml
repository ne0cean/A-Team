# B4 UI + Visual Verification — React dark-mode toggle
# RFC-005 / Wave 2 skeleton

description: B4 UI — ToggleButton.tsx with dark mode + visual diff capture plan

providers:
  - id: anthropic:messages:claude-sonnet-4-6
    config:
      temperature: 0
      max_tokens: 2048

prompts:
  - |
    Implement ToggleButton.tsx (React) with:
    - props: `checked: boolean`, `onChange: () => void`
    - dark mode via `prefers-color-scheme`
    - a11y: keyboard support (Space/Enter), aria-checked

    Also describe how `PostToolUse` hook would capture before/after screenshots.

    Output JSON:
    {
      "component_code": "...",
      "a11y_features": ["..."],
      "visual_verification_plan": "...",
      "dark_mode_strategy": "CSS media query | styled-components | class toggle"
    }

tests:
  - description: complete component + a11y + dark mode + hook plan
    assert:
      - type: javascript
        value: |
          const p = JSON.parse(output);
          p.component_code && p.component_code.includes('onChange') &&
          p.component_code.includes('aria-checked') &&
          p.a11y_features && p.a11y_features.length >= 2
        weight: 2
      - type: contains-any
        value: ["prefers-color-scheme", "dark-mode", "dark:"]
        weight: 1
      - type: contains-any
        value: ["PostToolUse", "pre-ui-capture", "post-ui-verify", "screenshot"]
        weight: 1.5
    threshold: 0.80

metadata:
  category: ui-visual
  benchmark: b4
  severity: optional-if-playwright-missing
  rfc: RFC-005
