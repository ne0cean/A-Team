# B5 Research Synthesis — multi-source comparison
# RFC-005 / Wave 2 skeleton
# Tests subagent orchestration quality

description: B5 Research — 3 MCP server 구현체 비교 (최소 3 속성)

providers:
  - id: anthropic:messages:claude-sonnet-4-6
    config:
      temperature: 0
      max_tokens: 3072

prompts:
  - |
    Compare 3 MCP server implementations (stdio / HTTP / SSE variants).

    Output JSON:
    {
      "candidates": [
        { "name": "...", "transport": "stdio|HTTP|SSE", "use_case": "...", "pros": [], "cons": [] },
        ...
      ],
      "comparison_table": [
        { "attribute": "...", "values": { "<candidate1>": "...", "<candidate2>": "...", "<candidate3>": "..." } }
      ],
      "recommendation": "...",
      "reasoning": "..."
    }

tests:
  - description: 3 candidates + ≥3 attributes compared
    assert:
      - type: javascript
        value: |
          const p = JSON.parse(output);
          p.candidates && p.candidates.length === 3 &&
          p.candidates.every(c => c.name && c.transport && c.use_case && c.pros && c.cons)
        weight: 2
      - type: javascript
        value: |
          const p = JSON.parse(output);
          p.comparison_table && p.comparison_table.length >= 3 &&
          p.comparison_table.every(row => row.attribute && row.values)
        weight: 1.5
      - type: javascript
        value: |
          const p = JSON.parse(output);
          p.recommendation && p.reasoning && p.reasoning.length > 50
        weight: 1
      - type: llm-rubric
        value: |
          Is the comparison fair and not over-relying on one source?
          Does recommendation align with use case constraints?
        weight: 1.5
    threshold: 0.85

metadata:
  category: research-synthesis
  benchmark: b5
  severity: gate-blocking
  rfc: RFC-005
