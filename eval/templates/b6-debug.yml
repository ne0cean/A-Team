# B6 Root Cause Debug — multi-turn reasoning
# RFC-005 / Wave 2

description: B6 Debug — TypeError stack trace → 근본 원인 + fix 제안

providers:
  - id: anthropic:messages:claude-sonnet-4-6
    config:
      temperature: 0
      max_tokens: 2048

prompts:
  - |
    Given stack trace + code snippet, find ROOT CAUSE and propose fix.

    Stack:
    ```
    TypeError: Cannot read property 'map' of undefined
      at renderList (component.tsx:42)
      at render (component.tsx:15)
    ```

    Logs: API returned 500 but client state not reset

    Code (component.tsx:40-45):
    ```tsx
    function renderList() {
      return data.map(item => <Item key={item.id} />);
    }
    ```

    Output JSON:
    {
      "root_cause": "...",
      "fix_proposal": "...",
      "defensive_pattern": "..."
    }

tests:
  - description: identifies undefined data + defensive default
    assert:
      - type: javascript
        value: |
          const p = JSON.parse(output);
          p.root_cause && /undefined|null|api.*error|500/i.test(p.root_cause)
        weight: 2
      - type: contains-any
        value: ["?? []", "|| []", "data ??", "guard", "optional"]
        weight: 1.5
      - type: llm-rubric
        value: Is the root cause correctly identified and fix reasonable?
        weight: 1.5
    threshold: 0.85

metadata:
  category: root-cause-analysis
  benchmark: b6
  severity: gate-blocking
  rfc: RFC-005
