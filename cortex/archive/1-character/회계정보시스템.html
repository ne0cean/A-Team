<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>회계정보시스템</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1e1e1e; color: #e0e0e0; font-family: 'Segoe UI', -apple-system, sans-serif; font-size: 15px; line-height: 1.6; padding: 20px 30px 60px; overflow-x: hidden; }
a { color: #6cb0f6; text-decoration: none; }
a:hover { text-decoration: underline; }
.title-bar { background: #3a3a5c; display: inline-block; padding: 6px 16px; font-size: 22px; font-weight: bold; color: #fff; margin-bottom: 4px; }
.date { color: #999; font-size: 13px; margin-bottom: 20px; }
.board { position: relative; }
.card { background: #2a2a2a; border: 1px solid #3a3a3a; border-radius: 8px; padding: 12px; position: absolute; cursor: grab; transition: box-shadow 0.15s; overflow: hidden; }
.card:hover { box-shadow: 0 0 0 1px #58a6ff; z-index: 10; }
.card.moving { opacity: 0.8; box-shadow: 0 4px 24px rgba(0,0,0,0.6); z-index: 100; cursor: grabbing; }
.card img { width: 100%; border-radius: 4px; display: block; }
.card .text { outline: none; min-height: 20px; white-space: pre-wrap; word-break: break-word; }
.card .text:focus { background: rgba(255,255,255,0.05); border-radius: 4px; padding: 4px; }
.card .text:empty::before { content: '텍스트 입력...'; color: #555; }
.card-actions { position: absolute; top: 4px; right: 4px; display: none; gap: 4px; }
.card:hover .card-actions { display: flex; }
.card-btn { background: #333; border: 1px solid #555; color: #ccc; border-radius: 4px; padding: 2px 6px; font-size: 11px; cursor: pointer; }
.card-btn:hover { background: #444; color: #fff; }
.resize-handle { position: absolute; bottom: 0; right: 0; width: 16px; height: 16px; cursor: se-resize; opacity: 0; }
.card:hover .resize-handle { opacity: 0.6; }
.resize-handle::after { content: ''; position: absolute; bottom: 3px; right: 3px; width: 8px; height: 8px; border-right: 2px solid #666; border-bottom: 2px solid #666; }
.card.selected { box-shadow: 0 0 0 2px #58a6ff; z-index: 5; }
.highlight-red { color: #ff6b6b; }
.highlight-blue { color: #6cb0f6; }
.highlight-gold { color: #f0c040; }
.toolbar { position: fixed; bottom: 0; left: 0; right: 0; background: #161b22; border-top: 1px solid #30363d; padding: 8px 20px; display: flex; gap: 12px; align-items: center; z-index: 200; }
.toolbar button { background: #21262d; border: 1px solid #30363d; color: #e0e0e0; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; }
.toolbar button:hover { background: #30363d; }
.toolbar .status { color: #8b949e; font-size: 12px; margin-left: auto; }
#format-toolbar { position: fixed; display: none; background: #1c2128; border: 1px solid #444c56; border-radius: 8px; padding: 4px 6px; gap: 2px; align-items: center; z-index: 500; box-shadow: 0 4px 16px rgba(0,0,0,0.5); }
#format-toolbar button { background: none; border: none; color: #cdd9e5; padding: 4px 8px; border-radius: 5px; cursor: pointer; font-size: 13px; line-height: 1; }
#format-toolbar button:hover { background: #373e47; }
#format-toolbar .sep { width: 1px; height: 16px; background: #444c56; margin: 0 2px; }
</style>
</head>
<body>
<div class="title-bar" contenteditable="true">회계정보시스템</div>
<div class="date">2023년 9월 23일 토요일</div>
<div class="board" id="board"></div>
<div id="format-toolbar">
  <button onmousedown="e=>e.preventDefault()" onclick="fmt('bold')" title="굵게"><b>B</b></button>
  <button onclick="fmt('italic')" title="기울임"><i>I</i></button>
  <button onclick="fmt('underline')" title="밑줄"><u>U</u></button>
  <div class="sep"></div>
  <button onclick="fmtLink()" title="링크 삽입">🔗</button>
  <button onclick="fmt('unlink')" title="링크 제거">✂</button>
</div>
<div class="toolbar">
  <button onclick="undo()" title="Ctrl+Z">↩ 실행취소</button>
  <button onclick="addTextCard()">+ 텍스트</button>
  <button onclick="addImageCard()">+ 이미지</button>
  <button onclick="addImageUrl()">+ 이미지 URL</button>
  <button onclick="addTableCard()">+ 표</button>
  <button onclick="saveBoard()">💾 저장</button>
  <button onclick="exportBoard()">📤 내보내기</button>
  <button onclick="resetLayout()">↺ 재배치</button>
  <button onclick="resetToDefaults()" style="color:#f85149">↺ 초기화</button>
  <div style="display:flex;align-items:center;gap:4px;margin-left:8px;border-left:1px solid #30363d;padding-left:12px;">
    <button onclick="zoomOut()" title="Ctrl+-" style="padding:6px 10px;">−</button>
    <span id="zoom-level" style="font-size:12px;color:#8b949e;min-width:36px;text-align:center;">100%</span>
    <button onclick="zoomIn()" title="Ctrl+=" style="padding:6px 10px;">+</button>
  </div>
  <span class="status" id="status">Ready</span>
</div>
<script>
const SAVE_KEY = 'board-회계정보시스템';
const IMG_BASE = '../../attachments/';
const DEFAULT_CARDS = [
  {
    "type": "html",
    "x": 48,
    "y": 115,
    "w": 720,
    "html": "\r\n\t\t\t<ul>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:7.5pt\"><span style=\"font-family:나눔고딕;font-size:15pt;color:#989795;font-weight:bold\">One reason why AISs fail is because:</span></p>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">1</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">They are not computerized</span></li>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">2</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">They try to process non-accounting data</span></li>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">3</a><span style=\"font-family:나눔고딕;font-size:13.5pt;font-weight:bold\">They are incompatible with the existing processing procedures</span></li>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">4</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">They cannot produce good information from bad data</span></li>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:나눔고딕;font-size:24.5pt;color:#a44b4a;font-weight:bold\">3.</span><span style=\"font-family:나눔고딕;font-size:12.5pt;color:#979796;font-weight:bold\">&#160;They are incompatible with the existing processing procedures</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">[해설]</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">① 회계정보시스템은 manual또는 computerized 되어 구축된다. 회계정보시스템이 manual 또는 computerized와 회계정보시스템의 실패와는 직접적인 관계는 없다.</span></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">② 비회계적인 정보를 다룰 수 있다는 것은 회계정보시스템의 구축의 장점이 된다.</span></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">③ 회계정보시스템이 실제 정보의 흐름 또는 절차와 상이하다면 회계정보시스템은 정보시스템으로서의 기능을 수행하지 못한다는 의미이다.</span></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">④ 자료로부터 정보를 생성하여 전달하는 것이 회계정보시스템이다.</span></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:7.5pt\"><span style=\"font-family:나눔고딕;font-size:15pt;color:#989795;font-weight:bold\">What has been the effect on accountants in those organizations which have computerized their data processing functions?</span></p>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">1</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">The accountants have become &quot;pure&quot; bookkeepers</span></li>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">2</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">The accountants&#39; decision-making activities have drastically declined</span></li>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">3</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">The accountants have become involved in more decision-making activities</span></li>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">4</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">The need for accountants has disappeared</span></li>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:나눔고딕;font-size:24.5pt;color:#a44b4a;font-weight:bold\">3.</span><span style=\"font-family:나눔고딕;font-size:12.5pt;color:#979796;font-weight:bold\">&#160;The accountants have become involved in more decision-making activities</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">[해설]</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">정보시스템의 발달은 경영자의 의사결정과정에 비용과 시간을 절감할 뿐만 아니라 전략적 의사결정에도 기여하고 있다.</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">컴퓨터시스템은 매우 효율적이고 유용한 도구이긴 하지만 단점도 있다.</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">Computer system의 단점 및 주의해야 할 사항을 나열하시오.</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">&lt;컴퓨터시스템의 단점과 고려해야 할 사항&gt;</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">(1) 많은 양의 정보를 빨리 생산함으로써 별로 중요하지 않은 정보까지도 많이 만들어낸다.</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">→ 정보과다 (information overloaded).</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">(2) 컴퓨터시스템은 사람과는 달리 인지능력에 한계가 있다. 즉, 단순한 입력실수도 옳게 한 것인지 아닌지를 판단할 능력이 없다.</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">(3) 컴퓨터시스템은 감사증적을 알아볼 수 없는 상태로 만들거나 더욱 복잡하게 만들어 버릴 수도 있다.</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">(4) 많은 양의 데이터와 정보를 수집하고 제공하는 것과 더불어 미래에 사용하기 위해서는 데이터를 체계적으로 분류하여 저장하는 역할도 필요하다.</span></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:7.5pt\"><span style=\"font-family:나눔고딕;font-size:15pt;color:#989795;font-weight:bold\">Which one of the following statements about an accounting information system (AIS) is incorrect?</span></p>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">1</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">An AIS supports day-to-day operations by collecting and sorting data about an organization&#39;s transactions.</span></li>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">2</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">The information produced by AIS is made available to all levels of management for use in planning and controlling an organization&#39;s activities.</span></li>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">3</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">An AIS is best suited to solve problems where there is great uncertainty and ill-defined reporting requirements.</span></li>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">4</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">An AIS is often referred to as a transaction processing system.</span></li>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:나눔고딕;font-size:24.5pt;color:#a44b4a;font-weight:bold\">3.</span><span style=\"font-family:나눔고딕;font-size:12.5pt;color:#979796;font-weight:bold\">&#160;An AIS is best suited to solve problems where there is great uncertainty and ill-defined reporting requirements.</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">[해설]</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">③ is correct. An AIS is best suited to solve problems where there is great certainty and clearly defined reporting requirements. Choices ①, ②, ④ are incorrect. All are correct statements regarding an AIS.</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:7.5pt\"><span style=\"font-family:나눔고딕;font-size:15pt;color:#989795;font-weight:bold\">An Accounting Information System (AIS) is distinguished from a Management Information System (MIS) by the fact that:</span></p>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">1</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">An AIS deals with financial information while a MIS handles all other information.</span></li>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">2</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">An AIS is a subsystem within a MIS.</span></li>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">3</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">An AIS is control-oriented while a MIS is used exclusively for planning.</span></li>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">4</a><span style=\"font-family:나눔고딕;font-size:13.5pt;font-weight:bold\">Information produced by an AIS is used only by financial people while information produced by a MIS is used throughout the organization.</span></li>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:나눔고딕;font-size:24.5pt;color:#a44b4a;font-weight:bold\">2.</span><span style=\"font-family:나눔고딕;font-size:12.5pt;color:#979796;font-weight:bold\">&#160;An AIS is a subsystem within a MIS.</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">[해설]</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">②is correct. An accounting information system is a subsystem within a management information system. ① is incorrect. An AIS deals with accounting transactions. It is a part of an MIS. ③ is incorrect. An AIS is not control-oriented, and a MIS is not exclusively used for planning. ④ is incorrect. AIS information is not used only by financial people.</span></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">Statement 2~3 reasons that computer technology is important to accountants.</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">1. 회계업무가 컴퓨터환경하에서 이루어지고 있다. 그러므로 컴퓨터의 기능과 한계점에 대한 지식을 지니고 있어야 한다.</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">2. 고객의 hardware, software를 사용한 의사결정에 도움을 줄 수 있어야 한다.</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">3. 전산환경하의 회계감사가 행해지는 경우 정보시스템에 대한 개념을 이해하고 있어야 한다.</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">4. 기존 회계시스템를 변경한 뒤 회계시스템변경에 대한 평가를 위한 회의에 참석하여 의견을 제시하여야 한다.</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">5. 새로운 회계시스템구축을 위한 조언을 해주어야 한다.</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">6. 회계정보시스템의 통제가 정확성, 적시성, 완전성에 충실한지에 대한 평가를 해야한다.</span></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:7.5pt\"><span style=\"font-family:나눔고딕;font-size:15pt;color:#989795;font-weight:bold\">All of the following are reasons why IT is important to accountants except:</span></p>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">1</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">Accountants often help clients make IT decisions</span></li>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">2</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">Auditors must evaluate computerized systems</span></li>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">3</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">IT questions appear on certification exams</span></li>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">4</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">The costs of IT are skyrocketing</span></li>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:나눔고딕;font-size:24.5pt;color:#979796;font-weight:bold\">:&#160;</span><span style=\"font-family:나눔고딕;font-size:24.5pt;color:#a44b4a;font-weight:bold\">4.</span><span style=\"font-family:나눔고딕;font-size:12.5pt;color:#979796;font-weight:bold\">&#160;The costs of IT are skyrocketing</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">[해설]</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">④ 전산비용이 높은 것과 전산시스템과 accountant와의 관계와는 무관하다.</span></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:7.5pt\"><span style=\"font-family:나눔고딕;font-size:15pt;color:#989795;font-weight:bold\">Hardware와 그 기능이 옳게 연결되지 않은 것은?</span></p>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">1</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">CRT screen - output</span></li>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">2</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">POS terminal - output</span></li>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">3</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">keyboard - input</span></li>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">4</a><span style=\"font-family:나눔고딕;font-size:13.5pt;font-weight:bold\">OCR reader - input</span></li>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:나눔고딕;font-size:24.5pt;color:#a44b4a;font-weight:bold\">2.</span><span style=\"font-family:나눔고딕;font-size:12.5pt;color:#979796;font-weight:bold\">&#160;POS terminal - output</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">[해설]</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">POS terminal은 input장치이다.</span></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">다음 설명을 잘 읽고 관련있는 Network를 선택하라.</span></p>\r\n\t\t\t\t<div style=\"display:inline-block;width:480px;height:142px;background:#2d333b;border-radius:4px;margin:2px;vertical-align:top;opacity:0.4\"></div>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">1. Point to Point Network</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">2. Star Network</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">3. Tree Network</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">4. Bus Network</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">5. Ring Networkl</span></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:7.5pt\"><span style=\"font-family:나눔고딕;font-size:15pt;color:#989795;font-weight:bold\">Which of the following is not advantage of a client/server system?</span></p>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">1</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">Flexibility of distributing resources and processing capabilities.</span></li>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">2</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">Reduction in telecommunication costs because of workstation can process.</span></li>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">3</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">Ability to install thin client system (without hard drives)</span></li>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">4</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">Increased need for training</span></li>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:나눔고딕;font-size:24.5pt;color:#a44b4a;font-weight:bold\">4.</span><span style=\"font-family:나눔고딕;font-size:12.5pt;color:#979796;font-weight:bold\">&#160;Increased need for training</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">[해설]</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">Training은 client/server system의 단점이다.</span></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:7.5pt\"><span style=\"font-family:나눔고딕;font-size:15pt;color:#989795;font-weight:bold\">Which of the following is not an example of a communication channel?</span></p>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">1</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">Twisted-Pair wire</span></li>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">2</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">Coaxial Cables</span></li>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">3</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">Optical Fibers</span></li>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">4</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">Modem</span></li>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:나눔고딕;font-size:24.5pt;color:#a44b4a;font-weight:bold\">4.</span><span style=\"font-family:나눔고딕;font-size:12.5pt;color:#979796;font-weight:bold\">&#160;Modem</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">[해설]</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">Modem(Modulator-Demodulator) : Converting digital signals from terminals and CPU into analog signals for transmission across data line</span></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">다음 설명을 잘 읽고 해당되는 software( Macro, Java, Debugging, GUI, System software ) 를 입력해보세요.</span></p>\r\n\t\t\t\t<div style=\"display:inline-block;width:480px;height:200px;background:#2d333b;border-radius:4px;margin:2px;vertical-align:top;opacity:0.4\"></div>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">1. Macro</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">2. Java</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">3. Debugging</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">4. GUI</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">5. System Software</span></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:7.5pt\"><span style=\"font-family:나눔고딕;font-size:15pt;color:#989795;font-weight:bold\">Software that enables businesses and government agencies to transmit and manipulate financial data on an organization-wide basis best describes:</span></p>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">1</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">Communication software</span></li>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">2</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">CAD software</span></li>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">3</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">Enterprise resource planning (ERP) software</span></li>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">4</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">Programming software</span></li>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:나눔고딕;font-size:24.5pt;color:#a44b4a;font-weight:bold\">3.</span><span style=\"font-family:나눔고딕;font-size:12.5pt;color:#979796;font-weight:bold\">&#160;Enterprise resource planning (ERP) software</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">[해설]</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">ERP는 전사적 자원관리로서 ERP package를 사용하여 재무정보의 전달과 가공을 가능케한다.</span></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:7.5pt\"><span style=\"font-family:나눔고딕;font-size:15pt;color:#989795;font-weight:bold\">Menus, icons, and other graphical elements are an example of which of the following?</span></p>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">1</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">Utility programs</span></li>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">2</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">Personal productivity software</span></li>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">3</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">Virtual Storage</span></li>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">4</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">Graphical user interface (GUI)</span></li>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:나눔고딕;font-size:24.5pt;color:#a44b4a;font-weight:bold\">4.</span><span style=\"font-family:나눔고딕;font-size:12.5pt;color:#979796;font-weight:bold\">&#160;Graphical user interface (GUI)</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">[해설]</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">GUI는 그래픽을 사용하여 파일이나 프로그램을 표시하는 방법이다.</span></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">음 simbol 를 보고 올바른 내용을 선택하라.</span></p>\r\n\t\t\t\t<div style=\"display:inline-block;width:480px;height:200px;background:#2d333b;border-radius:4px;margin:2px;vertical-align:top;opacity:0.4\"></div>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">1. Document</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">2. Computing Operation</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">3. Manual Operation</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">4. Decision</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">5. Input/Output</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">6. On Page Connector</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">7. Off Page Connector</span></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:7.5pt\"><span style=\"font-family:나눔고딕;font-size:15pt;color:#989795;font-weight:bold\">The basic symbols used in data flow diagrams are:</span></p>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">1</a><span style=\"font-family:나눔고딕;font-size:13.5pt;font-weight:bold\">A circle, square, diamond, and rectangle</span></li>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">2</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">A triangle, circle, square, and open?ended rectangle</span></li>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">3</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">An open - ended rectangle, line and arrow, diamond, and square</span></li>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">4</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">An open - ended rectangle, line and arrow, circle, and square</span></li>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:나눔고딕;font-size:24.5pt;color:#a44b4a;font-weight:bold\">4.</span><span style=\"font-family:나눔고딕;font-size:12.5pt;color:#979796;font-weight:bold\">&#160;An open - ended rectangle, line and arrow, circle, and square</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">[해설]</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">기본적으로 사용되는 simbol은 open-ended rectangle, line and arrow, circle, and square 이다.</span></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:7.5pt\"><span style=\"font-family:나눔고딕;font-size:15pt;color:#989795;font-weight:bold\">Which of the following symbols represents the standard systems flowcharting symbol for an input/output process?</span></p>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">1</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">&#160;&#160;&#160;&#160;&#160;</span></li>\r\n\t\t\t\t<a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\">\t\t\t\t\t<div style=\"display:inline-block;width:104px;height:43px;background:#2d333b;border-radius:4px;margin:2px;vertical-align:top;opacity:0.4\"></div>\t\t\t\t</a>\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">2</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">&#160;&#160;&#160;&#160;&#160;</span></li>\r\n\t\t\t\t<a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\">\t\t\t\t\t<div style=\"display:inline-block;width:104px;height:36px;background:#2d333b;border-radius:4px;margin:2px;vertical-align:top;opacity:0.4\"></div>\t\t\t\t</a>\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">3</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">&#160;&#160;&#160;&#160;&#160;</span></li>\r\n\t\t\t\t<a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\">\t\t\t\t\t<div style=\"display:inline-block;width:104px;height:43px;background:#2d333b;border-radius:4px;margin:2px;vertical-align:top;opacity:0.4\"></div>\t\t\t\t</a>\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">4</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">&#160;&#160;&#160;&#160;&#160;</span></li>\r\n\t\t\t\t<a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\">\t\t\t\t\t<div style=\"display:inline-block;width:104px;height:36px;background:#2d333b;border-radius:4px;margin:2px;vertical-align:top;opacity:0.4\"></div>\t\t\t\t</a>\t\t\t\t<br />\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:나눔고딕;font-size:24.5pt;color:#a44b4a;font-weight:bold\">3.</span><span style=\"font-family:나눔고딕;font-size:12.5pt;color:#979796;font-weight:bold\">&#160;&#160;&#160;&#160;&#160;&#160;</span></p>\r\n\t\t\t\t<img width=\"104\" height=\"43\" src=\"__ATTACHMENT__4ba584de57.png\" data-src-type=\"image/png\" data-fullres-src=\"__ATTACHMENT__4ba584de57.png\" data-fullres-src-type=\"image/png\" />\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">[해설]</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">① 문서화 ② 처리 ④ 수동처리</span></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">데이터를 수집하고 문서화하는 과정에서 회계정보의 진위여부(authenticity)에 대해서accountant가 고려할 사항을 3~4개 언급하시오.</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">Establishing an audit trail,</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">- Testing for authorization of cash disbursement checks</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">- Testing for inventory disbursements, and Establishing accountability for the collection or distribution of money.</span></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:7.5pt\"><span style=\"font-family:나눔고딕;font-size:15pt;color:#989795;font-weight:bold\">Which of the following is not one of the trial balances typically produced as part of the financial accounting cycle?</span></p>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">1</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">Closing trial balance</span></li>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">2</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">Unadjusted trial balance</span></li>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">3</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">Adjusted trial balance</span></li>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">4</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">Adjusted trial balance</span></li>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:나눔고딕;font-size:24.5pt;color:#a44b4a;font-weight:bold\">1.</span><span style=\"font-family:나눔고딕;font-size:12.5pt;color:#979796;font-weight:bold\">&#160;Closing trial balance</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">[해설]</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">Trial balance는 unadjusted trial balance, adjusted trial balance, post-closing trial balance</span></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:7.5pt\"><span style=\"font-family:나눔고딕;font-size:15pt;color:#989795;font-weight:bold\">Which of the following statements best describes a business process?</span></p>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">1</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">It is a collection of activities in an organization that creates value</span></li>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">2</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">The nature and type of processes might vary from industry to industry</span></li>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">3</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">It is an activity that increases and/or decreases dollar amounts on the financial statements</span></li>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">4</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">It is an economic event in the life of an organization</span></li>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:나눔고딕;font-size:24.5pt;color:#a44b4a;font-weight:bold\">1.</span><span style=\"font-family:나눔고딕;font-size:12.5pt;color:#979796;font-weight:bold\">&#160;It is a collection of activities in an organization that creates value</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">[해설]</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">다른 설명도 옿은 것이지만 BP에 대한 정확한 설명을 기술하고 있는 문장은 ①입니다.</span></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">구매프로세스와 판매프로세스의 목적을 각각 3가지를 제시하라.</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">Sales Process</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">- Filling Cusotmer&#39;s orders</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">- Tracking sales to customers</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">- Billing customer</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">- Collecting payment</span></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">Purchasing Process</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">- Track purchase from vendors</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">- Maintaining vendor&#39;s record</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">- Inventory controll</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">- Timely and accurate vendor payment</span></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:7.5pt\"><span style=\"font-family:나눔고딕;font-size:15pt;color:#989795;font-weight:bold\">Which of the following is not an objective of the purchasing process?</span></p>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">1</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">Inventory control</span></li>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">2</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">Fastest possible processing of payments to vendors</span></li>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">3</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">Maintaining vendor records</span></li>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">4</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">Forecasting cash outflows</span></li>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:나눔고딕;font-size:24.5pt;color:#a44b4a;font-weight:bold\">2.</span><span style=\"font-family:나눔고딕;font-size:12.5pt;color:#979796;font-weight:bold\">&#160;Fastest possible processing of payments to vendors</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">[해설]</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">대금지급은 가급적 늦게 해주는 것이 좋다. 정보시스템이 구축되어 있는 경우에는 정보시스템이 구축되어 있지 않을 때보다 자금의 활용을 더 유용하게 할 수 있다. 즉 대금지급이전까지 대금의 활용도를 높일 수 있다.</span></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:7.5pt\"><span style=\"font-family:나눔고딕;font-size:15pt;color:#989795;font-weight:bold\">Which of the following is not an objective of the sales process?</span></p>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">1</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">Controlling inventory</span></li>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">2</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">Tracking sales of goods and/or services to customers</span></li>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">3</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">Billing for goods and services</span></li>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">4</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">Forecasting sales and cash receipts</span></li>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:나눔고딕;font-size:24.5pt;color:#a44b4a;font-weight:bold\">1.</span><span style=\"font-family:나눔고딕;font-size:12.5pt;color:#979796;font-weight:bold\">&#160;Controlling inventory</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">[해설]</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">재고의 통제는 주로 구매프로세스와 관련이 깊다. 판매이후시점부터가 판매프로세스의 영역이다.</span></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">Production process의 목적을 3가지이상 열거하라.</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">Track purchases and sales of inventories</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">- Monitor and control manufacturing costs</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">- Control and coordinate the production process - Control inventory</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">- Provide input for budgets</span></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:7.5pt\"><span style=\"font-family:나눔고딕;font-size:15pt;color:#989795;font-weight:bold\">The primary objective of a manufacturing organization’s production process is to:</span></p>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">1</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">Maintain inventories at a zero level</span></li>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">2</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">Convert raw materials into finished goods as efficiently as possible</span></li>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">3</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">Make sure that there are no product defects</span></li>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">4</a><span style=\"font-family:나눔고딕;font-size:13.5pt;font-weight:bold\">Maintain the documentation and report on an organization’s manufacturing process</span></li>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:나눔고딕;font-size:24.5pt;color:#a44b4a;font-weight:bold\">2.</span><span style=\"font-family:나눔고딕;font-size:12.5pt;color:#979796;font-weight:bold\">&#160;Convert raw materials into finished goods as efficiently as possible</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">[해설]</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">제조부문의 생산프로세스의 목적은 원재료로부터 제품의 생산까지 효율적으로 이뤄지도록 하는 것이다.</span></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:7.5pt\"><span style=\"font-family:나눔고딕;font-size:15pt;color:#989795;font-weight:bold\">All of the following are input documents for the production process, except:</span></p>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">1</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">A master production schedule</span></li>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">2</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">A production order</span></li>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">3</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">A material requirements planning document</span></li>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">4</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">A bill of materials</span></li>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:나눔고딕;font-size:24.5pt;color:#a44b4a;font-weight:bold\">3.</span><span style=\"font-family:나눔고딕;font-size:12.5pt;color:#979796;font-weight:bold\">&#160;A material requirements planning document</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">[해설]</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">원재료의 수요계획를 세웠놓으면 좋지만 필수사항은 아니다.</span></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">자금프로세스의 목적에 대해서 서술하라.</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">1. Effective cash management</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">making use of lockbox systems and electronic funds transfer(EFT).</span></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">2. Minimizing cost of capital</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">reducing the cost of obtaining financial resources</span></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">3. Maximizing return on investments</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">using financial planning models</span></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">4. Project cash flows</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">Consists of a cash receipts forecast and a cash</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">disbursements forecast.</span></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:7.5pt\"><span style=\"font-family:나눔고딕;font-size:15pt;color:#989795;font-weight:bold\">Which of the following is not a concern of the financing process?</span></p>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">1</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">Effective cash management</span></li>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">2</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">Optimizing an organization’s cost of capital</span></li>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">3</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">Minimizing an organization’s borrowing</span></li>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">4</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">Projecting cash flows</span></li>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:나눔고딕;font-size:24.5pt;color:#a44b4a;font-weight:bold\">3.</span><span style=\"font-family:나눔고딕;font-size:12.5pt;color:#979796;font-weight:bold\">&#160;Minimizing an organization’s borrowing</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">[해설]</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">자금을 빌리는 것을 최소하는 것이 목표가 될 수는 없다. 적정한 자금을 조달받아 효율적으로 활용하는 것도 자금관리의 일부분이다.</span></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:7.5pt\"><span style=\"font-family:나눔고딕;font-size:15pt;color:#989795;font-weight:bold\">Inputs to the financing process include</span></p>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">1</a><span style=\"font-family:나눔고딕;font-size:13.5pt;font-weight:bold\">Remittance advices, deposit slips, checks, and stock market data</span></li>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">2</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">Remittance advices, deposit slips, checks, and receiving reports</span></li>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">3</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">Deposit slips, checks, receiving reports, and purchase requisitions</span></li>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">4</a><span style=\"font-family:나눔고딕;font-size:13.5pt;font-weight:bold\">Deposit slips, checks, purchase requisitions, and financial institution profiles</span></li>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:나눔고딕;font-size:24.5pt;color:#a44b4a;font-weight:bold\">1.</span><span style=\"font-family:나눔고딕;font-size:12.5pt;color:#979796;font-weight:bold\">&#160;Remittance advices, deposit slips, checks, and stock market data</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">[해설]</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">자금조달과 관련하여 정보시스템에 입력되는 정보는 Remittance Advices, Deposit Slips, Checks, Bank Statements, Stock Market Data, Interest Data, Financial Institution Profiles등이다.</span></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">Enterprise system을 구축하였을 경우 예상되는 비용과 효익의 예를 각각 3개씩 서술하라.</span></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">Cost</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">Hardware and Software</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">Training- Technical, Business processes</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">Data conversion</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">Interfaces and customization</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">Professional services</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">Reassigned employees</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">Software maintenance and upgrades</span></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">Benefit</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">Reduction in inventory investment</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">Improvement in asset management</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">Improved decision-making</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">Resolution of data redundancy and integrity problems</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">Increase in flexibility and responsiveness</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">Improved customer service and satisfaction</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">Global and supply chain integration</span></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:7.5pt\"><span style=\"font-family:나눔고딕;font-size:15pt;color:#989795;font-weight:bold\">Which of the following software packages is not an example of a middle-range AIS?</span></p>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">1</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">Great Plains Dynamics</span></li>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">2</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">MAS 90</span></li>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">3</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">SAP R/3</span></li>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">4</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">Solomon</span></li>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:나눔고딕;font-size:24.5pt;color:#a44b4a;font-weight:bold\">.</span><span style=\"font-family:나눔고딕;font-size:12.5pt;color:#979796;font-weight:bold\">&#160;SAP R/3</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">[해설]</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">SAP R/3는 Enterprise-Wide Accounting Software Solutions에 해당한다.</span></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:7.5pt\"><span style=\"font-family:나눔고딕;font-size:15pt;color:#989795;font-weight:bold\">Which of the following is not an important feature of an enterprise system?</span></p>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">1</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">Multiple databases</span></li>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">2</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">Centralized database</span></li>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">3</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">Functional integration</span></li>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">4</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">Back-office functionality</span></li>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:나눔고딕;font-size:24.5pt;color:#979796;font-weight:bold\">정답 :&#160;</span><span style=\"font-family:나눔고딕;font-size:24.5pt;color:#a44b4a;font-weight:bold\">1.</span><span style=\"font-family:나눔고딕;font-size:12.5pt;color:#979796;font-weight:bold\">&#160;Multiple databases</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">[해설]</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">1개의 database를 운영하며 다음과 같은 특징을 갖는다.</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">- stores information about each data item just once</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">- makes it immediately available to all the various functions</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:22.5pt;margin-bottom:7.5pt\"><span style=\"font-family:나눔고딕;font-size:12.5pt;color:#999693;font-weight:bold\">다음은 Business information system의 종류에 대한 내용이다. 적절한 information system을 선택하라.&#160;</span></p>\r\n\t\t\t\t<div style=\"display:inline-block;width:480px;height:135px;background:#2d333b;border-radius:4px;margin:2px;vertical-align:top;opacity:0.4\"></div>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">1.EIS</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">2.TPS</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">3.DDS</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">4.MIS</span></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:7.5pt\"><span style=\"font-family:나눔고딕;font-size:15pt;color:#989795;font-weight:bold\">In business information systems, the term “stakeholder” refers to which of the following parites?</span></p>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">1</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">The management team responsible for the security of the documents and data stored on the computers or networks</span></li>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">2</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">Information technology personnel responsible for creating the documents and data stored on the computers or networks</span></li>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">3</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">Authorized users who are granted access rights to the documents and data stored on the computers or networks</span></li>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">4</a><span style=\"font-family:나눔고딕;font-size:13.5pt;font-weight:bold\">Anyone in the organization who has a role in creating or using the documents and data stored on the computers or networks</span></li>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:나눔고딕;font-size:24.5pt;color:#979796;font-weight:bold\">정답 :&#160;</span><span style=\"font-family:나눔고딕;font-size:24.5pt;color:#a44b4a;font-weight:bold\">4.</span><span style=\"font-family:나눔고딕;font-size:12.5pt;color:#979796;font-weight:bold\">&#160;Anyone in the organization who has a role in creating or using the documents and data stored on the computers or networks</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">[해설]</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">In business information systems, the term “stakehoder” could refer to anyone in the organization who has a role in creating or using data stored on the computers or networks</span></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:7.5pt\"><span style=\"font-family:나눔고딕;font-size:15pt;color:#989795;font-weight:bold\">Which one of the following is often described as a transaction processing system?</span></p>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">1</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">Executive information system.</span></li>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">2</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">Accounting information system.</span></li>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">3</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">Decision support system.</span></li>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">4</a><span style=\"font-family:나눔고딕;font-size:13.5pt;font-weight:bold\">Expert system.</span></li>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:나눔고딕;font-size:24.5pt;color:#a44b4a;font-weight:bold\">2.</span><span style=\"font-family:나눔고딕;font-size:12.5pt;color:#979796;font-weight:bold\">&#160;Accounting information system.</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">[해설]</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">거래처리시스템은 종종 회계정보시스템이라 불린다.</span></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">EDI(Electronic Data Interchange)의 의미와 특징에 대해서 설명하라.</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">(1) 정의 : Electronic data interface(EDI) is the electronic transfer of business transaction information between organizations in a standard format</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">(2) 특징 :</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">1) Reducing handling costs &amp; Increased processing speed</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">- EDI reduces handling costs &amp; speeds transaction processing compared to traditional paper-based processing.</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">- Because EDI speeds transaction processing , the business cycle is generally shortened &amp; year-end receivable and payable balances may be reduced</span></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">2) Standard data format</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">- EDI requires that all transactions be submitted in a standard data format</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">- Translation software is required to convert transaction data from internal company data format to EDI format &amp; vice versa</span></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">3) Direct Links</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">- EDI can be implemented using direct links between the trading partners through communication networks</span></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:7.5pt\"><span style=\"font-family:나눔고딕;font-size:15pt;color:#989795;font-weight:bold\">All of the following are examples of EDI “documents” except:</span></p>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">1</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">Purchase orders</span></li>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">2</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">Sales invoices</span></li>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">3</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">Customs documents</span></li>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">4</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">Payroll checks</span></li>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:나눔고딕;font-size:24.5pt;color:#979796;font-weight:bold\">정답 :&#160;</span><span style=\"font-family:나눔고딕;font-size:24.5pt;color:#a44b4a;font-weig
