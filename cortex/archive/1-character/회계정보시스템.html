ht:bold\">4.</span><span style=\"font-family:나눔고딕;font-size:12.5pt;color:#979796;font-weight:bold\">&#160;Payroll checks</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">[해설]</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">전자문서에 해당되지 않는 것을 찾는 문제이다. 종업원에게 지급하는 수표는 실물이며 전자문서가 아니다.</span></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:7.5pt\"><span style=\"font-family:나눔고딕;font-size:15pt;color:#989795;font-weight:bold\">All of the following are benefits of XBRL except:</span></p>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">1</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">Companies can file financial information in one format, avoiding the errors that may come from reentering data multiple times</span></li>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">2</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">The SEC accepts XBRL-format for electronic filing of financial statement reports</span></li>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">3</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">XBRL permits the automatic and reliable exchange of financial information across all software formats and technologies, including the Internet</span></li>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">4</a><span style=\"font-family:나눔고딕;font-size:13.5pt;font-weight:bold\">All of the above are benefits of XBRL</span></li>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:나눔고딕;font-size:24.5pt;color:#979796;font-weight:bold\">정답 :&#160;</span><span style=\"font-family:나눔고딕;font-size:24.5pt;color:#a44b4a;font-weight:bold\">4.</span><span style=\"font-family:나눔고딕;font-size:12.5pt;color:#979796;font-weight:bold\">&#160;All of the above are benefits of XBRL</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">[해설]</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">XBRL의 benefit에 대한 설명이다.</span></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">정보보안관리의 4단계를 언급하고 정보보안위협(information security threat)에 해당되는 예를 5가지 이상 언급하라.</span></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">1. 정보보안관리단계</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">위협의 파악 → 위험의 정의 → 정보 보안 정책 수립 → 위험관리 통제</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">2. Unauthorized theft, use, access, modification, copying, or destruction of software or data. Theft of money by altering computer records or the theft of computer time. Intent to illegally obtain information or tangible Property through the use of computers. Use or the conspiracy to use computer resources to commit a felony. Theft, vandalism, destruction of computer hardware. Trafficking in passwords or other login information for accessing a computer. Extortion that uses a computer system as a target.</span></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:7.5pt\"><span style=\"font-family:나눔고딕;font-size:15pt;color:#989795;font-weight:bold\">A computer virus is</span></p>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">1</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">A disease that computer programmers are very susceptible to</span></li>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">2</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">A small processing routine that the user accidentally introduces into the system</span></li>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">3</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">A misnomer, since unlike biological viruses, computer viruses cannot reproduce themselves</span></li>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">4</a><span style=\"font-family:나눔고딕;font-size:13.5pt;font-weight:bold\">Harmless</span></li>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:나눔고딕;font-size:24.5pt;color:#a44b4a;font-weight:bold\">2.</span><span style=\"font-family:나눔고딕;font-size:12.5pt;color:#979796;font-weight:bold\">&#160;A small processing routine that the user accidentally introduces into the system</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">[해설]</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">A Virus is a program code that copies itself from file to file. The virus may destroy data or programs</span></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:7.5pt\"><span style=\"font-family:나눔고딕;font-size:15pt;color:#989795;font-weight:bold\">Which of the following is NOT a major category of fraud that is identified in the Computer Fraud and Abuse Act of 1986?</span></p>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">1</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">Theft of money by altering computer records</span></li>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">2</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">Intent to illegally obtain information using a computer</span></li>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">3</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">Money laundering</span></li>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">4</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">Using computer resources to commit a felony</span></li>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:나눔고딕;font-size:24.5pt;color:#979796;font-weight:bold\">답 :&#160;</span><span style=\"font-family:나눔고딕;font-size:24.5pt;color:#a44b4a;font-weight:bold\">3.</span><span style=\"font-family:나눔고딕;font-size:12.5pt;color:#979796;font-weight:bold\">&#160;Money laundering</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">[해설]</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">컴퓨터범죄와 관련된 범죄를 규정하고 있다.</span></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">다음은 COSO Report의 내용을 참조하여 분류한 내부통제의 구성요소이다. 각 구성요소들의 세부내용을 기술하시오.</span></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">(1) Control Environment</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">(2) Risk Assessment</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">(3) Control Activities</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">(4) Information and Communication</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">(5) Monitoring</span></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">(1) Control Environment :establishes the tone of a company and influences the control awareness of the employees. Factors included within the control environment are :</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">ㆍIntegrity, ethical values and competence of employees</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">ㆍManagement philosophy and operating style</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">ㆍAssignment of authority and responsibility</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">ㆍThe attention and direction provided by the board of directors</span></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">(2) Risk assessment involves</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">ㆍrecognition that every organization faces risks to its success</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">ㆍrecognition that the sources are internal and external</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">ㆍIdentification, analysis and action to achieve the company’s goals</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">ㆍuse of cost-benefit analysis</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">(3) Control activities :</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">ㆍAre the policies and procedures that ensure management directives are carried out, and protection of the assets of the firm</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">ㆍinclude a combination of manual controls and automated controls.</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">ㆍCan be categorized as approvals, authorizations, verifications, reconciliations, reviews of operating performance, segregation of duties</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">(4) Information and Communication</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">ㆍManagement’s responsibility to make sure the accounting system, collects, measures, processes, communicates to individuals inside and outside the firm</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">ㆍCommunication helps personnel understand their roles and responsibilities to internal control by the use of policies and procedures manuals, training sessions for new employees, refreshers training for continuing employees</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">(5) Monitoring</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">ㆍis the process that assesses the quality of internal control performance over time</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">ㆍinvolves evaluating the design and operation of controls on a timely basis</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">ㆍinitiating corrective action when specific controls are not functioning properly.</span></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:7.5pt\"><span style=\"font-family:나눔고딕;font-size:15pt;color:#989795;font-weight:bold\">The control environment is a component of a company&#39;s Internal control system that :</span></p>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">1</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">Influences the control awareness of a company&#39;s employees</span></li>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">2</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">Stresses the development of control procedures in a company</span></li>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">3</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">Directly affects the accuracy and reliability of a company’s accounting data</span></li>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">4</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">Can be ignored when establishing a company&#39;s internal control system</span></li>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:나눔고딕;font-size:24.5pt;color:#979796;font-weight:bold\">정답 :&#160;</span><span style=\"font-family:나눔고딕;font-size:24.5pt;color:#a44b4a;font-weight:bold\">1.</span><span style=\"font-family:나눔고딕;font-size:12.5pt;color:#979796;font-weight:bold\">&#160;Influences the control awareness of a company&#39;s employees</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">[해설]</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">The control environment Influences the control awareness of a company&#39;s employees</span></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:7.5pt\"><span style=\"font-family:나눔고딕;font-size:15pt;color:#989795;font-weight:bold\">The maintenance of backup copies of a company&#39;s important transaction and master files is an example of a :</span></p>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">1</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">Preventive control procedure</span></li>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">2</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">Detective control procedure</span></li>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">3</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">Corrective control procedure</span></li>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">4</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">Management-by-exception control procedure</span></li>\r\n\t\t\t\t<table style=\"border:1px solid;border-collapse:collapse\">\r\n\t\t\t\t\t<tr>\r\n\t\t\t\t\t\t<td style=\"background-color:white;border:1px solid\"><p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:나눔고딕;font-size:12.5pt;color:#979796\">In each one of the following two questions, you are given a well?recognized procedure of internal control. You are to identify the irregularity that will be discovered or prevented by each procedure.</span></p>\r\n\t\t\t\t\t\t<br />\r\n\t\t\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:나눔고딕;font-size:12.5pt;color:#979796\">(1) The voucher system requires that invoices be compared with receiving reports and express bills before a voucher is prepared and approved for payment.</span></p>\r\n\t\t\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:나눔고딕;font-size:12.5pt;color:#979796\">1. Unrecorded checks appear in the bank statement</span></p>\r\n\t\t\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:나눔고딕;font-size:12.5pt;color:#979796\">2. The treasurer takes funds by preparing a fictitious voucher charging &quot;Miscellaneous General Expenses&quot;</span></p>\r\n\t\t\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:나눔고딕;font-size:12.5pt;color:#979796\">3. An employee in the purchasing department sends through fictitious invoices and receives payment</span></p>\r\n\t\t\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:나눔고딕;font-size:12.5pt;color:#979796\">4. A cash shortage is covered by underfooting outstanding checks on the bank reconciliation</span></p>\r\n\t\t\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:나눔고딕;font-size:12.5pt;color:#979796\">5. A cash shortage is covered by omitting some of the outstanding checks from the bank reconciliation</span></p>\r\n\t\t\t\t\t\t<br />\r\n\t\t\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:나눔고딕;font-size:12.5pt;color:#979796\">(2) Both cash and credit customers are educated to expect a sales ticket. Tickets are serially numbered. All numbers are accounted for daily.</span></p>\r\n\t\t\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:나눔고딕;font-size:12.5pt;color:#979796\">1. Customers complain that their monthly bills contain items that have been paid</span></p>\r\n\t\t\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:나눔고딕;font-size:12.5pt;color:#979796\">2. Some customers have the correct change for the merchandise purchased; they pay and do not wait for a sales ticket</span></p>\r\n\t\t\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:나눔고딕;font-size:12.5pt;color:#979796\">3. Customers complain that they are billed for goods they did not purchase</span></p>\r\n\t\t\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:나눔고딕;font-size:12.5pt;color:#979796\">4. Customers complain that goods ordered are not received</span></p>\r\n\t\t\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:나눔고딕;font-size:12.5pt;color:#979796\">5. Salesclerks destroy duplicate sales tickets for the amount of cash stolen</span></p>\r\n\t\t\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">The voucher system requires that invoices be compared with receiving reports and express bills before a voucher is prepared and approved for payment.</span></p>\r\n\t\t\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">▶ 정답 : 3번 An employee in the purchasing department sends through fictitious invoices and receives payment</span></p>\r\n\t\t\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">(2) Both cash and credit customers are educated to expect a sales ticket. Tickets are serially numbered. All numbers are accounted for daily.</span></p>\r\n\t\t\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">▶ 정답 : 5번 Salesclerks destroy duplicate sales tickets for the amount of cash stolen</span></p>\r\n\t\t\t\t\t\t</td>\r\n\t\t\t\t\t</tr>\r\n\t\t\t\t</table>\r\n\t\t\t\t<br />\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:7.5pt\"><span style=\"font-family:나눔고딕;font-size:15pt;color:#989795;font-weight:bold\">A responsibility that should be assigned to a specific employee and not shared jointly is that of :</span></p>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">1</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">Access to the company&#39;s safe deposit box</span></li>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">2</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">Placing orders and maintaining relationships with a prime supplier</span></li>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">3</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">Attempting to collect a particular delinquent account</span></li>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">4</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">Custodianship of the petty cash fund</span></li>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:나눔고딕;font-size:24.5pt;color:#979796;font-weight:bold\">정답 :&#160;</span><span style=\"font-family:나눔고딕;font-size:24.5pt;color:#a44b4a;font-weight:bold\">4.</span><span style=\"font-family:나눔고딕;font-size:12.5pt;color:#979796;font-weight:bold\">&#160;Custodianship of the petty cash fund</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">[해설]</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">Custodianship of the petty cash fund should not be assigned to employee who in charged to other job.</span></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:7.5pt\"><span style=\"font-family:나눔고딕;font-size:15pt;color:#989795;font-weight:bold\">Regarding the cost-benefit concept, which of the following statements is true?</span></p>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">1</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">Every control procedure that offers benefits to a company should be implemented into the company&#39;s system</span></li>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">2</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">An optimal internal control package is developed for a company&#39;s system by implementing a standardized package of control procedures</span></li>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">3</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">A control procedure is considered cost effective if it can be determined that the cost of operating the procedure will be cheaper in the current period compared to the previous period</span></li>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">4</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">A control procedure is considered cost effective when its anticipated benefits exceed its anticipated costs</span></li>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:나눔고딕;font-size:24.5pt;color:#979796;font-weight:bold\">정답 :&#160;</span><span style=\"font-family:나눔고딕;font-size:24.5pt;color:#a44b4a;font-weight:bold\">4.</span><span style=\"font-family:나눔고딕;font-size:12.5pt;color:#979796;font-weight:bold\">&#160;A control procedure is considered cost effective when its anticipated benefits exceed its anticipated costs</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">[해설]</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">Regarding the cost-benefit concept, Every control procedure is considered whether its anticipated benefits exceed its anticipated costs or not.</span></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">다음 설명을 잘 읽고 해당되는 용어(Terminology) 를 입력하시오.</span></p>\r\n\t\t\t\t<div style=\"display:inline-block;width:480px;height:200px;background:#2d333b;border-radius:4px;margin:2px;vertical-align:top;opacity:0.4\"></div>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">1. Flying-start site</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">2. Hot site</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">3. Surge protector</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">4. Cold site</span></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:7.5pt\"><span style=\"font-family:나눔고딕;font-size:15pt;color:#989795;font-weight:bold\">A sales transaction document was coded with an invalid customer account code (7 digits rather than 8). The error was not detected until the updating run when it was found that there was no such account to which the transaction could be posted. The best control procedure would be :</span></p>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">1</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">Parity checks</span></li>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">2</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">Keypunch verification</span></li>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">3</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">A hash total check</span></li>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">4</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">A check digit</span></li>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:나눔고딕;font-size:24.5pt;color:#979796;font-weight:bold\">정답 :&#160;</span><span style=\"font-family:나눔고딕;font-size:24.5pt;color:#a44b4a;font-weight:bold\">4.</span><span style=\"font-family:나눔고딕;font-size:12.5pt;color:#979796;font-weight:bold\">&#160;A check digit</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">[해설]</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">check digit(자리수검증)은 숫자필드 내의 다른 자릿수의 수학적 함수로서 계산되며, 관련 자료의 타당성을 검증하는 것이다.</span></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:7.5pt\"><span style=\"font-family:나눔고딕;font-size:15pt;color:#989795;font-weight:bold\">A company&#39;s computer facilities and computer room conceivably could be destroyed completely by fire. The most appropriate action a company could take in an attempt to prepare for and protect itself for such a disaster would be :</span></p>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">1</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">To have backup computer facilities at the same site</span></li>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">2</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">To have off-site backup computer facilities</span></li>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">3</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">To have a reconstruction and recovery plan which outlines the procedures for reconstruction of files and use of alternate facilities</span></li>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">4</a><span style=\"font-family:나눔고딕;font-size:13.5pt;font-weight:bold\">To have a contractual agreement with the manufacturer or another company to use its facilities</span></li>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:나눔고딕;font-size:24.5pt;color:#979796;font-weight:bold\">정답 :&#160;</span><span style=\"font-family:나눔고딕;font-size:24.5pt;color:#a44b4a;font-weight:bold\">3.</span><span style=\"font-family:나눔고딕;font-size:12.5pt;color:#979796;font-weight:bold\">&#160;To have a reconstruction and recovery plan which outlines the procedures for reconstruction of files and use of alternate facilities</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">[해설]</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">The most appropriate action a company could take in an attempt to prepare recovery plan which outlines the procedures for reconstruction of files and use of alternate facilities</span></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:22.5pt;margin-bottom:7.5pt\"><span style=\"font-family:나눔고딕;font-size:12.5pt;color:#999693;font-weight:bold\">다음은 Data-Access control totals 에 대한 설명이다. 각각의 설명에 해당하는 용어를 적으시오.</span></p>\r\n\t\t\t\t<div style=\"display:inline-block;width:480px;height:200px;background:#2d333b;border-radius:4px;margin:2px;vertical-align:top;opacity:0.4\"></div>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">1. batch control total</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">2. nonfinancial control total</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">3. financial control total</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">4. record count</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">5. hash total</span></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:7.5pt\"><span style=\"font-family:나눔고딕;font-size:15pt;color:#989795;font-weight:bold\">From the standpoint of computer fraud, which type of controls would probably be of highest importance?</span></p>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">1</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">Input controls</span></li>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">2</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">Access controls</span></li>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">3</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">Output controls</span></li>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">4</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">Processing controls</span></li>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:나눔고딕;font-size:24.5pt;color:#979796;font-weight:bold\">정답 :&#160;</span><span style=\"font-family:나눔고딕;font-size:24.5pt;color:#a44b4a;font-weight:bold\">1.</span><span style=\"font-family:나눔고딕;font-size:12.5pt;color:#979796;font-weight:bold\">&#160;Input controls</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">[해설]</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">From the standpoint of computer fraud, Input controls would probably be of highest importance</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:7.5pt\"><span style=\"font-family:나눔고딕;font-size:15pt;color:#989795;font-weight:bold\">A CPA reviews a client&#39;s payroll procedures. The CPA would consider internal control to be less than effective if a payroll department supervisor was assigned the responsibility for :</span></p>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">1</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">Distributing payroll checks to employees</span></li>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">2</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">Reviewing and approving time reports for subordinate employees</span></li>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">3</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">Hiring subordinate employees</span></li>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">4</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">Initiating requests for salary adjustments for subordinate employees</span></li>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:나눔고딕;font-size:24.5pt;color:#979796;font-weight:bold\">정답 :&#160;</span><span style=\"font-family:나눔고딕;font-size:24.5pt;color:#a44b4a;font-weight:bold\">1.</span><span style=\"font-family:나눔고딕;font-size:12.5pt;color:#979796;font-weight:bold\">&#160;Distributing payroll checks to employees</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">[해설]</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">A payroll department supervisor should not be assigned the responsibility for distributing payroll checks to employees</span></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">시스템개발수명주기(SDLC)의 4단계를 설명하시오.</span></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">1. Planning and Investigation</span></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">2. Analysis</span></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">3. Designing</span></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">4. Implementation, follow-up, and maintenance</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">1) Planning and Investigation involves</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">- a preliminary investigation of the current system</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">- organizing a systems study team, and</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">- developing strategic plans.</span></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">(2) Analysis involves</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">- analyzing the company’s current system and</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">- identifying its needs, strengths, and weaknesses.</span></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">(3) Designing involves - eliminating the current system’s weak points, and</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">- preserving its strengths.</span></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">(4) Implementation, follow-up, and maintenance includes</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">- acquiring resources for the new system,</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">- training new or existing employees,</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">- identifying any new problems.</span></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:7.5pt\"><span style=\"font-family:나눔고딕;font-size:15pt;color:#989795;font-weight:bold\">Systems design usually comes after :</span></p>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">1</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">Systems analysis</span></li>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">2</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">Systems funding</span></li>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">3</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">Implementation and maintenance</span></li>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">4</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">Planning and investigation</span></li>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:나눔고딕;font-size:24.5pt;color:#979796;font-weight:bold\">정답 :&#160;</span><span style=\"font-family:나눔고딕;font-size:24.5pt;color:#a44b4a;font-weight:bold\">1.</span><span style=\"font-family:나눔고딕;font-size:12.5pt;color:#979796;font-weight:bold\">&#160;Systems analysis</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">[해설]</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">Systems design usually comes after Systems analysis</span></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:7.5pt\"><span style=\"font-family:나눔고딕;font-size:15pt;color:#989795;font-weight:bold\">A CPA reviews a client&#39;s payroll procedures. The CPA would consider internal control to be less than effective if a payroll department supervisor was assigned the responsibility for :</span></p>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">1</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">The ability of the systems programmers to write appropriate software</span></li>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">2</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">The selection of the most advanced computer equipment</span></li>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">3</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">Giving the systems people a free hand in all changes</span></li>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">4</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">The participation of top management in the planning process</span></li>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:나눔고딕;font-size:24.5pt;color:#979796;font-weight:bold\">정답 :&#160;</span><span style=\"font-family:나눔고딕;font-size:24.5pt;color:#a44b4a;font-weight:bold\">4.</span><span style=\"font-family:나눔고딕;font-size:12.5pt;color:#979796;font-weight:bold\">&#160;The participation of top management in the planning process</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">[해설]</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">The most important factor in planning for a major change in a computer-based system is the participation of top management in the planning process</span></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:나눔고딕;font-size:18pt;color:#a0958d;font-weight:bold\">11주차 2차시. 시스템 설계와 구현, 평가 및 유지</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:나눔고딕;font-size:10pt;color:#a0958d;font-weight:bold\">회계정보시스템Ⅰ</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">1. 4-steps in prototyping</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">: Identify information system requirements ? Develop an initial prototype Test and revise the prototype user signs off on approved prototype</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">2. Advantage ( prototyping is useful when : )</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">① End users do not understand their informational needs very well,</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">② System requirements are hard to define,</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">③ The new system is mission critical or needed quickly,</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">④ Past interactions have resulted in misunderstandings between end users and designers</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">⑤ There are high risks associated with developing and Implementing the wrong system.</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">3. Disadvantage ( Prototyping is not useful when: )</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">① Both managers and IT professionals can not trust it; too experimental</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">② Satisfies the informational needs of non-representative user</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">③ is not normally appropriate for designing large or complex information systems that serve many users with different informational needs.</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">④ is not recommended where the inputs, processing, and outputs are already clearly defined.</span></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:7.5pt\"><span style=\"font-family:나눔고딕;font-size:15pt;color:#989795;font-weight:bold\">In a PERT network diagram, the amount of delay time that can occur in a non-critical activity and still not delay the estimated completion time of a systems implementation project is called :</span></p>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">1</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">Slack time</span></li>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">2</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">Noncritical time</span></li>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">3</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">Critical time</span></li>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">4</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">none of the above</span></li>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:나눔고딕;font-size:24.5pt;color:#979796;font-weight:bold\">정답 :&#160;</span><span style=\"font-family:나눔고딕;font-size:24.5pt;color:#a44b4a;font-weight:bold\">1.</span><span style=\"font-family:나눔고딕;font-size:12.5pt;color:#979796;font-weight:bold\">&#160;Slack time</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">[해설]</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">Slack time (여유시간)에 대한 설명이다.</span></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:7.5pt\"><span style=\"font-family:나눔고딕;font-size:15pt;color:#989795;font-weight:bold\">A simple diagram that shows estimated completion times versus actual completion times for the various activities in a systems implementation project is a(n) :</span></p>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">1</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">E-R diagram</span></li>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">2</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">PERT chart</span></li>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">3</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">Gantt chart</span></li>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">4</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">Data flow diagram</span></li>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:나눔고딕;font-size:24.5pt;color:#979796;font-weight:bold\">정답 :&#160;</span><span style=\"font-family:나눔고딕;font-size:24.5pt;color:#a44b4a;font-weight:bold\">3.</span><span style=\"font-family:나눔고딕;font-size:12.5pt;color:#979796;font-weight:bold\">&#160;Gantt chart</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">[해설]</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">Gantt chart 에 대한 설명이다.</span></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">회사의 내부통제절차에 대한 평가시, Risk-based audit approach 를 적용할 경우의 4단계에 대해 약술하시오.</span></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">(1) Determining the threats facing the AIS</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">(2) Identifying the control procedures</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">(3) Evaluating the control procedures within the AIS</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">(4) Evaluating weaknesses</span></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">Under a risk-based audit approach to evaluating a company’s internal control procedures, the following four steps..</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">(1) Determining the threats facing the AIS : errors and irregularities</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">(2) Identifying the control procedures : to prevent or detect the errors and irregularities</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">(3) Evaluating the control procedures within the AIS</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">① observing system operations,</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">② inspecting documents, records, and reports,</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">③ checking samples of system inputs and outputs, and</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">④ tracing transactions through the system</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">(4) Evaluating weaknesses</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">① identifying control deficiencies</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">② determining compensating controls : to make up for the deficiency</span></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:7.5pt\"><span style=\"font-family:나눔고딕;font-size:15pt;color:#989795;font-weight:bold\">When an auditor audits with the computer, the auditor :</span></p>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">1</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">Uses the computer to process transaction data under normal processing conditions</span></li>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">2</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">Uses the computer as a tool to assist in various other auditing tasks</span></li>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">3</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">Relies heavily upon test data to evaluate the presence or absence of specific computer controls</span></li>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">4</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">Must also use an integrated test facility</span></li>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:나눔고딕;font-size:24.5pt;color:#979796;font-weight:bold\">정답 :&#160;</span><span style=\"font-family:나눔고딕;font-size:24.5pt;color:#a44b4a;font-weight:bold\">2.</span><span style=\"font-family:나눔고딕;font-size:12.5pt;color:#979796;font-weight:bold\">&#160;Uses the computer as a tool to assist in various other auditing tasks</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">[해설]</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">the auditor uses the computer as a tool to assist in various other auditing tasks</span></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:7.5pt\"><span style=\"font-family:나눔고딕;font-size:15pt;color:#989795;font-weight:bold\">The primary purpose of an internal audit is :</span></p>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">1</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">To verify the accuracy of a firm’s financial statements</span></li>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">2</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">To punish employees for inefficient performance</span></li>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">3</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">To meet the requirements of the accounting profession</span></li>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">4</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">To ascertain employee adherence to organizational policies and procedures</span></li>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:나눔고딕;font-size:24.5pt;color:#979796;font-weight:bold\">정답 :&#160;</span><span style=\"font-family:나눔고딕;font-size:24.5pt;color:#a44b4a;font-weight:bold\">4.</span><span style=\"font-family:나눔고딕;font-size:12.5pt;color:#979796;font-weight:bold\">&#160;To ascertain employee adherence to organizational policies and procedures</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">[해설]</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">The primary purpose of an internal audit is to ascertain employee adherence to organizational policies and procedures</span></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">Auditing Around the computer (컴퓨터 주변감사) 와 Auditing through the computer (컴퓨터 직접감사) 의 차이점 및 특징에 대해 약술하시오.</span></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">Auditing Around the Computer</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">ㆍTo follow the audit trail up to the point at which accounting data entered the computer and to pick these data up again when they reappeared in processed form as computer output.</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">ㆍAssumes : accurate output verifies proper processing operations.</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">→ pays little or no attention to the control procedures.</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">ㆍIt tests normal transactions but ignores the exceptions.</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">→ Not generally an effective approach to auditing a computerized environment.</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">Auditing Through the Computer</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">ㆍTo follow the audit trail through the internal computer operations phase of automated data processing.</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">ㆍTo tests the existence and functioning of control procedures.</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">ㆍAssume that the CPU and other hardware are functioning properly</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">→ auditor’s principal tasks : verifying processing and control logic (not computer accuracy)</span></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:7.5pt\"><span style=\"font-family:나눔고딕;font-size:15pt;color:#989795;font-weight:bold\">Through-the-computer auditing uses all of the following except :</span></p>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">1</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">Confirmation sampling</span></li>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">2</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">Test data</span></li>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">3</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">Tests of program authorization</span></li>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">4</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">Embedded audit modules</span></li>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:나눔고딕;font-size:24.5pt;color:#979796;font-weight:bold\">정답 :&#160;</span><span style=\"font-family:나눔고딕;font-size:24.5pt;color:#a44b4a;font-weight:bold\">1.</span><span style=\"font-family:나눔고딕;font-size:12.5pt;color:#979796;font-weight:bold\">&#160;Confirmation sampling</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">[해설]</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">Through-the-computer auditing does not use Confirmation sampling</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:7.5pt\"><span style=\"font-family:나눔고딕;font-size:15pt;color:#989795;font-weight:bold\">The most important advantage of an integrated test facility is that it :</span></p>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">1</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">Allows auditors to evaluate transactions in an operational setting</span></li>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">2</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">Can test every exception transaction as opposed to test data which includes only a limited set of such transactions</span></li>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">3</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">Works best at evaluating input controls</span></li>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">4</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">Has no advantages</span></li>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:나눔고딕;font-size:24.5pt;color:#979796;font-weight:bold\">정답 :&#160;</span><span style=\"font-family:나눔고딕;font-size:24.5pt;color:#a44b4a;font-weight:bold\">1.</span><span style=\"font-family:나눔고딕;font-size:12.5pt;color:#979796;font-weight:bold\">&#160;Allows auditors to evaluate transactions in an operational setting</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">[해설]</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">an integrated test facility allows auditors to evaluate transactions in an operational setting</span></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">Continuous auditing (지속적인 감사)의 6가지 유형에 대한 설명이다. 각각의 설명에 매칭되는 표현(용어)를 고르시오.</span></p>\r\n\t\t\t\t<div style=\"display:inline-block;width:480px;height:200px;background:#2d333b;border-radius:4px;margin:2px;vertical-align:top;opacity:0.4\"></div>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">1)embedded audit modules</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">2)exception reporting</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">3)predefined specifications</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">4)transaction tagging</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">5)snapshot technique</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">6)continuous and intermittent simulation</span></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:7.5pt\"><span style=\"font-family:나눔고딕;font-size:15pt;color:#989795;font-weight:bold\">All of the following are true concerning embedded audit modules except :</span></p>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">1</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">They provide for continuous auditing of application processing</span></li>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">2</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">The auditor does not have to be involved in the development of these programs</span></li>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">3</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">Once implemented, the system can capture information that is useful to the auditor on an ongoing basis</span></li>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">4</a><span style=\"font-family:나눔고딕;font-size:13.5pt;font-weight:bold\">With this approach, the application program incorporates subroutines for audit purposes</span></li>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:나눔고딕;font-size:24.5pt;color:#979796;font-weight:bold\">정답 :&#160;</span><span style=\"font-family:나눔고딕;font-size:24.5pt;color:#a44b4a;font-weight:bold\">2.</span><span style=\"font-family:나눔고딕;font-size:12.5pt;color:#979796;font-weight:bold\">&#160;The auditor does not have to be involved in the development of these programs</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">[해설]</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">감사모듈내장법(embedded audit module)은 감사인이 현장에 없어도 감사가 이루어지도록 하는것이다.</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:7.5pt\"><span style=\"font-family:나눔고딕;font-size:15pt;color:#989795;font-weight:bold\">Under which audit technique is the way transactions are processed examined?</span></p>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">1</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">Exception reporting technique</span></li>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">2</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">Transaction tagging technique</span></li>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">3</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">Snapshot technique</span></li>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">4</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">Parallel simulation technique</span></li>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:나눔고딕;font-size:24.5pt;color:#979796;font-weight:bold\">정답 :&#160;</span><span style=\"font-family:나눔고딕;font-size:24.5pt;color:#a44b4a;font-weight:bold\">3.</span><span style=\"font-family:나눔고딕;font-size:12.5pt;color:#979796;font-weight:bold\">&#160;Snapshot technique</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">[해설]</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">Snapshot technique은 거래가 처리되는 방법을 검토하는 기법이다.</span></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:나눔고딕;font-size:12.5pt;color:red;font-weight:bold\">Data dictionary</span><span style=\"font-family:Malgun Gothic\">&#160;(a data file about data )의 정의와 특징 4가지를 설명하시오.</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">Data dictionary is a data file about data.</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">① ddescribes the data fields in each database record.</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">② a separate computer file that is created and maintained by the admin of a DBMS.</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">③ Contain metadata, or data about data, and have a variety of uses.</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">④ Can help establish an audit trail. : It identifies the input sources of data, potential programs that use or modify particular data, and the managerial reports on which the data items are output.</span></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:7.5pt\"><span style=\"font-family:나눔고딕;font-size:15pt;color:#989795;font-weight:bold\">The data item which uniquely identifies a computer record in an AIS database table is called the :</span></p>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">1</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">Pointer address</span></li>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">2</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">Primary record key</span></li>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">3</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">Secondary key</span></li>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">4</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">Domestic key</span></li>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:나눔고딕;font-size:24.5pt;color:#979796;font-weight:bold\">정답 :&#160;</span><span style=\"font-family:나눔고딕;font-size:24.5pt;color:#a44b4a;font-weight:bold\">2.</span><span style=\"font-family:나눔고딕;font-size:12.5pt;color:#979796;font-weight:bold\">&#160;Primary record key</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">[해설]</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">Primary record key is a data item which uniquely identifies a computer record in an AIS database table.</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:7.5pt\"><span style=\"font-family:나눔고딕;font-size:15pt;color:#989795;font-weight:bold\">This item creates relationships by linking the data in one file (e.g., customer) to an item in a second file (e.g., a sales order) :</span></p>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">1</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">Foreign key</span></li>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">2</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">Data dictionary</span></li>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">3</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">Relationships link bit</span></li>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><a href=\"https://edustudy.hunet.co.kr/Study/ContentsV3/Main.aspx#\" style=\"font-family:나눔고딕;font-size:10.5pt;background-color:#37393a;font-weight:bold\">4</a><span style=\"font-family:나눔고딕;font-size:13.5pt\">Index file</span></li>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:나눔고딕;font-size:
