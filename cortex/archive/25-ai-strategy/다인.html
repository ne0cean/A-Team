<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>다인</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1e1e1e; color: #e0e0e0; font-family: 'Segoe UI', -apple-system, sans-serif; font-size: 15px; line-height: 1.6; padding: 20px 30px 60px; overflow-x: hidden; }
a { color: #6cb0f6; text-decoration: none; }
a:hover { text-decoration: underline; }
.title-bar { background: #3a3a5c; display: inline-block; padding: 6px 16px; font-size: 22px; font-weight: bold; color: #fff; margin-bottom: 4px; }
.date { color: #999; font-size: 13px; margin-bottom: 20px; }
.board { position: relative; }
.card { background: #2a2a2a; border: 1px solid #3a3a3a; border-radius: 8px; padding: 12px; position: absolute; cursor: grab; transition: box-shadow 0.15s; overflow: hidden; }
.card:hover { box-shadow: 0 0 0 1px #58a6ff; z-index: 10; }
.card.moving { opacity: 0.8; box-shadow: 0 4px 24px rgba(0,0,0,0.6); z-index: 100; cursor: grabbing; }
.card img { width: 100%; border-radius: 4px; display: block; }
.card .text { outline: none; min-height: 20px; white-space: pre-wrap; word-break: break-word; }
.card .text:focus { background: rgba(255,255,255,0.05); border-radius: 4px; padding: 4px; }
.card .text:empty::before { content: '텍스트 입력...'; color: #555; }
.card-actions { position: absolute; top: 4px; right: 4px; display: none; gap: 4px; }
.card:hover .card-actions { display: flex; }
.card-btn { background: #333; border: 1px solid #555; color: #ccc; border-radius: 4px; padding: 2px 6px; font-size: 11px; cursor: pointer; }
.card-btn:hover { background: #444; color: #fff; }
.resize-handle { position: absolute; bottom: 0; right: 0; width: 16px; height: 16px; cursor: se-resize; opacity: 0; }
.card:hover .resize-handle { opacity: 0.6; }
.resize-handle::after { content: ''; position: absolute; bottom: 3px; right: 3px; width: 8px; height: 8px; border-right: 2px solid #666; border-bottom: 2px solid #666; }
.card.selected { box-shadow: 0 0 0 2px #58a6ff; z-index: 5; }
.highlight-red { color: #ff6b6b; }
.highlight-blue { color: #6cb0f6; }
.highlight-gold { color: #f0c040; }
.toolbar { position: fixed; bottom: 0; left: 0; right: 0; background: #161b22; border-top: 1px solid #30363d; padding: 8px 20px; display: flex; gap: 12px; align-items: center; z-index: 200; }
.toolbar button { background: #21262d; border: 1px solid #30363d; color: #e0e0e0; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; }
.toolbar button:hover { background: #30363d; }
.toolbar .status { color: #8b949e; font-size: 12px; margin-left: auto; }
#format-toolbar { position: fixed; display: none; background: #1c2128; border: 1px solid #444c56; border-radius: 8px; padding: 4px 6px; gap: 2px; align-items: center; z-index: 500; box-shadow: 0 4px 16px rgba(0,0,0,0.5); }
#format-toolbar button { background: none; border: none; color: #cdd9e5; padding: 4px 8px; border-radius: 5px; cursor: pointer; font-size: 13px; line-height: 1; }
#format-toolbar button:hover { background: #373e47; }
#format-toolbar .sep { width: 1px; height: 16px; background: #444c56; margin: 0 2px; }
</style>
</head>
<body>
<div class="title-bar" contenteditable="true">다인</div>
<div class="date">2025년 1월 3일 금요일</div>
<div class="board" id="board"></div>
<div id="format-toolbar">
  <button onmousedown="e=>e.preventDefault()" onclick="fmt('bold')" title="굵게"><b>B</b></button>
  <button onclick="fmt('italic')" title="기울임"><i>I</i></button>
  <button onclick="fmt('underline')" title="밑줄"><u>U</u></button>
  <div class="sep"></div>
  <button onclick="fmtLink()" title="링크 삽입">🔗</button>
  <button onclick="fmt('unlink')" title="링크 제거">✂</button>
</div>
<div class="toolbar">
  <button onclick="undo()" title="Ctrl+Z">↩ 실행취소</button>
  <button onclick="addTextCard()">+ 텍스트</button>
  <button onclick="addImageCard()">+ 이미지</button>
  <button onclick="addImageUrl()">+ 이미지 URL</button>
  <button onclick="addTableCard()">+ 표</button>
  <button onclick="saveBoard()">💾 저장</button>
  <button onclick="exportBoard()">📤 내보내기</button>
  <button onclick="resetLayout()">↺ 재배치</button>
  <button onclick="resetToDefaults()" style="color:#f85149">↺ 초기화</button>
  <div style="display:flex;align-items:center;gap:4px;margin-left:8px;border-left:1px solid #30363d;padding-left:12px;">
    <button onclick="zoomOut()" title="Ctrl+-" style="padding:6px 10px;">−</button>
    <span id="zoom-level" style="font-size:12px;color:#8b949e;min-width:36px;text-align:center;">100%</span>
    <button onclick="zoomIn()" title="Ctrl+=" style="padding:6px 10px;">+</button>
  </div>
  <span class="status" id="status">Ready</span>
</div>
<script>
const SAVE_KEY = 'board-다인';
const IMG_BASE = '../../attachments/';
const DEFAULT_CARDS = [
  {
    "type": "text",
    "x": 360,
    "y": 19,
    "w": 600,
    "content": "가해자 녹취\n주변인과의 업무 배제 관련 대화 녹취\n일지 쓰기 팩트+감정\n매일 동료들이 받은 메일과 내 메일함/ 텔레그램 비교 + 동료들 대화 내용 녹취"
  },
  {
    "type": "html",
    "x": 48,
    "y": 115,
    "w": 507,
    "html": "\r\n\t\t\t<ul>\r\n\t\t\t\t<p data-tag=\"remember-for-later\" style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\">근데<span lang=\"en-US\"> </span>준호님<span lang=\"en-US\"> </span>가면<span lang=\"en-US\"> </span>날<span lang=\"en-US\"> </span>시킬거라<span lang=\"en-US\"> </span>시기를<span lang=\"en-US\"> </span>잘<span lang=\"en-US\"> </span>봐야대<span lang=\"en-US\">...</span></p>\r\n\t\t\t\t<table style=\"border:1px solid;border-collapse:collapse\">\r\n\t\t\t\t\t<tr>\r\n\t\t\t\t\t\t<td style=\"border:1px solid;font-family:Pretendard Light\">올핸즈<span lang=\"en-US\"> </span>미팅</td>\r\n\t\t\t\t\t\t<td style=\"border:1px solid;font-family:Pretendard Light\">최동희<span lang=\"en-US\"> </span>담당<span lang=\"en-US\"> &quot;</span>본인<span lang=\"en-US\"> </span>의사에<span lang=\"en-US\"> </span>반하는<span lang=\"en-US\"> </span>강제<span lang=\"en-US\"> </span>이동은<span lang=\"en-US\"> </span>없도록<span lang=\"en-US\"> </span>하겠다<span lang=\"en-US\">.&quot;</span></td>\r\n\t\t\t\t\t</tr>\r\n\t\t\t\t\t<tr>\r\n\t\t\t\t\t\t<td style=\"border:1px solid;font-family:Pretendard Light\">고과면담<span lang=\"en-US\"> </span>날짜</td>\r\n\t\t\t\t\t\t<td style=\"border:1px solid\"><br />\r\n\t\t\t\t\t\t</td>\r\n\t\t\t\t\t</tr>\r\n\t\t\t\t\t<tr>\r\n\t\t\t\t\t\t<td style=\"border:1px solid;font-family:Pretendard Light\">이동<span lang=\"en-US\"> </span>종용</td>\r\n\t\t\t\t\t\t<td style=\"border:1px solid;font-family:Pretendard Light\"><span lang=\"en-US\"><span style=\"font-family:Malgun Gothic\">B2B </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">이동</span><span style=\"font-family:Malgun Gothic\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">종용</span><span style=\"font-family:Malgun Gothic\"> HR</span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">에서</span><span style=\"font-family:Malgun Gothic\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">리스트를</span><span style=\"font-family:Malgun Gothic\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">받았다</span><span style=\"font-family:Malgun Gothic\">.</span></span></td>\r\n\t\t\t\t\t</tr>\r\n\t\t\t\t\t<tr>\r\n\t\t\t\t\t\t<td style=\"border:1px solid\"><br />\r\n\t\t\t\t\t\t</td>\r\n\t\t\t\t\t\t<td style=\"border:1px solid\"><br />\r\n\t\t\t\t\t\t</td>\r\n\t\t\t\t\t</tr>\r\n\t\t\t\t</table>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\">상대방으로 하여금 “왜 나만 이 업무에 투입되지 않았는지”, “내가 원래 수행하던 업무는 어떻게 된 것인지” 등을 설명하도록 자연스럽게 이끄는 방식이 필요합니다.</p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<li style=\"font-family:Pretendard Light\">“이번 프로젝트(또는 업무)는 어떤 기준으로 담당자를 배정하신 건가요?”</li>\r\n\t\t\t\t<li style=\"font-family:Pretendard Light\">“보통은 팀원 전체에게 업무 분배가 되는데, 이번에 저는 어떻게 된 건지 안내를 못 받은 것 같아서요. 혹시 제가 맡아야 할 역할은 없나요?”</li>\r\n\t\t\t\t<li style=\"font-family:Pretendard Light\">“프로젝트 일정이 진행 중이라 들었는데, 제 참여 부분이나 업무 분담은 어떻게 결정됐나요?”</li>\r\n\t\t\t\t<br />\r\n\t\t\t\t<li style=\"font-family:Pretendard Light\"><span style=\"font-weight:bold\">업무가 배정되는 일반적 절차</span>가 있는데, 그 절차가 나에게만 예외적으로 적용되지 않았다는 점을 상대방 스스로 설명하게 만듭니다.</li>\r\n\t\t\t\t<li><p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\">“예외”가 있었음을 <span style=\"font-weight:bold\">상대방 입으로</span> 인정하게 될 수 있으며, 그 이유를 설명하는 과정에서 부당한 의도나 명분 없는 배제가 드러날 수 있습니다.</p>\r\n\t\t\t\t<ul>\r\n\t\t\t\t\t<li style=\"font-family:Pretendard Light\"><span style=\"font-weight:bold\">업무가 배정되는 일반적 절차</span>가 있는데, 그 절차가 나에게만 예외적으로 적용되지 않았다는 점을 상대방 스스로 설명하게 만듭니다.</li>\r\n\t\t\t\t\t<li style=\"font-family:Pretendard Light\">“예외”가 있었음을 <span style=\"font-weight:bold\">상대방 입으로</span> 인정하게 될 수 있으며, 그 이유를 설명하는 과정에서 부당한 의도나 명분 없는 배제가 드러날 수 있습니다.</li>\r\n\t\t\t\t</ul>\r\n\t\t\t\t</li>\r\n\t\t\t\t<br />\r\n\t\t\t\t<ul>\r\n\t\t\t\t\t<li style=\"font-family:Pretendard Light\">이전에는 정상적으로 하던 업무를 <span style=\"font-weight:bold\">갑자기</span> 못 하게 됐음을 당사자에게 직접 물어, 그 <span style=\"font-weight:bold\">합리적 이유가 있는지</span>를 묻습니다.</li>\r\n\t\t\t\t\t<li style=\"font-family:Pretendard Light\">상대방이 “본인 역량이 안 맞는다” 혹은 “이번엔 다른 사람이 담당하기로 했다” 등 <span style=\"font-weight:bold\">명확하지 않은 이유</span>를 제시하면, 이후 이 발언이 **‘부당 배제’**의 근거가 될 수 있습니다.</li>\r\n\t\t\t\t</ul>\r\n\t\t\t\t<br />\r\n\t\t\t\t<ul>\r\n\t\t\t\t\t<li style=\"font-family:Pretendard Light\">‘정보 공유’나 ‘회의 참석’ 같은 <span style=\"font-weight:bold\">업무 진행의 필수 요소</span>에서 내가 빠졌음을 “혹시 실수로 제외된 것이냐”고 묻거나, <span style=\"font-weight:bold\">정상적인 사유</span>가 있는지 확인 요청을 합니다.</li>\r\n\t\t\t\t\t<li style=\"font-family:Pretendard Light\">가해자가 “아, 원래 안 불렀다” “당신은 참석 안 해도 된다(또는 필요 없다)”고 답하면, <span style=\"font-weight:bold\">업무 배제</span>를 사실상 인정하는 꼴이 될 수 있습니다.</li>\r\n\t\t\t\t</ul>\r\n\t\t\t\t<br />\r\n\t\t\t\t<ul>\r\n\t\t\t\t\t<li style=\"font-family:Pretendard Light\">“왜 나만 배제되었는가?”라는 공세적 질문이 아니라, “내가 참여하고 싶다”는 의도를 밝히고, <span style=\"font-weight:bold\">참여가 불가능한 이유</span>를 상대로 하여금 설명하게 만듭니다.</li>\r\n\t\t\t\t\t<li style=\"font-family:Pretendard Light\">부당하게 배제하려는 의도가 있을 경우, <span style=\"font-weight:bold\">특별한 이유 없이</span> “필요 없다”거나 “이미 다른 사람이 맡았다”는 답변이 나올 수 있습니다.</li>\r\n\t\t\t\t</ul>\r\n\t\t\t\t<br />\r\n\t\t\t\t<ol>\r\n\t\t\t\t\t<li><p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-weight:bold\">공격적&#183;명령적 어투는 지양</span></p>\r\n\t\t\t\t\t<ul>\r\n\t\t\t\t\t\t<li style=\"list-style-type:circle;font-family:Pretendard Light\">“왜 나만 빼놓고 이래요?” “당신이 날 업무에서 배제했지?”와 같은 직접적인 표현은 상대방이 경계심을 갖고 답변을 회피하게 만들 가능성이 큽니다.</li>\r\n\t\t\t\t\t\t<li style=\"list-style-type:circle;font-family:Pretendard Light\">대신 **“궁금해서 확인한다”**는 뉘앙스로 질문을 던지면, 상대방이 더 편하게(혹은 실수로) 본심을 노출할 여지가 있습니다.</li>\r\n\t\t\t\t\t</ul>\r\n\t\t\t\t\t</li>\r\n\t\t\t\t\t<li><p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-weight:bold\">가능하면 공식 채널 활용</span></p>\r\n\t\t\t\t\t<ul>\r\n\t\t\t\t\t\t<li style=\"list-style-type:circle;font-family:Pretendard Light\">대면 대화보다는 <span style=\"font-weight:bold\">메일, 메신저</span>, 혹은 회의록이 남는 <span style=\"font-weight:bold\">공식적인 소통 채널</span>로 질문을 남겨두면, 추후에 해당 답변이 <span style=\"font-weight:bold\">문서화된 증거</span>로 활용되기 좋습니다.</li>\r\n\t\t\t\t\t\t<li style=\"list-style-type:circle;font-family:Pretendard Light\">상대방이 구두로만 대답하려고 할 경우, 메일이나 메신저로 “방금 말씀하신 내용이 정확히 이런 의미인지요?”라고 재확인해 ‘서면화’하는 방법을 사용할 수 있습니다.</li>\r\n\t\t\t\t\t</ul>\r\n\t\t\t\t\t</li>\r\n\t\t\t\t\t<li><p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-weight:bold\">녹취&#183;녹음 시 법적 유의사항</span></p>\r\n\t\t\t\t\t<ul>\r\n\t\t\t\t\t\t<li style=\"list-style-type:circle;font-family:Pretendard Light\">한국 기준으로, <span style=\"font-weight:bold\">당사자(본인)가 참여한 대화를 녹음</span>하는 것은 원칙적으로 법적으로 허용되지만(타인 간 대화 도청은 불법), 그럼에도 불구하고 사생활 침해 등의 문제가 발생할 수 있습니다.</li>\r\n\t\t\t\t\t\t<li style=\"list-style-type:circle;font-family:Pretendard Light\">녹취 파일의 증거 능력은 개별 사건별로 달라질 수 있으므로, <span style=\"font-weight:bold\">노무사&#183;변호사</span>와 상담 후 진행을 권장합니다.</li>\r\n\t\t\t\t\t</ul>\r\n\t\t\t\t\t</li>\r\n\t\t\t\t\t<li><p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-weight:bold\">정중한 태도로 접근</span></p>\r\n\t\t\t\t\t<ul>\r\n\t\t\t\t\t\t<li style=\"list-style-type:circle;font-family:Pretendard Light\">업무에 대한 정당한 확인 절차라는 ‘합리적 명분’을 갖추면, 상대방이 가볍게 대응하다가 실수로 부당 배제를 시사하는 발언을 할 수 있습니다.</li>\r\n\t\t\t\t\t\t<li style=\"list-style-type:circle;font-family:Pretendard Light\">지나치게 감정적이거나 공격적으로 나오면 “네가 과민반응한다”라는 식으로 돌아서며 배제를 정당화하거나, 아예 대화를 중단해버릴 수도 있습니다.</li>\r\n\t\t\t\t\t</ul>\r\n\t\t\t\t\t</li>\r\n\t\t\t\t</ol>\r\n\t\t\t\t<br />\r\n\t\t\t\t<ul>\r\n\t\t\t\t\t<li style=\"font-family:Pretendard Light\"><span style=\"font-weight:bold\">상대방 답변 기록&#183;보관</span>: 가해자로부터 온 답변(메일, 문서, 메신저 캡처 등)은 모두 정리해 둡니다.</li>\r\n\t\t\t\t\t<li style=\"font-family:Pretendard Light\"><span style=\"font-weight:bold\">추가 메모</span>: 구두로 대답했을 경우, 언제(날짜/시간), 어디서, 어떤 내용이었는지 바로 메모하여 “업무일지” 형태로 남겨둡니다.</li>\r\n\t\t\t\t\t<li style=\"font-family:Pretendard Light\"><span style=\"font-weight:bold\">고충 처리 절차 진행</span>: 사내 인사팀, 노조, 고충상담실 등에 공식 문제 제기를 할 때, 이렇게 확보한 <span style=\"font-weight:bold\">대화 내용</span>이 중요한 간접 증거가 됩니다.</li>\r\n\t\t\t\t</ul>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:18pt;font-weight:bold\">결론</span></p>\r\n\t\t\t\t<ul>\r\n\t\t\t\t\t<li style=\"font-family:Pretendard Light\"><span data-tag=\"remember-for-later\">“업무 배정 기준”</span></li>\r\n\t\t\t\t\t<li style=\"font-family:Pretendard Light\"><span data-tag=\"remember-for-later\">“본인의 원래 역할 또는 정당한 기대”</span></li>\r\n\t\t\t\t\t<li style=\"font-family:Pretendard Light\"><span data-tag=\"remember-for-later\">“배제된 사실에 대한 이유&#183;배경”￼등을 <span style=\"font-weight:bold\">침착하고 구체적으로</span> 묻는 과정을 통해, 결과적으로 상대방이 <span style=\"font-weight:bold\">본인을 의도적으로 제외했다</span>는 사실을 어느 정도 인정하거나 시사하게 만들 수 있습니다.</span></li>\r\n\t\t\t\t</ul>\r\n\t\t\t</ul>\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:18pt;font-weight:bold\">1. “업무 할당 과정”에 대한 확인 질문</span></p>\r\n\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-weight:bold\">예시 문구</span></p>\r\n\t\t\t<ul>\r\n\t\t\t\t<li style=\"list-style-type:circle;font-family:Pretendard Light\"><span data-tag=\"remember-for-later\">“이번 프로젝트는 어떤 기준으로 담당자를 배정하신 건가요?”</span></li>\r\n\t\t\t\t<li style=\"list-style-type:circle;font-family:Pretendard Light\"><span data-tag=\"remember-for-later\">“아직 저는 어떻게 된 건지 정식으로<span lang=\"en-US\"> </span>업무<span lang=\"en-US\"> </span>분장이나<span lang=\"en-US\"> </span>지시를 못 받은 것 같아서요. 혹시 제가 맡아야 할 역할은 없나요?”</span></li>\r\n\t\t\t\t<li style=\"list-style-type:circle;font-family:Pretendard Light\"><span lang=\"en-US\" data-tag=\"remember-for-later\"><span style=\"font-family:Malgun Gothic\">&quot;</span><span lang=\"ko-KR\">제 참여 부분이나 업무 분담은 어떻게 결정됐나요?”</span></span></li>\r\n\t\t\t\t<li style=\"list-style-type:circle;font-family:Pretendard Light\"><span lang=\"en-US\"><span style=\"font-family:Malgun Gothic\">&quot;</span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">저는</span><span style=\"font-family:Malgun Gothic\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">메일을</span><span style=\"font-family:Malgun Gothic\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">매번</span><span style=\"font-family:Malgun Gothic\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">못</span><span style=\"font-family:Malgun Gothic\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">받고</span><span style=\"font-family:Malgun Gothic\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">있는데</span><span style=\"font-family:Malgun Gothic\">.</span></span></li>\r\n\t\t\t</ul>\r\n\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:16pt;font-weight:bold\">의도</span></p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:18pt;font-weight:bold\">2. “과거 vs 현재 비교”를 통한 변칙 확인</span></p>\r\n\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-weight:bold\">예시 문구</span></p>\r\n\t\t\t<ul>\r\n\t\t\t\t<li style=\"list-style-type:circle;font-family:Pretendard Light\"><span data-tag=\"remember-for-later\">“전에는 제가 이런 종류의 업무에 참여했었는데, 이번에는 제가<span lang=\"en-US\"> </span>빠져 있더라고요. 특별한 이유가 있나요?”</span></li>\r\n\t\t\t\t<li style=\"list-style-type:circle;font-family:Pretendard Light\"><span data-tag=\"remember-for-later\">“제가 최근까지 관련 업무를 담당해왔던 걸로 아는데,￼이번에 담당자가 바뀐 이유가 궁금해요.”</span></li>\r\n\t\t\t\t<li style=\"list-style-type:circle;font-family:Pretendard Light\"><span data-tag=\"remember-for-later\">“원래 제 업무 범위였던 부분인데, 최근에는 전혀 안내가 없어서요.￼혹시 제가 모르는 정책 변경이나 인사 지침이 있나요?”</span></li>\r\n\t\t\t</ul>\r\n\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:16pt;font-weight:bold\">의도</span></p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:18pt;font-weight:bold\">3. “회의&#183;정보 공유” 누락을 지적하는 질문</span></p>\r\n\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-weight:bold\">예시 문구</span></p>\r\n\t\t\t<ul>\r\n\t\t\t\t<li style=\"list-style-type:circle;font-family:Pretendard Light\"><span data-tag=\"remember-for-later\">“제가 계속 관련 업무를 해왔어서 회의 자료가 필요했는데, 혹시 따로 공유가 안 된 이유가 있을까요?”</span></li>\r\n\t\t\t\t<li style=\"list-style-type:circle;font-family:Pretendard Light\"><span data-tag=\"remember-for-later\">“그 업무 관련 정보를 최근까지 제가 담당했는데, 왜 이번 회의에서 제 의견을 묻지 않았나요?”</span></li>\r\n\t\t\t</ul>\r\n\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:16pt;font-weight:bold\">의도</span></p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:18pt;font-weight:bold\">4. “내 역할”을 구체적으로 질문</span></p>\r\n\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-weight:bold\">예시 문구</span></p>\r\n\t\t\t<ul>\r\n\t\t\t\t<li style=\"list-style-type:circle;font-family:Pretendard Light\"><span data-tag=\"remember-for-later\">“제가 이번 프로젝트에서 맡아야 할 구체적인 업무 범위나 역할이 어떻게 되나요? 혹은 전혀 없나요?”</span></li>\r\n\t\t\t\t<li style=\"list-style-type:circle;font-family:Pretendard Light\"><span data-tag=\"remember-for-later\">“혹시 제 역량이 부족하다고 판단되셨다면, 어느 부분에 대한 우려인지 피드백 부탁드립니다.”</span></li>\r\n\t\t\t\t<li style=\"list-style-type:circle;font-family:Pretendard Light\"><span data-tag=\"remember-for-later\">“저도 프로젝트에 기여하고 싶은데, 특별히 지시 받거나 요청받은 게 없어서요. 제가 별도로 준비해야 할 부분이 있으면 알려주시면 좋겠습니다.”</span></li>\r\n\t\t\t</ul>\r\n\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:16pt;font-weight:bold\">의도</span></p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:18pt;font-weight:bold\">5. 질문 방식을 통한 주의사항</span></p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:18pt;font-weight:bold\">6. 대화 후의 조치</span></p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\">가해자와의 대화 중에 ‘업무 배제’를 시사하는 발언을 <span style=\"font-weight:bold\">직접적으로</span> 끌어내기는 어렵지만,</p>\r\n\t\t"

    "content": "몇 초 동안 Thought about 증거 수집 방법\n업무 배제(업무에서 의도적으로 제외됨)와 같은 형태의 괴롭힘은, 폭언이나 성희롱처럼 직접적 언행이 남는 것과 달리 ‘무엇을 하지 않았다’는 사실을 입증해야 하는 경우가 많아 증거 확보가 까다롭습니다. 그렇다고 해서 증명 자체가 불가능한 것은 아니며, 다음과 같은 방법을 통해 간접적으로나마 증거를 모을 수 있습니다.\n업무 기록표(업무일지) 작성\n\n스스로 어떤 업무를 언제, 얼마나 수행했는지, 그리고 원래 배정되어야 하거나 할 것으로 예상되던 업무가 어떻게 진행되고 있는지 지속적으로 기록합니다.\n중요한 것은 ‘내가 특정 업무에 배정되지 않았음’을 단순히 “업무 안 줌”으로 적는 것이 아니라, “○○프로젝트가 시작됐는데, 담당자가 정해지는 과정에서 나의 의견이나 참여 기회가 배제됨”처럼 구체적 상황을 적는 것입니다.\n\n비교&#183;대조 자료 확보\n\n동일 직급&#183;직무를 가진 동료와 배정 업무량이나 업무 종류를 비교해볼 만한 문서(업무 배분표, 프로젝트 진행표 등)가 있다면 모아두세요.\n예를 들어, 과거에 같은 포지션이었는데 내가 빠지고 다른 사람이 추가로 투입되었다는 기록 등을 확인&#183;캡처하여 저장합니다.\n\n회의&#183;교육&#183;연수 참석 여부 기록\n\n중요한 의사결정 회의나 교육, 연수, 출장 등에 본인이 의도적으로 제외된 사례가 있다면, 해당 일정&#183;장소&#183;참석자 목록 등을 따로 기록해 둡니다.\n공지 메일이나 사내공지 게시글에 참석자 명단이 있거나, 과거에는 함께 참여했던 행사를 갑자기 내게만 안내하지 않았다는 정황이 있다면 이를 증거화(캡처&#183;PDF저장 등)해 둡니다.\n공식 문서&#183;메일&#183;메신저 내역\n\n인사발령(프로젝트 배치, 직무 조정 등)이나 업무지시가 공식적으로 내려오는 경우, 해당 문서를 잘 보관하고 필요하면 캡처나 PDF로 저장해 두세요.\n‘누락’을 증명하기 위해서는, 다른 사람에게는 갔지만 나에게는 오지 않은 메일이나 안내 사항도 간접 증거가 됩니다.\n공문이나 전자결재 시스템에서 배제 정황을 확인할 수 있는 경우, 출력 또는 캡처하여 별도 폴더에 정리하세요.\n\n사내 시스템(그룹웨어, 프로젝트 툴 등) 로그\n\n프로젝트 관리 툴, 협업 툴, 전자결재 시스템 등에 자신의 권한이나 접근 권한이 의도적으로 축소&#183;차단됐다는 기록이 있을 수 있습니다(예: 문서 열람 권한이 예고 없이 박탈).\n해당 사실을 발견하면, 가능한 한 ‘언제부터 권한이 사라졌는지’ 그 시점과 함께 캡처 화면을 확보해 두세요.\n\n공식적인 고충접수&#183;노동조합 신고\n\n회사 내 고충 처리 절차, 익명 제보 제도가 있다면, 일단 공식 채널로 문제를 제기해보는 것도 하나의 방법입니다.\n고충 접수를 하면, 해당 내용에 대한 회사의 처리 과정&#183;답변이 공식 문서로 남습니다. 이는 훗날 “이 시점에 문제를 제기했는데 회사가 어떤 조치를(혹은 조치를 하지) 했는지”를 명확히 보여줄 수 있는 근거가 됩니다.\n동료&#183;상사&#183;부하직원 증언\n\n함께 근무했던 동료나, 같은 팀&#183;프로젝트에서 근무하는 인원이 “당신이 해야 할 업무가 실제로 다른 사람에게 넘어갔다”거나 “회의 참석에서 배제됐다”는 사실을 알고 있다면, 그들에게 당시 상황을 기억해둘 수 있도록 부탁해 둡니다.\n증인을 명확히 확보하기는 부담스러울 수 있지만, 부당 행위를 여러 사람이 인지하고 있다는 점 자체가 추후 유리한 근거가 됩니다.\n\n대화 기록&#183;메모\n\n“이번 업무는 ○○씨가 안 해도 된다(혹은 하지 마라)”라는 식의 언급이 있었다면, 언제&#183;어디서&#183;누가&#183;무슨 이유로 그런 말을 했는지 메모로 남겨 두세요.\n녹음의 경우 법적 이슈(사생활 보호, 불법 녹취 우려 등)가 있으므로, 반드시 합법적 방식을 확인하거나 전문가 의견을 얻은 후 진행하시는 것이 좋습니다.\n\n이전 업무 이력과의 비교\n\n이전에는 어떤 업무를 맡았고, 어느 정도 성과와 평판을 쌓았는지를 정리해두세요.\n“갑자기 나만 업무에서 제외되기 시작했다”는 점이 시기적으로나 맥락상 납득하기 어려움을 보여줄 수 있습니다.\n\n본인이 받아야 할 업무가 정상적으로 배정되지 않고 있음(배정 업무 현황 수집)\n다른 동료들에 비해 상대적으로 불합리하게 소외되고 있음(비교 자료 확보)\n회사가 이 사실을 알고도 조치를 하지 않고 있음(공식 보고&#183;고충제기 이력)\n1. 업무 현황과 배제 정황을 ‘기록’으로 남기기\n2. 회사 내부 체계를 활용한 증거화\n3. 간접 증거와 증인 확보\n“무엇을 하지 않았다”**는 사실조차도 여러 정황과 문서를 통해 간접적으로 드러낼 수 있습니다. 즉,"
  }
];
const CONTENT_HASH = 'f9d8bb3d';

let cards = [];
let moving = null, resizing = null;
let selectedIdx = null, clipboardCard = null;
const GRID = 20, GAP = 14;
function snap(v) { return Math.round(v / GRID) * GRID; }

// ── Undo (Ctrl+Z) ────────────────────────────────────────────────────────────
const MAX_HISTORY = 50;
let history = [];
function snapshot() {
  syncText();
  history.push(JSON.stringify(cards));
  if (history.length > MAX_HISTORY) history.shift();
}
function undo() {
  if (!history.length) { showStatus('되돌릴 내용 없음'); return; }
  syncText();
  cards = JSON.parse(history.pop());
  renderCards();
  saveBoard();
  showStatus('↩ 되돌림');
}
function showStatus(msg) {
  const s = document.getElementById('status');
  s.textContent = msg;
  clearTimeout(showStatus._t);
  showStatus._t = setTimeout(() => { s.textContent = ''; }, 2000);
}
document.addEventListener('keydown', e => {
  const isText = document.activeElement?.contentEditable === 'true';
  if ((e.ctrlKey || e.metaKey) && e.key === 'z' && !e.shiftKey) {
    if (isText) return;
    e.preventDefault();
    undo();
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'c' && !e.shiftKey && !isText) {
    if (selectedIdx !== null && cards[selectedIdx]) {
      syncText();
      clipboardCard = JSON.parse(JSON.stringify(cards[selectedIdx]));
      showStatus('카드 복사됨');
      e.preventDefault();
    }
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'v' && !e.shiftKey && !isText) {
    if (clipboardCard) {
      e.preventDefault();
      snapshot();
      const nc = JSON.parse(JSON.stringify(clipboardCard));
      nc.x = (nc.x || 0) + 30; nc.y = (nc.y || 0) + 30;
      cards.push(nc);
      selectedIdx = cards.length - 1;
      renderCards(); saveBoard();
      showStatus('카드 붙여넣음');
    }
  }
  if (e.key === 'Escape') {
    document.querySelectorAll('.card.selected').forEach(c => c.classList.remove('selected'));
    selectedIdx = null;
  }
});

function pushCards(movedIdx) {
  const moved = cards[movedIdx];
  const movedEl = document.querySelector(`.card[data-idx="${movedIdx}"]`);
  if (!movedEl) return;
  const mh = movedEl.offsetHeight;
  document.querySelectorAll('.card').forEach(el => {
    const i = +el.dataset.idx;
    if (i === movedIdx) return;
    const c = cards[i], oh = el.offsetHeight;
    if (moved.x < (c.x+(c.w||200)) && (moved.x+(moved.w||200)) > c.x && moved.y < (c.y+oh) && (moved.y+mh) > c.y) {
      c.y = moved.y + mh + GAP;
      el.style.top = c.y + 'px';
    }
  });
}

function loadBoard() {
  const saved = localStorage.getItem(SAVE_KEY);
  const savedHash = localStorage.getItem(SAVE_KEY + ':hash');
  let parsed = null;
  try { parsed = saved ? JSON.parse(saved) : null; } catch(e) {}
  // reset if: no save, empty array, or content hash changed (page regenerated)
  if (!parsed || parsed.length === 0 || savedHash !== CONTENT_HASH) {
    cards = DEFAULT_CARDS.map(c => ({...c}));
    localStorage.removeItem(SAVE_KEY);
    localStorage.setItem(SAVE_KEY + ':hash', CONTENT_HASH);
    renderCards();
    const hasCoords = cards.some(c => c.x !== undefined && c.y !== undefined);
    if (!hasCoords) autoLayout();
    return;
  }
  cards = parsed;
  renderCards();
}
function resetToDefaults() { if (!confirm('저장된 보드를 지우고 원본으로 초기화합니다. 계속할까요?')) return; localStorage.removeItem(SAVE_KEY); cards = DEFAULT_CARDS.map(c => ({...c})); renderCards(); autoLayout(); }

function autoLayout() {
  const boardW = document.getElementById('board').offsetWidth;
  const cols = Math.max(1, Math.floor(boardW / 280));
  const colW = (boardW - GAP*(cols-1)) / cols;
  const colH = new Array(cols).fill(0);
  const allCards = document.querySelectorAll('.card');
  const images = document.querySelectorAll('.card img');
  let loaded = 0;
  function place() {
    allCards.forEach((el, i) => {
      const w = Math.min(cards[i].w || colW, colW);
      let minCol = 0;
      for (let c = 1; c < cols; c++) if (colH[c] < colH[minCol]) minCol = c;
      cards[i].x = minCol * (colW + GAP);
      cards[i].y = colH[minCol];
      cards[i].w = w;
      el.style.left = cards[i].x + 'px';
      el.style.top = cards[i].y + 'px';
      el.style.width = w + 'px';
      colH[minCol] = cards[i].y + el.offsetHeight + GAP;
    });
    document.getElementById('board').style.minHeight = (Math.max(...colH) + 100) + 'px';
    saveBoard();
  }
  if (!images.length) { requestAnimationFrame(place); return; }
  images.forEach(img => {
    if (img.complete) { loaded++; if (loaded >= images.length) requestAnimationFrame(place); }
    else { img.onload = img.onerror = () => { loaded++; if (loaded >= images.length) requestAnimationFrame(place); }; }
  });
}

function syncText() {
  document.querySelectorAll('.card').forEach(el => {
    const i = +el.dataset.idx;
    if (cards[i]?.type === 'text') { const t = el.querySelector('.text'); if (t) cards[i].content = t.innerHTML; }
  });
}
function saveBoard() { syncText(); localStorage.setItem(SAVE_KEY, JSON.stringify(cards)); localStorage.setItem(SAVE_KEY + ':hash', CONTENT_HASH); showStatus('저장됨 ' + new Date().toLocaleTimeString()); }

function renderCards() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  cards.forEach((card, i) => {
    const el = document.createElement('div');
    el.className = 'card'; el.dataset.idx = i;
    if (card.x !== undefined) el.style.left = card.x + 'px';
    if (card.y !== undefined) el.style.top = card.y + 'px';
    // html cards contain raw OneNote table HTML which may overflow the stated div width
    if (card.w) { if (card.type === 'html') el.style.minWidth = card.w + 'px'; else el.style.width = card.w + 'px'; }
    el.addEventListener('mousedown', e => {
      if (e.target.closest('.text, a, .card-btn, .resize-handle, td, th')) return;
      e.preventDefault();
      // Update selection
      document.querySelectorAll('.card.selected').forEach(c => c.classList.remove('selected'));
      selectedIdx = i; el.classList.add('selected');
      snapshot();
      moving = { idx: i, startX: e.clientX, startY: e.clientY, origX: card.x||0, origY: card.y||0 };
      el.classList.add('moving');
    });
    const actions = document.createElement('div'); actions.className = 'card-actions';
    const delBtn = document.createElement('button'); delBtn.className = 'card-btn'; delBtn.textContent = '×';
    delBtn.onclick = e => { e.stopPropagation(); if(confirm('삭제?')) { snapshot(); cards.splice(i,1); renderCards(); saveBoard(); } };
    actions.appendChild(delBtn); el.appendChild(actions);
    if (card.type === 'text') {
      const text = document.createElement('div'); text.className = 'text'; text.contentEditable = true;
      text.innerHTML = card.content || '';
      text.addEventListener('focus', () => { snapshot(); });
      text.addEventListener('blur', () => { card.content = text.innerHTML; saveBoard(); });
      el.appendChild(text);
    } else if (card.type === 'image') {
      const img = document.createElement('img');
      img.src = card.src.startsWith('http') || card.src.startsWith('data:') ? card.src : IMG_BASE + card.src;
      img.alt = ''; img.loading = 'lazy'; img.onerror = () => img.style.display = 'none';
      if (card.w) img.style.width = card.w + 'px';
      if (card.h) img.style.height = card.h + 'px';
      if (card.link) { const a = document.createElement('a'); a.href = card.link; a.target = '_blank'; a.appendChild(img); el.appendChild(a); }
      else { el.appendChild(img); }
      if (card.caption) { const cap = document.createElement('div'); cap.style.cssText = 'font-size:11px;color:#8b949e;margin-top:4px;word-break:break-word;padding:0 2px;'; cap.textContent = card.caption; el.appendChild(cap); }
    } else if (card.type === 'html') {
      const wrapper = document.createElement('div');
      wrapper.style.cssText = 'overflow:auto;font-size:13px;line-height:1.5;';
      wrapper.innerHTML = card.html.replace(/__ATTACHMENT__/g, IMG_BASE);
      wrapper.querySelectorAll('img').forEach(img => { img.style.maxWidth = '100%'; img.style.height = 'auto'; img.draggable = false; });
      wrapper.querySelectorAll('a').forEach(a => { a.target = '_blank'; a.style.color = '#6cb0f6'; });
      wrapper.querySelectorAll('table').forEach(t => { t.style.borderCollapse = 'collapse'; });
      wrapper.querySelectorAll('td,th').forEach(td => {
        td.style.border = '1px solid #444'; td.style.padding = '4px 6px'; td.style.verticalAlign = 'top';
        td.title = '더블클릭으로 편집';
        td.addEventListener('dblclick', function(e) {
          e.stopPropagation();
          snapshot();
          this.contentEditable = 'true';
          this.style.outline = '2px solid #388bfd';
          this.style.background = 'rgba(56,139,253,0.08)';
          this.focus();
        });
        td.addEventListener('blur', function() {
          this.contentEditable = 'false';
          this.style.outline = '';
          this.style.background = '';
          cards[i].html = wrapper.innerHTML.split(IMG_BASE).join('__ATTACHMENT__');
          saveBoard();
        });
      });
      el.appendChild(wrapper);
    } else if (card.type === 'table') {
      const rows = card.rows || [['','',''],['','',''],['','','']];
      const tbl = document.createElement('table');
      tbl.style.cssText = 'border-collapse:collapse;width:100%;font-size:13px;';
      rows.forEach((row, ri) => {
        const tr = tbl.insertRow();
        row.forEach((cell, ci) => {
          const td = document.createElement(ri === 0 ? 'th' : 'td');
          td.contentEditable = true;
          td.style.cssText = 'border:1px solid #30363d;padding:4px 8px;min-width:60px;text-align:left;' + (ri===0 ? 'background:#21262d;font-weight:600;' : '');
          td.textContent = cell;
          td.addEventListener('blur', () => { if (!cards[i].rows) cards[i].rows = rows; rows[ri][ci] = td.textContent; saveBoard(); });
          tr.appendChild(td);
        });
      });
      el.appendChild(tbl);
      const addRow = document.createElement('button');
      addRow.textContent = '+ 행'; addRow.style.cssText = 'margin-top:4px;font-size:11px;background:#21262d;border:1px solid #30363d;color:#8b949e;padding:2px 8px;border-radius:4px;cursor:pointer;';
      addRow.onclick = e => { e.stopPropagation(); snapshot(); if (!cards[i].rows) cards[i].rows = rows; cards[i].rows.push(new Array(cards[i].rows[0].length).fill('')); renderCards(); saveBoard(); };
      const addCol = document.createElement('button');
      addCol.textContent = '+ 열'; addCol.style.cssText = 'margin-top:4px;margin-left:4px;font-size:11px;background:#21262d;border:1px solid #30363d;color:#8b949e;padding:2px 8px;border-radius:4px;cursor:pointer;';
      addCol.onclick = e => { e.stopPropagation(); snapshot(); if (!cards[i].rows) cards[i].rows = rows; cards[i].rows.forEach(r => r.push('')); renderCards(); saveBoard(); };
      el.appendChild(addRow); el.appendChild(addCol);
    }
    const rh = document.createElement('div'); rh.className = 'resize-handle';
    rh.addEventListener('mousedown', e => { e.preventDefault(); e.stopPropagation(); snapshot(); resizing = { idx: i, startX: e.clientX, startW: card.w || el.offsetWidth }; });
    el.appendChild(rh);
    if (i === selectedIdx) el.classList.add('selected');
    board.appendChild(el);
  });
  requestAnimationFrame(() => {
    let maxB = 0;
    document.querySelectorAll('.card').forEach(el => { const b = (parseFloat(el.style.top)||0) + el.offsetHeight; if (b > maxB) maxB = b; });
    board.style.minHeight = (maxB + 100) + 'px';
  });
}

document.addEventListener('mousemove', e => {
  if (moving) {
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`); if (!el) return;
    let nx = moving.origX + e.clientX - moving.startX, ny = moving.origY + e.clientY - moving.startY;
    if (e.shiftKey) { nx = snap(nx); ny = snap(ny); el.style.outline = '1px dashed rgba(240,192,64,0.3)'; } else { el.style.outline = ''; }
    el.style.left = nx + 'px'; el.style.top = ny + 'px';
  }
  if (resizing) {
    let nw = resizing.startW + e.clientX - resizing.startX; if (e.shiftKey) nw = snap(nw);
    cards[resizing.idx].w = Math.max(100, nw);
    const el = document.querySelector(`.card[data-idx="${resizing.idx}"]`); if (el) el.style.width = cards[resizing.idx].w + 'px';
  }
});

document.addEventListener('mouseup', e => {
  if (moving) {
    let nx = moving.origX + e.clientX - moving.startX, ny = moving.origY + e.clientY - moving.startY;
    if (e.shiftKey) { nx = snap(nx); ny = snap(ny); }
    cards[moving.idx].x = Math.max(0, nx); cards[moving.idx].y = Math.max(0, ny);
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`); if (el) { el.classList.remove('moving'); el.style.outline = ''; }
    if (e.shiftKey) pushCards(moving.idx);
    moving = null; saveBoard();
  }
  if (resizing) { if (e.shiftKey) pushCards(resizing.idx); resizing = null; saveBoard(); }
});

function addTextCard() { snapshot(); cards.push({ type: 'text', content: '', x: 50, y: window.scrollY+100, w: 300 }); renderCards(); setTimeout(() => { const els = document.querySelectorAll('.card .text'); els[els.length-1]?.focus(); }, 100); }
function addImageCard() { const input = document.createElement('input'); input.type = 'file'; input.accept = 'image/*'; input.onchange = e => { const f = e.target.files[0]; if (!f) return; const r = new FileReader(); r.onload = () => { snapshot(); cards.push({ type: 'image', src: r.result, x: 50, y: window.scrollY+100, w: 240 }); renderCards(); saveBoard(); }; r.readAsDataURL(f); }; input.click(); }
function addImageUrl() { const url = prompt('이미지 URL'); if (!url) return; snapshot(); cards.push({ type: 'image', src: url, x: 50, y: window.scrollY+100, w: 240 }); renderCards(); saveBoard(); }
function addTableCard() {
  const colsStr = prompt('열 수 (기본 3)', '3'); const cols = Math.max(1, parseInt(colsStr)||3);
  const rowsStr = prompt('행 수 (헤더 포함, 기본 4)', '4'); const rows = Math.max(1, parseInt(rowsStr)||4);
  snapshot();
  cards.push({ type: 'table', rows: Array.from({length: rows}, (_, ri) => Array.from({length: cols}, (_, ci) => ri===0 ? `열${ci+1}` : '')), x: 50, y: window.scrollY+100, w: Math.max(240, cols*100) });
  renderCards(); saveBoard();
}
function exportBoard() { syncText(); const blob = new Blob([JSON.stringify(cards, null, 2)], { type: 'application/json' }); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = SAVE_KEY + '.json'; a.click(); }
// ── Zoom ─────────────────────────────────────────────────────────────────────
let zoom = parseFloat(localStorage.getItem('zoom-' + SAVE_KEY) || '1.0');
function applyZoom() {
  const board = document.getElementById('board');
  board.style.transform = `scale(${zoom})`;
  board.style.transformOrigin = '0 0';
  document.getElementById('zoom-level').textContent = Math.round(zoom * 100) + '%';
  localStorage.setItem('zoom-' + SAVE_KEY, zoom);
}
function zoomIn()  { zoom = Math.min(3.0, parseFloat((zoom + 0.1).toFixed(2))); applyZoom(); }
function zoomOut() { zoom = Math.max(0.2, parseFloat((zoom - 0.1).toFixed(2))); applyZoom(); }
document.addEventListener('keydown', e => {
  if (e.ctrlKey || e.metaKey) {
    if (e.key === '=' || e.key === '+') { e.preventDefault(); zoomIn(); }
    if (e.key === '-')                  { e.preventDefault(); zoomOut(); }
    if (e.key === '0')                  { e.preventDefault(); zoom = 1.0; applyZoom(); }
  }
});
document.getElementById('board').addEventListener('wheel', e => {
  if (!(e.ctrlKey || e.metaKey)) return;
  e.preventDefault();
  e.deltaY < 0 ? zoomIn() : zoomOut();
}, { passive: false });
applyZoom();
function resetLayout() { if (!confirm('자동 재배치합니다.')) return; cards.forEach(c => { delete c.x; delete c.y; }); renderCards(); autoLayout(); }
// ── Floating format toolbar ───────────────────────────────────────────────────
const fmtBar = document.getElementById('format-toolbar');
function fmt(cmd) { document.execCommand(cmd, false, null); saveBoard(); }
function fmtLink() {
  const sel = window.getSelection();
  if (!sel || sel.isCollapsed) return;
  const url = prompt('링크 URL 입력', 'https://');
  if (!url) return;
  document.execCommand('createLink', false, url);
  // make links open in new tab
  sel.anchorNode?.parentElement?.closest('a')?.setAttribute('target', '_blank');
  document.querySelectorAll('.text a').forEach(a => a.target = '_blank');
  saveBoard();
}

// prevent format buttons from blurring contenteditable
fmtBar.addEventListener('mousedown', e => e.preventDefault());

document.addEventListener('selectionchange', () => {
  const sel = window.getSelection();
  if (!sel || sel.isCollapsed || !sel.toString().trim()) { fmtBar.style.display = 'none'; return; }
  // only show if selection is inside a .text element
  const anchor = sel.anchorNode;
  if (!anchor) { fmtBar.style.display = 'none'; return; }
  const textEl = anchor.nodeType === 1 ? anchor.closest('.text') : anchor.parentElement?.closest('.text');
  if (!textEl) { fmtBar.style.display = 'none'; return; }
  // position above selection
  const range = sel.getRangeAt(0);
  const rect = range.getBoundingClientRect();
  fmtBar.style.display = 'flex';
  const tbW = fmtBar.offsetWidth || 180;
  let left = rect.left + rect.width / 2 - tbW / 2;
  left = Math.max(8, Math.min(left, window.innerWidth - tbW - 8));
  fmtBar.style.left = left + 'px';
  fmtBar.style.top = (rect.top - 44 + window.scrollY) + 'px';
});

setInterval(saveBoard, 30000);
loadBoard();
</script>
</body>
</html>
