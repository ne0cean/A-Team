<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>회의록_정제</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1e1e1e; color: #e0e0e0; font-family: 'Segoe UI', -apple-system, sans-serif; font-size: 15px; line-height: 1.6; padding: 20px 30px 60px; overflow-x: hidden; }
a { color: #6cb0f6; text-decoration: none; }
a:hover { text-decoration: underline; }
.title-bar { background: #3a3a5c; display: inline-block; padding: 6px 16px; font-size: 22px; font-weight: bold; color: #fff; margin-bottom: 4px; }
.date { color: #999; font-size: 13px; margin-bottom: 20px; }
.board { position: relative; }
.card { background: #2a2a2a; border: 1px solid #3a3a3a; border-radius: 8px; padding: 12px; position: absolute; cursor: grab; transition: box-shadow 0.15s; overflow: hidden; }
.card:hover { box-shadow: 0 0 0 1px #58a6ff; z-index: 10; }
.card.moving { opacity: 0.8; box-shadow: 0 4px 24px rgba(0,0,0,0.6); z-index: 100; cursor: grabbing; }
.card img { width: 100%; border-radius: 4px; display: block; }
.card .text { outline: none; min-height: 20px; white-space: pre-wrap; word-break: break-word; }
.card .text:focus { background: rgba(255,255,255,0.05); border-radius: 4px; padding: 4px; }
.card .text:empty::before { content: '텍스트 입력...'; color: #555; }
.card-actions { position: absolute; top: 4px; right: 4px; display: none; gap: 4px; }
.card:hover .card-actions { display: flex; }
.card-btn { background: #333; border: 1px solid #555; color: #ccc; border-radius: 4px; padding: 2px 6px; font-size: 11px; cursor: pointer; }
.card-btn:hover { background: #444; color: #fff; }
.resize-handle { position: absolute; bottom: 0; right: 0; width: 16px; height: 16px; cursor: se-resize; opacity: 0; }
.card:hover .resize-handle { opacity: 0.6; }
.resize-handle::after { content: ''; position: absolute; bottom: 3px; right: 3px; width: 8px; height: 8px; border-right: 2px solid #666; border-bottom: 2px solid #666; }
.card.selected { box-shadow: 0 0 0 2px #58a6ff; z-index: 5; }
.highlight-red { color: #ff6b6b; }
.highlight-blue { color: #6cb0f6; }
.highlight-gold { color: #f0c040; }
.toolbar { position: fixed; bottom: 0; left: 0; right: 0; background: #161b22; border-top: 1px solid #30363d; padding: 8px 20px; display: flex; gap: 12px; align-items: center; z-index: 200; }
.toolbar button { background: #21262d; border: 1px solid #30363d; color: #e0e0e0; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; }
.toolbar button:hover { background: #30363d; }
.toolbar .status { color: #8b949e; font-size: 12px; margin-left: auto; }
#format-toolbar { position: fixed; display: none; background: #1c2128; border: 1px solid #444c56; border-radius: 8px; padding: 4px 6px; gap: 2px; align-items: center; z-index: 500; box-shadow: 0 4px 16px rgba(0,0,0,0.5); }
#format-toolbar button { background: none; border: none; color: #cdd9e5; padding: 4px 8px; border-radius: 5px; cursor: pointer; font-size: 13px; line-height: 1; }
#format-toolbar button:hover { background: #373e47; }
#format-toolbar .sep { width: 1px; height: 16px; background: #444c56; margin: 0 2px; }
</style>
</head>
<body>
<div class="title-bar" contenteditable="true">회의록_정제</div>
<div class="date">2025년 3월 11일 화요일</div>
<div class="board" id="board"></div>
<div id="format-toolbar">
  <button onmousedown="e=>e.preventDefault()" onclick="fmt('bold')" title="굵게"><b>B</b></button>
  <button onclick="fmt('italic')" title="기울임"><i>I</i></button>
  <button onclick="fmt('underline')" title="밑줄"><u>U</u></button>
  <div class="sep"></div>
  <button onclick="fmtLink()" title="링크 삽입">🔗</button>
  <button onclick="fmt('unlink')" title="링크 제거">✂</button>
</div>
<div class="toolbar">
  <button onclick="undo()" title="Ctrl+Z">↩ 실행취소</button>
  <button onclick="addTextCard()">+ 텍스트</button>
  <button onclick="addImageCard()">+ 이미지</button>
  <button onclick="addImageUrl()">+ 이미지 URL</button>
  <button onclick="addTableCard()">+ 표</button>
  <button onclick="saveBoard()">💾 저장</button>
  <button onclick="exportBoard()">📤 내보내기</button>
  <button onclick="resetLayout()">↺ 재배치</button>
  <button onclick="resetToDefaults()" style="color:#f85149">↺ 초기화</button>
  <div style="display:flex;align-items:center;gap:4px;margin-left:8px;border-left:1px solid #30363d;padding-left:12px;">
    <button onclick="zoomOut()" title="Ctrl+-" style="padding:6px 10px;">−</button>
    <span id="zoom-level" style="font-size:12px;color:#8b949e;min-width:36px;text-align:center;">100%</span>
    <button onclick="zoomIn()" title="Ctrl+=" style="padding:6px 10px;">+</button>
  </div>
  <span class="status" id="status">Ready</span>
</div>
<script>
const SAVE_KEY = 'board-회의록-정제';
const IMG_BASE = '../../attachments/';
const DEFAULT_CARDS = [
  {
    "type": "text",
    "x": 936,
    "y": 103,
    "w": 389,
    "content": "(TM) 에이닷은 다 좀 얘기를 하는데 그 기반에서 얘기를 해보자. 그러니까 이 뒤에 있는 얘기처럼 왜 우리는 (AI사업들을) 계속해야 되고 이게 실제로는 아무리 계속해도 안 되는 일에 절벽은 뭐라고 지금 생각하며 이걸 계속해서 어느 타이밍과 국가에 무엇을 우리가 관심 잡고 가라고 이게 아마 회사의 패션이 될 텐데 거기에 대해서 뭔가 리스크를 해야 될 것 같은데 지금에 있는 얘기는 좀 이렇게 하면 이렇다라는 얘기까지는 알겠는데\n(CEO) 에이닷은 이것은 궁극적으로 궁극적으로 AI 서비스를 글로벌 스케일로 안 하고 진짜 잘할 수 있느냐라는 질문이 있음.\n이게 사실은 국내에서 좀 국내에서 어느 정도 잘하기는 가능은 할 것 같은데, (얼마나 잘할 수 있을지는 모르지만) 그렇게 보면 또 글로벌을 가야 되는데 에이닷 가지고 글로벌 나가기 어려우니 지금 이제 에스터 가지고 같이 하는 거지만 글로벌 판은 훨씬 더 어려운 판이고 거기에 더해서 전 세계 텔코 중에 AI B2C 서비스를 사실 어그레시브 하게 하고 있는 데는 아무도 없음.\n우리가 혼자 한다 할 수는 있지만 그 텔코 AI 얼라이언스도 그렇게 만들었지만 그런 의미에서 뾰족하게 우리가 진짜 다른 스타트업들 또는 다른 빅테크에 대비해서 글로벌 경쟁에서 승산이 있느냐 이 부분에 대한 고민이 가장 큼.\n그 승산 이 있으려면은 엄청난 리소스가 들어가야 되고 사실은 어찌 보면 지금 오게닉하게 가고 있지만 이노게닉한 m&A를 통한 어떤 그런 시딩 지금 예를 들어 글로벌에서 잘하고 있는 검색이나 이런 회사들을 인수를 하면서 적극적으로 플레이를 해야만, 그래도 한번 볼 수 있지 않을까 그렇게 생각하는데 지금 가고 있는 이 방식으로 했을 때 글로벌에서 진짜 살아남을 수 있을거냐에 대한 퀘스천이 여전히 존재하는 상황임.\n(김용훈) 에이닷상황에 대해서 말씀을 드리면 8페이지를 띄워주시면 좀 좋을 것 같은데요.\n앞서 말씀드렸던 것처럼 지금 현재 에이닷이 시장 내에서 그러면 에이전트로 되게 압도적인 인식을 갖고 있거나 다른 빅테크 서비스 대비 차별적인 어떤 경쟁력을 가지고 있는가?하면 그렇지 않음 것 같음.\n근데 이제 그 이유는 사실 지난 2년 넘게 저희가 이 사업을 해오면서 에이전트 서비스, 저희가 생각하는 에이전트 서비스라고 하는 건 나를 정말 잘 알고 내가 필요한 것을 그때 제안해 주고 내가 필요한 것을 해결해 줄 수 있는 그런 소프트웨어 그래서 기존에 내가 여러 앱을 이용하거나 여러 웹사이트를 다니지 않더라도 얘가 나를 이렇게 서브해 주는 그런 소프트웨어를 만드는 것이 분명히 넥스트 게이트웨이가 될 거라고 생각을 해 왔고 그런 걸 만들어놓는 여정이었다라고 생각함.\n그런데 되돌아보면 사실 그런 시장 아니면 그런 기준 자체가 시장이 없었다는 생각이 듭니다.\n저희가 ChatGPT 이후로 생성형 LLM을 가지고 그렇게 동작하는 모델을 만들기 위한 고민들을 내부적으로 많이 해왔지만 그런 기술은 저희 내부뿐만 아니라 시장 자체도 없고 지금도 없는 상황임.\n그리고 저희가 가지고 있는 내부 데이터라고 하는 것들도 데이터 양은 많습니다.\n여러 가지 종류의 데이터들이 ICT 패밀리 다 합쳐보면 매우 많지만 그 데이터를 어떻게 정제해서 어떻게 연결했을 때 어떻게 에이전트로 동작하게 하는지에 대해서도 사실은 기존 데이터를 가지고 할 수 있는 것들은 한계가 있었던 이유가, 모델 자체가 그 데이터를 다르고 결과를 내는 것 자체가 매우 효과적이지 않았기 때문임.\n(TM)그게 명확히 무슨 얘기야 효과적이지 않다는 거야 뭘 해봤는데 뭐가 효과적이지 않았다는 것인가?\n(김용훈)\n그게 저희가 이제 LLM들이 그런 데이터를 활용하는 방식으로 펑션 콜이라는 기술이 있고 그런 것들이 지금 현존하는 모든 오픈 AI 포함해서 모든 에이전트들이 외부 데이터를 참고할 때 펑션 콜이라는 방식으로 이를 외부 데이터를 연동해서 애들이 그걸 파악하고 생성해서 내보내는 방식으로 진행이 되고 있는데, 이 펑션 풀이라는 것 자체도 사실은 데이터베이스라고 하는 전통적인 어떤 데이터 저장소에 있는 것들 그리고 그런 방식들을 그대로 활용하는 수준 자체가 매우 낮았기 때문에 기존에 모바일 앱이나 웹에서 우리가 이제 직접 사용하는 데이터 방식과 크게 차별화된 방식을 줄 수 없었음.\n그런데 이제 제가 이제 추론 모델에 기대하고 있다는 걸 말씀드리는 건 어떤 의미냐면 모델 자체가 추론 모델이 개선이 되면서 기존의 같은 데이터 형식이라 하더라도 이런 것들을 로우 데이터 그대로 추론 모델에 만약에 전달했을 때 추론 모델이 그런 것들을 훨씬 더 잘 이해하고 저희가 기대하는 방식으로 동작하기 시작 시작했습니다.\n그러다 보니까 저희가 지난 시간 동안에는 에이닷에서 하나의 Use case를 만들려면 그러면 이 Use case를 얘가 이렇게 동작하기 위해서 매우 많은 데이터 가공을 하고 매우 많은 트레이닝을 하는 과정들이 Use case 하나하나가 다 반복이 됐었어야 하는데, 지금은 추론 모델에다 저희가 가지고 있는 로우 데이터들 특히 통화 전문 데이터나 위치 데이터 같은 것들을 특별히 많이 가공하지 않더라도 그런 것들을 많이 집어넣고 어떤 답을 내놓으라고 했을 때 그 답변 수준이 기존에 저희가 열심히 만들어왔던 아니면 지금 시중에 있는 다른 플레이어들이 보이는 것들보다 훨씬 더 좋은 성능을 지금 이미 보이고 있음.\n그렇기 때문에 추론 모델이 보편화가 되고 그리고 더 가격이 싸지고 있는 지금 상황에서 저희가 가지고 있는 그동안의 어떤 에이전트 시스템 기반 위에서 추론 모델을 적용하고 저희가 가지고 있는 데이터를 집어넣으면 드디어 본격적으로 지금부터 에이전트처럼 동작하는 서비스를 만들 수 있는 기술 기반을 저희가 가졌다고 볼 수 있을 것 같고요.\n그런 방식으로 저희가 앞서 말씀드린 것처럼 이제는 좀 더 에이전틱하게 동작하는 그런 서비스를 만들 수 있는 시기가 됐다고 생각하고 이런 것들은 어떻게 보면 저희가 가장 앞에서 이런 기술을 시장에 제안하는 사업자가 되지는 못했지만 시장에 만들어진 그런 기술들을 가장 빠르게 저희가 패스트 팔로워로서 그런 것들을 적용하고 있는 상황인 거고, 이런 것들을 저희가 가지고 있는 고유의 데이터 앞서 말씀드린 그런 통화 데이터나 위치 데이터 같은 것들은 텔코밖에 가지고 있지 않은 데이터이기 때문에 그런 것들을 기반으로 저희가 에이전트가 동작하는 것들을 훨씬 더 잘 만들 수 있는 시기가 이제 되었다는 생각이 듭니다.\nCso 근데 말씀하신 그 기술의 시대는 사실 저희에게만 온 것이 아니라 모두에게 다 같이 왔다고 생각을 하고요.\n에이닷의 전략적 중요성이나 당위성은 말할 필요가 없을 것 같습니다.\n굉장히 중요한 사업이고 저희가 텔코 아니라 AI 컴퍼니 내부에서는 제일 중요한 부분인데요.\n거기는 의심의 여지가 없습니다만 뭘 해야 되는지에 대해서는 조금 논쟁이 붙을 수 있을 것 같습니다.\n지금 계획하고 있는 이 수많은 새로운 피처들이 아니라 1개 혹은 2개의 피처에 굉장히 집중해서 연말까지 그 누가 들어오더라도 여기에서는 절대 뺏기지 않는다라는 것을 저희가 좀 가지고 가는 것이 필요하지 않을까 생각을 하고 있고요.\n그리고 사실 저는 기술 개발과 소프트웨어 개발도 있지만 제휴 쪽도 같이 저희가 봐야 된다고 생각합니다.\n오픈 AI가 카카오와 손잡고 야놀자가 손 잡는 건 저희로서는 어떻게 보면 좀 뼈 아프다고 생각합니다.\n아직 그들은 한국 지사가 없습니다.\n저희가 지금이라도 당장 굉장히 빠르게 이쪽 제휴를 움직여서 연말까지 국내에 있는 어지간한 버티컬의 탑 플레이어들과는 제휴를 완전히 끝내놓는 정도의 속도로 가져가고 또 필요하다면은 글로벌에 있는 AI 버티컬 각 영역에서 탑 플레이어들을 그들이 한국 버전을 무조건 에이닷 혹은 SK 텔레콤과 제휴할 수 있도록 하는 제휴들을 같이 병행해야 이런 것들이 저는 해자가 되지 않을까 하고 있는데 결국은 속도의 문제가\n(정석근) 저는 이게 기술의 문제라기 보다는 우리 사업/서비스 전략의 문제 대해서 얘기하고 싶습니다.\n우리가 우리 AI 서비스를 바라보는 관점에 갑자기 SK텔레콤이라는 회사가 어느날 갑자기 네이버를 만들어야지라고 하고 있는 부분 그래서 사실 사업 전략이라는 기존에 우리가 하고 있던 레버리지에서 점진적으로 개선이 되고 자연스럽게 확장되는 그게 AI 기술 특징 자체가 데이터를 가지고 성장하는 거기 때문에 그러면 우리가 기존에 우리 mno 사업이 자연스럽게 확장되는 개념에서 봐야 될 것 같은데요.\n여전히 우리가 기존에 우리가 하고 있던 고객 접점이나 고객 서비스들은 별도의 앱으로 존재하고 또 에이닷라는 또 새로운 서비스를 우리가 만들고 있고 제가 글로벌에 나가서도 그렇지만 그런 레버리지는 아무것도 없이 그냥 완전히 새로운 점을 찍고 있는 부분이 사실 저희는 굉장히 잘 활용할 수 있는 걸 활용하지 않고 완전히 맨 땅에 헤딩을 하고 있는 느낌이 듭니다. 그래서 그 부분이 저는 좀 더 고민이 드는 거고요.\n그래서 최근에 아까 사장님 말씀하신 대로 AI 단독 서비스에 대한 것들을 우리만큼 어그레시브 한 데가 없다고 하지만 사실은 T모바일이나 도이치 텔레콤이나 이런 사를 보면 본인들이 기존에 갖고 있는 접점들을 다 한 군데 모으고 거기에 AI를 조금씩 넣어서 계속 접점을 넓혀가고 있는 그래서 본인들의 시작은 본인들이 천 레이트을 줄이고 알푸를 높이고 여기서 출발하지만 또 점점 AI 쪽으로 가고 있는 그런 건 보이는 것 같아요.\n다만 저희는 그 채널이 다 지금 끊어져 있는 것 같다.\n그러니까 기존에 MMO를 AI화하는 건 또 별도로 AI 서비스는 또 별도로 저희가 글로벌은 또 별도로 이게 이제 제가 지금 바라보고 있는 현재 제일 어려움이라고 생각을 합니다.\n(김용훈)말씀하신 것처럼 에이닷이 저희가 가지고 있는 내부 에셋을 좀 더 잘 활용하는 통합하는 방향으로 가야 된다는 걸 적극 공감을 하고요.\n여기도 옵션 제로로 잡혀 있었지만 필요한 부분입니다만 그런 것들이 어떻게 보면 저희가 가지고 있는 텔코의 기존 시스템들이 BSS 같은 레거시 시스템의 변화가 기본적으로 전제가 되어 이제 쓰여 있기 때문에 그런 타임 갭이 있는 거는 어쩔 수 없는 부분인 것 같고 하지만 그런 것들은 지금보다 앞으로 훨씬 더 가속화시켜 나가야 될 부분은 중요한 것 같습니다.\n그런데 정사장님 말씀하신 것처럼 제가 오늘 말씀드렸던 것도 그러니까 텔코가 가능한 부분 저희가 가장 강력하게 할 수 있는 부분에 앵커링을 해서 그런 것들을 중심으로 일상으로 확산해 나가겠다는 말씀을 드리는 거고 그 일상을 확산 영역도 저희가 모든 걸 다 하겠다는 게 처음에 에이닷의 목표였다라고 하면 그럴 수 없다는 걸 저희가 깨달았기 때문에 지금 저희가 선택과 집중을 하고 있는 거고 어디에 집중할 거냐라고 하면 실제로 텔코가 잘 아는 분야로 앞서 나가야 될 텐데 전화 통화라는 것도 기본적으로 일상과 아니면 업무 아니면 개인적인 것들이 여러 가지 일정 같은 것들이 얽혀 있는 부분이 있기 때문에 그런 데이터를 가지고 고객 이해를 하는 데도 도움이 되지만 실제 실제로 이 사람의 어떤 일상의 일정이나 약속, 예약 같은 것들을 잘 다루게 해 주는 것은 매우 유용한 지점이라고 생각을 하고 있습니다.\n그런 지원부터 저희가 출발해 나가고 있고 이런 것들이 어떻게 그러면 시장 내에서 경쟁을 할 거냐라고 보면 사장님도 말씀하셨지만 AI 에이전트라는 건 이제 기술에서 서비스 단계로 넘어왔고 서비스라는 건 곧 다시 말해서 고객 최적화가 필요한 부분이라는 생각이 듭니다.\n빅테크 같은 경우도 보면 전 세계 모든 빅테크들이 에이전트를 만들었다고 하지만 다 똑같은 비슷비슷한 기능을 만들어내고 있고 예를 들어 오픈AI가 그러면 한국 사용자를 위해서 최적화된 에이전트를 만들 거냐라고 그렇지 않을 겁니다.\n그들은 계속 글로벌에서 유니버셜하게 동작하는 리스트에 집중을 할 거지 지역 최적화나 특정 그룹 최적화하지 못할 거거든요.\n또 반대로 그럼 저희 경쟁자라고 할 수 있는 스타트업 같은 경우에 스타트업들이 그러면 저희가 생각하는 에이전트 같은 것들을 잘 만들 수 있을 거냐라고 하면 그것도 현실적으로 어려운 부분이 있습니다.\n왜냐하면 스타트업은 아무래도 속도는 빠르지만 기록에 있어서 한계가 있기 때문에 특정 니치 마켓에서 특정 유스 케이스를 좀 더 잘 해결하는 서비스를 만들 수 있겠지만 AI 기술을 활용해서 그런데 사용자들이 기대하는 에이전트라고 하는 거는 어떤 걸 이거 하나 잘해주면 내가 얘를 써야지라는 시대가 아니라 내가 필요한 일상에 많은 것들을 넓고 조금 얇더라도 그렇게 챙겨주고 알아주는 애가 필요한 거지 그래야 내가 얘를 에이전트로 했다고 말을 거는 거지 어떤 특정 되게 좁은 유스 케이터 하나 잘 해결해 주는 에이전트 서비스를 쓰지는 않을 것 같습니다. 그런 측면에서 봤을 때 어떻게 보면 스타트업과 빅테크 사이에서 저희 정도 규모가 되는 회사가 할 수 있는 규모 그 정도의 그 마켓 분명히 있을 거라고 생각이 들고 그런 부분이 외려 에이전트가 포지셔닝 하는 데 있어서 유리한 지점이 아닐까 싶습니다.\n(CEO) 저는 이게 논쟁 포인트라고 보는데요. 그러니까 어떤 서비스가 엣지 있는 뭔가 고객이 좋아하는 뭔가 하나로 시작해서 거기서 굉장히 강력한 이 파워 밸류를 만들고 그 다음에 옆으로 번져나가는 그런 기존의 어떤 플랫폼 서비스의 모델, 네이버가 검색에서 지금까지 이렇게 해왔듯이 그런 것이 맞는 건지 지금 김용훈 사업부장이 이야기하는 고객이 필요한 것들을 어느 정도 다 A부터 Z까지 다 만족해야만 에이전트 서비스는 의미가 있을 거다.\n이 두 가지 가설에서의 포인트가 뭐냐라고 보는데 사실 이걸 다 해주는 회사는 지금 없는 것 같아요.\n지금 어찌 보면 글로벌이 딱 떠오르고 있는 유일한 AI 에이전트가 지금 검색이 현재는 굉장히 유력하게 나오고 있는 것 같습니다.\n퍼플렉시티도 그렇고 검색이 아무래도 AI 에이전트의 가장 뾰족한 부분이다라고 많은 사람들이 생각하고 있고 그래서 검색에 일단 많은 스타트업들이 집중을 하고 있고 이거는 이제 기존에 큰 네이버나 구글의 어떤 검색을 먹을 수 있다는 그런 파이도 있기 때문에 그 부분을 이제 뾰족하게 들어가는 부분인데 저희는 이제 그 부분은 지금 제휴를 통해서 풀고 있고 이제 전체적으로 다 만족시켰다 이렇게. 제 생각에 국내에서만 플레이를 한다면 그것도 가능한 이야기인 것 같습니다.\nSK텔레콤의 어떤 파워와 여러 가지 제휴를 통해서 국내에서 이 정도 플레이를 하는 거는 가능할 것 같은데 글로벌리는 그 정도의 플레이를 하기가, 우리가 가지고 있는 리소스도 없고 또 그렇게 가기는 굉장히 어려운 부분이 아닌가 그런 고민이 있음.\n(참석자7 - 이종호)\n기본적으로 에이닷이 일단 지향해야 될 노리그렛 인터넷으로 지향해야 첫 번째는 MMO 관련된 서비스에 대해서는 풀리 AI로 뭔가 이제 서비스가 제공돼야 된다는 구체적으로 그러니까 우리 고객이면 우리 서비스라든지 이런 거 필요한 거는 AI로 다 될 수 있는 데 그거는 이제 저희 노리그렛으로 해야 되는 거고 서비스 관점에서는 저는 저희가 시행착오를 좀 많이 했다고 보는데 지금 8페이지 보면 2번에 해당하는 부분이 사실 저는 우리가 찾을 수 있지 않나 생각을 하는데 저는 사실 개인화 관련한 부분은 사실 우리가 그렇게 세지는 않다고 봐요.\n데이터가 많다는 거지 그걸 우리가 우리가 서비스에 개인화할 수 있는 데이터냐에 대해서는 그건 잘 모르겠습니다.\n그리고 실질적으로 서비스가 잘 안 되는데 개인화라는 건 그 다음이거든요.\n그래서 저는 AI 에이전트가 밸류가 있으라고 그러면 기본적으로 두 가지 내지 세 가지 일 또는 두 가지 내지 세 가지 앱 또는 프로그램을 이용해야지만 결과를 얻어낼 수 있는 그걸 한 번에 줄 수 있어야 되는데 지금 퍼플렉시티 같은 경우가 어쨌든 웹 서치해가지고 갖다 추론해가지고 보고서 형태를 마련해 주는 그렇기 때문에 이제 고객들이 이제 환호하는 거잖아요.\n그래서 저희도 에이닷이 지금 우리는 전화를 할 수 있고 문자를 보낼 수 있는데 그걸 통해서 뭔가 고객이 늘 일상에서 하는 거 주문이라든지 이런 것들을 그 서비스와 앵커해가지고 해주는 그것까지만 저는 그거 하나만 보여주더라도 이거 할 때는 에이닷 써야지인데 저는 지금 에이닷 왜 써야 될지는 잘 모르겠어요.\n잘때 수면 분석하라고 광고를 하는데 사실 그것만 전문으로 하는 데가 훨씬 더 많거든요.\n에이닷을 계속 해야 된다고 그러면 첫 번째는 우리 MMO를 좀 더 강하게 하는거 하나, 둘째는 서비스 관점에서는 좀 피보팅 해가지고 2개 내지 3개의 어떤 그런 작업이 필요한 걸 갖다가 한 번에 해줄 수 있는 그것도 이제 우리의 전화라든지 문자의 코어 비즈니스와 연계한 형태의 그런 포지션을 일단 해가지고 그걸 올해 연말까지로 돼 있는데 저는 이걸 좀 당겨가지고 저희 에이닷이 다시 좀 이렇게 뭔가 하나의 각인되는 것들 퍼플렉시티처럼 검색 아니면 우리는 에 가서 어디에 확인되는 지에 포지션을 해야지 그다음에 이제 좀 더 확장할 수 있지 않을까 그럼 저희는 코어가 없이 너무 이렇게 좀 이렇게 벌린 듯한 느낌임.\n(참석자 8)\n에이닷에 추구하는 궁극적인 투 모델에 대한 부분들이 제가 봤을 때는 합의가 전혀 안 될 것 같아요.\n예를 들어서 박 사장님께서 말씀하셨던 그런 기능에 대한 부분들을 실질적으로 제공하더라도 그게 에이닷의 투비 모델에 대한 공식적으로 발생에 대한 모델에 대한 부분들을 다시 하는 건지 저는 거기에 대한 의구심이 있다고 생각하고요.\n실제로 그런 걸 달성하기 위해서 지금 매년 들어가는 비용에 대한 부분들이 실질적으로 거의 마이너스 2천억씩 계속 까먹고 있다라고 저는 보고 있거든요.\n그렇게 에이전트를 가져올 거면은 네이버가 실제로 AI의 에이전트를 깔아서 쓰는 게 더 빨리 저는 될 것 같은데 에이닷이 갖고 있는 서비스가 전혀 없는 상황에서도 서비스도 해야 되고 에이전트도 붙여야 되는 그런 어려움에 대한 부분들을 왜 가져가야 되는지를 잘 모르겠다라는 생각이 좀 듭니다.\n전략에 대한 부분들은 다 잘 아시겠지만 마이크로 포터 교수도 전략의 본질이 뭡니까?\n저희들이 할 수 있는 것들과 있지만은 과감하게 버릴 수 있는 뭔가를 찾아내서 그 어떤 부분들을 없애는 것이 실질적으로 전략에 대한 부분들이 본질이라고 생각을 하는데 에이닷 뿐만 아니라 나머지 사업부들도 전부 다 제가 봤을 때는 텔레콤이 AI 컴퍼니라고 지향은 하지만 외부에서 보는 냉정한 평가는 텔레콤 AI 사업 안 했으면 좋겠다.\n그 다음에 실질적으로 에이닷에 대한 부분에 대해서도 실질적으로 지금 AI컴퍼니가 되는 것이 맞는지 그런 거에 대한 퀘스턴이 되게 많거든요.\n에이닷 관련된 부분 또궁극적인 투비 모델에 대한 부분들도 명확히 가져가는 것도 좀 더 필요하지 않을까 생각을 김용훈 사업부장님이 생각하는 에이닷의 궁극적인 투비 모델은 무엇이라고 생각하십니까?\n(김용훈)\n말씀하신 것처럼 지금 현존하는 에이전트 류의 서비스가 기존에 같은 종류의 잘 만들어진 애플리케이션을 대체할 수 있을 정도로 충분히 뛰어난가 하면 그렇지 못한 것 같습니다.\n유료화도 있다고 생각을 하는데요. 저희가 디자인을 에이전트라고 하는 거는 사실은 그렇게 내가 앱을 일일이 찾아들어가거나 이 표현하거나 입력을 하지 않더라도 얘가 나의 상황을 잘 알고 나의 의도를 잘 알고 그런 일들을 소소한 그런 것들을 모두 다 대체해 줄 수 있는 그런 서비스가 되길 모두가 바라고 있고 그게 이제 궁극적인 에이전트 회사들의 비전일 텐데 아직 그런 시장 기술 같은 것들이 없는 과도기 상태다 보니까 그런 말씀하신 부문들도 당연히 그런 상황이라는 걸 알 수 있고요.\n그 베이스가 되는 게 사실은 박 사장님 말씀하신 것처럼 저는 어떻게 보면 개인화에서 저는 출발해야 된다고 봅니다. 그러니까 액션이라는 게 사실 에이전트의 역량을 직접적으로 보여줄 수 있는 가장 필요한 최종 액션인 건 맞습니다.\n에이전트 이콜 내가 필요한 부분을 대신 해 주는 게 당연히 목적일 텐데 그러려면 사실은 나에 대한 이해가 없이는 되지 않습니다. 왜냐하면 에이전트 이콜 개인화가 되어야 되는게, 내가 만약에 티켓팅을 하거나 얘가 전화를 걸 수 있게 된다고 해서 나 대신 예약 전화를 걸어준다 하더라도 내가 어떤 사람이고 어떤 걸 필요로 하고 내가 누구랑 언제 어떻게 만나는지를 알아야 얘가 나 대신 전화를 해줄 수 있는 거지 그렇지 않으면 전화를 걸 수 있는 기능만 가진 그냥 툴이 되는 거거든요.\n그렇게 되면 얘한테 야 나는 이런 사람이고 아니면 넌 이런 데 해주면 좋겠어 라고 매번 디렉션을 하는 건 사실은 내가 직접 전화 받는 것보다 당연히 편하지 않을 겁니다.\n그렇기 때문에 에이전트의 궁극적인 목적이 나를 대신해서 그런 귀찮은 행동들을 대신해 주는 소프트웨어가 되는 거는 당연히 비전일 거고 그 과정에서 반드시 전제되어야 하는 게 얘가 나에 대한 이해 아니면 내가 필요한 상황에 대한 이해를 얼마나 잘하고 있는지 그게 어떻게 보면 에이전트의 성패를 가르는 어떻게 보면 중요한 분기점이 될 것 같고요.\n지금 그래서 많은 에이전트 사업자들이 어떻게 고객 이해를 높일 거냐 어떤 데이터를 가지고 얘가 고객을 잘 파악하게 만들 거냐에 대한 고민들을 하고 있는데 다른 서비스들 같은 경우에는 내가 직접 이 서비스에 입력하고 주고받은 데이터 정보가 전부입니다.\n그러다 보니까 내가 어떤 걸 입력했을 때 그 시스템을 알아차리면 얘는 이런 걸 좋아하는 것 같아 저런 게 필요한 것 같아라는 몇 개의 힌트들을 가지고 이 사용자들을 추상화하고 있는데 저희 같은 고객 데이터 고객의 일상과 대화 데이터를 많이 갖고 있는 서비스 같은 경우에는 그런 것들을 굳이 고객의 입력에만 의존하지 않고 사용자에 대한 이해를 좀 더 높고 넓게 가져갈 수 있다는 장점이 있을 것 같고 이런 것들을 아마 활용할 수 있는 서비스가 저희가 저희 같은 텔레콤 외에는 메타 같은 SNS 서비스나 카카오톡 같은 회사들이 아마 이런 식의 접근이 가능할 것 같습니다.\n아마 그런 회사들은 비슷한 관점으로 그들이 다 갖고 있는 고객 데이터를 가지고 고객을 이해하는 노력들을 할 거고 그 기반이 돼서 저희와 같은 방식으로 이 에이전트 할 수 있는 액션들을 하나하나 늘려가는 방식으로 시장을 개척해 나가지 않을까 싶습니다.\n(CSO) 에이닷의 전략적 당위성에 대해서는 제가 아까 이제 다 이해할 것이라고 공감할 것이라고 생각해서 말씀을 안 드렸었는데 거기에 대해서 좀 더 말씀을 드리면은, 모르겠습니다. 제가 지금 아까 객관적 현실 인식이라고 해서 경쟁 상대를 지금 혹은 비교 대상을 빅테크로 놓고 혹은 글로벌 탑티어 스타트업으로 놓고 저희가 아쉬운 점이나 그런 점들을 이야기하다 보니 저희가 굉장히 많이 부족하고 혹은 하지 말아야 되는 사업을 하고 있는 것이이라는 생각이 드실 수 있으셨을 것 같은데 절대 그런 건 아니고요.\n저희가 SK텔레콤이 결국 이 에이전트 사업 혹은 이 AI 서비스 사업 특히 B2C 사업을 포기하게 되면 그야말로 정말 덤프 파이프라고 생각합니다.\n지금 그 정도를 어디까지 갈 것이냐 모든 걸 처리해 주는 AI 에이전트가 될 것이냐 ChatGPT와 경쟁에서 이길 것이냐라는 부분은 저희가 고민해야 되는 포인트입니다만 아까 미니멈이라고 생각했던 저희의 mno와 밀 결합하고 저희의 최소한 모든 대고객 창구가 통합되고 그것을 에이전트 서비스를 제공하고 이건 미니멈으로 가야 되는 거라고 생각하고요.\n그 중간에 어딘가를 의사결정하는 지금 저희가 자리라고 생각을 하지 이거 자체의 당위성을 의심할 필요는 없다라고 생각이 됩니다.\n그래서 이거 자체는 지금까지 추진할 수 있었고 또 추진하는 것이 당연했고 그렇기 때문에 추진해 왔는데 앞으로 이 방식대로 그대로 추진할 것이냐라는 부분에 대해서 저희가 고민이 필요한 시점이라고 생각하고 그래서 저는 여전히 미니멈은 이제 MNO를 대변하는 것이라고 생각하는데 거기에 더 중요한 거는 그동안 에이닷에 저희가 충분히 리소스를 모아왔는지도 저희 좀 내부적으로 다시 한 번 저희가 고민해 봐야 된다고 생각합니다.\n여러 가지 분산된 것들이 있기 때문에 저희가 좀 제대로 밀어주고 또 에이닷도 더 집중한다면 가능성은 충분히 있을 것이라고 생각함.\n(정석근)\n제가 지금 애플 앱스토어에 가서 SK 태그 검색해보면, 저희가 지금 나가는 앱이 자잘한 거 빼고 한 20개가 됩니다.\n지금 SK 태그 나가는 그래서 저는 사실 지금 현재 만약에 우리가 AI 서비스를 하는데 그 20개 중에 꽤 많은 걸 하나로 통합해서 그게 SK텔레콤 앱이야라고 하고 거기서부터 만약에 AI를 적용했으면 지금 저희가 에이닷 왜 하지라는 얘기를 거의 안 할 것 같아요.\n너무 당연히 해야 되는 일이었던 것 같고 사실은 거기서 출발해서 거기서 저희가 외부에 좀 파트너십을 한다거나 하면서 좀 확장했으면 그를 현대카드 같은 데도 보면 본인들이 현대카드 업을 하면서 생기는 거 갖고 조금씩 옆으로 나가지 현대카드 업을 안 하면서 옆에 걸 하는 것 같지는 않고요.\n그래서 저도 지난 2년 동안 저도 이게 보면 우리 있는 외부에 여러 가지 앱들을 하나로 합치냐 마냐 이 얘기는 계속 해오긴 했는데 저는 이건 결국 고객 관점에서도 하나로 합쳐지고 예전에는 하나로 합쳐지면 앱이 너무 복잡해졌으니까 괴로웠다면 지금 그래도 AI 덕분에 꽤 쉽게 여러 가지 서비스를 하실 수 있는 에이전트가 됐든 뭐가 됐든 그래서 그런 기술이 되어 있기 때문에 사실 저희는 그건 너무 당연히 해야 되는 거고 그게 됐으면 사실은 이 얘기가 훨씬 저는 훨씬 쉬웠지 않았을까 그런 생각이 듭니다.\n(김용훈) 이게 예전에 처음부터 시작할 때 사실 저희 고객 대상만을 타겟으로 한 게 아니고 국민 전체를 대상으로 저희 서비스를 시작했기 때문에 좀 더 이제 맨 땅에서 시작한 부분들이 있는데 저희가 에이닷이 좀 더 큰 그릇을 지향해오는 과정에서 SK텔레콤 외부 고객들의 이용도 점점 늘어나고 있긴 합니다.\n처음에는 10% 정도 대였는데 지금은 저희가 이제 안드로이드 같은 경우에는 에이닷 전화를 저희 통신 고객이 아닌 고객들도 쓸 수 있게 되고 非 SK 고객의 비율이 점점 증가하고 있는 건 사실인데요.\n밸류업 돼야 된다는 부분에 대해서 당연히 동의를 합니다만 그런 부분에 있어서 아까 시간이 필요하다고 말씀을 드렸던 게 저희가 티월드 T멤버십 그런 것들을 연동하는 노력들을 그동안 저희가 많이 해왔었고 저희 조직 내부에 두면서까지 그런 것들을 주고받는 계약도 많이 해왔었는데 앞서 말씀드린 것처럼 사실은 ATDT라고 하는 기존에 어떻게 보면 음성 인식 시스템에 대한 어떤 AI가 그것들을 활용하고 연결할 수 있게 만들기 위한 기반 시스템 같은 것들이 많이 개비가 되어야 되는 부분들이 있고 그러다 보니까 현실적 한계가 있었고요.\n또 하나는 정책적 결정도 좀 필요합니다. 왜냐하면 저희가 이런 얘기를 하다 보면 어떤 상황에 봉착하게 되냐면 기존의 T월드를 통해서 고객이 액세스 할 수 있는 기능들이 예를 들어 2천 개고요 상품은 200가지를 컨트롤 할 수 있습니다.가입할 수 있습니다라고 나오는데 사실은 그중에서 보면 그 2천 개 기능 중에 한 명 두 명밖에 안 쓰는 기SMD 수 있고 상품 중에 있는 몇 명밖에 안 쓰는 상품들도 있는데 이런 것들을 고객 VOC 대응 아니면 저희가 어떤 그런 기존 완성도 추구라는 미명 하에 이런 것들을 모두 다 마이그레이션을 해야 된다는 그런 강박 같은 것이 있기도 합니다.\n근데 그런 것들을 에이닷이 좀 더 대범한 전환이 필요하다라고 하면 그중에 일부 가지치기 쳐낼 걸 쳐내고 하면서 볼드한 움직임이나 의사결정 같은 것들이 필요한데 저희는 기존의 모든 유즈 케이스를 100% 다 담는 더 좋은 그릇을 만들려는 생각을 하다 보니까 그 지점에서 어떻게 보면 가끔 비현실적인 투자나 아니면 구조 같은 것도 얘기할 수 있는 상황임.\n(CEO) 근데 그 논의는 아까 여기서 이제 수요자 관점 공급자 관점을 이야기했고 수요자 관점에서의 SK텔레콤이 네트워크/ 마케팅/ 커스터머 서비스 모든 채널에 대해서 AI를 적용하는 것은 그것은 당연한 거고 그것은 당연히 추진하는 거예요.\n그거에 대해서 에잉닷하고 아무 관계없이도 그건 추진하는 거지만 그 모든 텔코들이 이제 그걸 하고 있는 거고 우리의 이야기는 지금 오른쪽에 있는 공급자로서의 AI 서비스 즉 지금 우리 고객들한테 지금 커스터머 서비스 조금 더 AI를 잘해준다라는 이야기가 AI 서비스의 본질이라면 사실 그건 우리가 더 이상 논의할 필요도 없지 않느냐 그래서 다른 텔코 하는 것처럼 하면 되는 거고 우리는 거기다 더해서 새로운 어떤 가치를 텔코로서의 이걸 활용할 수도 있고 안 할 수도 있지만 가치를 창출하는 부분에서의 AI B2C를 이야기하기 때문에 훨씬 더 논의가 좀 더 어려운 볼드한 이야기가 되는 것 같습니다. 더더욱이나 아까 말씀드렸다시피 그게 국내로만 해서는 안 된다.\n국내는 솔직히 어떻게든 할 수 있을 것 같아요.\n국내 우리가 여러 가지 에셋도 갖고 있고 여러 가지 제휴도 하고 기술도 뚫고 하면 국내에서 AI 서비스 넘버 1 2 3 안에 드는 것은 어떻게든 할 수 있을 것 같은데 지금 이제 에스터하고 같이 논의를 해야 되는데 이걸 갖고 해외로 나가지 않으면 어렵고 해외에서 프롬 스크래치 하자니 더 어렵고 이 부분이 지금 사실은 또 하나의 큰 고민인 거고 지금 이제 GPAA 사업부에서는 텔코들의 기존 PoC 우리 같은 티월드 같은 데에 AI 에이전트를 붙여서 변화시켜주겠다.\n그게 이제 처음에 작동할 수 있는 이야기긴 한데 그 이후에 우리가 만들어내는 가치란 무엇인가 AI 서비스에서 예를 들어 퍼플렉시티가 검색을 통해서 만들어낸 가치와 같은 그런 가치는 무엇인가에 대해서는 우리 스스로도 답이 없지 않느냐라는 생각이듬.\n(정석근) 저는 개인적으로 아까 말씀드렸던 것은 수요 공급이 떨어지지는 않는다고 생각을 하거든요.\n저는 수요를 우리 아까 사장님이 말씀하신 AI 수요라고 하는 우리 내부를 AI로 바꿔가는 게 자연스럽게 조금 더 확대되면 아마 공급까지 연결될 수 있지 않을까 혹은 우리가 이번에 퍼플렉시티이런 거 연동해서 외부 마케팅 하는 것처럼 글로벌 B2C 회사들의 방법을 만약에 테스트 베드로 저희가 제공해 주고 그거를 만약에 레버리지 할 수 있으면 할 수도 있겠다.\n근데 우리가 티 모바일에 가서 도이치 텔레콤에 가서 니들 기존 앱에다가 AI 넣어줄게라는 얘기를 하는데 정작 우리도 그걸 안 하고 있으면 사실은 얘기는 굉장히 어려워진다.\n그래서 저는 지금 이제 수요를 약간 점진적으로 확대하면 어느 정도 공급이 될 거고 거기에 글로벌 서비스를 테스트 베드를 붙이고 그걸 또 레버리지 하면 또 나갈 수 있는데 저는 그게 좀 약간 각각의 점이라기보다는 선으로 연결될 수 있지 않을까 생각함.\nCSO방금 말씀 주신 부분들이 이제 결국은 옵션의 형태로 정리가 되는 것 같은데요.\n피라미드가 양쪽에 2개가 있다고 해서 저희가 6개 완전히 사업을 하는 거는 전혀 의미가 없고 저희가 이제 지금까지 오히려 이렇게 잘못해왔던 거를 이제 고쳐야 되는 상황인 것이고요.\n결국은 이 수요가 공급으로 연결이 되고 그 다음에 각 층에서도 서로서로 연동이 되어야 됩니다.\n저희가 쓰는 저희가 만든 인프라를 저희가 쓰는 플랫폼이 써야 되는 거고 그 플랫폼을 저희가 서비스가 써줘야 되는 그 연동이 당연히 기본일 것 같아서 그 부분은 저희가 봐야 되는 부분임.\n(TM) 이 하나만 더 좀 다른 것도 비슷한 얘기들 같다고 보는데 당신들이 이 서비스를 하면서 기대하는 바가 뭐야? 그 어느 루트가 있어? 무엇을 기대하고 나는 어느 루트로 간다라고 생각하는게, 처음에 이제 내가 생각하는 가설이 있었을 테고 가설이 워킹 하느냐라고 해서 현실에 가서 부딪쳤더니 가능한 루트라는 게 몇 가지 루트가 있다라는 거지 그럼 그 루트를 되게 사람이 길을 가는 거랑 비슷하잖아.\n그러니까 가다 보는데 모든 길을 다 갈 수가 없잖아.\n근데 그 중에 뭔가를 선택을 할 거 아니야 선택을 할 때 이유가 있지 이리로 가면 빠를 거야. 내지는 뭔가 있다라고 생각하니까 그 밑을 하나는 어떤 필요 충분 조건들이 그 안에 있는 거지. 그런데 조금 가다 보면 그 필요 충분 조건들이 해당이 안 된다고 지금 생각해서 판단을 하면은 이제 루트를 다른 걸로 바꿔야 되는 거야.\n다른 길로 틀겠지. 그런 생각을 해봐.\n그래서 그걸 시나리오 형태로 다시 플래닝을 하든 중간에 마일스톤을 하든 몇 가지 얘기들을 하다 보면 지금 이렇게 그려놓은 것보다 훨씬 정확한 맵을 일단은 그리는 거거든.\n설사 그 맵이 현실일 가능성이 없거나 뭐라고 해도 상관은 없어.\n왜냐하면 맵이라는 거는 처음에 가다가 한 거고 난 계속 시간이 기술과 모든 게 변하니까 그러면 내년이 되면 또 이렇게 또 맵의 방향이 달라집니다.     "content": "(TM) 우리는 왜 AI사업들을 계속해야 되고, 아무리 시도해도 안되는 절벽은 무엇이라고 생각하며, 어느 타이밍과 국가?에 무엇을 우리가 관심을 잡고 갈 것인가가 퀘스천이 될 것임.\n(CEO) 에이닷에 대해서는 궁극적으로 AI 서비스를 글로벌 스케일로 하지 않고서도 진짜 잘할 수 있는가 하는 질문이 있음.\n국내에서 어느 정도 잘 할 수는 있을 것 같지만, 에이닷을 가지고 글로벌 나가기 어려우니 에스터를 같이 하고 있지만, 글로벌 판은 훨씬 더 어려운 판이고, 거기에 더해서 전 세계 Telco 중에 AI B2C 서비스를 사실 공격적으로 하고 있는 데는 아무도 없음.\n우리가 혼자 할 수는 있지만, 우리가 진짜 다른 스타트업들 또는 다른 빅테크에 대비해서 글로벌 경쟁에서 승산이 있느냐 이 부분에 대한 고민이 가장 큼.\n승산 이 있으려면은 엄청난 리소스가 투입되어야 하고, 오가닉하게 가고 있지만 인오가닉한, M&A를 통한 Seeding 예를 들어 글로벌에서 잘하고 있는 검색 회사들을 인수 하면서 적극적으로 플레이를 해야만, 한번 잘 해볼 볼 수 있지 않을까 생각하기도 함. 지금 가고 있는 방식으로 했을 때 글로벌에서 진짜 살아남을 수 있을 것인가에 대한 퀘스천이 여전히 존재함.\n(김용훈) 에이닷에 대해서 말씀을 드리면 앞서 8페이지에서 말씀드렸던 것처럼 현재 에이닷이 시장 내에서 에이전트로써 압도적인 인식을 갖고 있거나 다른 빅테크 서비스 대비 차별적인 경쟁력을 가지고 있지는 않은 것 같음.\n그 이유는 지난 2년 넘게 이 사업을 해오면서 에이전트 서비스, 저희가 생각하는 에이전트 서비스라고 하는 건 나를 정말 잘 알고 내가 필요한 것을 그때 제안해 주고 내가 필요한 것을 해결해 줄 수 있는 그런 소프트웨어, 그래서 기존에 내가 여러 앱을 이용하거나 여러 웹사이트를 오가지 않더라도 나를 서브해 주는 그런 소프트웨어를 만드는 것이 분명히 넥스트 게이트웨이가 될 거라고 생각을 해 왔고, 그런 걸 만들어 놓는 여정이었다고 생각함.\n그런데 되돌아보면 사실 그런 시장, 혹은 그런 기준 자체가 시장에 없었다는 생각이 듬. ChatGPT 이후로 생성형 LLM을 가지고 그렇게 동작하는 모델을 만들기 위한 고민들을 내부적으로 많이 해왔지만 그런 기술은 저희 내부 뿐만 아니라 시장 자체도 없고 지금도 없는 상황임.\n그리고 저희가 가지고 있는 내부 데이터도 데이터 양은 많음. 여러 가지 종류의 데이터들이 ICT 패밀리 다 합쳐보면 매우 많지만 그 데이터를 어떻게 정제해서, 어떻게 연결했을 때, 어떻게 에이전트로 동작하게 하는지에 대해서도 사실은 기존 데이터를 가지고 할 수 있는 것들은 한계가 있었던 이유가, 모델 자체가 그 데이터를 가지고 결과를 내는 것 자체가 매우 효과적이지 않았기 때문임.\n(TM) 명확히, 뭘 해봤는데 뭐가 효과적이지 않았다는 것인가?\n(김용훈) LLM들이 그런 데이터를 활용하는 방식으로 오픈AI 포함해서 현존하는 모든 에이전트들이 외부 데이터를 참고할 때 펑션 콜이라는 방식으로 이를 외부 데이터를 연동해서 파악하고 생성해서 내보내는 방식으로 진행이 되고 있는데, 이 펑션 콜 자체도 전통적인 데이터베이스에 있는 것들과 그 방식들을 그대로 활용하는, 수준 자체가 매우 낮았기 때문에 기존 모바일 앱/웹에서 우리가 직접 사용하는 데이터 방식과 크게 차별화 되지 않았었음.\n그런데 이제 추론 모델에 기대하고 있다는 건 모델 자체가 개선이 되면서 기존과 같은 데이터 형식이라 하더라도 이런 것들을 로우 데이터 그대로 추론 모델에 전달했을 때, 훨씬 더 잘 이해하고 저희가 기대하는 방식으로 동작하기 시작 시작했음. 그래서 지난 시간 동안에는 에이닷에서 하나의 Use case를 만들려면 그러면 이 Use case가 동작하기 위해서 매우 많은 데이터 가공을 하고 매우 많은 트레이닝을 하는 과정들이 Use case별로 하나하나가 다 반복이 됐었어야 하는데, 지금은 추론 모델에 저희가 보유한 로우 데이터─특히 통화 전문 데이터나 위치 데이터 같은 것─들을 특별히 많이 가공하지 않더라도 많이 집어넣고 어떤 답을 내놓으라고 했을 때 그 답변 수준이 기존에 저희가 열심히 만들어왔던 아니면 지금 시중에 있는 다른 플레이어들 보다 훨씬 더 좋은 성능을 보이고 있음.\n그렇기 때문에 추론 모델이 보편화가 되고, 더 가격이 싸지고 있는 지금 상황에서 저희가 가지고 있는 에이전트 시스템 기반 위에서 추론 모델을 적용하고, 가지고 있는 데이터를 집어넣으면 드디어 본격적으로 에이전트처럼 동작하는 서비스를 만들 수 있는 기술 기반을 저희가 가졌다고 볼 수 있음.\n그런 방식으로 저희가 앞서 말씀드린 것처럼 이제는 좀 더 에이전틱하게 동작하는 그런 서비스를 만들 수 있는 시기가 됐다고 생각하고, 우리가 이런 기술을 시장에 제안하는 사업자가 되지는 못했지만, 만들어진 기술들을 가장 빠른 패스트 팔로워로서 적용하고 있는 상황이고, 이런 것들을 저희가 가지고 있는 고유의 데이터, 통화 데이터나 위치 데이터 같은 것들은 텔코만 보유한 데이터이기 때문에 이런 것들을 기반으로 잘 동작하는 에이전트를 훨씬 더 잘 만들 수 있는 시기가 되었다고 생각함.\n(CSO) 근데 말씀하신 그 기술의 시대는 사실 저희에게만 온 것이 아니라 모두에게 다 같이 왔다고 생각함. 에이닷의 전략적 중요성이나 당위성은 재론의 여지가 없음. 텔코 뿐만 아니라 AI 컴퍼니 내부에서는 제일 중요한 사업이라는데는 의심의 여지가 없지만, 뭘 해야 되는지에 대해서는 조금 논쟁이 있을 수 있음.\n지금 계획하고 있는 이 수 많은 새로운 피처들이 아니라, 1~2개의 피처에 굉장히 집중해서 연말까지 그 누가 들어오더라도 여기에서는 절대 뺏기지 않는다라는 것을 저희가 가지고 가는 것이 필요하지 않을까 생각함.\n그리고 기술 개발과 소프트웨어 개발도 있지만 제휴 쪽도 같이 봐야함. 오픈 AI가 카카오와 손잡고 야놀자가 손 잡는 우리로써는 뼈아픔. 아직 그들은 한국 지사가 없으니, 우리가 지금이라도 당장 굉장히 빠르게 제휴를 움직여서 연말까지 국내에 있는 어지간한 버티컬의 탑 플레이어들과는 제휴를 완전히 끝내놓는 정도의 속도로 추진하고, 필요하다면 글로벌에 있는 AI 버티컬 각 영역에서 탑 플레이어들을 그들이 한국 버전을 무조건 에이닷 혹은 SK텔레콤과 제휴할 수 있도록병행해야 해자 구축 할 수 있다고 생각함. 결국은 속도의 문제가 아닌가 함.\n(정석근) 이게 기술의 문제라기 보다는 우리 사업/서비스 전략의 문제 대해 이야기해보고 싶음. 우리가 AI 서비스를 바라보는 관점이 갑자기 SK텔레콤이라는 회사가 어느 날 갑자기 네이버를 만들어야지 라고 하고 있는 부분, 그래서 사실 사업 전략 측면에서, 기존에 우리가 하고 있던 것에서 레버리지하여 점진적으로 개선이 되고 자연스럽게 확장되어야 한다고 봄. AI 기술 특징 자체가 데이터를 가지고 성장하는 거기 때문에 그러면 우리가 기존에 우리 MNO 사업이 자연스럽게 확장되는 개념에서 봐야 될 것 같음.\n여전히 우리가 기존에 우리가 하고 있던 고객 접점이나 고객 서비스들은 별도의 앱으로 존재하고 또 에이닷라는 또 새로운 서비스를 우리가 만들고 있고 제가 글로벌에 나가서도 그렇지만 그런 레버리지는 아무것도 없이 그냥 완전히 새로운 점을 찍고 있는 부분이 사실 저희는 굉장히 잘 활용할 수 있는 걸 활용하지 않고 완전히 맨 땅에 헤딩을 하고 있는 느낌이 듭니다. 그래서 그 부분이 저는 좀 더 고민이 드는 거고요.\n그래서 최근에 아까 사장님 말씀하신 대로 AI 단독 서비스에 대한 것들을 우리만큼 어그레시브 한 데가 없다고 하지만 사실은 T모바일이나 도이치 텔레콤이나 이런 사를 보면 본인들이 기존에 갖고 있는 접점들을 다 한 군데 모으고 거기에 AI를 조금씩 넣어서 계속 접점을 넓혀가고 있는 그래서 본인들의 시작은 본인들이 천 레이트을 줄이고 알푸를 높이고 여기서 출발하지만 또 점점 AI 쪽으로 가고 있는 그런 건 보이는 것 같아요.\n다만 저희는 그 채널이 다 지금 끊어져 있는 것 같다.\n그러니까 기존에 MMO를 AI화하는 건 또 별도로 AI 서비스는 또 별도로 저희가 글로벌은 또 별도로 이게 이제 제가 지금 바라보고 있는 현재 제일 어려움이라고 생각을 합니다.\n(김용훈)말씀하신 것처럼 에이닷이 저희가 가지고 있는 내부 에셋을 좀 더 잘 활용하는 통합하는 방향으로 가야 된다는 걸 적극 공감을 하고요.\n여기도 옵션 제로로 잡혀 있었지만 필요한 부분입니다만 그런 것들이 어떻게 보면 저희가 가지고 있는 텔코의 기존 시스템들이 BSS 같은 레거시 시스템의 변화가 기본적으로 전제가 되어 이제 쓰여 있기 때문에 그런 타임 갭이 있는 거는 어쩔 수 없는 부분인 것 같고 하지만 그런 것들은 지금보다 앞으로 훨씬 더 가속화시켜 나가야 될 부분은 중요한 것 같습니다.\n그런데 정사장님 말씀하신 것처럼 제가 오늘 말씀드렸던 것도 그러니까 텔코가 가능한 부분 저희가 가장 강력하게 할 수 있는 부분에 앵커링을 해서 그런 것들을 중심으로 일상으로 확산해 나가겠다는 말씀을 드리는 거고 그 일상을 확산 영역도 저희가 모든 걸 다 하겠다는 게 처음에 에이닷의 목표였다라고 하면 그럴 수 없다는 걸 저희가 깨달았기 때문에 지금 저희가 선택과 집중을 하고 있는 거고 어디에 집중할 거냐라고 하면 실제로 텔코가 잘 아는 분야로 앞서 나가야 될 텐데 전화 통화라는 것도 기본적으로 일상과 아니면 업무 아니면 개인적인 것들이 여러 가지 일정 같은 것들이 얽혀 있는 부분이 있기 때문에 그런 데이터를 가지고 고객 이해를 하는 데도 도움이 되지만 실제 실제로 이 사람의 어떤 일상의 일정이나 약속, 예약 같은 것들을 잘 다루게 해 주는 것은 매우 유용한 지점이라고 생각을 하고 있습니다.\n그런 지원부터 저희가 출발해 나가고 있고 이런 것들이 어떻게 그러면 시장 내에서 경쟁을 할 거냐라고 보면 사장님도 말씀하셨지만 AI 에이전트라는 건 이제 기술에서 서비스 단계로 넘어왔고 서비스라는 건 곧 다시 말해서 고객 최적화가 필요한 부분이라는 생각이 듭니다.\n빅테크 같은 경우도 보면 전 세계 모든 빅테크들이 에이전트를 만들었다고 하지만 다 똑같은 비슷비슷한 기능을 만들어내고 있고 예를 들어 오픈AI가 그러면 한국 사용자를 위해서 최적화된 에이전트를 만들 거냐라고 그렇지 않을 겁니다.\n그들은 계속 글로벌에서 유니버셜하게 동작하는 리스트에 집중을 할 거지 지역 최적화나 특정 그룹 최적화하지 못할 거거든요.\n또 반대로 그럼 저희 경쟁자라고 할 수 있는 스타트업 같은 경우에 스타트업들이 그러면 저희가 생각하는 에이전트 같은 것들을 잘 만들 수 있을 거냐라고 하면 그것도 현실적으로 어려운 부분이 있습니다.\n왜냐하면 스타트업은 아무래도 속도는 빠르지만 기록에 있어서 한계가 있기 때문에 특정 니치 마켓에서 특정 유스 케이스를 좀 더 잘 해결하는 서비스를 만들 수 있겠지만 AI 기술을 활용해서 그런데 사용자들이 기대하는 에이전트라고 하는 거는 어떤 걸 이거 하나 잘해주면 내가 얘를 써야지라는 시대가 아니라 내가 필요한 일상에 많은 것들을 넓고 조금 얇더라도 그렇게 챙겨주고 알아주는 애가 필요한 거지 그래야 내가 얘를 에이전트로 했다고 말을 거는 거지 어떤 특정 되게 좁은 유스 케이터 하나 잘 해결해 주는 에이전트 서비스를 쓰지는 않을 것 같습니다. 그런 측면에서 봤을 때 어떻게 보면 스타트업과 빅테크 사이에서 저희 정도 규모가 되는 회사가 할 수 있는 규모 그 정도의 그 마켓 분명히 있을 거라고 생각이 들고 그런 부분이 외려 에이전트가 포지셔닝 하는 데 있어서 유리한 지점이 아닐까 싶습니다.\n(CEO) 저는 이게 논쟁 포인트라고 보는데요. 그러니까 어떤 서비스가 엣지 있는 뭔가 고객이 좋아하는 뭔가 하나로 시작해서 거기서 굉장히 강력한 이 파워 밸류를 만들고 그 다음에 옆으로 번져나가는 그런 기존의 어떤 플랫폼 서비스의 모델, 네이버가 검색에서 지금까지 이렇게 해왔듯이 그런 것이 맞는 건지 지금 김용훈 사업부장이 이야기하는 고객이 필요한 것들을 어느 정도 다 A부터 Z까지 다 만족해야만 에이전트 서비스는 의미가 있을 거다.\n이 두 가지 가설에서의 포인트가 뭐냐라고 보는데 사실 이걸 다 해주는 회사는 지금 없는 것 같아요.\n지금 어찌 보면 글로벌이 딱 떠오르고 있는 유일한 AI 에이전트가 지금 검색이 현재는 굉장히 유력하게 나오고 있는 것 같습니다.\n퍼플렉시티도 그렇고 검색이 아무래도 AI 에이전트의 가장 뾰족한 부분이다라고 많은 사람들이 생각하고 있고 그래서 검색에 일단 많은 스타트업들이 집중을 하고 있고 이거는 이제 기존에 큰 네이버나 구글의 어떤 검색을 먹을 수 있다는 그런 파이도 있기 때문에 그 부분을 이제 뾰족하게 들어가는 부분인데 저희는 이제 그 부분은 지금 제휴를 통해서 풀고 있고 이제 전체적으로 다 만족시켰다 이렇게. 제 생각에 국내에서만 플레이를 한다면 그것도 가능한 이야기인 것 같습니다.\nSK텔레콤의 어떤 파워와 여러 가지 제휴를 통해서 국내에서 이 정도 플레이를 하는 거는 가능할 것 같은데 글로벌리는 그 정도의 플레이를 하기가, 우리가 가지고 있는 리소스도 없고 또 그렇게 가기는 굉장히 어려운 부분이 아닌가 그런 고민이 있음.\n(참석자7 - 이종호)\n기본적으로 에이닷이 일단 지향해야 될 노리그렛 인터넷으로 지향해야 첫 번째는 MMO 관련된 서비스에 대해서는 풀리 AI로 뭔가 이제 서비스가 제공돼야 된다는 구체적으로 그러니까 우리 고객이면 우리 서비스라든지 이런 거 필요한 거는 AI로 다 될 수 있는 데 그거는 이제 저희 노리그렛으로 해야 되는 거고 서비스 관점에서는 저는 저희가 시행착오를 좀 많이 했다고 보는데 지금 8페이지 보면 2번에 해당하는 부분이 사실 저는 우리가 찾을 수 있지 않나 생각을 하는데 저는 사실 개인화 관련한 부분은 사실 우리가 그렇게 세지는 않다고 봐요.\n데이터가 많다는 거지 그걸 우리가 우리가 서비스에 개인화할 수 있는 데이터냐에 대해서는 그건 잘 모르겠습니다.\n그리고 실질적으로 서비스가 잘 안 되는데 개인화라는 건 그 다음이거든요.\n그래서 저는 AI 에이전트가 밸류가 있으라고 그러면 기본적으로 두 가지 내지 세 가지 일 또는 두 가지 내지 세 가지 앱 또는 프로그램을 이용해야지만 결과를 얻어낼 수 있는 그걸 한 번에 줄 수 있어야 되는데 지금 퍼플렉시티 같은 경우가 어쨌든 웹 서치해가지고 갖다 추론해가지고 보고서 형태를 마련해 주는 그렇기 때문에 이제 고객들이 이제 환호하는 거잖아요.\n그래서 저희도 에이닷이 지금 우리는 전화를 할 수 있고 문자를 보낼 수 있는데 그걸 통해서 뭔가 고객이 늘 일상에서 하는 거 주문이라든지 이런 것들을 그 서비스와 앵커해가지고 해주는 그것까지만 저는 그거 하나만 보여주더라도 이거 할 때는 에이닷 써야지인데 저는 지금 에이닷 왜 써야 될지는 잘 모르겠어요.\n잘때 수면 분석하라고 광고를 하는데 사실 그것만 전문으로 하는 데가 훨씬 더 많거든요.\n에이닷을 계속 해야 된다고 그러면 첫 번째는 우리 MMO를 좀 더 강하게 하는거 하나, 둘째는 서비스 관점에서는 좀 피보팅 해가지고 2개 내지 3개의 어떤 그런 작업이 필요한 걸 갖다가 한 번에 해줄 수 있는 그것도 이제 우리의 전화라든지 문자의 코어 비즈니스와 연계한 형태의 그런 포지션을 일단 해가지고 그걸 올해 연말까지로 돼 있는데 저는 이걸 좀 당겨가지고 저희 에이닷이 다시 좀 이렇게 뭔가 하나의 각인되는 것들 퍼플렉시티처럼 검색 아니면 우리는 에 가서 어디에 확인되는 지에 포지션을 해야지 그다음에 이제 좀 더 확장할 수 있지 않을까 그럼 저희는 코어가 없이 너무 이렇게 좀 이렇게 벌린 듯한 느낌임.\n(참석자 8)\n에이닷에 추구하는 궁극적인 투 모델에 대한 부분들이 제가 봤을 때는 합의가 전혀 안 될 것 같아요.\n예를 들어서 박 사장님께서 말씀하셨던 그런 기능에 대한 부분들을 실질적으로 제공하더라도 그게 에이닷의 투비 모델에 대한 공식적으로 발생에 대한 모델에 대한 부분들을 다시 하는 건지 저는 거기에 대한 의구심이 있다고 생각하고요.\n실제로 그런 걸 달성하기 위해서 지금 매년 들어가는 비용에 대한 부분들이 실질적으로 거의 마이너스 2천억씩 계속 까먹고 있다라고 저는 보고 있거든요.\n그렇게 에이전트를 가져올 거면은 네이버가 실제로 AI의 에이전트를 깔아서 쓰는 게 더 빨리 저는 될 것 같은데 에이닷이 갖고 있는 서비스가 전혀 없는 상황에서도 서비스도 해야 되고 에이전트도 붙여야 되는 그런 어려움에 대한 부분들을 왜 가져가야 되는지를 잘 모르겠다라는 생각이 좀 듭니다.\n전략에 대한 부분들은 다 잘 아시겠지만 마이크로 포터 교수도 전략의 본질이 뭡니까?\n저희들이 할 수 있는 것들과 있지만은 과감하게 버릴 수 있는 뭔가를 찾아내서 그 어떤 부분들을 없애는 것이 실질적으로 전략에 대한 부분들이 본질이라고 생각을 하는데 에이닷 뿐만 아니라 나머지 사업부들도 전부 다 제가 봤을 때는 텔레콤이 AI 컴퍼니라고 지향은 하지만 외부에서 보는 냉정한 평가는 텔레콤 AI 사업 안 했으면 좋겠다.\n그 다음에 실질적으로 에이닷에 대한 부분에 대해서도 실질적으로 지금 AI컴퍼니가 되는 것이 맞는지 그런 거에 대한 퀘스턴이 되게 많거든요.\n에이닷 관련된 부분 또궁극적인 투비 모델에 대한 부분들도 명확히 가져가는 것도 좀 더 필요하지 않을까 생각을 김용훈 사업부장님이 생각하는 에이닷의 궁극적인 투비 모델은 무엇이라고 생각하십니까?\n(김용훈)\n말씀하신 것처럼 지금 현존하는 에이전트 류의 서비스가 기존에 같은 종류의 잘 만들어진 애플리케이션을 대체할 수 있을 정도로 충분히 뛰어난가 하면 그렇지 못한 것 같습니다.\n유료화도 있다고 생각을 하는데요. 저희가 디자인을 에이전트라고 하는 거는 사실은 그렇게 내가 앱을 일일이 찾아들어가거나 이 표현하거나 입력을 하지 않더라도 얘가 나의 상황을 잘 알고 나의 의도를 잘 알고 그런 일들을 소소한 그런 것들을 모두 다 대체해 줄 수 있는 그런 서비스가 되길 모두가 바라고 있고 그게 이제 궁극적인 에이전트 회사들의 비전일 텐데 아직 그런 시장 기술 같은 것들이 없는 과도기 상태다 보니까 그런 말씀하신 부문들도 당연히 그런 상황이라는 걸 알 수 있고요.\n그 베이스가 되는 게 사실은 박 사장님 말씀하신 것처럼 저는 어떻게 보면 개인화에서 저는 출발해야 된다고 봅니다. 그러니까 액션이라는 게 사실 에이전트의 역량을 직접적으로 보여줄 수 있는 가장 필요한 최종 액션인 건 맞습니다.\n에이전트 이콜 내가 필요한 부분을 대신 해 주는 게 당연히 목적일 텐데 그러려면 사실은 나에 대한 이해가 없이는 되지 않습니다. 왜냐하면 에이전트 이콜 개인화가 되어야 되는게, 내가 만약에 티켓팅을 하거나 얘가 전화를 걸 수 있게 된다고 해서 나 대신 예약 전화를 걸어준다 하더라도 내가 어떤 사람이고 어떤 걸 필요로 하고 내가 누구랑 언제 어떻게 만나는지를 알아야 얘가 나 대신 전화를 해줄 수 있는 거지 그렇지 않으면 전화를 걸 수 있는 기능만 가진 그냥 툴이 되는 거거든요.\n그렇게 되면 얘한테 야 나는 이런 사람이고 아니면 넌 이런 데 해주면 좋겠어 라고 매번 디렉션을 하는 건 사실은 내가 직접 전화 받는 것보다 당연히 편하지 않을 겁니다.\n그렇기 때문에 에이전트의 궁극적인 목적이 나를 대신해서 그런 귀찮은 행동들을 대신해 주는 소프트웨어가 되는 거는 당연히 비전일 거고 그 과정에서 반드시 전제되어야 하는 게 얘가 나에 대한 이해 아니면 내가 필요한 상황에 대한 이해를 얼마나 잘하고 있는지 그게 어떻게 보면 에이전트의 성패를 가르는 어떻게 보면 중요한 분기점이 될 것 같고요.\n지금 그래서 많은 에이전트 사업자들이 어떻게 고객 이해를 높일 거냐 어떤 데이터를 가지고 얘가 고객을 잘 파악하게 만들 거냐에 대한 고민들을 하고 있는데 다른 서비스들 같은 경우에는 내가 직접 이 서비스에 입력하고 주고받은 데이터 정보가 전부입니다.\n그러다 보니까 내가 어떤 걸 입력했을 때 그 시스템을 알아차리면 얘는 이런 걸 좋아하는 것 같아 저런 게 필요한 것 같아라는 몇 개의 힌트들을 가지고 이 사용자들을 추상화하고 있는데 저희 같은 고객 데이터 고객의 일상과 대화 데이터를 많이 갖고 있는 서비스 같은 경우에는 그런 것들을 굳이 고객의 입력에만 의존하지 않고 사용자에 대한 이해를 좀 더 높고 넓게 가져갈 수 있다는 장점이 있을 것 같고 이런 것들을 아마 활용할 수 있는 서비스가 저희가 저희 같은 텔레콤 외에는 메타 같은 SNS 서비스나 카카오톡 같은 회사들이 아마 이런 식의 접근이 가능할 것 같습니다.\n아마 그런 회사들은 비슷한 관점으로 그들이 다 갖고 있는 고객 데이터를 가지고 고객을 이해하는 노력들을 할 거고 그 기반이 돼서 저희와 같은 방식으로 이 에이전트 할 수 있는 액션들을 하나하나 늘려가는 방식으로 시장을 개척해 나가지 않을까 싶습니다.\n(CSO) 에이닷의 전략적 당위성에 대해서는 제가 아까 이제 다 이해할 것이라고 공감할 것이라고 생각해서 말씀을 안 드렸었는데 거기에 대해서 좀 더 말씀을 드리면은, 모르겠습니다. 제가 지금 아까 객관적 현실 인식이라고 해서 경쟁 상대를 지금 혹은 비교 대상을 빅테크로 놓고 혹은 글로벌 탑티어 스타트업으로 놓고 저희가 아쉬운 점이나 그런 점들을 이야기하다 보니 저희가 굉장히 많이 부족하고 혹은 하지 말아야 되는 사업을 하고 있는 것이이라는 생각이 드실 수 있으셨을 것 같은데 절대 그런 건 아니고요.\n저희가 SK텔레콤이 결국 이 에이전트 사업 혹은 이 AI 서비스 사업 특히 B2C 사업을 포기하게 되면 그야말로 정말 덤프 파이프라고 생각합니다.\n지금 그 정도를 어디까지 갈 것이냐 모든 걸 처리해 주는 AI 에이전트가 될 것이냐 ChatGPT와 경쟁에서 이길 것이냐라는 부분은 저희가 고민해야 되는 포인트입니다만 아까 미니멈이라고 생각했던 저희의 mno와 밀 결합하고 저희의 최소한 모든 대고객 창구가 통합되고 그것을 에이전트 서비스를 제공하고 이건 미니멈으로 가야 되는 거라고 생각하고요.\n그 중간에 어딘가를 의사결정하는 지금 저희가 자리라고 생각을 하지 이거 자체의 당위성을 의심할 필요는 없다라고 생각이 됩니다.\n그래서 이거 자체는 지금까지 추진할 수 있었고 또 추진하는 것이 당연했고 그렇기 때문에 추진해 왔는데 앞으로 이 방식대로 그대로 추진할 것이냐라는 부분에 대해서 저희가 고민이 필요한 시점이라고 생각하고 그래서 저는 여전히 미니멈은 이제 MNO를 대변하는 것이라고 생각하는데 거기에 더 중요한 거는 그동안 에이닷에 저희가 충분히 리소스를 모아왔는지도 저희 좀 내부적으로 다시 한 번 저희가 고민해 봐야 된다고 생각합니다.\n여러 가지 분산된 것들이 있기 때문에 저희가 좀 제대로 밀어주고 또 에이닷도 더 집중한다면 가능성은 충분히 있을 것이라고 생각함.\n(정석근)\n제가 지금 애플 앱스토어에 가서 SK 태그 검색해보면, 저희가 지금 나가는 앱이 자잘한 거 빼고 한 20개가 됩니다.\n지금 SK 태그 나가는 그래서 저는 사실 지금 현재 만약에 우리가 AI 서비스를 하는데 그 20개 중에 꽤 많은 걸 하나로 통합해서 그게 SK텔레콤 앱이야라고 하고 거기서부터 만약에 AI를 적용했으면 지금 저희가 에이닷 왜 하지라는 얘기를 거의 안 할 것 같아요.\n너무 당연히 해야 되는 일이었던 것 같고 사실은 거기서 출발해서 거기서 저희가 외부에 좀 파트너십을 한다거나 하면서 좀 확장했으면 그를 현대카드 같은 데도 보면 본인들이 현대카드 업을 하면서 생기는 거 갖고 조금씩 옆으로 나가지 현대카드 업을 안 하면서 옆에 걸 하는 것 같지는 않고요.\n그래서 저도 지난 2년 동안 저도 이게 보면 우리 있는 외부에 여러 가지 앱들을 하나로 합치냐 마냐 이 얘기는 계속 해오긴 했는데 저는 이건 결국 고객 관점에서도 하나로 합쳐지고 예전에는 하나로 합쳐지면 앱이 너무 복잡해졌으니까 괴로웠다면 지금 그래도 AI 덕분에 꽤 쉽게 여러 가지 서비스를 하실 수 있는 에이전트가 됐든 뭐가 됐든 그래서 그런 기술이 되어 있기 때문에 사실 저희는 그건 너무 당연히 해야 되는 거고 그게 됐으면 사실은 이 얘기가 훨씬 저는 훨씬 쉬웠지 않았을까 그런 생각이 듭니다.\n(김용훈) 이게 예전에 처음부터 시작할 때 사실 저희 고객 대상만을 타겟으로 한 게 아니고 국민 전체를 대상으로 저희 서비스를 시작했기 때문에 좀 더 이제 맨 땅에서 시작한 부분들이 있는데 저희가 에이닷이 좀 더 큰 그릇을 지향해오는 과정에서 SK텔레콤 외부 고객들의 이용도 점점 늘어나고 있긴 합니다.\n처음에는 10% 정도 대였는데 지금은 저희가 이제 안드로이드 같은 경우에는 에이닷 전화를 저희 통신 고객이 아닌 고객들도 쓸 수 있게 되고 非 SK 고객의 비율이 점점 증가하고 있는 건 사실인데요.\n밸류업 돼야 된다는 부분에 대해서 당연히 동의를 합니다만 그런 부분에 있어서 아까 시간이 필요하다고 말씀을 드렸던 게 저희가 티월드 T멤버십 그런 것들을 연동하는 노력들을 그동안 저희가 많이 해왔었고 저희 조직 내부에 두면서까지 그런 것들을 주고받는 계약도 많이 해왔었는데 앞서 말씀드린 것처럼 사실은 ATDT라고 하는 기존에 어떻게 보면 음성 인식 시스템에 대한 어떤 AI가 그것들을 활용하고 연결할 수 있게 만들기 위한 기반 시스템 같은 것들이 많이 개비가 되어야 되는 부분들이 있고 그러다 보니까 현실적 한계가 있었고요.\n또 하나는 정책적 결정도 좀 필요합니다. 왜냐하면 저희가 이런 얘기를 하다 보면 어떤 상황에 봉착하게 되냐면 기존의 T월드를 통해서 고객이 액세스 할 수 있는 기능들이 예를 들어 2천 개고요 상품은 200가지를 컨트롤 할 수 있습니다.가입할 수 있습니다라고 나오는데 사실은 그중에서 보면 그 2천 개 기능 중에 한 명 두 명밖에 안 쓰는 기SMD 수 있고 상품 중에 있는 몇 명밖에 안 쓰는 상품들도 있는데 이런 것들을 고객 VOC 대응 아니면 저희가 어떤 그런 기존 완성도 추구라는 미명 하에 이런 것들을 모두 다 마이그레이션을 해야 된다는 그런 강박 같은 것이 있기도 합니다.\n근데 그런 것들을 에이닷이 좀 더 대범한 전환이 필요하다라고 하면 그중에 일부 가지치기 쳐낼 걸 쳐내고 하면서 볼드한 움직임이나 의사결정 같은 것들이 필요한데 저희는 기존의 모든 유즈 케이스를 100% 다 담는 더 좋은 그릇을 만들려는 생각을 하다 보니까 그 지점에서 어떻게 보면 가끔 비현실적인 투자나 아니면 구조 같은 것도 얘기할 수 있는 상황임.\n(CEO) 근데 그 논의는 아까 여기서 이제 수요자 관점 공급자 관점을 이야기했고 수요자 관점에서의 SK텔레콤이 네트워크/ 마케팅/ 커스터머 서비스 모든 채널에 대해서 AI를 적용하는 것은 그것은 당연한 거고 그것은 당연히 추진하는 거예요.\n그거에 대해서 에잉닷하고 아무 관계없이도 그건 추진하는 거지만 그 모든 텔코들이 이제 그걸 하고 있는 거고 우리의 이야기는 지금 오른쪽에 있는 공급자로서의 AI 서비스 즉 지금 우리 고객들한테 지금 커스터머 서비스 조금 더 AI를 잘해준다라는 이야기가 AI 서비스의 본질이라면 사실 그건 우리가 더 이상 논의할 필요도 없지 않느냐 그래서 다른 텔코 하는 것처럼 하면 되는 거고 우리는 거기다 더해서 새로운 어떤 가치를 텔코로서의 이걸 활용할 수도 있고 안 할 수도 있지만 가치를 창출하는 부분에서의 AI B2C를 이야기하기 때문에 훨씬 더 논의가 좀 더 어려운 볼드한 이야기가 되는 것 같습니다. 더더욱이나 아까 말씀드렸다시피 그게 국내로만 해서는 안 된다.\n국내는 솔직히 어떻게든 할 수 있을 것 같아요.\n국내 우리가 여러 가지 에셋도 갖고 있고 여러 가지 제휴도 하고 기술도 뚫고 하면 국내에서 AI 서비스 넘버 1 2 3 안에 드는 것은 어떻게든 할 수 있을 것 같은데 지금 이제 에스터하고 같이 논의를 해야 되는데 이걸 갖고 해외로 나가지 않으면 어렵고 해외에서 프롬 스크래치 하자니 더 어렵고 이 부분이 지금 사실은 또 하나의 큰 고민인 거고 지금 이제 GPAA 사업부에서는 텔코들의 기존 PoC 우리 같은 티월드 같은 데에 AI 에이전트를 붙여서 변화시켜주겠다.\n그게 이제 처음에 작동할 수 있는 이야기긴 한데 그 이후에 우리가 만들어내는 가치란 무엇인가 AI 서비스에서 예를 들어 퍼플렉시티가 검색을 통해서 만들어낸 가치와 같은 그런 가치는 무엇인가에 대해서는 우리 스스로도 답이 없지 않느냐라는 생각이듬.\n(정석근) 저는 개인적으로 아까 말씀드렸던 것은 수요 공급이 떨어지지는 않는다고 생각을 하거든요.\n저는 수요를 우리 아까 사장님이 말씀하신 AI 수요라고 하는 우리 내부를 AI로 바꿔가는 게 자연스럽게 조금 더 확대되면 아마 공급까지 연결될 수 있지 않을까 혹은 우리가 이번에 퍼플렉시티이런 거 연동해서 외부 마케팅 하는 것처럼 글로벌 B2C 회사들의 방법을 만약에 테스트 베드로 저희가 제공해 주고 그거를 만약에 레버리지 할 수 있으면 할 수도 있겠다.\n근데 우리가 티 모바일에 가서 도이치 텔레콤에 가서 니들 기존 앱에다가 AI 넣어줄게라는 얘기를 하는데 정작 우리도 그걸 안 하고 있으면 사실은 얘기는 굉장히 어려워진다.\n그래서 저는 지금 이제 수요를 약간 점진적으로 확대하면 어느 정도 공급이 될 거고 거기에 글로벌 서비스를 테스트 베드를 붙이고 그걸 또 레버리지 하면 또 나갈 수 있는데 저는 그게 좀 약간 각각의 점이라기보다는 선으로 연결될 수 있지 않을까 생각함.\n(CSO) 방금 말씀 주신 부분들이 이제 결국은 옵션의 형태로 정리가 되는 것 같은데요.\n피라미드가 양쪽에 2개가 있다고 해서 저희가 6개 완전히 사업을 하는 거는 전혀 의미가 없고 저희가 이제 지금까지 오히려 이렇게 잘못해왔던 거를 이제 고쳐야 되는 상황인 것이고요.\n결국은 이 수요가 공급으로 연결이 되고 그 다음에 각 층에서도 서로서로 연동이 되어야 됩니다.\n저희가 쓰는 저희가 만든 인프라를 저희가 쓰는 플랫폼이 써야 되는 거고 그 플랫폼을 저희가 서비스가 써줘야 되는 그 연동이 당연히 기본일 것 같아서 그 부분은 저희가 봐야 되는 부분임.\n(TM) 당신들이 이 서비스를 하면서 기대하는 바가 무엇인가? \"무엇을 기대하고 나는 어느 루트로 간다\"라고 생각 하는 것.처음에 생각한 가설이 있었을 테고, 가설이 워킹 하는지 현실에 가서 부딪쳐봤더니 가능한 몇 가지 루트가 있다고 가정해 볼 수 있음. 그런데 그 루트를 다 갈 수가 없으니 그 중에 뭔가를 선택을 할 텐데, 선택의 이유가 있을 것임. \"이리로 가면 빠를 것이다.\" 내지는 \"뭔가 있다\"라는 가정, 어떤 필요 충분 조건들이 그 안에 있는 것임. 그런데 조금 추진하다보면 지금 시점에서 필요 충분 조건들이 적용되지 않는다고 판단을 하면, 이제 루트를 변경해야 함. 이런 관점이 필요함.\n그래서 이를 시나리오 형태로 다시 플래닝을 하든 중간에 마일스톤을 찍든 진행하다 보면, 지금 이렇게 그려 놓은 것보다 훨씬 정확한 맵을 그릴 수 있음. 설사 그 맵이 현실성이 없어도 상관은 없음. 왜냐하면 처음에 그려둔 맵은 시간에 따라 기술 등 모든 게 변함에 따라서 방향이 달라지기 때문에, 다시 방향을 찾아가는 수밖에 없음.\n하지만 중요한 \"이것을 왜 하는가?\"로 다시 돌아오면, 한참 추진해 봤지만 결국 이건 말이 안 된다고 생각할 때, 내 목적에 어긋난다고 생각하면 문제에 부딪치는 것. 그게 자기가 이 사업을 움직이는 하나의 방향이라고 보는 것인데, 사업을 하고 길을 가는 사람은 잘 판단하기가 어려움. 왜냐하면 내 입장에서는 이게 계속 온고잉 해야 하고, 이런 회의나 얘기를 통해서 누군가는 계속해서 당신의 목적과 추진 방향을 매번 확인시키고, 그 길이 지금 어떻게 변하고 있고 어디로 가고 있으며, 무슨 확률이 있는지를 찾는 거고, 그게 안 된다고 생각하면 바꿔야 되는 문제임. 모든 영역에 똑같이 적용되는 이야기들임.\n지금 이렇게 에이닷이 직면한 문제 중에 게 돌파가 안되는 문제가 뭘까라고 생각해보면, 스케일도 있어야 하고, 뭐도 있어야 된다. 결국은 우리가 앞으로 전화 등 이렇게 독특하게 우리가 다른 거를 대단한 걸 갖고 있지는 않음. 다 조그마한 거 갖고 있음. 이 얘기를 하는 건 그게 그렇게 완전히 우리 다른 것 보다 도미넌트한 건 전혀 없다는 것임.\n결국은 우리가 만들어야 되는 건 새로운 AI 전환이고, 새로운 AI 전화라는 것이 무엇이냐고 하면, 지금까지는 이게 포인트와 포인트를 연결해 줬던 거였는데, 이제 AI가 도입되니까 AI 전화라 하면 그게 음성에 관련된 서비스를 해주는 음성으로서의 어떤 서비스와 콘텐티를 딜리버리 시켜주는 거니까.  AI와 얘기를 합니다 혹은 AI가 정보를 줍니다 하고 움직이는 그 모든 혹은 대화를 하면서 AI가 끼어들어서 뭔가 대화를 함께하는 등 사람이 소통을 하는 단계에 AI를 자연스럽게 집어 넣는 방법에 대한 것.\n전화가 이전처럼 그냥 친구한테 전화 거는 것 이외에는 다른게 안 된다고 생각하면 더 이상 발전이 없음. 솔직히 이건 뭐 이거 갖고 더 이상 할 수 있는 게 없다고 하면, 결론적으로 AI 시대가 되어도 Telco에서 별게 안 나오는구나라는 인식이 생길 수 있음.\n그 다음에 내 Subscriber들이 계속해서 전화라는 서비스를 필요로 하는 거니까 AI가 적용된 건 잘 마련이 된 것임. 다른 플레에어에서 나온 패키지를 잘 선별해서 딜리버리 하는 등 아주 소극적인 형태로 뭔가를 할 수 도 있음. 근데 전화를 서비스 하다 보니까 음성 서비스만 갖고 그렇게 완벽하게 그런 사람들의 요구를 충족 시킬 수 없으니 문제가 되는 것임.\n그래서 카카오톡 같은 메신저 기반의 커뮤니케이터였는데 우리가 과거에는 이런 걸 갖고 있었는데 이제 빼앗겨서 없어진 것임. 음성만 갖고 이 얘기가 안 되면 문자/텍스트로라도 해야 된다라고 생각한다면 그 두 가지를 결합시키는 논의가 필요함.\n보다 전략적인 제안을 카카오하고 논의해야 할 수 있음. 왜냐하면 그 정도의 임팩트가 있어야 카카오와 우리 에이닷 전화가 결합했다는 정도의 임팩트가 더 강해질 거라고 생각함. 그들도 지금 별 돌파구는 없을 테고, 어떤 형태의 AI 모델이 들어가서 카카오의 소통과 얘기를 바꿔주거나 움직여주는 형태로 만들어 줘야 할 것. 이런 엠티 스페이스라고 하는 게 오히려 지금에 나오는 인스타그램이나 페이스북 같은 개인화된 자기의 아이덴티를 상징하는 것 인데, 지금 우리는 지금 커뮤니케이터만 보유하고 있고 개인화된 영역의 인기가 별로 없음.\n이걸 어떻게 공략해 들어가느냐? 그냥 SK텔레콤이 데이터셋 만들어서 뭐 개인화를 담는다? 계속 시도를 했는데 어카운트 만드는 건 다 실패했음. 어카운트를 만들어도 될 만큼의 매력적인 얘기가 존재를 하니까 그 다음에 그렇게 새로운 얘기를 우리가 만들 수 있는 것임. 우리가 인스타 등 다른 SNS처럼 과연 그렇게 만들 수 있을까? 대한민국만 쓰는 서비스가 과연 잘 돌아갈 것인가는 확실치 않음. 하지만 만들 수 있다고 생각하면 개인화를 끌어당기고 움직이는 게 상당히 파워풀 할 것임. 그걸 못 만들면 개인화 정보를 얻어서 이걸 더 들어가는 거에 상당한 제약을 받고 있는 것임.\n그렇지만 카카오나 우리 전화에서 들고 있는 데이터들을 이용해서 할 수 있는 것 그게 안 되면 검색인데, 검색은 네이버 하고 뭉쳐서 만들어야 하나? 근데 검색으로 만드는 AI 사업 그림이 뭔가가 잘 잡히지는 않는데, 아무튼 네이버를 당겨오면 뭘 할 수 있다 그러면 이제 그림을 그려서 만들어야 함. 이렇게 만들어서 뭔가 되면은 \"상호 Win-win 이어서 각 사가 생존하는데 도움이 된다.\" 이 개념이 상호 합의가 되면 가는 거고 그렇지 않으면 못하는 것임.\n하지만 현 시점에서 보면 지금 해야되는 상황에 접어드는 상황이 아닐까함.  우리가 지금 당장 필요해서 커뮤니케이션에 필요한, 전화와 문자와 검색, 나중에 또 떠오르는 것을 포함해서 갈 수 있을 것 같은데. 같은 시장을 놓고 싸우는 거 아니냐라고 할 수도 있지만 결국은 같은 시장을 지켜야 되는 것도 지금의 공동의 목표가 될 수 있음. 지금과 같은 분석을 아무리 해도 지금과 같은 정도의 전략으로는 그렇게 까지 뭔가 임팩트에 대해서. 이게 계속 얘기했던 시나리오 이야기 보다 조금 더 큰 이야기로 움직여야 하는 문제로 보임.\n이건 물론 레코멘데이션이지만, B2C에 가면 그 정도의 임펙을 줄 수 있는 데이터를 가지고, 그냥 상대방이 괜찮다면 상대방은 두들겨 봐도 된다고 생각함. 카카오나 네이버 만나서 얘기해 볼 수 있는 건데, 그 들에게 핵심적인 얘기가 돼서 돌아가야지 그냥 어정쩡한 이야기로는 어떻게 잘 움직여지지 않는 상황임. 그러려면 스터디 등  준비가 좀 더 필요함.\n(CEO) 그들과 제휴도 해봐야 하겠지만 경우에 따라서는 그들과 대적해야 할 상황일 수 있음.\n(TM) 지금은 대적의  문제가 아니라 일단 고객 획득이 가능한 새로운 AI서비스가 나올 수가 있는지 관점에서, 따로 내가 혼자서 만들면 좋겠지만, 우리가 이미 몇 년 해봤는데 결국 그렇게 까지 임택을 줄 수 없었다고 하면, 결국은 이게 뭐 몇도에 좋지 저는 이런 생각 속에서 해야 되는 문제에 똑같지 않습니까?\n그걸 갖고 오면 어떻게 하면 좋지? 하는 하나의 질문임. 만약 우리에게 네이버/카카오가 있었다고 하면, 지금의 이야기를 어떻게 바꿀 수 있을까. 바꿀 게 많다고 생각하고, 충분히 가능하다 라고 생각하면, 우리 개인 계정으로 만들 수 있겠고 뭐든 더 들어갈 수 있으니까 이게 좀 서비스를 마케팅 할 수 있는 이야기나 나오는 것임.\n======================================\n(CEO) 좀 더 눈이 뜨이는 것 같음. 그동안은 약간 이렇게 가다가 이게 어디까지 가야 되는지 어떻게 이 부분이 마이스톤이 좀 안 잡혀서 되게 고민이 많아서, 범위를 빨리 축소시켜야 되냐 이런 고민도 있었음.\n(TM) 우리가 확장세에 있을 때는 별 수 없음. 비즈니스가 확장세에 있을 때는, 똑같이 확장을 하고 나가지는 않으면 그냥 거기 움츠러들면 나는 거기서 그냥 그냥 제외되거나 정보가가 오지 않음. 그럼 그냥 와갖고 그게 책 보고 무슨 유튜브 본다고 가능한게 아님. 전면적으로 부딪히고 진짜로 알아야 되는 그 정보를 끄집어내야 함.  우리가 뭘 모르고, 그래서 뭘 알아야 하는 것인지에 대한 문제가 계속되는 것임.\nAI 데이터 센터 하나만 계속 물어보더라도, 도대체 이게 정확하게 뭔지 제대로 답을 내릴 수 없어서 계속 돌리면서 이게 정의하는 얘기를 계속해야 되는 것임. 솔직히 이 데이터 센터 구성을 어떻게 하느냐가 결국은 AI 모델 개발하고 움직이는 애들이 또 그 설계와 얘기를 계속 바꿀 것임. 이게 어떻게 바뀔 테니까 뭐가 되는 거고, 내가 뭘 풀 테니까 이렇게 바꾸는 거고, 그 영역까지 포함해서 전체를 규명하지 않으면 AI 데이터 센터라는 것은 사전적 정의에 불과함. 얘는 계속 움직이는 생물임.\n(CEO) 오픈 AI는 데이터센터 뿐만 아니라 반도체까지 사실은 바꾸려고 함.\n맞음. 우리도 지금 그 안에 들어가 있는 것임.  똑같이 있는 거라고 말야.\n여기서는 내가 얘기를 안 하지만 반도체 안에도 들어간 이야기가, AI로 인해서 디자인 등이 다 달라지고 그들이 뭐 하고 있는 지 아니 미팅이 붙이고 디자인까지 전문직 해야 되는 건가 안 하면은 안 된다라고 자기들이 생각을 하고 있음.\n그러나 자기네도 다 할 능력이 없어서 그게 그렇게까지 A부터 Z까지를 다 아는 사람이 도대체 어디 있겠나. 다 어떻게 이렇게 전문가까지 한 사람이 어떻게 다 할 수 있겠나.\n출처: <<a href=\"https://clovanote.naver.com/w/GL2X6yWpqwTY9oJBpWJw/note-detail/688157c6-c271-4d0d-90c6-91d8e62e9422n\" style=\"font-family:Pretendard_KR;color:black\">https://clovanote.naver.com/w/GL2X6yWpqwTY9oJBpWJw/note-detail/688157c6-c271-4d0d-90c6-91d8e62e9422n</a>>"
  }
];
const CONTENT_HASH = 'f498e3fe';

let cards = [];
let moving = null, resizing = null;
let selectedIdx = null, clipboardCard = null;
const GRID = 20, GAP = 14;
function snap(v) { return Math.round(v / GRID) * GRID; }

// ── Undo (Ctrl+Z) ────────────────────────────────────────────────────────────
const MAX_HISTORY = 50;
let history = [];
function snapshot() {
  syncText();
  history.push(JSON.stringify(cards));
  if (history.length > MAX_HISTORY) history.shift();
}
function undo() {
  if (!history.length) { showStatus('되돌릴 내용 없음'); return; }
  syncText();
  cards = JSON.parse(history.pop());
  renderCards();
  saveBoard();
  showStatus('↩ 되돌림');
}
function showStatus(msg) {
  const s = document.getElementById('status');
  s.textContent = msg;
  clearTimeout(showStatus._t);
  showStatus._t = setTimeout(() => { s.textContent = ''; }, 2000);
}
document.addEventListener('keydown', e => {
  const isText = document.activeElement?.contentEditable === 'true';
  if ((e.ctrlKey || e.metaKey) && e.key === 'z' && !e.shiftKey) {
    if (isText) return;
    e.preventDefault();
    undo();
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'c' && !e.shiftKey && !isText) {
    if (selectedIdx !== null && cards[selectedIdx]) {
      syncText();
      clipboardCard = JSON.parse(JSON.stringify(cards[selectedIdx]));
      showStatus('카드 복사됨');
      e.preventDefault();
    }
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'v' && !e.shiftKey && !isText) {
    if (clipboardCard) {
      e.preventDefault();
      snapshot();
      const nc = JSON.parse(JSON.stringify(clipboardCard));
      nc.x = (nc.x || 0) + 30; nc.y = (nc.y || 0) + 30;
      cards.push(nc);
      selectedIdx = cards.length - 1;
      renderCards(); saveBoard();
      showStatus('카드 붙여넣음');
    }
  }
  if (e.key === 'Escape') {
    document.querySelectorAll('.card.selected').forEach(c => c.classList.remove('selected'));
    selectedIdx = null;
  }
});

function pushCards(movedIdx) {
  const moved = cards[movedIdx];
  const movedEl = document.querySelector(`.card[data-idx="${movedIdx}"]`);
  if (!movedEl) return;
  const mh = movedEl.offsetHeight;
  document.querySelectorAll('.card').forEach(el => {
    const i = +el.dataset.idx;
    if (i === movedIdx) return;
    const c = cards[i], oh = el.offsetHeight;
    if (moved.x < (c.x+(c.w||200)) && (moved.x+(moved.w||200)) > c.x && moved.y < (c.y+oh) && (moved.y+mh) > c.y) {
      c.y = moved.y + mh + GAP;
      el.style.top = c.y + 'px';
    }
  });
}

function loadBoard() {
  const saved = localStorage.getItem(SAVE_KEY);
  const savedHash = localStorage.getItem(SAVE_KEY + ':hash');
  let parsed = null;
  try { parsed = saved ? JSON.parse(saved) : null; } catch(e) {}
  // reset if: no save, empty array, or content hash changed (page regenerated)
  if (!parsed || parsed.length === 0 || savedHash !== CONTENT_HASH) {
    cards = DEFAULT_CARDS.map(c => ({...c}));
    localStorage.removeItem(SAVE_KEY);
    localStorage.setItem(SAVE_KEY + ':hash', CONTENT_HASH);
    renderCards();
    const hasCoords = cards.some(c => c.x !== undefined && c.y !== undefined);
    if (!hasCoords) autoLayout();
    return;
  }
  cards = parsed;
  renderCards();
}
function resetToDefaults() { if (!confirm('저장된 보드를 지우고 원본으로 초기화합니다. 계속할까요?')) return; localStorage.removeItem(SAVE_KEY); cards = DEFAULT_CARDS.map(c => ({...c})); renderCards(); autoLayout(); }

function autoLayout() {
  const boardW = document.getElementById('board').offsetWidth;
  const cols = Math.max(1, Math.floor(boardW / 280));
  const colW = (boardW - GAP*(cols-1)) / cols;
  const colH = new Array(cols).fill(0);
  const allCards = document.querySelectorAll('.card');
  const images = document.querySelectorAll('.card img');
  let loaded = 0;
  function place() {
    allCards.forEach((el, i) => {
      const w = Math.min(cards[i].w || colW, colW);
      let minCol = 0;
      for (let c = 1; c < cols; c++) if (colH[c] < colH[minCol]) minCol = c;
      cards[i].x = minCol * (colW + GAP);
      cards[i].y = colH[minCol];
      cards[i].w = w;
      el.style.left = cards[i].x + 'px';
      el.style.top = cards[i].y + 'px';
      el.style.width = w + 'px';
      colH[minCol] = cards[i].y + el.offsetHeight + GAP;
    });
    document.getElementById('board').style.minHeight = (Math.max(...colH) + 100) + 'px';
    saveBoard();
  }
  if (!images.length) { requestAnimationFrame(place); return; }
  images.forEach(img => {
    if (img.complete) { loaded++; if (loaded >= images.length) requestAnimationFrame(place); }
    else { img.onload = img.onerror = () => { loaded++; if (loaded >= images.length) requestAnimationFrame(place); }; }
  });
}

function syncText() {
  document.querySelectorAll('.card').forEach(el => {
    const i = +el.dataset.idx;
    if (cards[i]?.type === 'text') { const t = el.querySelector('.text'); if (t) cards[i].content = t.innerHTML; }
  });
}
function saveBoard() { syncText(); localStorage.setItem(SAVE_KEY, JSON.stringify(cards)); localStorage.setItem(SAVE_KEY + ':hash', CONTENT_HASH); showStatus('저장됨 ' + new Date().toLocaleTimeString()); }

function renderCards() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  cards.forEach((card, i) => {
    const el = document.createElement('div');
    el.className = 'card'; el.dataset.idx = i;
    if (card.x !== undefined) el.style.left = card.x + 'px';
    if (card.y !== undefined) el.style.top = card.y + 'px';
    // html cards contain raw OneNote table HTML which may overflow the stated div width
    if (card.w) { if (card.type === 'html') el.style.minWidth = card.w + 'px'; else el.style.width = card.w + 'px'; }
    el.addEventListener('mousedown', e => {
      if (e.target.closest('.text, a, .card-btn, .resize-handle, td, th')) return;
      e.preventDefault();
      // Update selection
      document.querySelectorAll('.card.selected').forEach(c => c.classList.remove('selected'));
      selectedIdx = i; el.classList.add('selected');
      snapshot();
      moving = { idx: i, startX: e.clientX, startY: e.clientY, origX: card.x||0, origY: card.y||0 };
      el.classList.add('moving');
    });
    const actions = document.createElement('div'); actions.className = 'card-actions';
    const delBtn = document.createElement('button'); delBtn.className = 'card-btn'; delBtn.textContent = '×';
    delBtn.onclick = e => { e.stopPropagation(); if(confirm('삭제?')) { snapshot(); cards.splice(i,1); renderCards(); saveBoard(); } };
    actions.appendChild(delBtn); el.appendChild(actions);
    if (card.type === 'text') {
      const text = document.createElement('div'); text.className = 'text'; text.contentEditable = true;
      text.innerHTML = card.content || '';
      text.addEventListener('focus', () => { snapshot(); });
      text.addEventListener('blur', () => { card.content = text.innerHTML; saveBoard(); });
      el.appendChild(text);
    } else if (card.type === 'image') {
      const img = document.createElement('img');
      img.src = card.src.startsWith('http') || card.src.startsWith('data:') ? card.src : IMG_BASE + card.src;
      img.alt = ''; img.loading = 'lazy'; img.onerror = () => img.style.display = 'none';
      if (card.w) img.style.width = card.w + 'px';
      if (card.h) img.style.height = card.h + 'px';
      if (card.link) { const a = document.createElement('a'); a.href = card.link; a.target = '_blank'; a.appendChild(img); el.appendChild(a); }
      else { el.appendChild(img); }
      if (card.caption) { const cap = document.createElement('div'); cap.style.cssText = 'font-size:11px;color:#8b949e;margin-top:4px;word-break:break-word;padding:0 2px;'; cap.textContent = card.caption; el.appendChild(cap); }
    } else if (card.type === 'html') {
      const wrapper = document.createElement('div');
      wrapper.style.cssText = 'overflow:auto;font-size:13px;line-height:1.5;';
      wrapper.innerHTML = card.html.replace(/__ATTACHMENT__/g, IMG_BASE);
      wrapper.querySelectorAll('img').forEach(img => { img.style.maxWidth = '100%'; img.style.height = 'auto'; img.draggable = false; });
      wrapper.querySelectorAll('a').forEach(a => { a.target = '_blank'; a.style.color = '#6cb0f6'; });
      wrapper.querySelectorAll('table').forEach(t => { t.style.borderCollapse = 'collapse'; });
      wrapper.querySelectorAll('td,th').forEach(td => {
        td.style.border = '1px solid #444'; td.style.padding = '4px 6px'; td.style.verticalAlign = 'top';
        td.title = '더블클릭으로 편집';
        td.addEventListener('dblclick', function(e) {
          e.stopPropagation();
          snapshot();
          this.contentEditable = 'true';
          this.style.outline = '2px solid #388bfd';
          this.style.background = 'rgba(56,139,253,0.08)';
          this.focus();
        });
        td.addEventListener('blur', function() {
          this.contentEditable = 'false';
          this.style.outline = '';
          this.style.background = '';
          cards[i].html = wrapper.innerHTML.split(IMG_BASE).join('__ATTACHMENT__');
          saveBoard();
        });
      });
      el.appendChild(wrapper);
    } else if (card.type === 'table') {
      const rows = card.rows || [['','',''],['','',''],['','','']];
      const tbl = document.createElement('table');
      tbl.style.cssText = 'border-collapse:collapse;width:100%;font-size:13px;';
      rows.forEach((row, ri) => {
        const tr = tbl.insertRow();
        row.forEach((cell, ci) => {
          const td = document.createElement(ri === 0 ? 'th' : 'td');
          td.contentEditable = true;
          td.style.cssText = 'border:1px solid #30363d;padding:4px 8px;min-width:60px;text-align:left;' + (ri===0 ? 'background:#21262d;font-weight:600;' : '');
          td.textContent = cell;
          td.addEventListener('blur', () => { if (!cards[i].rows) cards[i].rows = rows; rows[ri][ci] = td.textContent; saveBoard(); });
          tr.appendChild(td);
        });
      });
      el.appendChild(tbl);
      const addRow = document.createElement('button');
      addRow.textContent = '+ 행'; addRow.style.cssText = 'margin-top:4px;font-size:11px;background:#21262d;border:1px solid #30363d;color:#8b949e;padding:2px 8px;border-radius:4px;cursor:pointer;';
      addRow.onclick = e => { e.stopPropagation(); snapshot(); if (!cards[i].rows) cards[i].rows = rows; cards[i].rows.push(new Array(cards[i].rows[0].length).fill('')); renderCards(); saveBoard(); };
      const addCol = document.createElement('button');
      addCol.textContent = '+ 열'; addCol.style.cssText = 'margin-top:4px;margin-left:4px;font-size:11px;background:#21262d;border:1px solid #30363d;color:#8b949e;padding:2px 8px;border-radius:4px;cursor:pointer;';
      addCol.onclick = e => { e.stopPropagation(); snapshot(); if (!cards[i].rows) cards[i].rows = rows; cards[i].rows.forEach(r => r.push('')); renderCards(); saveBoard(); };
      el.appendChild(addRow); el.appendChild(addCol);
    }
    const rh = document.createElement('div'); rh.className = 'resize-handle';
    rh.addEventListener('mousedown', e => { e.preventDefault(); e.stopPropagation(); snapshot(); resizing = { idx: i, startX: e.clientX, startW: card.w || el.offsetWidth }; });
    el.appendChild(rh);
    if (i === selectedIdx) el.classList.add('selected');
    board.appendChild(el);
  });
  requestAnimationFrame(() => {
    let maxB = 0;
    document.querySelectorAll('.card').forEach(el => { const b = (parseFloat(el.style.top)||0) + el.offsetHeight; if (b > maxB) maxB = b; });
    board.style.minHeight = (maxB + 100) + 'px';
  });
}

document.addEventListener('mousemove', e => {
  if (moving) {
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`); if (!el) return;
    let nx = moving.origX + e.clientX - moving.startX, ny = moving.origY + e.clientY - moving.startY;
    if (e.shiftKey) { nx = snap(nx); ny = snap(ny); el.style.outline = '1px dashed rgba(240,192,64,0.3)'; } else { el.style.outline = ''; }
    el.style.left = nx + 'px'; el.style.top = ny + 'px';
  }
  if (resizing) {
    let nw = resizing.startW + e.clientX - resizing.startX; if (e.shiftKey) nw = snap(nw);
    cards[resizing.idx].w = Math.max(100, nw);
    const el = document.querySelector(`.card[data-idx="${resizing.idx}"]`); if (el) el.style.width = cards[resizing.idx].w + 'px';
  }
});

document.addEventListener('mouseup', e => {
  if (moving) {
    let nx = moving.origX + e.clientX - moving.startX, ny = moving.origY + e.clientY - moving.startY;
    if (e.shiftKey) { nx = snap(nx); ny = snap(ny); }
    cards[moving.idx].x = Math.max(0, nx); cards[moving.idx].y = Math.max(0, ny);
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`); if (el) { el.classList.remove('moving'); el.style.outline = ''; }
    if (e.shiftKey) pushCards(moving.idx);
    moving = null; saveBoard();
  }
  if (resizing) { if (e.shiftKey) pushCards(resizing.idx); resizing = null; saveBoard(); }
});

function addTextCard() { snapshot(); cards.push({ type: 'text', content: '', x: 50, y: window.scrollY+100, w: 300 }); renderCards(); setTimeout(() => { const els = document.querySelectorAll('.card .text'); els[els.length-1]?.focus(); }, 100); }
function addImageCard() { const input = document.createElement('input'); input.type = 'file'; input.accept = 'image/*'; input.onchange = e => { const f = e.target.files[0]; if (!f) return; const r = new FileReader(); r.onload = () => { snapshot(); cards.push({ type: 'image', src: r.result, x: 50, y: window.scrollY+100, w: 240 }); renderCards(); saveBoard(); }; r.readAsDataURL(f); }; input.click(); }
function addImageUrl() { const url = prompt('이미지 URL'); if (!url) return; snapshot(); cards.push({ type: 'image', src: url, x: 50, y: window.scrollY+100, w: 240 }); renderCards(); saveBoard(); }
function addTableCard() {
  const colsStr = prompt('열 수 (기본 3)', '3'); const cols = Math.max(1, parseInt(colsStr)||3);
  const rowsStr = prompt('행 수 (헤더 포함, 기본 4)', '4'); const rows = Math.max(1, parseInt(rowsStr)||4);
  snapshot();
  cards.push({ type: 'table', rows: Array.from({length: rows}, (_, ri) => Array.from({length: cols}, (_, ci) => ri===0 ? `열${ci+1}` : '')), x: 50, y: window.scrollY+100, w: Math.max(240, cols*100) });
  renderCards(); saveBoard();
}
function exportBoard() { syncText(); const blob = new Blob([JSON.stringify(cards, null, 2)], { type: 'application/json' }); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = SAVE_KEY + '.json'; a.click(); }
// ── Zoom ─────────────────────────────────────────────────────────────────────
let zoom = parseFloat(localStorage.getItem('zoom-' + SAVE_KEY) || '1.0');
function applyZoom() {
  const board = document.getElementById('board');
  board.style.transform = `scale(${zoom})`;
  board.style.transformOrigin = '0 0';
  document.getElementById('zoom-level').textContent = Math.round(zoom * 100) + '%';
  localStorage.setItem('zoom-' + SAVE_KEY, zoom);
}
function zoomIn()  { zoom = Math.min(3.0, parseFloat((zoom + 0.1).toFixed(2))); applyZoom(); }
function zoomOut() { zoom = Math.max(0.2, parseFloat((zoom - 0.1).toFixed(2))); applyZoom(); }
document.addEventListener('keydown', e => {
  if (e.ctrlKey || e.metaKey) {
    if (e.key === '=' || e.key === '+') { e.preventDefault(); zoomIn(); }
    if (e.key === '-')                  { e.preventDefault(); zoomOut(); }
    if (e.key === '0')                  { e.preventDefault(); zoom = 1.0; applyZoom(); }
  }
});
document.getElementById('board').addEventListener('wheel', e => {
  if (!(e.ctrlKey || e.metaKey)) return;
  e.preventDefault();
  e.deltaY < 0 ? zoomIn() : zoomOut();
}, { passive: false });
applyZoom();
function resetLayout() { if (!confirm('자동 재배치합니다.')) return; cards.forEach(c => { delete c.x; delete c.y; }); renderCards(); autoLayout(); }
// ── Floating format toolbar ───────────────────────────────────────────────────
const fmtBar = document.getElementById('format-toolbar');
function fmt(cmd) { document.execCommand(cmd, false, null); saveBoard(); }
function fmtLink() {
  const sel = window.getSelection();
  if (!sel || sel.isCollapsed) return;
  const url = prompt('링크 URL 입력', 'https://');
  if (!url) return;
  document.execCommand('createLink', false, url);
  // make links open in new tab
  sel.anchorNode?.parentElement?.closest('a')?.setAttribute('target', '_blank');
  document.querySelectorAll('.text a').forEach(a => a.target = '_blank');
  saveBoard();
}

// prevent format buttons from blurring contenteditable
fmtBar.addEventListener('mousedown', e => e.preventDefault());

document.addEventListener('selectionchange', () => {
  const sel = window.getSelection();
  if (!sel || sel.isCollapsed || !sel.toString().trim()) { fmtBar.style.display = 'none'; return; }
  // only show if selection is inside a .text element
  const anchor = sel.anchorNode;
  if (!anchor) { fmtBar.style.display = 'none'; return; }
  const textEl = anchor.nodeType === 1 ? anchor.closest('.text') : anchor.parentElement?.closest('.text');
  if (!textEl) { fmtBar.style.display = 'none'; return; }
  // position above selection
  const range = sel.getRangeAt(0);
  const rect = range.getBoundingClientRect();
  fmtBar.style.display = 'flex';
  const tbW = fmtBar.offsetWidth || 180;
  let left = rect.left + rect.width / 2 - tbW / 2;
  left = Math.max(8, Math.min(left, window.innerWidth - tbW - 8));
  fmtBar.style.left = left + 'px';
  fmtBar.style.top = (rect.top - 44 + window.scrollY) + 'px';
});

setInterval(saveBoard, 30000);
loadBoard();
</script>
</body>
</html>
