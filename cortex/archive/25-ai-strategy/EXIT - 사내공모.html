:0pt\">경쟁은 국지적이지 않고 유의미한 Play가 가능한 사업자는 대부분 해외에 있어, 우리 사업의 성공 가능성을 제고하기 위해서는 Inoranic 전략은 필수 불가결한 요소라는 것을 절감하게 되었습니다.</p>\r\n\t\t\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\"> </p>\r\n\t\t\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\">이에, AI 사업의 성장과 함께 Career의 동반 성장을 도모하기 위해 이동을 희망합니다.</p>\r\n\t\t\t\t\t\t</td>\r\n\t\t\t\t\t</tr>\r\n\t\t\t\t\t<tr>\r\n\t\t\t\t\t\t<td style=\"border:1px solid\"><p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:NanumGothic;color:#292929\">해당 분야의 적임자라고 생각하는 이유</span></p>\r\n\t\t\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:NanumGothic;color:#292929\">_보유 경험 및 열정</span></p>\r\n\t\t\t\t\t\t</td>\r\n\t\t\t\t\t\t<td style=\"border:1px solid\"><p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\">1/ AI 사업 전반에 대한 높은 이해도</p>\r\n\t\t\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\">2/ 양자간 사업 시너지 및 Valuation을 토대로한 FI/SI 관점에서의 투자/제휴안 평가 역량</p>\r\n\t\t\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\">3/ 다년간의 전략기획 업무 수행 및 투자/Fundraising 경험</p>\r\n\t\t\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\"> </p>\r\n\t\t\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\">_____________________________________________________________</p>\r\n\t\t\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\"> </p>\r\n\t\t\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\">[1] AI 사업 전반에 대한 이해도</p>\r\n\t\t\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\"> </p>\r\n\t\t\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\">&#39;22년 Portfolio mgmt. 담당에서 AI/ Game/ Metavers 3개 섹터를 담당하며, 당시 Apollo향 AI Start-up 투자 건들을 Sourcing하고 평가하며 AI Value chain 전반에 대한 이해를 갖추기 시작했습니다.</p>\r\n\t\t\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\"> </p>\r\n\t\t\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\">최근에는 AI전략실에서 에이닷 Revisit &amp; Pivoting 방안, 에이닷 유니버스 전략 수립, PAA 통합 전략 수립을 위한 마켓 센싱, Vertical Agent확장을 위한 파트너십 등을 추진하며 SKT 전사 관점의 AI 사업에 대한 이해도를 높일 수 있었습니다.</p>\r\n\t\t\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\"> </p>\r\n\t\t\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\"> </p>\r\n\t\t\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\">[2] 양자간 사업 시너지 및 Valuation을 토대로한 FI/SI관점에서의 투자/제휴안 평가 역량</p>\r\n\t\t\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\"> </p>\r\n\t\t\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\">&#39;18년 부터는 콘텐츠웨이브 출범 및 Fundraising, wavve 성장을 위한 M&amp;A 및 지분투자 등 Deal추진 업무를 수행했습니다. 이 과 정에서 국내 방송 3사는 물론 다양한 이해관계자들간의 역학관계를 이해하고, 이에 맞춰 우리의 전략과 최적의 제안을 검토 할 수 있는 안목을 기르게 되었습니다.</p>\r\n\t\t\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\"> </p>\r\n\t\t\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\">이후 Portfolio mgmt. 담당에서 AI/ Game/ Metavers 3개 섹터를 담당하며, 게임사 &#39;해긴&#39;에 대한 투자 실행을 주도했습니다. 이 과정에서 각 영역은 물론 회사의 전략 방향과 내부 의사결정권자들이 가진 관점과의 Alignment를 높일 수 있었습니다.</p>\r\n\t\t\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\"> </p>\r\n\t\t\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\">&#39;24년에는 AI 전략 업무 이외에도, ICT 위원회 지원 업무를 병행하며, 그룹 관점의 ICT 멤버사 Revisit과 Pivoting을 지원하며 그룹 관점을 배양 할 수 있었습니다.</p>\r\n\t\t\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\"> </p>\r\n\t\t\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\">제휴 및 투자 업무를 훌륭하게 수행해 내기 위해서는,</p>\r\n\t\t\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\">1/ 잠재 제휴/Target의 니즈 혹은 Pain point에 대한 선제적 파악</p>\r\n\t\t\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\">2/ 양사간의 적정 교환 가치 혹은 적정 Value를산출하는 능력</p>\r\n\t\t\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\">3/ 해당 산업과 Player들 간의 역학관계, 고객의 사용행태에 대한 이해의 균형이 필요하다고 믿습니다.</p>\r\n\t\t\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\"> </p>\r\n\t\t\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\">저는 Peer multiple 및 DCF method 등을 통한 재무적인 관점에서의 기업가치 평가는 물론 고객과 사업 시너지 관점에서 사업의 가치를 총체적으로 이해하고, 이러한 균형 있는 프레임으로 제휴 및 투자안을 평가 할 수 있습니다.</p>\r\n\t\t\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\"> </p>\r\n\t\t\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\">수 년간 접한 투자안들과 Deal sourcing 및 검토 경험을 토대로, 수치와 근거를 바탕으로 명확한 관점을 제시 할 수 있습니다.</p>\r\n\t\t\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\"> </p>\r\n\t\t\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\"> </p>\r\n\t\t\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\">[3] 다년간의 전략기획 업무 수행 및 투자/Fundraising 경험</p>\r\n\t\t\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\"> </p>\r\n\t\t\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\">기획과 투자는 결국 의사결정을 위한 내부 컨센서스 구축을 돕는 과정이라고 생각합니다. 저는 Text와 데이터 위주의 기존 내부 보고 스타일은 물론, 스토리텔링을 위한 Presentation용 Key note 제작에 특화되어 있습니다.</p>\r\n\t\t\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\">다년간 투자유치를 위한 IM 작성, IR 및 투자자 대상 Pitching deck 작성 경험을보유하고 있습니다.</p>\r\n\t\t\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\"> </p>\r\n\t\t\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\"> </p>\r\n\t\t\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\">요컨대, 제휴/협력 및 투자해야 할 당위를가진 영역들에 대한 높은 이해도를 바탕으로 잠재 Target들을 발굴하고, 그들의 니즈 파악 및 적정 Value을 산출하여, SKT 내부는 물론 멤버사 전체 관점의 의사결정이 용이하도록 문서화 하는 모든 과정에 충분히 기여 할 수 있습니다.</p>\r\n\t\t\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\"> </p>\r\n\t\t\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\"> __________________________________________________</p>\r\n\t\t\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\"> </p>\r\n\t\t\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\">[주요 수행 업무]</p>\r\n\t\t\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\">_ AI 4대 사업영역과 3개 R&amp;D 센터 통합관점의 전사전략 수립 중 (2차 미래전략회의)</p>\r\n\t\t\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\">_ &#39;에이닷 유니버스&#39; 전략 수립</p>\r\n\t\t\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\">_ SKT-SPC AI중심 사업 협력 파트너십 주관</p>\r\n\t\t\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\">_에이닷 Revisit &amp; Pivoting 방안 수립</p>\r\n\t\t\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\">_ ICT 위원회 Module1 지원 - 주요 ICT Asset 대상 그룹 관점 Revisit &amp; Pivot 방안 수립 지원</p>\r\n\t\t\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\">_ PAA 통합 전략 수립을 위한 마켓 센싱(On Device AI 동향 및 AI Agent 벤치마킹 등)</p>\r\n\t\t\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\">_ 게임사 &#39;해긴&#39; 투자 집행(250억)</p>\r\n\t\t\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\">_ Metavers 파트너 2개 사 인수 추진</p>\r\n\t\t\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\">_ Metavers 고도화를 위한 중형 Game사 투자/인수 검토</p>\r\n\t\t\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\">_ Apollo향 n style=\"font-family:NanumGothic;color:black\">수 년간의 경험과 실패 혹은 성사되지 못한&#160;Deal을 통해, 수치와 근거를 바탕으로 사업이 나아가야 할 방향에 대해서, 그것의 옳고 그름을 떠나서 명확하게 제시 할 수 있다는 점에서&#160;Music/OTT의 투자 및 사업 성장에 적임자라고 생각합니다.</span></p>\r\n\t\t\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:NanumGothic;color:black\">&#160;</span></p>\r\n\t\t\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:NanumGothic;color:black\">[수행 업무]</span></p>\r\n\t\t\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:NanumGothic;color:black\">_ oksusu Spin-off 검토 및&#160;TM 보고</span></p>\r\n\t\t\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:NanumGothic;color:black\">_ 콘텐츠웨이브 출범을 위한 사업계획 작성</span></p>\r\n\t\t\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:NanumGothic;color:black\">_ 콘텐츠웨이브&#160;2,000억 투자 유치&#160;- GIC, TPG, IMM, Sequoia 등&#160;Global/Major FI 대상&#160;IM 작성 및&#160;IR 수행</span></p>\r\n\t\t\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:NanumGothic;color:black\">_ 中&#160;Bytedance-SKT JV설립을 위한 사업 시너지 검토 및&#160;DD 진행</span></p>\r\n\t\t\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:NanumGothic;color:black\">_ Singtel社의 HOOQ M&amp;A를 위한 사업 시너지/정합성 검토 및&#160;Valuation</span></p>\r\n\t\t\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:NanumGothic;color:black\">_ PCCW그룹 VIU M&amp;A를 위한 사업 시너지 검토 및&#160;Valuation</span></p>\r\n\t\t\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:NanumGothic;color:black\">_ KCP 투자 검토 및&#160;LOI 검토/작성</span></p>\r\n\t\t\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:NanumGothic;color:black\">_ 미래에셋벤처투자-SKT 공동펀드 조성 검토</span></p>\r\n\t\t\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:NanumGothic;color:black\">_ CJ ENM PP채널 인수 협의 진행</span></p>\r\n\t\t\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:NanumGothic;color:black\">_ 국내 중소형 제작사&#160;3개사 인수 검토 및 Valuation</span></p>\r\n\t\t\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:NanumGothic;color:black\">_ Tencent와의&#160;Global 공동진출을 위한&#160;Studio JV 설립 및 플랫폼 통합 논의</span></p>\r\n\t\t\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:NanumGothic;color:black\">_&#160; Apple, &#160;Deutsche Telekom, PCCW 그룹과&#160;SKT 사업 제휴를 위한&#160;C레벨 워크샵 자료 전담</span></p>\r\n\t\t\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:NanumGothic;color:black\">_ wavve 추가 투자 유치를 위한 Warner, Comcast 등&#160;Global Media SI 대상&#160;IR 수행</span></p>\r\n\t\t\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:NanumGothic;color:black\">_ wavve Japan 법인 설립을 위한 파트너쉽 및 사업 구조 검토</span></p>\r\n\t\t\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:NanumGothic;color:black\">_ SM Ent. - SKT 메타버스 플랫폼 공동 구축을 위한&#160;JV 설립 검토</span></p>\r\n\t\t\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:NanumGothic;color:black\">_ wavve 서비스 개선&#160;TF 실무 리드</span></p>\r\n\t\t\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:NanumGothic;color:black\">&#160;</span></p>\r\n\t\t\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:NanumGothic;color:black\">관심과 열정이 있는 분야라면, 자신의 주관에 대해 논리적으로 설명할 수 있어야 한다고 생각합니다.</span></p>\r\n\t\t\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:NanumGothic;color:black\">IPTV로 시작해서&#160;oksusu, wavve로 이어지는, Career를 관통하는&#160;New Media에 대한 관심과 이해의 축적,</span></p>\r\n\t\t\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:NanumGothic;color:black\">이에 그치지 않고 수 차례 제안서로 작성하여 사내에 공유해왔고 이 중 상당부분이 서비스에 반영된 바 있습니다.</span></p>\r\n\t\t\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:NanumGothic;color:black\">&#160;</span></p>\r\n\t\t\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:NanumGothic;color:black\">특히, 투자유치로 커리어를 확장한 이후에는, 지난&#160;2년간 자발적으로 OTT/Studio/Music Peer Group의 기업가치 동향을 파악하고 이를 그룹 내에&#160;Weekly 리포팅 해왔습니다. 이 과정에서 산업 전반의 거시적인 변화를 지속적으로 추적해 왔고, 미시적으로는 미디어는 물론 다양한&#160;IT 서비스가 고객에게 제공하는&#160;Value와 고객경험 관점에서 가지는 가치와 실패 요인에 대해 탐구해오고 있습니다.</span></p>\r\n\t\t\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:NanumGothic;color:black\">&#160;</span></p>\r\n\t\t\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:NanumGothic;color:black\">그간의 경험을 바탕으로, 재무적인 관점은 물론 고객 가치 측면에서의 사업의 가치를 총체적으로 이해하고, 이를 투자회사의 성장에 반영 할 수 있는&#160;Career 기회가 주어지길 희망합니다.</span></p>\r\n\t\t\t\t\t\t</td>\r\n\t\t\t\t\t</tr>\r\n\t\t\t\t\t<tr>\r\n\t\t\t\t\t\t<td style=\"border:1px solid;font-family:Pretendard Light\"><span style=\"font-family:NanumGothic;color:black\">향후&#160;Career Vision</span></td>\r\n\t\t\t\t\t\t<td style=\"border:1px solid\"><p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:NanumGothic;color:black\">Music/OTT 섹터에 대한 전문성을 기본으로, 커머스/모빌리티와 같은 생활에 밀착된 영역의 신성장/기술 영역에 대한 지속적인 학습을 더하여, ICT 영역 투자 전문가로서의&#160;Career를 이어 나가고자 합니다.</span></p>\r\n\t\t\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:NanumGothic;color:black\">&#160;</span></p>\r\n\t\t\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:NanumGothic;color:black\">기업 성장을 위한 투자와&#160;Fundraising은 물론, 사업 자체에 대한 깊은 이해를 바탕으로 사업 관리도 가능한 섹터 전문가로 성장하는 것이 최종 목표 입니다.</span></p>\r\n\t\t\t\t\t\t</td>\r\n\t\t\t\t\t</tr>\r\n\t\t\t\t</table>\r\n\t\t\t\t<br />\r\n\t\t\t\t<br />\r\n\t\t\t\t<br />\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:16pt;font-weight:bold\">1. Can you share a successful case of investment or partnership in the AI sector?</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\">AI <span style=\"font-family:Malgun Gothic\">분야에서 성공적인 투자 또는 제휴 사례를 공유해 주실 수 있나요</span>?</p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-weight:bold\">Answer / </span><span style=\"font-family:Malgun Gothic;font-weight:bold\">답변</span><span style=\"font-weight:bold\">:</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\">&quot;In 2018, I led a ₩25 billion investment in HAEGIN, a gaming company, by assessing its growth potential and aligning it with SKT’s strategic goals. Additionally, I successfully raised ₩200 billion for Wavve by conducting IR sessions with major investors like GIC and Sequoia, showcasing its strategic value and long-term scalability.&quot;</p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\">&quot;2018<span style=\"font-family:Malgun Gothic\">년</span>, <span style=\"font-family:Malgun Gothic\">게임사</span> &#39;<span style=\"font-family:Malgun Gothic\">해긴</span>&#39;<span style=\"font-family:Malgun Gothic\">에</span> 250<span style=\"font-family:Malgun Gothic\">억</span> <span style=\"font-family:Malgun Gothic\">원</span> <span style=\"font-family:Malgun Gothic\">규모의</span> <span style=\"font-family:Malgun Gothic\">투자를</span> <span style=\"font-family:Malgun Gothic\">이끌며</span> <span style=\"font-family:Malgun Gothic\">성장</span> <span style=\"font-family:Malgun Gothic\">가능성을</span> <span style=\"font-family:Malgun Gothic\">평가하고</span> SKT<span style=\"font-family:Malgun Gothic\">의</span> <span style=\"font-family:Malgun Gothic\">전략적</span> <span style=\"font-family:Malgun Gothic\">목표와</span> <span style=\"font-family:Malgun Gothic\">조율했습니다</span>. <span style=\"font-family:Malgun Gothic\">또한</span> Wavve <span style=\"font-family:Malgun Gothic\">투자</span> <span style=\"font-family:Malgun Gothic\">유치</span> <span style=\"font-family:Malgun Gothic\">프로젝트에서는</span> GIC, Sequoia <span style=\"font-family:Malgun Gothic\">등</span> <span style=\"font-family:Malgun Gothic\">주요</span> <span style=\"font-family:Malgun Gothic\">투자자들에게</span> <span style=\"font-family:Malgun Gothic\">전략적</span> <span style=\"font-family:Malgun Gothic\">가치와</span> <span style=\"font-family:Malgun Gothic\">장기</span> <span style=\"font-family:Malgun Gothic\">확장성을</span> <span style=\"font-family:Malgun Gothic\">제시하며</span> 2,000<span style=\"font-family:Malgun Gothic\">억</span> <span style=\"font-family:Malgun Gothic\">원을</span> <span style=\"font-family:Malgun Gothic\">성공적으로</span> <span style=\"font-family:Malgun Gothic\">유치했습니다</span>.&quot;</p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:16pt;font-weight:bold\">2. How do you assess and prioritize investments or partnerships?</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">투자 및 제휴를 평가하고 우선순위를 정하는 방법은 무엇인가요</span>?</p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-weight:bold\">Answer / </span><span style=\"font-family:Malgun Gothic;font-weight:bold\">답변</span><span style=\"font-weight:bold\">:</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\">&quot;I combine financial analysis (Peer Multiple, DCF) with qualitative assessments of business synergies and market positioning. For example, in evaluating Metaverse-related acquisitions, I analyzed potential synergies, scalability, and their alignment with SKT’s strategic goals.&quot;</p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\">&quot;<span style=\"font-family:Malgun Gothic\">재무</span> <span style=\"font-family:Malgun Gothic\">분석</span>(Peer Multiple, DCF)<span style=\"font-family:Malgun Gothic\">과</span> <span style=\"font-family:Malgun Gothic\">사업적</span> <span style=\"font-family:Malgun Gothic\">시너지</span>, <span style=\"font-family:Malgun Gothic\">시장</span> <span style=\"font-family:Malgun Gothic\">포지셔닝에</span> <span style=\"font-family:Malgun Gothic\">대한</span> <span style=\"font-family:Malgun Gothic\">정성적</span> <span style=\"font-family:Malgun Gothic\">평가를</span> <span style=\"font-family:Malgun Gothic\">병행합니다</span>. <span style=\"font-family:Malgun Gothic\">예를</span> <span style=\"font-family:Malgun Gothic\">들어</span>, <span style=\"font-family:Malgun Gothic\">메타버스</span> <span style=\"font-family:Malgun Gothic\">관련</span> <span style=\"font-family:Malgun Gothic\">인수</span> <span style=\"font-family:Malgun Gothic\">검토</span> <span style=\"font-family:Malgun Gothic\">시</span> <span style=\"font-family:Malgun Gothic\">잠재적</span> <span style=\"font-family:Malgun Gothic\">시너지</span>, <span style=\"font-family:Malgun Gothic\">확장성</span>, <span style=\"font-family:Malgun Gothic\">그리고</span> SKT<span style=\"font-family:Malgun Gothic\">의</span> <span style=\"font-family:Malgun Gothic\">전략적</span> <span style=\"font-family:Malgun Gothic\">목표와의</span> <span style=\"font-family:Malgun Gothic\">적합성을</span> <span style=\"font-family:Malgun Gothic\">분석했습니다</span>.&quot;</p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:16pt;font-weight:bold\">3. How do you overcome challenges in global AI business strategy implementation?</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">글로벌</span> AI <span style=\"font-family:Malgun Gothic\">사업 전략 실행에서 발생하는 어려움을 극복하는 방법은 무엇인가요</span>?</p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-weight:bold\">Answer / </span><span style=\"font-family:Malgun Gothic;font-weight:bold\">답변</span><span style=\"font-weight:bold\">:</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\">&quot;One challenge is aligning cultural and strategic differences in global partnerships. For instance, during the Tencent JV discussions, I bridged gaps by facilitating clear communication and aligning shared goals, which enabled a smooth negotiation process.&quot;</p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\">&quot;<span style=\"font-family:Malgun Gothic\">글로벌</span> <span style=\"font-family:Malgun Gothic\">파트너십에서</span> <span style=\"font-family:Malgun Gothic\">문화적</span>&#183;<span style=\"font-family:Malgun Gothic\">전략적</span> <span style=\"font-family:Malgun Gothic\">차이를</span> <span style=\"font-family:Malgun Gothic\">조율하는</span> <span style=\"font-family:Malgun Gothic\">것이</span> <span style=\"font-family:Malgun Gothic\">주요</span> <span style=\"font-family:Malgun Gothic\">도전</span> <span style=\"font-family:Malgun Gothic\">과제</span> <span style=\"font-family:Malgun Gothic\">중</span> <span style=\"font-family:Malgun Gothic\">하나입니다</span>. <span style=\"font-family:Malgun Gothic\">예를</span> <span style=\"font-family:Malgun Gothic\">들어</span>, Tencent JV <span style=\"font-family:Malgun Gothic\">논의</span> <span style=\"font-family:Malgun Gothic\">과정에서</span> <span style=\"font-family:Malgun Gothic\">명확한</span> <span style=\"font-family:Malgun Gothic\">커뮤니케이션과</span> <span style=\"font-family:Malgun Gothic\">공통</span> <span style=\"font-family:Malgun Gothic\">목표</span> <span style=\"font-family:Malgun Gothic\">설정을</span> <span style=\"font-family:Malgun Gothic\">통해</span> <span style=\"font-family:Malgun Gothic\">협상</span> <span style=\"font-family:Malgun Gothic\">과정을</span> <span style=\"font-family:Malgun Gothic\">원활히</span> <span style=\"font-family:Malgun Gothic\">진행할</span> <span style=\"font-family:Malgun Gothic\">수</span> <span style=\"font-family:Malgun Gothic\">있었습니다</span>.&quot;</p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:16pt;font-weight:bold\">4. Why do you think an Inoranic strategy is important in AI business growth?</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\">AI <span style=\"font-family:Malgun Gothic\">사업 성장에서</span> Inoranic <span style=\"font-family:Malgun Gothic\">전략이 왜 중요한가요</span>?</p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-weight:bold\">Answer / </span><span style=\"font-family:Malgun Gothic;font-weight:bold\">답변</span><span style=\"font-weight:bold\">:</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\">&quot;An Inoranic strategy is essential because most impactful players in AI are global. Establishing international partnerships and leveraging external resources are crucial for success. My work with Tencent and PCCW demonstrates my ability to implement such strategies effectively.&quot;</p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\">&quot;Inoranic <span style=\"font-family:Malgun Gothic\">전략은</span> AI <span style=\"font-family:Malgun Gothic\">산업의</span> <span style=\"font-family:Malgun Gothic\">주요</span> <span style=\"font-family:Malgun Gothic\">플레이어들이</span> <span style=\"font-family:Malgun Gothic\">글로벌에</span> <span style=\"font-family:Malgun Gothic\">집중되어</span> <span style=\"font-family:Malgun Gothic\">있기</span> <span style=\"font-family:Malgun Gothic\">때문에</span> <span style=\"font-family:Malgun Gothic\">필수적입니다</span>. <span style=\"font-family:Malgun Gothic\">국제적</span> <span style=\"font-family:Malgun Gothic\">파트너십을</span> <span style=\"font-family:Malgun Gothic\">구축하고</span> <span style=\"font-family:Malgun Gothic\">외부</span> <span style=\"font-family:Malgun Gothic\">자원을</span> <span style=\"font-family:Malgun Gothic\">활용하는</span> <span style=\"font-family:Malgun Gothic\">것이</span> <span style=\"font-family:Malgun Gothic\">성공의</span> <span style=\"font-family:Malgun Gothic\">핵심입니다</span>. Tencent <span style=\"font-family:Malgun Gothic\">및</span> PCCW<span style=\"font-family:Malgun Gothic\">와의</span> <span style=\"font-family:Malgun Gothic\">협력</span> <span style=\"font-family:Malgun Gothic\">경험은</span> <span style=\"font-family:Malgun Gothic\">제가</span> <span style=\"font-family:Malgun Gothic\">이러한</span> <span style=\"font-family:Malgun Gothic\">전략을</span> <span style=\"font-family:Malgun Gothic\">효과적으로</span> <span style=\"font-family:Malgun Gothic\">실행할</span> <span style=\"font-family:Malgun Gothic\">수</span> <span style=\"font-family:Malgun Gothic\">있음을</span> <span style=\"font-family:Malgun Gothic\">보여줍니다</span>.&quot;</p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:16pt;font-weight:bold\">5. How do you ensure alignment with stakeholders in complex projects?</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">복잡한 프로젝트에서 이해관계자들과의 조화를 어떻게 이루시나요</span>?</p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-weight:bold\">Answer / </span><span style=\"font-family:Malgun Gothic;font-weight:bold\">답변</span><span style=\"font-weight:bold\">:</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\">&quot;I ensure alignment by combining clear communication with detailed, data-driven presentations. For example, during the partnership discussions with Apple and Deutsche Telekom, I created materials highlighting mutual benefits and facilitated productive discussions at the C-level.&quot;</p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\">&quot;<span style=\"font-family:Malgun Gothic\">명확한</span> <span style=\"font-family:Malgun Gothic\">커뮤니케이션과</span> <span style=\"font-family:Malgun Gothic\">데이터</span> <span style=\"font-family:Malgun Gothic\">기반의</span> <span style=\"font-family:Malgun Gothic\">상세한</span> <span style=\"font-family:Malgun Gothic\">프레젠테이션을</span> <span style=\"font-family:Malgun Gothic\">통해</span> <span style=\"font-family:Malgun Gothic\">조화를</span> <span style=\"font-family:Malgun Gothic\">이룹니다</span>. <span style=\"font-family:Malgun Gothic\">예를</span> <span style=\"font-family:Malgun Gothic\">들어</span>, Apple<span style=\"font-family:Malgun Gothic\">과</span> Deutsche Telekom<span style=\"font-family:Malgun Gothic\">과의</span> <span style=\"font-family:Malgun Gothic\">파트너십</span> <span style=\"font-family:Malgun Gothic\">논의에서는</span> <span style=\"font-family:Malgun Gothic\">상호</span> <span style=\"font-family:Malgun Gothic\">이점을</span> <span style=\"font-family:Malgun Gothic\">강조하는</span> <span style=\"font-family:Malgun Gothic\">자료를</span> <span style=\"font-family:Malgun Gothic\">준비하고</span> C<span style=\"font-family:Malgun Gothic\">레벨</span> <span style=\"font-family:Malgun Gothic\">회의에서</span> <span style=\"font-family:Malgun Gothic\">생산적인</span> <span style=\"font-family:Malgun Gothic\">대화를</span> <span style=\"font-family:Malgun Gothic\">이끌어냈습니다</span>.&quot;</p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:16pt;font-weight:bold\">6. Can you describe your experience with fundraising and pitching to global investors?</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">글로벌 투자자 대상 펀드레이징 및 피칭 경험을 말씀해 주실 수 있나요</span>?</p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-weight:bold\">Answer / </span><span style=\"font-family:Malgun Gothic;font-weight:bold\">답변</span><span style=\"font-weight:bold\">:</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\">&quot;I have extensive experience in drafting investment memos, IR decks, and pitching. For instance, during the Wavve project, I conducted IR sessions with Warner and Comcast, successfully showcasing its growth trajectory and strategic value.&quot;</p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\">&quot;IM <span style=\"font-family:Malgun Gothic\">작성</span>, IR <span style=\"font-family:Malgun Gothic\">자료</span> <span style=\"font-family:Malgun Gothic\">제작</span>, <span style=\"font-family:Malgun Gothic\">피칭</span> <span style=\"font-family:Malgun Gothic\">등</span> <span style=\"font-family:Malgun Gothic\">다양한</span> <span style=\"font-family:Malgun Gothic\">펀드레이징</span> <span style=\"font-family:Malgun Gothic\">경험이</span> <span style=\"font-family:Malgun Gothic\">있습니다</span>. Wavve <span style=\"font-family:Malgun Gothic\">프로젝트에서는</span> Warner<span style=\"font-family:Malgun Gothic\">와</span> Comcast<span style=\"font-family:Malgun Gothic\">를</span> <span style=\"font-family:Malgun Gothic\">대상으로</span> IR <span style=\"font-family:Malgun Gothic\">세션을</span> <span style=\"font-family:Malgun Gothic\">진행하며</span> <span style=\"font-family:Malgun Gothic\">성장</span> <span style=\"font-family:Malgun Gothic\">궤적과</span> <span style=\"font-family:Malgun Gothic\">전략적</span> <span style=\"font-family:Malgun Gothic\">가치를</span> <span style=\"font-family:Malgun Gothic\">성공적으로</span> <span style=\"font-family:Malgun Gothic\">제시했습니다</span>.&quot;</p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:16pt;font-weight:bold\">7. How do you utilize storytelling in strategy presentations?</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">전략 프레젠테이션에서 스토리텔링은 어떤 역할을 하나요</span>?</p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-weight:bold\">Answer / </span><span style=\"font-family:Malgun Gothic;font-weight:bold\">답변</span><span style=\"font-weight:bold\">:</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\">&quot;Storytelling simplifies complex data and helps engage stakeholders. For instance, in presenting the AI Universe strategy, I combined market data with narratives to clearly communicate SKT’s vision and competitive advantage.&quot;</p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\">&quot;<span style=\"font-family:Malgun Gothic\">스토리텔링은</span> <span style=\"font-family:Malgun Gothic\">복잡한</span> <span style=\"font-family:Malgun Gothic\">데이터를</span> <span style=\"font-family:Malgun Gothic\">간소화하고</span> <span style=\"font-family:Malgun Gothic\">이해관계자들과</span> <span style=\"font-family:Malgun Gothic\">효과적으로</span> <span style=\"font-family:Malgun Gothic\">소통하는</span> <span style=\"font-family:Malgun Gothic\">데</span> <span style=\"font-family:Malgun Gothic\">중요한</span> <span style=\"font-family:Malgun Gothic\">역할을</span> <span style=\"font-family:Malgun Gothic\">합니다</span>. <span style=\"font-family:Malgun Gothic\">예를</span> <span style=\"font-family:Malgun Gothic\">들어</span>, AI Universe <span style=\"font-family:Malgun Gothic\">전략</span> <span style=\"font-family:Malgun Gothic\">발표에서는</span> <span style=\"font-family:Malgun Gothic\">시장</span> <span style=\"font-family:Malgun Gothic\">데이터와</span> <span style=\"font-family:Malgun Gothic\">내러티브를</span> <span style=\"font-family:Malgun Gothic\">결합해</span> SKT<span style=\"font-family:Malgun Gothic\">의</span> <span style=\"font-family:Malgun Gothic\">비전과</span> <span style=\"font-family:Malgun Gothic\">경쟁</span> <span style=\"font-family:Malgun Gothic\">우위를</span> <span style=\"font-family:Malgun Gothic\">명확히</span> <span style=\"font-family:Malgun Gothic\">전달했습니다</span>.&quot;</p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:16pt;font-weight:bold\">8. How do you manage decision-making in high-stakes projects?</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">중요한 프로젝트에서 의사결정을 어떻게 관리하시나요</span>?</p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-weight:bold\">Answer / </span><span style=\"font-family:Malgun Gothic;font-weight:bold\">답변</span><span style=\"font-weight:bold\">:</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\">&quot;I leverage thorough market sensing and financial analysis to make informed decisions. For instance, during the AI strategy pivot for A-Dot, I conducted benchmarking of On-Device AI trends and Agent services, which provided the foundation for actionable recommendations.&quot;</p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\">&quot;<span style=\"font-family:Malgun Gothic\">철저한</span> <span style=\"font-family:Malgun Gothic\">시장</span> <span style=\"font-family:Malgun Gothic\">분석과</span> <span style=\"font-family:Malgun Gothic\">재무</span> <span style=\"font-family:Malgun Gothic\">분석을</span> <span style=\"font-family:Malgun Gothic\">통해</span> <span style=\"font-family:Malgun Gothic\">정보에</span> <span style=\"font-family:Malgun Gothic\">기반한</span> <span style=\"font-family:Malgun Gothic\">결정을</span> <span style=\"font-family:Malgun Gothic\">내립니다</span>. <span style=\"font-family:Malgun Gothic\">예를</span> <span style=\"font-family:Malgun Gothic\">들어</span>, A-Dot<span style=\"font-family:Malgun Gothic\">의</span> AI <span style=\"font-family:Malgun Gothic\">전략</span> <span style=\"font-family:Malgun Gothic\">피벗</span> <span style=\"font-family:Malgun Gothic\">과정에서는</span> On-Device AI <span style=\"font-family:Malgun Gothic\">트렌드와</span> <span style=\"font-family:Malgun Gothic\">에이전트</span> <span style=\"font-family:Malgun Gothic\">서비스에</span> <span style=\"font-family:Malgun Gothic\">대한</span> <span style=\"font-family:Malgun Gothic\">벤치마킹을</span> <span style=\"font-family:Malgun Gothic\">수행하며</span> <span style=\"font-family:Malgun Gothic\">실행</span> <span style=\"font-family:Malgun Gothic\">가능한</span> <span style=\"font-family:Malgun Gothic\">추천안을</span> <span style=\"font-family:Malgun Gothic\">제시할</span> <span style=\"font-family:Malgun Gothic\">수</span> <span style=\"font-family:Malgun Gothic\">있었습니다</span>.&quot;</p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:16pt;font-weight:bold\">9. What is your long-term career vision in the AI sector?</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\">AI <span style=\"font-family:Malgun Gothic\">분야에서의 장기적인 커리어 비전은 무엇인가요</span>?</p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-weight:bold\">Answer / </span><span style=\"font-family:Malgun Gothic;font-weight:bold\">답변</span><span style=\"font-weight:bold\">:</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\">&quot;My goal is to become an AI business development expert who can manage and enhance the value of AI projects across the entire value chain. I aim to deepen my understanding of AI’s comprehensive value and leverage it for strategic growth.&quot;</p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\">&quot;AI <span style=\"font-family:Malgun Gothic\">프로젝트의</span> <span style=\"font-family:Malgun Gothic\">전체</span> <span style=\"font-family:Malgun Gothic\">밸류</span> <span style=\"font-family:Malgun Gothic\">체인을</span> <span style=\"font-family:Malgun Gothic\">관리하고</span> <span style=\"font-family:Malgun Gothic\">가치를</span> <span style=\"font-family:Malgun Gothic\">증대할</span> <span style=\"font-family:Malgun Gothic\">수</span> <span style=\"font-family:Malgun Gothic\">있는</span> AI <span style=\"font-family:Malgun Gothic\">사업</span> <span style=\"font-family:Malgun Gothic\">개발</span> <span style=\"font-family:Malgun Gothic\">전문가로</span> <span style=\"font-family:Malgun Gothic\">성장하는</span> <span style=\"font-family:Malgun Gothic\">것이</span> <span style=\"font-family:Malgun Gothic\">목표입니다</span>. AI<span style=\"font-family:Malgun Gothic\">의</span> <span style=\"font-family:Malgun Gothic\">총체적</span> <span style=\"font-family:Malgun Gothic\">가치를</span> <span style=\"font-family:Malgun Gothic\">심층적으로</span> <span style=\"font-family:Malgun Gothic\">이해하고</span> <span style=\"font-family:Malgun Gothic\">이를</span> <span style=\"font-family:Malgun Gothic\">전략적</span> <span style=\"font-family:Malgun Gothic\">성장에</span> <span style=\"font-family:Malgun Gothic\">활용하고자</span> <span style=\"font-family:Malgun Gothic\">합니다</span>.&quot;</p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:16pt;font-weight:bold\">10. Why do you believe you are the right fit for this role?</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">왜 이 역할에 적합하다고 생각하시나요</span>?</p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-weight:bold\">Answer / </span><span style=\"font-family:Malgun Gothic;font-weight:bold\">답변</span><span style=\"font-weight:bold\">:</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\">&quot;My experience in AI strategy, investments, and global partnerships equips me to excel in this role. For instance, I successfully managed AI-driven collaborations like SKT-SPC and Tencent JV, demonstrating my ability to align strategic goals and deliver results.&quot;</p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\">&quot;AI <span style=\"font-family:Malgun Gothic\">전략</span>, <span style=\"font-family:Malgun Gothic\">투자</span>, <span style=\"font-family:Malgun Gothic\">글로벌</span> <span style=\"font-family:Malgun Gothic\">파트너십</span> <span style=\"font-family:Malgun Gothic\">경험을</span> <span style=\"font-family:Malgun Gothic\">통해</span> <span style=\"font-family:Malgun Gothic\">이</span> <span style=\"font-family:Malgun Gothic\">역할에</span> <span style=\"font-family:Malgun Gothic\">필요한</span> <span style=\"font-family:Malgun Gothic\">역량을</span> <span style=\"font-family:Malgun Gothic\">갖추고</span> <span style=\"font-family:Malgun Gothic\">있습니다</span>. <span style=\"font-family:Malgun Gothic\">예를</span> <span style=\"font-family:Malgun Gothic\">들어</span>, SKT-SPC <span style=\"font-family:Malgun Gothic\">및</span> Tencent JV<span style=\"font-family:Malgun Gothic\">와</span> <span style=\"font-family:Malgun Gothic\">같은</span> AI <span style=\"font-family:Malgun Gothic\">중심</span> <span style=\"font-family:Malgun Gothic\">협력을</span> <span style=\"font-family:Malgun Gothic\">성공적으로</span> <span style=\"font-family:Malgun Gothic\">관리하며</span> <span style=\"font-family:Malgun Gothic\">전략적</span> <span style=\"font-family:Malgun Gothic\">목표를</span> <span style=\"font-family:Malgun Gothic\">조율하고</span> <span style=\"font-family:Malgun Gothic\">성과를</span> <span style=\"font-family:Malgun Gothic\">도출한</span> <span style=\"font-family:Malgun Gothic\">경험이</span> <span style=\"font-family:Malgun Gothic\">있습니다</span>.&quot;</p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<br />\r\n\t\t\t\t<cite style=\"font-family:Calibri;font-size:9pt;color:#595959;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">출처</span>: &lt;<a href=\"https://mail.naver.com/v2/read/0/123141\">https://mail.naver.com/v2/read/0/123141</a>&gt; </cite>\r\n\t\t\t\t<br />\r\n\t\t\t\t<br />\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:16pt;font-weight:bold\">1. Can you share a successful case of investment or partnership in the AI sector?</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\">&quot;In 2018, I led a ₩25 billion investment in HAEGIN, a gaming company, by assessing its growth potential and aligning it with SKT’s strategic goals. Additionally, I successfully raised ₩200 billion for Wavve by conducting IR sessions with major investors like GIC and Sequoia, showcasing its strategic value and long-term scalability.&quot;</p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<br />\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:16pt;font-weight:bold\">2. How do you assess and prioritize investments or partnerships?</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\">&quot;I combine financial analysis (Peer Multiple, DCF) with qualitative assessments of business synergies and market positioning. For example, in evaluating Metaverse-related acquisitions, I analyzed potential synergies, scalability, and their alignment with SKT’s strategic goals.&quot;</p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<br />\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:16pt;font-weight:bold\">3. How do you overcome challenges in global AI business strategy implementation?</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\">&quot;One challenge is aligning cultural and strategic differences in global partnerships. For instance, during the Tencent JV discussions, I bridged gaps by facilitating clear communication and aligning shared goals, which enabled a smooth negotiation process.&quot;</p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<br />\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:16pt;font-weight:bold\">4. Why do you think an Inoranic strategy is important in AI business growth?</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\">&quot;An Inoranic strategy is essential because most impactful players in AI are global. Establishing international partnerships and leveraging external resources are crucial for success. My work with Tencent and PCCW demonstrates my ability to implement such strategies effectively.&quot;</p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<br />\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:16pt;font-weight:bold\">5. How do you ensure alignment with stakeholders in complex projects?</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\">&quot;I ensure alignment by combining clear communication with detailed, data-driven presentations. For example, during the partnership discussions with Apple and Deutsche Telekom, I created materials highlighting mutual benefits and facilitated productive discussions at the C-level.&quot;</p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<br />\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:16pt;font-weight:bold\">6. Can you describe your experience with fundraising and pitching to global investors?</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\">&quot;I have extensive experience in drafting investment memos, IR decks, and pitching. For instance, during the Wavve project, I conducted IR sessions with Warner and Comcast, successfully showcasing its growth trajectory and strategic value.&quot;</p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<br />\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:16pt;font-weight:bold\">7. How do you utilize storytelling in strategy presentations?</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\">&quot;Storytelling simplifies complex data and helps engage stakeholders. For instance, in presenting the AI Universe strategy, I combined market data with narratives to clearly communicate SKT’s vision and competitive advantage.&quot;</p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<br />\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:16pt;font-weight:bold\">8. How do you manage decision-making in high-stakes projects?</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\">&quot;I leverage thorough market sensing and financial analysis to make informed decisions. For instance, during the AI strategy pivot for A-Dot, I conducted benchmarking of On-Device AI trends and Agent services, which provided the foundation for actionable recommendations.&quot;</p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<br />\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:16pt;font-weight:bold\">9. What is your long-term career vision in the AI sector?</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\">&quot;My goal is to become an AI business development expert who can manage and enhance the value of AI projects across the entire value chain. I aim to deepen my understanding of AI’s comprehensive value and leverage it for strategic growth.&quot;</p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<br />\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:16pt;font-weight:bold\">10. Why do you believe you are the right fit for this role?</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\">&quot;My experience in AI strategy, investments, and global partnerships equips me to excel in this role. For instance, I successfully managed AI-driven collaborations like SKT-SPC and Tencent JV, demonstrating my ability to align strategic goals and deliver results.&quot;</p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:16pt;font-weight:bold\">**1. What motivated you to transition to a role focusing on global AI strategy?</span></p>\r\n\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\">글로벌 AI 전략 중심의 역할로 전환을 희망하게 된 동기는 무엇인가요?**</p>\r\n\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-weight:bold\">Answer / 답변:</span></p>\r\n\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\">&quot;My experience in managing AI/Game/Metaverse investments taught me that meaningful growth often requires collaboration with international partners. To maximize our success in the rapidly changing market, I realized the need to adopt an Inoranic strategy, which became a key motivator for my transition.&quot;</p>\r\n\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\">&quot;AI/Game/Metaverse 투자 업무를 관리하면서 유의미한 성장이 국제적 파트너와의 협력을 필요로 한다는 점을 배웠습니다. 급변하는 시장에서 성공 가능성을 극대화하려면 Inoranic 전략을 채택해야 한다는 것을 깨달았고, 이것이 제 전환의 주요 동기가 되었습니다.&quot;</p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:16pt;font-weight:bold\">**2. How do you define success in your AI strategy initiatives?</span></p>\r\n\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\">AI 전략 이니셔티브에서 성공을 어떻게 정의하시나요?**</p>\r\n\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-weight:bold\">Answer / 답변:</span></p>\r\n\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\">&quot;Success is when a strategy aligns seamlessly with market needs, delivers measurable business outcomes, and fosters long-term partnerships. For instance, in the Wavve fundraising project, success was defined by both capital raised and the strategic value created for stakeholders.&quot;</p>\r\n\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\">&quot;성공은 전략이 시장 요구에 잘 부합하고, 측정 가능한 비즈니스 성과를 제공하며, 장기적 파트너십을 구축할 때 정의됩니다. 예를 들어, Wavve 투자 유치 프로젝트에서는 자본 조달뿐만 아니라 이해관계자들에게 창출된 전략적 가치로 성공을 평가했습니다.&quot;</p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:16pt;font-weight:bold\">**3. Can you explain your role in the A-Dot pivot and its outcome?</span></p>\r\n\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\">에이닷(A-Dot) 피벗에서의 역할과 결과를 설명해 주실 수 있나요?**</p>\r\n\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-weight:bold\">Answer / 답변:</span></p>\r\n\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\">&quot;I led the market analysis and On-Device AI benchmarking to identify pain points and opportunities. This informed the pivot strategy, which successfully realigned A-Dot&#39;s offerings with user needs, driving increased engagement.&quot;</p>\r\n\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\">&quot;시장 분석과 On-Device AI 벤치마킹을 주도하며 문제점과 기회를 파악했습니다. 이를 통해 피벗 전략을 수립했고, 에이닷의 제공 서비스가 사용자 요구에 맞게 재조정되어 참여도가 증가하는 성과를 거뒀습니다.&quot;</p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:16pt;font-weight:bold\">**4. What is your approach to identifying potential synergies in a partnership?</span></p>\r\n\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\">파트너십에서 잠재적 시너지를 식별하는 접근법은 무엇인가요?**</p>\r\n\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-weight:bold\">Answer / 답변:</span></p>\r\n\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\">&quot;I analyze both parties’ assets, market positions, and long-term goals. For example, during the SPC partnership, I identified complementary strengths in AI-driven solutions, leading to a collaboration that benefited both companies.&quot;</p>\r\n\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\">&quot;양측의 자산, 시장 포지션, 장기 목표를 분석합니다. 예를 들어, SPC와의 파트너십에서는 AI 기반 솔루션에서 상호 보완적 강점을 식별하여 양측 모두에게 이익이 되는 협력을 이끌어냈습니다.&quot;</p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:16pt;font-weight:bold\">**5. How do you evaluate risks in AI-related investments?</span></p>\r\n\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\">AI 관련 투자에서 위험 요소를 평가하는 방법은 무엇인가요?**</p>\r\n\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-weight:bold\">Answer / 답변:</span></p>\r\n\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\">&quot;I evaluate risks by analyzing market trends, competitive positioning, and scalability. In the case of the Metaverse-related acquisitions, I identified financial and market risks early, which helped guide more informed decisions.&quot;</p>\r\n\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\">&quot;시장 트렌드, 경쟁 포지셔닝, 확장성을 분석하여 위험 요소를 평가합니다. 메타버스 관련 인수 사례에서는 재무 및 시장 위험을 초기에 파악하여 보다 정보에 기반한 결정을 내릴 수 있었습니다.&quot;</p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:16pt;font-weight:bold\">**6. How do you handle cross-functional collaboration in AI projects?</span></p>\r\n\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\">AI 프로젝트에서 부서 간 협업을 어떻게 관리하시나요?**</p>\r\n\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-weight:bold\">Answer / 답변:</span></p>\r\n\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\">&quot;I ensure collaboration by aligning objectives and maintaining open communication. For instance, during the PAA integration project, I worked closely with technical and business teams to streamline execution and achieve shared goals.&quot;</p>\r\n\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\">&quot;목표를 조율하고 원활한 커뮤니케이션을 유지하며 협업을 관리합니다. 예를 들어, PAA 통합 프로젝트에서는 기술 팀과 비즈니스 팀과 긴밀히 협력하여 실행을 간소화하고 공동 목표를 달성했습니다.&quot;</p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:16pt;font-weight:bold\">**7. How do you approach international expansion in the AI sector?</span></p>\r\n\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\">AI 분야의 국제 확장을 어떻게 접근하시나요?**</p>\r\n\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-weight:bold\">Answer / 답변:</span></p>\r\n\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\">&quot;I focus on understanding local market dynamics and building strong partnerships. For example, when exploring expansion into Japan with Wavve, I conducted in-depth market research and secured partnerships with local players.&quot;</p>\r\n\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\">&quot;현지 시장의 역학을 이해하고 강력한 파트너십을 구축하는 데 중점을 둡니다. 예를 들어, Wavve의 일본 진출을 모색할 때 심층적인 시장 조사를 수행하고 현지 플레이어와의 파트너십을 확보했습니다.&quot;</p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:16pt;font-weight:bold\">**8. Can you describe a challenging decision you had to make in your career?</span></p>\r\n\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\">경력에서 내리기 어려웠던 결정을 설명해 주실 수 있나요?**</p>\r\n\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-weight:bold\">Answer / 답변:</span></p>\r\n\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\">&quot;One challenging decision was halting an acquisition of a mid-sized gaming company due to unforeseen financial risks. Although difficult, this decision allowed us to allocate resources more effectively to other strategic initiatives.&quot;</p>\r\n\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\">&quot;중형 게임사의 인수를 중단하기로 한 결정이 어려웠습니다. 예상치 못한 재무적 위험이 발견되었기 때문입니다. 하지만 이 결정을 통해 자원을 다른 전략적 이니셔티브에 더 효과적으로 할당할 수 있었습니다.&quot;</p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:16pt;font-weight:bold\">**9. How do you adapt to fast-changing trends in the AI industry?</span></p>\r\n\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\">AI 산업의 빠르게 변화하는 트렌드에 어떻게 적응하시나요?**</p>\r\n\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-weight:bold\">Answer / 답변:</span></p>\r\n\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\">&quot;I stay updated through market sensing, competitor analysis, and trend monitoring. For example, I benchmarked global On-Device AI services to refine SKT’s offerings, ensuring alignment with user demands.&quot;</p>\r\n\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\">&quot;시장 감지, 경쟁사 분석, 트렌드 모니터링을 통해 최신 상태를 유지합니다. 예를 들어, 글로벌 On-Device AI 서비스를 벤치마킹하여 SKT의 제공 서비스를 개선하고 사용자 요구에 맞췄습니다.&quot;</p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:16pt;font-weight:bold\">**10. How do you envision contributing to this role and the company’s success?</span></p>\r\n\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\">이 역할에서 회사의 성공에 어떻게 기여할 수 있다고 생각하시나요?**</p>\r\n\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-weight:bold\">Answer / 답변:</span></p>\r\n\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\">&quot;My experience in AI strategy, global partnerships, and fundraising equips me to drive impactful initiatives. I aim to leverage my expertise to identify growth opportunities and deliver measurable outcomes in global AI business expansion.&quot;</p>\r\n\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\">&quot;AI 전략, 글로벌 파트너십, 펀드레이징 경험을 통해 의미 있는 이니셔티브를 추진할 역량을 갖추고 있습니다. 제 전문성을 활용해 성장 기회를 식별하고 글로벌 AI 비즈니스 확장에서 측정 가능한 성과를 제공하고자 합니다.&quot;</p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:16pt;font-weight:bold\">11. Can you share a successful case of investment or partnership in the AI sector?</span></p>\r\n\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-weight:bold\">AI 분야에서 성공적인 투자 또는 제휴 사례를 공유해 주실 수 있나요?</span></p>\r\n\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\">&quot;In 2018, I led a ₩25 billion investment in HAEGIN, a gaming company, by assessing its growth potential and aligning it with SKT’s strategic goals. Additionally, I successfully raised ₩200 billion for Wavve by conducting IR sessions with major investors like GIC and Sequoia, showcasing its strategic value and long-term scalability.&quot;</p>\r\n\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\">&quot;2018년, 게임사 &#39;해긴&#39;에 250억 원 규모의 투자를 이끌며 성장 가능성을 평가하고 SKT의 전략적 목표와 조율했습니다. 또한 Wavve 투자 유치 프로젝트에서는 GIC, Sequoia 등 주요 투자자들에게 전략적 가치와 장기 확장성을 제시하며 2,000억 원을 성공적으로 유치했습니다.&quot;</p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:16pt;font-weight:bold\">12. How do you assess and prioritize investments or partnerships?</span></p>\r\n\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-weight:bold\">투자 및 제휴를 평가하고 우선순위를 정하는 방법은 무엇인가요?</span></p>\r\n\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\">&quot;I combine financial analysis (Peer Multiple, DCF) with qualitative assessments of business synergies and market positioning. For example, in evaluating Metaverse-related acquisitions, I analyzed potential synergies, scalability, and their alignment with SKT’s strategic goals.&quot;</p>\r\n\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\">&quot;재무 분석(Peer Multiple, DCF)과 사업적 시너지, 시장 포지셔닝에 대한 정성적 평가를 병행합니다. 예를 들어, 메타버스 관련 인수 검토 시 잠재적 시너지, 확장성, 그리고 SKT의 전략적 목표와의 적합성을 분석했습니다.&quot;</p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:16pt;font-weight:bold\">13. How do you overcome challenges in global AI business strategy implementation?</span></p>\r\n\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-weight:bold\">글로벌 AI 사업 전략 실행에서 발생하는 어려움을 극복하는 방법은 무엇인가요?</span></p>\r\n\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\">&quot;One challenge is aligning cultural and strategic differences in global partnerships. For instance, during the Tencent JV discussions, I bridged gaps by facilitating clear communication and aligning shared goals, which enabled a smooth negotiation process.&quot;</p>\r\n\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\">&quot;글로벌 파트너십에서 문화적&#183;전략적 차이를 조율하는 것이 주요 도전 과제 중 하나입니다. 예를 들어, Tencent JV 논의 과정에서 명확한 커뮤니케이션과 공통 목표 설정을 통해 협상 과정을 원활히 진행할 수 있었습니다.&quot;</p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:16pt;font-weight:bold\">14. Why do you think an Inoranic strategy is important in AI business growth?</span></p>\r\n\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-weight:bold\">AI 사업 성장에서 Inoranic 전략이 왜 중요한가요?</span></p>\r\n\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\">&quot;An Inoranic strategy is essential because most impactful players in AI are global. Establishing international partnerships and leveraging external resources are crucial for success. My work with Tencent and PCCW demonstrates my ability to implement such strategies effectively.&quot;</p>\r\n\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\">&quot;Inoranic 전략은 AI 산업의 주요 플레이어들이 글로벌에 집중되어 있기 때문에 필수적입니다. 국제적 파트너십을 구축하고 외부 자원을 활용하는 것이 성공의 핵심입니다. Tencent 및 PCCW와의 협력 경험은 제가 이러한 전략을 효과적으로 실행할 수 있음을 보여줍니다.&quot;</p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:16pt;font-weight:bold\">15. How do you ensure alignment with stakeholders in complex projects?</span></p>\r\n\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-weight:bold\">복잡한 프로젝트에서 이해관계자들과의 조화를 어떻게 이루시나요?</span></p>\r\n\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\">&quot;I ensure alignment by combining clear communication with detailed, data-driven presentations. For example, during the partnership discussions with Apple and Deutsche Telekom, I created materials highlighting mutual benefits and facilitated productive discussions at the C-level.&quot;</p>\r\n\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\">&quot;명확한 커뮤니케이션과 데이터 기반의 상세한 프레젠테이션을 통해 조화를 이룹니다. 예를 들어, Apple과 Deutsche Telekom과의 파트너십 논의에서는 상호 이점을 강조하는 자료를 준비하고 C레벨 회의에서 생산적인 대화를 이끌어낸 경험이 있습니다.&quot;</p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:16pt;font-weight:bold\">16. Can you describe your experience with fundraising and pitching to global investors?</span></p>\r\n\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-weight:bold\">글로벌 투자자 대상 펀드레이징 및 피칭 경험을 말씀해 주실 수 있나요?</span></p>\r\n\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\">&quot;I have extensive experience in drafting investment memos, IR decks, and pitching. For instance, during the Wavve project, I conducted IR sessions with Warner and Comcast, successfully showcasing its growth trajectory and strategic value.&quot;</p>\r\n\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\">&quot;IM 작성, IR 자료 제작, 피칭 등 다양한 펀드레이징 경험이 있습니다. Wavve 프로젝트에서는 Warner와 Comcast를 대상으로 IR 세션을 진행하며 성장 궤적과 전략적 가치를 성공적으로 제시했습니다.&quot;</p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:16pt;font-weight:bold\">17. How do you utilize storytelling in strategy presentations?</span></p>\r\n\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-weight:bold\">전략 프레젠테이션에서 스토리텔링은 어떤 역할을 하나요?</span></p>\r\n\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\">&quot;Storytelling simplifies complex data and helps engage stakeholders. For instance, in presenting the AI Universe strategy, I combined market data with narratives to clearly communicate SKT’s vision and competitive advantage.&quot;</p>\r\n\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\">&quot;스토리텔링은 복잡한 데이터를 간소화하고 이해관계자들과 효과적으로 소통하는 데 중요한 역할을 합니다. 예를 들어, AI Universe 전략 발표에서는 시장 데이터와 내러티브를 결합해 SKT의 비전과 경쟁 우위를 명확히 전달했습니다.&quot;</p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:16pt;font-weight:bold\">18. How do you manage decision-making in high-stakes projects?</span></p>\r\n\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-weight:bold\">중요한 프로젝트에서 의사결정을 어떻게 관리하시나요?</span></p>\r\n\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\">&quot;I leverage thorough market sensing and financial analysis to make informed decisions. For instance, during the AI strategy pivot for A-Dot, I conducted benchmarking of On-Device AI trends and Agent services, which provided the foundation for actionable recommendations.&quot;</p>\r\n\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\">&quot;철저한 시장 분석과 재무 분석을 통해 정보에 기반한 결정을 내립니다. 예를 들어, A-Dot의 AI 전략 피벗 과정에서는 On-Device AI 트렌드와 에이전트 서비스에 대한 벤치마킹을 수행하며 실행 가능한 추천안을 제시할 수 있었습니다.&quot;</p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:16pt;font-weight:bold\">19. What steps do you take to maintain alignment between strategy and execution?</span></p>\r\n\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-weight:bold\">전략과 실행 간의 정렬을 유지하기 위해 어떤 조치를 취하시나요?</span></p>\r\n\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\">&quot;I regularly track KPIs and adjust plans based on performance data. For example, in the PAA integration project, I used performance metrics to identify gaps and worked with teams to realign execution with strategic objectives.&quot;</p>\r\n\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\">&quot;KPIs를 정기적으로 추적하고 성과 데이터를 기반으로 계획을 조정합니다. 예를 들어, PAA 통합 프로젝트에서는 성과 지표를 활용하여 격차를 파악하고 팀과 협력하여 전략적 목표에 맞게 실행을 재조정했습니다.&quot;</p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:16pt;font-weight:bold\">20. How do you ensure long-term scalability in your AI initiatives?</span></p>\r\n\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-weight:bold\">AI 프로젝트에서 장기적인 확장성을 어떻게 보장하시나요?</span></p>\r\n\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\">&quot;I focus on building strategies that balance immediate needs with future growth potential. For instance, in the Metaverse-related acquisitions, I assessed both current market opportunities and long-term trends to ensure sustainable success.&quot;</p>\r\n\t\t\t\t<p style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\">&quot;단기적인 요구와 미래 성장 가능성을 균형 있게 고려한 전략을 수립하는 데 중점을 둡니다. 예를 들어, 메타버스 관련 인수에서는 현재 시장 기회와 장기 트렌드를 모두 평가하여 지속 가능한 성공을 보장했습니다.&quot;</p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<br />\r\n\t\t\t\t<br />\r\n\t\t\t\t<br />\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-weight:bold\">1. Wha</span><span lang=\"ko-KR\" style=\"font-weight:bold\">t motivated you to transition to a role focusing on global AI strategy?</span><span lang=\"ko-KR\" style=\"font-weight:bold\">￼</span><span lang=\"ko-KR\">&quot;My experience in managing AI/Game/Metaverse investments taught me that meaningful growth often requires collaboration with international partners. To maximize our success in the rapidly changing market, I realized the need to adopt an Inoranic strategy, which became a key motivator for my transition.&quot;</span></p>\r\n\t\t\t\t<li><br />\r\n\t\t\t\t</li>\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-weight:bold\">2. How</span><span lang=\"ko-KR\" style=\"font-weight:bold\"> do you define success in your AI strategy initiatives?</span><span lang=\"ko-KR\" style=\"font-weight:bold\">￼</span><span lang=\"ko-KR\">&quot;Success is when a strategy aligns seamlessly with market needs, delivers measurable business outcomes, and fosters long-term partnerships. For instance, in the Wavve fundraising project, success was defined by both capital raised and the strategic value created for stakeholders.&quot;</span></p>\r\n\t\t\t\t<li><br />\r\n\t\t\t\t</li>\r\n\t\t\t\t<li style=\"font-family:Pretendard Light\"><span lang=\"en-US\"><span style=\"font-family:Malgun Gothic;font-weight:bold\">3. </span><span lang=\"ko-KR\" style=\"font-weight:bold\">Can you explain your role in the A-Dot pivot and its outcome?</span><span lang=\"ko-KR\" style=\"font-weight:bold\">￼</span><span lang=\"ko-KR\">&quot;I led the market analysis and On-Device AI benchmarking to identify pain points and opportunities. This informed the pivot strategy, which successfully realigned A-Dot&#39;s offerings with user needs, driving increased engagement.&quot;</span></span></li>\r\n\t\t\t\t<br />\r\n\t\t\t\t<li style=\"font-family:Pretendard Light\"><span lang=\"en-US\"><span style=\"font-family:Malgun Gothic;font-weight:bold\">4. </span><span lang=\"ko-KR\" style=\"font-weight:bold\">What is your approach to identifying potential synergies in a partnership?</span><span lang=\"ko-KR\" style=\"font-weight:bold\">￼</span><span lang=\"ko-KR\">&quot;I analyze both parties’ assets, market positions, and long-term goals. For example, during the SPC partnership, I identified complementary strengths in AI-driven solutions, leading to a collaboration that benefited both companies.&quot;</span></span></li>\r\n\t\t\t\t<li><br />\r\n\t\t\t\t</li>\r\n\t\t\t\t<li style=\"font-family:Pretendard Light\"><span lang=\"en-US\"><span style=\"font-family:Malgun Gothic;font-weight:bold\">5. </span><span lang=\"ko-KR\" style=\"font-weight:bold\">How do you evaluate risks in AI-related investments?</span><span lang=\"ko-KR\" style=\"font-weight:bold\">￼</span><span lang=\"ko-KR\">&quot;I evaluate risks by analyzing market trends, competitive positioning, and scalability. In the case of the Metaverse-related acquisitions, I identified financial and market risks early, which helped guide more informed decisions.&quot;</span></span></li>\r\n\t\t\t\t<li><br />\r\n\t\t\t\t</li>\r\n\t\t\t\t<li style=\"font-family:Pretendard Light\"><span lang=\"en-US\"><span style=\"font-family:Malgun Gothic;font-weight:bold\">6. </span><span lang=\"ko-KR\" style=\"font-weight:bold\">How do you handle cross-functional collaboration in AI projects?</span><span lang=\"ko-KR\" style=\"font-weight:bold\">￼</span><span lang=\"ko-KR\">&quot;I ensure collaboration by aligning objectives and maintaining open communication. For instance, during the PAA integration project, I worked closely with technical and business teams to streamline execution and achieve shared goals.&quot;</span></span></li>\r\n\t\t\t\t<li><br />\r\n\t\t\t\t</li>\r\n\t\t\t\t<li style=\"font-family:Pretendard Light\"><span lang=\"en-US\"><span style=\"font-family:Malgun Gothic;font-weight:bold\">7. </span><span lang=\"ko-KR\" style=\"font-weight:bold\">How do you approach international expansion in the AI sector?</span><span lang=\"ko-KR\" style=\"font-weight:bold\">￼</span><span lang=\"ko-KR\">&quot;I focus on understanding local market dynamics and building strong partnerships. For example, when exploring expansion into Japan with Wavve, I conducted in-depth market research and secured partnerships with local players.&quot;</span></span></li>\r\n\t\t\t\t<li><br />\r\n\t\t\t\t</li>\r\n\t\t\t\t<li style=\"font-family:Pretendard Light\"><span lang=\"en-US\"><span style=\"font-family:Malgun Gothic;font-weight:bold\">8. </span><span lang=\"ko-KR\" style=\"font-weight:bold\">Can you describe a challenging decision you had to make in your career?</span><span lang=\"ko-KR\" style=\"font-weight:bold\">￼</span><span lang=\"ko-KR\">&quot;One challenging decision was halting an acquisition of a mid-sized gaming company due to unforeseen financial risks. Although difficult, this decision allowed us to allocate resources more effectively to other strategic initiatives.&quot;</span></span></li>\r\n\t\t\t\t<li><br />\r\n\t\t\t\t</li>\r\n\t\t\t\t<li style=\"font-family:Pretendard Light\"><span lang=\"en-US\"><span style=\"font-family:Malgun Gothic;font-weight:bold\">9. </span><span lang=\"ko-KR\" style=\"font-weight:bold\">How do you adapt to fast-changing trends in the AI industry?</span><span lang=\"ko-KR\" style=\"font-weight:bold\">￼</span><span lang=\"ko-KR\">&quot;I stay updated through market sensing, competitor analysis, and trend monitoring. For example, I benchmarked global On-Device AI services to refine SKT’s offerings, ensuring alignment with user demands.&quot;</span></span></li>\r\n\t\t\t\t<li><br />\r\n\t\t\t\t</li>\r\n\t\t\t\t<li style=\"font-family:Pretendard Light\"><span lang=\"en-US\"><span style=\"font-family:Malgun Gothic;font-weight:bold\">10. </span><span lang=\"ko-KR\" style=\"font-weight:bold\">How do you envision contributing to this role and the company’s success?</span><span lang=\"ko-KR\" style=\"font-weight:bold\">￼</span><span lang=\"ko-KR\">&quot;My experience in AI strategy, global partnerships, and fundraising equips me to drive impactful initiatives. I aim to leverage my expertise to identify growth opportunities and deliver measurable outcomes in global AI business expansion.&quot;</span></span></li>\r\n\t\t\t\t<li><br />\r\n\t\t\t\t</li>\r\n\t\t\t\t<li style=\"font-family:Pretendard Light\"><span lang=\"en-US\"><span style=\"font-family:Malgun Gothic;font-weight:bold\">11. </span><span lang=\"ko-KR\" style=\"font-weight:bold\">Can you share a successful case of investment or partnership in the AI sector?</span><span lang=\"ko-KR\" style=\"font-weight:bold\">￼</span><span lang=\"ko-KR\">&quot;In 2018, I led a ₩25 billion investment in HAEGIN, a gaming company, by assessing its growth potential and aligning it with SKT’s strategic goals. Additionally, I successfully raised ₩200 billion for Wavve by conducting IR sessions with major investors like GIC and Sequoia, showcasing its strategic value and long-term scalability.&quot;</span></span></li>\r\n\t\t\t\t<li><br />\r\n\t\t\t\t</li>\r\n\t\t\t\t<li style=\"font-family:Pretendard Light\"><span lang=\"en-US\"><span style=\"font-family:Malgun Gothic;font-weight:bold\">12. </span><span lang=\"ko-KR\" style=\"font-weight:bold\">How do you assess and prioritize investments or partnerships?</span><span lang=\"ko-KR\" style=\"font-weight:bold\">￼</span><span lang=\"ko-KR\">&quot;I combine financial analysis (Peer Multiple, DCF) with qualitative assessments of business synergies and market positioning. For example, in evaluating Metaverse-related acquisitions, I analyzed potential synergies, scalability, and their alignment with SKT’s strategic goals.&quot;</span></span></li>\r\n\t\t\t\t<li><br />\r\n\t\t\t\t</li>\r\n\t\t\t\t<li style=\"font-family:Pretendard Light\"><span lang=\"en-US\"><span style=\"font-family:Malgun Gothic;font-weight:bold\">13. </span><span lang=\"ko-KR\" style=\"font-weight:bold\">How do you overcome challenges in global AI business strategy implementation?</span><span lang=\"ko-KR\" style=\"font-weight:bold\">￼</span><span lang=\"ko-KR\">&quot;One challenge is aligning cultural and strategic differences in global partnerships. For instance, during the Tencent JV discussions, I bridged gaps by facilitating clear communication and aligning shared goals, which enabled a smooth negotiation process.&quot;</span></span></li>\r\n\t\t\t\t<li><br />\r\n\t\t\t\t</li>\r\n\t\t\t\t<li style=\"font-family:Pretendard Light\"><span lang=\"en-US\"><span style=\"font-family:Malgun Gothic;font-weight:bold\">14. </span><span lang=\"ko-KR\" style=\"font-weight:bold\">Why do you think an Inoranic strategy is important in AI business growth?</span><span lang=\"ko-KR\" style=\"font-weight:bold\">￼</span><span lang=\"ko-KR\">&quot;An Inoranic strategy is essential because most impactful players in AI are global. Establishing international partnerships and leveraging external resources are crucial for success. My work with Tencent and PCCW demonstrates my ability to implement such strategies effectively.&quot;</span></span></li>\r\n\t\t\t\t<li><br />\r\n\t\t\t\t</li>\r\n\t\t\t\t<li style=\"font-family:Pretendard Light\"><span lang=\"en-US\"><span style=\"font-family:Malgun Gothic;font-weight:bold\">15. </span><span lang=\"ko-KR\" style=\"font-weight:bold\">How do you ensure alignment with stakeholders in complex projects?</span><span lang=\"ko-KR\" style=\"font-weight:bold\">￼</span><span lang=\"ko-KR\">&quot;I ensure alignment by combining clear communication with detailed, data-driven presentations. For example, during the partnership discussions with Apple and Deutsche Telekom, I created materials highlighting mutual benefits and facilitated productive discussions at the C-level.&quot;</span></span></li>\r\n\t\t\t\t<li><br />\r\n\t\t\t\t</li>\r\n\t\t\t\t<li style=\"font-family:Pretendard Light\"><span lang=\"en-US\"><span style=\"font-family:Malgun Gothic;font-weight:bold\">16. </span><span lang=\"ko-KR\" style=\"font-weight:bold\">Can you describe your experience with fundraising and pitching to global investors?</span><span lang=\"ko-KR\" style=\"font-weight:bold\">￼</span><span lang=\"ko-KR\">&quot;I have extensive experience in drafting investment memos, IR decks, and pitching. For instance, during the Wavve project, I conducted IR sessions with Warner and Comcast, successfully showcasing its growth trajectory and strategic value.&quot;</span></span></li>\r\n\t\t\t\t<li><br />\r\n\t\t\t\t</li>\r\n\t\t\t\t<li style=\"font-family:Pretendard Light\"><span lang=\"en-US\"><span style=\"font-family:Malgun Gothic;font-weight:bold\">17. </span><span lang=\"ko-KR\" style=\"font-weight:bold\">How do you utilize storytelling in strategy presentations?</span><span lang=\"ko-KR\" style=\"font-weight:bold\">￼</span><span lang=\"ko-KR\">&quot;Storytelling simplifies complex data and helps engage stakeholders. For instance, in presenting the AI Universe strategy, I combined market data with narratives to clearly communicate SKT’s vision and competitive advantage.&quot;</span></span></li>\r\n\t\t\t\t<li><br />\r\n\t\t\t\t</li>\r\n\t\t\t\t<li style=\"font-family:Pretendard Light\"><span lang=\"en-US\"><span style=\"font-family:Malgun Gothic;font-weight:bold\">18. </span><span lang=\"ko-KR\" style=\"font-weight:bold\">How do you manage decision-making in high-stakes projects?</span><span lang=\"ko-KR\" style=\"font-weight:bold\">￼</span><span lang=\"ko-KR\">&quot;I leverage thorough market sensing and financial analysis to make informed decisions. For instance, during the AI strategy pivot for A-Dot, I conducted benchmarking of On-Device AI trends and Agent servic
