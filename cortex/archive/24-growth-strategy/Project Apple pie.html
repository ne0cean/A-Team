algun Gothic\">가능할까요</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\">? </span></p>\r\n\t\t\t\t<p data-tag=\"to-do\" style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">아이폰</span><span lang=\"en-US\">14</span><span style=\"font-family:Malgun Gothic\">용으로</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">제작한다고</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">가정할</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">경우</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\">, MOQ</span><span style=\"font-family:Malgun Gothic\">와</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">개당</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">단가는</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">어느</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">정도로</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">예상</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">하시는지요</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\">.</span></p>\r\n\t\t\t\t<p data-tag=\"to-do\" style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">범용적으로</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">사용</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">가능하려면</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\">, </span><span style=\"font-family:Malgun Gothic\">제휴</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">카드사가</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">최대한</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">많아야</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">할</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">것</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">같은데요</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\">. </span><span style=\"font-family:Malgun Gothic\">이에</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">대해서는</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">어떻게</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">생각하시는지요</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\">. </span></p>\r\n\t\t\t\t<p data-tag=\"to-do\" style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">카드</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">발급</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">이후</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\">, </span><span style=\"font-family:Malgun Gothic\">유통은</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> SKT </span><span style=\"font-family:Malgun Gothic\">유통망과</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">온라인</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">모두</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">가능하다고</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">보면</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">될까요</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\">?</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">모카드가</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">필수적이라면</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">저희</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">제휴</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">쪽에서</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">제휴카드를</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">같이</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">출시하면</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">될</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">것</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">같습니다</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\">.</span></p>\r\n\t\t\t\t<p data-tag=\"to-do\" style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">차주에</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">로카모바일에서</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">연구소에서</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> 2</span><span style=\"font-family:Malgun Gothic\">분과</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">제휴담당자</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> 1</span><span style=\"font-family:Malgun Gothic\">분이</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">오셔서</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">미팅하기로</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">했는데</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">대표님도</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">화상으로라도</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">참석하시는게</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">나을</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">것</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">같은데</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">어떠신지</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\">?</span></p>\r\n\t\t\t\t<p data-tag=\"to-do\" style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">아이폰</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> 13 </span><span style=\"font-family:Malgun Gothic\">샘플을</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">우편으로</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">공유</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">가능</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">하실까요</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\">?</span></p>\r\n\t\t\t\t<p data-tag=\"to-do\" style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">아이폰</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> 14</span><span style=\"font-family:Malgun Gothic\">용</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">개발</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">예상</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">소요</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">시간은</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">어느정도</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">걸릴</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">것으로</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">예상하시나요</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\">?</span></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<br />\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\">1/ <span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">후불</span><span style=\"font-family:Malgun Gothic\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">교통카드</span><span style=\"font-family:Malgun Gothic\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">출시</span><span style=\"font-family:Malgun Gothic\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">및</span><span style=\"font-family:Malgun Gothic\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">유통</span></p>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><span style=\"font-family:Malgun Gothic\">후불 교통카드의 경우에는 엄연히 개인 소액 신용을 사용하는 카드이기 때문에 </span></li>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">판촉물로 바로 구매하실 수 있는 제품이 아니며, 신용카드사를 통하여 발급이 되어야</span><span style=\"font-family:Malgun Gothic\">함</span></p>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><span style=\"font-family:Malgun Gothic\">카드사와 협의가 이루어 져야 하며 </span></li>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">카드사 입장에서는 아무런 이점없이 후불 교통카드만 단독으로 발급해주지는 않을 것</span></p>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><span style=\"font-family:Malgun Gothic\">모</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\">(</span><span style=\"font-family:Malgun Gothic\">母)카드,자(子)카드로 실적을 공유하는 2가지 카드로 진행될 가능성이 높습니다. </span></li>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">예를 들자면 모카드는 SKT 아이폰 전용혜택 신용카드, 자카드는 SKT 핀웨어 후불교통카드</span></p>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><span style=\"font-family:Malgun Gothic\">신용카드사와 함께 카드 상품에 대해 논의 후 카드혜택을 결정하는 등 카드상품 기획이 필요</span></li>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">2</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\">/</span><span style=\"font-family:Malgun Gothic\"> 교통카드 인증 주체 및 방식, 기간</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">후불 교통카드의 경우 최종 발급처가 신용카드사가 되기 때문에 카드사에서 교통 인증을 받아야 합니다. 그렇기에 인증 조건을 자사에서 전달받은 후 조건 완비 후 카드사로 전달하여 인증을 진행하도록 합니다.</span></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">인증은 교통카드 사내단말기에 1차로 테스트 하고,</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">2차로 전국 필드 테스트를 진행하기 때문에 1~3개월 정도 소요됩니다.</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> -&gt; </span><span style=\"font-family:Malgun Gothic\">돈쓰면</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">앞당길</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">수</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">있는거</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">아님</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\">?</span></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">방식은 &#39;Payon 인증&#39; 과 &#39;티머니, 캐시비, 코레일 의 인증&#39;을 받는 방식이 있습니다.</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">SKT에서 어떤 카드사와 함께 진행하느냐에 따라 인증 방식이 다를 것 이기 때문에</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">우선 카드사 선정이 필요합니다. </span></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">3</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\">/</span><span style=\"font-family:Malgun Gothic\"> 핀웨어 발급이 가능한 카드사 선정</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">핀웨어는 기존플레이트와는 다른 액세서리형 카드 폼팩터입니다. </span></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">카드사 발급공정과 발급기기는 각 카드사마다 상이하며 일반적인 카드플레이트 형태만 발급되는 곳이 많습니다. </span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">또한 핀웨어 폼팩터는 일반적인 카드플레이트가 아니기 때문에 카드사 카드발급부서에서 난색을 표할 가능성이 높습니다.</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">자사에서는 발급 과정에서 생기는 이슈를 찾아 제품에 반영하고 해결할 수 있도록 폼팩터 수정과 가이드들을 제공합니다.</span></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">무엇보다 &#39;액세서리형 카드상품&#39;을 출시하였었던 카드사가 핀웨어 발급에 유리할 것 입니다. </span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">자사 판단으로는 핀웨어 발급이 가능하고 협의 가능성이 높은 곳은 ‘롯데카드사’ 입니다. </span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">롯데카드사의 역대 행보를 보면 액세서리형 후불교통카드(자카드)가 수차례 출시 됬었고 작년말에도 출시 했었습니다.</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">액세서리형 카드가 낯설지 않을 것이며 RF발급 공정도 따로 구비 되어있을 것으로 예상됩니다. </span></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">4</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\">/</span><span style=\"font-family:Malgun Gothic\"> 카드사로의 카드자재 공급 </span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">카드사에서 핀웨어 제품을 발급하려면 최종 발급만 남겨둔 카드자재(핀웨어)를 카드사로 공급해야합니다. </span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">그러기 위해서는 전문 전자카드제조사와 자사가 협업하여 카드 자재를 제작해야합니다. </span></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">자사에서 제품 개발과 1차 생산, 발급과정 이슈 해결, 교통 인증조건 구비, 인레이, 강화유리 등 각 레이어, 파츠들의 설계 개발</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">등을 맡으며 </span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">전문 전자카드제조사는 chip, cos</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\">*</span><span style=\"font-family:Malgun Gothic\">, 2차 가공, 1차 발급을 한 후 공 카드자재를 카드사로 납품합니다. </span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\">*<span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">Carrier Operated Switch</span></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">또한 일반 플레이트 카드자재 관련해서 현재 combi card가 많습니다. </span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">ic(접촉결제방식) + RF(비접촉결제방식)가 ic에 함께 있는 형태로 하나의 칩이 내장되어 있습니다.</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">hybrid card는 칩이 두개가 내장되어 있으며 각각 동작하며. </span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">ic(접촉결제방식)칩과 RF(비접촉결제방식)칩이 각각 다른 위치에 내장되어 있습니다.</span></p>\r\n\t\t\t\t<div style=\"display:inline-block;width:480px;height:254px;background:#2d333b;border-radius:4px;margin:2px;vertical-align:top;opacity:0.4\"></div>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">좌측이 콤비카드 우측이 하이브리드 카드입니다. </span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">핀웨어는 우측 하이브리드 카드의 좌측하단의 RF칩(mifare cob type RF only)을 사용합니다. </span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">현재도 해당 칩 자재가 있는지 협력사에 문의해보겠습니다. </span></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">5</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\">/</span><span style=\"font-family:Malgun Gothic\"> 아이폰 후속 모델 개발</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">현재 당사에서는 아이폰12, 13 시리즈 폼팩터가 개발되어 있으며</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">14 시리즈 및 추후 15시리즈 개발도 가능합니다. </span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\">-------------------------</p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\">1. <span style=\"font-family:Malgun Gothic\">해당</span> RF<span style=\"font-family:Malgun Gothic\">제조사는</span> mifare <span style=\"font-family:Malgun Gothic\">하나인가요</span>? <span style=\"font-family:Malgun Gothic\">독점적으로</span> <span style=\"font-family:Malgun Gothic\">공급받을</span> <span style=\"font-family:Malgun Gothic\">수</span> <span style=\"font-family:Malgun Gothic\">있는지와</span> <span style=\"font-family:Malgun Gothic\">다른</span> <span style=\"font-family:Malgun Gothic\">제조사도</span> <span style=\"font-family:Malgun Gothic\">있는지</span> <span style=\"font-family:Malgun Gothic\">궁금합니다</span>. </p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\">mifare<span style=\"font-family:Malgun Gothic\">는</span> nxp<span style=\"font-family:Malgun Gothic\">사의 칩입니다</span>. </p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">칩</span> <span style=\"font-family:Malgun Gothic\">회사</span>(<span style=\"font-family:Malgun Gothic\">반도체회사</span>)<span style=\"font-family:Malgun Gothic\">는</span> <span style=\"font-family:Malgun Gothic\">한</span> <span style=\"font-family:Malgun Gothic\">회사에</span> <span style=\"font-family:Malgun Gothic\">독점적으로는</span> <span style=\"font-family:Malgun Gothic\">공급하지</span> <span style=\"font-family:Malgun Gothic\">않고</span> <span style=\"font-family:Malgun Gothic\">여러</span> <span style=\"font-family:Malgun Gothic\">나라</span>, <span style=\"font-family:Malgun Gothic\">여러</span> <span style=\"font-family:Malgun Gothic\">회사에</span> <span style=\"font-family:Malgun Gothic\">판매합니다</span>. </p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">어느</span> <span style=\"font-family:Malgun Gothic\">곳이든</span> <span style=\"font-family:Malgun Gothic\">독점</span> <span style=\"font-family:Malgun Gothic\">공급은</span> <span style=\"font-family:Malgun Gothic\">없을</span> <span style=\"font-family:Malgun Gothic\">듯</span> <span style=\"font-family:Malgun Gothic\">합니다</span>. </p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">칩사는</span> nxp, <span style=\"font-family:Malgun Gothic\">인피니온</span>, <span style=\"font-family:Malgun Gothic\">삼성</span> <span style=\"font-family:Malgun Gothic\">등</span> <span style=\"font-family:Malgun Gothic\">여러</span> <span style=\"font-family:Malgun Gothic\">회사가</span> <span style=\"font-family:Malgun Gothic\">있지만</span> <span style=\"font-family:Malgun Gothic\">보통</span> <span style=\"font-family:Malgun Gothic\">신용카드에는</span> nxp, <span style=\"font-family:Malgun Gothic\">인피니온칩을</span> <span style=\"font-family:Malgun Gothic\">사용합니다</span>. </p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">카드에</span> <span style=\"font-family:Malgun Gothic\">따라</span> <span style=\"font-family:Malgun Gothic\">다르지만</span> <span style=\"font-family:Malgun Gothic\">보통</span> ic+RF <span style=\"font-family:Malgun Gothic\">같이</span> <span style=\"font-family:Malgun Gothic\">포함된</span> <span style=\"font-family:Malgun Gothic\">칩</span>(<span style=\"font-family:Malgun Gothic\">콤비카드</span>ic<span style=\"font-family:Malgun Gothic\">칩</span>)<span style=\"font-family:Malgun Gothic\">의</span> <span style=\"font-family:Malgun Gothic\">경우</span> </p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">보통</span> <span style=\"font-family:Malgun Gothic\">전문</span> <span style=\"font-family:Malgun Gothic\">전자카드제조사에서</span> <span style=\"font-family:Malgun Gothic\">반도체</span>,<span style=\"font-family:Malgun Gothic\">칩을</span> <span style=\"font-family:Malgun Gothic\">구매하거나</span> 2<span style=\"font-family:Malgun Gothic\">차</span> <span style=\"font-family:Malgun Gothic\">제조합니다</span>. </p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">하이브리드카드의</span> RF<span style=\"font-family:Malgun Gothic\">칩도</span> <span style=\"font-family:Malgun Gothic\">전자카드제조사에서</span> <span style=\"font-family:Malgun Gothic\">구매해서</span> cos<span style=\"font-family:Malgun Gothic\">등을</span> <span style=\"font-family:Malgun Gothic\">탑재한</span> <span style=\"font-family:Malgun Gothic\">후</span>(<span style=\"font-family:Malgun Gothic\">코딩이라고</span> <span style=\"font-family:Malgun Gothic\">생각하시면될</span> <span style=\"font-family:Malgun Gothic\">듯</span> <span style=\"font-family:Malgun Gothic\">합니다</span>) </p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">일반카드플레이트와</span> <span style=\"font-family:Malgun Gothic\">함께</span> <span style=\"font-family:Malgun Gothic\">제조</span>, <span style=\"font-family:Malgun Gothic\">부착</span> <span style=\"font-family:Malgun Gothic\">후에</span> <span style=\"font-family:Malgun Gothic\">공카드로</span> <span style=\"font-family:Malgun Gothic\">카드사에</span> <span style=\"font-family:Malgun Gothic\">공급합니다</span>. </p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">칩이</span> <span style=\"font-family:Malgun Gothic\">변경될</span> <span style=\"font-family:Malgun Gothic\">수도</span> <span style=\"font-family:Malgun Gothic\">있으니</span> <span style=\"font-family:Malgun Gothic\">관련해서는</span> <span style=\"font-family:Malgun Gothic\">문의해보겠습니다</span>. </p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\">2. RF<span style=\"font-family:Malgun Gothic\">칩만으로</span> <span style=\"font-family:Malgun Gothic\">교통카드</span>, <span style=\"font-family:Malgun Gothic\">후불결제</span>, <span style=\"font-family:Malgun Gothic\">도어락</span> <span style=\"font-family:Malgun Gothic\">기능까지</span> <span style=\"font-family:Malgun Gothic\">포괄적으로</span> <span style=\"font-family:Malgun Gothic\">가능</span> <span style=\"font-family:Malgun Gothic\">할까요</span>?</p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">일단 교통카드</span>, <span style=\"font-family:Malgun Gothic\">후불결제를 탑재할 수 있습니다</span>. </p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">도어락</span> <span style=\"font-family:Malgun Gothic\">기능은</span> <span style=\"font-family:Malgun Gothic\">신용카드</span> <span style=\"font-family:Malgun Gothic\">보안문제로</span> <span style=\"font-family:Malgun Gothic\">어려울</span> <span style=\"font-family:Malgun Gothic\">수</span> <span style=\"font-family:Malgun Gothic\">있습니다</span>. </p>\r\n\t\t\t\t<p data-tag=\"remember-for-later\" style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">후불결제</span> <span style=\"font-family:Malgun Gothic\">말씀하셨는데</span>, <span style=\"font-family:Malgun Gothic\">신용결제</span>, <span style=\"font-family:Malgun Gothic\">후불</span> <span style=\"font-family:Malgun Gothic\">결제라고</span> <span style=\"font-family:Malgun Gothic\">말씀하시는거면</span> visa contactless<span style=\"font-family:Malgun Gothic\">처럼</span> <span style=\"font-family:Malgun Gothic\">비접촉</span> <span style=\"font-family:Malgun Gothic\">결제를</span> <span style=\"font-family:Malgun Gothic\">말씀하시는</span> <span style=\"font-family:Malgun Gothic\">것</span> <span style=\"font-family:Malgun Gothic\">같습니다</span>. </p>\r\n\t\t\t\t<p data-tag=\"remember-for-later\" style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">이</span> <span style=\"font-family:Malgun Gothic\">부분이</span> <span style=\"font-family:Malgun Gothic\">실현되면</span> <span style=\"font-family:Malgun Gothic\">애플</span> <span style=\"font-family:Malgun Gothic\">페이</span>+<span style=\"font-family:Malgun Gothic\">후불교통카드와</span> <span style=\"font-family:Malgun Gothic\">동일한</span> <span style=\"font-family:Malgun Gothic\">상태라고</span> <span style=\"font-family:Malgun Gothic\">보시면</span> <span style=\"font-family:Malgun Gothic\">됩니다</span>. </p>\r\n\t\t\t\t<p data-tag=\"remember-for-later\" style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">다만</span> <span style=\"font-family:Malgun Gothic\">이</span> <span style=\"font-family:Malgun Gothic\">부분은</span> visa<span style=\"font-family:Malgun Gothic\">나</span> mastercard <span style=\"font-family:Malgun Gothic\">인증을</span> <span style=\"font-family:Malgun Gothic\">받아야하며</span> <span style=\"font-family:Malgun Gothic\">비용도</span> <span style=\"font-family:Malgun Gothic\">많이</span> <span style=\"font-family:Malgun Gothic\">들고</span> <span style=\"font-family:Malgun Gothic\">시간이</span> <span style=\"font-family:Malgun Gothic\">많이</span> <span style=\"font-family:Malgun Gothic\">걸립니다</span>. </p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">아이폰</span> 14<span style=\"font-family:Malgun Gothic\">시리즈의</span> <span style=\"font-family:Malgun Gothic\">경우</span> <span style=\"font-family:Malgun Gothic\">총</span> 4<span style=\"font-family:Malgun Gothic\">종의</span> <span style=\"font-family:Malgun Gothic\">기기가</span> <span style=\"font-family:Malgun Gothic\">있으며</span> <span style=\"font-family:Malgun Gothic\">개발을</span> <span style=\"font-family:Malgun Gothic\">한다면</span> 2<span style=\"font-family:Malgun Gothic\">종씩</span> <span style=\"font-family:Malgun Gothic\">묶어서</span> <span style=\"font-family:Malgun Gothic\">개발</span> <span style=\"font-family:Malgun Gothic\">진행될</span> <span style=\"font-family:Malgun Gothic\">듯</span> <span style=\"font-family:Malgun Gothic\">합니다</span>. </p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">총</span> 2<span style=\"font-family:Malgun Gothic\">종이</span> <span style=\"font-family:Malgun Gothic\">인증비가</span> <span style=\"font-family:Malgun Gothic\">들어갈</span> <span style=\"font-family:Malgun Gothic\">것이고</span>, <span style=\"font-family:Malgun Gothic\">각각</span> <span style=\"font-family:Malgun Gothic\">인증</span> <span style=\"font-family:Malgun Gothic\">기준을</span> <span style=\"font-family:Malgun Gothic\">맞추는데</span> <span style=\"font-family:Malgun Gothic\">시간이</span> <span style=\"font-family:Malgun Gothic\">걸립니다</span>. </p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">임시</span> <span style=\"font-family:Malgun Gothic\">인증도</span> <span style=\"font-family:Malgun Gothic\">있는</span> <span style=\"font-family:Malgun Gothic\">것으로</span> <span style=\"font-family:Malgun Gothic\">알고</span> <span style=\"font-family:Malgun Gothic\">있으나</span> <span style=\"font-family:Malgun Gothic\">카드사에서</span> <span style=\"font-family:Malgun Gothic\">도와줘야</span> <span style=\"font-family:Malgun Gothic\">잘</span> <span style=\"font-family:Malgun Gothic\">되는</span> <span style=\"font-family:Malgun Gothic\">것으로</span> <span style=\"font-family:Malgun Gothic\">알고</span> <span style=\"font-family:Malgun Gothic\">있습니다</span>. </p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">임시</span> <span style=\"font-family:Malgun Gothic\">인증</span>(<span style=\"font-family:Malgun Gothic\">비자</span> <span style=\"font-family:Malgun Gothic\">웨이버</span>)<span style=\"font-family:Malgun Gothic\">에</span> <span style=\"font-family:Malgun Gothic\">대해서는</span> <span style=\"font-family:Malgun Gothic\">정확지</span> <span style=\"font-family:Malgun Gothic\">않아</span> <span style=\"font-family:Malgun Gothic\">한번</span> <span style=\"font-family:Malgun Gothic\">문의해보겠습니다</span>. </p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">후불교통카드</span>, <span style=\"font-family:Malgun Gothic\">카드번호로 온라인 결제만 되는 경우에는 국내용으로 발급하면 오래걸리지 않을 것 같습니다</span>. </p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\">3. <span style=\"font-family:Malgun Gothic\">전문</span> <span style=\"font-family:Malgun Gothic\">카드제조사는</span> <span style=\"font-family:Malgun Gothic\">어느</span> <span style=\"font-family:Malgun Gothic\">업체와</span> <span style=\"font-family:Malgun Gothic\">거래하시는지</span> <span style=\"font-family:Malgun Gothic\">문의드립니다</span>. </p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">티머니나</span> <span style=\"font-family:Malgun Gothic\">캐시비의</span> <span style=\"font-family:Malgun Gothic\">제조사와</span> <span style=\"font-family:Malgun Gothic\">협업하는게</span> <span style=\"font-family:Malgun Gothic\">더</span> <span style=\"font-family:Malgun Gothic\">나은</span> <span style=\"font-family:Malgun Gothic\">대안이라면</span> <span style=\"font-family:Malgun Gothic\">추진해보겠습니다</span>.</p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">전문 전자카드제조사는 보통</span> 4<span style=\"font-family:Malgun Gothic\">군데가 있습니다</span>. <span style=\"font-family:Malgun Gothic\">유비벨록스</span>, <span style=\"font-family:Malgun Gothic\">코나아이</span>, <span style=\"font-family:Malgun Gothic\">바이오스마트</span>, ick<span style=\"font-family:Malgun Gothic\">가 있습니다</span>. </p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">자사는</span> <span style=\"font-family:Malgun Gothic\">코나아이관계자</span>, ick<span style=\"font-family:Malgun Gothic\">관계자</span> <span style=\"font-family:Malgun Gothic\">알고</span> <span style=\"font-family:Malgun Gothic\">있고</span> <span style=\"font-family:Malgun Gothic\">있습니다</span>. </p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">이전</span> <span style=\"font-family:Malgun Gothic\">영상</span> <span style=\"font-family:Malgun Gothic\">올라갔을</span> <span style=\"font-family:Malgun Gothic\">때</span> OO<span style=\"font-family:Malgun Gothic\">카드사</span> <span style=\"font-family:Malgun Gothic\">납품</span> <span style=\"font-family:Malgun Gothic\">요청이</span> <span style=\"font-family:Malgun Gothic\">있어서</span> </p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">업무를</span> <span style=\"font-family:Malgun Gothic\">같이</span> <span style=\"font-family:Malgun Gothic\">진행해본</span> <span style=\"font-family:Malgun Gothic\">적이</span> <span style=\"font-family:Malgun Gothic\">있습니다</span>. <span style=\"font-family:Malgun Gothic\">티머니</span>, <span style=\"font-family:Malgun Gothic\">캐시비</span> <span style=\"font-family:Malgun Gothic\">제조사</span>(<span style=\"font-family:Malgun Gothic\">일반플레이트카드</span>)<span style=\"font-family:Malgun Gothic\">의</span> <span style=\"font-family:Malgun Gothic\">경우</span> <span style=\"font-family:Malgun Gothic\">다양할텐데</span> </p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">일반</span> <span style=\"font-family:Malgun Gothic\">카드플레이트를</span> <span style=\"font-family:Malgun Gothic\">아마</span> <span style=\"font-family:Malgun Gothic\">저</span> 4<span style=\"font-family:Malgun Gothic\">곳에서</span> <span style=\"font-family:Malgun Gothic\">공급하고</span> <span style=\"font-family:Malgun Gothic\">있는</span> <span style=\"font-family:Malgun Gothic\">것으로</span> <span style=\"font-family:Malgun Gothic\">알고</span> <span style=\"font-family:Malgun Gothic\">있습니다</span>. </p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">코나아이나</span> ick <span style=\"font-family:Malgun Gothic\">관계자에게</span> <span style=\"font-family:Malgun Gothic\">일단</span> <span style=\"font-family:Malgun Gothic\">문의해보겠습니다</span>. </p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p data-tag=\"remember-for-later\" style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"> 4. <span style=\"font-family:Malgun Gothic\">중국업체에서</span> finwear<span style=\"font-family:Malgun Gothic\">를 도용하여 찍어내서 국내 유통시키고</span>, <span style=\"font-family:Malgun Gothic\">계약관계가 없는 타 카드사에 발급을 한다면 이에 대한 보호나 방어조치는 가능할까요</span>? </p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p data-tag=\"remember-for-later\" style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">중국에서 들여올 일은 없을 듯 합니다</span>. </p>\r\n\t\t\t\t<p data-tag=\"remember-for-later\" style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">신용카드가</span> <span style=\"font-family:Malgun Gothic\">일반</span> <span style=\"font-family:Malgun Gothic\">공산품이</span> <span style=\"font-family:Malgun Gothic\">아니기</span> <span style=\"font-family:Malgun Gothic\">때문에</span>(<span style=\"font-family:Malgun Gothic\">신용보안</span> <span style=\"font-family:Malgun Gothic\">등</span>) <span style=\"font-family:Malgun Gothic\">보통</span> <span style=\"font-family:Malgun Gothic\">전부</span> <span style=\"font-family:Malgun Gothic\">국내</span> <span style=\"font-family:Malgun Gothic\">생산으로</span> <span style=\"font-family:Malgun Gothic\">알고</span> <span style=\"font-family:Malgun Gothic\">있습니다</span>.(<span style=\"font-family:Malgun Gothic\">일반</span> <span style=\"font-family:Malgun Gothic\">선불교통카드도</span> <span style=\"font-family:Malgun Gothic\">국내생산</span>)</p>\r\n\t\t\t\t<p data-tag=\"remember-for-later\" style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">일단</span> <span style=\"font-family:Malgun Gothic\">무엇보다</span> <span style=\"font-family:Malgun Gothic\">카드사에서</span> RF <span style=\"font-family:Malgun Gothic\">발급기가</span> <span style=\"font-family:Malgun Gothic\">있냐</span> <span style=\"font-family:Malgun Gothic\">없냐</span> <span style=\"font-family:Malgun Gothic\">문제로</span> <span style=\"font-family:Malgun Gothic\">보이는데</span> </p>\r\n\t\t\t\t<p data-tag=\"remember-for-later\" style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">각</span> <span style=\"font-family:Malgun Gothic\">카드사가</span> <span style=\"font-family:Malgun Gothic\">하루</span> <span style=\"font-family:Malgun Gothic\">발급량이</span> <span style=\"font-family:Malgun Gothic\">어마어마한데</span> <span style=\"font-family:Malgun Gothic\">설비를</span> <span style=\"font-family:Malgun Gothic\">다시</span> <span style=\"font-family:Malgun Gothic\">하는게</span> <span style=\"font-family:Malgun Gothic\">힘들</span> <span style=\"font-family:Malgun Gothic\">것이고</span> <span style=\"font-family:Malgun Gothic\">오래</span> <span style=\"font-family:Malgun Gothic\">걸릴</span> <span style=\"font-family:Malgun Gothic\">겁니다</span>. </p>\r\n\t\t\t\t<p data-tag=\"remember-for-later\" style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">일반</span> <span style=\"font-family:Malgun Gothic\">카드</span> <span style=\"font-family:Malgun Gothic\">플레이트가</span> <span style=\"font-family:Malgun Gothic\">아니기</span> <span style=\"font-family:Malgun Gothic\">때문에</span> <span style=\"font-family:Malgun Gothic\">개발이</span> <span style=\"font-family:Malgun Gothic\">쉽지</span> <span style=\"font-family:Malgun Gothic\">않을</span> <span style=\"font-family:Malgun Gothic\">겁니다</span>. </p>\r\n\t\t\t\t<p data-tag=\"remember-for-later\" style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">인증</span> <span style=\"font-family:Malgun Gothic\">기준도</span> <span style=\"font-family:Malgun Gothic\">맞춰야하니</span> <span style=\"font-family:Malgun Gothic\">힘든</span> <span style=\"font-family:Malgun Gothic\">일이라고</span> <span style=\"font-family:Malgun Gothic\">봅니다</span>. </p>\r\n\t\t\t\t<p data-tag=\"remember-for-later\" style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">특허권과</span> <span style=\"font-family:Malgun Gothic\">디자인권도</span> <span style=\"font-family:Malgun Gothic\">가지고</span> <span style=\"font-family:Malgun Gothic\">있습니다</span>. <span style=\"font-family:Malgun Gothic\">공급</span> <span style=\"font-family:Malgun Gothic\">결정이</span> <span style=\"font-family:Malgun Gothic\">되면</span> <span style=\"font-family:Malgun Gothic\">보완하겠습니다</span>. </p>\r\n\t\t\t\t<p data-tag=\"remember-for-later\" style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">중국도용문제는</span> <span style=\"font-family:Malgun Gothic\">걱정</span> <span style=\"font-family:Malgun Gothic\">안하셔도</span> <span style=\"font-family:Malgun Gothic\">될</span> <span style=\"font-family:Malgun Gothic\">듯</span> <span style=\"font-family:Malgun Gothic\">합니다</span>. </p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\">5.<span style=\"font-family:Malgun Gothic\">아이폰</span> 14<span style=\"font-family:Malgun Gothic\">용으로 제작한다고 가정할 경우</span>, moq<span style=\"font-family:Malgun Gothic\">와 개당 단가는 어느 정도 예상하는지요</span>?</p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">아직 정해진 것이 없고 여러 관계사가 섞여있으니 정확히 말씀드릴수가 없어서 </span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">자사가</span> <span style=\"font-family:Malgun Gothic\">전자카드제조사</span> <span style=\"font-family:Malgun Gothic\">담당자와</span> <span style=\"font-family:Malgun Gothic\">협의를</span> <span style=\"font-family:Malgun Gothic\">해보겠습니다</span>.  </p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\">6. <span style=\"font-family:Malgun Gothic\">범용적으로</span> <span style=\"font-family:Malgun Gothic\">사용가능하려면</span>, <span style=\"font-family:Malgun Gothic\">제휴</span> <span style=\"font-family:Malgun Gothic\">카드사가</span> <span style=\"font-family:Malgun Gothic\">최대한</span> <span style=\"font-family:Malgun Gothic\">많아야</span> <span style=\"font-family:Malgun Gothic\">할</span> <span style=\"font-family:Malgun Gothic\">것</span> <span style=\"font-family:Malgun Gothic\">같은데요</span>. <span style=\"font-family:Malgun Gothic\">이에</span> <span style=\"font-family:Malgun Gothic\">대해서는</span> <span style=\"font-family:Malgun Gothic\">어떻게</span> <span style=\"font-family:Malgun Gothic\">생각하시는지요</span>. </p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\">SKT <span style=\"font-family:Malgun Gothic\">고객만 사용하도록 제한을 할 수 있다면 아이폰 이용객이</span> SKT<span style=\"font-family:Malgun Gothic\">로 몰리니 다다익선일것 같은데</span>, </p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\">SKT <span style=\"font-family:Malgun Gothic\">고객만</span> <span style=\"font-family:Malgun Gothic\">선별해서</span> <span style=\"font-family:Malgun Gothic\">발급하는</span> <span style=\"font-family:Malgun Gothic\">방향을</span> <span style=\"font-family:Malgun Gothic\">내부적으로</span>, <span style=\"font-family:Malgun Gothic\">카드사와</span> <span style=\"font-family:Malgun Gothic\">협의해보심이</span> <span style=\"font-family:Malgun Gothic\">좋을</span> <span style=\"font-family:Malgun Gothic\">듯</span> <span style=\"font-family:Malgun Gothic\">합니다</span>. </p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">여러</span> <span style=\"font-family:Malgun Gothic\">카드사랑</span> <span style=\"font-family:Malgun Gothic\">제휴하시고</span> <span style=\"font-family:Malgun Gothic\">카드사에서</span> <span style=\"font-family:Malgun Gothic\">발급이</span> <span style=\"font-family:Malgun Gothic\">가능하다고</span> <span style=\"font-family:Malgun Gothic\">한다면</span> <span style=\"font-family:Malgun Gothic\">저희는</span> <span style=\"font-family:Malgun Gothic\">제휴</span> <span style=\"font-family:Malgun Gothic\">카드사마다</span> <span style=\"font-family:Malgun Gothic\">공카드를</span> <span style=\"font-family:Malgun Gothic\">공급하면</span> <span style=\"font-family:Malgun Gothic\">됩니다</span>. </p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">일반</span> <span style=\"font-family:Malgun Gothic\">플레이트</span> <span style=\"font-family:Malgun Gothic\">발급기에</span> <span style=\"font-family:Malgun Gothic\">넣을수</span> <span style=\"font-family:Malgun Gothic\">있도록</span> <span style=\"font-family:Malgun Gothic\">일반</span> <span style=\"font-family:Malgun Gothic\">플레이트식으로</span> <span style=\"font-family:Malgun Gothic\">제작도</span> <span style=\"font-family:Malgun Gothic\">가능한데</span> DIY<span style=\"font-family:Malgun Gothic\">식으로</span> <span style=\"font-family:Malgun Gothic\">고객이</span> <span style=\"font-family:Malgun Gothic\">간단한</span> <span style=\"font-family:Malgun Gothic\">조립을</span> <span style=\"font-family:Malgun Gothic\">하셔야합니다</span>. </p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">이</span> <span style=\"font-family:Malgun Gothic\">부분은</span> <span style=\"font-family:Malgun Gothic\">발급실</span> <span style=\"font-family:Malgun Gothic\">들어가서</span> <span style=\"font-family:Malgun Gothic\">실험해야하고</span> <span style=\"font-family:Malgun Gothic\">세팅도</span> <span style=\"font-family:Malgun Gothic\">해야하니</span> <span style=\"font-family:Malgun Gothic\">여러모로</span> <span style=\"font-family:Malgun Gothic\">복잡할</span> <span style=\"font-family:Malgun Gothic\">수</span> <span style=\"font-family:Malgun Gothic\">있습니다</span>.</p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">결론은</span> <span style=\"font-family:Malgun Gothic\">진행이</span> <span style=\"font-family:Malgun Gothic\">된다면</span> <span style=\"font-family:Malgun Gothic\">카드사가</span> <span style=\"font-family:Malgun Gothic\">독점을</span> <span style=\"font-family:Malgun Gothic\">원할</span> <span style=\"font-family:Malgun Gothic\">것</span> <span style=\"font-family:Malgun Gothic\">같습니다</span>. </p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"> </p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\">7. <span style=\"font-family:Malgun Gothic\">카드</span> <span style=\"font-family:Malgun Gothic\">발급</span> <span style=\"font-family:Malgun Gothic\">이후</span>, <span style=\"font-family:Malgun Gothic\">유통은</span> SKT <span style=\"font-family:Malgun Gothic\">유통망과</span> <span style=\"font-family:Malgun Gothic\">온라인</span> <span style=\"font-family:Malgun Gothic\">모두</span> <span style=\"font-family:Malgun Gothic\">가능하다고</span> <span style=\"font-family:Malgun Gothic\">보면</span> <span style=\"font-family:Malgun Gothic\">될까요</span>?</p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">귀사의 경우 금융상품판매대리</span>, <span style=\"font-family:Malgun Gothic\">중개업자로 알고 있습니다</span>. </p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\">https://shop.tworld.co.kr/exhibition/view?exhibitionId=P00000317 </p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">온라인의 경우 귀사 홈페이지</span> T<span style=\"font-family:Malgun Gothic\">다이렉트샵</span> – <span style=\"font-family:Malgun Gothic\">기획전</span> – Galaxy S23<span style=\"font-family:Malgun Gothic\">을 위한 비장의카드</span> – 2<span style=\"font-family:Malgun Gothic\">번</span> ‘<span style=\"font-family:Malgun Gothic\">제휴카드로 알뜰하게</span>’ <span style=\"font-family:Malgun Gothic\">부분을 보시면 제휴된 삼성카드와 신한카드가 있습니다</span>. </p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">해당</span> <span style=\"font-family:Malgun Gothic\">부분을</span> <span style=\"font-family:Malgun Gothic\">본다면</span> <span style=\"font-family:Malgun Gothic\">온라인에서</span> <span style=\"font-family:Malgun Gothic\">프로모션</span>, <span style=\"font-family:Malgun Gothic\">광고</span> <span style=\"font-family:Malgun Gothic\">가능할</span> <span style=\"font-family:Malgun Gothic\">듯</span> <span style=\"font-family:Malgun Gothic\">합니다</span>. </p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">해당부서에</span> <span style=\"font-family:Malgun Gothic\">문의해보시는</span> <span style=\"font-family:Malgun Gothic\">것이</span> <span style=\"font-family:Malgun Gothic\">정확할</span> <span style=\"font-family:Malgun Gothic\">것</span> <span style=\"font-family:Malgun Gothic\">같습니다</span>.</p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\">SKT <span style=\"font-family:Malgun Gothic\">유통망이라 하시면 오프라인</span> T<span style=\"font-family:Malgun Gothic\">월드 매장 말씀하시는 것 같습니다</span>. </p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">후불교통카드나</span> <span style=\"font-family:Malgun Gothic\">후불</span> <span style=\"font-family:Malgun Gothic\">결제가</span> <span style=\"font-family:Malgun Gothic\">되는</span> <span style=\"font-family:Malgun Gothic\">신용카드</span>(<span style=\"font-family:Malgun Gothic\">체크카드포함</span>)<span style=\"font-family:Malgun Gothic\">는</span> <span style=\"font-family:Malgun Gothic\">금융상품이기</span> <span style=\"font-family:Malgun Gothic\">때문에</span> </p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">제품을</span> <span style=\"font-family:Malgun Gothic\">가져다</span> <span style=\"font-family:Malgun Gothic\">두고</span> <span style=\"font-family:Malgun Gothic\">일반</span> <span style=\"font-family:Malgun Gothic\">매장에서</span> <span style=\"font-family:Malgun Gothic\">유통될</span> <span style=\"font-family:Malgun Gothic\">수</span> <span style=\"font-family:Malgun Gothic\">없습니다</span>(<span style=\"font-family:Malgun Gothic\">은행</span> <span style=\"font-family:Malgun Gothic\">제외</span>). </p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">배송도</span> <span style=\"font-family:Malgun Gothic\">일반택배가</span> <span style=\"font-family:Malgun Gothic\">아니라</span> <span style=\"font-family:Malgun Gothic\">카드배송업체가</span> <span style=\"font-family:Malgun Gothic\">따로</span> <span style=\"font-family:Malgun Gothic\">있습니다</span>. </p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">다만</span> <span style=\"font-family:Malgun Gothic\">선불교통카드는</span> <span style=\"font-family:Malgun Gothic\">무기명</span> <span style=\"font-family:Malgun Gothic\">카드이기</span> <span style=\"font-family:Malgun Gothic\">때문에</span> <span style=\"font-family:Malgun Gothic\">시중</span> <span style=\"font-family:Malgun Gothic\">일반</span> <span style=\"font-family:Malgun Gothic\">매장에서</span> <span style=\"font-family:Malgun Gothic\">유통이</span> <span style=\"font-family:Malgun Gothic\">가능합니다</span>(<span style=\"font-family:Malgun Gothic\">티머니</span>,<span style=\"font-family:Malgun Gothic\">캐시비</span> <span style=\"font-family:Malgun Gothic\">교통카드</span>- <span style=\"font-family:Malgun Gothic\">편의점등</span> <span style=\"font-family:Malgun Gothic\">소매점판매</span>). </p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">제가</span> <span style=\"font-family:Malgun Gothic\">알고</span> <span style=\"font-family:Malgun Gothic\">있는</span> <span style=\"font-family:Malgun Gothic\">예외사항은</span> <span style=\"font-family:Malgun Gothic\">대학교</span> <span style=\"font-family:Malgun Gothic\">학생증</span> <span style=\"font-family:Malgun Gothic\">겸용</span> <span style=\"font-family:Malgun Gothic\">금융카드로</span> </p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">신청도</span> <span style=\"font-family:Malgun Gothic\">대학교에서</span> <span style=\"font-family:Malgun Gothic\">받을</span> <span style=\"font-family:Malgun Gothic\">수</span> <span style=\"font-family:Malgun Gothic\">있고</span> <span style=\"font-family:Malgun Gothic\">대학교로</span> <span style=\"font-family:Malgun Gothic\">배송되어</span> <span style=\"font-family:Malgun Gothic\">학생이</span> <span style=\"font-family:Malgun Gothic\">찾아가거나</span> <span style=\"font-family:Malgun Gothic\">직접</span> <span style=\"font-family:Malgun Gothic\">전달할</span> <span style=\"font-family:Malgun Gothic\">수</span> <span style=\"font-family:Malgun Gothic\">있다고</span> <span style=\"font-family:Malgun Gothic\">알고</span> <span style=\"font-family:Malgun Gothic\">있습니다</span>. </p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">제가 홈페이지를 살펴보기로는</span> <a href=\"https://www.tworld.co.kr/poc/html/product/TS3.3.3T.html\">https://www.tworld.co.kr/poc/html/product/TS3.3.3T.html</a> </p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">제휴카드</span> <span style=\"font-family:Malgun Gothic\">부분</span> ‘<span style=\"font-family:Malgun Gothic\">라이트</span> <span style=\"font-family:Malgun Gothic\">할부형카드</span>’ <span style=\"font-family:Malgun Gothic\">가입하는</span> <span style=\"font-family:Malgun Gothic\">방법을</span> <span style=\"font-family:Malgun Gothic\">보면</span> ‘<span style=\"font-family:Malgun Gothic\">대리점을</span> <span style=\"font-family:Malgun Gothic\">방문</span>’ <span style=\"font-family:Malgun Gothic\">또는</span> <span style=\"font-family:Malgun Gothic\">카드</span> <span style=\"font-family:Malgun Gothic\">신청을</span> <span style=\"font-family:Malgun Gothic\">누르셔서</span> <span style=\"font-family:Malgun Gothic\">신청하실</span> <span style=\"font-family:Malgun Gothic\">수</span> <span style=\"font-family:Malgun Gothic\">있습니다</span>. <span style=\"font-family:Malgun Gothic\">라고</span> <span style=\"font-family:Malgun Gothic\">나와있는</span> <span style=\"font-family:Malgun Gothic\">것을</span> <span style=\"font-family:Malgun Gothic\">보니</span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\">&#39;<span style=\"font-family:Malgun Gothic\">오프라인</span> <span style=\"font-family:Malgun Gothic\">대리점</span>&#39;<span style=\"font-family:Malgun Gothic\">에서</span> <span style=\"font-family:Malgun Gothic\">카드신청도</span> <span style=\"font-family:Malgun Gothic\">받을</span> <span style=\"font-family:Malgun Gothic\">수</span> <span style=\"font-family:Malgun Gothic\">있을</span> <span style=\"font-family:Malgun Gothic\">듯</span> <span style=\"font-family:Malgun Gothic\">합니다</span>.</p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">정리하자면</span> SKT<span style=\"font-family:Malgun Gothic\">에서는 온</span>/<span style=\"font-family:Malgun Gothic\">오프라인 카드 신청을 받으니 마케팅용으로 활용가능할것이며 배송은 카드사에서 하는 것으로 알아주시면 될듯 합니다</span>.</p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">다만</span> <span style=\"font-family:Malgun Gothic\">강화유리</span> <span style=\"font-family:Malgun Gothic\">파손시</span> <span style=\"font-family:Malgun Gothic\">교체용</span> <span style=\"font-family:Malgun Gothic\">강화유리의</span> <span style=\"font-family:Malgun Gothic\">경우</span> <span style=\"font-family:Malgun Gothic\">소모품</span>, <span style=\"font-family:Malgun Gothic\">공산품이기에</span> <span style=\"font-family:Malgun Gothic\">온오프라인</span> <span style=\"font-family:Malgun Gothic\">자유롭게</span> <span style=\"font-family:Malgun Gothic\">유통이</span> <span style=\"font-family:Malgun Gothic\">가능합니다</span>.  </p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\">8. <span style=\"font-family:Malgun Gothic\">모카드가 필수적이라면 저희 제휴 쪽에서 제휴카드를 같이 출시하면 될 것 같습니다</span>.</p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">모카드가 필수적인 것은 아니지만 </span></p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">이전메일에서</span> <span style=\"font-family:Malgun Gothic\">롯데카드의</span> <span style=\"font-family:Malgun Gothic\">모카드</span>,<span style=\"font-family:Malgun Gothic\">자카드를</span> <span style=\"font-family:Malgun Gothic\">예시로</span> <span style=\"font-family:Malgun Gothic\">설명을</span> <span style=\"font-family:Malgun Gothic\">드렸습니다</span>. </p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\">https://www.lottecard.co.kr/app/LPCDADB_V100.lc?vtCdKndC=P14083-A14083</p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">링크는</span> <span style=\"font-family:Malgun Gothic\">롯데카드</span> <span style=\"font-family:Malgun Gothic\">태그그립</span> <span style=\"font-family:Malgun Gothic\">카드로</span> <span style=\"font-family:Malgun Gothic\">롯데카드에서</span> <span style=\"font-family:Malgun Gothic\">가장</span> <span style=\"font-family:Malgun Gothic\">최근에</span> <span style=\"font-family:Malgun Gothic\">출시된</span> <span style=\"font-family:Malgun Gothic\">후불교통카드</span>(<span style=\"font-family:Malgun Gothic\">자카드</span>)<span style=\"font-family:Malgun Gothic\">입니다</span>. </p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">해당</span> <span style=\"font-family:Malgun Gothic\">제품의</span> ‘<span style=\"font-family:Malgun Gothic\">발급</span>, <span style=\"font-family:Malgun Gothic\">유의사항</span>’ <span style=\"font-family:Malgun Gothic\">항목을</span> <span style=\"font-family:Malgun Gothic\">살펴보시면</span> </p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\">LOCA LIKIT 1.2 <span style=\"font-family:Malgun Gothic\">또는</span> LOCA LIKIT <span style=\"font-family:Malgun Gothic\">카드를</span> <span style=\"font-family:Malgun Gothic\">소지한</span> <span style=\"font-family:Malgun Gothic\">경우에만</span> LOCA <span style=\"font-family:Malgun Gothic\">태그그립</span> <span style=\"font-family:Malgun Gothic\">카드를</span> <span style=\"font-family:Malgun Gothic\">발급</span> <span style=\"font-family:Malgun Gothic\">받으실</span> <span style=\"font-family:Malgun Gothic\">수</span> <span style=\"font-family:Malgun Gothic\">있습니다</span>.  <span style=\"font-family:Malgun Gothic\">라고</span> <span style=\"font-family:Malgun Gothic\">나와있습니다</span>. </p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">즉</span> <span style=\"font-family:Malgun Gothic\">해당</span> <span style=\"font-family:Malgun Gothic\">모카드</span> <span style=\"font-family:Malgun Gothic\">발급</span> <span style=\"font-family:Malgun Gothic\">유도를</span> <span style=\"font-family:Malgun Gothic\">위한</span> <span style=\"font-family:Malgun Gothic\">자카드라고</span> <span style=\"font-family:Malgun Gothic\">보시면</span> <span style=\"font-family:Malgun Gothic\">됩니다</span>. </p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">모</span>,<span style=\"font-family:Malgun Gothic\">자카드</span> <span style=\"font-family:Malgun Gothic\">필수는</span> <span style=\"font-family:Malgun Gothic\">아니지만</span> <span style=\"font-family:Malgun Gothic\">보통</span> <span style=\"font-family:Malgun Gothic\">카드사에서는</span> <span style=\"font-family:Malgun Gothic\">모카드발급</span> <span style=\"font-family:Malgun Gothic\">유도를</span> <span style=\"font-family:Malgun Gothic\">위해</span> <span style=\"font-family:Malgun Gothic\">프로모션</span> <span style=\"font-family:Malgun Gothic\">상품으로</span> <span style=\"font-family:Malgun Gothic\">자카드를</span> <span style=\"font-family:Malgun Gothic\">내놓습니다</span>. </p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">협의에</span> <span style=\"font-family:Malgun Gothic\">따라</span> <span style=\"font-family:Malgun Gothic\">단일카드</span> <span style=\"font-family:Malgun Gothic\">하나의</span> <span style=\"font-family:Malgun Gothic\">신용카드로</span> <span style=\"font-family:Malgun Gothic\">발급할</span> <span style=\"font-family:Malgun Gothic\">수도</span> <span style=\"font-family:Malgun Gothic\">있겠으나</span> <span style=\"font-family:Malgun Gothic\">핀웨어는</span> NFC(RF,<span style=\"font-family:Malgun Gothic\">교통</span>)<span style=\"font-family:Malgun Gothic\">단말기에서</span> <span style=\"font-family:Malgun Gothic\">사용가능하기에</span> </p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">어디든</span> <span style=\"font-family:Malgun Gothic\">사용할</span> <span style=\"font-family:Malgun Gothic\">수</span> <span style=\"font-family:Malgun Gothic\">있는</span> <span style=\"font-family:Malgun Gothic\">일반플레이트</span> <span style=\"font-family:Malgun Gothic\">카드가</span> <span style=\"font-family:Malgun Gothic\">아니므로</span> <span style=\"font-family:Malgun Gothic\">카드사</span> <span style=\"font-family:Malgun Gothic\">수익성</span> <span style=\"font-family:Malgun Gothic\">문제로</span> <span style=\"font-family:Malgun Gothic\">단일카드</span> <span style=\"font-family:Malgun Gothic\">발급이</span> <span style=\"font-family:Malgun Gothic\">어려울</span> <span style=\"font-family:Malgun Gothic\">수</span> <span style=\"font-family:Malgun Gothic\">있습니다</span>. </p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">그래서</span> <span style=\"font-family:Malgun Gothic\">모카드</span>(<span style=\"font-family:Malgun Gothic\">어디든</span> <span style=\"font-family:Malgun Gothic\">사용할</span> <span style=\"font-family:Malgun Gothic\">수</span> <span style=\"font-family:Malgun Gothic\">있는</span> <span style=\"font-family:Malgun Gothic\">일반플레이트</span>)<span style=\"font-family:Malgun Gothic\">발급도</span> <span style=\"font-family:Malgun Gothic\">같이</span> <span style=\"font-family:Malgun Gothic\">나간다면</span> <span style=\"font-family:Malgun Gothic\">카드사도</span> <span style=\"font-family:Malgun Gothic\">받아드릴</span> <span style=\"font-family:Malgun Gothic\">가능성이</span> <span style=\"font-family:Malgun Gothic\">높습니다</span>. </p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\">VISA contactless <span style=\"font-family:Malgun Gothic\">또는</span> Master tap &amp; go <span style=\"font-family:Malgun Gothic\">인증</span>, <span style=\"font-family:Malgun Gothic\">교통 인증 후 단독카드로 발급이 된다면 애플 페이와 사용성이 동일하기 때문에 현대카드</span>- <span style=\"font-family:Malgun Gothic\">애플페이 독점 문제로 카드사에서도 고민이 많을텐데 하나의 해결법이 될 수 있을 듯 합니다</span>. </p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">모카드가</span> <span style=\"font-family:Malgun Gothic\">들어간다면</span> <span style=\"font-family:Malgun Gothic\">협의가</span> <span style=\"font-family:Malgun Gothic\">더</span> <span style=\"font-family:Malgun Gothic\">쉬울</span> <span style=\"font-family:Malgun Gothic\">것</span> <span style=\"font-family:Malgun Gothic\">같다는게</span> <span style=\"font-family:Malgun Gothic\">제</span> <span style=\"font-family:Malgun Gothic\">생각입니다</span>. </p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\">9. <span style=\"font-family:Malgun Gothic\">차주에 로카모바일에서 연구소에서</span> 2<span style=\"font-family:Malgun Gothic\">분과 제휴담당자</span> 1<span style=\"font-family:Malgun Gothic\">분이 오셔서 미팅하기로 했는데 대표님도 화상으로라도 참석하시는게 나을 것 같은데 어떠신지요</span>?</p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">미팅일자와 미팅안건을 알려주시면 문자메시지로 가</span>/<span style=\"font-family:Malgun Gothic\">부 답변 드리겠습니다</span>^^ </p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\">10. <span style=\"font-family:Malgun Gothic\">아이폰</span> 13<span style=\"font-family:Malgun Gothic\">샘플을 공유가능하실까요</span>?</p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">샘플</span> <span style=\"font-family:Malgun Gothic\">공유</span> <span style=\"font-family:Malgun Gothic\">가능합니다</span>. <span style=\"font-family:Malgun Gothic\">원하시는</span> <span style=\"font-family:Malgun Gothic\">후불교통카드의</span> <span style=\"font-family:Malgun Gothic\">기능이</span> <span style=\"font-family:Malgun Gothic\">아니며</span>, <span style=\"font-family:Malgun Gothic\">교통</span> <span style=\"font-family:Malgun Gothic\">인증받은</span> <span style=\"font-family:Malgun Gothic\">정식</span> <span style=\"font-family:Malgun Gothic\">제품이</span> <span style=\"font-family:Malgun Gothic\">아닌</span> <span style=\"font-family:Malgun Gothic\">점</span> <span style=\"font-family:Malgun Gothic\">말씀드립니다</span>. </p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">선불교통카드</span> <span style=\"font-family:Malgun Gothic\">제품으로</span> <span style=\"font-family:Malgun Gothic\">보내드립니다</span>. <span style=\"font-family:Malgun Gothic\">시제품이라고</span> <span style=\"font-family:Malgun Gothic\">보시면</span> <span style=\"font-family:Malgun Gothic\">됩니다</span>. <span style=\"font-family:Malgun Gothic\">카드사</span>, <span style=\"font-family:Malgun Gothic\">전자카드제조사로의</span> <span style=\"font-family:Malgun Gothic\">샘플</span> <span style=\"font-family:Malgun Gothic\">제공이</span> <span style=\"font-family:Malgun Gothic\">필요하면</span> <span style=\"font-family:Malgun Gothic\">자사에서</span> <span style=\"font-family:Malgun Gothic\">하겠습니다</span>. <span style=\"font-family:Malgun Gothic\">샘플</span> <span style=\"font-family:Malgun Gothic\">공유</span> <span style=\"font-family:Malgun Gothic\">관련해서</span> <span style=\"font-family:Malgun Gothic\">다시</span> <span style=\"font-family:Malgun Gothic\">말씀나누시죠</span>. </p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\">11. <span style=\"font-family:Malgun Gothic\">아이폰</span> 14<span style=\"font-family:Malgun Gothic\">용 개발 예상 소요 시간은 어느정도 걸릴 것으로 예상하시나요</span>?</p>\r\n\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">제품 설계</span>, <span style=\"font-family:Malgun Gothic\">강화유리     "content": "Background\n애플페이 3월 14~28일 한국 내 출시 예정\nPain point = 기회 요인\n현재 T머니(한국스마트카드), 캐시비, 코레일(레일플러스)과 계약이 진행되고 있지 않다고 알려져, 애플페이가 출시되어도 아이폰 사용자들은 대중교통에서의 이용은 불가하므로 별도의 결제 수단 휴대 필요\n현재 애플은 NFC 칩을 외부 앱이 쓸 수 있는 권한을 개방하지 않고 있으며, 애플이 티머니&#183;캐시비와 같\n은 교통카드 사업자와 별도의 계약을 체결해야 지원 가능함\n애플페이 출시국 75개</a> 국가중 교통카드까지 활용할 수 있는 곳은 15개국에 불과\n(미국의 뉴욕&#183;LA&#183;샌프란시스코&#183;시카고, 일본의 도쿄, 중국의 베이징&#183;상하이&#183;홍콩, 싱가포르, 영국의 런던)\n\n애플이 교통카드 사업자(T머니, 코레일)와 계약을 체결해 서비스 제휴를 맺었다고 해도 인증 과정 등에 시간이 소요되기 때문에 당장은 도입이 불가능\n애플페이가 출시되더라도 티머니가 인프라 구축을 위해 버스 단말기 뿐만 아니라 지하철 단말기와도 연동이 필요하며, 인프라 투자에 부담을 느낀다면 지금처럼 스티커형 교통카드 판매 지원이 이어질 것으로 예상됨\n교통카드 연계 협상이 난항을 겪는 이유는, 애플은 카드를 대체하는 토큰을 애플만 접근 가능한 ‘eSE’에 저장하고, 필요할 때 저장된 토큰을 불러 처리하는 방식을 고수하고 있기 때문\n국내 대중교통 인프라는 주로 신용카드나 선불형 교통카드에 내장된 RF 칩을 통해 카드번호를 읽어오는데, 삼성페이는 티머니와 캐시비 등의 교통카드 사업자가 카드 정보, 결제 등을 유심과 같은 심에 등록하고, 결제 때 이를 불러오는 SIM-SE 기반 시스템을 이용 중\n애플이 eSE 방식을 고수할 경우 대중교통에 설치된 단말기를 EMV 규격 단말기로 교체해야 한다. 다만, 이 경우 많은 비용이 드는 만큼 실제 도입 여부는 불투명함\nApple Pay가 대한민국 국내 대중교통 교통카드 시장에 진출하기 위해서는\n1/ (개방형&#183;오픈 루프 방식) 대중교통에 설치된 결제 단말기의 카드사 비(非)실물 NFC[3] 결제를 지원.\n/2 (폐쇄형&#183;클로즈드루프 방식) 티머니, 캐시비, 레일플러스 같은 기존 전자화폐 업체의 토큰화 기술을 이용하여 결제.\n첫 번째의 경우, 오픈 루프가 도입된다면 바로 시행될 수 있는 방법이다. 자세한 내용은 해당 문서 참고.\n두 번째의 경우, 티머니, 캐시비 등등 교통카드사가 Apple의 eSE를 지원하도록 Apple과 협상하여 교통카드가 아이폰에 탑재될 수 있도록 전산 개발을 해야 한다.[4] 문제는 Apple의 eSE 규격에 맞춰 전산 개발 비용까지 감내해야 하는데, 사용하는 대가로 수수료까지 지급해야 한다. 또 원래대로라면 교통단말기를 따로 건드릴 필요가 없지만, 이 기사에 따르면 아이폰의 토큰 방식[5]과 기존 티머니 등 교통카드 사업자의 토큰 방식이 달라서 교통단말기 S/W를 업그레이드 하거나 교체까지 해야할 수도 있는 것으로 보인다는 분석이 있다.[6] 티머니를 비롯한 선불교통카드사 입장에서는 후불교통카드 보급 등의 이유로 수수료 수입이 갈수록 줄어들고 있는 상황에서 쉽게 받아들일 수 있는 문제가 아니다. # 그렇지만 아이폰에 선불교통카드를 도입하게 되면 기존 payOn 협의체의 후불교통카드에 빼앗긴 수요를 되찾을 기회가 될 수도 있으므로, 계속해서 협의를 진행하고 있는 것으로 보인다.\n<a href=\"https://namu.wiki/w/Apple%20Pay/%EB%8C%80%ED%95%9C%EB%AF%BC%EA%B5%AD\">https://namu.wiki/w/Apple%20Pay/%EB%8C%80%ED%95%9C%EB%AF%BC%EA%B5%AD</a>\n애플 페이는 EMV 지불 토큰화 사양(EMV Payment Tokenisation Specification)[4]</a>을 사용한다.[5]</a>\n이 서비스는 고객의 신용 카드 또는 직불 카드 FPAN(Funding Primary Account Number)을 토큰화된 장치 기본 계정 번호(DPAN)로 대체하여 소매업체로부터 고객 결제 정보를 비공개로 유지하고 \"각 거래에 대해 생성된 동적 보안 코드 [...]\"를 생성한다.[6]</a>&#160;'동적 보안 코드'는 EMV 모드 트랜잭션의 암호문이며, 자기 스트라이프 데이터 에뮬레이션 모드 트랜잭션의 동적 카드 검증 값(Dynamic Card Verification Value, dCVV)입니다. 애플은 고객, 판매자, 은행 사이에 머무르는 사용량을 추적하지 않을 것이라고 덧붙였다. 사용자는 또한 분실된 전화기에서&#160;나의 아이폰 찾기</a>&#160;서비스를 통해 서비스를 원격으로 중지할 수 있다.[6]</a>\n출처: <<a href=\"https://ko.wikipedia.org/wiki/Apple_Pay\">https://ko.wikipedia.org/wiki/Apple_Pay</a>>\n애플페이는 EMV contactless(EMV 비접촉 결제)* 규격을 따르고 있어요. 해외에서 마련한 결제 방식을 따르다 보니 고객 개인정보가 해외 인증사로 넘어가게 되는데요. 이 과정에서 개인정보유출 문제가 발생할 수 있다는 우려가 있었어요.\n*Europay, Mastercard, Visa 이니셜을 따서 만든 이름이에요. 해외의 많은 결제가 EMV에서 만든 규격을 따르고 있어요.&#160;&#160;&#160;하지만 애플페이 결제시스템에 암호화 장치가 있기 때문에 해외 인증사로 전달되는 정보는 개인식별이 어려워 보안에 큰 문제가 없을 것이란 결론이 났어요.\n여기서 사장님이 알아야 할 부분은 EMV규격을 사용하는 애플페이의 수수료 문제에요.&#160;사장님들은 이미 매출의 일정 부분(최소 0.5%)을 카드사 수수료로 내고 있어요. 애플페이를 결제할 때마다 추가 수수료(결제금액의 0.15%)를 내야 한다면 부담이 커질 수밖에 없어요.\neSE규격을 고수하더라도, 애플페이에 T머니와 캐시비가 탑재되면 가능하다.\n애플월렛 앱에서 NFC로 결제. -> 단말기들이 NFC가 되나?\n<a href=\"https://www.clien.net/service/board/lecture/17931302\">https://www.clien.net/service/board/lecture/17931302</a>\n[양동선_(현대카드)] [오후 5:02] 그냥 제가 아는 바로는 구조적으로 연동이 쉽지않다..정도만 알고 있습니다\n[양동선_(현대카드)] [오후 5:02] 어느 한쪽이 크게 양보를 해서 수정을 해야하는데\n[양동선_(현대카드)] [오후 5:02] 양쪽 다 그럴 유인이 없는\n[양동선_(현대카드)] [오후 5:03] 타국가도 교통카드 연동한 국가는 구조적 제약때문에 별로 없는 것으로 알고 있어요\n[양동선_(현대카드)] 티머니 입장에서 기존의 서비스에 영향을 미치지 않으면서 애플페이를 지원할 방법을 찾기가 어려울거고, 애플은 수정할 생각이 없는 정도로 이해하고 있어요\n티머니</a>, 애플페이 교통카드 지원 기술 확보?\nPain point 예시 이미지\n<a href=\"https://www.clien.net/service/board/cm_iphonien/15815173\">https://www.clien.net/service/board/cm_iphonien/15815173</a>\n<a href=\"https://www.clien.net/service/board/cm_iphonien/15777584\">https://www.clien.net/service/board/cm_iphonien/15777584</a>\n<a href=\"https://m.blog.naver.com/sri04286/222049151820\">https://m.blog.naver.com/sri04286/222049151820</a>\n<a href=\"https://coolenjoy.net/bbs/36/2830\">https://coolenjoy.net/bbs/36/2830</a>\n레일플러스\n<a href=\"https://namu.wiki/w/%EC%8A%A4%ED%86%A0%EB%A6%AC%EC%9B%A8%EC%9D%B4\" style=\"font-family:Open Sans;font-size:10.5pt;background-color:#1f2023\">스토리웨이</a>를 제외한 다른&#160;<a href=\"https://namu.wiki/w/%ED%8E%B8%EC%9D%98%EC%A0%90\" style=\"font-family:Open Sans;font-size:10.5pt;background-color:#1f2023\">편의점</a>에서는&#160;<a href=\"https://namu.wiki/w/%EC%9D%B4%EB%A7%88%ED%8A%B824\" style=\"font-family:Open Sans;font-size:10.5pt;background-color:#1f2023\">이마트24</a>와 CU에서 충전할 수 있으며, 전철역에서 충전이 가능한 수도권 외에는 충전소가 철도역,&#160;<a href=\"https://namu.wiki/w/%EC%9D%B4%EB%A7%88%ED%8A%B824\" style=\"font-family:Open Sans;font-size:10.5pt;background-color:#1f2023\">이마트24</a>, CU,&#160;<a href=\"https://namu.wiki/w/%EC%8A%A4%ED%86%A0%EB%A6%AC%EC%9B%A8%EC%9D%B4\" style=\"font-family:Open Sans;font-size:10.5pt;background-color:#1f2023\">스토리웨이</a>,&#160;<a href=\"https://namu.wiki/w/NH%EB%86%8D%ED%98%91%EC%9D%80%ED%96%89\" style=\"font-family:Open Sans;font-size:10.5pt;background-color:#1f2023\">NH농협은행</a>,&#160;<a href=\"https://namu.wiki/w/%EC%9A%B0%EB%A6%AC%EC%9D%80%ED%96%89\" style=\"font-family:Open Sans;font-size:10.5pt;background-color:#1f2023\">우리은행</a>에 한정되어 있다는 게 큰 단점이다. 그래도 2015년 3월 23일 레일머니 어플의 출시로 모바일 충전이 지원되어서 충전소 문제는 조금씩 줄어들고 있으나, 충전 수수료가 걸린다.&#160;<a href=\"https://namu.wiki/w/%EC%BA%90%EC%8B%9C%EB%B9%84\" style=\"font-family:Open Sans;font-size:10.5pt;background-color:#1f2023\">캐시비</a>나&#160;<a href=\"https://namu.wiki/w/%ED%8B%B0%EB%A8%B8%EB%8B%88\" style=\"font-family:Open Sans;font-size:10.5pt;background-color:#1f2023\">티머니</a>처럼&#160;<a href=\"https://namu.wiki/w/SIM\" style=\"font-family:Open Sans;font-size:10.5pt;background-color:#1f2023\">SIM</a>에 충전액을 직접 저장하는 방식이 아니고,&#160;<a href=\"https://namu.wiki/w/NFC\" style=\"font-family:Open Sans;font-size:10.5pt;background-color:#1f2023\">NFC</a>&#160;안테나가 있는 스마트폰 뒷쪽에 실물 카드를 갖다 대는 방식이다. 따라서 레일머니 어플에서 충전하러면&#160;<a href=\"https://namu.wiki/w/NFC\" style=\"font-family:Open Sans;font-size:10.5pt;background-color:#1f2023\">NFC</a>는 꼭 읽기/쓰기 모드로 세팅해야 한다. 충전시 결제수단으로는 휴대폰 소액결제, 신용/체크카드, 계좌이체,&#160;<a href=\"https://namu.wiki/w/%EC%8B%A0%ED%95%9C%EC%B9%B4%EB%93%9C\" style=\"font-family:Open Sans;font-size:10.5pt;background-color:#1f2023\">신한앱카드</a>, 모아카드가 있으며\n애플페이 교통카드 도입 소식\n<a href=\"https://blog.naver.com/yeux1122/223066496239\">https://blog.naver.com/yeux1122/223066496239</a>\n출처: <<a href=\"https://ko.wikipedia.org/wiki/Apple_Pay\">https://ko.wikipedia.org/wiki/Apple_Pay</a>>\n<a href=\"https://zdnet.co.kr/view/?no=20230420110943\">https://zdnet.co.kr/view/?no=20230420110943</a>\n애플페이 확산 huddle: 단말기 보급률과 카드사 수수료\n\n국내 NFC 단말기 보급률은 2% 수준\n수천억 원대로 추정되는 NFC 단말기 설치 보상금 비용\n삼성페이와 달리 애플페이는 별도 결제 수수료를 수취하여 카드사에 불리\n국내 카드 결제 수수료는 연매출 3억 원 이하 영세 가맹점에 한해 0.5%가 적용￼전체 가맹점 중 영세 가맹점 비중은 75%￼여기서 애플페이가 도입되면 카드사가 가져갈 0.5%에서 일부를 또 애플에 지급\nSolution: <Finware> 부착형 NFC 아이폰 카메라 모듈\n전략\n\n아이폰 카메라 모듈 부착형 교통카드를 SKT 고객 단독으로 제공하여, 별도의 교통카드나 결제 수단을 추가로 휴대 하지 않아도. 아이폰만으로 대중교통 결제가 가능하도록 지원\n카메라 모듈 부착형 폼팩터는 아이폰 고유의 디자인을 훼손하거나 가리지 않으면서, 높은 휴대성을 가지고 있어 고객 선호도가 높을 것으로 판단됨\n해당 폼팩터는 이미 2021년 (주)위드에서 finware라는 상품(아이폰13 ver.)으로 개발하였으며,￼1건의 등록특허와 3건의 등록디자인이 대표자 문영빈 명의로 등록 되어 있음\n<a href=\"https://www.youtube.com/watch?v=pv-Esb8ltZU&ab_channel=Finwear\">Finware</a> 소개영상 / <a href=\"https://m.post.naver.com/viewer/postView.naver?volumeNo=33196516&memberNo=815069\" lang=\"ko-KR\">Finware </a>소개 블로그 / 유튜버 주연</a> finware 소개영상 / finware </a>소개글 / <a href=\"https://blog.naver.com/PostView.naver?blogId=mit5110&logNo=222615988942\" lang=\"ko-KR\">Finware</a>\n단순한, 애플페이를 보완하는 교통카드가 아니라 아이폰 사용자들의 페이먼트 폼펙터로 포지셔닝,\n애플페이가 아니어도 교통카드는 물론, 일반결제 가능하도록 구현\n(주)위드 회사정보\n<finwear> 개발사 위드 문영빈 대표 010-9611-3072\n<a href=\"https://weseb.com/SJB/board.php?board=onsbs&command=body&no=37072\">https://weseb.com/SJB/board.php?board=onsbs&command=body&no=37072</a>\n<a href=\"https://www.saramin.co.kr/zf_user/company-info/view/csn/MnhwdTI5WUhpVG1RL0h6S01qSXo0Zz09/company_nm/%EC%9C%84%EB%93%9C\">https://www.saramin.co.kr/zf_user/company-info/view/csn/MnhwdTI5WUhpVG1RL0h6S0
