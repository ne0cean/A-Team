 style=\"font-family:tahoma;font-size:9pt;color:black\"> </span><span style=\"font-size:9pt;color:black\">임대료</span><span style=\"font-family:tahoma;font-size:9pt;color:black\"> </span><span style=\"font-size:9pt;color:black\">수입에</span><span style=\"font-family:tahoma;font-size:9pt;color:black\"> </span><span style=\"font-size:9pt;color:black\">중점을</span><span style=\"font-family:tahoma;font-size:9pt;color:black\"> </span><span style=\"font-size:9pt;color:black\">둔</span><span style=\"font-family:tahoma;font-size:9pt;color:black\"> </span><span style=\"font-size:9pt;color:black\">임대사업을</span><span style=\"font-family:tahoma;font-size:9pt;color:black\"> </span><span style=\"font-size:9pt;color:black\">목적으로</span><span style=\"font-family:tahoma;font-size:9pt;color:black\"> </span><span style=\"font-size:9pt;color:black\">국내</span><span style=\"font-family:tahoma;font-size:9pt;color:black\"> </span><span style=\"font-size:9pt;color:black\">빌딩을</span><span style=\"font-family:tahoma;font-size:9pt;color:black\"> </span><span style=\"font-size:9pt;color:black\">매입한다</span><span style=\"font-family:tahoma;font-size:9pt;color:black\">. </span><span style=\"font-size:9pt;color:black\">매입한</span><span style=\"font-family:tahoma;font-size:9pt;color:black\"> </span><span style=\"font-size:9pt;color:black\">빌딩을</span><span style=\"font-family:tahoma;font-size:9pt;color:black\"> </span><span style=\"font-size:9pt;color:black\">높은</span><span style=\"font-family:tahoma;font-size:9pt;color:black\"> </span><span style=\"font-size:9pt;color:black\">가격에</span><span style=\"font-family:tahoma;font-size:9pt;color:black\"> </span><span style=\"font-size:9pt;color:black\">임대를</span><span style=\"font-family:tahoma;font-size:9pt;color:black\"> </span><span style=\"font-size:9pt;color:black\">주어</span><span style=\"font-family:tahoma;font-size:9pt;color:black\"> </span><span style=\"font-size:9pt;color:black\">투자수익을</span><span style=\"font-family:tahoma;font-size:9pt;color:black\"> </span><span style=\"font-size:9pt;color:black\">올리고</span><span style=\"font-family:tahoma;font-size:9pt;color:black\"> </span><span style=\"font-size:9pt;color:black\">있다</span><span style=\"font-family:tahoma;font-size:9pt;color:black\">. 2004</span><span style=\"font-size:9pt;color:black\">년에</span><span style=\"font-family:tahoma;font-size:9pt;color:black\"> </span><span style=\"font-size:9pt;color:black\">매입한</span><span style=\"font-family:tahoma;font-size:9pt;color:black\"> </span><span style=\"font-size:9pt;color:black\">스타타워의</span><span style=\"font-family:tahoma;font-size:9pt;color:black\"> </span><span style=\"font-size:9pt;color:black\">임대료는</span><span style=\"font-family:tahoma;font-size:9pt;color:black\"> </span><span style=\"font-size:9pt;color:black\">국내</span><span style=\"font-family:tahoma;font-size:9pt;color:black\"> </span><span style=\"font-size:9pt;color:black\">최고수준이다</span><span style=\"font-family:tahoma;font-size:9pt;color:black\">.</span></td>\r\n\t\t\t\t</tr>\r\n\t\t\t</table>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:9pt;color:#333333\">해외에서 싱가포르 금융의 존재감은 싱가포르투자청(GIC)과 테마섹(Temasek)을 통해 느껴진다.</span></p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:9pt;color:#333333\">싱가포르 국부(國富)를 운용하는 GIC(Government of Singapore Investment Corporation)와 싱가포르 주요기업의 대주주인 테마섹은 막강한 자금력을 이용해 아시아 각국의 자산을 공격적으로 사들이고 있다.</span></p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:9pt;color:#333333\">예를 들어 GIC는 서울 강북과 강남에서 가장 사무실 임대료가 비싼 랜드마크 건물 중 하나인 서울파이낸스센터와 스타타워빌딩을 소유하고 있다.</span></p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:9pt;color:#333333\">또 테마섹은 하나금융지주회사의 최대주주(9.62%, 금융감독원 자료)이고, SC제일은행의 모회사인 스탠다드차타드은행의 지분 11.99%(블룸버그 자료)를 갖고 있다.&#160;</span></p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:9pt;color:#333333\">싱가포르 금융의 인프라를 구성하는 글로벌 금융기관 지역본부 유치, 고도의 금융지식과 훈련으로 무장된 금융인력의 배출도 이들 두 기관의 몫이다.</span></p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:9pt;color:#333333;font-weight:bold\">워런 버핏 뺨치는 테마섹&#160;</span></p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:9pt;color:#333333;font-weight:bold\">■ 테마섹(Temasek)</span></p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:9pt;color:#333333\">1974년 설립된 테마섹은 싱가포르의 옛 지명인 ‘바다의 도시(sea town)’라는 의미를 갖고 있다. 테마섹의 정식 명칭은 ‘테마섹 홀딩스’. 우리말로 풀어 쓰면 ‘싱가포르 지주회사’가 된다. 싱가포르 정부 소유로 싱가포르텔레콤, 싱가포르항공, 싱가포르테크엔지니어링 등 굵직한 기업들의 대주주다.</span></p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:9pt;color:#333333\">현재 테마섹의 CEO(최고경영자)는 리콴유 전(前) 총리의 며느리이자 리셴룽 현 총리의 부인인 호칭 여사다. 이사회에는 싱가포르개발은행(DBS) 회장, 엑손모빌 아시아태평양 회장 등 싱가포르의 경제계 거물들이 포함돼 있다.</span></p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:9pt;color:#333333\">정부의 전폭적인 지지를 받고 있는 테마섹은 싱가포르를 포함한 아시아에 집중 투자하고 있다. 테마섹의 자산운용 자회사인 풀러튼(Fullerton)의 최고투자책임자(CIO)인 찬 치아 린은 “잘 모르는 선진국 시장보다는 잘 알고 있는 아시아 시장에 투자한다”고 말했다. 경쟁이 치열한 선진국 시장에 투자하기보다는, 비교우위가 있는 아시아에 투자해서 수익을 높이겠다는 전략이다.&#160;</span></p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:9pt;color:#333333\">이런 투자전략의 결과, 테마섹 자산은 작년 3월 말 기준으로 미화 850억 달러까지 증가했다. 초기 자금은 겨우 2억3000만 달러였다. 30여 년 동안 360배나 늘어난 것이다.&#160;</span></p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:9pt;color:#333333\">&#160;</span></p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:9pt;color:#333333\">테마섹의 자금은 싱가포르개발은행 등 싱가포르 기업에 44% 투자되어 있으며, 일본을 제외한 아시아에 34% 투입돼 있다. 선진국인 OECD국가(한국 제외)에는 상대적으로 적은 20%만을 투자하고 있다. 외환위기 이후 아시아 투자를 늘렸던 테마섹은 2002년 이후 친디아(Chindia)가 부상하면서 중국, 인도를 중심으로 아시아 국가에 대한 투자를 더욱 확대하고 있다.</span></p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:9pt;color:#333333\">테마섹은 장기적인 주주 가치의 증대를 목표로 하고 있다. 주주가 정부이므로, 결국 국부의 증대가 목표인 셈이다.</span></p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:9pt;color:#333333\">장기적인 국부 증대를 위한 테마섹의 투자전략은 중산층에 초점을 맞추는 것이다. 국가정책적으로 중산층을 확대하고, 이에 맞춰 중산층이 구입하는 상품 및 서비스를 생산하고 공급하는 기업에 투자한다. 통신(26%), 금융(35%), 의료, 소비재 등에 투자가 집중된 것은 이런 이유 때문이다.&#160;</span></p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:9pt;color:#333333\">또 경쟁우위가 있는 기업과 떠오르는 신흥기업 등에 대한 투자도 병행하고 있다. 공모 주식에 대한 투자와 함께 사모투자(Private Equity)도 하고, 장단기 투자전략도 섞어 쓰고 있다. 모두 적극적으로 수익을 창출하기 위한 전략의 일환이다.&#160;</span></p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:9pt;color:#333333\">테마섹이 각국의 벤치마크 대상이자 부러움의 대상이 되고 있는 이유는 지난 32년간 꾸준히 보여준 놀라운 성과 때문이다. 테마섹의 32년간 연 평균 수익률은 18%. 연수익률로 따져 18% 이상 수익을 30년 이상 올린 투자자는 버크셔 해서웨이의 워런 버핏, 퀀텀펀드의 짐 로저스, 예일대 기금의 데이비드 스완슨 등 손으로 꼽을 정도다. 만약 32년 전에 1만원을 넣어두었다면 현재 약 200만원으로 불어나 있을 정도의 경이적인 수익률이다.&#160;</span></p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:9pt;color:#333333\">테마섹의 투자결정에는 철저하게 자율성이 보장된다. 그러다 보니 장기적 투자를 하면서 시장 상황에 따라 리스크를 짊어지는 투자를 하고 있다. 테마섹은 아시아 외환위기 직후, 외환위기를 겪은 아시아 국가들에 투자해서 높은 수익률을 올렸다.&#160;</span></p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:9pt;color:#333333\">테마섹은 다양성을 조직운영의 기본으로 삼는다. 전체 직원 250명 가운데 27%는 싱가포르 이외의 미국, 러시아, 남아프리카공화국 등 다른 나라 출신으로 구성되어 있다. 간부급 직원의 40%는 싱가포르 태생이 아니다. 절반 이상의 직원이 여성이며, 전체 직원의 3분의2 정도가 40세 이하로 채워져 있는 ‘젊은 기관’이다. 현재 인도 뭄바이, 베트남 호찌민, 중국 상하이-베이징-홍콩 등에 현지법인 또는 사무소를 내고 있다.</span></p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:9pt;color:#333333\">&#160;</span></p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:9pt;color:#333333;font-weight:bold\">國父가 만든 國富 운용기관 GIC</span></p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:9pt;color:#333333\">&#160;</span></p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:9pt;color:#333333;font-weight:bold\">■&#160;싱가포르투자청</span><span lang=\"en-US\" style=\"font-size:9pt;color:#333333;font-weight:bold\">(GIC)</span></p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:9pt;color:#333333\">1981년 설립된 싱가포르투자청(GIC)은 싱가포르의 국부(國父)인 리콴유 전 총리가 이사회 의장이다. 이사진으로는 리셴룽 현 총리를 비롯해 교육부, 교통부, 통상산업부 장관이 참여하고 있으며, 싱가포르항공, 냇스틸, 싱가포르거래소의 CEO도 포함돼 있다. 전직 재무부 장관도 참여하고 있다.&#160;</span></p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:9pt;color:#333333\">&#160;</span></p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:9pt;color:#333333\">GIC는 철저한 ‘비밀주의’를 고수한다. 2004년부터 실적을 공개하고 있는 테마섹과 달리, GIC는 아직까지 단 한번도 투자자산 구성과 투자실적을 구체적으로 공개한 적이 없다. 작년에 설립 25주년을 기념해 어렴풋하게 공개한 숫자가 전부다. 전체 운용자산의 규모도 알려진 적이 없다. 대략 미화 1000억 달러를 넘는 것 아니냐고 추정할 뿐이다. 일부에서는 최대 미화 2000억 달러가 되는 것 아니냐는 추측도 있다.</span></p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:9pt;color:#333333\">GIC가 25주년 기념식에서 밝힌 투자 구성을 보면, 주식에 50%, 채권에 30%, 헤지펀드&#183;상품&#183;사모투자&#183;부동산</span><span lang=\"en-US\" style=\"font-size:9pt;color:#333333\"> </span><span style=\"font-size:9pt;color:#333333\">등에</span><span lang=\"en-US\" style=\"font-size:9pt;color:#333333\"> </span><span style=\"font-size:9pt;color:#333333\">나머지</span><span lang=\"en-US\" style=\"font-size:9pt;color:#333333\"> 20%</span><span style=\"font-size:9pt;color:#333333\">를</span><span lang=\"en-US\" style=\"font-size:9pt;color:#333333\"> </span><span style=\"font-size:9pt;color:#333333\">투자하고</span><span lang=\"en-US\" style=\"font-size:9pt;color:#333333\"> </span><span style=\"font-size:9pt;color:#333333\">있다</span><span lang=\"en-US\" style=\"font-size:9pt;color:#333333\">. </span><span style=\"font-size:9pt;color:#333333\">지난</span><span lang=\"en-US\" style=\"font-size:9pt;color:#333333\"> 25</span><span style=\"font-size:9pt;color:#333333\">년간</span><span lang=\"en-US\" style=\"font-size:9pt;color:#333333\"> </span><span style=\"font-size:9pt;color:#333333\">연평균</span><span lang=\"en-US\" style=\"font-size:9pt;color:#333333\"> </span><span style=\"font-size:9pt;color:#333333\">수익률은</span><span lang=\"en-US\" style=\"font-size:9pt;color:#333333\"> 9.5%. </span><span style=\"font-size:9pt;color:#333333\">앞으로</span><span lang=\"en-US\" style=\"font-size:9pt;color:#333333\"> </span><span style=\"font-size:9pt;color:#333333\">헤지펀드</span><span lang=\"en-US\" style=\"font-size:9pt;color:#333333\">, </span><span style=\"font-size:9pt;color:#333333\">사모투자</span><span lang=\"en-US\" style=\"font-size:9pt;color:#333333\">, </span><span style=\"font-size:9pt;color:#333333\">이머징마켓에</span><span lang=\"en-US\" style=\"font-size:9pt;color:#333333\"> </span><span style=\"font-size:9pt;color:#333333\">투자를</span><span lang=\"en-US\" style=\"font-size:9pt;color:#333333\"> </span><span style=\"font-size:9pt;color:#333333\">확대해</span><span lang=\"en-US\" style=\"font-size:9pt;color:#333333\"> </span><span style=\"font-size:9pt;color:#333333\">나갈</span><span lang=\"en-US\" style=\"font-size:9pt;color:#333333\"> </span><span style=\"font-size:9pt;color:#333333\">것이라고</span><span lang=\"en-US\" style=\"font-size:9pt;color:#333333\"> </span><span style=\"font-size:9pt;color:#333333\">한다</span><span lang=\"en-US\" style=\"font-size:9pt;color:#333333\">. </span><span style=\"font-size:9pt;color:#333333\">보다</span><span lang=\"en-US\" style=\"font-size:9pt;color:#333333\"> </span><span style=\"font-size:9pt;color:#333333\">공격적으로</span><span lang=\"en-US\" style=\"font-size:9pt;color:#333333\"> </span><span style=\"font-size:9pt;color:#333333\">투자수익을</span><span lang=\"en-US\" style=\"font-size:9pt;color:#333333\"> </span><span style=\"font-size:9pt;color:#333333\">내겠다는</span><span lang=\"en-US\" style=\"font-size:9pt;color:#333333\"> </span><span style=\"font-size:9pt;color:#333333\">것이다</span><span lang=\"en-US\" style=\"font-size:9pt;color:#333333\">.</span></p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:9pt;color:#333333\">GIC의 자산운용 목표는 국부 가치의 보존 및 증대다. 미국, 일본, 독일 등 선진 3개국의 인플레이션을 초과하는 수익률을 올리는 것이 목표다. 각 투자자산군별로 각각의 기준지수(벤치마크)가 있지만 전체적으로는 선진국의 인플레이션을 초과하는 수익을 올리는 것이 목표다.&#160;</span></p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:9pt;color:#333333\">GIC의 전체 직원은 약 800명이며, 이 중 투자운용인력은 200명이 채 안 된다. 현재 미국 샌프란시스코&#183;뉴욕</span><span lang=\"en-US\" style=\"font-size:9pt;color:#333333\">, </span><span style=\"font-size:9pt;color:#333333\">영국</span><span lang=\"en-US\" style=\"font-size:9pt;color:#333333\"> </span><span style=\"font-size:9pt;color:#333333\">런던</span><span lang=\"en-US\" style=\"font-size:9pt;color:#333333\"> </span><span style=\"font-size:9pt;color:#333333\">등지에</span><span lang=\"en-US\" style=\"font-size:9pt;color:#333333\"> </span><span style=\"font-size:9pt;color:#333333\">사무소를</span><span lang=\"en-US\" style=\"font-size:9pt;color:#333333\"> </span><span style=\"font-size:9pt;color:#333333\">갖고</span><span lang=\"en-US\" style=\"font-size:9pt;color:#333333\"> </span><span style=\"font-size:9pt;color:#333333\">있다</span><span lang=\"en-US\" style=\"font-size:9pt;color:#333333\">.</span></p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:9pt;color:#333333\">GIC의 인력은 매우 우수한 것으로 평가된다. 작년 10월 말레이시아 쿠알라룸푸르의 한 회의에 참석한 각국 중앙은행 및 공공자산 운용기관의 사람들은 싱가포르투자청(GIC) 사람들로부터 받은 인상에 대해 “매우 똑똑하고 직설적이지만, 오만하지는 않다”고 평가했다.</span></p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><a href=\"http://overseas.mofa.go.kr/sg-ko/brd/m_2511/view.do?seq=1340672\">http://overseas.mofa.go.kr/sg-ko/brd/m_2511/view.do?seq=1340672</a></p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><a href=\"https://www.bok.or.kr/portal/cmmn/file/fileDown.do?menuNo=200690&amp;atchFileId=KO_00000000000013099&amp;fileSn=1\">https://www.bok.or.kr/portal/cmmn/file/fileDown.do?menuNo=200690&amp;atchFileId=KO_00000000000013099&amp;fileSn=1</a></p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">포도트리<span lang=\"en-US\">-</span>카카오페이지</p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">비바퍼블리카<span lang=\"en-US\">-</span><a href=\"https://blog.toss.im/2018/06/18/newsroom/press-release/toss-40-million-funding/\">토스</a></p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><a href=\"http://paxnet.moneta.co.kr/news/mainView?articleId=2018091415024402126&amp;wlog_nsise=specialstock\">신라젠</a></p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><a href=\"https://www.msn.com/ko-kr/money/topstories/%EB%A7%88%EC%BC%93%EC%9B%8C%EC%B9%98%EC%9D%B4%EB%9E%9C%EB%93%9C%EC%9B%94%EB%93%9C-gic%EC%84%9C-1000%EC%96%B5-%EC%B6%94%EA%B0%80-%ED%88%AC%EC%9E%90%EC%9C%A0%EC%B9%98%EC%83%81%EB%B0%98%EA%B8%B0-1%EC%A1%B0-%EB%AA%A9%ED%91%9C/ar-BBIVU7l\">이렌드월드</a><span lang=\"en-US\"> </span></p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><a href=\"https://thebell.co.kr/free/content/ArticleView.asp?key=201704260100051340003120&amp;lcode=00\">티몬</a><span lang=\"en-US\"> 2017</span>년</p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><a href=\"http://news.hankyung.com/article/2018013108651\">투썸플레이스</a><span lang=\"en-US\"> 18</span>년<span lang=\"en-US\"> 1</span>월<span lang=\"en-US\"> CJ</span>푸드빌에서<span lang=\"en-US\"> </span>분할</p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">앵커파트너스와<span lang=\"en-US\"> </span>함께<span lang=\"en-US\"> </span>투자<span lang=\"en-US\">.</span></p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">부동산<span lang=\"en-US\"> GFC, </span>스타타워<span lang=\"en-US\"> </span>소유<span lang=\"en-US\">. </span>현재는<span lang=\"en-US\"> </span>수익화<span lang=\"en-US\"> &amp; </span>청산중인<span lang=\"en-US\"> </span>것으로<span lang=\"en-US\"> </span>파악</p>\r\n\t\t\t<br />\r\n\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">------------------------------------------------------------------------</p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">금요일<span lang=\"en-US\"> 3</span>시<span lang=\"en-US\"> GIC </span>미팅<span lang=\"en-US\">, </span>내일은<span lang=\"en-US\"> </span>제이슨<span lang=\"en-US\"> </span>상무님이랑<span lang=\"en-US\"> </span>컨퍼런스<span lang=\"en-US\"> </span>참석예정</p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">재미있게<span lang=\"en-US\"> </span>만들어서<span lang=\"en-US\">, </span>외국계<span lang=\"en-US\"> </span>투자자들에게<span lang=\"en-US\"> </span>쓰겠다<span lang=\"en-US\">.</span></p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">싱가폴은<span lang=\"en-US\"> </span>데이터가<span lang=\"en-US\"> </span>비싸다<span lang=\"en-US\">. </span>모바일보단<span lang=\"en-US\"> </span>노트북을<span lang=\"en-US\"> </span>많이<span lang=\"en-US\"> </span>사용<span lang=\"en-US\"> </span>이런<span lang=\"en-US\"> </span>환경에<span lang=\"en-US\"> </span>있는<span lang=\"en-US\"> </span>사람들에게<span lang=\"en-US\"> </span>설명해야<span lang=\"en-US\"> </span>한다<span lang=\"en-US\">.</span></p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">야구장<span lang=\"en-US\">, </span>지하철<span lang=\"en-US\"> </span>등<span lang=\"en-US\"> </span>일상<span lang=\"en-US\"> </span>생활에서<span lang=\"en-US\"> </span>모바일<span lang=\"en-US\"> </span>사용하는<span lang=\"en-US\"> </span>모습</p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">총<span lang=\"en-US\"> 15Page</span></p>\r\n\t\t\t<br />\r\n\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">Part1 _ <span lang=\"ko-KR\">한국의</span> <span lang=\"ko-KR\">환경</span></p>\r\n\t\t\t<p lang=\"en-US\" data-tag=\"to-do\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">1. <span lang=\"ko-KR\">도입부</span> 4~5<span lang=\"ko-KR\">장</span> <span lang=\"ko-KR\">야구장</span>, <span lang=\"ko-KR\">집</span>, <span lang=\"ko-KR\">지하철</span>, <span lang=\"ko-KR\">축구경기</span> <span lang=\"ko-KR\">등</span> <span lang=\"ko-KR\">일상적</span> <span lang=\"ko-KR\">공간에서</span> <span lang=\"ko-KR\">모바일로</span> <span lang=\"ko-KR\">영상보는</span> <span lang=\"ko-KR\">이미지</span></p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">대한민국은<span lang=\"en-US\"> </span>모바일로<span lang=\"en-US\"> TV</span>보는게<span lang=\"en-US\"> </span>이미<span lang=\"en-US\"> </span>이렇게<span lang=\"en-US\"> </span>활성화<span lang=\"en-US\"> </span>되어있다<span lang=\"en-US\">.</span>를<span lang=\"en-US\"> </span>보여주자<span lang=\"en-US\">. </span>→<span lang=\"en-US\"> </span>한국의<span lang=\"en-US\"> 100GB</span>시대<span lang=\"en-US\"> </span></p>\r\n\t\t\t<p lang=\"en-US\" data-tag=\"to-do\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">2. <span lang=\"ko-KR\">주황색</span> <span lang=\"ko-KR\">피티</span> - <span lang=\"ko-KR\">모바일</span> <span lang=\"ko-KR\">페네트레이션</span> <span lang=\"ko-KR\">살리자</span>.</p>\r\n\t\t\t<br />\r\n\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">Part2 _ <span lang=\"ko-KR\">옥수수는</span> <span lang=\"ko-KR\">무엇인가</span>.</p>\r\n\t\t\t<p data-tag=\"to-do\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">스크린샷<span lang=\"en-US\"> or </span>시연할<span lang=\"en-US\"> </span>수<span lang=\"en-US\"> </span>있는<span lang=\"en-US\"> </span>방법<span lang=\"en-US\"> </span>알아보기</p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">메뉴별<span lang=\"en-US\"> </span>설명<span lang=\"en-US\"> </span>하는<span lang=\"en-US\"> </span>페이지<span lang=\"en-US\"> </span>가져오기<span lang=\"en-US\"> - </span>저번에<span lang=\"en-US\"> </span>만든거</p>\r\n\t\t\t<p lang=\"en-US\" data-tag=\"to-do\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">1. <span lang=\"ko-KR\">메인</span> <span lang=\"ko-KR\">화면</span></p>\r\n\t\t\t<p lang=\"en-US\" data-tag=\"to-do\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">2. <span lang=\"ko-KR\">카테고리별</span></p>\r\n\t\t\t<p lang=\"en-US\" data-tag=\"to-do\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">3. Free - skt - <span lang=\"ko-KR\">유료</span> <span lang=\"ko-KR\">계층</span> <span lang=\"ko-KR\">보여주기</span></p>\r\n\t\t\t<p lang=\"en-US\" data-tag=\"to-do\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">4. <span lang=\"ko-KR\">스포츠</span> - <span lang=\"ko-KR\">스크린</span> <span lang=\"ko-KR\">샷</span>. <span lang=\"ko-KR\">채팅하는</span> <span lang=\"ko-KR\">장면</span>. </p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">스포츠<span lang=\"en-US\"> - ? </span>강점이<span lang=\"en-US\"> </span>있나<span lang=\"en-US\">. </span>를<span lang=\"en-US\"> </span>통해서<span lang=\"en-US\"> </span>무얼<span lang=\"en-US\"> </span>볼<span lang=\"en-US\"> </span>수<span lang=\"en-US\"> </span>있다<span lang=\"en-US\">.</span></p>\r\n\t\t\t<p lang=\"en-US\" data-tag=\"to-do\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">5. <span lang=\"ko-KR\">오리지널</span> - <span lang=\"ko-KR\">영상삽입</span></p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">고객<span lang=\"en-US\"> </span>전용관은<span lang=\"en-US\"> </span>뭐다<span lang=\"en-US\">.</span></p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">프로덕<span lang=\"en-US\"> </span>오퍼링</p>\r\n\t\t\t<br />\r\n\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">Part3 _ <span lang=\"ko-KR\">옥수수</span> <span lang=\"ko-KR\">퍼포먼스</span></p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">1. <span lang=\"ko-KR\">연도별</span> <span lang=\"ko-KR\">우상향하는</span> <span lang=\"ko-KR\">수치들</span> <span lang=\"ko-KR\">보여주기</span> - <span lang=\"ko-KR\">가입자</span>, mau, </p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">2. <span lang=\"ko-KR\">유저</span> <span lang=\"ko-KR\">데이터</span>, <span lang=\"ko-KR\">몇</span> <span lang=\"ko-KR\">퍼센트는</span> <span lang=\"ko-KR\">라이브</span> <span lang=\"ko-KR\">보고</span> <span lang=\"ko-KR\">몇</span> <span lang=\"ko-KR\">퍼센트는</span> <span lang=\"ko-KR\">뭐</span> <span lang=\"ko-KR\">본다</span>.</p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">3. <span lang=\"ko-KR\">월별</span> <span lang=\"ko-KR\">사용시간</span> <span lang=\"ko-KR\">증가</span> <span lang=\"ko-KR\">추이</span></p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">4. <span lang=\"ko-KR\">레비뉴</span></p>\r\n\t\t\t<br />\r\n\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">Part4 _ Structure</p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">분할<span lang=\"en-US\"> </span>구조</p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">+ CP<span lang=\"ko-KR\">사는</span> <span lang=\"ko-KR\">구두로</span> <span lang=\"ko-KR\">설명</span></p>\r\n\t\t"
  }
];
const CONTENT_HASH = 'd925ac66';

let cards = [];
let moving = null, resizing = null;
let selectedIdx = null, clipboardCard = null;
const GRID = 20, GAP = 14;
function snap(v) { return Math.round(v / GRID) * GRID; }

// ── Undo (Ctrl+Z) ────────────────────────────────────────────────────────────
const MAX_HISTORY = 50;
let history = [];
function snapshot() {
  syncText();
  history.push(JSON.stringify(cards));
  if (history.length > MAX_HISTORY) history.shift();
}
function undo() {
  if (!history.length) { showStatus('되돌릴 내용 없음'); return; }
  syncText();
  cards = JSON.parse(history.pop());
  renderCards();
  saveBoard();
  showStatus('↩ 되돌림');
}
function showStatus(msg) {
  const s = document.getElementById('status');
  s.textContent = msg;
  clearTimeout(showStatus._t);
  showStatus._t = setTimeout(() => { s.textContent = ''; }, 2000);
}
document.addEventListener('keydown', e => {
  const isText = document.activeElement?.contentEditable === 'true';
  if ((e.ctrlKey || e.metaKey) && e.key === 'z' && !e.shiftKey) {
    if (isText) return;
    e.preventDefault();
    undo();
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'c' && !e.shiftKey && !isText) {
    if (selectedIdx !== null && cards[selectedIdx]) {
      syncText();
      clipboardCard = JSON.parse(JSON.stringify(cards[selectedIdx]));
      showStatus('카드 복사됨');
      e.preventDefault();
    }
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'v' && !e.shiftKey && !isText) {
    if (clipboardCard) {
      e.preventDefault();
      snapshot();
      const nc = JSON.parse(JSON.stringify(clipboardCard));
      nc.x = (nc.x || 0) + 30; nc.y = (nc.y || 0) + 30;
      cards.push(nc);
      selectedIdx = cards.length - 1;
      renderCards(); saveBoard();
      showStatus('카드 붙여넣음');
    }
  }
  if (e.key === 'Escape') {
    document.querySelectorAll('.card.selected').forEach(c => c.classList.remove('selected'));
    selectedIdx = null;
  }
});

function pushCards(movedIdx) {
  const moved = cards[movedIdx];
  const movedEl = document.querySelector(`.card[data-idx="${movedIdx}"]`);
  if (!movedEl) return;
  const mh = movedEl.offsetHeight;
  document.querySelectorAll('.card').forEach(el => {
    const i = +el.dataset.idx;
    if (i === movedIdx) return;
    const c = cards[i], oh = el.offsetHeight;
    if (moved.x < (c.x+(c.w||200)) && (moved.x+(moved.w||200)) > c.x && moved.y < (c.y+oh) && (moved.y+mh) > c.y) {
      c.y = moved.y + mh + GAP;
      el.style.top = c.y + 'px';
    }
  });
}

function loadBoard() {
  const saved = localStorage.getItem(SAVE_KEY);
  const savedHash = localStorage.getItem(SAVE_KEY + ':hash');
  let parsed = null;
  try { parsed = saved ? JSON.parse(saved) : null; } catch(e) {}
  // reset if: no save, empty array, or content hash changed (page regenerated)
  if (!parsed || parsed.length === 0 || savedHash !== CONTENT_HASH) {
    cards = DEFAULT_CARDS.map(c => ({...c}));
    localStorage.removeItem(SAVE_KEY);
    localStorage.setItem(SAVE_KEY + ':hash', CONTENT_HASH);
    renderCards();
    const hasCoords = cards.some(c => c.x !== undefined && c.y !== undefined);
    if (!hasCoords) autoLayout();
    return;
  }
  cards = parsed;
  renderCards();
}
function resetToDefaults() { if (!confirm('저장된 보드를 지우고 원본으로 초기화합니다. 계속할까요?')) return; localStorage.removeItem(SAVE_KEY); cards = DEFAULT_CARDS.map(c => ({...c})); renderCards(); autoLayout(); }

function autoLayout() {
  const boardW = document.getElementById('board').offsetWidth;
  const cols = Math.max(1, Math.floor(boardW / 280));
  const colW = (boardW - GAP*(cols-1)) / cols;
  const colH = new Array(cols).fill(0);
  const allCards = document.querySelectorAll('.card');
  const images = document.querySelectorAll('.card img');
  let loaded = 0;
  function place() {
    allCards.forEach((el, i) => {
      const w = Math.min(cards[i].w || colW, colW);
      let minCol = 0;
      for (let c = 1; c < cols; c++) if (colH[c] < colH[minCol]) minCol = c;
      cards[i].x = minCol * (colW + GAP);
      cards[i].y = colH[minCol];
      cards[i].w = w;
      el.style.left = cards[i].x + 'px';
      el.style.top = cards[i].y + 'px';
      el.style.width = w + 'px';
      colH[minCol] = cards[i].y + el.offsetHeight + GAP;
    });
    document.getElementById('board').style.minHeight = (Math.max(...colH) + 100) + 'px';
    saveBoard();
  }
  if (!images.length) { requestAnimationFrame(place); return; }
  images.forEach(img => {
    if (img.complete) { loaded++; if (loaded >= images.length) requestAnimationFrame(place); }
    else { img.onload = img.onerror = () => { loaded++; if (loaded >= images.length) requestAnimationFrame(place); }; }
  });
}

function syncText() {
  document.querySelectorAll('.card').forEach(el => {
    const i = +el.dataset.idx;
    if (cards[i]?.type === 'text') { const t = el.querySelector('.text'); if (t) cards[i].content = t.innerHTML; }
  });
}
function saveBoard() { syncText(); localStorage.setItem(SAVE_KEY, JSON.stringify(cards)); localStorage.setItem(SAVE_KEY + ':hash', CONTENT_HASH); showStatus('저장됨 ' + new Date().toLocaleTimeString()); }

function renderCards() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  cards.forEach((card, i) => {
    const el = document.createElement('div');
    el.className = 'card'; el.dataset.idx = i;
    if (card.x !== undefined) el.style.left = card.x + 'px';
    if (card.y !== undefined) el.style.top = card.y + 'px';
    // html cards contain raw OneNote table HTML which may overflow the stated div width
    if (card.w) { if (card.type === 'html') el.style.minWidth = card.w + 'px'; else el.style.width = card.w + 'px'; }
    el.addEventListener('mousedown', e => {
      if (e.target.closest('.text, a, .card-btn, .resize-handle, td, th')) return;
      e.preventDefault();
      // Update selection
      document.querySelectorAll('.card.selected').forEach(c => c.classList.remove('selected'));
      selectedIdx = i; el.classList.add('selected');
      snapshot();
      moving = { idx: i, startX: e.clientX, startY: e.clientY, origX: card.x||0, origY: card.y||0 };
      el.classList.add('moving');
    });
    const actions = document.createElement('div'); actions.className = 'card-actions';
    const delBtn = document.createElement('button'); delBtn.className = 'card-btn'; delBtn.textContent = '×';
    delBtn.onclick = e => { e.stopPropagation(); if(confirm('삭제?')) { snapshot(); cards.splice(i,1); renderCards(); saveBoard(); } };
    actions.appendChild(delBtn); el.appendChild(actions);
    if (card.type === 'text') {
      const text = document.createElement('div'); text.className = 'text'; text.contentEditable = true;
      text.innerHTML = card.content || '';
      text.addEventListener('focus', () => { snapshot(); });
      text.addEventListener('blur', () => { card.content = text.innerHTML; saveBoard(); });
      el.appendChild(text);
    } else if (card.type === 'image') {
      const img = document.createElement('img');
      img.src = card.src.startsWith('http') || card.src.startsWith('data:') ? card.src : IMG_BASE + card.src;
      img.alt = ''; img.loading = 'lazy'; img.onerror = () => img.style.display = 'none';
      if (card.w) img.style.width = card.w + 'px';
      if (card.h) img.style.height = card.h + 'px';
      if (card.link) { const a = document.createElement('a'); a.href = card.link; a.target = '_blank'; a.appendChild(img); el.appendChild(a); }
      else { el.appendChild(img); }
      if (card.caption) { const cap = document.createElement('div'); cap.style.cssText = 'font-size:11px;color:#8b949e;margin-top:4px;word-break:break-word;padding:0 2px;'; cap.textContent = card.caption; el.appendChild(cap); }
    } else if (card.type === 'html') {
      const wrapper = document.createElement('div');
      wrapper.style.cssText = 'overflow:auto;font-size:13px;line-height:1.5;';
      wrapper.innerHTML = card.html.replace(/__ATTACHMENT__/g, IMG_BASE);
      wrapper.querySelectorAll('img').forEach(img => { img.style.maxWidth = '100%'; img.style.height = 'auto'; img.draggable = false; });
      wrapper.querySelectorAll('a').forEach(a => { a.target = '_blank'; a.style.color = '#6cb0f6'; });
      wrapper.querySelectorAll('table').forEach(t => { t.style.borderCollapse = 'collapse'; });
      wrapper.querySelectorAll('td,th').forEach(td => {
        td.style.border = '1px solid #444'; td.style.padding = '4px 6px'; td.style.verticalAlign = 'top';
        td.title = '더블클릭으로 편집';
        td.addEventListener('dblclick', function(e) {
          e.stopPropagation();
          snapshot();
          this.contentEditable = 'true';
          this.style.outline = '2px solid #388bfd';
          this.style.background = 'rgba(56,139,253,0.08)';
          this.focus();
        });
        td.addEventListener('blur', function() {
          this.contentEditable = 'false';
          this.style.outline = '';
          this.style.background = '';
          cards[i].html = wrapper.innerHTML.split(IMG_BASE).join('__ATTACHMENT__');
          saveBoard();
        });
      });
      el.appendChild(wrapper);
    } else if (card.type === 'table') {
      const rows = card.rows || [['','',''],['','',''],['','','']];
      const tbl = document.createElement('table');
      tbl.style.cssText = 'border-collapse:collapse;width:100%;font-size:13px;';
      rows.forEach((row, ri) => {
        const tr = tbl.insertRow();
        row.forEach((cell, ci) => {
          const td = document.createElement(ri === 0 ? 'th' : 'td');
          td.contentEditable = true;
          td.style.cssText = 'border:1px solid #30363d;padding:4px 8px;min-width:60px;text-align:left;' + (ri===0 ? 'background:#21262d;font-weight:600;' : '');
          td.textContent = cell;
          td.addEventListener('blur', () => { if (!cards[i].rows) cards[i].rows = rows; rows[ri][ci] = td.textContent; saveBoard(); });
          tr.appendChild(td);
        });
      });
      el.appendChild(tbl);
      const addRow = document.createElement('button');
      addRow.textContent = '+ 행'; addRow.style.cssText = 'margin-top:4px;font-size:11px;background:#21262d;border:1px solid #30363d;color:#8b949e;padding:2px 8px;border-radius:4px;cursor:pointer;';
      addRow.onclick = e => { e.stopPropagation(); snapshot(); if (!cards[i].rows) cards[i].rows = rows; cards[i].rows.push(new Array(cards[i].rows[0].length).fill('')); renderCards(); saveBoard(); };
      const addCol = document.createElement('button');
      addCol.textContent = '+ 열'; addCol.style.cssText = 'margin-top:4px;margin-left:4px;font-size:11px;background:#21262d;border:1px solid #30363d;color:#8b949e;padding:2px 8px;border-radius:4px;cursor:pointer;';
      addCol.onclick = e => { e.stopPropagation(); snapshot(); if (!cards[i].rows) cards[i].rows = rows; cards[i].rows.forEach(r => r.push('')); renderCards(); saveBoard(); };
      el.appendChild(addRow); el.appendChild(addCol);
    }
    const rh = document.createElement('div'); rh.className = 'resize-handle';
    rh.addEventListener('mousedown', e => { e.preventDefault(); e.stopPropagation(); snapshot(); resizing = { idx: i, startX: e.clientX, startW: card.w || el.offsetWidth }; });
    el.appendChild(rh);
    if (i === selectedIdx) el.classList.add('selected');
    board.appendChild(el);
  });
  requestAnimationFrame(() => {
    let maxB = 0;
    document.querySelectorAll('.card').forEach(el => { const b = (parseFloat(el.style.top)||0) + el.offsetHeight; if (b > maxB) maxB = b; });
    board.style.minHeight = (maxB + 100) + 'px';
  });
}

document.addEventListener('mousemove', e => {
  if (moving) {
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`); if (!el) return;
    let nx = moving.origX + e.clientX - moving.startX, ny = moving.origY + e.clientY - moving.startY;
    if (e.shiftKey) { nx = snap(nx); ny = snap(ny); el.style.outline = '1px dashed rgba(240,192,64,0.3)'; } else { el.style.outline = ''; }
    el.style.left = nx + 'px'; el.style.top = ny + 'px';
  }
  if (resizing) {
    let nw = resizing.startW + e.clientX - resizing.startX; if (e.shiftKey) nw = snap(nw);
    cards[resizing.idx].w = Math.max(100, nw);
    const el = document.querySelector(`.card[data-idx="${resizing.idx}"]`); if (el) el.style.width = cards[resizing.idx].w + 'px';
  }
});

document.addEventListener('mouseup', e => {
  if (moving) {
    let nx = moving.origX + e.clientX - moving.startX, ny = moving.origY + e.clientY - moving.startY;
    if (e.shiftKey) { nx = snap(nx); ny = snap(ny); }
    cards[moving.idx].x = Math.max(0, nx); cards[moving.idx].y = Math.max(0, ny);
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`); if (el) { el.classList.remove('moving'); el.style.outline = ''; }
    if (e.shiftKey) pushCards(moving.idx);
    moving = null; saveBoard();
  }
  if (resizing) { if (e.shiftKey) pushCards(resizing.idx); resizing = null; saveBoard(); }
});

function addTextCard() { snapshot(); cards.push({ type: 'text', content: '', x: 50, y: window.scrollY+100, w: 300 }); renderCards(); setTimeout(() => { const els = document.querySelectorAll('.card .text'); els[els.length-1]?.focus(); }, 100); }
function addImageCard() { const input = document.createElement('input'); input.type = 'file'; input.accept = 'image/*'; input.onchange = e => { const f = e.target.files[0]; if (!f) return; const r = new FileReader(); r.onload = () => { snapshot(); cards.push({ type: 'image', src: r.result, x: 50, y: window.scrollY+100, w: 240 }); renderCards(); saveBoard(); }; r.readAsDataURL(f); }; input.click(); }
function addImageUrl() { const url = prompt('이미지 URL'); if (!url) return; snapshot(); cards.push({ type: 'image', src: url, x: 50, y: window.scrollY+100, w: 240 }); renderCards(); saveBoard(); }
function addTableCard() {
  const colsStr = prompt('열 수 (기본 3)', '3'); const cols = Math.max(1, parseInt(colsStr)||3);
  const rowsStr = prompt('행 수 (헤더 포함, 기본 4)', '4'); const rows = Math.max(1, parseInt(rowsStr)||4);
  snapshot();
  cards.push({ type: 'table', rows: Array.from({length: rows}, (_, ri) => Array.from({length: cols}, (_, ci) => ri===0 ? `열${ci+1}` : '')), x: 50, y: window.scrollY+100, w: Math.max(240, cols*100) });
  renderCards(); saveBoard();
}
function exportBoard() { syncText(); const blob = new Blob([JSON.stringify(cards, null, 2)], { type: 'application/json' }); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = SAVE_KEY + '.json'; a.click(); }
// ── Zoom ─────────────────────────────────────────────────────────────────────
let zoom = parseFloat(localStorage.getItem('zoom-' + SAVE_KEY) || '1.0');
function applyZoom() {
  const board = document.getElementById('board');
  board.style.transform = `scale(${zoom})`;
  board.style.transformOrigin = '0 0';
  document.getElementById('zoom-level').textContent = Math.round(zoom * 100) + '%';
  localStorage.setItem('zoom-' + SAVE_KEY, zoom);
}
function zoomIn()  { zoom = Math.min(3.0, parseFloat((zoom + 0.1).toFixed(2))); applyZoom(); }
function zoomOut() { zoom = Math.max(0.2, parseFloat((zoom - 0.1).toFixed(2))); applyZoom(); }
document.addEventListener('keydown', e => {
  if (e.ctrlKey || e.metaKey) {
    if (e.key === '=' || e.key === '+') { e.preventDefault(); zoomIn(); }
    if (e.key === '-')                  { e.preventDefault(); zoomOut(); }
    if (e.key === '0')                  { e.preventDefault(); zoom = 1.0; applyZoom(); }
  }
});
document.getElementById('board').addEventListener('wheel', e => {
  if (!(e.ctrlKey || e.metaKey)) return;
  e.preventDefault();
  e.deltaY < 0 ? zoomIn() : zoomOut();
}, { passive: false });
applyZoom();
function resetLayout() { if (!confirm('자동 재배치합니다.')) return; cards.forEach(c => { delete c.x; delete c.y; }); renderCards(); autoLayout(); }
// ── Floating format toolbar ───────────────────────────────────────────────────
const fmtBar = document.getElementById('format-toolbar');
function fmt(cmd) { document.execCommand(cmd, false, null); saveBoard(); }
function fmtLink() {
  const sel = window.getSelection();
  if (!sel || sel.isCollapsed) return;
  const url = prompt('링크 URL 입력', 'https://');
  if (!url) return;
  document.execCommand('createLink', false, url);
  // make links open in new tab
  sel.anchorNode?.parentElement?.closest('a')?.setAttribute('target', '_blank');
  document.querySelectorAll('.text a').forEach(a => a.target = '_blank');
  saveBoard();
}

// prevent format buttons from blurring contenteditable
fmtBar.addEventListener('mousedown', e => e.preventDefault());

document.addEventListener('selectionchange', () => {
  const sel = window.getSelection();
  if (!sel || sel.isCollapsed || !sel.toString().trim()) { fmtBar.style.display = 'none'; return; }
  // only show if selection is inside a .text element
  const anchor = sel.anchorNode;
  if (!anchor) { fmtBar.style.display = 'none'; return; }
  const textEl = anchor.nodeType === 1 ? anchor.closest('.text') : anchor.parentElement?.closest('.text');
  if (!textEl) { fmtBar.style.display = 'none'; return; }
  // position above selection
  const range = sel.getRangeAt(0);
  const rect = range.getBoundingClientRect();
  fmtBar.style.display = 'flex';
  const tbW = fmtBar.offsetWidth || 180;
  let left = rect.left + rect.width / 2 - tbW / 2;
  left = Math.max(8, Math.min(left, window.innerWidth - tbW - 8));
  fmtBar.style.left = left + 'px';
  fmtBar.style.top = (rect.top - 44 + window.scrollY) + 'px';
});

setInterval(saveBoard, 30000);
loadBoard();
</script>
