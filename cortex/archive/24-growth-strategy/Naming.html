.card { background: #2a2a2a; border: 1px solid #3a3a3a; border-radius: 8px; padding: 12px; position: absolute; cursor: grab; transition: box-shadow 0.15s; overflow: hidden; }
.card:hover { box-shadow: 0 0 0 1px #58a6ff; z-index: 10; }
.card.moving { opacity: 0.8; box-shadow: 0 4px 24px rgba(0,0,0,0.6); z-index: 100; cursor: grabbing; }

.card .text:focus { background: rgba(255,255,255,0.05); border-radius: 4px; padding: 4px; }
.card .text:empty::before { content: '텍스트 입력...'; color: #555; }
.card-actions { position: absolute; top: 4px; right: 4px; display: none; gap: 4px; }
.card:hover .card-actions { display: flex; }
.card-btn { background: #333; border: 1px solid #555; color: #ccc; border-radius: 4px; padding: 2px 6px; font-size: 11px; cursor: pointer; }
.card-btn:hover { background: #444; color: #fff; }
.resize-handle { position: absolute; bottom: 0; right: 0; width: 16px; height: 16px; cursor: se-resize; opacity: 0; }
.card:hover .resize-handle { opacity: 0.6; }
.resize-handle::after { content: ''; position: absolute; bottom: 3px; right: 3px; width: 8px; height: 8px; border-right: 2px solid #666; border-bottom: 2px solid #666; }
.card.selected { box-shadow: 0 0 0 2px #58a6ff; z-index: 5; }
.highlight-red { color: #ff6b6b; }
.highlight-blue { color: #6cb0f6; }
.highlight-gold { color: #f0c040; }
.toolbar { position: fixed; bottom: 0; left: 0; right: 0; background: #161b22; border-top: 1px solid #30363d; padding: 8px 20px; display: flex; gap: 12px; align-items: center; z-index: 200; }
.toolbar button { background: #21262d; border: 1px solid #30363d; color: #e0e0e0; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; }
.toolbar button:hover { background: #30363d; }
.toolbar .status { color: #8b949e; font-size: 12px; margin-left: auto; }
#format-toolbar { position: fixed; display: none; background: #1c2128; border: 1px solid #444c56; border-radius: 8px; padding: 4px 6px; gap: 2px; align-items: center; z-index: 500; box-shadow: 0 4px 16px rgba(0,0,0,0.5); }

rd/powerbbs.php?come_idx=2716&amp;l=18154\">http://m.inven.co.kr/board/powerbbs.php?come_idx=2716&amp;l=18154</a></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">시선. 관점의 발견</p>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">제안</p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">블록체인. 소셜펀딩. 모든컨텐츠를 볼 수 있음. 글로벌 ott. </p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">눈. 창.</p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">컨텐츠 숫자? 1938M</p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">Drama8?</p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">과일이나 간식 이름처럼 암기가 쉬울것</p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">2~4음절</p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">유추 및 해석에 스토르를 부여</p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">확장성</p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">한국말 뉘앙스</p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">불편이나 언멧니즈에 괸한 공감할만한 수토리</p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">서드아이</p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">한류<span lang=\"en-US\"> - curea, cureana, Tatoo</span></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">중국<span lang=\"en-US\"> </span>진출</p>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">이상하지<span lang=\"en-US\"> </span>않을<span lang=\"en-US\"> </span>것</p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">==================</p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">1. yahoo <span lang=\"ko-KR\">처럼</span> <span lang=\"ko-KR\">단지</span> <span lang=\"ko-KR\">회상하기</span> <span lang=\"ko-KR\">쉬운</span> <span lang=\"ko-KR\">이름</span></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<li style=\"font-size:10pt\"><span style=\"font-size:11pt;color:#222222;font-weight:bold\">기억하기 쉬운 이름을 만드는 세가지 방법</span></li>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:19.5pt\"><span style=\"font-size:12.5pt;color:#222222;font-weight:bold\">1. 서비스가 연상되는 신조어를 만들자</span><span lang=\"en-US\" style=\"font-size:12.5pt;color:#222222;font-weight:bold\"> - </span><span style=\"font-size:12.5pt;color:#222222;font-weight:bold\">구글</span><span lang=\"en-US\" style=\"font-size:12.5pt;color:#222222;font-weight:bold\">, </span><span style=\"font-size:12.5pt;color:#222222;font-weight:bold\">핀터레스트</span><span lang=\"en-US\" style=\"font-size:12.5pt;color:#222222;font-weight:bold\">￼</span><span style=\"font-size:12.5pt;color:#222222\">핀터레스트는(조금 길긴하지만) 핀(Pin) + 인터레스트(Interest)를 조합한 신조어이다. 이들은 개개인이 ‘컨텐츠’를 즐겨찾기 할 수 있도록, 핀보드 스타일의 소셜 플랫폼을 구축하였으며, 사용자들로 하여금 특정 주제의 사진들을 수집하고 관리할 수 있게 해줌으로써, 페이스북 이후의 플랫폼을 제시하여 성공하고 있다. 이상하지만 기억에 남는 이름인 ‘핀터레스트’의 서비스 브랜드는 한 번만 설명을 들으면 기억에 남는다. ‘관심(Interest)’을 ‘꼽아두다(Pin)’라는 쉬운 설명으로 재밌는 신조어를 만들어냈고, 그들의 서비스를 단 한단어로 표현하는데 성공하였다.</span></p>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:19.5pt\"><span style=\"font-size:12.5pt;color:#222222;font-weight:bold\">2. 파열음을 적절히 사용한다.</span></p>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:19.5pt\"><span style=\"font-size:12.5pt;color:#222222\">AppHarbor , Apportable , Beetailer , Bitplay , Comprehend Systems , Custora , DrChrono , Earbits , Fitfu , GiftRocket , Grubwithus , HelloFax , Humble Bundle, Hyperink , inPulse , Lanyrd , Like.fm , Mailgun , MinoMonsters , Moki.tv , Noteleaf , NowJS , Sendoid , Swipegood , TalkBin , Taskforce , TellFi , Tumult , Tutorspree , Upverter , Venuetastic , WhereBerry , YouGotListings Inc</span></p>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:12.5pt;color:#222222\">위 스타트업들은 미국의</span><span style=\"font-size:12.5pt;color:#222222\">&#160;</span><a href=\"http://ycombinator.com/\" style=\"font-size:12.5pt\">Y Combinator</a><span style=\"font-size:12.5pt;color:#222222\">가 최근 투자한 스타트업의 회사’이름’이다. 33개의 기업 중 5개 정도의 회사를 제외하고는 1단어로 이루어진 회사이름을 사용하고 있다. 또, 33개의 기업명 중 21개의 기업이름에 파열음(ㅌ, ㅊ, ㅍ, ㅋ 등)이 들어간다는 것을 확인할 수 있다. 티몬, 쿠팡, 위메프 등의 소셜커머스 서비스는 물론이고, 카카오톡, 틱톡, 왓츠앱 등의 메신저 서비스, 애니팡, 쿠키런, 캔디크러쉬사가, 컴투스 등의 게임에서도 파열음이 포함된 이름이 많다는 것을 확인할 수 있다. 물론, 이것은 개인적 업무경험에 의한 개인적 판단이며, 쎈발음을 사용하지 않는 다음, 네이버 등의 예외도 많다는 것을 말씀드린다.</span></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:19.5pt\"><span style=\"font-size:12.5pt;color:#222222;font-weight:bold\">3. 자음, 모음을 적절히 배치한다.</span></p>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:19.5pt\"><span style=\"font-size:12.5pt;color:#222222\">CPI, KPTX, TDX, UPS 등과 같이 ‘대문자 자음조합’로 이루어진 브랜드들은 듣는 사람이 노력해야 기억할 수 있는 단어들이라고 할 수 있다. 물론 매스미디어를 통한 대규모 마케팅으로 사람들의 머릿속에 심어줄 수도 있지만, 그런 방식은 스타트업이 할 수 있는 방식도 아니고 하고자 하는 방법도 아니라고 생각된다. 사람들의 머릿속에 기억되는 단어들은 ‘좋은 어감’을 가지고 있다. Yahoo!, Fedex, AVAYA, AVIS, Viber, KAKAO 등의 경우를 살펴보면, 자음+모음+자음 또는 모음+자음+모음 등의 순서가 숨어있음을 알 수 있다.</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:19.5pt\"><span style=\"font-size:12pt;color:#222222\">4. </span><span lang=\"ko-KR\" style=\"font-size:12pt;color:#222222\">대중적인</span><span style=\"font-size:12pt;color:#222222\"> </span><span lang=\"ko-KR\" style=\"font-size:12pt;color:#222222\">컨텐츠에서</span><span style=\"font-size:12pt;color:#222222\"> </span><span lang=\"ko-KR\" style=\"font-size:12pt;color:#222222\">추출</span></p>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:19.5pt\"><span style=\"font-size:12pt;color:#222222\">가장 잘 지은 앱 이름을 하나만 꼽으라면 망설임 없이 ‘B612’를 꼽고 싶습니다. ‘B612’는 생텍쥐페리의 명작 『어린 왕자』에서 어린 왕자가 사는 소행성의 이름이죠. “정말 중요한 건 눈에 보이지 않아, 마음으로 보아야 볼 수 있어”라는 명대사를 인용해 ‘마음으로 찍는 셀카’라는 부제를 달았습니다.</span></p>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:19.5pt\"><span style=\"font-size:12pt;color:#222222\">카메라 앱의 핵심 타깃이 10-20대 여성인 점을 고려했을 때 이런 감성적이면서도 세련된 이름을 찾아냈다는 게 감탄스럽습니다. </span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:19.5pt\"><span style=\"font-size:12pt;color:#222222\">5. </span><span lang=\"ko-KR\" style=\"font-size:12pt;color:#222222\">“갓챠(Gotcha, I’ve got you)”라는 말에서 뽑아낸 왓챠(Watcha)도 멋진 이름입니다.</span><span lang=\"ko-KR\" style=\"font-size:12pt;color:#222222\">&#160;</span><span lang=\"ko-KR\" style=\"font-size:12pt;color:#222222\">본 영화를 저장하고 아직 안 본 영화 중 재밌게 볼만한 영화를 찾아주는 서비스에 잘 어울리죠. </span></p>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:19.5pt\"><span style=\"font-size:12pt;color:#222222\">‘풀무원: 바른 먹거리’ </span></p>\r\n\t\t\t\t<table style=\"border:0px\">\r\n\t\t\t\t\t<tr>\r\n\t\t\t\t\t\t<td style=\"background-color:white;border:0px;font-size:10pt\"><span style=\"font-size:12pt;color:black\">첫</span><span style=\"font-size:12pt;color:#464646\">번째 전략을 따르는 경우, 앱의 타이틀은 보통 하나에서 세가지 단어로 이루어집니다. 예를 들면 클래시 오브 클랜(Clash of Clans)을 들 수가 있습니다.</span><span style=\"font-size:12pt;color:#464646\">&#160;</span><span style=\"font-size:9pt;color:#464646\">&#160;</span></td>\r\n\t\t\t\t\t</tr>\r\n\t\t\t\t\t<tr>\r\n\t\t\t\t\t\t<td style=\"background-color:white;border:0px;font-size:10pt\"><span style=\"font-size:12pt;color:#464646\">두번째 전략을 따르는 경우, 앱의 타이틀 안에 메인 이름에 부가적으로 관련 키워드가</span><span style=\"font-size:12pt;color:#464646\">&#160;</span><span style=\"font-size:12pt;color:#464646\">더 많이 포함되어 있습니다. 예를</span><span style=\"font-size:12pt;color:#464646\">&#160;</span><span style=\"font-size:12pt;color:#464646\">들자면, 앱 인 더 에어: 비행기 추적</span><span style=\"font-size:12pt;color:#464646\">&#160;</span><span style=\"font-size:12pt;color:#464646\">및 공항 가이드(App in the Air: Flight Tracker and Airport Guide)를 들 수</span><span style=\"font-size:12pt;color:black\">&#160;</span><span style=\"font-size:12pt;color:#464646\">가</span><span style=\"font-size:12pt;color:black\">&#160;</span><span style=\"font-size:12pt;color:#464646\">있습니다.</span></td>\r\n\t\t\t\t\t</tr>\r\n\t\t\t\t\t<tr>\r\n\t\t\t\t\t\t<td style=\"background-color:white;border:0px;font-size:10pt\"><span style=\"font-size:12pt;color:#464646\">부수적으로 키워드를 포함하는 방법에는 2가지 기능이 있습니다. 메인 이름을 보충으로 설명할 수 있다는 점과 앱스토어</span><span style=\"font-size:12pt;color:#464646\">&#160;</span><span style=\"font-size:12pt;color:#464646\">검색기능에서 부수적으로 유기적인 앱 설치를 유발할 수 있다는 점입니다. 만약 앱 퍼블리셔가 앱 이름에 키워드를</span><span style=\"font-size:12pt;color:#464646\">&#160;</span><span style=\"font-size:12pt;color:#464646\">부수적으로 넣는다고 한다면, 콜론(;)이나 대시(-)를 사용할 것입니다. 두 가지 방법에 눈에 띄는 차이점은 없지만,</span><span style=\"font-size:12pt;color:#464646\">&#160;</span><span style=\"font-size:12pt;color:#464646\">콜론을</span><span style=\"font-size:12pt;color:#464646\">&#160;</span><span style=\"font-size:12pt;color:#464646\">사용하면 한 글자를 더 줄일 수 있다는 장점이 있습니다.</span><span style=\"font-size:12pt;color:#464646\">&#160;</span></td>\r\n\t\t\t\t\t</tr>\r\n\t\t\t\t</table>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:15.8pt\"><span style=\"font-size:10.5pt;color:#3b3b3b\">01</span><span style=\"font-size:10.5pt;color:#3b3b3b\">&#160;&#160;&#160;&#160;&#160;&#160;&#160; </span><span style=\"font-size:10.5pt;color:#3b3b3b\">외국인이 발음하기 쉬워야 한다</span></p>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:15.8pt\"><span style=\"font-size:10.5pt;color:#3b3b3b\">국내에서는 이해와 발음이 쉽다고 하더라도 외국인의 입장에서는 결코 그렇지 않다. 한국어라 하더라도 외국인 발음을 고려한 네이밍을 할 수 있다면, 글로벌 시장 공략시 큰 도움이 된다.</span></p>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:15.8pt\"><span style=\"font-size:10.5pt;color:#3b3b3b\">02</span><span style=\"font-size:10.5pt;color:#3b3b3b\">&#160;&#160;&#160;&#160;&#160;&#160;&#160; </span><span style=\"font-size:10.5pt;color:#3b3b3b\">스펠링 방법이 여러 개 있는 이름은 피한다</span></p>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:15.8pt\"><span style=\"font-size:10.5pt;color:#3b3b3b\">알파벳으로 스펠링이 다르더라도 발음이 유사한 단어가 존재하는 이름은 피하는 것이 좋다. 가령 Phaser는 Fazer와 Faser라고도 쓸 수 있다. 네이밍했을 때 문자 예시를 쉽게 상상할 수 있는 이름이 좋다.</span></p>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:15.8pt\"><span style=\"font-size:10.5pt;color:#3b3b3b\">03</span><span style=\"font-size:10.5pt;color:#3b3b3b\">&#160;&#160;&#160;&#160;&#160;&#160;&#160; </span><span style=\"font-size:10.5pt;color:#3b3b3b\">이름 속에 스토리를 넣어라</span></p>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:15.8pt\"><span style=\"font-size:10.5pt;color:#3b3b3b\">눈으로 보고, 소리를 듣더라도 그 이름의 이면에 뭔가 브랜드 스토리가 녹아 있다면 더욱 잘 기억할 수 있다. 가령 아마존(AMAZON)의 경우 A부터 Z까지(모든 상품을 판매한다는 뜻), Zynga는 창업자의 이름 등을 스토리로 녹였다.</span></p>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:15.8pt\"><span style=\"font-size:10.5pt;color:#3b3b3b\">04</span><span style=\"font-size:10.5pt;color:#3b3b3b\">&#160;&#160;&#160;&#160;&#160;&#160;&#160; </span><span style=\"font-size:10.5pt;color:#3b3b3b\">도메인을 따는 데 너무 얽매이지 않는다</span></p>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:15.8pt\"><span style=\"font-size:10.5pt;color:#3b3b3b\">제품의 이름을 생각하더라도 어떻게 해서든 ‘.com’이 비어있는 것을 찾아려고 하기 마련이다. 최근엔 좋은 이름이 ‘.com’에 비어있는 경우는 드물다. 그럴 경우 ‘.co’나 ‘About.me’, ‘Last.fm’, ‘Bit.ly’ 등 도메인명 자체가 이름이 되도록 할 수도 있다.</span></p>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:15.8pt\"><span style=\"font-size:10.5pt;color:#3b3b3b\">05</span><span style=\"font-size:10.5pt;color:#3b3b3b\">&#160;&#160;&#160;&#160;&#160;&#160;&#160; Google Analytics </span><span style=\"font-size:10.5pt;color:#3b3b3b\">사용 개발자는 30%</span></p>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:15.8pt\"><span style=\"font-size:10.5pt;color:#3b3b3b\">이름에 숫자를 넣는 건 해외 시장 진출 이름으로는 그다지 추천할 만하지 않다. 숫자를 타이핑할 경우, 가령 스카이원이라는 기업의 경우 1인지, one인지 방식 구분이 쉽지 않기 때문이다.</span></p>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:15.8pt\"><span style=\"font-family:helvetica;color:#212529\">29CM</span><span style=\"color:#212529\">는</span><span style=\"font-family:helvetica;color:#212529\"> </span><span style=\"color:#212529\">‘너무</span><span style=\"font-family:helvetica;color:#212529\"> </span><span style=\"color:#212529\">멀지도</span><span style=\"font-family:helvetica;color:#212529\"> </span><span style=\"color:#212529\">가깝지도</span><span style=\"font-family:helvetica;color:#212529\"> </span><span style=\"color:#212529\">않은</span><span style=\"font-family:helvetica;color:#212529\"> </span><span style=\"color:#212529\">사람과</span><span style=\"font-family:helvetica;color:#212529\"> </span><span style=\"color:#212529\">사람</span><span style=\"font-family:helvetica;color:#212529\"> </span><span style=\"color:#212529\">사이의</span><span style=\"font-family:helvetica;color:#212529\"> </span><span style=\"color:#212529\">거리</span><span style=\"font-family:helvetica;color:#212529\">, </span><span style=\"color:#212529\">설렘을</span><span style=\"font-family:helvetica;color:#212529\"> </span><span style=\"color:#212529\">주는</span><span style=\"font-family:helvetica;color:#212529\"> </span><span style=\"color:#212529\">거리’를</span><span style=\"font-family:helvetica;color:#212529\"> </span><span style=\"color:#212529\">의미한다</span><span style=\"font-family:helvetica;color:#212529\">. </span><span style=\"color:#212529\">대면하는</span><span style=\"font-family:helvetica;color:#212529\"> </span><span style=\"color:#212529\">사람과</span><span style=\"font-family:helvetica;color:#212529\"> </span><span style=\"color:#212529\">가장</span><span style=\"font-family:helvetica;color:#212529\"> </span><span style=\"color:#212529\">교감이</span><span style=\"font-family:helvetica;color:#212529\"> </span><span style=\"color:#212529\">이뤄질</span><span style=\"font-family:helvetica;color:#212529\"> </span><span style=\"color:#212529\">수</span><span style=\"font-family:helvetica;color:#212529\"> </span><span style=\"color:#212529\">있는</span><span style=\"font-family:helvetica;color:#212529\"> </span><span style=\"color:#212529\">거리가</span><span style=\"font-family:helvetica;color:#212529\"> &#160;29CM</span><span style=\"color:#212529\">라는</span><span style=\"font-family:helvetica;color:#212529\"> </span><span style=\"color:#212529\">점을</span><span style=\"font-family:helvetica;color:#212529\"> </span><span style=\"color:#212529\">활용한</span><span style=\"font-family:helvetica;color:#212529\"> </span><span style=\"color:#212529\">것이다</span><span style=\"font-family:helvetica;color:#212529\">. </span><span style=\"color:#212529\">브랜드는</span><span style=\"font-family:helvetica;color:#212529\"> </span><span style=\"color:#212529\">결국</span><span style=\"font-family:helvetica;color:#212529\"> </span><span style=\"color:#212529\">사람이</span><span style=\"font-family:helvetica;color:#212529\"> </span><span style=\"color:#212529\">사람에게</span><span style=\"font-family:helvetica;color:#212529\"> </span><span style=\"color:#212529\">말해줘야</span><span style=\"font-family:helvetica;color:#212529\"> </span><span style=\"color:#212529\">하는</span><span style=\"font-family:helvetica;color:#212529\"> </span><span style=\"color:#212529\">영역이고</span><span style=\"font-family:helvetica;color:#212529\"> </span><span style=\"color:#212529\">이를</span><span style=\"font-family:helvetica;color:#212529\"> </span><span style=\"color:#212529\">위해</span><span style=\"font-family:helvetica;color:#212529\"> </span><span style=\"color:#212529\">소비자에게</span><span style=\"font-family:helvetica;color:#212529\"> </span><span style=\"color:#212529\">그</span><span style=\"font-family:helvetica;color:#212529\"> </span><span style=\"color:#212529\">만큼</span><span style=\"font-family:helvetica;color:#212529\"> </span><span style=\"color:#212529\">다가가겠다는</span><span style=\"font-family:helvetica;color:#212529\"> </span><span style=\"color:#212529\">의미이다</span><span style=\"font-family:helvetica;color:#212529\">.&#160;</span></p>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:15.8pt\"><span style=\"font-size:18pt;color:#222222;font-weight:bold\">당신의</span><span style=\"font-family:Verdana;font-size:18pt;color:#222222;font-weight:bold\"> </span><span style=\"font-size:18pt;color:#222222;font-weight:bold\">서비스를</span><span style=\"font-family:Verdana;font-size:18pt;color:#222222;font-weight:bold\"> </span><span style=\"font-size:18pt;color:#222222;font-weight:bold\">‘한</span><span style=\"font-family:Verdana;font-size:18pt;color:#222222;font-weight:bold\"> </span><span style=\"font-size:18pt;color:#222222;font-weight:bold\">단어’로</span><span style=\"font-family:Verdana;font-size:18pt;color:#222222;font-weight:bold\"> </span><span style=\"font-size:18pt;color:#222222;font-weight:bold\">설명하라</span><span style=\"font-family:Verdana;font-size:18pt;color:#222222;font-weight:bold\">.</span><span lang=\"en-US\" style=\"font-family:Verdana;font-size:18pt;color:#222222;font-weight:bold\"> </span><span style=\"font-size:18pt;color:#222222;font-weight:bold\">그것이</span><span style=\"font-family:Verdana;font-size:18pt;color:#222222;font-weight:bold\"> </span><span style=\"font-size:18pt;color:#222222;font-weight:bold\">네이밍이다</span><span style=\"font-family:Verdana;font-size:18pt;color:#222222;font-weight:bold\">.</span></p>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:15.8pt\"><span style=\"font-size:9pt;color:black\">네이밍, 디자인, 키워드</span></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">츠타야가<span lang=\"en-US\"> </span>음반<span lang=\"en-US\">/</span>영화가<span lang=\"en-US\"> </span>더<span lang=\"en-US\"> </span>많았음에도<span lang=\"en-US\"> </span>츠타야<span lang=\"en-US\"> </span>서점을<span lang=\"en-US\"> </span>표방했던<span lang=\"en-US\"> </span>것<span lang=\"en-US\"> </span>처럼<span lang=\"en-US\"> </span>우리는<span lang=\"en-US\"> </span>예술<span lang=\"en-US\">, </span>전시관<span lang=\"en-US\">, </span>음악홀<span lang=\"en-US\"> </span>같은<span lang=\"en-US\"> </span>인식을<span lang=\"en-US\"> </span>심는<span lang=\"en-US\"> </span>것이다<span lang=\"en-US\">. </span>심심할<span lang=\"en-US\"> </span>때<span lang=\"en-US\"> </span>켜는<span lang=\"en-US\"> </span>것이<span lang=\"en-US\"> </span>인스타<span lang=\"en-US\">, </span>페북<span lang=\"en-US\">, </span>넷플릭스가<span lang=\"en-US\"> </span>아니라<span lang=\"en-US\"> </span>이<span lang=\"en-US\"> </span>플랫폼이<span lang=\"en-US\"> </span>되어야<span lang=\"en-US\"> </span>한다<span lang=\"en-US\">.</span></p>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">린치핀이<span lang=\"en-US\"> </span>무얼까<span lang=\"en-US\">? </span>드라마<span lang=\"en-US\">? </span>웹툰<span lang=\"en-US\">?</span></p>\r\n\t\t\t</ul>\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t"
  }
];
const CONTENT_HASH = '74f4be68';

let cards = [];
let moving = null, resizing = null;
let selectedIdx = null, clipboardCard = null;
const GRID = 20, GAP = 14;
function snap(v) { return Math.round(v / GRID) * GRID; }

// ── Undo (Ctrl+Z) ────────────────────────────────────────────────────────────
const MAX_HISTORY = 50;
let history = [];
function snapshot() {
  syncText();
  history.push(JSON.stringify(cards));
  if (history.length > MAX_HISTORY) history.shift();
}
function undo() {
  if (!history.length) { showStatus('되돌릴 내용 없음'); return; }
  syncText();
  cards = JSON.parse(history.pop());
  renderCards();
  saveBoard();
  showStatus('↩ 되돌림');
}
function showStatus(msg) {
  const s = document.getElementById('status');
  s.textContent = msg;
  clearTimeout(showStatus._t);
  showStatus._t = setTimeout(() => { s.textContent = ''; }, 2000);
}
document.addEventListener('keydown', e => {
  const isText = document.activeElement?.contentEditable === 'true';
  if ((e.ctrlKey || e.metaKey) && e.key === 'z' && !e.shiftKey) {
    if (isText) return;
    e.preventDefault();
    undo();
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'c' && !e.shiftKey && !isText) {
    if (selectedIdx !== null && cards[selectedIdx]) {
      syncText();
      clipboardCard = JSON.parse(JSON.stringify(cards[selectedIdx]));
      showStatus('카드 복사됨');
      e.preventDefault();
    }
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'v' && !e.shiftKey && !isText) {
    if (clipboardCard) {
      e.preventDefault();
      snapshot();
      const nc = JSON.parse(JSON.stringify(clipboardCard));
      nc.x = (nc.x || 0) + 30; nc.y = (nc.y || 0) + 30;
      cards.push(nc);
      selectedIdx = cards.length - 1;
      renderCards(); saveBoard();
      showStatus('카드 붙여넣음');
    }
  }
  if (e.key === 'Escape') {
    document.querySelectorAll('.card.selected').forEach(c => c.classList.remove('selected'));
    selectedIdx = null;
  }
});

function pushCards(movedIdx) {
  const moved = cards[movedIdx];
  const movedEl = document.querySelector(`.card[data-idx="${movedIdx}"]`);
  if (!movedEl) return;
  const mh = movedEl.offsetHeight;
  document.querySelectorAll('.card').forEach(el => {
    const i = +el.dataset.idx;
    if (i === movedIdx) return;
    const c = cards[i], oh = el.offsetHeight;
    if (moved.x < (c.x+(c.w||200)) && (moved.x+(moved.w||200)) > c.x && moved.y < (c.y+oh) && (moved.y+mh) > c.y) {
      c.y = moved.y + mh + GAP;
      el.style.top = c.y + 'px';
    }
  });
}

function loadBoard() {
  const saved = localStorage.getItem(SAVE_KEY);
  const savedHash = localStorage.getItem(SAVE_KEY + ':hash');
  let parsed = null;
  try { parsed = saved ? JSON.parse(saved) : null; } catch(e) {}
  // reset if: no save, empty array, or content hash changed (page regenerated)
  if (!parsed || parsed.length === 0 || savedHash !== CONTENT_HASH) {
    cards = DEFAULT_CARDS.map(c => ({...c}));
    localStorage.removeItem(SAVE_KEY);
    localStorage.setItem(SAVE_KEY + ':hash', CONTENT_HASH);
    renderCards();
    const hasCoords = cards.some(c => c.x !== undefined && c.y !== undefined);
    if (!hasCoords) autoLayout();
    return;
  }
  cards = parsed;
  renderCards();
}
function resetToDefaults() { if (!confirm('저장된 보드를 지우고 원본으로 초기화합니다. 계속할까요?')) return; localStorage.removeItem(SAVE_KEY); cards = DEFAULT_CARDS.map(c => ({...c})); renderCards(); autoLayout(); }

function autoLayout() {
  const boardW = document.getElementById('board').offsetWidth;
  const cols = Math.max(1, Math.floor(boardW / 280));
  const colW = (boardW - GAP*(cols-1)) / cols;
  const colH = new Array(cols).fill(0);
  const allCards = document.querySelectorAll('.card');
  const images = document.querySelectorAll('.card img');
  let loaded = 0;
  function place() {
    allCards.forEach((el, i) => {
      const w = Math.min(cards[i].w || colW, colW);
      let minCol = 0;
      for (let c = 1; c < cols; c++) if (colH[c] < colH[minCol]) minCol = c;
      cards[i].x = minCol * (colW + GAP);
      cards[i].y = colH[minCol];
      cards[i].w = w;
      el.style.left = cards[i].x + 'px';
      el.style.top = cards[i].y + 'px';
      el.style.width = w + 'px';
      colH[minCol] = cards[i].y + el.offsetHeight + GAP;
    });
    document.getElementById('board').style.minHeight = (Math.max(...colH) + 100) + 'px';
    saveBoard();
  }
  if (!images.length) { requestAnimationFrame(place); return; }
  images.forEach(img => {
    if (img.complete) { loaded++; if (loaded >= images.length) requestAnimationFrame(place); }
    else { img.onload = img.onerror = () => { loaded++; if (loaded >= images.length) requestAnimationFrame(place); }; }
  });
}

function syncText() {
  document.querySelectorAll('.card').forEach(el => {
    const i = +el.dataset.idx;
    if (cards[i]?.type === 'text') { const t = el.querySelector('.text'); if (t) cards[i].content = t.innerHTML; }
  });
}
function saveBoard() { syncText(); localStorage.setItem(SAVE_KEY, JSON.stringify(cards)); localStorage.setItem(SAVE_KEY + ':hash', CONTENT_HASH); showStatus('저장됨 ' + new Date().toLocaleTimeString()); }

function renderCards() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  cards.forEach((card, i) => {
    const el = document.createElement('div');
    el.className = 'card'; el.dataset.idx = i;
    if (card.x !== undefined) el.style.left = card.x + 'px';
    if (card.y !== undefined) el.style.top = card.y + 'px';
    // html cards contain raw OneNote table HTML which may overflow the stated div width
    if (card.w) { if (card.type === 'html') el.style.minWidth = card.w + 'px'; else el.style.width = card.w + 'px'; }
    el.addEventListener('mousedown', e => {
      if (e.target.closest('.text, a, .card-btn, .resize-handle, td, th')) return;
      e.preventDefault();
      // Update selection
      document.querySelectorAll('.card.selected').forEach(c => c.classList.remove('selected'));
      selectedIdx = i; el.classList.add('selected');
      snapshot();
      moving = { idx: i, startX: e.clientX, startY: e.clientY, origX: card.x||0, origY: card.y||0 };
      el.classList.add('moving');
    });
    const actions = document.createElement('div'); actions.className = 'card-actions';
    const delBtn = document.createElement('button'); delBtn.className = 'card-btn'; delBtn.textContent = '×';
    delBtn.onclick = e => { e.stopPropagation(); if(confirm('삭제?')) { snapshot(); cards.splice(i,1); renderCards(); saveBoard(); } };
    actions.appendChild(delBtn); el.appendChild(actions);
    if (card.type === 'text') {
      const text = document.createElement('div'); text.className = 'text'; text.contentEditable = true;
      text.innerHTML = card.content || '';
      text.addEventListener('focus', () => { snapshot(); });
      text.addEventListener('blur', () => { card.content = text.innerHTML; saveBoard(); });
      el.appendChild(text);
    } else if (card.type === 'image') {
      const img = document.createElement('img');
      img.src = card.src.startsWith('http') || card.src.startsWith('data:') ? card.src : IMG_BASE + card.src;
      img.alt = ''; img.loading = 'lazy'; img.onerror = () => img.style.display = 'none';
      if (card.w) img.style.width = card.w + 'px';
      if (card.h) img.style.height = card.h + 'px';
      if (card.link) { const a = document.createElement('a'); a.href = card.link; a.target = '_blank'; a.appendChild(img); el.appendChild(a); }
      else { el.appendChild(img); }
      if (card.caption) { const cap = document.createElement('div'); cap.style.cssText = 'font-size:11px;color:#8b949e;margin-top:4px;word-break:break-word;padding:0 2px;'; cap.textContent = card.caption; el.appendChild(cap); }
    } else if (card.type === 'html') {
      const wrapper = document.createElement('div');
      wrapper.style.cssText = 'overflow:auto;font-size:13px;line-height:1.5;';
      wrapper.innerHTML = card.html.replace(/__ATTACHMENT__/g, IMG_BASE);
      wrapper.querySelectorAll('img').forEach(img => { img.style.maxWidth = '100%'; img.style.height = 'auto'; img.draggable = false; });
      wrapper.querySelectorAll('a').forEach(a => { a.target = '_blank'; a.style.color = '#6cb0f6'; });
      wrapper.querySelectorAll('table').forEach(t => { t.style.borderCollapse = 'collapse'; });
      wrapper.querySelectorAll('td,th').forEach(td => {
        td.style.border = '1px solid #444'; td.style.padding = '4px 6px'; td.style.verticalAlign = 'top';
        td.title = '더블클릭으로 편집';
        td.addEventListener('dblclick', function(e) {
          e.stopPropagation();
          snapshot();
          this.contentEditable = 'true';
          this.style.outline = '2px solid #388bfd';
          this.style.background = 'rgba(56,139,253,0.08)';
          this.focus();
        });
        td.addEventListener('blur', function() {
          this.contentEditable = 'false';
          this.style.outline = '';
          this.style.background = '';
          cards[i].html = wrapper.innerHTML.split(IMG_BASE).join('__ATTACHMENT__');
          saveBoard();
        });
      });
      el.appendChild(wrapper);
    } else if (card.type === 'table') {
      const rows = card.rows || [['','',''],['','',''],['','','']];
      const tbl = document.createElement('table');
      tbl.style.cssText = 'border-collapse:collapse;width:100%;font-size:13px;';
      rows.forEach((row, ri) => {
        const tr = tbl.insertRow();
        row.forEach((cell, ci) => {
          const td = document.createElement(ri === 0 ? 'th' : 'td');
          td.contentEditable = true;
          td.style.cssText = 'border:1px solid #30363d;padding:4px 8px;min-width:60px;text-align:left;' + (ri===0 ? 'background:#21262d;font-weight:600;' : '');
          td.textContent = cell;
          td.addEventListener('blur', () => { if (!cards[i].rows) cards[i].rows = rows; rows[ri][ci] = td.textContent; saveBoard(); });
          tr.appendChild(td);
        });
      });
      el.appendChild(tbl);
      const addRow = document.createElement('button');
      addRow.textContent = '+ 행'; addRow.style.cssText = 'margin-top:4px;font-size:11px;background:#21262d;border:1px solid #30363d;color:#8b949e;padding:2px 8px;border-radius:4px;cursor:pointer;';
      addRow.onclick = e => { e.stopPropagation(); snapshot(); if (!cards[i].rows) cards[i].rows = rows; cards[i].rows.push(new Array(cards[i].rows[0].length).fill('')); renderCards(); saveBoard(); };
      const addCol = document.createElement('button');
      addCol.textContent = '+ 열'; addCol.style.cssText = 'margin-top:4px;margin-left:4px;font-size:11px;background:#21262d;border:1px solid #30363d;color:#8b949e;padding:2px 8px;border-radius:4px;cursor:pointer;';
      addCol.onclick = e => { e.stopPropagation(); snapshot(); if (!cards[i].rows) cards[i].rows = rows; cards[i].rows.forEach(r => r.push('')); renderCards(); saveBoard(); };
      el.appendChild(addRow); el.appendChild(addCol);
    }
    const rh = document.createElement('div'); rh.className = 'resize-handle';
    rh.addEventListener('mousedown', e => { e.preventDefault(); e.stopPropagation(); snapshot(); resizing = { idx: i, startX: e.clientX, startW: card.w || el.offsetWidth }; });
    el.appendChild(rh);
    if (i === selectedIdx) el.classList.add('selected');
    board.appendChild(el);
  });
  requestAnimationFrame(() => {
    let maxB = 0;
    document.querySelectorAll('.card').forEach(el => { const b = (parseFloat(el.style.top)||0) + el.offsetHeight; if (b > maxB) maxB = b; });
    board.style.minHeight = (maxB + 100) + 'px';
  });
}

document.addEventListener('mousemove', e => {
  if (moving) {
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`); if (!el) return;
    let nx = moving.origX + e.clientX - moving.startX, ny = moving.origY + e.clientY - moving.startY;
    if (e.shiftKey) { nx = snap(nx); ny = snap(ny); el.style.outline = '1px dashed rgba(240,192,64,0.3)'; } else { el.style.outline = ''; }
    el.style.left = nx + 'px'; el.style.top = ny + 'px';
  }
  if (resizing) {
    let nw = resizing.startW + e.clientX - resizing.startX; if (e.shiftKey) nw = snap(nw);
    cards[resizing.idx].w = Math.max(100, nw);
    const el = document.querySelector(`.card[data-idx="${resizing.idx}"]`); if (el) el.style.width = cards[resizing.idx].w + 'px';
  }
});

document.addEventListener('mouseup', e => {
  if (moving) {
    let nx = moving.origX + e.clientX - moving.startX, ny = moving.origY + e.clientY - moving.startY;
    if (e.shiftKey) { nx = snap(nx); ny = snap(ny); }
    cards[moving.idx].x = Math.max(0, nx); cards[moving.idx].y = Math.max(0, ny);
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`); if (el) { el.classList.remove('moving'); el.style.outline = ''; }
    if (e.shiftKey) pushCards(moving.idx);
    moving = null; saveBoard();
  }
  if (resizing) { if (e.shiftKey) pushCards(resizing.idx); resizing = null; saveBoard(); }
});

function addTextCard() { snapshot(); cards.push({ type: 'text', content: '', x: 50, y: window.scrollY+100, w: 300 }); renderCards(); setTimeout(() => { const els = document.querySelectorAll('.card .text'); els[els.length-1]?.focus(); }, 100); }
function addImageCard() { const input = document.createElement('input'); input.type = 'file'; input.accept = 'image/*'; input.onchange = e => { const f = e.target.files[0]; if (!f) return; const r = new FileReader(); r.onload = () => { snapshot(); cards.push({ type: 'image', src: r.result, x: 50, y: window.scrollY+100, w: 240 }); renderCards(); saveBoard(); }; r.readAsDataURL(f); }; input.click(); }
function addImageUrl() { const url = prompt('이미지 URL'); if (!url) return; snapshot(); cards.push({ type: 'image', src: url, x: 50, y: window.scrollY+100, w: 240 }); renderCards(); saveBoard(); }
function addTableCard() {
  const colsStr = prompt('열 수 (기본 3)', '3'); const cols = Math.max(1, parseInt(colsStr)||3);
  const rowsStr = prompt('행 수 (헤더 포함, 기본 4)', '4'); const rows = Math.max(1, parseInt(rowsStr)||4);
  snapshot();
  cards.push({ type: 'table', rows: Array.from({length: rows}, (_, ri) => Array.from({length: cols}, (_, ci) => ri===0 ? `열${ci+1}` : '')), x: 50, y: window.scrollY+100, w: Math.max(240, cols*100) });
  renderCards(); saveBoard();
}
function exportBoard() { syncText(); const blob = new Blob([JSON.stringify(cards, null, 2)], { type: 'application/json' }); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = SAVE_KEY + '.json'; a.click(); }
// ── Zoom ─────────────────────────────────────────────────────────────────────
let zoom = parseFloat(localStorage.getItem('zoom-' + SAVE_KEY) || '1.0');
function applyZoom() {
  const board = document.getElementById('board');
  board.style.transform = `scale(${zoom})`;
  board.style.transformOrigin = '0 0';
  document.getElementById('zoom-level').textContent = Math.round(zoom * 100) + '%';
  localStorage.setItem('zoom-' + SAVE_KEY, zoom);
}
function zoomIn()  { zoom = Math.min(3.0, parseFloat((zoom + 0.1).toFixed(2))); applyZoom(); }
function zoomOut() { zoom = Math.max(0.2, parseFloat((zoom - 0.1).toFixed(2))); applyZoom(); }
document.addEventListener('keydown', e => {
  if (e.ctrlKey || e.metaKey) {
    if (e.key === '=' || e.key === '+') { e.preventDefault(); zoomIn(); }
    if (e.key === '-')                  { e.preventDefault(); zoomOut(); }
    if (e.key === '0')                  { e.preventDefault(); zoom = 1.0; applyZoom(); }
  }
});
document.getElementById('board').addEventListener('wheel', e => {
  if (!(e.ctrlKey || e.metaKey)) return;
  e.preventDefault();
  e.deltaY < 0 ? zoomIn() : zoomOut();
}, { passive: false });
applyZoom();
function resetLayout() { if (!confirm('자동 재배치합니다.')) return; cards.forEach(c => { delete c.x; delete c.y; }); renderCards(); autoLayout(); }
// ── Floating format toolbar ───────────────────────────────────────────────────
const fmtBar = document.getElementById('format-toolbar');
function fmt(cmd) { document.execCommand(cmd, false, null); saveBoard(); }
function fmtLink() {
  const sel = window.getSelection();
  if (!sel || sel.isCollapsed) return;
  const url = prompt('링크 URL 입력', 'https://');
  if (!url) return;
  document.execCommand('createLink', false, url);
  // make links open in new tab
  sel.anchorNode?.parentElement?.closest('a')?.setAttribute('target', '_blank');
  document.querySelectorAll('.text a').forEach(a => a.target = '_blank');
  saveBoard();
}

// prevent format buttons from blurring contenteditable
fmtBar.addEventListener('mousedown', e => e.preventDefault());

document.addEventListener('selectionchange', () => {
  const sel = window.getSelection();
  if (!sel || sel.isCollapsed || !sel.toString().trim()) { fmtBar.style.display = 'none'; return; }
  // only show if selection is inside a .text element
  const anchor = sel.anchorNode;
  if (!anchor) { fmtBar.style.display = 'none'; return; }
  const textEl = anchor.nodeType === 1 ? anchor.closest('.text') : anchor.parentElement?.closest('.text');
  if (!textEl) { fmtBar.style.display = 'none'; return; }
  // position above selection
  const range = sel.getRangeAt(0);
  const rect = range.getBoundingClientRect();
  fmtBar.style.display = 'flex';
  const tbW = fmtBar.offsetWidth || 180;
  let left = rect.left + rect.width / 2 - tbW / 2;
  left = Math.max(8, Math.min(left, window.innerWidth - tbW - 8));
  fmtBar.style.left = left + 'px';
  fmtBar.style.top = (rect.top - 44 + window.scrollY) + 'px';
});

setInterval(saveBoard, 30000);
loadBoard();
</script>
</body>
</html>
