> </span>클때<span lang=\"en-US\"> </span>승자독식이<span lang=\"en-US\"> </span>일어난다<span lang=\"en-US\">. </span></p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">선도가는<span lang=\"en-US\"> </span>어떻게<span lang=\"en-US\"> </span>이겨나가야하나<span lang=\"en-US\">. </span>첫번째의<span lang=\"en-US\"> </span>실수를<span lang=\"en-US\"> </span>기다리거나<span lang=\"en-US\">. </span>야후는<span lang=\"en-US\"> </span>인간이<span lang=\"en-US\"> </span>직접<span lang=\"en-US\"> </span>분류<span lang=\"en-US\">, </span>스케일업이<span lang=\"en-US\"> </span>안되었다<span lang=\"en-US\">.</span></p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">알타비스타가<span lang=\"en-US\"> </span>치고<span lang=\"en-US\"> </span>나왔다<span lang=\"en-US\">. </span>단어<span lang=\"en-US\"> </span>빈도수에<span lang=\"en-US\"> </span>따라<span lang=\"en-US\"> </span>검색함<span lang=\"en-US\">. </span>그래서<span lang=\"en-US\"> </span>검색의<span lang=\"en-US\"> </span>질이<span lang=\"en-US\"> </span>낮았다<span lang=\"en-US\">. </span>구슬이<span lang=\"en-US\"> </span>정발<span lang=\"en-US\"> </span>훌륭했던<span lang=\"en-US\"> </span>것은<span lang=\"en-US\"> </span>페이지의<span lang=\"en-US\"> </span>등수를<span lang=\"en-US\"> </span>메겨서<span lang=\"en-US\">, </span>모든<span lang=\"en-US\"> </span>페이지가<span lang=\"en-US\"> </span>네트쿼크<span lang=\"en-US\"> </span>효과를<span lang=\"en-US\"> </span>자아내도록<span lang=\"en-US\"> </span>했다<span lang=\"en-US\">. </span>아주<span lang=\"en-US\"> </span>빠른<span lang=\"en-US\"> </span>네트쿼크<span lang=\"en-US\"> </span>효과를<span lang=\"en-US\"> </span>창출하며<span lang=\"en-US\"> </span>야후와<span lang=\"en-US\"> </span>알타비스타를<span lang=\"en-US\"> </span>부숴버렸다<span lang=\"en-US\">.</span></p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">플리커<span lang=\"en-US\"> </span>자체가<span lang=\"en-US\"> </span>확장성이<span lang=\"en-US\"> </span>없었고<span lang=\"en-US\">, </span>마이스페이스는<span lang=\"en-US\"> </span>개발자들에게<span lang=\"en-US\"> </span>문을<span lang=\"en-US\"> </span>열지않았다<span lang=\"en-US\">. </span></p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">페이스북은<span lang=\"en-US\"> </span>개발자들이<span lang=\"en-US\"> </span>참여해서<span lang=\"en-US\"> </span>개선해나간다<span lang=\"en-US\">. </span>링크드인과<span lang=\"en-US\"> </span>몬스터를<span lang=\"en-US\"> </span>비교해보자<span lang=\"en-US\">. </span>몬스터는<span lang=\"en-US\"> </span>온리<span lang=\"en-US\"> </span>구직에<span lang=\"en-US\"> </span>특화<span lang=\"en-US\">, </span>링크드인은<span lang=\"en-US\"> </span>전문가들간<span lang=\"en-US\"> </span>네트쿼킹하는<span lang=\"en-US\"> </span>장소<span lang=\"en-US\">. </span>포용<span lang=\"en-US\"> </span>참가<span lang=\"en-US\">, </span>인게이지먼트가<span lang=\"en-US\"> </span>일어났다<span lang=\"en-US\">.</span></p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">퍼스트무버보다<span lang=\"en-US\"> </span>네트워크<span lang=\"en-US\"> </span>효과를<span lang=\"en-US\"> </span>자아내는것이<span lang=\"en-US\"> </span>중요하다<span lang=\"en-US\">.</span></p>\r\n\t\t\t<br />\r\n\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">Q. <span lang=\"ko-KR\">생태계와</span> <span lang=\"ko-KR\">엔터프라이즈</span> <span lang=\"ko-KR\">효과가</span> <span lang=\"ko-KR\">중요한</span> <span lang=\"ko-KR\">것</span> <span lang=\"ko-KR\">같다</span>. <span lang=\"ko-KR\">상대의</span> <span lang=\"ko-KR\">많은</span> <span lang=\"ko-KR\">경제</span>, <span lang=\"ko-KR\">공급</span> <span lang=\"ko-KR\">경제가</span> <span lang=\"ko-KR\">동시에</span> <span lang=\"ko-KR\">생산되어야</span> <span lang=\"ko-KR\">한다</span>. <span lang=\"ko-KR\">한국에서도</span> <span lang=\"ko-KR\">많은</span> <span lang=\"ko-KR\">이야기ㅏ</span> <span lang=\"ko-KR\">오갔으나</span> <span lang=\"ko-KR\">에코시스템과</span> <span lang=\"ko-KR\">프리랜서가</span> <span lang=\"ko-KR\">없었다</span>. <span lang=\"ko-KR\">상당히</span> <span lang=\"ko-KR\">많은</span> <span lang=\"ko-KR\">사람들이</span> <span lang=\"ko-KR\">에코시스템을</span> <span lang=\"ko-KR\">회사</span> <span lang=\"ko-KR\">내에서만</span> <span lang=\"ko-KR\">만들어두었다</span>. <span lang=\"ko-KR\">개방형혁신을</span> <span lang=\"ko-KR\">어떻게</span> <span lang=\"ko-KR\">만들어갈</span> <span lang=\"ko-KR\">수있을</span> <span lang=\"ko-KR\">것인가</span>&gt;?</p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">하나<span lang=\"en-US\"> </span>두개<span lang=\"en-US\"> </span>정도<span lang=\"en-US\"> </span>다른<span lang=\"en-US\"> </span>ㅓㄴ략을<span lang=\"en-US\"> </span>이야기해보게싿<span lang=\"en-US\">. </span>기존<span lang=\"en-US\"> </span>네느쿼크를<span lang=\"en-US\"> </span>활용해서<span lang=\"en-US\">. </span>기술에다가<span lang=\"en-US\"> </span>커뮤니티를<span lang=\"en-US\"> </span>더하는<span lang=\"en-US\"> </span>것인<span lang=\"en-US\"> </span>커뮤니티에<span lang=\"en-US\"> </span>기술을<span lang=\"en-US\"> </span>더하는<span lang=\"en-US\"> </span>것보다<span lang=\"en-US\"> </span>쉽다<span lang=\"en-US\">. </span>많은<span lang=\"en-US\"> </span>경우<span lang=\"en-US\"> </span>네트워크를<span lang=\"en-US\"> </span>빌려<span lang=\"en-US\"> </span>시작한다<span lang=\"en-US\">. </span>통신<span lang=\"en-US\">, </span>금융처럼<span lang=\"en-US\">. </span>에어비앤비의<span lang=\"en-US\"> </span>경우<span lang=\"en-US\"> </span>유저<span lang=\"en-US\"> </span>베이스를<span lang=\"en-US\"> </span>주택과<span lang=\"en-US\"> </span>관련된<span lang=\"en-US\"> </span>글을<span lang=\"en-US\"> </span>긇ㄱ어다가<span lang=\"en-US\"> </span>사용했고<span lang=\"en-US\">, </span>페북은<span lang=\"en-US\"> </span>대학네트워크<span lang=\"en-US\"> </span>였다<span lang=\"en-US\">. </span>이게<span lang=\"en-US\"> </span>꼭<span lang=\"en-US\"> </span>자발적일<span lang=\"en-US\"> </span>필욛없다<span lang=\"en-US\">. </span>페이ㅂ팔은<span lang=\"en-US\"> </span>이베이<span lang=\"en-US\"> </span>네트워크<span lang=\"en-US\"> </span>였다<span lang=\"en-US\">. </span>기존의<span lang=\"en-US\"> </span>네트워크를<span lang=\"en-US\"> </span>빌리거나<span lang=\"en-US\"> </span>훔치거나<span lang=\"en-US\"> </span>사는<span lang=\"en-US\"> </span>것이<span lang=\"en-US\"> </span>가능하다<span lang=\"en-US\">. </span>마이크로소프트가< =\"ko-KR\">참여자</span>. <span lang=\"ko-KR\">네셔널보다</span> <span lang=\"ko-KR\">프라이빗</span> <span lang=\"ko-KR\">브랜드를</span> <span lang=\"ko-KR\">가져가고자</span> <span lang=\"ko-KR\">하는듯</span>. <span lang=\"ko-KR\">브랜드의</span> <span lang=\"ko-KR\">힘이</span> <span lang=\"ko-KR\">중요하다</span>. <span lang=\"ko-KR\">한국의</span> <span lang=\"ko-KR\">경우</span> <span lang=\"ko-KR\">민주화가</span> <span lang=\"ko-KR\">일어나고</span> <span lang=\"ko-KR\">있다</span>. <span lang=\"ko-KR\">한</span> <span lang=\"ko-KR\">개의</span> <span lang=\"ko-KR\">화장품</span> <span lang=\"ko-KR\">회사가</span> <span lang=\"ko-KR\">모든</span> <span lang=\"ko-KR\">밸류체인을</span> <span lang=\"ko-KR\">담당하는</span> <span lang=\"ko-KR\">대신</span> <span lang=\"ko-KR\">제조전문회사가</span> <span lang=\"ko-KR\">있고</span>, <span lang=\"ko-KR\">모든</span> <span lang=\"ko-KR\">사람이</span> <span lang=\"ko-KR\">마케팅</span> <span lang=\"ko-KR\">브랜드를</span> <span lang=\"ko-KR\">만들어</span> <span lang=\"ko-KR\">활동할</span> <span lang=\"ko-KR\">수</span> <span lang=\"ko-KR\">있다</span>. <span lang=\"ko-KR\">세상의</span> <span lang=\"ko-KR\">브랜드</span> <span lang=\"ko-KR\">중심</span>. <span lang=\"ko-KR\">리테일</span> <span lang=\"ko-KR\">중심</span> <span lang=\"ko-KR\">중심주의자가</span> <span lang=\"ko-KR\">있다</span>. <span lang=\"ko-KR\">리테일은</span> 2-3<span lang=\"ko-KR\">퍼센트</span> <span lang=\"ko-KR\">수익</span>, <span lang=\"ko-KR\">브랜드는</span> 20~30<span lang=\"ko-KR\">퍼센트</span> <span lang=\"ko-KR\">수익을</span> <span lang=\"ko-KR\">내는</span> <span lang=\"ko-KR\">것</span> <span lang=\"ko-KR\">같다</span>. <span lang=\"ko-KR\">매치</span> <span lang=\"ko-KR\">메이킹의</span> <span lang=\"ko-KR\">요소가</span> <span lang=\"ko-KR\">플랫폼에</span> <span lang=\"ko-KR\">있다고</span> <span lang=\"ko-KR\">하면</span>, <span lang=\"ko-KR\">프로덕트</span> <span lang=\"ko-KR\">리서쉽에</span> <span lang=\"ko-KR\">집중해야하는</span> <span lang=\"ko-KR\">것이</span> <span lang=\"ko-KR\">아닌가</span> <span lang=\"ko-KR\">한다</span>. <span lang=\"ko-KR\">한국</span> <span lang=\"ko-KR\">안으로</span> <s :0pt;margin-bottom:0pt\">기존<span lang=\"en-US\"> </span>네트워크를<span lang=\"en-US\"> </span>활용해서<span lang=\"en-US\">. </span>기술에<span lang=\"en-US\"> </span>커뮤니티를<span lang=\"en-US\"> </span>더하는<span lang=\"en-US\"> </span>것이<span lang=\"en-US\"> </span>커뮤니티에<span lang=\"en-US\"> </span>기술을<span lang=\"en-US\"> </span>더하는<span lang=\"en-US\"> </span>것보다<span lang=\"en-US\"> </span>쉽다<span lang=\"en-US\">. </span>많은<span lang=\"en-US\"> </span>경우<span lang=\"en-US\"> </span>통신<span lang=\"en-US\">, </span>금융과<span lang=\"en-US\"> </span>같은<span lang=\"en-US\"> </span>네트워크를<span lang=\"en-US\"> </span>빌려<span lang=\"en-US\"> </span>시작한다<span lang=\"en-US\">. </span>그러나<span lang=\"en-US\"> </span>에어비앤비의<span lang=\"en-US\"> </span>경우<span lang=\"en-US\"> </span>유저<span lang=\"en-US\"> </span>베이스를<span lang=\"en-US\"> </span>주택과<span lang=\"en-US\"> </span>관련된<span lang=\"en-US\"> </span>글을<span lang=\"en-US\"> </span>가져다가<span lang=\"en-US\"> </span>사용했고<span lang=\"en-US\">, </span>페이스북은<span lang=\"en-US\"> </span>대학네트워크를<span lang=\"en-US\"> </span>가져갔다<span lang=\"en-US\">. </span>이것이<span lang=\"en-US\"> </span>꼭<span lang=\"en-US\"> </span>자발적일<span lang=\"en-US\"> </span>필요는없다<span lang=\"en-US\">. </span>페이팔은<span lang=\"en-US\"> </span>이베이의<span lang=\"en-US\"> </span>네트워크<span lang=\"en-US\"> </span>였다<span lang=\"en-US\">. </span>기존의<span lang=\"en-US\"> </span>네트워크를<span lang=\"en-US\"> </span>빌리거나<span lang=\"en-US\">, </span>훔치거나<span lang=\"en-US\">, </span>사는<span lang=\"en-US\"> </span>것이<span lang=\"en-US\"> </span>가능하다<span lang=\"en-US\">. </span>마이크로소프트가<span lang=\"en-US\"> </span>링크드인을<span lang=\"en-US\"> </span>구매했다<span lang=\"en-US\">. </span></p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">다음<span lang=\"en-US\"> </span>전략은<span lang=\"en-US\"> </span>transition전략이다<span lang=\"en-US\">. </span>한<span lang=\"en-US\"> </span>그룹에서<span lang=\"en-US\"> </span>다른<span lang=\"en-US\"> </span>그룹으로<span lang=\"en-US\"> </span>간다면<span lang=\"en-US\"> </span>파이프의<span lang=\"en-US\"> </span>끝을<span lang=\"en-US\"> </span>열어<span lang=\"en-US\"> </span>다른<span lang=\"en-US\"> </span>파이프로의<span lang=\"en-US\"> </span>경로를<span lang=\"en-US\"> </span>열어두는<span lang=\"en-US\"> </span>것이다<span lang=\"en-US\">. </span>즉<span lang=\"en-US\">, </span>파이프라인의<span lang=\"en-US\"> </span>양단을<span lang=\"en-US\"> </span>열어두는<span lang=\"en-US\"> </span>것이다<span lang=\"en-US\">. </span>새로운<span lang=\"en-US\"> </span>레이어<span lang=\"en-US\">, </span>층위를<span lang=\"en-US\"> </span>얹어가는<span lang=\"en-US\"> </span>것이다<span lang=\"en-US\">. </span>중심<span lang=\"en-US\"> </span>구성요소는<span lang=\"en-US\"> </span>이<span lang=\"en-US\"> </span>모든<span lang=\"en-US\"> </span>상호작용<span lang=\"en-US\"> </span>플랫폼<span lang=\"en-US\"> </span>상에서<span lang=\"en-US\"> </span>이뤄진다는<span lang=\"en-US\"> </span>것<span lang=\"en-US\"> </span>이다<span lang=\"en-US\">. </span>매칭과<span lang=\"en-US\"> </span>네트워크가<span lang=\"en-US\"> </span>회사의<span lang=\"en-US\"> </span>플랫폼<span lang=\"en-US\"> </span>내에서<span lang=\"en-US\"> </span>이뤄지도록<span lang=\"en-US\"> </span>하라<span lang=\"en-US\">.</span></p>\r\n\t\t\t<br />\r\n\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-weight:bold\">Q. </span><span lang=\"ko-KR\" style=\"font-weight:bold\">삼성전자가</span><span style=\"font-weight:bold\"> </span><span lang=\"ko-KR\" style=\"font-weight:bold\">안드로이드와</span><span style=\"font-weight:bold\"> </span><span lang=\"ko-KR\" style=\"font-weight:bold\">분리해서</span><span style=\"font-weight:bold\"> </span><span lang=\"ko-KR\" style=\"font-weight:bold\">자신의</span><span style=\"font-weight:bold\"> </span><span lang=\"ko-KR\" style=\"font-weight:bold\">플랫폼을</span><span style=\"font-weight:bold\"> </span><span lang=\"ko-KR\" style=\"font-weight:bold\">만드는게</span><span style=\"font-weight:bold\"> </span><span lang=\"ko-KR\" style=\"font-weight:bold\">좋은</span><span style=\"font-weight:bold\"> </span><span lang=\"ko-KR\" style=\"font-weight:bold\">생각이라고</span><span style=\"font-weight:bold\"> </span><span lang=\"ko-KR\" style=\"font-weight:bold\">생각하는가</span><span style=\"font-weight:bold\">?</span></p>\r\n\t\t\t<br />\r\n\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">- <span lang=\"ko-KR\">첫</span> <span lang=\"ko-KR\">번째</span>, <span lang=\"ko-KR\">자신들이</span> <span lang=\"ko-KR\">스스로</span> <span lang=\"ko-KR\">뭔가를</span> <span lang=\"ko-KR\">해보는</span> <span lang=\"ko-KR\">것</span> <span lang=\"ko-KR\">자체가</span> <span lang=\"ko-KR\">의미가</span> <span lang=\"ko-KR\">있다</span>. <span lang=\"ko-KR\">삼성은</span> <span lang=\"ko-KR\">에코시스템을</span> <span lang=\"ko-KR\">가지고</span> <span lang=\"ko-KR\">있었음에도</span> <span lang=\"ko-KR\">스스로</span> <span lang=\"ko-KR\">시스템을</span> <span lang=\"ko-KR\">작게</span> <span lang=\"ko-KR\">만들어왔다</span>. <span lang=\"ko-KR\">타이젠은</span> <span lang=\"ko-KR\">잘못했다</span>. <span lang=\"ko-KR\">네트워크가</span> <span lang=\"ko-KR\">너무</span> <span lang=\"ko-KR\">작아서</span> <span lang=\"ko-KR\">개발자들이</span> <span lang=\"ko-KR\">참여할만한</span> <span lang=\"ko-KR\">동인이</span> <span lang=\"ko-KR\">없었고</span>, <span lang=\"ko-KR\">그래서</span> <span lang=\"ko-KR\">네트쿼크</span> <span lang=\"ko-KR\">효과를</span> <span lang=\"ko-KR\">만들어낼</span> <span lang=\"ko-KR\">수</span> <span lang=\"ko-KR\">없었다</span>. </p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">- <span lang=\"ko-KR\">다른</span> <span lang=\"ko-KR\">전략은</span> <span lang=\"ko-KR\">안드로이드에</span> <span lang=\"ko-KR\">참여하면서</span> <span lang=\"ko-KR\">서비스에</span> <span lang=\"ko-KR\">다양한</span> <span lang=\"ko-KR\">층위를</span> <span lang=\"ko-KR\">얹어가는</span> <span lang=\"ko-KR\">것이다</span>. <span lang=\"ko-KR\">프로바이더</span> <span lang=\"ko-KR\">레벨에서</span> <span lang=\"ko-KR\">통제력을</span> <span lang=\"ko-KR\">가져갈</span> <span lang=\"ko-KR\">수</span> <span lang=\"ko-KR\">있다</span>. <span lang=\"ko-KR\">스폰서</span> OS<span lang=\"ko-KR\">위에</span> <span lang=\"ko-KR\">프로바이더</span> <span lang=\"ko-KR\">레이어를</span> <span lang=\"ko-KR\">얹고</span> <span lang=\"ko-KR\">이를</span> <span lang=\"ko-KR\">활용</span> <span lang=\"ko-KR\">할</span> <span lang=\"ko-KR\">수도</span> <span lang=\"ko-KR\">있다</span>. <span lang=\"ko-KR\">즉</span>, <span lang=\"ko-KR\">오버</span> <span lang=\"ko-KR\">더</span> <span lang=\"ko-KR\">탑에</span> <span lang=\"ko-KR\">자시만의</span> <span lang=\"ko-KR\">서비스</span> <span lang=\"ko-KR\">층위를</span> <span lang=\"ko-KR\">씌울</span> <span lang=\"ko-KR\">수</span> <span lang=\"ko-KR\">있다면</span> <span lang=\"ko-KR\">관계와</span> <span lang=\"ko-KR\">데이터를</span> <span lang=\"ko-KR\">컨트롤</span> <span lang=\"ko-KR\">할</span> <span lang=\"ko-KR\">수</span> <span lang=\"ko-KR\">있다</span>. </p>\r\n\t\t\t<br />\r\n\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-weight:bold\">Q. </span><span lang=\"ko-KR\" style=\"font-weight:bold\">브랜드의</span><span style=\"font-weight:bold\"> </span><span lang=\"ko-KR\" style=\"font-weight:bold\">힘이</span><span style=\"font-weight:bold\"> </span><span lang=\"ko-KR\" style=\"font-weight:bold\">중요하다</span><span style=\"font-weight:bold\">. </span><span lang=\"ko-KR\" style=\"font-weight:bold\">한국의</span><span style=\"font-weight:bold\"> </span><span lang=\"ko-KR\" style=\"font-weight:bold\">경우</span><span style=\"font-weight:bold\"> </span><span lang=\"ko-KR\" style=\"font-weight:bold\">민주화가</span><span style=\"font-weight:bold\"> </span><span lang=\"ko-KR\" style=\"font-weight:bold\">일어나고</span><span style=\"font-weight:bold\"> </span><span lang=\"ko-KR\" style=\"font-weight:bold\">있다</span><span style=\"font-weight:bold\">. </span><span lang=\"ko-KR\" style=\"font-weight:bold\">한</span><span style=\"font-weight:bold\"> </span><span lang=\"ko-KR\" style=\"font-weight:bold\">개의</span><span style=\"font-weight:bold\"> </span><span lang=\"ko-KR\" style=\"font-weight:bold\" ang=\"en-US\"> </span>것<span lang=\"en-US\">, </span>호스트가<span lang=\"en-US\"> </span>손님을<span lang=\"en-US\"> </span>끌어들이는<span lang=\"en-US\"> </span>것<span lang=\"en-US\">, </span>유저<span lang=\"en-US\"> </span>행동에<span lang=\"en-US\"> </span>근거하거나<span lang=\"en-US\"> </span>학습<span lang=\"en-US\"> </span>알고리즘에<span lang=\"en-US\"> </span>의한<span lang=\"en-US\"> </span>추천<span lang=\"en-US\"> </span>등이<span lang=\"en-US\"> </span>모두<span lang=\"en-US\"> </span>유저로부터<span lang=\"en-US\"> </span>나온다<span lang=\"en-US\">.</span></p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">결론<span lang=\"en-US\"> : </span>얻은<span lang=\"en-US\"> </span>레슨이나<span lang=\"en-US\"> </span>인사이트</p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">플랫폼<span lang=\"en-US\"> </span>비즈니스는<span lang=\"en-US\">,</span></p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">Legacy Biz<span lang=\"ko-KR\">나</span> <span lang=\"ko-KR\">제품에도</span> <span lang=\"ko-KR\">충분히</span> <span lang=\"ko-KR\">적용이</span> <span lang=\"ko-KR\">가능하다</span>.</p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">Monetization<span lang=\"ko-KR\">보다</span> <span lang=\"ko-KR\">가치</span> <span lang=\"ko-KR\">창출을</span> <span lang=\"ko-KR\">통한</span> <span lang=\"ko-KR\">성장이</span> <span lang=\"ko-KR\">먼저다</span>.</p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">기술은<span lang=\"en-US\"> </span>기본이다<span lang=\"en-US\">.</span></p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">선도자의<span lang=\"en-US\"> </span>법칙<span lang=\"en-US\">? </span>결국<span lang=\"en-US\"> </span>승자독식이다<span lang=\"en-US\">.</span></p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">기존<span lang=\"en-US\"> </span>네트워크를<span lang=\"en-US\"> </span>빌리고<span lang=\"en-US\">, </span>훔치고<span lang=\"en-US\">, </span>사와라</p>\r\n\t const CONTENT_HASH = '054d5783';

const GRID = 20, GAP = 14;
function snap(v) { return Math.round(v / GRID) * GRID; }

// ── Undo (Ctrl+Z) ────────────────────────────────────────────────────────────
const MAX_HISTORY = 50;
let history = [];
function snapshot() {
  syncText();

}
function undo() {

document.addEventListener('keydown', e => {

function pushCards(movedIdx) {

function loadBoard() {

function autoLayout() {
  const boardW = document.getElementById('board').offsetWidth;
  const cols = Math.max(1, Math.floor(boardW / 280));
  const colW = (boardW - GAP*(cols-1)) / cols;
  const colH = new Array(cols).fill(0);
  const allCards = document.querySelectorAll('.card');
  const images = document.querySelectorAll('.card img');
  let loaded = 0;
  function place() {
    allCards.forEach((el, i) => {
      const w = Math.min(cards[i].w || colW, colW);
      let minCol = 0;
      for (let c = 1; c < cols; c++) if (colH[c] < colH[minCol]) minCol = c;
      cards[i].x = minCol * (colW + GAP);
      cards[i].y = colH[minCol];
      cards[i].w = w;
      el.style.left = cards[i].x + 'px';
      el.style.top = cards[i].y + 'px';
      el.style.width = w + 'px';
      colH[minCol] = cards[i].y + el.offsetHeight + GAP;
    });
    document.getElementById('board').style.minHeight = (Math.max(...colH) + 100) + 'px';
    saveBoard();
  }
  if (!images.length) { requestAnimationFrame(place); return; }
  images.forEach(img => {
    if (img.complete) { loaded++; if (loaded >= images.length) requestAnimationFrame(place); }
    else { img.onload = img.onerror = () => { loaded++; if (loaded >= images.length) requestAnimationFrame(place); }; }
  });
}

function renderCards() {

      selectedIdx = i; el.classList.add('selected');

    delBtn.onclick = e => { e.stopPropagation(); if(confirm('삭제?')) { snapshot(); cards.splice(i,1); renderCards(); saveBoard(); } };
    actions.appendChild(delBtn); el.appendChild(actions);
    if (card.type === 'text') {

    } else if (card.type === 'image') {

      img.alt = ''; img.loading = 'lazy'; img.onerror = () => img.style.display = 'none';
      if (card.w) img.style.width = card.w + 'px';
      if (card.h) img.style.height = card.h + 'px';
      if (card.link) { const a = document.createElement('a'); a.href = card.link; a.target = '_blank'; a.appendChild(img); el.appendChild(a); }
      else { el.appendChild(img); }
      if (card.caption) { const cap = document.createElement('div'); cap.style.cssText = 'font-size:11px;color:#8b949e;margin-top:4px;word-break:break-word;padding:0 2px;'; cap.textContent = card.caption; el.appendChild(cap); }
    } else if (card.type === 'html') {
      const wrapper = document.createElement('div');
      wrapper.style.cssText = 'overflow:auto;font-size:13px;line-height:1.5;';
      wrapper.innerHTML = card.html.replace(/__ATTACHMENT__/g, IMG_BASE);
      wrapper.querySelectorAll('img').forEach(img => { img.style.maxWidth = '100%'; img.style.height = 'auto'; img.draggable = false; });
      wrapper.querySelectorAll('a').forEach(a => { a.target = '_blank'; a.style.color = '#6cb0f6'; });
      wrapper.querySelectorAll('table').forEach(t => { t.style.borderCollapse = 'collapse'; });
      wrapper.querySelectorAll('td,th').forEach(td => {
        td.style.border = '1px solid #444'; td.style.padding = '4px 6px'; td.style.verticalAlign = 'top';
        td.title = '더블클릭으로 편집';
        td.addEventListener('dblclick', function(e) {
          e.stopPropagation();
          snapshot();
          this.contentEditable = 'true';
          this.style.outline = '2px solid #388bfd';
          this.style.background = 'rgba(56,139,253,0.08)';
          this.focus();
        });
        td.addEventListener('blur', function() {
          this.contentEditable = 'false';
          this.style.outline = '';
          this.style.background = '';
          cards[i].html = wrapper.innerHTML.split(IMG_BASE).join('__ATTACHMENT__');
          saveBoard();
        });
      });
      el.appendChild(wrapper);
    } else if (card.type === 'table') {
      const rows = card.rows || [['','',''],['','',''],['','','']];
      const tbl = document.createElement('table');
      tbl.style.cssText = 'border-collapse:collapse;width:100%;font-size:13px;';
      rows.forEach((row, ri) => {
        const tr = tbl.insertRow();
        row.forEach((cell, ci) => {
          const td = document.createElement(ri === 0 ? 'th' : 'td');
          td.contentEditable = true;
          td.style.cssText = 'border:1px solid #30363d;padding:4px 8px;min-width:60px;text-align:left;' + (ri===0 ? 'background:#21262d;font-weight:600;' : '');
          td.textContent = cell;
          td.addEventListener('blur', () => { if (!cards[i].rows) cards[i].rows = rows; rows[ri][ci] = td.textContent; saveBoard(); });
          tr.appendChild(td);
        });
      });
      el.appendChild(tbl);
      const addRow = document.createElement('button');
      addRow.textContent = '+ 행'; addRow.style.cssText = 'margin-top:4px;font-size:11px;background:#21262d;border:1px solid #30363d;color:#8b949e;padding:2px 8px;border-radius:4px;cursor:pointer;';
      addRow.onclick = e => { e.stopPropagation(); snapshot(); if (!cards[i].rows) cards[i].rows = rows; cards[i].rows.push(new Array(cards[i].rows[0].length).fill('')); renderCards(); saveBoard(); };
      const addCol = document.createElement('button');
      addCol.textContent = '+ 열'; addCol.style.cssText = 'margin-top:4px;margin-left:4px;font-size:11px;background:#21262d;border:1px solid #30363d;color:#8b949e;padding:2px 8px;border-radius:4px;cursor:pointer;';
      addCol.onclick = e => { e.stopPropagation(); snapshot(); if (!cards[i].rows) cards[i].rows = rows; cards[i].rows.forEach(r => r.push('')); renderCards(); saveBoard(); };
      el.appendChild(addRow); el.appendChild(addCol);
    }
    const rh = document.createElement('div'); rh.className = 'resize-handle';
    rh.addEventListener('mousedown', e => { e.preventDefault(); e.stopPropagation(); snapshot(); resizing = { idx: i, startX: e.clientX, startW: card.w || el.offsetWidth }; });
    el.appendChild(rh);
    if (i === selectedIdx) el.classList.add('selected');
    board.appendChild(el);
  });
  requestAnimationFrame(() => {
    let maxB = 0;
    document.querySelectorAll('.card').forEach(el => { const b = (parseFloat(el.style.top)||0) + el.offsetHeight; if (b > maxB) maxB = b; });
    board.style.minHeight = (maxB + 100) + 'px';
  });
}

document.addEventListener('mousemove', e => {
  if (moving) {
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`); if (!el) return;
    let nx = moving.origX + e.clientX - moving.startX, ny = moving.origY + e.clientY - moving.startY;
    if (e.shiftKey) { nx = snap(nx); ny = snap(ny); el.style.outline = '1px dashed rgba(240,192,64,0.3)'; } else { el.style.outline = ''; }
    el.style.left = nx + 'px'; el.style.top = ny + 'px';
  }
  if (resizing) {
    let nw = resizing.startW + e.clientX - resizing.startX; if (e.shiftKey) nw = snap(nw);
    cards[resizing.idx].w = Math.max(100, nw);
    const el = document.querySelector(`.card[data-idx="${resizing.idx}"]`); if (el) el.style.width = cards[resizing.idx].w + 'px';
  }
});

document.addEventListener('mouseup', e => {
  if (moving) {
    let nx = moving.origX + e.clientX - moving.startX, ny = moving.origY + e.clientY - moving.startY;
    if (e.shiftKey) { nx = snap(nx); ny = snap(ny); }
    cards[moving.idx].x = Math.max(0, nx); cards[moving.idx].y = Math.max(0, ny);
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`); if (el) { el.classList.remove('moving'); el.style.outline = ''; }
    if (e.shiftKey) pushCards(moving.idx);
    moving = null; saveBoard();
  }
  if (resizing) { if (e.shiftKey) pushCards(resizing.idx); resizing = null; saveBoard(); }
});

function addTextCard() { snapshot(); cards.push({ type: 'text', content: '', x: 50, y: window.scrollY+100, w: 300 }); renderCards(); setTimeout(() => { const els = document.querySelectorAll('.card .text'); els[els.length-1]?.focus(); }, 100); }
function addImageCard() { const input = document.createElement('input'); input.type = 'file'; input.accept = 'image/*'; input.onchange = e => { const f = e.target.files[0]; if (!f) return; const r = new FileReader(); r.onload = () => { snapshot(); cards.push({ type: 'image', src: r.result, x: 50, y: window.scrollY+100, w: 240 }); renderCards(); saveBoard(); }; r.readAsDataURL(f); }; input.click(); }
function addImageUrl() { const url = prompt('이미지 URL'); if (!url) return; snapshot(); cards.push({ type: 'image', src: url, x: 50, y: window.scrollY+100, w: 240 }); renderCards(); saveBoard(); }
function addTableCard() {
  const colsStr = prompt('열 수 (기본 3)', '3'); const cols = Math.max(1, parseInt(colsStr)||3);
  const rowsStr = prompt('행 수 (헤더 포함, 기본 4)', '4'); const rows = Math.max(1, parseInt(rowsStr)||4);
  snapshot();
  cards.push({ type: 'table', rows: Array.from({length: rows}, (_, ri) => Array.from({length: cols}, (_, ci) => ri===0 ? `열${ci+1}` : '')), x: 50, y: window.scrollY+100, w: Math.max(240, cols*100) });
  renderCards(); saveBoard();
}
function exportBoard() { syncText(); const blob = new Blob([JSON.stringify(cards, null, 2)], { type: 'application/json' }); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = SAVE_KEY + '.json'; a.click(); }
// ── Zoom ─────────────────────────────────────────────────────────────────────
let zoom = parseFloat(localStorage.getItem('zoom-' + SAVE_KEY) || '1.0');
function applyZoom() {
  const board = document.getElementById('board');
  board.style.transform = `scale(${zoom})`;
  board.style.transformOrigin = '0 0';
  document.getElementById('zoom-level').textContent = Math.round(zoom * 100) + '%';
  localStorage.setItem('zoom-' + SAVE_KEY, zoom);
}
function zoomIn()  { zoom = Math.min(3.0, parseFloat((zoom + 0.1).toFixed(2))); applyZoom(); }
function zoomOut() { zoom = Math.max(0.2, parseFloat((zoom - 0.1).toFixed(2))); applyZoom(); }
document.addEventListener('keydown', e => {
  if (e.ctrlKey || e.metaKey) {
    if (e.key === '=' || e.key === '+') { e.preventDefault(); zoomIn(); }
    if (e.key === '-')                  { e.preventDefault(); zoomOut(); }
    if (e.key === '0')                  { e.preventDefault(); zoom = 1.0; applyZoom(); }
  }
});
document.getElementById('board').addEventListener('wheel', e => {
  if (!(e.ctrlKey || e.metaKey)) return;
  e.preventDefault();
  e.deltaY < 0 ? zoomIn() : zoomOut();
}, { passive: false });
applyZoom();
function resetLayout() { if (!confirm('자동 재배치합니다.')) return; cards.forEach(c => { delete c.x; delete c.y; }); renderCards(); autoLayout(); }
// ── Floating format toolbar ───────────────────────────────────────────────────
const fmtBar = document.getElementById('format-toolbar');
function fmt(cmd) { document.execCommand(cmd, false, null); saveBoard(); }
function fmtLink() {
  const sel = window.getSelection();
  if (!sel || sel.isCollapsed) return;
  const url = prompt('링크 URL 입력', 'https://');
  if (!url) return;
  document.execCommand('createLink', false, url);
  // make links open in new tab
  sel.anchorNode?.parentElement?.closest('a')?.setAttribute('target', '_blank');
  document.querySelectorAll('.text a').forEach(a => a.target = '_blank');
  saveBoard();
}

// prevent format buttons from blurring contenteditable
fmtBar.addEventListener('mousedown', e => e.preventDefault());

document.addEventListener('selectionchange', () => {
  const sel = window.getSelection();
  if (!sel || sel.isCollapsed || !sel.toString().trim()) { fmtBar.style.display = 'none'; return; }
  // only show if selection is inside a .text element
  const anchor = sel.anchorNode;
  if (!anchor) { fmtBar.style.display = 'none'; return; }
  const textEl = anchor.nodeType === 1 ? anchor.closest('.text') : anchor.parentElement?.closest('.text');
  if (!textEl) { fmtBar.style.display = 'none'; return; }
  // position above selection
  const range = sel.getRangeAt(0);
  const rect = range.getBoundingClientRect();
  fmtBar.style.display = 'flex';
  const tbW = fmtBar.offsetWidth || 180;
  let left = rect.left + rect.width / 2 - tbW / 2;
  left = Math.max(8, Math.min(left, window.innerWidth - tbW - 8));
  fmtBar.style.left = left + 'px';
  fmtBar.style.top = (rect.top - 44 + window.scrollY) + 'px';
});

setInterval(saveBoard, 30000);
loadBoard();
</script>
</body>
</html>
