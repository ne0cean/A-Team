  {

    "w": 600,
    "content": "음악은 이미 음향 그 이상이다.\n가장 오래된 인류의 킬러 컨텐츠이자 최초의 미디어 역할을 수행.\n플랫폼이 된다.\n음원을 유통하는 채널에 국한되는 것이 아닌 뮤지션과 고객을 연결하는 매개.\n뮤지션에게는 정당한 수익배분은 물론 마케팅 채널이 되어주어야 한다. 팬들과의 소통창구. 블록체인 기술 활용. 사운드클라우드 파산 사례 참고.\n고객에게는 음원을 넘어 뮤지션의 스토리, 장르의 계보와 역사를 탐험 할 수 있는 위키트리. 나 같이 음악에 조예가 깊지 않은 사람도 쉽게 알아갈 수 있는 커뮤니티\n우리는 뭘 얻느냐,\n음악산업을 먹는다.\nSK요금제만 가입하면 막대한 음원과 관련 콘텐츠에 엑세스 할 수 있게 해준다.\n고객들의 음악 취향데이터\n공연도 팔고 버스킹도 팔고\n누구든 음원과 영상을 올리고 가수가 된다. 동네가수.\n니치 포커스. 스트릿 가수들.\n[준영,] [오전 1:49] 누가 돈을 내는가? 스폰서 스타리밍\n[준영,] [오전 1:50] 스폰서가 뮤지션에게 음원에대한 대가 지급\n[준영,] [오전 1:51] 음원에 광고를 넣거나 음원자체 ppl\n[준영,] [오전 7:44] 음악산업의 진화, 혹은 실수 - <a href=\"https://brunch.co.kr/@ken1224/55\">https://brunch.co.kr/@ken1224/55</a>\n[준영,] [오전 7:47] 창작자 죽이고 유통사만 사는 음악 산업 | 한국경제 매거진 - <a href=\"http://magazine.hankyung.com/business/apps/news?popup=0&nid=01&nkey=2015122201047000231&mode=sub_view\">http://magazine.hankyung.com/business/apps/news?popup=0&nid=01&nkey=2015122201047000231&mode=sub_view</a>\n[준영,] [오전 7:59] 사운드클라우드가 파산 위험에 처한 이유 | OUTSTANDING - <a href=\"http://outstanding.kr/soundcloud20170726/\">http://outstanding.kr/soundcloud20170726/</a>\n블록체인 <a href=\"https://brunch.co.kr/@nsung/36\">https://brunch.co.kr/@nsung/36</a>\n<a href=\"https://0rok.com/2215\">https://0rok.com/2215</a>\n<a href=\"http://imnews.imbc.com/n_newssas/n_inside/4338548_16711.html\">http://imnews.imbc.com/n_newssas/n_inside/4338548_16711.html</a>\n=======================================\n국내 음원 시장\n멜론은 지난달 모바일 월 이용자 수 480만명을 기록하며 선두를 지켰다. 음원시장 점유율도 멜론이 50%를 넘을 것으로 추정된다.\n2위는 KT 자회사인 지니뮤직의 지니였다. 월 이용자수는 164만명으로 멜론의 3분의 1 수준에 불과했다.\n지니는 2014년 처음 국내 음원 시장 2위에 올라 순위를 유지하고 있다. 그러나 멜론과의 격차를 줄이는 데는 고전하고 있다. 2014년 당시 연간 방문자 수는 멜론 6338만명, 지니 2471만명으로 2.5배 이상 차이났다.\n\"지난해 국내 음원 시장 유료가입자는 약 700만명 수준으로, 이 중 57%가 멜론 이용자로 추정된다\"며 \"멜론 이용자는 가격보다 플랫폼 자체의 경쟁력 때문에 충성도가 높은 편\""
  },
  {
    "type": "text",
    "x": 936,
    "y": 115,
    "w": 565,
    "content": "고객에게, 또 뮤지션에게 음악이란 무엇인가?\n- 음원, 공연, 뮤직비디오, 안무영상, 커버영상,\n그럼, SKT의 음악 서비스는 무엇이어야 하는가?\n<a href=\"http://www.nocutnews.co.kr/news/4640745\">애플뮤직</a>, 스포티파이, 유튜브레드, 넷플릭스, 아마존 프라임, 코스트코\n결국 킬링/힐링타임에 대한 점유율의 싸움. 미디어, 인터넷, 게임과의 싸움.\n결국, 음원소비자들이 아니라\n음원 공급자들, 뮤지션들을 먼저 열광하게 해야 한다.\n음악에 조예가 깊지 않지만, 음악을 즐기는 사람들에게\n음악에 대한 정보를 제공?\n미디어처럼 음향이 아닌 보이는 컨텐츠 중심의 구성\n음악캠프처럼 시청률 높았던 프로그램\n가수별 채널 배부\n한줄 :  (뮤지션 Side) 음원과 영상의 오픈마켓. 인디음악가 소셜 펀딩기능\n(고객 Side) 멜론이 아닌, 음악 유튜뷰. 듣는 음악에서 보는 음악으로. 뮤지션 뿐만 아니라 모든 창작자로 확대. 아티스트들을 실시간으로 만날 수 있는 채널.\nprosumer\n판매 수수료 수익이 아니라, 다른 걸로 수익을 얻어야함.\n광고? 다른 컨텐츠 판매 수익?\n비즈니스 캔버스 그려보자.\n==============\n?\nSKT가 음악 서비스를 만든다?\nSKT가 음악 서비스를 다시 만든다?\n지금 우리에게 필요한 건 제 2의 멜론인가?\n아니, 제 2의 멜론이어야 하나?\n왜? 1. 코어 MNO비즈 강화? 2. 새로운 수익 사업?\n그럼 어떤 음악 서비스 여야하나?\n멜론2? 벅스, 지니 등과 비슷하거나 조금 더 나은?\n판을 바꿔야 한다. (우리는 기존 음악플랫폼들의 BM이 필요 없다. 목적이 다르니까)\n결자해지.\n우리가 만든 것(멜론)을 파괴하지 않고서는 한 발짝 앞으로 나가는 것도 녹록치 않을 것이다.\n1. 음악산업에는 엄청난 거품이, 영화산업 비교\n와비파커, 달러쉐이브클럽. 기존 산업에 낀 거품을 공격.\n\"음원 수익이 창작자에게 제대로 돌아가지 않는 구조\" 고질적인 문제\n플랫폼 사업자가 거두는 수수료 - 우리에게도 필요한가?\n2. 헤게모니를 쥐고 있는 것은 '음원' 유통권\n포매맷으의 진화 보는 음악\nasmr도, 팟캐스트가 되는거야\n그럼 음원이 아닌 다른 것으로 싸우면 어떤가? 뮤직비디오나 비디오 클립으로?\n내한하지 않은 가수의 음악을, 티켓을 구하지 못해 '보지' 못한 공연을, 콘서트 현장의 감동을 다시 느끼고 싶은 팬들을 위해 우리는 영상을 제공해야 한다. VR은 어떤가.\n지금의 음원유통 구조는 물리적 실체가 있는 LP, 테이프, CD 를 유통하던 시절에 형성되어 고착화된 구조다. 다운로드에서 또 스트리밍으로 넘어가는 현 음원 유통 구조에서 이러한 프레임을 가져갈 하등의 이유가 없다.\n결국, 우리에게 필요한것 (목적)은 음악 서비스 이용 트래픽 아닌가?\n그 트래픽으로 MNO에 고객들을 유착시키는 것.\nSP, CP의를 거치지 않고 수요자와 공급자를 바로 연결하는 음원/미디어 플랫폼이 된다.\n수요자 언맷니즈/페인포인트 3개씩\n- 페인포인트 : 새로운음악을 찾는 방식,\n- 인스타에 자랑 가능한 컨텐츠 - 친구와 죽여주는 음악에 대한 이야기를 할 수 있게\n-\n공급자 언멧니즈/페인포인트 3개씩\n- 팔기어렵다. 언더, 인디 뮤지션은 특히 자기 음악을 알릴 채널과 마케팅이 약하다\n소셜펀딩으로 공연할 수 있도록 아마츄어 뮤지션 펀딩 지원\n- 돈이 안된다. 저작권 수수료 구조가 취약하다.\n- DJ들의 리믹스 저작권 문제 해결\n아티스트들이 돈을 벌게 해주자. 그럼 그들이 올 것이다.\n단, 한국의 '기획사'라는 시스템 특성상 케이팝은\n아직 레이블이 헤게모니를 쥐고 있다. 이들은 다르게 접근해야 한다.\n기계학습이 제공하는 추천 알고리즘은 - 사람들의 자신의 취향(편향)안에 갇히게 할 것이다 어제와 유사한, 비슷한, 좋아할 것 같은 음악들의 반복에 가둘 것이다. 이따금 사람들은 이에 실증을 낼 것이다. 그래서 DJ가 필요하다. 세렌디피티의 즐거움을 위해. 죽여주는 곡을 추천해줄 형, 오빠, 친구가 필요하다. 서태지가 알고리즘이 추천한 곡만 들을 수 있었다면, '컴백홈'은 나올 수 없었을 것이다. DJ란 아티스트들과 팬들에게 매일 사건과도 같은 '뉴스'를 들려주는 앵커이자 아나운서다.\n그래서 어떤 회사들을 사야할지도 리스트업\n온라인 버스킹 : 라이브 공연에 모자에 동전 던져넣는 것 구현해야 있게해야.\n공급자 : 가수(밴드, MC), 연주자, 큐레이터(DJ),\n음악 하는 방법 : 앨범발매, 공연\n음악을 저장해서 듣다가 - 전송받아서 듣는 방식으로 넘어감\n앨범에서 - 플레이 리스트의 시대로 앨범이 파편화됨.\n대신, 새롭게 그것을 꿰어내는 DJ의 역할이 커졌다고 볼 수 있다.\n그러니까, 믹스테이프=플레이리스트\n오늘날의 음악가들은 단지 소리로만 자신을 표현하지 않는다.\n영상, 퍼포먼스, 설치미술...\n마치 페이스북의 자회사처럼 페북과 인스타에 자연스럽게 연동되어야한다.\n자신의 사연/편지/이야기가 우리 플랫폼에 올라오고, 다른 더 많은 반응이 피드백되며,\n그로 인해 다른 사람들에게 우리 서비스를 들으라고 추천할 수 있어야 한다. 즉, 시청자가 참여할 수 있는 공간을 열어둬야 한다. 아티스트와의 소통이든, 자신이 만든 플레이 리스트와 사연이든,\n아이팟 셔플, lcd를 없애고, 플레이리스트처럼 흐르는대로 듣고,\n빌려듣는건 어때? 그리고 맘에드는건 구매. 와비파커 처럼 한번 써보는(들어보는 거야)\n그리고 원하는 음악을 사는거지.\n전략 포인트1. 수요자 공급자 바로 연결 (블록체인) (경쟁의 외연) 음원 서비스의 우버, 에어비앤비\n전략 포인트2. 음원에서 벗어나 미디어로써의 '보는 음악'으로 확장한다. (경쟁의 방식)\n전략 포인트3. 큐레이션 - 인공지능과 DJ\n공짜 음원 / 유료 음원 / 스폰서 음원(제휴사 서비스, 제품 구매 대가로 음원 서비스 이용) / AD음원, 음원 채굴, 음원을 많이 구매할 수록 다른 음원을 저렴하게 구매 가능한 구조는?\n음원 싸움에서 뮤직 클립으로 싸움의 양상을 바꿔가야 한다. 아티스트가 원하면 실시간 방송을 바로 하기도 하고… 이렇게 되면 광고도 자유롭게 가능해진다.\n다운로드 옵션 없이, 스트리밍만 운영하되 스트리밍에 소모되는 데이터 비용 완전 무료.\n▶ 다운 스트리밍, 개인의 서버(포켓)에 다운받은 음악을 재생한다.는 개념으로 포지셔닝\n매장음악 수요 충족시키기 위해서 PC버전도 빠르게 만들어야함.\n전화를 걸면 음악/ 공연에 연결되게? 우리의 지배력을 일시에 확산할 방법은?\n가입자. 네트워크 효과 측면에서, 요금제로 만들어야.\n블록체인 활용 - 자기가 구입한 앨범을 친구에게 빌려주면 경제적 이익이 저작권자와 개인에게 돌아가도록?\n스티브잡스(애플)은 음악을 사랑한다면서 그 사랑한느 것들 99센트로 만들어버렸다. 라떼 한잔 값이란다. 우리는 우리가 사랑하는 것이 값싼 취급을 받길 원하지 않는다.\n나는 내가 사랑하는 뮤지션이 생활고에 시달리기를 원치 않는다.\n나는 내 귀와 영혼을 위해 내 뮤지션이 고통받기를, 내 뮤지션을 착취하기를 원치 않는다.\n아이리버에서 LG에서 만든 하이파이 그거 만들 수 없나?\n언캐리어, 언썸띵 전략\nAlt +\nKnife - 멜론을 쪼개 먹겠다. 멜론 버스터. 멜론 \"Life for my artist\" 고객들은 muze라 칭한다.\n창작자 약탈적인 구조, 내 가수에게 생활을! 캠페인.\n바른음악협동조합처럼 창작자들 스스로 조직화해 독점 구조에 맞선 유통 구조를 마련해야 한다.\n발굴 큐레이션, 누군가 큐레이션해서 다른 누군가가 듣게되면 그에 대한 보상을 발굴자에게 주는 보상 시스템, 스팀잇 벤치마킹\n프로듀스101을 우리 플랫폼에서 한다면 우리와 팬들이 곧 기획사가 된다.\n아티스트별 굿즈 판매, 아티스트 후원\n라디오앱 스푼,\nDJ는 현대음악의 앰베서더이자 에반젤리스트\n알고리즘은 익숙한 음악을 제시한다.\n음악적 호기심과 모험을 즐기는 사람들에게는 최선이 될 수 없다.\n다른 사람의 시야와 귀를 빌려, 음악적 시야를 넓혀주는 여정이된다.\n아날로그적, 물리적인 촉감을 가진 것들에 대한 향수\nLP거래 플랫폼이 될 수는 없나? 이 것들을 디지털화 혹은, 디지털 음원을 LP나 CD로 만들어주는 서비스.\n스트리밍은 앨범의 파편화를 가져왔다. 하나의 앨범이 가진 온전한 플롯이 해체되어, 각자의 플레이 리스트로 섞여들어간다. 그것은 또 그대로 플레이 리스트 안에서 또 하나의 '맥락'과 '서사'를 만들어 낸다.\n바이닐, DJ, 음악을 사랑하는 모두를 위한. 타투, 회전하는 것, 레코드의 골,\n스트리밍으로, 범람하는 음원 가운데 오히려 누군가의 큐레이션에 대한 니즈는 더욱 커졌다.\n동시에 자신의 음악적 취향을 공유하고 동시에 인정받고자 하는 욕구는. 과거로부터 늘 존재해왔다. 그 최전선에 있는 사람들이 바로 DJ들이다.\n아티스트들의 아고라\n음악경연대회 주최 및 운영\n스튜디오 운영\nDJ가 바이닐 형태의 물리적인 앨범을 낼 수 있도록, 블록체인으로 지원.\n배철수 섭외\n음원 서비스가 아니라, 음악 소셜 미디어 비즈니스를 해야한다.\n여타 SNS의 텍스트, 사진, 동영상이 음악과 뮤비, 아티스트의 방송과 공연이 되는 것이다.\n단순히 음원을 들려주는 것으로는 충분치 않다.\n음악을 찾고 공유하며, 뮤지션과 팬을 연결하고, 팬과 팬을, 플레이리스트와 다른 플레이리스트가 연결될 수 있도록 해야 한다.\n음악MD, 에디터 조직을 운영해야 한다.\n물리학자들이 '시간'과 '공간'이 서로 분절된 실체가 아닌 '시공간'임을 밝혀냈듯,\n오늘날 젊은 세대에게 '음악'과 '영상'은 하나다. 그것을 우리는 미디어라 부른다.\n미국 록 밴드&#160;<a href=\"https://www.youtube.com/watch?v=dTAAsCNK7RA\" style=\"font-family:Noto Sans KR;font-size:13.5pt;background-color:white\">OK Go가 유튜브</a>에서 터졌고.\n1990년대생들은 주로 스트리밍으로 음악을 듣던 세대라서 시대별로, 계보에 따라 음악을 감상하지도 않아요. 그래서 예상 못한 레퍼런스의 조합이 나오기도 하고, 이들이 만드는 음악의 장르를 명확히 정의하기도 힘들어요. 이건 전 세계적인 흐름이기도 하고, 메인스트림에서도 보편적 현상인 것 같아요.\n이제는 앨범이라는 형태로 아티스트가 제시하는 서사와 맥락이 아닌\n플레이리스트라는 형태로 자신만의 맥락과 서사를 재구성한다.\n음악의 기본 소비 단위가 명확하지 않다는 거예요. 예전에는 간단했는데. 지금은 (스트리밍 서비스의) 요금제가 다양하고 통계도 내기 어려우니, 어디에서 얼마나 수익이 났는지 몰라요. 그래서 공연 단위로 보는 거죠. 그나마 그게 측정 가능한 단위니까. 업계에서는 배분율이나 음원 가격이 이슈가 되는데,&#160;스트리밍 서비스에 대한 제 입장은,&#160;'수익 배분율보다는 데이터 공유가 중요하다'예요.&#160;\n굳이 따지면 넷플릭스? (웃음) 혹은, 음악 이외의 다른 콘텐츠들. 최대의 경쟁 상대는 스마트폰이죠. 초기에는 이걸로 할 수 있는 게 음악 듣는 것뿐이었는데, 저도 지금은 스마트폰으로 음악 듣다가 이것저것 하거든요. 붕가붕가레코드의 음악은 결국 미디어랑 경쟁하거나, 게임과 경쟁\n아카이빙(소유)에서 플레이리스트(순간)\nYOLO 휘발가치, 뮤직 레이크\n소유의 시대에는 기회비용이 존재했다.\n스트리밍은 월정액(종량제)로 시간만 투입하면\n얼마든지 음악을 들을 수 있다. 이렇게 음악이 넘쳐나도 사람들의 음악에 대한 편향성은 더 높아졌다. 다기망양. 사람들에게는 목자가 필요하다.\n애플뮤직 소개동영상에 등장한 트렌트 레즈너 Trent Reznor(록그룹 나인 인치 네일스 Nine inch Nails의 리더)가 언급한 '존중과 발견', 뮤지션과 음악, 그리고 예술에 대한 존중을 뜻한다.\n내 뮤지션과 하이파이브, 지원하고 백업하고, 손바닥을 보인다.\n스트리밍은 기본적으로 회전초밥이다.\n컨베이어 벨트 위를 흐르는 수 많은 음악들 중에서 고른 음악을 내 접시(플레이리스트)위에 담는다.\n다양한 기기에서 재생되는 확장성, TV, 크롬캐스트, 사운드 링크,\n음원 재생 서비스가 아니라, 음악 전문 넷플릭스가 되어야 한다.\n시간점유율로 다른 책, 게임, SNS를 이겨야 한다. 혹은 품어야 한다.\n========================\nLegacy T벨링, SM, T맵 뮤직? 과 연계\n- 사람들이 차 안에서 (운전 다음으로) 가장 많이 하는 활동은 음악을 듣는 것이다.\n========================\n#1. 영국의 팝스타 아델이 11월 20일 새 앨범 ‘25’를 발표했다. 새 음반은 발매 1주일 만에 338만 장이 팔렸다. 팝 음악 역사상 가장 빠른 기록이다. 아델은 이번 앨범의 유통 방식으로 CD와 다운로드만 고집했다. 음원 유통의 대세로 자리 잡은 스트리밍 방식을 철저히 배제한 것. 창작자들에겐 터무니없게만 느껴지던 수익 배분 방식에 대한 아티스트의 반격이었다.&#160;\n#2. 얼마 전 케이블 TV의 오디션 프로그램 ‘슈퍼스타 K7’에 출연해 스타덤에 오른 ‘중식이 밴드’. 중식이 밴드가 한창 인기를 얻던 지난 8월 한 달간, 멜론이나 지니 같은 음원 유통 사이트에서 이들의 노래를 들은 사람의 수는 무려 25만2369명에 달했다. 같은 기간 이들이 벌어들인 음원 수익은 얼마일까. 45만5000원이다.\n2013년 이후 문화체육관광부가 법으로 정한 저작권료 분배 비율은 유통사 40%, 제작사 44%, 저작권자 10%, 실연자 6%다. 노래 1곡당 7.2원인 전체 저작권료 중 2.88원을 유통사가 챙기고 3.16원을 제작사가, 우리가 흔히 뮤지션이라고 부르며 돈을 제일 많이 벌 것 같은 가수는 0.43원을 받는다. 그나마 세션이라고 부르는 연주자나 코러스에게 절반을 떼어주면 실제로 가수에게 돌아가는 돈은 0.21원으로 뚝 떨어진다. 1곡이 5번은 스트리밍돼야 겨우 100원 정도를 버는 셈\n문화체육관광부는 지난 12월 16일 ‘음원 전송 사용료 개선 방안’을 발표했다. 3.6원인 월정액 스트리밍의 저작권료를 4.2원으로 인상하고 다운로드도 곡당 360원에서 490원으로 올린다는 방침이다. 다만 40 대 44 대 10 대 6의 기존 권리자 수익 배분 비율은 바뀌지 않았다.&#160;\n노래 1곡당 지금까지 가수가 0.21원을 받았다는 사실에 놀라기엔 아직 이르다. 더 큰 문제는 엄청난 할인율이다. 현재 음원을 유통하는 대부분의 서비스 업체는 ‘묶음형 할인 상품’을 판매하고 있다. ‘다운로드 30~100곡’과 ‘월정액제 스트리밍’을 묶어 파는 식이다. 이럴 경우 저작권료 단가는 1곡당 3.6원에서 1.8원으로 뚝 떨어진다. 뮤지션이 받는 돈은 0.18원에 불과하다.&#160;\n유통사가 배급사를 겸하고 있는 산업구조도 한국에서만 볼 수 있는 기형적인 시스템이다. 멜론&#183;지니&#183;엠넷&#183;벅스 등 대형 유통사는 음원 유통뿐만 아니라 배급도 같이 한다. 예를 들어 멜론이 배급과 유통에 나선 가수 A가 있다고 치자. 멜론 입장에선 A의 노래가 많이 다운로드되고 스트리밍될수록 수익이 커진다. 멜론의 홈페이지나 모바일 첫 화면에 ‘추천곡’으로 A의 노래를 올려놓는 것이 양심이나 상도덕에 어긋날지도 모르지만 현실은 그렇지 않다.&#160;\n멜론을 소유한 로엔엔터테인먼트(이하 로엔)는 음원 제작까지 하고 있다. 요즘 인기 있는 아이유의 소속사가 바로 로엔이다. 로엔이 제작한 아이유의 신곡이 멜론의 추천곡에 오르면 순식간에 실시간 차트를 점령하고 이는 고스란히 멜론, 즉 로엔의 수익으로 돌아온다.&#160;\n<a href=\"http://tenasia.hankyung.com/archives/1296814\">http://tenasia.hankyung.com/archives/1296814</a>\n즉, 아이유가 음원을 몇 시에 공개하든지 멜론은 이걸 밀어줄 수 있다는 이야기\n인디뮤지션 달빛요정역전만루홈런은 “1년에 1천만원만 벌 수 있으면 음악을 계속하겠다”고 말했다. 그는 2010년 가을, 뇌출혈로 사망했다.\n분배율보다 시급한 건 종량제 상품의 폐지. 근데 사람들은 이게 편할텐데….\n프레임을 바꿔야한다. 앨범판매?로 회귀?\nA: 저작권협회에 등록되지 않은 곡도 유통이 가능합니다. 그러나 이 경우 저작권협회로 부터 저작인접권료를 정산 받지 못하게 됩니다.\n딴지그룹은 2월 말 한 곡당 600원씩 앨범 단위로만 음원을 살 수 있는 딴지뮤직을 시작했다. 모토는 ‘재주는 곰이 부리고 돈도 곰이 번다!’이다. 앨범은 매달 추천 음악식으로 올라온다. 뮤지션에게 수익금의 100%를 정산해주고 100회 다운로드가 되면 공연도 열겠다는 공언도 했다. 90회가량 다운로드된 앨범이 4~5건으로 아직 공연이 이루어지진 않았다. 김진 딴지뮤직 총괄 담당은 “꾸준히 이용자가 늘어나고 있다. 곡당 몇원짜리 음원이 있는데도 이런 음악을 다운로드받는 사람들이 있다는 것을 확인했다”고 말한다. 붕가붕레코드의 고건혁 대표는 “딴지뮤직 시도가 아직 시장에 크게 임팩트를 주지는 않았다. 그런데 실제로 정산을 받아볼 때면 놀란다. 소수지만 제값을 내는 사람들이 있으면 어떤 일이 벌어지는지를 실감했다”고 말한다.\n음원계의 모노클?\n결자해지.\n<a href=\"https://brunch.co.kr/@audiotech/34\">https://brunch.co.kr/@audiotech/34</a>\nCP와 SP를 걷어내고 그들 몫의 수수료 중 일부를 음원가격 할인에, 일부를 창작자에게 돌려준다. ICT 기술을 활용해서 음원을 직접 사이트에 업로드 하고, 마케팅도 할 수 있게 한다.\n[기타 아이디어]\n아이리버이용해서 하이파이 모듈제공?\n해외음악이나 라디오 기능\n뮤직 레이크 기능\n- 하루 한번 추천 곡 리스트 업데이트, 다음날 바뀌는\n스포티파이 제휴?\n가족 스트리밍\nㅇ 목표 : 1명의 유저가 하루에 3번 이상 접속하는 비율이 높은 서비스\n시간 점유율\n뮤지션들의 니즈를 충족시켜주는 플랫폼\n\n나의 음악을 알린다\nDJ, 새로운 음악을 찾는다"

    "content": "소비자들이 음원을 불법다운로드하고 공유하는 문제를 법적으로 차단시키고 이를 저렴한 음원 소비로 끌어들이는 과정에서 가격을 다시 정상으로 회복시키는데는 소홀했다는 것이다.\n국내 업체들이 애플뮤직 못지 않은 훌륭한 서비스를 제공하고 있지만 오랫동안 '다운로드+스트리밍' 패키지 상품을 주력으로 내놓고 있는 것도 다운로드 매출이 더 높기 때문이다.\n이미 스트리밍 횟수가 다운로드 수를 크게 앞질러 국내 서비스 이용자의 상당수가 스트리밍 서비스로 갈아타고 있지만 국내 업체들이 음원 유통권을 무기로 매출하락을 지켜보기만 하지 않는다는 것이다.\n========================\n음원 판매 구조와 유통사가 하는 일\n가수+기획사 → 음원 유통사 → 음원 사이트 → 소비자\n각 기획사와 공급 계약을 맺은 음원 유통사는 매일 쏟아지는 음원들을 벅스, 멜론, 소리바다 같은 사이트로 공급하게 된다. 일종의 도매상 같은 개념\n현재 주요 음원 유통사로는 로엔(멜론), kt뮤직(지니), CJ E&M 뮤직(엠넷), NHN벅스(벅스) 등 개별 음원 사이트도 함께 운영 중인 대형 업체들을 비롯해서 인터파크, 블렌딩(SBS-MBC 합작법인), 뮤직앤뉴, 미러볼뮤직 등 전문 배급 업체 등이 치열한 경쟁을 펼치고 있다. 워너뮤직, 소니뮤직 같은 해외 음반사들의 국내 지사 역시 팝 음악 및 국내 가요 배급업을 병행하고 있다.\n지난 2016년 기준 연말 결산 순위 100위권 이내 음원들을 대상으로 가온차트에서 시장 점유율을 분석한 바에 따르면 < 응답하라 1988 >과 <또 오해영> 등의 tvN 드라마 OST, <쇼미더머니>, <프로듀스 101> 등 엠넷 방송 음원들의 유통을 담당한 CJ가 1위를 차지했고 드라마 OST 유통에 특화된 뮤직앤뉴가 <태양의 후예> 인기에 힘입어 4위에 이름을 올렸다. CJ 28.5% / 로엔 25.1% / KT뮤직 21.3% / 뮤직앤뉴 12.3% / 그 외 업체 순이다.\n[참조]&#160;가온차트 2016년 음악 시장 리뷰&#160;\n유통사 배제한 기획사(가수)-음원 사이트간 직거래는 사실상 불가능\n▶ 이걸 ICT 기술로 깨야 한다. App만으로 음원을 업로드할 수 있는 직거래 플랫폼\n음원 유통 과정에선 각기 맺은 계약에 따라 수수료가 발생한다. 음원유통사는 이 수수료를 주된 수입원으로 삼게 되는데 혹자는 내가 가수, 기획사라면 유통사 거치지 않고 직접 음원 사이트와 거래하면 그만큼 지출 비용을 아낄 수 있지 않냐고 할 수 있겠지만, 현재 이러한 방식으론 음원 유통의 길이 사실상 막혀있다.\n즉, 유통사를 거치지 않고선 멜론, 벅스 등에서 내가 만든 음원을 판매할 수 없다. 다만 네이버 뮤직, 벅스 등이 각각 <뮤지션리그>, <Bside>라는 이름으로 기획사조차 없는 무명 인디 음악인들의 음원 직거래 판매를 위한 별도 서비스를 운영하고 있는데 아직 보편화된 거래 방식은 아니다."

    "w": 600,
    "content": "유통사업자에 지급되는 수수료율이 지나치게 높다고 밝혔다. 그는 “모바일게임 시장이 잘 되고 있지만 유통 과정에서 카카오톡 같은 새 플랫폼이 등장하며 추가 비용이 발생해 정작 개발사 수익은 크지 않다”라며 “퍼블리싱 업체를 통해 카카오톡에 입점한 모바일게임(안드로이드 기준)의 수익분배 구조를 단순화하면 게임 매출의 30%가 구글플레이, 그 나지 70% 가운데 30%는 카카오가 가져간다”라고 설명했다.\n하지만 수익분배율을 바꾸기란 쉽지 않다. 예를 들어 모바일게임에서 카카오는 시장 경쟁을 위해 꼭 거쳐야 하는 플랫폼이기 때문이다. 또한 특정 플랫폼이 지배적인 구조를 차지하면 문화 다양성에 좋지 않은 영향을 준다고 장 변호사는 설명했다. 그는 모바일게임 시장을 예로 들며 ”지배적 사업자의 트렌드에 부합하기 위해 모방이 많다”라고 지적했다. 실제 카카오게임에서 ’애니팡‘같은 캐주얼게임이 인기를 끌자 그와 비슷한 게임이 대세를 이뤘다.\n&#160;“미국 아이튠즈는 다운로드 한 곡당 0.99달러를 생산자와 서비스가 7대3으로 나누지만, 국내는 한 곡당 600원을 6대4로 나눈다”라며 “온라인 음악시장을 주도해온 멜론 등이 모회사였던 통신사 마케팅의 일환으로 사용되며 값이 더 낮아졌다”라고 지적했다. 그는 “멜론 도입 초기에 SKT의 고객 기반이 멜론을 지금 위치에 올려놨지만 멜론 역시 SKT 고객 유치를 위한 마케팅 역할을 했다”라고 밝혔다.\n<a href=\"http://www.bloter.net/archives/215554/attachment/201311\">"

  {
    "type": "text",
    "x": 48,
    "y": 2007,
    "w": 600,
    "content": "<iframe src=\"http://www.wikitree.co.kr/api/?article=310891&where=make&v=1&mode=embed&part=full&width=0&key=3ece8815d241c6e6c932e9f03ab9be8a88789e73\" id=\"WikiFrame\"  width=\"100%\" height=\"580\" frameborder=0>\n국내외 음원 수익 분배 구조의 차이를&#160;\n잘 보여주는 대표적인 가수는 '싸이' 입니다.\n한국 다운로드 약 360만 건 = 6600만 원\n미국 다운로드 약 290만 건 = 28억 원\n외국과의 비교\n우리나라는 음원 판매&#160;\n수익의 대부분을&#160;\n유통업체가 가져가며,&#160;\n뮤지션들에게는&#160;\n매우 적은 돈이 남겨집니다.&#160;\n40배 이상\n개인 vs 음원 유통사... 계약 가능 여부는 천차만별\nSM, YG, JYP 등 이른바 빅3 기획사는 공교롭게도 지니뮤직(구KT뮤직)를 통해 음반 및 음원이 유통되고 있으며 FNC, 스타쉽, 큐브 등은 로엔을 통해 공급되고 있다. 이렇듯 일정 규모 이상의 기획사들이라면 대부분 이들 대형 유통사와의 계약을 통해 음원을 대중들에게 배포, 판매하는 게 일반적이다.\n그렇다면 개인(가수) 자격으로 대형 유통사를 통해 내가 만들거나 보유한 음원을 시중에 공급할 수 있을까?\n일반적으로 유명 유통업체는 특수한 경우를 제외하면 회사가 아닌, 개인과 계약을 맺고 공급 계약을 맺어주는 일이 드문 편이다. 대부분 회사 vs 회사 계약으로만 가능하다고 보면 좋다.\n이렇다 보니 무명 가수 한 명이 직접 사업자 등록증을 발급받아 만든 소위 \"개인 1인 레이블\"들이 대형 유통사의 문턱을 넘는 것도 쉽진 않다. 보통 수익성을 담보할 수 없기 때문이다. (물론 여기서 인지도 높은 유명 가수의 1인 레이블이라면 당연히 예외다) 이럴땐 소규모 전문 유통사들의 문을 두드리는 방법이 있다.\n주로 인디 성향 음악인들의 음악만 취급하는 중소 규모 유통업체들은 이런 음악인들에게 언제나 문호가 개방된 편이어서 비록 가수 개인이 몸담은 소속사가 없더라도 음원을 이들 회사를 통해 대중들에게 전달할 수 있다. 대신 유통사마다 나름의 기준이 있기 때문에 심사 과정을 거치는 건 필수다.\n1. 음원유통 수익 배분\n&#160;-&#160;음원이 팔릴 시 : &#160;전체 수익의&#160;40%: 멜론이나 벅스 같은 유통사,&#160;44%는 제작사, 10%는 저작자(작곡&#183;작사&#183;편곡자), 나머지 6% 만이 실연자(가수&#183;연주자)\n&#160;- 스트리밍: 회당 12원 이 비용을 위의 주체들이 같은 비율로 나눕니다.&#160;\n2. 음원유통사 등록\n&#160;-&#160;음원유통사업자로 등록하기는 쉽지만 음원유통플랫폼(멜론, 엠넷, 벅스, 지니, 네이버)과 계약하는 것이 어렵습니다.\n&#160;\n&#160;Step1.&#160;사업자 등록\n&#160; &#160; &#160; &#160; &#160;- 세무서에서 사업종목에 음원유통을 추가합니다. 이것은 그냥 세무소에 가서 하면 해줍니다.(그러나 대답을 잘해야 합니다.)\n&#160; &#160; &#160; &#160; &#160;개인사업자도 가능하고, 법인사업자는 당연히 됩니다.&#160;\n&#160;Step2. 계약할 유통플랫폼 선정 및 문의&#160;&#160;\n&#160; &#160; &#160; &#160; &#160; - 계약할 음원유통플랫폼을 선정합니다. 국내에서는 이제 멜론, 엠넷, 벅스, 지니, 네이버라고 생각하시면 됩니다.&#160;\n&#160; &#160; &#160; &#160; &#160; -&#160;홈페이지 상에서 문의전화번호로 음원유통사인데 계약하고 싶다고 이야기 하면 담당자의 연락처를 알려줍니다. 벅스의 경우는&#160;\n&#160; &#160; &#160; &#160; &#160; &#160;홈페이지 내의 문의사항으로 보내면 담당자의 연락처를 가르쳐 줍니다.&#160;\nStep 3. 서류 준비\n&#160; &#160; &#160; &#160; &#160;-&#160;각 플랫폼에서 이제 준비할 서류를 이야기 해 줍니다.&#160;\n&#160; &#160; &#160; &#160; &#160;- 대략적으로 회사소개서, 가지고 있는 곡목, 사업자 등록증 등인데 플랫폼사에서 꼼꼼히 확인합니다.&#160;\n&#160; &#160; &#160; &#160; &#160;&#160;\n&#160;Step 4. 계약 및 음원 유통\n&#160; &#160; &#160; &#160; -&#160;각 플랫폼에서 계약이 가능하다는 통보가 오면 이제 가지고 있는 음원들을 플랫폼에 올려 유통을 하면 됩니다.&#160;\n[출처]&#160;음원유통사업에 뛰어들면서 -1(음원유통구조 이해하기, 음원유통사 등록)</a>|작성자&#160;전창열</a>\n▶ 가수 개인이 직접 업로드 하면?\n- 음원 파일\n16비트 &#160;+ 44.1KHz 규격의 웨이브(wav) 파일, 16비트 &#160;+ 44.1KHz 규격의 320kbs 급 mp3 파일.\n이와 별도로 24비트 고음질 음원을 판매하고 싶다면 24비트 + 96/192KHz 규격 플랙(Flac) 파일을 제출할 수도 있다.\n- 음반 표지 파일\n가로 000 x 세로 000 픽셀 이상의 jpg 파일\n- 가수 및 음반 정보 및 소개글 파일\n작사, 작곡, 편곡자 정보 및 가사, 음반 소개글 (MS 워드, 한글, txt 파일 등 형식은 제각각)\n&#160;국내 음원 이용자 대부분이 대형 유통사에서 ‘종량제’ 서비스를 이용해 음악을 듣는다. ‘MP3 30곡+무제한 스트리밍’의 정상가격은 9천원에서 1만2천원 사이다. 스트리밍을 제외한다면 1곡을 다운로드 할 때 드는 돈은 150원 남짓이다. 실제 곡당 다운로드 최저 가격은 미국이 791원, 영국이 1064원인 반면, 한국은 63원이다. 국내 대부분의 업체가 단품 다운로드 가격으로 600원을 받고 있지만, 종량제 상품이 있는데 굳이 단품 다운로드를 이용하는 사람은 거의 없다. 애플뮤직의 곡당 다운로드 가격은 0.99달러로, 우리돈으로 치면 1천원이 조금 넘는다."

    "content": "GR\n음원 사재기가 일어나는 이유는 단순하다. 차트 순위가 음원 판매와 가수 인지도에 제일 효과적인 마케팅이 되기 때문이다. 이는 음원 차트 자체가 음악 소비에 매우 강력한 영향을 주는 환경 탓도 있다. 장서희 변호사는 “차트에 진입해야 방송 출연과 행사 섭외 등 수익에 영향을 주니 수익을 위해서라도 차트 진입이 절실하다”라고 지적했다. 이동연 교수는 “음원 사재기로 인해서 아티스트형 창작가수 노출 빈도는 줄어들어 버티기가 어려워질 정도”라고 말했다.\n그렇다면 대안은 없을까. 최현용 한국영화전략연구소 소장은 “우선 매출 집계부터 공식화하자”라고 밝혔다. 최 소장은 “(영화의 경우엔) 박스오피스를 실시간 집계해서 극장별 관객수와 영화별 매출을 확인할 수 있다”라며 “문제가 많다고 하지만 그래도 신뢰도가 95%를 넘는다”라고 말했다. 현재 영화진흥위원회는 영화 시장 유통 구조를 투명하게 들여다보기 위한 목적으로 전국 영화관 입장권 발권 정보를 온라인 실시간으로 처리 및 집계하는 시스템인&#160;<a href=\"http://www.kobis.or.kr/kobis/business/main/main.do\" style=\"background-color:white\">영화관입장권통합전산망</a>을 운영하고 있다.\n<a href=\"http://www.bloter.net/archives/215554/kobis_2\">"

    "content": "퍼블리\n<a href=\"https://publy.co/project/1274\">https://publy.co/project/1274</a>\n구독자는 콘텐츠를 좋아하는 사람이고, 소비자는 구체적인 소비 행위를 하는 사람이다.\n&#160;\n동일한 사람이라도 다른 정체성을 가질 수 있다. 이걸 짝사랑과 직접 고백하는 것의 차이로 비교할 수도 있을 것이다. 좋아하는 마음을 전제로 할 때, 그다음에 어떤 행위를 할 것인지의 선택에 따라 누구나 다른 사람이 될 수 있다.&#160;\n디지털 환경에서 사실상 무료화된 콘텐츠를 수익 모델로 전환하려면 콘텐츠 자체를 유료화하거나 콘텐츠를 통해 뭔가를 팔아야 한다. 이때 '무엇을 팔 것인가'가 중요하다.\n디지털 환경은 책을 '종이로 된 상품'과 '문자로 쓰인 내용'으로 분리시켰다. 음반도 마찬가지다. 음반은 '플라스틱 상품'과 '음악 자체'로 분리되었다.\n기획사 및 아티스트는 콘텐츠 청취, 댓글 작성 등 다양한 데이터를 통해 산정되는 팬활동지수인 '친밀도'를 통해 자신과 친밀한 이용자들을 온도 분포로 확인할 수 있다. 멜론 회원 전체 또는 고 친밀도 회원 등 원하는 그룹을 설정해 메시지나 콘텐츠의 발송이 가능하며, 이용자들의 청취&#183;공유 등 피드백과 반응률이 즉각적으로 파악된다. 팬 증감 추이 정보도 제공되어, 특정 콘텐츠 발송에 의한 팬 증감 여부도 직관적으로 확인할 수 있다.\n이용자들은 '피드' 메뉴를 통해 팬맺은 아티스트는 물론 내가 좋아할 만한 아티스트들의 다양한 콘텐츠 소식을 시간순으로 한번에 모아볼 수 있다. 멜론 앱이나 웹을 다시 시작할 때마다 새로 도착한 콘텐츠들의 수가 숫자 아이콘으로 표시된다. 개별 아티스트마다 SNS나 커뮤니티를 방문할 필요 없이, 하나의 서비스에서 여러 아티스트의 소식을 쉽게 확인할 수 있는 것이 큰 강점이다."
  }
];
const CONTENT_HASH = '4dc5ef6b';

let cards = [];
let moving = null, resizing = null;
let selectedIdx = null, clipboardCard = null;
const GRID = 20, GAP = 14;
function snap(v) { return Math.round(v / GRID) * GRID; }

// ── Undo (Ctrl+Z) ────────────────────────────────────────────────────────────
const MAX_HISTORY = 50;
let history = [];
function snapshot() {
  syncText();
  history.push(JSON.stringify(cards));
  if (history.length > MAX_HISTORY) history.shift();
}
function undo() {
  if (!history.length) { showStatus('되돌릴 내용 없음'); return; }
  syncText();
  cards = JSON.parse(history.pop());
  renderCards();
  saveBoard();
  showStatus('↩ 되돌림');
}
function showStatus(msg) {
  const s = document.getElementById('status');
  s.textContent = msg;
  clearTimeout(showStatus._t);
  showStatus._t = setTimeout(() => { s.textContent = ''; }, 2000);
}
document.addEventListener('keydown', e => {
  const isText = document.activeElement?.contentEditable === 'true';
  if ((e.ctrlKey || e.metaKey) && e.key === 'z' && !e.shiftKey) {
    if (isText) return;
    e.preventDefault();
    undo();
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'c' && !e.shiftKey && !isText) {
    if (selectedIdx !== null && cards[selectedIdx]) {
      syncText();
      clipboardCard = JSON.parse(JSON.stringify(cards[selectedIdx]));
      showStatus('카드 복사됨');
      e.preventDefault();
    }
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'v' && !e.shiftKey && !isText) {
    if (clipboardCard) {
      e.preventDefault();
      snapshot();
      const nc = JSON.parse(JSON.stringify(clipboardCard));
      nc.x = (nc.x || 0) + 30; nc.y = (nc.y || 0) + 30;
      cards.push(nc);
      selectedIdx = cards.length - 1;
      renderCards(); saveBoard();
      showStatus('카드 붙여넣음');
    }
  }
  if (e.key === 'Escape') {
    document.querySelectorAll('.card.selected').forEach(c => c.classList.remove('selected'));
    selectedIdx = null;
  }
});

function pushCards(movedIdx) {
  const moved = cards[movedIdx];
  const movedEl = document.querySelector(`.card[data-idx="${movedIdx}"]`);
  if (!movedEl) return;
  const mh = movedEl.offsetHeight;
  document.querySelectorAll('.card').forEach(el => {
    const i = +el.dataset.idx;
    if (i === movedIdx) return;
    const c = cards[i], oh = el.offsetHeight;
    if (moved.x < (c.x+(c.w||200)) && (moved.x+(moved.w||200)) > c.x && moved.y < (c.y+oh) && (moved.y+mh) > c.y) {
      c.y = moved.y + mh + GAP;
      el.style.top = c.y + 'px';
    }
  });
}

function loadBoard() {
  const saved = localStorage.getItem(SAVE_KEY);
  const savedHash = localStorage.getItem(SAVE_KEY + ':hash');
  let parsed = null;
  try { parsed = saved ? JSON.parse(saved) : null; } catch(e) {}
  // reset if: no save, empty array, or content hash changed (page regenerated)
  if (!parsed || parsed.length === 0 || savedHash !== CONTENT_HASH) {
    cards = DEFAULT_CARDS.map(c => ({...c}));
    localStorage.removeItem(SAVE_KEY);
    localStorage.setItem(SAVE_KEY + ':hash', CONTENT_HASH);
    renderCards();
    const hasCoords = cards.some(c => c.x !== undefined && c.y !== undefined);
    if (!hasCoords) autoLayout();
    return;
  }
  cards = parsed;
  renderCards();
}
function resetToDefaults() { if (!confirm('저장된 보드를 지우고 원본으로 초기화합니다. 계속할까요?')) return; localStorage.removeItem(SAVE_KEY); cards = DEFAULT_CARDS.map(c => ({...c})); renderCards(); autoLayout(); }

function autoLayout() {
  const boardW = document.getElementById('board').offsetWidth;
  const cols = Math.max(1, Math.floor(boardW / 280));
  const colW = (boardW - GAP*(cols-1)) / cols;
  const colH = new Array(cols).fill(0);
  const allCards = document.querySelectorAll('.card');
  const images = document.querySelectorAll('.card img');
  let loaded = 0;
  function place() {
    allCards.forEach((el, i) => {
      const w = Math.min(cards[i].w || colW, colW);
      let minCol = 0;
      for (let c = 1; c < cols; c++) if (colH[c] < colH[minCol]) minCol = c;
      cards[i].x = minCol * (colW + GAP);
      cards[i].y = colH[minCol];
      cards[i].w = w;
      el.style.left = cards[i].x + 'px';
      el.style.top = cards[i].y + 'px';
      el.style.width = w + 'px';
      colH[minCol] = cards[i].y + el.offsetHeight + GAP;
    });
    document.getElementById('board').style.minHeight = (Math.max(...colH) + 100) + 'px';
    saveBoard();
  }
  if (!images.length) { requestAnimationFrame(place); return; }
  images.forEach(img => {
    if (img.complete) { loaded++; if (loaded >= images.length) requestAnimationFrame(place); }
    else { img.onload = img.onerror = () => { loaded++; if (loaded >= images.length) requestAnimationFrame(place); }; }
  });
}

function syncText() {
  document.querySelectorAll('.card').forEach(el => {
    const i = +el.dataset.idx;
    if (cards[i]?.type === 'text') { const t = el.querySelector('.text'); if (t) cards[i].content = t.innerHTML; }
  });
}
function saveBoard() { syncText(); localStorage.setItem(SAVE_KEY, JSON.stringify(cards)); localStorage.setItem(SAVE_KEY + ':hash', CONTENT_HASH); showStatus('저장됨 ' + new Date().toLocaleTimeString()); }

function renderCards() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  cards.forEach((card, i) => {
    const el = document.createElement('div');
    el.className = 'card'; el.dataset.idx = i;
    if (card.x !== undefined) el.style.left = card.x + 'px';
    if (card.y !== undefined) el.style.top = card.y + 'px';
    // html cards contain raw OneNote table HTML which may overflow the stated div width
    if (card.w) { if (card.type === 'html') el.style.minWidth = card.w + 'px'; else el.style.width = card.w + 'px'; }
    el.addEventListener('mousedown', e => {
      if (e.target.closest('.text, a, .card-btn, .resize-handle, td, th')) return;
      e.preventDefault();
      // Update selection
      document.querySelectorAll('.card.selected').forEach(c => c.classList.remove('selected'));
      selectedIdx = i; el.classList.add('selected');
      snapshot();
      moving = { idx: i, startX: e.clientX, startY: e.clientY, origX: card.x||0, origY: card.y||0 };
      el.classList.add('moving');
    });
    const actions = document.createElement('div'); actions.className = 'card-actions';
    const delBtn = document.createElement('button'); delBtn.className = 'card-btn'; delBtn.textContent = '×';
    delBtn.onclick = e => { e.stopPropagation(); if(confirm('삭제?')) { snapshot(); cards.splice(i,1); renderCards(); saveBoard(); } };
    actions.appendChild(delBtn); el.appendChild(actions);
    if (card.type === 'text') {
      const text = document.createElement('div'); text.className = 'text'; text.contentEditable = true;
      text.innerHTML = card.content || '';
      text.addEventListener('focus', () => { snapshot(); });
      text.addEventListener('blur', () => { card.content = text.innerHTML; saveBoard(); });
      el.appendChild(text);
    } else if (card.type === 'image') {
      const img = document.createElement('img');
      img.src = card.src.startsWith('http') || card.src.startsWith('data:') ? card.src : IMG_BASE + card.src;
      img.alt = ''; img.loading = 'lazy'; img.onerror = () => img.style.display = 'none';
      if (card.w) img.style.width = card.w + 'px';
      if (card.h) img.style.height = card.h + 'px';
      if (card.link) { const a = document.createElement('a'); a.href = card.link; a.target = '_blank'; a.appendChild(img); el.appendChild(a); }
      else { el.appendChild(img); }
      if (card.caption) { const cap = document.createElement('div'); cap.style.cssText = 'font-size:11px;color:#8b949e;margin-top:4px;word-break:break-word;padding:0 2px;'; cap.textContent = card.caption; el.appendChild(cap); }
    } else if (card.type === 'html') {
      const wrapper = document.createElement('div');
      wrapper.style.cssText = 'overflow:auto;font-size:13px;line-height:1.5;';
      wrapper.innerHTML = card.html.replace(/__ATTACHMENT__/g, IMG_BASE);
      wrapper.querySelectorAll('img').forEach(img => { img.style.maxWidth = '100%'; img.style.height = 'auto'; img.draggable = false; });
      wrapper.querySelectorAll('a').forEach(a => { a.target = '_blank'; a.style.color = '#6cb0f6'; });
      wrapper.querySelectorAll('table').forEach(t => { t.style.borderCollapse = 'collapse'; });
      wrapper.querySelectorAll('td,th').forEach(td => {
        td.style.border = '1px solid #444'; td.style.padding = '4px 6px'; td.style.verticalAlign = 'top';
        td.title = '더블클릭으로 편집';
        td.addEventListener('dblclick', function(e) {
          e.stopPropagation();
          snapshot();
          this.contentEditable = 'true';
          this.style.outline = '2px solid #388bfd';
          this.style.background = 'rgba(56,139,253,0.08)';
          this.focus();
        });
        td.addEventListener('blur', function() {
          this.contentEditable = 'false';
          this.style.outline = '';
          this.style.background = '';
          cards[i].html = wrapper.innerHTML.split(IMG_BASE).join('__ATTACHMENT__');
          saveBoard();
        });
      });
      el.appendChild(wrapper);
    } else if (card.type === 'table') {
      const rows = card.rows || [['','',''],['','',''],['','','']];
      const tbl = document.createElement('table');
      tbl.style.cssText = 'border-collapse:collapse;width:100%;font-size:13px;';
      rows.forEach((row, ri) => {
        const tr = tbl.insertRow();
        row.forEach((cell, ci) => {
          const td = document.createElement(ri === 0 ? 'th' : 'td');
          td.contentEditable = true;
          td.style.cssText = 'border:1px solid #30363d;padding:4px 8px;min-width:60px;text-align:left;' + (ri===0 ? 'background:#21262d;font-weight:600;' : '');
          td.textContent = cell;
          td.addEventListener('blur', () => { if (!cards[i].rows) cards[i].rows = rows; rows[ri][ci] = td.textContent; saveBoard(); });
          tr.appendChild(td);
        });
      });
      el.appendChild(tbl);
      const addRow = document.createElement('button');
      addRow.textContent = '+ 행'; addRow.style.cssText = 'margin-top:4px;font-size:11px;background:#21262d;border:1px solid #30363d;color:#8b949e;padding:2px 8px;border-radius:4px;cursor:pointer;';
      addRow.onclick = e => { e.stopPropagation(); snapshot(); if (!cards[i].rows) cards[i].rows = rows; cards[i].rows.push(new Array(cards[i].rows[0].length).fill('')); renderCards(); saveBoard(); };
      const addCol = document.createElement('button');
      addCol.textContent = '+ 열'; addCol.style.cssText = 'margin-top:4px;margin-left:4px;font-size:11px;background:#21262d;border:1px solid #30363d;color:#8b949e;padding:2px 8px;border-radius:4px;cursor:pointer;';
      addCol.onclick = e => { e.stopPropagation(); snapshot(); if (!cards[i].rows) cards[i].rows = rows; cards[i].rows.forEach(r => r.push('')); renderCards(); saveBoard(); };
      el.appendChild(addRow); el.appendChild(addCol);
    }
    const rh = document.createElement('div'); rh.className = 'resize-handle';
    rh.addEventListener('mousedown', e => { e.preventDefault(); e.stopPropagation(); snapshot(); resizing = { idx: i, startX: e.clientX, startW: card.w || el.offsetWidth }; });
    el.appendChild(rh);
    if (i === selectedIdx) el.classList.add('selected');
    board.appendChild(el);
  });
  requestAnimationFrame(() => {
    let maxB = 0;
    document.querySelectorAll('.card').forEach(el => { const b = (parseFloat(el.style.top)||0) + el.offsetHeight; if (b > maxB) maxB = b; });
    board.style.minHeight = (maxB + 100) + 'px';
  });
}

document.addEventListener('mousemove', e => {
  if (moving) {
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`); if (!el) return;
    let nx = moving.origX + e.clientX - moving.startX, ny = moving.origY + e.clientY - moving.startY;
    if (e.shiftKey) { nx = snap(nx); ny = snap(ny); el.style.outline = '1px dashed rgba(240,192,64,0.3)'; } else { el.style.outline = ''; }
    el.style.left = nx + 'px'; el.style.top = ny + 'px';
  }
  if (resizing) {
    let nw = resizing.startW + e.clientX - resizing.startX; if (e.shiftKey) nw = snap(nw);
    cards[resizing.idx].w = Math.max(100, nw);
    const el = document.querySelector(`.card[data-idx="${resizing.idx}"]`); if (el) el.style.width = cards[resizing.idx].w + 'px';
  }
});

document.addEventListener('mouseup', e => {
  if (moving) {
    let nx = moving.origX + e.clientX - moving.startX, ny = moving.origY + e.clientY - moving.startY;
    if (e.shiftKey) { nx = snap(nx); ny = snap(ny); }
    cards[moving.idx].x = Math.max(0, nx); cards[moving.idx].y = Math.max(0, ny);
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`); if (el) { el.classList.remove('moving'); el.style.outline = ''; }
    if (e.shiftKey) pushCards(moving.idx);
    moving = null; saveBoard();
  }
  if (resizing) { if (e.shiftKey) pushCards(resizing.idx); resizing = null; saveBoard(); }
});

function addTextCard() { snapshot(); cards.push({ type: 'text', content: '', x: 50, y: window.scrollY+100, w: 300 }); renderCards(); setTimeout(() => { const els = document.querySelectorAll('.card .text'); els[els.length-1]?.focus(); }, 100); }
function addImageCard() { const input = document.createElement('input'); input.type = 'file'; input.accept = 'image/*'; input.onchange = e => { const f = e.target.files[0]; if (!f) return; const r = new FileReader(); r.onload = () => { snapshot(); cards.push({ type: 'image', src: r.result, x: 50, y: window.scrollY+100, w: 240 }); renderCards(); saveBoard(); }; r.readAsDataURL(f); }; input.click(); }
function addImageUrl() { const url = prompt('이미지 URL'); if (!url) return; snapshot(); cards.push({ type: 'image', src: url, x: 50, y: window.scrollY+100, w: 240 }); renderCards(); saveBoard(); }
function addTableCard() {
  const colsStr = prompt('열 수 (기본 3)', '3'); const cols = Math.max(1, parseInt(colsStr)||3);
  const rowsStr = prompt('행 수 (헤더 포함, 기본 4)', '4'); const rows = Math.max(1, parseInt(rowsStr)||4);
  snapshot();
  cards.push({ type: 'table', rows: Array.from({length: rows}, (_, ri) => Array.from({length: cols}, (_, ci) => ri===0 ? `열${ci+1}` : '')), x: 50, y: window.scrollY+100, w: Math.max(240, cols*100) });
  renderCards(); saveBoard();
}
function exportBoard() { syncText(); const blob = new Blob([JSON.stringify(cards, null, 2)], { type: 'application/json' }); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = SAVE_KEY + '.json'; a.click(); }
// ── Zoom ─────────────────────────────────────────────────────────────────────
let zoom = parseFloat(localStorage.getItem('zoom-' + SAVE_KEY) || '1.0');
function applyZoom() {
  const board = document.getElementById('board');
  board.style.transform = `scale(${zoom})`;
  board.style.transformOrigin = '0 0';
  document.getElementById('zoom-level').textContent = Math.round(zoom * 100) + '%';
  localStorage.setItem('zoom-' + SAVE_KEY, zoom);
}
function zoomIn()  { zoom = Math.min(3.0, parseFloat((zoom + 0.1).toFixed(2))); applyZoom(); }
function zoomOut() { zoom = Math.max(0.2, parseFloat((zoom - 0.1).toFixed(2))); applyZoom(); }
document.addEventListener('keydown', e => {
  if (e.ctrlKey || e.metaKey) {
    if (e.key === '=' || e.key === '+') { e.preventDefault(); zoomIn(); }
    if (e.key === '-')                  { e.preventDefault(); zoomOut(); }
    if (e.key === '0')                  { e.preventDefault(); zoom = 1.0; applyZoom(); }
  }
});
document.getElementById('board').addEventListener('wheel', e => {
  if (!(e.ctrlKey || e.metaKey)) return;
  e.preventDefault();
  e.deltaY < 0 ? zoomIn() : zoomOut();
}, { passive: false });
applyZoom();
function resetLayout() { if (!confirm('자동 재배치합니다.')) return; cards.forEach(c => { delete c.x; delete c.y; }); renderCards(); autoLayout(); }
// ── Floating format toolbar ───────────────────────────────────────────────────
const fmtBar = document.getElementById('format-toolbar');
function fmt(cmd) { document.execCommand(cmd, false, null); saveBoard(); }
function fmtLink() {
  const sel = window.getSelection();
  if (!sel || sel.isCollapsed) return;
  const url = prompt('링크 URL 입력', 'https://');
  if (!url) return;
  document.execCommand('createLink', false, url);
  // make links open in new tab
  sel.anchorNode?.parentElement?.closest('a')?.setAttribute('target', '_blank');
  document.querySelectorAll('.text a').forEach(a => a.target = '_blank');
  saveBoard();
}

// prevent format buttons from blurring contenteditable
fmtBar.addEventListener('mousedown', e => e.preventDefault());

document.addEventListener('selectionchange', () => {
  const sel = window.getSelection();
  if (!sel || sel.isCollapsed || !sel.toString().trim()) { fmtBar.style.display = 'none'; return; }
  // only show if selection is inside a .text element
  const anchor = sel.anchorNode;
  if (!anchor) { fmtBar.style.display = 'none'; return; }
  const textEl = anchor.nodeType === 1 ? anchor.closest('.text') : anchor.parentElement?.closest('.text');
  if (!textEl) { fmtBar.style.display = 'none'; return; }
  // position above selection
  const range = sel.getRangeAt(0);
  const rect = range.getBoundingClientRect();
  fmtBar.style.display = 'flex';
  const tbW = fmtBar.offsetWidth || 180;
  let left = rect.left + rect.width / 2 - tbW / 2;
  left = Math.max(8, Math.min(left, window.innerWidth - tbW - 8));
  fmtBar.style.left = left + 'px';
  fmtBar.style.top = (rect.top - 44 + window.scrollY) + 'px';
});

setInterval(saveBoard, 30000);
loadBoard();
</script>
