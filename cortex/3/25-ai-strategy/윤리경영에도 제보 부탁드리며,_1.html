<!DOCTYPE html>

<head>

<title>윤리경영에도 제보 부탁드리며,</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1e1e1e; color: #e0e0e0; font-family: 'Segoe UI', -apple-system, sans-serif; font-size: 15px; line-height: 1.6; padding: 20px 30px 60px; overflow-x: hidden; }
a { color: #6cb0f6; text-decoration: none; }
a:hover { text-decoration: underline; }
.title-bar { background: #3a3a5c; display: inline-block; padding: 6px 16px; font-size: 22px; font-weight: bold; color: #fff; margin-bottom: 4px; }
.date { color: #999; font-size: 13px; margin-bottom: 20px; }
.board { position: relative; }
.card { background: #2a2a2a; border: 1px solid #3a3a3a; border-radius: 8px; padding: 12px; position: absolute; cursor: grab; transition: box-shadow 0.15s; overflow: hidden; }
.card:hover { box-shadow: 0 0 0 1px #58a6ff; z-index: 10; }
.card.moving { opacity: 0.8; box-shadow: 0 4px 24px rgba(0,0,0,0.6); z-index: 100; cursor: grabbing; }
.card img { width: 100%; border-radius: 4px; display: block; }
.card .text { outline: none; min-height: 20px; white-space: pre-wrap; word-break: break-word; }
.card .text:focus { background: rgba(255,255,255,0.05); border-radius: 4px; padding: 4px; }
.card .text:empty::before { content: '텍스트 입력...'; color: #555; }
.card-actions { position: absolute; top: 4px; right: 4px; display: none; gap: 4px; }
.card:hover .card-actions { display: flex; }
.card-btn { background: #333; border: 1px solid #555; color: #ccc; border-radius: 4px; padding: 2px 6px; font-size: 11px; cursor: pointer; }
.card-btn:hover { background: #444; color: #fff; }
.resize-handle { position: absolute; bottom: 0; right: 0; width: 16px; height: 16px; cursor: se-resize; opacity: 0; }
.card:hover .resize-handle { opacity: 0.6; }
.resize-handle::after { content: ''; position: absolute; bottom: 3px; right: 3px; width: 8px; height: 8px; border-right: 2px solid #666; border-bottom: 2px solid #666; }
.card.selected { box-shadow: 0 0 0 2px #58a6ff; z-index: 5; }
.highlight-red { color: #ff6b6b; }
.highlight-blue { color: #6cb0f6; }
.highlight-gold { color: #f0c040; }
.toolbar { position: fixed; bottom: 0; left: 0; right: 0; background: #161b22; border-top: 1px solid #30363d; padding: 8px 20px; display: flex; gap: 12px; align-items: center; z-index: 200; }
.toolbar button { background: #21262d; border: 1px solid #30363d; color: #e0e0e0; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; }
.toolbar button:hover { background: #30363d; }
.toolbar .status { color: #8b949e; font-size: 12px; margin-left: auto; }
#format-toolbar { position: fixed; display: none; background: #1c2128; border: 1px solid #444c56; border-radius: 8px; padding: 4px 6px; gap: 2px; align-items: center; z-index: 500; box-shadow: 0 4px 16px rgba(0,0,0,0.5); }
#format-toolbar button { background: none; border: none; color: #cdd9e5; padding: 4px 8px; border-radius: 5px; cursor: pointer; font-size: 13px; line-height: 1; }
#format-toolbar button:hover { background: #373e47; }
#format-toolbar .sep { width: 1px; height: 16px; background: #444c56; margin: 0 2px; }
</style>
</head>
<body>
<div class="title-bar" contenteditable="true">윤리경영에도 제보 부탁드리며,</div>

<script>
const SAVE_KEY = 'board-윤리경영에도-제보-부탁드리며-';
const IMG_BASE = '../../attachments/';
const DEFAULT_CARDS = [
  {
    "type": "html",
    "x": 48,
    "y": 115,
    "w": 720,
    "html": "\r\n\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">윤리경영에도</span> <span style=\"font-family:Malgun Gothic\">제보</span> <span style=\"font-family:Malgun Gothic\">부탁드리며</span>,&#160;</p>\r\n\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">노동조합에서도</span> HR<span style=\"font-family:Malgun Gothic\">에</span> <span style=\"font-family:Malgun Gothic\">강도높은</span> <span style=\"font-family:Malgun Gothic\">관리를</span> <span style=\"font-family:Malgun Gothic\">요청하고</span> DATA <span style=\"font-family:Malgun Gothic\">요청을</span> <span style=\"font-family:Malgun Gothic\">하겠습니다</span>.&#160;</p>\r\n\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">다만</span>, <span style=\"font-family:Malgun Gothic\">노동조합도</span> <span style=\"font-family:Malgun Gothic\">이와</span> <span style=\"font-family:Malgun Gothic\">유사한</span> <span style=\"font-family:Malgun Gothic\">제보를</span> <span style=\"font-family:Malgun Gothic\">수없이</span> <span style=\"font-family:Malgun Gothic\">많이</span> <span style=\"font-family:Malgun Gothic\">해봤지만</span>, <span style=\"font-family:Malgun Gothic\">윤리경영</span> <span style=\"font-family:Malgun Gothic\">제보시</span> <span style=\"font-family:Malgun Gothic\">확실한</span> <span style=\"font-family:Malgun Gothic\">제보를</span> <span style=\"font-family:Malgun Gothic\">하려면</span>....&#160;</p>\r\n\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\">1. <span style=\"font-family:Malgun Gothic\">캡쳐</span> <span style=\"font-family:Malgun Gothic\">본은</span> <span style=\"font-family:Malgun Gothic\">확실한</span> <span style=\"font-family:Malgun Gothic\">증거가</span> <span style=\"font-family:Malgun Gothic\">되지</span> <span style=\"font-family:Malgun Gothic\">않습니다</span>.&#160;</p>\r\n\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\">&#160; - <span style=\"font-family:Malgun Gothic\">당사자가</span> <span style=\"font-family:Malgun Gothic\">잘못</span> <span style=\"font-family:Malgun Gothic\">등록했었다</span>. <span style=\"font-family:Malgun Gothic\">라고</span> <span style=\"font-family:Malgun Gothic\">하면</span> <span style=\"font-family:Malgun Gothic\">끝입니다</span>. <span style=\"font-family:Malgun Gothic\">또한</span>, <span style=\"font-family:Malgun Gothic\">회사는</span> <span style=\"font-family:Malgun Gothic\">근무계획은</span> <span style=\"font-family:Malgun Gothic\">서버에</span> <span style=\"font-family:Malgun Gothic\">보관하지</span> <span style=\"font-family:Malgun Gothic\">않습니다</span>. <span style=\"font-family:Malgun Gothic\">이유는</span> <span style=\"font-family:Malgun Gothic\">너무나</span> <span style=\"font-family:Malgun Gothic\">많은</span> <span style=\"font-family:Malgun Gothic\">양의</span> DATA<span style=\"font-family:Malgun Gothic\">이므로</span> <span style=\"font-family:Malgun Gothic\">서버</span> <span style=\"font-family:Malgun Gothic\">용량</span> <span style=\"font-family:Malgun Gothic\">확보</span> <span style=\"font-family:Malgun Gothic\">및</span> <span style=\"font-family:Malgun Gothic\">관리하기</span> <span style=\"font-family:Malgun Gothic\">어렵다는</span> <span style=\"font-family:Malgun Gothic\">이유입니다</span>.&#160;</p>\r\n\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\">2. <span style=\"font-family:Malgun Gothic\">실제로</span> <span style=\"font-family:Malgun Gothic\">근무했는지의</span> <span style=\"font-family:Malgun Gothic\">증거가</span> <span style=\"font-family:Malgun Gothic\">필요합니다</span>.&#160;</p>\r\n\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\">&#160; - <span style=\"font-family:Malgun Gothic\">단순히</span> <span style=\"font-family:Malgun Gothic\">결재를</span> <span style=\"font-family:Malgun Gothic\">했던</span> <span style=\"font-family:Malgun Gothic\">건으로는</span> <span style=\"font-family:Malgun Gothic\">안됩니다</span>. (<span style=\"font-family:Malgun Gothic\">모바일</span> <span style=\"font-family:Malgun Gothic\">결재도</span> <span style=\"font-family:Malgun Gothic\">가능하고</span>, <span style=\"font-family:Malgun Gothic\">단순히</span> <span style=\"font-family:Malgun Gothic\">결재</span> <span style=\"font-family:Malgun Gothic\">한건</span> <span style=\"font-family:Malgun Gothic\">하려고</span> <span style=\"font-family:Malgun Gothic\">잠깐</span> <span style=\"font-family:Malgun Gothic\">들어왔다</span> <span style=\"font-family:Malgun Gothic\">닫았다고</span> <span style=\"font-family:Malgun Gothic\">할</span> <span style=\"font-family:Malgun Gothic\">여지가</span> <span style=\"font-family:Malgun Gothic\">있습니다</span>)</p>\r\n\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\">&#160; - <span style=\"font-family:Malgun Gothic\">출근한</span> <span style=\"font-family:Malgun Gothic\">기록만으로는</span> <span style=\"font-family:Malgun Gothic\">안됩니다</span>. <span style=\"font-family:Malgun Gothic\">출근했다고</span> <span style=\"font-family:Malgun Gothic\">모두</span> <span style=\"font-family:Malgun Gothic\">근무시간은</span> <span style=\"font-family:Malgun Gothic\">아니라는</span> <span style=\"font-family:Malgun Gothic\">것이</span> <span style=\"font-family:Malgun Gothic\">통상적인</span> <span style=\"font-family:Malgun Gothic\">근무등록</span> <span style=\"font-family:Malgun Gothic\">형태입니다</span>. <span style=\"font-family:Malgun Gothic\">예를들어</span> <span style=\"font-family:Malgun Gothic\">출근만으로</span> <span style=\"font-family:Malgun Gothic\">근무라고</span> <span style=\"font-family:Malgun Gothic\">인정하는</span> <span style=\"font-family:Malgun Gothic\">곳의</span> <span style=\"font-family:Malgun Gothic\">경우</span> <span style=\"font-family:Malgun Gothic\">출</span>/<span style=\"font-family:Malgun Gothic\">퇴근카드를</span> <span style=\"font-family:Malgun Gothic\">등록하게</span> <span style=\"font-family:Malgun Gothic\">되어</span> <span style=\"font-family:Malgun Gothic\">있습니다</span>. <span style=\"font-family:Malgun Gothic\">하지만</span>, <span style=\"font-family:Malgun Gothic\">우리회사의</span> <span style=\"font-family:Malgun Gothic\">업무</span> <span style=\"font-family:Malgun Gothic\">특성상</span> <span style=\"font-family:Malgun Gothic\">현장</span> <span style=\"font-family:Malgun Gothic\">마케터</span>/<span style=\"font-family:Malgun Gothic\">인프라</span> <span style=\"font-family:Malgun Gothic\">등</span> <span style=\"font-family:Malgun Gothic\">출근</span> <span style=\"font-family:Malgun Gothic\">기록이</span> <span style=\"font-family:Malgun Gothic\">없더라도</span> <span style=\"font-family:Malgun Gothic\">근무로</span> <span style=\"font-family:Malgun Gothic\">인정되는</span> <span style=\"font-family:Malgun Gothic\">경우도</span> <span style=\"font-family:Malgun Gothic\">많기</span> <span style=\"font-family:Malgun Gothic\">때문입니다</span>.&#160;</p>\r\n\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\">&#160; - <span style=\"font-family:Malgun Gothic\">즉</span>, <span style=\"font-family:Malgun Gothic\">회의를 하는 모습의 동영상 등</span>(<span style=\"font-family:Malgun Gothic\">날짜</span>/<span style=\"font-family:Malgun Gothic\">시간 확인되어야 함</span>)<span style=\"font-family:Malgun Gothic\">이 있어야 합니다</span>. <span style=\"font-family:Malgun Gothic\">확실한 당일 기록이 없으면 당사자가 모두 소명하게 됩니다</span>. <span style=\"font-family:Malgun Gothic\">나왔는데 일은 하지 않았다</span>. <span style=\"font-family:Malgun Gothic\">라고요</span>.&#160;</p>\r\n\t\t\t<br />\r\n\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\">3. <span style=\"font-family:Malgun Gothic\">소정근로시간</span>&#160;+ <span style=\"font-family:Malgun Gothic\">주</span>12<span style=\"font-family:Malgun Gothic\">시간씩</span> <span style=\"font-family:Malgun Gothic\">초과</span> <span style=\"font-family:Malgun Gothic\">근무를</span> <span style=\"font-family:Malgun Gothic\">하고도</span> <span style=\"font-family:Malgun Gothic\">근무를</span> <span style=\"font-family:Malgun Gothic\">더</span> <span style=\"font-family:Malgun Gothic\">하기</span> <span style=\"font-family:Malgun Gothic\">위해서</span> <span style=\"font-family:Malgun Gothic\">휴게</span> <span style=\"font-family:Malgun Gothic\">등록을</span> <span style=\"font-family:Malgun Gothic\">길게</span> <span style=\"font-family:Malgun Gothic\">등록하는</span> <span style=\"font-family:Malgun Gothic\">경우는</span> <span style=\"font-family:Malgun Gothic\">회사의</span> <span style=\"font-family:Malgun Gothic\">처벌이</span> <span style=\"font-family:Malgun Gothic\">될</span> <span style=\"font-family:Malgun Gothic\">수</span> <span style=\"font-family:Malgun Gothic\">있으므로</span> <span style=\"font-family:Malgun Gothic\">이런</span> <span style=\"font-family:Malgun Gothic\">경우</span> <span style=\"font-family:Malgun Gothic\">보직</span> <span style=\"font-family:Malgun Gothic\">풀아웃도</span> <span style=\"font-family:Malgun Gothic\">가능합니다</span>.&#160;</p>\r\n\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">물론</span> <span style=\"font-family:Malgun Gothic\">이</span> <span style=\"font-family:Malgun Gothic\">또한</span>, <span style=\"font-family:Malgun Gothic\">증거</span> <span style=\"font-family:Malgun Gothic\">자료</span> <span style=\"font-family:Malgun Gothic\">확보를</span> <span style=\"font-family:Malgun Gothic\">위해</span> <span style=\"font-family:Malgun Gothic\">영상등</span> <span style=\"font-family:Malgun Gothic\">치밀한</span> <span style=\"font-family:Malgun Gothic\">자료가</span> <span style=\"font-family:Malgun Gothic\">필요합니다</span>.&#160;</p>\r\n\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\">&#160;</p>\r\n\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">예를들어</span> <span style=\"font-family:Malgun Gothic\">아래</span> <span style=\"font-family:Malgun Gothic\">내용은</span> 2<span style=\"font-family:Malgun Gothic\">년전</span> <span style=\"font-family:Malgun Gothic\">지만</span>Go<span style=\"font-family:Malgun Gothic\">를</span> <span style=\"font-family:Malgun Gothic\">통해</span> <span style=\"font-family:Malgun Gothic\">설명드렸던</span> <span style=\"font-family:Malgun Gothic\">내용입니다</span>.&#160;</p>\r\n\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">노동조합의</span> <span style=\"font-family:Malgun Gothic\">제보로</span> <span style=\"font-family:Malgun Gothic\">아래</span> <span style=\"font-family:Malgun Gothic\">건의</span> <span style=\"font-family:Malgun Gothic\">경우</span> <span style=\"font-family:Malgun Gothic\">연중</span> <span style=\"font-family:Malgun Gothic\">풀아웃</span> <span style=\"font-family:Malgun Gothic\">되었습니다</span>.&#160;</p>\r\n\t\t\t<br />\r\n\t\t\t<table style=\"border:1px solid;border-collapse:collapse\">\r\n\t\t\t\t<tr>\r\n\t\t\t\t\t<td style=\"border:1px solid\"><p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:a고딕14;font-size:10pt;font-weight:bold\">근로기준법 제50조(근로시간)</span></p>\r\n\t\t\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:a고딕14;font-size:10pt\">①</span><span style=\"font-family:Times New Roman;font-size:7pt\">&#160;&#160;&#160;&#160;&#160;</span><span style=\"font-family:a고딕14;font-size:10pt\">1주 간의 근로시간은 휴게시간을 제외하고&#160;40시간을 초과할 수 없다.</span></p>\r\n\t\t\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:a고딕14;font-size:10pt\">②</span><span style=\"font-family:Times New Roman;font-size:7pt\">&#160;&#160;&#160;&#160;&#160;</span><span style=\"font-family:a고딕14;font-size:10pt\">1일의 근로시간은 휴게시간을 제외하고&#160;8시간을 초과할 수 없다.</span></p>\r\n\t\t\t\t\t</td>\r\n\t\t\t\t</tr>\r\n\t\t\t\t<tr>\r\n\t\t\t\t\t<td style=\"border:1px solid\"><p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:a고딕14;font-size:10pt;font-weight:bold\">근로기준법 제52조(선택적 근로시간제)</span></p>\r\n\t\t\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:a고딕14;font-size:10pt\">①&#160;사용자는 취업규칙에 따라 업무의 시작 및 종료 시각을 근로자의 결정에 맡기기로 한 근로자에 대하여 근로자대표와의 서면 합의에 따라 다음 각 호의 사항을 정하면&#160;1개월 이내의 정산기간을 평균하여&#160;1주간의 근로시간이 제50조제1항의 근로시간을 초과하지 아니하는 범위에서&#160;1주 간에 제50조제1항의 근로시간을, 1일에 제50조제2항의 근로시간을 초과하여 근로하게 할 수 있다.</span></p>\r\n\t\t\t\t\t</td>\r\n\t\t\t\t</tr>\r\n\t\t\t\t<tr>\r\n\t\t\t\t\t<td style=\"border:1px solid\"><p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:a고딕14;font-size:10pt;font-weight:bold\">근로기준법 제53조(연장 근로의 제한)</span></p>\r\n\t\t\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:a고딕14;font-size:10pt\">①</span><span style=\"font-family:Times New Roman;font-size:7pt\">&#160;&#160;&#160;&#160;&#160;</span><span style=\"font-family:a고딕14;font-size:10pt\">당사자 간에 합의하면&#160;1주 간에&#160;12시간을 한도로 제50조의 근로시간을 연장할 수 있다.</span></p>\r\n\t\t\t\t\t</td>\r\n\t\t\t\t</tr>\r\n\t\t\t</table>\r\n\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">얼마나</span> <span style=\"font-family:Malgun Gothic\">많은</span> <span style=\"font-family:Malgun Gothic\">사람들이</span> <span style=\"font-family:Malgun Gothic\">이런짓을</span> <span style=\"font-family:Malgun Gothic\">하고</span> <span style=\"font-family:Malgun Gothic\">있을거라</span> <span style=\"font-family:Malgun Gothic\">생각하고</span> <span style=\"font-family:Malgun Gothic\">있습니다</span>.&#160;</p>\r\n\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">본인들은</span> <span style=\"font-family:Malgun Gothic\">로얄티라고</span> <span style=\"font-family:Malgun Gothic\">생각하고</span> <span style=\"font-family:Malgun Gothic\">이걸로</span> <span style=\"font-family:Malgun Gothic\">임원들에게</span> <span style=\"font-family:Malgun Gothic\">잘보이려고</span> <span style=\"font-family:Malgun Gothic\">하는</span> <span style=\"font-family:Malgun Gothic\">모습일거라</span> <span style=\"font-family:Malgun Gothic\">생각합니다</span>.&#160;</p>\r\n\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">노동조합은</span> <span style=\"font-family:Malgun Gothic\">많은</span> <span style=\"font-family:Malgun Gothic\">제보를</span> <span style=\"font-family:Malgun Gothic\">토대로</span> DATA <span style=\"font-family:Malgun Gothic\">분석을</span> <span style=\"font-family:Malgun Gothic\">합니다</span>. <span style=\"font-family:Malgun Gothic\">그중</span> <span style=\"font-family:Malgun Gothic\">위에서</span> <span style=\"font-family:Malgun Gothic\">설명드린</span> DATA <span style=\"font-family:Malgun Gothic\">와</span> <span style=\"font-family:Malgun Gothic\">실근무</span> <span style=\"font-family:Malgun Gothic\">영상자료</span> <span style=\"font-family:Malgun Gothic\">등이</span> <span style=\"font-family:Malgun Gothic\">있어야만</span>, <span style=\"font-family:Malgun Gothic\">회사와</span> <span style=\"font-family:Malgun Gothic\">싸워서</span> <span style=\"font-family:Malgun Gothic\">보직해임까지</span> <span style=\"font-family:Malgun Gothic\">가능할</span> <span style=\"font-family:Malgun Gothic\">수</span> <span style=\"font-family:Malgun Gothic\">있었습니다</span>.&#160;</p>\r\n\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">아마도</span> <span style=\"font-family:Malgun Gothic\">보내주신</span> <span style=\"font-family:Malgun Gothic\">자료로는</span> <span style=\"font-family:Malgun Gothic\">윤리경영에</span> <span style=\"font-family:Malgun Gothic\">제보할</span> <span style=\"font-family:Malgun Gothic\">경우</span> <span style=\"font-family:Malgun Gothic\">당사자의</span> <span style=\"font-family:Malgun Gothic\">소명만</span> <span style=\"font-family:Malgun Gothic\">받고</span> <span style=\"font-family:Malgun Gothic\">단순</span> <span style=\"font-family:Malgun Gothic\">처리</span> <span style=\"font-family:Malgun Gothic\">할</span> <span style=\"font-family:Malgun Gothic\">가능성이</span> <span style=\"font-family:Malgun Gothic\">매우</span> <span style=\"font-family:Malgun Gothic\">높습니다</span>. <span style=\"font-family:Malgun Gothic\">실</span> <span style=\"font-family:Malgun Gothic\">근무했던</span> <span style=\"font-family:Malgun Gothic\">내용이</span> <span style=\"font-family:Malgun Gothic\">구체적으로</span> <span style=\"font-family:Malgun Gothic\">필요하고</span> <span style=\"font-family:Malgun Gothic\">추가로</span> <span style=\"font-family:Malgun Gothic\">연장</span> <span style=\"font-family:Malgun Gothic\">근로의</span> <span style=\"font-family:Malgun Gothic\">제한을</span> <span style=\"font-family:Malgun Gothic\">넘어선</span> <span style=\"font-family:Malgun Gothic\">근무여야지</span> <span style=\"font-family:Malgun Gothic\">강력한</span> <span style=\"font-family:Malgun Gothic\">처벌이</span> <span style=\"font-family:Malgun Gothic\">가능합니다</span>.&#160;</p>\r\n\t\t"
  }
];
const CONTENT_HASH = '6b205212';

let cards = [];
let moving = null, resizing = null;
let selectedIdx = null, clipboardCard = null;
const GRID = 20, GAP = 14;
function snap(v) { return Math.round(v / GRID) * GRID; }

// ── Undo (Ctrl+Z) ────────────────────────────────────────────────────────────
const MAX_HISTORY = 50;
let history = [];
function snapshot() {
  syncText();
  history.push(JSON.stringify(cards));
  if (history.length > MAX_HISTORY) history.shift();
}
function undo() {
  if (!history.length) { showStatus('되돌릴 내용 없음'); return; }
  syncText();
  cards = JSON.parse(history.pop());
  renderCards();
  saveBoard();
  showStatus('↩ 되돌림');
}
function showStatus(msg) {
  const s = document.getElementById('status');
  s.textContent = msg;
  clearTimeout(showStatus._t);
  showStatus._t = setTimeout(() => { s.textContent = ''; }, 2000);
}
document.addEventListener('keydown', e => {
  const isText = document.activeElement?.contentEditable === 'true';
  if ((e.ctrlKey || e.metaKey) && e.key === 'z' && !e.shiftKey) {
    if (isText) return;
    e.preventDefault();
    undo();
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'c' && !e.shiftKey && !isText) {
    if (selectedIdx !== null && cards[selectedIdx]) {
      syncText();
      clipboardCard = JSON.parse(JSON.stringify(cards[selectedIdx]));
      showStatus('카드 복사됨');
      e.preventDefault();
    }
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'v' && !e.shiftKey && !isText) {
    if (clipboardCard) {
      e.preventDefault();
      snapshot();
      const nc = JSON.parse(JSON.stringify(clipboardCard));
      nc.x = (nc.x || 0) + 30; nc.y = (nc.y || 0) + 30;
      cards.push(nc);
      selectedIdx = cards.length - 1;
      renderCards(); saveBoard();
      showStatus('카드 붙여넣음');
    }
  }
  if (e.key === 'Escape') {
    document.querySelectorAll('.card.selected').forEach(c => c.classList.remove('selected'));
    selectedIdx = null;
  }
});

function pushCards(movedIdx) {
  const moved = cards[movedIdx];
  const movedEl = document.querySelector(`.card[data-idx="${movedIdx}"]`);
  if (!movedEl) return;
  const mh = movedEl.offsetHeight;
  document.querySelectorAll('.card').forEach(el => {
    const i = +el.dataset.idx;
    if (i === movedIdx) return;
    const c = cards[i], oh = el.offsetHeight;
    if (moved.x < (c.x+(c.w||200)) && (moved.x+(moved.w||200)) > c.x && moved.y < (c.y+oh) && (moved.y+mh) > c.y) {
      c.y = moved.y + mh + GAP;
      el.style.top = c.y + 'px';
    }
  });
}

function loadBoard() {
  const saved = localStorage.getItem(SAVE_KEY);
  const savedHash = localStorage.getItem(SAVE_KEY + ':hash');
  let parsed = null;
  try { parsed = saved ? JSON.parse(saved) : null; } catch(e) {}
  // reset if: no save, empty array, or content hash changed (page regenerated)
  if (!parsed || parsed.length === 0 || savedHash !== CONTENT_HASH) {
    cards = DEFAULT_CARDS.map(c => ({...c}));
    localStorage.removeItem(SAVE_KEY);
    localStorage.setItem(SAVE_KEY + ':hash', CONTENT_HASH);
    renderCards();
    const hasCoords = cards.some(c => c.x !== undefined && c.y !== undefined);
    if (!hasCoords) autoLayout();
    return;
  }
  cards = parsed;
  renderCards();
}
function resetToDefaults() { if (!confirm('저장된 보드를 지우고 원본으로 초기화합니다. 계속할까요?')) return; localStorage.removeItem(SAVE_KEY); cards = DEFAULT_CARDS.map(c => ({...c})); renderCards(); autoLayout(); }

function autoLayout() {
  const boardW = document.getElementById('board').offsetWidth;
  const cols = Math.max(1, Math.floor(boardW / 280));
  const colW = (boardW - GAP*(cols-1)) / cols;
  const colH = new Array(cols).fill(0);
  const allCards = document.querySelectorAll('.card');
  const images = document.querySelectorAll('.card img');
  let loaded = 0;
  function place() {
    allCards.forEach((el, i) => {
      const w = Math.min(cards[i].w || colW, colW);
      let minCol = 0;
      for (let c = 1; c < cols; c++) if (colH[c] < colH[minCol]) minCol = c;
      cards[i].x = minCol * (colW + GAP);
      cards[i].y = colH[minCol];
      cards[i].w = w;
      el.style.left = cards[i].x + 'px';
      el.style.top = cards[i].y + 'px';
      el.style.width = w + 'px';
      colH[minCol] = cards[i].y + el.offsetHeight + GAP;
    });
    document.getElementById('board').style.minHeight = (Math.max(...colH) + 100) + 'px';
    saveBoard();
  }
  if (!images.length) { requestAnimationFrame(place); return; }
  images.forEach(img => {
    if (img.complete) { loaded++; if (loaded >= images.length) requestAnimationFrame(place); }
    else { img.onload = img.onerror = () => { loaded++; if (loaded >= images.length) requestAnimationFrame(place); }; }
  });
}

function syncText() {
  document.querySelectorAll('.card').forEach(el => {
    const i = +el.dataset.idx;
    if (cards[i]?.type === 'text') { const t = el.querySelector('.text'); if (t) cards[i].content = t.innerHTML; }
  });
}
function saveBoard() { syncText(); localStorage.setItem(SAVE_KEY, JSON.stringify(cards)); localStorage.setItem(SAVE_KEY + ':hash', CONTENT_HASH); showStatus('저장됨 ' + new Date().toLocaleTimeString()); }

function renderCards() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  cards.forEach((card, i) => {
    const el = document.createElement('div');
    el.className = 'card'; el.dataset.idx = i;
    if (card.x !== undefined) el.style.left = card.x + 'px';
    if (card.y !== undefined) el.style.top = card.y + 'px';
    // html cards contain raw OneNote table HTML which may overflow the stated div width
    if (card.w) { if (card.type === 'html') el.style.minWidth = card.w + 'px'; else el.style.width = card.w + 'px'; }
    el.addEventListener('mousedown', e => {
      if (e.target.closest('.text, a, .card-btn, .resize-handle, td, th')) return;
      e.preventDefault();
      // Update selection
      document.querySelectorAll('.card.selected').forEach(c => c.classList.remove('selected'));
      selectedIdx = i; el.classList.add('selected');
      snapshot();
      moving = { idx: i, startX: e.clientX, startY: e.clientY, origX: card.x||0, origY: card.y||0 };
      el.classList.add('moving');
    });
    const actions = document.createElement('div'); actions.className = 'card-actions';
    const delBtn = document.createElement('button'); delBtn.className = 'card-btn'; delBtn.textContent = '×';
    delBtn.onclick = e => { e.stopPropagation(); if(confirm('삭제?')) { snapshot(); cards.splice(i,1); renderCards(); saveBoard(); } };
    actions.appendChild(delBtn); el.appendChild(actions);
    if (card.type === 'text') {
      const text = document.createElement('div'); text.className = 'text'; text.contentEditable = true;
      text.innerHTML = card.content || '';
      text.addEventListener('focus', () => { snapshot(); });
      text.addEventListener('blur', () => { card.content = text.innerHTML; saveBoard(); });
      el.appendChild(text);
    } else if (card.type === 'image') {
      const img = document.createElement('img');
      img.src = card.src.startsWith('http') || card.src.startsWith('data:') ? card.src : IMG_BASE + card.src;
      img.alt = ''; img.loading = 'lazy'; img.onerror = () => img.style.display = 'none';
      if (card.w) img.style.width = card.w + 'px';
      if (card.h) img.style.height = card.h + 'px';
      if (card.link) { const a = document.createElement('a'); a.href = card.link; a.target = '_blank'; a.appendChild(img); el.appendChild(a); }
      else { el.appendChild(img); }
      if (card.caption) { const cap = document.createElement('div'); cap.style.cssText = 'font-size:11px;color:#8b949e;margin-top:4px;word-break:break-word;padding:0 2px;'; cap.textContent = card.caption; el.appendChild(cap); }
    } else if (card.type === 'html') {
      const wrapper = document.createElement('div');
      wrapper.style.cssText = 'overflow:auto;font-size:13px;line-height:1.5;';
      wrapper.innerHTML = card.html.replace(/__ATTACHMENT__/g, IMG_BASE);
      wrapper.querySelectorAll('img').forEach(img => { img.style.maxWidth = '100%'; img.style.height = 'auto'; img.draggable = false; });
      wrapper.querySelectorAll('a').forEach(a => { a.target = '_blank'; a.style.color = '#6cb0f6'; });
      wrapper.querySelectorAll('table').forEach(t => { t.style.borderCollapse = 'collapse'; });
      wrapper.querySelectorAll('td,th').forEach(td => {
        td.style.border = '1px solid #444'; td.style.padding = '4px 6px'; td.style.verticalAlign = 'top';
        td.title = '더블클릭으로 편집';
        td.addEventListener('dblclick', function(e) {
          e.stopPropagation();
          snapshot();
          this.contentEditable = 'true';
          this.style.outline = '2px solid #388bfd';
          this.style.background = 'rgba(56,139,253,0.08)';
          this.focus();
        });
        td.addEventListener('blur', function() {
          this.contentEditable = 'false';
          this.style.outline = '';
          this.style.background = '';
          cards[i].html = wrapper.innerHTML.split(IMG_BASE).join('__ATTACHMENT__');
          saveBoard();
        });
      });
      el.appendChild(wrapper);
    } else if (card.type === 'table') {
      const rows = card.rows || [['','',''],['','',''],['','','']];
      const tbl = document.createElement('table');
      tbl.style.cssText = 'border-collapse:collapse;width:100%;font-size:13px;';
      rows.forEach((row, ri) => {
        const tr = tbl.insertRow();
        row.forEach((cell, ci) => {
          const td = document.createElement(ri === 0 ? 'th' : 'td');
          td.contentEditable = true;
          td.style.cssText = 'border:1px solid #30363d;padding:4px 8px;min-width:60px;text-align:left;' + (ri===0 ? 'background:#21262d;font-weight:600;' : '');
          td.textContent = cell;
          td.addEventListener('blur', () => { if (!cards[i].rows) cards[i].rows = rows; rows[ri][ci] = td.textContent; saveBoard(); });
          tr.appendChild(td);
        });
      });
      el.appendChild(tbl);
      const addRow = document.createElement('button');
      addRow.textContent = '+ 행'; addRow.style.cssText = 'margin-top:4px;font-size:11px;background:#21262d;border:1px solid #30363d;color:#8b949e;padding:2px 8px;border-radius:4px;cursor:pointer;';
      addRow.onclick = e => { e.stopPropagation(); snapshot(); if (!cards[i].rows) cards[i].rows = rows; cards[i].rows.push(new Array(cards[i].rows[0].length).fill('')); renderCards(); saveBoard(); };
      const addCol = document.createElement('button');
      addCol.textContent = '+ 열'; addCol.style.cssText = 'margin-top:4px;margin-left:4px;font-size:11px;background:#21262d;border:1px solid #30363d;color:#8b949e;padding:2px 8px;border-radius:4px;cursor:pointer;';
      addCol.onclick = e => { e.stopPropagation(); snapshot(); if (!cards[i].rows) cards[i].rows = rows; cards[i].rows.forEach(r => r.push('')); renderCards(); saveBoard(); };
      el.appendChild(addRow); el.appendChild(addCol);
    }
    const rh = document.createElement('div'); rh.className = 'resize-handle';
    rh.addEventListener('mousedown', e => { e.preventDefault(); e.stopPropagation(); snapshot(); resizing = { idx: i, startX: e.clientX, startW: card.w || el.offsetWidth }; });
    el.appendChild(rh);
    if (i === selectedIdx) el.classList.add('selected');
    board.appendChild(el);
  });
  requestAnimationFrame(() => {
    let maxB = 0;
    document.querySelectorAll('.card').forEach(el => { const b = (parseFloat(el.style.top)||0) + el.offsetHeight; if (b > maxB) maxB = b; });
    board.style.minHeight = (maxB + 100) + 'px';
  });
}

document.addEventListener('mousemove', e => {
  if (moving) {
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`); if (!el) return;
    let nx = moving.origX + e.clientX - moving.startX, ny = moving.origY + e.clientY - moving.startY;
    if (e.shiftKey) { nx = snap(nx); ny = snap(ny); el.style.outline = '1px dashed rgba(240,192,64,0.3)'; } else { el.style.outline = ''; }
    el.style.left = nx + 'px'; el.style.top = ny + 'px';
  }
  if (resizing) {
    let nw = resizing.startW + e.clientX - resizing.startX; if (e.shiftKey) nw = snap(nw);
    cards[resizing.idx].w = Math.max(100, nw);
    const el = document.querySelector(`.card[data-idx="${resizing.idx}"]`); if (el) el.style.width = cards[resizing.idx].w + 'px';
  }
});

document.addEventListener('mouseup', e => {
  if (moving) {
    let nx = moving.origX + e.clientX - moving.startX, ny = moving.origY + e.clientY - moving.startY;
    if (e.shiftKey) { nx = snap(nx); ny = snap(ny); }
    cards[moving.idx].x = Math.max(0, nx); cards[moving.idx].y = Math.max(0, ny);
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`); if (el) { el.classList.remove('moving'); el.style.outline = ''; }
    if (e.shiftKey) pushCards(moving.idx);
    moving = null; saveBoard();
  }
  if (resizing) { if (e.shiftKey) pushCards(resizing.idx); resizing = null; saveBoard(); }
});

function addTextCard() { snapshot(); cards.push({ type: 'text', content: '', x: 50, y: window.scrollY+100, w: 300 }); renderCards(); setTimeout(() => { const els = document.querySelectorAll('.card .text'); els[els.length-1]?.focus(); }, 100); }
function addImageCard() { const input = document.createElement('input'); input.type = 'file'; input.accept = 'image/*'; input.onchange = e => { const f = e.target.files[0]; if (!f) return; const r = new FileReader(); r.onload = () => { snapshot(); cards.push({ type: 'image', src: r.result, x: 50, y: window.scrollY+100, w: 240 }); renderCards(); saveBoard(); }; r.readAsDataURL(f); }; input.click(); }
function addImageUrl() { const url = prompt('이미지 URL'); if (!url) return; snapshot(); cards.push({ type: 'image', src: url, x: 50, y: window.scrollY+100, w: 240 }); renderCards(); saveBoard(); }
function addTableCard() {
  const colsStr = prompt('열 수 (기본 3)', '3'); const cols = Math.max(1, parseInt(colsStr)||3);
  const rowsStr = prompt('행 수 (헤더 포함, 기본 4)', '4'); const rows = Math.max(1, parseInt(rowsStr)||4);
  snapshot();
  cards.push({ type: 'table', rows: Array.from({length: rows}, (_, ri) => Array.from({length: cols}, (_, ci) => ri===0 ? `열${ci+1}` : '')), x: 50, y: window.scrollY+100, w: Math.max(240, cols*100) });
  renderCards(); saveBoard();
}
function exportBoard() { syncText(); const blob = new Blob([JSON.stringify(cards, null, 2)], { type: 'application/json' }); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = SAVE_KEY + '.json'; a.click(); }
// ── Zoom ─────────────────────────────────────────────────────────────────────
let zoom = parseFloat(localStorage.getItem('zoom-' + SAVE_KEY) || '1.0');
function applyZoom() {
  const board = document.getElementById('board');
  board.style.transform = `scale(${zoom})`;
  board.style.transformOrigin = '0 0';
  document.getElementById('zoom-level').textContent = Math.round(zoom * 100) + '%';
  localStorage.setItem('zoom-' + SAVE_KEY, zoom);
}
function zoomIn()  { zoom = Math.min(3.0, parseFloat((zoom + 0.1).toFixed(2))); applyZoom(); }
function zoomOut() { zoom = Math.max(0.2, parseFloat((zoom - 0.1).toFixed(2))); applyZoom(); }
document.addEventListener('keydown', e => {
  if (e.ctrlKey || e.metaKey) {
    if (e.key === '=' || e.key === '+') { e.preventDefault(); zoomIn(); }
    if (e.key === '-')                  { e.preventDefault(); zoomOut(); }
    if (e.key === '0')                  { e.preventDefault(); zoom = 1.0; applyZoom(); }
  }
});
document.getElementById('board').addEventListener('wheel', e => {
  if (!(e.ctrlKey || e.metaKey)) return;
  e.preventDefault();
  e.deltaY < 0 ? zoomIn() : zoomOut();
}, { passive: false });
applyZoom();
function resetLayout() { if (!confirm('자동 재배치합니다.')) return; cards.forEach(c => { delete c.x; delete c.y; }); renderCards(); autoLayout(); }
// ── Floating format toolbar ───────────────────────────────────────────────────
const fmtBar = document.getElementById('format-toolbar');
function fmt(cmd) { document.execCommand(cmd, false, null); saveBoard(); }
function fmtLink() {
  const sel = window.getSelection();
  if (!sel || sel.isCollapsed) return;
  const url = prompt('링크 URL 입력', 'https://');
  if (!url) return;
  document.execCommand('createLink', false, url);
  // make links open in new tab
  sel.anchorNode?.parentElement?.closest('a')?.setAttribute('target', '_blank');
  document.querySelectorAll('.text a').forEach(a => a.target = '_blank');
  saveBoard();
}

// prevent format buttons from blurring contenteditable
fmtBar.addEventListener('mousedown', e => e.preventDefault());

document.addEventListener('selectionchange', () => {
  const sel = window.getSelection();
  if (!sel || sel.isCollapsed || !sel.toString().trim()) { fmtBar.style.display = 'none'; return; }
  // only show if selection is inside a .text element
  const anchor = sel.anchorNode;
  if (!anchor) { fmtBar.style.display = 'none'; return; }
  const textEl = anchor.nodeType === 1 ? anchor.closest('.text') : anchor.parentElement?.closest('.text');
  if (!textEl) { fmtBar.style.display = 'none'; return; }
  // position above selection
  const range = sel.getRangeAt(0);
  const rect = range.getBoundingClientRect();
  fmtBar.style.display = 'flex';
  const tbW = fmtBar.offsetWidth || 180;
  let left = rect.left + rect.width / 2 - tbW / 2;
  left = Math.max(8, Math.min(left, window.innerWidth - tbW - 8));
  fmtBar.style.left = left + 'px';
  fmtBar.style.top = (rect.top - 44 + window.scrollY) + 'px';
});

setInterval(saveBoard, 30000);
loadBoard();
</script>
</body>
</html>
