<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1e1e1e; color: #e0e0e0; font-family: 'Segoe UI', -apple-system, sans-serif; font-size: 15px; line-height: 1.6; padding: 20px 30px 60px; overflow-x: hidden; }
a { color: #6cb0f6; text-decoration: none; }
a:hover { text-decoration: underline; }
.title-bar { background: #3a3a5c; display: inline-block; padding: 6px 16px; font-size: 22px; font-weight: bold; color: #fff; margin-bottom: 4px; }
.date { color: #999; font-size: 13px; margin-bottom: 20px; }
.board { position: relative; }
.card { background: #2a2a2a; border: 1px solid #3a3a3a; border-radius: 8px; padding: 12px; position: absolute; cursor: grab; transition: box-shadow 0.15s; overflow: hidden; }
.card:hover { box-shadow: 0 0 0 1px #58a6ff; z-index: 10; }
.card.moving { opacity: 0.8; box-shadow: 0 4px 24px rgba(0,0,0,0.6); z-index: 100; cursor: grabbing; }
.card img { width: 100%; border-radius: 4px; display: block; }
.card .text { outline: none; min-height: 20px; white-space: pre-wrap; word-break: break-word; }
.card .text:focus { background: rgba(255,255,255,0.05); border-radius: 4px; padding: 4px; }
.card .text:empty::before { content: '텍스트 입력...'; color: #555; }
.card-actions { position: absolute; top: 4px; right: 4px; display: none; gap: 4px; }
.card:hover .card-actions { display: flex; }
.card-btn { background: #333; border: 1px solid #555; color: #ccc; border-radius: 4px; padding: 2px 6px; font-size: 11px; cursor: pointer; }
.card-btn:hover { background: #444; color: #fff; }
.resize-handle { position: absolute; bottom: 0; right: 0; width: 16px; height: 16px; cursor: se-resize; opacity: 0; }
.card:hover .resize-handle { opacity: 0.6; }
.resize-handle::after { content: ''; position: absolute; bottom: 3px; right: 3px; width: 8px; height: 8px; border-right: 2px solid #666; border-bottom: 2px solid #666; }
.card.selected { box-shadow: 0 0 0 2px #58a6ff; z-index: 5; }
.highlight-red { color: #ff6b6b; }
.highlight-blue { color: #6cb0f6; }
.highlight-gold { color: #f0c040; }
.toolbar { position: fixed; bottom: 0; left: 0; right: 0; background: #161b22; border-top: 1px solid #30363d; padding: 8px 20px; display: flex; gap: 12px; align-items: center; z-index: 200; }
.toolbar button { background: #21262d; border: 1px solid #30363d; color: #e0e0e0; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; }
.toolbar button:hover { background: #30363d; }
.toolbar .status { color: #8b949e; font-size: 12px; margin-left: auto; }
#format-toolbar { position: fixed; display: none; background: #1c2128; border: 1px solid #444c56; border-radius: 8px; padding: 4px 6px; gap: 2px; align-items: center; z-index: 500; box-shadow: 0 4px 16px rgba(0,0,0,0.5); }
#format-toolbar button { background: none; border: none; color: #cdd9e5; padding: 4px 8px; border-radius: 5px; cursor: pointer; font-size: 13px; line-height: 1; }
#format-toolbar button:hover { background: #373e47; }
#format-toolbar .sep { width: 1px; height: 16px; background: #444c56; margin: 0 2px; }
</style>
</head>

d Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">이에 따라 <span style=\"font-weight:bold\">고객 데이터를 기반으로 상품&#183;요금&#183;콘텐츠 이용 패턴을 정밀 분석하고, 이를 통해 상품 경쟁력과 수익성을 강화하는 데이터 드리븐 운영 체계</span>가 무엇보다 중요해졌습니다.</p>\r\n\t\t\t\t\t<br />\r\n\t\t\t\t\t<p style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">저는 투자 부문에서 미디어&#183;OTT 분야의 <span style=\"font-weight:bold\">투자 및 전략 업무를 수행하며, 데이터 기반의 의사결정과 시장 인사이트 도출 경험</span>을 축적해왔습니다.<span lang=\"en-US\"> </span>콘텐츠웨이브 출범 및 2,000억 원 투자 유치, wavve 서비스 개선 TF <span style=\"font-weight:bold\">실무 리드 담당</span> 등 미디어 사업의 전략 방향과 실행 과제를 설계했습니다.</p>\r\n\t\t\t\t\t<p style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">특히 wavve 서비스 개선 과정에서는 <span style=\"font-weight:bold\">시청 데이터와 네트워크 로그를 분석해 버퍼링, 접속 오류 등 고객 경험에 직접적인 영향을 미치는 문제를 진단하고</span>, 품질 개선 워킹그룹을 주도하여 실제 개선 효과를 도출했습니다.</p>\r\n\t\t\t\t\t<p style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">이 경험을 통해 데이터 기반 문제 정의와 실행 사이의 연결 고리를 깊이 있게 체득할 수 있었습니다.</p>\r\n\t\t\t\t\t<br />\r\n\t\t\t\t\t<p lang=\"en-US\" style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:NanumGothic;font-size:11pt;color:#292929\">이제는, </span><span lang=\"ko-KR\" style=\"font-family:NanumGothic;font-size:11pt;color:#292929\">그간</span><span style=\"font-family:NanumGothic;font-size:11pt;color:#292929\"> </span><span lang=\"ko-KR\" style=\"font-family:NanumGothic;font-size:11pt;color:#292929\">축적한</span><span style=\"font-family:NanumGothic;font-size:11pt;color:#292929\"> </span><span lang=\"ko-KR\" style=\"font-family:NanumGothic;font-size:11pt;color:#292929\">유선&#183;미디어</span><span style=\"font-family:NanumGothic;font-size:11pt;color:#292929\"> </span><span lang=\"ko-KR\" style=\"font-family:NanumGothic;font-size:11pt;color:#292929\">사업</span><span style=\"font-family:NanumGothic;font-size:11pt;color:#292929\"> </span><span lang=\"ko-KR\" style=\"font-family:NanumGothi ily:NanumGothic;font-size:11pt;color:#292929\">을 </span><span style=\"font-family:NanumGothic;font-size:11pt;color:#292929\">경험했습니다</span><span lang=\"en-US\" style=\"font-family:NanumGothic;font-size:11pt;color:#292929\">.</span></p>\r\n\t\t\t\t\t<br />\r\n\t\t\t\t\t<p style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:NanumGothic;font-size:11pt;color:#292929\">또한</span><span lang=\"en-US\" style=\"font-family:NanumGothic;font-size:11pt;color:#292929\"> IPTV와 oksusu에 대한 지속적인 관심은 여러 차례 구체적인 제안으로 이어졌습니다. &#39;</span><span style=\"font-family:NanumGothic;font-size:11pt;color:#292929\">디바이스형</span><span lang=\"en-US\" style=\"font-family:NanumGothic;font-size:11pt;color:#292929\"> IPTV </span><span style=\"font-family:NanumGothic;font-size:11pt;color:#292929\">셋톱박스</span><span lang=\"en-US\" style=\"font-family:NanumGothic;font-size:11pt;color:#292929\"> </span><span style=\"font-family:NanumGothic;font-size:11pt;color:#292929\">제안</span><span lang=\"en-US\" style=\"font-family:NanumGothic;font-size:11pt;color:#292929\">&#39;, &#39;</span><span style=\"font-family:NanumGothic;font-size:11pt;color:#292929\">반응형</span><span lang=\"en-US\" style=\"font-family:NanumGothic;font-size:11pt;color:#292929\"> IPTV </span><span style=\"font-family:NanumGothic;font-size:11pt;color:#292929\">리모컨</span><span lang=\"en-US\" style=\"font-family:NanumGothic;font-size:11pt;color:#292929\"> </span><span style=\"font-family:NanumGothic;font-size:11pt;color:#292929\">제안</span><span lang=\"en-US\" style=\"font-family:NanumGothic;font-size:11pt;color:#292929\">&#39;, &#39;oksusu </span><span style=\"font-family:NanumGothic;font-size:11pt;color:#292929\">서비스</span><span lang=\"en-US\" style=\"font-family:NanumGothic;font-size:11pt;color:#292929\"> </span><span style=\"font-family:NanumGothic;font-size:11pt;color:#292929\">개선</span><span lang=\"en-US\" style=\"font-family:NanumGothic;font-size:11pt;color:#292929\"> </span><span style=\"font-family:NanumGothic;font-size:11pt;color:#292929\">제안</span><span lang=\"en-US\" style=\"font-family:NanumGothic;font-size:11pt;color:#292929\">&#39;</span><span style=\"font-family:NanumGothic;font-size:11pt;color:#292929\">은</span><span lang=\"en-US\" style=\"font-family:NanumGothic;font-size:11pt;color:#292929\"> &#39;제1회 T-지니어스 대상 (NUGU)&#39; 및 &#39;제5회 T-icon 대상 (oksusu)&#39;</span><span style=\"font-family:NanumGothic;font-size:11pt;color:#292929\">등</span><span lang=\"en-US\" style=\"font-family:NanumGothic;font-size:11pt;color:#292929\"> </span><span style=\"font-family:NanumGothic;font-size:11pt;color:#292929\">총</span><span lang=\"en-US\" style=\"font-family:NanumGothic;font-size:11pt;color:#292929\"> 3</span><span style=\"font-family:NanumGothic;font-size:11pt;color:#292929\">회의</span><span lang=\"en-US\" style=\"font-family:NanumGothic;font-size:11pt;color:#292929\"> </span><span style=\"font-family:NanumGothic;font-size:11pt;color:#292929\">대상</span><span lang=\"en-US\" style=\"font-family:NanumGothic;font-size:11pt;color:#292929\"> 수상 경력</span><span style=\"font-family:NanumGothic;font-size:11pt;color:#292929\">을</span><span lang=\"en-US\" style=\"font-family:NanumGothic;font-size:11pt;color:#292929\"> </span><span style=\"font-family:NanumGothic;font-size:11pt;color:#292929\">통해</span><span lang=\"en-US\" style=\"font-family:NanumGothic;font-size:11pt;color:#292929\"> </span><span style=\"font-family:NanumGothic;font-size:11pt;color:#292929\">고객</span><span lang=\"en-US\" style=\"font-family:NanumGothic;font-size:11pt;color:#292929\"> </span><span style=\"font-family:NanumGothic;font-size:11pt;color:#292929\">경험</span><span lang=\"en-US\" style=\"font-family:NanumGothic;font-size:11pt;color:#292929\"> </span><span style=\"font-family:NanumGothic;font-size:11pt;color:#292929\">중심의</span><span lang=\"en-US\" style=\"font-family:NanumGothic;font-size:11pt;color:#292929\"> </span><span style=\"font-family:NanumGothic;font-size:11pt;color:#292929\"> umGothic;font-size:11pt;color:#292929\"> 데이터 기반의 문제 해결 능력</span><span lang=\"ko-KR\" style=\"font-family:NanumGothic;font-size:11pt;color:#292929\">을</span><span style=\"font-family:NanumGothic;font-size:11pt;color:#292929\"> </span><span lang=\"ko-KR\" style=\"font-family:NanumGothic;font-size:11pt;color:#292929\">설명드릴</span><span style=\"font-family:NanumGothic;font-size:11pt;color:#292929\"> </span><span lang=\"ko-KR\" style=\"font-family:NanumGothic;font-size:11pt;color:#292929\">수</span><span style=\"font-family:NanumGothic;font-size:11pt;color:#292929\"> </span><span lang=\"ko-KR\" style=\"font-family:NanumGothic;font-size:11pt;color:#292929\">있습니다</span><span style=\"font-family:NanumGothic;font-size:11pt;color:#292929\">.</span></p>\r\n\t\t\t\t\t<br />\r\n\t\t\t\t\t<br />\r\n\t\t\t\t\t<p lang=\"en-US\" style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:NanumGothic;font-size:11pt;color:#292929\">[2] 데이터 기반 고객/실적 분석 및 통계 역량</span></p>\r\n\t\t\t\t\t<p lang=\"en-US\" style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">유선 경책팀의 핵심 업무는 실적 관리<span lang=\"ko-KR\">와</span> 고객/경쟁 환경 분석<span lang=\"ko-KR\">으로</span> <span lang=\"ko-KR\">이해하고</span> <span lang=\"ko-KR\">있습니다</span>. 저는 수년간의 정량 분석 경험을 통해, <span lang=\"ko-KR\">정량 분석 경험을 통해 데이터를 실행 가능한 전략으로 전환하는 역량을 갖추었습니다.</span></p>\r\n\t\t\t\t\t<br />\r\n\t\t\t\t\t<p lang=\"en-US\" style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:NanumGothic;font-size:11pt;color:#292929\">wavve </span><span lang=\"ko-KR\" style=\"font-family:NanumGothic;font-size:11pt;color:#292929\">개선</span><span style=\"font-family:NanumGothic;font-size:11pt;color:#292929\"> </span><span lang=\"ko-KR\" style=\"font-family:NanumGothic;font-size:11pt;color:#292929\">과정에서는</span><span style=\"font-family:NanumGothic;font-size:11pt;color:#292929\"> </span><span lang=\"ko-KR\" style=\"font-family:NanumGothic;font-size:11pt;color:#292929\">네트워크&#183;서비스</span><span style=\"font-family:NanumGothic;font-size:11pt;color:#292929\"> </span><span lang=\"ko-KR\" style=\"font-family:NanumGothic;font-size:11pt;color:#292929\">품질</span><span style=\"font-family:NanumGothic;font-size:11pt;color:#292929\"> </span><span lang=\"ko-KR\" style=\"font-family:NanumGothic;font-size:11pt;color:#292929\">데이터를</span><span style=\"font-family:NanumGothic;font-size:11pt;color:#292929\"> </span><span lang=\"ko-KR\" style=\"font-family:NanumGothic;font-size:11pt;color:#292929\">기반으로</span><span style=\"font-family:NanumGothic;font-size:11pt;color:#292929\"> </span><span lang=\"ko-KR\" style=\"font-family:NanumGothic;font-size:11pt;color:#292929\">장애</span><span style=\"font-family:NanumGothic;font-size:11pt;color:#292929\"> </span><span lang=\"ko-KR\" style=\"font-family:NanumGothic;font-size:11pt;color:#292929\">징후를</span><span style=\"font-family:NanumGothic;font-size:11pt;color:#292929\"> </span><span lang=\"ko-KR\" style=\"font-family:NanumGothic;font-size:11pt;color:#292929\">조기</span><span style=\"font-family:NanumGothic;font-size:11pt;color:#292929\"> </span><span lang=\"ko-KR\" style=\"font-family:NanumGothic;font-size:11pt;color:#292929\">탐지하고</span><span style=\"font-family:NanumGothic;font-size:11pt;color:#292929\">,</span><span lang=\"ko-KR\" style=\"font-family:NanumGothic;font-size:11pt;color:#292929\">정량&#183;정성</span><span style=\"font-family:NanumGothic;font-size:11pt;color:#292929\"> </span><span lang=\"ko-KR\" style=\"font-family:NanumGothic;font-size:11pt;color:#292929\">분석을</span><span style=\"font-family:NanumGothic;font-size:11pt;color:#292929\"> </span><span lang=\"ko-KR\" style=\"font-family:NanumGothic;font-size:11pt;color:#292929\">병행하여</span><span style=\"font-family:NanumGothic;font-size:11pt;color:#292929\"> </span><span lang=\"ko-KR\" style=\"font-family:NanumGothic;font-size:11pt;color:#292929\">데이터</span><span style=\"font-family:NanumGothic;font-size:11pt;color:#292929\"> </span><span lang=\"ko-KR\" style=\"font-family:NanumGothic;font-size:11pt;color:#292929\">기반</span><span style=\"font-family:NanumGothic;font-size:11pt;color:#292929\"> </span><span lang=\"ko-KR\" style=\"font-family:NanumGothic;font-size:11pt;color:#292929\">서비스</span><span style=\"font-family:NanumGothic;font-size:11pt;color:#292929\"> </span><span lang=\"ko-KR\" style=\"font-family:NanumGothic;font-size:11pt;color:#292929\">안정화</span><span style=\"font-family:NanumGothic;font-size:11pt;color:#292929\"> </span><span lang=\"ko-KR\" style=\"font-family:NanumGothic;font-size:11pt;color:#292929\">성과를</span><span style=\"font-family:NanumGothic;font-size:11pt;color:#292929\"> </span><span lang=\"ko-KR\" style=\"font-family:NanumGothic;font-size:11pt;color:#292929\">도출했습니다</span><span style=\"font-family:NanumGothic;font-size:11pt;color:#292929\">.</span></p>\r\n\t\t\t\t\t<br />\r\n\t\t\t\t\t<p lang=\"en-US\" style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:NanumGothic;font-size:11pt;color:#292929\">수년간의 </span><span lang=\"ko-KR\" style=\"font-family:NanumGothic;font-size:11pt;color:#292929\">투자</span><span style=\"font-family:NanumGothic;font-size:11pt;color:#292929\"> </span><span lang=\"ko-KR\" style=\"font-family:NanumGothic;font-size:11pt;color:#292929\">업무를</span><span style=\"font-family:NanumGothic;font-size:11pt;color:#292929\"> </span><span lang=\"ko-KR\" style=\"font-family:NanumGothic;font-size:11pt;color:#292929\">통해서</span><span style=\"font-family:NanumGothic;font-size:11pt;color:#292929\">, 기업가치 평가(DCF, Multiple Method) </span><span lang=\"ko-KR\" style=\"font-family:NanumGothic;font-size:11pt;color:#292929\">및</span><span style=\"font-family:NanumGothic;font-size:11pt;color:#292929\"> </span><span lang=\"ko-KR\" style=\"font-family:NanumGothic;font-size:11pt;color:#292929\">시나리오</span><span style=\"font-family:NanumGothic;font-size:11pt;color:#292929\"> </span><span lang=\"ko-KR\" style=\"font-family:NanumGothic;font-size:11pt;color:#292929\">분석을</span><span style=\"font-family:NanumGothic;font-size:11pt;color:#292929\"> </span><span lang=\"ko-KR\" style=\"font-family:NanumGothic;font-size:11pt;color:#292929\">수행하며</span><span style=\"font-family:NanumGothic;font-size:11pt;color:#292929\">, 정량 데이터를 논리적으로 해석하고, 의사결정자에게 직관적으로 전달하는 통계적 사고력을 </span><span lang=\"ko-KR\" style=\"font-family:NanumGothic;font-size:11pt;color:#292929\">발전시켰습니</span><span style=\"font-family:NanumGothic;font-size:11pt;color:#292929\">다. </span><span lang=\"ko-KR\" style=\"font-family:NanumGothic;font-size:11pt;color:#292929\">이러한 경험은</span><span style=\"font-family:NanumGothic;font-size:11pt;color:#292929\">, 상품별 수익성 분석, 채널별 실적 관리, 유선 Offer</span><span lang=\"ko-KR\" style=\"font-family:NanumGothic;font-size:11pt;color:#292929\">별</span><span style=\"font-family:NanumGothic;font-size:11pt;color:#292929\"> 적정 수익성과 리스크를 정교하게 시뮬레이션하</span><span lang=\"ko-KR\" style=\"font-family:NanumGothic;font-size:11pt;color:#292929\">여</span><span style=\"font-family:NanumGothic;font-size:11pt;color:#292929\">, </span><span lang=\"ko-KR\" style=\"font-family:NanumGothic;font-size:11pt;color:#292929\">데이터 기반 정책 설계 업무에 직접 기여할 수 있습니다.</span></p>\r\n\t\t\t\t\t<br />\r\n\t\t\t\t\t<br />\r\n\t\t\t\t\t<p lang=\"en-US\" style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:NanumGothic;font-size:11pt;color:#292929\">[3] TB 시너지 및 복잡한 이해관계자 조율 역량</span></p>\r\n\t\t\t\t\t<p lang=\"en-US\" style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:NanumGothic;font-size:11pt;color:#292929\">저는 복잡한 이해관계를 조율하고, 최고위층 의사결정을 지원하</span><span lang=\"ko-KR\" style=\"font-family:NanumGothic;font-size:11pt;color:#292929\">여</span><span style=\"font-family:NanumGothic;font-size:11pt;color:#292929\"> 실행으로 완결시킨 다수의 경험을 보유하고 있습니다.</span></p>\r\n\t\t\t\t\t<br />\r\n\t\t\t\t\t<p lang=\"en-US\" style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:NanumGothic;font-size:11pt;color:#292929\">콘텐츠웨이브 출범 과정에서는 국내 방송 3사를 비롯한 복잡한 이해관계자들 간의 협상을 주도하며, 각사의 이해를 반영한 최적의 협력 구조를 설계했습니다. </span><span lang=\"ko-KR\" style=\"font-family:NanumGothic;font-size:11pt;color:#292929\">이후</span><span style=\"font-family:NanumGothic;font-size:11pt;color:#292929\"> 콘텐츠웨이브 2,000억 투자 유치 과정에서</span><span lang=\"ko-KR\" style=\"font-family:NanumGothic;font-size:11pt;color:#292929\">는</span><span style=\"font-family:NanumGothic;font-size:11pt;color:#292929\"> IM 작성 및 IR 활동을 수행하며 복수</span><span lang=\"ko-KR\" style=\"font-family:NanumGothic;font-size:11pt;color:#292929\">의</span><span style=\"font-family:NanumGothic;font-size:11pt;color:#292929\"> </span><span lang=\"ko-KR\" style=\"font-family:NanumGothic;font-size:11pt;color:#292929\">투자자</span><span style=\"font-family:NanumGothic;font-size:11pt;color:#292929\"> </span><span lang=\"ko-KR\" style=\"font-family:NanumGothic;font-size:11pt;color:#292929\">및</span><span style=\"font-family:NanumGothic;font-size:11pt;color:#292929\"> </span><span lang=\"ko-KR\" style=\"font-family:NanumGothic;font-size:11pt;color:#292929\">방송사</span><span style=\"font-family:NanumGothic;font-size:11pt;color:#292929\"> 간의 합의를 성공적으로 이끌어낸</span><span lang=\"ko-KR\" style=\"font-family:NanumGothic;font-size:11pt;color:#292929\">바</span><span style=\"font-family:NanumGothic;font-size:11pt;color:#292929\"> </span><span lang=\"ko-KR\" style=\"font-family:NanumGothic;font-size:11pt;color:#292929\">있습니다</span><span style=\"font-family:NanumGothic;font-size:11pt;color:#292929\">.</span></p>\r\n\t\t\t\t\t<br />\r\n\t\t\t\t\t<p style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:NanumGothic;font-size:11pt;color:#292929\">또한</span><span lang=\"en-US\" style=\"font-family:NanumGothic;font-size:11pt;color:#292929\"> 마케팅전략팀에서 단말기 GTM 및 고객가치 제고 캠페인 업무를 수행하며, 전략 기획뿐 아니라 실제 실행까지 경험한 바 있어, TB 시너지 과제 도출부터 실행/관리까지 End-to-End로 기여할 수 있습니다.</span></p>\r\n\t\t\t\t\t<br />\r\n\t\t\t\t\t<p lang=\"en-US\" style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:NanumGothic;font-size:11pt;color:#292929\">AI전략실에서</span><span lang=\"ko-KR\" style=\"font-family:NanumGothic;font-size:11pt;color:#292929\">는</span><span style=\"font-family:NanumGothic;font-size:11pt;color:#292929\"> AI 4대 사업영역과 3개 R&amp;D 센터의 통합 관점 전략 수립, PAA </span><span lang=\"ko-KR\" style=\"font-family:NanumGothic;font-size:11pt;color:#292929\">통합전략</span><span style=\"font-family:NanumGothic;font-size:11pt;color:#292929\">, </span><span lang=\"ko-KR\" style=\"font-family:NanumGothic;font-size:11pt;color:#292929\">미래전략회의</span><span style=\"font-family:NanumGothic;font-size:11pt;color:#292929\"> </span><span lang=\"ko-KR\" style=\"font-family:NanumGothic;font-size:11pt;color:#292929\">등</span><span style=\"font-family:NanumGothic;font-size:11pt;color:#292929\"> </span><span lang=\"ko-KR\" style=\"font-family:NanumGothic;font-size:11pt;color:#292929\">대규모</span><span style=\"font-family:NanumGothic;font-size:11pt;color:#292929\"> </span><span lang=\"ko-KR\" style=\"font-family:NanumGothic;font-size:11pt;color:#292929\">프로젝트를</span><span style=\"font-family:NanumGothic;font-size:11pt;color:#292929\"> </span><span lang=\"ko-KR\" style=\"font-family:NanumGothic;font-size:11pt;color:#292929\">수행하면서</span><span style=\"font-family:NanumGothic;font-size:11pt;color:#292929\">,</span><span lang=\"ko-KR\" style=\"font-family:NanumGothic;font-size:11pt;color:#292929\">&#160;</span><span style=\"font-family:NanumGothic;font-size:11pt;color:#292929\">서로 </span><span lang=\"ko-KR\" style=\"font-family:NanumGothic;font-size:11pt;color:#292929\">상이한</span><span style=\"font-family:NanumGothic;font-size:11pt;color:#292929\"> 목표를 가진 조직들 간의 Alignment를 이끌어</span><span lang=\"ko-KR\" style=\"font-family:NanumGothic;font-size:11pt;color:#292929\">내는</span><span style=\"font-family:NanumGothic;font-size:11pt;color:#292929\"> </span><span lang=\"ko-KR\" style=\"font-family:NanumGothic;font-size:11pt;color:#292929\">경험을</span><span style=\"font-family:NanumGothic;font-size:11pt;color:#292929\"> </span><span lang=\"ko-KR\" style=\"font-family:NanumGothic;font-size:11pt;color:#292929\">축적했습니다</span><span style=\"font-family:NanumGothic;font-size:11pt;color:#292929\">. </span><span style=\"font-family:NanumGothic;color:#292929\">ICT 위원회 지원 업무에서는 그룹 내 주요 멤버사 데이터를 통합&#183;정제해 비교 분석하며,&#160;데이터를 매개로 조직 간 이해를 맞추는 커뮤니케이션 역량을 쌓았습니다.</span></p>\r\n\t\t\t\t\t<br />\r\n\t\t\t\t\t<p lang=\"en-US\" style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:NanumGothic;font-size:11pt;color:#292929\">요컨대, Career </span><span style=\"font-family:NanumGothic;color:#292929\">초기 경험을 통해 유선/미디어 영역의 </span><span lang=\"ko-KR\" style=\"font-family:NanumGothic;color:#292929\">고객과 현장의 이해</span><span style=\"font-family:NanumGothic;color:#292929\">를 갖추었으며, 후기 경험을 통해 재무적 분석과 전략 실행 능력을 보강했습니다. </span></p>\r\n\t\t\t\t\t<br />\r\n\t\t\t\t\t<p lang=\"en-US\" style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:NanumGothic;font-size:11pt;color:#292929\">유</span><span lang=\"ko-KR\" style=\"font-family:NanumGothic;font-size:11pt;color:#292929\">무</span><span style=\"font-family:NanumGothic;font-size:11pt;color:#292929\">선 사업 </span><span lang=\"ko-KR\" style=\"font-family:NanumGothic;font-size:11pt;color:#292929\">전반에</span><span style=\"font-family:NanumGothic;font-size:11pt;color:#292929\"> 대한 이해와 현장 감각, 데이터 기반의 고객/실적 분석</span><span lang=\"ko-KR\" style=\"font-family:NanumGothic;font-size:11pt;color:#292929\">력</span><span style=\"font-family:NanumGothic;font-size:11pt;color:#292929\">, 전략 수립 및 조직 간 조율 경험</span><span lang=\"ko-KR\" style=\"font-family:NanumGothic;font-size:11pt;color:#292929\">을</span><span style=\"font-family:NanumGothic;font-size:11pt;color:#292929\"> </span><span lang=\"ko-KR\" style=\"font-family:NanumGothic;font-size:11pt;color:#292929\">기반으로</span><span style=\"font-family:NanumGothic;font-size:11pt;color:#292929\">, 단순한 데이터 보고를 넘어&#160;지표 간 인과를 해석하고, 실행 가능한 정책</span><span lang=\"ko-KR\" style=\"font-family:NanumGothic;font-size:11pt;color:#292929\">으로</span><span style=\"font-family:NanumGothic;font-size:11pt;color:#292929\"> </span><span lang=\"ko-KR\" style=\"font-family:NanumGothic;font-size:11pt;color:#292929\">변환하는</span><span style=\"font-family:NanumGothic;font-size:11pt;color:#292929\">, </span><span lang=\"ko-KR\" style=\"font-family:NanumGothic;font-size:11pt;color:#292929\">분석형</span><span style=\"font-family:NanumGothic;font-size:11pt;color:#292929\"> </span><span lang=\"ko-KR\" style=\"font-family:NanumGothic;font-size:11pt;color:#292929\">기획자로서</span><span style=\"font-family:NanumGothic;font-size:11pt;color:#292929\"> </span><span lang=\"ko-KR\" style=\"font-family:NanumGothic;font-size:11pt;color:#292929\">기여하겠습니다</span><span style=\"font-family:NanumGothic;font-size:11pt;color:#292929\">.</span></p>\r\n\t\t\t\t\t</td>\r\n\t\t\t\t</tr>\r\n\t\t\t\t<tr>\r\n\t\t\t\t\t<td style=\"background-color:#f3f3f3;border:1px solid;font-family:Pretendard Light;text-align:center\"><span style=\"font-family:NanumGothic;color:#2d2d2d;font-weight:bold\">향후 Career Vision은 무엇입니까?</span></td>\r\n\t\t\t\t</tr>\r\n\t\t\t\t<tr>\r\n\t\t\t\t\t<td style=\"border:1px solid\"><p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">그간 전략 기획과 투자 업무를 수행하며 사업의 방향성을 설계하고 의사결정을 지원하는 역량을 쌓아왔습니다. 하지만 Career의 출발점이었던 유선 사업으로 돌아가, 페이퍼 위의 전략이 아닌 실질적인 실행과 성과 창출을 경험하고 싶습니다.</span></p>\r\n\t\t\t\t\t<br />\r\n\t\t\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">제가 축적해온 유선 사업</span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">에</spa t\"><span style=\"font-family:Malgun Gothic\">중기적으로는, AT/DT의 핵심 과제인&#160;데이터 기반 영업정책 자동화 및 시뮬레이션 체계 구축에 기여하</span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">겠습니다</span><span style=\"font-family:Malgun Gothic\">.</span></p>\r\n\t\t\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">투자부문에서</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> 수행했던 Valuation&#183;시장 예측&#183;시나리오 분석 경험을 바탕으로,</span></p>\r\n\t\t\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">고객군별 이탈&#183;전환 확률 모델, 결합상품 수익성 분석, 정책별 ROI 측정 체계를 설계해</span></p>\r\n\t\t\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">정책의 가설→실행→검증 과정을 과학적으로 관리</span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">하겠습니다</span><span style=\"font-family:Malgun Gothic\">.</span></p>\r\n\t\t\t\t\t<br />\r\n\t\t\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">장기적으로는 TB One Body 관점에서 무선&#183;유선&#183;콘텐츠를 아우르는 통합 정책 구조를 설계하는 MNO 데이터 전략 리더로 성장하겠습니다. AI전략실에서의 거시적 시각과 통계 기반의 정책 해석 역량을 결합해, 영업정책의 디지털 전환을 실질적으로 추진하고, 정책 기획이 현장의 성과로 바로 이어지는 실행 중심의 데이터 조직 문화를 정착 시키겠습니다.</span></p>\r\n\t\t\t\t\t<br />\r\n\t\t\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">저는 </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">이제</span><span style=\"font-family:Malgun Gothic\"> 페이퍼 위의 전략</span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">을</span><span style=\"font-family:Malgun Gothic\"> 넘어, 데이터</span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">를</span><span style=\"font-family:Malgun Gothic\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">통해</span><span style=\"font-family:Malgun Gothic\"> 정책의 효과를 측정&#183;개선하는&#160;실행형 전략가로 커리어를 확장하고자 합니다. 유선정책팀의 구성원으로서,&#160;통계 기반 정책 기획력과 현장 실행력을 겸비한 인재로 성장하며 궁극적으로는, MNO 사업의 AT/DT 관점에서 실질적 변화를 만드는 것이 저의 목표입니다.</span></p>\r\n\t\t\t\t\t</td>\r\n\t\t\t\t</tr>\r\n\t\t\t</table>\r\n\t\t"
  },
  {
    "type": "text",
    "x": 744,
    "y": 1051,
    "w": 551,
    "content": "특히 wavve 서비스 개선 과정에서는 네트워크&#183;서비스 품질 관점에서 장애 징후를 사전에 탐지하는 워킹그룹을 운영하며,\n버퍼링&#183;접속 오류 등 고객 경험에 직접적인 영향을 미치는 요소를 개선해\n데이터 기반의 서비스 안정화 성과를 만들어냈습니다.\n이제는 이러한 미디어 사업 이해도, 데이터 기반 분석력, 복잡한 이해관계 조율 경험을\n유선 사업에 직접 적용하고자 합니다.\n전략 수립에서 그치지 않고 TB 시너지 기획, 상품 실적 분석, 채널 관리 등 영업의 최전선에서 실질적 성과를 창출하는 일에 기여하고 싶습니다."
  }
];
const CONTENT_HASH = '42820634';

let cards = [];
let moving = null, resizing = null;
let selectedIdx = null, clipboardCard = null;
const GRID = 20, GAP = 14;
function snap(v) { return Math.round(v / GRID) * GRID; }

// ── Undo (Ctrl+Z) ────────────────────────────────────────────────────────────
const MAX_HISTORY = 50;
let history = [];
function snapshot() {
  syncText();
  history.push(JSON.stringify(cards));
  if (history.length > MAX_HISTORY) history.shift();
}
function undo() {
  if (!history.length) { showStatus('되돌릴 내용 없음'); return; }
  syncText();
  cards = JSON.parse(history.pop());
  renderCards();
  saveBoard();
  showStatus('↩ 되돌림');
}
function showStatus(msg) {
  const s = document.getElementById('status');
  s.textContent = msg;
  clearTimeout(showStatus._t);
  showStatus._t = setTimeout(() => { s.textContent = ''; }, 2000);
}
document.addEventListener('keydown', e => {
  const isText = document.activeElement?.contentEditable === 'true';
  if ((e.ctrlKey || e.metaKey) && e.key === 'z' && !e.shiftKey) {
    if (isText) return;
    e.preventDefault();
    undo();
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'c' && !e.shiftKey && !isText) {
    if (selectedIdx !== null && cards[selectedIdx]) {
      syncText();
      clipboardCard = JSON.parse(JSON.stringify(cards[selectedIdx]));
      showStatus('카드 복사됨');
      e.preventDefault();
    }
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'v' && !e.shiftKey && !isText) {
    if (clipboardCard) {
      e.preventDefault();
      snapshot();
      const nc = JSON.parse(JSON.stringify(clipboardCard));
      nc.x = (nc.x || 0) + 30; nc.y = (nc.y || 0) + 30;
      cards.push(nc);
      selectedIdx = cards.length - 1;
      renderCards(); saveBoard();
      showStatus('카드 붙여넣음');
    }
  }
  if (e.key === 'Escape') {
    document.querySelectorAll('.card.selected').forEach(c => c.classList.remove('selected'));
    selectedIdx = null;
  }
});

function pushCards(movedIdx) {
  const moved = cards[movedIdx];
  const movedEl = document.querySelector(`.card[data-idx="${movedIdx}"]`);
  if (!movedEl) return;
  const mh = movedEl.offsetHeight;
  document.querySelectorAll('.card').forEach(el => {
    const i = +el.dataset.idx;
    if (i === movedIdx) return;
    const c = cards[i], oh = el.offsetHeight;
    if (moved.x < (c.x+(c.w||200)) && (moved.x+(moved.w||200)) > c.x && moved.y < (c.y+oh) && (moved.y+mh) > c.y) {
      c.y = moved.y + mh + GAP;
      el.style.top = c.y + 'px';
    }
  });
}

function loadBoard() {
  const saved = localStorage.getItem(SAVE_KEY);
  const savedHash = localStorage.getItem(SAVE_KEY + ':hash');
  let parsed = null;
  try { parsed = saved ? JSON.parse(saved) : null; } catch(e) {}
  // reset if: no save, empty array, or content hash changed (page regenerated)
  if (!parsed || parsed.length === 0 || savedHash !== CONTENT_HASH) {
    cards = DEFAULT_CARDS.map(c => ({...c}));
    localStorage.removeItem(SAVE_KEY);
    localStorage.setItem(SAVE_KEY + ':hash', CONTENT_HASH);
    renderCards();
    const hasCoords = cards.some(c => c.x !== undefined && c.y !== undefined);
    if (!hasCoords) autoLayout();
    return;
  }
  cards = parsed;
  renderCards();
}
function resetToDefaults() { if (!confirm('저장된 보드를 지우고 원본으로 초기화합니다. 계속할까요?')) return; localStorage.removeItem(SAVE_KEY); cards = DEFAULT_CARDS.map(c => ({...c})); renderCards(); autoLayout(); }

function autoLayout() {
  const boardW = document.getElementById('board').offsetWidth;
  const cols = Math.max(1, Math.floor(boardW / 280));
  const colW = (boardW - GAP*(cols-1)) / cols;
  const colH = new Array(cols).fill(0);
  const allCards = document.querySelectorAll('.card');
  const images = document.querySelectorAll('.card img');
  let loaded = 0;
  function place() {
    allCards.forEach((el, i) => {
      const w = Math.min(cards[i].w || colW, colW);
      let minCol = 0;
      for (let c = 1; c < cols; c++) if (colH[c] < colH[minCol]) minCol = c;
      cards[i].x = minCol * (colW + GAP);
      cards[i].y = colH[minCol];
      cards[i].w = w;
      el.style.left = cards[i].x + 'px';
      el.style.top = cards[i].y + 'px';
      el.style.width = w + 'px';
      colH[minCol] = cards[i].y + el.offsetHeight + GAP;
    });
    document.getElementById('board').style.minHeight = (Math.max(...colH) + 100) + 'px';
    saveBoard();
  }
  if (!images.length) { requestAnimationFrame(place); return; }
  images.forEach(img => {
    if (img.complete) { loaded++; if (loaded >= images.length) requestAnimationFrame(place); }
    else { img.onload = img.onerror = () => { loaded++; if (loaded >= images.length) requestAnimationFrame(place); }; }
  });
}

function syncText() {
  document.querySelectorAll('.card').forEach(el => {
    const i = +el.dataset.idx;
    if (cards[i]?.type === 'text') { const t = el.querySelector('.text'); if (t) cards[i].content = t.innerHTML; }
  });
}
function saveBoard() { syncText(); localStorage.setItem(SAVE_KEY, JSON.stringify(cards)); localStorage.setItem(SAVE_KEY + ':hash', CONTENT_HASH); showStatus('저장됨 ' + new Date().toLocaleTimeString()); }

function renderCards() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  cards.forEach((card, i) => {
    const el = document.createElement('div');
    el.className = 'card'; el.dataset.idx = i;
    if (card.x !== undefined) el.style.left = card.x + 'px';
    if (card.y !== undefined) el.style.top = card.y + 'px';
    // html cards contain raw OneNote table HTML which may overflow the stated div width
    if (card.w) { if (card.type === 'html') el.style.minWidth = card.w + 'px'; else el.style.width = card.w + 'px'; }
    el.addEventListener('mousedown', e => {
      if (e.target.closest('.text, a, .card-btn, .resize-handle, td, th')) return;
      e.preventDefault();
      // Update selection
      document.querySelectorAll('.card.selected').forEach(c => c.classList.remove('selected'));
      selectedIdx = i; el.classList.add('selected');
      snapshot();
      moving = { idx: i, startX: e.clientX, startY: e.clientY, origX: card.x||0, origY: card.y||0 };
      el.classList.add('moving');
    });
    const actions = document.createElement('div'); actions.className = 'card-actions';
    const delBtn = document.createElement('button'); delBtn.className = 'card-btn'; delBtn.textContent = '×';
    delBtn.onclick = e => { e.stopPropagation(); if(confirm('삭제?')) { snapshot(); cards.splice(i,1); renderCards(); saveBoard(); } };
    actions.appendChild(delBtn); el.appendChild(actions);
    if (card.type === 'text') {
      const text = document.createElement('div'); text.className = 'text'; text.contentEditable = true;
      text.innerHTML = card.content || '';
      text.addEventListener('focus', () => { snapshot(); });
      text.addEventListener('blur', () => { card.content = text.innerHTML; saveBoard(); });
      el.appendChild(text);
    } else if (card.type === 'image') {
      const img = document.createElement('img');
      img.src = card.src.startsWith('http') || card.src.startsWith('data:') ? card.src : IMG_BASE + card.src;
      img.alt = ''; img.loading = 'lazy'; img.onerror = () => img.style.display = 'none';
      if (card.w) img.style.width = card.w + 'px';
      if (card.h) img.style.height = card.h + 'px';
      if (card.link) { const a = document.createElement('a'); a.href = card.link; a.target = '_blank'; a.appendChild(img); el.appendChild(a); }
      else { el.appendChild(img); }
      if (card.caption) { const cap = document.createElement('div'); cap.style.cssText = 'font-size:11px;color:#8b949e;margin-top:4px;word-break:break-word;padding:0 2px;'; cap.textContent = card.caption; el.appendChild(cap); }
    } else if (card.type === 'html') {
      const wrapper = document.createElement('div');
      wrapper.style.cssText = 'overflow:auto;font-size:13px;line-height:1.5;';
      wrapper.innerHTML = card.html.replace(/__ATTACHMENT__/g, IMG_BASE);
      wrapper.querySelectorAll('img').forEach(img => { img.style.maxWidth = '100%'; img.style.height = 'auto'; img.draggable = false; });
      wrapper.querySelectorAll('a').forEach(a => { a.target = '_blank'; a.style.color = '#6cb0f6'; });
      wrapper.querySelectorAll('table').forEach(t => { t.style.borderCollapse = 'collapse'; });
      wrapper.querySelectorAll('td,th').forEach(td => {
        td.style.border = '1px solid #444'; td.style.padding = '4px 6px'; td.style.verticalAlign = 'top';
        td.title = '더블클릭으로 편집';
        td.addEventListener('dblclick', function(e) {
          e.stopPropagation();
          snapshot();
          this.contentEditable = 'true';
          this.style.outline = '2px solid #388bfd';
          this.style.background = 'rgba(56,139,253,0.08)';
          this.focus();
        });
        td.addEventListener('blur', function() {
          this.contentEditable = 'false';
          this.style.outline = '';
          this.style.background = '';
          cards[i].html = wrapper.innerHTML.split(IMG_BASE).join('__ATTACHMENT__');
          saveBoard();
        });
      });
      el.appendChild(wrapper);
    } else if (card.type === 'table') {
      const rows = card.rows || [['','',''],['','',''],['','','']];
      const tbl = document.createElement('table');
      tbl.style.cssText = 'border-collapse:collapse;width:100%;font-size:13px;';
      rows.forEach((row, ri) => {
        const tr = tbl.insertRow();
        row.forEach((cell, ci) => {
          const td = document.createElement(ri === 0 ? 'th' : 'td');
          td.contentEditable = true;
          td.style.cssText = 'border:1px solid #30363d;padding:4px 8px;min-width:60px;text-align:left;' + (ri===0 ? 'background:#21262d;font-weight:600;' : '');
          td.textContent = cell;
          td.addEventListener('blur', () => { if (!cards[i].rows) cards[i].rows = rows; rows[ri][ci] = td.textContent; saveBoard(); });
          tr.appendChild(td);
        });
      });
      el.appendChild(tbl);
      const addRow = document.createElement('button');
      addRow.textContent = '+ 행'; addRow.style.cssText = 'margin-top:4px;font-size:11px;background:#21262d;border:1px solid #30363d;color:#8b949e;padding:2px 8px;border-radius:4px;cursor:pointer;';
      addRow.onclick = e => { e.stopPropagation(); snapshot(); if (!cards[i].rows) cards[i].rows = rows; cards[i].rows.push(new Array(cards[i].rows[0].length).fill('')); renderCards(); saveBoard(); };
      const addCol = document.createElement('button');
      addCol.textContent = '+ 열'; addCol.style.cssText = 'margin-top:4px;margin-left:4px;font-size:11px;background:#21262d;border:1px solid #30363d;color:#8b949e;padding:2px 8px;border-radius:4px;cursor:pointer;';
      addCol.onclick = e => { e.stopPropagation(); snapshot(); if (!cards[i].rows) cards[i].rows = rows; cards[i].rows.forEach(r => r.push('')); renderCards(); saveBoard(); };
      el.appendChild(addRow); el.appendChild(addCol);
    }
    const rh = document.createElement('div'); rh.className = 'resize-handle';
    rh.addEventListener('mousedown', e => { e.preventDefault(); e.stopPropagation(); snapshot(); resizing = { idx: i, startX: e.clientX, startW: card.w || el.offsetWidth }; });
    el.appendChild(rh);
    if (i === selectedIdx) el.classList.add('selected');
    board.appendChild(el);
  });
  requestAnimationFrame(() => {
    let maxB = 0;
    document.querySelectorAll('.card').forEach(el => { const b = (parseFloat(el.style.top)||0) + el.offsetHeight; if (b > maxB) maxB = b; });
    board.style.minHeight = (maxB + 100) + 'px';
  });
}

document.addEventListener('mousemove', e => {
  if (moving) {
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`); if (!el) return;
    let nx = moving.origX + e.clientX - moving.startX, ny = moving.origY + e.clientY - moving.startY;
    if (e.shiftKey) { nx = snap(nx); ny = snap(ny); el.style.outline = '1px dashed rgba(240,192,64,0.3)'; } else { el.style.outline = ''; }
    el.style.left = nx + 'px'; el.style.top = ny + 'px';
  }
  if (resizing) {
    let nw = resizing.startW + e.clientX - resizing.startX; if (e.shiftKey) nw = snap(nw);
    cards[resizing.idx].w = Math.max(100, nw);
    const el = document.querySelector(`.card[data-idx="${resizing.idx}"]`); if (el) el.style.width = cards[resizing.idx].w + 'px';
  }
});

document.addEventListener('mouseup', e => {
  if (moving) {
    let nx = moving.origX + e.clientX - moving.startX, ny = moving.origY + e.clientY - moving.startY;
    if (e.shiftKey) { nx = snap(nx); ny = snap(ny); }
    cards[moving.idx].x = Math.max(0, nx); cards[moving.idx].y = Math.max(0, ny);
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`); if (el) { el.classList.remove('moving'); el.style.outline = ''; }
    if (e.shiftKey) pushCards(moving.idx);
    moving = null; saveBoard();
  }
  if (resizing) { if (e.shiftKey) pushCards(resizing.idx); resizing = null; saveBoard(); }
});

function addTextCard() { snapshot(); cards.push({ type: 'text', content: '', x: 50, y: window.scrollY+100, w: 300 }); renderCards(); setTimeout(() => { const els = document.querySelectorAll('.card .text'); els[els.length-1]?.focus(); }, 100); }
function addImageCard() { const input = document.createElement('input'); input.type = 'file'; input.accept = 'image/*'; input.onchange = e => { const f = e.target.files[0]; if (!f) return; const r = new FileReader(); r.onload = () => { snapshot(); cards.push({ type: 'image', src: r.result, x: 50, y: window.scrollY+100, w: 240 }); renderCards(); saveBoard(); }; r.readAsDataURL(f); }; input.click(); }
function addImageUrl() { const url = prompt('이미지 URL'); if (!url) return; snapshot(); cards.push({ type: 'image', src: url, x: 50, y: window.scrollY+100, w: 240 }); renderCards(); saveBoard(); }
function addTableCard() {
  const colsStr = prompt('열 수 (기본 3)', '3'); const cols = Math.max(1, parseInt(colsStr)||3);
  const rowsStr = prompt('행 수 (헤더 포함, 기본 4)', '4'); const rows = Math.max(1, parseInt(rowsStr)||4);
  snapshot();
  cards.push({ type: 'table', rows: Array.from({length: rows}, (_, ri) => Array.from({length: cols}, (_, ci) => ri===0 ? `열${ci+1}` : '')), x: 50, y: window.scrollY+100, w: Math.max(240, cols*100) });
  renderCards(); saveBoard();
}
function exportBoard() { syncText(); const blob = new Blob([JSON.stringify(cards, null, 2)], { type: 'application/json' }); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = SAVE_KEY + '.json'; a.click(); }
// ── Zoom ─────────────────────────────────────────────────────────────────────
let zoom = parseFloat(localStorage.getItem('zoom-' + SAVE_KEY) || '1.0');
function applyZoom() {
  const board = document.getElementById('board');
  board.style.transform = `scale(${zoom})`;
  board.style.transformOrigin = '0 0';
  document.getElementById('zoom-level').textContent = Math.round(zoom * 100) + '%';
  localStorage.setItem('zoom-' + SAVE_KEY, zoom);
}
function zoomIn()  { zoom = Math.min(3.0, parseFloat((zoom + 0.1).toFixed(2))); applyZoom(); }
function zoomOut() { zoom = Math.max(0.2, parseFloat((zoom - 0.1).toFixed(2))); applyZoom(); }
document.addEventListener('keydown', e => {
  if (e.ctrlKey || e.metaKey) {
    if (e.key === '=' || e.key === '+') { e.preventDefault(); zoomIn(); }
    if (e.key === '-')                  { e.preventDefault(); zoomOut(); }
    if (e.key === '0')                  { e.preventDefault(); zoom = 1.0; applyZoom(); }
  }
});
document.getElementById('board').addEventListener('wheel', e => {
  if (!(e.ctrlKey || e.metaKey)) return;
  e.preventDefault();
  e.deltaY < 0 ? zoomIn() : zoomOut();
}, { passive: false });
applyZoom();
function resetLayout() { if (!confirm('자동 재배치합니다.')) return; cards.forEach(c => { delete c.x; delete c.y; }); renderCards(); autoLayout(); }
// ── Floating format toolbar ───────────────────────────────────────────────────
const fmtBar = document.getElementById('format-toolbar');
function fmt(cmd) { document.execCommand(cmd, false, null); saveBoard(); }
function fmtLink() {
  const sel = window.getSelection();
  if (!sel || sel.isCollapsed) return;
  const url = prompt('링크 URL 입력', 'https://');
  if (!url) return;
  document.execCommand('createLink', false, url);
  // make links open in new tab
  sel.anchorNode?.parentElement?.closest('a')?.setAttribute('target', '_blank');
  document.querySelectorAll('.text a').forEach(a => a.target = '_blank');
  saveBoard();
}

// prevent format buttons from blurring contenteditable
fmtBar.addEventListener('mousedown', e => e.preventDefault());

document.addEventListener('selectionchange', () => {
  const sel = window.getSelection();
  if (!sel || sel.isCollapsed || !sel.toString().trim()) { fmtBar.style.display = 'none'; return; }
  // only show if selection is inside a .text element
  const anchor = sel.anchorNode;
  if (!anchor) { fmtBar.style.display = 'none'; return; }
  const textEl = anchor.nodeType === 1 ? anchor.closest('.text') : anchor.parentElement?.closest('.text');
  if (!textEl) { fmtBar.style.display = 'none'; return; }
  // position above selection
  const range = sel.getRangeAt(0);
  const rect = range.getBoundingClientRect();
  fmtBar.style.display = 'flex';
  const tbW = fmtBar.offsetWidth || 180;
  let left = rect.left + rect.width / 2 - tbW / 2;
  left = Math.max(8, Math.min(left, window.innerWidth - tbW - 8));
  fmtBar.style.left = left + 'px';
  fmtBar.style.top = (rect.top - 44 + window.scrollY) + 'px';
});

setInterval(saveBoard, 30000);
loadBoard();
</script>
</body>
</html>
