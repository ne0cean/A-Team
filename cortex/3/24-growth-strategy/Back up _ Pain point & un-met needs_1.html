    "html": "\r\n\t\t\t<table style=\"border:1px solid;border-collapse:collapse\">\r\n\t\t\t\t<tr>\r\n\t\t\t\t\t<td style=\"border:1px solid;font-family:Calibri\"><span style=\"font-family:맑은 고딕\">구분</span></td>\r\n\t\t\t\t\t<td style=\"border:1px solid;font-family:Calibri\"><span lang=\"en-US\"><span style=\"font-family:Malgun Gothic\">Pain point</span></span></td>\r\n\t\t\t\t\t<td style=\"border:1px solid;font-family:Calibri\"><span lang=\"en-US\"><span style=\"font-family:Malgun Gothic\">Un-met needs</span></span></td>\r\n\t\t\t\t</tr>\r\n\t\t\t\t<tr>\r\n\t\t\t\t\t<td style=\"border:1px solid;font-family:Calibri\"><span style=\"font-family:Malgun Gothic\">아티스트</span></td>\r\n\t\t\t\t\t<td style=\"border:1px solid\"><p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">음악산업<span lang=\"en-US\"> </span>밸류체인<span lang=\"en-US\"> </span><a href=\"http://cusee.net/149\">http://cusee.net/149</a><span lang=\"en-US\"> </span><a href=\"http://nsrlog.tistory.com/281\">http://nsrlog.tistory.com/281</a><span lang=\"en-US\"> </span><a href=\"http://odles.tistory.com/510\">http://odles.tistory.com/510</a></p>\r\n\t\t\t\t\t<br />\r\n\t\t\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">- <span lang=\"ko-KR\">음원</span> <span lang=\"ko-KR\">플랫폼</span> <span lang=\"ko-KR\">입장에서</span> <span lang=\"ko-KR\">아티스트는</span> <span lang=\"ko-KR\">공급자임과</span> <span lang=\"ko-KR\">동시에</span> <span lang=\"ko-KR\">마케팅</span>/<span lang=\"ko-KR\">유통</span> <span lang=\"ko-KR\">채널에</span> <span lang=\"ko-KR\">대한</span> <span lang=\"ko-KR\">수요자이다</span>.</p>\r\n\t\t\t\t\t<br />\r\n\t\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Segoe UI Symbol;font-size:12.5pt;color:#333333\">▶</span>결자해지<span lang=\"en-US\">. </span></p>\r\n\t\t\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">    <span lang=\"ko-KR\">멜론이</span> <span lang=\"ko-KR\">몰고온</span> <span lang=\"ko-KR\">기형적이</span> <span lang=\"ko-KR\">구조의</span> <span lang=\"ko-KR\">한국</span> <span lang=\"ko-KR\">음원</span> <span lang=\"ko-KR\">서비스</span> <span lang=\"ko-KR\">시장</span> <span lang=\"ko-KR\">리뷰</span></p>\r\n\t\t\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">    <span lang=\"ko-KR\">경쟁</span>-<span lang=\"ko-KR\">멜론</span> <span lang=\"ko-KR\">중심</span> : <span lang=\"ko-KR\">멜론이</span> <span lang=\"ko-KR\">어떻게</span> <span lang=\"ko-KR\">음악</span> <span lang=\"ko-KR\">산업을</span> <span lang=\"ko-KR\">망쳐놓았나</span></p>\r\n\t\t\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">    <span lang=\"ko-KR\">음원</span> <span lang=\"ko-KR\">유통을</span> <span lang=\"ko-KR\">정상화하고</span>, <span lang=\"ko-KR\">멜론과</span> <span lang=\"ko-KR\">다른</span> <span lang=\"ko-KR\">가치를</span> <span lang=\"ko-KR\">제공</span> <span lang=\"ko-KR\">해야만</span> <span lang=\"ko-KR\">한다</span>.</p>\r\n\t\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">ㅇ<span lang=\"en-US\"> </span>음원<span lang=\"en-US\"> </span>산업<span lang=\"en-US\"> </span>리뷰</p>\r\n\t\t\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">1. <span lang=\"ko-KR\">음악산업에는</span> <span lang=\"ko-KR\">엄청난</span> <span lang=\"ko-KR\">거품이</span>, <span lang=\"ko-KR\">영화산업</span> <span lang=\"ko-KR\">비교</span></p>\r\n\t\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">와비파커<span lang=\"en-US\">, </span>달러쉐이브클럽<span lang=\"en-US\">. </span>기존<span lang=\"en-US\"> </span>산업에<span lang=\"en-US\"> </span>낀<span lang=\"en-US\"> </span>거품을<span lang=\"en-US\"> </span>공격<span lang=\"en-US\">.</span></p>\r\n\t\t\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">&quot;<span lang=\"ko-KR\">음원 수익이 창작자에게 제대로 돌아가지 않는 구조</span>&quot; <span lang=\"ko-KR\">고질적인</span> <span lang=\"ko-KR\">문제</span></p>\r\n\t\t\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">2. <span lang=\"ko-KR\">헤게모니를</span> <span lang=\"ko-KR\">쥐고</span> <span lang=\"ko-KR\">있는</span> <span lang=\"ko-KR\">것은</span> &#39;<span lang=\"ko-KR\">음원</span>&#39; <span lang=\"ko-KR\">유통권</span></p>\r\n\t\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">플랫폼<span lang=\"en-US\"> </span>사업자가<span lang=\"en-US\"> </span>거두는<span lang=\"en-US\"> </span>수수료<span lang=\"en-US\"> - </span>우리에게도<span lang=\"en-US\"> </span>필요한가<span lang=\"en-US\">?(=</span>우리가<span lang=\"en-US\"> </span>음악사업을<span lang=\"en-US\"> </span>다시<span lang=\"en-US\"> </span>시작하려는<span lang=\"en-US\"> </span>목적에<span lang=\"en-US\"> </span>부합하는가<span lang=\"en-US\">?)</span></p>\r\n\t\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">현재의<span lang=\"en-US\"> </span>음원유통<span lang=\"en-US\"> </span>구조는<span lang=\"en-US\"> </span>물리적<span lang=\"en-US\"> </span>실체가<span lang=\"en-US\"> </span>있는<span lang=\"en-US\"> LP, </span>테이프<span lang=\"en-US\">, CD </span>를<span lang=\"en-US\"> </span>유통하던<span lang=\"en-US\"> </span>시절에<span lang=\"en-US\"> </span>형성되어<span lang=\"en-US\"> </span>고착화된<span lang=\"en-US\"> </span>구조다<span lang=\"en-US\">. </span>다운로드에서<span lang=\"en-US\"> </span>또<span lang=\"en-US\"> </span>스트리밍으로<span lang=\"en-US\"> </span>넘어가는<span lang=\"en-US\"> </span>현<span lang=\"en-US\"> </span>음원<span lang=\"en-US\"> </span>유통<span lang=\"en-US\"> </span>구조에서<span lang=\"en-US\"> </span>이러한<span lang=\"en-US\"> </span>프레임을<span lang=\"en-US\"> </span>가져갈<span lang=\"en-US\"> </span>하등의<span lang=\"en-US\"> </span>이유가<span lang=\"en-US\"> </span>없다<span lang=\"en-US\">.</span></p>\r\n\t\t\t\t\t<br />\r\n\t\t\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">(<span lang=\"ko-KR\">유통</span>/<span lang=\"ko-KR\">마케팅</span>)</p>\r\n\t\t\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">- <span lang=\"ko-KR\">제한된</span> <span lang=\"ko-KR\">마케팅</span> <span lang=\"ko-KR\">채널</span> <span lang=\"ko-KR\">▶</span> <span lang=\"ko-KR\">팔기</span> <span lang=\"ko-KR\">어렵다</span>. <span lang=\"ko-KR\">언더</span>, <span lang=\"ko-KR\">인디</span> <span lang=\"ko-KR\">뮤지션은</span> <span lang=\"ko-KR\">특히</span> <span lang=\"ko-KR\">자기</span> <span lang=\"ko-KR\">음악을</span> <span lang=\"ko-KR\">알릴</span> <span lang=\"ko-KR\">채널과</span> <span lang=\"ko-KR\">마케팅이</span> <span lang=\"ko-KR\">약하다</span></p>\r\n\t\t\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">(<span lang=\"ko-KR\">편향된</span> <span lang=\"ko-KR\">추천곡</span> <span lang=\"ko-KR\">제도</span>) <span lang=\"ko-KR\">멜론&#183;지니&#183;엠넷&#183;벅스</span> <span lang=\"ko-KR\">등</span> <span lang=\"ko-KR\">대형</span> <span lang=\"ko-KR\">유통사는</span> <span lang=\"ko-KR\">음원</span> <span lang=\"ko-KR\">유통뿐만</span> <span lang=\"ko-KR\">아니라</span> <span lang=\"ko-KR\">배급도</span> <span lang=\"ko-KR\">같이</span> <span lang=\"ko-KR\">한다</span>.<span lang=\"ko-KR\">&#160;</span></p>\r\n\t\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">멜론<span lang=\"en-US\">100</span>으로<span lang=\"en-US\"> </span>대변되는<span lang=\"en-US\"> </span>편향<span lang=\"en-US\">. </span>음원<span lang=\"en-US\"> </span>사재기</p>\r\n\t\t\t\t\t<br />\r\n\t\t\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Calibri\">(</span><span lang=\"ko-KR\">유통</span><span style=\"font-family:Calibri\"> </span><span lang=\"ko-KR\">및</span><span style=\"font-family:Calibri\"> </span><span lang=\"ko-KR\">수익구조</span><span style=\"font-family:Calibri\">)</span></p>\r\n\t\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:9pt;color:#333333\">1곡 재생때 0.4원…이효리도 “음악으로 먹고살기 힘들어”</span></p>\r\n\t\t\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Calibri\">- </span><span lang=\"ko-KR\" style=\"font-family:맑은 고딕\">스트리밍으로</span><span style=\"font-family:Calibri\"> Hurt</span><span lang=\"ko-KR\" style=\"font-family:맑은 고딕\">된</span><span style=\"font-family:Calibri\"> </span><span lang=\"ko-KR\" style=\"font-family:맑은 고딕\">낮은</span><span style=\"font-family:Calibri\"> </span><span lang=\"ko-KR\" style=\"font-family:맑은 고딕\">지불</span><span style=\"font-family:Calibri\"> </span><span lang=\"ko-KR\" style=\"font-family:맑은 고딕\">의향</span></p>\r\n\t\t\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">- <span lang=\"ko-KR\">왜곡된</span> <span lang=\"ko-KR\">음원</span> <span lang=\"ko-KR\">수익</span> <span lang=\"ko-KR\">분배</span> <span lang=\"ko-KR\">구조</span> <span lang=\"ko-KR\">▶</span> <span lang=\"ko-KR\">스타들을</span> <span lang=\"ko-KR\">제외하면</span> <span lang=\"ko-KR\">생활고에</span> <span lang=\"ko-KR\">시달리는</span> <span lang=\"ko-KR\">뮤지션들</span></p>\r\n\t\t\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">- <span lang=\"ko-KR\">돈이</span> <span lang=\"ko-KR\">안된다</span>. <span lang=\"ko-KR\">저작권</span> <span lang=\"ko-KR\">수수료</span> <span lang=\"ko-KR\">구조가</span> <span lang=\"ko-KR\">취약하다</span>.</p>\r\n\t\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><a href=\"https://tossi907.wordpress.com/2014/04/06/%EC%9D%8C%EB%B0%98-%EC%82%B0%EC%97%85%EC%9D%98-%EB%B9%84%EC%A6%88%EB%8B%88%EC%8A%A4-%EB%AA%A8%EB%8D%B8/\">https://tossi907.wordpress.com/2014/04/06/%EC%9D%8C%EB%B0%98-%EC%82%B0%EC%97%85%EC%9D%98-%EB%B9%84%EC%A6%88%EB%8B%88%EC%8A%A4-%EB%AA%A8%EB%8D%B8/</a></p>\r\n\t\t\t\t\t<br />\r\n\t\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><a href=\"http://magazine.hankyung.com/business/apps/news?popup=0&amp;nid=01&amp;c1=1003&amp;nkey=2015122201047000231&amp;mode=sub_view\">http://magazine.hankyung.com/business/apps/news?popup=0&amp;nid=01&amp;c1=1003&amp;nkey=2015122201047000231&amp;mode=sub_view</a></p>\r\n\t\t\t\t\t<div style=\"display:inline-block;width:480px;height:600px;background:#2d333b;border-radius:4px;margin:2px;vertical-align:top;opacity:0.4\"></div>\r\n\t\t\t\t\t<br />\r\n\t\t\t\t\t<div style=\"display:inline-block;width:480px;height:600px;background:#2d333b;border-radius:4px;margin:2px;vertical-align:top;opacity:0.4\"></div>\r\n\t\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><a href=\"http://fallscroquis.tistory.com/entry/%EC%B0%BD%EC%9E%91%EC%9E%90-%EC%9E%85%EC%9E%A5%EC%97%90%EC%84%9C-%EB%B3%B8-%EC%95%A0%ED%94%8C-%EB%AE%A4%EC%A7%81%EC%9D%84-%ED%86%B5%ED%95%9C-%EC%9D%8C%EC%9B%90-%EC%88%98%EC%9D%B5-%EA%B5%AC%EC%A1%B0%EC%9D%98-%EB%B3%80%ED%99%94\">http://fallscroquis.tistory.com/entry/%EC%B0%BD%EC%9E%91%EC%9E%90-%EC%9E%85%EC%9E%A5%EC%97%90%EC%84%9C-%EB%B3%B8-%EC%95%A0%ED%94%8C-%EB%AE%A4%EC%A7%81%EC%9D%84-%ED%86%B5%ED%95%9C-%EC%9D%8C%EC%9B%90-%EC%88%98%EC%9D%B5-%EA%B5%AC%EC%A1%B0%EC%9D%98-%EB%B3%80%ED%99%94</a></p>\r\n\t\t\t\t\t<div style=\"display:inline-block;width:360px;height:281px;background:#2d333b;border-radius:4px;margin:2px;vertical-align:top;opacity:0.4\"></div>\r\n\t\t\t\t\t<br />\r\n\t\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:맑은 고딕;color:black\">소속사이자 음원 유통권을 쥐고 있는 로엔이 애플뮤직에 음원 공급을 거절하면서 아이유는 저작권료를 받을 수 있지만 받을 수 없는 아이러니한 상황에 놓여 있다. </span></p>\r\n\t\t\t\t\t<br />\r\n\t\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:9pt;color:#333333\">“스트리밍 상품은 소비자의 불법 다운로드를 방지하고 합법적인 이용을 유도하기 위해 기본적으로 저가정책을 고수할 수밖에 없는 태생적 한계를 지녔다”고 지적했다. “거대 음원 사업자가 폭리를 취하다 보니 저작권자 및 실연자들에게는 상상도 하기 힘든 작은 금액이 돌아간다”는 뜻이다. 대부분의 뮤지션들이 음악으로 먹고살 수 없는 현실이 됐다. </span></p>\r\n\t\t\t\t\t<br />\r\n\t\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:9pt;color:#333333\">“톱스타인 지드래곤도 국내 음원시장에서 큰 수익을 기대하기 어려운 상황”에서 이유를 찾았다. 그는 “지드래곤이 기존의 음악 서비스 사업자를 중심으로 한 일방향적인 음원 공급 구조를 거부하고 소비자와 창작 권리자 위주의 방식으로 가겠다는 고민을 담은 도전”이라고 봤다. </span></p>\r\n\t\t\t\t\t<br />\r\n\t\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:9pt;color:#333333\">국내 대부분 음원서비스</span><span style=\"font-size:9pt;color:black\"> 사이트에서 한 곡이 재생되면 약 7원의 매출액이 발생한다. 이 중 약 49%는 사이트를 구축하고 음원을 ‘진열’해 판매하는 서비스 사업자와 유통사(제작사 음원을 서비스 사업자에게 중개)의 몫이다. 제작사는 35%를 가져간다. 창작자인 작사</span><span style=\"font-size:9pt;color:black\">&#183;</span><span style=\"font-size:9pt;color:black\">작곡</span><span style=\"font-size:9pt;color:black\">&#183;</span><span style=\"font-size:9pt;color:black\">편곡자는 10%를 서로 나눠 가져야 한다. 음악을 ‘실연’하는 가수와 연주자에겐 6%밖에 돌아가지 않는다. 소비자가 스트리밍 서비스를 이용해 음악을 들으면 작사</span><span style=\"font-size:9pt;color:black\">&#183;</span><span style=\"font-size:9pt;color:black\">작곡</span><span style=\"font-size:9pt;color:black\">&#183;</span><span style=\"font-size:9pt;color:black\">편곡자는 곡당 0.7원(작사</span><span style=\"font-size:9pt;color:black\">&#183;</span><span style=\"font-size:9pt;color:black\">작곡</span><span style=\"font-size:9pt;color:black\">&#183;</span><span style=\"font-size:9pt;color:black\">편곡자가 다를 경우 0.7원을 3등분), 가수</span><span style=\"font-size:9pt;color:black\">&#183;</span><span style=\"font-size:9pt;color:black\">연주자는 0.42원을 받는 셈이다. 이마저도 ‘할인 서비스 상품’을 통해 재생될 때 수익은 절반 가까이 떨어진다. 그러다 보니 인디 음악계의 경우 한 해 음원 수익이 약 100만원에도 미치지 못하는 가수들이 대부분이다. 구영환(가명</span><span style=\"font-size:9pt;color:black\">&#183;23)</span><span style=\"font-size:9pt;color:black\">씨는 한 록밴드의 보컬이다. 그 역시 음원 수익만으로 생계를 꾸리기 어렵다. 그의 음원 수입은 “두세 달에 한 번씩 통장에 입금되는 1만~2만원”이 전부다. 그는 음악을 포기하지 않기 위해 음악 레슨이나 식당 일을 하며 버티고 있다. </span><span style=\"font-family:Segoe UI Symbol;font-size:9pt;color:black\">▶</span><span lang=\"en-US\" style=\"font-size:9pt;color:black\"> </span><span style=\"font-size:9pt;color:black\">신데렐라가</span><span lang=\"en-US\" style=\"font-size:9pt;color:black\"> </span><span style=\"font-size:9pt;color:black\">없다</span><span lang=\"en-US\" style=\"font-size:9pt;color:black\">. </span><span style=\"font-size:9pt;color:black\">우리가</span><span lang=\"en-US\" style=\"font-size:9pt;color:black\"> </span><span style=\"font-size:9pt;color:black\">만들어줘야</span><span lang=\"en-US\" style=\"font-size:9pt;color:black\"> </span><span style=\"font-size:9pt;color:black\">한다</span><span lang=\"en-US\" style=\"font-size:9pt;color:black\">.</span></p>\r\n\t\t\t\t\t<br />\r\n\t\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:12pt;color:#278f8e;font-weight:bold\">창작자에게 가격결정권 돌아가야</span></p>\r\n\t\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:9pt;color:#333333\">상품을 진열하고 판매하는 역할을 맡고 있는 마트가 상품 수입의 절반 이상을 가져가지 않는 것과 같다.</span></p>\r\n\t\t\t\t\t<br />\r\n\t\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">스티브잡스<span lang=\"en-US\">(</span>애플<span lang=\"en-US\">)</span>은<span lang=\"en-US\"> </span>음악을<span lang=\"en-US\"> </span>사랑한다면서<span lang=\"en-US\"> </span>그<span lang=\"en-US\"> </span>사랑한느<span lang=\"en-US\"> </span>것들<span lang=\"en-US\"> 99</span>센트로<span lang=\"en-US\"> </span>만들어버렸다<span lang=\"en-US\">. </span>라떼<span lang=\"en-US\"> </span>한잔<span lang=\"en-US\"> </span>값이란다<span lang=\"en-US\">. </span>우리는<span lang=\"en-US\"> </span>우리가<span lang=\"en-US\"> </span>사랑하는<span lang=\"en-US\"> </span>것이<span lang=\"en-US\"> </span>값싼<span lang=\"en-US\"> </span>취급을<span lang=\"en-US\"> </span>받길<span lang=\"en-US\"> </span>원하지<span lang=\"en-US\"> </span>않는다<span lang=\"en-US\">.</span></p>\r\n\t\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">나는<span lang=\"en-US\"> </span>내가<span lang=\"en-US\"> </span>사랑하는<span lang=\"en-US\"> </span>뮤지션이<span lang=\"en-US\"> </span>생활고에<span lang=\"en-US\"> </span>시달리기를<span lang=\"en-US\"> </span>원치<span lang=\"en-US\"> </span>않는다<span lang=\"en-US\">. </span>나는<span lang=\"en-US\"> </span>내<span lang=\"en-US\"> </span>귀와<span lang=\"en-US\"> </span>영혼을<span lang=\"en-US\"> </span>위해<span lang=\"en-US\"> </span>내<span lang=\"en-US\"> </span>뮤지션이<span lang=\"en-US\"> </span>고통받기를<span lang=\"en-US\">, </span>내<span lang=\"en-US\"> </span>뮤지션을<span lang=\"en-US\"> </span>착취하기를<span lang=\"en-US\"> </span>원치<span lang=\"en-US\"> </span>않는다<span lang=\"en-US\">.</span></p>\r\n\t\t\t\t\t<br />\r\n\t\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">음악 스트리밍 서비스는 앨범을 제작할만한 충분한 수익을 보장하지 않는다. </p>\r\n\t\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">음악 스트리밍 서비스 업체의 주장대로 파이가 더 늘면 어떨지 모르지만 현재 음악 스트리밍 서비스의 수익은 음반 판매 수익의 대체가 되지 못한다.</p>\r\n\t\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">기술의 발달로 이전보다 앨범을 제작하는 데 드는 비용은 줄었음에도 그렇다.</p>\r\n\t\t\t\t\t<br />\r\n\t\t\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">이상일</span> &quot;<span style=\"font-family:Malgun Gothic\">멜론 추천 음원</span> 4<span style=\"font-family:Malgun Gothic\">개 중</span> 3<span style=\"font-family:Malgun Gothic\">개는 멜론이 투자한 것</span>&quot;, <span style=\"font-family:Malgun Gothic\">멜론의 갑</span>(<span style=\"font-family:Malgun Gothic\">甲</span>)<span style=\"font-family:Malgun Gothic\">질</span>? - <a href=\"http://news.jtbc.joins.com/article/ArticlePrint.aspx?news_id=NB11024224\">http://news.jtbc.joins.com/article/ArticlePrint.aspx?news_id=NB11024224</a></p>\r\n\t\t\t\t\t<br />\r\n\t\t\t\t\t<br />\r\n\t\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:medium-content-sans-serif-font\">음악</span><span lang=\"en-US\" style=\"font-family:Calibri\"> </span><span style=\"font-family:medium-content-sans-serif-font\">스트리밍</span><span lang=\"en-US\" style=\"font-family:Calibri\"> </span><span style=\"font-family:medium-content-sans-serif-font\">서비스는</span><span lang=\"en-US\" style=\"font-family:Calibri\"> </span><span style=\"font-family:medium-content-sans-serif-font\">앨범을</span><span lang=\"en-US\" style=\"font-family:Calibri\"> </span><span style=\"font-family:medium-content-sans-serif-font\">제작할만한</span><span lang=\"en-US\" style=\"font-family:Calibri\"> </span><span style=\"font-family:medium-content-sans-serif-font\">충분한</span><span lang=\"en-US\" style=\"font-family:Calibri\"> </span><span style=\"font-family:medium-content-sans-serif-font\">수익을</span><span lang=\"en-US\" style=\"font-family:Calibri\"> </span><span style=\"font-family:medium-content-sans-serif-font\">보장하지</span><span lang=\"en-US\" style=\"font-family:Calibri\"> </span><span style=\"font-family:medium-content-sans-serif-font\">않는다</span><span lang=\"en-US\" style=\"font-family:Calibri\">. </span><span style=\"font-family:medium-content-sans-serif-font\">음악</span><span lang=\"en-US\" style=\"font-family:Calibri\"> </span><span style=\"font-family:medium-content-sans-serif-font\">스트리밍</span><span lang=\"en-US\" style=\"font-family:Calibri\"> </span><span style=\"font-family:medium-content-sans-serif-font\">서비스</span><span lang=\"en-US\" style=\"font-family:Calibri\"> </span><span style=\"font-family:medium-content-sans-serif-font\">업체의</span><span lang=\"en-US\" style=\"font-family:Calibri\"> </span><span style=\"font-family:medium-content-sans-serif-font\">주장대로</span><span lang=\"en-US\" style=\"font-family:Calibri\"> </span><span style=\"font-family:medium-content-sans-serif-font\">파이가</span><span lang=\"en-US\" style=\"font-family:Calibri\"> </span><span style=\"font-family:medium-content-sans-serif-font\">더</span><span lang=\"en-US\" style=\"font-family:Calibri\"> </span><span style=\"font-family:medium-content-sans-serif-font\">늘면</span><span lang=\"en-US\" style=\"font-family:Calibri\"> </span><span style=\"font-family:medium-content-sans-serif-font\">어떨지</span><span lang=\"en-US\" style=\"font-family:Calibri\"> </span><span style=\"font-family:medium-content-sans-serif-font\">모르지만</span><span lang=\"en-US\" style=\"font-family:Calibri\"> </span><span style=\"font-family:medium-content-sans-serif-font\">현재</span><span lang=\"en-US\" style=\"font-family:Calibri\"> </span><span style=\"font-family:medium-content-sans-serif-font\">음악</span><span lang=\"en-US\" style=\"font-family:Calibri\"> </span><span style= \"en-US\" style=\"font-family:Calibri\"> </span><span style=\"font-family:medium-content-sans-serif-font\">음악가는</span><span lang=\"en-US\" style=\"font-family:Calibri\"> </span><span style=\"font-family:medium-content-sans-serif-font\">자연스레</span><span lang=\"en-US\" style=\"font-family:Calibri\"> </span><span style=\"font-family:medium-content-sans-serif-font\">앨범을</span><span lang=\"en-US\" style=\"font-family:Calibri\"> </span><span style=\"font-family:medium-content-sans-serif-font\">제작하는</span><span lang=\"en-US\" style=\"font-family:Calibri\"> </span><span style=\"font-family:medium-content-sans-serif-font\">데</span><span lang=\"en-US\" style=\"font-family:Calibri\"> </span><span style=\"font-family:medium-content-sans-serif-font\">드는</span><span lang=\"en-US\" style=\"font-family:Calibri\"> </span><span style=\"font-family:medium-content-sans-serif-font\">비용을</span><span lang=\"en-US\" style=\"font-family:Calibri\"> </span><span style=\"font-family:medium-content-sans-serif-font\">줄일</span><span lang=\"en-US\" style=\"font-family:Calibri\"> </span><span style=\"font-family:medium-content-sans-serif-font\">수밖에</span><span lang=\"en-US\" style=\"font-family:Calibri\"> </span><span style=\"font-family:medium-content-sans-serif-font\">없다</span><span lang=\"en-US\" style=\"font-family:Calibri\">. </span><span style=\"font-family:medium-content-sans-serif-font\">앨범을</span><span lang=\"en-US\" style=\"font-family:Calibri\"> </span><span style=\"font-family:medium-content-sans-serif-font\">제작할</span><span lang=\"en-US\" style=\"font-family:Calibri\"> </span><span style=\"font-family:medium-content-sans-serif-font\">비용이</span><span lang=\"en-US\" style=\"font-family:Calibri\"> </span><span style=\"font-family:medium-content-sans-serif-font\">없는데</span><span lang=\"en-US\" style=\"font-family:Calibri\"> </span><span style=\"font-family:medium-content-sans-serif-font\">사람이</span><span lang=\"en-US\" style=\"font-family:Calibri\"> </span><span style=\"font-family:medium-content-sans-serif-font\">앨범</span><span lang=\"en-US\" style=\"font-family:Calibri\"> </span><span style=\"font-family:medium-content-sans-serif-font\">단위로</span><span lang=\"en-US\" style=\"font-family:Calibri\"> </span><span style=\"font-family:medium-content-sans-serif-font\">음악을</span><span lang=\"en-US\" style=\"font-family:Calibri\"> </span><span style=\"font-family:medium-content-sans-serif-font\">듣지도</span><span lang=\"en-US\" style=\"font-family:Calibri\"> </span><span style=\"font-family:medium-content-sans-serif-font\">않는다면</span><span lang=\"en-US\" style=\"font-family:Calibri\"> </span><span style=\"font-family:medium-content-sans-serif-font\">굳이</span><span lang=\"en-US\" style=\"font-family:Calibri\"> </span><span style=\"font-family:medium-content-sans-serif-font\">앨범을</span><span lang=\"en-US\" style=\"font-family:Calibri\"> </span><span style=\"font-family:medium-content-sans-serif-font\">제작할</span><span lang=\"en-US\" style=\"font-family:Calibri\"> </span><span style=\"font-family:medium-content-sans-serif-font\">이유는</span><span lang=\"en-US\" style=\"font-family:Calibri\"> </span><span style=\"font-family:medium-content-sans-serif-font\">없다</span><span lang=\"en-US\" style=\"font-family:Calibri\">.</span></p>\r\n\t\t\t\t\t<br />\r\n\t\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:9pt;color:#333333;font-weight:bold\">“진짜 문제는 따로 있다”</span></p>\r\n\t\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:9pt;color:#333333\">음원 수익구조에서 저작권자의 분배 비율이 일정 부분 높아지더라도 음악계 ‘부익부 빈익빈’ 현상을 해결하기 어렵다는 지적도 있다. 음원 규정의 정상화가 궁극적으로 음악 업계의 건강한 선순환을 이끌어내는 주된 대안이 아니라는 얘기다. 1%의 고소득 저작권자와 99% 저소득 저작권자 이 외에 뮤지션 등 저작권자들이 겪고 있는 진짜 문제는 따로 있다는 것이다.</span></p>\r\n\t\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:9pt;color:#333333\">뮤지션 홍재목(32)씨는 “음원수익 분배 규정이 창작자에게 유리하게 바뀌더라도 저소득 저작권자들에게 피부로 와닿는 변화는 크지 않을 것”이라며 “서비스 사업자의 음원 ‘진열’ 방식이 개선돼야 한다”고 했다. 현 방식으로는 순위권에 들지 못하면 소비자와의 접근성이 급격히 떨어져 수익을 기대하기 어렵다는 설명이다.</span></p>\r\n\t\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:9pt;color:#333333\">현재 ‘멜론’ 등 주요 음원사이트에서는 주로 인기 있는 곡, 순위 위주의 진열 방식으로 곡들이 소개되고 있다. 자연히 다양한 장르의 비주류 음악이 소비자를 만날 수 있는 접근성이 낮아졌다. 대형 뮤지션을 관리하고 있는 음악제작사 대표 김민재(가명</span><span style=\"font-size:9pt;color:#333333\">&#183;41)</span><span style=\"font-size:9pt;color:#333333\">씨도 “국내에서 가장 많은 소비자가 이용하고 있는 음원사이트 ‘멜론’의 경우 인기순위 100위권에 들지 못하는 창작자들은 한 달에 몇만원에서 몇십만원을 받는 게 현실”이라고 전했다. 그는 “음원 수익 분배 규정이 창작자에게 유리하게 바뀌더라도 기존 수익에서 1만~2만원 더 받는 수준에 그칠 것”이라고 내다봤다.</span></p>\r\n\t\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:9pt;color:#333333\">현재 음원시장은 ‘멜론’ 등에서 운영 중인 100위권 차트로 수익이 좌우된다. 김 대표에 따르면, ‘멜론’에서 음원순위 100위 안에 장기간 머문다면 저작권자도 1990년대 음반 호황기 때처럼 수익을 기대할 수 있다. 반면 100위권에 입성하지 못할 경우 제작비 회수도 어렵다. 뮤직비디오를 찍지 않고 유명 가수를 고용하지 않을 경우 일반적으로 음원 한 곡의 제작비는 약 500만원을 넘지 않는데도 말이다.</span></p>\r\n\t\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:9pt;color:#333333\">마트에서 소비자가 접근하기 편한 곳에 진열해 놓은 상품이 잘 팔리는 것처럼 ‘멜론’ 등 사이트 역시 100위권 안에 입성한 인기 음악 위주로 곡을 전면 ‘진열’하고 있다. 제작사들이 유명 음원사이트에서 인기순위 100위권 안에 들기 위한 전략을 고민하는 이유다.</span></p>\r\n\t\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:9pt;color:#333333\">‘멜론’ 100위권에 진입하기 쉬운 방법이 있다. 음악 서비스사업 ㄹ업체의 관계자는 “멜론 사이트 상단에 위치한 신곡 소개 구좌 3곳에 곡이 올라가면 된다”고 했다. “이 구좌에 올라가면 100위권 입성이 사실상 100% 보장”된다고 그는 말한다. “대부분의 소비자들이 이 3구좌를 클릭하기 때문”인데 “이 ‘골든’ 구좌를 얻기 위해 유통</span><span style=\"font-size:9pt;color:#333333\">&#183;</span><span style=\"font-size:9pt;color:#333333\">제작사 간의 소리 없는 전쟁이 일어나고 있다”는 이야기다.</span></p>\r\n\t\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:9pt;color:#333333\">이 구좌를 얻는 방법은 무엇일까. 그는 “가장 효과적인 방법은 ‘멜론’의 주 유통사인 로엔엔터테인먼트에 유통을 맡기면 된다”고 털어놨다. “물론 로엔이라고 해서 유통되는 모든 음원을 ‘골든’ 구좌에 걸어줄 수는 없다. 어느 정도 영향력이 있는 기획사의 곡이어야 한다”는 말도 덧붙였다. 유통사를 통하면 수익 중 9%를 추가로 떼줘야 한다.</span></p>\r\n\t\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:9pt;color:#333333\">음악 소비자 대부분은 100위권 음악을 주로 재생한다. 그러다 보니 최근 아이돌그룹은 물론 다양한 장르를 실험해온 유명 창작자들도 개성이 강조되는 음악보다는 대중적 코드에 맞춘 곡을 제작하는 분위기다. 최대한 100위권 내에 오래 머물기 위해서다. 인디밴드 ‘중식이밴드’의 보컬 정중식(32)씨는 뮤지션들의 안타까운 현실을 토로했다. “실험적 음악 창작을 아직 포기하지 않는 뮤지션들의 경우 현재와 같은 플랫폼 위에서는 음원 수익을 기대하기 어렵다. 그러다 보니 음원을 그저 홍보성 ‘명함’ 정도로 생각한다. 다양성이 배제되는 음원 진열 구조에서 점차 체념할 수밖에 없게 된다.”</span></p>\r\n\t\t\t\t\t<br />\r\n\t\t\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">(<span lang=\"ko-KR\">왜곡된</span> <span lang=\"ko-KR\">차트</span>) = <span lang=\"ko-KR\">머니차트</span></p>\r\n\t\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">이미 인지도가 높은 뮤지션이나 예능 프로그램과 관련된 곡들이 차트를 차지한다. 이용자 수가 많은 오후 6시에 차트 상위권에 진입한 곡들은 더욱 그렇다. 높은 인지도로 진입 순위를 올리면, 음원차트는 그 곡들을 사실상 더욱 밀어주는 구조다.<span lang=\"en-US\"> </span>한국의 디지털 음원 차트는 마치 부동산 투자를 하는 것과 같다. 어떤 식으로든 높은 인지도라는 종잣돈이 있어서&#160;집이나<span lang=\"en-US\"> </span>땅을<span lang=\"en-US\"> </span>사면<span lang=\"en-US\"> </span>높은<span lang=\"en-US\"> </span>확률로<span lang=\"en-US\"> </span>더<span lang=\"en-US\"> </span>큰<span lang=\"en-US\"> </span>수익을<span lang=\"en-US\"> </span>약속한다<span lang=\"en-US\">. </span>반면<span lang=\"en-US\"> </span>그렇지<span lang=\"en-US\"> </span>못한<span lang=\"en-US\"> </span>이들에게는<span lang=\"en-US\"> </span>인지도를<span lang=\"en-US\"> </span>모으기<span lang=\"en-US\"> </span>전까지<span lang=\"en-US\"> </span>좀처럼<span lang=\"en-US\"> </span>반응하지<span lang=\"en-US\"> </span>않는다<span lang=\"en-US\">.</span></p>\r\n\t\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:맑은 고딕;color:black\">자사가 독자적으로 보유하는 전략적인 음원을 자사 서비스에만 일정기간 독점 공급하거나 자사 서비스 메인과 각종 차트 등에 집중적으로 끼워넣기 하는 경우도 부지기수다. 자사의 수익을 극대화 하는 일반적인 방식이다. 이때문에 저작권 수익의 부익부 빈익빈이라는 이야기가 공공연하게 나온다. </span></p>\r\n\t\t\t\t\t<br />\r\n\t\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:15pt\"><span style=\"font-family:맑은 고딕;color:black\">국내 사업자들의 서비스도 음악차트 외에 운동할때, 여행할때, 휴식할때 등의 테마 음악을 선별해 서비스 한다. 애플뮤직의 큐레이션과 비슷한 서비스를 일찌감치 시작했다.</span></p>\r\n\t\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:15pt\"><span style=\"font-family:맑은 고딕;color:black\">하지만 국내 사업자들이 서비스하는 큐레이션은 큐레이터가 인위적으로 모음곡으로 묶거나 테마곡으로 지정한 것들이 대부분이다. 하지만 애플뮤직의 큐레이션은 인위적인 개입을 배제하고 이용자가 선호하거나 검색하거나 필요한 상태에 따라 매우 개인화되어 음악이 추천된다. 이미 사업자가 지정한 테마곡을 듣는 방식과는 거리가 멀다.</span></p>\r\n\t\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"color:#353535\">음악 산업이 대표적인 롱테일 법칙의 적용 사례입니다. 멜론 차트 1위에서 100위까지가 멜론 내에서 단일 곡으로는 재생 수가 많겠지만, 전체적인 재생수로 봤을 때는 1위에서 100위를 합한 것보다 101위에서 하위 등수를 합친 것이 더 크죠. 이를 ‘롱테일 법칙’이라고 합니다.</span></p>\r\n\t\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><a href=\"http://ppss.kr/archives/138797/amp\">http://ppss.kr/archives/138797/amp</a><span lang=\"en-US\"> </span>차트<span lang=\"en-US\"> </span>역주행<span lang=\"en-US\">, </span>차트<span lang=\"en-US\"> </span>부수기<span lang=\"en-US\"> </span><span style=\"font-family:Segoe UI Symbol\">▶</span><span lang=\"en-US\"> </span></p>\r\n\t\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"color:#353535;font-weight:bold\">이처럼 역주행 신화의 대부분은 SNS을 통한 바이럴입니다</span><span lang=\"en-US\" style=\"color:#353535;font-weight:bold\"> </span><span style=\"color:#353535;font-weight:bold\">페북</span><span lang=\"en-US\" style=\"color:#353535;font-weight:bold\"> </span><span style=\"color:#353535;font-weight:bold\">퍼스트</span></p>\r\n\t\t\t\t\t<br />\r\n\t\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">몇<span lang=\"en-US\"> </span>주째<span lang=\"en-US\"> </span>고정되어있는<span lang=\"en-US\"> </span>차트<span lang=\"en-US\">, </span>이<span lang=\"en-US\"> </span>차트가<span lang=\"en-US\"> </span>아니라면<span lang=\"en-US\"> </span>사람들이<span lang=\"en-US\"> </span>새로운<span lang=\"en-US\"> </span>음악을<span lang=\"en-US\"> </span>접하기<span lang=\"en-US\"> </span>위해서는<span lang=\"en-US\"> </span>탐색<span lang=\"en-US\"> </span>시간<span lang=\"en-US\">(</span>비용<span lang=\"en-US\">)</span>이<span lang=\"en-US\"> </span>들어간다<span lang=\"en-US\">.</span></p>\r\n\t\t\t\t\t<br />\r\n\t\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:맑은 고딕;font-size:9.5pt;color:#333333\">지드래곤의 새 앨범 &#39;권지용&#39;이 가온차트의 앨범 판매량 차트에 오를 수 없게 되면서 방송사의 음악 순위 프로그램에도 영향을 미치게 됐다. SBS &#39;인기가요&#39;와 MBC &#39;쇼! 음악중심&#39;은 가온차트의 음반 판매량을 순위 산정의 주요 기준으로 삼고 있기 때문이다.</span></p>\r\n\t\t\t\t\t<br />\r\n\t\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">멜론차트와<span lang=\"en-US\"> </span>가온차트<span lang=\"en-US\">, </span>차트는<span lang=\"en-US\"> </span>일종의<span lang=\"en-US\"> </span>큐레이션이다<span lang=\"en-US\">. </span>이를<span lang=\"en-US\"> </span>탈피할<span lang=\"en-US\"> </span>필요가<span lang=\"en-US\"> </span>있다<span lang=\"en-US\">.</span></p>\r\n\t\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">어떤방식<span lang=\"en-US\">? </span>차트자체를<span lang=\"en-US\">? </span>아니면<span lang=\"en-US\"> </span>산정<span lang=\"en-US\"> </span>방식을<span lang=\"en-US\">? </span>우리에게<span lang=\"en-US\"> </span>유리한<span lang=\"en-US\"> </span>방식은<span lang=\"en-US\">? </span></p>\r\n\t\t\t\t\t<br />\r\n\t\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">사재기<span lang=\"en-US\"> </span>안먹히도록<span lang=\"en-US\"> </span>지역별<span lang=\"en-US\"> </span>인구<span lang=\"en-US\">/</span>회원<span lang=\"en-US\"> </span>수<span lang=\"en-US\"> </span>분포대비<span lang=\"en-US\"> </span>플레이<span lang=\"en-US\"> </span>지도<span lang=\"en-US\"> </span>공개</p>\r\n\t\t\t\t\t<br />\r\n\t\t\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">(<span lang=\"ko-KR\">차트</span> <span lang=\"ko-KR\">역주행</span>)<span lang=\"ko-KR\">은</span> <span lang=\"ko-KR\">무엇을</span> <span lang=\"ko-KR\">의미하는가</span>?</p>\r\n\t\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">더<span lang=\"en-US\"> </span>이상<span lang=\"en-US\"> </span>멜론<span lang=\"en-US\"> </span>차트가<span lang=\"en-US\"> </span>대중이<span lang=\"en-US\"> </span>가진<span lang=\"en-US\"> </span>기호의<span lang=\"en-US\"> </span>바로미터로<span lang=\"en-US\"> </span>홀로<span lang=\"en-US\"> </span>존재할<span lang=\"en-US\"> </span>수<span lang=\"en-US\"> </span>없다<span lang=\"en-US\">.</span></p>\r\n\t\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">온전히<span lang=\"en-US\"> </span>담을<span lang=\"en-US\"> </span>수<span lang=\"en-US\"> </span>없다는<span lang=\"en-US\"> </span>의미다<span lang=\"en-US\">.</span></p>\r\n\t\t\t\t\t<br />\r\n\t\t\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">(DJ <span lang=\"ko-KR\">등의</span> 2<span lang=\"ko-KR\">차</span> <span lang=\"ko-KR\">창작</span> <span lang=\"ko-KR\">음악의</span> <span lang=\"ko-KR\">저작권</span> <span lang=\"ko-KR\">문제로</span> <span lang=\"ko-KR\">공유가</span> <span lang=\"ko-KR\">불가능</span>)</p>\r\n\t\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">기획<span lang=\"en-US\"> </span>음원의<span lang=\"en-US\"> </span>복잡한<span lang=\"en-US\"> </span>저작권<span lang=\"en-US\"> </span>구조</p>\r\n\t\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">음원<span lang=\"en-US\"> </span>정산<span lang=\"en-US\"> </span>딜레이<span lang=\"en-US\"> </span>되는<span lang=\"en-US\"> </span>구조</p>\r\n\t\t\t\t\t<br />\r\n\t\t\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">오픈API와 디제잉</p>\r\n\t\t\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">한 사람이 감자 수프 레시피를 만들어 모두와 공유한다고 생각해봅시다. 아마 다른 누군가는 거기에 후추와 아스파라거스를 실험해보고 더 나은 레시피를 공유할 것입니다. 그러면 그것을 응용하여 누구는 호박 스프를 만들고, 누구는 당근 수프를 만들 것입니다. 처음에 감자 수프 레시피를 공유한 사람은 한 개를 기여했으나 열 개의 레시피를 얻게 됩니다. 모두가 일부를 공유했으나 전부를 얻게 됩니다.</p>\r\n\t\t\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">그런데 만약 레시피로 돈을 벌고자 서로가 울타리를 친다면 각자 처음부터 개발할 수 밖에 없습니다. 이것이 강한 지적재산권이 사회 전체의 풍요에는 도움이 되지 않는 이유이기도 합니다. 경쟁 상태에서는 모두가 제로에서부터 삽질을 해야 하지만 공유 상태에서는 서로가 서로의 지식 위에 올라 출발하게 됩니다. 이것은 지식의 진보를 기하급수적으로 발전시킵니다.</p>\r\n\t\t\t\t\t<br />\r\n\t\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">깃허브에<span lang=\"en-US\"> </span>올라<span lang=\"en-US\"> </span>있는<span lang=\"en-US\"> </span>수<span lang=\"en-US\"> </span>많은<span lang=\"en-US\"> </span>코드부터<span lang=\"en-US\"> </span>위키피디아<span lang=\"en-US\">, </span>오픈<span lang=\"en-US\"> </span>액세스<span lang=\"en-US\"> </span>논문<span lang=\"en-US\">, </span>무료<span lang=\"en-US\"> </span>코딩<span lang=\"en-US\"> </span>강좌인&#160;<a href=\"https://opentutorials.org/\" style=\"font-family:Source Sans Pro;font-size:13pt;background-color:#fefefe\">오픈튜토리얼스</a><span lang=\"en-US\">,</span>&#160;<a href=\"https://creativecommons.org/\" style=\"font-family:Source Sans Pro;font-size:13pt;background-color:#fefefe\">크리에이티브</a><span lang=\"en-US\" style=\"font-family:Source Sans Pro;font-size:13pt;background-color:#fefefe\"> </span><span style=\"font-family:Source Sans Pro;font-size:13pt;background-color:#fefefe\">커먼즈</span><span lang=\"en-US\" style=\"font-family:Source Sans Pro;font-size:13pt;background-color:#fefefe\"> </span><span style=\"font-family:Source Sans Pro;font-size:13pt;background-color:#fefefe\">운동</span>까지<span lang=\"en-US\"> </span>수<span lang=\"en-US\"> </span>많은<span lang=\"en-US\"> </span>창작자들이<span lang=\"en-US\"> </span>더<span lang=\"en-US\"> </span>많은<span lang=\"en-US\"> </span>풍요를<span lang=\"en-US\"> </span>창출하기<span lang=\"en-US\"> </span>위해<span lang=\"en-US\"> </span>무료로<span lang=\"en-US\"> </span>기여합니다<span lang=\"en-US\">.</span></p>\r\n\t\t\t\t\t<br />\r\n\t\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">특히<span lang=\"en-US\"> </span>모든<span lang=\"en-US\"> </span>사람들이<span lang=\"en-US\"> </span>생산자인<span lang=\"en-US\"> </span>동시에<span lang=\"en-US\"> </span>소비자라면</p>\r\n\t\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">우리<span lang=\"en-US\"> 모두는 </span>팬이자<span lang=\"en-US\"> 아티스트고 으티수트이자 또 누군가의 팬이다</span></p>\r\n\t\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">모든<span lang=\"en-US\"> </span><span lang=\"en-US\">예술적 창작물은 작품마다 가치와 가격이 다른데, 음윈은 스트리밍으로 도매급이 되어 모든 음원이 같은 댓가를 받는다. </span>심지어<span lang=\"en-US\"> </span>책도<span lang=\"en-US\"> </span>가격이<span lang=\"en-US\"> </span>다른데<span lang=\"en-US\"> </span>말이다<span lang=\"en-US\">. </span>이<span lang=\"en-US\"> </span>모든게<span lang=\"en-US\"> </span>디지털<span lang=\"en-US\">, </span>물리적<span lang=\"en-US\"> </span>실체가<span lang=\"en-US\"> </span>없어서<span lang=\"en-US\"> </span>그렇다<span lang=\"en-US\">. </span>구매해서<span lang=\"en-US\"> </span>내<span lang=\"en-US\"> </span>서버에<span lang=\"en-US\"> </span>올려놓고<span lang=\"en-US\"> </span>들을<span lang=\"en-US\"> </span>수<span lang=\"en-US\"> </span>있도록<span lang=\"en-US\">? </span>기존<span lang=\"en-US\"> </span>스트리밍은<span lang=\"en-US\"> </span>유지하고<span lang=\"en-US\">?</span></p>\r\n\t\t\t\t\t<br />\r\n\t\t\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">블록체인. 어떤 음원은 트라이얼.미끼. 공짜로 풀고 어떤음원은 유료로 풀수 있다. 몬티파이썬 사례</p>\r\n\t\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">[준영,] [오전 1:37] 가상화폐 스팀(STEEM)은 어떻게 세기의 난제를 해결했나(2) - 공짜 돈을 지급하라 — Steemit - <a href=\"https://steemit.com/kr/@polonius79/steem-2\">https://steemit.com/kr/@polonius79/steem-2</a></p>\r\n\t\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">[준영,] [오전 1:37] 사랑받는 음원은 비싸지고 그렇지 않은 음원은 싸진다</p>\r\n\t\t\t\t\t<br />\r\n\t\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:맑은 고딕;color:black\">가수와 연주자 같은 실연자, 많은 비용을 들여 음악을 제작하는 제작자, 그리고 이를 소비하는 소비자가 중심이 되는 서비스가 더 없이 시급하다. </span></p>\r\n\t\t\t\t\t<br />\r\n\t\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"color:#333333\">뮤직비디오는 영상 감독의 데뷔 플랫폼이자 실험 공간이고, 앨범 재킷은 다양한 작가들의 캔버스이면서 대중적으로 알려지는 계기가 되기도 한다. 그 외에도 작사가, 작곡가 등 다양한 음악 관련 크리에이터들이 있다. 하지만 대부분 &#39;단가&#39;로 작업하며 흩어져 있다. 생태계가 없다.</span></p>\r\n\t\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:맑은 고딕;color:black\">생태계</span><span lang=\"en-US\" style=\"color:black\">, </span><span style=\"color:black\">아티스트</span><span lang=\"en-US\" style=\"color:black\"> </span><span style=\"color:black\">플랫폼</span><span lang=\"en-US\" style=\"color:black\"> - </span><span style=\"color:black\">자켓을</span><span lang=\"en-US\" style=\"color:black\"> </span><span style=\"color:black\">만들어준</span><span lang=\"en-US\" style=\"color:black\"> </span><span style=\"color:black\">작가의</span><span lang=\"en-US\" style=\"color:black\"> </span><span style=\"color:black\">정보까지</span><span lang=\"en-US\" style=\"color:black\"> </span><span style=\"color:black\">업로드</span><span lang=\"en-US\" style=\"color:black\">. </span><span style=\"color:black\">디지털</span><span lang=\"en-US\" style=\"color:black\"> </span><span style=\"color:black\">음원</span><span lang=\"en-US\" style=\"color:black\"> </span><span style=\"color:black\">전용</span><span lang=\"en-US\" style=\"color:black\"> </span><span style=\"color:black\">앨범재킷</span><span lang=\"en-US\" style=\"color:black\">, </span></p>\r\n\t\t\t\t\t<br />\r\n\t\t\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"color:black\">(</span><span lang=\"ko-KR\" style=\"color:black\">앨범과</span><span style=\"color:black\"> </span><span lang=\"ko-KR\" style=\"color:black\">음원의</span><span style=\"color:black\"> </span><span lang=\"ko-KR\" style=\"color:black\">경계는</span><span style=\"color:black\"> </span><span lang=\"ko-KR\" style=\"color:black\">이미</span><span style=\"color:black\"> </span><span lang=\"ko-KR\" style=\"color:black\">무너졌다</span><span style=\"color:black\">.)</span></p>\r\n\t\t\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:9.5pt;color:#333333\">GD USB </span><span lang=\"ko-KR\" style=\"font-family:맑은 고딕;font-size:9.5pt;color:#333333\">각 수록곡에 맞춰 디자인된 이미지와 함께 음원을 다운로드할 수 있고, 독점 이미지와 메이킹 필름이 추가 수록됐다. 특히 향후 USB로 연결된 페이지는 콘텐츠의 지속적인 업데이트도 가능할 것으로 전망된다. 단순히 CD처럼 일정한 음원을 소비하는 게 아닌, 페이지에 접속하면 콘텐츠가 계속 업데이트되는 식이다.</span></p>\r\n\t\t\t\t\t<br />\r\n\t\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:맑은 고딕;font-size:9.5pt;color:#333333\">가온차트를 후원하는 한국음악콘텐츠산업협회(음콘협)가 USB로 제작된 지드래곤의 새 앨범을 음반으로 간주하기 힘들다는 입장을 밝히면서 이 음반은 화두에 올랐다. 이는 &#39;음반은 음이 유형물에 고정된 것&#39;으로 정의하는 현행 저작권법에 따른 결정이다. 향후 가온차트 측은 활발한 논의를 거쳐 기준을 재설정하겠단 방침이다.</span><span lang=\"en-US\" style=\"font-size:9.5pt;color:#333333\"> </span><span style=\"font-family:Segoe UI Symbol;font-size:9.5pt;color:#333333\">▶</span><span lang=\"en-US\" style=\"font-size:9.5pt;color:#333333\"> </span><span style=\"font-size:9.5pt;color:#333333\">물리적</span><span lang=\"en-US\" style=\"font-size:9.5pt;color:#333333\"> </span><span style=\"font-size:9.5pt;color:#333333\">음반이</span><span lang=\"en-US\" style=\"font-size:9.5pt;color:#333333\"> </span><span style=\"font-size:9.5pt;color:#333333\">유의미했던</span><span lang=\"en-US\" style=\"font-size:9.5pt;color:#333333\"> </span><span style=\"font-size:9.5pt;color:#333333\">과거의</span><span lang=\"en-US\" style=\"font-size:9.5pt;color:#333333\"> </span><span style=\"font-size:9.5pt;color:#333333\">프레임이다</span><span lang=\"en-US\" style=\"font-size:9.5pt;color:#333333\">.</span></p>\r\n\t\t\t\t\t<br />\r\n\t\t\t\t\t<div style=\"display:inline-block;width:360px;height:200px;background:#2d333b;border-radius:4px;margin:2px;vertical-align:top;opacity:0.4\"></div>\r\n\t\t\t\t\t<br />\r\n\t\t\t\t\t<br />\r\n\t\t\t\t\t</td>\r\n\t\t\t\t\t<td style=\"border:1px solid\"><p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-weight:bold\">(</span><span lang=\"ko-KR\">비욘드</span> <span lang=\"ko-KR\">스트리밍</span>)</p>\r\n\t\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">팬과<span lang=\"en-US\"> </span>직접<span lang=\"en-US\">, </span>자주<span lang=\"en-US\"> </span>소통할<span lang=\"en-US\"> </span>수<span lang=\"en-US\"> </span>있어야<span lang=\"en-US\"> </span>한다<span lang=\"en-US\">. </span>음원<span lang=\"en-US\"> </span>뿐만<span lang=\"en-US\"> </span>아니라<span lang=\"en-US\"> </span>공연<span lang=\"en-US\">, SNS, </span>사진<span lang=\"en-US\">, </span>뮤비<span lang=\"en-US\"> </span>등<span lang=\"en-US\"> </span>다양한<span lang=\"en-US\"> </span>매체로<span lang=\"en-US\">. </span>음원<span lang=\"en-US\">, </span>미디어를<span lang=\"en-US\"> </span>넘어<span lang=\"en-US\"> </span>컨텐츠로<span lang=\"en-US\">. </span>음원<span lang=\"en-US\"> </span>뿐만<span lang=\"en-US\"> </span>아니라<span lang=\"en-US\"> </span>공연<span lang=\"en-US\">, </span>굿즈<span lang=\"en-US\"> </span>판매<span lang=\"en-US\" style=\"font-weight:bold\">￼</span><span lang=\"en-US\" style=\"font-weight:bold\">- </span>블록체인<span lang=\"en-US\"> </span>기술로<span lang=\"en-US\"> </span>자신의<span lang=\"en-US\"> </span>음악이<span lang=\"en-US\"> </span>언제<span lang=\"en-US\"> </span>어디서<span lang=\"en-US\"> </span>얼마동안<span lang=\"en-US\"> </span>재생이<span lang=\"en-US\"> </span>되더라도<span lang=\"en-US\"> </span>알<span lang=\"en-US\"> </span>수<span lang=\"en-US\"> </span>있고<span lang=\"en-US\">, </span>공정한<span lang=\"en-US\"> </span>저작권<span lang=\"en-US\"> </span>수입을<span lang=\"en-US\"> </span>얻을<span lang=\"en-US\"> </span>수<span lang=\"en-US\"> </span>있음<span lang=\"en-US\">. </span></p>\r\n\t\t\t\t\t<br />\r\n\t\t\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:11pt\">(</span><span lang=\"ko-KR\" style=\"font-size:11pt\">음원</span><span style=\"font-size:11pt\"> </span><span lang=\"ko-KR\" style=\"font-size:11pt\">생산</span><span style=\"font-size:11pt\"> </span><span lang=\"ko-KR\" style=\"font-size:11pt\">소셜</span><span style=\"font-size:11pt\"> </span><span lang=\"ko-KR\" style=\"font-size:11pt\">펀딩</span><span style=\"font-size:11pt\">)</span>￼- <span lang=\"ko-KR\">당장</span> <span lang=\"ko-KR\">돈이</span> <span lang=\"ko-KR\">없어도</span> <span lang=\"ko-KR\">소셜펀딩을</span> <span lang=\"ko-KR\">받아서</span> <span lang=\"ko-KR\">음반</span> <span lang=\"ko-KR\">제작할</span> <span lang=\"ko-KR\">수</span> <span lang=\"ko-KR\">있도록</span>(<span lang=\"ko-KR\">킥스타터</span> <span lang=\"ko-KR\">처럼</span>) </p>\r\n\t\t\t\t\t<br />\r\n\t\t\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">(<span lang=\"ko-KR\">고객</span> <span lang=\"ko-KR\">리서치</span>)</p>\r\n\t\t\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Calibri;font-size:11pt\">- </span>데이터 음원순위 이상의 데이터 <span lang=\"ko-KR\">제공을</span> <span lang=\"ko-KR\">통한</span> <span lang=\"ko-KR\">고객</span> <span lang=\"ko-KR\">선호도</span> <span lang=\"ko-KR\">분석</span></p>\r\n\t\t\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Calibri\">- </span><span lang=\"ko-KR\">음악관련</span> <span lang=\"ko-KR\">컨텐츠와</span> <span lang=\"ko-KR\">굿즈</span> <span lang=\"ko-KR\">광고</span>-<span lang=\"ko-KR\">스폰서</span> <span lang=\"ko-KR\">광고</span>/<span lang=\"ko-KR\">음원</span></p>\r\n\t\t\t\t\t<br />\r\n\t\t\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">(<span lang=\"ko-KR\">마케팅</span> <span lang=\"ko-KR\">데이터</span>)</p>\r\n\t\t\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">1990년대생들은 주로 스트리밍으로 음악을 듣던 세대라서 시대별로, 계보에 따라 음악을 감상하지도 않아요. 그래서 예상 못한 레퍼런스의 조합이 나오기도 하고, 이들이 만드는 음악의 장르를 명확히 정의하기도 힘들어요. 이건 전 세계적인 흐름이기도 하고, 메인스트림에서도 보편적 현상인 것 같아요.</span></p>\r\n\t\t\t\t\t<br />\r\n\t\t\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">이제는</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">앨범이라는</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">형태로</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">아티스트가</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">제시하는</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">서사와</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">맥락이</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">아닌</span></p>\r\n\t\t\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">플레이리스트라는</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">형태로</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">자신만의</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">맥락과</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">서사를</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">재구성한다</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\">.</span></p>\r\n\t\t\t\t\t<br />\r\n\t\t\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">음악의 기본 소비 단위가 명확하지 않다는 거예요. 예전에는 간단했는데. 지금은 (스트리밍 서비스의) 요금제가 다양하고 통계도 내기 어려우니, 어디에서 얼마나 수익이 났는지 몰라요. 그래서 공연 단위로 보는 거죠. 그나마 그게 측정 가능한 단위니까. 업계에서는 배분율이나 음원 가격이 이슈가 되는데,&#160;</span><span style=\"font-family:Noto Sans KR;font-size:13.5pt;color:#333333;background-color:white;font-weight:bold\">스트리밍 서비스에 대한 제 입장은,</span><span style=\"font-family:Malgun Gothic\">&#160;&#39;</span><span style=\"font-family:Noto Sans KR;font-size:13.5pt;color:#333333;background-color:white;font-weight:bold\">수익 배분율보다는 데이터 공유가 중요하다&#39;예요.</span><span style=\"font-family:Malgun Gothic\">&#160;</span></p>\r\n\t\t\t\t\t<br />\r\n\t\t\t\t\t</td>\r\n\t\t\t\t</tr>\r\n\t\t\t\t<tr>\r\n\t\t\t\t\t<td style=\"border:1px solid\"><p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">제작</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\">/</span><span style=\"font-family:Malgun Gothic\">유통</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\">/</span><span style=\"font-family:Malgun Gothic\">기획사</span></p>\r\n\t\t\t\t\t<br />\r\n\t\t\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">DJ, MC</span></p>\r\n\t\t\t\t\t</td>\r\n\t\t\t\t\t<td style=\"border:1px solid\"><p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:맑은 고딕\">경쟁력</span><span lang=\"en-US\"> </span><span style=\"font-family:맑은 고딕\">있는</span><span lang=\"en-US\"> </span><span style=\"font-family:맑은 고딕\">아티스트를</span><span lang=\"en-US\"> </span><span style=\"font-family:맑은 고딕\">다른</span><span lang=\"en-US\"> </span><span style=\"font-family:맑은 고딕\">회사보다</span><span lang=\"en-US\"> </span><span style=\"font-family:맑은 고딕\">먼저</span><span lang=\"en-US\"> </span><span style=\"font-family:맑은 고딕\">발굴</span></p>\r\n\t\t\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:맑은 고딕\">음악처럼</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">아티스트도</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:맑은 고딕\">영속적이지</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">않다는</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span ">탈중앙화로</span></p>\r\n\t\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><a href=\"https://brunch.co.kr/@blockchainstory/2\">https://brunch.co.kr/@blockchainstory/2</a></p>\r\n\t\t\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Calibri\">- </span><span lang=\"ko-KR\">인스타</span> <span lang=\"ko-KR\">등</span> SNS<span lang=\"ko-KR\">에</span> <span lang=\"ko-KR\">업로드해서</span> <span lang=\"ko-KR\">자랑</span> <span lang=\"ko-KR\">가능한</span> <span lang=\"ko-KR\">컨텐츠</span> </p>\r\n\t\t\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">- <span lang=\"ko-KR\">친구와</span> <span lang=\"ko-KR\">죽여주는</span> <span lang=\"ko-KR\">음악에</span> <span lang=\"ko-KR\">대한</span> <span lang=\"ko-KR\">이야기를</span> <span lang=\"ko-KR\">할</span> <span lang=\"ko-KR\">수</span> <span lang=\"ko-KR\">있게</span></p>\r\n\t\t\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">- <span lang=\"ko-KR\">음원</span> <span lang=\"ko-KR\">댓글</span></p>\r\n\t\t\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Calibri\">-  </span><span lang=\"ko-KR\">가사를</span> <span lang=\"ko-KR\">인스타에</span> <span lang=\"ko-KR\">예쁘게</span> <span lang=\"ko-KR\">올릴</span> <span lang=\"ko-KR\">수</span> <span lang=\"ko-KR\">있게</span> + <span lang=\"ko-KR\">셀카</span></p>\r\n\t\t\t\t\t<br />\r\n\t\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">이<span lang=\"en-US\"> </span>세상에<span lang=\"en-US\"> </span>생산되는<span lang=\"en-US\"> </span>모든<span lang=\"en-US\"> </span>콘텐츠는<span lang=\"en-US\"> </span>유료화될<span lang=\"en-US\"> </span>수<span lang=\"en-US\"> </span>있습니다<span lang=\"en-US\">. </span>하지만<span lang=\"en-US\"> </span>많은<span lang=\"en-US\"> </span>창작자들이<span lang=\"en-US\"> </span>그것을<span lang=\"en-US\"> </span>선택하지<span lang=\"en-US\"> </span>않습니다<span lang=\"en-US\">. </span>무엇보다도<span lang=\"en-US\"> </span>유료<span lang=\"en-US\"> </span>콘텐츠는<span lang=\"en-US\"> </span>널리<span lang=\"en-US\"> </span>사용되거나<span lang=\"en-US\"> </span>공유될수가<span lang=\"en-US\"> </span>없습니다<span lang=\"en-US\">. </span>내가<span lang=\"en-US\"> </span>카톡으로<span lang=\"en-US\"> </span>친구에게<span lang=\"en-US\"> </span>유튜브영상을<span lang=\"en-US\"> 공유하듯 </span>콘텐츠를<span lang=\"en-US\"> </span>공유할<span lang=\"en-US\"> </span>수<span lang=\"en-US\"> </span>없게<span lang=\"en-US\"> </span>된다면<span lang=\"en-US\">, </span>콘텐츠의<span lang=\"en-US\"> </span>생명은<span lang=\"en-US\"> </span>끝납니다<span lang=\"en-US\">. 내가 친구에게 죽여주는 음원이 있다며 자유롭게 공유할 수 있다먼 </span>작가에게<span lang=\"en-US\"> </span>어떤<span lang=\"en-US\"> </span>것이<span lang=\"en-US\"> </span>더<span lang=\"en-US\"> </span>나은<span lang=\"en-US\"> </span>선택일지는<span lang=\"en-US\"> </span>여러분의<span lang=\"en-US\"> </span>상상에<span lang=\"en-US\"> </span>맡기겠습니다<span lang=\"en-US\">.</span></p>\r\n\t\t\t\t\t<br />\r\n\t\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"color:#333333\">인스타그램에서 가장 팔로워가 많은 계정 톱 50개 중 17개가 뮤지션 계정이다. 유튜브 구독자 가장 많은 톱 50개 채널 중 17개가 뮤지션-음악 관련 채널이다. 김홍기 대표는 &quot;인스타그램이 나오면서 가수들이 자기 채널을 가지게 됐다&quot;라며 &quot;예전엔 방송국밖에 없었지만, 지금은 다 방송국을 가지고 있다&quot;라며 &quot;자기 신곡이 나오면 인스타에서 라이브를 하는 시대&quot;라고 말했다. 방송의 힘을 전혀 받지 않아도 음원 차트 1등을 할 수 있는 시대가 됐다.</span></p>\r\n\t\t\t\t\t<br />\r\n\t\t\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">(<span lang=\"ko-KR\">내</span> <span lang=\"ko-KR\">가수</span>)</p>\r\n\t\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">내가<span lang=\"en-US\"> </span>내<span lang=\"en-US\"> </span>가수를<span lang=\"en-US\"> </span>지원한다<span lang=\"en-US\">.</span></p>\r\n\t\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">오디션<span lang=\"en-US\"> </span>프로그램도<span lang=\"en-US\"> </span>하고<span lang=\"en-US\">, </span>소셜펀딩<span lang=\"en-US\"> </span>진행</p>\r\n\t\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">노래는<span lang=\"en-US\"> </span>가수가<span lang=\"en-US\"> </span>하지만<span lang=\"en-US\"> </span>모든<span lang=\"en-US\"> </span>노래에는<span lang=\"en-US\"> </span>사연이<span lang=\"en-US\"> </span>묻는다<span lang=\"en-US\">. </span>음원에<span lang=\"en-US\"> </span>사연을<span lang=\"en-US\"> </span>적어두도록<span lang=\"en-US\">?</span></p>\r\n\t\t\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">- <span lang=\"ko-KR\">공짜</span>, <span lang=\"ko-KR\">스폰서</span> <span lang=\"ko-KR\">음원</span>, <span lang=\"ko-KR\">광고</span> <span lang=\"ko-KR\">음원</span></p>\r\n\t\t\t\t\t<br />\r\n\t\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">2차 창작 음악을 들을수 있다는게 진짜 최고 강점</p>\r\n\t\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">각종 게임음악은 물른이고 파생 리믹스, 어레인지 곡들...</p>\r\n\t\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">끝없이 나오니 대만족이더군요</p>\r\n\t\t\t\t\t<br />\r\n\t\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">음원<span lang=\"en-US\"> </span>재생수<span lang=\"en-US\">, </span>음원<span lang=\"en-US\"> </span>재생<span lang=\"en-US\"> </span>시간에<span lang=\"en-US\"> </span>따른<span lang=\"en-US\"> </span>요금제는<span lang=\"en-US\">?</span></p>\r\n\t\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">스폰서<span lang=\"en-US\"> </span>요금제</p>\r\n\t\t\t\t\t<br />\r\n\t\t\t\t\t<p data-tag=\"remember-for-later\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-weight:bold\">ㅇ</span><span lang=\"en-US\" style=\"font-weight:bold\"> [</span><span style=\"font-weight:bold\">경쟁의</span><span lang=\"en-US\" style=\"font-weight:bold\"> </span><span style=\"font-weight:bold\">외연</span><span lang=\"en-US\" style=\"font-weight:bold\">] </span><span style=\"font-weight:bold\">사람들은</span><span lang=\"en-US\" style=\"font-weight:bold\"> </span><span style=\"font-weight:bold\">왜</span><span lang=\"en-US\" style=\"font-weight:bold\"> </span><span style=\"font-weight:bold\">음원서비스를</span><span lang=\"en-US\" style=\"font-weight:bold\"> </span><span style=\"font-weight:bold\">이용하나</span><span lang=\"en-US\" style=\"font-weight:bold\">? </span><span style=\"font-weight:bold\">뭘</span><span lang=\"en-US\" style=\"font-weight:bold\"> </span><span style=\"font-weight:bold\">원할까</span><span lang=\"en-US\" style=\"font-weight:bold\">? </span><span style=\"font-weight:bold\">사람들은</span><span lang=\"en-US\" style=\"font-weight:bold\"> </span><span style=\"font-weight:bold\">음악을</span><span lang=\"en-US\" style=\"font-weight:bold\"> </span><span style=\"font-weight:bold\">왜</span><span lang=\"en-US\" style=\"font-weight:bold\"> </span><span style=\"font-weight:bold\">듣지</span><span lang=\"en-US\" style=\"font-weight:bold\">? </span><span style=\"font-weight:bold\">왜</span><span lang=\"en-US\" style=\"font-weight:bold\"> </span><span style=\"font-weight:bold\">음악을</span><span lang=\"en-US\" style=\"font-weight:bold\"> </span><span style=\"font-weight:bold\">만들고</span><span lang=\"en-US\" style=\"font-weight:bold\"> </span><span style=\"font-weight:bold\">공유하지</span><span lang=\"en-US\" style=\"font-weight:bold\">? </span><span style=\"font-family:Segoe UI Symbol;font-weight:bold\">▶</span><span lang=\"en-US\" style=\"font-weight:bold\"> </span>단지<span lang=\"en-US\"> </span>음악<span lang=\"en-US\"> </span>스트리밍<span lang=\"en-US\"> </span>서비스와의<span lang=\"en-US\"> </span>경쟁이<span lang=\"en-US\"> </span>아니다<span lang=\"en-US\">.</span></p>\r\n\t\t\t\t\t<p lang=\"en-US\" data-tag=\"remember-for-later\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">- <span lang=\"ko-KR\">킬링</span> <span lang=\"ko-KR\">타임</span> : <span lang=\"ko-KR\">심심할</span> <span lang=\"ko-KR\">때</span></p>\r\n\t\t\t\t\t<p lang=\"en-US\" data-tag=\"remember-for-later\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">- <span lang=\"ko-KR\">힐링</span> <span lang=\"ko-KR\">타임</span> : <span lang=\"ko-KR\">위로받고</span>, <span lang=\"ko-KR\">공감</span>,</p>\r\n\t\t\t\t\t<p data-tag=\"remember-for-later\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">킬링<span lang=\"en-US\"> </span>타임<span lang=\"en-US\">, </span>적적할<span lang=\"en-US\"> </span>때<span lang=\"en-US\">, </span>다른<span lang=\"en-US\"> </span>사람과<span lang=\"en-US\"> </span>함께<span lang=\"en-US\"> </span>있을<span lang=\"en-US\"> </span>때의<span lang=\"en-US\"> </span>무드<span lang=\"en-US\">, </span>음악은 음향 그 이상이다.<span lang=\"en-US\"> </span></p>\r\n\t\t\t\t\t<p data-tag=\"remember-for-later\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">굳이 따지면 넷플릭스? (웃음) 혹은, 음악 이외의 다른 콘텐츠들. 최대의 경쟁 상대는 스마트폰이죠. 초기에는 이걸로 할 수 있는 게 음악 듣는 것뿐이었는데, 저도 지금은 스마트폰으로 음악 듣다가 이것저것 하거든요. 붕가붕가레코드의 음악은 결국 미디어랑 경쟁하거나, 게임과 경쟁<span lang=\"en-US\">, </span></p>\r\n\t\t\t\t\t<p data-tag=\"remember-for-later\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><a href=\"http://www.nocutnews.co.kr/news/4640745\">애플뮤직</a><span lang=\"en-US\">, </span>스포티파이<span lang=\"en-US\">, </span>유튜브레드<span lang=\"en-US\">, </span>넷플릭스<span lang=\"en-US\">, </span>아마존<span lang=\"en-US\"> </span>프라임<span lang=\"en-US\">, </span>코스트코</p>\r\n\t\t\t\t\t<p data-tag=\"remember-for-later\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">결국<span lang=\"en-US\"> </span>킬링<span lang=\"en-US\">/</span>힐링타임에<span lang=\"en-US\"> </span>대한<span lang=\"en-US\"> </span>점유율의<span lang=\"en-US\"> </span>싸움<span lang=\"en-US\">. </span>미디어<span lang=\"en-US\">, </span>인터넷<span lang=\"en-US\">, </span>게임과의<span lang=\"en-US\"> </span>싸움<span lang=\"en-US\">.</span></p>\r\n\t\t\t\t\t<p data-tag=\"remember-for-later\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">시간<span lang=\"en-US\"> </span>점유율의<span lang=\"en-US\"> </span>싸움<span lang=\"en-US\">. </span>혹은<span lang=\"en-US\"> </span>음악<span lang=\"en-US\">+</span>썸띵과의<span lang=\"en-US\"> </span>시너지</p>\r\n\t\t\t\t\t<p data-tag=\"remember-for-later\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">&quot;우리의 경쟁 상대는 스포츠, 게임, 케이블TV 등 당신이 넷플릭스를 이용하지 않을 때 할 수 있는 모든 것이다. 우리는 심지어 &#39;잠&#39;과도 경쟁한다. 넷플릭스를 더 봐라. 잠을 덜 자더라도…&quot;</span></p>\r\n\t\t\t\t\t<br />\r\n\t\t\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\">&quot;You get a show or a movie you<span style=\"font-family:Malgun Gothic\">’</span>re really dying to watch<span style=\"font-family:Malgun Gothic\">&#160;</span><span lang=\"en-US\">and you end up staying up late at night, so we actually compete with sleep,&quot; Hastings said, adding triumphantly, &quot;And we&#39;re winning!&quot;</span></p>\r\n\t\t\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">&#160;</span>he said that Netflix is<span style=\"font-family:Malgun Gothic\">&#160;</span><span lang=\"en-US\">&quot;competing with sleep on the margin.&quot; </span><span style=\"font-family:Malgun Gothic\">“</span>We<span style=\"font-family:Malgun Gothic\">’</span>re competing with sleep, on the margin. And so, it<span style=\"font-family:Malgun Gothic\">’</span>s a very large pool of time.<span style=\"font-family:Malgun Gothic\">”</span></p>\r\n\t\t\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">“</span>You know, think about it, when you watch a show from Netflix and you get addicted to it, you stay up late at night. We<span style=\"font-family:Malgun Gothic\">’</span>re competing with sleep, on the margin. And so, it<span style=\"font-family:Malgun Gothic\">’</span>s a very large pool of time.<span style=\"font-family:Malgun Gothic\">”</span></p>\r\n\t\t\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\">They<span style=\"font-family:Malgun Gothic\">’</span>re doing great programming, and they<span style=\"font-family:Malgun Gothic\">’</span>ll continue to do that, but I<span style=\"font-family:Malgun Gothic\">’</span>m not sure it will affect us very much. Because the market is just so vast. You know, think about it, when you watch a show from Netflix and you get addicted to it, you stay up late at night. You really <span style=\"font-family:Malgun Gothic\">—&#160;</span><span style=\"font-size:13.5pt;color:#3b3b3b;background-color:white;font-weight:bold\">we</span><span style=\"font-family:Malgun Gothic;font-size:13.5pt;color:#3b3b3b;background-color:white;font-weight:bold\">’</span><span style=\"font-size:13.5pt;color:#3b3b3b;background-color:white;font-weight:bold\">re competing with sleep, on the margin</span><span style=\"font-size:13.5pt;color:#3b3b3b;background-color:white;font-style:italic\">.</span><span style=\"font-family:Malgun Gothic\">&#160;</span>And so, it<span style=\"font-family:Malgun Gothic\">’</span>s a very large pool of time.<span style=\"font-family:Malgun Gothic\">&#160;</span></p>\r\n\t\t\t\t\t<br />\r\n\t\t\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">“우리의</span> <span style=\"font-family:Malgun Gothic\">경쟁</span> <span style=\"font-family:Malgun Gothic\">상대는</span> <span style=\"font-family:Malgun Gothic\">다른</span> <span style=\"font-family:Malgun Gothic\">스트리밍</span> <span style=\"font-family:Malgun Gothic\">회사나</span> <span style=\"font-family:Malgun Gothic\">콘텐츠</span> <span style=\"font-family:Malgun Gothic\">제작사만이</span> <span style=\"font-family:Malgun Gothic\">아니다</span>. <span style=\"font-family:Malgun Gothic\">소비자의</span> <span style=\"font-family:Malgun Gothic\">‘시간’을</span> <span style=\"font-family:Malgun Gothic\">차지하기</span> <span style=\"font-family:Malgun Gothic\">위한</span> <span style=\"font-family:Malgun Gothic\">경쟁이</span> <span style=\"font-family:Malgun Gothic\">점점</span> <span style=\"font-family:Malgun Gothic\">치열해지는</span> <span style=\"font-family:Malgun Gothic\">세상이다</span>. <span style=\"font-family:Malgun Gothic\">스마트폰과</span> TV<span style=\"font-family:Malgun Gothic\">로</span> <span style=\"font-family:Malgun Gothic\">할</span> <span style=\"font-family:Malgun Gothic\">수</span> <span style=\"font-family:Malgun Gothic\">있는</span> <span style=\"font-family:Malgun Gothic\">모든</span> <span style=\"font-family:Malgun Gothic\">것이</span> <span style=\"font-family:Malgun Gothic\">경쟁</span> <span style=\"font-family:Malgun Gothic\">상대다</span>. <span style=\"font-family:Malgun Gothic\">다른</span> <span style=\"font-family:Malgun Gothic\">어느</span> <span style=\"font-family:Malgun Gothic\">것보다도</span> <span style=\"font-family:Malgun Gothic\">넷플릭스를</span> <span style=\"font-family:Malgun Gothic\">보고</span> <span style=\"font-family:Malgun Gothic\">싶게</span> <span style=\"font-family:Malgun Gothic\">만드는</span> <span style=\"font-family:Malgun Gothic\">것이</span> <span style=\"font-family:Malgun Gothic\">우리가</span> <span style=\"font-family:Malgun Gothic\">할</span> <span style=\"font-family:Malgun Gothic\">일이다</span>.<span style=\"font-family:Malgun Gothic\">”</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">“우리의</span> <span style=\"font-family:Malgun Gothic\">최대</span> <span style=\"font-family:Malgun Gothic\">경쟁자는</span> <span style=\"font-family:Malgun Gothic\">잠입니다</span>.<span style=\"font-family:Malgun Gothic\">”</span> <span style=\"font-family:Malgun Gothic\">인터넷</span> <span style=\"font-family:Malgun Gothic\">동영상</span> <span style=\"font-family:Malgun Gothic\">스트리밍</span>(<span style=\"font-family:Malgun Gothic\">실시간</span> <span style=\"font-family:Malgun Gothic\">재생</span>) <span style=\"font-family:Malgun Gothic\">서비스업체</span> <span style=\"font-family:Malgun Gothic\">넷플릭스의</span> <span style=\"font-family:Malgun Gothic\">리드</span> <span style=\"font-family:Malgun Gothic\">헤이스팅스</span> <span style=\"font-family:Malgun Gothic\">최고경영자</span>(CEO)</p>\r\n\t\t\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:맑은 고딕\">왜</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">공유하지</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\">? - </span><span style=\"font-family:Malgun Gothic\">돈</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">벌려고</span></p>\r\n\t\t\t\t\t<br />\r\n\t\t\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">페북</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\">, 인스타, 넷플릭스, 인터넷커뮤니티 대신 음악을 들을 이유를 만들어줘야 한다.</span></p>\r\n\t\t\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">수동적 안락함, 짧은 호홉, 이동중에도 즐길 수 있음</span></p>\r\n\t\t\t\t\t<br />\r\n\t\t\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:맑은 고딕\">다른</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">서비스</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> sns</span><span style=\"font-family:Malgun Gothic\">와</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">경쟁하거나</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">혹은</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">병행하게</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">하거나</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\">, </span><span style=\"font-family:Malgun Gothic\">음악의</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">장점은</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">다른</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">서비스에</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">스며들</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">수</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">있다는</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">것</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\">. </span><span style=\"font-family:Malgun Gothic\">병행할</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">수</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">있다는</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">것</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\">.</span></p>\r\n\t\t\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:맑은 고딕\">텍스트</span><span lang=\"en-US\">, </span><span style=\"font-family:맑은 고딕\">사진</span><span lang=\"en-US\">, </span><span style=\"font-family:맑은 고딕\">짤빵은</span><span lang=\"en-US\"> </span><span style=\"font-family:맑은 고딕\">복붙이</span><span lang=\"en-US\"> </span><span style=\"font-family:맑은 고딕\">가능한데</span><span lang=\"en-US\"> </span><span style=\"font-family:맑은 고딕\">음원은</span><span lang=\"en-US\"> </span><span style=\"font-family:맑은 고딕\">이게</span><span lang=\"en-US\"> </span><span style=\"font-family:맑은 고딕\">안된다</span><span lang=\"en-US\">. </span><span style=\"font-family:맑은 고딕\">영상과</span><span lang=\"en-US\"> </span><span style=\"font-family:맑은 고딕\">음원을</span><span lang=\"en-US\"> </span><span style=\"font-family:맑은 고딕\">짤방처럼</span><span lang=\"en-US\"> </span><span style=\"font-family:맑은 고딕\">잘라서</span><span lang=\"en-US\"> </span><span style=\"font-family:맑은 고딕\">공유할</span><span lang=\"en-US\"> </span><span style=\"font-family:맑은 고딕\">수</span><span lang=\"en-US\"> </span><span style=\"font-family:맑은 고딕\">있도록</span><span lang=\"en-US\"> </span><span style=\"font-family:맑은 고딕\">한다</span><span lang=\"en-US\">. - </span><span style=\"font-family:맑은 고딕\">그리고</span><span lang=\"en-US\"> </span><span style=\"font-family:맑은 고딕\">이에</span><span lang=\"en-US\"> </span><span style=\"font-family:맑은 고딕\">대한</span><span lang=\"en-US\"> </span><span style=\"font-family:맑은 고딕\">모든</span><span lang=\"en-US\"> </span><span style=\"font-family:맑은 고딕\">트랜젝션</span><span lang=\"en-US\"> </span><span style=\"font-family:맑은 고딕\">데이터를</span><span lang=\"en-US\"> </span><span style=\"font-family:맑은 고딕\">블록체인에</span><span lang=\"en-US\"> </span><span style=\"font-family:맑은 고딕\">저장하고</span><span lang=\"en-US\">, </span><span style=\"font-family:맑은 고딕\">사용한</span><span lang=\"en-US\"> </span><span style=\"font-family:맑은 고딕\">만큼</span><span lang=\"en-US\"> </span><span style=\"font-family:맑은 고딕\">아티스트에게</span><span lang=\"en-US\"> </span><span style=\"font-family:맑은 고딕\">지급</span></p>\r\n\t\t\t\t\t<br />\r\n\t\t\t\t\t<br />\r\n\t\t\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\">SNS<span lang=\"ko-KR\" style=\"font-family:맑은 고딕\">와</span> <span lang=\"ko-KR\" style=\"font-family:맑은 고딕\">함께</span> <span lang=\"ko-KR\" style=\"font-family:맑은 고딕\">일반인들이</span> <span lang=\"ko-KR\" style=\"font-family:맑은 고딕\">제작한</span> <span lang=\"ko-KR\" style=\"font-family:맑은 고딕\">영상이</span> <span lang=\"ko-KR\" style=\"font-family:맑은 고딕\">폭발적으로</span> <span lang=\"ko-KR\" style=\"font-family:맑은 고딕\">증가</span> - <span lang=\"ko-KR\" style=\"font-family:맑은 고딕\">영상에</span> <span lang=\"ko-KR\" style=\"font-family:맑은 고딕\">음원을</span> <span lang=\"ko-KR\" style=\"font-family:맑은 고딕\">넣을</span> <span lang=\"ko-KR\" style=\"font-family:맑은 고딕\">수</span> <span lang=\"ko-KR\" style=\"font-family:맑은 고딕\">있도록하는</span> <span lang=\"ko-KR\" style=\"font-family:맑은 고딕\">편집기능</span> <span lang=\"ko-KR\" style=\"font-family:맑은 고딕\">마련</span></p>\r\n\t\t\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:맑은 고딕\">뮤직캠</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\">. </span><span style=\"font-family:Malgun Gothic\">음악을</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">틀어두고</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">영상이나</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">사진을</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">찍으면</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">자동으로</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">입혀주는</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\">.</span></p>\r\n\t\t\t\t\t<br />\r\n\t\t\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:맑은 고딕\">경쟁이</span><span lang=\"en-US\"> </span><span style=\"font-family:맑은 고딕\">아니다</span><span lang=\"en-US\">. </span><span style=\"font-family:맑은 고딕\">공존이다</span><span lang=\"en-US\">. </span><span style=\"font-family:맑은 고딕\">활용이다</span><span lang=\"en-US\">. </span><span style=\"font-family:맑은 고딕\">결합이다</span><span lang=\"en-US\">. </span></p>\r\n\t\t\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:맑은 고딕\">웹툰과</span><span lang=\"en-US\"> </span><span style=\"font-family:맑은 고딕\">음악</span><span lang=\"en-US\">, </span><span style=\"font-family:맑은 고딕\">게임과</span><span lang=\"en-US\"> </span><span style=\"font-family:맑은 고딕\">음악</span><span lang=\"en-US\">, </span></p>\r\n\t\t\t\t\t<br />\r\n\t\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">전장의<span lang=\"en-US\"> </span>외연<span lang=\"en-US\"> : </span>음악시장<span lang=\"en-US\"> X, </span>모바일<span lang=\"en-US\"> </span>음악시장</p>\r\n\t\t\t\t\t<br />\r\n\t\t\t\t\t<br />\r\n\t\t\t\t\t</td>\r\n\t\t\t\t</tr>\r\n\t\t\t\t<tr>\r\n\t\t\t\t\t<td style=\"border:1px solid;font-family:Calibri\"><span style=\"font-family:맑은 고딕\">공통</span></td>\r\n\t\t\t\t\t<td style=\"border:1px solid\"><p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">음악차트에서 &#39;역주행&#39;이 가능해진 이유 | 생각노트 - <a href=\"https://insidestory-kr.cdn.ampproject.org/v/s/insidestory.kr/17198/amp?amp_js_v=0.1&amp;usqp=mq331AQECAEYAQ%3D%3D\">https://insidestory-kr.cdn.ampproject.org/v/s/insidestory.kr/17198/amp?amp_js_v=0.1&amp;usqp=mq331AQECAEYAQ%3D%3D</a></p>\r\n\t\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">사람들은 음악을 더 이상 음악방송이나 음원 서비스에서 처음듣지 않는다. 영상이다<span lang=\"en-US\">, SNS</span>다<span lang=\"en-US\"> </span>공유다</p>\r\n\t\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">이 영상을 본 유저들은 이 좋은 노래를 주변 지인들에게 널리 알리고 싶어했습니다. 페이스북 특성상 바로 친구를 소환하거나 메신저로 보낼 수 있는 기능이 있었죠. 이에 친구들을 댓글로 소환하고 해당 게시글을 내 타임으로 공유하며 유저들 각자가 ‘자발적인 마케터’가 되었습니다. 그렇게 영상 조회수는 1,400만회에 육박했고 이후 KBS2 ‘유희열의 스케치북’에서 ‘좋니’ 노래를 열창하며 폭발적인 인기를 얻은 뒤 드디어 음악 차트 1위를 하게 됩니다.<span lang=\"en-US\">&#160;</span><span lang=\"en-US\">역주행의</span><span lang=\"en-US\">&#160;</span><span lang=\"en-US\">시작은 SNS(딩고뮤직)이었습니다.</span></p>\r\n\t\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">이 모든게 영상이었기에 가능했다</p>\r\n\t\t\t\t\t<br />\r\n\t\t\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">(<span lang=\"ko-KR\">스낵</span> <span lang=\"ko-KR\">컬쳐</span>)</p>\r\n\t\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">이제 사람들은 유튜브를 통해 TV 프로그램에서 재미있는 장면만 소비한다. 긴 글 대신 ‘짤방’과 ‘움짤’이 난무하는 카드 형태의 이야기를 읽는다. 환경이 시시각각 변하는 외부에서 5인치 안팎의 스크린으로 콘텐츠를 접하고 이는 모든 콘텐츠를 마이크로로 수렴하게 한다.</p>\r\n\t\t\t\t\t</td>\r\n\t\t\t\t\t<td style=\"border:1px solid\"><p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">- <span lang=\"ko-KR\">꼭</span> <span lang=\"ko-KR\">음원이어야만</span> <span lang=\"ko-KR\">하나</span>? <span lang=\"ko-KR\">꼭</span> <span lang=\"ko-KR\">스트리밍</span> <span lang=\"ko-KR\">서비스여야</span> <span lang=\"ko-KR\">하나</span>? </p>\r\n\t\t\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">  - <span lang=\"ko-KR\">음원</span>=<span lang=\"ko-KR\">앨범이어야</span> <span lang=\"ko-KR\">할</span> <span lang=\"ko-KR\">이유가</span> <span lang=\"ko-KR\">있는가</span>?</p>\r\n\t\t\t\t\t<br />\r\n\t\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">왜<span lang=\"en-US\"> </span>책도<span lang=\"en-US\"> </span>가격이<span lang=\"en-US\"> </span>다르고<span lang=\"en-US\">, </span>미술품도<span lang=\"en-US\"> </span>가격이<span lang=\"en-US\"> </span>다른데<span lang=\"en-US\">, </span>음악은<span lang=\"en-US\"> </span>모두<span lang=\"en-US\"> </span>같은<span lang=\"en-US\"> </span>가격을<span lang=\"en-US\"> </span>메기는가</p>\r\n\t\t\t\t\t<br />\r\n\t\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">오늘날의<span lang=\"en-US\"> </span>음악가들은<span lang=\"en-US\"> </span>단지<span lang=\"en-US\"> </span>소리로만<span lang=\"en-US\"> </span>자신을<span lang=\"en-US\"> </span>표현하지<span lang=\"en-US\"> </span>않는다<span lang=\"en-US\">.</span></p>\r\n\t\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">영상<span lang=\"en-US\">, </span>퍼포먼스, 설치미술…</p>\r\n\t\t\t\t\t<br />\r\n\t\t\t\t\t<br />\r\n\t\t\t\t\t</td>\r\n\t\t\t\t</tr>\r\n\t\t\t</table>\r\n\t\t"
