<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1e1e1e; color: #e0e0e0; font-family: 'Segoe UI', -apple-system, sans-serif; font-size: 15px; line-height: 1.6; padding: 20px 30px 60px; overflow-x: hidden; }
a { color: #6cb0f6; text-decoration: none; }
a:hover { text-decoration: underline; }
.title-bar { background: #3a3a5c; display: inline-block; padding: 6px 16px; font-size: 22px; font-weight: bold; color: #fff; margin-bottom: 4px; }
.date { color: #999; font-size: 13px; margin-bottom: 20px; }
.board { position: relative; }
.card { background: #2a2a2a; border: 1px solid #3a3a3a; border-radius: 8px; padding: 12px; position: absolute; cursor: grab; transition: box-shadow 0.15s; overflow: hidden; }
.card:hover { box-shadow: 0 0 0 1px #58a6ff; z-index: 10; }
.card.moving { opacity: 0.8; box-shadow: 0 4px 24px rgba(0,0,0,0.6); z-index: 100; cursor: grabbing; }
.card img { width: 100%; border-radius: 4px; display: block; }
.card .text { outline: none; min-height: 20px; white-space: pre-wrap; word-break: break-word; }
.card .text:focus { background: rgba(255,255,255,0.05); border-radius: 4px; padding: 4px; }
.card .text:empty::before { content: '텍스트 입력...'; color: #555; }
.card-actions { position: absolute; top: 4px; right: 4px; display: none; gap: 4px; }
.card:hover .card-actions { display: flex; }
.card-btn { background: #333; border: 1px solid #555; color: #ccc; border-radius: 4px; padding: 2px 6px; font-size: 11px; cursor: pointer; }
.card-btn:hover { background: #444; color: #fff; }
.resize-handle { position: absolute; bottom: 0; right: 0; width: 16px; height: 16px; cursor: se-resize; opacity: 0; }
.card:hover .resize-handle { opacity: 0.6; }
.resize-handle::after { content: ''; position: absolute; bottom: 3px; right: 3px; width: 8px; height: 8px; border-right: 2px solid #666; border-bottom: 2px solid #666; }
.card.selected { box-shadow: 0 0 0 2px #58a6ff; z-index: 5; }
.highlight-red { color: #ff6b6b; }
.highlight-blue { color: #6cb0f6; }
.highlight-gold { color: #f0c040; }
.toolbar { position: fixed; bottom: 0; left: 0; right: 0; background: #161b22; border-top: 1px solid #30363d; padding: 8px 20px; display: flex; gap: 12px; align-items: center; z-index: 200; }
.toolbar button { background: #21262d; border: 1px solid #30363d; color: #e0e0e0; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; }
.toolbar button:hover { background: #30363d; }
.toolbar .status { color: #8b949e; font-size: 12px; margin-left: auto; }
#format-toolbar { position: fixed; display: none; background: #1c2128; border: 1px solid #444c56; border-radius: 8px; padding: 4px 6px; gap: 2px; align-items: center; z-index: 500; box-shadow: 0 4px 16px rgba(0,0,0,0.5); }
#format-toolbar button { background: none; border: none; color: #cdd9e5; padding: 4px 8px; border-radius: 5px; cursor: pointer; font-size: 13px; line-height: 1; }
#format-toolbar button:hover { background: #373e47; }
#format-toolbar .sep { width: 1px; height: 16px; background: #444c56; margin: 0 2px; }
</style>

    "html": "\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><a href=\"https://ko.wikipedia.org/wiki/%EB%8C%80%ED%95%9C%EB%AF%BC%EA%B5%AD\" style=\"font-size:10.5pt;background-color:white\">대한민국</a><span style=\"font-size:10.5pt;color:#222222;background-color:white\">의 영화 회사로,&#160;</span><a href=\"https://ko.wikipedia.org/wiki/%EB%A1%AF%EB%8D%B0%EA%B7%B8%EB%A3%B9\" style=\"font-size:10.5pt;background-color:white\">롯데그룹</a><span style=\"font-size:10.5pt;color:#222222;background-color:white\">의 대한민국 내 회사인&#160;</span><a href=\"https://ko.wikipedia.org/wiki/%EB%A1%AF%EB%8D%B0%EC%87%BC%ED%95%91\" style=\"font-size:10.5pt;background-color:white\">롯데쇼핑 주식회사</a><span style=\"font-size:10.5pt;color:#222222;background-color:white\">의 자회사이다. </span></p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:10.5pt;color:#222222;background-color:white\">2018년 6월 1일에 롯데쇼핑에서 분할돼 설립했으며, 해당 회사의 시네마사업부문의 업무를 이관받았다.</span></p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Segoe UI Symbol;color:black;background-color:white;font-weight:bold\">■</span><span lang=\"en-US\" style=\"color:black;background-color:white;font-weight:bold\"> </span><span style=\"color:black;background-color:white;font-weight:bold\">사업</span><span lang=\"en-US\" style=\"color:black;background-color:white;font-weight:bold\"> </span><span style=\"color:black;background-color:white;font-weight:bold\">현황</span></p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:10.5pt;color:#222222;background-color:white;font-weight:bold\">1. </span><span lang=\"ko-KR\" style=\"font-size:10.5pt;color:#222222;background-color:white;font-weight:bold\">복합영화</span><span style=\"font-size:10.5pt;color:#222222;background-color:white;font-weight:bold\"> </span><span lang=\"ko-KR\" style=\"font-size:10.5pt;color:#222222;background-color:white;font-weight:bold\">상영관</span><span style=\"font-size:10.5pt;color:#222222;background-color:white;font-weight:bold\"> </span><span lang=\"ko-KR\" style=\"font-size:10.5pt;color:#222222;background-color:white;font-weight:bold\">운영 (</span><a href=\"https://ko.wikipedia.org/wiki/%EB%A1%AF%EB%8D%B0%EC%8B%9C%EB%84%A4%EB%A7%88\" lang=\"ko-KR\" style=\"font-size:10.5pt;background-color:white;font-weight:bold\">롯데시네마</a><span lang=\"ko-KR\" style=\"font-size:10.5pt;color:#222222;background-color:white;font-weight:bold\">)</span></p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:10.5pt;color:#222222;background-color:white;font-weight:bold\">2. </span><span lang=\"ko-KR\" style=\"font-size:10.5pt;color:#222222;background-color:white;font-weight:bold\">영화 투자 및 배급 (</span><a href=\"https://ko.wikipedia.org/wiki/%EB%A1%AF%EB%8D%B0%EC%97%94%ED%84%B0%ED%85%8C%EC%9D%B8%EB%A8%BC%ED%8A%B8\" lang=\"ko-KR\" style=\"font-size:10.5pt;background-color:white;font-weight:bold\">롯데엔터테인먼트</a><span lang=\"ko-KR\" style=\"font-size:10.5pt;color:#222222;background-color:white;font-weight:bold\">)</span></p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:10.5pt;color:#222222;background-color:white;font-weight:bold\">3. </span><span lang=\"ko-KR\" style=\"font-size:10.5pt;color:#222222;background-color:white;font-weight:bold\">OTT 동영상 스트리밍 서비스 운영 (</span><span style=\"font-size:10.5pt;color:#222222;background-color:white;font-weight:bold\">seechu</span><span lang=\"ko-KR\" style=\"font-size:10.5pt;color:#222222;background-color:white;font-weight:bold\">)</span><span style=\"font-size:10.5pt;color:#222222;background-color:white;font-weight:bold\"> </span></p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:10.5pt;color:#222222;background-color:white\"> - </span><span lang=\"ko-KR\" style=\"font-size:10.5pt;color:#222222;background-color:white\">2018년 7월</span><span style=\"font-size:10.5pt;color:#222222;background-color:white\"> 10</span><span lang=\"ko-KR\" style=\"font-size:10.5pt;color:#222222;background-color:white\">일에 OTT 동영상 스트리밍 서비스인 </span><span style=\"font-size:10.5pt;color:#222222;background-color:white\">*</span><span lang=\"ko-KR\" style=\"font-size:10.5pt;color:#222222;background-color:white\">씨츄를 개시</span><span style=\"font-size:10.5pt;color:#222222;background-color:white\">, </span></p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:10.5pt;color:#222222;background-color:white\">   *</span><span lang=\"ko-KR\" style=\"font-size:10.5pt;color:#222222;background-color:white\">보고(See) 싶은 콘텐츠를 골라서(Choose) 본다&#39;는 의미</span></p>\r\n\t\t\t<br />\r\n\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-weight:bold;text-decoration:underline\">Seechu </span><span lang=\"ko-KR\" style=\"font-weight:bold;text-decoration:underline\">서비스</span><span style=\"font-weight:bold;text-decoration:underline\"> </span><span lang=\"ko-KR\" style=\"font-weight:bold;text-decoration:underline\">개요</span></p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">(<span lang=\"ko-KR\">특장점</span>)</p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">1. L.POINT<span lang=\"ko-KR\">와</span> <span lang=\"ko-KR\">통합</span>ID <span lang=\"ko-KR\">운영</span> <span lang=\"ko-KR\">및</span> L.POINT <span lang=\"ko-KR\">적립</span> <span lang=\"ko-KR\">및</span> <span lang=\"ko-KR\">결제</span> <span lang=\"ko-KR\">가능</span></p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">2. <span lang=\"ko-KR\">영화관람권</span>+VOD <span lang=\"ko-KR\">관람권</span> <span lang=\"ko-KR\">번들할인</span></p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">3. <span lang=\"ko-KR\">컨텐츠</span> <span lang=\"ko-KR\">선물하기</span> <span lang=\"ko-KR\">운영</span></p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">※월정액<span lang=\"en-US\"> </span>상품은<span lang=\"en-US\"> </span>운영하고<span lang=\"en-US\"> </span>있지<span lang=\"en-US\"> </span>않음<span lang=\"en-US\">.</span></p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Segoe UI Symbol\">■</span><span lang=\"en-US\"> </span>서비스<span lang=\"en-US\"> </span>제공<span lang=\"en-US\"> </span>방식</p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">1. <span lang=\"ko-KR\">기본</span> <span lang=\"ko-KR\">상품</span> <span lang=\"ko-KR\">및</span> <span lang=\"ko-KR\">과금구조</span></p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">  - <span lang=\"ko-KR\">대여 : 스트리밍 재생 및 다운로드 등 시청기간</span> <span lang=\"ko-KR\">제한</span> (<span lang=\"ko-KR\">스트리밍 기간 : </span>48<span lang=\"ko-KR\">시간</span> ~ <span lang=\"ko-KR\">7 일</span>)</p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">  - <span lang=\"ko-KR\">소장 : 스트리밍 재생</span> <span lang=\"ko-KR\">영구적으로</span> <span lang=\"ko-KR\">가능</span>, <span lang=\"ko-KR\">다운로드 기한이 있으나 다운로드 후 영구소장이 가능</span></p>\r\n\t\t\t<table style=\"border:1px solid;border-collapse:collapse\">\r\n\t\t\t\t<tr>\r\n\t\t\t\t\t<td style=\"border:1px solid;font-size:10pt\">대여가</td>\r\n\t\t\t\t\t<td style=\"border:1px solid;font-size:10pt\">소장가</td>\r\n\t\t\t\t</tr>\r\n\t\t\t\t<tr>\r\n\t\t\t\t\t<td style=\"border:1px solid;font-size:10pt\"><span lang=\"en-US\">1,200<span lang=\"ko-KR\">원</span></span></td>\r\n\t\t\t\t\t<td style=\"border:1px solid;font-size:10pt\"><span lang=\"en-US\">3,500<span lang=\"ko-KR\">원</span></span></td>\r\n\t\t\t\t</tr>\r\n\t\t\t\t<tr>\r\n\t\t\t\t\t<td style=\"border:1px solid;font-size:10pt\"><span lang=\"en-US\">1,320<span lang=\"ko-KR\">원</span></span></td>\r\n\t\t\t\t\t<td style=\"border:1px lang=\"en-US\"> </span>기능<span lang=\"en-US\">, </span>상대방이 받을수 있는 유효기간은 3일이며,<span lang=\"en-US\"> </span></p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">기간<span lang=\"en-US\"> </span>경과<span lang=\"en-US\"> </span>시<span lang=\"en-US\"> </span>자동으로 선물<span lang=\"en-US\"> </span>및 결제<span lang=\"en-US\"> </span>취소</p>\r\n\t\t\t<br />\r\n\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-weight:bold\">Appendix-----------------------------------------------------------------------------------------------------</span></p>\r\n\t\t\t<br />\r\n\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-weight:bold\">[VOD + </span><span lang=\"ko-KR\" style=\"font-weight:bold\">영화관람권</span><span style=\"font-weight:bold\"> </span><span lang=\"ko-KR\" style=\"font-weight:bold\">번들</span><span style=\"font-weight:bold\"> </span><span lang=\"ko-KR\" style=\"font-weight:bold\">판매</span><span style=\"font-weight:bold\">]</span></p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">VOD와 롯데시네마 영화관 관람권을 패키지로 묶어 할인된 가격으로 상시 판매</p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">개봉 예정인 &#39;인크레더블 2&#39;, &#39;미션임파서블:폴아웃&#39; 등 시리즈 영화의 경우 전작 VOD와 신작 영화관 관람권 패키지</p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:12pt;color:#d5d5d5;background-color:#151b23;font-weight:bold\">인크레더블 시리즈 Pack</span><span lang=\"en-US\"> </span>(판매 기간 : <span lang=\"en-US\">7</span>일<span lang=\"en-US\">, </span>2018.7.12~7.18)&#160;</p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">′인크레더블 2′ 영화관람권 2매 + ′인크레더블 1′ VOD 관람권 1매</p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">22,500원<span lang=\"en-US\"> </span><span style=\"font-family:Segoe UI Symbol\">▶</span><span lang=\"en-US\"> </span>19,000원&#160;<span lang=\"en-US\">(3,500</span>원<span lang=\"en-US\"> </span>할인<span lang=\"en-US\">)</span></p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">VOD관람권은 ′인크레더블′ VOD 대여 상품 1편으로 교환 가능</p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">′인크레더블 2′의 2D 일반 상영작에 한하여 적용 가능하며, 스페셜 영화관 및 좌석에는 적용이 불가</p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">VOD 관람권의 유효기간은 7/12(목) ~ 8/1(수)입니다. 영화관람권의 유효기간은 7/18(수) ~ 8/1(수)<span lang=\"en-US\">, </span>관람일 기준</p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Segoe UI Symbol\">▶</span><span lang=\"en-US\"> </span>판매<span lang=\"en-US\"> </span>종료일로부터<span lang=\"en-US\"> 2</span>주간<span lang=\"en-US\"> </span>유효</p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">부분 환불 및 현금 환불되지 않으며, 패키지 상품 중 1매라도 사용한 경우 환불이 불가</p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:12pt;color:#d5d5d5;background-color:#151b23;font-weight:bold\">VOD 대여 관람권 Pack</span></p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">VOD 대여 관람권 3매를 할인된 가격에 구매할 수 있는 패키지 상품<span lang=\"en-US\"> (</span>13,500원<span lang=\"en-US\"> </span><span style=\"font-family:Segoe UI Symbol\">▶</span><span lang=\"en-US\"> </span>10,500원<span lang=\"en-US\">, 3</span>천원<span lang=\"en-US\"> </span>할인<span lang=\"en-US\">)</span></p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">4,500원 이하의 VOD 대여상품에만 적용 가능</p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">이용기간은 구매일로 부터 12개월</p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:12pt;color:#d5d5d5;background-color:#151b23;font-weight:bold\">VOD 소장 관람권 Pack</span></p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">VOD 소장 관람권 2매를 할인된 가격에 구매할 수 있는 패키지 상품<span lang=\"en-US\"> (</span>19,800원<span lang=\"en-US\"> </span><span style=\"font-family:Segoe UI Symbol\">▶</span><span lang=\"en-US\"> </span>17,800원<span lang=\"en-US\">, 2</span>천원<span lang=\"en-US\"> </span>할인<span lang=\"en-US\">)</span></p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">&#160;9,900원 이하의 VOD 소장상품에만 적용 가능</p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">이용기간은 구매일로 부터 12개월</p>\r\n\t\t\t<br />\r\n\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">(<span lang=\"ko-KR\">공통사항</span>)</p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">구매하신 상품은 부분 환불 및 현금 환불되지 않으며, 패키지 상품 중 1매라도 사용한 경우 환불이 불가</p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">영화관람권과 VOD 관람권은 L.point 적립이 불가</p>\r\n\t\t\t<br />\r\n\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-weight:bold\">[</span><span lang=\"ko-KR\" style=\"font-weight:bold\">오픈</span><span style=\"font-weight:bold\"> </span><span lang=\"ko-KR\" style=\"font-weight:bold\">이벤트</span><span style=\"font-weight:bold\">] </span><span lang=\"ko-KR\">할인 이벤트(7/10~18)</span></p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">1) 극장동시 50% 할인(2편) : 여중생A, 아이필프리티</p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">2) 1000원관(20편) : 청년경찰, 메이즈러너 : 데스큐어, 염력, 1987, 궁합, 새디스트, 몬스터 콜, 공동정범, 골든슬럼버, 아이 캔 스피크, 송 투 송, 당신거기 있어줄래요, 그것만이 내 세상,<span lang=\"en-US\"> </span>미옥, 넛잡2, 조선명탐정 : 흡혈괴마의 비밀, 너의 췌장을 먹고 싶어, 대장 김창수, 보안관, 흥부 : 글로 세상을 바꾼 자</p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">3) 100원관(28편) : 건축학개론, 인타임, 부산행, 베테랑, 웰컴투동막골, 만추, 해어화, 아바타, 말아톤, 미드나잇 인 파리, 역린, 다이하드, 범죄와의 전쟁, 킹스 스피치, 협녀:칼의 기억,<span lang=\"en-US\"> </span>파이트 클럽, 더 테러 라이브, 물랑루즈, 울지마 톤즈, 시카리오 : 암살자의도시, 라이프 오브 파이, 부러진 화살, 월드워Z, 악마는 프라다를 입는다,집으로…, 타이타닉, 내부자들, 엽문3</p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-weight:bold\">※</span><span lang=\"en-US\" style=\"font-weight:bold\"> </span><span style=\"font-weight:bold\">L.POINT 적립 (준회원 제외)</span></p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">- 씨츄에서 영화 관람을 위해 결제한 VOD(VOD패키지 포함) 금액의 0.1% 적립</p>\r\n\t\t\t<br />\r\n\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">(<span lang=\"ko-KR\">기타</span>)</p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">ㅇ<span lang=\"en-US\"> Device : </span>PC웹, 모바일</p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">ㅇ<span lang=\"en-US\"> </span>접속<span lang=\"en-US\"> </span>제한<span lang=\"en-US\"> : </span>최대 3대의 모바일기기<span lang=\"en-US\"> </span>등록<span lang=\"en-US\"> </span>가능<span lang=\"en-US\">. 1</span>개의<span lang=\"en-US\"> </span>아이디로<span lang=\"en-US\"> </span>중복로그인은<span lang=\"en-US\"> </span>가능하나<span lang=\"en-US\">, </span>동시<span lang=\"en-US\"> </span>시청은<span lang=\"en-US\"> </span>불가<span lang=\"en-US\">.</span></p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">ㅇ<span lang=\"en-US\"> </span>키워드<span lang=\"en-US\"> </span>검색<span lang=\"en-US\"> </span>및<span lang=\"en-US\">, </span>가격<span lang=\"en-US\">/ </span>등록일<span lang=\"en-US\">/ </span>시청순위에<span lang=\"en-US\"> </span>따른<span lang=\"en-US\"> sorting </span>기능<span lang=\"en-US\"> </span>제공</p>\r\n\t\t\t<div style=\"display:inline-block;width:480px;height:345px;background:#2d333b;border-radius:4px;margin:2px;vertical-align:top;opacity:0.4\"></div>\r\n\t\t\t<br />\r\n\t\t"

const CONTENT_HASH = '8af57696';

let cards = [];
let moving = null, resizing = null;
let selectedIdx = null, clipboardCard = null;
const GRID = 20, GAP = 14;
function snap(v) { return Math.round(v / GRID) * GRID; }

// ── Undo (Ctrl+Z) ────────────────────────────────────────────────────────────
const MAX_HISTORY = 50;
let history = [];
function snapshot() {
  syncText();
  history.push(JSON.stringify(cards));
  if (history.length > MAX_HISTORY) history.shift();
}
function undo() {
  if (!history.length) { showStatus('되돌릴 내용 없음'); return; }
  syncText();
  cards = JSON.parse(history.pop());
  renderCards();
  saveBoard();
  showStatus('↩ 되돌림');
}
function showStatus(msg) {
  const s = document.getElementById('status');
  s.textContent = msg;
  clearTimeout(showStatus._t);
  showStatus._t = setTimeout(() => { s.textContent = ''; }, 2000);
}
document.addEventListener('keydown', e => {
  const isText = document.activeElement?.contentEditable === 'true';
  if ((e.ctrlKey || e.metaKey) && e.key === 'z' && !e.shiftKey) {
    if (isText) return;
    e.preventDefault();
    undo();
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'c' && !e.shiftKey && !isText) {
    if (selectedIdx !== null && cards[selectedIdx]) {
      syncText();
      clipboardCard = JSON.parse(JSON.stringify(cards[selectedIdx]));
      showStatus('카드 복사됨');
      e.preventDefault();
    }
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'v' && !e.shiftKey && !isText) {
    if (clipboardCard) {
      e.preventDefault();
      snapshot();
      const nc = JSON.parse(JSON.stringify(clipboardCard));
      nc.x = (nc.x || 0) + 30; nc.y = (nc.y || 0) + 30;
      cards.push(nc);
      selectedIdx = cards.length - 1;
      renderCards(); saveBoard();
      showStatus('카드 붙여넣음');
    }
  }
  if (e.key === 'Escape') {
    document.querySelectorAll('.card.selected').forEach(c => c.classList.remove('selected'));
    selectedIdx = null;
  }
});

function pushCards(movedIdx) {
  const moved = cards[movedIdx];
  const movedEl = document.querySelector(`.card[data-idx="${movedIdx}"]`);
  if (!movedEl) return;
  const mh = movedEl.offsetHeight;
  document.querySelectorAll('.card').forEach(el => {
    const i = +el.dataset.idx;
    if (i === movedIdx) return;
    const c = cards[i], oh = el.offsetHeight;
    if (moved.x < (c.x+(c.w||200)) && (moved.x+(moved.w||200)) > c.x && moved.y < (c.y+oh) && (moved.y+mh) > c.y) {
      c.y = moved.y + mh + GAP;
      el.style.top = c.y + 'px';
    }
  });
}

function loadBoard() {
  const saved = localStorage.getItem(SAVE_KEY);
  const savedHash = localStorage.getItem(SAVE_KEY + ':hash');
  let parsed = null;
  try { parsed = saved ? JSON.parse(saved) : null; } catch(e) {}
  // reset if: no save, empty array, or content hash changed (page regenerated)
  if (!parsed || parsed.length === 0 || savedHash !== CONTENT_HASH) {
    cards = DEFAULT_CARDS.map(c => ({...c}));
    localStorage.removeItem(SAVE_KEY);
    localStorage.setItem(SAVE_KEY + ':hash', CONTENT_HASH);
    renderCards();
    const hasCoords = cards.some(c => c.x !== undefined && c.y !== undefined);
    if (!hasCoords) autoLayout();
    return;
  }
  cards = parsed;
  renderCards();
}
function resetToDefaults() { if (!confirm('저장된 보드를 지우고 원본으로 초기화합니다. 계속할까요?')) return; localStorage.removeItem(SAVE_KEY); cards = DEFAULT_CARDS.map(c => ({...c})); renderCards(); autoLayout(); }

function autoLayout() {
  const boardW = document.getElementById('board').offsetWidth;
  const cols = Math.max(1, Math.floor(boardW / 280));
  const colW = (boardW - GAP*(cols-1)) / cols;
  const colH = new Array(cols).fill(0);
  const allCards = document.querySelectorAll('.card');
  const images = document.querySelectorAll('.card img');
  let loaded = 0;
  function place() {
    allCards.forEach((el, i) => {
      const w = Math.min(cards[i].w || colW, colW);
      let minCol = 0;
      for (let c = 1; c < cols; c++) if (colH[c] < colH[minCol]) minCol = c;
      cards[i].x = minCol * (colW + GAP);
      cards[i].y = colH[minCol];
      cards[i].w = w;
      el.style.left = cards[i].x + 'px';
      el.style.top = cards[i].y + 'px';
      el.style.width = w + 'px';
      colH[minCol] = cards[i].y + el.offsetHeight + GAP;
    });
    document.getElementById('board').style.minHeight = (Math.max(...colH) + 100) + 'px';
    saveBoard();
  }
  if (!images.length) { requestAnimationFrame(place); return; }
  images.forEach(img => {
    if (img.complete) { loaded++; if (loaded >= images.length) requestAnimationFrame(place); }
    else { img.onload = img.onerror = () => { loaded++; if (loaded >= images.length) requestAnimationFrame(place); }; }
  });
}

function syncText() {
  document.querySelectorAll('.card').forEach(el => {
    const i = +el.dataset.idx;
    if (cards[i]?.type === 'text') { const t = el.querySelector('.text'); if (t) cards[i].content = t.innerHTML; }
  });
}
function saveBoard() { syncText(); localStorage.setItem(SAVE_KEY, JSON.stringify(cards)); localStorage.setItem(SAVE_KEY + ':hash', CONTENT_HASH); showStatus('저장됨 ' + new Date().toLocaleTimeString()); }

function renderCards() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  cards.forEach((card, i) => {
    const el = document.createElement('div');
    el.className = 'card'; el.dataset.idx = i;
    if (card.x !== undefined) el.style.left = card.x + 'px';
    if (card.y !== undefined) el.style.top = card.y + 'px';
    // html cards contain raw OneNote table HTML which may overflow the stated div width
    if (card.w) { if (card.type === 'html') el.style.minWidth = card.w + 'px'; else el.style.width = card.w + 'px'; }
    el.addEventListener('mousedown', e => {
      if (e.target.closest('.text, a, .card-btn, .resize-handle, td, th')) return;
      e.preventDefault();
      // Update selection
      document.querySelectorAll('.card.selected').forEach(c => c.classList.remove('selected'));
      selectedIdx = i; el.classList.add('selected');
      snapshot();
      moving = { idx: i, startX: e.clientX, startY: e.clientY, origX: card.x||0, origY: card.y||0 };
      el.classList.add('moving');
    });
    const actions = document.createElement('div'); actions.className = 'card-actions';
    const delBtn = document.createElement('button'); delBtn.className = 'card-btn'; delBtn.textContent = '×';
    delBtn.onclick = e => { e.stopPropagation(); if(confirm('삭제?')) { snapshot(); cards.splice(i,1); renderCards(); saveBoard(); } };
    actions.appendChild(delBtn); el.appendChild(actions);
    if (card.type === 'text') {
      const text = document.createElement('div'); text.className = 'text'; text.contentEditable = true;
      text.innerHTML = card.content || '';
      text.addEventListener('focus', () => { snapshot(); });
      text.addEventListener('blur', () => { card.content = text.innerHTML; saveBoard(); });
      el.appendChild(text);
    } else if (card.type === 'image') {
      const img = document.createElement('img');
      img.src = card.src.startsWith('http') || card.src.startsWith('data:') ? card.src : IMG_BASE + card.src;
      img.alt = ''; img.loading = 'lazy'; img.onerror = () => img.style.display = 'none';
      if (card.w) img.style.width = card.w + 'px';
      if (card.h) img.style.height = card.h + 'px';
      if (card.link) { const a = document.createElement('a'); a.href = card.link; a.target = '_blank'; a.appendChild(img); el.appendChild(a); }
      else { el.appendChild(img); }
      if (card.caption) { const cap = document.createElement('div'); cap.style.cssText = 'font-size:11px;color:#8b949e;margin-top:4px;word-break:break-word;padding:0 2px;'; cap.textContent = card.caption; el.appendChild(cap); }
    } else if (card.type === 'html') {
      const wrapper = document.createElement('div');
      wrapper.style.cssText = 'overflow:auto;font-size:13px;line-height:1.5;';
      wrapper.innerHTML = card.html.replace(/__ATTACHMENT__/g, IMG_BASE);
      wrapper.querySelectorAll('img').forEach(img => { img.style.maxWidth = '100%'; img.style.height = 'auto'; img.draggable = false; });
      wrapper.querySelectorAll('a').forEach(a => { a.target = '_blank'; a.style.color = '#6cb0f6'; });
      wrapper.querySelectorAll('table').forEach(t => { t.style.borderCollapse = 'collapse'; });
      wrapper.querySelectorAll('td,th').forEach(td => {
        td.style.border = '1px solid #444'; td.style.padding = '4px 6px'; td.style.verticalAlign = 'top';
        td.title = '더블클릭으로 편집';
        td.addEventListener('dblclick', function(e) {
          e.stopPropagation();
          snapshot();
          this.contentEditable = 'true';
          this.style.outline = '2px solid #388bfd';
          this.style.background = 'rgba(56,139,253,0.08)';
          this.focus();
        });
        td.addEventListener('blur', function() {
          this.contentEditable = 'false';
          this.style.outline = '';
          this.style.background = '';
          cards[i].html = wrapper.innerHTML.split(IMG_BASE).join('__ATTACHMENT__');
          saveBoard();
        });
      });
      el.appendChild(wrapper);
    } else if (card.type === 'table') {
      const rows = card.rows || [['','',''],['','',''],['','','']];
      const tbl = document.createElement('table');
      tbl.style.cssText = 'border-collapse:collapse;width:100%;font-size:13px;';
      rows.forEach((row, ri) => {
        const tr = tbl.insertRow();
        row.forEach((cell, ci) => {
          const td = document.createElement(ri === 0 ? 'th' : 'td');
          td.contentEditable = true;
          td.style.cssText = 'border:1px solid #30363d;padding:4px 8px;min-width:60px;text-align:left;' + (ri===0 ? 'background:#21262d;font-weight:600;' : '');
          td.textContent = cell;
          td.addEventListener('blur', () => { if (!cards[i].rows) cards[i].rows = rows; rows[ri][ci] = td.textContent; saveBoard(); });
          tr.appendChild(td);
        });
      });
      el.appendChild(tbl);
      const addRow = document.createElement('button');
      addRow.textContent = '+ 행'; addRow.style.cssText = 'margin-top:4px;font-size:11px;background:#21262d;border:1px solid #30363d;color:#8b949e;padding:2px 8px;border-radius:4px;cursor:pointer;';
      addRow.onclick = e => { e.stopPropagation(); snapshot(); if (!cards[i].rows) cards[i].rows = rows; cards[i].rows.push(new Array(cards[i].rows[0].length).fill('')); renderCards(); saveBoard(); };
      const addCol = document.createElement('button');
      addCol.textContent = '+ 열'; addCol.style.cssText = 'margin-top:4px;margin-left:4px;font-size:11px;background:#21262d;border:1px solid #30363d;color:#8b949e;padding:2px 8px;border-radius:4px;cursor:pointer;';
      addCol.onclick = e => { e.stopPropagation(); snapshot(); if (!cards[i].rows) cards[i].rows = rows; cards[i].rows.forEach(r => r.push('')); renderCards(); saveBoard(); };
      el.appendChild(addRow); el.appendChild(addCol);
    }
    const rh = document.createElement('div'); rh.className = 'resize-handle';
    rh.addEventListener('mousedown', e => { e.preventDefault(); e.stopPropagation(); snapshot(); resizing = { idx: i, startX: e.clientX, startW: card.w || el.offsetWidth }; });
    el.appendChild(rh);
    if (i === selectedIdx) el.classList.add('selected');
    board.appendChild(el);
  });
  requestAnimationFrame(() => {
    let maxB = 0;
    document.querySelectorAll('.card').forEach(el => { const b = (parseFloat(el.style.top)||0) + el.offsetHeight; if (b > maxB) maxB = b; });
    board.style.minHeight = (maxB + 100) + 'px';
  });
}

document.addEventListener('mousemove', e => {
  if (moving) {
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`); if (!el) return;
    let nx = moving.origX + e.clientX - moving.startX, ny = moving.origY + e.clientY - moving.startY;
    if (e.shiftKey) { nx = snap(nx); ny = snap(ny); el.style.outline = '1px dashed rgba(240,192,64,0.3)'; } else { el.style.outline = ''; }
    el.style.left = nx + 'px'; el.style.top = ny + 'px';
  }
  if (resizing) {
    let nw = resizing.startW + e.clientX - resizing.startX; if (e.shiftKey) nw = snap(nw);
    cards[resizing.idx].w = Math.max(100, nw);
    const el = document.querySelector(`.card[data-idx="${resizing.idx}"]`); if (el) el.style.width = cards[resizing.idx].w + 'px';
  }
});

document.addEventListener('mouseup', e => {
  if (moving) {
    let nx = moving.origX + e.clientX - moving.startX, ny = moving.origY + e.clientY - moving.startY;
    if (e.shiftKey) { nx = snap(nx); ny = snap(ny); }
    cards[moving.idx].x = Math.max(0, nx); cards[moving.idx].y = Math.max(0, ny);
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`); if (el) { el.classList.remove('moving'); el.style.outline = ''; }
    if (e.shiftKey) pushCards(moving.idx);
    moving = null; saveBoard();
  }
  if (resizing) { if (e.shiftKey) pushCards(resizing.idx); resizing = null; saveBoard(); }
});

function addTextCard() { snapshot(); cards.push({ type: 'text', content: '', x: 50, y: window.scrollY+100, w: 300 }); renderCards(); setTimeout(() => { const els = document.querySelectorAll('.card .text'); els[els.length-1]?.focus(); }, 100); }
function addImageCard() { const input = document.createElement('input'); input.type = 'file'; input.accept = 'image/*'; input.onchange = e => { const f = e.target.files[0]; if (!f) return; const r = new FileReader(); r.onload = () => { snapshot(); cards.push({ type: 'image', src: r.result, x: 50, y: window.scrollY+100, w: 240 }); renderCards(); saveBoard(); }; r.readAsDataURL(f); }; input.click(); }
function addImageUrl() { const url = prompt('이미지 URL'); if (!url) return; snapshot(); cards.push({ type: 'image', src: url, x: 50, y: window.scrollY+100, w: 240 }); renderCards(); saveBoard(); }
function addTableCard() {
  const colsStr = prompt('열 수 (기본 3)', '3'); const cols = Math.max(1, parseInt(colsStr)||3);
  const rowsStr = prompt('행 수 (헤더 포함, 기본 4)', '4'); const rows = Math.max(1, parseInt(rowsStr)||4);
  snapshot();
  cards.push({ type: 'table', rows: Array.from({length: rows}, (_, ri) => Array.from({length: cols}, (_, ci) => ri===0 ? `열${ci+1}` : '')), x: 50, y: window.scrollY+100, w: Math.max(240, cols*100) });
  renderCards(); saveBoard();
}
function exportBoard() { syncText(); const blob = new Blob([JSON.stringify(cards, null, 2)], { type: 'application/json' }); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = SAVE_KEY + '.json'; a.click(); }
// ── Zoom ─────────────────────────────────────────────────────────────────────
let zoom = parseFloat(localStorage.getItem('zoom-' + SAVE_KEY) || '1.0');
function applyZoom() {
  const board = document.getElementById('board');
  board.style.transform = `scale(${zoom})`;
  board.style.transformOrigin = '0 0';
  document.getElementById('zoom-level').textContent = Math.round(zoom * 100) + '%';
  localStorage.setItem('zoom-' + SAVE_KEY, zoom);
}
function zoomIn()  { zoom = Math.min(3.0, parseFloat((zoom + 0.1).toFixed(2))); applyZoom(); }
function zoomOut() { zoom = Math.max(0.2, parseFloat((zoom - 0.1).toFixed(2))); applyZoom(); }
document.addEventListener('keydown', e => {
  if (e.ctrlKey || e.metaKey) {
    if (e.key === '=' || e.key === '+') { e.preventDefault(); zoomIn(); }
    if (e.key === '-')                  { e.preventDefault(); zoomOut(); }
    if (e.key === '0')                  { e.preventDefault(); zoom = 1.0; applyZoom(); }
  }
});
document.getElementById('board').addEventListener('wheel', e => {
  if (!(e.ctrlKey || e.metaKey)) return;
  e.preventDefault();
  e.deltaY < 0 ? zoomIn() : zoomOut();
}, { passive: false });
applyZoom();
function resetLayout() { if (!confirm('자동 재배치합니다.')) return; cards.forEach(c => { delete c.x; delete c.y; }); renderCards(); autoLayout(); }
// ── Floating format toolbar ───────────────────────────────────────────────────
const fmtBar = document.getElementById('format-toolbar');
function fmt(cmd) { document.execCommand(cmd, false, null); saveBoard(); }
function fmtLink() {
  const sel = window.getSelection();
  if (!sel || sel.isCollapsed) return;
  const url = prompt('링크 URL 입력', 'https://');
  if (!url) return;
  document.execCommand('createLink', false, url);
  // make links open in new tab
  sel.anchorNode?.parentElement?.closest('a')?.setAttribute('target', '_blank');
  document.querySelectorAll('.text a').forEach(a => a.target = '_blank');
  saveBoard();
}

// prevent format buttons from blurring contenteditable
fmtBar.addEventListener('mousedown', e => e.preventDefault());

document.addEventListener('selectionchange', () => {
  const sel = window.getSelection();
  if (!sel || sel.isCollapsed || !sel.toString().trim()) { fmtBar.style.display = 'none'; return; }
  // only show if selection is inside a .text element
  const anchor = sel.anchorNode;
  if (!anchor) { fmtBar.style.display = 'none'; return; }
  const textEl = anchor.nodeType === 1 ? anchor.closest('.text') : anchor.parentElement?.closest('.text');
  if (!textEl) { fmtBar.style.display = 'none'; return; }
  // position above selection
  const range = sel.getRangeAt(0);
  const rect = range.getBoundingClientRect();
  fmtBar.style.display = 'flex';
  const tbW = fmtBar.offsetWidth || 180;
  let left = rect.left + rect.width / 2 - tbW / 2;
  left = Math.max(8, Math.min(left, window.innerWidth - tbW - 8));
  fmtBar.style.left = left + 'px';
  fmtBar.style.top = (rect.top - 44 + window.scrollY) + 'px';
});

setInterval(saveBoard, 30000);
loadBoard();
</script>
</body>
</html>
