.resize-handle::after { content: ''; position: absolute; bottom: 3px; right: 3px; width: 8px; height: 8px; border-right: 2px solid #666; border-bottom: 2px solid #666; }
.card.selected { box-shadow: 0 0 0 2px #58a6ff; z-index: 5; }
.highlight-red { color: #ff6b6b; }
.highlight-blue { color: #6cb0f6; }
.highlight-gold { color: #f0c040; }
.toolbar { position: fixed; bottom: 0; left: 0; right: 0; background: #161b22; border-top: 1px solid #30363d; padding: 8px 20px; display: flex; gap: 12px; align-items: center; z-index: 200; }
.toolbar button { background: #21262d; border: 1px solid #30363d; color: #e0e0e0; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; }
.toolbar button:hover { background: #30363d; }
.toolbar .status { color: #8b949e; font-size: 12px; margin-left: auto; }
#format-toolbar { position: fixed; display: none; background: #1c2128; border: 1px solid #444c56; border-radius: 8px; padding: 4px 6px; gap: 2px; align-items: center; z-index: 500; box-shadow: 0 4px 16px rgba(0,0,0,0.5); }

yle=\"font-size:10.5pt\"> </span><span style=\"font-size:10.5pt\">못하면서</span><span style=\"font-size:10.5pt\"> </span><span style=\"font-size:10.5pt\">현재</span><span style=\"font-size:10.5pt\"> </span><span style=\"font-size:10.5pt\">중국</span><span style=\"font-size:10.5pt\"> </span><span style=\"font-size:10.5pt\">온라인</span><span style=\"font-size:10.5pt\"> </span><span style=\"font-size:10.5pt\">스트리밍</span><span style=\"font-size:10.5pt\"> </span><span style=\"font-size:10.5pt\">시장은</span><span style=\"font-size:10.5pt\"> </span><span style=\"font-size:10.5pt\">유쿠</span><span style=\"font-size:10.5pt\">-</span><span style=\"font-size:10.5pt\">투도우</span><span style=\"font-size:10.5pt\">, </span><span style=\"font-size:10.5pt\">아이치이</span><span style=\"font-size:10.5pt\">, </span><span style=\"font-size:10.5pt\">텅쉰스핀의</span><span style=\"font-size:10.5pt\"> 3</span><span style=\"font-size:10.5pt\">대</span><span style=\"font-size:10.5pt\"> </span><span style=\"font-size:10.5pt\">선두업체</span><span style=\"font-size:10.5pt\"> </span><span style=\"font-size:10.5pt\">간</span><span style=\"font-size:10.5pt\"> </span><span style=\"font-size:10.5pt\">치열한</span><span style=\"font-size:10.5pt\"> </span><span style=\"font-size:10.5pt\">경쟁양상을</span><span style=\"font-size:10.5pt\"> </span><span style=\"font-size:10.5pt\">띰</span></p>\r\n\t\t\t\t\t</td>\r\n\t\t\t\t</tr>\r\n\t\t\t\t<tr>\r\n\t\t\t\t\t<td style=\"border:0px;font-size:10pt;text-align:center\"><span style=\"font-size:10.5pt\">2</span></td>\r\n\t\t\t\t\t<td style=\"border:0px\"><div style=\"display:inline-block;width:360px;height:200px;background:#2d333b;border-radius:4px;margin:2px;vertical-align:top;opacity:0.4\"></div>\r\n\t\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt;text-align:center\"><span style=\"font-size:10.5pt\">&#160;</span></p>\r\n\t\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt;text-align:center\"><span style=\"font-family:새굴림;font-size:10.5pt\">爱</span><span style=\"font-family:새굴림;font-size:10.5pt\">奇艺</span><span style=\"font-size:10.5pt\">(</span><span style=\"font-size:10.5pt\">아이치이</span><span style=\"font-size:10.5pt\">)</span></p>\r\n\t\t\t\t\t</td>\r\n\t\t\t\t\t<td style=\"border:0px\"><p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:10.5pt\">- 서비스 개시일: 2010년 4월</span></p>\r\n\t\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:10.5pt\">- 특이사항</span></p>\r\n\t\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:10.5pt\">&#183; </span><span style=\"font-size:10.5pt\">아이치이는</span><span style=\"font-size:10.5pt\"> </span><span style=\"font-size:10.5pt\">비교적</span><span style=\"font-size:10.5pt\"> </span><span style=\"font-size:10.5pt\">늦게</span><span style=\"font-size:10.5pt\"> </span><span style=\"font-size:10.5pt\">시장에</span><span style=\"font-size:10.5pt\"> </span><span style=\"font-size:10.5pt\">진입했으나</span><span style=\"font-size:10.5pt\">, </span><span style=\"font-size:10.5pt\">가장</span><span style=\"font-size:10.5pt\"> </span><span style=\"font-size:10.5pt\">많은</span><span style=\"font-size:10.5pt\"> </span><span style=\"font-size:10.5pt\">젊은</span><span style=\"font-size:10.5pt\"> </span><span style=\"font-size:10.5pt\">층</span><span style=\"font-size:10.5pt\"> </span><span style=\"font-size:10.5pt\">사용자를</span><span style=\"font-size:10.5pt\"> </span><span style=\"font-size:10.5pt\">확보하고</span><span style=\"font-size:10.5pt\"> </span><span style=\"font-size:10.5pt\">있음</span><span style=\"font-size:10.5pt\">.&#160;</span><span style=\"font-size:10.5pt\">브랜드이미지</span><span style=\"font-size:10.5pt\"> </span><span style=\"font-size:10.5pt\">호감도가</span><span style=\"font-size:10.5pt\"> </span><span style=\"font-size:10.5pt\">가장</span><span style=\"font-size:10.5pt\"> </span><span style=\"font-size:10.5pt\">높은</span><span style=\"font-size:10.5pt\"> </span><span style=\"font-size:10.5pt\">것으로</span><span style=\"font-size:10.5pt\"> </span><span style=\"font-size:10.5pt\">보고됨</span><span style=\"font-size:10.5pt\">. 2012</span><span style=\"font-size:10.5pt\">년</span><span style=\"font-size:10.5pt\"> </span><span style=\"font-size:10.5pt\">바이두로</span><span style=\"font-size:10.5pt\"> </span><span style=\"font-size:10.5pt\">부터</span><span style=\"font-size:10.5pt\"> </span><span style=\"font-size:10.5pt\">인수돼</span><span style=\"font-size:10.5pt\"> </span><span style=\"font-size:10.5pt\">막대한</span><span style=\"font-size:10.5pt\"> </span><span style=\"font-size:10.5pt\">자금력까지</span><span style=\"font-size:10.5pt\"> </span><span style=\"font-size:10.5pt\">갖춤</span></p>\r\n\t\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:10.5pt\">&#183; </span><span style=\"font-size:10.5pt\">최근</span><span style=\"font-size:10.5pt\"> &#39;</span><span style=\"font-size:10.5pt\">태양의후예</span><span style=\"font-size:10.5pt\">&#39;, &#39;</span><span style=\"font-size:10.5pt\">별에서</span><span style=\"font-size:10.5pt\"> </span><span style=\"font-size:10.5pt\">온</span><span style=\"font-size:10.5pt\"> </span><span style=\"font-size:10.5pt\">그대</span><span style=\"font-size:10.5pt\">&#39; </span><span style=\"font-size:10.5pt\">등</span><span style=\"font-size:10.5pt\"> </span><span style=\"font-size:10.5pt\">중국</span><span style=\"font-size:10.5pt\"> </span><span style=\"font-size:10.5pt\">내</span><span style=\"font-size:10.5pt\"> </span><span style=\"font-size:10.5pt\">최고</span><span style=\"font-size:10.5pt\"> </span><span style=\"font-size:10.5pt\">인기</span><span style=\"font-size:10.5pt\"> </span><span style=\"font-size:10.5pt\">한국드라마를</span><span style=\"font-size:10.5pt\"> </span><span style=\"font-size:10.5pt\">독점</span><span style=\"font-size:10.5pt\"> </span><span style=\"font-size:10.5pt\">방영했으며</span><span style=\"font-size:10.5pt\"> </span><span style=\"font-size:10.5pt\">이들은</span><span style=\"font-size:10.5pt\"> </span><spa :10.5pt\">사업에</span><span style=\"font-size:10.5pt\"> </span><span style=\"font-size:10.5pt\">큰</span><span style=\"font-size:10.5pt\"> </span><span style=\"font-size:10.5pt\">도움이</span><span style=\"font-size:10.5pt\"> </span><span style=\"font-size:10.5pt\">될</span><span style=\"font-size:10.5pt\"> </span><span style=\"font-size:10.5pt\">것으로</span><span style=\"font-size:10.5pt\"> </span><span style=\"font-size:10.5pt\">보임</span><span style=\"font-size:10.5pt\">.</span></p>\r\n\t\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:10.5pt\">&#183; </span><span style=\"font-size:10.5pt\">향후</span><span style=\"font-size:10.5pt\"> </span><span style=\"font-size:10.5pt\">주요</span><span style=\"font-size:10.5pt\"> </span><span style=\"font-size:10.5pt\">사업전략은</span><span style=\"font-size:10.5pt\"> </span><span style=\"font-size:10.5pt\">유료회원</span><span style=\"font-size:10.5pt\"> </span><span style=\"font-size:10.5pt\">모집과</span><span style=\"font-size:10.5pt\"> </span><span style=\"font-size:10.5pt\">콘텐츠</span><span style=\"font-size:10.5pt\"> </span><span style=\"font-size:10.5pt\">자체제작</span><span style=\"font-size:10.5pt\"> </span><span style=\"font-size:10.5pt\">두</span><span style=\"font-size:10.5pt\"> </span><span style=\"font-size:10.5pt\">가지로</span><span style=\"font-size:10.5pt\"> </span><span style=\"font-size:10.5pt\">나뉨</span><span style=\"font-size:10.5pt\">. 2016</span><span style=\"font-size:10.5pt\">년</span><span style=\"font-size:10.5pt\"> 11</span><span style=\"font-size:10.5pt\">월</span><span style=\"font-size:10.5pt\"> </span><span style=\"font-size:10.5pt\">기준이미</span><span style=\"font-size:10.5pt\"> 2,000</span><span style=\"font-size:10.5pt\">만</span><span style=\"font-size:10.5pt\"> </span><span style=\"font-size:10.5pt\">명</span><span style=\"font-size:10.5pt\"> </span><span style=\"font-size:10.5pt\">이상의</span><span style=\"font-size:10.5pt\"> </span><span style=\"font-size:10.5pt\">유료회원을</span><span style=\"font-size:10.5pt\"> </span><span style=\"font-size:10.5pt\">보유하고</span><span style=\"font-size:10.5pt\"> </span><span style=\"font-size:10.5pt\">있음</span><span style=\"font-size:10.5pt\">.</span></p>\r\n\t\t\t\t\t</td>\r\n\t\t\t\t</tr>\r\n\t\t\t\t<tr>\r\n\t\t\t\t\t<td style=\"border:0px;font-size:10pt;text-align:center\"><span style=\"font-size:10.5pt\">4</span></td>\r\n\t\t\t\t\t<td style=\"border:0px\"><div style=\"display:inline-block;width:360px;height:200px;background:#2d333b;border-radius:4px;margin:2px;vertical-align:top;opacity:0.4\"></div>\r\n\t\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt;text-align:center\"><span style=\"font-size:10.5pt\">&#160;</span></p>\r\n\t\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt;text-align:center\"><span style=\"font-family:새굴림;font-size:10.5pt\">乐</span><span style=\"font-family:새굴림;font-size:10.5pt\">视视频</span><span style=\"font-size:10.5pt\">(</span><span style=\"font-size:10.5pt\">러스스핀</span><span style=\"font-size:10.5pt\">)</span></p>\r\n\t\t\t\t\t</td>\r\n\t\t\t\t\t<td style=\"border:0px\"><p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:10.5pt\">- 서비스 개시일: 2004년 11월</span></p>\r\n\t\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:10.5pt\">- 특이사항</span></p>\r\n\t\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:10.5pt\">&#183; </span><span style=\"font-size:10.5pt\">동영상</span><span style=\"font-size:10.5pt\"> </span><span style=\"font-size:10.5pt\">스트리밍</span><span style=\"font-size:10.5pt\"> </span><span style=\"font-size:10.5pt\">플랫폼</span><span style=\"font-size:10.5pt\">+</span><span style=\"font-size:10.5pt\">콘텐츠</span><span style=\"font-size:10.5pt\"> </span><span style=\"font-size:10.5pt\">제작</span><span style=\"font-size:10.5pt\">+</span><span style=\"font-size:10.5pt\">단말기제조</span><span style=\"font-size:10.5pt\">(</span><span style=\"font-size:10.5pt\">스마트폰</span><span style=\"font-size:10.5pt\">, </span><span style=\"font-size:10.5pt\">스마트</span><span style=\"font-size:10.5pt\">TV)+</span><span style=\"font-size:10.5pt\">애플리케이션을</span><span style=\"font-size:10.5pt\"> </span><span style=\"font-size:10.5pt\">모두</span><span style=\"font-size:10.5pt\"> </span><span style=\"font-size:10.5pt\">갖춘</span><span style=\"font-size:10.5pt\"> </span><span style=\"font-size:10.5pt\">독특한</span><span style=\"font-size:10.5pt\"> </span><span style=\"font-size:10.5pt\">모델을</span><span style=\"font-size:10.5pt\"> </span><span style=\"font-size:10.5pt\">구축하고</span><span style=\"font-size:10.5pt\"> </span><span style=\"font-size:10.5pt\">가장</span><span style=\"font-size:10.5pt\"> </span><span style=\"font-size:10.5pt\">빠르게</span><span style=\"font-size:10.5pt\"> </span><span style=\"font-size:10.5pt\">성장하는</span><span style=\"font-size:10.5pt\"> </span><span style=\"font-size:10.5pt\">브랜드</span><span style=\"font-size:10.5pt\"> </span><span style=\"font-size:10.5pt\">중</span><span style=\"font-size:10.5pt\"> </span><span style=\"font-size:10.5pt\">하나임</span><span style=\"font-size:10.5pt\">.</span></p>\r\n\t\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:10.5pt\">&#183; </span><span style=\"font-size:10.5pt\">콘텐츠</span><span style=\"font-size:10.5pt\"> </span><span style=\"font-size:10.5pt\">제작능력도</span><span style=\"font-size:10.5pt\"> </span><span style=\"font-size:10.5pt\">뛰어나</span><span style=\"font-size:10.5pt\"> &#160;2013</span><span style=\"font-size:10.5pt\">년</span><span style=\"font-size:10.5pt\"> </span><span style=\"font-size:10.5pt\">자체</span><span style=\"font-size:10.5pt\"> </span><span style=\"font-size:10.5pt\">제작한</span><span style=\"font-size:10.5pt\"> </span><span style=\"font-size:10.5pt\">드라마</span><span style=\"font-size:10.5pt\"> </span><span style=\"font-size:10.5pt\">『</span><span style=\"font-family:Gulim;font-size:10.5pt\">我</span><span style=\"font-family:새굴림;font-size:10.5pt\">怀</span><span style=\"font-family:새굴림;font-size:10.5pt\">了你的孩子</span><span style=\"font-size:10.5pt\">』는</span><span style=\"font-size:10.5pt\"> </span><span style=\"font-size:10.5pt\">총</span><span style=\"font-size:10.5pt\"> 4</span><span style=\"font-size:10.5pt\">억</span><span style=\"font-size:10.5pt\">6000</span><span style=\"font-size:10.5pt\">만</span><span style=\"font-size:10.5pt\"> </span><span style=\"font-size:10.5pt\">회</span><span style=\"font-size:10.5pt\"> </span><span style=\"font-size:10.5pt\">스트리밍을</span><span style=\"font-size:10.5pt\"> </span><span style=\"font-size:10.5pt\">달성함</span><span style=\"font-size:10.5pt\">.</span></p>\r\n\t\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:10.5pt\">&#183; </span><span style=\"font-size:10.5pt\">최근에는</span><span style=\"font-size:10.5pt\"> </span><span style=\"font-size:10.5pt\">스마트카</span><span style=\"font-size:10.5pt\"> </span><span style=\"font-size:10.5pt\">사업에도</span><span style=\"font-size:10.5pt\"> </span><span style=\"font-size:10.5pt\">관심을</span><span style=\"font-size:10.5pt\"> </span><span style=\"font-size:10.5pt\">보이고</span><span style=\"font-size:10.5pt\"> </span><span style=\"font-size:10.5pt\">있음</span><span style=\"font-size:10.5pt\">.</span></p>\r\n\t\t\t\t\t</td>\r\n\t\t\t\t</tr>\r\n\t\t\t</table>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:10.5pt\">자료원: 아이치이 홈페이지, 바이두, KOTRA 광저우 무역관 자료 종합(2017)</span></p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><a href=\"http://mobileinsight.info/%E4%B8%AD-%EB%AA%A8%EB%B0%94%EC%9D%BC-%EB%8F%99%EC%98%81%EC%83%81-%EC%95%B1-%EC%9D%B4%EC%9A%A9%EC%9E%90-6%EC%96%B5-%EB%AA%85-%ED%85%90%EC%84%BC%ED%8A%B8%EC%99%80-%EC%95%84%EC%9D%B4%EC%B9%98/\">http://mobileinsight.info/%E4%B8%AD-%EB%AA%A8%EB%B0%94%EC%9D%BC-%EB%8F%99%EC%98%81%EC%83%81-%EC%95%B1-%EC%9D%B4%EC%9A%A9%EC%9E%90-6%EC%96%B5-%EB%AA%85-%ED%85%90%EC%84%BC%ED%8A%B8%EC%99%80-%EC%95%84%EC%9D%B4%EC%B9%98/</a></p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><a href=\"http://www.cctime.com/html/2016-9-26/1222678.htm\">http://www.cctime.com/html/2016-9-26/1222678.htm</a></p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><a href=\"https://www.sohu.com/a/148252299_651268\">https://www.sohu.com/a/148252299_651268</a></p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><a href=\"http://www.cctime.com/html/2018-5-30/1387497.htm\">http://www.cctime.com/html/2018-5-30/1387497.htm</a></p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><a href=\"http://www.newsis.com/view/?id=NISX20180529_0000321483\">http://www.newsis.com/view/?id=NISX20180529_0000321483</a></p>\r\n\t\t"

    "content": "■ TOP OTT (매출 기준? 가입자 수? 둘다?)\n1\n2\n3\n4\n5\n■ Telco OTT\n중국 통신사업자 :\n- China Mobile :&#160;咪咕视频(Migu Video)\n<a href=\"http://www.miguvideo.com/mobiletv.jsp\">http://www.miguvideo.com/mobiletv.jsp</a>\n투자 이력\n2015년 71억 위안을 투자하는 등 3년 간 총 104억 위안(약 1조8000억원)을 투자\n수익모델 :\n가입자 수/MAU : 5억명/17년 9월 기준\n특징 및 강점\n전략 방향\n음악&#183;동영상&#183;e-book&#183;게임&#183;애니매이션 전담 5개 자회사를 묶어 뉴미디어 전문기업인 '미구문화과기(哶咕文化科技&#183;이하 미구문화)그룹' 설립\nWith the new content and partnership, Migu is able to offer more content and services covering sports, fitness, traveling and games to attract young users born after 1990, said Liu Xin, Migu’s chief executive. These extra services will add to the&#160;17 million songs, 4.3 million video clips and 500,000 ebooks online that Migu&#160;offers to China Mobile’s 880 million subscribers.&#160;\nMigu will also invest in new technologies like virtual reality, augmented reality and super high definition 4K contents.\nMigu는 주말 중국 스포츠 총국, BBC, Discovery Networks Asia-Pacific, Global Mobile World Congress Shanghai 및 Xiuzheng Group과 콘텐츠 계약을 체결하기로 합의했습니다.\nMigu는 새로운 콘텐츠와 파트너십을 통해 1990 년 이후에 태어난 젊은 사용자를 유치하기 위해 스포츠, 피트니스, 여행 및 게임에 관한 더 많은 콘텐츠와 서비스를 제공 할 수 있다고 Migu의 CEO 인 Liu Xin은 말했습니다.&#160;이러한 추가 서비스로 미구 (Migu)가 차이나 모바일 (China Mobile)의 8 억 8000 만 가입자에게 제공하는 1,700 만 곡, 430 만 비디오 클립 및 500,000 전자 서적이 온라인에 추가됩니다.&#160;\nMigu는 또한 가상 현실, 증강 현실 및 초 고화질 4K 컨텐츠와 같은 새로운 기술에 투자 할 것입니다.\n콘텐츠 : China Mobile이 운영하는 음악, 비디오, 독서, 게임 및 만화 부문을 하나의 플랫폼 인 migu.cn에 개별적으로 통합\nMigu boasts a portfolio comprising more than 17 million songs, 4.3 million videos, 1,200-plus live-streaming events, over 30,000 games and 470,000 anime works.\nMigu는 1700 만 곡 이상의 노래, 430 만 개의 비디오, 1,200 개 이상의 라이브 스트리밍 이벤트, 30,000 개 이상의 게임 및 47 만 개의 애니메이션 작품으로 구성된 포트폴리오를 자랑합니다.\n출시시기 : 2015년 1월\n서비스 국가\n매출\n- China Unicom :&#160;沃视频(Wo Video) Wo tv 와우tv\nㅇ 투자 이력\nㅇ 수익모델\nㅇ 가입자 수/MAU\nㅇ 특징 및 강점\nㅇ 전략 방향\nㅇ 콘텐츠\n모바일&#160;<a href=\"http://www.liqucn.com/rj/tag/zhibo/\" style=\"font-size:11pt;background-color:white\">생방송은</a>&#160;멈추지 않고 버퍼도없고 초를 바꾼다!&#160;트래픽 할인이 많으며, WiFi를 볼 필요가 없습니다!&#160;당신은 우와를보고, \"우와 비디오\"로 비디오를 보는 것만으로 충분합니다!&#160;\n[새로운 버전, 새로운 출발점]&#160;&#160;\n워 비디오의 차이나 유니콤 신중하게 제작 된 세트입니다&#160;<a href=\"http://www.liqucn.com/rj/tag/dianshizhibo/\" style=\"font-size:11pt;background-color:white\">라이브</a> 텔레비전&#160;, 영화, 텔레비전, 전체 비디오\nㅇ 출시시기 : 2016 년 11 월\nㅇ 서비스 국가\nㅇ 매출\n- China Telecom :&#160;天翼视频(Tianyi Video) <a href=\"http://www.tv189.com/\" lang=\"ko-KR\">http://www.tv189.com/</a>\nㅇ 투자 이력\nㅇ 수익모델\nㅇ 가입자 수/MAU\nㅇ 특징 및 강점\nㅇ 전략 방향\nㅇ 콘텐츠 비디오, 뉴스, 스포츠 및 기타 비디오 콘텐츠와 다운로드\n기본 비디오 서비스\n<a href=\"https://baike.baidu.com/item/%E7%94%B5%E8%A7%86%E7%9B%B4%E6%92%AD\">라이브</a> TV&#160;,&#160;<a href=\"https://baike.baidu.com/item/%E8%A7%86%E9%A2%91%E7%82%B9%E6%92%AD\">주문형</a> 비디오&#160;, 라이브 재생, 비디오 다운로드, 온라인 검색 등\n양방향 비디오 서비스\n<a href=\"https://baike.baidu.com/item/%E8%A7%86%E9%A2%91%E5%88%86%E4%BA%AB\">동영상</a> 공유&#160;, 동영상&#160;<a href=\"https://baike.baidu.com/item/%E6%8E%A8%E9%80%81/9908161\">푸시</a>&#160;,&#160;<a href=\"https://baike.baidu.com/item/%E6%89%8B%E6%9C%BA%E8%A7%86%E9%A2%91/6240909\">모바일</a> 동영상&#160;, 멀티 스크린 콘텐츠 상호 작용 등\n엔터테인먼트 예술 : 검객, 그것은, 형제, 서둘러 당신의&#160;<a href=\"http://www.onlinedown.net/soft/258791.htm\" style=\"font-size:10.5pt\">숨겨진</a>&#160;아버지가 어디로 갔는지, 우상이, 온 가수, 비밀의 방의 스타, 해피 캠프, 매일,&#160;<a href=\"http://www.onlinedown.net/soft/664548.htm\" style=\"font-size:10.5pt\">전체</a>&#160;<a href=\"http://www.onlinedown.net/soft/58472.htm\" style=\"font-size:10.5pt\">속도까지</a>&#160;첫 해, 한국 드림 팀, 중국 좋은&#160;<a href=\"http://www.onlinedown.net/soft/559814.htm\" style=\"font-size:10.5pt\">목소리</a>&#160;, 금성 쇼, 극한의 도전, 강희, 그리고 당신이 하나라면\n동영상 : 구 악마의 탑, 태양, 홍콩, 개미 맨, 팬케이크 남자의 잃어버린 도시, 파리 휴가, 신부 큰 싸움, 당신은 사랑스러운 몬스터 사냥으로 심장, 신혼 여행 라이벌, 산악 포병 굽기, 종양 군주, 샬롯 그것은 나가 특별한 문제, 개미, 도교 사제, 화려한 사무원, 남은 음식, 왕, 신데렐라, 도전자 동맹\n동기 히트 : DaYangGe는 세 남자는, 좋은 시간, 그는 듯했으나, 눈, 갠트리 에스코트 2, 싸움, 안티 테러 특공대, Langya 목록, 구름의 노래, 행복한 반환, 사칭, 북쪽 광저우의 눈물을 믿지 않는다 꽃 같은 엄마&#160;<a href=\"http://www.onlinedown.net/soft/7677.htm\" style=\"font-size:10.5pt\">최고의</a>&#160;여성, 천 개 뼈, 열정적 인 국가, 청소년 어셈블리를 보내고 그 샤오 강, 새로운 생활 불상 지 공 경우\n웃기는 애니메이션 : 슈퍼 해병대, 형사 코난, 원피스, 도라에몽, 나루토, 로봇 고양이, 베어 인 페스트, 검은 고양이 보안관, 디즈니\n라이브 TV : CCTV, 절강 위성 TV, 강소 위성 TV, 최초 금융 등. 휴대 전화는 TV\nTianyi Video는 고선명 비디오 라이브&#160;<a href=\"http://www.onlinedown.net/soft/116990.htm\" style=\"font-size:10.5pt\">비디오</a> 플레이어&#160;입니다.&#160;전체 네트워크의 비디오 리소스가 강력하게 집계되며 광고가 없습니다.&#160;\n영화, TV 프로그램, 다양한 엔터테인먼트, 애니메이션, 스포츠, 뉴스, 게임, 비디오 및 안드로이드 사용자를위한 기타 포괄 비디오 경험을 가진 전체 네트워크를 제공한다.&#160;멋진 재미있는 다양성, 최신 영화 및 TV 블록 버스터, 인기 TV 시리즈, 한국 드라마, 미국 TV 시리즈, 애니메이션&#160;\nㅇ 출시시기 2011 년 3 월 11 일\nㅇ 서비스 국가\nㅇ 매출"

const CONTENT_HASH = 'be48260e';

let cards = [];
let moving = null, resizing = null;
let selectedIdx = null, clipboardCard = null;
const GRID = 20, GAP = 14;
function snap(v) { return Math.round(v / GRID) * GRID; }

// ── Undo (Ctrl+Z) ────────────────────────────────────────────────────────────
const MAX_HISTORY = 50;
let history = [];
function snapshot() {
  syncText();
  history.push(JSON.stringify(cards));
  if (history.length > MAX_HISTORY) history.shift();
}
function undo() {
  if (!history.length) { showStatus('되돌릴 내용 없음'); return; }
  syncText();
  cards = JSON.parse(history.pop());
  renderCards();
  saveBoard();
  showStatus('↩ 되돌림');
}
function showStatus(msg) {
  const s = document.getElementById('status');
  s.textContent = msg;
  clearTimeout(showStatus._t);
  showStatus._t = setTimeout(() => { s.textContent = ''; }, 2000);
}
document.addEventListener('keydown', e => {
  const isText = document.activeElement?.contentEditable === 'true';
  if ((e.ctrlKey || e.metaKey) && e.key === 'z' && !e.shiftKey) {
    if (isText) return;
    e.preventDefault();
    undo();
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'c' && !e.shiftKey && !isText) {
    if (selectedIdx !== null && cards[selectedIdx]) {
      syncText();
      clipboardCard = JSON.parse(JSON.stringify(cards[selectedIdx]));
      showStatus('카드 복사됨');
      e.preventDefault();
    }
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'v' && !e.shiftKey && !isText) {
    if (clipboardCard) {
      e.preventDefault();
      snapshot();
      const nc = JSON.parse(JSON.stringify(clipboardCard));
      nc.x = (nc.x || 0) + 30; nc.y = (nc.y || 0) + 30;
      cards.push(nc);
      selectedIdx = cards.length - 1;
      renderCards(); saveBoard();
      showStatus('카드 붙여넣음');
    }
  }
  if (e.key === 'Escape') {
    document.querySelectorAll('.card.selected').forEach(c => c.classList.remove('selected'));
    selectedIdx = null;
  }
});

function pushCards(movedIdx) {
  const moved = cards[movedIdx];
  const movedEl = document.querySelector(`.card[data-idx="${movedIdx}"]`);
  if (!movedEl) return;
  const mh = movedEl.offsetHeight;
  document.querySelectorAll('.card').forEach(el => {
    const i = +el.dataset.idx;
    if (i === movedIdx) return;
    const c = cards[i], oh = el.offsetHeight;
    if (moved.x < (c.x+(c.w||200)) && (moved.x+(moved.w||200)) > c.x && moved.y < (c.y+oh) && (moved.y+mh) > c.y) {
      c.y = moved.y + mh + GAP;
      el.style.top = c.y + 'px';
    }
  });
}

function loadBoard() {
  const saved = localStorage.getItem(SAVE_KEY);
  const savedHash = localStorage.getItem(SAVE_KEY + ':hash');
  let parsed = null;
  try { parsed = saved ? JSON.parse(saved) : null; } catch(e) {}
  // reset if: no save, empty array, or content hash changed (page regenerated)
  if (!parsed || parsed.length === 0 || savedHash !== CONTENT_HASH) {
    cards = DEFAULT_CARDS.map(c => ({...c}));
    localStorage.removeItem(SAVE_KEY);
    localStorage.setItem(SAVE_KEY + ':hash', CONTENT_HASH);
    renderCards();
    const hasCoords = cards.some(c => c.x !== undefined && c.y !== undefined);
    if (!hasCoords) autoLayout();
    return;
  }
  cards = parsed;
  renderCards();
}
function resetToDefaults() { if (!confirm('저장된 보드를 지우고 원본으로 초기화합니다. 계속할까요?')) return; localStorage.removeItem(SAVE_KEY); cards = DEFAULT_CARDS.map(c => ({...c})); renderCards(); autoLayout(); }

function autoLayout() {
  const boardW = document.getElementById('board').offsetWidth;
  const cols = Math.max(1, Math.floor(boardW / 280));
  const colW = (boardW - GAP*(cols-1)) / cols;
  const colH = new Array(cols).fill(0);
  const allCards = document.querySelectorAll('.card');
  const images = document.querySelectorAll('.card img');
  let loaded = 0;
  function place() {
    allCards.forEach((el, i) => {
      const w = Math.min(cards[i].w || colW, colW);
      let minCol = 0;
      for (let c = 1; c < cols; c++) if (colH[c] < colH[minCol]) minCol = c;
      cards[i].x = minCol * (colW + GAP);
      cards[i].y = colH[minCol];
      cards[i].w = w;
      el.style.left = cards[i].x + 'px';
      el.style.top = cards[i].y + 'px';
      el.style.width = w + 'px';
      colH[minCol] = cards[i].y + el.offsetHeight + GAP;
    });
    document.getElementById('board').style.minHeight = (Math.max(...colH) + 100) + 'px';
    saveBoard();
  }
  if (!images.length) { requestAnimationFrame(place); return; }
  images.forEach(img => {
    if (img.complete) { loaded++; if (loaded >= images.length) requestAnimationFrame(place); }
    else { img.onload = img.onerror = () => { loaded++; if (loaded >= images.length) requestAnimationFrame(place); }; }
  });
}

function syncText() {
  document.querySelectorAll('.card').forEach(el => {
    const i = +el.dataset.idx;
    if (cards[i]?.type === 'text') { const t = el.querySelector('.text'); if (t) cards[i].content = t.innerHTML; }
  });
}

      el.appendChild(tbl);
      const addRow = document.createElement('button');
      addRow.textContent = '+ 행'; addRow.style.cssText = 'margin-top:4px;font-size:11px;background:#21262d;border:1px solid #30363d;color:#8b949e;padding:2px 8px;border-radius:4px;cursor:pointer;';
      addRow.onclick = e => { e.stopPropagation(); snapshot(); if (!cards[i].rows) cards[i].rows = rows; cards[i].rows.push(new Array(cards[i].rows[0].length).fill('')); renderCards(); saveBoard(); };
      const addCol = document.createElement('button');
      addCol.textContent = '+ 열'; addCol.style.cssText = 'margin-top:4px;margin-left:4px;font-size:11px;background:#21262d;border:1px solid #30363d;color:#8b949e;padding:2px 8px;border-radius:4px;cursor:pointer;';
      addCol.onclick = e => { e.stopPropagation(); snapshot(); if (!cards[i].rows) cards[i].rows = rows; cards[i].rows.forEach(r => r.push('')); renderCards(); saveBoard(); };
      el.appendChild(addRow); el.appendChild(addCol);
    }
    const rh = document.createElement('div'); rh.className = 'resize-handle';
    rh.addEventListener('mousedown', e => { e.preventDefault(); e.stopPropagation(); snapshot(); resizing = { idx: i, startX: e.clientX, startW: card.w || el.offsetWidth }; });
    el.appendChild(rh);
    if (i === selectedIdx) el.classList.add('selected');
    board.appendChild(el);
  });
  requestAnimationFrame(() => {
    let maxB = 0;
    document.querySelectorAll('.card').forEach(el => { const b = (parseFloat(el.style.top)||0) + el.offsetHeight; if (b > maxB) maxB = b; });
    board.style.minHeight = (maxB + 100) + 'px';
  });
}

document.addEventListener('mousemove', e => {
  if (moving) {
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`); if (!el) return;
    let nx = moving.origX + e.clientX - moving.startX, ny = moving.origY + e.clientY - moving.startY;
    if (e.shiftKey) { nx = snap(nx); ny = snap(ny); el.style.outline = '1px dashed rgba(240,192,64,0.3)'; } else { el.style.outline = ''; }
    el.style.left = nx + 'px'; el.style.top = ny + 'px';
  }
  if (resizing) {
    let nw = resizing.startW + e.clientX - resizing.startX; if (e.shiftKey) nw = snap(nw);
    cards[resizing.idx].w = Math.max(100, nw);
    const el = document.querySelector(`.card[data-idx="${resizing.idx}"]`); if (el) el.style.width = cards[resizing.idx].w + 'px';
  }
});

document.addEventListener('mouseup', e => {
  if (moving) {
    let nx = moving.origX + e.clientX - moving.startX, ny = moving.origY + e.clientY - moving.startY;
    if (e.shiftKey) { nx = snap(nx); ny = snap(ny); }
    cards[moving.idx].x = Math.max(0, nx); cards[moving.idx].y = Math.max(0, ny);
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`); if (el) { el.classList.remove('moving'); el.style.outline = ''; }
    if (e.shiftKey) pushCards(moving.idx);
    moving = null; saveBoard();
  }
  if (resizing) { if (e.shiftKey) pushCards(resizing.idx); resizing = null; saveBoard(); }
});

function addTextCard() { snapshot(); cards.push({ type: 'text', content: '', x: 50, y: window.scrollY+100, w: 300 }); renderCards(); setTimeout(() => { const els = document.querySelectorAll('.card .text'); els[els.length-1]?.focus(); }, 100); }
function addImageCard() { const input = document.createElement('input'); input.type = 'file'; input.accept = 'image/*'; input.onchange = e => { const f = e.target.files[0]; if (!f) return; const r = new FileReader(); r.onload = () => { snapshot(); cards.push({ type: 'image', src: r.result, x: 50, y: window.scrollY+100, w: 240 }); renderCards(); saveBoard(); }; r.readAsDataURL(f); }; input.click(); }
function addImageUrl() { const url = prompt('이미지 URL'); if (!url) return; snapshot(); cards.push({ type: 'image', src: url, x: 50, y: window.scrollY+100, w: 240 }); renderCards(); saveBoard(); }
function addTableCard() {
  const colsStr = prompt('열 수 (기본 3)', '3'); const cols = Math.max(1, parseInt(colsStr)||3);
  const rowsStr = prompt('행 수 (헤더 포함, 기본 4)', '4'); const rows = Math.max(1, parseInt(rowsStr)||4);
  snapshot();
  cards.push({ type: 'table', rows: Array.from({length: rows}, (_, ri) => Array.from({length: cols}, (_, ci) => ri===0 ? `열${ci+1}` : '')), x: 50, y: window.scrollY+100, w: Math.max(240, cols*100) });
  renderCards(); saveBoard();
}
function exportBoard() { syncText(); const blob = new Blob([JSON.stringify(cards, null, 2)], { type: 'application/json' }); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = SAVE_KEY + '.json'; a.click(); }
// ── Zoom ─────────────────────────────────────────────────────────────────────
let zoom = parseFloat(localStorage.getItem('zoom-' + SAVE_KEY) || '1.0');
function applyZoom() {
  const board = document.getElementById('board');
  board.style.transform = `scale(${zoom})`;
  board.style.transformOrigin = '0 0';
  document.getElementById('zoom-level').textContent = Math.round(zoom * 100) + '%';
  localStorage.setItem('zoom-' + SAVE_KEY, zoom);
}
function zoomIn()  { zoom = Math.min(3.0, parseFloat((zoom + 0.1).toFixed(2))); applyZoom(); }
function zoomOut() { zoom = Math.max(0.2, parseFloat((zoom - 0.1).toFixed(2))); applyZoom(); }
document.addEventListener('keydown', e => {
  if (e.ctrlKey || e.metaKey) {
    if (e.key === '=' || e.key === '+') { e.preventDefault(); zoomIn(); }
    if (e.key === '-')                  { e.preventDefault(); zoomOut(); }
    if (e.key === '0')                  { e.preventDefault(); zoom = 1.0; applyZoom(); }
  }
});
document.getElementById('board').addEventListener('wheel', e => {
  if (!(e.ctrlKey || e.metaKey)) return;
  e.preventDefault();
  e.deltaY < 0 ? zoomIn() : zoomOut();
}, { passive: false });
applyZoom();
function resetLayout() { if (!confirm('자동 재배치합니다.')) return; cards.forEach(c => { delete c.x; delete c.y; }); renderCards(); autoLayout(); }
// ── Floating format toolbar ───────────────────────────────────────────────────
const fmtBar = document.getElementById('format-toolbar');
function fmt(cmd) { document.execCommand(cmd, false, null); saveBoard(); }
function fmtLink() {
  const sel = window.getSelection();
  if (!sel || sel.isCollapsed) return;
  const url = prompt('링크 URL 입력', 'https://');
  if (!url) return;
  document.execCommand('createLink', false, url);
  // make links open in new tab
  sel.anchorNode?.parentElement?.closest('a')?.setAttribute('target', '_blank');
  document.querySelectorAll('.text a').forEach(a => a.target = '_blank');
  saveBoard();
}

// prevent format buttons from blurring contenteditable
fmtBar.addEventListener('mousedown', e => e.preventDefault());

document.addEventListener('selectionchange', () => {
  const sel = window.getSelection();
  if (!sel || sel.isCollapsed || !sel.toString().trim()) { fmtBar.style.display = 'none'; return; }
  // only show if selection is inside a .text element
  const anchor = sel.anchorNode;
  if (!anchor) { fmtBar.style.display = 'none'; return; }
  const textEl = anchor.nodeType === 1 ? anchor.closest('.text') : anchor.parentElement?.closest('.text');
  if (!textEl) { fmtBar.style.display = 'none'; return; }
  // position above selection
  const range = sel.getRangeAt(0);
  const rect = range.getBoundingClientRect();
  fmtBar.style.display = 'flex';
  const tbW = fmtBar.offsetWidth || 180;
  let left = rect.left + rect.width / 2 - tbW / 2;
  left = Math.max(8, Math.min(left, window.innerWidth - tbW - 8));
  fmtBar.style.left = left + 'px';
  fmtBar.style.top = (rect.top - 44 + window.scrollY) + 'px';
});

setInterval(saveBoard, 30000);
loadBoard();
</script>
</body>
</html>
