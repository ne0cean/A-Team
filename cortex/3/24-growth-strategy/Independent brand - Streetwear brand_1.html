    "html": "\r\n\t\t\t<table style=\"border:1px solid;border-collapse:collapse\">\r\n\t\t\t\t<tr>\r\n\t\t\t\t\t<td style=\"background-color:#e2efd9;width:112;border:1px solid;font-family:Tahoma\"><span style=\"font-family:Malgun Gothic;color:black;font-weight:bold\">브랜드 기획</span></td>\r\n\t\t\t\t\t<td style=\"border:1px solid\">\t\t\t\t\t<ul>\r\n\t\t\t\t\t\t<li style=\"font-family:Tahoma\"><span style=\"font-family:Malgun Gothic;color:black\">브랜드 네이밍, 상표 등록, 우븐 및 행텍 라벨 제작,</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;color:black\"> </span><span style=\"font-family:Malgun Gothic;color:black\">고객 분석, 타겟 브랜드 분석, 타겟팅</span></li>\r\n\t\t\t\t\t</ul>\r\n\t\t\t\t\t</td>\r\n\t\t\t\t</tr>\r\n\t\t\t\t<tr>\r\n\t\t\t\t\t<td style=\"background-color:#e2efd9;width:112;border:1px solid;font-family:Tahoma\"><span style=\"font-family:Malgun Gothic;color:black;font-weight:bold\">가격 정책 수립</span></td>\r\n\t\t\t\t\t<td style=\"border:1px solid\">\t\t\t\t\t<ul>\r\n\t\t\t\t\t\t<li style=\"font-family:Tahoma\"><span style=\"font-family:Malgun Gothic;color:black\">가격 존 분석, 가격대 책정</span></li>\r\n\t\t\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic;color:black\">브랜드 가격 책정에 따른 원부자재 가격 책정</span></p>\r\n\t\t\t\t\t\t<br />\r\n\t\t\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic;color:black\">고객이 적어낸 가격에 판다.</span></p>\r\n\t\t\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic;color:black\">그리고, 고유 번호/Exclusive한 표식을 부여</span></p>\r\n\t\t\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic;color:black\">착샷을</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;color:black\"> </span><span style=\"font-family:Malgun Gothic;color:black\">공홈에</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;color:black\"> </span><span style=\"font-family:Malgun Gothic;color:black\">올려주고</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;color:black\"> </span><span style=\"font-family:Malgun Gothic;color:black\">구매</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;color:black\"> </span><span style=\"font-family:Malgun Gothic;color:black\">가격도</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;color:black\"> </span><span style=\"font-family:Malgun Gothic;color:black\">알려줌</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;color:black\"> - SNS </span><span style=\"font-family:Malgun Gothic;color:black\">공유</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;color:black\"> </span><span style=\"font-family:Malgun Gothic;color:black\">가능</span></p>\r\n\t\t\t\t\t</ul>\r\n\t\t\t\t\t<br />\r\n\t\t\t\t\t</td>\r\n\t\t\t\t</tr>\r\n\t\t\t\t<tr>\r\n\t\t\t\t\t<td style=\"background-color:#e2efd9;width:112;border:1px solid;font-family:Tahoma\"><span style=\"font-family:Malgun Gothic;color:black;font-weight:bold\">브랜드 작성</span></td>\r\n\t\t\t\t\t<td style=\"border:1px solid\">\t\t\t\t\t<ul>\r\n\t\t\t\t\t\t<li style=\"font-family:Tahoma\"><span style=\"font-family:Malgun Gothic;color:black\">브랜드 컨셉, 이번 시즌의 theme board 작성, color 기획 구성</span></li>\r\n\t\t\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic;color:black\">스타일 기획, 소재 기획, 스타일과 소재의 매칭,</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;color:black\"> </span><span style=\"font-family:Malgun Gothic;color:black\">스타일화 작성, 컬러링, 도식화 작성, 작업지시서 작성</span></p>\r\n\t\t\t\t\t\t<li style=\"font-family:Tahoma\"><span style=\"font-family:Malgun Gothic;color:black\">원단시장 방문, 원단에 대한 이해, 원단과 스타일 매칭</span></li>\r\n\t\t\t\t\t\t<li style=\"font-family:Tahoma\"><span style=\"font-family:Malgun Gothic;color:black\">샘플실 컨텍, 봉제 용어 습득, 샘플실 핸들링, 원부자재 발주</span></li>\r\n\t\t\t\t\t</ul>\r\n\t\t\t\t\t</td>\r\n\t\t\t\t</tr>\r\n\t\t\t\t<tr>\r\n\t\t\t\t\t<td style=\"backgro " style=\"font-family:Malgun Gothic\">그</span><span style=\"font-family:Malgun Gothic\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">시절을</span><span style=\"font-family:Malgun Gothic\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">사는</span><span style=\"font-family:Malgun Gothic\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">모든</span><span style=\"font-family:Malgun Gothic\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">세대가</span><span style=\"font-family:Malgun Gothic\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">열광하는</span><span style=\"font-family:Malgun Gothic\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">것</span><span style=\"font-family:Malgun Gothic\">, </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">패션</span><span style=\"font-family:Malgun Gothic\">. </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">음악</span><span style=\"font-family:Malgun Gothic\">. </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">이성</span><span style=\"font-family:Malgun Gothic\">. </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">예술</span><span style=\"font-family:Malgun Gothic\">. </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">차…</span><span style=\"font-family:Malgun Gothic\">. </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">이</span><span style=\"font-family:Malgun Gothic\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">모든</span><span style=\"font-family:Malgun Gothic\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">것을</span><span style=\"font-family:Malgun Gothic\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">포괄적으로</span><span style=\"font-family:Malgun Gothic\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">담고</span><span style=\"font-family:Malgun Gothic\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">표현</span><span style=\"font-family:Malgun Gothic\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">할</span><span style=\"font-family:Malgun Gothic\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">수</span><span style=\"font-family:Malgun Gothic\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">있는</span><span style=\"font-family:Malgun Gothic\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">그릇</span><span style=\"font-family:Malgun Gothic\">.</span></span></li>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><span style=\"font-family:Malgun Gothic\">물성</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> - </span><span style=\"font-family:Malgun Gothic\">움직이는</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">광고판</span></li>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><span style=\"font-family:Malgun Gothic\">잦은</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">구매</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">빈도</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\">/ </span><span style=\"font-family:Malgun Gothic\">트랜잭션</span></li>\r\n\t\t\t\t<li style=\"font-family:Tahoma\"><span style=\"font-family:Malgun Gothic\">콜라보가</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">쉽고</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">유연함</span></li>\r\n\t\t\t</ul>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">스트리트 패션(Street Fashion, Streetwear)이란 단어 뜻 그대로 길거리 사람들의&#160;</span><a href=\"https://namu.wiki/w/%ED%8C%A8%EC%85%98\" style=\"font-family:Open Sans;font-size:10.5pt;background-color:#1a1b1b\">패션</a><span style=\"font-family:Malgun Gothic\">을 일컫는 말이다.</span></p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">1950~60년대에는 기존 보수적 체제에 반항하는 하위 저급&#160;</span><a href=\"https://namu.wiki/w/%ED%82%A4%EC%B9%98\" style=\"font-family:Open Sans;font-size:10.5pt;background-color:#1a1b1b\">키치</a><span style=\"font-family:Malgun Gothic\">&#160;</span><a href=\"https://namu.wiki/w/%EB%AC%B8%ED%99%94\" style=\"font-family:Open Sans;font-size:10.5pt;background-color:#1a1b1b\">문화</a><span style=\"font-family:Malgun Gothic\">&#160;쯤으로 인식되었으나, 2000년대 이후 새로운 패션 분야이자 사업 아이템 등 다양한 입장에서 재조명되어 소위 &#39;남친룩/여친룩&#39; 등으로 대표되는 대중 메이저 패션의 대체재 중 하나로 자리잡았다.</span></p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">20세기 패션의 유행 경로를 보면 유명 디자이너들의&#160;</span><a href=\"https://namu.wiki/w/%EC%98%A4%ED%8A%B8%EC%BF%A0%ED%8A%80%EB%A5%B4\" style=\"font-family:Open Sans;font-size:10.5pt;background-color:#1a1b1b\">오트쿠튀르</a><span style=\"font-family:Malgun Gothic\">나&#160;</span><a href=\"https://namu.wiki/w/%ED%94%84%EB%A0%88%ED%83%80%ED%8F%AC%EB%A5%B4%ED%85%8C\" style=\"font-family:Open Sans;font-size:10.5pt;background-color:#1a1b1b\">프레타포르테</a><span style=\"font-family:Malgun Gothic\">를 통해 전개되어 대중들에게까지 전해지는 형태를 띄는 경우가 꽤 많았는데</span><sup><a href=\"https://namu.wiki/w/%EC%8A%A4%ED%8A%B8%EB%A6%AC%ED%8A%B8%20%ED%8C%A8%EC%85%98#fn-1\" style=\"font-family:Open Sans;font-size:10pt;background-color:#1a1b1b\">[1]</a></sup><span style=\"font-family:Malgun Gothic\">, 스트릿 패션은&#160;</span><a href=\"https://namu.wiki/w/%EC%B2%AD%EC%86%8C%EB%85%84\" style=\"font-family:Open Sans;font-size:10.5pt;background-color:#1a1b1b\">청소년</a><span style=\"font-family:Malgun Gothic\">과 같은 젊은 층 사이에서 자생적으로 생겨난 일시적 유행 패션이 역으로 오트쿠튀르, 프레타포르테 등의 하이패션에 영향을 주는 보텀 업(bottom up) 현상으로 이어지다보니, 이를 하이패션과 구분짓기 위해 생겨난 용어이다.</span></p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">젊은이들의 길거리 유행으로 시작되는 패션 분야이기 때문에 정의가 상당히 애매하다. 또한 유행을 따라가기 때문에 어느 시점에서는 어떤 아이템이 스트리트 패션이라고 불리다가 그렇지 않게 되는 경우도 있고, 갑자기 스트릿 패션으로 불릴 수도 있다.</span></p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">길거리 패션이 이렇게 인기를 끌게 된 요인으로는 두가지가 꼽힌다. 첫번째는 자신들의 디자인을 소비자에게 강요하는 ‘톱다운’ 방식이 아닌, 트렌드를 발빠르게 반영하는 ‘바텀업’ 생산에 집중하는 점이다.</span></p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">이는 주력 소비층에 1020세대인 것과도 연관이 깊다. 정대권 코드그라피 이사는 “요즘 어린 세대는 자기가 입는 옷이 다른 사람과 차별화되기를 다른 세대보다 더 바란다”며 “디자인이 특별하면 브랜드는 편견 없이 바라보는 게 특징”이라고 말했다.</span></p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">상당수 브랜드가 이들을 잡기 위해 다품종 소량생산 방식을 택한 게 주효했다는 평가도 나온다. 주요 브랜드 최고경영자(CEO)들이 동대문에서 사업을 시작해 동대문식 초고속 생산 시스템을 익힌데다 SNS를 활용한 마케팅에 능숙한 게 이를 가능케한 것으로 분석된다.</span></p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">마땡킴이 인스타그램에 발매 정보를 올리고, 팔릴 때마다 50개, 100개씩 공장에 추가 주문&#183;생산하는 게 대표적인 사례다. 김다인 마땡킴 대표는 “인스타그램을 이용한 판매는 작은 브랜드가 선택할 수 있는 최적의 시스템”이라고 말했다.</span></p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">과거엔 단순히&#160;</span><a href=\"https://namu.wiki/w/%EC%8A%A4%EC%BC%80%EC%9D%B4%ED%8A%B8\" style=\"font-family:Open Sans;font-size:10.5pt;background-color:#1a1b1b\">스케이트</a><span style=\"font-family:Malgun Gothic\">&#160;보더,&#160;</span><a href=\"https://namu.wiki/w/%ED%94%BD%EC%8B%9C\" style=\"font-family:Open Sans;font-size:10.5pt;background-color:#1a1b1b\">픽시</a><span style=\"font-family:Malgun Gothic\">,&#160;</span><a href=\"https://namu.wiki/w/%ED%9E%99%EC%8A%A4%ED%84%B0\" style=\"font-family:Open Sans;font-size:10.5pt;background-color:#1a1b1b\">힙스터</a><span style=\"font-family:Malgun Gothic\">들이 입고 다니는 패션의 의미가 강했으나, 국내에선 2010년대&#160;</span><a href=\"https://namu.wiki/w/%EC%87%BC%EB%AF%B8%EB%8D%94%EB%A8%B8%EB%8B%88\" style=\"font-family:Open Sans;font-size:10.5pt;background-color:#1a1b1b\">쇼미더머니</a><span style=\"font-family:Malgun Gothic\">를 필두로 한 힙합 유행이 시작하면서 동/서양 힙합 아티스트들이 입던 스트리트 패션이 주목받기도 했다. 특히&#160;</span><a href=\"https://namu.wiki/w/%EC%97%90%EC%9D%B4%EC%85%89%20%EB%9D%BC%ED%82%A4\" style=\"font-family:Open Sans;font-size:10.5pt;background-color:#1a1b1b\">에이셉 라키</a><span style=\"font-family:Malgun Gothic\">와&#160;</span><a href=\"https://namu.wiki/w/%ED%8A%B8%EB%9E%98%EB%B9%84%EC%8A%A4%20%EC%8A%A4%EC%BA%87\" style=\"font-family:Open Sans;font-size:10.5pt;background-color:#1a1b1b\">트래비스 스캇</a><span style=\"font-family:Malgun Gothic\">,&#160;</span><a href=\"https://namu.wiki/w/%EC%B9%B8%EC%98%88%20%EC%9B%A8%EC%8A%A4%ED%8A%B8\" style=\"font-family:Open Sans;font-size:10.5pt;background-color:#1a1b1b\">칸예 웨스트</a><span style=\"font-family:Malgun Gothic\">가 대표적.</span></p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><a href=\"https://hypebeast.kr/2019/5/streetwear-report-supreme-off-white-nike-palace\">https://hypebeast.kr/2019/5/streetwear-report-supreme-off-white-nike-palace</a></p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><a href=\"https://namu.wiki/w/%EC%8A%A4%ED%8A%B8%EB%A6%AC%ED%8A%B8%20%ED%8C%A8%EC%85%98\">https://namu.wiki/w/%EC%8A%A4%ED%8A%B8%EB%A6%AC%ED%8A%B8%20%ED%8C%A8%EC%85%98</a></p>\r\n\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Open Sans;font-size:10.5pt;color:#d7d5d2;background-color:#1a1b1b;font-weight:bold\">트렌드가 매우 급격하게 바뀌는 패션</span><span style=\"font-family:Malgun Gothic\">&#160;분야</span></p>\r\n\t\t"
  }
];
const CONTENT_HASH = '56b8c844';

let cards = [];
let moving = null, resizing = null;
let selectedIdx = null, clipboardCard = null;
const GRID = 20, GAP = 14;
function snap(v) { return Math.round(v / GRID) * GRID; }

// ── Undo (Ctrl+Z) ────────────────────────────────────────────────────────────
const MAX_HISTORY = 50;
let history = [];
function snapshot() {
  syncText();
  history.push(JSON.stringify(cards));
  if (history.length > MAX_HISTORY) history.shift();
}
function undo() {
  if (!history.length) { showStatus('되돌릴 내용 없음'); return; }
  syncText();
  cards = JSON.parse(history.pop());
  renderCards();
  saveBoard();
  showStatus('↩ 되돌림');
}
function showStatus(msg) {
  const s = document.getElementById('status');
  s.textContent = msg;
  clearTimeout(showStatus._t);
  showStatus._t = setTimeout(() => { s.textContent = ''; }, 2000);
}
document.addEventListener('keydown', e => {
  const isText = document.activeElement?.contentEditable === 'true';
  if ((e.ctrlKey || e.metaKey) && e.key === 'z' && !e.shiftKey) {
    if (isText) return;
    e.preventDefault();
    undo();
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'c' && !e.shiftKey && !isText) {
    if (selectedIdx !== null && cards[selectedIdx]) {
      syncText();
      clipboardCard = JSON.parse(JSON.stringify(cards[selectedIdx]));
      showStatus('카드 복사됨');
      e.preventDefault();
    }
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'v' && !e.shiftKey && !isText) {
    if (clipboardCard) {
      e.preventDefault();
      snapshot();
      const nc = JSON.parse(JSON.stringify(clipboardCard));
      nc.x = (nc.x || 0) + 30; nc.y = (nc.y || 0) + 30;
      cards.push(nc);
      selectedIdx = cards.length - 1;
      renderCards(); saveBoard();
      showStatus('카드 붙여넣음');
    }
  }
  if (e.key === 'Escape') {
    document.querySelectorAll('.card.selected').forEach(c => c.classList.remove('selected'));
    selectedIdx = null;
  }
});

function pushCards(movedIdx) {
  const moved = cards[movedIdx];
  const movedEl = document.querySelector(`.card[data-idx="${movedIdx}"]`);
  if (!movedEl) return;
  const mh = movedEl.offsetHeight;
  document.querySelectorAll('.card').forEach(el => {
    const i = +el.dataset.idx;
    if (i === movedIdx) return;
    const c = cards[i], oh = el.offsetHeight;
    if (moved.x < (c.x+(c.w||200)) && (moved.x+(moved.w||200)) > c.x && moved.y < (c.y+oh) && (moved.y+mh) > c.y) {
      c.y = moved.y + mh + GAP;
      el.style.top = c.y + 'px';
    }
  });
}

function loadBoard() {
  const saved = localStorage.getItem(SAVE_KEY);
  const savedHash = localStorage.getItem(SAVE_KEY + ':hash');
  let parsed = null;
  try { parsed = saved ? JSON.parse(saved) : null; } catch(e) {}
  // reset if: no save, empty array, or content hash changed (page regenerated)
  if (!parsed || parsed.length === 0 || savedHash !== CONTENT_HASH) {
    cards = DEFAULT_CARDS.map(c => ({...c}));
    localStorage.removeItem(SAVE_KEY);
    localStorage.setItem(SAVE_KEY + ':hash', CONTENT_HASH);
    renderCards();
    const hasCoords = cards.some(c => c.x !== undefined && c.y !== undefined);
    if (!hasCoords) autoLayout();
    return;
  }
  cards = parsed;
  renderCards();
}
function resetToDefaults() { if (!confirm('저장된 보드를 지우고 원본으로 초기화합니다. 계속할까요?')) return; localStorage.removeItem(SAVE_KEY); cards = DEFAULT_CARDS.map(c => ({...c})); renderCards(); autoLayout(); }

function autoLayout() {
  const boardW = document.getElementById('board').offsetWidth;
  const cols = Math.max(1, Math.floor(boardW / 280));
  const colW = (boardW - GAP*(cols-1)) / cols;
  const colH = new Array(cols).fill(0);
  const allCards = document.querySelectorAll('.card');
  const images = document.querySelectorAll('.card img');
  let loaded = 0;
  function place() {
    allCards.forEach((el, i) => {
      const w = Math.min(cards[i].w || colW, colW);
      let minCol = 0;
      for (let c = 1; c < cols; c++) if (colH[c] < colH[minCol]) minCol = c;
      cards[i].x = minCol * (colW + GAP);
      cards[i].y = colH[minCol];
      cards[i].w = w;
      el.style.left = cards[i].x + 'px';
      el.style.top = cards[i].y + 'px';
      el.style.width = w + 'px';
      colH[minCol] = cards[i].y + el.offsetHeight + GAP;
    });
    document.getElementById('board').style.minHeight = (Math.max(...colH) + 100) + 'px';
    saveBoard();
  }
  if (!images.length) { requestAnimationFrame(place); return; }
  images.forEach(img => {
    if (img.complete) { loaded++; if (loaded >= images.length) requestAnimationFrame(place); }
    else { img.onload = img.onerror = () => { loaded++; if (loaded >= images.length) requestAnimationFrame(place); }; }
  });
}

function syncText() {
  document.querySelectorAll('.card').forEach(el => {
    const i = +el.dataset.idx;
    if (cards[i]?.type === 'text') { const t = el.querySelector('.text'); if (t) cards[i].content = t.innerHTML; }
  });
}
function saveBoard() { syncText(); localStorage.setItem(SAVE_KEY, JSON.stringify(cards)); localStorage.setItem(SAVE_KEY + ':hash', CONTENT_HASH); showStatus('저장됨 ' + new Date().toLocaleTimeString()); }

function renderCards() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  cards.forEach((card, i) => {
    const el = document.createElement('div');
    el.className = 'card'; el.dataset.idx = i;
    if (card.x !== undefined) el.style.left = card.x + 'px';
    if (card.y !== undefined) el.style.top = card.y + 'px';
    // html cards contain raw OneNote table HTML which may overflow the stated div width
    if (card.w) { if (card.type === 'html') el.style.minWidth = card.w + 'px'; else el.style.width = card.w + 'px'; }
    el.addEventListener('mousedown', e => {
      if (e.target.closest('.text, a, .card-btn, .resize-handle, td, th')) return;
      e.preventDefault();
      // Update selection
      document.querySelectorAll('.card.selected').forEach(c => c.classList.remove('selected'));
      selectedIdx = i; el.classList.add('selected');
      snapshot();
      moving = { idx: i, startX: e.clientX, startY: e.clientY, origX: card.x||0, origY: card.y||0 };
      el.classList.add('moving');
    });
    const actions = document.createElement('div'); actions.className = 'card-actions';
    const delBtn = document.createElement('button'); delBtn.className = 'card-btn'; delBtn.textContent = '×';
    delBtn.onclick = e => { e.stopPropagation(); if(confirm('삭제?')) { snapshot(); cards.splice(i,1); renderCards(); saveBoard(); } };
    actions.appendChild(delBtn); el.appendChild(actions);
    if (card.type === 'text') {
      const text = document.createElement('div'); text.className = 'text'; text.contentEditable = true;
      text.innerHTML = card.content || '';
      text.addEventListener('focus', () => { snapshot(); });
      text.addEventListener('blur', () => { card.content = text.innerHTML; saveBoard(); });
      el.appendChild(text);
    } else if (card.type === 'image') {
      const img = document.createElement('img');
      img.src = card.src.startsWith('http') || card.src.startsWith('data:') ? card.src : IMG_BASE + card.src;
      img.alt = ''; img.loading = 'lazy'; img.onerror = () => img.style.display = 'none';
      if (card.w) img.style.width = card.w + 'px';
      if (card.h) img.style.height = card.h + 'px';
      if (card.link) { const a = document.createElement('a'); a.href = card.link; a.target = '_blank'; a.appendChild(img); el.appendChild(a); }
      else { el.appendChild(img); }
      if (card.caption) { const cap = document.createElement('div'); cap.style.cssText = 'font-size:11px;color:#8b949e;margin-top:4px;word-break:break-word;padding:0 2px;'; cap.textContent = card.caption; el.appendChild(cap); }
    } else if (card.type === 'html') {
      const wrapper = document.createElement('div');
      wrapper.style.cssText = 'overflow:auto;font-size:13px;line-height:1.5;';
      wrapper.innerHTML = card.html.replace(/__ATTACHMENT__/g, IMG_BASE);
      wrapper.querySelectorAll('img').forEach(img => { img.style.maxWidth = '100%'; img.style.height = 'auto'; img.draggable = false; });
      wrapper.querySelectorAll('a').forEach(a => { a.target = '_blank'; a.style.color = '#6cb0f6'; });
      wrapper.querySelectorAll('table').forEach(t => { t.style.borderCollapse = 'collapse'; });
      wrapper.querySelectorAll('td,th').forEach(td => {
        td.style.border = '1px solid #444'; td.style.padding = '4px 6px'; td.style.verticalAlign = 'top';
        td.title = '더블클릭으로 편집';
        td.addEventListener('dblclick', function(e) {
          e.stopPropagation();
          snapshot();
          this.contentEditable = 'true';
          this.style.outline = '2px solid #388bfd';
          this.style.background = 'rgba(56,139,253,0.08)';
          this.focus();
        });
        td.addEventListener('blur', function() {
          this.contentEditable = 'false';
          this.style.outline = '';
          this.style.background = '';
          cards[i].html = wrapper.innerHTML.split(IMG_BASE).join('__ATTACHMENT__');
          saveBoard();
        });
      });
      el.appendChild(wrapper);
    } else if (card.type === 'table') {
      const rows = card.rows || [['','',''],['','',''],['','','']];
      const tbl = document.createElement('table');
      tbl.style.cssText = 'border-collapse:collapse;width:100%;font-size:13px;';
      rows.forEach((row, ri) => {
        const tr = tbl.insertRow();
        row.forEach((cell, ci) => {
          const td = document.createElement(ri === 0 ? 'th' : 'td');
          td.contentEditable = true;
          td.style.cssText = 'border:1px solid #30363d;padding:4px 8px;min-width:60px;text-align:left;' + (ri===0 ? 'background:#21262d;font-weight:600;' : '');
          td.textContent = cell;
          td.addEventListener('blur', () => { if (!cards[i].rows) cards[i].rows = rows; rows[ri][ci] = td.textContent; saveBoard(); });
          tr.appendChild(td);
        });
      });
      el.appendChild(tbl);
      const addRow = document.createElement('button');
      addRow.textContent = '+ 행'; addRow.style.cssText = 'margin-top:4px;font-size:11px;background:#21262d;border:1px solid #30363d;color:#8b949e;padding:2px 8px;border-radius:4px;cursor:pointer;';
      addRow.onclick = e => { e.stopPropagation(); snapshot(); if (!cards[i].rows) cards[i].rows = rows; cards[i].rows.push(new Array(cards[i].rows[0].length).fill('')); renderCards(); saveBoard(); };
      const addCol = document.createElement('button');
      addCol.textContent = '+ 열'; addCol.style.cssText = 'margin-top:4px;margin-left:4px;font-size:11px;background:#21262d;border:1px solid #30363d;color:#8b949e;padding:2px 8px;border-radius:4px;cursor:pointer;';
      addCol.onclick = e => { e.stopPropagation(); snapshot(); if (!cards[i].rows) cards[i].rows = rows; cards[i].rows.forEach(r => r.push('')); renderCards(); saveBoard(); };
      el.appendChild(addRow); el.appendChild(addCol);
    }
    const rh = document.createElement('div'); rh.className = 'resize-handle';
    rh.addEventListener('mousedown', e => { e.preventDefault(); e.stopPropagation(); snapshot(); resizing = { idx: i, startX: e.clientX, startW: card.w || el.offsetWidth }; });
    el.appendChild(rh);
    if (i === selectedIdx) el.classList.add('selected');
    board.appendChild(el);
  });
  requestAnimationFrame(() => {
    let maxB = 0;
    document.querySelectorAll('.card').forEach(el => { const b = (parseFloat(el.style.top)||0) + el.offsetHeight; if (b > maxB) maxB = b; });
    board.style.minHeight = (maxB + 100) + 'px';
  });
}

document.addEventListener('mousemove', e => {
  if (moving) {
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`); if (!el) return;
    let nx = moving.origX + e.clientX - moving.startX, ny = moving.origY + e.clientY - moving.startY;
    if (e.shiftKey) { nx = snap(nx); ny = snap(ny); el.style.outline = '1px dashed rgba(240,192,64,0.3)'; } else { el.style.outline = ''; }
    el.style.left = nx + 'px'; el.style.top = ny + 'px';
  }
  if (resizing) {
    let nw = resizing.startW + e.clientX - resizing.startX; if (e.shiftKey) nw = snap(nw);
    cards[resizing.idx].w = Math.max(100, nw);
    const el = document.querySelector(`.card[data-idx="${resizing.idx}"]`); if (el) el.style.width = cards[resizing.idx].w + 'px';
  }
});

document.addEventListener('mouseup', e => {
  if (moving) {
    let nx = moving.origX + e.clientX - moving.startX, ny = moving.origY + e.clientY - moving.startY;
    if (e.shiftKey) { nx = snap(nx); ny = snap(ny); }
    cards[moving.idx].x = Math.max(0, nx); cards[moving.idx].y = Math.max(0, ny);
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`); if (el) { el.classList.remove('moving'); el.style.outline = ''; }
    if (e.shiftKey) pushCards(moving.idx);
    moving = null; saveBoard();
  }
  if (resizing) { if (e.shiftKey) pushCards(resizing.idx); resizing = null; saveBoard(); }
});

function addTextCard() { snapshot(); cards.push({ type: 'text', content: '', x: 50, y: window.scrollY+100, w: 300 }); renderCards(); setTimeout(() => { const els = document.querySelectorAll('.card .text'); els[els.length-1]?.focus(); }, 100); }
function addImageCard() { const input = document.createElement('input'); input.type = 'file'; input.accept = 'image/*'; input.onchange = e => { const f = e.target.files[0]; if (!f) return; const r = new FileReader(); r.onload = () => { snapshot(); cards.push({ type: 'image', src: r.result, x: 50, y: window.scrollY+100, w: 240 }); renderCards(); saveBoard(); }; r.readAsDataURL(f); }; input.click(); }
function addImageUrl() { const url = prompt('이미지 URL'); if (!url) return; snapshot(); cards.push({ type: 'image', src: url, x: 50, y: window.scrollY+100, w: 240 }); renderCards(); saveBoard(); }
function addTableCard() {
  const colsStr = prompt('열 수 (기본 3)', '3'); const cols = Math.max(1, parseInt(colsStr)||3);
  const rowsStr = prompt('행 수 (헤더 포함, 기본 4)', '4'); const rows = Math.max(1, parseInt(rowsStr)||4);
  snapshot();
  cards.push({ type: 'table', rows: Array.from({length: rows}, (_, ri) => Array.from({length: cols}, (_, ci) => ri===0 ? `열${ci+1}` : '')), x: 50, y: window.scrollY+100, w: Math.max(240, cols*100) });
  renderCards(); saveBoard();
}
function exportBoard() { syncText(); const blob = new Blob([JSON.stringify(cards, null, 2)], { type: 'application/json' }); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = SAVE_KEY + '.json'; a.click(); }
// ── Zoom ─────────────────────────────────────────────────────────────────────
let zoom = parseFloat(localStorage.getItem('zoom-' + SAVE_KEY) || '1.0');
function applyZoom() {
  const board = document.getElementById('board');
  board.style.transform = `scale(${zoom})`;
  board.style.transformOrigin = '0 0';
  document.getElementById('zoom-level').textContent = Math.round(zoom * 100) + '%';
  localStorage.setItem('zoom-' + SAVE_KEY, zoom);
}
function zoomIn()  { zoom = Math.min(3.0, parseFloat((zoom + 0.1).toFixed(2))); applyZoom(); }
function zoomOut() { zoom = Math.max(0.2, parseFloat((zoom - 0.1).toFixed(2))); applyZoom(); }
document.addEventListener('keydown', e => {
  if (e.ctrlKey || e.metaKey) {
    if (e.key === '=' || e.key === '+') { e.preventDefault(); zoomIn(); }
    if (e.key === '-')                  { e.preventDefault(); zoomOut(); }
    if (e.key === '0')                  { e.preventDefault(); zoom = 1.0; applyZoom(); }
  }
});
document.getElementById('board').addEventListener('wheel', e => {
  if (!(e.ctrlKey || e.metaKey)) return;
  e.preventDefault();
  e.deltaY < 0 ? zoomIn() : zoomOut();
}, { passive: false });
applyZoom();
function resetLayout() { if (!confirm('자동 재배치합니다.')) return; cards.forEach(c => { delete c.x; delete c.y; }); renderCards(); autoLayout(); }
// ── Floating format toolbar ───────────────────────────────────────────────────
const fmtBar = document.getElementById('format-toolbar');
function fmt(cmd) { document.execCommand(cmd, false, null); saveBoard(); }
function fmtLink() {
  const sel = window.getSelection();
  if (!sel || sel.isCollapsed) return;
  const url = prompt('링크 URL 입력', 'https://');
  if (!url) return;
  document.execCommand('createLink', false, url);
  // make links open in new tab
  sel.anchorNode?.parentElement?.closest('a')?.setAttribute('target', '_blank');
  document.querySelectorAll('.text a').forEach(a => a.target = '_blank');
  saveBoard();
}

// prevent format buttons from blurring contenteditable
fmtBar.addEventListener('mousedown', e => e.preventDefault());

document.addEventListener('selectionchange', () => {
  const sel = window.getSelection();
  if (!sel || sel.isCollapsed || !sel.toString().trim()) { fmtBar.style.display = 'none'; return; }
  // only show if selection is inside a .text element
  const anchor = sel.anchorNode;
  if (!anchor) { fmtBar.style.display = 'none'; return; }
  const textEl = anchor.nodeType === 1 ? anchor.closest('.text') : anchor.parentElement?.closest('.text');
  if (!textEl) { fmtBar.style.display = 'none'; return; }
  // position above selection
  const range = sel.getRangeAt(0);
  const rect = range.getBoundingClientRect();
  fmtBar.style.display = 'flex';
  const tbW = fmtBar.offsetWidth || 180;
  let left = rect.left + rect.width / 2 - tbW / 2;
  left = Math.max(8, Math.min(left, window.innerWidth - tbW - 8));
  fmtBar.style.left = left + 'px';
  fmtBar.style.top = (rect.top - 44 + window.scrollY) + 'px';
});

setInterval(saveBoard, 30000);
loadBoard();
</script>
</body>
</html>
