<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>요약</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1e1e1e; color: #e0e0e0; font-family: 'Segoe UI', -apple-system, sans-serif; font-size: 15px; line-height: 1.6; padding: 20px 30px 60px; overflow-x: hidden; }
a { color: #6cb0f6; text-decoration: none; }
a:hover { text-decoration: underline; }
.title-bar { background: #3a3a5c; display: inline-block; padding: 6px 16px; font-size: 22px; font-weight: bold; color: #fff; margin-bottom: 4px; }
.date { color: #999; font-size: 13px; margin-bottom: 20px; }
.board { position: relative; }
.card { background: #2a2a2a; border: 1px solid #3a3a3a; border-radius: 8px; padding: 12px; position: absolute; cursor: grab; transition: box-shadow 0.15s; overflow: hidden; }
.card:hover { box-shadow: 0 0 0 1px #58a6ff; z-index: 10; }
.card.moving { opacity: 0.8; box-shadow: 0 4px 24px rgba(0,0,0,0.6); z-index: 100; cursor: grabbing; }
.card img { width: 100%; border-radius: 4px; display: block; }
.card .text { outline: none; min-height: 20px; white-space: pre-wrap; word-break: break-word; }
.card .text:focus { background: rgba(255,255,255,0.05); border-radius: 4px; padding: 4px; }
.card .text:empty::before { content: '텍스트 입력...'; color: #555; }
.card-actions { position: absolute; top: 4px; right: 4px; display: none; gap: 4px; }
.card:hover .card-actions { display: flex; }
.card-btn { background: #333; border: 1px solid #555; color: #ccc; border-radius: 4px; padding: 2px 6px; font-size: 11px; cursor: pointer; }
.card-btn:hover { background: #444; color: #fff; }
.resize-handle { position: absolute; bottom: 0; right: 0; width: 16px; height: 16px; cursor: se-resize; opacity: 0; }
.card:hover .resize-handle { opacity: 0.6; }
.resize-handle::after { content: ''; position: absolute; bottom: 3px; right: 3px; width: 8px; height: 8px; border-right: 2px solid #666; border-bottom: 2px solid #666; }
.card.selected { box-shadow: 0 0 0 2px #58a6ff; z-index: 5; }
.highlight-red { color: #ff6b6b; }
.highlight-blue { color: #6cb0f6; }
.highlight-gold { color: #f0c040; }
.toolbar { position: fixed; bottom: 0; left: 0; right: 0; background: #161b22; border-top: 1px solid #30363d; padding: 8px 20px; display: flex; gap: 12px; align-items: center; z-index: 200; }
.toolbar button { background: #21262d; border: 1px solid #30363d; color: #e0e0e0; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; }
.toolbar button:hover { background: #30363d; }
.toolbar .status { color: #8b949e; font-size: 12px; margin-left: auto; }
#format-toolbar { position: fixed; display: none; background: #1c2128; border: 1px solid #444c56; border-radius: 8px; padding: 4px 6px; gap: 2px; align-items: center; z-index: 500; box-shadow: 0 4px 16px rgba(0,0,0,0.5); }
#format-toolbar button { background: none; border: none; color: #cdd9e5; padding: 4px 8px; border-radius: 5px; cursor: pointer; font-size: 13px; line-height: 1; }
#format-toolbar button:hover { background: #373e47; }
#format-toolbar .sep { width: 1px; height: 16px; background: #444c56; margin: 0 2px; }
</style>
</head>
<body>
<div class="title-bar" contenteditable="true">요약</div>
<div class="date">2024년 3월 3일 일요일</div>
<div class="board" id="board"></div>
<div id="format-toolbar">
  <button onmousedown="e=>e.preventDefault()" onclick="fmt('bold')" title="굵게"><b>B</b></button>
  <button onclick="fmt('italic')" title="기울임"><i>I</i></button>
  <button onclick="fmt('underline')" title="밑줄"><u>U</u></button>
  <div class="sep"></div>
  <button onclick="fmtLink()" title="링크 삽입">🔗</button>
  <button onclick="fmt('unlink')" title="링크 제거">✂</button>
</div>
<div class="toolbar">
  <button onclick="undo()" title="Ctrl+Z">↩ 실행취소</button>
  <button onclick="addTextCard()">+ 텍스트</button>
  <button onclick="addImageCard()">+ 이미지</button>
  <button onclick="addImageUrl()">+ 이미지 URL</button>
  <button onclick="addTableCard()">+ 표</button>
  <button onclick="saveBoard()">💾 저장</button>
  <button onclick="exportBoard()">📤 내보내기</button>
  <button onclick="resetLayout()">↺ 재배치</button>
  <button onclick="resetToDefaults()" style="color:#f85149">↺ 초기화</button>
  <div style="display:flex;align-items:center;gap:4px;margin-left:8px;border-left:1px solid #30363d;padding-left:12px;">
    <button onclick="zoomOut()" title="Ctrl+-" style="padding:6px 10px;">−</button>
    <span id="zoom-level" style="font-size:12px;color:#8b949e;min-width:36px;text-align:center;">100%</span>
    <button onclick="zoomIn()" title="Ctrl+=" style="padding:6px 10px;">+</button>
  </div>
  <span class="status" id="status">Ready</span>
</div>
<script>
const SAVE_KEY = 'board-요약';
const IMG_BASE = '../../attachments/';
const DEFAULT_CARDS = [
  {
    "type": "text",
    "x": 48,
    "y": 91,
    "w": 600,
    "content": "위기관리\n변동성의 시대에 성공하는 방법\nHow to Succeed in an Era of Volatility\n예측, 적응성, 회복력을 위해 투자하라\nAuthors\n더니건 오키프(Dunigan O’Keeffe)는 베인앤드컴퍼니 글로벌 전략 업무/파트너 ￼캐런 해리스(Karen Harris)는 베인 매크로 트렌드 그룹(Macro Trends Group) 매니징 디렉터이며 뉴욕에서 베인 파트너로 일하고 있다.\n오스틴 킴슨(Austin Kimson)은 베인의 수석 이코노미스트이며 댈러스에서 부사장\nBackground\n코로나19 감염자가 급증하기 시작하자 많은 기업이 속수무책으로 당했지만 마트 체인 H-E-B는 예외였다.\n\n2020년 1월 중순부터 H-E-B는 글로벌 공급업체 네트워크 전반에 대한 상황 파악\n중국 소매업체들을 통해 펜데믹 초기 몇 주 동안 중국의 상황과 교훈 파악\n사내 비상대비책임자가 허리케인이 발생했을 당시 물건이 필요한 손님들을 위해 매장 영업을 이어간 위기관리 경험 보유\n2009년 텍사스 주 시볼로에서 돼지독감이 발생한 이후 개선한 인플루엔자 관리 플레이북도 보유\n미국에서 첫 번째 코로나19 감염자가 발생하고 몇 주 동안 H-E-B는 대규모 전염병이 직원과 공급망, 운영 전반에 미칠 영향을 모의 실험했다.\n\n진열대에 물건을 채우는 시간을 더 많이 확보하기 위해 일일 매장 영업시간 단축\n자체 육류 가공공장을 통해 상위 50개 육류제품을 상시 제공하는 체제로 전환해 육류 제품 공급량을 대폭 늘렸다.\n달걀 공급이 부족해지자 맥주 유통업체 한 곳과 협력해 더 광범위한 지역에서 달걀을 확보해 일반 화물과 함께 매장으로 수송\n매장 방문객 수가 계속 증가하자 사\n이는, 세상의 변화에 따라 전략이 어떻게 달라 져야 하는지 보여주는 사례다.\n-\n지금은 포스트 세계화, 자본 합리화, 공간적 분산, 인력 감소, 자동화 의존의 시대\n기회와 위험의 형태도 완전히 달라질 것\n3단계 접근방식\n적응성, 회복력, 예측, 세 가지 역량에\n시간과 자원, 에너지를 할당하는 전략이 필요\n-\n1/ 예측충분한 정확성과 확신을 갖고 업계의 미래에 대한 믿음을 형성해 경쟁우위를 확보할 기회를 창출하는 것\n기업은 시나리오를 끊임없이 예측하고,\n시나리오별 잠재적 위험과 보상을 고려해 테스트하며,\n시간이 지나면서 노출된 위험을 조정하기 위한 전략을 선택해야 한다.\n인도 휴대전화 서비스 시장이 유비쿼터스 스마트폰과 데이터 대량 소비로 전환할 것이라고 정확하게 예측한 릴라이언스 지오Reliance Jio의 사례\n2016년 릴라이언스 지오는 확실한 기반과 자금력을 갖춘 기성 기업으로 이미 포화 상태인 환경에서도 스마트폰 보급률이 더 높아질 가능성을 인식했고, 스마트폰 가격이 더 저렴해지면 수요가 증가할 것이라고 예측했다.\n그 결과 대중 시장을 겨냥해 인도 고객들이 원했지만 비싼 가격에 부담스러워했던 기능을 제공하는 알뜰형 스마트폰 시리즈를 출시했다. 기존 기업보다 먼저 인도 전역에 탄탄한 4G 통신망을 구축하는 데 전략적으로 투자하는 선견지명도 있었다. 기존 기업의 서비스가 미치지 않는 농촌 지역까지 포함해 고객에게 저렴하게 고속 음성 및 데이터 연결 서비스를 제공한 릴라이언스 지오는 시장의 상당 부분을 혁신해 확보할 수 있었다. 무선 단말기를 이용한 디지털 서비스와 콘텐츠 소비의 중요성이 커질 것을 예상하고 경쟁사와 차별성을 강화하기 위해 뉴스 및 엔터테인먼트 제공 생태계도 구축했다."
  },
  {
    "type": "text",
    "x": 720,
    "y": 91,
    "w": 600,
    "content": "운영관리│꾸준히 성장하는 시스템 만들기\n꾸준히 성장하는 시스템 만들기\n-\n성장 챔피언growth champions\n&#160;2018~2022년까지 5년간의 연평균복합성장률(CAGR)을 기준으로 이들 기업을 4분위수로 나누고 성장률이 가장 높은 상위 25%\n535개 기업을 해당 기간 동안 연매출성장률을 기준으로 순위를 매기고(우리는 이들을 성장 리더growth leaders라고 부른다) 해마다 빠짐없이 상위 12.5%에 속한 기업\n-\n최고의 성과를 내는 조직은 단기성장과 장기성장을 모두 이끌어내는 역량과 자산을 통합한 성장 시스템growth system에 투자\n-\n성장 시스템의 5가지 구성 요소\n토스트Toast, 이케아, 버텍스Vertex, 어도비, 로블록스\n\n매력적인 고객 성과를 규정하라: 누구에게 어떤 서비스를 제공할 것인가?\n토스트:\n레스토랑 직원이 손님 만족도에 집중할 수 있도록 결제 프로세스를 간소화\n셀프 계산 키오스크, 단골고객 관리 기술 등 혁신적인 서비스 제공\n레스토랑에 필요하고 차별화된 솔루션 중심 성장 시스템 설계\n포화된 시장에서 강력한 입지 확보\n올바른 역량을 설계하라: 성장 시스템의 모든 역량이 함께 작동해 바람직한 고객 성과를 제공하는 제품과 솔루션, 서비스를 만드는 방법이 상세히 기술한 청사진\n\"잠시 있다가 사라지는 제품과 서비스가 아니라 조직을 규정하는 것이다.\"\n이케아:\n구체적인 청사진: 성장 시스템의 모든 역량을 통합하여 바람직한 고객 성과를 제공하는 제품, 솔루션, 서비스를 만드는 방법 상세히 기술\n\"누구나 부담 없이 살 수 있는 가정용 가구 제공\"\n비용과 가격 제어, 뛰어난 디자인 역량을 갖춘 독특한 역량 보유\n고객 생활 방식을 이해하고 혁신적인 제품 개발\n효율적인 매장 구성을 통한 고객 쇼핑 경험 개선\n올바른 운영 모델을 구축하라: 사일로를 허물고, 결과지향적 교차기능팀을 구성하라\n주요 기능의 사일로 제거: 마케팅, 영업, 제품 개발, 가격 책정, 고객 서비스 등 주요 기능의 협업 강화\n결과지향적 교차기능팀 구성: 전문 지식을 갖춘 팀 구성하여 성장 시스템 목표 달성 집중\n지속적인 투자 및 정비: 회사 성장에 발맞춰 운영 모델 지속적으로 개선\n버텍스\n연구개발, 임상 제공, 상업적 제공 등 내부 그룹과 외부 구성원 간의 장벽을 허물어 신약 발견 및 개발 가속화\n혁신적인 엔드투엔드 운영 모델 설계\n환자 경험 및 결과 개선을 위한 의료 서비스 제공자와의 협력\n선별된 제조 파트너와의 협력을 통한 생산 확대\n통찰력을 지속적으로 업그레이드하라:\n트렌드가 현재와 미래의 고객과 수익 창출에 어떤 영향을 미칠지 예측한다.\n고객과의 직접적인 관계 구축, 제품 개발 및 사용 주기 전반에 걸친 고객 호불호 파악\n모든 고객 상호작용 활용: 제품 주문 및 배송부터 판매 후 상호작용까지 고객과의 모든 소통 기회에서 통찰력 얻\n경쟁업체 분석: 경쟁업체의 전략 및 고객 인지도, 지갑 점유율 파악\n제품과 서비스의 주문과 배송부터 보증 지원과 같은 판매 후 상호작용에 이르기까지 고객과 소통하고 고객에 대해 배울 수 있는 모든 기회를 찾아 나선다. 성장 시스템 기업은 이런 통찰력을 활용해 기회가 있는 ‘빈 공간’을 찾아내고 기능을 개선하고 서비스 모델을 미세 조정하고 경쟁업체가 소비자 인지도와 지갑 점유율을 확보하기 위해 무엇을 하고 있는지 파악한다.\n어도비\n고객 참여 시스템을 통해 사용자 경험과 동적으로 연결\n사용자 피드백과 팁을 즉각 제공\n고객 행동 및 문제점 파악\n차세대 통찰 역량 구축을 통한 기회 발굴, 기능 개선, 서비스 모델 미세 조정\n수익을 측정하고 투자를 재분배하라: 차별된 고객 성과를 달성하는 데 도움이 되는 기능에 자원을 할당하고 이 자원에서 얻은 수익을 재투자한다.\n로블록스 사례:\n전 세계 10억 명을 연결한다는 목표를 향해 진척 상황 체계적으로 측정\n연구개발, 콘텐츠 개발, 플랫폼 확장 등에 투자\n일 활성 사용자 수, 참여 시간, 로벅스 거래량 등을 측정하여 매출 성장 시스템의 효과 평가\n성과 측정 결과에 따라 다음 성장 투자 결정\n성장 챔피언의 특징\n차별화된 고객 성과 규정:&#160;누구에게 어떤 서비스를 제공할 것인지 명확하고 고유한 약속을 설정합니다.\n올바른 역량 설계:&#160;성장 시스템 구축에 필요한 핵심 역량을 개발하고 투자합니다.\n통합된 운영 모델 구축:&#160;주요 기능의 사일로를 제거하고 결과지향적 교차기능팀을 구성하여 시스템 전체를 효과적으로 연결합니다.\n지속적인 통찰력 업그레이드:&#160;고객과 시장 트렌드를 파악하고 활용하여 제품 개선 및 서비스 모델 미세 조정을 위한 차세대 통찰 역량을 구축합니다.\n수익 측정 및 투자 재분배:&#160;성과를 측정하고 투자를 재분배하여 성장 시스템을 최적화합니다.\n1. 차별화된 고객 성과 규정: 누구에게 어떤 서비스를 제공할 것인가?\n고객 중심 사고: 고객 요구 및 니즈 충족\n차별화: 경쟁 우위 확보\n명확하고 적절하고 고유한 약속: 누구에게 어떤 서비스 제공 명확히 규정\n2. 올바른 역량 설계: 성장 시스템 구축에 필요한 역량은 무엇인가?\n구체적인 청사진: 성장 시스템 모든 역량 통합하여 바람직한 고객 성과 제공하는 제품, 솔루션, 서비스 만드는 방법 상세히 기술\n막대한 투자: 핵심 역량 개발에 필요한 자원, 기술, 데이터, 프로세스 확보\n생태계 파트너십: 핵심 역량 구축을 위한 외부 전문성 활용\n3. 통합된 운영 모델 구축: 성장 시스템의 모든 요소를 효과적으로 연결하고 관리하기 위한 운영 모델은 무엇인가?\n주요 기능의 사일로 제거: 마케팅, 영업, 제품 개발, 가격 책정, 고객 서비스 등 주요 기능 협업 강화\n결과지향적 교차기능팀 구성: 전문 지식 갖춘 팀 구성하여 성장 시스템 목표 달성 집중\n지속적인 투자 및 정비: 회사 성장에 발맞춰 운영 모델 지속적으로 개선\n4. 지속적인 통찰력 업그레이드: 변화하는 고객 요구와 시장 트렌드를 어떻게 파악하고 활용할 수 있는가?\n차세대 통찰 역량 구축: 고객과의 직접적인 관계 구축, 제품 개발 및 사용 주기 전반에 걸친 고객 호불호 파악\n모든 고객 상호작용 활용: 제품 주문 및 배송부터 판매 후 상호작용까지 고객과의 모든 소통 기회에서 통찰력을 얻음\n경쟁업체 분석: 경쟁업체 전략 및 고객 인지도, 지갑 점유율 파악\n5. 수익 측정 및 투자 재분배:\n핵심 질문:&#160;성장을 촉진하기 위해 성과를 어떻게 측정하고 투자를 재분배해야 하는가?\n통합하기 - 세일즈포스: 고객 성과에 중점\n시장 변화에 발맞춰 다각화된 제품과 서비스를 제공하며 고객 중심 혁신을 지속\n세일즈포스의 목표는 고객이 제품을 쉽게 사용할 수 있도록 해 고객당 매출과 수백만 달러 규모의 고객이 자연적으로 증가하는 것\n지난 10년 동안 세일즈포스는 클라우드 컴퓨팅과 AI 서비스로 주력 CRM 역량을 보완하면서 시각적 분석 플랫폼 태블로Tableau와 실시간 메시징 앱 슬랙을 인수했다. 세일즈포스는 사용자가 새로운 기능이나 제품 변경사항을 제안할 수 있는 아이디어익스체인지IdeaExchange&#160;플랫폼을 통해 지속적으로 고객 인사이트를 수집한다. 게임화된 교육과 자원을 통해 사용자와 소통하는 세일즈포스의 학습 플랫폼 트레일헤드Trailhead는 지식이 풍부하고 능숙한 사용자 커뮤니티를 구축해 혁신을 촉진하고 매출을 끌어올리는 데 중요한 역할\n고객 중심 사고: 고객 요구 파악 및 충족을 위한 핵심 전략\n차별화된 역량 개발: CRM, 클라우드 컴퓨팅, AI 등 핵심 역량에 집중 투자\n통합된 운영 모델: 고객 성공과 매출 성장 연결\n지속적인 통찰력 확보: 고객 참여 시스템, 데이터 분석 활용\n성과 기반 투자: 투자 수익률 측정 및 재분배\n성장 시스템의 요소들을 성공적으로 구축한 기업을 연구하면서 추진력을 창출하는 데 도움이 되는 4가지 행동\n성장 시스템 구축을 위한 4가지 행동\nCEO의 전폭적인 지원:&#160;성장 시스템의 중요성에 대한 인식과 적극적인 참여\n경영진의 협력:&#160;단기 목표 달성과 시스템 투자의 균형 유지\n장기적인 로드맵 구축:&#160;3~5년 단위 계획 수립 및 차별화된 역량 개발\n지속적인 지원:&#160;리더의 헌신적인 참여 및 관리 구조 구축\n결론: 성장 시스템의 중요성:\n시대 변화에 발맞춰 제품 및 서비스 경쟁력 유지\n새로운 시장 창출 및 기회 포착\n기업의 미래 형성 및 변화 주도\n후속 질문\n성장 챔피언은 경쟁사보다 뛰어난 성과를 내기 위해 단기 성장 전략과 장기 성장 역량의 균형을 어떻게 유지합니까?\n혁신 촉진, 차별화된 역량 개발, 리더십 지원 유지 측면에서 성공적인 성장 챔피언을 구별하는 주요 특징은 무엇입니까?\n강력한 성장 시스템을 구축하고 지속적인 성공을 보장하기 위해 성장 챔피언이 구현한 구체적인 전략이나 이니셔티브의 예를 제공할 수 있습니까?\n5가지 구성 요소 중 어느 것이 가장 중요하다고 생각하나요?\n성장 시스템을 성공적으로 구축하기 위해 기업은 어떤 노력을 해야 하나요?\n성장 시스템을 유지하고 발전시키는 데 어려움은 무엇이며, 이를 어떻게 극복할 수 있을까요?"

    "content": "-\n2/ 적응성대다수 기업은 거시 안정성 시대에 적응성을 개발했지만\n변동성의 시대에 성장하려면 핵심적인 방식으로 적응성을 개선해야 한다.\n경영진은 현재 비즈니스가 롱 포지션이나 쇼트 포지션의 위험에 노출된 부분이 어디인지 이해하고\n전략의 변화를 촉발할 수 있는 중대한 베팅과 관련된 신호를 추적할 수 있다.&#160;\n가장 민첩하게 움직이는 기업은 때때로 예측보다 적응성에 의존해 환경 변화를 헤쳐 나갈 수 있다.\n역동적인 초기 단계 산업에서 생존하려면 적응성이 반드시 필요하다.\n와이즐리 사례 넣기\n-\n대기업은 큰 규모 탓에 복잡성이 커져 중요한 신호를 포착하기 어려운 경우가 많다.\n이런 신호에 귀를 기울이는 것은\n회사가 전념해야 하는 부분이나 새로운 혁신에 나서야 하는 부분, 손실을 줄여야 하는 부분을 파악하는 첫 번째 단계다.\n마이크로소프트에 클라우드 서비스를 도입하기로 한 사티아 나델라의 결정\n2014년 나델라가 CEO로 취임할 당시에는 클라우드 서비스에 올인하는 것이 일반적인 전략과 거리가 멀었다.\n하지만 나델라는 마이크로소프트가 적응성을 발휘할 때라는 신호를 포착했다.\n(적응성에 대한 신호)\n아마존 클라우드 서비스인 아마존웹서비스(AWS)는 이미 클라우드 서비스와 기반 기술에 기초한 비즈니스 모델 쪽으로 가열차게 움직이고 있었고 넷플릭스를 비롯한 다른 기업들은 자체 서비스를 활용해 각자의 산업을 재편하고 있었기 때문이다.\n초기에 나델라는\n클라우드 컴퓨팅 플랫폼 마이크로소프트 애저Microsoft Azure에 전력을 쏟았다. 이런 전략적 변화의 핵심은 오피스365였다. 마이크로소프트의 데스크톱 모델과 엔터프라이즈 비즈니스 모델이 잘 개발돼 있고 대규모 설치 기반이 있었지만 나델라는 복잡한 제품 엔지니어링과 아키텍처에 막대한 신규 투자가 필요한 클라우드로 전환하기로 결정했다. 이런 변화로 마이크로소프트는 잔혹한 새 경쟁자와 낯선 역학관계에 직면했지만 시장에서 경쟁자들보다 재빠르게 움직인 결과 좋은&#160;성과를 올릴 수 있었다. 회사 매출의 절반 이상이 클라우드 서비스와 자산에서 발생하는데 이는 2020년 약 3분의 1에서 증가한 수치로 2024회계연도 1분기 기준 매출액이 318억 달러에 달한다. 또한 오피스365 클라우드 기반 구독은 마이크로소프트가 이전 비즈니스 모델을 통해 얻은 매출보다 예측하기 쉬운&#160;반복 매출을 가져다 준다. 마이크로소프트는 의료, 금융, 제조 등 새로운 분야로 다각화하고 확장할 수 있었다. 이제 아주르는 이들 분야에서 AI, 머신러닝, 사물인터넷 같은 첨단 기술을 호스팅하고 있다.\n3/ 회복력회복력이 뛰어난 기업은 경쟁사보다 충격을 더 잘 이겨낸다.\n지난 30년간의 거시 안정성 기간 동안 기업은 충격으로 인한 피해로부터 보호받았고, 단기 이익을 위해 최적화하고 회복력에 대한 투자를 회피하기가 너무 쉬워졌다. 부분적으로는 회복력이 효율성에 해로운 영향을 미칠 수 있기 때문이다. 충격에서 벗어나는 데 필요한 예비 용량, 대체 공급망, 핵심 재고에 투자하려면 시간과 돈이 필요하다.\n사우스웨스트 항공이 회복력을 위해 채택한 방식\n매해 연료비의 최소 50%만큼 헤징하는 것을 목표로 한다.\n이 프로그램은 사우스웨스트 항공의 위험을 근본적으로 바꾸지는 않는다.\n하지만 특정 기간 동안 가격을 고정하는 선물 계약, 옵션 등 금융수단을 통해 제트 연료 가격 급등이 사업에 미치는 위험을 완화할 수 있다. 업계 분석가들에 따르면 큰 타격을 입은 항공업계가 2022년에 수익성을 회복하기 시작하면서 사우스웨스트 항공은 헤징 덕분에 12억 달러를 절감했고 그 결과 주요 경쟁사 3곳보다 높은 영업이익률을 기록했다.\n회복력에 투자하려면 헌신과 장기적 관점에 대한 집중, 단기적 혼란을 헤쳐나갈 수 있는 능력이 필요하다.\n예를 들어 2015~2017년 당시 상황처럼 유가가 급락한다면 사우스웨스트 항공은 헤징 프로그램으로 재무적 손해를 입을 위험이 있다.\n-\n어디서부터 시작해야 할까?\n(삭제?) 예측, 적응성, 회복력 3가지 역량에 과감한 투자를 통합하는 전략을 채택해야 한다.\n1/ 노출된 위험을 매핑하라\n노출된 위험과 롱 포지션 또는 숏 포지션에 대한 이해를 단순화하는 방법을 헤지 펀드에서 배울 수 있다. 롱 포지션이 어디에 있는지 확인하기 위해 기업은 보통 매출, 직접 비용, 공급업체가 어디에 몰려 있는지 살펴본다.\n에그에큅AgEquip이라는 농기계 회사를 가정,\n다양한 지역의 핵심 고객 세그먼트와 채널 전반에 걸친 매출 집중도를 살펴볼 때 이 회사는 주요 농기계 시장인 브라질에 롱 포지션을 잡고 있음을 알 수 있다. 수요 관점에서 노출된 위험을 살펴보면 주로 중국 시장에 돼지 사료로 수출되는 대두를 생산하기 위해 에그에큅 농기계를 사용하는 브라질 농민들에게 중국 시장이 갖는 중요성을 고려할 때 에그에큅은 사실상 중국에도 롱 포지션을 취하고 있는 셈이다.\n이렇게 노출된 위험을 매핑하면 노출된 위험에 대한 통합적 그림을 도출할 수 있다. 그리고 비즈니스가 부족한 부분을 파악해 그 부분에 대한 전략적 베팅을 축소하거나 아예 베팅을 하지 않기로 할 수도 있다.\n어떤 방법으로 수익성을 확보하고 있고 앞으로 어떤 방법을 채택해야 할지 명확히 알게 된다.\n에그에큅은 농민을 위한 데이터 분석 서비스가 자사 비즈니스의 고성장 영역이 되기에는 혁신 속도가 너무 더디다고 판단할 수 있다.\n-\n2/시나리오를 개발하라\n매핑 작업에서 수십 가지 위험을 발견하는 것은 그리 드문 일이 아니지만 전략적 논의가 필요한 위험은 대개 8~10가지를 넘지 않는다. ⎼ 불확실성 재무성에 대한 잠재성 때문  ⎼   따라서 체계적이고 관리 가능한 변수의 집합을 규정하고 ‘극단적이지만 그럴듯한 시나리오는 무엇인가’를 자문해봐야 한다.(생각해낸 시나리오 중 어떤 것도 결정에 영향을 주지 않는다면 충분히 극단적이지 않은 것이다.)\n기업은 다음 3가지 범주의 활동을 개발할 수 있다.\n\n첫째, 자신 있게 실행할 수 있고, 모든 시나리오에 적용되는 후회 없는 조치다.\n둘째, 환경 변화로 인한 위험을 완화하고 새로운 기회를 포착하기 위한 옵션과 헤지다.\n셋째, 회사의 미래를 고려해 포지션을 바꾸기 위한 대규모 베팅이다.\n이를테면 선도적인 자동차 제조업체는 자율주행에 대한 심층 시나리오를 개발해 장기적으로 독점 전략을 수립하는 기반을 마련하는 한편 자율주행차가 예상보다 빨리 자리를 잡을 경우 취할 수 있는 옵션을 식별했다.\n3/ 자본을 배분하라\n적응성과 회복력을 위해 얼마나 투자해야 하는지를 파악하고,\n많은 비용이 들 수 있음을 상기한다.\n앞서 설명한 후회 없는 조치, 옵션과 헤지, 대규모 베팅이라는 분류를 기반으로 자본을 배분한다.\n예를 들어\n최근 생성형 AI가 급증하면서 일부 기업은 전략을 재편해야 할 필요성과 내부 생산성을 변화시킬 수 있는 특정 기술 응용 분야에 대한 후회 없는 투자를 대폭 늘려야 할 필요성을 절감했다. 대규모 베팅은 종종 인수합병을 중심으로 이뤄진다.\n\n매력적인 위험 노출을 두 배로 늘려 시장을 통합하거나(마이크로소프트의 액티비전 블리자드 인수)\n완전히 새로운 시장에서 규모를 키워 쇼트 포지션에서 롱 포지션으로 전환하기 위해서다.(홀푸드 인수를 통해 소매 식료품 사업의 주요 플레이어가 되기로 한 아마존의 결정)\n4/ 신호를 추적하라\n변동성이 커지는 시대에는 잠재적 혼란과 기회를 모니터링하는 역량도 개발해야 한다.\n이런 혼란과 기회 중 일부는 노동시장의 발전 또는 자본시장, 광범위한 파괴적 기술, 경기 사이클 같은 거시경제 환경의 변화에서 비롯될 것이다. 다른 것들은 신규 진입자부터 제품 및 서비스의 대체재에 이르기까지 산업별로 더 구체화될 것이다. - 파이브 포스 모델 소개\n기업은 자문해야 한다.\n이런 추세를 모니터링하기 위해 우리 회사는 어떤 역량을 보유하고 있는가?\n책임자는 누구이며 다양한 출처와 구성원이 제공하는 정보와 의견은 주로 무엇인가?\n이런 정보와 의견이 변할 때 우리가 확신을 갖고 신속한 조치를 취할 수 있으려면 어떻게 해야 하는가?\n인수합병 스카우트도 바로 이 지점에서 시작된다. 우리 회사가 비즈니스에 적응하고 전반적인 노출의 균형을 맞출 수 있으려면 어떤 잠재적 인수가 도움이 될까?\n우버의 경우 2020년 코로나19 팬데믹 기간에 음식 배달 수요가 급증하자 포스트메이트Postmates를 인수하고 차량 호출 서비스에서 배달 음식으로 핵심 사업을 확장했다.\n변동성의 시대로 진입하면서\n상충하는 요구의 우선순위를 정하고 예측, 적응력, 회복력이라는 3가지 핵심 역량에 자원을 적절히 할당하는 데 도움이 되는 인식, 실험, 실행의 리듬을 개발하는 것이 필요 하다.\n가장 수익성이 높은 노출을 예측하고, 노출을 전환하도록 포트폴리오를 조정하고, 예상치 못한 노출이 문제가 될 수 있는 상황을 방지하는 데 도움이 될 것이다. 이것이 바로 불안정한 세계에서 성장을 이끌어주는 새로운 공식이다.\n++++++++++++++++++++++++++++++\n자기계발\n슬기로운 은퇴 생활을 위한 7가지 가이드\n포천 500대 기업 전현직 CEO를 위한 커뮤니티 <a href=\"http://www.onyxleaders.com/\">오닉스</a>ONYX 창립자들\nBackground\n매년 수천 명의 경영진이 은퇴하지만 은퇴 후의 여정을 준비하는 사람은 거의 없다.\n우리는 사람들이 인생의 새로운 단계에 들어서며 더욱 잘 풀리는 모습을 지켜봤다.\n일부는 모두가 불가능하다고 생각했던 수준의 만족과 성취를 달성하기도 했다.\n반대로 길고, 힘들고, 때로는 암울한 여정이 펼쳐지는 것도 목격했다.\n임원 은퇴의 7가지 숨겨진 함정\n1. 현재의 눈으로 바라보면 미래의 가능성을 보지 못한다\n고위 임원직은 개인의 삶에서 모든 것을 포괄하는 자리다. 개인의 정체성이 되고 수십 년 동안 인생의 대부분을 차지하기도 한다. 하지만 그 역할과 그에 따른 모든 특권, 명성, 인정은 갑작스럽게 끝을 맞이한다.\n임원으로서의 삶 너머를 보지 못한다면 다음 단계에서 자신의 진정한 욕구와 필요를 예측하거나 탐색하지 못할 수 있다. 미래에 대한 상상을 펼쳐내지 못한다면 스스로가 진정으로 보람을 느낄 수 있는 유익한 활동의 기회를 놓칠 수 있다.\n전문가 팁 - 다음과 같은 질문을 던져보라.\n내가 가장 분명하게 고려해야 하는 것은 무엇인가?￼어떻게 하면 이전 직책의 명성을 최대한 오래 유지할 수 있을까?\n“근본적인 자아 재구성reimagination”에 집중해야 한다.\n내 삶의 목적은 무엇인가?\n추구하는 가치는 무엇인가?\n내가 물려줄 유산은 무엇인가?\n나의 타고난 강점과 약점은 무엇인가?\n나에게 기쁨을 주는 것은 무엇인가?\n지금 내 인생에서 무엇을 성취하고 싶은가?\n2. 너무 많은 선택지는 결정을 방해한다\n수십 년 동안 우리는 시간 부족에 시달리며,조직을 위한 제한적 목표를 맹목적으로 좇아야 했다.\n이제 여러분은 빈 종이를 바라보고 있는 자신을 발견하게 된다.\n모든 일정을 통제할 수 있으며, 원하는 활동에 에너지를 쏟을 수도 있다. 심지어 아무것도 하지 않을 수도 있다.\n그러나 이러한 해방감은 오래가지 않는다. 선택지가 너무 많으면 의사결정에 피로감이 발생한다.￼결국 가장 기본적인 옵션으로 되돌아가거나 아예 결정을 내리지 않게 될 수도 있다.&#160;\n전문가 팁- 북극성에 대한 정의\n성공적인 은퇴 여정은 자신의 정체성, 목적, 사명을 재정의하는 것에서 시작된다.\n눈앞에 놓인 수많은 선택지를 평가하는 기준으로 활용될 수 있다.\n매력적이지만 우리가 바라는 목표로는 이끌지 못하는 활동들을 걸러내는 필터가 될 수 있다.\n예시\n\"팀과 함께 일하고 싶다\" \"사회에 근본적인 차원에서 영향을 미치고 싶다\" \"젊은 리더를 지원하고 싶다\"\n\"한 달에 5일은 여행하고 싶다\"\n3. 기존 네트워크에 의존하면 새로운 네트워크를 구축하지 못한다\n은퇴를 앞둔 많은 사람은 “사적”이라고 여겼던 관계의 최대 95%가 단순한 거래 관계였던 것으로 드러나 충격을 받는다.\n은퇴 후의 인맥은 이전만큼 중요할 수도 있다. 그러나 예전 인맥과는 확실히 다를 것이다. 또한 저절로 구축되진 않을 것이다. 인맥 재구축을 우선순위로 삼아야 한다. 로메티는 이렇게 말했다. \"원하는 미래 네트워크를 의식적으로 만들어야 합니다.\"\n(전문가 팁)&#160;\n새로운 커뮤니티 여러 곳에 가입하라. 빠르면 빠를수록 좋다. 나보다 은퇴까지 남은 기간이 많은 동료를 찾아 그들에게 배워라. 비슷한 개인적, 직업적, 자선적 관심사를 가진 다른 사람들과 교류하라. 적극적으로 상호작용하고 새로운 인맥과 우연한 기회를 창출하는 네트워크에 가입하라.\n4. 계획이 없으면 다급하고 불안해진다\n거의 대부분이 은퇴를 자신에게는 먼 일처럼 느껴진다고 했다. 그들은 회사에서의 마지막 날까지 일만 한다.&#160;\n미리 계획을 세우지 않으면 위험도가 낮은 상호작용을 탐색하고 지식을 습득할 기회가 줄어든다. 새롭고 가치 있는 관계의 씨앗을 심고, 미래에 편안하게 적응하는 데 필요한 시간과 여유를 확보하기도 어렵다.\n\"너무 많은 CEO가 너무 바빠서 또는 그 순간이 오지 않을 거라고 생각하면서 은퇴에 대해 미리 생각하지 않습니다. 미래에 언젠가 처리할 것이라고 생각합니다\"\n전문가 팁 - 은퇴 예정 2년 전부터 시작하자.\n시간을 내어 인생의 다음 단계에 대해 생각해 보자.\n배우자와 허심탄회하게 이야기하자. 어떤 점이 기대되는가? 무엇이 걱정되는가?\n성공적으로 은퇴 이후의 삶에 진입한 사람들 중 당신이 존경하는 이들과 식사 일정을 잡아라.\n미래의 기회를 평가하는 데 도움이 될 수 있다고 생각되는 사람들에게 연락을 취하라.\n두려움과 불확실성을 사실과 지식으로 대체하라. 궁극적으로 이 모든 것을 “전략적 은퇴 계획”으로 통합하라.\n5. 회사 안에서 효과적이었던 행동이 불리하게 작용할 수 있다\n전문가 팁\n은퇴 초기는 작지만 현명한 베팅을 하라.\n잠재적인 기회와 자신에 대해 배우기에 완벽한 시기다.\n1/ 은퇴 후 하고 싶은 활동의 유형을 목록으로 작성하라.\n2/ 가장 중요한 것은 이러한 활동의 “일”이 어떤 모습일지,￼그리고 왜 그 일을 즐길 것이라고 생각하는지를 생각해보며 목록을 작성하는 것이다.\n3/ 위험도가 낮은 실험의 기회를 발굴하라. 가정을 테스트하고, 일상적인 활동이 예상만큼 만족스러운지 검증하라.\n이러한 실험을 통해 재밌고 만족스러울 것이라고 생각했던 활동이 전혀 그렇지 않다는 사실을 깨닫게 되는 경우가 많다는 사실에 놀랄 수도 있다. 반대로 이런 실험을 통해 처음엔 별로 흥미롭지 않았던 활동들이 인생에서 높은 순위를 차지하게 될 수도 있다.\n6. 검증된 옵션에만 집중하면 성취를 극대화할 수 없다\n많은 사람이 일반적인 경로에서 벗어나는 것을 불안해한다. 이들은 재빨리 채용돼 2~3개의 기업 이사회에 합류하는 등의 기본적인 선택지에 의존하면서 그에 따른 명성과 지속적인 급여를 기대한다. 하지만 아무리 많은 이사회 활동을 해도 자신이 펼쳐내고자 하는 만큼의 리더십을 발휘하기는 어렵다.\n전문가 팁&#160;\n다음에 해야 할 일에 대한 계획을 세울 땐 일반적인 일부터 시작하는 것이 좋다. 하지만 장기적인 계획을 세우기 전에 이 목록을 확장해 조금은 덜 일반적인 다른 경로를 포함하는 것이 좋다.\n리더, 젊은 전문가, 기업가 또는 학생을 코칭하거나 멘토링하는 것을 즐기는가? 스타트업 포트폴리오에 시드 투자를 하고 그 과정에서 선별적으로 자문을 제공하는 일이 흥미로운가? 희곡을 쓰거나 밴드에 가입하고 싶은가? 새로운 언어 배우기 등 버킷 리스트에 있는 항목에 체크하고 싶은가? 매년 새로운 나라에서 한 달 살기를 해보고 싶은가? 나파Napa의 작은 포도밭을 사거나 중서부의 농장에서 휴식을 취하면서 이름을 숨긴 채 주변 환경에 녹아들고 싶은가?\n7. 연락이 올 때까지 기다리다가 만족스러운 기회를 놓칠 수 있다\n은퇴하면 인바운드로 들어오는 기회의 파이프라인이 고갈되기 시작한다.\n대부분의 경영진은 자신을 “전문가”로 선전하거나 시장에서 자신의 개인 “브랜드”를 적극적으로 홍보하는 데 익숙하지 않다.\n은퇴 후에도 새로운 기회는 계속 찾아올 수 있다. 하지만 충분한 파이프라인이 없다면 계약이 실제로 얼마나 원활하게 이뤄지는지 알 수 없다. 우리 눈에 잘 띄지 않는 시장의 다른 대안과는 어떻게 비교되는지도 알 수 없다. 전화가 울릴 때까지 기다리는 것은 결국 제한된 대안 안에서만 최선을 다하는 것이다.\n전문가 팁&#160;\n최적의 은퇴 라이프스타일을 설계하려면 시장에서 잠재적인 기회를 발견하고, 그 기회가 우리를 찾을 수 있도록 해야 한다. 적극적으로 구직 활동을 하면 선택의 폭이 늘어나고 성공 확률이 높아진다. 자신감을 키우고 마음에 들지 않는 역할을 맡는 해프닝을 피할 수 있다.\n오래된 이력서는 정리하자. 온라인과 오프라인으로 인맥을 쌓자. 당신의 정보가 필요한 곳이 있다면 인터뷰에 응하자. 필요하다면 먼저 수화기를 들어라. 심지어 기존 조직에서 존재하지 않는 새로운 직책을 만드는 것도 고려해 보자.\n-\n오늘날 은퇴는 완전히 새로운 개념이다. 일을 계속하고, 다양한 활동에 참여해 포트폴리오를 만들고, 사회에 긍정적인 영향을 미친다. 참여와 흥미, 활동을 유지하는 전반적인 라이프스타일을 설계하려는 열망이 넘친다. 이러한 7가지 일반적인 함정을 피하면 보다 효율적이고 즐거운 전환을 할 수 있다.&#160;\n=========================================================\n리더십 _ 불안한 마이크로매니저\nThe Anxious Micromanager\n왜 어떤 리더는 지나치게 통제하려 드는가, 어떻게 적절한 균형을 찾을 수 있는가\nAUTHOR\n줄리아 디간지 뉴로헬스 파트너스 창업자 - 연구원이자 임상의\n신경에너지학은 뇌 에너지\nSummary￼연구에 따르면 리더가 명령을 내리고, 세세하게 관리하고, 규율에 맞추는 대신 ￼직원에게 권한을 부여하고, 격려하고, 코치할 때 기업의 성과가 더 좋아진다.\n그럼에도 불구하고 명령과 통제의 리더십 스타일은 여전히 만연해 있다.\n마이크로매니지먼트는 리더 자신의 불안과 자신감 부족에서 비롯된다.\n명령과 통제 스타일에 지나치게 의존하지 않으려면 리더는 내면을 들여다보고 그 원인을 이해해야 한다.\n관리자가 자신의 에너지를 활용하여 훨씬 더 효과적이고 지속 가능한 방식으로\n리더십을 발휘할 수 있는 방법에 대한 지침을 제공\n-\n관리자(민희진)\n\"팀에 자발적으로 행동하는 셀프 스타터가 없어서 스트레스를 받는다.\"\n-"

    "content": "“이 프로젝트를 총괄해서 진행하세요. 다만 모든 걸 저한테 먼저 확인받아야 합니다.”\n혼란에 빠진 직원들,\n“잠깐, 내가 알아서 시작해도 되는 거야 아니면 허가를 구해야 하는 거야?”\n-\n리더들은\n“시작! 아니, 잠깐만! 멈춰! 아니, 시작!”\n대놓고 “이걸 당장 하세요!”라고 명령하지는 않지만,\n내가 책임자이고 당신은 내 방식대로 하게 될 거라는 신호/감정 에너지 전달\n문제\n연구와 실제 경험에 따르면,\n\n리더가 명령을 내리고 규율을 따르도록 하는 대신 직원들에게 권한을 부여하고 격려하고 코칭할 때 성과가 더 좋아진다. 그럼에도 ‘명령 에너지’ 스타일은 덜 분명하고 덜 공격적이기는 하지만 여전히 만연해 있다.&#160;\n신경학적으로 이런 통제는 지속가능하지 않다. 인간의 두뇌는 독립성과 자율성을 지향하기 때문이다.\n이런 스타일의 리더십은 팀원들의 불안을 높이는 경향이 있다.\n원인\n명령 에너지에 의존하는 경향은 리더의 불안과 자신감 부족에서 비롯된다.\n“당신이 내 편이 돼서 내가 요구하는 대로 정확히 이 자리에 오기 전까지는 내가 믿는 것을 믿고 내가 생각하는 것을 생각하고 내가 하는 일을 할 자신이 없다”는 (종종 무의식적인) 생각이 자리 잡고 있다.\n솔루션\n뇌 에너지를 활용해 훨씬 더 효과적이고 지속가능한 방식으로 리더십을 발휘하는 방법에 대한 가이드\n(뇌는 신경을 통해 최대 시속 260마일의 속도로 전기 자극을 보내고 초당 10만 회 이상의 전기 화학 촉매반응을 일으킨다.)\n1/ 줄 놓는 법 배우기\n2/ 근본 원인 해결하기\n-\n1/ 줄 놓는 법 배우기\n부모-자녀 관계\n부모가 독립성이 자랄 수 있는 공간을 만들지 않으면\n자녀는 건전한 자율성을 키우는 데 방해를 받는다.\n그 결과 흔하게 볼 수 있는 부모-자녀 갈등이 일어난다.\n남녀 관계\n설거지하는 방법이나 어떤 TV 프로그램을 시청할지 같은,\n사소해 보이는 일에서 명령 에너지가 깊은 단절을 초래할 수 있다.\n동료/상하 관계\n명령 에너지는 동료관계와 상하관계를 파괴할 수 있다.&#160;\n+\n에너지 줄다리기\n\n누군가와 의견이 맞지 않는 상황에서 상대방이 틀렸고, 내가 옳음을 증명하려고 계속 노력하는 상황\n대화를 거부하거나 이메일에 답장을 보내지 않는 식으로 상대방에게 수동적 공격을 가하는 상황\n줄다리기의 비극은 양측 모두 엄청난 에너지를 소비하지만 누구도 아무데도 가지 못한다는 점이다.\n사람들은 좌절하고 시간이 지나면서 관계는 무너진다.\n줄다리기를 끝내는 가장 빠른 방법은, 바로 줄을 놓는 것\n자발적으로 줄을 놓는 사람이 리더다.\n-\n리더의 역할.\n리더로서 당신의 역할은 비전을 집단적 추진력으로 바꾸는 것이다.\n즉 사람들을 현재 위치에서 잠재력 있는 위치로 옮기는 것\n많은 리더가 통제를 줄이고 팀에 더 많은 권한을 부여하고, 통제를 줄이기 시작하면 ‘무질서 상태’가 될 거라고 걱정\n오히려 강력하고 고무적인 자기책임 문화가 조성된다.\n당신의 임무는 다른 사람들을 통제하는 것이 아니다. 스스로를 통제하고 다른 사람들이 따를 거라고 믿는 것\n당신의 일은 영감을 주는 것이 아니다. 영감을 받고 다른 사람들도 영감을 받을 거라고 믿는 것이다. 당신이 팀에 요구하는 에너지를 직접 보여주면 다른 사람들이 이를 기준으로 삼아 에너지를 발휘할 수 있다.&#160;\n-\n리더와 싸우느라 바쁘면 아무도 리더를 따르지 않는다. 사람들은 독립성이 존중받지 못한다고 느낄 때, 즉 자신의 필요가 무시되고 아이디어가 평가절하될 때 소모적인 줄다리기에 갇히게 된다. 명령 에너지가 종종 그 원인이 된다. 인간은 자기 뜻대로 되지 않는 것은 감내할 수 있지만 지배당하는 느낌은 감내하지 못한다.\n-\n마크 - 똑똑하고 말이 빠른 테크 기업 임원이자 법정 변호사 같은 성격\n마크의 리더십 전략은 사람들이 동의할 때까지 토론하는 것\n커리어 초기에는 이 방법이 효과가 있었지만 매우 성공적인 스타트업의 고위직을 맡으면서 그는 “사람들의 의지와 지능이 더 날카로워졌다”라고 이야기했다. 사람들이 항복할 때까지 논쟁을 벌이는 마크의 오랜 전략은 더 이상 통하지 않았다. “그래서 제 자신을 더더욱 증명해야 한다고 생각했습니다. 사람들에게 어떻게 해야 하는지 더 열심히 알려주려고 했죠.” 마크가 말했다. “저는 회의실에서 가장 똑똑한 사람이 되기로 결심했습니다. 알고 보니 제가 광대였어요.”\n3번 연속 직장에서 해고를 당하자 마크는 큰 충격을 받았다.\n코칭을 받으면서 마크는 2가지 중요한 통찰\n첫째, 자신의 리더십이 사람들의 동의 여부에 얼마나 크게 좌우되는지 깨달았다.&#160;\n다른 사람들이 아무리 사소한 아이디어라도 자신의 생각과 완벽하게 일치하지 않는 제안을 하면 ‘위협’을 느꼈다고 인정\n둘째, 이 정도로 완벽한 수준의 동의를 요구하는 한 그는 소수의 사람만 리드할 수 있다.\n2~3명 어쩌면 5명 정도는 그의 의견에 완전히 동의할지도 모른다. 하지만 15명, 50명, 100명? 절대 안 된다. 마크는 큰 야망을 품고 있었고 자신이 이끌고자 하는 똑똑하고 역동적인 조직에서는 명령과 통제를 일삼는 리더십 스타일을 확장해 적용할 수 없다는 사실을 깨달았다.\n-> 다다익선의 고사 활요\n-\n자신이 옳은 것을 효과적인 것과 동일시해왔다는 점을 알았다.(내가 옳을 필요는 없다, 내 팀이 옳으면 된다.)\n“솔직히 제가 리더십에 대해 배운 가장 혁신적인 사실은\n다른 사람을 통제하는 것에 대해 덜 걱정할수록 그들이 저를 따르는 데 더 관심을 보인다는 점입니다.”&#160;\n2/ 근본 원인 해결하기 - 명령 에너지는 보통 자신에 대한 신뢰 부족에서 나온다\n다른 사람을 믿지 못하기 때문에 명령을 하는 거라고 생각할지 모르겠다.\n경우에 따라서는 그럴 수도 있다. 하지만 더 많은 경우 진실은 당신이 자기 자신을 믿지 못한다는 것\n사람들이 정확히 당신의 방식대로 일하지 않으면 계획이 성공할 거라고 믿지 못하기 때문에 비판하고 명령을 내린다.\n팀이 충분히 준비됐다고 믿지 못하기 때문에 세세한 부분까지 마이크로매니징한다.\n설명이 충분했다고 믿지 못하기 때문에 과잉 설명을 하고 명령한다.\n\n-> 자신이 팀을 제대로 준비시키지 못 했다고 여기는것.\n-\n내면을 들여다보는 데 도움이 되는 4가지 단계(거울 치료 4단계)\n1/&#160;당신이 명령하고 설득하고 통제하고 타이르고 영향을 미치고 동기를 부여하기 위해 많은 시간을 투자했던 누군가를 떠올려 보라. 당신을 짜증나게 만들었던 어느 고집스러운 동료일 수 있다.\n2/ 당신을 괴롭히는 그 사람의 특성 2~3가지를 파악하라.\n3/ 비슷한 에너지를 인간관계에 투여했을 때를 생각해 보라. ￼즉, 당신이 비판적이고 판단적 태도를 취하는 때는 언제인가?&#160;\n손바닥도 부딪혀야 소리가 난다.\n“나는 비판적이지 않아, 그 사람이 비판적인 거지!”라고 생각하며 방어적 반응을 보이지 않도록 주의하자.\n다른 사람의 비판이 괴롭다면 당신도 비판적 에너지를 내뿜었을 가능성이 매우 높다.&#160;\n파악이 어렵다면 가까운 사람에게 어떤 때 그런 에너지를 발산해 관계를 약하게 만드는지 물어보라.\n4/&#160;자신이 어디에 비판적인지 판단한 후에는 그런 상황을 모니터링하고,\n당신이 받았을 때 고통스러웠던 종류의 에너지를 발산할 때 스스로를 멈춰 세워라.\n-\nCASE 성공한 임원이자 자상한 어머니인 마티\n출세를 했는데도 마티는 자주 어머니가 자신을 비판한다고 느꼈다.\n마티는 어머니에게 자신이 충분히 성공했고 충분히 똑똑하고 충분히 가치 있는 사람이라고 설득하는 데 많은 에너지를 소비했다. ￼마티는 어머니가 자신에 대해 긍정적인 의견을 갖게 만들려는 시도가 교묘하고 소모적 형태의 명령과 통제 행동이라는 사실을 깨닫기 시작했다.\n마티는 어디에서 지나치게 비판적인가? ￼처음에 마티는 비판적인 것은 자신이 아니라 어머니라고 주장했다. ￼하지만 마티는 자신이 어머니와 같은 방식으로 행동하는 경우가 많다는 사실을 깨닫기 시작했다.&#160;\n동료들의 성과에 대해 불평했던 여러 대화를 회상했다. 자신이 팀을 마이크로매니징했으며 팀원들이 자신이 원하는 기준에 맞출 수 있을지 믿을 수 없다고 걱정했던 것을 인정했다. 소셜미디어를 스크롤하면서 주기적으로 다른 사람의 삶을 비판했다고도 고백했다.\n마티가 제기한 불만은 어머니가 자신을 대하는 방식에 관한 것이었지만 마티는 먼저 자신의 에너지에 집중하고 자신의 가치에 어긋나는 행동이 무엇인지 고민하기로 했다.\n감정을 더 잘 인식하게 되면서 마티는 가치관에 위배되는 일에 대한 비판을 멈췄다. 이런 변화를 통해 어머니뿐 아니라 동료, 팀원, 친구들을 더 잘 받아들이게 됐다.\n-\nConclusion\n\n리더십은 특정 상황에 국한된 것이 아니라,\n스트레스를 받을 때 자신이 가진 감정 에너지로 정의된다는 사실을 이해해야 한다.\n명령과 통제의 리더십 스타일이 스스로의 불안에서 비롯된다는 사실을 깨달을 때 자신의 에너지에 더 주의를 기울이기 시작할 것이고 이를 통해 줄을 놓는 힘을 발견하게 될 것이다.\n+++++++++++++++++++++++++++++++++++++++++++++++++\n자기계발\n감정을 조종하는 흑마법사로부터 나를 지키기\nAre You Being Emotionally Manipulated at Work?\nSummary.&#160;&#160;&#160;\nResearch has shown that emotional manipulation (EM) can significantly impact individuals’ well-being and productivity. It can systematically influence cognitive control, which is crucial for effective decision-making and problem-solving, and can also affect individuals’ interpersonal relationships and overall mental health, further impacting their productivity and satisfaction in the workplace. If you think you’re being emotionally manipulated at work, try these five strategies to protect yourself — and your workplace.\n연구에 따르면 감정조절(EM)은 개인의 웰빙과 생산성에 큰 영향을 미칠 수 있는 것으로 나타났습니다. 효과적인 의사 결정과 문제 해결에 중요한 인지 통제에 체계적으로 영향을 미칠 수 있으며, 개인의 대인 관계와 전반적인 정신 건강에도 영향을 미쳐 직장에서의 생산성과 만족도에도 영향을 미칠 수 있습니다. 직장에서 감정적으로 조종당하고 있다고 생각된다면 다음  다섯 가지 전략을 통해 자신과 직장을 보호하세요.\nBackground&#160;\n높은 감성지능EI&#183;emotional intelligence은 양날의 검 - &#160;때론 동정심 많은 리더이자 조종의 대상이 되기도 한다\n자신과 타인의 감정을 이해하고 관리하는 능력인 EI는 공감하는 대화와 이해를 이끌어내는 선의의 힘이 될 수 있다. 그러나 EI를 가치 있게 만드는 그 특성이&#160;악의성을 띠면 무기화</a>될 수도 있다.\n직장에서 발생하는 감정 조종을 식별하고, 예방하고, 대응하는 방법에 대해 설명\n1/ 감정 조종EM&#183;Emotional Manipulation 인식하기\nEI가 높은 사람은 다른 사람의 취약점과 불안감을 악용할 수 있다. 대부분의 사람은 높은 수준의 이해 능력을 타인을 지원하는 데 사용하지만 감정을 조종하는 사람들은 이를 무기화해 죄책감, 두려움 또는 의무감을 유발하는 데 사용하기도 한다.\n자신의 이해관계와 일치할 때 공감을 표시하고, 이해와 연민의 분위기를 풍기며&#160;<a href=\"https://hbr.org/2023/12/how-leaders-fake-psychological-safety\" style=\"font-family:NotoSans;font-size:12.5pt;background-color:#191a1a\">심리적 안전감</a>을 조성하는 것처럼 속일 수 있다.\n\n개인의 웰빙과 생산성, 직장에서의&#160;<a href=\"https://www.tandfonline.com/doi/full/10.1111/j.1742-9536.2012.00059.x\" style=\"font-family:NotoSans;font-size:12.5pt;background-color:#191a1a\">생산성과 만족도에도 영향</a>  큰 영향\n가장 일반적인 EM의 형태,\n① 전략적인 감정 표출\n② 위장된 진짜 감정\n③ 미묘한 방식의 동기 부여\n① 전략적인 감정 표출\n타인의 감정을 조종하는 사람들(이하 감정 조종자)은 자신의 감정 표현을 통해 의사결정을 흔들거나,\n그룹 역학 관계에 영향을 미치거나, 특정 시각으로 자신을 포장할 수 있다.\n지지를 얻기 위해 분노를 표출하는 것부터 책임을 회피하기 위해 과도한 슬픔을 표출하는 것까지 다양한 양상이 나타난다."

    "content": "예를 들어 의사인 L 박사는 이미 과중한 업무에 시달리고 있었다. 의사들의 업무 부담을 잘 알고 있는 병원장은 환자 치료의 중요성과 병원의 사명에 대해 진심 어린 듯한 연설을 한다. 병원장 연설의 밑바탕에는 의사들이 자신의 건강을 희생하면서까지 더 많은 시간을 일하도록 설득하려는 의도가 깔려 있다.\n② 위장된 진짜 감정\n감정 조종자는 종종 진짜 감정과 의도를 숨기고 자신을 신뢰할 사람으로 묘사하거나 대중의 정서에 동조하는 것처럼 행동한다. 개인적인 이야기나 취약점을 공유해 공감 능력이 있는 것처럼 보이게 하고 이를 이용해 통제력을 행사할 수 있다. 또는 우려나 공감을 표현하면서 이해하는 것처럼 보이지만 타인의 감정을 악용하는 데 사용할 수 있다."

    "x": 48,

    "w": 600,
    "content": "예를 들어 선임 관리자인 제임스는 팀 회의에서 워라밸이 웰빙에 얼마나 중요한지 강조하면서 워라밸에 대한 지지를 지속적으로 표명한다. 하지만 비공개 회의에선 팀원들에게 정기적으로 야근을 강요하고, 이를 따르지 않는 팀원에겐 성과 평가 시 불이익을 받을 수 있다는 신호를 보낸다.\n③ 미묘한 방식의 동기 부여\nEM의 특징은 개인에게 최선이 아닐 수 있는 결정을 내리도록 유도하는 것이다. 직장에서 EM은 일반적으로 두 가지 방식으로 나타난다.\n\n첫째, 관리자가 성과를 내야 한다는 명목으로 불가능한 기한을 제시하며 과중한 업무량을 할당하지만 결국 실패할 수밖에 없는 환경을 조성한다.\n둘째, 모호하거나 일관성 없는 피드백을 제공해 효과적인 성과 측정을 어렵게 만든다."

    "caption": "테이커는 자신의 이익을 우선시하는 경우가 많아 EM이 될 수 있다.\n기버는 더 이타적인 반면, 매처는 주는 것과 받는 것의 균형을 맞추는 것을 목표로 한다."

  {
    "type": "text",
    "x": 48,
    "y": 12035,
    "w": 600,
    "content": "특히 테이커가 교묘한 전술을 사용하는 경우를 식별하는 데 도움이 된다.\n예컨대, 팀 회의 중에 동료가 지나치게 칭찬을 하더니 나중에 회사 정책에 어긋나는 부탁을 한다. 이것은 앞서 칭찬한 것에 대한 보상을 요청하는 것이다.\n요청에 즉시 응하지 말고 잠시 멈춰서 대응할 시간을 확보한 후 어떻게 해야 할지 결정하자.\n② 외부의 조언을 구하라\n의심스러울 땐 신뢰할 수 있는 동료나 멘토 또는 친구에게 의지하자.\n경험을 공유하고 피드백을 구하면 새로운 관점을 얻을 수 있다.\n예를 들어 감정적으로 격앙된 요청을 자주 하는 팀원이 있다. 금요일 늦은 시간에 두세 번씩 찾아와서 압도적인 업무량에 대해 이야기한다. 결국 주말에 일부 업무를 맡아줄 수 있는지 물어보며 당신이 마지막 희망임을 암시한다.\n자문,\n\n내가 상대방 요청의 감정적 수위가 높아서 반응하는 것인가 아니면 그 요청에 장점이 있기 때문에 반응하는 것인가?\n이런 일이 얼마나 자주 일어나는가? 감정적 이해관계가 없는 사람은 이 상황을 어떻게 바라볼까?\n&#160;<a href=\"https://hbr.org/2017/05/talking-to-yourself-out-loud-can-help-you-learn\" style=\"font-family:NotoSans;font-size:12.5pt;background-color:#191a1a\">자기성찰적 전략인 “큰 소리로 생각하기</a>think loud”(생각하는 바를 입 밖으로 소리 내 스스로에게 설명해 봄으로써 스스로 문제를 이해하게 되는 것)\n③ 사실에 의존하라\n감정 조종자들은 종종 감정을 증폭시켜 논리적 추론과 비판적 사고를 가로막는다.\n우리의 자연스러운 감정 반응을 이용해 상황을 객관적으로 보는 능력을 흐리게 할 수 있다.\n전청조\n예컨대, 한 팀원이 프로젝트에서 담당한 일이 지연된 것에 대해 진심을 다해 설명하는 상황을 가정해 보자. 처음엔 진심인 것 같았지만 특정 부분이 과장되거나 일관성이 없는 것 같다는 생각이 들기 시작한다. 동료는 개인적인 어려움을 구구절절 이야기하며 당신이나 팀의 지원이 더 있었다면 이런 문제를 피할 수 있었다고 은근히 암시한다. 이 경우 동정심을 유발해 문제 발생에 대한 책임을 회피하려는 것일 수도 있다.\n질문,\n1/ 상대방의 주장을 뒷받침하는 확실한 증거는 무엇인가?\n2/ 상대방의 설명에 불일치나 모순이 있는가?\n3/ 검증 가능한 사실에 근거해 결정을 내리고 있는가 아니면 상대방의 설명에 대한 감정적인 반응에 주로 의존하고 있는가?\n④ 감정 분리를 연습하라\n대상을 더 명확하게 보기 위해 감정을 분리하는 것\n예를 들어 동료가 감동적인 자신의 이야기를 들려주는 등 개인적인 친밀감을 이용해 협상 결과에 영향을 미치려 하는 상황을 가정해 보자. 동료는 자신이 처한 가족 위기에 대해 자세히 설명하면서 협상의 결과가 자신에게 절실히 필요함을 강조하며 협상 조건을 유리하게 이끌어낼 수 있다.\n자문,\n\n나는 상대방의 이야기에 담긴 감정적인 내용에 반응하고 있는가 아니면 협상 조건과 목표에 집중하고 있는가?\n만약 감정적인 영향을 제쳐두고 상황의 객관적인 측면에만 집중한다면 내 반응이 어떻게 달라질 수 있을까?\n잠시 마음챙김의 시간을 갖는 것도 도움이 된다. 심호흡을 하고 그 상황에서 한 발 물러서자.\n제시된 의견의 감정적인 측면을 인정하되 협상의 주된 목적에 의식을 집중하라.\n⑤ 경계를 설정하라\n사전에 명확하고 확고한 경계를 설정\n어떤 행동과 상호작용이 허용되고 합리적인지, 어떤 행동과 상호작용이 허용되지 않는지 정의하고 소통하자.\n이를 통해 자신이 어떻게 대우받고자 하는지에 대한 기준을 설정할 수 있다. 명확성은 잠재적인 감정 조종에 대한 방패 역할을 할 뿐만 아니라 투명하고 서로를 존중하는 업무 환경을 조성하는 데도 도움이 된다. 다른 사람들이 당신의 경계를 이해한다면 자신의 경계 역시 넘지 않을 거라고 생각할 가능성이 커진다.\n예컨대, 관리자가 정기적으로 개인적인 문제를 공유하면서 그의 요청에 응하기 위해 당신에게 추가 근무를 은근히 암시하는 상황을 생각해 보자.\n자문\n이 요청이 내 업무 영역을 침범하는 것인가? 내 직무 범위를 넘어서는 것을 은근히 강요받고 있지는 않은가?\n-\n결언\n관리자와 진솔하고 존중을 담은 대화를 시작하라. 상대방의 상황을 인정하되 자신의 업무 경계를 명확하게 표현하라. 예를 들어 \"당신이 직면하고 있는 어려움을 이해하고 공감하지만 저는 업무와 개인 시간의 균형을 맞춰야 합니다. 추가가적 자원이나 지원 등 우리 모두에게 윈윈이 될 수 있는 대안을 모색해 봅시다\"라고 말할 수 있다.\n=================================================\n리더십│우리 회사에 맞는 성장 속도는?\n리더에게 전략적 관점이 필요한 이유\n하버드 경영대학원 교수이자 저자인 Gary Pisano가 제시한\n속도-방향-방법(Speed-Direction-Method) 프레임워크를 통해 지속가능한 성장을 위한 전략\n게리 P. 피사노(Gary P. Pisano)는 하버드경영대학원 경영학 교수다. 책 ＜Creative Construction: The DNA of Sustained Innovation＞(PublicAffairs, 2019)을 썼다.\n-\nSummary\n문제&#160;지속적이고 수익성 있는 성장은 보편적 목표지만 많은 기업이 이 목표를 달성하는 데 애를 먹는다.\n인플레이션을 고려할 때 대부분의 기업은 거의 성장하지 않는다.\n발생 원인&#160;외부 요인도 이 문제에 일조하지만 대다수 기업의 성장 부진은 기업이 자초한 면이 있다.\n너무 많은 기업이 상당히 반응적이고 기회주의적인 방식으로 성장에 접근한다.\n해결책&#160;장기적으로 수익성 있게 성장하려면\n‘얼마나 빨리 성장하고 싶은가?’(목표 성장 속도),\n‘새로운 수요처를 어디에서 찾을 것인가?’(성장 방향),\n‘성장에 필요한 자원을 어떻게 모을 것인가?’(성장 방법)라는\n3가지 주요 결정 사안을 다루는 성장 전략을 마련해야 한다.\n-\nBackground 성장의 어려움\n미국의 상장기업 1만897개를 분석 상위 25%에 속한 기업은 물가상승률을 반영한 연평균 성장률이 11.8%\n하위 75%에 속한 기업은 성장이 미미하거나 전혀 성장하지 못했다.\n느린 성장이나 최소 성장이 시장의 힘과 파괴적 혁신 같은 기술변화 때문이라는 일반적인 설명도 일부 맞지만\n많은 기업의 성장 부진은 기업이 자초한 면이 있다는 점을 발견"

    "content": "-\n기업들은 상당히 반응적이고 기회주의적인 방식으로 성장에 접근하는 측면이 있다.\n시장 수요가 급증하면 무작정 고용을 늘리고 신규 생산능력을 확보하고 조직 인프라를 확장하는 데 자원을 쏟아 붓는다.\n회사의 운영 체제와 프로세스가 확장 가능한지, 급속한 성장이 기업문화에 어떤 영향을 미칠지, 이런 성장을 달성하는 데 필요한 인적 자본을 끌어 모을 수 있는 상황인지, 수요가 줄어들면 어떤 일이 벌어질지 등을 다양하게 고려하지 않는다. 성장을 좇는 과정에서 혁신 역량, 민첩성, 우수한 고객서비스, 고유한 기업문화 등 애초에 성공을 거둘 수 있게 한 요인들이 파괴되기 쉽다.\n수요가 줄면 역사적 성장률을 유지해야 한다는 압박에 못 이겨 비용이 많이 드는 인수를 단행하거나 연구&#183;개발, 기타 역량, 교육&#183;훈련 예산을 대폭 삭감하는 등 미봉책을 택할 수 있다. 이런 조치로 인한 피해는 문제를 더 나쁘게 만든다.\n-\n수요 잠재력이 아무리 높아도 조직이 이 수요를 충족하는 데 필요한 역량을 갖추지 못했거나 개발할 수 없다면 수익성 있는 성장으로 이어질 수 없다.\n수익성 있는 성장을 지속하기 위해서는 시장 기회를 추구하는 것(수요)과 이 기회를 활용하는 데 필요한 역량과 능력을 창출하는 것(공급) 사이에서 섬세하게 균형을 잡아야 한다.\n이런 균형을 적극적으로 관리하려는 기업은 ‘얼마나 빨리 성장하고 싶은가?’(목표 성장 속도),\n‘새로운 수요처를 어디에서 찾을 것인가?’(성장 방향),\n‘성장에 필요한 재원, 인적자원, 조직자원을 어떻게 모을 것인가?’(성장 방법)라는\n서로 관련된 3가지 결정 사안을 명시적으로 다루는 성장 전략을 마련해야 한다.\n-\n지속가능한 성장을 위한 속도-방향-방법 프레임워크 RDM(rate-direction-method&#160;)\n1. RATE 목표 성장 속도: 적절한 성장 속도는 무엇인가?\n성장 속도는 목표 시장 규모,&#160;회사의 역량,&#160;운영 체제,&#160;자금 조달 능력,&#160;인적 자원 전략,&#160;조직 설계,&#160;비즈니스 모델,&#160;문화 등 다양한 요소에 의해 영향을 받습니다.\n성장 속도는 기업의 운영 프로세스, 자금 조달, 인적 자원 전략, 조직 설계, 비즈니스 모델, 문화에 영향을 미친다.\n-\n단순히 빠른 성장만이 좋은 것은 아닙니다.&#160;성장 속도는 회사의 역량과 능력을 반영해야 하며,&#160;무리한 성장은 품질 저하,&#160;운영 문제,&#160;비용 증가,&#160;인재 부족 등의 문제를 야기할 수 있습니다.\n지속 가능한 성장률은 기업이 지분 매각이나 차입 없이도 성장할 수 있는 최대한의 속도이다.\n유능한 CFO는 재원이 허용하는 속도보다 더 빠르게 회사가 성장하는 것을 막을 것이다.\nCEO와 다른 기능부서 리더들은 비재무적 자원에 대한 엄밀한 평가가 필요하다.\n중대한 역량이 결핍된 상태에서의 급격한 성장은 품질 문제, 운영상의 문제, 자원 고갈, 시스템 과부하, 직원 번아웃, 이직, 시장 평판 악화 등을 초래할 수 있다.\n-\n펠로톤:&#160;팬데믹 기간 동안 수요 급증에 맞춰 생산 및 유통 확장에 집중했으나,&#160;공급망 과부하,&#160;품질 문제,&#160;비용 증가 등의 문제 발생\n-\n팔스서든서비스 사례:&#160;품질에 대한 집착으로 인해 성장 속도를 제한하지만,&#160;낮은 주문 오류율,&#160;높은 매출,&#160;낮은 음식물 쓰레기 비용,&#160;짧은 처리 시간 등의 장점을 얻습니다.\n1956년 설립된 팔스서든서비스는 많은 패스트푸드 체인이 선호하는 급격한 매장 확장을 피했다. 1985년 3호점을 낸 이후 일 년에 많아야 하나의 매장을 신규 오픈했고 그 이상을 넘긴 해는 없다.&#160;\n업계 최고 수준의 ft2당 매출을 자랑한다. 일반 버거 체인의 ft2당 매출이 650달러인 데 반해 팔스서든서비스는 2500달러\n린 제조원칙을 중심으로 설계된 운영체제도 있다. 이 기업은 케첩을 버거의 어느 위치에 뿌리고 핫도그 번을 어디까지 갈라야 하는지 등 모든 과정을 세심하게 연구해 명시했다. 메뉴는 햄버거, 핫도그, 샌드위치, 감자튀김, 밀크셰이크 등 몇 가지 기본 품목으로 제한\n&#160;업계 평균 주문 오류율은 3600건당 15건인 데 반해 팔스서든서비스의 주문 오류율은 3600건당 1건으로 극히 낮다. 이 정도 수준의 품질 덕분에 마진이 낮은 이 업계에서 무엇보다 중요한 음식물 쓰레기 비용을 절감하고 업계에서 가장 짧은 처리 시간을 달성\n드라이브스루 운영에서 볼 때 주문 오류가 많으면 모든 손님의 대기시간이 길어진다. 주문 오류가 적은 팔스서든서비스는 손님이 가장 많이 몰리는 시간대에 더 많은 손님을 받을 수 있다. 이는 매출 증가와 직결\n팔스서든서비스 직원들은 몇 주 동안 각 공정에 대해 교육을 받고 인증 시험에 통과해야만 매장에 투입돼 고객에게 제공할 제품을 만들 수 있다. 또한 적합한 기술 수준을 유지하고 있음을 증명하기 위해 정기적으로 재인증을 받아야 한다. 모든 매장은 매장 소유주는 아니지만 해당 매장에서 벌어들인 이익과 100% 연계된 보상을 받는 ‘오너-오퍼레이터’가 관리한다.\n모든 관리자 후보자는 광범위한 심사 과정을 거친다. 업계 경력과 상관없이 선발된 후보자는 모두 사내 리더십 개발 프로그램을 수료한다. 후보자가 오너-오퍼레이터가 되기까지 보통 3년이 걸린다. 팔스서든서비스의 성장 전략은 매장 관리자의 가용성에 따라 결정된다. 매장 관리자 한 명이 육성돼야 신규 매장 한 곳을 열 수 있다.\n-\n팔스서든서비스는 시장 잠재력이나 목표 재무수익을 토대로 성장 목표를 설정하지 않는다. 대신 병목현상을 일으키는 주요 자원(이 경우에는 매장 관리자)을 인식하고 매장 관리자 육성 속도에 따라 성장 속도를 조정한다. 이런 접근방식 때문에 매장 수와 매출이 더디게 증가하지만 회사의 고유한 운영모델과 우수한 재무성과를 유지하는 데는 매우 중요\n-\n빨리 성장해야 하는 훌륭한 전략적 이유(선점자 이점, 네트워크 효과가 존재하는 시장 등)가 있을 수도 있지만 빠른 성장과 그로 인한 잠재적 피해를 나란히 놓고 평가해야 한다.\n-\n2. DIRECTION성장 방향: 규모, 범위, 다각화 중 어떤 방향을 선택해야 할까?\n성장 방향은 핵심 시장 확장, 인접 제품/서비스로의 범위 확장, 관련성 없는 산업으로의 다각화 등이 있다.\nㅇ 규모 중심 전략:&#160;핵심 시장을 확장하거나 새로운 지역 시장에 기존 모델을 적용하는 방식으로 성장합니다.\n(월마트, UPS, 사우스웨스트 항공, 퍼블릭스)\n예를 들어 1980~2019년까지 미국 국내 여행시장의 연평균복합성장률(‘유상여객마일’, 즉 유료여객이 이동한 마일 수 기준)은 5.3%에 그쳤다. 그런데 사우스웨스트 항공의 연평균복합성장률은 무려 15.3%를 기록\nㅇ 범위 중심 전략:&#160;인접한 제품과 서비스로 범위를 확장하는 방식으로 성장합니다.\n(나이키가 지난 수십 년 동안 운동화 제조업체에서 스포츠 의류&#183;장비 산업 전반의 강자로 떠오르며 폭발적으로 성장하는 데 브랜드가 행한 강력한 역할)\nㅇ 다각화 전략:&#160;관련성이 없는 여러 산업으로 진출하는 방식으로 성장합니다.\n(&#160;여러 산업에 걸쳐 적용할 수 있는 가장 범용적인 기술자산을 보유한 기업의 다각화 가능성이 가장 높은 것)\n-\n성공적인 성장 방향은 시장 잠재력, 회사의 핵심 역량,&#160;브랜드,&#160;고객 관계,&#160;평판 등을 고려하여 경쟁 우위를 얻을 수 있는 시장을 선택하는 것이 중요합니다.\n‘우리 회사의 역량과 브랜드, 고객 관계, 평판 등 기타 고유 자원을 통해 경쟁 우위를 얻을 수 있는 시장은 어디인가’라는 기본적인 질문을 해결해야 한다\n-\n3. METHOD성장 방법: 성장을 이루기 위한 역량과 능력을 어떻게 구축할까?\n모든 성장에는 자본, 인재, 브랜드, 유통 채널 등 새로운 자원에 대한 접근성이 필요하다.\n이런 자원을 얻기 위해 기업이 선택할 수 있는 방법은\n성장 방법은 인수, 합병, 자체 투자, 파트너십 등이 있다.\n인수와 합병은 빠른 성장을 위한 효과적인 방법이지만, 실패 확률이 높고 통합 과정이 어려울 수 있다.\n자체 투자는 장기적인 성장을 위한 기반을 마련하지만, 회사의 고유한 가치 제안과 더 정확하게 정렬되고 통합될 수 있다시간과 자원이 많이 필요하다.\n파트너십은 다른 기업의 역량과 자원을 활용할 수 있는 방법이지만, 가치 제안에 중요한 활동의 통제권을 넘겨준다는 의미, 조율과 협력이 중요하다.\n성장 방법은 회사의 전략,&#160;목표,&#160;시장 환경, 목표 성장 속도, 성장 방향, 기업의 역량과 자원에 따라 달라진다.\n결론: 속도-방향-방법의 통합\n지속 가능한 성장을 위한 3가지 핵심 결정은 서로 상호 연결되어 있다.\n기업은 지속가능한 성장을 달성하기 위해서는 속도,&#160;방향,&#160;방법을 통합적으로 고려하여 성장 전략을 수립해야 한다.\n세 가지 요소는 서로 상호 의존적이며,&#160;하나의 요소만 고려하는 것은 불균형적인 성장을 초래할 수 있습니다.\n통합되지 않은 성장 전략의 위험성: B.good case\n2004년 문을 연 패스트푸드 레스토랑 비굿(B.good)은 성장 전략을 세울 때 속도-방향-방법을 통합적으로 고려해 선택해야 한다는 교훈을 잘 보여준다.&#160;\n통합되지 않은 성장 전략의 위험성: 비굿 사례 분석\n성장 속도, 방향, 방법의 불균형:\n초기 성공: 혁신적인 가치 제안과 독특한 문화로 빠른 성장\n전략 변화: 빠른 속도로 매장 확장, 지리적 확장, 가맹 확대\n불균형의 결과: 운영 및 조직적 문제 발생, 가치 제안 이행 어려움, 성장 둔화\n비굿의 성장 전략 변화:\n2004년 설립: 8년 동안 보스턴 인근 지역에 8개 직영점 운영\n2012년 이후: 빠른 속도로 매장 확장, 지리적 확장, 가맹 확대\n2023년 현재: 13개 매장으로 축소, 11개 매장은 보스턴 대도시권에 위치\n통합되지 않은 성장 전략의 문제점:\n핵심 역량과 성장 속도의 불일치: 신선한 현지 재료 확보, 가맹주 선정 및 교육에 시간 소요\n조직 구축의 어려움: 가치 제안과 문화를 공유하는 인력 확보 어려움\n운영 및 관리 문제 발생: 표준화 부족, 품질 관리 어려움\n브랜드 가치 훼손: 가치 제안과 문화의 일관성 유지 어려움\nAgenda:\n우리 회사는,\n어떻게 목표 성장 속도를 결정해야 하는가?\n어떻게 성장 방향을 선택해야 하는가?\n어떻게 성장 방법을 선택해야 하는가?\n우리회사는 성장 전략을 수립하고 실행하는 과정에서 어떤 어려움을 겪었고, 겪을 수 있는가?\n성장 전략을 성공적으로 수행하기 위해 필요한 노력?\n지속가능한 성장을 달성하기 위한 가장 중요한 요소는 무엇이라고 생각하는가?\n속도-방향-방법 프레임워크의 장점과 한계는 무엇인가?\n기업은 어떻게 변화하는 시장 환경에 맞춰 성장 전략을 조정해야 하는가?\n기업의 사회적 책임과 지속가능한 성장은 어떻게 연결되는가?\n단기 성장 기회와 장기 수익성의 균형을 어떻게 맞춰야 할까?\n성장 전략을 원하는 성장률 및 방향에 맞추려고 할 때 직면하는 구체적인 과제는 무엇일까?\n지속 가능한 성장을 위한 자원 확보의 맥락에서 기업이 장기적인 수익성을 보장하기 위해 우선적으로 고려해야 할 사항은 무엇입니까?\n성장 전략 수립 시 가장 중요하게 고려해야 할 요소는 무엇인가?\n통합되지 않은 성장 전략의 위험성을 줄이기 위한 방법은 무엇인가?\n기업은 어떻게 변화하는 시장 환경에 맞춰 성장 전략을 조정해야 하는가?\n기업의 사회적 책임과 지속가능한 성장은 어떻게 연결되는가?\n1. 속도\n적절한 성장 속도를 측정하는 방법은 무엇인가?\n성장 속도를 높이기 위한 구체적인 전략은 무엇인가?\n무리한 성장의 위험은 무엇이며, 어떻게 방지할 수 있는가?\n기업 규모, 산업, 시장 상황에 따라 적절한 성장 속도는 어떻게 달라질 수 있는가?\n2. 방향\n회사의 핵심 역량을 정의하고 평가하는 방법은 무엇인가?\n경쟁 우위를 확보할 수 있는 시장을 선택하는 방법은 무엇인가?\n규모 중심, 범위 중심, 다각화 전략의 장단점은 무엇인가?\n기업의 성장 단계에 따라 적절한 성장 방향은 어떻게 달라질 수 있는가?\n3. 방법\n핵심 역량 개발을 위한 구체적인 전략은 무엇인가?\n성장 목표 달성을 위한 조직 구축 방안은 무엇인가?\n성장을 위한 자금 조달 방법에는 어떤 것들이 있는가?\n강력한 리더십을 발휘하기 위한 요소는 무엇인가?\n기업 규모, 산업, 시장 상황에 따라 필요한 역량과 능력은 어떻게 달라질 수 있는가?\n4. 속도-방향-방향의 통합\n세 가지 요소를 효과적으로 통합하기 위한 방법은 무엇인가?\n속도, 방향, 방법의 불균형으로 인해 발생할 수 있는 문제는 무엇인가?\n기업 상황에 맞는 맞춤형 성장 전략을 수립하는 방법은 무엇인가?"
  }
];
const CONTENT_HASH = 'f7e36054';

let cards = [];
let moving = null, resizing = null;
let selectedIdx = null, clipboardCard = null;
const GRID = 20, GAP = 14;
function snap(v) { return Math.round(v / GRID) * GRID; }

// ── Undo (Ctrl+Z) ────────────────────────────────────────────────────────────
const MAX_HISTORY = 50;
let history = [];
function snapshot() {
  syncText();
  history.push(JSON.stringify(cards));
  if (history.length > MAX_HISTORY) history.shift();
}
function undo() {
  if (!history.length) { showStatus('되돌릴 내용 없음'); return; }
  syncText();
  cards = JSON.parse(history.pop());
  renderCards();
  saveBoard();
  showStatus('↩ 되돌림');
}
function showStatus(msg) {
  const s = document.getElementById('status');
  s.textContent = msg;
  clearTimeout(showStatus._t);
  showStatus._t = setTimeout(() => { s.textContent = ''; }, 2000);
}
document.addEventListener('keydown', e => {
  const isText = document.activeElement?.contentEditable === 'true';
  if ((e.ctrlKey || e.metaKey) && e.key === 'z' && !e.shiftKey) {
    if (isText) return;
    e.preventDefault();
    undo();
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'c' && !e.shiftKey && !isText) {
    if (selectedIdx !== null && cards[selectedIdx]) {
      syncText();
      clipboardCard = JSON.parse(JSON.stringify(cards[selectedIdx]));
      showStatus('카드 복사됨');
      e.preventDefault();
    }
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'v' && !e.shiftKey && !isText) {
    if (clipboardCard) {
      e.preventDefault();
      snapshot();
      const nc = JSON.parse(JSON.stringify(clipboardCard));
      nc.x = (nc.x || 0) + 30; nc.y = (nc.y || 0) + 30;
      cards.push(nc);
      selectedIdx = cards.length - 1;
      renderCards(); saveBoard();
      showStatus('카드 붙여넣음');
    }
  }
  if (e.key === 'Escape') {
    document.querySelectorAll('.card.selected').forEach(c => c.classList.remove('selected'));
    selectedIdx = null;
  }
});

function pushCards(movedIdx) {
  const moved = cards[movedIdx];
  const movedEl = document.querySelector(`.card[data-idx="${movedIdx}"]`);
  if (!movedEl) return;
  const mh = movedEl.offsetHeight;
  document.querySelectorAll('.card').forEach(el => {
    const i = +el.dataset.idx;
    if (i === movedIdx) return;
    const c = cards[i], oh = el.offsetHeight;
    if (moved.x < (c.x+(c.w||200)) && (moved.x+(moved.w||200)) > c.x && moved.y < (c.y+oh) && (moved.y+mh) > c.y) {
      c.y = moved.y + mh + GAP;
      el.style.top = c.y + 'px';
    }
  });
}

function loadBoard() {
  const saved = localStorage.getItem(SAVE_KEY);
  const savedHash = localStorage.getItem(SAVE_KEY + ':hash');
  let parsed = null;
  try { parsed = saved ? JSON.parse(saved) : null; } catch(e) {}
  // reset if: no save, empty array, or content hash changed (page regenerated)
  if (!parsed || parsed.length === 0 || savedHash !== CONTENT_HASH) {
    cards = DEFAULT_CARDS.map(c => ({...c}));
    localStorage.removeItem(SAVE_KEY);
    localStorage.setItem(SAVE_KEY + ':hash', CONTENT_HASH);
    renderCards();
    const hasCoords = cards.some(c => c.x !== undefined && c.y !== undefined);
    if (!hasCoords) autoLayout();
    return;
  }
  cards = parsed;
  renderCards();
}
function resetToDefaults() { if (!confirm('저장된 보드를 지우고 원본으로 초기화합니다. 계속할까요?')) return; localStorage.removeItem(SAVE_KEY); cards = DEFAULT_CARDS.map(c => ({...c})); renderCards(); autoLayout(); }

function autoLayout() {
  const boardW = document.getElementById('board').offsetWidth;
  const cols = Math.max(1, Math.floor(boardW / 280));
  const colW = (boardW - GAP*(cols-1)) / cols;
  const colH = new Array(cols).fill(0);
  const allCards = document.querySelectorAll('.card');
  const images = document.querySelectorAll('.card img');
  let loaded = 0;
  function place() {
    allCards.forEach((el, i) => {
      const w = Math.min(cards[i].w || colW, colW);
      let minCol = 0;
      for (let c = 1; c < cols; c++) if (colH[c] < colH[minCol]) minCol = c;
      cards[i].x = minCol * (colW + GAP);
      cards[i].y = colH[minCol];
      cards[i].w = w;
      el.style.left = cards[i].x + 'px';
      el.style.top = cards[i].y + 'px';
      el.style.width = w + 'px';
      colH[minCol] = cards[i].y + el.offsetHeight + GAP;
    });
    document.getElementById('board').style.minHeight = (Math.max(...colH) + 100) + 'px';
    saveBoard();
  }
  if (!images.length) { requestAnimationFrame(place); return; }
  images.forEach(img => {
    if (img.complete) { loaded++; if (loaded >= images.length) requestAnimationFrame(place); }
    else { img.onload = img.onerror = () => { loaded++; if (loaded >= images.length) requestAnimationFrame(place); }; }
  });
}

function syncText() {
  document.querySelectorAll('.card').forEach(el => {
    const i = +el.dataset.idx;
    if (cards[i]?.type === 'text') { const t = el.querySelector('.text'); if (t) cards[i].content = t.innerHTML; }
  });
}
function saveBoard() { syncText(); localStorage.setItem(SAVE_KEY, JSON.stringify(cards)); localStorage.setItem(SAVE_KEY + ':hash', CONTENT_HASH); showStatus('저장됨 ' + new Date().toLocaleTimeString()); }

function renderCards() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  cards.forEach((card, i) => {
    const el = document.createElement('div');
    el.className = 'card'; el.dataset.idx = i;
    if (card.x !== undefined) el.style.left = card.x + 'px';
    if (card.y !== undefined) el.style.top = card.y + 'px';
    // html cards contain raw OneNote table HTML which may overflow the stated div width
    if (card.w) { if (card.type === 'html') el.style.minWidth = card.w + 'px'; else el.style.width = card.w + 'px'; }
    el.addEventListener('mousedown', e => {
      if (e.target.closest('.text, a, .card-btn, .resize-handle, td, th')) return;
      e.preventDefault();
      // Update selection
      document.querySelectorAll('.card.selected').forEach(c => c.classList.remove('selected'));
      selectedIdx = i; el.classList.add('selected');
      snapshot();
      moving = { idx: i, startX: e.clientX, startY: e.clientY, origX: card.x||0, origY: card.y||0 };
      el.classList.add('moving');
    });
    const actions = document.createElement('div'); actions.className = 'card-actions';
    const delBtn = document.createElement('button'); delBtn.className = 'card-btn'; delBtn.textContent = '×';
    delBtn.onclick = e => { e.stopPropagation(); if(confirm('삭제?')) { snapshot(); cards.splice(i,1); renderCards(); saveBoard(); } };
    actions.appendChild(delBtn); el.appendChild(actions);
    if (card.type === 'text') {
      const text = document.createElement('div'); text.className = 'text'; text.contentEditable = true;
      text.innerHTML = card.content || '';
      text.addEventListener('focus', () => { snapshot(); });
      text.addEventListener('blur', () => { card.content = text.innerHTML; saveBoard(); });
      el.appendChild(text);
    } else if (card.type === 'image') {
      const img = document.createElement('img');
      img.src = card.src.startsWith('http') || card.src.startsWith('data:') ? card.src : IMG_BASE + card.src;
      img.alt = ''; img.loading = 'lazy'; img.onerror = () => img.style.display = 'none';
      if (card.w) img.style.width = card.w + 'px';
      if (card.h) img.style.height = card.h + 'px';
      if (card.link) { const a = document.createElement('a'); a.href = card.link; a.target = '_blank'; a.appendChild(img); el.appendChild(a); }
      else { el.appendChild(img); }
      if (card.caption) { const cap = document.createElement('div'); cap.style.cssText = 'font-size:11px;color:#8b949e;margin-top:4px;word-break:break-word;padding:0 2px;'; cap.textContent = card.caption; el.appendChild(cap); }
    } else if (card.type === 'html') {
      const wrapper = document.createElement('div');
      wrapper.style.cssText = 'overflow:auto;font-size:13px;line-height:1.5;';
      wrapper.innerHTML = card.html.replace(/__ATTACHMENT__/g, IMG_BASE);
      wrapper.querySelectorAll('img').forEach(img => { img.style.maxWidth = '100%'; img.style.height = 'auto'; img.draggable = false; });
      wrapper.querySelectorAll('a').forEach(a => { a.target = '_blank'; a.style.color = '#6cb0f6'; });
      wrapper.querySelectorAll('table').forEach(t => { t.style.borderCollapse = 'collapse'; });
      wrapper.querySelectorAll('td,th').forEach(td => {
        td.style.border = '1px solid #444'; td.style.padding = '4px 6px'; td.style.verticalAlign = 'top';
        td.title = '더블클릭으로 편집';
        td.addEventListener('dblclick', function(e) {
          e.stopPropagation();
          snapshot();
          this.contentEditable = 'true';
          this.style.outline = '2px solid #388bfd';
          this.style.background = 'rgba(56,139,253,0.08)';
          this.focus();
        });
        td.addEventListener('blur', function() {
          this.contentEditable = 'false';
          this.style.outline = '';
          this.style.background = '';
          cards[i].html = wrapper.innerHTML.split(IMG_BASE).join('__ATTACHMENT__');
          saveBoard();
        });
      });
      el.appendChild(wrapper);
    } else if (card.type === 'table') {
      const rows = card.rows || [['','',''],['','',''],['','','']];
      const tbl = document.createElement('table');
      tbl.style.cssText = 'border-collapse:collapse;width:100%;font-size:13px;';
      rows.forEach((row, ri) => {
        const tr = tbl.insertRow();
        row.forEach((cell, ci) => {
          const td = document.createElement(ri === 0 ? 'th' : 'td');
          td.contentEditable = true;
          td.style.cssText = 'border:1px solid #30363d;padding:4px 8px;min-width:60px;text-align:left;' + (ri===0 ? 'background:#21262d;font-weight:600;' : '');
          td.textContent = cell;
          td.addEventListener('blur', () => { if (!cards[i].rows) cards[i].rows = rows; rows[ri][ci] = td.textContent; saveBoard(); });
          tr.appendChild(td);
        });
      });
      el.appendChild(tbl);
      const addRow = document.createElement('button');
      addRow.textContent = '+ 행'; addRow.style.cssText = 'margin-top:4px;font-size:11px;background:#21262d;border:1px solid #30363d;color:#8b949e;padding:2px 8px;border-radius:4px;cursor:pointer;';
      addRow.onclick = e => { e.stopPropagation(); snapshot(); if (!cards[i].rows) cards[i].rows = rows; cards[i].rows.push(new Array(cards[i].rows[0].length).fill('')); renderCards(); saveBoard(); };
      const addCol = document.createElement('button');
      addCol.textContent = '+ 열'; addCol.style.cssText = 'margin-top:4px;margin-left:4px;font-size:11px;background:#21262d;border:1px solid #30363d;color:#8b949e;padding:2px 8px;border-radius:4px;cursor:pointer;';
      addCol.onclick = e => { e.stopPropagation(); snapshot(); if (!cards[i].rows) cards[i].rows = rows; cards[i].rows.forEach(r => r.push('')); renderCards(); saveBoard(); };
      el.appendChild(addRow); el.appendChild(addCol);
    }
    const rh = document.createElement('div'); rh.className = 'resize-handle';
    rh.addEventListener('mousedown', e => { e.preventDefault(); e.stopPropagation(); snapshot(); resizing = { idx: i, startX: e.clientX, startW: card.w || el.offsetWidth }; });
    el.appendChild(rh);
    if (i === selectedIdx) el.classList.add('selected');
    board.appendChild(el);
  });
  requestAnimationFrame(() => {
    let maxB = 0;
    document.querySelectorAll('.card').forEach(el => { const b = (parseFloat(el.style.top)||0) + el.offsetHeight; if (b > maxB) maxB = b; });
    board.style.minHeight = (maxB + 100) + 'px';
  });
}

document.addEventListener('mousemove', e => {
  if (moving) {
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`); if (!el) return;
    let nx = moving.origX + e.clientX - moving.startX, ny = moving.origY + e.clientY - moving.startY;
    if (e.shiftKey) { nx = snap(nx); ny = snap(ny); el.style.outline = '1px dashed rgba(240,192,64,0.3)'; } else { el.style.outline = ''; }
    el.style.left = nx + 'px'; el.style.top = ny + 'px';
  }
  if (resizing) {
    let nw = resizing.startW + e.clientX - resizing.startX; if (e.shiftKey) nw = snap(nw);
    cards[resizing.idx].w = Math.max(100, nw);
    const el = document.querySelector(`.card[data-idx="${resizing.idx}"]`); if (el) el.style.width = cards[resizing.idx].w + 'px';
  }
});

document.addEventListener('mouseup', e => {
  if (moving) {
    let nx = moving.origX + e.clientX - moving.startX, ny = moving.origY + e.clientY - moving.startY;
    if (e.shiftKey) { nx = snap(nx); ny = snap(ny); }
    cards[moving.idx].x = Math.max(0, nx); cards[moving.idx].y = Math.max(0, ny);
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`); if (el) { el.classList.remove('moving'); el.style.outline = ''; }
    if (e.shiftKey) pushCards(moving.idx);
    moving = null; saveBoard();
  }
  if (resizing) { if (e.shiftKey) pushCards(resizing.idx); resizing = null; saveBoard(); }
});

function addTextCard() { snapshot(); cards.push({ type: 'text', content: '', x: 50, y: window.scrollY+100, w: 300 }); renderCards(); setTimeout(() => { const els = document.querySelectorAll('.card .text'); els[els.length-1]?.focus(); }, 100); }
function addImageCard() { const input = document.createElement('input'); input.type = 'file'; input.accept = 'image/*'; input.onchange = e => { const f = e.target.files[0]; if (!f) return; const r = new FileReader(); r.onload = () => { snapshot(); cards.push({ type: 'image', src: r.result, x: 50, y: window.scrollY+100, w: 240 }); renderCards(); saveBoard(); }; r.readAsDataURL(f); }; input.click(); }
function addImageUrl() { const url = prompt('이미지 URL'); if (!url) return; snapshot(); cards.push({ type: 'image', src: url, x: 50, y: window.scrollY+100, w: 240 }); renderCards(); saveBoard(); }
function addTableCard() {
  const colsStr = prompt('열 수 (기본 3)', '3'); const cols = Math.max(1, parseInt(colsStr)||3);
  const rowsStr = prompt('행 수 (헤더 포함, 기본 4)', '4'); const rows = Math.max(1, parseInt(rowsStr)||4);
  snapshot();
  cards.push({ type: 'table', rows: Array.from({length: rows}, (_, ri) => Array.from({length: cols}, (_, ci) => ri===0 ? `열${ci+1}` : '')), x: 50, y: window.scrollY+100, w: Math.max(240, cols*100) });
  renderCards(); saveBoard();
}
function exportBoard() { syncText(); const blob = new Blob([JSON.stringify(cards, null, 2)], { type: 'application/json' }); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = SAVE_KEY + '.json'; a.click(); }
// ── Zoom ─────────────────────────────────────────────────────────────────────
let zoom = parseFloat(localStorage.getItem('zoom-' + SAVE_KEY) || '1.0');
function applyZoom() {
  const board = document.getElementById('board');
  board.style.transform = `scale(${zoom})`;
  board.style.transformOrigin = '0 0';
  document.getElementById('zoom-level').textContent = Math.round(zoom * 100) + '%';
  localStorage.setItem('zoom-' + SAVE_KEY, zoom);
}
function zoomIn()  { zoom = Math.min(3.0, parseFloat((zoom + 0.1).toFixed(2))); applyZoom(); }
function zoomOut() { zoom = Math.max(0.2, parseFloat((zoom - 0.1).toFixed(2))); applyZoom(); }
document.addEventListener('keydown', e => {
  if (e.ctrlKey || e.metaKey) {
    if (e.key === '=' || e.key === '+') { e.preventDefault(); zoomIn(); }
    if (e.key === '-')                  { e.preventDefault(); zoomOut(); }
    if (e.key === '0')                  { e.preventDefault(); zoom = 1.0; applyZoom(); }
  }
});
document.getElementById('board').addEventListener('wheel', e => {
  if (!(e.ctrlKey || e.metaKey)) return;
  e.preventDefault();
  e.deltaY < 0 ? zoomIn() : zoomOut();
}, { passive: false });
applyZoom();
function resetLayout() { if (!confirm('자동 재배치합니다.')) return; cards.forEach(c => { delete c.x; delete c.y; }); renderCards(); autoLayout(); }
// ── Floating format toolbar ───────────────────────────────────────────────────
const fmtBar = document.getElementById('format-toolbar');
function fmt(cmd) { document.execCommand(cmd, false, null); saveBoard(); }
function fmtLink() {
  const sel = window.getSelection();
  if (!sel || sel.isCollapsed) return;
  const url = prompt('링크 URL 입력', 'https://');
  if (!url) return;
  document.execCommand('createLink', false, url);
  // make links open in new tab
  sel.anchorNode?.parentElement?.closest('a')?.setAttribute('target', '_blank');
  document.querySelectorAll('.text a').forEach(a => a.target = '_blank');
  saveBoard();
}

// prevent format buttons from blurring contenteditable
fmtBar.addEventListener('mousedown', e => e.preventDefault());

document.addEventListener('selectionchange', () => {
  const sel = window.getSelection();
  if (!sel || sel.isCollapsed || !sel.toString().trim()) { fmtBar.style.display = 'none'; return; }
  // only show if selection is inside a .text element
  const anchor = sel.anchorNode;
  if (!anchor) { fmtBar.style.display = 'none'; return; }
  const textEl = anchor.nodeType === 1 ? anchor.closest('.text') : anchor.parentElement?.closest('.text');
  if (!textEl) { fmtBar.style.display = 'none'; return; }
  // position above selection
  const range = sel.getRangeAt(0);
  const rect = range.getBoundingClientRect();
  fmtBar.style.display = 'flex';
  const tbW = fmtBar.offsetWidth || 180;
  let left = rect.left + rect.width / 2 - tbW / 2;
  left = Math.max(8, Math.min(left, window.innerWidth - tbW - 8));
  fmtBar.style.left = left + 'px';
  fmtBar.style.top = (rect.top - 44 + window.scrollY) + 'px';
});

setInterval(saveBoard, 30000);
loadBoard();
</script>
