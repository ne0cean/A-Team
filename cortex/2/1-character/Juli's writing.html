<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Juli's writing </title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #1e1e1e;
  color: #e0e0e0;
  font-family: 'Segoe UI', -apple-system, sans-serif;
  font-size: 15px;
  line-height: 1.6;
  padding: 20px 30px 60px;
  overflow-x: hidden;
}
a { color: #6cb0f6; text-decoration: none; }
a:hover { text-decoration: underline; }
.title-bar {
  background: #3a3a5c;
  display: inline-block;
  padding: 6px 16px;
  font-size: 22px;
  font-weight: bold;
  color: #fff;
  margin-bottom: 4px;
}
.date { color: #999; font-size: 13px; margin-bottom: 20px; }
.board { position: relative; }
.card {
  background: #2a2a2a;
  border: 1px solid #3a3a3a;
  border-radius: 8px;
  padding: 12px;
  position: absolute;
  cursor: grab;
  transition: box-shadow 0.15s;
  overflow: hidden;
}
.card:hover { box-shadow: 0 0 0 1px #58a6ff; z-index: 10; }
.card.moving { opacity: 0.8; box-shadow: 0 4px 24px rgba(0,0,0,0.6); z-index: 100; cursor: grabbing; }
.card img { width: 100%; border-radius: 4px; display: block; }
.card .caption { font-size: 12px; color: #888; margin-top: 6px; }
.card .text { outline: none; min-height: 20px; white-space: pre-wrap; word-break: break-word; }
.card .text:focus { background: rgba(255,255,255,0.05); border-radius: 4px; padding: 4px; }
.card .text:empty::before { content: '텍스트 입력...'; color: #555; }
.card table { border-collapse: collapse; width: 100%; font-size: 13px; }
.card table td, .card table th { border: 1px solid #444; padding: 4px 8px; vertical-align: top; }
.card table th { background: #333; color: #ccc; }
.card-actions { position: absolute; top: 4px; right: 4px; display: none; gap: 4px; }
.card:hover .card-actions { display: flex; }
.card-btn { background: #333; border: 1px solid #555; color: #ccc; border-radius: 4px; padding: 2px 6px; font-size: 11px; cursor: pointer; }
.card-btn:hover { background: #444; color: #fff; }
.resize-handle { position: absolute; bottom: 0; right: 0; width: 16px; height: 16px; cursor: se-resize; opacity: 0; }
.card:hover .resize-handle { opacity: 0.6; }
.resize-handle::after { content: ''; position: absolute; bottom: 3px; right: 3px; width: 8px; height: 8px; border-right: 2px solid #666; border-bottom: 2px solid #666; }
.toolbar { position: fixed; bottom: 0; left: 0; right: 0; background: #161b22; border-top: 1px solid #30363d; padding: 8px 20px; display: flex; gap: 12px; align-items: center; z-index: 200; }
.toolbar button { background: #21262d; border: 1px solid #30363d; color: #e0e0e0; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; }
.toolbar button:hover { background: #30363d; }
.toolbar .status { color: #8b949e; font-size: 12px; margin-left: auto; }
.highlight-red { color: #ff6b6b; }
.highlight-blue { color: #6cb0f6; }
</style>
</head>
<body>
<div class="title-bar">Juli's writing </div>
<div class="date">Invalid Date</div>
<div class="board" id="board"></div>
<div class="toolbar">
  <button onclick="addTextCard()">+ 텍스트</button>
  <button onclick="addImageCard()">+ 이미지</button>
  <button onclick="saveBoard()">💾 저장</button>
  <button onclick="resetLayout()">↺ 재배치</button>
  <span class="status" id="status">Ready</span>
</div>
<script>
const SAVE_KEY = 'board-Juli-s-writing-';
const IMG_BASE = '../../attachments/';
const DEFAULT_CARDS = [
  {
    "type": "text",
    "content": "Juli's writing <br>\t\t<br>\t\t<br>\t<br>\t<br>\t\t<br>\t\t\t<br>Children want to be read and support their basic desire.<br>\t\t\t<br>Children look to their parents for guidance and support for their basic needs.<br>\t\t\t<br><br>\t\t\t<br>Children's life quality and education depend on parents.<br>\t\t\t<br>Children's quality of life and level of education depend on their parents.<br>\t\t\t<br><br>\t\t\t<br>Healthy relationship between parents and children encourage children 준수하다 law and rules.<br>\t\t\t<br>A healthy parents-child relationship encourages children to obey laws and regulations.<br>\t\t\t<br><br>\t\t\t<br>If children respects their parents, they obeyed regulations and cared others.<br>\t\t\t<br>Children who respect their parents abide by rules and take care of others.<br>\t\t\t<br><br>\t\t\t<br>A guided children form their parents could be anti-social 인격 disorder and criminal<br>\t\t\t<br>A guided children by parents is less likely to become a sociopath and criminal.<br>\t\t\t<br><br>\t\t\t<br>Children watches TV or play games cause increasing of 맞벌이 families.<br>\t\t\t<br>As the number of double-income families increase, children watch TV or surf the internet.<br>\t\t\t<br><br>\t\t\t<br>This factors make release children outside environment.<br>\t\t\t<br>Theas factors open them up to external influence.<br>\t\t\t<br><br>\t\t\t<br>Even if parents control their children, they influenced by peer group.<br>\t\t\t<br>Even if parents control, their children comes under peer influence.<br>\t\t\t<br><br>\t\t\t<br>In this result, development of children could be influenced.<br>\t\t\t<br>In result is that a child's development can be affected.<br>\t\t\t<br><br>\t\t\t<br>It is often said that parents hold the key to their children's future. While others claim there are more influential factors such as media and friends.<br>\t\t\t<br><br>\t\t\t<br>Although other influence are becoming more powerful. I believe that parents still play most decisive role in shaping a child's skill set.<br>\t\t\t<br><br>\t\t\t<br>===================================================================<br>\t\t\t<br><br>\t\t\t<br>1/ Recently, relationship between parents and their children seems to be less close than past.<br>\t\t\t<br>1/ Recently, the relationship between parents and their children seems to be less close compared to the past.<br>\t\t\t<br><br>\t\t\t<br>2/ The lack of closeness could have a negative effect on children in family.<br>\t\t\t<br>2/ The lack of closeness in family can have a negative effect on their children. <br>\t\t\t<br><br>\t\t\t<br>3/ Parents spend less time with their children by increasing the number of double income-families.<br>\t\t\t<br>3/ As the number of double-income families increases, parents spent less time with their children. <br>\t\t\t<br><br>\t\t\t<br>4/ Children spent time with friends or using the internet due to their busy parents.<br>\t\t\t<br>4/ Children spent more time with friends and surfing the internet due to their busy parents.<br>\t\t\t<br><br>\t\t\t<br>5/ Friends, TV and the internet have become the main influence on children's behavior.<br>\t\t\t<br>5/ Friends, television and the internet have become the main influence on children's behavior.<br>\t\t\t<br><br>\t\t\t<br>6/ Conventionally a mother stay at home for cooking, cleaning, looking after their children.<br>\t\t\t<br>6/ Traditionally, mothers stayed at home to cook, clean, look after their children.<br>\t\t\t<br><br>\t\t\t<br>7/ Number of families have a meal together no longer.<br>\t\t\t<br>7/ Many families no longer eat meals together.<br>\t\t\t<br><br>\t\t\t<br>8/ Families dose not as large as past as they used to be in many countries.<br>\t\t\t<br>8/ Families in many countries are not as large as they used to be.<br>\t\t\t<br><br>\t\t\t<br>9/ There are trends that we despite live extended families of neclear family because of influence on urbanisation industrialisation recently.<br>\t\t\t<br>9/ Today, we tend to live in nuclear families rather than extended families because of the impact of urbanisation and industrialisation.<br>\t\t\t<br><br>\t\t\t<br>10/ Almost parents have no idea that their children how to spent time.<br>\t\t\t<br>10/ Most parents have no idea how their children spend their time.<br>\t\t\t<br><br>\t\t\t<br>11/ Parents are more involve with their children's upbringing to prevent increasing juvenile delinquency.<br>\t\t\t<br>11/ To prevent juvenile delinquency form increasing, parents should be more involved their children's upbringing.<br>\t\t\t<br><br>\t\t\t<br>12/ Teenagers are strongly encouraged peer pressure.<br>\t\t\t<br>12/ Teenagers are strongly influenced by peer pressure.<br>\t\t\t<br><br>\t\t\t<br>13/ Children assigned household chores could learn about how to organize their time.<br>\t\t\t<br>13/ Children who are assigned household chores can learn how to organize their time.<br>\t\t\t<br><br>\t\t\t<br>14/ Young children doesn't know the difference between right and wrong, parents are the best teacher who teach it.<br>\t\t\t<br>14/ Young children do not know the difference between right and wrong, and parents are the best teacher to teach them this.<br>\t\t\t<br><br>\t\t\t<br>15/ Parents have to give their children advice on moral and safety.<br>\t\t\t<br>15/ Parents need to give their children advice on moral and safety.",
    "w": 400
  }
];

let cards = [];
let moving = null, resizing = null;

function loadBoard() {
  const saved = localStorage.getItem(SAVE_KEY);
  cards = saved ? JSON.parse(saved) : DEFAULT_CARDS.map(c => ({...c}));
  renderCards();
  if (!saved) autoLayout();
}

function autoLayout() {
  const GAP = 14;
  const boardW = document.getElementById('board').offsetWidth;
  const cols = Math.max(1, Math.floor(boardW / 280));
  const colW = (boardW - GAP * (cols - 1)) / cols;
  const colHeights = new Array(cols).fill(0);
  const allCards = document.querySelectorAll('.card');
  const images = document.querySelectorAll('.card img');
  let loaded = 0;
  const total = images.length;

  function place() {
    allCards.forEach((el, i) => {
      const card = cards[i];
      const w = Math.min(card.w || colW, colW);
      let minCol = 0;
      for (let c = 1; c < cols; c++) if (colHeights[c] < colHeights[minCol]) minCol = c;
      card.x = minCol * (colW + GAP);
      card.y = colHeights[minCol];
      card.w = w;
      el.style.left = card.x + 'px';
      el.style.top = card.y + 'px';
      el.style.width = w + 'px';
      colHeights[minCol] = card.y + el.offsetHeight + GAP;
    });
    document.getElementById('board').style.minHeight = Math.max(...colHeights) + 100 + 'px';
    saveBoard();
  }

  if (total === 0) requestAnimationFrame(place);
  else images.forEach(img => {
    if (img.complete) { loaded++; if (loaded >= total) requestAnimationFrame(place); }
    else img.onload = img.onerror = () => { loaded++; if (loaded >= total) requestAnimationFrame(place); };
  });
}

function syncText() {
  document.querySelectorAll('.card').forEach(el => {
    const idx = +el.dataset.idx;
    if (cards[idx]?.type === 'text') {
      const t = el.querySelector('.text');
      if (t) cards[idx].content = t.innerHTML;
    }
  });
}

function saveBoard() {
  syncText();
  localStorage.setItem(SAVE_KEY, JSON.stringify(cards));
  document.getElementById('status').textContent = '저장됨 ' + new Date().toLocaleTimeString();
}

function renderCards() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  cards.forEach((card, i) => {
    const el = document.createElement('div');
    el.className = 'card';
    el.dataset.idx = i;
    if (card.x !== undefined) el.style.left = card.x + 'px';
    if (card.y !== undefined) el.style.top = card.y + 'px';
    if (card.w) el.style.width = card.w + 'px';

    el.addEventListener('mousedown', e => {
      if (e.target.closest('.text, a, .card-btn, .resize-handle, table')) return;
      e.preventDefault();
      moving = { idx: i, startX: e.clientX, startY: e.clientY, origX: card.x || 0, origY: card.y || 0 };
      el.classList.add('moving');
    });

    const actions = document.createElement('div');
    actions.className = 'card-actions';
    const delBtn = document.createElement('button');
    delBtn.className = 'card-btn'; delBtn.textContent = '×';
    delBtn.onclick = e => { e.stopPropagation(); if (confirm('삭제?')) { cards.splice(i, 1); renderCards(); saveBoard(); } };
    actions.appendChild(delBtn);
    el.appendChild(actions);

    if (card.type === 'text') {
      const text = document.createElement('div');
      text.className = 'text';
      text.contentEditable = true;
      text.innerHTML = card.content || '';
      text.addEventListener('blur', () => { card.content = text.innerHTML; saveBoard(); });
      el.appendChild(text);
    } else if (card.type === 'image') {
      const src = card.src.startsWith('http') || card.src.startsWith('data:') ? card.src : IMG_BASE + card.src;
      const img = document.createElement('img');
      img.src = src;
      img.alt = card.alt || '';
      img.loading = 'lazy';
      img.onerror = () => img.style.display = 'none';
      if (card.link) {
        const a = document.createElement('a'); a.href = card.link; a.target = '_blank';
        a.appendChild(img); el.appendChild(a);
      } else { el.appendChild(img); }
      if (card.caption) {
        const cap = document.createElement('div');
        cap.className = 'caption';
        cap.textContent = card.caption;
        el.appendChild(cap);
      }
    } else if (card.type === 'table') {
      const wrapper = document.createElement('div');
      wrapper.style.overflowX = 'auto';
      wrapper.innerHTML = card.html || '';
      el.appendChild(wrapper);
    }

    const rh = document.createElement('div');
    rh.className = 'resize-handle';
    rh.addEventListener('mousedown', e => {
      e.preventDefault(); e.stopPropagation();
      resizing = { idx: i, startX: e.clientX, startW: card.w || el.offsetWidth };
    });
    el.appendChild(rh);
    board.appendChild(el);
  });

  requestAnimationFrame(() => {
    let maxBottom = 0;
    document.querySelectorAll('.card').forEach(el => {
      const b = (parseFloat(el.style.top) || 0) + el.offsetHeight;
      if (b > maxBottom) maxBottom = b;
    });
    board.style.minHeight = (maxBottom + 100) + 'px';
  });
}

document.addEventListener('mousemove', e => {
  if (moving) {
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`);
    if (!el) return;
    const nx = moving.origX + e.clientX - moving.startX;
    const ny = moving.origY + e.clientY - moving.startY;
    el.style.left = nx + 'px';
    el.style.top = ny + 'px';
  }
  if (resizing) {
    const card = cards[resizing.idx];
    card.w = Math.max(100, resizing.startW + e.clientX - resizing.startX);
    const el = document.querySelector(`.card[data-idx="${resizing.idx}"]`);
    if (el) el.style.width = card.w + 'px';
  }
});

document.addEventListener('mouseup', e => {
  if (moving) {
    const card = cards[moving.idx];
    card.x = Math.max(0, moving.origX + e.clientX - moving.startX);
    card.y = Math.max(0, moving.origY + e.clientY - moving.startY);
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`);
    if (el) { el.classList.remove('moving'); }
    moving = null; saveBoard();
  }
  if (resizing) { resizing = null; saveBoard(); }
});

function addTextCard() {
  cards.push({ type: 'text', content: '', x: 50, y: window.scrollY + 100, w: 300 });
  renderCards();
  setTimeout(() => { const els = document.querySelectorAll('.card .text'); els[els.length - 1]?.focus(); }, 100);
}

function addImageCard() {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = 'image/*';
  input.onchange = e => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = () => { cards.push({ type: 'image', src: reader.result, x: 50, y: window.scrollY + 100, w: 240 }); renderCards(); saveBoard(); };
    reader.readAsDataURL(file);
  };
  input.click();
}

function resetLayout() {
  if (!confirm('자동 재배치합니다. 현재 위치가 변경됩니다.')) return;
  cards.forEach(c => { delete c.x; delete c.y; });
  renderCards(); autoLayout();
}

setInterval(saveBoard, 30000);
loadBoard();
</script>
</body>
</html>
