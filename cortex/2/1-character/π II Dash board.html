.card-btn:hover { background: #444; color: #fff; }
.resize-handle { position: absolute; bottom: 0; right: 0; width: 16px; height: 16px; cursor: se-resize; opacity: 0; }
.card:hover .resize-handle { opacity: 0.6; }
.resize-handle::after { content: ''; position: absolute; bottom: 3px; right: 3px; width: 8px; height: 8px; border-right: 2px solid #666; border-bottom: 2px solid #666; }
.toolbar { position: fixed; bottom: 0; left: 0; right: 0; background: #161b22; border-top: 1px solid #30363d; padding: 8px 20px; display: flex; gap: 12px; align-items: center; z-index: 200; }

.toolbar .status { color: #8b949e; font-size: 12px; margin-left: auto; }
.highlight-red { color: #ff6b6b; }

    "content": "ㅇ 일하면서공부<br>\t\t\t\t<br>ny 타임즈나 테크 사이트, 아라 스폰서 사이트 2개 매일 읽고 모르는 단어정리<br>\t\t\t\t<br>sat 5000 vocabularies 찾아서 다운<br>\t\t\t\t<br>발음은 merriam webster 사전<br>\t\t\t\t<br><a href=\"https://youtu.be/qaSh2P3YHj8\" target=\"_blank\">https://youtu.be/qaSh2P3YHj8</a><br>\t\t\t\t<br><a href=\"https://youtu.be/R2UikXZK3xI\" target=\"_blank\">https://youtu.be/R2UikXZK3xI</a><br>\t\t\t\t<br><br>\t\t\t\t<br>귀뚫어 앱 소개페이지:&#160;<a href=\"http://blog.naver.com/turozo?Redirect=Log&logNo=50144208020\" target=\"_blank\">http://blog.naver.com/turozo?Redirect=Log&logNo=50144208020</a>&#160;)<br>\t\t\t\t<br><a href=\"http://www.mobigen.com/~hiongun/listenup\" target=\"_blank\">http://www.mobigen.com/~hiongun/listenup</a> 이 사이트는 듣기 훈련을 위한 사이트<br>\t\t\t\t<br><br>\t\t\t\t<br>MP3파일을 반복해서 습득하되, 우리말 문장 뒤에 멈추고, 영어로 말해 보기 연습을 해야합니다.&#160;소위 말해서, Active Listening이라는 것입니다. 그냥 무작정 듣고 있는 게 아니고,&#160;들은 내용을 멈춰 세우고, 내가 다시 반복하거나 하는 것입니다.<br>\t\t\t\t<br>보통 MP3파일이 3~5분/1챕터로 구성되어 있는데, 10~20문장정도 들어 있습니다.&#160;한 챕터를 1~2일정도 반복해서 듣고, 거기있는 문장을 다 체득하는 것을 목표로 해 보세요.<br>\t\t\t\t<br>여기서도 마찬가지로 반복학습이 중요합니다만 반복 패턴을 좀 다르게 가져가 볼 필요가 있습니다.&#160;2달 정도 플랜으로 첫 1.5개월은 전체 교재를 한번 훑어 보면서, 진도를 나가고...&#160;남은 0.5개월 동안은 완전체득을 목표로 하세요. 한번 다 습득한 것을 1일/2일/4일/8일 반복&#160;규칙을 통해서 앞에서 부터 공부하되, 오답인 것들만 따로 별도로 빼서 연습하는 식입니다.<br>\t\t\t\t<br>보통 교재에 딸린 MP3파일들은 잡다구레한 Intro Music도 있고, 좀 기다리는 silent time도 있고,&#160;쓸데없는 문법설명이 있기도 한데... MP3DirectCut 같은 소프트웨어를 이용해서, Intro Music을&#160;다 잘라내고, 불필요한 음악도 다 잘라내고, 딱 우리말 문장/영어문장만 남겨놓으세요.&#160;수백번 Intro Music&#160;듣다 보면 정말 짜증나고 시간 낭비됩니다.<br>\t\t\t\t<br>3~5분짜리 MP3교재가 군더더기 다 떼어 내면, 1~2분 짜리로 줄어듭니다. 그걸 출근할 때, 20~50번,&#160;퇴근할 때 20~50번 정도 들으면서 체득하는 방식입니다.<br>\t\t\t\t<br><br>\t\t\t\t<br><br>\t\t\t\t<br>쓰기를 훈련하는 최고의 방법은 \"작문\"입니다.<br>\t\t\t\t<br><br>\t\t\t\t<br>시중에 가면 1페이지에 1문장씩 작문 문제 내놓고, 정답/설명이 써있는 교재가 많이 있습니다.&#160;2~300 페이지 수준의 책을 2권정도 풀어 보세요.&#160;영어 e-mail 쓰는 것이 술술술 나올 것입니다.<br>\t\t\t\t<br>이것도 마찬가지로 양보다 깊이로 승부해야 합니다.&#160;보통 연습문제의 변형된 문제들도 있는데, 그것들도 다 풀어 보세요.<br>\t\t\t\t<br>작문에서 주의할 것이 있습니다. 시차를 두고 반복 연습하기와 오답노트 방법을 써야 합니다.&#160;하루 학습 분량을 2일째에 다시 해서 틀린 것은 오답 노트에 기록하고,&#160;4일 째에는 반복하고, 오답노트 기록하는 식으로 학습하는 것입니다.<br>\t\t\t\t<br>1일->2일->4일->8일->16일 이런 식으로 반복해서 이미 학습한 것을&#160;계속 되풀이 하는 방법은 외국어 학습에서 특효약이라는 경험담도 아주 많습니다.&#160;실제 연구 결과도 아주 많습니다. 인간 두뇌의 신경세포 구조 때문에 그렇습니다.<br>\t\t\t\t<br>영어로 이메일을 자유롭게 쓰고 싶죠? 작문 훈련책 2권 정도 하면, 길이 훤히 보일 것입니다.<br>\t\t\t\t<br><br>\t\t\t\t<br><br>\t\t\t\t<br><a href=\"http://www.fluentin3months.com/\" target=\"_blank\">http://www.fluentin3months.com/</a> 사이트는 어떤 언어를 3개월 만에 습득하는 Extreme 한 방법들을&#160;소개 하고, 실제로 각 언어를 직접 블로거가 배워보는 걸 매주 업데이트 해 보이고 있습니다.<br>\t\t\t\t<br>방법은, 집중적인 연습, 형식의 파괴, 자신에게 맞는 방법 찾기, 3~4주에 한번씩 &#160;형식을 바꿔서 최적화된 학습 방법 찾기... 등입니다.<br>\t\t\t\t<br><br>\t\t\t\t<br><br>\t\t\t\t<br>아마존 킨들<br>\t\t\t\t<br>나는 주로&#160;Arbookfind (<a href=\"http://www.arbookfind.com/\" target=\"_blank\">www.arbookfind.com</a>)&#160;라는 사이트를 이용하는데 무료영어원서 자료 중 관심이 가는 영어원서의 제목을 그대로 퀵 서치(Quick Search)&#160;란에 적어 검색하면 책의 읽기 레벨과 더불어 흥미 레벨,&#160;단어 수,&#160;평점 등을 점검할 수 있어 읽을 책을 선택하는 데 큰 도움이 되고 있다.<br>\t\t\t\t<br><br>\t\t\t\t<br>문장암기<br>\t\t\t\t<br>소리쳐서 읽기<br>\t\t\t\t<br><br>\t\t\t\t<br>성취 목표<br>\t\t\t\t<br>MWC / CES 연사로 서기 2017년<br>\t\t\t\t<br>읽는 책의 절반 영어원서로 읽기<br>\t\t\t\t<br><br>\t\t\t\t<br>- 해외 자료 독해능력 및 비즈니스 스피킹 능력<br>\t\t\t\t<br>- 여행 회화  <br>\t\t\t\t<br>- MBA  <br>\t\t\t\t<br>- 해외거주<br>\t\t\t\t<br>- <a href=\"http://m.gohackers.com/?m=bbs&bid=dataetc&uid=167256\" target=\"_blank\">http://m.gohackers.com/?m=bbs&bid=dataetc&uid=167256</a><br>\t\t\t\t<br>- <a href=\"http://ppss.kr/archives/39884\" target=\"_blank\">http://ppss.kr/archives/39884</a><br>\t\t\t\t<br><br>\t\t\t\t<br>책 - 직장인 생존 영어, 1년 만에 끝낼 수 있다<br>\t\t\t\t<br>OKKY - 영어공부 4년의 노하우를 공개합니다. - <a href=\"https://okky.kr/article/244767\" target=\"_blank\">https://okky.kr/article/244767</a><br>\t\t\t\t<br><br>\t\t\t\t<br>영어 학습 사이트 (검토) <a href=\"http://godyned.com/\" target=\"_blank\">http://godyned.com/</a><br>\t\t\t\t<br><a href=\"http://ppss.kr/archives/39226\" target=\"_blank\">http://ppss.kr/archives/39226</a><br>\t\t\t\t<br>오픈캐스트 숙독<br>\t\t\t\t<br>- <a href=\"http://www.champstudy.com/html/myclass/index.html?iframe_su=1\" target=\"_blank\">http://www.champstudy.com/html/myclass/index.html?iframe_su=1</a><br>\t\t\t\t<br>- <a href=\"https://brunch.co.kr/@jaybee68/15\" target=\"_blank\">https://brunch.co.kr/@jaybee68/15</a><br>\t\t\t\t<br><br>\t\t\t\t<br>- 스피킹 - 스피킹 맥스. 발음 음운 현상 강의<br>\t\t\t\t<br>- 리스닝 - 미드, 멜론 어학<br>\t\t\t\t<br>- 라이팅 - 영어 일기. 쉬운책 필사, writting 사이트나 교재/강의<a href=\"http://www.dailywritingtips.com/\" target=\"_blank\">http://www.dailywritingtips.com/</a> 영작 사이트<br>\t\t\t\t<br><a href=\"http://opencast.naver.com/home/search.nhn?sc.searchKeyword=writing&sc.searchType=castboard_all&sc.searchSort=accuracy\" target=\"_blank\">http://opencast.naver.com/home/search.nhn?sc.searchKeyword=writing&sc.searchType=castboard_all&sc.searchSort=accuracy</a><br>\t\t\t\t<br>- 읽기 - 영문판, 영어 신문 웹사이트, Reading 사이트나 교재/강의<br>\t\t\t\t<br>영어 원서 읽기(App) & 해외 ICT 자료 프린트해서 독해<br>\t\t\t\t<br><br>\t\t\t\t<br>1차적으로는 토플 점수 취득<br>\t\t\t\t<br>궁극적으로는 자유로운 의사소통이 목적이며,<br>\t\t\t\t<br>일단 수 많은 문장을 암기하고 말해보는 것이 가장 중요함.<br>\t\t\t\t<br><br>\t\t\t\t<br>- <a href=\"http://ko.usmlelibrary.com\" target=\"_blank\">http://ko.usmlelibrary.com</a><br>\t\t\t\t<br><br>\t\t\t\t<br>6개월만에 외국어<br>\t\t\t\t<br><a href=\"http://blog.naver.com/cag3dsrs?Redirect=Log&logNo=220193900962\" target=\"_blank\">http://blog.naver.com/cag3dsrs?Redirect=Log&logNo=220193900962</a><br>\t\t\t\t<br><a href=\"http://ppss.kr/archives/34611\" target=\"_blank\">http://ppss.kr/archives/34611</a><br>\t\t\t\t<br><br>\t\t\t\t<br>- 시티익스프로러<br>\t\t\t\t<br>- 영어공부하기 좋은 미드10선 <a href=\"http://www.wikitree.co.kr/main/news_view.php?id=191728&fb=1\" target=\"_blank\">http://www.wikitree.co.kr/main/news_view.php?id=191728&fb=1</a><br>\t\t\t\t<br><br>\t\t\t\t<br>TOFLE<br>\t\t\t\t<br><a href=\"http://www.champstudy.com/bbs/zboard.php?id=notice&no=1&keywd=gohackers_newclasstoefl_0822&logger_kw=gohackers_newclasstoefl_0822&source=logger_kw\"     "content": "ㅇ 영어 공부법<br>\t\t\t\t<br><a href=\"http://www.huffingtonpost.kr/minsik-kim/\" target=\"_blank\">http://www.huffingtonpost.kr/minsik-kim/</a> <br>\t\t\t\t<br><br>\t\t\t\t<br>영어<br>\t\t\t\t<br><a href=\"http://www.huffingtonpost.kr/minsik-kim/\" target=\"_blank\">http://www.huffingtonpost.kr/minsik-kim/</a> <br>\t\t\t\t<br><br>\t\t\t\t<br>\"짧고 쉬운 책 골라 6개월만 도전해보라\"<br>\t\t\t\t<br><br>\t\t\t\t<br>'샬롯츠 웹' '스타일 요소' 등 추천<br>\t\t\t\t<br><br>\t\t\t\t<br>조덕성 박사가 소개한 반복해서 여러번 읽는 것은 '반복독서(Repeated Reading)'라고 부르는데 영어의 감을 극대화시키는 '왕도'라고 볼 수 있다.<br>\t\t\t\t<br><br>\t\t\t\t<br>조박사에 의하면 논픽션이 효과적이고 긴 책보다는 짧은 기사나 책이 좋다. 처음에 5분에 걸쳐 읽는 기사도 2번째에는 1분, 3번째에는 더 빨라지므로 3~4번 반복해서 읽으면 감각이 좋아진다고 한다. 이 학습법은 통계적, 실증적 자료가 뒷받침된 것이다.<br>\t\t\t\t<br><br>\t\t\t\t<br>만약 자녀가 초등학생이면 짧은 소설을 여러번 읽는 습관을 갖는 것도 좋다고 한다. 그런데 일선 교육현장에서는 반론도 있다. 보다 다양한 것에 접하는 것이 좋을 수 있다는 것. 하지만 조박사는 30번을 읽는다고 해도 권장할 만하다고 했다.<br>\t\t\t\t<br><br>\t\t\t\t<br>이 학습법은 9학년이 따라해도 효과를 볼 수 있다. 대신 긴 소설보다는 신문이나 잡지의 기사를 열심히 여러번 읽게 하면 된다고. 조박사는 반복독서로 영어를 잘하는 것은 물론, 말더듬는 것도 고칠 수 있다며 작은 소리로 소리내 읽으면 효과가 더 좋다고 조언했다. 이런 학습법을 대개 6개월 정도 하면 효과를 볼 수 있다. <br>\t\t\t\t<br>- See more at: <a href=\"http://m.koreadaily.com/news/read.asp?art_id=3928764&referer=http%3A%2F%2Fm%2Esearch%2Enaver%2Ecom%2Fsearch%2Enaver%3Fsm%3Dmtb%5Fsug%2Etop%26where%3Dm%26query%3D%25EC%2584%25B1%25EC%259D%25B8%2B%25EC%2588%2598%25ED%2595%2599%25EA%25B3%25B5%25EB%25B6%2580%26qdt%3D0%26acq%3D%25EC%2584%25B1%25EC%259D%25B8%2B%25EC%2588%2598%25ED%2595%2599%26acr%3D1%26url%3Dhttp%253A%252F%252Fwww%2Ekoreadaily%2Ecom%252Fnews%252Fread%2Easp%253Fart%5Fid%253D3928764%26ucs%3DxnL7%252BvZfw4Tu#sthash.sGkzNTP8.dpuf\" target=\"_blank\">http://m.koreadaily.com/news/read.asp?art_id=3928764&referer=http%3A%2F%2Fm%2Esearch%2Enaver%2Ecom%2Fsearch%2Enaver%3Fsm%3Dmtb%5Fsug%2Etop%26where%3Dm%26query%3D%25EC%2584%25B1%25EC%259D%25B8%2B%25EC%2588%2598%25ED%2595%2599%25EA%25B3%25B5%25EB%25B6%2580%26qdt%3D0%26acq%3D%25EC%2584%25B1%25EC%259D%25B8%2B%25EC%2588%2598%25ED%2595%2599%26acr%3D1%26 le.co.kr/url?sa=t&rct=j&q=&esrc=s&source=web&cd=10&cad=rja&uact=8&ved=0ahUKEwjUh7GugN3VAhWEWbwKHds3CNcQtwIIWTAJ&url=https%3A%2F%2Fwww.youtube.com%2Fwatch%3Fv%3DQCk24g1Sd5k&usg=AFQjCNGj3jz9rjhFr2QIVu-62YBlNKHVbg</a><br>\t\t\t<br><br>\t\t\t<br><a href=\"http://blog.naver.com/PostView.nhn?blogId=ever4one&logNo=220520646480\" target=\"_blank\">http://blog.naver.com/PostView.nhn?blogId=ever4one&logNo=220520646480</a><br>\t\t\t<br><br>\t\t\t<br>ㅇ Originals audio book : <a href=\"https://www.google.co.kr/search?q=%EC%98%A4%EB%A6%AC%EC%A7%80%EB%84%90%EC%8A%A4+%EC%98%A4%EB%94%94%EC%98%A4%EB%B6%81&oq=%EC%98%A4%EB%A6%AC%EC%A7%80%EB%84%90%EC%8A%A4+%EC%98%A4%EB%94%94%EC%98%A4%EB%B6%81&aqs=chrome..69i57.3515j0j4&sourceid=chrome&ie=UTF-8\" target=\"_blank\">https://www.google.co.kr/search?q=%EC%98%A4%EB%A6%AC%EC%A7%80%EB%84%90%EC%8A%A4+%EC%98%A4%EB%94%94%EC%98%A4%EB%B6%81&oq=%EC%98%A4%EB%A6%AC%EC%A7%80%EB%84%90%EC%8A%A4+%EC%98%A4%EB%94%94%EC%98%A4%EB%B6%81&aqs=chrome..69i57.3515j0j4&sourceid=chrome&ie=UTF-8</a><br>\t\t\t<br><br>\t\t\t<br>원서 읽는 모임 : <a href=\"http://www.englishow.co.kr/\" target=\"_blank\">http://www.englishow.co.kr/</a><br>\t\t\t<br><br>\t\t\t<br>ㅇ 쉐도잉 <a href=\"http://therightbrain.tistory.com/37\" target=\"_blank\">http://therightbrain.tistory.com/37</a><br>\t\t\t<br>ㅇ 딕테이션 사이트 : <a href=\"http://ilikeen.tistory.com/144\" target=\"_blank\">http://ilikeen.tistory.com/144</a><br>\t\t\t<br><a href=\"http://www.huffingtonpost.kr/minsik-kim/story_b_8579476.html\" target=\"_blank\">http://www.huffingtonpost.kr/minsik-kim/story_b_8579476.html</a><br>\t\t\t<br><br>\t\t\t<br>ㅇ amazon audible : <a href=\"http://warmdeal.com/220428428188\" target=\"_blank\">http://warmdeal.com/220428428188</a><br>\t\t\t<br><br>\t\t\t<br>‘3개월 외국어 정복기’의 저자 베니 루이스에 따르면 외국어 배우기는 어렵지 않다고 한다. 그는 비즈니스 인사이더를 통해 3개월 만에 외국어를 마스터하는 10가지 비법을 공개했다.&#160;<br>\t\t\t<br>1. 큰 소리 내어 말하라. 발음이 부정확하거나 어색할지라도 시작할 때부터 소리 내어 말하는 습관이 중요하다.<br>\t\t\t<br>2. 실용적 문구부터 배워라. ‘화장실 어디?’ 같은 문구는 완벽한 문장이 아닐 지라도 의사소통에는 전혀 문제가 없다.<br>\t\t\t<br>3. 완벽한 문법을 위해 고군분투하지 마라. 다양한 단어와 문구 활용이 더 먼저다.<br>\t\t\t<br>4. 원어민과 영상통화를 하라. 무료 또는 저렴한 원어민과의 회화 수업이 많은 도움이 될 것이다.<br>\t\t\t<br>5. 라디오 방송을 들어라. 배우고자 하는 언어의 라디오 방송을 들어 보는 것도 하나의 방법이다.<br>\t\t\t<br>6. 짧은 자기소개를 연습하라. 1분 남짓의 짧은 자기소개 속의 다양한 문구와 단어 습득에 큰 도움을 준다. <br>\t\t\t<br>7. 포괄적인 수업을 피하라. 초보자에게 꼭 필요한 개인 피드백을 제공하지 않기 때문이다. <br>\t\t\t<br>8. 온라인 외국어 프로그램을 사용하라. 인터넷에서 원어민이 개인 피드백을 제공하는 프로그램이 훨씬 효과적이다.<br>\t\t\t<br>9. 언어 습득과 연습에 전력을 다하라. 하루에 한두 시간 정도만 할애해서 배우는 것은 하루 종일 집중할 때와는 많은 습득 차이를 보이기 때문이다.<br>\t\t\t<br>10. 완벽함을 바라지 마라. 정상을 보고 달리다가는 금방 지치기 마련이다. 언어를 배울 때에는 실수를 두려워해서는 안 된다.<br>\t\t\t<br>루이스에 따르면 가장 큰 문제점은 문법, 철자, 단어 하나하나에 신경 쓰면서 정상에 도달하고자 할 때 생긴다고 한다. “그렇게 일일이 매달리다 보면 초급 단계에서 벗어날 수 없어요,” 라고 루이스는 말한다.<br>\t\t\t<br><br>\t\t\t출처: <<a href=\"http://m.koreaherald.com/view.php?ud=20140318001068\" target=\"_blank\">http://m.koreaherald.com/view.php?ud=20140318001068</a>>",

    "content": "영문 타자연습<br>\t\t\t<br>한컴 말랑말랑 타자 연습 & 게임<br>\t\t\t<br><a href=\"https://typing.malangmalang.com/\" target=\"_blank\">https://typing.malangmalang.com/</a><br>\t\t\t<br><a href=\"https://tadaktadak.co.kr/taja/en_sentence.html\" target=\"_blank\">https://tadaktadak.co.kr/taja/en_sentence.html</a><br>\t\t\t<br><a href=\"https://10fastfingers.com/text-practice/new\" target=\"_blank\">https://10fastfingers.com/text-practice/new</a><br>\t\t\t<br><a href=\"https://www.typing.com/student/tests\" target=\"_blank\">https://www.typing.com/student/tests</a><br>\t\t\t<br><a href=\"https://www.picnbooks.com/pnb/\" target=\"_blank\">https://www.picnbooks.com/pnb/</a><br>\t\t\t<br><a href=\"https://play.typeracer.com//\" target=\"_blank\">https://play.typeracer.com//</a><br>\t\t\t<br><br>\t\t\t<br>게임<br>\t\t\t<br><a href=\"https://www.typinggames.zone/\" target=\"_blank\">https://www.typinggames.zone/</a><br>\t\t\t<br><a href=\"https://www.typing.com/student/games\" target=\"_blank\">https://www.typing.com/student/games</a><br>\t\t\t<br><a href=\"https://www.nitrotype.com/race\" target=\"_blank\">https://www.nitrotype.com/race</a><br>\t\t\t<br><a href=\"https://play.typeracer.com/\" target=\"_blank\">https://play.typeracer.com/</a><br>\t\t\t<br><a href=\"https://www.typerush.com/\" target=\"_blank\">https://www.typerush.com/</a>",
    "w": 400
  }
];

let cards = [];
let moving = null, resizing = null;

function loadBoard() {
  const saved = localStorage.getItem(SAVE_KEY);
  cards = saved ? JSON.parse(saved) : DEFAULT_CARDS.map(c => ({...c}));
  renderCards();
  if (!saved) autoLayout();
}

function autoLayout() {
  const GAP = 14;
  const boardW = document.getElementById('board').offsetWidth;
  const cols = Math.max(1, Math.floor(boardW / 280));
  const colW = (boardW - GAP * (cols - 1)) / cols;
  const colHeights = new Array(cols).fill(0);
  const allCards = document.querySelectorAll('.card');
  const images = document.querySelectorAll('.card img');
  let loaded = 0;
  const total = images.length;

  function place() {
    allCards.forEach((el, i) => {
      const card = cards[i];
      const w = Math.min(card.w || colW, colW);
      let minCol = 0;
      for (let c = 1; c < cols; c++) if (colHeights[c] < colHeights[minCol]) minCol = c;
      card.x = minCol * (colW + GAP);
      card.y = colHeights[minCol];
      card.w = w;
      el.style.left = card.x + 'px';
      el.style.top = card.y + 'px';
      el.style.width = w + 'px';
      colHeights[minCol] = card.y + el.offsetHeight + GAP;
    });
    document.getElementById('board').style.minHeight = Math.max(...colHeights) + 100 + 'px';
    saveBoard();
  }

  if (total === 0) requestAnimationFrame(place);
  else images.forEach(img => {
    if (img.complete) { loaded++; if (loaded >= total) requestAnimationFrame(place); }
    else img.onload = img.onerror = () => { loaded++; if (loaded >= total) requestAnimationFrame(place); };
  });
}

function syncText() {
  document.querySelectorAll('.card').forEach(el => {
    const idx = +el.dataset.idx;
    if (cards[idx]?.type === 'text') {
      const t = el.querySelector('.text');
      if (t) cards[idx].content = t.innerHTML;
    }
  });
}

function saveBoard() {
  syncText();
  localStorage.setItem(SAVE_KEY, JSON.stringify(cards));
  document.getElementById('status').textContent = '저장됨 ' + new Date().toLocaleTimeString();
}

function renderCards() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  cards.forEach((card, i) => {
    const el = document.createElement('div');
    el.className = 'card';
    el.dataset.idx = i;
    if (card.x !== undefined) el.style.left = card.x + 'px';
    if (card.y !== undefined) el.style.top = card.y + 'px';
    if (card.w) el.style.width = card.w + 'px';

    el.addEventListener('mousedown', e => {
      if (e.target.closest('.text, a, .card-btn, .resize-handle, table')) return;
      e.preventDefault();
      moving = { idx: i, startX: e.clientX, startY: e.clientY, origX: card.x || 0, origY: card.y || 0 };
      el.classList.add('moving');
    });

    const actions = document.createElement('div');
    actions.className = 'card-actions';
    const delBtn = document.createElement('button');
    delBtn.className = 'card-btn'; delBtn.textContent = '×';
    delBtn.onclick = e => { e.stopPropagation(); if (confirm('삭제?')) { cards.splice(i, 1); renderCards(); saveBoard(); } };
    actions.appendChild(delBtn);
    el.appendChild(actions);

    if (card.type === 'text') {
      const text = document.createElement('div');
      text.className = 'text';
      text.contentEditable = true;
      text.innerHTML = card.content || '';
      text.addEventListener('blur', () => { card.content = text.innerHTML; saveBoard(); });
      el.appendChild(text);
    } else if (card.type === 'image') {
      const src = card.src.startsWith('http') || card.src.startsWith('data:') ? card.src : IMG_BASE + card.src;
      const img = document.createElement('img');
      img.src = src;
      img.alt = card.alt || '';
      img.loading = 'lazy';
      img.onerror = () => img.style.display = 'none';
      if (card.link) {
        const a = document.createElement('a'); a.href = card.link; a.target = '_blank';
        a.appendChild(img); el.appendChild(a);
      } else { el.appendChild(img); }
      if (card.caption) {
        const cap = document.createElement('div');
        cap.className = 'caption';
        cap.textContent = card.caption;
        el.appendChild(cap);
      }
    } else if (card.type === 'table') {
      const wrapper = document.createElement('div');
      wrapper.style.overflowX = 'auto';
      wrapper.innerHTML = card.html || '';
      el.appendChild(wrapper);
    }

    const rh = document.createElement('div');
    rh.className = 'resize-handle';
    rh.addEventListener('mousedown', e => {
      e.preventDefault(); e.stopPropagation();
      resizing = { idx: i, startX: e.clientX, startW: card.w || el.offsetWidth };
    });
    el.appendChild(rh);
    board.appendChild(el);
  });

  requestAnimationFrame(() => {
    let maxBottom = 0;
    document.querySelectorAll('.card').forEach(el => {
      const b = (parseFloat(el.style.top) || 0) + el.offsetHeight;
      if (b > maxBottom) maxBottom = b;
    });
    board.style.minHeight = (maxBottom + 100) + 'px';
  });
}

document.addEventListener('mousemove', e => {
  if (moving) {
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`);
    if (!el) return;
    const nx = moving.origX + e.clientX - moving.startX;
    const ny = moving.origY + e.clientY - moving.startY;
    el.style.left = nx + 'px';
    el.style.top = ny + 'px';
  }
  if (resizing) {
    const card = cards[resizing.idx];
    card.w = Math.max(100, resizing.startW + e.clientX - resizing.startX);
    const el = document.querySelector(`.card[data-idx="${resizing.idx}"]`);
    if (el) el.style.width = card.w + 'px';
  }
});

document.addEventListener('mouseup', e => {
  if (moving) {
    const card = cards[moving.idx];
    card.x = Math.max(0, moving.origX + e.clientX - moving.startX);
    card.y = Math.max(0, moving.origY + e.clientY - moving.startY);
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`);
    if (el) { el.classList.remove('moving'); }
    moving = null; saveBoard();
  }
  if (resizing) { resizing = null; saveBoard(); }
});

function addTextCard() {
  cards.push({ type: 'text', content: '', x: 50, y: window.scrollY + 100, w: 300 });
  renderCards();
  setTimeout(() => { const els = document.querySelectorAll('.card .text'); els[els.length - 1]?.focus(); }, 100);
}

function addImageCard() {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = 'image/*';
  input.onchange = e => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = () => { cards.push({ type: 'image', src: reader.result, x: 50, y: window.scrollY + 100, w: 240 }); renderCards(); saveBoard(); };
    reader.readAsDataURL(file);
  };
  input.click();
}

function resetLayout() {
  if (!confirm('자동 재배치합니다. 현재 위치가 변경됩니다.')) return;
  cards.forEach(c => { delete c.x; delete c.y; });
  renderCards(); autoLayout();
}

setInterval(saveBoard, 30000);
loadBoard();
</script>
