<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>e-mail</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #1e1e1e;
  color: #e0e0e0;
  font-family: 'Segoe UI', -apple-system, sans-serif;
  font-size: 15px;
  line-height: 1.6;
  padding: 20px 30px 60px;
  overflow-x: hidden;
}
a { color: #6cb0f6; text-decoration: none; }
a:hover { text-decoration: underline; }
.title-bar {
  background: #3a3a5c;
  display: inline-block;
  padding: 6px 16px;
  font-size: 22px;
  font-weight: bold;
  color: #fff;
  margin-bottom: 4px;
}
.date { color: #999; font-size: 13px; margin-bottom: 20px; }
.board { position: relative; }
.card {
  background: #2a2a2a;
  border: 1px solid #3a3a3a;
  border-radius: 8px;
  padding: 12px;
  position: absolute;
  cursor: grab;
  transition: box-shadow 0.15s;
  overflow: hidden;
}
.card:hover { box-shadow: 0 0 0 1px #58a6ff; z-index: 10; }
.card.moving { opacity: 0.8; box-shadow: 0 4px 24px rgba(0,0,0,0.6); z-index: 100; cursor: grabbing; }
.card img { width: 100%; border-radius: 4px; display: block; }
.card .caption { font-size: 12px; color: #888; margin-top: 6px; }
.card .text { outline: none; min-height: 20px; white-space: pre-wrap; word-break: break-word; }
.card .text:focus { background: rgba(255,255,255,0.05); border-radius: 4px; padding: 4px; }
.card .text:empty::before { content: '텍스트 입력...'; color: #555; }
.card table { border-collapse: collapse; width: 100%; font-size: 13px; }
.card table td, .card table th { border: 1px solid #444; padding: 4px 8px; vertical-align: top; }
.card table th { background: #333; color: #ccc; }
.card-actions { position: absolute; top: 4px; right: 4px; display: none; gap: 4px; }
.card:hover .card-actions { display: flex; }
.card-btn { background: #333; border: 1px solid #555; color: #ccc; border-radius: 4px; padding: 2px 6px; font-size: 11px; cursor: pointer; }
.card-btn:hover { background: #444; color: #fff; }
.resize-handle { position: absolute; bottom: 0; right: 0; width: 16px; height: 16px; cursor: se-resize; opacity: 0; }
.card:hover .resize-handle { opacity: 0.6; }
.resize-handle::after { content: ''; position: absolute; bottom: 3px; right: 3px; width: 8px; height: 8px; border-right: 2px solid #666; border-bottom: 2px solid #666; }
.toolbar { position: fixed; bottom: 0; left: 0; right: 0; background: #161b22; border-top: 1px solid #30363d; padding: 8px 20px; display: flex; gap: 12px; align-items: center; z-index: 200; }
.toolbar button { background: #21262d; border: 1px solid #30363d; color: #e0e0e0; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; }
.toolbar button:hover { background: #30363d; }
.toolbar .status { color: #8b949e; font-size: 12px; margin-left: auto; }
.highlight-red { color: #ff6b6b; }
.highlight-blue { color: #6cb0f6; }
</style>
</head>
<body>
<div class="title-bar">e-mail</div>
<div class="date">2018년 8월 19일 일요일</div>
<div class="board" id="board"></div>
<div class="toolbar">
  <button onclick="addTextCard()">+ 텍스트</button>
  <button onclick="addImageCard()">+ 이미지</button>
  <button onclick="saveBoard()">💾 저장</button>
  <button onclick="resetLayout()">↺ 재배치</button>
  <span class="status" id="status">Ready</span>
</div>
<script>
const SAVE_KEY = 'board-e-mail';
const IMG_BASE = '../../attachments/';
const DEFAULT_CARDS = [
  {
    "type": "text",
    "content": "e-mail<br>\t\t<br>\t\t<br>\t<br>\t<br>\t\t<br>\t\t\t<br>[Subject line]<br>\t\t\t<br>메일 내용을 명확하게 명시<br>\t\t\t<br>Ex.) To discuss / Your Performance review / 2011, NPB Analysis / KKK Deal, Sycamore Capital / Prospectus 2010 / Recap of 1/15 Investment Committee Meeting, Assistance needed / Volunteers for training class<br>\t\t\t<br><br>\t\t\t<br>[호칭]<br>\t\t\t<br>맨 처음 보낼 때에는 Dear, Last name (e.g., Mr. Kim, Mr. Collins)<br>\t\t\t<br>Dear All, Dear team,<br>\t\t\t<br><br>\t\t\t<br>구면인 경우 first name (e.g. Pual, Bob)<br>\t\t\t<br><br>\t\t\t<br>[인사말]<br>\t\t\t<br>친하면 \"Hope you had a nice weekend\", \"Hope you things are well with you\"<br>\t\t\t<br><br>\t\t\t<br>[이메일 목적]<br>\t\t\t<br>\t\t\t\t<br>- 질문/재촉/답변<br>\t\t\t<br>\t\t\t<br>Wanted to reach you out to you to inquire about.<br>\t\t\t<br>Wanted to get your thought on.<br>\t\t\t<br>Wanted to follow up with the outstanding documents.<br>\t\t\t<br>Just wanted to clarify some of your concerns.<br>\t\t\t<br><br>\t\t\t<br>\t\t\t\t<br>- 파일 전송<br>\t\t\t<br>\t\t\t<br>Attached you will find ABC file. Please take a look at it and let me know your thoughts.<br>\t\t\t<br><br>\t\t\t<br>[갈무리 멘트]<br>\t\t\t<br><br>\t\t\t<br>친한 관계라면,<br>\t\t\t<br>Hope you had a nice weekend.<br>\t\t\t<br>Hope things are well with you.<br>\t\t\t<br><br>\t\t\t<br>Should you have any questions, feel free to reach out at +82+10+4950<br>\t\t\t<br>9232 or via e-mail.<br>\t\t<br>\t\t<br>\t\t\t<br>\t\t\t\t<br>- ex :&#160;an abbreviation of 'example'&#160;('예시'의 줄임말이다.)<br>\t\t\t\t<br>&#160;<br>\t\t\t\t<br>'e.x' 보다 'Ex.'가&#160;맞는 표현 <br>\t\t\t\t<br><br>\t\t\t\t<br>&#160;<br>\t\t\t\t<br>- e.g. :&#160;&#160;'for the sake of example' = exempli gratia = use this when listing examples of something.&#160;<br>\t\t\t\t<br>&#160;<br>\t\t\t\t<br>&#160; &#160; &#160; &#160; &#160; &#160;('예를 들자면'의 의미이자, 라틴어로 exempli gratia의 약자, 무언가를 예를 들 때 씀)<br>\t\t\t\t<br><br>\t\t\t\t<br>&#160;<br>\t\t\t\t<br>- i.e. :&#160;'id est(= that is)'&#160;('다시 말해', '즉', '바꿔 말하면'의 약자이다.)&#160;<br>\t\t\t\t<br>&#160;<br>\t\t\t\t<br>&#160; &#160; &#160; &#160; &#160;&#160;&#160; &#160;&#160;&#160;Use this if you are restating something. Think of inserting the term \"in other words\" in place of 'i.e.',&#160;<br>\t\t\t\t<br>&#160; &#160; &#160; &#160; &#160; &#160; &#160; if this&#160;makes sens you are using it right.&#160;<br>\t\t\t\t<br>&#160; &#160; &#160; &#160; &#160;('i.e'는 무엇인가를 고쳐 말할 때 씁니다. i.e를 넣을 자리에 'in other words(달리 말하면)'을 넣어서 말해봤을 때, 말이<br>\t\t\t\t<br>&#160; &#160; &#160; &#160; &#160; 되면&#160;맞게 쓴 거임~) 이라고 하네요.&#160;<br>\t\t\t\t<br><br>\t\t\t\t출처: <<a href=\"https://m.blog.naver.com/PostView.nhn?blogId=icecookie_pd&logNo=220749290295&proxyReferer=https%3A%2F%2Fwww.google.co.kr%2F\" target=\"_blank\">https://m.blog.naver.com/PostView.nhn?blogId=icecookie_pd&logNo=220749290295&proxyReferer=https%3A%2F%2Fwww.google.co.kr%2F</a>> <br>\t\t\t\t<br><br>\t\t\t\t<br>(1) 라티어 약어<br>\t\t\t\t<br>I.e. 는 라틴어&#160;id est의 약자로 \"that is\" 라는 의미<br>\t\t\t\t<br>E.g. 는 라틴어&#160;&#160;exempligratia&#160;의 약자로&#160;\"for the sake of example\" 이라는 의미<br>\t\t\t\t<br>(2) 영어 약어<br>\t\t\t\t<br>※ 라틴어 약어는 외우기 어렵기 때문에...<br>\t\t\t\t<br>\"i.e.\"는 \"in essence\", \"in other words\"<br>\t\t\t\t<br>\"e.g.\"는 \"example given\"<br>\t\t\t\t<br>&#160;<br>\t\t\t\t<br>(3) i.e.<br>\t\t\t\t<br>앞 문장을 바꿔말하거나 다른 방식으로 설명하고자 할 때 \"i.e.\"를 사용해라<br>\t\t\t\t<br>The elephant is a pachyderm, i.e., an animal with thick skin and nails resembling hooves.<br>\t\t\t\t<br>I went to the dentist (i.e., hell)<br>\t\t\t\t<br><br>\t\t\t\t<br>\"i.e.\" 뒤에 나오는 문장은 일종의 정의이며&#160; 은유법(metaphor)으로도 사용된다.&#160; \"i.e.\"를 \"in other words\"로 바꿔도 되지만 \"for example\"을 쓰면 의미가 달라지게 된다.<br>\t\t\t\t<br><br>\t\t\t\t<br>(4) e.g.<br>\t\t\t\t<br>한 개 이상의 예제를 나열할 때 \"e.g.\"를 사용해라. \"e.g.\" 앞에는 카테고리 명이 나오고, 뒤에는 그 카테고리에 속하는 것이 온다.<br>\t\t\t\t<br>Buy some vegetables, e.g., carrots.<br>\t\t\t\t<br>I like power metal (e.g., Firewind, Iced Earth, Sonata Arctica).<br>\t\t\t\t<br><br>\t\t\t\t<br>첫문장의 \"carrots\" 은 \"vegetables\"에 속하는 것 중 하나이다. 따라서 일반적인 채소 자체를 설명하는 문장이 아니기에 \"i.e.\"를 쓰는 것은 맞지 않다.<br>\t\t\t\t<br>두번째 문장도 역시 \"power metal\" 에 대한 설명이 아니라 예를 나열하였다.<br>\t\t\t\t<br>만약 \"i.e.\"을 쓰고 싶다면 아래와 같이 쓰면 된다.<br>\t\t\t\t<br>Buy some vegetables, i.e., the edible part of any plant.<br>\t\t\t\t<br>I like power metal, i.e., fast metal with symphonic elements and epic themes<br>\t\t\t\t<br><br>\t\t\t\t<br><br>\t\t\t\t<br>(5) 괄호 또는 콤마(,)를 사용 하는 방법 (앞선 예제들 처럼 사용하면 된다.)<br>\t\t\t\t<br>괄호를 사용할 경우, \"e.g.\" 또는 \"i.e.\" 앞에서 괄호를 열고, 예를 나열하거나 또다른 정의를 설명한 후에 괄호를 닫는다.<br>\t\t\t\t<br>괄호를 쓰든 콤마를 쓰든 상관 없이, \"i.e.\"와 \"e.g.\" 바로 다음에는 콤마를 무조건 찍어야 한다.<br>\t\t\t\t<br><br>\t\t\t\t<br><br>\t\t\t\t<br>☆Tips<br>\t\t\t\t<br>말할 때에는 \"i.e.\", \"e.g.\" 둘 다 사용하지 않는게 낫다. \"i.e.\"를 쓰고 싶을 때는 \"that is\", \"in other words\"를 대신 사용하고, \"e.g.\"를 쓰고 싶을 때는 \"for example\", \"for instance\"를 사용해라.<br>\t\t\t\t<br>글을 쓸 때도 헷갈리면 차라리 쓰지 말고 위의 쉬운 단어를 사용해라.<br>\t\t\t\t<br>\"i.e.\"와 \"e.g.\"를 가장 잘 사용한 예를 볼려면 영화&#160;Get Shorty&#160;(1995년작)에서 Chili Palmer (John Travolta) 와 Ray \"Bones\" Barboni (Dennis Farina) 간의 장면을 보면 된다.<br>\t\t\t\t<br><br>\t\t\t\t출처: <<a href=\"http://bluezery.com/34\" target=\"_blank\">http://bluezery.com/34</a>> <br>\t\t\t\t<br><br>\t\t\t\t<br><br>\t\t\t<br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t출처: <<a href=\"https://m.blog.naver.com/PostView.nhn?blogId=icecookie_pd&logNo=220749290295&proxyReferer=https%3A%2F%2Fwww.google.co.kr%2F\" target=\"_blank\">https://m.blog.naver.com/PostView.nhn?blogId=icecookie_pd&logNo=220749290295&proxyReferer=https%3A%2F%2Fwww.google.co.kr%2F</a>> <br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t출처: <<a href=\"http://bluezery.com/34\" target=\"_blank\">http://bluezery.com/34</a>> <br>\t\t\t<br><br>\t\t\t<br><br>\t\t<br>\t\t<br>\t\t\t<br>kind regards’ ‘cheers’ ‘thanks’&#160;<br>\t\t\t<br><br>\t\t\t출처: <<a href=\"https://weekly.donga.com/List/3/all/11/86779/1\" target=\"_blank\">https://weekly.donga.com/List/3/all/11/86779/1</a>> <br>\t\t\t<br>신문이나 잡지 기사 하나를 정독한 뒤 영어로 요약해보는 것.<br>\t\t\t<br><br>\t\t\t출처: <<a href=\"https://weekly.donga.com/List/3/all/11/86779/1\" target=\"_blank\">https://weekly.donga.com/List/3/all/11/86779/1</a>> <br>\t\t\t<br><br>\t\t\t<br>아래는 카이틀리 씨가 추천한, 영작 공부에 도움이 되는 영국문화원의 웹페이지 자료.<br>\t\t\t<br><br>\t\t\t<br><a href=\"http://www.britishcouncil.org/professionals-lesson-downloads-business-writing-homepage.htm\" target=\"_blank\">http://www.britishcouncil.org/professionals-lesson-downloads-business-writing-homepage.htm</a> 중상위 수준 학생들을 위한 영작 학습 자료. 프린트할 수 있다.<br>\t\t\t<br><br>\t\t\t<br><a href=\"http://www.britishcouncil.org/professionals-work-cv_writing-intro.htm\" target=\"_blank\">http://www.britishcouncil.org/professionals-work-cv_writing-intro.htm</a> 이력서를 쓸 때 참고가 되는 조언들을 제시하는 자료.<br>\t\t\t<br><br>\t\t\t<br><a href=\"http://www.britishcouncil.org/professionals-study-writing-reports-intro.htm\" target=\"_blank\">http://www.britishcouncil.org/professionals-study-writing-reports-intro.htm</a> 영문 보고서 작성에 관련된 글과 듣기 자료.<br>\t\t\t<br><br>\t\t\t출처: <<a href=\"https://weekly.donga.com/List/3/all/11/86779/1\" target=\"_blank\">https://weekly.donga.com/List/3/all/11/86779/1</a>>",
    "w": 400
  }
];

let cards = [];
let moving = null, resizing = null;

function loadBoard() {
  const saved = localStorage.getItem(SAVE_KEY);
  cards = saved ? JSON.parse(saved) : DEFAULT_CARDS.map(c => ({...c}));
  renderCards();
  if (!saved) autoLayout();
}

function autoLayout() {
  const GAP = 14;
  const boardW = document.getElementById('board').offsetWidth;
  const cols = Math.max(1, Math.floor(boardW / 280));
  const colW = (boardW - GAP * (cols - 1)) / cols;
  const colHeights = new Array(cols).fill(0);
  const allCards = document.querySelectorAll('.card');
  const images = document.querySelectorAll('.card img');
  let loaded = 0;
  const total = images.length;

  function place() {
    allCards.forEach((el, i) => {
      const card = cards[i];
      const w = Math.min(card.w || colW, colW);
      let minCol = 0;
      for (let c = 1; c < cols; c++) if (colHeights[c] < colHeights[minCol]) minCol = c;
      card.x = minCol * (colW + GAP);
      card.y = colHeights[minCol];
      card.w = w;
      el.style.left = card.x + 'px';
      el.style.top = card.y + 'px';
      el.style.width = w + 'px';
      colHeights[minCol] = card.y + el.offsetHeight + GAP;
    });
    document.getElementById('board').style.minHeight = Math.max(...colHeights) + 100 + 'px';
    saveBoard();
  }

  if (total === 0) requestAnimationFrame(place);
  else images.forEach(img => {
    if (img.complete) { loaded++; if (loaded >= total) requestAnimationFrame(place); }
    else img.onload = img.onerror = () => { loaded++; if (loaded >= total) requestAnimationFrame(place); };
  });
}

function syncText() {
  document.querySelectorAll('.card').forEach(el => {
    const idx = +el.dataset.idx;
    if (cards[idx]?.type === 'text') {
      const t = el.querySelector('.text');
      if (t) cards[idx].content = t.innerHTML;
    }
  });
}

function saveBoard() {
  syncText();
  localStorage.setItem(SAVE_KEY, JSON.stringify(cards));
  document.getElementById('status').textContent = '저장됨 ' + new Date().toLocaleTimeString();
}

function renderCards() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  cards.forEach((card, i) => {
    const el = document.createElement('div');
    el.className = 'card';
    el.dataset.idx = i;
    if (card.x !== undefined) el.style.left = card.x + 'px';
    if (card.y !== undefined) el.style.top = card.y + 'px';
    if (card.w) el.style.width = card.w + 'px';

    el.addEventListener('mousedown', e => {
      if (e.target.closest('.text, a, .card-btn, .resize-handle, table')) return;
      e.preventDefault();
      moving = { idx: i, startX: e.clientX, startY: e.clientY, origX: card.x || 0, origY: card.y || 0 };
      el.classList.add('moving');
    });

    const actions = document.createElement('div');
    actions.className = 'card-actions';
    const delBtn = document.createElement('button');
    delBtn.className = 'card-btn'; delBtn.textContent = '×';
    delBtn.onclick = e => { e.stopPropagation(); if (confirm('삭제?')) { cards.splice(i, 1); renderCards(); saveBoard(); } };
    actions.appendChild(delBtn);
    el.appendChild(actions);

    if (card.type === 'text') {
      const text = document.createElement('div');
      text.className = 'text';
      text.contentEditable = true;
      text.innerHTML = card.content || '';
      text.addEventListener('blur', () => { card.content = text.innerHTML; saveBoard(); });
      el.appendChild(text);
    } else if (card.type === 'image') {
      const src = card.src.startsWith('http') || card.src.startsWith('data:') ? card.src : IMG_BASE + card.src;
      const img = document.createElement('img');
      img.src = src;
      img.alt = card.alt || '';
      img.loading = 'lazy';
      img.onerror = () => img.style.display = 'none';
      if (card.link) {
        const a = document.createElement('a'); a.href = card.link; a.target = '_blank';
        a.appendChild(img); el.appendChild(a);
      } else { el.appendChild(img); }
      if (card.caption) {
        const cap = document.createElement('div');
        cap.className = 'caption';
        cap.textContent = card.caption;
        el.appendChild(cap);
      }
    } else if (card.type === 'table') {
      const wrapper = document.createElement('div');
      wrapper.style.overflowX = 'auto';
      wrapper.innerHTML = card.html || '';
      el.appendChild(wrapper);
    }

    const rh = document.createElement('div');
    rh.className = 'resize-handle';
    rh.addEventListener('mousedown', e => {
      e.preventDefault(); e.stopPropagation();
      resizing = { idx: i, startX: e.clientX, startW: card.w || el.offsetWidth };
    });
    el.appendChild(rh);
    board.appendChild(el);
  });

  requestAnimationFrame(() => {
    let maxBottom = 0;
    document.querySelectorAll('.card').forEach(el => {
      const b = (parseFloat(el.style.top) || 0) + el.offsetHeight;
      if (b > maxBottom) maxBottom = b;
    });
    board.style.minHeight = (maxBottom + 100) + 'px';
  });
}

document.addEventListener('mousemove', e => {
  if (moving) {
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`);
    if (!el) return;
    const nx = moving.origX + e.clientX - moving.startX;
    const ny = moving.origY + e.clientY - moving.startY;
    el.style.left = nx + 'px';
    el.style.top = ny + 'px';
  }
  if (resizing) {
    const card = cards[resizing.idx];
    card.w = Math.max(100, resizing.startW + e.clientX - resizing.startX);
    const el = document.querySelector(`.card[data-idx="${resizing.idx}"]`);
    if (el) el.style.width = card.w + 'px';
  }
});

document.addEventListener('mouseup', e => {
  if (moving) {
    const card = cards[moving.idx];
    card.x = Math.max(0, moving.origX + e.clientX - moving.startX);
    card.y = Math.max(0, moving.origY + e.clientY - moving.startY);
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`);
    if (el) { el.classList.remove('moving'); }
    moving = null; saveBoard();
  }
  if (resizing) { resizing = null; saveBoard(); }
});

function addTextCard() {
  cards.push({ type: 'text', content: '', x: 50, y: window.scrollY + 100, w: 300 });
  renderCards();
  setTimeout(() => { const els = document.querySelectorAll('.card .text'); els[els.length - 1]?.focus(); }, 100);
}

function addImageCard() {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = 'image/*';
  input.onchange = e => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = () => { cards.push({ type: 'image', src: reader.result, x: 50, y: window.scrollY + 100, w: 240 }); renderCards(); saveBoard(); };
    reader.readAsDataURL(file);
  };
  input.click();
}

function resetLayout() {
  if (!confirm('자동 재배치합니다. 현재 위치가 변경됩니다.')) return;
  cards.forEach(c => { delete c.x; delete c.y; });
  renderCards(); autoLayout();
}

setInterval(saveBoard, 30000);
loadBoard();
</script>
</body>
</html>
