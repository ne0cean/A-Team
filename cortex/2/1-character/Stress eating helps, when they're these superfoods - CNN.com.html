    "type": "text",
    "content": "Story highlights<br>\t\t\t\t<br>- What you eat may actually help relieve your tension<br>\t\t\t\t<br>- Love chocolate? It could help with your stress levels<br>\t\t\t\t<br>(CNN)When work deadlines begin piling up and your social calendar is booked, the last thing you want to hear is to steer clear of the vending machine. Who has time for healthy eating? But when it comes to combating stress levels, what you eat may actually help relieve your tension. Indeed, some foods may help stabilize blood sugar or, better yet, your emotional response. Here, 12 foods to reach for when you've just about had enough.<br>\t\t\t\t<br>Green leafy vegetables<br>\t\t\t\t<br>It's tempting to reach for a cheeseburger when stressed, but go green at lunch instead. \"Green leafy vegetables like spinach contain folate, which produces dopamine, a pleasure-inducing brain chemical, helping you keep calm,\" says Heather Mangieri, RDN, a spokesperson for the Academy of Nutrition and Dietetics. A 2012 study in the Journal of Affective Disorders of 2,800 middle-aged and elderly people and found those who consumed the most folate had a lower risk of depression symptoms than those who took in the least. And, a 2013 study from the University of Otago found that college students tended to feel calmer, happier, and more energetic on days they ate more fruits and veggies. It can be hard to tell which came first—upbeat thoughts or healthy eating—but the researchers found that healthy eating seemed to predict a positive mood the next day.<br>\t\t\t\t<br><a href=\"http://www.health.com/health/gallery/0,,20675570,00.html?xid=cnn-stress-040315\" target=\"_blank\">RELATED: 13 healthy kale recipes</a><br>\t\t\t\t<br>Turkey breast<br>\t\t\t\t<br>You've probably heard that the tryptophan in turkey is to blame for that food coma on Thanksgiving. The amino acid, found in protein-containing foods, helps produce serotonin, \"the chemical that regulates hunger and feelings of happiness and well-being,\" Mangieri says. On its own, tryptophan may have a calming effect. In a 2006 study published in the Journal of Psychiatry Neuroscience, men and women who were argumentative (based on personality tests) took either tryptophan supplements or a placebo for 15 days. Those who took tryptophan were perceived as more agreeable by their study partners at the end of the two weeks compared with when they didn't take it. (The study was funded by the Canadian Institutes of Health Research.) Other foods high in tryptophan include nuts, seeds, tofu, fish, lentils, oats, beans, and eggs.<br>\t\t\t\t<br>Oatmeal<br>\t\t\t\t<br>If you're already a carb lover, it's likely that nothing can come between you and a doughnut when stress hits. First rule of thumb: Don't completely deny the craving. According to MIT research, carbohydrates can help the brain make serotonin, the same substance regulated by antidepressants. But instead of reaching for that sugary bear claw, go for complex carbs. \"Stress can cause your blood sugar to rise, Mangieri says, \"so a complex carb like oatmeal won't contribute to your already potential spike in blood glucose.\"<br>\t\t\t\t<br><a href=\"http://www.health.com/health/gallery/0,,20675570,00.html?xid=cnn-stress-040315\" target=\"_blank\">RELATED: 18 health benefits of whole grains</a> <br>\t\t\t\t<br>Yogurt<br>\t\t\t\t<br>As bizarre as it may sound, the bacteria in your gut might be contributing to stress. Research has shown that the brain signals to the gut, which is why stress can inflame gastrointestinal symptoms; communication may flow the other way too, from gut to brain. A 2013 UCLA study among 36 healthy women revealed that consuming probiotics in yogurt reduced brain activity in areas that handle emotion, including stress compared to people who consumed yogurt without probiotics or no yogurt at all. This study was small so more research is needed to confirm the results—but considering yogurt is full of calcium and protein in addition to probiotics, you really can't go wrong by adding more of it to your diet.<br>\t\t\t\t<br>Salmon<br>\t\t\t\t<br>When you're stressed, it can ratchet up anxiety hormones, such as adrenaline and cortisol. \"The omega-3 fatty acids in salmon haveanti-inflammatory properties that may help counteract the negative effects of stress hormones,\" says Lisa Cimperman, RD, of the University Hospitals Case Medical Center and a spokesperson for the Academy of Nutrition and Dietetics. In a study funded by the National Institutes of Health, Oregon State University medical students who took omega-3 supplements had a 20% reduction in anxiety compared to the group given placebo pills. One 3-ounce serving of cooked wild salmon can have more than 2,000 milligrams of omega-3s, double the daily intake recommended by the American Heart Association for people with heart disease.<br>\t\t\t\t<br>Blueberries<br>\t\t\t\t<br>\"When you're stressed, there's a battle being fought inside you,\" Mangieri says. \"The antioxidants and phytonutrients found in berries fight in your defense, helping improve your body's response to stress and fight stress-related free radicals.\" Research has also shown that blueberry eaters experience a boost in natural killer cells, \"a type of white blood cell that plays a vital role in immunity, critical for countering stress,\" says Cynthia Sass, MPH, RD, Health's contributing nutrition editor.<br>\t\t\t\t<br>Pistachios<br>\t\t\t\t<br>When you have an ongoing loop of negative thoughts playing in your mind, doing something repetitive with your hands may help silence your inner monologue. Think knitting or kneading bread—or even shelling nuts like pistachios or peanuts. The rhythmic moves will help you relax. Plus, the added step of cracking open a shell slows down your eating, making pistachios a diet-friendly snack. What's more, pistachios have heart-health benefits. \"Eating pistachios may reduce acute stress by lowering blood pressure and heart rate,\" Mangieri says. \"The nuts contain key phytonutrients that may provide antioxidant support for cardiovascular health.\"<br>\t\t\t\t<br>Dark chocolate<br>\t\t\t\t<br>Calling all chocoholics: a regular healthy indulgence (just a bite, not a whole bar!) of dark chocolate might have the power to regulate your stress levels. \"Research has shown that it can reduce your stress hormones, including cortisol,\" Sass says. \"Also, the antioxidants in cocoa trigger the walls of your blood vessels to relax, lowering blood pressure and improving circulation. And finally, dark chocolate contains unique natural substances that create a sense of euphoria similar to the feeling of being in love!\" Go for varieties that contain at least 70% cocoa.<br>\t\t\t\t<br>Milk<br>\t\t\t\t<br>Fortified milk is an excellent source of vitamin D, a nutrient that might boost happiness. A 50-year-long study by London's UCL Institute of Child Health found an association between reduced levels of vitamin D and an increased risk of panic and depression among 5,966 men and women. People who had sufficient vitamin D levels had a reduced risk of panic disorders compared to subjects with the lowest levels of vitamin D. Other foods high in vitamin D include salmon, egg yolks, and fortified cereal.<br>\t\t\t\t<br><a href=\"http://www.health.com/health/gallery/0,,20504538,00.html?xid=cnn-stress-040315\" target=\"_blank\">RELATED: 12 ways to get your daily Vitamin D</a> <br>\t\t\t\t<br>Seeds<br>\t\t\t\t<br>Flaxseed, pumpkin seeds, and sunflower seeds are all great sources of magnesium (as are leafy greens, yogurt, nuts, and fish). Loading up on the mineral may help regulate emotions. \"Magnesium has been shown to help alleviate depression, fatigue, and irritability,\" Sass says. \"Bonus: When you're feeling especially irritable during that time of the month, the mineral also helps to fight PMS symptoms, including cramps and water retention.\"<br>\t\t\t\t<br>Avocado<br>\t\t\t\t<br>You can't just reach for slice after slice of avocado toast during crunch time if you don't want to gain weight, but this superfruit might help shut down stress-eating by filling your belly and making you feel more satisfied. In a 2014 study by Loma Linda University (which, full disclosure, was sponsored by the Hass Avocado Board), researchers had participants add half an avocado to their lunches, which reduced their desire to eat more by 40% for the three hours following the midday meal. That full feeling will make you less inclined to reach for unhealthy snacks when stress kicks in.<br>\t\t\t\t<br><a href=\"http://www.health.com/health/gallery/0,,20395687,00.html?xid=cnn-stress-040315\" target=\"_blank\">RELATED: 8 avocado recipes (besides guacamole)</a><br>\t\t\t\t<br>Cashews<br>\t\t\t\t<br>One ounce of the buttery nut packs 11% of the daily recommended value of zinc, an essential mineral that may help reduce anxiety. When researchers gave zinc supplements to people who were diagnosed with both anxiety symptoms (irritability, lack of ability to concentrate) and deficient zinc levels over a course of eight weeks, the patients saw a 31% decrease in anxiety, according to Nutrition and Metabolic Insights. This is likely because zinc affects the levels of a nerve chemical that influences mood. If you're already getting enough zinc, then it may not help your mood to chow down on cashews (or other zinc-rich foods like oysters, beef, chicken, and yogurt). But, cashews are also rich in omega-3s and protein, so they're a smart snack no matter what.<br>\t\t\t\t<br>This article originally appeared on <a href=\"http://www.health.com/health/gallery/0,,20909426,00.html\" target=\"_blank\">Health.com</a>.",

let cards = [];
let moving = null, resizing = null;

function loadBoard() {
  const saved = localStorage.getItem(SAVE_KEY);
  cards = saved ? JSON.parse(saved) : DEFAULT_CARDS.map(c => ({...c}));
  renderCards();
  if (!saved) autoLayout();
}

function autoLayout() {
  const GAP = 14;
  const boardW = document.getElementById('board').offsetWidth;
  const cols = Math.max(1, Math.floor(boardW / 280));
  const colW = (boardW - GAP * (cols - 1)) / cols;
  const colHeights = new Array(cols).fill(0);
  const allCards = document.querySelectorAll('.card');
  const images = document.querySelectorAll('.card img');
  let loaded = 0;
  const total = images.length;

  function place() {
    allCards.forEach((el, i) => {
      const card = cards[i];
      const w = Math.min(card.w || colW, colW);
      let minCol = 0;
      for (let c = 1; c < cols; c++) if (colHeights[c] < colHeights[minCol]) minCol = c;
      card.x = minCol * (colW + GAP);
      card.y = colHeights[minCol];
      card.w = w;
      el.style.left = card.x + 'px';
      el.style.top = card.y + 'px';
      el.style.width = w + 'px';
      colHeights[minCol] = card.y + el.offsetHeight + GAP;
    });
    document.getElementById('board').style.minHeight = Math.max(...colHeights) + 100 + 'px';
    saveBoard();
  }

  if (total === 0) requestAnimationFrame(place);
  else images.forEach(img => {
    if (img.complete) { loaded++; if (loaded >= total) requestAnimationFrame(place); }
    else img.onload = img.onerror = () => { loaded++; if (loaded >= total) requestAnimationFrame(place); };
  });
}

function syncText() {
  document.querySelectorAll('.card').forEach(el => {
    const idx = +el.dataset.idx;
    if (cards[idx]?.type === 'text') {
      const t = el.querySelector('.text');
      if (t) cards[idx].content = t.innerHTML;
    }
  });
}

function saveBoard() {
  syncText();
  localStorage.setItem(SAVE_KEY, JSON.stringify(cards));
  document.getElementById('status').textContent = '저장됨 ' + new Date().toLocaleTimeString();
}

function renderCards() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  cards.forEach((card, i) => {
    const el = document.createElement('div');
    el.className = 'card';
    el.dataset.idx = i;
    if (card.x !== undefined) el.style.left = card.x + 'px';
    if (card.y !== undefined) el.style.top = card.y + 'px';
    if (card.w) el.style.width = card.w + 'px';

    el.addEventListener('mousedown', e => {
      if (e.target.closest('.text, a, .card-btn, .resize-handle, table')) return;
      e.preventDefault();
      moving = { idx: i, startX: e.clientX, startY: e.clientY, origX: card.x || 0, origY: card.y || 0 };
      el.classList.add('moving');
    });

    const actions = document.createElement('div');
    actions.className = 'card-actions';
    const delBtn = document.createElement('button');
    delBtn.className = 'card-btn'; delBtn.textContent = '×';
    delBtn.onclick = e => { e.stopPropagation(); if (confirm('삭제?')) { cards.splice(i, 1); renderCards(); saveBoard(); } };
    actions.appendChild(delBtn);
    el.appendChild(actions);

    if (card.type === 'text') {
      const text = document.createElement('div');
      text.className = 'text';
      text.contentEditable = true;
      text.innerHTML = card.content || '';
      text.addEventListener('blur', () => { card.content = text.innerHTML; saveBoard(); });
      el.appendChild(text);
    } else if (card.type === 'image') {
      const src = card.src.startsWith('http') || card.src.startsWith('data:') ? card.src : IMG_BASE + card.src;
      const img = document.createElement('img');
      img.src = src;
      img.alt = card.alt || '';
      img.loading = 'lazy';
      img.onerror = () => img.style.display = 'none';
      if (card.link) {
        const a = document.createElement('a'); a.href = card.link; a.target = '_blank';
        a.appendChild(img); el.appendChild(a);
      } else { el.appendChild(img); }
      if (card.caption) {
        const cap = document.createElement('div');
        cap.className = 'caption';
        cap.textContent = card.caption;
        el.appendChild(cap);
      }
    } else if (card.type === 'table') {
      const wrapper = document.createElement('div');
      wrapper.style.overflowX = 'auto';
      wrapper.innerHTML = card.html || '';
      el.appendChild(wrapper);
    }

    const rh = document.createElement('div');
    rh.className = 'resize-handle';
    rh.addEventListener('mousedown', e => {
      e.preventDefault(); e.stopPropagation();
      resizing = { idx: i, startX: e.clientX, startW: card.w || el.offsetWidth };
    });
    el.appendChild(rh);
    board.appendChild(el);
  });

  requestAnimationFrame(() => {
    let maxBottom = 0;
    document.querySelectorAll('.card').forEach(el => {
      const b = (parseFloat(el.style.top) || 0) + el.offsetHeight;
      if (b > maxBottom) maxBottom = b;
    });
    board.style.minHeight = (maxBottom + 100) + 'px';
  });
}

document.addEventListener('mousemove', e => {
  if (moving) {
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`);
    if (!el) return;
    const nx = moving.origX + e.clientX - moving.startX;
    const ny = moving.origY + e.clientY - moving.startY;
    el.style.left = nx + 'px';
    el.style.top = ny + 'px';
  }
  if (resizing) {
    const card = cards[resizing.idx];
    card.w = Math.max(100, resizing.startW + e.clientX - resizing.startX);
    const el = document.querySelector(`.card[data-idx="${resizing.idx}"]`);
    if (el) el.style.width = card.w + 'px';
  }
});

document.addEventListener('mouseup', e => {
  if (moving) {
    const card = cards[moving.idx];
    card.x = Math.max(0, moving.origX + e.clientX - moving.startX);
    card.y = Math.max(0, moving.origY + e.clientY - moving.startY);
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`);
    if (el) { el.classList.remove('moving'); }
    moving = null; saveBoard();
  }
  if (resizing) { resizing = null; saveBoard(); }
});

function addTextCard() {
  cards.push({ type: 'text', content: '', x: 50, y: window.scrollY + 100, w: 300 });
  renderCards();
  setTimeout(() => { const els = document.querySelectorAll('.card .text'); els[els.length - 1]?.focus(); }, 100);
}

function addImageCard() {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = 'image/*';
  input.onchange = e => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = () => { cards.push({ type: 'image', src: reader.result, x: 50, y: window.scrollY + 100, w: 240 }); renderCards(); saveBoard(); };
    reader.readAsDataURL(file);
  };
  input.click();
}

function resetLayout() {
  if (!confirm('자동 재배치합니다. 현재 위치가 변경됩니다.')) return;
  cards.forEach(c => { delete c.x; delete c.y; });
  renderCards(); autoLayout();
}

setInterval(saveBoard, 30000);
loadBoard();
</script>
