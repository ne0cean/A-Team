<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Valuation</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #1e1e1e;
  color: #e0e0e0;
  font-family: 'Segoe UI', -apple-system, sans-serif;
  font-size: 15px;
  line-height: 1.6;
  padding: 20px 30px 60px;
  overflow-x: hidden;
}
a { color: #6cb0f6; text-decoration: none; }
a:hover { text-decoration: underline; }
.title-bar {
  background: #3a3a5c;
  display: inline-block;
  padding: 6px 16px;
  font-size: 22px;
  font-weight: bold;
  color: #fff;
  margin-bottom: 4px;
}
.date { color: #999; font-size: 13px; margin-bottom: 20px; }
.board { position: relative; }
.card {
  background: #2a2a2a;
  border: 1px solid #3a3a3a;
  border-radius: 8px;
  padding: 12px;
  position: absolute;
  cursor: grab;
  transition: box-shadow 0.15s;
  overflow: hidden;
}
.card:hover { box-shadow: 0 0 0 1px #58a6ff; z-index: 10; }
.card.moving { opacity: 0.8; box-shadow: 0 4px 24px rgba(0,0,0,0.6); z-index: 100; cursor: grabbing; }
.card img { width: 100%; border-radius: 4px; display: block; }
.card .caption { font-size: 12px; color: #888; margin-top: 6px; }
.card .text { outline: none; min-height: 20px; white-space: pre-wrap; word-break: break-word; }
.card .text:focus { background: rgba(255,255,255,0.05); border-radius: 4px; padding: 4px; }
.card .text:empty::before { content: '텍스트 입력...'; color: #555; }
.card table { border-collapse: collapse; width: 100%; font-size: 13px; }
.card table td, .card table th { border: 1px solid #444; padding: 4px 8px; vertical-align: top; }
.card table th { background: #333; color: #ccc; }
.card-actions { position: absolute; top: 4px; right: 4px; display: none; gap: 4px; }
.card:hover .card-actions { display: flex; }
.card-btn { background: #333; border: 1px solid #555; color: #ccc; border-radius: 4px; padding: 2px 6px; font-size: 11px; cursor: pointer; }
.card-btn:hover { background: #444; color: #fff; }
.resize-handle { position: absolute; bottom: 0; right: 0; width: 16px; height: 16px; cursor: se-resize; opacity: 0; }
.card:hover .resize-handle { opacity: 0.6; }
.resize-handle::after { content: ''; position: absolute; bottom: 3px; right: 3px; width: 8px; height: 8px; border-right: 2px solid #666; border-bottom: 2px solid #666; }
.toolbar { position: fixed; bottom: 0; left: 0; right: 0; background: #161b22; border-top: 1px solid #30363d; padding: 8px 20px; display: flex; gap: 12px; align-items: center; z-index: 200; }
.toolbar button { background: #21262d; border: 1px solid #30363d; color: #e0e0e0; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; }
.toolbar button:hover { background: #30363d; }
.toolbar .status { color: #8b949e; font-size: 12px; margin-left: auto; }
.highlight-red { color: #ff6b6b; }
.highlight-blue { color: #6cb0f6; }
</style>
</head>
<body>
<div class="title-bar">Valuation</div>
<div class="date">Invalid Date</div>
<div class="board" id="board"></div>
<div class="toolbar">
  <button onclick="addTextCard()">+ 텍스트</button>
  <button onclick="addImageCard()">+ 이미지</button>
  <button onclick="saveBoard()">💾 저장</button>
  <button onclick="resetLayout()">↺ 재배치</button>
  <span class="status" id="status">Ready</span>
</div>
<script>
const SAVE_KEY = 'board-Valuation';
const IMG_BASE = '../../attachments/';
const DEFAULT_CARDS = [
  {
    "type": "text",
    "content": "Valuation<br>\t\t<br>\t\t<br>\t<br>\t<br>\t\t<br>\t\t\t<br>기업가치<br>\t\t\t<br>1/ 본질가치<br>\t\t\t<br>ㅇ 순자산가치 = 자산 - 부채<br>\t\t\t<br>ㅇ 순손익가치 = 당기순이익 X PER<br>\t\t\t<br>2/ 시장가치<br>\t\t\t<br>ㅇ 시가총액<br>\t\t\t<br>\t\t\t\t<br>\t\t\t\t\t구분<br>\t\t\t\t\t평가 모델<br>\t\t\t\t\t설명<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>\t\t\t\t<br>\t\t\t\t<br>\t\t\t\t\tEnterprise Multiple<br>\t\t\t\t\tEV/EBITDA Multiple￼(or EV/EBIT)<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>\t\t\t\t\t유사회사의 기업가치와 EBITDA(or EBIT) 배수로 Target의 기업가치 추정<br>\t\t\t\t<br>\t\t\t\t<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>\t\t\t\t\tEV/Revenue<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>\t\t\t\t\tPeer의 기업가치와 매출 배수를 통해 Target 회사의 기업가치 추정<br>\t\t\t\t<br>\t\t\t\t<br>\t\t\t\t\tEquity Multiple<br>\t\t\t\t\t<br>EPS<br>\t\t\t\t\t<br>Earnings  Per Share <br>\t\t\t\t\t<br>\t\t\t\t\t주당순이익<br>\t\t\t\t\t당기순이익/총발행주식수<br>\t\t\t\t\t<br>재무실적평가 일반 지표<br>\t\t\t\t\t<br>EPS하락 시 주가도 하락할 가능성이 높다<br>\t\t\t\t\t<br>\t\t\t\t<br>\t\t\t\t<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>\t\t\t\t\t<br>PER<br>\t\t\t\t\t<br>Price-to-Earnings Ratio<br>\t\t\t\t\t<br>\t\t\t\t\t주가수익비율<br>\t\t\t\t\t<br>현재 주가/EPS(LTM)<br>\t\t\t\t\t<br>=Market Cap./NI<br>\t\t\t\t\t<br>*EPS=당기순이익/발행주식총수<br>\t\t\t\t\t<br>\t\t\t\t\t<br>NI나 영업이익에 PER를 곱해서 수익가치를 구한다.<br>\t\t\t\t\t<br>유사회사의 주가와 주당순이익의 배수를 적용<br>\t\t\t\t\t<br>\t\t\t\t<br>\t\t\t\t<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>\t\t\t\t\t<br>PSR<br>\t\t\t\t\t<br>Price Sales Ratio<br>\t\t\t\t\t<br>\t\t\t\t\t주가매출비율<br>\t\t\t\t\t<br>주가/주당매출액<br>\t\t\t\t\t<br>=Market Cap./Revenue<br>\t\t\t\t\t<br>\t\t\t\t\t유사회사의 주가와 주당매출액의 배수를 적용 <br>\t\t\t\t<br>\t\t\t\t<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>\t\t\t\t\t<br>PBR<br>\t\t\t\t\t<br>Price to Book Value Ratio<br>\t\t\t\t\t<br>\t\t\t\t\tPBR주가순자산배수<br>\t\t\t\t\t= 시가총액/순자산 = 시가총액/(자산-부채)<br>\t\t\t\t\t<br>유사회사의 주가와 주당순자산 배수를 적용하여 주가(Equity Value) 추정<br>\t\t\t\t\t<br>시가총액이 순자산 가치보다 낮은, 안전마진을 가진 기업인지를 보여준다.<br>\t\t\t\t\t<br>\t\t\t\t<br>\t\t\t\t<br>\t\t\t\t\t<br>Transaction<br>\t\t\t\t\t<br>Multiple<br>\t\t\t\t\t<br>\t\t\t\t\t거래사례가액 배수법<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>\t\t\t\t\tPeer의 M&A 거래대금을 기초로 선정한 평가배수로서, 통상적으로 경영권이전 거래(Buy-out)에서는 거래대금에 경영권 프리미엄이 포함되어있다고 본다.<br>\t\t\t\t<br>\t\t\t\t<br>\t\t\t\t\t기타<br>\t\t\t\t\tMAU, ARPU, RPB(Revenue Per Box)등의 산업별 경쟁지표<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>\t\t\t\t\t산업별 핵심경쟁요소에 따른 가치 비교를 통해 대상회사의 가치를 추정<br>\t\t\t\t<br>\t\t\t<br>\t\t\t<br> <br>\t\t\t<br><br>\t\t\t<br>EV/Rev.<br>\t\t\t<br>EV/EBITDA=(시가총액+Net debt)/EBITDA<br>\t\t\t<br>회사의 가격(시총)=(EBITDA x X배) - Net debt. <br>\t\t\t<br>기업가치가 영업활동에서 얻은 이익의 몇 배인가를 나타내며, 주주지분과 채권자 지분을 모두 인수 했을 때, 영업현금흐름으로 몇 년 만에 원금을 화수 할 수 있는지를 나타낸다. 낮을 수록 저평가 되어있음을 의미.<br>\t\t\t<br><br>\t\t\t<br>Discounted Cash Flow(DCF, 현금흐름할인법)=미래 현금흐름의 현재가치-유이자 부채<br>\t\t\t<br>Valuation을 높이려면 ①미래의 현금흐름을 늘리거나 ②유이자 부채 상환<br>\t\t\t<br>이자율Interest rate<br>\t\t\t<br>차입Borrowing<br>\t\t\t<br>투자Investing/대출lending<br>\t\t\t<br>1/ 현금 유입과 유출을 보여주는 Timeline 작성<br>\t\t\t<br>2/ 현금 흐름에 적용할 이자율(할인율) 선택<br>\t\t\t<br>목표 이익률(Hurdle rate) or 자본 비용(Cost of capital)<br>\t\t\t<br>3/ 각 시점의 현금흐름을 비교 가능한 가치(현재가치)로 변환하고 이를 합산<br>\t\t\t<br>물가상승, 세금, 감가상각 관련 감세효과<br>\t\t\t<br><br>\t\t\t<br>ㅇ 성장지표: 매출액, 수익, 주당순이익 등의 연간 증가분<br>\t\t\t<br>ㅇ Economic Value Added(EVA, 경제적 부가가치) : 자본비용까지 고려한 회사의 수익성<br>\t\t\t<br>ㅇ 생산성 지표 : 일인당 매출액, 일인당 순이익 매출 및 이익에 노동 요인을 반영한 두 지표로, 추세를 통해 운영 효율성의 변화를 살펴볼 수 있다.<br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br>\t\t\t\t<br>\t\t\t\t\t사업가치<br>\t\t\t\t\t<br>잉여현금흐름<br>\t\t\t\t\t<br>FCF<br>\t\t\t\t\t<br>\t\t\t\t\t<br>세후영업이익<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>\t\t\t\t\t영업이익-세금<br>\t\t\t\t<br>\t\t\t\t<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>\t\t\t\t\t+감가상각비<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>\t\t\t\t<br>\t\t\t\t<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>\t\t\t\t\t-운전자본증가액<br>\t\t\t\t\t<br>매출채권<br>\t\t\t\t\t<br>재고자산<br>\t\t\t\t\t<br>매입채무<br>\t\t\t\t\t<br>\t\t\t\t<br>\t\t\t\t<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>\t\t\t\t\t-설비투자<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>\t\t\t\t<br>\t\t\t\t<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>\t\t\t\t<br>\t\t\t\t<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>\t\t\t\t\t자본비용<br>\t\t\t\t\tDebt Finance<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>\t\t\t\t<br>\t\t\t\t<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>\t\t\t\t\tEquity Finance<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>\t\t\t\t<br>\t\t\t<br>\t\t<br>\t\t<br>\t\t\t<br>주당순자산=(자산-부채)/발행주식 = 순자산/발행주식 수<br>\t\t\t<br><br>\t\t\t<br>현물출자와 영업/자산양수도의 차이는?<br>\t\t\t<br>코스닥과 코넥스?",
    "w": 400
  }
];

let cards = [];
let moving = null, resizing = null;

function loadBoard() {
  const saved = localStorage.getItem(SAVE_KEY);
  cards = saved ? JSON.parse(saved) : DEFAULT_CARDS.map(c => ({...c}));
  renderCards();
  if (!saved) autoLayout();
}

function autoLayout() {
  const GAP = 14;
  const boardW = document.getElementById('board').offsetWidth;
  const cols = Math.max(1, Math.floor(boardW / 280));
  const colW = (boardW - GAP * (cols - 1)) / cols;
  const colHeights = new Array(cols).fill(0);
  const allCards = document.querySelectorAll('.card');
  const images = document.querySelectorAll('.card img');
  let loaded = 0;
  const total = images.length;

  function place() {
    allCards.forEach((el, i) => {
      const card = cards[i];
      const w = Math.min(card.w || colW, colW);
      let minCol = 0;
      for (let c = 1; c < cols; c++) if (colHeights[c] < colHeights[minCol]) minCol = c;
      card.x = minCol * (colW + GAP);
      card.y = colHeights[minCol];
      card.w = w;
      el.style.left = card.x + 'px';
      el.style.top = card.y + 'px';
      el.style.width = w + 'px';
      colHeights[minCol] = card.y + el.offsetHeight + GAP;
    });
    document.getElementById('board').style.minHeight = Math.max(...colHeights) + 100 + 'px';
    saveBoard();
  }

  if (total === 0) requestAnimationFrame(place);
  else images.forEach(img => {
    if (img.complete) { loaded++; if (loaded >= total) requestAnimationFrame(place); }
    else img.onload = img.onerror = () => { loaded++; if (loaded >= total) requestAnimationFrame(place); };
  });
}

function syncText() {
  document.querySelectorAll('.card').forEach(el => {
    const idx = +el.dataset.idx;
    if (cards[idx]?.type === 'text') {
      const t = el.querySelector('.text');
      if (t) cards[idx].content = t.innerHTML;
    }
  });
}

function saveBoard() {
  syncText();
  localStorage.setItem(SAVE_KEY, JSON.stringify(cards));
  document.getElementById('status').textContent = '저장됨 ' + new Date().toLocaleTimeString();
}

function renderCards() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  cards.forEach((card, i) => {
    const el = document.createElement('div');
    el.className = 'card';
    el.dataset.idx = i;
    if (card.x !== undefined) el.style.left = card.x + 'px';
    if (card.y !== undefined) el.style.top = card.y + 'px';
    if (card.w) el.style.width = card.w + 'px';

    el.addEventListener('mousedown', e => {
      if (e.target.closest('.text, a, .card-btn, .resize-handle, table')) return;
      e.preventDefault();
      moving = { idx: i, startX: e.clientX, startY: e.clientY, origX: card.x || 0, origY: card.y || 0 };
      el.classList.add('moving');
    });

    const actions = document.createElement('div');
    actions.className = 'card-actions';
    const delBtn = document.createElement('button');
    delBtn.className = 'card-btn'; delBtn.textContent = '×';
    delBtn.onclick = e => { e.stopPropagation(); if (confirm('삭제?')) { cards.splice(i, 1); renderCards(); saveBoard(); } };
    actions.appendChild(delBtn);
    el.appendChild(actions);

    if (card.type === 'text') {
      const text = document.createElement('div');
      text.className = 'text';
      text.contentEditable = true;
      text.innerHTML = card.content || '';
      text.addEventListener('blur', () => { card.content = text.innerHTML; saveBoard(); });
      el.appendChild(text);
    } else if (card.type === 'image') {
      const src = card.src.startsWith('http') || card.src.startsWith('data:') ? card.src : IMG_BASE + card.src;
      const img = document.createElement('img');
      img.src = src;
      img.alt = card.alt || '';
      img.loading = 'lazy';
      img.onerror = () => img.style.display = 'none';
      if (card.link) {
        const a = document.createElement('a'); a.href = card.link; a.target = '_blank';
        a.appendChild(img); el.appendChild(a);
      } else { el.appendChild(img); }
      if (card.caption) {
        const cap = document.createElement('div');
        cap.className = 'caption';
        cap.textContent = card.caption;
        el.appendChild(cap);
      }
    } else if (card.type === 'table') {
      const wrapper = document.createElement('div');
      wrapper.style.overflowX = 'auto';
      wrapper.innerHTML = card.html || '';
      el.appendChild(wrapper);
    }

    const rh = document.createElement('div');
    rh.className = 'resize-handle';
    rh.addEventListener('mousedown', e => {
      e.preventDefault(); e.stopPropagation();
      resizing = { idx: i, startX: e.clientX, startW: card.w || el.offsetWidth };
    });
    el.appendChild(rh);
    board.appendChild(el);
  });

  requestAnimationFrame(() => {
    let maxBottom = 0;
    document.querySelectorAll('.card').forEach(el => {
      const b = (parseFloat(el.style.top) || 0) + el.offsetHeight;
      if (b > maxBottom) maxBottom = b;
    });
    board.style.minHeight = (maxBottom + 100) + 'px';
  });
}

document.addEventListener('mousemove', e => {
  if (moving) {
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`);
    if (!el) return;
    const nx = moving.origX + e.clientX - moving.startX;
    const ny = moving.origY + e.clientY - moving.startY;
    el.style.left = nx + 'px';
    el.style.top = ny + 'px';
  }
  if (resizing) {
    const card = cards[resizing.idx];
    card.w = Math.max(100, resizing.startW + e.clientX - resizing.startX);
    const el = document.querySelector(`.card[data-idx="${resizing.idx}"]`);
    if (el) el.style.width = card.w + 'px';
  }
});

document.addEventListener('mouseup', e => {
  if (moving) {
    const card = cards[moving.idx];
    card.x = Math.max(0, moving.origX + e.clientX - moving.startX);
    card.y = Math.max(0, moving.origY + e.clientY - moving.startY);
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`);
    if (el) { el.classList.remove('moving'); }
    moving = null; saveBoard();
  }
  if (resizing) { resizing = null; saveBoard(); }
});

function addTextCard() {
  cards.push({ type: 'text', content: '', x: 50, y: window.scrollY + 100, w: 300 });
  renderCards();
  setTimeout(() => { const els = document.querySelectorAll('.card .text'); els[els.length - 1]?.focus(); }, 100);
}

function addImageCard() {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = 'image/*';
  input.onchange = e => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = () => { cards.push({ type: 'image', src: reader.result, x: 50, y: window.scrollY + 100, w: 240 }); renderCards(); saveBoard(); };
    reader.readAsDataURL(file);
  };
  input.click();
}

function resetLayout() {
  if (!confirm('자동 재배치합니다. 현재 위치가 변경됩니다.')) return;
  cards.forEach(c => { delete c.x; delete c.y; });
  renderCards(); autoLayout();
}

setInterval(saveBoard, 30000);
loadBoard();
</script>
</body>
</html>
