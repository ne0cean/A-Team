    "content": "500 Days of summer<br>\t\t<br>\t\t<br>\t<br>\t<br>\t\t<br>\t\t\t<br>500일의 썸머<br>\t\t\t<br>\t\t\t\t<br>\t\t\t\t\t(whistling)<br>\t\t\t\t\t\"나쁜 년\" \"500일의 썸머\"<br>\t\t\t\t<br>\t\t\t\t<br>\t\t\t\t\t(pencil scribbling rapidly)<br>\t\t\t\t\t\"500일의 썸머\"<br>\t\t\t\t<br>\t\t\t\t<br>\t\t\t\t\t(MAN narrating): This is a story of boy meets girl.<br>\t\t\t\t\t이 영화는 한 남자와 여자의 이야기이다<br>\t\t\t\t<br>\t\t\t\t<br>\t\t\t\t\tThe boy, Tom Hansen of Margate, New Jersey,<br>\t\t\t\t\t\"1일째\" 뉴저지주에서 자란 톰 한센이라는 소년은 진정한 사랑을 찾기 전까진 행복할 수 없다고 믿었다<br>\t\t\t\t<br>\t\t\t\t<br>\t\t\t\t\tgrew up believing that he'd never truly be happy... until the day he met \"the one.\"<br>\t\t\t\t\t진정한 사랑을 찾기 전까진 행복할 수 없다고 믿었다<br>\t\t\t\t<br>\t\t\t\t<br>\t\t\t\t\tThis belief stemmed from early exposure to sad British pop music...<br>\t\t\t\t\t어릴 때부터 우울한 영국 음악에 빠졌고 영화 '졸업'을 잘못 이해했던 탓이다<br>\t\t\t\t<br>\t\t\t\t<br>\t\t\t\t\tand a total misreading of the movie The Graduate.<br>\t\t\t\t\t영화 '졸업'을 잘못 이해했던 탓이다 일레인!<br>\t\t\t\t<br>\t\t\t\t<br>\t\t\t\t\t(DUSTIN HOFFMAN on TV) Elaine! Elaine!<br>\t\t\t\t\t일레인! 미시간주에서 자란 썸머 핀이란 소녀는<br>\t\t\t\t<br>\t\t\t\t<br>\t\t\t\t\tNARRATOR: The girl, Summer Finn of Shinnecock, Michigan,<br>\t\t\t\t\t미시간주에서 자란 썸머 핀이란 소녀는<br>\t\t\t\t<br>\t\t\t\t<br>\t\t\t\t\tdid not share this belief.<br>\t\t\t\t\t그와 달랐다<br>\t\t\t\t<br>\t\t\t\t<br>\t\t\t\t\tSince the disintegration of her parents' marriage,<br>\t\t\t\t\t부모님이 이혼한 뒤부터 2가지에 집착하게 됐다<br>\t\t\t\t<br>\t\t\t\t<br>\t\t\t\t\tshe'd only loved two things.<br>\t\t\t\t\t2가지에 집착하게 됐다<br>\t\t\t\t<br>\t\t\t\t<br>\t\t\t\t\tThe first was her long, dark hair.<br>\t\t\t\t\t첫째는 검은 긴 머리였고 둘째는 머리카락을 자를 때마다 느끼는 무덤덤함이었다<br>\t\t\t\t<br>\t\t\t\t<br>\t\t\t\t\tThe second was how easily she could cut it off... and feel nothing.<br>\t\t\t\t\t둘째는 머리카락을 자를 때마다 느끼는 무덤덤함이었다<br>\t\t\t\t<br>\t\t\t\t<br>\t\t\t\t\tTom meets Summer on January 8.<br>\t\t\t\t\t톰은 1월 8일 썸머를 만났다 그녀를 처음 본 순간 운명의 반쪽임을 느꼈다<br>\t\t\t\t<br>\t\t\t\t<br>\t\t\t\t\tHe knows almost immediately she's who he's been searching for.<br>\t\t\t\t\t그녀를 처음 본 순간 운명의 반쪽임을 느꼈다<br>\t\t\t\t<br>\t\t\t\t<br>\t\t\t\t\tThis is a story of boy meets girl.<br>\t\t\t\t\t이 영화는 한 남자와 여자의 이야기이다<br>\t\t\t\t<br>\t\t\t\t<br>\t\t\t\t\tBut you should know up front, this is not a love story.<br>\t\t\t\t\t미리 말해두지만 사랑 이야기가 아니다<br>\t\t\t\t<br>\t\t\t\t<br>\t\t\t\t\tWe didn't know who else to call.<br>\t\t\t\t\t너밖에 연락할 곳이 없었어<br>\t\t\t\t<br>\t\t\t\t<br>\t\t\t\t\tIt's Amanda Heller all over again.<br>\t\t\t\t\t병이 도진 것 같아<br>\t\t\t\t<br>\t\t\t\t<br>\t\t\t\t\tYou did the right thing.<br>\t\t\t\t\t나한테 연락하길 잘했어<br>\t\t\t\t<br>\t\t\t\t<br>\t\t\t\t\t(sighs) Now, where is he?<br>\t\t\t\t\t지금 어디 있어?<br>\t\t\t\t<br>\t\t\t\t<br>\t\t\t\t\tGIRL: Thomas.<br>\t\t\t\t\t톰!<br>\t\t\t\t<br>\t\t\t\t<br>\t\t\t\t\tRachel. What are you doing here?<br>\t\t\t\t\t레이첼? 여긴 웬일이야? 도와주러 왔지<br>\t\t\t\t<br>\t\t\t\t<br>\t\t\t\t\tI'm here to help you. Help me how?<br>\t\t\t\t\t어떻게?<br>\t\t\t\t<br>\t\t\t\t<br>\t\t\t\t\tFirst, put down the plate.<br>\t\t\t\t\t일단 접시부터 내려놔<br>\t\t\t\t<br>\t\t\t\t<br>\t\t\t\t\tDrink this.<br>\t\t\t\t\t이거 마셔<br>\t\t\t\t<br>\t\t\t\t<br>\t\t\t\t\t-What is that? -Vodka.<br>\t\t\t\t\t- 뭔데? - 보드카<br>\t\t\t\t<br>\t\t\t\t<br>\t\t\t\t\tUm, does Mom know that you're here?<br>\t\t\t\t\t여기 온 거 엄마도 아셔? 10시 넘었잖아<br>\t\t\t\t<br>\t\t\t\t<br>\t\t\t\t\t'Cause it's probably past 10:00. (sighs) Don't worry about it.<br>\t\t\t\t\t여기 온 거 엄마도 아셔? 10시 넘었잖아 걱정 마 어떻게 된 건지 처음부터 말해봐<br>\t\t\t\t<br>\t\t\t\t<br>\t\t\t\t\tJust start from the beginning, and tell us what happened.<br>\t\t\t\t\t어떻게 된 건지 처음부터 말해봐 \"LA 가먼트 & 시티즌 광고란\"<br>\t\t\t\t<br>\t\t\t\t<br>\t\t\t\t\tTOM (narrating): Things were going so well.<br>\t\t\t\t\t모든 게 순조로웠어<br>\t\t\t\t<br>\t\t\t\t<br>\t\t\t\t\tThen what?<br>\t\t\t\t\t\"링고 스타\" 그랬는데? 우리 그만 만나자<br>\t\t\t\t<br>\t\t\t\t<br>\t\t\t\t\tI think we should stop seeing each other.<br>\t\t\t\t\t우리 그만 만나자 - 그게 끝이야? - 응<br>\t\t\t\t<br>\t\t\t\t<br>\t\t\t\t\tJust like that? Just like that.<br>\t\t\t\t\t- 그게 끝이야? let cards = [];
let moving = null, resizing = null;

function loadBoard() {
  const saved = localStorage.getItem(SAVE_KEY);
  cards = saved ? JSON.parse(saved) : DEFAULT_CARDS.map(c => ({...c}));
  renderCards();
  if (!saved) autoLayout();
}

function autoLayout() {
  const GAP = 14;
  const boardW = document.getElementById('board').offsetWidth;
  const cols = Math.max(1, Math.floor(boardW / 280));
  const colW = (boardW - GAP * (cols - 1)) / cols;
  const colHeights = new Array(cols).fill(0);
  const allCards = document.querySelectorAll('.card');
  const images = document.querySelectorAll('.card img');
  let loaded = 0;
  const total = images.length;

  function place() {
    allCards.forEach((el, i) => {
      const card = cards[i];
      const w = Math.min(card.w || colW, colW);
      let minCol = 0;
      for (let c = 1; c < cols; c++) if (colHeights[c] < colHeights[minCol]) minCol = c;
      card.x = minCol * (colW + GAP);
      card.y = colHeights[minCol];
      card.w = w;
      el.style.left = card.x + 'px';
      el.style.top = card.y + 'px';
      el.style.width = w + 'px';
      colHeights[minCol] = card.y + el.offsetHeight + GAP;
    });
    document.getElementById('board').style.minHeight = Math.max(...colHeights) + 100 + 'px';
    saveBoard();
  }

  if (total === 0) requestAnimationFrame(place);
  else images.forEach(img => {
    if (img.complete) { loaded++; if (loaded >= total) requestAnimationFrame(place); }
    else img.onload = img.onerror = () => { loaded++; if (loaded >= total) requestAnimationFrame(place); };
  });
}

function syncText() {
  document.querySelectorAll('.card').forEach(el => {
    const idx = +el.dataset.idx;
    if (cards[idx]?.type === 'text') {
      const t = el.querySelector('.text');
      if (t) cards[idx].content = t.innerHTML;
    }
  });
}

function saveBoard() {
  syncText();
  localStorage.setItem(SAVE_KEY, JSON.stringify(cards));
  document.getElementById('status').textContent = '저장됨 ' + new Date().toLocaleTimeString();
}

function renderCards() {
  const board = document.getElementById('board');

    if (card.y !== undefined) el.style.top = card.y + 'px';
    if (card.w) el.style.width = card.w + 'px';

    el.addEventListener('mousedown', e => {
      if (e.target.closest('.text, a, .card-btn, .resize-handle, table')) return;
      e.preventDefault();
      moving = { idx: i, startX: e.clientX, startY: e.clientY, origX: card.x || 0, origY: card.y || 0 };
      el.classList.add('moving');
    });

    const actions = document.createElement('div');
    actions.className = 'card-actions';
    const delBtn = document.createElement('button');
    delBtn.className = 'card-btn'; delBtn.textContent = '×';
    delBtn.onclick = e => { e.stopPropagation(); if (confirm('삭제?')) { cards.splice(i, 1); renderCards(); saveBoard(); } };
    actions.appendChild(delBtn);
    el.appendChild(actions);

    if (card.type === 'text') {
      const text = document.createElement('div');
      text.className = 'text';
      text.contentEditable = true;
      text.innerHTML = card.content || '';
      text.addEventListener('blur', () => { card.content = text.innerHTML; saveBoard(); });
      el.appendChild(text);
    } else if (card.type === 'image') {
      const src = card.src.startsWith('http') || card.src.startsWith('data:') ? card.src : IMG_BASE + card.src;
      const img = document.createElement('img');
      img.src = src;
      img.alt = card.alt || '';
      img.loading = 'lazy';
      img.onerror = () => img.style.display = 'none';
      if (card.link) {
        const a = document.createElement('a'); a.href = card.link; a.target = '_blank';
        a.appendChild(img); el.appendChild(a);
      } else { el.appendChild(img); }
      if (card.caption) {
        const cap = document.createElement('div');
        cap.className = 'caption';
        cap.textContent = card.caption;
        el.appendChild(cap);
      }
    } else if (card.type === 'table') {
      const wrapper = document.createElement('div');
      wrapper.style.overflowX = 'auto';
      wrapper.innerHTML = card.html || '';
      el.appendChild(wrapper);
    }

    const rh = document.createElement('div');
    rh.className = 'resize-handle';
    rh.addEventListener('mousedown', e => {
      e.preventDefault(); e.stopPropagation();
      resizing = { idx: i, startX: e.clientX, startW: card.w || el.offsetWidth };
    });
    el.appendChild(rh);
    board.appendChild(el);
  });

  requestAnimationFrame(() => {
    let maxBottom = 0;
    document.querySelectorAll('.card').forEach(el => {
      const b = (parseFloat(el.style.top) || 0) + el.offsetHeight;
      if (b > maxBottom) maxBottom = b;
    });
    board.style.minHeight = (maxBottom + 100) + 'px';
  });
}

document.addEventListener('mousemove', e => {
  if (moving) {
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`);
    if (!el) return;
    const nx = moving.origX + e.clientX - moving.startX;
    const ny = moving.origY + e.clientY - moving.startY;
    el.style.left = nx + 'px';
    el.style.top = ny + 'px';
  }
  if (resizing) {
    const card = cards[resizing.idx];
    card.w = Math.max(100, resizing.startW + e.clientX - resizing.startX);
    const el = document.querySelector(`.card[data-idx="${resizing.idx}"]`);
    if (el) el.style.width = card.w + 'px';
  }
});

document.addEventListener('mouseup', e => {
  if (moving) {
    const card = cards[moving.idx];
    card.x = Math.max(0, moving.origX + e.clientX - moving.startX);
    card.y = Math.max(0, moving.origY + e.clientY - moving.startY);
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`);
    if (el) { el.classList.remove('moving'); }
    moving = null; saveBoard();
  }
  if (resizing) { resizing = null; saveBoard(); }
});

function addTextCard() {
  cards.push({ type: 'text', content: '', x: 50, y: window.scrollY + 100, w: 300 });
  renderCards();
  setTimeout(() => { const els = document.querySelectorAll('.card .text'); els[els.length - 1]?.focus(); }, 100);
}

function addImageCard() {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = 'image/*';
  input.onchange = e => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = () => { cards.push({ type: 'image', src: reader.result, x: 50, y: window.scrollY + 100, w: 240 }); renderCards(); saveBoard(); };
    reader.readAsDataURL(file);
  };
  input.click();
}

function resetLayout() {
  if (!confirm('자동 재배치합니다. 현재 위치가 변경됩니다.')) return;
  cards.forEach(c => { delete c.x; delete c.y; });
  renderCards(); autoLayout();
}

setInterval(saveBoard, 30000);
loadBoard();
</script>
</body>
</html>
