<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>재무제표</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #1e1e1e;
  color: #e0e0e0;
  font-family: 'Segoe UI', -apple-system, sans-serif;
  font-size: 15px;
  line-height: 1.6;
  padding: 20px 30px 60px;
  overflow-x: hidden;
}
a { color: #6cb0f6; text-decoration: none; }
a:hover { text-decoration: underline; }
.title-bar {
  background: #3a3a5c;
  display: inline-block;
  padding: 6px 16px;
  font-size: 22px;
  font-weight: bold;
  color: #fff;
  margin-bottom: 4px;
}
.date { color: #999; font-size: 13px; margin-bottom: 20px; }
.board { position: relative; }
.card {
  background: #2a2a2a;
  border: 1px solid #3a3a3a;
  border-radius: 8px;
  padding: 12px;
  position: absolute;
  cursor: grab;
  transition: box-shadow 0.15s;
  overflow: hidden;
}
.card:hover { box-shadow: 0 0 0 1px #58a6ff; z-index: 10; }
.card.moving { opacity: 0.8; box-shadow: 0 4px 24px rgba(0,0,0,0.6); z-index: 100; cursor: grabbing; }
.card img { width: 100%; border-radius: 4px; display: block; }
.card .caption { font-size: 12px; color: #888; margin-top: 6px; }
.card .text { outline: none; min-height: 20px; white-space: pre-wrap; word-break: break-word; }
.card .text:focus { background: rgba(255,255,255,0.05); border-radius: 4px; padding: 4px; }
.card .text:empty::before { content: '텍스트 입력...'; color: #555; }
.card table { border-collapse: collapse; width: 100%; font-size: 13px; }
.card table td, .card table th { border: 1px solid #444; padding: 4px 8px; vertical-align: top; }
.card table th { background: #333; color: #ccc; }
.card-actions { position: absolute; top: 4px; right: 4px; display: none; gap: 4px; }
.card:hover .card-actions { display: flex; }
.card-btn { background: #333; border: 1px solid #555; color: #ccc; border-radius: 4px; padding: 2px 6px; font-size: 11px; cursor: pointer; }
.card-btn:hover { background: #444; color: #fff; }
.resize-handle { position: absolute; bottom: 0; right: 0; width: 16px; height: 16px; cursor: se-resize; opacity: 0; }
.card:hover .resize-handle { opacity: 0.6; }
.resize-handle::after { content: ''; position: absolute; bottom: 3px; right: 3px; width: 8px; height: 8px; border-right: 2px solid #666; border-bottom: 2px solid #666; }
.toolbar { position: fixed; bottom: 0; left: 0; right: 0; background: #161b22; border-top: 1px solid #30363d; padding: 8px 20px; display: flex; gap: 12px; align-items: center; z-index: 200; }
.toolbar button { background: #21262d; border: 1px solid #30363d; color: #e0e0e0; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; }
.toolbar button:hover { background: #30363d; }
.toolbar .status { color: #8b949e; font-size: 12px; margin-left: auto; }
.highlight-red { color: #ff6b6b; }
.highlight-blue { color: #6cb0f6; }
</style>
</head>
<body>
<div class="title-bar">재무제표</div>
<div class="date">Invalid Date</div>
<div class="board" id="board"></div>
<div class="toolbar">
  <button onclick="addTextCard()">+ 텍스트</button>
  <button onclick="addImageCard()">+ 이미지</button>
  <button onclick="saveBoard()">💾 저장</button>
  <button onclick="resetLayout()">↺ 재배치</button>
  <span class="status" id="status">Ready</span>
</div>
<script>
const SAVE_KEY = 'board-재무제표';
const IMG_BASE = '../../attachments/';
const DEFAULT_CARDS = [
  {
    "type": "text",
    "content": "재무제표<br>\t\t\t<br>\t\t\t\t<br>- 포괄손익계산서<br>\t\t\t\t<br>- 재무상태표<br>\t\t\t\t<br>- 자산변동표<br>\t\t\t\t<br>- 현금흐름표<br>\t\t\t\t<br>- 주석<br>\t\t\t\t<br><br>\t\t\t<br>\t\t\t<br><br>\t\t\t<br>제 1장 재무<br>\t\t\t<br>■ 기업가치 측정<br>\t\t\t<br>\t\t\t\t<br>- Valuation - 기업의 가격 책정<br>\t\t\t\t<br>- EVA(Economic Value Added) - 기업의 성과 측정<br>\t\t\t\t<br>- 주식의 이전, 기업의 양도(매매), 상속/증여를 위한 유가증권 평가<br>\t\t\t<br>\t\t\t<br><br>\t\t\t<br>\t\t\t\t<br>- Valuation<br>\t\t\t\t<br>ㅇ 시장가치 접근법<br>\t\t\t\t<br>상장주식: 평가 기준일 종가 X 주식 수<br>\t\t\t\t<br>비상장주식:<br>\t\t\t\t<br>- 일반 법인: <br>\t\t\t\t<br>순손익가치 X 60% + 순자산가치 X 40%<br>\t\t\t\t<br>= (순손익가치 X 3 + 순자산가치 X 2) / 5<br>\t\t\t\t<br>- 부동산과다법인(부동산 50%초과): 순손익가치 X 40% + 순자산가치 60%<br>\t\t\t\t<br> = (순손익가치 X 2 + 순자산가치 X 3) / 5<br>\t\t\t\t<br>순손익가치 = 평가기준일 직전사업년도 말 (총자산 - 부채 + 영업권) / 발생주식총수<br>\t\t\t\t<br>순자산가치 = 평가기준일이 속하는 연도의 직전사업년도 (순손익액/10%) / 발생주식총수<br>\t\t\t\t<br>*상장/비상장여부<br>\t\t\t\t<br> 경영상태<br>\t\t\t\t<br> 부동산 과다법인 여부<br>\t\t\t\t<br> 최대주주의 과점주주 여부<br>\t\t\t\t<br><br>\t\t\t<br>\t\t\t<br><br>\t\t\t<br>ROI(Return On Investment)투자수익률: NI(Net Income)당기순이익 / Assets(총자산)<br>\t\t\t<br>= 매출액 당기순이익률 X 총자산 회전율<br>\t\t\t<br>= (NI / 매출액) X (매출액 / Assets총자산)<br>\t\t\t<br>ROA(Return On Assets)총자산수익률: OP(Operation Profit)영업이익 / Assets(총자산)<br>\t\t\t<br>= 매출액 영업이익률 X 총자산 회전율<br>\t\t\t<br>= (OP / 매출액) X (매출액 / Assets총자산)<br>\t\t\t<br>ROE(Return On Equity)순자산수익률: NI(Net Income)당기순이익 / OE(Owner's Equity)자기자본.순자산<br>\t\t\t<br>= 매출액 당기순이익률 X 총자산 회전률 X 재무 레버리지<br>\t\t\t<br>= (NI / 매출액) X (매출액 / Assets) X (Assets / OE자기자본)<br>\t\t\t<br><br>\t\t\t<br>\t\t\t\t<br><br>\t\t\t\t<br>ㅇ (비상장사) PER/PBR 시가순자산법과 순이익법<br>\t\t\t\t<br>- 자산가치: BPS(Book-value Per Share)주당순자산가치 X 동종업계 PBR(Price on Book-value Ratio)주당총자산비율 X 주식 수<br>\t\t\t\t<br>- 수익가치: EPS(Equity Per Share)주당순이익 X 동종업계 PER(Price Equity Ratio)주당순이익비율 X 주식 수<br>\t\t\t<br>\t\t\t<br><br>\t\t\t<br>EPS(Equity Per Share)주당순이익 = NI / 주식 수<br>\t\t\t<br>PER(Price Equity Ratio)주당/주가순이익비율 = 시장주가 / EPS = 시가총액 / NI<br>\t\t\t<br>BPS(Book-value Per Share)주당순자산가치 = OE순자산.총자본 / 주식 수<br>\t\t\t<br>PBR(Price on Book-value Ratio)주당/주가순자산비율 = 시장주가 / BPS = 시가총액 / Assets<br>\t\t\t<br><br>\t\t\t<br>*PBR가 1이라고 가정 할 경우, 시가총액 = OE순자산<br>\t\t\t<br> ROE = NI / OE 는 PER = 시가총액(=OE) / NI의 역수<br>\t\t\t<br> 즉, 동종업체의 PER가 18인 경우 이의 역수인 1/18(5.6%)가 해당 업체의 ROE<br>\t\t\t<br> 회사의 ROE가 이를 상회할 경우 경영성과가 높다고 판단 가능<br>\t\t\t<br><br>\t\t\t<br>\t\t\t\t<br>ㅇ DCF(Discounted Cash Flow)현금흐름할인법<br>\t\t\t\t<br><br>\t\t\t\t<br>- EVA경제적부가가치<br>\t\t\t\t<br>= OP영업이익 - (가중평균자본비용 X 영업자산투자금액)<br>\t\t\t\t<br>= (*ROIC투하자본 수익률 - 가중평균자본 비용) X 투하자본<br>\t\t\t\t<br>= {(세후 이익 / 투하 자본) - 가중평균자본 비용)} X 투하자본<br>\t\t\t\t<br><br>\t\t\t\t<br>IC영업투하자본<br>\t\t\t\t<br>*ROIC투하자본 이익률 <br>\t\t\t\t<br>= 세후 영업이익 / 투하자본<br>\t\t\t\t<br>= 매출액 영업이익률 X 투하자본 회전률<br>\t\t\t\t<br>= (세후 영업이익 / 매출액) X (매출액 / 투하자본)<br>\t\t\t\t<br><br>\t\t\t\t<br>- 주식이전과 기업상속의 목적<br>\t\t\t\t<br>ㅇ 소득세법상 유가증권 평가<br>\t\t\t\t<br>ㅇ 상속세 및 증여세법상 유가증권 평가<br>\t\t\t\t<br><br>\t\t\t<br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br>■ 투자 의사결정과 기업가치<br>\t\t\t<br>NPV(Net Presents Value)순 현재 가치법<br>\t\t\t<br>IRR(Internal Rate of Return)내부수익률법<br>\t\t\t<br>\t\t\t<br><br>\t\t\t<br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br>제 2장 원가<br>\t\t\t<br>관리회계: 원가/가격 책정 등의 의사결정을 지원<br>\t\t\t<br>ㅇ CVP(Cost-Volume-Profit) 분석<br>\t\t\t<br>\t\t\t\t<br>- 원가-조업도-이익의 변화가 이익에 미치는 영향 분석<br>\t\t\t<br>\t\t\t<br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br>\t\t\t<br><br>\t\t\t<br>\t\t\t<br><br>\t\t\t<br>\t\t\t<br>ㅇ ABS(Activity-Based Costing) 활동기준 원가<br>\t\t\t<br>\t\t\t\t<br>- 간접비의 합리적 반영을 위해 활동을 원가의 집계 단위로 활용<br>\t\t\t<br>\t\t\t<br>ㅇ 고정비: 조업도와 매출에 무관하게 지속적으로 발생하는 비용 - 구조조정이라는 전략적 대상<br>\t\t\t<br>ㅇ 변동비: 제품을 구성하는 재료비, 노무비, 경비와 판매비로 구성 - 원가절감의 대상<br>\t\t\t<br>ㅇ 공헌이익/한계이익(Contribution margin): 매출-변동비(가격-개당변동비): 제품 단위당 판매가격에서 단위당 변동비 차감한 이익. 즉, 한 개를 팔 때 마다 투입되는 노력의 대가.<br>\t\t\t<br>제품 가격을 상향하거나 제품 단위당 변동비를 절감해야 함.<br>\t\t\t<br>ㅇ 손익분기점 BEP(Break Even Point)<br>\t\t\t<br>\t\t\t\t<br>- 고정비+변동비를 매출액이 커버하여 손익이 제로에 수렴하는 지점<br>\t\t\t<br>\t\t\t<br><br>\t\t\t<br>P X Q = F + V X Q<br>\t\t\t<br>매출액(가격 X 수량) = 고정비 + 개당 변동비 X 수량<br>\t\t\t<br>P X Q - V X Q = F<br>\t\t\t<br>(P - V) X Q = F<br>\t\t\t<br>Q = F / (P - V), 양변에 P를 곱하면<br>\t\t\t<br>P X Q = F / (1 - V/P)<br>\t\t\t<br>즉, BEP 매출액 = 고정비 / (1-변동비율) *(1-변동비율)=공헌이익률<br>\t\t\t<br><br>\t\t\t<br>가격 X 수량 = 고정비 + 적정이익 / {(한계이익)/ 가격}<br>\t\t\t<br>P X Q = F + I {(P-V)/ P}<br>\t\t\t<br>*한계이익=가격-개당 변동비<br>\t\t\t<br><br>\t\t\t<br>제 3장 제무재표<br>\t\t\t<br><br>\t\t\t<br>자산, 부채, 자본, 이익, 수익, 비용 6가지가 회계의 항목<br>\t\t\t<br>8가지의 변화<br>\t\t\t<br>\t\t\t\t<br>\t\t\t\t\t자산 +<br>\t\t\t\t\t자산 -<br>\t\t\t\t<br>\t\t\t\t<br>\t\t\t\t\t자본 +<br>\t\t\t\t\t자본 -<br>\t\t\t\t<br>\t\t\t\t<br>\t\t\t\t\t부채 +<br>\t\t\t\t\t부채 -<br>\t\t\t\t<br>\t\t\t\t<br>\t\t\t\t\t수익 +<br>\t\t\t\t\t비용 -<br>\t\t\t\t<br>\t\t\t<br>\t\t\t<br><br>\t\t\t<br>재무상태표(대차대조표 Balance Sheet) : (기말이라는) 특정 시점의 자산의 운용과 자산의 조달 상황. 즉, 재산의 잔고를 나타냄<br>\t\t\t<br>손익계산서: 일정 기간의 운영으로 인한 이익(성과)의 증감<br>\t\t\t<br>현금흐름표: 재무상태표와 손익계산의 연결을 현금의 증감으로 보여줌<br>\t\t\t<br>\t\t\t\t<br>- 영업 현금흐름: NI, 발생주의 고려 몇 가지 수정 - 현금 발생하지 않은 비용, 운전 자금의 증감<br>\t\t\t\t<br>- 투자 현금흐름: 기계설비, 건물, 토지, 재무적 투자 등 취득과 매각<br>\t\t\t\t<br>- 재무 현금흐름: 은행 차입, 회사채 발행, 증자, 배당금 지급 등 자금의 조달과 상환<br>\t\t\t<br>\t\t\t<br>   현금 잔고<br>\t\t\t<br>*자금 → 원재료 → 상품/재고 → 외상매출금 → 현금<br>\t\t\t<br><br>\t\t\t<br>ROA=NI/Assets가 높을 수록 자금을 효율적으로 운용하는 것<br>\t\t\t<br>ROE=NI/OE가 높을 수록 자기자본으로 회사를 효율적으로 경영하는가<br>\t\t\t<br><br>\t\t\t<br>ㅇ 자기자본비율=자본/(부차+자본)<br>\t\t\t<br>*일반적으로 50% 수준 유지<br>\t\t\t<br>ㅇ유동비율=유동자산/유동부채<br>\t\t\t<br>*일반적으로 유동자산이 유동부채보다 많아야 함. 즉 100% 이상.<br>\t\t\t<br>ㅇ 고정장기적합률=비유동자산/(자본+비유동부채)<br>\t\t\t<br>*100%이하여야 안정적인 투자를 한 것. 자본으로 비유동자산에 투자하고 있는지 확인.<br>\t\t\t<br>\t\t\t<br><br>\t\t\t<br>\t\t\t<br><br>\t\t\t<br>\t\t\t<br><br>\t\t\t<br>\t\t\t<br><br>\t\t\t<br>\t\t\t<br>ㅇ 매출원가율=매출원가/매출액<br>\t\t\t<br>ㅇ 매출총이익률=매출총이익/매출액<br>\t\t\t<br>ㅇ 판관비율=판관비/매출액<br>\t\t\t<br>ㅇ 영업이익률=영업이익/매출액<br>\t\t\t<br><br>\t\t\t<br>\t\t\t<br><br>\t\t\t<br>\t\t\t<br><br>\t\t\t<br>\t\t\t<br><br>\t\t\t<br>\t\t\t<br><br>\t\t<br>\t\t<br>\t\t\t<br>\t\t\t\t<br>- Working Capital<br>\t\t\t\t<br>- CapEx<br>\t\t\t\t<br>- Net Debt<br>\t\t\t\t<br>- 기타<br>\t\t\t<br>\t\t<br>\t\t<br>\t\t\t<br>BS<br>\t\t\t<br>Assets <br>\t\t\t<br>ㅇ Current<br>\t\t\t<br>\t\t\t\t<br>- Cash<br>\t\t\t\t<br>- AR<br>\t\t\t\t<br>- 기타 <br>\t\t\t<br>\t\t\t<br>ㅇ Noncurrent<br>\t\t\t<br>\t\t\t\t<br>- 투자<br>\t\t\t\t<br>- 유형<br>\t\t\t\t<br>- 무형<br>\t\t\t\t<br>- 기타<br>\t\t\t<br>\t\t\t<br>Liabilities<br>\t\t\t<br>ㅇ AP<br>\t\t\t<br>ㅇ Borrowing<br>\t\t\t<br>ㅇ 기타 충당금<br>\t\t\t<br>_____________________<br>\t\t\t<br>Equity = Net Asset<br>\t\t\t<br><br>\t\t\t<br><br>\t\t<br>\t\t<br>\t\t\t<br>재무상태표는 영어로 Balance sheet<br>\t\t\t<br>손익계산서는 영어로 P&L : profit & loss statement (혹은 IS : income statement)<br>\t\t\t<br>BS는 특정시점의 재산(Stock)을 표시하고<br>\t\t\t<br>PL은 기간동안의 재산의 증가감소(Flow)<br>\t\t\t<br><br>\t\t\t<br>* 재무상태표란 현재의 재산상태를 표시하는 문서이며 크게 (자산/부채/자본)으로 나누어 집니다.<br>\t\t\t<br>* 손익계산서는 일정기간동안의 매출 및 비용을 표시합니다. (매출액/매출원가/판매비와관리비<br>\t\t\t<br>(=판관비), 급여 임차료, 영업외수익(이자수익, 자산처분이익, 잡이익), 영업외비용(이자비용, 자산처분손실, 잡손실)등으로 구분할 수 있습니다.<br>\t\t\t<br><br>\t\t\t<br>ㅇ 기업내부 의사결정자인 경영자의 경영 의사결정 정보를 관리회계<br>\t\t\t<br>기업외부 의사결정자(주주, 채권자, 노동자, 국세청 등 경영자 외의 모두)의 의사결정 정보를 제공하는 것을 재무회계<br>\t\t\t<br><br>\t\t\t<br>ㅇ 회계공준(회계의 기본가정)<br>\t\t\t<br>기업실체 가정, 계속기업 가정, 기간성 , 화폐가치안정 가정으로 보통 4가지를 회계공준(기본가정)<br>\t\t\t<br><br>\t\t\t<br>ㅇ 대차평균의 원리 - 복식부기의 핵심<br>\t\t\t<br>현대의 회계는 복식부기 회계라고 부릅니다. 반대되는 말로는 단식부기가 있습니다.<br>\t\t\t<br>복식부기는 차변 대변으로 나누어서 거래를 기록하는 방식이고<br>\t\t\t<br>단식부기는 우리가 어렸을 때 썼던 용돈기입장 - 일반인들이 생각하는 수입/지출내역서<br>\t\t\t<br><br>\t\t\t<br>왼편을 차변(Dr, Debit)이라 하고 오른편을 대변(Cr, Credit)<br>\t\t\t<br>- BS(재무상태표)<br>\t\t\t<br>\t\t\t<br>- PL(손익계산서)<br>\t\t\t<br>\t\t\t<br>거래의 8요소<br>\t\t\t<br><br>\t\t\t<br>거래의 8요소 입니다. 이는 어떤 걸 의미하냐면..<br>\t\t\t<br>차변에 오는 금액은 자산 증가, 부채 감소, 자본 감소, 비용 발생 중 한가지일 수밖에 없다는 이야기 입니다.<br>\t\t\t<br><br>\t\t\t<br>\t\t\t<br><br>\t\t\t<br>EV= Equity Value + Net<br>\t\t\t<br><br>\t\t\t<br> <br>\t\t<br>\t\t<br>\t\t\t<br>IS     발생주의<br>\t\t\t<br>Revenue<br>\t\t\t<br>Cost of Sale<br>\t\t\t<br>________________<br>\t\t\t<br>GP<br>\t\t\t<br>OpEx<br>\t\t\t<br>________________<br>\t\t\t<br>판매관리비<br>\t\t\t<br> - D&A<br>\t\t\t<br>________________<br>\t\t\t<br>Operating Profit<br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br>Finance Income<br>\t\t\t<br>_________________<br>\t\t\t<br>EBT<br>\t\t\t<br>Tax<br>\t\t\t<br>_________________<br>\t\t\t<br>NI<br>\t\t<br>\t\t<br>\t\t\t<br>CF     현금주의<br>\t\t\t<br>Operating<br>\t\t\t<br>ㅇ NI<br>\t\t\t<br>   - D&A<br>\t\t\t<br>Invest<br>\t\t\t<br><br>\t\t\t<br>Financing<br>\t\t\t<br><br>\t\t\t<br>Cash Movement<br>\t\t\t<br>기초 Cash<br>\t\t\t<br>기말 Cash<br>\t\t\t<br><br>\t\t\t<br>EV/EBITDA<br>\t\t\t<br>EV/Sales<br>\t\t\t<br>EV/BV<br>\t\t\t<br>PER<br>\t\t\t<br>PSR<br>\t\t<br>\t\t<br>\t\t<br>\t\t\t<br>당좌자산<br>\t\t\t<br>재고자산",
    "w": 400
  }
];

let cards = [];
let moving = null, resizing = null;

function loadBoard() {
  const saved = localStorage.getItem(SAVE_KEY);
  cards = saved ? JSON.parse(saved) : DEFAULT_CARDS.map(c => ({...c}));
  renderCards();
  if (!saved) autoLayout();
}

function autoLayout() {
  const GAP = 14;
  const boardW = document.getElementById('board').offsetWidth;
  const cols = Math.max(1, Math.floor(boardW / 280));
  const colW = (boardW - GAP * (cols - 1)) / cols;
  const colHeights = new Array(cols).fill(0);
  const allCards = document.querySelectorAll('.card');
  const images = document.querySelectorAll('.card img');
  let loaded = 0;
  const total = images.length;

  function place() {
    allCards.forEach((el, i) => {
      const card = cards[i];
      const w = Math.min(card.w || colW, colW);
      let minCol = 0;
      for (let c = 1; c < cols; c++) if (colHeights[c] < colHeights[minCol]) minCol = c;
      card.x = minCol * (colW + GAP);
      card.y = colHeights[minCol];
      card.w = w;
      el.style.left = card.x + 'px';
      el.style.top = card.y + 'px';
      el.style.width = w + 'px';
      colHeights[minCol] = card.y + el.offsetHeight + GAP;
    });
    document.getElementById('board').style.minHeight = Math.max(...colHeights) + 100 + 'px';
    saveBoard();
  }

  if (total === 0) requestAnimationFrame(place);
  else images.forEach(img => {
    if (img.complete) { loaded++; if (loaded >= total) requestAnimationFrame(place); }
    else img.onload = img.onerror = () => { loaded++; if (loaded >= total) requestAnimationFrame(place); };
  });
}

function syncText() {
  document.querySelectorAll('.card').forEach(el => {
    const idx = +el.dataset.idx;
    if (cards[idx]?.type === 'text') {
      const t = el.querySelector('.text');
      if (t) cards[idx].content = t.innerHTML;
    }
  });
}

function saveBoard() {
  syncText();
  localStorage.setItem(SAVE_KEY, JSON.stringify(cards));
  document.getElementById('status').textContent = '저장됨 ' + new Date().toLocaleTimeString();
}

function renderCards() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  cards.forEach((card, i) => {
    const el = document.createElement('div');
    el.className = 'card';
    el.dataset.idx = i;
    if (card.x !== undefined) el.style.left = card.x + 'px';
    if (card.y !== undefined) el.style.top = card.y + 'px';
    if (card.w) el.style.width = card.w + 'px';

    el.addEventListener('mousedown', e => {
      if (e.target.closest('.text, a, .card-btn, .resize-handle, table')) return;
      e.preventDefault();
      moving = { idx: i, startX: e.clientX, startY: e.clientY, origX: card.x || 0, origY: card.y || 0 };
      el.classList.add('moving');
    });

    const actions = document.createElement('div');
    actions.className = 'card-actions';
    const delBtn = document.createElement('button');
    delBtn.className = 'card-btn'; delBtn.textContent = '×';
    delBtn.onclick = e => { e.stopPropagation(); if (confirm('삭제?')) { cards.splice(i, 1); renderCards(); saveBoard(); } };
    actions.appendChild(delBtn);
    el.appendChild(actions);

    if (card.type === 'text') {
      const text = document.createElement('div');
      text.className = 'text';
      text.contentEditable = true;
      text.innerHTML = card.content || '';
      text.addEventListener('blur', () => { card.content = text.innerHTML; saveBoard(); });
      el.appendChild(text);
    } else if (card.type === 'image') {
      const src = card.src.startsWith('http') || card.src.startsWith('data:') ? card.src : IMG_BASE + card.src;
      const img = document.createElement('img');
      img.src = src;
      img.alt = card.alt || '';
      img.loading = 'lazy';
      img.onerror = () => img.style.display = 'none';
      if (card.link) {
        const a = document.createElement('a'); a.href = card.link; a.target = '_blank';
        a.appendChild(img); el.appendChild(a);
      } else { el.appendChild(img); }
      if (card.caption) {
        const cap = document.createElement('div');
        cap.className = 'caption';
        cap.textContent = card.caption;
        el.appendChild(cap);
      }
    } else if (card.type === 'table') {
      const wrapper = document.createElement('div');
      wrapper.style.overflowX = 'auto';
      wrapper.innerHTML = card.html || '';
      el.appendChild(wrapper);
    }

    const rh = document.createElement('div');
    rh.className = 'resize-handle';
    rh.addEventListener('mousedown', e => {
      e.preventDefault(); e.stopPropagation();
      resizing = { idx: i, startX: e.clientX, startW: card.w || el.offsetWidth };
    });
    el.appendChild(rh);
    board.appendChild(el);
  });

  requestAnimationFrame(() => {
    let maxBottom = 0;
    document.querySelectorAll('.card').forEach(el => {
      const b = (parseFloat(el.style.top) || 0) + el.offsetHeight;
      if (b > maxBottom) maxBottom = b;
    });
    board.style.minHeight = (maxBottom + 100) + 'px';
  });
}

document.addEventListener('mousemove', e => {
  if (moving) {
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`);
    if (!el) return;
    const nx = moving.origX + e.clientX - moving.startX;
    const ny = moving.origY + e.clientY - moving.startY;
    el.style.left = nx + 'px';
    el.style.top = ny + 'px';
  }
  if (resizing) {
    const card = cards[resizing.idx];
    card.w = Math.max(100, resizing.startW + e.clientX - resizing.startX);
    const el = document.querySelector(`.card[data-idx="${resizing.idx}"]`);
    if (el) el.style.width = card.w + 'px';
  }
});

document.addEventListener('mouseup', e => {
  if (moving) {
    const card = cards[moving.idx];
    card.x = Math.max(0, moving.origX + e.clientX - moving.startX);
    card.y = Math.max(0, moving.origY + e.clientY - moving.startY);
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`);
    if (el) { el.classList.remove('moving'); }
    moving = null; saveBoard();
  }
  if (resizing) { resizing = null; saveBoard(); }
});

function addTextCard() {
  cards.push({ type: 'text', content: '', x: 50, y: window.scrollY + 100, w: 300 });
  renderCards();
  setTimeout(() => { const els = document.querySelectorAll('.card .text'); els[els.length - 1]?.focus(); }, 100);
}

function addImageCard() {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = 'image/*';
  input.onchange = e => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = () => { cards.push({ type: 'image', src: reader.result, x: 50, y: window.scrollY + 100, w: 240 }); renderCards(); saveBoard(); };
    reader.readAsDataURL(file);
  };
  input.click();
}

function resetLayout() {
  if (!confirm('자동 재배치합니다. 현재 위치가 변경됩니다.')) return;
  cards.forEach(c => { delete c.x; delete c.y; });
  renderCards(); autoLayout();
}

setInterval(saveBoard, 30000);
loadBoard();
</script>
</body>
</html>
