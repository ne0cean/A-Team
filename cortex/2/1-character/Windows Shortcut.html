<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Windows Shortcut</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #1e1e1e;
  color: #e0e0e0;
  font-family: 'Segoe UI', -apple-system, sans-serif;
  font-size: 15px;
  line-height: 1.6;
  padding: 20px 30px 60px;
  overflow-x: hidden;
}
a { color: #6cb0f6; text-decoration: none; }
a:hover { text-decoration: underline; }
.title-bar {
  background: #3a3a5c;
  display: inline-block;
  padding: 6px 16px;
  font-size: 22px;
  font-weight: bold;
  color: #fff;
  margin-bottom: 4px;
}
.date { color: #999; font-size: 13px; margin-bottom: 20px; }
.board { position: relative; }
.card {
  background: #2a2a2a;
  border: 1px solid #3a3a3a;
  border-radius: 8px;
  padding: 12px;
  position: absolute;
  cursor: grab;
  transition: box-shadow 0.15s;
  overflow: hidden;
}
.card:hover { box-shadow: 0 0 0 1px #58a6ff; z-index: 10; }
.card.moving { opacity: 0.8; box-shadow: 0 4px 24px rgba(0,0,0,0.6); z-index: 100; cursor: grabbing; }
.card img { width: 100%; border-radius: 4px; display: block; }
.card .caption { font-size: 12px; color: #888; margin-top: 6px; }
.card .text { outline: none; min-height: 20px; white-space: pre-wrap; word-break: break-word; }
.card .text:focus { background: rgba(255,255,255,0.05); border-radius: 4px; padding: 4px; }
.card .text:empty::before { content: '텍스트 입력...'; color: #555; }
.card table { border-collapse: collapse; width: 100%; font-size: 13px; }
.card table td, .card table th { border: 1px solid #444; padding: 4px 8px; vertical-align: top; }
.card table th { background: #333; color: #ccc; }
.card-actions { position: absolute; top: 4px; right: 4px; display: none; gap: 4px; }
.card:hover .card-actions { display: flex; }
.card-btn { background: #333; border: 1px solid #555; color: #ccc; border-radius: 4px; padding: 2px 6px; font-size: 11px; cursor: pointer; }
.card-btn:hover { background: #444; color: #fff; }
.resize-handle { position: absolute; bottom: 0; right: 0; width: 16px; height: 16px; cursor: se-resize; opacity: 0; }
.card:hover .resize-handle { opacity: 0.6; }
.resize-handle::after { content: ''; position: absolute; bottom: 3px; right: 3px; width: 8px; height: 8px; border-right: 2px solid #666; border-bottom: 2px solid #666; }
.toolbar { position: fixed; bottom: 0; left: 0; right: 0; background: #161b22; border-top: 1px solid #30363d; padding: 8px 20px; display: flex; gap: 12px; align-items: center; z-index: 200; }
.toolbar button { background: #21262d; border: 1px solid #30363d; color: #e0e0e0; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; }
.toolbar button:hover { background: #30363d; }
.toolbar .status { color: #8b949e; font-size: 12px; margin-left: auto; }
.highlight-red { color: #ff6b6b; }
.highlight-blue { color: #6cb0f6; }
</style>
</head>
<body>
<div class="title-bar">Windows Shortcut</div>
<div class="date">Invalid Date</div>
<div class="board" id="board"></div>
<div class="toolbar">
  <button onclick="addTextCard()">+ 텍스트</button>
  <button onclick="addImageCard()">+ 이미지</button>
  <button onclick="saveBoard()">💾 저장</button>
  <button onclick="resetLayout()">↺ 재배치</button>
  <span class="status" id="status">Ready</span>
</div>
<script>
const SAVE_KEY = 'board-Windows-Shortcut';
const IMG_BASE = '../../attachments/';
const DEFAULT_CARDS = [
  {
    "type": "text",
    "content": "Windows Shortcut<br>\t\t<br>\t\t<br>\t<br>\t<br>\t\t<br>\t\t\t<br>Alt + 왼쪽화살표 (웹사이트 이전페이지)<br>\t\t\t<br>Alt + 오른쪽화살표 (사이트 앞으로가기)<br>\t\t\t<br>항목을 끌면서 Ctrl+Shift 누름(선택한 항목의 바로 가기를 만듬)<br>\t\t\t<br>Ctrl+아래쪽 화살표(삽입 지점을 다음 단락의 처음으로 이동)<br>\t\t\t<br>Ctrl+위쪽 화살표(삽입 지점을 이전 단락의 처음으로 이동)<br>\t\t\t<br>탐색기에서 F3 키(파일 또는 폴더 찾기)<br>\t\t\t<br>Alt+Enter(선택한 폴더/파일의 등록 정보 보기)<br>\t\t\t<br>Alt+스페이스바(활성 창의 바로 가기 메뉴 열기)<br>\t\t\t<br>Ctrl+F4(여러 문서를 동시에 열 수 있는 프로그램에서 활성 문서 닫기)<br>\t\t\t<br>F6 키(창이나 바탕 화면의 화면 요소를 순환)<br>\t\t\t<br>Ctrl+Shift+N 새폴더 만들기<br>\t\t\t<br>Ctrl+Esc(시작 메뉴 표시)<br>\t\t\t<br><br>\t\t\t<br>대화 상자 키보드 바로 가기<br>\t\t\t<br>ㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡ<br>\t\t\t<br>Ctrl+Tab(탭을 통해 앞으로 이동)<br>\t\t\t<br>Ctrl+Shift+Tab(탭을 통해 뒤로 이동)<br>\t\t\t<br>스페이스바(활성 옵션이 확인란인 경우 확인란을 선택하거나 선택 취소)<br>\t\t\t<br>화살표 키(활성 옵션이 옵션 단추 그룹인 경우 단추 하나를 선택)<br>\t\t\t<br>F4 키(활성 목록에 항목을 표시)<br>\t\t\t<br>&#160;<br>\t\t\t<br>Microsoft Natural Keyboard 바로 가기<br>\t\t\t<br>ㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡ<br>\t\t\t<br>Windows 로고+Break(시스템 등록 정보 대화 상자 표시)<br>\t\t\t<br>시작키 + D : 모든 창을 최소화하거나 이전 크기로<br>\t\t\t<br>Windows 로고+Shift+M(최소화된 창을 원래 크기로 복원)<br>\t\t\t<br>Windows 로고+F(파일이나 폴더 검색)<br>\t\t\t<br>Windows 로고+R(실행 대화 상자)<br>\t\t\t<br>Windows 로고+U(유틸리티 관리자 열기)<br>\t\t\t<br>&#160;<br>\t\t\t<br>내게 필요한 옵션 키보드 바로 가기<br>\t\t\t<br>ㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡ<br>\t\t\t<br>오른쪽 Shift 키를 8초동안 누름(필터키를 설정하거나 해제)<br>\t\t\t<br>왼쪽 Alt+왼쪽 Shift+Print Screen(고대비를 켜거나 끔)<br>\t\t\t<br>왼쪽 Alt+왼쪽 Shift+Num Lock(마우스키를 설정하거나 해제)<br>\t\t\t<br>Windows 로고+U(유틸리티 관리자 열기)<br>\t\t\t<br>&#160;<br>\t\t\t<br>Windows 탐색기 키보드 바로 가기<br>\t\t\t<br>ㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡ<br>\t\t\t<br>방향키 + END/HOME 문장의 맨처음이나 끝으로 이동<br>\t\t\t<br>End(활성 창의 맨 아래 쪽을 표시)<br>\t\t\t<br>Home(활성 창의 맨 위 쪽을 표시)<br>\t\t\t<br>Num Lock+별표(선택한 폴더 아래에 있는 모든 하위 폴더를 표시)<br>\t\t\t<br>Num Lock+더하기 기호(+)(선택한 폴더의 내용물을 표시)<br>\t\t\t<br>Num Lock+빼기 기호(-)(선택한 폴더를 축소)<br>\t\t\t<br>&#160;<br>\t\t\t<br>문자표 바로 가기 키<br>\t\t\t<br>ㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡ<br>\t\t\t<br>문자표에 있는 문자를 두 번 누른 후 키보드 바로 가기를 사용하면 문자표 안에서 이동할 수 있습니다.<br>\t\t\t<br>오른쪽 화살표(오른쪽으로 이동하거나 다음 줄의 처음으로 이동)<br>\t\t\t<br>왼쪽 화살표(왼쪽으로 이동하거나 이전 줄의 끝으로 이동)<br>\t\t\t<br>위쪽 화살표(한 줄 위로 이동)<br>\t\t\t<br>아래쪽 화살표(한 줄 아래로 이동)<br>\t\t\t<br>Page Up(한 번에 한 화면 위로 이동)<br>\t\t\t<br>Page Down(한 번에 한 화면 아래로 이동)<br>\t\t\t<br>Home(해당 줄의 처음으로 이동)<br>\t\t\t<br>End(해당 줄의 끝으로 이동)<br>\t\t\t<br>Ctrl+Home(처음 문자로 이동)<br>\t\t\t<br>Ctrl+End(마지막 문자로 이동)<br>\t\t\t<br>스페이스바(문자가 선택된 경우 확장 모드와 일반 모드 사이에서 전환)<br>\t\t\t<br>&#160;<br>\t\t\t<br>Microsoft Internet Explorer 탐색<br>\t\t\t<br>ㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡ<br>\t\t\t<br>Ctrl+B(즐겨찾기 구성 대화 상자 열기)<br>\t\t\t<br>Ctrl+E(검색 창 열기)<br>\t\t\t<br>Ctrl+F(찾기 유틸리티 시작)<br>\t\t\t<br>Ctrl+H(열어본 페이지 목록 창 열기)<br>\t\t\t<br>Ctrl+I(즐겨찾기 창 열기)<br>\t\t\t<br>Ctrl+L(열기 대화 상자 열기)<br>\t\t\t<br>Ctrl+N(브라우저의 다른 인스턴스를 같은 웹 주소로 시작)<br>\t\t\t<br>Ctrl+R(현재 웹 페이지 업데이트)<br>\t\t\t<br><br>\t\t\t출처: <<a href=\"https://www.dell.com/community/OS-%EC%86%8C%ED%94%84%ED%8A%B8%EC%9B%A8%EC%96%B4/%EC%A0%95%EB%B3%B4-MS%EC%97%90%EC%84%9C-%EA%B3%B5%EC%8B%9D%EC%9C%BC%EB%A1%9C-%EB%B0%9C%ED%91%9C%ED%95%9C-%EC%9C%88%EB%8F%84%EC%9A%B0-%EB%8B%A8%EC%B6%95%ED%82%A4-%EC%A0%95%EC%9D%98/td-p/5250970\" target=\"_blank\">https://www.dell.com/community/OS-%EC%86%8C%ED%94%84%ED%8A%B8%EC%9B%A8%EC%96%B4/%EC%A0%95%EB%B3%B4-MS%EC%97%90%EC%84%9C-%EA%B3%B5%EC%8B%9D%EC%9C%BC%EB%A1%9C-%EB%B0%9C%ED%91%9C%ED%95%9C-%EC%9C%88%EB%8F%84%EC%9A%B0-%EB%8B%A8%EC%B6%95%ED%82%A4-%EC%A0%95%EC%9D%98/td-p/5250970</a>> <br>\t\t\t<br><br>\t\t\t<br>윈도에서의 단축키 <br>\t\t\t<br>Shift + F10 : 선택한 항목의 바로 가기 메뉴 표시<br>\t\t\t<br>Alt + - : 프로그램의 시스템 메뉴 표시<br>\t\t\t<br><br>\t\t\t<br>대화상자에서의 단축키 <br>\t\t\t<br>Shift + Tab : 이전 옵션으로 이동<br>\t\t\t<br>Ctrl + Shift + Tab : 이전 탭으로 이동<br>\t\t\t<br>Ctrl + Tab : 다음 탭으로 이동<br>\t\t\t<br><br>\t\t\t<br>윈도 키를 이용한 단축키 <br>\t\t\t<br>시작키 + TAB : 작업 표시줄의 실행 중인 프로그램의 아이콘 선택<br>\t\t\t<br>시작키 + F: 시작 메뉴의 '찾기의 파일 또는 폴더' 실행<br>\t\t\t<br>시작키 + Ctrl + F : '찾기'의 컴퓨터 표시<br>\t\t\t<br>시작키 + R : 시작 메뉴의 '실행' 메뉴 실행<br>\t\t\t<br>시작키 + V : 클립보드 표시기 실행<br>\t\t\t<br>시작키 + Break : [시스템 등록 정보] 대화 상자 표시 <br>\t\t\t<br><br>\t\t\t<br>'탐색기/ 내 컴퓨터' 사용 단축키 <br>\t\t\t<br>Ctrl + Enter : 선택한 폴더를 내 컴퓨터를 이용해 새로운 창에서 연다.<br>\t\t\t<br>F3 : 파일 찾기 실행<br>\t\t\t<br>F6 : 좌우측 창간의 전환 <br>\t\t\t<br><br>\t\t\t<br>아웃룩 익스프레스 5.0의 주요 단축키 <br>\t\t\t<br>Ctrl+M : 메일 배달<br>\t\t\t<br>Ctrl+N : 새 메시지를 열거나 게시<br>\t\t\t<br>Ctrl+Shift+B : 주소록 열기<br>\t\t\t<br>Ctrl+R : 메시지 작성자에게 회신<br>\t\t\t<br>Ctrl+F : 메시지 전달<br>\t\t\t<br>Ctrl+Shift+R 또는 Ctrl+G(뉴스만) : 전체 회신<br>\t\t\t<br>Ctrl+I : 받은 편지함으로 이동<br>\t\t\t<br>Ctrl+> 또는 Ctrl+Shift+> : 목록에서 다음 메시지로 이동<br>\t\t\t<br>Ctrl+< 또는 Ctrl+Shift+< : 목록에서 이전 메시지로 이동<br>\t\t\t<br>Ctrl+U : 읽지 않은 다음 메일 메시지로 이동<br>\t\t\t<br>Ctrl+Shift+U : 읽지 않은 다음 뉴스 대화로 이동<br>\t\t\t<br>Ctrl+Shift+F : 메시지 찾기 <br>\t\t\t<br><br>\t\t\t출처: <<a href=\"https://firejune.com/377/%EC%9C%88%EB%8F%84+%EC%82%AC%EC%9A%A9%EC%8B%9C+%EB%AA%A8%EB%93%A0+%EB%8B%A8%EC%B6%95%ED%82%A4\" target=\"_blank\">https://firejune.com/377/%EC%9C%88%EB%8F%84+%EC%82%AC%EC%9A%A9%EC%8B%9C+%EB%AA%A8%EB%93%A0+%EB%8B%A8%EC%B6%95%ED%82%A4</a>> <br>\t\t\t<br><br>\t\t\t<br><br>\t\t<br>\t\t<br>\t\t\t<br>단축키 alt + shift 위아래화살표: 문단을 위아래로 옮기기",
    "w": 400
  }
];

let cards = [];
let moving = null, resizing = null;

function loadBoard() {
  const saved = localStorage.getItem(SAVE_KEY);
  cards = saved ? JSON.parse(saved) : DEFAULT_CARDS.map(c => ({...c}));
  renderCards();
  if (!saved) autoLayout();
}

function autoLayout() {
  const GAP = 14;
  const boardW = document.getElementById('board').offsetWidth;
  const cols = Math.max(1, Math.floor(boardW / 280));
  const colW = (boardW - GAP * (cols - 1)) / cols;
  const colHeights = new Array(cols).fill(0);
  const allCards = document.querySelectorAll('.card');
  const images = document.querySelectorAll('.card img');
  let loaded = 0;
  const total = images.length;

  function place() {
    allCards.forEach((el, i) => {
      const card = cards[i];
      const w = Math.min(card.w || colW, colW);
      let minCol = 0;
      for (let c = 1; c < cols; c++) if (colHeights[c] < colHeights[minCol]) minCol = c;
      card.x = minCol * (colW + GAP);
      card.y = colHeights[minCol];
      card.w = w;
      el.style.left = card.x + 'px';
      el.style.top = card.y + 'px';
      el.style.width = w + 'px';
      colHeights[minCol] = card.y + el.offsetHeight + GAP;
    });
    document.getElementById('board').style.minHeight = Math.max(...colHeights) + 100 + 'px';
    saveBoard();
  }

  if (total === 0) requestAnimationFrame(place);
  else images.forEach(img => {
    if (img.complete) { loaded++; if (loaded >= total) requestAnimationFrame(place); }
    else img.onload = img.onerror = () => { loaded++; if (loaded >= total) requestAnimationFrame(place); };
  });
}

function syncText() {
  document.querySelectorAll('.card').forEach(el => {
    const idx = +el.dataset.idx;
    if (cards[idx]?.type === 'text') {
      const t = el.querySelector('.text');
      if (t) cards[idx].content = t.innerHTML;
    }
  });
}

function saveBoard() {
  syncText();
  localStorage.setItem(SAVE_KEY, JSON.stringify(cards));
  document.getElementById('status').textContent = '저장됨 ' + new Date().toLocaleTimeString();
}

function renderCards() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  cards.forEach((card, i) => {
    const el = document.createElement('div');
    el.className = 'card';
    el.dataset.idx = i;
    if (card.x !== undefined) el.style.left = card.x + 'px';
    if (card.y !== undefined) el.style.top = card.y + 'px';
    if (card.w) el.style.width = card.w + 'px';

    el.addEventListener('mousedown', e => {
      if (e.target.closest('.text, a, .card-btn, .resize-handle, table')) return;
      e.preventDefault();
      moving = { idx: i, startX: e.clientX, startY: e.clientY, origX: card.x || 0, origY: card.y || 0 };
      el.classList.add('moving');
    });

    const actions = document.createElement('div');
    actions.className = 'card-actions';
    const delBtn = document.createElement('button');
    delBtn.className = 'card-btn'; delBtn.textContent = '×';
    delBtn.onclick = e => { e.stopPropagation(); if (confirm('삭제?')) { cards.splice(i, 1); renderCards(); saveBoard(); } };
    actions.appendChild(delBtn);
    el.appendChild(actions);

    if (card.type === 'text') {
      const text = document.createElement('div');
      text.className = 'text';
      text.contentEditable = true;
      text.innerHTML = card.content || '';
      text.addEventListener('blur', () => { card.content = text.innerHTML; saveBoard(); });
      el.appendChild(text);
    } else if (card.type === 'image') {
      const src = card.src.startsWith('http') || card.src.startsWith('data:') ? card.src : IMG_BASE + card.src;
      const img = document.createElement('img');
      img.src = src;
      img.alt = card.alt || '';
      img.loading = 'lazy';
      img.onerror = () => img.style.display = 'none';
      if (card.link) {
        const a = document.createElement('a'); a.href = card.link; a.target = '_blank';
        a.appendChild(img); el.appendChild(a);
      } else { el.appendChild(img); }
      if (card.caption) {
        const cap = document.createElement('div');
        cap.className = 'caption';
        cap.textContent = card.caption;
        el.appendChild(cap);
      }
    } else if (card.type === 'table') {
      const wrapper = document.createElement('div');
      wrapper.style.overflowX = 'auto';
      wrapper.innerHTML = card.html || '';
      el.appendChild(wrapper);
    }

    const rh = document.createElement('div');
    rh.className = 'resize-handle';
    rh.addEventListener('mousedown', e => {
      e.preventDefault(); e.stopPropagation();
      resizing = { idx: i, startX: e.clientX, startW: card.w || el.offsetWidth };
    });
    el.appendChild(rh);
    board.appendChild(el);
  });

  requestAnimationFrame(() => {
    let maxBottom = 0;
    document.querySelectorAll('.card').forEach(el => {
      const b = (parseFloat(el.style.top) || 0) + el.offsetHeight;
      if (b > maxBottom) maxBottom = b;
    });
    board.style.minHeight = (maxBottom + 100) + 'px';
  });
}

document.addEventListener('mousemove', e => {
  if (moving) {
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`);
    if (!el) return;
    const nx = moving.origX + e.clientX - moving.startX;
    const ny = moving.origY + e.clientY - moving.startY;
    el.style.left = nx + 'px';
    el.style.top = ny + 'px';
  }
  if (resizing) {
    const card = cards[resizing.idx];
    card.w = Math.max(100, resizing.startW + e.clientX - resizing.startX);
    const el = document.querySelector(`.card[data-idx="${resizing.idx}"]`);
    if (el) el.style.width = card.w + 'px';
  }
});

document.addEventListener('mouseup', e => {
  if (moving) {
    const card = cards[moving.idx];
    card.x = Math.max(0, moving.origX + e.clientX - moving.startX);
    card.y = Math.max(0, moving.origY + e.clientY - moving.startY);
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`);
    if (el) { el.classList.remove('moving'); }
    moving = null; saveBoard();
  }
  if (resizing) { resizing = null; saveBoard(); }
});

function addTextCard() {
  cards.push({ type: 'text', content: '', x: 50, y: window.scrollY + 100, w: 300 });
  renderCards();
  setTimeout(() => { const els = document.querySelectorAll('.card .text'); els[els.length - 1]?.focus(); }, 100);
}

function addImageCard() {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = 'image/*';
  input.onchange = e => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = () => { cards.push({ type: 'image', src: reader.result, x: 50, y: window.scrollY + 100, w: 240 }); renderCards(); saveBoard(); };
    reader.readAsDataURL(file);
  };
  input.click();
}

function resetLayout() {
  if (!confirm('자동 재배치합니다. 현재 위치가 변경됩니다.')) return;
  cards.forEach(c => { delete c.x; delete c.y; });
  renderCards(); autoLayout();
}

setInterval(saveBoard, 30000);
loadBoard();
</script>
</body>
</html>
