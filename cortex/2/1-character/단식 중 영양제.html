.card:hover .resize-handle { opacity: 0.6; }

m/blogs/vitamins-and-supplements/best-time-to-take-l-arginine\" target=\"_blank\">1</a><br>\t\t\t\t<br>\t\t\t\t<br>\t\t\t\t\t2<br>\t\t\t\t\t크레아틴<br>\t\t\t\t\t권장량<br>\t\t\t\t\t고강도 운동 시 ATP 생성을 촉진하여 근력과 파워를 5-45% 향상시키며, 특히 벤치프레스, 스쿼트 등의 웨이트 트레이닝에 효과적입니다<a href=\"https://www.healthline.com/nutrition/creatine-exercise-performance\" target=\"_blank\">2</a><br>\t\t\t\t<br>\t\t\t\t<br>\t\t\t\t\t3<br>\t\t\t\t\t블랙마카<br>\t\t\t\t\t1500mg<br>\t\t\t\t\t근력, 근지구력, 유연성, 파워 및 민첩성을 향상시키며, 특히 고강도 운동에 효과적입니다<a href=\"https://foodandnutritionresearch.net/index.php/fnr/article/view/10250\" target=\"_blank\">3</a><br>\t\t\t\t<br>\t\t\t<br>\t\t\t<br>운동 중 보충제<br>\t\t\t<br>\t\t\t\t<br>\t\t\t\t\t우선순위<br>\t\t\t\t\t보충제<br>\t\t\t\t\t섭취량<br>\t\t\t\t\t이유<br>\t\t\t\t<br>\t\t\t\t<br>\t\t\t\t\t1<br>\t\t\t\t\tBCAA<br>\t\t\t\t\t한 수푼<br>\t\t\t\t\t글리코겐 저장량을 보존하고 단백질 분해를 방지하며, 코르티솔 수치를 낮추어 근력 향상에 도움을 줍니다. 또한 세로토닌 생성을 억제하여 피로감을 줄이고 운동 지속 시간을 늘립니다<a href=\"https://us.myprotein.com/thezone/supplements/should-you-drink-bcaas-during-your-workout/\" target=\"_blank\">4</a><br>\t\t\t\t<br>\t\t\t<br>\t\t\t<br>운동 후 보충제<br>\t\t\t<br>\t\t\t\t<br>\t\t\t\t\t우선순위<br>\t\t\t\t\t보충제<br>\t\t\t\t\t섭취량<br>\t\t\t\t\t이유<br>\t\t\t\t<br>\t\t\t\t<br>\t\t\t\t\t1<br>\t\t\t\t\t신타-6<br>\t\t\t\t\t2스푼<br>\t\t\t\t\t빠르게 소화되는 유청 단백질과 천천히 소화되는 카제인, 달걀 단백질의 혼합물로, 즉각적인 영양 공급과 지속적인 아미노산 공급을 통해 근육 회복과 성장을 촉진합니다<a href=\"https://getcurex.com/weight-loss-blog/is-bsn-syntha-6-good-nutrition-benefits\" target=\"_blank\">5</a><br>\t\t\t\t<br>\t\t\t\t<br>\t\t\t\t\t2<br>\t\t\t\t\t글루타민<br>\t\t\t\t\t1스푼<br>\t\t\t\t\t근육 통증을 감소시키고 회복 시간을 단축시키며, 운동 후 근육의 에너지 저장소를 복원하는 데 중요한 역할을 합니다<a href=\"https://www.myprotein.com/thezone/supplements/best-time-to-take-glutamine/\" target=\"_blank\">6</a><br>\t\t\t\t<br>\t\t\t\t<br>\t\t\t\t\t3<br>\t\t\t\t\t타우린<br>\t\t\t\t\t1000mg<br>\t\t\t\t\t근육 염증과 산화 스트레스를 감소시켜 지연성 근육통(DOMS)을 줄이고, 세포막 안정화를 통해 근육 회복을 촉진합니다<a href=\"https://www.stack.com/a/how-taurine-can-help-improve-athletic-performance-and-recovery/\" target=\"_blank\">7</a><br>\t\t\t\t<br>\t\t\t<br>\t\t\t<br><br>\t\t\t출처: <<a href=\"https://www.perplexity.ai/search/yeoreo-gaji-yeongyangje-bocung-nWgoWb14S36DvAN3Cln_Fg\" target=\"_blank\">https://www.perplexity.ai/search/yeoreo-gaji-yeongyangje-bocung-nWgoWb14S36DvAN3Cln_Fg</a>> <br>\t\t\t<br><br>\t\t\t<br>힘을 보강하기 위한 영양제 3가지<br>\t\t\t<br>1. 크레아틴 모노하이드레이트<br>\t\t\t<br>크레아틴은 근력과 파워 향상에 가장 효과적인 보충제로 입증되었습니다<a href=\"https://www.strengthlog.com/the-10-best-bodybuilding-supplements-for-men-over-50/\" target=\"_blank\">2</a>.&#160;특히 50세 이상 성인을 대상으로 한 연구에서 크레아틴 보충제와 근력 운동을 병행했을 때 근력이 8% 더 향상되었습니다<a href=\"https://www.strengthlog.com/the-10-best-bodybuilding-supplements-for-men-over-50/\" target=\"_blank\">2</a>.&#160;또한 노인들은 평균적으로 1.3kg 이상의 제지방량(근육량)을 얻을 수 있었습니다<a href=\"https://www.strengthlog.com/the-10-best-bodybuilding-supplements-for-men-over-50/\" target=\"_blank\">2</a>.&#160;권장 복용량은 5-7일간 하루 20g의 로딩 기간 후 하루 5g의 유지 용량입니다<a href=\"https://athletetrainingandhealth.com/creatine-supplementation-for-adults-55/\" target=\"_blank\">9</a>.<br>\t\t\t<br>2. 베타-알라닌<br>\t\t\t<br>베타-알라닌은 근육 내 카르노신 수치를 높여 젖산 완충 작용을 하고 피로를 지연시킵니다<a href=\"https://www.strengthlog.com/the-10-best-bodybuilding-supplements-for-men-over-50/\" target=\"_blank\">2</a>.&#160;노화에 따라 카르노신 수준이 감소하기 때문에 고령자에게 특히 유익할 수 있습니다. 소규모 연구에서 베타-알라닌이 노인 운동선수의 근지구력과 훈련량을 향상시키는 것으로 나타났습니다<a href=\"https://www.strengthlog.com/the-10-best-bodybuilding-supplements-for-men-over-50/\" target=\"_blank\">2</a>.&#160;권장 복용량은 약 한 달 동안 하루 3.2-6.4g이며, 이후 유지 용량으로 하루 1.2g으로 줄일 수 있습니다<a href=\"https://www.strengthlog.com/the-10-best-bodybuilding-supplements-for-men-over-50/\" target=\"_blank\">2</a>.<br>\t\t\t<br>3. 질산염 보충제(비트루트)<br>\t\t\t<br>질산염 보충제는 최대 근력을 평균 5% 향상시킵니다<a href=\"https://www.strengthlog.com/the-10-best-bodybuilding-supplements-for-men-over-50/\" target=\"_blank\">2</a>.&#160;나이가 들수록 체내 산화질소 생성이 감소하기 때문에 고령자에게 더욱 유익합니다. 최근 체계적 검토에서 질산염 보충제가 노인의 신체 수행능력을 향상시키고 피로에 이르는 시간을 증가시킨다는 설득력 있는 증거가 발견되었습니다<a href=\"https://www.strengthlog.com/the-10-best-bodybuilding-supplements-for-men-over-50/\" target=\"_blank\">2</a>.&#160;또한 혈압 감소와 산화 스트레스 및 염증 관련 위험 요소를 줄이는 등 건강상의 이점도 제공합니다<a href=\"https://www.strengthlog.com/the-10-best-bodybuilding-supplements-for-men-over-50/\" target=\"_blank\">2</a>.<br>\t\t\t<br>근력 보존을 위한 영양제 3가지<br>\t\t\t<br>1. 단백질 보충제(유청 단백질)<br>\t\t\t<br>근육량 유지를 위해 가장 중요한 영양소는 단백질입니다<a href=\"https://www.transparentlabs.com/blogs/all/best-supplements-for-building-muscle-after-60\" target=\"_blank\">1</a>.&#160;연구에 따르면 50세 이상 성인은 근육을 보존하고 근육 단백질 합성을 촉진하기 위해 하루 체중 1kg당 1.2-2.2g의 단백질이 필요합니다<a href=\"https://www.transparentlabs.com/blogs/all/best-supplements-for-building-muscle-after-60\" target=\"_blank\">1</a>.&#160;유청 단백질은 빠르게 흡수되고 류신 함량이 높아 노인의 근육 단백질 합성을 더 효과적으로 자극합니다<a href=\"https://www.strengthlog.com/the-10-best-bodybuilding-supplements-for-men-over-50/\" target=\"_blank\">2</a>.&#160;식사만으로 충분한 단백질을 섭취하기 어려울 수 있으므로 보충제가 도움이 됩니다<a href=\"https://www.transparentlabs.com/blogs/all/best-supplements-for-building-muscle-after-60\" target=\"_blank\">1</a>.<br>\t\t\t<br>2. 비타민 D<br>\t\t\t<br>비타민 D는 근육 합성과 기능에 관여하며, 노화와 관련된 근육 손실(근감소증) 위험을 줄이는 데 중요합니다<a href=\"https://www.transparentlabs.com/blogs/all/best-supplements-for-building-muscle-after-60\" target=\"_blank\">1</a><a href=\"https://nativepath.com/blogs/supplements/vitamins-for-age-related-muscle-loss\" target=\"_blank\">4</a>.&#160;비타민 D 결핍은 노인에게 흔하며 근육량과 기능 감소와 관련이 있습니다<a href=\"https://nativepath.com/blogs/supplements/vitamins-for-age-related-muscle-loss\" target=\"_blank\">4</a>.&#160;연구에 따르면 비타민 D 보충은 특히 결핍된 사람들의 근력을 향상시킬 수 있습니다<a href=\"https://nativepath.com/blogs/supplements/vitamins-for-age-related-muscle-loss\" target=\"_blank\">4</a><a href=\"https://longevity.stanford.edu/lifestyle/2024/03/11/supplements-for-healthy-aging/\" target=\"_blank\">7</a>.&#160;50세 이상 노인에게는 일반적으로 하루 600 IU 이상의 비타민 D 보충이 권장됩니다<a href=\"https://www.transparentlabs.com/blogs/all/best-supplements-for-building-muscle-after-60\" target=\"_blank\">1</a>.<br>\t\t\t<br>3. HMB(베타-하이드록시-베타-메틸부티레이트)<br>\t\t\t<br>HMB는 근육 단백질 분해를 감소시켜 근력을 향상시키는 화학 물질입니다<a href=\"https://www.cgh.com.sg/news/tomorrows-medicine/supplements-diet-advice-can-improve-a-seniors-strength\" target=\"_blank\">8</a>.&#160;영양 부족 위험이 있는 노인에게 HMB를 제공한 연구에서 체중 증가, 영양 실조 위험 감소, 비타민 D 상태 개선 효과가 나타났습니다<a href=\"https://www.cgh.com.sg/news/tomorrows-medicine/supplements-diet-advice-can-improve-a-seniors-strength\" target=\"_blank\">8</a>.&#160;또한 침상 안정이나 움직임이 적은 노인의 경우 근육 분해를 줄이고 근력과 기능을 향상시키는 데 도움이 됩니다<a href=\"https://pmc.ncbi.nlm.nih.gov/articles/PMC9998208/\" target=\"_blank\">5</a>.<br>\t\t\t<br><br>\t\t\t출처: <<a href=\"https://www.perplexity.ai/search/yeoreo-gaji-yeongyangje-bocung-nWgoWb14S36DvAN3Cln_Fg\" target=\"_blank\">https://www.perplexity.ai/search/yeoreo-gaji-yeongyangje-bocung-nWgoWb14S36DvAN3Cln_Fg</a>> <br>\t\t<br>\t\t<br>\t\t\t<br>DHA (도코사헥사엔산)",
    "w": 400
  }
];

let cards = [];
let moving = null, resizing = null;

function loadBoard() {
  const saved = localStorage.getItem(SAVE_KEY);
  cards = saved ? JSON.parse(saved) : DEFAULT_CARDS.map(c => ({...c}));
  renderCards();
  if (!saved) autoLayout();
}

function autoLayout() {
  const GAP = 14;
  const boardW = document.getElementById('board').offsetWidth;
  const cols = Math.max(1, Math.floor(boardW / 280));
  const colW = (boardW - GAP * (cols - 1)) / cols;
  const colHeights = new Array(cols).fill(0);
  const allCards = document.querySelectorAll('.card');
  const images = document.querySelectorAll('.card img');
  let loaded = 0;
  const total = images.length;

  function place() {
    allCards.forEach((el, i) => {
      const card = cards[i];
      const w = Math.min(card.w || colW, colW);
      let minCol = 0;
      for (let c = 1; c < cols; c++) if (colHeights[c] < colHeights[minCol]) minCol = c;
      card.x = minCol * (colW + GAP);
      card.y = colHeights[minCol];
      card.w = w;
      el.style.left = card.x + 'px';
      el.style.top = card.y + 'px';
      el.style.width = w + 'px';
      colHeights[minCol] = card.y + el.offsetHeight + GAP;
    });
    document.getElementById('board').style.minHeight = Math.max(...colHeights) + 100 + 'px';
    saveBoard();
  }

  if (total === 0) requestAnimationFrame(place);
  else images.forEach(img => {
    if (img.complete) { loaded++; if (loaded >= total) requestAnimationFrame(place); }
    else img.onload = img.onerror = () => { loaded++; if (loaded >= total) requestAnimationFrame(place); };
  });
}

function syncText() {
  document.querySelectorAll('.card').forEach(el => {
    const idx = +el.dataset.idx;
    if (cards[idx]?.type === 'text') {
      const t = el.querySelector('.text');
      if (t) cards[idx].content = t.innerHTML;
    }
  });
}

function saveBoard() {
  syncText();
  localStorage.setItem(SAVE_KEY, JSON.stringify(cards));
  document.getElementById('status').textContent = '저장됨 ' + new Date().toLocaleTimeString();
}

function renderCards() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  cards.forEach((card, i) => {
    const el = document.createElement('div');
    el.className = 'card';
    el.dataset.idx = i;
    if (card.x !== undefined) el.style.left = card.x + 'px';
    if (card.y !== undefined) el.style.top = card.y + 'px';
    if (card.w) el.style.width = card.w + 'px';

    el.addEventListener('mousedown', e => {
      if (e.target.closest('.text, a, .card-btn, .resize-handle, table')) return;
      e.preventDefault();
      moving = { idx: i, startX: e.clientX, startY: e.clientY, origX: card.x || 0, origY: card.y || 0 };
      el.classList.add('moving');
    });

    const actions = document.createElement('div');
    actions.className = 'card-actions';
    const delBtn = document.createElement('button');
    delBtn.className = 'card-btn'; delBtn.textContent = '×';
    delBtn.onclick = e => { e.stopPropagation(); if (confirm('삭제?')) { cards.splice(i, 1); renderCards(); saveBoard(); } };
    actions.appendChild(delBtn);
    el.appendChild(actions);

    if (card.type === 'text') {
      const text = document.createElement('div');
      text.className = 'text';
      text.contentEditable = true;
      text.innerHTML = card.content || '';
      text.addEventListener('blur', () => { card.content = text.innerHTML; saveBoard(); });
      el.appendChild(text);
    } else if (card.type === 'image') {
      const src = card.src.startsWith('http') || card.src.startsWith('data:') ? card.src : IMG_BASE + card.src;
      const img = document.createElement('img');
      img.src = src;
      img.alt = card.alt || '';
      img.loading = 'lazy';
      img.onerror = () => img.style.display = 'none';
      if (card.link) {
        const a = document.createElement('a'); a.href = card.link; a.target = '_blank';
        a.appendChild(img); el.appendChild(a);
      } else { el.appendChild(img); }
      if (card.caption) {
        const cap = document.createElement('div');
        cap.className = 'caption';
        cap.textContent = card.caption;
        el.appendChild(cap);
      }
    } else if (card.type === 'table') {
      const wrapper = document.createElement('div');
      wrapper.style.overflowX = 'auto';
      wrapper.innerHTML = card.html || '';
      el.appendChild(wrapper);
    }

    const rh = document.createElement('div');
    rh.className = 'resize-handle';
    rh.addEventListener('mousedown', e => {
      e.preventDefault(); e.stopPropagation();
      resizing = { idx: i, startX: e.clientX, startW: card.w || el.offsetWidth };
    });
    el.appendChild(rh);
    board.appendChild(el);
  });

  requestAnimationFrame(() => {
    let maxBottom = 0;
    document.querySelectorAll('.card').forEach(el => {
      const b = (parseFloat(el.style.top) || 0) + el.offsetHeight;
      if (b > maxBottom) maxBottom = b;
    });
    board.style.minHeight = (maxBottom + 100) + 'px';
  });
}

document.addEventListener('mousemove', e => {
  if (moving) {
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`);
    if (!el) return;
    const nx = moving.origX + e.clientX - moving.startX;
    const ny = moving.origY + e.clientY - moving.startY;
    el.style.left = nx + 'px';
    el.style.top = ny + 'px';
  }
  if (resizing) {
    const card = cards[resizing.idx];
    card.w = Math.max(100, resizing.startW + e.clientX - resizing.startX);
    const el = document.querySelector(`.card[data-idx="${resizing.idx}"]`);
    if (el) el.style.width = card.w + 'px';
  }
});

document.addEventListener('mouseup', e => {
  if (moving) {
    const card = cards[moving.idx];
    card.x = Math.max(0, moving.origX + e.clientX - moving.startX);
    card.y = Math.max(0, moving.origY + e.clientY - moving.startY);
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`);
    if (el) { el.classList.remove('moving'); }
    moving = null; saveBoard();
  }
  if (resizing) { resizing = null; saveBoard(); }
});

function addTextCard() {
  cards.push({ type: 'text', content: '', x: 50, y: window.scrollY + 100, w: 300 });
  renderCards();
  setTimeout(() => { const els = document.querySelectorAll('.card .text'); els[els.length - 1]?.focus(); }, 100);
}

function addImageCard() {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = 'image/*';
  input.onchange = e => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = () => { cards.push({ type: 'image', src: reader.result, x: 50, y: window.scrollY + 100, w: 240 }); renderCards(); saveBoard(); };
    reader.readAsDataURL(file);
  };
  input.click();
}

function resetLayout() {
  if (!confirm('자동 재배치합니다. 현재 위치가 변경됩니다.')) return;
  cards.forEach(c => { delete c.x; delete c.y; });
  renderCards(); autoLayout();
}

setInterval(saveBoard, 30000);
loadBoard();
</script>
