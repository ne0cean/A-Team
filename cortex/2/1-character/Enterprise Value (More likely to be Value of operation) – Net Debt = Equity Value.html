<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Enterprise Value (More likely to be Value of operation) – Net Debt = Equity Value</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #1e1e1e;
  color: #e0e0e0;
  font-family: 'Segoe UI', -apple-system, sans-serif;
  font-size: 15px;
  line-height: 1.6;
  padding: 20px 30px 60px;
  overflow-x: hidden;
}
a { color: #6cb0f6; text-decoration: none; }
a:hover { text-decoration: underline; }
.title-bar {
  background: #3a3a5c;
  display: inline-block;
  padding: 6px 16px;
  font-size: 22px;
  font-weight: bold;
  color: #fff;
  margin-bottom: 4px;
}
.date { color: #999; font-size: 13px; margin-bottom: 20px; }
.board { position: relative; }
.card {
  background: #2a2a2a;
  border: 1px solid #3a3a3a;
  border-radius: 8px;
  padding: 12px;
  position: absolute;
  cursor: grab;
  transition: box-shadow 0.15s;
  overflow: hidden;
}
.card:hover { box-shadow: 0 0 0 1px #58a6ff; z-index: 10; }
.card.moving { opacity: 0.8; box-shadow: 0 4px 24px rgba(0,0,0,0.6); z-index: 100; cursor: grabbing; }
.card img { width: 100%; border-radius: 4px; display: block; }
.card .caption { font-size: 12px; color: #888; margin-top: 6px; }
.card .text { outline: none; min-height: 20px; white-space: pre-wrap; word-break: break-word; }
.card .text:focus { background: rgba(255,255,255,0.05); border-radius: 4px; padding: 4px; }
.card .text:empty::before { content: '텍스트 입력...'; color: #555; }
.card table { border-collapse: collapse; width: 100%; font-size: 13px; }
.card table td, .card table th { border: 1px solid #444; padding: 4px 8px; vertical-align: top; }
.card table th { background: #333; color: #ccc; }
.card-actions { position: absolute; top: 4px; right: 4px; display: none; gap: 4px; }
.card:hover .card-actions { display: flex; }
.card-btn { background: #333; border: 1px solid #555; color: #ccc; border-radius: 4px; padding: 2px 6px; font-size: 11px; cursor: pointer; }
.card-btn:hover { background: #444; color: #fff; }
.resize-handle { position: absolute; bottom: 0; right: 0; width: 16px; height: 16px; cursor: se-resize; opacity: 0; }
.card:hover .resize-handle { opacity: 0.6; }
.resize-handle::after { content: ''; position: absolute; bottom: 3px; right: 3px; width: 8px; height: 8px; border-right: 2px solid #666; border-bottom: 2px solid #666; }
.toolbar { position: fixed; bottom: 0; left: 0; right: 0; background: #161b22; border-top: 1px solid #30363d; padding: 8px 20px; display: flex; gap: 12px; align-items: center; z-index: 200; }
.toolbar button { background: #21262d; border: 1px solid #30363d; color: #e0e0e0; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; }
.toolbar button:hover { background: #30363d; }
.toolbar .status { color: #8b949e; font-size: 12px; margin-left: auto; }
.highlight-red { color: #ff6b6b; }
.highlight-blue { color: #6cb0f6; }
</style>
</head>
<body>
<div class="title-bar">Enterprise Value (More likely to be Value of operation) – Net Debt = Equity Value</div>
<div class="date">Invalid Date</div>
<div class="board" id="board"></div>
<div class="toolbar">
  <button onclick="addTextCard()">+ 텍스트</button>
  <button onclick="addImageCard()">+ 이미지</button>
  <button onclick="saveBoard()">💾 저장</button>
  <button onclick="resetLayout()">↺ 재배치</button>
  <span class="status" id="status">Ready</span>
</div>
<script>
const SAVE_KEY = 'board-Enterprise-Value-More-likely-to-be-Value';
const IMG_BASE = '../../attachments/';
const DEFAULT_CARDS = [
  {
    "type": "text",
    "content": "Enterprise Value (More likely to be Value of operation)&#160;– Net Debt = Equity Value<br>\t\t\t\t<br>Enterprise Value <br>\t\t\t\t<br>= Net Capital - Net Cash<br>\t\t\t\t<br>= 시가총액 + 순부채Net Debt(장/단기 차입금)<br>\t\t\t\t<br>Net Debt = 차입금(Short Term Investments) + 현금 및 현금 등가물(Cash And Cash Equivalents)<br>\t\t\t\t<br>Short/Current Long Term Debt<br>\t\t\t\t<br>Net Cash = <br>\t\t\t\t<br>EBITDA=('손익계산서'에서 영업이익) + ('현금흐름표'에서 감가상각비 + 무형자산상각비)<br>\t\t\t\t<br>Operating Income or Loss + <br>\t\t\t\t<br>영업이익 + 감가상각비  + 무형자산상각비<br>\t\t\t\t<br><br>\t\t\t\t<br>주식가치(Equity Value) = 상장기업의 경우에는 ‘시가총액’, 비상장기업의 경우 ‘마켓캡(Market Cap.)’<br>\t\t\t\t<br><br>\t\t\t\t<br>Enterprise Value = Firm Value<br>\t\t\t\t<br>기업가치(EV) = Equity Value - (&#177;Net Debt 총차입금 - 현금성 자산)<br>\t\t\t\t<br>기업을 통째로 사는데 들어가는 비용을 기업의 가치로 산정하는 방법<br>\t\t\t\t<br>기업가치(EV) - 순부채(&#177;Net Debt) = 주식가치(Equity Value)<br>\t\t\t\t<br>순부채(Net Debt) = 이자부담차입금(IBD, Interest Bearing Debt) – 현금자산<br>\t\t\t\t<br>기업이 보유한 현금과 현금 등가물(Cash And Cash Equivalents, 예금 등 즉시 현금화가 가능한 자산)로 차입금을 상환했을 때 남는 차입금<br>\t\t\t\t<br><br>\t\t\t\t<br>비교 가치평가<br>\t\t\t\t<br>PBR<br>\t\t\t\t<br>PER<br>\t\t\t\t<br>EV/Rev.<br>\t\t\t\t<br>EV/EBITDA<br>\t\t\t\t<br>EV/EBITDA 비율은 수익성지표인 주가수익비율(PER)과 현금흐름을 나타내는 지표인 주가현금흐름비율(PCR)을 보완하는 새로운 지표로 선진국에서 기업가치를 평가할 때 주로 이용하는 적정주가 평가모델이다. <br>\t\t\t\t<br>기업가치가 기업에서 벌어들이는 현금흐름 대비 몇배인지<br>\t\t\t\t<br><br>\t\t\t\t<br>- <a href=\"https://namu.wiki/w/EBITDA\" target=\"_blank\">EBITDA</a>&#160;(Earnings Before Interest, Taxes, Depreciation and Amortization): 세금&#183;이자지급전이익. 계산 방식은 세금과 이자를 내지 않고 감가상각도 하지 않은 상태에서의 이익. (영업이익 + 감가상각비). 현금흐름대용치로 많이 쓰인다.<br>\t\t\t\t<br>이자비용(Interest), 세금(Tax),&#160;<a href=\"https://namu.wiki/w/%EA%B0%90%EA%B0%80%EC%83%81%EA%B0%81\" target=\"_blank\">감가상각</a>&#160;비용(Depreciation & Amortization) 등을 빼기 전 순이익<br>\t\t\t\t<br><br>\t\t\t\t<br>\t\t\t\t<br><br>\t\t\t\t<br>손익계산서에서 당기순이익에 이자비용, 세금, 유무형 감가상각 비용을 더하면 구할 수 있는데, 흔히들 기업의 실제 현금 창출력을 나타내는 지표로 사용<br>\t\t\t\t<br><br>\t\t\t\t출처: <<a href=\"https://namu.wiki/w/EBITDA\" target=\"_blank\">https://namu.wiki/w/EBITDA</a>> <br>\t\t\t\t<br><br>\t\t\t\t<br>\t\t\t\t<br><br>\t\t\t\t<br><br>\t\t\t\t<br>PSR<br>\t\t\t\t<br><a href=\"http://m.blog.daum.net/stonefox72/21\" target=\"_blank\">http://m.blog.daum.net/stonefox72/21</a><br>\t\t\t\t<br><br>\t\t\t\t<br>LTM(Last Twelve Month)<br>\t\t\t\t<br>TTM(Trailing <br>\t\t\t\t<br>ttm = trailing twelve months = 지난 12개월<br>\t\t\t\t<br>yoy = year over year = 지난 해와 비교했을때<br>\t\t\t\t<br>mrq = most recent quarter = 가장 최근 분기<br>\t\t\t\t<br><br>\t\t\t\t<br><br>\t\t\t\t<br>순부채(Net debt)<br>\t\t\t\t<br><a href=\"http://seoworld.net/wp/?p=772\" target=\"_blank\">http://seoworld.net/wp/?p=772</a><br>\t\t\t\t<br>Net debt = Interest bearing debt – Non-operating assets<br>\t\t\t\t<br>Interest bearing debt는 장/단기를 모두 포함하고, Non-operating assets은 Cash와 Cash equivalent를 포함하여, 아래와 같은 식이 완성된다.<br>\t\t\t\t<br>Net debt = Interest bearing&#160; Long term debt + Interest bearing&#160; current liabilities -Cash – Cash equivalent<br>\t\t\t\t<br>주의해야 할 점은 Cash equivalent에서 모든 항목을 빼야 하는 것이 아니라, 그 중 ‘영업자산(Operating assets)’이 담보로 잠겨져 있는 것은 제외하고 빼야 한다. 예를 들면, 휴대폰을 생산하는 기계를 담보로 500억원을 빌려서, 500억원을 통장에 넣어두었을 때, Value가 1,000억원으로 잡힐 수도 있다는 것이다. 담보로 빌린 500억원은 Net debt에 그대로 포함이 되어야 하지, Cash equivalent로 빼주면 안된다.<br>\t\t\t\t<br><br>\t\t\t\t<br>현금 + 단기금융 + 단기차입<br>\t\t\t\t<br><br>\t\t\t\t<br>EBITDA= ('손익계산서'에서 영업이익) + ('현금흐름표'에서 감가상각비&#160;+ 무형자산상각비)<br>\t\t\t\t<br><br>\t\t\t\t<br><br>\t\t\t\t<br>상대가치평가법<br>\t\t\t\t<br><a href=\"https://jjisso.tistory.com/178\" target=\"_blank\">https://jjisso.tistory.com/178</a><br>\t\t\t\t<br><br>\t\t\t\t<br>[출처] EBITDA 구하는 방법(실무)|작성자 탐형쓰<br>\t\t\t\t<br>문제는 감가상각비인데, 많은 이들이 감가상각비를 손익계산서에서 따 오는 실수를 범한다.(나도 처음에는 그랬다.)<br>\t\t\t\t<br><br>\t\t\t\t<br> <br>\t\t\t\t<br><br>\t\t\t\t<br>다시 말하자면, EBITDA 구할 때 더해주는 감가상각비는 현금흐름표상에 나와있는 감가상각비와 무형자산상각비를 사용해야 한다.<br>\t\t\t\t<br><br>\t\t\t\t<br>왜냐하면 손익계산서에 나와있는 감가상각비는 판매관리비에 반영된 감가상각비만 보이는데<br>\t\t\t\t<br><br>\t\t\t\t<br>실제로는 매출원가 속에도 감가상각비가 숨어있기 때문이다.<br>\t\t\t\t<br><br>\t\t\t\t<br>(제조원가명세서가 있다면 매출원가 속에 숨어있는 감가상각비를 찾아낼 수 있을 것이다.)<br>\t\t\t\t<br><br>\t\t\t\t<br>결국 손익계산서의 감가상각비만 더하면 EBITDA를 과소평가하게 되는 결과를 가져오게 된다.<br>\t\t\t\t<br><br>\t\t\t\t<br> <br>\t\t\t\t<br><br>\t\t\t\t<br>여기저기 돌아다니다 보면 그냥 영업이익+감가상각비예요~ 세전이익+대손상각+퇴직급여충당금전입액-퇴직금지급액+감가상각비예요~ 이러는데 감가상각비를 어디서 구해 쓰는지는 안 가르쳐 주는 것 같더라. 이론적으로는 맞는데 단순히 '감가상각비'...그러다 보니 현금흐름표 수치를 안 쓰고 눈에 쉽게 보이는 손익계산서 수치를 쓰는 케이스를 많이 봤다.<br>\t\t\t\t<br><br>\t\t\t\t<br>감가상각비, 무형자산상각비 수치는 현금흐름표에서 써야 한다는 것을 잊지 마시라.<br>\t\t\t\t<br><br>\t\t\t\t<br><br>\t\t\t\t<br>EBITDA마진율 = EBITDA / 매출액<br>\t\t\t\t<br><br>\t\t\t<br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t출처: <<a href=\"https://namu.wiki/w/EBITDA\" target=\"_blank\">https://namu.wiki/w/EBITDA</a>>",
    "w": 400
  }
];

let cards = [];
let moving = null, resizing = null;

function loadBoard() {
  const saved = localStorage.getItem(SAVE_KEY);
  cards = saved ? JSON.parse(saved) : DEFAULT_CARDS.map(c => ({...c}));
  renderCards();
  if (!saved) autoLayout();
}

function autoLayout() {
  const GAP = 14;
  const boardW = document.getElementById('board').offsetWidth;
  const cols = Math.max(1, Math.floor(boardW / 280));
  const colW = (boardW - GAP * (cols - 1)) / cols;
  const colHeights = new Array(cols).fill(0);
  const allCards = document.querySelectorAll('.card');
  const images = document.querySelectorAll('.card img');
  let loaded = 0;
  const total = images.length;

  function place() {
    allCards.forEach((el, i) => {
      const card = cards[i];
      const w = Math.min(card.w || colW, colW);
      let minCol = 0;
      for (let c = 1; c < cols; c++) if (colHeights[c] < colHeights[minCol]) minCol = c;
      card.x = minCol * (colW + GAP);
      card.y = colHeights[minCol];
      card.w = w;
      el.style.left = card.x + 'px';
      el.style.top = card.y + 'px';
      el.style.width = w + 'px';
      colHeights[minCol] = card.y + el.offsetHeight + GAP;
    });
    document.getElementById('board').style.minHeight = Math.max(...colHeights) + 100 + 'px';
    saveBoard();
  }

  if (total === 0) requestAnimationFrame(place);
  else images.forEach(img => {
    if (img.complete) { loaded++; if (loaded >= total) requestAnimationFrame(place); }
    else img.onload = img.onerror = () => { loaded++; if (loaded >= total) requestAnimationFrame(place); };
  });
}

function syncText() {
  document.querySelectorAll('.card').forEach(el => {
    const idx = +el.dataset.idx;
    if (cards[idx]?.type === 'text') {
      const t = el.querySelector('.text');
      if (t) cards[idx].content = t.innerHTML;
    }
  });
}

function saveBoard() {
  syncText();
  localStorage.setItem(SAVE_KEY, JSON.stringify(cards));
  document.getElementById('status').textContent = '저장됨 ' + new Date().toLocaleTimeString();
}

function renderCards() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  cards.forEach((card, i) => {
    const el = document.createElement('div');
    el.className = 'card';
    el.dataset.idx = i;
    if (card.x !== undefined) el.style.left = card.x + 'px';
    if (card.y !== undefined) el.style.top = card.y + 'px';
    if (card.w) el.style.width = card.w + 'px';

    el.addEventListener('mousedown', e => {
      if (e.target.closest('.text, a, .card-btn, .resize-handle, table')) return;
      e.preventDefault();
      moving = { idx: i, startX: e.clientX, startY: e.clientY, origX: card.x || 0, origY: card.y || 0 };
      el.classList.add('moving');
    });

    const actions = document.createElement('div');
    actions.className = 'card-actions';
    const delBtn = document.createElement('button');
    delBtn.className = 'card-btn'; delBtn.textContent = '×';
    delBtn.onclick = e => { e.stopPropagation(); if (confirm('삭제?')) { cards.splice(i, 1); renderCards(); saveBoard(); } };
    actions.appendChild(delBtn);
    el.appendChild(actions);

    if (card.type === 'text') {
      const text = document.createElement('div');
      text.className = 'text';
      text.contentEditable = true;
      text.innerHTML = card.content || '';
      text.addEventListener('blur', () => { card.content = text.innerHTML; saveBoard(); });
      el.appendChild(text);
    } else if (card.type === 'image') {
      const src = card.src.startsWith('http') || card.src.startsWith('data:') ? card.src : IMG_BASE + card.src;
      const img = document.createElement('img');
      img.src = src;
      img.alt = card.alt || '';
      img.loading = 'lazy';
      img.onerror = () => img.style.display = 'none';
      if (card.link) {
        const a = document.createElement('a'); a.href = card.link; a.target = '_blank';
        a.appendChild(img); el.appendChild(a);
      } else { el.appendChild(img); }
      if (card.caption) {
        const cap = document.createElement('div');
        cap.className = 'caption';
        cap.textContent = card.caption;
        el.appendChild(cap);
      }
    } else if (card.type === 'table') {
      const wrapper = document.createElement('div');
      wrapper.style.overflowX = 'auto';
      wrapper.innerHTML = card.html || '';
      el.appendChild(wrapper);
    }

    const rh = document.createElement('div');
    rh.className = 'resize-handle';
    rh.addEventListener('mousedown', e => {
      e.preventDefault(); e.stopPropagation();
      resizing = { idx: i, startX: e.clientX, startW: card.w || el.offsetWidth };
    });
    el.appendChild(rh);
    board.appendChild(el);
  });

  requestAnimationFrame(() => {
    let maxBottom = 0;
    document.querySelectorAll('.card').forEach(el => {
      const b = (parseFloat(el.style.top) || 0) + el.offsetHeight;
      if (b > maxBottom) maxBottom = b;
    });
    board.style.minHeight = (maxBottom + 100) + 'px';
  });
}

document.addEventListener('mousemove', e => {
  if (moving) {
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`);
    if (!el) return;
    const nx = moving.origX + e.clientX - moving.startX;
    const ny = moving.origY + e.clientY - moving.startY;
    el.style.left = nx + 'px';
    el.style.top = ny + 'px';
  }
  if (resizing) {
    const card = cards[resizing.idx];
    card.w = Math.max(100, resizing.startW + e.clientX - resizing.startX);
    const el = document.querySelector(`.card[data-idx="${resizing.idx}"]`);
    if (el) el.style.width = card.w + 'px';
  }
});

document.addEventListener('mouseup', e => {
  if (moving) {
    const card = cards[moving.idx];
    card.x = Math.max(0, moving.origX + e.clientX - moving.startX);
    card.y = Math.max(0, moving.origY + e.clientY - moving.startY);
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`);
    if (el) { el.classList.remove('moving'); }
    moving = null; saveBoard();
  }
  if (resizing) { resizing = null; saveBoard(); }
});

function addTextCard() {
  cards.push({ type: 'text', content: '', x: 50, y: window.scrollY + 100, w: 300 });
  renderCards();
  setTimeout(() => { const els = document.querySelectorAll('.card .text'); els[els.length - 1]?.focus(); }, 100);
}

function addImageCard() {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = 'image/*';
  input.onchange = e => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = () => { cards.push({ type: 'image', src: reader.result, x: 50, y: window.scrollY + 100, w: 240 }); renderCards(); saveBoard(); };
    reader.readAsDataURL(file);
  };
  input.click();
}

function resetLayout() {
  if (!confirm('자동 재배치합니다. 현재 위치가 변경됩니다.')) return;
  cards.forEach(c => { delete c.x; delete c.y; });
  renderCards(); autoLayout();
}

setInterval(saveBoard, 30000);
loadBoard();
</script>
</body>
</html>
