<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>공정거래법 손자회사 규제</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #1e1e1e;
  color: #e0e0e0;
  font-family: 'Segoe UI', -apple-system, sans-serif;
  font-size: 15px;
  line-height: 1.6;
  padding: 20px 30px 60px;
  overflow-x: hidden;
}
a { color: #6cb0f6; text-decoration: none; }
a:hover { text-decoration: underline; }
.title-bar {
  background: #3a3a5c;
  display: inline-block;
  padding: 6px 16px;
  font-size: 22px;
  font-weight: bold;
  color: #fff;
  margin-bottom: 4px;
}
.date { color: #999; font-size: 13px; margin-bottom: 20px; }
.board { position: relative; }
.card {
  background: #2a2a2a;
  border: 1px solid #3a3a3a;
  border-radius: 8px;
  padding: 12px;
  position: absolute;
  cursor: grab;
  transition: box-shadow 0.15s;
  overflow: hidden;
}
.card:hover { box-shadow: 0 0 0 1px #58a6ff; z-index: 10; }
.card.moving { opacity: 0.8; box-shadow: 0 4px 24px rgba(0,0,0,0.6); z-index: 100; cursor: grabbing; }
.card img { width: 100%; border-radius: 4px; display: block; }
.card .caption { font-size: 12px; color: #888; margin-top: 6px; }
.card .text { outline: none; min-height: 20px; white-space: pre-wrap; word-break: break-word; }
.card .text:focus { background: rgba(255,255,255,0.05); border-radius: 4px; padding: 4px; }
.card .text:empty::before { content: '텍스트 입력...'; color: #555; }
.card table { border-collapse: collapse; width: 100%; font-size: 13px; }
.card table td, .card table th { border: 1px solid #444; padding: 4px 8px; vertical-align: top; }
.card table th { background: #333; color: #ccc; }
.card-actions { position: absolute; top: 4px; right: 4px; display: none; gap: 4px; }
.card:hover .card-actions { display: flex; }
.card-btn { background: #333; border: 1px solid #555; color: #ccc; border-radius: 4px; padding: 2px 6px; font-size: 11px; cursor: pointer; }
.card-btn:hover { background: #444; color: #fff; }
.resize-handle { position: absolute; bottom: 0; right: 0; width: 16px; height: 16px; cursor: se-resize; opacity: 0; }
.card:hover .resize-handle { opacity: 0.6; }
.resize-handle::after { content: ''; position: absolute; bottom: 3px; right: 3px; width: 8px; height: 8px; border-right: 2px solid #666; border-bottom: 2px solid #666; }
.toolbar { position: fixed; bottom: 0; left: 0; right: 0; background: #161b22; border-top: 1px solid #30363d; padding: 8px 20px; display: flex; gap: 12px; align-items: center; z-index: 200; }
.toolbar button { background: #21262d; border: 1px solid #30363d; color: #e0e0e0; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; }
.toolbar button:hover { background: #30363d; }
.toolbar .status { color: #8b949e; font-size: 12px; margin-left: auto; }
.highlight-red { color: #ff6b6b; }
.highlight-blue { color: #6cb0f6; }
</style>
</head>
<body>
<div class="title-bar">공정거래법 손자회사 규제</div>
<div class="date">Invalid Date</div>
<div class="board" id="board"></div>
<div class="toolbar">
  <button onclick="addTextCard()">+ 텍스트</button>
  <button onclick="addImageCard()">+ 이미지</button>
  <button onclick="saveBoard()">💾 저장</button>
  <button onclick="resetLayout()">↺ 재배치</button>
  <span class="status" id="status">Ready</span>
</div>
<script>
const SAVE_KEY = 'board-공정거래법-손자회사-규제';
const IMG_BASE = '../../attachments/';
const DEFAULT_CARDS = [
  {
    "type": "text",
    "content": "공정거래법 손자회사 규제<br>\t\t<br>\t\t<br>\t<br>\t<br>\t\t<br>\t\t\t<br>제8조의2(지주 등의 행위제한 등)&#160;①이 조에서 사용하는 용어의 정의는 다음과 같다. &#160;<신설 2004. 12. 31., 2007. 8. 3.><br>\t\t\t<br><br>\t\t\t<br>1. \"공동출자법인\"이라 함은 경영에 영향을 미칠 수 있는 상당한 지분을 소유하고 있는 2인 이상의 출자자(특수관계인의 관계에 있는 출자자 중&#160;<a href=\"http://javascript:;\" target=\"_blank\">대통령령</a>이 정하는 자 외의 자는 1인으로 본다)가 계약 또는 이에 준하는 방법으로 출자지분의 양도를 현저히 제한하고 있어 출자자간 지분변동이 어려운 법인을 말한다.<br>\t\t\t<br>2. \"벤처지주회사\"라 함은&#160;<a href=\"http://javascript:;\" target=\"_blank\">「벤처기업육성에 관한 특별조치법」</a>&#160;<a href=\"http://javascript:;\" target=\"_blank\">제2조</a>(정의)제1항에 따른 벤처기업(이하 \"벤처기업\"이라 한다)을 자회사로 하는 지주회사로서&#160;<a href=\"http://javascript:;\" target=\"_blank\">대통령령</a>이 정하는 기준에 해당하는 지주회사를 말한다.<br>\t\t\t<br>②지주회사는 다음 각 호의 어느 하나에 해당하는 행위를 하여서는 아니된다. &#160;<개정 2001. 1. 16., 2002. 1. 26., 2004. 12. 31., 2007. 4. 13., 2007. 8. 3., 2013. 4. 5., 2013. 5. 28.><br>\t\t\t<br>1. 자본총액(대차대조표상의 자산총액에서 부채액을 뺀 금액을 말한다. 이하 같다)의 2배를 초과하는 부채액을 보유하는 행위. 다만, 지주회사로 전환하거나 설립될 당시에 자본총액의 2배를 초과하는 부채액을 보유하고 있는 때에는 지주회사로 전환하거나 설립된 날부터 2년간은 자본총액의 2배를 초과하는 부채액을 보유할 수 있다.<br>\t\t\t<br>가. 삭제 &#160;<2004. 12. 31.><br>\t\t\t<br>나. 삭제 &#160;<2004. 12. 31.><br>\t\t\t<br>다. 삭제 &#160;<2004. 12. 31.><br>\t\t\t<br><br>\t\t\t<br>2. 자회사의 주식을 그 자회사 발행주식총수의 100분의 40<a href=\"http://javascript:;\" target=\"_blank\">자회사가&#160;[「자본시장과 금융투자업에 관한 법률」</a>에 따른 주권상장법인(이하 \"상장법인\"이라 한다)인 경우, 주식 소유의 분산요건 등 상장요건이&#160;<a href=\"http://javascript:;\" target=\"_blank\">같은 법</a>에 따른 증권시장으로서&#160;<a href=\"http://javascript:;\" target=\"_blank\">대통령령</a>으로 정하는 국내 증권시장의 상장요건에 상당하는 것으로 공정거래위원회가 고시하는 국외 증권거래소에 상장된 법인(이하 \"국외상장법인\"이라 한다)인 경우, 공동출자법인인 경우 또는 벤처지주회사의 자회사인 경우에는 100분의 20으로 한다. 이하 이 조에서 \"자회사주식보유기준\"이라 한다] 미만으로 소유하는 행위. 다만, 다음 각 목의 어느 하나에 해당하는 사유로 인하여 자회사주식보유기준에 미달하게 된 경우에는 그러하지 아니하다.<br>\t\t\t<br>가. 지주회사로 전환하거나 설립될 당시에 자회사의 주식을 자회사주식보유기준 미만으로 소유하고 있는 경우로서 지주회사로 전환하거나 설립된 날부터 2년 이내인 경우<br>\t\t\t<br>나. 상장법인 또는 국외상장법인이거나 공동출자법인이었던 자회사가 그에 해당하지 아니하게 되어 자회사주식보유기준에 미달하게 된 경우로서 그 해당하지 아니하게 된 날부터 1년 이내인 경우<br>\t\t\t<br>다. 벤처지주회사이었던 회사가 그에 해당하지 아니하게 되어 자회사주식보유기준에 미달하게 된 경우로서 그 해당하지 아니하게 된 날부터 1년 이내인 경우<br>\t\t\t<br>라. 자회사가 주식을 모집하거나 매출하면서&#160;<a href=\"http://javascript:;\" target=\"_blank\">「자본시장과 금융투자업에 관한 법률」</a>&#160;<a href=\"http://javascript:;\" target=\"_blank\">제165조의7</a>에 따라 우리사주조합원에게 배정하거나 당해 자회사가&#160;<a href=\"http://javascript:;\" target=\"_blank\">「상법」</a>&#160;<a href=\"http://javascript:;\" target=\"_blank\">제513조</a>(전환사채의 발행) 또는&#160;<a href=\"http://javascript:;\" target=\"_blank\">제516조의2</a>(신주인수권부사채의 발행)의 규정에 따라 발행한 전환사채 또는 신주인수권부사채의 전환이 청구되거나 신주인수권이 행사되어 자회사주식보유기준에 미달하게 된 경우로서 그 미달하게 된 날부터 1년 이내인 경우<br>\t\t\t<br>마. 자회사가 아닌 회사가 자회사에 해당하게 되고 자회사주식보유기준에는 미달하는 경우로서 당해 회사가 자회사에 해당하게 된 날부터 1년 이내인 경우<br>\t\t\t<br>바. 자회사를 자회사에 해당하지 아니하게 하는 과정에서 자회사주식보유기준에 미달하게 된 경우로서 그 미달하게 된 날부터 1년 이내인 경우(자회사주식보유기준에 미달하게 된 날부터 1년 이내에 자회사에 해당하지 아니하게 된 경우에 한한다)<br>\t\t\t<br>사. 자회사가 다른 회사와 합병하여 자회사주식보유기준에 미달하게 된 경우로서 그 미달하게 된 날부터 1년 이내인 경우<br>\t\t\t<br><br>\t\t\t<br>3. 계열회사가 아닌 국내회사(「사회기반시설에 대한 민간투자법」 제4조(민간투자사업의 추진방식)제1호부터 제4호까지의 규정에 정한 방식으로 민간투자사업을 영위하는 회사를 제외한다. 이하 이 호에서 같다)의 주식을 당해 회사 발행주식총수의 100분의 5를 초과하여 소유하는 행위(소유하고 있는 계열회사가 아닌 국내회사의 주식가액의 합계액이 자회사의 주식가액의 합계액의 100분의 15 미만인 지주회사에 대하여는 적용하지 아니한다) 또는 자회사 외의 국내계열회사의 주식을 소유하는 행위. 다만, 다음 각목의 1에 해당하는 사유로 인하여 주식을 소유하고 있는 계열회사가 아닌 국내회사나 국내계열회사의 경우에는 그러하지 아니하다.<br>\t\t\t<br>가. 지주회사로 전환하거나 설립될 당시에 이 호 본문에서 규정하고 있는 행위에 해당하고 있는 경우로서 지주회사로 전환하거나 설립된 날부터 2년 이내인 경우<br>\t\t\t<br>나. 계열회사가 아닌 회사를 자회사에 해당하게 하는 과정에서 이 호 본문에서 규정하고 있는 행위에 해당하게 된 날부터 1년 이내인 경우(같은 기간내에 자회사에 해당하게 된 경우에 한한다)<br>\t\t\t<br>다. 주식을 소유하고 있지 아니한 국내계열회사를 자회사에 해당하게 하는 과정에서 그 국내계열회사 주식을 소유하게 된 날부터 1년 이내인 경우(같은 기간내에 자회사에 해당하게 된 경우에 한한다)<br>\t\t\t<br>라. 자회사를 자회사에 해당하지 아니하게 하는 과정에서 당해 자회사가 자회사에 해당하지 아니하게 된 날부터 1년 이내인 경우<br>\t\t\t<br><br>\t\t\t<br>4. 금융업 또는 보험업을 영위하는 자회사의 주식을 소유하는 지주회사(이하 \"金融持株會社\"라 한다)인 경우 금융업 또는 보험업을 영위하는 회사(金融業 또는 保險業과 밀접한 관련이 있는 등&#160;<a href=\"http://javascript:;\" target=\"_blank\">大統領令</a>이 정하는 기준에 해당하는 會社를 포함한다)외의 국내회사의 주식을 소유하는 행위. 다만, 금융지주회사로 전환하거나 설립될 당시에 금융업 또는 보험업을 영위하는 회사 외의 국내회사 주식을 소유하고 있는 때에는 금융지주회사로 전환하거나 설립된 날부터 2년간은 그 국내회사의 주식을 소유할 수 있다.<br>\t\t\t<br><br>\t\t\t<br>5. 금융지주회사외의 지주회사(이하 \"一般持株會社\"라 한다)인 경우 금융업 또는 보험업을 영위하는 국내회사의 주식을 소유하는 행위. 다만, 일반지주회사로 전환하거나 설립될 당시에 금융업 또는 보험업을 영위하는 국내회사의 주식을 소유하고 있는 때에는 일반지주회사로 전환하거나 설립된 날부터 2년간은 그 국내회사의 주식을 소유할 수 있다.<br>\t\t\t<br><br>\t\t\t<br>③일반지주회사의 자회사는 다음 각 호의 어느 하나에 해당하는 행위를 하여서는 아니된다. &#160;<개정 2004. 12. 31., 2007. 4. 13., 2007. 8. 3., 2015. 1. 20.><br>\t\t\t<br>1. 손자회사의 주식을 그 손자회사 발행주식총수의 100분의 40(그 손자회사가 상장법인 또는 국외상장법인이거나 공동출자법인인 경우에는 100분의 20으로 한다. 이하 이 조에서 \"손자회사주식보유기준\"이라 한다) 미만으로 소유하는 행위. 다만, 다음 각 목의 어느 하나에 해당하는 사유로 인하여 손자회사주식보유기준에 미달하게 된 경우에는 그러하지 아니하다.<br>\t\t\t<br>가. 자회사가 될 당시에 손자회사의 주식을 손자회사주식보유기준 미만으로 소유하고 있는 경우로서 자회사에 해당하게 된 날부터 2년 이내인 경우<br>\t\t\t<br>나. 상장법인 또는 국외상장법인이거나 공동출자법인이었던 손자회사가 그에 해당하지 아니하게 되어 손자회사주식보유기준에 미달하게 된 경우로서 그 해당하지 아니하게 된 날부터 1년 이내인 경우<br>\t\t\t<br>다. 손자회사가 주식을 모집 또는 매출하면서&#160;<a href=\"http://javascript:;\" target=\"_blank\">「자본시장과 금융투자업에 관한 법률」</a>&#160;<a href=\"http://javascript:;\" target=\"_blank\">제165조의7</a>에 따라 우리사주조합에 우선 배정하거나 당해 손자회사가&#160;<a href=\"http://javascript:;\" target=\"_blank\">「상법」</a>&#160;<a href=\"http://javascript:;\" target=\"_blank\">제513조</a>(전환사채의 발행) 또는&#160;<a href=\"http://javascript:;\" target=\"_blank\">제516조의2</a>(신주인수권부사채의 발행)의 규정에 따라 발행한 전환사채 또는 신주인수권부사채의 전환이 청구되거나 신주인수권이 행사되어 손자회사주식보유기준에 미달하게 된 경우로서 그 미달하게 된 날부터 1년 이내인 경우<br>\t\t\t<br>라. 손자회사가 아닌 회사가 손자회사에 해당하게 되고 손자회사주식보유기준에는 미달하는 경우로서 당해 회사가 손자회사에 해당하게 된 날부터 1년 이내인 경우<br>\t\t\t<br>마. 손자회사를 손자회사에 해당하지 아니하게 하는 과정에서 손자회사주식보유기준에 미달하게 된 경우로서 그 미달하게 된 날부터 1년 이내인 경우(같은 기간 내에 손자회사에 해당하지 아니하게 된 경우에 한한다)<br>\t\t\t<br>바. 손자회사가 다른 회사와 합병하여 손자회사주식보유기준에 미달하게 된 경우로서 그 미달하게 된 날부터 1년 이내인 경우<br>\t\t\t<br>2. 손자회사가 아닌 국내계열회사의 주식을 소유하는 행위. 다만, 다음 각 목의 어느 하나에 해당하는 사유로 인하여 주식을 소유하고 있는 국내계열회사의 경우에는 그러하지 아니하다.<br>\t\t\t<br>가. 자회사가 될 당시에 주식을 소유하고 있는 국내계열회사의 경우로서 자회사에 해당하게 된 날부터 2년 이내인 경우<br>\t\t\t<br>나. 계열회사가 아닌 회사를 손자회사에 해당하게 하는 과정에서 당해 회사가 계열회사에 해당하게 된 날부터 1년 이내인 경우(같은 기간내에 손자회사에 해당하게 된 경우에 한한다)<br>\t\t\t<br>다. 주식을 소유하고 있지 아니한 국내계열회사를 손자회사에 해당하게 하는 과정에서 당해 계열회사의 주식을 소유하게 된 날부터 1년 이내인 경우(같은 기간내에 손자회사에 해당하게 된 경우에 한한다)<br>\t\t\t<br>라. 손자회사를 손자회사에 해당하지 아니하게 하는 과정에서 당해 손자회사가 손자회사에 해당하지 아니하게 된 날부터 1년 이내인 경우(같은 기간내에 계열회사에 해당하지 아니하게 된 경우에 한한다)<br>\t\t\t<br>마. 손자회사가 다른 자회사와 합병하여 그 다른 자회사의 주식을 소유하게 된 경우로서 주식을 소유한 날부터 1년 이내인 경우<br>\t\t\t<br>바. 자기주식을 보유하고 있는 자회사가 회사분할로 인하여 다른 국내계열회사의 주식을 소유하게 된 경우로서 주식을 소유한 날부터 1년 이내인 경우<br>\t\t\t<br>3. 금융업이나 보험업을 영위하는 회사를 손자회사로 지배하는 행위. 다만, 일반지주회사의 자회사가 될 당시에 금융업이나 보험업을 영위하는 회사를 손자회사로 지배하고 있는 경우에는 자회사에 해당하게 된 날부터 2년간 그 손자회사를 지배할 수 있다.<br>\t\t\t<br><br>\t\t\t<br>④일반지주회사의 손자회사는 국내계열회사의 주식을 소유하여서는 아니된다. 다만, 다음 각 호의 어느 하나에 해당하는 경우에는 그러하지 아니하다. &#160;<신설 2004. 12. 31., 2007. 8. 3.><br>\t\t\t<br>1. 손자회사가 될 당시에 주식을 소유하고 있는 국내계열회사의 경우로서 손자회사에 해당하게 된 날부터 2년 이내인 경우<br>\t\t\t<br>2. 주식을 소유하고 있는 계열회사가 아닌 국내회사가 계열회사에 해당하게 된 경우로서 당해 회사가 계열회사에 해당하게 된 날부터 1년 이내인 경우<br>\t\t\t<br>3. 자기주식을 소유하고 있는 손자회사가 회사분할로 인하여 다른 국내계열회사의 주식을 소유하게 된 경우로서 주식을 소유한 날부터 1년 이내인 경우<br>\t\t\t<br>4. 손자회사가 국내계열회사(금융업 또는 보험업을 영위하는 회사를 제외한다) 발행주식총수를 소유하고 있는 경우<br>\t\t\t<br><br>\t\t\t<br>⑤제4항제4호에 따라 손자회사가 주식을 소유하고 있는 회사(이하 \"증손회사\"라 한다)는 국내계열회사의 주식을 소유하여서는 아니 된다. 다만, 다음 각 호의 어느 하나에 해당하는 경우에는 그러하지 아니하다. &#160;<신설 2007. 8. 3.><br>\t\t\t<br>1. 증손회사가 될 당시에 주식을 소유하고 있는 국내계열회사인 경우로서 증손회사에 해당하게 된 날부터 2년 이내인 경우<br>\t\t\t<br>2. 주식을 소유하고 있는 계열회사가 아닌 국내회사가 계열회사에 해당하게 된 경우로서 그 회사가 계열회사에 해당하게 된 날부터 1년 이내인 경우<br>\t\t\t<br>⑥제2항제1호 단서, 제2항제2호가목, 제2항제3호가목, 제2항제4호 단서, 제2항제5호 단서, 제3항제1호가목, 제3항제2호가목, 제3항제3호 단서, 제4항제1호 및 제5항제1호를 적용함에 있어서 각 해당 규정의 유예기간은 주식가격의 급격한 변동 등 경제여건의 변화, 주식처분금지계약, 사업의 현저한 손실 그 밖의 사유로 인하여 부채액을 감소시키거나 주식의 취득ㆍ처분 등이 곤란한 경우에는 공정거래위원회의 승인을 얻어 2년을 연장할 수 있다. &#160;<신설 2007. 4. 13., 2007. 8. 3.><br>\t\t\t<br>⑦지주회사는&#160;<a href=\"http://javascript:;\" target=\"_blank\">대통령령</a>이 정하는 바에 의하여 당해 지주회사ㆍ자회사ㆍ손자회사 및 증손회사(이하 \"지주회사등\"이라 한다)의 주식소유현황ㆍ재무상황 등 사업내용에 관한 보고서를 공정거래위원회에 제출하여야 한다. &#160;<개정 2004. 12. 31., 2007. 4. 13., 2007. 8. 3.><br>\t\t\t<br>[본조신설 1999. 2. 5.]<br>\t\t\t<br>[제목개정 2004. 12. 31.]<br>\t\t\t<br><br>\t\t\t출처: <<a href=\"http://www.law.go.kr/LSW//lsInfoP.do?lsiSeq=204514&chrClsCd=010202&urlMode=lsInfoP&efYd=20190919&ancYnChk=0#0000\" target=\"_blank\">http://www.law.go.kr/LSW//lsInfoP.do?lsiSeq=204514&chrClsCd=010202&urlMode=lsInfoP&efYd=20190919&ancYnChk=0#0000</a>>",
    "w": 400
  }
];

let cards = [];
let moving = null, resizing = null;

function loadBoard() {
  const saved = localStorage.getItem(SAVE_KEY);
  cards = saved ? JSON.parse(saved) : DEFAULT_CARDS.map(c => ({...c}));
  renderCards();
  if (!saved) autoLayout();
}

function autoLayout() {
  const GAP = 14;
  const boardW = document.getElementById('board').offsetWidth;
  const cols = Math.max(1, Math.floor(boardW / 280));
  const colW = (boardW - GAP * (cols - 1)) / cols;
  const colHeights = new Array(cols).fill(0);
  const allCards = document.querySelectorAll('.card');
  const images = document.querySelectorAll('.card img');
  let loaded = 0;
  const total = images.length;

  function place() {
    allCards.forEach((el, i) => {
      const card = cards[i];
      const w = Math.min(card.w || colW, colW);
      let minCol = 0;
      for (let c = 1; c < cols; c++) if (colHeights[c] < colHeights[minCol]) minCol = c;
      card.x = minCol * (colW + GAP);
      card.y = colHeights[minCol];
      card.w = w;
      el.style.left = card.x + 'px';
      el.style.top = card.y + 'px';
      el.style.width = w + 'px';
      colHeights[minCol] = card.y + el.offsetHeight + GAP;
    });
    document.getElementById('board').style.minHeight = Math.max(...colHeights) + 100 + 'px';
    saveBoard();
  }

  if (total === 0) requestAnimationFrame(place);
  else images.forEach(img => {
    if (img.complete) { loaded++; if (loaded >= total) requestAnimationFrame(place); }
    else img.onload = img.onerror = () => { loaded++; if (loaded >= total) requestAnimationFrame(place); };
  });
}

function syncText() {
  document.querySelectorAll('.card').forEach(el => {
    const idx = +el.dataset.idx;
    if (cards[idx]?.type === 'text') {
      const t = el.querySelector('.text');
      if (t) cards[idx].content = t.innerHTML;
    }
  });
}

function saveBoard() {
  syncText();
  localStorage.setItem(SAVE_KEY, JSON.stringify(cards));
  document.getElementById('status').textContent = '저장됨 ' + new Date().toLocaleTimeString();
}

function renderCards() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  cards.forEach((card, i) => {
    const el = document.createElement('div');
    el.className = 'card';
    el.dataset.idx = i;
    if (card.x !== undefined) el.style.left = card.x + 'px';
    if (card.y !== undefined) el.style.top = card.y + 'px';
    if (card.w) el.style.width = card.w + 'px';

    el.addEventListener('mousedown', e => {
      if (e.target.closest('.text, a, .card-btn, .resize-handle, table')) return;
      e.preventDefault();
      moving = { idx: i, startX: e.clientX, startY: e.clientY, origX: card.x || 0, origY: card.y || 0 };
      el.classList.add('moving');
    });

    const actions = document.createElement('div');
    actions.className = 'card-actions';
    const delBtn = document.createElement('button');
    delBtn.className = 'card-btn'; delBtn.textContent = '×';
    delBtn.onclick = e => { e.stopPropagation(); if (confirm('삭제?')) { cards.splice(i, 1); renderCards(); saveBoard(); } };
    actions.appendChild(delBtn);
    el.appendChild(actions);

    if (card.type === 'text') {
      const text = document.createElement('div');
      text.className = 'text';
      text.contentEditable = true;
      text.innerHTML = card.content || '';
      text.addEventListener('blur', () => { card.content = text.innerHTML; saveBoard(); });
      el.appendChild(text);
    } else if (card.type === 'image') {
      const src = card.src.startsWith('http') || card.src.startsWith('data:') ? card.src : IMG_BASE + card.src;
      const img = document.createElement('img');
      img.src = src;
      img.alt = card.alt || '';
      img.loading = 'lazy';
      img.onerror = () => img.style.display = 'none';
      if (card.link) {
        const a = document.createElement('a'); a.href = card.link; a.target = '_blank';
        a.appendChild(img); el.appendChild(a);
      } else { el.appendChild(img); }
      if (card.caption) {
        const cap = document.createElement('div');
        cap.className = 'caption';
        cap.textContent = card.caption;
        el.appendChild(cap);
      }
    } else if (card.type === 'table') {
      const wrapper = document.createElement('div');
      wrapper.style.overflowX = 'auto';
      wrapper.innerHTML = card.html || '';
      el.appendChild(wrapper);
    }

    const rh = document.createElement('div');
    rh.className = 'resize-handle';
    rh.addEventListener('mousedown', e => {
      e.preventDefault(); e.stopPropagation();
      resizing = { idx: i, startX: e.clientX, startW: card.w || el.offsetWidth };
    });
    el.appendChild(rh);
    board.appendChild(el);
  });

  requestAnimationFrame(() => {
    let maxBottom = 0;
    document.querySelectorAll('.card').forEach(el => {
      const b = (parseFloat(el.style.top) || 0) + el.offsetHeight;
      if (b > maxBottom) maxBottom = b;
    });
    board.style.minHeight = (maxBottom + 100) + 'px';
  });
}

document.addEventListener('mousemove', e => {
  if (moving) {
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`);
    if (!el) return;
    const nx = moving.origX + e.clientX - moving.startX;
    const ny = moving.origY + e.clientY - moving.startY;
    el.style.left = nx + 'px';
    el.style.top = ny + 'px';
  }
  if (resizing) {
    const card = cards[resizing.idx];
    card.w = Math.max(100, resizing.startW + e.clientX - resizing.startX);
    const el = document.querySelector(`.card[data-idx="${resizing.idx}"]`);
    if (el) el.style.width = card.w + 'px';
  }
});

document.addEventListener('mouseup', e => {
  if (moving) {
    const card = cards[moving.idx];
    card.x = Math.max(0, moving.origX + e.clientX - moving.startX);
    card.y = Math.max(0, moving.origY + e.clientY - moving.startY);
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`);
    if (el) { el.classList.remove('moving'); }
    moving = null; saveBoard();
  }
  if (resizing) { resizing = null; saveBoard(); }
});

function addTextCard() {
  cards.push({ type: 'text', content: '', x: 50, y: window.scrollY + 100, w: 300 });
  renderCards();
  setTimeout(() => { const els = document.querySelectorAll('.card .text'); els[els.length - 1]?.focus(); }, 100);
}

function addImageCard() {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = 'image/*';
  input.onchange = e => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = () => { cards.push({ type: 'image', src: reader.result, x: 50, y: window.scrollY + 100, w: 240 }); renderCards(); saveBoard(); };
    reader.readAsDataURL(file);
  };
  input.click();
}

function resetLayout() {
  if (!confirm('자동 재배치합니다. 현재 위치가 변경됩니다.')) return;
  cards.forEach(c => { delete c.x; delete c.y; });
  renderCards(); autoLayout();
}

setInterval(saveBoard, 30000);
loadBoard();
</script>
</body>
