<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>영어회화 공부사이트</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #1e1e1e;
  color: #e0e0e0;
  font-family: 'Segoe UI', -apple-system, sans-serif;
  font-size: 15px;
  line-height: 1.6;
  padding: 20px 30px 60px;
  overflow-x: hidden;
}
a { color: #6cb0f6; text-decoration: none; }
a:hover { text-decoration: underline; }
.title-bar {
  background: #3a3a5c;
  display: inline-block;
  padding: 6px 16px;
  font-size: 22px;
  font-weight: bold;
  color: #fff;
  margin-bottom: 4px;
}
.date { color: #999; font-size: 13px; margin-bottom: 20px; }
.board { position: relative; }
.card {
  background: #2a2a2a;
  border: 1px solid #3a3a3a;
  border-radius: 8px;
  padding: 12px;
  position: absolute;
  cursor: grab;
  transition: box-shadow 0.15s;
  overflow: hidden;
}
.card:hover { box-shadow: 0 0 0 1px #58a6ff; z-index: 10; }
.card.moving { opacity: 0.8; box-shadow: 0 4px 24px rgba(0,0,0,0.6); z-index: 100; cursor: grabbing; }
.card img { width: 100%; border-radius: 4px; display: block; }
.card .caption { font-size: 12px; color: #888; margin-top: 6px; }
.card .text { outline: none; min-height: 20px; white-space: pre-wrap; word-break: break-word; }
.card .text:focus { background: rgba(255,255,255,0.05); border-radius: 4px; padding: 4px; }
.card .text:empty::before { content: '텍스트 입력...'; color: #555; }
.card table { border-collapse: collapse; width: 100%; font-size: 13px; }
.card table td, .card table th { border: 1px solid #444; padding: 4px 8px; vertical-align: top; }
.card table th { background: #333; color: #ccc; }
.card-actions { position: absolute; top: 4px; right: 4px; display: none; gap: 4px; }
.card:hover .card-actions { display: flex; }
.card-btn { background: #333; border: 1px solid #555; color: #ccc; border-radius: 4px; padding: 2px 6px; font-size: 11px; cursor: pointer; }
.card-btn:hover { background: #444; color: #fff; }
.resize-handle { position: absolute; bottom: 0; right: 0; width: 16px; height: 16px; cursor: se-resize; opacity: 0; }
.card:hover .resize-handle { opacity: 0.6; }
.resize-handle::after { content: ''; position: absolute; bottom: 3px; right: 3px; width: 8px; height: 8px; border-right: 2px solid #666; border-bottom: 2px solid #666; }
.toolbar { position: fixed; bottom: 0; left: 0; right: 0; background: #161b22; border-top: 1px solid #30363d; padding: 8px 20px; display: flex; gap: 12px; align-items: center; z-index: 200; }
.toolbar button { background: #21262d; border: 1px solid #30363d; color: #e0e0e0; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; }
.toolbar button:hover { background: #30363d; }
.toolbar .status { color: #8b949e; font-size: 12px; margin-left: auto; }
.highlight-red { color: #ff6b6b; }
.highlight-blue { color: #6cb0f6; }
</style>
</head>
<body>
<div class="title-bar">영어회화 공부사이트</div>
<div class="date">2017년 1월 29일 일요일</div>
<div class="board" id="board"></div>
<div class="toolbar">
  <button onclick="addTextCard()">+ 텍스트</button>
  <button onclick="addImageCard()">+ 이미지</button>
  <button onclick="saveBoard()">💾 저장</button>
  <button onclick="resetLayout()">↺ 재배치</button>
  <span class="status" id="status">Ready</span>
</div>
<script>
const SAVE_KEY = 'board-영어회화-공부사이트';
const IMG_BASE = '../../attachments/';
const DEFAULT_CARDS = [
  {
    "type": "text",
    "content": "영어회화 공부사이트<br>\t\t\t<br>9개월 만에 영어 회화를 배울 수 있는 Free English Now&#160;<a href=\"http://freeenglishnow.com/\" target=\"_blank\">http://freeenglishnow.com/</a><br>\t\t\t<br>미국 연방 정부에서 제작한 영어회화 학습 사이트 USA Learns&#160;<a href=\"http://www.usalearns.org/\" target=\"_blank\">http://www.usalearns.org/</a><br>\t\t\t<br>상황별 대화 듣기를 통한 영어회화 학습 사이트 AudioEnglish&#160;<a href=\"http://www.audioenglish.org/\" target=\"_blank\">http://www.audioenglish.org/</a><br>\t\t\t<br>동영상 보면서 영어 발음 및 어휘 공부하는 사이트 English Central&#160;<a href=\"http://ko.englishcentral.com/\" target=\"_blank\">http://ko.englishcentral.com/</a><br>\t\t\t<br>YouTube 동영상으로 영어회화를 연습할 수 있는 Real English&#160;<a href=\"http://www.real-english.com/\" target=\"_blank\">http://www.real-english.com/</a><br>\t\t\t<br>&#160;<br>\t\t\t<br>영어어휘 공부사이트<br>\t\t\t<br>1500개의 가장 많이 쓰이는 단어들이 정리된 EnglishSpeak.com&#160;<a href=\"http://www.englishspeak.com/ko/\" target=\"_blank\">http://www.englishspeak.com/ko/</a><br>\t\t\t<br>각종 영영사전을 한 곳에서 이용할 수 있는 Gary's Dictionary&#160;<a href=\"http://www.garyshome.net/search/\" target=\"_blank\">http://www.garyshome.net/search/</a><br>\t\t\t<br>수준별 어학시험 기출 어휘를 E-mail로 보내주는 Level Pump&#160;<a href=\"http://levelpump.com/\" target=\"_blank\">http://levelpump.com/</a><br>\t\t\t<br>무료로 영어 어휘를 학습할 수 있는 Wordly Wise 3000&#160;<a href=\"http://wordlywise3000.com/\" target=\"_blank\">http://wordlywise3000.com/</a><br>\t\t\t<br>그림으로 영어 단어를 공부할 수 있는 Visual Dictionary 사이트&#160;<a href=\"http://www.ikonet.com/en/visualdictionary/\" target=\"_blank\">http://www.ikonet.com/en/visualdictionary/</a><br>\t\t\t<br>예문이 많은 한영/영한 영어학습사전&#160;<a href=\"http://dic.impact.pe.kr/\" target=\"_blank\">http://dic.impact.pe.kr/</a><br>\t\t\t<br>&#160;<br>\t\t\t<br>영어작문&#160;공부사이트 모음&#160;<br>\t\t\t<br>나의 영어 문장을 자동으로 첨삭해주는 프로그램 Ginger Proofreader&#160;<a href=\"http://www.getginger.kr/\" target=\"_blank\">http://www.getginger.kr/</a><br>\t\t\t<br>미국 퍼듀 대학 영어 작문 학습 사이트 Purdue Online Writing Lab&#160;<a href=\"https://owl.english.purdue.edu/owl/\" target=\"_blank\">https://owl.english.purdue.edu/owl/</a><br>\t\t\t<br>&#160;<br>\t\t\t<br>영어문법&#160;공부사이트 모음&#160;<br>\t\t\t<br>만화로 배우는 영어 문법 The Oatmeal&#160;<a href=\"http://theoatmeal.com/tag/grammar\" target=\"_blank\">http://theoatmeal.com/tag/grammar</a><br>\t\t\t<br>&#160;<br>\t\t\t<br>영어듣기&#160;공부사이트 모음&#160;<br>\t\t\t<br>CNN 뉴스 듣기를 하면서 영어 공부를 할 수 있는 YBM시사닷컴&#160;<a href=\"http://cnn.ybmsisa.com/\" target=\"_blank\">http://cnn.ybmsisa.com/</a><br>\t\t\t<br>팝송을 따라 부르면서 받아쓰기를 할 수 있는 Lyrics Training&#160;<a href=\"http://lyricstraining.com/\" target=\"_blank\">http://lyricstraining.com/</a><br>\t\t\t<br>미국 경제전문 뉴스통신사 방송을 실시간으로 보자 Bloomberg TV&#160;<a href=\"http://www.bloomberg.com/tv/\" target=\"_blank\">http://www.bloomberg.com/tv/</a><br>\t\t\t<br>미국 정부 활동과 공공 이슈를 전문적으로 다루는 실시간 TV C-SPAN&#160;<a href=\"http://www.c-span.org/live/\" target=\"_blank\">http://www.c-span.org/live/</a><br>\t\t\t<br>영어 오디오북을 무료로 다운받을 수 있는 Books Should Be Free&#160;&#160;<a href=\"http://www.booksshouldbefree.com/\" target=\"_blank\">http://www.booksshouldbefree.com/</a><br>\t\t\t<br>미국 CNN 방송을 실시간으로 볼 수 있는 WePlayLive 사이트&#160;<a href=\"http://weplaylive.tv/international-stream/\" target=\"_blank\">http://weplaylive.tv/international-stream/</a><br>\t\t\t<br>유투브 동영상으로 영어공부를 즐길 수 있는 ESL Video&#160;<a href=\"http://www.eslvideo.com/\" target=\"_blank\">http://www.eslvideo.com/</a><br>\t\t\t<br>영어 명연설 MP3를 무료로 다운받을 수 있는 American Rhetoric&#160;<a href=\"http://www.americanrhetoric.com/\" target=\"_blank\">http://www.americanrhetoric.com/</a><br>\t\t\t<br>영어 소설 오디오북을 무료로 다운받을 수 있는 Voices in the Dark&#160;<a href=\"http://voicesinthedark.com/\" target=\"_blank\">http://voicesinthedark.com/</a><br>\t\t\t<br>수준높은 미국 공영 라디오 방송을 들을 수 있는 사이트 NPR.org&#160;<a href=\"http://www.npr.org/\" target=\"_blank\">http://www.npr.org/</a><br>\t\t\t<br>영어 교사가 운영하는 영어듣기 연습 사이트 ESL Cyber Listening Lab&#160;<a href=\"http://www.esl-lab.com/\" target=\"_blank\">http://www.esl-lab.com/</a><br>\t\t\t<br>CNN 방송을 무료로 볼 수 있는 CNN Video&#160;<a href=\"http://edition.cnn.com/video\" target=\"_blank\">http://edition.cnn.com/video</a><br>\t\t\t<br>15분짜리 영어 라디오 방송을 들을 수 있는 Spotlight Radio 사이트&#160;<a href=\"http://www.spotlightradio.net/\" target=\"_blank\">http://www.spotlightradio.net/</a><br>\t\t\t<br>고급 영어 표현을 익힐 수 있는 TED 동영상 강의 사이트&#160;<a href=\"http://www.ted.com/\" target=\"_blank\">http://www.ted.com/</a><br>\t\t\t<br>유명 문학 작품의 영어 오디오북을 무료로 제공하는 LoudLit.org&#160;<a href=\"http://www.loudlit.org/\" target=\"_blank\">http://www.loudlit.org/</a><br>\t\t\t<br>난이도별 영어 받아쓰기를 연습할 수 있는 Listen and Write 사이트&#160;<a href=\"http://www.listen-and-write.com/\" target=\"_blank\">http://www.listen-and-write.com/</a><br>\t\t\t<br>&#160;<br>\t\t\t<br>영어독해&#160;공부사이트 모음&#160;<br>\t\t\t<br>어린이용 영어 동화를 무료로 제공하는 Fun Brain&#160;<a href=\"http://www.funbrain.com/\" target=\"_blank\">http://www.funbrain.com/</a><br>\t\t\t<br>한국 드라마를 영어 자막과 함께 볼 수 있는 사이트 Drama.net&#160;<a href=\"http://www.drama.net/\" target=\"_blank\">http://www.drama.net/</a><br>\t\t\t<br>어린이용 영어 동화를 읽어주는 사이트 Starfall&#160;<a href=\"http://www.starfall.com/\" target=\"_blank\">http://www.starfall.com/</a><br>\t\t\t<br>영어 소설을 무료로 다운 받을 수 있는 FullBooks&#160;<a href=\"http://www.fullbooks.com/\" target=\"_blank\">http://www.fullbooks.com/</a><br>\t\t\t<br>세계 최초 무료 ebook 공유 사이트 Project Gutenberg&#160;<a href=\"http://www.gutenberg.org/\" target=\"_blank\">http://www.gutenberg.org/</a><br>\t\t\t<br>고등학생이 만든 영문학 TEXT 및 오디오북 모음 사이트 RepeatAfterUs&#160;<a href=\"http://www.repeatafterus.com/\" target=\"_blank\">http://www.repeatafterus.com/</a><br>\t\t\t<br>신문 기사를 읽으면서 영어 공부를 할 수 있는 VOA Learning English&#160;<a href=\"http://learningenglish.voanews.com/\" target=\"_blank\">http://learningenglish.voanews.com/</a>&#160;<br>\t\t\t<br><br>\t\t\t출처: <<a href=\"http://m.blog.naver.com/rkdrlfma/220207069072\" target=\"_blank\">http://m.blog.naver.com/rkdrlfma/220207069072</a>>",
    "w": 400
  },
  {
    "type": "image",
    "src": "e9dae00123.png",
    "alt": "영어회화 공부사이트",
    "w": 220
  },
  {
    "type": "image",
    "src": "20e2db699c.png",
    "alt": "영어회화 공부사이트",
    "w": 220
  }
];

let cards = [];
let moving = null, resizing = null;

function loadBoard() {
  const saved = localStorage.getItem(SAVE_KEY);
  cards = saved ? JSON.parse(saved) : DEFAULT_CARDS.map(c => ({...c}));
  renderCards();
  if (!saved) autoLayout();
}

function autoLayout() {
  const GAP = 14;
  const boardW = document.getElementById('board').offsetWidth;
  const cols = Math.max(1, Math.floor(boardW / 280));
  const colW = (boardW - GAP * (cols - 1)) / cols;
  const colHeights = new Array(cols).fill(0);
  const allCards = document.querySelectorAll('.card');
  const images = document.querySelectorAll('.card img');
  let loaded = 0;
  const total = images.length;

  function place() {
    allCards.forEach((el, i) => {
      const card = cards[i];
      const w = Math.min(card.w || colW, colW);
      let minCol = 0;
      for (let c = 1; c < cols; c++) if (colHeights[c] < colHeights[minCol]) minCol = c;
      card.x = minCol * (colW + GAP);
      card.y = colHeights[minCol];
      card.w = w;
      el.style.left = card.x + 'px';
      el.style.top = card.y + 'px';
      el.style.width = w + 'px';
      colHeights[minCol] = card.y + el.offsetHeight + GAP;
    });
    document.getElementById('board').style.minHeight = Math.max(...colHeights) + 100 + 'px';
    saveBoard();
  }

  if (total === 0) requestAnimationFrame(place);
  else images.forEach(img => {
    if (img.complete) { loaded++; if (loaded >= total) requestAnimationFrame(place); }
    else img.onload = img.onerror = () => { loaded++; if (loaded >= total) requestAnimationFrame(place); };
  });
}

function syncText() {
  document.querySelectorAll('.card').forEach(el => {
    const idx = +el.dataset.idx;
    if (cards[idx]?.type === 'text') {
      const t = el.querySelector('.text');
      if (t) cards[idx].content = t.innerHTML;
    }
  });
}

function saveBoard() {
  syncText();
  localStorage.setItem(SAVE_KEY, JSON.stringify(cards));
  document.getElementById('status').textContent = '저장됨 ' + new Date().toLocaleTimeString();
}

function renderCards() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  cards.forEach((card, i) => {
    const el = document.createElement('div');
    el.className = 'card';
    el.dataset.idx = i;
    if (card.x !== undefined) el.style.left = card.x + 'px';
    if (card.y !== undefined) el.style.top = card.y + 'px';
    if (card.w) el.style.width = card.w + 'px';

    el.addEventListener('mousedown', e => {
      if (e.target.closest('.text, a, .card-btn, .resize-handle, table')) return;
      e.preventDefault();
      moving = { idx: i, startX: e.clientX, startY: e.clientY, origX: card.x || 0, origY: card.y || 0 };
      el.classList.add('moving');
    });

    const actions = document.createElement('div');
    actions.className = 'card-actions';
    const delBtn = document.createElement('button');
    delBtn.className = 'card-btn'; delBtn.textContent = '×';
    delBtn.onclick = e => { e.stopPropagation(); if (confirm('삭제?')) { cards.splice(i, 1); renderCards(); saveBoard(); } };
    actions.appendChild(delBtn);
    el.appendChild(actions);

    if (card.type === 'text') {
      const text = document.createElement('div');
      text.className = 'text';
      text.contentEditable = true;
      text.innerHTML = card.content || '';
      text.addEventListener('blur', () => { card.content = text.innerHTML; saveBoard(); });
      el.appendChild(text);
    } else if (card.type === 'image') {
      const src = card.src.startsWith('http') || card.src.startsWith('data:') ? card.src : IMG_BASE + card.src;
      const img = document.createElement('img');
      img.src = src;
      img.alt = card.alt || '';
      img.loading = 'lazy';
      img.onerror = () => img.style.display = 'none';
      if (card.link) {
        const a = document.createElement('a'); a.href = card.link; a.target = '_blank';
        a.appendChild(img); el.appendChild(a);
      } else { el.appendChild(img); }
      if (card.caption) {
        const cap = document.createElement('div');
        cap.className = 'caption';
        cap.textContent = card.caption;
        el.appendChild(cap);
      }
    } else if (card.type === 'table') {
      const wrapper = document.createElement('div');
      wrapper.style.overflowX = 'auto';
      wrapper.innerHTML = card.html || '';
      el.appendChild(wrapper);
    }

    const rh = document.createElement('div');
    rh.className = 'resize-handle';
    rh.addEventListener('mousedown', e => {
      e.preventDefault(); e.stopPropagation();
      resizing = { idx: i, startX: e.clientX, startW: card.w || el.offsetWidth };
    });
    el.appendChild(rh);
    board.appendChild(el);
  });

  requestAnimationFrame(() => {
    let maxBottom = 0;
    document.querySelectorAll('.card').forEach(el => {
      const b = (parseFloat(el.style.top) || 0) + el.offsetHeight;
      if (b > maxBottom) maxBottom = b;
    });
    board.style.minHeight = (maxBottom + 100) + 'px';
  });
}

document.addEventListener('mousemove', e => {
  if (moving) {
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`);
    if (!el) return;
    const nx = moving.origX + e.clientX - moving.startX;
    const ny = moving.origY + e.clientY - moving.startY;
    el.style.left = nx + 'px';
    el.style.top = ny + 'px';
  }
  if (resizing) {
    const card = cards[resizing.idx];
    card.w = Math.max(100, resizing.startW + e.clientX - resizing.startX);
    const el = document.querySelector(`.card[data-idx="${resizing.idx}"]`);
    if (el) el.style.width = card.w + 'px';
  }
});

document.addEventListener('mouseup', e => {
  if (moving) {
    const card = cards[moving.idx];
    card.x = Math.max(0, moving.origX + e.clientX - moving.startX);
    card.y = Math.max(0, moving.origY + e.clientY - moving.startY);
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`);
    if (el) { el.classList.remove('moving'); }
    moving = null; saveBoard();
  }
  if (resizing) { resizing = null; saveBoard(); }
});

function addTextCard() {
  cards.push({ type: 'text', content: '', x: 50, y: window.scrollY + 100, w: 300 });
  renderCards();
  setTimeout(() => { const els = document.querySelectorAll('.card .text'); els[els.length - 1]?.focus(); }, 100);
}

function addImageCard() {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = 'image/*';
  input.onchange = e => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = () => { cards.push({ type: 'image', src: reader.result, x: 50, y: window.scrollY + 100, w: 240 }); renderCards(); saveBoard(); };
    reader.readAsDataURL(file);
  };
  input.click();
}

function resetLayout() {
  if (!confirm('자동 재배치합니다. 현재 위치가 변경됩니다.')) return;
  cards.forEach(c => { delete c.x; delete c.y; });
  renderCards(); autoLayout();
}

setInterval(saveBoard, 30000);
loadBoard();
</script>
</body>
</html>
