<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #1e1e1e;
  color: #e0e0e0;
  font-family: 'Segoe UI', -apple-system, sans-serif;
  font-size: 15px;
  line-height: 1.6;
  padding: 20px 30px 60px;
  overflow-x: hidden;
}
a { color: #6cb0f6; text-decoration: none; }
a:hover { text-decoration: underline; }
.title-bar {
  background: #3a3a5c;
  display: inline-block;
  padding: 6px 16px;
  font-size: 22px;
  font-weight: bold;
  color: #fff;
  margin-bottom: 4px;
}
.date { color: #999; font-size: 13px; margin-bottom: 20px; }
.board { position: relative; }
.card {
  background: #2a2a2a;
  border: 1px solid #3a3a3a;
  border-radius: 8px;
  padding: 12px;
  position: absolute;
  cursor: grab;
  transition: box-shadow 0.15s;
  overflow: hidden;
}
.card:hover { box-shadow: 0 0 0 1px #58a6ff; z-index: 10; }
.card.moving { opacity: 0.8; box-shadow: 0 4px 24px rgba(0,0,0,0.6); z-index: 100; cursor: grabbing; }
.card img { width: 100%; border-radius: 4px; display: block; }
.card .caption { font-size: 12px; color: #888; margin-top: 6px; }
.card .text { outline: none; min-height: 20px; white-space: pre-wrap; word-break: break-word; }
.card .text:focus { background: rgba(255,255,255,0.05); border-radius: 4px; padding: 4px; }
.card .text:empty::before { content: '텍스트 입력...'; color: #555; }
.card table { border-collapse: collapse; width: 100%; font-size: 13px; }
.card table td, .card table th { border: 1px solid #444; padding: 4px 8px; vertical-align: top; }
.card table th { background: #333; color: #ccc; }
.card-actions { position: absolute; top: 4px; right: 4px; display: none; gap: 4px; }
.card:hover .card-actions { display: flex; }
.card-btn { background: #333; border: 1px solid #555; color: #ccc; border-radius: 4px; padding: 2px 6px; font-size: 11px; cursor: pointer; }
.card-btn:hover { background: #444; color: #fff; }
.resize-handle { position: absolute; bottom: 0; right: 0; width: 16px; height: 16px; cursor: se-resize; opacity: 0; }
.card:hover .resize-handle { opacity: 0.6; }
.resize-handle::after { content: ''; position: absolute; bottom: 3px; right: 3px; width: 8px; height: 8px; border-right: 2px solid #666; border-bottom: 2px solid #666; }
.toolbar { position: fixed; bottom: 0; left: 0; right: 0; background: #161b22; border-top: 1px solid #30363d; padding: 8px 20px; display: flex; gap: 12px; align-items: center; z-index: 200; }
.toolbar button { background: #21262d; border: 1px solid #30363d; color: #e0e0e0; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; }
.toolbar button:hover { background: #30363d; }
.toolbar .status { color: #8b949e; font-size: 12px; margin-left: auto; }
.highlight-red { color: #ff6b6b; }
.highlight-blue { color: #6cb0f6; }
</style>
</head>

er-co-op-organic-fair-trade-ceylon-cinnamon-5-57-oz-158-g/106567?rcode=ADO440)</a><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br>그 외에는 엑스트라 버진 올리브 오일 매일 30ml,<br>\t\t\t<br>완두콩 단백질 매일 29그램,<br>\t\t\t<br>다크 초콜릿 15그램,<br>\t\t\t<br>비타민 B12 등을 먹는다고 합니다.<br>\t\t\t<br>비타민 B12는 채식을 하니 따로 챙겨먹는 것으로 보입니다. <br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><a href=\"https://blog.naver.com/ecotogether/222999194247\" target=\"_blank\">비타민</a> 화성인, 에코투게더 : 네이버 블로그 (naver.com)<br>\t\t\t<br><a href=\"https://blog.naver.com/PostView.naver?blogId=ecotogether&logNo=223000997866&parentCategoryNo=9&categoryNo=&viewDate=&isShowPopularPosts=true&from=search\" target=\"_blank\">회춘에</a> 매년 25억 쏟아붓는 남자의 영양제 리스트(2편) : 네이버 블로그 (naver.com)<br>\t\t\t<br><a href=\"https://blog.naver.com/ecotogether/223005172415\" target=\"_blank\">https://blog.naver.com/ecotogether/223005172415</a><br>\t\t\t<br>=================================<br>\t\t\t<br><br>\t\t\t<br>서른 넘어가면서 꼭 챙겨야 하는 3가지<br>\t\t\t<br> <br>\t\t\t<br>오메가3<br>\t\t\t<br>만성염증과 미세 염증을 낮춰주는 안전한 영양제입니다. 부담스럽지 않은 가격이지만 효과가 정말 좋은 영양제입니다. 피쉬 오일이라고도 불리니 참고해주세요.<br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br>마그네슘: 저녁 식사 이후<br>\t\t\t<br>스트레스를 낮춰줄 수 있습니다. 아주 안전하게 스트레스를 낮춰주며, 피로를 풀어주는데 도움을 줍니다. 특히, 섭취 후에 빠른 효과를 보여줍니다. 마그네슘은 신체와 정신을 릴랙스 하게 해 준다고 생각하시면 쉽습니다.<br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br>비타민B<br>\t\t\t<br>피곤함의 핵심 원인이 비타민B입니다. 섭취를 하면 강장효과를 내고, 혈관 독소를 제거하는데 도움을 줍니다. 신경재생에 꼭 필요한 비타민이고, 그래서 뇌 건강에도 좋습니다. 타우린 성분이 많이 들어있는 에너지 드링크를 드시기 전에, 우선 비타민B부터 꼭 챙기세요.<br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br>한국인에게 필수적으로 필요한 6가지 영양제로 종합비타민제, 비타민 D, 오메가-3, 칼슘과 마그네슘 복합제제, 프로바이오틱스, 비타민 C를 꼽으셨습니다. 이걸 전부 복용하면 위에 부담이 가지 않을까요?<br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br>괜찮습니다. 저와 남편은 매일 스물 몇 알의 서로 다른 캡슐과 태블릿(tablet)을 먹어요. 그렇게 먹어도 위나 간에 무리가 되지 않게 되어 있어요. 예를 들면 종합비타민제를 먹는데 항산화제인 비타민 A를 또 먹으면 문제가 돼요. 그런 경우가 아니라면 종합비타민제, 비타민D, 오메가-3, 유산균(프로바이오틱스), 비타민 C는 서로 다른 성분이기 때문에 함께 먹어도 괜찮아요.<br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br>2 피부에 가장 좋은 영양제는?<br>\t\t\t<br><br>\t\t\t<br>비타민 C와 B군이다. 비타민 C는 피부 멜라닌 색소의 합성을 억제하는 미백 효과가 있어 고용량으로 장기간 복용하면 기미나 주근깨를 없애고, 피부 내 새로운 콜라겐을 생성해 피부를 팽팽하게 만들어준다.<br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br>비타민 B군은 피지 분해를 활성화하고 비타민 C를 도와 콜라겐 생성을 돕는 작용을 하므로 비타민 C와 같이 섭취하면 좋다.<br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br>3 나이대별 꼭 필요한 피부 영양제가 있다면?<br>\t\t\t<br><br>\t\t\t<br>20대는 콜라겐 생성에 변화가 생기므로 콜라겐 합성에 도움을 주는 비타민 C가 필수. 피부 미백과 탄력, 철분 흡수를 촉진해 빈혈에 좋고 독소도 배출시킨다.<br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br>스트레스가 많은 30대 직장인이라면 비타민 B군을 추천. 피부 점막과 피부 대사를 원활하게 해서 거칠고 푸석거리는 피부를 회복시킨다. 칼슘, 마그네슘, 철분도 30대에게 꼭 필요한 서플리먼트다.<br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br>40대는 강력한 항산화 작용을 하는 비타민 E로 노화를 예방하라. 피부의 세포 재생 효과를 높여 탄력과 주름을 관리할 수 있다. 또 건조함, 기미 등은 미네랄 함량이 높은 아연이나 오메가-3 지방산이 도움이 된다.<br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br>4 마시는 콜라겐이나 비타민 워터도 피부 미용에 도움이 되나요?<br>\t\t\t<br><br>\t\t\t<br>콜라겐을 먹거나 바르는 데 있어 가장 핵심은 흡수율이다. 그냥 콜라겐은 고분자 형태로 아무리 많이 섭취해도 90% 이상이 체외로 배출된다. 더구나 시판되는 미용 음료는 맛을 내기 위해 당분이 많이 들어 있고 실제 콜라겐이나 비타민은 소량 들어 있는 경우가 대부분.<br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br>최근에 저분자화한 콜라겐펩타이드를 넣은 콜라겐 음료가 출시되기도 했는데, 체내 아미노산의 농도가 증가되어 콜라겐 합성이 촉진되었다는 연구 결과도 있지만, 손톱이나 모발이 건강해지는 효과까지만 증명된 상태로 피부에 직접적인 영향을 기대하기는 어렵다.<br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br>5 영양제를 제대로 고르는 요령과 올바른 복용법을 알려주세요.<br>\t\t\t<br><br>\t\t\t<br>비타민이나 미네랄을 구입할 때는 원산지와 제형을 따져봐야 한다. 특징에 맞춰 흡수율을 높일 수 있는 방법으로 섭취해야 하기 때문. 예를 들어 비타민 A나 E 같은 지용성 비타민은 오일 성분과 함께 흡수시켜야 하기 때문에 연질 캡슐인 것이 좋고, 비타민 C는 물에 녹여 먹을 때가 알약 형태보다 1시간 정도 빨리 흡수된다.<br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br>원산지의 경우도 영국산 비타민 C는 5번의 공정 과정을 거치지만 중국산은 3번의 공정 과정만 거치기 때문에 유럽이나 미국 등에서 좋은 원료를 가지고 만든 것을 추천한다.<br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br>또 천연 원료 비타민의 경우 실제는 1% 미만의 극소량만 포함되어 있는 경우도 있으니 성분을 꼼꼼히 확인해야 한다.<br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br>피부 컨디션에 맞게 골라 먹는 뷰티 비타민<br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br>\t\t\t<br><br>\t\t\t<br>1&#160;피부 면역력을 높이고 싶다면&#160;GNC 츄어블 비타민 C 500&E<br>\t\t\t<br><br>\t\t\t<br>비타민 C 500mg과 베타카로틴, 비타민 E가 들어 있는 영양제로 물 없이 씹어 먹는 제형이라 남녀노소 누구나 손쉽게 섭취할 수 있다. 철분 흡수를 도우면서 유해산소로부터 세포를 보호하는 효과가 탁월해 항산화 영양소가 필요한 30대 직장인들이 간편하게 챙겨 먹기 좋다.&#160;90정 3만8천원.<br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br>문의&#160;080-700-0277<br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br>2&#160;화이트닝 케어가 시급하다면&#160;오르비스 화이트 스텝 비타민 C<br>\t\t\t<br><br>\t\t\t<br>미백 효과가 탁월한 비타민 C는 화이트닝 화장품의 단골 성분. 특히 자외선 노출이 잦거나 기미나 주근깨 때문에 고민이라면 더블 비타민 C를 지속적으로 섭취해 화이트닝 케어를 해볼 것.&#160;180정 3만6천원.<br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br>문의&#160;080-301-5050<br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br>3&#160;탱탱한 피부 탄력을 원할 때&#160;세노비스 츄어블 비타민 C<br>\t\t\t<br><br>\t\t\t<br>한 알에 고함량 비타민 C 500mg이 들어 있어 간편하게 하루 권장량을 섭취할 수 있다. 탱탱한 피부를 위한 콜라겐 합성을 돕고 뇌, 혈관, 피부 등 활성산소에 손상받는 신체 세포를 보호한다.&#160;60정 2만5천원.<br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br>문의&#160;080-050-3535<br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br>4&#160;건조한 사무실에서 피부 수분 충전&#160;뷰티인 아쿠아 플러스<br>\t\t\t<br><br>\t\t\t<br>100% 고순도 국내산 히알루론산을 담은 보습 영양제. 히알루론산 생성에 도움을 주는 N-아세틸글루코사민과 피부 세포의 재생을 촉진하는 식용 달팽이 추출물, 콜라겐의 합성을 돕는 석류 추출물이 피부 속 수분을 증가시킨다.&#160;60정 4만8천원.<br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br>문의&#160;02&#183;828-0181<br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br>5&#160;불규칙한 생활과 스트레스가 오래 지속될 때&#160;네이처스플러스 식물성 비타민 슈퍼 C-1000<br>\t\t\t<br><br>\t\t\t<br>한 알에 고함량의 비타민 C 1000mg과 식물성 영양소라 불리는 로즈힙 추출 분말 100mg이 들어있다. 활성산소로부터 피부 세포 손상을 막는 항산화 영양소로, 평소 과일이나 채소보다는 육류를 즐겨 먹는 사람들에게 추천한다.&#160;60정 4만5천원.<br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br> let cards = [];
let moving = null, resizing = null;

function loadBoard() {
  const saved = localStorage.getItem(SAVE_KEY);
  cards = saved ? JSON.parse(saved) : DEFAULT_CARDS.map(c => ({...c}));
  renderCards();
  if (!saved) autoLayout();
}

function autoLayout() {
  const GAP = 14;
  const boardW = document.getElementById('board').offsetWidth;
  const cols = Math.max(1, Math.floor(boardW / 280));
  const colW = (boardW - GAP * (cols - 1)) / cols;
  const colHeights = new Array(cols).fill(0);
  const allCards = document.querySelectorAll('.card');
  const images = document.querySelectorAll('.card img');
  let loaded = 0;
  const total = images.length;

  function place() {
    allCards.forEach((el, i) => {
      const card = cards[i];
      const w = Math.min(card.w || colW, colW);
      let minCol = 0;
      for (let c = 1; c < cols; c++) if (colHeights[c] < colHeights[minCol]) minCol = c;
      card.x = minCol * (colW + GAP);
      card.y = colHeights[minCol];
      card.w = w;
      el.style.left = card.x + 'px';
      el.style.top = card.y + 'px';
      el.style.width = w + 'px';
      colHeights[minCol] = card.y + el.offsetHeight + GAP;
    });
    document.getElementById('board').style.minHeight = Math.max(...colHeights) + 100 + 'px';
    saveBoard();
  }

  if (total === 0) requestAnimationFrame(place);
  else images.forEach(img => {
    if (img.complete) { loaded++; if (loaded >= total) requestAnimationFrame(place); }
    else img.onload = img.onerror = () => { loaded++; if (loaded >= total) requestAnimationFrame(place); };
  });
}

function syncText() {
  document.querySelectorAll('.card').forEach(el => {
    const idx = +el.dataset.idx;
    if (cards[idx]?.type === 'text') {
      const t = el.querySelector('.text');
      if (t) cards[idx].content = t.innerHTML;
    }
  });
}

function saveBoard() {
  syncText();
  localStorage.setItem(SAVE_KEY, JSON.stringify(cards));
  document.getElementById('status').textContent = '저장됨 ' + new Date().toLocaleTimeString();
}

function renderCards() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  cards.forEach((card, i) => {
    const el = document.createElement('div');
    el.className = 'card';
    el.dataset.idx = i;
    if (card.x !== undefined) el.style.left = card.x + 'px';
    if (card.y !== undefined) el.style.top = card.y + 'px';
    if (card.w) el.style.width = card.w + 'px';

    el.addEventListener('mousedown', e => {
      if (e.target.closest('.text, a, .card-btn, .resize-handle, table')) return;
      e.preventDefault();
      moving = { idx: i, startX: e.clientX, startY: e.clientY, origX: card.x || 0, origY: card.y || 0 };
      el.classList.add('moving');
    });

    const actions = document.createElement('div');
    actions.className = 'card-actions';
    const delBtn = document.createElement('button');
    delBtn.className = 'card-btn'; delBtn.textContent = '×';
    delBtn.onclick = e => { e.stopPropagation(); if (confirm('삭제?')) { cards.splice(i, 1); renderCards(); saveBoard(); } };
    actions.appendChild(delBtn);
    el.appendChild(actions);

    if (card.type === 'text') {
      const text = document.createElement('div');
      text.className = 'text';
      text.contentEditable = true;
      text.innerHTML = card.content || '';
      text.addEventListener('blur', () => { card.content = text.innerHTML; saveBoard(); });
      el.appendChild(text);
    } else if (card.type === 'image') {
      const src = card.src.startsWith('http') || card.src.startsWith('data:') ? card.src : IMG_BASE + card.src;
      const img = document.createElement('img');
      img.src = src;
      img.alt = card.alt || '';
      img.loading = 'lazy';
      img.onerror = () => img.style.display = 'none';
      if (card.link) {
        const a = document.createElement('a'); a.href = card.link; a.target = '_blank';
        a.appendChild(img); el.appendChild(a);
      } else { el.appendChild(img); }
      if (card.caption) {
        const cap = document.createElement('div');
        cap.className = 'caption';
        cap.textContent = card.caption;
        el.appendChild(cap);
      }
    } else if (card.type === 'table') {
      const wrapper = document.createElement('div');
      wrapper.style.overflowX = 'auto';
      wrapper.innerHTML = card.html || '';
      el.appendChild(wrapper);
    }

    const rh = document.createElement('div');
    rh.className = 'resize-handle';
    rh.addEventListener('mousedown', e => {
      e.preventDefault(); e.stopPropagation();
      resizing = { idx: i, startX: e.clientX, startW: card.w || el.offsetWidth };
    });
    el.appendChild(rh);
    board.appendChild(el);
  });

  requestAnimationFrame(() => {
    let maxBottom = 0;
    document.querySelectorAll('.card').forEach(el => {
      const b = (parseFloat(el.style.top) || 0) + el.offsetHeight;
      if (b > maxBottom) maxBottom = b;
    });
    board.style.minHeight = (maxBottom + 100) + 'px';
  });
}

document.addEventListener('mousemove', e => {
  if (moving) {
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`);
    if (!el) return;
    const nx = moving.origX + e.clientX - moving.startX;
    const ny = moving.origY + e.clientY - moving.startY;
    el.style.left = nx + 'px';
    el.style.top = ny + 'px';
  }
  if (resizing) {
    const card = cards[resizing.idx];
    card.w = Math.max(100, resizing.startW + e.clientX - resizing.startX);
    const el = document.querySelector(`.card[data-idx="${resizing.idx}"]`);
    if (el) el.style.width = card.w + 'px';
  }
});

document.addEventListener('mouseup', e => {
  if (moving) {
    const card = cards[moving.idx];
    card.x = Math.max(0, moving.origX + e.clientX - moving.startX);
    card.y = Math.max(0, moving.origY + e.clientY - moving.startY);
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`);
    if (el) { el.classList.remove('moving'); }
    moving = null; saveBoard();
  }
  if (resizing) { resizing = null; saveBoard(); }
});

function addTextCard() {
  cards.push({ type: 'text', content: '', x: 50, y: window.scrollY + 100, w: 300 });
  renderCards();
  setTimeout(() => { const els = document.querySelectorAll('.card .text'); els[els.length - 1]?.focus(); }, 100);
}

function addImageCard() {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = 'image/*';
  input.onchange = e => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = () => { cards.push({ type: 'image', src: reader.result, x: 50, y: window.scrollY + 100, w: 240 }); renderCards(); saveBoard(); };
    reader.readAsDataURL(file);
  };
  input.click();
}

function resetLayout() {
  if (!confirm('자동 재배치합니다. 현재 위치가 변경됩니다.')) return;
  cards.forEach(c => { delete c.x; delete c.y; });
  renderCards(); autoLayout();
}

setInterval(saveBoard, 30000);
loadBoard();
</script>
</body>
</html>
