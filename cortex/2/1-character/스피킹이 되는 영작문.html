proving this month.<br>\t\t\t<br>My boss is meeting Peter for dinner.<br>\t\t\t<br>His aunt is coming soon.<br>\t\t\t<br><br>\t\t\t<br>He made a mistake today.<br>\t\t\t<br>He makes a mistake.<br>\t\t\t<br><br>\t\t\t<br>Warming up---------<br>\t\t\t<br>1/ He gets up ealry every day.<br>\t\t\t<br>2/ Time is gold.<br>\t\t\t<br>3/ She is eating/having lunch.<br>\t\t\t<br>4/ He has an eye for art.<br>\t\t\t<br>5/ We are leaving Japan tomorrow.<br>\t\t\t<br>6/ I love you.<br>\t\t\t<br>7/ Elly is thinking about her future.<br>\t\t\t<br>8/ That sounds good.<br>\t\t\t<br><br>\t\t\t<br>Sentence order training ---------<br>\t\t\t<br>1/ She is driving now.<br>\t\t\t<br>2/ The store opens at. 7 a.m.<br>\t\t\t<br><br>\t\t\t<br>Sentence writing---------<br>\t\t\t<br>1/ He has a sence of humor.<br>\t\t\t<br>2/ My bofriend is a social dininker.<br>\t\t\t<br>3/ My sister is searching for a part-time job theses days.<br>\t\t\t<br>4/ My mother is drivning now.<br>\t\t\t<br>5/ She often skip lunch.<br>\t\t\t<br>6/ We always watch movies at night.<br>\t\t\t<br><br>\t\t\t<br>We usually play basketball in class.<br>\t\t\t<br>The store is always opoen 24 hours a day.<br>\t\t\t<br><br>\t\t\t<br>Conversation speaking----------------<br>\t\t\t<br>1/ Do you usually study Engljish in the morning?<br>\t\t\t<br>No. I always study English at night.<br>\t\t\t<br>2/ What is your sister doing now?<br>\t\t\t<br>She is talking with my mother.<br>\t\t\t<br><br>\t\t\t<br>Writing training----------<br>\t\t\t<br>I always get up at 6 a.m./in the morning.<br>\t\t\t<br>I go to school by bus.<br>\t\t\t<br>I study English at language institute after shool.<br>\t\t\t<br><br>\t\t\t<br>Happy birthday.<br>\t\t\t<br>I'm in Shinchon, and I thinking about you .<br>\t\t\t<br>We have good memories here.<br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br>Unit 2. 과거시제============<br>\t\t\t<br>I went on a blind date last year.<br>\t\t\t<br>She was a member of the club.<br>\t\t\t<br>He used to call me on the phone.<br>\t\t\t<br><br>\t\t\t<br>I was reading a book then.<br>\t\t\t<br>My teacher coudn't call becuase he was meeting a person form ABC company.<br>\t\t\t<br>I was studying hard during last semester.<br>\t\t\t<br>What was he doing during his last spring vaction?<br>\t\t\t<br><br>\t\t\t<br>Warming up----------------<br>\t\t\t<br>1/ My brother got the certified last year.<br>\t\t\t<br>2/ He broke up with his girlfriend two years ago.<br>\t\t\t<br>3/ My sister was listening to music.<br>\t\t\t<br>4/ I ordered food a minute ago.<br>\t\t\t<br>5/ She worked in this department last month.<br>\t\t\t<br>6/ He took care of his grand father.<br>\t\t\t<br>7/ She was talking on the phone.<br>\t\t\t<br>8/ He gave a presentaion yesterday.<br>\t\t\t<br><br>\t\t\t<br>Sentence order training------------<br>\t\t\t<br>1/ She began skating at the age of six.<br>\t\t\t<br>2/ I was waiting for the bus yesterday.<br>\t\t\t<br><br>\t\t\t<br>Writing training-------------<br>\t\t\t<br>1/ She got married last year.<br>\t\t\t<br>2/ I won a game yesterday.<br>\t\t\t<br>3/ My father always helped my mother.<br>\t\t\t<br>4/ He finished the project this morning.<br>\t\t\t<br>5/ I used to get up ealry.<br>\t\t\t<br>6/ He was sleeping when I called him.<br>\t\t\t<br><br>\t\t\t<br>My father used to be healty.<br>\t\t\t<br>When I got home, I was very hungry.<br>\t\t\t<br><br>\t\t\t<br>Conversation speaking-----------<br>\t\t\t<br>1/ You look different. Did you change your style?<br>\t\t\t<br>Yes, I had a hair cut.<br>\t\t\t<br>2/ I called you many times. Why didn't you answer my calls?<br>\t\t\t<br>Sorry. I was sightseeing<br>\t\t\t<br><br>\t\t\t<br>Wriring trining-----------<br>\t\t\t<br>I am always get up at 6 in the morning. I go to school by bus.<br>\t\t\t<br>I study English at a language institute after shool. Yesterday, I was absent from sic.<br>\t\t\t<br>I was sick yesterday, so I was absent from my English class.<br>\t\t\t<br><br>\t\t\t<br>Happy belate brithday.<br>\t\t\t<br>I wanted to give you a gift last week, but I had a meeing in Busan.<br>\t\t\t<br>I am in Shinchon, and I am thinking about you. We have good memories here.<br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br>Unit 3. 미래시제============<br>\t\t\t<br>I will stay there tonight. = I'm going to stay there tonight.<br>\t\t\t<br>There will be a midterm next Monday. = There is going to be a midterm next Monday.<br>\t\t\t<br>I won't forget you.<br>\t\t\t<br>Don't worry. I will look after him.<br>\t\t\t<br><br>\t\t\t<br>It's so cloudy. It's going to rain sooner or later.<br>\t\t\t<br>Look at the traffic jam! We are going to be late.<br>\t\t\t<br>My room is dirty, so I'm going to clean it tonight.<br>\t\t\t<br>The meeting is going to be at 10 a.m. today.<br>\t\t\t<br><br>\t\t\t<br>Warming up----------<br>\t\t\t<br>1/ I'll send fax you.<br>\t\t\t<br>2/ He is going to join the club tomorrow.<br>\t\t\t<br>3/ I will miss you.<br>\t\t\t<br>4/ My boss is going to have lunch.<br>\t\t\t<br>5/ I will help poor people.<br>\t\t\t<br>6/ We will donate money to the foundation.<br>\t\t\t<br>7/ I'm going to hang out with my friends tonight.<br>\t\t\t<br>8/ They will put off marrige.<br>\t\t\t<br><br>\t\t\t<br>Sentence order training--------<br>\t\t\t<br>1/ I will leave Korea tomorrow.<br>\t\t\t<br>2/ She is going to do her homework tonight.<br>\t\t\t<br><br>\t\t\t<br>Sentence writing---------<br>\t\t\t<br>1/ I will quit my job next month.<br>\t\t\t<br>2/ She is going to have a baby next week.<br>\t\t\t<br>3/ I will send you an emil tomorrow.<br>\t\t\t<br>4/ I am going to see a doctor on Thursday.<br>\t\t\t<br>5/ He planing to update his blog.<br>\t\t\t<br>6/ I am going to work on a team project next month.<br>\t\t\t<br><br>\t\t\t<br>Be + planning to/ scheduled to/ supposed to/ about to + 동사원형<br>\t\t\t<br>He is planning to travel abroad.<br>\t\t\t<br>She is scheduled to have a meeing with my team next week.<br>\t\t\t<br>My brother is about to drink coffee.<br>\t\t\t<br><br>\t\t\t<br>Conversaion speaking--------<br>\t\t\t<br>1/ When will you graduate from school?<br>\t\t\t<br>I will graduate next year.<br>\t\t\t<br>2/ Are you busy next weekend?<br>\t\t\t<br>Yes, I will visit my grandmother next weekend.<br>\t\t\t<br><br>\t\t\t<br>Writing training----------<br>\t\t\t<br>I always get up at 6 in the morning. I go to shool by bus. I study English at a language institute after school. I was sick yesterday, so I absent form my class.<br>\t\t\t<br>I'm palnning to review my class today. I will update my pictures on Facebook tomorrow.<br>\t\t\t<br><br>\t\t\t<br>Happy belated birthday.<br>\t\t\t<br>I wanted to give you a gift last week, but I had a meeting in Busan.<br>\t\t\t<br>I'm in Shinchon now, and I'm thinking about you. We have good memories here.<br>\t\t\t<br>This is a gift that I picked. I hope that you will like it. <br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br>Unit 4. 현재완료_1<br>\t\t\t<br>He has just sent you an email.<br>\t\t\t<br>Have you already arrived there?<br>\t\t\t<br>Have you ever studied English?<br>\t\t\t<br>I've smoked once.<br>\t\t\t<br><br>\t\t\t<br>She has used the cellphone before. > Has she used the cellphone before?<br>\t\t\t<br>She has used the cellphone before. > She has not used cellphone before.<br>\t\t\t<br><br>\t\t\t<br>She hasn't got there yet.<br>\t\t\t<br>She has just called you.<br>\t\t\t<br>I've seen the movie twice.<br>\t\t\t<br><br>\t\t\t<br>Warming up-------------<br>\t\t\t<br>1/ I have already finished my homwork.<br>\t\t\t<br>2/ Have you ever eaten Korean food?<br>\t\t\t<br>3/ He has just called you.<br>\t\t\t<br>4/ Has she ever taken the test?<br>\t\t\t<br>5/ He has used cellphone before.<br>\t\t\t<br>6/ I have not recived a letter from him yet.<br>\t\t\t<br>7/ I have naver seen the actor.<br>\t\t\t<br>8/ I have played the game twice.<br>\t\t\t<br><br>\t\t\t<br>Sentence order training------------<br>\t\t\t<br>1/ Have you already met him?<br>\t\t\t<br>2/ He has never tried to get up ealry.<br>\t\t\t<br><br>\t\t\t<br>Sentence writing------------<br>\t\t\t<br>1/ I've just sent my resume.<br>\t\t\t<br>2/ He has alreay eaten breakfast.<br>\t\t\t<br>3/ He has met the movie actor before.<br>\t\t\t<br>4/ Have you ever tried Kimchi?<br>\t\t\t<br>5/ She has been to Busan.<br>\t\t\t<br>6/ She has gone to Japan on business.<br>\t\t\t<br><br>\t\t\t<br>He has been to America.<br>\t\t\t<br>He has gone to America.<br>\t\t\t<br>I have gone to America.<br>\t\t\t<br><br>\t\t\t<br>Converastion speaking------------<br>\t\t\t<br>1/ How many times have you ever been to America?<br>\t\t\t<br>I've never been to America.<br>\t\t\t<br>2/ I am very hungry.<br>\t\t\t<br>Mother hasn't made breakfast yet.<br>\t\t\t<br><br>\t\t\t<br>Writing training-------------<br>\t\t\t<br>Jane: Have you ever had a blind date?<br>\t\t\t<br>Elly: I have alredy had a blind date.<br>\t\t\t<br>Jane: Really? What was he like?<br>\t\t\t<br><br>\t\t\t<br>I'm happy to have an interview.<br>\t\t\t<br>This is Hana Kim.<br>\t\t\t<br>I've worked with Sony before.<br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br>Unit 5. 현재완료_2<br>\t\t\t<br>He has been sick since last year.<br>\t\t\t<br>She has worked for the company for five years.<br>\t\t\t<br><br>\t\t\t<br>She has painted this house for a week.<br>\t\t\t<br>She has been painting this house for a week.<br>\t\t\t<br><br>\t\t\t<br>My uncle has gone to America.<br>\t\t\t<br>I've left my book at home<br>\t\t\t<br><br>\t\t\t<br>Warming up-------------<br>\t\t\t<br>1/ We have known each other since last year.<br>\t\t\t<br>2/ He has broken his arm.<br>\t\t\t<br>3/ She has read the book for three days.<br>\t\t\t<br>4/ He has gone to England on business.<br>\t\t\t<br>5/ Has your mother cleaned a room?<br>\t\t\t<br>6/ I'v lost the file.<br>\t\t\t<br>7/ My boyfriend has been working in the office<br>\t\t\t<br>8/ My aunt has lived alone.<br>\t\t\t<br><br>\t\t\t<br>Sentence order trining-------<br>\t\t\t<br>1/ I've colleted stamps since last year.<br>\t\t\t<br>2/ I've forgoten his phone number.<br>\t\t\t<br><br>\t\t\t<br>Sentence Wriring---------<br>\t\t\t<br>1/ I've learned/studied English for two years.<br>\t\t\t<br>2/ He has been tired since last week.<br>\t\t\t<br>3/ They have moved to Busan.<br>\t\t\t<br>4/ I've locked my key in the car <br>\t\t\t<br>5/ He has lived in Busan since he was young<br>\t\t\t<br>6/ He lived in Busan when he was young<br>\t\t\t<br><br>\t\t\t<br>She has lived in Seoul since 2016<br>\t\t\t<br>He went on a date with his girlfriend here three years ago.<br>\t\t\t<br>They have read the book since they were young.<br>\t\t\t<br><br>\t\t\t<br>Converstion speaking------------<br>\t\t\t<br>1/ How long have you worked in the marketing department?<br>\t\t\t<br>I've been working in this department for two years.<br>\t\t\t<br>2/ Where is your laptop?<br>\t\t\t<br>I've sold it on the internet.<br>\t\t\t<br><br>\t\t\t<br>Writing trining----------<br>\t\t\t<br>Jane: Have you ever had a blind date?<br>\t\t\t<br>Elly: I've already had a blind date.<br>\t\t\t<br>Jane: Really? What was he like?<br>\t\t\t<br>Elly: He is kind. We have been dating each other for eight months.<br>\t\t\t<br><br>\t\t\t<br>I'm happy to have an inerview. This is Hana Kim.<br>\t\t\t<br>I've worked in SKY Company's sales department  for five years.<br>\t\t\t<br>I've worked with Sony before. I've sucessfully completed many projects.<br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br>Unit 6. 과거완료, 미래완료==============<br>\t\t\t<br>She had lived in Incheon for five years befor she died.<br>\t\t\t<br>He had alreay left work when I called him.<br>\t\t\t<br>Before I was 20 years old, I had never studied English.<br>\t\t\t<br><br>\t\t\t<br>I will have been married for 20 years by next year.<br>\t\t\t<br>She will have finished her job before six o'clock.<br>\t\t\t<br>He will have lived here for 10 yerars by next month.<br>\t\t\t<br><br>\t\t\t<br>Warmig up-----------<br>\t\t\t<br>1/ I will have read this book for two weeks by next week.<br>\t\t\t<br>2/ Before when I was 10 years old, I had naver/not been to abroad.<br>\t\t\t<br>3/ She will have lived abroad for three years by next year.<br>\t\t\t<br>4/ When students entered the classroom, the lesson had already begun.<br>\t\t\t<br>5/ They will have finished thier work by forur o'clock.<br>\t\t\t<br>6/ By the time she arrived, he had left there.<br>\t\t\t<br>7/ James had lived here for nine yerars when I saw him.<br>\t\t\t<br>8/ My parents will have been married for twenty years by next yerar.<br>\t\t\t<br><br>\t\t\t<br>Sentence order training------------<br>\t\t\t<br>1/ My sister will have worked there for 8 years by next year.<br>\t\t\t<br>2/ I had lost my bag when I left the train.<br>\t\t\t<br><br>\t\t\t<br>Sentence writing------------<br>\t\t\t<br>1/ The train had already departed when I arrived at the station.<br>\t\t\t<br>2/ I will have studied English for three years by next year.<br>\t\t\t<br>3/ I had never been to America before I moved to here 3 years ago <br>\t\t\t<br>4/ I will have dated my boyfriend for eight months by next month.<br>\t\t\t<br>5/ My sister had been sick for three months When I came back to Koera.<br>\t\t\t<br>6/ He will have been playing in the NBA for ten years by next season.<br>\t\t\t<br><br>\t\t\t<br>They will have been reviewing his working papers until he arrives.<br>\t\t\t<br>I will have been lying on the couch for two hours by the time you visit me.<br>\t\t\t<br><br>\t\t\t<br>Conversation speaking---------<br>\t\t\t<br>1/ Did you have lunch with James?<br>\t\t\t<br>When I arrived at the restaurant, he had already eaten lunch .<br>\t\t\t<br>2/ How long have you been using your cellphone?<br>\t\t\t<br>I will have used this cellphone for 8 months by next month.<br>\t\t\t<br><br>\t\t\t<br>Writing trining-----------<br>\t\t\t<br>Jane: Have you ever had a blind date?<br>\t\t\t<br>Elly: I have already had a blind date last year.<br>\t\t\t<br>Jane: Really? What was he like?<br>\t\t\t<br>Elly: He is kine. We have been dating each other for 8 months.<br>\t\t\t<br>Jane: Where dose he live?<br>\t\t\t<br>Elly: He will have lived in Suwon for 4 months by next month. He had lived near my house before moved to there<br>\t\t\t<br><br>\t\t\t<br>I'm happy to have an interviw. This is Hana kim. I have been working in SKY company's sales department for 5 years. I have worked with Sony before. I have sucessfully completed many projects. Before I worked in sales department, I had worked in marketing field,. I think I have specialties in both the marketing and sales filds.<br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br>Chapter 4. Passive voice<br>\t\t\t<br>Unit 1. 수동태_1<br>\t\t\t<br>She wirite a story. > A story is written by her. <br>\t\t\t<br>He sold a computer. > A computer was sold by him.<br>\t\t\t<br>They will build a new hospital next year. > A new hospital will be built by them next year.<br>\t\t\t<br><br>\t\t\t<br>English is spoken in America.<br>\t\t\t<br>Many people were killed in the war.<br>\t\t\t<br>The window was broken.<br>\t\t\t<br><br>\t\t\t<br>Warming up----------------<br>\t\t\t<br>1/ The car was designed by Daniel.<br>\t\t\t<br>2/ A new model was introduced by Jack.<br>\t\t\t<br>3/ This bread was baked by my mother.<br>\t\t\t<br>4/ The car was repaired by my father.<br>\t\t\t<br>5/ This house was built by my grandfather.<br>\t\t\t<br>6/ This file was deleted.<br>\t\t\t<br>7/ The thief was arrested by the police.<br>\t\t\t<br>8/ Senior citizens should be respected.<br>\t\t\t<br><br>\t\t\t<br>Sentence order traning---------<br>\t\t\t<br>1/ The picture was painted by Picasso.<br>\t\t\t<br>2/ We will make the wedding cake.<br>\t\t\t<br><br>\t\t\t<br>Sentence writing--------<br>\t\t\t<br>1/ The meeitng will be held next Monday.<br>\t\t\t<br>2/ The house was built in 1990<br>\t\t\t<br>3/ Magazines are sold at a the conveninence stores.<br>\t\t\t<br>4/ I was scold by my teacher.<br>\t\t\t<br>5/ He resembles his mother.<br>\t\t\t<br>6/ He have a good/nice car.<br>\t\t\t<br><br>\t\t\t<br>Have, resemble, suit, lack, fit<br>\t\t\t<br>I had a nice laptop.<br>\t\t\t<br>These shoes fit me well.<br>\t\t\t<br><br>\t\t\t<br>Conversation speaking----------<br>\t\t\t<br>1/ How took care of you during your childhood?<br>\t\t\t<br>I was raised by my garndmother when I was young because my mother was busy for working.<br>\t\t\t<br>2/ Did you attend the meeting yesterday?<br>\t\t\t<br>The meeting was canceled yesterday.<br>\t\t\t<br><br>\t\t\t<br>Writing trainning---------<br>\t\t\t<br>Time is so rough<br>\t\t\t<br>My best friend was fired last week.<br>\t\t\t<br><br>\t\t\t<br>Have you been to JOY restaurant?<br>\t\t\t<br>I heard that the restaurant was renovated.<br>\t\t\t<br>How about meeting around 5 p.m. today?<br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br>Unit 2. 수동태_2=============<br>\t\t\t<br>The playground was covered with snow.<br>\t\t\t<br>I was pleased with your email.<br>\t\t\t<br>She was annoyed at me.<br>\t\t\t<br><br>\t\t\t<br>Wrming up---------------<br>\t\t\t<br>1/ My parents pleased with my promtion.<br>\t\t\t<br>2/ I'm scared of the bug.<br>\t\t\t<br>3/ The teacher known for his sincerity.<br>\t\t\t<br>4/ The libaray was fulled of/filled with books.<br>\t\t\t<br>5/ She annoyed at/by his attitude.<br>\t\t\t<br>6/ Are you tired of the story?<br>\t\t\t<br>7/ Is he was interest in the position?<br>\t\t\t<br>8/ We was satisfied with the result last year.<br>\t\t\t<br><br>\t\t\t<br>Sentence order training------------<br>\t\t\t<br>1/ She is concerned about her score.<br>\t\t\t<br>2/ I was annoyed at/by his rude manners.<br>\t\t\t<br><br>\t\t\t<br>Sentence writing-----------<br>\t\t\t<br>1/ The restaurant is crowded with people on Friday.<br>\t\t\t<br>2/ I am not satisfied with my English ability.<br>\t\t\t<br>3/ My parents waren't satisfied with the result.<br>\t\t\t<br>4/ The company was well known to young people.<br>\t\t\t<br>5/ I'am sick and tired of getting up early.<br>\t\t\t<br>6/ She is interested in keeping a diary in English.<br>\t\t\t<br><br>\t\t\t<br>She is tired of studing English.<br>\t\t\t<br>He is interested in meeting you.<br>\t\t\t<br><br>\t\t\t<br>Conversation speaking------<br>\t\t\t<br>1/ How was your test yesterday?<br>\t\t\t<br>The test was difficult. I'm scared of failing the math exam.<br>\t\t\t<br>2/ Did your boss like your presentaion?<br>\t\t\t<br>My boss was very disappointed with/in my presentaion.<br>\t\t\t<br> <br>\t\t\t<br>The Ttime is so rough. My best friend was fired last week.<br>\t\t\t<br>I was so surprised at the news. I'm worried about my future.<br>\t\t\t<br><br>\t\t\t<br>Have you been to JOY restaurant? The restaurant is known for pizza. I heard that the restaurant was renovated. I thkink the restaurant looks nice. How about meeing around 5 p.m today. It is crowded with many people during lunch hour.<br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br>Chapter 5. Gerund========<br>\t\t\t<br>Unit 1. 동명사<br>\t\t\t<br>Staying up all night is not a good idea.<br>\t\t\t<br>Speaing English is not easy.<br>\t\t\t<br>Walking in the forest is making us feel free.<br>\t\t\t<br><br>\t\t\t<br>I finished working on a project.<br>\t\t\t<br>He is thinking of going to America.<br>\t\t\t<br><br>\t\t\t<br>My hobby is listening to music.<br>\t\t\t<br>Her goal is becoming a singer.<br>\t\t\t<br><br>\t\t\t<br>Warming up-------------<br>\t\t\t<br>1/ Taking a walk is one of my favorite thigs to do.<br>\t\t\t<br>2/ I enjoy singing songs in front of my friends.<br>\t\t\t<br>3/ Thank you for giving advicing me kindly.<br>\t\t\t<br>4/ My favorit part of the job is studying with my students.  <br>\t\t\t<br>5/ We put off dicussing the problem.<br>\t\t\t<br>6/ My favorit hobby is searching surfing for the internet.<br>\t\t\t<br>7/ Reading an English novel is very important.<br>\t\t\t<br>8/ I am good at speaking English.<br>\t\t\t<br><br>\t\t\t<br>Sentence order training----------<br>\t\t\t<br>1/ I avoided meeting him in personal.<br>\t\t\t<br>2/ Taking the subway is faster in the morning.<br>\t\t\t<br><br>\t\t\t<br>Sentence writing-------------<br>\t\t\t<br>1/ I give up persuading him.<br>\t\t\t<br>2/ Her job is helping the poor people.<br>\t\ let cards = [];
let moving = null, resizing = null;

function loadBoard() {
  const saved = localStorage.getItem(SAVE_KEY);
  cards = saved ? JSON.parse(saved) : DEFAULT_CARDS.map(c => ({...c}));
  renderCards();
  if (!saved) autoLayout();
}

function autoLayout() {
  const GAP = 14;
  const boardW = document.getElementById('board').offsetWidth;
  const cols = Math.max(1, Math.floor(boardW / 280));
  const colW = (boardW - GAP * (cols - 1)) / cols;
  const colHeights = new Array(cols).fill(0);
  const allCards = document.querySelectorAll('.card');
  const images = document.querySelectorAll('.card img');
  let loaded = 0;
  const total = images.length;

  function place() {
    allCards.forEach((el, i) => {
      const card = cards[i];
      const w = Math.min(card.w || colW, colW);
      let minCol = 0;
      for (let c = 1; c < cols; c++) if (colHeights[c] < colHeights[minCol]) minCol = c;
      card.x = minCol * (colW + GAP);
      card.y = colHeights[minCol];
      card.w = w;
      el.style.left = card.x + 'px';
      el.style.top = card.y + 'px';
      el.style.width = w + 'px';
      colHeights[minCol] = card.y + el.offsetHeight + GAP;
    });
    document.getElementById('board').style.minHeight = Math.max(...colHeights) + 100 + 'px';
    saveBoard();
  }

  if (total === 0) requestAnimationFrame(place);
  else images.forEach(img => {
    if (img.complete) { loaded++; if (loaded >= total) requestAnimationFrame(place); }
    else img.onload = img.onerror = () => { loaded++; if (loaded >= total) requestAnimationFrame(place); };
  });
}

function syncText() {
  document.querySelectorAll('.card').forEach(el => {
    const idx = +el.dataset.idx;
    if (cards[idx]?.type === 'text') {
      const t = el.querySelector('.text');
      if (t) cards[idx].content = t.innerHTML;
    }
  });
}

function saveBoard() {
  syncText();
  localStorage.setItem(SAVE_KEY, JSON.stringify(cards));
  document.getElementById('status').textContent = '저장됨 ' + new Date().toLocaleTimeString();
}

function renderCards() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  cards.forEach((card, i) => {
    const el = document.createElement('div');
    el.className = 'card';
    el.dataset.idx = i;
    if (card.x !== undefined) el.style.left = card.x + 'px';
    if (card.y !== undefined) el.style.top = card.y + 'px';
    if (card.w) el.style.width = card.w + 'px';

    el.addEventListener('mousedown', e => {
      if (e.target.closest('.text, a, .card-btn, .resize-handle, table')) return;
      e.preventDefault();
      moving = { idx: i, startX: e.clientX, startY: e.clientY, origX: card.x || 0, origY: card.y || 0 };
      el.classList.add('moving');
    });

    const actions = document.createElement('div');
    actions.className = 'card-actions';
    const delBtn = document.createElement('button');
    delBtn.className = 'card-btn'; delBtn.textContent = '×';
    delBtn.onclick = e => { e.stopPropagation(); if (confirm('삭제?')) { cards.splice(i, 1); renderCards(); saveBoard(); } };
    actions.appendChild(delBtn);
    el.appendChild(actions);

    if (card.type === 'text') {
      const text = document.createElement('div');
      text.className = 'text';
      text.contentEditable = true;
      text.innerHTML = card.content || '';
      text.addEventListener('blur', () => { card.content = text.innerHTML; saveBoard(); });
      el.appendChild(text);
    } else if (card.type === 'image') {
      const src = card.src.startsWith('http') || card.src.startsWith('data:') ? card.src : IMG_BASE + card.src;
      const img = document.createElement('img');
      img.src = src;
      img.alt = card.alt || '';
      img.loading = 'lazy';
      img.onerror = () => img.style.display = 'none';
      if (card.link) {
        const a = document.createElement('a'); a.href = card.link; a.target = '_blank';
        a.appendChild(img); el.appendChild(a);
      } else { el.appendChild(img); }
      if (card.caption) {
        const cap = document.createElement('div');
        cap.className = 'caption';
        cap.textContent = card.caption;
        el.appendChild(cap);
      }
    } else if (card.type === 'table') {
      const wrapper = document.createElement('div');
      wrapper.style.overflowX = 'auto';
      wrapper.innerHTML = card.html || '';
      el.appendChild(wrapper);
    }

    const rh = document.createElement('div');
    rh.className = 'resize-handle';
    rh.addEventListener('mousedown', e => {
      e.preventDefault(); e.stopPropagation();
      resizing = { idx: i, startX: e.clientX, startW: card.w || el.offsetWidth };
    });
    el.appendChild(rh);
    board.appendChild(el);
  });

  requestAnimationFrame(() => {
    let maxBottom = 0;
    document.querySelectorAll('.card').forEach(el => {
      const b = (parseFloat(el.style.top) || 0) + el.offsetHeight;
      if (b > maxBottom) maxBottom = b;
    });
    board.style.minHeight = (maxBottom + 100) + 'px';
  });
}

document.addEventListener('mousemove', e => {
  if (moving) {
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`);
    if (!el) return;
    const nx = moving.origX + e.clientX - moving.startX;
    const ny = moving.origY + e.clientY - moving.startY;
    el.style.left = nx + 'px';
    el.style.top = ny + 'px';
  }
  if (resizing) {
    const card = cards[resizing.idx];
    card.w = Math.max(100, resizing.startW + e.clientX - resizing.startX);
    const el = document.querySelector(`.card[data-idx="${resizing.idx}"]`);
    if (el) el.style.width = card.w + 'px';
  }
});

document.addEventListener('mouseup', e => {
  if (moving) {
    const card = cards[moving.idx];
    card.x = Math.max(0, moving.origX + e.clientX - moving.startX);
    card.y = Math.max(0, moving.origY + e.clientY - moving.startY);
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`);
    if (el) { el.classList.remove('moving'); }
    moving = null; saveBoard();
  }
  if (resizing) { resizing = null; saveBoard(); }
});

function addTextCard() {
  cards.push({ type: 'text', content: '', x: 50, y: window.scrollY + 100, w: 300 });
  renderCards();
  setTimeout(() => { const els = document.querySelectorAll('.card .text'); els[els.length - 1]?.focus(); }, 100);
}

function addImageCard() {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = 'image/*';
  input.onchange = e => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = () => { cards.push({ type: 'image', src: reader.result, x: 50, y: window.scrollY + 100, w: 240 }); renderCards(); saveBoard(); };
    reader.readAsDataURL(file);
  };
  input.click();
}

function resetLayout() {
  if (!confirm('자동 재배치합니다. 현재 위치가 변경됩니다.')) return;
  cards.forEach(c => { delete c.x; delete c.y; });
  renderCards(); autoLayout();
}

setInterval(saveBoard, 30000);
loadBoard();
</script>
