<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BOX (종이박스, 스티로폼 박스)</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #1e1e1e;
  color: #e0e0e0;
  font-family: 'Segoe UI', -apple-system, sans-serif;
  font-size: 15px;
  line-height: 1.6;
  padding: 20px 30px 60px;
  overflow-x: hidden;
}
a { color: #6cb0f6; text-decoration: none; }
a:hover { text-decoration: underline; }
.title-bar {
  background: #3a3a5c;
  display: inline-block;
  padding: 6px 16px;
  font-size: 22px;
  font-weight: bold;
  color: #fff;
  margin-bottom: 4px;
}
.date { color: #999; font-size: 13px; margin-bottom: 20px; }
.board { position: relative; }
.card {
  background: #2a2a2a;
  border: 1px solid #3a3a3a;
  border-radius: 8px;
  padding: 12px;
  position: absolute;
  cursor: grab;
  transition: box-shadow 0.15s;
  overflow: hidden;
}
.card:hover { box-shadow: 0 0 0 1px #58a6ff; z-index: 10; }
.card.moving { opacity: 0.8; box-shadow: 0 4px 24px rgba(0,0,0,0.6); z-index: 100; cursor: grabbing; }
.card img { width: 100%; border-radius: 4px; display: block; }
.card .caption { font-size: 12px; color: #888; margin-top: 6px; }
.card .text { outline: none; min-height: 20px; white-space: pre-wrap; word-break: break-word; }
.card .text:focus { background: rgba(255,255,255,0.05); border-radius: 4px; padding: 4px; }
.card .text:empty::before { content: '텍스트 입력...'; color: #555; }
.card table { border-collapse: collapse; width: 100%; font-size: 13px; }
.card table td, .card table th { border: 1px solid #444; padding: 4px 8px; vertical-align: top; }
.card table th { background: #333; color: #ccc; }
.card-actions { position: absolute; top: 4px; right: 4px; display: none; gap: 4px; }
.card:hover .card-actions { display: flex; }
.card-btn { background: #333; border: 1px solid #555; color: #ccc; border-radius: 4px; padding: 2px 6px; font-size: 11px; cursor: pointer; }
.card-btn:hover { background: #444; color: #fff; }
.resize-handle { position: absolute; bottom: 0; right: 0; width: 16px; height: 16px; cursor: se-resize; opacity: 0; }
.card:hover .resize-handle { opacity: 0.6; }
.resize-handle::after { content: ''; position: absolute; bottom: 3px; right: 3px; width: 8px; height: 8px; border-right: 2px solid #666; border-bottom: 2px solid #666; }
.toolbar { position: fixed; bottom: 0; left: 0; right: 0; background: #161b22; border-top: 1px solid #30363d; padding: 8px 20px; display: flex; gap: 12px; align-items: center; z-index: 200; }
.toolbar button { background: #21262d; border: 1px solid #30363d; color: #e0e0e0; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; }
.toolbar button:hover { background: #30363d; }
.toolbar .status { color: #8b949e; font-size: 12px; margin-left: auto; }
.highlight-red { color: #ff6b6b; }
.highlight-blue { color: #6cb0f6; }
</style>
</head>
<body>
<div class="title-bar">BOX (종이박스, 스티로폼 박스)</div>

<div class="board" id="board"></div>

  <button onclick="addTextCard()">+ 텍스트</button>

<script>
const SAVE_KEY = 'board-BOX-종이박스-스티로폼-박스-';
const IMG_BASE = '../../attachments/';
const DEFAULT_CARDS = [
  {
    "type": "text",
    "content": "BOX (종이박스, 스티로폼 박스)<br>\t\t<br>\t\t<br>\t<br>\t<br>\t\t<br>\t\t\t<br><a href=\"https://www.facebook.com/HiLokumi/videos/%EA%B7%B8%EB%85%80%EC%9D%98-%EC%B0%BD%EC%97%85%EC%8D%B0-07-%EC%A0%9C%EC%A1%B0-%EC%8A%A4%ED%83%80%ED%8A%B8%EC%97%85-%EA%B3%B5%EC%9E%A5%EC%97%90%EC%84%9C-%EC%99%84%EC%A0%9C%ED%92%88%EC%9D%84-%EB%A7%8C%EB%93%9C%EB%8A%94-%EB%B0%A9%EB%B2%95-%EC%8B%A4%EB%AC%B4%EC%9A%A9%EC%96%B4-%EC%96%B4%EB%96%A4-%EB%B6%80%EC%9E%90%EC%9E%AC%EB%A5%BC-%EB%84%A3%EC%9D%84%EC%A7%80-%EB%8B%A8%EA%B0%80%EB%A5%BC-%EC%96%B4%EB%96%BB%EA%B2%8C-%EB%A7%9E%EC%B6%9C%EC%A7%80-%EC%A0%9C%EC%A1%B0%EC%97%85-%EC%B0%BD%EC%97%85-%EC%8B%A4%EB%AC%B4%ED%8C%81/1144852675902890/\" target=\"_blank\">https://www.facebook.com/HiLokumi/videos/%EA%B7%B8%EB%85%80%EC%9D%98-%EC%B0%BD%EC%97%85%EC%8D%B0-07-%EC%A0%9C%EC%A1%B0-%EC%8A%A4%ED%83%80%ED%8A%B8%EC%97%85-%EA%B3%B5%EC%9E%A5%EC%97%90%EC%84%9C-%EC%99%84%EC%A0%9C%ED%92%88%EC%9D%84-%EB%A7%8C%EB%93%9C%EB%8A%94-%EB%B0%A9%EB%B2%95-%EC%8B%A4%EB%AC%B4%EC%9A%A9%EC%96%B4-%EC%96%B4%EB%96%A4-%EB%B6%80%EC%9E%90%EC%9E%AC%EB%A5%BC-%EB%84%A3%EC%9D%84%EC%A7%80-%EB%8B%A8%EA%B0%80%EB%A5%BC-%EC%96%B4%EB%96%BB%EA%B2%8C-%EB%A7%9E%EC%B6%9C%EC%A7%80-%EC%A0%9C%EC%A1%B0%EC%97%85-%EC%B0%BD%EC%97%85-%EC%8B%A4%EB%AC%B4%ED%8C%81/1144852675902890/</a><br>\t\t\t<br><br>\t\t\t<br>연세대 패키징 학과 <a href=\"https://pkg.yonsei.ac.kr/pkg/index.do\" target=\"_blank\">https://pkg.yonsei.ac.kr/pkg/index.do</a><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br>생분해성 랩도 있어야하고<br>\t\t\t<br><br>\t\t\t<br>문제점.<br>\t\t\t<br>종이박스<br>\t\t\t<br>스티로폼 환경문제<br>\t\t\t<br>포장에 소요되는 인력과 시간, 저마다 다른 사이즈<br>\t\t\t<br><br>\t\t\t<br>박스 대체재요건<br>\t\t\t<br>필수<br>\t\t\t<br>내구성 내마모력 인장강도가 박스보다 뛰어날것. 스티로폼같은 단열. 방수력. 가벼울것. 네모형태일 것. 원가가 저렴할 것. 표면에 프린팅이 가능할것<br>\t\t\t<br><br>\t\t\t<br><a href=\"https://1boon.kakao.com/bizion/5cae8c93ed94d200019fa77c\" target=\"_blank\">https://1boon.kakao.com/bizion/5cae8c93ed94d200019fa77c</a><br>\t\t\t<br><br>\t\t\t<br>수거 재활용할건지<br>\t\t\t<br>그냥 버려도 문제없도록 할건지 전허 다른비즈니스야<br>\t\t\t<br><br>\t\t\t<br>가정내 재사용이 가능하게, 뜯으면 키친타윌로 쓸수 있다던가<br>\t\t\t<br><br>\t\t\t<br><a href=\"https://www.google.com/amp/s/mnews.joins.com/amparticle/23401557\" target=\"_blank\">https://www.google.com/amp/s/mnews.joins.com/amparticle/23401557</a><br>\t\t\t<br><br>\t\t\t<br>서빙고 프로젝트<br>\t\t\t<br>문제는 배송박스가 아닐수도...<br>\t\t\t<br><br>\t\t\t<br>신선식품은<br>\t\t\t<br>수거 세척 및 재공급이 좋겠는데?<br>\t\t\t<br><br>\t\t\t<br>냉장박스 문밖에 무전원 냉장박스 층전식.<br>\t\t\t<br><br>\t\t\t<br>벽 사이에 얼린얼음을 넣으면 어때?<br>\t\t\t<br><br>\t\t\t<br>모든 골판지를 대체할 그 무엇<br>\t\t\t<br><br>\t\t\t<br>롤형태로 말려있지만 열을 가하거나하면 강도가 엄청 세지는 소재? <br>\t\t\t<br><br>\t\t\t<br>테일러 메이드. 재단 택배박스. 종이보다 더 친환경적일것. 먹어도 될것.<br>\t\t\t<br><br>\t\t\t<br>스프레이형태<br>\t\t\t<br>판넬 접합형태 두가지로 만든다.<br>\t\t\t<br><br>\t\t\t<br>헥사곤구조의 다공성 골판젤리. 생분해성 소재.<br>\t\t\t<br>근데 박스는 중첩되는 부분땜에 위아래가 좀더 강해 그만큼의 강도를 보강할 구조가 있어야해. 푹 꺼지찌 않는다구 날개땜에<br>\t\t\t<br><br>\t\t\t<br>롤형태로 말려있지만 열을 가하거나하면 강도가 엄청 세지는 소재? <br>\t\t\t<br><br>\t\t\t<br><a href=\"http://www.ttimes.co.kr/view.html?no=2019080117247754500&fbclid=IwAR1_YKOUTLsRtQKaUz3vkW929Cn47hveyxgLf8w-vWuuHJG8WuwwTVwyK1U\" target=\"_blank\">http://www.ttimes.co.kr/view.html?no=2019080117247754500&fbclid=IwAR1_YKOUTLsRtQKaUz3vkW929Cn47hveyxgLf8w-vWuuHJG8WuwwTVwyK1U</a><br>\t\t\t<br><br>\t\t\t<br>out of box<br>\t\t\t<br>xoB<br>\t\t\t<br><br>\t\t\t<br>스파이더맨 웹슈터처럼 한번에 확. 360도에서 분사. 바닥은?<br>\t\t\t<br><a href=\"https://www.youtube.com/watch?v=8CpxHuvN_iI\" target=\"_blank\">https://www.youtube.com/watch?v=8CpxHuvN_iI</a><br>\t\t\t<br><br>\t\t\t<br>표면에 직접분사하는 옵션과<br>\t\t\t<br>박스형태로 만들어주는 옵션 -> 이건 스프레이가 아니어도될거 같은데? 4면을 미리 만들고 나머지를 납땜하듯이(약봉지 누르듯이 찍어버리면 어때)<br>\t\t\t<br><br>\t\t\t<br>3D 프린터로 박스를 스프레이 하는거야 각 규격에 맞게<br>\t\t\t<br>생분해성 물질을 분사하는거지<br>\t\t\t<br><br>\t\t\t<br>아님 그걸 모아서 재활용<br>\t\t\t<br><br>\t\t\t<br>관건은 포장단가를 낮추는거야. 종이. 플라스틱보다 싸야해. 규모의경제 밖에 답이 없나?<br>\t\t\t<br><br>\t\t\t<br>음식에 직접분사해도 좋은물질<br>\t\t\t<br><br>\t\t\t<br>단열 보냉 충격흡수. 인장강도가 적절하고. 분사즉시 응결되어야함.<br>\t\t\t<br><br>\t\t\t<br>지구상에서 종이박스와 스티로폼을 제거하는 것. 우리의 미션.<br>\t\t\t<br><br>\t\t\t<br>렌탈 구독모델<br>\t\t\t<br>moss<br>\t\t\t<br><br>\t\t\t<br>프린터는 렌탈, 카트리지 판매모델.<br>\t\t\t<br><br>\t\t\t<br>패브릭캔<br>\t\t\t<br>아님 용액을 짜내서 뿌리는 방시<br>\t\t<br>\t\t<br>\t\t\t<br>알루미늄/스트론튬 합금(Aluminium/Strontium alloy)&#160;대부분의 금속은 반복된 ‘연마’의 과정을 거치며 점점 단단해진다. 그러나 이 독특한 합금은 그 속도가 훨씬 빠른데, 단 한 번만 구부려도 완전하게 단단해진다.<br>\t\t\t<br><br>\t\t\t출처: <<a href=\"http://mdesign.designhouse.co.kr/article/article_view/101/49358\" target=\"_blank\">http://mdesign.designhouse.co.kr/article/article_view/101/49358</a>> <br>\t\t\t<br>16 크로마틱 알긴(Chromatic alginate)&#160;미역을 원료로 만들어 인체에 완전히 무해한 이 재료는 모델 제작자들에게 환상적인 재료다. 유연하고 정교한 금속 거푸집을 만들 때 쓰이는데, 석고나 플라스틱 또는 앞에서 언급한 필드 금속 같은 저온 용해 금속 등에 활용할 수 있다.<br>\t\t\t<br><br>\t\t\t출처: <<a href=\"http://mdesign.designhouse.co.kr/article/article_view/101/49358\" target=\"_blank\">http://mdesign.designhouse.co.kr/article/article_view/101/49358</a>> <br>\t\t\t<br><br>\t\t\t<br>17 미크론(MicronalⓇ)&#160;이 재료는 주변 환경의 온도에 적응한다. 파라핀 왁스에 싸인 미세한 플라스틱 캡슐로 만들어졌다. 주변 온도가 올라가면 그 열기를 흡수하고, 온도가 내려가면 반대로 왁스가 더 단단해지면서 저장한 열을 내뿜는다.<br>\t\t\t<br><br>\t\t\t출처: <<a href=\"http://mdesign.designhouse.co.kr/article/article_view/101/49358\" target=\"_blank\">http://mdesign.designhouse.co.kr/article/article_view/101/49358</a>> <br>\t\t\t<br><br>\t\t\t<br><br>\t\t<br>\t\t<br>\t\t\t<br>PP자동벤딩기<br>\t\t\t<br><br>\t\t\t<br><a href=\"https://www.youtube.com/watch?v=zZffvVwkV4g\" target=\"_blank\">https://www.youtube.com/watch?v=zZffvVwkV4g</a><br>\t\t\t<br><br>\t\t\t<br>ㅇ 문제점<br>\t\t\t<br>1/ 바닥포장: 미리 깔려있는 포장재 위로 밀려 올라오게하는 방식<br>\t\t\t<br>  -> 가운데 정위치<br>\t\t\t<br>2/ 박스 안에서 움직이지 않도록 고정: 버블을 넣거나, 박스랑 연결해줄만한 뭔가 필요해<br>\t\t\t<br><br>\t\t\t<br><a href=\"https://youtu.be/F1nAm0xZdpU?t=192\" target=\"_blank\">신박한 자동포장 기계</a><br>\t\t\t<br><br>\t\t\t<br>\t\t\t<br><br>\t\t\t<br>고급사양 옵션<br>\t\t\t<br>1/ 회전형 컨베이어 벨트(기계식 주차장 앞에있는 회전 원판)<br>\t\t\t<br>2/ 자동 스캐닝으로 다양한 사이즈 연속 포장",
    "w": 400
  }
];

let cards = [];
let moving = null, resizing = null;

function loadBoard() {
  const saved = localStorage.getItem(SAVE_KEY);
  cards = saved ? JSON.parse(saved) : DEFAULT_CARDS.map(c => ({...c}));
  renderCards();
  if (!saved) autoLayout();
}

function autoLayout() {
  const GAP = 14;
  const boardW = document.getElementById('board').offsetWidth;
  const cols = Math.max(1, Math.floor(boardW / 280));
  const colW = (boardW - GAP * (cols - 1)) / cols;
  const colHeights = new Array(cols).fill(0);
  const allCards = document.querySelectorAll('.card');
  const images = document.querySelectorAll('.card img');
  let loaded = 0;
  const total = images.length;

  function place() {
    allCards.forEach((el, i) => {
      const card = cards[i];
      const w = Math.min(card.w || colW, colW);
      let minCol = 0;
      for (let c = 1; c < cols; c++) if (colHeights[c] < colHeights[minCol]) minCol = c;
      card.x = minCol * (colW + GAP);
      card.y = colHeights[minCol];
      card.w = w;
      el.style.left = card.x + 'px';
      el.style.top = card.y + 'px';
      el.style.width = w + 'px';
      colHeights[minCol] = card.y + el.offsetHeight + GAP;
    });
    document.getElementById('board').style.minHeight = Math.max(...colHeights) + 100 + 'px';
    saveBoard();
  }

  if (total === 0) requestAnimationFrame(place);
  else images.forEach(img => {
    if (img.complete) { loaded++; if (loaded >= total) requestAnimationFrame(place); }
    else img.onload = img.onerror = () => { loaded++; if (loaded >= total) requestAnimationFrame(place); };
  });
}

function syncText() {
  document.querySelectorAll('.card').forEach(el => {
    const idx = +el.dataset.idx;
    if (cards[idx]?.type === 'text') {
      const t = el.querySelector('.text');
      if (t) cards[idx].content = t.innerHTML;
    }
  });
}

function saveBoard() {
  syncText();
  localStorage.setItem(SAVE_KEY, JSON.stringify(cards));
  document.getElementById('status').textContent = '저장됨 ' + new Date().toLocaleTimeString();
}

function renderCards() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  cards.forEach((card, i) => {
    const el = document.createElement('div');
    el.className = 'card';
    el.dataset.idx = i;
    if (card.x !== undefined) el.style.left = card.x + 'px';
    if (card.y !== undefined) el.style.top = card.y + 'px';
    if (card.w) el.style.width = card.w + 'px';

    el.addEventListener('mousedown', e => {
      if (e.target.closest('.text, a, .card-btn, .resize-handle, table')) return;
      e.preventDefault();
      moving = { idx: i, startX: e.clientX, startY: e.clientY, origX: card.x || 0, origY: card.y || 0 };
      el.classList.add('moving');
    });

    const actions = document.createElement('div');
    actions.className = 'card-actions';
    const delBtn = document.createElement('button');
    delBtn.className = 'card-btn'; delBtn.textContent = '×';
    delBtn.onclick = e => { e.stopPropagation(); if (confirm('삭제?')) { cards.splice(i, 1); renderCards(); saveBoard(); } };
    actions.appendChild(delBtn);
    el.appendChild(actions);

    if (card.type === 'text') {
      const text = document.createElement('div');
      text.className = 'text';
      text.contentEditable = true;
      text.innerHTML = card.content || '';
      text.addEventListener('blur', () => { card.content = text.innerHTML; saveBoard(); });
      el.appendChild(text);
    } else if (card.type === 'image') {
      const src = card.src.startsWith('http') || card.src.startsWith('data:') ? card.src : IMG_BASE + card.src;
      const img = document.createElement('img');
      img.src = src;
      img.alt = card.alt || '';
      img.loading = 'lazy';
      img.onerror = () => img.style.display = 'none';
      if (card.link) {
        const a = document.createElement('a'); a.href = card.link; a.target = '_blank';
        a.appendChild(img); el.appendChild(a);
      } else { el.appendChild(img); }
      if (card.caption) {
        const cap = document.createElement('div');
        cap.className = 'caption';
        cap.textContent = card.caption;
        el.appendChild(cap);
      }
    } else if (card.type === 'table') {
      const wrapper = document.createElement('div');
      wrapper.style.overflowX = 'auto';
      wrapper.innerHTML = card.html || '';
      el.appendChild(wrapper);
    }

    const rh = document.createElement('div');
    rh.className = 'resize-handle';
    rh.addEventListener('mousedown', e => {
      e.preventDefault(); e.stopPropagation();
      resizing = { idx: i, startX: e.clientX, startW: card.w || el.offsetWidth };
    });
    el.appendChild(rh);
    board.appendChild(el);
  });

  requestAnimationFrame(() => {
    let maxBottom = 0;
    document.querySelectorAll('.card').forEach(el => {
      const b = (parseFloat(el.style.top) || 0) + el.offsetHeight;
      if (b > maxBottom) maxBottom = b;
    });
    board.style.minHeight = (maxBottom + 100) + 'px';
  });
}

document.addEventListener('mousemove', e => {
  if (moving) {
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`);
    if (!el) return;
    const nx = moving.origX + e.clientX - moving.startX;
    const ny = moving.origY + e.clientY - moving.startY;
    el.style.left = nx + 'px';
    el.style.top = ny + 'px';
  }
  if (resizing) {
    const card = cards[resizing.idx];
    card.w = Math.max(100, resizing.startW + e.clientX - resizing.startX);
    const el = document.querySelector(`.card[data-idx="${resizing.idx}"]`);
    if (el) el.style.width = card.w + 'px';
  }
});

document.addEventListener('mouseup', e => {
  if (moving) {
    const card = cards[moving.idx];
    card.x = Math.max(0, moving.origX + e.clientX - moving.startX);
    card.y = Math.max(0, moving.origY + e.clientY - moving.startY);
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`);
    if (el) { el.classList.remove('moving'); }
    moving = null; saveBoard();
  }
  if (resizing) { resizing = null; saveBoard(); }
});

function addTextCard() {
  cards.push({ type: 'text', content: '', x: 50, y: window.scrollY + 100, w: 300 });
  renderCards();
  setTimeout(() => { const els = document.querySelectorAll('.card .text'); els[els.length - 1]?.focus(); }, 100);
}

function addImageCard() {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = 'image/*';
  input.onchange = e => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = () => { cards.push({ type: 'image', src: reader.result, x: 50, y: window.scrollY + 100, w: 240 }); renderCards(); saveBoard(); };
    reader.readAsDataURL(file);
  };
  input.click();
}

function resetLayout() {
  if (!confirm('자동 재배치합니다. 현재 위치가 변경됩니다.')) return;
  cards.forEach(c => { delete c.x; delete c.y; });
  renderCards(); autoLayout();
}

setInterval(saveBoard, 30000);
loadBoard();
</script>
</body>
</html>
