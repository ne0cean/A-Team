    "content": "나만 보는 것은 무엇인가?<br>\t\t\t<br>나만 중요하게 여기는 것은 무엇인가?<br>\t\t\t<br>나는 나에게 어떤 질문을 하는가?<br>\t\t\t<br>나는 최근에 어떤 질문을 많이 했는가?<br>\t\t\t<br>나는 최근에 어떤 질문에 대한 대답을 가장 많이 했는가?<br>\t\t\t<br>나의 행동이 다른 사람과 비교되는 것은 무엇일까?<br>\t\t\t<br>나만의 독특한 사고방식은 무엇일까?<br>\t\t\t<br>내가 최근에 선택하고 결정한 기준은 무엇인가?<br>\t\t<br>\t\t<br>\t\t\t<br>조직이든 개인이든 운영철학이 필요하며<br>\t\t\t<br>그 철학은 자기를 향한 질문으로부터 나온다.<br>\t\t\t<br>자기문답으로부터 나만의 Color와 스토리가 나온다.<br>\t\t<br>\t\t<br>\t\t\t<br><br>\t\t\t<br><br>\t\t<br>\t\t<br>\t\t\t<br><br>\t\t\t<br><br>\t\t<br>\t\t<br>\t\t\t<br>LIFE Hack <a href=\"http://ppss.kr/archives/61298\" target=\"_blank\">http://ppss.kr/archives/61298</a><br>\t\t\t<br>성장문답 하이어라키<br>\t\t\t<br>\t\t\t\t<br>- 비즈니스/ 인터스텔라<br>\t\t\t\t<br>- 네트워크<br>\t\t\t\t<br>- 성장<br>\t\t\t<br>\t\t\t<br><a href=\"https://brunch.co.kr/@ilwoncoach/28\" target=\"_blank\">https://brunch.co.kr/@ilwoncoach/28</a><br>\t\t\t<br><br>\t\t\t<br><a href=\"https://www.google.co.kr/amp/news.donga.com/amp/all/20140714/65150042/1\" target=\"_blank\">https://www.google.co.kr/amp/news.donga.com/amp/all/20140714/65150042/1</a><br>\t\t\t<br><br>\t\t\t<br>인생의 중요한 비밀을 알려줄까?<br>\t\t\t<br>그건, 우리의 인생은 사실 아무런 의미가 없다는 거야.<br>\t\t\t<br>그저 존재하지. 의미가 있어서 피어난게 아니란거야.<br>\t\t\t<br><br>\t\t\t<br><a href=\"https://www.facebook.com/pokepoke.kr/videos/409576336151961/?t=3\" target=\"_blank\">https://www.facebook.com/pokepoke.kr/videos/409576336151961/?t=3</a><br>\t\t\t<br><br>\t\t\t<br>Reason to die<br>\t\t\t<br><br>\t\t\t<br>내게,<br>\t\t\t<br><br>\t\t\t<br>성공이란, 자유를 얻는 것이다.<br>\t\t\t<br><br>\t\t\t<br>자유란 아침에 일어나서<br>\t\t\t<br>하고 싶은 일을 하는 것이다. <br>\t\t\t<br><br>\t\t\t<br>두 가지의 균형이 필요하다.<br>\t\t\t<br>간헐적 행복과 궁극의 사명<br>\t\t\t<br><br>\t\t\t<br>왜 월급쟁이처럼 살면서 스타플레이어가 되길 원해?<br>\t\t\t<br><br>\t\t\t<br>50대의 내가 오늘의 내게 묻는거다.<br>\t\t\t<br><br>\t\t\t<br>왜 사는가? - 나라는 책의 결말을 보고 싶다.<br>\t\t\t<br>                 나라는 등장인물(주인공)이 어떤 모습으로 <br>\t\t\t<br>                 나의 내일이 궁금하다. 호기심, 그래서 살 수 밖에 없다.<br>\t\t\t<br><br>\t\t\t<br>무엇이 나를 가장 행복하게 만드는가?<br>\t\t\t<br>나 스스로를 잘아스럽게 느꼈던 작은 경험들은?<br>\t\t\t<br>무엇이 나의 아침을 깨우는가?<br>\t\t\t<br>친구들은 내가 무엇을 잘 한다고 말하던가?<br>\t\t\t<br>내가 가장 이야기하기 좋아하는 것은?<br>\t\t\t<br>나의 롤 모델은 누구이며 왜 그는 탁월한가?<br>\t\t\t<br><br>\t\t\t<br>ㅇ 어제와 다른 방식으로 처리한 일은 무엇인가?<br>\t\t\t<br><br>\t\t\t<br>ㅇ 나의 와우팩터, 킬러 팩터는 무엇이고 무엇이 되어야 할까? <br>\t\t\t<br>오래도록 변하지 않는 가치를, 차별화 하라. <br>\t\t\t<br>나의 장점은 무엇이고 그걸 어디서 강점화 할 수 있을까<br>\t\t\t<br><br>\t\t\t<br>ㅇ 성공의 정의<br>\t\t\t<br>\"성공이란, 아침에 일어나<br>\t\t\t<br>내가 하고싶은 일을 할 수 있는것.\"<br>\t\t\t<br>자유.시간을 완전히 내것으로 소유하는 것<br>\t\t\t<br><br>\t\t\t<br>ㅇ 관계 : 오늘 하루 몇 명의 친구/지인에게 연락했나<br>\t\t\t<br>ㅇ 감사: 오늘 감사한 것은 무엇인가?<br>\t\t\t<br>ㅇ 명상<br>\t\t\t<br><br>\t\t\t<br>ㅇ '부'란 나에게 어떤 의미인가?<br>\t\t\t<br> - 보험: 불시의 지출이 필요한 상황에 대비<br>\t\t\t<br> - 투자: 효율적으로 운영해야 할 삶의 자산<br>\t\t\t<br>ㅇ 월급쟁이 로써 타인이 보는 나의 차별화된 강점?<br>\t\t\t<br>  -  시냅스 같은 빠른 소통과 피드백<br>\t\t\t<br>   적시 보고 3단 보고<br>\t\t\t<br>\t\t\t\t<br>-  Plan B 사고: 다른 뷰<br>\t\t\t<br>\t\t\t<br><br>\t\t\t<br>ㅇ 내 삶의 슬로건은? 마이닝 마인드? <br>\t\t\t<br>  MADE<br>\t\t\t<br><br>\t\t\t<br>ㅇ <br>\t\t\t<br><br>\t\t\t<br>\"앞으로 10년 동안에 어떤 변화를 예측하고 있습니까?\" 이런 질문을 많이 받는다. 재미있는 질문이지만, 식상한 질문이다. 하지만 이런 질문은 안 물어본다. \"앞으로 10년 동안 바뀌지 않는 것은 무엇입니까? 이 두 질문 중에서, 두 번째 질문이 더 중요한 질문이라고 말하고 싶다. 앞으로 예측 가능한 정보를 가지고, 비즈니스 전략을 수립하기가 더 쉬우니까. 소비자들은 더 낮은 가격과 더 빠른 배송, 더 많은 선택을 원한다. 앞으로 10년 동안 이 전제는 바뀌지 않을 것이다. 아마 이런 상상을 하기는 힘들 것 이다. \"이봐 베조스, 나 아마존이 참 좋은데, 값을 좀 비싸게 냈으면 좋겠어.\" \"나 아마존이 참 좋은데, 배송이 너무 빠르게 와\"&#160;우리는 이 불변하는 전제에 힘 쓰고있기 때문에 10년이 지나도 헛고생은 아닐 것이다. 오랜 시간이 지나도 불변하는 것을 알면, 그런 곳에 시간을 많이 투자하는 것이 좋다.<br>\t\t\t<br><br>\t\t\t<br>11. 1994년에 아마존을 시작하는 결정은 생각보다 쉽게 했다. 이때 나는 \"후회 최소화\"라는 생각 방식을 사용했다. 80살이 되었을 때를 생각하고 인생을 되돌아보면서 어떻게 하면 후회를 최소로 줄일까 생각하면 된다. 내가 80살이 되었을 때 아마존을 만들려고 시도했던 것을 후회하지 않을 것이다. 인터넷이 엄청난 것이라 생각했으니까, 인터넷이 무엇인지는 잘 몰랐고, 실패한다고 해도 한번 해 보는 것이 후회하지 않는다. 하나 확실했던 것은 아마존을 시작하지 않았다면 평생 후회했을 것이다.<br>\t\t\t<br>엘론 머스트 1달러 프로젝트<br>\t\t\t<br>그는 창업하기 전에 본인에게 얼마 정도가 필요한지 알아보기 위한 일종의 실험을 했다. 하루에 1달러씩만 쓰고 사는 것으로, 핫도그와 오렌지 한 달치로 1달러 프로젝트 생활을 감행했다. 그에게는 컴퓨터가 있었기 때문에 돈이 많지 않아도 충분히 즐길 수 있었고, 1달러 프로젝트로 생활하는 것도 그리 나쁘지 않다고 판단했다. 그래서 한 달에 30달러 이상만 벌면 되겠다고 결심하고, 주저없이 창업을 시작했다. 창업의 목표는 '인터넷, 우주, 친환경 에너지' 분야로 정했다. 이후 성공한 CEO로 사는 지금도, 사사로운 욕심이 적은 편에 속하는 사람으로 알려져있다.<br>\t\t\t<br><br>\t\t\t<br>\"창업하고 망하면 어쩌지? 안정적인 삶을 살 수 있는 기회마저 잃는거 아냐?\"",

    "content": "“선배가 수년 전 들려준 얘기가 있다. 3가지를 늘 고민하라고 했다. <br>\t\t\t<br>’너는 도대체 무엇을 갖고 있는가’, ’무엇을 원하는가’, ’무엇을 버릴 것인가’가 그것이다.누구라도 일생 동안 가져야 할 고민이다.”<br>\t\t\t<br><br>\t\t\t<br>ㅇ 오늘 하루 한 좋은 일 한가지는 무엇인가?<br>\t\t\t<br>ㅇ 샤워하면서 그날 일어났으면 좋겠다고 생각하는 3가지 장면을 그려본다<br>\t\t\t<br>ㅇ 오늘은 무엇을 새로 배웠는가? - 1일 1기 - 블로그 연재<br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br>미국의 연간 예산 규모 ()의 자산이 있다면, 무엇을 하겠는가?<br>\t\t\t<br><br>\t\t\t<br>\t\t\t\t<br>- 많은 시간을 책을 읽는데 쓰겠다.<br>\t\t\t<br>\t\t\t<br><br>\t\t\t<br>만일 단 한번 반드시 성공할 수 있다고 하면<br>\t\t\t<br>무슨일을 하겠는가?<br>\t\t\t<br><br>\t\t\t<br>두려움을 느끼지 않는다면 무슨일을 하겠는가?<br>\t\t\t<br><br>\t\t\t<br>그 선택을 했을 때 일어날 수 있는 최악의 일들을<br>\t\t\t<br>써봐라. 사실 별거 아닐거다.<br>\t\t\t<br><br>\t\t\t<br>무엇을 원하는가<br>\t\t\t<br>무엇을 할 수 있는가.<br>\t\t\t<br>무엇을 버릴 수 있는가<br>\t\t\t<br><br>\t\t\t<br>중요하지 않은 건 무시할 줄도 알았고<br>\t\t\t<br>자신감이 있었다.<br>\t\t\t<br><br>\t\t\t<br>두려움을 느끼지 않는다면,<br>\t\t\t<br>실패하지 않는다면,<br>\t\t\t<br>미국의 예산만큼을 자산으로 가진다면<br>\t\t\t<br>무슨 일을 하겠는가?<br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br>2015년 내가 도전 혁신한 경험?<br>\t\t\t<br><br>\t\t\t<br>칼럼니스트 롤리 다스칼의 '영향력 있는 사람들이 매일 스스로에게 하는 6가지 질문<br>\t\t\t<br>(6 Questions Powerful People Ask Themselves Daily)'<br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br>1. 오늘 내가 한 일이 내 삶의 목표와 부합했는가?<br>\t\t\t<br>성공한 리더들은 목표를 설정하는 일이 얼마나 중요한지 잘 이해하고 있다. 장기적인 비전을 단기적인 동기부여와 잘 '연결'할 수 있어야 한다. <br>\t\t\t<br>삶의 목표에 집중하는 것이야말로 당신의 야망과 영감을 높여줄 수 있으며 계속 유지하도록 돕는다.<br>\t\t\t<br><br>\t\t\t<br>2. 버려야 할 나쁜 습관은 무엇인가?<br>\t\t\t<br>나쁜 습관은 누구나 갖고 있다. 하지만 그런 습관이 당신의 신용과 비즈니스와 업무에 악영향을 미친다. <br>\t\t\t<br>하루 일과 시간 중에 잠시라도 시간을 쪼개서 당신이 고치지 못하고 있는 나쁜 습관이 무엇인지 자문해 봐야 한다. 하루 5분의 시간이면 충분하다. <br>\t\t\t<br>오늘도 고치지 못한 습관을 내일은 버릴 수 있도록 노력하겠다는 마음만으로도 당신의 나쁜 습관은 몰라보게 줄어든다.<br>\t\t\t<br><br>\t\t\t<br>3. 오늘 나를 자극한 일은 무엇이었나?<br>\t\t\t<br>동기부여는 앞으로 나아갈 수 있게 하는 힘을 준다. 위대한 인물들은 자신을 자극하고 동기부여를 했던 일들과 사람을 절대 잊지 않고 기록해 둔다. 그리고 '동기부여 노트'를 이따금 열어서 확인한다.<br>\t\t\t<br>때로는 힘들고 낙담할 순간이 있을 것이다. 하지만 동기부여 노트에 적혀있는 수많은 '짜릿하고 통찰력 넘치는' 일들과 고수들을 떠올리면 재충전 할 수 있을 것이다.<br>\t\t\t<br><br>\t\t\t<br>4. 지금의 나는 내가 되고 싶은 그런 사람인가?<br>\t\t\t<br>사람은 태어난 순간 변하지 않고 고정된 '물건'이 아니다. 사람은 자신이 경험한 일들, 성공, 실패 등을 통해서 변화하고 발전하는 유기체다.<br>\t\t\t<br>당신의 성격과 캐릭터 그리고 생각과 믿음도 변할 수 있고 더욱 발전할 수 있다. 매일 저녁 하루를 마감하면서 스스로 이런 질문을 해보면 큰 도움이 된다. \"지금 나는 정말 내가 되고 싶었던 그런 사람인가?\"<br>\t\t\t<br><br>\t\t\t<br>5. 오늘 내가 저지른 실수는 무엇이었고, 그리고 그것을 통해 무엇을 배웠나?<br>\t\t\t<br>사람은 누구나 실수를 하고 실패를 경험한다. 하지만 그런 실수와 실패에 어떻게 반응하는지는 사람마다 확연히 다르다.<br>\t\t\t<br>실패를 당신의 무능함과 패배로 생각할 수도 있다. 하지만 쉽게 얻을 수 없는 경험과 교훈을 얻었다고 생각할 수 있다. 선택은 당신의 몫이다.<br>\t\t\t<br><br>\t\t\t<br>6. 오늘 내가 감사하게 생각한 것은 무엇이었나?<br>\t\t\t<br>살다보면 좋은 날도, 힘든 날도 있다. 하지만 하루를 보낸 뒤 오늘 무슨 일에 감사했는지 생각해 보는 일은 위에서 언급한 것들 보다 더욱 중요할지도 모른다.<br>\t\t\t<br>당신이 무슨 일에 감사하게 생각하는지 돌아보면, 삶에서 어떤 부분을 중요하게 생각하는지 알 수 있기 때문이다. 그런 감사함에 대한 자문이 인생에서 가장 중요한 것들을 잊지 않도록 돕는다. <br>\t\t\t<br>위대한 리더와 성공적인 CEO들은 매일 스스로에게 이러한 질문을 던진다고 한다. <br>\t\t\t<br>물론 '매일' 질문을 던지는 이유는 한 두 번 질문을 던진다고 해서, 우리의 인생이 간단히 바뀌지 않기 때문이다. <br>\t\t\t<br>올바른 질문이 당신에게 올바른 대답으로 이끌 것이다. 위에 소개한 질문을 메모한 뒤 매일 스스로에게 던져보면 어떨까?<br>\t\t\t<br><br>\t\t\t<br>1. 성공이 자신에게 어떤 의미인지 결정하라. (You Must Decide What Success Means For You.)<br>\t\t\t<br>셸은 대부분의 이들이 커리어를 선택할 때 가족들의 기대와 문화적인 믿음에 많은(때론 무의식적으로) 영향을 받는다고 확신한다. 그렇게 많은 이들이 자신의 직업을 불행하게 느끼고 관여도가 낮은 이유 중 하나는 자신이 가진 기술/흥미/열정과 일을 서로 매치하는데 실패했기 때문이라는 것이다. 따라서 그는 스스로에게 “내 심장이 무엇을 할 때 노래하는지?” “성공이란 내게 무엇인지?”를 물어봐야 한다고 주장했다.<br>\t\t\t<br>셸은 “성공을 연구하면서 가장 큰 아이러니 중 하나는 많은 이들이 동떨어지고 찾기 어려운 어딘가 – ‘외부’에 있는 걸 이루는 게 비결이라 믿는다는 겁니다. 진실은 더 단순한데요, 해답은 자신 안에 있습니다.”라고 말했다.<br>\t\t\t<br>아무리 충분히 자신을 이해하며 무장한들 여전히 자신에게 더 깊은 영감을 주는 것보다는 안전한 커리어 패스를 쫓는 게 더 쉽다.<br>\t\t\t<br>셸은 우리가 더 용감하고 대담한 선택을 하길 바라며 스티브 잡스의 가슴 아픈 통찰을 예로 들었다. “당신이 가진 시간은 한정되어 있습니다. 그러니 다른 사람처럼 사느라 삶을 낭비하지 마세요. …그리고 무엇보다 중요한 건 용기를 내어 자신의 마음과 직감을 따르는 겁니다. 그럼 진짜 무엇이 되고 싶을지 알 수 있습니다.”<br>\t\t\t<br>&#160;<br>\t\t\t<br>2. 시도와 오류를 통해 자신의 목적을 발견하라. (We Discover Our Purpose By Trial And Error.)<br>\t\t\t<br>셸은 “종종 시도와 에러를 경험하며 성공이 무엇인지 찾아내는 건 그저 이론적인 사색이 아닙니다. 위기와 실험을 겪게 됩니다. 성공은 일련의 고정된 과정이 아니며, 역동적입니다.”라고 말했다.<br>\t\t\t<br>셸은 결국에 자신의 삶과 아직 펼쳐지지 않은 경험을 관찰하라고 했다. “여러 활동을 동해 삶을 경험할 수 있습니다. 그리고 이를 통해 어떤 게 통하며, 어떤 게 신나고 충족감을 주는지를 배우게 됩니다. 또한 어떤 게 자신을 만족시키지 못하면서 공허함 / 헛됨 / 냉소 / 물질주의를 느끼게 하는지 깨닫고, 이런 것들을 거부할 줄 알게 됩니다.”<br>\t\t\t<br>최근 셸과 대화를 나누었는데, 이런 걸 반영하여 집중적으로 시간을 들이는 게 성공하는데 필수적이라며 강조했다. “사람들은 소셜 미디어를 통해 느끼는 많은 흥분감들로 인해, 자신이 삶에서 무엇을 할 수 있을지 발견하는 걸 도와줄 안목을 쉽게 갖지 못하게 되었습니다.”<br>\t\t\t<br>&#160;<br>\t\t\t<br>3. 무엇보다도 자신이 잘하는 걸 발견하라. (Discover What You Do Better Than Most.)<br>\t\t\t<br>셸은 “성공은 그 무엇보다도 자신이 잘하는 것으로부터 시작됩니다. 일반적으로 자신이 일하는 능력을 독특하게 조합하는 데에서 야기되죠. 지금 자신이 기존에 가지고 있던 흥미/경험/기술을 완벽하게 발휘할 수 있는 기회를 찾으면서 미래가 열립니다.”라고 말했다.<br>\t\t\t<br>셸은 자신이 실제로 가진 유니크한 재능을 더 많은 이들에게 공유하는 게 인간의 본질이라 믿는다. 자신이 가진 능력을 목록화할 때에는 그 중 어떤 것이라도 부인하고 리스트에서 지우려는 충동에 저항한다.<br>\t\t\t<br>또한 그는 동료/친구/상사들에게 각자의 독특한 시각으로 본 나의 강점/약점/성격/능력이 무엇이라 생각하는지 알려달라 요청하라고 했다. “다른 이들이 우리를 어떻게 받아들이는지를 반영하는 안경을 들여다 보며 많은 것을 배울 수 있습니다. 어떤 일이 자신을 만족시키는지 찾기 위해선 자신을 더욱 많이, 정확히 아는 게 필수적입니다.”<br>\t\t\t<br>&#160;<br>\t\t\t<br>4. 성공에는 2가지 측면이 있다. (There Are Two Sides Of Success.)<br>\t\t\t<br>자신의 삶에서 성공을 감정하다 보면 2가지 점수판을 가지게 되곤 한다.<br>\t\t\t<br>첫번째 점수판은 가족 / 타인과의 관계 / 의미 있는 일에서 얻는 충족감 / 만족감 / 행복 같은 ‘내면’의 느낌이다. 두번째는 성취 / 사회적인 인지 / 존경에 대한 욕구로 이어지는 ‘외부’적인 면이다.<br>\t\t\t<br>어떤 이들은 성공을 주로 성취한 것으로 측정하는 반면, 어떤 이들은 특히 내부의 만족 / 충족감으로 측정하며, 대부분은 이 2가지의 균형을 맞추게 된다.<br>\t\t\t<br>셸은 두말 할 것 없이 지구상의 그 어떤 이들보다 더 많은 시간을 성공의 컨셉을 숙고하며 보냈으며, (그 결과) 어떤 쪽의 축이 삶에서 가장 큰 행복으로 이끌어준다고 믿는지 명확히 밝혀냈다.<br>\t\t\t<br>그는 행복한 삶이란 어떤 것인지 강의 시간에 그의 학생들에게 물어봤던 얘기를 들려주었다. 많은 학생들이 답변한 후에, (분명히 학생으로 안보일 정도로) 가장 나이 든 남성이 일어나서 “행복은 딱 3가지입니다. 건강하고, 의미 있는 일을 하고 사랑을 하는 거죠.”<br>\t\t\t<br>셸의 관점에서 보자면 이 ‘현명한 천사’의 말은 기본적으로 옳다. “돈을 많이 버는 게 명예와 자부심을 높여줄 순 있어도, 자신이 경험하는 일상의 기쁨에 미치는 영향은 매우 적습니다. 그리고 이외에 행복에서 더 크고 정신적인 면 이상으로 자신의 삶에서 중요하게 여기는 건 없습니다.”<br>\t\t\t<br>&#160;<br>\t\t\t<br>5. ‘복권에 당첨될 경우’를 물어보라. (Ask The Lottery Question.)<br>\t\t\t<br>직장에서 리더 위치에 있는 이들이 모두 이 글을 읽으리라 생각치는 않으나, 그럼에도 셸의 마지막 인사이트는 모든 이에게 매력적이며 유용하다.<br>\t\t\t<br>그는 팀 매니저들이 팀원을 채용하는 면접을 볼 때마다 이 중요한 질문을 하라고 충고한다.’“복권에 당첨되어서 더 이상 돈이 주요 동기가 아닐 때를 상상해 보세요. 가족들은 충분한 보살핌을 받을 수 있고, 당신은 복권이 당첨되어 이름을 떨칠만한 정도의 돈을 받게 되었습니다. 이후의 당신의 삶에서 어떤 걸 하고 싶나요?”<br>\t\t\t<br>셸은 이 질문을 통해 면접자들의 마음 속을 직접 알 수 있다고 믿는다. “뭔가를 해 주는 사람이 되고 싶다면 그런 일이 그들에게 매우 의미 있다는 겁니다. 뭔가를 가르치고 싶어한다면 당장 어떤 것이 그들에게 만족감을 주는지 알 수 있습니다.”<br>\t\t\t<br>철학자인 버트런드 러셀(Bertrand Russell)은 ‘의미 있는 일’을 갖는다는 건 ‘외부의 모든 문제와 어려움에도 불구하고 모든 이의 영혼을 행복하게 하는 것’이라 했다. 따라서 면접에서 복권에 당첨될 경우를 물어보기 전에 먼저 스스로에게 물어보라.<br>\t\t\t<br><br>\t\t\t<br>'내 삶의 목적' 발견하는 8가지 질문<br>\t\t\t<br><br>\t\t\t<br>\t\t\t\t<br>- 누군가 총을 당신 머리에 대고, 꿈을 이야기 하라고 위협한다면<br>\t\t\t\t<br>- 앞으로 3년 밖에 못산다면?<br>\t\t\t\t<br>- 힘든 순간도 견딜 수 있는 일은 무엇인가?<br>\t\t\t\t<br>- 식음을 전폐하고 전념하는 일이 뭔가?<br>\t\t\t\t<br>- 시간 가는 줄도, 배고픈 줄도 모르고 하는 일<br>\t\t\t\t<br>- 꼬마였을 때 당신을 흥분시켰던 일이 뭔가?<br>\t\t\t\t<br>- 다모임 글쓰기, 점프업, 피티 만들기<br>\t\t\t\t<br>- 당신에게 평생 매달 충분한 생활비가 나온다면 뭘 하겠는가?<br>\t\t\t\t<br>- 당신이 지금 10살이라면 뭘 안했다고 후회할 것 같은가?<br>\t\t\t\t<br>눈을 감고 상상해보자. 죽음이 눈앞에 다가왔고 지나온 인생이 주마등처럼 스쳐간다. 좋은 일, 나쁜일, 여러 일이 있었다. 뭘 하지 않았다면 후회할 거 같은가 그건 꼭 했어야 했는데… 그게 뭘까.<br>\t\t\t\t<br>- 뭔가에 자연스럽게 끌리나? 신문이나 잡지를 펼치면 자연스럽게 뭐부터 보나? 혹은 다른 사람 집에 처음 갔을 때 뭐 눈에 먼저 보이나?<br>\t\t\t\t<br>이성이 개입되지 않고도, 내 유전자가 땡기는게 있다.<br>\t\t\t\t<br><br>\t\t\t\t<br>[미래의 자신을 그리며 메모하기]<br>\t\t\t\t<br>ㅇ 어떤 곳에 사는가?<br>\t\t\t\t<br>ㅇ 주변에 어떤 사람이 있는가?<br>\t\t\t\t<br>ㅇ 어떤 식으로 아침에 일어나는가?<br>\t\t\t\t<br>ㅇ 어디에 가고 싶은가?<br>\t\t\t\t<br>ㅇ 어떤 일을 하는가?<br>\t\t\t\t<br>ㅇ 그때 어떤 표정으로 있었는가?<br>\t\t\t\t<br>ㅇ 누구와 무엇을 하려고 하는가?<br>\t\t\t\t<br>ㅇ 그 다음에는 또 무엇을 하고 싶은가?<br>\t\t\t\t<br><br>\t\t\t\t<br>매해 1월 1일 이런 질문,<br>\t\t\t\t<br>무엇을 할 생각인지 말해줘요,<br>\t\t\t\t<br>파란만장하고 귀중한 단 한번뿐인 인생으로.<br>\t\t\t\t<br><br>\t\t\t\t<br><br>\t\t\t\t<br>- Q. 현재 내가 가진 것으로 나를 설명해보세요.<br>\t\t\t\t<br>- Q. 첫 번째 국내여행, 첫 번째 해외여행, 혼자 떠난 첫 번째 여행에 대한 기억을 적어보세요.<br>\t\t\t\t<br>- Q. 나에게 여행은 어떤 의미인가요? 여행을 통해 발견한 나는 어떤 모습이었나요?<br>\t\t\t\t<br>- Q. 용서받고 싶은 사람이 있나요? 그 이유는 무엇인가요? 용서받기 위해서는 어떻게 해야 할까요?<br>\t\t\t\t<br>- Q. 내 인생의 음악을 적어보세요.<br>\t\t\t\t<br>- Q. 내 인생의 책을 적어보세요.<br>\t\t\t\t<br>- Q. 현재 직업을 선택한 순간을 떠올려보세요. 직업&#160;선택에 영향을 준 요인은 무엇인가요?<br>\t\t\t\t<br>- Q. 일할 때 주로 어떤 감정을 느끼나요? 그런 감정은 무엇 때문에 일어나나요?<br>\t\t\t\t<br>- Q. 내 마음속에 있는 가장 순수한 바람은 무엇인가요?<br>\t\t\t\t<br>- Q. 나에게 행복한 삶이란 어떤 의미인가요?<br>\t\t\t\t<br><br>\t\t\t\t출처: <<a href=\"http://ppss.kr/archives/86477\" target=\"_blank\">http://ppss.kr/archives/86477</a>> <br>\t\t\t\t<br><br>\t\t\t\t<br>- 계획 - 기회비용이 제로라면 무엇을 하고 싶은가?<br>\t\t\t\t<br>업무 시간에 무엇을 하며 시간을 보내고 싶은가<br>\t\t\t\t<br>즐겁게 처리하는 일상 업무는 무엇이 있는가?<br>\t\t\t\t<br>남과 다른 특별한 재능이 있는가?<br>\t\t\t\t<br>어떤 종류의 문제를 해결하는 것을 좋아하는가?<br>\t\t\t\t<br>일할 때 가장 잘 해내는 부분과 어려움을 겪는 부분은 무엇인가?<br>\t\t\t\t<br>일에서 좋아하는 점과 싫어하는 점은 무엇인가?<br>\t\t\t\t<br>지금까지 해온 일 중 가장 즐거운 일은 무엇인가?<br>\t\t\t\t<br>남은 인생 동안 한 가지 일만 해야 한다면 어떤 일을 하고 싶은가?<br>\t\t\t\t<br>학창 시절에 가장 좋아한 과목은 무엇이었는가?<br>\t\t\t\t<br>35세, 40세, 50세, 60세, 70세에 각각 어떤 직업을 가지고 싶은가?<br>\t\t\t\t<br>업무와 관련하여 가장 존경하는 사람은 누구인가?<br>\t\t\t\t<br>'이 사람의 직업을 내가 가졌더라면' 싶은 사람은 누구인가?<br>\t\t\t\t<br>멘토나 친구들은 나에게 맞는 이상적인 직업이나 역할이 무엇이라 생각하는가?<br>\t\t\t\t<br>평상시 무엇을 즐겨 읽는가? 뉴스에서는 어떤 주제나 분야에 관심을 갖는가?<br>\t\t\t<br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t출처: <<a href=\"http://ppss.kr/archives/86477\" target=\"_blank\">http://ppss.kr/archives/86477</a>> <br>\t\t\t<br><br>\t\t<br>\t\t<br>\t\t\t<br>일기를 쓰지 않는 대신, 성장문답. Dear Dean,<br>\t\t\t<br>끊임 없이 질문리스트를 만들고<br>\t\t\t<br>그 최적해를 구하기 위한 계획을 수립한다.",
    "w": 400
  }
];

let cards = [];
let moving = null, resizing = null;

function loadBoard() {
  const saved = localStorage.getItem(SAVE_KEY);
  cards = saved ? JSON.parse(saved) : DEFAULT_CARDS.map(c => ({...c}));
  renderCards();
  if (!saved) autoLayout();
}

function autoLayout() {
  const GAP = 14;
  const boardW = document.getElementById('board').offsetWidth;
  const cols = Math.max(1, Math.floor(boardW / 280));
  const colW = (boardW - GAP * (cols - 1)) / cols;
  const colHeights = new Array(cols).fill(0);
  const allCards = document.querySelectorAll('.card');
  const images = document.querySelectorAll('.card img');
  let loaded = 0;
  const total = images.length;

  function place() {
    allCards.forEach((el, i) => {
      const card = cards[i];
      const w = Math.min(card.w || colW, colW);
      let minCol = 0;
      for (let c = 1; c < cols; c++) if (colHeights[c] < colHeights[minCol]) minCol = c;
      card.x = minCol * (colW + GAP);
      card.y = colHeights[minCol];
      card.w = w;
      el.style.left = card.x + 'px';
      el.style.top = card.y + 'px';
      el.style.width = w + 'px';
      colHeights[minCol] = card.y + el.offsetHeight + GAP;
    });
    document.getElementById('board').style.minHeight = Math.max(...colHeights) + 100 + 'px';
    saveBoard();
  }

  if (total === 0) requestAnimationFrame(place);
  else images.forEach(img => {
    if (img.complete) { loaded++; if (loaded >= total) requestAnimationFrame(place); }
    else img.onload = img.onerror = () => { loaded++; if (loaded >= total) requestAnimationFrame(place); };
  });
}

function syncText() {
  document.querySelectorAll('.card').forEach(el => {
    const idx = +el.dataset.idx;
    if (cards[idx]?.type === 'text') {
      const t = el.querySelector('.text');
      if (t) cards[idx].content = t.innerHTML;
    }
  });
}

function saveBoard() {
  syncText();
  localStorage.setItem(SAVE_KEY, JSON.stringify(cards));
  document.getElementById('status').textContent = '저장됨 ' + new Date().toLocaleTimeString();
}

function renderCards() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  cards.forEach((card, i) => {
    const el = document.createElement('div');
    el.className = 'card';
    el.dataset.idx = i;
    if (card.x !== undefined) el.style.left = card.x + 'px';
    if (card.y !== undefined) el.style.top = card.y + 'px';
    if (card.w) el.style.width = card.w + 'px';

    el.addEventListener('mousedown', e => {
      if (e.target.closest('.text, a, .card-btn, .resize-handle, table')) return;
      e.preventDefault();
      moving = { idx: i, startX: e.clientX, startY: e.clientY, origX: card.x || 0, origY: card.y || 0 };
      el.classList.add('moving');
    });

    const actions = document.createElement('div');
    actions.className = 'card-actions';
    const delBtn = document.createElement('button');
    delBtn.className = 'card-btn'; delBtn.textContent = '×';
    delBtn.onclick = e => { e.stopPropagation(); if (confirm('삭제?')) { cards.splice(i, 1); renderCards(); saveBoard(); } };
    actions.appendChild(delBtn);
    el.appendChild(actions);

    if (card.type === 'text') {
      const text = document.createElement('div');
      text.className = 'text';
      text.contentEditable = true;
      text.innerHTML = card.content || '';
      text.addEventListener('blur', () => { card.content = text.innerHTML; saveBoard(); });
      el.appendChild(text);
    } else if (card.type === 'image') {
      const src = card.src.startsWith('http') || card.src.startsWith('data:') ? card.src : IMG_BASE + card.src;
      const img = document.createElement('img');
      img.src = src;
      img.alt = card.alt || '';
      img.loading = 'lazy';
      img.onerror = () => img.style.display = 'none';
      if (card.link) {
        const a = document.createElement('a'); a.href = card.link; a.target = '_blank';
        a.appendChild(img); el.appendChild(a);
      } else { el.appendChild(img); }
      if (card.caption) {
        const cap = document.createElement('div');
        cap.className = 'caption';
        cap.textContent = card.caption;
        el.appendChild(cap);
      }
    } else if (card.type === 'table') {
      const wrapper = document.createElement('div');
      wrapper.style.overflowX = 'auto';
      wrapper.innerHTML = card.html || '';
      el.appendChild(wrapper);
    }

    const rh = document.createElement('div');
    rh.className = 'resize-handle';
    rh.addEventListener('mousedown', e => {
      e.preventDefault(); e.stopPropagation();
      resizing = { idx: i, startX: e.clientX, startW: card.w || el.offsetWidth };
    });
    el.appendChild(rh);
    board.appendChild(el);
  });

  requestAnimationFrame(() => {
    let maxBottom = 0;
    document.querySelectorAll('.card').forEach(el => {
      const b = (parseFloat(el.style.top) || 0) + el.offsetHeight;
      if (b > maxBottom) maxBottom = b;
    });
    board.style.minHeight = (maxBottom + 100) + 'px';
  });
}

document.addEventListener('mousemove', e => {
  if (moving) {
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`);
    if (!el) return;
    const nx = moving.origX + e.clientX - moving.startX;
    const ny = moving.origY + e.clientY - moving.startY;
    el.style.left = nx + 'px';
    el.style.top = ny + 'px';
  }
  if (resizing) {
    const card = cards[resizing.idx];
    card.w = Math.max(100, resizing.startW + e.clientX - resizing.startX);
    const el = document.querySelector(`.card[data-idx="${resizing.idx}"]`);
    if (el) el.style.width = card.w + 'px';
  }
});

document.addEventListener('mouseup', e => {
  if (moving) {
    const card = cards[moving.idx];
    card.x = Math.max(0, moving.origX + e.clientX - moving.startX);
    card.y = Math.max(0, moving.origY + e.clientY - moving.startY);
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`);
    if (el) { el.classList.remove('moving'); }
    moving = null; saveBoard();
  }
  if (resizing) { resizing = null; saveBoard(); }
});

function addTextCard() {
  cards.push({ type: 'text', content: '', x: 50, y: window.scrollY + 100, w: 300 });
  renderCards();
  setTimeout(() => { const els = document.querySelectorAll('.card .text'); els[els.length - 1]?.focus(); }, 100);
}

function addImageCard() {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = 'image/*';
  input.onchange = e => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = () => { cards.push({ type: 'image', src: reader.result, x: 50, y: window.scrollY + 100, w: 240 }); renderCards(); saveBoard(); };
    reader.readAsDataURL(file);
  };
  input.click();
}

function resetLayout() {
  if (!confirm('자동 재배치합니다. 현재 위치가 변경됩니다.')) return;
  cards.forEach(c => { delete c.x; delete c.y; });
  renderCards(); autoLayout();
}

setInterval(saveBoard, 30000);
loadBoard();
</script>
</body>
</html>
