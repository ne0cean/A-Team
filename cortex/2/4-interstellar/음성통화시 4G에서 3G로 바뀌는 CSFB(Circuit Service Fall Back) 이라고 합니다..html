const DEFAULT_CARDS = [
  {
    "type": "text",
    "content": "음성통화시 4G에서 3G로 바뀌는 CSFB(Circuit Service Fall Back) 이라고 합니다.<br>\t\t\t<br>&#160;<br>\t\t\t<br>4G는 기본적으로 IP(Internet Protocol) 라는 기술을 Base로 하는데 이 서비스를 PS(Packet Service) 라고 합니다.<br>\t\t\t<br>&#160;<br>\t\t\t<br>PS와 대조되는 서비스가 CS(Circuit Service) 라고 하는 서비스인데, 3G 음성을 이 서비스로 제공하고 있습니다.<br>\t\t\t<br>&#160;<br>\t\t\t<br>각각은 망에서 베이스로 하고 있는 기술의 차이가 있는데, 현재 HD Voice 단말부터 음성을 PS로 제공하고 있습니다.<br>\t\t\t<br>&#160;<br>\t\t\t<br>그전 단말은 LTE 단말이라도 데이터는 PS로 제공하지만, 음성은 기존 CS로 제공했는데요<br>\t\t\t<br>&#160;<br>\t\t\t<br>그래서 기존 LTE단말에서 PS를 기본으로 제작된 폰이지만 음성통화시 CS로 던진다? 라는 기술 --> CSFB이 표준입니다.<br>\t\t\t<br>&#160;<br>\t\t\t<br>HD voice 단말부터는 CSFB 기술이 적용되지 않는가?? 답은 아닙니다. PS로 음성 통화 제공시 발생하는 문제점에 대한 보험으로<br>\t\t\t<br>&#160;<br>\t\t\t<br>CSFB 기능은 가지고 있습니다. 이것은 PS 음성이 많이 안정화 될때까지 유지할것으로 보입니다.<br>\t\t\t<br>&#160;<br>\t\t\t<br>그럼 CSFB이라도 단말에서 4G로 표시하는것?? 어렵지 않습니다. <br>\t\t\t<br>&#160;<br>\t\t\t<br>이것은 저희 회사의 정책에 따라 적용 할지 하지 않을지 결정합니다. (고객을 속이는 일이라 생각될수 있지만, 체감 품질에 있어서 큰 문제점이 없다면, 즉, 고객이 느끼기에&#160;통화가&#160;잘되고 데이터 쓸때 속도만 나온다면 적용 가능한 일입니다.)<br>\t\t\t<br>&#160;<br>\t\t\t<br>현재 HD voice 단말에서 CSFB이 사용되더라도 3G로 표시되는지 않되는지는 잘 모르겠네요~ <br>\t\t\t<br>단말쪽에서 열심히 일하는 순지가 현 상황은 잘 알겠네요~~^^;;<br>\t\t\t<br>&#160;<br>\t\t\t<br>최대한 줄여서 쓰려고 했는데,,, 말이 좀 길어졌습니다. 행님~~ 수고하세요~^^<br>\t\t\t<br>&#160;<br>\t\t\t<br>----- Original Message -----<br>\t\t\t<br>From : 최재상/제주마케팅팀 <br>\t\t\t<br>To : 전수봉/수유ICT운용팀<br>\t\t\t<br>Sent : 2013-01-17 09:25:20<br>\t\t\t<br>&#160;<br>\t\t\t<br>스봉아~ 잘 지내니? 추운데 고생이 많다..<br>\t\t\t<br>하나 물어볼게 있어.. 문돌이인데 대리점에서 자꾸 공돌이적 접근의 질문을 해와서뤼 ㅠㅠ<br>\t\t\t<br>Q) 왜 우리는 통화할 때 4G에서 3G로 바뀌는가... 이런거 ㅠㅠ 뭔가 기술적으로 뭐라뭐라카는데.... 단말상에서 통화할 때 무조건 4G로 표시는거 이런건 어렵나 ??<br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br>우리쪽에서 서비스하는 건 CSFB이구요<br>\t\t\t<br>LG 유플쪽에는 SV LTE라는 방식을 이요하는데<br>\t\t\t<br>HD voice를 제외하고는 lte로는 음성 서비스가 되지 않습니다!!!<br>\t\t\t<br>HD vocie도 어차피 데이터이기 때문에 실제는 음성서비스의 탈을 쓴 데이터라고 보면되겟네요!<br>\t\t\t<br>여튼, LTE는 음성망을 가지고 있지 않다!!!!<br>\t\t\t<br>&#160;<br>\t\t\t<br>그렇다면 음성서비스를 어떻게 할 건인가?<br>\t\t\t<br>간단히 말하면 <br>\t\t\t<br>CSFB는 통신을 위한 chip이 하나입니다!<br>\t\t\t<br>평소에는 lte쪽을 꼐속 잡고 있다가 전화를 위해서는 이 칩에서 3G를 잡아야 서비스가 가능하죠<br>\t\t\t<br>&#160;<br>\t\t\t<br>유플이 사용하는 SV LTE 같은 경우에는 통신을 위한 chip을 두개를 사용합니다!<br>\t\t\t<br>평소에도 2개의 망을 다 잡고 있는거죠!<br>\t\t\t<br>한쪽은 리비전A/B (유플에 거지같은 3G라고하기 그런 2.5Gㅋㅋㅋㅋ) 한쪽은 LTE<br>\t\t\t<br>그래서 LTE사용하다가 전화가 오면 반대편 chip을 이용해서 음성을 서비스합니다!<br>\t\t\t<br>&#160;<br>\t\t\t<br>SVLTE가 더 좋아보이죠?ㅋㅋㅋㅋ<br>\t\t\t<br>우리는 왜 이걸 안하느냐!!<br>\t\t\t<br>뭐 대표적인 강점을 말하자면 유플은 저 방식을 이용하기때문에 아이폰 안되잖아요?<br>\t\t\t<br>ㅋㅋㅋㅋㅋㅋㅋㅋㅋㅋㅋㅋ해외 로밍도 어려울 거예요<br>\t\t\t<br>해외에도 대부분 csfb방식을 선택한 사업자가 대부분!<br>\t\t\t<br>데이터망은 로밍이 되겟지만 음성망을 받아줄 곳이 없잖아요?<br>\t\t\t<br>ㅋㅋㅋㅋㅋㅋㅋㅋㅋ설명이 맞는지 모르겠지만ㅋㅋㅋㅋㅋㅋㅋㅋㅋㅋㅋㅋ<br>\t\t\t<br>대리점에는 이정도 설명하면 될것 같아요!!!!<br>\t\t\t<br>뭐 추가로 밧데리도 더 많이 소모된다는 단점도 잇었는데<br>\t\t\t<br>ㅋㅋㅋㅋㅋㅋㅋ지금와서는 큰 차이가 없어졋다고 하네요!!<br>\t\t\t<br>&#160;<br>\t\t\t<br>전화할때 잠시 LTE라고 표현안해주는 것 때문에<br>\t\t\t<br>아이폰과 해외로밍을 포기한다?<br>\t\t\t<br>ㅋㅋㅋㅋㅋㅋㅋㅋㅋㅋㅋㅋ오잉@,@<br>\t\t\t<br>&#160;<br>\t\t\t<br>참고하세요!<br>\t\t\t<br><a href=\"http://blog.naver.com/kity8681?Redirect=Log&logNo=90160159721\" target=\"_blank\">http://blog.naver.com/kity8681?Redirect=Log&logNo=90160159721</a><br>\t\t\t<br><br>\t\t\t<br>아핫 그리구 유플에서는 SV LTE 쓰면서 리비전 시리즈로 음성 서비스 하기 때문에<br>\t\t\t<br>음질이 우리에 비해서 많이 안 좋다는 사실<br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br>작년 말이었나? 내 기억으로는 10월 경이었던 것 같은데.<br>\t\t\t<br>&#160;<br>\t\t\t<br>요즘 나오는 LG 광고에 대한 우려 때문에<br>\t\t\t<br>신제품 단말 제조할 때 우리도 통화 중에도 'LTE'로 뜨게 만들어 달라고 삼성이랑 협의를 했었는데,<br>\t\t\t<br>삼성 법무팀에서 강력하게 반대해서 우리 의사가 관철되지 않았어.<br>\t\t\t<br>'사실이 아닌 것'을&#160;단말에 표시하게 되면 나중에 혹시 모를&#160;불똥이 자기네한테 튈 거라는 이유였지.&#160;<br>\t\t\t<br>그 때 회의에서 들은 내용들이 워낙 기술적인 것들이 많아서 정확히 기억이 나지는 않지만 <br>\t\t\t<br>음성에서는 현재와 같이 3G 방식으로 제공하는 우리 회사 기술이 더 안정적이라고 하던데.<br>\t\t\t<br>&#160;<br>\t\t\t<br>예상했던대로 근래 들어서 LG가 소비자를 현혹(?)하는 광고를 내보내기 시작한 거고.<br>\t\t\t<br>여기에 대응할지 여부도 논의가 있었는데 광고를 자세히 보면 LG가 교묘하게 '사실'을 적시하고 있기 때문에 쉽지 않았지.(LG는 통화 중에도 'LTE'라고 뜨는데 우리는 '3G'로 바뀐다고만 광고하고 있을 뿐 뭐가 더 좋다고는 하지 않거든. 근데 일반인들이야 LTE보다 3G가 더 좋다고 생각하니까 정말 교묘한거지.-_-;)<br>\t\t\t<br>&#160;<br>\t\t\t<br>실제로 어떠한가도 중요하지만, 어떻게 보이는가도 중요한데,<br>\t\t\t<br>우리가 예전처럼 제조사를 쥐락펴락할 수 있는 입장이 아니라 쉽진 않은 듯~<br>\t\t\t<br>&#160;<br>\t\t\t<br>근데 재환이 말대로라면 앞으로는 가능하게 된 것인가? <br>\t\t\t<br>암튼 수고들이 많다.^^<br>\t\t\t<br><br>\t\t\t<br>CSFB(Circuit Switched Fall-Back) 이 맞습니다.<br>\t\t\t<br><br>\t\t\t<br>현재&#160;저희쪽(SKT) HD Voice 가능한 단말기가 200만개 정도 됩니다.<br>\t\t\t<br>&#160;<br>\t\t\t<br>하지만 지금 HD Voice로 통화하는 사람은 11만명 정도밖에 안되는데요..<br>\t\t\t<br>&#160;<br>\t\t\t<br>이는 단말에 \"HD Voice 우선\" 기능을 디폴트로 설정하지 않았기 때문입니다.<br>\t\t\t<br>&#160;<br>\t\t\t<br>아직 군단위 지역에서는 LTE 커버리지가 LGT 대비 열위이고,<br>\t\t\t<br>&#160;<br>\t\t\t<br>HD Voice 품질이 확보되지 않아서 설정하지 않았지만..<br>\t\t\t<br>&#160;<br>\t\t\t<br>현재 품질관리팀에서 설 이전에 HD Voice 확대를 목표로 품질개선 활동을 시행중에 있습니다.<br>\t\t\t<br>&#160;<br>\t\t\t<br>설에는 200만명이 HD Voice로 통화하면서 3G로 천이되지 않는 것을 볼 수 있을거에요~<br>\t\t\t<br><br>\t\t\t<br>CSFB과 SVLTE의 경우<br>\t\t\t<br>&#160;<br>\t\t\t<br>제가 고객일때랑 이제 운용자 입장에서 많이 다름을 느끼는데요. <br>\t\t\t<br>&#160;<br>\t\t\t<br>치영형이나 광희형이 전문가 이시니까 잘 아실꺼 같아요.<br>\t\t\t<br>&#160;<br>\t\t\t<br>&#160;혜민이 말대로 SVLTE의 경우 두 망을 동시에 잡느라고 이론상으로 배터리 소모가 더 많으나.<br>\t\t\t<br>실제 상황에서는 필드 품질이 좋지 않아&#160;잦은 망천이로 인해 CSFB이 배터리를 더 잡아 먹는 다는 게 함정 ㅠ<br>\t\t\t<br>&#160;하지만 CSFB을 쓰는 Vender와 MNO가 많아서 단말 수급이 편한건 장점이네요.<br>\t\t\t<br>&#160; <br>\t\t\t<br>&#160;Hd voice의 경우 음성망과 패킷망이 합쳐져서 이론상으로는 통화품질이 좋아져야 하나.<br>\t\t\t<br>음성망과 패킷망의 기본적 구성원리가 다르기 때문에, 트래픽이 몰렸을 때 현재의 HD voice의 묵음처럼 통화 품질을 보장하지 못한다는 게 함정 ㅠ<br>\t\t\t<br>&#160;덕분에 3G는 생각보다 장수할 것 같네요.<br>\t\t\t<br>MC? CA? <br>\t\t\t<br>&#160;<br>\t\t\t<br>MC와 CA 헷갈리셨죠? 사실 저는 그게 그건줄 알았습니다~ㅋㅋㅋ<br>\t\t\t<br>&#160;<br>\t\t\t<br>MC(Multi Career)는 로드밸런싱 목적으로 서로 다른 주파수 중 하나를 선택할 수 있는 기술이고요,<br>\t\t\t<br>CA(Career Aggregation)은 속도 증가를 목적으로 다른 주파수를 동시에 사용하는 기술입니다.<br>\t\t\t<br>&#160;<br>\t\t\t<br>참고로 첨부 자료에 한국 사업자별 LTE 기술에 대해 일목요연하게 정리되어 있습니다.<br>\t\t\t<br>&#160;<br>\t\t\t<br>올해 경영 계획을 요약하면,,,<br>\t\t\t<br>\"돈을 적게 들이거나 안들여서 MC확대하고, CA 도입하고, 데이터 길을 넓히거나 최적화해서 경쟁우위에 서는 것\"<br>\t\t\t<br>인것 같은데 맞나요? ㅋㅋㅋ <br>\t\t\t<br>&#160;<br>\t\t\t<br>이상입니다. 24기 화이팅~<br>\t\t\t<br>&#160;",
    "w": 400
  }

let cards = [];
let moving = null, resizing = null;

function loadBoard() {
  const saved = localStorage.getItem(SAVE_KEY);
  cards = saved ? JSON.parse(saved) : DEFAULT_CARDS.map(c => ({...c}));
  renderCards();
  if (!saved) autoLayout();
}

function autoLayout() {
  const GAP = 14;
  const boardW = document.getElementById('board').offsetWidth;
  const cols = Math.max(1, Math.floor(boardW / 280));
  const colW = (boardW - GAP * (cols - 1)) / cols;
  const colHeights = new Array(cols).fill(0);
  const allCards = document.querySelectorAll('.card');
  const images = document.querySelectorAll('.card img');
  let loaded = 0;
  const total = images.length;

  function place() {
    allCards.forEach((el, i) => {
      const card = cards[i];
      const w = Math.min(card.w || colW, colW);
      let minCol = 0;
      for (let c = 1; c < cols; c++) if (colHeights[c] < colHeights[minCol]) minCol = c;
      card.x = minCol * (colW + GAP);
      card.y = colHeights[minCol];
      card.w = w;
      el.style.left = card.x + 'px';
      el.style.top = card.y + 'px';
      el.style.width = w + 'px';
      colHeights[minCol] = card.y + el.offsetHeight + GAP;
    });
    document.getElementById('board').style.minHeight = Math.max(...colHeights) + 100 + 'px';
    saveBoard();
  }

  if (total === 0) requestAnimationFrame(place);
  else images.forEach(img => {
    if (img.complete) { loaded++; if (loaded >= total) requestAnimationFrame(place); }
    else img.onload = img.onerror = () => { loaded++; if (loaded >= total) requestAnimationFrame(place); };
  });
}

function syncText() {
  document.querySelectorAll('.card').forEach(el => {
    const idx = +el.dataset.idx;
    if (cards[idx]?.type === 'text') {
      const t = el.querySelector('.text');
      if (t) cards[idx].content = t.innerHTML;
    }
  });
}

function saveBoard() {
  syncText();
  localStorage.setItem(SAVE_KEY, JSON.stringify(cards));
  document.getElementById('status').textContent = '저장됨 ' + new Date().toLocaleTimeString();
}

function renderCards() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  cards.forEach((card, i) => {
    const el = document.createElement('div');
    el.className = 'card';
    el.dataset.idx = i;
    if (card.x !== undefined) el.style.left = card.x + 'px';
    if (card.y !== undefined) el.style.top = card.y + 'px';
    if (card.w) el.style.width = card.w + 'px';

    el.addEventListener('mousedown', e => {
      if (e.target.closest('.text, a, .card-btn, .resize-handle, table')) return;
      e.preventDefault();
      moving = { idx: i, startX: e.clientX, startY: e.clientY, origX: card.x || 0, origY: card.y || 0 };
      el.classList.add('moving');
    });

    const actions = document.createElement('div');
    actions.className = 'card-actions';
    const delBtn = document.createElement('button');
    delBtn.className = 'card-btn'; delBtn.textContent = '×';
    delBtn.onclick = e => { e.stopPropagation(); if (confirm('삭제?')) { cards.splice(i, 1); renderCards(); saveBoard(); } };
    actions.appendChild(delBtn);
    el.appendChild(actions);

    if (card.type === 'text') {
      const text = document.createElement('div');
      text.className = 'text';
      text.contentEditable = true;
      text.innerHTML = card.content || '';
      text.addEventListener('blur', () => { card.content = text.innerHTML; saveBoard(); });
      el.appendChild(text);
    } else if (card.type === 'image') {
      const src = card.src.startsWith('http') || card.src.startsWith('data:') ? card.src : IMG_BASE + card.src;
      const img = document.createElement('img');
      img.src = src;
      img.alt = card.alt || '';
      img.loading = 'lazy';
      img.onerror = () => img.style.display = 'none';
      if (card.link) {
        const a = document.createElement('a'); a.href = card.link; a.target = '_blank';
        a.appendChild(img); el.appendChild(a);
      } else { el.appendChild(img); }
      if (card.caption) {
        const cap = document.createElement('div');
        cap.className = 'caption';
        cap.textContent = card.caption;
        el.appendChild(cap);
      }
    } else if (card.type === 'table') {
      const wrapper = document.createElement('div');
      wrapper.style.overflowX = 'auto';
      wrapper.innerHTML = card.html || '';
      el.appendChild(wrapper);
    }

    const rh = document.createElement('div');
    rh.className = 'resize-handle';
    rh.addEventListener('mousedown', e => {
      e.preventDefault(); e.stopPropagation();
      resizing = { idx: i, startX: e.clientX, startW: card.w || el.offsetWidth };
    });
    el.appendChild(rh);
    board.appendChild(el);
  });

  requestAnimationFrame(() => {
    let maxBottom = 0;
    document.querySelectorAll('.card').forEach(el => {
      const b = (parseFloat(el.style.top) || 0) + el.offsetHeight;
      if (b > maxBottom) maxBottom = b;
    });
    board.style.minHeight = (maxBottom + 100) + 'px';
  });
}

document.addEventListener('mousemove', e => {
  if (moving) {
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`);
    if (!el) return;
    const nx = moving.origX + e.clientX - moving.startX;
    const ny = moving.origY + e.clientY - moving.startY;
    el.style.left = nx + 'px';
    el.style.top = ny + 'px';
  }
  if (resizing) {
    const card = cards[resizing.idx];
    card.w = Math.max(100, resizing.startW + e.clientX - resizing.startX);
    const el = document.querySelector(`.card[data-idx="${resizing.idx}"]`);
    if (el) el.style.width = card.w + 'px';
  }
});

document.addEventListener('mouseup', e => {
  if (moving) {
    const card = cards[moving.idx];
    card.x = Math.max(0, moving.origX + e.clientX - moving.startX);
    card.y = Math.max(0, moving.origY + e.clientY - moving.startY);
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`);
    if (el) { el.classList.remove('moving'); }
    moving = null; saveBoard();
  }
  if (resizing) { resizing = null; saveBoard(); }
});

function addTextCard() {
  cards.push({ type: 'text', content: '', x: 50, y: window.scrollY + 100, w: 300 });
  renderCards();
  setTimeout(() => { const els = document.querySelectorAll('.card .text'); els[els.length - 1]?.focus(); }, 100);
}

function addImageCard() {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = 'image/*';
  input.onchange = e => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = () => { cards.push({ type: 'image', src: reader.result, x: 50, y: window.scrollY + 100, w: 240 }); renderCards(); saveBoard(); };
    reader.readAsDataURL(file);
  };
  input.click();
}

function resetLayout() {
  if (!confirm('자동 재배치합니다. 현재 위치가 변경됩니다.')) return;
  cards.forEach(c => { delete c.x; delete c.y; });
  renderCards(); autoLayout();
}

setInterval(saveBoard, 30000);
loadBoard();
</script>
</body>
