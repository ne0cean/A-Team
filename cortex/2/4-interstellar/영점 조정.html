<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>영점 조정</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #1e1e1e;
  color: #e0e0e0;
  font-family: 'Segoe UI', -apple-system, sans-serif;
  font-size: 15px;
  line-height: 1.6;
  padding: 20px 30px 60px;
  overflow-x: hidden;
}
a { color: #6cb0f6; text-decoration: none; }
a:hover { text-decoration: underline; }
.title-bar {
  background: #3a3a5c;
  display: inline-block;
  padding: 6px 16px;
  font-size: 22px;
  font-weight: bold;
  color: #fff;
  margin-bottom: 4px;
}
.date { color: #999; font-size: 13px; margin-bottom: 20px; }
.board { position: relative; }
.card {
  background: #2a2a2a;
  border: 1px solid #3a3a3a;
  border-radius: 8px;
  padding: 12px;
  position: absolute;
  cursor: grab;
  transition: box-shadow 0.15s;
  overflow: hidden;
}
.card:hover { box-shadow: 0 0 0 1px #58a6ff; z-index: 10; }
.card.moving { opacity: 0.8; box-shadow: 0 4px 24px rgba(0,0,0,0.6); z-index: 100; cursor: grabbing; }
.card img { width: 100%; border-radius: 4px; display: block; }
.card .caption { font-size: 12px; color: #888; margin-top: 6px; }
.card .text { outline: none; min-height: 20px; white-space: pre-wrap; word-break: break-word; }
.card .text:focus { background: rgba(255,255,255,0.05); border-radius: 4px; padding: 4px; }
.card .text:empty::before { content: '텍스트 입력...'; color: #555; }
.card table { border-collapse: collapse; width: 100%; font-size: 13px; }
.card table td, .card table th { border: 1px solid #444; padding: 4px 8px; vertical-align: top; }
.card table th { background: #333; color: #ccc; }
.card-actions { position: absolute; top: 4px; right: 4px; display: none; gap: 4px; }
.card:hover .card-actions { display: flex; }
.card-btn { background: #333; border: 1px solid #555; color: #ccc; border-radius: 4px; padding: 2px 6px; font-size: 11px; cursor: pointer; }
.card-btn:hover { background: #444; color: #fff; }
.resize-handle { position: absolute; bottom: 0; right: 0; width: 16px; height: 16px; cursor: se-resize; opacity: 0; }
.card:hover .resize-handle { opacity: 0.6; }
.resize-handle::after { content: ''; position: absolute; bottom: 3px; right: 3px; width: 8px; height: 8px; border-right: 2px solid #666; border-bottom: 2px solid #666; }
.toolbar { position: fixed; bottom: 0; left: 0; right: 0; background: #161b22; border-top: 1px solid #30363d; padding: 8px 20px; display: flex; gap: 12px; align-items: center; z-index: 200; }
.toolbar button { background: #21262d; border: 1px solid #30363d; color: #e0e0e0; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; }
.toolbar button:hover { background: #30363d; }
.toolbar .status { color: #8b949e; font-size: 12px; margin-left: auto; }
.highlight-red { color: #ff6b6b; }
.highlight-blue { color: #6cb0f6; }
</style>
</head>
<body>
<div class="title-bar">영점 조정</div>
<div class="date">2016년 4월 18일 월요일</div>
<div class="board" id="board"></div>
<div class="toolbar">
  <button onclick="addTextCard()">+ 텍스트</button>
  <button onclick="addImageCard()">+ 이미지</button>
  <button onclick="saveBoard()">💾 저장</button>
  <button onclick="resetLayout()">↺ 재배치</button>
  <span class="status" id="status">Ready</span>
</div>
<script>
const SAVE_KEY = 'board-영점-조정';
const IMG_BASE = '../../attachments/';
const DEFAULT_CARDS = [
  {
    "type": "text",
    "content": "영점 조정<br>\t\t<br>\t\t<br>\t<br>\t<br>\t\t<br>\t\t\t<br><br>\t\t\t<br>\t\t\t\t<br><br>\t\t\t\t<br>태도, 기도문 & 자경문 _ 의식주와 생활 습관 영점조정을 위한 기도문<br>\t\t\t\t<br>하루 3번 읽는다.<br>\t\t\t\t<br><br>\t\t\t\t<br>웃어라<br>\t\t\t\t<br>ㅇ 부정적인 말은 긍정적으로 돌려 하라<br>\t\t\t\t<br>ㅇ <br>\t\t\t\t<br><br>\t\t\t\t<br><br>\t\t\t\t<br>ㅇ 좋은 음악을 들어라, 모차르트, 바하, 헨델<br>\t\t\t\t<br>ㅇ 원하면 먼저 주라.<br>\t\t\t\t<br><br>\t\t\t\t<br>[소통]<br>\t\t\t\t<br>먼저, 내 쪽에서 인사하자.<br>\t\t\t\t<br>왕처럼 말하고, 거지처럼 침묵하라.<br>\t\t\t\t<br>늘 칭찬할 거리를 찾아라<br>\t\t\t\t<br>사소한 대응에서도 \"훌륭하다\" \"감사하다\"라고 말하자.<br>\t\t\t\t<br>인사를 하지 않아도 되는 사람에게도 인사를 해 보자.<br>\t\t\t\t<br><br>\t\t\t\t<br>[신체]<br>\t\t\t\t<br>허리를 펴고<br>\t\t\t\t<br>엘리베이터가 있는 곳에서도 계단으로 올라가자.<br>\t\t\t\t<br>물은 충분히 마셨는가<br>\t\t\t\t<br><br>\t\t\t\t<br>[마음]<br>\t\t\t\t<br>하루에 한 번 \"잘됐어\"하고 말하자.<br>\t\t\t\t<br><br>\t\t\t\t<br>[연결]<br>\t\t\t\t<br>오늘 하루 얼마나 베풀고 선물했는가<br>\t\t\t\t<br><br>\t\t\t\t<br>[감정 다스리기]<br>\t\t\t\t<br>그렇게 중요한 일인가? 한 생, 한 판 게임일 뿐이다. Why so serious?<br>\t\t\t\t<br>너를 분노케 하는 것이 너 자신인가, 그 인가<br>\t\t\t\t<br><br>\t\t\t\t<br>존경하는 사람의 사고방식을 흉내내보자.<br>\t\t\t\t<br>무언가를 사지 않더라도 \"고맙습니다\" \"수고하세요\"라고 말하고 가게를 나오자.<br>\t\t\t\t<br>중요한 것을 찾지 못할 때는 쓸데없는 것을 버려 보자.<br>\t\t\t\t<br><br>\t\t\t\t<br>13. 긴장되는 일일수록 여유를 갖고 하자.<br>\t\t\t\t<br>16. 거절당하면 열의를 시험한다고 생각하자.<br>\t\t\t\t<br>17. 약속시간보다 좀 일찌감치 가자.<br>\t\t\t\t<br><br>\t\t\t\t<br>21. 싫어하는 사람을 자신의 거울로 삼자.<br>\t\t\t\t<br>22. 단체에 가입할 때 특전을 생각하지 말자.<br>\t\t\t\t<br>23. 이해득실보다는 납득하고 선택하자.<br>\t\t\t\t<br>24. 인사를 제대로 하지 못했던 사람에게 인사하자.<br>\t\t\t\t<br>25. 사과하는 상대의 이야기를 끝까지 들어주자.<br>\t\t\t\t<br>26. 선천적인 이유를 핑계로 삼지 말자.<br>\t\t\t\t<br>27. 한 시간 후에 만날 사람이라도 미리 연락을 해두자.<br>\t\t\t\t<br><br>\t\t\t\t<br>33. 남에게 짜증내지 말자.<br>\t\t\t\t<br><br>\t\t\t\t<br>34. 언짢은 일이 있을 때일수록 좋은 일을 하고 한 번 더 웃자.<br>\t\t\t\t<br>35. 한 달에 한 번 \"이 번달 나의 실수\"를 스스로 표창하자.<br>\t\t\t\t<br>36. 겸손한 사람에게 그 이상으로 겸손하게 대하자.<br>\t\t\t\t<br>37. 모든 일에 시작은 물론이고 뒷정리에도 마음을 쓰자.<br>\t\t\t\t<br>38. 사람을 만나기 전에 우선 느끼자.<br>\t\t\t\t<br>39. 어디까지 갈 수 있을지, 출발 전에 생각하지 말자.<br>\t\t\t\t<br>40. 하나라도 좋으니 간단한 일을 계속해 보자. <br>\t\t\t\t<br><br>\t\t\t\t<br>41. 항상 거꾸로 해보자.<br>\t\t\t\t<br>42. 책은 친구, 연인처럼 늘 가까이 하자.<br>\t\t\t\t<br>43. 혼자 있는 나만의 시간을 2시간 정도 만들자.<br>\t\t\t\t<br>44. 사소한 일이라도 성심성의껏 대하자.<br>\t\t\t\t<br>45. 거짓 없이 진실한 마음으로 칭찬 하자.<br>\t\t\t\t<br>46. 다른 사람에 대한 험담이나 나쁜 소문이 돌았을 때 퍼뜨리지 않고 나에게서 멈추도록 하자.<br>\t\t\t\t<br>47. 화를 애써 참지 않고 도움을 청하자.<br>\t\t\t\t<br>48. 나에게 해를 입혔다고 해서 앙갚음을 하려하지 말자.<br>\t\t\t\t<br>49. 잘못되었을 때 남 탓을 하기보다 \"내 탓이야\"라고 말하자.<br>\t\t\t\t<br>50. 남을 용서하고 사랑하자. 나를 용서하고 사랑하자.<br>\t\t\t\t<br><br>\t\t\t\t<br><br>\t\t\t\t<br>사람은 온순하고 공손하면서도 엄숙해야 하며<br>\t\t\t\t<br>위엄이 있으면서도 사납지 않아야 하고<br>\t\t\t\t<br>공손하면서도 자연스러워야 합니다.<br>\t\t\t\t<br><br>\t\t\t\t<br>또 너무 온순하면 엄숙을 잃기 쉽고<br>\t\t\t\t<br>너무 위엄이 있으면 친근감이 적어지고<br>\t\t\t\t<br>너무 공손하면 부자연스러워집니다.<br>\t\t\t\t<br><br>\t\t\t\t<br>그래서 사람은 모름지기<br>\t\t\t\t<br>중용(中庸)의 길을 걸어야 한다고 했습니다.<br>\t\t\t\t<br><br>\t\t\t\t<br>주리지 않으면 먹지 말고<br>\t\t\t\t<br>잘 때가 아니면 침상에 들지 말라<br>\t\t\t\t<br>하루에 6시간은 꼭 자둬라, 수면의 질은 <br>\t\t\t\t<br>깨어있는 시간의 질을 좌우한다.<br>\t\t\t\t<br><br>\t\t\t\t<br>옷을 사거나 고르는데 많은 시간을 들이지 말라,<br>\t\t\t\t<br>사람들은 너와 네 옷에는 크게 관심이 없다.<br>\t\t\t\t<br><br>\t\t\t\t<br>소비하기 위해 스스로를 소비하는 것을 멈추라.<br>\t\t\t\t<br>차, 시계, 옷 따위로 수식할 수 있을 정도로 너의 자아가<br>\t\t\t\t<br>값싼 것인지 숙고하라.<br>\t\t\t\t<br><br>\t\t\t\t<br>인생에대한 실험적 자세를 견지한다<br>\t\t\t\t<br><br>\t\t\t\t<br>물질보다 사고, 익숙함보다 다름<br>\t\t\t\t<br>네 밖에 걸쳐지고 스러져갈 것들보다<br>\t\t\t\t<br>네 안에 축적될 것들에 집중하라.<br>\t\t\t\t<br><br>\t\t\t\t<br><a href=\"http://m.news.naver.com/read.nhn?mode=LSD&sid1=001&oid=053&aid=0000021514\" target=\"_blank\">http://m.news.naver.com/read.nhn?mode=LSD&sid1=001&oid=053&aid=0000021514</a><br>\t\t\t\t<br><br>\t\t\t\t<br>인사하라, 웃어라, 칭찬하라.<br>\t\t\t\t<br><br>\t\t\t\t<br>착하게 살지 않아도 좋다.<br>\t\t\t\t<br>다만, 나쁘지 않게 살자.<br>\t\t\t\t<br>해치지말고 상처주지 말자.<br>\t\t\t\t<br><br>\t\t\t\t<br>조금 나빠도 괜찮다.<br>\t\t\t\t<br>내가 사는 내 인생이다.<br>\t\t\t\t<br>그저, 내가 살기 좋은 내 삶이면 되는거.<br>\t\t\t\t<br><br>\t\t\t\t<br>살수록 가벼워지는 그런 삶을 살고싶다.<br>\t\t\t\t<br><br>\t\t\t\t<br>마음을 열고, 세상을 사랑하라<br>\t\t\t\t<br>주변에게 애정을<br>\t\t\t\t<br>스스로에게 감동을<br>\t\t\t\t<br><br>\t\t\t\t<br>쿨하되 차갑지 않고<br>\t\t\t\t<br>단 따뜻한<br>\t\t\t\t<br>자신감어린 겸손함<br>\t\t\t\t<br><br>\t\t\t\t<br>아이처럼 경쾌하게<br>\t\t\t\t<br>아이처럼 무리가 없으나 때로 떼를 쓸줄도 알아야 하고<br>\t\t\t\t<br>아이처럼 살수록 가벼워 지는 삶<br>\t\t\t\t<br>주도적으로 세상을 쥐고 흔들 수 있어야 한다<br>\t\t\t\t<br>다만, 나 혼자가 아니라 다른 이들의 힘을 이용해서<br>\t\t\t\t<br><br>\t\t\t\t<br>스스에게 그리고 내 자식에게 자신 있게 리뷰할 수 있는 삶을 살아라.<br>\t\t\t\t<br>내가 나를 납득시킬 수 있는, 내가 살기 좋은 내 삶이어야 한다.<br>\t\t\t\t<br><br>\t\t\t\t<br>행복해라. 감동도 많이 받고, 많은 사람을 만나고. 울고 웃고 흔들리며.<br>\t\t\t\t<br>해가되지 않는 한 최대의 자유를 누려라.<br>\t\t\t\t<br><br>\t\t\t\t<br>무언를 소비하기 위해 스스로를 소비하는 것을 멈춰라<br>\t\t\t\t<br><br>\t\t\t\t<br>- 말이 많으면 쓸 말이 적다.<br>\t\t\t\t<br>- 천천히 스스로의 말을 들으면서 말해라.<br>\t\t\t\t<br>- 항상 주변에 뭘 줄 수 있을지를 고민해라.<br>\t\t\t\t<br>- 쿨하되 겸손 할 것<br>\t\t\t\t<br>- 삶은 네가 가진 것이 아니라. 세상에 뿌려놓은 것의 크기이다<br>\t\t\t\t<br><br>\t\t\t\t<br><br>\t\t\t\t<br>흐르되 넘치지 않고 <br>\t\t\t\t<br>머물되 그치지 않으며<br>\t\t\t\t<br>박수칠때 떠나야 함을 잊지 않게 하소서<br>\t\t\t\t<br><br>\t\t\t\t<br>이기기 보다 지지 않는 굳건함을 주시옵고<br>\t\t\t\t<br>모든 두려움 앞에 한발 더 내 딛을 기백을 주소서<br>\t\t\t\t<br><br>\t\t\t\t<br>여백을 허락 하소서<br>\t\t\t\t<br>나눔으로 감싸안으며 다름을 인정할 용기를 주소서  <br>\t\t\t\t<br>버리고, 비우고, 내려놓은 만큼 채워짐을 믿습니다.<br>\t\t\t\t<br><br>\t\t\t\t<br>아이처럼 웃음짓게 하소서<br>\t\t\t\t<br>진중하나 무겁지 않고, 유쾌하나 경박하지 않은 <br>\t\t\t\t<br>담백한 웃음으로 나와 소중한 벗들의 오늘을 빛나게 하소서<br>\t\t\t\t<br><br>\t\t\t\t<br>그리고, 어떤날에도 스스로를 사랑하는 것을 잊지 않게 하소서. <br>\t\t\t\t<br><br>\t\t\t\t<br><br>\t\t\t\t<br><br>\t\t\t\t<br><br>\t\t\t\t<br><br>\t\t\t\t<br><br>\t\t\t\t<br><br>\t\t\t\t<br>유리하다고 교만하지 말고<br>\t\t\t\t<br>불리하다고 비굴하지 말라<br>\t\t\t\t<br>무엇을 들었다고 쉽게 행동하지 말고<br>\t\t\t\t<br>그것이 사실인지 깊이 생각하여<br>\t\t\t\t<br>이치가 명확할 때 과감히 행동하라<br>\t\t\t\t<br><br>\t\t\t\t<br>벙어리처럼 침묵하고 임금님처럼 말하고<br>\t\t\t\t<br>눈 처럼 냉정하고 불처럼 뜨거워라<br>\t\t\t\t<br>태산같은 자부심을 갖고<br>\t\t\t\t<br>누운 풀처럼 자기를 낮춰라<br>\t\t\t\t<br><br>\t\t\t\t<br>역경을 참아 이겨내고<br>\t\t\t\t<br>형편이 풀릴때를 조심하라<br>\t\t\t\t<br>재물을 오물처럼 볼줄도알고<br>\t\t\t\t<br>터지는 분노를 잘 다스려라<br>\t\t\t\t<br><br>\t\t\t\t<br>때로는 마음껏 풍류를 즐기고<br>\t\t\t\t<br>사슴처럼 두려워 할 줄알고<br>\t\t\t\t<br>호랑이처럼 무섭고 사나워라<br>\t\t\t\t<br><br>\t\t\t\t<br>때와 처지를 살필줄알고<br>\t\t\t\t<br>부귀와 쇠망이 교차함을 알라<br>\t\t\t\t<br>이것이 지혜로운 이의 삶이니라<br>\t\t\t\t<br><br>\t\t\t\t<br>< 잡 보 장 경 > 중에서<br>\t\t\t\t<br><br>\t\t\t\t<br>웃어라.<br>\t\t\t\t<br>온 세상 이 너와 함께 웃을 것이다.<br>\t\t\t\t<br>울어라.<br>\t\t\t\t<br>너 혼자만 울게 될 것이다.<br>\t\t\t\t<br><br>\t\t\t\t<br>Solitude by Ella Wheeler Wilcox",
    "w": 400
  }
];

let cards = [];
let moving = null, resizing = null;

function loadBoard() {
  const saved = localStorage.getItem(SAVE_KEY);
  cards = saved ? JSON.parse(saved) : DEFAULT_CARDS.map(c => ({...c}));
  renderCards();
  if (!saved) autoLayout();
}

function autoLayout() {
  const GAP = 14;
  const boardW = document.getElementById('board').offsetWidth;
  const cols = Math.max(1, Math.floor(boardW / 280));
  const colW = (boardW - GAP * (cols - 1)) / cols;
  const colHeights = new Array(cols).fill(0);
  const allCards = document.querySelectorAll('.card');
  const images = document.querySelectorAll('.card img');
  let loaded = 0;
  const total = images.length;

  function place() {
    allCards.forEach((el, i) => {
      const card = cards[i];
      const w = Math.min(card.w || colW, colW);
      let minCol = 0;
      for (let c = 1; c < cols; c++) if (colHeights[c] < colHeights[minCol]) minCol = c;
      card.x = minCol * (colW + GAP);
      card.y = colHeights[minCol];
      card.w = w;
      el.style.left = card.x + 'px';
      el.style.top = card.y + 'px';
      el.style.width = w + 'px';
      colHeights[minCol] = card.y + el.offsetHeight + GAP;
    });
    document.getElementById('board').style.minHeight = Math.max(...colHeights) + 100 + 'px';
    saveBoard();
  }

  if (total === 0) requestAnimationFrame(place);
  else images.forEach(img => {
    if (img.complete) { loaded++; if (loaded >= total) requestAnimationFrame(place); }
    else img.onload = img.onerror = () => { loaded++; if (loaded >= total) requestAnimationFrame(place); };
  });
}

function syncText() {
  document.querySelectorAll('.card').forEach(el => {
    const idx = +el.dataset.idx;
    if (cards[idx]?.type === 'text') {
      const t = el.querySelector('.text');
      if (t) cards[idx].content = t.innerHTML;
    }
  });
}

function saveBoard() {
  syncText();
  localStorage.setItem(SAVE_KEY, JSON.stringify(cards));
  document.getElementById('status').textContent = '저장됨 ' + new Date().toLocaleTimeString();
}

function renderCards() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  cards.forEach((card, i) => {
    const el = document.createElement('div');
    el.className = 'card';
    el.dataset.idx = i;
    if (card.x !== undefined) el.style.left = card.x + 'px';
    if (card.y !== undefined) el.style.top = card.y + 'px';
    if (card.w) el.style.width = card.w + 'px';

    el.addEventListener('mousedown', e => {
      if (e.target.closest('.text, a, .card-btn, .resize-handle, table')) return;
      e.preventDefault();
      moving = { idx: i, startX: e.clientX, startY: e.clientY, origX: card.x || 0, origY: card.y || 0 };
      el.classList.add('moving');
    });

    const actions = document.createElement('div');
    actions.className = 'card-actions';
    const delBtn = document.createElement('button');
    delBtn.className = 'card-btn'; delBtn.textContent = '×';
    delBtn.onclick = e => { e.stopPropagation(); if (confirm('삭제?')) { cards.splice(i, 1); renderCards(); saveBoard(); } };
    actions.appendChild(delBtn);
    el.appendChild(actions);

    if (card.type === 'text') {
      const text = document.createElement('div');
      text.className = 'text';
      text.contentEditable = true;
      text.innerHTML = card.content || '';
      text.addEventListener('blur', () => { card.content = text.innerHTML; saveBoard(); });
      el.appendChild(text);
    } else if (card.type === 'image') {
      const src = card.src.startsWith('http') || card.src.startsWith('data:') ? card.src : IMG_BASE + card.src;
      const img = document.createElement('img');
      img.src = src;
      img.alt = card.alt || '';
      img.loading = 'lazy';
      img.onerror = () => img.style.display = 'none';
      if (card.link) {
        const a = document.createElement('a'); a.href = card.link; a.target = '_blank';
        a.appendChild(img); el.appendChild(a);
      } else { el.appendChild(img); }
      if (card.caption) {
        const cap = document.createElement('div');
        cap.className = 'caption';
        cap.textContent = card.caption;
        el.appendChild(cap);
      }
    } else if (card.type === 'table') {
      const wrapper = document.createElement('div');
      wrapper.style.overflowX = 'auto';
      wrapper.innerHTML = card.html || '';
      el.appendChild(wrapper);
    }

    const rh = document.createElement('div');
    rh.className = 'resize-handle';
    rh.addEventListener('mousedown', e => {
      e.preventDefault(); e.stopPropagation();
      resizing = { idx: i, startX: e.clientX, startW: card.w || el.offsetWidth };
    });
    el.appendChild(rh);
    board.appendChild(el);
  });

  requestAnimationFrame(() => {
    let maxBottom = 0;
    document.querySelectorAll('.card').forEach(el => {
      const b = (parseFloat(el.style.top) || 0) + el.offsetHeight;
      if (b > maxBottom) maxBottom = b;
    });
    board.style.minHeight = (maxBottom + 100) + 'px';
  });
}

document.addEventListener('mousemove', e => {
  if (moving) {
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`);
    if (!el) return;
    const nx = moving.origX + e.clientX - moving.startX;
    const ny = moving.origY + e.clientY - moving.startY;
    el.style.left = nx + 'px';
    el.style.top = ny + 'px';
  }
  if (resizing) {
    const card = cards[resizing.idx];
    card.w = Math.max(100, resizing.startW + e.clientX - resizing.startX);
    const el = document.querySelector(`.card[data-idx="${resizing.idx}"]`);
    if (el) el.style.width = card.w + 'px';
  }
});

document.addEventListener('mouseup', e => {
  if (moving) {
    const card = cards[moving.idx];
    card.x = Math.max(0, moving.origX + e.clientX - moving.startX);
    card.y = Math.max(0, moving.origY + e.clientY - moving.startY);
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`);
    if (el) { el.classList.remove('moving'); }
    moving = null; saveBoard();
  }
  if (resizing) { resizing = null; saveBoard(); }
});

function addTextCard() {
  cards.push({ type: 'text', content: '', x: 50, y: window.scrollY + 100, w: 300 });
  renderCards();
  setTimeout(() => { const els = document.querySelectorAll('.card .text'); els[els.length - 1]?.focus(); }, 100);
}

function addImageCard() {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = 'image/*';
  input.onchange = e => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = () => { cards.push({ type: 'image', src: reader.result, x: 50, y: window.scrollY + 100, w: 240 }); renderCards(); saveBoard(); };
    reader.readAsDataURL(file);
  };
  input.click();
}

function resetLayout() {
  if (!confirm('자동 재배치합니다. 현재 위치가 변경됩니다.')) return;
  cards.forEach(c => { delete c.x; delete c.y; });
  renderCards(); autoLayout();
}

setInterval(saveBoard, 30000);
loadBoard();
</script>
