const DEFAULT_CARDS = [
  {
    "type": "text",
    "content": "Marketing<br>\t\t<br>\t\t<br>\t<br>\t<br>\t\t<br>\t\t\t<br>뉴로마케팅<br>\t\t\t<br><a href=\"http://www.etnews.com/201111180080?mc=e_003_00009\" target=\"_blank\">http://www.etnews.com/201111180080?mc=e_003_00009</a><br>\t\t\t<br><br>\t\t\t<br>빅 테이터<br>\t\t\t<br>뉴로 마케팅 마스터<br>\t\t\t<br>신경 경제학, 인지 심리학<br>\t\t\t<br>통계 - SAS<br>\t\t\t<br>미래학<br>\t\t\t<br><br>\t\t\t<br>양자역학<br>\t\t\t<br><br>\t\t\t<br>잭트라우트, 알리스, 말콤 글래드웰, 스턴<br>\t\t\t<br>비 전공자에게 마케팅 공부가 어렵게 느껴지는 것은<br>\t\t\t<br>전체적인 흐름을 알지 못하고 부분으로 빠지기 쉽고<br>\t\t\t<br>따라서 뭐가 뭔지 헤깔리기 때문이죠<br>\t\t\t<br><br>\t\t\t<br>사실 마케팅 공부가 쉬워지려면<br>\t\t\t<br><br>\t\t\t<br>A. 전체적인 흐름과 흐름 중 주요 변곡점의 구체적인 의미를 따로 공부하고(What to do)<br>\t\t\t<br>B. 왜 이렇게 흘러갈 수 밖에 없는지 원리를 공부한 후에<br>\t\t\t<br>C. 주요변곡점은 어떻게 하는지(How to do)를 분리해서 공부하면 되는데<br>\t\t\t<br><br>\t\t\t<br>대부분의 입문서는 이 모든 것을 한권에 담고<br>\t\t\t<br>각각 변곡점 별로 내용과 방법 원리를 동시에 설명하므로<br>\t\t\t<br>어려워 지는 거죠 일단 두께에서부터 질려버리니까요.<br>\t\t\t<br>따라서 쉽게 공부하려면 분해해서 보면 됩니다.<br>\t\t\t<br><br>\t\t\t<br>1. 아무책이나 입문서를 한권 구하십시오.<br>\t\t\t<br>코틀러의 저작이 제일 좋지만(마케팅 관리 강추입니다.)<br>\t\t\t<br>국내 학자의 마케팅 원론도 나쁘지 않습니다.<br>\t\t\t<br><br>\t\t\t<br>2. 구입한 책에서 흐름을 잡도록 노력하세요<br>\t\t\t<br>PEST->3C->STP->4P(C)->효과측정 뭐 이런 식의 플로우를 잡은 후에<br>\t\t\t<br><br>\t\t\t<br>3. 각 프로시져의 선후관계와 개념만 잡으세요<br>\t\t\t<br><br>\t\t\t<br>4. 그 담엔 책을 덮습니다. 왜 해야 하고 어떻게 해야하는지는 일단 잊으세요<br>\t\t\t<br><br>\t\t\t<br>5. 마케팅 원리를 다룬 리스 앤 트라우트의 저작이나 이영직 교수의 저작을 두어권 사십시오.<br>\t\t\t<br><br>\t\t\t<br>6. 아무생각없이 가볍게 읽으세요 한 서너번 읽다보면 맥이 잡힙니다.<br>\t\t\t<br><br>\t\t\t<br>7. 그 담에 1에서 산 입문서를 다시 읽습니다.<br>\t\t\t<br>2번에서 잡은 흐름을 기준으로 2~3번 프리뷰를 하세요<br>\t\t\t<br><br>\t\t\t<br>8. 그리고 난 연후에 디테일하게 읽어나가는 겁니다.<br>\t\t\t<br>PEST->3C->STP->4P(C)->효과측정에서 PEST의 P는 무엇이고 어떻게 하고 언제 하는지<br>\t\t\t<br>구체적인 내용을 보기 시작해보세요.<br>\t\t\t<br><br>\t\t\t<br>9. 8의 과정을 끝내면 커다란 전지를 서너장 구입합니다.<br>\t\t\t<br>구입한 전지에 PEST->3C->STP->4P(C)->효과측정의 프로세스를 일단 그리고<br>\t\t\t<br>밑에 각각의 의미(A열), 하는법(B열), 왜 그래야 하는지(C열)을 적으세요<br>\t\t\t<br><br>\t\t\t<br>10. 이상의 과정을 마친 후에 벽에 붙여놓고 간혹 보거나<br>\t\t\t<br>파워포인트로 워킹북을 만들어서 간혹 열어봅니다.<br>\t\t\t<br><br>\t\t\t<br>자 이제 마케팅이 뭐다 정도는 아는 수준이 된 겁니다.<br>\t\t\t<br>그리고 세미나를 들으러 다녀보세요<br>\t\t\t<br>이제 무슨 이야기인지 술술 들어오기 시작합니다.<br>\t\t\t<br>그 담엔!!! 취업해서 나머지를 채우는 거죠.<br>\t\t\t<br><br>\t\t\t<br>1~10까지의 방법 대로 하면<br>\t\t\t<br>전체적인 맥을 잡는데 3~6개월 정도 소요됩니다.<br>\t\t\t<br>마케팅이라는 것이<br>\t\t\t<br>나중에 취업을 하거나 창업을 해서<br>\t\t\t<br>직접적으로 사용할 일이 없더라도<br>\t\t\t<br>인생을 살아가는데 큰 도움이 됩니다.<br>\t\t\t<br>이 정도 투자라면 그리 아깝지는 않지요.<br>\t\t\t<br><br>\t\t\t<br>도움이 되셨길 빌며...<br>\t\t\t<br><br>\t\t\t<br>덧말>><br>\t\t\t<br>위 공부법은 95년인가 당시 제일기획에 다니던<br>\t\t\t<br>이선구 카피께서(당시 차장이셨을 겁니다.)<br>\t\t\t<br>나우누리 광고동 정모인가 특강인가에서 설명 하셨던 내용입니다.<br>\t\t\t<br>저도 후배들한테 많이 설명해준 방식이고<br>\t\t\t<br>시간은 많이 지났지만 아직까지 유효합니다.<br>\t\t\t<br><br>\t\t\t<br>프로세스를 모르기 때문에 중구난방이다란 탁견은<br>\t\t\t<br>아직까지 놀랍기만 하지요.<br>\t\t\t<br>[출처] 비전공자를 위한 마케팅 쉽게 공부하는 법...(1) (新 마케팅공화국) |작성자 진재윤GhostSqd<br>\t\t\t<br><br>\t\t\t<br>마케팅을 하시다 보면 리서치가 매우 중요하다는 것을 느껴 보신적 있으신가요? 저는 학교에서 교수님의 영향으로 일찍이 리서치가 중요하다는 것을 알게 되었습니다. 그래서 훌륭한 마케터가 되기 위해 마케팅 리서치를 지속적으로 배우고 있습니다. 오늘은 이에 맞춰서 1978년에 설립되어 한국의 시장조사 전문 회사인 한국리서치의 대표이신 노익상 대표님의 경험에서 나온 이야기를 전해드리겠습니다. <br>\t\t\t<br><br>\t\t\t<br> ---------------------------------------------------------------------------------------------------------<br>\t\t\t<br><br>\t\t\t<br>- 체험하지 않으면 궁지에 몰린다 -<br>\t\t\t<br><br>\t\t\t<br>리서처는 기업과 소비자의 가교 역할을 해야 한다. 기업도 알아야 한다. 그러려면 기업 내 사람들을 알아야 한다. 그들의 고민이나 노력, 바람이 무엇인지 알아야 한다. 그래야 그들에게 도움이 되는 소비자 정보를 선택하고 제시하며 쓸모 있는 전략을 제안할 수 있다. 어디 리서처뿐이랴. 상품과 소비자를 엮어내야 하는 마케터도 마찬가지다. 든든한 가교로 자리매김하려면 양쪽의 성향을 다 파악해야 한다. 이것이 마케터가 반드시 지녀야 할 태도이자 비법이다.<br>\t\t\t<br><br>\t\t\t<br>훌륭한 가교 역할을 위해서는 마케터나 리서처나 다뤄야 할 것이 눈에 보이는 제품이든 보이지 않는 서비스든 간에 자신이 먼저 사용해봐야 한다. 직접 보고 냄새를 맡고 만져보지 않고서는 그 무엇도 시작할 수 없다. 아니, 시작해서는 안 된다.<br>\t\t\t<br><br>\t\t\t<br>이에 대한 경함담이 있다.   <br>\t\t\t<br><br>\t\t\t<br>국내 굴지의 대기업이 서울 외곽도시에 백화점을 세우겠다고 결심했다. 나는 그것에 대한 타당성 조사를 의뢰받고서 몇몇 항목을 가늠해보았다. 상권의 구조는? 타깃 고객의 특성은? 기존 중견 백화점 고객을 유치할 수 있는 방법은? 상품 구색은? 층별 상품 포지션은? 주차장 규모는? 셔틀버스의 효과는? 연일 조사결과를 설명하고 기업 임원들과 토론을 벌였다. 보고회가 끝나고 나서 그 기업 사장이 넌지시 물었다.<br>\t\t\t<br><br>\t\t\t<br>“백화점 지을 자리에 가보셨습니까?”<br>\t\t\t<br><br>\t\t\t<br>나는 그 질문에 아찔했다. 가보지 못했기 때문이다. 조사를 수행한 연구진들은 가보았지만, 정작 발표자인 나는 가지 않았던 것이다. 사장이 정중하게 묻는 이유도 짐작됐다. 실감나는 이야기는 하나도 하지 못하고 숫자만 늘어놓았기 때문이리라. 나는 기어들어가는 목소리로 “못 가보았습니다.” 라고 대답했다. 이미 판단은 그것으로 끝이었다. ‘조사를 잘해줘서 고맙지만, 너하고는 다시 안 만난다.’ 아마 그 사장의 마음속에는 그런 다짐이 스쳐 지났을 것이다.<br>\t\t\t<br> <br>\t\t\t<br>지식은 지식에 불과하다. 체험 없는 지식만 갖고 주장하면 외려 상대방을 피곤하게 한다. 물론 사람들은 저마다 다른 경험을 할 수 있다. 하지만 체험한 사람과 체험하지 못한 사람의 차이는 체험한 사람들 간의 차이보다 몇 배는 더 크다. 그건 차이가 아니라 오류로 드러나게 마련이다. 머릿속에 들어찬 생각, 아이디어, 컨셉žžžžž 이런 것이 마케터를 허황된 존재로 만들고 리서처를 바보로 만든다. 직접 뛰어들라. 그곳에 답이 있다.<br>\t\t\t<br><br>\t\t\t<br>마지막으로 후배마케터에게 한마디: <br>\t\t\t<br><br>\t\t\t<br>소설과 영화를 많이 접해보라. 소설과 영화 속에는 사람들의 진짜 삶이 담겨 있기 때문이다. 소비자를 알려면 애매모호한 마케팅 지식보다 사람의 마음을 이해할 수 있는 직접 혹은 간접 체험이 필요하다.<br>\t\t\t<br><br>\t\t\t<br>---------------------------------------------------------------------------------------------------------<br>\t\t\t<br><br>\t\t\t<br>이 글을 제가 도서<마케터분투기>를 편집한 내용입니다. 많은 분들에게 도움이 되면 좋겠습니다.<br>\t\t\t<br>[출처] [선배 마케터의 조언] 노익상 - 한국리서치 대표 (新 마케팅공화국) |작성자 김종명<br>\t\t\t<br><br>\t\t\t<br><a href=\"http://cafe.naver.com/selfpower.cafe?iframe_url=/ArticleRead.nhn%3Farticleid=972&\" target=\"_blank\">http://cafe.naver.com/selfpower.cafe?iframe_url=/ArticleRead.nhn%3Farticleid=972&</a><br>\t\t\t<br><a href=\"http://link.argo9.com/58/\" target=\"_blank\">http://link.argo9.com/58/</a><br>\t\t\t<br><br>\t\t\t<br><a href=\"http://blog.naver.com/oneposition?Redirect=Log&logNo=120126783889\" target=\"_blank\">http://blog.naver.com/oneposition?Redirect=Log&logNo=120126783889</a> 원포지셔닝 블로그<br>\t\t\t<br><br>\t\t\t<br><a href=\"http://markidea.net/\" target=\"_blank\">http://markidea.net/</a> 마키디어<br>\t\t\t<br><br>\t\t\t<br>트렌드 뉴스 매일 읽기<br>\t\t\t<br>논문 구해 읽기<br>\t\t\t<br>뉴로 마케팅/뇌과학/심리학<br>\t\t\t<br><br>\t\t<br>\t\t<br>\t\t\t<br><br>\t\t<br>\t\t<br>\t\t\t<br>의.식.주 / 시각, 청각, 후각, 미각, 촉각<br>\t\t<br>\t\t<br>\t\t\t<br><a href=\"http://cafe.naver.com/socoolever/130\" target=\"_blank\">http://cafe.naver.com/socoolever/130</a><br>\t\t\t<br><br>\t\t\t<br><a href=\"http://srilab.tistory.com/158\" target=\"_blank\">http://srilab.tistory.com/158</a>",

let cards = [];

function loadBoard() {
  const saved = localStorage.getItem(SAVE_KEY);
  cards = saved ? JSON.parse(saved) : DEFAULT_CARDS.map(c => ({...c}));
  renderCards();

function autoLayout() {
  const GAP = 14;
  const boardW = document.getElementById('board').offsetWidth;
  const cols = Math.max(1, Math.floor(boardW / 280));
  const colW = (boardW - GAP * (cols - 1)) / cols;
  const colHeights = new Array(cols).fill(0);
  const allCards = document.querySelectorAll('.card');
  const images = document.querySelectorAll('.card img');
  let loaded = 0;
  const total = images.length;

  function place() {
    allCards.forEach((el, i) => {
      const card = cards[i];
      const w = Math.min(card.w || colW, colW);
      let minCol = 0;
      for (let c = 1; c < cols; c++) if (colHeights[c] < colHeights[minCol]) minCol = c;
      card.x = minCol * (colW + GAP);
      card.y = colHeights[minCol];
      card.w = w;
      el.style.left = card.x + 'px';
      el.style.top = card.y + 'px';
      el.style.width = w + 'px';
      colHeights[minCol] = card.y + el.offsetHeight + GAP;
    });
    document.getElementById('board').style.minHeight = Math.max(...colHeights) + 100 + 'px';
    saveBoard();
  }

  if (total === 0) requestAnimationFrame(place);
  else images.forEach(img => {
    if (img.complete) { loaded++; if (loaded >= total) requestAnimationFrame(place); }
    else img.onload = img.onerror = () => { loaded++; if (loaded >= total) requestAnimationFrame(place); };
  });
}

function syncText() {
  document.querySelectorAll('.card').forEach(el => {
    const idx = +el.dataset.idx;
    if (cards[idx]?.type === 'text') {
      const t = el.querySelector('.text');
      if (t) cards[idx].content = t.innerHTML;
    }
  });
}

function saveBoard() {
  syncText();
  localStorage.setItem(SAVE_KEY, JSON.stringify(cards));
  document.getElementById('status').textContent = '저장됨 ' + new Date().toLocaleTimeString();
}

function renderCards() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  cards.forEach((card, i) => {
    const el = document.createElement('div');
    el.className = 'card';
    el.dataset.idx = i;
    if (card.x !== undefined) el.style.left = card.x + 'px';
    if (card.y !== undefined) el.style.top = card.y + 'px';
    if (card.w) el.style.width = card.w + 'px';

    el.addEventListener('mousedown', e => {
      if (e.target.closest('.text, a, .card-btn, .resize-handle, table')) return;
      e.preventDefault();
      moving = { idx: i, startX: e.clientX, startY: e.clientY, origX: card.x || 0, origY: card.y || 0 };
      el.classList.add('moving');
    });

    const actions = document.createElement('div');
    actions.className = 'card-actions';
    const delBtn = document.createElement('button');
    delBtn.className = 'card-btn'; delBtn.textContent = '×';
    delBtn.onclick = e => { e.stopPropagation(); if (confirm('삭제?')) { cards.splice(i, 1); renderCards(); saveBoard(); } };
    actions.appendChild(delBtn);
    el.appendChild(actions);

    if (card.type === 'text') {
      const text = document.createElement('div');
      text.className = 'text';
      text.contentEditable = true;
      text.innerHTML = card.content || '';
      text.addEventListener('blur', () => { card.content = text.innerHTML; saveBoard(); });
      el.appendChild(text);
    } else if (card.type === 'image') {
      const src = card.src.startsWith('http') || card.src.startsWith('data:') ? card.src : IMG_BASE + card.src;
      const img = document.createElement('img');
      img.src = src;
      img.alt = card.alt || '';
      img.loading = 'lazy';
      img.onerror = () => img.style.display = 'none';
      if (card.link) {
        const a = document.createElement('a'); a.href = card.link; a.target = '_blank';
        a.appendChild(img); el.appendChild(a);
      } else { el.appendChild(img); }
      if (card.caption) {
        const cap = document.createElement('div');
        cap.className = 'caption';
        cap.textContent = card.caption;
        el.appendChild(cap);
      }
    } else if (card.type === 'table') {
      const wrapper = document.createElement('div');
      wrapper.style.overflowX = 'auto';
      wrapper.innerHTML = card.html || '';
      el.appendChild(wrapper);
    }

    const rh = document.createElement('div');
    rh.className = 'resize-handle';
    rh.addEventListener('mousedown', e => {
      e.preventDefault(); e.stopPropagation();
      resizing = { idx: i, startX: e.clientX, startW: card.w || el.offsetWidth };
    });
    el.appendChild(rh);
    board.appendChild(el);
  });

  requestAnimationFrame(() => {
    let maxBottom = 0;
    document.querySelectorAll('.card').forEach(el => {
      const b = (parseFloat(el.style.top) || 0) + el.offsetHeight;
      if (b > maxBottom) maxBottom = b;
    });
    board.style.minHeight = (maxBottom + 100) + 'px';
  });
}

document.addEventListener('mousemove', e => {
  if (moving) {
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`);
    if (!el) return;
    const nx = moving.origX + e.clientX - moving.startX;
    const ny = moving.origY + e.clientY - moving.startY;
    el.style.left = nx + 'px';
    el.style.top = ny + 'px';
  }
  if (resizing) {
    const card = cards[resizing.idx];
    card.w = Math.max(100, resizing.startW + e.clientX - resizing.startX);
    const el = document.querySelector(`.card[data-idx="${resizing.idx}"]`);
    if (el) el.style.width = card.w + 'px';
  }
});

document.addEventListener('mouseup', e => {
  if (moving) {
    const card = cards[moving.idx];
    card.x = Math.max(0, moving.origX + e.clientX - moving.startX);
    card.y = Math.max(0, moving.origY + e.clientY - moving.startY);
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`);
    if (el) { el.classList.remove('moving'); }
    moving = null; saveBoard();
  }
  if (resizing) { resizing = null; saveBoard(); }
});

function addTextCard() {
  cards.push({ type: 'text', content: '', x: 50, y: window.scrollY + 100, w: 300 });
  renderCards();
  setTimeout(() => { const els = document.querySelectorAll('.card .text'); els[els.length - 1]?.focus(); }, 100);
}

function addImageCard() {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = 'image/*';
  input.onchange = e => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = () => { cards.push({ type: 'image', src: reader.result, x: 50, y: window.scrollY + 100, w: 240 }); renderCards(); saveBoard(); };
    reader.readAsDataURL(file);
  };
  input.click();
}

function resetLayout() {
  if (!confirm('자동 재배치합니다. 현재 위치가 변경됩니다.')) return;
  cards.forEach(c => { delete c.x; delete c.y; });
  renderCards(); autoLayout();
}

setInterval(saveBoard, 30000);
loadBoard();
</script>
