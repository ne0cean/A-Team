<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VISION</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #1e1e1e;
  color: #e0e0e0;
  font-family: 'Segoe UI', -apple-system, sans-serif;
  font-size: 15px;
  line-height: 1.6;
  padding: 20px 30px 60px;
  overflow-x: hidden;
}
a { color: #6cb0f6; text-decoration: none; }
a:hover { text-decoration: underline; }
.title-bar {
  background: #3a3a5c;
  display: inline-block;
  padding: 6px 16px;
  font-size: 22px;
  font-weight: bold;
  color: #fff;
  margin-bottom: 4px;
}
.date { color: #999; font-size: 13px; margin-bottom: 20px; }
.board { position: relative; }
.card {
  background: #2a2a2a;
  border: 1px solid #3a3a3a;
  border-radius: 8px;
  padding: 12px;
  position: absolute;
  cursor: grab;
  transition: box-shadow 0.15s;
  overflow: hidden;
}
.card:hover { box-shadow: 0 0 0 1px #58a6ff; z-index: 10; }
.card.moving { opacity: 0.8; box-shadow: 0 4px 24px rgba(0,0,0,0.6); z-index: 100; cursor: grabbing; }
.card img { width: 100%; border-radius: 4px; display: block; }
.card .caption { font-size: 12px; color: #888; margin-top: 6px; }
.card .text { outline: none; min-height: 20px; white-space: pre-wrap; word-break: break-word; }
.card .text:focus { background: rgba(255,255,255,0.05); border-radius: 4px; padding: 4px; }
.card .text:empty::before { content: '텍스트 입력...'; color: #555; }
.card table { border-collapse: collapse; width: 100%; font-size: 13px; }
.card table td, .card table th { border: 1px solid #444; padding: 4px 8px; vertical-align: top; }
.card table th { background: #333; color: #ccc; }
.card-actions { position: absolute; top: 4px; right: 4px; display: none; gap: 4px; }
.card:hover .card-actions { display: flex; }
.card-btn { background: #333; border: 1px solid #555; color: #ccc; border-radius: 4px; padding: 2px 6px; font-size: 11px; cursor: pointer; }
.card-btn:hover { background: #444; color: #fff; }
.resize-handle { position: absolute; bottom: 0; right: 0; width: 16px; height: 16px; cursor: se-resize; opacity: 0; }
.card:hover .resize-handle { opacity: 0.6; }
.resize-handle::after { content: ''; position: absolute; bottom: 3px; right: 3px; width: 8px; height: 8px; border-right: 2px solid #666; border-bottom: 2px solid #666; }
.toolbar { position: fixed; bottom: 0; left: 0; right: 0; background: #161b22; border-top: 1px solid #30363d; padding: 8px 20px; display: flex; gap: 12px; align-items: center; z-index: 200; }
.toolbar button { background: #21262d; border: 1px solid #30363d; color: #e0e0e0; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; }
.toolbar button:hover { background: #30363d; }
.toolbar .status { color: #8b949e; font-size: 12px; margin-left: auto; }
.highlight-red { color: #ff6b6b; }
.highlight-blue { color: #6cb0f6; }
</style>
</head>
<body>
<div class="title-bar">VISION</div>
<div class="date">2016년 7월 3일 일요일</div>

<script>
const SAVE_KEY = 'board-VISION';
const IMG_BASE = '../../attachments/';
const DEFAULT_CARDS = [
  {
    "type": "text",
    "content": "VISION<br>\t\t<br>\t\t<br>\t<br>\t<br>\t\t<br>\t\t\t<br>\t\t\t\t<br>인생에 꿈이 하나일 수는 없다고 생각해요.<br>\t\t\t\t<br>그리고 계단을 하나씩 오를 때마다,<br>\t\t\t\t<br>보는 뷰가 바뀌고, 각 단계에서 꾸는 꿈도 바뀌게 마련이죠.<br>\t\t\t\t<br><br>\t\t\t\t<br>어릴적에 꿈꿨던 지금의 모습은 이런거죠.<br>\t\t\t\t<br>잘 나가는 회사원,<br>\t\t\t\t<br>기백이 담긴 프리젠테이션도 해보고, <br>\t\t\t\t<br>어려운 미션을 강한 추진력과 창의력으ㅗ 성취해내기도 하고.<br>\t\t\t\t<br>이런거 아니었을까요?<br>\t\t\t\t<br><br>\t\t\t\t<br>하지만 앞으로 5년, 10년 후는요?<br>\t\t\t\t<br>난 아직도 내 미래가 궁금해요.<br>\t\t\t\t<br><br>\t\t\t\t<br>중년 즈음에는 흰 머리가 잘 어울리는, <br>\t\t\t\t<br>근사한 미소의 VC가 되어 있을 수도 있는 거구요.<br>\t\t\t\t<br><br>\t\t\t\t<br><br>\t\t\t\t<br><br>\t\t\t\t<br><br>\t\t\t\t<br>사람의 꿈과 열망은 결국 어떤 결핍의 발로/투영라고 생각해요.<br>\t\t\t\t<br>그게 내적인 것이든, 아니면 자신이 원하는 이상향이든<br>\t\t\t\t<br><br>\t\t\t\t<br>그래서 나의 미래를 말하려면 내가 느끼는 갈증에 대해서<br>\t\t\t\t<br>이야기 하는 편이 나을 것 같습니다.<br>\t\t\t\t<br><br>\t\t\t\t<br>오투오 - 티 애스킹<br>\t\t\t\t<br>이건 2010년 부터 지인들이랑 짜그락 거리던 이야기를 2012년 입사 최종면접에<br>\t\t\t\t<br>가지고 들어갔던 거고, 공식/비공식적으로 회사에 4회 제안 했었어요.<br>\t\t\t\t<br>지금 이걸 O2O라고 부르죠.<br>\t\t\t\t<br>플랫폼 - 점펍 1년차 pt<br>\t\t\t\t<br>이건 입사 한 해에 주니어 겸둥이들 프로젝트 할 적에 제가 발표한 첫 장표에요<br>\t\t\t\t<br>4년이 흐른 지금 회사가 나를 불러서 플랫폼 교육을 한다는데…..<br>\t\t\t\t<br>엠씨엔 - 인풋스펙스/ 주니어 점프업<br>\t\t\t\t<br>이건 3년차 점프업때 최종 발표한거죠.<br>\t\t\t\t<br>셋톱박스를 독리병 디바이스로 개발하고, BJ 에이전시를 설립해서 Btv BJ를 육성하며,<br>\t\t\t\t<br>아프리가TV를 사야한다.<br>\t\t\t\t<br>STB는 LG가 먼저 출시 했고, BJ 에이전시를 이제는 MCN이라고 부르네요, 그리고 우린 큰 쇼핑에 실패했죠.<br>\t\t\t\t<br>셀카드론/ 노이즈캔슬링<br>\t\t\t\t<br><br>\t\t\t\t<br>포켓몬고 - 황금나침반 <br>\t\t\t\t<br>10개월 전 본사에 TF로 불려왔을 때, 선배들에게 포켓몬GO 영상을 보여주며 혼자 신나있던 내가 바보같네요.<br>\t\t\t\t<br><br>\t\t\t\t<br>이 것들이 상용화, 사업화 되는 것을 보면서 <br>\t\t\t\t<br>사실 처음엔 우쭐 했었어요. \"거봐, 내 말이 맞잖아?!\"<br>\t\t\t\t<br><br>\t\t\t\t<br>그리고 해를 거듭하고, 이런 기시감이 반복될수록 <br>\t\t\t\t<br>씁쓸함과 공허함을 느껴요.<br>\t\t\t\t<br><br>\t\t\t\t<br>나는 이것들을 볼 수 있었으면서도,<br>\t\t\t\t<br>결국 아무것도 하지 않은거죠.<br>\t\t\t\t<br><br>\t\t\t\t<br>난 타조에요, <br>\t\t\t\t<br>빠르게 내달릴 수도 있고, <br>\t\t\t\t<br>가끔 큰 날개를 뽐내지만<br>\t\t\t\t<br>정작 날지는 못하는 새.<br>\t\t\t\t<br><br>\t\t\t\t<br>이런 내 갈증,<br>\t\t\t\t<br>이걸 헤아려줄 수 있는 사람이었으면 합니다.<br>\t\t\t\t<br><br>\t\t\t\t<br>남자는 개아니면 애라는데<br>\t\t\t\t<br>저도 별반 다르지 않은 녀석입니다.<br>\t\t\t\t<br><br>\t\t\t\t<br>그저 인류애를 발휘하여 되바라진 아이 하나<br>\t\t\t\t<br>혹은 반려견 한마리 키운다고 생각하시고<br>\t\t\t\t<br><br>\t\t\t\t<br>가벼운 만남으로 접근하여<br>\t\t\t\t<br>진지하게 만나주시면 됩니다.<br>\t\t\t\t<br><br>\t\t\t\t<br>==========================================<br>\t\t\t\t<br><br>\t\t\t\t<br>네가 안주하는 오늘의 안정이,<br>\t\t\t\t<br>네 미래의 안정을 좀먹을 것이다.<br>\t\t\t\t<br><br>\t\t\t\t<br>세상은 나 같은 삼류에게<br>\t\t\t\t<br>아무 것도 바라지 않는다.<br>\t\t\t\t<br>그러니 정작 중요한 것은<br>\t\t\t\t<br>내가 나에게 바라는 바다.<br>\t\t\t\t<br><br>\t\t\t\t<br>최악을 희망하되,<br>\t\t\t\t<br>최악을 상정한다.<br>\t\t\t\t<br><br>\t\t\t\t<br>플랜A가 실행되는 경우는 없다.<br>\t\t\t\t<br>모두가 플랜A를 이야기할때,<br>\t\t\t\t<br>플랜B를 구상하라.<br>\t\t\t\t<br><br>\t\t\t\t<br>- 세상은, 나 같은 삼류에게 아무것도 기대하지 않는다.<br>\t\t\t\t<br>세상이 나에게 무엇을 기대하는지는 하나도 중요하지 않다.<br>\t\t\t\t<br>정말 중요한 것은 내가 나에게 무엇을 기대하는가 이다.<br>\t\t\t\t<br><br>\t\t\t\t<br><br>\t\t\t<br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t<br>\t\t<br>\t\t\t<br>0. T-AKSING --> O2O<br>\t\t\t<br>0. 이건 12년도 내가 만든 점프업 과제의 첫 장표다.<br>\t\t\t<br>  회사는 플랫폼 사업자로 트랜스 포메이션 하게<br>\t\t\t<br>  통신이 왜 전통전인 플랫폼인지에 대해서<br>\t\t\t<br>1. MCN<br>\t\t\t<br>2. <br>\t\t\t<br>제안번호 : 20140901001<br>\t\t\t<br>제안명 Btv 개인방송 채널 도입 <br>\t\t\t<br>Topic SKT군 3合 Maximize <br>\t\t\t<br>추진개요 <br>\t\t\t<br>개개인이 컨텐츠를 생상하고 공유하는 시대가 열린지 이미 오래이나, 인터넷이 아닌 TV에서 해당 컨텐츠를 접근하는데에는 여전히 허들이 존재함. 개인이 방송을 쉽게 제작하고 이를 안방에서도 쉽게 볼 수 있도록 하는 플랫폼 제공이 필요함. <br>\t\t\t<br>실행방안 <br>\t\t\t<br>본 제안의 핵심은 아프리카TV, 페이스북의 영상 등을 Btv모바일과 Btv채널을 통해 손쉽게 볼 수 있도록 하는 것임. 단계적으로는 Btv모바일을 통해 고객들이 모바일로 촬영한 영상을 유통시키고 또 감상할 수 있는 플랫폼으로 자리잡도록 하는 것이 목표임.<br>\t\t\t<br><br>\t\t\t<br>1) 영상 저작 Tool 제공<br>\t\t\t<br>- Btv 모바일 내, 혹은 별도의 Btv용 영상촬영 Tool 제공<br>\t\t\t<br>- Btv 셋톱박스와 연동하여 사용가능한 인터넷 방송촬영 인프라를 BJ들에게 방송 조건부 제공 <br>\t\t\t<br>2) Btv 내에 24시간 BJ 전문채널 셋팅 <br>\t\t\t<br>3) Btv 모바일 BJ 육성<br>\t\t\t<br>- BJ 전문 에이전시 운영 : 연봉계약 및 체계적 교육 실시<br>\t\t\t<br>4) Btv 친구채널 : 지인간 Btv모바일 친구맺기를 통한 손쉬운 영상공유. 지인들만의 영상 타임라인 및 채널 제공 <br>\t\t\t<br><br>\t\t\t<br>기대효과 <br>\t\t\t<br>(정성적)1. 인터넷 방송을 정규 채널로 편성하여 새로운 컨텐츠 도입 2. YT고객군의 Btv 선호도 제고 3. 코드커팅 리스크 햇징  <br>\t\t\t<br>(정량적)1. Btv 모바일 가입자 증대 2. Btv 모바일을 통한 영상유통으로 Data ARPU 제고  <br>\t\t\t<br>(근거식)  <br>\t\t\t<br>장애요인/Risk 및 제거방안 <br>\t\t\t<br>Tag(태그)  <br>\t\t\t<br>Follower 0 | Answer 0 | 조회수 137 | 본검토착수 2014-09-01 00:12:12 <br>\t\t\t<br><br>\t\t\t<br>3. STB<br>\t\t\t<br>4. 황금나침반 <br>\t\t<br>\t\t<br>\t\t\t<br>1회 오프라인 만남 시로 정의해",
    "w": 400
  }
];

let cards = [];
let moving = null, resizing = null;

function loadBoard() {
  const saved = localStorage.getItem(SAVE_KEY);
  cards = saved ? JSON.parse(saved) : DEFAULT_CARDS.map(c => ({...c}));
  renderCards();
  if (!saved) autoLayout();
}

function autoLayout() {
  const GAP = 14;
  const boardW = document.getElementById('board').offsetWidth;
  const cols = Math.max(1, Math.floor(boardW / 280));
  const colW = (boardW - GAP * (cols - 1)) / cols;
  const colHeights = new Array(cols).fill(0);
  const allCards = document.querySelectorAll('.card');
  const images = document.querySelectorAll('.card img');
  let loaded = 0;
  const total = images.length;

  function place() {
    allCards.forEach((el, i) => {
      const card = cards[i];
      const w = Math.min(card.w || colW, colW);
      let minCol = 0;
      for (let c = 1; c < cols; c++) if (colHeights[c] < colHeights[minCol]) minCol = c;
      card.x = minCol * (colW + GAP);
      card.y = colHeights[minCol];
      card.w = w;
      el.style.left = card.x + 'px';
      el.style.top = card.y + 'px';
      el.style.width = w + 'px';
      colHeights[minCol] = card.y + el.offsetHeight + GAP;
    });
    document.getElementById('board').style.minHeight = Math.max(...colHeights) + 100 + 'px';
    saveBoard();
  }

  if (total === 0) requestAnimationFrame(place);
  else images.forEach(img => {
    if (img.complete) { loaded++; if (loaded >= total) requestAnimationFrame(place); }
    else img.onload = img.onerror = () => { loaded++; if (loaded >= total) requestAnimationFrame(place); };
  });
}

function syncText() {
  document.querySelectorAll('.card').forEach(el => {
    const idx = +el.dataset.idx;
    if (cards[idx]?.type === 'text') {
      const t = el.querySelector('.text');
      if (t) cards[idx].content = t.innerHTML;
    }
  });
}

function saveBoard() {
  syncText();
  localStorage.setItem(SAVE_KEY, JSON.stringify(cards));
  document.getElementById('status').textContent = '저장됨 ' + new Date().toLocaleTimeString();
}

function renderCards() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  cards.forEach((card, i) => {
    const el = document.createElement('div');
    el.className = 'card';
    el.dataset.idx = i;
    if (card.x !== undefined) el.style.left = card.x + 'px';
    if (card.y !== undefined) el.style.top = card.y + 'px';
    if (card.w) el.style.width = card.w + 'px';

    el.addEventListener('mousedown', e => {
      if (e.target.closest('.text, a, .card-btn, .resize-handle, table')) return;
      e.preventDefault();
      moving = { idx: i, startX: e.clientX, startY: e.clientY, origX: card.x || 0, origY: card.y || 0 };
      el.classList.add('moving');
    });

    const actions = document.createElement('div');
    actions.className = 'card-actions';
    const delBtn = document.createElement('button');
    delBtn.className = 'card-btn'; delBtn.textContent = '×';
    delBtn.onclick = e => { e.stopPropagation(); if (confirm('삭제?')) { cards.splice(i, 1); renderCards(); saveBoard(); } };
    actions.appendChild(delBtn);
    el.appendChild(actions);

    if (card.type === 'text') {
      const text = document.createElement('div');
      text.className = 'text';
      text.contentEditable = true;
      text.innerHTML = card.content || '';
      text.addEventListener('blur', () => { card.content = text.innerHTML; saveBoard(); });
      el.appendChild(text);
    } else if (card.type === 'image') {
      const src = card.src.startsWith('http') || card.src.startsWith('data:') ? card.src : IMG_BASE + card.src;
      const img = document.createElement('img');
      img.src = src;
      img.alt = card.alt || '';
      img.loading = 'lazy';
      img.onerror = () => img.style.display = 'none';
      if (card.link) {
        const a = document.createElement('a'); a.href = card.link; a.target = '_blank';
        a.appendChild(img); el.appendChild(a);
      } else { el.appendChild(img); }
      if (card.caption) {
        const cap = document.createElement('div');
        cap.className = 'caption';
        cap.textContent = card.caption;
        el.appendChild(cap);
      }
    } else if (card.type === 'table') {
      const wrapper = document.createElement('div');
      wrapper.style.overflowX = 'auto';
      wrapper.innerHTML = card.html || '';
      el.appendChild(wrapper);
    }

    const rh = document.createElement('div');
    rh.className = 'resize-handle';
    rh.addEventListener('mousedown', e => {
      e.preventDefault(); e.stopPropagation();
      resizing = { idx: i, startX: e.clientX, startW: card.w || el.offsetWidth };
    });
    el.appendChild(rh);
    board.appendChild(el);
  });

  requestAnimationFrame(() => {
    let maxBottom = 0;
    document.querySelectorAll('.card').forEach(el => {
      const b = (parseFloat(el.style.top) || 0) + el.offsetHeight;
      if (b > maxBottom) maxBottom = b;
    });
    board.style.minHeight = (maxBottom + 100) + 'px';
  });
}

document.addEventListener('mousemove', e => {
  if (moving) {
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`);
    if (!el) return;
    const nx = moving.origX + e.clientX - moving.startX;
    const ny = moving.origY + e.clientY - moving.startY;
    el.style.left = nx + 'px';
    el.style.top = ny + 'px';
  }
  if (resizing) {
    const card = cards[resizing.idx];
    card.w = Math.max(100, resizing.startW + e.clientX - resizing.startX);
    const el = document.querySelector(`.card[data-idx="${resizing.idx}"]`);
    if (el) el.style.width = card.w + 'px';
  }
});

document.addEventListener('mouseup', e => {
  if (moving) {
    const card = cards[moving.idx];
    card.x = Math.max(0, moving.origX + e.clientX - moving.startX);
    card.y = Math.max(0, moving.origY + e.clientY - moving.startY);
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`);
    if (el) { el.classList.remove('moving'); }
    moving = null; saveBoard();
  }
  if (resizing) { resizing = null; saveBoard(); }
});

function addTextCard() {
  cards.push({ type: 'text', content: '', x: 50, y: window.scrollY + 100, w: 300 });
  renderCards();
  setTimeout(() => { const els = document.querySelectorAll('.card .text'); els[els.length - 1]?.focus(); }, 100);
}

function addImageCard() {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = 'image/*';
  input.onchange = e => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = () => { cards.push({ type: 'image', src: reader.result, x: 50, y: window.scrollY + 100, w: 240 }); renderCards(); saveBoard(); };
    reader.readAsDataURL(file);
  };
  input.click();
}

function resetLayout() {
  if (!confirm('자동 재배치합니다. 현재 위치가 변경됩니다.')) return;
  cards.forEach(c => { delete c.x; delete c.y; });
  renderCards(); autoLayout();
}

setInterval(saveBoard, 30000);
loadBoard();
</script>
</body>
</html>
