<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>어깨 퇴행성 관절염</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #1e1e1e;
  color: #e0e0e0;
  font-family: 'Segoe UI', -apple-system, sans-serif;
  font-size: 15px;
  line-height: 1.6;
  padding: 20px 30px 60px;
  overflow-x: hidden;
}
a { color: #6cb0f6; text-decoration: none; }
a:hover { text-decoration: underline; }
.title-bar {
  background: #3a3a5c;
  display: inline-block;
  padding: 6px 16px;
  font-size: 22px;
  font-weight: bold;
  color: #fff;
  margin-bottom: 4px;
}
.date { color: #999; font-size: 13px; margin-bottom: 20px; }
.board { position: relative; }
.card {
  background: #2a2a2a;
  border: 1px solid #3a3a3a;
  border-radius: 8px;
  padding: 12px;
  position: absolute;
  cursor: grab;
  transition: box-shadow 0.15s;
  overflow: hidden;
}
.card:hover { box-shadow: 0 0 0 1px #58a6ff; z-index: 10; }
.card.moving { opacity: 0.8; box-shadow: 0 4px 24px rgba(0,0,0,0.6); z-index: 100; cursor: grabbing; }
.card img { width: 100%; border-radius: 4px; display: block; }
.card .caption { font-size: 12px; color: #888; margin-top: 6px; }
.card .text { outline: none; min-height: 20px; white-space: pre-wrap; word-break: break-word; }
.card .text:focus { background: rgba(255,255,255,0.05); border-radius: 4px; padding: 4px; }
.card .text:empty::before { content: '텍스트 입력...'; color: #555; }
.card table { border-collapse: collapse; width: 100%; font-size: 13px; }
.card table td, .card table th { border: 1px solid #444; padding: 4px 8px; vertical-align: top; }
.card table th { background: #333; color: #ccc; }
.card-actions { position: absolute; top: 4px; right: 4px; display: none; gap: 4px; }
.card:hover .card-actions { display: flex; }
.card-btn { background: #333; border: 1px solid #555; color: #ccc; border-radius: 4px; padding: 2px 6px; font-size: 11px; cursor: pointer; }
.card-btn:hover { background: #444; color: #fff; }
.resize-handle { position: absolute; bottom: 0; right: 0; width: 16px; height: 16px; cursor: se-resize; opacity: 0; }
.card:hover .resize-handle { opacity: 0.6; }
.resize-handle::after { content: ''; position: absolute; bottom: 3px; right: 3px; width: 8px; height: 8px; border-right: 2px solid #666; border-bottom: 2px solid #666; }
.toolbar { position: fixed; bottom: 0; left: 0; right: 0; background: #161b22; border-top: 1px solid #30363d; padding: 8px 20px; display: flex; gap: 12px; align-items: center; z-index: 200; }
.toolbar button { background: #21262d; border: 1px solid #30363d; color: #e0e0e0; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; }
.toolbar button:hover { background: #30363d; }
.toolbar .status { color: #8b949e; font-size: 12px; margin-left: auto; }
.highlight-red { color: #ff6b6b; }
.highlight-blue { color: #6cb0f6; }
</style>
</head>
<body>
<div class="title-bar">어깨 퇴행성 관절염</div>
<div class="date">2015년 2월 15일 일요일</div>
<div class="board" id="board"></div>
<div class="toolbar">
  <button onclick="addTextCard()">+ 텍스트</button>
  <button onclick="addImageCard()">+ 이미지</button>
  <button onclick="saveBoard()">💾 저장</button>
  <button onclick="resetLayout()">↺ 재배치</button>
  <span class="status" id="status">Ready</span>
</div>
<script>
const SAVE_KEY = 'board-어깨-퇴행성-관절염';
const IMG_BASE = '../../attachments/';
const DEFAULT_CARDS = [
  {
    "type": "text",
    "content": "어깨 퇴행성 관절염<br>\t\t<br>\t\t<br>\t<br>\t<br>\t\t<br>\t\t\t<br>+석회근염<br>\t\t\t<br><br>\t\t\t<br><a href=\"http://www.heraldcity.co.kr/news/view/40451\" target=\"_blank\">http://www.heraldcity.co.kr/news/view/40451</a><br>\t\t\t<br><br>\t\t\t<br><a href=\"http://www.hankyung.com/news/app/newsview.php?aid=201502032244a\" target=\"_blank\">http://www.hankyung.com/news/app/newsview.php?aid=201502032244a</a><br>\t\t\t<br><br>\t\t\t<br>연세튼튼정형외과<br>\t\t\t<br>연세건우병원: 서울 관악구 <a href=\"http://navercast.naver.com/magazine_contents.nhn?rid=1089&contents_id=129051\" target=\"_blank\">http://navercast.naver.com/magazine_contents.nhn?rid=1089&contents_id=129051</a><br>\t\t\t<br>이춘택병원 : 수원<br>\t\t\t<br>여수 백병원 : 여수<br>\t\t\t<br>광주 새나래병원 : 광주<br>\t\t\t<br><br>\t\t\t<br>어깨 퇴행성 관절염은 초기에는 약물치료, 물리치료, 보조기 사용 등 비수술적 방법을 시도해 볼 수 있다. 그러나, 이러한 방법으로도 증상이 지속되거나 중기 이후의 관절염에는 관절내시경을 통해 세척술을 해주거나 미세 천공술 등으로 연골 성분의 재생을 시도해 볼 수 있지만, 골의 변형이 일어나서 관절운동 범위의 제한과 통증이 심한 경우에는 어깨의 인공관절 치환술을 고려해야 한다.&#160;<br>\t\t\t<br><br>\t\t\t<br>어깨 퇴행성 관절염 환자가 늘어나면서 인공관절 치환술을 받은 환자도 늘어나고 있다. 건강보험 심사평가원 자료에 따르면 2009년 어깨 인공관절 수술을 받은 환자는 77명에 불과했지만 2010년에는 144명, 2011년에는 178명으로 그 숫자가 급증하고 있는 것으로 나타났다.&#160;<br>\t\t\t<br><br>\t\t\t출처: <<a href=\"http://www.bokuennews.com/news/article.html?no=60125\" target=\"_blank\">http://www.bokuennews.com/news/article.html?no=60125</a>> <br>\t\t\t<br><br>\t\t\t<br>▶비수술 치료법으로 재활=대부분의 어깨 질환은 비수술적인 보존적 치료로 치료가 가능하고 일부에서만 수술적 치료를 한다. 치료 시기가 중요하며, 조기에 발견된 어깨 질환은 대부분 보존적 치료를 한다.&#160;<br>\t\t\t<br><br>\t\t\t<br>비수술 치료에는 휴식, 약물, 주사, 체외충격파치료, 물리치료, 운동요법이 있다. 이 중 가장 중요한 것은 운동 치료이다. 통증 완화 후 궁극적인 어깨 기능 회복이 목적이다. 이를 위해서는 3개월에서 6개월 정도, 길게는 1년까지의 전문적인 운동재활치료가 필요하다. 무리한 운동은 피하고 초기에는 관절 회복을 위해서 간단한 운동을 하는 것이 좋다.<br>\t\t\t<br><br>\t\t\t출처: <<a href=\"http://news.heraldcorp.com/view.php?ud=20160331000588&md=20160403003842_BL\" target=\"_blank\">http://news.heraldcorp.com/view.php?ud=20160331000588&md=20160403003842_BL</a>> <br>\t\t\t<br><br>\t\t\t<br>어깨 통증은 인대와 근육의 기능이 온전치 못해 어깨 관절이 불안정하여 생기게 됩니다.<br>\t\t\t<br>보통의 어깨 통증은 비수술적 치료로도 많이 좋아질 수 있으나<br>\t\t\t<br>운동이나 생활상의 습관 등 여러 가지 원인으로 인해 심하게 손상되고 파열될 수 있습니다.<br>\t\t\t<br>이렇게&#160;손상된 어깨 관절면을 인공물로 대체하는 것이 어깨 인공관절수술입니다.",
    "w": 400
  },
  {
    "type": "image",
    "src": "1d21455c91.png",
    "alt": "어깨 퇴행성 관절염",
    "w": 220
  },
  {
    "type": "text",
    "content": "&#160;<br>\t\t\t<br>어깨 인공관절수술이 필요한 경우는 비수술적 치료로 효과를 보지 못하는 경우,<br>\t\t\t<br>통증 또는 활동 범위의 축소 등으로 생활에 큰 불편이 있는 경우 등이 있습니다.<br>\t\t\t<br>어깨에 인공관절을 삽입하는 것은 관절염의 마지막 단계에 있는<br>\t\t\t<br>치료법이므로 여러 정보를 숙지하고 고심하여야 합니다.<br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br>1. 회전근개 파열 관절병증&#160;:&#160; 심하게 파열된 부위를 치료하지 않은 경우,<br>\t\t\t<br>관절면에 손상이 발생할 수 있습니다.<br>\t\t\t<br>상완골이 원래 위치보다 위쪽에 자리를 잡거나, 팔을 들어올리지 못할 수 있습니다.<br>\t\t\t<br><br>\t\t\t<br>2. 류마티스 관절염&#160;: 원인을 알 수 없는 염증 질환으로,<br>\t\t\t<br>염증이 연골과 뼈로 점점 번져 결국에는 몸 전체에 있는 관절이 변하고 파괴됩니다.<br>\t\t\t<br>류마티스 관절염을 겪고 있는 환자 중 90%가 어깨 관절에 문제를 겪고 있습니다.<br>\t\t\t<br><br>\t\t\t<br>3. 퇴행성 관절염&#160;: 한국인 중 약 16%가 어깨에 퇴행성 관절염을 겪고 있습니다.<br>\t\t\t<br><br>\t\t\t<br>4. 근위 상완근 복합 골절&#160;: 복합 골절로 인해 뼈 손상이 심해 치료가 어렵습니다.",
    "w": 400
  },
  {
    "type": "image",
    "src": "f43f12ea52.png",
    "alt": "어깨 퇴행성 관절염",
    "w": 220
  },
  {
    "type": "text",
    "content": "&#160;<br>\t\t\t<br>어깨 인공관절수술의 종류는 인공관절 반치환술,<br>\t\t\t<br>인공관절 전치환술, 역행성 인공관절 치환술이 있습니다.<br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br>1. 인공관절 반치환술&#160;: 견갑골 관절, 팔 위쪽에 있는 뼈가<br>\t\t\t<br>복합 골절이나 손상이 되지 않은 관절염에 해당됩니다.<br>\t\t\t<br><br>\t\t\t<br>2. 인공관절 전치환술&#160;: 관절염 (퇴행성, 류마티스, 외상성)이<br>\t\t\t<br>상완골 두와 견갑골 관절 손상을 일으키는 경우나 뼈가 괴사 했을 때 등이 해당됩니다.<br>\t\t\t<br><br>\t\t\t<br>3. 역행성 인공관절 치환술&#160;: 뼈가 잘 붙지 않는 고령의 환자, 회전근개 관절병증,<br>\t\t\t<br>회전근개가 없는 특수한 경우,&#160;기존 인공관절이 수명을 다하여<br>\t\t\t<br>교체해야 하는 경우 등이 해당됩니다.<br>\t\t\t<br>&#160;<br>\t\t\t<br><br>\t\t\t<br>어깨&#160;인공관절 치환술은 다른 수술에 비해&#160;합병증이 높습니다.<br>\t\t\t<br>때문에 수술 후에도 전문의와 함께 치료 부위를&#160;지속적으로 관리해야 합니다.<br>\t\t\t<br>단계별 재활 과정을 잘 거치면 6개월 후에는 스포츠 활동도 가능합니다.<br>\t\t\t<br>&#160;통증 감소를 넘어&#160;삶의 질적 향상을 도모할 수 있습니다.<br>\t\t\t<br>[출처]&#160;[어깨 인공관절수술의 종류와 수술이 필요한 경우 (분당판교 따라잡기 [분당맘&판교맘들의 신나는세상])](<a href=\"http://cafe.naver.com/2008bunsamo/626740)&#160;|작성자&#160;\" target=\"_blank\">http://cafe.naver.com/2008bunsamo/626740)&#160;|작성자&#160;</a><a href=\"http://cafe.naver.com/2008bunsamo.cafe?iframe_url=/CafeMemberNetworkView.nhn%3Fm=view%26memberid=sshinann\" target=\"_blank\">서울석병원</a><br>\t\t\t<br><br>\t\t\t출처: <<a href=\"http://cafe.naver.com/ArticleRead.nhn?articleid=626740&sc=95e7d0e2d97207b35c7ffe266b5712c2a56bccf&query=%BE%EE%B1%FA%C5%F0%C7%E0%BC%BA%B0%FC%C0%FD%BF%B0+%BA%F1%BC%F6%BC%FA%C0%FB&onSearchHighLight=true&where=search&clubid=15194989\" target=\"_blank\">http://cafe.naver.com/ArticleRead.nhn?articleid=626740&sc=95e7d0e2d97207b35c7ffe266b5712c2a56bccf&query=%BE%EE%B1%FA%C5%F0%C7%E0%BC%BA%B0%FC%C0%FD%BF%B0+%BA%F1%BC%F6%BC%FA%C0%FB&onSearchHighLight=true&where=search&clubid=15194989</a>>",
    "w": 400
  }
];

let cards = [];
let moving = null, resizing = null;

function loadBoard() {
  const saved = localStorage.getItem(SAVE_KEY);
  cards = saved ? JSON.parse(saved) : DEFAULT_CARDS.map(c => ({...c}));
  renderCards();
  if (!saved) autoLayout();
}

function autoLayout() {
  const GAP = 14;
  const boardW = document.getElementById('board').offsetWidth;
  const cols = Math.max(1, Math.floor(boardW / 280));
  const colW = (boardW - GAP * (cols - 1)) / cols;
  const colHeights = new Array(cols).fill(0);
  const allCards = document.querySelectorAll('.card');
  const images = document.querySelectorAll('.card img');
  let loaded = 0;
  const total = images.length;

  function place() {
    allCards.forEach((el, i) => {
      const card = cards[i];
      const w = Math.min(card.w || colW, colW);
      let minCol = 0;
      for (let c = 1; c < cols; c++) if (colHeights[c] < colHeights[minCol]) minCol = c;
      card.x = minCol * (colW + GAP);
      card.y = colHeights[minCol];
      card.w = w;
      el.style.left = card.x + 'px';
      el.style.top = card.y + 'px';
      el.style.width = w + 'px';
      colHeights[minCol] = card.y + el.offsetHeight + GAP;
    });
    document.getElementById('board').style.minHeight = Math.max(...colHeights) + 100 + 'px';
    saveBoard();
  }

  if (total === 0) requestAnimationFrame(place);
  else images.forEach(img => {
    if (img.complete) { loaded++; if (loaded >= total) requestAnimationFrame(place); }
    else img.onload = img.onerror = () => { loaded++; if (loaded >= total) requestAnimationFrame(place); };
  });
}

function syncText() {
  document.querySelectorAll('.card').forEach(el => {
    const idx = +el.dataset.idx;
    if (cards[idx]?.type === 'text') {
      const t = el.querySelector('.text');
      if (t) cards[idx].content = t.innerHTML;
    }
  });
}

function saveBoard() {
  syncText();
  localStorage.setItem(SAVE_KEY, JSON.stringify(cards));
  document.getElementById('status').textContent = '저장됨 ' + new Date().toLocaleTimeString();
}

function renderCards() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  cards.forEach((card, i) => {
    const el = document.createElement('div');
    el.className = 'card';
    el.dataset.idx = i;
    if (card.x !== undefined) el.style.left = card.x + 'px';
    if (card.y !== undefined) el.style.top = card.y + 'px';
    if (card.w) el.style.width = card.w + 'px';

    el.addEventListener('mousedown', e => {
      if (e.target.closest('.text, a, .card-btn, .resize-handle, table')) return;
      e.preventDefault();
      moving = { idx: i, startX: e.clientX, startY: e.clientY, origX: card.x || 0, origY: card.y || 0 };
      el.classList.add('moving');
    });

    const actions = document.createElement('div');
    actions.className = 'card-actions';
    const delBtn = document.createElement('button');
    delBtn.className = 'card-btn'; delBtn.textContent = '×';
    delBtn.onclick = e => { e.stopPropagation(); if (confirm('삭제?')) { cards.splice(i, 1); renderCards(); saveBoard(); } };
    actions.appendChild(delBtn);
    el.appendChild(actions);

    if (card.type === 'text') {
      const text = document.createElement('div');
      text.className = 'text';
      text.contentEditable = true;
      text.innerHTML = card.content || '';
      text.addEventListener('blur', () => { card.content = text.innerHTML; saveBoard(); });
      el.appendChild(text);
    } else if (card.type === 'image') {
      const src = card.src.startsWith('http') || card.src.startsWith('data:') ? card.src : IMG_BASE + card.src;
      const img = document.createElement('img');
      img.src = src;
      img.alt = card.alt || '';
      img.loading = 'lazy';
      img.onerror = () => img.style.display = 'none';
      if (card.link) {
        const a = document.createElement('a'); a.href = card.link; a.target = '_blank';
        a.appendChild(img); el.appendChild(a);
      } else { el.appendChild(img); }
      if (card.caption) {
        const cap = document.createElement('div');
        cap.className = 'caption';
        cap.textContent = card.caption;
        el.appendChild(cap);
      }
    } else if (card.type === 'table') {
      const wrapper = document.createElement('div');
      wrapper.style.overflowX = 'auto';
      wrapper.innerHTML = card.html || '';
      el.appendChild(wrapper);
    }

    const rh = document.createElement('div');
    rh.className = 'resize-handle';
    rh.addEventListener('mousedown', e => {
      e.preventDefault(); e.stopPropagation();
      resizing = { idx: i, startX: e.clientX, startW: card.w || el.offsetWidth };
    });
    el.appendChild(rh);
    board.appendChild(el);
  });

  requestAnimationFrame(() => {
    let maxBottom = 0;
    document.querySelectorAll('.card').forEach(el => {
      const b = (parseFloat(el.style.top) || 0) + el.offsetHeight;
      if (b > maxBottom) maxBottom = b;
    });
    board.style.minHeight = (maxBottom + 100) + 'px';
  });
}

document.addEventListener('mousemove', e => {
  if (moving) {
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`);
    if (!el) return;
    const nx = moving.origX + e.clientX - moving.startX;
    const ny = moving.origY + e.clientY - moving.startY;
    el.style.left = nx + 'px';
    el.style.top = ny + 'px';
  }
  if (resizing) {
    const card = cards[resizing.idx];
    card.w = Math.max(100, resizing.startW + e.clientX - resizing.startX);
    const el = document.querySelector(`.card[data-idx="${resizing.idx}"]`);
    if (el) el.style.width = card.w + 'px';
  }
});

document.addEventListener('mouseup', e => {
  if (moving) {
    const card = cards[moving.idx];
    card.x = Math.max(0, moving.origX + e.clientX - moving.startX);
    card.y = Math.max(0, moving.origY + e.clientY - moving.startY);
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`);
    if (el) { el.classList.remove('moving'); }
    moving = null; saveBoard();
  }
  if (resizing) { resizing = null; saveBoard(); }
});

function addTextCard() {
  cards.push({ type: 'text', content: '', x: 50, y: window.scrollY + 100, w: 300 });
  renderCards();
  setTimeout(() => { const els = document.querySelectorAll('.card .text'); els[els.length - 1]?.focus(); }, 100);
}

function addImageCard() {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = 'image/*';
  input.onchange = e => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = () => { cards.push({ type: 'image', src: reader.result, x: 50, y: window.scrollY + 100, w: 240 }); renderCards(); saveBoard(); };
    reader.readAsDataURL(file);
  };
  input.click();
}

function resetLayout() {
  if (!confirm('자동 재배치합니다. 현재 위치가 변경됩니다.')) return;
  cards.forEach(c => { delete c.x; delete c.y; });
  renderCards(); autoLayout();
}

setInterval(saveBoard, 30000);
loadBoard();
</script>
</body>
</html>
