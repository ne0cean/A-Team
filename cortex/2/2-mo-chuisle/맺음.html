* { margin: 0; padding: 0; box-sizing: border-box; }
body {

a { color: #6cb0f6; text-decoration: none; }

  background: #3a3a5c;
  display: inline-block;
  padding: 6px 16px;
  font-size: 22px;
  font-weight: bold;
  color: #fff;
  margin-bottom: 4px;
}
.date { color: #999; font-size: 13px; margin-bottom: 20px; }
.board { position: relative; }
.card {
  background: #2a2a2a;
  border: 1px solid #3a3a3a;
  border-radius: 8px;
  padding: 12px;
  position: absolute;
  cursor: grab;
  transition: box-shadow 0.15s;
  overflow: hidden;
}
.card:hover { box-shadow: 0 0 0 1px #58a6ff; z-index: 10; }
.card.moving { opacity: 0.8; box-shadow: 0 4px 24px rgba(0,0,0,0.6); z-index: 100; cursor: grabbing; }
.card img { width: 100%; border-radius: 4px; display: block; }
.card .caption { font-size: 12px; color: #888; margin-top: 6px; }
.card .text { outline: none; min-height: 20px; white-space: pre-wrap; word-break: break-word; }
.card .text:focus { background: rgba(255,255,255,0.05); border-radius: 4px; padding: 4px; }
.card .text:empty::before { content: '텍스트 입력...'; color: #555; }
.card table { border-collapse: collapse; width: 100%; font-size: 13px; }
.card table td, .card table th { border: 1px solid #444; padding: 4px 8px; vertical-align: top; }
.card table th { background: #333; color: #ccc; }
.card-actions { position: absolute; top: 4px; right: 4px; display: none; gap: 4px; }
.card:hover .card-actions { display: flex; }
.card-btn { background: #333; border: 1px solid #555; color: #ccc; border-radius: 4px; padding: 2px 6px; font-size: 11px; cursor: pointer; }
.card-btn:hover { background: #444; color: #fff; }
.resize-handle { position: absolute; bottom: 0; right: 0; width: 16px; height: 16px; cursor: se-resize; opacity: 0; }
.card:hover .resize-handle { opacity: 0.6; }
.resize-handle::after { content: ''; position: absolute; bottom: 3px; right: 3px; width: 8px; height: 8px; border-right: 2px solid #666; border-bottom: 2px solid #666; }
.toolbar { position: fixed; bottom: 0; left: 0; right: 0; background: #161b22; border-top: 1px solid #30363d; padding: 8px 20px; display: flex; gap: 12px; align-items: center; z-index: 200; }
.toolbar button { background: #21262d; border: 1px solid #30363d; color: #e0e0e0; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; }
.toolbar button:hover { background: #30363d; }
.toolbar .status { color: #8b949e; font-size: 12px; margin-left: auto; }
.highlight-red { color: #ff6b6b; }
.highlight-blue { color: #6cb0f6; }
</style>

  {
    "type": "text",
    "content": "- 더 높은 가격으로 하면 어떨거 같나<br>\t\t\t\t\t<br>- 매칭의 기준은 몇 회 만남인가<br>\t\t\t\t<br>\t\t\t\t<br><br>\t\t\t\t<br>소개팅 vs 중매 vs 온라인, 입맛대로 골라라<br>\t\t\t\t<br>결혼정보회사에 대한 환상을 버렸다면, 앞에서 말한 것처럼 이곳은 기회의 땅이다. 친구가 해주는 것 같은 소개팅을 하고 싶다면 듀오에 가입할 것을 추천한다. 가입을 하면 정해진 횟수에 따라 매니저가 추천한 프로필을 받아 서로 오케이하면 만남이 이루어지는 방식이다. 문제는 자기 검열이 까다롭거나 시간적인 여유가 없는 사람은 아무리 프로필을 많이 봐도 한번 만나기가 쉽지 않다는 것. 메일로 프로필을 확인하는 것을 번거롭게 여기지 않고, 오픈 마인드의 소유자가 듀오의 서비스에 적합하다. 부모 상담이 유독 많은 닥스클럽은 집에서 해주는 중매 느낌이 강하다. 집안 환경과 성향을 유독 중요하게 생각하며 VIP 서비스가 굉장히 세분화되어 있다. 매니저의 비중도 굉장히 크다. 만남 전 미리 얼굴을 공개하는 다른 회사와 달리, 닥스클럽은 절대 사진을 공개하지 않아 자신이 결혼정보회사에 가입했다는 사실이 알려질 부담은 적다. 단, 내가 원하는 상대와 부모가 원하는 상대가 달라 트러블이 생길 수도 있다. 세 곳 중 가장 오래된 선우는 온라인 매칭이 유명하다. 역발상으로 온라인의 취약점인 불분명한 신원은 확실하게 보장하되, 검색을 통해 쉽게 원하는 상대를 찾을 수 있으며 저렴하다는 것이 장점이다. <br>\t\t\t\t<br><br>\t\t\t\t<br><br>\t\t\t\t<br>- 현재 일하고 있는 곳의 좋은 점은?<br>\t\t\t\t<br>        둘째, 마케팅이 전공인 나로써는 지금 소속된 팀의 데이터분석 스페셜리스트들에게 배우는 점이 참 많아.<br>\t\t\t\t<br>       그리고 무엇보다, 나보다 똑똑하고 나이스한 사람들과 일할 수 있다는 것만큼 큰 프라이드도 없지<br>\t\t\t\t<br>\t\t\t\t\t<br>- 평소 취미나 스트레스를 푸는 방법은<br>\t\t\t\t\t<br>[취미] 내 생활을 이루는 두 가지 축은 매일 하는 운동과 읽고 쓰는 일 이 두 가지야. 그 자체로 즐길 수도 있지만, 이 두 가지 지루한 취미는 삶을 이루는 많은 것들을 즐길 수 있는 도구가 되니까.<br>\t\t\t\t\t<br>[스트레스 해소]<br>\t\t\t\t\t<br>대화하는 걸 좋아해서, 주로 커피나 술을 앞에 두고 사람들과 이야길 해, 하지만 혼자 있게 된다면 산책을 하거나 운동을 하고, 집에 있을 때는 청소나 설거지를 해.<br>\t\t\t\t<br>\t\t\t\t<br><br>\t\t\t\t<br>- 스스로가 가장 매력있게 느껴지는 순간은?<br>\t\t\t\t<br>        내가 하는 프리젠테이션의 특징을 딱 하나만 꼽으라면(어렵네 하하;;) 유머와 위트야. 내 성공적인 발표의 지표는 모든 청충이 한번 이상 웃게 하는 거야. 그리고 그들의 웃는 모습에 비친 나는, 내가 아는 가장 멋진 나일걸.<br>\t\t\t\t<br>\t\t\t\t\t<br>- 다정다감패밀리, 엘리트패밀리, 뼈대있는패밀리, 리치패밀리.<br>\t\t\t\t\t<br>리치의 의미가 재정적인 것에 국한 되지 않는다면, 우리는 단연 리치패밀리야.<br>\t\t\t\t\t<br>왕년에 어깨에 힘깨나 주셨다는 아버지가 우리에게 물려주신 자신감. 수재소리 들었던 어머니가 물려주신 지적 호기심. 거기에 수완 좋고 정 많은 동생 녀석까지. 각자의 매력과 끈끈한 유대가 넘치는 리치 패밀리지.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>- 내가 생각하는 행복한 가정이나 연애는<br>\t\t\t\t\t<br>연애는 삶의 가장 달달한 면을 함께하는 일이고, 결혼은 생활의 민낯을 마주하는 일이라고 생각해. 이 닮은 듯 다른 두 가지를 관통하는 가장 중요한 힘은 우정이라고 생각해. 동등한 인격으로써의 서로를 인정하면서도, 긍정적인 자극과 영향력이 줄 수 있는 것. 그게 지속 가능한 행복의 원천 아닐까. 그래서 난 흔히들 '매력'이나 '사랑스러움', '생기' 등으로 부르는 그 사람 고유의 에너지를 굉장히 중요하게 생각해.<br>\t\t\t\t<br>\t\t\t\t<br><br>\t\t\t<br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br>첫째, 탄탄한 비즈니스 모델을 바탕으로 한 보상체계와 복지. 그것을 기반으로 개인의 지속적인 성장을 꾀할 수 있다는 점.<br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t<br>\t\t<br>\t\t\t<br><br>\t\t\t<br>내 자소서 보내주기<br>\t\t\t<br>안은민 팀장 견적 뽑아보기<br>\t\t\t<br><br>\t\t\t<br>이부노<br>\t\t\t<br>정성 : 유머<br>\t\t\t<br><br>\t\t\t<br>이상형<br>\t\t\t<br>ᄋ 나이 : 28~30<br>\t\t\t<br>ᄋ 학력 : 서성한 이상<br>\t\t\t<br>ᄋ 직업 : <br>\t\t\t<br>ᄋ 종교 : 너무 신실한 기독교인 제외<br>\t\t\t<br>ᄋ 키 : 164~170<br>\t\t\t<br>ᄋ 외모 : 제니퍼 로랜스, 엄지원, <br>\t\t\t<br>ᄋ 가정환경 : 결손가정 X<br>\t\t\t<br>ᄋ 성향 : 유머러스<br>\t\t\t<br>ᄋ 가치관 :<br>\t\t\t<br>   - 튤립 참고<br>\t\t\t<br><br>\t\t\t<br>1. 회원 가입 후 만남이 미 실시된 단계에서의 계약해지 : 가입비에서 디렉팅 비용(20%)를 제외한 80%를 환불합니다.<br>\t\t\t<br> 단,  MAEZEUM 이 제시한 만남 상대 프로필에 대하여 회원이 동의하고 미팅 약속을 잡은 후 미팅 당일 취소 건은 미팅 횟수1회 차감을 원칙으로 합니다.<br>\t\t\t<br><br>\t\t\t<br> 2. 1회 이상의 미팅 실시 후 계약해지 : 회비의 80% X (미팅 잔여 횟수/총 미팅횟수)로 계산하여 지불합니다.<br>\t\t\t<br><br>\t\t\t<br>Q.<br>\t\t\t<br>작년 견적을 확인해보니 같은조건에,<br>\t\t\t<br>158만원 이었다.<br>\t\t\t<br>나는 학벌을 본다. 기준이 높다.<br>\t\t\t<br>그렇다고 다른걸 안보는 것도 아니다.<br>\t\t\t<br>까다롭다. 비슷한 사람끼리 매칭을 시키는 것인데, 나 같은 경우 난이도가 높다.<br>\t\t\t<br>가능하겠느냐. 그게 아니면 그냥 동기들이 해주는 소개팅을 하는게 나한테는 맞는 선택이다.<br>\t\t\t<br>이 조건으로 매칭이 어려우면, 매니저님도 힘들다. 한번 더 생각해보고 말씀해주시라.<br>\t\t\t<br>1. 위 조건 맞출 수 있겠는지<br>\t\t\t<br> - 남자 학벌에 가중치를 크게 두지 않는<br>\t\t\t<br>2. 상위 레벨로 가입하면 가능할지<br>\t\t\t<br>3. 접근 가능한 풀이 얼마나 되는지<br>\t\t\t<br>\t\t\t\t<br>- 여자쪽 오퍼가 오는경우 횟수차감?<br>\t\t\t\t<br>- 매칭프로세스<br>\t\t\t<br>\t\t<br>\t\t<br>\t\t\t<br>[이상형]<br>\t\t\t<br>\t\t\t\t<br>- 성격 : 유머/센스, 사려깊은, 에너제틱한 <br>\t\t\t\t<br>- 나이 : 27~30 <br>\t\t\t\t<br>- 키 : 164~170, <br>\t\t\t\t<br>- 외모 : 단아한, 우하한, 피부 좋은<br>\t\t\t\t<br>- 직업 : 커리어에 대한 애착이 있는분<br>\t\t\t\t<br>대기업(메이저 그룹사) 혹은 외국계 <br>\t\t\t\t<br>- 학벌 : 서성한 이상<br>\t\t\t<br>\t\t\t<br><br>\t\t\t<br>[기피하는 성향]<br>\t\t\t<br>\t\t\t\t<br>- 성격 : 염세적이거나 인생의 목표가 없는<br>\t\t\t\t<br>- 종교 : 너무 신실한 기독교인<br>\t\t\t\t<br>- 음주 : 술을 전혀 못하시는 분<br>\t\t\t\t<br>- 직업 : 영업/서비스직(감정노동) 종사자, 초등교사<br>\t\t\t\t<br>- 외모 : 너무 마른, 성형 X<br>\t\t\t\t<br>- 흡연자<br>\t\t\t\t<br>- 결손가정<br>\t\t\t<br>\t\t\t<br><br>\t\t\t<br><a href=\"http://scienceoflove.co.kr/%EB%A7%8C%EB%82%A8/%EB%88%84%EA%B5%AC%EB%9E%91-%EC%97%B0%EC%95%A0%ED%95%98%EC%A7%80/%EB%82%A8%EC%9E%90%EB%8A%94-%EB%8A%A5%EB%A0%A5-%EC%97%AC%EC%9E%90%EB%8A%94-%EC%99%B8%EB%AA%A8%EB%9D%BC%EB%8A%94-%EB%A7%90%EC%9D%84-%EA%B2%80%EC%A6%9D%ED%95%B4%EB%B3%B4%EC%9E%90/\" target=\"_blank\">남자는 외모, 여자는 능력</a>",
    "w": 400
  }
];

let cards = [];
let moving = null, resizing = null;

function loadBoard() {
  const saved = localStorage.getItem(SAVE_KEY);
  cards = saved ? JSON.parse(saved) : DEFAULT_CARDS.map(c => ({...c}));
  renderCards();
  if (!saved) autoLayout();
}

function autoLayout() {
  const GAP = 14;
  const boardW = document.getElementById('board').offsetWidth;
  const cols = Math.max(1, Math.floor(boardW / 280));
  const colW = (boardW - GAP * (cols - 1)) / cols;
  const colHeights = new Array(cols).fill(0);
  const allCards = document.querySelectorAll('.card');
  const images = document.querySelectorAll('.card img');
  let loaded = 0;
  const total = images.length;

  function place() {
    allCards.forEach((el, i) => {
      const card = cards[i];
      const w = Math.min(card.w || colW, colW);
      let minCol = 0;
      for (let c = 1; c < cols; c++) if (colHeights[c] < colHeights[minCol]) minCol = c;
      card.x = minCol * (colW + GAP);
      card.y = colHeights[minCol];
      card.w = w;
      el.style.left = card.x + 'px';
      el.style.top = card.y + 'px';
      el.style.width = w + 'px';
      colHeights[minCol] = card.y + el.offsetHeight + GAP;
    });
    document.getElementById('board').style.minHeight = Math.max(...colHeights) + 100 + 'px';
    saveBoard();
  }

  if (total === 0) requestAnimationFrame(place);
  else images.forEach(img => {
    if (img.complete) { loaded++; if (loaded >= total) requestAnimationFrame(place); }
    else img.onload = img.onerror = () => { loaded++; if (loaded >= total) requestAnimationFrame(place); };
  });
}

function syncText() {
  document.querySelectorAll('.card').forEach(el => {
    const idx = +el.dataset.idx;
    if (cards[idx]?.type === 'text') {
      const t = el.querySelector('.text');
      if (t) cards[idx].content = t.innerHTML;
    }
  });
}

function saveBoard() {
  syncText();
  localStorage.setItem(SAVE_KEY, JSON.stringify(cards));
  document.getElementById('status').textContent = '저장됨 ' + new Date().toLocaleTimeString();
}

function renderCards() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  cards.forEach((card, i) => {
    const el = document.createElement('div');
    el.className = 'card';
    el.dataset.idx = i;
    if (card.x !== undefined) el.style.left = card.x + 'px';
    if (card.y !== undefined) el.style.top = card.y + 'px';
    if (card.w) el.style.width = card.w + 'px';

    el.addEventListener('mousedown', e => {
      if (e.target.closest('.text, a, .card-btn, .resize-handle, table')) return;
      e.preventDefault();
      moving = { idx: i, startX: e.clientX, startY: e.clientY, origX: card.x || 0, origY: card.y || 0 };
      el.classList.add('moving');
    });

    const actions = document.createElement('div');
    actions.className = 'card-actions';
    const delBtn = document.createElement('button');
    delBtn.className = 'card-btn'; delBtn.textContent = '×';
    delBtn.onclick = e => { e.stopPropagation(); if (confirm('삭제?')) { cards.splice(i, 1); renderCards(); saveBoard(); } };
    actions.appendChild(delBtn);
    el.appendChild(actions);

    if (card.type === 'text') {
      const text = document.createElement('div');
      text.className = 'text';
      text.contentEditable = true;
      text.innerHTML = card.content || '';
      text.addEventListener('blur', () => { card.content = text.innerHTML; saveBoard(); });
      el.appendChild(text);
    } else if (card.type === 'image') {
      const src = card.src.startsWith('http') || card.src.startsWith('data:') ? card.src : IMG_BASE + card.src;
      const img = document.createElement('img');
      img.src = src;
      img.alt = card.alt || '';
      img.loading = 'lazy';
      img.onerror = () => img.style.display = 'none';
      if (card.link) {
        const a = document.createElement('a'); a.href = card.link; a.target = '_blank';
        a.appendChild(img); el.appendChild(a);
      } else { el.appendChild(img); }
      if (card.caption) {
        const cap = document.createElement('div');
        cap.className = 'caption';
        cap.textContent = card.caption;
        el.appendChild(cap);
      }
    } else if (card.type === 'table') {
      const wrapper = document.createElement('div');
      wrapper.style.overflowX = 'auto';
      wrapper.innerHTML = card.html || '';
      el.appendChild(wrapper);
    }

    const rh = document.createElement('div');
    rh.className = 'resize-handle';
    rh.addEventListener('mousedown', e => {
      e.preventDefault(); e.stopPropagation();
      resizing = { idx: i, startX: e.clientX, startW: card.w || el.offsetWidth };
    });
    el.appendChild(rh);
    board.appendChild(el);
  });

  requestAnimationFrame(() => {
    let maxBottom = 0;
    document.querySelectorAll('.card').forEach(el => {
      const b = (parseFloat(el.style.top) || 0) + el.offsetHeight;
      if (b > maxBottom) maxBottom = b;
    });
    board.style.minHeight = (maxBottom + 100) + 'px';
  });
}

document.addEventListener('mousemove', e => {
  if (moving) {
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`);
    if (!el) return;
    const nx = moving.origX + e.clientX - moving.startX;
    const ny = moving.origY + e.clientY - moving.startY;
    el.style.left = nx + 'px';
    el.style.top = ny + 'px';
  }
  if (resizing) {
    const card = cards[resizing.idx];
    card.w = Math.max(100, resizing.startW + e.clientX - resizing.startX);
    const el = document.querySelector(`.card[data-idx="${resizing.idx}"]`);
    if (el) el.style.width = card.w + 'px';
  }
});

document.addEventListener('mouseup', e => {
  if (moving) {
    const card = cards[moving.idx];
    card.x = Math.max(0, moving.origX + e.clientX - moving.startX);
    card.y = Math.max(0, moving.origY + e.clientY - moving.startY);
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`);
    if (el) { el.classList.remove('moving'); }
    moving = null; saveBoard();
  }
  if (resizing) { resizing = null; saveBoard(); }
});

function addTextCard() {
  cards.push({ type: 'text', content: '', x: 50, y: window.scrollY + 100, w: 300 });
  renderCards();
  setTimeout(() => { const els = document.querySelectorAll('.card .text'); els[els.length - 1]?.focus(); }, 100);
}

function addImageCard() {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = 'image/*';
  input.onchange = e => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = () => { cards.push({ type: 'image', src: reader.result, x: 50, y: window.scrollY + 100, w: 240 }); renderCards(); saveBoard(); };
    reader.readAsDataURL(file);
  };
  input.click();
}

function resetLayout() {
  if (!confirm('자동 재배치합니다. 현재 위치가 변경됩니다.')) return;
  cards.forEach(c => { delete c.x; delete c.y; });
  renderCards(); autoLayout();
}

setInterval(saveBoard, 30000);
loadBoard();
</script>
