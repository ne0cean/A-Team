    "type": "text",
    "content": "WARNING! 실제 상품과는 차이가&#160;있습니다.<br>\t\t\t<br>그렇다고, 데리고 다니기 부끄럽지는 않을 것이외다.<br>\t\t\t<br>칼 댄적 없는 자연흔남─엄빠가 안타까운 마음으로 보장함(아이고…)─한번 보면 쉽게 잊을 수 없고, 시비 걸 수 없는 예리하고 강한 인상. 광대역 어깨탑재.<br>\t\t\t<br>■ 건강상태<br>\t\t\t<br>고등학생시절 슬램덩크의 로망에 사로잡혀 트리플 악셀급 레이업슛을 시전하다 착지자세 불량으로 왼쪽 발목에 부상을 입었습니다. 의사로부터 (시작한적도 없는) 선수생활을 지속할 수 없다는 진단을 받고, 학업에 매진하려고 했으나 고2 때부터 게임과 본격 늦바람이 나는 바람에, 원하는 대학에 우수한 성격으로 합격하게 되었습니다.<br>\t\t\t<br>그 후 늘어난 인대 덕분에 악성 발목염좌 말기입니다만 이외의 하자는 맹세코 없습니다. 현재는 축구나 농구 등 발목에 회전력을 요하는 운동은 가급적 자제하고 있습니다.<br>\t\t\t<br>군 전역 1주년 기념으로 출전한 처녀 마라톤 대회에서 뭣도 모르고 풀코스 ─ 요리가 아닙니다!─를 완주했다가 오장육부를 토해낼 뻔 했지만 어쨌든 서브4로 완주한 강인한 정신력과 체력과 애교의 소유자 입니다. 현재도 연 2회 풀코스를 완주할 정도의 체력을 유지하고 있습니다.<br>\t\t\t<br>매해 받는 건강검진에서 신체나이는 20대를 유지하고 있으며, (선배들로부터) 건강식품 과다복용 진단을 받았고, 하루 1끼는 약으로 끼니를 해결한다고 할만큼 공격적으로 회사에 바친 몸뚱아리를 관리하고 있습니다. 현재는 흡연을 하지 않으며, 술은 주는 대로 다 먹습니다. (내가 취하면 니들이 힘들지 내가 힘들까)<br>\t\t\t<br>■ 지적능력<br>\t\t\t<br>이름만 대면 입이 떡 벌어지는 대학을 나온 것은 아니지만 우수한 성격으로 졸업 하였습니다. 학부장과 총장상을 각각 1회씩 수상한 경력이 있으며, 교수님들로부터 우수한 학생이자 어여쁜 제자로 평가받으며 학교생활을 마쳤습니다.<br>\t\t\t<br>일례로 10점만점의 레포트에 12점을 획득한 적이 있으며, 교환학생 시절에는 복수의 강의에서 100점 만점을 획득하였습니다. 군전역 이후로 학교를 다니지 않고 인턴과 대외활동으로 때웠음에도 졸업을 시켜준 학교와 교수님들께 깊이 감사하며, 학교도 나를 자랑스러워 하는거 같습디다. 경영학을 전공했는데 정작 경영할 회사를 학교에서 주진 않았습니다.<br>\t\t\t<br>중국의 대학에 7개월간 도피유학을 감행한적이 있어, 중국 여행 시 장기적출의 위협에서 자유로울 만큼의 중국어 구사가 가능합니다. 8개월 간의 인도여행 덕분에 인도어에 가까운 intonation을 개인기로 보유하고 있습니다.<br>\t\t\t<br>내가 사랑하는 조직의 장을 맡았었고, 없던 리더십도 생길 수 밖에 없는 요란한 조직이라 라다쉽이 쪼금 있는 편입니다. 특히 선배들이나 상사에 대해서도 리더십이 좀 강해서 욕을 맛있게 먹곤 합니다.&#160;“넌 싸가지는 없는데, 개념은 있어”는 것이 무려 1년차 때 들은 평가입니다.;;<br>\t\t\t<br>사실 일터에서 싸가지 없다는 포지션을 유지하는 것은 부단한 노력을 요하는 일입니다. 대저, 사람이란 “호이가 계속되면 둘리인줄” 알기 때문이죠. 화를 내서 일이 되거나, 더 빨리 될 것 같으면 화도 내는 편입니다. 어짜피 저보다 아랫사람이 없기 때문에 선배들한테;; 쓰고보니 정말 싸가지가… 없네요…;;<br>\t\t\t<br>■ 이성관<br>\t\t\t<br>저에게는 질문이 굉장히 중요한데, 반려자에 대한 기준을 수 년간 다듬으면서 (현 시점에서) 최종적으로 도달한 것이 아래의 세 가지 질문입니다.<br>\t\t\t<br>✓&#160;‘나’에겐 어떤 반려자가 필요한가<br>\t\t\t<br>- 내가 더 좋은 사람이 되고 싶기 만드는가?<br>\t\t\t<br>✓&#160;‘그녀’가 어떤 사람이었으면 하는가<br>\t\t\t<br>&#160;- 스스로 꾸려나가고 싶은 자신의 삶과 목표가 있는가?<br>\t\t\t<br>✓&#160;‘우리’의 관계는 어떠했으면 하는가<br>\t\t\t<br>&#160;- 그 어떤 일이 있어도 나를 굳게 믿어줄 수 있는가?<br>\t\t\t<br>그리고, 이런 건 만나봐야 알 수 있는 것이 더라구요.<br>\t\t\t<br>사실 이 장문의 글을 쓰게 된 이유이기도 합니다.<br>\t\t\t<br>이상형은 유머가 있고, 돈 버는 일이 아니어도 좋으니 자기가 사랑하는 일이 있으며, 예쁘기보단 사랑스러운 여성입니다. (여기서 유머는 웃기는 재주라기보다 유연한 시각과 영민함, 그리고 낙관적인 관점을 포괄합니다.) 많이 배운 여자보다는 ─ 학벌과 학력은 동의어가 아니니까요 ─ 사고력이 있는 여자, 외모는 또렷한 이목구비 아니어도 선이 고운 분이면 좋겠습니다. 아, 술도 조금은 하셨으면 합니다.<br>\t\t\t<br>제 손으로 집을 장만하기 전까지는 차를 구입할 뜻이 없으므로, 언제고 어느 때고 함께 손잡고 걸어주실 건강한 다리의 소유자를 선호합니다. *<a href=\"https://medium.com/@ne0cean/6%EA%B0%9C%EC%9D%98-%EA%B8%B0%EB%91%A5-2b71c4351b7#.wl2lgxy6g\" target=\"_blank\">차를 구매하지 않는 이유</a><br>\t\t\t<br>가장 중요한 것은, 여전히 성장에 대한 의지가 있고, 남편이나 가족만이 아닌 자신의 삶이 있는 여성이어야 한다는 것이며 이를 지켜드리기 위해 각종 가사 및 육아의 최전선에 설 것입니다. 가사 노동은 아내를 “돕는”게 아니라 원래 “같이” 해야 하는 것으로 보고 배워왔습니다. 내 아버지는 칠순을 넘긴 나이에도 각종 쓰레기 분리수거를 담당하시며, 겨울에는 어머니의 출근차량 예열 및 차내 공기 온도를 맞추는 서비스를 장기고객 혜택마냥 제공하고 계십니다. (그렇습니다. 그는 온동네 남편들의 적이자 주부들의 훈남, 미담의 주인공입니다.)<br>\t\t\t<br>가끔 카페에서 홀로 시간을 보내다보면 아주머니들의 이야기를 들어요 ─ 아, 의도한건 아니고 성량이 워낙에 크시니까;; ─ 그런데 가만히 듣다보면, 아들, 남편, 집안, 부동산, 새로산 무언가에 대한 이야기 속에서 “자기 자신”에 대한 이야기는 없더라구요. 물론 주부들의 헌신을 폄하하는 것은 아니지만, 우리 세대는 다르니까요. 누군가의 ‘누구’가 되는 것도 가치있는 일이지만, 나만의 ‘나’를 가진 사람. 나는 그런 독립적인 사람에게서 흡인력을 느껴요. 가끔은, 나보다 더 중요한 일이 있는 여자.<br>\t\t\t<br>내 여자에게 자신의 인생이 있었으면하고, 그 걸 지키기위해 최선을 다할겁니다. 설령, 그것을 위해서 내 커리어를 반납해야 한대도. (뭐 저 같은 녀석을 집안에 둔다고 집안 일만 하지는 않을 겁니다만 ㅋㅋㅋ)<br>\t\t\t<br>*설거지와 청소를 시켜보실 수 있는 기회를 교제 시작 후 M+3개월간 제공해 드립니다.<br>\t\t\t<br>*낮에도 밤에도 져드릴 용의가 있습니다.<br>\t\t\t<br>제가 그렇다고 외모를 안본다고 생각하신다면, 좀 서운합니다. 일단, 성형은 안 하신 분이면 좋겠습니다. 성형외과들이 성채 같은 빌딩을올리며 성업하는 나라에서, 한두달 월급이면 새 얼굴을 받을 수 있는 나라에서, 자기 자신을 인정하고 사랑하는, 심지를 지키며 자라온 여성이길 바랍니다. 자존감과 맞닿아있다고 생각하기 때문입니다.<br>\t\t\t<br>외모에 혹하는 남아이지만, 외모밖에 볼게 없는 사람에겐&#160;<br>\t\t\t<br>가중치 0을 곱합니다. (뭣이 중헌디)<br>\t\t\t<br>#얼굴 빼곤 볼 것 없는 트로피 와이프 #수상거부<br>\t\t\t<br>■ 직업관<br>\t\t\t<br>주 6일을 근무하는, 최첨단의 노동집약적 ICT기업에서 근무하며 높은 연봉 ─ 같으면서도 시급으로 환산하면 쥐꼬리인 월급 ─ 으로 생계를 이어가는 자수성가형 가낸뱅이 입니만 여전히 꿈은 없습니다. ─ 어릴적 꿈은 재벌 2세 였으나, 내가 이 나이 먹도록 아버지가 노력을 안합디다.─ 다만 목표가 있습니다.<br>\t\t\t<br>저는 무엇이 되었든 ‘만드는 것’이 참 좋아요. 지금은 하고 싶은 일을 하기 위해 할 수 있는 일을 하고 있는 단계이며 조만간 ‘만드는 일’을 하게 되기를 열망 & 준비하고 있습니다.<br>\t\t\t<br>현재 하는 일은 대단치 않지만 그렇다고 쉬이 오픈 할 일도 아니니 뵐 수 있다면, 그 때 설명 하는 것이 좋겠습니다. 월급받은 만큼 일을 해주지 않으면 그것도 도둑질이라는 생각으로 나름 성실하게 임하고 있습니다. 저보다 훨씬 똑똑한 선배들과 일한다는 것에 자부심을 느낍니다.<br>\t\t\t<br>■ 인생관<br>\t\t\t<br>인생은 아직 씌여지지 않은 책을 읽어나가는 것과 같다고 생각합니다. 인도에서의 8개월간 “왜 사는가?”라는 끊임없는 자문 속에서 얻은 해답은 그냥 간단했습니다. 호기심. “궁금하니까, 나의 내일이 궁금하니까” 그렇기에 아직까지도 가장 소중하게 생각하는 단어는 “성장”이며, 경험-성찰-실행 3가지의 선순환이 저를 성장 시킨다고 믿습니다.<br>\t\t\t<br>이미 충분히 느끼셨겠지만, 저는 허세라면 벌벌 떠는 그런 흔한 남자는 아닙니다.<br>\t\t\t<br>원 없이 허세를 부리되, 허세와 reality의 간극을 메우고자 늘 분투하는 사람입니다.<br>\t\t\t<br>나는 내가 순수하게 무언가를 갈망하되, 순진하지는 않길 바랍니다.<br>\t\t\t<br>나는 흰색이 되고 싶은 게 아니라, 투명했으면 하는 거에요.<br>\t\t\t<br>내 안에 무엇이 있든, 내가 보는 나와 다른 사람이 보는 내가 같길 바래요.<br>\t\t\t<br>살 수록 가벼운 삶, 그게 제가 원하는 삶의 모습입니다.<br>\t\t\t<br>— — — — — — — — — — — — — — — — — — —<br>\t\t\t<br>제법 긴 호홉의 글임에도 여기까지 재미있게 읽으셨습니까?<br>\t\t\t<br>나와 함께하는 일상이 이럴겁니다.<br>\t\t\t<br>실물을 바탕으로 재구성 된&#160;사진입니다.<br>\t\t\t<br>이 남자를 사랑하는 일은,<br>\t\t\t<br>그리 어려운 일은 아닙니다.<br>\t\t\t<br>*본 글의 무단 전제 및 배포를 허합니다.<br>\t\t\t<br>*본 글은 결혼정보회사 “듀오”의 “배우자 선택시 우선고려사항” 15가지 중 상위 8가지 요소에 준하여 작성되었습니다.<br>\t\t\t<br>1<br>\t\t\t[",

let moving = null, resizing = null;

function loadBoard() {
  const saved = localStorage.getItem(SAVE_KEY);
  cards = saved ? JSON.parse(saved) : DEFAULT_CARDS.map(c => ({...c}));
  renderCards();
  if (!saved) autoLayout();
}

function autoLayout() {
  const GAP = 14;
  const boardW = document.getElementById('board').offsetWidth;
  const cols = Math.max(1, Math.floor(boardW / 280));
  const colW = (boardW - GAP * (cols - 1)) / cols;
  const colHeights = new Array(cols).fill(0);
  const allCards = document.querySelectorAll('.card');
  const images = document.querySelectorAll('.card img');
  let loaded = 0;
  const total = images.length;

  function place() {
    allCards.forEach((el, i) => {
      const card = cards[i];
      const w = Math.min(card.w || colW, colW);
      let minCol = 0;
      for (let c = 1; c < cols; c++) if (colHeights[c] < colHeights[minCol]) minCol = c;
      card.x = minCol * (colW + GAP);
      card.y = colHeights[minCol];
      card.w = w;
      el.style.left = card.x + 'px';
      el.style.top = card.y + 'px';
      el.style.width = w + 'px';
      colHeights[minCol] = card.y + el.offsetHeight + GAP;
    });
    document.getElementById('board').style.minHeight = Math.max(...colHeights) + 100 + 'px';
    saveBoard();
  }

  if (total === 0) requestAnimationFrame(place);
  else images.forEach(img => {
    if (img.complete) { loaded++; if (loaded >= total) requestAnimationFrame(place); }
    else img.onload = img.onerror = () => { loaded++; if (loaded >= total) requestAnimationFrame(place); };
  });
}

function syncText() {
  document.querySelectorAll('.card').forEach(el => {
    const idx = +el.dataset.idx;
    if (cards[idx]?.type === 'text') {
      const t = el.querySelector('.text');
      if (t) cards[idx].content = t.innerHTML;
    }
  });
}

function saveBoard() {
  syncText();
  localStorage.setItem(SAVE_KEY, JSON.stringify(cards));
  document.getElementById('status').textContent = '저장됨 ' + new Date().toLocaleTimeString();
}

function renderCards() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  cards.forEach((card, i) => {
    const el = document.createElement('div');
    el.className = 'card';
    el.dataset.idx = i;
    if (card.x !== undefined) el.style.left = card.x + 'px';
    if (card.y !== undefined) el.style.top = card.y + 'px';
    if (card.w) el.style.width = card.w + 'px';

    el.addEventListener('mousedown', e => {
      if (e.target.closest('.text, a, .card-btn, .resize-handle, table')) return;
      e.preventDefault();
      moving = { idx: i, startX: e.clientX, startY: e.clientY, origX: card.x || 0, origY: card.y || 0 };
      el.classList.add('moving');
    });

    const actions = document.createElement('div');
    actions.className = 'card-actions';
    const delBtn = document.createElement('button');
    delBtn.className = 'card-btn'; delBtn.textContent = '×';
    delBtn.onclick = e => { e.stopPropagation(); if (confirm('삭제?')) { cards.splice(i, 1); renderCards(); saveBoard(); } };
    actions.appendChild(delBtn);
    el.appendChild(actions);

    if (card.type === 'text') {
      const text = document.createElement('div');
      text.className = 'text';
      text.contentEditable = true;
      text.innerHTML = card.content || '';
      text.addEventListener('blur', () => { card.content = text.innerHTML; saveBoard(); });
      el.appendChild(text);
    } else if (card.type === 'image') {
      const src = card.src.startsWith('http') || card.src.startsWith('data:') ? card.src : IMG_BASE + card.src;
      const img = document.createElement('img');
      img.src = src;
      img.alt = card.alt || '';
      img.loading = 'lazy';
      img.onerror = () => img.style.display = 'none';
      if (card.link) {
        const a = document.createElement('a'); a.href = card.link; a.target = '_blank';
        a.appendChild(img); el.appendChild(a);
      } else { el.appendChild(img); }
      if (card.caption) {
        const cap = document.createElement('div');
        cap.className = 'caption';
        cap.textContent = card.caption;
        el.appendChild(cap);
      }
    } else if (card.type === 'table') {
      const wrapper = document.createElement('div');
      wrapper.style.overflowX = 'auto';
      wrapper.innerHTML = card.html || '';
      el.appendChild(wrapper);
    }

    const rh = document.createElement('div');
    rh.className = 'resize-handle';
    rh.addEventListener('mousedown', e => {
      e.preventDefault(); e.stopPropagation();
      resizing = { idx: i, startX: e.clientX, startW: card.w || el.offsetWidth };
    });
    el.appendChild(rh);
    board.appendChild(el);
  });

  requestAnimationFrame(() => {
    let maxBottom = 0;
    document.querySelectorAll('.card').forEach(el => {
      const b = (parseFloat(el.style.top) || 0) + el.offsetHeight;
      if (b > maxBottom) maxBottom = b;
    });
    board.style.minHeight = (maxBottom + 100) + 'px';
  });
}

document.addEventListener('mousemove', e => {
  if (moving) {
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`);
    if (!el) return;
    const nx = moving.origX + e.clientX - moving.startX;
    const ny = moving.origY + e.clientY - moving.startY;
    el.style.left = nx + 'px';
    el.style.top = ny + 'px';
  }
  if (resizing) {
    const card = cards[resizing.idx];
    card.w = Math.max(100, resizing.startW + e.clientX - resizing.startX);
    const el = document.querySelector(`.card[data-idx="${resizing.idx}"]`);
    if (el) el.style.width = card.w + 'px';
  }
});

document.addEventListener('mouseup', e => {
  if (moving) {
    const card = cards[moving.idx];
    card.x = Math.max(0, moving.origX + e.clientX - moving.startX);
    card.y = Math.max(0, moving.origY + e.clientY - moving.startY);
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`);
    if (el) { el.classList.remove('moving'); }
    moving = null; saveBoard();
  }
  if (resizing) { resizing = null; saveBoard(); }
});

function addTextCard() {
  cards.push({ type: 'text', content: '', x: 50, y: window.scrollY + 100, w: 300 });
  renderCards();
  setTimeout(() => { const els = document.querySelectorAll('.card .text'); els[els.length - 1]?.focus(); }, 100);
}

function addImageCard() {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = 'image/*';
  input.onchange = e => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = () => { cards.push({ type: 'image', src: reader.result, x: 50, y: window.scrollY + 100, w: 240 }); renderCards(); saveBoard(); };
    reader.readAsDataURL(file);
  };
  input.click();
}

function resetLayout() {
  if (!confirm('자동 재배치합니다. 현재 위치가 변경됩니다.')) return;
  cards.forEach(c => { delete c.x; delete c.y; });
  renderCards(); autoLayout();
}

setInterval(saveBoard, 30000);
loadBoard();
</script>
</body>
</html>
