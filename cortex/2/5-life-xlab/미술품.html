.card:hover .resize-handle { opacity: 0.6; }
.resize-handle::after { content: ''; position: absolute; bottom: 3px; right: 3px; width: 8px; height: 8px; border-right: 2px solid #666; border-bottom: 2px solid #666; }
.toolbar { position: fixed; bottom: 0; left: 0; right: 0; background: #161b22; border-top: 1px solid #30363d; padding: 8px 20px; display: flex; gap: 12px; align-items: center; z-index: 200; }

.toolbar button:hover { background: #30363d; }
.toolbar .status { color: #8b949e; font-size: 12px; margin-left: auto; }
.highlight-red { color: #ff6b6b; }
.highlight-blue { color: #6cb0f6; }

    "type": "text",
    "content": "[세계 예술 시장]<br>\t\t\t<br>? 인상주의는 왜 그림을 못 그리기 시작했나?<br>\t\t\t<br>→ 카메라의 발명<br>\t\t\t<br>#연작 - 대상은 동태적이라는 시각에서 다양한 Variation을 그려나감<br>\t\t\t<br>? 왜 모더니즘부터 미국으로 패권이 넘어갔나?<br>\t\t\t<br>→ 추상주의. 2차 World war<br>\t\t\t<br>? 왜 추상표현주의를 선호하나, 왜 포스트 모더니즘은 작품가 순위 TOP 10안에 없나.<br>\t\t\t<br>→ 소장 용이성이 떨어진다. 운반도 어렵다.<br>\t\t\t<br><br>\t\t\t<br>CIA의 문화 불보지 극복 프로젝트 '예술의 전진' 대형 전신회를 잇달아 열고,<br>\t\t\t<br>정부에서 띄우려는 작가 작품들을 고가에 매입하여 앵커 가격을 높게 형성, 중국도 이러한 작업을 함.<br>\t\t\t<br><br>\t\t\t<br>모더니즘은 왜 현대미술이 아닌가? - 모더니즘이 태동된 당시의 '현대'<br>\t\t\t<br>포스트 모던이 Contemporary임.<br>\t\t\t<br><br>\t\t\t<br>개념예술 : 뒤샹. 의도와 개념만으로 작품활동을 하게 된 시대.<br>\t\t\t<br>기능이 있는 것은 가격이 기능에 앵커링 된다.<br>\t\t\t<br>기능을 잃고 예술/작품이 되는 순간 그 가치가 기하급수적으로 올라간다.<br>\t\t\t<br><br>\t\t\t<br>[한국 예술 시장]<br>\t\t\t<br>호당가격 -",

  {
    "type": "text",
    "content": "신출 작가는 호당 가격이 4만~5만원 정도이고, 중견 작가는 10만원부터 시작한다. 소위 블루칩 작가들의 호당 가격은 수직 상승한다. 이중섭과 박수근의 경우 호당 2억원까지 거래되는 것으로 알려져 있다.<br>\t\t\t<br><br>\t\t\t<br>(모던) 인상주의 프랑스 → 일본 →  강점기 한국<br>\t\t\t<br><br>\t\t\t<br>산 가격/산 사람보다 판 사람과 판 가격이 중요<br>\t\t\t<br>ㅇ 중기 50대/ 장기 20대가 나중에 어떤 취향일까?<br>\t\t\t<br>ㅇ 작품활동의 연속성 - 집안, 경제력, 배우자, 예술에 대한 열정 <br>\t\t\t<br><br>\t\t\t<br>미술품의 가치를 만드는 3대요소<br>\t\t\t<br>작가의 노력 - 콜렉터의 취향 - 매개자의 연구와 관심<br>\t\t\t<br><br>\t\t\t<br>작품 가격을 결정하는 요인 중 가장 중요한 요소는 ‘작가’다. 작가의 경력, 명성에 따라 작품 가격이 달라진다. 일반적으로 개인전시나 단체전시를 통해 갓 데뷔한 국내 신진작가의 회화 작품일 경우 캔버스 1호(관제엽서 두 장 크기, 22.7x15.8cm)당 4~5만 원, 중견작가의 경우 10~30만 원 선에서 가격이 책정된다. 그리고 작가의 전시 경력, 인지도 등에 따라 점차 가격이 상승한다. 유명 원로작가 경우에는 1호당 천만 원이 넘는 작품들도 있다.&#160;<br>\t\t\t<br><br>\t\t\t<br>두 번째는 ‘작품 크기’다. 같은 작가 작품이라도 그 크기에 따라 작품 가격이 달라진다. 회화 작품의 경우 1호당 가격을 기준으로 커질수록 크기에 비례해 비싸진다. 예를 들어 1호당 가격이 10만 원인 작가라면 30호 크기(91cm X 65cm)인 작품 가격은 300만 원이 된다.&#160;<br>\t\t\t<br><br>\t\t\t<br>세 번째는 ‘작품성’이다. 동일 작가의 같은 크기 작품이라도 작품의 조형성, 완성도 등에 따라 작품 가격은 달라진다. 예를 들어 연필 스케치와 유화 작품을 비교하자면, 캔버스에 그린 유화 작품에 비해 종이에 그린 스케치 작품이 상대적으로 저렴하다. 또한 미술가와 전문가들이 평가하는 작품성에 따라 작품 가격은 조금씩 달라진다.&#160;<br>\t\t\t<br><br>\t\t\t<br>네 번째는 ‘제작 수량’이다. 미술 용어로는 ‘에디션(edition)’이라고 하는데, 이는 같은 작품이 몇 점 제작되었는지 책정하는 개념이다. 경우에 따라 같은 작품을 여러 점 제작하는 경우가 있는데, 특히 판화나 사진은 같은 작품을 여러 점 제작할 수 있다. 크기나 작품성 면에서 같은 조건이라면 10점의 에디션이 있는 작품에 비해 100점의 에디션이 있는 작품이 더 싸다. 제작 수량을 알아보기 위해서는 작품 하단을 살펴보면 알 수 있다.&#160;",

  {
    "type": "text",
    "content": "판화 작품이나 사진의 경우 작품 하단에 에디션(총 제작 수량), 제목, 작가 사인을 표기하는 것이 일반적이다. 사진에서 보이는 작품의 경우 총 50개의 동일한 작품이 제작되었으며 해당 작품은 그중 6번째 작품임을 알 수 있다. ⓒMK스타일<br>\t\t\t<br><br>\t\t\t<br>다섯 번째는 ‘소장 이력’이다. 미술작품은 한 사람이 영원히 소유할 수도 있지만, 때에 따라서는 사고 되파는 과정을 통해 소장자가 여러 번 바뀌기도 한다. 이때 미술관 같은 공신력 있는 기관이 소장했거나 유명 컬렉터가 소유했던 이력이 있다면 그 작품은 가격이 상승하게 된다.&#160;<br>\t\t\t<br><br>\t\t\t<br>마지막으로 ‘보관 상태’다. 소장하는 동안 작품을 잘 관리했는지에 따라 작품의 보관 상태가 달라진다. 따라서 작품을 소장하고 있다면 액자나 케이스에 넣고 온도와 습도를 잘 맞추어 좋은 상태를 유지해야 한다. 반대로 작품을 구입하는 경우에는 훼손이나 변질이 없는 상태의 작품을 구입해야 한다.&#160;<br>\t\t\t<br><br>\t\t\t<br>위에서 설명한 여섯 가지 주요한 요인 외에도 다양한 요소들이 작용하여 작품 가격이 결정된다. 작품을 사고파는 관점에서 보자면 미술작품 역시 매매의 대상이다.<br>\t\t\t<br>&#160;따라서 이 역시 수요와 공급의 법칙을 따르게 된다. 작품 수는 한정되어 있는데 사고자 하는 사람이 많아지면 작품 값은 올라가게 되고, 그 반대의 경우라면 내려가게 된다.&#160; <br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br>구매처<br>\t\t\t<br>\t\t\t\t<br>- 미대 졸업전시: 유망작가를 처음 만날 수 있는 기회. 그러나 업계와 신진작가에 대해 잘 알 수 있는 안목이 있어야.<br>\t\t\t\t<br>- 오프라인 갤러리: 화랑 <br>\t\t\t\t<br>- 온라인 갤러리: <a href=\"https://www.saatchiart.com/?utm_source=google&utm_medium=cpc&campaign=IM_-_Brand_(Saatchi\" target=\"_blank\">SAATCHI ART</a>&group=general&kw=saatchi%20art&utm_campaign=2008&utm_content=responsive_ad&gclid=CjwKCAjwgqbpBRAREiwAF046Jd3FzDb2dqKDvbuVHIFDjr_zGmU0gc4_aRpnRYj1_pPsFLY0y0fIWhoCBc4QAvD_BwE), <a href=\"https://www.opengallery.co.kr/?utm_source=google&utm_medium=cpc&utm_campaign=gsa_mainlanding&utm_term=%EB%AF%B8%EC%88%A0%ED%92%88%EB%8C%80%EC%97%AC&gclid=CjwKCAjwgqbpBRAREiwAF046JY5fQCzUYQmlS_uL-45_EBb2oBDDuP1rSjQeMfF6zBuRFJ9VZJw6WRoCnMQQAvD_BwE\" target=\"_blank\">오픈갤러리</a><br>\t\t\t\t<br>- 아트페어: 화랑미술제, KIAF, SOAF<br>\t\t\t\t<br>- 경매: 컬렉터에게 구매하는 2차 시장. 위작 주의해야함. (감정 방법은, 과학감정과 안목 감정이 있는데 우리나라는 안목감정에 치우쳐져 있음.) <br>\t\t\t\t<br>1년 정도 지켜보고, 정말 살거면 페어 마지막날 네고해서 구매<br>\t\t\t<br>\t\t\t<br><br>\t\t\t<br>구매가 = 낙찰가 + 수수료 18% + VAT 1.8%<br>\t\t\t<br>판매가 = 낙찰가 + 수수료 10% + VAT 1%<br>\t\t\t<br>*구매 취소수수료 30% ㅎㄷㄷ<br>\t\t<br>\t\t<br>\t\t\t<br>인생작품 구매하기<br>\t\t<br>\t\t<br>\t\t\t<br>세계미술시장 특화 보고서 사이트인 ‘아트마켓그루’가 2018년 발간한 ‘밀레 let cards = [];
let moving = null, resizing = null;

function loadBoard() {
  const saved = localStorage.getItem(SAVE_KEY);
  cards = saved ? JSON.parse(saved) : DEFAULT_CARDS.map(c => ({...c}));
  renderCards();
  if (!saved) autoLayout();
}

function autoLayout() {
  const GAP = 14;
  const boardW = document.getElementById('board').offsetWidth;
  const cols = Math.max(1, Math.floor(boardW / 280));
  const colW = (boardW - GAP * (cols - 1)) / cols;
  const colHeights = new Array(cols).fill(0);
  const allCards = document.querySelectorAll('.card');
  const images = document.querySelectorAll('.card img');
  let loaded = 0;
  const total = images.length;

  function place() {
    allCards.forEach((el, i) => {
      const card = cards[i];
      const w = Math.min(card.w || colW, colW);
      let minCol = 0;
      for (let c = 1; c < cols; c++) if (colHeights[c] < colHeights[minCol]) minCol = c;
      card.x = minCol * (colW + GAP);
      card.y = colHeights[minCol];
      card.w = w;
      el.style.left = card.x + 'px';
      el.style.top = card.y + 'px';
      el.style.width = w + 'px';
      colHeights[minCol] = card.y + el.offsetHeight + GAP;
    });
    document.getElementById('board').style.minHeight = Math.max(...colHeights) + 100 + 'px';
    saveBoard();
  }

  if (total === 0) requestAnimationFrame(place);
  else images.forEach(img => {
    if (img.complete) { loaded++; if (loaded >= total) requestAnimationFrame(place); }
    else img.onload = img.onerror = () => { loaded++; if (loaded >= total) requestAnimationFrame(place); };
  });
}

function syncText() {
  document.querySelectorAll('.card').forEach(el => {
    const idx = +el.dataset.idx;
    if (cards[idx]?.type === 'text') {
      const t = el.querySelector('.text');
      if (t) cards[idx].content = t.innerHTML;
    }
  });
}

function saveBoard() {
  syncText();
  localStorage.setItem(SAVE_KEY, JSON.stringify(cards));
  document.getElementById('status').textContent = '저장됨 ' + new Date().toLocaleTimeString();
}

function renderCards() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  cards.forEach((card, i) => {
    const el = document.createElement('div');
    el.className = 'card';
    el.dataset.idx = i;
    if (card.x !== undefined) el.style.left = card.x + 'px';
    if (card.y !== undefined) el.style.top = card.y + 'px';
    if (card.w) el.style.width = card.w + 'px';

    el.addEventListener('mousedown', e => {
      if (e.target.closest('.text, a, .card-btn, .resize-handle, table')) return;
      e.preventDefault();
      moving = { idx: i, startX: e.clientX, startY: e.clientY, origX: card.x || 0, origY: card.y || 0 };
      el.classList.add('moving');
    });

    const actions = document.createElement('div');
    actions.className = 'card-actions';
    const delBtn = document.createElement('button');
    delBtn.className = 'card-btn'; delBtn.textContent = '×';
    delBtn.onclick = e => { e.stopPropagation(); if (confirm('삭제?')) { cards.splice(i, 1); renderCards(); saveBoard(); } };
    actions.appendChild(delBtn);
    el.appendChild(actions);

    if (card.type === 'text') {
      const text = document.createElement('div');
      text.className = 'text';
      text.contentEditable = true;
      text.innerHTML = card.content || '';
      text.addEventListener('blur', () => { card.content = text.innerHTML; saveBoard(); });
      el.appendChild(text);
    } else if (card.type === 'image') {
      const src = card.src.startsWith('http') || card.src.startsWith('data:') ? card.src : IMG_BASE + card.src;
      const img = document.createElement('img');
      img.src = src;
      img.alt = card.alt || '';
      img.loading = 'lazy';
      img.onerror = () => img.style.display = 'none';
      if (card.link) {
        const a = document.createElement('a'); a.href = card.link; a.target = '_blank';
        a.appendChild(img); el.appendChild(a);
      } else { el.appendChild(img); }
      if (card.caption) {
        const cap = document.createElement('div');
        cap.className = 'caption';
        cap.textContent = card.caption;
        el.appendChild(cap);
      }
    } else if (card.type === 'table') {
      const wrapper = document.createElement('div');
      wrapper.style.overflowX = 'auto';
      wrapper.innerHTML = card.html || '';
      el.appendChild(wrapper);
    }

    const rh = document.createElement('div');
    rh.className = 'resize-handle';
    rh.addEventListener('mousedown', e => {
      e.preventDefault(); e.stopPropagation();
      resizing = { idx: i, startX: e.clientX, startW: card.w || el.offsetWidth };
    });
    el.appendChild(rh);
    board.appendChild(el);
  });

  requestAnimationFrame(() => {
    let maxBottom = 0;
    document.querySelectorAll('.card').forEach(el => {
      const b = (parseFloat(el.style.top) || 0) + el.offsetHeight;
      if (b > maxBottom) maxBottom = b;
    });
    board.style.minHeight = (maxBottom + 100) + 'px';
  });
}

document.addEventListener('mousemove', e => {
  if (moving) {
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`);
    if (!el) return;
    const nx = moving.origX + e.clientX - moving.startX;
    const ny = moving.origY + e.clientY - moving.startY;
    el.style.left = nx + 'px';
    el.style.top = ny + 'px';
  }
  if (resizing) {
    const card = cards[resizing.idx];
    card.w = Math.max(100, resizing.startW + e.clientX - resizing.startX);
    const el = document.querySelector(`.card[data-idx="${resizing.idx}"]`);
    if (el) el.style.width = card.w + 'px';
  }
});

document.addEventListener('mouseup', e => {
  if (moving) {
    const card = cards[moving.idx];
    card.x = Math.max(0, moving.origX + e.clientX - moving.startX);
    card.y = Math.max(0, moving.origY + e.clientY - moving.startY);
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`);
    if (el) { el.classList.remove('moving'); }
    moving = null; saveBoard();
  }
  if (resizing) { resizing = null; saveBoard(); }
});

function addTextCard() {
  cards.push({ type: 'text', content: '', x: 50, y: window.scrollY + 100, w: 300 });
  renderCards();
  setTimeout(() => { const els = document.querySelectorAll('.card .text'); els[els.length - 1]?.focus(); }, 100);
}

function addImageCard() {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = 'image/*';
  input.onchange = e => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = () => { cards.push({ type: 'image', src: reader.result, x: 50, y: window.scrollY + 100, w: 240 }); renderCards(); saveBoard(); };
    reader.readAsDataURL(file);
  };
  input.click();
}

function resetLayout() {
  if (!confirm('자동 재배치합니다. 현재 위치가 변경됩니다.')) return;
  cards.forEach(c => { delete c.x; delete c.y; });
  renderCards(); autoLayout();
}

setInterval(saveBoard, 30000);
loadBoard();
</script>
