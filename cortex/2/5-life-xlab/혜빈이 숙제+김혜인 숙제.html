<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>혜빈이 숙제+김혜인 숙제</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #1e1e1e;
  color: #e0e0e0;
  font-family: 'Segoe UI', -apple-system, sans-serif;
  font-size: 15px;
  line-height: 1.7;
  padding: 0 0 80px;
}
a { color: #6cb0f6; text-decoration: none; }
a:hover { text-decoration: underline; }
.toolbar {
  position: sticky; top: 0; z-index: 100;
  background: #161b22; border-bottom: 1px solid #30363d;
  padding: 8px 24px; display: flex; gap: 10px; align-items: center;
}
.toolbar .t-title { font-size: 16px; font-weight: bold; color: #fff; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.toolbar .t-date { color: #8b949e; font-size: 12px; white-space: nowrap; }
.toolbar button { background: #21262d; border: 1px solid #30363d; color: #ccc; padding: 4px 12px; border-radius: 5px; cursor: pointer; font-size: 12px; white-space: nowrap; }
.toolbar button:hover { background: #30363d; color: #fff; }
.toolbar .t-status { color: #8b949e; font-size: 11px; white-space: nowrap; }
.doc { max-width: 760px; margin: 0 auto; padding: 28px 24px; }
.block { margin-bottom: 10px; }
.block-text {
  outline: none;
  padding: 5px 8px;
  border-radius: 4px;
  white-space: pre-wrap;
  word-break: break-word;
  min-height: 1.5em;
}
.block-text:focus { background: rgba(255,255,255,0.04); }
.block-text:empty::before { content: '텍스트 입력...'; color: #555; pointer-events: none; }
.block-image img { max-width: 100%; border-radius: 6px; display: block; }
.block-image .caption { font-size: 12px; color: #888; margin-top: 4px; }
.block-table .table-wrap { overflow-x: auto; }
.block-table table { border-collapse: collapse; font-size: 13px; }
.block-table td, .block-table th { border: 1px solid #444; padding: 5px 10px; vertical-align: top; }
.block-table th { background: #2a2a3a; color: #ccc; }
</style>
</head>
<body>
<div class="toolbar">
  <span class="t-title">혜빈이 숙제+김혜인 숙제</span>
  <span class="t-date">2023년 10월 11일 수요일</span>
  <button onclick="save()">저장</button>
  <button id="copyBtn" onclick="copyPath()">⎘ 주소 복사</button>
  <span class="t-status" id="status"></span>
</div>
<div class="doc" id="doc">
<div class="block block-text" data-idx="0" contenteditable="true">혜빈이 숙제+김혜인 숙제</div>
<div class="block block-image" data-idx="1"><img src="../../attachments//b846ddf132.png" alt="혜빈이 숙제+김혜인 숙제" loading="lazy" onerror="this.style.display='none'"></div>
<div class="block block-image" data-idx="2"><img src="../../attachments//4bc935ed58.png" alt="혜빈이 숙제+김혜인 숙제" loading="lazy" onerror="this.style.display='none'"></div>
<div class="block block-image" data-idx="3"><img src="../../attachments//5d4449304f.png" alt="혜빈이 숙제+김혜인 숙제" loading="lazy" onerror="this.style.display='none'"></div>
<div class="block block-image" data-idx="4"><img src="../../attachments//26ccd73ec4.png" alt="혜빈이 숙제+김혜인 숙제" loading="lazy" onerror="this.style.display='none'"></div>
<div class="block block-image" data-idx="5"><img src="../../attachments//f0a4523057.png" alt="혜빈이 숙제+김혜인 숙제" loading="lazy" onerror="this.style.display='none'"></div>
<div class="block block-image" data-idx="6"><img src="../../attachments//ea63e1e717.png" alt="혜빈이 숙제+김혜인 숙제" loading="lazy" onerror="this.style.display='none'"></div>
<div class="block block-image" data-idx="7"><img src="../../attachments//3811838e01.png" alt="혜빈이 숙제+김혜인 숙제" loading="lazy" onerror="this.style.display='none'"></div>
<div class="block block-text" data-idx="8" contenteditable="true"><a href="https://www.oliveyoung.co.kr/store/search/getSearchMain.do?query=%EC%9D%B4%EC%A7%80%EB%8D%A4&giftYn=N&t_page=%ED%8C%A8%EC%B9%98%EA%B2%80%EC%83%89&t_click=%EA%B2%80%EC%83%89%EC%B0%BD&t_search_name=%EC%9D%B4%EC%A7%80%EB%8D%A4" target="_blank">이지덤</a> 검색 | 올리브영 (oliveyoung.co.kr)</div>
<div class="block block-image" data-idx="9"><img src="../../attachments//2728075a9a.png" alt="혜빈이 숙제+김혜인 숙제" loading="lazy" onerror="this.style.display='none'"></div>
</div>
<script>
const SAVE_KEY = 'note-혜빈이-숙제-김혜인-숙제';

function save() {
  const data = {};
  document.querySelectorAll('.block-text').forEach(el => {
    data[el.dataset.idx] = el.innerHTML;
  });
  localStorage.setItem(SAVE_KEY, JSON.stringify(data));
  const s = document.getElementById('status');
  s.textContent = '저장됨 ' + new Date().toLocaleTimeString();
  setTimeout(() => { s.textContent = ''; }, 2000);
}

function copyPath() {
  navigator.clipboard.writeText(location.pathname).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.textContent = '✓ 복사됨';
    setTimeout(() => { btn.textContent = '⎘ 주소 복사'; }, 1500);
  });
}

// Restore saved edits
const saved = localStorage.getItem(SAVE_KEY);
if (saved) {
  try {
    const data = JSON.parse(saved);
    document.querySelectorAll('.block-text').forEach(el => {
      if (data[el.dataset.idx] !== undefined) el.innerHTML = data[el.dataset.idx];
    });
  } catch(e) {}
}

document.querySelectorAll('.block-text').forEach(el => {
  el.addEventListener('blur', save);
});

setInterval(save, 30000);
</script>
</body>
</html>
