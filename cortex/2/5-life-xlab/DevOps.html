<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DevOps</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #1e1e1e;
  color: #e0e0e0;
  font-family: 'Segoe UI', -apple-system, sans-serif;
  font-size: 15px;
  line-height: 1.6;
  padding: 20px 30px 60px;
  overflow-x: hidden;
}
a { color: #6cb0f6; text-decoration: none; }
a:hover { text-decoration: underline; }
.title-bar {
  background: #3a3a5c;
  display: inline-block;
  padding: 6px 16px;
  font-size: 22px;
  font-weight: bold;
  color: #fff;
  margin-bottom: 4px;
}
.date { color: #999; font-size: 13px; margin-bottom: 20px; }
.board { position: relative; }
.card {
  background: #2a2a2a;
  border: 1px solid #3a3a3a;
  border-radius: 8px;
  padding: 12px;
  position: absolute;
  cursor: grab;
  transition: box-shadow 0.15s;
  overflow: hidden;
}
.card:hover { box-shadow: 0 0 0 1px #58a6ff; z-index: 10; }
.card.moving { opacity: 0.8; box-shadow: 0 4px 24px rgba(0,0,0,0.6); z-index: 100; cursor: grabbing; }
.card img { width: 100%; border-radius: 4px; display: block; }
.card .caption { font-size: 12px; color: #888; margin-top: 6px; }
.card .text { outline: none; min-height: 20px; white-space: pre-wrap; word-break: break-word; }
.card .text:focus { background: rgba(255,255,255,0.05); border-radius: 4px; padding: 4px; }
.card .text:empty::before { content: '텍스트 입력...'; color: #555; }
.card table { border-collapse: collapse; width: 100%; font-size: 13px; }
.card table td, .card table th { border: 1px solid #444; padding: 4px 8px; vertical-align: top; }
.card table th { background: #333; color: #ccc; }
.card-actions { position: absolute; top: 4px; right: 4px; display: none; gap: 4px; }
.card:hover .card-actions { display: flex; }
.card-btn { background: #333; border: 1px solid #555; color: #ccc; border-radius: 4px; padding: 2px 6px; font-size: 11px; cursor: pointer; }
.card-btn:hover { background: #444; color: #fff; }
.resize-handle { position: absolute; bottom: 0; right: 0; width: 16px; height: 16px; cursor: se-resize; opacity: 0; }
.card:hover .resize-handle { opacity: 0.6; }
.resize-handle::after { content: ''; position: absolute; bottom: 3px; right: 3px; width: 8px; height: 8px; border-right: 2px solid #666; border-bottom: 2px solid #666; }
.toolbar { position: fixed; bottom: 0; left: 0; right: 0; background: #161b22; border-top: 1px solid #30363d; padding: 8px 20px; display: flex; gap: 12px; align-items: center; z-index: 200; }
.toolbar button { background: #21262d; border: 1px solid #30363d; color: #e0e0e0; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; }
.toolbar button:hover { background: #30363d; }
.toolbar .status { color: #8b949e; font-size: 12px; margin-left: auto; }
.highlight-red { color: #ff6b6b; }
.highlight-blue { color: #6cb0f6; }
</style>
</head>

const DEFAULT_CARDS = [
  {
    "type": "text",
    "content": "DevOps<br>\t\t<br>\t\t<br>\t<br>\t<br>\t\t<br>\t\t\t<br>1. 생활코딩 생활코딩은 일반인에게 컴퓨터 프로그래밍을 알려주는 것을 목적으로 하는 비영리 교육 프로젝트이다. 교육은 이고잉이 만든 오픈튜토리얼스에서 제공된다. 웹서비스를 중심으로 설명하는 '생활코딩', 중장년을 대상으로 IT 활용법을 다루는 '효도코딩' 등으로 구성된다. => <a href=\"https://opentutorials.org/course/1\" target=\"_blank\">https://opentutorials.org/course/1</a> 생활코딩 <a href=\"https://opentutorials.org/\" target=\"_blank\">https://opentutorials.org/</a> => <a href=\"https://www.youtube.com/user/egoing2\" target=\"_blank\">https://www.youtube.com/user/egoing2</a> 생활코딩 일반인에게 프로그래밍을 알려주는 온라인/오프라인 활동 입니다. 2. 부스트코스 부스트코스(boostcourse)는 모두 함께 배우고 성장하는 비영리 SW 온라인 플랫폼입니다. => <a href=\"https://www.boostcourse.org/opencourse\" target=\"_blank\">https://www.boostcourse.org/opencourse</a> 다 함께 배우고 성장하는 부스트코스 부스트코스(boostcourse)는 모두 함께 배우고 성장하는 비영리 SW 온라인 플랫폼입니다. <a href=\"https://www.boostcourse.org/\" target=\"_blank\">https://www.boostcourse.org/</a> 3. 에드위드 에드위드(edwith)는 네이버(NAVER)와 네이버 커넥트재단(NAVER Connect)이 제공하는 온라인 강좌(MOOC : Massive Online Open Course) 교육 플랫폼입니다. => <a href=\"https://www.edwith.org/\" target=\"_blank\">https://www.edwith.org/</a> 에듀케이션위드 : edwith 에드위드(edwith)는 네이버(NAVER)와 네이버 커넥트재단(NAVER Connect)이 제공하는 온라인 강좌(MOOC : Massive Online Open Course) 교육 플랫폼입니다. 에듀케이션위드(education with) 에드위드(edwith)로 분야별 명품 강좌를 무료(Free Course)로 수강하세요. 4. 위키독스 WikiDocs. 위키독스는 온라인 책을 제작 공유하는 플랫폼 서비스입니다. => <a href=\"https://wikidocs.net/\" target=\"_blank\">https://wikidocs.net/</a> 위키독스 온라인 책을 제작 공유하는 플랫폼 서비스입니다. <br>\t\t\t<br><br>\t\t\t<br><a href=\"https://roots2019.tistory.com/236\" target=\"_blank\">IT </a>온라인 교육 사이트 모음 (21개 사이트)<br>\t\t\t<br><a href=\"https://truecloset.tistory.com/63\" target=\"_blank\">코딩교육</a> 사이트들<br>\t\t\t<br><br>\t\t\t<br>1. 생활코딩(<a href=\"https://opentutorials.org/course/1\" target=\"_blank\">클릭 시 이동</a>)<br>\t\t\t<br>코딩에 대해 사전 지식이 전혀 없는 일반인들도 코딩에 쉽게 접근하고 배울 수 있도록 무료로 강의 영상이나 자료들을 보급하는 비영리 커뮤니티이다.<br>\t\t\t<br>코딩을 독학하려고 마음을 먹었을 때 어디서부터 시작해야 할까 감조차 잡히지 않았었는데 이 사이트가 꽤 도움이 많이 되었던 기억이 난다.<br>\t\t\t<br>코딩에 입문하는 사람들에게 상당히 유용한 사이트이다.<br>\t\t\t<br>2. W3schools(<a href=\"https://www.w3schools.com/\" target=\"_blank\">클릭 시 이동</a>)<br>\t\t\t<br>인터넷 강의 사이트가 아니라 학습을 위한 텍스트 자료들이 잘 정리되어 있으며 내용은 영어로 되어있기 때문에 필요하면 구글 번역기를 돌려서 사용하면 된다.<br>\t\t\t<br>별도 프로그램을 다운로드하지 않고 사이트 내에서 코드를 바로 실습해볼 수 있는 장점이 있다.<br>\t\t\t<br>3. TCP스쿨(<a href=\"http://www.tcpschool.com/\" target=\"_blank\">클릭 시 이동</a>)<br>\t\t\t<br>W3schools와 비슷하며 이해를 돕기 위한 이미지 자료와 텍스트 자료들이 한글로 깔끔하게 잘 정리되어 있는 사이트이다.<br>\t\t\t<br>마찬가지로 사이트 내에서 바로 코드를 작성하고 실행 결과를 확인할 수 있다.<br>\t\t\t<br>4. 유데미(<a href=\"https://www.udemy.com/ko/\" target=\"_blank\">클릭 시 이동</a>)<br>\t\t\t<br>세계적으로 유명하며 규모가 굉장히 큰 인터넷 강의 사이트이다.<br>\t\t\t<br>무료 사이트는 아니지만 타 강의 사이트에 비해 가격이 굉장히 저렴하며, 무료 강의들도 꽤 많이 찾아볼 수 있다.<br>\t\t\t<br>해외의 플랫폼이지만 한국어로 된 강의도 많다.<br>\t\t\t<br>-참고:<br>\t\t\t<br><a href=\"https://jaglo.net/%ec%9c%a0%eb%8d%b0%eb%af%b8/\" target=\"_blank\">“유데미(Udemy) 사용 팁, 정보 깔끔 정리”</a><br>\t\t\t<br>5.인프런(<a href=\"https://www.inflearn.com/\" target=\"_blank\">클릭 시 이동</a>)<br>\t\t\t<br>유데미의 한국 버전이라고 생각하면 된다.<br>\t\t\t<br>무료 강의들을 종종 찾아볼 수 있지만 많지는 않다.<br>\t\t\t<br>그 외에 강의들은 유데미와 비교했을 때 공급의 차이로 인해 선택지가 조금 부족하다.<br>\t\t\t<br>6.코세라(<a href=\"https://coursera.pxf.io/gb5reA\" target=\"_blank\">클릭 시 이동</a>)<br>\t\t\t<br>해외의 사이트이며 영어로 되어있다. 질 좋은 무료 강의가 상당히 많은 편이다.<br>\t\t\t<br>7.에덱스(<a href=\"http://edx.org/\" target=\"_blank\">클릭 시 이동</a>)<br>\t\t\t<br>해외의 사이트이며 영어로 되어있다. 질 좋은 무료 강의가 상당히 많은 편이다.<br>\t\t\t<br>-참고:<br>\t\t\t<br><a href=\"https://jaglo.net/%ec%bd%94%ec%84%b8%eb%9d%bc-%ec%9c%a0%eb%8b%a4%ec%8b%9c%ed%8b%b0-%ec%97%90%eb%8d%b1%ec%8a%a4-%eb%b9%84%ea%b5%90/\" target=\"_blank\">“코세라 유다시티 에덱스 대표적 MOOC 플랫폼 특징 비교”</a><br>\t\t\t<br>코딩테스트 연습 사이트<br>\t\t\t<br>주로 IT 관련 기업들이 개발자들을 채용할 때 시험 방식으로 사용하는 코딩테스트를 연습할 수 있는 사이트들이다.<br>\t\t\t<br>8.프로그래머스(<a href=\"https://programmers.co.kr/\" target=\"_blank\">클릭 시 이동</a>)<br>\t\t\t<br>9.백준 온라인저지(<a href=\"https://www.acmicpc.net/\" target=\"_blank\">클릭 시 이동</a>)<br>\t\t\t<br>10.SW Expert Academy(<a href=\"https://swexpertacademy.com/\" target=\"_blank\">클릭 시 이동</a>)<br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br>-&#160;유튜브&#160;:&#160;제가&#160;구독하는&#160;것만&#160;소개한&#160;것이고&#160;좋은&#160;채널들&#160;넘치고&#160;넘칩니다.&#160;관심분야&#160;찾아&#160;보세요.<br>\t\t\t<br>조코딩&#160;:&#160;<a href=\"https://www.youtube.com/channel/UCQNE2JmbasNYbjGAcuBiRRg\" target=\"_blank\">https://www.youtube.com/channel/UCQNE2JmbasNYbjGAcuBiRRg</a><br>\t\t\t<br>FireShip&#160;:&#160;<a href=\"https://www.youtube.com/channel/UCsBjURrPoezykLs9EqgamOA\" target=\"_blank\">https://www.youtube.com/channel/UCsBjURrPoezykLs9EqgamOA</a><br>\t\t\t<br>Free&#160;Coding&#160;Camp&#160;:&#160;<a href=\"https://www.youtube.com/channel/UC8butISFwT-Wl7EV0hUK0BQ\" target=\"_blank\">https://www.youtube.com/channel/UC8butISFwT-Wl7EV0hUK0BQ</a><br>\t\t\t<br>MIT&#160;CS&#160;실습&#160;수업&#160;:&#160;<a href=\"https://www.youtube.com/channel/UCuXy5tCgEninup9cGplbiFw\" target=\"_blank\">https://www.youtube.com/channel/UCuXy5tCgEninup9cGplbiFw</a><br>\t\t\t<br><br>\t\t\t<br>-&#160;노마드&#160;코더스&#160;:&#160;니꼴라스&#160;입니다.&#160;제가&#160;좋아하는&#160;유튜버&#160;분&#160;입니다.&#160;재밌습니다.<br>\t\t\t<br><a href=\"https://www.youtube.com/channel/UCUpJs89fSBXNolQGOYKn0YQ\" target=\"_blank\">https://www.youtube.com/channel/UCUpJs89fSBXNolQGOYKn0YQ</a><br>\t\t\t<br>온라인&#160;강의&#160;사이트도&#160;있습니다.&#160;-&#160;<a href=\"https://nomadcoders.co/\" target=\"_blank\">https://nomadcoders.co/</a><br>\t\t\t<br><br>\t\t\t<br>-&#160;생활코딩&#160;:&#160;설명이&#160;필요&#160;없습니다.&#160;설명도&#160;간결하게&#160;아주&#160;재미나게&#160;해줍니다.<br>\t\t\t<br><a href=\"https://opentutorials.org/course/1\" target=\"_blank\">https://opentutorials.org/course/1</a><br>\t\t\t<br><br>\t\t\t<br>-&#160;edX&#160;:&#160;대학&#160;공개강의가&#160;많이&#160;모여있고,&#160;찾아보면&#160;다양한&#160;분야&#160;무료강의들이&#160;많습니다.<br>\t\t\t<br><a href=\"https://www.edx.org/\" target=\"_blank\">https://www.edx.org/</a><br>\t\t\t<br><br>\t\t\t<br>-&#160;khan&#160;:&#160;처음엔&#160;수학이&#160;유명했는데,&#160;이제&#160;여러&#160;과목들이&#160;많이&#160;생겼습니다.<br>\t\t\t<br><a href=\"https://www.khanacademy.org/\" target=\"_blank\">https://www.khanacademy.org/</a><br>\t\t\t<br><br>\t\t\t<br>-&#160;coursera&#160;:&#160;학위취득까지&#160;가능한&#160;온라인&#160;수업입니다.&#160;찾아보면&#160;무료도&#160;있습니다.<br>\t\t\t<br><a href=\"https://www.coursera.org/\" target=\"_blank\">https://www.coursera.org/</a><br>\t\t\t<br>&#160;<br>\t\t\t<br>출처: <a href=\"https://madchick.tistory.com/66\" target=\"_blank\">https://madchick.tistory.com/66</a> [미친병아리가 삐약삐약:티스토리]<br>\t\t\t<br><br>\t\t\t<br><a href=\"https://www.inflearn.com/\" target=\"_blank\">인프런</a>, <a href=\"https://www.codeit.kr/topics/ann-theory\" target=\"_blank\">코드잇</a><br>\t\t\t<br><a href=\"https://daeguowl.tistory.com/199\" target=\"_blank\">부트캠프</a> 비교, <a href=\"https://whereisyourwork.com/%EC%BD%94%EB%94%A9-%EB%B6%80%ED%8A%B8%EC%BA%A0%ED%94%84-%EC%B6%94%EC%B2%9C/\" target=\"_blank\">부트캠프</a> 추천, <a href=\"https://itknowledgeshare.tistory.com/entry/%EB%8C%80%ED%91%9C%EC%A0%81%EC%9D%B8-%EA%B5%AD%EB%82%B4-%EC%BD%94%EB%94%A9-%EB%B6%80%ED%8A%B8%EC%BA%A0%ED%94%84-%EC%86%8C%EA%B0%9C\" target=\"_blank\">부트캠프</a> 소개<br>\t\t\t<br><br>\t\t\t<br>앱개발<br>\t\t\t<br><br>\t\t\t<br>인공지능<br>\t\t\t<br><a href=\"https://spartacodingclub.kr/catalog\" target=\"_blank\">https://spartacodingclub.kr/catalog</a>",

let cards = [];
let moving = null, resizing = null;

function loadBoard() {
  const saved = localStorage.getItem(SAVE_KEY);
  cards = saved ? JSON.parse(saved) : DEFAULT_CARDS.map(c => ({...c}));
  renderCards();
  if (!saved) autoLayout();
}

function autoLayout() {
  const GAP = 14;
  const boardW = document.getElementById('board').offsetWidth;
  const cols = Math.max(1, Math.floor(boardW / 280));
  const colW = (boardW - GAP * (cols - 1)) / cols;
  const colHeights = new Array(cols).fill(0);
  const allCards = document.querySelectorAll('.card');
  const images = document.querySelectorAll('.card img');
  let loaded = 0;
  const total = images.length;

  function place() {
    allCards.forEach((el, i) => {
      const card = cards[i];
      const w = Math.min(card.w || colW, colW);
      let minCol = 0;
      for (let c = 1; c < cols; c++) if (colHeights[c] < colHeights[minCol]) minCol = c;
      card.x = minCol * (colW + GAP);
      card.y = colHeights[minCol];
      card.w = w;
      el.style.left = card.x + 'px';
      el.style.top = card.y + 'px';
      el.style.width = w + 'px';
      colHeights[minCol] = card.y + el.offsetHeight + GAP;
    });
    document.getElementById('board').style.minHeight = Math.max(...colHeights) + 100 + 'px';
    saveBoard();
  }

  if (total === 0) requestAnimationFrame(place);
  else images.forEach(img => {
    if (img.complete) { loaded++; if (loaded >= total) requestAnimationFrame(place); }
    else img.onload = img.onerror = () => { loaded++; if (loaded >= total) requestAnimationFrame(place); };
  });
}

function syncText() {
  document.querySelectorAll('.card').forEach(el => {
    const idx = +el.dataset.idx;
    if (cards[idx]?.type === 'text') {
      const t = el.querySelector('.text');
      if (t) cards[idx].content = t.innerHTML;
    }
  });
}

function saveBoard() {
  syncText();
  localStorage.setItem(SAVE_KEY, JSON.stringify(cards));
  document.getElementById('status').textContent = '저장됨 ' + new Date().toLocaleTimeString();
}

function renderCards() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  cards.forEach((card, i) => {
    const el = document.createElement('div');
    el.className = 'card';
    el.dataset.idx = i;
    if (card.x !== undefined) el.style.left = card.x + 'px';
    if (card.y !== undefined) el.style.top = card.y + 'px';
    if (card.w) el.style.width = card.w + 'px';

    el.addEventListener('mousedown', e => {
      if (e.target.closest('.text, a, .card-btn, .resize-handle, table')) return;
      e.preventDefault();
      moving = { idx: i, startX: e.clientX, startY: e.clientY, origX: card.x || 0, origY: card.y || 0 };
      el.classList.add('moving');
    });

    const actions = document.createElement('div');
    actions.className = 'card-actions';
    const delBtn = document.createElement('button');
    delBtn.className = 'card-btn'; delBtn.textContent = '×';
    delBtn.onclick = e => { e.stopPropagation(); if (confirm('삭제?')) { cards.splice(i, 1); renderCards(); saveBoard(); } };
    actions.appendChild(delBtn);
    el.appendChild(actions);

    if (card.type === 'text') {
      const text = document.createElement('div');
      text.className = 'text';
      text.contentEditable = true;
      text.innerHTML = card.content || '';
      text.addEventListener('blur', () => { card.content = text.innerHTML; saveBoard(); });
      el.appendChild(text);
    } else if (card.type === 'image') {
      const src = card.src.startsWith('http') || card.src.startsWith('data:') ? card.src : IMG_BASE + card.src;
      const img = document.createElement('img');
      img.src = src;
      img.alt = card.alt || '';
      img.loading = 'lazy';
      img.onerror = () => img.style.display = 'none';
      if (card.link) {
        const a = document.createElement('a'); a.href = card.link; a.target = '_blank';
        a.appendChild(img); el.appendChild(a);
      } else { el.appendChild(img); }
      if (card.caption) {
        const cap = document.createElement('div');
        cap.className = 'caption';
        cap.textContent = card.caption;
        el.appendChild(cap);
      }
    } else if (card.type === 'table') {
      const wrapper = document.createElement('div');
      wrapper.style.overflowX = 'auto';
      wrapper.innerHTML = card.html || '';
      el.appendChild(wrapper);
    }

    const rh = document.createElement('div');
    rh.className = 'resize-handle';
    rh.addEventListener('mousedown', e => {
      e.preventDefault(); e.stopPropagation();
      resizing = { idx: i, startX: e.clientX, startW: card.w || el.offsetWidth };
    });
    el.appendChild(rh);
    board.appendChild(el);
  });

  requestAnimationFrame(() => {
    let maxBottom = 0;
    document.querySelectorAll('.card').forEach(el => {
      const b = (parseFloat(el.style.top) || 0) + el.offsetHeight;
      if (b > maxBottom) maxBottom = b;
    });
    board.style.minHeight = (maxBottom + 100) + 'px';
  });
}

document.addEventListener('mousemove', e => {
  if (moving) {
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`);
    if (!el) return;
    const nx = moving.origX + e.clientX - moving.startX;
    const ny = moving.origY + e.clientY - moving.startY;
    el.style.left = nx + 'px';
    el.style.top = ny + 'px';
  }
  if (resizing) {
    const card = cards[resizing.idx];
    card.w = Math.max(100, resizing.startW + e.clientX - resizing.startX);
    const el = document.querySelector(`.card[data-idx="${resizing.idx}"]`);
    if (el) el.style.width = card.w + 'px';
  }
});

document.addEventListener('mouseup', e => {
  if (moving) {
    const card = cards[moving.idx];
    card.x = Math.max(0, moving.origX + e.clientX - moving.startX);
    card.y = Math.max(0, moving.origY + e.clientY - moving.startY);
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`);
    if (el) { el.classList.remove('moving'); }
    moving = null; saveBoard();
  }
  if (resizing) { resizing = null; saveBoard(); }
});

function addTextCard() {
  cards.push({ type: 'text', content: '', x: 50, y: window.scrollY + 100, w: 300 });
  renderCards();
  setTimeout(() => { const els = document.querySelectorAll('.card .text'); els[els.length - 1]?.focus(); }, 100);
}

function addImageCard() {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = 'image/*';
  input.onchange = e => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = () => { cards.push({ type: 'image', src: reader.result, x: 50, y: window.scrollY + 100, w: 240 }); renderCards(); saveBoard(); };
    reader.readAsDataURL(file);
  };
  input.click();
}

function resetLayout() {
  if (!confirm('자동 재배치합니다. 현재 위치가 변경됩니다.')) return;
  cards.forEach(c => { delete c.x; delete c.y; });
  renderCards(); autoLayout();
}

setInterval(saveBoard, 30000);
loadBoard();
</script>
</body>
</html>
