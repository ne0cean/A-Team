const SAVE_KEY = 'board-7가지-ChatGPT-프롬프트로-주식-리서치-수준-업그레이드';
const IMG_BASE = '../../attachments/';
const DEFAULT_CARDS = [
  {
    "type": "text",
    "content": "프롬프트의 구조&#160;:&#160;<br>\t\t\t<br><b>1. 기본 정보 및 시점 명시 (Basic Info & Date) &#128204;</b><br>\t\t\t<br><b>2. 기업 및 산업 분석 (Company & Industry Analysis) &#127970;</b><br>\t\t\t<br><b>3. 재무제표 분석 (Financial Statement Analysis) &#128202;</b><br>\t\t\t<br><b>4. 시장 및 거시 경제 분석 (Market & Macro Analysis) &#127757;</b><br>\t\t\t<br><b>5. 기술적 분석 & 투자 전략 (Technical & Investment Strategy) &#128200;</b><br>\t\t\t<br><b>6. 운영진 분석 (Management Analysis) &#128104;‍&#128188;</b><br>\t\t\t<br><b>7. 시나리오별 결론 (Scenario-specific Conclusion) &#128161;</b><br>\t\t\t<br><b>8. 최종 보고서 작성 (Final Report Generation)</b><br>\t\t\t<br><br>\t\t\t<br>프롬프트 :&#160;<br>\t\t\t<br>### ## &#128200; 주식 분석 & 요약 프롬프트 (v2.0 - 자기 개선 기능 탑재)<br>\t\t\t<br><br>\t\t\t<br>#### <b>0. 분석 전략 수립 (Analysis Strategy Setup)</b><br>\t\t\t<br><br>\t\t\t<br>이 분석의 <b>'행동 문법'</b>은 다음과 같은 4단계의 <b>'내적 사고 과정'</b>을 따른다. 당신은 이 프로세스를 통해 단일 관점이 아닌, 다각적이고 자기 검증된 최종 결론을 도출해야 한다.<br>\t\t\t<br><br>\t\t\t<br>* <b>1단계 [ToT - 관점 분기]:</b> 먼저, 이 주식에 대한 <b>세 가지 핵심 시나리오</b>를 설정한다: <b>`[1] 강세(Bull Case) 시나리오`</b>, <b>`[2] 약세(Bear Case) 시나리오`</b>, <b>`[3] 기본(Base Case) 시나리오`</b>. 이는 분석의 여러 갈래를 나누는 과정이다.<br>\t\t\t<br><br>\t\t\t<br>* <b>2단계 [CoT - 심층 분석]:</b> 설정된 <b>세 가지 시나리오 각각에 대해</b>, 아래에 명시된 <b>`1~7단계 세부 분석 파이프라인`</b>을 <b>Chain of Thought</b>로 적용하여, 총 3개의 독립적인 <b>`<초안 분석 보고서>`</b>를 내부적으로 생성한다.<br>\t\t\t<br><br>\t\t\t<br>* <b>3단계 [Self-Critique - 자기 비판]:</b> 이제 당신은 역할을 바꿔, 세 개의 `<초안 분석 보고서>`를 검토하는 냉철한 <b>'리스크 관리자(Risk Manager)'</b>가 된다. 각 초안 보고서의 <b>가정 오류, 논리적 비약, 확증 편향</b> 등을 날카롭게 지적하고, 세 시나리오를 통합했을 때 나타나는 <b>모순점이나 핵심적인 불확실성</b>을 식별하여 <b>`<개선 지침서>`</b>를 작성한다.<br>\t\t\t<br><br>\t\t\t<br>* <b>4단계 [Refine - 최종 개선]:</b> 다시 <b>'수석 애널리스트'</b>의 역할로 돌아온다. 3개의 `<초안 분석 보고서>`와 1개의 `<개선 지침서>`를 모두 종합하여, 모든 허점을 보완하고 균형 잡힌 시각을 담은 <b>단 하나의 `<최종 분석 보고서>`</b>를 작성한다.<br>\t\t\t<br><br>\t\t\t<br>---<br>\t\t\t<br><br>\t\t\t<br>#### <b>1~7. 세부 분석 파이프라인 (Detailed Analysis Pipeline)</b><br>\t\t\t<br>`### 이 1~7단계 파이프라인은 위 '0. 분석 전략 수립'의 2단계에서 각 시나리오(강세/약세/기본)별 초안을 작성할 때 사용되는 분석 엔진입니다. ###`<br>\t\t\t<br><br>\t\t\t<br><b>1. 기본 정보 및 시점 명시 (Basic Info & Date) &#128204;</b><br>\t\t\t<br><br>\t\t\t<br>* <b>보고서 발행일:</b> 분석의 기준 시점을 명확히 한다.<br>\t\t\t<br>* <b>회사 이름 및 티커:</b> 분석 대상을 정확히 식별한다.<br>\t\t\t<br>* <b>핵심 요약:</b> 이 회사를 한두 문장으로 설명한다면? 가장 중요한 현재 상황이나 특징은? (투자자에게 가장 먼저 보여주는 '헤드라인')<br>\t\t\t<br>* <b>[협업 제안]:</b> 분석의 깊이를 더하기 위해, 특별히 집중해야 할 기간(예: 최근 1년, 5년)이나 비교 대상 경쟁사가 있나요?<br>\t\t\t<br><br>\t\t\t<br><b>2. 기업 및 산업 분석 (Company & Industry Analysis) &#127970;</b><br>\t\t\t<br><br>\t\t\t<br>* <b>핵심 사업 & 경제학적 해자(Moat) 심층 분석:</b><br>\t\t\t<br>* <b>수익 모델:</b> 그래서 이 회사는 정확히 어떻게 돈을 버는가?<br>\t\t\t<br>* <b>진입 장벽 유형:</b> 경쟁사들이 따라 할 수 없는 강력한 무기(해자)는 무엇인가? 아래 유형 중 해당하는 것을 명시하고 구체적으로 설명하라.<br>\t\t\t<br>* <b>규모의 경제:</b> 압도적인 생산량이나 사용자 기반으로 원가 우위를 점하는가?<br>\t\t\t<br>* <b>네트워크 효과:</b> 더 많은 사용자가 모일수록 서비스 가치가 기하급수적으로 증가하는가?<br>\t\t\t<br>* <b>독점적 기술/특허:</b> 대체 불가능한 기술이나 특허를 보유하고 있는가?<br>\t\t\t<br>* <b>강력한 브랜드/전환 비용:</b> 소비자들이 다른 브랜드로 쉽게 넘어가지 못하는 이유가 있는가?<br>\t\t\t<br>* <b>정부 규제/특허:</b> 법적, 제도적 보호를 받고 있는가?<br>\t\t\t<br>* <b>틈새(Niche) 시장 독점:</b> 거대 기업들이 신경 쓰지 않는 특정 시장을 장악하고 있는가?<br>\t\t\t<br>* <b>미래 성장 동력:</b><br>\t\t\t<br>* <b>가장 유력한 성장 시나리오:</b> 앞으로 무엇을 먹고 성장할 것인가? (신기술, 신시장 등)<br>\t\t\t<br>* <b>'와일드카드' 성장 시나리오:</b> 시장이 예상하지 못하는, 완전히 새로운 성장 동력이 될 만한 잠재적 가능성은 무엇인가?<br>\t\t\t<br>* <b>산업 전망:</b> 이 회사가 속한 산업 자체는 성장하는 산업인가, 아니면 지는 산업인가?<br>\t\t\t<br><br>\t\t\t<br><b>3. 재무제표 분석 (Financial Statement Analysis) &#128202;</b><br>\t\t\t<br><br>\t\t\t<br>* <b>손익계산서:</b> 매출과 이익은 꾸준히 성장하고 있는가? 수익성은 좋은가? (얼마나 효율적으로 버는가)<br>\t\t\t<br>* <b>재무상태표:</b> 회사가 재정적으로 건강하고 튼튼한가? (빚은 적고, 현금은 많은가)<br>\t\t\t<br>* <b>현금흐름표:</b> 실제 현금은 잘 벌고 있는가? 그리고 그 돈을 어디에 쓰고 있는가? (주주 환원, 재투자 등)<br>\t\t\t<br>* <b>[액션]:</b> 만약 분석에 필수적인 재무 데이터(예: 특정 분기 보고서)가 누락되었다면, 'OO 데이터 추가 확인 필요'라고 명시하라.<br>\t\t\t<br><br>\t\t\t<br><b>4. 시장 및 거시 경제 분석 (Market & Macro Analysis) &#127757;</b><br>\t\t\t<br><br>\t\t\t<br>* <b>현재 시장 지표:</b> 현재 주가는 어떤 수준인가? 시장에서는 이 회사를 어떻게 평가하고 있는가? (고평가/저평가)<br>\t\t\t<br>* <b>거시 경제 영향:</b><br>\t\t\t<br>* <b>경제 상황 비유:</b> 현재 거시 경제 상황(금리, 환율 등)이 이 회사에 미치는 영향을, 일반인도 이해하기 쉬운 비유를 들어 설명하라. (예: '순풍을 만난 배', '거센 파도를 만난 조각배')<br>\t\t\t<br>* <b>인플레이션 민감도 분석:</b><br>\t\t\t<br>* <b>비용 전가 능력(Cost Pass-through):</b> 이 회사는 원자재/인건비 상승 등의 비용 증가를 제품/서비스 가격에 성공적으로 반영하여 수익성을 방어할 수 있는가?<br>\t\t\t<br>* <b>환경 대응:</b> 고인플레이션 환경이 이 기업의 특정 사업 부문에 오히려 기회(ex: 에너지 절감 솔루션 수요 증가)로 작용하는가?<br>\t\t\t<br><br>\t\t\t<br><b>5. 기술적 분석 & 투자 전략 (Technical & Investment Strategy) &#128200;</b><br>\t\t\t<br><br>\t\t\t<br>* <b>주가 차트 신호:</b> 현재 주가의 기술적 흐름은 어떠한가? (추세, 지지/저항선 등)<br>\t\t\t<br>* <b>핵심 투자 전략:</b><br>\t\t\t<br>* <b>'가장 낙관적인 시나리오(Best Case)'의 핵심 근거:</b> 이 주식에 투자해야 하는 가장 매력적인 이유는 무엇인가?<br>\t\t\t<br>* <b>'가장 비관적인 시나리오(Worst Case)'의 핵심 근거:</b> 이 주식 투자의 가장 큰 리스크는 무엇인가?<br>\t\t\t<br>* <b>행동 경제학적 관점:</b><br>\t\t\t<br>* <b>시장 심리 분석:</b> 현재 시장 참여자들은 이 주식에 대해 어떤 <b>심리적 편향(Psychological Bias)</b>을 보이고 있는가? (예: 최근 성과에 대한 과신, 손실 회피, 유명세에 따른 쏠림 현상 등)<br>\t\t\t<br>* <b>역발상 기회:</b> 시장의 비합리적인 공포나 탐욕이 만들어낸 투자 기회는 없는가?<br>\t\t\t<br><br>\t\t\t<br><b>6. 운영진 분석 (Management Analysis) &#128104;‍&#128188;</b><br>\t\t\t<br><br>\t\t\t<br>* <b>주요 인물과 리더십:</b> 누가 이 배를 이끌고 있는가? 경영진은 믿을 만하고 비전이 있는가?<br>\t\t\t<br>* <b>주주 이해관계 일치 분석:</b><br>\t\t\t<br>* <b>보상 구조:</b> 경영진의 보상(급여, 보너스, 스톡옵션 등)이 단기 실적보다는 장기적인 주주가치 상승과 잘 연계되어 있는가?<br>\t\t\t<br>* <b>자사주 매입/매도:</b> 경영진이 꾸준히 자사주를 매입하고 있는가, 아니면 대량으로 매도하고 있는가?<br>\t\t\t<br>* <b>조심할 점:</b> 경영진과 관련된 리스크는 없는가? (오너 리스크, 잦은 경영진 교체 등)<br>\t\t\t<br><br>\t\t\t<br><b>7. 시나리오별 결론 (Scenario-specific Conclusion) &#128161;</b><br>\t\t\t<br><br>\t\t\t<br>* <b>시나리오 종합 판단:</b> 이 시나리오(강세/약세/기본) 하에서, 이 투자는 매력적인가?<br>\t\t\t<br>* <b>SWOT 요약:</b> 이 시나리오의 핵심 강점/약점/기회/위협은 무엇인가?<br>\t\t\t<br>* <b>핵심 포인트:</b> 이 시나리오가 현실화될 경우, 투자자가 반드시 기억해야 할 가장 중요한 포인트는 무엇인가?<br>\t\t\t<br><br>\t\t\t<br>---<br>\t\t\t<br><br>\t\t\t<br>#### <b>8. 최종 보고서 작성 (Final Report Generation)</b><br>\t\t\t<br><br>\t\t\t<br>`### '0. 분석 전략 수립'의 4단계 결과물에 대한 최종 출력 형식입니다. ###`<br>\t\t\t<br><br>\t\t\t<br>* <b>핵심 요약:</b> 세 가지 시나리오 분석과 자기 비판 과정을 거쳐 도출된 최종 투자 의견을 한두 문장으로 요약한다.<br>\t\t\t<br>* <b>시나리오별 분석 요약:</b><br>\t\t\t<br>* <b>강세(Bull Case) 시나리오:</b> 핵심 근거와 예상 주가 범위<br>\t\t\t<br>* <b>약세(Bear Case) 시나리오:</b> 핵심 리스크와 예상 주가 범위<br>\t\t\t<br>* <b>기본(Base Case) 시나리오:</b> 가장 가능성 높은 전망과 예상 주가 범위<br>\t\t\t<br>* <b>종합 투자 의견 및 전략:</b><br>\t\t\t<br>* <b>최종 결론:</b> 각 시나리오의 발생 가능성을 고려했을 때, 최종 투자 등급(예: 강력 매수, 중립, 비중 축소)은 무엇인가?<br>\t\t\t<br>* <b>투자 전략:</b> 어떤 조건이 충족되었을 때 매수/매도해야 하는가? 주요 모니터링 지표는 무엇인가?<br>\t\t\t<br>* <b>분석 신뢰도 및 핵심 변수:</b><br>\t\t\t<br>* 이 전체 분석의 신뢰도를 스스로 평가하고, 예측에 가장 큰 영향을 미칠 수 있는 <b>가장 불확실한 단 하나의 변수</b>가 있다면 무엇인지 명시하라.<br>\t\t<br>\t\t<br>\t\t\t<br>7가지 ChatGPT 프롬프트로 주식 리서치 수준 업그레이드<br>\t\t\t<br><br>\t\t\t<br>AI를 애널리스트&#183;리스크 매니저&#183;전략가처럼<br>\t\t\t<br>역할을 부여할 때 만들어진다 &#129327;<br>\t\t\t<br><br>\t\t\t<br>1️⃣ 개인 전담 애널리스트<br>\t\t\t<br>• 기업 펀더멘털&#183;재무비율&#183;비즈니스 모델 분석<br>\t\t\t<br>• 경영진 역량 & 경쟁 우위 평가<br>\t\t\t<br>• 장기 성장 가능성 구조화<br>\t\t\t<br><br>\t\t\t<br>2️⃣ 기술적 차트 해부<br>\t\t\t<br>• 이동평균&#183;RSI&#183;MACD<br>\t\t\t<br>• 추세선&#183;지지/저항&#183;거래량<br>\t\t\t<br>• 예측 없이 가능한 시나리오만 정리<br>\t\t\t<br><br>\t\t\t<br>3️⃣ 트레이딩 전략 시뮬레이터<br>\t\t\t<br>• 스윙 / 단타 / 포지션 전략 비교<br>\t\t\t<br>• 시장 상황별 행동 시뮬레이션<br>\t\t\t<br>• 리스크 수준에 따른 차이 분석<br>\t\t\t<br><br>\t\t\t<br>4️⃣ 개인 리스크 매니저<br>\t\t\t<br>• 종목 추천 ❌<br>\t\t\t<br>• 비중&#183;기간&#183;리스크 관리 기준 설계<br>\t\t\t<br>• 개인 성향&#183;목표 기반 구조화<br>\t\t\t<br><br>\t\t\t<br>5️⃣ AI 주식 스크리너<br>\t\t\t<br>• 고품질 종목 선별 체크리스트 생성<br>\t\t\t<br>• 밸류에이션&#183;성장성&#183;재무 안정성<br>\t\t\t<br>• 특정 종목에 직접 적용<br>\t\t\t<br><br>\t\t\t<br>6️⃣ 뉴스 영향 분석기<br>\t\t\t<br>• 뉴스가 종목/섹터에 미치는 영향 분석<br>\t\t\t<br>• 단기 vs 장기 시나리오 분리<br>\t\t\t<br>• 매수&#183;매도 조언 없이 균형 유지<br>\t\t\t<br><br>\t\t\t<br>7️⃣ 데일리 마켓 브레인<br>\t\t\t<br>• 하루 10분 시장 루틴 설계<br>\t\t\t<br>• 지수 → 뉴스 → 관심 종목 → 차트 → 리스크<br>\t\t\t<br>• 꾸준히 실행 가능한 구조",
    "w": 400
  }
];

let cards = [];
let moving = null, resizing = null;

function loadBoard() {
  const saved = localStorage.getItem(SAVE_KEY);
  cards = saved ? JSON.parse(saved) : DEFAULT_CARDS.map(c => ({...c}));
  renderCards();
  if (!saved) autoLayout();
}

function autoLayout() {
  const GAP = 14;
  const boardW = document.getElementById('board').offsetWidth;
  const cols = Math.max(1, Math.floor(boardW / 280));
  const colW = (boardW - GAP * (cols - 1)) / cols;
  const colHeights = new Array(cols).fill(0);
  const allCards = document.querySelectorAll('.card');
  const images = document.querySelectorAll('.card img');
  let loaded = 0;
  const total = images.length;

  function place() {
    allCards.forEach((el, i) => {
      const card = cards[i];
      const w = Math.min(card.w || colW, colW);
      let minCol = 0;
      for (let c = 1; c < cols; c++) if (colHeights[c] < colHeights[minCol]) minCol = c;
      card.x = minCol * (colW + GAP);
      card.y = colHeights[minCol];
      card.w = w;
      el.style.left = card.x + 'px';
      el.style.top = card.y + 'px';
      el.style.width = w + 'px';
      colHeights[minCol] = card.y + el.offsetHeight + GAP;
    });
    document.getElementById('board').style.minHeight = Math.max(...colHeights) + 100 + 'px';
    saveBoard();
  }

  if (total === 0) requestAnimationFrame(place);
  else images.forEach(img => {
    if (img.complete) { loaded++; if (loaded >= total) requestAnimationFrame(place); }
    else img.onload = img.onerror = () => { loaded++; if (loaded >= total) requestAnimationFrame(place); };
  });
}

function syncText() {
  document.querySelectorAll('.card').forEach(el => {
    const idx = +el.dataset.idx;
    if (cards[idx]?.type === 'text') {
      const t = el.querySelector('.text');
      if (t) cards[idx].content = t.innerHTML;
    }
  });
}

function saveBoard() {
  syncText();
  localStorage.setItem(SAVE_KEY, JSON.stringify(cards));
  document.getElementById('status').textContent = '저장됨 ' + new Date().toLocaleTimeString();
}

function renderCards() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  cards.forEach((card, i) => {
    const el = document.createElement('div');
    el.className = 'card';
    el.dataset.idx = i;
    if (card.x !== undefined) el.style.left = card.x + 'px';
    if (card.y !== undefined) el.style.top = card.y + 'px';
    if (card.w) el.style.width = card.w + 'px';

    el.addEventListener('mousedown', e => {
      if (e.target.closest('.text, a, .card-btn, .resize-handle, table')) return;
      e.preventDefault();
      moving = { idx: i, startX: e.clientX, startY: e.clientY, origX: card.x || 0, origY: card.y || 0 };
      el.classList.add('moving');
    });

    const actions = document.createElement('div');
    actions.className = 'card-actions';
    const delBtn = document.createElement('button');
    delBtn.className = 'card-btn'; delBtn.textContent = '×';
    delBtn.onclick = e => { e.stopPropagation(); if (confirm('삭제?')) { cards.splice(i, 1); renderCards(); saveBoard(); } };
    actions.appendChild(delBtn);
    el.appendChild(actions);

    if (card.type === 'text') {
      const text = document.createElement('div');
      text.className = 'text';
      text.contentEditable = true;
      text.innerHTML = card.content || '';
      text.addEventListener('blur', () => { card.content = text.innerHTML; saveBoard(); });
      el.appendChild(text);
    } else if (card.type === 'image') {
      const src = card.src.startsWith('http') || card.src.startsWith('data:') ? card.src : IMG_BASE + card.src;
      const img = document.createElement('img');
      img.src = src;
      img.alt = card.alt || '';
      img.loading = 'lazy';
      img.onerror = () => img.style.display = 'none';
      if (card.link) {
        const a = document.createElement('a'); a.href = card.link; a.target = '_blank';
        a.appendChild(img); el.appendChild(a);
      } else { el.appendChild(img); }
      if (card.caption) {
        const cap = document.createElement('div');
        cap.className = 'caption';
        cap.textContent = card.caption;
        el.appendChild(cap);
      }
    } else if (card.type === 'table') {
      const wrapper = document.createElement('div');
      wrapper.style.overflowX = 'auto';
      wrapper.innerHTML = card.html || '';
      el.appendChild(wrapper);
    }

    const rh = document.createElement('div');
    rh.className = 'resize-handle';
    rh.addEventListener('mousedown', e => {
      e.preventDefault(); e.stopPropagation();
      resizing = { idx: i, startX: e.clientX, startW: card.w || el.offsetWidth };
    });
    el.appendChild(rh);
    board.appendChild(el);
  });

  requestAnimationFrame(() => {
    let maxBottom = 0;
    document.querySelectorAll('.card').forEach(el => {
      const b = (parseFloat(el.style.top) || 0) + el.offsetHeight;
      if (b > maxBottom) maxBottom = b;
    });
    board.style.minHeight = (maxBottom + 100) + 'px';
  });
}

document.addEventListener('mousemove', e => {
  if (moving) {
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`);
    if (!el) return;
    const nx = moving.origX + e.clientX - moving.startX;
    const ny = moving.origY + e.clientY - moving.startY;
    el.style.left = nx + 'px';
    el.style.top = ny + 'px';
  }
  if (resizing) {
    const card = cards[resizing.idx];
    card.w = Math.max(100, resizing.startW + e.clientX - resizing.startX);
    const el = document.querySelector(`.card[data-idx="${resizing.idx}"]`);
    if (el) el.style.width = card.w + 'px';
  }
});

document.addEventListener('mouseup', e => {
  if (moving) {
    const card = cards[moving.idx];
    card.x = Math.max(0, moving.origX + e.clientX - moving.startX);
    card.y = Math.max(0, moving.origY + e.clientY - moving.startY);
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`);
    if (el) { el.classList.remove('moving'); }
    moving = null; saveBoard();
  }
  if (resizing) { resizing = null; saveBoard(); }
});

function addTextCard() {
  cards.push({ type: 'text', content: '', x: 50, y: window.scrollY + 100, w: 300 });
  renderCards();
  setTimeout(() => { const els = document.querySelectorAll('.card .text'); els[els.length - 1]?.focus(); }, 100);
}

function addImageCard() {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = 'image/*';
  input.onchange = e => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = () => { cards.push({ type: 'image', src: reader.result, x: 50, y: window.scrollY + 100, w: 240 }); renderCards(); saveBoard(); };
    reader.readAsDataURL(file);
  };
  input.click();
}

function resetLayout() {
  if (!confirm('자동 재배치합니다. 현재 위치가 변경됩니다.')) return;
  cards.forEach(c => { delete c.x; delete c.y; });
  renderCards(); autoLayout();
}

setInterval(saveBoard, 30000);
loadBoard();
</script>
</body>
</html>
