<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>自警文</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #1e1e1e;
  color: #e0e0e0;
  font-family: 'Segoe UI', -apple-system, sans-serif;
  font-size: 15px;
  line-height: 1.6;
  padding: 20px 30px 60px;
  overflow-x: hidden;
}
a { color: #6cb0f6; text-decoration: none; }
a:hover { text-decoration: underline; }
.title-bar {
  background: #3a3a5c;
  display: inline-block;
  padding: 6px 16px;
  font-size: 22px;
  font-weight: bold;
  color: #fff;
  margin-bottom: 4px;
}
.date { color: #999; font-size: 13px; margin-bottom: 20px; }
.board { position: relative; }
.card {
  background: #2a2a2a;
  border: 1px solid #3a3a3a;
  border-radius: 8px;
  padding: 12px;
  position: absolute;
  cursor: grab;
  transition: box-shadow 0.15s;
  overflow: hidden;
}
.card:hover { box-shadow: 0 0 0 1px #58a6ff; z-index: 10; }
.card.moving { opacity: 0.8; box-shadow: 0 4px 24px rgba(0,0,0,0.6); z-index: 100; cursor: grabbing; }
.card img { width: 100%; border-radius: 4px; display: block; }
.card .caption { font-size: 12px; color: #888; margin-top: 6px; }
.card .text { outline: none; min-height: 20px; white-space: pre-wrap; word-break: break-word; }
.card .text:focus { background: rgba(255,255,255,0.05); border-radius: 4px; padding: 4px; }
.card .text:empty::before { content: '텍스트 입력...'; color: #555; }
.card table { border-collapse: collapse; width: 100%; font-size: 13px; }
.card table td, .card table th { border: 1px solid #444; padding: 4px 8px; vertical-align: top; }
.card table th { background: #333; color: #ccc; }
.card-actions { position: absolute; top: 4px; right: 4px; display: none; gap: 4px; }
.card:hover .card-actions { display: flex; }
.card-btn { background: #333; border: 1px solid #555; color: #ccc; border-radius: 4px; padding: 2px 6px; font-size: 11px; cursor: pointer; }
.card-btn:hover { background: #444; color: #fff; }
.resize-handle { position: absolute; bottom: 0; right: 0; width: 16px; height: 16px; cursor: se-resize; opacity: 0; }
.card:hover .resize-handle { opacity: 0.6; }
.resize-handle::after { content: ''; position: absolute; bottom: 3px; right: 3px; width: 8px; height: 8px; border-right: 2px solid #666; border-bottom: 2px solid #666; }
.toolbar { position: fixed; bottom: 0; left: 0; right: 0; background: #161b22; border-top: 1px solid #30363d; padding: 8px 20px; display: flex; gap: 12px; align-items: center; z-index: 200; }
.toolbar button { background: #21262d; border: 1px solid #30363d; color: #e0e0e0; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; }
.toolbar button:hover { background: #30363d; }
.toolbar .status { color: #8b949e; font-size: 12px; margin-left: auto; }
.highlight-red { color: #ff6b6b; }
.highlight-blue { color: #6cb0f6; }
</style>
</head>
<body>
<div class="title-bar">自警文</div>
<div class="date">2012년 4월 1일 일요일</div>
<div class="board" id="board"></div>
<div class="toolbar">
  <button onclick="addTextCard()">+ 텍스트</button>
  <button onclick="addImageCard()">+ 이미지</button>
  <button onclick="saveBoard()">💾 저장</button>
  <button onclick="resetLayout()">↺ 재배치</button>
  <span class="status" id="status">Ready</span>
</div>
<script>
const SAVE_KEY = 'board--';
const IMG_BASE = '../../attachments/';
const DEFAULT_CARDS = [
  {
    "type": "text",
    "content": "自警文<br>\t\t<br>\t\t<br>\t<br>\t<br>\t\t<br>\t\t\t<br>\t\t\t\t<br>기획단에 있는 마케터에게 가장 중요한 역량은<br>\t\t\t\t<br>내부 마케팅이다.<br>\t\t\t\t<br><br>\t\t\t\t<br>현격한 창의도 결국 컨펌이 나지 않으면<br>\t\t\t\t<br>세상의 빛을 보지 못한다.<br>\t\t\t\t<br><br>\t\t\t\t<br>결국 매 의사결정의 단계에<br>\t\t\t\t<br>가능한 많은 이해관계자들의 중지를 모아서<br>\t\t\t\t<br>내 아이디어가 아닌 우리의 아이디어로 만들어 내는 것이다.<br>\t\t\t\t<br><br>\t\t\t\t<br>결국,<br>\t\t\t\t<br>내가 시작한 싸움이지만<br>\t\t\t\t<br>우리가 끝내야 할 싸움이 되는 것이고.<br>\t\t\t\t<br>이를 명분이라고 한다.<br>\t\t\t\t<br><br>\t\t\t\t<br>그 과정에서<br>\t\t\t\t<br>아르마딜로의 표면처럼 매끄러운 로직,<br>\t\t\t\t<br>열정의 전도시켜 모두의 온도를 맞추는 일,<br>\t\t\t\t<br><br>\t\t\t\t<br>내 것이 아닌,<br>\t\t\t\t<br>우리의 것으로 만드는 것.<br>\t\t\t\t<br><br>\t\t\t\t<br>때로 파트장의 접근법과 내 로직이 다를때<br>\t\t\t\t<br>팀장에게 바로 보고하고 피드백 받아<br>\t\t\t\t<br>찍어 누르는 정치력도 필요하고,<br>\t\t\t\t<br>그들이 모르는 정보를 서칭하고 인사이트를 얻어서<br>\t\t\t\t<br>신뢰를 득하고 이니세이티브를 가져가는 일도 필요하다.<br>\t\t\t\t<br><br>\t\t\t\t<br>일요일이란 나에게 쉬는 날이 아닌<br>\t\t\t\t<br>일을 하기 위해 준비하는 요일이다.<br>\t\t\t\t<br><br>\t\t\t\t<br>그러니 주말에 하루 정도는,<br>\t\t\t\t<br>가능하면 일요일 하루만큼은<br>\t\t\t\t<br>나를 위해 비워두고 싶다.<br>\t\t\t\t<br><br>\t\t\t\t<br>본부에 와서 진행한 첫 프로젝트는<br>\t\t\t\t<br>SNS에 관한 것이었고,<br>\t\t\t\t<br>두 번째 내게 떨어진 프로젝트는<br>\t\t\t\t<br>App에 관한 것이다.<br>\t\t\t\t<br><br>\t\t\t\t<br>관심을 가지면, 탐구하게 되고,<br>\t\t\t\t<br>탐구하다보면 사랑하게 되고,<br>\t\t\t\t<br>사랑하는 것에는 어느새 정통하게 된다.<br>\t\t\t\t<br>그리고 기회라는 버스는<br>\t\t\t\t<br>늘 그렇듯 준비가 충전된 사람을 태워가기 마련이다.<br>\t\t\t\t<br><br>\t\t\t\t<br>아웃라이어라는 책이 있었다. 읽어보지 않아도 될 만큼 심플하다.<br>\t\t\t\t<br>1만시간의 법칙에 관한 책이다.<br>\t\t\t\t<br>그러나 거기에서 끌어낸 시사점이<br>\t\t\t\t<br>앞으로 1만 시간이어서는 곤란하다.<br>\t\t\t\t<br><br>\t\t\t\t<br>누구나 자기도 모르게 1만 시간을 투자해온 일이 있게 마련이다.<br>\t\t\t\t<br>내가 가진 것, 흔히 말하는 '장점'을 살려야 하는 것이다.<br>\t\t\t\t<br>가지지 않은 것에 대한 집착이 우리를 더욱 잡스럽고 평범하게 만든다.<br>\t\t\t\t<br><br>\t\t\t\t<br>시니어들이 넘보지 못할 영역이 무엇인가.<br>\t\t\t\t<br>SNS였다. 그 분야 만큼은 그네들과 내가<br>\t\t\t\t<br>동일한 출발선에 서있었다.<br>\t\t\t\t<br><br>\t\t\t\t<br>2년전 나의 트위터 팔로어 수는 2만 5천명.<br>\t\t\t\t<br>당시 국내 팔로어 랭킹으로 500위권 이내였고,<br>\t\t\t\t<br>대학생으로 한정한다면 0.001% 이내였다.<br>\t\t\t\t<br>당시 국내 굴지의 기업들은 SNS 마케팅이라는<br>\t\t\t\t<br>뜨거운 감자를 들고 허둥지둥 대던 때였고,<br>\t\t\t\t<br>나는 팔로어 수만 가지고도 어느 기업에나 입사할 자신이 있었다.<br>\t\t\t\t<br><br>\t\t\t\t<br>맞팔하면 되는거 아니냐는 시큰둥한 사람도 있었다.<br>\t\t\t\t<br>맞다.<br>\t\t\t\t<br>그런데 넌 왜 하지 않았나?<br>\t\t\t\t<br>그리고 맞팔 문화란 것은 특히 한국인들이 크게 집착하는<br>\t\t\t\t<br>호혜적 관계에 대한 특성이 반영된 것이었다.<br>\t\t\t\t<br>내 팔로어 수는 그런 人sight를 가졌다는 방증일 뿐인 것이지<br>\t\t\t\t<br>수치적으로 유의미한 것은 아니었다.<br>\t\t\t\t<br><br>\t\t\t\t<br>현상에 관한 성토는 바보들의 원탁에서도 얼마든 가능하다.<br>\t\t\t\t<br>하지만 그 이면에 대한 성찰, 나아가 그 성찰에 대한 실행력이<br>\t\t\t\t<br>패권을 보장한다.<br>\t\t\t\t<br><br>\t\t\t\t<br>삶이란 결국,<br>\t\t\t\t<br>다양하게 뻗어나간 경험의 뿌리에서 시작해서<br>\t\t\t\t<br>그로부터 자라난 성찰의 줄기만큼 성장하고,<br>\t\t\t\t<br>성찰에 대한 실행력의 우직함 끝에 열매를 맺는다.<br>\t\t\t\t<br><br>\t\t\t\t<br>세피로스의 나무<br>\t\t\t\t<br><br>\t\t\t\t<br>삶이란 결국,<br>\t\t\t\t<br>다양한 경험의 스펙트럼에서 시작해서<br>\t\t\t\t<br>그로부터 길어올린 성찰의 지평만큼 성장하고,<br>\t\t\t\t<br>그 성찰에 대한 실행력의 우직함으로 판가름 난다.<br>\t\t\t\t<br><br>\t\t\t\t<br>3차원 그래프.<br>\t\t\t\t<br><br>\t\t\t\t<br><br>\t\t\t\t<br>우리가 처한 상황이 후진게 아니라<br>\t\t\t\t<br>우리가 삶을 대하는 태도가 후진 것인지도 모른다.<br>\t\t\t\t<br>맛있는 음식을 먹는다라는 것과<br>\t\t\t\t<br>음식을 맛있게 먹는다라는 것은 완전히 다른 문제니까….<br>\t\t\t\t<br><br>\t\t\t\t<br>사랑스러운 일만 하고, 사랑하기 좋은 것들만 편식하면<br>\t\t\t\t<br><br>\t\t\t\t<br><br>\t\t\t\t<br>내일은 누구보다 맛있게 아침 밥을 먹을 것이고,<br>\t\t\t\t<br>그 어떤 날보다 멋진 하루가 될 거다.<br>\t\t\t\t<br><br>\t\t\t\t<br><br>\t\t\t\t<br>그 정도와 추구하는 방식은 모두가 다르지만<br>\t\t\t\t<br>남자라면 누구나 허세가 있고,<br>\t\t\t\t<br>여자라면 누구나 허영이 있다.<br>\t\t\t\t<br>그리고 남자의 허세는 허영의 좋은 먹이다.<br>\t\t\t\t<br><br>\t\t\t\t<br>다만, 세상에는 두 종류의 남자가 있다.<br>\t\t\t\t<br>허세를 백업 할만한 노력을 쏟는 남자와<br>\t\t\t\t<br>허세, 그 세만을 갖춘 남자.<br>\t\t\t\t<br><br>\t\t\t\t<br><br>\t\t\t\t<br>많은 이들이 잡스의 프레젠테이션을 부러워하고<br>\t\t\t\t<br>그의 스킬에 주목하지만<br>\t\t\t\t<br>중요한 것은 컨텐츠다.<br>\t\t\t\t<br>자신이 딜리버리하는 컨텐츠에 대한 자신감<br>\t\t\t\t<br>That all.<br>\t\t\t\t<br><br>\t\t\t\t<br>나라도 그런 어메이징한 프로덕을 들고 연단에 선다면<br>\t\t\t\t<br>그만한 프레젠테이션을 할 수 있을 것 같다.<br>\t\t\t\t<br><br>\t\t\t\t<br><br>\t\t\t\t<br>- 조언을 듣는것의 위험성은<br>\t\t\t\t<br>결과에 대한 책임도 나눠질것이라는 막연한 기대감이 생기고<br>\t\t\t     "content": "우회로는 없다.<br>\t\t\t<br>오직 파고 파고 또 파고들어<br>\t\t\t<br>마침내 관통하고야 만다.<br>\t\t\t<br><br>\t\t\t<br>하루하루를 다큐로 살아내면<br>\t\t\t<br>삶은 드라마가 될 것이라 믿습니다.<br>\t\t\t<br>-하드코어 인생아<br>\t\t\t<br><br>\t\t\t<br>일이 좋은게 아니라 다만 매일이 나의<br>\t\t\t<br>리즈시절이었으면 하는 것 뿐이다.<br>\t\t\t<br><br>\t\t\t<br>오늘은, 아무날도 아니다<br>\t\t\t<br>내가 너를 아끼고 사랑할<br>\t\t\t<br>수 많은 나날중의 하루일 뿐이다.<br>\t\t\t<br>결혼식날<br>\t\t<br>\t\t<br>\t\t\t<br>\t\t\t\t<br>No limitation <br>\t\t\t\t<br>너 하고싶은대로 하고 살아.<br>\t\t\t\t<br>모든 스탠스를 다 바꿔<br>\t\t\t\t<br><br>\t\t\t\t<br><a href=\"https://www.youtube.com/watch?v=46chKtDaAvE&ab_channel=%EC%97%A0%EB%B9%85%EB%89%B4%EC%8A%A4\" target=\"_blank\">아직 살만한 세상..어느 접촉사고 현장의 아름다운 포옹</a><br>\t\t\t\t<br><br>\t\t\t\t<br>Remember, Raise. Not Race. 경쟁은 루저들을 위한 것이다.<br>\t\t\t\t<br>퍼포먼스와 삶의 80%를 결정짓는 요소에, 깨어있는 시간의 20%를 투자한다.<br>\t\t\t\t<br>R&D에는 시간과 자본이 투입된다. 수입과 시간의 20%를 확보하라.<br>\t\t\t\t<br>목표와 무관한 모든 것을, 포기하라.￼Hope the best Plan for the worst.<br>\t\t\t\t<br><br>\t\t\t\t<br>- 지워낼수는 없더라, 살아온 시간들을. 다만 갚아나갈뿐<br>\t\t\t\t<br>- 호기심은 비싸다. 하지만 그만한 가치가 있지<br>\t\t\t\t<br>- 최선을 희망하되, 최악을 상정하라. Plan B는 현실의 Action A다<br>\t\t\t\t<br>- 기회는 남이 줄 수 있지만, 증명은 내가 해야 한다.<br>\t\t\t\t<br>- \"태양아래 새로운 것은 없다.\"<br>\t\t\t\t<br>새로운 것은 없다.<br>\t\t\t\t<br>새로운 실행만이 있을 뿐.<br>\t\t\t\t<br>- Game On World<br>\t\t\t\t<br>- \"의미가 없다면, 몰입도 없다.\"<br>\t\t\t\t<br>- 현란한 개인기(응용기)는 결국<br>\t\t\t\t<br>탄탄한 기본기로부터 나온다.<br>\t\t\t\t<br>- 자유란, 나 말고는 누구도 만족시키지 않아도 되는 상태<br>\t\t\t\t<br>- 성공은 성공에 대한 강박으로 부터 벗어난 것이다.<br>\t\t\t\t<br>- 성공보다 성장<br>\t\t\t\t<br>- 사람이 성실과 재능의 줄을 잡고 가다가도 가끔 동아줄을 잡고가다보면 그 줄을 잡기위해 기존 줄을 놓친다<br>\t\t\t\t<br>- 권력의 정점은 봄처럼 짧다<br>\t\t\t\t<br>- 놓쳐버린 기회가 아까울 때는<br>\t\t\t\t<br>내가 그걸 잡을 자격이 있었을 때 뿐<br>\t\t\t\t<br>- 두려움을 극복하는 지름길은,<br>\t\t\t\t<br>저벅저벅.<br>\t\t\t\t<br>그 두려움 안으로 걸어들어가<br>\t\t\t\t<br>관통하는 길 뿐이다.<br>\t\t\t\t<br>- 나는, 축적의 힘을 믿는 사람입니다.<br>\t\t\t\t<br>- 기다리는 자에게 기회는 오지 않는다.<br>\t\t\t\t<br>앞서간 이들이 남겨두고간 기회의 잔해들만 있을뿐<br>\t\t\t\t<br>- 나는 그저, 내 매일이 나의 리즈시절이었으면 하는 것 뿐입니다.<br>\t\t\t\t<br>어제보다 오늘 더 나아졌다는 믿음으로 잠자리에 들길 원하는 것 뿐이에요.<br>\t\t\t\t<br>- 사기캐릭이 되고 싶어 노력하는 평범남.<br>\t\t\t\t<br>- 상어, 바람, 시지프스, 자전거 멈추면 죽는다.<br>\t\t\t\t<br>- 적당히 하면, 적당해질 뿐이다.<br>\t\t\t\t<br>- 자아를 비워내고 되도록 넋 없이 살며<br>\t\t\t\t<br>철 없이 웃고 부당하게 느껴지더라도<br>\t\t\t\t<br>그것이 순리라면 따르라<br>\t\t\t\t<br>대저, 저항하여 이기지 못하면<br>\t\t\t\t<br>부러지기 마련이다.<br>\t\t\t\t<br>그 때에는 기회도 없다.<br>\t\t\t\t<br>비겁함을 전략으로 삼는 우리 세대의 게릴라전이다.<br>\t\t\t\t<br><br>\t\t\t\t<br>\t\t\t\t\t<br>\t\t\t\t\t\t<br>Meet Someone<br>\t\t\t\t\t\t<br>Read Anything<br>\t\t\t\t\t\t<br>Travel Anywhere<br>\t\t\t\t\t\t<br>\t\t\t\t\t<br>\t\t\t\t<br>\t\t\t\t<br><br>\t\t\t\t<br>- 나도 회사를 버릴 수 있어야 한다.<br>\t\t\t\t<br>- 아리스토텔레스 \"현재의 나는 그동안 반복적으로 한 행동의 결과물이다. 따라서 탁월함이란 행동이 아니라 습관에서 비롯된다.\"<br>\t\t\t\t<br>- 오늘의 나를 있게 한 그것을 포기하라.<br>\t\t\t\t<br>- 기다리는 자에게 복이 있나니,<br>\t\t\t\t<br>그렇다. 서두른 자들이 남기고 간 기회일 뿐<br>\t\t\t\t<br>- 인생은 선택의 연속이다.<br>\t\t\t\t<br>이 말을 환언하자면, 인생은 포기의 연속이다.<br>\t\t\t\t<br>우리가 무언가를 선택하는 순간 다른 무언가를 포기하기 때문이다. 선배들은 선택과 집중의 오의는 포기에 있다 가르쳤고,<br>\t\t\t\t<br>그 가르침은 심중 깊은 곳이 아닌, 나의 매일에 부유한다.<br>\t\t\t\t<br>포기가 먼저다. 선택하고나서 포기하면,<br>\t\t\t\t<br>포기한다 생각했던것들에 대한 미련탓에<br>\t\t\t\t<br>집중할 수 없다.<br>\t\t\t\t<br>포기해야 선택할 수 있고,<br>\t\t\t\t<br>선택해야 집중할 수 있으며,<br>\t\t\t\t<br>집중해야 마침내 관통할 수 있다.<br>\t\t\t\t<br>- 멋진 미래는,<br>\t\t\t\t<br>- 비루했던 과기에 대한 가장 훌륭한 변명이다.<br>\t\t\t\t<br>- 나를 정말 위협하는 것은<br>\t\t\t\t<br>지금의 이 편안함이다.<br>\t\t\t\t<br>당장 위협적이지 않은 위험이야 말로<br>\t\t\t\t<br>정말 치명적이듯이 이 안정과 만족이<br>\t\t\t\t<br>나의 도전을 가로막고 가능성을 제한한다.<br>\t\t\t\t<br>월급쟁이는 월급덕분에 살아가지만<br>\t\t\t\t<br>결국 월급때문에 월급쟁이로 죽는다.<br>\t\t\t\t<br>칼끝을 핥는 늑대<br>\t\t\t\t<br>만족하고 안정적이기 때문에<br>\t\t\t\t<br>이 다음의 목표를 설정하지 않고<br>\t\t\t\t<br>목표가 없기에 도전할 수 없고<br>\t\t\t\t<br>성장할 수 없고 퇴보하고 노화되어<br>\t\t\t\t<br>죽어가는 것이다.<br>\t\t\t\t<br>인생이 허무 할 때는<br>\t\t\t\t<br>이룬게 없을 때가 아니라<br>\t\t\t\t<br>이룬다고 이뤄놓은 것들이 실은<br>\t\t\t\t<br>내가 원하던 것이 아니라는걸 깨달았을 때<br>\t\t\t\t<br>- 행복은  효율에 관한 문제가 아니다.<br>\t\t\t\t<br>- \"네가 소유하려고 애쓰는 것이,<br>\t\t\t\t<br>끝내 너를 소유하게 될 것이다.\"<br>\t\t\t\t<br>네가 가장 애착을 가지고 있는 것이<br>\t\t\t\t<br>너의 가장 큰 약점이 될 것이다.<br>\t\t\t\t<br>- 쿨해지고 싶다고해서, 무례를 범할 필요는 없다<br>\t\t\t\t<br>- 헌신이 헌신짝이 될 수도 있는 것이 조직이다.<br>\t\t\t\t<br>그것은 내가 선택할 수 있는 문제가 아니다.<br>\t\t\t\t<br>그러나 어느 조직에서 헌신이 될지는 내가 선택할 문제다.<br>\t\t\t\t<br>- 순간의 최선이<br>\t\t\t\t<br>인생 전체로 놓고 보면 최선이 아닐 수 있고<br>\t\t\t\t<br>악수라고 생각했던 선택이<br>\t\t\t\t<br>뒤돌아보면 큰 기회였던적도 있었다.<br>\t\t\t\t<br>일희는 일비로 돌아오고<br>\t\t\t\t<br>일비는 일희로 뒤바뀐다.<br>\t\t\t\t<br>멀리봐야 한다<br>\t\t\t\t<br>- 빠르게, 더 빠르게 변해간다.<br>\t\t\t\t<br>기존에 가지고 있던 무기로는 싸워낼 수 없을 것이다.<br>\t\t\t\t<br>- 인류는 지구에서 태어났지만, <br>\t\t\t\t<br>이것이 지구에서 죽어야 함을 의미하진 않아. (쿠퍼)<br>\t\t\t\t<br>- 샐러던트로 산다는 것.<br>\t\t\t\t<br>- 박수칠 때 떠난다.<br>\t\t\t\t<br>- I NEED A ROCKET<br>\t\t\t\t<br>- No more honoer<br>\t\t\t\t<br>No more regrets<br>\t\t\t\t<br>- 원래 그랬던 것은 원래 없고<br>\t\t\t\t<br>절대적인 것은 절대로 없으며<br>\t\t\t\t<br>영원한 것은 영원히 없습니다. <br>\t\t\t\t<br>- 결국 일하는 능력의 차이를 가져오는 것은 Girt(투지)와 기백인 것 같다.<br>\t\t\t\t<br>그러한 성격적인 요소가 결국 일 잘하는 사람과 그렇지 않은 사람을 가른다.<br>\t\t\t\t<br>왜냐하면, 우리가 하는 일은 몇 광년 너머로 탐사선을 쏘아 보낸다던가,<br>\t\t\t\t<br>세계 7대 수학난제에 매일 메달리는 일이 아니기 때문이다.<br>\t\t\t\t<br>- 주니어에게 있어 퍼포먼스란 곧, 애티튜드이고, 애티튜드가 곧 퍼모먼스이다.<br>\t\t\t\t<br>퍼포먼스라 쓰고 애티튜드라 읽어야 한다.<br>\t\t\t\t<br>기여하고 싶고 인정받고 싶고 뭔가를 보여주고 싶어서<br>\t\t\t\t<br>성장이 아닌 성과에 욕심을 내기 시작하면, 알량한 깊이가<br>\t\t\t\t<br>몇 년 이내에 밑천을 드러내게 될지도 모른다.<br>\t\t\t\t<br>- 전략을 짜는것은 두뇌지만<br>\t\t\t\t<br>그것이 실행되도록 하는것은 용기다.<br>\t\t\t\t<br>- 독서는 남자가 자신의 아버지를 뛰어넘을 수 있는<br>\t\t\t\t<br>거의 유일한 방법이다. <br>\t\t\t\t<br>- 우리에게 안정과 안전을 주는 것은 동시에<br>\t\t\t\t<br>본연의 힘을 속박하고 약해지게 만들기도 하는 법이다.<br>\t\t\t\t<br>- 직장인의 성장에 가장 큰 적은 사실 부족한 시간이 아니다.<br>\t\t\t\t<br>안정된 월급과 힐링과 행복과, 남들과 동등한 수준의 삶의 질, 지인들과의 술자리 <br>\t\t\t\t<br>나는 그것을 좀 포기한 대가로 <br>\t\t\t\t<br>- 원점사고, 영점 조정 : 항상 상황과 변수가 변화하므로 이에 맞춰<br>\t\t\t\t<br>목표는 물론 모든 것을 재점검<br>\t\t\t\t<br>- 테나시티<br>\t\t\t\t<br>- 마태효과. 무릇 모든 차이는 시간에 비례해 더욱 커지게 마련이다.<br>\t\t\t\t<br>- 불가능이란 없고, 다만 어려움이 있을 뿐입니다.<br>\t\t\t\t<br>- 이 곳은 너무도 빠르게 변해가는데<br>\t\t\t\t<br>서서히 개선하니까 서서히 죽어가는 것이다.<br>\t\t\t\t<br>혁신은 하면 좋으니까 하는게 아니라<br>\t\t\t\t<br>무엇도 버리지 않고, 무엇도 파괴하지 않고<br>\t\t\t\t<br>이룰 수 있는 것은 혁신이 아니다.<br>\t\t\t\t<br>혁신의 장물은 그럭저럭 \t\t\t\t<br>사내들 사이에선 효과적인 방법이다. 두 가지를 겸비한다면 그게 최고다.<br>\t\t\t\t<br>- 기존의 것을 두고 사고하면 그것은 개선의 범주를 벗어나기 어렵다.<br>\t\t\t\t<br>- 혁신을 원한다면 그 대상을 혁신하라.<br>\t\t\t\t<br>- 좋은말이 항상 옳은말 일순 없다.<br>\t\t\t\t<br>- 크게 꿈꿔라, 큰것을 경험하면 나도 커진다.<br>\t\t\t\t<br>- 오늘은 어제 내가 포기한 것들이 준 선물이다.<br>\t\t\t\t<br>- 기존의 무언가를 제한하려면<br>\t\t\t\t<br>그를 대체할 대안을 제시해야한다<br>\t\t\t\t<br>- 룰을 우회해서 판을 전복하라<br>\t\t\t\t<br>- 위험한길 그래서 남들이 가지 않는 길<br>\t\t\t\t<br>한적한 길 나만의 궤적을 그려나갈 수 있는 길<br>\t\t\t\t<br>- 만나고 싶은 내 모습을 만나는 것이야말로, 인생 최고의 여행이다.<br>\t\t\t\t<br>- 고수간의 싸움일 수록 난타보다는 한순간의 빈틈으로 판가름 난다.<br>\t\t\t\t<br>- 내 전투의 치열함은 선배들의 그것과 같을지 모르나,<br>\t\t\t\t<br>선배들의 그것보다는 훨씬 진보한 무기로 치뤄질 것이다. 내 강점을 돌이켜 본다.<br>\t\t\t\t<br>- 진짜 제대로 혼자여본적이나 있나<br>\t\t\t\t<br>- 무엇을 갈망 해야 하는지 분명치 않을 때<br>\t\t\t\t<br>그것이야말로 공포이자 공허<br>\t\t\t\t<br>- 미칠 것이 없으면 미칠것 같은게 바로 미친 놈들<br>\t\t\t\t<br>Why not?<br>\t\t\t\t<br>Why so?<br>\t\t\t\t<br>So what?<br>\t\t\t\t<br>Just Do it.<br>\t\t\t\t<br>- 여긴 베이스캠프고, 난 연습생이니까.<br>\t\t\t\t<br>- 사과하고 싶다. 나 자신에게.<br>\t\t\t\t<br>- 긍정적 사고는 대체로 유용하다. 하지만 긍정적 계획은 대체로 위험하다.<br>\t\t\t\t<br>- 내게 필요한 것은 긍정적 결과이지, 낙천적 방임이 아니다<br>\t\t\t\t<br>- 아무나, 내 아들의 어머니여선 안되니까.<br>\t\t\t\t<br>- 미안하지만 나는 어장에는 살 수 없는 어족입니다.<br>\t\t\t\t<br>- 이빨을 드러내지 말아, 물어뜯는 그 순간 전까지는<br>\t\t\t\t<br>- 사람들이 얼음위에서 넘어지는 이유는 걸으려하기 때문이<br>\t\t\t\t<br>- 다 얼음위에서는 미끄러져야한다<br>\t\t\t\t<br>- 문제적 순정파의, 씩씩한 짝사랑. 왜? 싫어?<br>\t\t\t\t<br>- 갖고 싶은 것과 소중한 것, 갈망하는 것과 잃어선 안될 것<br>\t\t\t\t<br>- 겁낼 필요는, 없다고<br>\t\t\t\t<br>- 어짜피 이 모든 것은, 한 판 게임일 뿐이다.<br>\t\t\t\t<br>- \"내가 SK텔레콤에서 최고의 마케터로 인정받기 까지는 3년이 걸렸다.\"라고 회고할 수 있는 날을<br>\t\t\t\t<br>열망한다.<br>\t\t\t\t<br>- 최고가 되길 원한다면, 최고의 노력부터 보여줘라<br>\t\t\t\t<br>- 세상은 나 같은 삼류에게 아무것도 기대하지 않는다.<br>\t\t\t\t<br>세상이 나에게 무엇을 기대하는지는 하나도 중요하지 않다.<br>\t\t\t\t<br>정말 중요한 것은 내가 나에게 무엇을 기대하는가 이다.<br>\t\t\t\t<br>- 창발정신<br>\t\t\t\t<br>- 원하면, 구하라, 세상은 다 준다.<br>\t\t\t\t<br>- 하나의 패턴이 무너질 때, 그것은 기회가 된다.<br>\t\t\t\t<br>- 위기는 능력을 발휘할 기회다<br>\t\t\t\t<br>- 어제의 정답에 머물지 마라<br>\t\t\t\t<br>- 싸움에서 이길 수 없다면, 전장을 바꿔라.<br>\t\t\t\t<br>- 그 누가, 그 무엇을 내게 가져다 준다 해도<br>\t\t\t\t<br>지금 이 시절의 나와, 바꾸고 싶지 않다.<br>\t\t\t\t<br>- 난 내게도 날개가 필요한 줄 알았는데, 내가 가진 건 사실 아가미였다. 나의 전장이 있는 법.<br>\t\t\t\t<br>- 전투 방법과 전장은, 내가 정한다.<br>\t\t\t\t<br>- 폭탄과 창의의 공통점은 그것이 터지기 전까지는 얼마나 Impact가 있는지 알 수 없다는 점이다.<br>\t\t\t\t<br>- 진화의 변곡점엔 늘 돌연변이가 있었다.<br>\t\t\t\t<br>- 세상에는 쓰여지지 않아도 좋았을 책이 너무 많다.<br>\t\t\t\t<br>- 살사구시, 김살사!<br>\t\t\t\t<br>- 은신이어든 현험이라<br>\t\t\t\t<br>- 목표의식과 테마로 차별화 하라.<br>\t\t\t\t<br>- 대체될 수 없도록 차별화 하라.<br>\t\t\t\t<br>- 나이와 직급이 올라갈 수록<br>\t\t\t\t<br>일깨워줄 사람이 적어지고<br>\t\t\t\t<br>자기검열에 치열한 자가 아니면<br>\t\t\t\t<br>단점조차 스타일로 착각하게된다.<br>\t\t\t\t<br>- 꾸준함과 디테일, 그것이 명장을 만든다.<br>\t\t\t\t<br>- 알아야 한다. 달라야 한다. 빨라야 한다.<br>\t\t\t\t<br>- Why so?, Why not?!<br>\t\t\t\t<br>- Take off your cool,<br>\t\t\t\t<br>- 전방위적 무차별 경험주의<br>\t\t\t\t<br>- 시크하게 집중하라. 다른 것들은 아무 것도 아니라는 듯이<br>\t\t\t\t<br>- \"날개도 없는 주제에 하늘을 사랑했다.\"<br>\t\t\t\t<br>- MEISTER<br>\t\t\t\t<br>- 삶을 두려워하지 말아<br>\t\t\t\t<br>- 매일 이렇다면, 모진 이세상도 참 살아갈만 할거에요<br>\t\t\t\t<br>- 끝내주게, 재미 있을 거야!<br>\t\t\t\t<br>- 감사,<br>\t\t\t\t<br>- 불확실, 혼돈과 위험이라는 이름의 자유들로 삶을 칠하자.<br>\t\t\t\t<br>- JUST DO, YOUT THING. <br>\t\t\t\t<br>- 인생, 막춤 한판.<br>\t\t\t\t<br>- 뛰뛰빵빵,<br>\t\t\t\t<br>- 정직하게 일해서 성공하는 것을 보여주고 싶습니다<br>\t\t\t\t<br>- 세상을 깨우자<br>\t\t\t\t<br>- 이젠 나를 찾고 싶어<br>\t\t\t\t<br>- I'M SO BAD. SO WHAT?! IT'S MY WAY<br>\t\t\t\t<br>- 열망에는 아픔이 따른다 - 아프니까 청춘이다<br>\t\t\t\t<br>- 위험하지 않음 꿈은 꿀 가치가 없습니다 - 홍정욱<br>\t\t\t\t<br>- 가자 위로, 知의 심연으로<br>\t\t\t\t<br>- 눈뜨면 없어라<br>\t\t\t\t<br>- 나의 실력에 투자하는 것이 가장 확실한 재테크다 - 아프니까 청춘이다<br>\t\t\t\t<br>- 꾸준한 연습보다 뛰어난 재능은 없다.<br>\t\t\t\t<br>- 숙련은 힘보다 강하다 - W.G 배넘 <br>\t\t\t\t<br>- 꿈을 크게 가지기보다, 나를 크게 가지자.<br>\t\t\t\t<br>- 어떤 새도 자신의 둥지에서 생을 마감하지 않는다.<br>\t\t\t\t<br>- 날개도 없는 주제에 하늘을 사랑하고,<br>\t\t\t\t<br>걸어둘 벽도 없으면서 행복을 그린다.<br>\t\t\t\t<br>- 바람은 방랑을 멈추는 순간 소멸한다.<br>\t\t\t\t<br>- Think Bravely<br>\t\t\t\t<br>- 지금 이 시절이 스스로에게 기회를 줄 수 있는 마지막 유예다.<br>\t\t\t\t<br>누가 무엇을 가져다 준다고 해도, 이 시절의 나와 바꾸고 싶지 않다.<br>\t\t\t\t<br>- 적이 없다는 말은, 잘 싸워서라기 보다. 적을 만들지 않는 사람에게 주어진 영예다.<br>\t\t\t\t<br>- F1(타이어교체 사진), 혼자 타지만, 홀로 달리지 아니한다. Teamwork.<br>\t\t\t\t<br>- 진심, 시간이 지나면 거짓이 되고야 마는 진심. 사랑<br>\t\t\t\t<br>- 처절한 나의 부족함을 느껴보는 것, <br>\t\t\t\t<br>- 매일 밑천을 드러내는 삶을 살자,<br>\t\t\t\t<br>- 불우 할 수도 있었겠지, 내 청춘은. 그럴 수 있었어.<br>\t\t\t\t<br>- 사랑하고, 하고 싶은 일을 하라. 그리고 삶을 두려워하지 말라.<br>\t\t\t\t<br>- 죽는 날까지, 솔잎만 먹으며 희망을 희망 할텐가.<br>\t\t\t\t<br>- 혼자 잘 먹고 잘 사는 일은, 성공하는 일은 그리 어렵지 않아요<br>\t\t\t\t<br>    하지만, 그것을 혼자 누리는 것처럼 고역은 없을테죠<br>\t\t\t\t<br>- 끝내주게 잼있을거야!<br>\t\t\t\t<br>- 매일 아침, 가장 따뜻한 미소를 줄게<br>\t\t\t\t<br>- 솔잎만 먹다가, 우물 안에서 숨지지는 않으리<br>\t\t\t\t<br>- 불운하다고 불행 하라는 법은 없고,<br>\t\t\t\t<br>불우하더라도 불가능하지는 않습니다.<br>\t\t\t\t<br>- 가난은 죄가 아니지만, 용서받지는 못한다.<br>\t\t\t\t<br>- 아직 배팅할 청춘이 두둑하고, 샴페인을 터뜨리기에는 날이 너무 밝구나.<br>\t\t\t\t<br>- 철들었다는 말은 누구나 할 수 있는 생각을 하게 되었다는 뜻이다.<br>\t\t\t\t<br>- 여자말고는 피 끓는 것이 없는 너도, 사내냐.<br>\t\t\t\t<br>- 제도는 지키는 쪽보다 만드는 쪽이 언제나 우위를 점하고,<br>\t\t\t\t<br>게임의 룰을 정하는 건 언제나 승자다. 우리는 그 룰을 교육 받아왔다.<br>\t\t\t\t<br>- 보편 타당한 불편과 문제들을 ICT기술을 활용해 해결해나가는 것이 나의 일이다.<br>\t\t\t\t<br>- 서기 2011년 그는 보다 실증적인 댄싱 연구를 위해 살사구시의 정신으로 뮤뱅에 입성하였다.<br>\t\t\t\t<br>- 최초는 곧 최고가 되고, 나다움은 곧 유일함이다.<br>\t\t\t\t<br>- 세상탓 하지마라, 세상이 나빠진 만큼 그 세상을 탓하는 네가 <br>\t\t\t\t<br>선해지는 것은 아닐텐데, 오늘도 말뿐인 말이 넘치는구나<br>\t\t\t\t<br>- 달콤함 인생,<br>\t\t\t\t<br>- 직장은 마지막 학교일 뿐이다.<br>\t\t\t\t<br>- 결국 마케터가 무능할수록, 구라를 많이쳐야 한다.<br>\t\t\t\t<br>- 힘 없이는 평화도 없다.<br>\t\t\t\t<br>- 적어도 내 필드에서는, 모두를 먹이로 만들어버릴 야성을 갖춰야 한다.<br>\t\t\t\t<br>- 안전하고, 무모하지도 않은걸 누가 도전이라고 하던가.<br>\t\t\t\t<br>- 김준영, 최고.<br>\t\t\t\t<br>- 찻잔과 온실 속의 도전 밖에는 하지 못하는 네가<br>\t\t\t\t<br>정말로 남의 실패를 비웃을 자격이 있다고 생각 하는 거야? ㅎ<br>\t\t\t\t<br>- 이젠, 사랑이 아니라. 이별이 어떤 느낌이었는지 조차도 가물가물해.<br>\t\t\t\t<br>- 행복한 양아치,<br>\t\t\t\t<br>- 재기발랄 양아치, 발랄한 글을 쓰자<br>\t\t\t\t<br>- 2011, 기본기<br>\t\t\t\t<br>- No more. 가난은 죄가 아니나, 용서받지는 못한다. 열심히 살자.<br>\t\t\t\t<br>- 기본 없는 창의는 오만이고, 공감 없는 창의는 폭력이다<br>\t\t\t\t<br>- 내가 가진 희망이라고는, 너 밖엔 없는데<br>\t\t\t\t<br>네가 날 실망시켜서는 안된다. 김준영.<br>\t\t\t\t<br>- 진짜 멍청한이들의 특징은, 당최 자기가 뭘 모르는지 모르고,<br>\t\t\t\t<br>그래서 모르는 것을 인정하질 못하고, 물어보질 못하고,<br>\t\t\t\t<br>그렇게 계속해서 단단하 무지만 쌓아간다는 것이다.<br>\t\t\t\t<br>그러고 나이로 누르려 애를 쓴다. 나이만 먹은 멍청이.<br>\t\t\t\t<br>- 끈내주게 신난닥!ㅋ 죠타! 사는게 잼있따<br>\t\t\t\t<br>- 인생은 원래, 재미있다.어제의 나는 최고였다.<br>\t\t\t\t<br>그리고 오늘은, 더 나아졌다.<br>\t\t\t\t<br>- 숫컷&숫트,<br>\t\t\t\t<br>- 그리고, 중요하지 않은 것은 무시할 수 있어야 한다.<br>\t\t\t\t<br>삶 가운데 살아있다는 것보다 중요한 것은 하나도 없고,<br>\t\t\t\t<br>그 어떤 일이라도 죽는 것 이상으로 나쁜 일은 일어나지 않는다.<br>\t\t\t\t<br>- 기업의 성장은, 증식적 확장으로 인한 규모의 비대함이 아니라,<br>\t\t\t\t<br>구성원의 성장과 상승효과에 따른 조직의 진화여야 한다.<br>\t\t\t\t<br>- 삶을 망치는 가장 큰 원인이 뭔줄 알아?<br>\t\t\t\t<br>그건 삶에 대한 결벽과 강박, 완벽주의야<br>\t\t\t\t<br>- 될 놈은, 넘어져도 돈을 주워 일어난다.<br>\t\t\t\t<br>- 목마른 것은 오직, arete<br>\t\t\t\t<br>- 완벽도 부족해,<br>\t\t\t\t<br>- 벙어리처럼 침묵하고 왕처럼 말하라.<br>\t\t\t\t<br>- 사람의 마음속에 들어가서 일을 해라<br>\t\t\t\t<br><자경문> - 율곡 이이<br>\t\t\t\t<br>제 1조: 뜻을 크게 가져 성인이 되도록 끝까지 노력한다.<br>\t\t\t\t<br>제 2조: 마음을 차분히 가라앉히고 말을 적게 한다.<br>\t\t\t\t<br>제 3조: 마음을 놓지 않고, 안으로 거두어 잘 정리한다. 마음을 잃어버린 사람은 주인 없는 집과 같다.<br>\t\t\t\t<br>제 4조: 혼자 있을 때 행동을 더욱 조심한다. 남이 보지 않을 때 행실을 삼가지 않으면 악한 일이 저절로 생기는 법이다.<br>\t\t\t\t<br>제 5조: 항상 해야 할 일을 정하고, 그것을 행동으로 옮기기 전에 깊이 생각한다. 행동에 옮기지 않는 독서는 필요가 없다.<br>\t\t\t\t<br>제 6조: 재산이나 명예에 마음을 두어서는 안 된다.<br>\t\t\t\t<br>제 7조: 꼭 해야 할 일은 싫어하거나 게으름을 피우지 말고 정성껏 한다.<br>\t\t\t\t<br>제 8조: 온 세상을 전부 준다고 해도, 죄 없는 사람을 한명이라도 괴롭히거나 의롭지 않는 행동을 해서는 안 된다.<br>\t\t\t\t<br>제 9조: 나를 해치는 사람이 있을 때는 스스로를 뉘우치고, 참된 마음으로 상대방의 마음을 돌린다.<br>\t\t\t\t<br>제 10조: 함부로 눕지 않고, 기대지도 않으며, 필요 없는 잠을 자지 않는다.<br>\t\t\t\t<br>제 11조: 서두르지 말고, 쉬지도 말며, 꾸준히 몸과 학문을 닦는다.<br>\t\t\t\t<br><br>\t\t\t<br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t<br>\t\t<br>\t\t\t묻습니다.<br>\t\t\t낮은 연봉을 감내하면 꿈을 위한 것이고,<br>\t\t\t더 좋은 대우를 받고 일하면 꿈을 꾸지 못하는 건지요.<br>\t\t\t<br><br>\t\t\t청춘이라는 열쇠로 아해들 가슴팍을 열어 젖히고<br>\t\t\t꿈과 열정이라는 키워드를 쑤셔박아<br>\t\t\t단가를 후려쳐서 사들이는 것은 <br>\t\t\t대기업이든 소기업이든 다르지 않습니다.<br>\t\t\t<br><br>\t\t\t프로란 건 돈을 대가로 일하는 사람입니다.<br>\t\t\t자신의 가치를 높게 책정해주는 곳에서 일하는 건 당연해요<br>\t\t\t그에 대해 가책을 느끼게 하는 것은 꽤 비겁하네요.<br>\t\t\t자기 직원들에게 좋은 대우를 해주는 기업이 나쁜 겁니까,<br>\t\t\t아니면 선배들이 가꾸어온 이런 사회 구조가 나쁜 겁니까.<br>\t\t\t<br><br>\t\t\t그리고, 외부에서 들어온 경력직이 더 좋은 대우를 받는다면, <br>\t\t\t나라고 굳이 회사를 짝사랑 할 이유가 있겠습니까.<br>\t\t\t<br><br>\t\t\t부디 후배들이,<br>\t\t\t크고 강하면 악하고, 약하고 작으면 선할 것이라는<br>\t\t\t낡고 근거 없는 프레임의 희생양이 되지 않았으면 합니다.<br>\t\t\t<br><br>\t\t\t다윗과 골리앗, <br>\t\t\t누가, 도대체, 왜 나쁜 거죠?<br>\t\t\t<br><br>\t\t\t왜? <br>\t\t\t단지 그렇게 배워왔으니까? ㅎ<br>\t\t\t<br><br>\t\t\t누구나 자신이 감내 할 수 있는 삶을 살아갈 뿐입니다.<br>\t\t\t난 가난을 감내 할 수 없었을 뿐입니다.<br>\t\t\t<br><br>\t\t\t힐링열풍은<br>\t\t\t고도화된 형태의 3S 정책,<br>\t\t\t스마트 우민정책의 산물이다.<br>\t\t\t<br><br>\t\t\t자위하며 사는 것도<br>\t\t\t사이퍼의 삶도<br>\t\t\t삶은 삶이니 말이다.<br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br>사람이 형편없어지는 가장 빠른길중 하는<br>\t\t\t<br>축적없이 스스로를 소진하는 것이며<br>\t\t\t<br>직장생활은 그것을 촉진하는 대표적인 방법이다.<br>\t\t\t<br><br>\t\t\t<br>주말밖에는 없는데<br>\t\t\t<br>주말마저 앗아간다는 것은<br>\t\t\t<br>우리에게 그런 종류의 두려움인 것이다.<br>\t\t\t<br><br>\t\t\t<br>우리는 주로 남는 것 없이 고생을 시킨 사람과<br>\t\t\t<br>헤어짐을 앞두고 마주했을 때,<br>\t\t\t<br>겸양이라는 고명을 얹어 \"많이 배웠습니다.\"<br>\t\t\t<br>는 드립을 내어 놓곤한다. 쨔쟌.<br>\t\t\t<br><br>\t\t\t<br>배우면 뭐하나<br>\t\t\t<br>다음 스텝에서 쓰여지지 않을 기능을 말이다.<br>\t\t\t<br><br>\t\t<br>\t\t<br>\t\t\t<br>알아야 한다 달라야 한다 빨라야 한다<br>\t\t\t<br>그래야 산다.<br>\t\t<br>\t\t<br>\t\t\t<br><br>\t\t<br>\t\t<br>\t\t\t<br>토머스 울프는 <그대 다시는 고향에 못 가리>라는 소설에서 “더 큰 사랑을 찾기 위하여 지금 가장 사랑하는 친구를 잃어버릴 것. 더 큰 땅을 찾기 위하여 지금 그대가 딛고 있는 땅을 잃어버릴 것”<br>\t\t\t<br><br>\t\t\t<br>\"To lose the earth you know, for greater knowing; to lose the life you have for greater life; to leave the friends you loved, for greater loving; to find a land more kind than home, more large than earth.\" ― Thomas Wolfe, You Can't Go Home Again. 1940",
    "w": 400
  }

let cards = [];
let moving = null, resizing = null;

function loadBoard() {
  const saved = localStorage.getItem(SAVE_KEY);
  cards = saved ? JSON.parse(saved) : DEFAULT_CARDS.map(c => ({...c}));
  renderCards();
  if (!saved) autoLayout();
}

function autoLayout() {
  const GAP = 14;
  const boardW = document.getElementById('board').offsetWidth;
  const cols = Math.max(1, Math.floor(boardW / 280));
  const colW = (boardW - GAP * (cols - 1)) / cols;
  const colHeights = new Array(cols).fill(0);
  const allCards = document.querySelectorAll('.card');
  const images = document.querySelectorAll('.card img');
  let loaded = 0;
  const total = images.length;

  function place() {
    allCards.forEach((el, i) => {
      const card = cards[i];
      const w = Math.min(card.w || colW, colW);
      let minCol = 0;
      for (let c = 1; c < cols; c++) if (colHeights[c] < colHeights[minCol]) minCol = c;
      card.x = minCol * (colW + GAP);
      card.y = colHeights[minCol];
      card.w = w;
      el.style.left = card.x + 'px';
      el.style.top = card.y + 'px';
      el.style.width = w + 'px';
      colHeights[minCol] = card.y + el.offsetHeight + GAP;
    });
    document.getElementById('board').style.minHeight = Math.max(...colHeights) + 100 + 'px';
    saveBoard();
  }

  if (total === 0) requestAnimationFrame(place);
  else images.forEach(img => {
    if (img.complete) { loaded++; if (loaded >= total) requestAnimationFrame(place); }
    else img.onload = img.onerror = () => { loaded++; if (loaded >= total) requestAnimationFrame(place); };
  });
}

function syncText() {
  document.querySelectorAll('.card').forEach(el => {
    const idx = +el.dataset.idx;
    if (cards[idx]?.type === 'text') {
      const t = el.querySelector('.text');
      if (t) cards[idx].content = t.innerHTML;
    }
  });
}

function saveBoard() {
  syncText();
  localStorage.setItem(SAVE_KEY, JSON.stringify(cards));
  document.getElementById('status').textContent = '저장됨 ' + new Date().toLocaleTimeString();
}

function renderCards() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  cards.forEach((card, i) => {
    const el = document.createElement('div');
    el.className = 'card';
    el.dataset.idx = i;
    if (card.x !== undefined) el.style.left = card.x + 'px';
    if (card.y !== undefined) el.style.top = card.y + 'px';
    if (card.w) el.style.width = card.w + 'px';

    el.addEventListener('mousedown', e => {
      if (e.target.closest('.text, a, .card-btn, .resize-handle, table')) return;
      e.preventDefault();
      moving = { idx: i, startX: e.clientX, startY: e.clientY, origX: card.x || 0, origY: card.y || 0 };
      el.classList.add('moving');
    });

    const actions = document.createElement('div');
    actions.className = 'card-actions';
    const delBtn = document.createElement('button');
    delBtn.className = 'card-btn'; delBtn.textContent = '×';
    delBtn.onclick = e => { e.stopPropagation(); if (confirm('삭제?')) { cards.splice(i, 1); renderCards(); saveBoard(); } };
    actions.appendChild(delBtn);
    el.appendChild(actions);

    if (card.type === 'text') {
      const text = document.createElement('div');
      text.className = 'text';
      text.contentEditable = true;
      text.innerHTML = card.content || '';
      text.addEventListener('blur', () => { card.content = text.innerHTML; saveBoard(); });
      el.appendChild(text);
    } else if (card.type === 'image') {
      const src = card.src.startsWith('http') || card.src.startsWith('data:') ? card.src : IMG_BASE + card.src;
      const img = document.createElement('img');
      img.src = src;
      img.alt = card.alt || '';
      img.loading = 'lazy';
      img.onerror = () => img.style.display = 'none';
      if (card.link) {
        const a = document.createElement('a'); a.href = card.link; a.target = '_blank';
        a.appendChild(img); el.appendChild(a);
      } else { el.appendChild(img); }
      if (card.caption) {
        const cap = document.createElement('div');
        cap.className = 'caption';
        cap.textContent = card.caption;
        el.appendChild(cap);
      }
    } else if (card.type === 'table') {
      const wrapper = document.createElement('div');
      wrapper.style.overflowX = 'auto';
      wrapper.innerHTML = card.html || '';
      el.appendChild(wrapper);
    }

    const rh = document.createElement('div');
    rh.className = 'resize-handle';
    rh.addEventListener('mousedown', e => {
      e.preventDefault(); e.stopPropagation();
      resizing = { idx: i, startX: e.clientX, startW: card.w || el.offsetWidth };
    });
    el.appendChild(rh);
    board.appendChild(el);
  });

  requestAnimationFrame(() => {
    let maxBottom = 0;
    document.querySelectorAll('.card').forEach(el => {
      const b = (parseFloat(el.style.top) || 0) + el.offsetHeight;
      if (b > maxBottom) maxBottom = b;
    });
    board.style.minHeight = (maxBottom + 100) + 'px';
  });
}

document.addEventListener('mousemove', e => {
  if (moving) {
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`);
    if (!el) return;
    const nx = moving.origX + e.clientX - moving.startX;
    const ny = moving.origY + e.clientY - moving.startY;
    el.style.left = nx + 'px';
    el.style.top = ny + 'px';
  }
  if (resizing) {
    const card = cards[resizing.idx];
    card.w = Math.max(100, resizing.startW + e.clientX - resizing.startX);
    const el = document.querySelector(`.card[data-idx="${resizing.idx}"]`);
    if (el) el.style.width = card.w + 'px';
  }
});

document.addEventListener('mouseup', e => {
  if (moving) {
    const card = cards[moving.idx];
    card.x = Math.max(0, moving.origX + e.clientX - moving.startX);
    card.y = Math.max(0, moving.origY + e.clientY - moving.startY);
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`);
    if (el) { el.classList.remove('moving'); }
    moving = null; saveBoard();
  }
  if (resizing) { resizing = null; saveBoard(); }
});

function addTextCard() {
  cards.push({ type: 'text', content: '', x: 50, y: window.scrollY + 100, w: 300 });
  renderCards();
  setTimeout(() => { const els = document.querySelectorAll('.card .text'); els[els.length - 1]?.focus(); }, 100);
}

function addImageCard() {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = 'image/*';
  input.onchange = e => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = () => { cards.push({ type: 'image', src: reader.result, x: 50, y: window.scrollY + 100, w: 240 }); renderCards(); saveBoard(); };
    reader.readAsDataURL(file);
  };
  input.click();
}

function resetLayout() {
  if (!confirm('자동 재배치합니다. 현재 위치가 변경됩니다.')) return;
  cards.forEach(c => { delete c.x; delete c.y; });
  renderCards(); autoLayout();
}

setInterval(saveBoard, 30000);
loadBoard();
</script>
</body>
</html>
