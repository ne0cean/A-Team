t\t<br>이번 경기에서 승자가 되어야해.<br>\t\t\t<br>그것도 룰을 우회하면서<br>\t\t\t<br><br>\t\t\t<br>미래의 자서전 쓰기<br>\t\t\t<br>…..난 멈추지 않았고, 멈추지 않았을 뿐더러, 또한 멈추지 않았어요<br>\t\t\t<br>승리의 관성을 만들어내야해<br>\t\t\t<br><br>\t\t\t<br>남자에 게 가장 두려운 일은<br>\t\t\t<br>두려움을 들키는 일이니까.<br>\t\t\t<br><br>\t\t\t<br>나는 과거를 기억할 뿐 좀처럼 추억하지 않는다.<br>\t\t\t<br><br>\t\t\t<br>바라나시에 머물던 한달 간 갠지스에 실어보낸건<br>\t\t\t<br>시간만이 아니었다. <br>\t\t\t<br><br>\t\t\t<br>나는 왜 살지? 왜 살아가야 하지?<br>\t\t\t<br>그 밑도 끝도 없는 물음 끝에<br>\t\t\t<br><br>\t\t\t<br>나는 궁금해 내 과거보단 미래가,<br>\t\t\t<br>내가 어디까지 살아낼 수 있을지가 궁금해<br>\t\t\t<br>나는 그래서 살아. 한장 한장 내 삶을 읽어 나가는게<br>\t\t\t<br>나는 그게 좋아서 살아.<br>\t\t\t<br><br>\t\t\t<br>그래서 내 과거보단 미래를 궁금해해주는 사람을<br>\t\t\t<br>내 스펙보단 깊이와 가능성을 봐주는  사람을<br>\t\t\t<br><br>\t\t\t<br>불행하게도 올해에는 그런 행운을 얻지는 못했어.<br>\t\t\t<br>나는 포기했다. 연애를<br>\t\t\t<br>하지만 반드시 꼭 사랑하는 사람을 만날 거야.<br>\t\t\t<br><br>\t\t\t<br>생각해보면, 내가 누군가에게 사랑받았을 때에는<br>\t\t\t<br>뭔가에 미쳐있을 때였다. 뭔가에 몰입하고 매진하던<br>\t\t\t<br>나는. 그 때마다 사랑받았던 것 같다.<br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br>내가 인정하는 사람들에게서<br>\t\t\t<br>인정받는 것이야말로 삶의 큰 기쁨이다!<br>\t\t\t<br>기쁘다.<br>\t\t\t<br><br>\t\t\t<br>사람들이 내가 해낼 수 없을 것이라고 말하는 일을<br>\t\t\t<br>해내는 것이야말로 내 삶의 큰 기쁨이다.<br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br>사랑하는 사람을 만나 연애하고 싶은 거지,<br>\t\t\t<br>연애 상대를 만나 사랑하게 되고 싶진 않아.<br>\t\t\t<br>그리고 아직은 이런 맘이 욕심이 아니길 바래.<br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><a href=\"http://barbiesecret.tistory.com/224\" target=\"_blank\">http://barbiesecret.tistory.com/224</a><br>\t\t<br>\t\t<br>\t\t\t<br>자소서.<br>\t\t\t<br><br>\t\t\t<br>분명 다윗인데, 자꾸 창을 집어들려고하니까 지는거<br>\t\t\t<br>전략과 스펙의 부재 이전에, 스스로에 대한 성찰의 결여.<br>\t\t\t<br><br>\t\t\t<br>내 무기가 다른이의 그것과 같은 모양새가 아니라고해서<br>\t\t\t<br>두려워 할 필욘 없는거.<br>\t\t\t<br><br>\t\t\t<br>A에 알파를 더해서 A+라고 말하는건 절대로 차별화가 아님에도,<br>\t\t\t<br>자꾸 같은 행동을 반복하면서, 그 헛된 열정에 도취되는게 재앙.<br>\t\t\t<br>남들 다 한거 나는 더 열심히 했어요라는 식의 자소서는<br>\t\t\t<br>연민조차 느끼게 하질 못해용.<br>\t\t\t<br><br>\t\t\t<br>나만 보여줄 수 있는 나, 그 독보적 항로 컨셉 설정.<br>\t\t\t<br>열정과 기도는 그 다음에, OK?<br>\t\t\t<br><br>\t\t\t<br>이를테면, \"나는 참 무탈하고 순탄하게 살았다.\"<br>\t\t\t<br>라는 컨셉의 자소서가 참신하게 느껴졌었는데.<br>\t\t\t<br><br>\t\t\t<br>모두가 붉은 열정을 뽐내는 가운데,<br>\t\t\t<br>그 컨셉이 오히려 차별적이었기 때문.<br>\t\t\t<br><br>\t\t\t<br>이력서나 자소서 둘중에 하나라도 임팩이 없으면,<br>\t\t\t<br>굳이 제출할 필요 없음<br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br>온전히 나만 위하며 산다는 것<br>\t\t\t<br>이기적으로 산다는 것의 어려움.<br>\t\t\t<br><br>\t\t\t<br>나는 착하게 살고 싶지 않다<br>\t\t\t<br>행복하게 살고 싶을 따름이다.<br>\t\t\t<br><br>\t\t\t<br>나는 남부럽지 않은 내가 아니라<br>\t\t\t<br>내가 갖고싶은 나를 살고싶을 뿐이다.<br>\t\t\t<br><br>\t\t\t<br>의로움은 외로움을 동반하고<br>\t\t\t<br>다름은 아픔을 동반한다만,<br>\t\t\t<br>그것은 그만한 가치가 있다.<br>\t\t\t<br><br>\t\t\t<br>영원한 것은 영원히 없고,<br>\t\t\t<br>원래 그러한 것은 원래 없으며<br>\t\t\t<br>절대로 절대적인 것은 없다.<br>\t\t\t<br><br>\t\t\t<br>옳음과 그름은 인류의 발명품일뿐<br>\t\t\t<br>좋음과 나쁨만이 진실하다.<br>\t\t\t<br><br>\t\t\t<br>옳다고 배운 것이 아닌<br>\t\t\t<br>옳다고 믿는 것을 행하며 살고싶다<br>\t\t\t<br><br>\t\t\t<br>모든 선택의 결과가 내가 원하는 것일 수는 없다<br>\t\t\t<br>다만, 나의 판단과 세월이 말해준 직관을 믿는다.<br>\t\t\t<br><br>\t\t\t<br>칼집은 칼을 보호하기 위함인가<br>\t\t\t<br>칼로부터 보호받기 위함인가<br>\t\t\t<br>울타리는 나를 지키고자 함인가<br>\t\t\t<br>나를 속박하기 위함인가<br>\t\t\t<br><br>\t\t\t<br>안정이란 그런것이다.<br>\t\t\t<br>나를 가두어 나를 지키나,<br>\t\t\t<br>안전을 담보로 진보를 속박한다.<br>\t\t\t<br><br>\t\t\t<br>나를 지키는 구속구.<br>\t\t\t<br>지금 나의 감옥은 성처럼 웅대하나<br>\t\t\t<br>아무리 큰 새장도<br>\t\t\t<br>결국은 새에게는 감옥에 불과하다<br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br>왕년에 대해서 말하고 있다는 것은<br>\t\t\t<br>퇴물이 되어간다는 뜻이다.<br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br>세상은 사실,<br>\t\t\t<br>나 같은 삼류에게<br>\t\t\t<br>큰 기대를 하지 않는다.<br>\t\t\t<br><br>\t\t\t<br>그렇기에, 정말로 중요한 것은<br>\t\t\t<br>세상이 내게 원하는 것이 아닌<br>\t\t\t<br>내가 스스로의 삶에 무엇을 기대하는가이다.<br>\t\t\t<br><br>\t\t\t<br>일류들은 세상이 바뀌길 원하지 않는다.<br>\t\t\t<br>다시말해 게임의 법칙이 바뀌는걸 달가워하지 않는다.<br>\t\t\t<br><br>\t\t\t<br>결국 세상을 바꾸는 것은,<br>\t\t\t<br>바꿔야 하는 것은<br>\t\t\t<br>나와 같은 삼류들의 몫이고<br>\t\t\t<br><br>\t\t\t<br>일찍이 세상을 바꿀 수도 있다고 믿던<br>\t\t\t<br>미친사람들만이<br>\t\t\t<br>언제나 <br>\t\t\t<br>세상을 바꿔왔다.<br>\t\t\t<br>저마다의 방식으로, 각자의 칼로...<br>\t\t\t<br><br>\t\t\t<br>나는 무언가를 만드는 일이<br>\t\t\t<br>정말로 좋다.<br>\t\t\t<br><br>\t\t\t<br>세상을 바꿀,<br>\t\t\t<br>무언가를 만들고 싶다.<br>\t\t\t<br><br>\t\t\t<br>집요하게 궁극을 추구하고,<br>\t\t\t<br>최선이 아닌 최고를 만드는,<br>\t\t\t<br>명장으로 살고, 죽고싶다.<br>\t\t\t<br><br>\t\t\t<br>이것은 꿈 나부랭이가 아니다.<br>\t\t\t<br>내 삶의 목표다.<br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br>루저로, 스스로를 위로하며 살고싶지<br>\t\t\t<br>않았을 뿐이다.<br>\t\t\t<br><br>\t\t\t<br>착하게 살고싶지는 않다.<br>\t\t\t<br>단지 행복하게 살고싶을 뿐이다.<br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br>주변인을로부터의 인정이나 명예는 필요없다.<br>\t\t\t<br>오직 내가 인정하는 사람들로부터의 인정받는것<br>\t\t\t<br>그것만이 중요하다.<br>\t\t\t<br><br>\t\t\t<br>명예는 필요없다 자긍과 긍지<br>\t\t\t<br>그로부터 나오는 기백이 나다.<br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br>남자들과 똑같이 공부하고 <br>\t\t\t<br>똑같이 대학을 졸업한 그 똑똑하고<br>\t\t\t<br>재능있는 여자들이 왜 집에서 살림하는<br>\t\t\t<br>사람이 되어야 하나.<br>\t\t\t<br><br>\t\t\t<br>자긴 페미니스트이지만 데이트 비용은<br>\t\t\t<br>남자가 더 내야하고, <br>\t\t\t<br>남자에게 의탁해서 살아가려 하나.<br>\t\t\t<br><br>\t\t\t<br>정말 분개해야 할 것은<br>\t\t\t<br>스펙좋은 남자 못만나는 현실이 아니라<br>\t\t\t<br>남자에게 생각을 설계해놓은<br>\t\t\t<br>이미 주입된 생각이다.",
    "w": 400
  }
];

let cards = [];
let moving = null, resizing = null;

function loadBoard() {
  const saved = localStorage.getItem(SAVE_KEY);
  cards = saved ? JSON.parse(saved) : DEFAULT_CARDS.map(c => ({...c}));
  renderCards();
  if (!saved) autoLayout();
}

function autoLayout() {
  const GAP = 14;
  const boardW = document.getElementById('board').offsetWidth;
  const cols = Math.max(1, Math.floor(boardW / 280));
  const colW = (boardW - GAP * (cols - 1)) / cols;
  const colHeights = new Array(cols).fill(0);
  const allCards = document.querySelectorAll('.card');
  const images = document.querySelectorAll('.card img');
  let loaded = 0;
  const total = images.length;

  function place() {
    allCards.forEach((el, i) => {
      const card = cards[i];
      const w = Math.min(card.w || colW, colW);
      let minCol = 0;
      for (let c = 1; c < cols; c++) if (colHeights[c] < colHeights[minCol]) minCol = c;
      card.x = minCol * (colW + GAP);
      card.y = colHeights[minCol];
      card.w = w;
      el.style.left = card.x + 'px';
      el.style.top = card.y + 'px';
      el.style.width = w + 'px';
      colHeights[minCol] = card.y + el.offsetHeight + GAP;
    });
    document.getElementById('board').style.minHeight = Math.max(...colHeights) + 100 + 'px';
    saveBoard();
  }

  if (total === 0) requestAnimationFrame(place);
  else images.forEach(img => {
    if (img.complete) { loaded++; if (loaded >= total) requestAnimationFrame(place); }
    else img.onload = img.onerror = () => { loaded++; if (loaded >= total) requestAnimationFrame(place); };
  });
}

function syncText() {
  document.querySelectorAll('.card').forEach(el => {
    const idx = +el.dataset.idx;
    if (cards[idx]?.type === 'text') {
      const t = el.querySelector('.text');
      if (t) cards[idx].content = t.innerHTML;
    }
  });
}

function saveBoard() {
  syncText();
  localStorage.setItem(SAVE_KEY, JSON.stringify(cards));
  document.getElementById('status').textContent = '저장됨 ' + new Date().toLocaleTimeString();
}

function renderCards() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  cards.forEach((card, i) => {
    const el = document.createElement('div');
    el.className = 'card';
    el.dataset.idx = i;
    if (card.x !== undefined) el.style.left = card.x + 'px';
    if (card.y !== undefined) el.style.top = card.y + 'px';
    if (card.w) el.style.width = card.w + 'px';

    el.addEventListener('mousedown', e => {
      if (e.target.closest('.text, a, .card-btn, .resize-handle, table')) return;
      e.preventDefault();
      moving = { idx: i, startX: e.clientX, startY: e.clientY, origX: card.x || 0, origY: card.y || 0 };
      el.classList.add('moving');
    });

    const actions = document.createElement('div');
    actions.className = 'card-actions';
    const delBtn = document.createElement('button');
    delBtn.className = 'card-btn'; delBtn.textContent = '×';
    delBtn.onclick = e => { e.stopPropagation(); if (confirm('삭제?')) { cards.splice(i, 1); renderCards(); saveBoard(); } };
    actions.appendChild(delBtn);
    el.appendChild(actions);

    if (card.type === 'text') {
      const text = document.createElement('div');
      text.className = 'text';
      text.contentEditable = true;
      text.innerHTML = card.content || '';
      text.addEventListener('blur', () => { card.content = text.innerHTML; saveBoard(); });
      el.appendChild(text);
    } else if (card.type === 'image') {
      const src = card.src.startsWith('http') || card.src.startsWith('data:') ? card.src : IMG_BASE + card.src;
      const img = document.createElement('img');
      img.src = src;
      img.alt = card.alt || '';
      img.loading = 'lazy';
      img.onerror = () => img.style.display = 'none';
      if (card.link) {
        const a = document.createElement('a'); a.href = card.link; a.target = '_blank';
        a.appendChild(img); el.appendChild(a);
      } else { el.appendChild(img); }
      if (card.caption) {
        const cap = document.createElement('div');
        cap.className = 'caption';
        cap.textContent = card.caption;
        el.appendChild(cap);
      }
    } else if (card.type === 'table') {
      const wrapper = document.createElement('div');
      wrapper.style.overflowX = 'auto';
      wrapper.innerHTML = card.html || '';
      el.appendChild(wrapper);
    }

    const rh = document.createElement('div');
    rh.className = 'resize-handle';
    rh.addEventListener('mousedown', e => {
      e.preventDefault(); e.stopPropagation();
      resizing = { idx: i, startX: e.clientX, startW: card.w || el.offsetWidth };
    });
    el.appendChild(rh);
    board.appendChild(el);
  });

  requestAnimationFrame(() => {
    let maxBottom = 0;
    document.querySelectorAll('.card').forEach(el => {
      const b = (parseFloat(el.style.top) || 0) + el.offsetHeight;
      if (b > maxBottom) maxBottom = b;
    });
    board.style.minHeight = (maxBottom + 100) + 'px';
  });
}

document.addEventListener('mousemove', e => {
  if (moving) {
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`);
    if (!el) return;
    const nx = moving.origX + e.clientX - moving.startX;
    const ny = moving.origY + e.clientY - moving.startY;
    el.style.left = nx + 'px';
    el.style.top = ny + 'px';
  }
  if (resizing) {
    const card = cards[resizing.idx];
    card.w = Math.max(100, resizing.startW + e.clientX - resizing.startX);
    const el = document.querySelector(`.card[data-idx="${resizing.idx}"]`);
    if (el) el.style.width = card.w + 'px';
  }
});

document.addEventListener('mouseup', e => {
  if (moving) {
    const card = cards[moving.idx];
    card.x = Math.max(0, moving.origX + e.clientX - moving.startX);
    card.y = Math.max(0, moving.origY + e.clientY - moving.startY);
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`);
    if (el) { el.classList.remove('moving'); }
    moving = null; saveBoard();
  }
  if (resizing) { resizing = null; saveBoard(); }
});

function addTextCard() {
  cards.push({ type: 'text', content: '', x: 50, y: window.scrollY + 100, w: 300 });
  renderCards();
  setTimeout(() => { const els = document.querySelectorAll('.card .text'); els[els.length - 1]?.focus(); }, 100);
}

function addImageCard() {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = 'image/*';
  input.onchange = e => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = () => { cards.push({ type: 'image', src: reader.result, x: 50, y: window.scrollY + 100, w: 240 }); renderCards(); saveBoard(); };
    reader.readAsDataURL(file);
  };
  input.click();
}

function resetLayout() {
  if (!confirm('자동 재배치합니다. 현재 위치가 변경됩니다.')) return;
  cards.forEach(c => { delete c.x; delete c.y; });
  renderCards(); autoLayout();
}

setInterval(saveBoard, 30000);
loadBoard();
</script>
