    "type": "text",
    "content": "Routine/Ritual<br>\t\t<br>\t\t<br>\t<br>\t<br>\t\t<br>\t\t\t<br>좋은 Routine이, 좋은 삶을 만든다.<br>\t\t\t<br><br>\t\t\t<br>인생을 바꾸는 것은 주요 변곡점에서의 적시의 한방이지만, 그 한방은 결국, 매일의 축적된 습관에서 나온다. 결국, 인생에서 이기는 쪽은, 자신의 강함만을 단련하기보단, 자신의 약함을 잘 길들인 쪽이다. <br>\t\t\t<br><br>\t\t\t<br>강점과 장점을 바탕으로 치고 나갈(도약 할) 수는 있겠지만, 어느 순간 균형이 무너지면서 나락으로 떨어지게 된다. 그것이 건강이든, 윤리이든 그 무엇이든 말이다.<br>\t\t\t<br><br>\t\t\t<br>세계적으로 성공한 사람들은 다양한 성장 배경을 갖고 있다. 세계에서 가장 큰 부자인 빌 게이츠는 유명한 변호사 아버지와 교사 어머니 밑에서 유복하게 자랐다. 투자의 귀재 워런 버핏은 중산층 가정에서 성장했다. 방송인 오프라 윈프리는 극심한 빈곤 속에서 불운한 어린 시절을 보냈다. 환경이 중요하긴 하지만 성공한 사람들 사이에서 환경적 공통점을 찾기란 쉽지 않다. 집안 환경이나 학벌은 한 사람의 성공에 별다른 영향을 미치지 않는 것처럼 보인다.<br>\t\t\t<br><br>\t\t\t<br>성공한 사람들을 무엇이든 공통점으로 묶을 수 있다면 그건 환경이 아니라 습관이다. '부자 되는 습관'(Rich Habits)의 저자 토마스 C. 콜리는 223명의 부자들과 128명의 가난한 사람들을 대상으로 습관을 조사했다. 부자들은 연간 16만달러 이상을 벌고 순자산이 320만달러가 넘는 사람들이다. 가난한 사람들은 연간 소득이 3만달러 이하이고 순자산이 5000달러 미만이다. 이 결과 부자들과 가난한 사람들의 일상 습관은 천양지차였다.<br>\t\t\t<br><br>\t\t\t<br>“성공한 사람들은 단지 성공하는 습관을 가진 사람들일 뿐이다.” 미국의 동기유발 전문가 브라이언 트레이시의 말이다. 트레이시는 국내에 ‘백만불짜리 습관’이란 책이 소개됐을 정도로 습관의 힘을 강조했다. 자기계발 전문가인 사이먼 솜라이는 성공하는 사람과 성공하지 못하는 사람의 차이를 습관에서 찾으면서 성공하는 습관이 쌓여 일정 수준을 넘어서게 되면 누구나 성공적인 삶을 살 수 있다고 봤다.<br>\t\t\t<br><br>\t\t\t<br>1.&#160;무엇이든&#160;메모한다<br>\t\t\t<br>부유한&#160;사람들이&#160;미래를&#160;예측할&#160;수&#160;있는&#160;능력을&#160;가진&#160;것은&#160;아니다. 그들&#160;역시&#160;우리와&#160;같이&#160;평범한&#160;사람들이지만,&#160;한&#160;가지&#160;다른&#160;점이라면&#160;그들은&#160;미래&#160;트렌드를&#160;예측하려는&#160;노력을&#160;기울였다는 것이다.<br>\t\t\t<br><br>\t\t\t<br>스티브&#160;잡스(Steve&#160;Jobs)는&#160;매일&#160;아이디어를&#160;메모했고&#160;그것은&#160;종종&#160;애플의&#160;혁신적인&#160;제품의&#160;플랫폼으로 탄생했다.<br>\t\t\t<br><br>\t\t\t<br>부자들은 매일 해야 할 일을 메모해둔다는 대답이 86%였다. 반면 가난한 사람들은 9%만이 해야 할 일을 기록했다. <br>\t\t\t<br><br>\t\t\t<br>자신의 재능에 대해 주인의식이 있는 많은 사람들은 마법의 도구를 이용한다. 그것은 바로 노트다. 훌륭한 수행가들은 자신의 목표와 얼마나 발전이 있었는지, 또한 그들의 실수를 노트에 적고 그것을 통해 배워간다.&#160;당신이 더 나아지고 싶다면, 당신이 지도가 필요하다면 공책에 일지를 써라. 그것이 바로 당신의 지도가 될 것이다.&#160;<br>\t\t\t<br>당신은 오늘 하루 무엇을 했는지 작성할 수 있고, 무엇을 시도했는지, 어떤 실수를 했는지 작성할 수 있다. 정보의 집합체가 되며 당신의 진전을 한눈에 볼 수 있을 것이다.<br>\t\t\t<br>&#160;<br>\t\t\t<br>2. 우선순위 :&#160;일의&#160;경중을&#160;따진다<br>\t\t\t<br>가장 중요한 일을 가장 먼저 한다. 대부분의 사람들은 급한 일을 처리하느라 인생의 가장 중요한 일을 소홀히 한다. 매일 처리해야 할 일을 기록한 뒤 그 날의 가장 중요한 일에 별표를 해둔다. 장기적으로 중요한 일은 매일 조금씩 해나갈 수 있도록 일을 쪼개 실천해간다.<br>\t\t\t<br><br>\t\t\t<br>미국 온라인 매체 비지니스&#160;인사이더에&#160;따르면&#160;부유한&#160;사람들의&#160;80%&#160;이상이&#160;매일&#160;아침&#160;업무&#160;시작&#160;전 일의&#160;경중을&#160;따져&#160;업무의&#160;순서를&#160;정한다.<br>\t\t\t<br>&#160;<br>\t\t\t<br>겉으로&#160;중요해&#160;보이는&#160;업무가&#160;사실은&#160;가볍게&#160;넘겨도&#160;되는&#160;일일&#160;수도&#160;있고,&#160;업무에&#160;소요되는&#160;시간&#160;손실을&#160;최소화할&#160;수&#160;있기&#160;때문이다.<br>\t\t\t<br><br>\t\t\t<br>오늘 뭘 해야만 하는지 안다. 매일 해야 할 일들을 점검한다.&#160;",

    "type": "text",
    "content": "&#160;<br>\t\t\t<br>3.&#160;운동과 식사 : 매일&#160;운동한다<br>\t\t\t<br>우리 몸은 가장 중요한 자산이다. 성공하려면 몸이 건강해야 한다. 아침에 일어나 간단한 체조를 하고 음식은 가능한 몸에 좋은 것을 가려 먹는다. <br>\t\t\t<br><br>\t\t\t<br>부유한&#160;사람들에게는&#160;매일&#160;운동하는&#160;습관이&#160;배어&#160;있다.<br>\t\t\t<br>그들은&#160;건강이&#160;억만금으로도&#160;환산될&#160;수&#160;없다는&#160;사실을&#160;알고&#160;있기&#160;때문이다.<br>\t\t\t<br><br>\t\t\t<br>일주일에 4번 이상 운동한다는 대답도 부자들이 76%로 가난한 사람들 23%보다 훨씬 많았다. <br>\t\t\t<br>&#160;<br>\t\t\t<br>4.&#160;주도적 자산관리, 작은&#160;지출을&#160;우습게&#160;여기지&#160;않는다<br>\t\t\t<br>금융회사의 고객 마인드에서 독립적인 투자자 마인드로 전환하는게 필요하다. 자신의 돈은 자신이 책임져야 한다. 종잣돈을 만들고 노후에 대비하고 남은 돈을 소득이라고 생각하고 그 범위 내에서 지출한다.<br>\t\t\t<br><br>\t\t\t<br>워렌&#160;버핏은&#160;\"작은&#160;지출을&#160;조심하라\"고&#160;말했다.&#160;티끌&#160;모아&#160;태산이라는&#160;말이&#160;있듯,&#160;작은&#160;지출이&#160;모여&#160;큰&#160;손실이&#160;될&#160;수 있기&#160;때문이다.<br>\t\t\t<br><br>\t\t\t<br>부유한&#160;사람들은&#160;재산을&#160;구축하는&#160;동안&#160;사치와&#160;필수적인&#160;지출을&#160;식별하는&#160;능력을&#160;키워&#160;검소함이&#160;몸에&#160;배어&#160;있다.<br>\t\t\t<br>&#160;",

  {
    "type": "text",
    "content": "&#160;<br>\t\t\t<br>5. 조기 기상 : 하루를&#160;빨리&#160;시작한다<br>\t\t\t<br>79세까지 산다고 가정하면 25년은 잠으로 보내야 한다. 20대에 자수성가로 백만장자가 된 타이 로페즈는 한 사람이 위대한 일에 바칠 수 있는 시간은 5만시간에 불과하다고 지적했다. 기껏 5.7년의 시간이다. 나머지 시간은 잠을 자는데 소비해야 하고 너무 어리거나 늙거나 병이 들어서 위대한 일에 쓸 수가 없다.매일 잠자는 시간과 밥 먹고 이동하고 기다리는 시간 등에 12시간을 쓴다고 가정하면 5만시간은 11.4년이다. 위대한 업적을 이루는데 쓸 수 있는 시간은 80년 가까운 인생에서 10년 남짓뿐이다. 잠을 줄이지 않더라도 일찍 일어나 하루를 일찍 시작하는 것만으로도 시간을 벌 수 있다.<br>\t\t\t<br><br>\t\t\t<br>부유한&#160;사람&#160;중&#160;대부분은&#160;아침형&#160;인간이다.&#160;하루&#160;중&#160;아침을&#160;생산성이&#160;가장&#160;높은&#160;때라고&#160;생각하기&#160;때문이다. 충분한&#160;숙면을&#160;취하되&#160;일찍&#160;일어나&#160;경기&#160;전&#160;워밍업처럼&#160;본격적인&#160;업무를&#160;시작하기&#160;전에&#160;명상을&#160;하거나&#160;독서를&#160;하며&#160;마음을&#160;다스리는&#160;것이다. 실제로&#160;아침에는&#160;창의력과&#160;상상력에&#160;관련된&#160;우뇌&#160;활동이&#160;활발하므로&#160;신문과&#160;책을&#160;통해&#160;정보를&#160;수집하는&#160;일이&#160;효과적이다.<br>\t\t\t<br><br>\t\t\t<br>부자들은 출근 3시간 이상 전에 일어난다는 대답이 44%로 절반 가량이었으나 가난한 사람들은 3%에 그쳤다.<br>\t\t\t<br><br>\t\t\t<br>6.&#160;책을&#160;항상&#160;곁에&#160;둔다&#160;<br>\t\t\t<br>부유한&#160;사람들&#160;사이에는&#160;실제로&#160;독서광이&#160;많다.&#160;그들이&#160;독서&#160;습관을&#160;중요시하는&#160;이유는&#160;폭넓은&#160;간접&#160;경험과&#160;정보를&#160;축적할&#160;수&#160;있기&#160;때문이다. 늘&#160;손이&#160;닿는&#160;곳에&#160;책을&#160;두거나&#160;자녀들&#160;교육법으로&#160;책&#160;읽는&#160;모습을&#160;많이&#160;보여주는&#160;것도&#160;독서의&#160;중요성을&#160;알고&#160;있기&#160;때문이다.<br>\t\t\t<br>그들은&#160;책&#160;읽을&#160;시간이&#160;없단 핑계 대는&#160;대신&#160;출퇴근&#160;시간에&#160;오디오북을&#160;활용한다. 자신이&#160;좋아하는&#160;분야의&#160;책을&#160;골라&#160;하루&#160;10분씩이라도&#160;꾸준히&#160;읽는&#160;연습을&#160;한다면&#160;독서&#160;습관이&#160;자연스레&#160;몸에&#160;밸&#160;것이다.<br>\t\t\t<br>부자들은 63%가 출퇴근하는 자동차 안에서 오디오북을 들었으나 가난한 사람들은 5%만이 그랬다.<br>\t\t\t<br><br>\t\t\t<br>워런 버핏과 빌 게이츠는 한가지 초능력을 가질 수 있다면 무엇을 원하느냐는 질문에 똑같이 세상에서 가장 빨리 책을 읽는 능 력을 원한다고 답했다. 독서는 다른 사람의 지식과 경험을 통해 인생의 시행착오를 줄여준다. 오늘부터 매일 비문학 서적을 매일 15쪽씩 읽는 것으로 학습 습관을 시작하라.<br>\t\t\t<br><br>\t\t\t<br>부자들은 매일 30분 이상씩 책을 읽는다는 대답이 88%에 달했으나 가난한 사람들은 2%에 불과했다. 책 읽는 것을 좋아한다는 대답도 부자는 86%였으나 가난한 사람들은 26%에 그쳤다. <br>\t\t\t<br><br>\t\t\t<br>ㅇ 독서를 멈추고 행동부터 하라&#160;<br>\t\t\t<br>'3분의 2법칙'을 명심하라. 공부하는데 오직 3분의 1의 시간을 투자해라. 다른 3분의 2는 당신이 직접 ‘행동’하는 시간이 투자하라. 계속 연습하고 스스로를 시험해라. 당신이 실전에서 부딪혀야만 더 빨리 배울 수 있다.&#160;우리의 뇌는 행동을 하면서 진화된 것이지 들으면서 습득한 것으로 진화하지 않았다.<br>\t\t\t<br>만약 당신이 중요한 한 구절을 외우고 싶다면 오직 30%만 그것을 읽는데 투자하고 나머지 70%는 스스로 시험을 보는데 투자하라.<br>\t\t\t<br><br>\t\t\t<br>&#160;",

    "type": "text",
    "content": "7. 네트워킹 :&#160;주변인에게&#160;소홀히&#160;하지&#160;않는다 (감사 표현)<br>\t\t\t<br>고도화된 현대사회에서는 혼자 힘으로 성공하기 어렵다. 내가 도움을 주고 도움을 받을 수 있는 사람들과 깊이 사귀는 것이 필요하다. 지금 중요한 것은 내가 무엇을 아느냐가 아니라 누구를 얼마나 잘 아느냐다.피상적인 관계는 인생을 복잡하게만 만들 뿐이다. <br>\t\t\t<br><br>\t\t\t<br>부유한&#160;사람들은&#160;진심을&#160;담아&#160;주변인에게&#160;감사함을&#160;표현할&#160;줄&#160;안다.&#160;이들은&#160;사람들과의&#160;유대를&#160;중요시하고&#160;다른&#160;사람과&#160;오래&#160;지속되는&#160;관계를&#160;형성하기&#160;위해&#160;노력한다. 평생&#160;친구들에게&#160;축하&#160;전화를&#160;해주는&#160;습관을&#160;기르고, 안부를&#160;묻는다.<br>\t\t\t<br>&#160;<br>\t\t\t<br>8.&#160;재능 강화 & 꾸준한 배움 : 매일&#160;새로운&#160;것을&#160;배우려고&#160;노력한다<br>\t\t\t<br>사람들에겐 누구나 타고난 재능이 있다. 한 사람이 모든 것을 잘할 수는 없다. 또 단 한 가지도 잘 하는게 없는 사람도 없다. 성공한 사람들은 자신의 재능에 투자해 강점으로 만든다. 잘하는 것은 강화하고 부족한 것은 인생을 잘 살아가는데 걸림돌이 안 되는 수준으로 보완한다. <br>\t\t\t<br>&#160;<br>\t\t\t<br>워렌&#160;버핏은&#160;\"위험은&#160;자신이&#160;무엇을&#160;하는지&#160;모르는&#160;데서&#160;온다\"고&#160;말했다.&#160;<br>\t\t\t<br>부유한&#160;사람들은&#160;매일&#160;새로운&#160;것을&#160;배우거나&#160;이해하려는&#160;태도를 가진다고&#160;한다.<br>\t\t\t<br>뿐만&#160;아니라&#160;이들은&#160;새로운&#160;사람과의&#160;만남을&#160;즐길&#160;줄&#160;안다.<br>\t\t\t<br>다른&#160;사람들에게서&#160;배울&#160;점을&#160;취하면&#160;더&#160;나은&#160;사람으로&#160;발전할&#160;수&#160;있기&#160;때문이다.<br>\t\t\t<br><br>\t\t\t<br>부자들은 86%가 평생을 통해 교육을 받으며 자기계발에 힘써야 한다고 말했으나 가난한 사람들은 5%만이 평생교육의 필요성을 인정했다. `",

    "type": "text",
    "content": "&#160;<br>\t\t\t<br>9. 긍정의 시각화 :&#160;긍정적&#160;사고력을&#160;유지하려&#160;애쓴다<br>\t\t\t<br>이지성의 ‘꿈꾸는 다락방’에서 소개됐던 원하는 모습과 상황을 머리 속에 그려보는 습관이다. 인생은 생각하는 대로 풀린다. 이루고자 하는 꿈을 구체적으로 시각화해 반복적으로 머리 속에 떠올리면 꿈을 이룰 가능성이 높아진다. 자신이 어떤 모습이기를 원하는지 구체적으로 적은 뒤 반복적으로 생각한다. 나폴레온 힐의 ‘간절히 생각하라 그러면 부를 얻을 것이다’를 읽으면 도움이 된다.<br>\t\t\t<br><br>\t\t\t<br>부유한&#160;사람들은&#160;마인드&#160;컨트롤(mind&#160;control)에&#160;뛰어난&#160;모습을&#160;보인다. 감정에&#160;치우치거나&#160;부정적&#160;개념에&#160;연연하지&#160;않으려는&#160;연습의&#160;결과라고&#160;할&#160;수&#160;있다. 그들은&#160;비판적이지&#160;않으며,&#160;긍정적인&#160;측면을&#160;찾으려고&#160;노력한다.&#160;<br>\t\t\t<br><br>\t\t\t<br>10. 목표 설정, 인생의 목표를 세워 적어 놓는다. <br>\t\t\t<br>마크 매코맥은 ‘하버드 경영대학원에서 가르쳐 주지 않는 것들’이란 책에서 다음과 같은 조사 결과를 소개했다. 1979년에 하버드 경영대학원 졸업생들에게 명확한 목표를 세웠는지 조사해봤다. 3%는 목표를 세워 기록했고 13%는 머리 속으로만 목표를 세웠다. 84%는 구체적인 목표가 없었다. 10년 후 이들을 다시 조사하니 목표를 마음으로만 세웠던 13%는 목표가 없었던 84%보다 소득이 평균 두 배 더 많았다. 목표를 글로 적어뒀던 3%는 나머지 97%보다 소득이 평균 10배 더 많았다.<br>\t\t\t<br><br>\t\t\t<br>목표 설정에서도 큰 차이를 보였다. 부자들은 67%가 목표를 글로 적어두는데 비해 가난한 사람들은 17%만 목표를 기록했다. 부자들은 80%가 구체적인 목표 달성에 초점을 맞추는 반면 가난한 사람들은 이 비율이 12%로 낮았다. <br>\t\t\t<br><br>\t\t\t<br>ㅇ 목표설정 수준 : 적절한 목표치(Sweet spot)를 설정한다<br>\t\t\t<br>매번 자신의 능력보다 살짝 위에 있는 목표치(Sweet Spot)을 설정하고 이에 매진해야 한다.&#160;자신이 목표로 하는 스위트 스팟이 현재의 능력 대비 일정한 수준의 상향목표라면 폭발적으로 기술이 상승하는 순간을 맞이하게 될 것이다.<br>\t\t\t<br><br>\t\t\t<br>&#160;<br>\t\t\t<br>11.&#160;TV를 보지 않는다. 플러그를 뽑아 놓는다.<br>\t\t\t<br>부유한&#160;사람들은&#160;하루&#160;TV&#160;시청&#160;시간이&#160;한&#160;시간&#160;미만이라고&#160;한다. 시간을&#160;더&#160;효율적으로&#160;사용하기&#160;위해&#160;단순한&#160;재미를&#160;포기할&#160;줄&#160;아는&#160;의지를 갖고 있는&#160;것이다.&#160;TV&#160;앞에서&#160;낭비되는&#160;시간을&#160;다른&#160;생산적인&#160;일에&#160;할애하는&#160;것이&#160;이득이라고&#160;생각한다.<br>\t\t\t<br><br>\t\t\t<br>부자들은 TV를 하루에 1시간 미만으로 본다는 대답이 60%가 넘었으나 가난한 사람들은 20% 남짓만이 하루 TV 시청 시간이 1시간 미만이었다. 부자들은 또 리얼리티 프로그램을 본다는 대답이 5% 남짓이었으나 가난한 사람들은 75%가 넘었다.<br>\t\t\t<br><br>\t\t\t<br>사무실에서의 일 이상을 한다. \"요구하는 일보다 많은 걸 한다.\"<br>\t\t\t<br><br>\t\t\t<br>12. 좋은 성품<br>\t\t\t<br>올바른 행동을 할 수 있는 성품을 가져야 한다. 기본적인 윤리의식 없이 이룬 성공은 언제 무너질지 알 수 없는 모래 위의 성이다. 정직, 성실, 약속 준수, 배려 등은 좋은 인생을 살아가는데 기본이다. 미국 독립의 아버지 벤자민 프랭클린은 절제, 절약, 근면 등 평생에 지키고 싶은 13가지 덕목을 정해 하나씩 실천해나갔다.<br>\t\t\t<br><br>\t\t\t<br>13. 나쁜 습관을 지속적으로 발견하고 제거한다.<br>\t\t\t<br><br>\t\t\t<br>14. 봉사하고, 기부한다.<br>\t\t\t<br><br>\t\t\t<br>15. 자녀교육<br>\t\t\t<br>자녀에게 봉사활동을 시키는 것도 결국 봉사활동을 통해 사회를 배우고 체험하는 기회를 주는 것이다. 경쟁이 치열해진 사회에서 성공하려면 다른 사람들에게 도움이 되고 가치가 되는 일을 해야 한다는 가르침을 체감하게 해주는 것이다. 부자 되는 습관, 3개월만 시도해보고 인생이 어떻게 바뀌는지 경험해 보는 것은 어떨까. <br>\t\t\t<br><br>\t\t\t<br>자녀 교육법도 달랐다. 자녀에게 성공하는 습관을 가르친다는 대답이 부자들은 74%였으나 가난한 사람들은 1%였다. 자녀에게 한달에 10시간 이상 봉사활동을 시킨다는 대답이 부자들은 70%였으나 가난한 사람들은 3%였다. 자녀들이 매달 2권 이상의 비문학 서적을 읽도록 격려한다는 대답이 부자들은 63%였으나 가난한 사람들은 3%였다.<br>\t\t\t<br>&#160;<br>\t\t\t<br><br>\t\t\t<br>4. 성공은 마라톤 경기의 메달. 장기전에 투자하라<br>\t\t\t<br>&#160;<br>\t\t\t<br>당신의 연습과 실력이 동반된 끈기는 그대를 성공으로 이끌게 한다. 끈기, 꾸준함은 다른 사람과 차별화를 만들어 주는 하나의 지표가 된다.&#160;<br>\t\t\t<br><br>\t\t\t<br>같은 양의 연습을 하더라도 한 번에 한 시간 반을 몰아서 하는 것보다 20분씩 매주 연습하는 사람이 더 빨리 습득하고 빠른 향상을 보인다.<br>\t\t\t<br><br>\t\t\t<br>우직하게 오랜 시간 동안 시간과 노력을 투자해 끈기 있게 일하는 것은 후에 큰 결과를 보인다. 포기하지 말고 꾸준히 해라.<br>\t\t\t<br>&#160;<br>\t\t\t<br>5. 동기부여를 위한 롤모델을 찾아라<br>\t\t\t<br><br>\t\t\t<br>롤모델을 찾는 것은 당신이 할 수 있는 가장 쉬우면서도 강력한 일 중 하나이다.&#160;그것은 당신에게 동기를 불어넣어주고 영감을 준다. 최고가 되기 위해 최고를 공부해라.<br>\t\t\t<br><br>\t\t\t<br>당신이 되고 싶은 사람에 대해 연구하고 탐구를 하면 엄청난 양의 에너지를 불러오며 당신에게 좋은 아이디어를 제공해준다.&#160;<br>\t\t\t<br><br>\t\t\t<br>우리는 사회적 동물이므로 우리는 사람들과 함께 어울러져 있을 때 아이디어를 얻으며 동기부여를 받는다. “그래, 그들은 해냈어. 그래서 나도 할 수 있어”라는 자신감도 함께 얻을 수 있다.<br>\t\t\t<br><br>\t\t\t<br>6. 뇌도 휴식이 필요하다. 낮잠이 정답이다<br>\t\t\t<br>모든 분야에서 성공한 사람들의 습관 중 하나는 낮잠을 자는 것이다. 낮잠은 뇌에게 있어 정리정돈의 역할을 준다.&#160;이것은 우리가 원하지 않는 일에 대해 잊을 수 있게 해준다. 또한 우리가 잠을 자고 있는 동안 일에 대한 아이디어가 떠오르게 만든다.",

    "content": "일곱번째&#160;<br>\t\t\t<br>끊임없이 쇄신하라<br>\t\t\t<br>&#160;sharpen the saw<br>\t\t\t<br>규칙적으로 자신을 새롭게 하라 !<br>\t\t\t<br><br>\t\t\t<br><a href=\"http://ppss.kr/archives/19520\" target=\"_blank\">성공하는 사람들이 주말에 하는 14가지</a><br>\t\t\t<br>2014년 4월 15일 by <a href=\"http://ppss.kr/archives/author/ppsswr128\" target=\"_blank\">강은진</a> <br>\t\t\t<br>37살의 스펜서 래스코프는 하버드를 졸업했고, 세 아이의 아버지이며, 이미 많은 것을 성취했다.&#160;Hotwire.com을 공동 창립하였고, 익스피디아의 부사장이 되었으며, 유명 부동산 정보 사이트 Zillow에서 CFO / 마케팅 부사장 / COO가 되었으며, 2008년에는 CEO로 승진했다.<br>\t\t\t<br>그는 어떻게 이런 성공을 이루고 유지할 수 있었을까? 주말을 ‘일상적’으로 보냈기 때문이었다.<br>\t\t\t<br>“주말은 제가 매일매일의 업무에서 해방되어 우리 회사와 내가 몸담고 있는 산업에 대해 더욱 깊이 생각할 수 있는 기회를 갖는 중요한 시간입니다. 엄밀하게는 (사무실에서) 일을 하고 있지 않더라도, 항상 머리 속으로는 일에 대해 생각합니다. 주말은 더 큰 이슈를 깊이 생각하고 성찰할 수 있는 멋진 기회입니다.” 래스코프의 말이다.<br>\t\t\t<br>그는 항상 주말을 가족들과 보낸다고 했다. “심지어 금요일에 출장 중이고, 다음주에도 같은 곳에서 출장 업무를 계속하기 때문에 돌아가야 하더라도 주말에는 항상 집에 갑니다.”<br>\t\t\t<br>래스코프가 작년에 세웠던 목표는 ‘토요일 만큼은 이메일 체크 안하기’였는데 잘 안됐다. “올해도 계속 노력하고 있는데요, 그 때보다는 더 행운이 따르는 거 같습니다. 제게는 어린 아이 3명이 있어서, 주말은 보통 요새를 만들고, 자전거를 타고 축구를 하고 체스를 두고 유모차를 끌고 동물원에 가고 기저귀를 갈고 책을 읽고 생일 파티를 가는데요, 기진맥진하면서도 다양한 재미가 있습니다. 주말엔 절대로 사무실에 가지 않지만, 밤엔 이메일을 체크하고요, 주말을 일에 관련된 것들을 읽을 기회로 활용합니다.”<br>\t\t\t<br>포브스에서는 성공하는 사람들이 주말에 하는 14가지를 다음과 같이 정리해보았다:<br>\t\t\t<br>1. 가족/친구와 함께 보내는 시간을 만들기<br>\t\t\t<br>주중에는 사랑하는 사람들과 많은 시간을 보내지 못하는 이들에게 특히 중요하다.<br>\t\t\t<br>2. 운동하기<br>\t\t\t<br>운동은 모든 이들에게 필요하다. 주중 4~5일 동안 운동하지 못했어도, 주말에는 그런 시간을 마련하고 행동해야 한다. 마음을 비우고 신선한 아이디어를 만들 완벽한 기회이다.<br>\t\t\t<br>“제가 아는 어떤 PR 회사 대표님은 어떻게 새로운 클라이언트를 위한 경쟁 PT를 할지, 스토리를 어떤 앵글로 프레스에 내보낼지에 대한 아이디어가 떠올리기 위해 애완견과 산책을 합니다.”<br>\t\t\t<br>따뜻한 달에는 실내 자전거 타기나, 야외에서 자전거 타기를 제안한다. “두 가지 모두 에너지를 충전해 주고, 같은 관심사를 가진 사람들이 모이게 해 주죠. 예를 들어 주말에 헤지 펀드 동료들과 월 스트리트의 프로들이 함께 자전거를 탄다는 건 평범한 일이 아니죠. 엘리트의 커뮤니티에 소속되어 관계를 맺고 키우기에 탁월한 방법입니다.”<br>\t\t\t<br>3. 좋아하는 것을 하기<br>\t\t\t<br>“축하 카드를 만드는 회사의 한 크리에이티브 디렉터는 예술을 좋아하여 미술 석사(MFA)를 따기 위해 다시 입학하기도 했습니다. 그러다가 시를 사랑하게 되어 주말마다 직접 쓰고 있습니다.”<br>\t\t\t<br>“성공한 사람들은 중요하거나 재미있는 걸 하기 위한 시간을 마련합니다. 그들은 삶에 균형을 더하기 위한 활동을 할 여지를 만듭니다.”<br>\t\t\t<br>4. 여행<br>\t\t\t<br>주중에 치열하게 업무를 하느라 고되게 보내도 주말에 어딘가로 떠나면 한숨을 돌리기 좋다.<br>\t\t\t<br>5. 인터넷 끊기<br>\t\t\t<br>성공한 사람들은 특정 시간 동안은 이메일을 피한다고 한다. “주말 내내는 아니지만, 폰 없이 걷기만 해도 해방감을 느낄 수 있습니다. ‘인터넷으로부터의 안식일(tech Sabbath)’을 가져보시길 바랍니다. 특별히 종교를 갖고 있지 않더라도 말이죠. 토요일 밤부터 일요일 낮까지만 그렇게 해도 좋습니다.”<br>\t\t\t<br>6. 봉사 활동하기<br>\t\t\t<br>“제가 아는 상업 부동산 브로커 중에 푸드 뱅크에 기부할 음식을 만드는 행사를 돕는 봉사활동을 하는 사람이 있습니다. 그녀는 한 주 내내 부담스러운 분석 업무를 하는데요, 봉사활동을 통해 균형을 잡고, 돈을 받지 않고 홍보물들을 디자인하며 창조적이고 싶은 그녀의 필요도 충족시켜 줍니다. 성공한 사람이 자신을 자선적인 사람으로 브랜딩할 수 있게 도와주는 효과도 있습니다.”<br>\t\t\t<br>7. 집안일을 피하기<br>\t\t\t<br>주말에는 해둬야 하는 일이 좀 있지만, 이걸 하는 시간은 되도록 최소화해야 한다고 한다. 마음 속에 작은 창을 만들고, 나머지 시간 동안 집안일이나 잔심부름들 마음 속에서 추방하라.<br>\t\t\t<br>8. 계획하기<br>\t\t\t<br>“계획을 하면 더욱 효율적이며, 한 주가 시작되기 전에 해 두면 월요일부터 치고 나갈 수 있게 준비가 되고, 자신과 함께 일하는 사람들에게 명확한 디렉션을 줄 수 있으며, 그들 또한 준비가 됩니다.”<br>\t\t\t<br>단기 리스트에만 매달리면 큰 것을 이룰 수 없기에 성공한 사람들은 월간/연간으로 계획을 세운다고 한다.<br>\t\t\t<br>9. 사람들과 어울리기<br>\t\t\t<br>“사람은 사회적 동물입니다. 행복을 느낀 사람들의 하루에는 사람들과 어울리는 게 상위에 랭크되어 있으며, 그 아래 많이 떨어지지 않은 순위에 섹스가 있다는 연구결과가 있습니다.”<br>\t\t\t<br>친구/가족과 함께 외출하거나 지역 공동체에 참여해 보라.&#160;“성공하는 사람들은 주고 받는 것에서 큰 만족을 느낀다는 게 증명되었습니다. 예를 들어 어딘가의 회원이 되면 다른 성공한 사람들을 접할 수 있습니다.”<br>\t\t\t<br>10. 정원 가꾸기/만들기/게임/스포츠/요리/문화 활동<br>\t\t\t<br>한 주 내내 사무실에 갇혀 있는 사람들에게 특히 중요한 일이다.&#160;“순수한 기쁨을 느끼기 위해, 어떤 이들은 아름다운 정원을 만드는 데에서 큰 만족감을 찾기도 합니다.”<br>\t\t\t<br>어떤 변호사는 그녀의 창조성을 만족시키기 위해 주말에 정원 가꾸기/모자이크 만들기/타일 만들기를 한다. “이런 식으로 그녀의 삶을 채우면 월요일에는 리프레시되어 소송과 재판 준비 업무를 할 준비가 됩니다. 그녀에게 아트 작업은 그녀의 영혼을 살찌우고, 정신적인 면과 연결되고 싶은 그녀의 니즈를 충족시키는 방식입니다.”<br>\t\t\t<br>친목 모임과 그룹 또한 사고방식을 향상시키며, 종종 매우 경쟁력 있고 똑똑한 프로들과의 인간관계도 만들어 낸다고 한다. “어느 친목회의 회원 리스트를 본 적이 있는데요, 그들은 월스트리트의 인명록에 있던 이들이었습니다.”&#160;극장 / 오페라 / 스포츠 대회 또한 정신을 풍성하게 한다.<br>\t\t\t<br>11. 인맥 쌓기<br>\t\t\t<br>“인맥을 만드는 것은 성공한 사람에게 큰 일이 아니라, 삶의 방식입니다.” 그들은 어디를 가든 무엇을 하든 새로운 이들을 만나려 한다.<br>\t\t\t<br>12. 깊이 생각하기<br>\t\t\t<br>진짜 성공한 사람들은 주말을 그들이 가진 것에 감사하고 행복과 성취에 대해 깊이 생각해 보는 시간을 가진다고 한다. 래스코프가 말했듯이 ‘주말은 더 큰 이슈를 깊이 생각하고 성찰할 수 있는 멋진 기회’이다.<br>\t\t\t<br>13. 명상하기<br>\t\t\t<br>명상에 관한 강좌나 개인 교습을&#160;통해 통찰과 마음의 평화에 대해 맞춤식 접근을 할 수 있다.<br>\t\t\t<br>14. 재충전하기<br>\t\t\t<br>우리는 경쟁 시대에 살고 있다. “최고의 퍼포먼스를 내기 위해서는 자신의 배터리를 잘 충전하겠다는 목표를 가지고, 휴식시간을 잘 가져야 합니다.” 이게 가장 성공한 이들이 그렇게 많은 걸 할 수 있었던 비결이다.<br>\t\t\t<br>성공한 사람들은 여가를 아주 한가롭게 보내려면 시간이 매우 중요하다는 걸 알고 있다. “응당 해야 할 걸 생각하는 데 실패해서 시간을 낭비하면 안되며, 그렇게 되면 TV 보기 / 빈둥거리기 / 비효율적인 이메일 체크 / 집안일 등으로 주말을 잃게 됩니다. 주중에 바쁘게 지냈다면 주말은 그렇게 보내지 않아도 됩니다. 매일 아침 8시부터 오후 8시까지 그렇게 지내는 사람은 더더욱 그렇습니다.”<br>\t\t\t<br><br>\t\t<br>\t\t<br>\t\t\t<br>\"숙련은 힘보다 더 강하다.\" W.G 베넘<br>\t\t\t<br><br>\t\t\t<br>반응하지 말라, 대응하라.<br>\t\t<br>\t\t<br>\t\t\t<br><br>\t\t<br>\t\t<br>\t\t\t<br><br>\t\t\t<br>다른 언어를 배운다<br>\t\t<br>\t\t<br>\t\t\t<br>\t\t\t\t<br>\t\t\t\t\t<br>인포그래픽 작가인 안나 비탈(Anna Vital)이 <Founders and Founders>지에 기고한&#160;'마음가짐', '식습관', '일정관리', '몸관리', '도구', '옷 입기', '업무 기술' 등 7가지 분야에 걸친 생산적인 사람의 35가지 습관을 아래에 소개한다.<br>\t\t\t\t\t<br><a href=\"http://blog.naver.com/ksc12545/220219874698\" target=\"_blank\">생산적인 사람들의 35가지 습관</a><br>\t\t\t\t\t<br>\t\t\t\t<br>\t\t\t<br>\t\t\t<br><br>\t\t\t<br>［마음가짐(Mind)］​ <br>\t\t\t<br>1. 20%의 일이 성과의 80%를 차지한다는 '20/80 법칙'을 인식하라.<br>\t\t\t<br>2. 급한 일보다 중요한 일에 포커싱하라.<br>\t\t\t<br>3. 시작하기 전에 먼저 성과를 정하라.<br>\t\t\t<br>4. 당장 할 수는 없지만 기발하다고 생각되는 아이디어를 기록하는 책을 만들어라.<br>\t\t\t<br>5. 무엇을 입을 것인가와 같은 사소한 결정을 없애라.<br>\t\t\t<br>6. 무시하는 법을 익혀라. 모든 것에 대응할 필요는 없다.<br>\t\t\t<br>7. 부족하더라도 초안을 만들어라. 아무것도 없는 빈 페이지는 수정할 것도 없다.<br>\t\t\t<br>8. 시간을 돈처럼 쓰라.<br>\t\t\t<br><br>\t\t\t<br>［식습관(Food)］ <br>\t\t\t<br>9. 식습관을 규칙화하라.<br>\t\t\t<br>10. 몸에 좋은 음식을 먹어라.<br>\t\t\t<br>11. ​시간 절약을 위해 배달시켜라.<br>\t\t\t<br>12. 단골 카페와 매일의 식사에 대해 ​협상하라.<br>\t\t\t<br>​ <br>\t\t\t<br>［일정관리(Schedule)］ <br>\t\t\t<br>13. 가장 쉬운 일부터 하라.<br>\t\t\t<br>14. 하루에 하나씩 최우선으로 해야 할 항목을 정하라.<br>\t\t\t<br>15. ​매일 일상적으로 해야 할 일을 정하라.<br>\t\t\t<br>16. 결정적인 때까지 회의를 하지 마라.​<br>\t\t\t<br>17. 완벽하지 않더라도 일단 끝내라.<br>\t\t\t<br><br>\t\t\t<br>［몸관리(Body)］<br>\t\t\t<br>18. 달리기, 수영, 댄스 등 운동을 통해 스트레스를 관리하라.<br>\t\t\t<br>19. 푹 자라. 그래야 더 많은 것을 할 수 있다.<br>\t\t\t<br>20. 에너지가 떨어졌을 때는 낮잠을 자라.<br>\t\t\t<br><br>\t\t\t<br>［도구(Hacks)］ <br>\t\t\t<br>21. 최종 결과물을 시각화하라.<br>\t\t\t<br>22. 준비가 되었다고 느끼기 전에 시작하라.<br>\t\t\t<br>23. 의심스러울 때는 일단 맞다고 가정하라. 결단력이 곧 생산성이다.<br>\t\t\t<br>24. 생각이 막힐 때는 마인드맵을 그려보라.<br>\t\t\t<br>25. 만약 쓸 수 없는 상황이라면 녹음을 하라.<br>\t\t\t<br>26. ​뭔가 도움이 되는 것을 읽었다면 작성자에게 글을 쓰라.(생산적 소통)​<br>\t\t\t<br><br>\t\t\t<br>［옷 입기(Clothes)］ <br>\t\t\t<br>27. 자신의 패션 유니폼을 정하고 매일 그걸 입어라.<br>\t\t\t<br>28. 스마트 패브릭(기능성 소재의 옷)​을 입어라.<br>\t\t\t<br>29. 모든 상황에 대처할 수 있는 옷을 가지고 다녀라.​<br>\t\t\t<br>30. 입지 않는 옷은 과감히 버려라.​<br>\t\t\t<br>​<br>\t\t\t<br>​［업무 기술(Tech)］​ <br>\t\t\t<br>31. 이메일 회신은 1분을 넘기지 마라.<br>\t\t\t<br>32. 뭘 요구하는지 불명확한 이메일에는 답하지 마라.<br>\t\t\t<br>33. 뉴스를 꺼 둬라. 중요한 사건이 늘 생기는 것은 아니다.<br>\t\t\t<br>34. 정말 긴급한 상황이 아니면 전화를 받지 마라. (긴급한 ​상황은 드물다)<br>\t\t\t<br>35. 키보드의 단축키를 활용하라.​ <br>\t\t<br>\t\t<br>\t\t\t<br>리추얼<br>\t\t<br>\t\t<br>\t\t\t<br>[줄리아 투자노트] 바쁜 사람과 생산적인 사람의 차이점<br>\t\t\t<br>인생의 미스터리 중 하나는 항상 바쁜데 그럴듯한 성과가 없다는 것이다. 바쁘지만 인생은 늘 제자리라면 생산성에 대해 생각해볼 필요가 있다. 사업가로 스페인 나바라대학교의 경영대학원 IESE에서 리더십 커뮤니케이션을 강의하는 코너 닐이 관찰한 바쁜 사람과 생산적인 사람의 차이점을 소개한다.<br>\t\t\t<br><br>\t\t\t<br>1. 바쁜 사람은 중요한 일이 있는 것처럼 보이기를 원하고 생산적인 사람은 인생에 분명한 사명이 있다. <br>\t\t\t<br><br>\t\t\t<br>바쁘기만 한 사람은 자신의 목적지를 잘 모른다. 방향성이 없으니 늘 바쁘지만 인생은 늘 제자리다. 남들이 보기엔 바쁘게, 남들과 비슷한 일을 하니 안정적으로 보이지만 실속이 없다. 생산적인 사람은 자신의 인생이 도달해야 할 종착점이 어디인지 안다. 삶의 세세한 일들은 크게 봤을 때 모두 이 종착점을 향해 있다. 남들과 비슷한 인생의 경로를 밟아가지 않으니 남들 눈엔 이상하게 비치기도 한다. 하지만 세월이 쌓이면 생산적인 사람의 인생은 멀리 앞서가 있는 게 눈에 보인다.<br>\t\t\t<br><br>\t\t\t<br>2. 바쁜 사람은 우선 처리해야 할 일이 많지만 생산적인 사람은 적다.<br>\t\t\t<br><br>\t\t\t<br>인생은 우선순위를 어떻게 정할지에 대한 선택의 연속이다. 우선 처리해야 할 일이 3개면 우선순위가 3개 있는 것이지만 25개면 인생이 혼란에 빠진다. '파레토의 법칙'에 따르면 원하는 결과의 80%는 하는 행동의 20%에서 나온다. 헨리 포드는 좋은 차를 만들어 성공한 게 아니라 더 나은 생산시스템을 만들어 성공했다. 바쁜 사람은 더 좋은 차를 만드는 데 집중하지만 생산적인 사람은 더 나은 시스템을 구축하는 데 집중한다.<br>\t\t\t<br><br>\t\t\t<br>3. 바쁜 사람은 재빨리 \"예\"라고 대답하지만 생산적인 사람은 \"예\"라고 대답하는 데 시간이 걸린다.<br>\t\t\t<br><br>\t\t\t<br>투자의 현인 워런 버핏은 \"성실함이란 대부분의 일에 대해 아니라고 말하는 것\"이라고 정의했다. 대부분 일에 \"아니오\"라고 말하지 못한다면 당신의 인생은 다른 사람들의 우선순위들 사이에서 잘게 쪼개져 분산돼버리고 말 것이다. 성실함이란 인생의 가치를 분명히 세워 시간을 그 가치에 쏟는 것이다.<br>\t\t\t<br><br>\t\t\t<br>4. 바쁜 사람은 행동에 초점을 맞추지만 생산적인 사람은 행동의 의미를 명확하게 하는 데 초점을 맞춘다.<br>\t\t\t<br><br>\t\t\t<br>행동 가운데 성과가 좋은 상위 20%에 집중하려면 당신이 하는 행동들에 어떤 의미가 있는지 명확히 해야 한다. 좋은 인생을 살아가는데 최고의 자원은 개인적으로 쌓은 경험이다. 이 경험을 기록해가며 매일 5분만 어제 무엇이 효과가 있었고 무엇은 효과가 없었는지 생각해보라. 실행하는 일의 생산성이 높아질 것이다.<br>\t\t\t<br><br>\t\t\t<br>5. 바쁜 사람은 모든 문을 열어놓고 생산적인 사람은 대부분 문을 닫는다.<br>\t\t\t<br><br>\t\t\t<br>젊었을 때 모든 가능성을 열어두는 것은 좋다. 여행을 다니고 외국어를 배우며 대학원에 진학하고 다른 나라에서 한번쯤 살아보는 게 좋다. 하지만 인생의 어느 시점에 도달하면 대부분의 가능성은 흘려보내고 한두 가지에 집중해야 한다. 올해 목표가 중국어를 배우는 것이라면 연말이면 중국어를 어느 정도 구사할 수 있다. 하지만 올해 목표가 중국어를 배우고 유럽 여행을 가고 살을 빼고 애인을 만들고 좋아하는 콘서트에 자주 가는 것이라면 연말까지 중국어를 하지 못할 것이다.<br>\t\t\t<br><br>\t\t\t<br>우리는 모두 놀랄 만한 잠재력을 갖고 태어났다. 20대 때 최고의 찬사는 잠재력이 크다는 것이다. 30대에도 잠재력이 크다는 칭찬은 그럭저럭 들어줄 만하다. 하지만 40대에도 잠재력이 크다는 얘길 듣는다면 이건 모욕적일 수 있다. 60대에도 잠재력이 크다는 말을 듣는다면 자기 인생에 대해 곰곰이 생각해봐야 한다. 이젠 많은 잠재력 가운데 한두 가지에 집중해 성과를 보일 때다. <br>\t\t\t<br><br>\t\t\t<br>잠재력이란 겉으로 드러나지 않고 속에 숨어 있는 가능성이다. 인생을 가능성만으로 끝내지 않으려면 바쁜 생활과 이별을 고해야 한다. 자신의 우선순위와 리듬에 맞춰 생산적인 인생을 만들어내야 한다. 40대부턴 숨어 있는 힘과 가능성이 겉으로 나타나 실현돼야 한다. shkwon@ <br>\t\t\t<br><br>\t\t\t출처: <<a href=\"http://news.mt.co.kr/mtview.php?no=2015070403309996468&type=1\" target=\"_blank\">http://news.mt.co.kr/mtview.php?no=2015070403309996468&type=1</a>> <br>\t\t\t<br><br>\t\t<br>\t\t<br>\t\t\t<br>5R<br>\t\t\t<br>리즌 : 왜 사는가<br>\t\t\t<br>루틴 : 삶을 지탱하는 뼈대<br>\t\t\t<br>리추얼 : 의식<br>\t\t\t<br>리프레쉬 : 20%의 휴식이 80%의 퍼포먼스를 좌우한다.<br>\t\t\t<br>레볼루션 : 점진적 진보가 아니다, 혁명적 진화를 꾀하라.",
    "w": 400

];

let cards = [];
let moving = null, resizing = null;

function loadBoard() {
  const saved = localStorage.getItem(SAVE_KEY);
  cards = saved ? JSON.parse(saved) : DEFAULT_CARDS.map(c => ({...c}));
  renderCards();
  if (!saved) autoLayout();
}

function autoLayout() {
  const GAP = 14;
  const boardW = document.getElementById('board').offsetWidth;
  const cols = Math.max(1, Math.floor(boardW / 280));
  const colW = (boardW - GAP * (cols - 1)) / cols;
  const colHeights = new Array(cols).fill(0);
  const allCards = document.querySelectorAll('.card');
  const images = document.querySelectorAll('.card img');
  let loaded = 0;
  const total = images.length;

  function place() {
    allCards.forEach((el, i) => {
      const card = cards[i];
      const w = Math.min(card.w || colW, colW);
      let minCol = 0;
      for (let c = 1; c < cols; c++) if (colHeights[c] < colHeights[minCol]) minCol = c;
      card.x = minCol * (colW + GAP);
      card.y = colHeights[minCol];
      card.w = w;
      el.style.left = card.x + 'px';
      el.style.top = card.y + 'px';
      el.style.width = w + 'px';
      colHeights[minCol] = card.y + el.offsetHeight + GAP;
    });
    document.getElementById('board').style.minHeight = Math.max(...colHeights) + 100 + 'px';
    saveBoard();
  }

  if (total === 0) requestAnimationFrame(place);
  else images.forEach(img => {
    if (img.complete) { loaded++; if (loaded >= total) requestAnimationFrame(place); }
    else img.onload = img.onerror = () => { loaded++; if (loaded >= total) requestAnimationFrame(place); };
  });
}

function syncText() {
  document.querySelectorAll('.card').forEach(el => {
    const idx = +el.dataset.idx;
    if (cards[idx]?.type === 'text') {
      const t = el.querySelector('.text');
      if (t) cards[idx].content = t.innerHTML;
    }
  });
}

function saveBoard() {
  syncText();
  localStorage.setItem(SAVE_KEY, JSON.stringify(cards));
  document.getElementById('status').textContent = '저장됨 ' + new Date().toLocaleTimeString();
}

function renderCards() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  cards.forEach((card, i) => {
    const el = document.createElement('div');
    el.className = 'card';
    el.dataset.idx = i;
    if (card.x !== undefined) el.style.left = card.x + 'px';
    if (card.y !== undefined) el.style.top = card.y + 'px';
    if (card.w) el.style.width = card.w + 'px';

    el.addEventListener('mousedown', e => {
      if (e.target.closest('.text, a, .card-btn, .resize-handle, table')) return;
      e.preventDefault();
      moving = { idx: i, startX: e.clientX, startY: e.clientY, origX: card.x || 0, origY: card.y || 0 };
      el.classList.add('moving');
    });

    const actions = document.createElement('div');
    actions.className = 'card-actions';
    const delBtn = document.createElement('button');
    delBtn.className = 'card-btn'; delBtn.textContent = '×';
    delBtn.onclick = e => { e.stopPropagation(); if (confirm('삭제?')) { cards.splice(i, 1); renderCards(); saveBoard(); } };
    actions.appendChild(delBtn);
    el.appendChild(actions);

    if (card.type === 'text') {
      const text = document.createElement('div');
      text.className = 'text';
      text.contentEditable = true;
      text.innerHTML = card.content || '';
      text.addEventListener('blur', () => { card.content = text.innerHTML; saveBoard(); });
      el.appendChild(text);
    } else if (card.type === 'image') {
      const src = card.src.startsWith('http') || card.src.startsWith('data:') ? card.src : IMG_BASE + card.src;
      const img = document.createElement('img');
      img.src = src;
      img.alt = card.alt || '';
      img.loading = 'lazy';
      img.onerror = () => img.style.display = 'none';
      if (card.link) {
        const a = document.createElement('a'); a.href = card.link; a.target = '_blank';
        a.appendChild(img); el.appendChild(a);
      } else { el.appendChild(img); }
      if (card.caption) {
        const cap = document.createElement('div');
        cap.className = 'caption';
        cap.textContent = card.caption;
        el.appendChild(cap);
      }
    } else if (card.type === 'table') {
      const wrapper = document.createElement('div');
      wrapper.style.overflowX = 'auto';
      wrapper.innerHTML = card.html || '';
      el.appendChild(wrapper);
    }

    const rh = document.createElement('div');
    rh.className = 'resize-handle';
    rh.addEventListener('mousedown', e => {
      e.preventDefault(); e.stopPropagation();
      resizing = { idx: i, startX: e.clientX, startW: card.w || el.offsetWidth };
    });
    el.appendChild(rh);
    board.appendChild(el);
  });

  requestAnimationFrame(() => {
    let maxBottom = 0;
    document.querySelectorAll('.card').forEach(el => {
      const b = (parseFloat(el.style.top) || 0) + el.offsetHeight;
      if (b > maxBottom) maxBottom = b;
    });
    board.style.minHeight = (maxBottom + 100) + 'px';
  });
}

document.addEventListener('mousemove', e => {
  if (moving) {
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`);
    if (!el) return;
    const nx = moving.origX + e.clientX - moving.startX;
    const ny = moving.origY + e.clientY - moving.startY;
    el.style.left = nx + 'px';
    el.style.top = ny + 'px';
  }
  if (resizing) {
    const card = cards[resizing.idx];
    card.w = Math.max(100, resizing.startW + e.clientX - resizing.startX);
    const el = document.querySelector(`.card[data-idx="${resizing.idx}"]`);
    if (el) el.style.width = card.w + 'px';
  }
});

document.addEventListener('mouseup', e => {
  if (moving) {
    const card = cards[moving.idx];
    card.x = Math.max(0, moving.origX + e.clientX - moving.startX);
    card.y = Math.max(0, moving.origY + e.clientY - moving.startY);
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`);
    if (el) { el.classList.remove('moving'); }
    moving = null; saveBoard();
  }
  if (resizing) { resizing = null; saveBoard(); }
});

function addTextCard() {
  cards.push({ type: 'text', content: '', x: 50, y: window.scrollY + 100, w: 300 });
  renderCards();
  setTimeout(() => { const els = document.querySelectorAll('.card .text'); els[els.length - 1]?.focus(); }, 100);
}

function addImageCard() {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = 'image/*';
  input.onchange = e => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = () => { cards.push({ type: 'image', src: reader.result, x: 50, y: window.scrollY + 100, w: 240 }); renderCards(); saveBoard(); };
    reader.readAsDataURL(file);
  };
  input.click();
}

function resetLayout() {
  if (!confirm('자동 재배치합니다. 현재 위치가 변경됩니다.')) return;
  cards.forEach(c => { delete c.x; delete c.y; });
  renderCards(); autoLayout();
}

setInterval(saveBoard, 30000);
loadBoard();
</script>
</body>
</html>
