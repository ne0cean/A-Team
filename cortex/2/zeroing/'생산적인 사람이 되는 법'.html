<style>

.card .text:focus { background: rgba(255,255,255,0.05); border-radius: 4px; padding: 4px; }

.card:hover .card-actions { display: flex; }
.card-btn { background: #333; border: 1px solid #555; color: #ccc; border-radius: 4px; padding: 2px 6px; font-size: 11px; cursor: pointer; }

.resize-handle { position: absolute; bottom: 0; right: 0; width: 16px; height: 16px; cursor: se-resize; opacity: 0; }

.toolbar button { background: #21262d; border: 1px solid #30363d; color: #e0e0e0; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; }
.toolbar button:hover { background: #30363d; }
.toolbar .status { color: #8b949e; font-size: 12px; margin-left: auto; }
.highlight-red { color: #ff6b6b; }

<script>
const SAVE_KEY = 'board--생산적인-사람이-되는-법-';
const IMG_BASE = '../../attachments/';
const DEFAULT_CARDS = [
  {
    "type": "text",
    "content": "'생산적인 사람이 되는 법'<br>\t\t<br>\t\t<br>\t<br>\t<br>\t\t<br>\t\t\t<br>페이스북 생산성 툴 디자이너가 말하는 '생산적인 사람이 되는 법'",
    "w": 260
  },
  {
    "type": "image",
    "src": "556d880c33.png",
    "alt": "'생산적인 사람이 되는 법'",
    "w": 220
  },
  {
    "type": "text",
    "content": "소셜 문답 사이트인 쿼라(Quora)에 한 사용자가 다음과 같은 질문을 올렸다. \"다양한 직업을 가진 사람들이 알려 줄 수 있는, 사람들이 잘 모르는 생산성 팁이 있나요?” 페이스북 사내 생산성 툴을 디자인했고 생산성 소프트웨어 아사나(Asana)를 공동 개발한 <a href=\"http://www.quora.com/Justin-Rosenstein?huffpost\" target=\"_blank\">저스틴 로젠스타인</a>(<a href=\"https://twitter.com/rosenstein\" target=\"_blank\">@rosenstein</a>)의 대답이 가장 큰 인기를 얻었다. 그의 답 전체를 아래에 옮겼다.<br>\t\t\t<br>* * *<br>\t\t\t<br>나는 소프트웨어 개발자 겸 디자이너고 기업가입니다. 나는 여러 훌륭한 회사들(우버, 핀터레스트, 드롭박스 등)이 회사 운영에 사용하는 팀 생산성 소프트웨어인 아사나를 함께 만들었습니다. 페이스북에서 엔지니어링 매니저로 있을 때는 내부 팀 생산성 툴을 디자인했고, 페이스북에서는 지금도 그 툴을 쓰고 있습니다.<br>\t\t\t<br>내가 오래전부터 생산성에 천착해 왔다고만 해둡시다.<br>\t\t\t<br>나의 창의적인 아웃풋(생산량)에 있어 필수적이었던 팁들을 공개합니다. 각 팁은 세 영역 중 하나를 최적화하는 방법에 대한 이야기입니다. 당신의 환경, 당신의 마음, 당신의 프로세스.<br>\t\t\t<br>환경을 최적화하세요<br>\t\t\t<br>집중을 방해하는 것은 다 끄세요. 결론은 명확합니다. ‘멀티태스킹’을 하면 사람들은 더 생산적인 것 같은 기분이 들지만, 연구 결과 멀티태스킹은 생산성을 떨어뜨립니다. 이메일의 유혹은 강합니다. 하지만 <a href=\"http://www.nytimes.com/2013/05/05/opinion/sunday/a-focus-on-distraction.html?_r=1\" target=\"_blank\">일이 자주 끊기면 우리는 멍청해지고</a>, 다시 작업에 착수하기가 <a href=\"http://www.fastcompany.com/944128/worker-interrupted-cost-task-switching\" target=\"_blank\">생각보다 훨씬 오래 걸립니다</a>. 그러니까 집중해야 할 때는<br>\t\t\t<br>- 전화를 ‘방해하지 마시오’ 모드로 해두세요. 아이폰이라면 화면 맨 아래부터 위로 밀어 올리고 달 아이콘(방해금지모드)을 누르세요.<br>\t\t\t<br>- 지금 하는 일과 직접 관련이 없는 브라우저 창은 다 닫으세요.<br>\t\t\t<br>- 이메일 작성이 당신 일의 일부라면, <a href=\"https://mail.google.com/mail/u/1/#search/dontshowanyemails?compose=new\" target=\"_blank\">새 메일이 들어오는 것이 보이지 않는 상태에서 쓸 수 있도록</a>. 해두세요. 지메일에서는 아무것도 보이지 않는 검색 결과를 북마크 해두세요.<br>\t\t\t<br>- 컴퓨터에서 이메일 알림 기능을 꺼놓으세요.<br>\t\t\t<br>- 채팅에서는 로그아웃하세요.<br>\t\t\t<br>플로우 타임(flow time)을 찾아내세요. 만약 하루 종일 회의가 있어 일이 끊긴다면, 복잡한 일에 몰두할 수 있는 상태인 '플로우'에 들어가기가 아주 어렵습니다.<br>\t\t\t<br>- 달력에 당신 혼자만 참석하는 3시간짜리 ‘회의’ 시간을 잡아두세요. 동료들은 이 시간을 피해 스케줄을 잡을 것이고, 당신은 방해받지 않고 일을 끝낼 수 있습니다.<br>\t\t\t<br>- 가능하다면 회사 전체가 일주일에 하루는 회의하지 않는 날로 정하게 하세요. 아사나에서는 <a href=\"https://blog.asana.com/2013/02/no-meeting-wednesdays/\" target=\"_blank\">수요일에는 회의를 하지 않습니다</a>.<br>\t\t\t<br>- 당신이 특정한 일을 할 때 하루 중 어느 시간이 제일 좋은지를 찾아내세요. 당신의 ‘수퍼맨 타임’ 때 제일 힘든 일을 하세요. 저에게 수퍼맨 타임은 오전 10시부터 정오까지라는 걸 찾아내는데 사용한 프로세스가 이겁니다. ‘<a href=\"https://blog.asana.com/2012/10/finding-your-superman-time-a-mindful-approach-to-task-management/\" target=\"_blank\">당신의 수퍼맨 시간 찾기</a>’<br>\t\t\t<br>툴을 마스터하세요. 하루 종일 컴퓨터를 사용한다면, 마우스를 잡으려고 손을 뻗을 때마다 속도가 조금 느려지고 플로우를 조금 잃게 됩니다. 당신이 생각하는 것과 같은 속도로 컴퓨터와 인터랙션(상호작용)해야 합니다.<br>\t\t\t<br>- 당신이 가장 많이 사용하는 소프트웨어의 단축키를 익혀야 합니다.<br>\t\t\t<br>- 마우스를 쓸 때마다 혹시 키보드 단축키가 있는지 알아보세요. 보통은 메뉴 아이템 바로 옆에 있거나, 마우스 커서를 버튼에 올리면 나타나는 작은 팁 박스에 나옵니다. 맥에서는 ⌘은 커맨드, ⌥ 은 옵션, ⇧은 쉬프트, ⌃은 컨트롤입니다.<br>\t\t\t<br>- 마우스 대신 사이즈업을 사용해서 윈도우 창 재배열을 빠르게 할 수 있습니다.<br>\t\t\t<br>마음을 최적화하세요.<br>\t\t\t<br>이 주제에 관해 내가 제일 좋아하는 책은 토니 슈워츠의 ‘몸과 영혼의 에너지 발전소’입니다. 책의 제목부터가 강렬하죠(원제: 완전한 몰입의 힘: 시간이 아닌 에너지를 관리하는 것이 높은 퍼포먼스와 개인적 재개발의 열쇠다 <a href=\"http://www.amazon.com/The-Power-Full-Engagement-Performance/dp/0743226747/ref=as_li_ss_tl?ie=UTF8&linkCode=sl1&tag=94657685-20&linkId=LOBYSROWI2SSKE4I\" target=\"_blank\">The Power of Full Engagement: Managing Energy, Not Time, is the Key to High Performance and Personal Renewal</a>)<br>\t\t\t<br>규칙적으로 휴식을 취하세요. 상식적으로 생각하면 일하는 시간이 길어질수록 일을 더 많이 할 것 같지만, 그건 사실과 다릅니다. 인간은 로봇이 아니에요. 우리의 마음에겐 재충전 시간이 필요합니다. <a href=\"https://hbr.org/2011/12/how-to-accomplish-more-by-doin.html\" target=\"_blank\">연구에 따르면</a> 90분 일하고 15분 쉬는 게 적게 일하고도 더 많이 이룰 수 있는 경험 법칙이라고 합니다.<br>\t\t\t<br>명상하세요. 내가 매일 명상하는 버릇을 들인 방법은 이겁니다(<a href=\"http://www.quora.com/How-do-I-start-a-meditation-habit/answer/Justin-Rosenstein\" target=\"_blank\">클릭</a>).<br>\t\t\t<br>몸을 잘 돌보세요.<br>\t\t\t<br>-물을 드세요. 하루를 시작할 때 나는 큰 잔 다섯 개에 물을 담아 책상 위에 놔둡니다. 하루가 끝날 때까지 전부 다 마십니다. 책상 위에 물잔이 보인다는 건 좋은 지표가 됩니다.<br>\t\t\t<br>-잘 드세요. 탄수화물 위주의 점심 식사는 오후 에너지에 좋지 않습니다.<br>\t\t\t<br>-보조제를 드세요. ‘<a href=\"http://www.amazon.com/Power-Your-Brain-Neuroscience-Enlightenment/dp/140192817X/ref=as_li_ss_tl?_encoding=UTF8&sr=&qid=&linkCode=sl1&tag=94657685-20&linkId=GITH4KAZ44W7GY3N\" target=\"_blank\">Power Up Your Brain</a>’이란 책에 의하면 다음과 같습니다.<br>\t\t\t<br>• 베지테리언 DHA: 매일 1000mg<br>\t\t\t<br>• 올리브유: 매일 1큰술<br>\t\t\t<br>• 알파리포산: 매일 600mg, 식전 30분<br>\t\t\t<br>• 버진 유기농 코코넛유: 아침에 1큰술<br>\t\t\t<br>• 테로스틸벤: 아침저녁 50mg<br>\t\t\t<br>• 설포라판: 아침저녁 30mg<br>\t\t\t<br>• 커큐민: 아침저녁 200mg<br>\t\t\t<br>• 녹차 추출물: 아침저녁 200mg<br>\t\t\t<br>- 운동하세요. <a href=\"http://www.amazon.com/Power-Your-Brain-David-Perlmutter/dp/1401928188\" target=\"_blank\">일주일에 최소 두 번 심장 강화 운동하는 것이 생산성에 영향</a>을 줍니다.<br>\t\t\t<br>- 금식하세요. <a href=\"http://www.amazon.com/Power-Your-Brain-David-Perlmutter/dp/1401928188\" target=\"_blank\">한 달에 하루 내지 일주일에 하루</a>.<br>\t\t\t<br>- 요약하면, 일하지 않는 시간 동안 반드시 몸에 영양을 주세요. 일을 할 때 에너지를 전부 다 쏟아낼 수 있도록요.<br>\t\t\t<br>미루는 버릇은 불편함을 직면하는 것으로 극복하세요. 나는 게을러서 일을 미루는 게 아니라, 가장 중요한 일이 나를 미묘하게(혹은 노골적으로) 불편하게 만들기 때문에 일을 미루는 겁니다. 그럴 땐 이렇게 해야 합니다.<br>\t\t\t<br>- 그 일이 왜 불편한지 정직해지세요. 분명하게, 애정을 담아 불편함의 근원을 정확히 적거나 친구에게 이야기해보세요. 왜 그 일이 그렇게 싫은가요?<br>\t\t\t<br>- 편안한 다음 한 단계를 찾아내세요.<br>\t\t\t<br>- 이 기법에 대해서는 ‘<a href=\"https://www.linkedin.com/pulse/20140121123613-25056271-tasks-down-how-to-overcome-procrastination-by-facing-discomfort\" target=\"_blank\">불편함에 직면해서 미루는 버릇을 극복하기(클릭)</a>’에 자세히 적었습니다.<br>\t\t\t<br>지금 당장은 공포를 마주할 에너지가 없다면, 페이스북을 켜는 대신 적어도 두 번째로 중요한 일을 하세요. 왕성하게 활동하는 스탠포드 교수 존 페리는 이것을 ‘구조화된 미루는 버릇’이라고 부르며, 자신의 성공이 대부분 이것 덕분이라고 합니다. 그의 사이트 <a href=\"http://www.structuredprocrastination.com/\" target=\"_blank\">StructuredProcrastination.com</a>을 참조하세요.<br>\t\t\t<br>프로세스를 최적화하세요.<br>\t\t\t<br>명료한 계획을 세우세요. 비생산성의 상당 부분은 우선 순위를 매겨놓지 않아서 생깁니다. 이게 불확실하면 당신이 목표를 달성하기 위해 해야 할 일이 무엇인지, 무엇이 가장 우선인지를 알 수 없습니다.<br>\t\t\t<br>다음 단계가 무엇인지 당신에게 100% 분명하고, 당신 팀 전원이 동의하지 않았다면 일을 더 하지 마세요.<br>\t\t\t<br>이것부터 정해 놓고 시작하세요: 우리의 목표가 뭐지? 우린 왜 그 목표를 이루고 싶어하지? 이루는 데 필요한 단계들이 뭐지? 각 단계를 책임질 사람은 누구지? 어떤 순서로 해야 하지?<br>\t\t\t<br>명료한 계획을 세우는 방법을 더 자세히 설명하겠습니다(<a href=\"http://firstround.com/review/Asanas-Justin-Rosenstein-on-the-One-Quality-Every-Startup-Needs-to-Survive/\" target=\"_blank\">클릭</a>).<br>\t\t\t<br>협업하세요. 혼자 일하는 걸 좋아하는 사람도 있지만, 복잡한 일을 할 경우에는 나는 혼자 일하는 게 보통 고통스럽고 집중도 잘 안되더군요.<br>\t\t\t<br>- 함께 일하는 걸 즐길 팀 동료를 찾으세요. 가끔은 나 혼자 했으면 이틀 걸렸을 일이 잘 맞는 파트너와 함께 하면 2시간 만에 끝날 때도 있습니다. ‘페어 프로그래밍’은 소프트웨어 엔지니어링에서 흔하지만, 어떤 일에도 적용 가능합니다.<br>\t\t\t<br>- 혹은 텍스트 편집기나 수첩과 짝을 이뤄서 스스로와 대화를 나누는 방법도 있습니다. 스스로에게 중요한 질문을 던지고 답을 적으세요. 나는 질문을 적고, 자유로운 형식으로 답을 적는 식으로 컴퓨터와 함께 길고 전략적이며 생산적인 대화를 나눠왔습니다.<br>\t\t\t<br>데드라인을 공개하고 거기에 맞추세요. 동료 집단이 주는 압력을 당신에게 유리하게 활용하세요. 만약 중요한 일인데 데드라인이 정해져 있지 않다면, 나는 사람들에게 대담하게 말합니다. “금요일 업무 시간이 끝나기 전에 보내 드릴게요.” 팀원들 앞에서 우스운 꼴이 되고 싶지는 않으니, 나는 자연히 금요일까지 보내 주려고 노력하게 되겠죠.<br>\t\t\t<br>소프트웨어를 사용해 당신 일의 트랙을 따라가세요. 나는 <a href=\"https://asana.com/\" target=\"_blank\">아사나</a>가 이 점에 있어서는 최적의 장소라고 생각합니다. 당신의 할 일 리스트를 따라갈 뿐 아니라, 팀 전체의 일의 플로우를 관리하기 때문에 서로 무엇을 하는지 공유하기 위해 끝없이 회의를 할 필요가 없어요. 그리고 일에 대한 대화도 저장이 되니까 필요한 정보를 찾느라 시종일관 이메일을 뒤질 필요도 없어요.<br>\t\t\t<br>깊이 생각하는 시간을 가지세요. 매일 일과가 끝날 무렵에 몇 분만 시간을 내서 그 날 잘 된 일과 덜 잘 된 일이 무엇이었나 생각해 보세요., 다음에 일할 때 워크플로우에서 개선할 수 있는 점이 있나요? 효율성을 매일 1% 씩 높일 수 있다면, 당신은 1년 뒤에는 15배 생산적이 되어 있을 겁니다.<br>\t\t\t<br>더 많은 생산성 팁은 여기를 참고하시길 : \"<a href=\"http://www.quora.com/Personal-Productivity/How-do-the-most-successful-people-spend-the-first-hour-of-their-day\" target=\"_blank\">성공한 사람들은 매일 첫 한 시간을 어떻게 보낼까?\"</a><br>\t\t\t<br><br>\t\t\t출처: <<a href=\"http://www.huffingtonpost.kr/2015/05/19/story_n_7310890.html?ncid=fcbklnkkrhpmg000000012\" target=\"_blank\">http://www.huffingtonpost.kr/2015/05/19/story_n_7310890.html?ncid=fcbklnkkrhpmg000000012</a>>",

let cards = [];
let moving = null, resizing = null;

function loadBoard() {
  const saved = localStorage.getItem(SAVE_KEY);
  cards = saved ? JSON.parse(saved) : DEFAULT_CARDS.map(c => ({...c}));
  renderCards();
  if (!saved) autoLayout();
}

function autoLayout() {
  const GAP = 14;
  const boardW = document.getElementById('board').offsetWidth;
  const cols = Math.max(1, Math.floor(boardW / 280));
  const colW = (boardW - GAP * (cols - 1)) / cols;
  const colHeights = new Array(cols).fill(0);
  const allCards = document.querySelectorAll('.card');
  const images = document.querySelectorAll('.card img');
  let loaded = 0;
  const total = images.length;

  function place() {
    allCards.forEach((el, i) => {
      const card = cards[i];
      const w = Math.min(card.w || colW, colW);
      let minCol = 0;
      for (let c = 1; c < cols; c++) if (colHeights[c] < colHeights[minCol]) minCol = c;
      card.x = minCol * (colW + GAP);
      card.y = colHeights[minCol];
      card.w = w;
      el.style.left = card.x + 'px';
      el.style.top = card.y + 'px';
      el.style.width = w + 'px';
      colHeights[minCol] = card.y + el.offsetHeight + GAP;
    });
    document.getElementById('board').style.minHeight = Math.max(...colHeights) + 100 + 'px';
    saveBoard();
  }

  if (total === 0) requestAnimationFrame(place);
  else images.forEach(img => {
    if (img.complete) { loaded++; if (loaded >= total) requestAnimationFrame(place); }
    else img.onload = img.onerror = () => { loaded++; if (loaded >= total) requestAnimationFrame(place); };
  });
}

function syncText() {
  document.querySelectorAll('.card').forEach(el => {
    const idx = +el.dataset.idx;
    if (cards[idx]?.type === 'text') {
      const t = el.querySelector('.text');
      if (t) cards[idx].content = t.innerHTML;
    }
  });
}

function saveBoard() {
  syncText();
  localStorage.setItem(SAVE_KEY, JSON.stringify(cards));
  document.getElementById('status').textContent = '저장됨 ' + new Date().toLocaleTimeString();
}

function renderCards() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  cards.forEach((card, i) => {
    const el = document.createElement('div');
    el.className = 'card';
    el.dataset.idx = i;
    if (card.x !== undefined) el.style.left = card.x + 'px';
    if (card.y !== undefined) el.style.top = card.y + 'px';
    if (card.w) el.style.width = card.w + 'px';

    el.addEventListener('mousedown', e => {
      if (e.target.closest('.text, a, .card-btn, .resize-handle, table')) return;
      e.preventDefault();
      moving = { idx: i, startX: e.clientX, startY: e.clientY, origX: card.x || 0, origY: card.y || 0 };
      el.classList.add('moving');
    });

    const actions = document.createElement('div');
    actions.className = 'card-actions';
    const delBtn = document.createElement('button');
    delBtn.className = 'card-btn'; delBtn.textContent = '×';
    delBtn.onclick = e => { e.stopPropagation(); if (confirm('삭제?')) { cards.splice(i, 1); renderCards(); saveBoard(); } };
    actions.appendChild(delBtn);
    el.appendChild(actions);

    if (card.type === 'text') {
      const text = document.createElement('div');
      text.className = 'text';
      text.contentEditable = true;
      text.innerHTML = card.content || '';
      text.addEventListener('blur', () => { card.content = text.innerHTML; saveBoard(); });
      el.appendChild(text);
    } else if (card.type === 'image') {
      const src = card.src.startsWith('http') || card.src.startsWith('data:') ? card.src : IMG_BASE + card.src;
      const img = document.createElement('img');
      img.src = src;
      img.alt = card.alt || '';
      img.loading = 'lazy';
      img.onerror = () => img.style.display = 'none';
      if (card.link) {
        const a = document.createElement('a'); a.href = card.link; a.target = '_blank';
        a.appendChild(img); el.appendChild(a);
      } else { el.appendChild(img); }
      if (card.caption) {
        const cap = document.createElement('div');
        cap.className = 'caption';
        cap.textContent = card.caption;
        el.appendChild(cap);
      }
    } else if (card.type === 'table') {
      const wrapper = document.createElement('div');
      wrapper.style.overflowX = 'auto';
      wrapper.innerHTML = card.html || '';
      el.appendChild(wrapper);
    }

    const rh = document.createElement('div');
    rh.className = 'resize-handle';
    rh.addEventListener('mousedown', e => {
      e.preventDefault(); e.stopPropagation();
      resizing = { idx: i, startX: e.clientX, startW: card.w || el.offsetWidth };
    });
    el.appendChild(rh);
    board.appendChild(el);
  });

  requestAnimationFrame(() => {
    let maxBottom = 0;
    document.querySelectorAll('.card').forEach(el => {
      const b = (parseFloat(el.style.top) || 0) + el.offsetHeight;
      if (b > maxBottom) maxBottom = b;
    });
    board.style.minHeight = (maxBottom + 100) + 'px';
  });
}

document.addEventListener('mousemove', e => {
  if (moving) {
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`);
    if (!el) return;
    const nx = moving.origX + e.clientX - moving.startX;
    const ny = moving.origY + e.clientY - moving.startY;
    el.style.left = nx + 'px';
    el.style.top = ny + 'px';
  }
  if (resizing) {
    const card = cards[resizing.idx];
    card.w = Math.max(100, resizing.startW + e.clientX - resizing.startX);
    const el = document.querySelector(`.card[data-idx="${resizing.idx}"]`);
    if (el) el.style.width = card.w + 'px';
  }
});

document.addEventListener('mouseup', e => {
  if (moving) {
    const card = cards[moving.idx];
    card.x = Math.max(0, moving.origX + e.clientX - moving.startX);
    card.y = Math.max(0, moving.origY + e.clientY - moving.startY);
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`);
    if (el) { el.classList.remove('moving'); }
    moving = null; saveBoard();
  }
  if (resizing) { resizing = null; saveBoard(); }
});

function addTextCard() {
  cards.push({ type: 'text', content: '', x: 50, y: window.scrollY + 100, w: 300 });
  renderCards();
  setTimeout(() => { const els = document.querySelectorAll('.card .text'); els[els.length - 1]?.focus(); }, 100);
}

function addImageCard() {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = 'image/*';
  input.onchange = e => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = () => { cards.push({ type: 'image', src: reader.result, x: 50, y: window.scrollY + 100, w: 240 }); renderCards(); saveBoard(); };
    reader.readAsDataURL(file);
  };
  input.click();
}

function resetLayout() {
  if (!confirm('자동 재배치합니다. 현재 위치가 변경됩니다.')) return;
  cards.forEach(c => { delete c.x; delete c.y; });
  renderCards(); autoLayout();
}

setInterval(saveBoard, 30000);
loadBoard();
</script>
</body>
</html>
