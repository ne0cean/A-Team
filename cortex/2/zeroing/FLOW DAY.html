<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FLOW DAY</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #1e1e1e;
  color: #e0e0e0;
  font-family: 'Segoe UI', -apple-system, sans-serif;
  font-size: 15px;
  line-height: 1.6;
  padding: 20px 30px 60px;
  overflow-x: hidden;
}
a { color: #6cb0f6; text-decoration: none; }
a:hover { text-decoration: underline; }
.title-bar {
  background: #3a3a5c;
  display: inline-block;
  padding: 6px 16px;
  font-size: 22px;
  font-weight: bold;
  color: #fff;
  margin-bottom: 4px;
}
.date { color: #999; font-size: 13px; margin-bottom: 20px; }
.board { position: relative; }
.card {
  background: #2a2a2a;
  border: 1px solid #3a3a3a;
  border-radius: 8px;
  padding: 12px;
  position: absolute;
  cursor: grab;
  transition: box-shadow 0.15s;
  overflow: hidden;
}
.card:hover { box-shadow: 0 0 0 1px #58a6ff; z-index: 10; }
.card.moving { opacity: 0.8; box-shadow: 0 4px 24px rgba(0,0,0,0.6); z-index: 100; cursor: grabbing; }
.card img { width: 100%; border-radius: 4px; display: block; }
.card .caption { font-size: 12px; color: #888; margin-top: 6px; }
.card .text { outline: none; min-height: 20px; white-space: pre-wrap; word-break: break-word; }
.card .text:focus { background: rgba(255,255,255,0.05); border-radius: 4px; padding: 4px; }
.card .text:empty::before { content: '텍스트 입력...'; color: #555; }
.card table { border-collapse: collapse; width: 100%; font-size: 13px; }
.card table td, .card table th { border: 1px solid #444; padding: 4px 8px; vertical-align: top; }
.card table th { background: #333; color: #ccc; }
.card-actions { position: absolute; top: 4px; right: 4px; display: none; gap: 4px; }
.card:hover .card-actions { display: flex; }
.card-btn { background: #333; border: 1px solid #555; color: #ccc; border-radius: 4px; padding: 2px 6px; font-size: 11px; cursor: pointer; }
.card-btn:hover { background: #444; color: #fff; }
.resize-handle { position: absolute; bottom: 0; right: 0; width: 16px; height: 16px; cursor: se-resize; opacity: 0; }
.card:hover .resize-handle { opacity: 0.6; }
.resize-handle::after { content: ''; position: absolute; bottom: 3px; right: 3px; width: 8px; height: 8px; border-right: 2px solid #666; border-bottom: 2px solid #666; }
.toolbar { position: fixed; bottom: 0; left: 0; right: 0; background: #161b22; border-top: 1px solid #30363d; padding: 8px 20px; display: flex; gap: 12px; align-items: center; z-index: 200; }
.toolbar button { background: #21262d; border: 1px solid #30363d; color: #e0e0e0; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; }
.toolbar button:hover { background: #30363d; }
.toolbar .status { color: #8b949e; font-size: 12px; margin-left: auto; }
.highlight-red { color: #ff6b6b; }
.highlight-blue { color: #6cb0f6; }
</style>
</head>
<body>
<div class="title-bar">FLOW DAY</div>
<div class="date">2024년 12월 31일 화요일</div>
<div class="board" id="board"></div>
<div class="toolbar">
  <button onclick="addTextCard()">+ 텍스트</button>
  <button onclick="addImageCard()">+ 이미지</button>
  <button onclick="saveBoard()">💾 저장</button>
  <button onclick="resetLayout()">↺ 재배치</button>
  <span class="status" id="status">Ready</span>
</div>
<script>
const SAVE_KEY = 'board-FLOW-DAY';
const IMG_BASE = '../../attachments/';
const DEFAULT_CARDS = [
  {
    "type": "text",
    "content": "FLOW DAY<br>\t\t<br>\t\t<br>\t<br>\t<br>\t\t<br>\t\t\t<br>11시간에 집중 플로우 데이 4 가지 스텝<br>\t\t\t<br><br>\t\t\t<br>첫 번째 remove Flow blockers 플로 상태를 막는 것들을 제거하기 - 전날 저녁부터 플로우 데이를 위한 준비<br>\t\t\t<br>두 번째 increase Flow fless 플로 상태에 더 쉽게 들어가는 세팅 만들기 <br>\t\t\t<br>세 번째 flow triggers 플로우에 들어가는 신호<br>\t\t\t<br>네 번째 enter and exit Flow cycle multiple times 하루에 플로 상태에 여러 번 들어가기 <br>\t\t\t<br><br>\t\t\t<br>가장 먼저 찾아야 하는 것은 내가 무엇을 완료하고 싶은지 정하는 겁니다 <br>\t\t\t<br>우리의 두뇌는 항상 명확한 한 가지 목표를 갈망하고 거든요 그리고 그 목표를 찾는 질문은 이거예요 <br>\t\t\t<br>어떤 행동이 완료될 때 나의 커리어 혹은 전문성에 가장 큰 발전을 만들까 적은 일로 큰 결과를 가져오거나 미래의 나의 일을 더 효율적으로 만들 수 있는 그런 목표에 따른 행동을 정해 보세요 <br>\t\t\t<br>예를 들어 당신의 목표가 해리 포터 작가 JK 롤링 럼 베스트셀러 작가가 되는 거라면 당신이 집중해야 하는 한 가지는 100만 불을 파는 결과가 아니라 500자 혹은 천자의 의 글을 쓰는 것이 되어야 합니다 <br>\t\t\t<br><br>\t\t\t<br>그렇게 한 달이라는 시간 동안 끝낼 수 있는 일을 중요도 순으로 나열해 보세요 이렇게 두 뇌에게 무엇에 집중해야 하는지를 알려 줄수록 두뇌는 해당 목표 이외에 불필요한 일들은 뒷전에 놓게 됩니다 <br>\t\t\t<br>두뇌의 한 부분인 전전두 피질이 그 목표에 따른 정보만을 받아들일 수 있도록 재설정 되거든요 또한 자신이 정한 목표에 도달하게 되었을 때 엄청난 양의 도파민이 분비되며 희열을 느끼죠 그렇게 우리는 또 다시 동기 부여를 받고 지속적으로 일에 몰두할 수 있는 환경이 조성 됩니다.<br>\t\t\t<br><br>\t\t\t<br>______________<br>\t\t\t<br><br>\t\t\t<br>첫 번째, 조용한 환경에서 잠을 자도록 이어 플러그를 사용하는 것 <br>\t\t\t<br>둘째, 어두운 환경에서 숙면을 취하도록 안대를 사용하는 것 <br>\t\t\t<br>셋째, 16도에서 20도 사이의 약간 추운 환경에서 잠에 드는 것 <br>\t\t\t<br>마지막, 잠에 들기 최소 세 시간 전 식사를 완료하고 배고픈 상태로 잠에 드는 것<br>\t\t\t<br>네 가지가 지켜졌을 때 완전한 수면 가능<br>\t\t\t<br><br>\t\t\t<br>플로 triggers <br>\t\t\t<br>플로 상태에 들어가는 신호를 만드는 것은 인지적 준비 cognitive<br>\t\t\t<br>우리의 두뇌가 하루 동안 할 수 있는 인식적 인지적 선택에는 한계가 있기에 전날 미리 필요한 모든 선택을 해놓는 것<br>\t\t\t<br>어떤 옷을 입을 건지 어디서 일을 할 건지 무엇을 먹을 것인지 등을 두 정해 놓는 거죠 그렇게 내가 해야 할 일은 단 한 가지 첫 번째 단계에서 계획한 일만 남도록 모든 환경적 세팅을 완료해 놓는 거죠 그리고 핸드폰은 되도록 멀리 두거나 확인할 수 없도록 만드는 것이 관건<br>\t\t\t<br><br>\t\t\t<br>가장 좋은 옷을 입고 가장 좋아하는 간식을 준비하세요<br>\t\t\t<br>가장 좋은 호텔을 예약해 로비에서 일을 해도 좋고 럭셔리 스파나 마사지를 예약해 놔도 좋습니다 플로우 데이 끝 완벽한 보상을 준비해 놓으세요 내가 단 하루에 모든 걸 쏟아 놓을 수 있도록 무리를 해서라도 준비를 해야 합니다<br>\t\t\t<br><br>\t\t\t<br>struggle release Flow recovery<br>\t\t\t<br>초반에는 정말 힘이 들고 많은 노력이 필요하지만 어느새 우리 몸은 그 상태에서 해방되며 플로우 상태가 시작돼요 그리고 일반적으로 한두 시간이지 하면 우리는 지루함을 느끼게 되기에 회복이 필요하죠 이때는 핸드폰을 하지 말고 아무것도 없는 벽을 보며 아주 천천히 호흡을 해 보세요 몇 분이 채되지 않아서 다시 몰입에 들어가고 싶은 그런 마음이 자연스레 들 겁니다 그리고 그렇게 노력 해방 흐름 회복은 플로우 타임 블락을 진행하며 끊임없이 반복됩니다<br>\t\t\t<br><br>\t\t\t<br>5시에 기상을 해서 8시까지로 바로 플로우 상태에 들어갑니다 기상 직후 90초 이내에 전날 정해 놓은 일 중 가장 중요한 일에 집중을 시작하죠 물론 일어나자마자 일을 하면 괜찮을까 너무 피곤하고 비몽사몽인 텐데 과연 집중이 잘 돼 될까 이런 생각을 할 수도 있습니다 하지만 제가이 시간에 집중을 시작하는 이유는 플로우 상태에 빠졌을 때 우리 두뇌의 뇌파와 기상 직후 우리의 두 뇌의 뇌파가 상당히 비슷하기 때문<br>\t\t\t<br><br>\t\t\t<br>단 15분 정도만 지나면 최고의 집중력이 물밀듯 쏟아지는 것을 느낄 수 있을 겁니다.<br>\t\t\t<br><br>\t\t\t<br>5시부터는 1한시간 동안의 휴식 <br>\t\t\t<br>넌 스티뮬레이팅 리커버리를 진행합니다이 한시간 동안은 명상 혹은 찬물 샤워를 하며이 시간을 보내고 앞서 내가 완료한 첫 번째 플로 타임 블락을 돌아보며 새로운 아이디어를 적어보는 것도 좋은 방법이죠 <br>\t\t\t<br>그리고 리아는 이 때 식사는 거르는 것을 추천했어요 배가 차면 집중이 더 어려워지기 커피를 마시며 100g 정도의 카페인이나 녹차를 포함 다양한 차에 들어 있는 200g 엘테아닌 섭취한다면 두 번째 플로우 세션에 도움이 될 거라고 말했습니다 <br>\t\t\t<br>그리고 두 번째 플로우 세션은 9시부터는 일래 완료도 점점 빨라지는 걸 느낄 테고 그렇게 두 번째 플로우 세션이 끝난 후엔 12시부터 1시 사이 두 번째 휴 휴식을 하게 됩니다 이때는 낮잠 스트레칭 산책 등을 해 주면서 약간의 음식을 먹거나 간식을 먹어도 좋습니다 그리고 이미 6 시간의 플로우 상태에서 일을 완료했기 여태껏 느끼지 못한 뿌듯함과 성취감을 느끼게 되죠 그리고 그렇게 쉬는 시간이 끝나고 나서는 1시부터는 짧은 세 번째 플로우 세션을 시작합니다 그리고 3시부터는 낮잠 웨이트 트레이닝 혹은<br>\t\t\t<br>마사지나 사우나 등의 활동적 회복을 진행하죠 그리고 마지막 플로우 세션은 5시부터는 이때는 물을 충분히 마시고 환기를 시키며 원하는 온도에서 원하는 음악을 들으며 마지막까지 집중에 끈을 놓지 않도록 나만의 환경을 조성하면서 집중을 이어가세요 그리고 그끝 8시가 되면네 개의 플로우 블락을 완료하며 정해 놓았던 플로우 데이가 끝이 나게 되죠&#160;<br>\t\t\t<br><br>\t\t\t<br>출처: <<a href=\"https://www.youtube.com/watch?v=ERjRWTtMvB8\" target=\"_blank\">https://www.youtube.com/watch?v=ERjRWTtMvB8</a>> <br>\t\t\t<br><br>\t\t\t<br>플로우의 첫 단계는,&#160;분투(Struggle)이다. 해결하고자 하는 문제와 씨름하는 단계. 문제를 인식하고, 어려움과 마주한다. 물론, 집중과 동기가 강할수록 좋다. 문제 해결에서 비롯될 큰 결과에 대한 기대감은 이를 증폭시킨다. 문제를 파악하고, 그를 해결하기 위한 최대한의 노력을 하는 상태. 하지만, 선형적이고 일률적인 방식으로는 더 이상 해결할 수 없는 난제에 봉착한다.<br>\t\t\t<br><br>\t\t\t<br>두 번째 단계는,&#160;이완(Release)이다. 문제에서 잠깐 물러나 한 숨 돌리는 틈. 아인슈타인은 노를 저었다. 스티브 잡스는 맨발로 산책을 했다. 따뜻한 물로 샤워를 할 수도, 악기를 연주할 수도, 명상을 할 수도 있을 것이다. 이러한 이완의 행위는 몸속에 있는 스트레스 호르몬을 배출해주는 산화질소의 생성을 늘린다. 분투에서 쌓인 스트레스 호르몬은 두뇌에서 씻겨나간다.<br>\t\t\t<br><br>\t\t\t<br>이렇게, 문제에서 한걸음 물러난 사이. 의식의 뒤편에서 새로운 아이디어가 솟아난다. 문제가 새로운 시각에서 파악된다. 멀리 떨어져 있던 정보들의 연관성이 파악되고, 새로운 의미가 나타난다.<br>\t\t\t<br><br>\t\t\t<br>세 번째 단계,&#160;플로우(Flow)이다. 스트레스 호르몬을 떠내려 보내고 맑아진 두뇌에 떠오른 새로운 아이디어가 심어진다. 집중력, 동기감, 자신감, 환희감, 진통효과를 주는 호르몬들이 동시에 분비된다. 기량과 기분은 최고조에 달한다. 분투하며 넘지 못했던 벽들을 가뿐히 넘어선다. 시간은 마치 멈춘 듯 천천히 흐른다. 미래에 대한 걱정이나 과거에 대한 후회는 사라진다. 지금 이 순간의 생생한 경험이 있을 뿐이다. 몇 시간이 지난 후 생각한다. ‘내가 이걸 해냈구나!’<br>\t\t\t<br><br>\t\t\t<br>네 번째 단계는&#160;휴식(Rest)이다. 이처럼 강렬한 집중은 에너지가 많이 소모되는 일이다. 또한 새로이 얻어낸 인식과 통찰, 정보는 휴식을 통해 통합될 필요가 있다. 특히, 깊은 잠이 중요하다.<br>\t\t\t<br><br>\t\t\t출처: <<a href=\"https://brunch.co.kr/@ryhynk/19\" target=\"_blank\">https://brunch.co.kr/@ryhynk/19</a>> <br>\t\t\t<br><br>\t\t<br>\t\t<br>\t\t\t<br>플로우리서치 컬렉티브의 CEO이자 유명 멘토인 리안 도리스가 제안<br>\t\t\t<br><a href=\"https://youtu.be/Q7Phkq0BUXM\" target=\"_blank\">How To Finish One Month of Work Today</a>",
    "w": 400
  }
];

let cards = [];
let moving = null, resizing = null;

function loadBoard() {
  const saved = localStorage.getItem(SAVE_KEY);
  cards = saved ? JSON.parse(saved) : DEFAULT_CARDS.map(c => ({...c}));
  renderCards();
  if (!saved) autoLayout();
}

function autoLayout() {
  const GAP = 14;
  const boardW = document.getElementById('board').offsetWidth;
  const cols = Math.max(1, Math.floor(boardW / 280));
  const colW = (boardW - GAP * (cols - 1)) / cols;
  const colHeights = new Array(cols).fill(0);
  const allCards = document.querySelectorAll('.card');
  const images = document.querySelectorAll('.card img');
  let loaded = 0;
  const total = images.length;

  function place() {
    allCards.forEach((el, i) => {
      const card = cards[i];
      const w = Math.min(card.w || colW, colW);
      let minCol = 0;
      for (let c = 1; c < cols; c++) if (colHeights[c] < colHeights[minCol]) minCol = c;
      card.x = minCol * (colW + GAP);
      card.y = colHeights[minCol];
      card.w = w;
      el.style.left = card.x + 'px';
      el.style.top = card.y + 'px';
      el.style.width = w + 'px';
      colHeights[minCol] = card.y + el.offsetHeight + GAP;
    });
    document.getElementById('board').style.minHeight = Math.max(...colHeights) + 100 + 'px';
    saveBoard();
  }

  if (total === 0) requestAnimationFrame(place);
  else images.forEach(img => {
    if (img.complete) { loaded++; if (loaded >= total) requestAnimationFrame(place); }
    else img.onload = img.onerror = () => { loaded++; if (loaded >= total) requestAnimationFrame(place); };
  });
}

function syncText() {
  document.querySelectorAll('.card').forEach(el => {
    const idx = +el.dataset.idx;
    if (cards[idx]?.type === 'text') {
      const t = el.querySelector('.text');
      if (t) cards[idx].content = t.innerHTML;
    }
  });
}

function saveBoard() {
  syncText();
  localStorage.setItem(SAVE_KEY, JSON.stringify(cards));
  document.getElementById('status').textContent = '저장됨 ' + new Date().toLocaleTimeString();
}

function renderCards() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  cards.forEach((card, i) => {
    const el = document.createElement('div');
    el.className = 'card';
    el.dataset.idx = i;
    if (card.x !== undefined) el.style.left = card.x + 'px';
    if (card.y !== undefined) el.style.top = card.y + 'px';
    if (card.w) el.style.width = card.w + 'px';

    el.addEventListener('mousedown', e => {
      if (e.target.closest('.text, a, .card-btn, .resize-handle, table')) return;
      e.preventDefault();
      moving = { idx: i, startX: e.clientX, startY: e.clientY, origX: card.x || 0, origY: card.y || 0 };
      el.classList.add('moving');
    });

    const actions = document.createElement('div');
    actions.className = 'card-actions';
    const delBtn = document.createElement('button');
    delBtn.className = 'card-btn'; delBtn.textContent = '×';
    delBtn.onclick = e => { e.stopPropagation(); if (confirm('삭제?')) { cards.splice(i, 1); renderCards(); saveBoard(); } };
    actions.appendChild(delBtn);
    el.appendChild(actions);

    if (card.type === 'text') {
      const text = document.createElement('div');
      text.className = 'text';
      text.contentEditable = true;
      text.innerHTML = card.content || '';
      text.addEventListener('blur', () => { card.content = text.innerHTML; saveBoard(); });
      el.appendChild(text);
    } else if (card.type === 'image') {
      const src = card.src.startsWith('http') || card.src.startsWith('data:') ? card.src : IMG_BASE + card.src;
      const img = document.createElement('img');
      img.src = src;
      img.alt = card.alt || '';
      img.loading = 'lazy';
      img.onerror = () => img.style.display = 'none';
      if (card.link) {
        const a = document.createElement('a'); a.href = card.link; a.target = '_blank';
        a.appendChild(img); el.appendChild(a);
      } else { el.appendChild(img); }
      if (card.caption) {
        const cap = document.createElement('div');
        cap.className = 'caption';
        cap.textContent = card.caption;
        el.appendChild(cap);
      }
    } else if (card.type === 'table') {
      const wrapper = document.createElement('div');
      wrapper.style.overflowX = 'auto';
      wrapper.innerHTML = card.html || '';
      el.appendChild(wrapper);
    }

    const rh = document.createElement('div');
    rh.className = 'resize-handle';
    rh.addEventListener('mousedown', e => {
      e.preventDefault(); e.stopPropagation();
      resizing = { idx: i, startX: e.clientX, startW: card.w || el.offsetWidth };
    });
    el.appendChild(rh);
    board.appendChild(el);
  });

  requestAnimationFrame(() => {
    let maxBottom = 0;
    document.querySelectorAll('.card').forEach(el => {
      const b = (parseFloat(el.style.top) || 0) + el.offsetHeight;
      if (b > maxBottom) maxBottom = b;
    });
    board.style.minHeight = (maxBottom + 100) + 'px';
  });
}

document.addEventListener('mousemove', e => {
  if (moving) {
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`);
    if (!el) return;
    const nx = moving.origX + e.clientX - moving.startX;
    const ny = moving.origY + e.clientY - moving.startY;
    el.style.left = nx + 'px';
    el.style.top = ny + 'px';
  }
  if (resizing) {
    const card = cards[resizing.idx];
    card.w = Math.max(100, resizing.startW + e.clientX - resizing.startX);
    const el = document.querySelector(`.card[data-idx="${resizing.idx}"]`);
    if (el) el.style.width = card.w + 'px';
  }
});

document.addEventListener('mouseup', e => {
  if (moving) {
    const card = cards[moving.idx];
    card.x = Math.max(0, moving.origX + e.clientX - moving.startX);
    card.y = Math.max(0, moving.origY + e.clientY - moving.startY);
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`);
    if (el) { el.classList.remove('moving'); }
    moving = null; saveBoard();
  }
  if (resizing) { resizing = null; saveBoard(); }
});

function addTextCard() {
  cards.push({ type: 'text', content: '', x: 50, y: window.scrollY + 100, w: 300 });
  renderCards();
  setTimeout(() => { const els = document.querySelectorAll('.card .text'); els[els.length - 1]?.focus(); }, 100);
}

function addImageCard() {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = 'image/*';
  input.onchange = e => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = () => { cards.push({ type: 'image', src: reader.result, x: 50, y: window.scrollY + 100, w: 240 }); renderCards(); saveBoard(); };
    reader.readAsDataURL(file);
  };
  input.click();
}

function resetLayout() {
  if (!confirm('자동 재배치합니다. 현재 위치가 변경됩니다.')) return;
  cards.forEach(c => { delete c.x; delete c.y; });
  renderCards(); autoLayout();
}

setInterval(saveBoard, 30000);
loadBoard();
</script>
