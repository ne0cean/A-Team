    "content": "성공한 사람들이 지키는 12가지주말 생활습관<br>\t\t<br>\t\t<br>\t<br>\t<br>\t\t<br>\t\t\t<br>자기발전서, ‘성공한 사람들이 주말에 하는 일’의 작가이자 시간관리 전문가인 로라 밴더캠은 성공한 사람들의 주말은 그들이 어떻게 그 자리에 설 수 있었는지 보여주는 시간이라고 말했다. 그들은 짧은 시간을 계획적으로 사용하여 주말을 최대한 활용하고 그 다음 한주간 최고의 성과를 얻어 성공의 자리에 올랐을 것이다.<br>\t\t\t<br><br>\t\t\t<br>성공한 사람들이 지키는 다양한 습관 중 그들의 ‘주말 생활습관’을 12가지로 정리하여 비즈니스인사이더가 보도했다.",

    "content": "(123rf)<br>\t\t\t\t<br>\t\t\t<br>\t\t\t<br>1. 주말이라고 허송생활을 보내지 않는다<br>\t\t\t<br><br>\t\t\t<br>성공한 사람들은 황금 같은 주말을 텔레비전 같은 허송생활을 보내는 것이 아니라 의식적인 선택으로 주말을 보낸다고 한다.<br>\t\t\t<br><br>\t\t\t<br>2. 자신과의 약속을 잡는다<br>\t\t\t<br><br>\t\t\t<br>이들은 자신이 하고 싶거나 해야할 일을 ‘나와의 약속’으로 시간을 할당한 뒤 이 시간을 타인과의 약속처럼 지키려고 한다.<br>\t\t\t<br><br>\t\t\t<br>3. 주중동안 자신이 주말에 하고 싶은 일을 적어둔다<br>\t\t\t<br><br>\t\t\t<br>주말에 갑자기 무언가를 하려고 하면 생각이 나지 않을 때가 많다. 주중에 하고 싶은 일을 적어둔다면 주말을 최대한 활용할 수도 있고 주말이 올 때까지 고통이 덜 할지도 모른다.<br>\t\t\t<br><br>\t\t\t<br>4. 매시간을 계획하지 않는다<br>\t\t\t<br><br>\t\t\t<br>성공한 사람들은 주중에도 주말에도 계획을 시간단위로 짜는 것이 아니라 3-5개의 지표를 정하고 유동적으로 행동한다. 시간단위로 지키려고 애쓰다 보면 주말에도 스트레스 받는 본인을 발견할 수도 있다.<br>\t\t\t<br><br>\t\t\t<br>5. 하고 싶은 일을 나열한 ‘버킷리스트’를 만든다<br>\t\t\t<br><br>\t\t\t<br>자신이 항상 꿈꿔왔던 일을 적어보고 매일매일 할 수 있는 일을 찾아서 실행해 보고 주말에만 할 수 있는 일을 구분 지어 되도록이면 경험해보는 것이 성공한 사람들의 특징이다.<br>\t\t\t<br><br>\t\t\t<br>6. 조건에 얽매이지 않는다<br>\t\t\t<br><br>\t\t\t<br>주말에 하고 싶던 일중에 ‘이건 너무 오래된 계획이니까’라며 자신이 해보고 싶던 일을 배제하는 일은 성공한 사람에겐 없는 일이다. 한번 ‘버킷리스트’에 들어간 항목은 이루기 전까진 나오지 않는다.<br>\t\t\t<br><br>\t\t\t<br>7. 주말의 아침을 소중히 여긴다<br>\t\t\t<br><br>\t\t\t<br>황금주말의 아침은 자신을 위해 쓰는 것이 가장 좋다고 성공한 사람들은 입을 모아 말한다. 주말아침이 얼마나 중요한지 아는 이들은 운동이나 독서 등 자신을 위해 주말아침을 투자한다.<br>\t\t\t<br><br>\t\t\t<br>8. 주말의 작은 전통을 만든다<br>\t\t\t<br><br>\t\t\t<br>성공한 사람들은 ‘주말’하면 떠오르는 각자만의 의식이나 전통이 있다고 한다. 토요일 아침은 꼭 팬케이크를 먹는다던가 일요일 점심은 꼭 공원에서 먹는 등 가족간의 전통을 지키는 것을 다수 성공한 사람들의 주말 의식으로 꼽을 수 있다.<br>\t\t\t<br><br>\t\t\t<br>9. 주말을 누릴 줄 안다<br>\t\t\t<br><br>\t\t\t<br>주말에는 단 몇 시간 만이라도 핸드폰을 끄고 세상과의 연결을 끊는 것이 주말을 누리며 일이나 세상으로부터 간섭 받지 않고 푹 쉴 줄 아는 성공한 사람들의 특징이다.<br>\t\t\t<br><br>\t\t\t<br>10. 주말을 ‘한도초과’하지 않는다<br>\t\t\t<br><br>\t\t\t<br>주말은 휴식을 취하며 다음 한 주를 준비하는 날이라고 성공한 사람들은 말한다. 쉬는 날이라고 해서 과도하게 놀거나 시간을 계획하지 않고 쓴다면 그 다음주가 힘들 수 밖에 없다.<br>\t\t\t<br><br>\t\t\t<br>11. 집안일, 바쁜 일을 최소화 한다<br>\t\t\t<br><br>\t\t\t<br>짧은 주말을 이용해 최대한 휴식을 취하려면 가사노동이나 주중을 넘어서 주말을 침범해오는 일과를 최소화 해야 한다고 한다.<br>\t\t\t<br><br>\t\t\t<br>12. 플러그를 뽑는다<br>\t\t\t<br><br>\t\t\t<br>핸드폰, 컴퓨터, 태플릿PC, 텔레비전 등 전자기기의 플러그를 뽑고 온전히 가족과의 시간이나 나와의 시간을 갖는 것이 중요하다고 한다. 주말 내내 이행하기 어렵다면 단 몇 시간만이라도 시도해 보는 것을 추천했다.<br>\t\t\t<br><br>\t\t\t<br>비즈니스인사이더는 한 사람이 80살 까지 산다고 했을 때 4,160번의 주말을 맞게 된다고 전하며 모든 주말은 자신이 어떤 사람이 될 것인지 좌우 할 만큼 중요하며 성공한 사람들은 그 사실을 이미 알고 있다고 덧붙였다. 주말을 소중히 여기며 휴식을 누릴 줄 안다면 당신도 성공한 사람이 아닐까?<br>\t\t\t<br><br>\t\t\t<br>(코리아헤럴드 하지원 인턴기자 jiwonha@heraldcorp.com)<br>\t\t\t<br><br>\t\t\t<br><관련 영문 기사><br>\t\t\t<br><br>\t\t\t<br>How successful people spend their weekends<br>\t\t\t<br><br>\t\t\t<br>In her book, “What the Most Successful People do on the Weekend,” Laura Vanderkam lays out how successful people make the most of their weekends. From this, Business Insider selected a number of traits that successful people have in common and reported a list.<br>\t\t\t<br><br>\t\t\t<br>Here are 12 ways that successful people spend their weekends.<br>\t\t\t<br><br>\t\t\t<br>1. They make conscious choices on what to do, rather than squandering precious time on TV or doing something by default.<br>\t\t\t<br><br>\t\t\t<br>2. They make appointments for themselves and they are disciplined about committing to the decisions that they make.<br>\t\t\t<br><br>\t\t\t<br>3. They plan what they want to do during their weekends, taking the maximum advantage of their time and giving themselves something to look forward to.<br>\t\t\t<br><br>\t\t\t<br>4. They do not plan for every hour but map out 3-5 anchor events to keep weekends on track.<br>\t\t\t<br><br>\t\t\t<br>5. They write down what they dream of doing and identify the ones that can be done on a daily basis.<br>\t\t\t<br><br>\t\t\t<br>6. They do not neglect things that they have not done in a long time when making to-do lists.<br>\t\t\t<br><br>\t\t\t<br>7. They cherish weekend mornings by doing things for themselves such as exercise and reading.<br>\t\t\t<br><br>\t\t\t<br>8. They establish small habits to create new traditions in the family so that weekends can be even more special.<br>\t\t\t<br><br>\t\t\t<br>9. They know when it is time to disconnect, so they set a specific time in the weekends to turn off their phones.<br>\t\t\t<br><br>\t\t\t<br>10. They budget their weekends so that they can start a week with fresh mind and body. Sitting around stressing about the job can be the worst thing to do on a Sunday night.<br>\t\t\t<br><br>\t\t\t<br>11. They keep chores, errands and busy work to a minimum on weekends so that they can rest as much as possible.<br>\t\t\t<br><br>\t\t\t<br>12. They make sure that they are completely unplugged for at least a few hours, as playing with gadgets and checking up on streams of information can be stressful.<br>\t\t\t<br><br>\t\t\t<br>Business Insider added that by the age of 80, a person will have had 4,160 weekends in total. Those weekends could make life incredible or feel like a waste, so make the best out of life by cherishing your weekends.<br>\t\t\t<br><br>\t\t\t<br>By Ha Ji-won, Intern reporter (jiwonha@heraldcorp.com)<br>\t\t\t<br><br>\t\t\t출처: <<a href=\"http://khnews.kheraldm.com/view.php?ud=20140411001042&md=20140414003629_BL&kr=1\" target=\"_blank\">http://khnews.kheraldm.com/view.php?ud=20140411001042&md=20140414003629_BL&kr=1</a>> <br>\t\t<br>\t\t<br>\t\t\t<br>성공한 사람들은 스케줄 관리도 남다르다. 평범한 사람들에게 스케줄이란 그저 약속과 미팅시간을 적어두는 것이지만 성공한 사람들에게 스케줄이란 원대한 꿈을 이루기 위한 설계도이다. 성공한 사람들에게 공통적으로 발견되는 스케줄 관리의 공통점, 성공과 인간관계 등에 대한 칼럼을 모아 소개하는 라이프핵에서 찾아 정리했다.<br>\t\t\t<br><br>\t\t\t[",

    "content": "](javascript:image_open('<a href=\"http://image.mt.co.kr/image_realdisp.php?ImageID=2015050300230435766_1.jpg',%20'IMAGE_VIEW',300,300,'yes'))\" target=\"_blank\">http://image.mt.co.kr/image_realdisp.php?ImageID=2015050300230435766_1.jpg',%20'IMAGE_VIEW',300,300,'yes'))</a>\t\t\t<br><a href=\"http://javascript:image_open('<a href=\"http://image.mt.co.kr/image_realdisp.php?ImageID=2015050300230435766_1.jpg',%20'IMAGE_VIEW',300,300,'yes'\" target=\"_blank\">http://image.mt.co.kr/image_realdisp.php?ImageID=2015050300230435766_1.jpg',%20'IMAGE_VIEW',300,300,'yes'</a>\" target=\"_blank\">이미지 크게보기</a>)<br>\t\t\t<br>1. 여유롭게 아침을 시작해 의식을 치른다=작가 로라 밴더캠은 성과가 뛰어난 사람들의 스케줄을 광범위하게 조사한 결과 한 가지 공통점을 발견했다. 대부분이 일찍 일어나고 아침마다 반복적으로 하는 일이 있다는 점이다.<br>\t\t\t<br><br>\t\t\t<br>일찍 일어나면 장점이 많다. 무엇보다 상황에 이끌려 어쩔 수 없이 무엇인가를 하게 되기 전에 자기 자신을 어떤 상황이나 일에 활용될 수 있도록 준비시킬 수 있다. 미리 대비할 시간이 있으면 자신의 삶을 주도하고 있다는 느낌이 들어 기분이 좋아진다. 아침에 일찍 일어나 일을 시작하기 전에 무엇인가 매일 반복적으로 하는 의식을 치러두면 자신감이 생겨 그날 맞부딪히는 도전들에 더 잘 대처할 수 있다. 아침 의식이란 운동, 청소, 스케줄 정리 등 다양하다.<br>\t\t\t<br><br>\t\t\t<br>스케줄 세우는 법: 아침에 일찍 일어나 반복적으로 하는 습관을 만들라. 예를 들어 일하기 전에 아침 운동을 하면 활력이 생겨 생산성이 높아진다. 아침에 명상을 한다든가 15분간 책을 읽는 것도 좋다.<br>\t\t\t<br><br>\t\t\t<br>2. 일이 계획대로 되지 않았을 때 당황하지 않도록 여유시간을 둔다=계획이 어긋나는 상황은 자주 일어난다. 그런데도 사람들은 일이 계획대로 정확히 진행되지 않으면 스트레스를 받는다. 성공한 사람들은 모든 것을 다 조절할 수는 없다는 사실을 안다. 돌발상황에 대처하는 능력이야말로 성공을 이루는데 큰 비중을 차지한다. 실수나 차질이 발생할 수 있다는 점을 감안해 계획을 세우면 문제가 생겼을 때 차분하고 효과적으로 대응할 수 있다.<br>\t\t\t<br><br>\t\t\t<br>스케줄 세우는 법: 문제가 생겼을 때 대처할 수 있는 시간을 반영해 스케줄을 짠다. 매일 일을 끝내고 나서 30분간 여유시간을 두고 그날 마무리하지 못했던 일을 정리하는 것도 좋다.<br>\t\t\t<br><br>\t\t\t<br>3. 일할 필요가 없을 때도 일한다=대부분의 사람들은 출근해서 퇴근할 때까지 일한다. 저녁 때와 주말, 공휴일에는 일하지 않는다. 가능한 일을 적게 하는 것이 이익이라고 생각하지만 이것이 오히려 생산성을 낭비하는 길일 수도 있다. 성공한 사람들은 아이디어가 떠오르면 시간을 가리지 않고 일한다. 철은 뜨거울 때 두드려야 한다. 열정이 생겼을 때, 좋은 생각이 떠올랐을 때 뒤로 미루지 말고 일해라.<br>\t\t\t<br><br>\t\t\t<br>스케줄 세우는 법: 자유시간에도 2시간 정도는 일할 시간을 마련해둔다. 이것만으로도 당신은 앞서나갈 수 있다.<br>\t\t\t<br><br>\t\t\t<br>4. 중요한 일을 먼저 한다=많은 사람들이 사무실에 출근하면 이메일을 확인한다든지, 커피를 마시며 인터넷을 훑어본다든지 하는 가벼운 일을 한다. 하지만 우리의 두뇌는 아침에 가장 활발하게 움직인다. 가장 중요하고 도전적인 일은 아침 일찍 하는 것이 좋다. 일의 우선순위를 마음대로 정할 수 없는 위치라면 지시 받은 일을 집에서 해오거나 아침에 조금 더 일찍 출근해 처리해두는 방법이 있다.<br>\t\t\t<br><br>\t\t\t<br>스케줄 세우는 법: 일을 하면서 다음날 계획을 세운다. 아침에 가장 중요한 일을 하는 것으로 스케줄을 짜고 이메일 확인과 답장 같은 것은 점심식사 직전으로 미뤄둔다.<br>\t\t\t<br><br>\t\t\t<br>5. 한 곳에 모든 스케줄을 정리해 놓는다=미국 CA 크리에이티브의 파트너인 알렉산드라 위스는 “모든 미팅과 약속을 서로 다른 캘린더와 노트북, 스마트폰 앱 등에 분리해 정리하지 말고 한 장소에 기록해두는 것이 매우 중요하다”고 말한다. 모든 스케줄은 한 곳으로 모으는 것이 관리하기가 쉽다.<br>\t\t\t<br><br>\t\t\t<br>스케줄 세우는 법: 가장 편리한 스케줄 도구를 골라 그것만 활용하되 백업을 잘해둔다.<br>\t\t\t<br><br>\t\t\t<br>6. 일을 진지하게 받아들인다=성공한 사람들은 자신이 하는 일에 진정으로 믿음을 갖고 높은 가치를 둔다. 당신이 지금 하고 있는 일에 믿음이 없다면 생산적일 수도 없고 성공할 수도 없다. 당신을 믿지 않는 누군가에 의해 밀려나지 않으려면 스스로 계속 동기를 부여하는 것이 중요하다. 당신이 하는 일에 믿음이 있다면 다른 사람들에게 확인받을 필요가 없다.<br>\t\t\t<br><br>\t\t\t<br>스케줄 세우는 법: 한 주의 일이 끝나는 날 30분 정도 시간을 갖고 당신의 꿈과 목표가 무엇인지 돌아보고 거기에 어느 정도 가까이 갔는지 점검해보라. 이렇게 하면 목표를 달성하는데 도움이 된다. 더 중요한 것은 당신이 목표에 진정으로 믿음을 가질 수 있도록 격려가 된다는 점이다.<br>\t\t\t<br><br>\t\t\t<br>7. 할 일을 끝내면 쉰다=집중해 일하고 쉴 땐 쉬어야 한다. 일할 때 다른 일 걱정을 하고 쉴 때 다음 일 걱정을 하는 것은 생산성만 떨어뜨린다. 매일 해야할 일을 적어두고 그 일을 다하면 스위치를 끄듯이 일을 싹 잊는 것이 좋다.<br>\t\t\t<br><br>\t\t\t<br>스케줄 세우는 법: 다음날 해야할 가장 중요한 일 3가지를 적어두라. 그 일을 어떻게 마무리할 것인지도 함께 기록해두면 집중하는데 도움이 된다. 다음날 그 일을 모두 완수하면 편안한 마음으로 휴식을 취한다. <br>\t\t\t<br><br>\t\t\t출처: <<a href=\"http://news.mt.co.kr/mtview.php?no=2015050300230435766&type=1\" target=\"_blank\">http://news.mt.co.kr/mtview.php?no=2015050300230435766&type=1</a>>",
    "w": 400
  }
];

let cards = [];
let moving = null, resizing = null;

function loadBoard() {
  const saved = localStorage.getItem(SAVE_KEY);
  cards = saved ? JSON.parse(saved) : DEFAULT_CARDS.map(c => ({...c}));
  renderCards();
  if (!saved) autoLayout();
}

function autoLayout() {
  const GAP = 14;
  const boardW = document.getElementById('board').offsetWidth;
  const cols = Math.max(1, Math.floor(boardW / 280));
  const colW = (boardW - GAP * (cols - 1)) / cols;
  const colHeights = new Array(cols).fill(0);
  const allCards = document.querySelectorAll('.card');
  const images = document.querySelectorAll('.card img');
  let loaded = 0;
  const total = images.length;

  function place() {
    allCards.forEach((el, i) => {
      const card = cards[i];
      const w = Math.min(card.w || colW, colW);
      let minCol = 0;
      for (let c = 1; c < cols; c++) if (colHeights[c] < colHeights[minCol]) minCol = c;
      card.x = minCol * (colW + GAP);
      card.y = colHeights[minCol];
      card.w = w;
      el.style.left = card.x + 'px';
      el.style.top = card.y + 'px';
      el.style.width = w + 'px';
      colHeights[minCol] = card.y + el.offsetHeight + GAP;
    });
    document.getElementById('board').style.minHeight = Math.max(...colHeights) + 100 + 'px';
    saveBoard();
  }

  if (total === 0) requestAnimationFrame(place);
  else images.forEach(img => {
    if (img.complete) { loaded++; if (loaded >= total) requestAnimationFrame(place); }
    else img.onload = img.onerror = () => { loaded++; if (loaded >= total) requestAnimationFrame(place); };
  });
}

function syncText() {
  document.querySelectorAll('.card').forEach(el => {
    const idx = +el.dataset.idx;
    if (cards[idx]?.type === 'text') {
      const t = el.querySelector('.text');
      if (t) cards[idx].content = t.innerHTML;
    }
  });
}

function saveBoard() {
  syncText();
  localStorage.setItem(SAVE_KEY, JSON.stringify(cards));
  document.getElementById('status').textContent = '저장됨 ' + new Date().toLocaleTimeString();
}

function renderCards() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  cards.forEach((card, i) => {
    const el = document.createElement('div');
    el.className = 'card';
    el.dataset.idx = i;
    if (card.x !== undefined) el.style.left = card.x + 'px';
    if (card.y !== undefined) el.style.top = card.y + 'px';
    if (card.w) el.style.width = card.w + 'px';

    el.addEventListener('mousedown', e => {
      if (e.target.closest('.text, a, .card-btn, .resize-handle, table')) return;
      e.preventDefault();
      moving = { idx: i, startX: e.clientX, startY: e.clientY, origX: card.x || 0, origY: card.y || 0 };
      el.classList.add('moving');
    });

    const actions = document.createElement('div');
    actions.className = 'card-actions';
    const delBtn = document.createElement('button');
    delBtn.className = 'card-btn'; delBtn.textContent = '×';
    delBtn.onclick = e => { e.stopPropagation(); if (confirm('삭제?')) { cards.splice(i, 1); renderCards(); saveBoard(); } };
    actions.appendChild(delBtn);
    el.appendChild(actions);

    if (card.type === 'text') {
      const text = document.createElement('div');
      text.className = 'text';
      text.contentEditable = true;
      text.innerHTML = card.content || '';
      text.addEventListener('blur', () => { card.content = text.innerHTML; saveBoard(); });
      el.appendChild(text);
    } else if (card.type === 'image') {
      const src = card.src.startsWith('http') || card.src.startsWith('data:') ? card.src : IMG_BASE + card.src;
      const img = document.createElement('img');
      img.src = src;
      img.alt = card.alt || '';
      img.loading = 'lazy';
      img.onerror = () => img.style.display = 'none';
      if (card.link) {
        const a = document.createElement('a'); a.href = card.link; a.target = '_blank';
        a.appendChild(img); el.appendChild(a);
      } else { el.appendChild(img); }
      if (card.caption) {
        const cap = document.createElement('div');
        cap.className = 'caption';
        cap.textContent = card.caption;
        el.appendChild(cap);
      }
    } else if (card.type === 'table') {
      const wrapper = document.createElement('div');
      wrapper.style.overflowX = 'auto';
      wrapper.innerHTML = card.html || '';
      el.appendChild(wrapper);
    }

    const rh = document.createElement('div');
    rh.className = 'resize-handle';
    rh.addEventListener('mousedown', e => {
      e.preventDefault(); e.stopPropagation();
      resizing = { idx: i, startX: e.clientX, startW: card.w || el.offsetWidth };
    });
    el.appendChild(rh);
    board.appendChild(el);
  });

  requestAnimationFrame(() => {
    let maxBottom = 0;
    document.querySelectorAll('.card').forEach(el => {
      const b = (parseFloat(el.style.top) || 0) + el.offsetHeight;
      if (b > maxBottom) maxBottom = b;
    });
    board.style.minHeight = (maxBottom + 100) + 'px';
  });
}

document.addEventListener('mousemove', e => {
  if (moving) {
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`);
    if (!el) return;
    const nx = moving.origX + e.clientX - moving.startX;
    const ny = moving.origY + e.clientY - moving.startY;
    el.style.left = nx + 'px';
    el.style.top = ny + 'px';
  }
  if (resizing) {
    const card = cards[resizing.idx];
    card.w = Math.max(100, resizing.startW + e.clientX - resizing.startX);
    const el = document.querySelector(`.card[data-idx="${resizing.idx}"]`);
    if (el) el.style.width = card.w + 'px';
  }
});

document.addEventListener('mouseup', e => {
  if (moving) {
    const card = cards[moving.idx];
    card.x = Math.max(0, moving.origX + e.clientX - moving.startX);
    card.y = Math.max(0, moving.origY + e.clientY - moving.startY);
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`);
    if (el) { el.classList.remove('moving'); }
    moving = null; saveBoard();
  }
  if (resizing) { resizing = null; saveBoard(); }
});

function addTextCard() {
  cards.push({ type: 'text', content: '', x: 50, y: window.scrollY + 100, w: 300 });
  renderCards();
  setTimeout(() => { const els = document.querySelectorAll('.card .text'); els[els.length - 1]?.focus(); }, 100);
}

function addImageCard() {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = 'image/*';
  input.onchange = e => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = () => { cards.push({ type: 'image', src: reader.result, x: 50, y: window.scrollY + 100, w: 240 }); renderCards(); saveBoard(); };
    reader.readAsDataURL(file);
  };
  input.click();
}

function resetLayout() {
  if (!confirm('자동 재배치합니다. 현재 위치가 변경됩니다.')) return;
  cards.forEach(c => { delete c.x; delete c.y; });
  renderCards(); autoLayout();
}

setInterval(saveBoard, 30000);
loadBoard();
</script>
