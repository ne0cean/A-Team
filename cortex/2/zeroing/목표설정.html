<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>목표설정</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #1e1e1e;
  color: #e0e0e0;
  font-family: 'Segoe UI', -apple-system, sans-serif;
  font-size: 15px;
  line-height: 1.6;
  padding: 20px 30px 60px;
  overflow-x: hidden;
}
a { color: #6cb0f6; text-decoration: none; }
a:hover { text-decoration: underline; }
.title-bar {
  background: #3a3a5c;
  display: inline-block;
  padding: 6px 16px;
  font-size: 22px;
  font-weight: bold;
  color: #fff;
  margin-bottom: 4px;
}
.date { color: #999; font-size: 13px; margin-bottom: 20px; }
.board { position: relative; }
.card {
  background: #2a2a2a;
  border: 1px solid #3a3a3a;
  border-radius: 8px;
  padding: 12px;
  position: absolute;
  cursor: grab;
  transition: box-shadow 0.15s;
  overflow: hidden;
}
.card:hover { box-shadow: 0 0 0 1px #58a6ff; z-index: 10; }
.card.moving { opacity: 0.8; box-shadow: 0 4px 24px rgba(0,0,0,0.6); z-index: 100; cursor: grabbing; }
.card img { width: 100%; border-radius: 4px; display: block; }
.card .caption { font-size: 12px; color: #888; margin-top: 6px; }
.card .text { outline: none; min-height: 20px; white-space: pre-wrap; word-break: break-word; }
.card .text:focus { background: rgba(255,255,255,0.05); border-radius: 4px; padding: 4px; }
.card .text:empty::before { content: '텍스트 입력...'; color: #555; }
.card table { border-collapse: collapse; width: 100%; font-size: 13px; }
.card table td, .card table th { border: 1px solid #444; padding: 4px 8px; vertical-align: top; }
.card table th { background: #333; color: #ccc; }
.card-actions { position: absolute; top: 4px; right: 4px; display: none; gap: 4px; }
.card:hover .card-actions { display: flex; }
.card-btn { background: #333; border: 1px solid #555; color: #ccc; border-radius: 4px; padding: 2px 6px; font-size: 11px; cursor: pointer; }
.card-btn:hover { background: #444; color: #fff; }
.resize-handle { position: absolute; bottom: 0; right: 0; width: 16px; height: 16px; cursor: se-resize; opacity: 0; }
.card:hover .resize-handle { opacity: 0.6; }
.resize-handle::after { content: ''; position: absolute; bottom: 3px; right: 3px; width: 8px; height: 8px; border-right: 2px solid #666; border-bottom: 2px solid #666; }
.toolbar { position: fixed; bottom: 0; left: 0; right: 0; background: #161b22; border-top: 1px solid #30363d; padding: 8px 20px; display: flex; gap: 12px; align-items: center; z-index: 200; }
.toolbar button { background: #21262d; border: 1px solid #30363d; color: #e0e0e0; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; }
.toolbar button:hover { background: #30363d; }
.toolbar .status { color: #8b949e; font-size: 12px; margin-left: auto; }
.highlight-red { color: #ff6b6b; }
.highlight-blue { color: #6cb0f6; }
</style>
</head>
<body>
<div class="title-bar">목표설정</div>
<div class="date">2018년 1월 11일 목요일</div>
<div class="board" id="board"></div>
<div class="toolbar">
  <button onclick="addTextCard()">+ 텍스트</button>
  <button onclick="addImageCard()">+ 이미지</button>
  <button onclick="saveBoard()">💾 저장</button>
  <button onclick="resetLayout()">↺ 재배치</button>
  <span class="status" id="status">Ready</span>
</div>
<script>
const SAVE_KEY = 'board-목표설정';
const IMG_BASE = '../../attachments/';
const DEFAULT_CARDS = [
  {
    "type": "text",
    "content": "목표설정<br>\t\t<br>\t\t<br>\t<br>\t<br>\t\t<br>\t\t\t<br>\t\t\t\t<br>- 왜 태어났고, 존재하는가? 즉, 왜 사는가?<br>\t\t\t<br>\t\t\t<br>\t\t\t\t<br>우리의 인생 자체는 그 어떤 목적이나 의미가 없다.<br>\t\t\t\t<br>(내 자아가 어떤 소명이나 이유가 있어서 존재하길 바라는 것은 그저 자기애의 발현이자 바람이다.)<br>\t\t\t\t<br>다만, 인생에서의 목표나 의미를 스스로 부여할 수는 있다.<br>\t\t\t\t<br>그것이 어떻게 살 것인가를 결정한다.<br>\t\t\t\t<br>\t\t\t\t\t<br>- 그렇다면, 인생에서의 의미, 목표는 무엇인가?<br>\t\t\t\t\t<br>너를 살아가게 하는 동력은 무엇인가?<br>\t\t\t\t<br>\t\t\t\t<br>호기심.<br>\t\t\t\t<br>인생은 어짜피, 하나의 이야기다.<br>\t\t\t\t<br>내게 주어진 이 책을 읽어나가는 동시에 써 나가기 위해 살아간다.<br>\t\t\t\t<br>내가 가진, 그려나갈 서사에 대한 호기심. 그 것이 내 삶의 이유이자 동력이다.<br>\t\t\t\t<br>그러니까 내 인생은, 내가 가장 읽고 싶은 책이고, 그래야만 한다.<br>\t\t\t\t<br>전지적 작가시점<br>\t\t\t\t<br><br>\t\t\t\t<br>그러니까 내게 있어서 산다는 건, 물 수제비를 뜨는 거랑 비슷한거야.<br>\t\t\t\t<br>한번 해보는 거야. 궁금하니까.<br>\t\t\t\t<br><br>\t\t\t\t<br>\"인생은 누가 더 대단한 이야기를 가지고 있는가의 싸움이다.\" Tom peters<br>\t\t\t\t<br>내가 무엇이며, 어떤 것들을 믿고, 이 세계에서 무엇을 하는지를 전달하는 것 = 콘텐츠, 스토리<br>\t\t\t\t<br><br>\t\t\t\t<br>우리를 살게하는 것은 우리야.<br>\t\t\t\t<br>이 우주의 행성들을 서로 끌어당기고, 공전하게 유지시켜주는 것은 행성 서로의 존재이듯<br>\t\t\t\t<br>우리에겐 우리 밖에 없어, 결국 나와 내 가족, 친구, 사회, 이 세계에 대한 이야기다.<br>\t\t\t\t<br>이 우주에서 서로의 존재, 우리의 연대만이 유일한 의미이다.<br>\t\t\t\t<br>\t\t\t\t\t<br>- 그렇다면 너는 어떤 이야기를 쓰고 싶은가?<br>\t\t\t\t<br>\t\t\t\t<br>    -  어떤 가정과 질문을 하고, 그에 답할 것인가?<br>\t\t\t\t<br><br>\t\t\t\t<br><br>\t\t\t\t<br>나라는 책의 표지<br>\t\t\t\t<br><br>\t\t\t\t<br>어떻게 살고 어떤 어른이 되고싶어?<br>\t\t\t\t<br><br>\t\t\t\t<br>타인과 이 세계에 대한 호기심.<br>\t\t\t\t<br>내가 쏟는 열정, 하는 일, 숭고할 정도의 노력. 그런 스토리가 궁금해 나는.<br>\t\t\t\t<br>내 레벨에 맞는 게임과 스토리.<br>\t\t\t\t<br><br>\t\t\t\t<br>사심 없이, 궁극을 추구한다.<br>\t\t\t\t<br>사심이 없으니 아쉬울 것도 없어야 한다.<br>\t\t\t\t<br>끊임 없이 자신을 초월하는 것.<br>\t\t\t\t<br>내가 감동하는 나의 노력과 이야기<br>\t\t\t\t<br>중요한건 성공 혹은 실패가 아니다.<br>\t\t\t\t<br>얼마나 대단한 이야기를 만들었느냐, 나를 투입했는가.<br>\t\t\t\t<br><br>\t\t\t\t<br>보편 타당한 불편.<br>\t\t\t\t<br>세상을 바꾸는게 아니라, 사람들이 세상을 인식하는 방식을 바꾸고 싶어.<br>\t\t\t\t<br>그게 시공간과 관계(서로의 마음/인식). 인간이 머무를 수 있는 곳은 이 두 곳 밖에 없거든.<br>\t\t\t\t<br><br>\t\t\t\t<br>에서부터 변화를 만들어내고 싶어.<br>\t\t\t\t<br>세상을 바꾸는 것이 아닌, 세상을 바라보는 방식을 바꾸는 거야.<br>\t\t\t\t<br>그것도 아주 약간만 비틀어서.<br>\t\t\t\t<br><br>\t\t\t\t<br>내가 세계에 건네는 메시지는 이 것이다.<br>\t\t\t\t<br><br>\t\t\t\t<br>관계와 연대,<br>\t\t\t\t<br>우리의 이야기는 들려줄 이가 없다면 의미를 잃는 까닭이다.<br>\t\t\t\t<br>나는 나에게 어떤 이야기를 들려주고 싶은가?<br>\t\t\t\t<br>\t\t\t\t\t<br>- 그 이야기의 서사의 구조와 플롯, 내러티브, 요건은 무엇인가?<br>\t\t\t\t<br>\t\t\t\t<br>ㅇ 대다수의 이들이 만성적으로 겪지만, 의식하지 못하는 불편. 보편타당한 불편을 해결한다.<br>\t\t\t\t<br>ㅇ 완전한 몰입과 초월<br>\t\t\t\t<br>ㅇ 시공간과 관계<br>\t\t\t\t<br>ㅇ 일, 사랑, 연대, 놀이<br>\t\t\t\t<br><br>\t\t\t\t<br>- 유대감 Belonging: 지금 당신 곁에 있는 사람에게 집중하고 있습니까?<br>\t\t\t\t<br>- 목적 Purpose: 누구도 아닌, 당신이 해야만 하는 일을 찾았는가?<br>\t\t\t\t<br>- 초월성 Transcendence: 스스로를 뛰어넘는 기쁨을 느껴본 적이 언제인가? (완전한 몰입)<br>\t\t\t\t<br>더 큰 세상의 일부임을 깨닫는 것<br>\t\t\t\t<br>- Storytelling<br>\t\t\t\t<br><br>\t\t\t\t<br>이 4가지 요소를 스토리에 통합한다.<br>\t\t\t\t<br>유대와 스토리텔링을<br>\t\t\t\t<br>목적과 초월성을 통합한다.<br>\t\t\t\t<br><br>\t\t\t\t<br>어짜피 인생은, 하나의 이야기다.<br>\t\t\t\t<br>세상에 새로운 이야기는 없다.<br>\t\t\t\t<br>서사를 이끌어 나가는 것은 결국,<br>\t\t\t\t<br>캐릭터다.<br>\t\t\t\t<br>이야기는, 캐릭터가 특정한 상황.사건.이벤트를 마주쳤을 때<br>\t\t\t\t<br>어떤 선택.대응을 하는지에 따라 완성된다.<br>\t\t\t\t<br>누구도 위대한 캐릭터로 태어나지 않는다.<br>\t\t\t\t<br>위대하게 성장 할 뿐<br>\t\t\t\t<br><br>\t\t\t\t<br>이야기는내가 정할 수 있는 것이 아니다.<br>\t\t\t\t<br>내가 정 할 수 있는 것은 나라는 캐릭터와 어떤 사람들을 삶속에 들이고 또 내보낼 것인지.<br>\t\t\t\t<br>이야기는 순리에 맡겨야 한다.<br>\t\t\t\t<br><br>\t\t\t\t<br>\t\t\t\t\t<br>- 시간과 돈, 모든 자원과 능력이 무한대로 허락된다면 무엇을 하고 싶은가?<br>\t\t\t\t\t<br>- 5년 후에 죽게 된다면 무얼 하고 싶은가?<br>\t\t\t\t\t<br>- 무엇을 이룬다면 생을 마감해도 좋은가?<br>\t\t\t\t\t<br>- 죽어야 할 이유가 무엇인가?<br>\t\t\t\t<br>\t\t\t\t<br><br>\t\t\t\t<br>우리의 삶에, 이유가 없다는 것.<br>\t\t\t\t<br>인생에 그 어떠한 소명이나 의미가 없다는 사실.<br>\t\t\t\t<br>삶이란 것이 주어진 숙제가 아니란 것이,<br>\t\t\t\t<br>마땅한 이유 없이 살아도, 행복해도 된다는 것이. 얼마나 다행한 일인가 말이다.<br>\t\t\t\t<br>막 살아도, 어떻게든 되어버려도 상관 없다는 것이 자유를 환기시켜 주었다.<br>\t\t\t\t<br>뭘 하든 상관없다니, 인생이 어떻게 되어버리든 상관 없다니. 얼마나 다행인가.<br>\t\t\t\t<br><br>\t\t\t\t<br><br>\t\t\t\t<br>내 인생의 okr. one한글로 써클. 무엇을 바라거나 하고자함.은 뭐야?<br>\t\t\t\t<br><br>\t\t\t\t<br><a href=\"https://m.blog.naver.com/PostView.nhn?blogId=langrissers&logNo=221618856299&proxyReferer=http%3A%2F%2Fm.facebook.com%2F\" target=\"_blank\">https://m.blog.naver.com/PostView.nhn?blogId=langrissers&logNo=221618856299&proxyReferer=http%3A%2F%2Fm.facebook.com%2F</a><br>\t\t\t\t<br><br>\t\t\t\t<br>내러티브는 앎, 지식을 뜻하는 형용사&#160;gnarus에서 파생된 단어인 “말하다”를 뜻하는 라틴어&#160;narrare를 어원으로 한다.<br>\t\t\t\t<br><br>\t\t\t\t<br>일련의 사건이 가지는 서사성을 말한다. 스토리(story)와는 조금 다른 의미로 쓰이는 내러티브는 언어로 기술이 불가능한 '모든 종류의 서사성 전부를 포함하는 이야기'의 개념으로 이해된다.<br>\t\t\t\t<br><br>\t\t\t\t<br>이야기를 전달하는 방식 또는 행위를 뜻하는 단어. 작가나 감독이 A라는 주제를 독자나 관객들에게 전달하기 위해 사용되는 소품, 음악, 대사등의 총집합체를 내러티브라고 지칭한다.&#160;<br>\t\t\t\t<br><br>\t\t\t\t<br>인생의 스토리를 내가 결정 할 수 있는게 아니다. 내가 할 수 있고 해야하는 일은, 내 삶에 좋은 캐릭터들을 배치하고, 갖가지 내러티브를 구성하는 일이다. 그리고 그 캐릭터들과 내러티브가 우연과 어우러져 내 스토리가 된다. 물론 가장 중요한 캐릭터는 나 자신을 육성하는것이 가장 중요하다. 매력적인 스토리는 서사가 아니라 캐릭터에서 나온다.<br>\t\t\t\t<br><br>\t\t\t\t<br>스스로의 궁극을 추구한다. 페이커, 손흥민, 이치로….<br>\t\t\t\t<br>제프베조스<br>\t\t\t\t<br>일론머스크<br>\t\t\t\t<br>스티브잡스<br>\t\t\t\t<br>빌게이츠<br>\t\t\t\t<br>워렌버핏<br>\t\t\t\t<br><br>\t\t\t\t<br>나만의 무늬, 색, 스토리<br>\t\t\t\t<br>게임, 이야기, 영화의 의미가 뭘까? 재미, 사유?<br>\t\t\t\t<br>그 내에서의 의미를 가질 순 있다.<br>\t\t\t\t<br>희생, 승리, <br>\t\t\t\t<br>\t\t\t\t\t<br>- 이 캐릭터를 구성하는 특질은 무엇인가?<br>\t\t\t\t<br>\t\t\t\t<br>호기심/ 유연성/ 천진함/ 유머감각/ 자신감<br>\t\t\t\t<br>연대, 기백, 용기, 인내, 대담함<br>\t\t\t\t<br>내실있고 단단한 사람<br>\t\t\t\t<br>요란하지 않지만 존재감이 묵직한 사람<br>\t\t\t\t<br><a href=\"https://m.blog.naver.com/PostView.nhn?blogId=sacsimon&logNo=220961959828&proxyReferer=https%3A%2F%2Fwww.google.com%2F\" target=\"_blank\">키플링</a> if<br>\t\t\t\t<br><a href=\"http://blog.daum.net/shwyang/18256269\" target=\"_blank\">잡보장경</a><br>\t\t\t\t<br><a href=\"https://story.kakao.com/ch/olstory/eHZ3S0arec0\" target=\"_blank\">https://story.kakao.com/ch/olstory/eHZ3S0arec0</a><br>\t\t\t\t<br><br>\t\t\t\t<br>세계관에 대해서 이야기 할 수 있는 어른이 되고싶어<br>\t\t\t\t<br>내가 소비하는 것이 아닌, 내가 만들어 내는 것으로 나를 정의할 수 있는 사람이고 싶어.<br>\t\t\t\t<br>내 취향은 중요하지 않아.<br>\t\t\t\t<br><br>\t\t\t\t<br><br>\t\t\t\t<br>그렇게, 모두가 뜨겁게 혼자다.<br>\t\t\t\t<br>결국, 이 창백한 푸른 점 위에서<br>\t\t\t\t<br>우리에게 의미를 주는 것은 우리 밖에는 없다.<br>\t\t\t\t<br><br>\t\t\t\t<br>라이벌<br>\t\t\t\t<br>멘토 <br>\t\t\t\t<br>롤모델<br>\t\t\t\t<br><br>\t\t\t\t<br>인생에 절대적인 의미는 없어.<br>\t\t\t\t<br>절대자를 상정한다면 그가 주긴 하겠지.<br>\t\t\t\t<br><br>\t\t\t\t<br>상대적인 의미를 설정하는 거지.<br>\t\t\t\t<br>그게 캐릭터와 내러티브를 만들고, 캐릭터와 내러티브의 유기적인 상호작용에서 스토리가 나오는거야.<br>\t\t\t\t<br>네가 없으면 의미도 없어.<br>\t\t\t\t<br><br>\t\t\t\t<br>인생은 의미가 아니라 욕망이야.<br>\t\t\t\t<br>의미 없이도 살아<br>\t\t\t\t<br>없이 없이도 살아<br>\t\t\t\t<br><br>\t\t\t\t<br><br>\t\t\t\t<br>삶에서 마주하는 모든 의미는 결국 네가 부여하거나 받아들인 것.<br>\t\t\t\t<br><br>\t\t\t\t<br>삶의 객체들의 가진 의미, 그것들이 네게 주는 의미는<br>\t\t\t\t<br><br>\t\t\t\t<br><br>\t\t\t\t<br>그 의미를 충족시키는 너의 충실함에 집중해.<br>\t\t\t\t<br>니가 만들어낼 가치에 <br>\t\t\t\t<br>네가 그것의 의미를 얼마나 크게 할 수 있을지를 생각해.<br>\t\t\t\t<br>그게 네 인생의 의미니까.<br>\t\t\t\t<br><br>\t\t\t\t<br>모든 선택의 결과가 나가 원하는 것일 순 없어.<br>\t\t\t\t<br>다만 네가 한 플레이, 노력은 남지.<br>\t\t\t\t<br>그러니 이유 없이도, 의미 없이도 살아.<br>\t\t\t\t<br><br>\t\t\t\t<br>1/ 모든 선택의 결과가 내가 원하는 것일 수는 없다. 다만 스스로를 믿어라.<br>\t\t\t\t<br>2/ 원하는 것은 언젠가 이뤄진다. 그러나 그것이 꼭 내가 원하는 시점일 수는 없다.<br>\t\t\t\t<br>3/ 그럴 수도 있지. 당연히.<br>\t\t\t\t<br><br>\t\t\t\t<br>한 가지에 의미에 목표를 두면 좁아져, 그리고 작아져. 그건 의미가 클 수록 그래. 그러니 제발 놓아둬. <br>\t\t\t\t<br><br>\t\t\t\t<br>한 곳에 초점을 오래 고정하고 있으면, 주변시가 어두워지는 것과 같지.<br>\t\t\t\t<br>무엇이 오고, 무엇이 떠나가는지, 무엇이 변해가는지 제대로 볼 수 없어.<br>\t\t\t\t<br><br>\t\t\t\t<br>나머지는 그냥 놓아둬.  의미, 목표, <br>\t\t\t\t<br>어떤 이유 때문에 살지마. 어짜피 우리는 특별한 이유나 사명 때문에 살진 않아. 왜 사는데? 답할 수 있어? <br>\t\t\t\t<br>아무 이유 없이 살아.<br>\t\t\t\t<br>아무 이유 없이도 살아.<br>\t\t\t\t<br><br>\t\t\t\t<br><br>\t\t\t\t<br>행복하려 하지 말고 행복이 중요하다고 생각 하지도 말아.<br>\t\t\t\t<br>행복은 소금, 물, 공기처럼 삶을 유지하게 하는 필수불가결한 게 맞아. 하지만 필요이상의 행복 때문에 다른 사람의 행복을 침해 하지마.<br>\t\t\t\t<br>가능한 불행하지 않으려고 노력해. 행복하려고 애쓰지 말고. 떼쓰지 말고. 내 행복때문에 다른 사람을 불행하지 않도록 하는게 어쩌면 우리의 최선이야.<br>\t\t\t\t<br><br>\t\t\t\t<br>우리는 이 이야기의 서사를 직접 정할 수 없어.<br>\t\t\t\t<br>우리가 할 수 있는 것은,<br>\t\t\t\t<br>삶을 구성하는 내러티브들을 배치하고, 조명 사운드 미장셴<br>\t\t\t\t<br>이 이야기에 등장할 캐릭터의 일부를 초대하거나 혹은 내보내는거야. 그리고 가장 열심해 해야하는 일은 내가 어떤 캐릭터가 될지를 정하는 거야. 매 순간.<br>\t\t\t\t<br>그리고 지켜보는거야, 읽어 나가는거야. 내 이야기를. 내 인생을.<br>\t\t\t\t<br>어떻게 흘러가는지. 놓아두는거야.<br>\t\t\t\t<br>어떤 사람을 사랑하게 될지<br>\t\t\t\t<br>어떤 기적을 만나게 될지<br>\t\t\t\t<br>이야기 자체를 우리 마음대로 할 수는 없어. 그러니 놓아둬.<br>\t\t\t\t<br>아무 이유없이 살아.<br>\t\t\t\t<br>되도록 발랄하게:<br>\t\t\t\t<br><br>\t\t\t\t<br><br>\t\t\t\t<br>인생에 어떤 목적이나 이유를 부여할 수 있지. 그게 건강해. 하지만 근데 이유가 꼭 의미가 있는 것은 아니어도 된단거야. 의미를 찾지마. 그냥 살아 사는 건 그 자체로 충분한 의미야. 하루를 살아낸다는건 그 자체로 큰 긍정이야<br>\t\t\t\t<br><br>\t\t\t\t<br>의미를 부여하지마. 의미를 가져.<br>\t\t\t\t<br>나라는 존재 말고 세상에 의미를 가진건 하나도 없어<br>\t\t\t\t<br>내가 없으면 나의 세상도 없으니까. 너라는 존재 자체의 의미를 느껴<br>\t\t\t\t<br>다른 객체들에서 의미를 찾지 말고, 의미가 주어지길 기다리지말고.<br>\t\t\t\t<br>그 상황속에서 내가 가지는 의미, 내가 만들 의미를 찾아. 그게 열정이야.<br>\t\t\t\t<br><br>\t\t\t\t<br>내 인생이 절대자의 감독하에 있지 않다니.<br>\t\t\t\t<br>아무런 이유 없이 살아도 된다니<br>\t\t\t\t<br>그 해방감과 자유속에서 살아.<br>\t\t\t\t<br><br>\t\t\t\t<br>우주에는 방향이 없어 절대적인 기준점이 없으니까<br>\t\t\t\t<br>그 광막함 안에서 방향을 설정하는 것과 마찬가지야<br>\t\t\t\t<br>다른 행성과 별들<br>\t\t\t\t<br>그래 인생의 방향도 그렇게 설정돼<br>\t\t\t\t<br>관계와 유대. 서로 주고받는 중력과 궤적, 에너지<br>\t\t\t\t<br>크고 대단치 않은이유로도 대단히 잘 사는사람<br>\t\t\t\t<br>딱히 낙이 없어도 잘 사는사람<br>\t\t\t\t<br>특별한일 없이도 잘 지내는 사람<br>\t\t\t\t<br>별다른 이유 없이도 잘 사는 사람<br>\t\t\t\t<br><br>\t\t\t\t<br>늘 호기심을 잘 가꾸도록 해<br>\t\t\t\t<br>그 피뢰침이 네가 사는 이유니까.<br>\t\t\t\t<br><br>\t\t\t\t<br>어떻게 살아갈 것인지를 정할 수 있다.<br>\t\t\t\t<br>그러나 어떻게가 왜를 설명해 줄 수는 없다.<br>\t\t\t\t<br><br>\t\t\t\t<br>아무런 이유 없이도<br>\t\t\t\t<br>하고 싶은 일을 맘껏 하고<br>\t\t\t\t<br>하루를 잘 살아낼 수 있는 것 그게 자유야.<br>\t\t\t\t<br>그리고 그 자유를 얻는게 성공이지<br>\t\t\t\t<br><br>\t\t\t\t명언모음 0 2019.09.08 12:14 <br>壑• 프로모타 <br>설치하기 <br>) Google Play <br>X <br>[진리를 깨닫게 해주는 인생 명언 30가지] <br>왜 굳이 의미를 찾으려 하는가? <br>인생은 욕망이지, 의미는 아니다. ( 살리 치1플린 ) <br>행복하계 여행하려면 가볍게 여행해아 한다. (생텍쥐페리 ) <br>늘 행복하고 지혜로운 사람이 되려면 자주 변해야 한다. ( 공자 ) <br>우리가 노력없이 얻는 겨의 유일한 것은 노년이다. ( 글로리아 피서 <br>0 \" width=\"303.5\" height=\"624\" src=\"<a href=\"https://graph.microsoft.com/v1.0/users('realpage@naver.com')/onenote/resources/0-a90a6a1af3d74a9da5078c776765a5f5!1-733661839CC53BA5!7921/$value\" target=\"_blank\">https://graph.microsoft.com/v1.0/users('realpage@naver.com')/onenote/resources/0-a90a6a1af3d74a9da5078c776765a5f5!1-733661839CC53BA5!7921/$value</a>\" data-src-type=\"image/jpeg\" data-fullres-src=\"<a href=\"https://graph.microsoft.com/v1.0/users('realpage@naver.com')/onenote/resources/0-e0f08ccfc2b6659e850bc0d2d7805113!1-733661839CC53BA5!7921/$value\" target=\"_blank\">https://graph.microsoft.com/v1.0/users('realpage@naver.com')/onenote/resources/0-e0f08ccfc2b6659e850bc0d2d7805113!1-733661839CC53BA5!7921/$value</a>\" data-fullres-src-type=\"image/jpeg\" /><br>\t\t\t\t<br><br>\t\t\t\t<br><br>\t\t\t\t<br>내가 나만을 생각하는 것은 이기적입니다.<br>\t\t\t\t<br>그런데 내 가족을 챙기는 것은 이기적일까요? 네 그럴 수도<br>\t\t\t\t<br>그럼 내가 속한 조직만을 챙긴다면 어떤가요, 내가 속한 지역만을 생각하면? 내 국가 나의 종의 이기만을 추구한다면? 나와 같은 모든 유기체는 어떻습니까?<br>\t\t\t\t<br><br>\t\t\t\t<br>나는 이기와 이타를 완전히 분리 할 수 없다고 생각합니다. 모두의 삶이 모두와 맞닿아 있는 유기체인 까닭에요.<br>\t\t\t\t<br><br>\t\t\t\t<br>그래서 한 사람의 스케일은 결국<br>\t\t\t\t<br>자신의 이기를 어디까지 확장 할 수 있느냐로 귀결된다고 생각합니다.<br>\t\t\t\t<br><br>\t\t\t\t<br>그 숱한 역할갈등과 충돌 속에서도 말입니다.<br>\t\t\t\t<br><br>\t\t\t\t<br>어쨌든인생이 어떻게 되어버리든 큰 의미가 잆다는 사실에, 내가 그렇게 중요한 존재가 아니어도 된다는 사실에 나는 훨씬 가볍게 살 수 있게 되었습니다.<br>\t\t\t\t<br><br>\t\t\t\t<br>파티는 끝났다.<br>\t\t\t\t<br>꽤 오랬동안 몽롱한 꿈을 꾼 느낌이다.<br>\t\t\t\t<br>취해있었달까. 아마 그럴 것이다.<br>\t\t\t\t<br>편하고 안정적이고 그래서 포근한.<br>\t\t\t\t<br>이제 피티는 끝났다.<br>\t\t\t\t<br>고단한 하루와 마음의 생채기로 점철 될<br>\t\t\t\t<br>전장으로 돌아갈 때다.<br>\t\t\t\t<br><br>\t\t\t\t<br><br>\t\t\t\t<br><br>\t\t\t\t<br>좋은 이야기를 보여주고 싶어. 관계<br>\t\t\t\t<br>어떤 이야기가 좋은 이야기 일까?<br>\t\t\t\t<br><br>\t\t\t\t<br>몰입과 영감을 자극하고 행복감과 자존감을 고양하는?<br>\t\t\t\t<br><br>\t\t\t\t<br>삶에 어떤 의미를 부여하고나면, 그 의미를 좇는 시간 이외의 삶은 상대적으로 적은 의미를 갖게되는걸까<br>\t\t\t\t<br><br>\t\t\t\t<br>보편타당한 불편, 아픔. 이런걸 바꾸고 싶어. <br>\t\t\t\t<br><br>\t\t\t\t<br>독자를 참여하게 만드는 이야기, 함께 정답을 찾아가는 이야기, 그래서 기억에 오래도록 남는 이야기가 매력적인 이야기입니다. 장도연은 다른 사람이 아니라 자기 자신에게 질문을 던지고, 그 질문을 구하는 과정에 청중을 불러들이면서도 자신의 정답을 설득하려고 하지 않습니다. 그러고 보면 장도연 씨는 참 좋은 스토리텔러인 것 같군요.<br>\t\t\t\t<br><br>\t\t\t\t<br>내게, 행복은 hygien factor<br>\t\t\t\t<br>motivation은 성장 내가 만들어갈 서사<br>\t\t\t\t<br><br>\t\t\t\t<br>내 아니 우리의 여단이 필요해.<br>\t\t\t\t<br><br>\t\t\t\t<br><br>\t\t\t\t<br>불행하지만 불운 한 것은 아니고<br>\t\t\t\t<br>불운하짐나 불행한 것은 아닐 수 있다.<br>\t\t\t\t<br>행복하지 않은 시간 또한 인생을 이루는 큰 부분이다.<br>\t\t\t\t<br>삶의 목적이 행복이라면, 그 숱한 나날들을 부정하는 것이다.<br>\t\t\t\t<br>어쩌면 우리가 겪은 불행들이 행복을 가져다 주었을 것이다.",

    "content": "\"당신의 이야기는 무엇인가?\" 질문하는 인스타그램 운영<br>\t\t\t\t<br><br>\t\t\t<br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br>그 목표, 네 삶에서의 의미를 찾기 위해 아래 질문들에 답해보라.<br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t<br>\t\t<br>\t\t\t<br>\t\t\t\t<br>행복은 단어다.<br>\t\t\t\t<br>중요한 것은 그 의미이다.<br>\t\t\t\t<br><br>\t\t\t\t<br>행복은 우리를 생존하게 한다.<br>\t\t\t\t<br>빵과 물과 소금처럼.<br>\t\t\t\t<br>물을 위해 살아가지는 않듯이,<br>\t\t\t\t<br>행복 자체가 인생의 목적이 될 수는 없다.<br>\t\t\t\t<br><br>\t\t\t\t<br>히틀러의 행복은 무엇이었을까?<br>\t\t\t\t<br>타노스의 행복은 무엇이었지?<br>\t\t\t\t<br><br>\t\t\t\t<br>행복은 중요하지만, 그것에 경도되는 것은<br>\t\t\t\t<br>삶의 중요한 것들을 놓치게 한다.<br>\t\t\t\t<br>서로의 행복이 서로의 행복을 해치지 않도록, 노력해야 한다.<br>\t\t\t\t<br><br>\t\t\t\t<br>행복은 우리가 생존 할 수 있게 한다.<br>\t\t\t\t<br>물과 소금과 빵처럼 우리를 살아가게 한다.<br>\t\t\t\t<br>그러나 죽지 않는 것과 살아나간다는 것은<br>\t\t\t\t<br>동전의 양면처럼 서로 완전히 하나이지만<br>\t\t\t\t<br>영원히 마주 할 수 없는 간극이 있다.<br>\t\t\t\t<br>삶과 생명, 그 둘이 다른 단어인 것처럼<br>\t\t\t\t<br><br>\t\t\t\t<br>그럼에도 행복은 중요하다. 쉽게 행복해지는 법을 기억해둬라.<br>\t\t\t\t<br>ㅇ 쉽게 행복해지는 사람을 곁에 둬라.<br>\t\t\t\t<br>ㅇ <br>\t\t\t\t<br><br>\t\t\t\t<br>질문 리스트<br>\t\t\t\t<br><br>\t\t\t\t<br>- Q. 현재 내가 가진 것으로 나를 설명해보세요.<br>\t\t\t\t<br>- Q. 첫 번째 국내여행, 첫 번째 해외여행, 혼자 떠난 첫 번째 여행에 대한 기억을 적어보세요.<br>\t\t\t\t<br>- Q. 나에게 여행은 어떤 의미인가요? 여행을 통해 발견한 나는 어떤 모습이었나요?<br>\t\t\t\t<br>- Q. 용서받고 싶은 사람이 있나요? 그 이유는 무엇인가요? 용서받기 위해서는 어떻게 해야 할까요?<br>\t\t\t\t<br>- Q. 내 인생의 음악을 적어보세요.<br>\t\t\t\t<br>- Q. 내 인생의 책을 적어보세요.<br>\t\t\t\t<br>- Q. 현재 직업을 선택한 순간을 떠올려보세요. 직업&#160;선택에 영향을 준 요인은 무엇인가요?<br>\t\t\t\t<br>- Q. 일할 때 주로 어떤 감정을 느끼나요? 그런 감정은 무엇 때문에 일어나나요?<br>\t\t\t\t<br>- Q. 내 마음속에 있는 가장 순수한 바람은 무엇인가요?<br>\t\t\t\t<br>- Q. 나에게 행복한 삶이란 어떤 의미인가요?<br>\t\t\t\t<br><br>\t\t\t\t<br>- <a href=\"https://steemit.com/kr/@centering/1010\" target=\"_blank\">https://steemit.com/kr/@centering/1010</a><br>\t\t\t\t<br>- <a href=\"https://naudhizb.tistory.com/m/442\" target=\"_blank\">https://naudhizb.tistory.com/m/442</a><br>\t\t\t\t<br>- <a href=\"https://m.blog.naver.com/PostView.nhn?blogId=winner1v&logNo=221289123379&categoryNo=0&proxyReferer=https%3A%2F%2Fwww.google.com%2F\" target=\"_blank\">https://m.blog.naver.com/PostView.nhn?blogId=winner1v&logNo=221289123379&categoryNo=0&proxyReferer=https%3A%2F%2Fwww.google.com%2F</a><br>\t\t\t\t<br>- <a href=\"https://semohoney.tistory.com/56\" target=\"_blank\">https://semohoney.tistory.com/56</a><br>\t\t\t\t<br>- <a href=\"https://brunch.co.kr/@wikitree/22\" target=\"_blank\">https://brunch.co.kr/@wikitree/22</a><br>\t\t\t\t<br><a href=\"https://m.huffingtonpost.kr/dr-travis-bradberry/story_b_11756944.html#cb\" target=\"_blank\">https://m.huffingtonpost.kr/dr-travis-bradberry/story_b_11756944.html#cb</a>",

    "type": "text",
    "content": "4 <br>\t\t\t\t<br>쉐약상의 고리 : <br>\t\t\t\t<br>고난을 나누면 하나가 된다 <br>\t\t\t\t<br>당신은 지금 모르는 사람과 대회를 <br>\t\t\t\t<br>다. 상대방에게 다음 두 종류의 질문을 던졌다고 상상해뉳가. <br>\t\t\t\t<br>A <br>\t\t\t\t<br>지금껏 받이본 최고의 선물은 무엇인가요? <br>\t\t\t\t<br>마지막으로 키웠던 반려동물에 대해 자세히 이야기해주세요. <br>\t\t\t\t<br>어디에서 고등학교를 다녔나요? 학교 생활은 어땠나요? <br>\t\t\t\t<br>작년 여름에 무엇을 했나요? <br>\t\t\t\t<br>가장 좋아하는 배우는 누구인가요? <br>\t\t\t\t<br>B. <br>\t\t\t\t<br>모든 것을 알려줄 수 있는 신비한 수정 구슬이 있다면, 무엇을 알 <br>\t\t\t\t<br>고 싶은가요? <br>\t\t\t\t<br>오랫동안 간절히 바란 꿈이 있나요? 왜 아직까지 그것을 이루지 <br>\t\t\t\t<br>못했나요? <br>\t\t\t\t<br>일생을 통틀어 최고의 성취로 꼽을 수 있는 것은 무엇인가요? <br>\t\t\t\t<br>친구 관계 에서 무엇을 가장 중요하게 생각하나요? <br>\t\t\t\t<br>최근에 혼자 노래를 부른 적은 언제인가요? 나른 사림에게 노래 <br>\t\t\t\t<br>를불러준 적이 있나요? <br>\t\t\t\t<br>얼핏 보면 두 부류의 질문은 크게 다른 것 같지 않다. 모두 상대방의 71 <br>\t\t\t\t<br>01져q卍1 <br>\t\t\t\t<br>잰주막킅 <br>\t\t\t\t<br>된 7 <br>\t\t\t\t<br>로하五 <br>\t\t\t\t<br>해게 하7 <br>\t\t\t\t<br>욱가깝; <br>\t\t\t\t<br>으- -자 <br>\t\t\t\t<br>1-- <br>\t\t\t\t<br>심지어 <br>\t\t\t\t<br>한 고비 <br>\t\t\t\t<br>다. 리: <br>\t\t\t\t<br>관겨 <br>\t\t\t\t<br><br>\t\t\t<br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t<br>\t\t<br>\t\t\t<br>6개 기둥별 시나리오<br>\t\t\t<br>[캐릭터 설정부터]<br>\t\t\t<br>천재, 휴머니스트,<br>\t\t\t<br>미남, 유머, 제임스본드, 아이언맨<br>\t\t\t<br>은근 따뜻한 남자<br>\t\t\t<br>츤데레였으나 나이가 들면서 묵직하고 따뜻해짐, 여유, 호기심, 열정,<br>\t\t\t<br><br>\t\t\t<br>그리하여,<br>\t\t\t<br>모든 것을 잃었을 때.<br>\t\t\t<br>그리하여,<br>\t\t\t<br>모든 것을 이뤘을 때.<br>\t\t\t<br><br>\t\t\t<br>중요하지 않은 것은 무시할 줄도 알았다.<br>\t\t\t<br>맹수처럼 사납다가도 천진하게 웃었으<br>\t\t\t<br><br>\t\t\t<br>[Plot]<br>\t\t\t<br><br>\t\t\t<br>그리고 그는 무상함이라는 것이 무가치 한 것은 아님을 깨달았다.<br>\t\t\t<br><br>\t\t\t<br>텅 빈 캔버스 위에는 본래 형형한 백색 이외에는 무엇도 존재하지 않는다.<br>\t\t\t<br>그러나 그것은 깊고 또 넓은, 우주가 되곤 한다.<br>\t\t\t<br><br>\t\t\t<br>[시간의 시간]<br>\t\t\t<br>사회 생활을 시작한지 햇수로 12년, 대기업에 근무한지 10년이 되던 해에 팀을 꾸리게 된다.<br>\t\t\t<br>회사생활을 하며 진행하던 몇 가지의 사이드 프로젝트 중에, 진척도와 현금흐름이 좋은 아이템으로 첫 아니 정확히는 두 번째 사업자등록증을 발급받게 된다. 이번에는 미국에 적을 두었다.<br>\t\t\t<br><br>\t\t\t<br>팀을 꾸리는 과정에서 소기업 하나를 M&A 했다.<br>\t\t\t<br>기존의 영업/운영 노하우와 개발력을 가진 팀원들이 자연스럽게 합류 했다.<br>\t\t\t<br><br>\t\t\t<br>사업의 목표가 생존이 되어버리지 않길 바랬다.<br>\t\t\t<br>쉽게 최초의 목적이 희석될 것이 두려웠기 때문이다.<br>\t\t\t<br>회사생활을 통해 쌓은 네트웍과 피칭 실력으로 어렵지 않게 시리즈A 투자를 유치했다.<br>\t\t\t<br><br>\t\t\t<br>사업은 빠르게 번창했다.<br>\t\t\t<br>애초에 그려놓은 Phase별 로드맵과 조직도, 그리고 잠재적 영입 대상자들을 차근차근 영입해 나갔다.<br>\t\t\t<br>소프트웨어와 하드웨어를 유기적으로 결합한 주력 서비스는 시장은 물론 시간에 대한 기존의 관념을 환기시키며 사회적인 센세이션까지 일으켰다. 동요. 그렇다 사회적 동요를 보고 싶어했던 그의 목표가 적중했고. 그 동요의 크기는 사업과 공명하며 함께 커져나갔다.<br>\t\t\t<br><br>\t\t\t<br>최초에 계획했던 대로 세계 전역에 동시 다발적으로 진출했다.<br>\t\t\t<br>물리적 오피스나 현지 인력 채용이 불필요한 구조를 수립한 덕분이었다.<br>\t\t\t<br><br>\t\t\t<br>창업을 결심하고 나서 그 단단한 결심을 지원해줄 반려자를 만난 것 까지도, 그의 계획하에 있었다.<br>\t\t\t<br>그녀는 스스로에 대한 믿음만큼이나 그에 대한 믿음을 보여줬고, 신혼이 끝나기도 전에 그가 전장에 나가는 것을 허락했다. 회사의 설립 즈음에 태어난 딸아이도 특유의 쾌활함으로 일상을 채워주었다.",

let cards = [];
let moving = null, resizing = null;

function loadBoard() {
  const saved = localStorage.getItem(SAVE_KEY);
  cards = saved ? JSON.parse(saved) : DEFAULT_CARDS.map(c => ({...c}));
  renderCards();
  if (!saved) autoLayout();
}

function autoLayout() {
  const GAP = 14;
  const boardW = document.getElementById('board').offsetWidth;
  const cols = Math.max(1, Math.floor(boardW / 280));
  const colW = (boardW - GAP * (cols - 1)) / cols;
  const colHeights = new Array(cols).fill(0);
  const allCards = document.querySelectorAll('.card');
  const images = document.querySelectorAll('.card img');
  let loaded = 0;
  const total = images.length;

  function place() {
    allCards.forEach((el, i) => {
      const card = cards[i];
      const w = Math.min(card.w || colW, colW);
      let minCol = 0;
      for (let c = 1; c < cols; c++) if (colHeights[c] < colHeights[minCol]) minCol = c;
      card.x = minCol * (colW + GAP);
      card.y = colHeights[minCol];
      card.w = w;
      el.style.left = card.x + 'px';
      el.style.top = card.y + 'px';
      el.style.width = w + 'px';
      colHeights[minCol] = card.y + el.offsetHeight + GAP;
    });
    document.getElementById('board').style.minHeight = Math.max(...colHeights) + 100 + 'px';
    saveBoard();
  }

  if (total === 0) requestAnimationFrame(place);
  else images.forEach(img => {
    if (img.complete) { loaded++; if (loaded >= total) requestAnimationFrame(place); }
    else img.onload = img.onerror = () => { loaded++; if (loaded >= total) requestAnimationFrame(place); };
  });
}

function syncText() {
  document.querySelectorAll('.card').forEach(el => {
    const idx = +el.dataset.idx;
    if (cards[idx]?.type === 'text') {
      const t = el.querySelector('.text');
      if (t) cards[idx].content = t.innerHTML;
    }
  });
}

function saveBoard() {
  syncText();
  localStorage.setItem(SAVE_KEY, JSON.stringify(cards));
  document.getElementById('status').textContent = '저장됨 ' + new Date().toLocaleTimeString();
}

function renderCards() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  cards.forEach((card, i) => {
    const el = document.createElement('div');
    el.className = 'card';
    el.dataset.idx = i;
    if (card.x !== undefined) el.style.left = card.x + 'px';
    if (card.y !== undefined) el.style.top = card.y + 'px';
    if (card.w) el.style.width = card.w + 'px';

    el.addEventListener('mousedown', e => {
      if (e.target.closest('.text, a, .card-btn, .resize-handle, table')) return;
      e.preventDefault();
      moving = { idx: i, startX: e.clientX, startY: e.clientY, origX: card.x || 0, origY: card.y || 0 };
      el.classList.add('moving');
    });

    const actions = document.createElement('div');
    actions.className = 'card-actions';
    const delBtn = document.createElement('button');
    delBtn.className = 'card-btn'; delBtn.textContent = '×';
    delBtn.onclick = e => { e.stopPropagation(); if (confirm('삭제?')) { cards.splice(i, 1); renderCards(); saveBoard(); } };
    actions.appendChild(delBtn);
    el.appendChild(actions);

    if (card.type === 'text') {
      const text = document.createElement('div');
      text.className = 'text';
      text.contentEditable = true;
      text.innerHTML = card.content || '';
      text.addEventListener('blur', () => { card.content = text.innerHTML; saveBoard(); });
      el.appendChild(text);
    } else if (card.type === 'image') {
      const src = card.src.startsWith('http') || card.src.startsWith('data:') ? card.src : IMG_BASE + card.src;
      const img = document.createElement('img');
      img.src = src;
      img.alt = card.alt || '';
      img.loading = 'lazy';
      img.onerror = () => img.style.display = 'none';
      if (card.link) {
        const a = document.createElement('a'); a.href = card.link; a.target = '_blank';
        a.appendChild(img); el.appendChild(a);
      } else { el.appendChild(img); }
      if (card.caption) {
        const cap = document.createElement('div');
        cap.className = 'caption';
        cap.textContent = card.caption;
        el.appendChild(cap);
      }
    } else if (card.type === 'table') {
      const wrapper = document.createElement('div');
      wrapper.style.overflowX = 'auto';
      wrapper.innerHTML = card.html || '';
      el.appendChild(wrapper);
    }

    const rh = document.createElement('div');
    rh.className = 'resize-handle';
    rh.addEventListener('mousedown', e => {
      e.preventDefault(); e.stopPropagation();
      resizing = { idx: i, startX: e.clientX, startW: card.w || el.offsetWidth };
    });
    el.appendChild(rh);
    board.appendChild(el);
  });

  requestAnimationFrame(() => {
    let maxBottom = 0;
    document.querySelectorAll('.card').forEach(el => {
      const b = (parseFloat(el.style.top) || 0) + el.offsetHeight;
      if (b > maxBottom) maxBottom = b;
    });
    board.style.minHeight = (maxBottom + 100) + 'px';
  });
}

document.addEventListener('mousemove', e => {
  if (moving) {
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`);
    if (!el) return;
    const nx = moving.origX + e.clientX - moving.startX;
    const ny = moving.origY + e.clientY - moving.startY;
    el.style.left = nx + 'px';
    el.style.top = ny + 'px';
  }
  if (resizing) {
    const card = cards[resizing.idx];
    card.w = Math.max(100, resizing.startW + e.clientX - resizing.startX);
    const el = document.querySelector(`.card[data-idx="${resizing.idx}"]`);
    if (el) el.style.width = card.w + 'px';
  }
});

document.addEventListener('mouseup', e => {
  if (moving) {
    const card = cards[moving.idx];
    card.x = Math.max(0, moving.origX + e.clientX - moving.startX);
    card.y = Math.max(0, moving.origY + e.clientY - moving.startY);
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`);
    if (el) { el.classList.remove('moving'); }
    moving = null; saveBoard();
  }
  if (resizing) { resizing = null; saveBoard(); }
});

function addTextCard() {
  cards.push({ type: 'text', content: '', x: 50, y: window.scrollY + 100, w: 300 });
  renderCards();
  setTimeout(() => { const els = document.querySelectorAll('.card .text'); els[els.length - 1]?.focus(); }, 100);
}

function addImageCard() {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = 'image/*';
  input.onchange = e => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = () => { cards.push({ type: 'image', src: reader.result, x: 50, y: window.scrollY + 100, w: 240 }); renderCards(); saveBoard(); };
    reader.readAsDataURL(file);
  };
  input.click();
}

function resetLayout() {
  if (!confirm('자동 재배치합니다. 현재 위치가 변경됩니다.')) return;
  cards.forEach(c => { delete c.x; delete c.y; });
  renderCards(); autoLayout();
}

setInterval(saveBoard, 30000);
loadBoard();
</script>
