<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>성공한 사람들의 공통된 14가지 습관들</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #1e1e1e;
  color: #e0e0e0;
  font-family: 'Segoe UI', -apple-system, sans-serif;
  font-size: 15px;
  line-height: 1.6;
  padding: 20px 30px 60px;
  overflow-x: hidden;
}
a { color: #6cb0f6; text-decoration: none; }
a:hover { text-decoration: underline; }
.title-bar {
  background: #3a3a5c;
  display: inline-block;
  padding: 6px 16px;
  font-size: 22px;
  font-weight: bold;
  color: #fff;
  margin-bottom: 4px;
}
.date { color: #999; font-size: 13px; margin-bottom: 20px; }
.board { position: relative; }
.card {
  background: #2a2a2a;
  border: 1px solid #3a3a3a;
  border-radius: 8px;
  padding: 12px;
  position: absolute;
  cursor: grab;
  transition: box-shadow 0.15s;
  overflow: hidden;
}
.card:hover { box-shadow: 0 0 0 1px #58a6ff; z-index: 10; }
.card.moving { opacity: 0.8; box-shadow: 0 4px 24px rgba(0,0,0,0.6); z-index: 100; cursor: grabbing; }
.card img { width: 100%; border-radius: 4px; display: block; }
.card .caption { font-size: 12px; color: #888; margin-top: 6px; }
.card .text { outline: none; min-height: 20px; white-space: pre-wrap; word-break: break-word; }
.card .text:focus { background: rgba(255,255,255,0.05); border-radius: 4px; padding: 4px; }
.card .text:empty::before { content: '텍스트 입력...'; color: #555; }
.card table { border-collapse: collapse; width: 100%; font-size: 13px; }
.card table td, .card table th { border: 1px solid #444; padding: 4px 8px; vertical-align: top; }
.card table th { background: #333; color: #ccc; }
.card-actions { position: absolute; top: 4px; right: 4px; display: none; gap: 4px; }
.card:hover .card-actions { display: flex; }
.card-btn { background: #333; border: 1px solid #555; color: #ccc; border-radius: 4px; padding: 2px 6px; font-size: 11px; cursor: pointer; }
.card-btn:hover { background: #444; color: #fff; }
.resize-handle { position: absolute; bottom: 0; right: 0; width: 16px; height: 16px; cursor: se-resize; opacity: 0; }
.card:hover .resize-handle { opacity: 0.6; }
.resize-handle::after { content: ''; position: absolute; bottom: 3px; right: 3px; width: 8px; height: 8px; border-right: 2px solid #666; border-bottom: 2px solid #666; }
.toolbar { position: fixed; bottom: 0; left: 0; right: 0; background: #161b22; border-top: 1px solid #30363d; padding: 8px 20px; display: flex; gap: 12px; align-items: center; z-index: 200; }
.toolbar button { background: #21262d; border: 1px solid #30363d; color: #e0e0e0; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; }
.toolbar button:hover { background: #30363d; }
.toolbar .status { color: #8b949e; font-size: 12px; margin-left: auto; }
.highlight-red { color: #ff6b6b; }
.highlight-blue { color: #6cb0f6; }
</style>
</head>
<body>
<div class="title-bar">성공한 사람들의 공통된 14가지 습관들</div>
<div class="date">2017년 1월 25일 수요일</div>
<div class="board" id="board"></div>
<div class="toolbar">
  <button onclick="addTextCard()">+ 텍스트</button>
  <button onclick="addImageCard()">+ 이미지</button>

</div>
<script>
const SAVE_KEY = 'board-성공한-사람들의-공통된-14가지-습관들';
const IMG_BASE = '../../attachments/';
const DEFAULT_CARDS = [
  {
    "type": "text",
    "content": "성공한 사람들의 공통된 14가지 습관들<br>\t\t\t<br>본문듣기<br>\t\t\t<br>설정 <br>\t\t\t<br>기사입력 2016.10.05 오후 5:50<br>\t\t\t<br>최종수정 2016.10.05 오후 5:53 <br>\t\t\t<br><a href=\"http://m.news.naver.com/comment/list.nhn?gno=news022%2c0003102830&aid=0003102830&mode=LSD&oid=022&sid1=001&backUrl=%2fmain.nhn%3fmode%3dLSD%26sid1%3d001&light=off\" target=\"_blank\">50</a> <br>\t\t\t<br><a href=\"http://m.news.naver.com/read.nhn?mode=LSD&sid1=001&oid=022&aid=0003102830#\" target=\"_blank\">314</a><br>\t\t\t<br><a href=\"http://m.news.naver.com/read.nhn?mode=LSD&sid1=001&oid=022&aid=0003102830#\" target=\"_blank\">SNS 보내기 </a><br>\t\t\t<br>글자 작게보기<a href=\"http://m.news.naver.com/read.nhn?mode=LSD&sid1=001&oid=022&aid=0003102830#\" target=\"_blank\">글자 크게보기</a><br>\t\t\t<br>루카스 쉬베켄디엑은 지난 수년 간 경제지 ‘포천’이 선정하는 세계 500대 기업 최고경영자(CEO)들을 면밀하게 분석, 그들의 성공 비결을 파악했다고 자처하는 인물이다. 미국의 시사주간 타임은 최근 쉬베켄디엑이 소셜 질의응답 서비스 ‘쿠오라’에 올린 ‘<a href=\"http://time.com/4507838/uncommon-habits-success/\" target=\"_blank\">성공한 사람들의 14가지 공통된 습관’</a>을 소개했다.&#160;",
    "w": 400
  },
  {
    "type": "image",
    "src": "4bf6660d0b.png",
    "alt": "성공한 사람들의 공통된 14가지 습관들",
    "w": 220
  },
  {
    "type": "text",
    "content": "원본보기 <br>\t\t\t<br>1.&#160;전략적으로 포기하라<br>\t\t\t<br><br>\t\t\t<br>결론적으로 말하자면 우리 모두에게 주어진 시간은&#160;하루 24시간 뿐이다. 성공을 위해서는 당신이 정말 중요하다고 생각하는 것들에 들이는 시간을 더 많이 확보해야 한다. 그러기 위해서는 (지금은) 중요한 다른 것들에 쓰는 시간을 희생시켜야 한다. 매주 보다 나은 뭔가를 얻기 위해 포기할 수 있는 것들을 체크하라.<br>\t\t\t<br><br>\t\t\t<br>2. 스스로 바라는 것을 믿어라<br>\t\t\t<br><br>\t\t\t<br>사람들이 갖고 있는 대부분의 믿음은 무엇이 됐든지간에 사실에 기반한 게 아니다. 다른 사람이 말해줘서 갖게 된 믿음이다. 당신에게 힘을 부여하고 설레게 만드는 것이 진정한 확신이다. 무엇이 진짜인지 헷갈릴 때는 당신을 기분 좋게 만드는 게 뭔지를 살펴야 한다. 그게 진짜 믿음이다.<br>\t\t\t<br><br>\t\t\t<br>3. 끊임없이 동기부여를 하라<br>\t\t\t<br><br>\t\t\t<br>동기부여는 물론 오래 지속될 수 있는 성격의 감정이 아니다. 하지만 그럴 경우 엄청난 도움을 받을 수 있다. 매일 당신의 승부욕을 자극하고 의욕을 솟구치게 하는 꺼리들을 찾아내야 한다.<br>\t\t\t<br><br>\t\t\t<br>4. 가급적 생각을 덜 하라<br>\t\t\t<br><br>\t\t\t<br>생각은 종종 행동(실천)을 방해한다. 해야 할 뭔가에 대해 생각만 하게 되면 우리는 그것이 잘못될 수 있는 여러 가능성과 해서는 안될 이유를 떠올리기 마련이다. 생각을 멈추고 행동을 시작하라.<br>\t\t\t<br><br>\t\t\t<br>5. 일찍 잠자리에 들라<br>\t\t\t<br><br>\t\t\t<br>당신의 게임에서 최고 자리에 오르려면 잠을 충분히 잘 필요가 있다. 성공한 사람들은 어디서든 오전 4∼6시에 일어난다. 그들이 그 시각에 일어날 수 있었던 것은 오후 9∼11시쯤 잠을 잤기 때문이라는 것을 잊어선 안된다.<br>\t\t\t<br><br>\t\t\t<br>6. 당신의 진도를 계속해 파악하라<br>\t\t\t<br><br>\t\t\t<br>아무리 당신이 알고 있는 것(목표)에 대한 믿음이 확고하더라도 실제로 관련 증거를 보지 못한다면 확실히 알고 있다고 자신할 순 없다. 당신이 (목표를 이루기 위해) 시간을 얼마나 투자하고 있고 어떤 상황인지를 정확히 파악해야 한다. 끊임없이 자극을 받을 수 있는 가장 좋은 방법은 (고지를 향한 과정을) 그래픽화하는 것이다.<br>\t\t\t<br><br>\t\t\t<br>7. 주변을 깨끗이 하라<br>\t\t\t<br><br>\t\t\t<br>사무실과 업무 공간은 물론 사는 집도 깨끗이 해야 한다. 최대한 깔끔하게 정리정돈을 하고 지저분한 것들은 모두 치워라. 청소는 당신의 기분을 상쾌하게 만들고 동기부여에도 도움이 되는 가치있는 일이다.<br>\t\t\t<br><br>\t\t\t<br>8. 긍정적인 미래만을 말하라<br>\t\t\t<br><br>\t\t\t<br>당신이 꿈꾸는 것들이 마치 벌써 일어났거나 일어나지 않을 가능성이 거의 없는 것처럼 말하는 것을 체화해야 한다. 당신이 앞으로 스스로 감탄할 만큼 놀라운 삶을 누리게 될 것이라는 ‘사실’을 믿는다면 당신은 이같은 ‘믿음’대로 행동할 것이고 이같은 결과를 얻게 될 것이다.<br>\t\t\t<br><br>\t\t\t<br>9. 감사하라<br>\t\t\t<br><br>\t\t\t<br>최대한 많은 것들과 사람에게 감사해하며 살아야 한다. 성공한 사람들 대부분은 아무 것도 가지지 못한 상황에서 시작해 지금의 위치에까지 올랐다. 성공한 사람들이 그들이 가진 아주 사소한 것들에게도 감사하는 마음을 갖는 이유다. 이러한 마음가짐은 가장 단순한 것조차 특별하고 놀라운 것으로 만든다.<br>\t\t\t<br><br>\t\t\t<br>10. 당장 실행하라<br>\t\t\t<br><br>\t\t\t<br>온라인에서 (목표를 이루는 데 도움이 되는) 팁을 봤거나 뭔가 의미있는 전략을 들었다면 곧바로 모든 것을 실천해봐야 한다. 성공에 가까워졌을 때야 비로소 실행할 수 있는 괜찮은 아이디어나 전략은 존재하지 않는다. <br>\t\t\t<br><br>\t\t\t<br>11. 중요한 것은 절대 양보하지 마라<br>\t\t\t<br><br>\t\t\t<br>뭔가를 원한다면 그것을 이룰 수 있는 방법을 찾아야 한다. 잊지 말아야 할 것은 그 바람이 원래 좋은 것은 아니었지만 당신이 필요에 의해 선택한 게 아니었다는 점이다. 당신이 한 번 결심한 목표는 적어도 스스로한테는 반드시 뭔가를 증명해보여야 하는 절박한 것이라는 점을 기억해야 한다.<br>\t\t\t<br><br>\t\t\t<br>12. 목표를 향해 정진하라<br>\t\t\t<br><br>\t\t\t<br>성공은 중도에 포기하지 않는 데서 찾아온다. 어찌 보면 모든 사람은 자신이 있는 분야에서 성공을 향해 달리고 있다고 말할 수 있다. 하지만 결과적으로 성공한 사람은 채 1%도 안된다. 당신이 스스로에게 또는 주변에 말했던 바로 그 성공의 목표, 그게 무엇이든지간에 바로 그것을 향해 움직여라.<br>\t\t\t<br><br>\t\t\t<br>13. 스스로에게 돈을 쓰라<br>\t\t\t<br><br>\t\t\t<br>화장품이나 옷, 게임 등에 돈을 쓰라는 게 아니다. 성공을 위한 정보를 모으고, 길을 찾고, 책을 통해 더 많은 것을 배우라는 얘기다. 성공한 사람들은 오래 지속될 수 있는 것에 돈을 쓴다. 가장 오래 지속될 수 있는 것, 그것은 바로 당신 자신이다.<br>\t\t\t<br><br>\t\t\t<br>14. 신경을 끊어라<br>\t\t\t<br><br>\t\t\t<br>당신 주변 친구들만을 말하는 게 아니다. 당신이 목표를 달성할 수 있을지, 없을지에 관한 신경도 포함된다. 이같은 의심과 회의를 덜할수록, 일할 때 겪는 스트레스도 줄어든다. 그러면 일은 더욱 재밌어지고 생각보다 빨리 성공할 수 있다. 성공을 향한 추격을 관두는 것, 그게 바로 성공의 지름길이다. <br>\t\t\t<br><br>\t\t\t출처: <<a href=\"http://m.news.naver.com/read.nhn?mode=LSD&sid1=001&oid=022&aid=0003102830\" target=\"_blank\">http://m.news.naver.com/read.nhn?mode=LSD&sid1=001&oid=022&aid=0003102830</a>>",
    "w": 400
  }
];

let cards = [];
let moving = null, resizing = null;

function loadBoard() {
  const saved = localStorage.getItem(SAVE_KEY);
  cards = saved ? JSON.parse(saved) : DEFAULT_CARDS.map(c => ({...c}));
  renderCards();
  if (!saved) autoLayout();
}

function autoLayout() {
  const GAP = 14;
  const boardW = document.getElementById('board').offsetWidth;
  const cols = Math.max(1, Math.floor(boardW / 280));
  const colW = (boardW - GAP * (cols - 1)) / cols;
  const colHeights = new Array(cols).fill(0);
  const allCards = document.querySelectorAll('.card');
  const images = document.querySelectorAll('.card img');
  let loaded = 0;
  const total = images.length;

  function place() {
    allCards.forEach((el, i) => {
      const card = cards[i];
      const w = Math.min(card.w || colW, colW);
      let minCol = 0;
      for (let c = 1; c < cols; c++) if (colHeights[c] < colHeights[minCol]) minCol = c;
      card.x = minCol * (colW + GAP);
      card.y = colHeights[minCol];
      card.w = w;
      el.style.left = card.x + 'px';
      el.style.top = card.y + 'px';
      el.style.width = w + 'px';
      colHeights[minCol] = card.y + el.offsetHeight + GAP;
    });
    document.getElementById('board').style.minHeight = Math.max(...colHeights) + 100 + 'px';
    saveBoard();
  }

  if (total === 0) requestAnimationFrame(place);
  else images.forEach(img => {
    if (img.complete) { loaded++; if (loaded >= total) requestAnimationFrame(place); }
    else img.onload = img.onerror = () => { loaded++; if (loaded >= total) requestAnimationFrame(place); };
  });
}

function syncText() {
  document.querySelectorAll('.card').forEach(el => {
    const idx = +el.dataset.idx;
    if (cards[idx]?.type === 'text') {
      const t = el.querySelector('.text');
      if (t) cards[idx].content = t.innerHTML;
    }
  });
}

function saveBoard() {
  syncText();
  localStorage.setItem(SAVE_KEY, JSON.stringify(cards));
  document.getElementById('status').textContent = '저장됨 ' + new Date().toLocaleTimeString();
}

function renderCards() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  cards.forEach((card, i) => {
    const el = document.createElement('div');
    el.className = 'card';
    el.dataset.idx = i;
    if (card.x !== undefined) el.style.left = card.x + 'px';
    if (card.y !== undefined) el.style.top = card.y + 'px';
    if (card.w) el.style.width = card.w + 'px';

    el.addEventListener('mousedown', e => {
      if (e.target.closest('.text, a, .card-btn, .resize-handle, table')) return;
      e.preventDefault();
      moving = { idx: i, startX: e.clientX, startY: e.clientY, origX: card.x || 0, origY: card.y || 0 };
      el.classList.add('moving');
    });

    const actions = document.createElement('div');
    actions.className = 'card-actions';
    const delBtn = document.createElement('button');
    delBtn.className = 'card-btn'; delBtn.textContent = '×';
    delBtn.onclick = e => { e.stopPropagation(); if (confirm('삭제?')) { cards.splice(i, 1); renderCards(); saveBoard(); } };
    actions.appendChild(delBtn);
    el.appendChild(actions);

    if (card.type === 'text') {
      const text = document.createElement('div');
      text.className = 'text';
      text.contentEditable = true;
      text.innerHTML = card.content || '';
      text.addEventListener('blur', () => { card.content = text.innerHTML; saveBoard(); });
      el.appendChild(text);
    } else if (card.type === 'image') {
      const src = card.src.startsWith('http') || card.src.startsWith('data:') ? card.src : IMG_BASE + card.src;
      const img = document.createElement('img');
      img.src = src;
      img.alt = card.alt || '';
      img.loading = 'lazy';
      img.onerror = () => img.style.display = 'none';
      if (card.link) {
        const a = document.createElement('a'); a.href = card.link; a.target = '_blank';
        a.appendChild(img); el.appendChild(a);
      } else { el.appendChild(img); }
      if (card.caption) {
        const cap = document.createElement('div');
        cap.className = 'caption';
        cap.textContent = card.caption;
        el.appendChild(cap);
      }
    } else if (card.type === 'table') {
      const wrapper = document.createElement('div');
      wrapper.style.overflowX = 'auto';
      wrapper.innerHTML = card.html || '';
      el.appendChild(wrapper);
    }

    const rh = document.createElement('div');
    rh.className = 'resize-handle';
    rh.addEventListener('mousedown', e => {
      e.preventDefault(); e.stopPropagation();
      resizing = { idx: i, startX: e.clientX, startW: card.w || el.offsetWidth };
    });
    el.appendChild(rh);
    board.appendChild(el);
  });

  requestAnimationFrame(() => {
    let maxBottom = 0;
    document.querySelectorAll('.card').forEach(el => {
      const b = (parseFloat(el.style.top) || 0) + el.offsetHeight;
      if (b > maxBottom) maxBottom = b;
    });
    board.style.minHeight = (maxBottom + 100) + 'px';
  });
}

document.addEventListener('mousemove', e => {
  if (moving) {
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`);
    if (!el) return;
    const nx = moving.origX + e.clientX - moving.startX;
    const ny = moving.origY + e.clientY - moving.startY;
    el.style.left = nx + 'px';
    el.style.top = ny + 'px';
  }
  if (resizing) {
    const card = cards[resizing.idx];
    card.w = Math.max(100, resizing.startW + e.clientX - resizing.startX);
    const el = document.querySelector(`.card[data-idx="${resizing.idx}"]`);
    if (el) el.style.width = card.w + 'px';
  }
});

document.addEventListener('mouseup', e => {
  if (moving) {
    const card = cards[moving.idx];
    card.x = Math.max(0, moving.origX + e.clientX - moving.startX);
    card.y = Math.max(0, moving.origY + e.clientY - moving.startY);
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`);
    if (el) { el.classList.remove('moving'); }
    moving = null; saveBoard();
  }
  if (resizing) { resizing = null; saveBoard(); }
});

function addTextCard() {
  cards.push({ type: 'text', content: '', x: 50, y: window.scrollY + 100, w: 300 });
  renderCards();
  setTimeout(() => { const els = document.querySelectorAll('.card .text'); els[els.length - 1]?.focus(); }, 100);
}

function addImageCard() {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = 'image/*';
  input.onchange = e => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = () => { cards.push({ type: 'image', src: reader.result, x: 50, y: window.scrollY + 100, w: 240 }); renderCards(); saveBoard(); };
    reader.readAsDataURL(file);
  };
  input.click();
}

function resetLayout() {
  if (!confirm('자동 재배치합니다. 현재 위치가 변경됩니다.')) return;
  cards.forEach(c => { delete c.x; delete c.y; });
  renderCards(); autoLayout();
}

setInterval(saveBoard, 30000);
loadBoard();
</script>
</body>
</html>
