<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>내가 이 행성에서 사랑하는 것든</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #1e1e1e;
  color: #e0e0e0;
  font-family: 'Segoe UI', -apple-system, sans-serif;
  font-size: 15px;
  line-height: 1.6;
  padding: 20px 30px 60px;
  overflow-x: hidden;
}
a { color: #6cb0f6; text-decoration: none; }
a:hover { text-decoration: underline; }
.title-bar {
  background: #3a3a5c;
  display: inline-block;
  padding: 6px 16px;
  font-size: 22px;
  font-weight: bold;
  color: #fff;
  margin-bottom: 4px;
}
.date { color: #999; font-size: 13px; margin-bottom: 20px; }
.board { position: relative; }
.card {
  background: #2a2a2a;
  border: 1px solid #3a3a3a;
  border-radius: 8px;
  padding: 12px;
  position: absolute;
  cursor: grab;
  transition: box-shadow 0.15s;
  overflow: hidden;
}
.card:hover { box-shadow: 0 0 0 1px #58a6ff; z-index: 10; }
.card.moving { opacity: 0.8; box-shadow: 0 4px 24px rgba(0,0,0,0.6); z-index: 100; cursor: grabbing; }
.card img { width: 100%; border-radius: 4px; display: block; }
.card .caption { font-size: 12px; color: #888; margin-top: 6px; }
.card .text { outline: none; min-height: 20px; white-space: pre-wrap; word-break: break-word; }
.card .text:focus { background: rgba(255,255,255,0.05); border-radius: 4px; padding: 4px; }
.card .text:empty::before { content: '텍스트 입력...'; color: #555; }
.card table { border-collapse: collapse; width: 100%; font-size: 13px; }
.card table td, .card table th { border: 1px solid #444; padding: 4px 8px; vertical-align: top; }
.card table th { background: #333; color: #ccc; }
.card-actions { position: absolute; top: 4px; right: 4px; display: none; gap: 4px; }
.card:hover .card-actions { display: flex; }
.card-btn { background: #333; border: 1px solid #555; color: #ccc; border-radius: 4px; padding: 2px 6px; font-size: 11px; cursor: pointer; }
.card-btn:hover { background: #444; color: #fff; }
.resize-handle { position: absolute; bottom: 0; right: 0; width: 16px; height: 16px; cursor: se-resize; opacity: 0; }
.card:hover .resize-handle { opacity: 0.6; }
.resize-handle::after { content: ''; position: absolute; bottom: 3px; right: 3px; width: 8px; height: 8px; border-right: 2px solid #666; border-bottom: 2px solid #666; }
.toolbar { position: fixed; bottom: 0; left: 0; right: 0; background: #161b22; border-top: 1px solid #30363d; padding: 8px 20px; display: flex; gap: 12px; align-items: center; z-index: 200; }
.toolbar button { background: #21262d; border: 1px solid #30363d; color: #e0e0e0; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; }
.toolbar button:hover { background: #30363d; }
.toolbar .status { color: #8b949e; font-size: 12px; margin-left: auto; }
.highlight-red { color: #ff6b6b; }
.highlight-blue { color: #6cb0f6; }
</style>
</head>
<body>
<div class="title-bar">내가 이 행성에서 사랑하는 것든</div>
<div class="date">2016년 2월 15일 월요일</div>
<div class="board" id="board"></div>
<div class="toolbar">
  <button onclick="addTextCard()">+ 텍스트</button>
  <button onclick="addImageCard()">+ 이미지</button>
  <button onclick="saveBoard()">💾 저장</button>
  <button onclick="resetLayout()">↺ 재배치</button>
  <span class="status" id="status">Ready</span>
</div>
<script>
const SAVE_KEY = 'board-내가-이-행성에서-사랑하는-것든';
const IMG_BASE = '../../attachments/';
const DEFAULT_CARDS = [
  {
    "type": "text",
    "content": "내가 이 행성에서 사랑하는 것든<br>\t\t<br>\t\t<br>\t<br>\t<br>\t\t<br>\t\t\t<br>사케<br>\t\t\t<br>코난 오브라이안 쇼<br>\t\t\t<br>위대한 혁신가들 잡스. 엘론 머스크<br>\t\t\t<br>글쓰기<br>\t\t\t<br>노을. 일출<br>\t\t\t<br>새로운 장소와 건축물<br>\t\t\t<br><a href=\"http://ppss.kr/archives/19520\" target=\"_blank\">성공하는 사람들이 주말에 하는 14가지</a><br>\t\t\t<br>2014년 4월 15일 by <a href=\"http://ppss.kr/archives/author/ppsswr128\" target=\"_blank\">강은진</a> <br>\t\t\t<br>37살의 스펜서 래스코프는 하버드를 졸업했고, 세 아이의 아버지이며, 이미 많은 것을 성취했다.&#160;Hotwire.com을 공동 창립하였고, 익스피디아의 부사장이 되었으며, 유명 부동산 정보 사이트 Zillow에서 CFO / 마케팅 부사장 / COO가 되었으며, 2008년에는 CEO로 승진했다.<br>\t\t\t<br>그는 어떻게 이런 성공을 이루고 유지할 수 있었을까? 주말을 ‘일상적’으로 보냈기 때문이었다.<br>\t\t\t<br>“주말은 제가 매일매일의 업무에서 해방되어 우리 회사와 내가 몸담고 있는 산업에 대해 더욱 깊이 생각할 수 있는 기회를 갖는 중요한 시간입니다. 엄밀하게는 (사무실에서) 일을 하고 있지 않더라도, 항상 머리 속으로는 일에 대해 생각합니다. 주말은 더 큰 이슈를 깊이 생각하고 성찰할 수 있는 멋진 기회입니다.” 래스코프의 말이다.<br>\t\t\t<br>그는 항상 주말을 가족들과 보낸다고 했다. “심지어 금요일에 출장 중이고, 다음주에도 같은 곳에서 출장 업무를 계속하기 때문에 돌아가야 하더라도 주말에는 항상 집에 갑니다.”<br>\t\t\t<br>래스코프가 작년에 세웠던 목표는 ‘토요일 만큼은 이메일 체크 안하기’였는데 잘 안됐다. “올해도 계속 노력하고 있는데요, 그 때보다는 더 행운이 따르는 거 같습니다. 제게는 어린 아이 3명이 있어서, 주말은 보통 요새를 만들고, 자전거를 타고 축구를 하고 체스를 두고 유모차를 끌고 동물원에 가고 기저귀를 갈고 책을 읽고 생일 파티를 가는데요, 기진맥진하면서도 다양한 재미가 있습니다. 주말엔 절대로 사무실에 가지 않지만, 밤엔 이메일을 체크하고요, 주말을 일에 관련된 것들을 읽을 기회로 활용합니다.”<br>\t\t\t<br>포브스에서는 성공하는 사람들이 주말에 하는 14가지를 다음과 같이 정리해보았다:<br>\t\t\t<br>1. 가족/친구와 함께 보내는 시간을 만들기<br>\t\t\t<br>주중에는 사랑하는 사람들과 많은 시간을 보내지 못하는 이들에게 특히 중요하다.<br>\t\t\t<br>2. 운동하기<br>\t\t\t<br>운동은 모든 이들에게 필요하다. 주중 4~5일 동안 운동하지 못했어도, 주말에는 그런 시간을 마련하고 행동해야 한다. 마음을 비우고 신선한 아이디어를 만들 완벽한 기회이다.<br>\t\t\t<br>“제가 아는 어떤 PR 회사 대표님은 어떻게 새로운 클라이언트를 위한 경쟁 PT를 할지, 스토리를 어떤 앵글로 프레스에 내보낼지에 대한 아이디어가 떠올리기 위해 애완견과 산책을 합니다.”<br>\t\t\t<br>따뜻한 달에는 실내 자전거 타기나, 야외에서 자전거 타기를 제안한다. “두 가지 모두 에너지를 충전해 주고, 같은 관심사를 가진 사람들이 모이게 해 주죠. 예를 들어 주말에 헤지 펀드 동료들과 월 스트리트의 프로들이 함께 자전거를 탄다는 건 평범한 일이 아니죠. 엘리트의 커뮤니티에 소속되어 관계를 맺고 키우기에 탁월한 방법입니다.”<br>\t\t\t<br>3. 좋아하는 것을 하기<br>\t\t\t<br>“축하 카드를 만드는 회사의 한 크리에이티브 디렉터는 예술을 좋아하여 미술 석사(MFA)를 따기 위해 다시 입학하기도 했습니다. 그러다가 시를 사랑하게 되어 주말마다 직접 쓰고 있습니다.”<br>\t\t\t<br>“성공한 사람들은 중요하거나 재미있는 걸 하기 위한 시간을 마련합니다. 그들은 삶에 균형을 더하기 위한 활동을 할 여지를 만듭니다.”<br>\t\t\t<br>4. 여행<br>\t\t\t<br>주중에 치열하게 업무를 하느라 고되게 보내도 주말에 어딘가로 떠나면 한숨을 돌리기 좋다.<br>\t\t\t<br>5. 인터넷 끊기<br>\t\t\t<br>성공한 사람들은 특정 시간 동안은 이메일을 피한다고 한다. “주말 내내는 아니지만, 폰 없이 걷기만 해도 해방감을 느낄 수 있습니다. ‘인터넷으로부터의 안식일(tech Sabbath)’을 가져보시길 바랍니다. 특별히 종교를 갖고 있지 않더라도 말이죠. 토요일 밤부터 일요일 낮까지만 그렇게 해도 좋습니다.”<br>\t\t\t<br>6. 봉사 활동하기<br>\t\t\t<br>“제가 아는 상업 부동산 브로커 중에 푸드 뱅크에 기부할 음식을 만드는 행사를 돕는 봉사활동을 하는 사람이 있습니다. 그녀는 한 주 내내 부담스러운 분석 업무를 하는데요, 봉사활동을 통해 균형을 잡고, 돈을 받지 않고 홍보물들을 디자인하며 창조적이고 싶은 그녀의 필요도 충족시켜 줍니다. 성공한 사람이 자신을 자선적인 사람으로 브랜딩할 수 있게 도와주는 효과도 있습니다.”<br>\t\t\t<br>7. 집안일을 피하기<br>\t\t\t<br>주말에는 해둬야 하는 일이 좀 있지만, 이걸 하는 시간은 되도록 최소화해야 한다고 한다. 마음 속에 작은 창을 만들고, 나머지 시간 동안 집안일이나 잔심부름들 마음 속에서 추방하라.<br>\t\t\t<br>8. 계획하기<br>\t\t\t<br>“계획을 하면 더욱 효율적이며, 한 주가 시작되기 전에 해 두면 월요일부터 치고 나갈 수 있게 준비가 되고, 자신과 함께 일하는 사람들에게 명확한 디렉션을 줄 수 있으며, 그들 또한 준비가 됩니다.”<br>\t\t\t<br>단기 리스트에만 매달리면 큰 것을 이룰 수 없기에 성공한 사람들은 월간/연간으로 계획을 세운다고 한다.<br>\t\t\t<br>9. 사람들과 어울리기<br>\t\t\t<br>“사람은 사회적 동물입니다. 행복을 느낀 사람들의 하루에는 사람들과 어울리는 게 상위에 랭크되어 있으며, 그 아래 많이 떨어지지 않은 순위에 섹스가 있다는 연구결과가 있습니다.”<br>\t\t\t<br>친구/가족과 함께 외출하거나 지역 공동체에 참여해 보라.&#160;“성공하는 사람들은 주고 받는 것에서 큰 만족을 느낀다는 게 증명되었습니다. 예를 들어 어딘가의 회원이 되면 다른 성공한 사람들을 접할 수 있습니다.”<br>\t\t\t<br>10. 정원 가꾸기/만들기/게임/스포츠/요리/문화 활동<br>\t\t\t<br>한 주 내내 사무실에 갇혀 있는 사람들에게 특히 중요한 일이다.&#160;“순수한 기쁨을 느끼기 위해, 어떤 이들은 아름다운 정원을 만드는 데에서 큰 만족감을 찾기도 합니다.”<br>\t\t\t<br>어떤 변호사는 그녀의 창조성을 만족시키기 위해 주말에 정원 가꾸기/모자이크 만들기/타일 만들기를 한다. “이런 식으로 그녀의 삶을 채우면 월요일에는 리프레시되어 소송과 재판 준비 업무를 할 준비가 됩니다. 그녀에게 아트 작업은 그녀의 영혼을 살찌우고, 정신적인 면과 연결되고 싶은 그녀의 니즈를 충족시키는 방식입니다.”<br>\t\t\t<br>친목 모임과 그룹 또한 사고방식을 향상시키며, 종종 매우 경쟁력 있고 똑똑한 프로들과의 인간관계도 만들어 낸다고 한다. “어느 친목회의 회원 리스트를 본 적이 있는데요, 그들은 월스트리트의 인명록에 있던 이들이었습니다.”&#160;극장 / 오페라 / 스포츠 대회 또한 정신을 풍성하게 한다.<br>\t\t\t<br>11. 인맥 쌓기<br>\t\t\t<br>“인맥을 만드는 것은 성공한 사람에게 큰 일이 아니라, 삶의 방식입니다.” 그들은 어디를 가든 무엇을 하든 새로운 이들을 만나려 한다.<br>\t\t\t<br>12. 깊이 생각하기<br>\t\t\t<br>진짜 성공한 사람들은 주말을 그들이 가진 것에 감사하고 행복과 성취에 대해 깊이 생각해 보는 시간을 가진다고 한다. 래스코프가 말했듯이 ‘주말은 더 큰 이슈를 깊이 생각하고 성찰할 수 있는 멋진 기회’이다.<br>\t\t\t<br>13. 명상하기<br>\t\t\t<br>명상에 관한 강좌나 개인 교습을&#160;통해 통찰과 마음의 평화에 대해 맞춤식 접근을 할 수 있다.<br>\t\t\t<br>14. 재충전하기<br>\t\t\t<br>우리는 경쟁 시대에 살고 있다. “최고의 퍼포먼스를 내기 위해서는 자신의 배터리를 잘 충전하겠다는 목표를 가지고, 휴식시간을 잘 가져야 합니다.” 이게 가장 성공한 이들이 그렇게 많은 걸 할 수 있었던 비결이다.<br>\t\t\t<br>성공한 사람들은 여가를 아주 한가롭게 보내려면 시간이 매우 중요하다는 걸 알고 있다. “응당 해야 할 걸 생각하는 데 실패해서 시간을 낭비하면 안되며, 그렇게 되면 TV 보기 / 빈둥거리기 / 비효율적인 이메일 체크 / 집안일 등으로 주말을 잃게 됩니다. 주중에 바쁘게 지냈다면 주말은 그렇게 보내지 않아도 됩니다. 매일 아침 8시부터 오후 8시까지 그렇게 지내는 사람은 더더욱 그렇습니다.”",
    "w": 400
  }
];

let cards = [];
let moving = null, resizing = null;

function loadBoard() {
  const saved = localStorage.getItem(SAVE_KEY);
  cards = saved ? JSON.parse(saved) : DEFAULT_CARDS.map(c => ({...c}));
  renderCards();
  if (!saved) autoLayout();
}

function autoLayout() {
  const GAP = 14;
  const boardW = document.getElementById('board').offsetWidth;
  const cols = Math.max(1, Math.floor(boardW / 280));
  const colW = (boardW - GAP * (cols - 1)) / cols;
  const colHeights = new Array(cols).fill(0);
  const allCards = document.querySelectorAll('.card');
  const images = document.querySelectorAll('.card img');
  let loaded = 0;
  const total = images.length;

  function place() {
    allCards.forEach((el, i) => {
      const card = cards[i];
      const w = Math.min(card.w || colW, colW);
      let minCol = 0;
      for (let c = 1; c < cols; c++) if (colHeights[c] < colHeights[minCol]) minCol = c;
      card.x = minCol * (colW + GAP);
      card.y = colHeights[minCol];
      card.w = w;
      el.style.left = card.x + 'px';
      el.style.top = card.y + 'px';
      el.style.width = w + 'px';
      colHeights[minCol] = card.y + el.offsetHeight + GAP;
    });
    document.getElementById('board').style.minHeight = Math.max(...colHeights) + 100 + 'px';
    saveBoard();
  }

  if (total === 0) requestAnimationFrame(place);
  else images.forEach(img => {
    if (img.complete) { loaded++; if (loaded >= total) requestAnimationFrame(place); }
    else img.onload = img.onerror = () => { loaded++; if (loaded >= total) requestAnimationFrame(place); };
  });
}

function syncText() {
  document.querySelectorAll('.card').forEach(el => {
    const idx = +el.dataset.idx;
    if (cards[idx]?.type === 'text') {
      const t = el.querySelector('.text');
      if (t) cards[idx].content = t.innerHTML;
    }
  });
}

function saveBoard() {
  syncText();
  localStorage.setItem(SAVE_KEY, JSON.stringify(cards));
  document.getElementById('status').textContent = '저장됨 ' + new Date().toLocaleTimeString();
}

function renderCards() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  cards.forEach((card, i) => {
    const el = document.createElement('div');
    el.className = 'card';
    el.dataset.idx = i;
    if (card.x !== undefined) el.style.left = card.x + 'px';
    if (card.y !== undefined) el.style.top = card.y + 'px';
    if (card.w) el.style.width = card.w + 'px';

    el.addEventListener('mousedown', e => {
      if (e.target.closest('.text, a, .card-btn, .resize-handle, table')) return;
      e.preventDefault();
      moving = { idx: i, startX: e.clientX, startY: e.clientY, origX: card.x || 0, origY: card.y || 0 };
      el.classList.add('moving');
    });

    const actions = document.createElement('div');
    actions.className = 'card-actions';
    const delBtn = document.createElement('button');
    delBtn.className = 'card-btn'; delBtn.textContent = '×';
    delBtn.onclick = e => { e.stopPropagation(); if (confirm('삭제?')) { cards.splice(i, 1); renderCards(); saveBoard(); } };
    actions.appendChild(delBtn);
    el.appendChild(actions);

    if (card.type === 'text') {
      const text = document.createElement('div');
      text.className = 'text';
      text.contentEditable = true;
      text.innerHTML = card.content || '';
      text.addEventListener('blur', () => { card.content = text.innerHTML; saveBoard(); });
      el.appendChild(text);
    } else if (card.type === 'image') {
      const src = card.src.startsWith('http') || card.src.startsWith('data:') ? card.src : IMG_BASE + card.src;
      const img = document.createElement('img');
      img.src = src;
      img.alt = card.alt || '';
      img.loading = 'lazy';
      img.onerror = () => img.style.display = 'none';
      if (card.link) {
        const a = document.createElement('a'); a.href = card.link; a.target = '_blank';
        a.appendChild(img); el.appendChild(a);
      } else { el.appendChild(img); }
      if (card.caption) {
        const cap = document.createElement('div');
        cap.className = 'caption';
        cap.textContent = card.caption;
        el.appendChild(cap);
      }
    } else if (card.type === 'table') {
      const wrapper = document.createElement('div');
      wrapper.style.overflowX = 'auto';
      wrapper.innerHTML = card.html || '';
      el.appendChild(wrapper);
    }

    const rh = document.createElement('div');
    rh.className = 'resize-handle';
    rh.addEventListener('mousedown', e => {
      e.preventDefault(); e.stopPropagation();
      resizing = { idx: i, startX: e.clientX, startW: card.w || el.offsetWidth };
    });
    el.appendChild(rh);
    board.appendChild(el);
  });

  requestAnimationFrame(() => {
    let maxBottom = 0;
    document.querySelectorAll('.card').forEach(el => {
      const b = (parseFloat(el.style.top) || 0) + el.offsetHeight;
      if (b > maxBottom) maxBottom = b;
    });
    board.style.minHeight = (maxBottom + 100) + 'px';
  });
}

document.addEventListener('mousemove', e => {
  if (moving) {
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`);
    if (!el) return;
    const nx = moving.origX + e.clientX - moving.startX;
    const ny = moving.origY + e.clientY - moving.startY;
    el.style.left = nx + 'px';
    el.style.top = ny + 'px';
  }
  if (resizing) {
    const card = cards[resizing.idx];
    card.w = Math.max(100, resizing.startW + e.clientX - resizing.startX);
    const el = document.querySelector(`.card[data-idx="${resizing.idx}"]`);
    if (el) el.style.width = card.w + 'px';
  }
});

document.addEventListener('mouseup', e => {
  if (moving) {
    const card = cards[moving.idx];
    card.x = Math.max(0, moving.origX + e.clientX - moving.startX);
    card.y = Math.max(0, moving.origY + e.clientY - moving.startY);
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`);
    if (el) { el.classList.remove('moving'); }
    moving = null; saveBoard();
  }
  if (resizing) { resizing = null; saveBoard(); }
});

function addTextCard() {
  cards.push({ type: 'text', content: '', x: 50, y: window.scrollY + 100, w: 300 });
  renderCards();
  setTimeout(() => { const els = document.querySelectorAll('.card .text'); els[els.length - 1]?.focus(); }, 100);
}

function addImageCard() {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = 'image/*';
  input.onchange = e => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = () => { cards.push({ type: 'image', src: reader.result, x: 50, y: window.scrollY + 100, w: 240 }); renderCards(); saveBoard(); };
    reader.readAsDataURL(file);
  };
  input.click();
}

function resetLayout() {
  if (!confirm('자동 재배치합니다. 현재 위치가 변경됩니다.')) return;
  cards.forEach(c => { delete c.x; delete c.y; });
  renderCards(); autoLayout();
}

setInterval(saveBoard, 30000);
loadBoard();
</script>
</body>
</html>
