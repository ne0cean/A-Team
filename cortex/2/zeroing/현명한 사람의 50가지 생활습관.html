<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>현명한 사람의 50가지 생활습관</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #1e1e1e;
  color: #e0e0e0;
  font-family: 'Segoe UI', -apple-system, sans-serif;
  font-size: 15px;
  line-height: 1.6;
  padding: 20px 30px 60px;
  overflow-x: hidden;
}
a { color: #6cb0f6; text-decoration: none; }
a:hover { text-decoration: underline; }
.title-bar {
  background: #3a3a5c;
  display: inline-block;
  padding: 6px 16px;
  font-size: 22px;
  font-weight: bold;
  color: #fff;
  margin-bottom: 4px;
}
.date { color: #999; font-size: 13px; margin-bottom: 20px; }
.board { position: relative; }
.card {
  background: #2a2a2a;
  border: 1px solid #3a3a3a;
  border-radius: 8px;
  padding: 12px;
  position: absolute;
  cursor: grab;
  transition: box-shadow 0.15s;
  overflow: hidden;
}
.card:hover { box-shadow: 0 0 0 1px #58a6ff; z-index: 10; }
.card.moving { opacity: 0.8; box-shadow: 0 4px 24px rgba(0,0,0,0.6); z-index: 100; cursor: grabbing; }
.card img { width: 100%; border-radius: 4px; display: block; }
.card .caption { font-size: 12px; color: #888; margin-top: 6px; }
.card .text { outline: none; min-height: 20px; white-space: pre-wrap; word-break: break-word; }
.card .text:focus { background: rgba(255,255,255,0.05); border-radius: 4px; padding: 4px; }
.card .text:empty::before { content: '텍스트 입력...'; color: #555; }
.card table { border-collapse: collapse; width: 100%; font-size: 13px; }
.card table td, .card table th { border: 1px solid #444; padding: 4px 8px; vertical-align: top; }
.card table th { background: #333; color: #ccc; }
.card-actions { position: absolute; top: 4px; right: 4px; display: none; gap: 4px; }
.card:hover .card-actions { display: flex; }
.card-btn { background: #333; border: 1px solid #555; color: #ccc; border-radius: 4px; padding: 2px 6px; font-size: 11px; cursor: pointer; }
.card-btn:hover { background: #444; color: #fff; }
.resize-handle { position: absolute; bottom: 0; right: 0; width: 16px; height: 16px; cursor: se-resize; opacity: 0; }
.card:hover .resize-handle { opacity: 0.6; }
.resize-handle::after { content: ''; position: absolute; bottom: 3px; right: 3px; width: 8px; height: 8px; border-right: 2px solid #666; border-bottom: 2px solid #666; }
.toolbar { position: fixed; bottom: 0; left: 0; right: 0; background: #161b22; border-top: 1px solid #30363d; padding: 8px 20px; display: flex; gap: 12px; align-items: center; z-index: 200; }
.toolbar button { background: #21262d; border: 1px solid #30363d; color: #e0e0e0; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; }
.toolbar button:hover { background: #30363d; }
.toolbar .status { color: #8b949e; font-size: 12px; margin-left: auto; }
.highlight-red { color: #ff6b6b; }
.highlight-blue { color: #6cb0f6; }
</style>
</head>
<body>
<div class="title-bar">현명한 사람의 50가지 생활습관</div>
<div class="date">2016년 1월 24일 일요일</div>
<div class="board" id="board"></div>
<div class="toolbar">
  <button onclick="addTextCard()">+ 텍스트</button>
  <button onclick="addImageCard()">+ 이미지</button>
  <button onclick="saveBoard()">💾 저장</button>
  <button onclick="resetLayout()">↺ 재배치</button>
  <span class="status" id="status">Ready</span>
</div>
<script>
const SAVE_KEY = 'board-현명한-사람의-50가지-생활습관';
const IMG_BASE = '../../attachments/';
const DEFAULT_CARDS = [
  {
    "type": "text",
    "content": "현명한 사람의 50가지 생활습관<br>\t\t<br>\t\t<br>\t<br>\t<br>\t\t<br>\t\t\t<br>1. 먼저, 내 쪽에서 인사하자.<br>\t\t\t<br>2. 사소한 대응에서도 \"훌륭하다\" \"감사하다\"라고 말하자.<br>\t\t\t<br>3. 인사를 하지 않아도 되는 사람에게도 인사를 해 보자.<br>\t\t\t<br>4. 엘리베이터가 있는 곳에서도 계단으로 올라가자.<br>\t\t\t<br>5. 하루에 한 번 \"잘됐어\"하고 말하자.<br>\t\t\t<br>6. 기도할 때는 소중한 사람을 위한 기도도 잊지 말자.<br>\t\t\t<br>7. 존경하는 사람의 사고방식을 흉내내보자.<br>\t\t\t<br>8. 무언가를 사지 않더라도 \"고맙습니다\" \"수고하세요\"라고 말하고 가게를 나오자.<br>\t\t\t<br>9. 중요한 것을 찾지 못할 때는 쓸데없는 것을 버려 보자.<br>\t\t\t<br>10. 남과 이야기하지 않고 두 시간은 집중할 수 있도록 하자. <br>\t\t\t<br><br>\t\t\t<br>11. 막다른 상황에서 \"그래도 OK\"라고 말하자.<br>\t\t\t<br>12. 뭔가를 하기도 전에 방어선을 준비하지 말자.<br>\t\t\t<br>13. 긴장되는 일일수록 여유를 갖고 하자.<br>\t\t\t<br>14. \"...만 있으면\"이라는 말을 하지 말자.<br>\t\t\t<br>15. 반대할 것을 기대하고 상담하지 말자.<br>\t\t\t<br>16. 거절당하면 열의를 시험한다고 생각하자.<br>\t\t\t<br>17. 약속시간보다 좀 일찌감치 가자.<br>\t\t\t<br>18. \"아무거나 좋다\" 하지말고 스스로 선택하자.<br>\t\t\t<br>20. 항상 약국 카운터에 있다는 생각으로 말하자. <br>\t\t\t<br><br>\t\t\t<br>21. 싫어하는 사람을 자신의 거울로 삼자.<br>\t\t\t<br>22. 단체에 가입할 때 특전을 생각하지 말자.<br>\t\t\t<br>23. 이해득실보다는 납득하고 선택하자.<br>\t\t\t<br>24. 인사를 제대로 하지 못했던 사람에게 인사하자.<br>\t\t\t<br>25. 사과하는 상대의 이야기를 끝까지 들어주자.<br>\t\t\t<br>26. 선천적인 이유를 핑계로 삼지 말자.<br>\t\t\t<br>27. 한 시간 후에 만날 사람이라도 미리 연락을 해두자.<br>\t\t\t<br>28. 없을 줄 알아도 연락을 자주 하자.<br>\t\t\t<br>29. 될 때까지 해 보자.<br>\t\t\t<br>30. 전화를 끊을 때 조심스럽게 수화기를 놓자. <br>\t\t\t<br><br>\t\t\t<br>31. 이성이 하는 일을 해 보자.<br>\t\t\t<br>32. 꽃과 나무, 동물의 이름을 자주 불러주자.<br>\t\t\t<br>33. 남에게 짜증내지 말자.<br>\t\t\t<br>34. 언짢은 일이 있을 때일수록 좋은 일을 하고 한 번 더 웃자.<br>\t\t\t<br>35. 한 달에 한 번 \"이 번달 나의 실수\"를 스스로 표창하자.<br>\t\t\t<br>36. 겸손한 사람에게 그 이상으로 겸손하게 대하자.<br>\t\t\t<br>37. 모든 일에 시작은 물론이고 뒷정리에도 마음을 쓰자.<br>\t\t\t<br>38. 사람을 만나기 전에 우선 느끼자.<br>\t\t\t<br>39. 어디까지 갈 수 있을지, 출발 전에 생각하지 말자.<br>\t\t\t<br>40. 하나라도 좋으니 간단한 일을 계속해 보자. <br>\t\t\t<br><br>\t\t\t<br>41. 항상 거꾸로 해보자.<br>\t\t\t<br>42. 책은 친구, 연인처럼 늘 가까이 하자.<br>\t\t\t<br>43. 혼자 있는 나만의 시간을 2시간 정도 만들자.<br>\t\t\t<br>44. 사소한 일이라도 성심성의껏 대하자.<br>\t\t\t<br>45. 거짓 없이 진실한 마음으로 칭찬 하자.<br>\t\t\t<br>46. 다른 사람에 대한 험담이나 나쁜 소문이 돌았을 때 퍼뜨리지 않고 나에게서 멈추도록 하자.<br>\t\t\t<br>47. 화를 애써 참지 않고 도움을 청하자.<br>\t\t\t<br>48. 나에게 해를 입혔다고 해서 앙갚음을 하려하지 말자.<br>\t\t\t<br>49. 잘못되었을 때 남 탓을 하기보다 \"내 탓이야\"라고 말하자.<br>\t\t\t<br>50. 남을 용서하고 사랑하자. 나를 용서하고 사랑하자.<br>\t\t<br>\t\t<br>\t\t\t<br>1. 운이 좋은 사람들의 10가지 비밀<br>\t\t\t<br><a href=\"http://me2.do/F0bFtE8U\" target=\"_blank\">http://me2.do/F0bFtE8U</a><br>\t\t\t<br><br>\t\t\t<br>01. 묵묵히 열심히 일한다. <br>\t\t\t<br>이들은 자랑하거나 쉽게 만족하지 않는다. <br>\t\t\t<br>페이스북이나 트위터에 일상의 사진을 올리느라 시간을 많이 뺏기지도 않는다. <br>\t\t\t<br>운 좋은 사람은 그야말로 ‘일’하느라 바쁘게 보낸다. <br>\t\t\t<br>02. 긍정적인 사람을 주변에 둔다. <br>\t\t\t<br>이들은 부정적인 사람들을 주변에 두어 자신을 무너뜨리지 않는다. <br>\t\t\t<br>인생 그 자체로도 고달프고 힘들 때도 많다. <br>\t\t\t<br>부정적인 사람들로 자신을 기운 빠지게 만들지 않는다. <br>\t\t\t<br>03. 매일 긍정적인 생각을 한다. <br>\t\t\t<br>어떤 사람은 잠자리에서 일어나면서부터 걱정을 한다. <br>\t\t\t<br>하지만 운 좋은 사람은 긍정적인 말을 하고 능동적으로 행동한다. <br>\t\t\t<br>참고로 조깅, 명상, 기도 그리고 애완견과의 산책은 긍정적인 생각을 하는데 도움이 된다. <br>\t\t\t<br>04. 지나친 고민은 삼간다. <br>\t\t\t<br>인간은 혼자가 아니다. 온종일 고민을 하고 또 해도 문제는 해결되지 않을 때가 많다. <br>\t\t\t<br>운 좋은 사람은 이런 부분에 유전적으로 능한 걸까? <br>\t\t\t<br>행복하게 사는 대부분이 지나친 고민은 피하고 오히려 과감한 선택을 할 때가 많다. <br>\t\t\t<br>05. 뚜렷한 목표를 가지고 있다. <br>\t\t\t<br>운 좋은 사람은 명확한 목표를 가지고 있다. <br>\t\t\t<br>사업을 확장하고 자녀의 장래를 위한 교육과정을 준비하고 개인 성장을 위한 다양한 목표가 있다. <br>\t\t\t<br>운 좋은 사람은 목표가 정해지면 그 목표를 향해 최선을 다한다. <br>\t\t\t<br><br>\t\t\t<br>06. 모든 것이 완벽할 수 없음을 인정한다. <br>\t\t\t<br>운 좋은 사람은 “지금은 적절한 시기가 아니야.” 라고 핑계 대지 않는다. <br>\t\t\t<br>대신 \"지금이야말로 가장 좋은 때야.\"라고 말한다. <br>\t\t\t<br>왜냐하면 ‘좋은 때’가 따로 있지 않다는 것을 알고 있기 때문이다. <br>\t\t\t<br>즉, 운 좋은 사람은 ‘좋은 때’를 스스로 만들어낸다. <br>\t\t\t<br>07. 남의 험담을 하거나 비난에 신경 쓰지 않는다. <br>\t\t\t<br>운 좋은 사람은 일단 부정적인 생각을 담지 않는다. <br>\t\t\t<br>대부분 비난을 받을 때도 변론하기보다는 무덤덤하게 받아넘기며 본인의 가던 길로 전진한다. <br>\t\t\t<br>08. 이성보다 마음이 원하는 쪽을 따를 때도 있다. <br>\t\t\t<br>사람이 어려움에 부닥치면 이성과 감정 사이에서 많은 고민을 한다. <br>\t\t\t<br>이때 운 좋은 사람은 머리보다는 마음이 이끄는 대로 따른다. <br>\t\t\t<br>09. 계획이 아니라 목표에 집중한다. 계획은 바뀔 수 있다. <br>\t\t\t<br>완벽하게 계획을 짜더라도 여러 가지 변동사항은 늘 생기게 마련이다. <br>\t\t\t<br>하지만 목표는 그렇지 않다. 행복한 결혼 생활, <br>\t\t\t<br>의미 있는 봉사활동, 성공적인 직장생활 같은 목표는 변하지 않는다. <br>\t\t\t<br>단, 목표를 성취하기 위해서는 여러 가지 변수가 있음을 인정하라. <br>\t\t\t<br>10. 행동에 옮긴다. <br>\t\t\t<br>운 좋은 사람은 비록 실패한다 해도 행동으로 옮기는 성향이 있다. <br>\t\t\t<br>즉, 가만히 앉아있기보다는 실행에 옮기며 확실하게 결론을 짓는다.<br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br>4. 더 빠르게 성공하는 8가지 방법<br>\t\t\t<br><a href=\"http://me2.do/5CUWHwMP\" target=\"_blank\">http://me2.do/5CUWHwMP</a><br>\t\t\t<br><br>\t\t\t<br>1. 불편한 상태로 있어라.<br>\t\t\t<br>당신이 가장 많이 배울 수 있을 때는 <br>\t\t\t<br>당신이 무언가를 탐구하고 '불편한 상태'로 있을 때이다. <br>\t\t\t<br>한계에 부딪힐 때 노력이 가장 많이 필요하며 <br>\t\t\t<br>그때 뇌가 가장 많이 성장하게 된다.<br>\t\t\t<br><br>\t\t\t<br>아주 아주 높은 질의 10분 혹은 단 몇 초라도 <br>\t\t\t<br>불편한 상태로 지식을 알고자 노력하는 시간이 <br>\t\t\t<br>더욱 효율적이다. <br>\t\t\t<br><br>\t\t\t<br>당신이 어느 분야에 있어 능통하고 싶다면 <br>\t\t\t<br>끊임없이 실패하고 실수하고 그 잘못을 <br>\t\t\t<br>깨달아가며 불편한 상태를 거듭해가라.<br>\t\t\t<br><br>\t\t\t<br>시간의 3분의 1만 공부에 투자하고 <br>\t\t\t<br>3분의 2는 직접 '행동'하는 기간을 가져라.<br>\t\t\t<br><br>\t\t\t<br>2. 독서를 멈추고 행동하길 시작하라.<br>\t\t\t<br>'3분의 2법칙'을 명심하라. <br>\t\t\t<br>공부하는데 오직 3분의 1의 시간을 투자해라. <br>\t\t\t<br>다른 3분의 2는 당신이 직접 ‘행동’하는 시간에 투자하라. <br>\t\t\t<br>계속 연습하고 스스로를 시험해라.<br>\t\t\t<br><br>\t\t\t<br>책에서 코를 떼고 교실에서 떠나라. <br>\t\t\t<br>당신이 실전에서 부딪혀야만 더 빨리 배울 수 있다. <br>\t\t\t<br>우리의 뇌는 행동을 하면서 진화된 것이지 <br>\t\t\t<br>들으면서 습득한 것으로 진화하지 않았다.<br>\t\t\t<br><br>\t\t\t<br>만약 당신이 중요한 한 구절을 외우고 싶다면 <br>\t\t\t<br>오직 30%만 그것을 읽는데 투자하고 <br>\t\t\t<br>나머지 70%는 스스로 시험을 보는데 투자하라.<br>\t\t\t<br><br>\t\t\t<br>3. 적절한 목표치를 정하라.<br>\t\t\t<br>어려운 것을 배울 때면 <br>\t\t\t<br>우리는 그만둘 때가 있다. <br>\t\t\t<br>그리고 너무 쉬운 것을 배울 때에도 <br>\t\t\t<br>마찬가지로 그만둔다. <br>\t\t\t<br>매번 자신의 능력보다 살짝 위에 있는 <br>\t\t\t<br>목표치(Sweet Spot)을 설정하고 <br>\t\t\t<br>이에 매진해야 한다. <br>\t\t\t<br><br>\t\t\t<br>자신이 목표로 하는 스위트 스팟이 <br>\t\t\t<br>현재의 능력 대비 일정한 수준의 상향목표라면 <br>\t\t\t<br>폭발적으로 기술이 상승하는 순간을 <br>\t\t\t<br>맞이하게 될 것이다.<br>\t\t\t<br><br>\t\t\t<br>같은 양의 일을 하더라도 <br>\t\t\t<br>한번에 그치는 일과 꾸준히 하는 일의 성과는 <br>\t\t\t<br>확연히 다르다. <br>\t\t\t<br><br>\t\t\t<br>4. 장기전에 투자하라.<br>\t\t\t<br>당신의 연습과 실력이 동반된 끈기는 <br>\t\t\t<br>그대를 성공으로 이끌게 한다. <br>\t\t\t<br>끈기, 꾸준함은 다른 사람과 <br>\t\t\t< let cards = [];
let moving = null, resizing = null;

function loadBoard() {
  const saved = localStorage.getItem(SAVE_KEY);
  cards = saved ? JSON.parse(saved) : DEFAULT_CARDS.map(c => ({...c}));
  renderCards();
  if (!saved) autoLayout();
}

function autoLayout() {
  const GAP = 14;
  const boardW = document.getElementById('board').offsetWidth;
  const cols = Math.max(1, Math.floor(boardW / 280));
  const colW = (boardW - GAP * (cols - 1)) / cols;
  const colHeights = new Array(cols).fill(0);
  const allCards = document.querySelectorAll('.card');
  const images = document.querySelectorAll('.card img');
  let loaded = 0;
  const total = images.length;

  function place() {
    allCards.forEach((el, i) => {
      const card = cards[i];
      const w = Math.min(card.w || colW, colW);
      let minCol = 0;
      for (let c = 1; c < cols; c++) if (colHeights[c] < colHeights[minCol]) minCol = c;
      card.x = minCol * (colW + GAP);
      card.y = colHeights[minCol];
      card.w = w;
      el.style.left = card.x + 'px';
      el.style.top = card.y + 'px';
      el.style.width = w + 'px';
      colHeights[minCol] = card.y + el.offsetHeight + GAP;
    });
    document.getElementById('board').style.minHeight = Math.max(...colHeights) + 100 + 'px';
    saveBoard();
  }

  if (total === 0) requestAnimationFrame(place);
  else images.forEach(img => {
    if (img.complete) { loaded++; if (loaded >= total) requestAnimationFrame(place); }
    else img.onload = img.onerror = () => { loaded++; if (loaded >= total) requestAnimationFrame(place); };
  });
}

function syncText() {
  document.querySelectorAll('.card').forEach(el => {
    const idx = +el.dataset.idx;
    if (cards[idx]?.type === 'text') {
      const t = el.querySelector('.text');
      if (t) cards[idx].content = t.innerHTML;
    }
  });
}

function saveBoard() {
  syncText();
  localStorage.setItem(SAVE_KEY, JSON.stringify(cards));
  document.getElementById('status').textContent = '저장됨 ' + new Date().toLocaleTimeString();
}

function renderCards() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  cards.forEach((card, i) => {
    const el = document.createElement('div');
    el.className = 'card';
    el.dataset.idx = i;
    if (card.x !== undefined) el.style.left = card.x + 'px';
    if (card.y !== undefined) el.style.top = card.y + 'px';
    if (card.w) el.style.width = card.w + 'px';

    el.addEventListener('mousedown', e => {
      if (e.target.closest('.text, a, .card-btn, .resize-handle, table')) return;
      e.preventDefault();
      moving = { idx: i, startX: e.clientX, startY: e.clientY, origX: card.x || 0, origY: card.y || 0 };
      el.classList.add('moving');
    });

    const actions = document.createElement('div');
    actions.className = 'card-actions';
    const delBtn = document.createElement('button');
    delBtn.className = 'card-btn'; delBtn.textContent = '×';
    delBtn.onclick = e => { e.stopPropagation(); if (confirm('삭제?')) { cards.splice(i, 1); renderCards(); saveBoard(); } };
    actions.appendChild(delBtn);
    el.appendChild(actions);

    if (card.type === 'text') {
      const text = document.createElement('div');
      text.className = 'text';
      text.contentEditable = true;
      text.innerHTML = card.content || '';
      text.addEventListener('blur', () => { card.content = text.innerHTML; saveBoard(); });
      el.appendChild(text);
    } else if (card.type === 'image') {
      const src = card.src.startsWith('http') || card.src.startsWith('data:') ? card.src : IMG_BASE + card.src;
      const img = document.createElement('img');
      img.src = src;
      img.alt = card.alt || '';
      img.loading = 'lazy';
      img.onerror = () => img.style.display = 'none';
      if (card.link) {
        const a = document.createElement('a'); a.href = card.link; a.target = '_blank';
        a.appendChild(img); el.appendChild(a);
      } else { el.appendChild(img); }
      if (card.caption) {
        const cap = document.createElement('div');
        cap.className = 'caption';
        cap.textContent = card.caption;
        el.appendChild(cap);
      }
    } else if (card.type === 'table') {
      const wrapper = document.createElement('div');
      wrapper.style.overflowX = 'auto';
      wrapper.innerHTML = card.html || '';
      el.appendChild(wrapper);
    }

    const rh = document.createElement('div');
    rh.className = 'resize-handle';
    rh.addEventListener('mousedown', e => {
      e.preventDefault(); e.stopPropagation();
      resizing = { idx: i, startX: e.clientX, startW: card.w || el.offsetWidth };
    });
    el.appendChild(rh);
    board.appendChild(el);
  });

  requestAnimationFrame(() => {
    let maxBottom = 0;
    document.querySelectorAll('.card').forEach(el => {
      const b = (parseFloat(el.style.top) || 0) + el.offsetHeight;
      if (b > maxBottom) maxBottom = b;
    });
    board.style.minHeight = (maxBottom + 100) + 'px';
  });
}

document.addEventListener('mousemove', e => {
  if (moving) {
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`);
    if (!el) return;
    const nx = moving.origX + e.clientX - moving.startX;
    const ny = moving.origY + e.clientY - moving.startY;
    el.style.left = nx + 'px';
    el.style.top = ny + 'px';
  }
  if (resizing) {
    const card = cards[resizing.idx];
    card.w = Math.max(100, resizing.startW + e.clientX - resizing.startX);
    const el = document.querySelector(`.card[data-idx="${resizing.idx}"]`);
    if (el) el.style.width = card.w + 'px';
  }
});

document.addEventListener('mouseup', e => {
  if (moving) {
    const card = cards[moving.idx];
    card.x = Math.max(0, moving.origX + e.clientX - moving.startX);
    card.y = Math.max(0, moving.origY + e.clientY - moving.startY);
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`);
    if (el) { el.classList.remove('moving'); }
    moving = null; saveBoard();
  }
  if (resizing) { resizing = null; saveBoard(); }
});

function addTextCard() {
  cards.push({ type: 'text', content: '', x: 50, y: window.scrollY + 100, w: 300 });
  renderCards();
  setTimeout(() => { const els = document.querySelectorAll('.card .text'); els[els.length - 1]?.focus(); }, 100);
}

function addImageCard() {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = 'image/*';
  input.onchange = e => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = () => { cards.push({ type: 'image', src: reader.result, x: 50, y: window.scrollY + 100, w: 240 }); renderCards(); saveBoard(); };
    reader.readAsDataURL(file);
  };
  input.click();
}

function resetLayout() {
  if (!confirm('자동 재배치합니다. 현재 위치가 변경됩니다.')) return;
  cards.forEach(c => { delete c.x; delete c.y; });
  renderCards(); autoLayout();
}

setInterval(saveBoard, 30000);
loadBoard();
</script>
</body>
</html>
