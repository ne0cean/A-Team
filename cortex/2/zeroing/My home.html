<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My home</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #1e1e1e;
  color: #e0e0e0;
  font-family: 'Segoe UI', -apple-system, sans-serif;
  font-size: 15px;
  line-height: 1.7;
  padding: 0 0 80px;
}
a { color: #6cb0f6; text-decoration: none; }
a:hover { text-decoration: underline; }
.toolbar {
  position: sticky; top: 0; z-index: 100;
  background: #161b22; border-bottom: 1px solid #30363d;
  padding: 8px 24px; display: flex; gap: 10px; align-items: center;
}
.toolbar .t-title { font-size: 16px; font-weight: bold; color: #fff; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.toolbar .t-date { color: #8b949e; font-size: 12px; white-space: nowrap; }
.toolbar button { background: #21262d; border: 1px solid #30363d; color: #ccc; padding: 4px 12px; border-radius: 5px; cursor: pointer; font-size: 12px; white-space: nowrap; }
.toolbar button:hover { background: #30363d; color: #fff; }
.toolbar .t-status { color: #8b949e; font-size: 11px; white-space: nowrap; }
.doc { max-width: 760px; margin: 0 auto; padding: 28px 24px; }
.block { margin-bottom: 10px; }
.block-text {
  outline: none;
  padding: 5px 8px;
  border-radius: 4px;
  white-space: pre-wrap;
  word-break: break-word;
  min-height: 1.5em;
}
.block-text:focus { background: rgba(255,255,255,0.04); }
.block-text:empty::before { content: '텍스트 입력...'; color: #555; pointer-events: none; }
.block-image img { max-width: 100%; border-radius: 6px; display: block; }
.block-image .caption { font-size: 12px; color: #888; margin-top: 4px; }
.block-table .table-wrap { overflow-x: auto; }
.block-table table { border-collapse: collapse; font-size: 13px; }
.block-table td, .block-table th { border: 1px solid #444; padding: 5px 10px; vertical-align: top; }
.block-table th { background: #2a2a3a; color: #ccc; }
</style>
</head>
<body>
<div class="toolbar">
  <span class="t-title">My home</span>
  <span class="t-date">2011년 1월 11일 화요일</span>
  <button onclick="save()">저장</button>
  <button id="copyBtn" onclick="copyPath()">⎘ 주소 복사</button>
  <span class="t-status" id="status"></span>
</div>
<div class="doc" id="doc">
<div class="block block-text" data-idx="0" contenteditable="true">My home<br>		<br>		<br>	<br>	<br>		<br>			<br>여섯개의 테마 방 - 거실, 운동, 칠판으로 가득한 낙서방, 서재/ IT실 컴퓨터, 음악과 영화<br>			<br><a href="http://insight.co.kr/view.php?ArtNo=5902" target="_blank">http://insight.co.kr/view.php?ArtNo=5902</a></div>

<div class="block block-image" data-idx="2"><img src="../../attachments//5c0172528d.png" alt="My home" loading="lazy" onerror="this.style.display='none'"></div>

<div class="block block-image" data-idx="6"><img src="../../attachments//aff5aeafb9.png" alt="My home" loading="lazy" onerror="this.style.display='none'"></div>
<div class="block block-image" data-idx="7"><img src="../../attachments//5db65c856e.png" alt="My home" loading="lazy" onerror="this.style.display='none'"></div>
<div class="block block-image" data-idx="8"><img src="../../attachments//aaa7b10daf.png" alt="My home" loading="lazy" onerror="this.style.display='none'"></div>
<div class="block block-image" data-idx="9"><img src="../../attachments//045411e088.png" alt="My home" loading="lazy" onerror="this.style.display='none'"></div>
<div class="block block-image" data-idx="10"><img src="../../attachments//2a976d87e3.png" alt="My home" loading="lazy" onerror="this.style.display='none'"></div>

<div class="block block-text" data-idx="12" contenteditable="true">그랜드 피아노 들여놓을 수 있는 집 사기.</div>
</div>
<script>
const SAVE_KEY = 'note-My-home';

function save() {
  const data = {};
  document.querySelectorAll('.block-text').forEach(el => {
    data[el.dataset.idx] = el.innerHTML;
  });
  localStorage.setItem(SAVE_KEY, JSON.stringify(data));
  const s = document.getElementById('status');
  s.textContent = '저장됨 ' + new Date().toLocaleTimeString();
  setTimeout(() => { s.textContent = ''; }, 2000);
}

function copyPath() {
  navigator.clipboard.writeText(location.pathname).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.textContent = '✓ 복사됨';
    setTimeout(() => { btn.textContent = '⎘ 주소 복사'; }, 1500);
  });
}

// Restore saved edits
const saved = localStorage.getItem(SAVE_KEY);
if (saved) {
  try {
    const data = JSON.parse(saved);
    document.querySelectorAll('.block-text').forEach(el => {
      if (data[el.dataset.idx] !== undefined) el.innerHTML = data[el.dataset.idx];
    });
  } catch(e) {}
}

document.querySelectorAll('.block-text').forEach(el => {
  el.addEventListener('blur', save);
});

setInterval(save, 30000);
</script>
</body>
</html>
