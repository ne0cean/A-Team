<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HFK</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #1e1e1e;
  color: #e0e0e0;
  font-family: 'Segoe UI', -apple-system, sans-serif;
  font-size: 15px;
  line-height: 1.6;
  padding: 20px 30px 60px;
  overflow-x: hidden;
}
a { color: #6cb0f6; text-decoration: none; }
a:hover { text-decoration: underline; }
.title-bar {
  background: #3a3a5c;
  display: inline-block;
  padding: 6px 16px;
  font-size: 22px;
  font-weight: bold;
  color: #fff;
  margin-bottom: 4px;
}
.date { color: #999; font-size: 13px; margin-bottom: 20px; }
.board { position: relative; }
.card {
  background: #2a2a2a;
  border: 1px solid #3a3a3a;
  border-radius: 8px;
  padding: 12px;
  position: absolute;
  cursor: grab;
  transition: box-shadow 0.15s;
  overflow: hidden;
}
.card:hover { box-shadow: 0 0 0 1px #58a6ff; z-index: 10; }
.card.moving { opacity: 0.8; box-shadow: 0 4px 24px rgba(0,0,0,0.6); z-index: 100; cursor: grabbing; }
.card img { width: 100%; border-radius: 4px; display: block; }
.card .caption { font-size: 12px; color: #888; margin-top: 6px; }
.card .text { outline: none; min-height: 20px; white-space: pre-wrap; word-break: break-word; }
.card .text:focus { background: rgba(255,255,255,0.05); border-radius: 4px; padding: 4px; }
.card .text:empty::before { content: '텍스트 입력...'; color: #555; }
.card table { border-collapse: collapse; width: 100%; font-size: 13px; }
.card table td, .card table th { border: 1px solid #444; padding: 4px 8px; vertical-align: top; }
.card table th { background: #333; color: #ccc; }
.card-actions { position: absolute; top: 4px; right: 4px; display: none; gap: 4px; }
.card:hover .card-actions { display: flex; }
.card-btn { background: #333; border: 1px solid #555; color: #ccc; border-radius: 4px; padding: 2px 6px; font-size: 11px; cursor: pointer; }
.card-btn:hover { background: #444; color: #fff; }
.resize-handle { position: absolute; bottom: 0; right: 0; width: 16px; height: 16px; cursor: se-resize; opacity: 0; }
.card:hover .resize-handle { opacity: 0.6; }
.resize-handle::after { content: ''; position: absolute; bottom: 3px; right: 3px; width: 8px; height: 8px; border-right: 2px solid #666; border-bottom: 2px solid #666; }
.toolbar { position: fixed; bottom: 0; left: 0; right: 0; background: #161b22; border-top: 1px solid #30363d; padding: 8px 20px; display: flex; gap: 12px; align-items: center; z-index: 200; }
.toolbar button { background: #21262d; border: 1px solid #30363d; color: #e0e0e0; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; }
.toolbar button:hover { background: #30363d; }
.toolbar .status { color: #8b949e; font-size: 12px; margin-left: auto; }
.highlight-red { color: #ff6b6b; }
.highlight-blue { color: #6cb0f6; }
</style>
</head>
<body>
<div class="title-bar">HFK</div>

  <button onclick="saveBoard()">💾 저장</button>
  <button onclick="resetLayout()">↺ 재배치</button>
  <span class="status" id="status">Ready</span>
</div>

const DEFAULT_CARDS = [
  {
    "type": "text",
    "content": "HFK<br>\t\t<br>\t\t<br>\t<br>\t<br>\t\t<br>\t\t\t<br>\t\t\t\t<br>준영님,<br>\t\t\t\t<br>파트너 포인트 현황은 아래 링크에서 확인하실 수 있으며<br>\t\t\t\t<br>사용을 원하시면 메일 또는 재윤님에게 연락 부탁드려요.<br>\t\t\t\t<br>- 포인트 현황&#160;<a href=\"https://docs.google.com/spreadsheets/d/1BRajnA1BzCRCFykrttw3yYi_VYL_2LojyCRmeAN4-Vs/edit?usp=sharing\" target=\"_blank\">바로가기</a><br>\t\t\t\t<br>[포인터 사용처]<br>\t\t\t\t<br>1. HFK: 멤버십 결제<br>\t\t\t\t<br>&#160; &#160;* 시즌 안내:&#160;<a href=\"http://thehfk.org/newseason\" target=\"_blank\">thehfk.org/newseason</a><br>\t\t\t\t<br>2. 마이시크릿덴: 낮 공간 이용료, 밤 식음 주문 결제<br>\t\t\t\t<br>&#160; &#160;* 마시덴&#160;안내:&#160;<a href=\"http://bit.ly/mysecretden\" target=\"_blank\">bit.ly/mysecretden</a><br>\t\t\t\t<br>3. 소정동: 공간 이용료 결제<br>\t\t\t\t<br>&#160; &#160;* 소정동&#160;안내:&#160;<a href=\"http://bit.ly/sojungdong\" target=\"_blank\">bit.ly/sojungdong</a><br>\t\t\t\t<br><br>\t\t\t\t<br><br>\t\t\t\t<br>참여 신청 방법<br>\t\t\t\t<br>- 여러분의 참여를 알려주세요. 매주 일요일 밤, 새로 시작할 한 주를 미리 계획하고 준비하실 수 있습니다.<br>\t\t\t\t<br>- 매주&#160;일요일 저녁 9시: 차주 세션 신청 (대상:&#160;테마 멤버십, F 멤버십-지정)<br>\t\t\t\t<br>- 매주&#160;월요일 오후 1시: 세션 추가 신청 (대상:&#160;F 멤버십-오픈)<br>\t\t\t\t<br>- 홈페이지&#160;<a href=\"http://hbrforum.org/\" target=\"_blank\">hbrforum.org</a>&#160;캘린더&#160;확인 후&#160;예약(Booking)&#160;제출<br>\t\t\t\t<br>- 준비사항: 사전과제/준비물 확인 후 당일에 신청한 세션 참여<br>\t\t\t\t<br>- 취소방법: 예약(Booking) 받은&#160;확정메일에서 취소 가능<br>\t\t\t\t<br><br>\t\t\t\t<br>공지 채널 안내<br>\t\t\t\t<br>- 세션/이벤트: 홈페이지&#160;<a href=\"http://hbrforum.org/\" target=\"_blank\">hbrforum.org</a>&#160;캘린더&#160;참고<br>\t\t\t\t<br>- 빠른 공지/문의사항:&#160;카카오플러스&#160;<a href=\"http://pf.kakao.com/_mxfFaC\" target=\"_blank\">http://pf.kakao.com/_mxfFaC</a>&#160;<br>\t\t\t\t<br>- 사진/자료: 페이스북 미공개 그룹&#160;<a href=\"https://www.facebook.com/groups/hbrforumkorea/\" target=\"_blank\">https://www.facebook.com/groups/hbrforumkorea/</a><br>\t\t\t\t<br>- 교류:&#160;테마별 단톡방&#160;개설 예정<br>\t\t\t\t<br>HFK 여름시즌 멤버 명단 (첨부)<br>\t\t\t\t<br>- 여러분과 함께할 멤버들을 소개합니다. 소모임(HBR클럽, HBR잉글리쉬클럽, 협상클럽, 매거진B클럽, 필드트립, 리더들의 아침) 첫 세션은 서로를 알아가는 시간으로 시작합니다.&#160;<br>\t\t\t\t<br>- 시즌 시작 전까지 신청 가능하니, 혹시 함께하고 싶은 분들이 계시면 추천 부탁드려요. :-)&#160;<br>\t\t\t\t<br><br>\t\t\t\t<br>▶&#160;홈페이지:&#160;<a href=\"http://hbrforum.org/\" target=\"_blank\">hbrforum.org</a>&#160;<br>\t\t\t\t<br>▶&#160;페이스북:&#160;<a href=\"http://facebook.com/hbrforumkorea\" target=\"_blank\">facebook.com/hbrforumkorea</a>&#160;<br>\t\t\t\t<br>▶&#160;네이버카페:&#160;<a href=\"http://cafe.naver.com/hbrforumkorea\" target=\"_blank\">cafe.naver.com/hbrforumkorea</a>&#160;<br>\t\t\t\t<br>▶&#160;인스타그램:&#160;<a href=\"http://instagram.com/hbr_forum\" target=\"_blank\">instagram.com/hbr_forum</a>&#160;<br>\t\t\t<br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t<br>\t\t<br>\t\t\t<br><br>\t\t\t<br>\t\t\t\t<br>\t\t\t\t\t\t\t\t\t\t<br>\t\t\t\t\t\t<br>\t\t\t\t\t\t\t오픈클래스가 새로워졌습니다!<br>\t\t\t\t\t\t<br>\t\t\t\t\t<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>\t\t\t\t<br>\t\t\t\t<br>\t\t\t\t\t\t\t\t\t\t<br>\t\t\t\t\t\t<br>9월 일정/주제 안내<br>\t\t\t\t\t\t<br>2017년 9월&#160;HBR 오픈클래스에서 다룰 주제를 소개합니다.<br>\t\t\t\t\t\t<br>&#160;9월 11일(월) / 여의도<br>\t\t\t\t\t\t<br>– 주제:&#160;<a href=\"http://hbrforum.us9.list-manage.com/track/click?u=adf2f5cd5fcda09a388bef4e4&id=d95162bbd5&e=737a65d59b\" target=\"_blank\">경영은</a> 과학 그 이상이다<br>\t\t\t\t\t\t<br>– 발표: 김태환, 닐슨코리아 데이터분석<br>\t\t\t\t\t\t<br>– 진행: 민선홍, 한화투자증권 PE<br>\t\t\t\t\t\t<br>– 시간: 19:30-21:30<br>\t\t\t\t\t\t<br>– 장소: 샛강역 디오피스 비즈니스 센터 4층 (<a href=\"http://hbrforum.us9.list-manage.com/track/click?u=adf2f5cd5fcda09a388bef4e4&id=70b9f2e47f&e=737a65d59b\" target=\"_blank\">약도</a>)<br>\t\t\t\t\t\t<br>최근 빅데이터가 주목받으며 ‘경영은 과학이다’라는 믿음은 유행처럼 번지고 있습니다. 그러나 저자는 이러한 과학적 접근에 대한 맹신은 결국 전략적 선택지를 좁히고 혁신을 방해한다고 말합니다. 데이터와 과학은 이전에 존재하지 않았던 가능성을 예측하는 데에는 효과적이지 않기 때문이죠. 본 아티클을 통해 과학적 접근을 벗어나 미래를 위한 전략과 혁신을 어떻게 만들어나갈 수 있을지 함께 살펴볼 예정입니다.<br>\t\t\t\t\t\t<br><br>\t\t\t\t\t\t<br>&#160;9월 12일(화) / 시청<br>\t\t\t\t\t\t<br>– 주제:&#160;<a href=\"http://hbrforum.us9.list-manage.com/track/click?u=adf2f5cd5fcda09a388bef4e4&id=d477aa526a&e=737a65d59b\" target=\"_blank\">나는</a> GE를 어떻게 변화시켰나, 변혁의 과정에서 얻은 교훈<br>\t\t\t\t\t\t<br>– 발표: 김주형, 하겐다즈코리아 파이낸스<br>\t\t\t\t\t\t<br>– 진행: 김민경, 삼성카드 마케팅<br>\t\t\t\t\t\t<br>– 시간: 19:30-21:30<br>\t\t\t\t\t\t<br>– 장소: 시청역 오아시스 덕수궁 (<a href=\"http://hbrforum.us9.list-manage2.com/track/click?u=adf2f5cd5fcda09a388bef4e4&id=29d98a14bd&e=737a65d59b\" target=\"_blank\">약도</a>)<br>\t\t\t\t\t\t<br>CEO는 기업의 순환주기에 따라 다양한 임무를 맡습니다.&#160;직접 회사를 설립하고 성장시키는 데 전력을 다하는&#160;CEO도 있고,&#160;별다른 요인 없이 안정적인 경기 속에서 호사를 누리는&#160;CEO도 있습니다. 6000일 동안 30만 명의 임직원을 이끈 GE의 제프리 이멜트 회장의 경우는&#160;조금 달랐습니다.&#160;일대 변혁기를 맞이한 오랜 역사와 전통을 지닌 기업을 완전히 탈바꿈시키는 것이 그의 과제였고 결국 미래의 성장을 위한 최적의 위치에 GE를 올려두었습니다.&#160;성공적인 변혁을 이끈 그의 7가지 전략을 살펴볼 예정입니다.<br>\t\t\t\t\t\t<br>&#160;<br>\t\t\t\t\t\t<br>&#160;9월 19일(화) / 시청<br>\t\t\t\t\t\t<br>–&#160;주제:&#160;<a href=\"http://hbrforum.us9.list-manage.com/track/click?u=adf2f5cd5fcda09a388bef4e4&id=e8714a85c2&e=737a65d59b\" target=\"_blank\">사회적</a> 목적을 경쟁력으로…<br>\t\t\t\t\t\t<br>– 발표: 권오영, SK플래닛 광고기획<br>\t\t\t\t\t\t<br>– 진행: 노지우, 신라호텔 면세마케팅<br>\t\t\t\t\t\t<br>– 시간: 19:30-21:30<br>\t\t\t\t\t\t<br>– 장소: 시청역 오아시스 덕수궁 (<a href=\"http://hbrforum.us9.list-manage1.com/track/click?u=adf2f5cd5fcda09a388bef4e4&id=8e941a49db&e=737a65d59b\" target=\"_blank\">약도</a>)<br>\t\t\t\t\t\t<br>오늘날 소비자들은 기업에게 단순한 기능적 효익 제공을 넘어 브랜드가 사회적 목적을 갖기를 원합니다. 기업들은 이에 부응하고자 다양한 캠페인을 진행하지만, 모든 캠페인이 사회와 브랜드에 긍정적 효과를 낳지는 못했습니다. 본 아티클은 브랜드가 사회적 목적을 가짐으로써 브랜드 가치가 향상되고, 브랜드를 향한 부정적인 시각을 다소 완화시킬 수 있다고 주장합니다. 세션을 통해 브랜드가 사회적 목적을 성공적으로 달성할 수 있는 전략에 대해 생각해 볼 예정입니다.<br>\t\t\t\t\t\t<br><br>\t\t\t\t\t\t<br>&#160;9월 20일(수) / 강남<br>\t\t\t\t\t\t<br>–&#160;주제:&#160;<a href=\"http://hbrforum.us9.list-manage.com/track/click?u=adf2f5cd5fcda09a388bef4e4&id=9af12a9617&e=737a65d59b\" target=\"_blank\">나는</a> GE를 어떻게 변화시켰나, 변혁의 과정에서 얻은 교훈<br>\t\t\t\t\t\t<br>– 발표: 신지혜, 삼성SDS 재무관리<br>\t\t\t\t\t\t<br>– 진행: 고지훈, 파인우드캐피탈 PE<br>\t\t\t\t\t\t<br>– 시간: 19:30-21:30<br>\t\t\t\t\t\t<br>– 장소: 신논현역 패스트파이브&#160;(<a href=\"http://hbrforum.us9.list-manage.com/track/click?u=adf2f5cd5fcda09a388bef4e4&id=2dbc6821db&e=737a65d59b\" target=\"_blank\">약도</a>)<br>\t\t\t\t\t\t<br>CEO는 기업의 순환주기에 따라 다양한 임무를 맡습니다.&#160;직접 회사를 설립하고 성장시키는 데 전력을 다하는&#160;CEO도 있고,&#160;별다른 요인 없이 안정적인 경기 속에서 호사를 누리는&#160;CEO도 있습니다. 6000일 동안 30만 명의 임직원을 이끈 GE의 제프리 이멜트 회장의 경우는&#160;조금 달랐습니다.&#160;일대 변혁기를 맞이한 오랜 역사와 전통을 지닌 기업을 완전히 탈바꿈시키는 것이 그의 과제였고 결국 미래의 성장을 위한 최적의 위치에 GE를 올려두었습니다.&#160;성공적인 변혁을 이끈 그의 7가지 전략을 살펴볼 예정입니다.<br>\t\t\t\t\t\t<br><br>\t\t\t\t\t\t<br>&#160;9월 25일(월) / 시청<br>\t\t\t\t\t\t<br>– 주제:&#160;<a href=\"http://hbrforum.us9.list-manage2.com/track/click?u=adf2f5cd5fcda09a388bef4e4&id=3c882c962b&e=737a65d59b\" target=\"_blank\">온라인</a> 실험의 놀라운 힘<br>\t\t\t\t\t\t<br>– 발표: 김재윤, HBR포럼코리아 대표<br>\t\t\t\t\t\t<br>– 진행:&#160;이현미, 오리온 CSR<br>\t\t\t\t\t\t<br>– 시간: 19:30-21:30<br>\t\t\t\t\t\t<br>– 장소: 시청역 오아시스 덕수궁 (<a href=\"http://hbrforum.us9.list-manage.com/track/click?u=adf2f5cd5fcda09a388bef4e4&id=26ba5e6617&e=737a65d59b\" target=\"_blank\">약도</a>)<br>\t\t\t\t\t\t<br>많은 기업에서 웹사이트와 애플리케이션을 만들 때,&#160;하드데이터hard data가 아니라 주관적인 의견에 근거해 새로운 제품 기능부터 룩앤드필look and feel,&#160;마케팅 캠페인까지 모든 것에 대한 의사결정을 내리고 있습니다. 저자는 아이디어를 평가하려는 기업들은 온라인 대조실험을 실시하고 잠재적인 개선사항은 엄격한 테스트를 거쳐야 한다고 주장합니다. A/B테스트가 무엇인지 알아보고 이에 필요한 사항들에는 어떤 것들이 있는지 살펴볼 예정입니다.<br>\t\t\t\t\t\t<br><br>\t\t\t\t\t\t<br>&#160;9월 27일(수) / 삼성<br>\t\t\t\t\t\t<br>– 주제:&#160;9-10월합본 Idea Watch<br>\t\t\t\t\t\t<br>– 진행: 신일철, 삼성물산<br>\t\t\t\t\t\t<br>– 시간: 20:00-22:00<br>\t\t\t\t\t\t<br>– 장소: 봉은사역 대웅제약 별관 6층 (<a href=\"http://hbrforum.us9.list-manage.com/track/click?u=adf2f5cd5fcda09a388bef4e4&id=0797f57c18&e=737a65d59b\" target=\"_blank\">약도</a>)<br>\t\t\t\t\t\t<br>최신 연구결과를 담은 짧은 아티클을 살펴볼 예정입니다. 본 세션은 세션 중에 함께 아티클을 읽고 토론을 하는 방식으로 진행합니다.<br>\t\t\t\t\t\t<br>- <a href=\"http://hbrforum.us9.list-manage.com/track/click?u=adf2f5cd5fcda09a388bef4e4&id=f72f1fa8c8&e=737a65d59b\" target=\"_blank\">비즈니스</a> 리더가 SF를 더 많이 읽어야 하는 이유<br>\t\t\t\t\t\t<br>- <a href=\"http://hbrforum.us9.list-manage.com/track/click?u=adf2f5cd5fcda09a388bef4e4&id=fc3552a8d9&e=737a65d59b\" target=\"_blank\">진솔한</a> 스토리, 회사 가치 전파하는 최고의 수단<br>\t\t\t\t\t\t<br>- <a href=\"http://hbrforum.us9.list-manage.com/track/click?u=adf2f5cd5fcda09a388bef4e4&id=3c61fdfdc9&e=737a65d59b\" target=\"_blank\">영업의</a> 성패 가르는 6가지 요소<br>\t\t\t\t\t\t<br>- <a href=\"http://hbrforum.us9.list-manage2.com/track/click?u=adf2f5cd5fcda09a388bef4e4&id=17fa75bdb7&e=737a65d59b\" target=\"_blank\">사람의</a> 외모는 이름을 따라간다.<br>\t\t\t\t\t\t<br>- <a href=\"http://hbrforum.us9.list-manage1.com/track/click?u=adf2f5cd5fcda09a388bef4e4&id=35d8cbee13&e=737a65d59b\" target=\"_blank\">아이가</a> 아플 때..직장인 부모 어떻게 대처해야 하나<br>\t\t\t\t\t\t<br>- <a href=\"http://hbrforum.us9.list-manage.com/track/click?u=adf2f5cd5fcda09a388bef4e4&id=fe7b484275&e=737a65d59b\" target=\"_blank\">느리게</a> 가는 혁신의 이점<br>\t\t\t\t\t\t<br>- <a href=\"http://hbrforum.us9.list-manage2.com/track/click?u=adf2f5cd5fcda09a388bef4e4&id=d47ec8b73c&e=737a65d59b\" target=\"_blank\">면역력</a> 높이고 사망위험 낮추는 우정의 힘<br>\t\t\t\t\t\t<br><br>\t\t\t\t\t\t<br>참여방법<br>\t\t\t\t\t\t<br>1.&#160;사전준비: 참여 전 아티클을 미리 읽고 개인적으로 인상 깊었던 내용과 자신의 생각을 정리합니다. (영문 무료 아티클 HBR.org / 한글 유료 아티클 HBRkorea.com /&#160;<a href=\"http://hbrforum.us9.list-manage.com/track/click?u=adf2f5cd5fcda09a388bef4e4&id=b941de38b2&e=737a65d59b\" target=\"_blank\">정기구독</a> 프로모션 안내)<br>\t\t\t\t\t\t<br>2.&#160;참석하기: 시간에 맞춰 신청한 장소로 갑니다.<br>\t\t\t\t\t\t<br>3.&#160;참여하기:&#160;Icebreaking, 큐레이터 발표, QnA, 토론 순으로 진행됩니다. 마지막&#160;Wrap-up(체크아웃)과 단체사진 촬영을 마치면 공식 일정이 끝납니다. 뒷풀이는 옵션이지만 다들 참석하셔서 못다한 수다와 네트워킹을 즐깁니다.&#160;&#160;<br>\t\t\t\t\t\t<br><br>\t\t\t\t\t\t<br>등록안내<br>\t\t\t\t\t\t<br>절차: 회비 이체 > 멤버십 가입 > 세션 신청<br>\t\t\t\t\t\t<br>1. 회비:&#160;월&#160;6.9만원 (기본 6크레딧 제공)<br>\t\t\t\t\t\t<br>* 세션 1회 당 2크레딧 차감<br>\t\t\t\t\t\t<br>*&#160;국민 463501-01-243853 위어드벤처<br>\t\t\t\t\t\t<br>2. 멤버십:&#160;<a href=\"http://hbrforum.us9.list-manage2.com/track/click?u=adf2f5cd5fcda09a388bef4e4&id=377c1c17de&e=737a65d59b\" target=\"_blank\">멤버십</a> 가입하기<br>\t\t\t\t\t\t<br>3. 세션:&#160;<a href=\"http://hbrforum.us9.list-manage.com/track/click?u=adf2f5cd5fcda09a388bef4e4&id=6a534ddf24&e=737a65d59b\" target=\"_blank\">세션</a> 신청하기<br>\t\t\t\t\t<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>\t\t\t\t<br>\t\t\t\t<br>\t\t\t\t\t<br>아직 멤버십에 가입하지 않으셨나요? 바쁜 일상에서 자신의 성장 이야기를 써나가는 멤버들과 함께하세요.&#160;<br>\t\t\t\t\t<br><a href=\"http://hbrforum.us9.list-manage.com/track/click?u=adf2f5cd5fcda09a388bef4e4&id=48e2c33ce5&e=737a65d59b\" target=\"_blank\">멤버십</a> 가입하기<br>\t\t\t\t\t<br>멤버십 회원분들은 지금 9월 세션 신청하세요. 각 세션별 정원이 있기 때문에 늦을 경우 원하시는 세션에 참여를 못하실 수 있습니다.<br>\t\t\t\t\t<br><a href=\"http://hbrforum.us9.list-manage.com/track/click?u=adf2f5cd5fcda09a388bef4e4&id=42761546b6&e=737a65d59b\" target=\"_blank\">세션</a> 신청하기",

function loadBoard() {
  const saved = localStorage.getItem(SAVE_KEY);
  cards = saved ? JSON.parse(saved) : DEFAULT_CARDS.map(c => ({...c}));
  renderCards();
  if (!saved) autoLayout();
}

function autoLayout() {
  const GAP = 14;
  const boardW = document.getElementById('board').offsetWidth;
  const cols = Math.max(1, Math.floor(boardW / 280));
  const colW = (boardW - GAP * (cols - 1)) / cols;
  const colHeights = new Array(cols).fill(0);
  const allCards = document.querySelectorAll('.card');
  const images = document.querySelectorAll('.card img');
  let loaded = 0;
  const total = images.length;

  function place() {
    allCards.forEach((el, i) => {
      const card = cards[i];
      const w = Math.min(card.w || colW, colW);
      let minCol = 0;
      for (let c = 1; c < cols; c++) if (colHeights[c] < colHeights[minCol]) minCol = c;
      card.x = minCol * (colW + GAP);
      card.y = colHeights[minCol];
      card.w = w;
      el.style.left = card.x + 'px';
      el.style.top = card.y + 'px';
      el.style.width = w + 'px';
      colHeights[minCol] = card.y + el.offsetHeight + GAP;
    });
    document.getElementById('board').style.minHeight = Math.max(...colHeights) + 100 + 'px';
    saveBoard();
  }

  if (total === 0) requestAnimationFrame(place);
  else images.forEach(img => {
    if (img.complete) { loaded++; if (loaded >= total) requestAnimationFrame(place); }
    else img.onload = img.onerror = () => { loaded++; if (loaded >= total) requestAnimationFrame(place); };
  });
}

function syncText() {
  document.querySelectorAll('.card').forEach(el => {
    const idx = +el.dataset.idx;
    if (cards[idx]?.type === 'text') {
      const t = el.querySelector('.text');
      if (t) cards[idx].content = t.innerHTML;
    }
  });
}

function saveBoard() {
  syncText();
  localStorage.setItem(SAVE_KEY, JSON.stringify(cards));
  document.getElementById('status').textContent = '저장됨 ' + new Date().toLocaleTimeString();
}

function renderCards() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  cards.forEach((card, i) => {
    const el = document.createElement('div');
    el.className = 'card';
    el.dataset.idx = i;
    if (card.x !== undefined) el.style.left = card.x + 'px';
    if (card.y !== undefined) el.style.top = card.y + 'px';
    if (card.w) el.style.width = card.w + 'px';

    el.addEventListener('mousedown', e => {
      if (e.target.closest('.text, a, .card-btn, .resize-handle, table')) return;
      e.preventDefault();
      moving = { idx: i, startX: e.clientX, startY: e.clientY, origX: card.x || 0, origY: card.y || 0 };
      el.classList.add('moving');
    });

    const actions = document.createElement('div');
    actions.className = 'card-actions';
    const delBtn = document.createElement('button');
    delBtn.className = 'card-btn'; delBtn.textContent = '×';
    delBtn.onclick = e => { e.stopPropagation(); if (confirm('삭제?')) { cards.splice(i, 1); renderCards(); saveBoard(); } };
    actions.appendChild(delBtn);
    el.appendChild(actions);

    if (card.type === 'text') {
      const text = document.createElement('div');
      text.className = 'text';
      text.contentEditable = true;
      text.innerHTML = card.content || '';
      text.addEventListener('blur', () => { card.content = text.innerHTML; saveBoard(); });
      el.appendChild(text);
    } else if (card.type === 'image') {
      const src = card.src.startsWith('http') || card.src.startsWith('data:') ? card.src : IMG_BASE + card.src;
      const img = document.createElement('img');
      img.src = src;
      img.alt = card.alt || '';
      img.loading = 'lazy';
      img.onerror = () => img.style.display = 'none';
      if (card.link) {
        const a = document.createElement('a'); a.href = card.link; a.target = '_blank';
        a.appendChild(img); el.appendChild(a);
      } else { el.appendChild(img); }
      if (card.caption) {
        const cap = document.createElement('div');
        cap.className = 'caption';
        cap.textContent = card.caption;
        el.appendChild(cap);
      }
    } else if (card.type === 'table') {
      const wrapper = document.createElement('div');
      wrapper.style.overflowX = 'auto';
      wrapper.innerHTML = card.html || '';
      el.appendChild(wrapper);
    }

    const rh = document.createElement('div');
    rh.className = 'resize-handle';
    rh.addEventListener('mousedown', e => {
      e.preventDefault(); e.stopPropagation();
      resizing = { idx: i, startX: e.clientX, startW: card.w || el.offsetWidth };
    });
    el.appendChild(rh);
    board.appendChild(el);
  });

  requestAnimationFrame(() => {
    let maxBottom = 0;
    document.querySelectorAll('.card').forEach(el => {
      const b = (parseFloat(el.style.top) || 0) + el.offsetHeight;
      if (b > maxBottom) maxBottom = b;
    });
    board.style.minHeight = (maxBottom + 100) + 'px';
  });
}

document.addEventListener('mousemove', e => {
  if (moving) {
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`);
    if (!el) return;
    const nx = moving.origX + e.clientX - moving.startX;
    const ny = moving.origY + e.clientY - moving.startY;
    el.style.left = nx + 'px';
    el.style.top = ny + 'px';
  }
  if (resizing) {
    const card = cards[resizing.idx];
    card.w = Math.max(100, resizing.startW + e.clientX - resizing.startX);
    const el = document.querySelector(`.card[data-idx="${resizing.idx}"]`);
    if (el) el.style.width = card.w + 'px';
  }
});

document.addEventListener('mouseup', e => {
  if (moving) {
    const card = cards[moving.idx];
    card.x = Math.max(0, moving.origX + e.clientX - moving.startX);
    card.y = Math.max(0, moving.origY + e.clientY - moving.startY);
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`);
    if (el) { el.classList.remove('moving'); }
    moving = null; saveBoard();
  }
  if (resizing) { resizing = null; saveBoard(); }
});

function addTextCard() {
  cards.push({ type: 'text', content: '', x: 50, y: window.scrollY + 100, w: 300 });
  renderCards();
  setTimeout(() => { const els = document.querySelectorAll('.card .text'); els[els.length - 1]?.focus(); }, 100);
}

function addImageCard() {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = 'image/*';
  input.onchange = e => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = () => { cards.push({ type: 'image', src: reader.result, x: 50, y: window.scrollY + 100, w: 240 }); renderCards(); saveBoard(); };
    reader.readAsDataURL(file);
  };
  input.click();
}

function resetLayout() {
  if (!confirm('자동 재배치합니다. 현재 위치가 변경됩니다.')) return;
  cards.forEach(c => { delete c.x; delete c.y; });
  renderCards(); autoLayout();
}

setInterval(saveBoard, 30000);
loadBoard();
</script>
</body>
</html>
