 해당합니다.<br>\t\t\t<br>일곱째는 찰시[察施]<br>\t\t\t<br>굳이 묻지않고 상대의 속을 헤아려 알아서 도와주는 것을 말합니다.<br>\t\t\t<br>\"네가 이 7곱 가지 보시를 몸소 행하여 습관이 붙으면 너에게 행운이 따르리라\"<br>\t\t\t<br>-부처님의 말씀-<br>\t\t\t<br><br>\t\t\t원본 위치 <<a href=\"http://kin.naver.com/open100/detail.nhn?d1id=6&dirId=60903&docId=1441126&qb=66y07J6s7Lmg7Iuc&enc=utf8&section=kin&rank=3&search_sort=0&spq=0&pid=SKgcEwoRR0wssciltuNsssssssK-455514&sid=VMTGdwoUU1EAAGerMSs\" target=\"_blank\">http://kin.naver.com/open100/detail.nhn?d1id=6&dirId=60903&docId=1441126&qb=66y07J6s7Lmg7Iuc&enc=utf8&section=kin&rank=3&search_sort=0&spq=0&pid=SKgcEwoRR0wssciltuNsssssssK-455514&sid=VMTGdwoUU1EAAGerMSs</a>> <br>\t\t\t<br><br>\t\t\t<br><br>\t\t<br>\t\t<br>\t\t\t<br>누구나 매력적인 사람이 되는 5가지 비결<br>\t\t\t<br>[줄리아 투자노트]<br>\t\t\t<br>머니투데이 <a href=\"http://search.mt.co.kr/?srchFd=N&kwd=권성희&search_type=m\" target=\"_blank\">권성희 부장</a> |입력 : 2015.04.18 07:39|조회 : 73923 <br>\t\t\t<br>\t\t\t\t<br>- <a href=\"http://news.mt.co.kr/mtview.php?no=2015041718352397752&type=1#\" target=\"_blank\">기사 </a><br>\t\t\t\t<br>- <a href=\"http://news.mt.co.kr/mtview.php?no=2015041718352397752&type=1#\" target=\"_blank\">소셜댓글</a>(0)<br>\t\t\t<br>\t\t\t<br>폰트크게폰트작게<br>\t\t\t[",

    "content": "](javascript:showGisaInfo(1);)\t\t\t<br>성공한 사람들의 인생을 살펴 보면 반드시 누군가 이끌어준 사람이 있다. 이미 살아 있는 전설이 된 투자의 현인 워런 버핏은 가치투자의 철학을 세운 벤저민 그레이엄을 만난 것이 인생의 행운이었다, 회사에서 성공하려면 누군가 발탁해줄 사람, 외부에서 업무 성과를 높이는데 도움을 줄 만한 사람이 있어야 한다. 사업을 하려면 자금을 투자해주고 상품이나 서비스를 구매해줄 사람을 만나야 한다. <br>\t\t\t<br><br>\t\t\t<br>실력과 능력이 성공을 좌우한다고 자신만만하게 말하는 사람도 있지만 실력과 능력의 차이는 실상 크지 않다. 결국 성패를 좌우하는 작은 차이는 상대방의 마음을 끄는데 있다. 다른 사람의 호감을 사는 매력은 어디에서 오는 것일까. 많은 사람들이 매력의 원천을 외모에서 찾지만 진정한 매혹의 기술은 마음에 있다. <br>\t\t\t<br><br>\t\t\t[",

    "type": "text",
    "content": "](javascript:image_open('<a href=\"http://image.mt.co.kr/image_realdisp.php?ImageID=2015041718352397752_1.jpg',%20'IMAGE_VIEW',300,300,'yes'))\" target=\"_blank\">http://image.mt.co.kr/image_realdisp.php?ImageID=2015041718352397752_1.jpg',%20'IMAGE_VIEW',300,300,'yes'))</a>\t\t\t<br><a href=\"http://javascript:image_open('<a href=\"http://image.mt.co.kr/image_realdisp.php?ImageID=2015041718352397752_1.jpg',%20'IMAGE_VIEW',300,300,'yes'\" target=\"_blank\">http://image.mt.co.kr/image_realdisp.php?ImageID=2015041718352397752_1.jpg',%20'IMAGE_VIEW',300,300,'yes'</a>\" target=\"_blank\">이미지 크게보기</a>)<br>\t\t\t<br>1. 진심은 산도 움직인다=“자네가 무언가를 간절히 원할 때 온 우주가 자네의 소망이 실현되도록 도와준다네.” 파울로 코엘류의 ‘연금술사’에 나오는 글이다. 사람의 마음을 움직이는데 진실만큼 강한 힘도 없다. 다른 사람의 신뢰를 얻는 방법은 그저 있는 그대로 자신의 모습을 솔직하게 보여주는 것이다. 이렇게 쉬운데도 다른 사람의 마음을 얻지 못한다면 그 사람을 진정으로 좋아하고 존중하고 배려하는 마음이 부족해서다. 강아지도 자기를 진짜 좋아하는 사람과 별 관심 없는 사람을 구분해낸다. 하물며 사람이 상대방의 태도가 진심인지 아닌지 구분해내지 못할까. 성경에서도 예수가 말했다. “너희에게 겨자씨 한 알만한 믿음이 있다면 이 산을 향해 ‘여기서 저리로 옮겨 가거라’ 하여도 그대로 될 것이다.” 믿음이란 진심을 의미한다.<br>\t\t\t<br><br>\t\t\t<br>2. 경청이 신뢰의 첫걸음이다=사람들은 대개 듣는 것보다 말하는 것을 즐긴다. 듣는 것은 초점이 상대방에게 맞춰지고 말하는 것은 중심이 내가 되기 때문이다. 어떤 사람도 대화에서 주인공이 되기를 원하지 조연으로 남기를 원치 않는다. 많은 사람들이 대화할 때 상대방의 말에 귀를 기울이기보다 자신이 똑똑하고 잘 났고 능력이 있다는 사실을 증명하는데 주력하는 이유도 여기 있다. 심지어 다른 사람이 말할 때 그 사람의 말을 듣지 않고 다음에 자기가 할 말한 생각하는 경우도 많다. 대화할 때 자신을 드러내려 노력하는 대신 다른 사람들의 얘기를 집중해 듣고 고개를 끄덕여주고 진정으로 호기심을 갖고 질문해보라. 잘 듣는 것만큼 다른 사람의 마음을 사는데 효과적인 방법이 없다는 것을 알게 될 것이다. 인텔을 세계적인 기업으로 키운 앤디 그로브는 “가장 큰 정보는 주고 받는 대화 속에 있다”고 했다. 다른 사람의 말을 잘 들으면 마음도 사고 정보도 얻는다.<br>\t\t\t<br><br>\t\t\t<br>3. 관심을 얻으려면 관심을 보여라= 보그와 하퍼스 바자 등 세계적인 패션잡지의 사진작가인 리처드 아베든은 아름다운 여성과 남성의 사진을 수도 없이 많이 찍었다. 그리고 매력적인 사람을 다음과 같이 정의했다. “매력이란 진실로 다른 사람에게 관심을 갖는 능력이라고 생각한다.” 상대방의 이름과 말한 내용을 기억해 기록해뒀다 다음에 만났을 때 과거에 했던 얘기와 관련해 질문을 던지면 상대방은 쉽게 감동한다. 다른 사람의 행동을 살펴 마음을 헤아리는 것도 좋은 관심의 표현이다. 관심을 가지면 보이지 않았던 것이 보이고 상대방의 마음이 눈 안에 들어온다.<br>\t\t\t<br><br>\t\t\t<br>4. 너무 진지하면 관계를 망친다=복잡다단한 현대사회에선 누구나 고민도, 스트레스도, 할 일도 많다. 안 그래도 힘겨운 인생인데 사람 관계로 짐 하나를 더 얹고 싶어하는 사람은 아무도 없다. 현대사회에서 결혼율이 낮아지고 결혼 연령이 늦어지는 것도 내 몸 하나 건사하기도 힘든 세상에 일생을 좌우할 중대한 인간관계를 하나 더 만드는데 대한 부담이 크기 때문인지도 모른다. 따라서 다른 사람에게 부담을 주는 것은 금물이다. 과유불급이라고 지나친 관심은 오히려 인간관계에 독이 될 수 있다. 관계를 너무 진지하게 생각하면 상대방이 달아날 수 있다. 만났을 때 편하고 기분 좋고 존중받는 느낌을 주는 사람으로 기억돼야 관계가 오래 간다.<br>\t\t\t<br><br>\t\t\t<br>5. 화를 내지 않는 것만도 큰 매력이다=어떤 학교에 특별히 예쁘지도 않은데 인기가 많은 여학생이 있었다. 한 친구가 그 여학생이 왜 그리 매력적인지 궁금해 비결이 뭐냐고 물었다. 이 여학생은 이렇게 답했다. “간단해. 어떤 경우라도 화를 안 내면 돼.” 사람들은 무의식적으로 짜증을 내고 화를 낸다. 짜증과 화는 얼굴을 찌푸리게 만들고 마음에 주름을 만들어 매력을 감소시킨다. 화 내는 것만 조심해도 인간관계가 눈에 띄게 좋아진다.<br>\t\t\t<br><br>\t\t\t출처: <<a href=\"http://news.mt.co.kr/mtview.php?no=2015041718352397752&type=1\" target=\"_blank\">http://news.mt.co.kr/mtview.php?no=2015041718352397752&type=1</a>> <br>\t\t<br>\t\t<br>\t\t\t<br><a href=\"http://m.blog.naver.com/ancit0/220441465596\" target=\"_blank\">http://m.blog.naver.com/ancit0/220441465596</a>",
    "w": 400
  }
];

let cards = [];
let moving = null, resizing = null;

function loadBoard() {
  const saved = localStorage.getItem(SAVE_KEY);
  cards = saved ? JSON.parse(saved) : DEFAULT_CARDS.map(c => ({...c}));
  renderCards();
  if (!saved) autoLayout();
}

function autoLayout() {
  const GAP = 14;
  const boardW = document.getElementById('board').offsetWidth;
  const cols = Math.max(1, Math.floor(boardW / 280));
  const colW = (boardW - GAP * (cols - 1)) / cols;
  const colHeights = new Array(cols).fill(0);
  const allCards = document.querySelectorAll('.card');
  const images = document.querySelectorAll('.card img');
  let loaded = 0;
  const total = images.length;

  function place() {
    allCards.forEach((el, i) => {
      const card = cards[i];
      const w = Math.min(card.w || colW, colW);
      let minCol = 0;
      for (let c = 1; c < cols; c++) if (colHeights[c] < colHeights[minCol]) minCol = c;
      card.x = minCol * (colW + GAP);
      card.y = colHeights[minCol];
      card.w = w;
      el.style.left = card.x + 'px';
      el.style.top = card.y + 'px';
      el.style.width = w + 'px';
      colHeights[minCol] = card.y + el.offsetHeight + GAP;
    });
    document.getElementById('board').style.minHeight = Math.max(...colHeights) + 100 + 'px';
    saveBoard();
  }

  if (total === 0) requestAnimationFrame(place);
  else images.forEach(img => {
    if (img.complete) { loaded++; if (loaded >= total) requestAnimationFrame(place); }
    else img.onload = img.onerror = () => { loaded++; if (loaded >= total) requestAnimationFrame(place); };
  });
}

function syncText() {
  document.querySelectorAll('.card').forEach(el => {
    const idx = +el.dataset.idx;
    if (cards[idx]?.type === 'text') {
      const t = el.querySelector('.text');
      if (t) cards[idx].content = t.innerHTML;
    }
  });
}

function saveBoard() {
  syncText();
  localStorage.setItem(SAVE_KEY, JSON.stringify(cards));
  document.getElementById('status').textContent = '저장됨 ' + new Date().toLocaleTimeString();
}

function renderCards() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  cards.forEach((card, i) => {
    const el = document.createElement('div');
    el.className = 'card';
    el.dataset.idx = i;
    if (card.x !== undefined) el.style.left = card.x + 'px';
    if (card.y !== undefined) el.style.top = card.y + 'px';
    if (card.w) el.style.width = card.w + 'px';

    el.addEventListener('mousedown', e => {
      if (e.target.closest('.text, a, .card-btn, .resize-handle, table')) return;
      e.preventDefault();
      moving = { idx: i, startX: e.clientX, startY: e.clientY, origX: card.x || 0, origY: card.y || 0 };
      el.classList.add('moving');
    });

    const actions = document.createElement('div');
    actions.className = 'card-actions';
    const delBtn = document.createElement('button');
    delBtn.className = 'card-btn'; delBtn.textContent = '×';
    delBtn.onclick = e => { e.stopPropagation(); if (confirm('삭제?')) { cards.splice(i, 1); renderCards(); saveBoard(); } };
    actions.appendChild(delBtn);
    el.appendChild(actions);

    if (card.type === 'text') {
      const text = document.createElement('div');
      text.className = 'text';
      text.contentEditable = true;
      text.innerHTML = card.content || '';
      text.addEventListener('blur', () => { card.content = text.innerHTML; saveBoard(); });
      el.appendChild(text);
    } else if (card.type === 'image') {
      const src = card.src.startsWith('http') || card.src.startsWith('data:') ? card.src : IMG_BASE + card.src;
      const img = document.createElement('img');
      img.src = src;
      img.alt = card.alt || '';
      img.loading = 'lazy';
      img.onerror = () => img.style.display = 'none';
      if (card.link) {
        const a = document.createElement('a'); a.href = card.link; a.target = '_blank';
        a.appendChild(img); el.appendChild(a);
      } else { el.appendChild(img); }
      if (card.caption) {
        const cap = document.createElement('div');
        cap.className = 'caption';
        cap.textContent = card.caption;
        el.appendChild(cap);
      }
    } else if (card.type === 'table') {
      const wrapper = document.createElement('div');
      wrapper.style.overflowX = 'auto';
      wrapper.innerHTML = card.html || '';
      el.appendChild(wrapper);
    }

    const rh = document.createElement('div');
    rh.className = 'resize-handle';
    rh.addEventListener('mousedown', e => {
      e.preventDefault(); e.stopPropagation();
      resizing = { idx: i, startX: e.clientX, startW: card.w || el.offsetWidth };
    });
    el.appendChild(rh);
    board.appendChild(el);
  });

  requestAnimationFrame(() => {
    let maxBottom = 0;
    document.querySelectorAll('.card').forEach(el => {
      const b = (parseFloat(el.style.top) || 0) + el.offsetHeight;
      if (b > maxBottom) maxBottom = b;
    });
    board.style.minHeight = (maxBottom + 100) + 'px';
  });
}

document.addEventListener('mousemove', e => {
  if (moving) {
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`);
    if (!el) return;
    const nx = moving.origX + e.clientX - moving.startX;
    const ny = moving.origY + e.clientY - moving.startY;
    el.style.left = nx + 'px';
    el.style.top = ny + 'px';
  }
  if (resizing) {
    const card = cards[resizing.idx];
    card.w = Math.max(100, resizing.startW + e.clientX - resizing.startX);
    const el = document.querySelector(`.card[data-idx="${resizing.idx}"]`);
    if (el) el.style.width = card.w + 'px';
  }
});

document.addEventListener('mouseup', e => {
  if (moving) {
    const card = cards[moving.idx];
    card.x = Math.max(0, moving.origX + e.clientX - moving.startX);
    card.y = Math.max(0, moving.origY + e.clientY - moving.startY);
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`);
    if (el) { el.classList.remove('moving'); }
    moving = null; saveBoard();
  }
  if (resizing) { resizing = null; saveBoard(); }
});

function addTextCard() {
  cards.push({ type: 'text', content: '', x: 50, y: window.scrollY + 100, w: 300 });
  renderCards();
  setTimeout(() => { const els = document.querySelectorAll('.card .text'); els[els.length - 1]?.focus(); }, 100);
}

function addImageCard() {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = 'image/*';
  input.onchange = e => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = () => { cards.push({ type: 'image', src: reader.result, x: 50, y: window.scrollY + 100, w: 240 }); renderCards(); saveBoard(); };
    reader.readAsDataURL(file);
  };
  input.click();
}

function resetLayout() {
  if (!confirm('자동 재배치합니다. 현재 위치가 변경됩니다.')) return;
  cards.forEach(c => { delete c.x; delete c.y; });
  renderCards(); autoLayout();
}

setInterval(saveBoard, 30000);
loadBoard();
</script>
