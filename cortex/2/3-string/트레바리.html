<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>트레바리</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #1e1e1e;
  color: #e0e0e0;
  font-family: 'Segoe UI', -apple-system, sans-serif;
  font-size: 15px;
  line-height: 1.6;
  padding: 20px 30px 60px;
  overflow-x: hidden;
}
a { color: #6cb0f6; text-decoration: none; }
a:hover { text-decoration: underline; }
.title-bar {
  background: #3a3a5c;
  display: inline-block;
  padding: 6px 16px;
  font-size: 22px;
  font-weight: bold;
  color: #fff;
  margin-bottom: 4px;
}
.date { color: #999; font-size: 13px; margin-bottom: 20px; }
.board { position: relative; }
.card {
  background: #2a2a2a;
  border: 1px solid #3a3a3a;
  border-radius: 8px;
  padding: 12px;
  position: absolute;
  cursor: grab;
  transition: box-shadow 0.15s;
  overflow: hidden;
}
.card:hover { box-shadow: 0 0 0 1px #58a6ff; z-index: 10; }
.card.moving { opacity: 0.8; box-shadow: 0 4px 24px rgba(0,0,0,0.6); z-index: 100; cursor: grabbing; }
.card img { width: 100%; border-radius: 4px; display: block; }
.card .caption { font-size: 12px; color: #888; margin-top: 6px; }
.card .text { outline: none; min-height: 20px; white-space: pre-wrap; word-break: break-word; }
.card .text:focus { background: rgba(255,255,255,0.05); border-radius: 4px; padding: 4px; }
.card .text:empty::before { content: '텍스트 입력...'; color: #555; }
.card table { border-collapse: collapse; width: 100%; font-size: 13px; }
.card table td, .card table th { border: 1px solid #444; padding: 4px 8px; vertical-align: top; }
.card table th { background: #333; color: #ccc; }
.card-actions { position: absolute; top: 4px; right: 4px; display: none; gap: 4px; }
.card:hover .card-actions { display: flex; }
.card-btn { background: #333; border: 1px solid #555; color: #ccc; border-radius: 4px; padding: 2px 6px; font-size: 11px; cursor: pointer; }
.card-btn:hover { background: #444; color: #fff; }
.resize-handle { position: absolute; bottom: 0; right: 0; width: 16px; height: 16px; cursor: se-resize; opacity: 0; }
.card:hover .resize-handle { opacity: 0.6; }
.resize-handle::after { content: ''; position: absolute; bottom: 3px; right: 3px; width: 8px; height: 8px; border-right: 2px solid #666; border-bottom: 2px solid #666; }
.toolbar { position: fixed; bottom: 0; left: 0; right: 0; background: #161b22; border-top: 1px solid #30363d; padding: 8px 20px; display: flex; gap: 12px; align-items: center; z-index: 200; }
.toolbar button { background: #21262d; border: 1px solid #30363d; color: #e0e0e0; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; }
.toolbar button:hover { background: #30363d; }
.toolbar .status { color: #8b949e; font-size: 12px; margin-left: auto; }
.highlight-red { color: #ff6b6b; }
.highlight-blue { color: #6cb0f6; }
</style>
</head>
<body>
<div class="title-bar">트레바리</div>
<div class="date">2017년 4월 5일 수요일</div>
<div class="board" id="board"></div>
<div class="toolbar">
  <button onclick="addTextCard()">+ 텍스트</button>
  <button onclick="addImageCard()">+ 이미지</button>
  <button onclick="saveBoard()">💾 저장</button>
  <button onclick="resetLayout()">↺ 재배치</button>
  <span class="status" id="status">Ready</span>
</div>

const DEFAULT_CARDS = [
  {
    "type": "text",
    "content": "트레바리<br>\t\t<br>\t\t<br>\t<br>\t<br>\t\t<br>\t\t\t<br>임팩트 비즈니스<br>\t\t\t<br>무슨 책을 읽었나요?<br>\t\t\t<br>[2016.9-12월 시즌]<br>\t\t\t<br><체인지메이커 혁명> / 베벌리 슈왈츠<br>\t\t\t<br><공감의 뿌리> / 메리 고든<br>\t\t\t<br><내 이름은 욤비> / 욤비 토나<br>\t\t\t<br><보노보 혁명> / 유병선<br>\t\t\t<br><br>\t\t\t<br>[2017.1-4월 시즌]<br>\t\t\t<br><진흙, 물, 벽돌> / 제시카 재클리<br>\t\t\t<br><탄소 전쟁> / 박호정<br>\t\t\t<br><가난한 사람이 더 합리적이다> / 아비지트 배너지, 에스테르 뒤플로<br>\t\t\t<br><리스판서블 컴퍼니 파타고니아> / 이본 쉬나드, 빈센트 스탠리<br>\t\t\t<br><br>\t\t\t<br>앞으로 무슨 책을 읽나욥?<br>\t\t\t<br>[첫 책]<br>\t\t\t<br><탐스 스토리> / 블레이크 마이코스키<br>\t\t\t<br><br>\t\t\t<br>[그 외에 함께 읽을 수 있는 책들]<br>\t\t\t<br><카인드 스토리> / 대니얼 루베츠키<br>\t\t\t<br><우리가 사랑한 빵집 성심당> / 김태훈<br>\t\t\t<br><유니레버는 왜 비콥이 되려 할까?> / 라이언 허니맨<br>\t\t\t<br>(멤버들과의 협의를 통해 변경될 수 있습니다.)<br>\t\t\t<br><br>\t\t\t출처: <<a href=\"http://trevari.co.kr/clubs/225\" target=\"_blank\">http://trevari.co.kr/clubs/225</a>> <br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br>건축<br>\t\t\t<br>[첫 책]<br>\t\t\t<br><br>\t\t\t<br><마음을 품은 집> / 구본준 : 건축을 좋아하는 방법, 나는 어떤 건물에 관심이 있는지 알아보자<br>\t\t\t<br><br>\t\t\t<br>[그 외 함께 읽으면 좋을 것 같은 책들]<br>\t\t\t<br><br>\t\t\t<br>1) 어떤 건축<br>\t\t\t<br><br>\t\t\t<br><약한건축> / 구마겐코&#160;<br>\t\t\t<br><길모퉁이건축> / 김성홍<br>\t\t\t<br><감응의 건축> / 정기용<br>\t\t\t<br><행복의 건축> / 알랭드보통<br>\t\t\t<br><건축을향하여> / 르꼬르뷔지에 : 곧 르꼬르뷔지에 전시도 열린다는!<br>\t\t\t<br><알바루시자와의 대화> / 도미니크 마샤베르&#183;로랑 보두앙 : 건축가의 생각을 직접 들어보기<br>\t\t\t<br><br>\t\t\t<br>2) 건축 > Private > 주거<br>\t\t\t<br><br>\t\t\t<br><집을, 순례하다> / 나카무라 후시요미&#160;<br>\t\t\t<br><아파트와 바꾼 집> / 박철수 : 아파트를 주택으로 치환하는 생생한 과정<br>\t\t\t<br><br>\t\t\t<br>3) 건축 > Public<br>\t\t\t<br><br>\t\t\t<br><기적의 도서관> / 정기용<br>\t\t\t<br>영화 <말하는 건축가> / 정재은 : 건축가 정기용<br>\t\t\t<br>영화 <말하는 건축 : 시티홀> / 정재은 : 서울시청 건설 과정 살펴보기<br>\t\t\t<br><나의 문화유산 답사기 6권 : 인생도처유상수> / 유홍준 : 조선의 통치 철학은 경복궁이 어떻게 반영되었나<br>\t\t\t<br><세상에서 가장 큰 집> / 구본준 : 공공 건물에 대한 이야기<br>\t\t\t<br><br>\t\t\t출처: <<a href=\"http://trevari.co.kr/clubs/120\" target=\"_blank\">http://trevari.co.kr/clubs/120</a>> <br>\t\t\t<br><br>\t\t\t<br>삶<br>\t\t\t<br>[첫 책]<br>\t\t\t<br>책 <철학자와 늑대><br>\t\t\t<br>영화 <케빈에 대하여><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br>[그 외 함께 읽으면 좋을 것 같은 책들]<br>\t\t\t<br><방황의 기술><br>\t\t\t<br><불안> / 알랭드보통<br>\t\t\t<br><예술과 경제를 움직이는 다섯가지 힘><br>\t\t\t<br><플로팅 시티><br>\t\t\t<br><바른 마음><br>\t\t\t<br><팻><br>\t\t\t<br><br>\t\t\t출처: <<a href=\"http://trevari.co.kr/clubs/125\" target=\"_blank\">http://trevari.co.kr/clubs/125</a>> <br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br>[첫 책]<br>\t\t\t<br><거래의 기술> / 도널드 트럼프<br>\t\t\t<br><br>\t\t\t<br>[그 외 함께 읽으면 좋을 것 같은 책들]<br>\t\t\t<br><김구 백범일지><br>\t\t\t<br><부분과 전체>(물리학자 베르너 하이젠베르크)<br>\t\t\t<br><시인 동주><br>\t\t\t<br><소설 맹자><br>\t\t\t<br><전태일 평전><br>\t\t\t<br><바람만이 아는 대답>(밥딜런)<br>\t\t\t<br><나는말랄라>(2014최연소노벨평화상)<br>\t\t\t<br><스티브잡스 평전><br>\t\t\t<br><간디 자서전><br>\t\t\t<br><br>\t\t\t출처: <<a href=\"http://trevari.co.kr/clubs/126\" target=\"_blank\">http://trevari.co.kr/clubs/126</a>> <br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br>[첫 책]<br>\t\t\t<br><달과 6펜스> / 서머싯 몸 : 폴 고갱의 삶을 바탕으로 쓴 소설이에요. 안정적인 삶을 포기하고, 주변 사람을 모두 불행하게 만든 그의 불 같은 삶에 대해 도덕적으로 옳다, 그르다 판단을 내릴 수는 없지만 우리 삶에 자극이 되어줄 수 있을 것 같아요.&#160;<br>\t\t\t<br><br>\t\t\t<br>+ 그 외, 읽을 수 있는 책<br>\t\t\t<br><피로사회> / 한병철 : 내가 무엇을 잘하는지 아는 것도 중요하지만 무엇을 못하는지 빠르게 포기하는 것도 너무나 중요하다고 생각해요. 세상의 기준에 맞추기 위해 부단히 노력하지 않아도 된다는 생각이 들게 해준 책이에요.&#160;<br>\t\t\t<br><사랑의 기술> / 에리히 프롬 : 사랑을 향한 태도에 대해 생각해 볼 수 있어요. 어쩌면 사랑은 우리가 '찾아'야 하는 것이 아니라 사랑하기를 '결정'해야 할 것이 아닐까요?<br>\t\t\t<br><그리스인 조르바> / 니코스 카잔차키스 : 자유가 무엇인지, 주체적인 삶이 무엇인지. 아직도 답을 내리지는 못했지만, 읽을 때마다 질문을 던지게 해준 책이에요.<br>\t\t\t<br><br>\t\t\t<br><나음보다 다름> / 홍성태, 조수용<br>\t\t\t<br><직업으로서의 소설가> / 무라카미 하루키<br>\t\t\t<br><br>\t\t\t출처: <<a href=\"http://trevari.co.kr/clubs/127\" target=\"_blank\">http://trevari.co.kr/clubs/127</a>> <br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br>과학<br>\t\t\t<br><죽기 전에 알아야 할 5가지 물리법칙> / 야마구치 에이이치, 감수: 클럽장 김찬현 님<br>\t\t\t<br><우주, 일상을 만나다> / 플로리안 프라이슈테터, 감수: 클럽장 김찬현 님<br>\t\t\t<br><뉴턴의 무정한 세계><br>\t\t\t<br><볼츠만의 원자><br>\t\t\t<br><패러데이 & 맥스웰><br>\t\t\t<br><냉장고의 탄생><br>\t\t\t<br><br>\t\t\t<br>무슨 책을 읽나욥?<br>\t\t\t<br>1월:<조지 가모브 물리열차를 타다> / 조지 가모브<br>\t\t\t<br>2월: <보이지 않는 것의 발견> / 유카와 히데키<br>\t\t\t<br>3월: <불멸의 원자> / 이강영<br>\t\t\t<br>4월: <반물질> / 프랭크 클로우스<br>\t\t\t<br>*2월 이후 지정 도서와 순서는 사정에 따라 변경될 수 있습니다.&#160;<br>\t\t\t<br><br>\t\t\t출처: <<a href=\"http://trevari.co.kr/clubs/88\" target=\"_blank\">http://trevari.co.kr/clubs/88</a>> <br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br>무슨 책을 읽나욥?<br>\t\t\t<br>[첫 책]<br>\t\t\t<br><세상물정의 물리학> / 김범준 저, 동아시아<br>\t\t\t<br>: 통계물리학으로 사회현상을 설명할 수 있다는 것을 보여주는 기념비적인 책입니다. 김범준 클럽장님이 직접 쓰신 책!<br>\t\t\t<br><br>\t\t\t<br>[두 번째 책]<br>\t\t\t<br><오래된 연장통> / 전중환 저, 사이언스북스<br>\t\t\t<br>: 우리나라 최초의 진화심리학자인 전중환 교수님이 우리나라 최초로 제대로 된 진화심리학을 소개한 책<br>\t\t\t<br><br>\t\t\t<br>[세 번째 책]<br>\t\t\t<br><마음의 미래> / 미치오 카쿠, 김영사<br>\t\t\t<br>: 뇌신경과학의 기초는 물론 신경과학과 물리학에 기초하여 이루어진 최신 연구결과까지 충실히 담고 있는 뇌과학 입문서<br>\t\t\t<br><br>\t\t\t출처: <<a href=\"http://trevari.co.kr/clubs/235\" target=\"_blank\">http://trevari.co.kr/clubs/235</a>> <br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br>책과 영화<br>\t\t\t<br>무슨 책과 영화를 봤나욥?<br>\t\t\t<br>책 <쳇 베이커> & 영화 <본 투비 블루>&#160;<br>\t\t\t<br>책 <아들러심리학입문> & 영화 <언터쳐블: 1%의 우정><br>\t\t\t<br>책 <왜 사람들은 이상한 것을 믿는가> & 영화 <맨 프롬 어스><br>\t\t\t<br>책 <피로사회> & 영화 <블루자스민><br>\t\t\t<br>책 & 영화 <파이 이야기(Life of Pi)>, <종이달>, <룸><br>\t\t\t<br><br>\t\t\t<br>무슨 책과 영화를 보나욥?<br>\t\t\t<br>[첫 책&영화]<br>\t\t\t<br><br>\t\t\t<br>- 영화: <월드워Z>, <부산행> 중 택 1&#160;<br>\t\t\t<br>- 책 : <재난불평등> 존 C 머터<br>\t\t\t<br><br>\t\t\t출처: <<a href=\"http://trevari.co.kr/clubs/156\" target=\"_blank\">http://trevari.co.kr/clubs/156</a>> <br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br>책 <쳇 베이커> & 영화 <본 투비 블루>&#160;<br>\t\t\t<br>책 <아들러심리학입문> & 영화 <언터쳐블: 1%의 우정><br>\t\t\t<br>책 <왜 사람들은 이상한 것을 믿는가> & 영화 <맨 프롬 어스><br>\t\t\t<br>책 <피로사회> & 영화 <블루자스민><br>\t\t\t<br>책 & 영화 <파이 이야기(Life of Pi)>, <종이달>, <룸><br>\t\t\t<br><br>\t\t\t<br>무슨 책과 영화를 보나욥?<br>\t\t\t<br>[첫 책&영화]<br>\t\t\t<br><br>\t\t\t<br>책&영화: <월플라워> 스티븐 크보스키<br>\t\t\t<br>자유롭고 아름다웠던 그 순간을 함께 이야기 합니다.<br>\t\t\t<br><br>\t\t\t출처: <<a href=\"http://trevari.co.kr/clubs/161\" target=\"_blank\">http://trevari.co.kr/clubs/161</a>> <br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br>덕질<br>\t\t\t<br><몰입>, <시골빵집에서 자본론을 굽다>, <먼 곳에서 온 이야기들>, <대성당><br>\t\t\t<br><br>\t\t\t<br>무슨 책을 읽나욥?<br>\t\t\t<br>[그 외 함께 읽으면 좋을 것 같은 책들]<br>\t\t\t<br><대포 범선 제국> / 카를로 치폴라<br>\t\t\t<br><테크놀로지 : 문명을 읽는 새로운 코드> / 다니엘 R. 헤드릭<br>\t\t\t<br><아침식사의 문화사> / 헤더 안트 앤더슨<br>\t\t\t<br><철도, 역사를 바꾸다> / 빌 로스<br>\t\t\t<br><음반의 역사 : 실린더 레코드부터 디지털 음원까지> / 헤르베르트 하프너<br>\t\t\t<br><스타워즈 백과사전><br>\t\t\t<br><마블 백과사전><br>\t\t\t<br><SF의 법칙> / 고장원<br>\t\t\t<br><br>\t\t\t출처: <<a href=\"http://trevari.co.kr/clubs/86\" target=\"_blank\">http://trevari.co.kr/clubs/86</a>> <br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br>역사<br>\t\t\t<br>[첫 책]<br>\t\t\t<br><전쟁은 여자의 얼굴을 하지 않았다> / 스베틀라나 알렉시예비치&#160;<br>\t\t\t<br>2015년 노벨문학상 수상작.&#160;<br>\t\t\t<br>세계 2차대전에 참전한 백만 명이 넘는 여성들, 역사에서 배제당하고 침묵을 강요당한 그들이 회고하는 전쟁이야기.&#160;<br>\t\t\t<br>전쟁의 추하고 냉혹한 얼굴, 배고픔, 성폭력까지. 전쟁이라는 가혹한 운명 앞에 선 보통 사람들의 이야기를 함께 읽어요.&#160;<br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br>[예상 도서 리스트]<br>\t\t\t<br><숙명의 트라이앵글> / 노암촘스키 : 세계의 화약고 중동의 현재 지도를 만든 시오니즘과 팔레스타인 충돌의 한가운데의 미국!<br>\t\t\t<br><br>\t\t\t<br><한국전쟁> / 베른트 슈퇴버 : 독일 학자가 세계적 관점에서 바라본 한국전쟁<br>\t\t\t<br><전쟁이 요리한 음식의 역사> / 도현신 : 전쟁이 만들어내고, 전쟁이 전파한 음식들&#160;<br>\t\t\t<br><인류의 운명을 바꾼 역사의 순간들: 전쟁편> / 류펑<br>\t\t\t<br><전쟁연대기> / 조셉 커민스 : 세계사를 바꾼 결정적 전쟁들<br>\t\t\t<br><br>\t\t\t출처: <<a href=\"http://trevari.co.kr/clubs/114\" target=\"_blank\">http://trevari.co.kr/clubs/114</a>> <br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br>혁신<br>\t\t\t<br>[첫 책]<br>\t\t\t<br><볼드> : 혁신기업가와 미래학자 피터 디아만디스. 그가 어떤 방식으로 끝없이 도전하고 해법을 모색하는지가 상당히 흥미롭습니다. 미래를 기다리는 대신 준비하고 만드는게 어떤 것인지 이야기해보면 좋겠어요.<br>\t\t\t<br><br>\t\t\t<br>[예상 도서 리스트]<br>\t\t\t<br><사피엔스의 미래>, <에너지 혁명 2030>, <오리지널스>, <마스터 알고리즘>, <클라우스 슈밥의 4차 산업혁명>, <당신은 데이터의 주인이 아니다>, <미래는 누구의 것인가><br>\t\t\t<br><br>\t\t\t출처: <<a href=\"http://trevari.co.kr/clubs/110\" target=\"_blank\">http://trevari.co.kr/clubs/110</a>> <br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br>통계<br>\t\t\t<br>무슨 책을 읽었나욥?<br>\t\t\t<br><신은 주사위 놀이를 하지 않는다> / 데이비드 핸드, 더퀘스트, 2016년<br>\t\t\t<br><틀리지 않는 법 - 수학적 사고의 힘> / 조던 엘렌버그, 열린책들, 2016년<br>\t\t\t<br><보통씨의 일생> / 데이비드 스피겔할터, 마이클 블래스트랜드, 2016년<br>\t\t\t<br><벌거벗은 통계학> / 찰스 윌런, 책읽는수요일, 2013년<br>\t\t\t<br><br>\t\t\t<br>2017.1-4월 시즌 커리큘럼은 어떻게 되나욥?<br>\t\t\t<br>'예측'을 주제로 진행됩니다.<br>\t\t\t<br><br>\t\t\t<br><신호와 소음> / 네이트 실버 : 잘못된 정보 (소음) 거르고 진짜 의미있는 정보 (신호) 찾기&#160;<br>\t\t\t<br><거의 모든 것의 미래 > / 데이비드 오렐 : 날씨, 건강, 경제의 예측에 얽힌 함정과 도그마 파헤치기&#160;<br>\t\t\t<br><블랙 스완> / 나심 탈레브 : 엄청나게 이상한 일이 일어났음에도, 반드시 일어날 수 밖에 없었던 일이며 예측할 수 있었다고 생각하는 사람들<br>\t\t\t<br><빅데이터의 다음 단계는 예측분석이다> / 에릭 시겔 : 데이터 과학의 등장으로 인해 달라지는 사회. 새로운 가치관을 정립하기.<br>\t\t\t<br><br>\t\t\t출처: <<a href=\"http://trevari.co.kr/clubs/76\" target=\"_blank\">http://trevari.co.kr/clubs/76</a>> <br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br>기술<br>\t\t\t<br>무슨 책을 읽었나욥?<br>\t\t\t<br><인공지능, 인간을 유혹하다>, <생각하지 않는 사람들>, <알렉 로스의 미래사회 보고서>, <가상현실을 말하다>, <인간 중심의 기술, 적정 기술과의 만남>, <인간은 필요 없다>, <뇌는 윤리적인가>, <감각의 제국>, <유리감옥>, <멋진 신세계> 등<br>\t\t\t<br><br>\t\t\t<br>앞으로는 대략 무슨 책을 읽나욥?<br>\t\t\t<br>[첫 책]<br>\t\t\t<br><뉴로맨서> / 윌리엄 깁슨<br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br>과학기술철학부터 SF소설까지, 기술 홍수의 시대에 인간이 헤엄쳐 나아갈 방향에 대해 읽고 토론해 봐요!<br>\t\t\t<br><br>\t\t\t<br>[과학기술철학]<br>\t\t\t<br><돈 아이디> / 김성동<br>\t\t\t<br><과학혁명의 구조> / 토머스 쿤<br>\t\t\t<br><욕망하는 테크놀로지> / 이상욱 외<br>\t\t\t<br><길을 묻는 테크놀로지> / 랭던 위너<br>\t\t\t<br><br>\t\t\t<br>[생명공학윤리]<br>\t\t\t<br><완벽에 대한 반론> / 마이클 샌델<br>\t\t\t<br><br>\t\t\t<br>[정신분석/사회심리]<br>\t\t\t<br><외로워지는 사람들> / 셰리 터클<br>\t\t\t<br><br>\t\t\t<br>[로봇/인공지능]<br>\t\t\t<br><로봇 시대, 인간의 일> / 구본권<br>\t\t\t<br><로봇윤리란 무엇인가?> / 변순용, 송선영<br>\t\t\t<br><왜 로봇의 도덕인가> / 웬델 윌러치, 콜린 알렌<br>\t\t\t<br><br>\t\t\t<br>[인류의 미래]<br>\t\t\t<br><사피엔스의 미래> / 알랭 드 보통 외<br>\t\t\t<br><br>\t\t\t<br>[SF소설]<br>\t\t\t<br><프랑켄슈타인> / 메리 셀리<br>\t\t\t<br><아이, 로봇> / 아이작 아시모프<br>\t\t\t<br><안드로이드는 전기양의 꿈을 꾸는가?> / 필립 K. 딕<br>\t\t\t<br><뉴로맨서> / 윌리엄 깁슨<br>\t\t\t<br><br>\t\t\t출처: <<a href=\"http://trevari.co.kr/clubs/80\" target=\"_blank\">http://trevari.co.kr/clubs/80</a>> <br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br>부동산<br>\t\t\t<br>[첫 책]<br>\t\t\t<br><노후를 위해 집을 이용하라> / 백원기<br>\t\t\t<br>: 이 책에서 관심가는 사항들에 대해서 얘기해보고, 또 첫 모임에서 서로 갖는 관심사를 모아보고, 읽을 책/토론 내용과 주제를 정해보려고 합니다.<br>\t\t\t<br><br>\t\t\t<br>[추후 예상 도서]<br>\t\t\t<br>1) 소형 아파트 빌라 투자, 3년이 기회다.<br>\t\t\t<br>2) 부동산은 끝났다<br>\t\t\t<br>3) 공간의 가치<br>\t\t\t<br>4) 뉴스테이 시대, 사야 할 집 팔아야 할 집<br>\t\t\t<br>5) 나는 부동산 싸게 사기로 했다 등<br>\t\t\t<br><br>\t\t\t출처: <<a href=\"http://trevari.co.kr/clubs/246\" target=\"_blank\">http://trevari.co.kr/clubs/246</a>> <br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br>스타트업<br>\t\t\t<br>[첫 책]<br>\t\t\t<br><참여감> / 리완창 : 샤오미의 철학과 전략, 그리고 조직문화<br>\t\t\t<br><br>\t\t\t<br>[그 외 함께 읽으면 좋을 것 같은 책들]<br>\t\t\t<br>​- 브랜딩&마케팅: <그로스해킹>, <좋아보이는 것들의 비밀>, <지적 자본론>, <배민다움><br>\t\t\t<br>- 인사: <구글의 아침은 자유가 시작된다><br>\t\t\t<br>- 경영: <넷플릭스 스타트업의 전설>, <아마존-세상의 모든것을 팝니다>, <라이프 스타일을 팔다>, <구글은 어떻게 일하는가>, <오리지널스>, <온라인 소비자 무엇을 사고 무엇을 사지 않는가><br>\t\t\t<br>- 기업가정신: <일론 머스크>, <스티브 잡스>, <손정의의 참모><br>\t\t\t<br>- 리스크관리: <스타벅스 온워드><br>\t\t\t<br>- 트렌드:&#160;, <트렌드코리아 2017><br>\t\t\t<br><br>\t\t\t출처: <<a href=\"http://trevari.co.kr/clubs/146\" target=\"_blank\">http://trevari.co.kr/clubs/146</a>> <br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br>파는 인간<br>\t\t\t<br>무슨 책을 읽나욥?<br>\t\t\t<br>첫 책<br>\t\t\t<br><파는 것이 인간이다> / 다니엘 핑크<br>\t\t\t<br>술술 읽히는 책입니다. 설득과 세일즈에 대해 많은 것을 생각하게 합니다.<br>\t\t\t<br><br>\t\t\t<br>[예상 도서 리스트]<br>\t\t\t<br><br>\t\t\t<br><나는 세계일주로 경제를 배웠다> / 코너 우드먼<br>\t\t\t<br>동명의 다큐가 유명한 책입니다. 읽으면 괜히 열정이 생기는 것 같고, 무작정 떠나고 싶어지고, 무엇보다 재밌습니다. B2C 비즈니스에 대한 인사이트를 얻을 수 있습니다.<br>\t\t\t<br><br>\t\t\t<br><스틱> / 칩, 댄 힙스<br>\t\t\t<br>이 분야의 고전! 메시지를 다듬어 무언가를 제안한다는 것에 대해 나눌 이야기들이 많아질 겁니다.<br>\t\t\t<br><br>\t\t\t<br><하버드 창업가 바이블> / 다니엘 아이젠버그<br>\t\t\t<br>스타트업의 시대, 혁신의 시대. 시대가 변한 만큼 의사결정과 실행의 방식도 달라져야 합니다. 풍부한 사례를 중심으로 하는 책.<br>\t\t\t<br><br>\t\t\t<br><어떻게 원하는 것을 얻는가> / 스튜어트 다이아몬드<br>\t\t\t<br>명언제조기 스튜어트 다이아몬드 교수님 가라사대, '협상은 이런 것이다!'<br>\t\t\t<br><br>\t\t\t<br><사라진 실패> / 신기주<br>\t\t\t<br>국내 기업의 실패사례들을 분석한 책. 때로는 실패에서 배우는 게 더 많을 수도 있습니다.<br>\t\t\t<br><br>\t\t\t<br><장사의 시대> / 필립딜브스 브러턴<br>\t\t\t<br><br>\t\t\t출처: <<a href=\"http://trevari.co.kr/clubs/105\" target=\"_blank\">http://trevari.co.kr/clubs/105</a>> <br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br>취향<br>\t\t\t<br>무슨 책을 읽나욥?<br>\t\t\t<br>[첫 책]<br>\t\t\t<br><br>\t\t\t<br><취향의 탄생 (마음을 사로잡는 것들의 비밀)> / 톰 밴더빌트<br>\t\t\t<br><a href=\"http://book.naver.com/bookdb/book_detail.nhn?bid=11363627\" target=\"_blank\">http://book.naver.com/bookdb/book_detail.nhn?bid=11363627</a><br>\t\t\t<br><br>\t\t\t<br>: “소소하고 평범한 선택이 모여 우리 일상을 지배한다. 별것 아닌듯하지만 잘못 고르면 불쾌함을 느끼게 되는 문제들이다. 한편 우리가 지닌 기호는 자신이 누구인지를 알려주는 좀 더 폭넓고 심오한 취향으로 발전한다. ‘좋아하는 것’은 자신의 정체성을 파악하고 드러내며, 다른 사람을 이해하는 가장 손쉬운 방법이다.”<br>\t\t\t<br><br>\t\t\t<br>[그 외 함께 읽을 책들]<br>\t\t\t<br><br>\t\t\t<br><아수라장의 모더니티> / 박해천<br>\t\t\t<br><a href=\"http://book.naver.com/bookdb/book_detail.nhn?bid=9649856\" target=\"_blank\">http://book.naver.com/bookdb/book_detail.nhn?bid=9649856</a><br>\t\t\t<br><br>\t\t\t<br>: 20세기 한국에서 태어나 21세기를 살고 있는 우리의 시각 감각은, 어디에서 어떻게 나타난 걸까요?<br>\t\t\t<br><br>\t\t\t<br><약한 연결 - 검색어를 찾는 여행> / 아즈마 히로키<br>\t\t\t<br><a href=\"http://book.naver.com/bookdb/book_detail.nhn?bid=11462950\" target=\"_blank\">http://book.naver.com/bookdb/book_detail.nhn?bid=11462950</a><br>\t\t\t<br><br>\t\t\t<br>: 취향에 대한 이야기는 결국 ‘나’에 관한 이야기입니다. 빅데이터와 검색어로 규정된 ‘나’를 벗어나 볼까요?<br>\t\t\t<br><br>\t\t\t출처: <<a href=\"http://trevari.co.kr/clubs/248\" target=\"_blank\">http://trevari.co.kr/clubs/248</a>> <br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br>도시<br>\t\t\t<br>[첫 책]<br>\t\t\t<br><br>\t\t\t<br><도시의 승리> / 에드워드 글레이져 : 현대 도시의 과거,현재,미래에 대한 논리적인 정리<br>\t\t\t<br><br>\t\t\t<br>[그 외 함께 읽으면 좋을 것 같은 책들]<br>\t\t\t<br><br>\t\t\t<br>1) 도시<br>\t\t\t<br><br>\t\t\t<br><서울 도시계획이야기> / 손정목 : 사연있는 서울의 공간사<br>\t\t\t<br><도시와 창조계급> / 리처드플로리다 : 창조계급이 도시를 부흥시킨다는 논쟁적인 책을 읽으며 ‘창조경제’ 다시 생각해보기<br>\t\t\t<br><도시해킹> / 브래들리L 개럿 : 허용되지 않은 공간을 탐험하는 문화인류학자의 탐험기<br>\t\t\t<br><뜨는 동네의 딜레마, 젠트리피케이션> / DW 깁슨 : 개발업자와 주민의 말을 각각 직접 들어보는 인터뷰 형식이 인상적인 책<br>\t\t\t<br><우리는 도시에서 행복한가> / 찰스 몽고메리 : 차에게 자리를 내준 요즘의 일상 공간, 행복하세요?<br>\t\t\t<br><br>\t\t\t<br>2) 부동산<br>\t\t\t<br><br>\t\t\t<br><확률가족> / 박해천 : 부모님과 나의 출생년도를 넣으면 그럴듯한 이야기를 들려줌. 사주팔자같은 신박한 주거사의 매트릭스<br>\t\t\t<br><br>\t\t\t<br>3) 스토리 텔링의 배경이 된 공간들<br>\t\t\t<br><br>\t\t\t<br><맛집폭격> / 배명훈 : 먹방이나 이 소설이나 맛집을 폭격시키기는 매한가지!&#160;<br>\t\t\t<br><내 방 여행> / 자비에르 드 메스트르 : 와식 생활을 즐긴다는 조정치님을 떠올리며..<br>\t\t\t<br><br>\t\t\t<br>4) 도시의 요소들<br>\t\t\t<br><br>\t\t\t<br><편의점 사회학> / 전상인 : 하루 평균 880만 명이 356억 원을 거래하는 대한민국의 편의점<br>\t\t\t<br><소매업 성공전략> / 아서 루빈펠드 : 스타벅스의 부동산 전략<br>\t\t\t<br><d&depratment style=\"box-sizing: initial; color: rgb(51, 51, 51); font-family: \"Helvetica Neue\", Helvetica, Arial, sans-serif; font-size: 14px; font-style: normal; font-variant-ligatures: normal; font-variant-caps: normal; font-weight: normal; letter-spacing: normal; orphans: 2; text-align: start; text-indent: 0px; text-transform: none; white-space: normal; widows: 2; word-spacing: 0px; -webkit-text-stroke-width: 0px; background-color: rgb(255, 255, 255);\">/ 나가오카 겐메이 : 큐레이션 소매점 이야기</d&depratment><br>\t\t\t<br><br>\t\t\t출처: <<a href=\"http://trevari.co.kr/clubs/106\" target=\"_blank\">http://trevari.co.kr/clubs/106</a>> <br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br>초협력자<br>\t\t\t<br><이타적 인간의 출현><br>\t\t\t<br><이기적 유전자> : 유전자가 이기적이라면, 유전자의 운반체인 우리는 왜 협력하는가?<br>\t\t\t<br><협력의 진화> : 명료한 질문으로 출발하는 고전인데, 심지어 잘 읽힌다.<br>\t\t\t<br><초협력자> : 우리 시대 연구자들이 이 주제를 어디까지 밀어붙였는지 보려면<br>\t\t\t<br><바른 마음> : 아주 비도덕적인 질문을 자유자재로 구사하는 도덕심리학자의 멋진 책<br>\t\t\t<br><옳고 그름> : 부족적 협력의 비극과 그 극복에 대하여<br>\t\t\t<br><나홀로 볼링> : 사회적 자본의 생성과 소멸<br>\t\t\t<br><전쟁의 역설> <우리 본성의 선한 천사> : 빅히스토리 - 협력은 어떻게 승리했는가<br>\t\t\t<br><문명의 붕괴> : 빅히스토리 - 협력은 어떻게 패배했는가<br>\t\t\t<br><제국의 탄생> : 협력은 제국도 만들어낸다<br>\t\t\t<br><국가는 왜 실패하는가 > <승리 이후> <정치 질서의 기원> : 협력 친화형 제도의 탄생<br>\t\t\t<br><공유의 비극을 넘어서> : 다른 방식도 가능하다<br>\t\t\t<br><전쟁 총 투표> : 리더십은 공공재다<br>\t\t\t<br><br>\t\t\t<br>역사<br>\t\t\t<br><중앙은행 별곡> / 차현진&#1 let cards = [];
let moving = null, resizing = null;

function loadBoard() {
  const saved = localStorage.getItem(SAVE_KEY);
  cards = saved ? JSON.parse(saved) : DEFAULT_CARDS.map(c => ({...c}));
  renderCards();
  if (!saved) autoLayout();
}

function autoLayout() {
  const GAP = 14;
  const boardW = document.getElementById('board').offsetWidth;
  const cols = Math.max(1, Math.floor(boardW / 280));
  const colW = (boardW - GAP * (cols - 1)) / cols;
  const colHeights = new Array(cols).fill(0);
  const allCards = document.querySelectorAll('.card');
  const images = document.querySelectorAll('.card img');
  let loaded = 0;
  const total = images.length;

  function place() {
    allCards.forEach((el, i) => {
      const card = cards[i];
      const w = Math.min(card.w || colW, colW);
      let minCol = 0;
      for (let c = 1; c < cols; c++) if (colHeights[c] < colHeights[minCol]) minCol = c;
      card.x = minCol * (colW + GAP);
      card.y = colHeights[minCol];
      card.w = w;
      el.style.left = card.x + 'px';
      el.style.top = card.y + 'px';
      el.style.width = w + 'px';
      colHeights[minCol] = card.y + el.offsetHeight + GAP;
    });
    document.getElementById('board').style.minHeight = Math.max(...colHeights) + 100 + 'px';
    saveBoard();
  }

  if (total === 0) requestAnimationFrame(place);
  else images.forEach(img => {
    if (img.complete) { loaded++; if (loaded >= total) requestAnimationFrame(place); }
    else img.onload = img.onerror = () => { loaded++; if (loaded >= total) requestAnimationFrame(place); };
  });
}

function syncText() {
  document.querySelectorAll('.card').forEach(el => {
    const idx = +el.dataset.idx;
    if (cards[idx]?.type === 'text') {
      const t = el.querySelector('.text');
      if (t) cards[idx].content = t.innerHTML;
    }
  });
}

function saveBoard() {
  syncText();
  localStorage.setItem(SAVE_KEY, JSON.stringify(cards));
  document.getElementById('status').textContent = '저장됨 ' + new Date().toLocaleTimeString();
}

function renderCards() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  cards.forEach((card, i) => {
    const el = document.createElement('div');
    el.className = 'card';
    el.dataset.idx = i;
    if (card.x !== undefined) el.style.left = card.x + 'px';
    if (card.y !== undefined) el.style.top = card.y + 'px';
    if (card.w) el.style.width = card.w + 'px';

    el.addEventListener('mousedown', e => {
      if (e.target.closest('.text, a, .card-btn, .resize-handle, table')) return;
      e.preventDefault();
      moving = { idx: i, startX: e.clientX, startY: e.clientY, origX: card.x || 0, origY: card.y || 0 };
      el.classList.add('moving');
    });

    const actions = document.createElement('div');
    actions.className = 'card-actions';
    const delBtn = document.createElement('button');
    delBtn.className = 'card-btn'; delBtn.textContent = '×';
    delBtn.onclick = e => { e.stopPropagation(); if (confirm('삭제?')) { cards.splice(i, 1); renderCards(); saveBoard(); } };
    actions.appendChild(delBtn);
    el.appendChild(actions);

    if (card.type === 'text') {
      const text = document.createElement('div');
      text.className = 'text';
      text.contentEditable = true;
      text.innerHTML = card.content || '';
      text.addEventListener('blur', () => { card.content = text.innerHTML; saveBoard(); });
      el.appendChild(text);
    } else if (card.type === 'image') {
      const src = card.src.startsWith('http') || card.src.startsWith('data:') ? card.src : IMG_BASE + card.src;
      const img = document.createElement('img');
      img.src = src;
      img.alt = card.alt || '';
      img.loading = 'lazy';
      img.onerror = () => img.style.display = 'none';
      if (card.link) {
        const a = document.createElement('a'); a.href = card.link; a.target = '_blank';
        a.appendChild(img); el.appendChild(a);
      } else { el.appendChild(img); }
      if (card.caption) {
        const cap = document.createElement('div');
        cap.className = 'caption';
        cap.textContent = card.caption;
        el.appendChild(cap);
      }
    } else if (card.type === 'table') {
      const wrapper = document.createElement('div');
      wrapper.style.overflowX = 'auto';
      wrapper.innerHTML = card.html || '';
      el.appendChild(wrapper);
    }

    const rh = document.createElement('div');
    rh.className = 'resize-handle';
    rh.addEventListener('mousedown', e => {
      e.preventDefault(); e.stopPropagation();
      resizing = { idx: i, startX: e.clientX, startW: card.w || el.offsetWidth };
    });
    el.appendChild(rh);
    board.appendChild(el);
  });

  requestAnimationFrame(() => {
    let maxBottom = 0;
    document.querySelectorAll('.card').forEach(el => {
      const b = (parseFloat(el.style.top) || 0) + el.offsetHeight;
      if (b > maxBottom) maxBottom = b;
    });
    board.style.minHeight = (maxBottom + 100) + 'px';
  });
}

document.addEventListener('mousemove', e => {
  if (moving) {
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`);
    if (!el) return;
    const nx = moving.origX + e.clientX - moving.startX;
    const ny = moving.origY + e.clientY - moving.startY;
    el.style.left = nx + 'px';
    el.style.top = ny + 'px';
  }
  if (resizing) {
    const card = cards[resizing.idx];
    card.w = Math.max(100, resizing.startW + e.clientX - resizing.startX);
    const el = document.querySelector(`.card[data-idx="${resizing.idx}"]`);
    if (el) el.style.width = card.w + 'px';
  }
});

document.addEventListener('mouseup', e => {
  if (moving) {
    const card = cards[moving.idx];
    card.x = Math.max(0, moving.origX + e.clientX - moving.startX);
    card.y = Math.max(0, moving.origY + e.clientY - moving.startY);
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`);
    if (el) { el.classList.remove('moving'); }
    moving = null; saveBoard();
  }
  if (resizing) { resizing = null; saveBoard(); }
});

function addTextCard() {
  cards.push({ type: 'text', content: '', x: 50, y: window.scrollY + 100, w: 300 });
  renderCards();
  setTimeout(() => { const els = document.querySelectorAll('.card .text'); els[els.length - 1]?.focus(); }, 100);
}

function addImageCard() {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = 'image/*';
  input.onchange = e => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = () => { cards.push({ type: 'image', src: reader.result, x: 50, y: window.scrollY + 100, w: 240 }); renderCards(); saveBoard(); };
    reader.readAsDataURL(file);
  };
  input.click();
}

function resetLayout() {
  if (!confirm('자동 재배치합니다. 현재 위치가 변경됩니다.')) return;
  cards.forEach(c => { delete c.x; delete c.y; });
  renderCards(); autoLayout();
}

setInterval(saveBoard, 30000);
loadBoard();
</script>
</body>
</html>
