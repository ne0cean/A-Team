<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hidden potential</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #1e1e1e;
  color: #e0e0e0;
  font-family: 'Segoe UI', -apple-system, sans-serif;
  font-size: 15px;
  line-height: 1.6;
  padding: 20px 30px 60px;
  overflow-x: hidden;
}
a { color: #6cb0f6; text-decoration: none; }
a:hover { text-decoration: underline; }
.title-bar {
  background: #3a3a5c;
  display: inline-block;
  padding: 6px 16px;
  font-size: 22px;
  font-weight: bold;
  color: #fff;
  margin-bottom: 4px;
}
.date { color: #999; font-size: 13px; margin-bottom: 20px; }
.board { position: relative; }
.card {
  background: #2a2a2a;
  border: 1px solid #3a3a3a;
  border-radius: 8px;
  padding: 12px;
  position: absolute;
  cursor: grab;
  transition: box-shadow 0.15s;
  overflow: hidden;
}
.card:hover { box-shadow: 0 0 0 1px #58a6ff; z-index: 10; }
.card.moving { opacity: 0.8; box-shadow: 0 4px 24px rgba(0,0,0,0.6); z-index: 100; cursor: grabbing; }
.card img { width: 100%; border-radius: 4px; display: block; }
.card .caption { font-size: 12px; color: #888; margin-top: 6px; }
.card .text { outline: none; min-height: 20px; white-space: pre-wrap; word-break: break-word; }
.card .text:focus { background: rgba(255,255,255,0.05); border-radius: 4px; padding: 4px; }
.card .text:empty::before { content: '텍스트 입력...'; color: #555; }
.card table { border-collapse: collapse; width: 100%; font-size: 13px; }
.card table td, .card table th { border: 1px solid #444; padding: 4px 8px; vertical-align: top; }
.card table th { background: #333; color: #ccc; }
.card-actions { position: absolute; top: 4px; right: 4px; display: none; gap: 4px; }
.card:hover .card-actions { display: flex; }
.card-btn { background: #333; border: 1px solid #555; color: #ccc; border-radius: 4px; padding: 2px 6px; font-size: 11px; cursor: pointer; }
.card-btn:hover { background: #444; color: #fff; }
.resize-handle { position: absolute; bottom: 0; right: 0; width: 16px; height: 16px; cursor: se-resize; opacity: 0; }
.card:hover .resize-handle { opacity: 0.6; }
.resize-handle::after { content: ''; position: absolute; bottom: 3px; right: 3px; width: 8px; height: 8px; border-right: 2px solid #666; border-bottom: 2px solid #666; }
.toolbar { position: fixed; bottom: 0; left: 0; right: 0; background: #161b22; border-top: 1px solid #30363d; padding: 8px 20px; display: flex; gap: 12px; align-items: center; z-index: 200; }
.toolbar button { background: #21262d; border: 1px solid #30363d; color: #e0e0e0; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; }
.toolbar button:hover { background: #30363d; }
.toolbar .status { color: #8b949e; font-size: 12px; margin-left: auto; }
.highlight-red { color: #ff6b6b; }
.highlight-blue { color: #6cb0f6; }
</style>
</head>
<body>
<div class="title-bar">Hidden potential</div>

</div>
<script>
const SAVE_KEY = 'board-Hidden-potential';
const IMG_BASE = '../../../attachments/';
const DEFAULT_CARDS = [
  {
    "type": "text",
    "content": "Hidden potential<br>\t\t<br>\t\t<br>\t<br>\t<br>\t\t<br>\t\t\t<br>숨은 짐재력을 실현하는<br>\t\t\t<br>효과적인 행동 지침<br>\t\t\t<br>여러분의 숨은 잠재력에 대한 퀴즈를 풀고 싶다면 wwwadam-<br>\t\t\t<br>grant.net을 방문하라.<br>\t\t\t<br>우리가 지식을 습득한다고 해서 학습 과정이 끝나지는 않는다. 우<br>\t\t\t<br>리가 습득한 지식을 끊임없이 응용할 때 비로소 학습 과정은 완성<br>\t\t\t<br>된다. 숨은 잠재력을 발휘하고 원대한 목표를 달성하기 위해 참고<br>\t\t\t<br>할 만한 실용적인 40가지 요점을 아래에 정리했다.<br>\t\t\t<br>1. 품성 기량을 키워라<br>\t\t\t<br>1. 품성기량을통해 숨은 잠재력을 발휘하라. 가장 성장하는 사람<br>\t\t\t<br>들은 가장 똑똑한 사람들이 아니다. 자기 자신과 다른사람들<br>\t\t\t<br>율 더 똑똑하게 만들려고 애쓰는 사람들이 가장 똑똑한 사람<br>\t\t\t<br>들이다. 기회가 문을 두드리지 않으면 문을 만들 방법울 찾아<br>\t\t\t<br>라. 아니면 창문을 만들어 들어오게 하든가<br>\t\t\t<br>A 불편함에 익숙해져라<br>\t\t\t<br>2 새로운 시도를 겹내지 마라. 여러분이 좋아하는 학습 방식에 집<br>\t\t\t<br>중하기보다 방식을 과제에 맞추는 불편합을 반아들여라. 읽기<br>\t\t\t<br>와쓰기는 비판적 사고를<br>\t\t\t<br>기르는 최고의 방법이다.<br>\t\t\t<br>경청은정<br>\t\t\t<br>서와 감정을 이해하는 데 이상적이고,<br>\t\t\t<br>실천은 정보를 기억하<br>\t\t\t<br>는 홀륭한 방법이다.<br>\t\t\t<br>3, 해보지않으면얻는게 전허 없음을 기억하라.<br>\t\t\t<br>준비됐디는 생각<br>\t\t\t<br>이 들기 전에 실전에 뛰어들라. 여러분의 기량을 연습하기전<br>\t\t\t<br>에 편안함을 느껴야 할 필요가 없다. 여러분이 기량을 연습합<br>\t\t\t<br>에 따라 편안한 느낌도 생긴다. 다언어 구사자들이 보여주듯<br>\t\t\t<br>이. 전문가조차도 바닥부터 시작해야 한다.<br>\t\t\t<br>4 불편합을 추구하라. 그저 배우려고만 하지 말고 불편한 느김<br>\t\t\t<br>을 폭표로 삼아라. 불편합율 주구하면 더 빨리 성장할길이<br>\t\t\t<br>열린다. 제대로 하고 싶다면 우선 불편하다는 느낌이 들어야<br>\t\t\t<br>한다.<br>\t\t\t<br>5. 실수를 허용하라. 시행착오를 권장하기 위해서 여러분이 하루<br>\t\t\t<br>또는 일주일에 최소한 몇 번실수를 허용할지 목표를 세위라.<br>\t\t\t<br>실수하리라고 예상하면 실수에 크게 집착하지 얇게 되고 한<br>\t\t\t<br>총더개선된다.<br>\t\t\t<br>B.스펀지가되어라<br>\t\t\t<br>6, 훔수하는 역량을 키위라. 새로운 지식, 새로운 기량, 새로운 관<br>\t\t\t<br>점을 물색해 (여러분의 자아가 아니라) 여러분의 성장에 자양분<br>\t\t\t<br>을 공급하라. 진전은 여러분이 물색하는 정보의 양이 아니라<br>\t\t\t<br>여러분이 흡수하는 정보의 질에 좌우된다.<br>\t\t\t<br>7. 피드백이 아니라조언을 구하라. 피드백은 과거 지향적이다. 사<br>\t\t\t<br><br>\t\t\t<br>랍들이 여러분을 비판하거나 응원하게 된다. 조언은 미래 지<br>\t\t\t<br>향적이다. 사람들이 어러분을 지도하게 된다. \"다음번에 내가<br>\t\t\t<br>더 잘할 수 있는 게 한 가지 있다면 뭘까요?\"라는 단순한 질문<br>\t\t\t<br>을 하면 여러분을 비판하는 사람들과 응원하는 사람들이 모<br>\t\t\t<br>두 코치 역할을 하게 된다.<br>\t\t\t<br>신뢰할 대상을 잘 선택하라. 어떤 정보가 흡수할 가치가 있는지<br>\t\t\t<br>(그리고 어떤 정보를 걸러내야 할지) 잘 판단하라. 해당 분야에 전<br>\t\t\t<br>문성이 있고(신뢰도), 여러분을 잘 알고(친숙함), 여러분이 잘되<br>\t\t\t<br>기를 바라는(아낌, 애정) 코치들의 말을 경청하라.<br>\t\t\t<br>여러분 자신에게 있었으면 하는 코치가 되어라. 정직은 가장 고<br>\t\t\t<br>차원적인 충정의 표현이다. 솔직하게 그리고 상대방에 대한<br>\t\t\t<br>존중이 담긴 방식으로 말함으로써 효과적인 코칭의 본보기가<br>\t\t\t<br>되어라. 사람들에게 그들의 잠재력을 믿는 사람에게서 엄연한<br>\t\t\t<br>진실을 듣는 게 얼마나 쉬운지 보여줘라.<br>\t\t\t<br>8.<br>\t\t\t<br>9.<br>\t\t\t<br>C.불완전주의자가 되어라<br>\t\t\t<br>10. 완벽함이 아니라 타월함을 추구하라. 진전은 결함을 모조리 제<br>\t\t\t<br>거하면 이뤄지는 게 아니라 높은 기준을 유지하면 이뤄진다.<br>\t\t\t<br>여러분이 받아들일 수 있는 결함을 찾아냄으로써 불완전함 속<br>\t\t\t<br>의 아름다움을 기리는 기술인 와비사비를 실천하라. 여러분이<br>\t\t\t<br>최고를 추구해야 할 부분과 그만하면 충분한 선에서 타협할<br>\t\t\t<br>수있는 부분을 구분하라. 에릭 베스트가 제안한 다음과 같은<br>\t\t\t<br>질문들로써 스스로 얼마나 성장했는지 가능하라. 오늘더 나<br>\t\t\t<br>오늘 누군가를 더 나은 사람으로 만들었나?<br>\t\t\t<br>은내가 되었나?<br>\t\t\t<br>숨은 잠재력을 실현하는 효과적인 행동 지침<br>\t\t\t<br>11. 여러분의 진전음 평가할 사람들을 선정하라. 여러분이 최소한<br>\t\t\t<br>의 호웅을 얻을 만한 성과를 냈는지 알아보려면, 몇 사람에게<br>\t\t\t<br>개별적으로 자신이 이륜 성파에 대해 0부터 10까지의 점수를<br>\t\t\t<br>매겨 달라고 하라. 여러분이 몇 점을 반든지 상관없이 10점에<br>\t\t\t<br>가까위지려면 어떻게 해야 할치 그들에게 물어보라. 목포로<br>\t\t\t<br>삼는 결과와 받아들일 만한 수준의 결과를 설정하라. 그리고<br>\t\t\t<br>여러분이 우선시하는 부분에서 높은 점수를 받으려면 우선순<br>\t\t\t<br>위가 낮은 다른 부분에서는 그보다 낮은 접수에 만족해야 한<br>\t\t\t<br>다는 점을 명심하라.<br>\t\t\t<br>12 여러분 스스로 최종 심판관이 되어라. 여러분 자신을 실망시키<br>\t\t\t<br>기보다 남을 실망시키는 게 낫다. 여러분이 만든 결과물을 세<br>\t\t\t<br>상에 공개하기 전에 그 결과물이 여러분을 잘 대표하는지 평<br>\t\t\t<br>가하라. 그 결과물이 다른 사람들이 여러분을 판단할 유일한<br>\t\t\t<br>근거라면, 여러분은 그 결과물에 자부심을 느끼겠는가?<br>\t\t\t<br>13. 정신적 시간 여행을 떠나라. 여러분이 진전을 이룬다는 생각이<br>\t\t\t<br>들지 않을 때는 과거의 자신이, 현재의 내가 이룬 성과를어<br>\t\t\t<br>땡게 불지 생각해보라.5년 전의 여러분이 지금의 여러분만큼<br>\t\t\t<br>성취할줄 알았다면 여러분은 자부심을 느꼈겠는가?<br>\t\t\t<br>I. 임시 구조물을 구축해 장애물을 극복하라<br>\t\t\t<br>14. 알맞은 지원을 적시에 외부에서 찾아라. 어떤 난관이든 그 난관<br>\t\t\t<br>을 극복하려면 난관에 적합한 지원이 필요하다. 여러분이 필<br>\t\t\t<br>요한 지원은 영구적이지 않다. 그것은 여러분이 혼자 힘으로<br>\t\t\t<br>올라가게 되기 전까지 발을 딘거나 여러분을 끌어 올려줄 임<br>\t\t\t<br>시구조물이다.<br>\t\t\t<br>A 실행을 놀이로 전환하라<br>\t\t\t<br>15. 따분하고 반복직인 일상을 즐거움의 원천으로 전환하라. 조화로<br>\t\t\t<br>운 열정을 유지하려면 계획적인 놀이를 중심으로 실행을 설<br>\t\t\t<br>계하라. 기량을 키우는 난관들을 재미있게 만들어라. 에벌린<br>\t\t\t<br>글레니가 드럼으로 바흐의 작품을 연습했듯이, 스테판 커리가<br>\t\t\t<br>1분 만에 21점을 득점하려고 했듯이, 그리고 병원 레지던트들<br>\t\t\t<br>이 비언어적 소통 기량을 키우기 위해서 즉홍 코미디 게임의<br>\t\t\t<br>무의미한 단어들을 이용했듯이 말이다.<br>\t\t\t<br>16. 여러분 자신과 경쟁하라. 경쟁자를 상대로 진전을 가는하지 말<br>\t\t\t<br>고 시간이 흐름에 따라 여러분이 진전을 이롯는지 가능하라.<br>\t\t\t<br>다른 사람들을 상대로 경쟁하면 여러분이 진전을 이루지않<br>\t\t\t<br>고도 이기는 위험에 처한다. 여러분이 자신과 경쟁하면 이길<br>\t\t\t<br>방법은 성장하는 방법뿐이다.<br>\t\t\t<br>17. 경직된 일상의 볼모가 되지 마라. 실행에 참신함과 다양함을 도<br>\t\t\t<br>입하면 심신 소진과 따분함을 방지할 수 있다. 여러분이 갈고<br>\t\t\t<br>닦는 다양한 기랑들을 번같아 연습하거나 그러한 기량울 습<br>\t\t\t<br>득하는 테 사용하는 도구와 방법을 바뀌보면 된다. 약간만 변<br>\t\t\t<br>화를 주어도 크게 달라진다.<br>\t\t\t<br>지치기 전에 휴식을 취하고 원기를 회복하라. 심신이<br>\t\t\t<br>시시이 소진되고<br>\t\t\t<br>18.<br>\t\t\t<br>따분해 죽을 지경이 될 때까지 참지 말고 휴식을 취하라. 휴식<br>\t\t\t<br>을 계획의 일환으로 만들어라. 휴식을 취하면 조화로운 열정<br>\t\t\t<br><br>\t\t\t<br>을 유지하고, 새로운 아이디어를 떠올리고,<br>\t\t\t<br>학습을 심화하는<br>\t\t\t<br>테 도움이 본다. 휴식은 시간 낭비가 아니다. 안녕과 복지에<br>\t\t\t<br>대한 투자다.<br>\t\t\t<br>B. 진전으로 가는 우회로를 택하라<br>\t\t\t<br>10. 제자리걸음을 할 때는 후퇴해야 전진할 수 있음을 명심하라. 막<br>\t\t\t<br>다른 골목에 다다르면 뒤돌아 나와서 새로운 길을 모색할 때<br>\t\t\t<br>가 됐을지도 모른다. 후퇴하는 느낌이 들겠지만 그게 앞으로<br>\t\t\t<br>나아가는길을 찾을 유일한 방법일 때가 종종 있다.<br>\t\t\t<br>20. 나침반을 찾아라. 새로운 길을 가기 위해 지도가 필요하지는<br>\t\t\t<br>않다. 나침반만 있으면 움은 방향으로 가고 있는지 가능할 수<br>\t\t\t<br>있다. 홀륭한 나침반은 여러분이 경로를 벗어나면 경고음을<br>\t\t\t<br>울려주는 신뢰할 만한 대상이다.<br>\t\t\t<br>21. 여러 명의 길잡이를 구하라. 단 한 명의 전문가나 멘토에게 의<br>\t\t\t<br>지하기보다 여러 명의 길잡이로부터 길 안내를 받는 게가장<br>\t\t\t<br>좋다. 그들에게 그들이 직접 떠난 여정에서 본 이정표와 전환<br>\t\t\t<br>점에 관해 물어보라. 그리고 그들에게 여러분이 지금까지 결<br>\t\t\t<br>어온 길에 대해 들려주어라. 길잡이들이 단서를 펼어뜨리면<br>\t\t\t<br>그 단서들을 조합해서 여러분에게 알맞은 길을 만들어라.<br>\t\t\t<br>22. 취미음 만들어라. 무기력중에 빠지면 새로운 목적지로 에돌러<br>\t\t\t<br>가는 방법으로씨 추진력을 얻을 수 있다. 부업이나 취미에서<br>\t\t\t<br>진전음 이무면 소소한 결십을 얻게 되고, 이는 여러분에게 앞<br>\t\t\t<br>으로 나아갈수 있다는 사실을 일깨위준다.<br>\t\t\t<br><br>\t\t\t<br>C. 자기 힘으로 날아라<br>\t\t\t<br>23. 여러분 자신이 배우고 싶은 바를<br>\t\t\t<br>남에게 가르쳐보라. 뭔가를 배<br>\t\t\t<br>우는 최고의 방범은 가르치는 방법이다. 핀가를 남이 알아든<br>\t\t\t<br>게 설명하고 나면 여러분 자신도 그 핀가를 더 잘 이해하계<br>\t\t\t<br>된다. 그리고 그 뭔가를 떠올린 후에는 그것이 더 생생하게기<br>\t\t\t<br>억에 남는다. 황금의 13인처럼 각 구성원이 나퍼지 구성원들<br>\t\t\t<br>에게 특정한 기량을 가르치거나 정보를 전해주는 등 집단 차<br>\t\t\t<br>원에서 할 수도 있다.<br>\t\t\t<br>24 다른 사람들을 지도함으로써 자신감을 얻어라. 여러분이 장애물<br>\t\t\t<br>을 극복하는 자신의 역량에 대한 의구심이 들면, 남에게 조언<br>\t\t\t<br>을 구하기보다 조언을 해라. 다른 사람이 난관을 극복하도록<br>\t\t\t<br>도우면 여러분 자신에게 그 난관을 극복할 역랑이 있다는 사<br>\t\t\t<br>실을 알게 된다. 여러분이 다른 사람에게 주는 조언이 보통여<br>\t\t\t<br>러분에게 필요한 조언이다.<br>\t\t\t<br>25. 여러분에 대한 높은 기대와 낮은 기대를 돌 다 동기 유발의 계기<br>\t\t\t<br>로 삼아라. 무지하면서 부정적인 견해를 지닌 사람들이 여러<br>\t\t\t<br>분의 역량을 의심한다면 이를 도전으로 여겨라. 그들이 여러<br>\t\t\t<br>분의 자신감을 뭉개도록 내버려두지 말고, 이를 그들이 들렸<br>\t\t\t<br>음율 증명할 기회로 삼아라. 그리고 여러분의 역량울 믿는 믿<br>\t\t\t<br>읍 만한 이들이 여러분을 웅원하면 분연히 멀쳐 일어나 그들<br>\t\t\t<br>26. 훌륭한 선례를 남겨라. 여러분의 믿음이 흔들리면 스스로 뭘<br>\t\t\t<br>이움음을 증명하라.<br>\t\t\t<br>위해 싸우는지 상기하라. 다른 사람이 여러분을 믿고 의지한<br>\t\t\t<br>다는 사실은 가장 깊은 인내와 회북 탄력성의 원천이다.<br>\t\t\t<br><br>\t\t\t<br>ll. 기회를 부여하는 체제를 구축하라<br>\t\t\t<br>27.<br>\t\t\t<br>과소핑가되고 간과된 사람들에게 문호를 개방하라.<br>\t\t\t<br>력이 큰 직원뿐만 아니라 모두에게 투자하고<br>\t\t\t<br>영재와잠재<br>\t\t\t<br>기회를 창출하<br>\t\t\t<br>는 체제를 구축하라. 과소평가된 약자와 대기만성인 이들이<br>\t\t\t<br>어떻게 장족외 발전읍 됐는지 보여줄 기회를 그들에게<br>\t\t\t<br>체제가바람직한 체제다.<br>\t\t\t<br>게 주는<br>\t\t\t<br>A 모든 학생이 자신이 지닌 최고의 기량을 발휘하도록<br>\t\t\t<br>학교를 설계하라<br>\t\t\t<br>2 단한명의 학생도 포기하지 마라. 지능은 여러 가지 형태를 띠<br>\t\t\t<br>고 모든 아이는 탁월한 잠재력을 지니고 있다는 사실을 인식<br>\t\t\t<br>하라. 최상위 학생들만 성공했다고 판단하지 말고 학생 하나<br>\t\t\t<br>하나가 얼마나 진전을 이릇는지로 성공을 가능하라.<br>\t\t\t<br>%. 교육에 전문가를 투입하라. 편란드의 사례를 쫓아 교사들을 믿<br>\t\t\t<br>을만한 전문가로 훈련하고 대우하라. 교사들이 최신 정보를<br>\t\t\t<br>접하고 유지하도록 권장하고, 교사들이 서로를 지도하는 교과<br>\t\t\t<br>과정을 만들면 차세대는 더 원대한 목포를 이롤 수 있다.<br>\t\t\t<br>30. 학생들을같은선생과 여러 해 동안 합께 보내게 하라. 관계 고리<br>\t\t\t<br>몇기리는 관행은 교사들이 자기 전문 분야팬만 아니라 자기<br>\t\t\t<br>가 가르치는 학생들에 대해서도 전문적인 지식울 얻도록 해<br>\t\t\t<br>준다. 교사들은 충분한 시간을 갖고각 학생을 잘 개인적으로<br>\t\t\t<br>알게 되므로, 학생의 코치와 멘토가 되어 모든 학생이 잠재력<br>\t\t\t<br>및 발휘하도록 맛춤형으로 지도하고<br>\t\t\t<br>정서적으로<br>\t\t\t<br>도음을주게<br>\t\t\t<br><br>\t\t\t<br>된다.<br>\t\t\t<br>31. 학생들에게<br>\t\t\t<br>학생 개인의 관심사를 탐색하고 나눌 자유를 부여하<br>\t\t\t<br>라,. 학생들에게 가르쳐야 할 가장 중요한 교훈은 배음이 줄건<br>\t\t\t<br>디는 사실이다. 학생들이 본인이 홍미를 느끼는, 현실 상황음<br>\t\t\t<br>재현한 환동이나 책 그리고 프로젝트를 선빅하게 하면 내재<br>\t\t\t<br>적인 동기 유발을 축진할 가능성이 휠선 크다. 학생들이 자기<br>\t\t\t<br>가 좋아하는 주제에 대해 발표하면 열정이 강화되고 갑은 반<br>\t\t\t<br>학우들이 그 열정을 포착할 기회가 열린다.<br>\t\t\t<br>B.팀에 내재된 집단지성을 발굴하라<br>\t\t\t<br>32. 집단을 팀으로 변모시켜라. 집단 지성은 결속력이 좌우한다.의<br>\t\t\t<br>미 있는 사명을 완수할 책임을 공유한다는 생각을 중심으로<br>\t\t\t<br>팀은 결속한다. 사람들이 중요한 목표를 달성하기 위해 서로<br>\t\t\t<br>가필요하다고 믿으면, 그들은 부분의 총합 이상이 된다.<br>\t\t\t<br>33. 친화적 기량을 토대로 지도자를 뱀아라. 목소리 큰 독불장군을<br>\t\t\t<br>승진시키기보다 자기 자존심보다 사명 완수를 우선시하는(그<br>\t\t\t<br>리고 개인적인 영예보다 팀의 결속력을 우선시하는) 사람들을 승격<br>\t\t\t<br>시켜라. 팀 구성원들이 서로 앞다뒤 자기 뮤을 하려고 한다면,<br>\t\t\t<br>이 팀의 가장 효과적인 지도자는 목소리가 가장 큰 사람이 아<br>\t\t\t<br>니라 남의 말을 가장 잘 경청하는 사람이다.<br>\t\t\t<br>34. 구두로 중지를 모0지 말고, 서면으로 독자적인 의견을 모아라.<br>\t\t\t<br>구성원들로 하여금 골고루 참여하게 하고 더 나은 해결책운<br>\t\t\t<br>찾으려면, 집단으로 모이기 전에 구성원들에게 독자적으로아<br>\t\t\t<br>이디어를 내고 평가하게 하라. 모든 아이디어가 제시되고<br>\t\t\t<br>.모<br>\t\t\t<br>든 구성원이 빠짐없이 모이면<br>\t\t\t<br>집단에게 가장 가땅 있는 아이<br>\t\t\t<br>디어를 선정하고 다듬게 하라.<br>\t\t\t<br>기업의 수직 구조를 격자 체제로 대체하라.<br>\t\t\t<br>35.<br>\t\t\t<br>단한 명의 상사가<br>\t\t\t<br>말 한마디로 부하 직원들의 제안율 묵살하기보다, 직원들에게<br>\t\t\t<br>자기 의견을 표명할 다양한 길율 열어주어라. 직원들이 한명<br>\t\t\t<br>이상의 상사에게 자기 의견을 개진할 기회를 얻으면, 한사람<br>\t\t\t<br>의 단 한마디 거절로 아이디어가 묵살되지 않는다. 그리고 단<br>\t\t\t<br>한사람만 숭인해도 그 아이디어를 건질 수 있다.<br>\t\t\t<br>C. 구직 면접과 대학입학사정에서 다듬지 않은 원석을 발견하라<br>\t\t\t<br>36. 학력과 경력 요구 사항을 철폐하라. 다른 사람들을 평가할 때는<br>\t\t\t<br>과거의 성과와 경험을 미래의 잠재력과 혼동하지 마라. 성장<br>\t\t\t<br>배경과 재능은 사람들의 출발점을 결정하지만, 품성 기량은<br>\t\t\t<br>그들이 얼마나 높이 오르게 될지를 결정한다.<br>\t\t\t<br>37. 난이도를 고려하라. 고군분투했다고 해서 반드시 역량이 부족<br>\t\t\t<br>하다는 뜻은 아니다. 대개 역경이 존재했음을 의미한다. 지원<br>\t\t\t<br>자가 직면해온 장애물을 반영하려면 지원자가 다닌 학교, 택<br>\t\t\t<br>한전공, 그리고 성장한 지역 공동체의 또래 집단 구성원들과<br>\t\t\t<br>지원자를 비교함으로써 그가 이룬 성과를 적합한 맥락에서<br>\t\t\t<br>평가해야 한다.<br>\t\t\t<br>38. 평가할 때는 케적을 이용하라. 최근의 성과나 평균적 성과를 평<br>\t\t\t<br>가하는 것만으로는 충분치 않다. 시간이 흐르면서 성과가 그<br>\t\t\t<br>려낸 궤적이 휠센 중요하다. 한 지원자가 그린 궤적이 상승체<br>\t\t\t<br>를 보인다면 이는 그 지원자가 역경을 극복했디는 단서다.<br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br>3%. 지원자가 성공하도록 면접 방식을 재설계하라. 지원자가 받는<br>\t\t\t<br>스트레스를 극대화하는 면접을 설계하지 말고, 지원자가 빛날<br>\t\t\t<br>기회를 조성하는 면접을 설계하라. 지원자가 좋아하는 대상을<br>\t\t\t<br>공유하고 그의 장점을 보여줄 기회를 부여하라. 그러고 나서<br>\t\t\t<br>그에게 면점 결과가 그의 역랑을 제대로 대표하는지 물어보<br>\t\t\t<br>라. 그리고 아니라면 그에게 다시 한번기회를 주어라.<br>\t\t\t<br>40. 성공을 새로이 규정하라. 가장 의미 있는 형테의 성과는 진전<br>\t\t\t<br>이다. 잠재력을 가능하는 궁극적인 지표는 얼마나 높은 곳까<br>\t\t\t<br>지 도달했는지가 아니라 얼마나 장족의 발전을 했는지(그리고<br>\t\t\t<br>다른 이들도 장족의 발전을 하도록 도왔는지)다.",
    "w": 400
  }
];

let cards = [];
let moving = null, resizing = null;

function loadBoard() {
  const saved = localStorage.getItem(SAVE_KEY);
  cards = saved ? JSON.parse(saved) : DEFAULT_CARDS.map(c => ({...c}));
  renderCards();
  if (!saved) autoLayout();
}

function autoLayout() {
  const GAP = 14;
  const boardW = document.getElementById('board').offsetWidth;
  const cols = Math.max(1, Math.floor(boardW / 280));
  const colW = (boardW - GAP * (cols - 1)) / cols;
  const colHeights = new Array(cols).fill(0);
  const allCards = document.querySelectorAll('.card');
  const images = document.querySelectorAll('.card img');
  let loaded = 0;
  const total = images.length;

  function place() {
    allCards.forEach((el, i) => {
      const card = cards[i];
      const w = Math.min(card.w || colW, colW);
      let minCol = 0;
      for (let c = 1; c < cols; c++) if (colHeights[c] < colHeights[minCol]) minCol = c;
      card.x = minCol * (colW + GAP);
      card.y = colHeights[minCol];
      card.w = w;
      el.style.left = card.x + 'px';
      el.style.top = card.y + 'px';
      el.style.width = w + 'px';
      colHeights[minCol] = card.y + el.offsetHeight + GAP;
    });
    document.getElementById('board').style.minHeight = Math.max(...colHeights) + 100 + 'px';
    saveBoard();
  }

  if (total === 0) requestAnimationFrame(place);
  else images.forEach(img => {
    if (img.complete) { loaded++; if (loaded >= total) requestAnimationFrame(place); }
    else img.onload = img.onerror = () => { loaded++; if (loaded >= total) requestAnimationFrame(place); };
  });
}

function syncText() {
  document.querySelectorAll('.card').forEach(el => {
    const idx = +el.dataset.idx;
    if (cards[idx]?.type === 'text') {
      const t = el.querySelector('.text');
      if (t) cards[idx].content = t.innerHTML;
    }
  });
}

function saveBoard() {
  syncText();
  localStorage.setItem(SAVE_KEY, JSON.stringify(cards));
  document.getElementById('status').textContent = '저장됨 ' + new Date().toLocaleTimeString();
}

function renderCards() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  cards.forEach((card, i) => {
    const el = document.createElement('div');
    el.className = 'card';
    el.dataset.idx = i;
    if (card.x !== undefined) el.style.left = card.x + 'px';
    if (card.y !== undefined) el.style.top = card.y + 'px';
    if (card.w) el.style.width = card.w + 'px';

    el.addEventListener('mousedown', e => {
      if (e.target.closest('.text, a, .card-btn, .resize-handle, table')) return;
      e.preventDefault();
      moving = { idx: i, startX: e.clientX, startY: e.clientY, origX: card.x || 0, origY: card.y || 0 };
      el.classList.add('moving');
    });

    const actions = document.createElement('div');
    actions.className = 'card-actions';
    const delBtn = document.createElement('button');
    delBtn.className = 'card-btn'; delBtn.textContent = '×';
    delBtn.onclick = e => { e.stopPropagation(); if (confirm('삭제?')) { cards.splice(i, 1); renderCards(); saveBoard(); } };
    actions.appendChild(delBtn);
    el.appendChild(actions);

    if (card.type === 'text') {
      const text = document.createElement('div');
      text.className = 'text';
      text.contentEditable = true;
      text.innerHTML = card.content || '';
      text.addEventListener('blur', () => { card.content = text.innerHTML; saveBoard(); });
      el.appendChild(text);
    } else if (card.type === 'image') {
      const src = card.src.startsWith('http') || card.src.startsWith('data:') ? card.src : IMG_BASE + card.src;
      const img = document.createElement('img');
      img.src = src;
      img.alt = card.alt || '';
      img.loading = 'lazy';
      img.onerror = () => img.style.display = 'none';
      if (card.link) {
        const a = document.createElement('a'); a.href = card.link; a.target = '_blank';
        a.appendChild(img); el.appendChild(a);
      } else { el.appendChild(img); }
      if (card.caption) {
        const cap = document.createElement('div');
        cap.className = 'caption';
        cap.textContent = card.caption;
        el.appendChild(cap);
      }
    } else if (card.type === 'table') {
      const wrapper = document.createElement('div');
      wrapper.style.overflowX = 'auto';
      wrapper.innerHTML = card.html || '';
      el.appendChild(wrapper);
    }

    const rh = document.createElement('div');
    rh.className = 'resize-handle';
    rh.addEventListener('mousedown', e => {
      e.preventDefault(); e.stopPropagation();
      resizing = { idx: i, startX: e.clientX, startW: card.w || el.offsetWidth };
    });
    el.appendChild(rh);
    board.appendChild(el);
  });

  requestAnimationFrame(() => {
    let maxBottom = 0;
    document.querySelectorAll('.card').forEach(el => {
      const b = (parseFloat(el.style.top) || 0) + el.offsetHeight;
      if (b > maxBottom) maxBottom = b;
    });
    board.style.minHeight = (maxBottom + 100) + 'px';
  });
}

document.addEventListener('mousemove', e => {
  if (moving) {
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`);
    if (!el) return;
    const nx = moving.origX + e.clientX - moving.startX;
    const ny = moving.origY + e.clientY - moving.startY;
    el.style.left = nx + 'px';
    el.style.top = ny + 'px';
  }
  if (resizing) {
    const card = cards[resizing.idx];
    card.w = Math.max(100, resizing.startW + e.clientX - resizing.startX);
    const el = document.querySelector(`.card[data-idx="${resizing.idx}"]`);
    if (el) el.style.width = card.w + 'px';
  }
});

document.addEventListener('mouseup', e => {
  if (moving) {
    const card = cards[moving.idx];
    card.x = Math.max(0, moving.origX + e.clientX - moving.startX);
    card.y = Math.max(0, moving.origY + e.clientY - moving.startY);
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`);
    if (el) { el.classList.remove('moving'); }
    moving = null; saveBoard();
  }
  if (resizing) { resizing = null; saveBoard(); }
});

function addTextCard() {
  cards.push({ type: 'text', content: '', x: 50, y: window.scrollY + 100, w: 300 });
  renderCards();
  setTimeout(() => { const els = document.querySelectorAll('.card .text'); els[els.length - 1]?.focus(); }, 100);
}

function addImageCard() {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = 'image/*';
  input.onchange = e => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = () => { cards.push({ type: 'image', src: reader.result, x: 50, y: window.scrollY + 100, w: 240 }); renderCards(); saveBoard(); };
    reader.readAsDataURL(file);
  };
  input.click();
}

function resetLayout() {
  if (!confirm('자동 재배치합니다. 현재 위치가 변경됩니다.')) return;
  cards.forEach(c => { delete c.x; delete c.y; });
  renderCards(); autoLayout();
}

setInterval(saveBoard, 30000);
loadBoard();
</script>
</body>
</html>
