    "content": "Metavers<br>\t\t<br>\t\t<br>\t<br>\t<br>\t\t<br>\t\t\t<br>\t\t\t\t<br>\t\t\t\t\t<br>△디지털 트윈에 활용하는 현실 기반 메타버스<br>\t\t\t\t\t<br>△소통에 중점을 두는 SNS형 메타버스<br>\t\t\t\t\t<br>△유희에 특화된 게임형 메타버스<br>\t\t\t\t\t<br>△업무에 활용하는 기업형 메타버스<br>\t\t\t\t\t<br>\t\t\t\t\t공간이,￼현실 중심인 가 가상 중심인가￼구현되는 정보가,￼외부 환경정보 중심인지 개인/개체 중심인지￼AR/VR, 라이프로깅/거울세계<br>\t\t\t\t<br>\t\t\t<br>\t\t\t<br>메타버스 기술은 3D MMORPG 기술과 똑같다. 3D 모델링, 클라이언트, 대규모 접속, 저사양 PC와 휴대폰 최적화<br>\t\t\t<br><br>\t\t\t<br>\t\t\t\t<br>\t\t\t\t\t엔비티<br>\t\t\t\t\t<br>시가총액\t2588.75억<br>\t\t\t\t\t<br>가상 부동산 세컨서울 서비스￼<a href=\"https://m.blog.naver.com/jyeon_0625/222608199309\" target=\"_blank\">https://m.blog.naver.com/jyeon_0625/222608199309</a><br>\t\t\t\t\t<br><a href=\"https://biz.chosun.com/stock/market_trend/2021/12/30/FYB6IIZOD5AJVPGX4MECIWZDO4/\" target=\"_blank\">https://biz.chosun.com/stock/market_trend/2021/12/30/FYB6IIZOD5AJVPGX4MECIWZDO4/</a><br>\t\t\t\t\t<br>\t\t\t\t<br>\t\t\t\t<br>\t\t\t\t\t가우디오랩<br>\t\t\t\t\t<br>메타버스 Short list<br>\t\t\t\t\t<br>메타버스 공간음향  <a href=\"https://gaudiolab.com/about-us/?lang=ko\" target=\"_blank\">https://gaudiolab.com/about-us/?lang=ko</a><br>\t\t\t\t\t<br>\t\t\t\t<br>\t\t\t<br>\t\t\t<br><br>\t\t\t<br>메타버스 투자검토건 3가지 발굴했어요.<br>\t\t\t<br>\t\t\t\t<br>\t\t\t\t\tB Haptics Co., Ltd<br>\t\t\t\t\t<br>촉각 인더스트리 <a href=\"http://economychosun.com/client/news/view.php?boardName=C00&page=1&t_num=13610908\" target=\"_blank\">http://economychosun.com/client/news/view.php?boardName=C00&page=1&t_num=13610908</a><br>\t\t\t\t\t<br> <a href=\"https://www.bhaptics.com/\" target=\"_blank\">https://www.bhaptics.com/</a><br>\t\t\t\t\t<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>Full body haptic solution<br>\t\t\t\t\t<br>비햅틱스는 촉각과 콘텐츠를 연결하는 자체 기술을 개발해 조끼, 토시 등 관련 제품을 VR게임방&#183;개인 등에게 파는 하드웨어 사업에 주력<br>\t\t\t\t\t<br>홀로게이트, 샌드박스 등 세계 유명 VR 프랜차이즈 대부분이 비햅틱스의 햅틱 조끼 ‘테크슈트’를 사용한다. 비햅틱스는 기술을 한국전자통신연구원, 기업 등에 파는 소프트웨어 사업도 한다.<br>\t\t\t\t\t<br><a href=\"https://biz.chosun.com/industry/company/2021/06/17/7DI7IAJOC5B7HEN7NQX2LM5SW4/\" target=\"_blank\">https://biz.chosun.com/industry/company/2021/06/17/7DI7IAJOC5B7HEN7NQX2LM5SW4/</a><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>ㅇ Financials<br>\t\t\t\t\t<br>자본금: 2억 1,663만원 (2020.12.31)<br>\t\t\t\t\t<br>매출액: 16억 4천만원 (2020.12.31)<br>\t\t\t\t\t<br>지난해 매출 16억원 중 90%는 해외에서 나왔다. 미국이 50%, 유럽이 25%다. 주목되는 점은 성장 속도다. 매출이 2018년 4억원에서 2019년 10억원으로 2.5배 늘어난 데 이어 지난해 신종 코로나 바이러스 감염증(코로나19) 국면에도 60% 이상 성장<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>2017년부터 본격적으로 햅틱 기기를 판매했다. 시장 성장이 기술 발전 속도를 쫓아오지 못하자 2018년 하반기부터 경쟁자가 알아서 사라졌다. 그러는 사이 비햅틱스는 2019년부터 제품 개선과 콘텐츠 파트너(게임사와 협업) 확장에 주력했다. 세계 주요 VR게임방에서 비햅틱스 테크슈트 주문량을 크게 늘리기 시작했다. 2019년까지만 해도 VR게임방 매출이 대부분이었다. 해외에서는 VR게임방이 한국에서보다 인기를 끌고 있다. 하지만 코로나19로 VR게임방이 문을 닫자 아케이드 매출 비중은 5분의 1로 줄었다. 대신 개인 고객이 크게 늘었다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>2020년 세계 최대 정보기술⋅가전 박람회 CES에서 좋은 반응을 얻으며 게임 업체들과의 콘텐츠 협업이 늘어난 게 촉매제 역할을 했다. 2019년에는 테크슈트가 지원하는 게임이 5개에 불과했지만, 지난해에는 47개로 급증했다. 올해 CES에서는 혁신상을 받고, 1분기까지 지원 게임이 61개로 늘었다. 닭이 먼저냐 달걀이 먼저냐인데, 적용되는 게임 수가 늘자 개인 고객이 늘었다. 게임의 현실감을 높이는 데 촉각이 필수적이기 때문이다. 가령 VR게임에서 뒤에서 누가 때리는 것은 청각과 시각으로는 표현해봐야 흔들리는 영상과 빨간 화면 정도다. 결국 VR과 메타버스를 완성하는 데 촉각, 햅틱 기술은 필수적이다. 한국과 달리 미국에서는 5가구 중 1가구는 VR 기기를 보유하고 있다. 콘텐츠가 충분하면 취미에 499달러를 쓸 만하지 않겠는가. 테크슈트는 영화를 볼 때, 음악을 들을 때도 몰입감을 높여준다.”<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>부품 수급을 크게 늘리기 쉽지 않은 상황<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>전 세계서 VR 콘텐츠와 협업한 햅틱 피드백을 실시간으로 주는 조끼를 판매하는 곳이 비햅틱스뿐이다. 방대한 데이터를 시청각과의 시차 없이 연동하는 게 핵심이다. 서브팩(Subpac), 우저(Woojer)는 촉감 조끼를 만들지만 소리의 주파수나 크기에 진동을 연동한다. 테슬라슈트(Teslasuit)는 전기로 자극을 준다. 비햅틱스는 게임사와 협업한 덕에 사용자가 콘텐츠를 즐길 때 보다 더 맥락에 맞게 작동<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>햅틱 기술에 전기, 압력도 있는데 왜 진동을 활용했나.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>“전기는 피부와 맞닿아야 하는데, 이 경우 옷을 벗고 기기를 장착해야 하는 번거로움이 있다. 압력을 느끼게 하려면 기기가 커진다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>소재지: 대덕2연구단지 대전 유성구 유성대로1689번길70, 3동 503호￼설립일: 2015. 5. 1.￼종업원수: 11명 (As of 2021) <a href=\"https://www.linkedin.com/company/bhaptics/people/\" target=\"_blank\">https://www.linkedin.com/company/bhaptics/people/</a>￼투자자: 3 Vive X(HTC Exclerator)￼CEO: Kiuk Gwak - Co-Founder & Chief Executive Officer<br>\t\t\t\t\t<br>Sangwon Choi - Co-Founder & Chief Technology Officer<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>Investor Name\tInvestor Type\tHolding\tInvestor Since\tParticipating Rounds\tContact Info<br>\t\t\t\t\t<br>Korea Technology Finance\tGovernment\t\t\t\t<br>\t\t\t\t\t<br>Vive X Accelerator\tAccelerator/Incubator\tMinority\t\t\t<br>\t\t\t\t\t<br>AJU IB Investment\tVenture Capital\tMinority<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>“누적 투자는 30억원 정도다. 대만 HTC가 개발한 VR 기기 제조사 ‘바이브’, 아주IB투자, 기술보증기금 등이 주요 투자사다.”<br>\t\t\t\t\t<br>코오롱이 '시드(초기자금)'를 만들어줬다.<br>\t\t\t\t\t<br>2017년 KST(한국과학기술지주)에서 프리A 규모의 투자금을 확보했다. 이어서 2019년 아주IB투자와 기술보증기금 등에서 20억 규모의 지분투자<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>장기적으로는 더 많은 신체부위에서 촉감을 느낄 수 있는 콘텐츠와 햅틱 기기를 개발하는 게 목표다. 단기적으로는 코로나19 때문에 미룬 PC방 렌털 사업을 재기하고자 한다. 매년 매출을 두 배 이상 늘리는 게 목표다. 올해도 무난히 이를 달성할 것이다.”<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>비햅틱스의 다음 목표는 PC와 콘솔 분야로 넓히는 것이다. 국내와 중국 시장을 겨냥해 PC방이나 콘솔 게임에서도 햅틱슈트를 입고 게임을 즐길 수 있도록 만든다. 또 넷플릭스, 디즈니플러스와 같은 OTT 플랫폼과 연계해 집에서도 4D 영화처럼 실감나는 영화를 즐길 수 있도록 만드는 것도 가능하다. <br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>'메타버스'가 부상하면서 함께 떠오르고 있는 VR을 활용한 소셜 네트워킹도 주력해야 할 사업 분야다. VR에서 만난 친구와 악수하거나, 대화를 할 때 촉각 기능을 넣는 것이다. 곽 대표는 \"미국에는 마인크래프트나 로블록스와 같은 큰 메타버스 플랫폼이 있다. 우리도 그런 메타버스 시스템 안에서 접목할 수 있는 기회를 끊임없이 찾고 있다\"고 포부를 밝혔다. <br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>비햅틱스 <a href=\"http://dreamusn.kr/Home/board/bbs/board.php?bo_table=The_Life&wr_id=20169&page=7\" target=\"_blank\">http://dreamusn.kr/Home/board/bbs/board.php?bo_table=The_Life&wr_id=20169&page=7</a><br>\t\t\t\t\t<br><a href=\"https://news.mt.co.kr/mtview.php?no=2021062316232255330\" target=\"_blank\">https://news.mt.co.kr/mtview.php?no=2021062316232255330</a><br>\t\t\t\t\t<br><a href=\"https://startup.kaist.ac.kr/ces2021%EC%9D%B4-%EC%A3%BC%EB%AA%A9%ED%95%9C-%EA%B8%B0%EC%97%85-vrar-%ED%96%85%ED%8B%B1%EC%88%98%ED%8A%B8%EC%9D%B8-%ED%83%9D%EC%88%98%ED%8A%B8%EB%A5%BC-%EB%A7%8C%EB%93%9C%EB%8A%94-%EA%B8%B0%EC%97%85/\" target=\"_blank\">https://startup.kaist.ac.kr/ces2021%EC%9D%B4-%EC%A3%BC%EB%AA%A9%ED%95%9C-%EA%B8%B0%EC%97%85-vrar-%ED%96%85%ED%8B%B1%EC%88%98%ED%8A%B8%EC%9D%B8-%ED%83%9D%EC%88%98%ED%8A%B8%EB%A5%BC-%EB%A7%8C%EB%93%9C%EB%8A%94-%EA%B8%B0%EC%97%85/</a><br>\t\t\t\t\t<br><a href=\"https://www.inven.co.kr/webzine/news/?news=239462&site=vr\" target=\"_blank\">https://www.inven.co.kr/webzine/news/?news=239462&site=vr</a><br>\t\t\t\t\t<br><a href=\"https://www.hellodd.com/news/articleView.html?idxno=91906\" target=\"_blank\">https://www.hellodd.com/news/articleView.html?idxno=91906</a><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>Description<br>\t\t\t\t\t<br>Manufacturer of a native gaming haptic suit intended to offer a new way to experience virtual reality. The company's suite offers a physical interface between the virtual world and a user's skin, enhancing the user's emotion by delivering appropriate haptic feedback in an audio-visually immersed environment, enabling gamers to enjoy virtual reality with visual, auditory and haptic feedback.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>Main Product<br>\t\t\t\t\t<br>TactSuit – Wireless haptic suit including vest, sleeves, and mask. It provides 87 individually controllable vibration locations over user’s body with imperceptible latency via standard Bluetooth communication.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>bHaptics Designer – A web-based software for creating haptic feedback conveniently. Developers can easily design complicated spatiotemporal haptic patterns and apply these to their contents.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>bHaptics Competitors<br>\t\t\t\t\t<br>\t\t\t\t\t<br><a href=\"https://tracxn.com/d/companies/3dsystems.com\" target=\"_blank\">&#160;3D Systems&#160;</a>1986, Rock Hill<br>\t\t\t\t\t<br>\t\t\t\t\t<br><a href=\"https://tracxn.com/d/companies/bebopsensors.com\" target=\"_blank\">&#160;BeBop Sensors&#160;</a>2014, Berkeley, $16.9M<br>\t\t\t\t\t<br><a href=\"https://tracxn.com/d/companies/antilatency.com\" target=\"_blank\">&#160;Antilatency&#160;</a>2015, Voronezh, $2.1M<br>\t\t\t\t\t<br>\t\t\t\t\t<br><a href=\"https://tracxn.com/d/companies/brilliantsole.com\" target=\"_blank\">&#160;Brilliant Sole&#160;</a>2016, Wilmington<br>\t\t\t\t\t<br><a href=\"https://tracxn.com/a/s/query/t/companiescovered/t/all/card#%7CcompetitorsDomainId%3Da0J6LR_d6TnzqvtnI7A0hKnZcRTtoC38uTLSdhH0gto%3Abhaptics.com%7Csort%3Drelevance%7Corder%3DDEFAULT\" target=\"_blank\">& 72 others</a><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>\t\t\t\t<br>\t\t\t<br>\t\t\t<br><a href=\"https://www.soulmachines.com/\" target=\"_blank\">https://www.soulmachines.com/</a><br>\t\t\t<br><a href=\"http://dot-mill.com/\" target=\"_blank\">http://dot-mill.com/</a><br>\t\t\t<br><br>\t\t\t<br>펄어비스의 도깨비(DokeV)에 대해 파악한 내용 공유해드립니다.<br>\t\t\t<br><br>\t\t\t<br>결론은,<br>\t\t\t<br>도깨비는 MMORPG가 아니며 메타버스적인 요소는 보조적인 요소로만 추가될 예정입니다.<br>\t\t\t<br>즉, 우리가 생각하는 '대작'의 예시로는 적합하지 않다는 의견입니다.<br>\t\t\t<br><br>\t\t\t<br>▶ 게임 장르<br>\t\t\t<br>도깨비 수집 오픈월드 액션 어드벤처<br>\t\t\t<br>포캣몬고 처럼 맵을 돌아다니며, 대전을 통해 도깨비를 획득해나가는 컨셉으로, 포켓몬고와는 달리 유저가 직접 대전에 참여한다는 근소한 차이만 존재합니다.<br>\t\t\t<br><br>\t\t\t<br>일반적인 MMORPG와는 달리, 기본적으로는 싱글 플레이 이고, 소수의 플레이어가 함께하는 멀티플레이나 콘텐츠를 함께 즐길 수 있는 모드를 지원할 예정입니다.<br>\t\t\t<br><br>\t\t\t<br>▶ 지원 디바이스<br>\t\t\t<br>콘솔과 PC (현 시점에서는 모바일 플랫폼 출시는 고려하고 있지 않음)<br>\t\t\t<br><br>\t\t\t<br>▶ 메타버스적인 요소<br>\t\t\t<br>\"메타버스적인 요소를 넣으려고 한다.\" \"메타버스관련하여 글로벌 기업들과 협업예정이다.\"라는 언급 이외에 현재까지 공개된 정보로는 유저간 상호작용, 경제시스템, NFT, 샌드박스형 게임 등 메타버스적인 요소가 포함되어있지 않습니다. 공연이나 멀티미디어 요소를 넣는 등 보조적인 형태로 포함될 것으로 예측되며, 한국관광공사와의 협업으로 경복궁을 재현한 것과 같은 '디지털 트윈'의 요소는 포함하고 있습니다.<br>\t\t\t<br><br>\t\t\t<br>▶ 그래픽<br>\t\t\t<br>반향을 일으킨 부분은 사실적인 그래픽인데요, 게임 내에 등장하는 아이템과 배경을 현실의 아이템과 지형지물들을 3D 스캔한 후 약간을 보정을 가하는 방식으로 구현했습니다. 일반적인 판타지의 경우 인력과 시간을 갈아 넣어서 직접 그려내야 하는 것과는 달리 리소스는 절약되면서 더 생생한 그래픽을 구현 하는 영리한 방법을 택했습니다.<br>\t\t\t<br><br>\t\t\t<br>이상입니다.<br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br>MMORPG 만드는거랑 캐쥬얼/미니게임 만드는거랑 많이 다른 역량인가?",
    "w": 400
  }
];

let cards = [];
let moving = null, resizing = null;

function loadBoard() {
  const saved = localStorage.getItem(SAVE_KEY);
  cards = saved ? JSON.parse(saved) : DEFAULT_CARDS.map(c => ({...c}));
  renderCards();
  if (!saved) autoLayout();
}

function autoLayout() {
  const GAP = 14;
  const boardW = document.getElementById('board').offsetWidth;
  const cols = Math.max(1, Math.floor(boardW / 280));
  const colW = (boardW - GAP * (cols - 1)) / cols;
  const colHeights = new Array(cols).fill(0);
  const allCards = document.querySelectorAll('.card');
  const images = document.querySelectorAll('.card img');
  let loaded = 0;
  const total = images.length;

  function place() {
    allCards.forEach((el, i) => {
      const card = cards[i];
      const w = Math.min(card.w || colW, colW);
      let minCol = 0;
      for (let c = 1; c < cols; c++) if (colHeights[c] < colHeights[minCol]) minCol = c;
      card.x = minCol * (colW + GAP);
      card.y = colHeights[minCol];
      card.w = w;
      el.style.left = card.x + 'px';
      el.style.top = card.y + 'px';
      el.style.width = w + 'px';
      colHeights[minCol] = card.y + el.offsetHeight + GAP;
    });
    document.getElementById('board').style.minHeight = Math.max(...colHeights) + 100 + 'px';
    saveBoard();
  }

  if (total === 0) requestAnimationFrame(place);
  else images.forEach(img => {
    if (img.complete) { loaded++; if (loaded >= total) requestAnimationFrame(place); }
    else img.onload = img.onerror = () => { loaded++; if (loaded >= total) requestAnimationFrame(place); };
  });
}

function syncText() {
  document.querySelectorAll('.card').forEach(el => {
    const idx = +el.dataset.idx;
    if (cards[idx]?.type === 'text') {
      const t = el.querySelector('.text');
      if (t) cards[idx].content = t.innerHTML;
    }
  });
}

function saveBoard() {
  syncText();
  localStorage.setItem(SAVE_KEY, JSON.stringify(cards));
  document.getElementById('status').textContent = '저장됨 ' + new Date().toLocaleTimeString();
}

function renderCards() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  cards.forEach((card, i) => {
    const el = document.createElement('div');
    el.className = 'card';
    el.dataset.idx = i;
    if (card.x !== undefined) el.style.left = card.x + 'px';
    if (card.y !== undefined) el.style.top = card.y + 'px';
    if (card.w) el.style.width = card.w + 'px';

    el.addEventListener('mousedown', e => {
      if (e.target.closest('.text, a, .card-btn, .resize-handle, table')) return;
      e.preventDefault();
      moving = { idx: i, startX: e.clientX, startY: e.clientY, origX: card.x || 0, origY: card.y || 0 };
      el.classList.add('moving');
    });

    const actions = document.createElement('div');
    actions.className = 'card-actions';
    const delBtn = document.createElement('button');
    delBtn.className = 'card-btn'; delBtn.textContent = '×';
    delBtn.onclick = e => { e.stopPropagation(); if (confirm('삭제?')) { cards.splice(i, 1); renderCards(); saveBoard(); } };
    actions.appendChild(delBtn);
    el.appendChild(actions);

    if (card.type === 'text') {
      const text = document.createElement('div');
      text.className = 'text';
      text.contentEditable = true;
      text.innerHTML = card.content || '';
      text.addEventListener('blur', () => { card.content = text.innerHTML; saveBoard(); });
      el.appendChild(text);
    } else if (card.type === 'image') {
      const src = card.src.startsWith('http') || card.src.startsWith('data:') ? card.src : IMG_BASE + card.src;
      const img = document.createElement('img');
      img.src = src;
      img.alt = card.alt || '';
      img.loading = 'lazy';
      img.onerror = () => img.style.display = 'none';
      if (card.link) {
        const a = document.createElement('a'); a.href = card.link; a.target = '_blank';
        a.appendChild(img); el.appendChild(a);
      } else { el.appendChild(img); }
      if (card.caption) {
        const cap = document.createElement('div');
        cap.className = 'caption';
        cap.textContent = card.caption;
        el.appendChild(cap);
      }
    } else if (card.type === 'table') {
      const wrapper = document.createElement('div');
      wrapper.style.overflowX = 'auto';
      wrapper.innerHTML = card.html || '';
      el.appendChild(wrapper);
    }

    const rh = document.createElement('div');
    rh.className = 'resize-handle';
    rh.addEventListener('mousedown', e => {
      e.preventDefault(); e.stopPropagation();
      resizing = { idx: i, startX: e.clientX, startW: card.w || el.offsetWidth };
    });
    el.appendChild(rh);
    board.appendChild(el);
  });

  requestAnimationFrame(() => {
    let maxBottom = 0;
    document.querySelectorAll('.card').forEach(el => {
      const b = (parseFloat(el.style.top) || 0) + el.offsetHeight;
      if (b > maxBottom) maxBottom = b;
    });
    board.style.minHeight = (maxBottom + 100) + 'px';
  });
}

document.addEventListener('mousemove', e => {
  if (moving) {
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`);
    if (!el) return;
    const nx = moving.origX + e.clientX - moving.startX;
    const ny = moving.origY + e.clientY - moving.startY;
    el.style.left = nx + 'px';
    el.style.top = ny + 'px';
  }
  if (resizing) {
    const card = cards[resizing.idx];
    card.w = Math.max(100, resizing.startW + e.clientX - resizing.startX);
    const el = document.querySelector(`.card[data-idx="${resizing.idx}"]`);
    if (el) el.style.width = card.w + 'px';
  }
});

document.addEventListener('mouseup', e => {
  if (moving) {
    const card = cards[moving.idx];
    card.x = Math.max(0, moving.origX + e.clientX - moving.startX);
    card.y = Math.max(0, moving.origY + e.clientY - moving.startY);
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`);
    if (el) { el.classList.remove('moving'); }
    moving = null; saveBoard();
  }
  if (resizing) { resizing = null; saveBoard(); }
});

function addTextCard() {
  cards.push({ type: 'text', content: '', x: 50, y: window.scrollY + 100, w: 300 });
  renderCards();
  setTimeout(() => { const els = document.querySelectorAll('.card .text'); els[els.length - 1]?.focus(); }, 100);
}

function addImageCard() {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = 'image/*';
  input.onchange = e => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = () => { cards.push({ type: 'image', src: reader.result, x: 50, y: window.scrollY + 100, w: 240 }); renderCards(); saveBoard(); };
    reader.readAsDataURL(file);
  };
  input.click();
}

function resetLayout() {
  if (!confirm('자동 재배치합니다. 현재 위치가 변경됩니다.')) return;
  cards.forEach(c => { delete c.x; delete c.y; });
  renderCards(); autoLayout();
}

setInterval(saveBoard, 30000);
loadBoard();
</script>
