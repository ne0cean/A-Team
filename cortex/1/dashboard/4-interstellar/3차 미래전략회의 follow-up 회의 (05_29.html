<script>
const SAVE_KEY = 'board-3차-미래전략회의-follow-up-회의-05-29';
const IMG_BASE = '../../../attachments/';
const DEFAULT_CARDS = [
  {
    "type": "text",
    "content": "3차 미래전략회의 follow-up 회의 (05/29<br>\t\t<br>\t\t<br>\t<br>\t<br>\t\t<br>\t\t\t<br>3차 미래전략회의 follow-up 회의 (05/29)<br>\t\t\t<br>[회의 결과 공유 및 BCG Workplan 소개]<br>\t\t\t<br>(CEO) 지난번 워크샵 후 사업부장님들은 어떻게 생각하시는지?<br>\t\t\t<br>(김용훈) 전화/음성에 집중하는 것에 좋겠다 말씀 주셔서, 첫 번째 유스케이스로 기술 투자 집중해<br>\t\t\t<br>왔으나 박차 가해서 성장 모멘텀 삼을 것. 6월 말에 음성 확장이라는 측면에서 회의록 기능 들어<br>\t\t\t<br>가 있어서 유스케이스 좁히고 나머지 부분은 페이드 아웃. 스케일업 관련해서도 준비하고 있음.<br>\t\t\t<br>(정석근) 스타트업 투자나 만드는 것 어느정도 하고 있지만 실행이나 구조가 미비하다고 하시는<br>\t\t\t<br>것 같음. GAP co.의 현재 포트폴리오에 대한 피봇팅이나 운영 방안, 인센티브 얘기해주셔서 GAP<br>\t\t\t<br>Co에 대한 운영 방식을 좀 더 구체화 하고자 함. 에스터도 텔코향 기능 더 고민해 보라 하신 것 포<br>\t\t\t<br>함 사업적 피보팅과 운영 방식 피보팅 두 가지로 정리해보겠음<br>\t\t\t<br>(신용식) 4가지 유스케이스로 시작할 때 목적함수 2개. 그룹 기여 및 이를 바탕으로 한 사업 확장.<br>\t\t\t<br>작년말부터 지금까지 여러 코멘트 뿐만 아니라 스스로도 고민하고 있었음. 유스케이스가 그룹에<br>\t\t\t<br>도움되고 확장 가능한지, 우리가 전문성 갖고 있는지 등. 에이닷비즈와 AICC는 첫 번쨰 목적함수<br>\t\t\t<br>달성 가능하고 있다고 봐서 집중하려하고 속도 높일 수 있는 테크 부분 아웃소싱이나 내재화 하려<br>\t\t\t<br>함. MI와 물성 예측은 과감하게 피보팅 고려 중. 그룹 관점이나 확장 관점에서도 이 편이 좋겠다는<br>\t\t\t<br>생각. 5개월 간 멤버사들 만나서 니즈 확인해 봤을때도 그러한 분위기. 명장 AI는 50% 인력 줄일<br>\t\t\t<br>수 있는 걸로 말씀 주셨으나, 이 부분은 에이전트 빌더를 기반으로 현업에서 에이전트 만드는 구<br>\t\t\t<br>조 고민하고 있어서 이 부분은 면밀하게 고민해보려고 함. 이를 뒷받침하기 위해 LLM 성능과 기<br>\t\t\t<br>술의 향상이 필요함. 에이닷비즈, AICC, 명장AI 모두 에이전트 플랫폼 위에 A.X LLM이 성능 받쳐<br>\t\t\t<br>주면 충분히 할 만하다고 보고 집중하려 생각하고 있음<br>\t\t\t<br>(이현우) 가장 저렴하게 DC 제공하는 사업자 되기 위해 싸고 빠르게 짓는 방법 고민 중. 자강과 협<br>\t\t\t<br>력에서 자강은 마땅치 않아서 협력 관점에서 슈나이더 협력 통해 공기 단축, 모듈 도입 등 고민<br>\t\t\t<br>중. 프로그레스 보고 드릴 예정임. 상면 비즈니스 관련, 확장하면서 어떻게 나아갈지는 GPU 관련<br>\t\t\t<br>가상화 역량 쌓아서 openAI나 다른 CSP들에게 어떤 value add 할 수 있을지 고민 시작 하고 있<br>\t\t\t<br>음<br>\t\t\t<br>(양승현) 사업과 연결 부족한 부분과 리소스 부분에 대해서 고민. 사업부와 연게해서 개발할 수 있<br>\t\t\t<br>는 과제들은 단계적으로 개발하고, 다른 프로젝트들은 요건 정의해서 진행하고, 정리하는 등의 리<br>\t\t\t<br>소스 효율화 절차 등을 정의하려함. 사업부에서 현재 필요한 필요성에 의해 돌아가면 R*&D 동력<br>\t\t\t<br>약해질 수 있어서, 지금 가진 기술로 마켓탑 올라갈 수 있는 것들 추가적으로 정리해서 마켓탑 솔<br>\t\t\t<br>루션 후보들 사업부들에게 역으로 먼저 제안하는 것도 병행해서 플랜 짜보겠음<br>\t\t\t<br>(CFO) 회장님께서 방향성에 대해 코멘트 하신 것은 최근 환경 변화 영향 크게 받으신 것 같음. AI<br>\t\t\t<br>산업이 전문가는 아니지만 굉장히 빠르게 변하는데 우리가 제대로 따라가는지에 대해 의문 갖고<br>\t\t\t<br>계시는 듯. 현재 텔레콤의 상황에 따라 여력, 리소스의 효율화가 필요하지 않나 말씀하신 것 같음.<br>\t\t\t<br>지금 상황에서 AI사업을 하는데 있어 재무적 리소스를 사고와 관련해 여력이 축소된 것은 사실.<br>\t\t\t<br>1~2년 갈 수 있는 리소스들이 많이 취소된 상황. 조금 더 빠르게 선택과 집중 하는 모습 보여줘야<br>\t\t\t<br>하지 않을까. 외부 이해관계자나 투자자들 입장에서도 AI사업에 대한 가시적 성과 기대하고 있는<br>\t\t\t<br>[CEO Wrap-up]<br>\t\t\t<br>데, 이런 사고 맞으며 그런 시선들이 차가워 졌다 생각. 과감한 선택과 집중, 리소스 집중을 통해<br>\t\t\t<br>가시적 성과 만들어야 할 것<br>\t\t\t<br>(CSO) 전반적으로 BCG 말씀하신 부분, 사업별, 전반적, 추진 방법 등 harsh 하게 커멘트 주셨지<br>\t\t\t<br>만, 회장님께서는 방어만 하지말고 객관적 시각 받아들여 고쳐야 한다고 시작하신 점에 대해 전반<br>\t\t\t<br>적, 각사업부별 방향성에 반영해야 한다고 생각. 모티베이션, 인센티브, KPI등도 언급 주셨느데,<br>\t\t\t<br>지금까지 AI사업 추진하는 방향에서 전략과 방향이 유지되려면 구성원까지 얼라인 된 KPI/인센<br>\t\t\t<br>티브 설계해야한다고 생각. 사업별 방향성은 사업부장님들, BCG, 저희 의견 모두 맞춰가겠음. 지<br>\t\t\t<br>금까지 해온 방식이 옳다고 생각하지 말아야한다고 생각해야하고 재검토하고 짚고 넘어갈 수 있<br>\t\t\t<br>어야 한다고 생각<br>\t\t\t<br>(HR) 인센티브 관점에서 좀 봤음. 인센티브 관련해서는 레거시 구조가 강함. 밴드, IB, 연봉이라는<br>\t\t\t<br>측면과 노동조합이라는 강력한 카운터파트너. 이런게 바운더리 컨디션일수도 있고 내부 사정인<br>\t\t\t<br>데, BCG에서 객관적 시선 얻어서 추가 스터디 해보겠음. 그럼에도 불구하고 인센티브를 보상으로<br>\t\t\t<br>만 하기에는 SKT의 보상구조 자체가 높은 수준이기 때문에 한계가 있는 점은 분명. 평가보상 이외<br>\t\t\t<br>에 구성원들 움직일 수 있는 방안 추가 고민 필요할 것 같음<br>\t\t\t<br>(CSO) 인센티브라 말씀하셨지만 IB나 보상만을 얘기하시는건 아니라 생각. 파격적 보상이 구<br>\t\t\t<br>성원을 움직인다기 보다는, 보여주기성이나 런칭 자체가 KPI 라는 점 등이 인센티브와 연결<br>\t\t\t<br>되어야 하는 점이라는 것 고민해봐야 함<br>\t\t\t<br>(정석근) risk와 align된 인센티브 같이 더 어려운 일에 대한 보상 등을 얘기하셔서 업/다운 사<br>\t\t\t<br>이드 모두 얘기하신 것 같음<br>\t\t\t<br>이 프로젝트 시작한 것 자체가 벌써 AI시작한지 4년차에 들어선 것이라. 나름 체계 짜고 있었지만 세<br>\t\t\t<br>상이 변하고 있는 것도 사실. 어제 GTAA도 얘기 해봤는데, CEO들 5명이서… AI와 관련된 것이 굉장히<br>\t\t\t<br>빠르게 변화하고 있는데 우리는 초기 문제의식에서 피보팅이 굉장히 대기업답게 느릴수밖에 없음. 조<br>\t\t\t<br>직개편도 1년에 한번, 연초에 셋팅한게 연말까지 가봐야 아는것도 아니고. 환경 변화를 많이 들여다<br>\t\t\t<br>봐야할 필요가 있다고 생각. 다시 최근에 변화된 환경 변화를 컨설팅에서도 봐주시면 좋겠음.<br>\t\t\t<br>크게 가정한 부분 몇가지 있음. AI 모델 - A.X 포함한 - 을 자강과 협력 통해 확보해야 한다 라는<br>\t\t\t<br>가정을 가지고, 그래서 자강은 A.X, 협력은 앤트로픽과 AWS가 유리한 구조로 되어있는데, 오픈AI<br>\t\t\t<br>가 KT와 익스클루시브로 가면 안될것 같고… 이런 느낌도 있고. A.X는 오픈소스로 가는데 피보팅<br>\t\t\t<br>방향은 좋은데, 진짜 안에 다 가지고 있어야 하는지 남에꺼 쓰면 안되는지 등의 고민. 모델 쪽에서<br>\t\t\t<br>굉장히 큰 변화가 온 것 같음. 변화는 다각적으로 오고 있는데… 최근 구글에서 하는 것도 보면<br>\t\t\t<br>openAI조차도 퀘스쳔이 될 수 있고. 딥시크도 그렇고 온갖 변화가 있었음. 국내 네이버 포함 자체<br>\t\t\t<br>적으로 한다는 쪽에서도 고민 많고. 그래서 모델 관련된 우리의 전략적 스탠스를 잘 피봇팅 해야<br>\t\t\t<br>할 것 같음. 모델을 각자가 다 혼자서 할건지, 네이버나 몇 군데랑 같이 섞어서 국가대표 AI모델<br>\t\t\t<br>만드는게 차라리 낫지 않나. 이런생각도 듦. 모델이 우리 경쟁력의 핵심이라 생각했다면, 지금은<br>\t\t\t<br>경쟁력의 핵심이라기 보다는 - 혹은 아무리핵심이라도 혼자 가져가기에는 부담스러운 부분 있으<br>\t\t\t<br>니, 자강과 협력에 대한 스탠스도 다시 들여다 봐야 함. 자칫 과거 웨이브에 천착하다 남들 넷플릭<br>\t\t\t<br>스 하는데 뒤쳐지는 것 될 수 있음. 다른 곳들도 다 고민 중일 것. 네이버도 카카오도. 카카오는<br>\t\t\t<br>openAI랑 손잡겠다 했지만 직접 해보니 그 것도 쉽지 않다는 얘기 하더라. B2C관점과 B2B관점<br>\t\t\t<br>다 있지만 AI모델에 대한 스탠스를 다시 정리해 볼 필요 있다고 생각. 앞으로 어떻게 변화해갈지<br>\t\t\t<br>도 모르겠고.<br>\t\t\t<br>국내 B2B에 대해, AIX, AX라는 이름으로 각 사들이 뛰고 있음. KT도 그렇고 SI들, C&C도 그렇고.<br>\t\t\t<br>이게 역시 우리나라 B2B는 fragmented되어있고 규모가 너무 작음. 캡티브 생각하더라도. 전체<br>\t\t\t<br>규모도 작은데 다 조각조각. 여전히 우리는 현대차에 못들어가고 삼성에 못들어가고 하는 등 제약<br>\t\t\t<br>이 많음. SI들이 고민이 캡티브 + 공공 + 금융 정도 하다보면… 시장이 되게 작음. AIX도 과거 SI부<br>\t\t\t<br>터 내려오던 것에서 자유롭지 못하다는게 지금 현실. 정부 수요가 그렇다고 대단한것도 아니고 제<br>\t\t\t<br>한업종도 있고… 결국 SI의 한계를 그대로 답습하는것 아닌가. 이걸 어떻게 해야하나. 우리 가설은<br>\t\t\t<br>엄청 새로운 시장이 생길것이라는 가설이었는데.<br>\t\t\t<br>B2C도 국내 해외 통틀어 보면 even 퍼플렉시티도 엣지를 잃어가고 있다고 생각. 그동안 퍼플렉<br>\t\t\t<br>시티 들어가서 썼던 이유는 검색이 openAI가 주지 못하는 검색을 했기 때문. 그런데 지금은<br>\t\t\t<br>openAI와 퍼플렉시티의 차이점을 못느낌. 오히려 openAI가 기능은 더 다양하면서 검색도 제공.<br>\t\t\t<br>퍼플렉시티 조차도 1년만에 챌린지 받고 있는 것. openAI조차도 구글과 봤을때 구글이 갖고 있는<br>\t\t\t<br>수많은 디지털 자산들이 결합된 서비스가 있는데… 그런 상황에서 앤트로픽 같은 애들은 B2C에<br>\t\t\t<br>서 뭘 할 수 있을까. 검색이 제일 낫다고 봤었는데 새롭게 등장하는 곳들이 구글과 오픈AI가 뭐 하<br>\t\t\t<br>나 발표할때마다 수백개씩 없어지는 구조라면… 에이닷이 갖고 있던 b2c 가설도 쉽게 없어질 수<br>\t\t\t<br>있는 것 아닌가. 설령 잠시 반짝하더라도 오래 못갈 수 있는 것. 모델이냐 아니냐의 문제라기 보다<br>\t\t\t<br>결국 독점화의 과정으로 가는 것 아닌지. 그런 관점에서 에스터의 시도가 의미 있는지, 에이다이<br>\t\t\t<br>의미 있는지. 우리가 하면 몇 백억씩 들어가는 일을 스타트업 10개가 해서 8~9개 망하는 그런 상<br>\t\t\t<br>황에서 우리가 천억 단위 조단위로 넣어서 이 게임 하는게 맞는지 냉정히 봐야 함.<br>\t\t\t<br>AI 데이터센터는 GPUaaS와 Co-Lo 두개 있는데, Co-lo는 당분간 간다 하지만 장기적으로 공급<br>\t\t\t<br>과잉 가능성 있지 않을까. 지금 프로젝트 수백개 돌아가는데, 우리는 빅텍 잡고 안정적으로 하고<br>\t\t\t<br>있다지만… 그들이 돈 못 벌면 빅텍에 엄청난 할인 하면서 물류센터처럼 간다고 하면 지금 우리<br>\t\t\t<br>가설이 그대로 갈 것인지. 더군다나 GPUaaS는 정부가 공급도 많이 하지만 수요가 우리가 태핑해<br>\t\t\t<br>봐도 거의 없더라. 소버린 Ai DC 얘기하지만 정부 정책으로 어느정도 뛸 수 있겠지만 그것 역시<br>\t\t\t<br>수요 문제에 직면.<br>\t\t\t<br>4가지 모두 각각의 챌린지에 직면. 변화를 네거티브하게 읽는다고 하면…<br>\t\t\t<br>SK AI R&D센터를 올 초에 던졌지만, AI R&D는 그 중 절반도 안될 것. 미디어도 있고 그런데 다<br>\t\t\t<br>AI R&D로 묶어놨는데, 이걸 슬림화 하면서 집중할 필요 있지 않은가? 예를 들어 R&D센터 1,2 나<br>\t\t\t<br>눠야 하지 않을까? 기존 엔터프라이즈 지원하던 R&D와 AI R&D 구분하고 선택과 집중해서 가야<br>\t\t\t<br>할 필요 있지 않을까 고민 했음. 권해성 담당 불렀는데 지난번 AT/DT 마스터 플랜 했었는데, 지금<br>\t\t\t<br>전체가 다 논의 되려면 이것까지 논의 되어야 함. 이 상황에서 수요자로서의 AT/DT는 제대로 가<br>\t\t\t<br>고 있는지. 보안 투자 하기 바쁘고 BSS 하는 것 까지 놓더라도 그 외에 AT에 투자할 여력과 실제<br>\t\t\t<br>효과가 과연 존재하는가. 어둡게 보기 시작하고 전부다 까기 시작하면… 지난번에 BCG가 사업단<br>\t\t\t<br>위 진단한 것과 또 다른 관점에서 전체 시장과 기술, 환경의 변화에 따른 문제를 보는 것.<br>\t\t\t<br>그럼에도 AI 다 때려치우고 MNO로 돌아가면 우리에게 살 길이 있는가라고 했을때, 그 역시 없<br>\t\t\t<br>음. MNO는 상처도 입은데다가 아니라고 하더라도 국내에서 더 성장하기는 어렵고 계속<br>\t\t\t<br>squeeze만 당해서 한계가 명확. AI에서 뭔가를 찾아야 한다는 것은 분명함. 다른 회사들도 같은<br>\t\t\t<br>고민이겠지만, 우리도 찾는데 있어 굉장한 어려움 겪고 있음. 밖에서 봐도 우리가 진심으로 하고<br>\t\t\t<br>있지 않은가. How에 대해서 굉장한 퀘스쳔 존재. 전략 리빌드 하지 않으면 이대로 계속 가다가 침<br>\t\t\t<br>몰할 수 밖에 없는 가능성 굉장히 농후해짐. 그러면서 AI에 쓸 수 있는 리소스는 점점 더 줄어들<br>\t\t\t<br>고. 별로 놓은 일 많고, 그게 돌아올 가능성 높지 않고. 냉정하게 봐야할 것.<br>\t\t\t<br>그럼 어떻게 해야 하는가? 개별 사업 접근이 1단계로 한 것이고, 두번째는 전체 포트폴리오 전략, 세번<br>\t\t\t<br>째는 일하는 방식. 이 세가지가 놓여있는 것.<br>\t\t\t<br>사업부 별로 부탁 드리는 것은…<br>\t\t\t<br>컨설팅과 무관하게 에이닷 피봇팅 전략 고민해서 보고해달라.<br>\t\t\t<br>GPAA는 기본적으로 CEO가 생각하는 가설은 가을에 에스터 커머셜 런칭은 안될 것 같음. 리소스<br>\t\t\t<br>감당도 그렇고 승산도 자신이 없음. GTAA도 어제 해봤지만 연합체 정도로 바라봐야 할 것. 그렇<br>\t\t\t<br>다면 GPAA사업부는 어떻게 피봇팅 하고 GAP co.는 어떻게 피봇팅 해야할까? 스타트업 방식을<br>\t\t\t<br>바꿔봐야 할 것. 글로벌 사업에서 텔코를 어떻게 해서 GAP co에서 만든걸 퍼트린다? 그런 in-out<br>\t\t\t<br>방식에서, 그냥 진짜 괜찮은 스타트업 찾아서 그 중에서 일구는 것. 장기적으로 인수할 회사를. 그<br>\t\t\t<br>한두개 가지고 글로벌 AI서비스 하는 컨셉으로 피봇팅 하는것도 싸고 승산있는 방법 아니겠는가.<br>\t\t\t<br>이것 포함해서 사업부 전체 - GAP Co. 도 포함해서 과감한 피봇팅 계획 내놓아 주시라.<br>\t\t\t<br>AIX는 지금 가설은 A.X와 캡티브 중심으로 가는데, C&C와 잘 상의해서 지금의 제휴 방식 -<br>\t\t\t<br>openAI뿐만 아니라… KT는 팔란티어랑 제휴하고 하는등으로 진행하는데, 이런 방식도 과감하게<br>\t\t\t<br>볼 필요 있음. 안에 있는 것 가지고 R&D센터에서 만든걸로 하는것도 좋은데, 좀 더 성큼성큼하기<br>\t\t\t<br>위해 글로벌 솔루션 파트너와 제휴 과감히 할 필요 있을 것 같음.<br>\t\t\t<br>AI DC는 람다 정도로는 국내 워킹 힘들 것 같고. 소버린 AI는 일정정도 하는데, 생각해야 하는 것<br>\t\t\t<br>은 우리 안에 갖고 있는 GPU자원들과 이번에 들어오는 소버린AI, 장기적으로 울산에 만들어지는<br>\t\t\t<br>AI DC 포함해서 내/외부 어떻게 발란싱 해서 가져갈지 - SKT내부, 그룹, 대외 사업 - 에 대한 고민<br>\t\t\t<br>과, 펀딩하려고 하는 부분 별도로 고민해야하고…<br>\t\t\t<br>솔루션 관점은, 솔루션을 in-rack solution - 이 중 제일 강력한게 GPU인데, 이런 in-rack 솔루션<br>\t\t\t<br>과 inter-rack 솔루션, EPC/MEC솔루션, 에너지 솔루션… 이건 우리가 생각하기 어려우니 넘어가<br>\t\t\t<br>고… EPC/MEC 중에 액침 냉각 등 들어가는데, 이런 3가지 나눴을때 주력할 분야와 어디까지 할<br>\t\t\t<br>수 있는지 AI추진단과 얘기하면서 진행 필요.<br>\t\t\t<br>R&D센터는 좀 더 고민 필요. AI R&D가 3백명 있다고 하는게 좋은지, AI R&D에는 100명이 이런<br>\t\t\t<br>과제에 집중하고 있다… 필요하면 조직개편해서 1,2,로 나눠도 됨. AI R&D센터가 집중할 영역이<br>\t\t\t<br>뭐고, 그 집중을 통해 핵심적인 소수정예 프로젝트를 리디파인 하고 이것만은 모델 포함해서 제대<br>\t\t\t<br>로 하겠다고 할 필요.<br>\t\t\t<br>모델은 WBL과 연계해서 다른곳과 제휴 어떻게 할지.. openAI가 한국에서 새로 만들겠다는 것 포<br>\t\t\t<br>함해서 고민 해주기 바람.<br>\t\t\t<br>AT/DT는 정신 없지만 그럼에도 불구하고 우리가 생각했던 AT/DT 마스터플랜에 어디까지 어떻게<br>\t\t\t<br>갈건지, 그걸 어떻게 피봇팅 할지, 보안투자도 해야하고… 이런 생각은 듦. 보안투자 많이 하는 김<br>\t\t\t<br>에 보안도 AI 투자의 한 유형으로 가져가는건 어떨지 고민해봐야 할 것. 요즘 보안도 다 AI아닌가.<br>\t\t\t<br>보안 투자를 AT/DT투자로 포함시킬 수 있고, 피봇팅이라는 것은 AT/DT 과제들 중 뒤로 좀 미루고<br>\t\t\t<br>보안과제를 앞으로 넣어서 리소스도 AT/DT 3년간 얼마 한다고 한걸 앞에 2년은 보안중심으로 한<br>\t\t\t<br>다던지… 이런 피봇팅이 현실적으로 필요할 것. 보안투자가 제일 급한데, AI가지고 미래를 뭐 하는<br>\t\t\t<br>것 보다도 제일 급한게 보안인데, 보안을 AT/DT관점에서 바라보면서 적어도 보안에 관해서는 철<br>\t\t\t<br>갑을 두른 SKT를 1~2년내에 만들고 거기에 AI 스토리를 입히는게 지금 당장은 다른 얘기보다 훨<br>\t\t\t<br>씬 임팩트 있는 얘기 아니겠는가.<br>\t\t\t<br>포트폴리오 전략은 어떻게 될 것인가. 이런게 이어서 나와야 할 것.<br>\t\t\t<br>결국 고민해야 할 이야기는 (일하는 방식).<br>\t\t\t<br>AI사업도 2가지가 있는 것 같음. 여러가지 있겠지만… AI infra 사업, AI B2B, AI B2C, 글로벌 사업은<br>\t\t\t<br>사업마다 일하는 nature가 다 다른것 같음.<br>\t\t\t<br>AI라고 하면 두가지 방식 - AI CIC만들어서 그 CIC 안에서는 별도의 HR, 평가 보상, 등등 다 따로 만들<br>\t\t\t<br>자는 어프로치 있을 것이고, 그게 아니면 사업부 특성에 맞는 부분을 강조해 주는 것도 가능할 것.<br>\t\t\t<br>DC사업부는 인프라 성이라서 별도 법인화 하는것도 생각한다 하면, 거기에 맞는 새로운게 만들<br>\t\t\t<br>어 질 수 밖에 없음. B2B는 B2B에 맞는 성과 보상체계나 일하는 방식이나 HR에 대한 부분이 필<br>\t\t\t<br>요. AI가 중요한가 B2B/B2C/Infra가 중요한가 보면 AI보다 업의 특성이 중요하지 않은가 생각.<br>\t\t\t<br>AIX는 AIX에 맞는게 필요하고… 에이닷은 정말 국내 플랫폼 회사 또는 AI회사들이 갖고 있는 여러<br>\t\t\t<br>가지 시스템들을 어떻게 접목시킬지에 대해 고민할 필요가 있을 것. GPAA는 피봇팅에 따라 다르<br>\t\t\t<br>겠지만 거기 맞게 새로운 모습 가져가야 하고…<br>\t\t\t<br>CIC단위와 사업부 단위로 가는 것에 대해서… 각 사업부 별 SKT 전체 틀 속에서 굉장히 획기적으<br>\t\t\t<br>로 확 바뀌어야 하는 곳도 있을 것이고 - 에이닷 같은… 전체 30% 정도만 SKT의 영향 받고 70%는<br>\t\t\t<br>에이닷에 특수하게 바꾸고, B2B는 좀 덜하고 등등. DC는 인프라 성격이라 좀 더 다르게… 이런 어<br>\t\t\t<br>프로치 할것인지. R&D는 또 어떻게 다르게 할지 등 이런 고민들 해야 함.<br>\t\t\t<br>이제는 목표와 성과와 로드맵이 분명해져야함. 이런 목표 갖고 있으면서 언제까지 얼마만큼 하는<br>\t\t\t<br>데 안되면 접겠다. 리소스 얼마만큼 필요하고 어떻게 가겠다 라는게 각자 나와야 함. 지난번에 발<br>\t\t\t<br>표한 정도가 아님. 회장님 말씀하신 사즉생 정도로 생각하고, 목표와 도달했을 때 달성 가능한 것<br>\t\t\t<br>의 measure를 어떻게 할지, 로드맵을 어떻게 가져갈지가 나와줘야 함.<br>\t\t\t<br>또 하나는 AI전체를 묶어서, 돈을 얼마 쓸 수 있고, 어떤 목표를 만들어야 하고 - 어떤 성과를 만들<br>\t\t\t<br>어야 하고, 언제까지 어떻게 해야하는지. 그걸 하기위해 지금의 방식이 맞는지 in-organic한 방법<br>\t\t\t<br>이 맞는지, 사업부 통합이 맞는지 등에 대해 컨설팅 의견이 필요함. 사업부 마다 의견은 따로 받더<br>\t\t\t<br>라도 전체 시스템 어떻게 가져가면 좋을지. 사업부와 협의해서…<br>\t\t\t<br>말랑말랑한 방식에 대해서는 CIC로 묶는게 좋을지, 사업부별로 하는게 좋을지. 사업부별로 하더<br>\t\t\t<br>라도 텔레콤 구성원이라 갑자기 다른 기준 적용하기도 어려울 것. 예를 들면 굳이 KPI를 에이닷<br>\t\t\t<br>같은 경우 무빙타겟으로 가져가도 되지 않는가. 분기별 평가하고 피봇팅 한다던가. 연말이 무슨<br>\t\t\t<br>의미가 있고 연초가 무슨 의미가 있는가. SKT는 있겠지만. 이정도의 플렉서빌러티 가져갈 필요 있<br>\t\t\t<br>을 것. AI Infra의 별도 법인화는 논의해 보자. AIX는 C&C랑 같이 하는게 워킹 잘 할지도 봐야함.<br>\t\t\t<br>같이 하는데 인사 체계가 다르니까.<br>\t\t\t<br>혁명적 수준의 변화가 필요함. 이것을 ‘조금씩 바꿔가면서 올 해 만든대로 가시죠’ 이런게 아님. 내<br>\t\t\t<br>외부 환경변화가 워낙 크기 때문에, AI사업 전략 전체에 대한 피봇팅/리밸런싱이 필요함. 컨트롤<br>\t\t\t<br>타워는 CSO에서 담당하셔야 하고. 연말 내에 프로젝트는 7월 전에 끝나겠지만, 연말 내에 피봇팅<br>\t\t\t<br>완성하겠다. 빠르면 하반기에. 굳이 연말 기다릴 필요가 없음.<br>\t\t\t<br>7월에 회장님과 다시 보고 드려야 하고, 경영전략회의때에는 결론 안나겠지만… 7월 중순 정도에<br>\t\t\t<br>결론을 내서 가야 함. 우리의 가설적 결론. 7월 초에 안에서 정리하고, 7월 중순이나 말까지에 회<br>\t\t\t<br>장님께 가는 것 필요. 결론 못내리고 가면 아무 의미 없음. 이제는 결론을 가져가야 함. 컨설팅은 7<br>\t\t\t<br>월 초까지 빨리하고, 우리끼리 내부 정리해서.. .7월 중순, 20일 정도에는 회장님, 그전에 의장님과<br>\t\t\t<br>결론 내야함.<br>\t\t<br>\t\t<br>\t\t\t<br>3차 미래전략회의 follow-up 회의 (05/29)<br>\t\t\t<br>[회의 결과 공유 및 BCG Workplan 소개]<br>\t\t\t<br>(CEO) 지난번 워크샵 후 사업부장님들은 어떻게 생각하시는지?<br>\t\t\t<br>(김용훈) 전화/음성에 집중하는 것에 좋겠다 말씀 주셔서, 첫 번째 유스케이스로 기술 투자 집중해<br>\t\t\t<br>왔으나 박차 가해서 성장 모멘텀 삼을 것. 6월 말에 음성 확장이라는 측면에서 회의록 기능 들어<br>\t\t\t<br>가 있어서 유스케이스 좁히고 나머지 부분은 페이드 아웃. 스케일업 관련해서도 준비하고 있음.<br>\t\t\t<br>(정석근) 스타트업 투자나 만드는 것 어느정도 하고 있지만 실행이나 구조가 미비하다고 하시는<br>\t\t\t<br>것 같음. GAP co.의 현재 포트폴리오에 대한 피봇팅이나 운영 방안, 인센티브 얘기해주셔서 GAP<br>\t\t\t<br>Co에 대한 운영 방식을 좀 더 구체화 하고자 함. 에스터도 텔코향 기능 더 고민해 보라 하신 것 포<br>\t\t\t<br>함 사업적 피보팅과 운영 방식 피보팅 두 가지로 정리해보겠음<br>\t\t\t<br>(신용식) 4가지 유스케이스로 시작할 때 목적함수 2개. 그룹 기여 및 이를 바탕으로 한 사업 확장.<br>\t\t\t<br>작년말부터 지금까지 여러 코멘트 뿐만 아니라 스스로도 고민하고 있었음. 유스케이스가 그룹에<br>\t\t\t<br>도움되고 확장 가능한지, 우리가 전문성 갖고 있는지 등. 에이닷비즈와 AICC는 첫 번쨰 목적함수<br>\t\t\t<br>달성 가능하고 있다고 봐서 집중하려하고 속도 높일 수 있는 테크 부분 아웃소싱이나 내재화 하려<br>\t\t\t<br>함. MI와 물성 예측은 과감하게 피보팅 고려 중. 그룹 관점이나 확장 관점에서도 이 편이 좋겠다는<br>\t\t\t<br>생각. 5개월 간 멤버사들 만나서 니즈 확인해 봤을때도 그러한 분위기. 명장 AI는 50% 인력 줄일<br>\t\t\t<br>수 있는 걸로 말씀 주셨으나, 이 부분은 에이전트 빌더를 기반으로 현업에서 에이전트 만드는 구<br>\t\t\t<br>조 고민하고 있어서 이 부분은 면밀하게 고민해보려고 함. 이를 뒷받침하기 위해 LLM 성능과 기<br>\t\t\t<br>술의 향상이 필요함. 에이닷비즈, AICC, 명장AI 모두 에이전트 플랫폼 위에 A.X LLM이 성능 받쳐<br>\t\t\t<br>주면 충분히 할 만하다고 보고 집중하려 생각하고 있음<br>\t\t\t<br>(이현우) 가장 저렴하게 DC 제공하는 사업자 되기 위해 싸고 빠르게 짓는 방법 고민 중. 자강과 협<br>\t\t\t<br>력에서 자강은 마땅치 않아서 협력 관점에서 슈나이더 협력 통해 공기 단축, 모듈 도입 등 고민<br>\t\t\t<br>중. 프로그레스 보고 드릴 예정임. 상면 비즈니스 관련, 확장하면서 어떻게 나아갈지는 GPU 관련<br>\t\t\t<br>가상화 역량 쌓아서 openAI나 다른 CSP들에게 어떤 value add 할 수 있을지 고민 시작 하고 있<br>\t\t\t<br>음<br>\t\t\t<br>(양승현) 사업과 연결 부족한 부분과 리소스 부분에 대해서 고민. 사업부와 연게해서 개발할 수 있<br>\t\t\t<br>는 과제들은 단계적으로 개발하고, 다른 프로젝트들은 요건 정의해서 진행하고, 정리하는 등의 리<br>\t\t\t<br>소스 효율화 절차 등을 정의하려함. 사업부에서 현재 필요한 필요성에 의해 돌아가면 R*&D 동력<br>\t\t\t<br>약해질 수 있어서, 지금 가진 기술로 마켓탑 올라갈 수 있는 것들 추가적으로 정리해서 마켓탑 솔<br>\t\t\t<br>루션 후보들 사업부들에게 역으로 먼저 제안하는 것도 병행해서 플랜 짜보겠음<br>\t\t\t<br>(CFO) 회장님께서 방향성에 대해 코멘트 하신 것은 최근 환경 변화 영향 크게 받으신 것 같음. AI<br>\t\t\t<br>산업이 전문가는 아니지만 굉장히 빠르게 변하는데 우리가 제대로 따라가는지에 대해 의문 갖고<br>\t\t\t<br>계시는 듯. 현재 텔레콤의 상황에 따라 여력, 리소스의 효율화가 필요하지 않나 말씀하신 것 같음.<br>\t\t\t<br>지금 상황에서 AI사업을 하는데 있어 재무적 리소스를 사고와 관련해 여력이 축소된 것은 사실.<br>\t\t\t<br>1~2년 갈 수 있는 리소스들이 많이 취소된 상황. 조금 더 빠르게 선택과 집중 하는 모습 보여줘야<br>\t\t\t<br>하지 않을까. 외부 이해관계자나 투자자들 입장에서도 AI사업에 대한 가시적 성과 기대하고 있는<br>\t\t\t<br>[CEO Wrap-up]<br>\t\t\t<br>데, 이런 사고 맞으며 그런 시선들이 차가워 졌다 생각. 과감한 선택과 집중, 리소스 집중을 통해<br>\t\t\t<br>가시적 성과 만들어야 할 것<br>\t\t\t<br>(CSO) 전반적으로 BCG 말씀하신 부분, 사업별, 전반적, 추진 방법 등 harsh 하게 커멘트 주셨지<br>\t\t\t<br>만, 회장님께서는 방어만 하지말고 객관적 시각 받아들여 고쳐야 한다고 시작하신 점에 대해 전반<br>\t\t\t<br>적, 각사업부별 방향성에 반영해야 한다고 생각. 모티베이션, 인센티브, KPI등도 언급 주셨느데,<br>\t\t\t<br>지금까지 AI사업 추진하는 방향에서 전략과 방향이 유지되려면 구성원까지 얼라인 된 KPI/인센<br>\t\t\t<br>티브 설계해야한다고 생각. 사업별 방향성은 사업부장님들, BCG, 저희 의견 모두 맞춰가겠음. 지<br>\t\t\t<br>금까지 해온 방식이 옳다고 생각하지 말아야한다고 생각해야하고 재검토하고 짚고 넘어갈 수 있<br>\t\t\t<br>어야 한다고 생각<br>\t\t\t<br>(HR) 인센티브 관점에서 좀 봤음. 인센티브 관련해서는 레거시 구조가 강함. 밴드, IB, 연봉이라는<br>\t\t\t<br>측면과 노동조합이라는 강력한 카운터파트너. 이런게 바운더리 컨디션일수도 있고 내부 사정인<br>\t\t\t<br>데, BCG에서 객관적 시선 얻어서 추가 스터디 해보겠음. 그럼에도 불구하고 인센티브를 보상으로<br>\t\t\t<br>만 하기에는 SKT의 보상구조 자체가 높은 수준이기 때문에 한계가 있는 점은 분명. 평가보상 이외<br>\t\t\t<br>에 구성원들 움직일 수 있는 방안 추가 고민 필요할 것 같음<br>\t\t\t<br>(CSO) 인센티브라 말씀하셨지만 IB나 보상만을 얘기하시는건 아니라 생각. 파격적 보상이 구<br>\t\t\t<br>성원을 움직인다기 보다는, 보여주기성이나 런칭 자체가 KPI 라는 점 등이 인센티브와 연결<br>\t\t\t<br>되어야 하는 점이라는 것 고민해봐야 함<br>\t\t\t<br>(정석근) risk와 align된 인센티브 같이 더 어려운 일에 대한 보상 등을 얘기하셔서 업/다운 사<br>\t\t\t<br>이드 모두 얘기하신 것 같음<br>\t\t\t<br>이 프로젝트 시작한 것 자체가 벌써 AI시작한지 4년차에 들어선 것이라. 나름 체계 짜고 있었지만 세<br>\t\t\t<br>상이 변하고 있는 것도 사실. 어제 GTAA도 얘기 해봤는데, CEO들 5명이서… AI와 관련된 것이 굉장히<br>\t\t\t<br>빠르게 변화하고 있는데 우리는 초기 문제의식에서 피보팅이 굉장히 대기업답게 느릴수밖에 없음. 조<br>\t\t\t<br>직개편도 1년에 한번, 연초에 셋팅한게 연말까지 가봐야 아는것도 아니고. 환경 변화를 많이 들여다<br>\t\t\t<br>봐야할 필요가 있다고 생각. 다시 최근에 변화된 환경 변화를 컨설팅에서도 봐주시면 좋겠음.<br>\t\t\t<br>크게 가정한 부분 몇가지 있음. AI 모델 - A.X 포함한 - 을 자강과 협력 통해 확보해야 한다 라는<br>\t\t\t<br>가정을 가지고, 그래서 자강은 A.X, 협력은 앤트로픽과 AWS가 유리한 구조로 되어있는데, 오픈AI<br>\t\t\t<br>가 KT와 익스클루시브로 가면 안될것 같고… 이런 느낌도 있고. A.X는 오픈소스로 가는데 피보팅<br>\t\t\t<br>방향은 좋은데, 진짜 안에 다 가지고 있어야 하는지 남에꺼 쓰면 안되는지 등의 고민. 모델 쪽에서<br>\t\t\t<br>굉장히 큰 변화가 온 것 같음. 변화는 다각적으로 오고 있는데… 최근 구글에서 하는 것도 보면<br>\t\t\t<br>openAI조차도 퀘스쳔이 될 수 있고. 딥시크도 그렇고 온갖 변화가 있었음. 국내 네이버 포함 자체<br>\t\t\t<br>적으로 한다는 쪽에서도 고민 많고. 그래서 모델 관련된 우리의 전략적 스탠스를 잘 피봇팅 해야<br>\t\t\t<br>할 것 같음. 모델을 각자가 다 혼자서 할건지, 네이버나 몇 군데랑 같이 섞어서 국가대표 AI모델<br>\t\t\t<br>만드는게 차라리 낫지 않나. 이런생각도 듦. 모델이 우리 경쟁력의 핵심이라 생각했다면, 지금은<br>\t\t\t<br>경쟁력의 핵심이라기 보다는 - 혹은 아무리핵심이라도 혼자 가져가기에는 부담스러운 부분 있으<br>\t\t\t<br>니, 자강과 협력에 대한 스탠스도 다시 들여다 봐야 함. 자칫 과거 웨이브에 천착하다 남들 넷플릭<br>\t\t\t<br>스 하는데 뒤쳐지는 것 될 수 있음. 다른 곳들도 다 고민 중일 것. 네이버도 카카오도. 카카오는<br>\t\t\t<br>openAI랑 손잡겠다 했지만 직접 해보니 그 것도 쉽지 않다는 얘기 하더라. B2C관점과 B2B관점<br>\t\t\t<br>다 있지만 AI모델에 대한 스탠스를 다시 정리해 볼 필요 있다고 생각. 앞으로 어떻게 변화해갈지<br>\t\t\t<br>도 모르겠고.<br>\t\t\t<br>국내 B2B에 대해, AIX, AX라는 이름으로 각 사들이 뛰고 있음. KT도 그렇고 SI들, C&C도 그렇고.<br>\t\t\t<br>이게 역시 우리나라 B2B는 fragmented되어있고 규모가 너무 작음. 캡티브 생각하더라도. 전체<br>\t\t\t<br>규모도 작은데 다 조각조각. 여전히 우리는 현대차에 못들어가고 삼성에 못들어가고 하는 등 제약<br>\t\t\t<br>이 많음. SI들이 고민이 캡티브 + 공공 + 금융 정도 하다보면… 시장이 되게 작음. AIX도 과거 SI부<br>\t\t\t<br>터 내려오던 것에서 자유롭지 못하다는게 지금 현실. 정부 수요가 그렇다고 대단한것도 아니고 제<br>\t\t\t<br>한업종도 있고… 결국 SI의 한계를 그대로 답습하는것 아닌가. 이걸 어떻게 해야하나. 우리 가설은<br>\t\t\t<br>엄청 새로운 시장이 생길것이라는 가설이었는데.<br>\t\t\t<br>B2C도 국내 해외 통틀어 보면 even 퍼플렉시티도 엣지를 잃어가고 있다고 생각. 그동안 퍼플렉<br>\t\t\t<br>시티 들어가서 썼던 이유는 검색이 openAI가 주지 못하는 검색을 했기 때문. 그런데 지금은<br>\t\t\t<br>openAI와 퍼플렉시티의 차이점을 못느낌. 오히려 openAI가 기능은 더 다양하면서 검색도 제공.<br>\t\t\t<br>퍼플렉시티 조차도 1년만에 챌린지 받고 있는 것. openAI조차도 구글과 봤을때 구글이 갖고 있는<br>\t\t\t<br>수많은 디지털 자산들이 결합된 서비스가 있는데… 그런 상황에서 앤트로픽 같은 애들은 B2C에<br>\t\t\t<br>서 뭘 할 수 있을까. 검색이 제일 낫다고 봤었는데 새롭게 등장하는 곳들이 구글과 오픈AI가 뭐 하<br>\t\t\t<br>나 발표할때마다 수백개씩 없어지는 구조라면… 에이닷이 갖고 있던 b2c 가설도 쉽게 없어질 수<br>\t\t\t<br>있는 것 아닌가. 설령 잠시 반짝하더라도 오래 못갈 수 있는 것. 모델이냐 아니냐의 문제라기 보다<br>\t\t\t<br>결국 독점화의 과정으로 가는 것 아닌지. 그런 관점에서 에스터의 시도가 의미 있는지, 에이다이<br>\t\t\t<br>의미 있는지. 우리가 하면 몇 백억씩 들어가는 일을 스타트업 10개가 해서 8~9개 망하는 그런 상<br>\t\t\t<br>황에서 우리가 천억 단위 조단위로 넣어서 이 게임 하는게 맞는지 냉정히 봐야 함.<br>\t\t\t<br>AI 데이터센터는 GPUaaS와 Co-Lo 두개 있는데, Co-lo는 당분간 간다 하지만 장기적으로 공급<br>\t\t\t<br>과잉 가능성 있지 않을까. 지금 프로젝트 수백개 돌아가는데, 우리는 빅텍 잡고 안정적으로 하고<br>\t\t\t<br>있다지만… 그들이 돈 못 벌면 빅텍에 엄청난 할인 하면서 물류센터처럼 간다고 하면 지금 우리<br>\t\t\t<br>가설이 그대로 갈 것인지. 더군다나 GPUaaS는 정부가 공급도 많이 하지만 수요가 우리가 태핑해<br>\t\t\t<br>봐도 거의 없더라. 소버린 Ai DC 얘기하지만 정부 정책으로 어느정도 뛸 수 있겠지만 그것 역시<br>\t\t\t<br>수요 문제에 직면.<br>\t\t\t<br>4가지 모두 각각의 챌린지에 직면. 변화를 네거티브하게 읽는다고 하면…<br>\t\t\t<br>SK AI R&D센터를 올 초에 던졌지만, AI R&D는 그 중 절반도 안될 것. 미디어도 있고 그런데 다<br>\t\t\t<br>AI R&D로 묶어놨는데, 이걸 슬림화 하면서 집중할 필요 있지 않은가? 예를 들어 R&D센터 1,2 나<br>\t\t\t<br>눠야 하지 않을까? 기존 엔터프라이즈 지원하던 R&D와 AI R&D 구분하고 선택과 집중해서 가야<br>\t\t\t<br>할 필요 있지 않을까 고민 했음. 권해성 담당 불렀는데 지난번 AT/DT 마스터 플랜 했었는데, 지금<br>\t\t\t<br>전체가 다 논의 되려면 이것까지 논의 되어야 함. 이 상황에서 수요자로서의 AT/DT는 제대로 가<br>\t\t\t<br>고 있는지. 보안 투자 하기 바쁘고 BSS 하는 것 까지 놓더라도 그 외에 AT에 투자할 여력과 실제<br>\t\t\t<br>효과가 과연 존재하는가. 어둡게 보기 시작하고 전부다 까기 시작하면… 지난번에 BCG가 사업단<br>\t\t\t<br>위 진단한 것과 또 다른 관점에서 전체 시장과 기술, 환경의 변화에 따른 문제를 보는 것.<br>\t\t\t<br>그럼에도 AI 다 때려치우고 MNO로 돌아가면 우리에게 살 길이 있는가라고 했을때, 그 역시 없<br>\t\t\t<br>음. MNO는 상처도 입은데다가 아니라고 하더라도 국내에서 더 성장하기는 어렵고 계속<br>\t\t\t<br>squeeze만 당해서 한계가 명확. AI에서 뭔가를 찾아야 한다는 것은 분명함. 다른 회사들도 같은<br>\t\t\t<br>고민이겠지만, 우리도 찾는데 있어 굉장한 어려움 겪고 있음. 밖에서 봐도 우리가 진심으로 하고<br>\t\t\t<br>있지 않은가. How에 대해서 굉장한 퀘스쳔 존재. 전략 리빌드 하지 않으면 이대로 계속 가다가 침<br>\t\t\t<br>몰할 수 밖에 없는 가능성 굉장히 농후해짐. 그러면서 AI에 쓸 수 있는 리소스는 점점 더 줄어들<br>\t\t\t<br>고. 별로 놓은 일 많고, 그게 돌아올 가능성 높지 않고. 냉정하게 봐야할 것.<br>\t\t\t<br>그럼 어떻게 해야 하는가? 개별 사업 접근이 1단계로 한 것이고, 두번째는 전체 포트폴리오 전략, 세번<br>\t\t\t<br>째는 일하는 방식. 이 세가지가 놓여있는 것.<br>\t\t\t<br>사업부 별로 부탁 드리는 것은…<br>\t\t\t<br>컨설팅과 무관하게 에이닷 피봇팅 전략 고민해서 보고해달라.<br>\t\t\t<br>GPAA는 기본적으로 CEO가 생각하는 가설은 가을에 에스터 커머셜 런칭은 안될 것 같음. 리소스<br>\t\t\t<br>감당도 그렇고 승산도 자신이 없음. GTAA도 어제 해봤지만 연합체 정도로 바라봐야 할 것. 그렇<br>\t\t\t<br>다면 GPAA사업부는 어떻게 피봇팅 하고 GAP co.는 어떻게 피봇팅 해야할까? 스타트업 방식을<br>\t\t\t<br>바꿔봐야 할 것. 글로벌 사업에서 텔코를 어떻게 해서 GAP co에서 만든걸 퍼트린다? 그런 in-out<br>\t\t\t<br>방식에서, 그냥 진짜 괜찮은 스타트업 찾아서 그 중에서 일구는 것. 장기적으로 인수할 회사를. 그<br>\t\t\t<br>한두개 가지고 글로벌 AI서비스 하는 컨셉으로 피봇팅 하는것도 싸고 승산있는 방법 아니겠는가.<br>\t\t\t<br>이것 포함해서 사업부 전체 - GAP Co. 도 포함해서 과감한 피봇팅 계획 내놓아 주시라.<br>\t\t\t<br>AIX는 지금 가설은 A.X와 캡티브 중심으로 가는데, C&C와 잘 상의해서 지금의 제휴 방식 -<br>\t\t\t<br>openAI뿐만 아니라… KT는 팔란티어랑 제휴하고 하는등으로 진행하는데, 이런 방식도 과감하게<br>\t\t\t<br>볼 필요 있음. 안에 있는 것 가지고 R&D센터에서 만든걸로 하는것도 좋은데, 좀 더 성큼성큼하기<br>\t\t\t<br>위해 글로벌 솔루션 파트너와 제휴 과감히 할 필요 있을 것 같음.<br>\t\t\t<br>AI DC는 람다 정도로는 국내 워킹 힘들 것 같고. 소버린 AI는 일정정도 하는데, 생각해야 하는 것<br>\t\t\t<br>은 우리 안에 갖고 있는 GPU자원들과 이번에 들어오는 소버린AI, 장기적으로 울산에 만들어지는<br>\t\t\t<br>AI DC 포함해서 내/외부 어떻게 발란싱 해서 가져갈지 - SKT내부, 그룹, 대외 사업 - 에 대한 고민<br>\t\t\t<br>과, 펀딩하려고 하는 부분 별도로 고민해야하고…<br>\t\t\t<br>솔루션 관점은, 솔루션을 in-rack solution - 이 중 제일 강력한게 GPU인데, 이런 in-rack 솔루션<br>\t\t\t<br>과 inter-rack 솔루션, EPC/MEC솔루션, 에너지 솔루션… 이건 우리가 생각하기 어려우니 넘어가<br>\t\t\t<br>고… EPC/MEC 중에 액침 냉각 등 들어가는데, 이런 3가지 나눴을때 주력할 분야와 어디까지 할<br>\t\t\t<br>수 있는지 AI추진단과 얘기하면서 진행 필요.<br>\t\t\t<br>R&D센터는 좀 더 고민 필요. AI R&D가 3백명 있다고 하는게 좋은지, AI R&D에는 100명이 이런<br>\t\t\t<br>과제에 집중하고 있다… 필요하면 조직개편해서 1,2,로 나눠도 됨. AI R&D센터가 집중할 영역이<br>\t\t\t<br>뭐고, 그 집중을 통해 핵심적인 소수정예 프로젝트를 리디파인 하고 이것만은 모델 포함해서 제대<br>\t\t\t<br>로 하겠다고 할 필요.<br>\t\t\t<br>모델은 WBL과 연계해서 다른곳과 제휴 어떻게 할지.. openAI가 한국에서 새로 만들겠다는 것 포<br>\t\t\t<br>함해서 고민 해주기 바람.<br>\t\t\t<br>AT/DT는 정신 없지만 그럼에도 불구하고 우리가 생각했던 AT/DT 마스터플랜에 어디까지 어떻게<br>\t\t\t<br>갈건지, 그걸 어떻게 피봇팅 할지, 보안투자도 해야하고… 이런 생각은 듦. 보안투자 많이 하는 김<br>\t\t\t<br>에 보안도 AI 투자의 한 유형으로 가져가는건 어떨지 고민해봐야 할 것. 요즘 보안도 다 AI아닌가.<br>\t\t\t<br>보안 투자를 AT/DT투자로 포함시킬 수 있고, 피봇팅이라는 것은 AT/DT 과제들 중 뒤로 좀 미루고<br>\t\t\t<br>보안과제를 앞으로 넣어서 리소스도 AT/DT 3년간 얼마 한다고 한걸 앞에 2년은 보안중심으로 한<br>\t\t\t<br>다던지… 이런 피봇팅이 현실적으로 필요할 것. 보안투자가 제일 급한데, AI가지고 미래를 뭐 하는<br>\t\t\t<br>것 보다도 제일 급한게 보안인데, 보안을 AT/DT관점에서 바라보면서 적어도 보안에 관해서는 철<br>\t\t\t<br>갑을 두른 SKT를 1~2년내에 만들고 거기에 AI 스토리를 입히는게 지금 당장은 다른 얘기보다 훨<br>\t\t\t<br>씬 임팩트 있는 얘기 아니겠는가.<br>\t\t\t<br>포트폴리오 전략은 어떻게 될 것인가. 이런게 이어서 나와야 할 것.<br>\t\t\t<br>결국 고민해야 할 이야기는 (일하는 방식).<br>\t\t\t<br>AI사업도 2가지가 있는 것 같음. 여러가지 있겠지만… AI infra 사업, AI B2B, AI B2C, 글로벌 사업은<br>\t\t\t<br>사업마다 일하는 nature가 다 다른것 같음.<br>\t\t\t<br>AI라고 하면 두가지 방식 - AI CIC만들어서 그 CIC 안에서는 별도의 HR, 평가 보상, 등등 다 따로 만들<br>\t\t\t<br>자는 어프로치 있을 것이고, 그게 아니면 사업부 특성에 맞는 부분을 강조해 주는 것도 가능할 것.<br>\t\t\t<br>DC사업부는 인프라 성이라서 별도 법인화 하는것도 생각한다 하면, 거기에 맞는 새로운게 만들<br>\t\t\t<br>어 질 수 밖에 없음. B2B는 B2B에 맞는 성과 보상체계나 일하는 방식이나 HR에 대한 부분이 필<br>\t\t\t<br>요. AI가 중요한가 B2B/B2C/Infra가 중요한가 보면 AI보다 업의 특성이 중요하지 않은가 생각.<br>\t\t\t<br>AIX는 AIX에 맞는게 필요하고… 에이닷은 정말 국내 플랫폼 회사 또는 AI회사들이 갖고 있는 여러<br>\t\t\t<br>가지 시스템들을 어떻게 접목시킬지에 대해 고민할 필요가 있을 것. GPAA는 피봇팅에 따라 다르<br>\t\t\t<br>겠지만 거기 맞게 새로운 모습 가져가야 하고…<br>\t\t\t<br>CIC단위와 사업부 단위로 가는 것에 대해서… 각 사업부 별 SKT 전체 틀 속에서 굉장히 획기적으<br>\t\t\t<br>로 확 바뀌어야 하는 곳도 있을 것이고 - 에이닷 같은… 전체 30% 정도만 SKT의 영향 받고 70%는<br>\t\t\t<br>에이닷에 특수하게 바꾸고, B2B는 좀 덜하고 등등. DC는 인프라 성격이라 좀 더 다르게… 이런 어<br>\t\t\t<br>프로치 할것인지. R&D는 또 어떻게 다르게 할지 등 이런 고민들 해야 함.<br>\t\t\t<br>이제는 목표와 성과와 로드맵이 분명해져야함. 이런 목표 갖고 있으면서 언제까지 얼마만큼 하는<br>\t\t\t<br>데 안되면 접겠다. 리소스 얼마만큼 필요하고 어떻게 가겠다 라는게 각자 나와야 함. 지난번에 발<br>\t\t\t<br>표한 정도가 아님. 회장님 말씀하신 사즉생 정도로 생각하고, 목표와 도달했을 때 달성 가능한 것<br>\t\t\t<br>의 measure를 어떻게 할지, 로드맵을 어떻게 가져갈지가 나와줘야 함.<br>\t\t\t<br>또 하나는 AI전체를 묶어서, 돈을 얼마 쓸 수 있고, 어떤 목표를 만들어야 하고 - 어떤 성과를 만들<br>\t\t\t<br>어야 하고, 언제까지 어떻게 해야하는지. 그걸 하기위해 지금의 방식이 맞는지 in-organic한 방법<br>\t\t\t<br>이 맞는지, 사업부 통합이 맞는지 등에 대해 컨설팅 의견이 필요함. 사업부 마다 의견은 따로 받더<br>\t\t\t<br>라도 전체 시스템 어떻게 가져가면 좋을지. 사업부와 협의해서…<br>\t\t\t<br>말랑말랑한 방식에 대해서는 CIC로 묶는게 좋을지, 사업부별로 하는게 좋을지. 사업부별로 하더<br>\t\t\t<br>라도 텔레콤 구성원이라 갑자기 다른 기준 적용하기도 어려울 것. 예를 들면 굳이 KPI를 에이닷<br>\t\t\t<br>같은 경우 무빙타겟으로 가져가도 되지 않는가. 분기별 평가하고 피봇팅 한다던가. 연말이 무슨<br>\t\t\t<br>의미가 있고 연초가 무슨 의미가 있는가. SKT는 있겠지만. 이정도의 플렉서빌러티 가져갈 필요 있<br>\t\t\t<br>을 것. AI Infra의 별도 법인화는 논의해 보자. AIX는 C&C랑 같이 하는게 워킹 잘 할지도 봐야함.<br>\t\t\t<br>같이 하는데 인사 체계가 다르니까.<br>\t\t\t<br>혁명적 수준의 변화가 필요함. 이것을 ‘조금씩 바꿔가면서 올 해 만든대로 가시죠’ 이런게 아님. 내<br>\t\t\t<br>외부 환경변화가 워낙 크기 때문에, AI사업 전략 전체에 대한 피봇팅/리밸런싱이 필요함. 컨트롤<br>\t\t\t<br>타워는 CSO에서 담당하셔야 하고. 연말 내에 프로젝트는 7월 전에 끝나겠지만, 연말 내에 피봇팅<br>\t\t\t<br>완성하겠다. 빠르면 하반기에. 굳이 연말 기다릴 필요가 없음.<br>\t\t\t<br>7월에 회장님과 다시 보고 드려야 하고, 경영전략회의때에는 결론 안나겠지만… 7월 중순 정도에<br>\t\t\t<br>결론을 내서 가야 함. 우리의 가설적 결론. 7월 초에 안에서 정리하고, 7월 중순이나 말까지에 회<br>\t\t\t<br>장님께 가는 것 필요. 결론 못내리고 가면 아무 의미 없음. 이제는 결론을 가져가야 함. 컨설팅은 7<br>\t\t\t<br>월 초까지 빨리하고, 우리끼리 내부 정리해서.. .7월 중순, 20일 정도에는 회장님, 그전에 의장님과<br>\t\t\t<br>결론 내야함.",
    "w": 400
  }
];

let cards = [];
let moving = null, resizing = null;

function loadBoard() {
  const saved = localStorage.getItem(SAVE_KEY);
  cards = saved ? JSON.parse(saved) : DEFAULT_CARDS.map(c => ({...c}));
  renderCards();
  if (!saved) autoLayout();
}

function autoLayout() {
  const GAP = 14;
  const boardW = document.getElementById('board').offsetWidth;
  const cols = Math.max(1, Math.floor(boardW / 280));
  const colW = (boardW - GAP * (cols - 1)) / cols;
  const colHeights = new Array(cols).fill(0);
  const allCards = document.querySelectorAll('.card');
  const images = document.querySelectorAll('.card img');
  let loaded = 0;
  const total = images.length;

  function place() {
    allCards.forEach((el, i) => {
      const card = cards[i];
      const w = Math.min(card.w || colW, colW);
      let minCol = 0;
      for (let c = 1; c < cols; c++) if (colHeights[c] < colHeights[minCol]) minCol = c;
      card.x = minCol * (colW + GAP);
      card.y = colHeights[minCol];
      card.w = w;
      el.style.left = card.x + 'px';
      el.style.top = card.y + 'px';
      el.style.width = w + 'px';
      colHeights[minCol] = card.y + el.offsetHeight + GAP;
    });
    document.getElementById('board').style.minHeight = Math.max(...colHeights) + 100 + 'px';
    saveBoard();
  }

  if (total === 0) requestAnimationFrame(place);
  else images.forEach(img => {
    if (img.complete) { loaded++; if (loaded >= total) requestAnimationFrame(place); }
    else img.onload = img.onerror = () => { loaded++; if (loaded >= total) requestAnimationFrame(place); };
  });
}

function syncText() {
  document.querySelectorAll('.card').forEach(el => {
    const idx = +el.dataset.idx;
    if (cards[idx]?.type === 'text') {
      const t = el.querySelector('.text');
      if (t) cards[idx].content = t.innerHTML;
    }
  });
}

function saveBoard() {
  syncText();
  localStorage.setItem(SAVE_KEY, JSON.stringify(cards));
  document.getElementById('status').textContent = '저장됨 ' + new Date().toLocaleTimeString();
}

function renderCards() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  cards.forEach((card, i) => {
    const el = document.createElement('div');
    el.className = 'card';
    el.dataset.idx = i;
    if (card.x !== undefined) el.style.left = card.x + 'px';
    if (card.y !== undefined) el.style.top = card.y + 'px';
    if (card.w) el.style.width = card.w + 'px';

    el.addEventListener('mousedown', e => {
      if (e.target.closest('.text, a, .card-btn, .resize-handle, table')) return;
      e.preventDefault();
      moving = { idx: i, startX: e.clientX, startY: e.clientY, origX: card.x || 0, origY: card.y || 0 };
      el.classList.add('moving');
    });

    const actions = document.createElement('div');
    actions.className = 'card-actions';
    const delBtn = document.createElement('button');
    delBtn.className = 'card-btn'; delBtn.textContent = '×';
    delBtn.onclick = e => { e.stopPropagation(); if (confirm('삭제?')) { cards.splice(i, 1); renderCards(); saveBoard(); } };
    actions.appendChild(delBtn);
    el.appendChild(actions);

    if (card.type === 'text') {
      const text = document.createElement('div');
      text.className = 'text';
      text.contentEditable = true;
      text.innerHTML = card.content || '';
      text.addEventListener('blur', () => { card.content = text.innerHTML; saveBoard(); });
      el.appendChild(text);
    } else if (card.type === 'image') {
      const src = card.src.startsWith('http') || card.src.startsWith('data:') ? card.src : IMG_BASE + card.src;
      const img = document.createElement('img');
      img.src = src;
      img.alt = card.alt || '';
      img.loading = 'lazy';
      img.onerror = () => img.style.display = 'none';
      if (card.link) {
        const a = document.createElement('a'); a.href = card.link; a.target = '_blank';
        a.appendChild(img); el.appendChild(a);
      } else { el.appendChild(img); }
      if (card.caption) {
        const cap = document.createElement('div');
        cap.className = 'caption';
        cap.textContent = card.caption;
        el.appendChild(cap);
      }
    } else if (card.type === 'table') {
      const wrapper = document.createElement('div');
      wrapper.style.overflowX = 'auto';
      wrapper.innerHTML = card.html || '';
      el.appendChild(wrapper);
    }

    const rh = document.createElement('div');
    rh.className = 'resize-handle';
    rh.addEventListener('mousedown', e => {
      e.preventDefault(); e.stopPropagation();
      resizing = { idx: i, startX: e.clientX, startW: card.w || el.offsetWidth };
    });
    el.appendChild(rh);
    board.appendChild(el);
  });

  requestAnimationFrame(() => {
    let maxBottom = 0;
    document.querySelectorAll('.card').forEach(el => {
      const b = (parseFloat(el.style.top) || 0) + el.offsetHeight;
      if (b > maxBottom) maxBottom = b;
    });
    board.style.minHeight = (maxBottom + 100) + 'px';
  });
}

document.addEventListener('mousemove', e => {
  if (moving) {
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`);
    if (!el) return;
    const nx = moving.origX + e.clientX - moving.startX;
    const ny = moving.origY + e.clientY - moving.startY;
    el.style.left = nx + 'px';
    el.style.top = ny + 'px';
  }
  if (resizing) {
    const card = cards[resizing.idx];
    card.w = Math.max(100, resizing.startW + e.clientX - resizing.startX);
    const el = document.querySelector(`.card[data-idx="${resizing.idx}"]`);
    if (el) el.style.width = card.w + 'px';
  }
});

document.addEventListener('mouseup', e => {
  if (moving) {
    const card = cards[moving.idx];
    card.x = Math.max(0, moving.origX + e.clientX - moving.startX);
    card.y = Math.max(0, moving.origY + e.clientY - moving.startY);
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`);
    if (el) { el.classList.remove('moving'); }
    moving = null; saveBoard();
  }
  if (resizing) { resizing = null; saveBoard(); }
});

function addTextCard() {
  cards.push({ type: 'text', content: '', x: 50, y: window.scrollY + 100, w: 300 });
  renderCards();
  setTimeout(() => { const els = document.querySelectorAll('.card .text'); els[els.length - 1]?.focus(); }, 100);
}

function addImageCard() {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = 'image/*';
  input.onchange = e => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = () => { cards.push({ type: 'image', src: reader.result, x: 50, y: window.scrollY + 100, w: 240 }); renderCards(); saveBoard(); };
    reader.readAsDataURL(file);
  };
  input.click();
}

function resetLayout() {
  if (!confirm('자동 재배치합니다. 현재 위치가 변경됩니다.')) return;
  cards.forEach(c => { delete c.x; delete c.y; });
  renderCards(); autoLayout();
}

setInterval(saveBoard, 30000);
loadBoard();
</script>
