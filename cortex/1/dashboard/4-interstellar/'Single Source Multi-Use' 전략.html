const DEFAULT_CARDS = [
  {
    "type": "text",
    "content": "'Single Source Multi-Use' 전략<br>\t\t<br>\t\t<br>\t<br>\t<br>\t\t<br>\t\t\t<br>\t\t\t\t<br>Reading > listening 강화 >>> Writing > Speaking 강화<br>\t\t\t\t<br>읽기와 쓰기가 수용/생산 스킬로 listening과 speaking을 강화하는 데 기여함<br>\t\t\t\t<br>읽기 향상은 listening을 강화하며, 연구에서 읽기-듣기 상관성이 높게 나타납니다. <br>\t\t\t\t<br>쓰기는 speaking에 긍정적 영향을 미쳐 어휘와 문법 조직이 공유되기 때문입니다. 전체적으로 receptive 스킬(읽기/듣기)이 productive 스킬(쓰기/말하기)을 선행하며 연쇄 효과<br>\t\t\t\t<br><br>\t\t\t\t<br>하나의 소스(Source)를 끝까지 파서 모든 영역으로 전이시키는 'Single Source Multi-Use' 전략<br>\t\t\t\t<br><br>\t\t\t\t<br><a href=\"https://chatgpt.com/c/69631f0e-a4a0-8321-a3a4-69b94db587e4\" target=\"_blank\">https://chatgpt.com/c/69631f0e-a4a0-8321-a3a4-69b94db587e4</a><br>\t\t\t\t<br><a href=\"https://chatgpt.com/c/695ac3b7-15e8-8322-a26c-f65454fc1fbb\" target=\"_blank\">https://chatgpt.com/c/695ac3b7-15e8-8322-a26c-f65454fc1fbb</a><br>\t\t\t\t<br><br>\t\t\t\t<br><a href=\"https://www.perplexity.ai/search/culryeog-ganeunghan-yeongeo-ji-jt8aHI4ITImaSABo1t3RyQ\" target=\"_blank\">지문이 있는 오디오</a>: <a href=\"https://www.ted.com/talks/sir_ken_robinson_do_schools_kill_creativity?referrer=playlist-the_most_popular_talks_of_all&hsa_acc=7777130675&hsa_cam=218945593&hsa_grp=17379703273&hsa_ad=295607643496&hsa_src=g&hsa_tgt=kwd-2575934383&hsa_kw=ted+talks&hsa_mt=b&hsa_net=adwords&hsa_ver=3&gad_source=1&gad_campaignid=218945593&gbraid=0AAAAADn2rKfyrKOTWGslmfUQJZXO3evYL&gclid=Cj0KCQiAgvPKBhCxARIsAOlK_EpwF67mKNzp-jxU7wzRW_WRdGpq9S7DSKQRbdmvd_hIxdOuKpUZqhwaAtBZEALw_wcB\" target=\"_blank\">TED</a>, 컨퍼런스콜, <a href=\"https://learningenglish.voanews.com/\" target=\"_blank\">VOA</a> 팟캐스트(<a href=\"https://www.perplexity.ai/search/culryeog-ganeunghan-yeongeo-ji-jt8aHI4ITImaSABo1t3RyQ\" target=\"_blank\">TED</a> Talks Daily NPR 계열 일부)<br>\t\t\t\t<br>[Phase 1] (2~4주)<br>\t\t\t\t<br>- <a href=\"https://chatgpt.com/c/695ac3b7-15e8-8322-a26c-f65454fc1fbb\" target=\"_blank\">Listening + Reading 기반의 '구조 흡수'</a><br>\t\t\t\t<br>- Writing: 하루 5~7문장,  Writing을 통한 '사고의 영어화(Thinking in English)'.<br>\t\t\t\t<br>- <br>목적:&#160;“이걸 말로 써먹겠다”<br>\t\t\t\t<br>\t\t\t\t\t<br>- 연쇄 효과: 느리지만 정확한 Writing 훈련은 Speaking의 '정확도'를 결정합니다. 이 단계가 탄탄해야 화상 회의에서 비문(broken English)을 줄일 수 있습니다.<br>\t\t\t\t<br>\t\t\t\t<br>\t\t\t\t<br>- Speaking 5~10분&#160;(문장 3~5개)<br>\t\t\t\t<br>[Phase 2] 자동화 및 통합 (4주+)<br>\t\t\t\t<br>Writing → 키워드 → Speaking<br>\t\t\t\t<br>- <br>녹음 + 재말하기: Speaking 자동화 및 유창성 확보.<br>\t\t\t\t<br>\t\t\t\t\t<br>- <br>방식:<br>\t\t\t\t\t<br>\t\t\t\t\t\t<br>- Phase 2에서 교정받은 '나의 논리'를 Shadowing하고, 키워드만 보고 <b>자유 발화(Free Speaking)</b>를 연습합니다.<br>\t\t\t\t\t\t<br>- 실전 대화: 주 2회 이상 AI 튜터나 파트너와 Apple 협상 상황극을 진행하며 돌발 질문에 대응하는 연습을 합니다.<br>\t\t\t\t\t<br>\t\t\t\t\t<br>\t\t\t\t\t<br>- 연쇄 효과: 이미 써보고(W), 소리를 익힌(L) 문장이기 때문에 Speaking 시 '뇌의 과부하'가 줄어들어 훨씬 매끄럽게 말이 나옵니다.<br>\t\t\t\t<br>\t\t\t\t<br>\t\t\t\t<br><br>\t\t\t\t<br>______<br>\t\t\t\t<br><br>\t\t\t\t<br>\t\t\t\t\t<br>- 손절매 원칙: 읽었을 때 70% 이상 이해되지 않는 너무 어려운 AI 논문이나 아티클은 과감히 버리세요. 효율이 나오지 않습니다.<br>\t\t\t\t\t<br>- AI의 적극적 활용: ChatGPT를 단순히 번역기가 아닌 <b>'교정자이자 협상 파트너'</b>로 활용하세요.<br>\t\t\t\t\t<br>- 기한 설정: 이 루프를 3개월만 제대로 돌려도 <b>Speaking/Writing의 임계점(Threshold)</b>을 넘을 수 있습니다.<br>\t\t\t\t<br>\t\t\t\t<br><br>\t\t\t\t<br>3. 최종 결론: 무엇을 먼저 해야 하는가?<br>\t\t\t\t<br>\t\t\t\t\t<br>- 가장 먼저: Apple/AI 관련 짧은 글을 쓰기(Writing) 시작하세요.<br>\t\t\t\t\t<br>- 그다음: 쓴 내용을 바탕으로 관련 영상을 반복 청취(Listening) 하세요.<br>\t\t\t\t\t<br>- 마지막으로: 그 문장들이 입에 붙을 때까지 <b>말하기(Speaking)</b>를 반복하세요.<br>\t\t\t\t<br>\t\t\t\t<br>이 루프가 사용자님의 2년 공부 한계를 3개월 안에 깨뜨릴 최적의 경로입니다. <br>\t\t\t\t<br><br>\t\t\t\t<br><br>\t\t\t\t<br>&#128293; 핵심 재설계 원칙 (이 3가지만 기억)<br>\t\t\t\t<br>- Speaking은 결과물이 아니라 ‘저속 훈련 대상’<br>\t\t\t\t<br>- Writing은 Speaking을 위한 리허설<br>\t\t\t\t<br>- Listening은 항상 Speaking보다 앞선다<br>\t\t\t\t<br><br>\t\t\t\t<br>A안 - Listning으로 시작<br>\t\t\t\t<br>[Single Source]<br>\t\t\t\t<br>   ↓<br>\t\t\t\t<br>Listening (깊게, 반복)<br>\t\t\t\t<br>   ↓<br>\t\t\t\t<br>Writing (느리게, 짧게)<br>\t\t\t\t<br>   ↓<br>\t\t\t\t<br>Speaking (아주 느리게, 즉시)<br>\t\t\t\t<br>   ↺ (루프)<br>\t\t\t\t<br>&#128204; Reading은 ‘보조 입력’로 유지, 메인은 아님<br>\t\t\t\t<br><br>\t\t\t\t<br>B안 - Reading으로 시작<br>\t\t\t\t<br>'Reading(정보 습득) → Writing(논리 구성) → Listening/Speaking(출력)' 순서가 훨씬 빠릅니다. 내 생각(Writing)이 정립되어야 상대방의 말(Listening)도 비로소 전략적으로 들립니다.<br>\t\t\t\t<br><br>\t\t\t\t<br>- 절충안<br>\t\t\t\t<br>- Phase 1: Listening + Reading 기반 재구성 (2-4주, 하루 40-60분) 하나의 소스 (TED/팟캐스트)로 시작: 전체 청취 → 자막 reading while listening → 문장 체크. Extensive reading으로 보완 (관련 기사 10-15분). 효과: Input 폭발, vocabulary + 구조 흡수.<a href=\"https://www.leonardoenglish.com/blog/intensive-vs-extensive-listening\" target=\"_blank\">leonardoenglish.com</a><a href=\"https://www.lucalampariello.com/intensive-reading-vs-extensive-reading/\" target=\"_blank\">lucalampariello.com</a><br>\t\t\t\t<br>- <br><br>\t\t\t\t<br>\t\t\t\t<br>- Phase 2: Writing으로 고정화 (2-4주, 하루 30-40분) 체크한 문장으로 요약/의견 쓰기 (AI 교정). Paraphrasing 강조. Reading 소스 요약 추가. 효과: Thinking in English, speaking 기반.<a href=\"https://www.assignnmentinneed.com/blog/the-four-key-language-skills-speak-listen-read-write\" target=\"_blank\">assignnmentinneed.com</a><br>\t\t\t\t<br>- <br><br>\t\t\t\t<br>\t\t\t\t<br>- Phase 3: Speaking 자동화 + 통합 (4주+, 하루 40-60분) Writing 글 shadowing/dictation → 자유 speaking (녹음/파트너). 소스 다양화 (extensive). 효과: Fluency 폭발, 자신감.<a href=\"https://www.tandfonline.com/doi/full/10.1080/29984475.2025.2546827\" target=\"_blank\">tandfonline.com</a><a href=\"https://gianfrancoconti.com/2025/07/26/shadowing-for-fluency-prosody-and-listening-comprehension-the-what-why-and-how-according-to-sla-research/\" target=\"_blank\">gianfrancoconti.com</a><br>\t\t\t\t<br>공격적 팁: AI (ChatGPT)로 교정, 어려운 소스 손절. 주 2회 실전 대화. 이 루프로 3개월 후 speaking/writing 한계 극복 가능.<br>\t\t\t\t<br><br>\t\t\t\t<br>전제된 이론<br>\t\t\t\t<br>- Reading → Listening: 어휘/문법 지식은 전이되지만,&#160;음성 디코딩 능력은 별도 훈련 필요<br>\t\t\t\t<br>- Writing → Speaking: 문장 구성력은 전이되지만,&#160;실시간 처리 + 발음은 별도 훈련 필요<br>\t\t\t\t<br>Listening → Writing → Speaking (삼각 루프): 폭발 성장은 여기서 발생한다.<br>\t\t\t\t<br><br>\t\t\t\t<br>R: 뉴스 읽기(하루 30분), 어휘 노트 작성<br>\t\t\t\t<br>L: 읽은 텍스트 오디오 듣기(reading while listening)<br>\t\t\t\t<br>W/S: 읽은 내용 요약 쓰기 후 소리 내어 읽고 녹음, AI 앱으로 피드백<br>\t\t\t\t<br><br>\t\t\t\t<br>\t\t\t\t\t<br>\t\t\t\t\t\t먼저 키우는 것<br>\t\t\t\t\t\t연쇄 효과<br>\t\t\t\t\t<br>\t\t\t\t\t<br>\t\t\t\t\t\tListening (깊게)<br>\t\t\t\t\t\tSpeaking 구조 확보<br>\t\t\t\t\t<br>\t\t\t\t\t<br>\t\t\t\t\t\tWriting (느리게)<br>\t\t\t\t\t\t사고력 + 문장력 동시 상승<br>\t\t\t\t\t<br>\t\t\t\t\t<br>\t\t\t\t\t\tSpeaking (반복)<br>\t\t\t\t\t\t자동화 + 자신감<br>\t\t\t\t\t<br>\t\t\t\t\t<br>\t\t\t\t\t\t<br><br>\t\t\t\t\t\t<br>\t\t\t\t\t\t<br><br>\t\t\t\t\t\t<br>\t\t\t\t\t<br>\t\t\t\t<br>\t\t\t\t<br>Input(수용)          Output(생산)<br>\t\t\t\t<br>        ─────────────────────────────────<br>\t\t\t\t<br>문어    Reading      →→→     Writing<br>\t\t\t\t<br>        ↓ (부분전이)          ↓ (부분전이)<br>\t\t\t\t<br>구어    Listening    →→→     Speaking<br>\t\t\t\t<br><br>\t\t\t\t<br>연쇄 효과 요약<br>\t\t\t\t<br>Reading (기반)<br>\t\t\t\t<br>    ↓ 어휘/구조<br>\t\t\t\t<br>Writing (조직력) ──────────────┐<br>\t\t\t\t<br>    ↓                         ↓<br>\t\t\t\t<br>Listening+Shadowing (음성화)   ↓<br>\t\t\t\t<br>    ↓                         ↓<br>\t\t\t\t<br>Speaking (통합) ←─────────────┘<br>\t\t\t\t<br><br>\t\t\t\t<br>단기 폭발적 성장의 핵심:&#160;Extensive Reading으로&#160;입력량을 폭발적으로 늘리면서&#160;Writing으로&#160;출력 회로를 먼저 여는 것입니다. Speaking은 이 기반 위에서 훨씬 빠르게 발달<br>\t\t\t\t<br><br>\t\t\t\t<br>① Listening으로 자연스러운 영어 구조를 주입<br>\t\t\t\t<br>② 그 구조로 Writing (느리게)<br>\t\t\t\t<br>③ 같은 문장을 Speaking (빠르게)<br>\t\t\t\t<br><br>\t\t\t\t<br>Listening → Speaking (직결)<br>\t\t\t\t<br>- Speaking은 Writing보다&#160;Listening 의존도가 훨씬 높다<br>\t\t\t\t<br>- 사람은 “내가 자주 들은 리듬&#183;문장 길이&#183;패턴”으로만 말한다<br>\t\t\t\t<br>Reading → Writing (확장)<br>\t\t\t\t<br>- Reading은&#160;구조&#183;어휘&#183;논리의 최대 공급원<br>\t\t\t\t<br>- Writing은&#160;Reading을 ‘내 사고 구조’로 재조립하는 과정<br>\t\t\t\t<br><br>\t\t\t\t<br>&#128293; Phase 1 (2~3주): Listening 기반 재구성<br>\t\t\t\t<br>- <br>하나의 콘텐츠만 깊게<br>\t\t\t\t<br>\t\t\t\t\t<br>- TED / Podcast / 인터뷰 1개 선택<br>\t\t\t\t<br>\t\t\t\t<br>\t\t\t\t<br>- <br>하루 20~30분<br>\t\t\t\t<br>\t\t\t\t\t<br>- 전체 청취 (자막 ❌)<br>\t\t\t\t\t<br>- 자막 보며 다시 듣기<br>\t\t\t\t\t<br>- ‘말할 수 있을 것 같은 문장’만 체크 (10~15개)<br>\t\t\t\t<br>\t\t\t\t<br>\t\t\t\t<br>&#128073; 목표:&#160;“이 사람처럼 말할 수 있을 것 같다”는 감각<br>\t\t\t\t<br><br>\t\t\t\t<br>&#128293; Phase 2 (2주): Writing으로 사고 고정<br>\t\t\t\t<br>방법<br>\t\t\t\t<br>- <br>Phase 1에서 고른 문장들로:<br>\t\t\t\t<br>\t\t\t\t\t<br>- 요약 / 의견 / 반박을 Writing<br>\t\t\t\t<br>\t\t\t\t<br>\t\t\t\t<br>- <br>조건:<br>\t\t\t\t<br>\t\t\t\t\t<br>- 번역 ❌<br>\t\t\t\t\t<br>- 완벽 ❌<br>\t\t\t\t\t<br>- 내 생각을 같은 구조로만 표현<br>\t\t\t\t<br>\t\t\t\t<br>\t\t\t\t<br>&#128073; 목표:<br>\t\t\t\t<br>“내 생각이 영어 구조로 바로 나온다”는 감각<br>\t\t\t\t<br><br>\t\t\t\t<br>&#128293; Phase 3 (2주): Speaking 자동화<br>\t\t\t\t<br>방법<br>\t\t\t\t<br>- <br>Phase 2에서 쓴 글로:<br>\t\t\t\t<br>\t\t\t\t\t<br>- 원문 보며 말하기<br>\t\t\t\t\t<br>- 키워드만 보고 말하기<br>\t\t\t\t\t<br>- 키워드 없이 말하기<br>\t\t\t\t\t<br>⏱ 1문단 = 30초 이내<br>\t\t\t\t<br>\t\t\t\t<br>\t\t\t\t<br>&#128073; 목표:<br>\t\t\t\t<br>- 말이&#160;느려도 끊기지 않음<br>\t\t\t\t<br>- 문장이 “내 것이 됐다는 느낌”<br>\t\t\t\t<br><br>\t\t\t\t<br>1단계: Extensive Reading (2-3개월 집중)<br>\t\t\t\t<br>\t\t\t\t\t<br>- 4개 스킬 모두의 기반이 되는&#160;어휘력 + 문장구조 감각&#160;확보<br>\t\t\t\t\t<br>- 자기 속도로 학습 가능 → 효율 최고<br>\t\t\t\t\t<br>- Writing + Listening 모두에 전이<br>\t\t\t\t<br>\t\t\t\t<br>\t\t\t\t\t<br>- 본인 수준보다&#160;살짝 쉬운&#160;원서 (90% 이상 이해되는 것)<br>\t\t\t\t\t<br>- 하루 30분-1시간,&#160;사전 최소 사용&#160;(흐름 유지)<br>\t\t\t\t\t<br>- 추천: 그레이디드 리더 → 본인 관심 분야 원서<br>\t\t\t\t<br>\t\t\t\t<br>\t\t\t\t\t<br>- 방법: 자신의 수준보다 약간 높은 아티클이나 대본(TED, 뉴스, 비즈니스 이메일 등) 하나를 선정합니다.<br>\t\t\t\t\t<br>- 핵심: 눈으로 읽어서 완벽히 이해한 후, 스크립트 없이 90% 이상 들릴 때까지 반복해서 듣습니다.<br>\t\t\t\t\t<br>- 효과: Reading 자산을 Listening 자산으로 100% 강제 전환합니다.<br>\t\t\t\t\t<br><br>\t\t\t\t<br>\t\t\t\t<br>2단계: Writing 훈련 (Reading과 병행)<br>\t\t\t\t<br>\t\t\t\t\t<br>- 시간을 두고 생각 가능 →&#160;문장 조직력&#160;훈련에 최적<br>\t\t\t\t\t<br>- 이 능력이 Speaking의 기반이 됨<br>\t\t\t\t\t<br>- 피드백 받기 용이 (ChatGPT, 원어민 첨삭)<br>\t\t\t\t<br>\t\t\t\t<br>\t\t\t\t\t<br>- 매일 10-15분&#160;자유 글쓰기&#160;(주제 무관, 양 중시)<br>\t\t\t\t\t<br>- 주 2-3회&#160;첨삭 받기&#160;(패턴 오류 인식)<br>\t\t\t\t\t<br>- 읽은 내용 요약하기 → Reading과 연결<br>\t\t\t\t<br>\t\t\t\t<br>\t\t\t\t\t<br>- 방법: 학습한 지문의 주제를 바탕으로 나만의 문장으로 요약하거나 반박하는 글을 씁니다.<br>\t\t\t\t\t<br>- 핵심: 앱에서 준 예문이 아니라, 내가 실무나 일상에서 쓸 법한 문장으로 변형(Paraphrasing)합니다.<br>\t\t\t\t\t<br>- 효과: '읽기/듣기'로 들어온 수동적 지식이 '내 것'인 능동적 지식(Writing)으로 변합니다.<br>\t\t\t\t<br>\t\t\t\t<br><br>\t\t\t\t<br>3단계: Listening + Shadowing (1-2개월 후 추가)<br>\t\t\t\t<br>목적:&#160;Reading으로 쌓은 지식을&#160;음성으로 활성화<br>\t\t\t\t<br>\t\t\t\t\t<br>- 받아쓰기(Dictation): 듣고 → 쓰고 → 확인 (Listening-Writing 연결)<br>\t\t\t\t\t<br>- 쉐도잉: 듣자마자 따라 말하기 (Listening-Speaking 연결)<br>\t\t\t\t\t<br>- 소스: 본인 수준 맞는 팟캐스트, TED (스크립트 있는 것)<br>\t\t\t\t<br>\t\t\t\t<br>\t\t\t\t\t<br>- 방법: 들리는 대로 받아쓰고(Dictation), 원어민의 속도와 억양을 0.1초 차이로 따라 합니다(Shadowing).<br>\t\t\t\t\t<br>- 핵심: 단순히 따라 하는 게 아니라, 해당 문장의 '감정'과 '상황'을 뇌에 동기화해야 합니다.<br>\t\t\t\t\t<br>- 효과: 이 과정이 생략되면 Speaking에서 '앱에서 배운 문장'만 맴돌 뿐, 내 생각을 말할 수 없습니다.<br>\t\t\t\t<br>\t\t\t\t<br><br>\t\t\t\t<br>4단계: Speaking 실전 (3-4개월 후 본격화)<br>\t\t\t\t<br>\t\t\t\t\t<br>- 어휘/문장구조 체화 (Reading에서)<br>\t\t\t\t\t<br>- 문장 조직력 확보 (Writing에서)<br>\t\t\t\t\t<br>- 음성 디코딩 + 발음 패턴 흡수 (Shadowing에서)<br>\t\t\t\t<br>\t\t\t\t<br>\t\t\t\t\t<br>- 혼잣말 연습 (하루 5-10분, 주제 정해서 말하기)<br>\t\t\t\t\t<br>- 실제 대화 (원어민 튜터, 랭귀지 익스체인지)<br>\t\t\t\t<br>\t\t\t\t<br>\t\t\t\t\t<br>- 방법: 작성한 글을 보지 않고 누군가에게 설명하듯 말합니다. AI 튜터나 거울을 활용하세요.<br>\t\t\t\t\t<br>- 핵심: 문법적 완벽함보다 <b>'끊김 없는 흐름(Fluency)'</b>에 집중합니다. 막히는 부분은 다시 Step 3로 돌아가 문장을 단순화합니다.<br>\t\t\t\t\t<br>- 효과: Writing의 논리가 Speaking의 순발력과 결합되어 폭발적인 유창성을 만들어냅니다.<br>\t\t\t\t<br>\t\t\t\t<br><br>\t\t\t\t<br>3. 공격적 실행 전략 (Aggressive Action Plan)<br>\t\t\t\t<br>\t\t\t\t\t<br>- 우선순위 타격: 가장 먼저 <b>'내가 하고 싶은 말'을 영어로 써보는 것(Writing)</b>부터 시작하세요.<br>\t\t\t\t\t<br>- 트렌드 반영: 챗GPT나 AI 도구를 활용해 본인이 쓴 글을 '자연스러운 비즈니스/일상 톤'으로 교정받고, 그 교정된 문장을 <b>Step 2(Shadowing)</b>의 재료로 삼으세요. 이것이 현재 가장 효율적인 학습 테크입니다.<br>\t\t\t\t\t<br>- 손절매: 읽어도 이해가 안 가거나 너무 어려운 지문은 과감히 버리세요. 수익률(학습 효율)이 낮습니다.<br>\t\t\t\t<br>\t\t\t\t<br>\"Writing이 막히면 Speaking은 절대 터지지 않습니다.\"<br>\t\t\t\t<br>오늘 바로 본인의 관심 분야에 대한 짧은 글 5문장을 써보는 것부터 시작해 보시겠어요? 제가 그 문장들을 원어민 스타일로 교정하고 Speaking 훈련을 위한 가이드를 드려보겠습니다.<br>\t\t\t\t<br><br>\t\t\t\t<br><br>\t\t\t\t<br><br>\t\t\t\t<br>결론 한 줄<br>\t\t\t\t<br>“같은 영상 반복 → 다른 영상 확장”<br>\t\t\t\t<br>이 순서를 어기면, 아무리 열심히 해도 Speaking은 안 터진다.<br>\t\t\t\t<br>즉,<br>\t\t\t\t<br>- ❌ 매일 다른 영상만<br>\t\t\t\t<br>- ❌ 같은 영상만 계속<br>\t\t\t\t<br>- ⭕&#160;한 영상으로 ‘전이’가 끝난 뒤에 다음 영상<br>\t\t\t\t<br><br>\t\t\t\t<br>왜 그런가 (뇌 관점에서)<br>\t\t\t\t<br>영어 실력에는&#160;두 종류의 성장이 있다.<br>\t\t\t\t<br>\t\t\t\t\t<br>\t\t\t\t\t\t종류<br>\t\t\t\t\t\t무엇이 늘까<br>\t\t\t\t\t\t방식<br>\t\t\t\t\t<br>\t\t\t\t\t<br>\t\t\t\t\t\t&#128313; 인식 성장<br>\t\t\t\t\t\t“들린다 / 안 들린다”<br>\t\t\t\t\t\t반복<br>\t\t\t\t\t<br>\t\t\t\t\t<br>\t\t\t\t\t\t&#128313; 생성 성장<br>\t\t\t\t\t\t“말이 나온다”<br>\t\t\t\t\t\t재사용<br>\t\t\t\t\t<br>\t\t\t\t<br>\t\t\t\t<br>&#128073;&#160;Speaking은 ‘생성 성장’이라 반복 없이는 절대 안 생긴다.<br>\t\t\t\t<br><br>\t\t\t\t<br>두 전략을 냉정하게 비교해보자<br>\t\t\t\t<br>❌ 매일 다른 영상 (루틴은 같음)<br>\t\t\t\t<br>장점<br>\t\t\t\t<br>- 재미 있음<br>\t\t\t\t<br>- 정보 많이 접함<br>\t\t\t\t<br>치명적 단점<br>\t\t\t\t<br>- 매번&#160;0에서 다시 시작<br>\t\t\t\t<br>- 문장 구조가 쌓이지 않음<br>\t\t\t\t<br>- Speaking은 늘 “연습 중”<br>\t\t\t\t<br>&#128204; 결과<br>\t\t\t\t<br>“계속 공부는 하는데,<br>\t\t\t\t<br>말은 여전히 막힌다”<br>\t\t\t\t<br><br>\t\t\t\t<br>❌ 같은 영상만 계속 반복<br>\t\t\t\t<br>장점<br>\t\t\t\t<br>- 듣기는 빨리 늘어남<br>\t\t\t\t<br>단점<br>\t\t\t\t<br>- 구조가 너무 익숙해져서<br>\t\t\t\t<br>- <b>확장 능력(transfer)</b>이 안 생김<br>\t\t\t\t<br>&#128204; 결과<br>\t\t\t\t<br>“이 영상은 말할 수 있는데<br>\t\t\t\t<br>다른 얘기는 못 한다”<br>\t\t\t\t<br><br>\t\t\t\t<br>⭕ 최적 해법:&#160;‘완결 반복 후 이동’<br>\t\t\t\t<br>핵심 원칙<br>\t\t\t\t<br>한 영상으로<br>\t\t\t\t<br>Listening → Writing → Speaking이 ‘완결’될 때까지 반복<br>\t\t\t\t<br>그 다음에 이동<br>\t\t\t\t<br><br>\t\t\t\t<br>그럼 “완결”이란 뭘까? (체크리스트)<br>\t\t\t\t<br>아래&#160;4개가 되면 이동 가능<br>\t\t\t\t<br>✅ 이동 기준 4가지<br>\t\t\t\t<br>- 자막 없이 들어도&#160;전체 흐름이 들린다<br>\t\t\t\t<br>- 핵심 문장 3개를&#160;안 보고 말할 수 있다<br>\t\t\t\t<br>- 그 문장을&#160;주제 바꿔서도 말할 수 있다<br>\t\t\t\t<br>- 30초 요약 Speaking이&#160;끊기지 않는다<br>\t\t\t\t<br>&#128073; 이게 보통&#160;2~4일&#160;걸린다<br>\t\t\t\t<br>(사람마다 다르지만 이 범위를 크게 안 벗어남)<br>\t\t\t\t<br><br>\t\t\t\t<br>그래서 정답 루틴은 이렇게 된다<br>\t\t\t\t<br>&#128257; 추천 운영 방식 (현실 최적)<br>\t\t\t\t<br>&#128313; 3일 = 1 영상 (TED 기준 7~10분)<br>\t\t\t\t<br>\t\t\t\t\t<br>\t\t\t\t\t\tDay<br>\t\t\t\t\t\t내용<br>\t\t\t\t\t<br>\t\t\t\t\t<br>\t\t\t\t\t\tDay 1<br>\t\t\t\t\t\tListening + 구조 파악<br>\t\t\t\t\t<br>\t\t\t\t\t<br>\t\t\t\t\t\tDay 2<br>\t\t\t\t\t\t문장 발췌 + Writing + Speaking<br>\t\t\t\t\t<br>\t\t\t\t\t<br>\t\t\t\t\t\tDay 3<br>\t\t\t\t\t\tSpeaking 확장 + Shadowing<br>\t\t\t\t\t<br>\t\t\t\t<br>\t\t\t\t<br>➡️ Day 4에 다음 영상으로 이동<br>\t\t\t\t<br><br>\t\t\t\t<br>만약 시간이 정말 적다면?<br>\t\t\t\t<br>⏱ 하루 20~30분밖에 안 된다면<br>\t\t\t\t<br>- 같은 영상 4~5일<br>\t\t\t\t<br>- 대신 Speaking을 절대 생략 ❌<br>\t\t\t\t<br><br>\t\t\t\t<br>반대로 이미 익숙해졌다면?<br>\t\t\t\t<br>“이 영상 너무 쉬운데?”<br>\t\t\t\t<br>- 그때부터&#160;새 영상<br>\t\t\t\t<br>- 난이도는:<br>\t\t\t\t<br>- 이해율 70~80% 수준<br>\t\t\t\t<br><br>\t\t\t\t<br>한 문장 요약<br>\t\t\t\t<br>영상을 바꿔야 실력이 늘 것 같지만,<br>\t\t\t\t<br>실제로 실력을 만드는 건 ‘안 바꿔도 말이 나오는 순간’이다.<br>\t\t\t\t<br><br>\t\t\t<br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br>\t\t\t\t<br>- 체크한 문장들을 활용해 <b>나만의 요약문(Executive Summary)</b>을 씁니다.<br>\t\t\t\t<br>- Paraphrasing: \"Apple의 공급 조율이 필요하다\"는 말을 여러 방식으로 변형해 써봅니다.<br>\t\t\t\t<br>- AI 교정: 쓴 글을 ChatGPT 등에 넣어 비즈니스 이메일 톤으로 교정받고, 교정된 이유(문법, 뉘앙스)를 파악합니다.<br>\t\t\t<br>\t\t\t<br>\t\t\t\t<br>- 메인 소스: Apple 실적 발표(Earnings Call) 혹은 최신 AI 논문의 초록(Abstract)<br>\t\t\t\t<br>- 과정: 전체를 들으며 맥락을 파악하고, 자막(스크립트)을 보며 모르는 표현을 체크합니다.<br>\t\t\t\t<br>- 연쇄 효과: 들으면서 동시에 읽는 과정(Reading while listening)은 뇌에 '소리-문자-의미'를 동시에 각인시켜, 이후 Writing 단계에서 단어가 바로 떠오르게 합니다.<br>\t\t\t<br>\t\t\t<br><br>\t\t\t<br>✅ 최소 효율 구간<br>\t\t\t<br>총 30~40분<br>\t\t\t<br>\t\t\t\t<br>\t\t\t\t\t단계<br>\t\t\t\t\t시간<br>\t\t\t\t<br>\t\t\t\t<br>\t\t\t\t\tListening ONLY<br>\t\t\t\t\t10–15분<br>\t\t\t\t<br>\t\t\t\t<br>\t\t\t\t\tReading ONLY<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>\t\t\t\t<br>\t\t\t\t<br>\t\t\t\t\tReading+Listening<br>\t\t\t\t\t10–15분<br>\t\t\t\t<br>\t\t\t\t<br>\t\t\t\t\tWriting (타이핑)<br>\t\t\t\t\t5–10분<br>\t\t\t\t<br>\t\t\t\t<br>\t\t\t\t\tSpeaking<br>\t\t\t\t\t5–10분<br>\t\t\t\t<br>\t\t\t<br>\t\t\t<br><br>\t\t\t<br>⏱ 하루 30~45분이면 충분: \"실전 화상 회의 시뮬레이션\"<br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br>2. 폭발적 성장을 위한 '공격적 팁' (Aggressive Tips)<br>\t\t\t<br><br>\t\t\t<br>\"Writing으로 출력 회로를 먼저 설계하고, 이를 Listening으로 보강한 뒤, Speaking으로 터뜨려야 합니다.\"<br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br>왜 먼저인가:<br>\t\t\t<br>방법:<br>\t\t\t<br>Step 1: Deep Reading & Listening (재료 확보)<br>\t\t\t<br><br>\t\t\t<br>왜 Speaking보다 먼저인가:<br>\t\t\t<br>방법:<br>\t\t\t<br>Step 3: Writing Task (논리 구조화)<br>\t\t\t<br><br>\t\t\t<br>방법:<br>\t\t\t<br>Step 2: Dictation & Shadowing (소리-문자 결합)<br>\t\t\t<br><br>\t\t\t<br>이때쯤이면:<br>\t\t\t<br>방법:<br>\t\t\t<br>Step 4: Immediate Speaking (최종 자동화)<br>\t\t\t<br><br>\t\t\t<br>기존 앱 학습 비중을 20%로 줄이고, 아래의 <b>'출력 중심 사이클'</b>에 80%를 투자하십시오.",
    "w": 400
  }
];

let cards = [];
let moving = null, resizing = null;

function loadBoard() {
  const saved = localStorage.getItem(SAVE_KEY);
  cards = saved ? JSON.parse(saved) : DEFAULT_CARDS.map(c => ({...c}));
  renderCards();
  if (!saved) autoLayout();
}

function autoLayout() {
  const GAP = 14;
  const boardW = document.getElementById('board').offsetWidth;
  const cols = Math.max(1, Math.floor(boardW / 280));
  const colW = (boardW - GAP * (cols - 1)) / cols;
  const colHeights = new Array(cols).fill(0);
  const allCards = document.querySelectorAll('.card');
  const images = document.querySelectorAll('.card img');
  let loaded = 0;
  const total = images.length;

  function place() {
    allCards.forEach((el, i) => {
      const card = cards[i];
      const w = Math.min(card.w || colW, colW);
      let minCol = 0;
      for (let c = 1; c < cols; c++) if (colHeights[c] < colHeights[minCol]) minCol = c;
      card.x = minCol * (colW + GAP);
      card.y = colHeights[minCol];
      card.w = w;
      el.style.left = card.x + 'px';
      el.style.top = card.y + 'px';
      el.style.width = w + 'px';
      colHeights[minCol] = card.y + el.offsetHeight + GAP;
    });
    document.getElementById('board').style.minHeight = Math.max(...colHeights) + 100 + 'px';
    saveBoard();
  }

  if (total === 0) requestAnimationFrame(place);
  else images.forEach(img => {
    if (img.complete) { loaded++; if (loaded >= total) requestAnimationFrame(place); }
    else img.onload = img.onerror = () => { loaded++; if (loaded >= total) requestAnimationFrame(place); };
  });
}

function syncText() {
  document.querySelectorAll('.card').forEach(el => {
    const idx = +el.dataset.idx;
    if (cards[idx]?.type === 'text') {
      const t = el.querySelector('.text');
      if (t) cards[idx].content = t.innerHTML;
    }
  });
}

function saveBoard() {
  syncText();
  localStorage.setItem(SAVE_KEY, JSON.stringify(cards));
  document.getElementById('status').textContent = '저장됨 ' + new Date().toLocaleTimeString();
}

function renderCards() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  cards.forEach((card, i) => {
    const el = document.createElement('div');
    el.className = 'card';
    el.dataset.idx = i;
    if (card.x !== undefined) el.style.left = card.x + 'px';
    if (card.y !== undefined) el.style.top = card.y + 'px';
    if (card.w) el.style.width = card.w + 'px';

    el.addEventListener('mousedown', e => {
      if (e.target.closest('.text, a, .card-btn, .resize-handle, table')) return;
      e.preventDefault();
      moving = { idx: i, startX: e.clientX, startY: e.clientY, origX: card.x || 0, origY: card.y || 0 };
      el.classList.add('moving');
    });

    const actions = document.createElement('div');
    actions.className = 'card-actions';
    const delBtn = document.createElement('button');
    delBtn.className = 'card-btn'; delBtn.textContent = '×';
    delBtn.onclick = e => { e.stopPropagation(); if (confirm('삭제?')) { cards.splice(i, 1); renderCards(); saveBoard(); } };
    actions.appendChild(delBtn);
    el.appendChild(actions);

    if (card.type === 'text') {
      const text = document.createElement('div');
      text.className = 'text';
      text.contentEditable = true;
      text.innerHTML = card.content || '';
      text.addEventListener('blur', () => { card.content = text.innerHTML; saveBoard(); });
      el.appendChild(text);
    } else if (card.type === 'image') {
      const src = card.src.startsWith('http') || card.src.startsWith('data:') ? card.src : IMG_BASE + card.src;
      const img = document.createElement('img');
      img.src = src;
      img.alt = card.alt || '';
      img.loading = 'lazy';
      img.onerror = () => img.style.display = 'none';
      if (card.link) {
        const a = document.createElement('a'); a.href = card.link; a.target = '_blank';
        a.appendChild(img); el.appendChild(a);
      } else { el.appendChild(img); }
      if (card.caption) {
        const cap = document.createElement('div');
        cap.className = 'caption';
        cap.textContent = card.caption;
        el.appendChild(cap);
      }
    } else if (card.type === 'table') {
      const wrapper = document.createElement('div');
      wrapper.style.overflowX = 'auto';
      wrapper.innerHTML = card.html || '';
      el.appendChild(wrapper);
    }

    const rh = document.createElement('div');
    rh.className = 'resize-handle';
    rh.addEventListener('mousedown', e => {
      e.preventDefault(); e.stopPropagation();
      resizing = { idx: i, startX: e.clientX, startW: card.w || el.offsetWidth };
    });
    el.appendChild(rh);
    board.appendChild(el);
  });

  requestAnimationFrame(() => {
    let maxBottom = 0;
    document.querySelectorAll('.card').forEach(el => {
      const b = (parseFloat(el.style.top) || 0) + el.offsetHeight;
      if (b > maxBottom) maxBottom = b;
    });
    board.style.minHeight = (maxBottom + 100) + 'px';
  });
}

document.addEventListener('mousemove', e => {
  if (moving) {
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`);
    if (!el) return;
    const nx = moving.origX + e.clientX - moving.startX;
    const ny = moving.origY + e.clientY - moving.startY;
    el.style.left = nx + 'px';
    el.style.top = ny + 'px';
  }
  if (resizing) {
    const card = cards[resizing.idx];
    card.w = Math.max(100, resizing.startW + e.clientX - resizing.startX);
    const el = document.querySelector(`.card[data-idx="${resizing.idx}"]`);
    if (el) el.style.width = card.w + 'px';
  }
});

document.addEventListener('mouseup', e => {
  if (moving) {
    const card = cards[moving.idx];
    card.x = Math.max(0, moving.origX + e.clientX - moving.startX);
    card.y = Math.max(0, moving.origY + e.clientY - moving.startY);
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`);
    if (el) { el.classList.remove('moving'); }
    moving = null; saveBoard();
  }
  if (resizing) { resizing = null; saveBoard(); }
});

function addTextCard() {
  cards.push({ type: 'text', content: '', x: 50, y: window.scrollY + 100, w: 300 });
  renderCards();
  setTimeout(() => { const els = document.querySelectorAll('.card .text'); els[els.length - 1]?.focus(); }, 100);
}

function addImageCard() {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = 'image/*';
  input.onchange = e => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = () => { cards.push({ type: 'image', src: reader.result, x: 50, y: window.scrollY + 100, w: 240 }); renderCards(); saveBoard(); };
    reader.readAsDataURL(file);
  };
  input.click();
}

function resetLayout() {
  if (!confirm('자동 재배치합니다. 현재 위치가 변경됩니다.')) return;
  cards.forEach(c => { delete c.x; delete c.y; });
  renderCards(); autoLayout();
}

setInterval(saveBoard, 30000);
loadBoard();
</script>
