<title>Bubble surfing</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #1e1e1e;
  color: #e0e0e0;
  font-family: 'Segoe UI', -apple-system, sans-serif;
  font-size: 15px;
  line-height: 1.6;
  padding: 20px 30px 60px;
  overflow-x: hidden;
}
a { color: #6cb0f6; text-decoration: none; }
a:hover { text-decoration: underline; }
.title-bar {
  background: #3a3a5c;
  display: inline-block;
  padding: 6px 16px;
  font-size: 22px;
  font-weight: bold;
  color: #fff;
  margin-bottom: 4px;
}
.date { color: #999; font-size: 13px; margin-bottom: 20px; }
.board { position: relative; }
.card {
  background: #2a2a2a;
  border: 1px solid #3a3a3a;
  border-radius: 8px;
  padding: 12px;
  position: absolute;
  cursor: grab;
  transition: box-shadow 0.15s;
  overflow: hidden;
}
.card:hover { box-shadow: 0 0 0 1px #58a6ff; z-index: 10; }
.card.moving { opacity: 0.8; box-shadow: 0 4px 24px rgba(0,0,0,0.6); z-index: 100; cursor: grabbing; }
.card img { width: 100%; border-radius: 4px; display: block; }
.card .caption { font-size: 12px; color: #888; margin-top: 6px; }
.card .text { outline: none; min-height: 20px; white-space: pre-wrap; word-break: break-word; }
.card .text:focus { background: rgba(255,255,255,0.05); border-radius: 4px; padding: 4px; }
.card .text:empty::before { content: '텍스트 입력...'; color: #555; }
.card table { border-collapse: collapse; width: 100%; font-size: 13px; }
.card table td, .card table th { border: 1px solid #444; padding: 4px 8px; vertical-align: top; }
.card table th { background: #333; color: #ccc; }
.card-actions { position: absolute; top: 4px; right: 4px; display: none; gap: 4px; }
.card:hover .card-actions { display: flex; }
.card-btn { background: #333; border: 1px solid #555; color: #ccc; border-radius: 4px; padding: 2px 6px; font-size: 11px; cursor: pointer; }
.card-btn:hover { background: #444; color: #fff; }
.resize-handle { position: absolute; bottom: 0; right: 0; width: 16px; height: 16px; cursor: se-resize; opacity: 0; }
.card:hover .resize-handle { opacity: 0.6; }
.resize-handle::after { content: ''; position: absolute; bottom: 3px; right: 3px; width: 8px; height: 8px; border-right: 2px solid #666; border-bottom: 2px solid #666; }
.toolbar { position: fixed; bottom: 0; left: 0; right: 0; background: #161b22; border-top: 1px solid #30363d; padding: 8px 20px; display: flex; gap: 12px; align-items: center; z-index: 200; }
.toolbar button { background: #21262d; border: 1px solid #30363d; color: #e0e0e0; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; }
.toolbar button:hover { background: #30363d; }
.toolbar .status { color: #8b949e; font-size: 12px; margin-left: auto; }
.highlight-red { color: #ff6b6b; }
.highlight-blue { color: #6cb0f6; }
</style>
</head>
<body>
<div class="title-bar">Bubble surfing</div>
<div class="date">Invalid Date</div>

  <button onclick="addTextCard()">+ 텍스트</button>
  <button onclick="addImageCard()">+ 이미지</button>
  <button onclick="saveBoard()">💾 저장</button>
  <button onclick="resetLayout()">↺ 재배치</button>
  <span class="status" id="status">Ready</span>
</div>

const DEFAULT_CARDS = [

    "type": "text",
    "content": "Bubble surfing<br>\t\t<br>\t\t<br>\t<br>\t<br>\t\t<br>\t\t\t<br>\t\t\t\t<br>// Import the functions you need from the SDKs you need<br>\t\t\t\t<br>import { initializeApp } from \"firebase/app\";<br>\t\t\t\t<br>import { getAnalytics } from \"firebase/analytics\";<br>\t\t\t\t<br>// TODO: Add SDKs for Firebase products that you want to use<br>\t\t\t\t<br>// <a href=\"https://firebase.google.com/docs/web/setup#available-libraries\" target=\"_blank\">https://firebase.google.com/docs/web/setup#available-libraries</a><br>\t\t\t\t<br><br>\t\t\t\t<br>// Your web app's Firebase configuration<br>\t\t\t\t<br>// For Firebase JS SDK v7.20.0 and later, measurementId is optional<br>\t\t\t\t<br>const firebaseConfig = {<br>\t\t\t\t<br>  apiKey: \"AIzaSyBgcgpi-C92xzLqnyr5-fWkvxq8GasAQmE\",<br>\t\t\t\t<br>  authDomain: \"bubble-surfing.firebaseapp.com\",<br>\t\t\t\t<br>  projectId: \"bubble-surfing\",<br>\t\t\t\t<br>  storageBucket: \"bubble-surfing.firebasestorage.app\",<br>\t\t\t\t<br>  messagingSenderId: \"364721701850\",<br>\t\t\t\t<br>  appId: \"1:364721701850:web:b569750e9bdeb160e576e3\",<br>\t\t\t\t<br>  measurementId: \"G-VJ5K6L32VG\"<br>\t\t\t\t<br>};<br>\t\t\t\t<br><br>\t\t\t\t<br>// Initialize Firebase<br>\t\t\t\t<br>const app = initializeApp(firebaseConfig);<br>\t\t\t\t<br>const analytics = getAnalytics(app);<br>\t\t\t\t<br><br>\t\t\t\t<br><br>\t\t\t\t<br>┌─────────────────────────┐<br>\t\t\t\t<br>                    │      시장 고점 판단     │<br>\t\t\t\t<br>                    └─────────────────────────┘<br>\t\t\t\t<br>                               │<br>\t\t\t\t<br>       ┌───────────┬───────────┼───────────┬───────────┐<br>\t\t\t\t<br>       │           │           │           │           │<br>\t\t\t\t<br>       ▼           ▼           ▼           ▼           ▼<br>\t\t\t\t<br>   ┌───────┐   ┌───────┐   ┌───────┐   ┌───────┐   ┌───────┐<br>\t\t\t\t<br>   │ 인간  │   │ 수급  │   │밸류에 │   │ 매크로│   │ 기술적│<br>\t\t\t\t<br>   │ 행동  │   │ 여력  │   │ 이션  │   │ /실적 │   │ 신호  │<br>\t\t\t\t<br>   └───────┘   └───────┘   └───────┘   └───────┘   └───────┘<br>\t\t\t\t<br>       ✅          ✅          ❓          ❓          ❓<br>\t\t\t\t<br>     완료        완료       미검토      미검토      미검토<br>\t\t\t\t<br><br>\t\t\t\t<br>만약 붕괴가 온다면 아래 순서로 충격이 온다:<br>\t\t\t\t<br>- 미국 고용 둔화 → 금리인하 기대 붕괴<br>\t\t\t\t<br>- 국채금리 급등 (10Y↑)<br>\t\t\t\t<br>- SOX → 나스닥 → 한국 반도체 → 한국 전체 시장 순으로 하락<br>\t\t\t\t<br>- 거래대금 급감 → 기관&#183;연기금 매도 강화<br>\t\t\t\t<br>즉, “선행지표를 조기 감지 → 빠져나오는 자동화된 판단 룰”이 핵심이다.<br>\t\t\t\t<br><br>\t\t\t\t<br>&#128293;&#160;네가 즉시 팔아야 할 5가지 신호<br>\t\t\t\t<br>- 미국 10년 금리 0.25%p 급등 (5일 내)<br>\t\t\t\t<br>- SOX 지수 7% 이상 급락 + 반등 실패<br>\t\t\t\t<br>- 엔비디아/AMD/TSMC 동반 -10%<br>\t\t\t\t<br>- 한국 거래대금 10조 이하 2주 지속<br>\t\t\t\t<br>- KOSPI 변동성지수(VKOSPI) 20 이상 상승<br>\t\t\t\t<br>➡ 이 “5개 중 3개 충족 시 전액 환매”<br>\t\t\t\t<br>이 룰이면 네 감정과 무관하게 자동으로&#160;시장 꼭지에 빠져나올 확률이 매우 높아진다.<br>\t\t\t\t<br><br>\t\t\t\t<br>✅ 3.&#160;\"AI 버블 붕괴” 전용 헷지 ETF를 활용한 비대칭 포지션<br>\t\t\t\t<br>주식을 그대로 들고가면서도 손실을 크게 줄이는 “비대칭보험” 전략.<br>\t\t\t\t<br>&#128204; 활용 가능한 ETF<br>\t\t\t\t<br>\t\t\t\t\t<br>\t\t\t\t\t\t목적<br>\t\t\t\t\t\t미국 ETF<br>\t\t\t\t\t\t한국 ETF<br>\t\t\t\t\t<br>\t\t\t\t\t<br>\t\t\t\t\t\t나스닥&#183;AI 급락 헷지<br>\t\t\t\t\t\tSQQQ (3배 인버스)<br>\t\t\t\t\t\tKODEX 인버스 / 곱버스<br>\t\t\t\t\t<br>\t\t\t\t\t<br>\t\t\t\t\t\t반도체 급락 헷지<br>\t\t\t\t\t\tSOXS (3배 인버스)<br>\t\t\t\t\t\t타이거 반도체인버스<br>\t\t\t\t\t<br>\t\t\t\t\t<br>\t\t\t\t\t\t변동성 증가 헷지<br>\t\t\t\t\t\tVIXY<br>\t\t\t\t\t\t없음<br>\t\t\t\t\t<br>\t\t\t\t<br>\t\t\t\t<br>&#128293; 핵심 아이디어<br>\t\t\t\t<br>- 보유주식을 그대로 두고,<br>\t\t\t\t<br>- 자산의 5~10%만 SOXS/SQQQ로 보험처럼 매수<br>\t\t\t\t<br>➡ 시장이 폭락하면 이 5~10%가 30~50% 급등 → 전체 손실을 크게 흡수.<br>\t\t\t\t<br>이게 실제로 기관이 쓰는 “tail risk hedge”.<br>\t\t\t\t<br><br>\t\t\t\t<br>나스닥 100 지수($QQQ$) 또는 한국의 $KOSPI\\ 200$ 지수 등 시장 전체에 영향을 미치는 지수의 인버스 $ETF$ 매수나 풋옵션<br>\t\t\t\t<br><br>\t\t\t\t<br>\t\t\t\t\t<br>\t\t\t\t\t\t상품<br>\t\t\t\t\t\t비중<br>\t\t\t\t\t\t금액<br>\t\t\t\t\t<br>\t\t\t\t\t<br>\t\t\t\t\t\tSOXS (반도체 3배 인버스)<br>\t\t\t\t\t\t12%<br>\t\t\t\t\t\t3,360만 원<br>\t\t\t\t\t<br>\t\t\t\t\t<br>\t\t\t\t\t\tSQQQ (나스닥 3배 인버스)<br>\t\t\t\t\t\t6%<br>\t\t\t\t\t\t1,680만 원<br>\t\t\t\t\t<br>\t\t\t\t\t<br>\t\t\t\t\t\t합계<br>\t\t\t\t\t\t18%<br>\t\t\t\t\t\t5,040만 원<br>\t\t\t\t\t<br>\t\t\t\t<br>\t\t\t\t<br><br>\t\t\t\t<br>&#128204; 즉시 적용 가능한 매수 규모 제안<br>\t\t\t\t<br>SOXS (필라델피아 반도체 3배 인버스)<br>\t\t\t\t<br>- 금액:&#160;3,360만 원<br>\t\t\t\t<br>- 매수 방법:<br>\t\t\t\t<br>- 30% 즉시 진입<br>\t\t\t\t<br>- 70%는 SOX +3% 반등 시 추가 매수&#160;(rebound hedge)￼→ 시장이 뚝 떨어진 상태에서 헷지 사는 건 덜 유리￼→ 반등 타이밍에서 매수해야 “레버리지 decay” 리스크도 줄어듦<br>\t\t\t\t<br>SQQQ (나스닥 3배 인버스)<br>\t\t\t\t<br>- 금액:&#160;1,680만 원<br>\t\t\t\t<br>- 매수 방법:<br>\t\t\t\t<br>- 50% 즉시<br>\t\t\t\t<br>- 50%는 엔비디아가 단기 고점 또는 고평가 지표 <br>\t\t\t\t<br>- 나올 때 증액<br>\t\t\t\t<br><br>\t\t\t\t<br>&#128197; 4) 리밸런싱 규칙 (매우 중요)<br>\t\t\t\t<br>▶ 시장이 안정 & 금리 하락 기대가 강화될 때<br>\t\t\t\t<br>- SOXS 12% → 6%로 축소<br>\t\t\t\t<br>- SQQQ 6% → 3%로 축소<br>\t\t\t\t<br>▶ 시장이 붕괴 조짐(조기경보 5개 중 2개 이상 충족)<br>\t\t\t\t<br>- SOXS 12% →&#160;15–18%까지 확대 가능￼(단, 총 헷지 25% 넘으면 상승장 참여 크게 훼손)<br>\t\t\t\t<br><br>\t\t\t\t<br>&#127919; 너에게 가장 최적인 조합 (최종 답)<br>\t\t\t\t<br><b>SOXS 12% = 약 3,360만 원<br>\t\t\t\t<br>SQQQ 6% = 약 1,680만 원<br>\t\t\t\t<br>총 Tail Hedge = 18% (= 5,040만 원)</b><br>\t\t\t\t<br>- 반도체 중심 포트폴리오와 엔비디아 포지션을 직접 방어<br>\t\t\t\t<br>- -30% 상황에서도 손실 반토막 수준으로 완충<br>\t\t\t\t<br>- 상승장에서는 82% 노출로 충분히 따라갈 수 있음<br>\t\t\t\t<br><br>\t\t\t\t<br>과열 신호를 포착할 수 있는 구체적인 지표들을 정리해드리겠습니다:<br>\t\t\t\t<br>1. 밸류에이션 지표 (고평가 포착)<br>\t\t\t\t<br>\t\t\t\t\t<br>- 역사적 평균(KOSPI ~12배) 대비 +2 표준편차 이상이면 과열<br>\t\t\t\t\t<br>- 현재 수준을 20년 평균과 비교<br>\t\t\t\t<br>\t\t\t\t<br>\t\t\t\t\t<br>- 삼성전자, SK하이닉스의 PSR이 역사적 고점(2021년 수준) 근접 시<br>\t\t\t\t\t<br>- 매출 성장은 둔화되는데 주가만 오르는 구간 포착<br>\t\t\t\t<br>\t\t\t\t<br>\t\t\t\t\t<br>- 시가총액/GDP 비율<br>\t\t\t\t\t<br>- 역사적으로 100% 초과 시 과열, 70% 이하면 저평가<br>\t\t\t\t<br>\t\t\t\t<br>2. 기술적 과열 지표<br>\t\t\t\t<br>\t\t\t\t\t<br>- 70 이상: 과매수, 80 이상: 극심한 과열<br>\t\t\t\t\t<br>- 주봉/월봉 RSI가 더 신뢰도 높음<br>\t\t\t\t<br>\t\t\t\t<br>\t\t\t\t\t<br>- 주가가 상단 밴드 +2σ 밖에서 지속적으로 거래<br>\t function autoLayout() {

  const cols = Math.max(1, Math.floor(boardW / 280));
  const colW = (boardW - GAP * (cols - 1)) / cols;
  const colHeights = new Array(cols).fill(0);
  const allCards = document.querySelectorAll('.card');
  const images = document.querySelectorAll('.card img');
  let loaded = 0;
  const total = images.length;

  function place() {
    allCards.forEach((el, i) => {
      const card = cards[i];
      const w = Math.min(card.w || colW, colW);
      let minCol = 0;
      for (let c = 1; c < cols; c++) if (colHeights[c] < colHeights[minCol]) minCol = c;
      card.x = minCol * (colW + GAP);
      card.y = colHeights[minCol];
      card.w = w;
      el.style.left = card.x + 'px';
      el.style.top = card.y + 'px';
      el.style.width = w + 'px';
      colHeights[minCol] = card.y + el.offsetHeight + GAP;
    });
    document.getElementById('board').style.minHeight = Math.max(...colHeights) + 100 + 'px';
    saveBoard();
  }

  if (total === 0) requestAnimationFrame(place);
  else images.forEach(img => {
    if (img.complete) { loaded++; if (loaded >= total) requestAnimationFrame(place); }
    else img.onload = img.onerror = () => { loaded++; if (loaded >= total) requestAnimationFrame(place); };
  });
}

function syncText() {
  document.querySelectorAll('.card').forEach(el => {
    const idx = +el.dataset.idx;
    if (cards[idx]?.type === 'text') {
      const t = el.querySelector('.text');
      if (t) cards[idx].content = t.innerHTML;
    }
  });
}

function saveBoard() {
  syncText();
  localStorage.setItem(SAVE_KEY, JSON.stringify(cards));
  document.getElementById('status').textContent = '저장됨 ' + new Date().toLocaleTimeString();
}

function renderCards() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  cards.forEach((card, i) => {
    const el = document.createElement('div');
    el.className = 'card';
    el.dataset.idx = i;
    if (card.x !== undefined) el.style.left = card.x + 'px';
    if (card.y !== undefined) el.style.top = card.y + 'px';
    if (card.w) el.style.width = card.w + 'px';

    el.addEventListener('mousedown', e => {
      if (e.target.closest('.text, a, .card-btn, .resize-handle, table')) return;
      e.preventDefault();
      moving = { idx: i, startX: e.clientX, startY: e.clientY, origX: card.x || 0, origY: card.y || 0 };
      el.classList.add('moving');
    });

    const actions = document.createElement('div');
    actions.className = 'card-actions';
    const delBtn = document.createElement('button');
    delBtn.className = 'card-btn'; delBtn.textContent = '×';
    delBtn.onclick = e => { e.stopPropagation(); if (confirm('삭제?')) { cards.splice(i, 1); renderCards(); saveBoard(); } };
    actions.appendChild(delBtn);
    el.appendChild(actions);

    if (card.type === 'text') {
      const text = document.createElement('div');
      text.className = 'text';
      text.contentEditable = true;
      text.innerHTML = card.content || '';
      text.addEventListener('blur', () => { card.content = text.innerHTML; saveBoard(); });
      el.appendChild(text);
    } else if (card.type === 'image') {
      const src = card.src.startsWith('http') || card.src.startsWith('data:') ? card.src : IMG_BASE + card.src;
      const img = document.createElement('img');
      img.src = src;
      img.alt = card.alt || '';
      img.loading = 'lazy';
      img.onerror = () => img.style.display = 'none';
      if (card.link) {
        const a = document.createElement('a'); a.href = card.link; a.target = '_blank';
        a.appendChild(img); el.appendChild(a);
      } else { el.appendChild(img); }
      if (card.caption) {
        const cap = document.createElement('div');
        cap.className = 'caption';
        cap.textContent = card.caption;
        el.appendChild(cap);
      }
    } else if (card.type === 'table') {
      const wrapper = document.createElement('div');
      wrapper.style.overflowX = 'auto';
      wrapper.innerHTML = card.html || '';
      el.appendChild(wrapper);
    }

    const rh = document.createElement('div');
    rh.className = 'resize-handle';
    rh.addEventListener('mousedown', e => {
      e.preventDefault(); e.stopPropagation();
      resizing = { idx: i, startX: e.clientX, startW: card.w || el.offsetWidth };
    });
    el.appendChild(rh);
    board.appendChild(el);
  });

  requestAnimationFrame(() => {
    let maxBottom = 0;
    document.querySelectorAll('.card').forEach(el => {
      const b = (parseFloat(el.style.top) || 0) + el.offsetHeight;
      if (b > maxBottom) maxBottom = b;
    });
    board.style.minHeight = (maxBottom + 100) + 'px';
  });
}

document.addEventListener('mousemove', e => {
  if (moving) {
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`);
    if (!el) return;
    const nx = moving.origX + e.clientX - moving.startX;
    const ny = moving.origY + e.clientY - moving.startY;
    el.style.left = nx + 'px';
    el.style.top = ny + 'px';
  }
  if (resizing) {
    const card = cards[resizing.idx];
    card.w = Math.max(100, resizing.startW + e.clientX - resizing.startX);
    const el = document.querySelector(`.card[data-idx="${resizing.idx}"]`);
    if (el) el.style.width = card.w + 'px';
  }
});

document.addEventListener('mouseup', e => {
  if (moving) {
    const card = cards[moving.idx];
    card.x = Math.max(0, moving.origX + e.clientX - moving.startX);
    card.y = Math.max(0, moving.origY + e.clientY - moving.startY);
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`);
    if (el) { el.classList.remove('moving'); }
    moving = null; saveBoard();
  }
  if (resizing) { resizing = null; saveBoard(); }
});

function addTextCard() {
  cards.push({ type: 'text', content: '', x: 50, y: window.scrollY + 100, w: 300 });
  renderCards();
  setTimeout(() => { const els = document.querySelectorAll('.card .text'); els[els.length - 1]?.focus(); }, 100);
}

function addImageCard() {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = 'image/*';
  input.onchange = e => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = () => { cards.push({ type: 'image', src: reader.result, x: 50, y: window.scrollY + 100, w: 240 }); renderCards(); saveBoard(); };
    reader.readAsDataURL(file);
  };
  input.click();
}

function resetLayout() {
  if (!confirm('자동 재배치합니다. 현재 위치가 변경됩니다.')) return;
  cards.forEach(c => { delete c.x; delete c.y; });
  renderCards(); autoLayout();
}

setInterval(saveBoard, 30000);
loadBoard();
</script>
