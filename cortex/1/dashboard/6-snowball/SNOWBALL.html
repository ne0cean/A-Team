mailSN%22%3A%2280947%22%2C%22previewMode%22%3A2%7D%7D\" target=\"_blank\">https://mail.naver.com/#%7B%22fClass%22%3A%22read%22%2C%22oParameter%22%3A%7B%22charset%22%3A%22%22%2C%22prevNextMail%22%3Atrue%2C%22threadMail%22%3Atrue%2C%22listScrollPosition%22%3A0%2C%22mailSN%22%3A%2280947%22%2C%22previewMode%22%3A2%7D%7D</a>> <br>\t\t\t<br><br>\t\t\t<br>비트코인 상대강도 지수<br>\t\t\t<br>비트코인 중심의 분석가 '플랜B'는 최근 트위터를 통해 \"비트코인의 상대강도지수(Relative Strength Index, RSI)가 이전 사이클과 비슷한 경로를 걷고 있다\"면서, 향후 비트코인의 상승 랠리가 지속될 것으로 전망했다.<br>\t\t\t<br><br>\t\t\t<br>스테이블 코인 수량<br>\t\t\t<br>조정이 얼마나 진행될지 확실하지 않지만, 온체인 지표는 거래소에 예치된 비트코인에 비해 충분히 많은 스테이블코인이 있어 다시 한 번 상승이 나올 수 있다고 얘기하고 있다<br>\t\t\t<br><br>\t\t\t<br>144 블록(10분에 1블록 생산 시 하루 블록 생산량) 평균 거래소 유입 BTC 물량이 2 BTC를 넘어섰다. 일반적으로 고래의 거래소 활동이 활발해지면, BTC 가격은 횡보하거나 하락할 가능성이 존재한다.<br>\t\t\t<br><br>\t\t\t<br>지금 사야 할까. 아니면 조정 후에 사야 할까. 답은 코인베이스 프리미엄에 있다.&#160;<br>\t\t\t<br>미국 최대의 암호화폐 거래소인 코인베이스는 미국 달러(USD)로 직접 비트코인을 살 수 있기 때문에 미국의 많은 기관투자자가 이용한다. 이들이 대량 매수에 나서면 바이낸스 등 스테이블코인으로 비트코인을 매수하는 거래소들과 가격 차이가 발생한다. 이를 코인베이스 프리미엄이라 부른다.&#160;<br>\t\t\t<br>통상 50달러 이상 프리미엄이 붙으면 코인베이스 고래들이 매수한다고 판단한다. 테슬라로 인한 이번 상승 때에도 앞서 정보를 접한 코인베이스 고래들이 대거 매수에 나서면서 바이낸스와 일시적으로 개당 452달러가량의 비트코인 가격 차이가 발생했었다. 지금의 가격 상승을 주도하고 있는 미국 기관투자자 고래와 함께 움직이면 당분간 손실을 볼 확률이 낮을 것이다.&#160;<br>\t\t\t<br>\t\t\t<br><br>\t\t\t출처: <<a href=\"https://www.coindeskkorea.com/news/articleView.html?idxno=72757\" target=\"_blank\">https://www.coindeskkorea.com/news/articleView.html?idxno=72757</a>> <br>\t\t\t<br><br>\t\t\t<br>테슬라 상승 이후의 코인베이스 프리미엄 동향은 어떨까. 가격이 4만7000달러를 횡보할 때 코인베이스 프리미엄은 평균 100달러 이상을 기록했다. 기관들이 꾸준히 매수하고 있다는 얘기다.&#160;<br>\t\t\t<br>반면 4만9000선에 14일에는 50달러 이하로 프리미엄이 줄어들었다. 한때 -79달러의 '역프리미엄'이 생기기도 했다. 비트코인 가격이 심리적 저항선인 5만달러 부근까지 오르자 이전만큼 코인베이스 고래들의 매수 압력이 높지 않은 상황인 것으로 보인다.<br>\t\t\t<br><br>\t\t\t출처: <<a href=\"https://www.coindeskkorea.com/news/articleView.html?idxno=72757\" target=\"_blank\">https://www.coindeskkorea.com/news/articleView.html?idxno=72757</a>> <br>\t\t\t<br><br>\t\t\t<br>\t\t\t<br><br>\t\t\t<br>지금 상황에서 코인베이스 프리미엄이 50달러 이하일 때 가격이 상승하면 개미 투자자들이나 스테이블 코인을 가진 고래들에 의한 상승으로 보고 투자에 유의해야 한다. 고래들은 개미 투자자들의 매수세를 모아 자신의 물량을 떠넘기고 이익 실현을 하는 경향이 있기 때문이다. 이들은 가격을 어느 정도 상승시킨 후 큰 조정을 주는 방식으로 시장을 관리한다.&#160;<br>\t\t\t<br><br>\t\t\t<br><a href=\"https://cryptoquant.com/prochart/fdxeih58iv\" target=\"_blank\">https://cryptoquant.com/prochart/fdxeih58iv</a><br>\t\t\t<br><br>\t\t\t<br>단기 상승 예측에 유용한 온체인 신호인 '모든 거래소의 스테이블 코인 입금 횟수'를 주목해야 한다. 이 지표는 모든 거래소에 들어오는 모든 종류의 스테이블 코인의 입금 거래 수를 기록한 것이다. 블록 단위로 봤을 때 이 지표가 80 이상을 상회할 경우, 1~5% 이상의 단기 상승을 기대해 볼 수 있다. 이더리움(ERC20) 기준 한 블록은 10~15초이므로, 15초 안에 약 80건의 스테이블 코인이 연속적으로 입금되면 비트코인 가격이 상승할 확률이 높다.&#160;<br>\t\t\t<br>가끔 이 신호가 1회가 아니라 2~3회씩 연속해서 중첩되는 경우가 있는데, 이때는 상승 확률이 더 높아진다. 이번 상승의 경우도 저점에서 5회가량의 스테이블 코인 시그널이 연속적으로 발생하며 상승을 견인했다.<br>\t\t\t<br>\t\t\t<br><br>\t\t\t출처: <<a href=\"https://www.coindeskkorea.com/news/articleView.html?idxno=72721\" target=\"_blank\">https://www.coindeskkorea.com/news/articleView.html?idxno=72721</a>> <br>\t\t\t<br><br>\t\t\t<br>최근 모든 거래소 스테이블 코인 입금 횟수 추이. 2월 2일 오후 3시에서 6시 사이 블록 당 80건 이상이 입금되는 사례가 6번 발생했고, 3만5000달러 선을 횡보하던 비트코인 가격이 눈에 띄게 상승했다. 출처=크립토퀀<br>\t\t\t<br>기관투자자로 추정되는 OTC '고래'의 매수 선이 3만2000달러와 3만7000달러이므로 하락이 발생해도 이 두 개의 지점을 깨기는 쉽지 않을 것이라 판단된다. 비트코인 가격이 이 매수 선을 기점으로 장기간 횡보하거나 우상향할 가능성이 높다는 관점으로 트레이딩에 접근하는 게 좋겠다. 아울러 스테이블 코인 입금 횟수 지표를 이용해 단기 상승 가능성을 지속적으로 파악해가며 대응하는 게 필요한 시점이다.&#160;<br>\t\t\t<br><br>\t\t\t출처: <<a href=\"https://www.coindeskkorea.com/news/articleView.html?idxno=72721\" target=\"_blank\">https://www.coindeskkorea.com/news/articleView.html?idxno=72721</a>> <br>\t\t\t<br><br>\t\t\t<br>립토퀀트는 스테이블 코인의 거래소 보유량 증가세를 근거로 2만달러를 바로 뚫을 것으로 예상했으나, 1만9500달러 부근에서 고래들의 입금을 포착했다. 매도 압력이라고 볼 수 있는 거래소 평균 입금량이 증가하면서 비트코인 가격은 1만8000달러까지 하락했다.<br>\t\t\t<br><br>\t\t\t<br>\t\t\t<br>최근 거래소 스테이블 코인 유저 입금 횟수(좌)와 거래소 스테이블 코인 보유량(우). 출처=크립토퀀트<br>\t\t\t<br><br>\t\t\t출처: <<a href=\"https://www.coindeskkorea.com/news/articleView.html?idxno=72096\" target=\"_blank\">https://www.coindeskkorea.com/news/articleView.html?idxno=72096</a>> <br>\t\t\t<br><br>\t\t\t<br>최근 거래소 스테이블 코인 유저 입금 횟수(좌)와 거래소 스테이블 코인 보유량(우). 출처=크립토퀀트<br>\t\t\t<br>\t\t\t<br>최근 거래소 평균 입금량(144 블록 이동평균) 추이. 입금량이 늘어나면서 비트코인 가격이 떨어지는 것을 확인할 수 있다. 출처=크립토퀀트<br>\t\t\t<br>얼마 지나지않아 2차 조정이 이어졌다. 이 징후 역시 온체인 데이터의 형태로 포착됐다. 비트코인 가격이 1만7400달러를 횡보하자 거래소 평균 입금량은 다시 증가세를 보였으며, 결국 가격은 1만6194달러까지 -7% 가량 추가로 하락했다.<br>\t\t\t<br>\t\t\t<br>최근 거래소 평균 입금량(144 블록 이동평균) 추이. 출처=크립토퀀트<br>\t\t\t<br>비트코인 가격은 현재 1만7000달러를 넘나들고 있다.&#160;온체인 데이터에 따르면, 모든 거래소 평균 입금량이 지난 3월 이래 최대치를 기록하고 있다. 크립토퀀트는 3차 조정이 한번 더 올 것으로 보고 있다.&#160;<br>\t\t\t<br>평균 입금량은 상대적인 입금량으로 고래들의 활동 정도를 파악하기 위한 지표다. 현재 24시간 기준으로 봤을 때 평균 2.5BTC를 매 비트코인 블록마다 거래소에 입금하고 있는 상태인데, 이 정도 수치는 지난 3월12일 폭락 이후로 처음이다.<br>\t\t\t<br>크립토퀀트는 지난 2차 조정시 크립토퀀트 채널과 주기영 대표의 트위터에서 경고 메시지를 올렸고, 글이 게시된 후 가격은 1만 7375달러에서 약 6.4% 하락했다.<br>\t\t\t<br><br>\t\t\t출처: <<a href=\"https://www.coindeskkorea.com/news/articleView.html?idxno=72096\" target=\"_blank\">https://www.coindeskkorea.com/news/articleView.html?idxno=72096</a>> <br>\t\t\t<br><br>\t\t\t<br>기관투자자 움직임 확인 방법<br>\t\t\t<br><a href=\"https://www.coindeskkorea.com/news/articleView.html?idxno=72255\" target=\"_blank\">https://www.coindeskkorea.com/news/articleView.html?idxno=72255</a><br>\t\t\t<br><br>\t\t\t<br><a href=\"https://www.coindeskkorea.com/news/articleView.html?idxno=71965\" target=\"_blank\">https://www.coindeskkorea.com/news/articleView.html?idxno=71965</a><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br>현재 온체인 상에서 기관투자자들의 시장 진입을 볼 수 있는 데이터는 2가지 뿐이다. 하나는 기관투자자들이 공시한 비트코인 매수량 집계를 확인하는 방법. 다른 하나는 장외(OTC) 거래로 추정되는 온체인 지표들을 추려보는 보는 방법 정도다.&#160;OTC 거래는 시장에 영향을 주지 않으면서 대형 기관 투자자가 매수를 하는 것이기 때문에 일반적으로 상승 시그널로 간주된다.<br>\t\t\t<br><br>\t\t\t<br>기관들이 매수한 비트코인 수량 현황은&#160;<a href=\"https://bitcointreasuries.org/\" target=\"_blank\">비트코인트래슈리즈(bitcointreasuries) 사이트</a>에서 확인할 수 있다. 현재 그레이스케일의 비트코인 매수량이 압도적으로 많은데, 매주 수 천개의 비트코인이 기관 매수 물량 목록에 지속적으로 추가되고 있다.<br>\t\t\t<br><br>\t\t\t<br>■ 코인베이스 비트코인 출금량<br>\t\t\t<br><br>\t\t\t<br>크립토퀀트는 코인베이스가 비트코인을 대량 출금하여 새로운 콜드월렛으로 보냈다면 OTC 거래를 위해 코인베이스 커스터디 지갑의 보유분을 미리 준비하는 작업일 가능성이 높다고 파악<br>\t\t\t<br><br>\t\t\t<br><a href=\"https://cryptoquant.com/overview/full/413?window=hour\" target=\"_blank\">https://cryptoquant.com/overview/full/413?window=hour</a><br>\t\t\t<br><br>\t\t\t<br>\t\t\t<br><br>\t\t\t<br>■ 암호화폐 거래소 자금 흐름 비율<br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><a href=\"https://cryptoquant.com/overview/full/388?window=day\" target=\"_blank\">'모든 거래소의 자금 흐름 비율 (Fund Flow Ratio for All Exchanges)'</a>&#160;<br>\t\t\t<br><br>\t\t\t<br>비트코인 블록체인 상에서의 거래소 입출금량이 전체 네트워크 자금 이동량에서 차지하는 비율을 말한다. 이 값이 상승하면 비트코인 네트워크를 대부분 거래소에서 사용하고 있다는 뜻이고, 이 값이 하락하면 거래소 지갑 밖에서 대규모 온체인 거래들이 발생하고 있다고 보면 된다. <br>\t\t\t<br><br>\t\t\t<br>OTC 거래량이 없고 시장이 불안정한 시기일 때 이 수치는 10%에서 14%를 상회하기도 한다. OTC 거래량이 많을 때에는 보통 1%에서 7% 사이의 수치를 보이는데, 현재는 5% 수준 밖에 되지 않는다. 비트코인 네트워크에서 하루에 이동하는 물량이 260만개(한화 약 62조원) 정도 되는데 그중 95%가 거래소 밖에서 이루어진 거래라는 얘<br>\t\t\t<br>기다.<br>\t\t\t<br><br>\t\t\t<br>&#160;암호화폐 거래소 자금 흐름 비율<br>\t\t\t<br><br>\t\t\t<br>크립토퀀트 차트에서도 확인할 수 있는 항목이 있다.&#160;<a href=\"https://cryptoquant.com/overview/full/388?window=day\" target=\"_blank\">'모든 거래소의 자금 흐름 비율 (Fund Flow Ratio for All Exchanges)'</a>&#160;차트다. 이 지표는 비트코인 블록체인 상에서의 거래소 입출금량이 전체 네트워크 자금 이동량에서 차지하는 비율을 말한다. 이 값이 상승하면 비트코인 네트워크를 대부분 거래소에서 사용하고 있다는 뜻이고, 이 값이 하락하면 거래소 지갑 밖에서 대규모 온체인 거래들이 발생하고 있다고 보면 된다.&#160;<br>\t\t\t<br>OTC 거래량이 없고 시장이 불안정한 시기일 때 이 수치는 10%에서 14%를 상회하기도 한다. OTC 거래량이 많을 때에는 보통 1%에서 7% 사이의 수치를 보이는데, 현재는 5% 수준 밖에 되지 않는다. 비트코인 네트워크에서 하루에 이동하는 물량이 260만개(한화 약 62조원) 정도 되는데 그중 95%가 거래소 밖에서 이루어진 거래라는 얘기다.&#160;<br>\t\t\t<br>\t\t\t<br>최근 모든 거래소의 자금 흐름 비율 차트. 출처=크립토퀀트<br>\t\t\t<br>이 지표가 지난 2019년 2월에 5% 수준으로 단기 저점을 찍었던 적이 있다. 바이낸스, 비트렉스 등 글로벌 주요 암호화폐 거래소들이 일제히 OTC 데스크를 출범시켰던 때와 시기적으로 겹친다.&#160;<br>\t\t\t<br><br>\t\t\t출처: <<a href=\"https://www.coindeskkorea.com/news/articleView.html?idxno=72255\" target=\"_blank\">https://www.coindeskkorea.com/news/articleView.html?idxno=72255</a>> <br>\t\t\t<br><br>\t\t\t<br> <br>\t\t\t<br><br>\t\t\t<br>■ 토큰 이동량<br>\t\t\t<br><br>\t\t\t<br><a href=\"https://cryptoquant.com/overview/full/244?window=day\" target=\"_blank\">'비트코인 토큰 이동량'</a>도 함께 확인해야 할 지표다. 이 지표는 말 그대로 네트워크 전체에서 비트코인이 이동한 총량을 말한다. 토큰 이동량이 상승하는데 거래소의 자금 흐름 비율은 감소하고 있는 상황이라면 OTC 거래량이 상승하고 있을 확률이 높다. 크립토퀀트는 이런 온체인 독법들을 이용해 기관 투자자들의 본격 진입이 가시화 되기 전인 9월부터 거래소 바깥에서 대규모 OTC 거래가 일어나고 있음을&#160;<a href=\"https://www.coindeskkorea.com/news/articleView.html?idxno=71878\" target=\"_blank\">언급한 바 있다</a>. 이후 마이크로스트레지, 그레이스케일, 러퍼, 원리버 등 기관 투자자들이 비트코인을 대량 매수했음을 공시했다.&#160;<br>\t\t\t<a href=\"https://cryptoquant.com/overview/full/244?window=day\" target=\"_blank\">\t\t\t\t\t\t\t</a>\t\t\t<br>상승을 예견하며 여러가지 온체인 지표들을 참고했다. 그중 가장 대표적인 지표는&#160;스테이블 코인의 거래소 입금 횟수가 눈에 띄게 증가했다는 점이었다. 최근 투자자들이&#160;스테이블 코인을 이용해 암호화폐를 매수하는 경우가 많기 때문에&#160;스테이블 코인의 거래소&#160;입금 횟수는 시장의 잠재적인 매수압력<br>\t\t\t<br><br>\t\t\t<br>\t\t\t<br><br>\t\t\t<br>MPI지수는 채굴자들이 매도를 위해 거래소로 얼마나 많은 비트코인을 전송하는지&#160;계량하는 지표다.&#160;<br>\t\t\t<br><a href=\"https://cryptoquant.com/overview/full/199?window=day\" target=\"_blank\">https://cryptoquant.com/overview/full/199?window=day</a><br>\t\t\t<br><br>\t\t\t<br>상승에 대한 조정이 찾아오는 시점은 얼마나 많은 고래와 채굴자들이 거래소에 입금하는지를 모니터링&#160;<br>\t\t\t<br>비트코인 유입은 매도압력, 스테이블코인 유입은 매수압력<br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br>가격이 결정 되려면 결국 거래소로 코인을 보내서 팔아야하는데, 누가 / 언제 / 왜 / 얼마나 많은 코인을 위지 알면, 거래소에서 실제로 코인이 판매되기 전에 매수 / 매도 포지션을 수 있습니다.<br>\t\t\t<br><br>\t\t\t<br>BTC : 모든 거래소 유입 평균 (144 블록 / 24 시간 이동 평균)<br>\t\t\t<br>모든 거래소에 입금되는 비트 코인의 평균 량을 24 시간, 즉 144 개의주기 (비트 코인의 경우 블록 생성주기는 10 분)로 평균을 취한 값이다. 이 값이 2 BTC를 넘을 경우 고래가 많이 입금 한 경우라고 판단하고있다. 상승 도중 2 비트 코인을 넘길 경우 덤핑의 가능성이 높고, 하락한다면 2 비트 코인을 넘기면 입금 만하고 실제로는 팔지 않는 경우가 많다.<br>\t\t\t<br><a href=\"https://cryptoquant.com/prochart/ezer9p3coz\" target=\"_blank\">https://cryptoquant.com/prochart/ezer9p3coz</a><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br>\t\t\t\t<br>\t\t\t\t\t<br>\t\t\t\t\t<br>\t\t\t\t<br>\t\t\t<br>\t\t\t<br>\t\t\t\t<br>\t\t\t\t\t<br>무려&#160;78%의 유저들이 설정한 차트 2가지를 소개합니다!&#160;<br>\t\t\t\t\t<br>다음 차트들을&#160;1.&#160;클릭하고&#160;2. &#127775; 를 클릭해보세요.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>1. Bitcoin/ Exchange Flows<br>\t\t\t\t\t<br>-&#160;<a href=\"https://live.us4.list-manage.com/track/click?u=194ac041bb7af11b2a3017080&id=347b44ab33&e=68d5d1a9dc\" target=\"_blank\">BTC: All Exchanges Reserve</a>&#160;(모든 거래소의 비트코인 보유량)&#160;<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>2. Bitcoin/ Indicator<br>\t\t\t\t\t<br>-&#160;<a href=\"https://live.us4.list-manage.com/track/click?u=194ac041bb7af11b2a3017080&id=665aa69565&e=68d5d1a9dc\" target=\"_blank\">BTC: All Exchanges Stablecoins Ratio USD</a>&#160;(모든 거래소의 스테이블 코인 지표 USD)<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>✅ 왜 중요하나요?<br>\t\t\t\t\t<br>: 거래소 보유량이 급증하는건 매도 가능&#160;물량이 거래소에 입금되고 있다는 것을 의미합니다. 매수/매도를 결정하거나, 고배율로 투자하고 있을때는 거래소 보유량을 모니터링해야 합니다.<br>\t\t\t\t\t<br>\t\t\t\t<br>\t\t\t<br>\t\t<br>\t\t<br>\t\t\t<br><a href=\"https://www.notion.so/Bitcoin-Data-Guide-de5142fdc6d54e7c945730d5d535c9fc\" target=\"_blank\">https://www.notion.so/Bitcoin-Data-Guide-de5142fdc6d54e7c945730d5d535c9fc</a><br>\t\t<br>\t\t<br>\t\t\t<br>ㅇ 폭락하는 그 날에 단 하나의 코인도 가지고 있지 않을 것.<br>\t\t\t<br><br>\t\t\t<br>1/ 징후 포착이 가능해야 함 -> 온체인 데이터 활용<br>\t\t\t<br>2/ 징후 포착이후 단시간(얼마?) 내에 모든 코인을 매도할 수 있어야함 -> 종목 최소화 필요<br>\t\t\t<br>3/ 폭락 직전까지 수익 극대화<br>\t\t\t<br>\t\t\t\t<br>- 포폴: 비트코인 비중 50~60%, 메이저 코인 30~40%, 모험자본 10%(조만간  청산)<br>\t\t\t\t<br>비트, 에이다, 리플, 비캐, 디크레드, 비트코인에스브이, 넴 -> 최종 3개로 압축<br>\t\t\t\t<br>하락시에만 매수, 추격매수 엄금<br>\t\t\t\t<br>비트코인 상대강도 지수 Relative Strength Index, RSI -> 17년과 유사한 사이클<br>\t\t\t\t<br>스테이블코인 - 거래소에 예치된 비트코인에 비해 많은 스테이블 코인 -> 상승 예견<br>\t\t\t\t<br>고래의 거래소 활동이 활발해지면 BTC가격은 하락/횡보 가능성 높음<br>\t\t\t\t<br><a href=\"https://cryptoquant.com/overview/full/8653?window=min\" target=\"_blank\">코인베이스</a> 프리미엄 인덱스 - 코인베이스 고래들이 대량매수 할 경우 다 거래소들과의 가격차이 발생.<br>\t\t\t\t<br>50달러 이상 프리미엄 -> 고래들이 매수<br>\t\t\t\t<br>50달러 이하일 때 가격이 상승하면 개미 투자자들이나 스테이블 코인을 가진 고래들에 의한 상승으로 보고 투자에 유의해야 한다.<br>\t\t\t\t<br><a href=\"https://cryptoquant.com/overview/full/596?window=day\" target=\"_blank\">All Stablecoins: All Exchanges Inflow Transaction Count</a> - 모든 거래소의 스테이블 코인 입금 횟수<br>\t\t\t\t<br>블록 단위로 봤을 때 이 지표가 80 이상을 상회할 경우, 1~5% 이상의 단기 상승을 기대해 볼 수 있다. 이더리움(ERC20) 기준 한 블록은 10~15초이므로, 15초 안에 약 80건의 스테이블 코인이 연속적으로 입금되면 비트코인 가격이 상승할 확률이 높다.&#160;<br>\t\t\t\t<br>가끔 이 신호가 1회가 아니라 2~3회씩 연속해서 중첩되는 경우가 있는데, 이때는 상승 확률이 더 높아진다. <br>\t\t\t\t<br>매도 압력이라고 볼 수 있는 거래소 평균 입금량이 증가하면서 비트코인 가격은 1만8000달러까지 하락<br>\t\t\t\t<br><a href=\"https://cryptoquant.com/overview/full/581?window=day\" target=\"_blank\">All Stablecoins: All Exchanges Reserve</a> - 거래소 스테이블 코인 보유량<br>\t\t\t\t<br><a href=\"https://cryptoquant.com/prochart/1ymrwlks22\" target=\"_blank\">거래소</a> 평균 입금량",
    "w": 400
  }
];

let cards = [];
let moving = null, resizing = null;

function loadBoard() {
  const saved = localStorage.getItem(SAVE_KEY);
  cards = saved ? JSON.parse(saved) : DEFAULT_CARDS.map(c => ({...c}));
  renderCards();
  if (!saved) autoLayout();
}

function autoLayout() {
  const GAP = 14;
  const boardW = document.getElementById('board').offsetWidth;
  const cols = Math.max(1, Math.floor(boardW / 280));
  const colW = (boardW - GAP * (cols - 1)) / cols;
  const colHeights = new Array(cols).fill(0);
  const allCards = document.querySelectorAll('.card');
  const images = document.querySelectorAll('.card img');
  let loaded = 0;
  const total = images.length;

  function place() {
    allCards.forEach((el, i) => {
      const card = cards[i];
      const w = Math.min(card.w || colW, colW);
      let minCol = 0;
      for (let c = 1; c < cols; c++) if (colHeights[c] < colHeights[minCol]) minCol = c;
      card.x = minCol * (colW + GAP);
      card.y = colHeights[minCol];
      card.w = w;
      el.style.left = card.x + 'px';
      el.style.top = card.y + 'px';
      el.style.width = w + 'px';
      colHeights[minCol] = card.y + el.offsetHeight + GAP;
    });
    document.getElementById('board').style.minHeight = Math.max(...colHeights) + 100 + 'px';
    saveBoard();
  }

  if (total === 0) requestAnimationFrame(place);
  else images.forEach(img => {
    if (img.complete) { loaded++; if (loaded >= total) requestAnimationFrame(place); }
    else img.onload = img.onerror = () => { loaded++; if (loaded >= total) requestAnimationFrame(place); };
  });
}

function syncText() {
  document.querySelectorAll('.card').forEach(el => {
    const idx = +el.dataset.idx;
    if (cards[idx]?.type === 'text') {
      const t = el.querySelector('.text');
      if (t) cards[idx].content = t.innerHTML;
    }
  });
}

function saveBoard() {
  syncText();
  localStorage.setItem(SAVE_KEY, JSON.stringify(cards));
  document.getElementById('status').textContent = '저장됨 ' + new Date().toLocaleTimeString();
}

function renderCards() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  cards.forEach((card, i) => {
    const el = document.createElement('div');
    el.className = 'card';
    el.dataset.idx = i;
    if (card.x !== undefined) el.style.left = card.x + 'px';
    if (card.y !== undefined) el.style.top = card.y + 'px';
    if (card.w) el.style.width = card.w + 'px';

    el.addEventListener('mousedown', e => {
      if (e.target.closest('.text, a, .card-btn, .resize-handle, table')) return;
      e.preventDefault();
      moving = { idx: i, startX: e.clientX, startY: e.clientY, origX: card.x || 0, origY: card.y || 0 };
      el.classList.add('moving');
    });

    const actions = document.createElement('div');
    actions.className = 'card-actions';
    const delBtn = document.createElement('button');
    delBtn.className = 'card-btn'; delBtn.textContent = '×';
    delBtn.onclick = e => { e.stopPropagation(); if (confirm('삭제?')) { cards.splice(i, 1); renderCards(); saveBoard(); } };
    actions.appendChild(delBtn);
    el.appendChild(actions);

    if (card.type === 'text') {
      const text = document.createElement('div');
      text.className = 'text';
      text.contentEditable = true;
      text.innerHTML = card.content || '';
      text.addEventListener('blur', () => { card.content = text.innerHTML; saveBoard(); });
      el.appendChild(text);
    } else if (card.type === 'image') {
      const src = card.src.startsWith('http') || card.src.startsWith('data:') ? card.src : IMG_BASE + card.src;
      const img = document.createElement('img');
      img.src = src;
      img.alt = card.alt || '';
      img.loading = 'lazy';
      img.onerror = () => img.style.display = 'none';
      if (card.link) {
        const a = document.createElement('a'); a.href = card.link; a.target = '_blank';
        a.appendChild(img); el.appendChild(a);
      } else { el.appendChild(img); }
      if (card.caption) {
        const cap = document.createElement('div');
        cap.className = 'caption';
        cap.textContent = card.caption;
        el.appendChild(cap);
      }
    } else if (card.type === 'table') {
      const wrapper = document.createElement('div');
      wrapper.style.overflowX = 'auto';
      wrapper.innerHTML = card.html || '';
      el.appendChild(wrapper);
    }

    const rh = document.createElement('div');
    rh.className = 'resize-handle';
    rh.addEventListener('mousedown', e => {
      e.preventDefault(); e.stopPropagation();
      resizing = { idx: i, startX: e.clientX, startW: card.w || el.offsetWidth };
    });
    el.appendChild(rh);
    board.appendChild(el);
  });

  requestAnimationFrame(() => {
    let maxBottom = 0;
    document.querySelectorAll('.card').forEach(el => {
      const b = (parseFloat(el.style.top) || 0) + el.offsetHeight;
      if (b > maxBottom) maxBottom = b;
    });
    board.style.minHeight = (maxBottom + 100) + 'px';
  });
}

document.addEventListener('mousemove', e => {
  if (moving) {
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`);
    if (!el) return;
    const nx = moving.origX + e.clientX - moving.startX;
    const ny = moving.origY + e.clientY - moving.startY;
    el.style.left = nx + 'px';
    el.style.top = ny + 'px';
  }
  if (resizing) {
    const card = cards[resizing.idx];
    card.w = Math.max(100, resizing.startW + e.clientX - resizing.startX);
    const el = document.querySelector(`.card[data-idx="${resizing.idx}"]`);
    if (el) el.style.width = card.w + 'px';
  }
});

document.addEventListener('mouseup', e => {
  if (moving) {
    const card = cards[moving.idx];
    card.x = Math.max(0, moving.origX + e.clientX - moving.startX);
    card.y = Math.max(0, moving.origY + e.clientY - moving.startY);
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`);
    if (el) { el.classList.remove('moving'); }
    moving = null; saveBoard();
  }
  if (resizing) { resizing = null; saveBoard(); }
});

function addTextCard() {
  cards.push({ type: 'text', content: '', x: 50, y: window.scrollY + 100, w: 300 });
  renderCards();
  setTimeout(() => { const els = document.querySelectorAll('.card .text'); els[els.length - 1]?.focus(); }, 100);
}

function addImageCard() {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = 'image/*';
  input.onchange = e => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = () => { cards.push({ type: 'image', src: reader.result, x: 50, y: window.scrollY + 100, w: 240 }); renderCards(); saveBoard(); };
    reader.readAsDataURL(file);
  };
  input.click();
}

function resetLayout() {
  if (!confirm('자동 재배치합니다. 현재 위치가 변경됩니다.')) return;
  cards.forEach(c => { delete c.x; delete c.y; });
  renderCards(); autoLayout();
}

setInterval(saveBoard, 30000);
loadBoard();
</script>
