.resize-handle::after { content: ''; position: absolute; bottom: 3px; right: 3px; width: 8px; height: 8px; border-right: 2px solid #666; border-bottom: 2px solid #666; }
.card.selected { box-shadow: 0 0 0 2px #58a6ff; z-index: 5; }
.highlight-red { color: #ff6b6b; }
.highlight-blue { color: #6cb0f6; }
.highlight-gold { color: #f0c040; }
.toolbar { position: fixed; bottom: 0; left: 0; right: 0; background: #161b22; border-top: 1px solid #30363d; padding: 8px 20px; display: flex; gap: 12px; align-items: center; z-index: 200; }
.toolbar button { background: #21262d; border: 1px solid #30363d; color: #e0e0e0; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; }
.toolbar button:hover { background: #30363d; }
.toolbar .status { color: #8b949e; font-size: 12px; margin-left: auto; }
#format-toolbar { position: fixed; display: none; background: #1c2128; border: 1px solid #444c56; border-radius: 8px; padding: 4px 6px; gap: 2px; align-items: center; z-index: 500; box-shadow: 0 4px 16px rgba(0,0,0,0.5); }

    "content": "ㅇ 폭락하는 그 날에 단 하나의 코인도 가지고 있지 않을 것.\n1/ 징후 포착이 가능해야 함 -> 온체인 데이터 활용\n2/ 징후 포착이후 단시간(얼마?) 내에 모든 코인을 매도할 수 있어야함 -> 종목 최소화 필요\n3/ 폭락 직전까지 수익 극대화\n\n포폴: 비트코인 비중 50~60%, 메이저 코인 30~40%, 모험자본 10%(조만간  청산)\n비트, 에이다, 리플, 비캐, 디크레드, 비트코인에스브이, 넴 -> 최종 3개로 압축\n하락시에만 매수, 추격매수 엄금\n비트코인 상대강도 지수 Relative Strength Index, RSI -> 17년과 유사한 사이클\n스테이블코인 - 거래소에 예치된 비트코인에 비해 많은 스테이블 코인 -> 상승 예견\n고래의 거래소 활동이 활발해지면 BTC가격은 하락/횡보 가능성 높음\n<a href=\"https://cryptoquant.com/overview/full/8653?window=min\">코인베이스</a> 프리미엄 인덱스 - 코인베이스 고래들이 대량매수 할 경우 다 거래소들과의 가격차이 발생.\n50달러 이상 프리미엄 -> 고래들이 매수\n50달러 이하일 때 가격이 상승하면 개미 투자자들이나 스테이블 코인을 가진 고래들에 의한 상승으로 보고 투자에 유의해야 한다.\n<a href=\"https://cryptoquant.com/overview/full/596?window=day\">All Stablecoins: All Exchanges Inflow Transaction Count</a> - 모든 거래소의 스테이블 코인 입금 횟수\n블록 단위로 봤을 때 이 지표가 80 이상을 상회할 경우, 1~5% 이상의 단기 상승을 기대해 볼 수 있다. 이더리움(ERC20) 기준 한 블록은 10~15초이므로, 15초 안에 약 80건의 스테이블 코인이 연속적으로 입금되면 비트코인 가격이 상승할 확률이 높다.&#160;\n가끔 이 신호가 1회가 아니라 2~3회씩 연속해서 중첩되는 경우가 있는데, 이때는 상승 확률이 더 높아진다.\n매도 압력이라고 볼 수 있는 거래소 평균 입금량이 증가하면서 비트코인 가격은 1만8000달러까지 하락\n<a href=\"https://cryptoquant.com/overview/full/581?window=day\">All Stablecoins: All Exchanges Reserve</a> - 거래소 스테이블 코인 보유량\n<a href=\"https://cryptoquant.com/prochart/1ymrwlks22\">거래소</a> 평균 입금량"

    "html": "\r\n\t\t\t<p lang=\"en-US\" data-tag=\"to-do\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic;font-size:9pt\">볼린저밴드</span></p>\r\n\t\t\t<p lang=\"en-US\" data-tag=\"to-do\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic;font-size:9pt\">거래량확인</span></p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:맑은 고딕\">링크코인</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\"> </span><span style=\"font-family:맑은 고딕\">분석글</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\"> </span><a href=\"https://coinpan.com/free/103132145\" lang=\"en-US\">https://coinpan.com/free/103132145</a></p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:맑은 고딕;font-size:9pt;margin-top:0pt;margin-bottom:0pt\"><a href=\"https://www.coindeskkorea.com/news/articleList.html?sc_area=K&amp;sc_word=%ED%81%AC%EB%A6%BD%ED%86%A0%ED%80%80%ED%8A%B8\">https://www.coindeskkorea.com/news/articleList.html?sc_area=K&amp;sc_word=%ED%81%AC%EB%A6%BD%ED%86%A0%ED%80%80%ED%8A%B8</a></p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:맑은 고딕;font-size:9pt;margin-top:0pt;margin-bottom:0pt\"><a href=\"https://cryptoquant.com/overview/btc-exchange-flows\">https://cryptoquant.com/overview/btc-exchange-flows</a></p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:맑은 고딕;font-size:9pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:돋움;color:#d5d5d5;background-color:#191a1a\">안녕하세요,</span></p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:맑은 고딕;font-size:9pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:돋움;color:#d5d5d5;background-color:#191a1a\">현재 알람 설정에 대한 가이드는 준비 중이며, 주요한 프로차트 프리셋은&#160;</span><a href=\"https://www.notion.so/cqlive/Bitcoin-Data-Guide-de5142fdc6d54e7c945730d5d535c9fc\" style=\"background-color:#191a1a\">데이터 사용 가이드</a><span style=\"font-family:돋움;color:#d5d5d5;background-color:#191a1a\">를 통해서 바로 설정하실 수 있습니다.</span></p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:맑은 고딕;font-size:9pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:돋움;color:#d5d5d5;background-color:#191a1a\">각 차트 링크를 클릭하시고 저장하시면 됩니다.</span></p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:맑은 고딕;font-size:9pt;margin-top:0pt;margin-bottom:0pt\">또한 알람은&#160;<a href=\"https://cryptoquant.com/alert\" style=\"font-family:돋움;background-color:#191a1a\">알람페이지</a>와 각 오버뷰 차트의 오른쪽 상단 알람 아이콘을 클릭하여 설정하실 수 있으며 아래와 같은 지표를 통해 가격 변동성을 예측하실 수 있습니다.</p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:맑은 고딕;font-size:9pt;margin-top:0pt;margin-bottom:0pt\">1. All Stablecins&#160;- All Exchanges의 Transaction Count Inflow 가 일정 수치를 넘어가면 비트코인의 가격이 상승할 확률이 높습니다.</p>\r\n\t\t\t<p style=\"font-family:맑은 고딕;font-size:9pt;margin-top:0pt;margin-bottom:0pt\">2. Bitcoin - All Exchanges의 Transaction Count Inflow 가 일정 수치를 넘어가면 비트코인을 팔기 위해 입금횟수가 증가하는 것이므로 비트코인 가격이 급락할 가능성이 있습니다.</p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:맑은 고딕;font-size:9pt;margin-top:0pt;margin-bottom:0pt\">단, 가격 변동성은 어디까지나 확률에 근거하는바 세부 수치는 말씀드리기 어려운 점 양해 부탁드립니다.</p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:맑은 고딕;font-size:9pt;margin-top:0pt;margin-bottom:0pt\">알람 및&#160;<a href=\"https://dataguide.cryptoquant.com/quick-start/whale-dumping\" style=\"font-family:돋움;background-color:#191a1a\">프로차트의 추천 차트</a>&#160;및 데이터들에 대한 세부적인 안내 가이드가 빠른 시일내에 더 추가될 예정이오니 참고 부탁드립니다.</p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:맑은 고딕;font-size:9pt;margin-top:0pt;margin-bottom:0pt\">감사합니다.</p>\r\n\t\t\t<br />\r\n\t\t\t<cite style=\"font-family:Calibri;font-size:9pt;color:#595959;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">출처</span>: &lt;<a href=\"https://mail.naver.com/#%7B%22fClass%22%3A%22read%22%2C%22oParameter%22%3A%7B%22charset%22%3A%22%22%2C%22prevNextMail%22%3Atrue%2C%22threadMail%22%3Atrue%2C%22listScrollPosition%22%3A0%2C%22mailSN%22%3A%2280947%22%2C%22previewMode%22%3A2%7D%7D\">https://mail.naver.com/#%7B%22fClass%22%3A%22read%22%2C%22oParameter%22%3A%7B%22charset%22%3A%22%22%2C%22prevNextMail%22%3Atrue%2C%22threadMail%22%3Atrue%2C%22listScrollPosition%22%3A0%2C%22mailSN%22%3A%2280947%22%2C%22previewMode%22%3A2%7D%7D</a>&gt; </cite>\r\n\t\t\t<br />\r\n\t\t\t<p data-tag=\"to-do\" style=\"font-family:맑은 고딕;font-size:9pt;margin-top:0pt;margin-bottom:0pt\">비트코인<span lang=\"en-US\"> </span>상대강도<span lang=\"en-US\"> </span>지수</p>\r\n\t\t\t<p style=\"font-family:맑은 고딕;font-size:9pt;margin-top:0pt;margin-bottom:0pt\">비트코인 중심의 분석가 &#39;플랜B&#39;는 최근 트위터를 통해 &quot;비트코인의 상대강도지수(Relative Strength Index, RSI)가 이전 사이클과 비슷한 경로를 걷고 있다&quot;면서, 향후 비트코인의 상승 랠리가 지속될 것으로 전망했다.</p>\r\n\t\t\t<br />\r\n\t\t\t<p data-tag=\"to-do\" style=\"font-family:맑은 고딕;font-size:9pt;margin-top:0pt;margin-bottom:0pt\">스테이블<span lang=\"en-US\"> </span>코인<span lang=\"en-US\"> </span>수량</p>\r\n\t\t\t<p style=\"font-family:맑은 고딕;font-size:9pt;margin-top:0pt;margin-bottom:0pt\">조정이 얼마나 진행될지 확실하지 않지만, 온체인 지표는 거래소에 예치된 비트코인에 비해 충분히 많은 스테이블코인이 있어 다시 한 번 상승이 나올 수 있다고 얘기하고 있다</p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:맑은 고딕;font-size:9pt;margin-top:0pt;margin-bottom:0pt\">144 블록(10분에 1블록 생산 시 하루 블록 생산량) 평균 거래소 유입 BTC 물량이 2 BTC를 넘어섰다. 일반적으로 고래의 거래소 활동이 활발해지면, BTC 가격은 횡보하거나 하락할 가능성이 존재한다.</p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:맑은 고딕;font-size:9pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Nanum Gothic;font-size:12.5pt;color:#d7d5d2;background-color:#191a1a\">지금 사야 할까. 아니면 조정 후에 사야 할까. 답은 코인베이스 프리미엄에 있다.&#160;</span></p>\r\n\t\t\t<p style=\"font-family:맑은 고딕;font-size:9pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Nanum Gothic;font-size:12.5pt;color:#d7d5d2;background-color:#191a1a\">미국 최대의 암호화폐 거래소인 코인베이스는 미국 달러(USD)로 직접 비트코인을 살 수 있기 때문에 미국의 많은 기관투자자가 이용한다. 이들이 대량 매수에 나서면 바이낸스 등 스테이블코인으로 비트코인을 매수하는 거래소들과 가격 차이가 발생한다. 이를 코인베이스 프리미엄이라 부른다.&#160;</span></p>\r\n\t\t\t<p style=\"font-family:맑은 고딕;font-size:9pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Nanum Gothic;font-size:12.5pt;color:#d7d5d2;background-color:#191a1a\">통상 50달러 이상 프리미엄이 붙으면 코인베이스 고래들이 매수한다고 판단한다. 테슬라로 인한 이번 상승 때에도 앞서 정보를 접한 코인베이스 고래들이 대거 매수에 나서면서 바이낸스와 일시적으로 개당 452달러가량의 비트코인 가격 차이가 발생했었다. 지금의 가격 상승을 주도하고 있는 미국 기관투자자 고래와 함께 움직이면 당분간 손실을 볼 확률이 낮을 것이다.&#160;</span></p>\r\n\t\t\t<div style=\"display:inline-block;width:480px;height:200px;background:#2d333b;border-radius:4px;margin:2px;vertical-align:top;opacity:0.4\"></div>\r\n\t\t\t<br />\r\n\t\t\t<cite style=\"font-family:Calibri;font-size:9pt;color:#595959;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">출처</span>: &lt;<a href=\"https://www.coindeskkorea.com/news/articleView.html?idxno=72757\">https://www.coindeskkorea.com/news/articleView.html?idxno=72757</a>&gt; </cite>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:맑은 고딕;font-size:9pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Nanum Gothic;font-size:12.5pt;color:#d7d5d2;background-color:#191a1a\">테슬라 상승 이후의 코인베이스 프리미엄 동향은 어떨까. 가격이 4만7000달러를 횡보할 때 코인베이스 프리미엄은 평균 100달러 이상을 기록했다. 기관들이 꾸준히 매수하고 있다는 얘기다.&#160;</span></p>\r\n\t\t\t<p style=\"font-family:맑은 고딕;font-size:9pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Nanum Gothic;font-size:12.5pt;color:#d7d5d2;background-color:#191a1a\">반면 4만9000선에 14일에는 50달러 이하로 프리미엄이 줄어들었다. 한때 -79달러의 &#39;역프리미엄&#39;이 생기기도 했다. 비트코인 가격이 심리적 저항선인 5만달러 부근까지 오르자 이전만큼 코인베이스 고래들의 매수 압력이 높지 않은 상황인 것으로 보인다.</span></p>\r\n\t\t\t<br />\r\n\t\t\t<cite style=\"font-family:Calibri;font-size:9pt;color:#595959;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">출처</span>: &lt;<a href=\"https://www.coindeskkorea.com/news/articleView.html?idxno=72757\">https://www.coindeskkorea.com/news/articleView.html?idxno=72757</a>&gt; </cite>\r\n\t\t\t<br />\r\n\t\t\t<div style=\"display:inline-block;width:480px;height:200px;background:#2d333b;border-radius:4px;margin:2px;vertical-align:top;opacity:0.4\"></div>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:맑은 고딕;font-size:9pt;margin-top:0pt;margin-bottom:0pt\">지금 상황에서 코인베이스 프리미엄이 50달러 이하일 때 가격이 상승하면 개미 투자자들이나 스테이블 코인을 가진 고래들에 의한 상승으로 보고 투자에 유의해야 한다. 고래들은 개미 투자자들의 매수세를 모아 자신의 물량을 떠넘기고 이익 실현을 하는 경향이 있기 때문이다. 이들은 가격을 어느 정도 상승시킨 후 큰 조정을 주는 방식으로 시장을 관리한다.&#160;</p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:맑은 고딕;font-size:9pt;margin-top:0pt;margin-bottom:0pt\"><a href=\"https://cryptoquant.com/prochart/fdxeih58iv\">https://cryptoquant.com/prochart/fdxeih58iv</a></p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:맑은 고딕;font-size:9pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Nanum Gothic;font-size:12.5pt;color:#d7d5d2;background-color:#191a1a\">단기 상승 예측에 유용한 온체인 신호인 &#39;모든 거래소의 스테이블 코인 입금 횟수&#39;를 주목해야 한다. 이 지표는 모든 거래소에 들어오는 모든 종류의 스테이블 코인의 입금 거래 수를 기록한 것이다. 블록 단위로 봤을 때 이 지표가 80 이상을 상회할 경우, 1~5% 이상의 단기 상승을 기대해 볼 수 있다. 이더리움(ERC20) 기준 한 블록은 10~15초이므로, 15초 안에 약 80건의 스테이블 코인이 연속적으로 입금되면 비트코인 가격이 상승할 확률이 높다.&#160;</span></p>\r\n\t\t\t<p style=\"font-family:맑은 고딕;font-size:9pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Nanum Gothic;font-size:12.5pt;color:#d7d5d2;background-color:#191a1a\">가끔 이 신호가 1회가 아니라 2~3회씩 연속해서 중첩되는 경우가 있는데, 이때는 상승 확률이 더 높아진다. 이번 상승의 경우도 저점에서 5회가량의 스테이블 코인 시그널이 연속적으로 발생하며 상승을 견인했다.</span></p>\r\n\t\t\t<div style=\"display:inline-block;width:480px;height:321px;background:#2d333b;border-radius:4px;margin:2px;vertical-align:top;opacity:0.4\"></div>\r\n\t\t\t<br />\r\n\t\t\t<cite style=\"font-family:Calibri;font-size:9pt;color:#595959;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">출처</span>: &lt;<a href=\"https://www.coindeskkorea.com/news/articleView.html?idxno=72721\">https://www.coindeskkorea.com/news/articleView.html?idxno=72721</a>&gt; </cite>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:맑은 고딕;font-size:9pt;margin-top:0pt;margin-bottom:0pt\">최근 모든 거래소 스테이블 코인 입금 횟수 추이. 2월 2일 오후 3시에서 6시 사이 블록 당 80건 이상이 입금되는 사례가 6번 발생했고, 3만5000달러 선을 횡보하던 비트코인 가격이 눈에 띄게 상승했다. 출처=크립토퀀</p>\r\n\t\t\t<p style=\"font-family:맑은 고딕;font-size:9pt;margin-top:0pt;margin-bottom:0pt\">기관투자자로 추정되는 OTC &#39;고래&#39;의 매수 선이 3만2000달러와 3만7000달러이므로 하락이 발생해도 이 두 개의 지점을 깨기는 쉽지 않을 것이라 판단된다. 비트코인 가격이 이 매수 선을 기점으로 장기간 횡보하거나 우상향할 가능성이 높다는 관점으로 트레이딩에 접근하는 게 좋겠다. 아울러 스테이블 코인 입금 횟수 지표를 이용해 단기 상승 가능성을 지속적으로 파악해가며 대응하는 게 필요한 시점이다.&#160;</p>\r\n\t\t\t<br />\r\n\t\t\t<cite style=\"font-family:Calibri;font-size:9pt;color:#595959;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">출처</span>: &lt;<a href=\"https://www.coindeskkorea.com/news/articleView.html?idxno=72721\">https://www.coindeskkorea.com/news/articleView.html?idxno=72721</a>&gt; </cite>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:맑은 고딕;font-size:9pt;margin-top:0pt;margin-bottom:0pt\">립토퀀트는 스테이블 코인의 거래소 보유량 증가세를 근거로 2만달러를 바로 뚫을 것으로 예상했으나, 1만9500달러 부근에서 고래들의 입금을 포착했다. 매도 압력이라고 볼 수 있는 거래소 평균 입금량이 증가하면서 비트코인 가격은 1만8000달러까지 하락했다.</p>\r\n\t\t\t<br />\r\n\t\t\t<div style=\"display:inline-block;width:480px;height:209px;background:#2d333b;border-radius:4px;margin:2px;vertical-align:top;opacity:0.4\"></div>\r\n\t\t\t<p style=\"font-family:맑은 고딕;font-size:9pt;margin-top:0pt;margin-bottom:0pt\">최근 거래소 스테이블 코인 유저 입금 횟수(좌)와 거래소 스테이블 코인 보유량(우). 출처=크립토퀀트</p>\r\n\t\t\t<br />\r\n\t\t\t<cite style=\"font-family:Calibri;font-size:9pt;color:#595959;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">출처</span>: &lt;<a href=\"https://www.coindeskkorea.com/news/articleView.html?idxno=72096\">https://www.coindeskkorea.com/news/articleView.html?idxno=72096</a>&gt; </cite>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:맑은 고딕;font-size:9pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Nanum Gothic;font-size:12.5pt;color:#989794\">최근 거래소 스테이블 코인 유저 입금 횟수(좌)와 거래소 스테이블 코인 보유량(우). 출처=크립토퀀트</span></p>\r\n\t\t\t<div style=\"display:inline-block;width:360px;height:200px;background:#2d333b;border-radius:4px;margin:2px;vertical-align:top;opacity:0.4\"></div>\r\n\t\t\t<p style=\"font-family:맑은 고딕;font-size:9pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Nanum Gothic;font-size:12.5pt;color:#989794\">최근 거래소 평균 입금량(144 블록 이동평균) 추이. 입금량이 늘어나면서 비트코인 가격이 떨어지는 것을 확인할 수 있다. 출처=크립토퀀트</span></p>\r\n\t\t\t<p style=\"font-family:맑은 고딕;font-size:9pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Nanum Gothic;font-size:12.5pt;color:#d7d5d2;background-color:#191a1a\">얼마 지나지않아 2차 조정이 이어졌다. 이 징후 역시 온체인 데이터의 형태로 포착됐다. 비트코인 가격이 1만7400달러를 횡보하자 거래소 평균 입금량은 다시 증가세를 보였으며, 결국 가격은 1만6194달러까지 -7% 가량 추가로 하락했다.</span></p>\r\n\t\t\t<div style=\"display:inline-block;width:360px;height:200px;background:#2d333b;border-radius:4px;margin:2px;vertical-align:top;opacity:0.4\"></div>\r\n\t\t\t<p style=\"font-family:맑은 고딕;font-size:9pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Nanum Gothic;font-size:12.5pt;color:#989794\">최근 거래소 평균 입금량(144 블록 이동평균) 추이. 출처=크립토퀀트</span></p>\r\n\t\t\t<p style=\"font-family:맑은 고딕;font-size:9pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Nanum Gothic;font-size:12.5pt;color:#d7d5d2;background-color:#191a1a\">비트코인 가격은 현재 1만7000달러를 넘나들고 있다.&#160;</span><span style=\"font-family:Nanum Gothic;font-size:12.5pt;color:#d7d5d2;background-color:#191a1a;font-weight:bold\">온체인 데이터에 따르면, 모든 거래소 평균 입금량이 지난 3월 이래 최대치를 기록하고 있다. 크립토퀀트는 3차 조정이 한번 더 올 것으로 보고 있다.</span><span style=\"font-family:Nanum Gothic;font-size:12.5pt;color:#d7d5d2;background-color:#191a1a\">&#160;</span></p>\r\n\t\t\t<p style=\"font-family:맑은 고딕;font-size:9pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Nanum Gothic;font-size:12.5pt;color:#d7d5d2;background-color:#191a1a\">평균 입금량은 상대적인 입금량으로 고래들의 활동 정도를 파악하기 위한 지표다. 현재 24시간 기준으로 봤을 때 평균 2.5BTC를 매 비트코인 블록마다 거래소에 입금하고 있는 상태인데, 이 정도 수치는 지난 3월12일 폭락 이후로 처음이다.</span></p>\r\n\t\t\t<p style=\"font-family:맑은 고딕;font-size:9pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Nanum Gothic;font-size:12.5pt;color:#d7d5d2;background-color:#191a1a\">크립토퀀트는 지난 2차 조정시 크립토퀀트 채널과 주기영 대표의 트위터에서 경고 메시지를 올렸고, 글이 게시된 후 가격은 1만 7375달러에서 약 6.4% 하락했다.</span></p>\r\n\t\t\t<br />\r\n\t\t\t<cite style=\"font-family:Calibri;font-size:9pt;color:#595959;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">출처</span>: &lt;<a href=\"https://www.coindeskkorea.com/news/articleView.html?idxno=72096\">https://www.coindeskkorea.com/news/articleView.html?idxno=72096</a>&gt; </cite>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:맑은 고딕;font-size:9pt;margin-top:0pt;margin-bottom:0pt\">기관투자자<span lang=\"en-US\"> </span>움직임<span lang=\"en-US\"> </span>확인<span lang=\"en-US\"> </span>방법</p>\r\n\t\t\t<p style=\"font-family:맑은 고딕;font-size:9pt;margin-top:0pt;margin-bottom:0pt\"><a href=\"https://www.coindeskkorea.com/news/articleView.html?idxno=72255\">https://www.coindeskkorea.com/news/articleView.html?idxno=72255</a></p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:맑은 고딕;font-size:9pt;margin-top:0pt;margin-bottom:0pt\"><a href=\"https://www.coindeskkorea.com/news/articleView.html?idxno=71965\">https://www.coindeskkorea.com/news/articleView.html?idxno=71965</a></p>\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">현재 온체인 상에서 기관투자자들의 시장 진입을 볼 수 있는 데이터는 2가지 뿐이다. 하나는 기관투자자들이 공시한 비트코인 매수량 집계를 확인하는 방법. 다른 하나는 장외(OTC) 거래로 추정되는 온체인 지표들을 추려보는 보는 방법 정도다.&#160;OTC 거래는 시장에 영향을 주지 않으면서 대형 기관 투자자가 매수를 하는 것이기 때문에 일반적으로 상승 시그널로 간주된다.</span></p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">기관들이 매수한 비트코인 수량 현황은&#160;</span><a href=\"https://bitcointreasuries.org/\" style=\"font-family:Nanum Gothic;font-size:12.5pt;background-color:#191a1a\">비트코인트래슈리즈(bitcointreasuries) 사이트</a><span style=\"font-family:Malgun Gothic\">에서 확인할 수 있다. 현재 그레이스케일의 비트코인 매수량이 압도적으로 많은데, 매주 수 천개의 비트코인이 기관 매수 물량 목록에 지속적으로 추가되고 있다.</span></p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Nanum Gothic;font-size:13.5pt;color:#838180;background-color:#191a1a;font-weight:bold\">■ 코인베이스 비트코인 출금량</span></p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">크립토퀀트는 코인베이스가 비트코인을 대량 출금하여 새로운 콜드월렛으로 보냈다면 OTC 거래를 위해 코인베이스 커스터디 지갑의 보유분을 미리 준비하는 작업일 가능성이 높다고 파악</span></p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><a href=\"https://cryptoquant.com/overview/full/413?window=hour\">https://cryptoquant.com/overview/full/413?window=hour</a></p>\r\n\t\t\t<br />\r\n\t\t\t<div style=\"display:inline-block;width:480px;height:359px;background:#2d333b;border-radius:4px;margin:2px;vertical-align:top;opacity:0.4\"></div>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Nanum Gothic;font-size:13.5pt;color:#838180;background-color:#191a1a;font-weight:bold\">■ 암호화폐 거래소 자금 흐름 비율</span></p>\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><a href=\"https://cryptoquant.com/overview/full/388?window=day\" style=\"font-family:Nanum Gothic;font-size:12.5pt;background-color:#191a1a\">&#39;모든 거래소의 자금 흐름 비율 (Fund Flow Ratio for All Exchanges)&#39;</a><span style=\"font-family:Malgun Gothic\">&#160;</span></p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">비트코인</span> <span style=\"font-family:Malgun Gothic\">블록체인</span> <span style=\"font-family:Malgun Gothic\">상에서의</span> <span style=\"font-family:Malgun Gothic\">거래소</span> <span style=\"font-family:Malgun Gothic\">입출금량이</span> <span style=\"font-family:Malgun Gothic\">전체</span> <span style=\"font-family:Malgun Gothic\">네트워크</span> <span style=\"font-family:Malgun Gothic\">자금</span> <span style=\"font-family:Malgun Gothic\">이동량에서</span> <span style=\"font-family:Malgun Gothic\">차지하는</span> <span style=\"font-family:Malgun Gothic\">비율을</span> <span style=\"font-family:Malgun Gothic\">말한다</span>. <span style=\"font-family:Malgun Gothic\">이</span> <span style=\"font-family:Malgun Gothic\">값이</span> <span style=\"font-family:Malgun Gothic\">상승하면</span> <span style=\"font-family:Malgun Gothic\">비트코인</span> <span style=\"font-family:Malgun Gothic\">네트워크를</span> <span style=\"font-family:Malgun Gothic\">대부분</span> <span style=\"font-family:Malgun Gothic\">거래소에서</span> <span style=\"font-family:Malgun Gothic\">사용하고</span> <span style=\"font-family:Malgun Gothic\">있다는</span> <span style=\"font-family:Malgun Gothic\">뜻이고</span>, <span style=\"font-family:Malgun Gothic\">이</span> <span style=\"font-family:Malgun Gothic\">값이</span> <span style=\"font-family:Malgun Gothic\">하락하면</span> <span style=\"font-family:Malgun Gothic\">거래소</span> <span style=\"font-family:Malgun Gothic\">지갑</span> <span style=\"font-family:Malgun Gothic\">밖에서</span> <span style=\"font-family:Malgun Gothic\">대규모</span> <span style=\"font-family:Malgun Gothic\">온체인</span> <span style=\"font-family:Malgun Gothic\">거래들이</span> <span style=\"font-family:Malgun Gothic\">발생하고</span> <span style=\"font-family:Malgun Gothic\">있다고</span> <span style=\"font-family:Malgun Gothic\">보면</span> <span style=\"font-family:Malgun Gothic\">된다</span>. </p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\">OTC <span style=\"font-family:Malgun Gothic\">거래량이 없고 시장이 불안정한 시기일 때 이 수치는</span> 10%<span style=\"font-family:Malgun Gothic\">에서</span> 14%<span style=\"font-family:Malgun Gothic\">를 상회하기도 한다</span>. OTC <span style=\"font-family:Malgun Gothic\">거래량이 많을 때에는 보통</span> 1%<span style=\"font-family:Malgun Gothic\">에서</span> 7% <span style=\"font-family:Malgun Gothic\">사이의 수치를 보이는데</span>, <span style=\"font-family:Malgun Gothic\">현재는</span> 5% <span style=\"font-family:Malgun Gothic\">수준 밖에 되지 않는다</span>. <span style=\"font-family:Malgun Gothic\">비트코인 네트워크에서 하루에 이동하는 물량이</span> 260<span style=\"font-family:Malgun Gothic\">만개</span>(<span style=\"font-family:Malgun Gothic\">한화 약</span> 62<span style=\"font-family:Malgun Gothic\">조원</span>) <span style=\"font-family:Malgun Gothic\">정도 되는데 그중</span> 95%<span style=\"font-family:Malgun Gothic\">가 거래소 밖에서 이루어진 거래라는 얘</span></p>\r\n\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">기다</span>.</p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Nanum Gothic;font-size:13.5pt;color:#838180;background-color:#191a1a;font-weight:bold\">&#160;암호화폐 거래소 자금 흐름 비율</span></p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Nanum Gothic;font-size:12.5pt;color:#848280;background-color:#191a1a\">크립토퀀트 차트에서도 확인할 수 있는 항목이 있다.&#160;</span><a href=\"https://cryptoquant.com/overview/full/388?window=day\" style=\"font-family:Nanum Gothic;font-size:12.5pt;background-color:#191a1a\">&#39;모든 거래소의 자금 흐름 비율 (Fund Flow Ratio for All Exchanges)&#39;</a><span style=\"font-family:Nanum Gothic;font-size:12.5pt;color:#848280;background-color:#191a1a\">&#160;차트다. 이 지표는 비트코인 블록체인 상에서의 거래소 입출금량이 전체 네트워크 자금 이동량에서 차지하는 비율을 말한다. 이 값이 상승하면 비트코인 네트워크를 대부분 거래소에서 사용하고 있다는 뜻이고, 이 값이 하락하면 거래소 지갑 밖에서 대규모 온체인 거래들이 발생하고 있다고 보면 된다.&#160;</span></p>\r\n\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Nanum Gothic;font-size:12.5pt;color:#848280;background-color:#191a1a\">OTC 거래량이 없고 시장이 불안정한 시기일 때 이 수치는 10%에서 14%를 상회하기도 한다. OTC 거래량이 많을 때에는 보통 1%에서 7% 사이의 수치를 보이는데, 현재는 5% 수준 밖에 되지 않는다. 비트코인 네트워크에서 하루에 이동하는 물량이 260만개(한화 약 62조원) 정도 되는데 그중 95%가 거래소 밖에서 이루어진 거래라는 얘기다.&#160;</span></p>\r\n\t\t\t<div style=\"display:inline-block;width:480px;height:200px;background:#2d333b;border-radius:4px;margin:2px;vertical-align:top;opacity:0.4\"></div>\r\n\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Nanum Gothic;font-size:12.5pt;color:#6b6a67\">최근 모든 거래소의 자금 흐름 비율 차트. 출처=크립토퀀트</span></p>\r\n\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Nanum Gothic;font-size:12.5pt;color:#848280;background-color:#191a1a\">이 지표가 지난 2019년 2월에 5% 수준으로 단기 저점을 찍었던 적이 있다. 바이낸스, 비트렉스 등 글로벌 주요 암호화폐 거래소들이 일제히 OTC 데스크를 출범시켰던 때와 시기적으로 겹친다.&#160;</span></p>\r\n\t\t\t<br />\r\n\t\t\t<cite style=\"font-family:Calibri;font-size:9pt;color:#595959;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">출처</span>: &lt;<a href=\"https://www.coindeskkorea.com/news/articleView.html?idxno=72255\">https://www.coindeskkorea.com/news/articleView.html?idxno=72255</a>&gt; </cite>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"> </p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Nanum Gothic;font-size:13.5pt;color:#838180;background-color:#191a1a;font-weight:bold\">■ 토큰 이동량</span></p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><a href=\"https://cryptoquant.com/overview/full/244?window=day\" style=\"font-family:Nanum Gothic;font-size:12.5pt;background-color:#191a1a\">&#39;비트코인 토큰 이동량&#39;</a><span style=\"font-family:Nanum Gothic;font-size:12.5pt;color:#848280;background-color:#191a1a\">도 함께 확인해야 할 지표다. 이 지표는 말 그대로 네트워크 전체에서 비트코인이 이동한 총량을 말한다. 토큰 이동량이 상승하는데 거래소의 자금 흐름 비율은 감소하고 있는 상황이라면 OTC 거래량이 상승하고 있을 확률이 높다. 크립토퀀트는 이런 온체인 독법들을 이용해 기관 투자자들의 본격 진입이 가시화 되기 전인 9월부터 거래소 바깥에서 대규모 OTC 거래가 일어나고 있음을&#160;</span><a href=\"https://www.coindeskkorea.com/news/articleView.html?idxno=71878\" style=\"font-family:Nanum Gothic;font-size:12.5pt;background-color:#191a1a\">언급한 바 있다</a><span style=\"font-family:Nanum Gothic;font-size:12.5pt;color:#848280;background-color:#191a1a\">. 이후 마이크로스트레지, 그레이스케일, 러퍼, 원리버 등 기관 투자자들이 비트코인을 대량 매수했음을 공시했다.&#160;</span></p>\r\n\t\t\t<a href=\"https://cryptoquant.com/overview/full/244?window=day\">\t\t\t\t<div style=\"display:inline-block;width:480px;height:200px;background:#2d333b;border-radius:4px;margin:2px;vertical-align:top;opacity:0.4\"></div>\t\t\t</a>\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">상승을 예견하며 여러가지 온체인 지표들을 참고했다. 그중 가장 대표적인 지표는&#160;스테이블 코인의 거래소 입금 횟수가 눈에 띄게 증가했다는 점이었다. 최근 투자자들이&#160;스테이블 코인을 이용해 암호화폐를 매수하는 경우가 많기 때문에&#160;스테이블 코인의 거래소&#160;입금 횟수는 시장의 잠재적인 매수압력</span></p>\r\n\t\t\t<br />\r\n\t\t\t<div style=\"display:inline-block;width:480px;height:357px;background:#2d333b;border-radius:4px;margin:2px;vertical-align:top;opacity:0.4\"></div>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">MPI지수는 채굴자들이 매도를 위해 거래소로 얼마나 많은 비트코인을 전송하는지&#160;계량하는 지표다.&#160;</span></p>\r\n\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><a href=\"https://cryptoquant.com/overview/full/199?window=day\">https://cryptoquant.com/overview/full/199?window=day</a></p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">상승에 대한 조정이 찾아오는 시점은 얼마나 많은 고래와 채굴자들이 거래소에 입금하는지를 모니터링&#160;</span></p>\r\n\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">비트코인</span> <span style=\"font-family:Malgun Gothic\">유입은</span> <span style=\"font-family:Malgun Gothic\">매도압력</span>, <span style=\"font-family:Malgun Gothic\">스테이블코인</span> <span style=\"font-family:Malgun Gothic\">유입은</span> <span style=\"font-family:Malgun Gothic\">매수압력</span></p>\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">가격이 결정 되려면 결국 거래소로 코인을 보내서 팔아야하는데, 누가 / 언제 / 왜 / 얼마나 많은 코인을 위지 알면, 거래소에서 실제로 코인이 판매되기 전에 매수 / 매도 포지션을 수 있습니다.</span></p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:-apple-system;font-size:10pt;color:#37352f\">BTC : 모든 거래소 유입 평균 (144 블록 / 24 시간 이동 평균)</span></p>\r\n\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:-apple-system;font-size:12pt;color:#6b6866\">모든 거래소에 입금되는 비트 코인의 평균 량을 24 시간, 즉 144 개의주기 (비트 코인의 경우 블록 생성주기는 10 분)로 평균을 취한 값이다. 이 값이 2 BTC를 넘을 경우 고래가 많이 입금 한 경우라고 판단하고있다. 상승 도중 2 비트 코인을 넘길 경우 덤핑의 가능성이 높고, 하락한다면 2 비트 코인을 넘기면 입금 만하고 실제로는 팔지 않는 경우가 많다.</span></p>\r\n\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><a href=\"https://cryptoquant.com/prochart/ezer9p3coz\">https://cryptoquant.com/prochart/ezer9p3coz</a></p>\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<table style=\"border:0px\">\r\n\t\t\t\t<tr>\r\n\t\t\t\t\t<td style=\"background-color:#201c1a;border:0px\"><div style=\"display:inline-block;width:480px;height:317px;background:#2d333b;border-radius:4px;margin:2px;vertical-align:top;opacity:0.4\"></div>\r\n\t\t\t\t\t</td>\r\n\t\t\t\t</tr>\r\n\t\t\t</table>\r\n\t\t\t<table style=\"border:0px\">\r\n\t\t\t\t<tr>\r\n\t\t\t\t\t<td style=\"background-color:#201c1a;border:0px\"><p style=\"font-family:맑은 고딕;font-size:9pt;margin-top:7.5pt;margin-bottom:7.5pt\"><span style=\"font-family:helvetica neue;font-size:10.5pt;color:#d5d5d5\">무려&#160;</span><span style=\"font-family:helvetica neue;font-size:10.5pt;color:#d5d5d5;font-weight:bold\">78%의 유저들이 설정한 차트 2가지</span><span style=\"font-family:helvetica neue;font-size:10.5pt;color:#d5d5d5\">를 소개합니다!&#160;</span></p>\r\n\t\t\t\t\t<p style=\"font-family:맑은 고딕;font-size:9pt;margin-top:7.5pt;margin-bottom:7.5pt\"><span style=\"font-family:Helvetica Neue;font-size:10.5pt;color:#d5d5d5\">다음 차트들을&#160;</span><span style=\"font-family:Helvetica Neue;font-size:10.5pt;color:black;background-color:yellow;font-weight:bold\">1.&#160;클릭하고&#160;2. &#127 const CONTENT_HASH = 'eeaed07f';

let cards = [];
let moving = null, resizing = null;
let selectedIdx = null, clipboardCard = null;
const GRID = 20, GAP = 14;
function snap(v) { return Math.round(v / GRID) * GRID; }

// ── Undo (Ctrl+Z) ────────────────────────────────────────────────────────────
const MAX_HISTORY = 50;
let history = [];
function snapshot() {
  syncText();
  history.push(JSON.stringify(cards));
  if (history.length > MAX_HISTORY) history.shift();
}
function undo() {
  if (!history.length) { showStatus('되돌릴 내용 없음'); return; }
  syncText();
  cards = JSON.parse(history.pop());
  renderCards();
  saveBoard();
  showStatus('↩ 되돌림');
}
function showStatus(msg) {
  const s = document.getElementById('status');
  s.textContent = msg;
  clearTimeout(showStatus._t);
  showStatus._t = setTimeout(() => { s.textContent = ''; }, 2000);
}
document.addEventListener('keydown', e => {
  const isText = document.activeElement?.contentEditable === 'true';
  if ((e.ctrlKey || e.metaKey) && e.key === 'z' && !e.shiftKey) {
    if (isText) return;
    e.preventDefault();
    undo();
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'c' && !e.shiftKey && !isText) {
    if (selectedIdx !== null && cards[selectedIdx]) {
      syncText();
      clipboardCard = JSON.parse(JSON.stringify(cards[selectedIdx]));
      showStatus('카드 복사됨');
      e.preventDefault();
    }
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'v' && !e.shiftKey && !isText) {
    if (clipboardCard) {
      e.preventDefault();
      snapshot();
      const nc = JSON.parse(JSON.stringify(clipboardCard));
      nc.x = (nc.x || 0) + 30; nc.y = (nc.y || 0) + 30;
      cards.push(nc);
      selectedIdx = cards.length - 1;
      renderCards(); saveBoard();
      showStatus('카드 붙여넣음');
    }
  }
  if (e.key === 'Escape') {
    document.querySelectorAll('.card.selected').forEach(c => c.classList.remove('selected'));
    selectedIdx = null;
  }
});

function pushCards(movedIdx) {
  const moved = cards[movedIdx];
  const movedEl = document.querySelector(`.card[data-idx="${movedIdx}"]`);
  if (!movedEl) return;
  const mh = movedEl.offsetHeight;
  document.querySelectorAll('.card').forEach(el => {
    const i = +el.dataset.idx;
    if (i === movedIdx) return;
    const c = cards[i], oh = el.offsetHeight;
    if (moved.x < (c.x+(c.w||200)) && (moved.x+(moved.w||200)) > c.x && moved.y < (c.y+oh) && (moved.y+mh) > c.y) {
      c.y = moved.y + mh + GAP;
      el.style.top = c.y + 'px';
    }
  });
}

function loadBoard() {
  const saved = localStorage.getItem(SAVE_KEY);
  const savedHash = localStorage.getItem(SAVE_KEY + ':hash');
  let parsed = null;
  try { parsed = saved ? JSON.parse(saved) : null; } catch(e) {}
  // reset if: no save, empty array, or content hash changed (page regenerated)
  if (!parsed || parsed.length === 0 || savedHash !== CONTENT_HASH) {
    cards = DEFAULT_CARDS.map(c => ({...c}));
    localStorage.removeItem(SAVE_KEY);
    localStorage.setItem(SAVE_KEY + ':hash', CONTENT_HASH);
    renderCards();
    const hasCoords = cards.some(c => c.x !== undefined && c.y !== undefined);
    if (!hasCoords) autoLayout();
    return;
  }
  cards = parsed;
  renderCards();
}
function resetToDefaults() { if (!confirm('저장된 보드를 지우고 원본으로 초기화합니다. 계속할까요?')) return; localStorage.removeItem(SAVE_KEY); cards = DEFAULT_CARDS.map(c => ({...c})); renderCards(); autoLayout(); }

function autoLayout() {
  const boardW = document.getElementById('board').offsetWidth;
  const cols = Math.max(1, Math.floor(boardW / 280));
  const colW = (boardW - GAP*(cols-1)) / cols;
  const colH = new Array(cols).fill(0);
  const allCards = document.querySelectorAll('.card');
  const images = document.querySelectorAll('.card img');
  let loaded = 0;
  function place() {
    allCards.forEach((el, i) => {
      const w = Math.min(cards[i].w || colW, colW);
      let minCol = 0;
      for (let c = 1; c < cols; c++) if (colH[c] < colH[minCol]) minCol = c;
      cards[i].x = minCol * (colW + GAP);
      cards[i].y = colH[minCol];
      cards[i].w = w;
      el.style.left = cards[i].x + 'px';
      el.style.top = cards[i].y + 'px';
      el.style.width = w + 'px';
      colH[minCol] = cards[i].y + el.offsetHeight + GAP;
    });
    document.getElementById('board').style.minHeight = (Math.max(...colH) + 100) + 'px';
    saveBoard();
  }
  if (!images.length) { requestAnimationFrame(place); return; }
  images.forEach(img => {
    if (img.complete) { loaded++; if (loaded >= images.length) requestAnimationFrame(place); }
    else { img.onload = img.onerror = () => { loaded++; if (loaded >= images.length) requestAnimationFrame(place); }; }
  });
}

function syncText() {
  document.querySelectorAll('.card').forEach(el => {
    const i = +el.dataset.idx;
    if (cards[i]?.type === 'text') { const t = el.querySelector('.text'); if (t) cards[i].content = t.innerHTML; }
  });
}
function saveBoard() { syncText(); localStorage.setItem(SAVE_KEY, JSON.stringify(cards)); localStorage.setItem(SAVE_KEY + ':hash', CONTENT_HASH); showStatus('저장됨 ' + new Date().toLocaleTimeString()); }

function renderCards() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  cards.forEach((card, i) => {
    const el = document.createElement('div');
    el.className = 'card'; el.dataset.idx = i;
    if (card.x !== undefined) el.style.left = card.x + 'px';
    if (card.y !== undefined) el.style.top = card.y + 'px';
    // html cards contain raw OneNote table HTML which may overflow the stated div width
    if (card.w) { if (card.type === 'html') el.style.minWidth = card.w + 'px'; else el.style.width = card.w + 'px'; }
    el.addEventListener('mousedown', e => {
      if (e.target.closest('.text, a, .card-btn, .resize-handle, td, th')) return;
      e.preventDefault();
      // Update selection
      document.querySelectorAll('.card.selected').forEach(c => c.classList.remove('selected'));
      selectedIdx = i; el.classList.add('selected');
      snapshot();
      moving = { idx: i, startX: e.clientX, startY: e.clientY, origX: card.x||0, origY: card.y||0 };
      el.classList.add('moving');
    });
    const actions = document.createElement('div'); actions.className = 'card-actions';
    const delBtn = document.createElement('button'); delBtn.className = 'card-btn'; delBtn.textContent = '×';
    delBtn.onclick = e => { e.stopPropagation(); if(confirm('삭제?')) { snapshot(); cards.splice(i,1); renderCards(); saveBoard(); } };
    actions.appendChild(delBtn); el.appendChild(actions);
    if (card.type === 'text') {
      const text = document.createElement('div'); text.className = 'text'; text.contentEditable = true;
      text.innerHTML = card.content || '';
      text.addEventListener('focus', () => { snapshot(); });
      text.addEventListener('blur', () => { card.content = text.innerHTML; saveBoard(); });
      el.appendChild(text);
    } else if (card.type === 'image') {
      const img = document.createElement('img');
      img.src = card.src.startsWith('http') || card.src.startsWith('data:') ? card.src : IMG_BASE + card.src;
      img.alt = ''; img.loading = 'lazy'; img.onerror = () => img.style.display = 'none';
      if (card.w) img.style.width = card.w + 'px';
      if (card.h) img.style.height = card.h + 'px';
      if (card.link) { const a = document.createElement('a'); a.href = card.link; a.target = '_blank'; a.appendChild(img); el.appendChild(a); }
      else { el.appendChild(img); }
      if (card.caption) { const cap = document.createElement('div'); cap.style.cssText = 'font-size:11px;color:#8b949e;margin-top:4px;word-break:break-word;padding:0 2px;'; cap.textContent = card.caption; el.appendChild(cap); }
    } else if (card.type === 'html') {
      const wrapper = document.createElement('div');
      wrapper.style.cssText = 'overflow:auto;font-size:13px;line-height:1.5;';
      wrapper.innerHTML = card.html.replace(/__ATTACHMENT__/g, IMG_BASE);
      wrapper.querySelectorAll('img').forEach(img => { img.style.maxWidth = '100%'; img.style.height = 'auto'; img.draggable = false; });
      wrapper.querySelectorAll('a').forEach(a => { a.target = '_blank'; a.style.color = '#6cb0f6'; });
      wrapper.querySelectorAll('table').forEach(t => { t.style.borderCollapse = 'collapse'; });
      wrapper.querySelectorAll('td,th').forEach(td => {
        td.style.border = '1px solid #444'; td.style.padding = '4px 6px'; td.style.verticalAlign = 'top';
        td.title = '더블클릭으로 편집';
        td.addEventListener('dblclick', function(e) {
          e.stopPropagation();
          snapshot();
          this.contentEditable = 'true';
          this.style.outline = '2px solid #388bfd';
          this.style.background = 'rgba(56,139,253,0.08)';
          this.focus();
        });
        td.addEventListener('blur', function() {
          this.contentEditable = 'false';
          this.style.outline = '';
          this.style.background = '';
          cards[i].html = wrapper.innerHTML.split(IMG_BASE).join('__ATTACHMENT__');
          saveBoard();
        });
      });
      el.appendChild(wrapper);
    } else if (card.type === 'table') {
      const rows = card.rows || [['','',''],['','',''],['','','']];
      const tbl = document.createElement('table');
      tbl.style.cssText = 'border-collapse:collapse;width:100%;font-size:13px;';
      rows.forEach((row, ri) => {
        const tr = tbl.insertRow();
        row.forEach((cell, ci) => {
          const td = document.createElement(ri === 0 ? 'th' : 'td');
          td.contentEditable = true;
          td.style.cssText = 'border:1px solid #30363d;padding:4px 8px;min-width:60px;text-align:left;' + (ri===0 ? 'background:#21262d;font-weight:600;' : '');
          td.textContent = cell;
          td.addEventListener('blur', () => { if (!cards[i].rows) cards[i].rows = rows; rows[ri][ci] = td.textContent; saveBoard(); });
          tr.appendChild(td);
        });
      });
      el.appendChild(tbl);
      const addRow = document.createElement('button');
      addRow.textContent = '+ 행'; addRow.style.cssText = 'margin-top:4px;font-size:11px;background:#21262d;border:1px solid #30363d;color:#8b949e;padding:2px 8px;border-radius:4px;cursor:pointer;';
      addRow.onclick = e => { e.stopPropagation(); snapshot(); if (!cards[i].rows) cards[i].rows = rows; cards[i].rows.push(new Array(cards[i].rows[0].length).fill('')); renderCards(); saveBoard(); };
      const addCol = document.createElement('button');
      addCol.textContent = '+ 열'; addCol.style.cssText = 'margin-top:4px;margin-left:4px;font-size:11px;background:#21262d;border:1px solid #30363d;color:#8b949e;padding:2px 8px;border-radius:4px;cursor:pointer;';
      addCol.onclick = e => { e.stopPropagation(); snapshot(); if (!cards[i].rows) cards[i].rows = rows; cards[i].rows.forEach(r => r.push('')); renderCards(); saveBoard(); };
      el.appendChild(addRow); el.appendChild(addCol);
    }
    const rh = document.createElement('div'); rh.className = 'resize-handle';
    rh.addEventListener('mousedown', e => { e.preventDefault(); e.stopPropagation(); snapshot(); resizing = { idx: i, startX: e.clientX, startW: card.w || el.offsetWidth }; });
    el.appendChild(rh);
    if (i === selectedIdx) el.classList.add('selected');
    board.appendChild(el);
  });
  requestAnimationFrame(() => {
    let maxB = 0;
    document.querySelectorAll('.card').forEach(el => { const b = (parseFloat(el.style.top)||0) + el.offsetHeight; if (b > maxB) maxB = b; });
    board.style.minHeight = (maxB + 100) + 'px';
  });
}

document.addEventListener('mousemove', e => {
  if (moving) {
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`); if (!el) return;
    let nx = moving.origX + e.clientX - moving.startX, ny = moving.origY + e.clientY - moving.startY;
    if (e.shiftKey) { nx = snap(nx); ny = snap(ny); el.style.outline = '1px dashed rgba(240,192,64,0.3)'; } else { el.style.outline = ''; }
    el.style.left = nx + 'px'; el.style.top = ny + 'px';
  }
  if (resizing) {
    let nw = resizing.startW + e.clientX - resizing.startX; if (e.shiftKey) nw = snap(nw);
    cards[resizing.idx].w = Math.max(100, nw);
    const el = document.querySelector(`.card[data-idx="${resizing.idx}"]`); if (el) el.style.width = cards[resizing.idx].w + 'px';
  }
});

document.addEventListener('mouseup', e => {
  if (moving) {
    let nx = moving.origX + e.clientX - moving.startX, ny = moving.origY + e.clientY - moving.startY;
    if (e.shiftKey) { nx = snap(nx); ny = snap(ny); }
    cards[moving.idx].x = Math.max(0, nx); cards[moving.idx].y = Math.max(0, ny);
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`); if (el) { el.classList.remove('moving'); el.style.outline = ''; }
    if (e.shiftKey) pushCards(moving.idx);
    moving = null; saveBoard();
  }
  if (resizing) { if (e.shiftKey) pushCards(resizing.idx); resizing = null; saveBoard(); }
});

function addTextCard() { snapshot(); cards.push({ type: 'text', content: '', x: 50, y: window.scrollY+100, w: 300 }); renderCards(); setTimeout(() => { const els = document.querySelectorAll('.card .text'); els[els.length-1]?.focus(); }, 100); }
function addImageCard() { const input = document.createElement('input'); input.type = 'file'; input.accept = 'image/*'; input.onchange = e => { const f = e.target.files[0]; if (!f) return; const r = new FileReader(); r.onload = () => { snapshot(); cards.push({ type: 'image', src: r.result, x: 50, y: window.scrollY+100, w: 240 }); renderCards(); saveBoard(); }; r.readAsDataURL(f); }; input.click(); }
function addImageUrl() { const url = prompt('이미지 URL'); if (!url) return; snapshot(); cards.push({ type: 'image', src: url, x: 50, y: window.scrollY+100, w: 240 }); renderCards(); saveBoard(); }
function addTableCard() {
  const colsStr = prompt('열 수 (기본 3)', '3'); const cols = Math.max(1, parseInt(colsStr)||3);
  const rowsStr = prompt('행 수 (헤더 포함, 기본 4)', '4'); const rows = Math.max(1, parseInt(rowsStr)||4);
  snapshot();
  cards.push({ type: 'table', rows: Array.from({length: rows}, (_, ri) => Array.from({length: cols}, (_, ci) => ri===0 ? `열${ci+1}` : '')), x: 50, y: window.scrollY+100, w: Math.max(240, cols*100) });
  renderCards(); saveBoard();
}
function exportBoard() { syncText(); const blob = new Blob([JSON.stringify(cards, null, 2)], { type: 'application/json' }); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = SAVE_KEY + '.json'; a.click(); }
// ── Zoom ─────────────────────────────────────────────────────────────────────
let zoom = parseFloat(localStorage.getItem('zoom-' + SAVE_KEY) || '1.0');
function applyZoom() {
  const board = document.getElementById('board');
  board.style.transform = `scale(${zoom})`;
  board.style.transformOrigin = '0 0';
  document.getElementById('zoom-level').textContent = Math.round(zoom * 100) + '%';
  localStorage.setItem('zoom-' + SAVE_KEY, zoom);
}
function zoomIn()  { zoom = Math.min(3.0, parseFloat((zoom + 0.1).toFixed(2))); applyZoom(); }
function zoomOut() { zoom = Math.max(0.2, parseFloat((zoom - 0.1).toFixed(2))); applyZoom(); }
document.addEventListener('keydown', e => {
  if (e.ctrlKey || e.metaKey) {
    if (e.key === '=' || e.key === '+') { e.preventDefault(); zoomIn(); }
    if (e.key === '-')                  { e.preventDefault(); zoomOut(); }
    if (e.key === '0')                  { e.preventDefault(); zoom = 1.0; applyZoom(); }
  }
});
document.getElementById('board').addEventListener('wheel', e => {
  if (!(e.ctrlKey || e.metaKey)) return;
  e.preventDefault();
  e.deltaY < 0 ? zoomIn() : zoomOut();
}, { passive: false });
applyZoom();
function resetLayout() { if (!confirm('자동 재배치합니다.')) return; cards.forEach(c => { delete c.x; delete c.y; }); renderCards(); autoLayout(); }
// ── Floating format toolbar ───────────────────────────────────────────────────
const fmtBar = document.getElementById('format-toolbar');
function fmt(cmd) { document.execCommand(cmd, false, null); saveBoard(); }
function fmtLink() {
  const sel = window.getSelection();
  if (!sel || sel.isCollapsed) return;
  const url = prompt('링크 URL 입력', 'https://');
  if (!url) return;
  document.execCommand('createLink', false, url);
  // make links open in new tab
  sel.anchorNode?.parentElement?.closest('a')?.setAttribute('target', '_blank');
  document.querySelectorAll('.text a').forEach(a => a.target = '_blank');
  saveBoard();
}

// prevent format buttons from blurring contenteditable
fmtBar.addEventListener('mousedown', e => e.preventDefault());

document.addEventListener('selectionchange', () => {
  const sel = window.getSelection();
  if (!sel || sel.isCollapsed || !sel.toString().trim()) { fmtBar.style.display = 'none'; return; }
  // only show if selection is inside a .text element
  const anchor = sel.anchorNode;
  if (!anchor) { fmtBar.style.display = 'none'; return; }
  const textEl = anchor.nodeType === 1 ? anchor.closest('.text') : anchor.parentElement?.closest('.text');
  if (!textEl) { fmtBar.style.display = 'none'; return; }
  // position above selection
  const range = sel.getRangeAt(0);
  const rect = range.getBoundingClientRect();
  fmtBar.style.display = 'flex';
  const tbW = fmtBar.offsetWidth || 180;
  let left = rect.left + rect.width / 2 - tbW / 2;
  left = Math.max(8, Math.min(left, window.innerWidth - tbW - 8));
  fmtBar.style.left = left + 'px';
  fmtBar.style.top = (rect.top - 44 + window.scrollY) + 'px';
});

setInterval(saveBoard, 30000);
loadBoard();
</script>
</body>
