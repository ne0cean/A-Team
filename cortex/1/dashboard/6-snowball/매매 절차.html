<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>매매 절차</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #1e1e1e;
  color: #e0e0e0;
  font-family: 'Segoe UI', -apple-system, sans-serif;
  font-size: 15px;
  line-height: 1.7;
  padding: 0 0 80px;
}
a { color: #6cb0f6; text-decoration: none; }
a:hover { text-decoration: underline; }
.toolbar {
  position: sticky; top: 0; z-index: 100;
  background: #161b22; border-bottom: 1px solid #30363d;
  padding: 8px 24px; display: flex; gap: 10px; align-items: center;
}
.toolbar .t-title { font-size: 16px; font-weight: bold; color: #fff; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.toolbar .t-date { color: #8b949e; font-size: 12px; white-space: nowrap; }
.toolbar button { background: #21262d; border: 1px solid #30363d; color: #ccc; padding: 4px 12px; border-radius: 5px; cursor: pointer; font-size: 12px; white-space: nowrap; }
.toolbar button:hover { background: #30363d; color: #fff; }
.toolbar .t-status { color: #8b949e; font-size: 11px; white-space: nowrap; }
.doc { max-width: 760px; margin: 0 auto; padding: 28px 24px; }
.block { margin-bottom: 10px; }
.block-text {
  outline: none;
  padding: 5px 8px;
  border-radius: 4px;
  white-space: pre-wrap;
  word-break: break-word;
  min-height: 1.5em;
}
.block-text:focus { background: rgba(255,255,255,0.04); }
.block-text:empty::before { content: '텍스트 입력...'; color: #555; pointer-events: none; }
.block-image img { max-width: 100%; border-radius: 6px; display: block; }
.block-image .caption { font-size: 12px; color: #888; margin-top: 4px; }
.block-table .table-wrap { overflow-x: auto; }
.block-table table { border-collapse: collapse; font-size: 13px; }
.block-table td, .block-table th { border: 1px solid #444; padding: 5px 10px; vertical-align: top; }
.block-table th { background: #2a2a3a; color: #ccc; }
</style>
</head>
<body>
<div class="toolbar">
  <span class="t-title">매매 절차</span>
  <span class="t-date">Invalid Date</span>
  <button onclick="save()">저장</button>
  <button id="copyBtn" onclick="copyPath()">⎘ 주소 복사</button>
  <span class="t-status" id="status"></span>
</div>
<div class="doc" id="doc">
<div class="block block-text" data-idx="0" contenteditable="true">매매 절차<br>		<br>		<br>	<br>	<br>		<br>			<br><a href="https://weolbu.com/community/3386005/%EB%B6%80%EB%8F%99%EC%82%B0-%EB%A7%A4%EB%A7%A4-%EC%A0%88%EC%B0%A8-%EB%94%B0%EB%9D%BC%ED%95%98%EA%B8%B0%ED%95%84%EC%9A%94%EC%84%9C%EB%A5%98%EC%99%80-%EA%B3%84%EC%95%BD-%EC%8B%9C-%EB%AA%A8%EB%A5%B4%EB%A9%B4-%ED%81%B0%EC%9D%BC%EB%82%98%EB%8A%94-%EC%A3%BC%EC%9D%98%EC%82%AC%ED%95%AD?utm_source=user_share&utm_medium=referral&utm_campaign=user_share_button" target="_blank">부동산 매매 절차 따라하기｜필요서류와 계약 시 모르면 큰일나는 주의사항</a><br>			<br><br>			<br><a href="https://weolbu.com/community/522271/%EB%B6%80%EB%8F%99%EC%82%B0-%EB%A7%A4%EB%A7%A4-%EC%A0%84%EC%84%B8%EA%B3%84%EC%95%BD-%EC%A3%BC%EC%9D%98%EC%82%AC%ED%95%AD-%ED%8A%B9%EC%95%BD%EB%AA%A8%EC%9D%8C%EC%A7%91-%EC%9D%B4%EC%8B%AD%EB%A7%8C%ED%82%A4%EB%A1%9C" target="_blank">부동산 매매 전세계약 주의사항 특약모음집</a><br>			<br><br>			<br>인감도장 파기<br>			<br><br>			<br>하락장에는 무조건 선매도 - 후매수로 한달 이내에 무조건 갈아타기 해야한다.<br>			<br>갈아타기는 부대비용 감안하면 1.5배는 가야된다.<br>			<br>20억이면 30억짜리로 가야된다.<br>			<br><br>			<br> <a href="https://weolbu.com/community/3771997/%EC%B7%A8%EB%93%9D%EC%84%B8%EC%9D%98-%EC%A7%84%EC%8B%A4-%EB%AA%A8%EB%A5%B4%EB%A9%B4-%EC%88%98%EC%88%98%EB%A3%8C-%EC%95%8C%EB%A9%B4-%EB%A0%88%EB%B2%84%EB%A6%AC%EC%A7%80-%EC%9A%A9%EC%9A%A9%EB%A7%98%EB%A7%98%EB%A7%98?utm_source=kakao_alarm&utm_medium=organic&utm_campaign=wb_platform_community_follow_now_creator" target="_blank">취득세</a> 카드 납부</div>
</div>
<script>
const SAVE_KEY = 'note-매매-절차';

function save() {
  const data = {};
  document.querySelectorAll('.block-text').forEach(el => {
    data[el.dataset.idx] = el.innerHTML;
  });
  localStorage.setItem(SAVE_KEY, JSON.stringify(data));
  const s = document.getElementById('status');
  s.textContent = '저장됨 ' + new Date().toLocaleTimeString();
  setTimeout(() => { s.textContent = ''; }, 2000);
}

function copyPath() {
  navigator.clipboard.writeText(location.pathname).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.textContent = '✓ 복사됨';
    setTimeout(() => { btn.textContent = '⎘ 주소 복사'; }, 1500);
  });
}

// Restore saved edits
const saved = localStorage.getItem(SAVE_KEY);
if (saved) {
  try {
    const data = JSON.parse(saved);
    document.querySelectorAll('.block-text').forEach(el => {
      if (data[el.dataset.idx] !== undefined) el.innerHTML = data[el.dataset.idx];
    });
  } catch(e) {}
}

document.querySelectorAll('.block-text').forEach(el => {
  el.addEventListener('blur', save);
});

setInterval(save, 30000);
</script>
</body>
</html>
