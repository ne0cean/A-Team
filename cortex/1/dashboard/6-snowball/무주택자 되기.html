<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>무주택자 되기</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1e1e1e; color: #e0e0e0; font-family: 'Segoe UI', -apple-system, sans-serif; font-size: 15px; line-height: 1.6; padding: 20px 30px 60px; overflow-x: hidden; }
a { color: #6cb0f6; text-decoration: none; }
a:hover { text-decoration: underline; }
.title-bar { background: #3a3a5c; display: inline-block; padding: 6px 16px; font-size: 22px; font-weight: bold; color: #fff; margin-bottom: 4px; }
.date { color: #999; font-size: 13px; margin-bottom: 20px; }
.board { position: relative; }
.card { background: #2a2a2a; border: 1px solid #3a3a3a; border-radius: 8px; padding: 12px; position: absolute; cursor: grab; transition: box-shadow 0.15s; overflow: hidden; }
.card:hover { box-shadow: 0 0 0 1px #58a6ff; z-index: 10; }
.card.moving { opacity: 0.8; box-shadow: 0 4px 24px rgba(0,0,0,0.6); z-index: 100; cursor: grabbing; }
.card img { width: 100%; border-radius: 4px; display: block; }
.card .text { outline: none; min-height: 20px; white-space: pre-wrap; word-break: break-word; }
.card .text:focus { background: rgba(255,255,255,0.05); border-radius: 4px; padding: 4px; }
.card .text:empty::before { content: '텍스트 입력...'; color: #555; }
.card-actions { position: absolute; top: 4px; right: 4px; display: none; gap: 4px; }
.card:hover .card-actions { display: flex; }
.card-btn { background: #333; border: 1px solid #555; color: #ccc; border-radius: 4px; padding: 2px 6px; font-size: 11px; cursor: pointer; }
.card-btn:hover { background: #444; color: #fff; }
.resize-handle { position: absolute; bottom: 0; right: 0; width: 16px; height: 16px; cursor: se-resize; opacity: 0; }
.card:hover .resize-handle { opacity: 0.6; }
.resize-handle::after { content: ''; position: absolute; bottom: 3px; right: 3px; width: 8px; height: 8px; border-right: 2px solid #666; border-bottom: 2px solid #666; }
.card.selected { box-shadow: 0 0 0 2px #58a6ff; z-index: 5; }
.highlight-red { color: #ff6b6b; }
.highlight-blue { color: #6cb0f6; }
.highlight-gold { color: #f0c040; }
.toolbar { position: fixed; bottom: 0; left: 0; right: 0; background: #161b22; border-top: 1px solid #30363d; padding: 8px 20px; display: flex; gap: 12px; align-items: center; z-index: 200; }
.toolbar button { background: #21262d; border: 1px solid #30363d; color: #e0e0e0; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; }
.toolbar button:hover { background: #30363d; }
.toolbar .status { color: #8b949e; font-size: 12px; margin-left: auto; }
#format-toolbar { position: fixed; display: none; background: #1c2128; border: 1px solid #444c56; border-radius: 8px; padding: 4px 6px; gap: 2px; align-items: center; z-index: 500; box-shadow: 0 4px 16px rgba(0,0,0,0.5); }
#format-toolbar button { background: none; border: none; color: #cdd9e5; padding: 4px 8px; border-radius: 5px; cursor: pointer; font-size: 13px; line-height: 1; }
#format-toolbar button:hover { background: #373e47; }
#format-toolbar .sep { width: 1px; height: 16px; background: #444c56; margin: 0 2px; }
</style>
</head>
<body>
<div class="title-bar" contenteditable="true">무주택자 되기</div>
<div class="date"></div>
<div class="board" id="board"></div>
<div id="format-toolbar">
  <button onmousedown="e=>e.preventDefault()" onclick="fmt('bold')" title="굵게"><b>B</b></button>
  <button onclick="fmt('italic')" title="기울임"><i>I</i></button>
  <button onclick="fmt('underline')" title="밑줄"><u>U</u></button>
  <div class="sep"></div>
  <button onclick="fmtLink()" title="링크 삽입">🔗</button>
  <button onclick="fmt('unlink')" title="링크 제거">✂</button>
</div>
<div class="toolbar">
  <button onclick="undo()" title="Ctrl+Z">↩ 실행취소</button>
  <button onclick="addTextCard()">+ 텍스트</button>
  <button onclick="addImageCard()">+ 이미지</button>
  <button onclick="addImageUrl()">+ 이미지 URL</button>
  <button onclick="addTableCard()">+ 표</button>
  <button onclick="saveBoard()">💾 저장</button>
  <button onclick="exportBoard()">📤 내보내기</button>
  <button onclick="resetLayout()">↺ 재배치</button>
  <button onclick="resetToDefaults()" style="color:#f85149">↺ 초기화</button>
  <div style="display:flex;align-items:center;gap:4px;margin-left:8px;border-left:1px solid #30363d;padding-left:12px;">
    <button onclick="zoomOut()" title="Ctrl+-" style="padding:6px 10px;">−</button>
    <span id="zoom-level" style="font-size:12px;color:#8b949e;min-width:36px;text-align:center;">100%</span>
    <button onclick="zoomIn()" title="Ctrl+=" style="padding:6px 10px;">+</button>
  </div>
  <span class="status" id="status">Ready</span>
</div>
<script>
const SAVE_KEY = 'board-무주택자-되기';
const IMG_BASE = '../../../attachments/';
const DEFAULT_CARDS = [
  {
    "type": "text",
    "x": 360,
    "y": 19,
    "w": 315,
    "content": "주택소유확인-청약홈</a>: 2024년 기준 무주택\n주택소유확인시스템</a>-국토부\n인터넷 등기소\n주택수 확인 방법</a>"
  },
  {
    "type": "text",
    "x": 704,
    "y": 21,
    "w": 600,
    "content": "게약일자: 23.11.30~\n전입일자: 23.11.23일\n전입을 더 빨리 했네? 이거 문제 안되나?"
  },
  {
    "type": "html",
    "x": 831,
    "y": 93,
    "w": 509,
    "html": "\r\n\t\t\t<ol>\r\n\t\t\t\t<p style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:4.5pt;margin-bottom:0pt\"><span style=\"font-family:Noto Sans DemiLight;font-size:11pt;color:#6b6866\">항상 선명하고 밝은 참조 이미지를 사용합니다</span></p>\r\n\t\t\t\t<p style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Noto Sans DemiLight;font-size:11pt;color:#6b6866\">주제, 행동, 배경을 명확하게 분리합니다</span></p>\r\n\t\t\t\t<p style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Noto Sans DemiLight;font-size:11pt;color:#6b6866\">카메라 각도와 조명 조건을 구체적으로 지시합니다</span></p>\r\n\t\t\t\t<p style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Noto Sans DemiLight;font-size:11pt;color:#6b6866\">비율이나 해상도 같은 제약 조건을 활용합니다</span></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">사진</span> <span style=\"font-family:Malgun Gothic\">요건</span></p>\r\n\t\t\t\t<li style=\"font-family:Calibri\"><span lang=\"en-US\"><span style=\"font-family:ui-sans-serif;font-size:12pt;color:#b3b0ad;background-color:#212121\">책상 + 의자</span></span></li>\r\n\t\t\t\t<li style=\"font-family:Calibri\"><span lang=\"en-US\"><span style=\"font-family:ui-sans-serif;font-size:12pt;color:#b3b0ad;background-color:#212121\">모니터/노트북</span></span></li>\r\n\t\t\t\t<li style=\"font-family:Calibri\"><span lang=\"en-US\"><span style=\"font-family:ui-sans-serif;font-size:12pt;color:#b3b0ad;background-color:#212121\">프린터/복합기</span></span></li>\r\n\t\t\t\t<li style=\"font-family:Calibri\"><span lang=\"en-US\"><span style=\"font-family:ui-sans-serif;font-size:12pt;color:#b3b0ad;background-color:#212121\">캐비넷/서류함</span></span></li>\r\n\t\t\t\t<li style=\"font-family:Calibri\"><span lang=\"en-US\"><span style=\"font-family:ui-sans-serif;font-size:12pt;color:#b3b0ad;background-color:#212121\">문서철 5권 정도</span></span></li>\r\n\t\t\t\t<li style=\"font-family:Calibri\"><span lang=\"en-US\"><span style=\"font-family:ui-sans-serif;font-size:12pt;color:#b3b0ad;background-color:#212121\">방 전체 구도(생활 흔적 제거 + 사무공간 강조)</span></span></li>\r\n\t\t\t\t<li style=\"font-family:Calibri\"><span lang=\"en-US\"><span style=\"font-family:ui-sans-serif;font-size:12pt;color:#b3b0ad;background-color:#212121\">출입문 쪽에서 찍은 전체 사진(선택)</span></span></li>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Google Sans Flex;font-size:12pt;color:#797776;background-color:#0f1010\">내가 </span><span style=\"font-family:Google Sans Flex;font-size:12pt;color:#797776;background-color:#0f1010\">제공한</span><span style=\"font-family:Google Sans Flex;font-size:12pt;color:#797776;background-color:#0f1010\"> </span><span style=\"font-family:Google Sans Flex;font-size:12pt;color:#797776;background-color:#0f1010\">모든</span><span style=\"font-family:Google Sans Flex;font-size:12pt;color:#797776;background-color:#0f1010\"> </span><span style=\"font-family:Google Sans Flex;font-size:12pt;color:#797776;background-color:#0f1010\">사진</span><span style=\"font-family:Google Sans Flex;font-size:12pt;color:#797776;background-color:#0f1010\"> </span><span style=\"font-family:Google Sans Flex;font-size:12pt;color:#797776;background-color:#0f1010\">각각에</span><span style=\"font-family:Google Sans Flex;font-size:12pt;color:#797776;background-color:#0f1010\">, </span><span style=\"font-family:Google Sans Flex;font-size:12pt;color:#797776;background-color:#0f1010\">내가</span><span style=\"font-family:Google Sans Flex;font-size:12pt;color:#797776;background-color:#0f1010\"> </span><span style=\"font-family:Google Sans Flex;font-size:12pt;color:#797776;background-color:#0f1010\">제시한</span><span style=\"font-family:Google Sans Flex;font-size:12pt;color:#797776;background-color:#0f1010\"> </span><span style=\"font-family:Google Sans Flex;font-size:12pt;color:#797776;background-color:#0f1010\">아래</span><span style=\"font-family:Google Sans Flex;font-size:12pt;color:#797776;background-color:#0f1010\"> </span><span style=\"font-family:Google Sans Flex;font-size:12pt;color:#797776;background-color:#0f1010\">요건들을</span><span style=\"font-family:Google Sans Flex;font-size:12pt;color:#797776;background-color:#0f1010\"> </span><span style=\"font-family:Google Sans Flex;font-size:12pt;color:#797776;background-color:#0f1010\">반영해</span><span style=\"font-family:Google Sans Flex;font-size:12pt;color:#797776;background-color:#0f1010\">서 각각의 분리된 이미지 파일로 제공해줘.</span></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Google Sans Flex;font-size:12pt;color:#797776;background-color:#0f1010\">1/ 워터마크 삭제</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Google Sans Flex;font-size:12pt;color:#797776;background-color:#0f1010\">2/ 책상과 의자 1개, 모니터 2대, 싱크대 오른편에 작은 프린터, 작은 캐비넷1개, 책상위 서류들은 정교하고 자연스럽게 삽입하고 서류들 중 일부는 사진찍기전에 보고있던 것처럼 자연스럽게 비스듬히 배치, 창가쪽에 1인용 침대를 가로로 배치하고 배게와 이불도 올려줘, 모니터에는 엑셀이나 파워포인트 장표나 네이버 홈페이지를 각각 띄워주고. </span></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Google Sans Flex;font-size:12pt;color:#797776;background-color:#0f1010\">단, 각각의 사진은 동일한 시점에 촬영한 것처럼 일관성을 유지해야함.</span></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">취득일<span lang=\"en-US\"> </span>확인</p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-weight:bold\">1단계: 오피스텔 조건 확인</span></p>\r\n\t\t\t\t<p style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:var(--font-mono);color:#5c626d\">□ 전용면적 60㎡ 이하?</span><span style=\"font-family:var(--font-mono);color:#5c626d\">￼</span><span style=\"font-family:var(--font-mono);color:#5c626d\">□ 공시가격 6억 이하? (수도권)</span><span style=\"font-family:var(--font-mono);color:#5c626d\">￼</span><span style=\"font-family:var(--font-mono);color:#5c626d\">□ 2020.8.12 이후 취득?</span></p>\r\n\t\t\t\t<p style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-weight:bold\">→ 모두 YES면:</span> 주택임대사업자 등록 + 취득세 특례 = 완벽 <span style=\"font-weight:bold\">→ 하나라도 NO면:</span> 취득세 8,400만원 각오하거나 매도 검토</p>\r\n\t\t\t\t<ul>\r\n\t\t\t\t\t<li style=\"font-family:Pretendard Thin;font-size:10pt\">구체적 금액으로 손익 계산</li>\r\n\t\t\t\t\t<li style=\"font-family:Pretendard Thin;font-size:10pt\">취득세 vs 종부세 10년 시뮬레이션</li>\r\n\t\t\t\t</ul>\r\n\t\t\t\t<br />\r\n\t\t\t\t<table style=\"border:1px solid;border-collapse:collapse\">\r\n\t\t\t\t\t<tr>\r\n\t\t\t\t\t\t<td style=\"border:1px solid\"><p style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">지방세</p>\r\n\t\t\t\t\t\t<p lang=\"en-US\" data-tag=\"to-do:completed\" style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">(<span lang=\"ko-KR\">취득세</span></p>\r\n\t\t\t\t\t\t<p data-tag=\"to-do:completed\" style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">재산세<span lang=\"en-US\">)</span></p>\r\n\t\t\t\t\t\t</td>\r\n\t\t\t\t\t\t<td style=\"border:1px solid\"><p style=\"font-family:맑은 고딕;font-size:9pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">지방세</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">기준으로는</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">주택수</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">산정</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> X</span></p>\r\n\t\t\t\t\t\t<p style=\"font-family:맑은 고딕;font-size:9pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">오피스텔 : 주택분 재산세가 과세되는 주거용 오피스텔로서 </span><a href=\"https://www.law.go.kr/lsLinkCommonInfo.do?lspttninfSeq=159733&amp;chrClsCd=010202\" style=\"font-family:Malgun Gothic\">시가표준액이 1억원 초과하는 오피스텔만 주택 수 산정에 포함됩니다.</a></p>\r\n\t\t\t\t\t\t<p lang=\"en-US\" style=\"font-family:맑은 고딕;font-size:9pt;margin-top:0pt;margin-bottom:0pt\"><a href=\"https://www.wetax.go.kr/tcp/loi/J030401M01.do\" style=\"font-family:Pretendard Thin\">2025</a><span lang=\"ko-KR\" style=\"font-family:Pretendard Thin\">년</span><span style=\"font-family:Pretendard Thin\"> </span><span lang=\"ko-KR\" style=\"font-family:Pretendard Thin\">기준</span><span style=\"font-family:Pretendard Thin\"> </span><span lang=\"ko-KR\" style=\"font-family:Pretendard Thin\">시가표준액</span><span style=\"font-family:Pretendard Thin\"> </span><span lang=\"ko-KR\">50,722,576</span></p>\r\n\t\t\t\t\t\t<br />\r\n\t\t\t\t\t\t<p style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">주택수<span lang=\"en-US\"> </span>산정<span lang=\"en-US\"> </span>기준<span lang=\"en-US\">-</span>세무서<span lang=\"en-US\"> </span>문의<span lang=\"en-US\"> 02-3153-9504 ~8717(</span>마포구<span lang=\"en-US\"> </span>세금<span lang=\"en-US\"> </span>총괄<span lang=\"en-US\">)</span></p>\r\n\t\t\t\t\t\t<p data-tag=\"to-do:completed\" style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">취득세는 재산세 기준임</p>\r\n\t\t\t\t\t\t<p data-tag=\"to-do:completed\" style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">재산세</p>\r\n\t\t\t\t\t\t<p style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">위택스<span lang=\"en-US\"> - </span>재산세<span lang=\"en-US\"> </span>부과내역<span lang=\"en-US\"> </span>확인<span lang=\"en-US\">, </span>위택스<span lang=\"en-US\"> </span>각<span lang=\"en-US\"> </span>지자체<spa     "html": "\r\n\t\t\t<ul>\r\n\t\t\t\t<p data-tag=\"to-do\" style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">매도가<span lang=\"en-US\"> </span>가장<span lang=\"en-US\"> </span>쉬운<span lang=\"en-US\"> </span>선택지임</p>\r\n\t\t\t\t<p data-tag=\"to-do\" style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">진은지<span lang=\"en-US\"> </span>사업자<span lang=\"en-US\"> </span>낼<span lang=\"en-US\"> </span>의지<span lang=\"en-US\"> </span>없는지<span lang=\"en-US\"> </span>화인</p>\r\n\t\t\t\t<p lang=\"en-US\" data-tag=\"to-do\" style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">LH<span lang=\"ko-KR\">계약서를</span> <span lang=\"ko-KR\">사업</span> <span lang=\"ko-KR\">병행으로</span> <span lang=\"ko-KR\">재계약</span> <span lang=\"ko-KR\">하던가</span></p>\r\n\t\t\t\t<p data-tag=\"to-do\" style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">다른<span lang=\"en-US\"> </span>진짜<span lang=\"en-US\"> </span>사업<span lang=\"en-US\"> </span>목적으로<span lang=\"en-US\"> </span>사용<span lang=\"en-US\"> </span>할<span lang=\"en-US\"> </span>사람을<span lang=\"en-US\"> </span>찾아야<span lang=\"en-US\"> </span>함</p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<br />\r\n\t\t\t\t<br />\r\n\t\t\t\t<br />\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:gtCanon;font-size:18pt\">양도소득세 헷징</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:gtStandard;font-size:12pt\">일반임대사업자 등록 후 부가세 신고하며 업무용 임대(세입자 사업자 유도, 전입 금지 특약)로 전환하세요. 임대차계약서에 &#39;업무용&#39; 명시, 세입자 사업자등록증&#183;임대료 세금계산서 발급 증빙 쌓으면 주거용 아닌 업무용으로 인정받아 1주택 비과세 적용 가능합니다. 공실 시에도 업무용 유지 증빙(자체 사무실 사용 등)으로 조사 통과하세요.​</span></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p lang=\"en-US\" data-tag=\"to-do\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:gtCanon;font-size:18pt\">종부세&#183;</span><span style=\"font-family:gtCanon;font-size:18pt\">재산세</span><span style=\"font-family:gtCanon;font-size:18pt\"> </span><span style=\"font-family:gtCanon;font-size:18pt\">헷징</span><span style=\"font-size:18pt\"> </span><span style=\"font-family:Apple Color Emoji;font-size:18pt\">➡️</span><span style=\"font-size:18pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:18pt\">이건</span><span style=\"font-size:18pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:18pt\">이미</span><span style=\"font-size:18pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:18pt\">완료</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:gtStandard;font-size:12pt\">재산세 주택분 과세 피하려면 업무용으로 용도 변경 신고(구청), 시가표준액 1억 원 이하 유지하세요. 주거용 과세 시에도 소형(전용 60㎡ 이하, 취득가 6억 이하) 신축 특례(2028년 말까지) 활용하며, 업무용 증빙으로 종부세 주택 제외 주장합니다.​</span></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:gtCanon;font-size:18pt\">취득세 헷징</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:gtStandard;font-size:12pt\">새 주택 취득 전 오피스텔 재산세 비주거용 확인, 시가표준액 1억 원 이하 또는 2020.8.12 이전 계약분 증빙으로 주택 수 제외하세요. 업무용 임대사업자 등록 시 취득세 4.6% 적용(주택 중과 피함), 지방세법 시행령 제28조의4 활용합니다.​​</span></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p lang=\"en-US\" data-tag=\"to-do\" style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><a href=\"https://chatgpt.com/c/691ab1b4-0434-8322-8fb1-bcb4d8d95e59\">오피스텔 2주택 매도 말고 해소 방법</a></p>\r\n\t\t\t\t<p style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Segoe UI Emoji;font-size:20pt;font-weight:bold\">&#128678;</span><span style=\"font-size:20pt;font-weight:bold\"> 오피스텔 주거용 판정 회피 전략 종합 평가</span></p>\r\n\t\t\t\t<ul>\r\n\t\t\t\t\t<li style=\"font-family:Pretendard Thin;font-size:10pt\"><span style=\"font-weight:bold\">가장 강력&#183;안전&#183;실행력 높은 전략 = A + B 조합</span><span style=\"font-weight:bold\">￼</span>(사업자등록 + 업무용 비품 + 특약 + 지자체 업무용 전환 신고)</li>\r\n\t\t\t\t\t<li style=\"font-family:Pretendard Thin;font-size:10pt\">전략 C는 “효과는 강력하나 실질적으로 실행 난도 매우 높음”.</li>\r\n\t\t\t\t\t<li style=\"font-family:Pretendard Thin;font-size:10pt\">“과거 환수금액(13백만 원)”을 되돌리는 건 어렵지만￼<span style=\"font-weight:bold\">내년 주택 취득 시 ‘2주택 중과’ 회피는 A/B/C 모두 가능</span><span style=\"font-weight:bold\">￼</span>→ 단, 전략 A 조합이 실제로 가장 많이 쓰이고, 공무원들이 인정하는 케이스가 가장 많음.</li>\r\n\t\t\t\t</ul>\r\n\t\t\t\t<br />\r\n\t\t\t\t<div style=\"display:inline-block;width:360px;height:94px;background:#2d333b;border-radius:4px;margin:2px;vertical-align:top;opacity:0.4\"></div>\r\n\t\t\t\t<p style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><a href=\"https://www.r114.com/?_c=Research&amp;_m=Detail&amp;bno=200&amp;gno=&amp;num=6182&amp;pageNm=reportnews\">[부동산114] 오피스텔 `주택 수` 산정 기준 `피하는 법`</a></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Segoe UI Emoji;font-size:20pt;font-weight:bold\">&#129513;</span><span style=\"font-size:20pt;font-weight:bold\"> 전략 A — 업무용 실사용 입증 전략 (가장 강력 &amp; 실무에서 압도적으로 많이 쓰임)</span></p>\r\n\t\t\t\t<p style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">이 전략은 세법의 **&#39;실질과세 원칙&#39;**에 정면으로 대응하는 가장 효과적인 방법입니다. 세무서가 주택 여부를 판단하는 핵심 요소인 **&#39;물적 증거(사진, 계약서)&#39;**와 **&#39;서류상의 실질(사업자 등록)&#39;**을 모두 갖추도록 하는 완벽한 패키지입니다.</p>\r\n\t\t\t\t<ul>\r\n\t\t\t\t\t<li style=\"font-family:Pretendard Thin;font-size:10pt\">사업자등록(보조사업장)</li>\r\n\t\t\t\t\t<li style=\"font-family:Pretendard Thin;font-size:10pt\">업무용 비품 사진</li>\r\n\t\t\t\t\t<li style=\"font-family:Pretendard Thin;font-size:10pt\">임대차 특약</li>\r\n\t\t\t\t\t<li style=\"font-family:Pretendard Thin;font-size:10pt\">관리비&#183;전기패턴 등 실사용 증명</li>\r\n\t\t\t\t\t<li style=\"font-family:Pretendard Thin;font-size:10pt\">세입자 전입 여부는 <span style=\"font-style:italic\">업무용 판정을 전혀 막지 못함</span></li>\r\n\t\t\t\t\t<li style=\"font-family:Pretendard Thin;font-size:10pt\">국세청&#183;지자체 모두 “실질과세”로 판단 → <span style=\"font-weight:bold\">업무용 근거가 더 우선</span></li>\r\n\t\t\t\t</ul>\r\n\t\t\t\t<ol>\r\n\t\t\t\t\t<li style=\"font-family:Pretendard Thin;font-size:10pt\"><span style=\"font-weight:bold\">세무서에서 가장 인정률이 높음 (실무자들이 선호)</span></li>\r\n\t\t\t\t\t<li style=\"font-family:Pretendard Thin;font-size:10pt\">“혼합용도 → 업무용 비중 우세”로 잡히면 <span style=\"font-weight:bold\">주택수에서 제외</span></li>\r\n\t\t\t\t\t<li style=\"font-family:Pretendard Thin;font-size:10pt\">지금부터라도 “용도 전환”이 인정됨</li>\r\n\t\t\t\t\t<li style=\"font-family:Pretendard Thin;font-size:10pt\">구청&#183;지자체&#183;LH 관계 없음</li>\r\n\t\t\t\t\t<li style=\"font-family:Pretendard Thin;font-size:10pt\">임차인 비협조여도 100% 실행 가능</li>\r\n\t\t\t\t\t<li style=\"font-family:Pretendard Thin;font-size:10pt\">A의 서류 조합은 실제로 <span style=\"font-style:italic\">추징 취소 판례</span> 있음</li>\r\n\t\t\t\t\t<li style=\"font-family:Pretendard Thin;font-size:10pt\">향후 분쟁 시 <span style=\"font-weight:bold\">물증 기반 방어력 최강</span></li>\r\n\t\t\t\t</ol>\r\n\t\t\t\t<ol>\r\n\t\t\t\t\t<li style=\"font-family:Pretendard Thin;font-size:10pt\">네가 직접 사업자등록 해야 함</li>\r\n\t\t\t\t\t<li style=\"font-family:Pretendard Thin;font-size:10pt\">집기 배치&#183;사진 촬영 등 작업 필요</li>\r\n\t\t\t\t\t<li style=\"font-family:Pretendard Thin;font-size:10pt\">임차인이 100% 주거만 하는 경우, 간혹 세무서에서 “혼합용도 → 주거 우세”라고 주장할 여지가 있음￼→ 그러나 <span style=\"font-weight:bold\">사업자 + 비품 + 특약</span>이 있으면 “업무 우세”로 뒤집히는 케이스가 훨씬 많음</li>\r\n\t\t\t\t</ol>\r\n\t\t\t\t<br />\r\n\t\t\t\t<ul>\r\n\t\t\t\t\t<li style=\"font-family:Pretendard Thin;font-size:10pt\">LH 지원 = 주거복지 지원 = 명백한 주거 목적</li>\r\n\t\t\t\t\t<li style=\"font-family:Pretendard Thin;font-size:10pt\">세입자가 근로자/학생일 가능성 99%</li>\r\n\t\t\t\t\t<li style=\"font-family:Pretendard Thin;font-size:10pt\"><span style=\"font-weight:bold\">세무서: &quot;LH 지원받는 사람이 왜 오피스텔에서 업무를?&quot;</span></li>\r\n\t\t\t\t</ul>\r\n\t\t\t\t<ul>\r\n\t\t\t\t\t<li style=\"font-family:Pretendard Thin;font-size:10pt\">전입신고와 무관하게 실질 기준으로 판단하지 <a href=\"https://mediahub.seoul.go.kr/archives/1302151\">Seoul Metropolitan Government</a>만</li>\r\n\t\t\t\t\t<li style=\"font-family:Pretendard Thin;font-size:10pt\">전입신고 = 주거 의사의 명백한 표현</li>\r\n\t\t\t\t\t<li style=\"font-family:Pretendard Thin;font-size:10pt\">국세청은 전입신고를 가장 강력한 주거용 증거로 봄</li>\r\n\t\t\t\t</ul>\r\n\t\t\t\t<p style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-weight:bold\">3. 형식적 업무용 증빙의 한계</span></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<table style=\"border:0px\">\r\n\t\t\t\t\t<tr>\r\n\t\t\t\t\t\t<td style=\"border:0px;font-family:Pretendard Thin;font-size:10pt\"><span style=\"font-weight:bold\">제시한 증빙</span></td>\r\n\t\t\t\t\t\t<td style=\"border:0px;font-family:Pretendard Thin;font-size:10pt\"><span style=\"font-weight:bold\">세무서 반박</span></td>\r\n\t\t\t\t\t</tr>\r\n\t\t\t\t\t<tr>\r\n\t\t\t\t\t\t<td style=\"border:0px;font-family:Pretendard Thin;font-size:10pt\">① 사업자등록 (임대인 명의)</td>\r\n\t\t\t\t\t\t<td style=\"border:0px;font-family:Pretendard Thin;font-size:10pt\">&quot;임대인이 거기서 업무하나요?&quot;</td>\r\n\t\t\t\t\t</tr>\r\n\t\t\t\t\t<tr>\r\n\t\t\t\t\t\t<td style=\"border:0px;font-family:Pretendard Thin;font-size:10pt\">② 업무용 비품 배치 사진</td>\r\n\t\t\t\t\t\t<td style=\"border:0px;font-family:Pretendard Thin;font-size:10pt\">&quot;세입자는 LH 지원 주거용인데요?&quot;</td>\r\n\t\t\t\t\t</tr>\r\n\t\t\t\t\t<tr>\r\n\t\t\t\t\t\t<td style=\"border:0px;font-family:Pretendard Thin;font-size:10pt\">③ 계약서 특약</td>\r\n\t\t\t\t\t\t<td style=\"border:0px;font-family:Pretendard Thin;font-size:10pt\">&quot;실제 사용은 주거인데 서류만?&quot;</td>\r\n\t\t\t\t\t</tr>\r\n\t\t\t\t\t<tr>\r\n\t\t\t\t\t\t<td style=\"border:0px;font-family:Pretendard Thin;font-size:10pt\">④ 세입자 사업자등록</td>\r\n\t\t\t\t\t\t<td style=\"border:0px;font-family:Pretendard Thin;font-size:10pt\"><span style=\"font-weight:bold\">이건 효과 있을 수 있음</span></td>\r\n\t\t\t\t\t</tr>\r\n\t\t\t\t</table>\r\n\t\t\t\t<ul>\r\n\t\t\t\t\t<li style=\"font-family:Pretendard Thin;font-size:10pt\">전기/가스/수도 사용 패턴 (야간/주말 사용)</li>\r\n\t\t\t\t\t<li style=\"font-family:Pretendard Thin;font-size:10pt\">LH 지원 내역 (국세청 연계)</li>\r\n\t\t\t\t\t<li style=\"font-family:Pretendard Thin;font-size:10pt\">세입자 직업 확인</li>\r\n\t\t\t\t\t<li style=\"font-family:Pretendard Thin;font-size:10pt\">건강보험료 주소지</li>\r\n\t\t\t\t</ul>\r\n\t\t\t\t<p style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Segoe UI Emoji;font-size:16pt;font-weight:bold\">&#127919;</span><span style=\"font-size:16pt;font-weight:bold\"> 실효성 평가: 20점 / 100점</span></p>\r\n\t\t\t\t<ul>\r\n\t\t\t\t\t<li style=\"font-family:Pretendard Thin;font-size:10pt\">세입자가 실제 사업자이고 업무 활동 증빙 → 40% 가능성</li>\r\n\t\t\t\t\t<li style=\"font-family:Pretendard Thin;font-size:10pt\">세입자가 근로자/학생 + LH 지원 → <span style=\"font-weight:bold\">5% 미만</span></li>\r\n\t\t\t\t</ul>\r\n\t\t\t\t<ul>\r\n\t\t\t\t\t<li style=\"font-family:Pretendard Thin;font-size:10pt\">세무조사 시 가산세 (업무용 부가세 환급받았다면)</li>\r\n\t\t\t\t\t<li style=\"font-family:Pretendard Thin;font-size:10pt\">과거 소급 과세 (최대 5년)</li>\r\n\t\t\t\t\t<li style=\"font-family:Pretendard Thin;font-size:10pt\">주택수 포함 → 추가 취득세 추징</li>\r\n\t\t\t\t</ul>\r\n\t\t\t\t<br />\r\n\t\t\t\t<table style=\"border:0px\">\r\n\t\t\t\t\t<tr>\r\n\t\t\t\t\t\t<td style=\"border:0px;font-family:Pretendard Thin;font-size:10pt\"><span style=\"font-family:Google Sans Text;font-weight:bold\">장점 (매우 강력함)</span></td>\r\n\t\t\t\t\t\t<td style=\"border:0px;font-family:Pretendard Thin;font-size:10pt\"><span style=\"font-family:Google Sans Text;font-weight:bold\">고려사항 (보완 필요)</span></td>\r\n\t\t\t\t\t</tr>\r\n\t\t\t\t\t<tr>\r\n\t\t\t\t\t\t<td style=\"border:0px;font-family:Pretendard Thin;font-size:10pt\"><span style=\"font-family:Google Sans Text;font-weight:bold\">취득세 중과 방어 핵심:</span><span style=\"font-family:Google Sans Text\"> 세무 당국/법원 판례상, </span><span style=\"font-family:Google Sans Text;font-weight:bold\">사업자 등록 및 업무용 실사용 증거</span><span style=\"font-family:Google Sans Text\">는 세입자의 전입신고보다 주택 여부를 판단하는 더 강력한 근거가 됩니다.</span></td>\r\n\t\t\t\t\t\t<td style=\"border:0px;font-family:Pretendard Thin;font-size:10pt\"><span style=\"font-family:Google Sans Text;font-weight:bold\">LH/세입자 관계:</span><span style=\"font-family:Google Sans Text\"> 임대차 계약서 변경(③)이나 공동 사용(①)은 </span><span style=\"font-family:Google Sans Text;font-weight:bold\">LH 지원 조건 위반 및 세입자 불이익</span><span style=\"font-family:Google Sans Text\">의 소지가 크므로, 세입자와의 </span><span style=\"font-family:Google Sans Text;font-weight:bold\">협의 및 동의</span><span style=\"font-family:Google Sans Text\">가 매우 중요합니다.</span></td>\r\n\t\t\t\t\t</tr>\r\n\t\t\t\t\t<tr>\r\n\t\t\t\t\t\t<td style=\"border:0px;font-family:Pretendard Thin;font-size:10pt\"><span style=\"font-family:Google Sans Text;font-weight:bold\">혼합 용도 주장 가능:</span><span style=\"font-family:Google Sans Text\"> &#39;주택&#39;이 아닌 **&#39;혼합 용도&#39;**로 분류되어 취득세 중과 계산 시 </span><span style=\"font-family:Google Sans Text;font-weight:bold\">주택 수에서 제외되거나 최소한의 면적만 주택</span><span style=\"font-family:Google Sans Text\">으로 인정될 여지가 생깁니다.</span></td>\r\n\t\t\t\t\t\t<td style=\"border:0px;font-family:Pretendard Thin;font-size:10pt\"><span style=\"font-family:Google Sans Text;font-weight:bold\">사업의 실질성:</span><span style=\"font-family:Google Sans Text\"> 임대인 명의 사업자(①)의 경우, 세무서에서 </span><span style=\"font-family:Google Sans Text;font-weight:bold\">가짜 사업장</span><span style=\"font-family:Google Sans Text\"> 여부를 검증할 수 있으므로, 소액이라도 </span><span style=\"font-family:Google Sans Text;font-weight:bold\">실제 업무 활동 및 비용 지출</span><span style=\"font-family:Google Sans Text\">을 증빙하는 노력이 필요합니다.</span></td>\r\n\t\t\t\t\t</tr>\r\n\t\t\t\t\t<tr>\r\n\t\t\t\t\t\t<td style=\"border:0px;font-family:Pretendard Thin;font-size:10pt\"><span style=\"font-family:Google Sans Text;font-weight:bold\">재산세 방어:</span><span style=\"font-family:Google Sans Text\"> 확보한 서류 패키지(사업자등록증, 계약서 등)는 관할 구청에 제출하여 </span><span style=\"font-family:Google Sans Text;font-weight:bold\">주택분 재산세가 아닌 업무용(별도합산) 재산세</span><span style=\"font-family:Google Sans Text\">를 부과받는 데도 매우 유리합니다.</span></td>\r\n\t\t\t\t\t\t<td style=\"border:0px\"><br />\r\n\t\t\t\t\t\t</td>\r\n\t\t\t\t\t</tr>\r\n\t\t\t\t</table>\r\n\t\t\t\t<br />\r\n\t\t\t\t<ul>\r\n\t\t\t\t\t<li style=\"font-family:Pretendard Thin;font-size:10pt\"><span style=\"font-weight:bold\">효과: 9.5/10</span></li>\r\n\t\t\t\t\t<li style=\"font-family:Pretendard Thin;font-size:10pt\"><span style=\"font-weight:bold\">위험도: 2/10</span></li>\r\n\t\t\t\t\t<li style=\"font-family:Pretendard Thin;font-size:10pt\"><span style=\"font-weight:bold\">실행 난이도: 4/10</span></li>\r\n\t\t\t\t\t<li style=\"font-family:Pretendard Thin;font-size:10pt\"><span style=\"font-weight:bold\">세무서 설득력: ★★★★★</span></li>\r\n\t\t\t\t\t<li style=\"font-family:Pretendard Thin;font-size:10pt\"><span style=\"font-weight:bold\">LH 영향: 없음</span></li>\r\n\t\t\t\t\t<li style=\"font-family:Pretendard Thin;font-size:10pt\"><span style=\"font-weight:bold\">추천도: ★★★★★ (최고 등급)</span></li>\r\n\t\t\t\t</ul>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Segoe UI Emoji;font-size:20pt;font-weight:bold\">&#129513;</span><span style=\"font-size:20pt;font-weight:bold\"> 전략 B — 지자체 ‘업무용 전환’ 신고 (사업자등록 없이도 가능)</span></p>\r\n\t\t\t\t<p style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">오피스텔의 원래 용도는 <span style=\"font-weight:bold\">업무시설</span>이므로, 주거용으로 사용되더라도 건축물대장상 &#39;주거&#39;로 표시되지 않습니다. 이 전략은 <span style=\"font-weight:bold\">지자체의 공적 장부</span>를 통해 오피스텔을 업무용으로 관리하고 있음을 재확인하는 효과가 있습니다.</p>\r\n\t\t\t\t<ul>\r\n\t\t\t\t\t<li style=\"font-family:Pretendard Thin;font-size:10pt\">오피스텔은 건축법상 원래 “업무시설”</li>\r\n\t\t\t\t\t<li style=\"font-family:Pretendard Thin;font-size:10pt\">전입이 있어도 “주택 → 업무시설” 신고 가능</li>\r\n\t\t\t\t\t<li style=\"font-family:Pretendard Thin;font-size:10pt\">내부 사진 + 간단한 사유서로 접수 초간단</li>\r\n\t\t\t\t</ul>\r\n\t\t\t\t<ol>\r\n\t\t\t\t\t<li style=\"font-family:Pretendard Thin;font-size:10pt\"><span style=\"font-weight:bold\">사업자등록 없이도 가능</span></li>\r\n\t\t\t\t\t<li style=\"font-family:Pretendard Thin;font-size:10pt\">건축물대장에 “업무” 표기 → <span style=\"font-weight:bold\">세무서도 건드리기 힘듦</span></li>\r\n\t\t\t\t\t<li style=\"font-family:Pretendard Thin;font-size:10pt\">주택수 제외 효과는 매우 높음</li>\r\n\t\t\t\t\t<li style=\"font-family:Pretendard Thin;font-size:10pt\">임차인 전입 여부와 무관</li>\r\n\t\t\t\t\t<li style=\"font-family:Pretendard Thin;font-size:10pt\">A보다 간단한 케이스</li>\r\n\t\t\t\t</ol>\r\n\t\t\t\t<ol>\r\n\t\t\t\t\t<li style=\"font-family:Pretendard Thin;font-size:10pt\">서울/인천 일부 구청은 “실제 주거 중이면 변경 불가”라고 말하는 경우 있음￼→ 하지만 <span style=\"font-style:italic\">이건 담당자 재량</span>이고, 법적으로는 “임대인이 업무용으로 사용 관리한다”면 변경 가능</li>\r\n\t\t\t\t\t<li style=\"font-family:Pretendard Thin;font-size:10pt\">잘못 접수되면 “사용승인 위반”을 언급하며 까다롭게 굴 수도 있음</li>\r\n\t\t\t\t\t<li style=\"font-family:Pretendard Thin;font-size:10pt\">채택돼도 세무서가 A보다 조금 더 까다롭게 판단할 수도 있음￼(그러나 A와 병행하면 리스크 제로)</li>\r\n\t\t\t\t</ol>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Segoe UI Emoji;font-size:16pt;font-weight:bold\">❌❌</span><span style=\"font-size:16pt;font-weight:bold\"> 더 위험함</span></p>\r\n\t\t\t\t<ul>\r\n\t\t\t\t\t<li style=\"font-family:Pretendard Thin;font-size:10pt\">세법상에서는 공부를 기준으로 판단하는게 아니라 실질을 기준으로 판단 <a href=\"https://namu.wiki/w/오피스텔\">Namu Wiki</a></li>\r\n\t\t\t\t\t<li style=\"font-family:Pretendard Thin;font-size:10pt\">건축물대장을 &quot;업무&quot;로 바꿔도 <span style=\"font-weight:bold\">실제 주거 사용하면 주택</span></li>\r\n\t\t\t\t</ul>\r\n\t\t\t\t<ul>\r\n\t\t\t\t\t<li style=\"font-family:Pretendard Thin;font-size:10pt\">용도변경 신고 자체가 &quot;조작 의도&quot;로 보일 수 있음</li>\r\n\t\t\t\t\t<li style=\"font-family:Pretendard Thin;font-size:10pt\">세무조사 시 <span style=\"font-weight:bold\">악의적 회피</span>로 간주 → 가산세 가중</li>\r\n\t\t\t\t</ul>\r\n\t\t\t\t<p style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Segoe UI Emoji;font-size:16pt;font-weight:bold\">&#127919;</span><span style=\"font-size:16pt;font-weight:bold\"> 실효성 평가: 10점 / 100점</span></p>\r\n\t\t\t\t<p style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-weight:bold\">거의 무의미하며 오히려 역효과 위험</span></p>\r\n\t\t\t\t<ol>\r\n\t\t\t\t\t<li>\t\t\t\t\t<table style=\"border:0px\">\r\n\t\t\t\t\t\t<tr>\r\n\t\t\t\t\t\t\t<td style=\"border:0px;font-family:Pretendard Thin;font-size:10pt\"><span style=\"font-family:Google Sans Text;font-weight:bold\">장점 (A와 시너지)</span></td>\r\n\t\t\t\t\t\t\t<td style=\"border:0px;font-family:Pretendard Thin;font-size:10pt\"><span style=\"font-family:Google Sans Text;font-weight:bold\">고려사항 (단독 실행 불가)</span></td>\r\n\t\t\t\t\t\t</tr>\r\n\t\t\t\t\t\t<tr>\r\n\t\t\t\t\t\t\t<td style=\"border:0px;font-family:Pretendard Thin;font-size:10pt\"><span style=\"font-family:Google Sans Text;font-weight:bold\">공적 장부 증명:</span><span style=\"font-family:Google Sans Text\"> 건축물대장상의 용도를 &#39;업무&#39;로 표시함으로써 **지자체(구청)**에도 업무용으로 관리하고 있음을 확고히 합니다.</span></td>\r\n\t\t\t\t\t\t\t<td style=\"border:0px;font-family:Pretendard Thin;font-size:10pt\"><span style=\"font-family:Google Sans Text;font-weight:bold\">실질과세 원칙:</span><span style=\"font-family:Google Sans Text\"> 이 신고만으로는 세무 당국(국세청)의 </span><span style=\"font-family:Google Sans Text;font-weight:bold\">실질과세 원칙</span><span style=\"font-family:Google Sans Text\">을 깨기 어렵습니다. 신고와 별개로 세입자가 거주하고 있다면 주택으로 간주될 수 있습니다.</span></td>\r\n\t\t\t\t\t\t</tr>\r\n\t\t\t\t\t\t<tr>\r\n\t\t\t\t\t\t\t<td style=\"border:0px;font-family:Pretendard Thin;font-size:10pt\"><span style=\"font-family:Google Sans Text;font-weight:bold\">취득세 근거 강화:</span><span style=\"font-family:Google Sans Text\"> 취득세 부과 기관(지자체)에 **업무용 증빙(사진, 신고서)**을 직접 제출하여 주택 수 제외를 주장하는 강력한 근거가 됩니다.</span></td>\r\n\t\t\t\t\t\t\t<td style=\"border:0px;font-family:Pretendard Thin;font-size:10pt\"><span style=\"font-family:Google Sans Text;font-weight:bold\">LH/세입자 관계:</span><span style=\"font-family:Google Sans Text\"> 세입자 전입신고가 되어 있는데 임대인이 단독으로 &#39;주거→업무&#39; 용도 변경 신고를 하는 것에 대한 </span><span style=\"font-family:Google Sans Text;font-weight:bold\">세입자의 이의 제기</span><span style=\"font-family:Google Sans Text\"> 가능성이 있습니다.</span></td>\r\n\t\t\t\t\t\t</tr>\r\n\t\t\t\t\t</table>\r\n\t\t\t\t\t</li>\r\n\t\t\t\t</ol>\r\n\t\t\t\t<ul>\r\n\t\t\t\t\t<li style=\"font-family:Pretendard Thin;font-size:10pt\"><span style=\"font-weight:bold\">효과: 8.5/10</span></li>\r\n\t\t\t\t\t<li style=\"font-family:Pretendard Thin;font-size:10pt\"><span style=\"font-weight:bold\">위험도: 3/10</span></li>\r\n\t\t\t\t\t<li style=\"font-family:Pretendard Thin;font-size:10pt\"><span style=\"font-weight:bold\">실행 난이도: 3/10</span></li>\r\n\t\t\t\t\t<li style=\"font-family:Pretendard Thin;font-size:10pt\"><span style=\"font-weight:bold\">세무서 설득력: ★★★★☆</span></li>\r\n\t\t\t\t\t<li style=\"font-family:Pretendard Thin;font-size:10pt\"><span style=\"font-weight:bold\">LH 영향: 없음</span></li>\r\n\t\t\t\t\t<li style=\"font-family:Pretendard Thin;font-size:10pt\"><span style=\"font-weight:bold\">추천도: ★★★★☆</span></li>\r\n\t\t\t\t</ul>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p data-tag=\"remember-for-later,to-do:completed\" style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Segoe UI Emoji\">&#128204;</span> 실행 제안: <span style=\"font-weight:bold\">전략 A를 이행한 후, 확보한 증거(사진, 계약서)를 첨부하여 구청에 신고를 병행 (필수)</span></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p data-tag=\"remember-for-later,to-do\" style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">매년 6월 1일 이전에 해당 오피스텔에 대해 <span style=\"font-weight:bold\">주거용이 아님을 구청에 변동 신고</span>하고, </p>\r\n\t\t\t\t<p style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">**업무용 재산세(별도합산 또는 비과세)**가 부과되도록 유도합니다.</p>\r\n\t\t\t\t<p data-tag=\"remember-for-later\" style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-weight:bold\">재산세 용도 변경:</span> 지방세(재산세)를 주택분(세율 높음)이 아닌 **업무용(별도합산과세)**으로 부과받기 위해 관할 시/군/구에 <span style=\"font-weight:bold\">용도 변경 신고</span> 및 증빙 자료 제출을 적극적으로 시도해야 합니다. 재산세가 업무용으로 부과되면 주택 수 제외에 유리한 근거가 됩니다.</p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p lang=\"en-US\" data-tag=\"to-do\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:16pt;font-weight:bold\">3. </span><span style=\"font-family:Apple Color Emoji;font-size:16pt;font-weight:bold\">&#127919;</span><span style=\"font-size:16pt;font-weight:bold\"> </span><span style=\"font-family:Malgun Gothic;font-size:16pt;font-weight:bold\">구청의</span><span style=\"font-size:16pt;font-weight:bold\"> </span><span style=\"font-family:Malgun Gothic;font-size:16pt;font-weight:bold\">업무용</span><span style=\"font-size:16pt;font-weight:bold\"> </span><span style=\"font-family:Malgun Gothic;font-size:16pt;font-weight:bold\">판단을</span><span style=\"font-size:16pt;font-weight:bold\"> </span><span style=\"font-family:Malgun Gothic;font-size:16pt;font-weight:bold\">국세청으로</span><span style=\"font-size:16pt;font-weight:bold\"> </span><span style=\"font-family:Malgun Gothic;font-size:16pt;font-weight:bold\">확장</span></p>\r\n\t\t\t\t<ul>\r\n\t\t\t\t\t<li style=\"font-family:Calibri\"><span lang=\"en-US\"><span style=\"font-family:Malgun Gothic;font-weight:bold\">증거</span><span style=\"font-weight:bold\"> </span><span style=\"font-family:Malgun Gothic;font-weight:bold\">제출</span><span style=\"font-weight:bold\">:</span> <span style=\"font-family:Malgun Gothic\">오피스텔에</span> <span style=\"font-family:Malgun Gothic\">대해</span> <span style=\"font-family:Malgun Gothic\">부과된</span> <span lang=\"ko-KR\" style=\"font-family:Malgun Gothic;font-weight:bold\">업무용</span><span lang=\"ko-KR\" style=\"font-weight:bold\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic;font-weight:bold\">재산세</span><span lang=\"ko-KR\" style=\"font-weight:bold\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic;font-weight:bold\">고지서</span><span lang=\"ko-KR\" style=\"font-weight:bold\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic;font-weight:bold\">사본</span><span style=\"font-family:Malgun Gothic\">을</span> <span style=\"font-family:Malgun Gothic\">확보합니다</span>.</span></li>\r\n\t\t\t\t\t<li style=\"font-family:Calibri\"><span lang=\"en-US\"><span style=\"font-family:Malgun Gothic;font-weight:bold\">논리</span><span style=\"font-weight:bold\">:</span> &quot;<span style=\"font-family:Malgun Gothic\">지방세법을</span> <span style=\"font-family:Malgun Gothic\">집행하는</span> <span lang=\"ko-KR\" style=\"font-family:Malgun Gothic;font-weight:bold\">관할</span><span lang=\"ko-KR\" style=\"font-weight:bold\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic;font-weight:bold\">구청도</span><span lang=\"ko-KR\" style=\"font-weight:bold\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic;font-weight:bold\">이</span><span lang=\"ko-KR\" style=\"font-weight:bold\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic;font-weight:bold\">부동산을</span><span lang=\"ko-KR\" style=\"font-weight:bold\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic;font-weight:bold\">업무용으로</span><span lang=\"ko-KR\" style=\"font-weight:bold\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic;font-weight:bold\">판단</span><span style=\"font-family:Malgun Gothic\">하고</span> <span style=\"font-family:Malgun Gothic\">재산세를</span> <span style=\"font-family:Malgun Gothic\">부과하고</span> <span style=\"font-family:Malgun Gothic\">있다</span>. <span style=\"font-family:Malgun Gothic\">따라서</span> <span style=\"font-family:Malgun Gothic\">국세청도</span> <span style=\"font-family:Malgun Gothic\">이</span> <span lang=\"ko-KR\" style=\"font-family:Malgun Gothic;font-weight:bold\">새로운</span><span lang=\"ko-KR\" style=\"font-weight:bold\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic;font-weight:bold\">실질</span><span style=\"font-family:Malgun Gothic\">을</span> <span style=\"font-family:Malgun Gothic\">반영해야</span> <span style=\"font-family:Malgun Gothic\">한다</span>.&quot;<span style=\"font-family:Malgun Gothic\">고</span> <span style=\"font-family:Malgun Gothic\">주장합니다</span>.</span></li>\r\n\t\t\t\t</ul>\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic;font-weight:bold\">결론</span><span style=\"font-weight:bold\">:</span> <span style=\"font-family:Malgun Gothic\">과거</span> <span style=\"font-family:Malgun Gothic\">부가세</span> <span style=\"font-family:Malgun Gothic\">추징</span> <span style=\"font-family:Malgun Gothic\">이력은</span> <span style=\"font-family:Malgun Gothic\">강력한</span> <span style=\"font-family:Malgun Gothic\">걸림돌이지만</span>, <span style=\"font-family:Malgun Gothic\">현재</span> <span style=\"font-family:Malgun Gothic\">취하신</span> <span lang=\"ko-KR\" style=\"font-family:Malgun Gothic;font-weight:bold\">새로운</span><span lang=\"ko-KR\" style=\"font-weight:bold\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic;font-weight:bold\">사업자</span><span lang=\"ko-KR\" style=\"font-weight:bold\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic;font-weight:bold\">등록과</span><span lang=\"ko-KR\" style=\"font-weight:bold\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic;font-weight:bold\">간주임대료</span><span lang=\"ko-KR\" style=\"font-weight:bold\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic;font-weight:bold\">신고</span><span style=\"font-family:Malgun Gothic\">는</span> <span style=\"font-family:Malgun Gothic\">이</span> <span style=\"font-family:Malgun Gothic\">과거</span> <span style=\"font-family:Malgun Gothic\">이력을</span> <span style=\"font-family:Malgun Gothic\">상쇄할</span> <span style=\"font-family:Malgun Gothic\">수</span> <span style=\"font-family:Malgun Gothic\">있는</span> <span lang=\"ko-KR\" style=\"font-family:Malgun Gothic;font-weight:bold\">새로운</span><span lang=\"ko-KR\" style=\"font-weight:bold\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic;font-weight:bold\">증거</span><span style=\"font-family:Malgun Gothic\">가</span> <span style=\"font-family:Malgun Gothic\">됩니다</span>. <span style=\"font-family:Malgun Gothic\">이제</span> <span style=\"font-family:Malgun Gothic\">이</span> <span style=\"font-family:Malgun Gothic\">증거들을</span> <span style=\"font-family:Malgun Gothic\">바탕으로</span> <span lang=\"ko-KR\" style=\"font-family:Malgun Gothic;font-weight:bold\">물적</span><span lang=\"ko-KR\" style=\"font-weight:bold\">/</span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic;font-weight:bold\">재무적</span><span lang=\"ko-KR\" style=\"font-weight:bold\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic;font-weight:bold\">실질</span><span style=\"font-family:Malgun Gothic\">을</span> <span style=\"font-family:Malgun Gothic\">최대한</span> <span style=\"font-family:Malgun Gothic\">쌓는</span> <span style=\"font-family:Malgun Gothic\">것이</span> <span style=\"font-family:Malgun Gothic\">가장</span> <span style=\"font-family:Malgun Gothic\">중요합니다</span>.</p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<br />\r\n\t\t\t\t<table style=\"border:0px\">\r\n\t\t\t\t\t<tr>\r\n\t\t\t\t\t\t<td style=\"border:0px;font-family:Calibri\"><span lang=\"en-US\"><span style=\"font-family:Google Sans Text;font-weight:bold\">해결 과제</span></span></td>\r\n\t\t\t\t\t\t<td style=\"border:0px;font-family:Calibri\"><span lang=\"en-US\"><span style=\"font-family:Google Sans Text;font-weight:bold\">실행 조치</span></span></td>\r\n\t\t\t\t\t\t<td style=\"border:0px;font-family:Calibri\"><span lang=\"en-US\"><span style=\"font-family:Google Sans Text;font-weight:bold\">대응 논리</span></span></td>\r\n\t\t\t\t\t</tr>\r\n\t\t\t\t\t<tr>\r\n\t\t\t\t\t\t<td style=\"border:0px;font-family:Calibri\"><span lang=\"en-US\"><span style=\"font-family:Google Sans Text;font-weight:bold\">특약 추가 어려움</span></span></td>\r\n\t\t\t\t\t\t<td style=\"border:0px;font-family:Calibri\"><span lang=\"en-US\"><span style=\"font-family:Google Sans Text;font-weight:bold\">내용증명 또는 우편 통보</span></span></td>\r\n\t\t\t\t\t\t<td style=\"border:0px;font-family:Calibri\"><span lang=\"en-US\"><span style=\"font-family:Google Sans Text\">임대인이 세입자에게 **&quot;2025년 X월 X일부로 해당 오피스텔의 일부 공간을 임대인 사업장으로 사용하며, 해당 공간의 주된 목적은 업무용임을 통지한다&quot;**는 내용의 공문을 발송하고 보관합니다. </span><span lang=\"ko-KR\" style=\"font-family:Google Sans Text;font-weight:bold\">계약서 변경 없이 임대인의 의무적 통지</span><span style=\"font-family:Google Sans Text\">를 남기는 것입니다.</span></span></td>\r\n\t\t\t\t\t</tr>\r\n\t\t\t\t\t<tr>\r\n\t\t\t\t\t\t<td style=\"border:0px;font-family:Calibri\"><span lang=\"en-US\"><span style=\"font-family:Google Sans Text;font-weight:bold\">주거용 시설 사용</span></span></td>\r\n\t\t\t\t\t\t<td style=\"border:0px;font-family:Calibri\"><span lang=\"en-US\"><span style=\"font-family:Google Sans Text;font-weight:bold\">업무용 집기 배치 및 사진</span></span></td>\r\n\t\t\t\t\t\t<td style=\"border:0px;font-family:Calibri\"><span lang=\"en-US\"><span style=\"font-family:Google Sans Text\">&quot;임차인은 주거용 시설(주방, 화장실 등)을 사용하고 있으나, </span><span lang=\"ko-KR\" style=\"font-family:Google Sans Text;font-weight:bold\">임대인 역시 이 공간을 사업장 소재지</span><span style=\"font-family:Google Sans Text\">로 등록하여 **주된 업무 공간(책상, 모니터)**으로 활용하고 있다&quot;고 주장하며 사진을 제출합니다.</span></span></td>\r\n\t\t\t\t\t</tr>\r\n\t\t\t\t\t<tr>\r\n\t\t\t\t\t\t<td style=\"border:0px;font-family:Calibri\"><span lang=\"en-US\"><span style=\"font-family:Google Sans Text;font-weight:bold\">LH의 지원 문제</span></span></td>\r\n\t\t\t\t\t\t<td style=\"border:0px;font-family:Calibri\"><span lang=\"en-US\"><span style=\"font-family:Google Sans Text;font-weight:bold\">세입자와의 소통</span></span></td>\r\n\t\t\t\t\t\t<td style=\"border:0px;font-family:Calibri\"><span lang=\"en-US\"><span style=\"font-family:Google Sans Text\">LH 지원 자체는 주거용 사용을 전제로 하지만, </span><span lang=\"ko-KR\" style=\"font-family:Google Sans Text;font-weight:bold\">임대인이 합법적으로 사업자 등록을 하고 일부 공간을 쓰는 것</span><span style=\"font-family:Google Sans Text\">을 LH가 직접적으로 금지하지는 않습니다. 다만, 세입자가 불편을 느끼고 LH에 민원을 제기할 수 있으므로, </span><span lang=\"ko-KR\" style=\"font-family:Google Sans Text;font-weight:bold\">세입자에게 양해를 구하고 주거용 사용 흔적(가스/수도) 최소화를 요청</span><span style=\"font-family:Google Sans Text\">해야 합니다.</span></span></td>\r\n\t\t\t\t\t</tr>\r\n\t\t\t\t</table>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p lang=\"en-US\" data-tag=\"to-do,remember-for-later\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Google Sans;font-size:18pt;font-weight:bold\">간주 임대료 VAT 신고 및 납부 기간 (개인 일반과세자 기준)</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Google Sans Text\">귀하께서 신규로 사업자 등록을 하셨다면, 일반적인 </span><span lang=\"ko-KR\" style=\"font-family:Google Sans Text;font-weight:bold\">개인 일반과세자</span><span style=\"font-family:Google Sans Text\"> 기준으로 1년에 두 번 신고 및 납부하시면 됩니다.</span></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<br />\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">__________________________________________________________________________________-</p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">오피스텔은 <span style=\"font-weight:bold\">용도에 따라 주거/비주거 구분</span>이 되는데,</p>\r\n\t\t\t\t<p style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">국세청과 지자체는 <span style=\"font-style:italic\">실제 사용용도</span>를 최우선으로 판단해.</p>\r\n\t\t\t\t<p style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">즉, <span style=\"font-weight:bold\">세입자가 전입을 했더라도</span> 아래 조건이 청구권보다 우선하면</p>\r\n\t\t\t\t<p style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">‘비주택(업무용)’으로 인정받는 판례가 있어.</p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:16pt;font-weight:bold\">전략</span><span lang=\"en-US\" style=\"font-size:16pt;font-weight:bold\">A -</span><span style=\"font-size:16pt;font-weight:bold\"> 기준을 ‘업무용’으로 만들기</span></p>\r\n\t\t\t\t<p style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">다음 중 <span style=\"font-weight:bold\">2가지 이상이 충족되면 주택으로 보지 않을 확률이 급상승</span>해.</p>\r\n\t\t\t\t<ul>\r\n\t\t\t\t\t<li style=\"font-family:Pretendard Thin;font-size:10pt\">IT, 영상편집, 디자인, 컨설팅 등 <span style=\"font-weight:bold\">개인사업자 누구나 가능한 업종 이름으로 등록</span></li>\r\n\t\t\t\t\t<li style=\"font-family:Pretendard Thin;font-size:10pt\">사업장 소재지: 해당 오피스텔<span lang=\"en-US\">, </span><span style=\"font-family:ui-sans-serif;font-size:12pt;color:#b3b0ad;background-color:#212121\">해당 오피스텔을 ‘보조 사업장(업무용)’으로 등록</span></li>\r\n\t\t\t\t\t<li style=\"font-family:Pretendard Thin;font-size:10pt\">세입자가 사용해도 되고, 너 명의로 내도 돼</li>\r\n\t\t\t\t\t<p style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:ui-sans-serif;font-size:12pt;color:#b3b0ad;background-color:#212121\">임차인이 전입&#183;주거 중이더라도 상관 없음.</span></p>\r\n\t\t\t\t\t<p style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:ui-sans-serif;font-size:12pt;color:#b3b0ad;background-color:#212121\">너는 “일부 공간을 업무용으로 사용한다”만 입증하면 된다.</span></p>\r\n\t\t\t\t\t<li style=\"font-family:Pretendard Thin;font-size:10pt\"><span style=\"font-style:italic\">포인트</span>: 세입자가 전입 신고를 한 사실 자체가 ‘업무용’을 절대 막지 않음.￼→ <span style=\"font-weight:bold\">실제 용도를 업무로 사용</span>한다고 주장하면 세무서는 물증 기준으로 판단함.</li>\r\n\t\t\t\t</ul>\r\n\t\t\t\t<ul>\r\n\t\t\t\t\t<li style=\"font-family:Pretendard Thin;font-size:10pt\">책상, 모니터 2대, 복합기, 캐비넷 등</li>\r\n\t\t\t\t\t<li style=\"font-family:Pretendard Thin;font-size:10pt\"><span style=\"font-family:ui-sans-serif;font-size:12pt;color:#b3b0ad;background-color:#212121\">책상 1개</span><span lang=\"en-US\" style=\"font-size:12pt;color:#b3b0ad;background-color:#212121\">, </span><span style=\"font-family:ui-sans-serif;font-size:12pt;color:#b3b0ad;background-color:#212121\">모니터&#183;서류</span><span lang=\"en-US\" style=\"font-size:12pt;color:#b3b0ad;background-color:#212121\">, </span><span style=\"font-family:ui-sans-serif;font-size:12pt;color:#b3b0ad;background-color:#212121\">IT 장비</span></li>\r\n\t\t\t\t\t<li style=\"font-family:Pretendard Thin;font-size:10pt\"><span style=\"font-family:ui-sans-serif;font-size:12pt;color:#b3b0ad;background-color:#212121\">업무용 사진</span><span lang=\"en-US\" style=\"font-size:12pt;color:#b3b0ad;background-color:#212121\"> </span>5~6장 사진 찍어두면 ‘물적 증거’로 강력함.</li>\r\n\t\t\t\t</ul>\r\n\t\t\t\t<ul>\r\n\t\t\t\t\t<li style=\"font-family:Pretendard Thin;font-size:10pt\">계약 변경이 어려우면 <span style=\"font-weight:bold\">특약만 추가</span>해도 충분함</li>\r\n\t\t\t\t\t<li style=\"font-family:Pretendard Thin;font-size:10pt\">“본 건 임차 목적은 <span style=\"font-style:italic\">업무용</span>이며, 주거용 사용을 금한다”</li>\r\n\t\t\t\t\t<p style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">임차인에게 특약 통지: “해당 공간은 업무용입니다”</p>\r\n\t\t\t\t\t<p style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">필요 시 세입자 설득 후 공동 사용 형태로 정리</p>\r\n\t\t\t\t\t<li style=\"font-family:Pretendard Thin;font-size:10pt\">연락하기 어려우면 단독으로 특약 변경 통지 → ‘의사표시’만으로 증빙 가능</li>\r\n\t\t\t\t</ul>\r\n\t\t\t\t<ul>\r\n\t\t\t\t\t<li style=\"font-family:Pretendard Thin;font-size:10pt\">세입자가 IT&#183;디자인&#183;운영업 등으로 사업자 등록하면￼→ 해당 공간은 국세청 기준 ‘비주택’</li>\r\n\t\t\t\t\t<li style=\"font-family:Pretendard Thin;font-size:10pt\">이 경우 전입이 있더라도 <span style=\"font-weight:bold\">주거용 간주 원천 차단됨</span></li>\r\n\t\t\t\t</ul>\r\n\t\t\t\t<p style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:ui-sans-serif;font-size:12pt;color:#b3b0ad;background-color:#212121\">→ 세무서는 **‘혼합용도’**로 분류</span></p>\r\n\t\t\t\t<p style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:ui-sans-serif;font-size:12pt;color:#b3b0ad;background-color:#212121\">→ 취득세 계산 시&#160;주택으로 100% 포함할 수 없음</span></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">이걸 모두 갖추면 <span style=\"font-weight:bold\">세무서도 건드리기 어려움</span>.</p>\r\n\t\t\t\t<ol>\r\n\t\t\t\t\t<li style=\"font-family:Pretendard Thin;font-size:10pt\">사업자등록증 (너 또는 세입자 명의)</li>\r\n\t\t\t\t\t<li style=\"font-family:Pretendard Thin;font-size:10pt\">업무용 비품 사진</li>\r\n\t\t\t\t\t<li style=\"font-family:Pretendard Thin;font-size:10pt\">임대차계약 특약: “업무용 목적 사용”</li>\r\n\t\t\t\t\t<li style=\"font-family:Pretendard Thin;font-size:10pt\">관리비 고지서 (전용세대가 아닌 오피스텔 구조 강조)</li>\r\n\t\t\t\t\t<li style=\"font-family:Pretendard Thin;font-size:10pt\">건축물대장 용도: 업무시설(오피스텔)</li>\r\n\t\t\t\t\t<li style=\"font-family:Pretendard Thin;font-size:10pt\">전기 사용 패턴 (가능하면 월 9시~6시 피크 등)</li>\r\n\t\t\t\t</ol>\r\n\t\t\t\t<p style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">→ 이 조합은 실제로 <span style=\"font-weight:bold\">국세청 추징 조사를 뒤집은 사례</span>가 있음.</p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">세무서에서 “왜 지금 전환했나?” 질문하면</p>\r\n\t\t\t\t<p style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">→ “업무 목적 사용을 위해 용도 전환함. 관련 증빙 제출.” 로 끝남.</p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:18pt;font-weight:bold\">전략 B — 간단한 ‘업무용 전환’ 신고만 하기 (지자체 신고)</span></p>\r\n\t\t\t\t<p style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">오피스텔은 원래 업무시설(오피스텔)이기 때문에</p>\r\n\t\t\t\t<ul>\r\n\t\t\t\t\t<li style=\"font-family:Pretendard Thin;font-size:10pt\">건축물대장에 목적을 “업무”로 표시</li>\r\n\t\t\t\t\t<li style=\"font-family:Pretendard Thin;font-size:10pt\">내부 사진 5~6장 첨부</li>\r\n\t\t\t\t\t<li style=\"font-family:Pretendard Thin;font-size:10pt\">세입자가 전입했더라도 “임대인은 업무 목적 공간으로 관리 중”이라는 팩트가 더 우선</li>\r\n\t\t\t\t</ul>\r\n\t\t\t\t<ul>\r\n\t\t\t\t\t<li style=\"font-family:Pretendard Thin;font-size:10pt\">주택으로 분류될 여지를 원천 차단</li>\r\n\t\t\t\t\t<li style=\"font-family:Pretendard Thin;font-size:10pt\">사업자등록 없이도 가능</li>\r\n\t\t\t\t\t<li style=\"font-family:Pretendard Thin;font-size:10pt\">세무서와 구청 모두에게 강력한 증빙</li>\r\n\t\t\t\t</ul>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:18pt;font-weight:bold\">전략 C — 회사(네 소속 SKT)의 ‘부사무실(재택근무 사무공간)’ 등록</span></p>\r\n\t\t\t\t<p style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">네 명의로 하지 않고<span lang=\"en-US\">, </span>회사에서 <span style=\"font-weight:bold\">부설 사무실/재택 근무 사무공간</span>으로 등록</p>\r\n\t\t\t\t<ul>\r\n\t\t\t\t\t<li style=\"font-family:Pretendard Thin;font-size:10pt\">사내 컴플라이언스나 총무팀 통해 처리하는 방식<span lang=\"en-US\"> </span></li>\r\n\t\t\t\t\t<li style=\"font-family:Pretendard Thin;font-size:10pt\">회사가 인정하는 순간 <span style=\"font-weight:bold\">주택으로 판정할 근거가 사라짐</span></li>\r\n\t\t\t\t\t<li style=\"font-family:Pretendard Thin;font-size:10pt\">재택근무자 공식 업무공간으로 회사가 인정하면￼→ 국세청: ‘근무용 공간’</li>\r\n\t\t\t\t\t<br />\r\n\t\t\t\t</ul>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p data-tag=\"remember-for-later\" style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">매년 6월 1일 이전에 해당 오피스텔에 대해 <span style=\"font-weight:bold\">주거용이 아님을 구청에 변동 신고</span>하고, **업무용 재산세(별도합산 또는 비과세)**가 부과되도록 유도합니다.</p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<li style=\"font-family:Pretendard Thin;font-size:10pt\"><span data-tag=\"remember-for-later\"><span style=\"font-weight:bold\">재산세 용도 변경:</span> 지방세(재산세)를 주택분(세율 높음)이 아닌 **업무용(별도합산과세)**으로 부과받기 위해 관할 시/군/구에 <span style=\"font-weight:bold\">용도 변경 신고</span> 및 증빙 자료 제출을 적극적으로 시도해야 합니다. 재산세가 업무용으로 부과되면 주택 수 제외에 유리한 근거가 됩니다.</span></li>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">_________________________</p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<li style=\"font-family:Pretendard Thin;font-size:10pt\"><span style=\"font-weight:bold\">주방 시설 최소화:</span> 취사 시설(싱크대)을 사용하지 못하도록 물리적으로 막거나, <span style=\"font-weight:bold\">업무용으로 변경</span>했음을 사진 등으로 증명합니다. (예: 싱크대 위에 업무용 가구 배치 등)</li>\r\n\t\t\t\t<li style=\"font-family:Pretendard Thin;font-size:10pt\"><span style=\"font-weight:bold\">업무용 가구 배치:</span> 세입자에게 일반적인 주거용 가구(침대, 대형 TV 등) 대신 <span style=\"font-weight:bold\">업무용 책상, 회의용 테이블, 사무용품 등</span>을 배치하도록 요청하고 사진으로 남깁니다.</li>\r\n\t\t\t\t<br />\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-weight:bold\">전입신고 효력:</span> 세입자가 전입신고를 유지하는 한, 세무 당국은 <span style=\"font-weight:bold\">전입신고</span>와 <span style=\"font-weight:bold\">실제 주거용 사용</span>을 가장 우선시하여 판단할 수 있습니다. 공동 사용 형태로 정리하더라도, 임대인 사업장으로 인정받는 부분만큼만 제외되고 나머지는 주택으로 남을 가능성이 있습니다.</p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<li><p style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-weight:bold\">사업의 실질성:</span> 세무 당국은 임대인이 개설한 IT 사업이 **가짜 사업장(Paper Company)**이 아닌지 검증할 수 있습니다. 사업장으로 등록한 이상, 해당 오피스텔 주소에서 <span style=\"font-weight:bold\">실제로 매출이 발생</span>하고 <span style=\"font-weight:bold\">업무가 수행</span>되고 있다는 <span style=\"font-weight:bold\">객관적인 증거</span>를 확보해야 합니다.</p>\r\n\t\t\t\t<ul>\r\n\t\t\t\t\t<li style=\"font-family:Pretendard Thin;font-size:10pt\"><span style=\"font-weight:bold\">보완:</span> 해당 사업자 명의로 <span style=\"font-weight:bold\">소액이라도 매출</span>을 발생시키고, <span style=\"font-weight:bold\">통신비, 비품 구매 등 사업 관련 비용을 오피스텔 주소에서 지출</span>하는 노력이 필요합니다.</li>\r\n\t\t\t\t</ul>\r\n\t\t\t\t</li>\r\n\t\t\t</ul>\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Segoe UI Emoji;font-size:20pt;font-weight:bold\">✅</span><span style=\"font-size:20pt;font-weight:bold\"> 총평 (가장 중요한 결론)</span></p>\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Segoe UI Emoji;font-size:16pt;font-weight:bold\">✔</span><span style=\"font-size:16pt;font-weight:bold\"> 핵심 요약</span></p>\r\n\t\t\t<p style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Segoe UI Emoji;font-size:16pt;font-weight:bold\">✔</span><span style=\"font-size:16pt;font-weight:bold\"> 장점</span></p>\r\n\t\t\t<p style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Segoe UI Emoji;font-size:16pt;font-weight:bold\">❗</span><span style=\"font-size:16pt;font-weight:bold\"> 단점</span></p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-weight:bold\">1. LH 지원 세입자의 존재 자체가 결정적 증거</span></p>\r\n\t\t\t<p style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-weight:bold\">2. 전입신고는 절대적 증거</span></p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-weight:bold\">4. 과세관청의 실질 조사</span></p>\r\n\t\t\t<p style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-weight:bold\">성공 가능성:</span></p>\r\n\t\t\t<p style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-weight:bold\">리스크:</span></p>\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Segoe UI Emoji;font-size:16pt;font-weight:bold\">⭐</span><span style=\"font-size:16pt;font-weight:bold\"> 종합 점수</span></p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Segoe UI Emoji;font-size:16pt;font-weight:bold\">✔</span><span style=\"font-size:16pt;font-weight:bold\"> 핵심 요약</span></p>\r\n\t\t\t<p style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Segoe UI Emoji;font-size:16pt;font-weight:bold\">✔</span><span style=\"font-size:16pt;font-weight:bold\"> 장점</span></p>\r\n\t\t\t<p style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Segoe UI Emoji;font-size:16pt;font-weight:bold\">❗</span><span style=\"font-size:16pt;font-weight:bold\"> 단점</span></p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-weight:bold\">1. 건축물대장 변경과 세법 판정은 별개</span></p>\r\n\t\t\t<p style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-weight:bold\">2. 더 큰 문제</span></p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Segoe UI Emoji;font-size:16pt;font-weight:bold\">⭐</span><span style=\"font-size:16pt;font-weight:bold\"> 종합 점수</span></p>\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">구청에서</span> <span style=\"font-family:Malgun Gothic\">업무용</span> <span style=\"font-family:Malgun Gothic\">재산세가</span> <span style=\"font-family:Malgun Gothic\">부과되도록</span> <span style=\"font-family:Malgun Gothic\">성공했다면</span>, <span style=\"font-family:Malgun Gothic\" // ── Undo (Ctrl+Z) ────────────────────────────────────────────────────────────
const MAX_HISTORY = 50;
let history = [];
function snapshot() {
  syncText();

  if (history.length > MAX_HISTORY) history.shift();
}
function undo() {
  if (!history.length) { showStatus('되돌릴 내용 없음'); return; }

function showStatus(msg) {

}
document.addEventListener('keydown', e => {
  const isText = document.activeElement?.contentEditable === 'true';
  if ((e.ctrlKey || e.metaKey) && e.key === 'z' && !e.shiftKey) {

  if ((e.ctrlKey || e.metaKey) && e.key === 'c' && !e.shiftKey && !isText) {

  if ((e.ctrlKey || e.metaKey) && e.key === 'v' && !e.shiftKey && !isText) {

function pushCards(movedIdx) {
  const moved = cards[movedIdx];
  const movedEl = document.querySelector(`.card[data-idx="${movedIdx}"]`);
  if (!movedEl) return;
  const mh = movedEl.offsetHeight;
  document.querySelectorAll('.card').forEach(el => {
    const i = +el.dataset.idx;
    if (i === movedIdx) return;
    const c = cards[i], oh = el.offsetHeight;
    if (moved.x < (c.x+(c.w||200)) && (moved.x+(moved.w||200)) > c.x && moved.y < (c.y+oh) && (moved.y+mh) > c.y) {

function autoLayout() {
  const boardW = document.getElementById('board').offsetWidth;
  const cols = Math.max(1, Math.floor(boardW / 280));
  const colW = (boardW - GAP*(cols-1)) / cols;
  const colH = new Array(cols).fill(0);
  const allCards = document.querySelectorAll('.card');
  const images = document.querySelectorAll('.card img');
  let loaded = 0;
  function place() {
    allCards.forEach((el, i) => {
      const w = Math.min(cards[i].w || colW, colW);
      let minCol = 0;
      for (let c = 1; c < cols; c++) if (colH[c] < colH[minCol]) minCol = c;
      cards[i].x = minCol * (colW + GAP);
      cards[i].y = colH[minCol];
      cards[i].w = w;
      el.style.left = cards[i].x + 'px';
      el.style.top = cards[i].y + 'px';
      el.style.width = w + 'px';
      colH[minCol] = cards[i].y + el.offsetHeight + GAP;
    });
    document.getElementById('board').style.minHeight = (Math.max(...colH) + 100) + 'px';
    saveBoard();
  }
  if (!images.length) { requestAnimationFrame(place); return; }
  images.forEach(img => {
    if (img.complete) { loaded++; if (loaded >= images.length) requestAnimationFrame(place); }
    else { img.onload = img.onerror = () => { loaded++; if (loaded >= images.length) requestAnimationFrame(place); }; }
  });
}

      addRow.onclick = e => { e.stopPropagation(); snapshot(); if (!cards[i].rows) cards[i].rows = rows; cards[i].rows.push(new Array(cards[i].rows[0].length).fill('')); renderCards(); saveBoard(); };
      const addCol = document.createElement('button');
      addCol.textContent = '+ 열'; addCol.style.cssText = 'margin-top:4px;margin-left:4px;font-size:11px;background:#21262d;border:1px solid #30363d;color:#8b949e;padding:2px 8px;border-radius:4px;cursor:pointer;';
      addCol.onclick = e => { e.stopPropagation(); snapshot(); if (!cards[i].rows) cards[i].rows = rows; cards[i].rows.forEach(r => r.push('')); renderCards(); saveBoard(); };
      el.appendChild(addRow); el.appendChild(addCol);
    }
    const rh = document.createElement('div'); rh.className = 'resize-handle';
    rh.addEventListener('mousedown', e => { e.preventDefault(); e.stopPropagation(); snapshot(); resizing = { idx: i, startX: e.clientX, startW: card.w || el.offsetWidth }; });
    el.appendChild(rh);
    if (i === selectedIdx) el.classList.add('selected');
    board.appendChild(el);
  });
  requestAnimationFrame(() => {
    let maxB = 0;
    document.querySelectorAll('.card').forEach(el => { const b = (parseFloat(el.style.top)||0) + el.offsetHeight; if (b > maxB) maxB = b; });
    board.style.minHeight = (maxB + 100) + 'px';
  });
}

document.addEventListener('mousemove', e => {
  if (moving) {
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`); if (!el) return;
    let nx = moving.origX + e.clientX - moving.startX, ny = moving.origY + e.clientY - moving.startY;
    if (e.shiftKey) { nx = snap(nx); ny = snap(ny); el.style.outline = '1px dashed rgba(240,192,64,0.3)'; } else { el.style.outline = ''; }
    el.style.left = nx + 'px'; el.style.top = ny + 'px';
  }
  if (resizing) {
    let nw = resizing.startW + e.clientX - resizing.startX; if (e.shiftKey) nw = snap(nw);
    cards[resizing.idx].w = Math.max(100, nw);
    const el = document.querySelector(`.card[data-idx="${resizing.idx}"]`); if (el) el.style.width = cards[resizing.idx].w + 'px';
  }
});

document.addEventListener('mouseup', e => {
  if (moving) {
    let nx = moving.origX + e.clientX - moving.startX, ny = moving.origY + e.clientY - moving.startY;
    if (e.shiftKey) { nx = snap(nx); ny = snap(ny); }
    cards[moving.idx].x = Math.max(0, nx); cards[moving.idx].y = Math.max(0, ny);
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`); if (el) { el.classList.remove('moving'); el.style.outline = ''; }
    if (e.shiftKey) pushCards(moving.idx);
    moving = null; saveBoard();
  }
  if (resizing) { if (e.shiftKey) pushCards(resizing.idx); resizing = null; saveBoard(); }
});

function addTextCard() { snapshot(); cards.push({ type: 'text', content: '', x: 50, y: window.scrollY+100, w: 300 }); renderCards(); setTimeout(() => { const els = document.querySelectorAll('.card .text'); els[els.length-1]?.focus(); }, 100); }
function addImageCard() { const input = document.createElement('input'); input.type = 'file'; input.accept = 'image/*'; input.onchange = e => { const f = e.target.files[0]; if (!f) return; const r = new FileReader(); r.onload = () => { snapshot(); cards.push({ type: 'image', src: r.result, x: 50, y: window.scrollY+100, w: 240 }); renderCards(); saveBoard(); }; r.readAsDataURL(f); }; input.click(); }
function addImageUrl() { const url = prompt('이미지 URL'); if (!url) return; snapshot(); cards.push({ type: 'image', src: url, x: 50, y: window.scrollY+100, w: 240 }); renderCards(); saveBoard(); }
function addTableCard() {
  const colsStr = prompt('열 수 (기본 3)', '3'); const cols = Math.max(1, parseInt(colsStr)||3);
  const rowsStr = prompt('행 수 (헤더 포함, 기본 4)', '4'); const rows = Math.max(1, parseInt(rowsStr)||4);
  snapshot();
  cards.push({ type: 'table', rows: Array.from({length: rows}, (_, ri) => Array.from({length: cols}, (_, ci) => ri===0 ? `열${ci+1}` : '')), x: 50, y: window.scrollY+100, w: Math.max(240, cols*100) });
  renderCards(); saveBoard();
}
function exportBoard() { syncText(); const blob = new Blob([JSON.stringify(cards, null, 2)], { type: 'application/json' }); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = SAVE_KEY + '.json'; a.click(); }
// ── Zoom ─────────────────────────────────────────────────────────────────────
let zoom = parseFloat(localStorage.getItem('zoom-' + SAVE_KEY) || '1.0');
function applyZoom() {
  const board = document.getElementById('board');
  board.style.transform = `scale(${zoom})`;
  board.style.transformOrigin = '0 0';
  document.getElementById('zoom-level').textContent = Math.round(zoom * 100) + '%';
  localStorage.setItem('zoom-' + SAVE_KEY, zoom);
}
function zoomIn()  { zoom = Math.min(3.0, parseFloat((zoom + 0.1).toFixed(2))); applyZoom(); }
function zoomOut() { zoom = Math.max(0.2, parseFloat((zoom - 0.1).toFixed(2))); applyZoom(); }
document.addEventListener('keydown', e => {
  if (e.ctrlKey || e.metaKey) {
    if (e.key === '=' || e.key === '+') { e.preventDefault(); zoomIn(); }
    if (e.key === '-')                  { e.preventDefault(); zoomOut(); }
    if (e.key === '0')                  { e.preventDefault(); zoom = 1.0; applyZoom(); }
  }
});
document.getElementById('board').addEventListener('wheel', e => {
  if (!(e.ctrlKey || e.metaKey)) return;
  e.preventDefault();
  e.deltaY < 0 ? zoomIn() : zoomOut();
}, { passive: false });
applyZoom();
function resetLayout() { if (!confirm('자동 재배치합니다.')) return; cards.forEach(c => { delete c.x; delete c.y; }); renderCards(); autoLayout(); }
// ── Floating format toolbar ───────────────────────────────────────────────────
const fmtBar = document.getElementById('format-toolbar');
function fmt(cmd) { document.execCommand(cmd, false, null); saveBoard(); }
function fmtLink() {
  const sel = window.getSelection();
  if (!sel || sel.isCollapsed) return;
  const url = prompt('링크 URL 입력', 'https://');
  if (!url) return;
  document.execCommand('createLink', false, url);
  // make links open in new tab
  sel.anchorNode?.parentElement?.closest('a')?.setAttribute('target', '_blank');
  document.querySelectorAll('.text a').forEach(a => a.target = '_blank');
  saveBoard();
}

// prevent format buttons from blurring contenteditable
fmtBar.addEventListener('mousedown', e => e.preventDefault());

document.addEventListener('selectionchange', () => {
  const sel = window.getSelection();
  if (!sel || sel.isCollapsed || !sel.toString().trim()) { fmtBar.style.display = 'none'; return; }
  // only show if selection is inside a .text element
  const anchor = sel.anchorNode;
  if (!anchor) { fmtBar.style.display = 'none'; return; }
  const textEl = anchor.nodeType === 1 ? anchor.closest('.text') : anchor.parentElement?.closest('.text');
  if (!textEl) { fmtBar.style.display = 'none'; return; }
  // position above selection
  const range = sel.getRangeAt(0);
  const rect = range.getBoundingClientRect();
  fmtBar.style.display = 'flex';
  const tbW = fmtBar.offsetWidth || 180;
  let left = rect.left + rect.width / 2 - tbW / 2;
  left = Math.max(8, Math.min(left, window.innerWidth - tbW - 8));
  fmtBar.style.left = left + 'px';
  fmtBar.style.top = (rect.top - 44 + window.scrollY) + 'px';
});

setInterval(saveBoard, 30000);
loadBoard();
</script>
</body>
</html>
