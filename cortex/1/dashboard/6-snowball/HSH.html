노에서 가격이 이미 오른 단지는 5천은 깍고 들어가야한다.(전고점 넘은 단지)<br>\t\t\t\t<br>안오른 단지들은 잘 안깍아준다.<br>\t\t\t\t<br><br>\t\t\t\t<br>위치, 교통, 환경, 학군에 따라 가치를 평가하고<br>\t\t\t\t<br>롱 리스트를 최대한 넓혀야만 한다.<br>\t\t\t\t<br><br>\t\t\t\t<br><br>\t\t\t\t<br><br>\t\t\t\t<br>&#160;<br>\t\t\t\t<br>&#160;1. 전세 낀 매물을 보시는 것도 좋습니다.&#160;<br>\t\t\t\t<br>&#160;<br>\t\t\t\t<br>전세 낀 물건의 만기가 길지 않게 남았다면,&#160;<br>\t\t\t\t<br>세입자에게 실거주 의사를 밝히고<br>\t\t\t\t<br>잔금 일정을 매도자와 협의해서&#160;<br>\t\t\t\t<br>진행하는 것도 좋은 방법이라고 생각합니다.<br>\t\t\t\t<br>&#160;<br>\t\t\t\t<br>* 계약갱신청구권 거절 가능한 경우 :&#160;<br>\t\t\t\t<br>만기 2개월 전에 매수자가 실거주 의사를 밝히면 거절 할 수 있습니다.<br>\t\t\t\t<br>&#160;<br>\t\t\t\t<br>갈아타기 수요가 있고<br>\t\t\t\t<br>가고 싶은 단지가 있는 경우,&#160;<br>\t\t\t\t<br>특히 그 단지의 가격이 계속 오르는 상황이라면<br>\t\t\t\t<br>조금 싸게라도 빨리 팔고 이동하시려는 분들도 계시긴 합니다.<br>\t\t\t\t<br>&#160;<br>\t\t\t\t<br>&#160;<br>\t\t\t\t<br>이런 물건을 찾았다면<br>\t\t\t\t<br>적극적으로 매도자 분이 원하는 것을 드리면서<br>\t\t\t\t<br>가격을 협상해볼 수 있습니다.<br>\t\t\t\t<br>&#160;<br>\t\t\t\t<br>&#160;<br>\t\t\t\t<br>여기서 제일 중요한 것은,<br>\t\t\t\t<br>‘매도자 분이 원하는 것을 드리는 것’입니다.<br>\t\t\t\t<br>&#160;<br>\t\t\t\t<br>&#160;<br>\t\t\t\t<br>협상의 기본은<br>\t\t\t\t<br>상대가 원하는 것을 알고<br>\t\t\t\t<br>그것을 해결해주는 것입니다.<br>\t\t\t\t<br>&#160;<br>\t\t\t\t<br>그러면서 내가 원하는 것을<br>\t\t\t\t<br>얻는 것입니다.<br>\t\t\t\t<br>&#160;<br>\t\t\t\t<br>&#160;<br>\t\t\t\t<br>그러니 꼭 매도자가 원하는 것을 해결해주고<br>\t\t\t\t<br>내가 원하는 것(가격을 깎는 것)을 시도해보시면 좋겠습니다.<br>\t\t\t\t<br><br>\t\t\t\t<br><br>\t\t\t\t<br>본인이 생각했을 때,&#160;<br>\t\t\t\t<br>10년 정도 보유한다면&#160;<br>\t\t\t\t<br>이 가격을 다시 보기 어렵겠다고 생각된다면&#160;<br>\t\t\t\t<br>&#160;<br>\t\t\t\t<br>그것은 충분히 싼 가격이라고 생각하시면 됩니다.<br>\t\t\t\t<br><br>\t\t\t\t<br><a href=\"https://weolbu.com/community/3471756/%EB%B9%88%EC%93%B0-%EC%95%89%EC%9D%80-%EC%9E%90%EB%A6%AC%EC%97%90%EC%84%9C-4%EC%96%B5-%EC%98%AC%EB%A6%B0%EB%8B%A4%EB%8A%94-%EC%8B%9C%EC%9E%A5%EC%97%90%EC%84%9C-%EC%8B%B8%EA%B2%8C-%EC%82%AC%EB%8A%94-%EB%B0%A9%EB%B2%95%ED%98%91%EC%83%81%EC%9D%80-%EA%BC%AD-%EC%9D%B4%EB%A0%87%EA%B2%8C-%ED%95%98%EC%84%B8%EC%9A%94?inviteCode=FC460D&utm_source=user_share&utm 상금까지 포함한&#160;￼전체 가계 포트폴리오에서 주거가 차지하는 비중을 체크￼&#160;<br>\t\t\t\t<br>최근 본인의 주거지를&#160;<br>\t\t\t\t<br>전세에서 월세로 옮기거나, 실거주를<br>\t\t\t\t<br>전세로 돌리면서 걱정하는 분들이 많습니다.<br>\t\t\t\t<br>&#160;<br>\t\t\t\t<br>이럴때는 월세의 2년치 비용 혹은<br>\t\t\t\t<br>1년치 비용을 미리 비상금으로<br>\t\t\t\t<br>뺴두시면 심리적으로 안정감을 줍니다.<br>\t\t\t\t<br>&#160;<br>\t\t\t\t<br>저또한 이런식으로 항상 비상금을&#160;<br>\t\t\t\t<br>빼두기에, 막연한 불안감에서<br>\t\t\t\t<br>조금이라도 안전막을 준비하고 있습니다.<br>\t\t\t\t<br>&#160;<br>\t\t\t\t<br>&#160;<br>\t\t\t\t<br>- 만약 급격한 하락이 와도 감내 가능한 수준인지￼&#160;‘최악 시나리오’까지 가정해보세요<br>\t\t\t\t<br>&#160;<br>\t\t\t\t<br>여러분들이 지금 매수를 하다면, 아니면 이미 보유하신분들도<br>\t\t\t\t<br>시물레이션을 돌려보세요.<br>\t\t\t\t<br>&#160;<br>\t\t\t\t<br>전고점 찍은 가격에서&#160;<br>\t\t\t\t<br>얼마 떨어졌다!가 아니라,<br>\t\t\t\t<br>&#160;<br>\t\t\t\t<br>내가 매수한 가격에서 00가 떨어져도 감당한다<br>\t\t\t\t<br>라고 스스로 적어두던지, 메모를 남기고,<br>\t\t\t\t<br>흔들릴때마다 보면서 마음을 잡으셔야 합니다<br>\t\t\t\t<br>&#160;<br>\t\t\t\t<br>그래서 위의 그래프에서&#160;<br>\t\t\t\t<br>4번 이후의 단계를 얻을수 있습니다.<br>\t\t\t\t<br>&#160;<br>\t\t\t\t<br>시간을 견디지 않고는 수익은 얻을 수 없습니다.<br>\t\t\t\t<br>&#160;<br>\t\t\t\t<br>&#160;<br>\t\t\t\t<br>&#160;<br>\t\t\t\t<br>&#160;불안하다고 멈추지 말고, 전략적으로 나아가라<br>\t\t\t\t<br>&#160;<br>\t\t\t\t<br>집이 꼭 필요하다면, 완벽한 타이밍이란 없습니다.<br>\t\t\t\t<br><br>\t\t\t\t<br>시장에는 언제나 두 가지 부류의 사람이 있습니다.<br>\t\t\t\t<br>‘떨어질까 봐 못 사는 사람’과&#160;<br>\t\t\t\t<br>‘떨어져도 버틸 준비가 된 사람’.<br>\t\t\t\t<br>결국 차이는&#160;<br>\t\t\t\t<br>타이밍이 아니라 준비도에서 갈립니다.<br>\t\t\t\t<br>&#160;<br>\t\t\t\t<br>입지&#183;균형&#183;수요 기반이&#160;<br>\t\t\t\t<br>탄탄한 지역을 중심으로 검토하세요<br>\t\t\t\t<br>&#160;<br>\t\t\t\t<br>월부에서 배운 기준<br>\t\t\t\t<br>입지에 대한 평가기준을 강의에서 배운&#160;<br>\t\t\t\t<br><br>\t\t\t\t<br>글자로만 아니라&#160;<br>\t\t\t\t<br>현장에서 대입하는게 더욱 필요한 시점입니다.<br>\t\t\t\t<br><br>\t\t\t\t<br>대부분의 사람들은 머리로는 이해한다고 하지만<br>\t\t\t\t<br>내돈이 들어가고,&#160;<br>\t\t\t\t<br>현장의 분위기에 휩쓸리다 보면<br>\t\t\t\t<br>&#160;<br>\t\t\t\t<br>내가 배운기준은 책에서 본 글자로 바뀌는 경우가 너무 많습니다.<br>\t\t\t\t<br>&#160;<br>\t\t\t\t<br>이럴때일수록 기준을 지키는게 중요합니다.<br>\t\t\t\t<br>&#160;<br>\t\t\t\t<br>사람들의 수요가 있는곳을 찾는게 핵심입니다.<br>\t\t\t\t<br><br>\t\t\t\t<br>&       const w = Math.min(card.w || colW, colW);
      let minCol = 0;
      for (let c = 1; c < cols; c++) if (colHeights[c] < colHeights[minCol]) minCol = c;
      card.x = minCol * (colW + GAP);
      card.y = colHeights[minCol];
      card.w = w;
      el.style.left = card.x + 'px';
      el.style.top = card.y + 'px';
      el.style.width = w + 'px';
      colHeights[minCol] = card.y + el.offsetHeight + GAP;
    });
    document.getElementById('board').style.minHeight = Math.max(...colHeights) + 100 + 'px';
    saveBoard();
  }

  if (total === 0) requestAnimationFrame(place);
  else images.forEach(img => {
    if (img.complete) { loaded++; if (loaded >= total) requestAnimationFrame(place); }
    else img.onload = img.onerror = () => { loaded++; if (loaded >= total) requestAnimationFrame(place); };
  });
}

function syncText() {
  document.querySelectorAll('.card').forEach(el => {
    const idx = +el.dataset.idx;
    if (cards[idx]?.type === 'text') {
      const t = el.querySelector('.text');
      if (t) cards[idx].content = t.innerHTML;
    }
  });
}

function saveBoard() {
  syncText();
  localStorage.setItem(SAVE_KEY, JSON.stringify(cards));
  document.getElementById('status').textContent = '저장됨 ' + new Date().toLocaleTimeString();
}

function renderCards() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  cards.forEach((card, i) => {
    const el = document.createElement('div');
    el.className = 'card';
    el.dataset.idx = i;
    if (card.x !== undefined) el.style.left = card.x + 'px';
    if (card.y !== undefined) el.style.top = card.y + 'px';
    if (card.w) el.style.width = card.w + 'px';

    el.addEventListener('mousedown', e => {
      if (e.target.closest('.text, a, .card-btn, .resize-handle, table')) return;
      e.preventDefault();
      moving = { idx: i, startX: e.clientX, startY: e.clientY, origX: card.x || 0, origY: card.y || 0 };
      el.classList.add('moving');
    });

    const actions = document.createElement('div');
    actions.className = 'card-actions';
    const delBtn = document.createElement('button');
    delBtn.className = 'card-btn'; delBtn.textContent = '×';
    delBtn.onclick = e => { e.stopPropagation(); if (confirm('삭제?')) { cards.splice(i, 1); renderCards(); saveBoard(); } };
    actions.appendChild(delBtn);
    el.appendChild(actions);

    if (card.type === 'text') {
      const text = document.createElement('div');
      text.className = 'text';
      text.contentEditable = true;
      text.innerHTML = card.content || '';
      text.addEventListener('blur', () => { card.content = text.innerHTML; saveBoard(); });
      el.appendChild(text);
    } else if (card.type === 'image') {
      const src = card.src.startsWith('http') || card.src.startsWith('data:') ? card.src : IMG_BASE + card.src;
      const img = document.createElement('img');
      img.src = src;
      img.alt = card.alt || '';
      img.loading = 'lazy';
      img.onerror = () => img.style.display = 'none';
      if (card.link) {
        const a = document.createElement('a'); a.href = card.link; a.target = '_blank';
        a.appendChild(img); el.appendChild(a);
      } else { el.appendChild(img); }
      if (card.caption) {
        const cap = document.createElement('div');
        cap.className = 'caption';
        cap.textContent = card.caption;
        el.appendChild(cap);
      }
    } else if (card.type === 'table') {
      const wrapper = document.createElement('div');
      wrapper.style.overflowX = 'auto';
      wrapper.innerHTML = card.html || '';
      el.appendChild(wrapper);
    }

    const rh = document.createElement('div');
    rh.className = 'resize-handle';
    rh.addEventListener('mousedown', e => {
      e.preventDefault(); e.stopPropagation();
      resizing = { idx: i, startX: e.clientX, startW: card.w || el.offsetWidth };
    });
    el.appendChild(rh);
    board.appendChild(el);
  });

  requestAnimationFrame(() => {
    let maxBottom = 0;
    document.querySelectorAll('.card').forEach(el => {
      const b = (parseFloat(el.style.top) || 0) + el.offsetHeight;
      if (b > maxBottom) maxBottom = b;
    });
    board.style.minHeight = (maxBottom + 100) + 'px';
  });
}

document.addEventListener('mousemove', e => {
  if (moving) {
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`);
    if (!el) return;
    const nx = moving.origX + e.clientX - moving.startX;
    const ny = moving.origY + e.clientY - moving.startY;
    el.style.left = nx + 'px';
    el.style.top = ny + 'px';
  }
  if (resizing) {
    const card = cards[resizing.idx];
    card.w = Math.max(100, resizing.startW + e.clientX - resizing.startX);
    const el = document.querySelector(`.card[data-idx="${resizing.idx}"]`);
    if (el) el.style.width = card.w + 'px';
  }
});

document.addEventListener('mouseup', e => {
  if (moving) {
    const card = cards[moving.idx];
    card.x = Math.max(0, moving.origX + e.clientX - moving.startX);
    card.y = Math.max(0, moving.origY + e.clientY - moving.startY);
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`);
    if (el) { el.classList.remove('moving'); }
    moving = null; saveBoard();
  }
  if (resizing) { resizing = null; saveBoard(); }
});

function addTextCard() {
  cards.push({ type: 'text', content: '', x: 50, y: window.scrollY + 100, w: 300 });
  renderCards();
  setTimeout(() => { const els = document.querySelectorAll('.card .text'); els[els.length - 1]?.focus(); }, 100);
}

function addImageCard() {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = 'image/*';
  input.onchange = e => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = () => { cards.push({ type: 'image', src: reader.result, x: 50, y: window.scrollY + 100, w: 240 }); renderCards(); saveBoard(); };
    reader.readAsDataURL(file);
  };
  input.click();
}

function resetLayout() {
  if (!confirm('자동 재배치합니다. 현재 위치가 변경됩니다.')) return;
  cards.forEach(c => { delete c.x; delete c.y; });
  renderCards(); autoLayout();
}

setInterval(saveBoard, 30000);
loadBoard();
</script>
