<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HSH</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1e1e1e; color: #e0e0e0; font-family: 'Segoe UI', -apple-system, sans-serif; font-size: 15px; line-height: 1.6; padding: 20px 30px 60px; overflow-x: hidden; }
a { color: #6cb0f6; text-decoration: none; }
a:hover { text-decoration: underline; }
.title-bar { background: #3a3a5c; display: inline-block; padding: 6px 16px; font-size: 22px; font-weight: bold; color: #fff; margin-bottom: 4px; }
.date { color: #999; font-size: 13px; margin-bottom: 20px; }
.board { position: relative; }
.card { background: #2a2a2a; border: 1px solid #3a3a3a; border-radius: 8px; padding: 12px; position: absolute; cursor: grab; transition: box-shadow 0.15s; overflow: hidden; }
.card:hover { box-shadow: 0 0 0 1px #58a6ff; z-index: 10; }
.card.moving { opacity: 0.8; box-shadow: 0 4px 24px rgba(0,0,0,0.6); z-index: 100; cursor: grabbing; }
.card img { width: 100%; border-radius: 4px; display: block; }
.card .text { outline: none; min-height: 20px; white-space: pre-wrap; word-break: break-word; }
.card .text:focus { background: rgba(255,255,255,0.05); border-radius: 4px; padding: 4px; }
.card .text:empty::before { content: '텍스트 입력...'; color: #555; }
.card-actions { position: absolute; top: 4px; right: 4px; display: none; gap: 4px; }
.card:hover .card-actions { display: flex; }
.card-btn { background: #333; border: 1px solid #555; color: #ccc; border-radius: 4px; padding: 2px 6px; font-size: 11px; cursor: pointer; }
.card-btn:hover { background: #444; color: #fff; }
.resize-handle { position: absolute; bottom: 0; right: 0; width: 16px; height: 16px; cursor: se-resize; opacity: 0; }
.card:hover .resize-handle { opacity: 0.6; }
.resize-handle::after { content: ''; position: absolute; bottom: 3px; right: 3px; width: 8px; height: 8px; border-right: 2px solid #666; border-bottom: 2px solid #666; }
.card.selected { box-shadow: 0 0 0 2px #58a6ff; z-index: 5; }
.highlight-red { color: #ff6b6b; }
.highlight-blue { color: #6cb0f6; }
.highlight-gold { color: #f0c040; }
.toolbar { position: fixed; bottom: 0; left: 0; right: 0; background: #161b22; border-top: 1px solid #30363d; padding: 8px 20px; display: flex; gap: 12px; align-items: center; z-index: 200; }
.toolbar button { background: #21262d; border: 1px solid #30363d; color: #e0e0e0; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; }
.toolbar button:hover { background: #30363d; }
.toolbar .status { color: #8b949e; font-size: 12px; margin-left: auto; }
#format-toolbar { position: fixed; display: none; background: #1c2128; border: 1px solid #444c56; border-radius: 8px; padding: 4px 6px; gap: 2px; align-items: center; z-index: 500; box-shadow: 0 4px 16px rgba(0,0,0,0.5); }
#format-toolbar button { background: none; border: none; color: #cdd9e5; padding: 4px 8px; border-radius: 5px; cursor: pointer; font-size: 13px; line-height: 1; }
#format-toolbar button:hover { background: #373e47; }
#format-toolbar .sep { width: 1px; height: 16px; background: #444c56; margin: 0 2px; }
</style>
</head>
<body>

  <div style="display:flex;align-items:center;gap:4px;margin-left:8px;border-left:1px solid #30363d;padding-left:12px;">
    <button onclick="zoomOut()" title="Ctrl+-" style="padding:6px 10px;">−</button>

    <button onclick="zoomIn()" title="Ctrl+=" style="padding:6px 10px;">+</button>
  </div>
  <span class="status" id="status">Ready</span>
</div>

  {
    "type": "html",

    "y": 115,
    "w": 550,
    "html": "\r\n\t\t\t<ul>\r\n\t\t\t\t<p lang=\"ko-KR\" style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">그냥<span lang=\"en-US\"> </span>사<span lang=\"en-US\">, 5월 말 이전까지 종부세 회피하려 매도하는 물량이 1~2월에 나올 것이다.</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">12월에 임장 열심히 다니기</p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p lang=\"ko-KR\" style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">목표<span lang=\"en-US\">: </span>신고가아닌<span lang=\"en-US\"> </span>주택<span lang=\"en-US\"> </span>혹은<span lang=\"en-US\"> </span>이전<span lang=\"en-US\"> </span>신고가와<span lang=\"en-US\"> </span>동일한<span lang=\"en-US\"> </span>가격의<span lang=\"en-US\"> </span>마포<span lang=\"en-US\">/</span>성동구<span lang=\"en-US\"> </span>아파트<span lang=\"en-US\">(</span>아현<span lang=\"en-US\">, </span>공덕<span lang=\"en-US\">/ </span>금호<span lang=\"en-US\">, </span>상왕립리<span lang=\"en-US\">, </span>성수<span lang=\"en-US\">)</span></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p lang=\"ko-KR\" style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">요건<span lang=\"en-US\"> </span>정리</p>\r\n\t\t\t\t<p lang=\"ko-KR\" style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><a href=\"https://www.youtube.com/watch?v=quJfd11ISDE\">&quot;</a>서울 2040년까지 오릅니다&quot; 무주택 1주택 이렇게 하세요 [고종완 원장 4부]</p>\r\n\t\t\t\t<p lang=\"ko-KR\" style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">직주근접<span lang=\"en-US\">: </span>용산<span lang=\"en-US\">, </span>아현<span lang=\"en-US\">, </span>공덕<span lang=\"en-US\">, </span>성수<span lang=\"en-US\">, </span>옥수</p>\r\n\t\t\t\t<p lang=\"ko-KR\" style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">신축<span lang=\"en-US\">(10</span>년<span lang=\"en-US\"> </span>언더<span lang=\"en-US\">) 25</span>평<span lang=\"en-US\"> &gt; </span>구축<span lang=\"en-US\"> 35</span>평<span lang=\"en-US\">, </span>최소<span lang=\"en-US\"> 300</span>세대<span lang=\"en-US\"> </span>이상</p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">14<span lang=\"ko-KR\">억</span>~(<span lang=\"ko-KR\">영끌</span> 9<span lang=\"ko-KR\">억</span> + <span lang=\"ko-KR\">전세</span>)</p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">15<span lang=\"ko-KR\">년</span> <span lang=\"ko-KR\">이후</span> <span lang=\"ko-KR\">아파트</span></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p lang=\"ko-KR\" style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">갭투자<span lang=\"en-US\"> </span>가능<span lang=\"en-US\"> </span>아파트</p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">토지거래허가구역 내에서<span lang=\"ko-KR\">&#160;주거지역</span> 6<span lang=\"ko-KR\">㎡</span> <span lang=\"ko-KR\">이하</span>, <span lang=\"ko-KR\">상업지역</span> 15<span lang=\"ko-KR\">㎡</span> <span lang=\"ko-KR\">이하의</span> <span lang=\"ko-KR\">대지</span> <span lang=\"ko-KR\">면적은</span> <span lang=\"ko-KR\">지자체의</span> <span lang=\"ko-KR\">거래</span> <span lang=\"ko-KR\">허가</span> <span lang=\"ko-KR\">대상에서</span> <span lang=\"ko-KR\">제외</span></p>\r\n\t\t\t\t<p lang=\"ko-KR\" data-tag=\"to-do\" style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">강동구 ‘강동래미안팰리스’</p>\r\n\t\t\t\t<p lang=\"ko-KR\" data-tag=\"to-do\" style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">강남구 타워팰리스, 여의도 브라이튼 등 고급 주상복합의 일부 소형 평형은 규제에서 빠진 반면 성동구 하왕십리동 ‘센트라스’는 전체 30개 동 중 상업지역 내 4개 동(전용 44㎡&#183;59㎡)만 규제를 피했다.</p>\r\n\t\t\t\t<p lang=\"ko-KR\" data-tag=\"to-do\" style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">래미안서초유니빌, 영등포 대우트럼프월드, 송파 갤러리아팰리스, 마포 한화오벨리스크, 동대문 청량리역 롯데캐슬 SKY-L65 등도 같은 사례다.</p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p lang=\"ko-KR\" data-tag=\"to-do\" style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><a href=\"https://youtu.be/fkYLIUcUwhw\">규제</a><span lang=\"en-US\"> </span>이후<span lang=\"en-US\"> </span>급매<span lang=\"en-US\"> </span>건<span lang=\"en-US\"> </span>잡기</p>\r\n\t\t\t\t<p lang=\"ko-KR\" data-tag=\"to-do\" style=\"font-family:Pretendard Light;font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><a href=\"https://blog.naver.com/gupzip4/223211739801\">급매</a><span lang=\"en-US\"> </span>찾기<span lang=\"en-US\"> </span>서비스</p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-family:Pretendard Light;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">래미안석관￼래미안 라센트</p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p lang=\"ko-KR\" data-tag=\"to-do\" style=\"font-family:Pretendard Light;font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><a href=\"https://www.perplexity.ai/search/sijung-eunhaeng-hyeonjae-sinyo-oUu6v6XbRuS5CI.4etFSwQ\">은행별</a><span lang=\"en-US\"> </span>모바일<span lang=\"en-US\"> </span>대출<span lang=\"en-US\"> </span>금리<span lang=\"en-US\">, </span>상한<span lang=\"en-US\"> </span>리스트업<span lang=\"en-US\"> + im</span>뱅크</p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p lang=\"ko-KR\" style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">프로세스</p>\r\n\t\t\t\t<p lang=\"ko-KR\" data-tag=\"to-do:completed\" style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">가용<span lang=\"en-US\"> </span>금액<span lang=\"en-US\"> </span>산출</p>\r\n\t\t\t\t<p lang=\"ko-KR\" data-tag=\"to-do\" style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">이사<span lang=\"en-US\"> </span>준비</p>\r\n\t\t\t\t<p lang=\"ko-KR\" data-tag=\"to-do\" style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">집주인<span lang=\"en-US\"> </span>보증금<span lang=\"en-US\"> </span>이야기하기</p>\r\n\t\t\t\t<p lang=\"ko-KR\" data-tag=\"to-do\" style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">내<span lang=\"en-US\"> </span>전세<span lang=\"en-US\">/</span>월세집<span lang=\"en-US\"> </span>구하기<span lang=\"en-US\"> - </span>노원에<span lang=\"en-US\"> </span>얹혀살까</p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p lang=\"ko-KR\" style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">조언<span lang=\"en-US\"> </span>받을<span lang=\"en-US\"> </span>사람</p>\r\n\t\t\t\t<p lang=\"en-US\" data-tag=\"to-do\" style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">GPT</p>\r\n\t\t\t\t<p lang=\"ko-KR\" data-tag=\"to-do\" style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">박영규</p>\r\n\t\t\t\t<p lang=\"ko-KR\" data-tag=\"to-do\" style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">큰이모</p>\r\n\t\t\t\t<p lang=\"ko-KR\" data-tag=\"to-do\" style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">유광희</p>\r\n\t\t\t\t<p lang=\"ko-KR\" data-tag=\"to-do\" style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">광태<span lang=\"en-US\"> </span>팀장님<span lang=\"en-US\">?</span></p>\r\n\t\t\t\t<p lang=\"ko-KR\" data-tag=\"to-do\" style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">민구형<span lang=\"en-US\"> </span>영규<span lang=\"en-US\">, </span>건영이형<span lang=\"en-US\">  </span>등<span lang=\"en-US\"> </span>회사<span lang=\"en-US\"> </span>동기들</p>\r\n\t\t\t\t<p lang=\"ko-KR\" data-tag=\"to-do\" style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">윤용</p>\r\n\t\t\t\t<p lang=\"ko-KR\" data-tag=\"to-do\" style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">최현경</p>\r\n\t\t\t\t<p lang=\"ko-KR\" data-tag=\"to-do\" style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">강인혁</p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<br />\r\n\t\t\t\t<p lang=\"ko-KR\" style=\"font-family:Pretendard Light;font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">유석님</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">추천</span></p>\r\n\t\t\t\t<p lang=\"ko-KR\" data-tag=\"to-do\" style=\"font-family:Pretendard Light;font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Pretendard Thin\">충정로</span><span lang=\"en-US\" style=\"font-family:Pretendard Thin\"> </span><span style=\"font-family:Pretendard Thin\">삼성사이버빌리지</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-family:Pretendard Light;font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Pretendard Thin\"> 옥수 삼성</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-family:Pretendard Light;font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Pretendard Thin\"> 신당 약수 하이츠</span></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p lang=\"ko-KR\" style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">아파트실거래가<span lang=\"en-US\"> </span>아실</p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p lang=\"ko-KR\" style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">네이버<span lang=\"en-US\">/</span>호갱노노에서<span lang=\"en-US\"> </span>가격이<span lang=\"en-US\"> </span>이미<span lang=\"en-US\"> </span>오른<span lang=\"en-US\"> </span>단지는<span lang=\"en-US\"> 5</span>천은<span lang=\"en-US\"> </span>깍고<span lang=\"en-US\"> </span>들어가야한다<span lang=\"en-US\">.(</span>전고점<span lang=\"en-US\"> </span>넘은<span lang=\"en-US\"> </span>단지<span lang=\"en-US\">)</span></p>\r\n\t\t\t\t<p lang=\"ko-KR\" style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">안오른<span lang=\"en-US\"> </span>단지들은<span lang=\"en-US\"> </span>잘<span lang=\"en-US\"> </span>안깍아준다<span lang=\"en-US\">.</span></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p lang=\"ko-KR\" style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">위치<span lang=\"en-US\">, </span>교통<span lang=\"en-US\">, </span>환경<span lang=\"en-US\">, </span>학군에<span lang=\"en-US\"> </span>따라<span lang=\"en-US\"> </span>가치를<span lang=\"en-US\"> </span>평가하고</p>\r\n\t\t\t\t<p lang=\"ko-KR\" style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">롱<span lang=\"en-US\"> </span>리스트를<span lang=\"en-US\"> </span>최대한<span lang=\"en-US\"> </span>넓혀야만<span lang=\"en-US\"> </span>한다<span lang=\"en-US\">.</span></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<br />\r\n\t\t\t\t<br />\r\n\t\t\t\t<p lang=\"ko-KR\" style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">&#160;</p>\r\n\t\t\t\t<p lang=\"ko-KR\" style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">&#160;1. 전세 낀 매물을 보시는 것도 좋습니다.&#160;</p>\r\n\t\t\t\t<p lang=\"ko-KR\" style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">&#160;</p>\r\n\t\t\t\t<p lang=\"ko-KR\" style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">전세 낀 물건의 만기가 길지 않게 남았다면,&#160;</p>\r\n\t\t\t\t<p lang=\"ko-KR\" style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">세입자에게 실거주 의사를 밝히고</p>\r\n\t\t\t\t<p lang=\"ko-KR\" style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">잔금 일정을 매도자와 협의해서&#160;</p>\r\n\t\t\t\t<p lang=\"ko-KR\" style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">진행하는 것도 좋은 방법이라고 생각합니다.</p>\r\n\t\t\t\t<p lang=\"ko-KR\" style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">&#160;</p>\r\n\t\t\t\t<p lang=\"ko-KR\" style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">* 계약갱신청구권 거절 가능한 경우 :&#160;</p>\r\n\t\t\t\t<p lang=\"ko-KR\" style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">만기 2개월 전에 매수자가 실거주 의사를 밝히면 거절 할 수 있습니다.</p>\r\n\t\t\t\t<p lang=\"ko-KR\" style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">&#160;</p>\r\n\t\t\t\t<p lang=\"ko-KR\" style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">갈아타기 수요가 있고</p>\r\n\t\t\t\t<p lang=\"ko-KR\" style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">가고 싶은 단지가 있는 경우,&#160;</p>\r\n\t\t\t\t<p lang=\"ko-KR\" style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">특히 그 단지의 가격이 계속 오르는 상황이라면</p>\r\n\t\t\t\t<p lang=\"ko-KR\" style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">조금 싸게라도 빨리 팔고 이동하시려는 분들도 계시긴 합니다.</p>\r\n\t\t\t\t<p lang=\"ko-KR\" style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">&#160;</p>\r\n\t\t\t\t<p lang=\"ko-KR\" style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">&#160;</p>\r\n\t\t\t\t<p lang=\"ko-KR\" style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">이런 물건을 찾았다면</p>\r\n\t\t\t\t<p lang=\"ko-KR\" style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">적극적으로 매도자 분이 원하는 것을 드리면서</p>\r\n\t\t\t\t<p lang=\"ko-KR\" style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">가격을 협상해볼 수 있습니다.</p>\r\n\t\t\t\t<p lang=\"ko-KR\" style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">&#160;</p>\r\n\t\t\t\t<p lang=\"ko-KR\" style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">&#160;</p>\r\n\t\t\t\t<p lang=\"ko-KR\" style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">여기서 제일 중요한 것은,</p>\r\n\t\t\t\t<p lang=\"ko-KR\" style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">‘매도자 분이 원하는 것을 드리는 것’입니다.</p>\r\n\t\t\t\t<p lang=\"ko-KR\" style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">&#160;</p>\r\n\t\t\t\t<p lang=\"ko-KR\" style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">&#160;</p>\r\n\t\t\t\t<p lang=\"ko-KR\" style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">협상의 기본은</p>\r\n\t\t\t\t<p lang=\"ko-KR\" style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">상대가 원하는 것을 알고</p>\r\n\t\t\t\t<p lang=\"ko-KR\" style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">그것을 해결해주는 것입니다.</p>\r\n\t\t\t\t<p lang=\"ko-KR\" style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">&#160;</p>\r\n\t\t\t\t<p lang=\"ko-KR\" style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">그러면서 내가 원하는 것을</p>\r\n\t\t\t\t<p lang=\"ko-KR\" style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">얻는 것입니다.</p>\r\n\t\t\t\t<p lang=\"ko-KR\" style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">&#160;</p>\r\n\t\t\t\t<p lang=\"ko-KR\" style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">&#160;</p>\r\n\t\t\t\t<p lang=\"ko-KR\" style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">그러니 꼭 매도자가 원하는 것을 해결해주고</p>\r\n\t\t\t\t<p lang=\"ko-KR\" style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">내가 원하는 것(가격을 깎는 것)을 시도해보시면 좋겠습니다.</p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<br />\r\n\t\t\t\t<p lang=\"ko-KR\" style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">본인이 생각했을 때,&#160;</p>\r\n\t\t\t\t<p lang=\"ko-KR\" style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">10년 정도 보유한다면&#160;</p>\r\n\t\t\t\t<p lang=\"ko-KR\" style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">이 가격을 다시 보기 어렵겠다고 생각된다면&#160;</p>\r\n\t\t\t\t<p lang=\"ko-KR\" style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">&#160;</p>\r\n\t\t\t\t<p lang=\"ko-KR\" style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">그것은 충분히 싼 가격이라고 생각하시면 됩니다.</p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p lang=\"ko-KR\" style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><a href=\"https://weolbu.com/community/3471756/%EB%B9%88%EC%93%B0-%EC%95%89%EC%9D%80-%EC%9E%90%EB%A6%AC%EC%97%90%EC%84%9C-4%EC%96%B5-%EC%98%AC%EB%A6%B0%EB%8B%A4%EB%8A%94-%EC%8B%9C%EC%9E%A5%EC%97%90%EC%84%9C-%EC%8B%B8%EA%B2%8C-%EC%82%AC%EB%8A%94-%EB%B0%A9%EB%B2%95%ED%98%91%EC%83%81%EC%9D%80-%EA%BC%AD-%EC%9D%B4%EB%A0%87%EA%B2%8C-%ED%95%98%EC%84%B8%EC%9A%94?inviteCode=FC460D&amp;utm_source=user_share&amp;utm_medium=referral&amp;utm_campaign=user_share_button\">https://weolbu.com/community/3471756/%EB%B9%88%EC%93%B0-%EC%95%89%EC%9D%80-%EC%9E%90%EB%A6%AC%EC%97%90%EC%84%9C-4%EC%96%B5-%EC%98%AC%EB%A6%B0%EB%8B%A4%EB%8A%94-%EC%8B%9C%EC%9E%A5%EC%97%90%EC%84%9C-%EC%8B%B8%EA%B2%8C-%EC%82%AC%EB%8A%94-%EB%B0%A9%EB%B2%95%ED%98%91%EC%83%81%EC%9D%80-%EA%BC%AD-%EC%9D%B4%EB%A0%87%EA%B2%8C-%ED%95%98%EC%84%B8%EC%9A%94?inviteCode=FC460D&amp;utm_source=user_share&amp;utm_medium=referral&amp;utm_campaign=user_share_button</a></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<br />\r\n\t\t\t\t<p lang=\"ko-KR\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:pretendard;color:#838180;background-color:#191a1a\">과</span><span lang=\"en-US\" style=\"font-family:pretendard;color:#838180;background-color:#191a1a\">거 폭등장이후&#160; 규제상황을 정리해 보겠습니다.</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:pretendard;color:#838180;background-color:#191a1a\">&#160;</span></p>\r\n\t\t\t\t<table style=\"border:1px solid;border-collapse:collapse\">\r\n\t\t\t\t\t<tr>\r\n\t\t\t\t\t\t<td style=\"border:1px solid\"><span lang=\"en-US\"><span style=\"font-family:Malgun Gothic;font-weight:bold\">시기</span></span></td>\r\n\t\t\t\t\t\t<td style=\"border:1px solid\"><p lang=\"en-US\" style=\"margin-top 요를 틀어막는 정책과/&#160;</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:pretendard;color:#838180;background-color:#191a1a;font-weight:bold\">이미 보유한 사람들에게는</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:pretendard;color:#838180;background-color:#191a1a;font-weight:bold\">세금이라는 부분에거 규제가 들어왔습니다.</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:pretendard;color:#838180;background-color:#191a1a\">&#160;</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:pretendard;color:#838180;background-color:#191a1a;font-weight:bold\">그럼에도 불구하고 2번 3번구간.&#160;</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:pretendard;color:#838180;background-color:#191a1a;font-weight:bold\">문제인정부+코로나까지 물리면서</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:pretendard;color:#838180;background-color:#191a1a\">&#160;</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:pretendard;color:#838180;background-color:#191a1a;font-weight:bold\">유동성폭발과 사람들의 심리가 시장을 이기면서</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:pretendard;color:#838180;background-color:#191a1a;font-weight:bold\">폭발적인 가격상승을 만들어냅니다.</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:pretendard;color:#838180;background-color:#191a1a\">&#160;</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:pretendard;color:#838180;background-color:#191a1a;font-weight:bold\">지금 이시장에 있는 사람들은</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:pretendard;color:#838180;background-color:#191a1a;font-weight:bold\">우리의 시장이 2번~3번이 될꺼라고 생각을 하죠</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:pretendard;color:#838180;background-color:#191a1a\">&#160;</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:pretendard;color:#838180;background-color:#191a1a;font-weight:bold\">하지만 잊지말야아하는 부분은</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:pretendard;color:#838180;background-color:#191a1a;font-weight:bold\">3번과 4번도 기다리고 있다는겁니다</span><span style=\"font-family:pretendard;color:#838180;background-color:#191a1a\">.</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:pretendard;color:#838180;background-color:#191a1a\">&#160;</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:pretendard;color:#838180;background-color:#191a1a\">&#160;</span></p>\r\n\t\t\t\t<div style=\"display:inline-block;width:360px;height:600px;background:#2d333b;border-radius:4px;margin:2px;vertical-align:top;opacity:0.4\"></div>\r\n\t\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:pretendard;color:#838180;background-color:#191a1a\">&#160;</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:pretendard;color:#838180;background-color:#191a1a\">&#160;</span></p>\r\n\t\t\t\t<p lang=\"ko-KR\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:pretendard;color:#0e3391;background-color:#191a1a;font-weight:bold\">그럼 우리는 3번과 4번을 생각하면서&#160;</span></p>\r\n\t\t\t\t<p lang=\"ko-KR\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:pretendard;color:#0e3391;background-color:#191a1a;font-weight:bold\">시장에 참여 하고 있는가? 를 돌아봐야 할때 입니다.</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:pretendard;color:#838180;background-color:#191a1a\">&#160;</span></p>\r\n\t\t\t\t<p lang=\"ko-KR\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:pretendard;color:#0e3391;background-color:#191a1a;font-weight:bold\">이부분은 말로만 이해하고 있어요! 가 아닌</span></p>\r\n\t\t\t\t<p lang=\"ko-KR\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:pretendard;color:#0e3391;background-color:#191a1a;font-weight:bold\">내가 산가격에서 15~30% 빠진다고 하더라도</span></p>\r\n\t\t\t\t<p lang=\"ko-KR\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:pretendard;color:#0e3391;background-color:#191a1a;font-weight:bold\">감당할수있는지를 물어봐야합니다.</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:pretendard;color:#838180;background-color:#191a1a\">&#160;</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:pretendard;color:#838180;background-color:#191a1a\">실제 2023년의 경우는</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:pretendard;color:#838180;background-color:#191a1a\">전고점대비 30%이상 빠졌으니깐요.</span></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:pretendard;font-size:18pt;color:#838180;background-color:#191a1a;font-weight:bold\">&#160;</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:pretendard;color:#838180;background-color:#191a1a\">그럼 이런 시장에서 ‘살아남는’ 방법은 뭘까요?</span></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:pretendard;color:#838180;background-color:#191a1a\">단순히 호가만 쳐다보며 불안해하지 말고,&#160;</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:pretendard;color:#838180;background-color:#191a1a\">스스로 점검하고 준비하면서 나아가야 합니다.</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:pretendard;color:#838180;background-color:#191a1a\">&#160;</span></p>\r\n\t\t\t\t<p lang=\"ko-KR\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:pretendard;font-size:13.5pt;color:#161d30;background-color:#ffe2bd;font-weight:bold\">가격이 흔들려도 버틸 수 있는가</span></p>\r\n\t\t\t\t<p lang=\"ko-KR\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:pretendard;font-size:13.5pt;color:#161d30;background-color:#ffe2bd;font-weight:bold\">&#160;— 자신의 ‘내성’을 점검해아합니다</span><span style=\"font-family:pretendard;font-size:13.5pt;color:#380b05;background-color:#ffe2bd;font-weight:bold\">.</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:pretendard;color:#838180;background-color:#191a1a\">&#160;</span></p>\r\n\t\t\t\t<li><span lang=\"en-US\"><span style=\"font-family:pretendard;color:#838180;background-color:#191a1a;font-weight:bold\">보유 부담(세금, 관리비, 수리비 등)의 상한선을 미리 정해두세요</span><span style=\"font-family:pretendard;color:#838180;background-color:#191a1a;font-weight:bold\">￼</span><span style=\"font-family:pretendard;color:#838180;background-color:#191a1a\">&#160;</span></span></li>\r\n\t\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:pretendard;color:#838180;background-color:#191a1a\">저의 경우에는 세금관련해서&#160;</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:pretendard;color:#838180;background-color:#191a1a\">연간 0얼마까지는 감당가능하다</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:pretendard;color:#838180;background-color:#191a1a\">라는것들을 배우자와 상의를 했습니다.</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:pretendard;color:#838180;background-color:#191a1a\">이런시간들이 만들어져야.</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:pretendard;color:#838180;background-color:#191a1a\">막연히 세금규제 나온데!!어떡하지?</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:pretendard;color:#838180;background-color:#191a1a\">라는 감정적인 걱정에서 벗어날수 있습니다.</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:pretendard;color:#838180;background-color:#191a1a\">&#160;</span></p>\r\n\t\t\t\t<li><span lang=\"en-US\"><span style=\"font-family:pretendard;color:#838180;background-color:#191a1a;font-weight:bold\">생활비&#183;비상금까지 포함한&#160;</span><span style=\"font-family:pretendard;color:#838180;background-color:#191a1a;font-weight:bold\">￼</span><span style=\"font-family:pretendard;color:#838180;background-color:#191a1a;font-weight:bold\">전체 가계 포트폴리오에서 주거가 차지하는 비중을 체크</span><span style=\"font-family:pretendard;color:#838180;background-color:#191a1a;font-weight:bold\">￼</span><span style=\"font-family:pretendard;color:#838180;background-color:#191a1a\">&#160;</span></span></li>\r\n\t\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:pretendard;color:#838180;background-color:#191a1a\">최근 본인의 주거지를&#160;</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:pretendard;color:#838180;background-color:#191a1a\">전세에서 월세로 옮기거나, 실거주를</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:pretendard;color:#838180;background-color:#191a1a\">전세로 돌리면서 걱정하는 분들이 많습니다.</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:pretendard;color:#838180;background-color:#191a1a\">&#160;</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:pretendard;color:#838180;background-color:#191a1a\">이럴때는 월세의 2년치 비용 혹은</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:pretendard;color:#838180;background-color:#191a1a\">1년치 비용을 미리 비상금으로</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:pretendard;color:#838180;background-color:#191a1a\">뺴두시면 심리적으로 안정감을 줍니다.</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:pretendard;color:#838180;background-color:#191a1a\">&#160;</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:pretendard;color:#838180;background-color:#191a1a\">저또한 이런식으로 항상 비상금을&#160;</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:pretendard;color:#838180;background-color:#191a1a\">빼두기에, 막연한 불안감에서</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:pretendard;color:#838180;background-color:#191a1a\">조금이라도 안전막을 준비하고 있습니다.</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:pretendard;color:#838180;background-color:#191a1a\">&#160;</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:pretendard;color:#838180;background-color:#191a1a\">&#160;</span></p>\r\n\t\t\t\t<li><span lang=\"en-US\"><span style=\"font-family:pretendard;color:#838180;background-color:#191a1a;font-weight:bold\">만약 급격한 하락이 와도 감내 가능한 수준인지</span><span style=\"font-family:pretendard;color:#838180;background-color:#191a1a;font-weight:bold\">￼</span><span style=\"font-family:pretendard;color:#838180;background-color:#191a1a;font-weight:bold\">&#160;‘최악 시나리오’까지 가정해보세요</span></span></li>\r\n\t\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:pretendard;color:#838180;background-color:#191a1a\">&#160;</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:pretendard;color:#838180;background-color:#191a1a\">여러분들이 지금 매수를 하다면, 아니면 이미 보유하신분들도</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:pretendard;color:#838180;background-color:#191a1a\">시물레이션을 돌려보세요.</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:pretendard;color:#838180;background-color:#191a1a\">&#160;</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:pretendard;color:#838180;background-color:#191a1a\">전고점 찍은 가격에서&#160;</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:pretendard;color:#838180;background-color:#191a1a\">얼마 떨어졌다!가 아니라,</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:pretendard;color:#838180;background-color:#191a1a\">&#160;</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:pretendard;color:#838180;background-color:#191a1a\">내가 매수한 가격에서 00가 떨어져도 감당한다</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:pretendard;color:#838180;background-color:#191a1a\">라고 스스로 적어두던지, 메모를 남기고,</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:pretendard;color:#838180;background-color:#191a1a\">흔들릴때마다 보면서 마음을 잡으셔야 합니다</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:pretendard;color:#838180;background-color:#191a1a\">&#160;</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:pretendard;color:#838180;background-color:#191a1a\">그래서 위의 그래프에서&#160;</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:pretendard;color:#838180;background-color:#191a1a\">4번 이후의 단계를 얻을수 있습니다.</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:pretendard;color:#838180;background-color:#191a1a\">&#160;</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:pretendard;color:#838180;background-color:#191a1a\">시간을 견디지 않고는 수익은 얻을 수 없습니다.</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:pretendard;color:#838180;background-color:#191a1a\">&#160;</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:pretendard;color:#838180;background-color:#191a1a\">&#160;</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:pretendard;color:#838180;background-color:#191a1a\">&#160;</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:pretendard;color:#838180;background-color:#191a1a\">&#160;</span><span lang=\"ko-KR\" style=\"font-family:pretendard;font-size:13.5pt;color:#161d30;background-color:#ffe2bd;font-weight:bold\">불안하다고 멈추지 말고, 전략적으로 나아가라</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:pretendard;color:#838180;background-color:#191a1a\">&#160;</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:pretendard;color:#838180;background-color:#191a1a\">집이 꼭 필요하다면, 완벽한 타이밍이란 없습니다.</span></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:pretendard;color:#838180;background-color:#191a1a\">시장에는 언제나 두 가지 부류의 사람이 있습니다.</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:pretendard;color:#838180;background-color:#191a1a\">‘떨어질까 봐 못 사는 사람’과&#160;</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:pretendard;color:#838180;background-color:#191a1a\">‘떨어져도 버틸 준비가 된 사람’.</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:pretendard;color:#838180;background-color:#191a1a\">결국 차이는&#160;</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:pretendard;color:#838180;background-color:#191a1a;font-weight:bold\">타이밍이 아니라 준비도</span><span style=\"font-family:pretendard;color:#838180;background-color:#191a1a\">에서 갈립니다.</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:pretendard;color:#838180;background-color:#191a1a\">&#160;</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:pretendard;color:#838180;background-color:#191a1a;font-weight:bold\">입지&#183;균형&#183;수요 기반</span><span style=\"font-family:pretendard;color:#838180;background-color:#191a1a\">이&#160;</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:pretendard;color:#838180;background-color:#191a1a\">탄탄한 지역을 중심으로 검토하세요</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:pretendard;color:#838180;background-color:#191a1a\">&#160;</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:pretendard;color:#838180;background-color:#191a1a\">월부에서 배운 기준</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:pretendard;color:#838180;background-color:#191a1a\">입지에 대한 평가기준을 강의에서 배운&#160;</span></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:pretendard;color:#838180;background-color:#191a1a\">글자로만 아니라&#160;</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:pretendard;color:#838180;background-color:#191a1a\">현장에서 대입하는게 더욱 필요한 시점입니다.</span></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:pretendard;color:#838180;background-color:#191a1a;font-weight:bold\">대부분의 사람들은 머리로는 이해한다고 하지만</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:pretendard;color:#838180;background-color:#191a1a;font-weight:bold\">내돈이 들어가고,&#160;</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:pretendard;color:#838180;background-color:#191a1a;font-weight:bold\">현장의 분위기에 휩쓸리다 보면</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:pretendard;color:#838180;background-color:#191a1a\">&#160;</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:pretendard;color:#838180;background-color:#191a1a;font-weight:bold\">내가 배운기준은 책에서 본 글자로 바뀌는 경우가 너무 많습니다.</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:pretendard;color:#838180;background-color:#191a1a\">&#160;</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:pretendard;color:#838180;background-color:#191a1a;font-weight:bold\">이럴때일수록 기준을 지키는게 중요합니다.</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:pretendard;color:#838180;background-color:#191a1a\">&#160;</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:pretendard;color:#838180;background-color:#191a1a;font-weight:bold\">사람들의 수요가 있는곳을 찾는게 핵심입니다</span><span style=\"font-family:pretendard;color:#838180;background-color:#191a1a\">.</span></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:pretendard;color:#838180;background-color:#191a1a\">&#160;</span></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:pretendard;color:#838180;background-color:#191a1a\">불안은 누구에게나 찾아옵니다.</span></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:pretendard;color:#838180;background-color:#191a1a\">하지만 방향을 잃는 건</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:pretendard;color:#838180;background-color:#191a1a;font-weight:bold\">불안 때문이 아니라, 준비가 없기 때문</span><span style=\"font-family:pretendard;color:#838180;background-color:#191a1a\">이에요.</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:pretendard;color:#838180;background-color:#191a1a\">&#160;</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:pretendard;color:#838180;background-color:#191a1a\">지금 시장이 흔들리는 이유는 단순히 가격 때문이 아닙니다.</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:pretendard;color:#838180;background-color:#191a1a\">사람들의</span><span lang=\"ko-KR\" style=\"font-family:pretendard;color:#838180;background-color:#191a1a\">&#160;</span><span lang=\"ko-KR\" style=\"font-family:pretendard;color:#838180;background-color:#191a1a;font-weight:bold\">심리가 요동치고 있기 때문</span><span style=\"font-family:pretendard;color:#838180;background-color:#191a1a\">이에요.</span></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:pretendard;color:#838180;background-color:#191a1a\">그러다 보니</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:pretendard;color:#838180;background-color:#191a1a\">뉴스 헤드라인 한 줄,&#160;</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:pretendard;color:#838180;background-color:#191a1a\">커뮤니티의 글 하나에도 마음이 오르락내리락하죠.</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:pretendard;color:#838180;background-color:#191a1a\">하지만 그럴수록</span><span lang=\"ko-KR\" style=\"font-family:pretendard;color:#838180;background-color:#191a1a\">&#160;</span><span lang=\"ko-KR\" style=\"font-family:pretendard;color:#838180;background-color:#191a1a;font-weight:bold\">나만의 기준과 속도</span><span style=\"font-family:pretendard;color:#838180;background-color:#191a1a\">가 필요합니다.</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:pretendard;color:#838180;background-color:#191a1a\">&#160;</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:pretendard;color:#838180;background-color:#191a1a\">&#160;</span></p>\r\n\t\t\t\t<li style=\"margin-top:1.5pt;margin-bottom:1.5pt\"><span lang=\"en-US\"><span style=\"font-family:pretendard;color:#838180;background-color:#191a1a\">내 자금 흐름을 정리하고,</span></span></li>\r\n\t\t\t\t<li style=\"margin-top:1.5pt;margin-bottom:1.5pt\"><span lang=\"en-US\"><span style=\"font-family:pretendard;color:#838180;background-color:#191a1a\">내가 살고싶은 집은 더욱 현장을 가까이 하고</span></span></li>\r\n\t\t\t\t<li style=\"margin-top:1.5pt;margin-bottom:1.5pt\"><span lang=\"en-US\"><span style=\"font-family:pretendard;color:#838180;background-color:#191a1a\">금리가 변해도 버틸 수 있는지 계산하고,</span></span></li>\r\n\t\t\t\t<li style=\"margin-top:1.5pt;margin-bottom:1.5pt\"><span lang=\"en-US\"><span style=\"font- const CONTENT_HASH = '7a35eb94';

let cards = [];
let moving = null, resizing = null;
let selectedIdx = null, clipboardCard = null;
const GRID = 20, GAP = 14;
function snap(v) { return Math.round(v / GRID) * GRID; }

// ── Undo (Ctrl+Z) ────────────────────────────────────────────────────────────
const MAX_HISTORY = 50;
let history = [];
function snapshot() {
  syncText();
  history.push(JSON.stringify(cards));
  if (history.length > MAX_HISTORY) history.shift();
}
function undo() {
  if (!history.length) { showStatus('되돌릴 내용 없음'); return; }
  syncText();
  cards = JSON.parse(history.pop());
  renderCards();
  saveBoard();
  showStatus('↩ 되돌림');
}
function showStatus(msg) {
  const s = document.getElementById('status');
  s.textContent = msg;
  clearTimeout(showStatus._t);
  showStatus._t = setTimeout(() => { s.textContent = ''; }, 2000);
}
document.addEventListener('keydown', e => {
  const isText = document.activeElement?.contentEditable === 'true';
  if ((e.ctrlKey || e.metaKey) && e.key === 'z' && !e.shiftKey) {
    if (isText) return;
    e.preventDefault();
    undo();
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'c' && !e.shiftKey && !isText) {
    if (selectedIdx !== null && cards[selectedIdx]) {
      syncText();
      clipboardCard = JSON.parse(JSON.stringify(cards[selectedIdx]));
      showStatus('카드 복사됨');
      e.preventDefault();
    }
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'v' && !e.shiftKey && !isText) {
    if (clipboardCard) {
      e.preventDefault();
      snapshot();
      const nc = JSON.parse(JSON.stringify(clipboardCard));
      nc.x = (nc.x || 0) + 30; nc.y = (nc.y || 0) + 30;
      cards.push(nc);
      selectedIdx = cards.length - 1;
      renderCards(); saveBoard();
      showStatus('카드 붙여넣음');
    }
  }
  if (e.key === 'Escape') {
    document.querySelectorAll('.card.selected').forEach(c => c.classList.remove('selected'));
    selectedIdx = null;
  }
});

  const moved = cards[movedIdx];
  const movedEl = document.querySelector(`.card[data-idx="${movedIdx}"]`);
  if (!movedEl) return;
  const mh = movedEl.offsetHeight;
  document.querySelectorAll('.card').forEach(el => {
    const i = +el.dataset.idx;
    if (i === movedIdx) return;
    const c = cards[i], oh = el.offsetHeight;
    if (moved.x < (c.x+(c.w||200)) && (moved.x+(moved.w||200)) > c.x && moved.y < (c.y+oh) && (moved.y+mh) > c.y) {
      c.y = moved.y + mh + GAP;
      el.style.top = c.y + 'px';
    }
  });
}

function loadBoard() {
  const saved = localStorage.getItem(SAVE_KEY);
  const savedHash = localStorage.getItem(SAVE_KEY + ':hash');
  let parsed = null;
  try { parsed = saved ? JSON.parse(saved) : null; } catch(e) {}
  // reset if: no save, empty array, or content hash changed (page regenerated)
  if (!parsed || parsed.length === 0 || savedHash !== CONTENT_HASH) {
    cards = DEFAULT_CARDS.map(c => ({...c}));
    localStorage.removeItem(SAVE_KEY);
    localStorage.setItem(SAVE_KEY + ':hash', CONTENT_HASH);
    renderCards();
    const hasCoords = cards.some(c => c.x !== undefined && c.y !== undefined);
    if (!hasCoords) autoLayout();
    return;
  }
  cards = parsed;
  renderCards();
}
function resetToDefaults() { if (!confirm('저장된 보드를 지우고 원본으로 초기화합니다. 계속할까요?')) return; localStorage.removeItem(SAVE_KEY); cards = DEFAULT_CARDS.map(c => ({...c})); renderCards(); autoLayout(); }

function autoLayout() {
  const boardW = document.getElementById('board').offsetWidth;
  const cols = Math.max(1, Math.floor(boardW / 280));
  const colW = (boardW - GAP*(cols-1)) / cols;
  const colH = new Array(cols).fill(0);
  const allCards = document.querySelectorAll('.card');
  const images = document.querySelectorAll('.card img');
  let loaded = 0;
  function place() {
    allCards.forEach((el, i) => {
      const w = Math.min(cards[i].w || colW, colW);
      let minCol = 0;
      for (let c = 1; c < cols; c++) if (colH[c] < colH[minCol]) minCol = c;
      cards[i].x = minCol * (colW + GAP);
      cards[i].y = colH[minCol];
      cards[i].w = w;
      el.style.left = cards[i].x + 'px';
      el.style.top = cards[i].y + 'px';
      el.style.width = w + 'px';
      colH[minCol] = cards[i].y + el.offsetHeight + GAP;
    });
    document.getElementById('board').style.minHeight = (Math.max(...colH) + 100) + 'px';
    saveBoard();
  }
  if (!images.length) { requestAnimationFrame(place); return; }
  images.forEach(img => {
    if (img.complete) { loaded++; if (loaded >= images.length) requestAnimationFrame(place); }
    else { img.onload = img.onerror = () => { loaded++; if (loaded >= images.length) requestAnimationFrame(place); }; }
  });
}

function syncText() {
  document.querySelectorAll('.card').forEach(el => {
    const i = +el.dataset.idx;
    if (cards[i]?.type === 'text') { const t = el.querySelector('.text'); if (t) cards[i].content = t.innerHTML; }
  });
}
function saveBoard() { syncText(); localStorage.setItem(SAVE_KEY, JSON.stringify(cards)); localStorage.setItem(SAVE_KEY + ':hash', CONTENT_HASH); showStatus('저장됨 ' + new Date().toLocaleTimeString()); }

function renderCards() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  cards.forEach((card, i) => {
    const el = document.createElement('div');
    el.className = 'card'; el.dataset.idx = i;
    if (card.x !== undefined) el.style.left = card.x + 'px';
    if (card.y !== undefined) el.style.top = card.y + 'px';
    // html cards contain raw OneNote table HTML which may overflow the stated div width
    if (card.w) { if (card.type === 'html') el.style.minWidth = card.w + 'px'; else el.style.width = card.w + 'px'; }
    el.addEventListener('mousedown', e => {
      if (e.target.closest('.text, a, .card-btn, .resize-handle, td, th')) return;
      e.preventDefault();
      // Update selection
      document.querySelectorAll('.card.selected').forEach(c => c.classList.remove('selected'));
      selectedIdx = i; el.classList.add('selected');
      snapshot();
      moving = { idx: i, startX: e.clientX, startY: e.clientY, origX: card.x||0, origY: card.y||0 };
      el.classList.add('moving');
    });
    const actions = document.createElement('div'); actions.className = 'card-actions';
    const delBtn = document.createElement('button'); delBtn.className = 'card-btn'; delBtn.textContent = '×';
    delBtn.onclick = e => { e.stopPropagation(); if(confirm('삭제?')) { snapshot(); cards.splice(i,1); renderCards(); saveBoard(); } };
    actions.appendChild(delBtn); el.appendChild(actions);
    if (card.type === 'text') {
      const text = document.createElement('div'); text.className = 'text'; text.contentEditable = true;
      text.innerHTML = card.content || '';
      text.addEventListener('focus', () => { snapshot(); });
      text.addEventListener('blur', () => { card.content = text.innerHTML; saveBoard(); });
      el.appendChild(text);
    } else if (card.type === 'image') {
      const img = document.createElement('img');
      img.src = card.src.startsWith('http') || card.src.startsWith('data:') ? card.src : IMG_BASE + card.src;
      img.alt = ''; img.loading = 'lazy'; img.onerror = () => img.style.display = 'none';
      if (card.w) img.style.width = card.w + 'px';
      if (card.h) img.style.height = card.h + 'px';
      if (card.link) { const a = document.createElement('a'); a.href = card.link; a.target = '_blank'; a.appendChild(img); el.appendChild(a); }
      else { el.appendChild(img); }
      if (card.caption) { const cap = document.createElement('div'); cap.style.cssText = 'font-size:11px;color:#8b949e;margin-top:4px;word-break:break-word;padding:0 2px;'; cap.textContent = card.caption; el.appendChild(cap); }
    } else if (card.type === 'html') {
      const wrapper = document.createElement('div');
      wrapper.style.cssText = 'overflow:auto;font-size:13px;line-height:1.5;';
      wrapper.innerHTML = card.html.replace(/__ATTACHMENT__/g, IMG_BASE);
      wrapper.querySelectorAll('img').forEach(img => { img.style.maxWidth = '100%'; img.style.height = 'auto'; img.draggable = false; });
      wrapper.querySelectorAll('a').forEach(a => { a.target = '_blank'; a.style.color = '#6cb0f6'; });
      wrapper.querySelectorAll('table').forEach(t => { t.style.borderCollapse = 'collapse'; });
      wrapper.querySelectorAll('td,th').forEach(td => {
        td.style.border = '1px solid #444'; td.style.padding = '4px 6px'; td.style.verticalAlign = 'top';
        td.title = '더블클릭으로 편집';
        td.addEventListener('dblclick', function(e) {
          e.stopPropagation();
          snapshot();
          this.contentEditable = 'true';
          this.style.outline = '2px solid #388bfd';
          this.style.background = 'rgba(56,139,253,0.08)';
          this.focus();
        });
        td.addEventListener('blur', function() {
          this.contentEditable = 'false';
          this.style.outline = '';
          this.style.background = '';
          cards[i].html = wrapper.innerHTML.split(IMG_BASE).join('__ATTACHMENT__');
          saveBoard();
        });
      });
      el.appendChild(wrapper);
    } else if (card.type === 'table') {
      const rows = card.rows || [['','',''],['','',''],['','','']];
      const tbl = document.createElement('table');
      tbl.style.cssText = 'border-collapse:collapse;width:100%;font-size:13px;';
      rows.forEach((row, ri) => {
        const tr = tbl.insertRow();
        row.forEach((cell, ci) => {
          const td = document.createElement(ri === 0 ? 'th' : 'td');
          td.contentEditable = true;
          td.style.cssText = 'border:1px solid #30363d;padding:4px 8px;min-width:60px;text-align:left;' + (ri===0 ? 'background:#21262d;font-weight:600;' : '');
          td.textContent = cell;
          td.addEventListener('blur', () => { if (!cards[i].rows) cards[i].rows = rows; rows[ri][ci] = td.textContent; saveBoard(); });
          tr.appendChild(td);
        });
      });
      el.appendChild(tbl);
      const addRow = document.createElement('button');
      addRow.textContent = '+ 행'; addRow.style.cssText = 'margin-top:4px;font-size:11px;background:#21262d;border:1px solid #30363d;color:#8b949e;padding:2px 8px;border-radius:4px;cursor:pointer;';
      addRow.onclick = e => { e.stopPropagation(); snapshot(); if (!cards[i].rows) cards[i].rows = rows; cards[i].rows.push(new Array(cards[i].rows[0].length).fill('')); renderCards(); saveBoard(); };
      const addCol = document.createElement('button');
      addCol.textContent = '+ 열'; addCol.style.cssText = 'margin-top:4px;margin-left:4px;font-size:11px;background:#21262d;border:1px solid #30363d;color:#8b949e;padding:2px 8px;border-radius:4px;cursor:pointer;';
      addCol.onclick = e => { e.stopPropagation(); snapshot(); if (!cards[i].rows) cards[i].rows = rows; cards[i].rows.forEach(r => r.push('')); renderCards(); saveBoard(); };
      el.appendChild(addRow); el.appendChild(addCol);
    }
    const rh = document.createElement('div'); rh.className = 'resize-handle';
    rh.addEventListener('mousedown', e => { e.preventDefault(); e.stopPropagation(); snapshot(); resizing = { idx: i, startX: e.clientX, startW: card.w || el.offsetWidth }; });
    el.appendChild(rh);
    if (i === selectedIdx) el.classList.add('selected');
    board.appendChild(el);
  });
  requestAnimationFrame(() => {
    let maxB = 0;
    document.querySelectorAll('.card').forEach(el => { const b = (parseFloat(el.style.top)||0) + el.offsetHeight; if (b > maxB) maxB = b; });
    board.style.minHeight = (maxB + 100) + 'px';
  });
}

document.addEventListener('mousemove', e => {
  if (moving) {
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`); if (!el) return;
    let nx = moving.origX + e.clientX - moving.startX, ny = moving.origY + e.clientY - moving.startY;
    if (e.shiftKey) { nx = snap(nx); ny = snap(ny); el.style.outline = '1px dashed rgba(240,192,64,0.3)'; } else { el.style.outline = ''; }
    el.style.left = nx + 'px'; el.style.top = ny + 'px';
  }
  if (resizing) {
    let nw = resizing.startW + e.clientX - resizing.startX; if (e.shiftKey) nw = snap(nw);
    cards[resizing.idx].w = Math.max(100, nw);
    const el = document.querySelector(`.card[data-idx="${resizing.idx}"]`); if (el) el.style.width = cards[resizing.idx].w + 'px';
  }
});

document.addEventListener('mouseup', e => {
  if (moving) {
    let nx = moving.origX + e.clientX - moving.startX, ny = moving.origY + e.clientY - moving.startY;
    if (e.shiftKey) { nx = snap(nx); ny = snap(ny); }
    cards[moving.idx].x = Math.max(0, nx); cards[moving.idx].y = Math.max(0, ny);
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`); if (el) { el.classList.remove('moving'); el.style.outline = ''; }
    if (e.shiftKey) pushCards(moving.idx);
    moving = null; saveBoard();
  }
  if (resizing) { if (e.shiftKey) pushCards(resizing.idx); resizing = null; saveBoard(); }
});

function addTextCard() { snapshot(); cards.push({ type: 'text', content: '', x: 50, y: window.scrollY+100, w: 300 }); renderCards(); setTimeout(() => { const els = document.querySelectorAll('.card .text'); els[els.length-1]?.focus(); }, 100); }
function addImageCard() { const input = document.createElement('input'); input.type = 'file'; input.accept = 'image/*'; input.onchange = e => { const f = e.target.files[0]; if (!f) return; const r = new FileReader(); r.onload = () => { snapshot(); cards.push({ type: 'image', src: r.result, x: 50, y: window.scrollY+100, w: 240 }); renderCards(); saveBoard(); }; r.readAsDataURL(f); }; input.click(); }
function addImageUrl() { const url = prompt('이미지 URL'); if (!url) return; snapshot(); cards.push({ type: 'image', src: url, x: 50, y: window.scrollY+100, w: 240 }); renderCards(); saveBoard(); }
function addTableCard() {
  const colsStr = prompt('열 수 (기본 3)', '3'); const cols = Math.max(1, parseInt(colsStr)||3);
  const rowsStr = prompt('행 수 (헤더 포함, 기본 4)', '4'); const rows = Math.max(1, parseInt(rowsStr)||4);
  snapshot();
  cards.push({ type: 'table', rows: Array.from({length: rows}, (_, ri) => Array.from({length: cols}, (_, ci) => ri===0 ? `열${ci+1}` : '')), x: 50, y: window.scrollY+100, w: Math.max(240, cols*100) });
  renderCards(); saveBoard();
}
function exportBoard() { syncText(); const blob = new Blob([JSON.stringify(cards, null, 2)], { type: 'application/json' }); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = SAVE_KEY + '.json'; a.click(); }
// ── Zoom ─────────────────────────────────────────────────────────────────────
let zoom = parseFloat(localStorage.getItem('zoom-' + SAVE_KEY) || '1.0');
function applyZoom() {
  const board = document.getElementById('board');
  board.style.transform = `scale(${zoom})`;
  board.style.transformOrigin = '0 0';
  document.getElementById('zoom-level').textContent = Math.round(zoom * 100) + '%';
  localStorage.setItem('zoom-' + SAVE_KEY, zoom);
}
function zoomIn()  { zoom = Math.min(3.0, parseFloat((zoom + 0.1).toFixed(2))); applyZoom(); }
function zoomOut() { zoom = Math.max(0.2, parseFloat((zoom - 0.1).toFixed(2))); applyZoom(); }
document.addEventListener('keydown', e => {
  if (e.ctrlKey || e.metaKey) {
    if (e.key === '=' || e.key === '+') { e.preventDefault(); zoomIn(); }
    if (e.key === '-')                  { e.preventDefault(); zoomOut(); }
    if (e.key === '0')                  { e.preventDefault(); zoom = 1.0; applyZoom(); }
  }
});
document.getElementById('board').addEventListener('wheel', e => {
  if (!(e.ctrlKey || e.metaKey)) return;
  e.preventDefault();
  e.deltaY < 0 ? zoomIn() : zoomOut();
}, { passive: false });
applyZoom();
function resetLayout() { if (!confirm('자동 재배치합니다.')) return; cards.forEach(c => { delete c.x; delete c.y; }); renderCards(); autoLayout(); }
// ── Floating format toolbar ───────────────────────────────────────────────────
const fmtBar = document.getElementById('format-toolbar');
function fmt(cmd) { document.execCommand(cmd, false, null); saveBoard(); }
function fmtLink() {
  const sel = window.getSelection();
  if (!sel || sel.isCollapsed) return;
  const url = prompt('링크 URL 입력', 'https://');
  if (!url) return;
  document.execCommand('createLink', false, url);
  // make links open in new tab
  sel.anchorNode?.parentElement?.closest('a')?.setAttribute('target', '_blank');
  document.querySelectorAll('.text a').forEach(a => a.target = '_blank');
  saveBoard();
}

// prevent format buttons from blurring contenteditable
fmtBar.addEventListener('mousedown', e => e.preventDefault());

document.addEventListener('selectionchange', () => {
  const sel = window.getSelection();
  if (!sel || sel.isCollapsed || !sel.toString().trim()) { fmtBar.style.display = 'none'; return; }
  // only show if selection is inside a .text element
  const anchor = sel.anchorNode;
  if (!anchor) { fmtBar.style.display = 'none'; return; }
  const textEl = anchor.nodeType === 1 ? anchor.closest('.text') : anchor.parentElement?.closest('.text');
  if (!textEl) { fmtBar.style.display = 'none'; return; }
  // position above selection
  const range = sel.getRangeAt(0);
  const rect = range.getBoundingClientRect();
  fmtBar.style.display = 'flex';
  const tbW = fmtBar.offsetWidth || 180;
  let left = rect.left + rect.width / 2 - tbW / 2;
  left = Math.max(8, Math.min(left, window.innerWidth - tbW - 8));
  fmtBar.style.left = left + 'px';
  fmtBar.style.top = (rect.top - 44 + window.scrollY) + 'px';
});

setInterval(saveBoard, 30000);
loadBoard();
</script>
</body>
