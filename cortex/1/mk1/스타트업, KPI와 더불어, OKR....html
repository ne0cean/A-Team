<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>스타트업, KPI와 더불어, OKR...</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #1e1e1e;
  color: #e0e0e0;
  font-family: 'Segoe UI', -apple-system, sans-serif;
  font-size: 15px;
  line-height: 1.6;
  padding: 20px 30px 60px;
  overflow-x: hidden;
}
a { color: #6cb0f6; text-decoration: none; }
a:hover { text-decoration: underline; }
.title-bar {
  background: #3a3a5c;
  display: inline-block;
  padding: 6px 16px;
  font-size: 22px;
  font-weight: bold;
  color: #fff;
  margin-bottom: 4px;
}
.date { color: #999; font-size: 13px; margin-bottom: 20px; }
.board { position: relative; }
.card {
  background: #2a2a2a;
  border: 1px solid #3a3a3a;
  border-radius: 8px;
  padding: 12px;
  position: absolute;
  cursor: grab;
  transition: box-shadow 0.15s;
  overflow: hidden;
}
.card:hover { box-shadow: 0 0 0 1px #58a6ff; z-index: 10; }
.card.moving { opacity: 0.8; box-shadow: 0 4px 24px rgba(0,0,0,0.6); z-index: 100; cursor: grabbing; }
.card img { width: 100%; border-radius: 4px; display: block; }
.card .caption { font-size: 12px; color: #888; margin-top: 6px; }
.card .text { outline: none; min-height: 20px; white-space: pre-wrap; word-break: break-word; }
.card .text:focus { background: rgba(255,255,255,0.05); border-radius: 4px; padding: 4px; }
.card .text:empty::before { content: '텍스트 입력...'; color: #555; }
.card table { border-collapse: collapse; width: 100%; font-size: 13px; }
.card table td, .card table th { border: 1px solid #444; padding: 4px 8px; vertical-align: top; }
.card table th { background: #333; color: #ccc; }
.card-actions { position: absolute; top: 4px; right: 4px; display: none; gap: 4px; }
.card:hover .card-actions { display: flex; }
.card-btn { background: #333; border: 1px solid #555; color: #ccc; border-radius: 4px; padding: 2px 6px; font-size: 11px; cursor: pointer; }
.card-btn:hover { background: #444; color: #fff; }
.resize-handle { position: absolute; bottom: 0; right: 0; width: 16px; height: 16px; cursor: se-resize; opacity: 0; }
.card:hover .resize-handle { opacity: 0.6; }
.resize-handle::after { content: ''; position: absolute; bottom: 3px; right: 3px; width: 8px; height: 8px; border-right: 2px solid #666; border-bottom: 2px solid #666; }
.toolbar { position: fixed; bottom: 0; left: 0; right: 0; background: #161b22; border-top: 1px solid #30363d; padding: 8px 20px; display: flex; gap: 12px; align-items: center; z-index: 200; }
.toolbar button { background: #21262d; border: 1px solid #30363d; color: #e0e0e0; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; }
.toolbar button:hover { background: #30363d; }
.toolbar .status { color: #8b949e; font-size: 12px; margin-left: auto; }
.highlight-red { color: #ff6b6b; }
.highlight-blue { color: #6cb0f6; }
</style>
</head>
<body>
<div class="title-bar">스타트업, KPI와 더불어, OKR...</div>
<div class="date">Invalid Date</div>
<div class="board" id="board"></div>
<div class="toolbar">
  <button onclick="addTextCard()">+ 텍스트</button>
  <button onclick="addImageCard()">+ 이미지</button>
  <button onclick="saveBoard()">💾 저장</button>
  <button onclick="resetLayout()">↺ 재배치</button>
  <span class="status" id="status">Ready</span>
</div>
<script>
const SAVE_KEY = 'board-스타트업-KPI와-더불어-OKR-';
const IMG_BASE = '../../attachments/';
const DEFAULT_CARDS = [
  {
    "type": "text",
    "content": "스타트업, KPI와 더불어, OKR...<br>\t\t\t<br>작고 기민한 조직, 그리고 뚜렷한 목표.<br>\t\t\t<br>by<a href=\"https://brunch.co.kr/@supims\" target=\"_blank\">신현묵</a>Aug 14. 2019<br>\t\t\t<br>OKR&#160;(Objectives and key results)<br>\t\t\t<br><br>\t\t\t<br>조직의 목표를 설정하고, 그 결과를 추적, 관리하여 목표에 도달할 수 있도록 하는 방법을 의미한다.<br>\t\t\t<br><br>\t\t\t<br>앤디 그로브(Andry Grove)에 의해서 1970년대에 처음 생각된 개념이고, 구글에서는 이 OKR을 기반으로 목표 설정 프레임워크를 구성하고, 그 이외의 유니콘으로 성장한 회사들이 이 방법을 따라서 움직였다.<br>\t\t\t<br><br>\t\t\t<br>가장 구체적으로 OKR을 완성한 존 도어의 OKR규칙은 2가지이다.<br>\t\t\t<br><br>\t\t\t<br>1. 목표가 구체적일 것.<br>\t\t\t<br>2. 목표를 도달하기 위한 주요 결과에 대해서 구체적으로 예측할 것.<br>\t\t\t<br><br>\t\t\t<br>보통 이야기하는 비전과 미션의 또 다른 변형으로 인식될 수 있다. 하지만, OKR에서 이야기하는 '목표'와 '결과'는 언제나 측정 가능한 것을 구체적으로 기술한다.<br>\t\t\t<br><br>\t\t\t<br>특히, IT서비스를 중점적으로 동작하고, 마켓에 대한 검증이나, 비즈니스 모델을 확인하기 위해서 기민하게 움직여야 하는 스타트업에게 이 OKR은 매우 효과적이다.<br>\t\t\t<br><br>\t\t\t<br>KPIs(Key performance indicators, 핵심 성과 지표)와 유사해 보이지만, OKR과는 보는 관점이 다르다.<br>\t\t\t<br><br>\t\t\t<br>OKR은 이루고자 하는 목표에 대한 구체적인 수치를 의미하고,<br>\t\t\t<br>KPI는 보고를 위한 수치와 직원들의 일상적인 업무, 특히. 매일 처리하는 업무들에 대해서 지수 화하는 것을 의미한다.<br>\t\t\t<br><br>\t\t\t<br>대부분 KPI는 일, 주, 월의 지표로 구성되고, OKR은 분기와 년으로 지표가 구성된다.<br>\t\t\t<br><br>\t\t\t<br>스타트업에서 생각하는 분기와 년의 전략적인 의사결정 과정은 OKR을 중심으로 기술되는 것이 맞다.<br>\t\t\t<br><br>\t\t\t<br>그리고, OKR을 설정할 때에 실수하지 말아야 할 것은 너무 많은 OKR은 의미 없다는 것이다.<br>\t\t\t<br><br>\t\t\t<br>주변의 경험들을 수집해보면, 최대 4개 이상을 넘기지 않아야 한다. ( 엄청 거대한 구글의 규모에서도 5개를 넘지 않는다. ) 초기 시작하는 스타트업은 OKR은 분기에 1개 정도 설정하고, 목표를 도달한 다음에, 2~3개 정도로 설정하면서 분기의 구체적인 목표를 설정하는 것이 매우 효과적이다.<br>\t\t\t<br><br>\t\t\t<br>특히, 스타트업의 경우 해야 할 일과, 할 일, 밀린 일들이 엄청나게 많기 때문에, 창업 초기에 2~3개 분기까지는 분기에 1개 정도의 OKR로 구동하고, 그 목표가 달성되는 단계를 충분하게 훈련된 이후에 2~3개로 늘리는 과정을 수행하는 것이 좋다.<br>\t\t\t<br><br>\t\t\t<br>보통, KPI는 매우 보수적으로 꼭, 도달해야 하는 지표로 설정된다.<br>\t\t\t<br><br>\t\t\t<br>하지만, OKR은 120%의 목표로 설정되는 것이 좋다. 전력을 기울여서 진행해도 도달하기 어려운 정도의 높은 목표를 잡는 것이 매우 중요하다. 그리고, 또 하나 중요한 것은 이 OKR에 대한 목표 달성을 통해서 내부 인사제도에 영향을 주거나, 팀의 해체나 성과급 등의 형태로 영향을 주면 안 된다.<br>\t\t\t<br><br>\t\t\t<br>KPI는 보통 인사에 영향을 주는 최소 단위로 구성되지만,<br>\t\t\t<br>OKR은 조직이 나아가야 할 최선의 방향성을 목표로 하기 때문에 이에 대한 실패의 두려움이 없도록 조직에게 설정되어야 한다.<br>\t\t\t<br><br>\t\t\t<br>OKR을 설정하기 위해서 가장 좋은 '조직원'에게 주는 메시지는 다음과 같다.<br>\t\t\t<br><br>\t\t\t<br>'다음 분기에서 우리 조직이나 팀은, 어떤 변화를 가질 것인가?'<br>\t\t\t<br>'어떤 서비스가 개선되어야, 다른 서비스에 매우 큰 영향을 가질 것인가?'<br>\t\t\t<br>'다음 분기에서 어떤 서비스를 구성해야, 마켓에 영향을 줄 것인가?'<br>\t\t\t<br>등의 질문과 브레인스토밍이 매우 효과적이다.<br>\t\t\t<br><br>\t\t\t<br>그리고, OKR의 목표들은 120%를 목표로 하되, 대부분은 70% 정도 도달하면 성공적이라고 평가하는 것이 매우 좋다. 그 이유는 매우 공격적이고 도달하기 어려운 목표를 설정하기 때문이며, 이 목표가 실패했다고 하더라도, 너무 실망하지 않으면 된다.<br>\t\t\t<br><br>\t\t\t<br>대부분 50% 이하의 결과가 나오면, 내부 역량이나 목표 설정이 잘못된 것으로 인지하는 것이 좋다.<br>\t\t\t<br>제대로 OKR을 설정하게 되면 대부분의 수치는 65~76% 정도의 결과로 나타나게 되며,<br>\t\t\t<br>90%를 넘기는 경우에는 너무 소극적으로 OKR을 잡은 것이므로, 조직의 역량과 구체적인 방향을 좀 더 수정해야 하는 것으로 결론을 잡는 것이 매우 좋다.<br>\t\t\t<br><br>\t\t\t<br>그렇다면, 목표는 그렇게 설정하고 평가하면 되는데.... '주요 결과'는 어떻게 설정하는 것이 좋을까?<br>\t\t\t<br><br>\t\t\t<br>대부분 '주요 결과'를 Task나 할 일(ToDo)의 형태로 기술하는 실수를 한다.<br>\t\t\t<br><br>\t\t\t<br>가장 잘못된 '주요 결과'는 다음과 같다.<br>\t\t\t<br>'이번 분기에 특정 서비스를 출시한다'는 형태로 '주요 결과(KR)'을 잡는 것은 잘못된 것이다.<br>\t\t\t<br><br>\t\t\t<br>정확한 'KR'은 다음과 같이 설정한다.<br>\t\t\t<br>'특정 서비스를 출시하여 분기 사용자 유입량을 20% 증가시킨다'<br>\t\t\t<br><br>\t\t\t<br>기능이나 서비스, 목표에 대해서 구체적으로 서술하는 것이 'KR'을 잡는 기본 규칙이다.<br>\t\t\t<br>그리고, 구체적으로 정량적으로 판단할 수 있는 '수치'로 표현되는 것이 매우 시각적으로 보이며, 이를 통해서 조직원들을 독려하는 수단으로도 활용이 되고, 그다음 목표를 위한 '전략'이 되기도 한다.<br>\t\t\t<br><br>\t\t\t<br>매우 당연하게, OKR의 주요 결과들이 세워지면,<br>\t\t\t<br>조직원들에게서 다음과 같은 이야기가 나와야 한다.<br>\t\t\t<br><br>\t\t\t<br>'와~ 이번 분기에 저 결과를 얻을 수 있겠어?'<br>\t\t\t<br><br>\t\t\t<br>그렇게 잡는 것이 OKR을 제대로 잡은 것이라고 할 수 있다.<br>\t\t\t<br><br>\t\t\t<br>또한, 조직 전체의 OKR이 잡히고, 각 조직 내부의 세부적인 팀, 조직원들이 개별적으로 그 결과를 도달하기 위해서 각자의 타스크나 팀에 대한 구체적인 목표들이 잡히는 것이 좋으며, 이 역시 OKR의 형태를 따라도 큰 무리가 없다.<br>\t\t\t<br><br>\t\t\t<br>가장 중요한 것은 큰 전략적인 OKR이, 각 팀과 조직원들의 구체적인 비전과 미션의 형태로 인지되고, 이를 구체적으로 수치화하는 달성 방안에 대해서 인식하게 되면 되는 것이다.<br>\t\t\t<br><br>\t\t\t<br>스타트업은 정말 일도 많고, 의사결정의 과정도 복잡하며,&#160;<br>\t\t\t<br>그 단계도 계속 진화한다.&#160;<br>\t\t\t<br>마켓의 인식과 분석에 따라서도 이 역시 확대된다.<br>\t\t\t<br><br>\t\t\t<br>특히, 이 세상에 없는 것을 만들고 있다면,<br>\t\t\t<br>OKR은 매우 효과적이다.<br>\t\t\t<br><br>\t\t\t<br>도달하고자 하는 목표와 우선순위, 결과에 대한 예측을 위한 매우 좋은 훈련법이고, 조직을 통솔하는 매우 효과적인 방법이다.<br>\t\t\t<br><br>\t\t\t<br>----<br>\t\t\t<br><br>\t\t\t<br>특히 개발팀의 경우에 이 과정은 매우 효과적입니다.&#160;<br>\t\t\t<br>비즈니스의 변화, 서비스의 개발과정과 아키텍처, 구체적인 목표와 개발 단위의 변화 포인트,<br>\t\t\t<br>구체적인 골...<br>\t\t\t<br><br>\t\t\t<br>특히, 이번 분기에 웹개발자들에게 제시된 구체적인 목표 역시,<br>\t\t\t<br>OKR의 하나이죠.<br>\t\t\t<br><br>\t\t\t<br>OKR은 구체적으로 그 방법론이 아니더라도,<br>\t\t\t<br>조직을 운영하는 디렉터나 팀장들에게도 매우 유용한 방법입니다.<br>\t\t\t<br><br>\t\t\t<br>자연스럽게 접근해보시죠.<br>\t\t\t<br><br>\t\t\t출처: <<a href=\"https://brunch.co.kr/@supims/609\" target=\"_blank\">https://brunch.co.kr/@supims/609</a>>",
    "w": 400
  }
];

let cards = [];
let moving = null, resizing = null;

function loadBoard() {
  const saved = localStorage.getItem(SAVE_KEY);
  cards = saved ? JSON.parse(saved) : DEFAULT_CARDS.map(c => ({...c}));
  renderCards();
  if (!saved) autoLayout();
}

function autoLayout() {
  const GAP = 14;
  const boardW = document.getElementById('board').offsetWidth;
  const cols = Math.max(1, Math.floor(boardW / 280));
  const colW = (boardW - GAP * (cols - 1)) / cols;
  const colHeights = new Array(cols).fill(0);
  const allCards = document.querySelectorAll('.card');
  const images = document.querySelectorAll('.card img');
  let loaded = 0;
  const total = images.length;

  function place() {
    allCards.forEach((el, i) => {
      const card = cards[i];
      const w = Math.min(card.w || colW, colW);
      let minCol = 0;
      for (let c = 1; c < cols; c++) if (colHeights[c] < colHeights[minCol]) minCol = c;
      card.x = minCol * (colW + GAP);
      card.y = colHeights[minCol];
      card.w = w;
      el.style.left = card.x + 'px';
      el.style.top = card.y + 'px';
      el.style.width = w + 'px';
      colHeights[minCol] = card.y + el.offsetHeight + GAP;
    });
    document.getElementById('board').style.minHeight = Math.max(...colHeights) + 100 + 'px';
    saveBoard();
  }

  if (total === 0) requestAnimationFrame(place);
  else images.forEach(img => {
    if (img.complete) { loaded++; if (loaded >= total) requestAnimationFrame(place); }
    else img.onload = img.onerror = () => { loaded++; if (loaded >= total) requestAnimationFrame(place); };
  });
}

function syncText() {
  document.querySelectorAll('.card').forEach(el => {
    const idx = +el.dataset.idx;
    if (cards[idx]?.type === 'text') {
      const t = el.querySelector('.text');
      if (t) cards[idx].content = t.innerHTML;
    }
  });
}

function saveBoard() {
  syncText();
  localStorage.setItem(SAVE_KEY, JSON.stringify(cards));
  document.getElementById('status').textContent = '저장됨 ' + new Date().toLocaleTimeString();
}

function renderCards() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  cards.forEach((card, i) => {
    const el = document.createElement('div');
    el.className = 'card';
    el.dataset.idx = i;
    if (card.x !== undefined) el.style.left = card.x + 'px';
    if (card.y !== undefined) el.style.top = card.y + 'px';
    if (card.w) el.style.width = card.w + 'px';

    el.addEventListener('mousedown', e => {
      if (e.target.closest('.text, a, .card-btn, .resize-handle, table')) return;
      e.preventDefault();
      moving = { idx: i, startX: e.clientX, startY: e.clientY, origX: card.x || 0, origY: card.y || 0 };
      el.classList.add('moving');
    });

    const actions = document.createElement('div');
    actions.className = 'card-actions';
    const delBtn = document.createElement('button');
    delBtn.className = 'card-btn'; delBtn.textContent = '×';
    delBtn.onclick = e => { e.stopPropagation(); if (confirm('삭제?')) { cards.splice(i, 1); renderCards(); saveBoard(); } };
    actions.appendChild(delBtn);
    el.appendChild(actions);

    if (card.type === 'text') {
      const text = document.createElement('div');
      text.className = 'text';
      text.contentEditable = true;
      text.innerHTML = card.content || '';
      text.addEventListener('blur', () => { card.content = text.innerHTML; saveBoard(); });
      el.appendChild(text);
    } else if (card.type === 'image') {
      const src = card.src.startsWith('http') || card.src.startsWith('data:') ? card.src : IMG_BASE + card.src;
      const img = document.createElement('img');
      img.src = src;
      img.alt = card.alt || '';
      img.loading = 'lazy';
      img.onerror = () => img.style.display = 'none';
      if (card.link) {
        const a = document.createElement('a'); a.href = card.link; a.target = '_blank';
        a.appendChild(img); el.appendChild(a);
      } else { el.appendChild(img); }
      if (card.caption) {
        const cap = document.createElement('div');
        cap.className = 'caption';
        cap.textContent = card.caption;
        el.appendChild(cap);
      }
    } else if (card.type === 'table') {
      const wrapper = document.createElement('div');
      wrapper.style.overflowX = 'auto';
      wrapper.innerHTML = card.html || '';
      el.appendChild(wrapper);
    }

    const rh = document.createElement('div');
    rh.className = 'resize-handle';
    rh.addEventListener('mousedown', e => {
      e.preventDefault(); e.stopPropagation();
      resizing = { idx: i, startX: e.clientX, startW: card.w || el.offsetWidth };
    });
    el.appendChild(rh);
    board.appendChild(el);
  });

  requestAnimationFrame(() => {
    let maxBottom = 0;
    document.querySelectorAll('.card').forEach(el => {
      const b = (parseFloat(el.style.top) || 0) + el.offsetHeight;
      if (b > maxBottom) maxBottom = b;
    });
    board.style.minHeight = (maxBottom + 100) + 'px';
  });
}

document.addEventListener('mousemove', e => {
  if (moving) {
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`);
    if (!el) return;
    const nx = moving.origX + e.clientX - moving.startX;
    const ny = moving.origY + e.clientY - moving.startY;
    el.style.left = nx + 'px';
    el.style.top = ny + 'px';
  }
  if (resizing) {
    const card = cards[resizing.idx];
    card.w = Math.max(100, resizing.startW + e.clientX - resizing.startX);
    const el = document.querySelector(`.card[data-idx="${resizing.idx}"]`);
    if (el) el.style.width = card.w + 'px';
  }
});

document.addEventListener('mouseup', e => {
  if (moving) {
    const card = cards[moving.idx];
    card.x = Math.max(0, moving.origX + e.clientX - moving.startX);
    card.y = Math.max(0, moving.origY + e.clientY - moving.startY);
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`);
    if (el) { el.classList.remove('moving'); }
    moving = null; saveBoard();
  }
  if (resizing) { resizing = null; saveBoard(); }
});

function addTextCard() {
  cards.push({ type: 'text', content: '', x: 50, y: window.scrollY + 100, w: 300 });
  renderCards();
  setTimeout(() => { const els = document.querySelectorAll('.card .text'); els[els.length - 1]?.focus(); }, 100);
}

function addImageCard() {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = 'image/*';
  input.onchange = e => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = () => { cards.push({ type: 'image', src: reader.result, x: 50, y: window.scrollY + 100, w: 240 }); renderCards(); saveBoard(); };
    reader.readAsDataURL(file);
  };
  input.click();
}

function resetLayout() {
  if (!confirm('자동 재배치합니다. 현재 위치가 변경됩니다.')) return;
  cards.forEach(c => { delete c.x; delete c.y; });
  renderCards(); autoLayout();
}

setInterval(saveBoard, 30000);
loadBoard();
</script>
</body>
</html>
