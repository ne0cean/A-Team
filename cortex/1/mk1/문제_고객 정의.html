.card img { width: 100%; border-radius: 4px; display: block; }

.card .text:focus { background: rgba(255,255,255,0.05); border-radius: 4px; padding: 4px; }

.toolbar { position: fixed; bottom: 0; left: 0; right: 0; background: #161b22; border-top: 1px solid #30363d; padding: 8px 20px; display: flex; gap: 12px; align-items: center; z-index: 200; }
.toolbar button { background: #21262d; border: 1px solid #30363d; color: #e0e0e0; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; }
.toolbar button:hover { background: #30363d; }
.toolbar .status { color: #8b949e; font-size: 12px; margin-left: auto; }
.highlight-red { color: #ff6b6b; }

<script>
const SAVE_KEY = 'board-문제-고객-정의';
const IMG_BASE = '../../attachments/';
const DEFAULT_CARDS = [
  {
    "type": "text",
    "content": "문제/고객 정의<br>\t\t<br>\t\t<br>\t<br>\t<br>\t\t<br>\t\t\t<br>\t\t\t\t<br>보도자료를 써보라<br>\t\t\t\t<br><br>\t\t\t\t<br><a href=\"https://news.hada.io/topic?id=15532&utm_source=discord&utm_medium=bot&utm_campaign=280\" target=\"_blank\">https://news.hada.io/topic?id=15532&utm_source=discord&utm_medium=bot&utm_campaign=280</a><br>\t\t\t\t<br><br>\t\t\t\t<br>Pain killer vs Vitamin vs Drug<br>\t\t\t\t<br><br>\t\t\t\t<br><a href=\"http://javascript:vote(20554,%20%22up%22\" target=\"_blank\">▲</a>;)<br>\t\t\t\t<br><a href=\"https://www.happiness.hks.harvard.edu/february-2025-issue/the-friendship-recession-the-lost-art-of-connecting\" target=\"_blank\">우정의 침체: 잃어버린 연결의 예술</a><br>\t\t\t\t<br><br>\t\t\t\t출처: <<a href=\"https://news.hada.io/topic?id=20554&utm_source=discord&utm_medium=bot&utm_campaign=280\" target=\"_blank\">https://news.hada.io/topic?id=20554&utm_source=discord&utm_medium=bot&utm_campaign=280</a>> <br>\t\t\t\t<br><br>\t\t\t\t<br><a href=\"https://news.hada.io/topic?id=20512&utm_source=discord&utm_medium=bot&utm_campaign=280\" target=\"_blank\">https://news.hada.io/topic?id=20512&utm_source=discord&utm_medium=bot&utm_campaign=280</a><br>\t\t\t\t<br><br>\t\t\t\t<br>고객으로부터 시작하라 : 고객을 정의하는 5가지 질문<br>\t\t\t\t<br>1. 우리 고객은 누구이며, 고객이 원하는 것 또는 필요한 것은 무엇일까?<br>\t\t\t\t<br>- 최대한 구체적인 고객 페르소나를 그려보는 것은 물론, 왜 이 고객인지를 논리적, 수치적인 근거를 바탕으로 정의해야 합니다.<br>\t\t\t\t<br>2. 고객이 처한 환경에서 당면한 문제 혹은 발견한 기회는 무엇일까?<br>\t\t\t\t<br>- 기존의 자사 및 경쟁사의 제품/서비스가 해소하지 못한, 혹은 아직 시장에 존재하지 않아 해소하지 못한 고객의 페인 포인트를 파악합니다. 이 결과를 토대로, 시장 진입 기회가 있는지 정리합니다.<br>\t\t\t\t<br>3. 고객이 얻을 수 있는 가장 중요한 혜택은 무엇일까?<br>\t\t\t\t<br>- 고객이 해당 제품/서비스를 통해 얻을 수 있는 핵심 가치와 경험을 정의합니다. 이 가치는 기존 및 경쟁사의 제품/서비스 대비 차별점이 어필되어야 합니다.<br>\t\t\t\t<br>4. 고객에게 필요한 것, 원하는 것을 어떻게 알 수 있을까?<br>\t\t\t\t<br>- 시장 리서치 보고서 분석, 고객 대상 설문조사, 인터뷰 등 정량적/정성적 분석을 통해 신규 제품/서비스가 정말 고객이 원하는 것이 맞는지 확인해야 합니다.<br>\t\t\t\t<br>5. 고객 경험은 어떻게 표현할 수 있을까?<br>\t\t\t\t<br>- 제품/서비스를 고객이 접하는 모든 터치 포인트에서 고객은 어떤 니즈를 갖고 있을지, 어떤 경험을 기대할지에 대해 고민하고, 이를 만족시킬 수 있는 고객 경험 설계가 필요합니다.<br>\t\t\t\t<br><br>\t\t\t\t출처: <<a href=\"https://flex.team/blog/2024/08/22/amazon-working-backward/\" target=\"_blank\">https://flex.team/blog/2024/08/22/amazon-working-backward/</a>> <br>\t\t\t\t<br><br>\t\t\t\t<br><br>\t\t\t\t<br>워킹 백워드 3단계 프로세스<br>\t\t\t\t<br>1단계 : 보도 자료 만들기 (PR)<br>\t\t\t\t<br>워킹 백워드는 보도 자료를 작성하는 것부터 시작됩니다.&#160;보도 자료는 새로운 제품/서비스가 출시된다면 언론에서 보도될 기사를 예상해 A4 용지 1~2장 분량으로 작성합니다. 고객이 제품/서비스를 경험했을 때 어떤 가치가 전달될지 구체적으로 상상하는 거죠. 고객이 어떻게 느낄지, 어떤 반응을 보이며 어떤 이야기를 할지, 어떤 가치를 줄 수 있을지, 어떤 효과가 있었는지 등을 설명해야 합니다.&#160;해당 내용을 자세히 작성하다 보면 자연스럽게 아이디어가 구체화되고 어떤 부분이 부족한지 알 수 있습니다.<br>\t\t\t\t<br>✅ 제목<br>\t\t\t\t<br>- 고객이 이해할 수 있는 방식의 한 문장으로 제품 언급<br>\t\t\t\t<br>✅ 부제<br>\t\t\t\t<br>- 어떤 고객이 제품/서비스를 통해 무슨 혜택을 얻게 될 한 문장으로 표현<br>\t\t\t\t<br>✅ 요약<br>\t\t\t\t<br>- 출시 일자,&#160;출시할 도시명,&#160;언론 매체 명을 명시한 후 제품/서비스를 통한 혜택 요약<br>\t\t\t\t<br>- 독자가 다른 것은 읽지 않을 거라고 가정하고 핵심을 요약<br>\t\t\t\t<br>✅ 문제점<br>\t\t\t\t<br>- 제품/서비스가 해결하고자 하는 고객의 문제 3~4개를 고객의 언어로 표현<br>\t\t\t\t<br>- 각 문제가 끼칠 부정적인 영향을 우선 순위대로 작성<br>\t\t\t\t<br>✅ 해결책<br>\t\t\t\t<br>- 제품/서비스의 작동 방식과 더불어 어떻게 고객이 느끼는 문제를 해결하는지 설명<br>\t\t\t\t<br>✅ 고객 사용 후기<br>\t\t\t\t<br>- 고객의 입장에서 출시한 제품/서비스를 이용하게 된 계기와 함께 제품/서비스를 통해 어떤 경험을 했고,&#160;마주쳤던 페인 포인트를 어떻게 해결할 수 있었는지 작성<br>\t\t\t\t<br>✅ 내부 리더의 말 인용<br>\t\t\t\t<br>- 회사의 홍보 담당자 혹은 제품/서비스 담당자의 말을 인용해 제품의 편리성 언급<br>\t\t\t\t<br>✅ CTA(구매 or 이용처 및 추가 정보 기재)<br>\t\t\t\t<br>- 맺음말과 함 제품/서비스를 어디에서 어떻게 이용할 수 있는지 언급하고 추가 정보 확인을 위한 웹사이트 주소 및 기타 정보 제공<br>\t\t\t\t<br>2단계 : 자주 묻는 질문 만들기 (FAQ)<br>\t\t\t\t<br>워킹 백워드의 두 번째 단계로, 실제 제품/서비스를 사용할 외부 고객용과 내부 이해관계자를 위한&#160;FAQ로 나뉩니다.<br>\t\t\t\t<br>외부 고객용&#160;FAQ는 실제 제품을 사용할 고객이나 언론이 제품/서비스에 대해 궁금해할 내용을 예상하여 작성합니다.&#160;이때&#160;고객이 실제로 제품을 사용하는 경험 단계를 상상하면서 ‘자주 할 수 있는 질문’으로 구성합니다. 이러한 과정을 통해 제품의 조건에 부합하지 않는 고객들을 걸러낼 수 있어 핵심 고객을 더 명확하게 정의할 수 있습니다.<br>\t\t\t\t<br>&#128204; 서비스 사용 과정에서 동작이 멈추면 어떻게 해야 되나요?<br>\t\t\t\t<br>&#128204; 상품을 반품하고 싶어요. 어디서 신청할수 있나요?<br>\t\t\t\t<br>&#128204; 기존 제품에 비해 개선된 점은 무엇인가요?<br>\t\t\t\t<br>내부 고객용&#160;FAQ는 아래 질문 목록을 참고하여 작성합니다.&#160;이를 통해 이해관계자들에게 어느 수준의 제품 개발이 필요하고,&#160;그 과정에서 어떤 도전 과제가 있는지 명확하게 설명해 줄 수 있어요.&#160;예상되는&#160;FAQ를 작성하다 보면 아이디어가 더 구체화되고,&#160;부족했던 부분이 무엇인지 발견할 수 있습니다.<br>\t\t\t\t<br>&#128204;&#160;제품/서비스를 구현하기 위해 필요한 결정 사안이나 가이드는 무엇인가?<br>\t\t\t\t<br>&#128204; 자사 기존 제품과 어떤 시너지를 기대할 수 있습니까?<br>\t\t\t\t<br>&#128204;&#160;투자금은 얼마나 필요한가?&#160;제품 가격을 설정한 근거는 무엇인가?<br>\t\t\t\t<br>&#128204;&#160;우리가 설득해야 할 이해관계자는 누구인가?<br>\t\t\t\t<br>3단계:&#160;시각화<br>\t\t\t\t<br>\t\t\t\t<br>신규 서비스 출시 목업(Mock-up) 비주얼<br>\t\t\t\t<br>워킹 백워드의 마지막 단계로, 고객 제품/서비스 이용에 대한 가상의 시나리오를 구상하고 시각화 자료로 만듭니다. 이 단계의 목적은 고객의 제품/서비스 경험을 자세하게 그리면서 이 경험이 고객에게 얼마나 더 좋을지를 뚜렷하고 파악하는 것입니다.<br>\t\t\t\t<br>이러한&#160;1-2-3&#160;단계 과정을 반복하는 워킹 백워드 방식은 프로젝트를 시작하기 전, 문서를 통해 업무 이해관계자들이 소통을 정확하게 하여&#160;고객의 ‘진정한’ 니즈를 담은 제품/서비스를 기획하는 데 있습니다.&#160;제품/서비스 뿐 아니라 조직에서 진행하는 다양한 의사결정 또한, 워킹 백워드를 거치면서 정말로 필요하고 가치 있는 결정을 내릴 수 있겠죠?<br>\t\t\t\t<br><br>\t\t\t\t출처: <<a href=\"https://flex.team/blog/2024/08/22/amazon-working-backward/\" target=\"_blank\">https://flex.team/blog/2024/08/22/amazon-working-backward/</a>> <br>\t\t\t\t<br><br>\t\t\t\t<br>Shopify 창업자의 인터뷰를 들었는데, 정말 무릎을 탁 치면서 들은 부분:<br>\t\t\t\t<br>- 창업자가 2008년 무렵에 실리콘밸리에서 투자를 받으려고 VC를 만나고 다녔는데, 여러곳에서 거절당함.<br>\t\t\t\t<br>- 거절한 이유를 설명해준 VC 왈: \"니네 시장이(TAM이) 너무 작다. 미국 전체에 쇼규모 이커머스 쇼핑몰 4~5만개 밖에 안되는데, 그거 절반을 먹어도 큰 회사 안됨\"<br>\t\t\t\t<br>- 최근에 그 VC를 다시 만남. VC가: \"우리가 그때 도대체 뭘 놓친거임??\" 물어봄.<br>\t\t\t\t<br>- 창업자 왈: \"그 VC가 당시에 놓친건 없음. 실제로 당시에 시장은 그 정도 사이즈였음. 그건 그 수요 (소규모 이커머스 쇼핑몰을 열고싶다는)를 가 실제로 이미 시장에 반영됬다고 가정함. 우리 가설은 그 요구는 얼마든지 더 있는데, 그게 너무 어려워서 (friction이 높아서) 안한다는것. 지금은 Shopify 사용하는 쇼핑몰이 백만개가 넘음.\"<br>\t\t\t\t<br>- \"자유시장을 신봉하는 사람들은: 고객의 수요가 언제나 이미 시장에 어떤식으로든 반영되어 있고, 거기에 맞는 가장 좋은 공급을 만드는 방식으로만 비즈니스가 작동한다고 생각하는 경향이 있음.\"<br>\t\t\t\t<br>- \"하지만 이건 사실이 아님. 많은 경우, 수요와 공급 사이엔 마찰 (friction) 이 있음. 시장에 수요를 표현하지 못한다고 해서, 수요가 존재하지 않는건 아님. 그 마찰을 제거하면 갑자기 수요가 생겨나는것 처럼 보일수 있고, 그것이 많은 스타트업들에게 기회임.\"<br>\t\t\t\t<br><br>\t\t\t\t<br>이상현님.<br>\t\t\t\t<br><br>\t\t\t\t<br>남들에게 보이지 않는 변화 vs 나에게 너무 명확한 변화<br>\t\t\t\t<br><br>\t\t\t\t<br><a href=\"https://www.youtube.com/watch?v=WH1psHHF4MQ\" target=\"_blank\">하버드 MBA에서 가장 먼저 가르치는 '이 방법' | 디커플링</a>[회고/사전부검](onenote:..\\2_Hxagon%20pillars_Rocks\\Dirction.one#회고\\사전부검&section-id={2AA5DE64-DAB3-42A2-914C-B5DF9BBA5E67}&page-id={3EBF9FD1-9098-7742-92E2-035FD6B16D42}&end&base-path=<a href=\"https://d.docs.live.net/733661839cc53ba5/문서/Inter_source/InterStellar)\" target=\"_blank\">https://d.docs.live.net/733661839cc53ba5/문서/Inter_source/InterStellar)</a><br>\t\t\t\t<br>커뮤니케이션 영역에서 어떤 것을 디커플링 할 것인가.<br>\t\t\t\t<br>서로 얼굴만 보이는 거리에 있어도 커뮤니 케이션이 가능한 것을 - 모바일에서 그러지 못해서 뭐가 불편? 미충족?<br>\t\t\t\t<br>어떻게 모바일로 가져올 것인가. 그리고 왜?<br>\t\t\t\t<br><br>\t\t\t\t<br><br>\t\t\t\t<br>초기 3개월은 분야 전문가 인터뷰에만 집중하겠다.<br>\t\t\t\t<br>현재 스타트업 시장에서 가장 큰 문제는 \"실제 시장이 존재하지 않는 문제를 푸는 것\"이다. 분야 전문가와 대화하는 목적은 두가지인데 첫째, 고객 타겟팅 때문이다. 스타트업은 누구의 어떤 문제를 푸는지에 따라 처음 시작점이 달라진다. 여기서 ‘어떤 문제’보다 더 중요한게 ‘누구의 문제’를 푸느냐인데 같은 솔루션을 팔더라도 예산과 영향력이 훨씬 큰 고객에게 판매하는게 초기 스타트업에게는 이득이다. 둘째는 실존하는 문제를 찾기 위해서이다. 해당 분야에서 실패해본 대표님, 종사자, 교수님, 잠재 고객사와 잠재 경쟁사들을 두루 만나, 업계 전문가들도 골머리를 앓는 실존하는 문제를 푸는게 Tarpit idea들을 피할수 있는 방법이다. *Tarpit Idea(겉보기엔 좋아 보이지만 실제 고객이 없는 아이디어).<br>\t\t\t\t<br><br>\t\t\t\t출처: <<a href=\"https://brunch.co.kr/@shndon0220/59\" target=\"_blank\">https://brunch.co.kr/@shndon0220/59</a>> <br>\t\t\t\t<br><br>\t\t\t\t<br><a href=\"https://news.hada.io/topic?id=19602&utm_source=discord&utm_medium=bot&utm_campaign=280\" target=\"_blank\">https://news.hada.io/topic?id=19602&utm_source=discord&utm_medium=bot&utm_campaign=280</a><br>\t\t\t<br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t출처: <<a href=\"https://news.hada.io/topic?id=20554&utm_source=discord&utm_medium=bot&utm_campaign=280\" target=\"_blank\">https://news.hada.io/topic?id=20554&utm_source=discord&utm_medium=bot&utm_campaign=280</a>> <br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t출처: <<a href=\"https://flex.team/blog/2024/08/22/amazon-working-backward/\" target=\"_blank\">https://flex.team/blog/2024/08/22/amazon-working-backward/</a>> <br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t출처: <<a href=\"https://flex.team/blog/2024/08/22/amazon-working-backward/\" target=\"_blank\">https://flex.team/blog/2024/08/22/amazon-working-backward/</a>> <br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t출처: <<a href=\"https://brunch.co.kr/@shndon0220/59\" target=\"_blank\">https://brunch.co.kr/@shndon0220/59</a>> <br>\t\t\t<br><br>\t\t<br>\t\t<br>\t\t\t<br>통신시장의 문제는 뮐까? 내부자적으로.<br>\t\t\t<br><a href=\"https://news.hada.io/topic?id=16708&utm_source=discord&utm_medium=bot&utm_campaign=280\" target=\"_blank\">https://news.hada.io/topic?id=16708&utm_source=discord&utm_medium=bot&utm_campaign=280</a><br>\t\t<br>\t\t<br>\t\t\t<br>[사랑받는 제품의 9가지 특징]<br>\t\t\t<br><br>\t\t\t<br>1️⃣ 저렴해서 (가격경쟁력)<br>\t\t\t<br>7️⃣ 시간을 아껴주기 때문에 (경제성, 생산성)<br>\t\t\t<br><br>\t\t\t<br>2️⃣ 편해서 (편의성)<br>\t\t\t<br>4️⃣ 빨라서 (속도, 체감)<br>\t\t\t<br>6️⃣ 오래가서 (지속성, 내구성)<br>\t\t\t<br>8️⃣ 아름다워서 (심미성)<br>\t\t\t<br>5️⃣ 가벼워서 (휴대성)<br>\t\t\t<br><br>\t\t\t<br>3️⃣ 좋아하는 브랜드라서 (동질성)<br>\t\t\t<br>9️⃣ 유일해서 (대체불가성)<br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br>Atomic market<br>\t\t\t<br>대학 캠퍼스<br>\t\t\t<br>대기업 캠퍼스<br>\t\t\t<br>뮤직 페스티벌<br>\t\t\t<br>컨퍼런스 - 심심하니까?<br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br>특정 장소에 진입했을때 알람? 지역 채팅방이나 대화창 입장?<br>\t\t\t<br><br>\t\t\t<br>SNS 팔로어 크롤링을 통해서 색깔로 나랑 얼마나 가까운 사람인지 표시?",

let cards = [];
let moving = null, resizing = null;

function loadBoard() {
  const saved = localStorage.getItem(SAVE_KEY);
  cards = saved ? JSON.parse(saved) : DEFAULT_CARDS.map(c => ({...c}));
  renderCards();
  if (!saved) autoLayout();
}

function autoLayout() {
  const GAP = 14;
  const boardW = document.getElementById('board').offsetWidth;
  const cols = Math.max(1, Math.floor(boardW / 280));
  const colW = (boardW - GAP * (cols - 1)) / cols;
  const colHeights = new Array(cols).fill(0);
  const allCards = document.querySelectorAll('.card');
  const images = document.querySelectorAll('.card img');
  let loaded = 0;
  const total = images.length;

  function place() {
    allCards.forEach((el, i) => {
      const card = cards[i];
      const w = Math.min(card.w || colW, colW);
      let minCol = 0;
      for (let c = 1; c < cols; c++) if (colHeights[c] < colHeights[minCol]) minCol = c;
      card.x = minCol * (colW + GAP);
      card.y = colHeights[minCol];
      card.w = w;
      el.style.left = card.x + 'px';
      el.style.top = card.y + 'px';
      el.style.width = w + 'px';
      colHeights[minCol] = card.y + el.offsetHeight + GAP;
    });
    document.getElementById('board').style.minHeight = Math.max(...colHeights) + 100 + 'px';
    saveBoard();
  }

  if (total === 0) requestAnimationFrame(place);
  else images.forEach(img => {
    if (img.complete) { loaded++; if (loaded >= total) requestAnimationFrame(place); }
    else img.onload = img.onerror = () => { loaded++; if (loaded >= total) requestAnimationFrame(place); };
  });
}

function syncText() {
  document.querySelectorAll('.card').forEach(el => {
    const idx = +el.dataset.idx;
    if (cards[idx]?.type === 'text') {
      const t = el.querySelector('.text');
      if (t) cards[idx].content = t.innerHTML;
    }
  });
}

function saveBoard() {
  syncText();
  localStorage.setItem(SAVE_KEY, JSON.stringify(cards));
  document.getElementById('status').textContent = '저장됨 ' + new Date().toLocaleTimeString();
}

function renderCards() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  cards.forEach((card, i) => {
    const el = document.createElement('div');
    el.className = 'card';
    el.dataset.idx = i;
    if (card.x !== undefined) el.style.left = card.x + 'px';
    if (card.y !== undefined) el.style.top = card.y + 'px';
    if (card.w) el.style.width = card.w + 'px';

    el.addEventListener('mousedown', e => {
      if (e.target.closest('.text, a, .card-btn, .resize-handle, table')) return;
      e.preventDefault();
      moving = { idx: i, startX: e.clientX, startY: e.clientY, origX: card.x || 0, origY: card.y || 0 };
      el.classList.add('moving');
    });

    const actions = document.createElement('div');
    actions.className = 'card-actions';
    const delBtn = document.createElement('button');
    delBtn.className = 'card-btn'; delBtn.textContent = '×';
    delBtn.onclick = e => { e.stopPropagation(); if (confirm('삭제?')) { cards.splice(i, 1); renderCards(); saveBoard(); } };
    actions.appendChild(delBtn);
    el.appendChild(actions);

    if (card.type === 'text') {
      const text = document.createElement('div');
      text.className = 'text';
      text.contentEditable = true;
      text.innerHTML = card.content || '';
      text.addEventListener('blur', () => { card.content = text.innerHTML; saveBoard(); });
      el.appendChild(text);
    } else if (card.type === 'image') {
      const src = card.src.startsWith('http') || card.src.startsWith('data:') ? card.src : IMG_BASE + card.src;
      const img = document.createElement('img');
      img.src = src;
      img.alt = card.alt || '';
      img.loading = 'lazy';
      img.onerror = () => img.style.display = 'none';
      if (card.link) {
        const a = document.createElement('a'); a.href = card.link; a.target = '_blank';
        a.appendChild(img); el.appendChild(a);
      } else { el.appendChild(img); }
      if (card.caption) {
        const cap = document.createElement('div');
        cap.className = 'caption';
        cap.textContent = card.caption;
        el.appendChild(cap);
      }
    } else if (card.type === 'table') {
      const wrapper = document.createElement('div');
      wrapper.style.overflowX = 'auto';
      wrapper.innerHTML = card.html || '';
      el.appendChild(wrapper);
    }

    const rh = document.createElement('div');
    rh.className = 'resize-handle';
    rh.addEventListener('mousedown', e => {
      e.preventDefault(); e.stopPropagation();
      resizing = { idx: i, startX: e.clientX, startW: card.w || el.offsetWidth };
    });
    el.appendChild(rh);
    board.appendChild(el);
  });

  requestAnimationFrame(() => {
    let maxBottom = 0;
    document.querySelectorAll('.card').forEach(el => {
      const b = (parseFloat(el.style.top) || 0) + el.offsetHeight;
      if (b > maxBottom) maxBottom = b;
    });
    board.style.minHeight = (maxBottom + 100) + 'px';
  });
}

document.addEventListener('mousemove', e => {
  if (moving) {
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`);
    if (!el) return;
    const nx = moving.origX + e.clientX - moving.startX;
    const ny = moving.origY + e.clientY - moving.startY;
    el.style.left = nx + 'px';
    el.style.top = ny + 'px';
  }
  if (resizing) {
    const card = cards[resizing.idx];
    card.w = Math.max(100, resizing.startW + e.clientX - resizing.startX);
    const el = document.querySelector(`.card[data-idx="${resizing.idx}"]`);
    if (el) el.style.width = card.w + 'px';
  }
});

document.addEventListener('mouseup', e => {
  if (moving) {
    const card = cards[moving.idx];
    card.x = Math.max(0, moving.origX + e.clientX - moving.startX);
    card.y = Math.max(0, moving.origY + e.clientY - moving.startY);
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`);
    if (el) { el.classList.remove('moving'); }
    moving = null; saveBoard();
  }
  if (resizing) { resizing = null; saveBoard(); }
});

function addTextCard() {
  cards.push({ type: 'text', content: '', x: 50, y: window.scrollY + 100, w: 300 });
  renderCards();
  setTimeout(() => { const els = document.querySelectorAll('.card .text'); els[els.length - 1]?.focus(); }, 100);
}

function addImageCard() {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = 'image/*';
  input.onchange = e => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = () => { cards.push({ type: 'image', src: reader.result, x: 50, y: window.scrollY + 100, w: 240 }); renderCards(); saveBoard(); };
    reader.readAsDataURL(file);
  };
  input.click();
}

function resetLayout() {
  if (!confirm('자동 재배치합니다. 현재 위치가 변경됩니다.')) return;
  cards.forEach(c => { delete c.x; delete c.y; });
  renderCards(); autoLayout();
}

setInterval(saveBoard, 30000);
loadBoard();
</script>
</body>
