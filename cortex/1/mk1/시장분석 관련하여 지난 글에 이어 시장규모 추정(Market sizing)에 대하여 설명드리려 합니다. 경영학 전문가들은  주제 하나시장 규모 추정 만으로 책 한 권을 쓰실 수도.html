<body>

<script>
const SAVE_KEY = 'board-시장분석-관련하여-지난-글에-이어-시장규모-추정-Market-sizing';
const IMG_BASE = '../../attachments/';
const DEFAULT_CARDS = [
  {
    "type": "text",
    "content": "시장분석 관련하여&#160;<a href=\"https://www.mobiinside.co.kr/2020/01/08/it-market/\" target=\"_blank\">지난 글</a>에 이어 시장규모 추정(Market sizing)에 대하여 설명드리려 합니다. 경영학 전문가들은 &#160;주제 하나시장 규모 추정 만으로 책 한 권을 쓰실 수도 있을 것 같은데요. 저는 비즈니스 기획자 관점에서 참고할 수 있는 몇 가지 팁을 설명드리려 합니다.<br>\t\t\t<br>제품 관리자들은 제품의 ‘기능’에 많은 관심을 기울입니다. FNAC(Feature, Not a Company)란 단어가 있습니다. 단어 그대로 사업보다는 기능에 집중하는 경향을 가리키는 것입니다. 좋은 제품 기능을 만들고 개선하는 것에 이의를 제기하는 사람들은 없을 것입니다. 하지만 제품 기능만큼이나&#160;“우리가 만드는 제품이 얼마나 많은 고객을 가지게 될까? 시장에 어떤 경쟁자가 존재할까? 우리가 진입하는 시장은 얼마나 클까?”와 같은 질문을 제품 기능만큼 고민이 필요합니다.<br>\t\t\t<br>과거 모바일 메신저 서비스들은 메시징 기능에 집중하여 사업을 시작했습니다. 하지만 다수의 메시징 기업들이 사업화에 어려움을 겪습니다. 결과적으로 이들 기업들은 몇 가지 선택의 기로에 놓이게 됩니다. 기능 군을 확대한 사업 확장 혹은 엣싯(Exit)입니다.<br>\t\t\t<br>Skype의 GroupMe인수, Facebook의 Whatsapp, Beluga처럼 피인수되는 사례도 있습니다. 반면에 Kik messenger처럼 사업 청산 직전에 이르는 경우도 있습니다. 물론 카카오톡처럼 선물하기, 게임 같이 제품 기능군을 확대해서 좋은 사업적 성과를 보여주는 사례도 있습니다.<br>\t\t\t<br>&#160;<br>\t\t\t<br>\t\t\t<br>2009년 출시하여 북미 10대들에게 높은 인기를 모았던 Kik 메신저, Kik 인터렉티브가 토큰 사업에 집중하기 위해 종료 발표했다가 구사일생으로 미디어랩에 피인수됨<br>\t\t\t<br>&#160;<br>\t\t\t<br>앞서 설명드린 것처럼 제품&#183;서비스를 만드는 사람은 시장에 관심을 가져야 합니다. 그럼 마켓 사이즈에 대한 몇 가지 팁을 구체적으로 설명하겠습니다.<br>\t\t\t<br>&#160;<br>\t\t\t<br>&#160;<br>\t\t\t<br>1. TAM, SAM, SOM<br>\t\t\t<br>&#160;<br>\t\t\t<br>시장 규모 추정 관련하여 TAM(Total Addressable Market), SAM(Serviceable Addressable Market), SOM(Serviceable Obtainable Market)란 용어가 있습니다.<br>\t\t\t<br>TAM은 제품이 속한 전체 산업의 규모를 의미합니다. 엑셀러레이터 테크 스타(Techstars) 블로그의&#160;<a href=\"https://www.techstars.com/content/entrepreneur-resources/tam-sam-som-lam-whats-launch-addressable-market/\" target=\"_blank\">데이브 파커(Dave Parker) 글</a>에서 예시를 바탕으로 TAM을 설명하겠습니다. 만일 여러분이 세일즈포스(Salesforce)와 같은 고객 관리용 CRM 솔루션을 개발한다면 TAM은 고객 또는 잠재 고객을 대면하고 관리하는 사람들이 대상이 될 것입니다 (세일즈 직군 담당자가 사용자이고, 고객은 실제 구매를 진행하는 구매팀 담당자가 되겠지만 관련 논의는 이번 설명에서 구체적으로 하지 않겠습니다)<br>\t\t\t<br>다음으로 SAM은 제품이 실제로 고객을 획득할 수 있는 시장을 의미합니다. 즉, 제품의 비즈니스 모델이 적용되는 시장으로 이해하시면 됩니다. 앞서 예를 든 CRM 솔루션이 영어만 지원하면 영미권 고객 관리 니즈가 있는 사람이 속한 시장이 SAM으로 정의됩니다. 그리고 더 나아가 IT분야의 고객 관리 담당자용 CRM 솔루션을 통해 버티컬 시장에 진입을 시도하면 SAM은 기존보다 더 명확해집니다.<br>\t\t\t<br>마지막으로 SOM은 제품이 6개월, 1년, 2년과 같이 근접 목표(Proximate Objective)를 가지고 SAM에서 실제로 획득할 시장을 의미합니다. 즉, 앞으로 만들 제품 혹은 지금까지 이룬 성과를 확장시킬 경우에 차지할 수 있는 시장 규모입니다. 영미권 IT 고객 관리 CRM 솔루션이 SAM이라면, SOM은 세일즈 조직의 규모, 세일즈 유형에 따라 목표로 하는 시장을 더욱 세분화할 수 있습니다.<br>\t\t\t<br>이밖에 TAM, SAM, SOM 외 LAM(Launch Addressable Market)이라는 용어도 있습니다. 린 스타트업(Lean Startup) 이론을 바탕으로 제품의 가설을 테스트할 수 있는 수준의 시장을 의미합니다.<br>\t\t\t<br>시장 규모를 표현할 때 카테고리별 규모, 주요 사업자의 점유율을 같이 고려하면 시장에 대한 진단을 더욱 정교화할 수 있습니다. 그리고 해당 산업이 오프라인 기반의 지배적이라면 온라인화 된 시장의 규모도 필요에 따라 같이 고려하는 것도 필요합니다. 제품이 속한 시장의 온라인화 비율이 유사 시장 대비 보다 낮다면 그만큼 기회가 더 크다고 합리적으로 가정할 수 있기 때문입니다.<br>\t\t\t<br>그리고 마지막으로 가장 중요한 점은 시장 규모에 활용된 자료 출처를 표기하는 것입니다!<br>\t\t\t<br>&#160;<br>\t\t\t<br>&#160;<br>\t\t\t<br>2. Top-down, Bottom-up<br>\t\t\t<br>&#160;<br>\t\t\t<br>마켓 사이징에 있어 어려운 점은 규모를 추정하는 것입니다. 시장 규모는 Top-down과 Bottom-up을 병행할 필요가 있습니다. Top-down은 통계 데이터와 같이 공개된 시장 데이터를 기반으로 하는 것입니다. 국가에서 공개한 통계 데이터를 활용할 수 있고, 보다 세분화된 시장 데이터가 필요하다면 (물론 힘들겠지만…) 관련 시장의 플랫폼 사업자(예: PG사, 카드사 등)에 요청하여 제품이 속한 시장의 거래액 비중을 참고할 수 있습니다.<br>\t\t\t<br>Top-down 결과는 Bottom-up 추정을 통해 검증을 할 수 있습니다. 예를 들면&#160;<a href=\"http://dart.fss.or.kr/\" target=\"_blank\">DART</a>에 공시된 시장 주요 사업자의 매출 데이터를 통해 검증할 수 있습니다. 혹은 제품의 타깃 고객 인터뷰를 통해 현재 유사 제품에 지출하는 비용을 체크하여 Top-down 추정 결과를 검증해볼 수 있습니다.<br>\t\t\t<br>예를&#160;들면&#160;A라는&#160;산업에&#160;대한&#160;Top-down 시장&#160;규모&#160;추정을&#160;2조로&#160;추정했다면, 해당&#160;A 산업에&#160;속한&#160;1위&#160;사업자의&#160;DART 전자공시&#160;자료의&#160;매출이&#160;5천억이라면, 전자공시로&#160;공개되지&#160;않은&#160;다른&#160;후발&#160;사업자의&#160;매출을&#160;대략적으로&#160;추정하여&#160;그&#160;합계가&#160;기존에&#160;추정했던&#160;2조에&#160;근사한지&#160;맞춰&#160;보는&#160;것입니다. 과거&#160;소셜커머스&#160;3사의&#160;매출&#160;지표가&#160;공시되기&#160;전에&#160;개인적으로&#160;추정한&#160;적이&#160;있었는데요. 이들&#160;기업의&#160;제품&#160;리스트&#160;및&#160;판매량이&#160;공개되었고, 제품&#160;군이&#160;정규분포를&#160;이룬다고&#160;가정하면&#160;매출을&#160;어느&#160;정도&#160;가늠할&#160;수&#160;있었던&#160;것&#160;같습니다.<br>\t\t\t<br>추정 결과는 완벽할 수 없습니다. 하지만 이 작업이 의미 있는 것은 제품이 속한 시장과 고객에 대해 이해할 기회를 가질 수 있으며, 제품이 향후 추진하는 전략과 과제 설정에 있어 일종의 가이드 역할을 할 수 있기 때문입니다.<br>\t\t\t<br>마지막 추정 관련해서 간혹 “보수적 추정(Conservative Estimates)”이란 표현을 씁니다. “보수적 추정에 기반하면 시장의 30%를 확보할 수 있을 것 같습니다” 관련해서 미국 벤처 캐피털리스트 마크 서스터(Mark Suster)는 “이게 보수적 추정이면, 도대체 언제 제대로 된 추정을 할 거야? “(if these are conservative estimates then WTF don’t you just give me the real estimates?)라고&#160;<a href=\"https://bothsidesofthetable.com/pitfalls-in-market-sizing-part-6-continued-59e2d3222013\" target=\"_blank\">언급</a>했습니다. 그는 그냥 “보수적 추정이란 표현을 사용하지 말라”고 조언을 했습니다. 실무에서 저와 같은 표현을 사용한 사람들 중에서 그 보수적 추정 결과에 기반한 목표를 달성한 사람도 거의 없는 것이 현실입니다.<br>\t\t\t<br>&#160;<br>\t\t\t<br>&#160;<br>\t\t\t<br>3. 시장의 성장<br>\t\t\t<br>&#160;<br>\t\t\t<br>시장규모 추정에 있어 시장 성장을 중요하게 고려해야 합니다. 신세계는 2010년 초반에 국내 시가총액 10위로 높은 가치를 인정받았던 기업입니다. 하지만 현재 신세계 시가총액은 현재 코스피 80~90위 수준이고, 기업가치가 쿠팡보다 많이 낮은 2.8조 원 수준입니다. 이와 같은 평가는 신세계가 온라인 대응에 있어 부진한 것을 의미할 수 있지만 한편으로 전통적인 부동산 기반 리테일 시장 전반의 하락세에 대한 예측이 반영된 결과이기도 합니다.<br>\t\t\t<br>이밖에 최근 미국 시장에서 베이비붐 세대의 은퇴에 따라 (비록 리스크는 높지만) 헬스케어 산업과 관련 기업이 높은 관심을 보이는 것은 거시적인 시장의 성장이 가진 중요성을 의미한다고 봅니다.<br>\t\t\t<br>시장 성장을 고려할 때 지금은 비록 작은 산업이지만 향후 5년간 크게 성장할 수 있으며, 지금은 크지만 향후 성장이 높지 않은 산업도 있습니다. 지금은 1조로 작은 시장이지만 5년 뒤 10조로 크게 성장할 수 있는 산업도 있으며, 지금은 10조가 넘지만 5년 뒤 12조 밖에 되지 않는 산업도 있을 것입니다. 비즈니스 기획을 할 때 시장의 성장에 대한 계산은 정확할 수 없습니다. 어디까지 예측입니다. 하지만 논리가 충분하여 누군가 질문을 하였을 때 잘 설명할 수 있는 수준이 되어야 합니다.<br>\t\t\t<br>&#160;<br>\t\t\t<br>&#160;<br>\t\t\t<br>4. 시장 점유율<br>\t\t\t<br>&#160;<br>\t\t\t<br>마크 서스터는 투자 검토 미팅에서 중국 시장의 1%(1% of China) 논리를 자주 마주친다고 합니다. 중국 시장의 1%를 차지하면 몇 조원을 벌 수 있다는 논리인데요. 그렇게 따지면 중국 시장의 1% 달성하기 위해서 수조 원을 구매할 수 있는 단 한 명의 고객만 있어도 될 것 같은데요. 그만큼 이러한 주장을 펼치는 것은 논리가 허술하고 비현실적일 수밖에 없습니다.<br>\t\t\t<br>&#160;<br>\t\t\t<br>\t\t\t<br>&#160;<br>\t\t\t<br>마크 서스터는 만일 5년 10억 달러에서 90억 달러로 성장하는 시장에 제품을 출시할 경우, 해당 제품이 첫해 시장 점유율이 50만 달러, 5년 뒤 1억 달러를 달성하는 경우를 예시로 들었습니다. 분명히 매출이 50만 달러에서 1억 달러로 성장하는 것은 &#160;200배에 달할 정도로 높은 성장률입니다. 하지만 그는 1.1%(1억/90억 달러) 점유율은 매우 낮은 수준이라 밝혔습니다. 앞서 설명한 TAM을 더욱 세분화하여 정의하는 것이 필요하다고 밝혔습니다. 혹자는 ‘목표 시장 점유율을 더 높이면 되지 않을까?’라고 반문할 수 있지만 모두가 쉽게 이야기하는 30% 시장 점유율도 달성하는 경우가 거의 없는 경우가 태반입니다.<br>\t\t\t<br>시장 점유율에 대한 목표 설정은 비즈니스 기획 담당자가 얼마나 현실 감각이 있는지를 나타내는 기준이라 볼 수 있습니다.<br>\t\t\t<br>&#160;<br>\t\t\t<br>&#160;<br>\t\t\t<br>5. 총매출 vs. 순매출<br>\t\t\t<br>&#160;<br>\t\t\t<br>시장규모 추정에 있어 총매출과 순매출에 대한 구분이 필요합니다. 총매출과 순매출에 대한 예시는 아래 2004년 구글과 야후의 매출인식 방식 관련&#160;<a href=\"http://m.joseilbo.com/news/view.htm?newsid=21923#_enliple\" target=\"_blank\">기사 내용</a>을 통해 알 수 있습니다.<br>\t\t\t<br>“A라는 회사가 야후 또는 구글을 통해 B사이트에 광고를 할 때 5달러의 매출이 발생한다면 야후와 구글 모두 B사이트에 3달러를 지급하게 된다. 야후는 5달러 매출로 계산하고(총매출) 3달러를 비용으로 치는 반면, 구글은 차액인 2달러만 매출로 기록하는 방식이다.”<br>\t\t\t<br>제가 알기로 현재 구글과 같은 광고 플랫폼 기업들은 위에서 설명한 야후와 같은 총매출 개념으로 매출인식을 하고 있는 것으로 알고 있습니다. 이와 같이 순매출은 수수료 기반의 사업이고, 총매출은 거래액 자체가 매출로 잡히는 구조입니다.<br>\t\t\t<br>&#160;<br>\t\t\t<br>&#160;<br>\t\t\t<br>\t\t\t<br>&#160;<br>\t\t\t<br>한 기업 내에서 비즈니스 모델에 따라 총매출과 순매출이 같이 포함된 경우도 있습니다. 쿠팡이 대표적인 예입니다. 쿠팡의 로켓 배송 마크가 붙은 상품은 쿠팡이 직접 제품을 구매하여(직매입)하여 판매합니다. 이런 경우 총매출 방식으로 매출 인식을 합니다. 반면 로켓 배송 마크가 붙지 않은 상품은 셀러가 쿠팡에 입점하여 판매하는 경우입니다. 이 경우 쿠팡은 중계 수수료를 해당 셀러로부터 판매액의 일정 금액을 받습니다. 이렇게 발생한 수수료 매출은 순매출로 인식됩니다.<br>\t\t\t<br>만일 여러분께서 준비하는 비즈니스 모델이 거래액 기반으로 매출을 인식하는지 혹은 수수료 기반인지 판단하여 시장규모 추정에 반영해야 할 것입니다. 수수료 기반 비즈니스 모델인데, 시장규모 추정을 거래액 기반의 총매출로 인식하는 경우가 지나치게 큰 TAM을 정의할 수 있습니다.<br>\t\t\t<br>&#160;<br>\t\t\t<br>&#160;<br>\t\t\t<br>6. 글로벌 및 인접 시장 진출<br>\t\t\t<br>&#160;<br>\t\t\t<br>최근 국내 IT 기업의 화두는 글로벌입니다. 최근 네이버가 글로벌 관련 TV 캠페인을 할 정도로 글로벌 사업에 대한 의지를 보여주고 있는데요. 실제로 네이버 웹툰은 해외에서 좋은 성과를 보여주고 있습니다. 이밖에 스윙비(Swingvy), 엠블(MVL)처럼 사업의 시작을 해외를 토대로 하는 기업들도 나타나고 있습니다.<br>\t\t\t<br>마켓 사이징에 있어 당장 해외 진출이 힘들더라도 비즈니스 기획 단계에서 고려는 하고 있어야 합니다. 국내 사업의 성장을 바탕으로 해당 카테고리의 미국, 일본, 동남아 등의 시장 진출하였을 때 마켓 사이징을 검토할 수 있습니다.<br>\t\t\t<br>이밖에 글로벌 확장 외에 인접 시장 진출도 비즈니스 기획 단계에서 검토할 수 있습니다. 우버(Uber)는 UberX의 성장을 바탕으로 UberSelect, UberPool, UberEats 상품 대응을 통해 다양한 모빌리티 시장에 대응할 수 있었습니다.<br>\t\t\t<br>글로벌 확장, 인접 시장 진출은 단기간 실행이 힘들겠지만 제품 관리자, 비즈니스 기획가의 담대한 목표와 상상력에 대한 의지를 보여줄 수 있는 기회가 될 것입니다.<br>\t\t\t<br>&#160;<br>\t\t\t<br><br>\t\t\t<br>&#160;<br>\t\t\t<br>지금까지 시장 진출에 있어 시장규모 추정에 있어 몇 가지 팁을 설명드렸습니다. 많은 내용을 마크 서스터, 데이브 파커의 글에서 참고했습니다. 제가 참고한 자료는 아래와 같으니 관심 있으신 분들께서 살펴보시길 추천드립니다.<br>\t\t\t<br>– Sorry Guys — It’s the Size of the Wave, Not the Motion of the Ocean&#160;<a href=\"https://bothsidesofthetable.com/sorry-guys-it-s-the-size-of-the-wave-not-the-motion-of-the-ocean-22d0ebf1954e\" target=\"_blank\">Link</a><br>\t\t\t<br>– Pitfalls in Market Sizing (part 6 continued)&#160;<a href=\"https://bothsidesofthetable.com/pitfalls-in-market-sizing-part-6-continued-59e2d3222013\" target=\"_blank\">Link</a><br>\t\t\t<br>– TAM, SAM, SOM and LAM – What’s your Launch Addressable Market?&#160;<a href=\"https://www.techstars.com/content/entrepreneur-resources/tam-sam-som-lam-whats-launch-addressable-market/\" target=\"_blank\">Link</a><br>\t\t\t<br>&#160;<br>\t\t\t<br>&#160;<br>\t\t\t<br>진용진님의&#160;<a href=\"https://brunch.co.kr/@yongjinjinipln\" target=\"_blank\">브런치</a>에 게재된 글을 모비인사이드가 한 번 더 소개합니다.&#160;<br>\t\t\t<br><br>\t\t\t출처: <<a href=\"https://www.mobiinside.co.kr/2020/01/21/it-market2/\" target=\"_blank\">https://www.mobiinside.co.kr/2020/01/21/it-market2/</a>>",
    "w": 400
  }
];

let cards = [];
let moving = null, resizing = null;

function loadBoard() {
  const saved = localStorage.getItem(SAVE_KEY);
  cards = saved ? JSON.parse(saved) : DEFAULT_CARDS.map(c => ({...c}));
  renderCards();
  if (!saved) autoLayout();
}

function autoLayout() {
  const GAP = 14;
  const boardW = document.getElementById('board').offsetWidth;
  const cols = Math.max(1, Math.floor(boardW / 280));
  const colW = (boardW - GAP * (cols - 1)) / cols;
  const colHeights = new Array(cols).fill(0);
  const allCards = document.querySelectorAll('.card');
  const images = document.querySelectorAll('.card img');
  let loaded = 0;
  const total = images.length;

  function place() {
    allCards.forEach((el, i) => {
      const card = cards[i];
      const w = Math.min(card.w || colW, colW);
      let minCol = 0;
      for (let c = 1; c < cols; c++) if (colHeights[c] < colHeights[minCol]) minCol = c;
      card.x = minCol * (colW + GAP);
      card.y = colHeights[minCol];
      card.w = w;
      el.style.left = card.x + 'px';
      el.style.top = card.y + 'px';
      el.style.width = w + 'px';
      colHeights[minCol] = card.y + el.offsetHeight + GAP;
    });
    document.getElementById('board').style.minHeight = Math.max(...colHeights) + 100 + 'px';
    saveBoard();
  }

  if (total === 0) requestAnimationFrame(place);
  else images.forEach(img => {
    if (img.complete) { loaded++; if (loaded >= total) requestAnimationFrame(place); }
    else img.onload = img.onerror = () => { loaded++; if (loaded >= total) requestAnimationFrame(place); };
  });
}

function syncText() {
  document.querySelectorAll('.card').forEach(el => {
    const idx = +el.dataset.idx;
    if (cards[idx]?.type === 'text') {
      const t = el.querySelector('.text');
      if (t) cards[idx].content = t.innerHTML;
    }
  });
}

function saveBoard() {
  syncText();
  localStorage.setItem(SAVE_KEY, JSON.stringify(cards));
  document.getElementById('status').textContent = '저장됨 ' + new Date().toLocaleTimeString();
}

function renderCards() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  cards.forEach((card, i) => {
    const el = document.createElement('div');
    el.className = 'card';
    el.dataset.idx = i;
    if (card.x !== undefined) el.style.left = card.x + 'px';
    if (card.y !== undefined) el.style.top = card.y + 'px';
    if (card.w) el.style.width = card.w + 'px';

    el.addEventListener('mousedown', e => {
      if (e.target.closest('.text, a, .card-btn, .resize-handle, table')) return;
      e.preventDefault();
      moving = { idx: i, startX: e.clientX, startY: e.clientY, origX: card.x || 0, origY: card.y || 0 };
      el.classList.add('moving');
    });

    const actions = document.createElement('div');
    actions.className = 'card-actions';
    const delBtn = document.createElement('button');
    delBtn.className = 'card-btn'; delBtn.textContent = '×';
    delBtn.onclick = e => { e.stopPropagation(); if (confirm('삭제?')) { cards.splice(i, 1); renderCards(); saveBoard(); } };
    actions.appendChild(delBtn);
    el.appendChild(actions);

    if (card.type === 'text') {
      const text = document.createElement('div');
      text.className = 'text';
      text.contentEditable = true;
      text.innerHTML = card.content || '';
      text.addEventListener('blur', () => { card.content = text.innerHTML; saveBoard(); });
      el.appendChild(text);
    } else if (card.type === 'image') {
      const src = card.src.startsWith('http') || card.src.startsWith('data:') ? card.src : IMG_BASE + card.src;
      const img = document.createElement('img');
      img.src = src;
      img.alt = card.alt || '';
      img.loading = 'lazy';
      img.onerror = () => img.style.display = 'none';
      if (card.link) {
        const a = document.createElement('a'); a.href = card.link; a.target = '_blank';
        a.appendChild(img); el.appendChild(a);
      } else { el.appendChild(img); }
      if (card.caption) {
        const cap = document.createElement('div');
        cap.className = 'caption';
        cap.textContent = card.caption;
        el.appendChild(cap);
      }
    } else if (card.type === 'table') {
      const wrapper = document.createElement('div');
      wrapper.style.overflowX = 'auto';
      wrapper.innerHTML = card.html || '';
      el.appendChild(wrapper);
    }

    const rh = document.createElement('div');
    rh.className = 'resize-handle';
    rh.addEventListener('mousedown', e => {
      e.preventDefault(); e.stopPropagation();
      resizing = { idx: i, startX: e.clientX, startW: card.w || el.offsetWidth };
    });
    el.appendChild(rh);
    board.appendChild(el);
  });

  requestAnimationFrame(() => {
    let maxBottom = 0;
    document.querySelectorAll('.card').forEach(el => {
      const b = (parseFloat(el.style.top) || 0) + el.offsetHeight;
      if (b > maxBottom) maxBottom = b;
    });
    board.style.minHeight = (maxBottom + 100) + 'px';
  });
}

document.addEventListener('mousemove', e => {
  if (moving) {
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`);
    if (!el) return;
    const nx = moving.origX + e.clientX - moving.startX;
    const ny = moving.origY + e.clientY - moving.startY;
    el.style.left = nx + 'px';
    el.style.top = ny + 'px';
  }
  if (resizing) {
    const card = cards[resizing.idx];
    card.w = Math.max(100, resizing.startW + e.clientX - resizing.startX);
    const el = document.querySelector(`.card[data-idx="${resizing.idx}"]`);
    if (el) el.style.width = card.w + 'px';
  }
});

document.addEventListener('mouseup', e => {
  if (moving) {
    const card = cards[moving.idx];
    card.x = Math.max(0, moving.origX + e.clientX - moving.startX);
    card.y = Math.max(0, moving.origY + e.clientY - moving.startY);
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`);
    if (el) { el.classList.remove('moving'); }
    moving = null; saveBoard();
  }
  if (resizing) { resizing = null; saveBoard(); }
});

function addTextCard() {
  cards.push({ type: 'text', content: '', x: 50, y: window.scrollY + 100, w: 300 });
  renderCards();
  setTimeout(() => { const els = document.querySelectorAll('.card .text'); els[els.length - 1]?.focus(); }, 100);
}

function addImageCard() {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = 'image/*';
  input.onchange = e => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = () => { cards.push({ type: 'image', src: reader.result, x: 50, y: window.scrollY + 100, w: 240 }); renderCards(); saveBoard(); };
    reader.readAsDataURL(file);
  };
  input.click();
}

function resetLayout() {
  if (!confirm('자동 재배치합니다. 현재 위치가 변경됩니다.')) return;
  cards.forEach(c => { delete c.x; delete c.y; });
  renderCards(); autoLayout();
}

setInterval(saveBoard, 30000);
loadBoard();
</script>
</body>
