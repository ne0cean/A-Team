<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #1e1e1e;
  color: #e0e0e0;
  font-family: 'Segoe UI', -apple-system, sans-serif;
  font-size: 15px;
  line-height: 1.6;
  padding: 20px 30px 60px;
  overflow-x: hidden;
}
a { color: #6cb0f6; text-decoration: none; }
a:hover { text-decoration: underline; }
.title-bar {
  background: #3a3a5c;
  display: inline-block;
  padding: 6px 16px;
  font-size: 22px;
  font-weight: bold;
  color: #fff;
  margin-bottom: 4px;
}
.date { color: #999; font-size: 13px; margin-bottom: 20px; }
.board { position: relative; }
.card {
  background: #2a2a2a;
  border: 1px solid #3a3a3a;
  border-radius: 8px;
  padding: 12px;
  position: absolute;
  cursor: grab;
  transition: box-shadow 0.15s;
  overflow: hidden;
}
.card:hover { box-shadow: 0 0 0 1px #58a6ff; z-index: 10; }
.card.moving { opacity: 0.8; box-shadow: 0 4px 24px rgba(0,0,0,0.6); z-index: 100; cursor: grabbing; }
.card img { width: 100%; border-radius: 4px; display: block; }
.card .caption { font-size: 12px; color: #888; margin-top: 6px; }
.card .text { outline: none; min-height: 20px; white-space: pre-wrap; word-break: break-word; }
.card .text:focus { background: rgba(255,255,255,0.05); border-radius: 4px; padding: 4px; }
.card .text:empty::before { content: '텍스트 입력...'; color: #555; }
.card table { border-collapse: collapse; width: 100%; font-size: 13px; }
.card table td, .card table th { border: 1px solid #444; padding: 4px 8px; vertical-align: top; }
.card table th { background: #333; color: #ccc; }
.card-actions { position: absolute; top: 4px; right: 4px; display: none; gap: 4px; }
.card:hover .card-actions { display: flex; }
.card-btn { background: #333; border: 1px solid #555; color: #ccc; border-radius: 4px; padding: 2px 6px; font-size: 11px; cursor: pointer; }
.card-btn:hover { background: #444; color: #fff; }
.resize-handle { position: absolute; bottom: 0; right: 0; width: 16px; height: 16px; cursor: se-resize; opacity: 0; }
.card:hover .resize-handle { opacity: 0.6; }
.resize-handle::after { content: ''; position: absolute; bottom: 3px; right: 3px; width: 8px; height: 8px; border-right: 2px solid #666; border-bottom: 2px solid #666; }
.toolbar { position: fixed; bottom: 0; left: 0; right: 0; background: #161b22; border-top: 1px solid #30363d; padding: 8px 20px; display: flex; gap: 12px; align-items: center; z-index: 200; }
.toolbar button { background: #21262d; border: 1px solid #30363d; color: #e0e0e0; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; }
.toolbar button:hover { background: #30363d; }
.toolbar .status { color: #8b949e; font-size: 12px; margin-left: auto; }
.highlight-red { color: #ff6b6b; }
.highlight-blue { color: #6cb0f6; }
</style>

const DEFAULT_CARDS = [
  {
    "type": "text",
    "content": "TOP Down approach<br>\t\t<br>\t\t<br>\t<br>\t<br>\t\t<br>\t\t\t<br>\t\t\t\t<br>STEP 1️⃣ 인류의 “불변 욕구” 목록화<br>\t\t\t\t<br>기술과 무관하게 반복되는 것들:<br>\t\t\t\t<br>- 연결 (Connection)<br>\t\t\t\t<br>- 이해 (Understanding)<br>\t\t\t\t<br>- 판단 (Decision-making)<br>\t\t\t\t<br>- 신뢰 (Trust)<br>\t\t\t\t<br>- 소속 (Belonging)<br>\t\t\t\t<br>- 효율 (Efficiency)<br>\t\t\t\t<br>- 통제 (Control over uncertainty)<br>\t\t\t\t<br>&#128073;&#160;다음 파도는 이 중 하나를 ‘질적으로 업그레이드’한다<br>\t\t\t\t<br><br>\t\t\t\t<br>STEP 2️⃣ “기술이 항상 실패해왔던 지점” 찾기<br>\t\t\t\t<br>여기서 기회가 생긴다.<br>\t\t\t\t<br>예시:<br>\t\t\t\t<br>- 사람의&#160;의도<br>\t\t\t\t<br>- 사람의&#160;상황<br>\t\t\t\t<br>- 사람의&#160;맥락<br>\t\t\t\t<br>- 사람의&#160;모호한 상태<br>\t\t\t\t<br>&#128073; 이건 기존 IT가&#160;정형화 불가능해서 포기한 영역<br>\t\t\t\t<br><br>\t\t\t\t<br>STEP 3️⃣ “이번엔 왜 가능한가?”를 묻기<br>\t\t\t\t<br>이 질문에&#160;AI가 정확히 들어맞는 영역만 남긴다.<br>\t\t\t\t<br>- 룰로 못 푸는가? → YES<br>\t\t\t\t<br>- 확률&#183;추론&#183;맥락이 필요한가? → YES<br>\t\t\t\t<br>- 인간처럼 애매한 판단이 필요한가? → YES<br>\t\t\t\t<br>&#128073;&#160;이 교차점이 ‘다음 파도’<br>\t\t\t\t<br><br>\t\t\t\t<br>I'm just wanna be a player, BIG player.<br>\t\t\t\t<br><br>\t\t\t\t<br>✅ 반드시 물어야 할 질문<br>\t\t\t\t<br>- 이게 보편적 인간 행동을 바꾸는가?<br>\t\t\t\t<br>- 이게 새로운 default를 만드는가?<br>\t\t\t\t<br>- 10년 뒤엔 ‘이전엔 이게 없었다’고 말할 수 있는가?<br>\t\t\t\t<br><br>\t\t\t\t<br><br>\t\t\t\t<br>5. BIG player 관점에서의 결정적 한 문장<br>\t\t\t\t<br>다음 10년의 플랫폼은<br>\t\t\t\t<br>‘사람들이 무엇을 보느냐’를 장악하는 게 아니라<br>\t\t\t\t<br>‘사람들이 어떻게 결정하느냐’를 장악한다.<br>\t\t\t\t<br><br>\t\t\t\t<br><br>\t\t\t\t<br>네가 장악하려는 시장은 사실 이거다:<br>\t\t\t\t<br>“인간이 하루에 여러 번 반복적으로 ‘의식 없이’ 사용하는<br>\t\t\t\t<br>비물리적 활동을,<br>\t\t\t\t<br>AI가 개인 단위로 최적화하면서<br>\t\t\t\t<br>데이터 락인과 네트워크 효과가 동시에 발생하는 영역”<br>\t\t\t\t<br>이 문장이 중요해.<br>\t\t\t\t<br>왜냐하면 이 문장을 만족하는 시장은&#160;생각보다 매우 적기 때문이야.<br>\t\t\t\t<br><br>\t\t\t\t<br>결론부터 말하면<br>\t\t\t\t<br>“다음 빅씽 산업은 아직 ‘산업’으로 인식되지 않는다.”<br>\t\t\t\t<br>자동차가 등장하기 전엔 “마차 산업의 고도화”처럼 보였고,<br>\t\t\t\t<br>인터넷도 “통신의 부가 서비스”처럼 보였지.<br>\t\t\t\t<br>BIG shift는 항상 기존 산업의 하위 카테고리로 위장해서 등장한다.<br>\t\t\t\t<br>그래서 나는 “섹터”가 아니라<br>\t\t\t\t<br>‘인간 기능(Function of human)’ 단위로 다음 파도를 본다.<br>\t\t\t\t<br><br>\t\t\t\t<br><br>\t\t\t\t<br>내가 보는 NEXT BIG THING의 진짜 정체<br>\t\t\t\t<br>&#128273; 핵심 정의<br>\t\t\t\t<br>아직 모바일로 이전되지 못한 것은<br>\t\t\t\t<br>‘행동’이 아니라<br>\t\t\t\t<br>인간의&#160;내부 작동 방식이다.<br>\t\t\t\t<br>- 생각<br>\t\t\t\t<br>- 판단<br>\t\t\t\t<br>- 의도<br>\t\t\t\t<br>- 망설임<br>\t\t\t\t<br>- 직감<br>\t\t\t\t<br>- 주저함<br>\t\t\t\t<br>- 확신이 생기는 순간<br>\t\t\t\t<br>&#128073; 이건 아직도&#160;머리 안에서만 일어남<br>\t\t\t\t<br>&#128073; 디지털에는&#160;결과만 남고,&#160;과정은 없다<br>\t\t\t\t<br><br>\t\t\t\t<br>그래서 내가 보는 “다음 파도” TOP 3<br>\t\t\t\t<br>(산업 ❌ / 문명 레벨 ⭕)<br>\t\t\t\t<br>&#129351; 1.&#160;Cognition Infrastructure (인지 인프라)<br>\t\t\t\t<br>인간의 사고&#183;판단&#183;결정이 일어나는&#160;보이지 않는 층<br>\t\t\t\t<br>왜 이게 1위인가<br>\t\t\t\t<br>- 아직&#160;산업조차 아니다<br>\t\t\t\t<br>- 하지만 모든 산업 위에 올라탄다<br>\t\t\t\t<br>- 인터넷이 “정보 인프라”였다면￼→ 이건&#160;사고 인프라<br>\t\t\t\t<br>역사적 전이<br>\t\t\t\t<br>- 문자 → 사고 외주화<br>\t\t\t\t<br>- 인쇄 → 지식 복제<br>\t\t\t\t<br>- 인터넷 → 정보 접근<br>\t\t\t\t<br>- AI → 사고 과정의 외주화<br>\t\t\t\t<br>&#128073; 아직 아무도 <b>‘사고가 어디서 일어나는가’</b>를 장악하지 못했다<br>\t\t\t\t<br>왜 네가 접근 가능한가<br>\t\t\t\t<br>- 하드웨어 필요 ❌<br>\t\t\t\t<br>- 규제 거의 없음<br>\t\t\t\t<br>- 개인 단위부터 시작 가능<br>\t\t\t\t<br>- AI-native로만 가능<br>\t\t\t\t<br>이건&#160;절대 니치가 될 수 없는 영역이다.<br>\t\t\t\t<br>왜냐면&#160;모든 인간은 생각을 한다.<br>\t\t\t\t<br><br>\t\t\t\t<br>&#129352; 2.&#160;Intent & Transition Layer (의도&#183;전환 계층)<br>\t\t\t\t<br>“하기 직전 / 말하기 직전 / 사기 직전”의&#160;순간<br>\t\t\t\t<br>아직 모바일로 안 온 이유<br>\t\t\t\t<br>- 의도는 모호하고<br>\t\t\t\t<br>- 룰로 정의 불가능했고<br>\t\t\t\t<br>- 프라이버시 이슈가 컸다<br>\t\t\t\t<br>왜 이제 가능한가<br>\t\t\t\t<br>- AI는&#160;의도를 ‘정답’이 아니라 확률로 다룬다<br>\t\t\t\t<br>- 인간처럼 애매하게 접근 가능<br>\t\t\t\t<br>이게 왜 거대한가<br>\t\t\t\t<br>- 모든 행동의&#160;입구<br>\t\t\t\t<br>- 광고, 커머스, 커뮤니케이션, 교육, 헬스 전부 연결됨<br>\t\t\t\t<br>구글이 “검색 의도”를 장악했다면<br>\t\t\t\t<br>다음 플레이어는&#160;‘행동 의도’ 자체를 장악한다.<br>\t\t\t\t<br><br>\t\t\t\t<br>&#129353; 3.&#160;Self-Model Economy (자기 모델 경제)<br>\t\t\t\t<br>인간이 “나 자신을 이해하기 위해” 사용하는 시스템<br>\t\t\t\t<br>아직 오지 않은 이유<br>\t\t\t\t<br>- 지금의 앱은 전부:<br>\t\t\t\t<br>- fitness app<br>\t\t\t\t<br>- finance app<br>\t\t\t\t<br>- diary app<br>\t\t\t\t<br>- 파편화된 나만 제공<br>\t\t\t\t<br>다음 단계<br>\t\t\t\t<br>- “이 사람이 어떤 인간인가”를￼시간 축으로 누적해 이해하는 모델<br>\t\t\t\t<br>이건:<br>\t\t\t\t<br>- SNS ❌<br>\t\t\t\t<br>- 헬스 앱 ❌<br>\t\t\t\t<br>- 생산성 앱 ❌<br>\t\t\t\t<br>&#128073;&#160;‘나’라는 객체의 디지털 트윈이다.<br>\t\t\t\t<br><br>\t\t\t\t<br>이 세 개의 공통점 (중요)<br>\t\t\t\t<br>이건 산업이 아니라:<br>\t\t\t\t<br>- 인간 내부 상태를 디지털 객체로 만든다<br>\t\t\t\t<br>- 기존 모바일 앱 구조로는 불가능<br>\t\t\t\t<br>- AI 없이 절대 안 됨<br>\t\t\t\t<br>- 그리고&#160;한 번 자리 잡으면 바뀌지 않는다<br>\t\t\t\t<br>자동차 이후에 다시 마차로 돌아가지 않듯<br>\t\t\t\t<br>사고 인프라 이후에 “생각을 안 쓰는 디지털”로는 돌아가지 않는다.<br>\t\t\t\t<br><br>\t\t\t\t<br><br>\t\t\t\t<br>인간의 하루에서&#160;사고(Thinking)가 발생하는 실제 슬롯 지도<br>\t\t\t\t<br>핵심 전제부터 말할게.<br>\t\t\t\t<br>인간은 하루 종일 생각하지 않는다.<br>\t\t\t\t<br>생각은 ‘특정 순간’에만 집중적으로 발생한다.<br>\t\t\t\t<br>이 순간들이 바로<br>\t\t\t\t<br>아직 모바일로 이전되지 않은 영역이고<br>\t\t\t\t<br>AI가 처음으로 개입할 수 있는 슬롯이다.<br>\t\t\t\t<br><br>\t\t\t\t<br>BIG player 관점에서<br>\t\t\t\t<br>첫 atomic market는 ‘산업’이 아니라 ‘시간 슬롯’이다.<br>\t\t\t\t<br>다음 중&#160;하나만&#160;골라줘:<br>\t\t\t\t<br>1️⃣&#160;아침 슬롯&#160;– 하루의 사고 기준을 장악<br>\t\t\t\t<br>2️⃣&#160;결정 직전 슬롯&#160;– 인간 판단을 장악<br>\t\t\t\t<br>3️⃣&#160;붕괴 직후 슬롯&#160;– 주의력 회복을 장악<br>\t\t\t\t<br>4️⃣&#160;사회적 판단 슬롯&#160;– 관계의 기본값을 장악<br>\t\t\t\t<br>5️⃣&#160;잠들기 전 슬롯&#160;– 의미와 기억을 장악<br>\t\t\t\t<br>이 선택은<br>\t\t\t\t<br><b>“첫 제품”이 아니라<br>\t\t\t\t<br>“어디서부터 인간의 사고 OS를 점령할 것인가”</b>다.<br>\t\t\t\t<br><br>\t\t\t\t<br>7. 너에게 딱 맞는 현실적인 첫 목표<br>\t\t\t\t<br>지금 너에게 가장 중요한 목표는 이거 하나다:<br>\t\t\t\t<br>“사람들이<br>\t\t\t\t<br>‘아, 이 순간엔 혼자 생각하면 안 되겠다’<br>\t\t\t\t<br>라고 느끼는 순간을 하나 장악하는 것”<br>\t\t\t\t<br>그 순간에&#160;습관적으로 켜는 무언가가 되면<br>\t\t\t\t<br>돈은&#160;항상 나중에 붙는다.<br>\t\t\t\t<br><br>\t\t\t\t<br>사람들이 실제로 돈을 내는 상황들<br>\t\t\t\t<br>아래를 보자.<br>\t\t\t\t<br>이건 전부&#160;이미 돈이 오가는 시장이다.<br>\t\t\t\t<br>- 이직 컨설팅<br>\t\t\t\t<br>- 재무 설계<br>\t\t\t\t<br>- 법률 자문<br>\t\t\t\t<br>- 연애 코칭<br>\t\t\t\t<br>- 심리 상담<br>\t\t\t\t<br>- 투자 리서치<br>\t\t\t\t<br>- 리더십 코칭<br>\t\t\t\t<br>공통점이 뭔지 알지?<br>\t\t\t\t<br><b>전부 ‘판단을 대신해주는 것’이 아니라<br>\t\t\t\t<br>‘잘못 판단했을 때의 리스크를 줄여주는 것’</b>이다.<br>\t\t\t\t<br><br>\t\t\t\t<br>4. 그럼 인간에게 그런 순간이 실제로 있나?<br>\t\t\t\t<br>너무 많다.<br>\t\t\t\t<br>그리고 이미 사람들은 돈을 내고 있다. 다만&#160;비효율적인 형태로.<br>\t\t\t\t<br>예시 몇 개만 보자 (현실)<br>\t\t\t\t<br>&#128165; 1️⃣ 메시지/관계 판단<br>\t\t\t\t<br>- “이 말 보내도 될까?”<br>\t\t\t\t<br>- 보내고 나서 후회<br>\t\t\t\t<br>- 관계 틀어짐<br>\t\t\t\t<br>→ 그래서 사람들은:<br>\t\t\t\t<br>- 친구에게 캡처 보내고<br>\t\t\t\t<br>- 심리 상담 받고<br>\t\t\t\t<br>- 연애 코칭에 돈을 낸다<br>\t\t\t\t<br>&#128073;&#160;이미 돈이 지불되고 있음<br>\t\t\t\t<br><br>\t\t\t\t<br>&#128165; 2️⃣ 커리어 판단<br>\t\t\t\t<br>- 이직할까 말까<br>\t\t\t\t<br>- 남을까 말까<br>\t\t\t\t<br>→ 그래서 사람들은:<br>\t\t\t\t<br>- 헤드헌터<br>\t\t\t\t<br>- 커리어 코치<br>\t\t\t\t<br>- 멘토<br>\t\t\t\t<br>에게 돈을 낸다.<br>\t\t\t\t<br><br>\t\t\t\t<br>&#128165; 3️⃣ 투자 판단<br>\t\t\t\t<br>- 팔까 말까<br>\t\t\t\t<br>- 더 살까 말까<br>\t\t\t\t<br>→ 이미 말할 필요도 없다.<br>\t\t\t\t<br>수수료, 리서치, 구독, 커뮤니티…<br>\t\t\t\t<br><br>\t\t\t\t<br>중요한 관찰<br>\t\t\t\t<br>사람들은&#160;AI가 없어서 돈을 안 쓰는 게 아니다.<br>\t\t\t\t<br>이미&#160;사람에게 돈을 쓰고 있다.<br>\t\t\t\t<br>문제는:<br>\t\t\t\t<br>- 비싸고<br>\t\t\t\t<br>- 느리고<br>\t\t\t\t<br>- 주관적이고<br>\t\t\t\t<br>- 항상 곁에 있지 않다<br>\t\t\t\t<br>-",
    "w": 400
  }
];

let cards = [];
let moving = null, resizing = null;

function loadBoard() {
  const saved = localStorage.getItem(SAVE_KEY);
  cards = saved ? JSON.parse(saved) : DEFAULT_CARDS.map(c => ({...c}));
  renderCards();
  if (!saved) autoLayout();
}

function autoLayout() {
  const GAP = 14;
  const boardW = document.getElementById('board').offsetWidth;
  const cols = Math.max(1, Math.floor(boardW / 280));
  const colW = (boardW - GAP * (cols - 1)) / cols;
  const colHeights = new Array(cols).fill(0);
  const allCards = document.querySelectorAll('.card');
  const images = document.querySelectorAll('.card img');
  let loaded = 0;
  const total = images.length;

  function place() {
    allCards.forEach((el, i) => {
      const card = cards[i];
      const w = Math.min(card.w || colW, colW);
      let minCol = 0;
      for (let c = 1; c < cols; c++) if (colHeights[c] < colHeights[minCol]) minCol = c;
      card.x = minCol * (colW + GAP);
      card.y = colHeights[minCol];
      card.w = w;
      el.style.left = card.x + 'px';
      el.style.top = card.y + 'px';
      el.style.width = w + 'px';
      colHeights[minCol] = card.y + el.offsetHeight + GAP;
    });
    document.getElementById('board').style.minHeight = Math.max(...colHeights) + 100 + 'px';
    saveBoard();
  }

  if (total === 0) requestAnimationFrame(place);
  else images.forEach(img => {
    if (img.complete) { loaded++; if (loaded >= total) requestAnimationFrame(place); }
    else img.onload = img.onerror = () => { loaded++; if (loaded >= total) requestAnimationFrame(place); };
  });
}

function syncText() {
  document.querySelectorAll('.card').forEach(el => {
    const idx = +el.dataset.idx;
    if (cards[idx]?.type === 'text') {
      const t = el.querySelector('.text');
      if (t) cards[idx].content = t.innerHTML;
    }
  });
}

function saveBoard() {
  syncText();
  localStorage.setItem(SAVE_KEY, JSON.stringify(cards));
  document.getElementById('status').textContent = '저장됨 ' + new Date().toLocaleTimeString();
}

function renderCards() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  cards.forEach((card, i) => {
    const el = document.createElement('div');
    el.className = 'card';
    el.dataset.idx = i;
    if (card.x !== undefined) el.style.left = card.x + 'px';
    if (card.y !== undefined) el.style.top = card.y + 'px';
    if (card.w) el.style.width = card.w + 'px';

    el.addEventListener('mousedown', e => {
      if (e.target.closest('.text, a, .card-btn, .resize-handle, table')) return;
      e.preventDefault();
      moving = { idx: i, startX: e.clientX, startY: e.clientY, origX: card.x || 0, origY: card.y || 0 };
      el.classList.add('moving');
    });

    const actions = document.createElement('div');
    actions.className = 'card-actions';
    const delBtn = document.createElement('button');
    delBtn.className = 'card-btn'; delBtn.textContent = '×';
    delBtn.onclick = e => { e.stopPropagation(); if (confirm('삭제?')) { cards.splice(i, 1); renderCards(); saveBoard(); } };
    actions.appendChild(delBtn);
    el.appendChild(actions);

    if (card.type === 'text') {
      const text = document.createElement('div');
      text.className = 'text';
      text.contentEditable = true;
      text.innerHTML = card.content || '';
      text.addEventListener('blur', () => { card.content = text.innerHTML; saveBoard(); });
      el.appendChild(text);
    } else if (card.type === 'image') {
      const src = card.src.startsWith('http') || card.src.startsWith('data:') ? card.src : IMG_BASE + card.src;
      const img = document.createElement('img');
      img.src = src;
      img.alt = card.alt || '';
      img.loading = 'lazy';
      img.onerror = () => img.style.display = 'none';
      if (card.link) {
        const a = document.createElement('a'); a.href = card.link; a.target = '_blank';
        a.appendChild(img); el.appendChild(a);
      } else { el.appendChild(img); }
      if (card.caption) {
        const cap = document.createElement('div');
        cap.className = 'caption';
        cap.textContent = card.caption;
        el.appendChild(cap);
      }
    } else if (card.type === 'table') {
      const wrapper = document.createElement('div');
      wrapper.style.overflowX = 'auto';
      wrapper.innerHTML = card.html || '';
      el.appendChild(wrapper);
    }

    const rh = document.createElement('div');
    rh.className = 'resize-handle';
    rh.addEventListener('mousedown', e => {
      e.preventDefault(); e.stopPropagation();
      resizing = { idx: i, startX: e.clientX, startW: card.w || el.offsetWidth };
    });
    el.appendChild(rh);
    board.appendChild(el);
  });

  requestAnimationFrame(() => {
    let maxBottom = 0;
    document.querySelectorAll('.card').forEach(el => {
      const b = (parseFloat(el.style.top) || 0) + el.offsetHeight;
      if (b > maxBottom) maxBottom = b;
    });
    board.style.minHeight = (maxBottom + 100) + 'px';
  });
}

document.addEventListener('mousemove', e => {
  if (moving) {
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`);
    if (!el) return;
    const nx = moving.origX + e.clientX - moving.startX;
    const ny = moving.origY + e.clientY - moving.startY;
    el.style.left = nx + 'px';
    el.style.top = ny + 'px';
  }
  if (resizing) {
    const card = cards[resizing.idx];
    card.w = Math.max(100, resizing.startW + e.clientX - resizing.startX);
    const el = document.querySelector(`.card[data-idx="${resizing.idx}"]`);
    if (el) el.style.width = card.w + 'px';
  }
});

document.addEventListener('mouseup', e => {
  if (moving) {
    const card = cards[moving.idx];
    card.x = Math.max(0, moving.origX + e.clientX - moving.startX);
    card.y = Math.max(0, moving.origY + e.clientY - moving.startY);
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`);
    if (el) { el.classList.remove('moving'); }
    moving = null; saveBoard();
  }
  if (resizing) { resizing = null; saveBoard(); }
});

function addTextCard() {
  cards.push({ type: 'text', content: '', x: 50, y: window.scrollY + 100, w: 300 });
  renderCards();
  setTimeout(() => { const els = document.querySelectorAll('.card .text'); els[els.length - 1]?.focus(); }, 100);
}

function addImageCard() {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = 'image/*';
  input.onchange = e => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = () => { cards.push({ type: 'image', src: reader.result, x: 50, y: window.scrollY + 100, w: 240 }); renderCards(); saveBoard(); };
    reader.readAsDataURL(file);
  };
  input.click();
}

function resetLayout() {
  if (!confirm('자동 재배치합니다. 현재 위치가 변경됩니다.')) return;
  cards.forEach(c => { delete c.x; delete c.y; });
  renderCards(); autoLayout();
}

setInterval(saveBoard, 30000);
loadBoard();
</script>
</body>
</html>
