<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #1e1e1e;
  color: #e0e0e0;
  font-family: 'Segoe UI', -apple-system, sans-serif;
  font-size: 15px;
  line-height: 1.6;
  padding: 20px 30px 60px;
  overflow-x: hidden;
}
a { color: #6cb0f6; text-decoration: none; }
a:hover { text-decoration: underline; }
.title-bar {
  background: #3a3a5c;
  display: inline-block;
  padding: 6px 16px;
  font-size: 22px;
  font-weight: bold;
  color: #fff;
  margin-bottom: 4px;
}
.date { color: #999; font-size: 13px; margin-bottom: 20px; }
.board { position: relative; }
.card {
  background: #2a2a2a;
  border: 1px solid #3a3a3a;
  border-radius: 8px;
  padding: 12px;
  position: absolute;
  cursor: grab;
  transition: box-shadow 0.15s;
  overflow: hidden;
}
.card:hover { box-shadow: 0 0 0 1px #58a6ff; z-index: 10; }
.card.moving { opacity: 0.8; box-shadow: 0 4px 24px rgba(0,0,0,0.6); z-index: 100; cursor: grabbing; }
.card img { width: 100%; border-radius: 4px; display: block; }
.card .caption { font-size: 12px; color: #888; margin-top: 6px; }
.card .text { outline: none; min-height: 20px; white-space: pre-wrap; word-break: break-word; }
.card .text:focus { background: rgba(255,255,255,0.05); border-radius: 4px; padding: 4px; }
.card .text:empty::before { content: '텍스트 입력...'; color: #555; }
.card table { border-collapse: collapse; width: 100%; font-size: 13px; }
.card table td, .card table th { border: 1px solid #444; padding: 4px 8px; vertical-align: top; }
.card table th { background: #333; color: #ccc; }
.card-actions { position: absolute; top: 4px; right: 4px; display: none; gap: 4px; }
.card:hover .card-actions { display: flex; }
.card-btn { background: #333; border: 1px solid #555; color: #ccc; border-radius: 4px; padding: 2px 6px; font-size: 11px; cursor: pointer; }
.card-btn:hover { background: #444; color: #fff; }
.resize-handle { position: absolute; bottom: 0; right: 0; width: 16px; height: 16px; cursor: se-resize; opacity: 0; }
.card:hover .resize-handle { opacity: 0.6; }
.resize-handle::after { content: ''; position: absolute; bottom: 3px; right: 3px; width: 8px; height: 8px; border-right: 2px solid #666; border-bottom: 2px solid #666; }
.toolbar { position: fixed; bottom: 0; left: 0; right: 0; background: #161b22; border-top: 1px solid #30363d; padding: 8px 20px; display: flex; gap: 12px; align-items: center; z-index: 200; }
.toolbar button { background: #21262d; border: 1px solid #30363d; color: #e0e0e0; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; }
.toolbar button:hover { background: #30363d; }
.toolbar .status { color: #8b949e; font-size: 12px; margin-left: auto; }

<body>

<script>
const SAVE_KEY = 'board-가장-효과적인-창업자들을-연구해서-얻은-교훈들';
const IMG_BASE = '../../attachments/';
const DEFAULT_CARDS = [
  {
    "type": "text",
    "content": "<a href=\"https://blog.google/outreach-initiatives/entrepreneurs/effective-founders-project/\" target=\"_blank\">가장 효과적인 창업자들을 연구해서 얻은 교훈들</a><br>\t\t\t\t\t<br>&#160;(blog.google)<br>\t\t\t\t\t<br>\t\t\t\t<br>\t\t\t\t<br>\t\t\t\t\t17P by&#160;<a href=\"https://news.hada.io/user?id=xguru\" target=\"_blank\">xguru</a>&#160;9시간전&#160;|&#160;<a href=\"http://javascript:fav(6792,%20%22favorite%22\" target=\"_blank\">favorite</a>)&#160;|&#160;<a href=\"https://news.hada.io/topic?id=6792\" target=\"_blank\">댓글 2개</a><br>\t\t\t\t<br>\t\t\t\t<br>\t\t\t\t\t\t\t\t\t\t<br><br>\t\t\t\t\t<br>\t\t\t\t\t\t<br><br>\t\t\t\t\t\t<br>- 55%의 스타트업은 사람 문제로 실패함<br>\t\t\t\t\t\t<br>- Google for Startups에서 40개국, 900명의 창업자/CEO/CTO를 조사￼→ 최고의 리더십 전략들을 정리해서 'Effective Founders Project' PDF(59p)로 공개<br>\t\t\t\t\t\t<br>핵심 7가지<br>\t\t\t\t\t\t<br>1. 사람들을 Volunteer처럼 대하세요<br>\t\t\t\t\t\t<br>- 대학졸업자,경력자 부터 세계 수준의 인재까지 최고의 사람들은 의미 있는 미션을 위해 위대한 일을 하고 싶어함<br>\t\t\t\t\t\t<br>- 목적을 가지고 팀에 영감을 주는 것은 최고의 인재를 고용하고 유지할 수 있는 기회를 제공함<br>\t\t\t\t\t\t<br>- 예를 들어 뛰어난 엔지니어들은 시장을 몰아내는 올드한 프로젝트 보다는 독특한 도전을 원함<br>\t\t\t\t\t\t<br>2. 방해요소로부터 팀을 보호하세요<br>\t\t\t\t\t\t<br>- CEO는 종종 새로운 아이디어들로 산만해 보이지만, 최고의 CEO들은 진정으로 중요한 것에 집중하게 만듦<br>\t\t\t\t\t\t<br>- 하지만 이것은 어려움 : 스타트업이 길을 찾을 때는 모든 것이 기회처럼 보여서 집중하기가 힘들게 함<br>\t\t\t\t\t\t<br>- 팀의 모멘텀을 만들기 위해 명확한 목표와 우선 순위를 설정할 것<br>\t\t\t\t\t\t<br>- 이것들이 점차 더 좋은 성과와 사기를 이끌어 냄<br>\t\t\t\t\t\t<br>- 훌륭한 아이디어를 묻어버릴 때를 위한 일종의 종료의식(Closure Ritual)을 만드는 것도 중요함<br>\t\t\t\t\t\t<br>3. 불필요한 마이크로매니지먼트를 최소화 하세요<br>\t\t\t\t\t\t<br>- 특정 상황에서는 도움이 되지만, 효율적인 리더들은 자신과 비즈니스를 성장시키기 위해 업무를 위임하는 것을 목표로 함<br>\t\t\t\t\t\t<br>4. 의견 불일치를 권장하세요<br>\t\t\t\t\t\t<br>- 창업자들은 종종 (공동창업자나 동료들은 높게 평가하는) 자신과 다른 의견을 과소 평가하는 경향이 있음<br>\t\t\t\t\t\t<br>- 몇몇 연구결과에선 여러 팀간의 의견 불일치가 실제로는 더 효과적인 결과로 이어진다고 함<br>\t\t\t\t\t\t<br>- 결과적으로 이는 더 혁신적이고 포괄적인 제품을 만들게 된다는 것<br>\t\t\t\t\t\t<br>5. 대인 형평성을 유지하세요<br>\t\t\t\t\t\t<br>- 공동창업자간 갈등의 주요 원인은 기대 위반(Viloated Expectations)<br>\t\t\t\t\t\t<br>- 데이터에 의하면 많은 창업자들의 공동창업자의 의무(Duty)를 트래킹 하지만, 자신도 모르게 기대치를 최소한으로 정의함<br>\t\t\t\t\t\t<br>- 가장 효과적인 공동창업자들은 공개적으로 토론하고 서로에게 기대하는 것을 문서화 하며, 우리가 \"대인 형평성(Interpersonal Equity)\"이라 부르는 것을 지속적으로 확인<br>\t\t\t\t\t\t<br>- 둘 간의 기대치가 공정(fair)하다고 느끼나요? 당신이 주고 받는 것은 공동창업자와 비교했을 때 공정한가요 ?<br>\t\t\t\t\t\t<br>6. 전문 지식과 보조를 맞추세요<br>\t\t\t\t\t\t<br>- 모든 분야에서 전문가가 될 수는 없지만, 리더는 적합한 사람을 고용하고 팀을 성장시키기 위해 충분히 알아야 함<br>\t\t\t\t\t\t<br>- 가장 효과적인 창업자의 93%는 업무를 효과적으로 관리하고, 업계에서 앞서 나갈수 있도록 시간을 할애하는 기술적 전문성을 가지고 있음<br>\t\t\t\t\t\t<br>7. 낙담(discouragement)을 이겨내세요<br>\t\t\t\t\t\t<br>- 많은 사람들이 자신감(self-confidence)이 시간이 지나면 성장할 것이라고 기대하지만, 데이터에 의하면 가장 효과적인 설립자도 가장 효과적이지 않은 설립자와 비슷한 정도의 자신감을 가지고 있음<br>\t\t\t\t\t\t<br>- 이것은 더닝-크루거* 효과와 얼라인￼→ 인지 편향의 하나로, 능력이 없는 사람이 잘못된 판단을 내려 잘못된 결론에 도달하지만, 능력이 없기 때문에 자신의 실수를 알아차리지 못하는 현상<br>\t\t\t\t\t\t<br>- 여정을 시작할때의 과신(overconfidence)은 창업자들이 시작하는데 도움이 되지만, 곧 낙담과 자기 회의(self-doubt)가 시작됨<br>\t\t\t\t\t\t<br>- 이 둘은 차례로 당신이 더 멀리 가는데 필요한 내적인 도전을 줄 수 있음<br>\t\t\t\t\t\t<br>- 일부에게는 자기 회의가 좌절로 다가옴<br>\t\t\t\t\t\t<br>- 만약 당신이 그렇다면, 필연적인 실패가 아닌 성장의 신호일 가능성이 있다는 걸 명심할 것<br>\t\t\t\t\t\t<br>- 당신을 위한 지원 시스템을 찾고, 긍정적인 것에 집중하고, 필요할 때 도움을 요청하는 방법을 알아둘 것<br>\t\t\t\t\t<br>\t\t\t\t\t<br>\t\t\t\t<br>\t\t\t<br>\t\t\t<br><br>\t\t\t출처: <<a href=\"https://news.hada.io/topic?id=6792&utm_source=discord&utm_medium=bot&utm_campaign=280\" target=\"_blank\">https://news.hada.io/topic?id=6792&utm_source=discord&utm_medium=bot&utm_campaign=280</a>> <br>\t\t\t<br><br>\t\t<br>\t\t<br>\t\t\t<br>창업 초기엔 대표가 제품 개발, 마케팅, 머천다이징(MD), 세일즈, 회계, 재무, 투자 유치 등을 다 해야 해요. 이 모든 부분에서 꽤 높은 수준의 전문성을 가지고 있어야 합니다. 그래야만 단기간에 크게 성장할 수 있어요. 물론 이 모든 것에 대해 대표가 전문성을 가지고 있지 않다고 회사가 성공할 수 없는 것은 아니에요. 대신 오래 걸리죠.<br>\t\t\t<br><br>\t\t\t<br>예를 들어, 조직 문화를 유지하는 데 중요하게 생각하는 숫자 몇 개가 있어요. 신규 입사자, 즉, 수습 기간 중인 구성원의 비율이 10~15%를 넘지 않도록 유지하고 있고, 수습 평가를 통과한 정규직 직원의 퇴사율도 신경 써야 합니다. 법인 설립한 지 2년, 서비스 출시한 지 1년 반 정도 되었는데 5~6%를 넘지 않고 있어요. 10% 아래로 유지하려고 엄청 노력하고 있어요. ‘컬처 핏’이 맞는 사람만 뽑아야 하니까요. 1,2차로 구성된 정규직 2차 인터뷰엔 제가 무조건 들어가고 있습니다.<br>\t\t\t<br>그리고 30명에서 50명으로 조직이 커질 때는 위계(hierarchy)가 반드시 있어야 합니다. 그런데 많은 스타트업들이 수평적이라서, 위계가 없다고 하죠. 그럼 스케일업이 어려워요. 그 다음에 50명에서 100명으로 늘어날 때는 컬처가 무너지지 않는 것이 중요해요.“<br>\t\t\t<br><br>\t\t\t<br> <<a href=\"https://book.naver.com/bookdb/book_detail.nhn?bid=11112926\" target=\"_blank\">조직의 재창조</a>>나 <<a href=\"https://book.naver.com/bookdb/book_detail.nhn?bid=6763502\" target=\"_blank\">언리더십</a>><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t출처: <<a href=\"https://camp.lemonbase.com/ceo_interview/rapportlabs?fbclid=IwAR2LNLIu8q6q7Cgs8H0q6yRr4Z3JckANsI1y27rPS4LsZTFFkSIXnCJ_lJY&utm_source=substack&utm_medium=email\" target=\"_blank\">https://camp.lemonbase.com/ceo_interview/rapportlabs?fbclid=IwAR2LNLIu8q6q7Cgs8H0q6yRr4Z3JckANsI1y27rPS4LsZTFFkSIXnCJ_lJY&utm_source=substack&utm_medium=email</a>> <br>\t\t\t<br><br>\t\t\t<br>샘 알트만의 성공방정식 <br>\t\t\t<br><a href=\"https://sonujung.com/how-to-be-successful?utm_source=substack&utm_medium=email\" target=\"_blank\">https://sonujung.com/how-to-be-successful?utm_source=substack&utm_medium=email</a>>",
    "w": 400
  }
];

let cards = [];
let moving = null, resizing = null;

function loadBoard() {
  const saved = localStorage.getItem(SAVE_KEY);
  cards = saved ? JSON.parse(saved) : DEFAULT_CARDS.map(c => ({...c}));
  renderCards();
  if (!saved) autoLayout();
}

function autoLayout() {
  const GAP = 14;
  const boardW = document.getElementById('board').offsetWidth;
  const cols = Math.max(1, Math.floor(boardW / 280));
  const colW = (boardW - GAP * (cols - 1)) / cols;
  const colHeights = new Array(cols).fill(0);
  const allCards = document.querySelectorAll('.card');
  const images = document.querySelectorAll('.card img');
  let loaded = 0;
  const total = images.length;

  function place() {
    allCards.forEach((el, i) => {
      const card = cards[i];
      const w = Math.min(card.w || colW, colW);
      let minCol = 0;
      for (let c = 1; c < cols; c++) if (colHeights[c] < colHeights[minCol]) minCol = c;
      card.x = minCol * (colW + GAP);
      card.y = colHeights[minCol];
      card.w = w;
      el.style.left = card.x + 'px';
      el.style.top = card.y + 'px';
      el.style.width = w + 'px';
      colHeights[minCol] = card.y + el.offsetHeight + GAP;
    });
    document.getElementById('board').style.minHeight = Math.max(...colHeights) + 100 + 'px';
    saveBoard();
  }

  if (total === 0) requestAnimationFrame(place);
  else images.forEach(img => {
    if (img.complete) { loaded++; if (loaded >= total) requestAnimationFrame(place); }
    else img.onload = img.onerror = () => { loaded++; if (loaded >= total) requestAnimationFrame(place); };
  });
}

function syncText() {
  document.querySelectorAll('.card').forEach(el => {
    const idx = +el.dataset.idx;
    if (cards[idx]?.type === 'text') {
      const t = el.querySelector('.text');
      if (t) cards[idx].content = t.innerHTML;
    }
  });
}

function saveBoard() {
  syncText();
  localStorage.setItem(SAVE_KEY, JSON.stringify(cards));
  document.getElementById('status').textContent = '저장됨 ' + new Date().toLocaleTimeString();
}

function renderCards() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  cards.forEach((card, i) => {
    const el = document.createElement('div');
    el.className = 'card';
    el.dataset.idx = i;
    if (card.x !== undefined) el.style.left = card.x + 'px';
    if (card.y !== undefined) el.style.top = card.y + 'px';
    if (card.w) el.style.width = card.w + 'px';

    el.addEventListener('mousedown', e => {
      if (e.target.closest('.text, a, .card-btn, .resize-handle, table')) return;
      e.preventDefault();
      moving = { idx: i, startX: e.clientX, startY: e.clientY, origX: card.x || 0, origY: card.y || 0 };
      el.classList.add('moving');
    });

    const actions = document.createElement('div');
    actions.className = 'card-actions';
    const delBtn = document.createElement('button');
    delBtn.className = 'card-btn'; delBtn.textContent = '×';
    delBtn.onclick = e => { e.stopPropagation(); if (confirm('삭제?')) { cards.splice(i, 1); renderCards(); saveBoard(); } };
    actions.appendChild(delBtn);
    el.appendChild(actions);

    if (card.type === 'text') {
      const text = document.createElement('div');
      text.className = 'text';
      text.contentEditable = true;
      text.innerHTML = card.content || '';
      text.addEventListener('blur', () => { card.content = text.innerHTML; saveBoard(); });
      el.appendChild(text);
    } else if (card.type === 'image') {
      const src = card.src.startsWith('http') || card.src.startsWith('data:') ? card.src : IMG_BASE + card.src;
      const img = document.createElement('img');
      img.src = src;
      img.alt = card.alt || '';
      img.loading = 'lazy';
      img.onerror = () => img.style.display = 'none';
      if (card.link) {
        const a = document.createElement('a'); a.href = card.link; a.target = '_blank';
        a.appendChild(img); el.appendChild(a);
      } else { el.appendChild(img); }
      if (card.caption) {
        const cap = document.createElement('div');
        cap.className = 'caption';
        cap.textContent = card.caption;
        el.appendChild(cap);
      }
    } else if (card.type === 'table') {
      const wrapper = document.createElement('div');
      wrapper.style.overflowX = 'auto';
      wrapper.innerHTML = card.html || '';
      el.appendChild(wrapper);
    }

    const rh = document.createElement('div');
    rh.className = 'resize-handle';
    rh.addEventListener('mousedown', e => {
      e.preventDefault(); e.stopPropagation();
      resizing = { idx: i, startX: e.clientX, startW: card.w || el.offsetWidth };
    });
    el.appendChild(rh);
    board.appendChild(el);
  });

  requestAnimationFrame(() => {
    let maxBottom = 0;
    document.querySelectorAll('.card').forEach(el => {
      const b = (parseFloat(el.style.top) || 0) + el.offsetHeight;
      if (b > maxBottom) maxBottom = b;
    });
    board.style.minHeight = (maxBottom + 100) + 'px';
  });
}

document.addEventListener('mousemove', e => {
  if (moving) {
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`);
    if (!el) return;
    const nx = moving.origX + e.clientX - moving.startX;
    const ny = moving.origY + e.clientY - moving.startY;
    el.style.left = nx + 'px';
    el.style.top = ny + 'px';
  }
  if (resizing) {
    const card = cards[resizing.idx];
    card.w = Math.max(100, resizing.startW + e.clientX - resizing.startX);
    const el = document.querySelector(`.card[data-idx="${resizing.idx}"]`);
    if (el) el.style.width = card.w + 'px';
  }
});

document.addEventListener('mouseup', e => {
  if (moving) {
    const card = cards[moving.idx];
    card.x = Math.max(0, moving.origX + e.clientX - moving.startX);
    card.y = Math.max(0, moving.origY + e.clientY - moving.startY);
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`);
    if (el) { el.classList.remove('moving'); }
    moving = null; saveBoard();
  }
  if (resizing) { resizing = null; saveBoard(); }
});

function addTextCard() {
  cards.push({ type: 'text', content: '', x: 50, y: window.scrollY + 100, w: 300 });
  renderCards();
  setTimeout(() => { const els = document.querySelectorAll('.card .text'); els[els.length - 1]?.focus(); }, 100);
}

function addImageCard() {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = 'image/*';
  input.onchange = e => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = () => { cards.push({ type: 'image', src: reader.result, x: 50, y: window.scrollY + 100, w: 240 }); renderCards(); saveBoard(); };
    reader.readAsDataURL(file);
  };
  input.click();
}

function resetLayout() {
  if (!confirm('자동 재배치합니다. 현재 위치가 변경됩니다.')) return;
  cards.forEach(c => { delete c.x; delete c.y; });
  renderCards(); autoLayout();
}

setInterval(saveBoard, 30000);
loadBoard();
</script>
</body>
</html>
