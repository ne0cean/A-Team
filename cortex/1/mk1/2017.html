<style>

body {

.card {

.card .text { outline: none; min-height: 20px; white-space: pre-wrap; word-break: break-word; }
.card .text:focus { background: rgba(255,255,255,0.05); border-radius: 4px; padding: 4px; }

.card:hover .card-actions { display: flex; }

.card-btn:hover { background: #444; color: #fff; }
.resize-handle { position: absolute; bottom: 0; right: 0; width: 16px; height: 16px; cursor: se-resize; opacity: 0; }
.card:hover .resize-handle { opacity: 0.6; }
.resize-handle::after { content: ''; position: absolute; bottom: 3px; right: 3px; width: 8px; height: 8px; border-right: 2px solid #666; border-bottom: 2px solid #666; }
.toolbar { position: fixed; bottom: 0; left: 0; right: 0; background: #161b22; border-top: 1px solid #30363d; padding: 8px 20px; display: flex; gap: 12px; align-items: center; z-index: 200; }
.toolbar button { background: #21262d; border: 1px solid #30363d; color: #e0e0e0; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; }
.toolbar button:hover { background: #30363d; }
.toolbar .status { color: #8b949e; font-size: 12px; margin-left: auto; }
.highlight-red { color: #ff6b6b; }

  {
    "type": "text",
    "content": "2017<br>\t\t\t\t<br>1. 안전판을 만든다. 어플이든 뭐든 일과 병행 가능한<br>\t\t\t\t<br>2. 비즈니스 스킬을 규명하고 회사를 일으킬 공부를 한다.<br>\t\t\t\t<br>영어. 회계. 수학...<br>\t\t\t\t<br><a href=\"https://brunch.co.kr/@imagineer/203\" target=\"_blank\">https://brunch.co.kr/@imagineer/203</a><br>\t\t\t\t<br><br>\t\t\t\t<br>VR, Actual Game, 스마트카, Communiaction, <br>\t\t\t\t<br>통계분석(R 등), Growth hacking, 머신러닝, 플랫폼<br>\t\t\t\t<br><br>\t\t\t\t<br>ㅇ 요건<br>\t\t\t\t<br>파괴적 BM 버블을 공격하라.<br>\t\t\t\t<br><br>\t\t\t\t<br>ㅇ 목표 : 첫 번째 비즈니스로 안전판을 마련한다.<br>\t\t\t\t<br>  - 3년 이내에 exit이 가능 할 것<br>\t\t\t\t<br>  - 최소한의 자원(내가 핸들링 가능한) 내가 잘 할 수 있는 것일 것.<br>\t\t\t\t<br>\t\t\t\t\t<br>- 플랫폼일 것<br>\t\t\t\t<br>\t\t\t\t<br>  <br>\t\t\t\t<br>내가 얼마나 시간과 자금을 투자 할 수 있고, 투자할 생각인가?<br>\t\t\t\t<br>시간과 자금은 어떻게 마련할 계획인가?<br>\t\t\t\t<br>어떤 방법으로 제대로된 프로젝트를 선별하고 분서가고 투자할 것인가?<br>\t\t\t\t<br>인맥을 어떻게 활용할 것이며, 함께 할 팀을 어떻게 꾸릴 것인가?<br>\t\t\t\t<br><br>\t\t\t\t<br><br>\t\t\t\t<br>300개의 아이디어를 ##까지 내고, 결정<br>\t\t\t\t<br>그리고 유저 스터디. 동료 구하기<br>\t\t\t\t<br>나는 세상이 더 나아지게 하는 방법에는 두 가지가 있다고 믿는다.<br>\t\t\t\t<br>하나는 더 많은 선행이 행해지는 것이고,<br>\t\t\t\t<br>다른 하나는 세상이 더 나빠지지 않도록 하는데 있다.<br>\t\t\t\t<br>세상은 우리가 살기 좋아지도록 노력하는 것 보다<br>\t\t\t\t<br>어쩌면 더 빠른 속도로 나빠지고 있고. 나는 그래서 더 나빠지지 않도록 하는 일이 충분히<br>\t\t\t\t<br>가치있다고 믿는다. 그리고 그런 문제와 불편을 해결하는 것이 나의 사명이라 믿는다.<br>\t\t\t\t<br><br>\t\t\t\t<br>단지 더 많은 부를 축적하기 위해서 지금의 안정적인 직장을 박차고 나온다면,<br>\t\t\t\t<br>그것은 나 스스로와 나와 함께 일하게 될 사람들에 대한 모욕이다.<br>\t\t\t\t<br>중요한 것은, 내가 살아가는 동안에 어떤 문제들을 해결할 것인가이다.<br>\t\t\t\t<br>중요한건 내 자신이 아니다. 내가 무엇을 남겨놓을 것인가.<br>\t\t\t\t<br>결국 한 사람의 인생의 크기는 그의 삶이 아니다. 그것은 먼지처럼 오간데 없을 것이다.<br>\t\t\t\t<br>결국 어떤 변화를 자아낼 것이가이다.<br>\t\t\t\t<br><br>\t\t\t\t<br>시계에서 해방하는 일.<br>\t\t\t\t<br><br>\t\t\t\t<br>독과점 체제라거나, 가격이 너무 과다 계산되어있는 사례<br>\t\t\t\t<br>질레트 면도기, 랍스터<br>\t\t\t\t<br><br>\t\t\t\t<br>오감, 의식주, 3차원, 시공간<br>\t\t\t\t<br><br>\t\t\t\t<br>ㅇ 어떤 분야의 문제./불편을 해결할 것인가.<br>\t\t\t\t<br> = 어떤 분야/고객의 전문가가 될 것인가<br>\t\t\t\t<br><br>\t\t\t\t<br>ㅇ 요건<br>\t\t\t\t<br>  - 하루 3번이상 사용<br>\t\t\t\t<br>  - 높은 마진률과 불합리가 존재하는 시장의 디스럽티브 BM<br>\t\t\t\t<br>   E.X) 와비파커처럼 불합리한 폭리를 취하는 집단이 있는영역<br>\t\t\t\t<br>  - 규모의 경제, 네트워크 효과를 유발할 수 있는 플랫폼일 것<br>\t\t\t\t<br>  - 최첨단의 기술이 필요치 않은 영역: 적정기술<br>\t\t\t\t<br>  - 양극화가 심해지고 있다. 돈을 쓸 여력이 있는 계층을 공략하라.<br>\t\t\t\t<br>  - 하루에 3번 이상 사용하는 serduct가 되거나, 혹은 그것에 붙거나<br>\t\t\t\t<br>   팝소켓, 칫솔은 어때?, 반으로 쪼개서 씻을 수 있는 컵, 접어서 휴대 가능한 사각 컵, <br>\t\t\t\t<br>  - 자신을 더 나아보이게 하는 분야 - 미용(얼굴 붓기 빼주는 마스크)<br>\t\t\t\t<br>  - 휴대폰 에어백 케이스(낙하를 인지하고 에어백 터지는) - 노트북 등으로 확장.<br>\t\t\t\t<br>  - 몸에 지니고 있으면 무조건 차량이 멈추게 하는 발신기.<br>\t\t\t\t<br>  - 여튼 하루중에 내가 계속 불편을 느끼지만 무의식의 영역에 자리잡은, 언멧 니즈는 뭐야? 걱정은 뭐야?<br>\t\t\t\t<br>   의.식.주, 오감<br>\t\t\t\t<br>  - 증강현실 명함, 프로필 - 셀레브로<br>\t\t\t\t<br>  - 육아용 손목 보호대(골키퍼 장갑이나 외골격, 볼링장갑)<br>\t\t\t\t<br>  - 플랫폼일것.  잉여력으로 가마니 있어도 돈벌게해주는? - 게이딸? 뭔가 자신의 데이터를 허용만해도 - GPS켜고 위치정보 제공 한다던지 하는 것만으로도 돈이<br>\t\t\t\t<br>ㅇ 루틴을 팔아라, 하루중 반복적인 행동패턴에 붙여라<br>\t\t\t\t<br><br>\t\t\t\t<br>10배의 혁신, 문샷 씽킹<br>\t\t\t\t<br><br>\t\t\t\t<br><a href=\"http://blog.naver.com/chaly0208/90186780894\" target=\"_blank\">http://blog.naver.com/chaly0208/90186780894</a> 휴대폰 에어백 케이스<br>\t\t\t\t<br>엄청 부풀려질 필요는 없고, 지면에 닿는 순간에 충격만 흡수하면 됨.<br>\t\t\t\t<br>스파이더맨처럼 끈적이를 쏘던가, 역추진로켓을 달던가, 아니면 액정만이라도.<br>\t\t\t\t<br>아니면 각 모서리에서 뭐가 튀어나와도 됨. 그게 에어백이 아니라 플라스틱이어도 좋아. 고슴도치(제품명) 사출되거나, 아님 케이스 자체가 펼쳐지는거야. 이어폰단자로부터 자이로센서 데이터를 받을 수 있나?<br>\t\t\t\t<br><br>\t\t\t\t<br>3대 트리니티 - 시간 - 공간 - 커뮤니케이션 -<br>\t\t\t\t<br><br>\t\t\t\t<br>D2D - 음향, 전파, 전자파, 신호, 빛,<br>\t\t\t\t<br><br>\t\t\t\t<br>=========<br>\t\t\t\t<br>문제는 곧 기회, Focus - ship - learn, repeat<br>\t\t\t\t<br>해결 할 가치가 있는 문제에 집중, 문제를 더 잘 해결할 수 잇는 제품/서비스 제공, 고객으로부터 학습, 이 순환을 점차 빠르게 가속화.<br>\t\t\t\t<br><br>\t\t\t\t<br>ㅇ 플랫폼 비즈 시작 단계에서 필요한 5가지<br>\t\t\t\t<br>1) 대상 고객 2) 혁신 대상 경쟁자 3) 차별화 가치 4) 초기 파트너 5) 초기 자본금<br>\t\t\t\t<br>경쟁자가 없다는 것은 조사를 충분히 하지 않았거나, 시장(받아들일 고객)이 없다는 의미일 수 있으니 주의 필요<br>\t\t\t\t<br><br>\t\t\t\t<br>차별화 가치를 제시 할 때에는 아주 간결하고 명확하게 표현할 수 있어야함.<br>\t\t\t\t<br>3단어로 30초간 설명, 3분의 추가 설명으로 사업의 본질을 간명하게 표현할 수 있어야 함.<br>\t\t\t\t<br>그렇지 못한 다는 것은 BM이 명쾌하지 않다는 의미임.<br>\t\t\t\t<br><br>\t\t\t\t<br><br>\t\t\t\t<br>남들이 모르는 것 을 잘 알고<br>\t\t\t\t<br>남들이 잘 못하는 것을 잘하면<br>\t\t\t\t<br>그게 경쟁력.<br>\t\t\t\t<br><br>\t\t\t\t<br>첫째. 생계유지와 좋아하는 것을 분리하는 법이다. 먼저 먹고 사는 문제부터 해결하라. 그리고 내가 좋아하는 일을 그 외의 시간에 하는 것이다.<br>\t\t\t\t<br><br>\t\t\t\t<br>둘째. 좋아하는 것을 끝까지 하며 버티는 법이다. 좋아하는 것이 돈이 되는 방법이 하나 있다. 끝까지 버티는 것이다. 그래서 전문가의 경지에 오르는 순간 돈은 들어오기 시작한다.<br>\t\t\t\t<br><br>\t\t\t\t<br><br>\t\t\t\t<br><br>\t\t\t\t<br>뜨레들로, 캡틴캔디<br>\t\t\t\t<br><br>\t\t\t\t<br>IPTV 딜러 효율화? 혁신?<br>\t\t\t\t<br><br>\t\t\t\t<br>스타트업 아이디어를 발견하는 최고의 방법은 자기 자신에게 “나는 다른 사람이 나를 위해 무엇을 만들어줬으면 좋겠는가?”를 묻는 것이다.<br>\t\t\t\t<br>이러한 ‘문제’를 발견하기 위해, 어쩌면 당신은 스스로를 제 3자의 입장에서 바라볼 필요가 있을 것이다. 왜냐하면 당신이 이미 그 부족한 부분들에 익숙해져 그것들을 당연시 하고 있을 가능성이 높기 때문이다.<br>\t\t\t\t<br><br>\t\t\t\t<br><a href=\"http://www.jimmyrim.com/m/160\" target=\"_blank\">http://www.jimmyrim.com/m/160</a><br>\t\t\t\t<br><br>\t\t\t\t<br>T페이로 자주타는 버스 트래킹 - 그 버스가 언제오고, 지금 위치에서 언제 출발해야 하는지 알림 <br>\t\t\t\t<br><br>\t\t\t\t<br>노력과 시간과 나이는 하나도 중요하지 않다. 중요한건 운. 타이밍이다.<br>\t\t\t\t<br><br>\t\t\t\t<br>중요한건, 무슨 문제를. 얼마나 큰 문제를. 얼마나 심플한 방법으로 해결하느냐.<br>\t\t\t\t<br>지렛대, 피뢰침, 같은 아이디어야.<br>\t\t\t\t<br>지렛대처럼 다른 사람의 힘을 나의 힘으로, 경쟁자의 힘과 자원까지 이용.<br>\t\t\t\t<br>[6. \"앞으로 10년 동안에 어떤 변화를 예측하고 있습니까?](onenote:<a href=\"https://d.docs.live.net/733661839cc53ba5/문서/이상海_/Direction.one#제프%20베조스가%20전하는%20최고의%2020가지%20조언%20–%20후회의%20최소화&section-id={9E0D6DD5-2F03-4514-AA1C-9451191DB379}&page-id={0F9E2393-4D08-4406-AE11-5E8138DAB3B9}&object-id={EFE2BDEE-943F-02B9-1E18-034B00FA3E22}&48)\" target=\"_blank\">https://d.docs.live.net/733661839cc53ba5/문서/이상海_/Direction.one#제프%20베조스가%20전하는%20최고의%2020가지%20조언%20–%20후회의%20최소화&section-id={9E0D6DD5-2F03-4514-AA1C-9451191DB379}&page-id={0F9E2393-4D08-4406-AE11-5E8138DAB3B9}&object-id={EFE2BDEE-943F-02B9-1E18-034B00FA3E22}&48)</a><br>\t\t\t\t<br><br>\t\t\t\t<br>엘러펀트 인더룸<br>\t\t\t\t<br><br>\t\t\t\t<br>기업이 해결하고자 하는 문제를 산정하고<br>\t\t\t\t<br>그 목표를 해결하고 나면 기업을 접는다.<br>\t\t\t\t<br>그리고 그 유산을 다음 세대의 문제해결을 위한 펀드로 남긴다.<br>\t\t\t\t<br><br>\t\t\t\t<br><a href=\"http://www.demoday.co.kr/blog/126\" target=\"_blank\">http://www.demoday.co.kr/blog/126</a><br>\t\t\t\t<br><a href=\"http://kr.besuccess.com/2013/12/stopthinkingofidea/\" target=\"_blank\">http://kr.besuccess.com/2013/12/stopthinkingofidea/</a><br>\t\t\t\t<br><a href=\"http://kr.startupall.kr/booksforstartups_02/\" target=\"_blank\">http://kr.startupall.kr/booksforstartups_02/</a><br>\t\t\t\t<br><a href=\"https://www.ted.com/talks/yochai_benkler_on_the_new_open_source_economics/transcript?language=ko\" target=\"_blank\">https://www.ted.com/talks/yochai_benkler_on_the_new_open_source_economics/transcript?language=ko</a><br>\t\t\t\t<br><br>\t\t\t\t<br>1. 지금 쓴 처방이 워킹하고 있다.<br>\t\t\t\t<br>2. (실적이 저조하면) 10월에는 이러한 방법 혹은 변수로 turnaround 할 것이다.<br>\t\t\t\t<br><br>\t\t\t\t<br>ㅇ 컨트라리언 접근법<br>\t\t\t\t<br>1. 시장 컨센선스와른 다른 시각이 필요하다는 믿음<br>\t\t\t\t<br>2. 시장 컨센서스에 도전하고 의문을 제기하여, 그 결점을 찾아내고 투자기회를 발굴하여 차별화<br>\t\t\t\t<br>3. 경제 ,산업, 기업의 사이클 및 동향에 대한 자신만의 관점을 구축. 자신만의 관점을 견지한다.<br>\t\t\t\t<br><br>\t\t\t\t<br>ㅇ 질문<br>\t\t\t\t<br>Q1. 기존의 어떤 불편을 해소하는가?<br>\t\t\t\t<br>Q2. 어떤 편의성/가치를 제고하는가?<br>\t\t\t\t<br>제품이 지향하는 철학은 무엇인가?<br>\t\t\t\t<br><br>\t\t\t\t<br>시제품 만들기 - 테스트로 뭘 해볼까?<br>\t\t\t\t<br><br>\t\t\t\t<br><a href=\"http://m.post.naver.com/viewer/postView.nhn?memberNo=5364756&volumeNo=4508073\" target=\"_blank\">http://m.post.naver.com/viewer/postView.nhn?memberNo=5364756&volumeNo=4508073</a> <br>\t\t\t\t<br>1. 창업자에게 필요한 역량, 그것도 내가 진입하려는 분야에서<br>\t\t\t\t<br>  - 최고의 팀을 꾸리는 능력 : 각각의 스페셜 리스트<br>\t\t\t\t<br>2. 사업의 최적 타이밍을 포착하는 능력<br>\t\t\t\t<br>  - 빨라도, 느려도 안된다.<br>\t\t\t\t<br><br>\t\t\t\t<br>어떻게 시작하지? 성공.실패해본 창업가와<br>\t\t\t\t<br>벤쳐캐피털 리스트들의 모임<br>\t\t\t\t<br><a href=\"http://m.mt.co.kr/renew/view.html?no=2012080518231262717&type=outlink\" target=\"_blank\">http://m.mt.co.kr/renew/view.html?no=2012080518231262717&type=outlink</a><br>\t\t\t\t<br><br>\t\t\t\t<br><a href=\"http://m.news.naver.com/read.nhn?mode=LSD&sid1=001&oid=052&aid=0000810558\" target=\"_blank\">http://m.news.naver.com/read.nhn?mode=LSD&sid1=001&oid=052&aid=0000810558</a><br>\t\t\t\t<br><br>\t\t\t\t<br><a href=\"http://m.thesingle.co.kr/SinglesMobile/mobileweb/news_content/detail_news_content.do?nc_no=610986&fmc_no=599677&fsmc_no=599692\" target=\"_blank\">http://m.thesingle.co.kr/SinglesMobile/mobileweb/news_content/detail_news_content.do?nc_no=610986&fmc_no=599677&fsmc_no=599692</a><br>\t\t\t\t<br><br>\t\t\t\t<br><a href=\"http://kr.besuccess.com/2014/07/jackma-2/\" target=\"_blank\">http://kr.besuccess.com/2014/07/jackma-2/</a><br>\t\t\t\t<br><br>\t\t\t\t<br><a href=\"https://beecanvas.com/pZP1DwR3\" target=\"_blank\">세계적 기업들의 사업계획서</a><br>\t\t\t\t<br><br>\t\t\t\t<br>ㅇ 스피커 <a href=\"http://www.earlyadopter.co.kr/74563\" target=\"_blank\">http://www.earlyadopter.co.kr/74563</a><br>\t\t\t\t<br><br>\t\t\t\t<br>ㅇ ioT를 활용한 온디맨드/O2O<br>\t\t\t\t<br>IoT란건 세사을 하나의 컴퓨터로 만드는 거에요.<br>\t\t\t\t<br>모두가 버스의 승하차 버튼을 가지고,<br>\t\t\t\t<br>기기들간 상호 커뮤니케이션을 하죠.<br>\t\t\t\t<br><br>\t\t\t\t<br>ㅇ 내가 진짜 하고 싶은 Biz는, 전화번호를 몰라도, 어디에 있는지만 알면 <br>\t\t\t\t<br>   그 사람에게 말을 걸 수 있는거야. 전음 처럼. 셀레브로처럼<br>\t\t\t\t<br><br>\t\t\t\t<br>ㅇ 로즈골드 담뱃값 케이스 1000개 제작<br>\t\t\t\t<br>   셀럽들에게만 제공.<br>\t\t\t\t<br><br>\t\t\t\t<br>위대한 기업들로부터 배워야 한다.<br>\t\t\t\t<br>브리지워터 어소시에이츠, 아이데오<br>\t\t\t\t<br><br>\t\t\t\t<br>ㅇ 세상의 모든 자리<br>\t\t\t\t<br>ㅇ 한옥으로 된 이탈리아 트롤리, 외국인 관광객에게 술을 파는. 거북선?<br>\t\t\t\t<br>   - 경사에서도 음식물을 쏟지 않을만한 식기와 재미있는 아이디어 필요. 자이로 테이블이라던지<br>\t\t\t\t<br>ㅇ 부도가날 수 있는, 유휴 자산 들. 택시 합승 서비스 같은.<br>\t\t\t\t<br>ㅇ 보편타당한 불편들 - 콜버스, 분노가 있는 곳에 돈이 있다.<br>\t\t\t\t<br>ㅇ P2P 서비스? 가구 옮기기, 주차 대행 <br>\t\t\t\t<br>ㅇ 노인/ 주부/ 재취업 준비 중인 워킹맘 등 유휴인력을 통해 할 수 있는 일?<br>\t\t\t\t<br>ㅇ 우리나라같이 작은 시장사이즈면, 하루중 사용빈도가 굉장히 높아야함.<br>\t\t\t\t<br>    네트워크 효과 창출 필요. 주변인을 끌어들여야 나의 효용이 높아지는 구조.<br>\t\t\t\t<br>ㅇ 산업규모가 Sizable하고, 사람들의 소비에서 큰 비중을 차지하며, 불편한 경험이 지속적으로 발생했던 분야<br>\t\t\t\t<br>ㅇ 정보의 비대칭성 해소<br>\t\t\t\t<br>ㅇ B2B O2O<br>\t\t\t\t<br>ㅇ 5G 시대에 가능한 온디멘드 서비스<br>\t\t\t\t<br><br>\t\t\t\t<br>구슬 수영장, 트렘폴린<br>\t\t\t\t<br><a href=\"http://postshare.co.kr/archives/101923#cb\" ta >\t\t\t\t<br>쨋든, 팔아야 하니까,<br>\t\t\t\t<br>내 새끼, 내 마누라 생각해서 팔아야 사니까.<br>\t\t\t\t<br>그 때부터 양아치가 되는 거다.<br>\t\t\t\t<br><br>\t\t\t\t<br>제품을 끝내주게 개선하는 것보다,<br>\t\t\t\t<br>더 나은 마케팅 의사결정은 없다.<br>\t\t\t\t<br><br>\t\t\t\t<br>궁극의 마케팅은, 궁극의 제품이다.<br>\t\t\t\t<br>이게 내 신념이고,<br>\t\t\t\t<br>내가 마케터가 아니라 상품기획자가 되고 싶어하던 이유다.<br>\t\t\t\t<br><br>\t\t\t\t<br><br>\t\t\t\t<br>35살에 독립한다.<br>\t\t\t\t<br>2016년(32세) - 대한민국의 일그러진 자의식과, 그 문제를 해결 할 아이템을 구한다.<br>\t\t\t\t<br>2017년(33세) - 결혼, 팀을 구한다.<br>\t\t\t\t<br>2018년(34세) - 로켓에 연료 채우기<br>\t\t\t\t<br>2019년(35세) - 발사<br>\t\t\t\t<br><br>\t\t\t\t<br><br>\t\t\t\t<br>ㅇ Interstellar to Dean<br>\t\t\t\t<br>1) 어떤 문제/불편을 해결하고 싶은가?<br>\t\t\t\t<br>2) 내가 열정을 가지는 영역은 무엇인가?<br>\t\t\t<br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br>  - 삶이 더 나아지게 할 것 <br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br>반퇴는 혁명이다. <a href=\"http://m.navercast.naver.com/mobile_magazine_contents.nhn?rid=2717&contents_id=106905\" target=\"_blank\">http://m.navercast.naver.com/mobile_magazine_contents.nhn?rid=2717&contents_id=106905</a>",

let cards = [];

function loadBoard() {
  const saved = localStorage.getItem(SAVE_KEY);
  cards = saved ? JSON.parse(saved) : DEFAULT_CARDS.map(c => ({...c}));

function autoLayout() {
  const GAP = 14;
  const boardW = document.getElementById('board').offsetWidth;
  const cols = Math.max(1, Math.floor(boardW / 280));
  const colW = (boardW - GAP * (cols - 1)) / cols;
  const colHeights = new Array(cols).fill(0);
  const allCards = document.querySelectorAll('.card');
  const images = document.querySelectorAll('.card img');
  let loaded = 0;
  const total = images.length;

  function place() {
    allCards.forEach((el, i) => {
      const card = cards[i];
      const w = Math.min(card.w || colW, colW);
      let minCol = 0;
      for (let c = 1; c < cols; c++) if (colHeights[c] < colHeights[minCol]) minCol = c;
      card.x = minCol * (colW + GAP);
      card.y = colHeights[minCol];
      card.w = w;
      el.style.left = card.x + 'px';
      el.style.top = card.y + 'px';
      el.style.width = w + 'px';
      colHeights[minCol] = card.y + el.offsetHeight + GAP;
    });
    document.getElementById('board').style.minHeight = Math.max(...colHeights) + 100 + 'px';
    saveBoard();
  }

  if (total === 0) requestAnimationFrame(place);
  else images.forEach(img => {
    if (img.complete) { loaded++; if (loaded >= total) requestAnimationFrame(place); }
    else img.onload = img.onerror = () => { loaded++; if (loaded >= total) requestAnimationFrame(place); };
  });
}

function syncText() {
  document.querySelectorAll('.card').forEach(el => {
    const idx = +el.dataset.idx;
    if (cards[idx]?.type === 'text') {
      const t = el.querySelector('.text');
      if (t) cards[idx].content = t.innerHTML;
    }
  });
}

function saveBoard() {
  syncText();
  localStorage.setItem(SAVE_KEY, JSON.stringify(cards));
  document.getElementById('status').textContent = '저장됨 ' + new Date().toLocaleTimeString();
}

function renderCards() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  cards.forEach((card, i) => {
    const el = document.createElement('div');
    el.className = 'card';
    el.dataset.idx = i;
    if (card.x !== undefined) el.style.left = card.x + 'px';
    if (card.y !== undefined) el.style.top = card.y + 'px';
    if (card.w) el.style.width = card.w + 'px';

    el.addEventListener('mousedown', e => {
      if (e.target.closest('.text, a, .card-btn, .resize-handle, table')) return;
      e.preventDefault();
      moving = { idx: i, startX: e.clientX, startY: e.clientY, origX: card.x || 0, origY: card.y || 0 };
      el.classList.add('moving');
    });

    const actions = document.createElement('div');
    actions.className = 'card-actions';
    const delBtn = document.createElement('button');
    delBtn.className = 'card-btn'; delBtn.textContent = '×';
    delBtn.onclick = e => { e.stopPropagation(); if (confirm('삭제?')) { cards.splice(i, 1); renderCards(); saveBoard(); } };
    actions.appendChild(delBtn);
    el.appendChild(actions);

    if (card.type === 'text') {
      const text = document.createElement('div');
      text.className = 'text';
      text.contentEditable = true;
      text.innerHTML = card.content || '';
      text.addEventListener('blur', () => { card.content = text.innerHTML; saveBoard(); });
      el.appendChild(text);
    } else if (card.type === 'image') {
      const src = card.src.startsWith('http') || card.src.startsWith('data:') ? card.src : IMG_BASE + card.src;
      const img = document.createElement('img');
      img.src = src;
      img.alt = card.alt || '';
      img.loading = 'lazy';
      img.onerror = () => img.style.display = 'none';
      if (card.link) {
        const a = document.createElement('a'); a.href = card.link; a.target = '_blank';
        a.appendChild(img); el.appendChild(a);
      } else { el.appendChild(img); }
      if (card.caption) {
        const cap = document.createElement('div');
        cap.className = 'caption';
        cap.textContent = card.caption;
        el.appendChild(cap);
      }
    } else if (card.type === 'table') {
      const wrapper = document.createElement('div');
      wrapper.style.overflowX = 'auto';
      wrapper.innerHTML = card.html || '';
      el.appendChild(wrapper);
    }

    const rh = document.createElement('div');
    rh.className = 'resize-handle';
    rh.addEventListener('mousedown', e => {
      e.preventDefault(); e.stopPropagation();
      resizing = { idx: i, startX: e.clientX, startW: card.w || el.offsetWidth };
    });
    el.appendChild(rh);
    board.appendChild(el);
  });

  requestAnimationFrame(() => {
    let maxBottom = 0;
    document.querySelectorAll('.card').forEach(el => {
      const b = (parseFloat(el.style.top) || 0) + el.offsetHeight;
      if (b > maxBottom) maxBottom = b;
    });
    board.style.minHeight = (maxBottom + 100) + 'px';
  });
}

document.addEventListener('mousemove', e => {
  if (moving) {
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`);
    if (!el) return;
    const nx = moving.origX + e.clientX - moving.startX;
    const ny = moving.origY + e.clientY - moving.startY;
    el.style.left = nx + 'px';
    el.style.top = ny + 'px';
  }
  if (resizing) {
    const card = cards[resizing.idx];
    card.w = Math.max(100, resizing.startW + e.clientX - resizing.startX);
    const el = document.querySelector(`.card[data-idx="${resizing.idx}"]`);
    if (el) el.style.width = card.w + 'px';
  }
});

document.addEventListener('mouseup', e => {
  if (moving) {
    const card = cards[moving.idx];
    card.x = Math.max(0, moving.origX + e.clientX - moving.startX);
    card.y = Math.max(0, moving.origY + e.clientY - moving.startY);
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`);
    if (el) { el.classList.remove('moving'); }
    moving = null; saveBoard();
  }
  if (resizing) { resizing = null; saveBoard(); }
});

function addTextCard() {
  cards.push({ type: 'text', content: '', x: 50, y: window.scrollY + 100, w: 300 });
  renderCards();
  setTimeout(() => { const els = document.querySelectorAll('.card .text'); els[els.length - 1]?.focus(); }, 100);
}

function addImageCard() {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = 'image/*';
  input.onchange = e => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = () => { cards.push({ type: 'image', src: reader.result, x: 50, y: window.scrollY + 100, w: 240 }); renderCards(); saveBoard(); };
    reader.readAsDataURL(file);
  };
  input.click();
}

function resetLayout() {
  if (!confirm('자동 재배치합니다. 현재 위치가 변경됩니다.')) return;
  cards.forEach(c => { delete c.x; delete c.y; });
  renderCards(); autoLayout();
}

setInterval(saveBoard, 30000);
loadBoard();
</script>
