<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>1️⃣ Geo profile</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #1e1e1e;
  color: #e0e0e0;
  font-family: 'Segoe UI', -apple-system, sans-serif;
  font-size: 15px;
  line-height: 1.6;
  padding: 20px 30px 60px;
  overflow-x: hidden;
}
a { color: #6cb0f6; text-decoration: none; }
a:hover { text-decoration: underline; }
.title-bar {
  background: #3a3a5c;
  display: inline-block;
  padding: 6px 16px;
  font-size: 22px;
  font-weight: bold;
  color: #fff;
  margin-bottom: 4px;
}
.date { color: #999; font-size: 13px; margin-bottom: 20px; }
.board { position: relative; }
.card {
  background: #2a2a2a;
  border: 1px solid #3a3a3a;
  border-radius: 8px;
  padding: 12px;
  position: absolute;
  cursor: grab;
  transition: box-shadow 0.15s;
  overflow: hidden;
}
.card:hover { box-shadow: 0 0 0 1px #58a6ff; z-index: 10; }
.card.moving { opacity: 0.8; box-shadow: 0 4px 24px rgba(0,0,0,0.6); z-index: 100; cursor: grabbing; }
.card img { width: 100%; border-radius: 4px; display: block; }
.card .caption { font-size: 12px; color: #888; margin-top: 6px; }
.card .text { outline: none; min-height: 20px; white-space: pre-wrap; word-break: break-word; }
.card .text:focus { background: rgba(255,255,255,0.05); border-radius: 4px; padding: 4px; }
.card .text:empty::before { content: '텍스트 입력...'; color: #555; }
.card table { border-collapse: collapse; width: 100%; font-size: 13px; }
.card table td, .card table th { border: 1px solid #444; padding: 4px 8px; vertical-align: top; }
.card table th { background: #333; color: #ccc; }
.card-actions { position: absolute; top: 4px; right: 4px; display: none; gap: 4px; }
.card:hover .card-actions { display: flex; }
.card-btn { background: #333; border: 1px solid #555; color: #ccc; border-radius: 4px; padding: 2px 6px; font-size: 11px; cursor: pointer; }
.card-btn:hover { background: #444; color: #fff; }
.resize-handle { position: absolute; bottom: 0; right: 0; width: 16px; height: 16px; cursor: se-resize; opacity: 0; }
.card:hover .resize-handle { opacity: 0.6; }
.resize-handle::after { content: ''; position: absolute; bottom: 3px; right: 3px; width: 8px; height: 8px; border-right: 2px solid #666; border-bottom: 2px solid #666; }
.toolbar { position: fixed; bottom: 0; left: 0; right: 0; background: #161b22; border-top: 1px solid #30363d; padding: 8px 20px; display: flex; gap: 12px; align-items: center; z-index: 200; }
.toolbar button { background: #21262d; border: 1px solid #30363d; color: #e0e0e0; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; }
.toolbar button:hover { background: #30363d; }
.toolbar .status { color: #8b949e; font-size: 12px; margin-left: auto; }
.highlight-red { color: #ff6b6b; }
.highlight-blue { color: #6cb0f6; }
</style>
</head>
<body>
<div class="title-bar">1️⃣ Geo profile</div>
<div class="date">Invalid Date</div>
<div class="board" id="board"></div>
<div class="toolbar">
  <button onclick="addTextCard()">+ 텍스트</button>
  <button onclick="addImageCard()">+ 이미지</button>
  <button onclick="saveBoard()">💾 저장</button>
  <button onclick="resetLayout()">↺ 재배치</button>
  <span class="status" id="status">Ready</span>
</div>
<script>
const SAVE_KEY = 'board-1-Geo-profile';
const IMG_BASE = '../../attachments/';
const DEFAULT_CARDS = [
  {
    "type": "text",
    "content": "1️⃣ Geo profile<br>\t\t<br>\t\t<br>\t<br>\t<br>\t\t<br>\t\t\t<br>\t\t\t\t<br>특정 장소에 들어서면 채팅방(room)에 자동 입장 + 채팅방 이름 알려주기 + 과제 제시 및 과업 수행<br>\t\t\t\t<br>카드 + 지도 방식으로 카드 스와이핑하다가 상호 매칭되면 구체적인 위치와 프로필 오픈?<br>\t\t\t\t<br> 서로의 프로필을 맞추는 게임<br>\t\t\t\t<br>동네친구 찾기 - 찾은 후 이탈 우려는?<br>\t\t\t\t<br>지하철 자리 양도 앱<br>\t\t\t\t<br><br>\t\t\t\t<br>→ 앱 켜면 반경 100m 안에 있는 사람 프로필이 카드 형태로 슉슉 뜸 → “지금 여기서 커피 마시고 있는데, 같이 드실 분?” 바로 보낼 수 있음<br>\t\t\t\t<br>하나투어 앱이랑 비슷한<br>\t\t\t\t<br>국가&#183;도시별 한국인/외국인 실시간 분포 맵 → “지금 런던에 한국인 1,247명 온라인” → “이 동네에 한국인 38명” → 클릭하면 리스트 → 유학생이 “아 오늘은 한국 사람 많은 동네 가야지” 하면서 움직임<br>\t\t\t\t<br>돌아와서도 계속 쓸 수 있어야하는데..<br>\t\t\t\t<br><a href=\"https://www.youtube.com/watch?v=K_T0Hf6zvIc\" target=\"_blank\">[</a>뉴스 '꾹'] \"삿포로 여행은 이게 마지막\".. '7천명 노숙' 대난리 (2026.01.26/MBC뉴스)<br>\t\t\t\t<br>신원 인증 배지 + 안전 신고 시스템 (유료화 포인트) → 여권&#183;학생증 인증하면 파란 체크 → 신고 3회 누적 시 강제 추방<br>\t\t\t\t<br><br>\t\t\t\t<br><br>\t\t\t\t<br>- 페스티벌<br>\t\t\t\t<br>- 공연/버스킹<br>\t\t\t\t<br>- 세미나/컨퍼런스<br>\t\t\t\t<br>- 운동 클래스<br>\t\t\t\t<br>- 독서모임/스터디<br>\t\t\t\t<br>- 클럽/바<br>\t\t\t\t<br>- 게임/오프라인 이벤트<br>\t\t\t\t<br>- 해외여행/호스텔<br>\t\t\t\t<br>- 회사 안의 대규모 워크숍<br>\t\t\t\t<br><br>\t\t\t\t<br>이런 상황의 공통점은:<br>\t\t\t\t<br>① 내가 모르는 사람들 중 ‘비슷한 취향&#183;목적’의 사람들이 잔뜩 있다<br>\t\t\t\t<br>② 말을 걸고 싶지만 자연스럽게 접근하기 어렵다<br>\t\t\t\t<br>③ 번호/ID 물어보기가 어색하다<br>\t\t\t\t<br>④ 순간적인 연결이 필요하다<br>\t\t\t\t<br>⑤ 끝나면 다 흐지부지된다<br>\t\t\t\t<br>→ 이 오프라인 연결의 공백이 진짜 Pain Point다.<br>\t\t\t\t<br><br>\t\t\t\t<br>나와 MBTI 같은 사람 18명<br>\t\t\t\t<br>&#128075; “wave 기능\"<br>\t\t\t\t<br>- 상대방에게 알림: “누군가 당신에게 관심을 보냈습니다”<br>\t\t\t\t<br>- 익명/실명 선택 가능<br>\t\t\t\t<br>- 서로 wave가 맞으면 → 바로 1:1 대화<br>\t\t\t\t<br>- 아니면 그냥 사라짐 (부담 없음)<br>\t\t\t\t<br>사람들은 “거절이 없는 연결 방식”에 극도로 반응한다.<br>\t\t\t\t<br>(틴더, 소개팅 앱의 핵심도 이거임)<br>\t\t\t\t<br><br>\t\t\t\t<br>포켓몬고의 몬스터를 각 유저로 대체, 서로 만날 이유를 만들어준다.<br>\t\t\t\t<br>서로 지도상에서 찾아서 폰을 범프하면 보상을 준다던가?<br>\t\t\t\t<br><br>\t\t\t\t<br>이제야 진짜 핵심에 들어왔다.  <br>\t\t\t\t<br>네 말이 1000% 맞아.<br>\t\t\t\t<br><br>\t\t\t\t<br>“위치 기반으로 주변 사람 보여주기” 자체는 <b>죽음을 부르는 기능</b>이다.  <br>\t\t\t\t<br>Zenly가 친구 위치만으로 3천만 MAU 찍은 건 예외 중의 예외고, 그마저도 Snapchat이 돈 주고 사서 살린 케이스지.<br>\t\t\t\t<br><br>\t\t\t\t<br>우리가 노려야 하는 건  <br>\t\t\t\t<br><b>“오프라인에서 사람들이 모여 있지만, 연결이 안 되는 순간”</b>  <br>\t\t\t\t<br>그리고 그 순간에 <b>연결이 안 되면 진짜 손해 보는 상황</b>만 골라야 한다.<br>\t\t\t\t<br><br>\t\t\t\t<br>### 진짜로 폭발하는 5개 Use Case (Pain Intensity 내림차순)<br>\t\t\t\t<br><br>\t\t\t\t<br>| 순위 | 상황 | 왜 이 순간에 “지금 당장 연결 안 되면 진짜 후회한다” | Day 1 Retention 예상 | 초기 타깃 규모 (한국+해외 한국인) |<br>\t\t\t\t<br>|------|------|-----------------------------------------------------|----------------------|----------------------------------|<br>\t\t\t\t<br>| 1    | K-Pop 콘서트 / 팬미팅 / 커버댄스 플래시몹 | 같은 아티스트 덕후 수천 명이 한 공간에 있는데, 끝나고 나면 영원히 못 만난다 | 90% 이상 | 2025년 기준 연간 150만 명 |<br>\t\t\t\t<br>| 2    | 대규모 오프라인 덕후 행사 (코믹콘, 서울팝콘, 게임쇼, 애니메이션 페스티벌) | 취향 99% 일치하는 사람들 천지인데 말 못 걸고 끝난다 | 85% | 연간 80만 명 |<br>\t\t\t\t<br>| 3    | 해외 여행 중 한국인 호스텔/투어/맛집 | “여기 한국인 많다” 소문 들었는데 막상 가면 말 못 걸고 끝 | 80% | 연간 700만 명 출국 한국인 중 15% |<br>\t\t\t\t<br>| 4    | 대학 새내기 OT / 동아리 박람회 / 축제 | 인생 친구 만날 골든타임 3일인데 끝나면 영영 모른다 | 75% | 연간 55만 명 |<br>\t\t\t\t<br>| 5    | 클럽 &#183; 헌팅바 &#183; 룸술집 (특히 홍대&#183;강남&#183;이태원) | 분위기 띄워놓고 테이블 합석 못 해서 그냥 끝나는 밤 | 70% | 주말마다 30만 명 |<br>\t\t\t\t<br><br>\t\t\t\t<br>→ <b>결론: 1번이 압도적으로 강하다.</b><br>\t\t\t\t<br><br>\t\t\t\t<br>### 왜 K-Pop 콘서트가 최강의 Day 1 Retention Use Case인가?<br>\t\t\t\t<br><br>\t\t\t\t<br>1. 발생 빈도 + 규모  <br>\t\t\t\t<br>   → 2025년 서울에서만 BTS&#183;블랙핑크&#183;뉴진스&#183;세븐틴&#183;에스파 등 대형 콘서트 120회 이상  <br>\t\t\t\t<br>   → 한 번에 1~6만 명 모임<br>\t\t\t\t<br><br>\t\t\t\t<br>2. 감정 강도 극대화  <br>\t\t\t\t<br>   → “같이 떼창하고 싶은 사람”, “포카 교환하고 싶은 사람”, “같이 앵콜 뛰고 싶은 사람”이 수만 명인데 끝나고 나면 영원히 못 만난다<br>\t\t\t\t<br><br>\t\t\t\t<br>3. 자연스러운 바이럴  <br>\t\t\t\t<br>   → 콘서트 끝나고 트위터에 “오늘 ○○ 콘서트에서 만난 언니/오빠 덕분에 인생 공연됨 ㅠㅠ 앱으로 연결됐어요” → 순식간에 10만 다운로드<br>\t\t\t\t<br><br>\t\t\t\t<br>4. 유료화 포인트 명확  <br>\t\t\t\t<br>   → “같은 편(좌석 구역) 사람만 보기”  <br>\t\t\t\t<br>   → “포카 교환 원하는 사람 필터”  <br>\t\t\t\t<br>   → “콘서트 끝나고 2시간 동안만 채팅 가능” (이걸 프리미엄으로)<br>\t\t\t\t<br><br>\t\t\t\t<br>### 그래서 진짜 MVP v3 (3주 안에 가능, 진짜로 팔리는 버전)<br>\t\t\t\t<br><br>\t\t\t\t<br>앱 이름 후보: “같이 떼창” 또는 “콘네트” (Con + Connect + Concert)<br>\t\t\t\t<br><br>\t\t\t\t<br>1. 앱 키면 → “다가오는 공연” 리스트 (티켓몬스터&#183;인터파크 API 연동)<br>\t\t\t\t<br>2. 내가 가진 티켓 선택 → 자동으로 해당 공연 채널 입장<br>\t\t\t\t<br>3. 공연 당일 현장 들어가면 → 반경 1km 내 같은 공연 티켓 가진 사람만 리스트업<br>\t\t\t\t<br>4. 프로필에 자동으로  <br>\t\t\t\t<br>   → 좌석 구역 (예: “A구역 15열”)  <br>\t\t\t\t<br>   → 최애 멤버 배지  <br>\t\t\t\t<br>   → “포카 교환 원해요 / 응원봉 2개 있어요 / 같이 앵콜 뛸 사람” 한 줄<br>\t\t\t\t<br>5. 탭하면 바로 채팅 (템플릿 5개 제공)<br>\t\t\t\t<br>6. 공연 끝난 후 2시간 동안만 채팅 가능 → 그 이후 자동 소멸 (FOMO 극대화)<br>\t\t\t\t<br><br>\t\t\t\t<br>이거의 100% 확률로  <br>\t\t\t\t<br>첫 타깃 공연 하나만 제대로 잡아도 (예: 2026년 3월 에스파 서울 콘서트 6만 명)  <br>\t\t\t\t<br>→ 당일 2~3만 다운로드 + Day 1 Retention 85% 이상 나온다.<br>\t\t\t\t<br><br>\t\t\t\t<br>이제 진짜로 결정할 때다.<br>\t\t\t\t<br><br>\t\t\t\t<br>우리는 <b>K-Pop 콘서트 &#183; 팬미팅</b> 타깃으로  <br>\t\t\t\t<br>진짜 3주 안에 MVP 만들어서  <br>\t\t\t\t<br>2026년 상반기 첫 대형 콘서트 날 릴리즈할까?<br>\t\t\t\t<br><br>\t\t\t\t<br>이거 하나 성공하면 그 다음은 해외 케이팝 콘서트 → 코믹콘 → 새내기 OT 순으로 확장하면 된다.<br>\t\t\t\t<br><br>\t\t\t\t<br>결정해.  <br>\t\t\t\t<br>지금이 진짜로 Go / No-Go 순간이야.<br>\t\t\t\t<br><br>\t\t\t\t<br>지오/로컬 메모를 채팅형식으로 배치해서볼 수 있게?<br>\t\t\t\t<br><br>\t\t\t\t<br>&#128997; 1. 페스티벌 (음악 페스티벌, EDM, 힙합, 캠핑, 파티 포함)<br>\t\t\t\t<br>⭐ PMF 터지는 확률:&#160;압도적 1위 (★★★★★)<br>\t\t\t\t<br>⭐ 왜냐?<br>\t\t\t\t<br>✔ Intent 강도(만남/커뮤니티 욕구)가 가장 높음<br>\t\t\t\t<br>페스티벌에 오는 사람의 절반은<br>\t\t\t\t<br>“같이 즐길 사람 / 대화할 사람 / 분위기 같은 사람”을 무의식적으로 찾고 있다.<br>\t\t\t\t<br>즉, ‘최소한의 연결 실험’을 허용하는 환경이다.<br>\t\t\t\t<br>✔ “같은 공간 5,000~20,000명”이라는 구조적 강점<br>\t\t\t\t<br>→ 즉시 네트워크 효과 발생<br>\t\t\t\t<br>→ 동시 접속자가 많아야 “발견”이 재미있다.<br>\t\t\t\t<br>✔ 익명 기반의 심리적 안전성<br>\t\t\t\t<br>낯선 사람들과 만나도 부담 없다.<br>\t\t\t\t<br>관심 표시(&#128075;)에 대한 거절 리스크가 낮다.<br>\t\t\t\t<br>✔ 바이럴이 자연적으로 생김<br>\t\t\t\t<br>한 사람 켜면 주변 사람들이 “그거 뭐야?” 함.<br>\t\t\t\t<br>링크만 공유해도 100명 단위로 유입.<br>\t\t\t\t<br>✔ 리텐션 가능성<br>\t\t\t\t<br>페스티벌은 3일짜리 이벤트라서<br>\t\t\t\t<br>- Day 1 → Day 2 → Day 3 → 사후 DM￼까지 이어지면서￼단발성+연속성 모두 확보된다.<br>\t\t\t\t<br>❌ 단점<br>\t\t\t\t<br>- 오프시즌엔 유저 행동이 줄어듦<br>\t\t\t\t<br>- 서비스의 성격이 “만남앱”으로 오해될 수 있음<br>\t\t\t\t<br>- 특정 시즌(봄~가을)에 트래픽 집중<br>\t\t\t\t<br>&#128073;&#160;하지만 초기 PMF 확보에는 압도적 1위.<br>\t\t\t\t<br><br>\t\t\t\t<br><br>\t\t\t\t<br>옷깃 - 자주 마주치는 3회 이상 마주치는 사람 정보만 서로 열람 가능한 기능?<br>\t\t\t\t<br><br>\t\t\t\t<br><br>\t\t\t\t<br>\t\t\t\t<br>이런거야. 결국 뭔가를 위한 수단이 연결인거지. 그 트리거를 이 틈새기에서 찾아내는 것이 내 숙명이야.<br>\t\t\t\t<br>아니면 실험을 계속하다보면 찾아지겠지. 실험을 반복 할 수 있는 구조.<br>\t\t\t\t<br><br>\t\t\t\t<br><br>\t\t\t\t<br>신세계 전광판 앞처럼 여러 사람이 사진을 찍는 상황에서 실시간으로 다른 뷰를 서로 공유하는 개념. 눈을 공유하는 거지.<br>\t\t\t\t<br><br>\t\t\t\t<br>\t\t\t\t<br><br>\t\t\t\t<br>\t\t\t\t<br><br>\t\t\t<br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t<br>\t\t<br>\t\t\t<br>“그 공간을 더 재밌게 만드는 기능”을 만들어야 한다.**<br>\t\t\t<br>“지금 이 순간, 이 장소에서는<br>\t\t\t<br>누구와 만나도 어색하지 않게 만드는 도구” <br>\t\t\t<br>그 순간에 연결이 안 되면 진짜 손해 보는 상황<br>\t\t<br>\t\t<br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t<br>\t\t<br>\t\t\t<br>좁고 깊게(Narrow & Deep)<br>\t\t<br>\t\t<br>\t\t<br>\t\t\t<br><br>\t\t<br>\t\t<br>\t\t\t<br>Connectom<br>\t\t\t<br>\t\t\t\t<br>\t\t\t\t\t RAILWAY_TOKEN  <br>\t\t\t\t\t7ad081af-7a5a-4579-8c71-2cbd17864660<br>\t\t\t\t<br>\t\t\t\t<br>\t\t\t\t\tRAILWAY_SERVICE_ID<br>\t\t\t\t\tdf64f65c-dd48-4ab4-b0f6-d16492be0ba2<br>\t\t\t\t<br>\t\t\t\t<br>\t\t\t\t\tVERCEL_TOKEN     <br>\t\t\t\t\tvcp_3JyScIyC9T69tRmDGNt2RlK2X39YNhVPogOrjGgNpKe1Mpv6rh1U1Kn2<br>\t\t\t\t<br>\t\t\t\t<br>\t\t\t\t\tVERCEL_ORG_ID    <br>\t\t\t\t\tteam_yxY55pfon9FocVnC0dl7zaog<br>\t\t\t\t<br>\t\t\t\t<br>\t\t\t\t\tVERCEL_ let cards = [];
let moving = null, resizing = null;

function loadBoard() {
  const saved = localStorage.getItem(SAVE_KEY);
  cards = saved ? JSON.parse(saved) : DEFAULT_CARDS.map(c => ({...c}));
  renderCards();
  if (!saved) autoLayout();
}

function autoLayout() {
  const GAP = 14;
  const boardW = document.getElementById('board').offsetWidth;
  const cols = Math.max(1, Math.floor(boardW / 280));
  const colW = (boardW - GAP * (cols - 1)) / cols;
  const colHeights = new Array(cols).fill(0);
  const allCards = document.querySelectorAll('.card');
  const images = document.querySelectorAll('.card img');
  let loaded = 0;
  const total = images.length;

  function place() {
    allCards.forEach((el, i) => {
      const card = cards[i];
      const w = Math.min(card.w || colW, colW);
      let minCol = 0;
      for (let c = 1; c < cols; c++) if (colHeights[c] < colHeights[minCol]) minCol = c;
      card.x = minCol * (colW + GAP);
      card.y = colHeights[minCol];
      card.w = w;
      el.style.left = card.x + 'px';
      el.style.top = card.y + 'px';
      el.style.width = w + 'px';
      colHeights[minCol] = card.y + el.offsetHeight + GAP;
    });
    document.getElementById('board').style.minHeight = Math.max(...colHeights) + 100 + 'px';
    saveBoard();
  }

  if (total === 0) requestAnimationFrame(place);
  else images.forEach(img => {
    if (img.complete) { loaded++; if (loaded >= total) requestAnimationFrame(place); }
    else img.onload = img.onerror = () => { loaded++; if (loaded >= total) requestAnimationFrame(place); };
  });
}

function syncText() {
  document.querySelectorAll('.card').forEach(el => {
    const idx = +el.dataset.idx;
    if (cards[idx]?.type === 'text') {
      const t = el.querySelector('.text');
      if (t) cards[idx].content = t.innerHTML;
    }
  });
}

function saveBoard() {
  syncText();
  localStorage.setItem(SAVE_KEY, JSON.stringify(cards));
  document.getElementById('status').textContent = '저장됨 ' + new Date().toLocaleTimeString();
}

function renderCards() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  cards.forEach((card, i) => {
    const el = document.createElement('div');
    el.className = 'card';
    el.dataset.idx = i;
    if (card.x !== undefined) el.style.left = card.x + 'px';
    if (card.y !== undefined) el.style.top = card.y + 'px';
    if (card.w) el.style.width = card.w + 'px';

    el.addEventListener('mousedown', e => {
      if (e.target.closest('.text, a, .card-btn, .resize-handle, table')) return;
      e.preventDefault();
      moving = { idx: i, startX: e.clientX, startY: e.clientY, origX: card.x || 0, origY: card.y || 0 };
      el.classList.add('moving');
    });

    const actions = document.createElement('div');
    actions.className = 'card-actions';
    const delBtn = document.createElement('button');
    delBtn.className = 'card-btn'; delBtn.textContent = '×';
    delBtn.onclick = e => { e.stopPropagation(); if (confirm('삭제?')) { cards.splice(i, 1); renderCards(); saveBoard(); } };
    actions.appendChild(delBtn);
    el.appendChild(actions);

    if (card.type === 'text') {
      const text = document.createElement('div');
      text.className = 'text';
      text.contentEditable = true;
      text.innerHTML = card.content || '';
      text.addEventListener('blur', () => { card.content = text.innerHTML; saveBoard(); });
      el.appendChild(text);
    } else if (card.type === 'image') {
      const src = card.src.startsWith('http') || card.src.startsWith('data:') ? card.src : IMG_BASE + card.src;
      const img = document.createElement('img');
      img.src = src;
      img.alt = card.alt || '';
      img.loading = 'lazy';
      img.onerror = () => img.style.display = 'none';
      if (card.link) {
        const a = document.createElement('a'); a.href = card.link; a.target = '_blank';
        a.appendChild(img); el.appendChild(a);
      } else { el.appendChild(img); }
      if (card.caption) {
        const cap = document.createElement('div');
        cap.className = 'caption';
        cap.textContent = card.caption;
        el.appendChild(cap);
      }
    } else if (card.type === 'table') {
      const wrapper = document.createElement('div');
      wrapper.style.overflowX = 'auto';
      wrapper.innerHTML = card.html || '';
      el.appendChild(wrapper);
    }

    const rh = document.createElement('div');
    rh.className = 'resize-handle';
    rh.addEventListener('mousedown', e => {
      e.preventDefault(); e.stopPropagation();
      resizing = { idx: i, startX: e.clientX, startW: card.w || el.offsetWidth };
    });
    el.appendChild(rh);
    board.appendChild(el);
  });

  requestAnimationFrame(() => {
    let maxBottom = 0;
    document.querySelectorAll('.card').forEach(el => {
      const b = (parseFloat(el.style.top) || 0) + el.offsetHeight;
      if (b > maxBottom) maxBottom = b;
    });
    board.style.minHeight = (maxBottom + 100) + 'px';
  });
}

document.addEventListener('mousemove', e => {
  if (moving) {
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`);
    if (!el) return;
    const nx = moving.origX + e.clientX - moving.startX;
    const ny = moving.origY + e.clientY - moving.startY;
    el.style.left = nx + 'px';
    el.style.top = ny + 'px';
  }
  if (resizing) {
    const card = cards[resizing.idx];
    card.w = Math.max(100, resizing.startW + e.clientX - resizing.startX);
    const el = document.querySelector(`.card[data-idx="${resizing.idx}"]`);
    if (el) el.style.width = card.w + 'px';
  }
});

document.addEventListener('mouseup', e => {
  if (moving) {
    const card = cards[moving.idx];
    card.x = Math.max(0, moving.origX + e.clientX - moving.startX);
    card.y = Math.max(0, moving.origY + e.clientY - moving.startY);
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`);
    if (el) { el.classList.remove('moving'); }
    moving = null; saveBoard();
  }
  if (resizing) { resizing = null; saveBoard(); }
});

function addTextCard() {
  cards.push({ type: 'text', content: '', x: 50, y: window.scrollY + 100, w: 300 });
  renderCards();
  setTimeout(() => { const els = document.querySelectorAll('.card .text'); els[els.length - 1]?.focus(); }, 100);
}

function addImageCard() {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = 'image/*';
  input.onchange = e => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = () => { cards.push({ type: 'image', src: reader.result, x: 50, y: window.scrollY + 100, w: 240 }); renderCards(); saveBoard(); };
    reader.readAsDataURL(file);
  };
  input.click();
}

function resetLayout() {
  if (!confirm('자동 재배치합니다. 현재 위치가 변경됩니다.')) return;
  cards.forEach(c => { delete c.x; delete c.y; });
  renderCards(); autoLayout();
}

setInterval(saveBoard, 30000);
loadBoard();
</script>
</body>
</html>
