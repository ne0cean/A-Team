<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>노코드툴</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #1e1e1e;
  color: #e0e0e0;
  font-family: 'Segoe UI', -apple-system, sans-serif;
  font-size: 15px;
  line-height: 1.6;
  padding: 20px 30px 60px;
  overflow-x: hidden;
}
a { color: #6cb0f6; text-decoration: none; }
a:hover { text-decoration: underline; }
.title-bar {
  background: #3a3a5c;
  display: inline-block;
  padding: 6px 16px;
  font-size: 22px;
  font-weight: bold;
  color: #fff;
  margin-bottom: 4px;
}
.date { color: #999; font-size: 13px; margin-bottom: 20px; }
.board { position: relative; }
.card {
  background: #2a2a2a;
  border: 1px solid #3a3a3a;
  border-radius: 8px;
  padding: 12px;
  position: absolute;
  cursor: grab;
  transition: box-shadow 0.15s;
  overflow: hidden;
}
.card:hover { box-shadow: 0 0 0 1px #58a6ff; z-index: 10; }
.card.moving { opacity: 0.8; box-shadow: 0 4px 24px rgba(0,0,0,0.6); z-index: 100; cursor: grabbing; }
.card img { width: 100%; border-radius: 4px; display: block; }
.card .caption { font-size: 12px; color: #888; margin-top: 6px; }
.card .text { outline: none; min-height: 20px; white-space: pre-wrap; word-break: break-word; }
.card .text:focus { background: rgba(255,255,255,0.05); border-radius: 4px; padding: 4px; }
.card .text:empty::before { content: '텍스트 입력...'; color: #555; }
.card table { border-collapse: collapse; width: 100%; font-size: 13px; }
.card table td, .card table th { border: 1px solid #444; padding: 4px 8px; vertical-align: top; }
.card table th { background: #333; color: #ccc; }
.card-actions { position: absolute; top: 4px; right: 4px; display: none; gap: 4px; }
.card:hover .card-actions { display: flex; }
.card-btn { background: #333; border: 1px solid #555; color: #ccc; border-radius: 4px; padding: 2px 6px; font-size: 11px; cursor: pointer; }
.card-btn:hover { background: #444; color: #fff; }
.resize-handle { position: absolute; bottom: 0; right: 0; width: 16px; height: 16px; cursor: se-resize; opacity: 0; }
.card:hover .resize-handle { opacity: 0.6; }
.resize-handle::after { content: ''; position: absolute; bottom: 3px; right: 3px; width: 8px; height: 8px; border-right: 2px solid #666; border-bottom: 2px solid #666; }
.toolbar { position: fixed; bottom: 0; left: 0; right: 0; background: #161b22; border-top: 1px solid #30363d; padding: 8px 20px; display: flex; gap: 12px; align-items: center; z-index: 200; }
.toolbar button { background: #21262d; border: 1px solid #30363d; color: #e0e0e0; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; }
.toolbar button:hover { background: #30363d; }
.toolbar .status { color: #8b949e; font-size: 12px; margin-left: auto; }
.highlight-red { color: #ff6b6b; }
.highlight-blue { color: #6cb0f6; }
</style>
</head>
<body>
<div class="title-bar">노코드툴</div>
<div class="date">Invalid Date</div>
<div class="board" id="board"></div>
<div class="toolbar">
  <button onclick="addTextCard()">+ 텍스트</button>
  <button onclick="addImageCard()">+ 이미지</button>
  <button onclick="saveBoard()">💾 저장</button>
  <button onclick="resetLayout()">↺ 재배치</button>
  <span class="status" id="status">Ready</span>
</div>

const DEFAULT_CARDS = [
  {
    "type": "text",
    "content": "노코드툴<br>\t\t<br>\t\t<br>\t<br>\t<br>\t\t<br>\t\t\t<br>글라이드<br>\t\t\t<br>Bubble  <a href=\"https://saas.relate.kr/saas/bubble/r/recg3K7viUFRw525N\" target=\"_blank\">https://saas.relate.kr/saas/bubble/r/recg3K7viUFRw525N</a><br>\t\t\t<br><a href=\"https://www.youtube.com/@BubbleIO\" target=\"_blank\">https://www.youtube.com/@BubbleIO</a><br>\t\t\t<br><br>\t\t\t<br><a href=\"https://www.youtube.com/@user-hatchhiker\" target=\"_blank\">https://www.youtube.com/@user-hatchhiker</a><br>\t\t\t<br><br>\t\t\t<br><a href=\"https://www.youtube.com/watch?v=QQbr5pSbvg4&ab_channel=%ED%95%B4%EC%B9%98%ED%95%98%EC%9D%B4%EC%BB%A4-%EB%85%B8%EC%BD%94%EB%93%9C%EB%A1%9C%EC%8B%9C%EC%9E%91%ED%95%98%EB%8A%94%EC%95%84%EC%9D%B4%EB%94%94%EC%96%B4%EB%A1%A0%EC%B9%AD\" target=\"_blank\">버블 bubble.io 노코드 앱 개발 강의 - 1강. 데이터</a><br>\t\t\t<br>제품을 직접 만들 때가 정말 재미있었어요. 저는 개발 하나 모르는 사람인데 노코드&#160;툴을 이용해 빠르게 프리토타입을 만들었습니다. 예를 들어 웹사이트는 Webflow, 웹 개발은 Bubble.io, 앱 개발은 Flutterflow &&#160;Glide, DB는 Airtable, 디자인은 Figma, 설문조사는 Tally, Mockup 은 shots.so 등으로 진행했습니다. 또한 제품을 알리기 위한 지표로서&#160;마케팅을 할 때는 Product Hunt & Disquiet, 유저리서치는 Discord, 유저인터뷰는 오픈톡방, 제품 판매는 와디즈 & 텀블벅을 활용했습니다.&#160;<br>\t\t\t<br>프리토타입을 검증할 때는 이렇듯 다양한 방법들이 존재합니다. 저희는 최대한 많은 툴을 활용해 짧은 시간 안에 지표를 만들려고 노력했습니다.<br>\t\t\t<br><br>\t\t\t출처: <<a href=\"https://eopla.net/magazines/4483#\" target=\"_blank\">https://eopla.net/magazines/4483#</a>> <br>\t\t\t<br><br>\t\t\t<br>\t\t\t\t<br>\t\t\t\t\t\t\t\t\t\t<br>\t\t\t\t\t\t<br>\t\t\t\t\t\t\t노코드 툴을 사용해 직원 없이 혼자서 연 20억원을 버는 1인 사업가들 (feat. 마진율 90%)<br>\t\t\t\t\t\t<br>\t\t\t\t\t\t<br>\t\t\t\t\t\t\t<a href=\"https://maily.so/ahoy/messages/bAsLmyi7IMgfnyfrW9jIKowc7ux5vSme/click?signature=d5940c80576aa993f11d299174f41e9b8a891728&url=http%3A%2F%2Fmaily.so%2Funsexybusinesskr%2Fposts%2F1f508483%3Ffrom%3Demail%26mid%3D3e7368a5\" target=\"_blank\">&#127759;</a> 웹에서 보기<br>\t\t\t\t\t\t<br>\t\t\t\t\t\t<br>\t\t\t\t\t\t\t\t\t\t\t\t\t\t<br>\t\t\t\t\t\t\t\t<br>1인 사업자로 큰 매출을 만들기 위해서는 꼭 개발을 해야 한다고 생각했어요. 그런데 세상에는 선입견을 깨는 정말 다양한 비즈니스 케이스들이 많더라고요.&#160;오늘은 노코드툴만 사용해 혼자서 연 10억원 이상을 벌고 있는 사업가 7명의 이야기를 가져왔습니다 :)<br>\t\t\t\t\t\t\t\t<br>&#160;<br>\t\t\t\t\t\t\t\t<br>Justin Welsh (연 30억 매출, 90% 마진)<br>\t\t\t\t\t\t\t\t<br>BM : 셀프 브랜딩 컨텐츠 -> 뉴스레터 -> 강의 판매<br>\t\t\t\t\t\t\t\t<br><br>\t\t\t\t\t\t\t\t<br>저스틴은 30대에 영업직 임원으로 고속 승진한 직장인이었어요. 회사는 빠르게 성장했지만, 주 80시간 이상을 일하느라 공황 장애가 올 정도로 건강이 안 좋아졌습니다. 건강을 챙기면서 행복하게 살고 싶다는 생각으로 회사를 나와요.<br>\t\t\t\t\t\t\t\t<br>B2B 세일즈 경험을 내세워 다른 B2B 회사들에게 컨설팅을 해주는 것으로 사업을 시작합니다. 컨설팅 비즈니스를 키우기 위해 링크드인에 자신의 영업 전략을 공유했어요. 여러개의 글을 올리면서 링크드인 팔로워 수가 조금씩 늘기 시작합니다.<br>\t\t\t\t\t\t\t\t<br>\t\t\t\t\t\t\t\t<br>퇴사 직후 Justin의 링크드인 게시글. 초기에는 세일즈 전문가로 포지셔닝했다.<br>\t\t\t\t\t\t\t\t<br>&#160;<br>\t\t\t\t\t\t\t\t<br>세일즈 전략을 배우고 싶은 사람보다 링크드인 팔로워를 늘리는 방법을 배우고 싶어하는 사람들이 더 많다는 것을 알게 되어요. 6개월 만에 자신의 정체성을 세일즈 아닌 셀프 브랜딩 전문가로 포지셔닝 합니다.&#160;<br>\t\t\t\t\t\t\t\t<br>\t\t\t\t\t\t\t\t<br>6개월 뒤 저스틴의 링크드인 게시글. 퍼스널 브랜딩 전문가로 피봇했다.<br>\t\t\t\t\t\t\t\t<br>&#160;<br>\t\t\t\t\t\t\t\t<br>[저스틴의 비즈니스 구조]<br>\t\t\t\t\t\t\t\t<br>저스틴의 매출 전략은 간단합니다.<br>\t\t\t\t\t\t\t\t<br>1) 링크드인과 트위터에 수많은 컨텐츠를 올리고 팔로워를 모아요.&#160;<br>\t\t\t\t\t\t\t\t<br>2) 팔로워들에게는 뉴스레터를 구독하도록 유도하고요.<br>\t\t\t\t\t\t\t\t<br>3) 뉴스레터 구독자들에게 팔리는 컨텐츠를 만드는 방법에 대한 강의를 판매합니다.<br>\t\t\t\t\t\t\t\t<br>4) 뉴스레터 스폰서십 광고를 받아서 부가 수익을 얻기도 하고요.<br>\t\t\t\t\t\t\t\t<br>\t\t\t\t\t\t\t\t<br>1인 사업가를 위한 마케팅 퍼널<br>\t\t\t\t\t\t\t\t<br>&#160;<br>\t\t\t\t\t\t\t\t<br>저스틴은 유료 강의 판매와 뉴스레터 광고를 통해 연간 직원 없이 연간 30억원의 매출을 만들고 있어요.&#160;마진율은 90% 이고요. 불과 4년 만에 이룬 성과이니 엄청나죠. 직원 없이 사업을 운영할 수 있는 이유는 노코드 툴을 적극적으로 사용하기 때문이에요.<br>\t\t\t\t\t\t\t\t<br>&#160;<br>\t\t\t\t\t\t\t\t<br>[사용하는 노코드 툴]<br>\t\t\t\t\t\t\t\t<br>- 온라인 강의 운영을 위한 웹사이트 : Kajabi<br>\t\t\t\t\t\t\t\t<br>- 온라인 강의 녹화 : Loom<br>\t\t\t\t\t\t\t\t<br>- 결제 : Stripe<br>\t\t\t\t\t\t\t\t<br>- SNS 게시글 발행 : Hypefury<br>\t\t\t\t\t\t\t\t<br>- 뉴스레터 템플릿 : Type Share<br>\t\t\t\t\t\t\t\t<br>- 데이터 분석 : Fathom, Shield<br>\t\t\t\t\t\t\t\t<br>- 사용자 후기 : Testimonial<br>\t\t\t\t\t\t\t\t<br>- 노코드 툴 연결 : Zapier<br>\t\t\t\t\t\t\t\t<br>&#160;<br>\t\t\t\t\t\t\t\t<br>저스틴은 1인 비즈니스를 시작하고 싶은 사람들에게 두가지 조언을 남겼어요.<br>\t\t\t\t\t\t\t\t<br>- 컨설팅으로 비즈니스를 시작하는 것은 괜찮은 방법이에요.&#160;20명을 컨설팅 하다보면 공통적으로 질문하는 것들이 나오게 될 거에요. 그 질문들에 대한 답변을 모아서 강의로 제작하고 판매해 보세요.<br>\t\t\t\t\t\t\t\t<br>- 어떤 것을 컨설팅할지 모르겠다면, 최근 2년 동안 열심히 몰두한 것들에 대해 생각해 보세요.&#160;지금 당신이 당연하게 알고 있는 것들이 대부분의 사람들에게는 당연하지 않을 수 있습니다. 당신보다 2년 뒤쳐져 있는 사람에게 당신은 훌륭한 컨설턴트가 될 수 있어요.<br>\t\t\t\t\t\t\t\t<br>- 사람들이 가장 해결하고 싶은 영역은 보통 세가지 안에 들어와요.&#160;건강해지고 싶은 욕망, 부자가 되고 싶은 욕망, 사랑하는 사람을 찾고 싶은 욕망. 이 세가지 영역에서 문제를 해결하는 서비스를 만든다면 많은 사람들이 기꺼이 돈을 낼 거에요.<br>\t\t\t\t\t\t\t\t<br>&#160;<br>\t\t\t\t\t\t\t\t<br>Miss Excel (연 20억 매출)<br>\t\t\t\t\t\t\t\t<br>BM : 틱톡/인스타그램의 엑셀 영상 -> 홈페이지 -> 뉴스레터 구독 -> 강의 판매<br>\t\t\t\t\t\t\t\t<br><br>\t\t\t\t\t\t\t\t<br>Miss Excel은 엑셀 교육 브랜드에요. 창업자 Kat은 평범한 컨설턴트였습니다. 엑셀을 매우 잘했고요. 직장 생활에 지루함을 느낀 그녀는 호기심으로 틱톡에 엑셀 영상을 올려요. 당시 틱톡은 10대들만 보는 채널이라고 여겨졌고, 엑셀과 같은 교육 컨텐츠가 주목을 받을 거라는 생각은 아무도 하지 않았을 때였죠. 믿져야 본전이라는 생각으로 영상을 업로드 했습니다. 영상은 10만 조회수를 얻으며 폭발적으로 바이럴이 됩니다.<br>\t\t\t\t\t\t\t\t<br>\t\t\t\t\t\t\t\t<br>미스 엑셀의 틱톡 영상. 틱톡 특유의 유쾌한 바이브로 엑셀을 가르친다.<br>\t\t\t\t\t\t\t\t<br>&#160;<br>\t\t\t\t\t\t\t\t<br>그렇게 그녀의 미스 엑셀 인생이 시작되어요. 평범한 컨설턴트였던 그녀는 엑셀 강의로 연 20억원의 매출을 얻게 됩니다.<br>\t\t\t\t\t\t\t\t<br>&#160;<br>\t\t\t\t\t\t\t\t<br>[미스 엑셀의 비즈니스 구조]<br>\t\t\t\t\t\t\t\t<br>미스 엑셀의 비즈니스 구조는 저스틴과 유사해요.<br>\t\t\t\t\t\t\t\t<br>1) 틱톡과 인스타그램에서 숏폼을 통해 수많은 사람들에게 미스 액셀이라는 브랜드를 알려요.<br>\t\t\t\t\t\t\t\t<br>2) 엑셀에 관심있는 분들이 무료 엑셀 팁을 다운로드 받도록 유도해요. 이때 이메일 정보를 받습니다.<br>\t\t\t\t\t\t\t\t<br>3) 이메일 구독자들을 대상으로 자신이 운영하는 유료 엑셀 강의를 판매하고요.<br>\t\t\t\t\t\t\t\t<br>4) 업무용 도구인 엑셀의 특성을 이용해 기업 계약도 굉장히 많이 진행합니다.<br>\t\t\t\t\t\t\t\t<br>\t\t\t\t\t\t\t\t<br>엑셀 팁을 얻기 위해 이메일 주소를 입력하도록 만들었다. 이후 이메일 구독자들에게 엑셀 강의를 판매하는 이메일이 보내진다.<br>\t\t\t\t\t\t\t\t<br>&#160;<br>\t\t\t\t\t\t\t\t<br>[미스 엑셀이 사용하는 노코드 도구]<br>\t\t\t\t\t\t\t\t<br>- 온라인 강의 운영을 위한 웹사이트 : Thinkfic<br>\t\t\t\t\t\t\t\t<br>- SNS 랜딩 페이지 : Linktree<br>\t\t\t\t\t\t\t\t<br>- 영상편집 : WeVideo<br>\t\t\t\t\t\t\t\t<br>- 이메일 수집을 위한 랜딩페이지 : Flodesk<br>\t\t\t\t\t\t\t\t<br>&#160;<br>\t\t\t\t\t\t\t\t<br>Design Joy (연 20억 매출)<br>\t\t\t\t\t\t\t\t<br>BM1 : 콜드메일을 통한 클라이언트 유치 -> 시스템 효율화로 혼자서 20명의 클라이언트 작업<br>\t\t\t\t\t\t\t\t<br>BM2 : 트위터로 1인 비즈니스 성장기 공유 -> 비즈니스를 시작하는 방법에 대한 강의 판매<br>\t\t\t\t\t\t\t\t<br><br>\t\t\t\t\t\t\t\t<br>혼자서 운영하는 디자인 에이전시에요. 클라이언트와 가격 협상을 진행하는 다른 에이전시와 다르게&#160;정찰제로 운영되는 것이 특징입니다. 미팅도 갖지 않아요. 오직 텍스트로만 디자인을 요청할 수 있습니다. 미팅이 없는 대신 디자인 요청을 받으면 3일 안으로 결과물을 전달해요.&#160;커뮤니케이션 비용을 줄이고, 작업 시간을 최대화하는 시스템을 만든거죠.<br>\t\t\t\t\t\t\t\t<br>\t\t\t\t\t\t\t\t<br>디자인 조이 초기의 가격 페이지. 3년째 정찰제를 유지하고 있다.<br>\t\t\t\t\t\t\t\t<br>&#160;<br>\t\t\t\t\t\t\t\t<br>효율화된 시스템 덕분에 창업자 브렛은 20개의 클라이언트 작업을 혼자서 진행하고 있어요. 한명의 클라이언트는 최소 월 700만원을 지불하고요.<br>\t\t\t\t\t\t\t\t<br>\t\t\t\t\t\t\t\t<br>올해 10월 디자인 구독 서비스 누적 매출이 40억원을 돌파했다.<br>\t\t\t\t\t\t\t\t<br>&#160;<br>\t\t\t\t\t\t\t\t<br>최근에는 혼자서도 운영 가능한 에이전시를 만드는 방법에 대한 강의를 판매하면서 더 큰 수입을 만들고 있습니다. 굉장히 빠른 기간에 강의 수입이 에이전시 수입과 비슷해지고 있어요.<br>\t\t\t\t\t\t\t\t<br>\t\t\t\t\t\t\t\t<br>2023년 디자인 에이전시 사업의 매출은 12억원, 강의 매출은 9억 5천만원이 나오고 있다.<br>\t\t\t\t\t\t\t\t<br>&#160;<br>\t\t\t\t\t\t\t\t<br>[디자인 조이가 사용하는 노코드 도구]<br>\t\t\t\t\t\t\t\t<br>- 홈페이지 : Webflow<br>\t\t\t\t\t\t\t\t<br>- 회원가입, 로그인 기능 : Memberstack<br>\t\t\t\t\t\t\t\t<br>- CS 문의 : Intercom<br>\t\t\t\t\t\t\t\t<br>- 클라이언트 미팅 조율 : Calendly<br>\t\t\t\t\t\t\t\t<br>- 클라이언트의 디자인 요청 : Trello<br>\t\t\t\t\t\t\t\t<br>- 이미지 작업을 위한 소스 : Unsplash, Shutterstock<br>\t\t\t\t\t\t\t\t<br>- 온라인 강의 운영을 위한 웹사이트 : Circle<br>\t\t\t\t\t\t\t\t<br>\t\t\t\t\t\t\t\t<br>노코드 툴을 통해 직원 고용 없이 운영 효율을 최대화 하고 있다.<br>\t\t\t\t\t\t\t\t<br>&#160;<br>\t\t\t\t\t\t\t\t<br>브렛은 에이전시를 시작하는 사람들을 위한 마케팅 조언을 몇가지 남겼어요.<br>\t\t\t\t\t\t\t\t<br>- 풀타임 디자이너 채용 공고를 올린 회사들에게 콜드 메일을 보내세요.&#160;지금 채용이 시급한 회사만큼 디자이너 구독 상품을 판매하기 좋은 곳이 없습니다.<br>\t\t\t\t\t\t\t\t<br>- 큰 규모의 디자인 에이전시에게 디자이너 구독 상품을 팔아보세요.&#160;디자인 조이의 고객 중 절반은 다른 디자인 에이전시에요. 하청에 하청을 두는 거죠.<br>\t\t\t\t\t\t\t\t<br>- VC들에게 연락해보세요.&#160;VC들은 자신이 투자한 회사들의 채용을 도와주고 싶어해요. 풀타임 디자이너를 정규직으로 고용하는 것보다 빠르게 결과물을 낼 수 있는 계약직 디자이너를 쉽게 구하기를 원할 거에요.<br>\t\t\t\t\t\t\t\t<br>&#160;<br>\t\t\t\t\t\t\t\t<br>오늘 소개드린 1인 사업자들의 공통점을 정리해 보았습니다.<br>\t\t\t\t\t\t\t\t<br><br>\t\t\t\t\t\t\t\t<br>- Branding&#160;: 개인을 강력하게 브랜딩 해서 마케팅 비용을 0원에 가깝게 낮추었어요.<br>\t\t\t\t\t\t\t\t<br>- Distribution&#160;: 링크드인, 트위터, 틱톡과 같이 급부상하는 플랫폼을 이용해서 팬을 모았고요.<br>\t\t\t\t\t\t\t\t<br>- Pricing&#160;: 팬의 1%에게 비싼 제품을 팔아서 큰 매출을 만들었습니다.<br>\t\t\t\t\t\t\t\t<br>- Low Expense&#160;: 노코드 툴을 사용해서 많은 운영 업무를 자동화 했어요. 직원을 고용하지 않고 매월 200만원 이하의 금액으로 수천만원의 매출이 발생하는 비즈니스의 운영을 가능하게 했습니다.<br>\t\t\t\t\t\t\t\t<br>&#160;<br>\t\t\t\t\t\t\t\t<br>나머지 4개의 1인 사업자는 다음주에 돌아올 2편에서 소개드릴게요 :)<br>\t\t\t\t\t\t\t\t<br>&#160;<br>\t\t\t\t\t\t\t\t<br>참고 자료<br>\t\t\t\t\t\t\t\t<br>- Miss Excel의 여정에 대해 더 보고 싶으시다면...&#160;<a href=\"https://maily.so/ahoy/messages/bAsLmyi7IMgfnyfrW9jIKowc7ux5vSme/click?signature=8a0a4877600b10a277211a2bbbdf97c4a8093509&url=https%3A%2F%2Fmaily.so%2Funsexybusinesskr%2Fposts%2F820c23fc\" target=\"_blank\">링크</a><br>\t\t\t\t\t\t\t\t<br>- Design Joy의 사업에 대해 더 자세히 보고 싶으시다면...&#160;<a href=\"https://maily.so/ahoy/messages/bAsLmyi7IMgfnyfrW9jIKowc7ux5vSme/click?signature=a93298536d557712cba11b606aeefaaf2d3f4e1c&url=https%3A%2F%2Fmaily.so%2Fjosh%2Fposts%2Fade68606\" target=\"_blank\">링크</a><br>\t\t\t\t\t\t\t\t<br>&#160;<br>\t\t\t\t\t\t\t\t<br>저스틴은 카피라이팅의 천재에요. 트위터와 링크드인에 올리는 짧은 글만으로 100만명의 팔로워를 모았습니다. 그의 카피라이팅 팁이 궁금하지 않으신가요?<br>\t\t\t\t\t\t\t\t<br><br>\t\t\t\t\t\t\t\t<br>3명의 친구에게 언섹시 비즈니스 뉴스레터를 추천해주시면 저스틴의 카피라이팅 가이드를 전달드릴게요! 뉴스레터의 레퍼럴 링크를 사용해주시거나, 아래 이메일로 지인 추천을 완료했다는 메일을 보내주시면 됩니다.<br>\t\t\t\t\t\t\t\t<br>이메일&#160;:&#160;[grum.jeon@gmail.com](mailto:grum.jeon@gmail.com)<br>\t\t\t\t\t\t\t\t<br>&#160;<br>\t\t\t\t\t\t\t\t<br>비즈니스 모델을 공부하고 자신만의 프로젝트를 시작하고 싶으시다면...<br>\t\t\t\t\t\t\t\t<br><br>\t\t\t\t\t\t\t\t<br>전세계의 다양한 비즈니스 모델을 연구하고, 자신에게 맞는 비즈니스 아이디어를 얻어갈 수 있는 언섹시 리서치클럽 3기에 함께 하세요!<br>\t\t\t\t\t\t\t\t<br>신청 링크&#160;:&#160;<a href=\"https://maily.so/ahoy/messages/bAsLmyi7IMgfnyfrW9jIKowc7ux5vSme/click?signature=675980e9d06cdce6a7bedd9179609d0be40e203e&url=https%3A%2F%2Fbreakbook.oopy.io%2Funsexy\" target=\"_blank\">https://breakbook.oopy.io/unsexy</a><br>\t\t\t\t\t\t\t<br>\t\t\t\t\t\t\t<br><br>\t\t\t\t\t\t\t<br><br>\t\t\t\t\t\t\t<br><br>\t\t\t\t\t\t\t<br><br>\t\t\t\t\t\t\t<br><br>\t\t\t\t\t\t\t<br><br>\t\t\t\t\t\t\t<br>\t\t\t\t\t\t<br>\t\t\t\t\t<br>\t\t\t\t\t<br>\t\t\t\t<br>\t\t\t<br>\t\t\t<br><br>\t\t<br>\t\t<br>\t\t\t<br><a href=\"https://www.nocodecamp.kr/camps/nocode-prototyping-cohort5#register\" target=\"_blank\">https://www.nocodecamp.kr/camps/nocode-prototyping-cohort5#register</a><br>\t\t\t<br>일단 해보고 안되면 강의 듣자<br>\t\t<br>\t\t<br>\t\t\t<br><a href=\"https://nocodecore.com/\" target=\"_blank\">https://nocodecore.com/</a><br>\t\t\t<br><br>\t\t<br>\t\t<br>\t\t\t<br>노코드 강의<br>\t\t\t<br><a href=\"https://www.nocodecamp.kr/\" target=\"_blank\">노코드캠프</a><br>\t\t\t<br><a href=\"https://www.inflearn.com/course/softr-%EB%85%B8%EC%BD%94%EB%93%9C-%ED%94%84%EB%A1%9C%ED%86%A0%ED%83%80%EC%9D%B4%ED%95%91\" target=\"_blank\">Softr </a>노코드 프로토 타이핑<br>\t\t\t<br><a href=\"https://www.growingpeople.site/\" target=\"_blank\">그로잉피플</a><br>\t\t\t<br><a href=\"https://eopla.net/magazines/5406\" target=\"_blank\">노코드</a> 교육",

let cards = [];
let moving = null, resizing = null;

function loadBoard() {
  const saved = localStorage.getItem(SAVE_KEY);
  cards = saved ? JSON.parse(saved) : DEFAULT_CARDS.map(c => ({...c}));
  renderCards();
  if (!saved) autoLayout();
}

function autoLayout() {
  const GAP = 14;
  const boardW = document.getElementById('board').offsetWidth;
  const cols = Math.max(1, Math.floor(boardW / 280));
  const colW = (boardW - GAP * (cols - 1)) / cols;
  const colHeights = new Array(cols).fill(0);
  const allCards = document.querySelectorAll('.card');
  const images = document.querySelectorAll('.card img');
  let loaded = 0;
  const total = images.length;

  function place() {
    allCards.forEach((el, i) => {
      const card = cards[i];
      const w = Math.min(card.w || colW, colW);
      let minCol = 0;
      for (let c = 1; c < cols; c++) if (colHeights[c] < colHeights[minCol]) minCol = c;
      card.x = minCol * (colW + GAP);
      card.y = colHeights[minCol];
      card.w = w;
      el.style.left = card.x + 'px';
      el.style.top = card.y + 'px';
      el.style.width = w + 'px';
      colHeights[minCol] = card.y + el.offsetHeight + GAP;
    });
    document.getElementById('board').style.minHeight = Math.max(...colHeights) + 100 + 'px';
    saveBoard();
  }

  if (total === 0) requestAnimationFrame(place);
  else images.forEach(img => {
    if (img.complete) { loaded++; if (loaded >= total) requestAnimationFrame(place); }
    else img.onload = img.onerror = () => { loaded++; if (loaded >= total) requestAnimationFrame(place); };
  });
}

function syncText() {
  document.querySelectorAll('.card').forEach(el => {
    const idx = +el.dataset.idx;
    if (cards[idx]?.type === 'text') {
      const t = el.querySelector('.text');
      if (t) cards[idx].content = t.innerHTML;
    }
  });
}

function saveBoard() {
  syncText();
  localStorage.setItem(SAVE_KEY, JSON.stringify(cards));
  document.getElementById('status').textContent = '저장됨 ' + new Date().toLocaleTimeString();
}

function renderCards() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  cards.forEach((card, i) => {
    const el = document.createElement('div');
    el.className = 'card';
    el.dataset.idx = i;
    if (card.x !== undefined) el.style.left = card.x + 'px';
    if (card.y !== undefined) el.style.top = card.y + 'px';
    if (card.w) el.style.width = card.w + 'px';

    el.addEventListener('mousedown', e => {
      if (e.target.closest('.text, a, .card-btn, .resize-handle, table')) return;
      e.preventDefault();
      moving = { idx: i, startX: e.clientX, startY: e.clientY, origX: card.x || 0, origY: card.y || 0 };
      el.classList.add('moving');
    });

    const actions = document.createElement('div');
    actions.className = 'card-actions';
    const delBtn = document.createElement('button');
    delBtn.className = 'card-btn'; delBtn.textContent = '×';
    delBtn.onclick = e => { e.stopPropagation(); if (confirm('삭제?')) { cards.splice(i, 1); renderCards(); saveBoard(); } };
    actions.appendChild(delBtn);
    el.appendChild(actions);

    if (card.type === 'text') {
      const text = document.createElement('div');
      text.className = 'text';
      text.contentEditable = true;
      text.innerHTML = card.content || '';
      text.addEventListener('blur', () => { card.content = text.innerHTML; saveBoard(); });
      el.appendChild(text);
    } else if (card.type === 'image') {
      const src = card.src.startsWith('http') || card.src.startsWith('data:') ? card.src : IMG_BASE + card.src;
      const img = document.createElement('img');
      img.src = src;
      img.alt = card.alt || '';
      img.loading = 'lazy';
      img.onerror = () => img.style.display = 'none';
      if (card.link) {
        const a = document.createElement('a'); a.href = card.link; a.target = '_blank';
        a.appendChild(img); el.appendChild(a);
      } else { el.appendChild(img); }
      if (card.caption) {
        const cap = document.createElement('div');
        cap.className = 'caption';
        cap.textContent = card.caption;
        el.appendChild(cap);
      }
    } else if (card.type === 'table') {
      const wrapper = document.createElement('div');
      wrapper.style.overflowX = 'auto';
      wrapper.innerHTML = card.html || '';
      el.appendChild(wrapper);
    }

    const rh = document.createElement('div');
    rh.className = 'resize-handle';
    rh.addEventListener('mousedown', e => {
      e.preventDefault(); e.stopPropagation();
      resizing = { idx: i, startX: e.clientX, startW: card.w || el.offsetWidth };
    });
    el.appendChild(rh);
    board.appendChild(el);
  });

  requestAnimationFrame(() => {
    let maxBottom = 0;
    document.querySelectorAll('.card').forEach(el => {
      const b = (parseFloat(el.style.top) || 0) + el.offsetHeight;
      if (b > maxBottom) maxBottom = b;
    });
    board.style.minHeight = (maxBottom + 100) + 'px';
  });
}

document.addEventListener('mousemove', e => {
  if (moving) {
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`);
    if (!el) return;
    const nx = moving.origX + e.clientX - moving.startX;
    const ny = moving.origY + e.clientY - moving.startY;
    el.style.left = nx + 'px';
    el.style.top = ny + 'px';
  }
  if (resizing) {
    const card = cards[resizing.idx];
    card.w = Math.max(100, resizing.startW + e.clientX - resizing.startX);
    const el = document.querySelector(`.card[data-idx="${resizing.idx}"]`);
    if (el) el.style.width = card.w + 'px';
  }
});

document.addEventListener('mouseup', e => {
  if (moving) {
    const card = cards[moving.idx];
    card.x = Math.max(0, moving.origX + e.clientX - moving.startX);
    card.y = Math.max(0, moving.origY + e.clientY - moving.startY);
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`);
    if (el) { el.classList.remove('moving'); }
    moving = null; saveBoard();
  }
  if (resizing) { resizing = null; saveBoard(); }
});

function addTextCard() {
  cards.push({ type: 'text', content: '', x: 50, y: window.scrollY + 100, w: 300 });
  renderCards();
  setTimeout(() => { const els = document.querySelectorAll('.card .text'); els[els.length - 1]?.focus(); }, 100);
}

function addImageCard() {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = 'image/*';
  input.onchange = e => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = () => { cards.push({ type: 'image', src: reader.result, x: 50, y: window.scrollY + 100, w: 240 }); renderCards(); saveBoard(); };
    reader.readAsDataURL(file);
  };
  input.click();
}

function resetLayout() {
  if (!confirm('자동 재배치합니다. 현재 위치가 변경됩니다.')) return;
  cards.forEach(c => { delete c.x; delete c.y; });
  renderCards(); autoLayout();
}

setInterval(saveBoard, 30000);
loadBoard();
</script>
</body>
</html>
