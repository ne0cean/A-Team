<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #1e1e1e;
  color: #e0e0e0;
  font-family: 'Segoe UI', -apple-system, sans-serif;
  font-size: 15px;
  line-height: 1.6;
  padding: 20px 30px 60px;
  overflow-x: hidden;
}
a { color: #6cb0f6; text-decoration: none; }
a:hover { text-decoration: underline; }
.title-bar {
  background: #3a3a5c;
  display: inline-block;
  padding: 6px 16px;
  font-size: 22px;
  font-weight: bold;
  color: #fff;
  margin-bottom: 4px;
}
.date { color: #999; font-size: 13px; margin-bottom: 20px; }
.board { position: relative; }
.card {
  background: #2a2a2a;
  border: 1px solid #3a3a3a;
  border-radius: 8px;
  padding: 12px;
  position: absolute;
  cursor: grab;
  transition: box-shadow 0.15s;
  overflow: hidden;
}
.card:hover { box-shadow: 0 0 0 1px #58a6ff; z-index: 10; }
.card.moving { opacity: 0.8; box-shadow: 0 4px 24px rgba(0,0,0,0.6); z-index: 100; cursor: grabbing; }
.card img { width: 100%; border-radius: 4px; display: block; }
.card .caption { font-size: 12px; color: #888; margin-top: 6px; }
.card .text { outline: none; min-height: 20px; white-space: pre-wrap; word-break: break-word; }
.card .text:focus { background: rgba(255,255,255,0.05); border-radius: 4px; padding: 4px; }
.card .text:empty::before { content: '텍스트 입력...'; color: #555; }
.card table { border-collapse: collapse; width: 100%; font-size: 13px; }
.card table td, .card table th { border: 1px solid #444; padding: 4px 8px; vertical-align: top; }
.card table th { background: #333; color: #ccc; }
.card-actions { position: absolute; top: 4px; right: 4px; display: none; gap: 4px; }
.card:hover .card-actions { display: flex; }
.card-btn { background: #333; border: 1px solid #555; color: #ccc; border-radius: 4px; padding: 2px 6px; font-size: 11px; cursor: pointer; }
.card-btn:hover { background: #444; color: #fff; }
.resize-handle { position: absolute; bottom: 0; right: 0; width: 16px; height: 16px; cursor: se-resize; opacity: 0; }
.card:hover .resize-handle { opacity: 0.6; }
.resize-handle::after { content: ''; position: absolute; bottom: 3px; right: 3px; width: 8px; height: 8px; border-right: 2px solid #666; border-bottom: 2px solid #666; }
.toolbar { position: fixed; bottom: 0; left: 0; right: 0; background: #161b22; border-top: 1px solid #30363d; padding: 8px 20px; display: flex; gap: 12px; align-items: center; z-index: 200; }
.toolbar button { background: #21262d; border: 1px solid #30363d; color: #e0e0e0; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; }
.toolbar button:hover { background: #30363d; }
.toolbar .status { color: #8b949e; font-size: 12px; margin-left: auto; }
.highlight-red { color: #ff6b6b; }
.highlight-blue { color: #6cb0f6; }
</style>
</head>

    "content": "사람들이 하루 종일 가장 많이 하는 활동 + 가장 많이 하는 생각<br>\t\t\t\t<br>행동 - 시간 보기<br>\t\t\t\t<br>생각 - 성적인 생각? 돈 생각?<br>\t\t\t\t<br><br>\t\t\t\t<br>\t\t\t\t\t<br>- 포맷: 나올 수 있는 커뮤니케이션 포맷은 이미 다 나왔다. + 메타버스???<br>\t\t\t\t<br>\t\t\t\t<br>1/ 시각<br>\t\t\t\t<br>ㅇ 텍스트(SMS, 트위터), <br>\t\t\t\t<br>ㅇ 이미지(페이스북, 인스타그램, 핀터레스트)<br>\t\t\t\t<br>핀터레스트와 인스타그램의 차이는 뭘까? - 핀터레스트는 보다 콘텐츠 중심, 인스타는 누가 뭘 올렸는지가 중요. <br>\t\t\t\t<br><br>\t\t\t\t<br>2/ 청각<br>\t\t\t\t<br>ㅇ 음성(통화, 클럽하우스, 음성메세지), <br>\t\t\t\t<br><br>\t\t\t\t<br>3/ 시청각<br>\t\t\t\t<br>ㅇ 동영상(틱톡, 쇼츠, 릴스, 유튜브)<br>\t\t\t\t<br><br>\t\t\t\t<br>밴드, 블로그,<br>\t\t\t\t<br>\t\t\t\t\t<br>- Comm. 대상<br>\t\t\t\t<br>\t\t\t\t<br>1/ Real friend<br>\t\t\t\t<br><br>\t\t\t\t<br>2/ Mutual friend<br>\t\t\t\t<br><br>\t\t\t\t<br>3/ Cyber ??<br>\t\t\t\t<br>오픈채팅<br>\t\t\t\t<br>커뮤<br>\t\t\t\t<br><br>\t\t\t\t<br>4/ 익명/불특정 다수<br>\t\t\t\t<br>블라인드, 트위터<br>\t\t\t\t<br>\t\t\t\t\t<br>- Message<br>\t\t\t\t<br>\t\t\t\t<br>신변잡기 - 음식, 셀피, <br>\t\t\t\t<br>광고<br>\t\t\t\t<br>관심사 - 야구, 음식,  -> 투스 브러시<br>\t\t\t\t<br><br>\t\t\t\t<br>1/ <br>\t\t\t\t<br><br>\t\t\t\t<br>하이프머신 p.208 \"소비자 입장에서 한 제품의가치란 그 제품을 쓰는 다른 소비자의 총수에만 달린 것이 아니라<br>\t\t\t\t<br>그 소비자가 연결하고 싶어하는 특정 사용자들의 가치에도 달려 있다.<br>\t\t\t\t<br>페북은 친구들이어서 그 가치가 컸고, 마이스페이스는 연결 가능한 사람들이 낯선 사람들이었다.<br>\t\t\t\t<br><br>\t\t\t\t<br>낯섬의 가치.를 입증해야하나<br>\t\t\t\t<br>\t\t\t\t\t<br>- 연결 방식<br>\t\t\t\t<br>\t\t\t\t<br><br>\t\t\t\t<br>전화번호, ID, 해시태그, 검색, <br>\t\t\t\t<br>페이스북은 가속도계와 자이로스코프 데이터를 비교해 사람들이 서로 마주보고 있는지 아니면 함께 걷고 있는지를 유추해낸다. Pymk 알고리즘.<br>\t\t\t\t<br><a href=\"https://news.hada.io/topic?id=7430&utm_source=discord&utm_medium=bot&utm_campaign=280\" target=\"_blank\">https://news.hada.io/topic?id=7430&utm_source=discord&utm_medium=bot&utm_campaign=280</a><br>\t\t\t\t<br>- 2011년 8월에 2.5 버전에서는 주위 사람들을 찾고 소통하는 기능을 넣으면서 친구/가족이 아닌 모르는 사람과 소통하는 도구로 발전 시작<br>\t\t\t\t<br>- 이 기능이 사용자의 마음을 사로잡으면서 폭발적인 성장을 경험<br>\t\t\t\t<br>- 2011년 10월에 출시된 3.0은 'Shake' 기능을 넣음. 사용자들이 폰을 특정한 방향으로 흔들면 Weixin 네트웍 상에서 같은 방향으로 동시에 흔든 사람과 연결해주는 기능<br>\t\t\t\t<br>- 이 Shake 기능은 시장에 처음으로 나온 Weixin 스러운 혁신이었고, 입소문을 타면서 Weixin 의 성장궤도를 새로운 수준으로 끌어올림<br>\t\t\t\t<br><br>\t\t\t\t<br><br>\t\t\t\t<br>콘텐츠 노출 방식<br>\t\t\t\t<br>피드(담벼락), <br>\t\t\t\t<br><br>\t\t\t\t<br>모바일-현실의 특정인을 식별하는 Unique ID가 위치정보 말고는 없을까.<br>\t\t\t\t<br>카메라, Bump(WiFi + GPS), <br>\t\t\t\t<br><br>\t\t\t\t<br>프로필/패션 - 커뮤니케이션 - Game/Mission/ARG(Alternate reality game)<a href=\"https://namu.wiki/w/%EB%8C%80%EC%B2%B4%ED%98%84%EC%8B%A4%EA%B2%8C%EC%9E%84\" target=\"_blank\">대체현실게임</a> 보물찾기, 포켓몬고￼(패션-커뮤니케이션-미션)<br>\t\t\t\t<br><br>\t\t\t\t<br>네트워킹 - 콘텐츠 - 커뮤니티<br>\t\t\t\t<br><br>\t\t\t\t<br>팬 플랫폼 - 리슨/ 라이키?/ 비고 라이브<br>\t\t\t\t<br><br>\t\t\t\t<br>제품 브로슈어를 만들어서 페르소나에게 보내는 것을 목표로 하라.<br>\t\t\t\t<br><br>\t\t\t\t<br>위치기반 프로필 - 링크드인 : 개인의 팬 플랫폼<br>\t\t\t\t<br>위치기반 틴더<br>\t\t\t\t<br>위치기반 트위터<br>\t\t\t\t<br>Game on world - 내가 뛰는 포켓몬고, <br>\t\t\t\t<br>Comm. - 위치기반 롤렉스를 만드는거야. 셀피 - 팔로어/불특정 다수<br>\t\t\t\t<br>Game on world - <a href=\"https://blog.google/products/maps/three-maps-updates-io-2022/\" target=\"_blank\">https://blog.google/products/maps/three-maps-updates-io-2022/</a><br>\t\t\t\t<br>Geek economy<br>\t\t\t\t<br><br>\t\t\t\t<br>콘텐츠 쉽게 올릴 수 있게, AR아바타 + 음성변조 지원?<br>\t\t\t\t<br>위치 기반 갓생 챌린지<br>\t\t\t\t<br>플래시몹 - 단체 미션<br>\t\t\t\t<br>디지털 트윈 AR 스튜디오 제공 - 사용자가 만드는 메타버스: 싸이월드 미니룸 - 메타버스간 파도타기<br>\t\t\t\t<br><br>\t\t\t\t<br>========================<br>\t\t\t\t<br><br>\t\t\t\t<br>현실과 가상의 가교,<br>\t\t\t\t<br>모바일에서 번 코인과 현실 미션에서 번 수익을 교환가능해야해<br>\t\t\t\t<br><br>\t\t\t\t<br>음성, 텍스트, 사진, 동영상<br>\t\t\t\t<br><br>\t\t\t\t<br>귓속말<br>\t\t\t\t<br>샤우팅<br>\t\t\t\t<br><br>\t\t\t\t<br>\t\t\t\t\t<br>- 어떻게 보여줄건데?<br>\t\t\t\t<br>\t\t\t\t<br><br>\t\t\t\t<br>전화나 SNS 등 모바일/온라인에서의 커뮤니케이션은 개인별 식별이 가능한 ID/번호 등 상대의 Key값을 알아야 한다.<br>\t\t\t\t<br><br>\t\t\t\t<br>우리가 발디뎌 서있는 <br>\t\t\t\t<br><br>\t\t\t\t<br>위치기반으로 관심사 비슷한 사람이 있으면 진동으로 알려주는 앱 highlight<br>\t\t\t\t<br><br>\t\t\t\t<br><br>\t\t\t\t<br>관계맺고 소통하는 방식을 다음 페이즈로 이동시킨다.<br>\t\t\t\t<br>조회수가 핵심<br>\t\t\t\t<br>BGM<br>\t\t\t\t<br>거주하는 아파트<br>\t\t\t\t<br>지오펜싱<br>\t\t\t\t<br>자기가 공개한 정보 이외에는 열람불가<br>\t\t\t\t<br>복수의 프로필 제공<br>\t\t\t\t<br>SNS 연동? 가져오는건 되는데 아웃은 안돼<br>\t\t\t\t<br><br>\t\t\t\t<br>위치기반 커뮤니케이션<br>\t\t\t\t<br>증강 프로필<br>\t\t\t\t<br><br>\t\t\t\t<br>제갈량이 화살, 초기가입자<br>\t\t\t\t<br>지오블락<br>\t\t\t\t<br><br>\t\t\t\t<br>귓속말, 샤우팅<br>\t\t\t\t<br><br>\t\t\t\t<br>전략<br>\t\t\t\t<br><a href=\"https://growandbetter.com/2021/12/30/19-tactics-to-grow-your-marketplace/\" target=\"_blank\">https://growandbetter.com/2021/12/30/19-tactics-to-grow-your-marketplace/</a><br>\t\t\t\t<br><br>\t\t\t\t<br>오징어 게임은, 시리즈물이 아니라 게임이었던거지.<br>\t\t\t\t<br><br>\t\t\t\t<br>간츠, 헌터헌터 같은 게임 만들고싶어<br>\t\t\t\t<br><br>\t\t\t\t<br>사업 모델을 구성하는 9가지 핵심 요소<br>\t\t\t\t<br>&#160;<br>\t\t\t\t<br>1. 핵심 활동(Key Activities)<br>\t\t\t\t<br>- 가치를 만들어내기 위한 주요 활동<br>\t\t\t\t<br>- 경쟁사 대비 잘하고 있는 것은 무엇인가?<br>\t\t\t\t<br>&#160;<br>\t\t\t\t<br>2. 핵심 파트너(Key Partnership)<br>\t\t\t\t<br>- 사업을 하기 위해 필요한 외부 이해관계자<br>\t\t\t\t<br>- 혼자 다 할 것인가? 아니면 외부 협력사를 활용할 것인가?<br>\t\t\t\t<br>&#160;<br>\t\t\t\t<br>3. 핵심 자원(Key Resources)<br>\t\t\t\t<br>- 이 사업을 위해 꼭 필요한 자원은 무엇인가?<br>\t\t\t\t<br>- 물적 자원(장비, 자원, 부품 등), 인적 자원, 기술 자원, 지식재산권 등<br>\t\t\t\t<br>&#160;<br>\t\t\t\t<br>4. 고객 관계(Customer Relationship)<br>\t\t\t\t<br>- 고객을 확보하고 관계를 유지하면서 상호작용하기 위한 방법<br>\t\t\t\t<br>- 우리의 제품이나 서비스를 계속 판매하기 위한 마케팅 활동<br>\t\t\t\t<br>&#160;<br>\t\t\t\t<br>5. 고객 세분화(Customer Segments)<br>\t\t\t\t<br>- 우리의 진짜 고객은 누구인가?<br>\t\t\t\t<br>- 고객군을 세분화하여 우리의 제품이나 서비스를 누구에게 팔 것인지 정의해야 함<br>\t\t\t\t<br>&#160;<br>\t\t\t\t<br>6. 가치 제안(Value Proposition)<br>\t\t\t\t<br>- 고객에게 전달하려는 유무형의 가치, 차별화 요소<br>\t\t\t\t<br>- 고객이 구매하려는 이유<br>\t\t\t\t<br>&#160;<br>\t\t\t\t<br>7. 채널(Channels)<br>\t\t\t\t<br>- 기업의 가치를 전달하는 방식, 온&#183;오프라인 전략 또는 유통채널 등<br>\t\t\t\t<br>- 기업과 고객이 만나는 접점<br>\t\t\t\t<br>&#160;<br>\t\t\t\t<br>8. 원가 구조(Cost Structure)<br>\t\t\t\t<br>- 이 사업을 하기 위해 어떤 비용이 얼마나 드는가?<br>\t\t\t\t<br>- 고정비, 변동비, 인건비 등<br>\t\t\t\t<br>&#160;<br>\t\t\t\t<br>9. 수익원(Revenue Streams)<br>\t\t\t\t<br>- 사업을 통해 어디에서 얼마나 벌 수 있는가?<br>\t\t\t\t<br>- 제공하는 제품이나 서비스의 대가로 지불하는 방식, 흔히 말하는 수익 모델<br>\t\t\t\t<br>아래&#160;<a href=\"https://www.strategyzer.com/canvas/business-model-canvas\" target=\"_blank\">비즈니스 모델 캔버스 템플릿&#160;</a><br>\t\t\t\t<br><br>\t\t\t\t출처: <<a href=\"https://publy.co/content/4627?fr=chapter-next-chapter-button\" target=\"_blank\">https://publy.co/content/4627?fr=chapter-next-chapter-button</a>>",

let cards = [];
let moving = null, resizing = null;

function loadBoard() {
  const saved = localStorage.getItem(SAVE_KEY);
  cards = saved ? JSON.parse(saved) : DEFAULT_CARDS.map(c => ({...c}));
  renderCards();
  if (!saved) autoLayout();
}

function autoLayout() {
  const GAP = 14;
  const boardW = document.getElementById('board').offsetWidth;
  const cols = Math.max(1, Math.floor(boardW / 280));
  const colW = (boardW - GAP * (cols - 1)) / cols;
  const colHeights = new Array(cols).fill(0);
  const allCards = document.querySelectorAll('.card');
  const images = document.querySelectorAll('.card img');
  let loaded = 0;
  const total = images.length;

  function place() {
    allCards.forEach((el, i) => {
      const card = cards[i];
      const w = Math.min(card.w || colW, colW);
      let minCol = 0;
      for (let c = 1; c < cols; c++) if (colHeights[c] < colHeights[minCol]) minCol = c;
      card.x = minCol * (colW + GAP);
      card.y = colHeights[minCol];
      card.w = w;
      el.style.left = card.x + 'px';
      el.style.top = card.y + 'px';
      el.style.width = w + 'px';
      colHeights[minCol] = card.y + el.offsetHeight + GAP;
    });
    document.getElementById('board').style.minHeight = Math.max(...colHeights) + 100 + 'px';
    saveBoard();
  }

  if (total === 0) requestAnimationFrame(place);
  else images.forEach(img => {
    if (img.complete) { loaded++; if (loaded >= total) requestAnimationFrame(place); }
    else img.onload = img.onerror = () => { loaded++; if (loaded >= total) requestAnimationFrame(place); };
  });
}

function syncText() {
  document.querySelectorAll('.card').forEach(el => {
    const idx = +el.dataset.idx;
    if (cards[idx]?.type === 'text') {
      const t = el.querySelector('.text');
      if (t) cards[idx].content = t.innerHTML;
    }
  });
}

function saveBoard() {
  syncText();
  localStorage.setItem(SAVE_KEY, JSON.stringify(cards));
  document.getElementById('status').textContent = '저장됨 ' + new Date().toLocaleTimeString();
}

function renderCards() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  cards.forEach((card, i) => {
    const el = document.createElement('div');
    el.className = 'card';
    el.dataset.idx = i;
    if (card.x !== undefined) el.style.left = card.x + 'px';
    if (card.y !== undefined) el.style.top = card.y + 'px';
    if (card.w) el.style.width = card.w + 'px';

    el.addEventListener('mousedown', e => {
      if (e.target.closest('.text, a, .card-btn, .resize-handle, table')) return;
      e.preventDefault();
      moving = { idx: i, startX: e.clientX, startY: e.clientY, origX: card.x || 0, origY: card.y || 0 };
      el.classList.add('moving');
    });

    const actions = document.createElement('div');
    actions.className = 'card-actions';
    const delBtn = document.createElement('button');
    delBtn.className = 'card-btn'; delBtn.textContent = '×';
    delBtn.onclick = e => { e.stopPropagation(); if (confirm('삭제?')) { cards.splice(i, 1); renderCards(); saveBoard(); } };
    actions.appendChild(delBtn);
    el.appendChild(actions);

    if (card.type === 'text') {
      const text = document.createElement('div');
      text.className = 'text';
      text.contentEditable = true;
      text.innerHTML = card.content || '';
      text.addEventListener('blur', () => { card.content = text.innerHTML; saveBoard(); });
      el.appendChild(text);
    } else if (card.type === 'image') {
      const src = card.src.startsWith('http') || card.src.startsWith('data:') ? card.src : IMG_BASE + card.src;
      const img = document.createElement('img');
      img.src = src;
      img.alt = card.alt || '';
      img.loading = 'lazy';
      img.onerror = () => img.style.display = 'none';
      if (card.link) {
        const a = document.createElement('a'); a.href = card.link; a.target = '_blank';
        a.appendChild(img); el.appendChild(a);
      } else { el.appendChild(img); }
      if (card.caption) {
        const cap = document.createElement('div');
        cap.className = 'caption';
        cap.textContent = card.caption;
        el.appendChild(cap);
      }
    } else if (card.type === 'table') {
      const wrapper = document.createElement('div');
      wrapper.style.overflowX = 'auto';
      wrapper.innerHTML = card.html || '';
      el.appendChild(wrapper);
    }

    const rh = document.createElement('div');
    rh.className = 'resize-handle';
    rh.addEventListener('mousedown', e => {
      e.preventDefault(); e.stopPropagation();
      resizing = { idx: i, startX: e.clientX, startW: card.w || el.offsetWidth };
    });
    el.appendChild(rh);
    board.appendChild(el);
  });

  requestAnimationFrame(() => {
    let maxBottom = 0;
    document.querySelectorAll('.card').forEach(el => {
      const b = (parseFloat(el.style.top) || 0) + el.offsetHeight;
      if (b > maxBottom) maxBottom = b;
    });
    board.style.minHeight = (maxBottom + 100) + 'px';
  });
}

document.addEventListener('mousemove', e => {
  if (moving) {
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`);
    if (!el) return;
    const nx = moving.origX + e.clientX - moving.startX;
    const ny = moving.origY + e.clientY - moving.startY;
    el.style.left = nx + 'px';
    el.style.top = ny + 'px';
  }
  if (resizing) {
    const card = cards[resizing.idx];
    card.w = Math.max(100, resizing.startW + e.clientX - resizing.startX);
    const el = document.querySelector(`.card[data-idx="${resizing.idx}"]`);
    if (el) el.style.width = card.w + 'px';
  }
});

document.addEventListener('mouseup', e => {
  if (moving) {
    const card = cards[moving.idx];
    card.x = Math.max(0, moving.origX + e.clientX - moving.startX);
    card.y = Math.max(0, moving.origY + e.clientY - moving.startY);
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`);
    if (el) { el.classList.remove('moving'); }
    moving = null; saveBoard();
  }
  if (resizing) { resizing = null; saveBoard(); }
});

function addTextCard() {
  cards.push({ type: 'text', content: '', x: 50, y: window.scrollY + 100, w: 300 });
  renderCards();
  setTimeout(() => { const els = document.querySelectorAll('.card .text'); els[els.length - 1]?.focus(); }, 100);
}

function addImageCard() {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = 'image/*';
  input.onchange = e => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = () => { cards.push({ type: 'image', src: reader.result, x: 50, y: window.scrollY + 100, w: 240 }); renderCards(); saveBoard(); };
    reader.readAsDataURL(file);
  };
  input.click();
}

function resetLayout() {
  if (!confirm('자동 재배치합니다. 현재 위치가 변경됩니다.')) return;
  cards.forEach(c => { delete c.x; delete c.y; });
  renderCards(); autoLayout();
}

setInterval(saveBoard, 30000);
loadBoard();
</script>
