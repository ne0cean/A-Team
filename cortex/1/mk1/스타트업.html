<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>스타트업</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #1e1e1e;
  color: #e0e0e0;
  font-family: 'Segoe UI', -apple-system, sans-serif;
  font-size: 15px;
  line-height: 1.6;
  padding: 20px 30px 60px;
  overflow-x: hidden;
}
a { color: #6cb0f6; text-decoration: none; }
a:hover { text-decoration: underline; }
.title-bar {
  background: #3a3a5c;
  display: inline-block;
  padding: 6px 16px;
  font-size: 22px;
  font-weight: bold;
  color: #fff;
  margin-bottom: 4px;
}
.date { color: #999; font-size: 13px; margin-bottom: 20px; }
.board { position: relative; }
.card {
  background: #2a2a2a;
  border: 1px solid #3a3a3a;
  border-radius: 8px;
  padding: 12px;
  position: absolute;
  cursor: grab;
  transition: box-shadow 0.15s;
  overflow: hidden;
}
.card:hover { box-shadow: 0 0 0 1px #58a6ff; z-index: 10; }
.card.moving { opacity: 0.8; box-shadow: 0 4px 24px rgba(0,0,0,0.6); z-index: 100; cursor: grabbing; }
.card img { width: 100%; border-radius: 4px; display: block; }
.card .caption { font-size: 12px; color: #888; margin-top: 6px; }
.card .text { outline: none; min-height: 20px; white-space: pre-wrap; word-break: break-word; }
.card .text:focus { background: rgba(255,255,255,0.05); border-radius: 4px; padding: 4px; }
.card .text:empty::before { content: '텍스트 입력...'; color: #555; }
.card table { border-collapse: collapse; width: 100%; font-size: 13px; }
.card table td, .card table th { border: 1px solid #444; padding: 4px 8px; vertical-align: top; }
.card table th { background: #333; color: #ccc; }
.card-actions { position: absolute; top: 4px; right: 4px; display: none; gap: 4px; }
.card:hover .card-actions { display: flex; }
.card-btn { background: #333; border: 1px solid #555; color: #ccc; border-radius: 4px; padding: 2px 6px; font-size: 11px; cursor: pointer; }
.card-btn:hover { background: #444; color: #fff; }
.resize-handle { position: absolute; bottom: 0; right: 0; width: 16px; height: 16px; cursor: se-resize; opacity: 0; }
.card:hover .resize-handle { opacity: 0.6; }
.resize-handle::after { content: ''; position: absolute; bottom: 3px; right: 3px; width: 8px; height: 8px; border-right: 2px solid #666; border-bottom: 2px solid #666; }
.toolbar { position: fixed; bottom: 0; left: 0; right: 0; background: #161b22; border-top: 1px solid #30363d; padding: 8px 20px; display: flex; gap: 12px; align-items: center; z-index: 200; }
.toolbar button { background: #21262d; border: 1px solid #30363d; color: #e0e0e0; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; }
.toolbar button:hover { background: #30363d; }
.toolbar .status { color: #8b949e; font-size: 12px; margin-left: auto; }
.highlight-red { color: #ff6b6b; }
.highlight-blue { color: #6cb0f6; }
</style>
</head>
<body>
<div class="title-bar">스타트업</div>
<div class="date">Invalid Date</div>
<div class="board" id="board"></div>
<div class="toolbar">
  <button onclick="addTextCard()">+ 텍스트</button>
  <button onclick="addImageCard()">+ 이미지</button>
  <button onclick="saveBoard()">💾 저장</button>
  <button onclick="resetLayout()">↺ 재배치</button>
  <span class="status" id="status">Ready</span>
</div>
<script>
const SAVE_KEY = 'board-스타트업';
const IMG_BASE = '../../attachments/';
const DEFAULT_CARDS = [
  {
    "type": "text",
    "content": "<a href=\"https://tkim.co/category/custdev-and-val/\" target=\"_blank\">스타트업</a><br>\t\t\t<br>사업 아이디어를 찾는 5가지 방법<br>\t\t\t<br><a href=\"https://tkim.co/2020/11/10/7ways-for-startup-ideas/\" target=\"_blank\">2020-11-10</a><br>\t\t\t<br>\t\t\t\t<br>\t\t\t\t\t<br>&#160;<a href=\"https://open.kakao.com/o/gUzDia2d\" target=\"_blank\">프로덕트 마켓 파인더스 채팅\u001d방</a>&#160;(암호 gopmf)에서 PMF 찾는 과정에 대해 얘기 나누세요<br>\t\t\t\t\t<br>&#160;<a href=\"https://www.secondbrain.kr/startup-team\" target=\"_blank\">세컨드 브레인 분야의 창업 멤버를 찾습니다!</a><br>\t\t\t\t\t<br>\t\t\t\t<br>\t\t\t<br>\t\t\t<br>사업을 하는데 있어서 사람이 중요하냐, 시장이 중요하냐, 아이디어가 중요하냐 많은 이야기들이 있다. 나는 개인적으로 아이디어가 가장 중요하다고 생각한다. 왜냐하면&#160;<a href=\"https://tkim.co/2020/08/05/customer-problem/\" target=\"_blank\">사업</a> 아이디어는 내가 풀려고 하는 문제와 문제가 있는 시장, 그리고 어떻게 기존 대비 월등히 나은 방법으로 해결할지가 간략히 정리된 것이기 때문이다. 그리고 좋은 방향으로 잡힌 사업 아이디어는 그 뒤에 많은 다른 일을 정말 수월하게 해주기 때문이기도 하다 (<a href=\"https://www.nfx.com/post/hidden-patterns-great-startup-ideas/\" target=\"_blank\">NFX, The hidden patterns of great startup ideas</a>).<br>\t\t\t<br>그럼 좋은 사업 아이디어는 어떻게 찾을 수 있을까? 회사들이 어떤 아이디어를 가지고 성공하고 실패하는지 그 사례를 많이 봐본 VC들과 인디 개발자로 사업 아이디어를 적극적으로 찾고 있는 사람들이 남긴 여러 글을 살펴보고 5가지의 방법론으로 정리해 보았다.<br>\t\t\t<br>여기서 얘기하는 좋은 사업 아이디어는 고객에게 10배 가치를 제공할 수 있는 사업 아이디어로 한정하려 한다. 물론 10배 가치를 제공하지 못하더라도 충분히 좋은 사업 아이디어들도 많다. 하지만 빠르게 성장할 수 있고, 그 성장의 규모가 매우 클 수 있는 사업 아이디어를 찾아 보는 것이 더 큰 인사이트를 제공해 줄 수 있다.<br>\t\t\t<br>1. 기술의 변곡점을 살펴보기<br>\t\t\t<br>\t\t\t<br>주요 기술의 발전. 출처:&#160;<a href=\"https://latinclassicsandeducationin21stcentury.wordpress.com/2017/02/09/timelines/\" target=\"_blank\">Latin, Classics, and Education in the 21st century</a><br>\t\t\t<br><a href=\"https://tkim.co/2020/01/12/product-market-fit/\" target=\"_blank\">Product-Market Fit</a>이라는 용어를 처음 정의한 Andy Rachleff는 빠르게 성장하는 사업 아이디어를 찾기 위해서 기술의 변곡점을 살펴보라고 한다. 사업 아이디어가 가장 많이 쏟아져 나온 시기는 디지털 플랫폼이 생긴 PC의 보급, 인터넷의 도입, 모바일의 등장 시기들이었다. 이처럼 이전엔 불가능했던 것을 가능하게 하는 기술이 새롭게 나타날 때 기존의 산업 구도에는 균열이 생기게 된다. 그런 의미에서 어떤 기술들이 새롭게 나오게 되었나, 그런 기술로 인해서 무엇이 가능해졌나 하는 것을 알아보는 것이 좋은 사업 아이디어를 찾을 수 있는 방법이 된다.<br>\t\t\t<br>예를 들어&#160;<a href=\"https://cohere.so/\" target=\"_blank\">Cohere</a>&#160;이라고 하는 스타트업의 사업 아이디어를 살펴보자. 최근 리모트 데스크탑처럼 브라우저 상에서 상대방의 브라우저 화면을 다른 사람과 공유할 수 있게 해 주는 웹 기반 기술이 나왔다고 한다. Cohere는 이 기술을 이용해서, 웹 애플리케이션(보통 SaaS)를 제공하는 회사들이 고객의 브라우저 화면을 보면서 고객이 겪는 어려움을 원격으로 해결해 주는 제품을 출시 하였고&#160;<a href=\"https://news.ycombinator.com/item?id=24930271\" target=\"_blank\">Hacker News</a>에서 뜨거운 관심을 받았다.<br>\t\t\t<br>기술의 변곡점을 살펴보라는 얘기는 사회적인 큰 변화가 생기는 부분을 바라보라는 말과도 일맥상통한다. 테크 기업들이 채용을 할 때 학위를 중요하게 보기 시작하지 않는 것, 코로나 바이러스로 우리의 생활이 바뀌어 가는 것, 귀농하는 사람들이 늘어 가는 것, 출생률이 낮아지고 외국인 근로자가 증가하는 것, 소프트웨어 개발자의 몸값이 매년 급격하게 높아지는 것 — 이런 사회적 변화 속에서 이전에 없던 새로운 니즈가 발생할 수 있고 이를 잘 파악하면 좋은 사업 아이디어를 찾을 수 있다.<br>\t\t\t<br>2. 당연한 것들에 대해 질문하기<br>\t\t\t<br>\t\t\t<br>동의하지 않는 아이디어. 출처:&#160;<a href=\"https://www.nfx.com/post/hidden-patterns-great-startup-ideas/\" target=\"_blank\">NFX, The Hidden Patterns of Great Startup Ideas</a><br>\t\t\t<br>Y-Combinator의 창업가인 폴 그레험은 당연하게 보이는 것들이 더 나은 방법이 없는지 다시 물어보는 것 자체가 사업 아이디어를 떠오르게 한다고 한다 (<a href=\"http://www.paulgraham.com/startupideas.html\" target=\"_blank\">Paul Graham, The startup ideas</a>). 필연적으로 좋은 사업 아이디어는 이전에 사람들이 많이 생각하지 못하는 곳에서 나올 수 밖에 없다. 이미 많은 사람들이 생각을 해본 것이라면 좋은 사업 아이디어가 아니다. 그 사업은 많은 사람들로 북적댈 것이다. 그래서 경쟁이 치열하고 성공한다 해도 크게 성공하기 어렵다.<br>\t\t\t<br>반대로 사람들이 직관적으로 알기 어려운 것이지만 사람들에게 가치를 주는 것을 발견하는 것이 좋은 사업 아이디어를 얻게 되는 것이다. 사업 아이디어를 들었을 때 다른 사람의 반응이 그게 될까 — 하는 부정적인 것들 중에서 보통 정말 크게 성장하는 사업 아이디어가 나온다. 그러므로 우리가 일상에서 당연히 하고 있는 행동, 구매해서 쓰는 제품에 대해서 과연 이게 최선일까 — 라고 질문을 던져보는 것은 좋은 사업 아이디어를 찾을 수 있는 인사이트를 제공해 줄 수 있다.<br>\t\t\t<br>3. 시장의 끝자락을 살펴보기<br>\t\t\t<br>\t\t\t<br>신용카드 결제 단말 시장이 끝나는 곳. 출처:&#160;<a href=\"https://www.amazon.com/Innovation-Stack-Building-Unbeatable-Business/dp/0593086732\" target=\"_blank\">Innovation Stack</a><br>\t\t\t<br>짐 맥켈비는 스마트폰에 연결하는 결제 단말기로 사업을 하는 Square의 공동 창업가이다. 그는&#160;<a href=\"https://tkim.co/2020/04/06/the-innovation-stack/\" target=\"_blank\">새로운</a> 사업 아이디어를 찾을 때 시장의 끝자락을 살펴보라고 한다 (<a href=\"https://www.amazon.com/Innovation-Stack-Building-Unbeatable-Business/dp/0593086732\" target=\"_blank\">Jim McKelvey, Innovation stack</a>). 시장을&#160;제품을 위해 지불하는 금액 X 지불하는 사람의 수로 정의를 해 보자. 어떤 시장이든간에 현재의 시장에 참여하지 않고 있는 사람/조직이 있다. 참여하고 있는 사람과 참여하지 않는 사람의 경계가 시장의 끝자락이 된다. 그러면 왜 참여를 하고 있지 않은지를 살펴보라고 한다. 가격이 높아서 인가, 제품이나 서비스가 그 사람들에겐 만족스럽지 않아서 인가, 아니면 다른 요소가 있는 것인가.<br>\t\t\t<br>이런 부분을 살펴보면 현재 시장에 참여하고 있지 않은 사람들이 시장에 참여하게 만들 수 있는 새로운 접근 방법이 떠오를 수 있다. Square는 수십 페이지의 계약서에 사인을 하고 높은 수수료를 내야 하기 때문에 카드 단말기를 도입하지 않는 소상공인들을 발견했다. 그리고 시장의 밖에 있는 그들에게 가입 절차가 간단하고 수수료가 낮은 결제 방식을 제공하였다. Wealthfront는 테크 회사에 다니는 20대 직장인들을 주목했다. 그들은 수입의 일부를 투자 운영하는데 있어서 골치 아프길 싫어 했으며 그냥 맡기고 싶어 했다. 또한, 최소 운용 금액이 낮아서 쉽게 시작할 수 있어야 하며 운용 수수료가 낮아야 했다. Wealthfront는 이런 고객을 대상으로 하면서 기존 고액 자산가에게만 제공되던 Private Banking 서비스를 더 많은 개인에게 제공할 수 있게 되었다.<br>\t\t\t<br>4. 아웃라이어에 주목하기<br>\t\t\t<br>\t\t\t<br>최초의 셀카봉. 출처:&#160;<a href=\"https://www.imore.com/history-selfie-stick\" target=\"_blank\">The History of Self Stick</a><br>\t\t\t<br>내가 이해하기 힘든 사람들의 행동이나 이전에 사람들이 하지 않았는데 하게된 행동을 살펴보는 것도 좋은 방법이다 (<a href=\"https://growth.wingify.com/to-get-good-startup-ideas-look-for-anomalies-f751e27ba352\" target=\"_blank\">Paras Chopra, To get good startup ideas, look for anomalies</a>). 사람들의 행동을 변화시키는 것은 정말 어려운 일이다. 그럼에도 불구하고 사람들이 이해하기 힘든 행동을 하거나 이전과 다른 행동의 변화가 있다면, 그들에게 새로운 문제가 생겼고 그걸 스스로 해결하고 있다는 것이다. 그럼 사람들의 문제를 더 구체적으로 확인하고 지금 스스로 해결하는 방법보다 더 좋은 해결 방법을 제시할 수 있다면 훌륭한 사업 아이디어가 된다.<br>\t\t\t<br>예를 들어 셀카봉을 쓰는 사람을 처음 봤을 때의 낯설은 느낌이 들었을 것이다. 개인적으로 나는 저렇게까지 해야 하나 라고 생각했다. 시간이 한참 흘러 셀카봉이 여행의 필수품이 되고 나서야, 혼자 사진을 좋은 각도로 찍는 것이 어렵다는 것을 새삼 느끼게 되었다. 2016년도에 회사 기념품을 한 어르신에게 드렸더니, 고마워 하시면서 가상 화폐에 대해 좀 알려줄까 하고 얘기하신 것이 기억난다. 아시다시피 2017년도에는 역사에 남을 가상 화폐 붐이 일어 났었다.<br>\t\t\t<br>사람들의 이상한 행동 중에서도 돈을 내면서까지 하고 있는 행동들에 대해서는 더욱 주목할 필요가 있다 (<a href=\"https://www.nfx.com/post/10-places-to-find-product-market-fit/\" target=\"_blank\">NFX, 10 places to find product-market fit</a>). 이건 이미 지불 의사가 있는 사람들로 구성된 시장이 존재하는 것이 검증된 상황이고, 아직 사람들이 낯설어 하는 것이어서 만일 이 시장이 성장한다면 빠르게 선점할 수 있기 때문이다.<br>\t\t\t<br>5. 아이디어 추출하기<br>\t\t\t<br>지금까지의 방법은 관념적인 방법 혹은 사고하는 프레임워크에 해당하고, 구체적인 액션 플랜은 개인이 짜야 하는 방법론들이다. 하지만, Dane Maxwell이 제안한 아이디어 뽑아내기 (Idea Extraction) 방법은 고객에게 직접 물어보는 방식으로 사업 아이디어를 직접적으로 찾는다 (<a href=\"https://www.smartpassiveincome.com/podcasts/no-ideas-no-expertise-no-money-business/\" target=\"_blank\">Pat Flynn, Building a Lucrative Business with No Ideas, No Expertise, and No Money with Dane Maxwell</a>, 팟캐스트 요약한 글:&#160;<a href=\"https://nathanbarry.com/finding-ideas-project/\" target=\"_blank\">Nathan Barry, Finding ideas for you next project</a>).<br>\t\t\t<br>먼저 마진율이 높고 수작업 비중이 높은 산업군을 선택한다. 그런 다음 종사자들의 이메일을 수집하고, 수집한 이메일을 사용해서 “최근에 특정 소프트웨어를 찾아봤는데 그런게 없어서 힘드셨던적은 없나요? 저희가 리서치 중인데 잠깐 전화통화를 허락해 주시면 그런 소프트웨어를 구상해 보겠습니다” 라는 식의 이메일을 보낸다. 그리고 답이 오는 사람들을 전화 통화하면서 가장 중요한 사업 활동은 무엇인지, 그걸 하는데 있어서 어떤 어려움이 있는지, 어디에 시간을 많이 쓰는지 등을 함께 물어보며 고객이 느끼는 문제와 이를 해결할 소프트웨어 제품을 구상하는 것이다.<br>\t\t\t<br>이 방법은 초기에 일찍 수익을 내면서 더 깊이 산업을 이해해 가기 좋은 접근 방법이다. 소프트웨어 제품을 만들어 팔면서 더 좋은 아이디어를 찾아볼 수 있기 때문에 어찌보면 좀 더 안정적으로 사업을 시작하려는 사람들에게 적합한 방법일 수 있다. 다만, 제품이 이미 나와있는 상태에서 더 좋은 사업 아이디어를 찾다보면 아무래도 현재 제품의 근처, 현재 고객의 근처 고객에 대한 아이디어에 한정될 수 있는 단점이 있다.<br>\t\t\t<br>더 깊이 파기<br>\t\t\t<br>“No Business Plan Survives First Contact With A Customer”<br>\t\t\t<br>Steve Blank,&#160;<a href=\"https://steveblank.com/2010/11/01/no-business-plan-survives-first-contact-with-a-customer-%e2%80%93-the-5-2-billion-dollar-mistake/\" target=\"_blank\">Steve Blank Blog</a><br>\t\t\t<br>사업 아이디어를 찾는 여러 방법에 대한 글들을 읽으면서 많은 인사이트를 얻을 수 있었지만, 이걸 지난 15개월간 실행해 보니 말처럼 쉽지 않았다. 그 이유는 아이디어는 결국 시작점에 불과하고 (<a href=\"http://www.paulgraham.com/ideas.html\" target=\"_blank\">Paul Graham, Ideas for startups</a>) 고객과 대화하고, 프리토타입 혹은 MVP를 제공해 가며 아이디어를 구체화해 가거나 또 다른 아이디어를 발견하는 과정이 필요하기 때문이다. 하지만 그런 과정 속에서도 미리 경험한 사람들이 알려준 5가지 교훈은 좋은 나침반 역할을 해 줄 수 있는 것 같다.<br>\t\t\t<br><br>\t\t\t출처: <<a href=\"https://tkim.co/2020/11/10/7ways-for-startup-ideas/?fbclid=IwAR00wF-KNkLsayBg3Oqe1PLmPqOMkoeRh3NteF9lRU6Xq4GdxFmPRbTHQ5k\" target=\"_blank\">https://tkim.co/2020/11/10/7ways-for-startup-ideas/?fbclid=IwAR00wF-KNkLsayBg3Oqe1PLmPqOMkoeRh3NteF9lRU6Xq4GdxFmPRbTHQ5k</a>>",
    "w": 400
  }
];

let cards = [];
let moving = null, resizing = null;

function loadBoard() {
  const saved = localStorage.getItem(SAVE_KEY);
  cards = saved ? JSON.parse(saved) : DEFAULT_CARDS.map(c => ({...c}));
  renderCards();
  if (!saved) autoLayout();
}

function autoLayout() {
  const GAP = 14;
  const boardW = document.getElementById('board').offsetWidth;
  const cols = Math.max(1, Math.floor(boardW / 280));
  const colW = (boardW - GAP * (cols - 1)) / cols;
  const colHeights = new Array(cols).fill(0);
  const allCards = document.querySelectorAll('.card');
  const images = document.querySelectorAll('.card img');
  let loaded = 0;
  const total = images.length;

  function place() {
    allCards.forEach((el, i) => {
      const card = cards[i];
      const w = Math.min(card.w || colW, colW);
      let minCol = 0;
      for (let c = 1; c < cols; c++) if (colHeights[c] < colHeights[minCol]) minCol = c;
      card.x = minCol * (colW + GAP);
      card.y = colHeights[minCol];
      card.w = w;
      el.style.left = card.x + 'px';
      el.style.top = card.y + 'px';
      el.style.width = w + 'px';
      colHeights[minCol] = card.y + el.offsetHeight + GAP;
    });
    document.getElementById('board').style.minHeight = Math.max(...colHeights) + 100 + 'px';
    saveBoard();
  }

  if (total === 0) requestAnimationFrame(place);
  else images.forEach(img => {
    if (img.complete) { loaded++; if (loaded >= total) requestAnimationFrame(place); }
    else img.onload = img.onerror = () => { loaded++; if (loaded >= total) requestAnimationFrame(place); };
  });
}

function syncText() {
  document.querySelectorAll('.card').forEach(el => {
    const idx = +el.dataset.idx;
    if (cards[idx]?.type === 'text') {
      const t = el.querySelector('.text');
      if (t) cards[idx].content = t.innerHTML;
    }
  });
}

function saveBoard() {
  syncText();
  localStorage.setItem(SAVE_KEY, JSON.stringify(cards));
  document.getElementById('status').textContent = '저장됨 ' + new Date().toLocaleTimeString();
}

function renderCards() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  cards.forEach((card, i) => {
    const el = document.createElement('div');
    el.className = 'card';
    el.dataset.idx = i;
    if (card.x !== undefined) el.style.left = card.x + 'px';
    if (card.y !== undefined) el.style.top = card.y + 'px';
    if (card.w) el.style.width = card.w + 'px';

    el.addEventListener('mousedown', e => {
      if (e.target.closest('.text, a, .card-btn, .resize-handle, table')) return;
      e.preventDefault();
      moving = { idx: i, startX: e.clientX, startY: e.clientY, origX: card.x || 0, origY: card.y || 0 };
      el.classList.add('moving');
    });

    const actions = document.createElement('div');
    actions.className = 'card-actions';
    const delBtn = document.createElement('button');
    delBtn.className = 'card-btn'; delBtn.textContent = '×';
    delBtn.onclick = e => { e.stopPropagation(); if (confirm('삭제?')) { cards.splice(i, 1); renderCards(); saveBoard(); } };
    actions.appendChild(delBtn);
    el.appendChild(actions);

    if (card.type === 'text') {
      const text = document.createElement('div');
      text.className = 'text';
      text.contentEditable = true;
      text.innerHTML = card.content || '';
      text.addEventListener('blur', () => { card.content = text.innerHTML; saveBoard(); });
      el.appendChild(text);
    } else if (card.type === 'image') {
      const src = card.src.startsWith('http') || card.src.startsWith('data:') ? card.src : IMG_BASE + card.src;
      const img = document.createElement('img');
      img.src = src;
      img.alt = card.alt || '';
      img.loading = 'lazy';
      img.onerror = () => img.style.display = 'none';
      if (card.link) {
        const a = document.createElement('a'); a.href = card.link; a.target = '_blank';
        a.appendChild(img); el.appendChild(a);
      } else { el.appendChild(img); }
      if (card.caption) {
        const cap = document.createElement('div');
        cap.className = 'caption';
        cap.textContent = card.caption;
        el.appendChild(cap);
      }
    } else if (card.type === 'table') {
      const wrapper = document.createElement('div');
      wrapper.style.overflowX = 'auto';
      wrapper.innerHTML = card.html || '';
      el.appendChild(wrapper);
    }

    const rh = document.createElement('div');
    rh.className = 'resize-handle';
    rh.addEventListener('mousedown', e => {
      e.preventDefault(); e.stopPropagation();
      resizing = { idx: i, startX: e.clientX, startW: card.w || el.offsetWidth };
    });
    el.appendChild(rh);
    board.appendChild(el);
  });

  requestAnimationFrame(() => {
    let maxBottom = 0;
    document.querySelectorAll('.card').forEach(el => {
      const b = (parseFloat(el.style.top) || 0) + el.offsetHeight;
      if (b > maxBottom) maxBottom = b;
    });
    board.style.minHeight = (maxBottom + 100) + 'px';
  });
}

document.addEventListener('mousemove', e => {
  if (moving) {
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`);
    if (!el) return;
    const nx = moving.origX + e.clientX - moving.startX;
    const ny = moving.origY + e.clientY - moving.startY;
    el.style.left = nx + 'px';
    el.style.top = ny + 'px';
  }
  if (resizing) {
    const card = cards[resizing.idx];
    card.w = Math.max(100, resizing.startW + e.clientX - resizing.startX);
    const el = document.querySelector(`.card[data-idx="${resizing.idx}"]`);
    if (el) el.style.width = card.w + 'px';
  }
});

document.addEventListener('mouseup', e => {
  if (moving) {
    const card = cards[moving.idx];
    card.x = Math.max(0, moving.origX + e.clientX - moving.startX);
    card.y = Math.max(0, moving.origY + e.clientY - moving.startY);
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`);
    if (el) { el.classList.remove('moving'); }
    moving = null; saveBoard();
  }
  if (resizing) { resizing = null; saveBoard(); }
});

function addTextCard() {
  cards.push({ type: 'text', content: '', x: 50, y: window.scrollY + 100, w: 300 });
  renderCards();
  setTimeout(() => { const els = document.querySelectorAll('.card .text'); els[els.length - 1]?.focus(); }, 100);
}

function addImageCard() {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = 'image/*';
  input.onchange = e => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = () => { cards.push({ type: 'image', src: reader.result, x: 50, y: window.scrollY + 100, w: 240 }); renderCards(); saveBoard(); };
    reader.readAsDataURL(file);
  };
  input.click();
}

function resetLayout() {
  if (!confirm('자동 재배치합니다. 현재 위치가 변경됩니다.')) return;
  cards.forEach(c => { delete c.x; delete c.y; });
  renderCards(); autoLayout();
}

setInterval(saveBoard, 30000);
loadBoard();
</script>
</body>
</html>
