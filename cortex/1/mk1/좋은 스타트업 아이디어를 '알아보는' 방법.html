.toolbar button { background: #21262d; border: 1px solid #30363d; color: #e0e0e0; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; }

const DEFAULT_CARDS = [
  {
    "type": "text",
    "content": "좋은 스타트업 아이디어를 '알아보는' 방법<br>\t\t\t<br><br>\t\t\t<br>(1) 시장 규모: 현재는 작고 날카롭지만, 미래에는 크게 확장 가능한 시장<br>\t\t\t<br>Coinbase: 2012년 처음 시작할 때는 시장이 작았지만, 가상 자산이 기존 자산을 대체한다는 관점에서 바라보니 시장이 엄청 커보였음<br>\t\t\t<br><br>\t\t\t<br>(2) 창업자 - 시장 Fit: 창업자가 잘 알고, 좋아하는 시장이어야 함<br>\t\t\t<br>Flexport: 국제 무역과 관련된&#160;스타트업으로, 창업자 Ryan Peterson이 국제 무역에서 10년 이상 일한 전문가<br>\t\t\t<br><br>\t\t\t<br>(3) 명확한&#160;문제 해결 + 새로운 인사이트:&#160;특정 니즈에 대한 갈증을 새로운 방법으로 충족할 수 있어야 함<br>\t\t\t<br>개인적인 경험&#183;니즈에서 시작한 경우가 가장 이상적이며, 결과적으로 해당 시장 or 아이템에 대한 자신만의 유니크한 인사이트가 있어야 함<br>\t\t\t<br>Airbnb: 본인의 집에 제3자를 초대한다는 것에 처음에는 모두가 부정적이었으나, 창업자가 직접 해당 모델을 운영해보고 생각보다 괜찮은 아이디어임을&#160;몸으로 직접 확인<br>\t\t\t<br><br>\t\t\t<br>(4) 그외 좋은 스타트업 아이디어 평가 기준<br>\t\t\t<br>본인이 직접 필요로 느끼는 것<br>\t\t\t<br>과거에는 불가능했으나, 기술의 발전 등으로 인해&#160;최근에 구현 가능해진 것들<br>\t\t\t<br>해외에서 이미 성공한 사례를 참고하는 것<br>\t\t\t<br><br>\t\t\t<br>사람들이 의외로 간과하기 쉬운 기준이 2번이라고 생각합니다. 아무리 좋은 아이디어, 좋은 시장이어도 본인이 이에 대한 관심&#183;애정이 적으면 그만큼 전문성을 쌓기도 어렵고, 어려운 난관에 봉착했을 때 이를 이겨고자 하는 의지도 오랫동안 유지하기 어렵죠. 아무리 그럴듯한 아이디어라도, 그걸 정말 좋은 제품으로 만들어서 시장에 알리고 경쟁을 이겨내는 데에는 정말 큰 노력과 투지가 필요하니까요. 본인이 그 시장 또는 사업에 정말 큰 애착이 있어야만 성공할 수 있다고&#160;개인적으로는 생각합니다 :)<br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br>좋은 스타트업 아이디어를&#160;'놓치는'&#160;방법<br>\t\t\t<br><br>\t\t\t<br>위에서는 좋은 스타트업 아이디어를 '알아보는' 방법을 설명했다면, 아래는 좋은 스타트업 아이디어를 '놓치게 만드는' 안좋은 기준들이라고 합니다. 높은 확률로 많은 사람들이 이런 기준으로 신생 스타트업들을 바라보고 평가하고 있을 겁니다. 하지만 우리가 진짜 보석 같은 스타트업 아이디어를 발견해내기 위해서는, 이런 선입견과 편견을 이겨내야 한다고 Jared Friedman은 말합니다.<br>\t\t\t<br><br>\t\t\t<br>(1) 너무 어렵고&#160;하기 힘든 일이라고 느낌<br>\t\t\t<br>Stripe: 모든 사람이 온라인 결제가 불편하다고 생각했지만, 복잡한 결제 인프라를 이해하고 이를 개선하기는 너무 어려울 것이라고 지레 포기&#160;→ 하지만 Stripe는 이를 이겨내고 정말 크게 성장함<br>\t\t\t<br><br>\t\t\t<br>(2) 오래되고 지루한 시장이라는 편견<br>\t\t\t<br>Gusto: Payroll 과 관련된 업무에는 불편한 점이 많았으나, 재미가 없다는 생각에 아무도 이를 고치려 하지 않았음 →&#160;Gusto는 그 틈을 파고 들어 성공<br>\t\t\t<br><br>\t\t\t<br>(3) 스타트업이 하기에는 너무 크거나 야심찬 일이라고 느낌<br>\t\t\t<br>창업가들은 너무 큰 꿈과 야심을 표출하는데 있어서 소극적인 경향이 있으나, 결과적으로 그러한 큰 비전을 목표로 했던 곳들이 크게 성공할 수 있었음<br>\t\t\t<br><br>\t\t\t<br>(4) 경쟁사가 너무 많다고 판단<br>\t\t\t<br>반대로, 경쟁사가 충분히 있는 곳을 노려야 한다 → 경쟁사가 없는 곳은 그냥 수요 자체가 없는 시장일 확률이 높음<br>\t\t\t<br>경쟁사가 있지만 놓치고 있거나 잘하지 못하는 부분이 있을 때, 그 약점을 파고 들면 성공할 수 있음<br>\t\t\t<br>Dropbox: 드랍박스가 나왔을 때, 이미 시장에는 충분히 많은 파일 공유 솔루션이 있었으나 이들보다 더 좋은 프로덕트를 만듦으로써 성공할 수 있었음<br>\t\t\t<br><br>\t\t\t<br>우리가 흔히 범할 수 있는 실수들이기 때문에, 이러한 기준들을 기반으로 우리가 혹시 잘못된 각도로 사업을 평가하고 있는건 아닌지 수시로 되돌아 볼 필요가 있는 것 같습니다.<br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br>기가 막힌 스타트업 아이디어, 어떻게 만들어낼 수 있을까?<br>\t\t\t<br><br>\t\t\t<br>좋은 아이디어 = 자연스럽게 떠오른 아이디어 (Organic Ideas)<br>\t\t\t<br>어느날 갑자기 앉아서 의식적으로 생각하려고 하면 생각도 안나고, 억지스러운 아이디어가 떠오르기 일쑤<br>\t\t\t<br><br>\t\t\t<br>이는 비단 YC 뿐만 아니라, 다양한 VC 들이 공통적으로 하는 말입니다. 실제로 우리 주변에서 성공한 스타트업들만 봐도, 그 시작으로 보면 대부분 그것들이 Organic Ideas 인 경우가 많지요. 그렇다면 Organic Idea는 어떻게 만들어질 수 있을까요? 아래를 참고해보면 좋을 듯 합니다.<br>\t\t\t<br><br>\t\t\t<br>(1) 좋은 스타트업 아이디어가 무엇인지 아는 것<br>\t\t\t<br>좋은 아이디어를 접했을 때, 그걸 알아볼 수 있는 눈이 일단 먼저 필요<br>\t\t\t<br><br>\t\t\t<br>(2) 부족한 부분을 수시로 찾아야 함<br>\t\t\t<br>좋은 선별안을 가졌다면, 세상을 바라보면서 무언가 더 개선이 필요한 부족한 부분이 없는지를 수시로 찾아야 함<br>\t\t\t<br><br>\t\t\t<br>(3) 가치 있는 분야에 대해 전문성을 갖춰야 함<br>\t\t\t<br>충분히 가치가 있는 특정 분야에 대해 높은 전문성을 가지고 최전선을 계속 바라보고 있다면, 좋은 사업 아이디어가 자연스럽게 계속 떠오를 것<br>\t\t\t<br><br>\t\t\t<br>(4) 성공적인 스타트업에서 일하기<br>\t\t\t<br>성공하는 스타트업에 있다면 자연스럽게 다양한 성장 시장에 대한 정보를 얻고, 또 아이디어들을 듣고 떠올릴 수 있게됨<br>\t\t\t<br><br>\t\t\t<br>이렇게 본인이 좋은 스타트업 아이디어를 떠올릴 수 있는 준비와 환경이 세팅이 되었다면, 이번에는 조금 더 디테일하게 구체적으로 좋은 스타트업 아이디어를 조합해내는 테크니컬한 스킬들을 한 번 알아봅시다.<br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br>좋은 스타트업 아이디어를 떠올리는 7가지 비법<br>\t\t\t<br><br>\t\t\t<br>Jared Friedman은 7가지 접근 방식을 소개하지만, 7가지 안에서도 좋은 방식과 덜 좋은 방식이 있다고 설명합니다. (1)번에 가까울 수록 좋은 접근 방식, (7)번에 가까울수록 덜 좋은 접근 방식에 가까우니 차분히 읽어보시면서 참고하시길 바랍니다.<br>\t\t\t<br><br>\t\t\t<br>(1) 나 또는 우리 팀이 가장 잘할 수 있는 것이 무엇인지 파악<br>\t\t\t<br>이 경우, 기본적으로 창업가 - 시장 Market Fit이 좋을 수 밖에 없고 다른 팀보다 훨씬 더 차별적인 경쟁력을 가지고 시작할 수 있음<br>\t\t\t<br>SnapDocs: 모기지론 시장에서 10년을 근무한 전문가가 창업<br>\t\t\t<br>Lattice: 창업자가 인사 평가 소프트웨어를 쓰면서 불편함을 많이 느꼈고, 이를 본인이 직접 개선<br>\t\t\t<br>Mixpanel: 회사 다닐 때 내부적으로 만든 분석 툴이 있었는데, 그것이 다른 회사에서도 니즈가 있겠다라는 판단에 창업&#160;<br>\t\t\t<br><br>\t\t\t<br>(2) 다른 사람이 나를 위해 만들어줬으면 싶은 것<br>\t\t\t<br>Doordash: 태국 음식을 배달시켜 먹고 싶었으나 그럴 수 있는 방법이 전무하다는 것을 깨닫고, 본인이 직접 창업<br>\t\t\t<br><br>\t\t\t<br>(3) 앞으로 10년 동안 본인의 인생을 투자할만하다는 가치가 있다고 느끼는 영역<br>\t\t\t<br>성공하지 못한다고 해도, 정말 본인이 열정&#183;애착을 가지고 일할 수 있는 분야<br>\t\t\t<br>Boom: 항공 산업에 푹 빠진 창업가가, 본인이 직접 초음속 비행기를 만들고 싶어서 창업<br>\t\t\t<br>다만 이 경우, 본인이 좋아한다고 해서 꼭&#160;큰 비즈니스가 되란 법이 없음&#160;→ 사업을 성공시키는데 있어 중요한 요소를 많이 놓칠 수 있기 때문에&#160;유의가 필요함<br>\t\t\t<br><br>\t\t\t<br>(4) 새로운 기술&#183;규제&#160;등 큰 변화를 활용<br>\t\t\t<br>PlanGrid: 기존에 종이로 진행이 되던 건설 관련 업무를 태블릿으로 이전, 이것은 온전히 아이패드라는 새로운 발명이 있었기 때문에 가능했던 것<br>\t\t\t<br><br>\t\t\t<br>(5) 최근 성공한 다른 회사를 벤치마킹<br>\t\t\t<br>Standard Cognition: AmazonGo의 성공을 보고, 다른 리테일 스토어도 동일한 기술&#183;제품을 필요로 할 것이라는 착안에서 시작<br>\t\t\t<br>보편적인 접근 방식이지만, 반드시 가장 좋은 방식이라고 할 수는 없음 → 이것이 정말 본인이 해당하는 시장에서도 고객이 가진 문제를 풀어줄 수 있는지에 대한 고민&#183;검증 필요<br>\t\t\t<br><br>\t\t\t<br>(6) 다른 사람에게 물어보기<br>\t\t\t<br>다만, 대부분 일반인들은 스타트업 아이디어를 생각해내는데 최적화되어 있지 않기 때문에 일반인보다는 스타트업 창업가나&#160;특정 분야에 대해 전문성을 가진 사람에게 물어보는 것이 좀 더 나을 수 있음<br>\t\t\t<br><br>\t\t\t<br>(7) 망가져 있는 시장을 들여다보기<br>\t\t\t<br>Lendup: Fintech에 전문성을 가지고 있던 창업가가,&#160;특정 대출 시장이 제대로 양성화되어 있지 않고 Scam이 많음을 보고 이를 개선<br>\t\t\t<br>다만 해당 시장에 대해 충분히 전문성이 있는 팀이어야 성공 확률을 높일 수 있음<br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t출처: <<a href=\"https://brunch.co.kr/@manonthegrid/14\" target=\"_blank\">https://brunch.co.kr/@manonthegrid/14</a>> <br>\t\t\t<br><br>\t\t<br>\t\t<br>\t\t\t<br>초기 스타텁 파이낸셜 모델링<br>\t\t\t<br><a href=\"https://acquiredentrepreneur.tistory.com/102\" target=\"_blank\">https://acquiredentrepreneur.tistory.com/102</a>",
    "w": 400
  }
];

let cards = [];
let moving = null, resizing = null;

function loadBoard() {
  const saved = localStorage.getItem(SAVE_KEY);
  cards = saved ? JSON.parse(saved) : DEFAULT_CARDS.map(c => ({...c}));
  renderCards();
  if (!saved) autoLayout();
}

function autoLayout() {
  const GAP = 14;
  const boardW = document.getElementById('board').offsetWidth;
  const cols = Math.max(1, Math.floor(boardW / 280));
  const colW = (boardW - GAP * (cols - 1)) / cols;
  const colHeights = new Array(cols).fill(0);
  const allCards = document.querySelectorAll('.card');
  const images = document.querySelectorAll('.card img');
  let loaded = 0;
  const total = images.length;

  function place() {
    allCards.forEach((el, i) => {
      const card = cards[i];
      const w = Math.min(card.w || colW, colW);
      let minCol = 0;
      for (let c = 1; c < cols; c++) if (colHeights[c] < colHeights[minCol]) minCol = c;
      card.x = minCol * (colW + GAP);
      card.y = colHeights[minCol];
      card.w = w;
      el.style.left = card.x + 'px';
      el.style.top = card.y + 'px';
      el.style.width = w + 'px';
      colHeights[minCol] = card.y + el.offsetHeight + GAP;
    });
    document.getElementById('board').style.minHeight = Math.max(...colHeights) + 100 + 'px';
    saveBoard();
  }

  if (total === 0) requestAnimationFrame(place);
  else images.forEach(img => {
    if (img.complete) { loaded++; if (loaded >= total) requestAnimationFrame(place); }
    else img.onload = img.onerror = () => { loaded++; if (loaded >= total) requestAnimationFrame(place); };
  });
}

function syncText() {
  document.querySelectorAll('.card').forEach(el => {
    const idx = +el.dataset.idx;
    if (cards[idx]?.type === 'text') {
      const t = el.querySelector('.text');
      if (t) cards[idx].content = t.innerHTML;
    }
  });
}

function saveBoard() {
  syncText();
  localStorage.setItem(SAVE_KEY, JSON.stringify(cards));
  document.getElementById('status').textContent = '저장됨 ' + new Date().toLocaleTimeString();
}

function renderCards() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  cards.forEach((card, i) => {
    const el = document.createElement('div');
    el.className = 'card';
    el.dataset.idx = i;
    if (card.x !== undefined) el.style.left = card.x + 'px';
    if (card.y !== undefined) el.style.top = card.y + 'px';
    if (card.w) el.style.width = card.w + 'px';

    el.addEventListener('mousedown', e => {
      if (e.target.closest('.text, a, .card-btn, .resize-handle, table')) return;
      e.preventDefault();
      moving = { idx: i, startX: e.clientX, startY: e.clientY, origX: card.x || 0, origY: card.y || 0 };
      el.classList.add('moving');
    });

    const actions = document.createElement('div');
    actions.className = 'card-actions';
    const delBtn = document.createElement('button');
    delBtn.className = 'card-btn'; delBtn.textContent = '×';
    delBtn.onclick = e => { e.stopPropagation(); if (confirm('삭제?')) { cards.splice(i, 1); renderCards(); saveBoard(); } };
    actions.appendChild(delBtn);
    el.appendChild(actions);

    if (card.type === 'text') {
      const text = document.createElement('div');
      text.className = 'text';
      text.contentEditable = true;
      text.innerHTML = card.content || '';
      text.addEventListener('blur', () => { card.content = text.innerHTML; saveBoard(); });
      el.appendChild(text);
    } else if (card.type === 'image') {
      const src = card.src.startsWith('http') || card.src.startsWith('data:') ? card.src : IMG_BASE + card.src;
      const img = document.createElement('img');
      img.src = src;
      img.alt = card.alt || '';
      img.loading = 'lazy';
      img.onerror = () => img.style.display = 'none';
      if (card.link) {
        const a = document.createElement('a'); a.href = card.link; a.target = '_blank';
        a.appendChild(img); el.appendChild(a);
      } else { el.appendChild(img); }
      if (card.caption) {
        const cap = document.createElement('div');
        cap.className = 'caption';
        cap.textContent = card.caption;
        el.appendChild(cap);
      }
    } else if (card.type === 'table') {
      const wrapper = document.createElement('div');
      wrapper.style.overflowX = 'auto';
      wrapper.innerHTML = card.html || '';
      el.appendChild(wrapper);
    }

    const rh = document.createElement('div');
    rh.className = 'resize-handle';
    rh.addEventListener('mousedown', e => {
      e.preventDefault(); e.stopPropagation();
      resizing = { idx: i, startX: e.clientX, startW: card.w || el.offsetWidth };
    });
    el.appendChild(rh);
    board.appendChild(el);
  });

  requestAnimationFrame(() => {
    let maxBottom = 0;
    document.querySelectorAll('.card').forEach(el => {
      const b = (parseFloat(el.style.top) || 0) + el.offsetHeight;
      if (b > maxBottom) maxBottom = b;
    });
    board.style.minHeight = (maxBottom + 100) + 'px';
  });
}

document.addEventListener('mousemove', e => {
  if (moving) {
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`);
    if (!el) return;
    const nx = moving.origX + e.clientX - moving.startX;
    const ny = moving.origY + e.clientY - moving.startY;
    el.style.left = nx + 'px';
    el.style.top = ny + 'px';
  }
  if (resizing) {
    const card = cards[resizing.idx];
    card.w = Math.max(100, resizing.startW + e.clientX - resizing.startX);
    const el = document.querySelector(`.card[data-idx="${resizing.idx}"]`);
    if (el) el.style.width = card.w + 'px';
  }
});

document.addEventListener('mouseup', e => {
  if (moving) {
    const card = cards[moving.idx];
    card.x = Math.max(0, moving.origX + e.clientX - moving.startX);
    card.y = Math.max(0, moving.origY + e.clientY - moving.startY);
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`);
    if (el) { el.classList.remove('moving'); }
    moving = null; saveBoard();
  }
  if (resizing) { resizing = null; saveBoard(); }
});

function addTextCard() {
  cards.push({ type: 'text', content: '', x: 50, y: window.scrollY + 100, w: 300 });
  renderCards();
  setTimeout(() => { const els = document.querySelectorAll('.card .text'); els[els.length - 1]?.focus(); }, 100);
}

function addImageCard() {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = 'image/*';
  input.onchange = e => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = () => { cards.push({ type: 'image', src: reader.result, x: 50, y: window.scrollY + 100, w: 240 }); renderCards(); saveBoard(); };
    reader.readAsDataURL(file);
  };
  input.click();
}

function resetLayout() {
  if (!confirm('자동 재배치합니다. 현재 위치가 변경됩니다.')) return;
  cards.forEach(c => { delete c.x; delete c.y; });
  renderCards(); autoLayout();
}

setInterval(saveBoard, 30000);
loadBoard();
</script>
</body>
</html>
