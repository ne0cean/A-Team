<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I am often asked by entrepreneurs what constitutes a really great startup pitch.  I’ve literally seen thousands of pitches and given a fair share of my own.  I’ve been convinced, amazed, bored to death and even moved to tears.  I’ve given more than a thou</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #1e1e1e;
  color: #e0e0e0;
  font-family: 'Segoe UI', -apple-system, sans-serif;
  font-size: 15px;
  line-height: 1.6;
  padding: 20px 30px 60px;
  overflow-x: hidden;
}
a { color: #6cb0f6; text-decoration: none; }
a:hover { text-decoration: underline; }
.title-bar {
  background: #3a3a5c;
  display: inline-block;
  padding: 6px 16px;
  font-size: 22px;
  font-weight: bold;
  color: #fff;
  margin-bottom: 4px;
}
.date { color: #999; font-size: 13px; margin-bottom: 20px; }
.board { position: relative; }
.card {
  background: #2a2a2a;
  border: 1px solid #3a3a3a;
  border-radius: 8px;
  padding: 12px;
  position: absolute;
  cursor: grab;
  transition: box-shadow 0.15s;
  overflow: hidden;
}
.card:hover { box-shadow: 0 0 0 1px #58a6ff; z-index: 10; }
.card.moving { opacity: 0.8; box-shadow: 0 4px 24px rgba(0,0,0,0.6); z-index: 100; cursor: grabbing; }
.card img { width: 100%; border-radius: 4px; display: block; }
.card .caption { font-size: 12px; color: #888; margin-top: 6px; }
.card .text { outline: none; min-height: 20px; white-space: pre-wrap; word-break: break-word; }
.card .text:focus { background: rgba(255,255,255,0.05); border-radius: 4px; padding: 4px; }
.card .text:empty::before { content: '텍스트 입력...'; color: #555; }
.card table { border-collapse: collapse; width: 100%; font-size: 13px; }
.card table td, .card table th { border: 1px solid #444; padding: 4px 8px; vertical-align: top; }
.card table th { background: #333; color: #ccc; }
.card-actions { position: absolute; top: 4px; right: 4px; display: none; gap: 4px; }
.card:hover .card-actions { display: flex; }
.card-btn { background: #333; border: 1px solid #555; color: #ccc; border-radius: 4px; padding: 2px 6px; font-size: 11px; cursor: pointer; }
.card-btn:hover { background: #444; color: #fff; }
.resize-handle { position: absolute; bottom: 0; right: 0; width: 16px; height: 16px; cursor: se-resize; opacity: 0; }
.card:hover .resize-handle { opacity: 0.6; }
.resize-handle::after { content: ''; position: absolute; bottom: 3px; right: 3px; width: 8px; height: 8px; border-right: 2px solid #666; border-bottom: 2px solid #666; }
.toolbar { position: fixed; bottom: 0; left: 0; right: 0; background: #161b22; border-top: 1px solid #30363d; padding: 8px 20px; display: flex; gap: 12px; align-items: center; z-index: 200; }
.toolbar button { background: #21262d; border: 1px solid #30363d; color: #e0e0e0; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; }
.toolbar button:hover { background: #30363d; }
.toolbar .status { color: #8b949e; font-size: 12px; margin-left: auto; }
.highlight-red { color: #ff6b6b; }
.highlight-blue { color: #6cb0f6; }
</style>
</head>
<body>
<div class="title-bar">I am often asked by entrepreneurs what constitutes a really great startup pitch.  I’ve literally seen thousands of pitches and given a fair share of my own.  I’ve been convinced, amazed, bored to death and even moved to tears.  I’ve given more than a thou</div>
<div class="date">Invalid Date</div>
<div class="board" id="board"></div>
<div class="toolbar">
  <button onclick="addTextCard()">+ 텍스트</button>
  <button onclick="addImageCard()">+ 이미지</button>
  <button onclick="saveBoard()">💾 저장</button>
  <button onclick="resetLayout()">↺ 재배치</button>
  <span class="status" id="status">Ready</span>
</div>
<script>
const SAVE_KEY = 'board-I-am-often-asked-by-entrepreneurs-what-c';
const IMG_BASE = '../../attachments/';
const DEFAULT_CARDS = [
  {
    "type": "text",
    "content": "<a href=\"https://substackcdn.com/image/fetch/f_auto,q_auto:good,fl_progressive:steep/https%3A%2F%2Fbucketeer-e05bbc84-baa3-437e-9518-adb32be77984.s3.amazonaws.com%2Fpublic%2Fimages%2F352e0b55-27ff-48b3-97ef-b667cfa6bcd8_1280x527.jpeg\" target=\"_blank\">\t\t\t\t\t\t\t</a>\t\t\t<br>I am often asked by entrepreneurs what constitutes a really great startup pitch. &#160;I’ve literally seen thousands of pitches and given a fair share of my own. &#160;I’ve been convinced, amazed, bored to death and even moved to tears. &#160;I’ve given more than a thousand myself – to receptions ranging from standing ovation to heads-on-table.<br>\t\t\t<br>\t\t\t\t<br>- VC로 일하면서, 굉장히 많은 창업가들의 Pitch를 볼 기회가 있었습니다. 물론 좋은 Pitch도 있었고, 그렇지 않은 Pitch도 있었는데요.<br>\t\t\t\t<br>- 그런 경험을 바탕으로 'Great Startup Pitch'가 무엇인지에 대해서 많이들 물어보셔서, 이에 대한 생각을 얘기해볼까 합니다.<br>\t\t\t<br>\t\t\t<br>Fundamentally, a good pitch is a good story. &#160;It’s not just facts and figures and analysis. &#160;In addition to understanding a business opportunity logically, investors need to feel a business opportunity emotionally. &#160;A good story (told by a compelling storyteller) does just that. It activates our gut and makes us viscerally excited by the business proposition. &#160;In discussing this post, my entrepreneur friend&#160;<a href=\"https://twitter.com/danmartell\" target=\"_blank\">@danmartell</a>&#160;reminded me of the venerable sales proverb:&#160;“people buy on emotion and justify with logic.”<br>\t\t\t<br>\t\t\t\t<br>- 좋은 Pitch는 '스토리'를 가져서 사람을 '설득'시킬 수 있는 Pitch라고 이야기 할 수 있을 것 같습니다.<br>\t\t\t\t<br>- 제 친구중 한 명은 &#160;“people buy on emotion and justify with logic.” 라는 이야기를 해주었는데요. 맘에 드는 사람이 있으면, 이 사람이 왜 맘에 드는지 이유를 찾는다는 의미고. 스타트업 Pitch도 비슷한 것 같습니다. 숫자와 로직도 물론 중요하지만, '왜' 이 회사가 'emotionally' 좋은지 appealing 될 수 있어야 하는 것 같습니다. 좋은 스토리, 좋은 이야기가 함께, 그리고 숫자와 함께라면 그보다 더 좋은 Pitch는 없는 것 같네요.<br>\t\t\t<br>\t\t\t<br>Many entrepreneurs in our business have technical or analytical backgrounds and love to expound on the “what” and “how” of their technology solutions. &#160;That is all fine, but often what I really care about – and what I have come to see as a common thread in the best presentations – is “why”. Specifically, there are “3 Whys” that I want to see in every pitch:<br>\t\t\t<br>\t\t\t\t<br>- 대부분 창업가들은 굉장히 분석적인 분들입니다. '무엇'을 '어떻게' 할지에 대해서 많이들 얘기하시는데요. (이것도 당연히 필요합니다.)<br>\t\t\t\t<br>- 하지만, 더 중요한건 'WHY'이고, 저는 특히 좋은 이야기에는 3가지 'WHY'가 들어갔으면 한다고 생각합니다. (아래에 있는 3WHY - BIG, NOW, YOU)<br>\t\t\t<br>\t\t\t<br>1. WHY BIG?Most entrepreneurs answer this question by simply including a market size chart in their presentation. Whether calculated through bottoms-up analysis (often bogus) or citing a market research firm (<a href=\"http://www.savethepostoffice.com/sites/default/files/resize/wishful%20thinking%20cartoon-350x366.jpg\" target=\"_blank\">always bogus</a>), this is a basic and necessary exercise. &#160;But what makes a good pitch into a great pitch is when entrepreneurs can articulate the scale of the opportunity in a way that I can feel in my gut and not just get in my head.<br>\t\t\t<br>\t\t\t\t<br>- 많은 창업가들이 통계청에서 가져온 자료들을 바탕으로 '시장이 큼'이라고 이야기 하시는데요. 물론 필요하고, 아주 기본적인 작업이라고 생각합니다.<br>\t\t\t\t<br>- 하지만, 더 중요한 사실은 단순히 '통계'가 말해준다는 사실이 아니라, 이 시장이 성장한다 (혹은 크다)라는 사실이 무엇을 의미하는지, 그리고 그 성장하는 시장 속에서 창업가가 어떤 기회를 바라보고 있고, 이 성장하는 트렌드를 어떻게 잡을 수 있을지를 어필해주는 게 중요하다고 생각합니다.<br>\t\t\t<br>\t\t\t<br>Social science has shown that people are far more moved by stories told in terms of actual individuals rather than in aggregate figures that can be too much for our simple brains to grasp. In the same way, the most effective entrepreneurs describe the problem they are solving in very personal terms. They talk about a specific customer or about their own experience with the pain they are trying to solve.<br>\t\t\t<br>\t\t\t\t<br>- 단순히 숫자를 던지고 '시장 크죠?'정도의 접근이 아니라, 시장이 큰다는 의미는 왜 인지, 그리고 시장이 성장한다면(크다면) 왜 사람들은 그 시장 성장에 기여하고 있는지, 거기서 본인은 어떤 pain을 느꼈고, 어떤 인사이트가 있는지를 설명해주는 것이 필요하지 않을까 싶네요.<br>\t\t\t<br>\t\t\t<br>2. WHY NOW&#160;This next point is one that entrepreneurs almost always miss and so it is one that I have come to feel is the most critical. So much of startup success is dictated by good timing. &#160;I launched a social bookmarking startup in 2000 with a terrific technical team and top-tier venture investors; but we were simply too early – nine years earlier than&#160;<a href=\"https://delicious.com/\" target=\"_blank\">Delicious</a>&#160;and&#160;<a href=\"http://www.stumbleupon.com/\" target=\"_blank\">StumbleUpon</a>, companies that succeeded with almost identical services at a different time.<br>\t\t\t<br>\t\t\t\t<br>- 그 다음은 WHY NOW입니다. 당연히 이 질문은 중요합니다. 왜냐면, 대부분 스타트업들의 성공은 '타이밍'이 중요한 변수이기 때문이죠. 저는 예전에 한 스타트업을 창업한 적이 있는데, 엄청난 개발자들 벤처투자자들의 지원을 받아 시작했습니다. (하지만 잘 안됐죠) 그리고, 그 뒤에 조금 늦은 타이밍에 큰 회사들이 등장했습니다. (거의 비슷한 서비스로) 그래서, 타이밍은 굉장히 중요합니다.<br>\t\t\t<br>\t\t\t<br>A great startup pitch MUST answer the question “why now” – why market conditions, user behaviours, technology trends or other macro forces are combining in just the right way to smooth your path to success.<br>\t\t\t<br>\t\t\t\t<br>- 좋은 스타트업 Pitch에서는 왜 이 서비스가 '마켓이 성장하는, 큰 시장에서' 굳이 '지금' 이뤄져야 하는지를 잘 설명해야 합니다. 마켓의 컨디션이 어떻게 변화하고 있고, 소비자들은, 기술은, 그리고 거시적인 요소들은 어떻게 바뀌어서 지금이 '적시'인지를 설득할 수 있어야 하죠.<br>\t\t\t<br>\t\t\t<br>3. WHY YOU&#160;Finally, if the market is big and happening now, investors need to understand why YOU and your product are the right ones to bet on. &#160;This is the jockey part of the famous&#160;<a href=\"http://www.edegan.com/pdfs/Kaplan%20Sensoy%20Stromberg%20%282009%29%20-%20What%20Are%20Firms%20Evolution%20From%20Birth%20To%20Public%20Companies.pdf\" target=\"_blank\">horse vs. jockey debate</a>&#160;in venture investing. For every great market opportunity, we assume there are dozens of smart and potentially well-financed teams around the world going after it. &#160;What about your expertise and team give you a clear advantage – your domain experience, your tenacity, your coding skills? &#160;What about your product makes it clearly superior to others in technical approach or customer perception? &#160;Why will you have the “last mover advantage” and dominate the category in the long-run?<br>\t\t\t<br>\t\t\t\t<br>- 마지막으로, 제일 중요한 질문입니다. '왜 우리여야만 하는가' 이죠. 성장하는 시장, 유망한 시장이라면 비슷한 비즈니스를 하는 엄청 많은 스마트가이들이 있을 겁니다. (후보군들이 많다는 의미죠) 당신의 전문성은, 당신의 팀은 그들에 비해서 어떤 장점을 가졌는지, 당신이 만든 제품이 왜 다른 '유사한' 제품들보다 더 쟁력있는지, 왜 하필이면 이미 선도주자가 있음에도 불구하고, 더 잘할 수 있는지 설명해야 합니다.<br>\t\t\t<br>\t\t\t<br>These three simple questions – why big, why now, why you – are at the heart of what distinguishes a great story from a merely good one. &#160;If you want your startup pitch to stand out, make sure you’ve nailed the answers.<br>\t\t\t<br>\t\t\t\t<br>- 결국은 스토리고, 스토리 내에 왜 이 시장이 중요하고, 지금이고, 당신이어야만 하는지를 설명하는 과정에서 당신의 팀의 개성이 드러날 것이라 믿습니다. 이 질문들에 대해서 잘 고민해보고 솔직한 답을 해주신다면, 멋진 Pitch가 나올것이라 믿습니다.<br>\t\t\t<br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t출처: <<a href=\"https://bzcf.substack.com/p/7-why-big-why-now-why-you-altos-ventures\" target=\"_blank\">https://bzcf.substack.com/p/7-why-big-why-now-why-you-altos-ventures</a>>",
    "w": 400
  }
];

let cards = [];
let moving = null, resizing = null;

function loadBoard() {
  const saved = localStorage.getItem(SAVE_KEY);
  cards = saved ? JSON.parse(saved) : DEFAULT_CARDS.map(c => ({...c}));
  renderCards();
  if (!saved) autoLayout();
}

function autoLayout() {
  const GAP = 14;
  const boardW = document.getElementById('board').offsetWidth;
  const cols = Math.max(1, Math.floor(boardW / 280));
  const colW = (boardW - GAP * (cols - 1)) / cols;
  const colHeights = new Array(cols).fill(0);
  const allCards = document.querySelectorAll('.card');
  const images = document.querySelectorAll('.card img');
  let loaded = 0;
  const total = images.length;

  function place() {
    allCards.forEach((el, i) => {
      const card = cards[i];
      const w = Math.min(card.w || colW, colW);
      let minCol = 0;
      for (let c = 1; c < cols; c++) if (colHeights[c] < colHeights[minCol]) minCol = c;
      card.x = minCol * (colW + GAP);
      card.y = colHeights[minCol];
      card.w = w;
      el.style.left = card.x + 'px';
      el.style.top = card.y + 'px';
      el.style.width = w + 'px';
      colHeights[minCol] = card.y + el.offsetHeight + GAP;
    });
    document.getElementById('board').style.minHeight = Math.max(...colHeights) + 100 + 'px';
    saveBoard();
  }

  if (total === 0) requestAnimationFrame(place);
  else images.forEach(img => {
    if (img.complete) { loaded++; if (loaded >= total) requestAnimationFrame(place); }
    else img.onload = img.onerror = () => { loaded++; if (loaded >= total) requestAnimationFrame(place); };
  });
}

function syncText() {
  document.querySelectorAll('.card').forEach(el => {
    const idx = +el.dataset.idx;
    if (cards[idx]?.type === 'text') {
      const t = el.querySelector('.text');
      if (t) cards[idx].content = t.innerHTML;
    }
  });
}

function saveBoard() {
  syncText();
  localStorage.setItem(SAVE_KEY, JSON.stringify(cards));
  document.getElementById('status').textContent = '저장됨 ' + new Date().toLocaleTimeString();
}

function renderCards() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  cards.forEach((card, i) => {
    const el = document.createElement('div');
    el.className = 'card';
    el.dataset.idx = i;
    if (card.x !== undefined) el.style.left = card.x + 'px';
    if (card.y !== undefined) el.style.top = card.y + 'px';
    if (card.w) el.style.width = card.w + 'px';

    el.addEventListener('mousedown', e => {
      if (e.target.closest('.text, a, .card-btn, .resize-handle, table')) return;
      e.preventDefault();
      moving = { idx: i, startX: e.clientX, startY: e.clientY, origX: card.x || 0, origY: card.y || 0 };
      el.classList.add('moving');
    });

    const actions = document.createElement('div');
    actions.className = 'card-actions';
    const delBtn = document.createElement('button');
    delBtn.className = 'card-btn'; delBtn.textContent = '×';
    delBtn.onclick = e => { e.stopPropagation(); if (confirm('삭제?')) { cards.splice(i, 1); renderCards(); saveBoard(); } };
    actions.appendChild(delBtn);
    el.appendChild(actions);

    if (card.type === 'text') {
      const text = document.createElement('div');
      text.className = 'text';
      text.contentEditable = true;
      text.innerHTML = card.content || '';
      text.addEventListener('blur', () => { card.content = text.innerHTML; saveBoard(); });
      el.appendChild(text);
    } else if (card.type === 'image') {
      const src = card.src.startsWith('http') || card.src.startsWith('data:') ? card.src : IMG_BASE + card.src;
      const img = document.createElement('img');
      img.src = src;
      img.alt = card.alt || '';
      img.loading = 'lazy';
      img.onerror = () => img.style.display = 'none';
      if (card.link) {
        const a = document.createElement('a'); a.href = card.link; a.target = '_blank';
        a.appendChild(img); el.appendChild(a);
      } else { el.appendChild(img); }
      if (card.caption) {
        const cap = document.createElement('div');
        cap.className = 'caption';
        cap.textContent = card.caption;
        el.appendChild(cap);
      }
    } else if (card.type === 'table') {
      const wrapper = document.createElement('div');
      wrapper.style.overflowX = 'auto';
      wrapper.innerHTML = card.html || '';
      el.appendChild(wrapper);
    }

    const rh = document.createElement('div');
    rh.className = 'resize-handle';
    rh.addEventListener('mousedown', e => {
      e.preventDefault(); e.stopPropagation();
      resizing = { idx: i, startX: e.clientX, startW: card.w || el.offsetWidth };
    });
    el.appendChild(rh);
    board.appendChild(el);
  });

  requestAnimationFrame(() => {
    let maxBottom = 0;
    document.querySelectorAll('.card').forEach(el => {
      const b = (parseFloat(el.style.top) || 0) + el.offsetHeight;
      if (b > maxBottom) maxBottom = b;
    });
    board.style.minHeight = (maxBottom + 100) + 'px';
  });
}

document.addEventListener('mousemove', e => {
  if (moving) {
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`);
    if (!el) return;
    const nx = moving.origX + e.clientX - moving.startX;
    const ny = moving.origY + e.clientY - moving.startY;
    el.style.left = nx + 'px';
    el.style.top = ny + 'px';
  }
  if (resizing) {
    const card = cards[resizing.idx];
    card.w = Math.max(100, resizing.startW + e.clientX - resizing.startX);
    const el = document.querySelector(`.card[data-idx="${resizing.idx}"]`);
    if (el) el.style.width = card.w + 'px';
  }
});

document.addEventListener('mouseup', e => {
  if (moving) {
    const card = cards[moving.idx];
    card.x = Math.max(0, moving.origX + e.clientX - moving.startX);
    card.y = Math.max(0, moving.origY + e.clientY - moving.startY);
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`);
    if (el) { el.classList.remove('moving'); }
    moving = null; saveBoard();
  }
  if (resizing) { resizing = null; saveBoard(); }
});

function addTextCard() {
  cards.push({ type: 'text', content: '', x: 50, y: window.scrollY + 100, w: 300 });
  renderCards();
  setTimeout(() => { const els = document.querySelectorAll('.card .text'); els[els.length - 1]?.focus(); }, 100);
}

function addImageCard() {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = 'image/*';
  input.onchange = e => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = () => { cards.push({ type: 'image', src: reader.result, x: 50, y: window.scrollY + 100, w: 240 }); renderCards(); saveBoard(); };
    reader.readAsDataURL(file);
  };
  input.click();
}

function resetLayout() {
  if (!confirm('자동 재배치합니다. 현재 위치가 변경됩니다.')) return;
  cards.forEach(c => { delete c.x; delete c.y; });
  renderCards(); autoLayout();
}

setInterval(saveBoard, 30000);
loadBoard();
</script>
</body>
</html>
