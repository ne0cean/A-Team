const DEFAULT_CARDS = [
  {
    "type": "text",
    "content": "글감<br>\t\t<br>\t\t<br>\t<br>\t<br>\t\t<br>\t\t\t<br>\t\t\t\t<br>aiCarousels<br>\t\t\t\t<br><br>\t\t\t\t출처: <<a href=\"https://eopla.net/magazines/21640\" target=\"_blank\">https://eopla.net/magazines/21640</a>> <br>\t\t\t\t<br><br>\t\t\t\t<br>호랑굴이요? 그게 왜 무서워요.<br>\t\t\t\t<br>내가 호랑인데.<br>\t\t\t\t<br><br>\t\t\t\t<br>[Project Apple pie](onenote:..\\3_Archive\\Work.one#Project%20Apple%20pie&section-id={8858BBE1-DEF9-4A9D-827F-2ADF5144629E}&page-id={AF337C80-161B-4F23-AB0C-4F43DBCE6406}&end&base-path=<a href=\"https://d.docs.live.net/733661839cc53ba5/문서/Inter_source/InterStellar)\" target=\"_blank\">https://d.docs.live.net/733661839cc53ba5/문서/Inter_source/InterStellar)</a><br>\t\t\t\t<br>삼성의 3가지 UX/UI 혁신 MTS 기반의 삼성페이, 갤럭시워치의 다이얼, 스타일러스 펜<br>\t\t\t\t<br>3가지의 공통점은, 익숙한 것을 새로운 방식으로 제공.<br>\t\t\t\t<br>혹은 새로운 것을 익숙한 방식으로 제공 했다는 것.<br>\t\t\t\t<br><br>\t\t\t\t<br>마케팅이 뭔가요?<br>\t\t\t\t<br>Q를 견인하는 모든 활동입니다. 즉, Q로 환원되지 않는 활동들은 브랜딩에 도움이 된다 한들, 제대로 수행된 캠페인은 아니라고 생각합니다.<br>\t\t\t\t<br><br>\t\t\t\t<br>브랜딩이 뭔가요?<br>\t\t\t\t<br>P를 납득 시키는 모든 활동입니다.<br>\t\t\t\t<br>고객의 인지적 레벨에서 특정 위상정보를 구축하는 일입니다. 이를 흐히 포지셔닝이라고 하고, 포지셔닝도 감가가 되기 때문에, 지속적으로 유지/보수/재구축을 요합니다.<br>\t\t\t\t<br>3초 운동 - 3초 운동 책/콘텐츠, HIIT 기획, <br>\t\t\t\t<br><br>\t\t\t\t<br>호명사회<br>\t\t\t\t<br>호출되지 않은 0과<br>\t\t\t\t<br>출력 된 1들의 각자도생.<br>\t\t\t\t<br><br>\t\t\t\t<br>그저 한장한장 읽어 넘기기엔 무겁고 아픈 기계앞의 자화상.<br>\t\t\t\t<br>트렌드라기엔 깊이 패인 시대의 주름.<br>\t\t\t\t<br><br>\t\t\t\t<br>조응하지 못하는 타자와 조우하는 우리. <br>\t\t\t\t<br>한 사람 몫 이상을 한다 자부했던 우리는 이제, 아직 기계 옆에서 안녕한가.<br>\t\t\t\t<br><br>\t\t\t\t<br><a href=\"https://www.youtube.com/shorts/UBfqbj_ltUQ\" target=\"_blank\">사회 초석이 되는 직업</a><br>\t\t\t\t<br><br>\t\t\t\t<br><br>\t\t\t\t<br>생각보다, 사람들이 상수라고 여기는 것의 많은 것이 실은 변수다. <br>\t\t\t\t<br>나는 1원칙 사고를 그렇게 이해한다. 휴리스틱에서 벗어나는 것.<br>\t\t\t\t<br><br>\t\t\t\t<br>실행을 할 땐 판단을 하지마. 주저하게 되니까.<br>\t\t\t\t<br>판단 할 때는 실행에 대해 생각하지마, 대담한 계획을 세울 수 없으니까.<br>\t\t\t\t<br><br>\t\t\t\t<br>다른 산에 오르려면,<br>\t\t\t\t<br>여튼 지금 이 산에서 내려가야 하니까.<br>\t\t\t\t<br><br>\t\t\t\t<br>늘 그린라이트를 기다렸다.<br>\t\t\t\t<br>하지만 노란불에 출발해야해.<br>\t\t\t\t<br>모든 준비가 되었다고 느꼈을 때엔,<br>\t\t\t\t<br>누군가가 남겨둔 기회의 조각들 뿐이었다.<br>\t\t\t\t<br><br>\t\t\t\t<br>중요한 건 신호가 아니다. 속도도 그리 중요하지 않지.<br>\t\t\t\t<br>중요한 경로, 고속도로를 탈 건지, 국도를 탈 건지.<br>\t\t\t\t<br>가는 길에 누구를 태울 것인지, 그에 대한 서사.<br>\t\t\t\t<br><br>\t\t\t\t<br>소비로 취향을 표현하는 99와, 생산으로 취향을 표현하는 1이 있는거지.<br>\t\t\t\t<br><br>\t\t\t\t<br>지금 나의 컨디션/폼은 <br>\t\t\t\t<br>최상이다.<br>\t\t\t\t<br><br>\t\t\t\t<br>하여 지금 하는 일들 중에 실수가 있다면,<br>\t\t\t\t<br>그건 실력이다.<br>\t\t\t\t<br><br>\t\t\t\t<br>신중해. 하지만 심각하진 않을 거고.<br>\t\t\t\t<br>….<br>\t\t\t\t<br><br>\t\t\t\t<br>절주의 기준: 집에 돌아왔을 때 한잔 더 하고 싶다면 취한 것.<br>\t\t\t\t<br>내가 지쳤다는 것: 판단의 속도와 버든. 태스크가 쌓여갈 때. 결정을 미룰 때.<br>\t\t\t\t<br><br>\t\t\t\t<br>스스로 건강하다고 느끼는 점은,<br>\t\t\t\t<br>저는 지금 이 사간들이 되게 소중하고 행복한데,<br>\t\t\t\t<br>행복한만큼 두려움도 있었습니다.<br>\t\t\t\t<br>그런데, 지금은 두렵지가 않고요.<br>\t\t\t\t<br>늘 그 시간들을 스스로에게 앗아갔던 게<br>\t\t\t\t<br>실은 저 자신이었다는 것.<br>\t\t\t\t<br>그리고 지금은 그 어느 때보다 나를 신뢰해줄 수 있다는 것.<br>\t\t\t\t<br>그래서 지금 제가 그 어느 때보다 건강하다고 느껴요.<br>\t\t\t\t<br><br>\t\t\t\t<br><br>\t\t\t\t<br>그런게 좋아요.<br>\t\t\t\t<br>심플해서 압도적이고, 압도적이어서 심플해도 되는.<br>\t\t\t\t<br><br>\t\t\t\t<br>그리고,<br>\t\t\t\t<br>그 중에서도<br>\t\t\t\t<br>귀여운게 최강이죠.<br>\t\t\t\t<br><br>\t\t\t\t<br>\"결혼을 한다고 인간이 가진 본질직인 외로움이 해소 되진 않아요.\"<br>\t\t\t\t<br><br>\t\t\t\t<br>네, 이제 제가 기다리는 것은 구원이 아니고.<br>\t\t\t\t<br><br>\t\t\t\t<br>이 쓸쓸함의 공역, 저편에서 온, <br>\t\t\t\t<br>그럼에도 나와 닮은 누군가의 손을 맞잡아 살아 나가는 것.<br>\t\t\t\t<br><br>\t\t\t\t<br>이 봄은,<br>\t\t\t\t<br>어떻게든 쓰여질 것.<br>\t\t\t\t<br><br>\t\t\t\t<br>kemdric lama luther<br>\t\t\t\t<br><br>\t\t\t\t<br><br>\t\t\t\t<br>봄<br>\t\t\t\t<br><br>\t\t\t\t<br>작은 숨을 머금고<br>\t\t\t\t<br>입술 안 소리를 가두어<br>\t\t\t\t<br>짐짓 단호하게<br>\t\t\t\t<br>이 달콤한 계절을 선언한다.<br>\t\t\t\t<br><br>\t\t\t\t<br>벌써라는 주문을 세 번만 외우면 스쳐갈<br>\t\t\t\t<br>다디단, 이 단음절의 계절을<br>\t\t\t\t<br><br>\t\t\t\t<br>달력 어느 한 칸에<br>\t\t\t\t<br>붙잡아 적어 둔다면,<br>\t\t\t\t<br>오늘, 오늘이 좋겠다.<br>\t\t\t\t<br><br>\t\t\t\t<br><a href=\"https://m.kin.naver.com/qna/dirs/1116/docs/479009856?qb=UFA6T1hGT1JEIFVOSVZFUlNJVFk=&enc=utf8#\" target=\"_blank\">https://m.kin.naver.com/qna/dirs/1116/docs/479009856?qb=UFA6T1hGT1JEIFVOSVZFUlNJVFk=&enc=utf8#</a><br>\t\t\t\t<br><br>\t\t\t\t<br>취향은 편향이고,<br>\t\t\t\t<br><br>\t\t\t\t<br>그 취향을 소비로 표현하는 대다수가 있고, 생산으로 풀어내는 극소수가 있다.<br>\t\t\t\t<br><br>\t\t\t\t<br>걸친 것, 가진 것, <br>\t\t\t\t<br>할 수 있는 것, 만드는 것, 짓는 것.<br>\t\t\t\t<br>그게 내 정체성이길 바란다.<br>\t\t\t\t<br><br>\t\t\t\t<br>내가 하는 일을 소개 할때<br>\t\t\t\t<br>'비문학을 읽고, 문학을 쓰는 일'을 한다고 말하곤 한다.<br>\t\t\t\t<br><br>\t\t\t\t<br>자신의 일을 사랑하고 자긍심을 가지는 것은 좋은 일이다.<br>\t\t\t\t<br>내가 자긍심을 가지는 것은 내게 주어진 일. 직책, R&R, 명함이 아니다.<br>\t\t\t\t<br>그게 아무리 짜치는 일이라도 내가 하면 다를 것이고, 다르다는 자부심이다.<br>\t\t\t\t<br>Mayday. 아주 촉박한 일, 전혀 다른 접근이 필요한 일. 두 가지에 특화되어 있다.<br>\t\t\t\t<br><br>\t\t\t\t<br>하잘것 없는,  짜치는 일<br>\t\t\t\t<br>평범한 일들을 비범하게 해내는 것. 그것만이 내 자긍.<br>\t\t\t\t<br><br>\t\t\t\t<br>주어진 일, 직책, 역할 이런 건 그냥 주어지는 것. 내가 만드는 것이 아니다.<br>\t\t\t\t<br><br>\t\t\t\t<br>내가 어제까지의 나를 부정하고 바꿔나가지 않으면,<br>\t\t\t\t<br>남이 나를 부정하고, 이윽고 대체의 대상이 되는거지.<br>\t\t\t\t<br><br>\t\t\t\t<br>철학과 메시지를 유지하되, 스타일과 문체는 계속 바뀌어야해.<br>\t\t\t\t<br>익숙한 것을 새롭게, 새로운 것이라면 익숙한 방식으로.<br>\t\t\t\t<br>내가 나를 진부화 시켜야 한다.<br>\t\t\t\t<br><br>\t\t\t\t<br><br>\t\t\t\t<br>내게는 섹시함에 대한 가설이 있다.<br>\t\t\t\t<br><br>\t\t\t\t<br>매일 일정량 이상의 텍스트를 읽고, 매일 운동하는 사람.<br>\t\t\t\t<br><br>\t\t\t\t<br>그럼에도 불충분한, 불완전한 무언가가 있었다.<br>\t\t\t\t<br><br>\t\t\t\t<br>마지막 한가지는 결국 친절함. 자신감과 그 확장적 태도에서 나오는 친밀함. 강함보다 더 강한 것.<br>\t\t\t\t<br><br>\t\t\t\t<br>호의를 반복해서 둘리가 되자.<br>\t\t\t\t<br>친절만큼 보편적이면서도 절대적이고, ￼또한 즉각적인 효과를 보이는 마법은 없다.<br>\t\t\t\t<br><br>\t\t\t\t<br>\t\t\t\t<br><br>\t\t\t\t<br>\t\t\t\t<br><br>\t\t\t\t<br>필생의 업을 찾을 것.<br>\t\t\t\t<br>필생의 사랑을 찾을 것.<br>\t\t\t\t<br><br>\t\t\t\t<br>나는 건강해, 그 어느 때보다.<br>\t\t\t\t<br>그러니까 지금부터 일어나는 모든 일은<br>\t\t\t\t<br>실수라고 할 수 없어. 다 내 실력이야.<br>\t\t\t\t<br>그러니 감내 해야 하고, 감내 해야해.<br>\t\t\t\t<br><br>\t\t\t\t<br>누가 행복, 여흥, 그러니 4월아<br>\t\t\t\t<br>불혹, 그보다 미혹되는 것은 없었다.<br>\t\t\t\t<br>아쉬울 것 없는 사람. <br>\t\t\t\t<br>엄마가 난 <br>\t\t\t\t<br>남은 생은 여생. 여흥일 뿐.<br>\t\t\t\t<br><br>\t\t\t\t<br>안녕할것, 가슴에 산탄을 맞아도. 안녕할 것.<br>\t\t\t\t<br><br>\t\t\t\t<br>지치지 말 것.<br>\t\t\t\t<br>쉬되, 멈추지 말 것.<br>\t\t\t\t<br><br>\t\t\t\t<br>1-4년차: 알아야 한다, 달라야 한다, 빨라야 한다.<br>\t\t\t\t<br>5-7년차: Done is better than perpect<br>\t\t\t\t<br>8-13년차: 최선을 희망하되, 최악을 상정하라. Hope the best, plan for the worst.<br>\t\t\t\t<br>14년차: Fail fast and fail cheap. No risk, No story<br>\t\t\t\t<br><br>\t\t\t\t<br>내가 나를 믿어주지 않으면, 자꾸 남의 평가나 인정에 의존하게되고<br>\t\t\t\t<br>내가 하고샆은걸 못해<br>\t\t\t\t<br>순환참조<br>\t\t\t\t<br><br>\t\t\t\t<br><br>\t\t\t\t<br><br>\t\t\t\t<br>사월에게, 사월의 나에게____________<br>\t\t\t\t<br><br>\t\t\t\t<br>정호승 봄눈<br>\t\t\t\t<br><br>\t\t\t\t<br><br>\t\t\t\t<br>심장이 딱딱해졌으면 좋겠다.던 삼순이는 고작 서른이기라도 했다.<br>\t\t\t\t<br><br>\t\t\t\t<br>불혹의 나는 지난 2주간,<br>\t\t\t\t<br>심장/마음에 콘크리트 부었다.<br>\t\t\t\t<br><br>\t\t\t\t<br>방비하고 대비했다.<br>\t\t\t\t<br><br>\t\t\t\t<br><br>\t\t\t\t<br>2주간 마음에 콘크리트를 부으며 지냈다.<br>\t\t\t\t<br>대비하고 방비하고, 플랜B, 컨틴전시 <br>\t\t\t\t<br>그런데 그런게 있을리 없는 것이 있지.<br>\t\t\t\t<br><br>\t\t\t\t<br>실수를 거듭해.<br>\t\t\t\t<br>하지만 그게 같은 실수가 아니길 바랄 뿐이야.<br>\t\t\t\t<br><br>\t\t\t\t<br>지금의 나는 나로써는 최선이야.<br>\t\t\t\t<br>그렇기에 이건 아프게도, 실수들이 아니야.<br>\t\t\t\t<br>실력이지.<br>\t\t\t\t<br><br>\t\t\t\t<br>지치지마, 쉬어도 되지만 멈추지마<br>\t\t\t\t<br>다음 실수를 해야지.<br>\t\t\t\t<br><br>\t\t\t\t<br><br>\t\t\t\t<br><br>\t\t\t\t<br>걷다 보면 가끔 그런 생각이 들어요,<br>\t\t\t\t<br><br>\t\t\t\t<br>20대에는 사는게 뭐 그렇게까지 어렵지는 않네라는<br>\t\t\t\t<br>약간의 교만섞인 만족감.<br>\t\t\t\t<br><br>\t\t\t\t<br>30대에는 그래, 나 같은 놈이 행복하지 않으면<br>\t\t\t\t<br>대체 누가, 얼마나 행복 할 수 있을까.라는 생각<br>\t\t\t\t<br><br>\t\t\t\t<br>그러나 분명한 감사하는 일.<br>\t\t\t\t<br><br>\t\t\t\t<br><br>\t\t\t\t<br>그쵸,<br>\t\t\t\t<br>저 같은 놈이 행복하지 않으면<br>\t\t\t\t<br>대체 누가, 얼마나 행복 할 수 있을까요.<br>\t\t\t\t<br><br>\t\t\t\t<br>지금의 저는 최상의 컨디션,<br>\t\t\t\t<br>그러니까. 지금의 내가 저지르는 모든 건,<br>\t\t\t\t<br>실수가 아니라 실력이죠. 여실히.<br>\t\t\t\t<br><br>\t\t\t\t<br>-<br>\t\t\t\t<br><br>\t\t\t\t<br>\t\t\t\t<br><br>\t\t\t\t<br>\"나는 그저&#160;매일을 똑같이 살아가면서 연습처럼 경기하고 연습처럼 경기를 끝낸다.&#160;나는 과거의 명예 때문이 아니라 미래에 내가 달성할 것들 때문에 나 자신이 자랑스럽다.” - 이치로 -&#160;<br>\t\t\t\t<br><br>\t\t\t\t<br>“나는 성공이라는 말을 좋아하지 않는다. 너무 임의적이고 상대적인 말이기 때문이다. 내가 아닌 누군가가 정하는 것 아닌가. 자기 자신에게 인정받기 위해 싸워야만 한다. 아무리 훌륭한 타자여도 타석에서 10번 중 7번은 실패한다. 나는 부상을 당하지 않아 계속 경기에 출전해 왔고 늘 한 베이스 더 가는 것을 갈구하면서 야구를 해왔을 뿐이다.<br>\t\t\t\t<br><br>\t\t\t\t<br>나는 그저 특별한 하루 없이 매일을 똑같이 살아가면서 연습처럼 경기하고 연습처럼 경기를 끝낸다. 그렇게 하기 위해 피나는 훈련을 하고 준비를 한다. <br>\t\t\t\t<br>나는 과거의 업적 때문이 아니라 미래에 내가 달성할 것들 때문에 나 자신이 자랑스럽다.”_이치로<br>\t\t\t\t<br><br>\t\t\t\t<br><br>\t\t\t\t<br>“나는 성공이라는 말을 좋아하지 않는다. 너무 임의적이고 상대적인 말이기 때문이다. (성공이라는 것은) 내가 아닌 누군가가 정하는 것 아니냐. 누군가의 인정을 받기 위해 분투하는 것은 겉치레일 뿐이다. 자기 자신에게 인정받기 위해 싸워야만 한다. 아무리 훌륭한 타자여도 타석에서 10번 중 7번은 실패한다. 나는 여러 차례의 실패를 거치면서 좀 더 나은 타자가 되기를 원해왔다. 어떤 사람들은 나를 타격 천재라고 부르지만 나는 천재가 아니다. 부상을 당하지 않아 계속 경기에 출전해 왔고 늘 한 베이스 더 가는 것을 갈구하면서 야구를 해왔을 뿐이다. 나는 그저 특별한 하루 없이 매일을 똑같이 살아가면서 연습처럼 경기하고 연습처럼 경기를 끝낸다. 그렇게 하기 위해 피나는 훈련을 하고 준비를 한다. 나는 과거의 업적 때문이 아니라 미래에 내가 달성할 것들 때문에 나 자신이 자랑스럽다. 그게 나의 삶의 모토다.”(이치로)<br>\t\t\t\t<br><br>\t\t\t\t<br><a href=\"https://www.hani.co.kr/arti/sports/baseball/750598.html\" target=\"_blank\">https://www.hani.co.kr/arti/sports/baseball/750598.html</a><br>\t\t\t\t<br><br>\t\t\t\t<br>2016년 8월 이치로 선수가 미국 메이저리그에서 통산 3000안타를 달성한 직후에 나온 그의 철학적인 코멘트들을 모은 것입니다. 한국 한겨레 기사에 번역되어 인용된 이 발언들은, 원래 이치로가 일본 언론과의 인터뷰나 기자회견에서 일본어로 밝힌 생각들로 알려져 있습니다. 실제로 이치로는 당시 인터뷰에서 “개인적으로 <b>‘성공’(成功)</b>이라는 단어를 좋아하지 않는다. 그것은 너무 임의적이고(감각적) 상대적인 말이고, 대개 남이 정의한 것일 뿐이다”라고 말하며 성공을 타인의 기준으로 판단하는 것을 경계했습니다​<br>\t\t\t\t<br><a href=\"https://zama-e.zama.school/blogs/blog_entries/view/8/87c654623e32e8d2ee28e9a07a802da0?frame_id=14#:~:text=%E2%97%8E%E5%80%8B%E4%BA%BA%E7%9A%84%E3%81%AB%E3%80%8C%E6%88%90%E5%8A%9F%E3%80%8D%E3%81%A8%E3%81%84%E3%81%86%E8%A8%80%E8%91%89%E3%81%8C%E5%A5%BD%E3%81%8D%E3%81%A7%E3%81%AF%E3%81%82%E3%82%8A%E3%81%BE%E3%81%9B%E3%82%93%E3%80%82\" target=\"_blank\">zama-e.zama.school</a><br>\t\t\t\t<br>. 그는 “남의 인정을 받기 위해 노력하는 것은 의미가 없으며, 자기 자신에게 인정받는 것이 중요하다”는 취지로 이야기했고, 아무리 뛰어난 타자라도 10번 중 7번은 실패하기 때문에 실패를 거듭하면서 더 나은 타자가 되고자 해왔다고 강조했습니다​<br>\t\t\t\t<br><a href=\"https://have-dream.sakura.ne.jp/word/2021/08/09/%E3%80%90top100%E3%80%91%E3%82%A4%E3%83%81%E3%83%AD%E3%83%BC%E3%81%AE%E5%90%8D%E8%A8%80%E3%80%90%E5%AE%8C%E5%85%A8%E7%89%88%E3%80%91/#:~:text=%E7%B7%8A%E5%BC%B5%E3%81%97%E3%81%AA%E3%81%84%E3%81%A8%E3%81%84%E3%81%86%E3%81%93%E3%81%A8%E3%81%AF%E8%87%AA%E5%88%86%E3%81%AB%E6%9C%9F%E5%BE%85%E3%81%97%E3%81%A6%E3%81%84%E3%81%AA%E3%81%84%E3%81%A8%E3%81%84%E3%81%86%E3%81%93%E3%81%A8%E3%80%82%20%E6%9C%80%E9%AB%98%E3%81%AE%E6%89%93%E8%80%85%E3%81%A8%E8%A8%80%E3%82%8F%E3%82%8C%E3%81%A6%E3%82%82%2010%E5%9B%9E%E3%81%AB7%E5%9B%9E%E3%81%AF%E5%A4%B1%E6%95%97%E3%81%97%E3%81%A6%E3%82%8B%E3%82%93%E3%81%A7%E3%81%99%E3%82%88%E3%80%82%20%E3%81%BE%E3%81%A0%E3%81%BE%E3%81%A0%E6%88%90%E9%95%B7%E3%81%A7%E3%81%8D%E3%81%BE%E3%81%99%E3%80%82\" target=\"_blank\">have-dream.sakura.ne.jp</a><br>\t\t\t\t<br>. 또한 많은 사람들이 자신을 ‘타격 천재’라고 부르지만 본인은 <b>“천재가 아니다”</b>라고 겸손하게 말하며, 다치지 않고 꾸준히 경기 출전해온 것과 항상 한 베이스라도 더 가려고 노력해온 것뿐이라고 밝혔습니다​<br>\t\t\t\t<br><a href=\"https://have-dream.sakura.ne.jp/word/2021/08/09/%E3%80%90top100%E3%80%91%E3%82%A4%E3%83%81%E3%83%AD%E3%83%BC%E3%81%AE%E5%90%8D%E8%A8%80%E3%80%90%E5%AE%8C%E5%85%A8%E7%89%88%E3%80%91/#:~:text=%E5%83%95%E3%81%AF%E5%A4%A9%E6%89%8D%E3%81%A7%E3%81%AF%E3%81%82%E3%82%8A%E3%81%BE%E3%81%9B%E3%82%93%E3%80%82%20%E3%81%AA%E3%81%9C%E3%81%8B%E3%81%A8%E3%81%84%E3%81%86%E3%81%A8%E8%87%AA%E5%88%86%E3%81%8C%E3%80%81%C2%A0%E3%81%A9%E3%81%86%E3%81%97%E3%81%A6%E3%83%92%E3%83%83%E3%83%88%E3%82%92%E6%89%93%E3%81%A6%E3%82%8B%E3%81%8B%E3%82%92%20%E8%AA%AC%E6%98%8E%E3%81%A7%E3%81%8D%E3%82%8B%E3%81%8B%E3%82%89%E3%81%A7%E3%81%99%E3%80%82\" target=\"_blank\">have-dream.sakura.ne.jp</a><br>\t\t\t\t<br>. 이치로는 특별한 나날 없이 매일을 성실하게 반복하고 피나는 훈련과 철저한 준비로 임하며, 과거의 업적이 아니라 앞으로 이룰 것들에 대해 자신이 자랑스럽다고 말했는데, 이러한 미래지향적인 자세가 바로 자신의 삶의 모토라고 설명했습니다. 이 발언들은 당시 NHK 등 일본 주요 매체와의 인터뷰 내용으로 보도되었으며, 이치로 특유의 끈기와 자기반성의 철학을 잘 보여주는 대표적인 어록으로 회자되고 있습니다​<br>\t\t\t\t<br><a href=\"https://have-dream.sakura.ne.jp/word/2021/08/09/%E3%80%90top100%E3%80%91%E3%82%A4%E3%83%81%E3%83%AD%E3%83%BC%E3%81%AE%E5%90%8D%E8%A8%80%E3%80%90%E5%AE%8C%E5%85%A8%E7%89%88%E3%80%91/#:~:text=%E4%BB%96%E4%BA%BA%E3%81%8C%E8%A8%80%E3%81%86%E6%88%90%E5%8A%9F%E3%82%92%E8%BF%BD%E3%81%84%E3%81%8B%E3%81%91%E5%A7%8B%E3%82%81%E3%81%9F%E3%82%89%E4%BD%95%E3%81%8C%E6%88%90%E5%8A%9F%E3%81%8B%E5%88%86%E3%81%8B%E3%82%89%E3%81%AA%E3%81%8F%E3%81%AA%E3%81%A3%E3%81%A6%E3%81%97%E3%81%BE%E3%81%84%E3%81%BE%E3%81%99%E3%80%82\" target=\"_blank\">have-dream.sakura.ne.jp</a><br>\t\t\t\t<br>​<br>\t\t\t\t<br><a href=\"https://www.gqjapan.jp/new-york-minute/products/20160909/nym2016-time-of-story-vol08#:~:text=%EF%BC%97%E5%89%B2%E8%BF%91%E3%81%84%E5%87%A1%E6%89%93%EF%BC%9D%E5%A4%B1%E6%95%97%E3%81%8C%E3%81%82%E3%81%A3%E3%81%9F%E3%81%8B%E3%82%89%E3%81%93%E3%81%9D%E3%80%81%E3%82%88%E3%82%8A%E9%AB%98%E3%81%BF%E3%82%92%E6%B1%82%E3%82%81%E3%81%A6%E5%8A%AA%E5%8A%9B%E3%82%92%E3%81%97%E7%B6%9A%E3%81%91%E3%82%8B%E3%81%93%E3%81%A8%E3%81%8C%E3%81%A7%E3%81%8D%E3%81%9F%E3%81%A8%E3%81%84%E3%81%86%E5%BD%BC%E3%81%AE%E8%A8%80%E8%91%89%E3%81%AF%E3%80%81%E4%BA%BA%E7%94%9F%E3%81%AE%E3%81%B2%E3%81%A8%E3%81%A4%E3%81%AE%E7%9C%9F%E7%90%86%E3%82%92%E8%A8%80%E3%81%84%E3%81%82%E3%82%89%E3%82%8F%E3%81%97%E3%81%A6%E3%81%84%E3%82%8B%E3%82%88%E3%81%86%E3%81%AB%E6%80%9D%E3%81%88%E3%81%9F%E3%80%82\" target=\"_blank\">gqjapan.jp</a><br>\t\t\t\t<br>.<br>\t\t\t\t<br>Sources: 이치로 한겨레 인터뷰 인용 내용 (2016), 일본어 원문 – 座間小학교 블로그 인용​<br>\t\t\t\t<br><a href=\"https://zama-e.zama.school/blogs/blog_entries/view/8/87c654623e32e8d2ee28e9a07a802da0?frame_id=14#:~:text=%E2%97%8E%E5%80%8B%E4%BA%BA%E7%9A%84%E3%81%AB%E3%80%8C%E6%88%90%E5%8A%9F%E3%80%8D%E3%81%A8%E3%81%84%E3%81%86%E8%A8%80%E8%91%89%E3%81%8C%E5%A5%BD%E3%81%8D%E3%81%A7%E3%81%AF%E3%81%82%E3%82%8A%E3%81%BE%E3%81%9B%E3%82%93%E3%80%82\" target=\"_blank\">zama-e.zama.school</a><br>\t\t\t\t<br>, ことばのチカラ 이치로 명언 모음​<br>\t\t\t\t<br><a href=\"https://have-dream.sakura.ne.jp/word/2021/08/09/%E3%80%90top100%E3%80%91%E3%82%A4%E3%83%81%E3%83%AD%E3%83%BC%E3%81%AE%E5%90%8D%E8%A8%80%E3%80%90%E5%AE%8C%E5%85%A8%E7%89%88%E3%80%91/#:~:text=%E5%83%95%E3%81%AF%E5%A4%A9%E6%89%8D%E3%81%A7%E3%81%AF%E3%81%82%E3%82%8A%E3%81%BE%E3%81%9B%E3%82%93%E3%80%82%20%E3%81%AA%E3%81%9C%E3%81%8B%E3%81%A8%E3%81%84%E3%81%86%E3%81%A8%E8%87%AA%E5%88%86%E3%81%8C%E3%80%81%C2%A0%E3%81%A9%E3%81%86%E3%81%97%E3%81%A6%E3%83%92%E3%83%83%E3%83%88%E3%82%92%E6%89%93%E3%81%A6%E3%82%8B%E3%81%8B%E3%82%92%20%E8%AA%AC%E6%98%8E%E3%81%A7%E3%81%8D%E3%82%8B%E3%81%8B%E3%82%89%E3%81%A7%E3%81%99%E3%80%82\" target=\"_blank\">have-dream.sakura.ne.jp</a><br>\t\t\t\t<br>​<br>\t\t\t\t<br><a href=\"https://have-dream.sakura.ne.jp/word/2021/08/09/%E3%80%90top100%E3%80%91%E3%82%A4%E3%83%81%E3%83%AD%E3%83%BC%E3%81%AE%E5%90%8D%E8%A8%80%E3%80%90%E5%AE%8C%E5%85%A8%E7%89%88%E3%80%91/#:~:text=%E7%B7%8A%E5%BC%B5%E3%81%97%E3%81%AA%E3%81%84%E3%81%A8%E3%81%84%E3%81%86%E3%81%93%E3%81%A8%E3%81%AF%E8%87%AA%E5%88%86%E3%81%AB%E6%9C%9F%E5%BE%85%E3%81%97%E3%81%A6%E3%81%84%E3%81%AA%E3%81%84%E3%81%A8%E3%81%84%E3%81%86%E3%81%93%E3%81%A8%E3%80%82%20%E6%9C%80%E9%AB%98%E3%81%AE%E6%89%93%E8%80%85%E3%81%A8%E8%A8%80%E3%82%8F%E3%82%8C%E3%81%A6%E3%82%82%2010%E5%9B%9E%E3%81%AB7%E5%9B%9E%E3%81%AF%E5%A4%B1%E6%95%97%E3%81%97%E3%81%A6%E3%82%8B%E3%82%93%E3%81%A7%E3%81%99%E3%82%88%E3%80%82%20%E3%81%BE%E3%81%A0%E3%81%BE%E3%81%A0%E6%88%90%E9%95%B7%E3%81%A7%E3%81%8D%E3%81%BE%E3%81%99%E3%80%82\" target=\"_blank\">have-dream.sakura.ne.jp</a><br>\t\t\t\t<br>등.<br>\t\t\t\t<br><br>\t\t\t\t<br><br>\t\t\t\t<br>위기 키위, 성공 공성.<br>\t\t\t\t<br>이런 래디컬한 변화 속, 포연과 연무속에서는<br>\t\t\t\t<br>가장 똑똑한 이를과 가장 어리석은 이들간의 간극마저 일시적으로 무효화된다.<br>\t\t\t\t<br>오로지 두려움만을 폐부속 에 공히 나눠 갖는다.<br>\t\t\t\t<br>그러니, 하라.<br>\t\t\t\t<br><br>\t\t\t\t<br>퍼터 바꾸기<br>\t\t\t\t<br><br>\t\t\t\t<br>제가 아는 모든 희망의 원산지는, 실은 절망이었습니다.<br>\t\t\t\t<br><br>\t\t\t\t<br>절망의 점들을 찍어, 희망을 그려보는 거죠.<br>\t\t\t\t<br><br>\t\t\t\t<br>마음을 몇 겹의 격벽안에 가두는 것으로 시작.<br>\t\t\t\t<br>모든 외부자극은 일단 대기.<br>\t\t\t\t<br>세상의 페이스가 아니라<br>\t\t\t\t<br>내가 컨트롤 가능한 페이스에 맞춰랴 <br>\t\t\t\t<br><br>\t\t\t\t<br><br>\t\t\t\t<br>사람의 마음이 다른 마음으로 진입하는 것은, 우주선의 궤도 진입과도 같아서.<br>\t\t\t\t<br><br>\t\t\t\t<br>아주 작은 오차만으로도. 아주 근소한 타이밍 만으로도<br>\t\t\t\t<br>서로의 곁을 혜성처럼 지나쳐 가고 마는 것이다.<br>\t\t\t\t<br><br>\t\t\t\t<br>나답지 않은 일. 많이 해보기.<br>\t\t\t\t<br>자전거처럼<br>\t\t\t\t<br><br>\t\t\t\t<br>병 없잎신음하는 글을 짓지 말라.<br>\t\t\t\t<br><br>\t\t\t\t<br>아프다고하면 아프게된다.<br>\t\t\t\t<br><br>\t\t\t\t<br>다른 생각으로 오버라이팅흐고 계속 다른생각으로 밀어낸다.<br>\t\t\t\t<br><br>\t\t\t\t<br>그 뿐이다.<br>\t\t\t\t<br><br>\t\t\t\t<br>수경에 눈물 차오른다?<br>\t\t\t\t<br><br>\t\t\t\t<br>뭐 어쩔거야.<br>\t\t\t\t<br>할건 해야지.<br>\t\t\t\t<br><br>\t\t\t\t<br><br>\t\t\t\t<br><br>\t\t\t\t<br>스스로의 주의를 돌리고<br>\t\t\t\t<br>에너지를 소진하고.<br>\t\t\t\t<br><br>\t\t\t\t<br><br>\t\t\t\t<br>장황한 글,<br>\t\t\t\t<br>스크롤링해야 하는 글,<br>\t\t\t\t<br><br>\t\t\t\t<br>읽혀지지 않는 글은 나쁜 글이다.<br>\t\t\t\t<br>제 임무를 다하지 못 하였으므로,<br>\t\t\t\t<br>내용의 충실함마저 무색할 뿐이다.<br>\t\t\t\t<br><br>\t\t\t\t<br>길더라도 깊이 있는 글들이 널리 읽혀야 한다는데 크게 공감한다.<br>\t\t\t\t<br>허나<br>\t\t\t\t<br>쇼츠와 릴스의 시대. 콘텐츠와 그 생산자로서의 자각이 필<br>\t\t\t\t<br><br>\t\t\t\t<br>존중 받을만한 기치이나,<br>\t\t\t\t<br>존속 불가능한 가치이다.<br>\t\t\t\t<br><br>\t\t\t\t<br>글을 끊어치지 못하는 이가,<br>\t\t\t\t<br>말인들 끊어칠 수 있겠는가,<br>\t\t\t\t<br><br>\t\t\t\t<br>말의 호홉이 길면<br>\t\t\t\t<br>청자를 살필 수 없고<br>\t\t\t\t<br>실시간 피드백 루프가 없으면<br>\t\t\t\t<br>망하는게 라이브다.<br>\t\t\t\t<br>가수가 인이어 없이 무대에 서는 것.<br>\t\t\t\t<br><br>\t\t\t\t<br>Form Follows Function,<br>\t\t\t\t<br>그리고 길이는 문장의 가장 중요한 형태.<br>\t\t\t\t<br><br>\t\t\t\t<br><br>\t\t\t\t<br>아<br>\t\t\t\t<br><br>\t\t\t\t<br><br>\t\t\t\t<br><br>\t\t\t\t<br>효율과 효과의 트레이드 오프<br>\t\t\t\t<br>체력. 반복 시행.<br>\t\t\t\t<br>유의미한 시도, 피드백 루프<br>\t\t\t\t<br>심리적 매몰 비용에 천착하지 않는 기계적 반복 시행<br>\t\t\t\t<br><br>\t\t\t\t<br>아니 뭐 이렇게 책을,<br>\t\t\t\t<br>잘 만들었어요?<br>\t\t\t\t<br><br>\t\t\t\t<br>만듦새 하나 때문에,<br>\t\t\t\t<br>정작 내용은 제쳐두고 찍어두기 바빴단 말이에요.<br>\t\t\t\t<br><br>\t\t\t\t<br>별 주장 없는 색만으로 충분한 농담과 강조<br>\t\t\t\t<br><br>\t\t\t\t<br>-<br>\t\t\t\t<br><br>\t\t\t\t<br><br>\t\t\t\t<br><br>\t\t\t\t<br>나 답지 않은 짓.<br>\t\t\t\t<br>나라면 절대 하지 않을, 그래서 하지 않았던 일들 최대한 많이 저지르기.<br>\t\t\t\t<br>그리고 무슨 일이 일어나는지 3Q에 보자고.<br>\t\t\t\t<br><br>\t\t\t\t<br><br>\t\t\t\t<br><br>\t\t\t\t<br>이 남자는 80년을 살았고, 그 중 절반을 나와 함께 살았다.<br>\t\t\t\t<br>피차 이꼴저꼴 다본 내 가장 오랜 친우이자, 나를 낳은 사람.<br>\t\t\t\t<br>내 사치.<br>\t\t\t\t<br><br>\t\t\t\t<br>봄, <br>\t\t\t\t<br>작은 공기를 머금어<br>\t\t\t\t<br>단호한 선고<br>\t\t\t\t<br><br>\t\t\t\t<br>단, <br>\t\t\t\t<br>매듭을 풀려하지 마라.<br>\t\t\t\t<br>끊고 나가라. 주저없이.<br>\t\t\t\t<br>이어질 매듭은 이윽고 이어진다.<br>\t\t\t\t<br>\"노루가 사냥군의 손에서&#160;벗어나는&#160;것 같이, 새가&#160;그물&#160;치는 자의 손에서&#160;벗어나는&#160;것 같이 스스로 구원하라\"<br>\t\t\t\t<br><br>\t\t\t\t<br>관성, 경로 의존성, <br>\t\t\t\t<br>매몰 비용, 전환 비용 모든 심리적 장벽을 걷어낸다.<br>\t\t\t\t<br>법을 어기는 일 이외에는 모두 허용된다.<br>\t\t\t\t<br><br>\t\t\t\t<br>마찰을 최소화 한다.<br>\t\t\t\t<br><br>\t\t\t\t<br>아쉬 울 것 없는 사람.이 될 순 없다만,<br>\t\t\t\t<br>아쉬 울 것 없는 것처럼 흐르고, 움직여라.<br>\t\t\t\t<br><br>\t\t\t\t<br>….<br>\t\t\t\t<br>알게 되면 보이나니,<br>\t\t\t\t<br>전과 같지 않으리라.<br>\t\t\t\t<br><br>\t\t\t\t<br>아무 감정적 바이어스나, <br>\t\t\t\t<br>천착하지 않고, 원리에 입각해서 판단한다.<br>\t\t\t\t<br>즉시. 좀 빠르게 말고 즉시.<br>\t\t\t\t<br><br>\t\t\t\t<br>2번을 재고, 바로 실행한다.<br>\t\t\t\t<br>째째하게 더 재지 않는다.<br>\t\t\t\t<br>빠르게 결정하고,<br>\t\t\t\t<br>대세에 지장 없는 것은, 그냥 감내한다.<br>\t\t\t\t<br><br>\t\t\t\t<br>감정의 캐시를 실시간으로 비워낸다.<br>\t\t\t\t<br>지쳐도 괜찮은데, 멈추지는 마.<br>\t\t\t\t<br><br>\t\t\t\t<br>-<br>\t\t\t\t<br><br>\t\t\t\t<br>취하는 것<br>\t\t\t\t<br>교회<br>\t\t\t\t<br>커피<br>\t\t\t\t<br>넷플릭스<br>\t\t\t\t<br><br>\t\t\t\t<br><br>\t\t\t\t<br>2 에피타이저는 끝. ONTERE는 이제 시작.<br>\t\t\t\t<br>안해봤던 것을 해본 방식으로, 해오던 것들은 안해본 방식으로<br>\t\t\t\t<br>그리고 3Q에 뭐가 남게 될지 보자고<br>\t\t\t\t<br><br>\t\t\t\t<br>꺼려지면 한다,<br>\t\t\t\t<br>두려운건 무조건 한다.<br>\t\t\t\t<br>두려움에서 완전히 벗어나는 유일한 방법은<br>\t\t\t\t<br>그 안으로 들어가는 것 뿐이다.<br>\t\t\t\t<br><br>\t\t\t\t<br><br>\t\t\t\t<br>병 없이 신음하는 글을 짓지 말라.<br>\t\t\t\t<br>슬픔을 말하지 말라, 약점이 된다.<br>\t\t\t\t<br><br>\t\t\t\t<br>원하는 것을 요청할 뿐,<br>\t\t\t\t<br>거절은 내 몫이 아니다.<br>\t\t\t\t<br>세상의 몫이지. 아님, 말고.<br>\t\t\t\t<br><br>\t\t\t\t<br><br>\t\t\t\t<br>니 남자친구 일터에서 병산이면,<br>\t\t\t\t<br><br>\t\t\t\t<br>난 가정을 꾸릴거라면 후자여야 한다는 결론을 내렸다.<br>\t\t\t\t<br><br>\t\t\t\t<br>사실 이건 함정질문인데.<br>\t\t\t\t<br>미친사람을, 일로 자아실현을 꼭 해야하는 사람을 거르는 질문이다.<br>\t\t\t\t<br><br>\t\t\t\t<br><br>\t\t let cards = [];
let moving = null, resizing = null;

function loadBoard() {
  const saved = localStorage.getItem(SAVE_KEY);
  cards = saved ? JSON.parse(saved) : DEFAULT_CARDS.map(c => ({...c}));
  renderCards();
  if (!saved) autoLayout();
}

function autoLayout() {
  const GAP = 14;
  const boardW = document.getElementById('board').offsetWidth;
  const cols = Math.max(1, Math.floor(boardW / 280));
  const colW = (boardW - GAP * (cols - 1)) / cols;
  const colHeights = new Array(cols).fill(0);
  const allCards = document.querySelectorAll('.card');
  const images = document.querySelectorAll('.card img');
  let loaded = 0;
  const total = images.length;

  function place() {
    allCards.forEach((el, i) => {
      const card = cards[i];
      const w = Math.min(card.w || colW, colW);
      let minCol = 0;
      for (let c = 1; c < cols; c++) if (colHeights[c] < colHeights[minCol]) minCol = c;
      card.x = minCol * (colW + GAP);
      card.y = colHeights[minCol];
      card.w = w;
      el.style.left = card.x + 'px';
      el.style.top = card.y + 'px';
      el.style.width = w + 'px';
      colHeights[minCol] = card.y + el.offsetHeight + GAP;
    });
    document.getElementById('board').style.minHeight = Math.max(...colHeights) + 100 + 'px';
    saveBoard();
  }

  if (total === 0) requestAnimationFrame(place);
  else images.forEach(img => {
    if (img.complete) { loaded++; if (loaded >= total) requestAnimationFrame(place); }
    else img.onload = img.onerror = () => { loaded++; if (loaded >= total) requestAnimationFrame(place); };
  });
}

function syncText() {
  document.querySelectorAll('.card').forEach(el => {
    const idx = +el.dataset.idx;
    if (cards[idx]?.type === 'text') {
      const t = el.querySelector('.text');
      if (t) cards[idx].content = t.innerHTML;
    }
  });
}

function saveBoard() {
  syncText();
  localStorage.setItem(SAVE_KEY, JSON.stringify(cards));
  document.getElementById('status').textContent = '저장됨 ' + new Date().toLocaleTimeString();
}

function renderCards() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  cards.forEach((card, i) => {
    const el = document.createElement('div');
    el.className = 'card';
    el.dataset.idx = i;
    if (card.x !== undefined) el.style.left = card.x + 'px';
    if (card.y !== undefined) el.style.top = card.y + 'px';
    if (card.w) el.style.width = card.w + 'px';

    el.addEventListener('mousedown', e => {
      if (e.target.closest('.text, a, .card-btn, .resize-handle, table')) return;
      e.preventDefault();
      moving = { idx: i, startX: e.clientX, startY: e.clientY, origX: card.x || 0, origY: card.y || 0 };
      el.classList.add('moving');
    });

    const actions = document.createElement('div');
    actions.className = 'card-actions';
    const delBtn = document.createElement('button');
    delBtn.className = 'card-btn'; delBtn.textContent = '×';
    delBtn.onclick = e => { e.stopPropagation(); if (confirm('삭제?')) { cards.splice(i, 1); renderCards(); saveBoard(); } };
    actions.appendChild(delBtn);
    el.appendChild(actions);

    if (card.type === 'text') {
      const text = document.createElement('div');
      text.className = 'text';
      text.contentEditable = true;
      text.innerHTML = card.content || '';
      text.addEventListener('blur', () => { card.content = text.innerHTML; saveBoard(); });
      el.appendChild(text);
    } else if (card.type === 'image') {
      const src = card.src.startsWith('http') || card.src.startsWith('data:') ? card.src : IMG_BASE + card.src;
      const img = document.createElement('img');
      img.src = src;
      img.alt = card.alt || '';
      img.loading = 'lazy';
      img.onerror = () => img.style.display = 'none';
      if (card.link) {
        const a = document.createElement('a'); a.href = card.link; a.target = '_blank';
        a.appendChild(img); el.appendChild(a);
      } else { el.appendChild(img); }
      if (card.caption) {
        const cap = document.createElement('div');
        cap.className = 'caption';
        cap.textContent = card.caption;
        el.appendChild(cap);
      }
    } else if (card.type === 'table') {
      const wrapper = document.createElement('div');
      wrapper.style.overflowX = 'auto';
      wrapper.innerHTML = card.html || '';
      el.appendChild(wrapper);
    }

    const rh = document.createElement('div');
    rh.className = 'resize-handle';
    rh.addEventListener('mousedown', e => {
      e.preventDefault(); e.stopPropagation();
      resizing = { idx: i, startX: e.clientX, startW: card.w || el.offsetWidth };
    });
    el.appendChild(rh);
    board.appendChild(el);
  });

  requestAnimationFrame(() => {
    let maxBottom = 0;
    document.querySelectorAll('.card').forEach(el => {
      const b = (parseFloat(el.style.top) || 0) + el.offsetHeight;
      if (b > maxBottom) maxBottom = b;
    });
    board.style.minHeight = (maxBottom + 100) + 'px';
  });
}

document.addEventListener('mousemove', e => {
  if (moving) {
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`);
    if (!el) return;
    const nx = moving.origX + e.clientX - moving.startX;
    const ny = moving.origY + e.clientY - moving.startY;
    el.style.left = nx + 'px';
    el.style.top = ny + 'px';
  }
  if (resizing) {
    const card = cards[resizing.idx];
    card.w = Math.max(100, resizing.startW + e.clientX - resizing.startX);
    const el = document.querySelector(`.card[data-idx="${resizing.idx}"]`);
    if (el) el.style.width = card.w + 'px';
  }
});

document.addEventListener('mouseup', e => {
  if (moving) {
    const card = cards[moving.idx];
    card.x = Math.max(0, moving.origX + e.clientX - moving.startX);
    card.y = Math.max(0, moving.origY + e.clientY - moving.startY);
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`);
    if (el) { el.classList.remove('moving'); }
    moving = null; saveBoard();
  }
  if (resizing) { resizing = null; saveBoard(); }
});

function addTextCard() {
  cards.push({ type: 'text', content: '', x: 50, y: window.scrollY + 100, w: 300 });
  renderCards();
  setTimeout(() => { const els = document.querySelectorAll('.card .text'); els[els.length - 1]?.focus(); }, 100);
}

function addImageCard() {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = 'image/*';
  input.onchange = e => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = () => { cards.push({ type: 'image', src: reader.result, x: 50, y: window.scrollY + 100, w: 240 }); renderCards(); saveBoard(); };
    reader.readAsDataURL(file);
  };
  input.click();
}

function resetLayout() {
  if (!confirm('자동 재배치합니다. 현재 위치가 변경됩니다.')) return;
  cards.forEach(c => { delete c.x; delete c.y; });
  renderCards(); autoLayout();
}

setInterval(saveBoard, 30000);
loadBoard();
</script>
</body>
</html>
