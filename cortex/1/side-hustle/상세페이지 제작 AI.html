<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>상세페이지 제작 AI</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #1e1e1e;
  color: #e0e0e0;
  font-family: 'Segoe UI', -apple-system, sans-serif;
  font-size: 15px;
  line-height: 1.7;
  padding: 0 0 80px;
}
a { color: #6cb0f6; text-decoration: none; }
a:hover { text-decoration: underline; }
.toolbar {
  position: sticky; top: 0; z-index: 100;
  background: #161b22; border-bottom: 1px solid #30363d;
  padding: 8px 24px; display: flex; gap: 10px; align-items: center;
}
.toolbar .t-title { font-size: 16px; font-weight: bold; color: #fff; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.toolbar .t-date { color: #8b949e; font-size: 12px; white-space: nowrap; }
.toolbar button { background: #21262d; border: 1px solid #30363d; color: #ccc; padding: 4px 12px; border-radius: 5px; cursor: pointer; font-size: 12px; white-space: nowrap; }
.toolbar button:hover { background: #30363d; color: #fff; }
.toolbar .t-status { color: #8b949e; font-size: 11px; white-space: nowrap; }
.doc { max-width: 760px; margin: 0 auto; padding: 28px 24px; }
.block { margin-bottom: 10px; }
.block-text {
  outline: none;
  padding: 5px 8px;
  border-radius: 4px;
  white-space: pre-wrap;
  word-break: break-word;
  min-height: 1.5em;
}
.block-text:focus { background: rgba(255,255,255,0.04); }
.block-text:empty::before { content: '텍스트 입력...'; color: #555; pointer-events: none; }
.block-image img { max-width: 100%; border-radius: 6px; display: block; }
.block-image .caption { font-size: 12px; color: #888; margin-top: 4px; }
.block-table .table-wrap { overflow-x: auto; }
.block-table table { border-collapse: collapse; font-size: 13px; }
.block-table td, .block-table th { border: 1px solid #444; padding: 5px 10px; vertical-align: top; }
.block-table th { background: #2a2a3a; color: #ccc; }
</style>
</head>
<body>
<div class="toolbar">
  <span class="t-title">상세페이지 제작 AI</span>
  <span class="t-date">Invalid Date</span>
  <button onclick="save()">저장</button>
  <button id="copyBtn" onclick="copyPath()">⎘ 주소 복사</button>
  <span class="t-status" id="status"></span>
</div>
<div class="doc" id="doc">
<div class="block block-text" data-idx="0" contenteditable="true">상세페이지 제작 AI<br>		<br>		<br>	<br>	<br>		<br>			<br>HeyGen, Product Placement 기능 공개 <a href="https://www.youtube.com/redirect?event=video_description&redir_token=QUFFLUhqa1kwUUtEX2dRNGptWFFHMkVqMS1Bc05iVkZSZ3xBQ3Jtc0trR0F0eVFOTV9IS2ZySmtEcExNLTd5enB5SlkzLTJvMkNaM0d3VlUyMUgzTDNvNXROZ2dfTERHN29uTHlUdlpIMS1VZndMZUNRT0FERUdxczIzbTNIZzJUT2ppR1ZoelNoUHNZcm1MNEJVbmUtLVVpbw&q=https%3A%2F%2Fx.com%2Fminchoi%2Fstatus%2F1935842891085025690&v=cu8UdUrS1TI" target="_blank">https://x.com/minchoi/status/19358428...</a><br>			<br>힉스필드, 캔버스 기능 공개 <a href="https://www.youtube.com/redirect?event=video_description&redir_token=QUFFLUhqbXF6ZzhVZHE3MUF0c2stQnJrS3I5WGtuVGVmZ3xBQ3Jtc0ttR1RxRnplNzZjTHVXdXVFTDJvbEozZFhKWHJpQVVsQ2ZTbklBS2tveVpoOEZMbTNMSHducFJFQ1RMcDlVVlJqVzBHeUlpUlY0UWlvbHk5SlhPcHNYLWY0THh2a3VzMTE1bXJoNmxfWGlLZ1JtcmVSaw&q=https%3A%2F%2Fx.com%2Fhiggsfield_ai%2Fstatus%2F1935042830520697152&v=cu8UdUrS1TI" target="_blank">https://x.com/higgsfield_ai/status/19...</a> 영상의 제품 바꾸는 오픈소스, LoRA-Edit <a href="https://www.youtube.com/redirect?event=video_description&redir_token=QUFFLUhqbWNvQ19GOTV2TjZGNE1zNVhOenBBdG1WOVVUd3xBQ3Jtc0tta1ZuR2ZrLUFLWG53WGU5Y0k3Zi1iSlhPMU1BODh5ZHNSVV9mMVNMRk16Y0dlSTh4VGNkMXZtQ20xTXFHZDlMRHZqTUNSd1NTWVYybzlEZEVDZThzV2k0cE1wYmljV25pb2JuOWpIU0dKclVDcTN0bw&q=https%3A%2F%2Fcjeen.github.io%2FLoraEditPaper%2F&v=cu8UdUrS1TI" target="_blank">https://cjeen.github.io/LoraEditPaper/</a><br>			<br><br>			출처: <<a href="https://www.youtube.com/watch?v=cu8UdUrS1TI&t=16s" target="_blank">https://www.youtube.com/watch?v=cu8UdUrS1TI&t=16s</a>></div>
</div>
<script>
const SAVE_KEY = 'note-상세페이지-제작-AI';

function save() {
  const data = {};
  document.querySelectorAll('.block-text').forEach(el => {
    data[el.dataset.idx] = el.innerHTML;
  });
  localStorage.setItem(SAVE_KEY, JSON.stringify(data));
  const s = document.getElementById('status');
  s.textContent = '저장됨 ' + new Date().toLocaleTimeString();
  setTimeout(() => { s.textContent = ''; }, 2000);
}

function copyPath() {
  navigator.clipboard.writeText(location.pathname).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.textContent = '✓ 복사됨';
    setTimeout(() => { btn.textContent = '⎘ 주소 복사'; }, 1500);
  });
}

// Restore saved edits
const saved = localStorage.getItem(SAVE_KEY);
if (saved) {
  try {
    const data = JSON.parse(saved);
    document.querySelectorAll('.block-text').forEach(el => {
      if (data[el.dataset.idx] !== undefined) el.innerHTML = data[el.dataset.idx];
    });
  } catch(e) {}
}

document.querySelectorAll('.block-text').forEach(el => {
  el.addEventListener('blur', save);
});

setInterval(save, 30000);
</script>
</body>
</html>
