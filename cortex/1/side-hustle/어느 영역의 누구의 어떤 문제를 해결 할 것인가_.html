<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">

<title>어느 영역의 누구의 어떤 문제를 해결 할 것인가?</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #1e1e1e;
  color: #e0e0e0;
  font-family: 'Segoe UI', -apple-system, sans-serif;
  font-size: 15px;
  line-height: 1.6;
  padding: 20px 30px 60px;
  overflow-x: hidden;
}
a { color: #6cb0f6; text-decoration: none; }
a:hover { text-decoration: underline; }
.title-bar {
  background: #3a3a5c;
  display: inline-block;
  padding: 6px 16px;
  font-size: 22px;
  font-weight: bold;
  color: #fff;
  margin-bottom: 4px;
}
.date { color: #999; font-size: 13px; margin-bottom: 20px; }
.board { position: relative; }
.card {
  background: #2a2a2a;
  border: 1px solid #3a3a3a;
  border-radius: 8px;
  padding: 12px;
  position: absolute;
  cursor: grab;
  transition: box-shadow 0.15s;
  overflow: hidden;
}
.card:hover { box-shadow: 0 0 0 1px #58a6ff; z-index: 10; }
.card.moving { opacity: 0.8; box-shadow: 0 4px 24px rgba(0,0,0,0.6); z-index: 100; cursor: grabbing; }
.card img { width: 100%; border-radius: 4px; display: block; }
.card .caption { font-size: 12px; color: #888; margin-top: 6px; }
.card .text { outline: none; min-height: 20px; white-space: pre-wrap; word-break: break-word; }
.card .text:focus { background: rgba(255,255,255,0.05); border-radius: 4px; padding: 4px; }
.card .text:empty::before { content: '텍스트 입력...'; color: #555; }
.card table { border-collapse: collapse; width: 100%; font-size: 13px; }
.card table td, .card table th { border: 1px solid #444; padding: 4px 8px; vertical-align: top; }
.card table th { background: #333; color: #ccc; }
.card-actions { position: absolute; top: 4px; right: 4px; display: none; gap: 4px; }
.card:hover .card-actions { display: flex; }
.card-btn { background: #333; border: 1px solid #555; color: #ccc; border-radius: 4px; padding: 2px 6px; font-size: 11px; cursor: pointer; }
.card-btn:hover { background: #444; color: #fff; }
.resize-handle { position: absolute; bottom: 0; right: 0; width: 16px; height: 16px; cursor: se-resize; opacity: 0; }
.card:hover .resize-handle { opacity: 0.6; }
.resize-handle::after { content: ''; position: absolute; bottom: 3px; right: 3px; width: 8px; height: 8px; border-right: 2px solid #666; border-bottom: 2px solid #666; }
.toolbar { position: fixed; bottom: 0; left: 0; right: 0; background: #161b22; border-top: 1px solid #30363d; padding: 8px 20px; display: flex; gap: 12px; align-items: center; z-index: 200; }
.toolbar button { background: #21262d; border: 1px solid #30363d; color: #e0e0e0; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; }
.toolbar button:hover { background: #30363d; }
.toolbar .status { color: #8b949e; font-size: 12px; margin-left: auto; }
.highlight-red { color: #ff6b6b; }
.highlight-blue { color: #6cb0f6; }
</style>
</head>
<body>
<div class="title-bar">어느 영역의 누구의 어떤 문제를 해결 할 것인가?</div>
<div class="date">Invalid Date</div>
<div class="board" id="board"></div>
<div class="toolbar">
  <button onclick="addTextCard()">+ 텍스트</button>
  <button onclick="addImageCard()">+ 이미지</button>
  <button onclick="saveBoard()">💾 저장</button>
  <button onclick="resetLayout()">↺ 재배치</button>
  <span class="status" id="status">Ready</span>
</div>
<script>
const SAVE_KEY = 'board-어느-영역의-누구의-어떤-문제를-해결-할-것인가-';
const IMG_BASE = '../../attachments/';
const DEFAULT_CARDS = [
  {
    "type": "text",
    "content": "어느 영역의 누구의 어떤 문제를 해결 할 것인가?<br>\t\t<br>\t\t<br>\t<br>\t<br>\t\t<br>\t\t\t<br>앞으로 어떤 서비스를 만들어야 할까?<br>\t\t\t<br>제가 직접 저 멋진 챗봇을 경험해보지 못한 건 아쉬웠지만 여러가지 욕구와 아이디어가 샘솟는 걸 느꼈습니다. 이렇게 AI가 (그리고 구글 같은 대형 회사들이) 발전하는데 개인과 소규모 스타트업은 어떤 서비스를 만들어야 살아남을까? 라는 고민도 생겼고요.<br>\t\t\t<br>그래서 크게 다섯 가지 방향성을 생각해봤습니다.<br>\t\t\t<br>\t\t\t\t<br>- 특정 문제를 탁월하게 해결하는 작고 빠르며 유용한 도구: 크롬 확장 프로그램이나 피그마 플러그인 같은 형태로도 충분히 동작할 거예요. 한 가지 문제를 완벽히 풀어내는 데 초점을 맞추는 거죠. 1인 창업자가 (홍보만 잘 할 수 있다면) 시도하기 가장 적절한 방향이라고 생각합니다.<br>\t\t\t\t<br>- 독창적이고 재미있는 참여형 게임(또는 게임화된 앱): 유저의 선택에 따라 실시간으로 변화하는, 절대 같은 시나리오가 나오지 않는 로그라이크 게임이 떠오르네요. VR이 가미될 수도 있겠고요.<br>\t\t\t\t<br>- 사람들 사이의 감정적 교류나 온오프라인 만남을 중개하고 돕는 서비스: 사회적 동물로서 인간이 가진 욕구는 AI 시대에도 사라지지 않겠죠. (인간이 인간을 만나는 대신 AI 연인을 만날 수도 있겠지만요) AI를 활용한 연애, 사주, 모임 관련 서비스는 이미 흥하고 있는 게 많은 걸로 압니다.<br>\t\t\t\t<br>- 기존 서비스에 접목하는, 초개인화된 ('자비스'나 'Her' 같은) 멀티 에이전트 비서: 복잡한 기능을 다양하게 제공하는 서비스는 유저가 기능을 발견 & 학습하게 하는 데 항상 어려움을 겪었습니다. 이제는 도메인 전문성을 가진 비서가 대신해줄 수 있겠네요. 위 데모처럼요.<br>\t\t\t\t<br>- 1~4와 같은 솔루션들을 쉽게 만들고 활용하도록 돕는 생태계: 교육 및 학습자료, 개발자 도구(SDK), 컨텐츠 창작 도구, 데이터 분석 도구, 그리고 이 모든 게 올라가서 공유될 마켓플레이스. 모두 지금 이미 폭발적으로 늘어나고 있는 추세죠.<br>\t\t\t<br>\t\t\t<br>저는 개인적으로는 1을, 친구 게임 회사 도우면서 2를, XL8에서 4를, 바이브 코딩 강의에서 5를 시도하고 있는 셈이네요. 지금부터느 에이전트 개발에 시간을 더 쏟아보고 싶군요.<br>\t\t\t<br><br>\t\t\t출처: <<a href=\"https://www.stdy.blog/the-most-amazing-ai-demo-in-2025/\" target=\"_blank\">https://www.stdy.blog/the-most-amazing-ai-demo-in-2025/</a>> <br>\t\t\t<br><br>\t\t\t<br>스타트업 아이디어를 찾는 12가지 프레임워크<br>\t\t\t<br>\t\t\t\t<br>- <br>1.&#160;큰 시장에서 문제를 선택하기<br>\t\t\t\t<br>\t\t\t\t\t<br>- 똑같이 열심히 일해도 작은 시장에서는 성과가 제한적임<br>\t\t\t\t\t<br>- 큰 시장에서 중요한 문제를 풀어야 성공 가능성이 높음<br>\t\t\t\t<br>\t\t\t\t<br>\t\t\t\t<br>- <br>2.&#160;현장에서 관찰하며 문제 발굴하기<br>\t\t\t\t<br>\t\t\t\t\t<br>- 사용자의 일상이나 작업 환경에 직접 들어가&#160;불편&#183;비효율을 체감<br>\t\t\t\t\t<br>- 책상 앞 아이디어가 아니라&#160;현장에서 드러나는 실제 문제를 포착하는 방식<br>\t\t\t\t<br>\t\t\t\t<br>\t\t\t\t<br>- <br>3.&#160;세 가지 질문으로 브레인스토밍하기<br>\t\t\t\t<br>\t\t\t\t\t<br>- 세상의 큰 문제는 무엇인가?<br>\t\t\t\t\t<br>- 내가 가진&#160;독특한 기술&#183;경험&#183;관점은 무엇인가?<br>\t\t\t\t\t<br>- 이 두 가지를 어떻게&#160;비즈니스 기회로 연결할 수 있는가?<br>\t\t\t\t<br>\t\t\t\t<br>\t\t\t\t<br>- <br>4.&#160;비자명한 시장 찾기<br>\t\t\t\t<br>\t\t\t\t\t<br>- 겉보기에 당연하거나 평범해 보여서 사람들이 간과하는 시장<br>\t\t\t\t\t<br>- 새로운 기술이 퍼지는 초창기 시장이나,&#160;경쟁은 많지만 차별화가 없는 분야, 혹은&#160;작아 보이지만 성장 여지가 큰 틈새시장이 여기에 해당<br>\t\t\t\t<br>\t\t\t\t<br>\t\t\t\t<br>- <br>5.&#160;제약 완화된 사고<br>\t\t\t\t<br>\t\t\t\t\t<br>- 현재 기술이나 규제 때문에 불가능해 보이는 문제도,&#160;미래에는 제약이 사라질 것을 가정하고 사고 확장<br>\t\t\t\t\t<br>- “만약 이 제약이 없다면 어떤 제품이나 서비스가 가능할까?”라는 질문에서 혁신이 나옴<br>\t\t\t\t<br>\t\t\t\t<br>\t\t\t\t<br>- <br>6.&#160;2주간의 공동 창업자 실험<br>\t\t\t\t<br>\t\t\t\t\t<br>- 실제 프로젝트를 2주 정도 함께 진행하며&#160;아이디어 실행력과 팀워크를 동시에 검증<br>\t\t\t\t\t<br>- 소비자 대상이면 프로토타입, 기업 대상이면 고객 인터뷰 위주로 빠르게 시험<br>\t\t\t\t<br>\t\t\t\t<br>\t\t\t\t<br>- <br>7.&#160;아이디어 숙성하기<br>\t\t\t\t<br>\t\t\t\t\t<br>- 급히 떠올린 아이디어보다는 오랜 기간 여러 상황에서&#160;계속 떠오르고 마음에 남는 문제가 기회가 될 확률이 높음<br>\t\t\t\t\t<br>- 아이디어를 ‘약불로 오래 끓인다’는 느낌으로 꾸준히 고민<br>\t\t\t\t<br>\t\t\t\t<br>\t\t\t\t<br>- <br>8.&#160;JTBD (Jobs To Be Done) 프레임워크 활용<br>\t\t\t\t<br>\t\t\t\t\t<br>- 사용자가 실제로&#160;무슨 일을 달성하려 하는지(과업)&#160;를 정의<br>\t\t\t\t\t<br>- 기존 솔루션이 충족하지 못하는&#160;핵심 니즈와 불만족 지점을 찾아내는 방식<br>\t\t\t\t<br>\t\t\t\t<br>\t\t\t\t<br>- <br>9.&#160;명확한 비전과 시점 정의하기<br>\t\t\t\t<br>\t\t\t\t\t<br>- “무엇을 언제 어떻게 할 것인가”를 구체적으로 그려야 실행 가능<br>\t\t\t\t\t<br>- 흐릿한 방향성보다,&#160;선택과 집중이 가능한 구체적 로드맵이 필요<br>\t\t\t\t<br>\t\t\t\t<br>\t\t\t\t<br>- 10.&#160;네 가지 검증 기준 적용하기￼아이디어가 충족해야 할 조건을 네 가지로 점검￼1. 기능적 필요가 있는가?￼2. 감정적 만족을 주는가?￼3.&#160;10억 달러 이상 시장 규모가 있는가?￼4. 기존보다&#160;혁신적 사용자 경험을 제공하는가?<br>\t\t\t\t<br>- <br>11.&#160;피드백 루프 가속화하기<br>\t\t\t\t<br>\t\t\t\t\t<br>- 연구만 하지 말고 곧바로&#160;피칭 → 피드백 → 개선&#160;사이클을 돌려야 함<br>\t\t\t\t\t<br>- 대부분의 반응은 잡음이지만, 그 안의&#160;소수의 인사이트가 방향을 정해줌<br>\t\t\t\t<br>\t\t\t\t<br>\t\t\t\t<br>- <br>12.&#160;열정 지속성 검증하기<br>\t\t\t\t<br>\t\t\t\t\t<br>- 스타트업은 장기전이므로, 창업자가&#160;3년, 5년, 7년 후에도 계속 흥미를 느낄 수 있는 문제여야 함<br>\t\t\t\t\t<br>- 단기적 트렌드가 아니라 창업자의&#160;지속적 몰입이 가능한 분야인지 확인<br>\t\t\t\t<br>\t\t\t\t<br>\t\t\t<br>\t\t\t<br><br>\t\t\t출처: <<a href=\"https://news.hada.io/topic?id=22592&utm_source=discord&utm_medium=bot&utm_campaign=280\" target=\"_blank\">https://news.hada.io/topic?id=22592&utm_source=discord&utm_medium=bot&utm_campaign=280</a>> <br>\t\t\t<br><br>\t\t\t<br><br>\t\t<br>\t\t<br>\t\t\t<br><a href=\"https://www.instagram.com/twojob_angel?igsh=MXBoZmxnbTY5a29wNw==\" target=\"_blank\">https://www.instagram.com/twojob_angel?igsh=MXBoZmxnbTY5a29wNw==</a>￼<br>\t\t\t<br><a href=\"https://news.hada.io/topic?id=22379&utm_source=discord&utm_medium=bot&utm_campaign=280\" target=\"_blank\">https://news.hada.io/topic?id=22379&utm_source=discord&utm_medium=bot&utm_campaign=280</a>",
    "w": 400
  }
];

let cards = [];
let moving = null, resizing = null;

function loadBoard() {
  const saved = localStorage.getItem(SAVE_KEY);
  cards = saved ? JSON.parse(saved) : DEFAULT_CARDS.map(c => ({...c}));
  renderCards();
  if (!saved) autoLayout();
}

function autoLayout() {
  const GAP = 14;
  const boardW = document.getElementById('board').offsetWidth;
  const cols = Math.max(1, Math.floor(boardW / 280));
  const colW = (boardW - GAP * (cols - 1)) / cols;
  const colHeights = new Array(cols).fill(0);
  const allCards = document.querySelectorAll('.card');
  const images = document.querySelectorAll('.card img');
  let loaded = 0;
  const total = images.length;

  function place() {
    allCards.forEach((el, i) => {
      const card = cards[i];
      const w = Math.min(card.w || colW, colW);
      let minCol = 0;
      for (let c = 1; c < cols; c++) if (colHeights[c] < colHeights[minCol]) minCol = c;
      card.x = minCol * (colW + GAP);
      card.y = colHeights[minCol];
      card.w = w;
      el.style.left = card.x + 'px';
      el.style.top = card.y + 'px';
      el.style.width = w + 'px';
      colHeights[minCol] = card.y + el.offsetHeight + GAP;
    });
    document.getElementById('board').style.minHeight = Math.max(...colHeights) + 100 + 'px';
    saveBoard();
  }

  if (total === 0) requestAnimationFrame(place);
  else images.forEach(img => {
    if (img.complete) { loaded++; if (loaded >= total) requestAnimationFrame(place); }
    else img.onload = img.onerror = () => { loaded++; if (loaded >= total) requestAnimationFrame(place); };
  });
}

function syncText() {
  document.querySelectorAll('.card').forEach(el => {
    const idx = +el.dataset.idx;
    if (cards[idx]?.type === 'text') {
      const t = el.querySelector('.text');
      if (t) cards[idx].content = t.innerHTML;
    }
  });
}

function saveBoard() {
  syncText();
  localStorage.setItem(SAVE_KEY, JSON.stringify(cards));
  document.getElementById('status').textContent = '저장됨 ' + new Date().toLocaleTimeString();
}

function renderCards() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  cards.forEach((card, i) => {
    const el = document.createElement('div');
    el.className = 'card';
    el.dataset.idx = i;
    if (card.x !== undefined) el.style.left = card.x + 'px';
    if (card.y !== undefined) el.style.top = card.y + 'px';
    if (card.w) el.style.width = card.w + 'px';

    el.addEventListener('mousedown', e => {
      if (e.target.closest('.text, a, .card-btn, .resize-handle, table')) return;
      e.preventDefault();
      moving = { idx: i, startX: e.clientX, startY: e.clientY, origX: card.x || 0, origY: card.y || 0 };
      el.classList.add('moving');
    });

    const actions = document.createElement('div');
    actions.className = 'card-actions';
    const delBtn = document.createElement('button');
    delBtn.className = 'card-btn'; delBtn.textContent = '×';
    delBtn.onclick = e => { e.stopPropagation(); if (confirm('삭제?')) { cards.splice(i, 1); renderCards(); saveBoard(); } };
    actions.appendChild(delBtn);
    el.appendChild(actions);

    if (card.type === 'text') {
      const text = document.createElement('div');
      text.className = 'text';
      text.contentEditable = true;
      text.innerHTML = card.content || '';
      text.addEventListener('blur', () => { card.content = text.innerHTML; saveBoard(); });
      el.appendChild(text);
    } else if (card.type === 'image') {
      const src = card.src.startsWith('http') || card.src.startsWith('data:') ? card.src : IMG_BASE + card.src;
      const img = document.createElement('img');
      img.src = src;
      img.alt = card.alt || '';
      img.loading = 'lazy';
      img.onerror = () => img.style.display = 'none';
      if (card.link) {
        const a = document.createElement('a'); a.href = card.link; a.target = '_blank';
        a.appendChild(img); el.appendChild(a);
      } else { el.appendChild(img); }
      if (card.caption) {
        const cap = document.createElement('div');
        cap.className = 'caption';
        cap.textContent = card.caption;
        el.appendChild(cap);
      }
    } else if (card.type === 'table') {
      const wrapper = document.createElement('div');
      wrapper.style.overflowX = 'auto';
      wrapper.innerHTML = card.html || '';
      el.appendChild(wrapper);
    }

    const rh = document.createElement('div');
    rh.className = 'resize-handle';
    rh.addEventListener('mousedown', e => {
      e.preventDefault(); e.stopPropagation();
      resizing = { idx: i, startX: e.clientX, startW: card.w || el.offsetWidth };
    });
    el.appendChild(rh);
    board.appendChild(el);
  });

  requestAnimationFrame(() => {
    let maxBottom = 0;
    document.querySelectorAll('.card').forEach(el => {
      const b = (parseFloat(el.style.top) || 0) + el.offsetHeight;
      if (b > maxBottom) maxBottom = b;
    });
    board.style.minHeight = (maxBottom + 100) + 'px';
  });
}

document.addEventListener('mousemove', e => {
  if (moving) {
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`);
    if (!el) return;
    const nx = moving.origX + e.clientX - moving.startX;
    const ny = moving.origY + e.clientY - moving.startY;
    el.style.left = nx + 'px';
    el.style.top = ny + 'px';
  }
  if (resizing) {
    const card = cards[resizing.idx];
    card.w = Math.max(100, resizing.startW + e.clientX - resizing.startX);
    const el = document.querySelector(`.card[data-idx="${resizing.idx}"]`);
    if (el) el.style.width = card.w + 'px';
  }
});

document.addEventListener('mouseup', e => {
  if (moving) {
    const card = cards[moving.idx];
    card.x = Math.max(0, moving.origX + e.clientX - moving.startX);
    card.y = Math.max(0, moving.origY + e.clientY - moving.startY);
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`);
    if (el) { el.classList.remove('moving'); }
    moving = null; saveBoard();
  }
  if (resizing) { resizing = null; saveBoard(); }
});

function addTextCard() {
  cards.push({ type: 'text', content: '', x: 50, y: window.scrollY + 100, w: 300 });
  renderCards();
  setTimeout(() => { const els = document.querySelectorAll('.card .text'); els[els.length - 1]?.focus(); }, 100);
}

function addImageCard() {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = 'image/*';
  input.onchange = e => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = () => { cards.push({ type: 'image', src: reader.result, x: 50, y: window.scrollY + 100, w: 240 }); renderCards(); saveBoard(); };
    reader.readAsDataURL(file);
  };
  input.click();
}

function resetLayout() {
  if (!confirm('자동 재배치합니다. 현재 위치가 변경됩니다.')) return;
  cards.forEach(c => { delete c.x; delete c.y; });
  renderCards(); autoLayout();
}

setInterval(saveBoard, 30000);
loadBoard();
</script>
</body>
</html>
