<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Golf</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #1e1e1e;
  color: #e0e0e0;
  font-family: 'Segoe UI', -apple-system, sans-serif;
  font-size: 15px;
  line-height: 1.6;
  padding: 20px 30px 60px;
  overflow-x: hidden;
}
a { color: #6cb0f6; text-decoration: none; }
a:hover { text-decoration: underline; }
.title-bar {
  background: #3a3a5c;
  display: inline-block;
  padding: 6px 16px;
  font-size: 22px;
  font-weight: bold;
  color: #fff;
  margin-bottom: 4px;
}
.date { color: #999; font-size: 13px; margin-bottom: 20px; }
.board { position: relative; }
.card {
  background: #2a2a2a;
  border: 1px solid #3a3a3a;
  border-radius: 8px;
  padding: 12px;
  position: absolute;
  cursor: grab;
  transition: box-shadow 0.15s;
  overflow: hidden;
}
.card:hover { box-shadow: 0 0 0 1px #58a6ff; z-index: 10; }
.card.moving { opacity: 0.8; box-shadow: 0 4px 24px rgba(0,0,0,0.6); z-index: 100; cursor: grabbing; }
.card img { width: 100%; border-radius: 4px; display: block; }
.card .caption { font-size: 12px; color: #888; margin-top: 6px; }
.card .text { outline: none; min-height: 20px; white-space: pre-wrap; word-break: break-word; }
.card .text:focus { background: rgba(255,255,255,0.05); border-radius: 4px; padding: 4px; }
.card .text:empty::before { content: '텍스트 입력...'; color: #555; }
.card table { border-collapse: collapse; width: 100%; font-size: 13px; }
.card table td, .card table th { border: 1px solid #444; padding: 4px 8px; vertical-align: top; }
.card table th { background: #333; color: #ccc; }
.card-actions { position: absolute; top: 4px; right: 4px; display: none; gap: 4px; }
.card:hover .card-actions { display: flex; }
.card-btn { background: #333; border: 1px solid #555; color: #ccc; border-radius: 4px; padding: 2px 6px; font-size: 11px; cursor: pointer; }
.card-btn:hover { background: #444; color: #fff; }
.resize-handle { position: absolute; bottom: 0; right: 0; width: 16px; height: 16px; cursor: se-resize; opacity: 0; }
.card:hover .resize-handle { opacity: 0.6; }
.resize-handle::after { content: ''; position: absolute; bottom: 3px; right: 3px; width: 8px; height: 8px; border-right: 2px solid #666; border-bottom: 2px solid #666; }
.toolbar { position: fixed; bottom: 0; left: 0; right: 0; background: #161b22; border-top: 1px solid #30363d; padding: 8px 20px; display: flex; gap: 12px; align-items: center; z-index: 200; }
.toolbar button { background: #21262d; border: 1px solid #30363d; color: #e0e0e0; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; }
.toolbar button:hover { background: #30363d; }
.toolbar .status { color: #8b949e; font-size: 12px; margin-left: auto; }
.highlight-red { color: #ff6b6b; }
.highlight-blue { color: #6cb0f6; }
</style>
</head>
<body>
<div class="title-bar">Golf</div>
<div class="date">Invalid Date</div>
<div class="board" id="board"></div>
<div class="toolbar">
  <button onclick="addTextCard()">+ 텍스트</button>
  <button onclick="addImageCard()">+ 이미지</button>
  <button onclick="saveBoard()">💾 저장</button>
  <button onclick="resetLayout()">↺ 재배치</button>
  <span class="status" id="status">Ready</span>
</div>
<script>
const SAVE_KEY = 'board-Golf';
const IMG_BASE = '../../attachments/';
const DEFAULT_CARDS = [
  {
    "type": "text",
    "content": "Golf<br>\t\t<br>\t\t<br>\t<br>\t<br>\t\t<br>\t\t\t<br>A: 임규영 / C: 김현오<br>\t\t\t<br><br>\t\t\t<br>아이언: 비거리, 직진성 강화<br>\t\t\t<br>✅ 1. 어드레스 (Address)<br>\t\t\t<br>\t\t\t\t<br>- 상체 최대한 숙여서 어드레스 (왼쪽 어깨 내리는 보정동작 방지)<br>\t\t\t\t<br>- 왼팔을 곧게 펴서 타점 변동 최소화<br>\t\t\t\t<br><br>\t\t\t<br>\t\t\t<br><br>\t\t\t<br>&#128257; 2. 테이크백 (Takeaway & Backswing)<br>\t\t\t<br>체중이동과 어깨 동작<br>\t\t\t<br>\t\t\t\t<br>- 테이크백 시, 상체가 들리는데. 왼쪽 어깨가 턱 밑으로 들어오고 머리는 고정<br>\t\t\t\t<br>- 오른손 돌리지 말고, 그대로 우측으로 쭉 들어서 오른팔꿈치를 이격시키기<br>\t\t\t\t<br>오른손은 명치 위치, 클럽은 너무 눕지 않게(타격 후 반대편도 동일하게)<br>\t\t\t\t<br>- 명치가 바닥보며 명치와 팔이 같이 회전 하면서, 오른편으로 살짝 체중/상체 이동하며 테이크백 시작<br>\t\t\t\t<br>- 왼쪽 어깨가 오른쪽 허벅지 위에 들어올 정도로 무게중심 이동<br>\t\t\t\t<br>- 왼쪽 어깨는 턱 아래로, 오른쪽 어깨와 수평 교대, 머리는 고정<br>\t\t\t\t<br>- 왼쪽으로 명치 바닥보며 명치와 팔이 같이 회전<br>\t\t\t<br>\t\t\t<br>클럽 동작<br>\t\t\t<br>\t\t\t\t<br>- 팔과 클럽을 수평으로 멀리 들어올리면서 손목 코킹 (채찍처럼 위로 던지는 느낌)<br>\t\t\t\t<br>→ 팔꿈치 각도 90도 + 몸에 붙지 않게 이격<br>\t\t\t\t<br>- 코킹 시 손등은 바닥을 보고, 측면으로 90도로 꺽고, 클럽 샤프트가 머리 뒤쪽 위치 (너무 눕히지 말 것)<br>\t\t\t\t<br>- 직각삼각형 형태로 세우고, 손-팔-어깨 삼각형 유지 (드라이버와 다르게)<br>\t\t\t\t<br>- 오른 손바닥에 그립이 얹어지게 & 왼 손등이 바깥쪽을 보도록 살짝 회전<br>\t\t\t\t<br>- 탑에서 너무 뒤로 쳐지지 않게, 채 끝이 공을 향하게 세우기<br>\t\t\t\t<br>- 뒤로 빼지 말고, 수평으로 멀리 들어올리면서 손목 이용 코킹 채찍처럼 위로 던지는 느낌으로 코킹 & 레깅, 팔 90도<br>\t\t\t<br>\t\t\t<br><br>\t\t\t<br>&#128165; 3. 스윙 (Downswing & Impact)<br>\t\t\t<br>골반 주도<br>\t\t\t<br>\t\t\t\t<br>- 스윙보다 앞서서 왼쪽 골반 크게 뒤로 빼면서 골반으로 타격<br>\t\t\t\t<br>- 손은 따라온다고 생각하기<br>\t\t\t\t<br>- 손목이 허벅지 위로 가깝게 들어오면서 골반이 피해줘야 함<br>\t\t\t<br>\t\t\t<br>손과 팔 동작<br>\t\t\t<br>\t\t\t\t<br>- 오른손으로 던지듯이, 오른팔을 쭉 펴면서. 타격 시점에는 팔이 완전히 펴지도록<br>\t\t\t\t<br>+ 골반회전과 동시에 타격<br>\t\t\t\t<br>- 상체와 어깨 떨어지지 않게, 팔만 스윙<br>\t\t\t\t<br>- 코킹 상태에서 (손목 꺽지 말고) 그대로 오른쪽 뒷꿈치로 끌고 내려오면서 + 오른쪽 허리 접히면서. 왼쪽 골반 회전하면서 타격<br>\t\t\t\t<br>- 왼쪽 세 손가락이 오른쪽 허벅지를 스치듯이 내려오면서 헤드가 낮아지게<br>\t\t\t\t<br>- 탑에서부터 왼손을 오픈하면서 내려오고, 헤드(팔과 어깨)가 지나간 직후 상체 회전<br>\t\t\t\t<br>- 왼손 리드보다는 오른손 리드로 타격<br>\t\t\t\t<br>- 손목 전환 + (어깨 고정) 팔만 이용해서 던지기, 오른손 이용해서 헤드가 몸을 먼저 지나가게<br>\t\t\t\t<br>- 손등이 공을 보면서 회전, 엄지손가락이 ㅗ 모양으로 우에서 좌로 회전<br>\t\t\t\t<br>- 오른쪽 어깨 내리지 말고, 어깨와 손 분리해서, 손이 아래로 떨어지게<br>\t\t\t\t<br>- 팔꿈치 안쪽이 하늘을 향하도록 하며, 치킨윙 방지<br>\t\t\t<br>\t\t\t<br>스윙 궤적<br>\t\t\t<br>\t\t\t\t<br>헤드가 낮게 공에 접근하고, 그립 끝이 바닥을 향하면서 채찍처럼 스윙<br>\t\t\t\t<br>- 1시 방향으로 던지면서 바깥쪽으로 접기<br>\t\t\t\t<br>- 내려올 때 궤적이 1시 방향이어야, 1시로 던져짐<br>\t\t\t\t<br>- 오른쪽 어깨 내리지 말고 타겟 방향으로 바로 올라가기<br>\t\t\t\t<br>- 그립 끝이 바닥/공을 보면서 코킹한 각도 그대로 내려오면서 왼손등을 멀리 밀어서 1시방향으로 던지는 느낌<br>\t\t\t\t<br>- 단, 골반보다 손이 빠르게 가야 함<br>\t\t\t<br>\t\t\t<br>주의사항<br>\t\t\t<br>\t\t\t\t<br>- 오른손 너무 써서 덤비지 말기<br>\t\t\t\t<br>- 손목을 바깥쪽으로 꺽지 말고 타겟 방향으로 던지기<br>\t\t\t\t<br>- 치킨윙 방지: 팔꿈치 안쪽이 하늘 보도록 빠르게 돌려주기<br>\t\t\t\t<br>- 상체는 나가지 말고 일어서지 말고 회전<br>\t\t\t\t<br>- 오른쪽 어깨가 내려갔다 올라오지 말고, 타겟 방향으로 바로 올라가면서 스윙, 1시 방향<br>\t\t\t\t<br>- 치킨윙 안되게 팔꿈치 안쪽이 하늘 보도록 빠르게 돌려주기<br>\t\t\t<br>\t\t\t<br><br>\t\t\t<br>4. 임팩트 & 팔로우스루<br>\t\t\t<br>임팩트<br>\t\t\t<br>\t\t\t\t<br>- 어깨는 내리지 않고, 손은 1시 방향으로 아래로 떨어지도록, 클럽 헤드는 바닥에서 공 쪽으로 이동<br>\t\t\t\t<br>- Hook 날만큼 오른팔로 왼팔 덮으면서 타격<br>\t\t\t\t<br>- 왼쪽 벽을 느끼면서 팔만 스윙<br>\t\t\t\t<br>- 골반보다 손이 먼저 나가야 함<br>\t\t\t<br>\t\t\t<br>팔로우스루<br>\t\t\t<br>\t\t\t\t<br>- 왼팔은 11시 방향으로 접어올리고, 오른팔은 펴기<br>\t\t\t\t<br>- 왼쪽 벽(왼쪽 체중 지지선)을 유지하면서, 오른쪽 골반 회전￼→ 임팩트 후 오른 엉덩이 보이도록<br>\t\t\t\t<br>- 발은 자연스럽게 따라오게<br>\t\t\t\t<br>- 대칭 스윙(공이 팔 사이에 껴있다고 생각하고)으로 팔을 빨리 접어 올리기<br>\t\t\t\t<br>- 손목을 왼쪽으로 돌려서 손등이 바닥을 보면서, 우측 대각선(1시) 방향으로 크게 던지기<br>\t\t\t\t<br><br>\t\t\t<br>\t\t\t<br><br>\t\t\t<br>&#127744; 5. 피니시 (Finish)<br>\t\t\t<br>\t\t\t\t<br>- 클럽 끝이 왼쪽 벽을 찌른다는 느낌으로 왼팔을 접어 올리기<br>\t\t\t\t<br>- 뒤통수에 클럽 들어오게<br>\t\t\t\t<br>- 골반 완전히 회전하고 피니시 후 3초간 유지하며 균형 감각 익히기<br>\t\t\t\t<br>- 힙턴 시 왼쪽으로 빠지지 말고 고정 상태에서 스윙 이후 자연스럽게 턴<br>\t\t\t<br>\t\t\t<br><br>\t\t\t<br>6. 특수 상황 대응<br>\t\t\t<br>탄도 조절<br>\t\t\t<br>\t\t\t\t<br>- 탄도가 너무 뜰 때는 왼쪽 어깨까지만 끊어서 스윙<br>\t\t\t<br>\t\t\t<br>방향성 개선<br>\t\t\t<br>\t\t\t\t<br>- 너무 앞으로 길게 밀어서 왼쪽으로 가는 경향 방지<br>\t\t\t\t<br>- 샤프트가 머리 뒤에 위치하도록 끊어치기<br>\t\t\t\t<br>-> 너무 앞으로 길게 밀어서 왼쪽으로 가는 경향 발생.<br>\t\t\t<br>\t\t\t<br>핵심은 골반 주도의 스윙과 1시 방향 궤적, 그리고 각 단계별 정확한 동작 순서를 지키는 것입니다.<br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br>드라이버: 살짝 Hook 나면서 돌아 들어옴. 탄도가 너무 높음<br>\t\t\t<br>✅ 어드레스 (Address)<br>\t\t\t<br>스탠스<br>\t\t\t<br>\t\t\t\t<br>- 양 발을 살짝 대각선으로 벌리고 스탠스 취하기<br>\t\t\t\t<br>- 발에 하중을 싣고 준비<br>\t\t\t\t<br>- 어깨는 평형 유지, 손 위치는 왼쪽으로 너무 치우치지 않게 자연스럽게 툭 내려놓기<br>\t\t\t\t<br><br>\t\t\t<br>\t\t\t<br><br>\t\t\t<br>클럽 세팅<br>\t\t\t<br>\t\t\t\t<br>- 채를 툭 내려놓고, 스퀘어보다 살짝 열린 듯한 느낌 유지<br>\t\t\t\t<br>- 배꼽과 클럽 사이에 주먹 하나 정도 간격 확보<br>\t\t\t\t<br>- 어깨 평형, 손 위치 툭 내려놓고 왼쪽으로 너무 치우치지 않게<br>\t\t\t<br>\t\t\t<br><br>\t\t\t<br>✅ 테이크백 (Takeback)<br>\t\t\t<br>팔 동작<br>\t\t\t<br>\t\t\t\t<br>- 오른팔을 허리까지 든다는 생각으로 멀리 들어올리기<br>\t\t\t\t<br>- 리듬감 있게 테이크백, 손목은 낮게 유지<br>\t\t\t\t<br>- 오른쪽 허벅지를 스치듯 올라가며 오른팔에 래깅 감각 만들기<br>\t\t\t\t<br>- 끊기지 않게 리듬감 유지하면서 테이크백<br>\t\t\t<br>\t\t\t<br>체중이동<br>\t\t\t<br>\t\t\t\t<br>- 테이크백 시 오른발 휘지 않게 주의<br>\t\t\t\t<br>- 뒤로 헤드 누우면서 떨어지는 궤적 그리기<br>\t\t\t\t<br>- 아이언과 달리 채가 길어서 드라이버는 더 누운채로 들어옴<br>\t\t\t<br>\t\t\t<br><br>\t\t\t<br>✅ 스윙 (Swing) - 다운스윙 전환<br>\t\t\t<br>✔ 전환 및 하체 리드<br>\t\t\t<br>\t\t\t\t<br>- 왼쪽 무릎을 지긋이 눌러주며 바깥으로 회전, 동시에 왼쪽 골반은 (바깥쪽 말고) 뒤로 회전<br>\t\t\t\t<br>- 오른쪽 발 안쪽이 지긋이 눌리면서 왼쪽 허리에 텐션 생성<br>\t\t\t\t<br>- 왼쪽 무릎을 지긋이 누르면서 왼쪽 바깥으로 회전 + 동시에 왼쪽 골반은 (바깥쪽 말고) 뒤로 회전<br>\t\t\t\t<br>- 왼팔은 쭉 뻗으면서, 오른팔을 펼치면서<br>\t\t\t\t<br>그립 끝이 공을 바라보게 내려오면서 헤드를 던져서 타격<br>\t\t\t\t<br>- 오른쪽 허벅지를 스친다는 느낌으로 그립부터 잡아 내려야함<br>\t\t\t\t<br>- 오른쪽 발 안쪽이 지긋이 눌리면서 왼쪽 허리에 텐션이 생겼을때, 그걸 가지고 스윙<br>\t\t\t\t<br>- 허리쯤에서 오른팔 → 왼팔로 전환 + 동시에 왼쪽 골반은 뒤로 회전<br>\t\t\t\t<br>- 왼쪽 어깨를 닫은 상태에서, 골반이 1cm이라도 회전하고 난 후에 왼쪽 어깨 열기<br>\t\t\t<br>\t\t\t<br>✔ 임팩트 전후<br>\t\t\t<br>\t\t\t\t<br>- 팔로만 치지 않고 골반 회전 주도 + 상하체 분리 유지<br>\t\t\t\t<br>- 왼발을 쭉 뻗어 중심 고정, 턴 시 양발이 왼쪽으로 쏠리며 왼쪽 뒷꿈치에 체중 이동<br>\t\t\t\t<br>- 오른쪽 어깨가 과하게 들리지 않게 주의 + 왼쪽 어깨가 턱 밑으로 들어왔다가 빠짐<br>\t\t\t\t<br>- 스윙은 공을 치고 끝내지말고 지나가게 + 치킨윙 안되게 왼쪽으로 확실하게 돌면서 팔 1시 방향으로 멀리 접어올리기<br>\t\t\t<br>\t\t\t<br>✔ 임팩트 및 피니시<br>\t\t\t<br>\t\t\t\t<br>- 타격 순간 왼손등이 공을 향하고 폴 끝은 바닥 향하도록<br>\t\t\t\t<br>- 팔은 L자로 꺾여 위로 올리며, 오른발은 뒤늦게 따라오게<br>\t\t\t\t<br>- 피니시는 공을 끝내는 것이 아니라 지나가듯 스윙하며, 팔은 1시 방향으로 멀리 접어올리기<br>\t\t\t\t<br>- 치킨윙 방지: 팔을 접지 않고 멀리 던지는 듯한 느낌으로 피니시<br>\t\t\t<br>\t\t\t<br><br>\t\t\t<br>✅ 4. 스윙 (Swing)<br>\t\t\t<br>상하체 분리<br>\t\t\t<br>\t\t\t\t<br>- 어깨는 고정하고 팔로만 스윙<br>\t\t\t\t<br>- 골반을 돌리면서 상하체 분리, 골반과 팔만 돌아가게<br>\t\t\t\t<br>- 왼발을 쭉 뻗어서 스윙<br>\t\t\t<br>\t\t\t<br>가속과 래깅<br>\t\t\t<br>\t\t\t\t<br>- 채찍처럼 래깅해서 오른팔을 부드럽게<br>\t\t\t\t<br>- 레깅, 타격전까지 최대 가속도로, 칠 때 가장 빠르게 가속<br>\t\t\t<br>\t\t\t<br>손목과 팔 동작<br>\t\t\t<br>\t\t\t\t<br>- 오른쪽 허벅지 스치면서 손목 회전<br>\t\t\t\t<br>- 오른쪽 허벅지를 스친다는 느낌으로 그립부터 잡아 내리기<br>\t\t\t\t<br>- 타격 시 왼팔이 올라오는데 손목을 낮게 유지하면서 손목 스위칭<br>\t\t\t\t<br>- 오른손목이 위로 전환 하되 너무 많이 꺽으면 훅 발생 주의<br>\t\t\t<br>\t\t\t<br><br>\t\t\t<br>5. 임팩트 & 팔로우스루<br>\t\t\t<br>임팩트<br>\t\t\t<br>\t\t\t\t<br>- 왼쪽 손등이 공을 향하고, 폴 끝 부분이 바닥을 향하도록<br>\t\t\t\t<br>- 우측 뒷꿈치에 무게 옮기며 타격<br>\t\t\t\t<br>- 골반 먼저 돌면서 타격<br>\t\t\t<br>\t\t\t<br>팔로우스루<br>\t\t\t<br>\t\t\t\t<br>- 타격과 동시에 왼쪽에 벽이 있다고 생각하고 팔을 L자로 꺽어 올리면서 피니시까지<br>\t\t\t\t<br>- 치킨윙 안되게 1시방향으로 멀리 던지기<br>\t\t\t\t<br>- 스윙은 공을 치고 끝내지 말고 지나가게<br>\t\t\t<br>\t\t\t<br><br>\t\t\t<br>6. 피니시 (Finish)<br>\t\t\t<br>어깨와 발 동작<br>\t\t\t<br>\t\t\t\t<br>- 오른쪽 어깨가 너무 들리지 않으면서 턱밑으로 들어오게<br>\t\t\t\t<br>- 오른발은 팔이 올라온 뒤, 늦게 따라오게<br>\t\t\t\t<br>- 턴할 때는 골반보다는 양 발이 왼쪽으로 쏠리면서 왼쪽 뒷꿈치로 무게 이동<br>\t\t\t<br>\t\t\t<br>최종 자세<br>\t\t\t<br>\t\t\t\t<br>- 치킨윙 안되게 왼쪽으로 확실하게 돌면서 팔 1시 방향으로 멀리 접어올리기<br>\t\t\t\t<br>- 오른발은 팔이 올라온 뒤, 늦게 따라오게<br>\t\t\t\t<br>- 턱밑에 왼쪽 어깨 들어왔다가 떨어지면서 완료<br>\t\t\t<br>\t\t\t<br><br>\t\t\t<br>✅ 추가 보정 팁<br>\t\t\t<br>탄도 조절<br>\t\t\t<br>\t\t\t\t<br>- 탄도 높은 거 보정: 타격 시점에 왼손 등을 바깥쪽으로 좀더 말고<br>\t\t\t\t<br>당구(오시) 상단을 맞춘다는 생각으로 타격<br>\t\t\t<br>\t\t\t<br>핵심 포인트<br>\t\t\t<br>\t\t\t\t<br>- 손목 전환은 테이크백과 비슷한 리듬으로, 일정한 스피드 유지<br>\t\t\t\t<br>- 드라이버는 아이언보다 더 선채로 치므로 누운채로 들어옴을 인식<br>\t\t\t\t<br>- 상하체 분리와 골반 주도의 스윙이 핵심<br>\t\t\t<br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br>\t\t\t\t<br>\t\t\t\t\t어프로치<br>\t\t\t\t\t<br>10~20m: 볼은 오른발 앞, 체중의 70%를 왼쪽에 싣고, 페이스 살짝 닫기<br>\t\t\t\t\t<br>테이크백을 우측 상단 대각선 방향으로<br>\t\t\t\t\t<br>스탠스는 양발 붙이고 왼발을 살짝 열면서 뒤로, 오른쪽 무릎까지 만 테 let cards = [];
let moving = null, resizing = null;

function loadBoard() {
  const saved = localStorage.getItem(SAVE_KEY);
  cards = saved ? JSON.parse(saved) : DEFAULT_CARDS.map(c => ({...c}));
  renderCards();
  if (!saved) autoLayout();
}

function autoLayout() {
  const GAP = 14;
  const boardW = document.getElementById('board').offsetWidth;
  const cols = Math.max(1, Math.floor(boardW / 280));
  const colW = (boardW - GAP * (cols - 1)) / cols;
  const colHeights = new Array(cols).fill(0);
  const allCards = document.querySelectorAll('.card');
  const images = document.querySelectorAll('.card img');
  let loaded = 0;
  const total = images.length;

  function place() {
    allCards.forEach((el, i) => {
      const card = cards[i];
      const w = Math.min(card.w || colW, colW);
      let minCol = 0;
      for (let c = 1; c < cols; c++) if (colHeights[c] < colHeights[minCol]) minCol = c;
      card.x = minCol * (colW + GAP);
      card.y = colHeights[minCol];
      card.w = w;
      el.style.left = card.x + 'px';
      el.style.top = card.y + 'px';
      el.style.width = w + 'px';
      colHeights[minCol] = card.y + el.offsetHeight + GAP;
    });
    document.getElementById('board').style.minHeight = Math.max(...colHeights) + 100 + 'px';
    saveBoard();
  }

  if (total === 0) requestAnimationFrame(place);
  else images.forEach(img => {
    if (img.complete) { loaded++; if (loaded >= total) requestAnimationFrame(place); }
    else img.onload = img.onerror = () => { loaded++; if (loaded >= total) requestAnimationFrame(place); };
  });
}

function syncText() {
  document.querySelectorAll('.card').forEach(el => {
    const idx = +el.dataset.idx;
    if (cards[idx]?.type === 'text') {
      const t = el.querySelector('.text');
      if (t) cards[idx].content = t.innerHTML;
    }
  });
}

function saveBoard() {
  syncText();
  localStorage.setItem(SAVE_KEY, JSON.stringify(cards));
  document.getElementById('status').textContent = '저장됨 ' + new Date().toLocaleTimeString();
}

function renderCards() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  cards.forEach((card, i) => {
    const el = document.createElement('div');
    el.className = 'card';
    el.dataset.idx = i;
    if (card.x !== undefined) el.style.left = card.x + 'px';
    if (card.y !== undefined) el.style.top = card.y + 'px';
    if (card.w) el.style.width = card.w + 'px';

    el.addEventListener('mousedown', e => {
      if (e.target.closest('.text, a, .card-btn, .resize-handle, table')) return;
      e.preventDefault();
      moving = { idx: i, startX: e.clientX, startY: e.clientY, origX: card.x || 0, origY: card.y || 0 };
      el.classList.add('moving');
    });

    const actions = document.createElement('div');
    actions.className = 'card-actions';
    const delBtn = document.createElement('button');
    delBtn.className = 'card-btn'; delBtn.textContent = '×';
    delBtn.onclick = e => { e.stopPropagation(); if (confirm('삭제?')) { cards.splice(i, 1); renderCards(); saveBoard(); } };
    actions.appendChild(delBtn);
    el.appendChild(actions);

    if (card.type === 'text') {
      const text = document.createElement('div');
      text.className = 'text';
      text.contentEditable = true;
      text.innerHTML = card.content || '';
      text.addEventListener('blur', () => { card.content = text.innerHTML; saveBoard(); });
      el.appendChild(text);
    } else if (card.type === 'image') {
      const src = card.src.startsWith('http') || card.src.startsWith('data:') ? card.src : IMG_BASE + card.src;
      const img = document.createElement('img');
      img.src = src;
      img.alt = card.alt || '';
      img.loading = 'lazy';
      img.onerror = () => img.style.display = 'none';
      if (card.link) {
        const a = document.createElement('a'); a.href = card.link; a.target = '_blank';
        a.appendChild(img); el.appendChild(a);
      } else { el.appendChild(img); }
      if (card.caption) {
        const cap = document.createElement('div');
        cap.className = 'caption';
        cap.textContent = card.caption;
        el.appendChild(cap);
      }
    } else if (card.type === 'table') {
      const wrapper = document.createElement('div');
      wrapper.style.overflowX = 'auto';
      wrapper.innerHTML = card.html || '';
      el.appendChild(wrapper);
    }

    const rh = document.createElement('div');
    rh.className = 'resize-handle';
    rh.addEventListener('mousedown', e => {
      e.preventDefault(); e.stopPropagation();
      resizing = { idx: i, startX: e.clientX, startW: card.w || el.offsetWidth };
    });
    el.appendChild(rh);
    board.appendChild(el);
  });

  requestAnimationFrame(() => {
    let maxBottom = 0;
    document.querySelectorAll('.card').forEach(el => {
      const b = (parseFloat(el.style.top) || 0) + el.offsetHeight;
      if (b > maxBottom) maxBottom = b;
    });
    board.style.minHeight = (maxBottom + 100) + 'px';
  });
}

document.addEventListener('mousemove', e => {
  if (moving) {
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`);
    if (!el) return;
    const nx = moving.origX + e.clientX - moving.startX;
    const ny = moving.origY + e.clientY - moving.startY;
    el.style.left = nx + 'px';
    el.style.top = ny + 'px';
  }
  if (resizing) {
    const card = cards[resizing.idx];
    card.w = Math.max(100, resizing.startW + e.clientX - resizing.startX);
    const el = document.querySelector(`.card[data-idx="${resizing.idx}"]`);
    if (el) el.style.width = card.w + 'px';
  }
});

document.addEventListener('mouseup', e => {
  if (moving) {
    const card = cards[moving.idx];
    card.x = Math.max(0, moving.origX + e.clientX - moving.startX);
    card.y = Math.max(0, moving.origY + e.clientY - moving.startY);
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`);
    if (el) { el.classList.remove('moving'); }
    moving = null; saveBoard();
  }
  if (resizing) { resizing = null; saveBoard(); }
});

function addTextCard() {
  cards.push({ type: 'text', content: '', x: 50, y: window.scrollY + 100, w: 300 });
  renderCards();
  setTimeout(() => { const els = document.querySelectorAll('.card .text'); els[els.length - 1]?.focus(); }, 100);
}

function addImageCard() {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = 'image/*';
  input.onchange = e => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = () => { cards.push({ type: 'image', src: reader.result, x: 50, y: window.scrollY + 100, w: 240 }); renderCards(); saveBoard(); };
    reader.readAsDataURL(file);
  };
  input.click();
}

function resetLayout() {
  if (!confirm('자동 재배치합니다. 현재 위치가 변경됩니다.')) return;
  cards.forEach(c => { delete c.x; delete c.y; });
  renderCards(); autoLayout();
}

setInterval(saveBoard, 30000);
loadBoard();
</script>
</body>
</html>
