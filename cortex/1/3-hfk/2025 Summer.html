통한 지속가능한 변화 달성<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>토론 질문 1-5<br>\t\t\t\t\t<br>\t\t\t\t\t\t<br>- 우리 조직에서 가장 빈번하게 발생하는 갈등의 유형은 무엇이며, 이를 갈등지능의 4가지 핵심 역량 중 어떤 것으로 가장 효과적으로 해결할 수 있을까요?<br>\t\t\t\t\t\t<br>- 기초 다지기 원칙을 적용할 때, 갈등이 본격화되기 전에 우리가 미리 구축해야 할 '신뢰 구축 메커니즘'은 구체적으로 무엇일까요?<br>\t\t\t\t\t\t<br>- 팀 쿡의 사례처럼 '규율과 창의성의 균형'을 맞춰야 하는 상황을 겪어본 적이 있나요? 그때 어떤 접근방식을 사용했고, 갈등지능 관점에서 보완할 점은 무엇일까요?<br>\t\t\t\t\t\t<br>- 갈등지능과 감성지능의 차이를 이해한 후, 현재 나의 리더십 스타일은 어느 쪽에 더 치우쳐 있으며, 갈등 상황에서 어떤 역량을 더 개발해야 할까요?<br>\t\t\t\t\t\t<br>- 마크 베니오프의 '윤리적 발판' 사례처럼, 우리 조직에서 논란이 되는 이슈들을 다루기 위한 제도적 프레임워크를 만든다면 어떤 요소들이 포함되어야 할까요?<br>\t\t\t\t\t<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>토론 질문 6-10<br>\t\t\t\t\t<br>\t\t\t\t\t\t<br>- '세대에 걸친 평화 지향하기' 원칙을 조직 경영에 적용한다면, 단기 성과 압박과 장기적 조직 문화 구축 사이의 균형을 어떻게 맞출 수 있을까요?<br>\t\t\t\t\t\t<br>- 갈등이 '에너지, 혁신, 성장의 잠재적 원천'이 된 경험이 있나요? 그 과정에서 갈등을 건설적으로 활용하기 위해 가장 중요했던 요소는 무엇이었나요?<br>\t\t\t\t\t\t<br>- 아티사리의 '협력의 섬' 개념을 우리 조직에 적용한다면, 갈등하는 부서나 팀 간에 어떤 공동 프로젝트를 설계할 수 있을까요?<br>\t\t\t\t\t\t<br>- 갈등 상황에서 '기회를 포착하기' 위해서는 어떤 신호들을 주의 깊게 관찰해야 하며, 예상치 못한 돌파구를 만들어낸 개인적 경험이 있다면 공유해 주세요.<br>\t\t\t\t\t\t<br>- 하루 20억 달러의 갈등 비용이라는 통계를 보면서, 우리 조직에서 갈등으로 인한 숨겨진 비용들(생산성 저하, 인재 이탈, 혁신 저해 등)을 구체적으로 측정하고 개선한다면 어떤 방법을 사용할 수 있을까요?<br>\t\t\t\t\t<br>\t\t\t\t\t<br><br>\t\t\t\t\t출처: <<a href=\"https://claude.ai/chat/1032d598-a08d-4c07-a981-2bd582217a7d\" target=\"_blank\">https://claude.ai/chat/1032d598-a08d-4c07-a981-2bd582217a7d</a>> <br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>\t\t\t\t<br>\t\t\t\t<br>\t\t\t\t\t<br>인사조직<br>\t\t\t\t\t<br>모호한 위협은 직원들을 침묵시킨다<br>\t\t\t\t\t<a href=\"https://www.hbrkorea.com/upload_dir/source/HBR_Daily/Apr25_05_1389473271.jpg\" target=\"_blank\">\t\t\t\t\t\t\t\t\t\t\t</a><br><br>\t\t\t\t\t<br>조직에서 위협은 ‘명확한 위협’과 ‘모호한 위협’의 두 가지 형태를 취한다. 명확한 위협은 분명하고 즉각적이다. 화학 공장에서 경보 시스템을 통해 위험한 가스 누출을 감지했다고 상상해 보자. 문제가 명확하다. 대응 방법도 쉽게 파악할 수 있다. 시설을 대피시키고 누출 부위를 막는 것이다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>그러나&#160;<a href=\"https://tinyurl.com/mr23cdhp\" target=\"_blank\">모호한 위협은</a>&#160;인지하고 해결하기가 더 어렵다. 같은 공장의 작업자들이 특정 구역에서 희미하고 간헐적인 악취를 감지했다고 상상해 보자. 일부는 사소한 가스 누출을 의심한다. 다른 일부는 정상 작동 시 발생하는 잔류 연기라고 생각한다. 센서에 이상 수치가 나타나지 않고 검사 결과 눈에 보이는 문제가 발견되지 않았다. 즉각적인 위험은 없지만 시간이 지나면서 경미한 증상과 불편을 호소하는 직원이 늘어난다. 신호가 혼재돼 있어 최선의 조치가 불분명하다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>명확한 위협은 신속한 조치로 이어지는 경우가 많지만 모호한 위협은 틈새로 빠져나가 버리기 쉽다. 그렇기 때문에 사람들이 모호한 위협의 불확실한 경고 신호를 어떻게 이해하는지, 왜 행동을 주저하는지에 대해 이해하는 것이 중요하다. 처음에는 분명하지 않지만 심각한 피해를 야기할 수 있는 이러한 종류의 위협에 대비하기 위해 조직이 무엇을 할 수 있는지도 이해할 필요가 있다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>모호한 위협에 대처하기 어려운 이유<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><a href=\"https://psycnet.apa.org/record/2024-84505-001\" target=\"_blank\">필자들의 연구</a>&#160;결과 모호한 위협의 세 가지 특징이 확인됐다. 첫째, 원인이 불분명하거나 다면적이어서 진단하기 어렵고 복잡하다. 직원들은 문제가 진짜 문제인지 아니면 일회성 이상 징후인지 판단하는 데 어려움을 겪을 수 있다. 둘째, 예측이 불가능하고 결과가 불확실해서 그 긴급성을 가늠하기 어렵다. 마지막으로 조직에서 처음 맞닥뜨리는 문제인 경우가 많아 직원들이 대응에 참고할 만한 선례가 없는 경우가 많다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>이러한 조사 결과는 위협에는 다양한 스펙트럼에 존재하며 진정으로 명확한 위협은 드물고 대부분의 위협에는 어느 정도의 모호성이 포함돼 있음을 시사한다. 이는 중요한 질문을 제기한다. 개인과 팀은 모호성의 정도가 다양한 위협에 어떻게 대응할까? 이 질문에 답하기 위해 다양한 산업 분야의 직원과 관리자 102명을 대상으로 다양한 위협을 어떻게 인식하고 대응하는지 물었다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>위협이 분명할 때 응답자들은 오해의 여지가 거의 없었다고 답했다. 직원들은 위험을 인식하고 대비책을 공개적으로 논의했다. 신속하게 해결책을 브레인스토밍했다. 예를 들어 화학 엔지니어링 회사에 근무하는 한 직원은 직장에서 안전사고가 증가했다고 회상했다. 신호가 명확했고 보호 장비 미착용이라는 원인이 분명했다. 명확성 덕분에 안전 지침 재설계 및 규정 준수 강화와 같은 해결책을 쉽게 파악할 수 있었다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>반면 모호한 위협은 문제가 실제로 존재하는지 여부에 대한 의견 불일치를 야기하는 경우가 많았다. 한 전자 회사의 직원은 하위 구성 요소의 오작동 초기 징후가 복잡하기 때문에 처음에 어떻게 무시됐는지 설명했다. 초기 실패 사례들은 개별적인 사건처럼 보였기 때문에 팀에서는 이것이 더 큰 문제를 예고하는 신호는 아닐 것이라고 생각했다. 또한 이 문제는 전례가 없는 것이었기 때문에 참고할 만한 과거의 유사한 사례가 없었다. 따라서 문제의 심각성을 측정하거나 적절한 대응 방식을 결정하는 데 어려움을 겪었다. 그 결과 문제가 주요 위기로 확대될 때까지 방치됐고, 결국 주요 고객을 잃게 됐다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>하지만 왜 적어도 문제를 표시하지 않았을까?<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>직원들의 침묵<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>모호한 위협으로 인한 문제를 해결하려면 직원들이 문제의 초기 징후를 발견했을 때 이를 말해야 한다. 하지만 위협이 모호할수록 직원들은 침묵할 가능성이 높아진다. 한 석유 및 가스 컨설팅 회사의 직원과 관리자 436명을 대상으로 설문조사를 실시했다. 직원들은 시추, 해저 처리, 압력 제어와 같은 고위험 활동의 특성상 공학적 위험을 나타낼 수 있는 모호한 신호를 자주 접하게 된다. 필자들은 이러한 신호의 모호성이 커질수록 직원들이 이에 대해 의견을 내기 점점 더 어려워 한다는 사실을 발견했다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>필자들은 다양한 산업 분야의 직원 1193명을 대상으로 일련의 심리 실험을 추가로 진행했다. 한 실험에서 참가자들은 새로운 화장품을 개발하는 제품 R&D 팀의 일원으로서 실제와 같은 시뮬레이션에 참여했다. 베타 테스트 단계에서 모호한 위협을 도입했다. 고객들은 경미한 피부 자극과 같이 양성일 수도 있고 심각한 건강 위험을 나타낼 수도 있는 경미하고 불분명한 증상을 보고했다. 이처럼 모호한 상황에서 직원들은 경영진에게 보고를 미룰 가능성이 더 높다는 사실을 발견했다. 직원들은 스스로 문제를 분석하거나 우려를 표명하기보다는 관리자가 상황을 처리해 주기를 기대했다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>왜 이런 일이 발생할까? 한 가지 가능한 설명은 ‘인지 과부하’다. 직원들은 여러 가지 책임을 맡고 있으며 모호한 위협을 평가하려면 상당한 정신적 노력이 필요하다. 그 결과, 직원들은 보다 관리하기 쉬운 업무에 집중할 수 있다. 또한 전통적인 직장 구조는 의사결정을 리더의 책임으로 보고 직원들은 문제를 제기하기보다는 실행해야 한다는 가정을 강화한다. 따라서 직원들은 위협을 이해하기 위해 리더에게 의존함으로써 스스로 모호한 상황과 씨름해야 하는 부담을 덜게 된다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>이러한 의존은 문제가 된다. 아무리 유능한 리더라도 모호한 위협을 간과하거나 팀의 제품 및 프로세스의 약점을 잘못 판단할 수 있기 때문이다. 한편 일상적으로 이러한 제품 및 프로세스를 접하는 직원들은 불확실성을 헤쳐 나가는 데 도움이 될 수 있는 중요한 인사이트를 갖고 있을 수 있다. 따라서 연구 결과에 따르면 아이러니하게도 직원의 참여가 가장 필요한 상황에서 직원들이 물러나면서 조직은 가장 위험한 순간에 취약한 상태에 놓이게 된다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>기업이 직원의 경계심을 높이는 방법<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>모호한 위협은 명확한 경고 신호 없이 나타나고 직원들은 리더십에 의존해 대처하는 경우가 많다. 조직은 어떻게 직원들이 경각심을 갖고 참여하도록 장려할 수 있을까? 필자들은 조직, 리더, 직원 등 세 가지 수준에서 목표에 맞는 조치를 취할 것을 권장한다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>조직: 경계 문화를 조성하라<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>기업은 아주 작은 오류라도 선제적으로 분석하는 사고방식으로 '<a href=\"https://www.google.com/books/edition/Managing_the_Unexpected/GU55MJOp1OcC?hl=en&gbpv=0\" target=\"_blank\">실패에 집착</a>'하는 문화를 조성함으로써 모호한 위협이라는 과제를 성공적으로 해결할 수 있다. 직원들은 인터뷰에서 이러한 사고방식의 중요성을 강조하면서 위험을 철저하게 평가하는 데 더 많은 시간을 할애했어야 한다고 지적했다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>도요타는 이러한 접근 방식의 선두 주자다. 도요타의&#160;<a href=\"https://mag.toyota.co.uk/andon-toyota-production-system/\" target=\"_blank\">안돈 시스템</a>andon system은 작업자가 작업장에서 문제를 감지하고 코드를 당기거나 버튼을 누르면 시각적 경고판이 작동하는 시스템이다. 직원들은 문제의 첫 징후를 감지하는 즉시 생산을 중단할 수 있는 권한을 갖는다. 도요타는 이를 업무 중단으로 간주하지 않고 책임 있는 행동으로 간주해 ‘조기 경고’를 중시하는 문화를 강화한다. 조직은 직원들이 아슬아슬했던 사고 사례들near-misses을 분석하고, 안정된 상황에서도 경계를 늦추지 않으며, 의견을 개진하도록 장려함으로써 위험이 확대되기 전에 포착할 수 있다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>리더: 직원들이 위협을 탐지할 수 있도록 훈련하라<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>리더는 직원들이 불확실한 상황에 대비하고 위협을 인식하며 대응하는 데 필요한 역량을 갖추도록 하는 데 중요한 역할을 한다. 인터뷰에 참여한 응답자들은 현재 시스템의 취약성과 대비 상태를 평가하기 위해 고안된&#160;<a href=\"https://www.wsj.com/articles/pandemic-shows-importance-of-stress-testing-even-for-companies-outside-banking-11585906202\" target=\"_blank\">구조화된 테스트</a>, 즉 시뮬레이션, 스트레스 테스트 또는 통제된 훈련과 같은 체계적인 평가 방법이 조직의 실패를 예방하는 데 도움이 될 것이라고 강조했다. 넷플릭스는 이 개념을 한 단계 더 발전시켜&#160;<a href=\"https://netflixtechblog.com/chaos-engineering-upgraded-878d341f15fa\" target=\"_blank\">카오스 엔지니어링</a>Chaos Engineering을 도입했다. 이는 시스템 복원력을 테스트하기 위해 의도적으로 시스템 오류를 발생시키는 방식이다. 특히 카오스 몽키Chaos Monkey를 포함한 시미안 아미Simian Army&#160;도구들은 시스템을 무작위로 중단시켜 직원들이 취약점을 탐지하고 적절한 대응책을 논의하도록 훈련한다. 기업은 이러한 훈련을 제도화함으로써 직원들이 실시간 위협 탐지 기술을 갖추게 한다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>직원: 중요한 순간에 리더십에 도전하라<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>직원들 스스로도 필요하다면 리더십에 이의를 제기함으로써 모호한 위협을 해결하는 데 중요한 역할을 한다. 인터뷰에 참여한 여러 응답자는 문제가 의심스러울 때 관리자에게 밀어붙이지 않은 것을 후회하며 추가 조사를 실시하도록 주장했어야 한다는 데 동의했다. 엔비디아는 주저 없이 사실을 사실대로 말하는 능력, 즉 ‘<a href=\"https://www.businessinsider.com/nvidia-jensen-huang-leadership-style-insiders-tough-boss-admit-mistakes-2024-6\" target=\"_blank\">지적 정직성</a>’을 강조함으로써 직원들에게 이러한 사고방식을 장려한다. 직원들은 반발에 대한 두려움 없이 의견을 표출하고, 결정에 이의를 제기하며, 변화를 제안할 수 있어야 한다. 이러한 접근 방식은 프로젝트가 추진력을 얻지 못할 때 직원들의 통찰력을 바탕으로 빠르게 방향을 전환함으로써 엔비디아를 혁신의 선두에 서게 했다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>불확실한 환경에서 번영하는 조직은 문제가 명확해질 때까지 기다리지 않는다. 아주 희미한 문제 신호라도 적극적으로 찾아서 조치를 취한다. 핵심은 경영진 선에서만 ‘경계심’을 갖는 것이 아니라 모든 직급에서 공유하도록 하는 것이다. 기업은 질문하고, 위험을 예측하고, 조기에 행동하는 문화를 조성함으로써 모호한 위협을 부담에서 경쟁 우위로 전환할 수 있다. 혼란을 피할 수 없는 세상에서 위기에 대응하는 것으론 부족하다. 위험을 선제적으로 파악하는 조직이 앞서 나갈 수 있다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>원문 |&#160; <a href=\"https://hbr.org/2025/04/why-employees-stay-silent-when-they-see-warning-signs-of-a-problem\" target=\"_blank\">https://hbr.org/2025/04/why-employees-stay-silent-when-they-see-warning-signs-of-a-problem</a><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><a href=\"https://hbr.org/search?term=Hyunsun%20Park\" target=\"_blank\">박현선</a>은 조지아주 애틀랜타에 위치한 조지아텍 셸러 경영대학Scheller College of Business의 조직행동학 조교수다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><a href=\"https://hbr.org/search?term=Subra%20Tangirala\" target=\"_blank\">수브라 탕기랄라</a>는 메릴랜드대 로버트 H. 스미스 경영대학원Robert H. Smith School of Business의 경영학부 학장 임명 교수이다.<br>\t\t\t\t\t<br>\t\t\t\t\t<br>모호한 위협은 직원들을 침묵시킨다<br>\t\t\t\t\t<br>발표 자료 (총 18장)<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>원문 정보<br>\t\t\t\t\t<br>• 저자: 박현선 (조지아텍 셸러 경영대학 조직행동학 조교수) • 공저자: 수브라 탕기랄라 (메릴랜드대 로버트 H. 스미스 경영대학원 경영학부 학장 임명 교수) • 출처: Harvard Business Review • 원문 링크: <a href=\"https://hbr.org/2025/04/why-employees-stay-silent-when-they-see-warning-signs-of-a-problem\" target=\"_blank\">https://hbr.org/2025/04/why-employees-stay-silent-when-they-see-warning-signs-of-a-problem</a> • 주제: 인사조직 - 조직 내 모호한 위협 대응 전략<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>아티클 구조<br>\t\t\t\t\t<br>1. 모호한 위협의 정의와 특성￼   ├── 명확한 위협 vs 모호한 위협￼   └── 모호한 위협의 문제점￼<br>\t\t\t\t\t<br>2. 모호한 위협에 대처하기 어려운 이유￼   ├── 모호한 위협의 3가지 특징￼   └── 연구 결과 분석￼<br>\t\t\t\t\t<br>3. 직원들의 침묵 현상￼   ├── 설문조사 결과￼   └── 침묵의 원인 분석￼<br>\t\t\t\t\t<br>4. 기업이 직원의 경계심을 높이는 방법￼   ├── 조직 차원의 대응￼   ├── 리더 차원의 대응￼   └── 직원 차원의 대응￼<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>1단계 - 위협의 두 가지 형태<br>\t\t\t\t\t<br>• 명확한 위협: 분명하고 즉각적인 위험 • 모호한 위협: 인지하고 해결하기 어려운 위험 • 대부분의 위협은 어느 정도의 모호성을 포함<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>명확한 위협의 특징<br>\t\t\t\t\t<br>• 즉각적 인식: 문제가 명확하게 드러남 • 신속한 대응: 해결 방법을 쉽게 파악 가능 • 예시: 화학 공장의 가스 누출 경보<br>\t\t\t\t\t<br>\t\t\t\t\t\t<br>- 문제 인식 → 시설 대피 → 누출 부위 차단<br>\t\t\t\t\t<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>모호한 위협의 특징<br>\t\t\t\t\t<br>• 불분명한 신호: 희미하고 간헐적인 징후 • 혼재된 정보: 일부는 문제로, 일부는 정상으로 인식 • 검증의 어려움: 센서나 검사로 확인되지 않음 • 예시: 화학 공장의 간헐적 악취<br>\t\t\t\t\t<br>\t\t\t\t\t\t<br>- 신호 혼재 → 최선의 조치 불분명 → 틈새로 빠져나감<br>\t\t\t\t\t<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>2단계 - 모호한 위협의 3가지 특징<br>\t\t\t\t\t<br>진단의 복잡성<br>\t\t\t\t\t<br>• 원인 불분명: 다면적이고 복잡한 원인 구조 • 판단 어려움: 진짜 문제인지 일회성 이상 징후인지 구분 곤란<br>\t\t\t\t\t<br>예측 불가능성<br>\t\t\t\t\t<br>• 불확실한 결과: 긴급성을 가늠하기 어려움 • 시간적 모호성: 언제 심각해질지 예측 불가<br>\t\t\t\t\t<br>선례 부족<br>\t\t\t\t\t<br>• 처음 맞닥뜨리는 문제: 참고할 만한 과거 사례 없음 • 대응 방법 미비: 검증된 해결책 부재<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>연구 결과 - 위협 인식과 대응<br>\t\t\t\t\t<br>명확한 위협 상황<br>\t\t\t\t\t<br>• 즉각적 인식: 오해의 여지 거의 없음 • 공개적 논의: 위험 인식과 대비책 논의 활발 • 신속한 해결: 브레인스토밍을 통한 빠른 대응<br>\t\t\t\t\t<br>모호한 위협 상황<br>\t\t\t\t\t<br>• 의견 불일치: 문제 존재 여부에 대한 논란 • 초기 무시: 개별 사건으로 치부하는 경향 • 대응 지연: 주요 위기로 확대될 때까지 방치<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>사례 분석 1 - 화학 엔지니어링 회사<br>\t\t\t\t\t<br>상황<br>\t\t\t\t\t<br>• 문제: 직장 내 안전사고 증가 • 신호: 명확한 증가 추세 확인 • 원인: 보호 장비 미착용으로 판명<br>\t\t\t\t\t<br>대응<br>\t\t\t\t\t<br>• 해결책 도출: 안전 지침 재설계 • 강화 조치: 규정 준수 강화 • 결과: 신속하고 효과적인 문제 해결<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>사례 분석 2 - 전자 회사<br>\t\t\t\t\t<br>상황<br>\t\t\t\t\t<br>• 문제: 하위 구성 요소의 오작동 초기 징후 • 복잡성: 개별 사건처럼 보이는 실패 사례들 • 전례 부족: 과거 유사 사례 없음<br>\t\t\t\t\t<br>결과<br>\t\t\t\t\t<br>• 방치: 문제의 심각성 측정 실패 • 확대: 주요 위기로 발전 • 피해: 주요 고객 상실<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>3단계 - 직원들의 침묵 현상<br>\t\t\t\t\t<br>연구 개요<br>\t\t\t\t\t<br>• 대상: 석유 및 가스 컨설팅 회사 직원 436명 • 특성: 고위험 활동으로 인한 모호한 신호 빈번 접촉 • 발견: 위협의 모호성이 클수록 의견 개진 어려워함<br>\t\t\t\t\t<br>심리 실험 결과<br>\t\t\t\t\t<br>• 참가자: 다양한 산업 분야 직원 1,193명 • 시나리오: 화장품 R&D 팀 시뮬레이션 • 결과: 모호한 상황에서 경영진 보고 미룸<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>침묵의 원인<br>\t\t\t\t\t<br>인지 과부하<br>\t\t\t\t\t<br>• 다중 책임: 여러 업무를 동시에 처리해야 하는 상황 • 정신적 노력: 모호한 위협 평가에 상당한 에너지 소모 • 우선순위: 관리하기 쉬운 업무에 집중하는 경향<br>\t\t\t\t\t<br>전통적 직장 구조<br>\t\t\t\t\t<br>• 의사결정 책임: 리더의 고유 영역으로 인식 • 직원 역할: 문제 제기보다는 실행 중심의 업무 문화 • 의존적 사고: 리더에게 위협 해석을 맡기는 성향<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>침묵이 야기하는 문제<br>\t\t\t\t\t<br>리더의 한계<br>\t\t\t\t\t<br>• 간과 가능성: 아무리 유능한 리더도 모호한 위협 놓칠 수 있음 • 잘못된 판단: 팀 제품 및 프로세스 약점 오판 위험<br>\t\t\t\t\t<br>직원의 인사이트 가치<br>\t\t\t\t\t<br>• 현장 경험: 일상적으로 제품 및 프로세스 접촉 • 중요한 통찰: 불확실성 해결에 도움될 수 있는 정보 보유 • 아이러니: 가장 필요한 순간에 직원들이 물러남<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>4단계 - 조직 차원: 경계 문화 조성<br>\t\t\t\t\t<br>실패에 집착하는 문화<br>\t\t\t\t\t<br>• 사고방식: 아주 작은 오류라도 선제적 분석 • 목표: 위험을 철저하게 평가하는 시간 확보 • 효과: 모호한 위협을 성공적으로 해결<br>\t\t\t\t\t<br>도요타 안돈 시스템<br>\t\t\t\t\t<br>• 시스템: 작업자가 문제 감지 시 즉시 생산 중단 권한 • 메커니즘: 코드 당기기/버튼 누르기 → 시각적 경고판 작동 • 문화: 업무 중단이 아닌 책임 있는 행동으로 인식 • 결과: 조기 경고를 중시하는 문화 강화<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>5단계 - 리더 차원: 위협 탐지 훈련<br>\t\t\t\t\t<br>체계적 평가 방법<br>\t\t\t\t\t<br>• 구조화된 테스트: 현재 시스템 취약성 평가 • 다양한 형태: 시뮬레이션, 스트레스 테스트, 통제된 훈련 • 목적: 조직 실패 예방을 위한 사전 대비<br>\t\t\t\t\t<br>넷플릭스 카오스 엔지니어링<br>\t\t\t\t\t<br>• 개념: 시스템 복원력 테스트를 위한 의도적 오류 발생 • 도구: 카오스 몽키를 포함한 시미안 아미 • 방식: 시스템 무작위 중단으로 취약점 탐지 훈련 • 효과: 직원들의 실시간 위협 탐지 기술 향상<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>6단계 - 직원 차원: 리더십에 도전<br>\t\t\t\t\t<br>지적 정직성의 중요성<br>\t\t\t\t\t<br>• 능력: 주저 없이 사실을 사실대로 말하는 역량 • 행동: 의견 표출, 결정 이의 제기, 변화 제안 • 조건: 반발에 대한 두려움 없는 환경<br>\t\t\t\t\t<br>엔비디아의 접근법<br>\t\t\t\t\t<br>• 문화: 지적 정직성을 강조하는 조직 문화 • 결과: 프로젝트 추진력 부족 시 직원 통찰력 기반 빠른 방향 전환 • 성과: 혁신의 선두에 서는 경쟁 우위 확보<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>내용 요약<br>\t\t\t\t\t<br>핵심 메시지<br>\t\t\t\t\t<br>조직에서 모호한 위협은 명확한 위협보다 대응하기 어려우며, 직원들을 침묵시키는 주요 원인이 됩니다. 이를 해결하기 위해서는 조직, 리더, 직원 모든 차원에서의 체계적 접근이 필요합니다.<br>\t\t\t\t\t<br>성공의 열쇠<br>\t\t\t\t\t<br>• 조직: 실패에 집착하는 경계 문화 조성 • 리더: 체계적인 위협 탐지 훈련 제공<br>\t\t\t\t\t<br>• 직원: 지적 정직성을 바탕으로 한 적극적 참여<br>\t\t\t\t\t<br>최종 목표<br>\t\t\t\t\t<br>모호한 위협을 부담에서 경쟁 우위로 전환하여 불확실한 환경에서 번영하는 조직 구축<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>Agenda<br>\t\t\t\t\t<br>\t\t\t\t\t\t<br>- 우리 조직에서 최근 경험한 '모호한 위협'의 사례는 무엇이며, 당시 어떻게 대응했나요?<br>\t\t\t\t\t\t<br>- 직원들이 문제 상황을 감지했을 때 상급자에게 보고하기 주저하는 이유는 무엇이라고 생각하시나요?<br>\t\t\t\t\t\t<br>- 도요타의 안돈 시스템과 같은 '조기 경고 문화'를 우리 조직에 도입한다면 어떤 형태가 적합할까요?<br>\t\t\t\t\t\t<br>- 리더로서 직원들이 모호한 위협을 더 잘 탐지하고 대응할 수 있도록 어떤 훈련이나 지원을 제공할 수 있을까요?<br>\t\t\t\t\t\t<br>- 개인적으로 업무 중 '뭔가 이상하다'고 느꼈지만 확신이 서지 않아 보고하지 않았던 경험이 있나요? 그때의 심리는 어땠나요?<br>\t\t\t\t\t<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>Agenda<br>\t\t\t\t\t<br>\t\t\t\t\t\t<br>- 엔비디아가 강조하는 '지적 정직성'을 실천하기 위해 개인 차원에서 어떤 노력을 할 수 있을까요?<br>\t\t\t\t\t\t<br>- 우리 조직의 의사결정 구조가 직원들의 '침묵'을 유발하는 요소는 없는지 점검해보고, 개선 방안을 제시해보세요.<br>\t\t\t\t\t\t<br>- 모호한 위협 상황에서 '인지 과부하'를 줄이고 직원 참여를 높이려면 어떤 시스템이나 프로세스가 필요할까요?<br>\t\t\t\t\t\t<br>- 실패나 문제를 조기에 발견했을 때 이를 '성과'로 인정받을 수 있는 평가 체계는 어떻게 만들 수 있을까요?<br>\t\t\t\t\t\t<br>- 불확실한 환경에서 '선제적으로 위험을 파악하는 조직'이 되기 위해 우리가 지금 당장 시작할 수 있는 실천 과제는 무엇일까요?<br>\t\t\t\t\t<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>\t\t\t\t<br>\t\t\t<br>\t\t\t<br>4회차<br>\t\t\t<br>\t\t\t\t<br>\t\t\t\t\t<br>마케팅<br>\t\t\t\t\t<br>쇼핑 방식을 바꾸는 AI 에이전트<br>\t\t\t\t\t<br><a href=\"https://www.hbrkorea.com/article/author/wno/2959\" target=\"_blank\">앤드루 슈필로프(Andrew Shipilov)</a>,<a href=\"https://www.hbrkorea.com/article/author/wno/2960\" target=\"_blank\">네이선 퍼(Nathan Furr)</a>,<a href=\"https://www.hbrkorea.com/article/author/wno/3788\" target=\"_blank\">위어 흐아를란트(Jur Gaarlandt)</a>,<a href=\"https://www.hbrkorea.com/article/author/wno/3789\" target=\"_blank\">위슬리 코르버(Wesley Korver)</a><br>\t\t\t\t\t<br>디지털<br>\t\t\t\t\t<br>2025. 4. 8.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<a href=\"https://www.hbrkorea.com/upload_dir/source/HBR_Daily/Feb25_26_582146397.jpg\" target=\"_blank\">\t\t\t\t\t\t\t\t\t\t\t</a><br><br>\t\t\t\t\t<br>사용자를 대신해 행동하도록 설계된 알고리즘, 즉 인공지능AI&#160;에이전트는 이제 비즈니스와 소비자 환경을 근본적으로 재편하기 시작했다. 이제 상당수 소비자는 구글 검색 대신 챗GPT 같은 AI 에이전트를 통해 질문을 던지고 검색 결과를 요약해 받아보고 있다.&#160;<a href=\"https://x.com/John_Dietrich1/status/1859031352861225227\" target=\"_blank\">일부 전문가</a>는 이 같은 추세가 향후 4년 내 구글을 대체할 수 있다고 예측한다. 또한 AI 에이전트는 기존의 검색엔진 최적화SEO와는 무관하게&#160;<a href=\"https://www.linkedin.com/posts/nifinet_we-accidentally-unlocked-a-new-growth-channel-activity-7293585791799185410-E4F0/?utm_source=share&utm_medium=member_ios\" target=\"_blank\">새로운 고객 유입 채널</a>을 만들고 있다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>이처럼 AI 에이전트의 빠른 확산은 누가 고객과의 접점을 차지하고, 누가 가치를 창출할 것인가라는 근본적인 질문을 던진다. 특히 디지털 시대의 성배라 할 수 있는 최종 고객에 대한 소유권을 누가 갖게 될지에 대한 싸움으로 이어지고 있다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>과거 소비자는 제품을 찾을 때 검색엔진에서 검색하고 여러 리뷰를 보고 어떤 제품을 살지 결정한 뒤 여러 쇼핑몰을 비교하며 구매하는 복잡한 단계를 거쳤다. 하지만 AI 에이전트는 이 모든 과정을 혁신적으로 간소화하고 있다. 예를 들어 퍼플렉시티Perplexity&#160;같은 AI 포털에 “테슬라 대안으로 좋은 전기차는 무엇인가요?”라고 질문하면 추천 차량 목록, 신뢰할 만한 리뷰에서 추출한 장단점 요약, 최저가 구매처 링크까지 한 번에 제공된다. 결제까지 퍼플렉시티가 대신 처리하는 건 이미 기술적으로 거의 준비됐다. 이렇게 되면 구글이나 아마존 같은 전통적인 플랫폼 게이트키퍼나 브랜드, 인플루언서 영향력은 점차 축소될 수밖에 없다. 실제로 퍼플렉시티는&#160;<a href=\"https://www.booked.ai/\" target=\"_blank\">여행 예약</a>,&#160;<a href=\"http://www.eventscase.com/\" target=\"_blank\">행사 기획&#160;</a>등 복합적인 과업을 수행하는 AI 에이전트를 선보이며 이 방향으로 나아가고 있다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>이 변화는 단순히 쇼핑의 방식만 바꾸는 것이 아니다. 일의 방식, 가치의 흐름, 권력 구조 자체를 바꾼다. 왜냐하면 AI 에이전트는 고객과의 직접적인 접점을 장악하기 때문이다. 이미 오픈AI, 구글, 앤스로픽Anthropic&#160;등 주요 AI 기업이 다양한 앱에 AI 에이전트를 통합하고 있으며 현재는 비교적 단순한 작업을 처리하는 데 집중한다. 예컨대 “가장 적절한 보험 상품을 추천해줄 수 있나요?” “이 부품을 가장 빠르게 고객에게 배송하려면 어떤 방법이 좋을까요?” 같은 질문에 대응하고 있다. 이제 다음 단계는 명확하다. AI 에이전트가 직접 구매를 완료하고 물류를 최적화하는 것이다. 이미 퍼플렉시티는 일부 거래를 실제로 마쳤다는 보도도 있다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>이런 변화는 여러 산업에 영향을 미치겠지만 가장 먼저 변화를 체감하게 될 곳은 소비재 산업이다. 이 분야는 제품 자체가 단순하지만 정보 흐름이 복잡한 경우가 많다. AI 에이전트는 소비자가 제품을 검색하고 비교하며 결정하고 구매하는 전 과정을 자동화할 수 있기 때문에 기존 유통업체나 브랜드의 역할이 빠르게 재편될 가능성이 크다. 결국 고객이 어떤 기준으로 제품을 선택하고, 어떤 경로로 구매하는지 완전히 바꿔놓을 것이다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>고객 여정의 간략한 역사,<br>\t\t\t\t\t<br>지금 누가 권력을 쥐고 있는가<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>AI 에이전트가 B2C(기업-소비자) 시장의 가치사슬을 어떻게 재편할지 이해하려면 먼저 인터넷 이전 시대에 비즈니스가 어떻게 이뤄졌는지 되돌아볼 필요가 있다. 그 당시에는 브랜드와 소매업체 간 정보 비대칭이 크지 않았다. 소매업체는 영수증 단위의 판매 데이터에 접근할 수 있었는데 이는 개별 고객과 연결되지 않았다. 하지만 어떤 상품이 얼마나 자주, 어떤 조합으로 팔리는지 파악할 수 있는 유용한 인사이트였다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>반면 브랜드는 이런 세부 데이터를 직접 보긴 어려웠지만 시장 전반의 ‘소진율sell-through’ 또는 ‘실판매량sell-out’ 등의 정보를 통해 전체 흐름을 파악할 수 있었다. 이런 구조 속에서 브랜드와 소매업체는 서로 협력해야만 제품 개발이나 마케팅 전략 수립에 필요한 핵심 정보를 얻을 수 있었다. 예를 들어 브랜드는 소매업체 현장에서 소비자 조사를 실시해 신제품 아이디어를 발굴하고, 소매업체는 브랜드에 주문 내역, 재고 수준, 또는 POSPoint-of-Sale&#160;데이터를 제공해 판매 전략이나 프로모션을 최적화했다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>이커머스가 등장하며 권력의 중심이 이동했다. 새로운 디지털 소매업체는 단순한 거래 데이터를 넘어 개별 고객 수준의 정교한 데이터를 확보할 수 있게 됐다. 이에 반해 브랜드는 여전히 제한된 수준의 데이터만 보유하며 정보 격차가 벌어졌다. 데이터와 고객 접근성이 핵심 경쟁력이 된 디지털 시대에서 누가 데이터를 통제하느냐에 따라 수익과 영향력이 결정되는 구조로 바뀐 것이다. 지난 10여 년간 아마존, 알리바바, 잘란도Zalando와 같은 이커머스 강자는 고객 데이터를 기반으로&#160;<a href=\"https://www.statista.com/statistics/259814/amazons-worldwide-advertising-revenue-development/\" target=\"_blank\">광고 등 부가 수익을 창출</a>하고&#160;<a href=\"https://www.linkedin.com/posts/sangeetpaul_the-false-bundles-of-the-platform-economy-activity-7192162800591392768-D2e4/\" target=\"_blank\">높은 이익률을 확보</a>했다. 이들이 보유한 방대한 고객 인사이트는 최종 소비자와 접점이 없는 브랜드나 전통 소매업체에 비해 확실한 경쟁 우위를 제공한다. 이런 현상은 빅테크 기업만의 이야기가 아니다.&#160;<a href=\"https://www.retaildetail.eu/news/food/ahold-delhaize-reaches-half-a-billion-from-ad-revenue/\" target=\"_blank\">기존의 오프라인 중심 소매업체</a>도 고객 데이터를 적극적으로 활용하며 수익성을 개선해 시장 내 입지를 강화하고 있다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>AI 에이전트의 부상과 리테일 평준화<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>리테일의 미래를 바라보면 생성형 AI는 과거 이커머스가 그랬던 것처럼 유통 산업의 판도를 근본적으로 바꿔놓을 가능성이 크다. 전통적으로 리테일의 성공은 상품 구성, 가격, 입지의 조합에 달려 있었다. 특히 오프라인 매장일수록 위치가 핵심이었다. 좋은 입지에 자리 잡은 매장은 그 자체로 소비자에게 노출되고 쉽게 접근될 수 있는 이점을 가졌기 때문이다. 그러다 이커머스가 등장하면서 이 공식은 깨지기 시작했다. 소비자는 더 이상 매장에 가지 않고 가격 경쟁력, 빠른 배송, 신뢰할 수 있는 브랜드를 기준으로 온라인에서 쇼핑하기 시작했다. 아마존과 같은 기업은 이런 기준을 충족시키며 빠르게 성장했고 리테일의 중심은 ‘공간’에서 ‘효율성’으로 이동했다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>이제 생성형 AI 에이전트의 등장은 또 한 번 큰 변화를 예고한다. 소비자의 구매 여정을 돕는 AI 에이전트의 보급은 소매업체에서 브랜드와 AI 시스템으로 힘의 중심이 이동한다는 것을 뜻한다. 그 이유는 간단하다. AI 에이전트는 인간보다 훨씬 더 광범위하고 빠르며, 정교한 방식으로 정보를 탐색하고 분석할 수 있기 때문이다. 대부분의 소비자는 모든 쇼핑몰을 일일이 검색하고, 계정을 관리하고, 각 쇼핑몰의 신뢰도를 비교하는 것에 시간과 에너지를 쏟기 어렵다. 그래서 자연스럽게 익숙한 몇몇 플랫폼에만 의존한다. 하지만 AI 에이전트는 이 모든 복잡함을 대신 처리할 수 있다. 소비자가 미처 고려하지 못한 요소까지 반영해 더 실용적이고 정교한 의사결정을 도와줄 수 있다. 예를 들어 AI 에이전트는 기업이 통제하기 어려운 레딧Reddit&#160;같은 커뮤니티 기반 데이터를 활용해 다음과 같은 객관적이고 핵심 기준을 바탕으로 상품과 판매처를 추천할 수 있다:<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>• 가격:&#160;어디가 가장 저렴한가?<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>• 재고 상태:&#160;원하는 제품이 실제로 구매 가능한가? 여러 옵션을 받아보고 반품이 쉬운가?<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>• 신뢰도:&#160;정시 배송을 꾸준히 해온 이력이 있는가?<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>• 서비스 품질:&#160;반품이나 고객 지원이 간편하고 친절한가?<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>• 제휴 파트너십:&#160;믿을 수 있는 결제 시스템과 배송 파트너와 협력하는가?<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>이처럼 실용적이고 객관적인 기준에 따라 구매 결정을 내리는 시대가 오면 소비자는 브랜드 충성도보다 실질적인 가치에 집중하고 결과적으로 리테일 시장은 평준화될 수밖에 없다. 예를 들어 과거에는 누군가가 ‘프렌치 쇼어 재킷’을 찾고 있을 때 아마존, 잘란도, 유니클로처럼 익숙하고 신뢰할 수 있는 플랫폼에만 의존했을 것이다. 왜냐하면 수많은 브랜드와 쇼핑몰을 하나하나 비교하기엔 너무 번거롭고 시간이 많이 들기 때문이다. 하지만 AI 에이전트는 이 과정을 단 몇 초 만에 처리한다. 예컨대 이름은 덜 알려졌지만 팬층이 두터운 페인터재킷Paynter Jackets&#160;같은 브랜드를 찾아내 제품력과 사용자 평가를 근거로 추천할 수 있다. 즉 AI 에이전트는 인지도보다는 실제 만족도와 가성비, 서비스 품질을 기준으로 제품을 추천할 것이다. 이런 변화 속에서 소매업체의 영향력은 점점 줄어들고 더 나은 제품, 더 나은 가격, 더 나은 고객 경험을 제공할 수 있는 브랜드가 중심으로 떠오를 것이다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>명확한 승자와 패자<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>새롭게 펼쳐질 리테일 환경에서는 분명한 승자와 패자가 갈릴 것이다. 아마존과 같은 소매업체는 매우 낮은 마진 구조, 광범위한 배송 네트워크, 유연한 반품 정책 등을 갖춰 변화 속에서도 압도적인 경쟁 우위를 유지할 것으로 보인다. 특히 생성형 AI 에이전트가 가격, 배송 속도, 고객 서비스 등 객관적인 기준에 따라 최적의 옵션을 선별하면서 이런 조건을 충족하는 기업은 더욱 강력한 입지를 확보할 것이다. 반면 백화점 등 중간 포지션의 리테일러는 가격 경쟁력도, 서비스 품질도 뚜렷하지 않기 때문에 별다른 차별점이 없다면 도태될 위험이 크다. 이들은 아마존처럼 효율적인 저가형 유통 플랫폼과 탁월한 고객 경험이나 독점 상품을 제공하는 프리미엄 브랜드 사이에서 점점 설 자리를 잃어갈 것이다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>앞으로 리테일 시장에서는 단순히 가격만 낮추는 싸움이 일어나지는 않을 것이다. 고가 전략도 통할 수 있지만 그 전제는 압도적인 서비스와 고객 경험을 제공하는 것이다. 예를 들어 빠른 배송, 간편한 반품, 친절하고 실질적인 고객 지원 등 모든 과정에서 스트레스 없는 ‘완성도 높은 쇼핑 경험’을 제공하는 것이 핵심 경쟁 요소가 될 것이다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>지역 기반의 소규모 리테일러도 여전히 의미 있는 역할을 할 수 있다. 특색 있는 제품이나 차별화된 오프라인 경험을 제공하고 AI 에이전트가 ‘지역 소비’의 가치를 인식할 수 있도록 디지털상에서 충분히 노출된다면 이들도 소비자 선택지로 떠오를 수 있다. 결국 데이터가 더욱 투명해지는 세상에서는 가격이나 브랜드 인지도만이 아닌 경험 자체가 고객을 끌어들이는 핵심 차별화 요소가 될 것이다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>AI 에이전트 최적화 vs. 검색엔진 최적화<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>이 모든 흐름은 앞으로 AI 에이전트 최적화AI&#160;Agent Optimization&#160;이하 AAO라는 새로운 전략 영역이 부상할 가능성을 보여준다. 앞으로 브랜드와 리테일러는 단순히 소비자 눈에만 띄는 것이 아니라 AI 에이전트에도 선택 받도록 대비해야 한다. 과거 이커머스 시대에 검색엔진 최적화SEO가 핵심이었다면 이제는 AI 에이전트 시대에 맞는 최적화 전략, 즉 AAO가 필수 역량이 될 것이다. AI 에이전트는 제품을 평가할 때 품질, 기능, 리뷰 등 다양한 요소를 기반으로 판단할 것이다. 따라서 브랜드는 제품 품질, 혁신성, 고객 서비스 등 자사의 강점이 AI 시스템이 쉽게 인식하고 이해하도록 명확하고 측정 가능하게 표현돼야 한다. 또한 브랜드와 리테일러는 AI 에이전트가 신뢰하고 참고할 콘텐츠 소스에도 신경 써야 한다. 예를 들어 제품 리뷰나 고객 후기의 양과 질 모두가 더욱 중요한 요소가 될 것이다. 예전에는 단순히 리뷰 개수가 구매 결정에 영향을 미쳤다면 이제는 AI 에이전트가 다양한 리뷰 내용을 요약하고 분석한 결과에 따라 행동하기 때문에 콘텐츠 신뢰도와 정보의 질이 핵심 경쟁력이 된다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>특히 브랜드 이미지에 의존해 온 전통 브랜드에는 이번 변화가 큰 도전이 될 수 있다. 제품의 본질적 가치나 차별화된 요소 없이 이름값만으로 프리미엄 가격을 받아온 브랜드는 AI 에이전트의 판단 기준에서 저가 브랜드와 뚜렷한 차이를 만들지 못한다면 그동안의 가격 프리미엄을 유지하기 어려워질 수 있다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>문제는 상황이 단순하지 않다는 것이다. 브랜드가 하나의 AI 에이전트만을 상대하는 것이 아니라 여러 개의 에이전트를 동시에 고려해야 한다. 예를 들어 포Poe&#160;같은 AI 에이전트 통합 플랫폼을 통해 사용자는 챗GPT, 딥시크DeepSeek, 퍼플렉시티 등 여러 에이전트를 손쉽게 오가며 정보를 탐색할 수 있다. 이 말은 브랜드 입장에서는 어떤 에이전트를 통해 고객이 유입될지 예측할 수 없게 된다는 뜻이다. 따라서 앞으로 마케터는 검색엔진 마케팅SEM뿐만 아니라 AI 에이전트 마케팅AI&#160;Agent Marketing, 이하 AAM이라는 새로운 마케팅 영역에 대한 이해와 역량도 갖춰야 할지 모른다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>브랜드, 소비자 니즈, 그리고 제품의 미래<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>앞으로 브랜드는 AI 에이전트가 소비자 대신 구매 결정을 내리는 시대에 맞춰 자신을 재정의해야 한다. 하지만 이 과정에서 브랜드가 마주하는 과제는 단순히 제품을 홍보하는 것이 아니다. 바로 AAO 전략을 통해 브랜드와 소비자의 니즈를 효과적으로 연결하는 것이다. AI 에이전트는 특정 브랜드나 제품명을 중심으로 판단하지 않는다. 대신 소비자가 무엇을 필요로 하는지 니즈를 기반으로 검색과 추천을 시작한다. 예를 들어 “여행용으로 좋은 충전기”와 같은 니즈 중심 검색어가 특정 제품명이나 브랜드를 직접 검색하는 것보다 훨씬 더 많다. 이런 흐름 속에서 브랜드가 성공하려면 어떤 고객의 니즈를 해결하고 있는지, 그 니즈를 어떻게 차별화된 방식으로 충족시키는지 명확하게 정의할 수 있어야 한다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>브랜드는 신뢰를 줄 수 있어야 하고 제품이나 서비스가 경쟁사와 어떻게 다른지 뚜렷하게 보여줘야 한다. 이는 브랜드에 새로운 기회를 의미하기도 한다. 실제로 제품의 혁신성, 서비스 품질, 혹은 그 둘을 모두 갖춘 브랜드는 AI 에이전트가 범용 제품이나 단순 모방 브랜드보다 더 높은 우선순위로 추천할 가능성이 크기 때문이다. 앞으로는 리테일러를 통해 제품을 밀어내기보다 제품 후기나 사용자 리뷰 등 AI 에이전트가 주로 참고하는 채널에서 브랜드의 장점을 분명히 드러내는 전략이 중요해질 것이다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>범용 제품이 직면한 과제<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>범용generic&#160;제품이란 브랜드를 제외하면 뚜렷한 차별점이 없는 거의 동일한 상품을 말한다. 사무실에서 흔히 사용하는 전구가 대표적인 예다. 시그니파이Signify는 과거 필립스Philips&#160;브랜드로 고품질 조명을 생산하지만 여러 범용 브랜드 또한 외형, 기능, 품질 면에서 거의 차이가 없는 유사 제품을 판매하고 있다. 실제로 이들 제품 중 상당수는 같은 공장에서 생산된다. 이 경우 소비자나 AI 에이전트 모두 브랜드 프리미엄을 정당화하기 어려워진다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>이커머스 환경에서는 여전히 많은 소비자가 익숙한 브랜드를 선택한다. 이는 유사한 제품의 품질을 일일이 비교하고 판단하는 것이 번거롭고 어렵기 때문이다. 하지만 AI 에이전트가 리뷰와 제품 데이터를 빠르게 분석해 제품 간 품질 차이를 정량적으로 제시할 수 있다면 소비자는 굳이 더 비싼 브랜드를 선택할 이유가 점점 줄어들 것이다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>이 문제는 브랜드가 드러나지 않는 상품에서 더 심각하게 나타난다. 예를 들어 전구, 배터리, 일반 생활용품처럼 소비자가 브랜드를 체감하지 못하는 제품이 대표적이다. 만약 AI 에이전트가 “이 두 제품은 동일한 공장에서 제조됐으며 가격은 이쪽이 더 저렴하다”고 판단하고 저가 브랜드 제품을 추천하거나 자동으로 구매해 버린다면 기존 브랜드는 소비자 충성도를 유지하기 어려워질 것이다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>앞으로는 브랜드 네임만으로는 살아남기 어렵다. 소비자 니즈와의 명확한 연결, AI가 인식하고 평가할 수 있는 차별화된 가치, 객관적인 신뢰 기반의 데이터가 뒷받침되지 않는다면 브랜드는 AI 에이전트의 선택에서 점점 제외될 수밖에 없다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>브랜드가 돋보이기 위한 전략<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>그렇다면 브랜드는 이렇게 새로운 환경 속에서 어떻게 성공할 수 있을까? 핵심은 AI 에이전트가 우선적으로 인식하는 방식으로 차별화하는 것, 즉 AAO 역량을 갖추는 데 있다. 앞으로 브랜드는 아래 한 가지 또는 그 이상에서 명확한 차별성을 보여야 한다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>1. 가격 경쟁력:&#160;저가형 범용 제품과 경쟁하려면 매력적인 가격대 또는 가성비 모델을 갖추는 것이 중요하다. 이런 전략은 AI 에이전트 기반 검색에서 합리적인 대안으로 노출될 확률을 높인다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>2. 제품 혁신:&#160;기능, 소재, 성능 면에서 두드러지는 제품은 AI 에이전트의 비교 기준에서 쉽게 눈에 띈다. 명확한 기술 우위는 비교 자체를 어렵게 만들며 브랜드 가치를 높여준다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>3. 디자인 차별화:&#160;스타일과 감각을 중시하는 소비자를 위해 고유한 미적 요소와 품질이 반영된 디자인을 제공하는 것도 강력한 무기가 된다. AI 에이전트가 감성적 가치까지 인식할 수 있다면 디자인은 강력한 차별점이 된다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>4. 서비스 경험:&#160;구매 이후 경험 또한 브랜드에 대한 인식에 큰 영향을 준다. 우수한 고객 지원, 편리한 반품 시스템, 보증 정책 등은 AI 에이전트가 참조하는 사용자 리뷰나 커뮤니티에서 높은 평가로 이어질 수 있다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>이를 잘 보여주는 사례가 무선 휴대폰 충전기 시장이다. 한편에는 이케아처럼 단순한 기능에 합리적인 가격의 제품을 내세우는 브랜드가 있고, 다른 한편에는 젠스Zens처럼 고급 전자 부품, 다중 충전 코일, 더 빠른 충전 속도 등 기술 우위를 가진 프리미엄 브랜드가 있다. 두 브랜드 모두 각기 다른 소비자층의 니즈를 충족시키지만 앞으로 관건은 이들이 자신만의 강점을 AI 에이전트에 얼마나 효과적으로 전달하느냐에 달렸다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>AI가 소비자의 구매 여정을 주도하는 시대에서는 차별화된 제품과 서비스, AI 에이전트에 선택 받을 수 있는 최적화 전략을 갖춘 브랜드만이 살아남을 수 있다. 혁신, 디자인, 서비스 어느 분야든 좋다. 중요한 것은 그 강점이 소비자뿐만 아니라 AI에도 명확히 인식돼야 한다는 것이다. 반대로 브랜드 네임에만 의존해 별다른 가치를 제공하지 않는 범용 제품 중심의 브랜드는 점점 설 자리를 잃게 될 가능성이 높다. 브랜드의 미래는 AI 에이전트가 이끄는 소비자 여정에 얼마나 잘 적응하느냐, 얼마나 ‘진짜로 차별화된 브랜드’인가에 따라 결정될 것이다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>원문 |&#160; <a href=\"https://hbr.org/2025/02/ai-agents-are-changing-how-people-shop-heres-what-that-means-for-brands\" target=\"_blank\">https://hbr.org/2025/02/ai-agents-are-changing-how-people-shop-heres-what-that-means-for-brands</a><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>위어 흐아를란트(Jur Gaarlandt)는 아르테팩트Artefact의 베네룩스 지역 파트너다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>위슬리 코르버(Wesley Korver)는 아르테팩트의 데이터 및 분석 디렉터다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>네이선 퍼(Nathan Furr)는 인시아드INSEAD의 전략학 교수다. ＜리프레임＞, ＜The Innovator’s Method＞, ＜Leading Transformation＞, ＜Innovation Capital＞, ＜Nail It then Scale It＞ 등의 저자다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>앤드루 시필로프(Andrew Shipilov)는 인시아드의 국제경영학 석좌교수다. ＜<a href=\"https://www.amazon.com/Network-Advantage-Unlock-Alliances-Partnerships/dp/1118561457/\" target=\"_blank\">Network Advantage: How to Unlock Value From Your Alliances and Partnerships</a>＞의 공동 저자다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t출처: <<a href=\"https://www.hbrkorea.com/article/view/atype/di/category_id/3_1/article_no/1345/page/1\" target=\"_blank\">https://www.hbrkorea.com/article/view/atype/di/category_id/3_1/article_no/1345/page/1</a>> <br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>\t\t\t\t\t<br>쇼핑 방식을 바꾸는 AI 에이전트<br>\t\t\t\t\t<br>총 27장의 슬라이드<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>저자 정보<br>\t\t\t\t\t<br>앤드루 슈필로프(Andrew Shipilov) • 인시아드INSEAD의 국제경영학 석좌교수 • Network Advantage: How to Unlock Value From Your Alliances and Partnerships 공동 저자<br>\t\t\t\t\t<br>네이선 퍼(Nathan Furr) • 인시아드INSEAD의 전략학 교수 • 리프레임, The Innovator's Method, Leading Transformation 등 저자<br>\t\t\t\t\t<br>위어 흐아를란트(Jur Gaarlandt) • 아르테팩트Artefact의 베네룩스 지역 파트너<br>\t\t\t\t\t<br>위슬리 코르버(Wesley Korver) • 아르테팩트의 데이터 및 분석 디렉터<br>\t\t\t\t\t<br>출처: Harvard Business Review Korea, 2025년 4월 8일<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>아티클 구조<br>\t\t\t\t\t<br>1. AI 에이전트의 부상과 영향<br>\t\t\t\t\t<br>\t\t\t\t\t\t<br>- 소비자 행동 변화<br>\t\t\t\t\t\t<br>- 검색에서 AI 에이전트로의 전환<br>\t\t\t\t\t<br>\t\t\t\t\t<br>2. 고객 여정의 역사적 변화<br>\t\t\t\t\t<br>\t\t\t\t\t\t<br>- 인터넷 이전 시대<br>\t\t\t\t\t\t<br>- 이커머스 시대의 권력 이동<br>\t\t\t\t\t<br>\t\t\t\t\t<br>3. AI 에이전트가 만드는 새로운 리테일<br>\t\t\t\t\t<br>\t\t\t\t\t\t<br>- 리테일 평준화 현상<br>\t\t\t\t\t\t<br>- 승자와 패자의 구분<br>\t\t\t\t\t<br>\t\t\t\t\t<br>4. 새로운 최적화 전략<br>\t\t\t\t\t<br>\t\t\t\t\t\t<br>- AI 에이전트 최적화(AAO) 등장<br>\t\t\t\t\t\t<br>- 브랜드와 소비자 니즈의 연결<br>\t\t\t\t\t<br>\t\t\t\t\t<br>5. 브랜드의 미래 전략<br>\t\t\t\t\t<br>\t\t\t\t\t\t<br>- 범용 제품의 도전<br>\t\t\t\t\t\t<br>- 차별화 방안<br>\t\t\t\t\t<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>AI 에이전트의 빠른 확산<br>\t\t\t\t\t<br>• 구글을 대체할 가능성: 전문가들은 향후 4년 내 구글 대체 예측 • 새로운 고객 유입 채널: 기존 SEO와 무관한 채널 생성 • 핵심 질문: 누가 고객과의 접점을 차지하고 가치를 창출할 것인가 • 최종 목표: 디지털 시대 성배인 최종 고객 소유권을 누가 갖게 될 것인가<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>복잡한 구매 과정의 혁신적 간소화<br>\t\t\t\t\t<br>기존 구매 과정 • 검색엔진에서 검색 • 여러 리뷰 확인 • 제품 결정 • 여러 쇼핑몰 비교 • 구매<br>\t\t\t\t\t<br>AI 에이전트 활용 시 • 한 번의 질문으로 추천 차량 목록 제공 • 신뢰할 만한 리뷰 장단점 요약 • 최저가 구매처 링크까지 한 번에 제공 • 결제까지 AI가 대신 처리하는 기술 거의 완성<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>퍼플렉시티 사례 - AI 에이전트의 현실<br>\t\t\t\t\t<br>현재 가능한 서비스 • \"테슬라 대안으로 좋은 전기차는 무엇인가요?\" 질문 시<br>\t\t\t\t\t<br>\t\t\t\t\t\t<br>- 추천 차량 목록 제공<br>\t\t\t\t\t\t<br>- 장단점 요약<br>\t\t\t\t\t\t<br>- 최저가 구매처 링크<br>\t\t\t\t\t<br>\t\t\t\t\t<br>발전 방향 • 여행 예약, 행사 기획 등 복합적 과업 수행 • 일부 거래를 실제로 완료했다는 보도 • 결제 처리 기술 거의 완성 단계<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>전통 플랫폼 게이트키퍼의 영향력 축소<br>\t\t\t\t\t<br>영향 받는 주체들 • 구글: 검색 플랫폼으로서의 지위 위협 • 아마존: 이커머스 게이트키퍼 역할 감소 • 브랜드: 직접 고객 접점 상실 • 인플루언서: 영향력 축소<br>\t\t\t\t\t<br>변화의 핵심 • AI 에이전트가 고객과의 직접 접점을 장악 • 일의 방식, 가치 흐름, 권력 구조 자체 변화<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>주요 AI 기업들의 움직임<br>\t\t\t\t\t<br>현재 동향 • 오픈AI, 구글, 앤스로픽 등 다양한 앱에 AI 에이전트 통합 • 비교적 단순한 작업 처리에 집중<br>\t\t\t\t\t<br>처리 중인 질문 예시 • \"가장 적절한 보험 상품을 추천해줄 수 있나요?\" • \"이 부품을 가장 빠르게 고객에게 배송하려면 어떤 방법이 좋을까요?\"<br>\t\t\t\t\t<br>다음 단계 • AI 에이전트가 직접 구매 완료 • 물류 최적화 수행<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>소비재 산업의 우선적 변화<br>\t\t\t\t\t<br>가장 먼저 변화할 분야 • 소비재 산업이 첫 번째 타겟 • 제품 자체는 단순하지만 정보 흐름이 복잡<br>\t\t\t\t\t<br>AI 에이전트의 자동화 범위 • 제품 검색 • 비교 분석 • 구매 결정 • 구매 완료<br>\t\t\t\t\t<br>결과 • 기존 유통업체나 브랜드 역할 빠른 재편 • 고객 선택 기준과 구매 경로 완전 변화<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>1단계 - 인터넷 이전 시대의 권력 구조<br>\t\t\t\t\t<br>브랜드와 소매업체 간 정보 비대칭이 크지 않았음<br>\t\t\t\t\t<br>소매업체의 데이터 • 영수증 단위 판매 데이터 접근 가능 • 개별 고객과 연결되지는 않음 • 상품 판매 빈도, 조합 등 유용한 인사이트 확보<br>\t\t\t\t\t<br>브랜드의 정보 • 세부 데이터 직접 접근 어려움 • 소진율sell-through, 실판매량sell-out 등 전체 흐름 파악 • 제품 개발, 마케팅 전략 수립을 위해 상호 협력 필요<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>2단계 - 이커머스 등장과 권력 이동<br>\t\t\t\t\t<br>새로운 디지털 소매업체의 우위 • 단순 거래 데이터를 넘어 개별 고객 수준의 정교한 데이터 확보 • 브랜드는 여전히 제한된 수준의 데이터만 보유 • 정보 격차 확대<br>\t\t\t\t\t<br>디지털 시대 핵심 경쟁력 • 데이터와 고객 접근성이 핵심 • 누가 데이터를 통제하느냐에 따라 수익과 영향력 결정<br>\t\t\t\t\t<br>이커머스 강자들의 성과 • 아마존, 알리바바, 잘란도 등 • 고객 데이터 기반 광고 등 부가 수익 창출 • 높은 이익률 확보<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>3단계 - AI 에이전트 시대의 리테일 평준화<br>\t\t\t\t\t<br>전통 리테일 성공 요소 • 상품 구성, 가격, 입지의 조합 • 오프라인 매장: 위치가 핵심 • 좋은 입지 = 소비자 노출과 접근성 확보<br>\t\t\t\t\t<br>이커머스 등장 후 • 공간에서 효율성으로 중심 이동 • 가격 경쟁력, 빠른 배송, 신뢰할 수 있는 브랜드 기준<br>\t\t\t\t\t<br>생성형 AI 에이전트 등장 • 소매업체에서 브랜드와 AI 시스템으로 힘의 중심 이동 • 광범위하고 빠르며 정교한 정보 탐색 및 분석 가능<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>AI 에이전트의 정보 처리 능력<br>\t\t\t\t\t<br>인간의 한계 • 모든 쇼핑몰 일일이 검색 어려움 • 계정 관리의 복잡함 • 각 쇼핑몰의 신뢰도 비교 시간 부족 • 익숙한 몇몇 플랫폼에만 의존<br>\t\t\t\t\t<br>AI 에이전트의 능력 • 모든 복잡함을 대신 처리 • 소비자가 미처 고려하지 못한 요소까지 반영 • 더 실용적이고 정교한 의사결정 지원<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>AI 에이전트의 객관적 추천 기준<br>\t\t\t\t\t<br>레딧Reddit 같은 커뮤니티 기반 데이터 활용<br>\t\t\t\t\t<br>• 가격: 어디가 가장 저렴한가? • 재고 상태: 원하는 제품이 실제로 구매 가능한가? 여러 옵션을 받아보고 반품이 쉬운가? • 신뢰도: 정시 배송을 꾸준히 해온 이력이 있는가? • 서비스 품질: 반품이나 고객 지원이 간편하고 친절한가? • 제휴 파트너십: 믿을 수 있는 결제 시스템과 배송 파트너와 협력하는가?<br>\t\t\t\t\t<br>결과: 실용적이고 객관적인 기준에 따라 구매 결정<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>리테일 시장 평준화 현상<br>\t\t\t\t\t<br>과거 구매 패턴 • '프렌치 쇼어 재킷' 검색 시 • 아마존, 잘란도, 유니클로 등 익숙하고 신뢰할 수 있는 플랫폼 의존 • 수많은 브랜드와 쇼핑몰 비교는 너무 번거롭고 시간 소모적<br>\t\t\t\t\t<br>AI 에이전트 활용 시 • 단 몇 초 만에 모든 과정 처리 • 페인터재킷Paynter Jackets 같은 덜 알려졌지만 좋은 브랜드 발굴 • 인지도보다 실제 만족도와 가성비, 서비스 품질 기준 추천<br>\t\t\t\t\t<br>변화 결과 • 소매업체 영향력 감소 • 더 나은 제품, 가격, 고객 경험 제공 브랜드가 중심으로 부상<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>명확한 승자 - 아마존과 효율적 플랫폼<br>\t\t\t\t\t<br>아마존 등의 경쟁 우위 • 매우 낮은 마진 구조 • 광범위한 배송 네트워크 • 유연한 반품 정책<br>\t\t\t\t\t<br>AI 에이전트 시대 강화 요인 • 가격, 배송 속도, 고객 서비스 등 객관적 기준으로 평가 • 이런 조건을 충족하는 기업의 더욱 강력한 입지 확보<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>명확한 패자 - 중간 포지션 리테일러<br>\t\t\t\t\t<br>위험에 처한 업체들 • 백화점 등 중간 포지션 리테일러 • 가격 경쟁력도, 서비스 품질도 뚜렷하지 않음 • 별다른 차별점 없으면 도태 위험<br>\t\t\t\t\t<br>양극화 현상 • 효율적인 저가형 유통 플랫폼 vs 프리미엄 브랜드 사이에서 설 자리 상실 • 탁월한 고객 경험이나 독점 상품 제공하지 못하면 생존 어려움<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>고가 전략의 생존 조건<br>\t\t\t\t\t<br>단순 가격 경쟁만은 아님 • 고가 전략도 가능하지만 압도적인 서비스와 고객 경험 전제<br>\t\t\t\t\t<br>핵심 경쟁 요소 • 빠른 배송 • 간편한 반품 • 친절하고 실질적인 고객 지원 • 모든 과정에서 스트레스 없는 완성도 높은 쇼핑 경험<br>\t\t\t\t\t<br>지역 기반 소규모 리테일러 생존법 • 특색 있는 제품이나 차별화된 오프라인 경험 제공 • AI 에이전트가 지역 소비의 가치를 인식하도록 디지털상 충분한 노출<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>AI 에이전트 최적화(AAO)의 부상<br>\t\t\t\t\t<br>새로운 전략 영역 등장 • AI Agent Optimization(AAO): AI 에이전트에 선택받는 최적화 전략 • 과거 <b>검색엔진 최적화(SEO)</b>에서 AAO로 전환 필요<br>\t\t\t\t\t<br>AI 에이전트의 평가 기준 • 품질, 기능, 리뷰 등 다양한 요소 기반 판단 • 브랜드 강점이 AI 시스템이 쉽게 인식하고 이해하도록 명확하고 측정 가능하게 표현<br>\t\t\t\t\t<br>콘텐츠 소스의 중요성 • AI 에이전트가 신뢰하고 참고할 콘텐츠 소스 관리 • 제품 리뷰나 고객 후기의 양과 질 모두 중요<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>전통 브랜드가 직면한 도전<br>\t\t\t\t\t<br>브랜드 이미지 의존 브랜드의 위기 • 제품의 본질적 가치나 차별화 요소 없이 이름값만으로 프리미엄 받아온 브랜드 • AI 에이전트 판단 기준에서 저가 브랜드와 뚜렷한 차이 만들지 못하면 가격 프리미엄 유지 어려움<br>\t\t\t\t\t<br>복잡한 상황 • 하나의 AI 에이전트가 아닌 여러 에이전트 동시 고려 필요 • 포Poe 같은 AI 에이전트 통합 플랫폼 통해 챗GPT, 딥시크, 퍼플렉시티 등 여러 에이전트 손쉽게 이동<br>\t\t\t\t\t<br>새로운 마케팅 영역 • <b>검색엔진 마케팅(SEM)</b>에서 <b>AI 에이전트 마케팅(AAM)</b>으로 확장<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>브랜드 재정의의 핵심 - 니즈 중심 접근<br>\t\t\t\t\t<br>AI 에이전트의 판단 방식 • 특정 브랜드나 제품명 중심 판단하지 않음 • 소비자 니즈를 기반으로 검색과 추천 시작<br>\t\t\t\t\t<br>니즈 중심 검색의 증가 • \"여행용으로 좋은 충전기\" 같은 니즈 중심 검색어가 특정 제품명보다 훨씬 많음<br>\t\t\t\t\t<br>브랜드 성공 조건 • 어떤 고객의 니즈를 해결하는지 명확한 정의 • 그 니즈를 차별화된 방식으로 충족시키는 방법 제시 • 신뢰를 줄 수 있어야 함 • 경쟁사와 어떻게 다른지 뚜렷하게 보여야 함<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>브랜드의 새로운 기회<br>\t\t\t\t\t<br>혁신적 브랜드의 기회 • 제품의 혁신성, 서비스 품질 또는 그 둘을 모두 갖춘 브랜드 • AI 에이전트가 범용 제품이나 단순 모방 브랜드보다 더 높은 우선순위로 추천 가능성<br>\t\t\t\t\t<br>새로운 마케팅 전략 • 리테일러를 통해 제품을 밀어내기보다 • 제품 후기나 사용자 리뷰 등 AI 에이전트가 주로 참고하는 채널에서 브랜드 장점 드러내기 • AI 에이전트가 참조하는 채널 중심의 마케팅<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>범용 제품이 직면한 과제<br>\t\t\t\t\t<br>범용generic 제품 정의 • 브랜드를 제외하면 뚜렷한 차별점이 없는 거의 동일한 상품 • 사무실 전구, 배터리, 일반 생활용품 등<br>\t\t\t\t\t<br>시그니파이 vs 범용 브랜드 사례 • 시그니파이: 과거 필립스 브랜드로 고품질 조명 생산 • 범용 브랜드: 외형, 기능, 품질 면에서 거의 차이 없는 유사 제품 • 상당수 같은 공장에서 생산<br>\t\t\t\t\t<br>AI 에이전트 시대의 변화 • 브랜드 프리미엄 정당화 어려워짐 • 리뷰와 제품 데이터 빠른 분석으로 품질 차이 정량적 제시<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>브랜드가 드러나지 않는 상품의 위험<br>\t\t\t\t\t<br>문제가 심각한 제품군 • 전구, 배터리, 일반 생활용품 등 • 소비자가 브랜드를 체감하지 못하는 제품<br>\t\t\t\t\t<br>AI 에이전트의 판단 시나리오 • \"이 두 제품은 동일한 공장에서 제조됐으며 가격은 이쪽이 더 저렴하다\" • 저가 브랜드 제품을 추천하거나 자동으로 구매<br>\t\t\t\t\t<br>결과 • 기존 브랜드의 소비자 충성도 유지 어려워짐 • 브랜드 네임만으로는 살아남기 어려움<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>브랜드 차별화 전략 4가지<br>\t\t\t\t\t<br>한 가지 또는 그 이상에서 명확한 차별성 필요<br>\t\t\t\t\t<br>1. 가격 경쟁력 • 저가형 범용 제품과 경쟁하려면 매력적인 가격대 또는 가성비 모델 • AI 에이전트 기반 검색에서 합리적인 대안으로 노출 확률 증가<br>\t\t\t\t\t<br>2. 제품 혁신 • 기능, 소재, 성능 면에서 두드러지는 제품 • AI 에이전트 비교 기준에서 쉽게 눈에 띔 • 명확한 기술 우위는 비교 자체를 어렵게 만들어 브랜드 가치 증대<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>브랜드 차별화 전략 4가지 (계속)<br>\t\t\t\t\t<br>3. 디자인 차별화 • 스타일과 감각을 중시하는 소비자를 위한 고유한 미적 요소와 품질 반영 디자인 • AI 에이전트가 감성적 가치까지 인식할 수 있다면 강력한 차별점<br>\t\t\t\t\t<br>4. 서비스 경험 • 구매 이후 경험이 브랜드 인식에 큰 영향 • 우수한 고객 지원, 편리한 반품 시스템, 보증 정책 등 • AI 에이전트가 참조하는 사용자 리뷰나 커뮤니티에서 높은 평가로 연결<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>무선 휴대폰 충전기 시장 사례<br>\t\t\t\t\t<br>이케아의 전략 • 단순한 기능에 합리적인 가격의 제품 • 가격 경쟁력 중심<br>\t\t\t\t\t<br>젠스Zens의 전략 • 고급 전자 부품, 다중 충전 코일, 더 빠른 충전 속도 등 • 기술 우위를 가진 프리미엄 브랜드<br>\t\t\t\t\t<br>성공의 관건 • 두 브랜드 모두 각기 다른 소비자층의 니즈 충족 • 자신만의 강점을 AI 에이전트에 얼마나 효과적으로 전달하느냐가 핵심<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>내용 요약<br>\t\t\t\t\t<br>AI 에이전트가 쇼핑을 혁신하는 방식 • 복잡한 구매 과정을 단 몇 초로 간소화 • 객관적이고 실용적인 기준으로 제품 추천 • 전통적인 플랫폼 게이트키퍼의 영향력 축소<br>\t\t\t\t\t<br>리테일 시장의 재편 • 효율적인 저가 플랫폼과 프리미엄 경험 브랜드 양극화 • 중간 포지션 리테일러는 차별점 없으면 도태 • AI 에이전트 최적화(AAO) 새로운 필수 역량<br>\t\t\t\t\t<br>브랜드 생존 전략 • 브랜드 네임만으로는 생존 불가 • 가격, 혁신, 디자인, 서비스 중 하나 이상의 명확한 차별화 필요 • 니즈 중심 접근과 AI가 인식할 수 있는 가치 제공이 핵심<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>토론 질문 1-5<br>\t\t\t\t\t<br>\t\t\t\t\t\t<br>- 현재 여러분이 자주 사용하는 쇼핑 플랫폼에서 AI 에이전트를 도입한다면, 가장 먼저 자동화되기를 원하는 구매 과정은 무엇인가요? 그 이유는?<br>\t\t\t\t\t\t<br>- AI 에이전트가 브랜드보다 가격과 품질을 우선시한다면, 여러분이 좋아하는 브랜드 중 위험에 처할 것 같은 브랜드는 어떤 것들인가요?<br>\t\t\t\t\t\t<br>- \"범용 제품\"의 관점에서 볼 때, 여러분의 업무나 일상에서 사용하는 제품 중 브랜드 가치보다 실용성이 더 중요하다고 생각되는 제품은 무엇인가요?<br>\t\t\t\t\t\t<br>- AI 에이전트 최적화(AAO) 시대에 기존 검색엔진 최적화(SEO) 전문가들이 어떤 새로운 역량을 갖춰야 할까요?<br>\t\t\t\t\t\t<br>- 만약 여러분이 소상공인이라면, AI 에이전트가 여러분의 제품을 추천하도록 하기 위해 어떤 전략을 사용하겠습니까?<br>\t\t\t\t\t<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>토론 질문 6-10<br>\t\t\t\t\t<br>\t\t\t\t\t\t<br>- AI 에이전트가 주도하는 쇼핑 환경에서도 여전히 인간의 직관이나 감정적 판단이 필요한 구매 영역은 어떤 것들이 있을까요?<br>\t\t\t\t\t\t<br>- 아티클에서 제시한 4가지 브랜드 차별화 전략(가격, 혁신, 디자인, 서비스) 중 한국 시장에서 가장 효과적일 것 같은 전략은 무엇이고 그 이유는?<br>\t\t\t\t\t\t<br>- AI 에이전트가 고객 데이터를 완전히 통제하게 된다면, 개인정보 보호와 관련해 어떤 새로운 우려사항들이 생길 수 있을까요?<br>\t\t\t\t\t\t<br>- 전통적인 오프라인 매장들이 AI 에이전트 시대에도 경쟁력을 유지하려면 어떤 차별화된 경험을 제공해야 할까요?<br>\t\t\t\t\t\t<br>- 여러분이 마케팅 담당자라면, AI 에이전트가 신뢰하고 참고할 만한 \"콘텐츠 소스\"를 구축하기 위해 어떤 구체적인 방법들을 사용하겠습니까?<br>\t\t\t\t\t<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>\t\t\t\t<br>\t\t\t\t<br>\t\t\t\t\t<br>마케팅<br>\t\t\t\t\t<br>기존 검색은 잊어라! LLM 시대 브랜딩 최적화<br>\t\t\t\t\t<br><a href=\"https://www.hbrkorea.com/article/author/wno/3529\" target=\"_blank\">데이비드 뒤부아(David Dubois)</a>,<a href=\"https://www.hbrkorea.com/article/author/wno/3892\" target=\"_blank\">존 도슨(John Dawson)</a>,<a href=\"https://www.hbrkorea.com/article/author/wno/3893\" target=\"_blank\">아칸시 자이스월(Akansh Jaiswal)</a><br>\t\t\t\t\t<br>디지털<br>\t\t\t\t\t<br>2025. 7. 10.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<a href=\"https://www.hbrkorea.com/upload_dir/source/HBR_Daily/Jun25_04_1768103300.jpg\" target=\"_blank\">\t\t\t\t\t\t\t\t\t\t\t</a><br><br>\t\t\t\t\t<br>지난 1년 동안 소비자들은 기존의 검색 엔진에서 챗GPT, 제미나이, 딥시크, 퍼플렉시티와 같은 생성형 AI 플랫폼으로 대거 이동했다. 1만2000명의 소비자를 대상으로 한&#160;<a href=\"https://www.capgemini.com/news/press-releases/71-of-consumers-want-generative-ai-integrated-into-their-shopping-experiences/?utm_source=chatgpt.com\" target=\"_blank\">설문조사</a>에서 58%가 제품이나 서비스 추천을 받기 위해 생성형 AI 도구를 이용했다고 응답했는데, 이는 2023년의 25%와 비교해 크게 증가한 수치다.&#160;<a href=\"https://www.theverge.com/ai-artificial-intelligence/631352/ai-search-adobe-analytics-google-perplexity-openai?utm_source=chatgpt.com\" target=\"_blank\">또 다른 연구</a>에 따르면 2024년 연말 쇼핑 시즌 동안 미국 소매 웹사이트로 유입된 AI 검색 추천 트래픽이 1300% 급증한 것으로 나타났다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><a href=\"https://blog.adobe.com/en/publish/2025/03/17/adobe-analytics-traffic-to-us-retail-websites-from-generative-ai-sources-jumps-1200-percent?utm_source=tldrnewsletter\" target=\"_blank\">발견하고, 계획하고, 구매하는 데</a>&#160;LLM을 사용하는 소비자들은 평균적으로&#160;<a href=\"https://neuron.expert/news/survey-52-of-us-adults-now-use-ai-large-language-models-like-chatgpt/11777/en/?utm_source=chatgpt.com\" target=\"_blank\">더 젊고, 부유하며, 높은 교육 수준을</a>&#160;갖추고 있다. 이들의 고객 여정은 더 이상 검색어를 입력하거나 웹사이트를 방문하는 것으로 시작되지 않는다. 이제 그 시작은 '대화'다. 소비자들은 AI 비서에게 “200달러 이하로 가장 좋은 커피머신이 뭐야?” 또는 “예산을 크게 넘기지 않고 주말 여행을 계획해줘”와 같은 질문을 던지고 있다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>브랜드 리더들에게 이러한 변화는 결코 과소평가할 수 없는 중대한 함의를 가진다. 이제 디지털 전략에는 단순히 검색 알고리즘뿐 아니라 AI 추천 엔진에 대한 최적화가 포함돼야 한다. 요컨대, LLM이&#160;<a href=\"https://hbr.org/2024/05/how-marketers-can-adapt-to-llm-powered-search\" target=\"_blank\">당신의 브랜드를 더 잘 인식하도록 만들어야 한다</a>.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>모델 점유율의 부상<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>지금까지 브랜드 인지도 측정은 소비자의 주의를 얼마나 끌었는지를 평가하는 방식이었다. 오프라인에서는 회상 조사(예: “러닝화를 떠올릴 때 어떤 브랜드가 생각나시나요?”), 온라인에서는 검색량이나 소셜미디어 언급량을 통해 소비자의 사적 관심이나 대중적 인기를 수치로 나타내는 식이었다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>하지만 LLM이 소비자와 브랜드 사이의 중개자로서 점점 더 중요한 역할을 하게 되면서 마케터들은 또 다른 형태의 ‘인지도’를 고려해야 한다. 바로 소비자에게 브랜드가 LLM을 통해 얼마나 자주, 얼마나 눈에 띄게, 얼마나 긍정적으로 노출되는지를 측정하는 것이다. 우리는 이것을 ‘모델 점유율Share of Model, SOM’이라고 부른다. 이 개념은 AI 시대 버전의 ‘검색 점유율Share of Search, SOS‘(사람들이 내 브랜드를 경쟁사 대비 얼마나 많이 검색하는가?) 또는 ‘목소리 점유율Share of Voice, SOV‘(사람들이 내 브랜드에 대해 경쟁사 대비 얼마나 많이 이야기하는가?)’라고 생각하면 된다. SOM은 인간의 의도(SOS)나 온라인 콘텐츠의 양(SOV)을 반영하는 대신, 주어진 질문에 대해 LLM이 어떻게 인식하고 어떤 브랜드를 추천하는지를 독특하게 모방해낸다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<a href=\"https://www.hbrkorea.com/upload_dir/source/HBR_Daily/250710_a.jpg\" target=\"_blank\">\t\t\t\t\t\t\t\t\t\t\t</a><br><br>\t\t\t\t\t<br>필자 중 두 명이 소속된 마케팅 에이전시 젤리피시Jellyfish는 대규모 프롬프트를 활용해 SOM을 측정하는 방법론을 개척해왔다. 이 접근 방식을 바탕으로, 우리는 AI가 브랜드에 대해 무엇을 그리고 어떻게 ‘생각’하는지를 해석할 수 있는 새로운 3가지 분석 틀을 제안한다. 첫째는 언급률mention rate로 특정 LLM이 브랜드를 얼마나 자주 언급하는지를 추적한다. 둘째는 인간-AI 인지도 격차human-AI awareness gap로 사람들을 대상으로 조사한 브랜드 인지도와 LLM을 대상으로 조사한 인지도 사이의 차이를 측정한다. 셋째는 브랜드 및 카테고리 감성 분석brand and category sentiment으로 LLM이 브랜드를 추천하는 논리를 그에 따른 강점과 약점으로 세분화해 보여준다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>이탈리아의 세탁세제 시장을 예로 들어보자. 우리는 젤리피시의 독자적인 SOM 플랫폼을 활용해 6개의 LLM에서 주요 브랜드들의 언급률을 분석했다. 이 분석에서 두 가지 주요 관찰 결과가 도출됐다. 첫째, 브랜드의 SOM은 LLM마다 크게 다르게 나타났다. 이는 각 LLM이 브랜드 정보를 처리하는 방식이 서로 다르다는 점을 보여준다. 예를 들어, 아리엘Ariel&#160;브랜드의 SOM은 라마Llama&#160;모델에서는 거의 24%에 달하는 반면, 제미나이에서는 1%도 채 되지 않는다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>둘째, 일부 브랜드의 경우 특정 모델에서는 아예 검색이 되지 않기도 했다. 예를 들어, 샹클레르Chanteclair는 퍼플렉시티에서 19%의 SOM을 기록하며 존재감을 보이지만, 라마 모델에서는 아예 언급조차 되지 않는다. 이처럼 LLM은 어떤 브랜드를 포함시키거나 아예 제외하는 경향이 있다. 이는 알고리즘 상 주목도가 낮더라도 어느 정도 노출은 되는 검색 엔진이나 소셜미디어와는 다른 점이다. LLM에 등록되지 않았다는 것은 그 브랜드가 소비자 앞에 아예 나타나지 않는다는 것을 의미한다. 구글과 달리 챗GPT 같은 LLM에서는 ‘2페이지’라는 것도 없다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<a href=\"https://www.hbrkorea.com/upload_dir/source/HBR_Daily/250710_b.jpg\" target=\"_blank\">\t\t\t\t\t\t\t\t\t\t\t</a><br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>사람과 AI 간 브랜드 인지도 격차 탐색<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>중요한 점은 브랜드가 LLM에서 얼마나 눈에 띄는지가&#160;<a href=\"https://www.similarweb.com/blog/insights/ai-news/searchgpt-is-coming/\" target=\"_blank\">실제 시장 점유율이나 기존의 인지도 지표와 크게 다를 수 있다는 것이다</a>. 따라서 브랜드 매니저가 가장 먼저 해야 할 일은 사람들이 인지하는 브랜드 인지도(SOS나 SOM을 통해 측정되는 것)와 LLM이 인식하는 브랜드 인지도 사이의 연관성을 면밀히 분석하는 것이다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>참고하자면 브랜드의 SOM은 LLM마다 다르게 나타나는 경우가 많지만, 이후 예시에서는 논의의 편의를 위해 각 브랜드의 LLM별 SOM에 초점을 맞추어 설명하려고 한다. LLM 간 SOM 변동성이 갖는 의미는 뒤에서 다시 다룰 것이다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>2024년 상반기 동안 미국 자동차 브랜드의 전반적인 인지도와 LLM 상의 인지도를 분석한 결과를 살펴보자. 우리는 젤리피시의 도구를 통해 측정한 LLM 상의 브랜드 인지도와&#160;<a href=\"https://platform.yougov.com/brandindex-lite\" target=\"_blank\">유고브</a>YouGov의 시장 조사 데이터를&#160;통해 측정한 일반적인 인지도를 바탕으로 ‘인간-인공지능 인지도 매트릭스Human-AI Awareness Matrix&#160;’를 구성했다. 이 매트릭스에서 브랜드들은 다음의 네 가지 뚜렷한 범주로 분류된다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<a href=\"https://www.hbrkorea.com/upload_dir/source/HBR_Daily/250710_c.jpg\" target=\"_blank\">\t\t\t\t\t\t\t\t\t\t\t</a><br><br>\t\t\t\t\t<br>1. 사이보그형Cyborgs:&#160;이 유형의 브랜드는 전통적인 지표(예: 설문조사, 검색 순위, 점유율)와 LLM 모두에서 최상위 인지도를 보인다. 예를 들어, 위 차트에서 테슬라의 위치를 보자. 일론 머스크의 전방위적인 노출은 소비자들이 테슬라 브랜드를 강하게 인식하도록 만든다. 테슬라는 브랜드가 강조하는 구체적인 기능들 덕분에 LLM에서도 높은 점수를 얻고 있다. 최근 테슬라가 선보인 새로운 디지털 광고 전략은 사람들뿐 아니라 LLM 사이에서도 브랜드 점수를 더욱 끌어올리는 것을 목표로 하고 있다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>2. AI 개척자형AI Pioneers:&#160;이 유형의 브랜드는 LLM에서는 잘 드러나지만 시장에서는 인지도가 낮다. 이들은 대개 AI 친화적인 브랜드이거나 디지털 영역에서 특정 틈새를 공략하는 신생 디지털 기업들이다. 이 사분면에서 리비안Rivian이 차지한 위치는 문제 해결 중심resolution-focused의 콘텐츠 전략 덕분인 것으로 보인다(이에 대해서는 뒤에서 더 자세히 설명할 예정이다). 이는 리비안이 ‘솔루션을 만드는 브랜드’로서의 포지셔닝과 잘 맞아떨어진다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>3. 하이스트리트 히어로형High-Street Heroes:&#160;이 유형은 시장에서는 높은 인지도를 가진 기존의 유명 브랜드들이지만 AI가 생성한 콘텐츠에서는 존재감이 미미하거나 아예 언급되지 않는 경우다. 대표적인 사례로는 링컨&#160;Lincoln이 있다. 프랭크 로이드 라이트는 링컨을 가리켜 “세상에서 가장 아름다운 자동차”라고 말한 바 있다. 그러나 링컨은 우아함이나 전통 같은 무형의 가치에 초점을 맞추고 있어, 이런 요소들이 LLM에서는 덜 중요하게 여겨지기 때문에 브랜드 인지도가 낮은 것으로 보인다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>4. 이머전트형Emergent&#160;:&#160;이 유형의 브랜드는 시장과 LLM 모두에서 낮은 인지도를 보이며 고전하고 있다. AI 기반 검색이 표준이 되어가는 시대에 이들은 디지털 상에서 존재감을 잃을 위험에 처해 있다. 프리미엄 포지셔닝에도 불구하고 폴스타Polestar는 이번 분석에서 전체 스펙트럼에 걸쳐 가시성을 확보하는 데 어려움을 겪는 것으로 나타났다. 이는 디지털 발자취의 부족이나 LLM의 정보 처리 방식에 부합하지 못하는 브랜드 특성 때문으로 보인다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>이 분석이 시사하는 것은 무엇일까. 마케터들은 브랜드를 LLM의 '의식consciousness&#160;' 속에 깊이 각인시키기 위한 전략을 새롭게 마련해야 한다. 이러한 전략은 사람의 주목을 끄는 기존 방식과는 매우 다를 가능성이 높다. 우리가 알고 있는 LLM의 본질은 이렇다. LLM은 주의attention가 아닌 해결resolution에 집중한다. 따라서 브랜드가 SOM에서 높은 점수를 얻고자 한다면 ‘<a href=\"https://hbr.org/2016/09/know-your-customers-jobs-to-be-done\" target=\"_blank\">수행해야 할 과제</a>job to be done’를 정확히 정의하는 것이 최우선 과제가 돼야 한다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>LLM에서 브랜드 인지도를 높이는 방법<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>제품 카테고리 전반에 걸친 우리의 분석은 각 산업군에서 LLM이 다양한 제품군을 어떻게 인식하는지를 보여주며, 이는 해당 브랜드들에 구체적인 기회로 이어진다. 이는 단순히 어떤 콘텐츠(텍스트, 이미지, 영상)를 제작할 것인가에 대한 문제를 넘어, 브랜드가 메시지를 어디에 배포할 것인가(자사 웹사이트, 언론, 전문가 채널, 커뮤니티 등)에 대한 전략적 판단에도 영향을 미친다. LLM은 이제 단순한 키워드를 넘어 개념과 관계에 주목한다. 이는 LLM 상에서 브랜드 인지도를 구축하는 새로운 방식의 기회를 만들어낸다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>브랜드는 제품이 무엇인지를 설명하는 데 그치지 않고, 그것이 더 넓은 맥락, 활용 사례, 사용자 니즈와 어떻게 연결되는지를 보여주는 콘텐츠를 만들어야 한다. 예를 들어, “우리는 최고의 러닝화를 팝니다”라고 말하기보다는 “탄소 플레이트 미드솔 디자인이 장거리 러너의 퍼포먼스를 향상시킵니다”처럼 구체적인 사용 맥락과 기능을 설명하는 방식이 더 효과적이다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>브랜드는 전문성을 입증할 수 있는 근거도 함께 강조해야 한다. 피부과 전문의가 인정한 연구를 인용하거나 펍메드PubMed&#160;연구 자료를 연결하는 스킨케어 브랜드는 그렇지 않은 경쟁 브랜드보다 더 돋보일 가능성이 높다. 고객의 고충—즉, 니즈, 질문, 과제—에 대해 ‘좁고 깊게’ 이야기하는narrowcast&#160;브랜드일수록 LLM에 노출될 가능성이 크다. 반대로 단순히 메시지를 일방적으로 ‘광범위하게 퍼뜨리기만broadcast’ 하는 브랜드는 주목받지 못할 수 있다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>이러한 점은 전통적인 자동차 브랜드인 링컨이 왜 테슬라나 리비안에 비해 LLM에서 덜 두드러지는지를 설명한다. 테슬라나 리비안은 배터리 수명, 기술 스택, 소프트웨어 등 기능과 특징에 초점을 맞추는 데 반해, 링컨은 주로 감성적이고 마케팅 중심의 콘텐츠를 강조한다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>마찬가지로&#160;<a href=\"https://www.similarweb.com/blog/insights/ai-news/searchgpt-is-coming/\" target=\"_blank\">쉐인&#160;</a>Shein과 같은 패스트패션 브랜드는 SOV에서는 압도적인 존재감을 보이지만 AI 인지도 면에서는 뒤처지고 있다. 이는 차별화되지 않은 콘텐츠가 지나치게 많고, 리뷰나 인증서 같은 신뢰 신호trust signals&#160;가 부족하기 때문이다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>반면, 스킨케어 브랜드 디오디너리The Ordinary는 성분 설명이 포함된 구조화된 제품 페이지와 과학적 근거에 기반한 투명한 콘텐츠(예: ‘왜’, ‘어떻게’ 이 크림이 효과가 있는지를 설명)을 제공함으로써 LLM에 강하게 인식된다. 나이키는 고객이 생성한 콘텐츠(러너들의 블로그, 레딧, 스트라바 게시글 등), 명확한 활용 사례가 담긴 상세 제품 페이지(예: “마라톤 훈련을 위한 최고의 러닝화”), 그리고 통합된 앱 생태계(나이키 런 클럽, 나이키 트레이닝 클럽)를 통해 강력한 존재감을 보인다. 이 두 브랜드는 이번 분석에서 각자의 제품 카테고리에서 최상위를 차지했다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>주목할 점은 기존의 전통 브랜드들도 AI 시대에 충분히 성공할 수 있다는 점이다. 단, 관련성relevance, 대표성representation, 구조화된 디지털 스토리텔링에 전략적으로 투자할 경우에 그렇다. 대표적인 사례가 캐딜락Cadillac이다. 100년 넘는 역사를 가진 이 자동차 브랜드는 사람과 AI 모두에게 높은 브랜드 인지도를 기록하고 있다. ‘대담함Audacity’, ‘도전적 인물 25The Daring 25’ 같은 캠페인과 국제 파트너십을 통해 AI 상에서의 가시성을 효과적으로 끌어올렸다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>LLM 감정 분석 파악하기<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>AI 브랜드 인지도를 살펴보고 이것이 다른 인지도 지표들과 어떻게 연관되는지를 파악하는 수준을 넘어서, 마케터들은 감정sentiment(긍정성)과 의미망semantics(연관 단어)을 통해 브랜드 및 카테고리에 대한 LLM의 감정적 인식도 분석할 수 있다. 이러한 접근은 다음과 같은 질문에 답하는 데 도움이 된다. 우리 브랜드의 강점과 약점은 LLM의 인식상 어떻게 보이고 있는가? LLM이 우리 브랜드를 바라보는 방식을 어떻게 바꿀 수 있을까?<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>예를 들어, 미국 여행 산업에 대한 우리의 분석에 따르면 LLM은 편의성, 다양성, 공간감과 같은 특성을 중요하게 평가한다. 부킹닷컴Booking은 모든 모델에서 전반적으로 가장 높은 점수를 기록했다. 우리는 또한 각 브랜드가 경쟁사 대비 어떤 강점과 약점을 갖고 있는지도 함께 분석했다. 예를 들어, 버보Vrbo는 프라이버시와 독창성 측면에서 부킹닷컴보다 훨씬 높은 점수를 받았다. 이는 AI 인지도를 최적화하는 데 적극적으로 활용할 수 있는 강점이다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<a href=\"https://www.hbrkorea.com/upload_dir/source/HBR_Daily/250710_d.jpg\" target=\"_blank\">\t\t\t\t\t\t\t\t\t\t\t</a><br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>LLM을 대상으로 한 마케팅 전략<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>LLM의 감정 분석에 대한 인사이트를 바탕으로 마케터들은 브랜드의 AI 가시성visibility을 최적화하기 위한 다양한 접근법을 실행할 수 있다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>첫째, 텍스트, 이미지, 영상, 구조화된 데이터(예: 표, 목록, 리뷰)를 모두 아우르는 다각적 미디어 전략을 채택해야 한다. 브랜드의 제품이나 서비스가 더 넓은 맥락, 실제 활용 사례, 소비자 니즈와 어떻게 연결되는지를 명확히 보여주는 콘텐츠는(예를 들어, 단순히 “전기 SUV”라고 하기보다 “겨울철 주행에 적합한 최고의 전기차”처럼 표현하는 방식) LLM에서 강력한 개념 연관성conceptual associations을 형성하는 데 효과적이다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>브랜드는 자사 제품이 자연스럽게 어울리는 의미의 틈새semantic niche, 즉 특정 의미 영역 내에서의 주도권을 확보하는 데에도 앞장서야 한다. 디오디너리 브랜드가 스킨케어 과학이라는 영역에서 자리 잡은 것처럼 말이다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>중요한 점은 각 소셜미디어 플랫폼마다 ‘작동 방식’이 다르듯이(예를 들어 틱톡에서 잘 통하는 콘텐츠가 링크드인에서는 통하지 않을 수 있듯) 각 LLM도 콘텐츠를 해석하는 자체 알고리즘적 관점algorithmic lens이 존재한다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>다시 한번 미국 여행 산업을 예로 들어 보겠다. 이번에는 에어비엔비에 대한 LLM의 인식을 살펴본다. 라마는 브랜드가 제공하는 고유함uniqueness에 주목하고, 챗GPT는 브랜드가 지역 옵션local options을 얼마나 다양하게 제공하는지를 중시한다. 반면 퍼플렉시티는 유연성flexibility을 가장 중요하게 여기는 것으로 보인다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>이는 앞서 언급한 브랜드별 LLM 가시성의 차이와도 연관된다. 우리는 마케터들이 각 LLM의 정보 처리 방식 중 자사 브랜드의 콘텐츠와 내러티브 강점을 가장 잘 부각시킬 수 있는 모델에 맞춰 콘텐츠를 맞춤 설계할 것을 권장한다. 물론, 해결 중심 메시지solution-oriented messaging와 같은 공통 원칙은 모든 모델에 적용해야 한다. 이는 섬세한 균형이 필요한 작업이다. 지배적인 모델의 특성에 맞춰 콘텐츠를 정교하게 조정하면 가시성을 높일 수 있지만, 모든 LLM에 고르게 분산된 접근은 오히려 브랜드 메시지의 임팩트를 약화시킬 수 있다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<a href=\"https://www.capgemini.com/news/press-releases/71-of-consumers-want-generative-ai-integrated-into-their-shopping-experiences/?utm_source=chatgpt.com\" target=\"_blank\">\t\t\t\t\t\t\t\t\t\t\t</a><br><br>\t\t\t\t\t<br>전통적인 검색 엔진에서 벗어나는 흐름은 단순한 기술 진화가 아니다. 이것은 소비자 행동의 근본적인 변화이며 마케팅 접근 방식 또한 그에 맞춰 달라져야 한다. 즉, 설득에서 정밀함으로, 키워드에서 조언으로, 시장 점유율에서 문제 해결 점유율로의 전환이 필요하다. 이 흐름에 제대로 대응한다면 브랜드는 점점 더 소비자 의사결정을 좌우하게 되는 알고리즘 기반의 대화 속에서 필수적인 존재로 자리매김할 수 있다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>원문 |&#160; <a href=\"https://hbr.org/2025/06/forget-what-you-know-about-seo-heres-how-to-optimize-your-brand-for-llms\" target=\"_blank\">https://hbr.org/2025/06/forget-what-you-know-about-seo-heres-how-to-optimize-your-brand-for-llms</a><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>데이비드 뒤부아는 인시아드INSEAD의 부교수이다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>존 도슨은 젤리피시에서 전략 부사장을 맡고 있으며, 광고 전략과 AI 마케팅 실행에 대해 고객들에게 자문을 제공하고 있다. 그는 호주, 북유럽, 중국, 미국 등지의 글로벌 및 로컬 브랜드들과 협업한 경험을 보유하고 있다. 시드니공과대학교에서 MBA를, 시드니대학교에서 학사 학위를 취득했다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>아칸시 자이스월은 젤리피시에서 투자 분석 수석 매니저로 근무하고 있으며, 글로벌 미디어 캠페인을 최적화하고 LLM 내 브랜드 인식을 정량화할 수 있는 AI 및 분석 솔루션을 설계하고 있다. 그는 마케팅 분석, 자동화, 예측 모델링을 통해 데이터 기반 성장 전략을 주도하고 있다. 아칸시는 러트거스대학교에서 데이터 분석 석사 학위를, 심바이오시스 국제대학교에서 컴퓨터공학 학사 학위를 취득했다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>에디팅&#160;이정흔<br>\t\t\t\t\t<br><br>\t\t\t\t\t출처: <<a href=\"https://www.hbrkorea.com/article/view/atype/di/category_id/3_1/article_no/1407/page/1\" target=\"_blank\">https://www.hbrkorea.com/article/view/atype/di/category_id/3_1/article_no/1407/page/1</a>> <br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>\t\t\t\t\t<br>기존 검색은 잊어라! LLM 시대 브랜딩 최적화<br>\t\t\t\t\t<br>총 25개 슬라이드<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>원문 정보<br>\t\t\t\t\t<br>저자: 데이비드 뒤부아(David Dubois), 존 도슨(John Dawson), 아칸시 자이스월(Akansh Jaiswal)<br>\t\t\t\t\t<br>출처: 디지털<br>\t\t\t\t\t<br>발행일: 2025. 7. 10.<br>\t\t\t\t\t<br>원문 링크: <a href=\"https://hbr.org/2025/06/forget-what-you-know-about-seo-heres-how-to-optimize-your-brand-for-llms\" target=\"_blank\">https://hbr.org/2025/06/forget-what-you-know-about-seo-heres-how-to-optimize-your-brand-for-llms</a><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>아티클 구조<br>\t\t\t\t\t<br>• 소비자 행동 변화와 LLM 도입<br>\t\t\t\t\t<br>\t\t\t\t\t\t<br>- 생성형 AI 플랫폼으로의 대거 이동<br>\t\t\t\t\t\t<br>- 새로운 고객 여정의 시작점 • 모델 점유율(SOM)의 부상<br>\t\t\t\t\t\t<br>- 새로운 브랜드 인지도 측정 방식<br>\t\t\t\t\t\t<br>- 3가지 분석 틀 제안 • 인간-AI 브랜드 인지도 격차 분석<br>\t\t\t\t\t\t<br>- 4가지 브랜드 유형 분류<br>\t\t\t\t\t\t<br>- 매트릭스를 통한 전략적 포지셔닝 • LLM 최적화 전략과 실행<br>\t\t\t\t\t\t<br>- 브랜드 인지도 향상 방법론<br>\t\t\t\t\t\t<br>- 감정 분석 활용법 • 미래 마케팅 방향성<br>\t\t\t\t\t\t<br>- 전통적 접근에서 해결 중심으로의 전환<br>\t\t\t\t\t<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>1. 소비자 행동의 급격한 변화<br>\t\t\t\t\t<br>• 생성형 AI 사용률 급증: 제품/서비스 추천을 위한 생성형 AI 도구 사용률이 2023년 25%에서 2024년 58%로 증가 • 쇼핑 패턴 변화: 2024년 미국 소매 웹사이트로의 AI 검색 추천 트래픽이 1300% 급증 • 타겟 고객층: LLM 사용 소비자들은 평균적으로 더 젊고, 부유하며, 높은 교육 수준 보유<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>2. 새로운 고객 여정의 시작<br>\t\t\t\t\t<br>• 기존 방식: 검색어 입력 → 웹사이트 방문 • 새로운 방식: AI 비서와의 대화가 시작점 • 대화형 질문 사례:<br>\t\t\t\t\t<br>\t\t\t\t\t\t<br>- \"200달러 이하로 가장 좋은 커피머신이 뭐야?\"<br>\t\t\t\t\t\t<br>- \"예산을 크게 넘기지 않고 주말 여행을 계획해줘\" • 브랜드 전략 변화 필요: 검색 알고리즘뿐 아니라 AI 추천 엔진 최적화 포함<br>\t\t\t\t\t<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>3. 모델 점유율(SOM) 개념 도입<br>\t\t\t\t\t<br>정의: 소비자에게 브랜드가 LLM을 통해 얼마나 자주, 얼마나 눈에 띄게, 얼마나 긍정적으로 노출되는지를 측정 • 기존 지표와의 차이점:<br>\t\t\t\t\t<br>\t\t\t\t\t\t<br>- SOS(검색 점유율): 인간의 의도 반영<br>\t\t\t\t\t\t<br>- SOV(목소리 점유율): 온라인 콘텐츠의 양 반영<br>\t\t\t\t\t\t<br>- SOM: LLM의 인식과 추천 패턴 반영<br>\t\t\t\t\t<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>4. SOM 측정을 위한 3가지 분석 틀<br>\t\t\t\t\t<br>언급률(Mention Rate)<br>\t\t\t\t\t<br>• 특정 LLM이 브랜드를 얼마나 자주 언급하는지 추적<br>\t\t\t\t\t<br>인간-AI 인지도 격차(Human-AI Awareness Gap)<br>\t\t\t\t\t<br>• 사람 대상 브랜드 인지도와 LLM 대상 인지도 간의 차이 측정<br>\t\t\t\t\t<br>브랜드 및 카테고리 감성 분석(Brand and Category Sentiment)<br>\t\t\t\t\t<br>• LLM이 브랜드를 추천하는 논리를 강점과 약점으로 세분화<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>5. 이탈리아 세탁세제 시장 분석 사례<br>\t\t\t\t\t<br>주요 발견사항: • LLM별 차이: 아리엘 브랜드의 SOM이 라마 모델에서 24%, 제미나이에서 1% 미만 • 브랜드 배제 현상: 샹클레르가 퍼플렉시티에서 19% SOM 기록하지만 라마 모델에서는 아예 언급되지 않음 • 중요한 함의: LLM에서 '2페이지'는 없음 - 등록되지 않으면 완전히 배제<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>6. 인간-AI 인지도 매트릭스 소개<br>\t\t\t\t\t<br>4가지 브랜드 유형 분류: • 사이보그형: 전통적 지표와 LLM 모두에서 최상위 인지도 • AI 개척자형: LLM에서는 잘 드러나지만 시장 인지도는 낮음 • 하이스트리트 히어로형: 시장에서는 유명하지만 AI에서는 존재감 미미 • 이머전트형: 시장과 LLM 모두에서 낮은 인지도<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>7. 사이보그형 - 테슬라 사례<br>\t\t\t\t\t<br>특징: 전통적 지표와 LLM 모두에서 최상위 성과 • 성공 요인:<br>\t\t\t\t\t<br>\t\t\t\t\t\t<br>- 일론 머스크의 전방위적 노출<br>\t\t\t\t\t\t<br>- 브랜드가 강조하는 구체적인 기능들<br>\t\t\t\t\t\t<br>- 새로운 디지털 광고 전략으로 사람과 LLM 양쪽 모두 타겟팅<br>\t\t\t\t\t<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>8. AI 개척자형 - 리비안 사례<br>\t\t\t\t\t<br>특징: LLM에서는 돋보이지만 시장 인지도는 낮음 • 성공 요인:<br>\t\t\t\t\t<br>\t\t\t\t\t\t<br>- 문제 해결 중심의 콘텐츠 전략<br>\t\t\t\t\t\t<br>- '솔루션을 만드는 브랜드'로서의 포지셔닝 • 대상: AI 친화적 브랜드나 디지털 영역의 특정 틈새 공략 신생 기업들<br>\t\t\t\t\t<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>9. 하이스트리트 히어로형 - 링컨 사례<br>\t\t\t\t\t<br>특징: 시장에서는 유명하지만 AI 존재감 미미 • 원인 분석:<br>\t\t\t\t\t<br>\t\t\t\t\t\t<br>- 우아함, 전통 같은 무형 가치에 초점<br>\t\t\t\t\t\t<br>- LLM에서는 이런 요소들이 덜 중요하게 평가됨 • 과제: 감성적 가치를 구체적이고 측정 가능한 특징으로 전환 필요<br>\t\t\t\t\t<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>10. 이머전트형 - 폴스타 사례<br>\t\t\t\t\t<br>특징: 시장과 LLM 모두에서 낮은 인지도 • 위험 요소: AI 기반 검색이 표준화되면서 디지털 상에서 존재감을 잃을 위험 • 원인:<br>\t\t\t\t\t<br>\t\t\t\t\t\t<br>- 디지털 발자취의 부족<br>\t\t\t\t\t\t<br>- LLM 정보 처리 방식에 부합하지 못하는 브랜드 특성 • 과제: 전면적인 디지털 전략 재구성 필요<br>\t\t\t\t\t<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>11. LLM 최적화의 핵심 원칙<br>\t\t\t\t\t<br>기본 철학: LLM은 주의(attention)가 아닌 해결(resolution)에 집중 • 우선 과제: '수행해야 할 과제(job to be done)'를 정확히 정의 • 전략적 변화: 제품 설명에서 구체적 활용 맥락과 기능 설명으로 전환<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>12. 효과적인 콘텐츠 전략 1단계<br>\t\t\t\t\t<br>구체적 맥락 제공<br>\t\t\t\t\t<br>비효과적: \"우리는 최고의 러닝화를 팝니다\" 효과적: \"탄소 플레이트 미드솔 디자인이 장거리 러너의 퍼포먼스를 향상시킵니다\"<br>\t\t\t\t\t<br>전문성 입증<br>\t\t\t\t\t<br>• 피부과 전문의 인정 연구 인용 • 펍메드 연구 자료 연결 • 권위 있는 소스와의 연관성 강조<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>13. 효과적인 콘텐츠 전략 2단계<br>\t\t\t\t\t<br>Narrowcast vs Broadcast 접근법<br>\t\t\t\t\t<br>Narrowcast: 고객의 구체적 고충에 좁고 깊게 접근 • 니즈, 질문, 과제에 대한 정밀한 해결책 제시 • LLM 노출 가능성 증대<br>\t\t\t\t\t<br>Broadcast: 단순한 일방적 메시지 퍼뜨리기 • LLM에서 주목받지 못할 위험<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>14. 성공 사례 - 디오디너리<br>\t\t\t\t\t<br>전략: 과학적 근거 기반의 투명한 콘텐츠 • 성분 설명이 포함된 구조화된 제품 페이지 • '왜', '어떻게' 제품이 효과가 있는지 설명 • 과학적 근거에 기반한 신뢰성 확보 • 결과: 스킨케어 카테고리에서 최상위 LLM 인지도<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>15. 성공 사례 - 나이키<br>\t\t\t\t\t<br>다각적 접근 전략: • 고객 생성 콘텐츠: 러너들의 블로그, 레딧, 스트라바 게시글 • 명확한 활용 사례: \"마라톤 훈련을 위한 최고의 러닝화\" 같은 상세 제품 페이지 • 통합 생태계: 나이키 런 클럽, 나이키 트레이닝 클럽 연결 • 결과: 러닝화 카테고리 최상위 점유<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>16. 전통 브랜드의 성공 사례 - 캐딜락<br>\t\t\t\t\t<br>100년 역사 브랜드의 AI 시대 적응: • 캠페인 전략: '대담함(Audacity)', '도전적 인물 25(The Daring 25)' • 국제 파트너십을 통한 가시성 확보 • 핵심 성공 요소: 관련성, 대표성, 구조화된 디지털 스토리텔링에 전략적 투자 • 결과: 사람과 AI 모두에게 높은 브랜드 인지도<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>17. LLM 감정 분석의 중요성<br>\t\t\t\t\t<br>목적: 브랜드에 대한 LLM의 감정적 인식 분석 • 감정(Sentiment): 긍정성 측정 • 의미망(Semantics): 연관 단어 분석<br>\t\t\t\t\t<br>핵심 질문: • 우리 브랜드의 강점과 약점이 LLM에서 어떻게 인식되는가? • LLM의 브랜드 인식을 어떻게 개선할 수 있을까?<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>18. 미국 여행 산업 분석 사례<br>\t\t\t\t\t<br>LLM이 중요하게 평가하는 특성: • 편의성(Convenience) • 다양성(Variety)<br>\t\t\t\t\t<br>• 공간감(Space)<br>\t\t\t\t\t<br>부킹닷컴: 모든 모델에서 전반적으로 가장 높은 점수 버보: 프라이버시와 독창성 측면에서 부킹닷컴보다 우수한 평가<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>19. LLM별 브랜드 인식 차이 - 에어비엔비 사례<br>\t\t\t\t\t<br>모델별 중점 평가 요소: • 라마: 브랜드의 고유함(Uniqueness) 강조 • 챗GPT: 지역 옵션(Local Options) 다양성 중시<br>\t\t\t\t\t<br>• 퍼플렉시티: 유연성(Flexibility) 가장 중요하게 평가<br>\t\t\t\t\t<br>전략적 함의: 각 LLM의 특성에 맞는 맞춤형 콘텐츠 전략 필요<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>20. 다각적 미디어 전략<br>\t\t\t\t\t<br>포괄적 접근법: • 텍스트: 해결 중심의 설명형 콘텐츠 • 이미지: 구체적 활용 사례 시각화 • 영상: 제품 기능과 맥락 연결 • 구조화된 데이터: 표, 목록, 리뷰 등<br>\t\t\t\t\t<br>핵심: 제품/서비스가 더 넓은 맥락, 실제 활용 사례, 소비자 니즈와 어떻게 연결되는지 명확히 제시<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>21. 의미적 틈새 확보 전략<br>\t\t\t\t\t<br>목표: 특정 의미 영역 내에서의 주도권 확보 • 디오디너리 사례: '스킨케어 과학' 영역에서 독보적 위치 • 접근법:<br>\t\t\t\t\t<br>\t\t\t\t\t\t<br>- 브랜드 고유의 전문 분야 정의<br>\t\t\t\t\t\t<br>- 해당 영역에서 권위자적 위치 구축<br>\t\t\t\t\t\t<br>- 관련 키워드와 개념에서 강력한 연관성 형성<br>\t\t\t\t\t<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>22. LLM별 맞춤 전략의 필요성<br>\t\t\t\t\t<br>각 LLM의 고유한 알고리즘적 관점: • 소셜미디어 플랫폼처럼 각각 다른 '작동 방식' 보유 • 틱톡 vs 링크드인처럼 플랫폼별 콘텐츠 차별화 필요<br>\t\t\t\t\t<br>균형점 찾기: • 맞춤 설계: 주요 모델 특성에 맞춘 콘텐츠로 가시성 향상 • 위험 요소: 과도한 분산은 브랜드 메시지 임팩트 약화 가능성<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>23. 공통 원칙과 개별 전략<br>\t\t\t\t\t<br>모든 LLM에 적용되는 공통 원칙: • 해결 중심 메시지(Solution-oriented messaging) • 구체적 기능과 혜택 설명 • 신뢰할 수 있는 정보원 인용<br>\t\t\t\t\t<br>개별 전략: • 지배적 모델의 특성에 맞춘 정교한 조정 • 각 LLM의 정보 처리 방식에 최적화된 콘텐츠<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>24. 내용 요약<br>\t\t\t\t\t<br>패러다임의 전환<br>\t\t\t\t\t<br>• 소비자 행동: 검색에서 대화로 • 측정 지표: SOS/SOV에서 <b>SOM(모델 점유율)</b>로 • 전략 방향: 설득에서 정밀함으로, 키워드에서 조언으로<br>\t\t\t\t\t<br>핵심 성공 요소<br>\t\t\t\t\t<br>• 해결 중심 접근: 구체적 문제 해결에 집중 • 구조화된 콘텐츠: 과학적 근거와 명확한 맥락 제공 • 다각적 전략: 텍스트, 이미지, 영상, 데이터 통합 활용<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>토론 질문 1-5<br>\t\t\t\t\t<br>\t\t\t\t\t\t<br>- 우리 조직에서 현재 고객들이 제품/서비스를 발견하는 주요 경로는 무엇이며, 생성형 AI 도구 사용 증가가 이에 어떤 영향을 미칠 것으로 예상하는가?<br>\t\t\t\t\t\t<br>- 우리 브랜드가 인간-AI 인지도 매트릭스의 어느 사분면에 위치한다고 생각하며, 목표하는 사분면으로 이동하기 위해 어떤 전략이 필요한가?<br>\t\t\t\t\t\t<br>- \"LLM은 주의가 아닌 해결에 집중한다\"는 관점에서, 우리 브랜드의 현재 마케팅 메시지를 어떻게 '해결 중심'으로 재구성할 수 있을까?<br>\t\t\t\t\t\t<br>- 디오디너리나 나이키 같은 성공 사례에서 우리가 벤치마킹할 수 있는 구체적인 전략은 무엇인가?<br>\t\t\t\t\t\t<br>- 우리 산업에서 브랜드들이 확보할 수 있는 '의미적 틈새'는 어떤 것들이 있으며, 우리는 어느 영역에서 주도권을 가질 수 있을까?<br>\t\t\t\t\t<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>토론 질문 6-10<br>\t\t\t\t\t<br>\t\t\t\t\t\t<br>- 전통적인 브랜드 인지도 측정(설문조사, 검색량 등)과 SOM 측정 결과가 다르게 나타날 때, 어느 쪽에 더 큰 비중을 두고 전략을 수립해야 할까?<br>\t\t\t\t\t\t<br>- 각기 다른 LLM(챗GPT, 제미나이, 퍼플렉시티 등)의 특성을 고려할 때, 우리 브랜드는 어떤 모델에 우선적으로 최적화해야 하며 그 이유는 무엇인가?<br>\t\t\t\t\t\t<br>- \"키워드에서 조언으로\"의 전환이 의미하는 바를 우리 비즈니스 맥락에서 구체적으로 어떻게 적용할 수 있을까?<br>\t\t\t\t\t\t<br>- LLM 시대에 고객 생성 콘텐츠(UGC)의 역할이 어떻게 변화하고 있으며, 이를 활용한 브랜드 전략은 어떻게 설계해야 할까?<br>\t\t\t\t\t\t<br>- 5년 후 우리 산업에서 AI 기반 추천이 구매 결정에 미치는 영향은 어느 정도일 것으로 예상하며, 이에 대비한 장기 전략은 무엇인가?<br>\t\t\t\t\t<br>\t\t\t\t\t<br><br>\t\t\t\t\t출처: <<a href=\"https://claude.ai/chat/6d4e0ca9-83d6-4f7d-bc5a-9af69250a2c3\" target=\"_blank\">https://claude.ai/chat/6d4e0ca9-83d6-4f7d-bc5a-9af69250a2c3</a>> <br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t출처: <<a href=\"https://claude.ai/chat/6d4e0ca9-83d6-4f7d-bc5a-9af69250a2c3\" target=\"_blank\">https://claude.ai/chat/6d4e0ca9-83d6-4f7d-bc5a-9af69250a2c3</a>> <br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>\t\t\t\t<br>\t\t\t<br>\t\t\t<br>3회차<br>\t\t\t<br>\t\t\t\t<br>\t\t\t\t\t<br>전략 & 지속가능성<br>\t\t\t\t\t<br>플랫폼의 성장 기회를 이대로 놓칠 것인가?<br>\t\t\t\t\t<br><a href=\"https://www.hbrkorea.com/article/author/wno/327\" target=\"_blank\">데이비드 J. 브라이스(David J. Bryce)</a>,<a href=\"https://www.hbrkorea.com/article/author/wno/807\" target=\"_blank\">마셜 W. 반 알스틴(Marshall W. Van Alstyne)</a>,<a href=\"https://www.hbrkorea.com/article/author/wno/3813\" target=\"_blank\">제프 다이어(Jeff Dyer)</a><br>\t\t\t\t\t<br>매거진<br>\t\t\t\t\t<br>2025. 5-6월호<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>작품에 대해 |&#160;에바 야우스의 프로젝트 ‘Form Follows Flower’는 성장의 아름다움에 대한 찬가다. 부분의 조화로움을 통해 전체를 드러낸다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>플랫폼의 성장 기회를 이대로 놓칠 것인가?<br>\t\t\t\t\t<br>플랫폼을 키우는 4가지 방법<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>내용 요약<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>문제&#160;디지털 회사든 전통적인 회사든 플랫폼 기업은 성장을 추구하는 과정에서 흔히 눈앞에 있는 기회를 놓친다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>기회&#160;플랫폼 비즈니스의 성장을 좌우하는 4가지 핵심 영역은 1)기존 상호작용에 대한 참여 증대 2)새로운 상호작용 추가 3)새로운 사이드(사용자와 보완적 참여자) 추가 4)새로운 상호작용과 새로운 사이드의 동시 추가다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>해결책&#160;성공하는 기업은 모든 성장 옵션을 체계적으로 고려한다. 또한 플랫폼에서 어떤 상호작용은 소유하지 않는 것이 종종 큰 성장을 가져온다는 것을 깨닫는다. 가치를 더하는 회사와 협력하거나 심지어 사업을 방해할 수 있는 회사와 손을 잡기도 한다. 사업 영역을 넓힐 수 있는 매력적인 테마를 파악한다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>디지털 플랫폼은 플랫폼을 통해 탄생한 기업과 전통적인 기업 모두에 매우 성공적인 비즈니스 영역이었다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>세계에서 가장 가치가 높은 10대 기업 중 7개 기업, 유니콘 스타트업의 60% 이상이 플랫폼 비즈니스를 시작했다. 소매업체인 월마트와 아마존, 소프트웨어 제공업체인 세일즈포스와 서비스나우처럼 플랫폼 비즈니스에서 출발하지 않은 많은 기업들도 플랫폼 전략을 통해 성장을 가속화하는 데 성공했다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>그런데 수많은 기업들이 성장 기회를 놓치고 있다. 차량 호출 서비스 시장에서 우버와 리프트가 벌인 경쟁을 생각해 보라. 우버는 자사 플랫폼에서 다양한 부수적 서비스를 출시하고, 앱에 ‘Eats’(음식 배달), ‘Package’(당일 배송), ‘2-Wheels’(자전거 및 스쿠터 대여), ‘Rent’(렌터카) 아이콘을 추가했다. 이를 위해 우버는 플랫폼에 레스토랑과 렌터카 회사 같은 새로운 서비스 제공업체를 모집해야 했다. 반면 리프트는 차량 호출 서비스에 집중했다. 자연스럽게 리프트의 매출은 지난 5년 동안 36억 달러에서 44억 달러로 비교적 완만하게 증가한 반면 우버의 매출은 130억 달러에서 370억 달러로 증가했다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>플랫폼을 통한 성장 기회를 추구하지 못한 또 다른 기업 사례로 결제 시스템을 추가하지 않은 크레이그리스트Craigslist와 제3자 라이선스 판매자를 위한 마켓플레이스가 없는 디즈니를 들 수 있다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>왜 어떤 플랫폼 회사는 성장하고 다른 회사는 그렇지 못하는 것일까? 거대 플랫폼 기업이 된 일부 회사를 포함해 50개 이상 플랫폼 회사의 성장 경로에 대한 우리 연구결과에 따르면 크게 4가지 이유를 들 수 있다. 성공하지 못한 기업들은 모든 성장 옵션을 체계적으로 고려하지 않는다. 이들은 플랫폼에서 발생하는 다양한 종류의 상호작용을 소유해야 한다고 잘못 생각하고 있다. 그리고 이런 상호작용을 소유하지 않는 것이 오히려 엄청난 성장을 가져올 수 있다는 사실을 깨닫지 못한다. 이들은 가치를 더하거나 심지어 그들의 사업을 방해할 수 있는 기업과 협력하는 옵션을 간과하고 있다. 또한 사업 영역을 넓힐 수 있는 매력적인 테마를 파악하지 못하고 있다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>이 아티클에서는 이와 같은 성장의 장애물을 극복할 수 있는 지침을 제시한다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>4가지 성장 기회<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>플랫폼 성장의 기본 요소는 상호작용(플랫폼에서 두 명 이상의 사용자 사이에 일어나는 행동 또는 교환의 유형)과 사이드(고유한 사용자 그룹과 보완적 참여자)다. 예를 들어 우버의 상호작용에는 차량 호출, 음식 배달 등이 들어간다. 사이드는 사이트에서 서비스를 제공하는 모든 보완적 회사와 이런 서비스를 소비하는 모든 사용자로 구성된다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>플랫폼 비즈니스의 성장은 4가지 핵심 영역 즉 1)기존 상호작용에 대한 참여 증대 2)새로운 상호작용 추가 3)새로운 사이드 추가 4)새로운 상호작용과 새로운 사이드의 동시 추가에 달려 있다. 플랫폼 소유자는 아키텍처(플랫폼의 인터페이스와 기술적 설계)와 거버넌스(참여를 위한 규칙과 인센티브) 도구를 활용해 사이드와 상호작용을 추가하면서 플랫폼을 성장시킨다. (박스 ‘플랫폼 성장의 구성 요소’ 참고)<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<a href=\"https://www.hbrkorea.com/upload_dir/source/2025%200506/fea_3_1.jpg\" target=\"_blank\">\t\t\t\t\t\t\t\t\t\t\t</a><br><br>\t\t\t\t\t<br>참여 늘리기&#160;플랫폼 사용자 수를 늘리고 사용자당 상호작용 수를 늘리는 것이다. 기본적인 작업 같지만 일부 관리자들은 참여를 늘리기 위해 지속적으로 노력하거나 상호작용 경험을 개선하지 않는다. P2P 송금 플랫폼인 벤모Venmo는 처음에 친구를 추천하는 사용자에게 직접 현금을 지불하는 인센티브를 제공했고, 사용자 기반이 증가하면서 지불을 요청할 수 있는 기능을 제공했다. 그런데 이 회사가 즉시 이체 기능과 같은 참여 기능을 추가하기까지는 거의 8년이 걸렸다. 즉시 이체 기능으로 수취인은 이체된 자금을 즉시 이용할 수 있고, QR 코드 스캔으로 개인과 기업에 지불을 할 수 있게 됐다. 하지만 8년이라는 시간이 지연되면서 벤모보다 4년 늦게 출시된 유사한 P2P 디지털 지갑인 캐시 앱Cash App이 시장의 45%를 점유했다. 캐시 앱은 벤모가 비슷한 조치를 취하기 훨씬 전에 즉시 입금과 같은 여러 참여 기능을 도입했다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>여기서 얻을 수 있는 교훈은 무엇일까? 플랫폼 기업은 네트워크 효과를 확대하고 사용자가 경쟁사로 전환할 가능성을 낮추기 위해 사용자 기반을 늘리는 동안에도 참여를 유도하는 기능을 도입해야 한다. 벤모의 조치는 지난 5년간 사용자 기반을 4000만 명에서 9500만 명으로 늘리는 데 도움이 됐으며 사용자당 거래 건수도 증가시켰다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>새로운 상호작용 추가&#160;기업은 성장을 촉진하기 위해 기존 상호작용을 보완하거나 다른 상호작용으로 대체할 수 있다. 상호작용의 보완은 다른 상호작용의 가치나 효용을 향상시키면서 기존 사이드에 가치를 더한다. 예를 들어 페이스북(현재 메타)은 많은 사용자가 페이스북 그룹에 판매할 물건을 올리고 있다는 사실을 발견한 후 2016년 페이스북 마켓플레이스를 출시했다. 사용자들이 물건을 더 쉽게 사고 팔 수 있도록 추가한 서비스였는데, 덕분에 기존 사용자들 간 참여가 증가했을 뿐 아니라 새로운 사용자들도 유입됐다. 이후 페이스북은 거버넌스 지침을 활용해 비제품 게시물 제외, 구매자에게 프로모션 인센티브 제공, 배송비 할인 등 품질에 대한 규칙을 수립했다. 이런 개선 조치 덕분에 페이스북 마켓플레이스는 크레이그리스트를 앞질렀다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>상호작용 대체는 사용자가 다른 플랫폼이나 서비스를 이용하는 대신 이 플랫폼에서 작업을 수행할 수 있는 방법을 제공하는 방식이다. 2019년 출시된 페이스북 데이트가 좋은 사례이다. 여기서 사회적 상호작용을 할 수 있게 되면서 사용자들은 데이트 앱으로 가기 위해 플랫폼을 떠나지 않아도 됐다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>상호작용을 보완하거나 대체하는 기능을 추가하면 기존 사용자가 플랫폼에서 가치를 교환하는 빈도를 높이고 새로운 사용자를 유치하면서 새로운 네트워크 효과를 창출할 수 있다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>새로운 사이드 추가&#160;기업은 기존 사이드와 공통의 관심사를 공유하거나 기존 플랫폼 자원을 활용할 수 있는 새로운 사이드를 추가하면서 상호작용의 양을 늘릴 수 있다. 전자의 예로는 아마존을 들 수 있다. 아마존은 작가(새로운 사이드)가 출판사(기존 사이드)와 함께 책을 내고 독자에게 직접 판매할 수 있도록 허용했다. 아마존은 이 새로운 사이드를 추가하면서 플랫폼에서 제공하는 책의 수를 크게 늘렸다. 후자의 예로는 월마트가 있다. 월마트는 공급업체들이 월마트의 주문 및 결제 프로세스를 활용해 판매할 제품을 월마트닷컴에 직접 등록할 수 있게 했다. 이런 새로운 사이드는 모든 참여자들에게 플랫폼의 가치를 높이고 다양성을 추가하면서 사용자 참여를 촉진했다. 월마트 마켓플레이스의 출시는 결국 소비자가 이용할 수 있는 제품의 수를 10배 이상 늘렸고, 연간 820억 달러의 매출을 기록했다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>새로운 상호작용과 새로운 사이드를 동시 추가&#160;새로운 사이드와 새로운 상호작용이 묶음으로 추가되면 플랫폼의 총 상호작용 양이 급격하게 증가할 수 있다. 우버는 음식 주문 상호작용과 레스토랑 사이드를 동시에 추가해 차량 호출 플랫폼인 우버 잇츠를 만들었다. 회사가 새로운 사이드와 상호작용을 동시에 추가하는 또 다른 방법은 고유한 사용자 그룹과 상호작용을 가진 또 다른 플랫폼을 연결하는 것이다. 우버가 전기자전거와 스쿠터 플랫폼인 라임Lime을 추가한 것처럼 말이다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>플랫폼 관리자는 새로운 사이드나 새로운 상호작용에 자원을 투입하기 전에 기존 상호작용에서 네트워크 효과의 플라이휠이 자체적으로 작동해 지속가능한 성장을 할 수 있도록 임계 질량을 구축해야 한다. 너무 빨리 움직이면 재앙을 불러올 수 있다. 스카이프Skype의 창업자들이 시작한 음악 스트리밍 서비스인 알디오Rdio는 음악 스트리밍에 소셜 기능을 더하면서 출발했다. 이 회사는 핵심 음악 서비스가 충분히 자리를 잡기 전에 비디오 스트리밍을 추가했고, 과도한 확장으로 출시 5년 만에 결국 파산 신청을 했다. 너무 넓은 영역으로 너무 복잡하고 빠르게 추진하는 것은 사업에 치명적일 수 있다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>플랫폼 기업은 사용자 기반을 확대하는 동시에 참여 기능을 구축해 네트워크 효과를 확대하고 사용자가 경쟁사로 전환할 가능성을 낮춰야 한다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>성장 기회 공유하기<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>관리자들은 종종 플랫폼에서 이용 가능한 상호작용을 소유(인수 또는 구축)해야 한다고 생각하지만 모든 것을 소유하지 않는 것이 오히려 큰 성장으로 이어질 수 있다. 인수는 비용이 많이 드는데 성공적인 플랫폼 회사는 높은 프리미엄을 요구하기 때문이다. 내부 확장은 일반적으로 느리고 회사의 아이디어와 자원에 국한되는 한계가 있다. 더 효과적인 접근방식은 주목받는 보완적 플랫폼이나 앱과 파트너 관계를 맺고, 기존 사용자의 요구에 부합하는 서비스를 제공하는 것이다. 기업은 사용자에게 부족한 것이 무엇인지 물어보고, 데이터 분석을 통해 사용자의 프로필을 작성하고 그들의 활동을 파악하며, 플랫폼 안팎의 트래픽을 추적해 사용자의 이동 경로와 출발지를 조사해 사용자가 원하는 바를 파악할 수 있다. 파트너십을 맺으면 서비스를 단일한 액세스 포인트로 통합하고 사용자와 데이터, 비용을 공유해 네트워크 효과를 창출할 수 있다. 이는 모든 참여자에 대한 이익으로 이어진다. 파트너십은 사용자에게 새로운 가치를 빠르고 비용 효율적으로 제공하며 인수의 어려움을 피하게 해준다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>대표적인 예가 텐센트다. 텐센트는 전자상거래 JD.com, 핀둬둬Pinduoduo와 차량 호출 서비스 디디, 음식 배달 메이퇀Meituan&#160;등 24개 이상의 기업과 위챗 플랫폼을 통해 파트너십을 맺고 사용자 수를 10억 명으로 늘렸다. JD.com에 대해 좀 더 자세히 살펴보자. 2014년 텐센트는 이 플랫폼의 지분 15%를 인수했다. 이 거래의 일환으로 JD.com은 텐센트의 대규모 사용자 기반에 즉시 접근할 수 있게 됐다. 이 거래 당시 JD.com의 시장 가치는 220억 달러였다. 텐센트는 JD.com을 자사 플랫폼에 통합하고 사용자에게 홍보해 JD.com이 7년 동안 4억3100만 명의 사용자를 확보하며 시장가치를 880억 달러로 끌어올릴 수 있도록 도왔다. 한편 텐센트의 지분 가치는 130억 달러 이상으로 증가했다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>반면 미국 기업들은 종종 자체 개발 또는 인수 방식을 추구한다. 구글은 구글 플러스(소셜미디어), 구글 버즈(트위터의 모방), 구글 오퍼스(그루폰의 복제), 구글 비디오(콘텐츠 스트리밍) 등 여러 플랫폼을 내부적으로 구축했다. 그러나 구글이 네트워크 효과를 활용해 기존 플랫폼들에 도전하는 대신 파트너십을 맺었다면 더 큰 성공을 거둘 수 있었을지도 모른다. 구글은 이후 이런 모든 플랫폼을 폐쇄했으며 일부는 유튜브를 인수한 것처럼 인수합병을 통해 새로운 분야에 진출하기도 했다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>알리바바가 B2B 플랫폼을 출시했을 때, 처음에는 큰 관심을 받지 못했다. 그러나 회사가 전략적 파트너를 참여시키는 방향으로 방향을 전환한 후 상황이 크게 바뀌었다. 알리바바의 전 최고전략책임자(CSO)인 쩡밍Zeng Ming은 파트너와 함께 플랫폼을 구축하는 과정에서 어느 정도 통제권을 포기해야 하긴 하지만 파트너 투자를 유치하고 위험을 낮추며 파트너 제안이 실패할 경우 비용을 줄일 수 있는 등 이점이 많다고 설명했다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>플랫폼 파트너십이 성공하려면 데이터 공유, 호환 가능한 플랫폼 아키텍처 유지, 결제 시스템 통합 등을 통해 상호작용 사이의 상호의존성을 만들어야 한다. 이렇게 해야 인센티브가 하나로 모이면서 각 파트너가 서로의 성공으로부터 이익을 얻을 수 있다. 필자들의 연구결과에 따르면 소수 지분 투자는 조정을 달성하는 효과적인 방법이지만 계약을 신중하게 작성하거나 맞춤형 기술 통합을 통해서도 비슷한 목표를 달성할 수 있다. 지분 투자를 할 때는 일반적으로 규모가 큰 파트너가 규모가 작은 파트너의 소수 지분을 보유한다. 예를 들어 텐센트의 파트너사 17곳에 대한 평균 초기 지분은 18%였고, 알리바바는 파트너사 15곳에 대해 초기 지분을 평균 20% 확보했다. 지분은 가치를 극대화하려는 직접적인 재정적 인센티브를 제공하기 때문에 계약보다 파트너의 이익을 더 효과적으로 조정한다. 시간이 지나면 초기 지분이 인수의 디딤돌 역할을 할 수 있다. 예를 들어 텐센트는 음악 플랫폼인 쿠거우KuGou의 소수 지분을 인수한 이후 완전히 인수했다. 바이두도 옐프Yelp와 유사한 리뷰 플랫폼인 누오미Nuomi를 같은 방식으로 인수했다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>플랫폼 자체의 서비스를 대체할 만한 사업체와 파트너십을 맺는 것은 서비스 가치를 떨어뜨릴 수 있기 때문에 직관적으로 납득하기 어려울 수 있다. 그러나 경쟁업체가 대체 플랫폼을 개발하지 못하도록 하는 식으로 이런 파트너십이 타당한 경우도 있다. 클록너 메탈스Kloeckner Metals는 금속 마켓플레이스를 개척할 때 이런 접근방식을 채택해 시장 규모를 확보하고 다른 업체의 시장 진입을 막았다. 대체재가 심각한 위협이 되는 경우 이를 인수하는 것이 최선의 전략일 수 있다. 페이스북이 직접적인 경쟁자인 인스타그램을 인수한 경우가 그런 예다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>파트너십을 맺으면 어느 정도의 통제권을 포기해야 하지만 그 대신 위험을 줄이고 제품이 실패할 경우 발생하는 비용을 피할 수 있는 등 이점도 많다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>제휴사에 플랫폼 개방하기<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>매니저들은 자사의 플랫폼 사용자를 늘리는 데 너무 집중한 나머지 경쟁 플랫폼 회사들이 출시한 많은 혁신을 간과한다. 마이스페이스Myspace는 페이스북의 소셜 게임을 놓쳤고, 포스퀘어Foursquare는 옐프의 위치 기반 고객 리뷰를 놓쳤으며 스냅챗은 인스타그램의 사진 게시 및 콘텐츠 제작자를 위한 수익화 도구를 놓쳤다. 일부 매니저는 이런 혁신을 무시했고, 다른 매니저는 적극적으로 차단했다. 인튜이트Intuit가 처음에 퀵북스QuickBooks라는 데스크톱 회계 소프트웨어를 플랫폼으로 전환하려고 시도했을 때 회사는 외부 개발자들에게 최고의 도구와 API에 대한 접근 권한을 부여하는 것을 거부했다. 페이팔이나 스퀘어(현재 블록Block) 같은 회사가 이런 개발자들을 활용해 더 유용한 뭔가를 만들어 경쟁자가 될 것을 우려했기 때문이다. 그 결과는 어땠을까? 혁신이 억제됐다. 페이팔과 스퀘어는 유용한 앱을 개발하지 못했으며 다른 누구도 개발하지 않았다. 당시 CEO였던 브래드 스미스는 결국 이 플랫폼을 모든 사람들에게 개방하기로 결정했고, 인튜이트는 가치 있는 플랫폼 생태계를 자랑하게 됐다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>생태계에 속한 다른 수많은 플레이어들의 혁신으로부터 이익을 얻겠다는 명목으로 플랫폼이 그들을 인수하거나 파트너 관계를 맺을 필요는 없다. 대신 관리자는 특정 기준을 충족하고 거버넌스 규칙을 준수하는 독립적인 제휴사에 플랫폼을 개방할 수 있다. 이런 방식으로 플랫폼 관리자는 전혀 몰랐던 사람들로부터 새로운 아이디어를 얻을 수 있고, 아이디어를 놓칠 위험을 줄일 수 있다. 이런 전략은 유스케이스의 다양성과 규모가 어느 한 회사가 구축하거나 이해할 수 있는 수준을 초과하는 경우에 특히 유용하다. 텐센트의 위챗 플랫폼에서 텐센트의 직접적인 개입 없이 금융 서비스(중국자산관리와 GF펀드), 여행 서비스(시트립Ctrip), 라이프스타일 및 전자상거래(샤오홍슈Xiaohongshu), 요리 및 레시피 공유(샤추팡Xiachufang) 등의 사업이 탄생했다. 마찬가지로 세일즈포스는 개발자들이 앱익스체인지AppExchange에서 다양한 영업 도구를 판매할 수 있도록 지원하면서 소프트웨어가 제공하지 못하는 고객 요구를 충족시켰다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>서비스를 출시할 때 플랫폼은 보완적인 네트워크 효과를 창출하는 회사와만 제휴해야 한다. 상호작용이 안정적이고 평판과 네트워크 효과가 나타나기 시작하면 플랫폼은 좀 더 개방적인 태도를 취할 수 있다. 관리자는 모니터링을 계속 하면서 정책을 위반하거나 생태계에 부정적인 영향을 미치는 제휴사를 제거해야 한다. 그리고 모든 제휴사와 광범위한 전략적 제휴를 맺고 경쟁적 포식 현상을 감시해야 한다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>플랫폼은 제휴사가 관리자의 개입 없이도 아이디어를 시험해 볼 수 있도록 허용할 수 있다. 구조화된 인터페이스로 플랫폼을 설계하고 로열티, 사용자 액세스, 데이터 공유에 대한 세부 규칙을 명시하는 기본 계약을 통해 관리하는 것이 방법이다. 플랫폼은 사용자 지표와 피드백을 분석해 유망한 상호작용을 식별하고 개인화된 추천, 특정 기능 배치, 알림 타기팅을 통해 가장 좋은 상호작용을 홍보할 수 있다. 이를 통해 소유자는 제휴사의 가시성과 사용자 만족도를 극대화할 수 있다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>플랫폼 비즈니스가 내려야 하는 핵심 결정은 플랫폼에 있는 회사들과 소유, 파트너, 제휴 중에서 어떤 관계를 맺을 것인가 하는 것이다. 어떤 선택이 적절한지 결정하는 쉬운 방법은 가치 곡선을 이용하는 것이다. 먼저 플랫폼에서 각 상호작용 유형의 가치(상호작용당 평균 수익)를 계산한 다음 그 값에 해당 유형의 상호작용 총 횟수를 곱한다. 평균 수익을 구할 수 없는 경우에는 월 평균 사용자 수와 같은 간단한 측정 기준을 사용해 가치를 나타낼 수 있다. 상호작용 유형의 가치를 가장 큰 것부터 가장 작은 것까지 순서대로 나열해 가치곡선을 만든다. 플랫폼은 가치곡선의 맨 위에 있는 가장 가치 있거나 빈도가 높은 상호작용을 구축하거나 인수해 소유해야 한다. 그래야만 아키텍처, 거버넌스 규칙, 사용자 데이터를 완벽하게 제어할 수 있다. 플랫폼은 가치곡선의 중간에 있는 상호작용을 가진 회사와 파트너 관계를 맺고 아키텍처, 거버넌스, 데이터에 대한 통제권을 공유해야 한다. 제3자가 가치곡선의 꼬리 부분에 속하는 상호작용을 할 때는 제휴사로 만들어야 한다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>제휴사는 당장은 더 적은 가치를 제공하더라도 파트너십 기회를 발전시킬 수 있는 실험의 비옥한 토양이 된다. 텐센트는 이런 접근방식으로 처음에 플랫폼의 꼬리 부분 상호작용에 속했던 메이퇀과 핀둬둬를 파트너십 상태로 승격시켰다. 핀둬둬는 나중에 테무를 출시해 텐센트가 어려움을 겪었던 분야에서 세계적인 성공을 거뒀다. 이 전략은 텐센트에 미개척 성장의 길을 열어줬다. 텐센트는 자체 파트너 제휴 전략을 통해 단 12년 만에 시장 가치를 80억 달러에서 4000억 달러로 성장시켰다.(‘텐센트의 가치곡선’ 참고)<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<a href=\"https://www.hbrkorea.com/upload_dir/source/2025%200506/fea_3_2.jpg\" target=\"_blank\">\t\t\t\t\t\t\t\t\t\t\t</a><br><br>\t\t\t\t\t<br>마찬가지로 서비스나우와 세일즈포스 같은 엔터프라이즈 소프트웨어 회사들도 가치 곡선 논리를 활용해 플랫폼을 확장시켰다. 두 회사 모두 개발자 도구, API, 앱 스토어를 소프트웨어에 통합시켜 개발자 제휴사(종종 자체 고객)가 플랫폼 앱 교환을 통해 직접 개선 사항을 판매할 수 있도록 했다. 두 회사 모두 높은 가치의 상호작용을 위해 핵심 자산을 구축하거나 인수했다. 예를 들어 세일즈포스는 데이터닷컴Data.com과 슬랙Slack을 인수했다. 널리 사용되는 앱과 파트너 관계를 맺고 긴밀하게 통합시켰다. 가장 낮은 가치의 상호작용을 생성하는 도구를 가진 제3자의 경우 앱 스토어에 제품을 등록시키게만 했다. 이 전략으로 서비스나우의 앱 스토어의 가치는 59억 달러가 됐고, 세일즈포스의 앱익스체인지의 가치는 220억 달러에 이르렀다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>제휴사는 당장은 적은 가치를 제공할 수 있지만 파트너십 기회로 발전할 수 있는 실험의 비옥한 토양이 된다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>매력적인 테마 정의하기<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>플랫폼 관리자들은 핵심적인 상호작용에만 집중하다가 다른 잠재적인 성장 가능성을 간과한다. 플랫폼 상호작용이 일관된 논리에 따라 관련성 있게 확장할 수 있도록 매력적인 테마를 정의하기 위해 노력해야 한다. 미국의 그루폰과 중국의 메이퇀을 비교해 보자. 두 회사 모두 고객 수요를 모아 현지 구매에 대한 대량 할인을 유도하는 공동 구매 플랫폼으로 시작했다. 그루폰은 메이퇀보다 2년 먼저 시작했다. 그런데 메이퇀은 지역 상품과 서비스, 주문형 배달이라는 광범위하지만 일관된 테마에 기반해 목표를 높게 세웠다. 공동 구매에서 출발해 음식 배달, 식료품, 도매 용품, 자전거 공유, 엔터테인먼트, 여행 등으로 사업을 확장했다. 또한 중국판 옐프인 뎬핑Dianping을 인수해 사용자들이 피드백과 리뷰를 통해 구매를 평가할 수 있도록 하고, 뎬핑의 데이터를 활용해 플랫폼에서 인기 있는 신규 지역 상품을 홍보했다. 메이퇀은 광범위한 테마에 부합하는 사이드와 상호작용을 반복적으로 추가하면서 상당한 성장을 이뤘다. 새로운 소비자를 끌어들이는 새로운 판매자를 육성하는 데 성공했고, 동시에 증가하는 소비자가 새로운 판매자를 끌어들이는 선순환 구조가 만들어졌다. 메이퇀은 그루폰이 결코 추진하지 못한 방식으로 네트워크 효과의 나선형을 구축했다. 그 결과로 메이퇀의 사용자당 참여도는 그루폰의 참여도보다 최소 4배 이상 높고, 시장 가치는 150배 더 커졌다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>플랫폼 소유자는 다양한 성장 옵션을 고려할 수 있도록 광범위한 테마를 설정하는 데서 출발해야 한다. 메이퇀은 지역 주문형 배달 및 엔터테인먼트에 초점을 맞추면서 공동 구매보다 훨씬 더 큰 사업 영역에서 훨씬 더 많은 성장 기회를 발굴할 수 있었다. 우버의 여행 및 배달 테마는 택시 서비스보다 더 광범위하다. 앞서 설명한 4가지 성장 메커니즘을 반복적으로 활용하면 플랫폼은 ‘슈퍼 앱’이 될 수 있다. 슈퍼 앱은 운송 분야의 우버처럼 수많은 관련된 상호작용에 대한 단일 액세스 포인트를 제공하는 플랫폼이다. 중국의 롄자Lianjia는 부동산 시장과 리노베이션, 유지보수, 모기지 등의 서비스를 결합한 슈퍼 앱을 만들었다. 이는 질로Zillow, 레드핀Redfin, 안기Angi, 로켓 모기지Rocket Mortgage의 서비스를 통합한 것이다. 미국에는 테마 기반 슈퍼 앱을 만들 수 있는 기회가 많다. 예를 들어 자동차 서비스 슈퍼 앱은 차량 구매, 금융, 보험, 유지보수, 수리를 제공할 수 있다. 데이트 앱은 매칭 기능과 함께 관계 상담, 미용 서비스, 이벤트 예약, 안전 확인 기능을 통합할 수 있다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>플랫폼은 하나의 테마에서 출발하지만 어떤 플랫폼은 그 기원을 훨씬 뛰어넘는 초대형 앱으로 발전하기도 한다. 위챗은 소셜미디어 사이트에서 상품과 서비스의 광범위한 시장으로 성장했고, 인도네시아의 고젝Gojek은 배달 서비스에서 차량 서비스, 의료 서비스, 엔터테인먼트로 확장했다. 이같은 초대형 앱은 다양성과 편리함이라는 테마를 수용하면서 번창했는데 중앙 집중식 탐색, 메시지, 결제 시스템으로 가능해진 원스톱 쇼핑 경험 덕분이다. 플랫폼은 플랫폼에서의 다른 상호작용에 사용되는 메시지 및 지불에 대한 통제권을 유지하면서 확장하고, 플랫폼 간 네트워크 효과를 촉진한다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>플랫폼은 성장을 추구할 때 종종 눈앞에 있는 기회를 간과한다. 명확한 비전을 정의하고 우리가 설명한 기술을 활용해 사이드와의 상호작용을 확장하면 기업은 상당한 성장 잠재력을 발휘할 수 있다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>데이비드 J. 브라이스(David J. Bryce)는&#160;브리검영대 메리어트경영대학원의 전략경영 부교수다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>제프 다이어(Jeff Dyer)는&#160;메리어트경영대학원의 호레이스 비즐리 전략학 명예교수다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>마셜 W. 반 앨스타인(Marshall W. Van Alstyne)은&#160;보스턴대의 앨런&켈리 퀘스트롬 정보 시스템 교수다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>에디팅&#160;배미정<br>\t\t\t\t\t<br><br>\t\t\t\t\t출처: <<a href=\"https://www.hbrkorea.com/article/view/atype/ma/category_id/1_1/article_no/2318/page/1\" target=\"_blank\">https://www.hbrkorea.com/article/view/atype/ma/category_id/1_1/article_no/2318/page/1</a>> <br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>\t\t\t\t\t<br>&#128200; 플랫폼의 성장 기회를 이대로 놓칠 것인가?<br>\t\t\t\t\t<br>플랫폼을 키우는 4가지 방법<br>\t\t\t\t\t<br>총 슬라이드 수: 27장<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>&#128203; 원문 정보<br>\t\t\t\t\t<br>저자: 데이비드 J. 브라이스(David J. Bryce), 마셜 W. 반 알스틴(Marshall W. Van Alstyne), 제프 다이어(Jeff Dyer)<br>\t\t\t\t\t<br>출처: 하버드 비즈니스 리뷰 매거진 2025년 5-6월호<br>\t\t\t\t\t<br>분야: 전략 & 지속가능성<br>\t\t\t\t\t<br>원문 제목: 플랫폼의 성장 기회를 이대로 놓칠 것인가? - 플랫폼을 키우는 4가지 방법<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>&#127959;️ 아티클 구조<br>\t\t\t\t\t<br>&#128202; 내용 요약<br>\t\t\t\t\t<br>\t\t\t\t\t\t<br>- 문제, 기회, 해결책<br>\t\t\t\t\t<br>\t\t\t\t\t<br>&#128269; 플랫폼 성장의 현실<br>\t\t\t\t\t<br>\t\t\t\t\t\t<br>- 성공 사례와 실패 원인<br>\t\t\t\t\t<br>\t\t\t\t\t<br>&#128200; 4가지 성장 기회<br>\t\t\t\t\t<br>\t\t\t\t\t\t<br>- 참여 늘리기<br>\t\t\t\t\t\t<br>- 새로운 상호작용 추가<br>\t\t\t\t\t\t<br>- 새로운 사이드 추가<br>\t\t\t\t\t\t<br>- 상호작용과 사이드 동시 추가<br>\t\t\t\t\t<br>\t\t\t\t\t<br>&#129309; 성장 기회 공유하기<br>\t\t\t\t\t<br>\t\t\t\t\t\t<br>- 파트너십 전략<br>\t\t\t\t\t<br>\t\t\t\t\t<br>&#128275; 제휴사에 플랫폼 개방하기<br>\t\t\t\t\t<br>\t\t\t\t\t\t<br>- 가치곡선 활용법<br>\t\t\t\t\t<br>\t\t\t\t\t<br>&#127919; 매력적인 테마 정의하기<br>\t\t\t\t\t<br>\t\t\t\t\t\t<br>- 슈퍼 앱으로의 발전<br>\t\t\t\t\t<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>&#128221; 내용 요약<br>\t\t\t\t\t<br>&#128680; 문제<br>\t\t\t\t\t<br>&#128188; 디지털 회사든 전통적인 회사든 플랫폼 기업은 성장을 추구하는 과정에서 흔히 눈앞에 있는 기회를 놓친다<br>\t\t\t\t\t<br>&#127919; 기회<br>\t\t\t\t\t<br>&#128204; 플랫폼 비즈니스의 성장을 좌우하는 4가지 핵심 영역<br>\t\t\t\t\t<br>\t\t\t\t\t\t<br>- 기존 상호작용에 대한 참여 증대<br>\t\t\t\t\t\t<br>- 새로운 상호작용 추가<br>\t\t\t\t\t\t<br>- 새로운 사이드(사용자와 보완적 참여자) 추가<br>\t\t\t\t\t\t<br>- 새로운 상호작용과 새로운 사이드의 동시 추가<br>\t\t\t\t\t<br>\t\t\t\t\t<br>&#128161; 해결책<br>\t\t\t\t\t<br>&#128260; 성공하는 기업은 모든 성장 옵션을 체계적으로 고려한다 &#129309; 플랫폼에서 어떤 상호작용은 소유하지 않는 것이 종종 큰 성장을 가져온다 &#127775; 매력적인 테마를 파악하여 사업 영역을 넓힌다<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>&#127757; 플랫폼 비즈니스의 현실<br>\t\t\t\t\t<br>&#128202; 성공 통계<br>\t\t\t\t\t<br>&#127942; 세계에서 가장 가치가 높은 10대 기업 중 7개 기업이 플랫폼 비즈니스 &#129412; 유니콘 스타트업의 60% 이상이 플랫폼 비즈니스로 시작<br>\t\t\t\t\t<br>&#127970; 전통 기업의 성공 사례<br>\t\t\t\t\t<br>&#128722; 월마트와 아마존 (소매업체) &#128187; 세일즈포스와 서비스나우 (소프트웨어 제공업체)<br>\t\t\t\t\t<br>\t\t\t\t\t\t<br>- 플랫폼 전략을 통해 성장 가속화 성공<br>\t\t\t\t\t<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>&#128200; 성장 기회를 놓친 사례 - 우버 vs 리프트<br>\t\t\t\t\t<br>&#128662; 우버의 확장 전략<br>\t\t\t\t\t<br>&#128241; 플랫폼에 다양한 부수적 서비스 출시<br>\t\t\t\t\t<br>\t\t\t\t\t\t<br>- Eats (음식 배달)<br>\t\t\t\t\t\t<br>- Package (당일 배송)<br>\t\t\t\t\t\t<br>- 2-Wheels (자전거 및 스쿠터 대여)<br>\t\t\t\t\t\t<br>- Rent (렌터카)<br>\t\t\t\t\t<br>\t\t\t\t\t<br>&#128202; 성과 비교 (최근 5년간)<br>\t\t\t\t\t<br>리프트: 36억 달러 → 44억 달러 (완만한 증가) 우버: 130억 달러 → 370억 달러 (급격한 성장)<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>&#128269; 성장 실패의 4가지 원인<br>\t\t\t\t\t<br>&#127919; 체계적 고려 부족<br>\t\t\t\t\t<br>&#128203; 모든 성장 옵션을 체계적으로 고려하지 않음<br>\t\t\t\t\t<br>&#127968; 소유 집착<br>\t\t\t\t\t<br>&#128176; 플랫폼에서 발생하는 다양한 종류의 상호작용을 소유해야 한다고 잘못 생각<br>\t\t\t\t\t<br>&#129309; 협력 기회 간과<br>\t\t\t\t\t<br>&#128279; 가치를 더하거나 심지어 사업을 방해할 수 있는 기업과의 협력 옵션을 간과<br>\t\t\t\t\t<br>&#127912; 테마 파악 실패<br>\t\t\t\t\t<br>&#127919; 사업 영역을 넓힐 수 있는 매력적인 테마를 파악하지 못함<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>&#127959;️ 플랫폼 성장의 기본 요소<br>\t\t\t\t\t<br>&#128260; 상호작용 (Interaction)<br>\t\t\t\t\t<br>&#128241; 플랫폼에서 두 명 이상의 사용자 사이에 일어나는 행동 또는 교환의 유형<br>\t\t\t\t\t<br>\t\t\t\t\t\t<br>- 예시: 우버의 차량 호출, 음식 배달<br>\t\t\t\t\t<br>\t\t\t\t\t<br>&#128101; 사이드 (Side)<br>\t\t\t\t\t<br>&#127919; 고유한 사용자 그룹과 보완적 참여자<br>\t\t\t\t\t<br>\t\t\t\t\t\t<br>- 서비스를 제공하는 모든 보완적 회사<br>\t\t\t\t\t\t<br>- 이런 서비스를 소비하는 모든 사용자<br>\t\t\t\t\t<br>\t\t\t\t\t<br>⚙️ 성장 도구<br>\t\t\t\t\t<br>&#127963;️ 아키텍처 (플랫폼의 인터페이스와 기술적 설계) &#128203; 거버넌스 (참여를 위한 규칙과 인센티브)<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>&#128200; 성장 기회 1 - 참여 늘리기<br>\t\t\t\t\t<br>&#127919; 목표<br>\t\t\t\t\t<br>&#128101; 플랫폼 사용자 수를 늘리고 사용자당 상호작용 수를 늘리는 것<br>\t\t\t\t\t<br>&#128161; 벤모의 사례<br>\t\t\t\t\t<br>&#128202; 성공 요소<br>\t\t\t\t\t<br>\t\t\t\t\t\t<br>- 친구 추천 사용자에게 직접 현금 지불 인센티브<br>\t\t\t\t\t\t<br>- 지불 요청 기능 제공<br>\t\t\t\t\t<br>\t\t\t\t\t<br>⏰ 지연된 혁신<br>\t\t\t\t\t<br>\t\t\t\t\t\t<br>- 즉시 이체 기능 추가까지 8년 소요<br>\t\t\t\t\t\t<br>- QR 코드 스캔 지불 기능 늦은 도입<br>\t\t\t\t\t<br>\t\t\t\t\t<br>&#128202; 경쟁 결과<br>\t\t\t\t\t<br>&#128184; 캐시 앱 (4년 늦게 출시) → 시장의 45% 점유 &#128176; 벤모 → 사용자 4000만 명에서 9500만 명으로 증가<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>&#127381; 성장 기회 2 - 새로운 상호작용 추가<br>\t\t\t\t\t<br>&#128279; 상호작용의 보완<br>\t\t\t\t\t<br>✨ 다른 상호작용의 가치나 효용을 향상시키면서 기존 사이드에 가치를 더함<br>\t\t\t\t\t<br>&#128216; 페이스북 마켓플레이스 사례<br>\t\t\t\t\t<br>\t\t\t\t\t\t<br>- 2016년 출시, 사용자들이 물건을 더 쉽게 사고 팔 수 있도록 지원<br>\t\t\t\t\t\t<br>- 기존 사용자 간 참여 증가 + 새로운 사용자 유입<br>\t\t\t\t\t\t<br>- 결과: 크레이그리스트를 앞질렀음<br>\t\t\t\t\t<br>\t\t\t\t\t<br>&#128260; 상호작용 대체<br>\t\t\t\t\t<br>&#128149; 페이스북 데이트 (2019년 출시)<br>\t\t\t\t\t<br>\t\t\t\t\t\t<br>- 사용자들이 데이트 앱으로 가기 위해 플랫폼을 떠나지 않아도 됨<br>\t\t\t\t\t\t<br>- 새로운 네트워크 효과 창출<br>\t\t\t\t\t<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>&#128101; 성장 기회 3 - 새로운 사이드 추가<br>\t\t\t\t\t<br>&#128218; 공통 관심사 활용 - 아마존 사례<br>\t\t\t\t\t<br>✍️ 작가(새로운 사이드)가 출판사(기존 사이드)와 함께 책을 내고 독자에게 직접 판매 &#128214; 플랫폼에서 제공하는 책의 수를 크게 증가<br>\t\t\t\t\t<br>&#127978; 기존 자원 활용 - 월마트 사례<br>\t\t\t\t\t<br>&#128295; 공급업체들이 월마트의 주문 및 결제 프로세스를 활용 &#128187; 월마트닷컴에 판매할 제품을 직접 등록 가능<br>\t\t\t\t\t<br>&#128202; 성과<br>\t\t\t\t\t<br>&#128230; 소비자가 이용할 수 있는 제품의 수 10배 이상 증가 &#128176; 연간 820억 달러의 매출 기록<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>&#128640; 성장 기회 4 - 상호작용과 사이드 동시 추가<br>\t\t\t\t\t<br>&#127828; 우버 이츠 사례<br>\t\t\t\t\t<br>&#128241; 음식 주문 상호작용 + 레스토랑 사이드를 동시에 추가 &#128260; 플랫폼의 총 상호작용 양이 급격하게 증가<br>\t\t\t\t\t<br>&#128690; 플랫폼 연결 전략<br>\t\t\t\t\t<br>&#128279; 고유한 사용자 그룹과 상호작용을 가진 또 다른 플랫폼을 연결<br>\t\t\t\t\t<br>\t\t\t\t\t\t<br>- 우버 + 전기자전거와 스쿠터 플랫폼 라임 추가<br>\t\t\t\t\t<br>\t\t\t\t\t<br>⚠️ 주의사항 - 알디오의 실패<br>\t\t\t\t\t<br>&#127925; 음악 스트리밍에 소셜 기능을 더하면서 출발 &#128249; 핵심 서비스가 자리잡기 전에 비디오 스트리밍 추가 &#128184; 과도한 확장으로 출시 5년 만에 파산<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>&#129309; 성장 기회 공유하기 - 파트너십의 중요성<br>\t\t\t\t\t<br>&#128176; 소
