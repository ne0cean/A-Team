일까요<br>\t\t\t\t\t<br>\t\t\t\t\t<br><br>\t\t\t\t\t출처: <<a href=\"https://claude.ai/chat/29d8ab44-9f1a-4249-9348-335ab15ad813\" target=\"_blank\">https://claude.ai/chat/29d8ab44-9f1a-4249-9348-335ab15ad813</a>> <br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t출처: <<a href=\"https://claude.ai/chat/29d8ab44-9f1a-4249-9348-335ab15ad813\" target=\"_blank\">https://claude.ai/chat/29d8ab44-9f1a-4249-9348-335ab15ad813</a>> <br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>\t\t\t\t<br>\t\t\t<br>\t\t\t<br><br>\t\t\t<br>5회차<br>\t\t\t<br>\t\t\t\t<br>\t\t\t\t\t<br>리더십<br>\t\t\t\t\t<br>갈등지능형 리더<br>\t\t\t\t\t<br><br>\t\t\t\t\t<a href=\"https://www.hbrkorea.com/upload_dir/source/2025%200708/040_050_1.jpg\" target=\"_blank\">\t\t\t\t\t\t\t\t\t\t\t</a><br>PHOTOGRAPHERS&#160;YASU + JUNKO<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>갈등지능형 리더<br>\t\t\t\t\t<br>격동기에&#160;꼭 필요한&#160;‘갈등 관리법’<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>내용 요약<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>문제점&#160;사회 전반으로 양극화가 심해지면서 직장 내 갈등과 무례한 행동이 증가하고, 그 결과 직원들의 몰입도와 생산성이 떨어지고 있다. 리더는 이런 갈등을 관리해야 하지만 많은 이들이 어려움을 겪는다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>해결책&#160;리더가 까다로운 상황을 효과적으로 헤쳐 나가려면 ‘갈등지능’을 개발해야 한다. 자기 인식, 사회적 기술, 상황 적응력, 체계적 사고를 결합한 역량이다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>미래를 위한 길&#160;외교관과 평화 협상가들은 긴장을 기회로 전환하는 검증된 갈등해결 전략을 제공한다. 복잡성과 변화 속에서도 번창하는 조직을 만드는 데 필요한 영감을 준다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>지난 몇 년 동안 많은 서구 조직이 고된 시간을 보냈다. 인종, 성별, 소득 불평등에 대한 충돌, 권위주의의 확산, 이민, 기후 변화, 해외 전쟁 등으로 사회가 점점 더 양극화하면서 내부 갈등이 광범위하게 일어나고 있다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>불화가 심해진 이 시기에 직장 내 갈등의 증가는 어쩌면 불가피한 일이다. 최근 미국 인사관리협회Society for Human Resource Management가 미국 직장인 1622명을 대상으로 실시한 설문조사에 따르면 76%가 지난 한 달 동안 무례한 행동을 목격했고, 21%는 개인적으로 경험했다고 답했다. 거의 절반에 가까운 응답자가 매주 무례한 행동을 겪었다고 했고 13%는 매일 겪는다고 밝혔다. 44%는 2025년에는 무례한 행동이 더 심해질 것으로 예상했고 26%는 이로 인해 직장을 떠날 가능성이 있다고 답했다. 직원의 몰입도가 낮은 데다 직장 안의 논쟁적인 상호작용이 빈번해지면서 생산성 손실과 결근 비용이 하루에 20억 달러 이상 발생하고 있는 것으로 추정된다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>양극화와 무례함의 증가로 CEO들도 집중 감시를 받고 있다. 오늘날 CEO의 발언 하나하나가 직원, 고객, 정치인 혹은 이들 모두의 반발을 초래할 위험이 있다. 하지만 이런 시대에 리더는 종종 싸움에 뛰어들어야 한다. 2023년 발표된 웨버 샌드윅Weber Shandwick의 연구에 따르면 직원의 65%는 기업이 주요 사회적 이슈에 대해 목소리를 내야 한다고 믿는다. 소비자의 80% 이상도 기업이 입장을 표명해야 한다고 생각한다. 리더의 일부는 이런 사회적 책임 앞에서 미묘한 균형을 잡는 데 어려움을 겪는다. 2024년 1분기에만 622명의 CEO가 사의를 표명한 이유이기도 하다. 사상 최대 퇴사자를 기록했던 2023년 1분기보다 50% 증가한 수다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>하지만 CEO와 기업의 기타 리더들이 이 복잡한 갈등을 처음으로 헤쳐 나가는 주자는 아니다. 지난 30년 동안 필자와 컬럼비아대의 모턴 도이치 국제협력 및 갈등해결 센터Morton Deutsch International Center for Cooperation and Conflict Resolution의 동료들은 심리학, 평화 및 갈등 연구, 복잡계 과학에서 통찰을 도출했다. 또한 수많은 설문조사와 실험실 연구, 사례 및 현장연구를 통해 리더, 중재자, 피스메이커의 가장 효과적인 갈등 개입 전략을 규명해왔다. 그 결과 우리는 리더가 가장 까다로운 상황에서도 조직을 이끌 수 있도록 돕는 일련의 원칙을 만들 수 있었다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>연구결과 리더가 갈등을 헤쳐 나가기 위해선 4가지 핵심 역량이 필요하다. 가장 기본적인 첫 번째 역량은 자기 인식과 자기 조절이다. 개인적인 반응을 인식하고 관리해 침착함을 유지하면서 전략적으로 대응할 수 있도록 하는 능력이다. 두 번째 역량은 강력한 사회적 갈등 해결 기술이다. 깊은 경청, 주장과 협력의 균형, 편향성 체크 등은 리더가 건설적인 해결책을 도출하는 데 도움을 준다. 상황 적응력 역시 중요하다. 다양한 유형의 갈등에 맞게 전략을 조정하고, 문화적 뉘앙스에 따라 언제 개입하고, 물러서고, 조정해야 하는지를 아는 능력이다. 마지막은 체계적인 지혜다. 이는 리더가 더 큰 그림을 보고 복잡성을 수용하며 과거의 성공과 실패에서 배워 만성적이고 뿌리 깊은 갈등을 해결할 수 있게 해준다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>4가지 핵심 역량을 갖춘 리더를 보고 우리는 갈등지능지수(CIQ)가 높다고 말한다. 연구결과 이런 리더는 단순히 분쟁 해결에 탁월한 것을 넘어 팀원들이 더 나은 업무 만족도, 권한 부여, 웰빙을 경험할 수 있는 직장 환경을 조성하는 것으로 나타났다. 니컬러스 레딩Nicholas Redding의 연구에 따르면 이들은 조직 내 더 높은 창의성과 건설성을 특징으로 하는 문화를 만든다. 스트레스와 불확실성을 효과적으로 극복하는 능력도 갖췄다. 주목할 점은 리더의 갈등지능에 대한 직원들의 인식과 직장에서 느끼는 심리적 안전감 사이에 의미있는 상관관계가 있다는 것이다. 상호 신뢰, 투명한 의사소통, 직업적 존중, 예측된 위험 감수에 대한 지원 등에 대한 얘기다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>감성지능과 갈등지능을 혼동하기 쉽지만 두 개념은 고유한 적용 분야를 가진 별개의 개념이다. 감성지능은 자신의 감정과 타인의 감정을 인식하고 이해하며 관리하는 능력을 말한다. 공감, 자기 조절, 사회적 인식과 같은 기술을 포함한다. 반면 갈등지능은 의견 불일치를 관리하고 해결하기 위한 더 넓은 범주의 역량을 포괄한다. 감성지능은 갈등지능의 핵심 구성 요소이며 사람들이 건설적으로 대응하고 적응할 수 있게 해주는 것이고 갈등지능은 사회적 역학, 상황적 요인, 분쟁에 영향을 미치는 체계적인 힘을 이해하는 것까지를 포함한다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>그러면 갈등 상황에서 높은 CIQ를 지닌 리더는 구체적으로 무엇을 할까? 그들은 이런 상황을 성공적으로 관리하기 위해 어떤 전략을 사용할까? 우리 연구는 불안정한 상황에서 특히 유용한 7가지 원칙을 밝혀냈다. 비즈니스, 커뮤니티 조직, 국제 문제 등 다양한 분야에서 일하는 뛰어난 중재자와 피스메이커들의 작업에서 흔히 볼 수 있는 원칙들이다. 이 글에서는 다양한 분야의 사례를 통해 훌륭한 리더들이 이 원칙을 얼마나 효과적으로 활용하는지 살펴보고자 한다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<a href=\"https://www.hbrkorea.com/upload_dir/source/2025%200708/JulAug25_FEA_Coleman_2.jpg\" target=\"_blank\">\t\t\t\t\t\t\t\t\t\t\t</a><br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<a href=\"https://www.hbrkorea.com/upload_dir/source/2025%200708/1_1.png\" target=\"_blank\">\t\t\t\t\t\t\t\t\t\t\t</a><br>기초 다지기<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>능숙한 중재자들은 갈등 당사자들이 같은 방에 들어가기 전 수개월에 걸쳐 핵심 인물을 파악하고 소통 채널을 구축하면서 양측 모두와 신뢰를 쌓는다. 능숙한 리더 역시 마찬가지다. 갈등이 본격화하기 전에 조직의 업무 환경과 갈등 대응 기술, 인프라를 강화해 분쟁 해결을 위한 토대를 마련한다. 그리고 갈등이 발생하면 신중하게 대응책을 선택한다. 위기 발생 초기 48시간이 향후 수년간 의 관계를 좌우할 수 있다는 것을 아는 외교관처럼 이들은 초기 대응이 이후 모든 과정을 결정한다는 사실을 잘 알고 있다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>1990년대 북아일랜드의 성 금요일 협정Good Friday Agreement에 대한 조지 미첼George Mitchell의 활동은 평화 프로세스에서 기초 다지기가 얼마나 효과적인지를 잘 보여준다. 미첼이 북아일랜드에 도착했을 때, 그는 수세기에 걸친 종교, 정치, 유혈 갈등으로 갈라진 공동체를 마주했다. 그가 택한 접근법은 남다른 인내와 체계적인 기반 구축이었다. 그는 처음 몇 달 동안 아무 행동을 취하지 않은 채 오직 경청만 했다. 무장세력 지도자, 성직자, 정치인, 그리고 ‘더 트러블스1’로 고통받은 일반 시민 등 북아일랜드 사회 전반의 사람들과 심층 인터뷰를 100건 이상 진행했다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>미첼의 대표적인 공헌은 ‘미첼 원칙Mitchell Principles’을 마련한 것이다. 민주주의와 비폭력에 대한 일련의 약속이자 협상을 위한 도덕적 틀이었다. 그는 즉각적인 해결책을 요구하는 대신 평화를 위해서는 기초가 필요하다는 점을 인정했다. 그의 팀은 모든 합의와 양보 사항들을 꼼꼼하게 기록했고, 갈등의 지형 속에 ‘합의의 정원gardens of agreement’을 만들었다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>10년 후, 앨런 멀럴리Alan Mulally도 포드에서 긍정적인 조직 환경을 구축하기 위해 비슷한 접근방식을 취했다. 2006년 CEO 취임 당시 포드는 127억 달러의 손실을 기록했고, 조직 내 깊게 뿌리내린 불신과 비밀주의로 어려움을 겪고 있었다. 경영진은 책임 추궁이나 처벌을 두려워하며 부서의 문제가 위기가 될 때까지 숨겼다. 멀럴리는 취임 초기 몇 달 동안 새로운 소통 채널과 신뢰 구축 메커니즘을 만드는 데 집중했다. 그의 대표적인 혁신은 사업 계획 검토 회의였다. 부서별 임원들이 빨강-노랑-초록 신호등 시스템을 사용해 프로젝트 현황을 보고하는 주간 포럼이었다. 멀럴리는 “비밀은 관리할 수 없다”며 빨간색 프로젝트를 보고한 임원을 공개적으로 칭찬했다. 이 단순해 보이는 변화가 투명성과 협력을 중시하는 근본적인 문화적 전환을 이끌어냈다. 2008년 1.01달러였던 포드 주가가 2014년 18달러 이상으로 상승하면서 멀럴리의 인내심 있는 기초 다지기는 결실을 맺었다. 더 중요한 것은 갈등으로 악명 높았던 조직문화를 공동 문제 해결 중심의 문화로 바꿨고, 그의 퇴임 이후에도 이 변화가 오랫동안 지속됐다는 것이다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>노련한 협상가는 분쟁 당사자 사이에 ‘긍정적인 평화positive peace’를 조성한다. 단순히 갈등을 끝내는 데 그치지 않고 강력한 협력 관계를 만든다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<a href=\"https://www.hbrkorea.com/upload_dir/source/2025%200708/2_1.png\" target=\"_blank\">\t\t\t\t\t\t\t\t\t\t\t</a><br>신뢰 높이기<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>노련한 협상가들은 분쟁 당사자 사이에 외교관들이 ‘긍정적 평화positive peace’라고 부르는 상태를 만든다. 단순히 갈등을 끝내는 데 그치지 않고 강력한 협력 관계를 조성한다. 이들은 상대방에 대한 양측의 신뢰를 높일 수 있는 조치를 협정에 포함한다. 모든 긍정적인 상호작용이 미래의 위기에 대비한 완충 장치가 된다는 사실을 알기 때문이다. 중재자들은 종종 휴전 협상과 함께 문화 교류나 공동 경제 프로젝트와 같이 신뢰와 회복력을 높이는 이니셔티브를 추진한다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>비즈니스 리더는 사람들을 하나로 모으는 의미 있는 공동 프로젝트를 설계해 이런 접근방식을 채택할 수 있다. 이런 프로젝트는 긍정적인 교류를 촉진하고, 긴장의 순간에도 견딜 수 있고 오히려 강화될 수 있는 라포를 형성한다. 목표는 긍정적인 대인 상호작용의 비중을 부정적인 상호작용보다 더 높게 만드는 것이다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>노벨 평화상 수상자인 마르티 아티사리Martti Ahtisaari가 2004년 쓰나미 이후 인도네시아 아체 평화 프로세스Aceh Peace Process에서 보여준 활동이 좋은 사례다. 재난 이후의 무질서와 고통은 인도네시아 정부와 아체자유운동2&#160;사이의 수십 년에 걸친 갈등을 더욱 심화시킬 수 있었다. 그러나 아티사리는 자연재해가 학자들이 ‘고통스러운 교착 상태hurting stalemates’라고 부르는 상태를 만들 수 있다는 걸 이해했다. 이는 지속되는 갈등이 모든 당사자에게 평화보다 더 큰 비용을 지불하게 만드는 순간을 의미한다. 그의 탁월함은 인도주의적 협력을 정치적 돌파구로 전환하는 데 있었다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>아티사리는 한때 적대적이던 이들이 구호 물자를 분배하고 공동체를 재건하는 과정에서 함께 협력하도록 설계했다. 이는 북아일랜드에서 미첼이 만든 ‘합의의 정원’처럼 아티사리가 ‘협력의 섬islands of cooperation’이라고 부르는 관계를 형성하고 점차 확장시켰다. 그는 공동 모니터링 팀, 공동 재건위원회, 합동 보안순찰과 같은 구체적인 신뢰 구축 조치를 강력히 추진해 평화의 이점에 대한 가시적인 증거를 만들었다. 노력의 결과로 헬싱키 양해각서Helsinki Memorandum of Understanding가 체결됐다. 여기엔 천연자원 공유, 전직 반군의 정치 참여, 경제 개발에 대한 세부 조항이 포함됐으며 지속가능한 평화 협정의 새로운 모델을 제시했다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>2016년 마이크로소프트가 링크트인을 262억 달러에 인수했을 때 많은 평론가들은 또 한 번의 대형 기술 합병 실패사례가 될 것이라고 예상했다. 하지만 사티아 나델라 CEO는 두 기업 문화 간의 ‘긍정적 평화’를 구축하는 모범 사례를 만들었다. 그는 링크트인을 마이크로소프트 운영에 즉각 통합하는 대신 독립성을 유지하면서 협력 기회를 신중하게 키우는 반직관적인 조치를 취했다. 그는 ‘커넥티드 앱 이니셔티브Connected Apps initiative’를 출범해 마이크로소프트와 링크트인 팀이 자발적으로 협력할 수 있는 구체적인 프로젝트를 만들었다. 양 팀은 링크트인 프로필을 마이크로소프트 오피스에 통합하거나 공동 인공지능 프로젝트를 추진하는 등 자연스러운 시너지를 발견해 나갔다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>결과는 놀라웠다. 링크트인의 매출은 인수 당시 29억 달러에서 2024년 160억 달러로 증가했다. 더 인상적인 사실은 링크트인이 고유한 문화를 유지하면서 마이크로소프트의 방대한 자원에 접근할 수 있게 됐다는 점이다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>숙련된 외교관들은 눈앞의 대립을 넘어 긴장 상태를 조장하는 더 넓은 세력 관계를 이해하고, 협력하는 법을 배운다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<a href=\"https://www.hbrkorea.com/upload_dir/source/2025%200708/JulAug25_FEA_Coleman_3.jpg\" target=\"_blank\">\t\t\t\t\t\t\t\t\t\t\t</a><br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<a href=\"https://www.hbrkorea.com/upload_dir/source/2025%200708/3.png\" target=\"_blank\">\t\t\t\t\t\t\t\t\t\t\t</a><br>규율과 창의성 균형 맞추기<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>노련한 협상가들이 일하는 모습을 보면 확고한 경계 설정과 협력적 문제 해결, 공적인 강경함과 사적인 유연성 사이에서 매끄럽게 전환한다는 사실을 알 수 있다. 한 순간에는 분명히 선을 그었다가도, 다음 순간 혁신적인 타협점을 모색한다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>노르웨이 외교관 얀 에겔란Jan Egeland은 콜롬비아 평화 협상 과정에서 중립적이면서도 원칙을 지키는 외교의 모범을 보여줬다. 라틴아메리카에서 가장 오래 지속된 내전 중 하나를 종식한 협상이다. 에겔란은 평화 프로세스가 단순히 군사 문제뿐만 아니라 갈등의 근본 원인을 다뤄야 한다는 점을 이해했다. 그의 접근방식은 중재자가 인권 문제에서는 확고한 입장을 유지하면서도 평화를 위한 창의적인 해결책을 찾을 수 있다는 것을 입증했다. 그의 가장 혁신적인 공헌은 폭력 피해자를 평화 프로세스에 통합한 것이다. 에겔란은 피해자를 수동적인 방관자로 취급하는 대신 협상에 직접 참여할 수 있도록 하는 메커니즘을 설계했다. 모든 목소리를 반영하기 위해 그는 ‘병렬 트랙parallel tracks’을 만들었다. 하바나에서 공식 협상을 진행하는 동시에 콜롬비아 전역에서 지역 대화를 진행하며 지역사회의 참여를 유도하고 구체적인 공동체 문제를 다루도록 했다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>그 결과 평화 협정에는 콜롬비아 무장혁명군(FARC) 게릴라 조직의 무장 해제를 위한 엄격한 조항뿐만 아니라 농촌 개발, 정치 참여, 과거 폭력 사태에 대한 불의를 해결하려는 구체적인 계획이 포함됐다. 이는 평화 프로세스가 과거 범죄에 대한 책임 추궁과 화해 및 재통합의 필요성 사이에서 균형을 맞출 수 있다는 걸 보여줬다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>비즈니스 사례로는 애플 CEO인 팀 쿡을 들 수 있다. 2010년대 중반 애플은 개인정보 보호와 비즈니스 성장, 특히 서비스 매출 확대 사이에서 깊은 갈등에 직면했다. 이 갈등은 회사 내부에서 상반된 우선순위를 주장하는 그룹들뿐만 아니라 더 강력한 개인정보 보호를 요구하는 외부 이해관계자, 더 나은 서비스를 위해 더 많은 데이터 수집을 요구하는 이들 사이에서도 발생했다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>쿡은 신중한 균형 감각을 발휘했다. 그는 개인정보 보호에 대한 애플의 강경한 입장을 공개적으로 유지하면서도 동시에 개인정보 보호 기술을 통해 서비스 매출을 창출할 수 있는 창의적인 방법을 모색했다. 이 외교적 균형 감각은 FBI의 아이폰 잠금 해제 요청에 대한 거부와 같은 확고한 입장과 온디바이스 AI 처리 개발과 같은 유연한 실행에서 모두 발휘됐다. 이런 접근을 통해 애플은 개인정보 보호 장치를 강화하는 동시에 서비스 매출을 2016년 240억 달러에서 2024년 960억 달러 이상으로 증가시키는 두 가지 목표를 모두 달성할 수 있었다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<a href=\"https://www.hbrkorea.com/upload_dir/source/2025%200708/4.png\" target=\"_blank\">\t\t\t\t\t\t\t\t\t\t\t</a><br>적응력 숙달하기<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>갈등의 종류에 따라 다른 외교적 도구가 필요하다. 자원 분쟁엔 효과가 있는 접근법이 정체성 기반 충돌에선 전혀 통하지 않을 수 있다. 숙련된 중재자들은 다양한 개입 전략을 개발한다. 예를 들어 교섭 당사자 사이에 메시지를 전달하는 ‘셔틀 외교shuttle diplomacy’, 정부와 기업, 시민사회 전반에 걸쳐 병행하는 ‘멀티트랙 개입multitrack engagement’, 분쟁이 진행 중인 상황에서 대화와 인도주의적 노력을 위해 안전 지대를 마련하는 ‘평화 회랑peace corridors’ 등이다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>유엔을 대표해 아프가니스탄에서 활동한 라흐다르 브라히미Lakhdar Brahimi의 활동은 뛰어난 리더가 획일적인 접근방식을 넘어 상황에 맞는 접근을 어떻게 실천하는지 잘 보여준다. 브라히미의 아프가니스탄 경험은 ‘브라히미 보고서Brahimi Report’라는 지침으로 정리돼 유엔평화유지 활동을 혁신했다. 그는 아프가니스탄의 다양한 사회적, 정치적 환경이 ‘가벼운 발자국light footprint’을 필요로 한다는 점을 깨달았다. 이는 현지 역량을 대체하는 것이 아니라 강화하는 방향으로의 국제적 지원을 의미한다. 브라히미는 농촌 지역의 전통 부족 평의회jirgas와 도시 지역의 정부 관계자 모두와 접촉했다. 그는 종교 지도자들이 해결 과정에 포함돼야 한다는 사실을 이해하고 이슬람 원칙과 국제 인도법을 통합하기 위해 노력했다. 무엇보다 브라히미는 평화 프로세스가 갈등의 ‘지역 생태계regional ecology’에 주목해야 한다는 점을 보여줬다. 그는 아프가니스탄 이후 시리아에서도 이웃 국가들과 지역 강대국을 참여시켰다. 종종 지역 갈등이 평화를 유지하기 위해 해결해야 할 국제적인 차원을 갖고 있다는 점을 이해했기 때문이다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>펩시코 CEO로 12년 동안 재임한 인드라 누이도 비슷한 적응력을 보여줬다. 2006년 CEO 취임 당시 누이는 거대한 위기에 직면했다. 탄산음료 매출은 감소하고 있었고 경쟁사 공세는 심해졌다. 소비자들은 더 건강한 식음료를 요구하고 있었다. 전통적인 탄산 음료 부서 임원들은 변화에 저항했지만 건강 제품을 담당하는 부서는 새로운 접근을 필요로 했다. 신흥시장 사업부는 현지화 전략을 원했고 북미 사업부는 글로벌 차원의 단일성 있는 전략을 기대했다. 투자자와 이사회는 분기 실적 개선을 압박했는데 이는 누이가 강조한 건강 제품과 지속가능성 중심의 장기 비전과 상충했다. 이렇게 상충하는 관점은 자원 배분, 마케팅 우선순위, 연구개발(R&D), 경영진 보상 기준을 둘러싼 갈등으로 이어졌다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>이런 갈등을 관리하기 위해 누이는 다양한 전략을 개발해 지속가능성과 단기적 비즈니스 압력 사이에서 균형을 맞췄다. 핵심 탄산음료 사업 부문에 대해서는 기존의 수익성 중심 접근방식을 유지했다. 새롭게 떠오른 건강 중심 신제품 부문에는 영양학자와 소비자 옹호 단체가 참여하는 협력적 개발 프로세스를 도입했다. 환경 이니셔티브는 지속가능성 프레임워크에 따라 운영했고 시장 확장 전략은 각 지역의 문화적, 경제적 맥락에 따라 맞춤화했다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>이런 다각적 접근방식은 괄목할 만한 성과를 이끌어냈다. 그의 재임기간 동안 펩시코 매출은 80% 성장했고 포트폴리오를 건강 지향 제품 중심으로 성공적으로 재편했다. 주요 지속가능성 목표도 달성할 수 있었다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>중대한 돌파구는 종종 예상치 못한 상황에서 발생한다. 뜻밖의 감정적 교류, 예상치 못한 공통 기반 발견, 공동의 문제를 드러내는 위기 등이다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<a href=\"https://www.hbrkorea.com/upload_dir/source/2025%200708/5.png\" target=\"_blank\">\t\t\t\t\t\t\t\t\t\t\t</a><br>더 넓은 맥락 활용하기<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>평화 협상이 교착 상태에 빠졌을 때 숙련된 외교관들은 당장의 적대 행위에만 집중하지 않고 긴장을 조성하는 더 넓은 세력을 이해하고 협력하는 방법을 배우려 한다. 이들은 때때로 양자 간 분쟁을 푸는 열쇠가 다자적 관여에 있다는 점을 알고 있다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>1949년 아랍과 이스라엘의 휴전 협정을 중재한 랠프 번치Ralph Bunche의 사례를 생각해 보자. 번치는 이 갈등을 하나의 포괄적인 합의로 해결할 수 없다는 것을 알고 있었다. 대신 그는 이스라엘과 이집트, 레바논, 요르단, 시리아 등 이웃 국가들 간의 개별적이지만 상호 연결된 협상을 조율했다. 그는 당사자들이 직접 대면하지는 않으면서 한 회의장에서 만나 공정한 중재자를 통해 소통하는 ‘근접 회담proximity talks’ 방식을 사용해 긴장을 완화했다. 그리고 물 사용권, 난민 문제와 같은 실질적인 문제에 집중해 현장에서 작동할 수 있는 해결책을 마련했다. 이 혁신적인 접근은 그에게 노벨 평화상을 안겨줬고, 복잡한 지역 분쟁을 관리하는 측면에서 오늘날에도 여전히 유효한 원칙을 확립했다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>유니레버 CEO였던 폴 폴먼Paul Polman도 비슷한 상황을 겪었다. 그는 유니레버의 지속가능성 목표와 수익성 목표 사이에서 반복적인 갈등을 마주했다. 폴먼은 이 갈등이 더 광범위한 문제를 반영한다는 것을 인식하고 ‘시스템 매핑systems mapping’이라 부르는 작업을 시작했다. 유니레버의 글로벌 사업 전반에 걸쳐 환경적, 사회적, 경제적 요인이 어떻게 상호 연관돼 있는지를 종합적으로 분석하는 작업이었다. 분석결과 많은 지속가능성 문제의 상당수가 실제로는 수십 년에 걸쳐 형성된 공급망 구조, 소비자 행동 패턴, 시장 인센티브에 뿌리를 두고 있다는 사실이 드러났다. 폴먼은 “더 많은 CEO와 글로벌 리더들이 우리가 직면했던 도전적 과제를 인식하게 됐고, 이 문제는 기업과 글로벌 세계에서 점점 더 중요해지고 있다”고 설명했다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>그의 접근방식은 단순한 갈등으로 보였던 상황을 근본적인 비즈니스 모델 혁신의 기회로 전환했다. 유니레버의 ‘지속가능한 생활 브랜드Sustainable Living Brands’가 그 결과물이다. 지속가능한 소싱, 친환경 포장, 폐기물 감소, 수자원 보존 및 기타 이니셔티브를 통해 환경에 미치는 영향을 줄이고 사회 환경을 개선하기 위해 고안된 제품군이다. 2019년까지 이 브랜드는 유니레버의 다른 사업보다 69% 더 빠르게 성장했으며 회사 전체 성장의 75%를 담당했다. 겉보기에 해결하기 어려워 보이는 갈등이라도 더 넓은 역학을 이해하면 해결할 수 있다는 것을 보여준다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<a href=\"https://www.hbrkorea.com/upload_dir/source/2025%200708/6.png\" target=\"_blank\">\t\t\t\t\t\t\t\t\t\t\t</a><br>세대에 걸친 평화 지향하기<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>뛰어난 협상가들은 뉴스 사이클 단위가 아니라 수십 년을 내다본다. 본인은 그 그늘에 앉지 못하지만 나무를 심는 평화 중재자들처럼 이들은 조직의 지속적인 화합을 위해 점진적인 변화에 투자한다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>베티 비곰베Betty Bigombe는 북부 우간다 평화 프로세스에 30년 가까이 참여하면서 여러 세대에 걸친 지속적인 평화 구축이 갈등을 어떻게 변화시킬 수 있는지 보여줬다. 아동 병사 재활에 대한 그의 접근방식은 갈등의 세대 간 영향을 해결하는 모범이 됐다. 그는 이 아이들이 결국 부모이자 지역사회 리더가 될 것이며 이들을 치유하는 게 장기적 평화에 결정적인 부분이라고 생각했다. 그래서 단기적인 도움이 필요한 피해자로 취급하지 않고 수십 년에 걸쳐 재통합을 지원하는 종합적인 프로그램을 개발했다. 이 프로그램에는 교육, 직업 훈련, 심리적 지원, 지역사회와의 관계 회복을 위한 노력 등이 포함됐다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>수차례 평화 협상이 실패하고 정치적 리더십이 바뀌는 동안에도 비곰베는 ‘평화 인프라peace infrastructure’라고 부르는 체계를 구축했다. 훈련된 중재자, 지역사회 지도자, 시민단체로 구성한 이 네트워크를 통해 공식 협상이 중단된 상황에서도 평화 구축 활동을 지속할 수 있도록 했다. 그는 전쟁에서 가장 큰 고통을 겪으면서도 평화 프로세스에서 배제되기 쉬운 여성들의 중요성 또한 인식했다. 우간다 북부 전역에 여성 평화 조성자 네트워크를 구축해 갈등 해결에 대한 교육을 실시하고 지역사회 차원의 지원을 제공했다. 이 네트워크는 지금도 여전히 활동 중이다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>2018년경 세일즈포스 CEO 마크 베니오프는 조직 내 분열이 심해졌을 때 비슷한 접근을 했다. 당시 직원들은 미국 세관 및 국경 보호국과의 계약 등 정부 계약을 두고 뚜렷하게 갈라졌다. 기술 기업이 이민법 집행과 같은 사회 문제에 입장을 표명해야 하는지를 두고도 의견이 엇갈렸다. 또한 인수합병을 통한 급속한 성장으로 서로 다른 기대를 가진 직원 집단 간에 문화적 균열도 발생했다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>베니오프는 즉각적인 정책을 시행하거나 강경한 입장을 취하는 대신 논란이 되는 문제를 해결하기 위한 제도적 프레임워크 ‘윤리적 발판ethical scaffolding’을 구현했다. 그는 세일즈포스에 ‘윤리적이고 인간적인 사용 사무국Office of Ethical and Humane Use’을 설치했다. 직원 리소스 그룹, 외부 윤리 자문단, 영향을 받는 커뮤니티를 포함한 이해관계자 의견 수렴 프로세스 체계를 만든 것이다. 그는 오하나ohana&#160;(하와이어로 ‘대가족’을 의미)라는 기업 문화를 강화하면서 강제적인 화합이 아니라 존중에 기반해 의견 충돌을 장려하는 방향으로 재정의했다. 급여 감사에서 성별 임금 격차가 드러나자 그는 체계적인 임금 형평성 검토를 시행하고 300만 달러를 투입해 격차를 해소했다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>장기적인 접근의 가치는 결과로 입증됐다. 직원 의견을 수렴할 수 있는 여러 채널과 논쟁적인 사안을 다룰 수 있는 명확한 프레임워크를 구축하며 세일즈포스는 직원들의 강력한 몰입도를 유지하면서 수많은 잠재적 분열 상황을 성공적으로 헤쳐나갔다. 기술 기업의 이직률이 급증했던 2022년 대퇴사Great Resignation&#160;시기에도 동종 업계 상위 10%에 해당하는 직원 유지율을 기록했다. 논란이 되는 결정이 내려지는 상황에서도 직원 만족도는 높은 수준을 유지했다. 베니오프가 수립한 조치는 새로운 도전과제가 등장할 때마다 회사가 이를 해결하는 데 지속적으로 도움을 주고 있다. 나아가 직장 내 양극화를 관리하는 모범사례가 됐다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<a href=\"https://www.hbrkorea.com/upload_dir/source/2025%200708/7.png\" target=\"_blank\">\t\t\t\t\t\t\t\t\t\t\t</a><br>기회를 포착하기<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>가장 중요한 협상 돌파구는 종종 예상치 못한 상황에서 발생한다. 뜻밖의 감정적 교류, 예기치 못한 공통 기반 발견, 공동의 문제를 드러내는 위기 등이다. 숙련된 중재자는 갈등을 전환할 수 있는 감정적 전환점, 비공식적 채널, 의외의 일치점, 기타 미묘한 기회들을 주의 깊게 살핀다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>1978년 중동 평화 협상 당시 캠프 데이비드에서 지미 카터가 보여준 개인 외교는 이 원칙을 실천한 사례다. 그는 이집트 대통령 안와르 사다트와 이스라엘 총리 메나헴 베긴을 13일간 캠프 데이비드에 고립시켜 돌파구를 강요하는 압박 환경을 조성했다. 카터는 교착 상태에 빠진 결정적인 순간에 베긴에게 손자들의 사진을 보여주며 평화와 전쟁에 대한 인간적 의미를 되새기게 했다. 카터는 자신의 종교적 배경을 활용해 아브라함의 전통을 공유한다는 공통점을 찾아 두 지도자 모두와 다리를 놓았다. 공식 협상이 교착 상태에 빠질 때면 카터는 각 지도자와 개별적으로 산책하며 비공식적인 순간을 활용해 새로운 가능성을 모색했다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>2005년 알리바바의 이사회 의장이던 마윈이 야후와의 파트너십을 다룬 과정에서도 이 접근방식을 엿볼 수 있다. 그는 수년간 쌓아온 야후 공동 창업자 제리 양과의 개인적인 친분 관계를 통해 야후가 알리바바에 10억 달러를 투자하게 만드는 데 핵심 역할을 했다. 이들은 페블비치 골프장에서 비공식적으로 만나 전자상거래와 검색엔진의 미래에 대해 논의하고 파트너십의 토대를 마련하는 등 다양한 기회를 가졌다. 마윈은 미국과 중국 팀 간의 문화 교류 프로그램을 마련해 서로의 관점과 업무 스타일에 대한 이해를 높였다. 이런 비공식 채널은 알리바바의 독립성과 전략적 방향에 대한 협상 과정에서 매우 중요한 역할을 했다. 그리고 마윈이 기술 역사상 가장 복잡한 다문화기업 파트너십을 성공적으로 이끄는 데 기여했다. 그의 성공은 갈등을 해결하는 가장 효과적인 길이 때때로 예상치 못한 연결에 있다는 것을 보여준다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>갈등지능이 높은 조직 만들기<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>비즈니스 리더에게 가장 큰 도전과제는 조직문화를 바꿔 모든 직급의 직원들이 갈등을 효과적으로 관리할 수 있는 역량을 키우도록 하는 것이다. 리더는 갈등 해결 기술을 조직 전반에 내재화해 내부 긴장에도 불구하고 조직이 번창하도록 만들 수 있다. 이는 갈등을 피해야 할 것으로 보는 관점을 넘어 에너지, 혁신, 성장의 잠재적 원천으로 인식하는 것을 의미한다. 이런 변화는 민감한 이슈에 대해 어렵지만 필요한 대화를 안전하게 할 수 있는 공간을 마련하고, 갈등이 잘 관리될 경우 파괴가 아니라 개선으로 이어질 수 있다는 인식을 조직 안에 정착시키는 것에서 시작된다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>리더들은 성공적인 갈등 개입 사례를 본보기로 삼고, 건설적인 의견 차이가 어떻게 돌파구를 만들어냈는지에 대한 이야기를 공유하며, 효과적인 전략을 사용한 직원들을 인정하고 격려하면서 이런 태도가 조직에 뿌리내리도록 도울 수 있다. 컬럼비아대의 CIQ-리더십 연구팀이 최근 실시한 연구에 따르면 직원들이 리더의 CIQ를 높게 평가한 조직일수록 조직문화가 더 협력적이고, 갈등 회피나 적대적인 경향이 적은 것으로 나타났다. 즉 리더가 갈등을 관리하기 위해 보여준 긍정적인 행동이 직원에게도 투영된다는 의미다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>오늘날 리더에게 필요한 질문은 갈등지능 구축 여부가 아니다. 얼마나 빨리 시작할 수 있는가다. 변화가 상수이고 복잡성이 증가하는 세상에서 갈등을 효과적으로 관리하는 능력은 더 이상 부가 기술이 아니다. 조직 성공을 위한 핵심 요건이다. 이 역량을 습득한 리더는 단순히 갈등의 폭풍을 견디는 것을 넘어 폭풍을 타고 항해하는 법을 배우게 될 것이다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>1.&#160;The Troubles, 1960년대 후반부터 1998년까지 약 30년간 지속된 북아일랜드의 민족주의 갈등을 가리키는 말<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>2.&#160;Gerakan Aceh Merdeka, 인도네시아 아체 지역의 독립을 추구하는 무장단체. 1976년 등장해 독립 이슬람국가 건설을 목표로 1988년부터 정부군과 전투를 벌였다. 2003년 쓰나미 이후 인도네시아 정부는 2004년 아체자유운동과 평화협정을 맺었고, 2005년 정부군을 모두 철수했다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>피터 T. 콜먼(Peter T. Coleman)은 컬럼비아대 티처스 칼리지 교수, 모턴 도이치 국제협력 및 갈등해결 센터 소장이다. 최근 저서로는 ＜The Way Out: How to Overcome Toxic Polarization＞(Columbia University Press, 2021)이 있다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t출처: <<a href=\"https://www.hbrkorea.com/article/view/atype/ma/category_id/8_1/article_no/2335/page/1\" target=\"_blank\">https://www.hbrkorea.com/article/view/atype/ma/category_id/8_1/article_no/2335/page/1</a>> <br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>\t\t\t\t\t<br>갈등지능형 리더<br>\t\t\t\t\t<br>격동기에 꼭 필요한 '갈등 관리법'<br>\t\t\t\t\t<br>전체 28장<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>원문 정보<br>\t\t\t\t\t<br>저자: 피터 T. 콜먼(Peter T. Coleman)<br>\t\t\t\t\t<br>소속: 컬럼비아대 티처스 칼리지 교수, 모턴 도이치 국제협력 및 갈등해결 센터 소장<br>\t\t\t\t\t<br>최근 저서: The Way Out: How to Overcome Toxic Polarization (Columbia University Press, 2021)<br>\t\t\t\t\t<br>출처: 리더십 아티클<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>아티클 구조<br>\t\t\t\t\t<br>갈등지능형 리더￼├── 내용 요약￼│   ├── 문제점￼│   ├── 해결책￼│   └── 미래를 위한 길￼├── 현재 상황 분석￼│   ├── 사회 양극화와 직장 내 갈등 증가￼│   ├── CEO들의 어려운 상황￼│   └── 연구 배경 및 방법론￼├── 갈등지능(CIQ)의 4가지 핵심 역량￼│   ├── 자기 인식과 자기 조절￼│   ├── 사회적 갈등 해결 기술￼│   ├── 상황 적응력￼│   └── 체계적 사고￼├── 갈등지능형 리더의 7가지 원칙￼│   ├── 기초 다지기￼│   ├── 신뢰 높이기￼│   ├── 규율과 창의성 균형 맞추기￼│   ├── 적응력 숙달하기￼│   ├── 더 넓은 맥락 활용하기￼│   ├── 세대에 걸친 평화 지향하기￼│   └── 기회를 포착하기￼└── 갈등지능이 높은 조직 만들기￼<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>현재의 갈등 상황<br>\t\t\t\t\t<br>• 서구 조직들이 고된 시간을 보내고 있음 • 사회 전반의 양극화 심화로 직장 내 갈등과 무례한 행동 증가 • 인종, 성별, 소득 불평등, 권위주의 확산, 이민, 기후 변화 등 복합적 요인<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>직장 내 무례함의 실상<br>\t\t\t\t\t<br>미국 인사관리협회 조사 결과 (직장인 1,622명 대상) • 76%가 지난 한 달 동안 무례한 행동 목격 • 21%가 개인적으로 무례함 경험 • 거의 절반이 매주 무례한 행동을 겪음 • 13%는 매일 겪는다고 응답 • 44%는 2025년에 무례한 행동이 더 심해질 것으로 예상<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>갈등의 경제적 비용<br>\t\t\t\t\t<br>• 직원 몰입도 저하와 논쟁적 상호작용 빈발 • 하루 20억 달러 이상의 생산성 손실과 결근 비용 발생 • 26%의 직원이 무례함으로 인해 직장을 떠날 가능성 있다고 응답<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>CEO들이 직면한 딜레마<br>\t\t\t\t\t<br>• 양극화와 무례함 증가로 집중 감시 대상이 됨 • CEO 발언이 직원, 고객, 정치인의 반발을 초래할 위험 • 직원 65%는 기업이 주요 사회적 이슈에 목소리를 내야 한다고 믿음 • 소비자 80% 이상도 기업의 입장 표명 필요성에 동의<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>CEO 대량 사임의 시대<br>\t\t\t\t\t<br>• 2024년 1분기에만 622명의 CEO가 사의 표명 • 2023년 1분기 대비 50% 증가한 수치 • 사상 최대 퇴사자를 기록하며 리더십의 위기 상황<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>갈등지능 연구의 배경<br>\t\t\t\t\t<br>컬럼비아대 모턴 도이치 국제협력 및 갈등해결 센터의 30년 연구 • 심리학, 평화 및 갈등 연구, 복잡계 과학에서 통찰 도출 • 수많은 설문조사, 실험실 연구, 사례 및 현장연구 수행 • 리더, 중재자, 피스메이커의 가장 효과적인 갈등 개입 전략 규명<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>갈등지능(CIQ)의 4가지 핵심 역량<br>\t\t\t\t\t<br>1단계 - 자기 인식과 자기 조절<br>\t\t\t\t\t<br>• 개인적 반응을 인식하고 관리하는 능력 • 침착함 유지하면서 전략적 대응 가능<br>\t\t\t\t\t<br>2단계 - 사회적 갈등 해결 기술<br>\t\t\t\t\t<br>• 깊은 경청, 주장과 협력의 균형 • 편향성 체크로 건설적 해결책 도출<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>갈등지능(CIQ)의 4가지 핵심 역량<br>\t\t\t\t\t<br>3단계 - 상황 적응력<br>\t\t\t\t\t<br>• 다양한 유형의 갈등에 맞게 전략 조정 • 문화적 뉘앙스에 따른 개입, 후퇴, 조정 시점 판단<br>\t\t\t\t\t<br>4단계 - 체계적 사고<br>\t\t\t\t\t<br>• 더 큰 그림을 보고 복잡성 수용 • 과거 성공과 실패에서 학습하여 만성적 갈등 해결<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>갈등지능과 감성지능의 차이점<br>\t\t\t\t\t<br>감성지능 • 자신과 타인의 감정을 인식, 이해, 관리하는 능력 • 공감, 자기 조절, 사회적 인식 포함<br>\t\t\t\t\t<br>갈등지능 • 의견 불일치 관리를 위한 더 넓은 범주의 역량 • 감성지능을 포함하되 사회적 역학, 상황적 요인, 체계적 힘까지 이해<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>갈등지능형 리더의 효과<br>\t\t\t\t\t<br>니컬러스 레딩의 연구 결과 • 팀원들의 더 나은 업무 만족도, 권한 부여, 웰빙 경험 • 조직 내 더 높은 창의성과 건설성 문화 조성 • 스트레스와 불확실성 효과적 극복 • 리더의 갈등지능과 직원의 심리적 안전감 간 의미있는 상관관계<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>갈등지능형 리더의 7가지 원칙<br>\t\t\t\t\t<br>1. 기초 다지기<br>\t\t\t\t\t<br>• 갈등 본격화 전 조직 환경과 갈등 대응 기술 강화 • 분쟁 해결을 위한 토대 마련 • 초기 48시간이 향후 수년간의 관계 좌우<br>\t\t\t\t\t<br>2. 신뢰 높이기<br>\t\t\t\t\t<br>• '긍정적 평화' 상태 조성 • 강력한 협력 관계 구축<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>갈등지능형 리더의 7가지 원칙<br>\t\t\t\t\t<br>3. 규율과 창의성 균형 맞추기<br>\t\t\t\t\t<br>• 확고한 경계 설정과 협력적 문제 해결의 조화 • 공적 강경함과 사적 유연성 간 매끄러운 전환<br>\t\t\t\t\t<br>4. 적응력 숙달하기<br>\t\t\t\t\t<br>• 갈등 종류에 따른 다른 외교적 도구 활용 • 상황에 맞는 맞춤형 접근법 개발<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>갈등지능형 리더의 7가지 원칙<br>\t\t\t\t\t<br>5. 더 넓은 맥락 활용하기<br>\t\t\t\t\t<br>• 당장의 적대행위를 넘어 더 넓은 세력 관계 이해 • 다자적 관여를 통한 양자 간 분쟁 해결<br>\t\t\t\t\t<br>6. 세대에 걸친 평화 지향하기<br>\t\t\t\t\t<br>• 수십 년을 내다보는 장기적 관점 • 조직의 지속적 화합을 위한 점진적 변화 투자<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>갈등지능형 리더의 7가지 원칙<br>\t\t\t\t\t<br>7. 기회를 포착하기<br>\t\t\t\t\t<br>• 예상치 못한 상황에서 발생하는 돌파구 인식 • 감정적 전환점, 비공식적 채널, 의외의 일치점 활용 • 갈등을 전환할 수 있는 미묘한 기회들을 주의 깊게 관찰<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>1️⃣ 기초 다지기 - 조지 미첼의 북아일랜드 사례<br>\t\t\t\t\t<br>성 금요일 협정 중재 과정 • 수세기 종교, 정치, 유혈 갈등 상황에서 인내와 체계적 기반 구축 • 처음 몇 달간 오직 경청만 실시 • 사회 전반 인사와 100건 이상 심층 인터뷰 진행 • '미�el 원칙' 마련으로 민주주의와 비폭력 약속 도출 • 모든 합의 사항을 꼼꼼히 기록하여 '합의의 정원' 조성<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>1️⃣ 기초 다지기 - 앨런 멀럴리의 포드 사례<br>\t\t\t\t\t<br>127억 달러 손실 상황에서의 조직 문화 개선 • 깊게 뿌리내린 불신과 비밀주의 문제 해결 • 사업 계획 검토 회의를 통한 빨강-노랑-초록 신호등 시스템 도입 • \"비밀은 관리할 수 없다\"며 빨간색 프로젝트 보고 임원 공개 칭찬 • 투명성과 협력 중심의 근본적 문화 전환 달성 • 주가 1.01달러(2008년)에서 18달러 이상(2014년)으로 상승<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>2️⃣ 신뢰 높이기 - 마르티 아티사리의 아체 사례<br>\t\t\t\t\t<br>2004년 쓰나미 이후 인도네시아 아체 평화 프로세스 • 자연재해를 <b>'고통스러운 교착 상태'</b>에서 정치적 돌파구로 전환 • 적대적이던 이들이 구호 물자 분배와 공동체 재건에서 협력하도록 설계 • '협력의 섬' 관계 형성 및 점차 확장 • 공동 모니터링팀, 재건위원회, 합동 보안순찰 등 구체적 신뢰 구축 조치 • 헬싱키 양해각서 체결로 지속가능한 평화 협정 모델 제시<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>2️⃣ 신뢰 높이기 - 사티아 나델라의 마이크로소프트 사례<br>\t\t\t\t\t<br>링크트인 262억 달러 인수 시 문화 통합 • 즉각 통합 대신 독립성 유지하며 협력 기회 신중히 육성 • '커넥티드 앱 이니셔티브'로 자발적 협력 프로젝트 창출 • 링크트인 프로필-마이크로소프트 오피스 통합 등 자연스러운 시너지 발견 • 링크트인 매출 29억 달러(인수 당시)에서 <b>160억 달러(2024년)</b>로 증가 • 고유 문
