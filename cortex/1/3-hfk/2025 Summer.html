않는다. 대신 MYO는 현재 전략을 변경하지 않을 경우 각 비즈니스의 예상되는 전략 및 재무 궤적을 포착하도록 설계됐다. 또한 경쟁사들이 경쟁우위를 개선하기 위해 지속적으로 노력하고 있다는 점도 인식해야 한다. 그 결과 MYO는 종종 강해져야 하는데 나빠지고 있는 경쟁적 지위를 묘사한다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>야망과 MYO 사이에는 상당한 차이가 있어야 한다. 너무 비슷하다면 야망이 충분하지 않으므로 상향 조정해야 한다. 회사의 최우선 순위 전략, 운영, 조직 및 재무 과제를 파악하는 문서인 전략적 백로그Strategic backlog의 문제를 해결하면 이 격차를 좁힐 수 있다. 이런 이슈의 우선순위는 두 가지 기준에 따라 결정돼야 한다. 가치 또는 이슈를 효과적으로 해결하면서 얻을 수 있는 경제적 효과와 긴급성 또는 중요한 경로, 즉 중요한 기회를 놓치지 않기 위해 즉시 해결해야 하는지 또는 다른 중요한 문제를 해결하는 데 도움이 되는지 아닌지에 따라 결정돼야 한다. 백로그는 올해와 그 이후의 의사결정에 지침이 돼야 한다. 일반적으로 기업에는 전사적 이슈를 포괄하는 고위경영진을 위한 백로그와 각 사업부의 특정 과제를 다루는 별도의 백로그 등 여러개의 백로그가 있다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>백로그에 있는 이슈들은 올바르게 정의되도록 신중하면서도 구체적으로 기술돼야 한다. 모두 알다시피 잘못된 질문을 하면 정답을 찾기 어렵다. 하지만 많은 리더들은 전략적 우선순위를 설정할 때 시야를 제한하는 방식으로 문제를 정의하곤 한다. 예를 들어 “시장 Y에 진입하기 위해 회사 X를 인수해야 할까?”라는 질문은 “시장 Y에서 점유율을 어떻게 높일 수 있을까?”라는 더 넓은 시각의 질문으로 바꾸는 것이 바람직하다. 반대로 “전 세계 기후 변화에 효과적으로 대응하려면 전략을 어떻게 조정해야 할까?”와 같이 질문의 범위를 지나치게 넓히면 현실적으로 접근하기 어려운 이슈로 만들어버린다. 이 두 경우 모두 명확한 실행 계획은 수립되지 못하고 문제는 수년간 해결되지 않은 채로 남게 된다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>백로그의 각 항목은 이를 해결하기 위해 내려야 하는 하나 이상의 결정과 연결돼 있어야 한다. 예를 들어 인프라스트럭처 기술 대기업인 델 테크놀로지Dell Technologies를 살펴보자. 2015년 이 회사의 경영진은 획기적인 성과를 달성하기 위해서는 시장에 출시하는 모델을 근본적으로 재설계해야 한다고 결정했다. 재설계를 수행하기 위해 회사는 다음 사항을 결정해야 했다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>→&#160;델 영업 팀이 담당할 수 있는 최적의 제품 수<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>→&#160;생산성 극대화를 위해 영업 지역을 정의하는 방법<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>→&#160;적절한 수준의 고객 접촉을 가장 잘 보장하는 커버리지 모델<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>→&#160;영업사원에게 제품별 기술 지원을 제공하는 가장 좋은 방법<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>델의 경영진은 사용할 수 있는 최상의 데이터와 여러 옵션을 신중하게 검토한 후 각각의 결정을 내렸으며 이를 통해 시장 출시 재설계 문제를 효과적으로 해결했다. 이 회사는 2000여 명의 영업 담당자를 추가로 고용해 서비스 범위를 확대하고, 영업 담당자와 기술 지원을 더 잘 연계하기 위해 지역을 재조정하며, 대부분의 영업 담당자가 판매해야 하는 제품 수를 줄였다. 이런 변화를 통해 델은 상업용 PC, 서버 및 스토리지 분야에서 시장 점유율을 높일 수 있었다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>마지막 단계는 ‘의사결정 캘린더decision calendar’를 작성하거나 업데이트하는 것이다. 이 캘린더는 전략적 백로그에 있는 각 항목을 언제 다룰 것인지 명시하고 전문가 및 기타 이해관계자의 의견을 수렴한 뒤 최적의 조치를 제안할 책임이 있는 리더십 팀 구성원을 지정한다. 보통 이 캘린더는 임원 회의, 사업 부문 리더십 회의, 기타 주요 리더십 포럼의 일정과 연동되며 이 회의들에서는 백로그에 있는 주요 의사결정 사안들을 집중적으로 다룰 시간이 따로 마련된다. 이 캘린더가 제대로 운영되면 조직 내 꾸준하고 규칙적인 의사결정의 흐름, 즉 ‘드럼비트drumbeat’를 형성할 수 있으며 이를 통해 경영진의 성과 목표와 회사 MYO 간의 격차를 효율적으로 줄여나갈 수 있다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>전략 백로그가 정의되고 의사결정 일정이 설정되면 린 전략 결정은 지속적인 프로세스가 된다. 백로그의 각 이슈가 해결되면 해당 이슈는 제거되고 새로운 이슈로 대체된다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>비즈니스는 선택의 게임이며 좋은 선택은 강력한 대안에서 시작된다. 하지만 대부분의 기업은 전략적 결정을 내릴 때 여러 대안을 지속적으로 탐색하지 않는다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>지속적인 전략 관리<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>백로그에 있는 모든 이슈에 대해 경영진은 리소스 할당을 안내하는 표준 의사결정 프로세스를 따른다. 여기에는 두 가지 전략 세션이 수반된다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>사실과 대안&#160;이 세션에서 경영진은 문제를 완전히 이해하고 원인을 파악하며 이를 해결하기 위한 다양한 방법을 마련하기 위해 노력한다. 이 회의의 목표는 최선의 대안을 선택하는 것이 아니라 팀이 실행 가능한 종합적인 옵션을 개발하는 데 도움이 되는 폭넓은 대화에 참여하는 것이다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>이런 논의에서는 중요한 사실을 검토하는 것이 핵심이다. 대부분의 전략 개발 노력에는 시장 동향, 고객 구매 기준, 경쟁사 성과, 각 부문에서 회사의 제품 및 서비스의 수익성을 평가하기 위해 사실을 수집하는 단계가 포함된다. 이런 정보는 가치가 있지만 성과 저하의 근본적인 원인과 전략적 위치의 결함을 드러내지 못하는 경우가 많다. 예를 들어 리더가 시장 부문에서 성장을 가속화하고자 한다면 먼저 성장을 방해하는 주요 장애물을 이해해야 한다. 그렇지 않으면 사용과 구매가 어려운 번거로운 제품과 같은 원인을 해결하지 않고 광고 및 프로모션 지출에 대한 낮은 수익률과 같은 증상만 치료할 위험이 있다. 실적이 저조한 진정한 원인을 파악하려면 시장이나 경쟁사 조사에서 일반적으로 수집하는 것 이상의 사실을 수집하거나 기존 사실에 대한 심층적인 분석이 필요한 경우가 많다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>대안을 신중하게 고려하는 것도 마찬가지로 중요하다. 비즈니스는 선택의 게임이며 좋은 선택은 강력한 대안에서 시작된다. 안타깝게도 대부분의 기업은 전략적 결정을 내릴 때 여러 대안을 일관되게 검토하지 않는다. 그들의 접근방식은 종종 “지금 이렇게 하고 있는데 그게 더 나은 것 같으니 그렇게 하자”로 귀결된다. 이런 사고방식은 점진적인 개선으로 이어질 수 있지만 종종 기업이 돌파구를 마련할 기회를 놓치는 원인이 되기도 한다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>더 나쁜 것은 기업이 고려하는 대안이 잘못된 선택일 수 있다는 점이다. 종종 사람들은 의사결정자에게 3가지 선택지를 제시하면서 결과를 유도한다. 예컨대 하나는 거의 아무것도 하지 않는 수준, 다른 하나는 ‘차라리 자식을 포기하는 것’처럼 극단적으로 받아들여질 수 있는 안, 그리고 마지막 하나는 사실상 자신들이 원하는 방향이다. 또는 ‘골디락스’ 전략을 써서 하나는 너무 과하고, 다른 하나는 너무 약하며, 가운데 안이 적절하다고 느껴지도록 선택지를 제시한다. 이 같은 방식은 의사결정의 질을 떨어뜨린다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>가장 성공적인 기업들은 대안 수립과 평가를 전략 프로세스에 포함한다. 전략은 다양한 옵션을 신중하게 고려한 후에야 제안된다. 또한 이런 기업들은 경쟁 전략을 평가하고 권장사항을 결정하는 방법을 개별 사업부나 기능별 리더에게 맡기지 않고 대안 평가 기준, 예를 들어 회사의 미래 현금 흐름에 미치는 영향을 명확히 정의하고 경우에 따라 표준화한다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>선택과 약속&#160;이 세션에서 경영진은 대안에 대한 평가를 검토하고, 합의된 기준을 사용해 최상의 대안을 선택하며, 이에 대한 성과 마일스톤을 정의하고, 필요한 리소스를 파악한다. 이 회의의 결과는 최종 결정으로 이어지며 여기에는 예상되는 성과 개선에 대한 대가로 자원을 투입하는 것이 포함된다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>이 시점에서 전략이 얼마나 자주 궤도를 벗어나는지 놀라울 정도다. 거의 30년 전 마이클 포터는 “전략의 본질은 하지 않을 것을 선택하는 것”이라고 말했다. 하지만 많은 기업에서는 리더가 무엇을 하기로 결정했는지, 무엇을 하지 않기로 결정했는지를 정확히 파악하기 어렵다. 일반적인 이사회 전략 검토 후에는 주요 전략적 질문에 대한 답이 불분명하거나 해석의 여지가 있는 경우가 많다. 중요한 트레이드오프가 평가되지 않고 구체적인 선택이 이뤄지지 않으면 전략적 의사결정은 흔들리게 된다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>많은 기업에서 전략이란 마치 ‘바람직한 최종 상태’에 대한 정교한 설명처럼 보이지만 그 상태에 도달하기 위한 명확한 실행 경로는 부족한 경우가 많다. 이런 기업들은 어떤 행동을 즉시 중단, 계속 또는 시작할지 정의하는 경우가 거의 없다. 그러나 이런 명확성이 없으면 실행이 어려워진다. 더 나쁜 경우 경영진의 비전에 회의적인 직원들이 있는 조직의 하위 계층에서 전략이 조용한 반대에 직면할 수도 있다. 두 경우 모두 성과는 기대에 미치지 못한다. 전략 계획은 규범적이어야 하며 계획이 제시하는 미래를 달성하는 방법을 구체적으로 명시해야 한다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>최고의 기업들은 전략 검토 후 명시적인 의사결정 로그를 작성해 후속 조치를 취한다. 이 로그에는 경영진이 내린 선택이 기록되며 고려된 대안의 범위, 특정 옵션이 거부된 이유, 선택한 경로의 근거를 문서화한다. 이렇게 하면 모호함이 사라진다. 전략은 더 이상 결정을 이해하지 못한다고 주장하거나 자신만의 대안을 추구하려는 사람들의 논쟁이나 수동적인 저항의 대상이 되지 않는다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>약속도 중요하다. 전략적 의사결정은 수년에 걸쳐 운영 비용, 자본, 인재를 포함한 자원의 배분을 주도해야 한다. 그렇지 않으면 예산 책정 프로세스가 자금 지원 대상을 결정하고 더 나아가 회사의 전략을 형성하게 된다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>최고의 기업들은 경영진의 전략적 선택을 서면으로 작성된 양방향 성과 계약에 포함하고, 기업 센터는 사업부 및 기능의 성과 향상에 대한 대가로 필수 리소스를 제공한다. 이런 계약은 전략을 공식화한다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>10년이 넘는 기간 동안 델은 의사결정의 복잡성에 관계없이 이 두 가지 표준 공식을 고수해 왔다. 마이클 델은 그의 저서 ＜플레이 나이스 벗 윈＞(페이지2북스, 2022)에서 독자들에게 “과학적 방법을 신뢰하라”고 권하며 그의 팀이 서버 분야에서 델의 시장 리더십을 재확립하는 것부터 퀘스트 소프트웨어Quest Software, 소닉월SonicWall&#160;및 기타 소프트웨어 사업 매각, EMC와의 합병 후 회사 이름을 델 테크놀로지로 변경하는 것까지 모든 의사결정에 이 방법을 적용했다고 강조한다. 이런 접근방식 덕분에 델의 리더십은 품질 저하 없이 의사결정 속도를 가속화해 2013년 말 마이클 델이 회사를 비공개로 전환했을 때 투자한 금액의 10배에 달하는 수익을 올렸다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>아무리 잘 짜여진 전략이라도 조정 없이 실행할 수 있는 전략은 거의 없다. 시장과 경쟁사의 전략은 늘 변화한다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>비즈니스 성과 모니터링<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>린 전략을 실천하는 기업에서는 정기적인 비즈니스 성과 검토를 통해 조직의 성과 약속 달성 여부와 센터에서 필요한 리소스를 할당했는지를 평가한다. 일이 순조롭게 진행되면 리더십은 계획대로 진행된다. 그러나 불일치가 발생하면 시정 조치가 필요한지 아닌지로 논의가 전환된다. 시장이나 경쟁 상황이 크게 변하는 등 극단적인 경우에는 리더십이 문제를 전략적 백로그에 다시 올리기로 결정할 수도 있다. 이를 통해 팀은 새로운 사실을 수집하고, 새로운 대안을 모색하고, 잠재적으로 다른 선택을 하고, 새로운 약속과 성과 계약을 수립할 수 있다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>이는 일반적으로 기업이 비즈니스 성과를 검토하는 방식과는 크게 다르다. 대부분의 검토는 일기예보처럼 형식적으로 이뤄지며 사업 부문이나 각 부서 리더들은 실제 성과를 예산이나 연간 운영 계획과 비교하는 데 그치는 경우가 많다. 이런 검토에서는 종종 계획과의 차이를 강조하지만 대부분의 대응은 계획을 살짝 조정하거나 관련 리더에게 문제 해결을 지시하는 수준에 머무른다. 그러나 이런 검토의 진정한 목적은 회사의 전략적 방향을 변경할 필요가 있는지를 결정하는 것이어야 한다. 단순히 매출이 계획에 미치지 못했다는 사실만으로는 충분하지 않다. 리더는 그런 실적이 발생한 원인을 더 깊이 조사하고 시정 조치가 필요한지를 결정해야 한다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>아무리 잘 짜여진 전략이라도 시간이 지나면서 조정 없이 실행할 수 있는 전략은 거의 없다. 시장 상황과 경쟁사의 전략은 항상 변하기 때문에 기업은 종종 전략을 수정하거나 미세 조정해야 할 필요가 있다. 비즈니스 성과 검토는 이런 전략적 변화가 필요한지를 평가하기에 가장 적절한 자리다. 경영진은 ‘더 나은 전략적 대안을 제시할 만큼 현실이 변화했는가’라고 질문해야 한다. 대답이 ‘예’라면 문제를 재검토해야 한다. 대답이 ‘아니요’라면 경영진은 특정 영역의 노력을 강화하는 한편 다른 영역은 축소해 회사의 목표에 맞게 성과를 재조정할 수 있다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>330억 달러 규모의 생명공학 선도 기업인 암젠Amgen은 이런 유형의 엄격한 성과 모니터링을 성공적으로 구현했다. 상위 30명의 경영진이 참석하는 월간 운영팀 회의에서는 ‘성과 대화’를 위한 시간을 따로 마련해 팀이 회사의 전략적 백로그에 대해 약속한 사항을 잘 이행하고 있는지 점검한다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>또한 암젠은 선행 지표와 후행 지표를 모두 사용해 성과를 추적하는 지표 모니터링 플랫폼인 센싱Sensing을 개발했다. 예를 들어 ‘신규 처방전 작성 건수’는 제약 매출의 선행 지표로, ‘환자 등록률’은 임상 시험 속도를 예측해 의약품 개발이 일정에 맞춰 순조롭게 진행되고 있는지 평가하는 데 도움이 된다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>모든 성과 대화에 앞서 운영팀 구성원들은 암젠의 각 치료제, 지역, 기능에 대한 주요 지표를 검토한다. 실적이 저조한 사업 영역이 있는 경우 해당 사업 영역을 담당하는 임원이 그 격차를 제시하고 원인을 파악한 후 격차를 줄이기 위한 해결책을 제안한다. 격차가 근본적인 시장 변화나 규제 변화에서 비롯된 경우 담당 임원은 암젠의 우선순위 의제에 새로운 문제를 추가해 팀이 회사의 입장을 재평가하고 새로운 대안을 개발하며 필요에 따라 전략을 수정할 수 있도록 제안할 수 있다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>암젠의 성과 대화에서는 성공 사례도 강조한다. 각 세션에서는 초과 성과의 원인을 탐구하는 데 시간을 할애한다. 예를 들어 개발 중인 의약품의 임상시험 등록률이 예상보다 높았을 때 팀은 그 배경에 있었던 성공 요인들을 파악했다. 이는 연구자들과의 적극적인 소통을 통해 치료 효과에 대한 인식과 관심을 높이고 적격 환자 등록에 대한 열의를 이끌어낸 활동 등이었다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>암젠은 성과 대화 프로세스를 표준화하면서 성과 문화를 강화해 실행력과 재무성과를 개선했다. 2013년에는 연간 매출이 10억 달러 이상인 블록버스터 의약품을 3개 보유했지만 2025년에는 14개로 늘었고, 12년 동안 시장 가치가 500억 달러 미만에서 1600억 달러 이상으로 3배 이상 성장했다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>너무 오랫동안 리더들은 전략을 비표준 업무로 취급해왔으며 그 결과 종종 부정확하거나 시의적절하지 않은 결정을 내리는 경우가 많았다. 이를 해결하기 위해서는 우선순위를 명확하게 정의하고, 문제의 원인을 파악할 수 있는 사실을 수집하고, 선택할 수 있는 강력한 옵션을 개발하고, 선택을 명시하고, 실행을 위한 구체적인 계획을 세우고, 실행을 추적하는 등 전략에 대한 체계적인 접근방식을 채택해야 한다. 모든 부서와 기능이 동일한 접근방식을 따른다면 경영진은 자신 있게 의사결정을 조직의 하위 레벨에 위임할 수 있고, 회사는 모든 의사결정의 품질을 개선하고 더 빠르게 내릴 수 있다. 그래야만 기업이 달성하는 성과가 새로운 차원에 도달할 수 있다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>마이클 맨킨스(Michael Mankins)는&#160;베인앤드컴퍼니의 조직, 전략 및 전환 부문 리더로 텍사스 오스틴에서 파트너로 활동하고 있다. 그는 ＜Time, Talent, Energy: Overcome Organizational Drag and Unleash Your Team’s Productive Power＞(Harvard Business Review Press, 2017)의 공저자이기도 하다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>에디팅&#160;최호진<br>\t\t\t\t\t<br><br>\t\t\t\t\t출처: <<a href=\"https://www.hbrkorea.com/article/view/atype/ma/category_id/1_1/article_no/2316/page/1\" target=\"_blank\">https://www.hbrkorea.com/article/view/atype/ma/category_id/1_1/article_no/2316/page/1</a>> <br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>\t\t\t\t\t\t\t\t\t\t<br>\t\t\t\t\t\t<br>&#128450; 아티클 구조<br>\t\t\t\t\t\t<br><br>\t\t\t\t\t\t<br>&#127919; 린 전략의 3가지 요소￼├── &#128205; 우선순위 설정￼├── &#128260; 지속적인 전략 관리￼└── &#128202; 비즈니스 성과 모니터링<br>\t\t\t\t\t\t<br>&#127970; 기업 사례￼├── &#128269; 구글의 10배 사고￼├── &#128187; 델 테크놀로지의 시장 출시 재설계￼└── &#129516; 암젠의 성과 모니터링<br>\t\t\t\t\t\t<br><br>\t\t\t\t\t\t<br>내용 요약<br>\t\t\t\t\t\t<br><br>\t\t\t\t\t\t<br>문제&#160;관리자들은 일상적으로 너무 느리게 전략적 결정을 내리고 잘못된 결정을 내리는 경우가 많다.<br>\t\t\t\t\t\t<br><br>\t\t\t\t\t\t<br>발생 이유&#160;전략적 의사결정은 일반적으로 고유한 것으로 간주되며 각 의사결정에는 담당 임원이 지시하는 맞춤형 프로세스가 필요하다. 그 결과, 같은 회사 안에서도 비슷한 의사결정에 대해 매우 다른 방식으로 접근하게 된다.<br>\t\t\t\t\t\t<br><br>\t\t\t\t\t\t<br>솔루션&#160;몇몇 선도 기업들은 전략 우선순위 파악, 지속적인 전략적 의사결정, 정기적인 비즈니스 성과 검토 프로세스에 엄격함과 일관성을 부여하는 표준화된 전략 수립 방식을 채택하고 있다.<br>\t\t\t\t\t\t<br>&#128204; 문제 정의: 전략적 의사결정 vs 린 제조방식<br>\t\t\t\t\t\t<br><br>\t\t\t\t\t\t<br>\t\t\t\t\t\t\t<br>- 대부분 회사에서 비정규 업무의 전형<br>\t\t\t\t\t\t\t<br>- 종종 눈송이처럼 고유한 것으로 여겨지며, 각각의 의사결정에 맞춤형 프로세스 필요하다고 인식<br>\t\t\t\t\t\t<br>\t\t\t\t\t\t<br>-> &#128256; 새로운 시장 진출 여부 같은 유사한 의사결정도 같은 회사 내에서 전혀 다른 방식으로 처리<br>\t\t\t\t\t\t<br>-> &#128201; 일관성 부재가 더 느리고 질 낮은 의사결정으로 이어짐<br>\t\t\t\t\t\t<br><br>\t\t\t\t\t\t<br>&#127981; 린 제조방식의 목표 <br>\t\t\t\t\t\t<br>가능한 한 가장 안전하면서도 쉽고 효율적인 방식으로 제품 제작하기 위한, 정확한 절차 수립<br>\t\t\t\t\t\t<br>-> 중요한 프로세스가 표준 작업이 되면 변동성 감소, 처리량 증가, 비용 감소, 품질 향상<br>\t\t\t\t\t\t<br>e.g. 도요타, 아마존, 인텔, 나이키 등이 큰 효과 거둠<br>\t\t\t\t\t\t<br><br>\t\t\t\t\t\t<br><br>\t\t\t\t\t\t<br>\t\t\t\t\t\t\t<br>- &#128196; 일관성 부재<br>\t\t\t\t\t\t\t<br>약 50%가 전략 계획 수립에 표준 템플릿 사용한다고 응답<br>\t\t\t\t\t\t\t<br>But, 중요한 의사결정 시 일관된 접근방식을 따르는 기업은 거의 없고,￼담당 임원의 재량이나 의사 결정 유형에 따라 달라지는 경우가 많음<br>\t\t\t\t\t\t\t<br>- <br>❌ 전략적 결정의 품질 <br>\t\t\t\t\t\t\t<br>\t\t\t\t\t\t\t\t<br>- 기업이 내린 전략적 결정의 4분의 1은 차선책으로 판명<br>\t\t\t\t\t\t\t\t<br>- 경영진은 종종 부정확하거나 열등한 행동 방침을 선택<br>\t\t\t\t\t\t\t\t<br>- 큰 비용이 투입되거나, 원복이 불가능해 수년 동안 영향을 미침<br>\t\t\t\t\t\t\t<br>\t\t\t\t\t\t\t<br>\t\t\t\t\t\t\t<br>- <br>⏰ 의사결정 속도 <br>\t\t\t\t\t\t\t<br>\t\t\t\t\t\t\t\t<br>- 회사에서 의사결정이 너무 느리다는 응답이 45% 이상<br>\t\t\t\t\t\t\t\t<br>- 올바른 선택이 내려져도 시장 변화로 성과 저하 발생<br>\t\t\t\t\t\t\t<br>\t\t\t\t\t\t\t<br>\t\t\t\t\t\t\t<br>- <br>&#128200; 성과 달성률 <br>\t\t\t\t\t\t\t<br>\t\t\t\t\t\t\t\t<br>- 응답 기업들은 평균적으로 전략 목표 결과의 70% 미만 달성<br>\t\t\t\t\t\t\t\t<br>조직이 실행할 구체적인 행동이 없었기 때문에 성과가 미흡<br>\t\t\t\t\t\t\t\t<br>- 전략 자체가 건전한데, 실행이 제대로 이뤄지지 않은 탓으로 귀인하는 경우 빈번<br>\t\t\t\t\t\t\t\t<br>그러나,<br>\t\t\t\t\t\t\t\t<br>- 많은 경우 전략적 결정 자체가 불분명해 조율되지 않거나, ￼심지어 상충되는 행동으로 인해 평범한 결과가 이어졌음<br>\t\t\t\t\t\t\t\t<br>- 리더들이 원하는 결과만 명시하고 이를 달성하기 위해 ￼필요한 행동을 정의하지 않은 채 결정을 내렸음 <br>\t\t\t\t\t\t\t<br>\t\t\t\t\t\t\t<br>\t\t\t\t\t\t<br>\t\t\t\t\t\t<br>\t\t\t\t\t\t\t<br>- &#128683; 불량률이 25%라면 용납할 수 없는 수준<br>\t\t\t\t\t\t\t<br>- ⏱ 목표 사이클 시간을 45% 이상 초과하면 문제 상황<br>\t\t\t\t\t\t\t<br>- &#128201; 수율 손실이 30% 이상 발생하면 즉시 개선 필요<br>\t\t\t\t\t\t<br>\t\t\t\t\t\t<br>하지만 많은 기업이 이런 수준의 비효율성과 비효과성을 용인하며 전략을 수립<br>\t\t\t\t\t\t<br>중요한 제조 공정처럼 전략적 의사결정이 표준 업무가 되어야함<br>\t\t\t\t\t\t<br><br>\t\t\t\t\t\t<br><br>\t\t\t\t\t\t<br><br>\t\t\t\t\t\t<br><br>\t\t\t\t\t\t<br><br>\t\t\t\t\t\t<br><br>\t\t\t\t\t\t<br><br>\t\t\t\t\t\t<br><br>\t\t\t\t\t\t<br><br>\t\t\t\t\t\t<br><br>\t\t\t\t\t\t<br><br>\t\t\t\t\t\t<br>\t\t\t\t\t\t\t<br>- <br>&#127919; 전략적 우선순위 설정 <br>\t\t\t\t\t\t\t<br>\t\t\t\t\t\t\t\t<br>- 성과 목표 명확화<br>\t\t\t\t\t\t\t\t<br>- 다년도 전망과 비교<br>\t\t\t\t\t\t\t\t<br>- 전략적 백로그 구성<br>\t\t\t\t\t\t\t<br>\t\t\t\t\t\t\t<br>\t\t\t\t\t\t\t<br>- <br>&#128260; 지속적인 방식의 문제 해결<br>\t\t\t\t\t\t\t<br>\t\t\t\t\t\t\t\t<br>- 사실과 대안 세션<br>\t\t\t\t\t\t\t\t<br>- 선택과 약속 세션<br>\t\t\t\t\t\t\t\t<br>- 표준화된 의사결정 프로세스<br>\t\t\t\t\t\t\t<br>\t\t\t\t\t\t\t<br>\t\t\t\t\t\t\t<br>- <br>&#128202; 비즈니스 성과 모니터링 <br>\t\t\t\t\t\t\t<br>\t\t\t\t\t\t\t\t<br>- 정기적인 성과 검토<br>\t\t\t\t\t\t\t\t<br>- 선행/후행 지표 활용<br>\t\t\t\t\t\t\t\t<br>- 전략 조정 여부 결정<br>\t\t\t\t\t\t\t<br>\t\t\t\t\t\t\t<br>\t\t\t\t\t\t<br>\t\t\t\t\t\t<br><br>\t\t\t\t\t\t<br>&#127919; 전략적 우선순위 설정<br>\t\t\t\t\t\t<br>재무 목표(매출 및 영업이익 등) + (상대적 시장점유율 성장 및 고객만족도 향상 등)을 포함하는 회사의 다년간 성과 목표를 명확히 하거나 수정하는 것에서 시작<br>\t\t\t\t\t\t<br>\t\t\t\t\t\t\t<br>- <br>❌ 전통적인 목표 설정의 문제점 <br>\t\t\t\t\t\t\t<br>\t\t\t\t\t\t\t\t<br>- 정치적 협상의 대상이 됨<br>\t\t\t\t\t\t\t\t<br>- 각 사업 부문이 낮은 목표를 받기 위해 역량을 낮춰 제시<br>\t\t\t\t\t\t\t\t<br>- 본사가 이를 눈치채고 더 높은 목표 강요<br>\t\t\t\t\t\t\t\t<br>- 목표가 전략의 나침반이 아닌 타협의 산물이 됨<br>\t\t\t\t\t\t\t<br>\t\t\t\t\t\t\t<br>\t\t\t\t\t\t\t<br>- <br>&#127942; 성과 목표는 열망이다 <br>\t\t\t\t\t\t\t<br>\t\t\t\t\t\t\t\t<br>- 단순한 달성 가능한 목표와 차별화<br>\t\t\t\t\t\t\t\t<br>- 기업 성과를 획기적으로 끌어올릴 수 있는 혁신적 아이디어 유도<br>\t\t\t\t\t\t\t\t<br>- 현실적이지만 현재 전략으로는 도달할 수 없는 수준<br>\t\t\t\t\t\t\t<br>\t\t\t\t\t\t\t<br>\t\t\t\t\t\t<br>\t\t\t\t\t\t<br><br>\t\t\t\t\t\t<br><br>\t\t\t\t\t\t<br><br>\t\t\t\t\t\t<br><br>\t\t\t\t\t\t<br><br>\t\t\t\t\t\t<br><br>\t\t\t\t\t\t<br><br>\t\t\t\t\t\t<br><br>\t\t\t\t\t\t<br>&#127919; 전략적 우선순위 설정<br>\t\t\t\t\t\t<br>\t\t\t\t\t\t\t<br>- 기존 솔루션보다 10배 더 나은 솔루션을 목표<br>\t\t\t\t\t\t\t<br>- 구글 전략의 핵심 원칙이자 회사 문화에 깊이 뿌리내림<br>\t\t\t\t\t\t<br>\t\t\t\t\t\t<br>\t\t\t\t\t\t\t<br>- 지메일: 출시 당시 경쟁 서비스보다 100배 더 많은 용량 제공<br>\t\t\t\t\t\t\t<br>- 구글 스트리트 뷰: 1000만 마일 넘는 도로 촬영으로 고유한 가치 추가<br>\t\t\t\t\t\t\t<br>- 웨이모: 자율주행차 개발로 현재 미국 내 여러 도시에서 운행 중<br>\t\t\t\t\t\t<br>\t\t\t\t\t\t<br><br>\t\t\t\t\t\t<br><br>\t\t\t\t\t\t<br><br>\t\t\t\t\t\t<br><br>\t\t\t\t\t\t<br><br>\t\t\t\t\t\t<br><br>\t\t\t\t\t\t<br>&#127919; 전략적 우선순위 설정<br>\t\t\t\t\t\t<br>\t\t\t\t\t\t\t<br>- <br>&#128200; 다년도 전망(MYO, Multiyear Outlook) <br>\t\t\t\t\t\t\t<br>\t\t\t\t\t\t\t\t<br>- 경영진이 이미 내린 결정과 자원 투입을 감안한 미래 실적 예측<br>\t\t\t\t\t\t\t\t<br>- 아직 이뤄지지 않은 결정은 고려하지 않음<br>\t\t\t\t\t\t\t\t<br>- 계획이 아닌, 현재 전략 변경 없을 경우의 예상 전략/재무 궤적<br>\t\t\t\t\t\t\t\t<br>- 경쟁사들의 경쟁우위 달성 정도 -> 상대적인 경쟁적 지위 모니터링<br>\t\t\t\t\t\t\t<br>\t\t\t\t\t\t\t<br>\t\t\t\t\t\t<br>\t\t\t\t\t\t<br><br>\t\t\t\t\t\t<br><br>\t\t\t\t\t\t<br><br>\t\t\t\t\t\t<br><br>\t\t\t\t\t\t<br><br>\t\t\t\t\t\t<br><br>\t\t\t\t\t\t<br>&#127919; 전략적 우선순위 설정<br>\t\t\t\t\t\t<br>\t\t\t\t\t\t\t<br>- <br>&#128203; 전략적 백로그(Strategic Backlog) <br>\t\t\t\t\t\t\t<br>\t\t\t\t\t\t\t\t<br>- 회사의 최우선 순위 전략, 운영, 조직, 재무 과제 파악 문서<br>\t\t\t\t\t\t\t\t<br>- 우선순위 결정 기준: 가치(경제적 효과)와 긴급성(중요한 경로)<br>\t\t\t\t\t\t\t\t<br>- 중요한 기회를 놓치지 않기 위해 즉시 해결해야 하는지￼또는 다른 중요한 문제를 해결하는 데 도움이 되는지 아닌지에 따라 결정 <br>\t\t\t\t\t\t\t\t<br>-> 올해와 그 이후 의사결정의 지침<br>\t\t\t\t\t\t\t\t<br>- 전사적 이슈용 고위경영진 백로그와 각 사업부별 백로그 존재<br>\t\t\t\t\t\t\t<br>\t\t\t\t\t\t\t<br>\t\t\t\t\t\t<br>\t\t\t\t\t\t<br><br>\t\t\t\t\t\t<br><br>\t\t\t\t\t\t<br><br>\t\t\t\t\t\t<br><br>\t\t\t\t\t\t<br><br>\t\t\t\t\t\t<br>\t\t\t\t\t\t\t<br>- 백로그 이슈들은 신중하면서도 구체적으로 기술되어야 함<br>\t\t\t\t\t\t\t<br>- 잘못된 질문을 하면 정답을 찾기 어려움 - 올드보이<br>\t\t\t\t\t\t\t<br>- 많은 리더들이 시야를 제한하는 방식으로 문제를 정의<br>\t\t\t\t\t\t<br>\t\t\t\t\t\t<br>\t\t\t\t\t\t\t<br>- ❌ 너무 좁은 질문: \"시장 Y에 진입하기 위해 회사 X를 인수해야 할까?\"<br>\t\t\t\t\t\t\t<br>- ✅ 더 넓은 시각: \"시장 Y에서 점유율을 어떻게 높일 수 있을까?\"<br>\t\t\t\t\t\t\t<br>- ❌ 너무 넓은 질문: \"전 세계 기후 변화에 효과적으로 대응하려면 전략을 어떻게 조정해야 할까?\"<br>\t\t\t\t\t\t\t<br>- 두 극단 모두 명확한 실행 계획 수립 불가하고 문제가 수년간 미해결 상태로 남음<br>\t\t\t\t\t\t<br>\t\t\t\t\t\t<br><br>\t\t\t\t\t\t<br><br>\t\t\t\t\t\t<br><br>\t\t\t\t\t\t<br><br>\t\t\t\t\t\t<br><br>\t\t\t\t\t\t<br>&#127919; 전략적 우선순위 설정<br>\t\t\t\t\t\t<br>\t\t\t\t\t\t\t<br>- <br>&#128260; 2015년 델의 근본적 재설계 결정 <br>\t\t\t\t\t\t\t<br>\t\t\t\t\t\t\t\t<br>- 획기적 성과 달성을 위한 시장 출시 모델 재설계 필요성 인식<br>\t\t\t\t\t\t\t\t<br>- 여러 핵심 결정사항들을 체계적으로 해결<br>\t\t\t\t\t\t\t<br>\t\t\t\t\t\t\t<br>\t\t\t\t\t\t\t<br>- <br>&#128203; 주요 결정사항들 <br>\t\t\t\t\t\t\t<br>\t\t\t\t\t\t\t\t<br>- 델 영업 팀이 담당할 수 있는 최적의 제품 수<br>\t\t\t\t\t\t\t\t<br>- 생산성 극대화를 위한 영업 지역 정의 방법<br>\t\t\t\t\t\t\t\t<br>- 적절한 고객 접촉을 보장하는 커버리지 모델<br>\t\t\t\t\t\t\t\t<br>- 영업사원에게 제품별 기술 지원을 제공하는 최적 방법<br>\t\t\t\t\t\t\t<br>\t\t\t\t\t\t\t<br>\t\t\t\t\t\t\t<br>- <br>&#127919; 실행 결과 <br>\t\t\t\t\t\t\t<br>\t\t\t\t\t\t\t\t<br>- 2000여 명의 영업 담당자 추가 고용으로 서비스 범위 확대<br>\t\t\t\t\t\t\t\t<br>- 영업 담당자와 기술 지원 연계 강화를 위한 지역 재조정<br>\t\t\t\t\t\t\t\t<br>- 대부분 영업 담당자가 판매해야 하는 제품 수 축소<br>\t\t\t\t\t\t\t\t<br>- 상업용 PC, 서버, 스토리지 분야 시장 점유율 증가<br>\t\t\t\t\t\t\t<br>\t\t\t\t\t\t\t<br>\t\t\t\t\t\t<br>\t\t\t\t\t\t<br><br>\t\t\t\t\t\t<br><br>\t\t\t\t\t\t<br><br>\t\t\t\t\t\t<br><br>\t\t\t\t\t\t<br><br>\t\t\t\t\t\t<br><br>\t\t\t\t\t\t<br><br>\t\t\t\t\t\t<br><br>\t\t\t\t\t\t<br><br>\t\t\t\t\t\t<br><br>\t\t\t\t\t\t<br><br>\t\t\t\t\t\t<br><br>\t\t\t\t\t\t<br>&#127919; 전략적 우선순위 설정<br>\t\t\t\t\t\t<br>- <br>&#128197; 의사결정 캘린더(Decision Calendar) <br>\t\t\t\t\t\t<br>\t\t\t\t\t\t\t<br>- 백로그 각 항목을 언제 다룰지 명시<br>\t\t\t\t\t\t\t<br>- 책임 리더 지정 및 이해관계자 의견 수렴 일정<br>\t\t\t\t\t\t\t<br>-  임원 회의, 사업 부문 리더십 회의, 기타 주요 리더십 포럼의 일정과 연동되며 이 회의들에서는 백로그에 있는 주요 의사결정 사안들을 집중적으로 다룰 시간이 따로 마련<br>\t\t\t\t\t\t\t<br>- 조직 내 꾸준하고 규칙적인 의사결정 흐름(드럼비트) 형성<br>\t\t\t\t\t\t<br>\t\t\t\t\t\t<br>\t\t\t\t\t\t<br><br>\t\t\t\t\t\t<br><br>\t\t\t\t\t\t<br><br>\t\t\t\t\t\t<br><br>\t\t\t\t\t\t<br><br>\t\t\t\t\t\t<br><br>\t\t\t\t\t\t<br><br>\t\t\t\t\t\t<br><br>\t\t\t\t\t\t<br><br>\t\t\t\t\t\t<br><br>\t\t\t\t\t\t<br><br>\t\t\t\t\t\t<br><br>\t\t\t\t\t\t<br><br>\t\t\t\t\t\t<br><br>\t\t\t\t\t\t<br>&#128260; 지속적인 전략 관리<br>\t\t\t\t\t\t<br>&#128203; 백로그의 모든 이슈에 대해 경영진이 따르는 표준 프로세스 - 리스스 할당을 안내<br>\t\t\t\t\t\t<br><br>\t\t\t\t\t\t<br>&#128260; 지속적인 전략 관리<br>\t\t\t\t\t\t<br>\t\t\t\t\t\t\t<br>- <br>&#128202; 핵심 사실 검토의 중요성 <br>\t\t\t\t\t\t\t<br>\t\t\t\t\t\t\t\t<br>- 성과 저하의 근본적 원인과 전략적 위치 결함 파악<br>\t\t\t\t\t\t\t\t<br>- 단순한 시장 동향, 고객 구매 기준, 경쟁사 성과 이상의 정보 필요<br>\t\t\t\t\t\t\t\t<br>- 증상이 아닌 원인 해결에 집중<br>\t\t\t\t\t\t\t\t<br>- 시장 부문에서 성장을 가속화하고자 한다면 먼저 성장을 방해하는 주요 장애물을 이해 필요<br>\t\t\t\t\t\t\t\t<br>- 그렇지 않으면 사용과 구매가 어려운 번거로운 제품과 같은 원인을 해결하지 않고 광고 및 프로모션 지출에 대한 낮은 수익률과 같은 증상만 치료할 위험 존재<br>\t\t\t\t\t\t\t<br>\t\t\t\t\t\t\t<br>\t\t\t\t\t\t\t<br>- <br>&#128269; 신중한 대안 고려의 필요성 <br>\t\t\t\t\t\t\t<br>\t\t\t\t\t\t\t\t<br>- 비즈니스는 선택의 게임이며 좋은 선택은 강력한 대안에서 시작<br>\t\t\t\t\t\t\t\t<br>- 대부분 기업은 전략적 결정 시 여러 대안을 일관되게 검토하지 않음<br>\t\t\t\t\t\t\t\t<br>- \"지금 이렇게 하고 있으니 그렇게 하자\" 방식은 돌파구 기회 상실하고 점진적 개선에 그칠 우려 존재<br>\t\t\t\t\t\t\t<br>\t\t\t\t\t\t\t<br>\t\t\t\t\t\t\t<br>- <br>⚠️ 잘못된 대안 제시 방식 <br>\t\t\t\t\t\t\t<br>\t\t\t\t\t\t\t\t<br>- 3가지 옵션을 제시하는 '골디락스' 전략으로 가운데 안이 적절해 보이도록 조작 - 사진 삽입<br>\t\t\t\t\t\t\t\t<br>- 이런 방식은 의사결정의 질을 떨어뜨림<br>\t\t\t\t\t\t\t<br>\t\t\t\t\t\t\t<br>\t\t\t\t\t\t<br>\t\t\t\t\t\t<br><br>\t\t\t\t\t\t<br>가장 성공적인 기업들은 대안 수립과 평가를 전략 프로세스에 포함한다. ￼또한 경쟁 전략을 평가하고 권장사항을 결정하는 방법을 개별 사업부나 기능별 리더에게 맡기지 않고 회사의 미래 성과에 미치는 영향을 명확히 정의하고 표준화한다.<br>\t\t\t\t\t\t<br><br>\t\t\t\t\t\t<br><br>\t\t\t\t\t\t<br><br>\t\t\t\t\t\t<br><br>\t\t\t\t\t\t<br><br>\t\t\t\t\t\t<br><br>\t\t\t\t\t\t<br><br>\t\t\t\t\t\t<br><br>\t\t\t\t\t\t<br><br>\t\t\t\t\t\t<br><br>\t\t\t\t\t\t<br><br>\t\t\t\t\t\t<br><br>\t\t\t\t\t\t<br><br>\t\t\t\t\t\t<br><br>\t\t\t\t\t\t<br><br>\t\t\t\t\t\t<br>&#128260; 지속적인 전략 관리<br>\t\t\t\t\t\t<br>\t\t\t\t\t\t\t<br>- <br>&#127919; 세션의 주요 활동 <br>\t\t\t\t\t\t\t<br>\t\t\t\t\t\t\t\t<br>- 대안에 대한 평가 검토<br>\t\t\t\t\t\t\t\t<br>- 합의된 기준을 사용해 최상의 대안 선택<br>\t\t\t\t\t\t\t\t<br>- 성과 마일스톤 정의<br>\t\t\t\t\t\t\t\t<br>- 필요한 리소스 파악<br>\t\t\t\t\t\t\t\t<br>- 예상 성과 개선 대가로 자원 투입 결정<br>\t\t\t\t\t\t\t<br>\t\t\t\t\t\t\t<br>\t\t\t\t\t\t\t<br>- <br>⚠️ 전략이 궤도를 벗어나는 문제 <br>\t\t\t\t\t\t\t<br>\t\t\t\t\t\t\t\t<br>- 많은 기업에서 무엇을 하기로/하지 않기로 결정했는지 파악 어려움<br>\t\t\t\t\t\t\t\t<br>- 이사회 전략 검토 후 주요 질문에 대한 답이 불분명하거나 해석 여지 존재<br>\t\t\t\t\t\t\t<br>\t\t\t\t\t\t\t<br>\t\t\t\t\t\t\t<br>-> 중요한 트레이드오프 평가 없이는 전략적 의사결정이 흔들림<br>\t\t\t\t\t\t\t<br>- <br>&#128203; 바람직한 최종 상태 vs 실행 경로 <br>\t\t\t\t\t\t\t<br>\t\t\t\t\t\t\t\t<br>- 많은 기업의 전략은 '바람직한 최종 상태'에 대한 정교한 설명 추구<br>\t\t\t\t\t\t\t\t<br>그러나, 그에 도달하기 위한 명확한 실행 경로는 부족<br>\t\t\t\t\t\t\t\t<br>- 어떤 행동을 즉시 중단/계속/시작할지 정의하지 않음<br>\t\t\t\t\t\t\t\t<br>- 명확성 부족으로 실행 어려워지고 조용한 반대에 직면<br>\t\t\t\t\t\t\t\t<br>- 전략 계획은 규범적이어야 하며 미래 달성 방법을 구체적으로 명시해야 함<br>\t\t\t\t\t\t\t<br>\t\t\t\t\t\t\t<br>\t\t\t\t\t\t<br>\t\t\t\t\t\t<br><br>\t\t\t\t\t\t<br><br>\t\t\t\t\t\t<br><br>\t\t\t\t\t\t<br><br>\t\t\t\t\t\t<br>&#128260; 지속적인 전략 관리<br>\t\t\t\t\t\t<br>\t\t\t\t\t\t\t<br>- <br>&#128203; 명시적인 의사결정 로그 작성 및 후속 조치 시행<br>\t\t\t\t\t\t\t<br>\t\t\t\t\t\t\t\t<br>- 경영진이 내린 선택과 고려된 대안의 범위 문서화<br>\t\t\t\t\t\t\t\t<br>- 특정 옵션이 거부된 이유 명시, 선택한 경로의 근거 설명<br>\t\t\t\t\t\t\t<br>\t\t\t\t\t\t\t<br>\t\t\t\t\t\t\t<br>-> 모호함 제거로 논쟁이나 수동적 저항 방지<br>\t\t\t\t\t\t\t<br>- <br>&#129309; 약속의 중요성 <br>\t\t\t\t\t\t\t<br>\t\t\t\t\t\t\t\t<br>- 전략적 의사결정이 수년간 자원 배분을 주도해야 함<br>\t\t\t\t\t\t\t\t<br>그렇지 않으면 예산 프로세스가 회사 전략을 형성하게 됨<br>\t\t\t\t\t\t\t<br>\t\t\t\t\t\t\t<br>\t\t\t\t\t\t\t<br>- <br>&#128196; 서면 양방향 성과 계약 <br>\t\t\t\t\t\t\t<br>\t\t\t\t\t\t\t\t<br>- 경영진의 전략적 선택을 서면 계약에 포함<br>\t\t\t\t\t\t\t\t<br>- 기업 센터가 사업부 성과 향상 대가로 필수 리소스 제공<br>\t\t\t\t\t\t\t<br>\t\t\t\t\t\t\t<br>\t\t\t\t\t\t\t<br>       -> 이런 계약이 전략을 공식화함<br>\t\t\t\t\t\t<br>\t\t\t\t\t\t<br><br>\t\t\t\t\t\t<br><br>\t\t\t\t\t\t<br><br>\t\t\t\t\t\t<br><br>\t\t\t\t\t\t<br><br>\t\t\t\t\t\t<br><br>\t\t\t\t\t\t<br><br>\t\t\t\t\t\t<br>&#128260; 지속적인 전략 관리<br>\t\t\t\t\t\t<br>\t\t\t\t\t\t\t<br>- <br>&#128200; 10년 넘는 기간 동안 의사결정 복잡성에 관계없이  일관된 표준 공식 고수<br>\t\t\t\t\t\t\t<br>\t\t\t\t\t\t\t\t<br>- 마이클 델의 \"과학적 방법을 신뢰하라\" 철학<br>\t\t\t\t\t\t\t<br>\t\t\t\t\t\t\t<br>\t\t\t\t\t\t\t<br>- <br>&#127919; 적용 사례들 <br>\t\t\t\t\t\t\t<br>\t\t\t\t\t\t\t\t<br>- 서버 분야 시장 리더십 재확립<br>\t\t\t\t\t\t\t\t<br>- 퀘스트 소프트웨어, 소닉월 등 소프트웨어 사업 매각<br>\t\t\t\t\t\t\t\t<br>- EMC와의 합병 후 회사명 델 테크놀로지로 변경<br>\t\t\t\t\t\t\t<br>\t\t\t\t\t\t\t<br>\t\t\t\t\t\t\t<br>- <br>&#128176; 성과 <br>\t\t\t\t\t\t\t<br>\t\t\t\t\t\t\t\t<br>- 품질 저하 없이 의사결정 속도 가속화<br>\t\t\t\t\t\t\t\t<br>- 2013년 말 비공개 전환 시 투자 금액의 10배 수익 달성<br>\t\t\t\t\t\t\t<br>\t\t\t\t\t\t\t<br>\t\t\t\t\t\t<br>\t\t\t\t\t\t<br><br>\t\t\t\t\t\t<br><br>\t\t\t\t\t\t<br><br>\t\t\t\t\t\t<br><br>\t\t\t\t\t\t<br><br>\t\t\t\t\t\t<br><br>\t\t\t\t\t\t<br>&#128202; 비즈니스 성과 모니터링<br>\t\t\t\t\t\t<br>\t\t\t\t\t\t\t<br>- <br>&#128200; 성과 검토의 목적 <br>\t\t\t\t\t\t\t<br>\t\t\t\t\t\t\t\t<br>- 조직의 성과 약속 달성 여부와 센터에서 필요한 리소스 할당 여부 확인<br>\t\t\t\t\t\t\t\t<br>- 불일치 발생 시, 시정 조치 필요성 논의<br>\t\t\t\t\t\t\t\t<br>-> 팀은 새로운 사실을 수집하고, 새로운 대안을 모색하고, 잠재적으로 다른 선택을 하고, 새로운 약속과 성과 계약을 수립 가능<br>\t\t\t\t\t\t\t<br>\t\t\t\t\t\t\t<br>\t\t\t\t\t\t\t<br>- <br>&#128260; 일반적인 검토 방식과의 차이 <br>\t\t\t\t\t\t\t<br>\t\t\t\t\t\t\t\t<br>- 대부분 검토는 일기예보처럼 형식적으로 진행<br>\t\t\t\t\t\t\t\t<br>- 실제 성과를 예산이나 연간 운영 계획과 단순 비교<br>\t\t\t\t\t\t\t\t<br>- 계획과의 차이 강조하지만 대응은 미미한 수준<br>\t\t\t\t\t\t\t<br>\t\t\t\t\t\t\t<br>\t\t\t\t\t\t\t<br>- <br>&#127919; 성과검토의 진정한 목적 <br>\t\t\t\t\t\t\t<br>\t\t\t\t\t\t\t\t<br>- 회사의 전략적 방향 변경 필요성 결정<br>\t\t\t\t\t\t\t\t<br>- 실적 발생 원인을 깊이 조사<br>\t\t\t\t\t\t\t\t<br>- 시정 조치 필요성 판단<br>\t\t\t\t\t\t\t<br>\t\t\t\t\t\t\t<br>\t\t\t\t\t\t<br>\t\t\t\t\t\t<br><br>\t\t\t\t\t\t<br>아무리 잘 짜여진 전략도 시간에 따라 수정 및 Fine tuning 필요<br>\t\t\t\t\t\t<br>비즈니스 성과 검토는 이런 전략적 검토의 필요성을 평가하기에 적합한 자리임<br>\t\t\t\t\t\t<br><br>\t\t\t\t\t\t<br>경영진은 ‘더 나은 전략적 대안을 제시할 만큼 현실이 변화했는가’ 질문<br>\t\t\t\t\t\t<br>Yes - 문제를 재검토<br>\t\t\t\t\t\t<br>No - 경영진은 특정 영역의 노력을 강화하는 한편 ￼       다른 영역은 축소해 회사의 목표에 맞게 성과를 재조정할 수 있다<br>\t\t\t\t\t\t<br><br>\t\t\t\t\t\t<br><br>\t\t\t\t\t\t<br><br>\t\t\t\t\t\t<br><br>\t\t\t\t\t\t<br><br>\t\t\t\t\t\t<br><br>\t\t\t\t\t\t<br><br>\t\t\t\t\t\t<br><br>\t\t\t\t\t\t<br><br>\t\t\t\t\t\t<br><br>\t\t\t\t\t\t<br><br>\t\t\t\t\t\t<br>&#128202; 비즈니스 성과 모니터링<br>\t\t\t\t\t\t<br>\t\t\t\t\t\t\t<br>- <br>&#127970; 암젠 개요 <br>\t\t\t\t\t\t\t<br>\t\t\t\t\t\t\t\t<br>- 330억 달러 규모의 생명공학 선도 기업<br>\t\t\t\t\t\t\t\t<br>- 상위 30명 경영진 참석 월간 운영팀 회의￼- 회사의 전략적 백로그에 대한 약속 사항이 잘 이행되고 있는지 점검<br>\t\t\t\t\t\t\t<br>\t\t\t\t\t\t\t<br>\t\t\t\t\t\t\t<br>- <br>&#128202; 센싱(Sensing) 플랫폼 <br>\t\t\t\t\t\t\t<br>\t\t\t\t\t\t\t\t<br>- 선행 지표와 후행 지표 모두 활용한 성과 추적<br>\t\t\t\t\t\t\t\t<br>-신규 처방전 작성 건수: 제약 매출의 선행 지표<br>\t\t\t\t\t\t\t\t<br>-환자 등록률: 임상 시험 속도 예측 지표<br>\t\t\t\t\t\t\t<br>\t\t\t\t\t\t\t<br>\t\t\t\t\t\t\t<br>- <br>&#128260; 성과 대화 프로세스 표준화 <br>\t\t\t\t\t\t\t<br>\t\t\t\t\t\t\t\t<br>- 성과 대화에 앞서 각 상품, 지역, 기능에 등 주요 지표 및 전략적 백로그 약속 이행 여부 점검<br>\t\t\t\t\t\t\t\t<br>- 실적 저조 영역의 원인 파악 및 Gap closing 해결책 제안<br>\t\t\t\t\t\t\t\t<br>격차가 근본적인 시장 변화나 규제 변화에서 비롯된 경우 <br>\t\t\t\t\t\t\t\t<br>담당 임원은 암젠의 우선순위 의제에 새로운 문제를 추가해 <br>\t\t\t\t\t\t\t\t<br>회사의 입장을 재평가하고, 새로운 대안을 개발하며￼필요에 따라 전략을 수정할 수 있도록 제안<br>\t\t\t\t\t\t\t\t<br>- 성공 사례 강조 및 성공 요인 탐구<br>\t\t\t\t\t\t\t<br>\t\t\t\t\t\t\t<br>\t\t\t\t\t\t\t<br>- <br>&#128200; 성과  <br>\t\t\t\t\t\t\t<br>\t\t\t\t\t\t\t\t<br>- 2013년 블록버스터 의약품 3개 → 2025년 14개<br>\t\t\t\t\t\t\t\t<br>- 12년간 시장 가치 500억 달러 미만 → 1600억 달러 이상으로 3배 성장<br>\t\t\t\t\t\t\t<br>\t\t\t\t\t\t\t<br>\t\t\t\t\t\t<br>\t\t\t\t\t\t<br><br>\t\t\t\t\t\t<br>결언<br>\t\t\t\t\t\t<br>너무 오랫동안 리더들이 전략을 비표준 업무로 취급한 결과￼종종 부정확하거나 시의적절하지 않은 의사 결정 발생<br>\t\t\t\t\t\t<br>&#128295; 체계적 접근방식 필요 <br>\t\t\t\t\t\t<br>- 우선순위를 명확하게 정의<br>\t\t\t\t\t\t<br>- 문제의 원인을 파악할 수 있는 사실 수집<br>\t\t\t\t\t\t<br>- 선택할 수 있는 강력한 옵션 개발<br>\t\t\t\t\t\t<br>- 선택을 명시하고 구체적인 실행 계획 수립<br>\t\t\t\t\t\t<br>- 실행을 체계적으로 추적<br>\t\t\t\t\t\t<br><br>\t\t\t\t\t\t<br>- &#128202; 표준화의 효과 <br>\t\t\t\t\t\t<br>- 모든 부서와 기능이 동일한 접근방식 따를 때<br>\t\t\t\t\t\t<br>경영진이 자신 있게 의사결정을 하위 레벨에 위임 가능<br>\t\t\t\t\t\t<br>- 모든 의사결정의 품질 개선 및 속도 향상되고, 기업이 달성하는 성과가 새로운 차원에 도달 가능<br>\t\t\t\t\t\t<br><br>\t\t\t\t\t\t<br><br>\t\t\t\t\t\t<br><br>\t\t\t\t\t\t<br><br>\t\t\t\t\t\t<br>\t\t\t\t\t\t\t<br>- <br>&#127919; 핵심 메시지 <br>\t\t\t\t\t\t\t<br>\t\t\t\t\t\t\t\t<br>- 전략적 의사결정을 표준 업무로 전환해야 함<br>\t\t\t\t\t\t\t\t<br>- 린 제조방식처럼 전략에도 엄격함과 일관성 필요<br>\t\t\t\t\t\t\t\t<br>- 3가지 요소(우선순위 설정, 지속적 관리, 성과 모니터링) 통합 필요<br>\t\t\t\t\t\t\t<br>\t\t\t\t\t\t\t<br>\t\t\t\t\t\t\t<br>- <br>&#128202; 기대 효과 <br>\t\t\t\t\t\t\t<br>\t\t\t\t\t\t\t\t<br>- 낭비 감소 및 의사결정 속도 향상<br>\t\t\t\t\t\t\t\t<br>- 더 현명한 선택으로 경쟁우위 확보<br>\t\t\t\t\t\t\t\t<br>- 전략 목표 달성률 향상<br>\t\t\t\t\t\t\t<br>\t\t\t\t\t\t\t<br>\t\t\t\t\t\t\t<br>- <br>&#128260; 구현 방향 <br>\t\t\t\t\t\t\t<br>\t\t\t\t\t\t\t\t<br>- 우선순위 명확 정의<br>\t\t\t\t\t\t\t\t<br>- 문제 원인 파악을 위한 사실 수집<br>\t\t\t\t\t\t\t\t<br>- 강력한 선택 옵션 개발<br>\t\t\t\t\t\t\t\t<br>- 명시적 선택과 구체적 실행 계획<br>\t\t\t\t\t\t\t\t<br>- 체계적인 실행 추적<br>\t\t\t\t\t\t\t<br>\t\t\t\t\t\t\t<br>\t\t\t\t\t\t<br>\t\t\t\t\t\t<br><br>\t\t\t\t\t\t<br>\t\t\t\t\t\t\t<br>- 당신의 조직에서 전략적 의사결정 과정은 어떻게 이루어지고 있는가? 린 전략의 3가지 요소 중 어떤 부분이 가장 부족하다고 생각하는가?<br>\t\t\t\t\t\t\t<br>- 구글의 '10배 사고'와 같은 야심찬 성과 목표를 당신의 조직에 적용한다면 어떤 분야에서 10배 개선을 목표로 할 수 있을까?<br>\t\t\t\t\t\t\t<br>- 전략적 의사결정에서 '사실과 대안' 단계의 중요성에 대해 어떻게 생각하는가? 당신의 경험에서 충분한 대안 검토 없이 내려진 결정의 사례가 있는가?<br>\t\t\t\t\t\t\t<br>- 델 테크놀로지의 사례처럼 복잡한 전략적 문제를 여러 개의 구체적인 결정으로 분해하는 접근법을 당신의 업무에 어떻게 적용할 수 있을까?<br>\t\t\t\t\t\t\t<br>- 전략적 의사결정에서 '선택과 약속' 단계가 왜 중요한가? 당신의 조직에서 전략 결정 후 실행이 제대로 이루어지지 않는 이유는 무엇이라고 생각하는가?<br>\t\t\t\t\t\t<br>\t\t\t\t\t\t<br><br>\t\t\t\t\t\t<br>\t\t\t\t\t\t\t<br>- 암젠의 '센싱' 플랫폼처럼 선행 지표와 후행 지표를 함께 활용하는 성과 모니터링 시스템을 당신의 조직에 구축한다면 어떤 지표들을 포함시키겠는가?<br>\t\t\t\t\t\t\t<br>- 전략적 백로그(Strategic Backlog) 개념을 당신의 팀이나 조직에 적용한다면, 현재 가장 우선순위가 높은 3가지 이슈는 무엇일까?<br>\t\t\t\t\t\t\t<br>- 의사결정 캘린더(Decision Calendar)를 활용하여 정기적인 전략 검토 체계를 구축하는 것이 왜 중요한가? 당신의 조직에서는 어떤 주기로 운영하는 것이 적절할까?<br>\t\t\t\t\t\t\t<br>- 린 전략 수립 방식을 도입할 때 예상되는 조직 내 저항 요소는 무엇이며, 이를 어떻게 극복할 수 있을까?<br>\t\t\t\t\t\t\t<br>- 전략을 '표준 업무'로 만드는 것과 전략의 창의성이나 유연성을 유지하는 것 사이의 균형을 어떻게 맞출 수 있을까?<br>\t\t\t\t\t\t<br>\t\t\t\t\t<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>❄️ 전략적 의사결정의 현실 <br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>&#128202; 베인앤드컴퍼니의 350개 대기업 경영진 대상 설문조사 설문조사 결과<br>\t\t\t\t\t<br>&#127981; 제조업의 경우<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>&#128736; 린 전략의 3가지 요소<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>&#128200; 성과 목표 설정<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>✅ 구글의 10배 사고 사례<br>\t\t\t\t\t<br>&#128161; 10배 접근방식이 촉진한 혁신들 <br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>&#128202; 다년도 전망(MYO)과 백로그 구성<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>성과목표(야망) <-> MYO: Gap이 좁다면 성과목표 상향 조정 필요 <br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>❓ 올바른 문제 정의의 중요성 <br>\t\t\t\t\t<br>&#128269; 문제 정의 방식의 예시 <br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>&#128187; 델 테크놀로지 시장 출시 재설계 사례<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t let cards = [];
let moving = null, resizing = null;

function loadBoard() {
  const saved = localStorage.getItem(SAVE_KEY);
  cards = saved ? JSON.parse(saved) : DEFAULT_CARDS.map(c => ({...c}));
  renderCards();
  if (!saved) autoLayout();
}

function autoLayout() {
  const GAP = 14;
  const boardW = document.getElementById('board').offsetWidth;
  const cols = Math.max(1, Math.floor(boardW / 280));
  const colW = (boardW - GAP * (cols - 1)) / cols;
  const colHeights = new Array(cols).fill(0);
  const allCards = document.querySelectorAll('.card');
  const images = document.querySelectorAll('.card img');
  let loaded = 0;
  const total = images.length;

  function place() {
    allCards.forEach((el, i) => {
      const card = cards[i];
      const w = Math.min(card.w || colW, colW);
      let minCol = 0;
      for (let c = 1; c < cols; c++) if (colHeights[c] < colHeights[minCol]) minCol = c;
      card.x = minCol * (colW + GAP);
      card.y = colHeights[minCol];
      card.w = w;
      el.style.left = card.x + 'px';
      el.style.top = card.y + 'px';
      el.style.width = w + 'px';
      colHeights[minCol] = card.y + el.offsetHeight + GAP;
    });
    document.getElementById('board').style.minHeight = Math.max(...colHeights) + 100 + 'px';
    saveBoard();
  }

  if (total === 0) requestAnimationFrame(place);
  else images.forEach(img => {
    if (img.complete) { loaded++; if (loaded >= total) requestAnimationFrame(place); }
    else img.onload = img.onerror = () => { loaded++; if (loaded >= total) requestAnimationFrame(place); };
  });
}

function syncText() {
  document.querySelectorAll('.card').forEach(el => {
    const idx = +el.dataset.idx;
    if (cards[idx]?.type === 'text') {
      const t = el.querySelector('.text');
      if (t) cards[idx].content = t.innerHTML;
    }
  });
}

function saveBoard() {
  syncText();
  localStorage.setItem(SAVE_KEY, JSON.stringify(cards));
  document.getElementById('status').textContent = '저장됨 ' + new Date().toLocaleTimeString();
}

function renderCards() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  cards.forEach((card, i) => {
    const el = document.createElement('div');
    el.className = 'card';
    el.dataset.idx = i;
    if (card.x !== undefined) el.style.left = card.x + 'px';
    if (card.y !== undefined) el.style.top = card.y + 'px';
    if (card.w) el.style.width = card.w + 'px';

    el.addEventListener('mousedown', e => {
      if (e.target.closest('.text, a, .card-btn, .resize-handle, table')) return;
      e.preventDefault();
      moving = { idx: i, startX: e.clientX, startY: e.clientY, origX: card.x || 0, origY: card.y || 0 };
      el.classList.add('moving');
    });

    const actions = document.createElement('div');
    actions.className = 'card-actions';
    const delBtn = document.createElement('button');
    delBtn.className = 'card-btn'; delBtn.textContent = '×';
    delBtn.onclick = e => { e.stopPropagation(); if (confirm('삭제?')) { cards.splice(i, 1); renderCards(); saveBoard(); } };
    actions.appendChild(delBtn);
    el.appendChild(actions);

    if (card.type === 'text') {
      const text = document.createElement('div');
      text.className = 'text';
      text.contentEditable = true;
      text.innerHTML = card.content || '';
      text.addEventListener('blur', () => { card.content = text.innerHTML; saveBoard(); });
      el.appendChild(text);
    } else if (card.type === 'image') {
      const src = card.src.startsWith('http') || card.src.startsWith('data:') ? card.src : IMG_BASE + card.src;
      const img = document.createElement('img');
      img.src = src;
      img.alt = card.alt || '';
      img.loading = 'lazy';
      img.onerror = () => img.style.display = 'none';
      if (card.link) {
        const a = document.createElement('a'); a.href = card.link; a.target = '_blank';
        a.appendChild(img); el.appendChild(a);
      } else { el.appendChild(img); }
      if (card.caption) {
        const cap = document.createElement('div');
        cap.className = 'caption';
        cap.textContent = card.caption;
        el.appendChild(cap);
      }
    } else if (card.type === 'table') {
      const wrapper = document.createElement('div');
      wrapper.style.overflowX = 'auto';
      wrapper.innerHTML = card.html || '';
      el.appendChild(wrapper);
    }

    const rh = document.createElement('div');
    rh.className = 'resize-handle';
    rh.addEventListener('mousedown', e => {
      e.preventDefault(); e.stopPropagation();
      resizing = { idx: i, startX: e.clientX, startW: card.w || el.offsetWidth };
    });
    el.appendChild(rh);
    board.appendChild(el);
  });

  requestAnimationFrame(() => {
    let maxBottom = 0;
    document.querySelectorAll('.card').forEach(el => {
      const b = (parseFloat(el.style.top) || 0) + el.offsetHeight;
      if (b > maxBottom) maxBottom = b;
    });
    board.style.minHeight = (maxBottom + 100) + 'px';
  });
}

document.addEventListener('mousemove', e => {
  if (moving) {
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`);
    if (!el) return;
    const nx = moving.origX + e.clientX - moving.startX;
    const ny = moving.origY + e.clientY - moving.startY;
    el.style.left = nx + 'px';
    el.style.top = ny + 'px';
  }
  if (resizing) {
    const card = cards[resizing.idx];
    card.w = Math.max(100, resizing.startW + e.clientX - resizing.startX);
    const el = document.querySelector(`.card[data-idx="${resizing.idx}"]`);
    if (el) el.style.width = card.w + 'px';
  }
});

document.addEventListener('mouseup', e => {
  if (moving) {
    const card = cards[moving.idx];
    card.x = Math.max(0, moving.origX + e.clientX - moving.startX);
    card.y = Math.max(0, moving.origY + e.clientY - moving.startY);
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`);
    if (el) { el.classList.remove('moving'); }
    moving = null; saveBoard();
  }
  if (resizing) { resizing = null; saveBoard(); }
});

function addTextCard() {
  cards.push({ type: 'text', content: '', x: 50, y: window.scrollY + 100, w: 300 });
  renderCards();
  setTimeout(() => { const els = document.querySelectorAll('.card .text'); els[els.length - 1]?.focus(); }, 100);
}

function addImageCard() {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = 'image/*';
  input.onchange = e => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = () => { cards.push({ type: 'image', src: reader.result, x: 50, y: window.scrollY + 100, w: 240 }); renderCards(); saveBoard(); };
    reader.readAsDataURL(file);
  };
  input.click();
}

function resetLayout() {
  if (!confirm('자동 재배치합니다. 현재 위치가 변경됩니다.')) return;
  cards.forEach(c => { delete c.x; delete c.y; });
  renderCards(); autoLayout();
}

setInterval(saveBoard, 30000);
loadBoard();
</script>
</body>
