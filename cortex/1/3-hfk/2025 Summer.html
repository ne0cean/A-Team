\t\t\t\t<br>&#128202; 가치곡선을 이용한 관계 결정<br>\t\t\t\t\t<br>&#128200; 가치곡선 작성 방법<br>\t\t\t\t\t<br>&#128176; 각 상호작용 유형의 가치 (상호작용당 평균 수익) 계산 &#128290; 해당 유형의 상호작용 총 횟수를 곱함 &#128202; 가치를 가장 큰 것부터 가장 작은 것까지 순서대로 나열<br>\t\t\t\t\t<br>&#127919; 관계 유형별 전략<br>\t\t\t\t\t<br>&#127968; 소유 (가치곡선 맨 위)<br>\t\t\t\t\t<br>\t\t\t\t\t\t<br>- 가장 가치 있거나 빈도가 높은 상호작용<br>\t\t\t\t\t\t<br>- 아키텍처, 거버넌스 규칙, 사용자 데이터를 완벽하게 제어<br>\t\t\t\t\t<br>\t\t\t\t\t<br>&#129309; 파트너 (가치곡선 중간)<br>\t\t\t\t\t<br>\t\t\t\t\t\t<br>- 아키텍처, 거버넌스, 데이터에 대한 통제권을 공유<br>\t\t\t\t\t<br>\t\t\t\t\t<br>&#128279; 제휴 (가치곡선 꼬리 부분)<br>\t\t\t\t\t<br>\t\t\t\t\t\t<br>- 당장은 적은 가치이지만 실험의 비옥한 토양<br>\t\t\t\t\t<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>&#127775; 텐센트의 가치곡선 전략<br>\t\t\t\t\t<br>&#128260; 제휴사에서 파트너로 승격<br>\t\t\t\t\t<br>&#128200; 처음에 플랫폼의 꼬리 부분 상호작용에 속했던 기업들 &#128640; 메이퇀과 핀둬둬를 파트너십 상태로 승격<br>\t\t\t\t\t<br>&#127757; 핀둬둬의 글로벌 성공<br>\t\t\t\t\t<br>&#128722; 나중에 테무를 출시 &#127760; 텐센트가 어려움을 겪었던 분야에서 세계적인 성공 &#128200; 텐센트에 미개척 성장의 길 제공<br>\t\t\t\t\t<br>&#128176; 성과<br>\t\t\t\t\t<br>&#128202; 단 12년 만에 시장 가치 80억 달러 → 4000억 달러 성장<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>&#127970; 엔터프라이즈 소프트웨어의 가치곡선 활용<br>\t\t\t\t\t<br>&#128736;️ 서비스나우와 세일즈포스 전략<br>\t\t\t\t\t<br>&#128295; 개발자 도구, API, 앱 스토어를 소프트웨어에 통합 &#128101; 개발자 제휴사(종종 자체 고객)가 플랫폼 앱 교환을 통해 직접 개선 사항 판매<br>\t\t\t\t\t<br>&#128176; 높은 가치 상호작용 전략<br>\t\t\t\t\t<br>&#127959;️ 핵심 자산을 구축하거나 인수<br>\t\t\t\t\t<br>\t\t\t\t\t\t<br>- 세일즈포스: 데이터닷컴과 슬랙 인수<br>\t\t\t\t\t<br>\t\t\t\t\t<br>&#128200; 성과<br>\t\t\t\t\t<br>&#128142; 서비스나우 앱 스토어 가치: 59억 달러 &#127942; 세일즈포스 앱익스체인지 가치: 220억 달러<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>&#127912; 매력적인 테마 정의하기<br>\t\t\t\t\t<br>&#128260; 그루폰 vs 메이퇀 비교<br>\t\t\t\t\t<br>&#128197; 그루폰: 2년 먼저 시작한 공동 구매 플랫폼 &#127919; 메이퇀: 더 광범위하지만 일관된 테마 설정<br>\t\t\t\t\t<br>&#127978; 메이퇀의 확장 전략<br>\t\t\t\t\t<br>&#127919; 지역 상품과 서비스, 주문형 배달이라는 테마 &#127829; 공동 구매 → 음식 배달, 식료품, 도매 용품 &#128690; 자전거 공유, 엔터테인먼트, 여행 등으로 확장 &#128221; 뎬핑(중국판 옐프) 인수로 리뷰 시스템 추가<br>\t\t\t\t\t<br>&#128202; 성과 비교<br>\t\t\t\t\t<br>&#128200; 메이퇀의 사용자당 참여도: 그루폰의 최소 4배 이상 &#128176; 시장 가치: 그루폰보다 150배 더 큼<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>&#128640; 슈퍼 앱으로의 발전<br>\t\t\t\t\t<br>&#127919; 슈퍼 앱의 정의<br>\t\t\t\t\t<br>&#128241; 수많은 관련된 상호작용에 대한 단일 액세스 포인트를 제공하는 플랫폼<br>\t\t\t\t\t<br>&#127969; 롄자 (부동산 슈퍼 앱)<br>\t\t\t\t\t<br>&#127968; 부동산 시장과 리노베이션, 유지보수, 모기지 등의 서비스 결합 &#127482;&#127480; 미국의 질로, 레드핀, 안기, 로켓 모기지 서비스를 통합한 형태<br>\t\t\t\t\t<br>&#128663; 미국의 슈퍼 앱 기회<br>\t\t\t\t\t<br>&#128665; 자동차 서비스 슈퍼 앱<br>\t\t\t\t\t<br>\t\t\t\t\t\t<br>- 차량 구매, 금융, 보험, 유지보수, 수리 통합<br>\t\t\t\t\t<br>\t\t\t\t\t<br>&#128149; 데이트 앱 확장<br>\t\t\t\t\t<br>\t\t\t\t\t\t<br>- 매칭 + 관계 상담, 미용 서비스, 이벤트 예약, 안전 확인 기능<br>\t\t\t\t\t<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>&#127757; 초대형 앱의 진화<br>\t\t\t\t\t<br>&#128241; 위챗의 변화<br>\t\t\t\t\t<br>&#128172; 소셜미디어 사이트 → 상품과 서비스의 광범위한 시장<br>\t\t\t\t\t<br>&#127470;&#127465; 고젝의 확장<br>\t\t\t\t\t<br>&#128757; 배달 서비스 → 차량 서비스, 의료 서비스, 엔터테인먼트로 확장<br>\t\t\t\t\t<br>&#127919; 성공 요인<br>\t\t\t\t\t<br>&#127775; 다양성과 편리함이라는 테마 수용 &#128260; 중앙 집중식 탐색, 메시지, 결제 시스템 &#128717;️ 원스톱 쇼핑 경험 제공 &#128279; 플랫폼 간 네트워크 효과 촉진<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>&#128221; 내용 요약<br>\t\t\t\t\t<br>&#127919; 핵심 메시지<br>\t\t\t\t\t<br>&#128200; 플랫폼은 성장을 추구할 때 종종 눈앞에 있는 기회를 간과한다<br>\t\t\t\t\t<br>&#128273; 성공의 열쇠<br>\t\t\t\t\t<br>&#127912; 명확한 비전을 정의하고 설명된 기술을 활용 &#128101; 사이드와의 상호작용을 확장 &#128161; 상당한 성장 잠재력을 발휘 가능<br>\t\t\t\t\t<br>&#128640; 4가지 성장 메커니즘<br>\t\t\t\t\t<br>1️⃣ 참여 늘리기 2️⃣ 새로운 상호작용 추가 3️⃣ 새로운 사이드 추가 4️⃣ 상호작용과 사이드 동시 추가<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>&#128173; 토론 질문 1-5<br>\t\t\t\t\t<br>\t\t\t\t\t\t<br>- 우리 조직에서 플랫폼 비즈니스 모델을 도입할 수 있는 영역은 어디이며, 어떤 사이드와 상호작용을 우선적으로 고려해야 할까요?<br>\t\t\t\t\t\t<br>- 텐센트와 구글의 성장 전략 차이를 보면서, 우리 회사가 파트너십보다 자체 개발을 선호하는 이유는 무엇이고 이것이 항상 최선의 선택일까?<br>\t\t\t\t\t\t<br>- 가치곡선을 활용한 소유-파트너-제휴 전략에서, 우리가 현재 소유하고 있는 것 중 파트너십으로 전환하면 더 큰 성장을 이룰 수 있는 영역은 무엇일까?<br>\t\t\t\t\t\t<br>- 메이퇀과 그루폰의 사례에서 보듯 '매력적인 테마'의 중요성을 확인할 수 있는데, 우리 사업에서 더 광범위하고 일관된 테마를 설정한다면 어떤 것이 될까?<br>\t\t\t\t\t\t<br>- 벤모와 캐시 앱의 경쟁에서 보듯 참여 기능의 적시 도입이 중요한데, 우리가 놓치고 있는 사용자 참여 증대 기회는 무엇일까?<br>\t\t\t\t\t<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>&#128173; 토론 질문 6-10<br>\t\t\t\t\t<br>\t\t\t\t\t\t<br>- 우버가 단순한 차량 호출에서 종합 배달 플랫폼으로 확장한 것처럼, 우리 핵심 서비스를 중심으로 어떤 보완적 서비스들을 추가할 수 있을까?<br>\t\t\t\t\t\t<br>- 인튜이트가 처음엔 개발자 접근을 제한했다가 나중에 개방했듯이, 우리가 과도하게 통제하고 있어서 혁신 기회를 막고 있는 영역은 없을까?<br>\t\t\t\t\t\t<br>- 알디오의 실패 사례에서 보듯 핵심 서비스가 안정화되기 전 과도한 확장의 위험이 있는데, 우리의 현재 확장 계획은 적절한 타이밍일까?<br>\t\t\t\t\t\t<br>- 텐센트가 제휴사를 파트너로 승격시키며 성장한 것처럼, 우리와 현재 느슨한 관계에 있는 파트너 중 더 긴밀한 협력으로 발전시킬 수 있는 곳은 어디일까?<br>\t\t\t\t\t\t<br>- 슈퍼 앱이나 초대형 앱으로의 진화를 고려할 때, 우리가 중앙 집중식으로 통합할 수 있는 핵심 인프라(결제, 메시지, 탐색 등)는 무엇일까?<br>\t\t\t\t\t<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>\t\t\t\t<br>\t\t\t\t<br>\t\t\t\t\t<br>혁신<br>\t\t\t\t\t<br>혁신은 우연에서부터… ‘세렌디피티’ 만들기<br>\t\t\t\t\t<br><a href=\"https://www.hbrkorea.com/article/author/wno/3513\" target=\"_blank\">제롬 바르텔레미(Jerome Barthelemy)</a>,<a href=\"https://www.hbrkorea.com/article/author/wno/3862\" target=\"_blank\">니콜라 모티스(Nicolas Mottis)</a><br>\t\t\t\t\t<br>2025. 6. 16.<br>\t\t\t\t\t<a href=\"https://www.hbrkorea.com/upload_dir/source/HBR_Daily/May25_13_KikiLjung.jpg\" target=\"_blank\">\t\t\t\t\t\t\t\t\t\t\t</a><br><br>\t\t\t\t\t<br>1990년대 후반 이후 3000만 명이 넘는 사람이 라식LASIK이라 불리는 시력교정수술의 혜택을 받아왔다. 라식이 등장하기 전에는 외과의들이 메스를 사용해 각막을 절개하고 환자의 시력 개선을 위해 각막 형태를 재구성했다. 그러나 이 과정에서 주변 눈 조직에 상당한 손상이 발생하곤 했다. 라식은 메스 대신 펨토초 레이저를 사용한다. 이 레이저는 단 1펨토초(1000조분의 1초) 동안 강력한 빛의 펄스를 방출하며 이를 통해 외과의들은 매우 정밀한 절개를 수행하고 주변 조직에 손상을 주지 않는다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>여기에 사용된 ‘체프 펄스 증폭&#160;CPA•Chirped Pulse Amplification’ 기술은 1980년대 중반 프랑스 물리학자 제라르 무루Gerard Mourou에 의해 개발됐다. 그는 이 공로로 도나 스트릭랜드Donna Strickland와 함께 2018년 노벨물리학상을 공동 수상했다. 하지만 CPA로 생성된 펨토초 레이저를 안과 분야에 적용하겠다는 아이디어는 전적으로 ‘우연한 발견’에서 비롯됐다. 이는 단순한 우연이라기보다는 주로 의도되지 않은 방식으로 일어나는 것으로 사회학자&#160;<a href=\"https://en.wikipedia.org/wiki/Robert_K._Merton\" target=\"_blank\">로버트 K. 머튼</a>Robert K. Merton은 세렌디피티serendipity를 “누군가가 처음부터 찾고 있던 것은 아니지만 우연이나 통찰을 통해 발견하는 것”이라고 설명한 바 있다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>세렌디피티가 작동하는 세 가지 단계<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>세렌디피티는 종종 ‘운luck’과 혼동되지만 사실은 세 단계로 이뤄진 하나의 과정이다. 라식의 사례를 통해 그 과정을 살펴보자.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>1. 예기치 않은 사건이 발생한다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>1993년 미시간대에 있는 무루Mourou의 연구실에서 여러 대학원생이 함께 연구를 진행하고 있었다. 다타오 두Detao Du도 그중 한 사람이었다. 어느 날 저녁 그는 펨토초 레이저의 거울을 조정하던 중 안전 안경을 착용하는 것을 깜빡했다. 그때 레이저빔이 실수로 그의 눈에 닿았다. 두는 즉시 눈에 손상이 없는지 확인하기 위해 병원으로 이송돼 갔다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>2. 누군가가 그 예기치 않은 사건에서 가치를 발견한다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>두가 병원에 도착하자 당시 당직이었던 안과의사 론 커츠Ron Kurtz가 그를 진찰했다. 그의 눈에는 다행히 손상이 없었지만 커츠는 그의 망막에서 몇 가지 이상한 화상을 발견했다. 커츠는 당시를 이렇게 회상한다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>“그의 눈을 진찰하려고 눈동자를 크게 벌어지게 했을 때 제가 본 것은… 망막의 중심부에 생긴 화상이었습니다. 그런데 이 화상들은 아주 작고 매우 정밀하다는 점에서 독특했죠. 나는 이 레이저가 어떤 종류인지 궁금해졌고 그 과정을 통해 펨토초 레이저에 대해 알게 됐습니다.”<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>3. 그 우연한 기회를 활용한다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>두를 진찰한 직후 커츠는 무루를 만나게 된다. 그는 무루의 연구팀에 합류해 펨토초 레이저를 안과에 응용할 수 있는 가능성에 대해 연구하기 시작했다. 1년 후 커츠와 두는 그들의 연구 결과를 학술회의에서 발표했다. 그 자리에 티보르 유하스Tibor Juhasz도 참석해 있었다. 당시 그는 피코초(1조 분의 1초) 레이저를 안과 수술에 적용하는 방안을 연구 중인 한 회사의 컨설턴트로 활동하고 있었다. 그러나 그 기술은 제대로 작동하지 않았다. 펄스의 지속 시간이 너무 길어 눈 조직에 많은 손상을 입혔기 때문이다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>유하스는 펨토초 레이저의 잠재력을 즉시 알아봤다. 그는 당시를 이렇게 회상한다. “론 커츠가 펨토초 레이저 펄스를 활용한 자신의 연구 결과에 대해 발표했는데… 피코초 레이저에서 문제가 됐던 모든 것이 펨토초를 사용하면 극복될 수 있다는 점을 보여줬죠.”<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>학회 이후 무루는 유하스에게 자신의 팀에 합류해 달라고 요청했다. 그는 또한 미시간대, 미국 국립보건원(NIH), 미국 국립과학재단(NSF)을 설득해 추가 연구 자금도 확보했다. 이후 커츠와 유하스는 공동으로 회사를 설립했고 2001년 안과용 펨토초 레이저를 세계 최초로 상용화했다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>유하스는 창업 초기 당시를 이렇게 회상한다. “업계 사람들은 처음에는 이 개념이 실제로 작동할지에 대해 매우 회의적이었어요.” 하지만 그의 끈기는 결국 결실을 맺었다. 2007년 그 회사는 한 의료 광학 기업에 8억 달러 이상에 인수됐다. 현재는 존슨앤드존슨 비전Johnson & Johnson Vision에 소속돼 있다. 그리고 이야기는 거기서 끝나지 않았다. 시력교정수술을 개발한 이후 커츠와 유하스는 펨토초 레이저를 활용한 백내장 수술 기법도 함께 개발했다. 최근 들어 유하스는 같은 기술을 활용해 녹내장을 치료하는 새로운 스타트업도 설립했다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>기업이 ‘세렌디피티’를 활용하는 법<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>세렌디피티는 수백 년 전부터 존재해 온 개념이며 수많은 과학적 발견을 이끌어왔다. 예를 들어 알렉산더 플레밍Alexander Fleming은&#160;<a href=\"https://www.healio.com/news/endocrinology/20120325/penicillin-an-accidental-discovery-changed-the-course-of-medicine#:~:text=Penicillin%20discovered,Mary's%20Hospital%20in%20London.\" target=\"_blank\">독감 연구를 하던 중</a>&#160;우연히 페니실린을 발견했다. 또 화이자의 과학자들은&#160;<a href=\"https://www.theguardian.com/lifeandstyle/2017/jul/11/from-viagra-to-valium-the-drugs-that-were-discovered-by-accident\" target=\"_blank\">혈압약을 개발하던 중</a>&#160;발기부전 치료제를 발견했다. 하지만 과학자들과 달리 기업의 리더나 관리자들은 세렌디피티를 쉽게 받아들이려 하지 않는다. 어느 정도는 그럴 만한 이유가 있다. 세렌디피티는 예측 불가능하기 때문에 기업이 혁신의 수단으로 전적으로 의존할 수는 없다. 무엇보다 기업은 대학과는 매우 다르다. 그들의 존재 이유는 과학을 발전시키는 것이 아니라 이윤을 창출하고 성장하는 데 있다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>그럼에도 불구하고 우리는 더 많은 기업이 세렌디피티의 혜택을 많이 누릴 수 있다고 믿는다. 아래는 경영자들이 세렌디피티를 효과적으로 활용하기 위해 참고할 수 있는, 과학에서 영감을 받은 세 가지 전략이다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>1. 예기치 않은 일에 열린 마음을 가져라<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>과학자들의 특징 중 하나는 예상치 못한 상황에 열려 있다는 점이다. 펨토초 레이저 이야기에서 커츠는 두의 망막에서 발견한 특이한 화상에 즉시 흥미를 느꼈다. 그는 그 화상이 어디에서 비롯된 것인지 알고 싶어 했다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>기업의 관리자들 중에도 이와 비슷하게 예기치 않은 일을 의미 있게 받아들이는 통찰력을 가진 경우가 있다. 1970년대 초 버나드 새도우Bernard Sadow는 카리브해에서 휴가를 마치고 돌아오던 중이었다. 공항의 세관 환승 구역에서 그는 우연히 한 직원이 바퀴 달린 받침대에 무거운 기계를 실어 밀고 가는 모습을 봤다. 그는 자신의 무거운 여행 가방을 바라보며 이렇게 생각했다. ‘지금 우리에게 필요한 건 바로 저거야. 가방에 바퀴를 다는 거지.’ 그렇게 해서&#160;<a href=\"https://invention.si.edu/invention-stories/roll-aboard\" target=\"_blank\">바퀴 달린 여행 가방rolling suitcase이 탄생했다.</a><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>비즈니스 세계에서 관리자들은 일상적인 업무에 지나치게 집중한 나머지 종종 뜻밖의 놀라운 순간들을 놓치곤 한다. 새도우가 바퀴 달린 여행 가방 아이디어를 떠올렸을 당시 그는 한 여행 가방 회사에서 일하고 있었다. 만약 그가 휴가가 아닌 출장 중이었다면 공항에서 직원이 무거운 기계를 옮기는 모습을 눈여겨볼 여유도 없었을 것이고, 그 장면에서 바퀴 달린 여행 가방을 착안하는 연결고리를 떠올릴 여유도 없었을 것이다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>이처럼 예상치 못한 상황에 대한 열린 마음을 키우기 위해 경영진은 팀원들이 자신이 발견한 뜻밖의 관찰이나 사례를 정기적으로 공유하도록 독려해야 한다. 처음에는 다소 회의적인 반응이 나올 수 있다. 하지만 일단 이상 징후나 예외적인 상황을 추적하기 시작하면 이를 포착하는 능력은 점점 향상된다. 사람들이 ‘예상 밖의 일’을 관찰해야 한다는 기대를 인식하게 되면 그에 더 민감하고 주의 깊어지기 마련이다. 시간이 지남에 따라 이러한 습관이 자리 잡게 되면 기업은&#160;<a href=\"https://philarchive.org/archive/NGUSAA\" target=\"_blank\">예기치 못한 기회를 포착하고 대응하는 역량을 더욱 강화할 수 있다.</a><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>하이얼Haier은 이를 보여주는&#160;<a href=\"https://medium.com/@davidsehyeonbaek/from-mediocre-to-major-the-inspiring-growth-story-of-haier-a-global-player-8e987544ed38\" target=\"_blank\">대표적인 사례다.</a>&#160;1990년대 중국의 농민들이 세탁기가 자꾸 고장 난다며 하이얼의 고객서비스센터에 반복적으로 연락을 해왔다. 서비스팀은 곧 농민들이 세탁기를 시장에 내다 팔 감자를 씻는 데 사용하고 있다는 사실을 알아냈다. 하이얼은 이러한 불만을 무시하는 대신 그 안에서 기회를 포착했고 결국 감자 세척에 특화된 완전히 새로운 세탁기 제품군을 개발했다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>2. 다양한 부서의 상호 교류를 촉진하라<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>세렌디피티의 핵심에는 바로 다양한 분야의 상호작용Cross-disciplinary interaction이 있다. 서로 다른 배경과 기술을 가진 사람들이 모이면 다양한 관점의 교류를 통해 예상치 못한 연결이 만들어지고 이는 새로운 기회로 이어질 수 있다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>2022년 펨토초 레이저의 주역들인 무루, 스트릭랜드, 커츠, 유하스, 두는 모두 ‘골든 구스 어워드Golden Goose Award’를 수상했다. 이 상은 연방 정부의 지원을 받은 과학 연구 중에서 예상치 못한 혁신을 이뤄 사회에 큰 영향을 미친 성과를 기린다. 만약 물리학자들과 안과 전문의들의 전문성이 결합되지 않았다면 펨토초 레이저를 이용한 시력교정수술은 존재하지 않았을 것이다. 물리학자들은 펨토초 레이저의 실용적 활용처를 오랫동안 찾고 있었지만 획기적인 아이디어를 떠올리지 못하고 있었다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>기업 내에는 다양한 전문성을 가진 직원들이 각기 다른 부서에 흩어져 있는 경우가 많다. 이로 인해 자연스럽게 다분야 간 협업이 이뤄지기는 쉽지 않다. 직원들이 일상 속에서 자발적으로 교류할 수 있도록 하려면 서로 쉽게 연결될 수 있는 공간을 의도적으로 설계할 필요가 있다. 애플의 공동 창업자이자 유명한 혁신가인 스티브 잡스Steve Jobs는 픽사Pixar&#160;본사의 공간 설계와 관련해 이렇게&#160;<a href=\"https://www.zdnet.com/article/steve-jobs-said-silicon-valley-needs-serendipity-but-is-it-even-possible-in-a-zoom-world/\" target=\"_blank\">주장</a>한 바 있다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>“요즘처럼 네트워크가 발달한 시대에는 이메일이나 아이챗iChat만으로도 아이디어를 발전시킬 수 있다고 생각하기 쉽지만 그건 말도 안 되는 얘기예요. 창의성은 우연한 만남, 예상치 못한 대화에서 비롯됩니다. 복도에서 누군가를 마주치면 ‘무슨 일 하고 있어요?’라고 물어보고 ‘우와, 대단하네요’라고 말하다 보면 어느새 수많은 아이디어가 쏟아져 나오죠.”<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>스티브 잡스의 이러한 철학을 따라 많은 기업이 우연한 만남과 협업을 장려할 수 있도록 본사 공간을 설계하고 있다. 대표적인 사례가 엔비디아Nvidia다. 이 회사는 미국 샌타클래라에 있는 엔데버Endeavor(2018)와 보이저Voyager(2022) 사옥을 통해 ‘대면 만남의 메카Mecca of physical meet-ups로&#160;<a href=\"https://www.zdnet.com/article/steve-jobs-said-silicon-valley-needs-serendipity-but-is-it-even-possible-in-a-zoom-world/\" target=\"_blank\">불릴 만큼</a>&#160;주목받고 있다. 이 건물들은 개방형 보행로, 중앙 광장, 계단식 플랫폼 등 다양한 공간 구성을 통해 우연한 마주침과 즉흥적인 협업이 자연스럽게 일어나도록 설계돼 있다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>업무 환경에서는 다양한 배경을 가진 직원들 사이에 우연한 대화나 자연스러운 상호작용을 통해 관계가 형성되는 경우가 많다. 그러나 하이브리드나 원격 근무 환경에서는 이러한 비공식적인 팀 간 교류가 훨씬 드물다. 그래서 관리자가&#160;<a href=\"https://hbr.org/podcast/2025/04/navigating-the-hybrid-work-dilemma\" target=\"_blank\">부서 간 협업</a>(또는 다분야 간 협력)을 의도적으로 장려하는 것이 중요하다. 그 방식은 다양할 수 있다. 예를 들어 어떤 직원은 다른 팀의 회의에 참여해 자신의 인사이트를 공유하거나 피드백을 제공할 수 있다. 반대로 다른 팀과의 협업을 위해 세션을 주도하도록 요청받아 새로운 관점을 제시할 수도 있다. 또는 관리자가 단기 프로젝트를 위해 다 부서 팀cross-functional team을 구성해 부서 간 협업이 일어나도록 지원할 수도 있다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>기업은 외부 전문 네트워크의 잠재력도 적극 활용해야 한다. 이를 위해 직원들이 산업 협회 활동에 참여하도록 장려하고 직접적인 업무 분야를 넘는 학회나 콘퍼런스에도 참여할 수 있도록 지원해야 한다. 또한 퇴직자들과의 교류를 유지하는 기업 동문 네트워크alumni networks&#160;역시 예기치 못한 인사이트와 기회의 중요한 원천이 될 수 있다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>3. ‘실험’을 조직문화의 핵심으로 심어라.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>실험은 과학에서 핵심적인 역할을 하며 비즈니스에서도 주요 혁신을 이끄는 동력이 된다. 예를 들어 잉크젯 프린터는 한 번의 실패한 실험에서 비롯됐다. 1970년대 후반 캐논Canon은&#160;<a href=\"https://www.econstor.eu/bitstream/10419/78993/1/756552206.pdf\" target=\"_blank\">새로운 인쇄 기술을 탐색하고</a>&#160;있었다. 이 일본 기업은 잉크젯 프린팅이 특히 유망한 기술이라고 판단하고 이를 개발하기 위해 소규모 팀을 구성했다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>어느 날 실험 도중 한 직원이 실수로 납땜인두를 잉크가 들어 있는 주사기 끝에 갖다 댔다. 놀랍게도 그 열로 인해 주사기 바늘에서 잉크가 분사됐다. 그는 즉시 잉크를 분사시키는 데 압력이 아닌 열을 활용할 수 있다는 사실을 깨달았다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>기업은 직원들이 소규모 실험을 자율적으로 시도할 수 있도록 권한을 부여할 때 세렌디피티, 즉 우연한 발견의 기회를 더 많이 얻을 수 있다. 물론 이러한 실험 중 일부는 실패할 수도 있다. 그러나 실패했다고 해서 그것이 무의미한 것은 아니다. 실패처럼 보이는 경험이 예기치 못한 돌파구를 여는 첫걸음이 될 수도 있기 때문이다. 다만 비즈니스 환경에서는 실험 문화가 자리 잡기 위해 최고경영진의 강력한 지지가 반드시 필요하다. 경영진은 실험의 가치를 인정하고 그것이 혁신과 성공을 이끄는 중요한 과정임을 적극적으로 뒷받침해야 한다. 그렇지 않을 경우 직원들은 결국 실패할지도 모를 실험에 쉽게 도전하지 못할 것이다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>캐논 경영진은 잉크젯 프린팅 팀에 자유롭게 실험할 수 있는 권한을 부여했다. 우리가 알고 있는 잉크젯 프린터는 우연한 사고에서 시작됐지만 그 가능성이 분명해지자마자 경영진의 전폭적인 지지를 받게 됐다. 만약 이러한 지원이 없었다면 캐논의 가장 상징적인 제품은 세상에 나오지 못했을지도 모른다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>세렌디피티는 과학 분야에서는 매우 중요하게 여겨지지만 비즈니스에서는 종종 과소평가되거나 그저 운으로 취급되곤 한다. 그 결과 많은 관리자가 세렌디피티의 가능성에 스스로 마음을 열지 않는다. 이는 안타까운 일이다. 왜냐하면 이는 그들이 수많은 기회를 놓치고 있을지도 모른다는 것을 의미하기 때문이다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>원문 |&#160; <a href=\"https://hbr.org/2025/05/to-drive-innovation-create-the-conditions-for-serendipity\" target=\"_blank\">https://hbr.org/2025/05/to-drive-innovation-create-the-conditions-for-serendipity</a><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><a href=\"https://hbr.org/search?term=Jerome%20Barthelemy&search_type=search-all\" target=\"_blank\">제롬 바르텔레미</a>는 프랑스 ESSEC 경영대학원의 전략 및 경영 교수이며 전직 부총장으로서 경력자 대상 교육 과정Post Experience Programs, 기업 맞춤형 프로그램 및 대외 협력Corporate Programs & Relations을 총괄한 바 있다. 그는 ‘전략의 신화들Myths of Strategy’(코건 페이지, 2023년)’의 저자이기도 하다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><a href=\"https://hbr.org/search?term=Nicolas%20Mottis&search_type=search-all\" target=\"_blank\">니콜라 모티스</a>는 프랑스 에콜 폴리테크니크Ecole Polytechnique의 교수다. 그의 연구 분야는 성과 관리, 지속가능 금융, 혁신 경영에 중점을 두고 있다. 그는 이 분야에서 여러 권의 저서와 다수의 학술 및 실무 관련 논문을 발표한 바 있다. 또한 국경없는의사회 재단Doctors Without Borders Foundation의 회장을 맡고 있다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>에디팅&#160;이정흔<br>\t\t\t\t\t<br><br>\t\t\t\t\t출처: <<a href=\"https://www.hbrkorea.com/article/view/atype/di/category_id/5_1/article_no/1389/page/2\" target=\"_blank\">https://www.hbrkorea.com/article/view/atype/di/category_id/5_1/article_no/1389/page/2</a>> <br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>\t\t\t\t\t<br>&#128161; 혁신은 우연에서부터… '세렌디피티' 만들기 총 슬라이드 수: 22장<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>&#128203; 원문 정보 저자: 제롬 바르텔레미(Jerome Barthelemy), 니콜라 모티스(Nicolas Mottis) 출처: 하버드 비즈니스 리뷰 2025. 6. 16. 분야: 혁신 원문 제목: 혁신은 우연에서부터… '세렌디피티' 만들기 원문 링크: <a href=\"https://hbr.org/2025/05/to-drive-innovation-create-the-conditions-for-serendipity\" target=\"_blank\">https://hbr.org/2025/05/to-drive-innovation-create-the-conditions-for-serendipity</a><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>&#127959;️ 아티클 구조 &#128214; 라식 수술의 탄생 사례 • 우연한 발견에서 시작된 혁신 &#128269; 세렌디피티가 작동하는 세 가지 단계 • 1단계: 예기치 않은 사건 발생 • 2단계: 가치 발견 • 3단계: 기회 활용 &#127970; 기업이 세렌디피티를 활용하는 법 • 1단계: 예기치 않은 일에 열린 마음 • 2단계: 다양한 부서의 상호 교류 촉진 • 3단계: 실험을 조직문화의 핵심으로<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>&#128214; 라식 수술의 탄생 배경 &#128300; 기존 시력교정수술의 한계 • 외과의들이 메스를 사용해 각막을 절개 • 각막 형태를 재구성하여 시력 개선 • 주변 눈 조직에 상당한 손상 발생 ⚡ 라식의 혁신 • 메스 대신 펨토초 레이저 사용 • 1펨토초(1000조분의 1초) 동안 강력한 빛의 펄스 방출 • 매우 정밀한 절개 수행, 주변 조직 손상 없음<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>&#128214; 라식 수술의 기술적 배경 &#127942; 체프 펄스 증폭 기술 • 1980년대 중반 프랑스 물리학자 제라르 무루가 개발 • 2018년 도나 스트릭랜드와 함께 노벨물리학상 공동 수상 &#128161; 세렌디피티의 시작 • CPA로 생성된 펨토초 레이저를 안과 분야에 적용한 아이디어는 전적으로 우연한 발견에서 비롯됨 • 로버트 K. 머튼의 정의: \"누군가가 처음부터 찾고 있던 것은 아니지만 우연이나 통찰을 통해 발견하는 것\"<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>&#128269; 세렌디피티가 작동하는 세 가지 단계 세렌디피티는 종종 '운'과 혼동되지만 사실은 세 단계로 이뤄진 하나의 과정<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>1단계 - 예기치 않은 사건이 발생한다 &#128300; 1993년 미시간대 무루의 연구실 • 대학원생 다타오 두가 펨토초 레이저의 거울을 조정 중 • 안전 안경 착용을 깜빡함 • 레이저빔이 실수로 그의 눈에 닿음 • 즉시 병원으로 이송<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>2단계 - 누군가가 그 예기치 않은 사건에서 가치를 발견한다 &#128104;‍⚕️ 안과의사 론 커츠의 진찰 • 다행히 눈에 손상은 없었음 • 망막에서 몇 가지 이상한 화상을 발견 &#128269; 커츠의 관찰 • \"망막의 중심부에 생긴 화상들이 아주 작고 매우 정밀하다는 점에서 독특했습니다\" • \"이 레이저가 어떤 종류인지 궁금해졌고 그 과정을 통해 펨토초 레이저에 대해 알게 됐습니다\"<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>3단계 - 그 우연한 기회를 활용한다 &#129309; 연구 협력의 시작 • 커츠가 무루의 연구팀에 합류 • 펨토초 레이저를 안과에 응용할 수 있는 가능성 연구 시작 &#128202; 학술회의 발표 • 1년 후 커츠와 두가 연구 결과를 학술회의에서 발표 • 티보르 유하스가 참석하여 잠재력을 즉시 알아봄<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>3단계 - 상용화 성공 &#128161; 유하스의 통찰 • 당시 피코초 레이저 연구 중이었으나 기술적 한계 존재 • \"피코초 레이저에서 문제가 됐던 모든 것이 펨토초를 사용하면 극복될 수 있다는 점을 보여줬죠\" &#128640; 사업화 과정 • 무루가 유하스를 팀에 합류 요청 • 미시간대, NIH, NSF에서 추가 연구 자금 확보 • 커츠와 유하스가 공동으로 회사 설립 • 2001년 안과용 펨토초 레이저 세계 최초 상용화<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>3단계 - 놀라운 성과 &#128176; 비즈니스 성공 • 2007년 한 의료 광학 기업에 8억 달러 이상에 인수 • 현재는 존슨앤드존슨 비전에 소속 &#128200; 기술 확장 • 시력교정수술 개발 후 백내장 수술 기법도 함께 개발 • 유하스는 같은 기술로 녹내장 치료 스타트업 설립 • 1990년대 후반 이후 3000만 명이 넘는 사람이 라식 수술 혜택<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>&#127970; 기업이 세렌디피티를 활용하는 법 &#127919; 기업의 현실 • 세렌디피티는 수백 년 전부터 존재해 온 개념 • 수많은 과학적 발견을 이끌어왔음 (페니실린, 발기부전 치료제 등) &#128188; 기업 리더들의 한계 • 관리자들은 세렌디피티를 쉽게 받아들이려 하지 않음 • 예측 불가능하기 때문에 혁신의 수단으로 전적으로 의존할 수 없음 • 기업의 존재 이유는 과학 발전이 아닌 이윤 창출과 성장<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>1단계 - 예기치 않은 일에 열린 마음을 가져라 &#128300; 과학자들의 특징 • 예상치 못한 상황에 열려 있음 • 커츠는 두의 망막에서 발견한 특이한 화상에 즉시 흥미를 느김 &#128188; 기업 관리자의 통찰력 • 예기치 않은 일을 의미 있게 받아들이는 능력 필요<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>1단계 - 바퀴 달린 여행 가방 사례 &#129523; 버나드 새도우의 발견 • 1970년대 초 카리브해 휴가 후 공항에서 • 직원이 바퀴 달린 받침대에 무거운 기계를 실어 밀고 가는 모습 목격 • \"지금 우리에게 필요한 건 바로 저거야. 가방에 바퀴를 다는 거지\" • 바퀴 달린 여행 가방 탄생 ⚠️ 중요한 교훈 • 일상적인 업무에 지나치게 집중하면 뜻밖의 놀라운 순간들을 놓침 • 출장이 아닌 휴가였기에 여유를 가지고 관찰할 수 있었음<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>1단계 - 조직 차원의 실행 방법 &#128483;️ 경영진의 역할 • 팀원들이 자신이 발견한 뜻밖의 관찰이나 사례를 정기적으로 공유하도록 독려 • 처음에는 회의적인 반응이 나올 수 있으나 점차 개선됨 &#128200; 능력 향상 과정 • 이상 징후나 예외적인 상황을 추적하기 시작하면 포착 능력 향상 • 사람들이 '예상 밖의 일'을 관찰해야 한다는 기대를 인식하게 되면 더 민감해짐<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>1단계 - 하이얼의 성공 사례 &#129530; 하이얼의 혁신적 대응 • 1990년대 중국 농민들이 세탁기가 자꾸 고장 난다며 반복적으로 연락 • 서비스팀이 농민들이 세탁기를 시장에 내다 팔 감자를 씻는 데 사용한다는 사실 발견 • 불만을 무시하는 대신 기회를 포착 • 감자 세척에 특화된 완전히 새로운 세탁기 제품군 개발<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>2단계 - 다양한 부서의 상호 교류를 촉진하라 &#128279; 세렌디피티의 핵심 • 다양한 분야의 상호작용이 핵심 • 서로 다른 배경과 기술을 가진 사람들이 모이면 예상치 못한 연결 창출 &#127942; 골든 구스 어워드 수상 • 2022년 무루, 스트릭랜드, 커츠, 유하스, 두가 모두 수상 • 연방 정부 지원 과학 연구 중 예상치 못한 혁신을 이뤄 사회에 큰 영향을 미친 성과 • 물리학자들과 안과 전문의들의 전문성 결합이 핵심<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>2단계 - 스티브 잡스의 철학 &#128172; 픽사 본사 설계에 대한 잡스의 주장 • \"요즘처럼 네트워크가 발달한 시대에는 이메일이나 아이챗만으로도 아이디어를 발전시킬 수 있다고 생각하기 쉽지만 그건 말도 안 되는 얘기예요\" • \"창의성은 우연한 만남, 예상치 못한 대화에서 비롯됩니다\" • \"복도에서 누군가를 마주치면 대화하다 보면 어느새 수많은 아이디어가 쏟아져 나오죠\"<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>2단계 - 엔비디아의 공간 설계 &#127970; 엔데버와 보이저 사옥 • 2018년과 2022년 미국 샌타클래라에 건설 • '대면 만남의 메카'로 불림 &#127919; 설계 특징 • 개방형 보행로, 중앙 광장, 계단식 플랫폼 • 우연한 마주침과 즉흥적인 협업이 자연스럽게 일어나도록 설계 • 다양한 공간 구성을 통해 부서 간 교류 촉진<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>2단계 - 실무 적용 방안 &#129309; 부서 간 협업 장려 방법 • 다른 팀의 회의에 참여해 인사이트 공유하거나 피드백 제공 • 다른 팀과의 협업을 위해 세션을 주도하여 새로운 관점 제시 • 단기 프로젝트를 위해 다부서 팀 구성 &#127760; 외부 네트워크 활용 • 직원들이 산업 협회 활동에 참여하도록 장려 • 직접적인 업무 분야를 넘는 학회나 콘퍼런스 참여 지원 • 기업 동문 네트워크를 통한 퇴직자들과의 교류 유지<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>3단계 - 실험을 조직문화의 핵심으로 심어라 &#128424;️ 잉크젯 프린터의 탄생 • 1970년대 후반 캐논이 새로운 인쇄 기술 탐색 • 잉크젯 프린팅 개발을 위해 소규모 팀 구성 &#128293; 우연한 발견 • 실험 도중 한 직원이 실수로 납땜인두를 잉크가 들어 있는 주사기 끝에 갖다 댐 • 열로 인해 주사기 바늘에서 잉크가 분사됨 • 잉크를 분사시키는 데 압력이 아닌 열을 활용할 수 있다는 사실 깨달음<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>3단계 - 실험 문화 구축 방법 &#128161; 직원 권한 부여 • 소규모 실험을 자율적으로 시도할 수 있도록 권한 부여 • 세렌디피티, 즉 우연한 발견의 기회를 더 많이 획득 &#128273; 최고경영진의 지지 • 실험 문화가 자리 잡기 위해 최고경영진의 강력한 지지 반드시 필요 • 실험의 가치를 인정하고 혁신과 성공을 이끄는 중요한 과정임을 적극 뒷받침 • 그렇지 않으면 직원들이 실패할지도 모를 실험에 쉽게 도전하지 못함<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>3단계 - 캐논의 성공 사례 &#127919; 경영진의 전폭적 지원 • 캐논 경영진은 잉크젯 프린팅 팀에 자유롭게 실험할 수 있는 권한 부여 • 우연한 사고에서 시작되었지만 가능성이 분명해지자마자 경영진의 전폭적인 지지 • 만약 이러한 지원이 없었다면 캐논의 가장 상징적인 제품은 세상에 나오지 못했을 것<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>&#128221; 내용 요약 &#128680; 현재 상황 • 세렌디피티는 과학 분야에서는 매우 중요하게 여겨짐 • 비즈니스에서는 종종 과소평가되거나 그저 운으로 취급됨 &#128188; 관리자들의 한계 • 많은 관리자가 세렌디피티의 가능성에 스스로 마음을 열지 않음 • 이는 수많은 기회를 놓치고 있을지도 모른다는 것을 의미 &#128273; 핵심 메시지 • 세렌디피티는 예측 불가능하지만 조건을 만들어낼 수 있음 • 기업이 의도적으로 우연한 발견의 환경을 조성할 수 있음<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>&#128173; 토론 질문 1-5<br>\t\t\t\t\t<br>\t\t\t\t\t\t<br>- 우리 조직에서 최근 발생한 '예상치 못한 상황'이나 '이상한 현상' 중에서 새로운 기회의 씨앗이 될 수 있는 것은 무엇일까?<br>\t\t\t\t\t\t<br>- 하이얼이 농민들의 감자 세척 불만을 새로운 제품 기회로 전환한 것처럼, 우리가 현재 받고 있는 고객 불만 중에서 혁신의 단초가 될 수 있는 것은 무엇일까?<br>\t\t\t\t\t\t<br>- 우리 조직 내에서 서로 다른 부서 간의 우연한 만남이나 협업이 가장 적은 영역은 어디이며, 어떻게 개선할 수 있을까?<br>\t\t\t\t\t\t<br>- 스티브 잡스가 강조한 '복도에서의 우연한 대화'를 촉진하기 위해 우리 사무공간이나 업무 방식에서 바꿀 수 있는 것은 무엇일까?<br>\t\t\t\t\t\t<br>- 캐논의 잉크젯 프린터처럼 우리 조직에서 '실패한 실험'이나 '실수'가 오히려 새로운 발견으로 이어진 경험이 있다면 무엇인가?<br>\t\t\t\t\t<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>&#128173; 토론 질문 6-10 6. 라식 수술 개발에서 물리학자와 안과의사의 협업이 핵심이었듯이, 우리 업계에서 전통적으로 연결되지 않았던 분야와의 협업 가능성은 어디에 있을까? 7. 우리 조직의 리더십이 직원들의 '예상치 못한 관찰'을 더 적극적으로 수집하고 공유하도록 하려면 어떤 시스템이나 문화적 변화가 필요할까? 8. 엔비디아의 사옥 설계처럼 우연한 만남을 촉진하는 물리적 환경을 만들 수 없다면, 디지털 환경에서는 어떤 방법으로 부서 간 우연한 교류를 늘릴 수 있을까? 9. 우리가 현재 참여하고 있는 외부 네트워크(학회, 협회 등) 중에서 세렌디피티의 기회를 제공할 수 있는 곳은 어디이며, 더 적극적으로 활용할 방법은 무엇일까? 10. 세렌디피티를 위한 실험 문화를 구축하되 비즈니스 성과도 동시에 달성하려면, 어떤 균형점을 찾아야 할까?<br>\t\t\t\t\t<br><br>\t\t\t\t\t출처: <<a href=\"https://claude.ai/chat/f17b371d-3b95-4f86-bdaa-4a72300e3c06\" target=\"_blank\">https://claude.ai/chat/f17b371d-3b95-4f86-bdaa-4a72300e3c06</a>> <br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t출처: <<a href=\"https://claude.ai/chat/f17b371d-3b95-4f86-bdaa-4a72300e3c06\" target=\"_blank\">https://claude.ai/chat/f17b371d-3b95-4f86-bdaa-4a72300e3c06</a>> <br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>\t\t\t\t<br>\t\t\t<br>\t\t\t<br><br>\t\t\t<br>2회차<br>\t\t\t<br>\t\t\t\t<br>\t\t\t\t\t<br>인사조직<br>\t\t\t\t\t<br>‘매터링’의 힘<br>\t\t\t\t\t<br><a href=\"https://www.hbrkorea.com/article/author/wno/3816\" target=\"_blank\">잭 머큐리오(Zach Mercurio)</a><br>\t\t\t\t\t<br>매거진<br>\t\t\t\t\t<br>2025. 5-6월호<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>‘매터링’의 힘<br>\t\t\t\t\t<br>일상적인 상호작용을 개선하면 직원 유지, 몰입, 성장, 웰빙을 증진할 수 있다<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>내용 요약<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>문제&#160;오늘날 너무 많은 직원들이 스스로 중요하지 않다고 생각한다. 이런 정서는 낮은 직원 유지율과 몰입, 직원 정신건강 문제 및 노사 분쟁의 심화 등 현재 비즈니스와 사회가 직면한 많은 문제의 원인이 된다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>원인&#160;짧은 디지털 커뮤니케이션에 의존하고 소프트 스킬을 경시하는 풍조로 인해 다른 이들에게 그들이 소중하다는 사실을 전하기가 어려워졌다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>해결책&#160;리더는 일상 속 개인적 상호작용에서 직원들의 말을 경청하며 그들의 가치를 인정해야 한다. 또한 그들이 이 조직에 왜 필요한지를 설명해줘야 한다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>수년 동안 제인(가명)은 사랑하는 가족을 간병했다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>그가 세상을 떠나자 제인은 삶이 무의미하다고 느꼈다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>설상가상으로 제인은 집을 잃을 위기에 처했고 지역 대학에서 청소부로 일하게 됐다. 고된 교대근무를 하며 그는 ‘왜 나는 살면서 이 이상의 일을 할 수 없을까’ ‘다른 일을 하고 싶다’처럼 일에 방해가 되는 생각으로 힘들어했다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>어느날 한 상사가 제인이 어려움을 겪고 있는 것을 발견했다. 그는 사전을 건네며 관리인custodian의 정의를 읽어보라고 했다. 사전에 쓰인 관리인의 정의는 ‘무언가를 돌보는 책임을 맡은 사람’이었다. “그게 바로 당신입니다.” 상사가 제인에게 말했다. “당신은 이 건물과 그 안에 있는 모든 사람을 ‘관리’하며 책임지는 사람입니다.”<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>그날 제인의 마음속에는 무언가 변화가 일어났다. 이후 서비스직 근로자가 직장에서 의미를 경험하는 방식에 대한 필자의 연구에 참여했을 때, 그는 인생에서 처음으로 누군가가 자신을 가치 있는 사람으로 느끼게 해준 순간이었다고 회상했다. 그 대화 이후 그는 밝아졌고 18년 동안 그 직장을 계속 다녔다. 직장에서 ‘매터링Mattering’의 힘을 느낀 셈이다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>40년 이상 심리학 및 사회학 분야의 주요 개념으로 자리잡아 온 매터링은 스스로 가치 있다고 느끼고 자신이 가치를 더할 수 있기에 주변 사람들에게도 중요한 존재라고 느끼는 경험이다. 이는 원초적인 욕구다. 사람들은 직장에서 자신이 중요하다는 것을 알 때 더욱 잘해낼 수 있다. 매터링은 자존감(“나는 가치 있다”)과 자기효능감(“나는 유능하다”)을 높이고 동기 부여, 웰빙, 성과를 강화한다. 조직은 매터링을 중요하게 여겨야 한다. 매터링이 높다고 보고한 직원은 만족도가 높고 승진 가능성이 높으며 퇴사할 가능성이 낮다. 7900개 사업부를 대상으로 한 연구에서 리더가 구성원들을 가치있게 여기고 그들에게 관심을 갖는다고 느끼는 팀일수록 고객만족도, 생산성, 수익성이 더 높았다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>‘소속감belonging’에 대한 이야기라고 생각하는가. 이미 들어본 적 있는 이야기라고 생각할지도 모른다. 그렇다면 중요한 차이점을 놓치고 있는 것이다. 소속감은 그룹에서 환영받고 받아들여진다는 느낌이다. 반면 매터링은 그룹 구성원 개개인이 중요하다고 느끼는 것이다. 중요성은 소속감보다 훨씬 더 근본적인 욕구다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>조사에 따르면 오늘날 직장에서 투명인간 취급을 받는다고 느끼는 사람이 30%, 과소평가를 받는다고 느끼는 사람이 65%, 외로움을 느끼는 사람이 82%에 육박한다. 현재 리더들이 직면한 많은 직장 내 문제들(10년 만에 경험하는 최저 수준의 몰입도engagement, 존엄성과 공정성에 대한 요구, 증가하는 노동운동, 점점 나빠지는 직원들의 정신건강, 몇 년 전부터 만연한 ‘조용한 퇴사quiet quitting’와 ‘대퇴사Great Resignation’ 현상)은 점점 심해지고 있는 매터링 결핍mattering deficit으로 귀결될 수 있다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>이런 추세는 몰입을 위한 연구 및 플랫폼, 웰빙 프로그램, 더 나은 채용 및 유지 이니셔티브, 임금 인상, DEI 이니셔티브에 대한 투자에도 불구하고 지속되고 있다. 매터링은 급여, 정책, 혜택의 결과가 아니기 때문이다. 나와 우리 팀은 수십 년에 걸친 연구를 통해 메리어트 인터내셔널, 델타항공, 미 육군 등 수백 개의 기업 및 공공부문 그룹과 협력하며 매터링 함양에 도움이 되는 행동을 발견했다. 그 결과, 제인이 경험한 것과 같이 일상적인 대인관계에서 매터링을 근본적으로 느낄 수 있다는 사실을 발견했다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>분명히 말하지만 개별적인 상호작용을 통해 매터링 문화를 조성하는 것이 풍족한 임금을 지급하고, 예측 가능한 스케줄을 제공하고, 기본적인 의료서비스를 제공하는 것을 대신하지는 못한다. 하지만 개인화된 접근방식 없이는 사람들이 스스로 중요하다고 느끼지 못할 것이다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>이는 리더가 매일 팀원들과 상호작용하는 동안 그들을 진정으로 경청해야 한다는 것을 의미한다. 또한 정기적으로 직원들의 매터링을 확인해야 한다. 마지막으로 고위리더는 이런 기술을 조직 차원으로 확장해 매터링이 문화적 규범이 될 수 있도록 해야 한다. 이런 행동은 상식처럼 보일 수 있다. 그러나 디지털 도구로 커뮤니케이션이 간략해지고 소프트 스킬에 대한 경시 풍조가 만연해지며 이런 행동이 더 이상 일반적인 관행이 아니게 됐다. 따라서 다시 배울 가치가 있다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>시간 제약은 통제할 수 없지만 관계 구축의 우선순위를 정하고 계획을 세우는 방법은 통제할 수 있다. 팀과의 정기적인 미팅을 예약하라. 일대일 미팅을 소홀히 하지 말라.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>다른 사람을 보고 듣기<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>매터링 감각을 기르기 위한 첫 번째이자 가장 중요한 단계는 진정으로 사람을 ‘알아차리는notice&#160;것’이다. 사람을 알아차리려면 두 가지 기술이 필요하다. 사람을 보는 것seeing, 즉 사람을 인정하고 그들의 삶과 업무의 세부사항, 기복, 흐름에 주의를 기울이는 것이다. 다른 하나는 사람을 듣는 것hearing, 즉 그들의 말 뒤에 숨겨진 의미와 감정에 진정한 관심을 보이고 그들이 편안하게 느낄 수 있도록 심리적으로 안전한 분위기에서 그들의 경험, 관점, 피드백을 공유하도록 하는 것이다. 제인의 어려움에 대한 상사의 작은 알아차림이 그의 커리어를 어떻게 변화시켰는지 기억하라.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>사람을 ‘알아차리는 것’과 ‘아는 것knowing’은 다르다. 가장 친한 친구를 잘 알 수는 있지만 그 친구가 힘든 시간을 보내고 있다는 사실은 알아차리지 못할 수 있다. 팀원을 잘 알지만 특정 부분에서 스트레스를 받고 있거나 토론에서 소외감을 느끼고 있다는 사실을 알아차리지 못할 수도 있다. 우리는 다른 사람을 알아보는 것이 자연스러운 일이라고 생각하는 경향이 있지만 오늘날의 바쁜 업무 환경에서는 그렇지 않다. 다른 사람을 알아차리기 위해 다음과 같은 방법을 시도해 보자.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>시간과 공간을 확보하라&#160;우리는 모두 바쁘다. 따라서 진정으로 사람을 만나기 위한 시간을 따로 마련해야 한다. 2014년 한 연구에서 연구자들은 리더와 일주일에 1시간 이하 소통하는 직원과 일주일에 6시간 이상 소통하는 직원을 비교했다. 상사와 더 많은 시간을 보낸 직원들은 그렇지 않은 직원들보다 동기와 혁신성이 더 높았으며 업무 몰입도가 30% 더 높았다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>시간 제약은 통제할 수 없지만 관계 구축의 우선순위를 정하고 계획을 세우는 방법은 통제할 수 있다. 팀과의 정기적인 미팅을 예약하라. 일대일 미팅을 소홀히 하지 말라. 회의 시작 전이나 수다스러운 대화를 최대한 활용하라. 당신의 시간을 더 필요로 하는 팀원이 있는지 주기적으로 확인하라.(‘매터링 도구 키트’의 ‘매터링 감사’ 참고)<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>깊이 집중하라&#160;연구에 따르면 지난 10년 동안 우리의 주의 집중 능력이 감소한 것으로 나타났다. 대화에 온전히 집중하지 못하면 관계보다는 거래에 치중하게 된다. 우리는 통화 중에 배달원에게 감사 인사를 하면서도 그의 이름을 기억하지 못하고, 회의 안건을 빠르게 처리하면서 참석자들 각자가 어떻게 지내고 있는지 묻지 않는다. 마찬가지로 피드백을 전할 때도 팀원의 관점을 고려하지 않는다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>다른 사람에게 세심한 주의를 기울이겠다는 의지를 새롭게 다져보라. 좀 더 의미 있는 질문으로 시작해보자. 우리는 “안녕하세요?” 또는 “오늘 하루 어땠어요?”라는 말로 대화를 시작하는 경향이 있다. 이런 일반적인 인사로는 상대방에 대한 통찰을 이끌어내기 어렵다. 그 대신 명확하고 개방적이며 탐구적인 질문을 하라.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>→&#160;명확한&#160;질문에는 대상과 시간에 대한 내용이 포함된다. 예를 들어 “안녕하세요?”라고 말하는 대신 “오늘은 무엇에 집중하고 있나요?”라고 물어볼 수 있다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>→&#160;개방형&#160;질문은 사람들이 경험을 공유할 수 있는 기회를 제공한다. “회의가 잘 진행됐나요?”라고 묻는 대신 “회의에서 가장 중요한 인사이트는 무엇이었나요?”라고 물어볼 수 있다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>→&#160;탐색적&#160;질문은 평가가 아닌 이해를 구하는 질문이다. “오늘 무엇을 완료하셨나요?” 대신 “오늘 프로젝트에서 가장 어려웠던 부분은 무엇이며 그 이유는 무엇인가요?”라고 물어볼 수 있다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>이런 상호작용에서 배운 내용을 메모해 두면 이후 세심한 조치를 취할 수 있다. 유통센터에서 일했던 한 관리자는 팀원들의 세세한 이야기를 파악하기 어려웠다. 팀 규모가 너무 컸다. 그래서 매주 금요일 오후마다 그는 각 팀원에 대해 알아차린 점들을 적어 뒀다. 다가오는 회의에 불안감을 호소하는 직원, 특정 작업을 어려워하는 직원, 심지어 자녀가 새로운 운동을 시작했다는 직원까지 그들을 알아차리기 위해 세세하게 받아 적었다. 월요일에 그는 노트를 보며 각 팀원에게 “지난주에 …라고 이야기한 걸로 기억하는데요”라는 말로 약 3분간 점검시간을 가진 후 구체적인 사항에 대해 질문하거나 의견을 제시했다. 그의 팀은 센터의 다른 팀보다 지속적으로 높은 몰입도를 보였다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>전체적인 의미를 파악하기 위해 경청하라 사람들이 관점을 공유할 때, 그들이 말하고 느끼는 것에 진정한 관심을 보여라. 적극적 경청은 이를 위한 이상적인 방법으로 오랫동안 알려져 왔다. 그러나 경청하겠다는 리더들이 침묵을 지킨 채 눈을 맞추고 고개를 끄덕이는 ‘기계적 조언자’로 변질되는 경우를 너무 자주 봤다. 상대방은 어떨까. 리더가 물리적으로는 듣고 있지만 정말 듣고 있다고 느끼지는 못할 것이다. 대화를 통해 상대방의 진정한 관점을 이끌어내야 한다. (179페이지 ‘<a href=\"https://www.hbrkorea.com/article/view/atype/ma/category_id/6_1/article_no/2327\" target=\"_blank\">당신은 다른 사람의 말에 진심으로 귀 기울이고 있는가?</a>’ 참고)<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>이를 위해서는 심리학자이자 행동주의 이론가인 칼 로저스Carl Rogers가 ‘총체적 의미total meaning’라고 부르는 개념에 유의해야 한다. 즉 다른 사람의 말뿐 아니라 태도, 표정 및 기타 비언어적 단서에 주의를 기울여 상대방의 근본적인 감정과 태도를 이해하고 대응할 수 있어야 한다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>배려하는 조직문화는 구성원들의 조직에 대한 정서적 헌신, 생산성, 업무의 질, 참여도를 높일 수 있다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>다음은 팀원들의 말 뒤에 숨겨진 더 깊은 의미를 파악하기 위해 사용할 수 있는 4가지 기법이다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>→&#160;“더 자세히 설명해 주시겠습니까?” 또는 “‘괜찮다’는 게 무슨 뜻입니까?”와 같은 질문을 통해 명확한 설명을 구한다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>→&#160;“그때 무슨 생각을 하고 있었나요?” 또는 “예를 들어 설명해 주시겠어요?”와 같이 세부적인 내용을 이끌어내는 질문을 통해 탐색한다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>→&#160;“제가 들은 바에 따르면 …이 맞나요?” 또는 “제가 이해한 게 맞는지 한번 확인해봅시다.(자신이 이해한 내용을 설명한 후) 혹시 제가 혹시 놓친 게 있을까요?”와 같이 말을 재확인하는 질문을 던진다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>→&#160;“그래서 기분이 어땠죠?” “그 일이 일어났을 때 어떤 기분이었나요?” 또는 “…라고 말할 때 그 뒤에 어떤 감정이 들었나요?”라고 질문하며 감정을 표현할 수 있도록 지원하라. 그리고 “당신은 …를 느끼는 것 같아요” 또는 “말을 들어보니 정말 …인 것 같네요”라고 말하며 상대를 인정하라.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>동정심을 갖고 대응하라&#160;사람을 더 보고 들을수록 불안, 스트레스 등 그 사람의 어려움을 더 잘 알게 된다. 그렇기에 무엇보다도 연민을 갖고 그들을 대해야 한다. 당연한 이야기처럼 들릴지도 모른다. 그러나 우리는 직장에서 너무 많은 절망을 일상적으로 겪는다. “지금이 딱 그럴 시기죠” “그게 우리 비즈니스의 특징입니다” “지금은 모두 과부하 상태예요”라는 말들이 사실일 수는 있지만 당신이 그들을 알아차리고 있다는 신호를 보내는 데는 도움이 되지 않는다. 배려의 반응은 상대방의 스트레스 반응을 줄이고 혈압을 낮추며 신뢰를 높일 수 있다. 배려하는 조직문화는 구성원들의 조직에 대한 정서적 헌신, 생산성, 업무의 질, 참여도를 높일 수 있다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>작은 동정심도 큰 힘이 된다. 가상 회의에서 한 팀원이 과부하가 걸렸다고 말했을 때 리더는 이렇게 말했다. 그는 잠시 말을 멈추고 “금요일 스탠딩 회의를 건너뛰는 거 어때요?”라고 말했다. 이에 모두가 눈에 띄게 긴장을 풀었다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>후속 조치를 하라&#160;대화 이후의 행동이 중요하다. 예를 들어 한 은행에서 실시한 직원들의 경청 행동에 관한 연구에 따르면 누군가가 자신의 말을 들었다고 느끼는 데는 대화 중에 청취자가 얼마나 반응을 보였는가뿐만 아니라 대화가 끝난 이후 몇 주 또는 몇 달 동안에 어떤 일이 있었는가에 따라서도 달라졌다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>여러분이 취할 수 있는 조치는 들은 내용을 다시 확인하는 것부터 사업에 구체적인 변화를 주는 것까지 다양하다. 유나이티드 항공을 생각해 보자. 오스카 무노즈Oscar Munoz가 CEO에 취임하기 전 이 회사는 운영 실적 부진, 재정 악화, 노사 관계 악화, 업계 최하위 수준의 고객 만족도와 직원 사기 저하로 어려움을 겪고 있었다. 무노즈는 취임과 함께 경청 투어를 시작했다. 에이미라는 이름의 승무원이 대화 도중 감정이 격해졌을 때 그는 말을 멈추고 부드럽게, 그리고 더 자세히 물어봤다. “오스카, 전 항상 ‘죄송합니다’라고 말해야 하는 것에 지쳤어요.” 그녀가 말했다. “우리 음식이 맛없어서 미안해요. 커피도 별로라서 미안해요. 아이 옆에 앉을 수 없게 돼서 미안해요. 미안해요, 미안해요, 미안해요.”<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>무노즈는 회사가 고객 및 투자자와의 문제를 해결하기 위해서는 직원들의 신뢰를 회복해야 한다는 것을 깨달았다. 그는 그녀의 말을 잊지 않겠다고 약속했다. 경청 투어를 이어간 후 스케줄 문제를 해결하고 근무 조건을 개선하기 위한 변화를 단행했다. 유나이티드는 고객 만족도, 직원 참여도, 운영 탁월성 부문에서 상위권 항공사로 도약했고, 그의 재임기간 동안 주가는 50%나 치솟았다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<a href=\"https://www.hbrkorea.com/upload_dir/source/2025%200506/MayJun25_FEA_Mercurio_2.jpg\" target=\"_blank\">\t\t\t\t\t\t\t\t\t\t\t</a><br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>사람을 인정하고 그들이 필요하다는 것을 보여주기<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>상대방을 온전히 보고듣고 나면 그들을 의미 있는 존재로 인정할 수 있다. 각자 독자적인 영향을 미친다는 점을 보여주는 것이다. 인정은 단순히 그들이 한 일이나 그 자체에 대해 감사하는 것이 아니다. 그들의 고유성uniqueness을 표현해 주는 것이다. 또한 다른 사람들이 그들에게 의존하고 있으며 그들의 노력이 대체 불가능하다는 증거를 제시하면서 그들 존재가 필요한 이유를 인식하게 한다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>안타깝게도 데이터에 따르면 우리 대부분은 인정과 감사를 잘 표현하지 못한다. 예를 들어 존 템플턴 재단에서 실시한 대규모 설문조사에서 90%의 사람들이 살면서 사람들에게 감사함을 느낀다고 답했지만 그 감사를 표현한 사람은 절반도 되지 않았다. 인재 관리 소프트웨어 회사인 탤런트LMSTalentLMS의 설문조사에 따르면 60%의 사람들이 직장에서 자신을 진심으로 인정해 주는 관리자가 한 명도 없었다고 답했다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>독특한 재능을 짚어서 이야기하라&#160;사람들은 다른 사람과의 비교를 통해 고유성을 인식한다. 1977년 발표된 한 연구에서 심리학자들은 참가자들에게 성격 테스트에 대한 피드백을 받을 것이라고 말했다. 참가자들은 같은 점수를 받았지만 그중 절반은 자신의 결과가 동료들과 비교해 얼마나 독특한지를 나타내는 ‘차이 점수’를 받았다. 본인이 독특하다는 말을 들은 참가자들은 차이 점수를 받지 않은 참가자들보다 더 높은 만족도와 더 나은 자기 인식을 보고했다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>고유성을 소중히 여기는 욕구 때문에 우리는 피상적인 피드백을 무시하기도 하고 매일 같은 시간에 “감사합니다”라는 말을 듣는 것에 크게 의미를 두지 않기도 한다. 또한 상을 주거나 식대 및 인센티브를 제공하고 노력을 표창하는 등의 프로그램이 긍정적인 표현이 오가는 대인관계를 대신할 수 없는 이유이기도 하다. 스스로 중요하다고 느끼려면 다른 사람과의 관계를 통해 고유한 매터링을 경험해야 한다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>매터링을 확인하려면 각각의 강점, 목적, 관점, 지혜를 생각해봐라. 강점은 그가 좋아하는 일과 잘하는 일이 겹치는 부분이다. 목적이란 그가 세상에 기여하고자 하는 바를 말한다. 관점은 그가 세상을 보는 방식이며 지혜는 살아가면서 배운 것이다. 이런 재능에 이름을 붙여 그 영향력을 인지하게끔 하고 이를 육성하면서 직원들이 본인의 재능이 얼마나 중요한지 깨닫도록 도울 수 있다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>사람을 인정한다는 것은 개선이 필요한 부분을 무시하거나 비판을 피하는 것을 의미하지 않는다. 오히려 인정은 성과 격차를 해소하는 데 중요한 역할을 한다. 피드백이 중요하다고 생각하지 않는 사람에게는 정말로 피드백이 중요하지 않을 가능성이 크다. 심리학자 데이비드 예거David Yeager와 그의 팀은 인정의 피드백을 ‘현명한 피드백’이라고 부른다. 실험 연구를 통해 그들은 비판하거나 개선이 필요한 부분을 지적하기보다는 누군가가 자신을 믿으며 강점을 상기시키고, 지원을 제공하고, 신뢰를 쌓을 때 성과가 개선 될 가능성이 더 크다는 사실을 발견했다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>의미 있는 스토리를 전달하라&#160;특히 최종 사용자나 고객으로부터 몇 단계 떨어져 있는 역할을 맡고 있는 이들은 그들이 하는 일이 현장에 미치는 영향을 상상하기 어려울 수 있다. 그들이 어떤 차이를 만들어 내는지 알리는 한 가지 방법은 실제적이고 구체적인 이야기를 수집하고 공유하는 것이다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>상업용 배관 공사업체 팀과 그들의 직장에서 목적에 대한 토론을 진행한 적이 있다. 14시간 교대근무를 마친 그들은 지쳐 있었고, 몰래 빠져나갈 적절한 순간을 기다리고 있다는 사실을 숨기려 하지 않았다. 나는 당시 여섯 살이던 아들이 집 근처 광장에 있는 도넛 가게에서 눈을 감고 좋아하는 도넛을 먹고 있는 사진을 보여주며 세션을 시작했다.(동생이 태어난 후에도 주말마다 도넛 가게를 찾는 일은 특별한 루틴이 됐다.)<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>배관공들에게 “여기 뭐가 보이세요?”라고 물었다. 잠시 후 배관공 중 한 명이 자리에서 일어나더니 “우리가 그 프로젝트를 했어요!”라고 말했다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>“네, 사진 속에 기쁨이 보이시나요? 바로 당신 덕분이에요.”<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>이후 두 시간 동안 노인센터 프로젝트부터 연구시설 업무에 이르기까지 각자의 업무가 어떻게 중요한지 이야기를 나눴다. 세션이 끝난 후 한 배관공이 감정을 억누르며 “저는 30년 동안 이 일을 해왔습니다. 그런데 제 직업에 대해 그런 식으로 생각해 본 적이 없어요. 이 건물을 사용하는 사람들에 대해 생각해 본 적이 없었던 거죠”라고 말했다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>조직심리학자 애덤 그랜트Adam Grant의 연구에 따르면 우리 업무가 다른 사람에게 어떤 혜택을 주는지에 대한 실제 사례를 한 번만 들어도 동기가 400% 이상 높아질 수 있다. 따라서 고객과 회사, 동료나 친구로부터 의미 있는 이야기를 수집하고 공유하는 프로세스를 마련하라.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>그들이 없어서는 안 될 존재임을 보여라&#160;스스로 필요한 존재라고 느끼도록 돕는 한 가지 방법은 작은 업무라도 더 큰 목표나 목적에 얼마나 중요한 역할을 하고 있는지 정확하게 보여주는 것이다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>NASA의 한 청소부가 “여기서 무슨 일을 하십니까?”라는 존 F.케네디 대통령의 질문에 “달에 사람을 보내는 일을 돕고 있습니다”라고 대답한 사례는 유명하다. 비화일 수도 있지만 NASA가 약 30만 명의 분산된 계약직 근로자를 포함해 달 탐사 임무에 참여한 모든 사람들에게 그들의 업무가 궁극적인 목표를 달성하는 데 얼마나 중요한지 의도적으로 보여줬다는 것은 사실이다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>앤드루 카턴Andrew Carton&#160;연구원은 NASA 직원과 리더들이 ‘달로 가는 길road to the moon’ 또는 ‘디딤돌stepping stones’과 같은 다양한 용어를 사용해 이 관행을 설명했다는 사실을 깨달았다. 당시 NASA의 임무운영책임자였던 오언 메이너드Owen Maynard는 NASA 휴스턴 우주센터의 칠판에 ‘달로 가는 사다리ladder to the moon’라고 적었다. 맨 아래 사다리에는 현재 작업 그룹이 있었다. 다음 단계는 이 과제를 통해 달성할 수 있는 측정 가능한 목표였다. 그 다음 단계는 이전 목표가 가능하게 만드는 측정 가능한 목표였고, “10년 안에 사람을 보내는 것”이라는 목표에 닿을 때까지 단계는 계속 이어졌다. 모두가 각 단계가 어떻게 다음 단계로 이어지는지 정확히 알 수 있었다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>래더링Laddering은 사람들과 그들의 투입물을 더 큰 성과로 연결한다. 조직의 목적, 부서의 가치, 팀의 비전 등 의미 있는 결과를 사다리의 맨 위에 놓고 개인의 의견을 맨 아래에 둬라. 구체적일수록 좋다. 그런 다음 사다리의 각 단을 올라가면서 궁극적 성과와 연결되는 실제적이고 가시적인 결과를 위해 개인의 의견이 어떻게 필요한지 보여줘라. 사람들은 사다리를 정기적으로 확인하며 자신의 필수 불가결성을 재확인해야 한다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>비판을 하거나 개선이 필요한 부분을 지적하기보다는 누군가가 나를 믿으며 강점을 상기시키고 지원을 제공하며 신뢰를 쌓을 때 성과를 개선할 가능성이 더 크다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>매터링을 육성하기 위한 기술 확장하기<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>최근 세계 최대 규모의 소매 기업 중 한 곳에서 ‘사람 우선people first’ 문화를 확장하겠다며 도움을 요청해 왔다. 경영진은 매장 디스플레이를 기획하는 등 업무에 필요한 역량, 교육 시스템 및 측정 프레임워크를 전문적인 수준으로 줄줄 욀 수 있었다. 그러나 직원들이 어떻게 부가가치를 창출하는지 알기 위해 관리자에게 어떤 기술이 필요한지 물었을 때 경영진은 대답하기 힘들어했다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>이 글에서 설명한 기본적인 대인관계 기술을 조직 전체에 확산하려면(전 세계 여러 문화권에서 회사와 직원들을 변화시키는 것을 목격했다) 다른 업무 역량에 집중하는 것과 비슷한 노력이 필요하다. 구체적으로는 다음의 네 가지 단계를 지켜야 한다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<a href=\"https://www.hbrkorea.com/upload_dir/source/2025%200506/FEA_Zach%20Mercurio_1.jpg\" target=\"_blank\">\t\t\t\t\t\t\t\t\t\t\t</a><br><br>\t\t\t\t\t<br>올바른 의도를 설정하고 동기를 강화하라&#160;조직에서 매터링의 확장에 대해 이야기하기 시작할 때 직원을 생산성, 수익, 성공이라는 최종 목표를 달성하기 위한 수단으로 생각하기 쉽다. 하지만 직원을 성공의 메커니즘으로만 생각하면 직원은 더 이상 ‘인간’으로 존중 받을 수 없다. 진정으로 중요한 가치를 창출하는 리더는 사람을 그 자체로 가치 있는 목적, 즉 생생하고 복잡하며 중요한 삶을 가진 인간으로 보고 대한다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>조직 전체에 매터링을 확산할 때, 직원들에게 그들이 얼마나 중요한지 보여주면서 얻을 수 있는 결과는 몰입 증가, 이직률과 번아웃 감소 등이다. 그러나 이런 목적을 달성하기 위한 전술로 매터링을 실행해서는 안 된다. 사람들이 얼마나 중요한 존재인지 보여주는 것은 존엄성에 대한 인간의 기본적인 욕구와 관련된다. 보고, 듣고, 가치를 인정받고자 하는 인간의 원초적인 욕구를 충족시키기 때문에 해야 하는 일이다. 이 차이는 미묘해 보일 수 있지만 이를 이해하고 내면화하는 것이 프로세스의 기본이며 냉소보다는 노력의 가능성을 높여준다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>올바른 의도를 설정한 후에는 동기를 유발할 수 있는 감성의 닻을 만들어라. 사람들에게 삶에서 중요한 경험을 하는 것이 어떤 것인지 제시해주지 않으면 그들은 이 아이디어를 받아들이지 않는다. 그저 또 하나의 이니셔티브로 여길 것이다. 필자가 리더들과 함께 하는 첫 번째 연습은 다음과 같은 질문에 답하게 하는 것이다. 언제 자신이 다른 사람에게 중요하다고 느낀 적이 있나? 어떤 느낌이었나? 그 사람은 어떻게 말하고 어떤 행동을 했나? 그 사람은 어떤 기술을 사용했나?(자세한 내용은 ‘매터링 도구 키트’ 참고) 이런 대화의 결과는 매우 강력하다. 리더는 다른 사람들에게 자신이 중요하다는 느낌을 키우기 위해 영감을 받고, 그러기 위해서는 기술을 배워야 한다는 것을 깨닫는다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>기술을 개발하고 연습하라&#160;이런 기술에 이름을 붙이고 연습을 위한 요구사항을 구축하는 것 또한 프로세스의 중요한 부분이다. 사람들이 주목받고, 인정받고, 스스로가 필요하다고 느낄 수 있도록 하는 기술은 조직에 맞게 조정돼야 한다. 리더가 개발해야 할 역량은 무엇이 있을까. 스스로에게 물어보자. 궁극적으로 조직에서는 리더가 매일 어떻게 행동해야 하는지를 정의하는 ‘리더십 체크리스트’를 만들거나 인재 육성에 대한 회사의 접근방식을 전달하는 보다 포괄적인 가이드북을 만들 수도 있다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>매터링을 측정하라&#160;측정과 책임 없이는 이런 기술이 향상되고 있는지 알 수 없다. 사람들이 다른 사람을 알아차리고 확인하며 필요로 하는 기술을 측정하는 데 있어 한 가지 어려운 점은 우리 모두가 이 영역에서 자신의 노력을 과대평가하는 경향이 있다는 것이다. 조직과 리더 스스로가 개선할 수 있는 부분을 보다 정확하게 파악할 수 있는 두 가지 방법을 추천한다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>→&#160;자기 평가&#160;동료 코칭의 기회를 가질 수 있도록 적어도 분기별로 그룹 환경에서 자기 평가를 수행하는 것이 좋다. (‘매터링 도구 키트’ 자료의 ‘리더를 위한 매터링 자체 평가’ 참고)<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>→&#160;팀 평가&#160;하지만 구체적인 사실에 근거한 질문 앞에서도 스스로에게 관대해지는 경향이 있다.따라서 자기 평가만으로는 충분하지 않다. 팀원들에게 동일한 행동에 대해 리더를 평가하도록 요청하라. (예를 들어 “나는 다른 사람의 개인 및 업무 생활의 세부사항을 기억하고 확인한다”는 항목은 “우리 리더는 다른 사람의 개인 및 업무 생활의 세부 사항을 기억하고 확인한다”로 치환한다.)<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>환경을 최적화하라&#160;솔직히 많은 조직에서 리더는 중요한 일을 처리하는 데 어려움을 겪는다. 하루 종일 추적해야 하는 물류센터에서 온종일 근무하는 경우, 타인에 대한 관심을 표현하는 데 필요한 시간을 내는 것 자체가 불가능에 가깝다. 감사를 표현할 수 있는 조직에서도 보통은 자율에 맡기는 경우가 많다. 배려를 표현할 의무는 없기 때문이다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>공식적 또는 비공식적 보상은 사람의 행동에 영향을 미치는 강력한 수단이다. 배려하는 행동에 대해 인정하고 인센티브를 제공하며 장려한다면 배려하는 리더가 더 많이 생겨날 것이다. 배려 문화를 조성하려면 리더가 사람들에게 얼마나 많은 일을 하게 하는지를 기준으로 보상을 제공하거나 승진을 시키는 등의 관행을 멈춰야 한다. 리더가 사람들에게 어떤 느낌을 주는지에 따라 보상을 지급해라. 다른 사람을 함부로 대하는 고성과자에게 보상하거나 이들을 승진시키지 말라. 성과를 잘 내면서도 사람들을 품위 있게 대하고 포용하며 존중하고 인정한다고 평가받는 리더를 보상하고 육성하며 승진시켜라.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>필자는 아메리칸 익스프레스 글로벌 비즈니스 여행의 마크 루드 수석 부사장과 협력하며 코로나19 팬데믹이 종료된 지 1년 정도 후에 이런 아이디어를 도입했다. 팬데믹은 대기업의 출장을 최전선에서 처리하는 회사 직원들에게 잔인한 일이었다. 사기가 떨어지면서 직원들의 피로도가 높아졌다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>필자는 우선 미국, 아일랜드, 인도 등 다양한 지역의 조직 리더들에게 매터링의 힘, 매터링이 없을 때의 대가, 매터링의 중심과 목적에 대해 설명했다. 한 리더는 동료들과 자신의 매터링 경험에 대해 이야기하면서 “다시 인간이 될 수 있는 허락을 받았다”고 말했다. 매터링은 모든 문화권에서 공감을 불러일으켰다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>2단계에서는 리더들을 소그룹으로 나눠 회사에서 알아차리고 인정하며 필요로 하는 것에 관한 구체적인 행동과 기술을 브레인스토밍했다. 그 행동에는 “모든 통화에서 얼굴을 마주 보고 영상을 공유하며 적극적으로 경청하는 모습을 보여주기” “직원이 어려움을 토로할 때 적극적으로 도움을 제공하기” “업무를 할당할 때 ‘무엇을’, ‘어떻게’에 앞서 ‘왜’를 먼저 설명하기” 등이 포함됐다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>행동의 범위를 좁힌 후, 다음과 같은 문장으로 시작하는 ‘사람이 중요한 이유’라는 청사진에 이를 담았다. “우리는 각 직원이 주목받고 인정받으며 필요한 존재라고 느껴야 한다고 믿는다.” 그런 다음 각 행동에는 기술과 실행 조언을 덧붙였다. 이 청사진과 그에 따른 전략은 조직의 리더십 기술 개발, 리더 평가, 팀 평가의 기본 커리큘럼이 됐다. 그 결과 1년 반 동안 지속됐던 높은 이직률이 50% 감소하고 직원 몰입 점수도 크게 상승했다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>다른 사람을 함부로 대하는 고성과자에게 보상하거나 이들을 승진시키지 말라. 성과를 잘 내면서도 사람들을 품위 있게 대하고 포용하며 존중하고 인정한다고 평가받는 리더를 육성하며 승진시켜라.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>“다른 사람에게 의미를 가져야 살아 있는 것이다.” T.S. 엘리엇은 말했다. 조직 전체에서 서로의 필요와 가치를 진정으로 보고 듣고 인정하고 표현하는 것은 관계 증진 그 이상의 의미를 갖는다. 우리는 서로가 필요하다고 느끼며 서로를, 나아가 직장을 활기차게 만들 수 있다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<a href=\"https://www.hbrkorea.com/upload_dir/source/2025%200506/MayJun25_FEA_Mercurio_3.jpg\" target=\"_blank\">\t\t\t\t\t\t\t\t\t\t\t</a><br><br>\t\t\t\t\t<br>잭 머큐리오(Zach Mercurio)는&#160;목적 지향적 리더십과 의미 있는 일에 관한 연구자이자 고문이다. 콜로라도주립대 의미와 목적 센터(Center for Meaning and Purpose)의 선임 명예 연구원이자 이 아티클의 원서인 ＜The Power of Mattering＞(Harvard Business Review Press, 2025)의 저자이다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>에디팅&#160;이규열<br>\t\t\t\t\t<br><br>\t\t\t\t\t출처: <<a href=\"https://www.hbrkorea.com/article/view/atype/ma/category_id/2_1/article_no/2322/page/1\" target=\"_blank\">https://www.hbrkorea.com/article/view/atype/ma/category_id/2_1/article_no/2322/page/1</a>> <br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>\t\t\t\t\t<br>'매터링'의 힘<br>\t\t\t\t\t<br>The Power of Mattering<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>잭 머큐리오(Zach Mercurio)<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>&#127795; 아티클 구조<br>\t\t\t\t\t<br>• 1단계: 매터링의 개념과 중요성<br>\t\t\t\t\t<br>\t\t\t\t\t\t<br>- 매터링 정의 및 사례<br>\t\t\t\t\t\t<br>- 현재 직장 내 매터링 부족 현상<br>\t\t\t\t\t\t<br>- 매터링의 조직적 영향 <br>\t\t\t\t\t<br>\t\t\t\t\t<br>• 2단계: 다른 사람을 보고 듣기<br>\t\t\t\t\t<br>\t\t\t\t\t\t<br>- 시간과 공간 확보<br>\t\t\t\t\t\t<br>- 깊이 집중하기<br>\t\t\t\t\t\t<br>- 전체적 의미 파악을 위한 경청<br>\t\t\t\t\t\t<br>- 동정심 갖고 대응하기<br>\t\t\t\t\t\t<br>- 후속 조치 실행 <br>\t\t\t\t\t<br>\t\t\t\t\t<br>• 3단계: 사람 인정하고 필요성 보여주기<br>\t\t\t\t\t<br>\t\t\t\t\t\t<br>- 독특한 재능 짚어서 이야기하기<br>\t\t\t\t\t\t<br>- 의미 있는 스토리 전달<br>\t\t\t\t\t\t<br>- 없어서는 안 될 존재임을 보여주기 <br>\t\t\t\t\t<br>\t\t\t\t\t<br>• 4단계: 매터링 기술 확장하기<br>\t\t\t\t\t<br>\t\t\t\t\t\t<br>- 올바른 의도 설정<br>\t\t\t\t\t\t<br>- 기술 개발과 연습<br>\t\t\t\t\t\t<br>- 측정 방법<br>\t\t\t\t\t\t<br>- 환경 최적화<br>\t\t\t\t\t<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>&#128161; 내용 요약<br>\t\t\t\t\t<br>문제: 너무 많은 직원들이 스스로 중요하지 않다고 생각함 <br>\t\t\t\t\t<br>원인: 짧은 디지털 커뮤니케이션과 소프트 스킬 경시 풍조 <br>\t\t\t\t\t<br>해결책: 일상적 개인 상호작용에서 경청하며 가치 인정 • 결과: 직원 유지, 몰입, 성장, 웰빙 증진<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>&#127919; 매터링의 정의와 개념<br>\t\t\t\t\t<br>• 매터링이란: 스스로 가치 있다고 느끼고 주변 사람들에게도 중요한 존재라고 느끼는 경험 • 원초적 욕구: 사람들은 직장에서 자신이 중요하다는 것을 알 때 더욱 잘해낼 수 있음 • 심리적 효과: 자존감(\"나는 가치 있다\")과 자기효능감(\"나는 유능하다\")을 높임 • 동기 부여: 웰빙, 성과를 강화하는 핵심 요소<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>&#128214; 제인의 사례 - 매터링의 힘<br>\t\t\t\t\t<br>• 배경: 가족 간병 후 삶의 무의미함을 느끼며 대학 청소부로 근무 • 전환점: 상사가 사전을 건네며 '관리인'의 정의를 읽게 함<br>\t\t\t\t\t<br>\t\t\t\t\t\t<br>- \"무언가를 돌보는 책임을 맡은 사람\"<br>\t\t\t\t\t\t<br>- \"당신은 이 건물과 그 안에 있는 모든 사람을 '관리'하는 사람\" • 결과: 인생에서 처음으로 가치 있는 사람으로 느끼게 됨 • 장기 효과: 18년 동안 그 직장을 계속 다님<br>\t\t\t\t\t<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>&#128202; 소속감 vs 매터링의 차이<br>\t\t\t\t\t<br>• 소속감(Belonging): 그룹에서 환영받고 받아들여진다는 느낌 • 매터링(Mattering): 그룹 구성원 개개인이 중요하다고 느끸는 것 • 근본적 차이: 매터링은 소속감보다 훨씬 더 근본적인 욕구 • 개별성 중시: 매터링은 개인의 고유한 가치에 초점<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>&#128200; 조직에서 매터링의 중요성<br>\t\t\t\t\t<br>• 직원 만족도: 매터링이 높은 직원은 만족도가 높고 승진 가능성이 높음 • 이직률: 퇴사할 가능성이 낮음 • 조직 성과: 7900개 사업부 연구 결과<br>\t\t\t\t\t<br>\t\t\t\t\t\t<br>- 구성원을 가치있게 여기는 팀일수록 고객만족도 향상<br>\t\t\t\t\t\t<br>- 생산성과 수익성 증가<br>\t\t\t\t\t<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>⚠️ 현재 직장 내 매터링 부족 현상<br>\t\t\t\t\t<br>• 투명인간 취급: 30%의 직원이 투명인간 취급을 받는다고 느낌 • 과소평가: 65%의 직원이 과소평가를 받는다고 느낌 • 외로움: 82%의 직원이 직장에서 외로움을 느낌 • 매터링 결핍: 점점 심해지고 있는 현상<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>&#128260; 매터링 결핍으로 인한 문제들<br>\t\t\t\t\t<br>• 낮은 몰입도: 10년 만에 경험하는 최저 수준의 직원 몰입도 • 존엄성 요구: 공정성에 대한 요구 증가 • 노동운동 증가: 늘어나는 노사 분쟁 • 정신건강 악화: 직원들의 정신건강 문제 심화 • 조용한 퇴사: 몇 년 전부터 만연한 현상 • 대퇴사: Great Resignation 현상 지속<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>&#128176; 기존 투자의 한계<br>\t\t\t\t\t<br>• 현재 투자 분야:<br>\t\t\t\t\t<br>\t\t\t\t\t\t<br>- 몰입을 위한 연구 및 플랫폼<br>\t\t\t\t\t\t<br>- 웰빙 프로그램<br>\t\t\t\t\t\t<br>- 채용 및 유지 이니셔티브<br>\t\t\t\t\t\t<br>- 임금 인상<br>\t\t\t\t\t\t<br>- DEI 이니셔티브 • 한계: 매터링은 급여, 정책, 혜택의 결과가 아님 • 핵심: 일상적인 대인관계에서 매터링을 근본적으로 느낄 수 있음<br>\t\t\t\t\t<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>&#127919; 매터링 - 다른 사람을 보고 듣기: 개념<br>\t\t\t\t\t<br>• 첫 번째 단계: 진정으로 사람을 '알아차리는 것(notice)' • 두 가지 핵심 기술:<br>\t\t\t\t\t<br>\t\t\t\t\t\t<br>- 사람을 보는 것(seeing): 인정하고 세부사항에 주의 기울이기<br>\t\t\t\t\t\t<br>- 사람을 듣는 것(hearing): 숨겨진 의미와 감정에 관심 보이기 • 심리적 안전: 편안하게 경험과 관점을 공유할 수 있는 분위기 조성<br>\t\t\t\t\t<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>&#128269; 알아차리기 vs 아는 것의 차이<br>\t\t\t\t\t<br>• 아는 것(Knowing): 가장 친한 친구를 잘 알 수 있음<br>\t\t\t\t\t<br>\t\t\t\t\t\t<br>- 하지만 힘든 시간을 보내고 있다는 사실은 놓칠 수 있음 • 알아차리는 것(Noticing): 현재 상태와 변화에 주의를 기울임<br>\t\t\t\t\t\t<br>- 팀원이 스트레스를 받고 있는지 감지<br>\t\t\t\t\t\t<br>- 토론에서 소외감을 느끼고 있는지 파악 • 오늘날의 한계: 바쁜 업무 환경에서는 자연스럽지 않음<br>\t\t\t\t\t<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>⏰ 시간과 공간 확보하기<br>\t\t\t\t\t<br>• 연구 결과: 2014년 연구<br>\t\t\t\t\t<br>\t\t\t\t\t\t<br>- 리더와 일주일에 1시간 이하 소통하는 직원<br>\t\t\t\t\t\t<br>- vs 일주일에 6시간 이상 소통하는 직원<br>\t\t\t\t\t\t<br>- <br>상사와 더 많은 시간을 보낸 직원들의 우위 <br>\t\t\t\t\t\t<br>\t\t\t\t\t\t\t<br>- 동기와 혁신성이 더 높음<br>\t\t\t\t\t\t\t<br>- 업무 몰입도가 30% 더 높음<br>\t\t\t\t\t\t<br>\t\t\t\t\t\t<br>\t\t\t\t\t<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>&#128197; 관계 구축을 위한 실천 방안<br>\t\t\t\t\t<br>• 우선순위 설정: 관계 구축의 우선순위를 정하고 계획 세우기 • 정기 미팅: 팀과의 정기적인 미팅 예약 • 일대일 미팅: 소홀히 하지 말 것 • 회의 전후 활용: 수다스러운 대화 최대한 활용 • 주기적 확인: 더 많은 시간을 필요로 하는 팀원 파악<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>&#129504; 깊이 집중하기<br>\t\t\t\t\t<br>• 주의 집중 능력 감소: 지난 10년 동안 우리의 주의 집중 능력이 감소 • 거래 중심 vs 관계 중심: 온전히 집중하지 못하면 거래에 치중 • 일상의 예시:<br>\t\t\t\t\t<br>\t\t\t\t\t\t<br>- 배달원에게 감사 인사를 하면서도 이름을 기억하지 못함<br>\t\t\t\t\t\t<br>- 회의 안건을 빠르게 처리하면서 참석자들 안부를 묻지 않음<br>\t\t\t\t\t\t<br>- 피드백 전달 시 팀원의 관점을 고려하지 않음<br>\t\t\t\t\t<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>❓ 의미 있는 질문하기<br>\t\t\t\t\t<br>• 기존 방식의 한계: \"안녕하세요?\" \"오늘 하루 어땠어요?\" 등의 일반적 인사 • 새로운 접근: 명확하고 개방적이며 탐구적인 질문 • 명확한 질문: 대상과 시간 포함<br>\t\t\t\t\t<br>\t\t\t\t\t\t<br>- \"안녕하세요?\" → \"오늘은 무엇에 집중하고 있나요?\" • 개방형 질문: 경험 공유 기회 제공<br>\t\t\t\t\t\t<br>- \"회의가 잘 진행됐나요?\" → \"회의에서 가장 중요한 인사이트는 무엇이었나요?\" • 탐색적 질문: 평가가 아닌 이해를 구하는 질문<br>\t\t\t\t\t\t<br>- \"오늘 무엇을 완료하셨나요?\" → \"오늘 프로젝트에서 가장 어려웠던 부분은 무엇이며 그 이유는 무엇인가요?\"<br>\t\t\t\t\t<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>&#128221; 상호작용 내용 메모하기<br>\t\t\t\t\t<br>• 유통센터 관리자 사례: 팀 규모가 너무 커서 세세한 이야기 파악이 어려웠음 • 매주 금요일 오후: 각 팀원에 대해 알아차린 점들을 기록<br>\t\t\t\t\t<br>\t\t\t\t\t\t<br>- 다가오는 회의에 불안감을 호소하는 직원<br>\t\t\t\t\t\t<br>- 특정 작업을 어려워하는 직원<br>\t\t\t\t\t\t<br>- 자녀가 새로운 운동을 시작했다는 직원 • 월요일 점검: \"지난주에 …라고 이야기한 걸로 기억하는데요\" • 결과: 다른 팀보다 지속적으로 높은 몰입도<br>\t\t\t\t\t<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>&#128066; 전체적인 의미를 파악하기 위한 경청<br>\t\t\t\t\t<br>• 적극적 경청의 한계: '기계적 조언자'로 변질되는 경우가 많음<br>\t\t\t\t\t<br>\t\t\t\t\t\t<br>- 침묵을 지킨 채 눈을 맞추고 고개를 끄덕임<br>\t\t\t\t\t\t<br>- 물리적으로는 듣고 있지만 정말 듣고 있다고 느끼지 못함 • 총체적 의미(Total Meaning): 칼 로저스의 개념<br>\t\t\t\t\t\t<br>- 말뿐 아니라 태도, 표정, 비언어적 단서에 주의<br>\t\t\t\t\t\t<br>- 근본적인 감정과 태도를 이해하고 대응<br>\t\t\t\t\t<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>&#128269; 깊은 의미 파악을 위한 4가지 기법<br>\t\t\t\t\t<br>• 명확한 설명 구하기:<br>\t\t\t\t\t<br>\t\t\t\t\t\t<br>- \"더 자세히 설명해 주시겠습니까?\"<br>\t\t\t\t\t\t<br>- \"'괜찮다'는 게 무슨 뜻입니까?\" • 세부사항 탐색하기:<br>\t\t\t\t\t\t<br>- \"그때 무슨 생각을 하고 있었나요?\"<br>\t\t\t\t\t\t<br>- \"예를 들어 설명해 주시겠어요?\" • 재확인 질문하기:<br>\t\t\t\t\t\t<br>- \"제가 들은 바에 따르면 …이 맞나요?\"<br>\t\t\t\t\t\t<br>- \"제가 이해한 게 맞는지 한번 확인해봅시다. 혹시 제가 놓친 게 있을까요?\" • 감정 표현 지원하기:<br>\t\t\t\t\t\t<br>- \"그래서 기분이 어땠죠?\"<br>\t\t\t\t\t\t<br>- \"그 일이 일어났을 때 어떤 기분이었나요?\"<br>\t\t\t\t\t<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>&#128157; 동정심을 갖고 대응하기<br>\t\t\t\t\t<br>• 어려움 발견: 사람을 더 보고 들을수록 불안, 스트레스 등 어려움을 발견 • 연민의 필요성: 무엇보다도 연민을 갖고 대해야 함 • 피해야 할 반응:<br>\t\t\t\t\t<br>\t\t\t\t\t\t<br>- \"지금이 딱 그럴 시기죠\"<br>\t\t\t\t\t\t<br>- \"그게 우리 비즈니스의 특징입니다\"<br>\t\t\t\t\t\t<br>- \"지금은 모두 과부하 상태예요\" • 배려의 효과: 스트레스 반응 감소, 혈압 저하, 신뢰 증진 • 조직 차원: 정서적 헌신, 생산성, 업무의 질, 참여도 향상<br>\t\t\t\t\t<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>&#127775; 작은 동정심의 큰 힘<br>\t\t\t\t\t<br>• 가상 회의 사례: 팀원이 과부하 상태라고 말했을 때 • 리더의 반응: 잠시 말을 멈추고 \"금요일 스탠딩 회의를 건너뛰는 거 어때요?\" • 결과: 모두가 눈에 띄게 긴장을 풀었음 • 교훈: 작은 배려도 큰 변화를 만들 수 있음<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>&#128260; 후속 조치의 중요성<br>\t\t\t\t\t<br>• 은행 연구 결과: 경청 행동에 관한 연구<br>\t\t\t\t\t<br>\t\t\t\t\t\t<br>- 대화 중 청취자의 반응뿐만 아니라<br>\t\t\t\t\t\t<br>- 대화 후 몇 주, 몇 달 동안의 일이 중요 • 다양한 조치: 들은 내용 재확인부터 사업 변화까지 • 유나이티드 항공 사례: 오스카 무노즈 CEO<br>\t\t\t\t\t\t<br>- 승무원 에이미의 \"항상 '죄송합니다'라고 말해야 하는 것에 지쳤어요\"<br>\t\t\t\t\t\t<br>- 경청 투어 후 스케줄 문제 해결, 근무 조건 개선<br>\t\t\t\t\t\t<br>- 결과: 고객 만족도, 직원 참여도, 운영 탁월성 상위권, 주가 50% 상승<br>\t\t\t\t\t<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>&#127919; 매터링 - 사람 인정하고 필요성 보여주기: 개념<br>\t\t\t\t\t<br>• 인정의 의미: 단순히 감사하는 것이 아닌 고유성(uniqueness) 표현 • 증거 제시: 다른 사람들이 그들에게 의존하고 있음을 보여줌 • 대체 불가능성: 그들의 노력이 대체 불가능하다는 점 강조 • 존재의 필요성: 그들이 왜 필요한지 인식하게 만들기<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>&#128202; 인정과 감사 표현의 부족<br>\t\t\t\t\t<br>• 존 템플턴 재단 설문조사:<br>\t\t\t\t\t<br>\t\t\t\t\t\t<br>- 90%의 사람들이 감사함을 느낀다고 답함<br>\t\t\t\t\t\t<br>- 그 감사를 표현한 사람은 절반도 되지 않음 • 탤런트LMS 설문조사:<br>\t\t\t\t\t\t<br>- 60%의 사람들이 직장에서 자신을 진심으로 인정해주는 관리자가 한 명도 없다고 답함 • 문제의 심각성: 대부분이 인정과 감사를 잘 표현하지 못함<br>\t\t\t\t\t<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>&#127775; 독특한 재능 짚어서 이야기하기<br>\t\t\t\t\t<br>• 고유성 인식: 사람들은 다른 사람과의 비교를 통해 고유성을 인식 • 1977년 연구: 성격 테스트 피드백 실험<br>\t\t\t\t\t<br>\t\t\t\t\t\t<br>- 절반은 동료들과 비교한 '차이 점수' 제공<br>\t\t\t\t\t\t<br>- 독특하다는 말을 들은 참가자들이 더 높은 만족도와 자기 인식 보고 • 피상적 피드백의 한계: 매일 같은 \"감사합니다\" 말은 의미 부족 • 프로그램의 한계: 상, 식대, 인센티브는 개인적 관계를 대신할 수 없음<br>\t\t\t\t\t<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>&#127919; 매터링 확인을 위한 4가지 요소<br>\t\t\t\t\t<br>• 강점: 그가 좋아하는 일과 잘하는 일이 겹치는 부분 • 목적: 그가 세상에 기여하고자 하는 바 • 관점: 그가 세상을 보는 방식 • 지혜: 살아가면서 배운 것 • 실행 방법: 이런 재능에 이름을 붙여 영향력 인지하게 하고 육성<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>&#128161; 현명한 피드백의 힘<br>\t\t\t\t\t<br>• 데이비드 예거의 연구: '현명한 피드백' 개념 • 기존 방식: 비판하거나 개선이 필요한 부분 지적 • 새로운 방식:<br>\t\t\t\t\t<br>\t\t\t\t\t\t<br>- 누군가가 자신을 믿는다는 것을 보여줌<br>\t\t\t\t\t\t<br>- 강점을 상기시킴<br>\t\t\t\t\t\t<br>- 지원을 제공함<br>\t\t\t\t\t\t<br>- 신뢰를 쌓음 • 결과: 성과 개선 가능성이 더 큼 • 인정의 역할: 성과 격차 해소에 중요한 역할<br>\t\t\t\t\t<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>&#128218; 의미 있는 스토리 전달하기<br>\t\t\t\t\t<br>• 거리감 해소: 최종 사용자나 고객으로부터 몇 단계 떨어진 역할의 경우 • 영향력 전달: 실제적이고 구체적인 이야기 수집 및 공유 • 배관공 사례: 14시간 교대근무 후 지친 상업용 배관 공사업체 팀<br>\t\t\t\t\t<br>\t\t\t\t\t\t<br>- 여섯 살 아들이 도넛 가게에서 즐거워하는 사진 공유<br>\t\t\t\t\t\t<br>- \"우리가 그 프로젝트를 했어요!\"<br>\t\t\t\t\t\t<br>- 30년 경력 배관공: \"제 직업에 대해 그런 식으로 생각해 본 적이 없어요\"<br>\t\t\t\t\t<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>&#128200; 스토리의 동기 부여 효과<br>\t\t\t\t\t<br>• 애덤 그랜트의 연구: 조직심리학자 • 놀라운 효과: 업무가 다른 사람에게 주는 혜택에 대한 실제 사례를 한 번만 들어도 동기가 400% 이상 높아짐 • 실행 방안: 고객, 회사, 동료, 친구로부터 의미 있는 이야기를 수집하고 공유하는 프로세스 마련 • 지속적 관리: 정기적으로 새로운 스토리 발굴 및 공유<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>&#128640; 없어서는 안 될 존재임을 보여주기<br>\t\t\t\t\t<br>• 방법: 작은 업무라도 더 큰 목표나 목적에 얼마나 중요한 역할을 하는지 정확히 보여주기 • NASA 청소부 사례: \"달에 사람을 보내는 일을 돕고 있습니다\"<br>\t\t\t\t\t<br>\t\t\t\t\t\t<br>- 존 F. 케네디 대통령의 질문에 대한 답변<br>\t\t\t\t\t\t<br>- 약 30만 명의 분산된 계약직 근로자 포함 모든 참여자에게 중요성 전달<br>\t\t\t\t\t<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>&#129692; 래더링(Laddering) 기법<br>\t\t\t\t\t<br>• 앤드루 카턴의 발견: NASA의 '달로 가는 사다리' 개념 • 오언 메이너드: NASA 임무운영책임자가 칠판에 적은 사다리<br>\t\t\t\t\t<br>\t\t\t\t\t\t<br>- 맨 아래: 현재 작업 그룹<br>\t\t\t\t\t\t<br>- 다음 단계: 측정 가능한 목표들이 순차적으로 연결<br>\t\t\t\t\t\t<br>- 맨 위: \"10년 안에 사람을 달에 보내는 것\" • 효과: 모두가 각 단계가 어떻게 다음 단계로 이어지는지 정확히 알 수 있음<br>\t\t\t\t\t<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>&#128295; 래더링 실행 방법<br>\t\t\t\t\t<br>• 사다리 구성:<br>\t\t\t\t\t<br>\t\t\t\t\t\t<br>- 맨 위: 조직의 목적, 부서의 가치, 팀의 비전 등 의미 있는 결과<br>\t\t\t\t\t\t<br>- 맨 아래: 개인의 업무와 의견 • 구체성 중요: 구체적일수록 효과적 • 연결성 강조: 개인 의견이 궁극적 성과와 연결되는 실제적이고 가시적인 결과 제시 • 정기 확인: 사람들이 사다리를 정기적으로 확인하며 필수 불가결성 재확인<br>\t\t\t\t\t<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>&#127919; 매터링 기술 확장하기: 개념<br>\t\t\t\t\t<br>• 소매 기업 사례: 세계 최대 규모 소매 기업의 '사람 우선' 문화 확장 요청 • 기술적 역량: 매장 디스플레이 기획 등 업무 역량은 전문적 수준 • 부족한 부분: 직원들이 어떻게 부가가치를 창출하는지 알기 위한 관리자 기술 • 필요성: 다른 업무 역량에 집중하는 것과 비슷한 노력 필요<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>&#127919; 1단계: 올바른 의도 설정과 동기 강화<br>\t\t\t\t\t<br>• 잘못된 접근: 직원을 생산성, 수익, 성공 달성을 위한 수단으로 생각 • 올바른 접근: 사람을 그 자체로 가치 있는 목적으로 보기<br>\t\t\t\t\t<br>\t\t\t\t\t\t<br>- 생생하고 복잡하며 중요한 삶을 가진 인간으로 대하기 • 결과: 몰입 증가, 이직률과 번아웃 감소 • 주의사항: 이런 목적 달성을 위한 전술로 매터링을 실행하면 안 됨 • 본질: 존엄성에 대한 인간의 기본적 욕구 충족<br>\t\t\t\t\t<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>&#128171; 감성의 닻 만들기<br>\t\t\t\t\t<br>• 필요성: 사람들에게 삶에서 중요한 경험을 하는 것이 어떤 것인지 제시 • 위험: 제시하지 않으면 또 하나의 이니셔티브로 여김 • 첫 번째 연습: 리더들에게 질문하기<br>\t\t\t\t\t<br>\t\t\t\t\t\t<br>- 언제 자신이 다른 사람에게 중요하다고 느낀 적이 있나?<br>\t\t\t\t\t\t<br>- 어떤 느낌이었나?<br>\t\t\t\t\t\t<br>- 그 사람은 어떻게 말하고 어떤 행동을 했나?<br>\t\t\t\t\t\t<br>- 그 사람은 어떤 기술을 사용했나? • 결과: 리더가 영감을 받고 기술 학습의 필요성을 깨달음<br>\t\t\t\t\t<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>&#128736;️ 2단계: 기술 개발과 연습<br>\t\t\t\t\t<br>• 기술 명명: 이런 기술에 이름을 붙이고 연습 요구사항 구축 • 조직 맞춤화: 조직에 맞게 기술 조정 필요 • 핵심 질문: 리더가 개발해야 할 역량은 무엇인가? • 산출물 옵션:<br>\t\t\t\t\t<br>\t\t\t\t\t\t<br>- 리더가 매일 어떻게 행동해야 하는지 정의하는 '리더십 체크리스트'<br>\t\t\t\t\t\t<br>- 인재 육성 접근방식을 전달하는 포괄적 가이드북<br>\t\t\t\t\t<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>&#128207; 3단계: 매터링 측정하기<br>\t\t\t\t\t<br>• 측정의 필요성: 측정과 책임 없이는 기술 향상 여부를 알 수 없음 • 자기 과대평가 경향: 모두가 이 영역에서 자신의 노력을 과대평가하는 경향 • 정확한 파악: 조직과 리더가 개선할 부분을 보다 정확하게 파악하는 방법<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>&#128221; 매터링 측정 방법<br>\t\t\t\t\t<br>• 자기 평가: 적어도 분기별로 그룹 환경에서 자기 평가 수행<br>\t\t\t\t\t<br>\t\t\t\t\t\t<br>- 동료 코칭의 기회 제공 • 팀 평가: 자기 평가만으로는 부족<br>\t\t\t\t\t\t<br>- 팀원들에게 동일한 행동에 대해 리더를 평가하도록 요청<br>\t\t\t\t\t\t<br>- 예시: \"나는 다른 사람의 개인 및 업무 생활의 세부사항을 기억하고 확인한다\" → \"우리 리더는 다른 사람의 개인 및 업무 생활의 세부사항을 기억하고 확인한다\"<br>\t\t\t\t\t<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>&#127757; 4단계: 환경 최적화<br>\t\t\t\t\t<br>• 현실적 어려움: 많은 조직에서 리더는 중요한 일을 처리하는 데 어려움 • 물류센터 예시: 하루 종일 추적 업무로 타인에 대한 관심 표현 시간 부족 • 자율에 맡기는 한계: 배려 표현에 대한 의무가 없음 • 보상의 힘: 공식적 또는 비공식적 보상이 행동에 미치는 강력한 영향<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>&#127942; 배려 문화 조성을 위한 보상 체계<br>\t\t\t\t\t<br>• 기존 관행 중단: 사람들에게 얼마나 많은 일을 하게 하는지 기준으로 보상하거나 승진시키지 말 것 • 새로운 기준: 리더가 사람들에게 어떤 느낌을 주는지에 따라 보상 • 피해야 할 것: 다른 사람을 함부로 대하는 고성과자에게 보상하거나 승진시키지 말 것 • 추천할 것: 성과를 잘 내면서도 사람들을 품위 있게 대하고 포용하며 존중하고 인정하는 리더를 보상하고 육성하며 승진시킬 것<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>&#127970; 아메리칸 익스프레스 사례<br>\t\t\t\t\t<br>• 배경: 코로나19 팬데믹 종료 1년 후, 출장 처리 직원들의 사기 저하와 피로도 증가 • 마크 루드 수석 부사장: 협력하여 매터링 아이디어 도입 • 1단계: 미국, 아일랜드, 인도 등 다양한 지역 리더들에게 매터링 교육<br>\t\t\t\t\t<br>\t\t\t\t\t\t<br>- 매터링의 힘, 매터링 부재 시 대가, 중심과 목적 설명<br>\t\t\t\t\t\t<br>- 한 리더의 반응: \"다시 인간이 될 수 있는 허락을 받았다\" • 문화적 보편성: 매터링은 모든 문화권에서 공감을 불러일으킴<br>\t\t\t\t\t<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>&#128203; 아메리칸 익스프레스 구체적 실행<br>\t\t\t\t\t<br>• 2단계: 리더들을 소그룹으로 나누어 브레인스토밍<br>\t\t\t\t\t<br>\t\t\t\t\t\t<br>- 알아차리고 인정하며 필요로 하는 구체적 행동과 기술 개발 • 구체적 행동들:<br>\t\t\t\t\t\t<br>- 모든 통화에서 얼굴을 마주 보고 영상 공유하며 적극적 경청 보여주기<br>\t\t\t\t\t\t<br>- 직원이 어려움을 토로할 때 적극적으로 도움 제공하기<br>\t\t\t\t\t\t<br>- 업무 할당 시 '무엇을', '어떻게'에 앞서 '왜'를 먼저 설명하기<br>\t\t\t\t\t<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>&#128196; '사람이 중요한 이유' 청사진<br>\t\t\t\t\t<br>• 청사진 구성: \"우리는 각 직원이 주목받고 인정받으며 필요한 존재라고 느껴야 한다고 믿는다\"로 시작 • 상세 내용: 각 행동에 기술과 실행 조언 덧붙임 • 활용 범위: 조직의 리더십 기술 개발, 리더 평가, 팀 평가의 기본 커리큘럼 • 결과: 1년 반 동안 지속된 높은 이직률이 50% 감소, 직원 몰입 점수 크게 상승<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>&#128173; T.S. 엘리엇의 메시지<br>\t\t\t\t\t<br>• 명언: \"다른 사람에게 의미를 가져야 살아 있는 것이다\" • 조직 차원의 의미: 조직 전체에서 서로의 필요와 가치를 진정으로 보고 듣고 인정하고 표현하기 • 관계 증진 이상: 단순한 관계 개선을 넘어선 의미 • 상호 필요성: 서로가 필요하다고 느끼며 서로를, 나아가 직장을 활기차게 만들기 • 궁극적 목표: 생동감 있는 조직 문화 조성<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>&#127891; 저자 소개<br>\t\t\t\t\t<br>• 잭 머큐리오(Zach Mercurio): 목적 지향적 리더십과 의미 있는 일에 관한 연구자이자 고문 • 소속: 콜로라도주립대 의미와 목적 센터(Center for Meaning and Purpose) 선임 명예 연구원 • 저서: 이 아티클의 원서 ＜The Power of Mattering＞(Harvard Business Review Press, 2025) • 편집: 이규열<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>&#128172; 토론 질문 1-5<br>\t\t\t\t\t<br>\t\t\t\t\t\t<br>- 제인의 사례에서 상사의 작은 관심이 18년간의 근속으로 이어진 것처럼, 여러분이 직장에서 경험한 '매터링'의 순간이 있다면 무엇인가요? 그 경험이 업무 몰입도나 조직에 대한 애착에 어떤 영향을 미쳤나요?<br>\t\t\t\t\t\t<br>- 현재 우리 조직에서 직원들이 '투명인간 취급', '과소평가', '외로움'을 느끼고 있다는 신호들을 발견할 수 있나요? 이러한 매터링 결핍 현상이 우리 조직의 성과나 문화에 미치고 있는 구체적인 영향은 무엇일까요?<br>\t\t\t\t\t\t<br>- 바쁜 업무 환경에서 팀원들을 진정으로 '알아차리기' 위해 여러분은 어떤 구체적인 방법을 사용하고 계신가요? 시간과 공간 확보, 깊이 집중하기, 의미 있는 질문하기 중 가장 어려운 부분은 무엇인가요?<br>\t\t\t\t\t\t<br>- 아티클에서 제시한 4가지 경청 기법(명확한 설명 구하기, 세부사항 탐색하기, 재확인 질문하기, 감정 표현 지원하기) 중에서 여러분이 가장 잘 활용하고 있는 것과 가장 개선이 필요한 것은 무엇인가요?<br>\t\t\t\t\t\t<br>- 팀원들에게 그들의 독특한 재능(강점, 목적, 관점, 지혜)을 인정해주기 위해 여러분은 어떤 방식을 사용하고 계신가요? 단순한 감사 표현을 넘어 고유성을 표현하는 구체적인 사례를 공유해주세요.<br>\t\t\t\t\t<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>&#128172; 토론 질문 6-10<br>\t\t\t\t\t<br>\t\t\t\t\t\t<br>- 여러분의 업무가 최종 고객이나 사용자에게 미치는 영향에 대한 구체적이고 의미 있는 스토리를 가지고 계신가요? 이러한 스토리가 팀원들의 동기 부여에 실제로 어떤 효과를 가져왔는지 경험을 나누어주세요.<br>\t\t\t\t\t\t<br>- '래더링' 기법을 활용하여 여러분 팀원들의 개별 업무가 조직의 더 큰 목표와 어떻게 연결되는지 구체적으로 설명할 수 있나요? 각자가 '없어서는 안 될 존재'임을 보여주는 방법은 무엇일까요?<br>\t\t\t\t\t\t<br>- 조직에서 매터링 문화를 확산시키기 위해 가장 중요한 단계는 무엇이라고 생각하시나요? 올바른 의도 설정, 기술 개발, 측정, 환경 최적화 중에서 우리 조직에 가장 시급한 부분은 무엇일까요?<br>\t\t\t\t\t\t<br>- 현재 우리 조직의 보상 및 승진 체계가 '매터링 문화'를 지원하고 있다고 생각하시나요? 성과만을 중시하는 문화에서 사람을 배려하는 리더를 육성하기 위해 어떤 변화가 필요할까요?<br>\t\t\t\t\t\t<br>- 매터링이 단순히 직원 만족을 위한 '좋은 일'이 아니라 비즈니스 성과와 직결된다는 관점에서, 여러분의 리더십 스타일이나 팀 운영 방식에서 가장 우선적으로 개선하고 싶은 부분은 무엇인가요? • **<br>\t\t\t\t\t<br>\t\t\t\t\t<br><br>\t\t\t\t\t출처: <<a href=\"https://claude.ai/chat/0d38cb66-1f0b-4ae2-9563-4e89c6bbb888\" target=\"_blank\">https://claude.ai/chat/0d38cb66-1f0b-4ae2-9563-4e89c6bbb888</a>> <br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t출처: <<a href=\"https://claude.ai/chat/0d38cb66-1f0b-4ae2-9563-4e89c6bbb888\" target=\"_blank\">https://claude.ai/chat/0d38cb66-1f0b-4ae2-9563-4e89c6bbb888</a>> <br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>\t\t\t\t<br>\t\t\t\t<br>\t\t\t\t\t<br>인사조직<br>\t\t\t\t\t<br>코칭의 '밀당' 비법<br>\t\t\t\t\t<br><a href=\"https://www.hbrkorea.com/article/author/wno/3831\" target=\"_blank\">루치라 차우다리(Ruchira Chaudhary)</a><br>\t\t\t\t\t<br>디지털<br>\t\t\t\t\t<br>2025. 5. 14.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>다년간에 걸친 연구 이니셔티브인 구글의 일명&#160;<a href=\"https://www.betterup.com/blog/project-oxygen\" target=\"_blank\">산소 프로젝트</a>Project Oxygen에서는&#160;수천 명의 직원 데이터를 분석해 매우 효과적인 관리자의 자질을 파악했다. 수년 동안 강력한 코칭 기술이 꾸준히 상위권을 차지했다. 이 결과는&#160;<a href=\"https://hbr.org/2022/10/successful-leaders-are-great-coaches\" target=\"_blank\">뛰어난 리더가&#160;</a><a href=\"https://www.researchgate.net/publication/276893694_Coaching_in_Organizations_-_A_Meta-Analytic_Review_of_Individual_Level_Effects\" target=\"_blank\">코칭을</a>&#160;통해 다른 직원의 역량을 끌어올린다는 다른 연구 결과와도 일치한다.&#160;<a href=\"https://psycnet.apa.org/record/2014-28285-006\" target=\"_blank\">한 연구에</a>&#160;따르면 직원들이 코칭을 잘 받으면 도전에 더 적극적으로 대처하고 창의적으로 문제를 해결하는 것으로 나타났다.&#160;<a href=\"https://www.researchgate.net/publication/364572344_Coaching_Impact_on_Employees_and_Organizational_Performance_in_the_Middle_East_Healthcare_Industry\" target=\"_blank\">다른 연구에</a>&#160;따르면 효과적인 코칭은 직원의 강점을 파악하는 능력을 향상시키고 사기를 높이며 목표 달성에 도움을 주는 것으로 나타났다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>하지만 코칭의 중요성에도 불구하고 많은 리더가 코칭을 자연스럽게 받아들이지 못한다.&#160;<a href=\"https://hbr.org/2018/08/most-managers-dont-know-how-to-coach-people-but-they-can-learn\" target=\"_blank\">연구에</a>&#160;따르면 리더들은 실제로는 지시를 내릴 뿐인데도 코칭을 하고 있다고 착각하는 경우가 많다. 필자의 책 ＜Coaching: The Secret Code to Uncommon Leadership＞에 기반해 임원 코치로서 경험을 되돌아본 결과, 그 원인은 대개 훈련 부족이라는 것을 알 수 있었다. 또한 새로 승진한 많은 리더는 모든 해답을 제시해야 한다고 생각하기 때문에 코칭 자체를 두려워하기도 한다. 하지만 사실 가장 효과적인 코칭은 직원들 스스로 답을 찾도록 돕는 것이다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>좋은 소식은 코칭은 배울 수 있는 기술이며 근육처럼 연습을 통해 더 강해지고 직관적으로 성장할 수 있는 기술이라는 것이다. 그렇다면 어떻게 다른 사람을 코칭하는 법을 배우고, 가장 좋은 방법을 결정하고, 일을 더 잘 해낼 수 있을까?<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>코칭이란 무엇인가?<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>‘코치’라는 용어는 15세기 헝가리의 콕스 마을에서&#160;<a href=\"https://3seaseurope.com/coach-kocs-hungary/\" target=\"_blank\">유래됐다</a>. 사람들을 목적지까지 데려다주는 마차의 일종을 묘사하는 데 사용됐다.&#160;<a href=\"https://www.thecoachpartnership.com/the-origin-of-the-word-coach/\" target=\"_blank\">1800년대에는</a>&#160;다른 사람의 목표 달성을 돕는 사람을 비유하는 말이 됐고, 특히 학생들이 그들의 시험 준비를 도와주는 옥스퍼드 가정교사를 가리키는 말로 사용했다. 이는 오늘날에도 여전히 유효한 정의다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>헤르미니아 이바라Herminia Ibarra와 앤 스쿨라Anne Scoular에 따르면&#160;<a href=\"https://hbr.org/2019/11/the-leader-as-coach\" target=\"_blank\">코칭에서는</a>&#160;답을 제공하는 대신 질문을 하고, 직원의 행동을 판단하는 대신 지원하며, 해야 할 일을 지시하는 대신 개발을 촉진한다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>나는 코칭을 리더가&#160;비지시적이고&#160;자기 주도적인&#160;행동을 통해 다른 사람의 성과와 잠재력을 극대화하는 과정으로 정의한다. 효과적인 코칭 관계에서는 두 가지 행동이 함께 사용돼 사람들이 자립성과 개인적 성장을 향해 나아갈 수 있도록 안내한다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>다양한 코칭 스타일<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>임원 코치로서 나는 코칭에 '올바른 방법'이 있느냐는 질문을 자주 받는다. 그에 대한 답은 아니라는 것이다. 코칭 스타일은 코치의 경험과 전문성, 당면한 상황이나 업무, 코칭 대상자의 경험 수준에 따라 달라진다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>신입 관리자와 노련한 관리자 모두에게 이 과정은 지루하게 느껴질 수 있다. 솔직히 파악해야 할 것이 많다. 그래서 나는 관리자가 코칭의 여정을 탐색하는 데 도움이 되는 프레임워크를 설계했다. ‘코칭 스타일Coaching Styles’이라고 부르는 이 프레임워크는 다양한 연령대, 산업, 업무 분야, 경력 수준에 걸쳐 100명이 넘는 리더와의 인터뷰, 마일스 다우니Miles Downey의&#160;<a href=\"https://growthecoach.com/wp-content/uploads/2022/01/Coaching-Spectrum.pdf\" target=\"_blank\">코칭 스펙트럼과</a>&#160;같은 다른 코칭 프레임워크에 대한 연구, 관련 학술 문헌에 대한 검토 등을 바탕으로 만들어졌다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>이 프레임워크는 선수의 기술과 성과를 개발하기 위해 스포츠 분야에서 널리 사용되는&#160;<a href=\"https://www.instructionalcoaching.com/push-and-pull-learning/\" target=\"_blank\">‘밀기</a>push’ 와 ‘당기기pull’의 개념을 기반으로 한다. 밀기 코칭 방식은 코치가 명확한 지시, 안내 및 피드백을 제공하는 접근 방식을 말한다. 이 스타일은 실무적이며 선수에게 무엇을 어떻게 해야 하는지 알려주는 것을 포함한다. 당기기 코칭은 직접적인 지시보다는 안내와 지원을 목표로 하는 촉진적 접근 방식을 채택한다. 이 스타일은 개방형 질문을 통해 자기 성찰을 유도해 선수가 스스로 해결책을 찾을 수 있도록 한다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>코칭 스타일 프레임워크는 Y축에 '당기기', X축에 '밀기' 요인이 있는 2x2 매트릭스다. 각 사분면은 서로 다른 수준의 당기기와 밀기가 특징이다. 당기기 수준이 높을수록 코칭 스타일에 더 많은 준비가 필요하다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<a href=\"https://www.betterup.com/blog/project-oxygen\" target=\"_blank\">\t\t\t\t\t\t\t\t\t\t\t</a><br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>나와 구성원에게 적합한 스타일 선택하기<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>이 가이드를 참고해 특정 상황에 가장 효과적인 코칭 스타일을 찾아보라. 연습을 하다 보면 여러 스타일을 편안하게 전환할 수도 있다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>말하기(높은 밀기+낮은 당기기)<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>오른쪽 아래 사분면에는 말하기(또는 지시) 코칭 스타일이 있다. 대부분의 관리자가 이&#160;<a href=\"https://zengerfolkman.com/wp-content/uploads/2019/08/Bringing-Science-to-the-Art-of-Coaching_WP-2019.pdf\" target=\"_blank\">스타일을 기본 방식으로</a>&#160;사용한다. 이 스타일에서 리더는 일반적으로 지식을 전수하고 직원의 목표 달성을 돕기 위해 자신의 경험을 활용한다. 본질적으로 지시적이기 때문에 이 스타일을 사용해 직원을 코칭하는 것은 다른 코칭 스타일보다 준비가 훨씬 덜 필요하다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>말하기 스타일은 업무가 표준화돼 있고 반복적인 작업을 하는 직원(예: 콜센터 직원 또는 조립 라인 관리자)을 코칭할 때 가장 적합하다. 또한 데이터 입력이나 소셜 미디어 관리 등 업무나 개인에게 더 많은 감독이 필요한 경우에도 적합하다. 긴급하거나 즉각적인 조치가 필요한 상황에서도 유용할 수 있다. 하지만 이 스타일은 신중하게 사용해야 한다. 직원들이 자율성이 부족하다고 느끼며 창의성이 억눌리고 사기가 저하될 수 있다. 이 스타일을 과도하게 사용하면&#160;<a href=\"https://hbr.org/2023/09/the-anxious-micromanager\" target=\"_blank\">마이크로 매니징으로</a>&#160;인식될 수 있다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>손 떼기(낮은 밀기+낮은 당기기)<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>왼쪽 하단에는 손 떼기 코칭 스타일이 있다. 여기서 코치는 조언자 역할을 하며 상당한 자율성과 의사결정의 자유를 부여한다. 코치는 어떤 일을 성공하는 데 필요한 도구와 자원을 제공하고 그들이 필요할 때 지원을 제공한다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>팀원이 업무 또는 당면한 프로젝트를 수행하는 데 경험이 풍부하고 유능할 때 손 떼기 스타일을 사용하라. 경험이 많은 직원이나 해당 업무를 숙달한 직원들을 코칭하는 경우가 포함된다. 모든 것이 제대로 진행되고 있는지 정기적으로 확인하는 등 점검하고 균형을 잡아줘야 할 필요가 있지만, 기본적으로는 감독을 거의 또는 전혀 받지 않고 구성원들이 편안하게 일할 수 있도록 해야 한다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>예를 들어 선임 제품 매니저가 찾아와서 \"새 프로젝트에서 포커스그룹 토론을 몇 번 해야 합니다. 저는 제품 출시를 위해 이 작업을 수행한 적이 있습니다. 괜찮을 것 같아요\"라고 말한다. 손 떼기 코치로서 여러분은 \"좋아요. 대략적인 계획을 저와 공유하고 주요 일정에 대해 계속 알려주실 수 있나요? 내부 예산이나 승인 등 지원이 필요하다면 기꺼이 개입하겠습니다\"라고 말할 수 있다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>묻고 듣기(높은 당기기+낮은 밀기)<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>왼쪽 상단에는 가장 전통적인 코칭의 정의와 밀접하게 연관된 묻고 듣기 스타일이 있다. 이 스타일은 적극적으로 경청하고 생각을 유도하기 위해 설득력 있고&#160;<a href=\"https://hbr.org/2014/12/the-questions-good-coaches-ask\" target=\"_blank\">개방적인 질문을</a>&#160;하는 행동을 포함한다. 예를 들어 \"이 과제에 접근하는 가장 좋은 방법은 무엇이라고 생각하세요?\" 또는 \"이 프로젝트에 대한 고객 피드백이 좋지 않다고 말씀하셨잖아요. 문제의 핵심이 무엇이라고 생각하시나요?\"라고 질문할 수 있다. 이러한 질문은 코치 대상이 지시를 받는 대신 스스로 성찰하고 깊이 생각하며 스스로 의사결정을 내릴 수 있도록 도와준다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>묻고 듣기 스타일은 많은 준비가 필요하며 올바른 질문을 하기 위해서는 구성원에게 무슨 일이 일어나고 있는지 잘 파악하고 있어야 한다. 따라서 대신 말하기 스타일에 의존하고 싶은 유혹을 느낄 수 있다. 처음에는 어려울 수 있지만 묻고 듣기 스타일은 연습할수록 더 쉬워진다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>이 스타일은 비판적 사고, 책임감, 문제 해결 능력을 키우고 향상시키는 데 도움이 되므로 새로운 리더나 리더로 성장하는 이들을 코칭하는 데 유용하다. 독립적으로 사고하고 의사결정을 내리는 방법을 배우면 그들의 잠재력을 극대화할 수 있다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>협력하기(높은 당기기+높은 밀기)<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>오른쪽 위 사분면에는 협력하기 코칭 스타일이 있다. 당기기와 밀기가 모두 강하며 코칭의&#160;<a href=\"https://centaur.reading.ac.uk/74522/1/Jones%20et%20al%202016_JOOP.pdf\" target=\"_blank\">스위트 스폿에</a>&#160;해당한다. 코칭 전문가들은&#160;<a href=\"https://www.researchgate.net/publication/352437708_A_Continuum_of_Professional_Learning_Conversations_Coaching_Mentoring_and_Everything_in_Between_A_Think_Piece_Working_Paper\" target=\"_blank\">대부분의 관리자가 이 지점에 도달하기 위해 노력</a>해야 한다고 말할 것이다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>이 스타일은 기존의 코칭(개방형 질문)과 멘토링(상담 및 처방적 조언 제공)을 결합해 앞으로 나아갈 방향을 함께 모색하는 방식이라고 생각하면 된다. 이 접근 방식 역시 상당한 준비가 필요하다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>이 스타일은 보고자의 경력 수준과 관계없이, 조언과 안내가 동시에 필요한 상황에 가장 적합하다. 예를 들어, 선임 관리자가 커리어 개발 계획을 세우고 있으며 공급망 부문에서 총괄 관리자로의 전환을 희망한다고 하자. 이 경우 단순히 그 전환이 커리어에 도움이 될지 말지 말해주는 대신, 보다 협업적인 접근 방식을 택하는 것이 바람직하다. 대화를 시작할 때는 다음과 같은 개방형 질문을 통해 성찰을 유도할 수 있다. “총괄 관리자로 전환하려면 어떤 역량을 개발해야 한다고 생각하나요? “왜 공급망 외에 AI 관련 역량도 함께 키워야 한다고 생각하나요?”<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>그런 다음에 조언으로 넘어갈 수 있다. “신사업 개발에 대한 당신의 열정과 총괄 관리자로의 전환 의지를 고려할 때, 최근 방글라데시에 신설한 지부의 지사장에 지원하는 것을 생각해본 적 있나요? 제가 그 직무 기술서를 살펴봤는데 당신의 역량과 잘 맞는 것 같습니다. 어떻게 생각하세요?”<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>이러한 접근 방식은 자기 인식을 촉진하고, 올바른 경험 기반 지침을 제공하며, 직원이 모든 요소를 고려한 후 최종 의사결정을 내릴 수 있도록 권한을 부여한다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>효과적인 코칭의 핵심은 언제 다양한 스타일과 접근법을 사용해야 하는지를 분별하는 능력에 있다. 이는 경험과 연습을 통해 진화하는 역동적인 과정이다. 코칭 기술을 계속 연마하다 보면 대상자의 고유한 요구에 맞게 방법을 조정할 수 있는 직관력을 자연스럽게 키울 수 있다. 뛰어난 리더는 다양한 코칭 스타일을 능숙하게 혼합하는 기술을 습득한다. 이들은 언제 주도권을 잡아야 하는지, 언제 지침을 제공해야 하는지, 언제 한발 물러서서 다른 사람들이 주도할 수 있도록 힘을 실어줘야 하는지 잘 알고 있다. 이 여정은 코치로서 여러분과 여러분이 이끄는 사람들 모두의 지속적인 성장에 관한 것이다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>원문 |&#160;<a href=\"https://hbr.org/2025/03/4-styles-of-coaching-and-when-to-use-them?autocomplete=true\" target=\"_blank\">4 Styles of Coaching—and When to Use Them</a><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><a href=\"https://hbr.org/search?term=Ruchira%20Chaudhary&search_type=search-all\" target=\"_blank\">루치라 차우다리</a>는 시카고대학교 부스 경영대학원 출신으로, 기업 현장과 학계를 넘나드는 전문가다. 그녀는 저명한 임원 코치이자 여러 최상위 경영대학원의 겸임 교수이며, 조직 전략 솔루션을 전문으로 하는 트루노스 컨설팅TrueNorth Consulting의 창립자다. 또한, ＜Coaching: The Secret Code to Uncommon Leadership＞의 저자이기도 하다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>에디팅&#160;조민선<br>\t\t\t\t\t<br><br>\t\t\t\t\t출처: <<a href=\"https://www.hbrkorea.com/article/view/atype/di/category_id/2_1/article_no/1368/page/1\" target=\"_blank\">https://www.hbrkorea.com/article/view/atype/di/category_id/2_1/article_no/1368/page/1</a>> <br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>\t\t\t\t\t<br>&#127919; 코칭의 '밀당' 비법<br>\t\t\t\t\t<br>총 슬라이드 수: 17장<br>\t\t\t\t\t<br>원문 정보 • 제목: 코칭의 '밀당' 비법 • 분야: 인사조직 • 발행일: 2025년 5월 14일<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>&#128218; 저자 및 출처 정보<br>\t\t\t\t\t<br>저자: 루치라 차우다리(Ruchira Chaudhary) • 시카고대학교 부스 경영대학원 출신 • 저명한 임원 코치 및 여러 최상위 경영대학원 겸임 교수 • 트루노스 컨설팅(TrueNorth Consulting) 창립자 • 『Coaching: The Secret Code to Uncommon Leadership』 저자<br>\t\t\t\t\t<br>출처: 디지털 매거진 원문: 4 Styles of Coaching—and When to Use Them<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>&#127795; 아티클 구조<br>\t\t\t\t\t<br>1. 서론<br>\t\t\t\t\t<br>\t\t\t\t\t\t<br>- 구글 산소 프로젝트와 코칭의 중요성<br>\t\t\t\t\t\t<br>- 코칭의 현실적 문제점<br>\t\t\t\t\t<br>\t\t\t\t\t<br>2. 코칭의 기본 개념<br>\t\t\t\t\t<br>\t\t\t\t\t\t<br>- 코칭의 정의와 역사<br>\t\t\t\t\t\t<br>- 현대적 코칭의 특징<br>\t\t\t\t\t<br>\t\t\t\t\t<br>3. 코칭 스타일 프레임워크<br>\t\t\t\t\t<br>\t\t\t\t\t\t<br>- 밀기와 당기기 개념<br>\t\t\t\t\t\t<br>- 4가지 코칭 스타일 매트릭스<br>\t\t\t\t\t<br>\t\t\t\t\t<br>4. 각 스타일별 세부 설명<br>\t\t\t\t\t<br>\t\t\t\t\t\t<br>- 말하기 스타일<br>\t\t\t\t\t\t<br>- 손 떼기 스타일<br>\t\t\t\t\t\t<br>- 묻고 듣기 스타일<br>\t\t\t\t\t\t<br>- 협력하기 스타일<br>\t\t\t\t\t<br>\t\t\t\t\t<br>5. 결론<br>\t\t\t\t\t<br>\t\t\t\t\t\t<br>- 효과적인 코칭의 핵심 원칙<br>\t\t\t\t\t<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>1️⃣ 구글 산소 프로젝트의 발견 &#128269;<br>\t\t\t\t\t<br>• 구글의 다년간 연구 결과: 수천 명 직원 데이터 분석으로 효과적인 관리자 자질 파악 • 코칭 기술이 꾸준히 상위권 차지 • 뛰어난 리더는 코칭을 통해 다른 직원의 역량을 끌어올림 • 코칭을 잘 받은 직원들의 변화<br>\t\t\t\t\t<br>\t\t\t\t\t\t<br>- 도전에 더 적극적으로 대처<br>\t\t\t\t\t\t<br>- 창의적인 문제 해결 능력 향상<br>\t\t\t\t\t\t<br>- 직원 강점 파악 능력 향상<br>\t\t\t\t\t\t<br>- 사기 증진 및 목표 달성 촉진<br>\t\t\t\t\t<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>2️⃣ 코칭의 현실적 문제점 ⚠️<br>\t\t\t\t\t<br>• 많은 리더가 코칭을 자연스럽게 받아들이지 못함 • 착각하는 리더들: 실제로는 지시만 하면서 코칭한다고 생각 • 주요 원인 분석<br>\t\t\t\t\t<br>\t\t\t\t\t\t<br>- 훈련 부족이 가장 큰 문제<br>\t\t\t\t\t\t<br>- 새로 승진한 리더들의 부담감<br>\t\t\t\t\t\t<br>- 모든 해답을 제시해야 한다는 잘못된 믿음 • 효과적인 코칭의 핵심: 직원들 스스로 답을 찾도록 돕는 것 • 희망적 메시지: 코칭은 배울 수 있는 기술이며 근육처럼 연습으로 강화 가능<br>\t\t\t\t\t<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>3️⃣ 코칭이란 무엇인가 &#128214;<br>\t\t\t\t\t<br>코칭의 어원과 역사<br>\t\t\t\t\t<br>• 15세기 헝가리 콕스 마을에서 유래 • 사람들을 목적지까지 데려다주는 마차 개념 • 1800년대: 다른 사람의 목표 달성을 돕는 사람을 지칭 • 옥스퍼드 가정교사가 학생들의 시험 준비를 도와주는 개념<br>\t\t\t\t\t<br>현대적 코칭의 특징 (헤르미니아 이바라 & 앤 스쿨라)<br>\t\t\t\t\t<br>• 답을 제공하는 대신 질문을 함 • 직원의 행동을 판단하는 대신 지원 • 지시하는 대신 개발을 촉진<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>4️⃣ 저자의 코칭 정의 &#128161;<br>\t\t\t\t\t<br>• 리더가 비지시적이고 자기 주도적인 행동을 통해 다른 사람의 성과와 잠재력을 극대화하는 과정 • 효과적인 코칭 관계의 핵심<br>\t\t\t\t\t<br>\t\t\t\t\t\t<br>- 두 가지 행동이 함께 사용<br>\t\t\t\t\t\t<br>- 사람들이 자립성과 개인적 성장을 향해 나아가도록 안내 • 궁극적 목표: 개인의 잠재력 극대화<br>\t\t\t\t\t<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>5️⃣ 다양한 코칭 스타일 - 프레임워크 소개 &#128295;<br>\t\t\t\t\t<br>코칭에 '올바른 방법'은 없다<br>\t\t\t\t\t<br>• 코칭 스타일 결정 요인<br>\t\t\t\t\t<br>\t\t\t\t\t\t<br>- 코치의 경험과 전문성<br>\t\t\t\t\t\t<br>- 당면한 상황이나 업무<br>\t\t\t\t\t\t<br>- 코칭 대상자의 경험 수준<br>\t\t\t\t\t<br>\t\t\t\t\t<br>코칭 스타일 프레임워크 개발 배경<br>\t\t\t\t\t<br>• 100명 이상의 리더 인터뷰 기반 • 다양한 연령대, 산업, 업무 분야, 경력 수준 포함 • 마일스 다우니의 코칭 스펙트럼 연구 활용 • 관련 학술 문헌 검토<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>6️⃣ 밀기와 당기기 개념 ⚖️<br>\t\t\t\t\t<br>스포츠 분야에서 차용한 개념<br>\t\t\t\t\t<br>• 선수의 기술과 성과 개발을 위해 널리 사용<br>\t\t\t\t\t<br>밀기(Push) 코칭 방식<br>\t\t\t\t\t<br>• 코치가 명확한 지시, 안내 및 피드백 제공 • 실무적 접근: 무엇을 어떻게 해야 하는지 알려줌 • 직접적이고 구체적인 방향 제시<br>\t\t\t\t\t<br>당기기(Pull) 코칭 방식<br>\t\t\t\t\t<br>• 직접적인 지시보다는 안내와 지원 목표 • 촉진적 접근 방식 채택 • 개방형 질문을 통해 자기 성찰 유도 • 선수가 스스로 해결책을 찾도록 도움<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>7️⃣ 코칭 스타일 매트릭스 구조 &#128202;<br>\t\t\t\t\t<br>2x2 매트릭스 구조<br>\t\t\t\t\t<br>• Y축: 당기기 요인 • X축: 밀기 요인 • 각 사분면: 서로 다른 수준의 당기기와 밀기 특징<br>\t\t\t\t\t<br>중요한 통찰<br>\t\t\t\t\t<br>• 당기기 수준이 높을수록 코칭 스타일에 더 많은 준비 필요 • 연습을 통해 여러 스타일을 편안하게 전환 가능 • 상황에 따른 적절한 스타일 선택이 핵심<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>8️⃣ 말하기 스타일 - 높은 밀기 + 낮은 당기기 &#128483;️<br>\t\t\t\t\t<br>특징<br>\t\t\t\t\t<br>• 오른쪽 아래 사분면 위치 • 대부분의 관리자가 기본 방식으로 사용 • 지시적 성격으로 다른 스타일보다 준비가 덜 필요 • 리더가 지식을 전수하고 경험을 활용<br>\t\t\t\t\t<br>적합한 상황<br>\t\t\t\t\t<br>• 업무가 표준화되고 반복적인 작업 (콜센터, 조립 라인) • 데이터 입력, 소셜 미디어 관리 등 감독이 필요한 업무 • 긴급하거나 즉각적인 조치가 필요한 상황<br>\t\t\t\t\t<br>주의사항 ⚠️<br>\t\t\t\t\t<br>• 직원들이 자율성 부족을 느낄 수 있음 • 창의성 억압과 사기 저하 위험 • 과도한 사용 시 마이크로 매니징으로 인식<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>9️⃣ 손 떼기 스타일 - 낮은 밀기 + 낮은 당기기 &#129330;<br>\t\t\t\t\t<br>특징<br>\t\t\t\t\t<br>• 왼쪽 하단 사분면 위치<br>\t\t\t\t\t<br>• 코치는 조언자 역할 수행 • 상당한 자율성과 의사결정의 자유 부여 • 필요한 도구와 자원 제공, 요청 시 지원<br>\t\t\t\t\t<br>적합한 상황<br>\t\t\t\t\t<br>• 팀원이 업무나 프로젝트에 경험이 풍부하고 유능할 때 • 경험 많은 직원이나 해당 업무를 숙달한 직원 • 정기적인 점검은 필요하지만 감독은 거의 불필요<br>\t\t\t\t\t<br>실제 적용 예시 &#128188;<br>\t\t\t\t\t<br>• 선임 제품 매니저: \"새 프로젝트 포커스그룹 토론을 해야 합니다\" • 손 떼기 코치 응답: \"좋아요. 계획을 공유하고 주요 일정을 알려주세요. 예산이나 승인 등 지원이 필요하면 개입하겠습니다\"<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>&#128287; 묻고 듣기 스타일 - 높은 당기기 + 낮은 밀기 ❓<br>\t\t\t\t\t<br>특징<br>\t\t\t\t\t<br>• 왼쪽 상단 사분면 위치 • 가장 전통적인 코칭 정의와 밀접한 연관 • 적극적 경청과 개방적 질문 활용 • 많은 준비 필요, 구성원 상황 파악 필수<br>\t\t\t\t\t<br>핵심 행동<br>\t\t\t\t\t<br>• 생각을 유도하는 설득력 있는 질문 • 지시받는 대신 스스로 성찰하고 깊이 생각하도록 유도 • 자기 주도적 의사결정 촉진<br>\t\t\t\t\t<br>질문 예시<br>\t\t\t\t\t<br>• \"이 과제에 접근하는 가장 좋은 방법은 무엇이라고 생각하세요\" • \"문제의 핵심이 무엇이라고 생각하시나요\"<br>\t\t\t\t\t<br>적합한 대상<br>\t\t\t\t\t<br>• 새로운 리더나 리더로 성장하는 이들 • 비판적 사고, 책임감, 문제 해결 능력 향상이 필요한 경우<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>1️⃣1️⃣ 협력하기 스타일 - 높은 당기기 + 높은 밀기 &#129309;<br>\t\t\t\t\t<br>특징<br>\t\t\t\t\t<br>• 오른쪽 위 사분면 위치 • 당기기와 밀기 모두 강함 • 코칭의 스위트 스폿 - 대부분 관리자가 도달해야 할 지점 • 상당한 준비 필요<br>\t\t\t\t\t<br>접근 방식<br>\t\t\t\t\t<br>• 기존 코칭과 멘토링 결합 • 개방형 질문 + 상담 및 처방적 조언 제공 • 함께 앞으로 나아갈 방향 모색<br>\t\t\t\t\t<br>적합한 상황<br>\t\t\t\t\t<br>• 보고자의 경력 수준과 관계없이 적용 • 조언과 안내가 동시에 필요한 상황 • 복합적인 의사결정이 필요한 경우<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>1️⃣2️⃣ 협력하기 스타일 - 실제 적용 예시 &#128188;<br>\t\t\t\t\t<br>상황<br>\t\t\t\t\t<br>• 선임 관리자가 커리어 개발 계획 수립 • 공급망 부문에서 총괄 관리자로 전환 희망<br>\t\t\t\t\t<br>1단계: 개방형 질문으로 성찰 유도<br>\t\t\t\t\t<br>• \"총괄 관리자로 전환하려면 어떤 역량을 개발해야 한다고 생각하나요\" • \"왜 공급망 외에 AI 관련 역량도 함께 키워야 한다고 생각하나요\"<br>\t\t\t\t\t<br>2단계: 경험 기반 조언 제공<br>\t\t\t\t\t<br>• \"신사업 개발에 대한 열정과 전환 의지를 고려할 때, 방글라데시 신설 지부 지사장에 지원해보는 건 어떨까요\" • \"직무 기술서를 살펴봤는데 당신의 역량과 잘 맞는 것 같습니다\"<br>\t\t\t\t\t<br>효과<br>\t\t\t\t\t<br>• 자기 인식 촉진 + 올바른 경험 기반 지침 제공 • 직원이 모든 요소를 고려한 후 최종 의사결정 권한 부여<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>1️⃣3️⃣ 효과적인 코칭의 핵심 원칙 &#127919;<br>\t\t\t\t\t<br>• 다양한 스타일과 접근법 사용 시점 분별 능력이 핵심 • 경험과 연습을 통해 진화하는 역동적 과정 • 지속적인 코칭 기술 연마를 통한 직관력 자연스러운 개발 • 대상자의 고유한 요구에 맞는 방법 조정 능력 배양<br>\t\t\t\t\t<br>뛰어난 리더의 특징<br>\t\t\t\t\t<br>• 다양한 코칭 스타일을 능숙하게 혼합하는 기술 습득 • 상황별 적절한 판단력<br>\t\t\t\t\t<br>\t\t\t\t\t\t<br>- 언제 주도권을 잡아야 하는지<br>\t\t\t\t\t\t<br>- 언제 지침을 제공해야 하는지<br>\t\t\t\t\t\t<br>- 언제 한발 물러서서 다른 사람들이 주도하도록 해야 하는지<br>\t\t\t\t\t<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>1️⃣4️⃣ 코칭 여정의 의미 &#128640;<br>\t\t\t\t\t<br>• 이 여정은 코치와 코칭 대상자 모두의 지속적인 성장에 관한 것 • 코칭은 배울 수 있는 기술이며 근육처럼 연습으로 강화 가능 • 개인의 잠재력 극대화를 통한 조직 전체의 성장 • 자립성과 개인적 성장을 향한 지속적인 여정<br>\t\t\t\t\t<br>궁극적 목표 &#127919;<br>\t\t\t\t\t<br>• 직원들이 스스로 답을 찾도록 돕는 것 • 비지시적이고 자기 주도적 환경 조성 • 조직 내 코칭 문화 정착을 통한 전체적 역량 향상<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>&#128203; 내용 요약<br>\t\t\t\t\t<br>핵심 메시지<br>\t\t\t\t\t<br>• 구글 산소 프로젝트에서 입증된 코칭의 중요성 • 코칭은 학습 가능한 기술이며 지속적 연습으로 향상 • 4가지 코칭 스타일: 말하기, 손 떼기, 묻고 듣기, 협력하기 • 상황과 대상에 따른 적절한 스타일 선택이 핵심<br>\t\t\t\t\t<br>실행 가이드<br>\t\t\t\t\t<br>• 밀기와 당기기 개념을 활용한 체계적 접근 • 협력하기 스타일이 가장 이상적인 코칭 방식 • 효과적인 코칭을 위한 준비와 연습의 중요성 • 직원 스스로 답을 찾도록 돕는 것이 궁극적 목표<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>&#129300; 토론 질문 (1-5번)<br>\t\t\t\t\t<br>\t\t\t\t\t\t<br>- 당신의 조직에서 관리자들이 가장 많이 사용하는 코칭 스타일은 무엇이며, 그 이유는 무엇이라고 생각하시나요?<br>\t\t\t\t\t\t<br>- '말하기 스타일'에서 '협력하기 스타일'로 전환하는 과정에서 겪을 수 있는 가장 큰 어려움은 무엇일까요?<br>\t\t\t\t\t\t<br>- 코칭 받는 입장에서 어떤 스타일의 코칭이 당신에게 가장 효과적이었는지 구체적인 경험을 공유해주세요.<br>\t\t\t\t\t\t<br>- 원격 근무 환경에서 '묻고 듣기 스타일'을 효과적으로 적용하기 위한 구체적인 방법은 무엇일까요?<br>\t\t\t\t\t\t<br>- 당신이 코치 역할을 할 때, 어떤 상황에서 가장 어려움을 느끼며 그 이유는 무엇인가요?<br>\t\t\t\t\t<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>&#129300; 토론 질문 (6-10번)<br>\t\t\t\t\t<br>\t\t\t\t\t\t<br>- 조직 내에서 코칭 문화를 정착시키기 위해 필요한 제도적 변화는 무엇이라고 생각하시나요?<br>\t\t\t\t\t\t<br>- 세대별(밀레니얼, Z세대 등) 특성을 고려했을 때, 어떤 코칭 스타일이 가장 효과적일까요?<br>\t\t\t\t\t\t<br>- 성과가 저조한 직원을 코칭할 때, 4가지 스타일 중 어떤 것을 우선적으로 적용해야 할까요?<br>\t\t\t\t\t\t<br>- 코칭의 효과를 측정하고 평가하는 구체적인 방법은 무엇이며, 당신의 조직에서는 어떻게 활용할 수 있을까요?<br>\t\t\t\t\t\t<br>- AI와 디지털 기술이 발달하는 시대에, 인간 코치의 역할은 어떻게 변화해야 할까요?<br>\t\t\t\t\t<br>\t\t\t\t\t<br><br>\t\t\t\t\t출처: <<a href=\"https://claude.ai/chat/ed0b5dd5-09d1-4704-98ae-c775020dafd8\" target=\"_blank\">https://claude.ai/chat/ed0b5dd5-09d1-4704-98ae-c775020dafd8</a>> <br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t출처: <<a href=\"https://claude.ai/chat/ed0b5dd5-09d1-4704-98ae-c775020dafd8\" target=\"_blank\">https://claude.ai/chat/ed0b5dd5-09d1-4704-98ae-c775020dafd8</a>> <br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>\t\t\t\t<br>\t\t\t<br>\t\t\t<br><br>\t\t\t<br>1회차<br>\t\t\t<br>\t\t\t\t<br>\t\t\t\t\t<br>전략<br>\t\t\t\t\t<br>린 전략수립<br>\t\t\t\t\t<br><a href=\"https://www.hbrkorea.com/article/author/wno/961\" target=\"_blank\">마이클 맨킨스(Michael Mankins)</a><br>\t\t\t\t\t<br>매거진 2025. 5-6월호<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>린 전략 수립<br>\t\t\t\t\t<br>방식을 표준화하면 성과를 거둘 수 있다. 방법은 이렇다<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>내용 요약<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>문제&#160;연구에 따르면 관리자들은 일상적으로 너무 느리게 전략적 결정을 내리고 잘못된 결정을 내리는 경우가 많다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>발생 이유&#160;전략적 의사결정은 일반적으로 고유한 것으로 간주되며 각 의사결정에는 담당 임원이 지시하는 맞춤형 프로세스가 필요하다. 그 결과, 같은 회사 안에서도 비슷한 의사결정에 대해 매우 다른 방식으로 접근하게 된다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>솔루션&#160;몇몇 선도 기업들은 전략 우선순위 파악, 지속적인 전략적 의사결정, 정기적인 비즈니스 성과 검토 프로세스에 엄격함과 일관성을 부여하는 표준화된 전략 수립 방식을 채택하고 있다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>린 제조방식의 목표는 가능한 한 가장 안전하면서도 쉽고 효율적인 방식으로 제품을 만들기 위한 정확한 절차를 수립하는 것이다. 중요한 프로세스가 표준 작업이 되면 변동성이 감소하고 처리량이 증가하며 비용이 감소하고 품질이 향상된다. 도요타, 아마존, 인텔, 나이키 등 다양한 기업이 이런 접근방식을 운영에 활용해 큰 효과를 거두고 있다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>이와는 대조적으로 전략적 의사결정은 대부분의 회사에서 비정규 업무의 전형이다. 전략적 의사결정은 종종 눈송이처럼 고유한 것으로 여겨지며 각각의 의사결정에는 맞춤형 프로세스가 필요하다. 그 결과, 새로운 시장 진출 여부와 같은 유사한 의사결정이 같은 회사 안에서도 전혀 다른 방식으로 처리되는 경우가 많다. 이런 일관성의 부재는 더 느리고 질 낮은 의사결정으로 이어지며 이는 베인앤드컴퍼니가 350개 대기업의 경영진을 대상으로 전략 프로세스에 대해 설문조사한 결과에서도 명확하게 드러났다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>•&#160;설문조사 응답자의 약 50%가 전략 계획 수립에 표준 템플릿을 사용한다고 답했지만 중요한 의사결정을 내릴 때 일관된 접근방식을 따르는 기업은 거의 없었다. 대부분의 경우 프로세스는 담당 임원의 재량에 맡겨지거나 결정 유형에 따라 달라지는 경우가 많았다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>•&#160;경영진에 따르면 기업이 내린 전략적 결정의 4분의 1은 돌이켜보면 차선책이었던 것으로 밝혀졌다. 경영진은 종종 다른 선택지 보다 부정확하거나 열등한 행동 방침을 선택했다. 이런 결정 중 상당수는 비용이 많이 들거나 되돌리기가 불가능해 기업들은 수년 동안 그 결과를 감당해야 했다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>•&#160;회사에서 의사결정이 너무 느리다는 응답도 45% 이상에 달했다. 그 결과, 결국 올바른 선택이 내려지더라도 그 사이에 시장과 경쟁 환경이 변화해 성과가 저하되는 경우가 많았다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>•&#160;응답자의 기업들은 평균적으로 전략이 목표한 결과의 70% 미만을 달성했다. 이런 부족분은 전략 자체가 건전하다는 가정 아래 실행이 제대로 이뤄지지 않은 탓으로 돌리는 경우가 많았다. 그러나 많은 경우 전략적 결정 자체가 불분명해 조율되지 않거나 심지어 상충되는 행동으로 인해 평범한 결과가 이어졌다. 어떤 경우에는 리더들이 원하는 결과만 명시하고 이를 달성하기 위해 필요한 행동을 정의하지 않은 채 결정을 내렸다고 믿었다. 조직이 실행할 구체적인 행동이 없었기 때문에 성과가 미흡했다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>제조 공정의 불량률이 25%이고 목표 사이클 시간을 45% 이상 초과하며 수율 손실이 30% 이상 발생한다면 이는 용납할 수 없는 수준으로 간주된다. 하지만 많은 기업이 이런 수준의 비효율성과 비효과성을 용인하며 전략을 수립한다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>이제 더 나은 결과를 달성하기 위해 전략 프로세스를 재설계해야 할 때다. 중요한 제조 공정처럼 전략적 의사결정이 표준 업무가 되지 못할 이유는 없다. 엄격한 접근방식을 채택하면 기업은 낭비를 줄이고 더 빠르게 움직이며 더 현명한 선택을 하고 경쟁우위를 확보할 수 있다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>필자와 함께 일하고 연구한 몇몇 선도 기업들은 다른 기업들이 따를 수 있는 표준화의 청사진을 제시한다. 전략에 대한 이들의 린 접근방식에는 일반적으로 3가지 요소가 있다. (1)전략적 우선순위 설정 (2)지속적인 방식으로 문제 해결 (3)결과 모니터링이다. 이 아티클에서는 각 구성요소에 대해 자세히 살펴보고 성공적인 기업들이 이 3가지를 모두 전략 프로세스에 통합하는 방법에 대해 설명한다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>성과 목표는 열망이다. 비즈니스 및 기능별 리더가 획기적인 아이디어를 제시하도록 동기를 부여하기 위해 고안됐다<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>우선순위 설정<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>린 전략은 일반적으로 매출 및 영업이익과 같은 재무 목표와 상대적 시장점유율 성장 및 고객만족도 향상과 같은 전략적 목표를 모두 포함하는 회사의 다년간 성과 목표를 명확히 하거나 수정하는 것에서 시작된다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>성과 목표performance ambition는 단순히 경영진이 충분히 달성할 수 있다고 믿는 수준의 일반적인 목표와는 다르다. 오히려 전통적인 목표 설정은 전략 수립을 방해할 수 있다. 목표가 정치적 협상의 대상이 돼 각 사업 부문은 낮은 목표를 받기 위해 역량을 일부러 낮춰 제시하고, 본사는 이를 눈치채고 더 높은 목표를 강요하는 일이 벌어지기도 한다. 결국 목표는 전략을 이끄는 나침반이 아니라 타협의 산물이 돼버리는 것이다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>반면 성과 목표는 열망이다. 이는 기업의 성과를 획기적으로 끌어올릴 수 있는 혁신적인 아이디어를 이끌어내도록 사업 부문 및 기능 부문 리더들을 동기부여하기 위해 설계된 것이다. 이 목표는 현실적이어야 하지만 현재의 전략으로는 도달할 수 없는 수준이어야 한다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>구글의 10배 사고는 주목할 만한 사례다. 10년 전 구글의 공동 창업자인 래리 페이지와 세르게이 브린이 도입한 이 사고방식은 리더들이 기존 솔루션보다 10배 더 나은 솔루션을 목표로 하도록 장려한다. 이런 사고방식은 구글 전략의 핵심 원칙이 됐으며 회사 문화에 깊이 뿌리내리고 있다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>10배 접근방식은 구글의 놀라운 혁신을 촉진했다. 예를 들어 지메일은 출시 당시 경쟁 서비스보다 100배 더 많은 용량을 사용자에게 제공했다. 구글 스트리트 뷰는 1000만 마일이 넘는 도로를 촬영해 검색 결과에 고유한 가치를 더했다. 구글의 실험적 R&D 부서인 구글 X는 자율주행차 개발에 착수해 현재 피닉스, 샌프란시스코, 로스앤젤레스, 오스틴에서 승객에게 서비스를 제공하는 자율주행차량을 운행하는 웨이모를 탄생시켰다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>다음 단계는 경영진이 이미 내린 결정과 자원 투입을 감안해 회사의 미래 실적을 예측하는 다년도 전망MYO, Multiyear Outlook과 성과 목표를 비교하는 것이다. 중요한 점은 MYO는 미래에 이뤄질 가능성이 있더라도 아직 이뤄지지 않은 결정은 고려하지 않는다는 것이다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>또한 MYO는 계획이 아니라는 점에 유의해야 한다. 생산성 향상, 유리한 가격 변동, 자산 관리 개선 또는 재무 계획이나 예측에 종종 포함되는 기타 요인에 대한 가정은 포함되지
