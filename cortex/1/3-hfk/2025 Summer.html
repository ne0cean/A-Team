<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #1e1e1e;
  color: #e0e0e0;
  font-family: 'Segoe UI', -apple-system, sans-serif;
  font-size: 15px;
  line-height: 1.6;
  padding: 20px 30px 60px;
  overflow-x: hidden;
}
a { color: #6cb0f6; text-decoration: none; }
a:hover { text-decoration: underline; }
.title-bar {
  background: #3a3a5c;
  display: inline-block;
  padding: 6px 16px;
  font-size: 22px;
  font-weight: bold;
  color: #fff;
  margin-bottom: 4px;
}
.date { color: #999; font-size: 13px; margin-bottom: 20px; }
.board { position: relative; }
.card {
  background: #2a2a2a;
  border: 1px solid #3a3a3a;
  border-radius: 8px;
  padding: 12px;
  position: absolute;
  cursor: grab;
  transition: box-shadow 0.15s;
  overflow: hidden;
}
.card:hover { box-shadow: 0 0 0 1px #58a6ff; z-index: 10; }
.card.moving { opacity: 0.8; box-shadow: 0 4px 24px rgba(0,0,0,0.6); z-index: 100; cursor: grabbing; }
.card img { width: 100%; border-radius: 4px; display: block; }
.card .caption { font-size: 12px; color: #888; margin-top: 6px; }
.card .text { outline: none; min-height: 20px; white-space: pre-wrap; word-break: break-word; }
.card .text:focus { background: rgba(255,255,255,0.05); border-radius: 4px; padding: 4px; }
.card .text:empty::before { content: '텍스트 입력...'; color: #555; }
.card table { border-collapse: collapse; width: 100%; font-size: 13px; }
.card table td, .card table th { border: 1px solid #444; padding: 4px 8px; vertical-align: top; }
.card table th { background: #333; color: #ccc; }
.card-actions { position: absolute; top: 4px; right: 4px; display: none; gap: 4px; }
.card:hover .card-actions { display: flex; }
.card-btn { background: #333; border: 1px solid #555; color: #ccc; border-radius: 4px; padding: 2px 6px; font-size: 11px; cursor: pointer; }
.card-btn:hover { background: #444; color: #fff; }
.resize-handle { position: absolute; bottom: 0; right: 0; width: 16px; height: 16px; cursor: se-resize; opacity: 0; }
.card:hover .resize-handle { opacity: 0.6; }
.resize-handle::after { content: ''; position: absolute; bottom: 3px; right: 3px; width: 8px; height: 8px; border-right: 2px solid #666; border-bottom: 2px solid #666; }
.toolbar { position: fixed; bottom: 0; left: 0; right: 0; background: #161b22; border-top: 1px solid #30363d; padding: 8px 20px; display: flex; gap: 12px; align-items: center; z-index: 200; }
.toolbar button { background: #21262d; border: 1px solid #30363d; color: #e0e0e0; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; }
.toolbar button:hover { background: #30363d; }
.toolbar .status { color: #8b949e; font-size: 12px; margin-left: auto; }
.highlight-red { color: #ff6b6b; }
.highlight-blue { color: #6cb0f6; }
</style>

const SAVE_KEY = 'board-2025-Summer';

const DEFAULT_CARDS = [
  {
    "type": "text",
    "content": "2025 Summer<br>\t\t<br>\t\t<br>\t<br>\t<br>\t\t<br>\t\t\t<br>6회차<br>\t\t\t<br>\t\t\t\t<br>\t\t\t\t\t<br>전략<br>\t\t\t\t\t<br>전략을 한 장으로 나타내라<br>\t\t\t\t\t<br><a href=\"https://www.hbrkorea.com/article/author/wno/3058\" target=\"_blank\">프리크 베르묄렌(Freek Vermeulen)</a>,<a href=\"https://www.hbrkorea.com/article/author/wno/3724\" target=\"_blank\">주앙 코터 살바도(Jo&#227;o Cotter Salvado)</a><br>\t\t\t\t\t<br><br>\t\t\t\t\t<a href=\"https://www.hbrkorea.com/upload_dir/source/2025%200708/096_0.png\" target=\"_blank\">\t\t\t\t\t\t\t\t\t\t\t</a><br>ILLUSTRATOR&#160;RYAN CARL<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>전략을&#160;한 장으로&#160;나타내라<br>\t\t\t\t\t<br>슬라이드 한 장으로 명확하게 표현하는 것이 직원과 투자자를 사로잡는 최선의 방법이다<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>내용 요약<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>문제&#160;비슷한 두 회사가 투자자들에게 거의 동일한 전략을 제시할 때 시장은 종종 한쪽은 보상하지만 다른 쪽은 보상하지 않는 것처럼 보인다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>발생 원인&#160;연구에 따르면 이런 상황에서 가장 중요한 차별화 요소는 기업이 전략에 대한 설득력 있는 시각화 자료를 제공했는지 아닌지다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>해결책&#160;효과적인 시각화를 통해 전략을 강화하라. 시각화를 디자인 할 때 다음 5가지 규칙을 따라야 한다. 아이디어를 서너 개의 주요 개념으로 그룹화하고, 디테일을 살려 여러 층을 만들고, 층을 구분할 때만 색상과 음영을 사용하고, 요소 간의 명확한 관계 순서를 표시하고, 정보를 수평적으로 구성하라.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<a href=\"https://www.hbrkorea.com/upload_dir/source/2025%200708/096_1.png\" target=\"_blank\">\t\t\t\t\t\t\t\t\t\t\t</a><br><br>\t\t\t\t\t<br>2014년 12월 1일 사이프레스 반도체Cypress Semiconductor는 다른 반도체 제조업체인 스팬션Spansion을 16억 달러에 인수한다고 발표했다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>당시 사이프레스의 CEO였던 서먼 로저스가 이 거래를 발표하자 주식 시장은 긍정적인 반응을 보였다. 한 분석에 따르면 교란변수들의 영향을 배제했을 때 거래 발표 이후 사이프레스의 주가는 13% 상승했다. 분명 투자자들은 회사의 인수 근거에 대해 믿음을 보였다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>이 거래의 결과를 장기적으로 살펴보면 그들의 낙관적인 전망은 옳았다. 1년 후 회사의 가치를 살펴본 결과, 인수 전보다 시가총액이 13% 더 높았다. 주식시장이 해당 거래의 잠재력을 정확하게 예측했던 셈이다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>2년 전인 12월 12일에는 제약회사 메디슨스 컴퍼니Medicines Company가 전문 제약회사 인클라인 테라퓨틱스Incline Therapeutics를 인수할 것이라고 발표했다. 이 거래는 가치 창출 측면에서 스팬션 인수 거래와 매우 유사했다. 그리고 1년 후 두 회사의 합병 법인 시가총액도 13% 더 높았다. 하지만 메디슨스의 CEO인 클라이브 민웰이 이 거래를 발표했을 때 주식 시장의 반응은 미적지근했다. 주가는 1.8% 상승하는 데 그쳤다. 투자자들은 회사의 인수 근거를 이해하지 못했다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>이런 현상과 관련해 한 가지 패턴이 발견됐다. 2012~2017년까지 미국에서 발생한 654건의 대형 거래 표본을 분석한 결과, 유사한 거래 간 이런 종류의 불균형이 자주 나타났다. 특정 인수 또는 합병에 대해 시장이 회사가 예상한 가치를 즉시 반영하는 경우도, 그렇지 않은 경우도 있었다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>그렇다면 투자자들이 CEO의 프레젠테이션을 믿을지 말지를 결정하는 요인은 무엇일까? 연구자들은 인수(‘사건’)의 어떤 특징이 주식 시장 반응을 설명하는지 알아보기 위해 이벤트 연구방법론을 사용해 통계 분석을 실시했다. 그러자 표본에 포함된 인수 사례에서 단순해 보이지만 의미 있는 한 가지 요인이 나타났다. 프레젠테이션에 거래의 전략적 근거를 설명하는 슬라이드가 첨부된 경우 투자자들이 즉각적으로 엄지손가락을 치켜세울 가능성이 두 배 이상 올라갔다. 이 같은 전략 시각화가 거래 발표 후 가치 평가에 미친 긍정적인 영향은 다른 사진, 지도, 로고, 막대 차트와 선 그래프 같은 시각적 도구의 영향보다 4배 더 컸다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>이 아티클에서는 전략 커뮤니케이션에 시각화가 왜 중요한지 설명하고, 직원과 투자자 모두의 동의를 얻을 수 있는 시각화 방법을 구체적인 예를 들어 설명하겠다. 결론에서는 전략 시각화의 강력한 효과에도 불구하고 기업 프레젠테이션 중 4분의 1만이 전략 시각화를 활용하고 있으며 활용하는 경우에도 영향이 제대로 발휘되도록 설계되지 않았다는 점을 보이겠다. 기업의 전략적 의사결정을 효과적으로 설명하는 시각화 자료는 전체의 20%도 채 안 되는 셈이다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>프레젠테이션에 거래의 전략적 근거를 설명하는 슬라이드가 첨부된 경우 투자자가 즉각적으로 엄지손가락을 치켜세울 가능성이 두 배 이상 올라갔다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<a href=\"https://www.hbrkorea.com/upload_dir/source/2025%200708/096_2.png\" target=\"_blank\">\t\t\t\t\t\t\t\t\t\t\t</a><br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>왜- 보는 것이 믿는 것이다<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>대부분의 경영진은 비즈니스 전략이 기업이 가치를 창출하고 경쟁하는 방법과 방향에 관한 일련의 선택이라는 데 동의한다. 하지만 많은 사람들이 잊고 있는 것은 전략에는 그 선택의 의미에 대한 해석이 필요하다는 것이다. 최대한 간단하고 명료한 설명이 이뤄져야 한다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>회사의 경영진들은 미시간대 조직심리학자인 칼 위크가 ‘센스메이킹’이라고 부르는 과정을 통해 비즈니스 상황을 이해하고 그 속에서 회사가 어떻게 운영될 것인지를 안다. 여기에는 주로 경쟁업체와 잠재 고객 유형을 분류하고, 회사의 주요 자원과 역량 및 이들 간 주요 인과관계를 파악하는 것이 포함된다. 이렇게 파악한 내용은 ‘인지적 지도cognitive map’에 저장된다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>좋은 전략은 이런 지도를 그대로 반영한다. 실제로 경영진은 전략을 개발할 때 지도의 초안을 작성한다. 동료, 컨설턴트, 이사회 구성원 등과 함께 회사가 나아가야 할 방향에 대해 논의하고 토론하면서 플립 차트와 슬라이드에 지도를 그린다. 이 지도에는 주로 제안한 전략의 주요 요소와 이들 간의 관계를 나타내는 원, 상자, 화살표 등이 담긴다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>경영진이 전략에 합의하면 그 사항을 다른 이해관계자에게 전달해야 하며 이해관계자는 이를 이해하고 실행에 옮겨야 한다. 예를 들어 직원들의 일상적인 의사결정은 회사의 전략에 대해 합의된 이해를 바탕으로 이뤄져야 한다. 새로운 전략의 결과로 직원들이 다른 선택을 하지 않는다면 새로운 전략이 없는 것과 같다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>이때 경영진의 역할은 센스메이킹에서 센스기빙으로 바뀌어야 한다. 경영진은 회사 전략에 대한 인지적 지도를 직원과 투자자들의 머릿속에 심어야 한다. 연구결과에 따르면 전략과 그 작동방식을 시각화해 구두 프레젠테이션을 강화하는 것이야 말로 인지적 지도를 전달하는 가장 효과적인 방법이다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<a href=\"https://www.hbrkorea.com/upload_dir/source/2025%200708/096_3.png\" target=\"_blank\">\t\t\t\t\t\t\t\t\t\t\t</a><br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>무엇을- 캐피텍Capitec의 사례<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>현재 남아공 최대 소매 은행이자 래퍼티 그룹Lafferty Group이 2년 연속으로 세계 최고의 은행으로 선정한 캐피텍의 사례는 효과적인 전략 시각화를 위한 이상적인 자료를 제시한다. 이 회사의 전략을 자세히 살펴보자.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>캐피텍은 2000년대 초 설립됐다. 회사가 남아프리카공화국의 소비자 금융 환경을 분석해보니 이 시장은 오랫동안 4개의 대형 은행이 장악하고 있었다. 따라서 캐피텍의 창업자들은 이 시장에서 발판을 마련하려면 적어도 초창기에는 기존 은행이 소홀히 했던 고객층에 집중해야 한다는 사실을 깨달았다. 그 고객들은 바로 은행 계좌가 없는 저소득층이었다. 창업자들은 이들을 ‘금융 지식이 부족한 사람들’이라고 표현했다. 이것이 첫 번째 전략적 개념이었다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>다음으로 창업자들은 이런 고객이 필요로 하는 가치 제안을 고민했다. 여기에서 생각해낸 전략적 개념은 고객의 기본적인 요구 사항을 충족하는 ‘단순한 하나의 계정’이었다. 이 제안을 전달하기 위해 창업자들은 경제성, 단순성, 접근성, 개인 서비스라는 상호 보완적인 4가지 하위 개념에 집중하기로 결정했다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>이 하위 개념은 공허하고 추상적인 용어가 아니라 구체적인 고객 혜택과 운영 방식으로 연결될 수 있는 개념들이었다. 경제성이란 사람들이 현금에서 은행으로 전환하도록 유인할 만큼 낮은 수수료를 부과하는 것을 뜻한다. 캐피텍의 수수료는 경쟁사의 절반 수준이었다. 이런 서비스를 제공하면서도 수익을 내려면 비용을 낮춰야 했다.(은행은 출범한 다음 해에 적자를 냈다.) 그러기 위해서는 규모를 갖춰야 했고, 규모를 확보하기 위해 제공하는 서비스와 운영을 단순화했다.(두 번째 하위 개념) 예를 들어 저축과 대출, 현금 없는 거래에만 사용할 수 있는 한 가지 유형의 계좌만 제공하는 식이었다. 창업자들은 보험, 신용카드, 환전과 같은 부수적인 혜택을 거의 누리지 못하는 저소득층 고객들에게는 이런 단순한 서비스만으로도 충분하다고 생각했다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>세 번째 하위 개념인 접근성은 대상 고객이 은행 서비스를 이용하지 못하도록 방해하던 장벽을 낮추는 것을 말한다. 이를 위해 캐피텍은 대규모 현지 지점 네트워크의 대면 서비스에 의존했다. 각 지점에는 완전히 개방된 매장 전면과 간단한 셀프 서비스 기기, 글을 읽지 못하는 사람들에게 어디로 가야 하는지 알려주는 색상 카펫(빨간색과 파란색 포함) 등이 설치돼 있었다. 결정적으로 캐피텍은 지역 커뮤니티의 사람들을 고용해 고객들이 자신과 같은 언어를 구사하고 지역의 관습대로 행동하는 직원들로부터 서비스를 받을 수 있도록 했다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>이제 네 번째 하위 개념은 개인 서비스다. 캐피텍은 서비스를 강조하기 위해 은행권이 아닌 소매업과 서비스업에서 일하던 사람들을 채용했다. 이렇게 할 수 있었던 이유는 기술 플랫폼의 사용이 매우 간편했기 때문이다. 게다가 창업자들은 이 직원들의 현지 시장 지식과 네트워크를 활용하면 더 많은 가입자를 확보하고 대출 불이행률을 낮출 수 있을 것이라고 생각했다. 직원들이 누가 좋은 잠재 고객인지, 누가 무담보 대출을 갚을 가능성이 있는지, 누가 그렇지 않은지를 잘 알고 있기 때문이다. 높은 가입률과 낮은 연체율의 조합이 낮은 지점 비용과 높은 대출 마진이라는 행복한 조합을 만들어 낼 것이라 봤다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>회사는 가치 제안과 4가지 하위 개념을 종합해 세 번째 주요 전략적 개념, 즉 은행이 투자해야 할 자원과 역량을 결정했다. 예를 들어 앞서 언급했듯이 가치 제안은 특정 레이아웃을 갖춘 대규모 지점 네트워크를 전제로 했다. 또한 직원과 고객 모두가 계좌 개설과 같은 활동을 매우 간편하게 할 수 있는 기술 플랫폼, 즉 ‘자본Capital’과 ‘기술Technology’의 합성어인 캐피텍Capitec이 필요했다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<a href=\"https://www.hbrkorea.com/upload_dir/source/2025%200708/096_5.png\" target=\"_blank\">\t\t\t\t\t\t\t\t\t\t\t</a><br><br>\t\t\t\t\t<br>또한 가치 제안은 은행이 육성해야 할 사내 문화를 정의했다. 전통적으로 남아프리카의 금융기관은 직원과 고객에게 진중한 이미지를 전달하기 위해 형식적이고 딱딱하며 종종 위계적인 문화를 선호해 왔다. 이는 고객과의 상호작용과 지점 디자인에도 반영됐다. 하지만 캐피텍은 은행에 가는 것을 불편해하거나 두려워하는 저소득층 고객들에게 직원들이 친근하고 따뜻한 얼굴을 보여주길 원했다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>이런 전략에 대한 구두 설명은 당장은 설득력을 갖지만 이 전략을 개발하지 않은 사람이 금방 받아들이기는 어려울 수 있다. 하지만 ‘전략을 시각화하는 올바른 방법’에서 볼 수 있듯이 전략을 구성하는 모든 개념 간의 관계와 인과관계를 슬라이드 한 장에 거의 완벽하게 담아낼 수 있다. 이 슬라이드에서 3가지 주요 전략 개념을 쉽게 확인할 수 있다. 가운데에는 가치 제안(‘단순한 하나의 계정’과 그 4가지 하위 개념 및 그 실현 양상)이 있다. 오른쪽에는 핵심 고객층(‘금융 지식이 부족한 사람들’)이, 왼쪽에는 해당 고객의 요구를 충족하는 데 필요한 자원과 역량(‘현지 지점 네트워크’ 및 이를 통해 제공할 수 있는 것)이 있다. 또한 이 시각화 자료는 3가지 개념이 각각 어떻게 다른 개념에 영향을 미쳐 수익성 있는 역학을 창출하는지 보여준다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>이 시각화를 프레젠테이션의 일부로 본 관리자는 이 내용을 거의 확실하게 받아들일 것이다. 직원들은 사무실 벽에 이 시각화 자료를 붙일 수 있으며 전략적인 권장사항을 프레젠테이션할 때 기초가 되는 슬라이드로 사용할 수 있다. 이를 본 투자자들은 회사가 어떻게 가치를 창출하는지 명확하게 파악할 수 있을 것이다. 그렇다면 전략의 시각화가 얼마나 효과적인지는 어떻게 확인할 수 있을까?<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>좋은 시각화, 즉 좋은 프레임워크는 몇 가지 구성 요소로만 이뤄져 있고 사람들로 하여금 세부 사항을 논리적으로 유추할 수 있게 해준다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<a href=\"https://www.hbrkorea.com/upload_dir/source/2025%200708/096_4.png\" target=\"_blank\">\t\t\t\t\t\t\t\t\t\t\t</a><br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>어떻게- 훌륭한 전략 슬라이드를 만드는 요소<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>인간은 시각적인 동물이다. 뇌의 50% 이상이 우리가 보는 것을 처리하는 데 관여한다. 이는 적절하게 정리된 시각 정보가 다른 유형의 정보보다 더 빠르고 정확하게 흡수된다는 연구결과가 있는 이유일 수도 있다. 전략 수립의 맥락에서 시각적으로 가장 잘 소통할 수 있는 방법을 이해하기 위해 필자들은 런던경영대학원 경영학 석사 과정의 임원 57명을 모집해 다양한 기업에서 얻은 총 60개의 전략 시각화 자료를 연구했다. 경영진에게 각각 15개 정도의 자료를 평가해 달라고 요청했고, 평가하는 동안 시선추적 기술을 활용해 경영진이 어디에 주목하는지 살펴봤다. 그런 다음 각 시각화 자료를 통해 회사의 전략에 대해 얼마나 많은 것을 얻었는지(‘무언가를 배웠는지’, ‘인사이트를 얻었는지’, ‘이해도를 높였는지’) 물어봤다. 물론 이는 다소 주관적인 평가다. 참가자들이 많은 것을 배웠다고 생각하더라도 실제로 배운 것인지 그냥 배웠다고 느끼는 것인지는 확실히 알 수 없다. 하지만 적어도 그 반대는 확실하다고 확신한다. 여러 임원이 시각화를 연구하면서 회사의 전략에 대해 아무것도 배운 것이 없다고 답했다면 그 전략이 그다지 효과적이지 않았을 가능성이 높다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>또한 각 시각화의 몇 가지 특성을 측정한 다음 회귀 모델을 활용해 어떤 특성이 경영진이 회사의 전략을 더 잘 이해하는 데 도움이 되는지를 통계적으로 분석했다. 이런 인사이트를 전략 시각화를 동반한 인수 발표가 있을 때와 없을 때 주가가 어떻게 움직였는지에 대한 연구 데이터와 결합했다. 그 결과 5가지 구체적인 디자인 규칙이 도출됐다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<a href=\"https://www.hbrkorea.com/upload_dir/source/2025%200708/1_4.png\" target=\"_blank\">\t\t\t\t\t\t\t\t\t\t\t</a><br><br>\t\t\t\t\t<br>전략 모델의 기초를 닦을 서너 개의 주요 개념으로 아이디어를 그룹화하라&#160;<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>표본 자료에는 많은 구성 요소가 포함된 프레임워크, 때로는 수십 개가 포함된 프레임워크가 많았다. 비즈니스 환경과 전략이 복잡한 경우가 많기 때문에 이는 이해할 수 있는 일이다. 그러나 좋은 시각화, 즉 좋은 프레임워크는 몇 가지 주요 구성 요소로만 이뤄져 있다. 그리고 사람들로 하여금 각 요소를 지원하는 운영상의 선택 등 세부 사항을 논리적으로 유추할 수 있게 해준다. 분석 결과 구성 요소가 적은 단순한 시각화는 구성 요소가 많은 복잡한 시각화보다 주식 시장에서 훨씬 더 긍정적인 반응을 얻었다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>이 결과는 미시간주립대 교수인 게리 맥나마라와 그의 동료들이 조사한 연구결과와 일치한다. 그리고 해당 산업의 고객 유형에 대한 경영진의 멘털 모델을 조사한 결과 모델이 더 적은 요소를 가진 경영진의 회사가 재무 성과도 유의미하게 더 좋았다. 이는 fMRI 영상을 이용한 제니퍼 서머필드의 연구결과와도 일치한다. 이 연구에 따르면 풍부하고 일관된 스토리를 만드는 데는 단 3가지 개념이면 충분하다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>필자들은 57명의 경영진을 대상으로 전략적 구성 요소가 얼마나 독립적인지도 조사했다. 그 결과 시각화 자료의 주요 구성 요소가 어떤 식으로든 서로 연결돼 있지 않으면 경영진이 회사의 전략을 이해하는 데 어려움을 겪는다는 사실을 발견했다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>이 현상은 인간의 뇌가 풍경을 처리하는 방식으로 진화한 결과다. 풍경에는 산, 숲, 강, 초원 등 각기 다른 요소들이 있고, 이런 요소들은 서로 얽혀 하나의 일관된 그림을 완성한다. 좋은 전략 시각화는 이런 풍경을 모방한다. 명확하게 식별할 수 있는 제한된 수의 구성 요소를 표시하되 이런 요소가 서로 명확하게 연결돼 있어야 한다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<a href=\"https://www.hbrkorea.com/upload_dir/source/2025%200708/3_3.png\" target=\"_blank\">\t\t\t\t\t\t\t\t\t\t\t</a><br><br>\t\t\t\t\t<br>디테일을 살린 여러 층을 만들라&#160;<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>풍경을 볼 때 구성 요소를 볼 수 있지만 각 요소를 확대해 보면 훨씬 더 세부적인 사항까지 확인할 수 있다. 예를 들어 산맥을 확대해 보면 어떤 지형이 가장 덜 가파르고 바위가 적은지 확인해 가장 잘 통과할 수 있는 길을 파악할 수 있다. 마찬가지로 시각화는 각 주요 구성 요소를 확대할 때 더 자세히 알아볼 수 있는 세부 정보가 포함된 경우 가장 효과적이다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>캐피텍의 시각화 사례를 다시 한번 살펴보자. 회사의 가치 제안을 살펴보면 이를 정의하는 4가지 하위 개념이 명확하게 드러난다. 그리고 각 하위 개념에 대해 더 세부적인 층으로 내려갈 수도 있다. 예를 들어 하위 개념 중 접근성을 구성하는 요소들이 보인다. 각 지점의 물리적 개방성, 지점 내 다양한 서비스 영역의 색상 코딩, 대출 신청서를 작성할 때 직원과 고객이 컴퓨터 화면을 함께 보는 관행에서 비롯된 투명성 등이 접근성을 구성한다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>이런 층이 있어야 프레임워크가 추상적인 수준에 그치지 않고 은행의 개념 선택이 무엇을 의미하는지까지 구체적으로 보여줄 수 있다. 그래야 전략과 실행이 견고하게 연결된다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<a href=\"https://www.hbrkorea.com/upload_dir/source/2025%200708/5_2.png\" target=\"_blank\">\t\t\t\t\t\t\t\t\t\t\t</a><br><br>\t\t\t\t\t<br>색상과 음영은 층을 구분할 때만 사용하라<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>자연에서 우리는 색상 차이를 통해 각 요소의 개별적인 특징, 깊이, 층을 구분한다. 예를 들어 숲과 산은 다른 색상을 띠고, 지형의 굴곡과 깊이는 다른 음영을 가진다. 시각화에서도 색상은 동일한 역할을 한다. 시각화에서 다양한 색상과 음영이 사람들의 전략에 대한 이해에 미치는 영향을 분석한 결과, 이런 색상을 많이 사용할수록 사람들이 전략을 이해하기가 더 어려워졌다. 단, 색상과 음영을 사용해 모델의 층위를 구분했을 때는 이해도가 예외적으로 높아졌다. 캐피텍의 전략 시각화가 이해하기 쉬운 이유도 여기에 있다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<a href=\"https://www.hbrkorea.com/upload_dir/source/2025%200708/7_1.png\" target=\"_blank\">\t\t\t\t\t\t\t\t\t\t\t</a><br><br>\t\t\t\t\t<br>프레임워크의 요소들 간 명확한 관계의 순서를 표시하라<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>인수 시점에 대한 전략 프레젠테이션에 대한 연구에서 필자들은 프레임워크 시각화 자료에 구성 요소 간 관계에 대한 정보를 제공하는 커넥터가 포함돼 있는지를 조사했다. 이런 그래픽을 흐름flow&#160;다이어그램이라고 부른다. 시각화에 흐름을 나타내는 요소를 추가하면 주식 시장에서 전략의 가치가 64% 상승하는 것으로 나타났다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>서머필드가 수행한 fMRI 연구에 따르면 이야기에도 흐름이 있다. 흐름은 한 가지 요소가 다른 요소로 이어지는 것을 뜻하며 인과관계를 개념화하는 뇌 영역에서 처리된다. 따라서 훌륭한 시각화 자료에서 흐름은 회사가 전달하고자 하는 스토리를 그대로 따라가며 힘을 실어준다. 예를 들어 캐피텍 슬라이드에 표시된 흐름은 은행이 처음으로 계좌를 개설하는 저소득층 고객에게 단순하고 부담 없으며 저렴한 금융 서비스를 제공하기 위해 지역사회 주민들과 함께 접근성이 뛰어난 지점망을 구축한 스토리를 그대로 반영한다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<a href=\"https://www.hbrkorea.com/upload_dir/source/2025%200708/9.png\" target=\"_blank\">\t\t\t\t\t\t\t\t\t\t\t</a><br><br>\t\t\t\t\t<br>프레임워크를 수평적으로 구성하라<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>마지막으로 필자들은 프레임워크가 수평적인 방식으로 제시될 때 회사의 전략에 대한 통찰을 얻는 것이 훨씬 더 쉽다는 사실을 발견했다. 이런 효과는 매우 강력했다. 풍경도 수평적이다. 따라서 이것 역시 인간이 진화해온 맥락을 반영한 결과일 것이다. 우리의 수평적 주변 시야가 180도인 반면 수직적 주변 시야는 약 135도에 불과하다는 것은 놀라운 일이 아니다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>실제로 1981년 노벨 생리의학상(로저 스페리와 공동 수상)을 수상한 데이비드 휴벨과 토르스텐 위젤의 시각 피질 민감도에 대한 연구에 따르면 시각 피질의 뉴런은 다른 방향보다 수평 방향에 더 잘 적응하는 것으로 밝혀졌다. 따라서 인간의 뇌는 가로 레이아웃을 더 쉽게 처리한다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>전략 시각화가 포함된 170개의 프레젠테이션(654개의 표본 중)은 대부분 우리의 권장 사항 일부를 준수했다. 그중 약 65%는 주로 가로 방식의 레이아웃을 따랐다. 아마도 파워포인트의 기본 가로 방향에 따라 그렇게 했을 것이다. 또한 약 90%는 프레임워크 구성 요소를 시각적으로 구분해 표시했다.(나머지 10%에서는 개별 구성 요소가 명확히 구분되지 않고 매트릭스나 그래프로 한데 묶여 있었다.) 그리고 71%는 화살표, 겹침 또는 유사한 색상을 활용해 모델의 각 요소가 어떻게 연결돼 있는지 표시했다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>그러나 구성 요소가 명확하게 구분되고 요소 간의 상호 관계가 명시적인 수평적 프레임워크로 표시된 시각화 자료는 절반에도 미치지 못했다. 가장 극적인 단점은 층이 없다는 점이었다. 32%의 기업만이 모델에 추가적인 세부 층을 보여줬다. 즉, 전체 시각화 자료의 20% 미만, 즉 170개 중 32개만이 직원과 투자자가 회사의 전략을 명확하게 파악할 수 있게 했다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>그렇다, 디자인 규칙은 중요하다<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>다음으로 필자들은 이런 규칙을 따르는 것이 사람들이 전략을 이해하는 데 얼마나 영향을 미치는지 테스트하기로 했다. 이를 위해 3년 이상의 관리 경력을 가진 150명을 모집해 두 그룹으로 나눴다. 캐피텍(‘T-Banc’로 익명 처리)에 대한 아주 짧은 설명을 제공한 다음, 우리가 만든 올바른 시각화 자료와 결함이 있는 자료를 함께 보여줬다. 두 번째 버전에는 첫 번째 버전과 정확히 동일한 개념이 포함돼 있었지만 동심원 모양으로 구성돼 있었고 전략의 주요 개념과 하위 개념이 무엇이고 서로 어떻게 연관돼 있는가 명확히 드러나지 않았다.(‘잘못된 방법’ 참고) 두 번째 그래픽은 의도적으로 규칙을 무시했다. 하지만 이는 우리가 흔히 경험하는 일반적인 전략 슬라이드 구조였다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<a href=\"https://www.hbrkorea.com/upload_dir/source/2025%200708/096_6.png\" target=\"_blank\">\t\t\t\t\t\t\t\t\t\t\t</a><br><br>\t\t\t\t\t<br>피험자들이 주어진 시각화 자료를 학습한 뒤 우리는 이들이 은행의 전략을 얼마나 잘 이해했는지, 시각화가 얼마나 유용했는지에 대해 몇 가지 질문을 던졌다. 처음에는 두 그룹 간에 차이가 없었다. 사람들은 시각화 자료가 은행의 전략을 이해하는 데 똑같이 유용하다고 인식한 것 같았다. 그러나 참가자들에게 전략에 대해 간단히 설명해 달라고 요청하자 큰 차이를 발견할 수 있었다. 평균적으로 올바른 시각화 자료를 본 사람들은 결함이 있는 자료를 본 사람들보다 전략에 대한 이해도에서 1점 이상 높은 점수(7점 척도)를 받았다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>이처럼 효과적인 버전을 본 응답자들은 실제로 캐피텍의 전략에 대해 훨씬 더 잘 이해하고 있었다. 스스로 그 사실을 알지 못했더라도 말이다. 즉, 사람들은 스스로 전략 프레임워크의 시각적 특성에 얼마나 많은 영향을 받는지 대개 깨닫지 못한다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>경영진은 전략을 발표할 때 종종 시각 자료, 특히 파워포인트를 활용한다. 하지만 슬라이드의 디자인이 얼마나 중요한지 이해할 필요가 있다. 전략은 사람들이 협력해 가치를 창출하는 핵심 메커니즘이다. 적절한 시각화로 이를 명확히 전달하면 각자가 고립된 채로 일하는 것이 아니라 비즈니스 여정을 함께할 수 있다. 잘 디자인된 시각화 하나만으로 투자자 반응은 두 배로 커지고 기업 가치도 즉시 수천만 달러에서 수억 달러까지 상승할 수 있다. 또한 전략을 실행하는 직원들의 장기적인 성과에도 훨씬 더 큰 영향을 미칠 수 있다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>주앙 코터 살바도(Joo Cotter Salvado)는 카톨리카 리스본 경영경제대학의 조교수다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>프리크 베르뮐렌(Freek Vermeulen)은 런던경영대학원의 교수이며 저서로는 ＜Breaking Bad Habits: Defy Industry Norms and Reinvigorate Your Business＞(Harvard Business Review Press, 2017)가 있다.<br>\t\t\t\t\t<br>\t\t\t\t\t<br>전략을 한 장으로 나타내라<br>\t\t\t\t\t<br>슬라이드 한 장으로 명확하게 표현하는 것이 직원과 투자자를 사로잡는 최선의 방법이다<br>\t\t\t\t\t<br>총 슬라이드 수: 25장<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>저자 정보<br>\t\t\t\t\t<br>프리크 베르묄렌(Freek Vermeulen) • 런던경영대학원 교수 • 저서: Breaking Bad Habits: Defy Industry Norms and Reinvigorate Your Business (Harvard Business Review Press, 2017)<br>\t\t\t\t\t<br>주앙 코터 살바도(Jo&#227;o Cotter Salvado) • 카톨리카 리스본 경영경제대학 조교수<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>원문 정보<br>\t\t\t\t\t<br>제목: 전략을 한 장으로 나타내라<br>\t\t\t\t\t<br>부제: 슬라이드 한 장으로 명확하게 표현하는 것이 직원과 투자자를 사로잡는 최선의 방법이다<br>\t\t\t\t\t<br>저자: 프리크 베르묄렌, 주앙 코터 살바도<br>\t\t\t\t\t<br>일러스트레이터: 라이언 칼(Ryan Carl)<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>아티클 구조<br>\t\t\t\t\t<br>1. 내용 요약 • 문제, 발생 원인, 해결책<br>\t\t\t\t\t<br>2. 왜 - 보는 것이 믿는 것이다 • 센스메이킹에서 센스기빙으로 • 시각화의 중요성<br>\t\t\t\t\t<br>3. 무엇을 - 캐피텍의 사례 • 남아공 최대 소매 은행의 전략 시각화 사례<br>\t\t\t\t\t<br>4. 어떻게 - 훌륭한 전략 슬라이드를 만드는 요소 • 5가지 구체적인 디자인 규칙 • 실증 연구 결과<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>핵심 문제 정의<br>\t\t\t\t\t<br>비슷한 두 회사의 투자자 반응 차이 • 거의 동일한 전략을 제시함에도 시장 반응이 극명하게 달라짐 • 사이프레스 반도체: 스팬션 인수 발표 후 주가 13% 상승 • 메디슨스 컴퍼니: 인클라인 테라퓨틱스 인수 발표 후 주가 1.8% 상승 • 1년 후 두 거래 모두 실제로 13% 가치 상승 달성<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>연구 범위 및 발견<br>\t\t\t\t\t<br>2012~2017년 미국 대형 거래 654건 분석 • 유사한 거래 간 시장 반응의 불균형 패턴 발견 • 핵심 차별화 요소: 전략적 근거를 설명하는 슬라이드 존재 여부<br>\t\t\t\t\t<br>결과 • 전략 시각화가 포함된 경우 투자자의 긍정적 반응 가능성 2배 이상 증가 • 다른 시각적 도구(사진, 지도, 차트) 대비 4배 더 큰 영향<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>1단계 - 센스메이킹에서 센스기빙으로<br>\t\t\t\t\t<br>경영진의 센스메이킹 과정 • 비즈니스 상황 이해를 위한 '인지적 지도' 생성 • 경쟁업체와 고객 유형 분류 • 회사의 주요 자원과 역량 파악 • 인과관계 분석<br>\t\t\t\t\t<br>센스기빙의 필요성 • 전략 합의 후 이해관계자에게 전달 • 직원들의 일상적 의사결정에 반영 • 시각화를 통한 인지적 지도 전달이 가장 효과적<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>2단계 - 캐피텍 사례 분석<br>\t\t\t\t\t<br>회사 개요 • 2000년대 초 설립된 남아프리카공화국 은행 • 현재 남아공 최대 소매 은행 • 래퍼티 그룹이 2년 연속 세계 최고의 은행으로 선정<br>\t\t\t\t\t<br>시장 상황 분석 • 4개 대형 은행이 시장 장악 • 타겟: 기존 은행이 소홀히 한 '금융 지식이 부족한 저소득층'<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>캐피텍의 핵심 전략 개념<br>\t\t\t\t\t<br>1️⃣ 타겟 고객 • '금융 지식이 부족한 사람들' (은행 계좌가 없는 저소득층)<br>\t\t\t\t\t<br>2️⃣ 가치 제안 • <b>'단순한 하나의 계정'</b>으로 기본 요구사항 충족<br>\t\t\t\t\t<br>3️⃣ 필요 자원과 역량 • 현지 지점 네트워크 • 간편한 기술 플랫폼 • 친근한 조직 문화<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>가치 제안의 4가지 하위 개념<br>\t\t\t\t\t<br>&#128176; 경제성 • 경쟁사 절반 수준의 낮은 수수료 • 현금에서 은행으로 전환 유도<br>\t\t\t\t\t<br>⚡ 단순성 • 저축, 대출, 현금 없는 거래만 가능한 한 가지 계좌 • 복잡한 부수 서비스 제외<br>\t\t\t\t\t<br>&#127970; 접근성 • 대규모 현지 지점 네트워크 • 완전히 개방된 매장 전면 • 문맹자를 위한 색상 카펫 시스템<br>\t\t\t\t\t<br>&#128101; 개인 서비스 • 소매업, 서비스업 출신 직원 채용 • 지역 언어와 관습에 맞는 서비스<br>\t\t\t\t\t<br><br>\t\t\t\t\t<a href=\"https://www.hbrkorea.com/upload_dir/source/2025%200708/096_5.png\" target=\"_blank\">\t\t\t\t\t\t\t\t\t\t\t</a><br><br>\t\t\t\t\t<br>캐피텍 전략의 선순환 구조<br>\t\t\t\t\t<br>비용 절감 → 규모 확보 → 서비스 단순화 • 낮은 수수료로 고객 유치 • 대량 고객 확보로 비용 분산 • 단순한 서비스로 운영비 절감<br>\t\t\t\t\t<br>현지 직원 활용의 효과 • 높은 가입률 달성 • 낮은 대출 연체율 유지 • 지역 네트워크와 지식 활용<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>조직 문화의 차별화<br>\t\t\t\t\t<br>기존 남아공 금융기관 • 형식적이고 딱딱한 문화 • 위계적인 고객 상호작용 • 진중한 이미지 추구<br>\t\t\t\t\t<br>캐피텍의 접근 • 친근하고 따뜻한 직원 서비스 • 은행 방문을 두려워하는 저소득층 고객 배려 • 접근하기 쉬운 분위기 조성<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>전략 시각화의 효과<br>\t\t\t\t\t<br>구두 설명의 한계 • 당장은 설득력이 있지만 복잡함 • 전략 개발 참여자가 아닌 사람은 이해 어려움<br>\t\t\t\t\t<br>시각화의 장점 • 슬라이드 한 장에 모든 개념과 관계 표현 • 3가지 주요 전략 개념 명확히 구분 • 개념 간 상호작용과 수익성 있는 역학 관계 표시<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>시각화 연구 방법론<br>\t\t\t\t\t<br>연구 설계 • 런던경영대학원 임원 57명 참여 • 다양한 기업의 60개 전략 시각화 자료 연구 • 시선추적 기술 활용<br>\t\t\t\t\t<br>평가 기준 • 회사 전략에 대한 학습 정도 • 인사이트 획득 여부 • 이해도 향상 정도<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>규칙 1 - 서너 개의 주요 개념으로 그룹화<br>\t\t\t\t\t<br>단순함의 힘 • 구성 요소가 적은 시각화가 더 긍정적인 시장 반응 • 3가지 개념으로 일관된 스토리 구성 가능<br>\t\t\t\t\t<br>연결성의 중요성 • 주요 구성 요소가 서로 연결되어야 함 • 독립적인 요소들은 이해를 어렵게 만듦<br>\t\t\t\t\t<br>인간 뇌의 특성 • 풍경 처리 방식과 유사 • 제한된 요소들이 얽혀 일관된 그림 완성<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>규칙 2 - 디테일을 살린 여러 층 만들기<br>\t\t\t\t\t<br>계층적 구조의 필요성 • 각 주요 구성 요소를 확대했을 때 세부 정보 제공 • 추상적 수준을 넘어서 구체적 의미 전달<br>\t\t\t\t\t<br>캐피텍 사례 • 접근성 하위 요소: 물리적 개방성, 색상 코딩, 투명성 • 전략과 실행의 견고한 연결 제공<br>\t\t\t\t\t<br>효과 • 프레임워크가 추상적 수준에 그치지 않음 • 실제 운영 방식까지 구체적으로 제시<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>규칙 3 - 색상과 음영은 층 구분용으로만<br>\t\t\t\t\t<br>자연에서의 색상 역할 • 각 요소의 개별 특징, 깊이, 층 구분 • 숲과 산의 서로 다른 색상 • 지형 굴곡의 다른 음영<br>\t\t\t\t\t<br>시각화에서의 적용 • 많은 색상 사용 시 이해도 저하 • 모델의 층위 구분용으로만 사용할 때 이해도 향상 • 캐피텍 시각화가 이해하기 쉬운 이유<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>규칙 4 - 요소 간 명확한 관계 순서 표시<br>\t\t\t\t\t<br>흐름 다이어그램의 효과 • 구성 요소 간 관계 정보 제공 • 시장에서 전략 가치 64% 상승 효과<br>\t\t\t\t\t<br>뇌과학적 근거 • 인과관계 개념화 뇌 영역에서 처리 • 이야기의 흐름과 동일한 메커니즘<br>\t\t\t\t\t<br>캐피텍 사례 • 저소득층 → 단순한 서비스 → 접근성 뛰어난 지점망 • 스토리를 그대로 반영하는 흐름<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>규칙 5 - 프레임워크를 수평적으로 구성<br>\t\t\t\t\t<br>인간의 시각적 특성 • 수평적 주변 시야: 180도 • 수직적 주변 시야: 135도<br>\t\t\t\t\t<br>뇌과학적 근거 • 노벨상 수상 연구: 시각 피질 뉴런이 수평 방향에 더 잘 적응 • 인간의 뇌는 가로 레이아웃을 더 쉽게 처리<br>\t\t\t\t\t<br>실제 적용률 • 분석 대상 중 <b>65%</b>가 가로 방식 레이아웃 채택<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>현실적인 적용 현황<br>\t\t\t\t\t<br>기본 원칙 준수율 • 가로 레이아웃: 65% • 구성 요소 시각적 구분: 90% • 요소 간 연결 표시: 71%<br>\t\t\t\t\t<br>문제점 • 추가적인 세부 층 표시: <b>32%</b>만 적용 • 5가지 규칙을 모두 만족하는 시각화: 20% 미만 • 170개 중 32개만이 효과적인 전략 전달<br>\t\t\t\t\t<br><br>\t\t\t\t\t<a href=\"https://www.hbrkorea.com/upload_dir/source/2025%200708/096_6.png\" target=\"_blank\">\t\t\t\t\t\t\t\t\t\t\t</a><br><br>\t\t\t\t\t<br>실증 테스트 결과<br>\t\t\t\t\t<br>실험 설계 • 3년 이상 관리 경력자 150명 참여 • 캐피텍 사례를 올바른 버전과 결함 있는 버전으로 제시<br>\t\t\t\t\t<br>결과 • 초기 유용성 인식: 동일 • 실제 전략 이해도: 올바른 시각화 그룹이 1점 이상 높음 (7점 척도)<br>\t\t\t\t\t<br>시사점 • 사람들은 시각적 특성의 영향을 스스로 인식하지 못함 • 실제 이해도에는 상당한 차이 발생<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>비즈니스 임팩트<br>\t\t\t\t\t<br>투자자 반응 • 적절한 시각화로 투자자 반응 2배 증가 • 기업 가치 수천만 달러에서 수억 달러 즉시 상승<br>\t\t\t\t\t<br>직원 성과 • 전략 실행 직원들의 장기적 성과 향상 • 고립된 업무가 아닌 비즈니스 여정을 함께 할 수 있음<br>\t\t\t\t\t<br>핵심 메커니즘 • 전략은 사람들이 협력해 가치를 창출하는 핵심 도구 • 명확한 시각화를 통한 효과적 전달 필수<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>내용 요약<br>\t\t\t\t\t<br>핵심 발견 • 전략 시각화가 투자자 반응에 결정적 영향 • 5가지 디자인 규칙으로 효과적인 시각화 구현 가능 • 대부분 기업이 시각화의 중요성을 과소평가<br>\t\t\t\t\t<br>실무 적용 • 서너 개 주요 개념으로 그룹화 • 계층적 세부 정보 제공 • 색상은 층 구분용으로만 사용 • 요소 간 명확한 관계 표시 • 수평적 레이아웃 구성<br>\t\t\t\t\t<br>기대 효과 • 투자자 신뢰도 향상 • 직원 이해도 및 실행력 제고 • 기업 가치 즉각적 상승<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>Agenda<br>\t\t\t\t\t<br>1. 현재 우리 조직에서 전략을 설명할 때 주로 사용하는 방식은 무엇이며, 이것이 직원들의 실제 업무 결정에 어떤 영향을 미치고 있나요?<br>\t\t\t\t\t<br>2. 캐피텍처럼 기존 시장의 소외된 고객층을 타겟으로 하는 전략을 생각할 때, 우리 업계에서는 어떤 고객층이 이에 해당할까요?<br>\t\t\t\t\t<br>3. 복잡한 비즈니스 전략을 3-4개의 핵심 개념으로 압축한다면, 우리 회사의 전략은 어떻게 표현할 수 있을까요?<br>\t\t\t\t\t<br>4. 전략 시각화에서 '층'의 개념을 적용할 때, 우리의 핵심 가치 제안을 구성하는 하위 요소들은 무엇인가요?<br>\t\t\t\t\t<br>5. 투자자나 직원에게 전략을 설명할 때 시각화 자료 없이 구두로만 설명했던 경험이 있다면, 그때의 한계점은 무엇이었나요?<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>Agenda<br>\t\t\t\t\t<br>6. 색상과 디자인 요소를 과도하게 사용한 프레젠테이션을 본 경험이 있다면, 그것이 내용 이해에 어떤 영향을 미쳤나요?<br>\t\t\t\t\t<br>7. 우리 조직의 전략에서 각 요소들 간의 '흐름'이나 인과관계를 명확히 보여줄 수 있는 연결고리는 무엇인가요?<br>\t\t\t\t\t<br>8. 캐피텍의 사례에서 보듯이 조직 문화가 전략 실행에 미치는 영향에 대해 어떻게 생각하시나요? 우리 조직의 문화는 전략과 일치하고 있나요?<br>\t\t\t\t\t<br>9. 전략 커뮤니케이션에서 '센스메이킹'에서 '센스기빙'으로의 전환이 왜 중요하며, 이를 위해 리더가 가져야 할 역량은 무엇일까요?<br>\t\t\t\t\t<br>10. 연구 결과에 따르면 사람들은 시각화의 영향을 스스로 인식하지 못한다고 합니다. 이런 특성을 고려할 때 전략 커뮤니케이션에서 주의해야 할 점은 무엇일까요?<br>\t\t\t\t\t<br>\t\t\t\t<br>\t\t\t\t<br>\t\t\t\t\t<br>인사조직<br>\t\t\t\t\t<br>인재를 재교육할 것인가, 교체할 것인가?<br>\t\t\t\t\t<br><a href=\"https://www.hbrkorea.com/article/author/wno/1240\" target=\"_blank\">윌리엄 커(William R. Kerr)</a><br>\t\t\t\t\t<br>매거진<br>\t\t\t\t\t<br>2025. 7-8월호<br>\t\t\t\t\t<br>\t\t\t\t\t<br>&#160;나의 서재<br>\t\t\t\t\t<a href=\"https://www.hbrkorea.com/article/view/atype/ma/category_id/2_1/article_no/2345/page/1#\" target=\"_blank\">\t\t\t\t\t\t\t\t\t\t\t</a><br>&#160;<a href=\"https://www.hbrkorea.com/article/view/atype/ma/category_id/2_1/article_no/2345/page/1#\" target=\"_blank\">공유</a><br>\t\t\t\t\t<br>\t\t\t\t\t<br>&#160;글씨 크기<br>\t\t\t\t\t<a href=\"https://www.hbrkorea.com/article/view/atype/ma/category_id/2_1/article_no/2345/page/1#\" target=\"_blank\">\t\t\t\t\t\t\t\t\t\t\t</a><br>&#160;<a href=\"https://www.hbrkorea.com/article/view/atype/ma/category_id/2_1/article_no/2345/page/1#\" target=\"_blank\">PDF 다운로드</a><br>\t\t\t\t\t<br><br>\t\t\t\t\t<a href=\"https://www.hbrkorea.com/upload_dir/source/2025%200708/175_1.png\" target=\"_blank\">\t\t\t\t\t\t\t\t\t\t\t</a><br>Illustrations by&#160;Jori Bolton<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>알렉스 리베라Alex Rivera는 의자에 깊이 기대 앉아 책상 위에 펼쳐진 차트와 미래 예측 보고서를 바라보며 골똘히 생각에 잠겼다. 솔리드테크 이노베이션SolidTech Innovations의 CEO로 취임한 지 3년, 그는 회사의 미래를 진지하게 고민하고 있었다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>80년이 넘는 세월 동안 비상장 기업인 솔리드테크는 엘리베이터 제조 분야에서 업계를 선도해 왔다. 이 회사는 전 세계 상업용 건물에 신뢰할 수 있고 내구성이 뛰어난 시스템을 설치, 유지 보수하는 것으로 이름을 얻었다. 그러나 사물인터넷 시대가 열리면서 업계는 새로운 방향으로 나아가고 있었다. 스마트 빌딩에는 스마트 엘리베이터가 필수였다. 벤처캐피털과 사모펀드의 지원을 받은 신생 기업들은 사전 감지가 가능한 정비 시스템, 비접촉식 제어, AI 기반 교통흐름 최적화, 건물 관리 기술과 통합되는 클라우드 기반 모니터링 플랫폼을 탑재한 모델들을 앞다퉈 시장에 내놓고 있었다. 엘리베이터라는 수직 이동 수단은 단순히 사람을 층과 층으로 안전하게 이동시키는 정도를 넘어 데이터와 효율, 소프트웨어와 하드웨어의 융합으로 미래를 그려가고 있었다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>“그 점을 계속 강조하셔야 해요.” 알렉스 맞은편에 앉아 있는 컨설턴트 세라 톰슨Sarah Thompson이 말했다. “직원들은 케이블, 평형추, 모터 시스템에 대해선 해박하지만 API나 머신러닝, 사용자 경험 디자인에 대해서는 거의 알지 못합니다. 이건 기업의 존재 자체를 위협할 수 있는 문제예요.”<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>과거 베인앤드컴퍼니 파트너 출신으로 현재는 본인의 컨설팅 회사를 운영하고 있는 세라는 미래지향적인 사고와 가차 없는 솔직함으로 명성이 높았다. 알렉스가 그를 고문으로 영입한 이유도 바로 그 때문이었다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>“그래서 솔리드테크가 ‘대타협안Grand Bargain’을 추진해야 하는 겁니다.” 그는 알렉스 앞에 놓인 프레젠테이션 자료를 가볍게 두드리며 말을 이었다. “기존 인력을 재교육하는 선택 참여형 프로그램을 운영하세요. 직원들은 새로운 기술을 배우는 데 시간을 투자하고, 회사는 이 치열한 노동시장에서 수천 명의 소프트웨어 엔지니어를 새로 찾아 나서지 않더라도 필요한 인재를 확보할 수 있게 되는 겁니다.”<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>알렉스는 천천히 고개를 끄덕였다. “온라인 교육, MOOC, 커뮤니티 칼리지 강좌까지 우리가 다 제공할 수 있는 건가요?”<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>“네, 대부분은 회사에서 비용을 부담할 수 있어요. 다만 직원들이 추가 과정까지 수강하길 원한다면 파격적인 단체 할인 혜택을 확보해 줄 수 있습니다.” 세라가 대답했다. “변화에 적응하는 사람은 이곳에서 미래를 찾을 수 있겠죠. 그렇지 않은 사람들은…” 그녀는 의미심장한 여운을 남겼다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>“참여하지 않는 직원들은 보직변경이나 임금 삭감이 있을 수 있다는 얘기네요.” 알렉스가 말했다. “그렇게까지 해야 하나 싶습니다.”<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>“재교육은 균형을 잘 맞춰야 하는 일입니다.” 세라가 답했다. “비용을 통제하려면 변화에 동참하지 않는 직원들에게는 일정한 조치가 따를 수밖에 없어요. 그런 조치와 자발적 이직이 프로그램 비용을 상쇄하는 데 도움이 될 겁니다.”<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>자리에서 일어난 알렉스는 창가로 걸어가 솔리드테크 캠퍼스를 바라보았다. 수십 년 동안 회사와 함께해온 팀원들이 여러 건물에 서 근무하고 있었다. 그는 일자리를 잃게 될 직원들이 초래할 광범위한 파장을 생각했다. 솔리드테크에만 국한된 문제가 아니라 전국적으로도 영향을 미칠 사안이었다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>“이건 우리 회사의 손익에 국한된 문제가 아닙니다.” 알렉스가 조용히 말했다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>세라는 고개를 끄덕였다. “그래서 제가 ‘윈-윈 전략’을 제안하는 겁니다. 이건 고용주와 근로자 간의 새로운 사회적 계약이에요. 회사는 성장의 발판을 제공하고 직원들은 본인 미래에 대한 책임을 지는 거죠.”<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>“먼저 오너들과 상의해보죠.” 알렉스가 말했다. “오너마저 주저한다면 그건 우리에게 분명한 메시지를 주는 겁니다.”<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>“기존 직원들을 필요한 수준까지 끌어올려서 계속 고용 가능한 상태로 만들 수 있을까요? 아니면 결국 신규 소프트웨어 인재를 채용하고 기존 인력의 일부는 정리해야 할까요?”<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>주주들의 반발<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>“우리의 5개년 계획은 인력 전환에 달려 있습니다.” 알렉스가 설명했다. 솔리드테크 주요 주주들이 화상회의 화면 너머로 그를 주시하고 있었다. “현재 노동시장이 매우 경색돼 있는 만큼 기존 인력을 재교육하고 지속적인 학습 문화를 조성하는 방안을 고민하고 있습니다. 이번 대타협안은 업계 전문성을 유지하면서 경쟁력을 확보하는 데 중요한 역할을 할 것입니다. 오늘 이 자리에 저희 고문인 세라 톰슨 씨가 함께하고 있으니 궁금하신 점이 있으시면 답변해 드리겠습니다.”<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>솔리드테크의 창업주 일가를 대표하며 여전히 회사 지분의 과반을 보유한 투자신탁 대표 리치 사이먼드Rich Symond가 가장 먼저 마이크의 음소거를 끄고 입을 열었다. “이런 프로그램이 실제로 효과 있다는 근거가 있습니까? 기존 직원들을 필요한 수준까지 끌어올려서 계속 고용 가능한 상태로 만들 수 있을까요? 아니면 결국 신규 소프트웨어 인재를 채용하고 기존 인력의 일부는 정리해야 할까요? 오랜 기간 회사를 지켜온 직원들에게 그렇게 하는 걸 가족들은 원치 않을 겁니다. 하지만 수백만 달러를 재교육에 쏟아 붓고도 결과적으로 젊은 인재를 바로 채용한 경쟁사들보다 뒤처지게 될까봐 걱정됩니다.”<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>알렉스가 대답하기도 전에 솔리드테크의 2대 주주인 RT 힝클리 캐피털RT Hinkley Capital의 아카시 라오Akash Rao가 끼어들었다. “사실 저는 솔리드테크에서 구조조정을 추진할 수 있는 좋은 기회라고 봅니다. 지금 회사는 수익성을 개선해야 하는데, 이 재교육 프로그램이 알렉스에게 인력 슬림화를 단행할 명분을 준다면 저는 전적으로 찬성입니다.”<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>알렉스는 얼굴을 살짝 찡그렸다. 무엇보다 피하고 싶은 것이 대규모 해고를 지휘하는 일이었다. 그가 곁에 앉은 세라를 힐끗 바라보자 세라가 곧바로 나섰다. “이 계획의 본질은 절대 그런 것이 아닙니다.” 세라가 단호하게 말했다. “이 프로그램은 직원들이 적합한 역량을 갖췄을 때만 함께 할 수 있다는 현실을 인식하면서도 가능한 한 인재를 유지하고, 조직의 축적된 지식과 문화를 보존하면서 동시에 역량을 발전시키기 위한 노력입니다. 네, 맞습니다. IBM이나 아마존 같은 기업들도 유사한 전략을 통해 성공을 거둔 사례가 분명히 있습니다.”<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>소수 지분 투자자인 메리디언 벤처Meridian Ventures의 모니카 첸Monica Chen이 이어서 입을 열었다. “재교육 프로그램이라는 아이디어 자체는 정말 좋다고 생각해요. 실제로 효과가 입증된 사례도 많다는 점에 동의합니다. 하지만 실질적인 우려도 있습니다. 솔리드테크의 가장 큰 비즈니스 기회는 여전히 노후 건물의 엘리베이터 개보수에 있습니다. 게다가 신흥 시장의 고객들은 대부분 비용에 매우 민감하죠. 엘리베이터는 기본적으로 잘 오르내리기만 하면 된다는 생각을 갖고 있습니다. 우리가 혁신이라는 말에 휘둘려서 정작 상식적인 판단을 놓치고 있는 건 아닌지 걱정됩니다. 지금 이 방향이 진짜로 우리가 집중해야 할 영역일까요? 스마트 커넥티드 엘리베이터는 작은 규모로, 어쩌면 별도 브랜드로 조심스럽게 시작해야 하는 건 아닐까요?”<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>“모니카 씨께서 기술 과열 현상을 잘 지적해 주셨네요.” 팔콘 캐피털Falcon Capital의 토머스 스미스Thomas Smith가 말했다. “온라인 대학이나 MOOC 스타트업은 위험 부담이 큰 파트너들입니다. 요즘 기술 업계에서 이들이 대세인 건 알지만 굳이 우리가 그 위험을 감수할 이유가 있을까요? 솔직히 말해 직원 재교육이 과연 회사의 책임인가요? 보수적인 친구들은 개인이 책임져야 할 일이라고 할 것이고, 진보적인 친구들은 국가가 맡아야 한다고 할 겁니다”.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>회의가 끝난 후, 알렉스는 회의실에 남아 메모를 검토했다. 솔리드테크의 오너들은 전혀 한 목소리를 내지 않았다. 세라가 그의 어깨에 가볍게 손을 얹었다. “질문이 나올 수밖에 없는 상황이었어요.” 세라가 말했다. “변화는 늘 두려운 법이죠. 특히 비용이 많이 들 것처럼 보이면 더욱 그렇습니다. 하지만 주주들도 충분히 설득할 수 있어요. 이번 전환을 성공적으로 추진하는 가장 좋은 방법은 재교육입니다.”<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>알렉스는 고개를 끄덕였다. “내일 주요 관리자들과 미팅은 그대로 진행하죠. 세라 씨가 지난 몇 주간 회사에 드나드니 소문도 퍼지고 있는 것 같네요. 가능한 한 빨리 관리자들의 의견을 듣는 게 좋겠습니다.”<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<a href=\"https://www.hbrkorea.com/upload_dir/source/2025%200708/JulAug25_CASE_2.png\" target=\"_blank\">\t\t\t\t\t\t\t\t\t\t\t</a><br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>직원들의 시각<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>엔지니어링, 제조, 설치, 유지보수, 영업, 재무 부서의 리더들이 회의실로 차례로 들어서자, 알렉스는 한 사람 한 사람과 악수를 나누며 인사를 건넸고 곧 테이블 상석에 자리를 잡았다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>그의 오른편에 앉은 세라가 조용히 속삭였다. “기회부터 강조하세요. 위협으로 들리면 안 됩니다.”<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>“오늘 이렇게 시간 내주셔서 감사합니다.” 알렉스가 입을 열었다. “여러분도 잘 아시다시피 우리 업계는 지금 빠르게 변화하고 있습니다. 솔리드테크의 미래, 그리고 우리 팀 전체의 미래를 지키기 위해 어떤 방향으로 진화해야 할지 고민하고 있습니다.”<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>그는 몇 분간 ‘대타협안’에 대해 설명했다. “참여하시는 분들은 솔리드테크의 미래를 이끌어갈 위치에 서게 될 것이며 재직 기간 동안 지속적인 교육 기회를 누리게 될 것입니다.” 그가 마무리하며 말했다. “반면 참여하지 않는 분들은… 향후 기회가 제한될 수 있습니다. 이제 여러분의 생각을 듣고 싶습니다.”<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>솔리드테크에서 25년 근무한 베테랑이자 엔지니어링 총괄 책임자인 존 로랑Jon Laurent이 가장 먼저 말을 이었다. “알렉스가 이 회사에 합류한 이후 우리는 늘 솔직한 관계를 유지해 왔다고 생각합니다. 그래서 이렇게 직설적으로 말씀드려도 괜찮을 거라 믿습니다. 저는 이 계획이 효과를 낼 거라고 보지 않습니다. 우리 회사의 핵심 경쟁력은 직원들이 오랜 시간에 걸쳐 쌓아온 암묵적이고 값진 전문성에 있습니다. 그런데 그들을 움직이게 하는 게 뭔지 아세요? 작업복을 입고 손으로 일하는 그 자체입니다. 디지털화를 추진하자는 취지와 그걸 도와줄 신입직원을 일부 영입할 수 있다는 것도 이해합니다. 하지만 저희 팀원들은 컴퓨터 앞에 앉아 있는 사무직이 되고싶어 하지 않아요. 만약 이런 방향을 강제로 밀어붙인다면 그들은 회사를 떠날 겁니다. 그 말은 곧 수십 년의 경험과 핵심 기술이 한순간에 밖으로 사라지는 것이나 마찬가지라는 얘기죠.”<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>존의 발언에 제조, 설치, 유지보수 부서의 동료들이 모두 크게 고개를 끄덕이며 조용히 동의하는 말을 주고받았다. 그는 이렇게 말을 이어갔다. “고객 현장에 도착한 서비스 기술자는 우리가 제공하는 가치를 눈으로 보여주는 상징입니다. 그런 우리가 한밤중에 소프트웨어 업데이트나 전송하는 수준으로 전락하면 최전선에 있는 고객과의 밀접한 관계는 사라지게 됩니다. 그렇게 되면 충성도 무너질 겁니다.”<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>알렉스는 복부 깊숙한 곳에서 서서히 조여오는 긴장감을 느꼈다. 그 역시 비슷한 우려를 품고 있었지만 애써 외면해 왔던 문제였다. 마침 영업총괄책임자인 마야 페리노Maya Perrineau가 발언을 이어가자 그는 내심 안도의 숨을 내쉬었다. “하지만 이게 바로 대부분이 ‘업스킬링’이라는 말에 자동으로 보이는 반응 아니겠어요? ‘우리 업계가 정말 그렇게까지 빠르게 변하고 있는 걸까?’ ‘정말 모두가 변해야 하는 걸까?’ ‘디지털 팀을 확장해서 그쪽 일만 따로 맡기면 되는 거 아냐?’ 하지만 제가 확실히 말씀드릴 수 있는 것은 지금 고객들이 원하는 건 우리가 늘 잘 만들어왔던 엘리베이터에 현대적인 편의 기능이 통합된 제품이라는 겁니다. 겉에 덧씌운 게 아니라 기술이 본질에 녹아든 그런 제품 말이죠.”<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>“만약 이런 방향을 강제로 밀어붙인다면 그들은 회사를 떠날 겁니다. 그 말은 곧 수십 년의 경험과 핵심 기술이 한순간에 밖으로 사라지는 것이나 마찬가지죠.”<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>솔리드테크의 최고재무책임자인 토니 우Tony Wu가 다음으로 입을 열었다. “일본의 ‘유령 사무실’ 이야기가 떠오르네요. 평생고용을 약속한 기업들이 더 이상 쓸 만한 기술이 없는 직원을 보내는 곳입니다. 형식상 고용은 유지되지만 실제로는 아무런 역할도 주어지지 않죠. 말 그대로 유령 같은 존재들입니다.” 그는 말을 멈췄다. “말할 필요도 없이 우리는 그런 식으로 운영할 여력이 없습니다. 무엇보다 우리 중 누구도 그런 결과를 바라지는 않을 겁니다. 모두가 시대에 맞는 역량을 유지할 수 있도록 함께 노력해야 합니다. 그런 점에서 알렉스의 계획은 타당한 해결책이 될 수 있을 것으로 보입니다.”<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>“하지만 재교육의 대상은 저희 부서입니다.” 존이 반박했다. “재교육을 받아야 할 사람들은 우리 팀의 엔지니어, 설치 기술자, 그리고 유지보수 인력입니다. 그들이 모두 그걸 감당할 수 있을지 혹은 감당하려고 할지조차 확신할 수 없습니다. 결국 참여하지 않는 인력에 대한 정리해고까지도 이야기하고 있는 것 아닙니까? 반대로 재교육에 참여한 직원들에게는 성과와 무관하게 고용을 보장할 생각이신가요?” 회의실은 순식간에 정적에 휩싸였다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>“그래서 이걸 ‘타협안’이라고 부르는 겁니다.” 세라가 말했다. “솔리드테크는 적합한 교육을 체계적으로 제공할 것이고, 그 교육은 직원들이 이곳에 남든 떠나든 분명 도움이 될 겁니다. 그 대신 직원들은 변화에 적응하겠다는 약속을 하게 되는 거죠.”<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>토론이 계속되는 동안 알렉스는 마치 자신이 유령이 된 듯한 기분을 느꼈다. 앞으로 나아갈지 물러설지 판단하지 못한 채 불확실한 경계에 갇힌 느낌이었다. 그는 직감적으로 알고 있었다. 지금 내리는 결정이 자신의 리더십뿐 아니라 솔리드테크의 미래를 결정짓게 될 것이라는 사실을.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>윌리엄 커(William R. Kerr)는 하버드경영대학원의 다르벨로프(D’Arbeloff) 경영학 교수다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>에디팅&#160;김현진<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>전문가가 답한다<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>알렉스는 재교육 프로그램을 강행해야 할까?<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<a href=\"https://www.hbrkorea.com/upload_dir/source/2025%200708/JulAug25_CASE_3.png\" target=\"_blank\">\t\t\t\t\t\t\t\t\t\t\t</a><br>패디 헐(Paddy Hull)은 하이네켄(Heineken)의 글로벌 인재&#183;조직문화 &#183;리더십 총괄 책임자다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>문제는 ‘재교육을 해야 하느냐’가 아니라 ‘어떻게 할 것인가’다<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>경쟁사들은 기다려주지 않는다. 그들은 이미 변화에 적응하고 있다. 선택지는 진화하거나 도태되는 것 둘 중 하나다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>솔리드테크가 이번 계획을 ‘대타협안’이라고 명명한 것은 올바른 방향이다. 하지만 경영진은 직원들과의 소통 측면에서 훨씬 더 많은 노력을 기울여야 한다. 재교육이 필요한 직무를 파악한 것은 좋은 출발이다. 이제는 그것을 구체화해야 한다. 단순히 프로그램을 발표하는 데 그치지 말고 각 직무에 어떤 영향을 미치는지 명확하게 설명해야 한다. 나는 유니레버에서 재교육 프로그램을 총괄했고 지금은 하이네켄에서 비슷한 일을 하고 있다. 이 경험을 통해 알게 된 것은 사람들이 ‘재교육’이라는 말을 들으면 실제로 ‘맞서 싸우기fight, 도망가기flight, 얼어붙기freeze’ 반응을 보인다는 점이다. 이런 위기의식을 불식시키기 위해서는 명확하고 구체적인 실행 계획이 필요하다. ‘무엇을’ ‘언제’ ‘어떻게’ 할 것인지 보여줘야 한다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>솔리드테크는 직원들의 자발적 참여를 유도하기 위해 다음과 같은 구체적인 방안을 실행할 수 있다. 우선 채찍이 아니라 당근을 써야 한다. 강등이나 임금 삭감 같은 위협이 아니라 직원들이 기꺼이 참여할 수 있도록 동기를 부여해야 한다. 예를 들어 재교육 참여 인센티브, 교육 기간 중 급여 유지, 향후 경력 개발 기회에 대한 명확한 안내는 직원들이 변화를 수용하는 데 실질적인 도움이 될 것이다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>둘째, 모호하지 않고 구체적이어야 한다. 프로그램의 내용, 대상 직무, 개발이 필요한 구체적인 역량을 명확히 전달해야 한다. 그래야 직원들의 불확실성을 줄일 수 있다. 예를 들어 유니레버에서 재교육 프로그램을 도입했을 때 우리는 조달팀이 약간의 교육만으로도 영업 직무를 수행할 수 있다는 사례를 보여줬다. 우리는 위협이 아니라 기회의 관점에서 상황을 인식하도록 돕는 데 집중했다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>마지막으로 내부에서 신뢰받는 인적 자원을 적극 활용해야 한다. 예컨대 노조 대표나 숙련된 직원 등 조직 내에서 존경받는 영향력 있는 인물을 교육하고 다른 직원들이 경력 옵션을 고민할 때 멘토이자 코치 역할을 할 수 있도록 해야 한다. 이런 접근 방식은 조직 내 신뢰를 구축하는 데 효과적이다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>외부 교육기관을 통해 재교육 과정을 운영하는 것이 단기적으로는 더 비용 효율적으로 보일 수 있다. 그러나 이런 파트너들은 기업의 고유한 상황에 맞는 맥락성과 구체성을 제공하는 데 한계가 있다. 따라서 조직은 내부의 자원과 전문성을 활용해 직접 프로그램을 설계하고 운영하는 방식을 선택해야 한다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>투자자들은 재교육 프로그램에 참여하지 않은 직원들이 회사를 떠날 경우 발생할 인건비 절감 효과에 주목할 수 있다. 그러나 알렉스는 그보다 재교육이 가져올 긍정적 효과에 집중해야 한다. 재교육은 조직에 축적된 경험과 지식을 유지하게 하고 신규 인력 채용에 드는 비용을 절감하며 직원 몰입도와 참여도를 높이는 효과가 있다. 실제로 다른 기업들도 이런 전략이 성공적인 방향임을 입증해왔다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<a href=\"https://www.hbrkorea.com/upload_dir/source/2025%200708/JulAug25_CASE_4.png\" target=\"_blank\">\t\t\t\t\t\t\t\t\t\t\t</a><br>헤이든 브라운(Hayden Brown)은 미국의 프리랜서 플랫폼 업워크(Upwork)의 CEO다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>알렉스에게는 생각보다 선택지가 많다<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>알렉스는 현재 두 가지 길밖에 보이지 않는다고 말한다. 하나는 기존 방식을 유지하며 상황이 나아지기를 기대하는 것이고, 다른 하나는 막대한 비용과 기존 사업에 대한 리스크를 감수하면서도 직원 재교육에 나서는 것이다. 하지만 제3의 길도 있다. 바로 프리랜서를 활용해 핵심 기술 격차를 해소하고 초기 성공 사례와 학습 효과를 얻으며 그가 가장 우려하는 위험 요소들을 완화하는 방법이다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>도 아니면 모 식의 전면적 접근을 취할 필요는 없다. 우선 필요한 역량을 갖춘 소규모 프리랜서 팀을 활용해 새로운 업무 모델을 시범 운영하는 방식으로 시작하면 된다. 예를 들어 영업팀이나 산업디자인팀 같은 개별 부서에서 테스트해볼 수 있다. 이렇게 하면 이번 투자가 실제로 비즈니스 가치를 창출하는지 신속하게 판단할 수 있으며 핵심 투자자들과 내부 관리자들에게 구체적인 성과 근거를 제시할 수 있다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>온라인 프리랜서 시장이 내가 요구하는 수준의 전문성을 제공하지 못할까봐 우려될 수도 있겠지만 실상은 그 반대다. 엘리베이터 업계에서 직접적인 경력을 가진 전문가들이나 관련 분야에서 기술적 연관성이 높은 경험을 보유한 인재들을 찾을 수 있다. 그들은 늘 새로운 기회를 갈망하며 빠르게 가치를 창출할 수 있는 역량과 의지를 갖추고 있다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>이때 투입되는 프리랜서들은 단순히 일을 수행하고 떠나는 데 그쳐서는 안 된다. 기존 솔리드테크 직원들과 함께 일하며 업무 프로세스와 기술 격차를 진단하고 현장 재교육의 역할까지도 수행해야 한다. 파일럿이 성공적으로 작동한다면 프리랜서들과 함께 일해본 내부 직원들이나 현장의 긍정적인 변화를 직접 목격한 팀 리더들이 다른 부서에도 프로그램을 홍보할 수 있도록 해야 한다. 그들은 이런 협업이 두려운 것이 아니라 오히려 많은 기회를 제공한다는 점을 직접 설명해줄 수 있을 것이다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>알렉스는 어떤 형태로든 재교육을 추진하는 것이 오랜 기간 함께해 온 핵심 인재들의 이탈로 이어지지 않을까 우려하고 있다. 하지만 가만히 있는 것이 더 위험하다. 경쟁사보다 앞서 나가는 것만으로는 충분하지 않다. 미래를 지향하는 직원들에게 솔리드테크가 여전히 유의미한 조직이라는 신호도 보내야 한다. 그렇지 않으면 계속 성장하고 새로운 역량을 배우려는 핵심 인재들이 보다 혁신적인 경쟁사로 떠날 가능성이 크다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>핵심 정규직 인력을 소규모로 유지하면서 전문 인력을 유연하게 보완하는 방식을 통해 새로운 기술과 지식을 훨씬 빠르게 도입할 수 있으며 동시에 조직 내에 축적된 경험과 문화도 유지하고 보완할 수 있다. 이처럼 솔리드테크의 인력 구성을 전략적으로 전환하면 지속적인 재교육 또는 고비용 정규직 교체라는 반복적인 문제를 피할 수 있다. 프리랜서를 적절히 활용하고 소규모 팀을 파일럿으로 운영하며 작고 실현 가능한 목표부터 시작하는 방식을 택한다면 대규모, 고비용, 고위험의 프로그램을 도입하지 않고도 인력의 전환과 재교육을 현실적으로 실행할 수 있다.<br>\t\t\t\t\t<br>\t\t\t\t\t<br>인재를 재교육할 것인가, 교체할 것인가?<br>\t\t\t\t\t<br>총 21장 슬라이드<br>\t\t\t\t\t<br>윌리엄 커(William R. Kerr)<br>\t\t\t\t\t<br>하버드경영대학원 다르벨로프 경영학 교수<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>저자 정보<br>\t\t\t\t\t<br>윌리엄 커(William R. Kerr) • 하버드경영대학원 다르벨로프(D'Arbeloff) 경영학 교수 • 조직 변화와 인재 개발 전문가<br>\t\t\t\t\t<br>출처 • 매거진 2025년 7-8월호 • 인사조직 섹션<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>아티클 구조<br>\t\t\t\t\t<br>솔리드테크 이노베이션 사례 연구￼├── 1. 기업 현황과 도전과제￼│   ├── 80년 역사의 엘리베이터 제조 기업￼│   └── 사물인터넷 시대의 디지털 전환 필요￼├── 2. 대타협안 제안￼│   ├── 컨설턴트의 재교육 프로그램 제안￼│   └── CEO의 고민과 결정 과정￼├── 3. 이해관계자별 반응￼│   ├── 주주들의 반발과 우려￼│   └── 직원들의 시각과 저항￼└── 4. 전문가 솔루션￼    ├── 패디 헐의 구체적 실행 방안￼    └── 헤이든 브라운의 대안적 접근법￼<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>1. 솔리드테크 이노베이션의 딜레마<br>\t\t\t\t\t<br>CEO 알렉스 리베라의 고민 • 80년 역사의 엘리베이터 제조 기업 운영 • 사물인터넷 시대의 급격한 업계 변화 직면 • 기존 인력의 재교육 vs 신규 인재 채용 결정 필요<br>\t\t\t\t\t<br>핵심 질문 • 기존 직원들을 필요한 수준까지 끌어올려 고용 가능한 상태로 만들 수 있는가? • 신규 소프트웨어 인재 채용과 기존 인력 정리가 불가피한가?<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>2. 업계 변화의 현실<br>\t\t\t\t\t<br>전통적 엘리베이터 기업의 한계 • 케이블, 평형추, 모터 시스템 전문성 보유 • API, 머신러닝, 사용자 경험 디자인 역량 부족<br>\t\t\t\t\t<br>신생 기업들의 혁신 • 사전 감지 정비 시스템 • 비접촉식 제어 기술 • AI 기반 교통흐름 최적화 • 클라우드 기반 모니터링 플랫폼<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>3. 대타협안의 핵심 내용<br>\t\t\t\t\t<br>컨설턴트 세라 톰슨의 제안 • 기존 인력 대상 선택 참여형 재교육 프로그램 • 온라인 교육, MOOC, 커뮤니티 칼리지 강좌 제공 • 회사 비용 부담 및 단체 할인 혜택<br>\t\t\t\t\t<br>참여자 혜택 vs 비참여자 리스크 • 참여자: 미래 리더십 포지션, 지속적 교육 기회 • 비참여자: 보직변경, 임금 삭감, 기회 제한<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>4. 새로운 사회적 계약<br>\t\t\t\t\t<br>윈-윈 전략의 철학 • 고용주와 근로자 간의 새로운 사회적 계약 • 회사: 성장의 발판 제공 • 직원: 개인 미래에 대한 책임<br>\t\t\t\t\t<br>균형점 찾기 • 비용 통제를 위한 선별적 접근 • 변화 동참 직원과 비동참 직원 구분 • 자발적 이직을 통한 프로그램 비용 상쇄<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>5. 주주들의 상반된 반응<br>\t\t\t\t\t<br>리치 사이먼드 (창업주 일가 대표) • 재교육 프로그램의 실제 효과에 대한 의문 • 오랜 기간 함께한 직원들에 대한 가족적 정서 • 경쟁사 대비 뒤처질 가능성 우려<br>\t\t\t\t\t<br>아카시 라오 (RT 힝클리 캐피털) • 구조조정의 좋은 기회로 인식 • 수익성 개선을 위한 인력 슬림화 찬성 • 재교육을 명분으로 한 효율성 추구<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>6. 주주들의 추가 우려사항<br>\t\t\t\t\t<br>모니카 첸 (메리디언 벤처) • 노후 건물 엘리베이터 개보수가 핵심 비즈니스 • 신흥 시장 고객들의 비용 민감성 • 혁신보다 상식적 판단의 중요성 강조<br>\t\t\t\t\t<br>토머스 스미스 (팔콘 캐피털) • 온라인 대학, MOOC 스타트업의 위험성 • 직원 재교육이 과연 회사 책임인지 의문 • 개인 또는 국가의 역할론 제기<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>7. 직원들의 강력한 저항<br>\t\t\t\t\t<br>존 로랑 (엔지니어링 총괄, 25년 베테랑) • 재교육 계획의 효과에 대한 근본적 의문 • 오랜 시간 축적된 암묵적 전문성의 가치 • 작업복을 입고 손으로 일하는 정체성<br>\t\t\t\t\t<br>핵심 우려사항 • 컴퓨터 앞 사무직으로의 전환 거부감 • 강제 추진 시 대량 이탈 가능성 • 수십 년 경험과 핵심 기술의 손실<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>8. 현장과 고객 관계의 딜레마<br>\t\t\t\t\t<br>서비스 기술자의 역할 • 고객 현장에서 회사 가치를 보여주는 상징 • 최전선에서 고객과의 밀접한 관계 유지 • 충성도 구축의 핵심 요소<br>\t\t\t\t\t<br>디지털화의 위험성 • 한밤중 소프트웨어 업데이트 수준으로 전락 우려 • 고객과의 직접적 접점 약화 • 브랜드 충성도 무너짐 가능성<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>9. 영업 관점에서의 변화 필요성<br>\t\t\t\t\t<br>마야 페리노 (영업총괄책임자)의 관점 • 업스킬링에 대한 자연스러운 저항 인정 • 고객이 원하는 것: 현대적 편의 기능이 통합된 제품 • 기술이 본질에 녹아든 진정한 통합의 중요성<br>\t\t\t\t\t<br>시장의 요구 • 전통적 엘리베이터 + 현대적 편의 기능 • 겉에 덧씌운 기술이 아닌 본질적 통합 • 경쟁력 확보를 위한 필수 조건<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>10. 재무적 관점과 현실적 제약<br>\t\t\t\t\t<br>토니 우 (최고재무책임자)의 경고 • 일본의 '유령 사무실' 사례 • 평생고용 약속 vs 실용적 가치 창출의 딜레마 • 형식적 고용 유지의 비효율성<br>\t\t\t\t\t<br>솔리드테크의 현실 • 유령 직원을 둘 여력 없음 • 시대에 맞는 역량 유지의 필요성 • 함께 노력해야 하는 상황 인정<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>11. 재교육 대상과 고용 보장 이슈<br>\t\t\t\t\t<br>구체적 재교육 대상 • 엔지니어링 부서 인력 • 설치 기술자 • 유지보수 인력<br>\t\t\t\t\t<br>핵심 질문들 • 모든 직원이 재교육을 감당할 수 있는가? • 참여하지 않는 인력의 정리해고 불가피성 • 재교육 참여자에 대한 무조건적 고용 보장 여부<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>12. 전문가 솔루션 1 - 패디 헐의 접근법<br>\t\t\t\t\t<br>하이네켄 글로벌 인재&#183;조직문화&#183;리더십 총괄<br>\t\t\t\t\t<br>기본 철학 • 문제는 '재교육 여부'가 아니라 '실행 방법' • 경쟁사들은 이미 변화 적응 중 • 선택지: 진화 vs 도태<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>13. 구체적 실행 방안 - 소통과 명확성<br>\t\t\t\t\t<br>효과적 소통 전략 • 각 직무에 미치는 영향 명확히 설명 • '맞서 싸우기-도망가기-얼어붙기' 반응 방지 • 명확하고 구체적인 실행 계획 제시<br>\t\t\t\t\t<br>'무엇을' '언제' '어떻게'의 구체화 • 모호함 제거를 통한 불확실성 감소 • 위협이 아닌 기회 관점으로 인식 전환 • 신뢰받는 내부 인적 자원 적극 활용<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>14. 당근과 채찍 전략<br>\t\t\t\t\t<br>당근 중심의 접근 • 재교육 참여 인센티브 제공 • 교육 기간 중 급여 유지 • 향후 경력 개발 기회 명확한 안내<br>\t\t\t\t\t<br>내부 자원 활용 • 노조 대표나 숙련 직원을 멘토로 활용 • 조직 내 존경받는 영향력 있는 인물 교육 • 조직 내 신뢰 구축을 통한 자발적 참여 유도<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>15. 장기적 관점의 투자 효과<br>\t\t\t\t\t<br>재교육의 긍정적 효과 • 조직 축적 경험과 지식 유지 • 신규 인력 채용 비용 절감 • 직원 몰입도와 참여도 향상<br>\t\t\t\t\t<br>투자자 설득 논리 • 단기 인건비 절감보다 장기 가치 창출 • 다른 기업들의 성공 사례 입증 • 조직의 고유한 상황에 맞는 맞춤형 접근<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>16. 전문가 솔루션 2 - 헤이든 브라운의 대안<br>\t\t\t\t\t<br>업워크 CEO의 제3의 길<br>\t\t\t\t\t<br>프리랜서 활용 전략 • 핵심 기술 격차 해소 • 초기 성공 사례와 학습 효과 창출 • 위험 요소 완화<br>\t\t\t\t\t<br>단계적 접근법 • 전면적 접근 대신 소규모 시범 운영 • 개별 부서 테스트를 통한 효과 검증 • 구체적 성과 근거 제시<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>17. 프리랜서 협업 모델<br>\t\t\t\t\t<br>전문성 있는 인재 확보 • 엘리베이터 업계 직접 경력자 • 관련 분야 기술적 연관성 보유자 • 새로운 기회를 갈망하는 전문가들<br>\t\t\t\t\t<br>협업을 통한 재교육 • 기존 직원과의 공동 작업 • 업무 프로세스와 기술 격차 진단 • 현장 재교육 역할 수행<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>18. 점진적 확산과 내부 홍보<br>\t\t\t\t\t<br>성공 사례 확산 • 파일럿 성공 시 다른 부서로 확산 • 함께 일한 내부 직원들의 긍정적 증언 • 현장 변화를 목격한 팀 리더들의 홍보<br>\t\t\t\t\t<br>위험 vs 기회 • 가만히 있는 것이 더 위험 • 미래 지향적 직원들에게 의미 있는 조직 신호 • 혁신적 경쟁사로의 인재 유출 방지<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>19. 전략적 인력 구성 전환<br>\t\t\t\t\t<br>핵심 정규직 + 전문 프리랜서 모델 • 소규모 핵심 인력 유지 • 전문 인력의 유연한 보완 • 새로운 기술과 지식의 빠른 도입<br>\t\t\t\t\t<br>지속가능한 솔루션 • 조직 내 축적된 경험과 문화 유지 • 반복적 재교육 문제 해결 • 고비용 정규직 교체 문제 회피<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>20. 내용 요약<br>\t\t\t\t\t<br>핵심 딜레마 • 80년 역사 엘리베이터 기업의 디지털 전환 과제 • 기존 인력 재교육 vs 신규 인재 채용의 선택<br>\t\t\t\t\t<br>이해관계자별 관점 • 주주들: 비용 효율성과 위험 관리 우려 • 직원들: 정체성과 전문성 유지에 대한 저항 • 경영진: 변화 필요성과 조직 안정성의 균형<br>\t\t\t\t\t<br>전문가 솔루션 • 패디 헐: 체계적 소통과 당근 중심 재교육 • 헤이든 브라운: 프리랜서 활용한 점진적 전환<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>Agenda 1-5<br>\t\t\t\t\t<br>1. 우리 조직에서 디지털 전환이 가장 시급한 부서는 어디이며, 그 이유는 무엇인가?<br>\t\t\t\t\t<br>2. 기존 직원의 재교육과 신규 인재 채용 중 어느 쪽이 더 효과적이라고 생각하는가?<br>\t\t\t\t\t<br>3. 재교육 프로그램에 참여하지 않는 직원들에 대한 적절한 대응 방안은 무엇인가?<br>\t\t\t\t\t<br>4. 솔리드테크와 같은 전통 제조업체가 기술 혁신을 추진할 때 가장 큰 장벽은 무엇인가?<br>\t\t\t\t\t<br>5. 당신이 알렉스라면 주주들과 직원들의 반대에도 불구하고 재교육을 강행할 것인가?<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>Agenda 6-10<br>\t\t\t\t\t<br>6. 프리랜서 활용 모델이 전통적인 정규직 중심 조직에 미칠 장단점은 무엇인가?<br>\t\t\t\t\t<br>7. 재교육 프로그램의 성공을 측정할 수 있는 구체적인 지표는 무엇이어야 하는가?<br>\t\t\t\t\t<br>8. 조직 변화 과정에서 저항하는 베테랑 직원들을 어떻게 설득하고 동기부여할 것인가?<br>\t\t\t\t\t<br>9. 기업의 사회적 책임 관점에서 직원 재교육에 대한 회사의 역할은 어디까지인가?<br>\t\t\t\t\t<br>10. 미래의 일자리 변화에 대비하여 개인과 조직이 지금부터 준비해야 할 것은 무엇인가?<br>\t\t\t\t\t<br>\t\t\t\t<br>\t\t\t\t<br>\t\t\t\t\t<br>전략<br>\t\t\t\t\t<br>성장하지 않아도 가치를 창출할 수 있다<br>\t\t\t\t\t<br><a href=\"https://www.hbrkorea.com/article/author/wno/3630\" target=\"_blank\">아담 요브(Adam Job)</a>,<a href=\"https://www.hbrkorea.com/article/author/wno/3884\" target=\"_blank\">울리히 피둔(Ulrich Pidun)</a>,<a href=\"https://www.hbrkorea.com/article/author/wno/3885\" target=\"_blank\">발렌틴 세카시 (Valent&#237;n Szekasy)</a>,<a href=\"https://www.hbrkorea.com/article/author/wno/3886\" target=\"_blank\">바르보라 하벨코바(Barbora Havelkov&#225;</a><br>\t\t\t\t\t<br>디지털<br>\t\t\t\t\t<br>2025. 7. 3.<br>\t\t\t\t\t<br>\t\t\t\t\t<br>&#160;나의 서재<br>\t\t\t\t\t<a href=\"https://www.hbrkorea.com/article/view/atype/di/category_id/1_1/article_no/1402/page/1#\" target=\"_blank\">\t\t\t\t\t\t\t\t\t\t\t</a><br>&#160;<a href=\"https://www.hbrkorea.com/article/view/atype/di/category_id/1_1/article_no/1402/page/1#\" target=\"_blank\">공유</a><br>\t\t\t\t\t<br>\t\t\t\t\t<br>&#160;글씨 크기<br>\t\t\t\t\t<br><br>\t\t\t\t\t<a href=\"https://www.hbrkorea.com/upload_dir/source/HBR_Daily/Jun25_03_DavideComai.jpg\" target=\"_blank\">\t\t\t\t\t\t\t\t\t\t\t</a><br><br>\t\t\t\t\t<br>대부분의 기업들이 기본적인 목표로 삼는 것이 있다. 매년 매출 성장을 거두는 것이다. 하지만 지금은 세계화가 후퇴하고, 많은 국가에서 인구가 고령화되면서 소비가 줄어들고 있으며, 지속가능성에 대한 우려로 인해 사람들은 모든 소비의 필요성을 더 꼼꼼히 따지게 됐다. 이러한 상황에서 기업들은 성장을 가로막는 역풍에 직면하고 있다. 물론 이런 어려운 환경에서도&#160;<a href=\"https://hbr.org/2024/03/harnessing-imagination-to-drive-innovation\" target=\"_blank\">성장이 매우 강력한 차별화 요소가</a>&#160;될 수 있다. 하지만 동시에 성장은 위험을 안겨다 줄 수도 있다. 무조건적인 성장을 추구하다 보면, 오히려 가치 창출은커녕 기업의 핵심 역량에서 자원을 빼앗아 엉뚱한 데 투자를 낭비해 결국 가치를 파괴하는 결과를 낳을 수 있다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>그렇다면 이런 질문이 떠오른다. 기업은 성장 없이 어떻게 지속적인 가치를 창출할 수 있을까?<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>안정성에도 나름의 장점이 있다<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>해답을 찾기 위해 우리는 지난 20년 동안 북미, 유럽, 일본의 1만 개가 넘는 기업들을 분석했다. 그 중에서 우리는 '안정적인 기업' 172개를 선별했는데, 이들은 해당 기간 거의 0에 가까운 매출 성장률에도 꾸준하게 유지된 기업들이다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>이러한 안정적인 기업들은 시장 평균과 유사한 수준의 주주 수익률을 기록했지만, 변동성은 12% 낮았다. 이 낮은 변동성은 더 높은 회복력과 지속 가능성과도 관련이 있다. 우리가 분석한 20년 동안, 안정적인 기업이 시가총액의 90% 이상을 잃는 심각한 가치 붕괴를 겪을 가능성은 평균적인 기업보다 절반에 불과했다. 이 기업들은 또한 평균적인 S&P 500 기업보다 거의 두 배 가까이 오래됐다. 평균 연령이 거의 100년에 달한다. 마지막으로, 안정적인 기업 가운데 57곳, 즉 3곳 중 1곳은 총주주수익률(TSR) 기준으로 시장을 능가하는 성과를 낸 것으로 나타났다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>시장보다 더 나은 성과를 낸 이 57개 기업을 좀 더 자세히 살펴보면, 이들 기업이 하나의 공통된 유형에 속하지 않는다는 사실을 알 수 있다. 이들은 소비자와 기업 모두를 대상으로 다양한 제품이나 서비스를 제공하며, 다양한 산업 전반에 걸쳐 분포해 있다. 다만, 경쟁사에 뒤처질 위험이 있는 고성장 산업에서는 이들 기업이 상대적으로 덜 나타나는 경향이 있다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>그럼에도 불구하고 안정적인 기업 사이에는 몇 가지 주목할 만한 공통점이 있다. 우선, 이중 25%는 지배 지분을 가진 오너(소유주)가 있었다. 반면,&#160;<a href=\"https://corpgov.law.harvard.edu/2012/10/25/controlled-companies-in-the-sp-1500-performance-and-risk-review/\" target=\"_blank\">S&P 1500 지수에 포함된 기업 중 이러한 구조를 가진 곳은 8%도 되지 않는다</a>. 이는 ‘소유주 의식sense of ownership’이 가치를 창출하기 위한 장기적이고 절제된 경영 방식으로 중요한 역할을 할 수 있음을 시사한다. 실제로 안정적인 기업들은 지나치게 야심찬 대형 인수합병(M&A) 등 공격적인 성장 전략에 종종 따라붙는 위험을 회피해왔다는 점에서도 일관된 모습을 보인다. 참고로,&#160;<a href=\"https://bcghendersoninstitute.com/the-ma-failure-trap-with-baruch-lev-and-feng-gu/\" target=\"_blank\">대형 인수합병의 실패율은 70~75%에 달한다</a>.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>대신, 이들 기업은 성장 없이도 탁월한 성과를 이루기 위해 네 가지 뚜렷한 전략을 사용했다:<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>1. 고객을 향한 서비스: 자산 경량화 전략<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>성장 가능성이 낮은 상황에서 많은 기업들은 보통 높은 비용을 들여 새로운 고객을 확보하려 한다. 하지만 안정적인 초과 성과를 거둔 기업들은 기존 고객과의 관계에서 최대한의 가치를 끌어내는 방식을 더 선호한다. 이들은 수요가 감소하는 물리적 제품에서 벗어나, 자산을 많이 필요로 하지 않는 서비스나 소프트웨어로 전환한다. 이러한 접근은 고객과의 관계를 더욱 깊게 만들 뿐만 아니라, 수익률을 개선하고 자산 집약도를 낮추는 데에도 효과적이다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>이러한 전환을 이룬 이들 기업에서는 2004년부터 2024년까지 EBIT 마진(영업이익률)이 평균 8%포인트 증가했다. 설비투자capital expenditures를 50% 줄이고, 매출원가cost of sales를 25% 낮춘 결과였다. 그 덕분에 이들 기업은 연평균 총주주수익률(TSR) 9%를 달성할 수 있었다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>이러한 전략은 디지털 전환이 진행 중인 자산 집약적 산업이나, 점점 서비스 중심으로 변화하고 있는 IT 기업에서 가장 흔하게 나타난다. 더 넓게 보면, 이 전략은 상품의 획일화commoditization나 경쟁사로부터의 압박에 직면한 기업들에게도 유효한 대안이 될 수 있다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>대표적인 사례가 지멘스Siemens다. 지멘스는 2014년, 서비스형 소프트웨어(SaaS)와 디지털 트윈 기술에 주력하겠다고 선언했다. 이는 기존의 전통적인 산업용 복합 기업에서 디지털 산업 혁신 리더로의 전환을 의미하는 것이다. 지멘스는 자사의 핵심 제품에 소프트웨어와 데이터 기반 서비스를 통합함으로써 더 탄탄한 수익 구조와 깊이 있는 고객 연결을 만들어냈다. 우리는 지멘스가 지난 10년 동안 이러한 전략을 추진하는 과정에서 연평균 총주주수익률(TSR) 12%를 달성한 것을 확인했다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>2. 고급화 전략: 총이익률 전략<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>성숙한 기업들은 종종 강력한 브랜드 이미지를 유지하면서 비용 절감을 통해 수익을 내고자 하는 유혹을 받는다. 하지만 품질을 강화하는 것이 훨씬 더 지속가능한 가치 창출의 길이 될 수 있다. 이 전략은 기업이 쉽게 무너지지 않는 시장 지위를 구축하도록 돕고, 총이익률gross margin을 높이는 데에도 효과적이다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>이처럼 ‘고급화 전략’을 택한 안정적인 초과 성과 기업들은 20년 동안 평균적으로 총이익률을 12%포인트 높였다. 이러한 전략을 통해 이들은 마진 확대와 강력한 현금 흐름 창출을 바탕으로 연평균 총주주수익률(TSR) 9%를 달성할 수 있었다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>이 전략은 주로 소비재 기업에서 가장 흔하게 나타났지만, 제품의 독창성이나 특화된 전문성 덕분에 틈새시장niche에서 활동하는 많은 기업들에도 해당됐다. 이들은 대체 불가능한 존재가 됨으로써 가격 결정력을 강화하고, 고급 시장upmarket으로 진출할 수 있다. 이는 명품을 생산하는 기업이든, 산업용 부품을 만드는 기업이든 마찬가지다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>예를 들어, 모건 어드밴스드 머티리얼즈Morgan Advanced Materials는 영국에 본사를 둔 세라믹 및 탄소 소재 제조업체다. 우수한 내열성, 전기 절연성, 기계적 강도를 갖춘 제품을 개발해 항공우주, 반도체, 전기차 등과 같이 극한 환경에서도 부품이 안정적으로 작동해야 하는 산업의 고객들에 더 나은 서비스를 제공한다. 우리는 이 회사의 우수한 제품력이 가격 결정력을 높이는 데 기여했고, 그 결과 20년 동안 마진이 두 배로 증가했으며, 실질적인 매출 증가 없이도 FTSE 100 지수 대비 연간 총주주수익률(TSR)이 3%포인트 이상 높은 성과를 달성한 것을 확인했다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>3. 내부에 답이 있다: 재무제표 전략<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>매출 성장이 어려울 때, 재무제표balance sheet&#160;확대는 또 다른 가치 창출의 대안이 될 수 있다. 안정적인 초과 성과 기업들은 종종 수직적 통합vertical integration을 통해 자산 기반을 확장하고, 이를 통해 이익이 발생하는 가치 사슬의 더 많은 부분을 통제하며 부가가치를 높인다. 이러한 접근은 차별화된 가치 제안과 경쟁적 진입장벽competitive moat을 강화하는 독자적인 자산 포트폴리오를 구축하는 데에도 도움이 된다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>이 전략을 따른 안정적인 초과 성과 기업들은 수직적 통합을 추진하면서 총자산 규모를 평균 두 배로 확대했다. 이들은 가치 사슬value chain의 더 많은 부분을 통제함으로써, 관찰 기간 동안 총이익률을 평균 8%포인트 늘릴 수 있었다. 또한 이들의 투자는 높은 수익률을 가져왔다. 이 전략을 따른 기업들은 평균적으로 연평균 총주주수익률(TSR) 9%를 기록했으며, 이 가운데 5%포인트는 현금흐름 창출에 의해 뒷받침됐다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>이 전략은 산업재, 유틸리티, 원자재와 같은 자산 집약적 산업에서 가장 흔하게 나타난다. 하지만 이미 차별화된 제품을 보유하고 있고, 시장 점유율도 높은 기업이라면, 공급업체로부터의 비용 압박을 받고 있을 때 수직적 통합은 매우 매력적인 가치 창출 전략이 될 수 있다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>숙박&#183;외식과 같은 호스피탈리티 산업에서 이 전략의 인상적인 사례가 나타난다. 대부분의 호텔 체인이 수익 성장을 가속화하기 위해 브랜드를 프랜차이즈 형태로 운영하는 것과 달리, 영국 최대 호텔 브랜드인 프리미어 인Premier Inn을 소유한&#160;<a href=\"https://www.whitbread.co.uk/investors/why-invest/\" target=\"_blank\">위트브레드</a>Whitbread는 모든 호텔을 직접 소유하고, 운영도 직접 관리한다. 뿐만 아니라 디지털 유통과 수익 관리도 자체 예약 플랫폼을 통해 중앙집중 방식으로 직접 통제하고 있다. 이러한 통합 전략은 빠른 확장을 제약할 수 있지만, 일관되게 높은 품질의 고객 경험을 제공하는 위트브레드의 핵심 경쟁력의 기반이 되었고, 우리는 이 전략이 지난 20년 동안 연평균 총주주수익률(TSR) 10%라는 성과로 이어졌음을 확인했다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>4. 현금으로 보답하라: 배당 전략<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>공격적으로 성장을 추구하기보다는, 안정적으로 성숙한 기업들은 종종 현금을 주주에게 환원하는 것을 우선시한다. 하지만 매출이 크게 성장하지 않는 상황에서는 배당dividend&#160;성장 기대치를 충족시키는 것이 쉽지 않기 때문에, 높은 총주주수익률(TSR)을 달성하기가 어려울 수 있다. 우리의 분석은 이에 대한 대안적 배당 전략을 밝혀냈다. 그것은 바로 지속적이고 예측 가능한 배당 지급을 통해, 주식이 채권처럼 안정적으로 움직이도록 만드는 방식이다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>이러한 ‘채권 같은bond-like’ 배당 전략은 시장 평균보다 1 표준편차 낮은 배당 변동성을 보이며, 투자자들에게 더 큰 안정성과 낮은 리스크를 제공했다. 덕분에 이들 기업은 매출, 마진, 배당의 성장이 제한적인 상황에서도 시장을 능가하는 성과를 낼 수 있었다. 예컨대, 이러한 안정적 초과 성과 기업들은 부채비율debt-to-equity ratio을 평균 30% 줄이는 방식으로 재무적 여유financial slack를 확보했다. 그 결과, 이들은 총주주수익률(TSR)에 기여하는 높고 안정적인 현금흐름을 달성했을 뿐 아니라, 기업 가치 평가 배수valuation multiple도 연평균 3%씩 향상시킬 수 있었다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>이 전략은 모든 산업 분야에서 관찰되지만, 특히 수익 흐름이 예측 가능하고, 투자 패턴에 큰 변동이 없는 기업에 가장 잘 적용된다. 예를 들어, GATX는 철도 화차를 임대하는 회사로, 1919년 이후 단 한 번도 빠짐없이 분기 배당을 지급해 왔다. 지난 20년 동안 이 회사는 배당금을 단 한 해도 줄인 적이 없었고, 배당 변동성 역시 샘플 평균보다 1.5 표준편차 낮은 수준을 유지해 왔다. 이러한 전략을 통해 GATX는 연평균 총주주수익률(TSR) 12%를 달성했으며, 이 수익은 거의 전적으로 안정적인 현금흐름과 가치 평가 상승multiple expansion에 의해 이뤄졌다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>인재유치와 혁신은 어떻게 할 것인가?<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>저성장 전략을 추구하는 데에는 분명한 도전 과제도 따른다. 우선, 기업의 성장은 일반적으로 인재에게는 기회를 의미한다. 경력 발전, 새로운 기술 개발, 그 밖의 다양한 성장 경로들이 여기에 포함된다. 하지만 기업이 적극적으로 성장하지 않고 있다면, 이러한 기회들은 더 제한적일 수 있다. 이는 기업이 우수 인재를 유치하고 유지하는 데 도전 과제가 될 수 있다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>이러한 문제를 해결하기 위해, 저성장 전략을 실행하는 기업에는 인재 전략을 어떻게 설계할지에 대해 의도적이고 전략적인 접근이 필요하다. 우리 연구에 포함된 몇몇 기업은 자신들의 안정성을 활용해 장기적인 이니셔티브와 파트너십에 투자함으로써, 우수 인재를 유치하고 육성하고 있었다. 이러한 노력에는 목표 지향적인 채용 프로그램, 특화된 기술을 중심으로 한 인턴십 기회, 산업 관련 자격 인증, 지역 교육 기관과의 파트너십 등이 포함된다. 이러한 채널들은 지역 사회와의 연결을 강화하고, 지속적인 인재 공급망을 형성하는 데 도움이 된다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>예를 들어, 영국의 주택 건설 기업&#160;<a href=\"https://www.wales247.co.uk/economy-minister-visits-construction-academy-to-meet-next-generation-of-workers\" target=\"_blank\">퍼시먼</a>Persimmon은 자사가 운영 중인 지역의 미개발 노동시장을 활용하기 위해 지역 대학들과 협력해 ‘퍼시먼 아카데미Persimmon Academy’를 설립했다. 이 프로그램은 퍼시먼이 새로운 인재를 확보하고, 사업 니즈에 맞춘 기술 개발을 유도하며, 전체 인력의 참여와 몰입도를 높이는 데 큰 도움을 주고 있다. 현재 이 프로그램은 초기 성공 이후, 최근에는 새로운 지역으로 확장돼 운영 중이다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>인재 확보 경로 외에도 안정적인 기업들은 직원 가치 제안을 새롭게 정의함으로써 장기적인 직원 몰입과 충성도를 높일 수 있다. 예를 들어, 수평적 이동horizontal mobility&#160;기회와 같은 혜택을 강조하거나, 저성장 전략이 가져다 주는 낮은 변동성 덕분에 가능한 고용 안정성에 초점을 맞추는 방식이다. 이러한 접근은 특히 경제적으로 불확실한 환경 속에서 커리어를 시작한&#160;<a href=\"https://hbr.org/2023/01/helping-gen-z-employees-find-their-place-at-work?utm_medium=paidsearch&utm_source=google&utm_campaign=intlcontent_bussoc&utm_term=Non-Brand&tpcc=intlcontent_bussoc&gad_source=1&gad_campaignid=20712984896&gclid=Cj0KCQjww-HABhCGARIsALLO6XwV3bAhOHlbUCAiICM1p23u3Llw3lxWIpbOUWf4rCnvP4I5wWMxQTAaAqAMEALw_wcB\" target=\"_blank\">젊은 세대 직원들에게</a>&#160;더욱 매력적으로 다가올 수 있다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>예를 들어, 몬델리즈 인터내셔널Mondelēz International은 사내 인재 마켓플레이스인 ‘매치 앤 그로우Match & Grow’를 운영하고 있다. 이 프로그램은 직원들이 자신의 기존 역할이나 부서를 넘어 단기 프로젝트에 참여할 수 있도록 지원해 이들이 새로운 경험을 쌓고, 다른 팀과 협업할 기회를 제공한다. 이 프로그램은 2023년 출시 이후&#160;<a href=\"https://www.mondelezinternational.com/snacking-made-right/culture-and-talent-development/\" target=\"_blank\">2만5000명 이상의 직원들이</a>&#160;참여한 것으로 나타났다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>저성장 기업이 직면할 수 있는 또 다른 과제는 창의성과 상상력이 살아 숨 쉬는 ‘혁신 문화’를 유지하는 것이다. 이러한 문화가 없다면 자만과 안일함이 자리잡을 위험이 있다. 하지만 우리 연구에 포함된 많은 안정적인 기업들은 새로운 시장을 개척하거나 파괴적 혁신을 추구하는 대신, 지속적이고 점진적인 개선의 힘을 강조하고 있었다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>예를 들어, 디아지오Diageo는 기존 제품 포트폴리오를 강화하기 위해 신기술과 새로운 소비자 경험을 통합하는 데 집중하는 혁신 전담팀을 도입했다. 이 팀은 조니워커 블루 라벨Johnnie Walker Blue Label을 위한 세계에서 가장 가벼운 위스키 병을 개발했으며, 씨드립Seedlip&#160;브랜드 소비자에게 개인 맞춤형 칵테일 및 선물 추천 서비스를 제공하는 AI 기반 가상 컨시어지도 선보였다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>일견 모순처럼 보일 수 있지만, 오히려 저성장으로 인한 제약 조건은 창의적 해결을 자극하는 요인이 되기도 한다. 실제로 빠르게 성장하는 기업조차 창의적인 문제 해결을 유도하기 위해 일부러 자원 활용에 제한을 두기도 한다. 예를 들어, 파타고니아Patagonia는 연간 9% 이상의 성장을 이어가고 있어 본 연구 샘플에는 포함되지 않았지만, 제품 제작에 사용되는 소재를 제한하는 엄격한 지속가능성 기준을 스스로 부과하고 있다. 파타고니아는 유기농 또는 재활용 원단만을 사용하고, 고객들에게도 제품을 적게 구매할 것을 권장한다. 이러한 접근을 통해 파타고니아는 유명한 수선&#183;재구매 프로그램과 같은 선구적인 이니셔티브를 개발했고, 이는 기업의 핵심 가치 제안의 중심에 자리하고 있다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>안정적으로 성과를 내는 기업들의 전략과 성공은 성장이 가치 창출을 위한 유일한 길이 아니라는 것을 보여준다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>하지만 기업의 리더들은 다음 사실을 반드시 명심해야 한다. 우리가 식별한 이러한 안정적인 기업들이 수십 년에 걸쳐 초과 성과를 유지할 수 있었던 것은 사실이지만, 그들이 활용할 수 있는 수단이 언젠가는 한계에 이를 수 있다는 점이다. 예를 들어, 마진은 100% 이상으로 늘릴 수 없고, 배당 변동성은 0보다 더 낮아질 수는 없다. 따라서 안정성을 추구하는 전략이 기업 리더들이 성장 기회를 계속해서 탐색하고 점검해야 할 책임으로부터 면제해 주는 것은 아니다. 환경이 변화함에 따라 성장 가능성을 끊임없이 탐색하고 재검토해야 할 필요는 여전히 존재한다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>원문 |&#160; <a href=\"https://hbr.org/2025/06/growth-isnt-the-only-way-for-companies-to-create-value\" target=\"_blank\">https://hbr.org/2025/06/growth-isnt-the-only-way-for-companies-to-create-value</a><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>울리히 피둔은 BCG 헨더슨 인스티튜트의 전략 연구소 리더이자, 보스턴컨설팅그룹의 파트너 겸 디렉터다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>발렌틴 세카시는 BCG 헨더슨 인스티튜트의 전략 연구소 엠배서더ambassador다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>바르보라 하벨코바는 BCG 헨더슨 인스티튜트의 전략 연구소 앰배서더다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>아담 요브는 BCG 헨더슨 인스티튜트의 전략 연구소 디렉터다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>에디팅&#160;이정흔<br>\t\t\t\t\t<br><br>\t\t\t\t\t출처: <<a href=\"https://www.hbrkorea.com/article/view/atype/di/category_id/1_1/article_no/1402/page/1\" target=\"_blank\">https://www.hbrkorea.com/article/view/atype/di/category_id/1_1/article_no/1402/page/1</a>> <br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>\t\t\t\t\t<br>성장하지 않아도 가치를 창출할 수 있다<br>\t\t\t\t\t<br>총 29장 슬라이드<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>저자 정보<br>\t\t\t\t\t<br>아담 요브 (Adam Job)<br>\t\t\t\t\t<br>• BCG 헨더슨 인스티튜트의 전략 연구소 디렉터<br>\t\t\t\t\t<br>울리히 피둔 (Ulrich Pidun)<br>\t\t\t\t\t<br>• BCG 헨더슨 인스티튜트의 전략 연구소 리더 • 보스턴컨설팅그룹의 파트너 겸 디렉터<br>\t\t\t\t\t<br>발렌틴 세카시 (Valent&#237;n Szekasy)<br>\t\t\t\t\t<br>• BCG 헨더슨 인스티튜트의 전략 연구소 앰배서더<br>\t\t\t\t\t<br>바르보라 하벨코바 (Barbora Havelkov&#225;)<br>\t\t\t\t\t<br>• BCG 헨더슨 인스티튜트의 전략 연구소 앰배서더<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>원문 정보<br>\t\t\t\t\t<br>출처: 하버드 비즈니스 리뷰 코리아<br>\t\t\t\t\t<br>발행일: 2025년 7월 3일<br>\t\t\t\t\t<br>카테고리: 전략, 디지털<br>\t\t\t\t\t<br>원문 링크: <a href=\"https://hbr.org/2025/06/growth-isnt-the-only-way-for-companies-to-create-value\" target=\"_blank\">https://hbr.org/2025/06/growth-isnt-the-only-way-for-companies-to-create-value</a><br>\t\t\t\t\t<br>에디팅: 이정흔<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>아티클 구조<br>\t\t\t\t\t<br>1단계 - 현황 분석<br>\t\t\t\t\t<br>• 성장의 역풍과 새로운 질문 • 안정성의 장점과 연구 결과<br>\t\t\t\t\t<br>2단계 - 4가지 핵심 전략<br>\t\t\t\t\t<br>• 고객을 향한 서비스 (자산 경량화) • 고급화 전략 (총이익률 향상) • 내부에 답이 있다 (재무제표 확장) • 현금으로 보답하라 (배당 전략)<br>\t\t\t\t\t<br>3단계 - 실행 과제<br>\t\t\t\t\t<br>• 인재유치와 혁신 유지 • 전략의 한계와 지속적 탐색 필요성<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>성장을 가로막는 역풍<br>\t\t\t\t\t<br>현재 기업들이 직면한 도전<br>\t\t\t\t\t<br>• 세계화 후퇴로 인한 시장 축소 • 인구 고령화로 인한 소비 감소<br>\t\t\t\t\t<br>• 지속가능성 우려로 인한 신중한 소비 패턴 • 무조건적 성장 추구의 위험성<br>\t\t\t\t\t<br>핵심 질문<br>\t\t\t\t\t<br>• 기업은 성장 없이 어떻게 지속적인 가치를 창출할 수 있을까<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>20년간 연구 결과<br>\t\t\t\t\t<br>&#128202; 연구 규모<br>\t\t\t\t\t<br>• 북미, 유럽, 일본의 1만 개 이상 기업 분석 • 172개 안정적 기업 선별 (거의 0에 가까운 성장률) • 20년간 지속적 성과 추적<br>\t\t\t\t\t<br>&#127919; 핵심 발견<br>\t\t\t\t\t<br>• 시장 평균 수준의 주주 수익률 달성 • 12% 낮은 변동성 기록 • 심각한 가치 붕괴 가능성 절반으로 감소<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>안정적 기업의 특징<br>\t\t\t\t\t<br>&#128200; 성과 지표<br>\t\t\t\t\t<br>• 57개 기업 (3곳 중 1곳)이 시장 대비 초과 성과 • 평균 연령 거의 100년 • S&P 500 기업보다 두 배 가까이 오래된 역사<br>\t\t\t\t\t<br>&#127970; 소유 구조<br>\t\t\t\t\t<br>• 25%가 지배 지분 소유주 보유 • S&P 1500 지수 기업 중 8%만 해당 • 소유주 의식이 장기적 절제 경영에 기여<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>공통된 특징과 전략 방향<br>\t\t\t\t\t<br>❌ 회피하는 전략<br>\t\t\t\t\t<br>• 지나치게 야심찬 대형 M&A 회피 • 공격적 성장 전략의 위험 인식 • 대형 인수합병 실패율 70-75% 고려<br>\t\t\t\t\t<br>✅ 선택하는 전략<br>\t\t\t\t\t<br>• 4가지 뚜렷한 전략 활용 • 성장 없이도 탁월한 성과 달성 • 기존 자원의 효율적 활용 우선<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>1단계 - 자산 경량화 전략 &#128241;<br>\t\t\t\t\t<br>핵심 접근법<br>\t\t\t\t\t<br>• 기존 고객과의 관계에서 최대한의 가치 추출 • 물리적 제품에서 서비스/소프트웨어로 전환 • 자산 집약도를 낮추며 수익률 개선<br>\t\t\t\t\t<br>&#128202; 성과 지표 (2004-2024)<br>\t\t\t\t\t<br>• EBIT 마진 8%포인트 증가 • 설비투자 50% 감소 • 매출원가 25% 절감 • 연평균 TSR 9% 달성<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>자산 경량화 전략 - 적용 분야<br>\t\t\t\t\t<br>&#127919; 주요 적용 산업<br>\t\t\t\t\t<br>• 디지털 전환 진행 중인 자산 집약적 산업 • 서비스 중심으로 변화하는 IT 기업 • 상품 획일화나 경쟁 압박에 직면한 기업<br>\t\t\t\t\t<br>&#128161; 핵심 효과<br>\t\t\t\t\t<br>• 고객과의 관계 더욱 깊게 발전 • 수익률 개선과 자산 집약도 감소 • 지속가능한 경쟁 우위 확보<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>지멘스 사례 &#127981;<br>\t\t\t\t\t<br>2014년 전략 전환<br>\t\t\t\t\t<br>• <b>서비스형 소프트웨어(SaaS)</b>와 디지털 트윈 기술 주력 • 전통적 산업용 복합 기업 → 디지털 산업 혁신 리더<br>\t\t\t\t\t<br>&#128260; 통합 전략<br>\t\t\t\t\t<br>• 핵심 제품에 소프트웨어와 데이터 기반 서비스 통합 • 더 탄탄한 수익 구조 구축 • 깊이 있는 고객 연결 강화<br>\t\t\t\t\t<br>&#128200; 성과<br>\t\t\t\t\t<br>• 지난 10년간 연평균 TSR 12% 달성<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>2단계 - 고급화 전략 &#128142;<br>\t\t\t\t\t<br>핵심 개념<br>\t\t\t\t\t<br>• 비용 절감보다 품질 강화 우선 • 쉽게 무너지지 않는 시장 지위 구축 • 총이익률 향상을 통한 지속가능한 가치 창출<br>\t\t\t\t\t<br>&#128202; 성과 지표 (20년간)<br>\t\t\t\t\t<br>• 총이익률 12%포인트 증가 • 마진 확대와 강력한 현금 흐름 창출 • 연평균 TSR 9% 달성<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>고급화 전략 - 적용 기업<br>\t\t\t\t\t<br>&#127919; 주요 적용 분야<br>\t\t\t\t\t<br>• 소비재 기업에서 가장 흔하게 적용 • 틈새시장에서 활동하는 전문 기업 • 제품의 독창성이나 특화된 전문성 보유 기업<br>\t\t\t\t\t<br>&#128170; 경쟁 우위<br>\t\t\t\t\t<br>• 대체 불가능한 존재로 자리매김 • 가격 결정력 강화 • 고급 시장 진출 가능<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>모건 어드밴스드 머티리얼즈 사례 &#128300;<br>\t\t\t\t\t<br>기업 개요<br>\t\t\t\t\t<br>• 영국 본사 세라믹 및 탄소 소재 제조업체 • 우수한 내열성, 전기 절연성, 기계적 강도<br>\t\t\t\t\t<br>&#127919; 타겟 시장<br>\t\t\t\t\t<br>• 항공우주, 반도체, 전기차 등 극한 환경 산업 • 안정적 작동이 필수인 고부가가치 부품 공급<br>\t\t\t\t\t<br>&#128200; 성과 (20년간)<br>\t\t\t\t\t<br>• 마진 두 배 증가 • 실질 매출 증가 없이도 FTSE 100 대비 연간 TSR 3%포인트 초과<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>3단계 - 재무제표 확장 전략 &#128202;<br>\t\t\t\t\t<br>핵심 접근법<br>\t\t\t\t\t<br>• 수직적 통합을 통한 자산 기반 확장 • 이익 발생 가치 사슬의 더 많은 부분 통제 • 차별화된 가치 제안과 경쟁적 진입장벽 강화<br>\t\t\t\t\t<br>&#128202; 성과 지표<br>\t\t\t\t\t<br>• 총자산 규모 평균 두 배 확대 • 총이익률 8%포인트 증가 • 연평균 TSR 9% 기록 (현금흐름 기여분 5%포인트)<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>재무제표 확장 전략 - 적용 분야<br>\t\t\t\t\t<br>&#127981; 주요 적용 산업<br>\t\t\t\t\t<br>• 산업재, 유틸리티, 원자재 등 자산 집약적 산업 • 이미 차별화된 제품과 높은 시장 점유율 보유 기업 • 공급업체 비용 압박에 직면한 기업<br>\t\t\t\t\t<br>&#128161; 전략적 효과<br>\t\t\t\t\t<br>• 독자적 자산 포트폴리오 구축 • 가치 사슬 더 많은 부분 통제 • 부가가치 증대 효과<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>위트브레드 사례 &#127976;<br>\t\t\t\t\t<br>사업 모델<br>\t\t\t\t\t<br>• 영국 최대 호텔 브랜드 프리미어 인 소유 • 모든 호텔을 직접 소유하고 운영 관리 • 디지털 유통과 수익 관리 자체 플랫폼 통제<br>\t\t\t\t\t<br>&#128260; 통합 전략의 장점<br>\t\t\t\t\t<br>• 빠른 확장은 제약되지만 일관된 고품질 고객 경험 • 핵심 경쟁력의 기반 역할 • 프랜차이즈 방식 대비 차별화된 접근<br>\t\t\t\t\t<br>&#128200; 성과<br>\t\t\t\t\t<br>• 지난 20년간 연평균 TSR 10% 달성<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>4단계 - 채권형 배당 전략 &#128176;<br>\t\t\t\t\t<br>핵심 개념<br>\t\t\t\t\t<br>• 공격적 성장보다 현금의 주주 환원 우선 • 지속적이고 예측 가능한 배당 지급 • 주식이 채권처럼 안정적으로 움직이도록 설계<br>\t\t\t\t\t<br>&#128202; 안정성 지표<br>\t\t\t\t\t<br>• 시장 평균보다 1 표준편차 낮은 배당 변동성 • 더 큰 안정성과 낮은 리스크 제공 • 매출&#183;마진&#183;배당 성장 제한적 상황에서도 시장 초과 성과<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>채권형 배당 전략 - 재무 구조<br>\t\t\t\t\t<br>
