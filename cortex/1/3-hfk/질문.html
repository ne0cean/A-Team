<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>질문</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #1e1e1e;
  color: #e0e0e0;
  font-family: 'Segoe UI', -apple-system, sans-serif;
  font-size: 15px;
  line-height: 1.6;
  padding: 20px 30px 60px;
  overflow-x: hidden;
}
a { color: #6cb0f6; text-decoration: none; }
a:hover { text-decoration: underline; }
.title-bar {
  background: #3a3a5c;
  display: inline-block;
  padding: 6px 16px;
  font-size: 22px;
  font-weight: bold;
  color: #fff;
  margin-bottom: 4px;
}
.date { color: #999; font-size: 13px; margin-bottom: 20px; }
.board { position: relative; }
.card {
  background: #2a2a2a;
  border: 1px solid #3a3a3a;
  border-radius: 8px;
  padding: 12px;
  position: absolute;
  cursor: grab;
  transition: box-shadow 0.15s;
  overflow: hidden;
}
.card:hover { box-shadow: 0 0 0 1px #58a6ff; z-index: 10; }
.card.moving { opacity: 0.8; box-shadow: 0 4px 24px rgba(0,0,0,0.6); z-index: 100; cursor: grabbing; }
.card img { width: 100%; border-radius: 4px; display: block; }
.card .caption { font-size: 12px; color: #888; margin-top: 6px; }
.card .text { outline: none; min-height: 20px; white-space: pre-wrap; word-break: break-word; }
.card .text:focus { background: rgba(255,255,255,0.05); border-radius: 4px; padding: 4px; }
.card .text:empty::before { content: '텍스트 입력...'; color: #555; }
.card table { border-collapse: collapse; width: 100%; font-size: 13px; }
.card table td, .card table th { border: 1px solid #444; padding: 4px 8px; vertical-align: top; }
.card table th { background: #333; color: #ccc; }
.card-actions { position: absolute; top: 4px; right: 4px; display: none; gap: 4px; }
.card:hover .card-actions { display: flex; }
.card-btn { background: #333; border: 1px solid #555; color: #ccc; border-radius: 4px; padding: 2px 6px; font-size: 11px; cursor: pointer; }
.card-btn:hover { background: #444; color: #fff; }
.resize-handle { position: absolute; bottom: 0; right: 0; width: 16px; height: 16px; cursor: se-resize; opacity: 0; }
.card:hover .resize-handle { opacity: 0.6; }
.resize-handle::after { content: ''; position: absolute; bottom: 3px; right: 3px; width: 8px; height: 8px; border-right: 2px solid #666; border-bottom: 2px solid #666; }
.toolbar { position: fixed; bottom: 0; left: 0; right: 0; background: #161b22; border-top: 1px solid #30363d; padding: 8px 20px; display: flex; gap: 12px; align-items: center; z-index: 200; }
.toolbar button { background: #21262d; border: 1px solid #30363d; color: #e0e0e0; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; }
.toolbar button:hover { background: #30363d; }
.toolbar .status { color: #8b949e; font-size: 12px; margin-left: auto; }
.highlight-red { color: #ff6b6b; }
.highlight-blue { color: #6cb0f6; }
</style>
</head>
<body>
<div class="title-bar">질문</div>
<div class="date">Invalid Date</div>
<div class="board" id="board"></div>
<div class="toolbar">
  <button onclick="addTextCard()">+ 텍스트</button>
  <button onclick="addImageCard()">+ 이미지</button>
  <button onclick="saveBoard()">💾 저장</button>
  <button onclick="resetLayout()">↺ 재배치</button>
  <span class="status" id="status">Ready</span>
</div>
<script>
const SAVE_KEY = 'board-질문';
const IMG_BASE = '../../attachments/';
const DEFAULT_CARDS = [
  {
    "type": "text",
    "content": "질문<br>\t\t<br>\t\t<br>\t<br>\t<br>\t\t<br>\t\t\t<br><br>\t\t\t<br>이걸 콘텐츠로<br>\t\t\t<br>\"나를 앓게 할 질문,<br>\t\t\t<br>나를 아프게 할 질문,<br>\t\t\t<br>나를 알게 할 질문.\"<br>\t\t\t<br><br>\t\t\t<br>시공인간<br>\t\t\t<br>- 하루 중 내게 가장 가치 있는 시간은?<br>\t\t\t<br>- 내가 가장 좋아하는 공간?<br>\t\t\t<br>- 내가 닮고 싶고, 함께하고 싶은 사람?<br>\t\t\t<br><br>\t\t\t<br>한달간, 한 분기간, 일년 얼마나 성장했고, 올해 일하면서 가장 기쁜 경험은?<br>\t\t\t<br>On your best day, What did you do?<br>\t\t\t<br><br>\t\t\t<br>의식주<br>\t\t\t<br>- 내가 선호하는 스타일의 옷은?<br>\t\t\t<br>- 나의 소울 푸드, 최근에 꼿혀있는 음식<br>\t\t\t<br>- 앞으로 내가 살고 싶은 곳<br>\t\t\t<br><br>\t\t\t<br>나/건강<br>\t\t\t<br>가족<br>\t\t\t<br>사회<br>\t\t\t<br>일 외적으로<br>\t\t\t<br>여행/일탈<br>\t\t\t<br>유산/자산<br>\t\t\t<br><br>\t\t\t<br>더 나은 성장과 발전을 위해 내게 필요한 것은 무엇이라 생각하세요?<br>\t\t\t<br><br>\t\t\t<br>미지막으로 다른 사람 앞에서 울었던적이 언제인가요?<br>\t\t\t<br><br>\t\t\t<br>\t\t\t<br><br>\t\t\t<br>0. 휴대폰 사진 속에서 지난 1달간 찍은 사진 중 가장 나를 잘 표현하는 어떤 사진이든지 간에 공유해주세요<br>\t\t\t<br>1. 누가/무엇이 당신에게 영감을 주는가?<br>\t\t\t<br>2. 살면서 가장 인상 깊게 읽은 책은?<br>\t\t\t<br>3. 지난 3개월간 겪은 가장 큰 성공은?<br>\t\t\t<br>4. 가장 애착을 가지고 있는 물건은?<br>\t\t\t<br>5. 친구들은 당신을 어떻게 소개하는가?<br>\t\t\t<br>6. 지금 폰에 있는 앱 중에 아무도 없을 것 같은 앱은?<br>\t\t\t<br>7. 당신이 들었던 최고의 조언은?<br>\t\t\t<br>8. 요즈음 푹 빠져 있는 당신의 취미는?<br>\t\t\t<br>9. 당신이 듣고싶은 칭찬은?<br>\t\t\t<br>10. 집에서 불이 났을 때 가장 먼저 들고 나가는 물건은?<br>\t\t\t<br>11. 당신이 들었던 최악의 조건은?<br>\t\t\t<br>12. 하루를 보낼 때 가장 중요하게 생각하는 것은?<br>\t\t\t<br>13. 최근 가장 감사하다고 느낀 3가지는?<br>\t\t\t<br>14. 기회가 있다면 어떤 티비 프로그램에 나오고싶은가?<br>\t\t\t<br>15. 가장 소중히 여기는 가치는?<br>\t\t\t<br>16. 딱히 버리진 않지만 갖고 있는 것은?<br>\t\t\t<br><br>\t\t\t<br>\t\t\t\t<br>- 낙엽이 옷 위에 떨어질 때, 당신은 무슨 생각을 하나요?<br>\t\t\t\t<br>- 다른 사람은 긁히지 않는 부분인데, 당신이 긁히는 부분은 무엇인가요?<br>\t\t\t\t<br>- 행복은 강도일까요? 빈도일까요?<br>\t\t\t\t<br>- 비교하지 않는 방법은 무엇일까요?<br>\t\t\t\t<br>- 죄책감과 수치심의 차이는 무엇일까요?<br>\t\t\t\t<br>- 당신의 씻는 순서를 이야기 해주세요<br>\t\t\t\t<br>- 지금 내 삶에 해가 되는 가장 큰 한가지는 무엇인가요?<br>\t\t\t\t<br>- 남이 말해주었던 나만의 매력은 무엇인가요?<br>\t\t\t\t<br>- 자신만의 시크릿 꿀템을 하나 이야기해주세요.<br>\t\t\t\t<br>- 나에게 솔직해질 수 있는 가장 좋은 방법은 무엇일까요?<br>\t\t\t\t<br>- 내가 속한 집단이 나쁜 일을 실행할 때, 어떻게 하면 우리는 주체적으로 행동할 수 있을까요?<br>\t\t\t\t<br>- 당신이 생각하는 '양심'은 무엇인가요?<br>\t\t\t\t<br>- 미련이 남았던 이유는 무엇인가요?<br>\t\t\t\t<br>- 삶은 우연과 필연 중에 어떤 쪽이 크다고 생각하시나요?<br>\t\t\t\t<br>- 즉각적이면서도 완전한 행복을 주었던 '햇살'의 순간 하나를 이야기 해주세요.<br>\t\t\t<br>\t\t\t<br>사랑하기 위해 물어야 할 36가지 질문<br>\t\t\t<br>2015년 1월 14일&#160; | &#160;By:&#160;<a href=\"https://newspeppermint.com/author/heesangju/\" target=\"_blank\">heesangju</a>&#160; | &#160;<a href=\"https://newspeppermint.com/category/lifestyle/\" target=\"_blank\">문화</a>&#160; | &#160;<a href=\"https://newspeppermint.com/2015/01/13/36-questions/#disqus_thread\" target=\"_blank\">7 Comments</a><br>\t\t\t<br><a href=\"https://newspeppermint.com/2015/02/02/m-wonder/\" target=\"_blank\">뉴욕타임스에서 큰 반향을 얻은 맨디 랜의 ‘사랑에 빠지고 싶다면’</a>&#160;글에는 심리학자 아서 아론 등이 개발한 36개의 질문 목록이 나옵니다. 서로 다른 두 사람이 만나 사적인 질문을 하면서 이해하고 가까워질 수 있도록 개발된 질문들이죠. 무너지기 쉬운 나의 가장 약한 부분을 파트너에게 밝히는 건 어려운 일이지만 단단한 관계를 지어나가는 데 가장 도움이 되는 단계이기도 합니다. 여기, 그 시작이 되는 36개 질문을 공개합니다.<br>\t\t\t<br>1. 이 세상 누구와도 저녁을 함께 먹을 수 있다면, 누구를 택할 생각인가요?<br>\t\t\t<br>2. 유명해지고 싶나요? 어떤 방법으로요?<br>\t\t\t<br>3. 전화를 걸기 전에 뭐라고 말할지 연습해본 적이 있나요? 왜죠?<br>\t\t\t<br>4. 당신에게 “완벽한” 날은 어떤 날 인가요?<br>\t\t\t<br>5. 마지막으로 자신을 위해 노래를 부른 것이 언제인가요? 다른 사람을 위해서는요?<br>\t\t\t<br>6. 90살까지 살 수 있고 마지막 60년을 서른 살의 마음, 혹은 서른 살의 몸으로 살 수 있다고 해 봅시다. 몸과 마음 중 어느 쪽을 택할 건가요?<br>\t\t\t<br>7. 자신이 어떻게 죽을 것 같다는 직감이 있나요?<br>\t\t\t<br>8. 당신과 상대방의 공통점 세 가지를 말해봅시다.<br>\t\t\t<br>9. 당신의 인생에서 가장 감사하는 일은 무엇인가요?<br>\t\t\t<br>10. 어린 시절에서 하나를 바꾼다면 어떤 걸 바꾸고 싶나요?<br>\t\t\t<br>. 4분 동안 생각한 다음, 당신 인생을 가능한 한 자세히 상대방에게 이야기해주세요.<br>\t\t\t<br>12. 내일 침대에서 일어났을 때 새로운 능력을 갖추게 된다면 어떤 능력을 가지고 싶나요?<br>\t\t\t<br>13. 당신의 인생이나 미래에 대해 무엇이든 말해주는 수정구가 있다면, 무엇을 물을까요?<br>\t\t\t<br>14. 오랫동안 하고 싶었던 일이 있나요? 왜 그 일을 하지 않았나요?<br>\t\t\t<br>15. 지금까지 당신 인생에서 가장 잘한 일이 어떤 건가요?<br>\t\t\t<br>16. 친구 사이에 가장 중요하게 생각하는 건 어떤 것이죠?<br>\t\t\t<br>17. 가장 소중한 기억이 뭔가요?<br>\t\t\t<br>18. 가장 끔찍한 기억은요?<br>\t\t\t<br>19. 1년 뒤 갑자기 죽을 것이라는 사실을 알게 된다면 지금 당신의 삶을 바꿀 건가요? 왜 그렇죠?<br>\t\t\t<br>20. 친구는 당신에게 어떤 의미인가요?<br>\t\t\t<br>21. 사랑과 애정은 당신의 삶에서 어떤 의미인가요?<br>\t\t\t<br>22. 상대방의 장점 5가지를 서로 말해보세요.<br>\t\t\t<br>23. 당신의 가족은 얼마나 화기애애한가요? 당신은 어린 시절을 다른 이들보다 더 행복하게 보냈다고 생각하나요?<br>\t\t\t<br>24. 어머니와의 사이가 어떤가요?<br>\t\t\t<br>25. “우리”로 시작하는 문장 세 가지를 말해보세요. 예를 들어, “우리는 둘 다 어떠어떠한 느낌을 가지고 있습니다.” 같은 문장 말이죠.<br>\t\t\t<br>26. 이 문장을 완성해보세요. “나는 ~ 을 함께 나눌 누군가가 있었으면 좋겠다.”<br>\t\t\t<br>27. 상대방이 나와 가까운 친구가 되기위해 나에 대해 알아야 하는 것을 말해보세요.<br>\t\t\t<br>28. 상대방에 대해 마음에 드는 점을 말해보세요. 아주 솔직해야 합니다. 처음 만난 사람에게는 하지 않을 이야기라도 말해야 한다는 뜻이죠.<br>\t\t\t<br>29. 당신의 삶에서 당황스러웠던 순간을 이야기해봅시다.<br>\t\t\t<br>30. 가장 최근에 다른 사람 앞에서 울었던 것이 언제인가요? 혼자 운 적은요?<br>\t\t\t<br>31. 상대방에 대해 이미 좋아하게 된 것들을 말해보세요.<br>\t\t\t<br>32. 혹시 농담으로라도 말해서는 안 되는 것이 있다면 어떤 것들이 있을까요?<br>\t\t\t<br>33. 오늘 밤 누구와도 연락하지 못한 상태에서 죽게 된다면, 그 말을 하지 못한 것을 가장 후회할 사람이 있나요? 왜 아직까지 그 말을 하지 못했나요?<br>\t\t\t<br>34. 당신의 모든 것이 있는 집이 불에 타고 있습니다. 가족들을 다 구한 후 마지막 한 가지를 가지고 올 수 있습니다. 어떤 것을 가지고 나올 건가요?<br>\t\t\t<br>35. 당신 가족 중에 누구의 죽음을 당신은 가장 슬퍼할 것 같나요? 그 이유는 뭔가요?<br>\t\t\t<br>36. 당신의 문제를 털어놓고 상대방에게 조언을 구해보세요. 그리고 상대방에게, 내가 그 문제를 어떻게 느끼고 있을지를 생각해보라고 말하세요.<br>\t\t\t<br><br>\t\t\t출처: <<a href=\"https://newspeppermint.com/2015/01/13/36-questions/\" target=\"_blank\">https://newspeppermint.com/2015/01/13/36-questions/</a>> <br>\t\t\t<br>\t\t\t<br><br>\t\t\t<br>\t\t\t<br>자, 이제<br>\t\t\t<br>당신의 인생에서 가장 두려운 질문은 무엇인가요?<br>\t\t\t<br><br>\t\t\t<br>내일 숨을 거두게 된다면 어떤 생각이 들까요?<br>\t\t\t<br><br>\t\t\t<br>소수책방 질문<br>\t\t\t<br>\t\t\t\t<br>- 내가 좋아하는 이상형과 과장 흡사한 과일을 알려주세요 그 이유는요?<br>\t\t\t\t<br>- 똑똑하다는 것은 무엇인가요?<br>\t\t\t\t<br>- 지혜로운 것은 무엇인가요?<br>\t\t\t\t<br>- 어떤 숫자를 좋아하세요? 그 숫자가 가지고 있는 상징성을 이야기 해주세요.<br>\t\t\t\t<br>- 사람의 시선으로부터 자유롭기 위해서는 어떻게 해야 할까요?<br>\t\t\t\t<br>- 사람의 어떤 행동을 보고 '나쁘다', '좋다'를 나누는 여러분만의 기준은 무엇인가요?<br>\t\t\t\t<br>- 24절기 중 가장 좋아하는 절기 하나를 이야기해 주시고 왜 좋아하는지 알려주세요.<br>\t\t\t\t<br>- 사귀던 사람이 했던 행동 중에 정말 이해가 되지 않았던 부분을 하나 이야기 해주세요.<br>\t\t\t\t<br>- 전 애이이 준 물건 중에 버리지 않고 쓰고 있는 물건 하나를 말해주세요. 버리지 못한 이유는 무엇인가요?<br>\t\t\t\t<br>- 왜 우리는 자연을 보고 위로나 위안을 얻는 것일까요?<br>\t\t\t\t<br>- 혼자서 잘 지내기 위해서는 어떻게 해야 할까요?<br>\t\t\t\t<br>- 철학적 사고가 필요한 이유는 무엇일까요?<br>\t\t\t\t<br>- 인생의 균형을 맞추기 위해서는 어떻게 해야 할까요?<br>\t\t\t\t<br>- 누군가를 사랑하면서 맘에 들었던 나의 모습은 무엇이 있나요?<br>\t\t\t\t<br>- 지금 당신의 인생에 '무엇을' 곁들여야 당신의 인생이 더 풍부해질까요?<br>\t\t\t\t<br><br>\t\t\t<br>\t\t\t<br><br>\t\t\t<br><br>\t\t\t<br><a href=\"https://www.instagram.com/reel/DA_TueTNzWv/?igsh=dzNweTYxMmQwbzZx\" target=\"_blank\">https://www.instagram.com/reel/DA_TueTNzWv/?igsh=dzNweTYxMmQwbzZx</a><br>\t\t\t<br><br>\t\t\t<br>백캐스팅<br>\t\t<br>\t\t<br>\t\t\t<br>11",
    "w": 400
  }
];

let cards = [];
let moving = null, resizing = null;

function loadBoard() {
  const saved = localStorage.getItem(SAVE_KEY);
  cards = saved ? JSON.parse(saved) : DEFAULT_CARDS.map(c => ({...c}));
  renderCards();
  if (!saved) autoLayout();
}

function autoLayout() {
  const GAP = 14;
  const boardW = document.getElementById('board').offsetWidth;
  const cols = Math.max(1, Math.floor(boardW / 280));
  const colW = (boardW - GAP * (cols - 1)) / cols;
  const colHeights = new Array(cols).fill(0);
  const allCards = document.querySelectorAll('.card');
  const images = document.querySelectorAll('.card img');
  let loaded = 0;
  const total = images.length;

  function place() {
    allCards.forEach((el, i) => {
      const card = cards[i];
      const w = Math.min(card.w || colW, colW);
      let minCol = 0;
      for (let c = 1; c < cols; c++) if (colHeights[c] < colHeights[minCol]) minCol = c;
      card.x = minCol * (colW + GAP);
      card.y = colHeights[minCol];
      card.w = w;
      el.style.left = card.x + 'px';
      el.style.top = card.y + 'px';
      el.style.width = w + 'px';
      colHeights[minCol] = card.y + el.offsetHeight + GAP;
    });
    document.getElementById('board').style.minHeight = Math.max(...colHeights) + 100 + 'px';
    saveBoard();
  }

  if (total === 0) requestAnimationFrame(place);
  else images.forEach(img => {
    if (img.complete) { loaded++; if (loaded >= total) requestAnimationFrame(place); }
    else img.onload = img.onerror = () => { loaded++; if (loaded >= total) requestAnimationFrame(place); };
  });
}

function syncText() {
  document.querySelectorAll('.card').forEach(el => {
    const idx = +el.dataset.idx;
    if (cards[idx]?.type === 'text') {
      const t = el.querySelector('.text');
      if (t) cards[idx].content = t.innerHTML;
    }
  });
}

function saveBoard() {
  syncText();
  localStorage.setItem(SAVE_KEY, JSON.stringify(cards));
  document.getElementById('status').textContent = '저장됨 ' + new Date().toLocaleTimeString();
}

function renderCards() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  cards.forEach((card, i) => {
    const el = document.createElement('div');
    el.className = 'card';
    el.dataset.idx = i;
    if (card.x !== undefined) el.style.left = card.x + 'px';
    if (card.y !== undefined) el.style.top = card.y + 'px';
    if (card.w) el.style.width = card.w + 'px';

    el.addEventListener('mousedown', e => {
      if (e.target.closest('.text, a, .card-btn, .resize-handle, table')) return;
      e.preventDefault();
      moving = { idx: i, startX: e.clientX, startY: e.clientY, origX: card.x || 0, origY: card.y || 0 };
      el.classList.add('moving');
    });

    const actions = document.createElement('div');
    actions.className = 'card-actions';
    const delBtn = document.createElement('button');
    delBtn.className = 'card-btn'; delBtn.textContent = '×';
    delBtn.onclick = e => { e.stopPropagation(); if (confirm('삭제?')) { cards.splice(i, 1); renderCards(); saveBoard(); } };
    actions.appendChild(delBtn);
    el.appendChild(actions);

    if (card.type === 'text') {
      const text = document.createElement('div');
      text.className = 'text';
      text.contentEditable = true;
      text.innerHTML = card.content || '';
      text.addEventListener('blur', () => { card.content = text.innerHTML; saveBoard(); });
      el.appendChild(text);
    } else if (card.type === 'image') {
      const src = card.src.startsWith('http') || card.src.startsWith('data:') ? card.src : IMG_BASE + card.src;
      const img = document.createElement('img');
      img.src = src;
      img.alt = card.alt || '';
      img.loading = 'lazy';
      img.onerror = () => img.style.display = 'none';
      if (card.link) {
        const a = document.createElement('a'); a.href = card.link; a.target = '_blank';
        a.appendChild(img); el.appendChild(a);
      } else { el.appendChild(img); }
      if (card.caption) {
        const cap = document.createElement('div');
        cap.className = 'caption';
        cap.textContent = card.caption;
        el.appendChild(cap);
      }
    } else if (card.type === 'table') {
      const wrapper = document.createElement('div');
      wrapper.style.overflowX = 'auto';
      wrapper.innerHTML = card.html || '';
      el.appendChild(wrapper);
    }

    const rh = document.createElement('div');
    rh.className = 'resize-handle';
    rh.addEventListener('mousedown', e => {
      e.preventDefault(); e.stopPropagation();
      resizing = { idx: i, startX: e.clientX, startW: card.w || el.offsetWidth };
    });
    el.appendChild(rh);
    board.appendChild(el);
  });

  requestAnimationFrame(() => {
    let maxBottom = 0;
    document.querySelectorAll('.card').forEach(el => {
      const b = (parseFloat(el.style.top) || 0) + el.offsetHeight;
      if (b > maxBottom) maxBottom = b;
    });
    board.style.minHeight = (maxBottom + 100) + 'px';
  });
}

document.addEventListener('mousemove', e => {
  if (moving) {
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`);
    if (!el) return;
    const nx = moving.origX + e.clientX - moving.startX;
    const ny = moving.origY + e.clientY - moving.startY;
    el.style.left = nx + 'px';
    el.style.top = ny + 'px';
  }
  if (resizing) {
    const card = cards[resizing.idx];
    card.w = Math.max(100, resizing.startW + e.clientX - resizing.startX);
    const el = document.querySelector(`.card[data-idx="${resizing.idx}"]`);
    if (el) el.style.width = card.w + 'px';
  }
});

document.addEventListener('mouseup', e => {
  if (moving) {
    const card = cards[moving.idx];
    card.x = Math.max(0, moving.origX + e.clientX - moving.startX);
    card.y = Math.max(0, moving.origY + e.clientY - moving.startY);
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`);
    if (el) { el.classList.remove('moving'); }
    moving = null; saveBoard();
  }
  if (resizing) { resizing = null; saveBoard(); }
});

function addTextCard() {
  cards.push({ type: 'text', content: '', x: 50, y: window.scrollY + 100, w: 300 });
  renderCards();
  setTimeout(() => { const els = document.querySelectorAll('.card .text'); els[els.length - 1]?.focus(); }, 100);
}

function addImageCard() {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = 'image/*';
  input.onchange = e => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = () => { cards.push({ type: 'image', src: reader.result, x: 50, y: window.scrollY + 100, w: 240 }); renderCards(); saveBoard(); };
    reader.readAsDataURL(file);
  };
  input.click();
}

function resetLayout() {
  if (!confirm('자동 재배치합니다. 현재 위치가 변경됩니다.')) return;
  cards.forEach(c => { delete c.x; delete c.y; });
  renderCards(); autoLayout();
}

setInterval(saveBoard, 30000);
loadBoard();
</script>
