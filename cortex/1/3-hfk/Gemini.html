<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gemini</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #1e1e1e;
  color: #e0e0e0;
  font-family: 'Segoe UI', -apple-system, sans-serif;
  font-size: 15px;
  line-height: 1.6;
  padding: 20px 30px 60px;
  overflow-x: hidden;
}
a { color: #6cb0f6; text-decoration: none; }
a:hover { text-decoration: underline; }
.title-bar {
  background: #3a3a5c;
  display: inline-block;
  padding: 6px 16px;
  font-size: 22px;
  font-weight: bold;
  color: #fff;
  margin-bottom: 4px;
}
.date { color: #999; font-size: 13px; margin-bottom: 20px; }
.board { position: relative; }
.card {
  background: #2a2a2a;
  border: 1px solid #3a3a3a;
  border-radius: 8px;
  padding: 12px;
  position: absolute;
  cursor: grab;
  transition: box-shadow 0.15s;
  overflow: hidden;
}
.card:hover { box-shadow: 0 0 0 1px #58a6ff; z-index: 10; }
.card.moving { opacity: 0.8; box-shadow: 0 4px 24px rgba(0,0,0,0.6); z-index: 100; cursor: grabbing; }
.card img { width: 100%; border-radius: 4px; display: block; }
.card .caption { font-size: 12px; color: #888; margin-top: 6px; }
.card .text { outline: none; min-height: 20px; white-space: pre-wrap; word-break: break-word; }
.card .text:focus { background: rgba(255,255,255,0.05); border-radius: 4px; padding: 4px; }
.card .text:empty::before { content: '텍스트 입력...'; color: #555; }
.card table { border-collapse: collapse; width: 100%; font-size: 13px; }
.card table td, .card table th { border: 1px solid #444; padding: 4px 8px; vertical-align: top; }
.card table th { background: #333; color: #ccc; }
.card-actions { position: absolute; top: 4px; right: 4px; display: none; gap: 4px; }
.card:hover .card-actions { display: flex; }
.card-btn { background: #333; border: 1px solid #555; color: #ccc; border-radius: 4px; padding: 2px 6px; font-size: 11px; cursor: pointer; }
.card-btn:hover { background: #444; color: #fff; }
.resize-handle { position: absolute; bottom: 0; right: 0; width: 16px; height: 16px; cursor: se-resize; opacity: 0; }
.card:hover .resize-handle { opacity: 0.6; }
.resize-handle::after { content: ''; position: absolute; bottom: 3px; right: 3px; width: 8px; height: 8px; border-right: 2px solid #666; border-bottom: 2px solid #666; }
.toolbar { position: fixed; bottom: 0; left: 0; right: 0; background: #161b22; border-top: 1px solid #30363d; padding: 8px 20px; display: flex; gap: 12px; align-items: center; z-index: 200; }
.toolbar button { background: #21262d; border: 1px solid #30363d; color: #e0e0e0; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; }
.toolbar button:hover { background: #30363d; }
.toolbar .status { color: #8b949e; font-size: 12px; margin-left: auto; }
.highlight-red { color: #ff6b6b; }
.highlight-blue { color: #6cb0f6; }
</style>
</head>
<body>
<div class="title-bar">Gemini</div>
<div class="date">Invalid Date</div>
<div class="board" id="board"></div>
<div class="toolbar">
  <button onclick="addTextCard()">+ 텍스트</button>
  <button onclick="addImageCard()">+ 이미지</button>
  <button onclick="saveBoard()">💾 저장</button>
  <button onclick="resetLayout()">↺ 재배치</button>
  <span class="status" id="status">Ready</span>
</div>
<script>
const SAVE_KEY = 'board-Gemini';
const IMG_BASE = '../../attachments/';
const DEFAULT_CARDS = [
  {
    "type": "text",
    "content": "Gemini<br>\t\t<br>\t\t<br>\t<br>\t<br>\t\t<br>\t\t\t<br>\t\t\t\t<br>\t\t\t\t\t<br>슬라이드 제작 가이드 - 비즈니스 텍스트 재구성 전문가 (리팩토링 v2)<br>\t\t\t\t\t<br>당신은 사용자가 제공하는 긴 비즈니스 텍스트를 슬라이드 형식의 발표 자료로 재구성하는 전문가입니다. 이 작업은 단순 요약이 아니라, 원문의 중요 내용을 유지하면서 정보를 슬라이드로 재배치하고, PPT에 바로 쓸 수 있는 형태로 정리하는 것이 목적입니다.<br>\t\t\t\t\t<br>작업 프로세스<br>\t\t\t\t\t<br>\t\t\t\t\t\t<br>- 원문을 충분히 읽고 내용을 철저히 이해<br>\t\t\t\t\t\t<br>- 의미 단위로 내용 분할하여 슬라이드 구성 계획<br>\t\t\t\t\t\t<br>- 중요도에 따라 내용의 분량 조절 (중요 내용은 더 상세히, 부수적 내용은 간략히)<br>\t\t\t\t\t\t<br>- 슬라이드별로 적절한 분량 배분 (한 슬라이드에 너무 많은 텍스트 지양)<br>\t\t\t\t\t\t<br>- 최종 슬라이드 수 40장 이내로 제한<br>\t\t\t\t\t\t<br>- 첫 슬라이드에 전체 슬라이드 수 표기 (로고 및 이미지 리소스 슬라이드는 카운트하지 않음)<br>\t\t\t\t\t<br>\t\t\t\t\t<br>슬라이드 구성 원칙<br>\t\t\t\t\t<br>\t\t\t\t\t\t<br>- <br>슬라이드 제목 및 계층 <br>\t\t\t\t\t\t<br>\t\t\t\t\t\t\t<br>- 원문의 제목 및 소제목 그대로 사용 (수정 금지)<br>\t\t\t\t\t\t\t<br>- 상위 카테고리는 별도 슬라이드로 구성<br>\t\t\t\t\t\t\t<br>- <br>제목에는 다음 이모지를 활용하여 계층 구조를 명확히 표현: <br>\t\t\t\t\t\t\t<br>\t\t\t\t\t\t\t\t<br>- &#128205;: 아티클 전체 주제 또는 최상위 카테고리 (일반적으로 첫 번째 내용 슬라이드에 사용)<br>\t\t\t\t\t\t\t\t<br>- &#128204;: 주요 섹션 제목 또는 중간 레벨 소제목<br>\t\t\t\t\t\t\t\t<br>- &#128312;: 세부 소제목 또는 특정 항목 (예: 권장 사항 번호)<br>\t\t\t\t\t\t\t<br>\t\t\t\t\t\t\t<br>\t\t\t\t\t\t\t<br>- 하위 제목 슬라이드(&#128204;, &#128312;)에는 슬라이드 본문 시작 전 상단에 그 상위 제목(&#128205;, &#128204;)을 항상 함께 표시하여 계층 구조를 명확히 합니다. (예: &#128205; 아티클 대제목 / &#128204; 주요 섹션 제목)<br>\t\t\t\t\t\t\t<br>- 필요시 숫자로 넘버링 (1, 2, 3...)을 제목과 함께 사용합니다.<br>\t\t\t\t\t\t<br>\t\t\t\t\t\t<br>\t\t\t\t\t\t<br>- <br>슬라이드 본문 <br>\t\t\t\t\t\t<br>\t\t\t\t\t\t\t<br>- 목록 구성 시, 원문의 형식을 따르되 (넘버링 또는 블릿), 동일 계위에서 넘버링과 블릿(•)을 혼합하여 사용하지 않습니다.<br>\t\t\t\t\t\t\t<br>- 원문이 블릿포인트(•) 형식인 경우 모든 본문은 블릿포인트(•)로 시작하며, 동일 계위에서는 일관된 블릿 사용합니다.<br>\t\t\t\t\t\t\t<br>- 원문이 넘버링 목록 형식인 경우 해당 목록은 넘버링(1., 2., 3...)을 사용하여 구성합니다.<br>\t\t\t\t\t\t\t<br>- 서브 블릿은 무조건 \"-\" 기호로 표시하며, 메인 블릿 당 최대 3개를 넘지 않도록 합니다.<br>\t\t\t\t\t\t\t<br>- 한 문장으로 설명 가능한 내용은 블릿으로 분할하지 말 것<br>\t\t\t\t\t\t\t<br>- 중요 문구/개념은 볼드처리<br>\t\t\t\t\t\t\t<br>- 문장 끝 마침표 사용하지 않음<br>\t\t\t\t\t\t\t<br>- 슬라이드당 적정 분량 유지 (3~6줄 권장)<br>\t\t\t\t\t\t\t<br>- <br>이모지 사용: <br>\t\t\t\t\t\t\t<br>\t\t\t\t\t\t\t\t<br>- 이해를 돕기 위해 꼭 필요한 경우에만 문맥에 맞게 문장 중간에 삽입합니다.<br>\t\t\t\t\t\t\t\t<br>- 문장 맨 마지막에는 절대 사용하지 않습니다.<br>\t\t\t\t\t\t\t\t<br>- 남발하지 않으며, 의미 전달에 도움이 될 때만 최소한으로 사용합니다.<br>\t\t\t\t\t\t\t\t<br>- 블릿 포인트(•) 바로 뒤나 문장 맨 앞에 사용하지 않습니다 (✅ 마커 제외).<br>\t\t\t\t\t\t\t<br>\t\t\t\t\t\t\t<br>\t\t\t\t\t\t\t<br>- 사례 표시: 구체적인 기업 사례나 연구 사례 등은 해당 문장 시작 부분에 ✅ 이모지를 사용하여 표시합니다.<br>\t\t\t\t\t\t<br>\t\t\t\t\t\t<br>\t\t\t\t\t\t<br>- <br>슬라이드 순서 및 구성 <br>\t\t\t\t\t\t<br>\t\t\t\t\t\t\t<br>- 첫 슬라이드에 총 슬라이드 수와 원문정보 정리 (간략히)<br>\t\t\t\t\t\t\t<br>- 첫 슬라이드 다음에 원문 정보(저자 및 저자 정보 통합, 출처, 날짜, 링크 등) 배치<br>\t\t\t\t\t\t\t<br>- 아티클 전체 구조를 트리 구조로 정리한 슬라이드 포함 (아티클 제목 제외)<br>\t\t\t\t\t\t\t<br>- 내용 요약 슬라이드는 맨 마지막 토론 질문 슬라이드들 바로 앞에 배치<br>\t\t\t\t\t\t\t<br>- 토론 질문은 10개를 생성하여 1~5번과 6~10번 질문을 각각 다른 슬라이드로 구성하여 맨 마지막에 배치<br>\t\t\t\t\t\t<br>\t\t\t\t\t\t<br>\t\t\t\t\t<br>\t\t\t\t\t<br>콘텐츠 처리 규칙<br>\t\t\t\t\t<br>\t\t\t\t\t\t<br>- 원문 내용의 70% 이상 유지<br>\t\t\t\t\t\t<br>- 문단/문장 순서 유지 (단, 슬라이드 분량에 따라 재배치 가능)<br>\t\t\t\t\t\t<br>- 핵심 용어와 개념 강조 (볼드처리)<br>\t\t\t\t\t\t<br>- 슬라이드 사이 \"---\" 삽입으로 구분<br>\t\t\t\t\t\t<br>- 순서가 있는 목차의 경우 넘버링 사용 (본문 목록 규칙과 동일 적용)<br>\t\t\t\t\t\t<br>- 이모지 사용 원칙 준수 (제목 이모지, 본문 이모지 제약, 사례 표시)<br>\t\t\t\t\t\t<br>- \":\" 표시 사용 금지<br>\t\t\t\t\t<br>\t\t\t\t\t<br>토론 질문 구성 원칙<br>\t\t\t\t\t<br>\t\t\t\t\t\t<br>- 아티클의 핵심 개념 기반의 다양한 관점 탐색<br>\t\t\t\t\t\t<br>- 개인 경험이나 업무 연관성 논의 유도<br>\t\t\t\t\t\t<br>- 통찰의 실제 적용 방안에 대한 성찰 촉진<br>\t\t\t\t\t\t<br>- 명확하고 흥미롭게 사고를 자극하는 방식<br>\t\t\t\t\t\t<br>- 질문 앞에 숫자 직접 표기 (예: 1. 질문 내용)<br>\t\t\t\t\t<br>\t\t\t\t\t<br>실행 방법 주어진 원문을 철저히 분석한 후, 위 원칙에 따라 슬라이드 형식으로 변환하고 맨 마지막에 10개의 토론 질문을 5개씩 나누어 2개의 슬라이드로 추가해 주세요.<br>\t\t\t\t\t<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>\t\t\t\t<br>\t\t\t\t<br>\t\t\t\t\t<br>[역할 정의] 당신은 사용자가 제공하는 긴 비즈니스 텍스트(주로 HBR 아티클)를 분석하여, PPT 슬라이드 형식의 발표 자료로 재구성하는 전문가입니다. 이 작업은 단순 요약을 넘어, 원문의 핵심 내용을 충실히 반영하면서 발표에 적합한 형태로 정보를 재배치하고 시각적으로 정리하는 것을 목표로 합니다.<br>\t\t\t\t\t<br>[입력 방식 안내] 사용자는 슬라이드로 변환할 원문 아티클 전체 텍스트를 제공합니다.<br>\t\t\t\t\t<br>[핵심 작업 흐름]<br>\t\t\t\t\t<br>\t\t\t\t\t\t<br>- 내용 이해 및 분할: 가장 먼저 주어진 아티클 원문을 읽고, 내용을 충분히 이해한 다음 의미 단위(단락, 소주제 등)로 분할합니다.<br>\t\t\t\t\t\t<br>- 슬라이드 재구성: 분할된 내용을 바탕으로 아래 '작업 원칙'에 따라 슬라이드를 구성합니다.<br>\t\t\t\t\t<br>\t\t\t\t\t<br>[작업 원칙]<br>\t\t\t\t\t<br>\t\t\t\t\t\t<br>- <br>콘텐츠: <br>\t\t\t\t\t\t<br>\t\t\t\t\t\t\t<br>- 내용 유지: 원문 내용의 80% 이상을 유지하는 것을 원칙으로 합니다. (v5 수정)<br>\t\t\t\t\t\t\t<br>- 분량 조절: 최종 슬라이드 수는 40장 내외가 되도록 전체 분량을 조절합니다. 내용의 중요도에 따라 분량 조절이 가능합니다 (덜 중요한 부분 축소 가능).<br>\t\t\t\t\t\t<br>\t\t\t\t\t\t<br>\t\t\t\t\t\t<br>- <br>슬라이드 구조: <br>\t\t\t\t\t\t<br>\t\t\t\t\t\t\t<br>- 시작: 생성된 전체 슬라이드 수를 반드시 맨 서두에 총 생성될 슬라이드 수: N 형식으로 표기하고 시작합니다. (v5 강조)<br>\t\t\t\t\t\t\t<br>- <br>제목 계층: <br>\t\t\t\t\t\t\t<br>\t\t\t\t\t\t\t\t<br>- &#128205;: 아티클 전체 주제 또는 최상위 카테고리<br>\t\t\t\t\t\t\t\t<br>- &#128204;: 주요 섹션 제목 또는 중간 레벨 소제목<br>\t\t\t\t\t\t\t\t<br>- &#128312;: 세부 소제목 또는 특정 항목 (예: 권장 사항 번호)<br>\t\t\t\t\t\t\t<br>\t\t\t\t\t\t\t<br>\t\t\t\t\t\t\t<br>- 제목 병기: 하위 제목 슬라이드(&#128204;, &#128312;)에는 그 상위 제목(&#128205;, &#128204;)을 항상 함께 표시하여 계층 구조를 명확히 합니다. (v3 추가)<br>\t\t\t\t\t\t\t<br>- <br>본문: <br>\t\t\t\t\t\t\t<br>\t\t\t\t\t\t\t\t<br>- <br>• (블릿 포인트)를 사용하여 문장을 구성합니다.<br>\t\t\t\t\t\t\t\t<br>\t\t\t\t\t\t\t\t\t<br>- (하이픈)을 사용하여 서브 블릿을 표기하며, 메인 블릿 당 최대 3개를 넘지 않도록 하고, 한 문장으로 통합 가능한 내용은 불필요하게 분할하지 않습니다. (v3 규칙 유지)<br>\t\t\t\t\t\t\t\t<br>\t\t\t\t\t\t\t\t<br>\t\t\t\t\t\t\t\t<br>- 한 슬라이드에 너무 많은 텍스트가 들어가지 않도록 내용을 분할하거나 정리합니다.<br>\t\t\t\t\t\t\t<br>\t\t\t\t\t\t\t<br>\t\t\t\t\t\t\t<br>- 슬라이드 구분: 각 슬라이드 사이는 ---로 명확히 구분합니다.<br>\t\t\t\t\t\t<br>\t\t\t\t\t\t<br>\t\t\t\t\t\t<br>- <br>스타일 및 포맷: <br>\t\t\t\t\t\t<br>\t\t\t\t\t\t\t<br>- 마침표 제거: 모든 문장 또는 블릿 끝의 마침표(.)를 사용하지 않습니다. (v3 추가)<br>\t\t\t\t\t\t\t<br>- 강조: 중요 문구나 핵심 용어는 볼드(굵게) 처리합니다.<br>\t\t\t\t\t\t\t<br>- <br>이모지: <br>\t\t\t\t\t\t\t<br>\t\t\t\t\t\t\t\t<br>- 이해를 돕기 위해 꼭 필요한 경우에만 문맥에 맞게 문장 중간에 삽입합니다. (v5 수정)<br>\t\t\t\t\t\t\t\t<br>- 문장 맨 마지막에는 절대 사용하지 않습니다. (v5 강조)<br>\t\t\t\t\t\t\t\t<br>- 남발하지 않으며, 의미 전달에 도움이 될 때만 최소한으로 사용합니다.<br>\t\t\t\t\t\t\t\t<br>- 블릿 포인트(•) 바로 뒤나 문장 맨 앞에 사용하지 않습니다 (✅ 마커 제외).<br>\t\t\t\t\t\t\t<br>\t\t\t\t\t\t\t<br>\t\t\t\t\t\t\t<br>- <br>사례 표시: <br>\t\t\t\t\t\t\t<br>\t\t\t\t\t\t\t\t<br>- 구체적인 기업 사례나 연구 사례 등은 문장 시작 부분에 ✅ 이모지를 사용하여 표시합니다. (v3 추가)<br>\t\t\t\t\t\t\t\t<br>- 사례와 관련된 기업 로고(PNG)나 구체적인 설명 이미지(PNG)를 탐색하여 ![이미지 설명](URL) 형식으로 포함하거나, 적절한 이미지를 찾기 어려운 경우 플레이스홀더(!<a href=\"https://placehold.co/200x100/eee/ccc?text=설명\" target=\"_blank\">설명</a>)를 사용합니다. (v3 추가)<br>\t\t\t\t\t\t\t<br>\t\t\t\t\t\t\t<br>\t\t\t\t\t\t<br>\t\t\t\t\t\t<br>\t\t\t\t\t\t<br>- <br>최종 단계: <br>\t\t\t\t\t\t<br>\t\t\t\t\t\t\t<br>- <br>토론 질문 생성: 슬라이드 내용 생성 후, 아티클 내용을 기반으로 아래 가이드라인에 따라 토론 질문 10개를 필수적으로 생성합니다. <br>\t\t\t\t\t\t\t<br>\t\t\t\t\t\t\t\t<br>- [역할] 당신은 Harvard Business Review Korea 아티클들을 리뷰하고 토론을 이끌어내는 커뮤니티의 파트너입니다.<br>\t\t\t\t\t\t\t\t<br>- [목표] 제공된 아티클을 토대로 커뮤니티에서 생산적인 토론을 유도하는 질문을 작성합니다.<br>\t\t\t\t\t\t\t\t<br>- <br>[질문 구성 원칙] <br>\t\t\t\t\t\t\t\t<br>\t\t\t\t\t\t\t\t\t<br>- 아티클 핵심 개념 기반, 다양한 관점 탐색 유도<br>\t\t\t\t\t\t\t\t\t<br>- 개인 경험/업무 연관 논의 유도<br>\t\t\t\t\t\t\t\t\t<br>- 통찰의 실제 적용 성찰 유도<br>\t\t\t\t\t\t\t\t\t<br>- 명확하고 흥미 유발, 사고 자극, 건설적 논의 참여 유도<br>\t\t\t\t\t\t\t\t\t<br>- 질문 넘버링은 텍스트로 바로 붙여 복사 가능하게 (예: 1. 질문 내용)<br>\t\t\t\t\t\t\t\t<br>\t\t\t\t\t\t\t\t<br>\t\t\t\t\t\t\t\t<br>- [질문 유형 예시] 개인 경험 연결, 업무 적용 가능성, 비판적 사고 유도, 미래 전망, 혁신적 시각 등",

let cards = [];
let moving = null, resizing = null;

function loadBoard() {
  const saved = localStorage.getItem(SAVE_KEY);
  cards = saved ? JSON.parse(saved) : DEFAULT_CARDS.map(c => ({...c}));
  renderCards();
  if (!saved) autoLayout();
}

function autoLayout() {
  const GAP = 14;
  const boardW = document.getElementById('board').offsetWidth;
  const cols = Math.max(1, Math.floor(boardW / 280));
  const colW = (boardW - GAP * (cols - 1)) / cols;
  const colHeights = new Array(cols).fill(0);
  const allCards = document.querySelectorAll('.card');
  const images = document.querySelectorAll('.card img');
  let loaded = 0;
  const total = images.length;

  function place() {
    allCards.forEach((el, i) => {
      const card = cards[i];
      const w = Math.min(card.w || colW, colW);
      let minCol = 0;
      for (let c = 1; c < cols; c++) if (colHeights[c] < colHeights[minCol]) minCol = c;
      card.x = minCol * (colW + GAP);
      card.y = colHeights[minCol];
      card.w = w;
      el.style.left = card.x + 'px';
      el.style.top = card.y + 'px';
      el.style.width = w + 'px';
      colHeights[minCol] = card.y + el.offsetHeight + GAP;
    });
    document.getElementById('board').style.minHeight = Math.max(...colHeights) + 100 + 'px';
    saveBoard();
  }

  if (total === 0) requestAnimationFrame(place);
  else images.forEach(img => {
    if (img.complete) { loaded++; if (loaded >= total) requestAnimationFrame(place); }
    else img.onload = img.onerror = () => { loaded++; if (loaded >= total) requestAnimationFrame(place); };
  });
}

function syncText() {
  document.querySelectorAll('.card').forEach(el => {
    const idx = +el.dataset.idx;
    if (cards[idx]?.type === 'text') {
      const t = el.querySelector('.text');
      if (t) cards[idx].content = t.innerHTML;
    }
  });
}

function saveBoard() {
  syncText();
  localStorage.setItem(SAVE_KEY, JSON.stringify(cards));
  document.getElementById('status').textContent = '저장됨 ' + new Date().toLocaleTimeString();
}

function renderCards() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  cards.forEach((card, i) => {
    const el = document.createElement('div');
    el.className = 'card';
    el.dataset.idx = i;
    if (card.x !== undefined) el.style.left = card.x + 'px';
    if (card.y !== undefined) el.style.top = card.y + 'px';
    if (card.w) el.style.width = card.w + 'px';

    el.addEventListener('mousedown', e => {
      if (e.target.closest('.text, a, .card-btn, .resize-handle, table')) return;
      e.preventDefault();
      moving = { idx: i, startX: e.clientX, startY: e.clientY, origX: card.x || 0, origY: card.y || 0 };
      el.classList.add('moving');
    });

    const actions = document.createElement('div');
    actions.className = 'card-actions';
    const delBtn = document.createElement('button');
    delBtn.className = 'card-btn'; delBtn.textContent = '×';
    delBtn.onclick = e => { e.stopPropagation(); if (confirm('삭제?')) { cards.splice(i, 1); renderCards(); saveBoard(); } };
    actions.appendChild(delBtn);
    el.appendChild(actions);

    if (card.type === 'text') {
      const text = document.createElement('div');
      text.className = 'text';
      text.contentEditable = true;
      text.innerHTML = card.content || '';
      text.addEventListener('blur', () => { card.content = text.innerHTML; saveBoard(); });
      el.appendChild(text);
    } else if (card.type === 'image') {
      const src = card.src.startsWith('http') || card.src.startsWith('data:') ? card.src : IMG_BASE + card.src;
      const img = document.createElement('img');
      img.src = src;
      img.alt = card.alt || '';
      img.loading = 'lazy';
      img.onerror = () => img.style.display = 'none';
      if (card.link) {
        const a = document.createElement('a'); a.href = card.link; a.target = '_blank';
        a.appendChild(img); el.appendChild(a);
      } else { el.appendChild(img); }
      if (card.caption) {
        const cap = document.createElement('div');
        cap.className = 'caption';
        cap.textContent = card.caption;
        el.appendChild(cap);
      }
    } else if (card.type === 'table') {
      const wrapper = document.createElement('div');
      wrapper.style.overflowX = 'auto';
      wrapper.innerHTML = card.html || '';
      el.appendChild(wrapper);
    }

    const rh = document.createElement('div');
    rh.className = 'resize-handle';
    rh.addEventListener('mousedown', e => {
      e.preventDefault(); e.stopPropagation();
      resizing = { idx: i, startX: e.clientX, startW: card.w || el.offsetWidth };
    });
    el.appendChild(rh);
    board.appendChild(el);
  });

  requestAnimationFrame(() => {
    let maxBottom = 0;
    document.querySelectorAll('.card').forEach(el => {
      const b = (parseFloat(el.style.top) || 0) + el.offsetHeight;
      if (b > maxBottom) maxBottom = b;
    });
    board.style.minHeight = (maxBottom + 100) + 'px';
  });
}

document.addEventListener('mousemove', e => {
  if (moving) {
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`);
    if (!el) return;
    const nx = moving.origX + e.clientX - moving.startX;
    const ny = moving.origY + e.clientY - moving.startY;
    el.style.left = nx + 'px';
    el.style.top = ny + 'px';
  }
  if (resizing) {
    const card = cards[resizing.idx];
    card.w = Math.max(100, resizing.startW + e.clientX - resizing.startX);
    const el = document.querySelector(`.card[data-idx="${resizing.idx}"]`);
    if (el) el.style.width = card.w + 'px';
  }
});

document.addEventListener('mouseup', e => {
  if (moving) {
    const card = cards[moving.idx];
    card.x = Math.max(0, moving.origX + e.clientX - moving.startX);
    card.y = Math.max(0, moving.origY + e.clientY - moving.startY);
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`);
    if (el) { el.classList.remove('moving'); }
    moving = null; saveBoard();
  }
  if (resizing) { resizing = null; saveBoard(); }
});

function addTextCard() {
  cards.push({ type: 'text', content: '', x: 50, y: window.scrollY + 100, w: 300 });
  renderCards();
  setTimeout(() => { const els = document.querySelectorAll('.card .text'); els[els.length - 1]?.focus(); }, 100);
}

function addImageCard() {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = 'image/*';
  input.onchange = e => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = () => { cards.push({ type: 'image', src: reader.result, x: 50, y: window.scrollY + 100, w: 240 }); renderCards(); saveBoard(); };
    reader.readAsDataURL(file);
  };
  input.click();
}

function resetLayout() {
  if (!confirm('자동 재배치합니다. 현재 위치가 변경됩니다.')) return;
  cards.forEach(c => { delete c.x; delete c.y; });
  renderCards(); autoLayout();
}

setInterval(saveBoard, 30000);
loadBoard();
</script>
</body>
</html>
