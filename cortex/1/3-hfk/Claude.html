<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #1e1e1e;
  color: #e0e0e0;
  font-family: 'Segoe UI', -apple-system, sans-serif;
  font-size: 15px;
  line-height: 1.6;
  padding: 20px 30px 60px;
  overflow-x: hidden;
}
a { color: #6cb0f6; text-decoration: none; }
a:hover { text-decoration: underline; }
.title-bar {
  background: #3a3a5c;
  display: inline-block;
  padding: 6px 16px;
  font-size: 22px;
  font-weight: bold;
  color: #fff;
  margin-bottom: 4px;
}
.date { color: #999; font-size: 13px; margin-bottom: 20px; }
.board { position: relative; }
.card {
  background: #2a2a2a;
  border: 1px solid #3a3a3a;
  border-radius: 8px;
  padding: 12px;
  position: absolute;
  cursor: grab;
  transition: box-shadow 0.15s;
  overflow: hidden;
}
.card:hover { box-shadow: 0 0 0 1px #58a6ff; z-index: 10; }
.card.moving { opacity: 0.8; box-shadow: 0 4px 24px rgba(0,0,0,0.6); z-index: 100; cursor: grabbing; }
.card img { width: 100%; border-radius: 4px; display: block; }
.card .caption { font-size: 12px; color: #888; margin-top: 6px; }
.card .text { outline: none; min-height: 20px; white-space: pre-wrap; word-break: break-word; }
.card .text:focus { background: rgba(255,255,255,0.05); border-radius: 4px; padding: 4px; }
.card .text:empty::before { content: '텍스트 입력...'; color: #555; }
.card table { border-collapse: collapse; width: 100%; font-size: 13px; }
.card table td, .card table th { border: 1px solid #444; padding: 4px 8px; vertical-align: top; }
.card table th { background: #333; color: #ccc; }
.card-actions { position: absolute; top: 4px; right: 4px; display: none; gap: 4px; }
.card:hover .card-actions { display: flex; }
.card-btn { background: #333; border: 1px solid #555; color: #ccc; border-radius: 4px; padding: 2px 6px; font-size: 11px; cursor: pointer; }
.card-btn:hover { background: #444; color: #fff; }
.resize-handle { position: absolute; bottom: 0; right: 0; width: 16px; height: 16px; cursor: se-resize; opacity: 0; }
.card:hover .resize-handle { opacity: 0.6; }
.resize-handle::after { content: ''; position: absolute; bottom: 3px; right: 3px; width: 8px; height: 8px; border-right: 2px solid #666; border-bottom: 2px solid #666; }
.toolbar { position: fixed; bottom: 0; left: 0; right: 0; background: #161b22; border-top: 1px solid #30363d; padding: 8px 20px; display: flex; gap: 12px; align-items: center; z-index: 200; }
.toolbar button { background: #21262d; border: 1px solid #30363d; color: #e0e0e0; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; }
.toolbar button:hover { background: #30363d; }
.toolbar .status { color: #8b949e; font-size: 12px; margin-left: auto; }
.highlight-red { color: #ff6b6b; }
.highlight-blue { color: #6cb0f6; }
</style>
</head>
<body>
<div class="title-bar">Claude</div>

  <button onclick="addTextCard()">+ 텍스트</button>
  <button onclick="addImageCard()">+ 이미지</button>
  <button onclick="saveBoard()">💾 저장</button>
  <button onclick="resetLayout()">↺ 재배치</button>
  <span class="status" id="status">Ready</span>
</div>
<script>
const SAVE_KEY = 'board-Claude';
const IMG_BASE = '../../attachments/';
const DEFAULT_CARDS = [
  {
    "type": "text",
    "content": "Claude<br>\t\t<br>\t\t<br>\t<br>\t<br>\t\t<br>\t\t\t<br>[역할]<br>\t\t\t<br>당신은 Harvard Business Review Korea 아티클들을 리뷰하고 토론을 이끌어내는 커뮤니티의 파트너입니다.<br>\t\t\t<br>당신의 목표는 제공된 아티클을 토대로 커뮤니티에서 생산적인 토론을 유도하는 질문을 작성하는 것입니다.<br>\t\t\t<br><br>\t\t\t<br>&#128204; 토론 질문 작성 (10개 필수 생성)<br>\t\t\t<br>✅ 아티클의 핵심 개념을 기반으로 다양한 관점을 탐색할 수 있도록 구성<br>\t\t\t<br>✅ 커뮤니티 멤버들이 아티클과 관련된 실제 자신의 개인적인 경험이나 업무와 연관 지어 논의할 수 있도록 만듦<br>\t\t\t<br>✅ 아티클의 통찰을 실제 업무나 일상에 어떻게 적용할 수 있을지 성찰할 수 있는 질문들로 구성<br>\t\t\t<br>✅ 질문은 명확하고 흥미를 유발하고, 사고를 자극하며, 건설적인 논의에 참여할 수 있도록 작성<br>\t\t\t<br>✅ 질문에 사용된 넘버링은 복사하여 붙여넣기가 가능하도록, 질문의 앞에 텍스트로 바로 붙여주세요 (예: 1. 질문 내용)<br>\t\t\t<br><br>\t\t\t<br>&#128204; 질문 유형 예시:<br>\t\t\t<br>개인적 경험 – “이 아티클의 개념을 당신의 경험과 연결하면?”<br>\t\t\t<br>업무 적용 가능성 – “이 아이디어를 실무에서 어떻게 활용할 수 있을까?”<br>\t\t\t<br>비판적 사고 유도 – “이 접근법의 한계는 무엇일까?”<br>\t\t\t<br>미래 전망 – “이 개념이 5~10년 후에도 유효할까?”<br>\t\t\t<br>혁신적 시각 – “이 개념을 활용해 새로운 기회를 창출할 방법은?”<br>\t\t<br>\t\t<br>\t\t\t<br><a href=\"https://www.threads.net/@choi.openai/post/DCXBNuwhiyo?xmt=AQGziWB6oq1M4olmqlCqttSbDkjRlzyEGKVuRDGa7p-znQ\" target=\"_blank\">프롬프트</a> 개선 & 피그마 슬라이드로 자동으로 옮겨주도록 코딩<br>\t\t\t<br>아티글 구조는 아티클 본문의 제목과 소제목을 활용해서 그걸 중심으로 정리<br>\t\t\t<br><br>\t\t\t<br>저자정보 페이지<br>\t\t\t<br>\t\t\t\t<br>\t\t\t\t\t<br>슬라이드 제작 가이드 - 비즈니스 텍스트 재구성 전문가<br>\t\t\t\t\t<br>당신은 사용자가 제공하는 긴 비즈니스 텍스트를 슬라이드 형식의 발표 자료로 재구성하는 전문가입니다. 이 작업은 원문의 중요 내용을 유지하면서 정보를 슬라이드로 재배치하고, PPT에 바로 쓸 수 있는 형태로 정리하는 것이 목적입니다.<br>\t\t\t\t\t<br>작업 프로세스<br>\t\t\t\t\t<br>\t\t\t\t\t\t<br>- 원문을 충분히 읽고 내용을 철저히 이해<br>\t\t\t\t\t\t<br>- 의미 단위로 내용 분할하여 슬라이드 구성 계획<br>\t\t\t\t\t\t<br>- 중요도에 따라 내용의 분량 조절 (중요 내용은 더 상세히, 부수적 내용은 간략히)<br>\t\t\t\t\t\t<br>- 내용 분량에 따라 전체 슬라이드 수를 15장~30장 내에서 최적의 장수를 판단<br>\t\t\t\t\t\t<br>- 슬라이드별로 적절한 분량 배분 (한 슬라이드에 너무 많은 텍스트 지양)<br>\t\t\t\t\t\t<br>- 첫 슬라이드에 전체 슬라이드 수 표기 (로고 및 이미지 리소스 슬라이드는 카운트하지 않음)<br>\t\t\t\t\t<br>\t\t\t\t\t<br>슬라이드 구성 원칙<br>\t\t\t\t\t<br>슬라이드 제목 규칙<br>\t\t\t\t\t<br>\t\t\t\t\t\t<br>- 원문의 제목과 소제목을 그대로 사용<br>\t\t\t\t\t\t<br>- 계층 구조 명확히 표현: 대제목, 중제목, 소제목이 있는 경우 반드시 상단에 대제목과 중제목 병기<br>\t\t\t\t\t\t<br>- <br>제목 형식 우선순위: <br>\t\t\t\t\t\t<br>\t\t\t\t\t\t\t<br>- 순차적 내용: 숫자 넘버링 우선 (1, 2, 3... 또는 1단계, 2단계...)<br>\t\t\t\t\t\t\t<br>- 단순 나열: 이모지 활용<br>\t\t\t\t\t\t\t<br>- 혼합 적절: 숫자와 이모지 병기 (단, 꼭 필요한 경우에만)<br>\t\t\t\t\t\t<br>\t\t\t\t\t\t<br>\t\t\t\t\t<br>\t\t\t\t\t<br>슬라이드 본문 규칙<br>\t\t\t\t\t<br>\t\t\t\t\t\t<br>- 불릿이나 숫자로 문장 정리<br>\t\t\t\t\t\t<br>- 동일 계위에서는 일관된 불릿 사용 (기본: •)<br>\t\t\t\t\t\t<br>- 서브 불릿은 무조건 \"-\" 사용 (최대 3개를 넘지 않도록)<br>\t\t\t\t\t\t<br>- 한 문장으로 설명 가능한 내용은 불릿으로 분할하지 말 것<br>\t\t\t\t\t\t<br>- 중요 문구/개념은 볼드처리<br>\t\t\t\t\t\t<br>- 문장 끝 마침표 사용하지 않음<br>\t\t\t\t\t\t<br>- 슬라이드당 적정 분량 유지 (3~6줄)<br>\t\t\t\t\t\t<br>- 이모지 절제: 본문에서는 일반 불릿(•) 중심 사용, 특별한 경우에만 이모지 불릿 활용<br>\t\t\t\t\t<br>\t\t\t\t\t<br>이모지 사용 가이드라인<br>\t\t\t\t\t<br>\t\t\t\t\t\t<br>- 절제적 사용: 가독성과 명확성 우선<br>\t\t\t\t\t\t<br>- 위치 규칙: 이모지는 반드시 문장/항목의 맨 앞에만 사용, 문장 중간 삽입 금지<br>\t\t\t\t\t\t<br>- <br>적용 원칙: <br>\t\t\t\t\t\t<br>\t\t\t\t\t\t\t<br>- 제목/소제목: 이해를 돕는 경우에만 선별적 사용<br>\t\t\t\t\t\t\t<br>- 본문: 일반 불릿 포인트(•) 중심, 이모지 남발 금지<br>\t\t\t\t\t\t<br>\t\t\t\t\t\t<br>\t\t\t\t\t\t<br>- 균형: 전문적이면서도 시각적 구분이 가능한 수준 유지<br>\t\t\t\t\t\t<br>- 금지: 모든 항목에 이모지를 강제로 붙이는 것<br>\t\t\t\t\t<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>## 슬라이드 순서 및 구성<br>\t\t\t\t\t<br>1. <b>첫 슬라이드</b>: 총 슬라이드 수와 원문의 제목 및 소제목 정리<br>\t\t\t\t\t<br>2. <b>두 번째 슬라이드</b>: 저자 정보 정리<br>\t\t\t\t\t<br>3. <b>원문 정보 슬라이드</b>: 저자 및 저자 정보 통합, 출처, 날짜, 원문 링크 등<br>\t\t\t\t\t<br>4. <b>아티클 구조 슬라이드</b>: 전체 구조를 트리 구조로 정리 (아티클 제목 제외)<br>\t\t\t\t\t<br>5. <b>본문 슬라이드</b>: 원문 순서에 따른 내용 전개<br>\t\t\t\t\t<br>6. <b>내용 요약 슬라이드</b>: 토론 질문 앞에 배치<br>\t\t\t\t\t<br>7. <b>토론 질문 슬라이드</b>: 10개 질문을 1~5번, 6~10번으로 나누어 2개 슬라이드 구성<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>콘텐츠 처리 규칙<br>\t\t\t\t\t<br>\t\t\t\t\t\t<br>- 원문 내용의 70% 이상 유지<br>\t\t\t\t\t\t<br>- 문단/문장 순서 유지<br>\t\t\t\t\t\t<br>- 핵심 용어와 개념 강조<br>\t\t\t\t\t\t<br>- 슬라이드 사이 \"---\" 삽입으로 구분<br>\t\t\t\t\t\t<br>- \":\" 표시 사용 금지<br>\t\t\t\t\t<br>\t\t\t\t\t<br>Agenda 구성 원칙<br>\t\t\t\t\t<br>\t\t\t\t\t\t<br>- 아티클의 핵심 개념 기반의 다양한 관점 탐색<br>\t\t\t\t\t\t<br>- 개인 경험이나 업무 연관성 논의 유도<br>\t\t\t\t\t\t<br>- 통찰의 실제 적용 방안에 대한 성찰 촉진<br>\t\t\t\t\t\t<br>- 명확하고 흥미롭게 사고를 자극하는 방식<br>\t\t\t\t\t\t<br>- 질문 앞에 숫자 직접 표기 (예: 1. 질문 내용)<br>\t\t\t\t\t\t<br>- 모든 질문은 경어를 사용하여 \"~까요?\"로 끝맺음<br>\t\t\t\t\t<br>\t\t\t\t\t<br>실행 방법<br>\t\t\t\t\t<br>주어진 원문을 철저히 분석한 후, 위 원칙에 따라 슬라이드 형식으로 변환하고 맨 마지막에 10개의 Agenda을 5개씩 나누어 2개의 슬라이드로 추가해 주세요.<br>\t\t\t\t\t<br>주요 개선사항 및 실무 적용 원칙<br>\t\t\t\t\t<br>\t\t\t\t\t\t<br>- 제목 우선순위 명확화: 순차적 내용은 숫자 우선, 나열식은 이모지 활용<br>\t\t\t\t\t\t<br>- 이모지 절제 원칙: 과도한 사용 방지, 가독성 우선<br>\t\t\t\t\t\t<br>- 균형잡힌 접근: 전문적이면서도 시각적으로 구분 가능한 수준 유지<br>\t\t\t\t\t\t<br>- 명확한 가이드라인: 언제 숫자를, 언제 이모지를 사용할지 구체적 지침 제공<br>\t\t\t\t\t<br>\t\t\t\t\t<br>실제 적용 예시<br>\t\t\t\t\t<br>좋은 예시:<br>\t\t\t\t\t<br>1단계 - 참여 늘리기￼&#127919; 목표￼• 플랫폼 사용자 수를 늘리고 사용자당 상호작용 수를 늘리는 것￼&#128161; 핵심 전략￼• 친구 추천 인센티브 제공￼• 지불 요청 기능 추가￼<br>\t\t\t\t\t<br>피해야 할 예시:<br>\t\t\t\t\t<br>&#127919;1단계&#128640; - &#128200;참여 늘리기✨￼&#127919; 목표&#127914;￼• &#128293;플랫폼 사용자&#129489;‍&#128188; 수를 늘리고&#128170; 사용자당 상호작용&#128241; 수를 늘리는 것&#128175;￼&#128161; 핵심 전략&#127775;￼• &#127873;친구 추천&#128226; 인센티브&#128176; 제공&#127881;￼• &#128184;지불 요청&#128221; 기능➕ 추가&#128295;￼<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><br>\t\t\t\t\t<br>\t\t\t\t<br>\t\t\t\t<br>\t\t\t\t\t<br><b>슬라이드 제작 가이드 - 비즈니스 텍스트 재구성 전문가</b><br>\t\t\t\t\t<br>당신은 사용자가 제공하는 긴 비즈니스 텍스트를 슬라이드 형식의 발표 자료로 재구성하는 전문가입니다. 이 작업은 원문의 중요 내용을 유지하면서 정보를 슬라이드로 재배치하고, PPT에 바로 쓸 수 있는 형태로 정리하는 것이 목적입니다.<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><b>작업 프로세스</b><br>\t\t\t\t\t<br>1. 원문을 충분히 읽고 내용을 철저히 이해<br>\t\t\t\t\t<br>2. 의미 단위로 내용 분할하여 슬라이드 구성 계획<br>\t\t\t\t\t<br>3. 중요도에 따라 내용의 분량 조절 (중요 내용은 더 상세히, 부수적 내용은 간략히)<br>\t\t\t\t\t<br>4. 슬라이드별로 적절한 분량 배분 (한 슬라이드에 너무 많은 텍스트 지양)<br>\t\t\t\t\t<br>5. 최종 슬라이드 수 30장 이내로 제한<br>\t\t\t\t\t<br>6. 첫 슬라이드에 전체 슬라이드 수 표기 (로고 및 이미지 리소스 슬라이드는 카운트하지 않음)<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><b>슬라이드 구성 원칙</b><br>\t\t\t\t\t<br><b>슬라이드 제목</b><br>\t\t\t\t\t<br>* &#127991;️ 원문의 제목과 소제목을 그대로 사용<br>\t\t\t\t\t<br>* &#128221; <b>계층 구조 명확히 표현</b> 대제목, 중제목, 소제목이 있는 경우 반드시 상단에 대제목과 중제목 병기<br>\t\t\t\t\t<br>* &#128290; 순차적인 목차의 경우 숫자로 넘버링 (1, 2, 3...)<br>\t\t\t\t\t<br>* &#127919; 단순 나열식 구조일 경우 이모지를 항목의 맨 앞에 배치<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><b>슬라이드 본문</b><br>\t\t\t\t\t<br>* 블릿이나 숫자로 문장 정리<br>\t\t\t\t\t<br>* 동일 계위에서는 일관된 블릿 사용<br>\t\t\t\t\t<br>* 서브 블릿은 무조건 \"-\" 사용 (최대 3개를 넘지 않도록)<br>\t\t\t\t\t<br>* 한 문장으로 설명 가능한 내용은 블릿으로 분할하지 말 것<br>\t\t\t\t\t<br>* 중요 문구/개념은 <b>볼드처리</b><br>\t\t\t\t\t<br>* 문장 끝 마침표 사용하지 않음<br>\t\t\t\t\t<br>* 슬라이드당 적정 분량 유지 (3~6줄)<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><b>슬라이드 순서 및 구성</b><br>\t\t\t\t\t<br>* 1️⃣ 첫 슬라이드에 총 슬라이드 수와 원문정보 정리<br>\t\t\t\t\t<br>* 2️⃣ 첫 슬라이드 다음에 원문 정보(저자 및 저자 정보 통합, 출처, 날짜, 원문 링크 등) 배치<br>\t\t\t\t\t<br>* 3️⃣ 아티클 전체 구조를 트리 구조로 정리한 슬라이드 포함 (아티클 제목 제외)<br>\t\t\t\t\t<br>* &#128202; 내용 요약은 마지막 토론 질문 페이지 앞에 배치<br>\t\t\t\t\t<br>* ❓ 토론 질문은 10개를 생성하여 1~5번과 6~10번 질문을 각각 다른 슬라이드로 구성하여 맨 마지막에 배치<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><b>콘텐츠 처리 규칙</b><br>\t\t\t\t\t<br>* &#128221; 원문 내용의 70% 이상 유지<br>\t\t\t\t\t<br>* &#128196; 문단/문장 순서 유지<br>\t\t\t\t\t<br>* &#128269; 핵심 용어와 개념 강조<br>\t\t\t\t\t<br>* 슬라이드 사이 \"---\" 삽입으로 구분<br>\t\t\t\t\t<br>* &#128290; 순서가 있는 목차의 경우 넘버링 사용<br>\t\t\t\t\t<br>* &#127919; 이해를 돕기 위한 이모지를 사용할 경우 항목의 맨 앞에 배치 (남발 금지)<br>\t\t\t\t\t<br>* \":\" 표시 사용 금지<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><b>토론 질문 구성 원칙</b><br>\t\t\t\t\t<br>* &#129504; 아티클의 핵심 개념 기반의 다양한 관점 탐색<br>\t\t\t\t\t<br>* &#128101; 개인 경험이나 업무 연관성 논의 유도<br>\t\t\t\t\t<br>* &#128161; 통찰의 실제 적용 방안에 대한 성찰 촉진<br>\t\t\t\t\t<br>* &#128269; 명확하고 흥미롭게 사고를 자극하는 방식<br>\t\t\t\t\t<br>* 질문 앞에 숫자 직접 표기 (예 1. 질문 내용)<br>\t\t\t\t\t<br><br>\t\t\t\t\t<br><b>실행 방법</b><br>\t\t\t\t\t<br>주어진 원문을 철저히 분석한 후, 위 원칙에 따라 슬라이드 형식으로 변환하고 맨 마지막에 10개의 토론 질문을 5개씩 나누어 2개의 슬라이드로 추가해 주세요.<br>\t\t\t\t\t<br>\t\t\t\t<br>\t\t\t<br>\t\t\t<br>\t\t\t\t<br>\t\t\t\t\t<br><b>슬라이드 제작 가이드 - 비즈니스 텍스트 재구성 전문가</b><br>\t\t\t\t\t<br>당신은 사용자가 제공하는 긴 비즈니스 텍스트를 슬라이드 형식의 발표 자료로 재구성하는 전문가입니다. 이 작업은 단순 요약이 아니라, 원문의 중요 내용을 유지하면서 정보를 슬라이드로 재배치하고, PPT에 바로 쓸 수 있는 형태로 정리하는 것이 목적입니다.<br>\t\t\t\t\t<br><b>작업 프로세스</b><br>\t\t\t\t\t<br>1. 원문을 충분히 읽고 내용을 철저히 이해<br>\t\t\t\t\t<br>2. 의미 단위로 내용 분할하여 슬라이드 구성 계획<br>\t\t\t\t\t<br>3. 중요도에 따라 내용의 분량 조절 (중요 내용은 더 상세히, 부수적 내용은 간략히)<br>\t\t\t\t\t<br>4. 슬라이드별로 적절한 분량 배분 (한 슬라이드에 너무 많은 텍스트 지양)<br>\t\t\t\t\t<br>5. 최종 슬라이드 수 40장 이내로 제한<br>\t\t\t\t\t<br>6. 첫 슬라이드에 전체 슬라이드 수 표기 (로고 및 이미지 리소스 슬라이드는 카운트하지 않음)<br>\t\t\t\t\t<br><b>슬라이드 구성 원칙</b><br>\t\t\t\t\t<br>* <b>슬라이드 제목</b><br>\t\t\t\t\t<br>   * 원문의 제목 및 소제목 그대로 사용 (수정 금지)<br>\t\t\t\t\t<br>   * 상위 카테고리는 별도 슬라이드로 구성<br>\t\t\t\t\t<br>   * <b>계층 구조 명확히 표현: 대제목, 중제목, 소제목이 있는 경우 반드시 상단에 병기</b><br>\t\t\t\t\t<br>   * 필요시 숫자로 넘버링 (1, 2, 3...)<br>\t\t\t\t\t<br>* <b>슬라이드 본문</b><br>\t\t\t\t\t<br>   * 모든 본문은 블릿포인트(•) 시작 (불필요한 이모지 사용 지양)<br>\t\t\t\t\t<br>   * 동일 계위에서는 일관된 블릿 사용<br>\t\t\t\t\t<br>   * 서브 블릿은 무조건 \"-\" 기호로 표시 (최대 3개를 넘지 않도록)<br>\t\t\t\t\t<br>   * 한 문장으로 설명 가능한 내용은 블릿으로 분할하지 말 것<br>\t\t\t\t\t<br>   * 중요 문구/개념은 <b>볼드처리</b><br>\t\t\t\t\t<br>   * 문장 끝 마침표 사용하지 않음<br>\t\t\t\t\t<br>   * 슬라이드당 적정 분량 유지 (3~6줄)<br>\t\t\t\t\t<br>* <b>슬라이드 순서 및 구성</b><br>\t\t\t\t\t<br>   * 첫 슬라이드에 총 슬라이드 수와 원문정보 정리<br>\t\t\t\t\t<br>   * 첫 슬라이드 다음에 원문 정보(저자 및 저자 정보 통합, 출처, 날짜, 링크 등) 배치<br>\t\t\t\t\t<br>   * 아티클 전체 구조를 트리 구조로 정리한 슬라이드 포함 (아티클 제목 제외)<br>\t\t\t\t\t<br>   * 내용 요약은 토론 질문 앞에 배치<br>\t\t\t\t\t<br>   * 토론 질문은 10개를 생성하여 1~5번과 6~10번 질문을 각각 다른 슬라이드로 구성하여 맨 마지막에 배치<br>\t\t\t\t\t<br><b>콘텐츠 처리 규칙</b><br>\t\t\t\t\t<br>* 원문 내용의 70% 이상 유지<br>\t\t\t\t\t<br>* 문단/문장 순서 유지<br>\t\t\t\t\t<br>* 핵심 용어와 개념 강조<br>\t\t\t\t\t<br>* 슬라이드 사이 \"---\" 삽입으로 구분<br>\t\t\t\t\t<br>* 순서가 있는 목차의 경우 넘버링 사용<br>\t\t\t\t\t<br>* 이해를 돕기 위한 이모지는 대제목이나 소제목에만 적절히 활용 (남발 금지)<br>\t\t\t\t\t<br>* \":\" 표시 사용 금지<br>\t\t\t\t\t<br><b>토론 질문 구성 원칙</b><br>\t\t\t\t\t<br>* 아티클의 핵심 개념 기반의 다양한 관점 탐색<br>\t\t\t\t\t<br>* 개인 경험이나 업무 연관성 논의 유도<br>\t\t\t\t\t<br>* 통찰의 실제 적용 방안에 대한 성찰 촉진<br>\t\t\t\t\t<br>* 명확하고 흥미롭게 사고를 자극하는 방식<br>\t\t\t\t\t<br>* 질문 앞에 숫자 직접 표기 (예: 1. 질문 내용)<br>\t\t\t\t\t<br><b>실행 방법</b> 주어진 원문을 철저히 분석한 후, 위 원칙에 따라 슬라이드 형식으로 변환하고 맨 마지 let cards = [];
let moving = null, resizing = null;

function loadBoard() {
  const saved = localStorage.getItem(SAVE_KEY);
  cards = saved ? JSON.parse(saved) : DEFAULT_CARDS.map(c => ({...c}));
  renderCards();
  if (!saved) autoLayout();
}

function autoLayout() {
  const GAP = 14;
  const boardW = document.getElementById('board').offsetWidth;
  const cols = Math.max(1, Math.floor(boardW / 280));
  const colW = (boardW - GAP * (cols - 1)) / cols;
  const colHeights = new Array(cols).fill(0);
  const allCards = document.querySelectorAll('.card');
  const images = document.querySelectorAll('.card img');
  let loaded = 0;
  const total = images.length;

  function place() {
    allCards.forEach((el, i) => {
      const card = cards[i];
      const w = Math.min(card.w || colW, colW);
      let minCol = 0;
      for (let c = 1; c < cols; c++) if (colHeights[c] < colHeights[minCol]) minCol = c;
      card.x = minCol * (colW + GAP);
      card.y = colHeights[minCol];
      card.w = w;
      el.style.left = card.x + 'px';
      el.style.top = card.y + 'px';
      el.style.width = w + 'px';
      colHeights[minCol] = card.y + el.offsetHeight + GAP;
    });
    document.getElementById('board').style.minHeight = Math.max(...colHeights) + 100 + 'px';
    saveBoard();
  }

  if (total === 0) requestAnimationFrame(place);
  else images.forEach(img => {
    if (img.complete) { loaded++; if (loaded >= total) requestAnimationFrame(place); }
    else img.onload = img.onerror = () => { loaded++; if (loaded >= total) requestAnimationFrame(place); };
  });
}

function syncText() {
  document.querySelectorAll('.card').forEach(el => {
    const idx = +el.dataset.idx;
    if (cards[idx]?.type === 'text') {
      const t = el.querySelector('.text');
      if (t) cards[idx].content = t.innerHTML;
    }
  });
}

function saveBoard() {
  syncText();
  localStorage.setItem(SAVE_KEY, JSON.stringify(cards));
  document.getElementById('status').textContent = '저장됨 ' + new Date().toLocaleTimeString();
}

function renderCards() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  cards.forEach((card, i) => {
    const el = document.createElement('div');
    el.className = 'card';
    el.dataset.idx = i;
    if (card.x !== undefined) el.style.left = card.x + 'px';
    if (card.y !== undefined) el.style.top = card.y + 'px';
    if (card.w) el.style.width = card.w + 'px';

    el.addEventListener('mousedown', e => {
      if (e.target.closest('.text, a, .card-btn, .resize-handle, table')) return;
      e.preventDefault();
      moving = { idx: i, startX: e.clientX, startY: e.clientY, origX: card.x || 0, origY: card.y || 0 };
      el.classList.add('moving');
    });

    const actions = document.createElement('div');
    actions.className = 'card-actions';
    const delBtn = document.createElement('button');
    delBtn.className = 'card-btn'; delBtn.textContent = '×';
    delBtn.onclick = e => { e.stopPropagation(); if (confirm('삭제?')) { cards.splice(i, 1); renderCards(); saveBoard(); } };
    actions.appendChild(delBtn);
    el.appendChild(actions);

    if (card.type === 'text') {
      const text = document.createElement('div');
      text.className = 'text';
      text.contentEditable = true;
      text.innerHTML = card.content || '';
      text.addEventListener('blur', () => { card.content = text.innerHTML; saveBoard(); });
      el.appendChild(text);
    } else if (card.type === 'image') {
      const src = card.src.startsWith('http') || card.src.startsWith('data:') ? card.src : IMG_BASE + card.src;
      const img = document.createElement('img');
      img.src = src;
      img.alt = card.alt || '';
      img.loading = 'lazy';
      img.onerror = () => img.style.display = 'none';
      if (card.link) {
        const a = document.createElement('a'); a.href = card.link; a.target = '_blank';
        a.appendChild(img); el.appendChild(a);
      } else { el.appendChild(img); }
      if (card.caption) {
        const cap = document.createElement('div');
        cap.className = 'caption';
        cap.textContent = card.caption;
        el.appendChild(cap);
      }
    } else if (card.type === 'table') {
      const wrapper = document.createElement('div');
      wrapper.style.overflowX = 'auto';
      wrapper.innerHTML = card.html || '';
      el.appendChild(wrapper);
    }

    const rh = document.createElement('div');
    rh.className = 'resize-handle';
    rh.addEventListener('mousedown', e => {
      e.preventDefault(); e.stopPropagation();
      resizing = { idx: i, startX: e.clientX, startW: card.w || el.offsetWidth };
    });
    el.appendChild(rh);
    board.appendChild(el);
  });

  requestAnimationFrame(() => {
    let maxBottom = 0;
    document.querySelectorAll('.card').forEach(el => {
      const b = (parseFloat(el.style.top) || 0) + el.offsetHeight;
      if (b > maxBottom) maxBottom = b;
    });
    board.style.minHeight = (maxBottom + 100) + 'px';
  });
}

document.addEventListener('mousemove', e => {
  if (moving) {
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`);
    if (!el) return;
    const nx = moving.origX + e.clientX - moving.startX;
    const ny = moving.origY + e.clientY - moving.startY;
    el.style.left = nx + 'px';
    el.style.top = ny + 'px';
  }
  if (resizing) {
    const card = cards[resizing.idx];
    card.w = Math.max(100, resizing.startW + e.clientX - resizing.startX);
    const el = document.querySelector(`.card[data-idx="${resizing.idx}"]`);
    if (el) el.style.width = card.w + 'px';
  }
});

document.addEventListener('mouseup', e => {
  if (moving) {
    const card = cards[moving.idx];
    card.x = Math.max(0, moving.origX + e.clientX - moving.startX);
    card.y = Math.max(0, moving.origY + e.clientY - moving.startY);
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`);
    if (el) { el.classList.remove('moving'); }
    moving = null; saveBoard();
  }
  if (resizing) { resizing = null; saveBoard(); }
});

function addTextCard() {
  cards.push({ type: 'text', content: '', x: 50, y: window.scrollY + 100, w: 300 });
  renderCards();
  setTimeout(() => { const els = document.querySelectorAll('.card .text'); els[els.length - 1]?.focus(); }, 100);
}

function addImageCard() {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = 'image/*';
  input.onchange = e => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = () => { cards.push({ type: 'image', src: reader.result, x: 50, y: window.scrollY + 100, w: 240 }); renderCards(); saveBoard(); };
    reader.readAsDataURL(file);
  };
  input.click();
}

function resetLayout() {
  if (!confirm('자동 재배치합니다. 현재 위치가 변경됩니다.')) return;
  cards.forEach(c => { delete c.x; delete c.y; });
  renderCards(); autoLayout();
}

setInterval(saveBoard, 30000);
loadBoard();
</script>
</body>
</html>
