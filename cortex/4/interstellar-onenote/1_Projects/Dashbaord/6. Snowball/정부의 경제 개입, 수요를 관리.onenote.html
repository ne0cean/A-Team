ily:Malgun Gothic">매수하여</span><span style="font-family:Malgun Gothic"> </span><span lang="ko-KR" style="font-family:Malgun Gothic">정부와</span><span style="font-family:Malgun Gothic"> </span><span lang="ko-KR" style="font-family:Malgun Gothic">민간기업에</span><span style="font-family:Malgun Gothic"> </span><span lang="ko-KR" style="font-family:Malgun Gothic">자금을</span><span style="font-family:Malgun Gothic"> </span><span lang="ko-KR" style="font-family:Malgun Gothic">공급</span><span style="font-family:Malgun Gothic">.</span></p>
