			<p lang="ko-KR" style="margin-top:0pt;margin-bottom:0pt"><span style="font-family:Malgun Gothic">회의가</span><span lang="en-US"> </span><span style="font-family:Malgun Gothic">많다</span><span lang="en-US">.</span></p>

			<p lang="ko-KR" style="margin-top:0pt;margin-bottom:0pt"><span style="font-family:Malgun Gothic">관성에</span><span lang="en-US" style="font-family:Malgun Gothic"> </span><span style="font-family:Malgun Gothic">의해</span><span lang="en-US" style="font-family:Malgun Gothic"> </span><span style="font-family:Malgun Gothic">작동하는</span><span lang="en-US" style="font-family:Malgun Gothic"> </span><span style="font-family:Malgun Gothic">영구동력</span><span lang="en-US" style="font-family:Malgun Gothic">.</span><span style="font-family:Malgun Gothic">처럼</span><span lang="en-US" style="font-family:Malgun Gothic"> </span><span style="font-family:Malgun Gothic">보이는</span><span lang="en-US" style="font-family:Malgun Gothic"> </span><span style="font-family:Malgun Gothic">것</span><span lang="en-US" style="font-family:Malgun Gothic">.</span></p>

			<p lang="en-US" style="margin-top:0pt;margin-bottom:0pt"><span style="font-family:Malgun Gothic">-</span></p>

			<p lang="en-US" style="font-family:Pretendard Light;font-size:10pt;margin-top:0pt;margin-bottom:0pt"><span style="color:black">이</span><span style="color:black"> </span><span style="color:black">회</span><span style="font-family:Malgun Gothic;color:black">사에서의</span><span style="font-family:Calibri;color:black"> </span><span style="font-family:Malgun Gothic;color:black">나의</span><span style="font-family:Calibri;color:black"> </span><span style="font-family:Malgun Gothic;color:black">서사는</span><span style="font-family:Calibri;color:black"> </span><span style="font-family:Malgun Gothic;color:black">끝났다</span><span style="font-family:Calibri;color:black">. </span><span style="font-family:Malgun Gothic;color:black">응</span><span style="font-family:Calibri;color:black">. </span><span style="font-family:Malgun Gothic;color:black">끝났어</span><span style="font-family:Calibri;color:black">, </span><span style="font-family:Malgun Gothic;color:black">나이가</span><span style="font-family:Calibri;color:black"> </span><span style="font-family:Malgun Gothic;color:black">많았다면</span><span style="font-family:Calibri;color:black"> </span><span style="font-family:Malgun Gothic;color:black">이번에</span><span style="font-family:Calibri;color:black"> </span><span style="font-family:Malgun Gothic;color:black">넥스트</span><span style="font-family:Calibri;color:black"> </span><span style="font-family:Malgun Gothic;color:black">커리어</span><span style="font-family:Calibri;color:black"> </span><span style="font-family:Malgun Gothic;color:black">대상이었을거야</span><span style="font-family:Calibri;color:black">.</span></p>
