			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt"><span style="font-family:Segoe UI Symbol">■</span><span lang="en-US"> </span>점진적인<span lang="en-US"> </span>성장인<span lang="en-US"> </span>가능한<span lang="en-US"> </span>모델</p>
			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt">Chariot 서비스 구조는 특정 노선으로 주행하는 셔틀을 통해 이용객을 어느 정도 확보하면 추가로 노선을 확장하고, 노선 확장 시 크라우드 펀딩 개념으로 이용자들에게 Chariot Pass를 판매해 노선 확장에 필요한 자금을 확보하는 형태임. 2014년 4월 4대의 밴을 대여해 서비스를 시작한 후 2016년 5월 기준 총 100대의 밴으로 서비스를 제공 중</p>
		</div>
