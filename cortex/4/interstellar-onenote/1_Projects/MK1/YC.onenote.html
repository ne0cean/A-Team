	<body data-absolute-enabled="true" style="font-family:Malgun Gothic;font-size:11pt">
		<div style="position:absolute;left:48px;top:139px;width:720px">
			<p style="font-family:Tahoma;margin-top:0pt;margin-bottom:0pt"><span style="font-family:Malgun Gothic">YC의 모토인 “Make Something People Want”</span></p>
			<br />
			<p style="font-family:Tahoma;margin-top:0pt;margin-bottom:0pt"><span style="font-family:Malgun Gothic">담당 파트너는 수많은 YC 업체를 봐왔고, 창업자들은 항상 “더 못한” 핑계를 댄다고 했다. 더 많은 고객과 만나지 못한 이유, 더 빨리 출시하지 못한 이유, 더 많은 딜을 마무리 짓지 못한 이유 등. 우리 창업자들은 그러지 않기를 바란다면서.</span></p>
			<br />
			<p style="font-family:Tahoma;margin-top:0pt;margin-bottom:0pt"><span style="font-family:Malgun Gothic">&#160;</span></p>
			<p style="font-family:Tahoma;margin-top:0pt;margin-bottom:0pt"><span style="font-family:Malgun Gothic">YC 이후 성공하는 회사는 한가지 공통점</span><span lang="en-US">, </span><span style="font-family:Malgun Gothic">YC 때&#160;</span><span style="font-family:Pretendard;font-size:13.5pt;color:#d6d4d2;background-color:#171818;font-weight:bold">극단적으로 높았던 팀의 업무 생산성을 계속 유지</span></p>
			<br />
			<cite style="font-family:Calibri;font-size:9pt;color:#595959;margin-top:0pt;margin-bottom:0pt"><span style="font-family:Malgun Gothic">출처</span>: &lt;<a href="https://eopla.net/magazines/4656#">https://eopla.net/magazines/4656#</a>&gt; </cite>
