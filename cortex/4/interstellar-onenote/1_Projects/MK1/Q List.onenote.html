		<div style="position:absolute;left:48px;top:139px;width:720px">
			<p lang="en-US" data-tag="to-do" style="font-family:Tahoma;margin-top:0pt;margin-bottom:0pt"><span style="font-family:Malgun Gothic">질문리스트</span></p>
			<p lang="en-US" style="font-family:Tahoma;margin-top:0pt;margin-bottom:0pt"><span style="font-family:Malgun Gothic">몇명이 미니멈, 맥시멈이어야 하는가?</span></p>
			<p lang="en-US" style="font-family:Tahoma;margin-top:0pt;margin-bottom:0pt"><span style="font-family:Malgun Gothic">어느 국가 어느 지역, 어느 씬을 원자 네트워크로 삼을 것인가?</span></p>
			<p lang="en-US" style="font-family:Tahoma;margin-top:0pt;margin-bottom:0pt"><span style="font-family:Malgun Gothic">GPS 안쓰고 기지국 정보만으로?</span></p>
			<p lang="en-US" style="font-family:Tahoma;margin-top:0pt;margin-bottom:0pt"><span style="font-family:Malgun Gothic">채팅방 개설방식은?</span></p>
			<p lang="en-US" style="font-family:Tahoma;margin-top:0pt;margin-bottom:0pt"><span style="font-family:Malgun Gothic">한 채팅방의 지역범위는? 반경? 법정동? 본인이 지정?</span></p>
			<p lang="en-US" style="font-family:Tahoma;margin-top:0pt;margin-bottom:0pt"><span style="font-family:Malgun Gothic">다른 지역 들여다보는 기능, 점퍼.</span></p>
			<p style="font-family:Tahoma;margin-top:0pt;margin-bottom:0pt"><span style="font-family:Malgun Gothic">앱</span><span lang="en-US" style="font-family:Malgun Gothic"> </span><span style="font-family:Malgun Gothic">켜자마자</span><span lang="en-US" style="font-family:Malgun Gothic"> </span><span style="font-family:Malgun Gothic">입장되는</span><span lang="en-US" style="font-family:Malgun Gothic"> </span><span style="font-family:Malgun Gothic">채팅방</span><span lang="en-US" style="font-family:Malgun Gothic"> -&gt; </span><span style="font-family:Malgun Gothic">경계를</span><span lang="en-US" style="font-family:Malgun Gothic"> </span><span style="font-family:Malgun Gothic">어떻게</span><span lang="en-US" style="font-family:Malgun Gothic"> </span><span style="font-family:Malgun Gothic">설정하고</span><span lang="en-US" style="font-family:Malgun Gothic">, </span><span style="font-family:Malgun Gothic">입출입은</span><span lang="en-US" style="font-family:Malgun Gothic"> </span><span style="font-family:Malgun Gothic">어떻게</span><span lang="en-US" style="font-family:Malgun Gothic">?</span></p>
