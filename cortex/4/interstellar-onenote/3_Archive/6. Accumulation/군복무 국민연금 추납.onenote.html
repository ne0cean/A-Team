			<img alt="유 의 사 항 
- 추 납 신 청 급 증 으 로 인 해 접 수 처 리 가 지 연 되 고 있 습 니 다 . 상 황 이 안 정 될 때 까 지 한 시 적 으 로 전 자 문 서 지 갑 을 통 한 서 류 제 출 은 
불 가 합 니 다 . 양 해 부 탁 드 립 니 다 . 
- 혼 인 관 계 증 명 서 ( 상 세 , 주 민 등 록 번 호 모 두 표 시 ) 는 추 납 신 청 필 수 서 류 로 , 증 빙 서 류 미 제 출 ( 미 첨 부 ) 시 신 청 이 불 가 합 니 다 . 반 드 시 증 빙 서 류 
파 일 을 구 비 한 후 신 청 절 차 를 진 행 하 시 기 바 랍 니 다 . 
※ 2008 년 전 이 혼 , 사 별 이 력 이 있 는 경 우 제 적 등 본 추 가 
※ 혼 인 관 계 증 명 서 ( 상 세 , 주 민 등 록 번 호 모 두 표 시 ) 는 전 자 가 족 관 계 등 록 시 스 템 (https://efamily.scourt.go.kr △△ ) 에 서 무 료 로 발 급 
가 능 합 니 다 . 
- 군 복 무 추 납 을 신 청 할 경 우 병 적 증 명 서 또 는 주 민 등 록 초 본 ( 병 역 사 항 포 함 ), 18 세 미 만 사 업 장 가 입 자 로 적 용 제 외 된 근 로 기 간 (2015. 7. 
29. 이 후 ) 을 추 납 신 청 할 경 우 건 강 보 험 자 격 득 실 확 인 서 등 서 류 를 추 가 제 출 하 여 야 합 니 다 . 
※ 군 복 무 기 간 이 타 공 적 연 금 재 직 ( 복 무 ) 기 간 에 해 당 되 는 경 우 에 는 추 납 신 청 이 불 가 합 니 다 .( 장 교 , 부 사 관 등 으 로 복 무 한 기 간 은 군 인 연 금 
가 입 기 간 이 므 로 신 청 불 가 ) 
신 청 하 신 사 항 은 관 할 지 사 담 당 자 가 유 선 으 로 재 확 인 한 후 확 정 됩 니 다 . 신 청 서 제 출 시 신 청 접 수 만 된 것 으 로 , 담 당 자 의 확 인 을 거 쳐 야 만 
완 료 처 리 됩 니 다 . 
- 표 출 되 는 신 청 대 상 기 간 은 확 정 된 것 은 아 니 며 , 적 용 제 외 기 간 결 정 등 에 따 라 신 청 대 상 기 간 이 달 라 질 수 있 습 니 다 . 
신 청 이 력 이 있 는 경 우 , 유 선 접 수 가 능 합 니 다 . 관 할 지 사 로 문 의 하 시 기 바 랍 니 다 . 
- 최 대 119 개 월 까 지 신 청 가 능 합 니 다 .
