			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt"><span style="font-family:맑은 고딕;color:black">&#39;음악저작물 사용료 징수규정 제26조의 2 결합서비스의 사용료&#39; 기준에 따르면, &#39;제23조의 2 제5항 이외에 서비스를 결합하는 경우 사용료는 (저작권)협회 규정에서 정한 각각의 사용료를 합산한 금액을 기준으로 결합서비스의 성격을 감안하여 협회와 이용자가 협의하여 정한다&#39;</span></p>
			<br />
			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt"><span style="font-family:맑은 고딕;color:black">제23조의 2 제5항에서 정한 결합서비스는 30곡 이상을 다량으로 묶어 제공하는 다운로드 서비스와 스트리밍 서비스를 통합하여 제공하는 경우를 </span></p>
