	<body data-absolute-enabled="true" style="font-family:Malgun Gothic;font-size:11pt">
		<div style="position:absolute;left:48px;top:115px;width:720px">
			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt">ㅇ<span lang="en-US"> (</span>오늘날<span lang="en-US"> </span>사람들에게<span lang="en-US">) </span>음악이란<span lang="en-US"> </span>무엇인가<span lang="en-US">?</span></p>
			<ul>
				<li style="font-size:10pt">음악은 소리 그 이상이다.<span lang="en-US"> </span></li>
				<p style="font-family:Calibri;margin-top:0pt;margin-bottom:0pt"><span style="font-family:Malgun Gothic;font-size:10pt">미디어란</span><span lang="en-US" style="font-family:Malgun Gothic;font-size:10pt"> </span><span lang="en-US" style="font-family:Malgun Gothic;font-size:10pt">개념이 정립되기도 전부터</span><span lang="en-US" style="font-family:Malgun Gothic;font-size:10pt"> </span><span style="font-family:Malgun Gothic;font-size:10pt">존재해온</span><span lang="en-US" style="font-family:Malgun Gothic;font-size:10pt"> </span><span lang="en-US" style="font-family:Malgun Gothic;font-size:10pt">인류의 킬러 컨텐츠다</span><span lang="en-US" style="font-family:Malgun Gothic;font-size:10pt">.</span></p>
			</ul>
			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt"><a href="https://www.youtube.com/watch?v=uVyEm9N7iag">Apple - Music - History of Sound</a></p>
			<iframe width="480" height="270" data-original-src="https://www.youtube.com/watch?v=uVyEm9N7iag" src="https://www.youtube.com/embed/uVyEm9N7iag?feature=oembed&autoplay=true" />
			<br />
			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt">뮤지션에게는 정당한 수익배분은 물론 마케팅 채널이 되어주어야 한다. 팬들과의 소통창구. 블록체인 기술 활용. 사운드클라우드 파산 사례 참고.</p>
			<br />
			<br />
			<br />
			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt">음악에<span lang="en-US"> </span><span lang="en-US">영상</span><span lang="en-US"> </span><span lang="en-US">입하는</span><span lang="en-US"> </span><span lang="en-US">뮤비자키</span></p>
			<br />
			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt">우리는 뭘 얻느냐,</p>
			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt">음악산업을 먹는다.</p>
			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt">SK요금제만 가입하면 막대한 음원과 관련 콘텐츠에 엑세스 할 수 있게 해준다.</p>
			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt">고객들의 음악 취향데이터</p>
			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt">공연도 팔고 버스킹도 팔고</p>
			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt">누구든 음원과 영상을 올리고 가수가 된다. 동네가수.</p>
			<br />
			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt">아마추어 디제이들 큐레이터들에게 판을 깔아준다. 저작권은? 인기dj육성 음원쟈코</p>
			<br />
			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt">니치 포커스. 스트릿 가수들.</p>
			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt">누가 돈을 내는가? 스폰서 스타리밍</p>
			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt">스폰서가 뮤지션에게 음원에대한 대가 지급</p>

			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt"><a href="http://imnews.imbc.com/n_newssas/n_inside/4338548_16711.html">http://imnews.imbc.com/n_newssas/n_inside/4338548_16711.html</a></p>
			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt">비트코인처럼 마이너 트레이더 거래소</p>
			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt">마이너들은 뮤지션</p>
			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt">트레이더들은 저작권 문제 없는 모든 활동에 대한 보상으로 코인혹은 보상지급</p>
			<br />
			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt">지하철에서 너바나의 콘서트 영상을 보며 큰 헤드폰을 낀 머리를 까딱이는 중년의 신사</p>
			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt">[준영,] [오후 1:14] 멜론 100을 다운받아 USB에 듣는 차안에서 듣는</p>
			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt">갤럭시 탭으로 하루종일 듣는 분식집 아주머니</p>
			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt">한달 중 하루는 꼬박 매장음악 선곡에 메달리는 편집샵 매니저</p>

			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt">음악 공연 트랜젝션 데이터 수집</p>
			<br />
			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt">바른음악협동조합</p>
			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt"><a href="http://www.bmcoop.org/board/board.asp?brdIdx=792&amp;brdId=barun02&amp;mode=view">http://www.bmcoop.org/board/board.asp?brdIdx=792&amp;brdId=barun02&amp;mode=view</a></p>
			<br />
			<p lang="en-US" style="font-size:10pt;margin-top:0pt;margin-bottom:0pt">=======================================</p>
			<br />
			<br />
			<img src="__ATTACHMENT__8327580ca6.png" data-src-type="image/jpeg" data-fullres-src="__ATTACHMENT__8327580ca6.png" data-fullres-src-type="image/jpeg" />
			<br />
			<br />
			<br />
			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt">국내 업체들이 애플뮤직 못지 않은 훌륭한 서비스를 제공하고 있지만 오랫동안 &#39;다운로드+스트리밍&#39; 패키지 상품을 주력으로 내놓고 있는 것도 다운로드 매출이 더 높기 때문이다.</p>
			<br />
			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt">이미 스트리밍 횟수가 다운로드 수를 크게 앞질러 국내 서비스 이용자의 상당수가 스트리밍 서비스로 갈아타고 있지만 국내 업체들이 음원 유통권을 무기로 매출하락을 지켜보기만 하지 않는다는 것이다.</p>
			<br />
			<br />
			<p style="font-family:Calibri;margin-top:0pt;margin-bottom:0pt"><span style="font-family:Malgun Gothic">스트리밍을 한 번 하면 한 곡당 7원의 매출액이 발생을 하게 됩니다.</span></p>
			<p style="font-family:Calibri;margin-top:0pt;margin-bottom:0pt"><span style="font-family:Malgun Gothic">이 가운데 40%를 스트리밍 업체가 가져가게 되고요.</span></p>
			<p style="font-family:Calibri;margin-top:0pt;margin-bottom:0pt"><span style="font-family:Malgun Gothic">나머지 60% 가운데 44%가 음반 제작사에게, 10%가 작사, 작곡, 편곡자에게 그리고 6%는 가수와 연주자에게 돌아갑니다.</span></p>
			<br />
			<cite style="font-family:Calibri;font-size:9pt;color:#595959;margin-top:0pt;margin-bottom:0pt">출처: &lt;<a href="http://news.jtbc.joins.com/article/article.aspx?news_id=NB11510500">http://news.jtbc.joins.com/article/article.aspx?news_id=NB11510500</a>&gt; </cite>
			<br />
			<br />
			<p lang="en-US" style="font-size:10pt;margin-top:0pt;margin-bottom:0pt">========================</p>
			<br />
			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt"><span style="font-size:12.5pt;color:#333333;background-color:white;font-weight:bold">음원 판매 구조와 유통사가 하는 일</span></p>
			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt"><span style="font-size:12.5pt;color:#333399;background-color:white">가수+기획사 </span><span style="font-family:Cambria Math;font-size:12.5pt;color:#333399;background-color:white">→</span><span style="font-size:12.5pt;color:#333399;background-color:white"> </span><span style="font-size:12.5pt;color:#333399;background-color:white">음원 유통사 </span><span style="font-family:Cambria Math;font-size:12.5pt;color:#333399;background-color:white">→</span><span style="font-size:12.5pt;color:#333399;background-color:white"> </span><span style="font-size:12.5pt;color:#333399;background-color:white">음원 사이트 </span><span style="font-family:Cambria Math;font-size:12.5pt;color:#333399;background-color:white">→</span><span style="font-size:12.5pt;color:#333399;background-color:white"> </span><span style="font-size:12.5pt;color:#333399;background-color:white">소비자</span></p>
			<br />
			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt">각 기획사와 공급 계약을 맺은 음원 유통사는 매일 쏟아지는 음원들을 벅스, 멜론, 소리바다 같은 사이트로 공급하게 된다. 일종의 도매상 같은 개념</p>
			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt">현재 주요 음원 유통사로는 로엔(멜론), kt뮤직(지니), CJ E&amp;M 뮤직(엠넷), NHN벅스(벅스) 등 개별 음원 사이트도 함께 운영 중인 대형 업체들을 비롯해서 인터파크, 블렌딩(SBS-MBC 합작법인), 뮤직앤뉴, 미러볼뮤직 등 전문 배급 업체 등이 치열한 경쟁을 펼치고 있다. 워너뮤직, 소니뮤직 같은 해외 음반사들의 국내 지사 역시 팝 음악 및 국내 가요 배급업을 병행하고 있다.</p>
			<br />
			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt">지난 2016년 기준 연말 결산 순위 100위권 이내 음원들을 대상으로 가온차트에서 시장 점유율을 분석한 바에 따르면 &lt; 응답하라 1988 &gt;과 &lt;또 오해영&gt; 등의 tvN 드라마 OST, &lt;쇼미더머니&gt;, &lt;프로듀스 101&gt; 등 엠넷 방송 음원들의 유통을 담당한 CJ가 1위를 차지했고 드라마 OST 유통에 특화된 뮤직앤뉴가 &lt;태양의 후예&gt; 인기에 힘입어 4위에 이름을 올렸다. CJ 28.5% / 로엔 25.1% / KT뮤직 21.3% / 뮤직앤뉴 12.3% / 그 외 업체 순이다.</p>
			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt"><span style="font-size:12.5pt;color:#996633;background-color:white">[참조]</span><span style="font-size:12.5pt;color:#333399;background-color:white">&#160;</span><span style="font-size:12.5pt;color:#333399;background-color:white">가온차트 2016년 음악 시장 리뷰</span><span style="font-size:12.5pt;color:#333399;background-color:white">&#160;</span></p>
			<br />
			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt"><span style="font-size:12.5pt;color:#333333;background-color:white;font-weight:bold">유통사 배제한 기획사(가수)-음원 사이트간 직거래는 사실상 불가능</span><span lang="en-US" style="font-size:12.5pt;color:#333333;background-color:white;font-weight:bold"> </span></p>
			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt"><span style="font-family:Segoe UI Symbol;font-size:12.5pt;color:#333333;background-color:white;font-weight:bold">▶</span><span lang="en-US" style="font-size:12.5pt;color:#333333;background-color:white;font-weight:bold"> </span><span style="font-size:12.5pt;color:#333333;background-color:white;font-weight:bold">이걸</span><span lang="en-US" style="font-size:12.5pt;color:#333333;background-color:white;font-weight:bold"> ICT </span><span style="font-size:12.5pt;color:#333333;background-color:white;font-weight:bold">기술로</span><span lang="en-US" style="font-size:12.5pt;color:#333333;background-color:white;font-weight:bold"> </span><span style="font-size:12.5pt;color:#333333;background-color:white;font-weight:bold">깨야</span><span lang="en-US" style="font-size:12.5pt;color:#333333;background-color:white;font-weight:bold"> </span><span style="font-size:12.5pt;color:#333333;background-color:white;font-weight:bold">한다</span><span lang="en-US" style="font-size:12.5pt;color:#333333;background-color:white;font-weight:bold">. App</span><span style="font-size:12.5pt;color:#333333;background-color:white;font-weight:bold">만으로</span><span lang="en-US" style="font-size:12.5pt;color:#333333;background-color:white;font-weight:bold"> </span><span style="font-size:12.5pt;color:#333333;background-color:white;font-weight:bold">음원을</span><span lang="en-US" style="font-size:12.5pt;color:#333333;background-color:white;font-weight:bold"> </span><span style="font-size:12.5pt;color:#333333;background-color:white;font-weight:bold">업로드할</span><span lang="en-US" style="font-size:12.5pt;color:#333333;background-color:white;font-weight:bold"> </span><span style="font-size:12.5pt;color:#333333;background-color:white;font-weight:bold">수</span><span lang="en-US" style="font-size:12.5pt;color:#333333;background-color:white;font-weight:bold"> </span><span style="font-size:12.5pt;color:#333333;background-color:white;font-weight:bold">있는</span><span lang="en-US" style="font-size:12.5pt;color:#333333;background-color:white;font-weight:bold"> </span><span style="font-size:12.5pt;color:#333333;background-color:white;font-weight:bold">직거래</span><span lang="en-US" style="font-size:12.5pt;color:#333333;background-color:white;font-weight:bold"> </span><span style="font-size:12.5pt;color:#333333;background-color:white;font-weight:bold">플랫폼</span></p>
			<br />
			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt">음원 유통 과정에선 각기 맺은 계약에 따라 수수료가 발생한다. 음원유통사는 이 수수료를 주된 수입원으로 삼게 되는데 혹자는 내가 가수, 기획사라면 유통사 거치지 않고 직접 음원 사이트와 거래하면 그만큼 지출 비용을 아낄 수 있지 않냐고 할 수 있겠지만, 현재 이러한 방식으론 음원 유통의 길이 사실상 막혀있다.</p>
			<br />
			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt">즉, 유통사를 거치지 않고선 멜론, 벅스 등에서 내가 만든 음원을 판매할 수 없다. 다만 네이버 뮤직, 벅스 등이 각각 &lt;뮤지션리그&gt;, &lt;Bside&gt;라는 이름으로 기획사조차 없는 무명 인디 음악인들의 음원 직거래 판매를 위한 별도 서비스를 운영하고 있는데 아직 보편화된 거래 방식은 아니다.</p>
			<br />
			<br />
			<p style="font-size:10pt;margin-top:6pt;margin-bottom:6pt"><span style="color:#333333;background-color:white">유통사업자에 지급되는 수수료율이 지나치게 높다고 밝혔다. 그는 “모바일게임 시장이 잘 되고 있지만 유통 과정에서 카카오톡 같은 새 플랫폼이 등장하며 추가 비용이 발생해 정작 개발사 수익은 크지 않다”라며 “퍼블리싱 업체를 통해 카카오톡에 입점한 모바일게임(안드로이드 기준)의 수익분배 구조를 단순화하면 게임 매출의 30%가 구글플레이, 그 나지 70% 가운데 30%는 카카오가 가져간다”라고 설명했다.</span></p>
			<p style="font-size:10pt;margin-top:6pt;margin-bottom:6pt"><span style="color:#333333;background-color:white">하지만 수익분배율을 바꾸기란 쉽지 않다. 예를 들어 모바일게임에서 카카오는 시장 경쟁을 위해 꼭 거쳐야 하는 플랫폼이기 때문이다. 또한 특정 플랫폼이 지배적인 구조를 차지하면 문화 다양성에 좋지 않은 영향을 준다고 장 변호사는 설명했다. 그는 모바일게임 시장을 예로 들며 ”지배적 사업자의 트렌드에 부합하기 위해 모방이 많다”라고 지적했다. 실제 카카오게임에서 ’애니팡‘같은 캐주얼게임이 인기를 끌자 그와 비슷한 게임이 대세를 이뤘다.</span></p>
			<p style="font-size:10pt;margin-top:6pt;margin-bottom:6pt"><span style="color:#333333;background-color:white">&#160;“</span><span style="color:#333333;background-color:white">미국</span><span style="color:#333333;background-color:white"> </span><span style="color:#333333;background-color:white">아이튠즈는</span><span style="color:#333333;background-color:white"> </span><span style="color:#333333;background-color:white">다운로드</span><span style="color:#333333;background-color:white"> </span><span style="color:#333333;background-color:white">한</span><span style="color:#333333;background-color:white"> </span><span style="color:#333333;background-color:white">곡당</span><span style="color:#333333;background-color:white"> 0.99</span><span style="color:#333333;background-color:white">달러를</span><span style="color:#333333;background-color:white"> </span><span style="color:#333333;background-color:white">생산자와</span><span style="color:#333333;background-color:white"> </span><span style="color:#333333;background-color:white">서비스가</span><span style="color:#333333;background-color:white"> 7</span><span style="color:#333333;background-color:white">대</span><span style="color:#333333;background-color:white">3</span><span style="color:#333333;background-color:white">으로</span><span style="color:#333333;background-color:white"> </span><span style="color:#333333;background-color:white">나누지만</span><span style="color:#333333;background-color:white">, </span><span style="color:#333333;background-color:white">국내는</span><span style="color:#333333;background-color:white"> </span><span style="color:#333333;background-color:white">한</span><span style="color:#333333;background-color:white"> </span><span style="color:#333333;background-color:white">곡당</span><span style="color:#333333;background-color:white"> 600</span><span style="color:#333333;background-color:white">원을</span><span style="color:#333333;background-color:white"> 6</span><span style="color:#333333;background-color:white">대</span><span style="color:#333333;background-color:white">4</span><span style="color:#333333;background-color:white">로</span><span style="color:#333333;background-color:white"> </span><span style="color:#333333;background-color:white">나눈다”라며</span><span style="color:#333333;background-color:white"> “</span><span style="color:#333333;background-color:white">온라인</span><span style="color:#333333;background-color:white"> </span><span style="color:#333333;background-color:white">음악시장을</span><span style="color:#333333;background-color:white"> </span><span style="color:#333333;background-color:white">주도해온</span><span style="color:#333333;background-color:white"> </span><span style="color:#333333;background-color:white">멜론</span><span style="color:#333333;background-color:white"> </span><span style="color:#333333;background-color:white">등이</span><span style="color:#333333;background-color:white"> </span><span style="color:#333333;background-color:white">모회사였던</span><span style="color:#333333;background-color:white"> </span><span style="color:#333333;background-color:white">통신사</span><span style="color:#333333;background-color:white"> </span><span style="color:#333333;background-color:white">마케팅의</span><span style="color:#333333;background-color:white"> </span><span style="color:#333333;background-color:white">일환으로</span><span style="color:#333333;background-color:white"> </span><span style="color:#333333;background-color:white">사용되며</span><span style="color:#333333;background-color:white"> </span><span style="color:#333333;background-color:white">값이</span><span style="color:#333333;background-color:white"> </span><span style="color:#333333;background-color:white">더</span><span style="color:#333333;background-color:white"> </span><span style="color:#333333;background-color:white">낮아졌다”라고</span><span style="color:#333333;background-color:white"> </span><span style="color:#333333;background-color:white">지적했다</span><span style="color:#333333;background-color:white">. </span><span style="color:#333333;background-color:white">그는</span><span style="color:#333333;background-color:white"> “</span><span style="color:#333333;background-color:white">멜론</span><span style="color:#333333;background-color:white"> </span><span style="color:#333333;background-color:white">도입</span><span style="color:#333333;background-color:white"> </span><span style="color:#333333;background-color:white">초기에</span><span style="color:#333333;background-color:white"> SKT</span><span style="color:#333333;background-color:white">의</span><span style="color:#333333;background-color:white"> </span><span style="color:#333333;background-color:white">고객</span><span style="color:#333333;background-color:white"> </span><span style="color:#333333;background-color:white">기반이</span><span style="color:#333333;background-color:white"> </span><span style="color:#333333;background-color:white">멜론을</span><span style="color:#333333;background-color:white"> </span><span style="color:#333333;background-color:white">지금</span><span style="color:#333333;background-color:white"> </span><span style="color:#333333;background-color:white">위치에</span><span style="color:#333333;background-color:white"> </span><span style="color:#333333;background-color:white">올려놨지만</span><span style="color:#333333;background-color:white"> </span><span style="color:#333333;background-color:white">멜론</span><span style="color:#333333;background-color:white"> </span><span style="color:#333333;background-color:white">역시</span><span style="color:#333333;background-color:white"> SKT </span><span style="color:#333333;background-color:white">고객</span><span style="color:#333333;background-color:white"> </span><span style="color:#333333;background-color:white">유치를</span><span style="color:#333333;background-color:white"> </span><span style="color:#333333;background-color:white">위한</span><span style="color:#333333;background-color:white"> </span><span style="color:#333333;background-color:white">마케팅</span><span style="color:#333333;background-color:white"> </span><span style="color:#333333;background-color:white">역할을</span><span style="color:#333333;background-color:white"> </span><span style="color:#333333;background-color:white">했다”라고</span><span style="color:#333333;background-color:white"> </span><span style="color:#333333;background-color:white">밝혔다</span><span style="color:#333333;background-color:white">.</span></p>

:13pt;color:#979797">음원</span><span style="font-size:13pt;color:#979797"> </span><span style="font-size:13pt;color:#979797">유통사에</span><span style="font-size:13pt;color:#979797"> </span><span style="font-size:13pt;color:#979797">지급한다</span><span style="font-size:13pt;color:#979797">. (</span><span style="font-size:13pt;color:#979797">자료</span><span style="font-size:13pt;color:#979797"> : </span><span style="font-size:13pt;color:#979797">문화콘텐츠</span><span style="font-size:13pt;color:#979797"> </span><span style="font-size:13pt;color:#979797">유통시스템의</span><span style="font-size:13pt;color:#979797"> </span><span style="font-size:13pt;color:#979797">구조적</span><span style="font-size:13pt;color:#979797"> </span><span style="font-size:13pt;color:#979797">문제점</span><span style="font-size:13pt;color:#979797">, </span><span style="font-size:13pt;color:#979797">장서희</span><span style="font-size:13pt;color:#979797"> </span><span style="font-size:13pt;color:#979797">변호사</span><span style="font-size:13pt;color:#979797">)</span></p>
			<p style="font-size:10pt;margin-top:6pt;margin-bottom:6pt"><span style="color:#333333;background-color:white">또한 장 변호사는 “음반시장 몰락 후 나타난 디지털 음원 시장의 수익이 창작자들이 아닌 서비스업자의 직</span><span style="color:#333333;background-color:white">&#183;</span><span style="color:#333333;background-color:white">간접적인 이익에만 편중되고 있다”라고 지적했다. 신대철 바른음원협동조합 대표는 “음원 가격 분배 정책에 대한 토론의 장이 없었다”라며 “(있었다 해도) 음악가들이 그 자리에 참여할 수 없었다”라고 말했다.</span></p>
			<br />
			<p style="font-size:10pt;margin-top:6pt;margin-bottom:6pt">&lt;iframe src=&quot;http://www.wikitree.co.kr/api/?article=310891&amp;where=make&amp;v=1&amp;mode=embed&amp;part=full&amp;width=0&amp;key=3ece8815d241c6e6c932e9f03ab9be8a88789e73&quot; id=&quot;WikiFrame&quot;  width=&quot;100%&quot; height=&quot;580&quot; frameborder=0&gt;</p>
			<br />
			<br />
			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt"><span style="font-size:12.5pt;color:#333333;background-color:white;font-weight:bold">개인 vs 음원 유통사... 계약 가능 여부는 천차만별</span></p>
			<br />
			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt">SM, YG, JYP 등 이른바 빅3 기획사는 공교롭게도 지니뮤직(구KT뮤직)를 통해 음반 및 음원이 유통되고 있으며 FNC, 스타쉽, 큐브 등은 로엔을 통해 공급되고 있다. 이렇듯 일정 규모 이상의 기획사들이라면 대부분 이들 대형 유통사와의 계약을 통해 음원을 대중들에게 배포, 판매하는 게 일반적이다.</p>
			<br />
			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt">그렇다면 개인(가수) 자격으로 대형 유통사를 통해 내가 만들거나 보유한 음원을 시중에 공급할 수 있을까?</p>
			<br />
			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt">일반적으로 유명 유통업체는 특수한 경우를 제외하면 회사가 아닌, 개인과 계약을 맺고 공급 계약을 맺어주는 일이 드문 편이다. 대부분 회사 vs 회사 계약으로만 가능하다고 보면 좋다.</p>
			<br />
			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt">이렇다 보니 무명 가수 한 명이 직접 사업자 등록증을 발급받아 만든 소위 &quot;개인 1인 레이블&quot;들이 대형 유통사의 문턱을 넘는 것도 쉽진 않다. 보통 수익성을 담보할 수 없기 때문이다. (물론 여기서 인지도 높은 유명 가수의 1인 레이블이라면 당연히 예외다) 이럴땐 소규모 전문 유통사들의 문을 두드리는 방법이 있다.</p>
			<br />
			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt">주로 인디 성향 음악인들의 음악만 취급하는 중소 규모 유통업체들은 이런 음악인들에게 언제나 문호가 개방된 편이어서 비록 가수 개인이 몸담은 소속사가 없더라도 음원을 이들 회사를 통해 대중들에게 전달할 수 있다. 대신 유통사마다 나름의 기준이 있기 때문에 심사 과정을 거치는 건 필수다.</p>
			<br />
			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt"><span style="font-family:돋움;font-size:9pt;color:black;background-color:white;font-weight:bold">1. 음원유통 수익 배분</span></p>
			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt"><span style="font-family:돋움;font-size:9pt;color:black;background-color:white">&#160;</span><span lang="en-US" style="font-family:돋움;font-size:9pt;color:black;background-color:white">-</span><span style="font-family:돋움;font-size:9pt;color:black;background-color:white">&#160;</span><span style="font-family:돋움;color:#27282d;background-color:white">음원이 팔릴 시 : &#160;전체 수익의&#160;40%: 멜론이나 벅스 같은 유통사,&#160;44%는 제작사, 10%는 저작자(작곡&#183;작사&#183;편곡자</span><span lang="en-US" style="font-family:돋움;color:#27282d;background-color:white">), </span><span style="font-family:돋움;color:#27282d;background-color:white">나머지</span><span lang="en-US" style="font-family:돋움;color:#27282d;background-color:white"> 6% </span><span style="font-family:돋움;color:#27282d;background-color:white">만이</span><span lang="en-US" style="font-family:돋움;color:#27282d;background-color:white"> </span><span style="font-family:돋움;color:#27282d;background-color:white">실연자</span><span lang="en-US" style="font-family:돋움;color:#27282d;background-color:white">(</span><span style="font-family:돋움;color:#27282d;background-color:white">가수&#183;연주자</span><span lang="en-US" style="font-family:돋움;color:#27282d;background-color:white">)</span></p>
			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt"><span style="font-family:돋움;color:#27282d;background-color:white">&#160;</span><span lang="en-US" style="font-family:돋움;color:#27282d;background-color:white">- </span><span style="font-family:돋움;color:#27282d;background-color:white">스트리밍</span><span lang="en-US" style="font-family:돋움;color:#27282d;background-color:white">: </span><span style="font-family:돋움;color:#27282d;background-color:white">회당</span><span lang="en-US" style="font-family:돋움;color:#27282d;background-color:white"> 12</span><span style="font-family:돋움;color:#27282d;background-color:white">원</span><span lang="en-US" style="font-family:돋움;color:#27282d;background-color:white"> </span><span style="font-family:돋움;color:#27282d;background-color:white">이</span><span lang="en-US" style="font-family:돋움;color:#27282d;background-color:white"> </span><span style="font-family:돋움;color:#27282d;background-color:white">비용을</span><span lang="en-US" style="font-family:돋움;color:#27282d;background-color:white"> </span><span style="font-family:돋움;color:#27282d;background-color:white">위의</span><span lang="en-US" style="font-family:돋움;color:#27282d;background-color:white"> </span><span style="font-family:돋움;color:#27282d;background-color:white">주체들이</span><span lang="en-US" style="font-family:돋움;color:#27282d;background-color:white"> </span><span style="font-family:돋움;color:#27282d;background-color:white">같은</span><span lang="en-US" style="font-family:돋움;color:#27282d;background-color:white"> </span><span style="font-family:돋움;color:#27282d;background-color:white">비율로</span><span lang="en-US" style="font-family:돋움;color:#27282d;background-color:white"> </span><span style="font-family:돋움;color:#27282d;background-color:white">나눕니다</span><span lang="en-US" style="font-family:돋움;color:#27282d;background-color:white">.</span><span style="font-family:돋움;color:#27282d;background-color:white">&#160;</span></p>
			<br />
			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt"><span style="font-family:돋움;font-size:9pt;color:black;background-color:white;font-weight:bold">2. 음원유통사 등록</span></p>
			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt"><span style="font-family:돋움;font-size:9pt;color:black;background-color:white">&#160;</span><span lang="en-US" style="font-family:돋움;font-size:9pt;color:black;background-color:white">-</span><span style="font-family:돋움;font-size:9pt;color:black;background-color:white">&#160;</span><span style="font-family:돋움;color:#27282d;background-color:white">음원유통사업자로 등록하기는 쉽지만 음원유통플랫폼(멜론, 엠넷, 벅스, 지니, 네이버)과 계약하는 것이 어렵습니다.</span></p>
			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt"><span style="font-family:돋움;color:#27282d;background-color:white">&#160;</span></p>
			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt"><span style="font-family:돋움;color:#0075c8;background-color:white;font-weight:bold">&#160;Step1.&#160;사업자</span><span lang="en-US" style="font-family:돋움;color:#0075c8;background-color:white;font-weight:bold"> </span><span style="font-family:돋움;color:#0075c8;background-color:white;font-weight:bold">등록</span></p>
			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt"><span style="font-family:돋움;color:#27282d;background-color:white">&#160;</span><span lang="en-US" style="font-family:돋움;color:#27282d;background-color:white"> </span><span style="font-family:돋움;color:#27282d;background-color:white">&#160;</span><span lang="en-US" style="font-family:돋움;color:#27282d;background-color:white"> </span><span style="font-family:돋움;color:#27282d;background-color:white">&#160;</span><span lang="en-US" style="font-family:돋움;color:#27282d;background-color:white"> </span><span style="font-family:돋움;color:#27282d;background-color:white">&#160;</span><span lang="en-US" style="font-family:돋움;color:#27282d;background-color:white"> </span><span style="font-family:돋움;color:#27282d;background-color:white">&#160;</span><span lang="en-US" style="font-family:돋움;color:#27282d;background-color:white">- </span><span style="font-family:돋움;color:#27282d;background-color:white">세무서에서</span><span lang="en-US" style="font-family:돋움;color:#27282d;background-color:white"> </span><span style="font-family:돋움;color:#27282d;background-color:white">사업종목에</span><span lang="en-US" style="font-family:돋움;color:#27282d;background-color:white"> </span><span style="font-family:돋움;color:#27282d;background-color:white">음원유통을</span><span lang="en-US" style="font-family:돋움;color:#27282d;background-color:white"> </span><span style="font-family:돋움;color:#27282d;background-color:white">추가합니다</span><span lang="en-US" style="font-family:돋움;color:#27282d;background-color:white">. </span><span style="font-family:돋움;color:#27282d;background-color:white">이것은</span><span lang="en-US" style="font-family:돋움;color:#27282d;background-color:white"> </span><span style="font-family:돋움;color:#27282d;background-color:white">그냥</span><span lang="en-US" style="font-family:돋움;color:#27282d;background-color:white"> </span><span style="font-family:돋움;color:#27282d;background-color:white">세무소에</span><span lang="en-US" style="font-family:돋움;col 			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt"><span style="font-family:돋움;color:#27282d;background-color:white">&#160;</span><span lang="en-US" style="font-family:돋움;color:#27282d;background-color:white"> </span><span style="font-family:돋움;color:#27282d;background-color:white">&#160;</span><span lang="en-US" style="font-family:돋움;color:#27282d;background-color:white"> </span><span style="font-family:돋움;color:#27282d;background-color:white">&#160;</span><span lang="en-US" style="font-family:돋움;color:#27282d;background-color:white"> </span><span style="font-family:돋움;color:#27282d;background-color:white">&#160;</span><span lang="en-US" style="font-family:돋움;color:#27282d;background-color:white"> </span><span style="font-family:돋움;color:#27282d;background-color:white">&#160;개인사업자도</span><span lang="en-US" style="font-family:돋움;color:#27282d;background-color:white"> </span><span style="font-family:돋움;color:#27282d;background-color:white">가능하고</span><span lang="en-US" style="font-family:돋움;color:#27282d;background-color:white">, </span><span style="font-family:돋움;color:#27282d;background-color:white">법인사업자는</span><span lang="en-US" style="font-family:돋움;color:#27282d;background-color:white"> </span><span style="font-family:돋움;color:#27282d;background-color:white">당연히</span><span lang="en-US" style="font-family:돋움;color:#27282d;background-color:white"> </span><span style="font-family:돋움;color:#27282d;background-color:white">됩니다</span><span lang="en-US" style="font-family:돋움;color:#27282d;background-color:white">.</span><span style="font-family:돋움;color:#27282d;background-color:white">&#160;</span></p>

			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt"><span style="font-family:돋움;color:#27282d;background-color:white;font-weight:bold">&#160;</span><span style="font-family:돋움;color:#0075c8;background-color:white;font-weight:bold">Step2. 계약할 유통플랫폼 선정 및 문의&#160;</span><span style="font-family:돋움;color:#27282d;background-color:white;font-weight:bold">&#160;</span></p>
			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt"><span style="font-family:돋움;color:#27282d;background-color:white">&#160;</span><span lang="en-US" style="font-family:돋움;color:#27282d;background-color:white"> </span><span style="font-family:돋움;color:#27282d;background-color:white">&#160;</span><span lang="en-US" style="font-family:돋움;color:#27282d;background-color:white"> </span><span style="font-family:돋움;color:#27282d;background-color:white">&#160;</span><span lang="en-US" style="font-family:돋움;color:#27282d;background-color:white"> </span><span style="font-family:돋움;color:#27282d;background-color:white">&#160;</span><span lang="en-US" style="font-family:돋움;color:#27282d;background-color:white"> </span><span style="font-family:돋움;color:#27282d;background-color:white">&#160;</span><span lang="en-US" style="font-family:돋움;color:#27282d;background-color:white"> - </span><span style="font-family:돋움;color:#27282d;background-color:white">계약할</span><span lang="en-US" style="font-family:돋움;color:#27282d;background-color:white"> </span><span style="font-family:돋움;color:#27282d;background-color:white">음원유통플랫폼을</span><span lang="en-US" style="font-family:돋움;color:#27282d;background-color:white"> </span><span style="font-family:돋움;color:#27282d;background-color:white">선정합니다</span><span lang="en-US" style="font-family:돋움;color:#27282d;background-color:white">. </span><span style="font-family:돋움;color:#27282d;background-color:white">국내에서는</span><span lang="en-US" style="font-family:돋움;color:#27282d;background-color:white"> </span><span style="font-family:돋움;color:#27282d;background-color:white">이제</span><span lang="en-US" style="font-family:돋움;color:#27282d;background-color:white"> </span><span style="font-family:돋움;color:#27282d;background-color:white">멜론</span><span lang="en-US" style="font-family:돋움;color:#27282d;background-color:white">, </span><span style="font-family:돋움;color:#27282d;background-color:white">엠넷</span><span lang="en-US" style="font-family:돋움;color:#27282d;background-color:white">, </span><span style="font-family:돋움;color:#27282d;background-color:white">벅스</span><span lang="en-US" style="font-family:돋움;color:#27282d;background-color:white">, </span><span style="font-family:돋움;color:#27282d;background-color:white">지니</span><span lang="en-US" style="font-family:돋움;color:#27282d;background-color:white">, </span><span style="font-family:돋움;color:#27282d;background-color:white">네이버라고</span><span lang="en-US" style="font-family:돋움;color:#27282d;background-color:white"> </span><span style="font-family:돋움;color:#27282d;background-color:white">생각하시면</span><span lang="en-US" style="font-family:돋움;color:#27282d;background-color:white"> </span><span style="font-family:돋움;color:#27282d;background-color:white">됩니다</span><span lang="en-US" style="font-family:돋움;color:#27282d;background-color:white">.</span><span style="font-family:돋움;color:#27282d;background-color:white">&#160;</span></p>

:돋움;color:#27282d;background-color:white"> </span><span style="font-family:돋움;color:#27282d;background-color:white">하면</span><span lang="en-US" style="font-family:돋움;color:#27282d;background-color:white"> </span><span style="font-family:돋움;color:#27282d;background-color:white">담당자의</span><span lang="en-US" style="font-family:돋움;color:#27282d;background-color:white"> </span><span style="font-family:돋움;color:#27282d;background-color:white">연락처를</span><span lang="en-US" style="font-family:돋움;color:#27282d;background-color:white"> </span><span style="font-family:돋움;color:#27282d;background-color:white">알려줍니다</span><span lang="en-US" style="font-family:돋움;color:#27282d;background-color:white">. </span><span style="font-family:돋움;color:#27282d;background-color:white">벅스의</span><span lang="en-US" style="font-family:돋움;color:#27282d;background-color:white"> </span><span style="font-family:돋움;color:#27282d;background-color:white">경우는&#160;</span></p>
			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt"><span style="font-family:돋움;color:#27282d;background-color:white">&#160;</span><span lang="en-US" style="font-family:돋움;color:#27282d;background-color:white"> </span><span style="font-family:돋움;color:#27282d;background-color:white">&#160;</span><span lang="en-US" style="font-family:돋움;color:#27282d;background-color:white"> </span><span style="font-family:돋움;color:#27282d;background-color:white">&#160;</span><span lang="en-US" style="font-family:돋움;color:#27282d;background-color:white"> </span><span style="font-family:돋움;color:#27282d;background-color:white">&#160;</span><span lang="en-US" style="font-family:돋움;color:#27282d;background-color:white"> </span><span style="font-family:돋움;color:#27282d;background-color:white">&#160;</span><span lang="en-US" style="font-family:돋움;color:#27282d;background-color:white"> </span><span style="font-family:돋움;color:#27282d;background-color:white">&#160;홈페이지</span><span lang="en-US" style="font-family:돋움;color:#27282d;background-color:white"> </span><span style="font-family:돋움;color:#27282d;background-color:white">내의</span><span lang="en-US" style="font-family:돋움;color:#27282d;background-color:white"> </span><span style="font-family:돋움;color:#27282d;background-color:white">문의사항으로</span><span lang="en-US" style="font-family:돋움;color:#27282d;background-color:white"> </span><span style="font-family:돋움;color:#27282d;background-color:white">보내면</span><span lang="en-US" style="font-family:돋움;color:#27282d;background-color:white"> </span><span style="font-family:돋움;color:#27282d;background-color:white">담당자의</span><span lang="en-US" style="font-family:돋움;color:#27282d;background-color:white"> </span><span style="font-family:돋움;color:#27282d;background-color:white">연락처를</span><span lang="en-US" style="font-family:돋움;color:#27282d;background-color:white"> </span><span style="font-family:돋움;color:#27282d;background-color:white">가르쳐</span><span lang="en-US" style="font-family:돋움;co 			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt"><span style="font-family:돋움;color:#0075c8;background-color:white;font-weight:bold">Step 3. 서류 준비</span></p>
			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt"><span style="font-family:돋움;color:#27282d;background-color:white">&#160;</span><span lang="en-US" style="font-family:돋움;color:#27282d;background-color:white"> </span><span style="font-family:돋움;color:#27282d;background-color:white">&#160;</span><span lang="en-US" style="font-family:돋움;color:#27282d;background-color:white"> </span><span style="font-family:돋움;color:#27282d;background-color:white">&#160;</span><span lang="en-US" style="font-family:돋움;color:#27282d;background-color:white"> </span><span style="font-family:돋움;color:#27282d;background-color:white">&#160;</span><span lang="en-US" style="font-family:돋움;color:#27282d;background-color:white"> </span><span style="font-family:돋움;color:#27282d;background-color:white">&#160;</span><span lang="en-US" style="font-family:돋움;color:#27282d;background-color:white">-</span><span style="font-family:돋움;color:#27282d;background-color:white">&#160;각</span><span lang="en-US" style="font-family:돋움;color:#27282d;background-color:white"> </span><span style="font-family:돋움;color:#27282d;background-color:white">플랫폼에서</span><span lang="en-US" style="font-family:돋움;color:#27282d;background-color:white"> </span><span style="font-family:돋움;color:#27282d;background-color:white">이제</span><span lang="en-US" style="font-family:돋움;color:#27282d;background-color:white"> </span><span style="font-family:돋움;color:#27282d;background-color:white">준비할</span><span lang="en-US" style="font-family:돋움;color:#27282d;background-color:white"> </span><span style="font-family:돋움;color:#27282d;background-color:white">서류를</span><span lang="en-US" style="font-family:돋움;color:#27282d;background-color:white"> </span><span style="font-family:돋움;color:#27282d;background-color:white">이야기</span><span lang="en-US" style="font-family:돋움;color:#27282d;background-color:white"> </span><span style="font-family:돋움;color:#27282d;background-color:white">해</span><span lang="en-US" style="font-family:돋움;color:#272 			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt">- 음원 파일</p>
			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt">16비트 &#160;<span lang="en-US">+ 44.1KHz </span>규격의<span lang="en-US"> </span>웨이브<span lang="en-US">(wav) </span>파일<span lang="en-US">, 16</span>비트<span lang="en-US"> </span>&#160;<span lang="en-US">+ 44.1KHz </span>규격의<span lang="en-US"> 320kbs </span>급<span lang="en-US"> mp3 </span>파일<span lang="en-US">.</span></p>
			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt">이와 별도로 24비트 고음질 음원을 판매하고 싶다면 24비트 + 96/192KHz 규격 플랙(Flac) 파일을 제출할 수도 있다.</p>
			<br />
			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt">- 음반 표지 파일</p>
			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt">가로 000 x 세로 000 픽셀 이상의 jpg 파일</p>
			<br />
			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt">- 가수 및 음반 정보 및 소개글 파일</p>
			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt">작사, 작곡, 편곡자 정보 및 가사, 음반 소개글 (MS 워드, 한글, txt 파일 등 형식은 제각각)</p>
			<br />
			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt">&#160;국내 음원 이용자 대부분이 대형 유통사에서 ‘종량제’ 서비스를 이용해 음악을 듣는다. ‘MP3 30곡+무제한 스트리밍’의 정상가격은 9천원에서 1만2천원 사이다. 스트리밍을 제외한다면 1곡을 다운로드 할 때 드는 돈은 150원 남짓이다. 실제 곡당 다운로드 최저 가격은 미국이 791원, 영국이 1064원인 반면, 한국은 63원이다. 국내 대부분의 업체가 단품 다운로드 가격으로 600원을 받고 있지만, 종량제 상품이 있는데 굳이 단품 다운로드를 이용하는 사람은 거의 없다. 애플뮤직의 곡당 다운로드 가격은 0.99달러로, 우리돈으로 치면 1천원이 조금 넘는다.</p>

			<p style="font-size:10pt;margin-top:6pt;margin-bottom:6pt"><span style="color:#333333;background-color:white">음원 사재기가 일어나는 이유는 단순하다. 차트 순위가 음원 판매와 가수 인지도에 제일 효과적인 마케팅이 되기 때문이다. 이는 음원 차트 자체가 음악 소비에 매우 강력한 영향을 주는 환경 탓도 있다. 장서희 변호사는 “차트에 진입해야 방송 출연과 행사 섭외 등 수익에 영향을 주니 수익을 위해서라도 차트 진입이 절실하다”라고 지적했다. 이동연 교수는 “음원 사재기로 인해서 아티스트형 창작가수 노출 빈도는 줄어들어 버티기가 어려워질 정도”라고 말했다.</span></p>

			<p style="font-family:Calibri;margin-top:0pt;margin-bottom:0pt"><span style="font-family:Noto Sans KR;font-size:13.5pt;color:#333333;background-color:white">&#160;</span></p>
			<p style="font-family:Calibri;margin-top:0pt;margin-bottom:0pt"><span style="font-family:Noto Sans KR;font-size:13.5pt;color:#333333;background-color:white">동일한 사람이라도 다른 정체성을 가질 수 있다. 이걸 짝사랑과 직접 고백하는 것의 차이로 비교할 수도 있을 것이다. 좋아하는 마음을 전제로 할 때, 그다음에 어떤 행위를 할 것인지의 선택에 따라 누구나 다른 사람이 될 수 있다.&#160;</span></p>

			<br />
			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt">#1. 영국의 팝스타 아델이 11월 20일 새 앨범 ‘25’를 발표했다. 새 음반은 발매 1주일 만에 338만 장이 팔렸다. 팝 음악 역사상 가장 빠른 기록이다. 아델은 이번 앨범의 유통 방식으로 CD와 다운로드만 고집했다. 음원 유통의 대세로 자리 잡은 스트리밍 방식을 철저히 배제한 것. 창작자들에겐 터무니없게만 느껴지던 수익 배분 방식에 대한 아티스트의 반격이었다.&#160;</p>
			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt">#2. 얼마 전 케이블 TV의 오디션 프로그램 ‘슈퍼스타 K7’에 출연해 스타덤에 오른 ‘중식이 밴드’. 중식이 밴드가 한창 인기를 얻던 지난 8월 한 달간, 멜론이나 지니 같은 음원 유통 사이트에서 이들의 노래를 들은 사람의 수는 무려 25만2369명에 달했다. 같은 기간 이들이 벌어들인 음원 수익은 얼마일까. 45만5000원이다.</p>
			<br />
			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt">2013년 이후 문화체육관광부가 법으로 정한 저작권료 분배 비율은 유통사 40%, 제작사 44%, 저작권자 10%, 실연자 6%다. 노래 1곡당 7.2원인 전체 저작권료 중 2.88원을 유통사가 챙기고 3.16원을 제작사가, 우리가 흔히 뮤지션이라고 부르며 돈을 제일 많이 벌 것 같은 가수는 0.43원을 받는다. 그나마 세션이라고 부르는 연주자나 코러스에게 절반을 떼어주면 실제로 가수에게 돌아가는 돈은 0.21원으로 뚝 떨어진다. 1곡이 5번은 스트리밍돼야 겨우 100원 정도를 버는 셈</p>
			<br />
			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt">문화체육관광부는 지난 12월 16일 ‘음원 전송 사용료 개선 방안’을 발표했다. 3.6원인 월정액 스트리밍의 저작권료를 4.2원으로 인상하고 다운로드도 곡당 360원에서 490원으로 올린다는 방침이다. 다만 40 대 44 대 10 대 6의 기존 권리자 수익 배분 비율은 바뀌지 않았다.&#160;</p>
			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt">노래 1곡당 지금까지 가수가 0.21원을 받았다는 사실에 놀라기엔 아직 이르다. 더 큰 문제는 엄청난 할인율이다. 현재 음원을 유통하는 대부분의 서비스 업체는 ‘묶음형 할인 상품’을 판매하고 있다. ‘다운로드 30~100곡’과 ‘월정액제 스트리밍’을 묶어 파는 식이다. 이럴 경우 저작권료 단가는 1곡당 3.6원에서 1.8원으로 뚝 떨어진다. 뮤지션이 받는 돈은 0.18원에 불과하다.&#160;</p>
			<br />
			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt">유통사가 배급사를 겸하고 있는 산업구조도 한국에서만 볼 수 있는 기형적인 시스템이다. 멜론&#183;지니&#183;엠넷&#183;벅스<span lang="en-US"> </span>등<span lang="en-US"> </span>대형<span lang="en-US"> </span>유통사는<span lang="en-US"> </span>음원<span lang="en-US"> </span>유통뿐만<span lang="en-US"> </span>아니라<span lang="en-US"> </span>배급도<span lang="en-US"> </span>같이<span lang="en-US"> </span>한다<span lang="en-US">. </span>예를<span lang="en-US"> </span>들어<span lang="en-US"> </span>멜론이<span lang="en-US"> </span>배급과<span lang="en-US"> </span>유통에<span lang="en-US"> </span>나선<span lang="en-US"> </span>가수<span lang="en-US"> A</span>가<span lang="en-US"> </span>있다고<span lang="en-US"> </span>치자<span lang="en-US">. </span>멜론<span lang="en-US"> </span>입장에선<span lang="en-US"> A</span>의<span lang="en-US"> </span>노래가<span lang="en-US"> </span>많이<span lang="en-US"> </span>다운로드되고<span lang="en-US"> </span>스트리밍될수록<span lang="en-US"> </span>수익이<span lang="en-US"> </span>커진다<span lang="en-US">. </span>멜론의<span lang="en-US"> </span>홈페이지나<span lang="en-US"> </span>모바일<span lang="en-US"> </span>첫<span lang="en-US"> </span>화면에<span lang="en-US"> </span>‘추천곡’으로<span lang="en-US"> A</span>의<span lang="en-US"> </span>노래를<span lang="en-US"> </span>올려놓는<span lang="en-US"> </span>것이<span lang="en-US"> </span>양심이나<span lang="en-US"> </span>상도덕에<span lang="en-US"> </span>어긋날지도<span lang="en-US"> </span>모르지만<span lang="en-US"> </span>현실은<span lang="en-US"> </span>그렇지<span lang="en-US"> </span>않다<span lang="en-US">.</span>&#160;</p>
			<br />
			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt">멜론을 소유한 로엔엔터테인먼트(이하 로엔)는 음원 제작까지 하고 있다. 요즘 인기 있는 아이유의 소속사가 바로 로엔이다. 로엔이 제작한 아이유의 신곡이 멜론의 추천곡에 오르면 순식간에 실시간 차트를 점령하고 이는 고스란히 멜론, 즉 로엔의 수익으로 돌아온다.&#160;</p>
			<br />
			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt"><a href="http://tenasia.hankyung.com/archives/1296814">http://tenasia.hankyung.com/archives/1296814</a></p>
			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt">즉<span lang="en-US">, </span>아이유가<span lang="en-US"> </span>음원을<span lang="en-US"> </span>몇<span lang="en-US"> </span>시에<span lang="en-US"> </span>공개하든지<span lang="en-US"> </span>멜론은<span lang="en-US"> </span>이걸<span lang="en-US"> </span>밀어줄<span lang="en-US"> </span>수<span lang="en-US"> </span>있다는<span lang="en-US"> </span>이야기</p>
			<br />
			<br />
			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt"><span style="font-family:맑은 고딕;color:#4c4c4c;background-color:white;font-weight:bold">분배율보다 시급한 건 종량제 상품의 폐지</span><span lang="en-US" style="color:#4c4c4c;background-color:white;font-weight:bold">. </span><span style="color:#4c4c4c;background-color:white;font-weight:bold">근데</span><span lang="en-US" style="color:#4c4c4c;background-color:white;font-weight:bold"> </span><span style="color:#4c4c4c;background-color:white;font-weight:bold">사람들은</span><span lang="en-US" style="color:#4c4c4c;background-color:white;font-weight:bold"> </span><span style="color:#4c4c4c;background-color:white;font-weight:bold">이게</span><span lang="en-US" style="color:#4c4c4c;background-color:white;font-weight:bold"> </span><span style="color:#4c4c4c;background-color:white;font-weight:bold">편할텐데…</span><span lang="en-US" style="color:#4c4c4c;background-color:white;font-weight:bold">.</span></p>
			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt"><span style="color:#4c4c4c;background-color:white;font-weight:bold">프레임을</span><span lang="en-US" style="color:#4c4c4c;background-color:white;font-weight:bold"> </span><span style="color:#4c4c4c;background-color:white;font-weight:bold">바꿔야한다</span><span lang="en-US" style="color:#4c4c4c;background-color:white;font-weight:bold">. </span><span style="color:#4c4c4c;background-color:white;font-weight:bold">앨범판매</span><span lang="en-US" style="color:#4c4c4c;background-color:white;font-weight:bold">?</span><span style="color:#4c4c4c;background-color:white;font-weight:bold">로</span><span lang="en-US" style="color:#4c4c4c;background-color:white;font-weight:bold"> </span><span style="color:#4c4c4c;background-color:white;font-weight:bold">회귀</span><span lang="en-US" style="color:#4c4c4c;background-color:white;font-weight:bold">?</span></p>
			<br />
			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt">A: 저작권협회에 등록되지 않은 곡도 유통이 가능합니다. 그러나 이 경우 저작권협회로 부터 저작인접권료를 정산 받지 못하게 됩니다.</p>
			<br />
			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt">딴지그룹은 2월 말 한 곡당 600원씩 앨범 단위로만 음원을 살 수 있는 딴지뮤직을 시작했다. 모토는 ‘재주는 곰이 부리고 돈도 곰이 번다!’이다. 앨범은 매달 추천 음악식으로 올라온다. 뮤지션에게 수익금의 100%를 정산해주고 100회 다운로드가 되면 공연도 열겠다는 공언도 했다. 90회가량 다운로드된 앨범이 4~5건으로 아직 공연이 이루어지진 않았다. 김진 딴지뮤직 총괄 담당은 “꾸준히 이용자가 늘어나고 있다. 곡당 몇원짜리 음원이 있는데도 이런 음악을 다운로드받는 사람들이 있다는 것을 확인했다”고 말한다. 붕가붕레코드의 고건혁 대표는 “딴지뮤직 시도가 아직 시장에 크게 임팩트를 주지는 않았다. 그런데 실제로 정산을 받아볼 때면 놀란다. 소수지만 제값을 내는 사람들이 있으면 어떤 일이 벌어지는지를 실감했다”고 말한다.</p>
