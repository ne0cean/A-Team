		<title>N스크린</title>

	<body data-absolute-enabled="true" style="font-family:Malgun Gothic;font-size:11pt">
		<div style="position:absolute;left:48px;top:139px;width:720px">
			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt">[준영,] [오후 6:26] 콘텐츠 관련 잡지구독</p>
			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt">퀘스트를 깨면, 옥수수 관이 단계별로 열리는 건 어때. 씨네필 퀘스트 및 랭킹. 뭘볼지 모르는 고객들에게 내러티브가 있는 가이드, 도슨트가 되어주는거지. 커리큘럼을 짜주는거야. 인적 큐레이션.</p>
			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt">[준영,] [오후 6:27] 차는 바퀴달린 거실이다. N스크린 전략에서 빠질 수 없다.</p>
			<br />
			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt">[준영,] [오후 6:27] 데이팅 앱 만들기</p>
			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt">[준영,] [오후 6:27] 인디안섬머</p>
			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt">[준영,] [오후 6:27] 콘텐츠에 따라 갈아티는 유저 특성에 맞는 요금제?</p>
			<br />
		</div>
	</body>
</html>
