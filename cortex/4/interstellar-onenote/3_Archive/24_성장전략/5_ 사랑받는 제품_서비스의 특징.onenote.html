	<body data-absolute-enabled="true" style="font-family:Malgun Gothic;font-size:11pt">
		<div style="position:absolute;left:48px;top:139px;width:720px">
			<p lang="en-US" data-tag="to-do,remember-for-later" style="font-family:Calibri;margin-top:0pt;margin-bottom:0pt"><span style="font-family:Malgun Gothic">5/ </span><span lang="ko-KR" style="font-family:Malgun Gothic">사랑받는</span><span style="font-family:Malgun Gothic"> </span><span lang="ko-KR" style="font-family:Malgun Gothic">제품</span><span style="font-family:Malgun Gothic">/</span><span lang="ko-KR" style="font-family:Malgun Gothic">서비스의</span><span style="font-family:Malgun Gothic"> </span><span lang="ko-KR" style="font-family:Malgun Gothic">특징</span></p>
			<br />
			<p style="font-family:Tahoma;margin-top:0pt;margin-bottom:0pt">[<span style="font-family:Malgun Gothic">사랑받는</span> <span style="font-family:Malgun Gothic">제품의</span> 9<span style="font-family:Malgun Gothic">가지</span> <span style="font-family:Malgun Gothic">특징</span>]</p>
			<br />
			<p style="font-family:Tahoma;margin-top:0pt;margin-bottom:0pt">1<span style="font-family:Segoe UI Emoji">️⃣</span> <span style="font-family:Malgun Gothic">저렴해서</span> (<span style="font-family:Malgun Gothic">가격경쟁력</span>)</p>
			<p style="font-family:Tahoma;margin-top:0pt;margin-bottom:0pt">7️⃣ <span style="font-family:Malgun Gothic">시간을</span> <span style="font-family:Malgun Gothic">아껴주기</span> <span style="font-family:Malgun Gothic">때문에</span> (<span style="font-family:Malgun Gothic">경제성</span>, <span style="font-family:Malgun Gothic">생산성</span>)</p>
			<br />
			<p style="font-family:Tahoma;margin-top:0pt;margin-bottom:0pt">2️⃣ <span style="font-family:Malgun Gothic">편해서</span> (<span style="font-family:Malgun Gothic">편의성</span>)</p>
			<p style="font-family:Tahoma;margin-top:0pt;margin-bottom:0pt">4️⃣ <span style="font-family:Malgun Gothic">빨라서</span> (<span style="font-family:Malgun Gothic">속도</span>, <span style="font-family:Malgun Gothic">체감</span>)</p>
			<p style="font-family:Tahoma;margin-top:0pt;margin-bottom:0pt">6<span style="font-family:Segoe UI Emoji">️⃣</span> <span style="font-family:Malgun Gothic">오래가서</span> (<span style="font-family:Malgun Gothic">지속성</span><span lang="en-US">, </span><span style="font-family:Malgun Gothic">내구성</span><span lang="en-US">)</span></p>
			<p style="font-family:Tahoma;margin-top:0pt;margin-bottom:0pt">8️⃣ <span style="font-family:Malgun Gothic">아름다워서</span> (<span style="font-family:Malgun Gothic">심미성</span>)</p>
			<p style="font-family:Tahoma;margin-top:0pt;margin-bottom:0pt">5️⃣ <span style="font-family:Malgun Gothic">가벼워서</span> (<span style="font-family:Malgun Gothic">휴대성</span>)</p>
			<br />
			<p style="font-family:Tahoma;margin-top:0pt;margin-bottom:0pt">3️⃣ <span style="font-family:Malgun Gothic">좋아하는</span> <span style="font-family:Malgun Gothic">브랜드라서</span> (<span style="font-family:Malgun Gothic">동질성</span>)</p>
			<p style="font-family:Tahoma;margin-top:0pt;margin-bottom:0pt">9<span style="font-family:Segoe UI Emoji">️⃣</span> <span style="font-family:Malgun Gothic">유일해서</span> (<span style="font-family:Malgun Gothic">대체불가성</span>)</p>
