		<title>상반기 여행</title>

	<body data-absolute-enabled="true" style="font-family:Calibri;font-size:11pt">
		<div style="position:absolute;left:48px;top:115px;width:720px">
			<p lang="ko-KR" style="margin-top:0pt;margin-bottom:0pt"><span style="font-family:Malgun Gothic">스위스</span>,<span style="font-family:Malgun Gothic">스페인</span>,<span style="font-family:Malgun Gothic">하와이</span></p>
			<p lang="ko-KR" style="margin-top:0pt;margin-bottom:0pt"><span style="font-family:Malgun Gothic">삿포로</span>(6~7<span style="font-family:Malgun Gothic">월</span>), <span style="font-family:Malgun Gothic">오이타</span>..<span style="font-family:Malgun Gothic">아님</span> <span style="font-family:Malgun Gothic">동남아</span>?</p>
			<p lang="ko-KR" style="margin-top:0pt;margin-bottom:0pt"><span style="font-family:Malgun Gothic">오이타는</span> <span style="font-family:Malgun Gothic">유후인이나</span> <span style="font-family:Malgun Gothic">온천마을임ㅋㅋㅋ</span></p>
			<br />
			<p lang="ko-KR" style="margin-top:0pt;margin-bottom:0pt"><span style="font-family:Malgun Gothic">그러면</span> <span style="font-family:Malgun Gothic">대만</span> <span style="font-family:Malgun Gothic">아니면</span> <span style="font-family:Malgun Gothic">세부나</span> <span style="font-family:Malgun Gothic">푸쿠옥</span> <span style="font-family:Malgun Gothic">이런데</span> <span style="font-family:Malgun Gothic">가심되겠네</span></p>
			<br />
			<p lang="ko-KR" style="margin-top:0pt;margin-bottom:0pt"><span style="font-family:Malgun Gothic">적당히</span> <span style="font-family:Malgun Gothic">몸편하고</span> <span style="font-family:Malgun Gothic">음식맛있고</span></p>
			<p lang="ko-KR" style="margin-top:0pt;margin-bottom:0pt"><span style="font-family:Malgun Gothic">볼거많은건</span> <span style="font-family:Malgun Gothic">스페인이</span> <span style="font-family:Malgun Gothic">짱이고</span></p>
			<br />
			<p lang="ko-KR" style="margin-top:0pt;margin-bottom:0pt"><span style="font-family:Malgun Gothic">일본</span></p>
			<p lang="ko-KR" style="margin-top:0pt;margin-bottom:0pt"><span style="font-family:Malgun Gothic">알펜루트</span><span lang="en-US" style="font-family:Malgun Gothic"> +</span><span style="font-family:Malgun Gothic"> 시라카와고</span></p>
			<p lang="ko-KR" style="margin-top:0pt;margin-bottom:0pt"><span style="font-family:Malgun Gothic">북해도</span></p>
			<br />
		</div>
		<div style="position:absolute;left:379px;top:21px;width:624px">
