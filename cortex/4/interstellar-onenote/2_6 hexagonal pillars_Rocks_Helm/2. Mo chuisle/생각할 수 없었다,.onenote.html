	<body data-absolute-enabled="true" style="font-family:Malgun Gothic;font-size:11pt">
		<div style="position:absolute;left:48px;top:139px;width:720px">
			<p lang="en-US" style="font-family:Calibri;margin-top:0pt;margin-bottom:0pt"><span style="font-family:Malgun Gothic">생각할 수 없었다,</span></p>
			<br />
			<br />
			<p lang="en-US" style="font-family:Calibri;margin-top:0pt;margin-bottom:0pt"><span style="font-family:Malgun Gothic">입버릇처럼 행복은 중요치 않다고 말히는,</span></p>
			<p style="font-family:Calibri;margin-top:0pt;margin-bottom:0pt"><span style="font-family:Malgun Gothic">이</span><span lang="en-US" style="font-family:Malgun Gothic"> 마음의 척박한 동토에서도 기꺼이 살아줄 </span><span style="font-family:Malgun Gothic">유일한</span><span lang="en-US" style="font-family:Malgun Gothic"> </span><span style="font-family:Malgun Gothic">사람</span><span lang="en-US" style="font-family:Malgun Gothic">.</span></p>
			<br />
			<p lang="en-US" style="font-family:Calibri;margin-top:0pt;margin-bottom:0pt"><span style="font-family:Malgun Gothic">우리 열심히 살되, 악바리가 되</span><span lang="ko-KR" style="font-family:Malgun Gothic">진</span><span style="font-family:Malgun Gothic"> 말아요.</span></p>
			<p lang="en-US" style="font-family:Calibri;margin-top:0pt;margin-bottom:0pt"><span style="font-family:Malgun Gothic">그렇게까지</span><span lang="ko-KR" style="font-family:Malgun Gothic">는</span><span style="font-family:Malgun Gothic">, 살지 말아요.</span></p>
			<br />
			<p style="font-family:Calibri;margin-top:0pt;margin-bottom:0pt"><span style="font-family:Malgun Gothic">되도록</span><span lang="en-US" style="font-family:Malgun Gothic"> </span><span style="font-family:Malgun Gothic">값싼</span><span lang="en-US" style="font-family:Malgun Gothic"> </span><span style="font-family:Malgun Gothic">술을</span><span lang="en-US" style="font-family:Malgun Gothic"> </span><span style="font-family:Malgun Gothic">마시고</span><span lang="en-US" style="font-family:Malgun Gothic">, </span><span style="font-family:Malgun Gothic">쉽게</span><span lang="en-US" style="font-family:Malgun Gothic"> </span><span style="font-family:Malgun Gothic">행복해집시다</span><span lang="en-US" style="font-family:Malgun Gothic">, </span></p>
			<br />
			<p style="font-family:Calibri;margin-top:0pt;margin-bottom:0pt"><span style="font-family:Malgun Gothic">그리고</span><span lang="en-US" style="font-family:Malgun Gothic"> </span><span style="font-family:Malgun Gothic">가능하다면</span><span lang="en-US" style="font-family:Malgun Gothic">, </span><span style="font-family:Malgun Gothic">더</span><span lang="en-US" style="font-family:Malgun Gothic"> </span><span style="font-family:Malgun Gothic">큰</span><span lang="en-US" style="font-family:Malgun Gothic"> </span><span style="font-family:Malgun Gothic">세상과</span><span lang="en-US" style="font-family:Malgun Gothic"> </span><span style="font-family:Malgun Gothic">함께</span><span lang="en-US" style="font-family:Malgun Gothic"> </span><span style="font-family:Malgun Gothic">삽시다</span><span lang="en-US" style="font-family:Malgun Gothic">.</span></p>
			<br />
			<p style="font-family:Calibri;margin-top:0pt;margin-bottom:0pt"><span style="font-family:Malgun Gothic">내가</span><span lang="en-US" style="font-family:Malgun Gothic"> </span><span style="font-family:Malgun Gothic">나일</span><span lang="en-US" style="font-family:Malgun Gothic"> </span><span style="font-family:Malgun Gothic">수</span><span lang="en-US" style="font-family:Malgun Gothic"> </span><span style="font-family:Malgun Gothic">있게</span><span lang="en-US" style="font-family:Malgun Gothic"> </span><span style="font-family:Malgun Gothic">해주는</span><span lang="en-US" style="font-family:Malgun Gothic"> </span><span style="font-family:Malgun Gothic">사람은</span><span lang="en-US" style="font-family:Malgun Gothic"> </span><span style="font-family:Malgun Gothic">있었다</span><span lang="en-US" style="font-family:Malgun Gothic">. </span><span style="font-family:Malgun Gothic">나는</span><span lang="en-US" style="font-family:Malgun Gothic"> </span><span style="font-family:Malgun Gothic">언제나</span><span lang="en-US" style="font-family:Malgun Gothic"> </span><span style="font-family:Malgun Gothic">나였으니까</span><span lang="en-US" style="font-family:Malgun Gothic">.</span></p>
			<p style="font-family:Calibri;margin-top:0pt;margin-bottom:0pt"><span style="font-family:Malgun Gothic">하지만</span><span lang="en-US" style="font-family:Malgun Gothic">, </span><span style="font-family:Malgun Gothic">그</span><span lang="en-US" style="font-family:Malgun Gothic"> </span><span style="font-family:Malgun Gothic">사람이</span><span lang="en-US" style="font-family:Malgun Gothic"> </span><span style="font-family:Malgun Gothic">그</span><span lang="en-US" style="font-family:Malgun Gothic"> </span><span style="font-family:Malgun Gothic">사람일</span><span lang="en-US" style="font-family:Malgun Gothic"> </span><span style="font-family:Malgun Gothic">수</span><span lang="en-US" style="font-family:Malgun Gothic"> </span><span style="font-family:Malgun Gothic">있게</span><span lang="en-US" style="font-family:Malgun Gothic"> </span><span style="font-family:Malgun Gothic">해줄</span><span lang="en-US" style="font-family:Malgun Gothic"> </span><span style="font-family:Malgun Gothic">수</span><span lang="en-US" style="font-family:Malgun Gothic"> </span><span style="font-family:Malgun Gothic">있는</span><span lang="en-US" style="font-family:Malgun Gothic"> </span><span style="font-family:Malgun Gothic">나를</span><span lang="en-US" style="font-family:Malgun Gothic"> </span><span style="font-family:Malgun Gothic">만나는</span><span lang="en-US" style="font-family:Malgun Gothic"> </span><span style="font-family:Malgun Gothic">건</span><span lang="en-US" style="font-family:Malgun Gothic"> </span><span style="font-family:Malgun Gothic">그보다</span><span lang="en-US" style="font-family:Malgun Gothic"> </span><span style="font-family:Malgun Gothic">더</span><span lang="en-US" style="font-family:Malgun Gothic"> </span><span style="font-family:Malgun Gothic">어려운</span><span lang="en-US" style="font-family:Malgun Gothic"> </span><span style="font-family:Malgun Gothic">일이었다</span><span lang="en-US" style="font-family:Malgun Gothic">.</span></p>
			<br />
			<p style="font-family:Calibri;margin-top:0pt;margin-bottom:0pt"><span style="font-family:Malgun Gothic">나</span><span lang="en-US" style="font-family:Malgun Gothic">.</span><span style="font-family:Malgun Gothic">에</span><span lang="en-US" style="font-family:Malgun Gothic"> </span><span style="font-family:Malgun Gothic">방점을</span><span lang="en-US" style="font-family:Malgun Gothic"> </span><span style="font-family:Malgun Gothic">찍을</span><span lang="en-US" style="font-family:Malgun Gothic"> </span><span style="font-family:Malgun Gothic">것이라면</span><span lang="en-US" style="font-family:Malgun Gothic"> </span><span style="font-family:Malgun Gothic">결심은</span><span lang="en-US" style="font-family:Malgun Gothic"> </span><span style="font-family:Malgun Gothic">쉬웠을거다</span><span lang="en-US" style="font-family:Malgun Gothic">. </span><span style="font-family:Malgun Gothic">밤은</span><span lang="en-US" style="font-family:Malgun Gothic"> </span><span style="font-family:Malgun Gothic">길</span></p>
