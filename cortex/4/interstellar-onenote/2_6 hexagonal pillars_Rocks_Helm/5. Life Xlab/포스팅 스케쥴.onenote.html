<html lang="ko-KR">
	<head>
		<title>포스팅 스케쥴</title>
		<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />

	<body data-absolute-enabled="true" style="font-family:Malgun Gothic;font-size:11pt">
		<div style="position:absolute;left:48px;top:139px;width:720px">
			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt"><span style="font-size:9pt">ㅇ</span><span lang="en-US" style="font-size:9pt"> </span><span style="font-size:9pt">포스팅</span><span lang="en-US" style="font-size:9pt"> : </span><span style="font-size:9pt">우</span><span style="font-size:9pt">리</span><span lang="en-US" style="font-family:Calibri;font-size:9pt"> </span><span style="font-size:9pt">책</span><span lang="en-US" style="font-family:Calibri;font-size:9pt"> </span><span lang="en-US" style="font-size:9pt">버</span><span style="font-size:9pt">러지들을</span><span lang="en-US" style="font-family:Calibri;font-size:9pt"> </span><span lang="en-US" style="font-size:9pt">위</span><span style="font-size:9pt">한</span><span lang="en-US" style="font-family:Calibri;font-size:9pt"> </span><span lang="en-US" style="font-size:9pt">독</span><span style="font-size:9pt">서어플</span></p>
			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt"><span style="font-size:12pt">​</span></p>
			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt"><span style="font-family:돋움;font-size:12pt">명확하게 답해드린다. </span></p>
			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt"><span style="font-family:돋움;font-size:12pt">비즈니스는 선과 악에 관한 것이 아니다. </span></p>
			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt"><span style="font-size:12pt">​</span><span style="font-family:돋움;font-size:12pt">스토리를 만들어 내는 능력, 면접장에서의 임기응변을 통한 Back-up, 작문능력, 상상력, 도덕적 유연성, 모두 회사에서 필요로 하는 능력이다.</span></p>
			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt"><span style="font-family:돋움;font-size:12pt">이윤</span><span lang="en-US" style="font-size:12pt"> </span><span style="font-size:12pt">되느냐</span><span style="font-family:돋움;font-size:12pt">의 문제이다.</span></p>
			<br />
			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt"><span style="font-family:돋움;font-size:12pt">당신의 가치관과 비즈니스 자체가 상충된다면 이 길을 포기하라.</span></p>
			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt"><span style="font-family:돋움;font-size:12pt">그러나 이 길을 걷고자 한다면 윤리적 유연성을&#160;보다</span><span lang="en-US" style="font-family:돋움;font-size:12pt"> </span><span style="font-family:돋움;font-size:12pt">높이는&#160;것이</span><span lang="en-US" style="font-family:돋움;font-size:12pt"> </span><span style="font-family:돋움;font-size:12pt">자신의</span><span lang="en-US" style="font-family:돋움;font-size:12pt"> </span><span style="font-family:돋움;font-size:12pt">커리어와</span><span lang="en-US" style="font-family:돋움;font-size:12pt"> </span><span style="font-family:돋움;font-size:12pt">멘탈을</span><span lang="en-US" style="font-family:돋움;font-size:12pt"> </span><span style="font-family:돋움;font-size:12pt">위해서</span><span lang="en-US" style="font-family:돋움;font-size:12pt"> </span><span style="font-family:돋움;font-size:12pt">유익하다</span><span lang="en-US" style="font-family:돋움;font-size:12pt">.</span></p>
		</div>
