			<p style="font-family:Calibri;margin-top:0pt;margin-bottom:0pt"><span style="font-family:Source Sans Pro;font-size:12pt;color:#979796">다음중고녀라는 이름이 너무 유명해져서 개미녀라고 개명할까 했지만</span></p>

			<p style="font-family:Calibri;margin-top:0pt;margin-bottom:0pt"><span style="font-family:Source Sans Pro;font-size:12pt;color:#979796">요즘 완전 빠져 살고 있습니다..&#160;</span></p>

			<p style="font-family:Calibri;margin-top:0pt;margin-bottom:0pt"><span style="font-family:Source Sans Pro;font-size:12pt;color:#979796">&#160; 암튼 이제 사진 올라갑니다…&#160;</span></p>
			<p style="font-family:Calibri;margin-top:0pt;margin-bottom:0pt"><span style="font-family:Source Sans Pro;font-size:12pt;color:#979796">모자이크가 좀 심하긴한데 제가 좀 멘탈장애라서 그러니 이해해주세요…</span></p>
