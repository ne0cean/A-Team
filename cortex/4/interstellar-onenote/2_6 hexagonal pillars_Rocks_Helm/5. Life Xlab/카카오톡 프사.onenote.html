			<br />
			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt"><span style="font-family:맑은 고딕">어줍잖은 성과보다 확실한 성장</span><span style="font-family:맑은 고딕">￼</span><span style="font-family:맑은 고딕">촐싹대는 속도보다 명징한 방향</span><span style="font-family:맑은 고딕">￼</span><span style="font-family:맑은 고딕">깊이를 통한 높이 추구</span><span style="font-family:맑은 고딕">￼</span><span style="font-family:맑은 고딕">내용 없는 성공보다 가치 있는 실패</span><span style="font-family:맑은 고딕">￼</span><span style="font-family:맑은 고딕">내가 인정하는 사람으로부터의 인정</span><span style="font-family:맑은 고딕">￼</span><span style="font-family:맑은 고딕">닥친 일이 아닌 나아가는 일</span><span style="font-family:맑은 고딕">￼</span><span style="font-family:맑은 고딕">가냘픈 의지보다 축적된 습관</span><span style="font-family:맑은 고딕">￼</span></p>
			<p style="font-family:Calibri;margin-top:0pt;margin-bottom:0pt">장수가<span lang="en-US"> </span><span lang="en-US">무</span>능하면<span lang="en-US"> </span></p>
			<p lang="en-US" style="font-family:Calibri;margin-top:0pt;margin-bottom:0pt"><span style="font-family:Microsoft NeoGothic">병</span><span style="font-family:Microsoft NeoGothic">졸이</span> <span style="font-family:Microsoft NeoGothic">죽</span><span style="font-family:Microsoft NeoGothic">는다</span>.</p>
			<p lang="en-US" style="font-family:Calibri;margin-top:0pt;margin-bottom:0pt"><span style="font-family:Microsoft NeoGothic">미</span><span style="font-family:Microsoft NeoGothic">래</span> <span style="font-family:Microsoft NeoGothic">내</span> <span style="font-family:Microsoft NeoGothic">무</span><span style="font-family:Microsoft NeoGothic">능으로부</span>터</p>
			<p style="font-family:Calibri;margin-top:0pt;margin-bottom:0pt">내<span lang="en-US"> </span><span lang="en-US">후</span>배를<span lang="en-US"> </span><span lang="en-US">지</span>키기위해<span lang="en-US"> </span><span lang="en-US">공</span>부하자</p>
			<p style="font-family:Calibri;margin-top:0pt;margin-bottom:0pt">읽자</p>
