			<p style="font-family:Calibri;margin-top:0pt;margin-bottom:0pt"><span style="font-family:나눔고딕;font-size:9.5pt;color:#333333">1.&#160;</span><span style="font-family:나눔고딕;font-size:9.5pt;color:#333333;font-weight:bold">무조건 상승장에만 들어갑니다</span><span style="font-family:나눔고딕;font-size:9.5pt;color:#333333">.</span></p>
			<p style="font-family:Calibri;margin-top:0pt;margin-bottom:0pt"><span style="font-family:나눔고딕;font-size:9.5pt;color:#333333">&#160;</span></p>
			<p style="font-family:Calibri;margin-top:0pt;margin-bottom:0pt"><span style="font-family:나눔고딕;font-size:9.5pt;color:#333333">2&#160;</span><span style="font-family:나눔고딕;font-size:9.5pt;color:#333333;font-weight:bold">투입한 원금기준</span><span style="font-family:나눔고딕;font-size:9.5pt;color:#333333">&#160; 1%이하로&#160;떨어지는 경우&#160;</span><span style="font-family:나눔고딕;font-size:9.5pt;color:#333333;font-weight:bold">뒤도 안돌아보고 무조건 손절</span><span style="font-family:나눔고딕;font-size:9.5pt;color:#333333">합니다.</span></p>
			<p style="font-family:Calibri;margin-top:0pt;margin-bottom:0pt"><span style="font-family:나눔고딕;font-size:9.5pt;color:#333333">(예) 이더리움을 30만에 구입한 경우, 29만 7천원 이하로 떨어지는 경우 무조건 손절하고 빠져나옵니다.</span></p>
			<p style="font-family:Calibri;margin-top:0pt;margin-bottom:0pt"><span style="font-family:나눔고딕;font-size:9.5pt;color:#333333">&#160;</span></p>
			<p style="font-family:Calibri;margin-top:0pt;margin-bottom:0pt"><span style="font-family:나눔고딕;font-size:9.5pt;color:#333333">3.&#160;</span><span style="font-family:나눔고딕;font-size:9.5pt;color:#333333;font-weight:bold">투입한 원금기준</span><span style="font-family:나눔고딕;font-size:9.5pt;color:#333333">&#160; 5%이상 시세가 상승한 경우 무조건 뒤도 안돌아보고 매도합니다.</span></p>
			<p style="font-family:Calibri;margin-top:0pt;margin-bottom:0pt"><span style="font-family:나눔고딕;font-size:9.5pt;color:#333333">(예)이더리움을 30만에 구입한 경우, 31만 5천이 되면 무조건 매도하고 빠져나옵니다.</span></p>
