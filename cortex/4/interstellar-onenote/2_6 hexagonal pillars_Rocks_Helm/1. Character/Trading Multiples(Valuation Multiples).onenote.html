			<p style="font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt">분자에는 지금 Valuation의 대상이 되는 것의 가치가 들어갑니다. 그것이 회사 전체의 가치가 됐든, 주가가 됐든, 어떤 개별적인 프로젝트의 가치가 됐든 지금 내가 가치를 알고 싶은 바로 그것이 분자에 들어갑니다. 분자에 들어가는 것은 투자 대상 자산을 보유하기 위해 지불해야 하는 가격이기도 합니다.</p>
