			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt"><a href="http://blog.naver.com/tokitoc?Redirect=Log&amp;logNo=20195686214">http://blog.naver.com/tokitoc?Redirect=Log&amp;logNo=20195686214</a></p>
			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt"><a href="http://blog.naver.com/wings1027?Redirect=Log&amp;logNo=130174528890">http://blog.naver.com/wings1027?Redirect=Log&amp;logNo=130174528890</a></p>
			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt"><a href="http://blog.naver.com/shw4225?Redirect=Log&amp;logNo=140061962849">http://blog.naver.com/shw4225?Redirect=Log&amp;logNo=140061962849</a></p>
			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt"><a href="https://youtube.com/shorts/YnAhImNM6as?si=Nw8D3jVZv6fcWEYU">먹을게 못 됐다는 고대 채소들</a></p>
			<br />
			<iframe width="113" height="200" data-original-src="https://youtube.com/shorts/YnAhImNM6as?si=Nw8D3jVZv6fcWEYU" src="https://www.youtube.com/embed/YnAhImNM6as?feature=oembed&autoplay=true" />
			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt"><span style="font-size:11pt;font-weight:bold">[다이어트 식단] 박용우 박사가 제안하는 구석기 다이어트 식단</span></p>
			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt">&#160;</p>
			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt"><span style="color:#3a32c3;font-weight:bold">농경시대 이전 구석기시대 다이어트 방법</span></p>
			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt">1. 설탕, 액상과당, 트랜스지방, 정제탄수화물 및 다양한 식품첨가물이 들어있는 정제가공식품, 패스트푸드의 섭취를 피한다.</p>
			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt">2.&#160; 곡류, 콩류(콩, 두부, 땅콩), 감자류(감자, 고구마), 유제품(우유, 요거트, 치즈), 소금 섭취를 가급적 최소화한다.</p>
			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt">3.&#160;<span lang="en-US"> </span>단백질 음식을 충분히 섭취한다.&#160; </p>
			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt">&#160;<span lang="en-US"> - </span>생선<span lang="en-US">, </span>해산물은<span lang="en-US"> </span>마음껏<span lang="en-US">!</span></p>
			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt">&#160;<span lang="en-US"> - </span>소고기<span lang="en-US"> </span>살코기<span lang="en-US">, </span>돼지고기<span lang="en-US"> </span>보쌈<span lang="en-US"> </span>살코기<span lang="en-US">, </span>계란<span lang="en-US">, </span>닭가슴살<span lang="en-US"> </span>등은 충분히!</p>
			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt">&#160;<span lang="en-US"> - </span>건강에<span lang="en-US"> </span>해로운<span lang="en-US"> </span>지방이<span lang="en-US"> </span>많은<span lang="en-US"> </span>갈비<span lang="en-US">, </span>삼겹살<span lang="en-US"> </span>등은<span lang="en-US"> </span>적게<span lang="en-US">!</span></p>
			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt">4. 나물과 생채소, 해조류, 버섯 등은 매 끼니에 두접시 이상! </p>
			<img width="300" height="195" src="__ATTACHMENT__f21b61f8f9.png" data-src-type="image/jpeg" data-fullres-src="__ATTACHMENT__f21b61f8f9.png" data-fullres-src-type="image/jpeg" />
			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt">5. 식간에 아마씨가루(5~10그램), 견과류(잣, 호두, 아몬드),&#160;&#160;<span lang="en-US"> </span>씨앗류<span lang="en-US">(</span>호박씨<span lang="en-US">,</span>해바라기씨<span lang="en-US">)</span>를<span lang="en-US"> </span>한두 줌 정도 섭취한다.</p>
			<br />
			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt">6. 과일은 하루 2개를 넘지 않도록 한다.</p>
			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt">7. 물은 하루 최소 8컵 이상 충분히 섭취한다. </p>
			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt">&#160;</p>
			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt"><span style="color:#3a32c3;font-weight:bold">[허용식품]</span></p>
			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt"><span style="color:#3a32c3">채소류 (감자, 고구마,옥수수 제외)</span></p>
			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt"><span style="color:#3a32c3">토마토</span></p>
			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt"><span style="color:#3a32c3">해조류 (미역, 김, 다시마)</span></p>
			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt"><span style="color:#3a32c3">버섯류</span></p>
			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt"><span style="color:#3a32c3">계란, 메추리알</span></p>
			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt"><span style="color:#3a32c3">생선, 생선회</span></p>
			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt"><span style="color:#3a32c3">해산물 (굴, 조개, 새우,</span></p>
			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt"><span style="color:#3a32c3">게, 가재, 오징어 등)</span></p>
			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt"><span style="color:#3a32c3">닭고기</span></p>
			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt"><span style="color:#3a32c3">육류 살코기 (등심, 안심)</span></p>
			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt"><span style="color:#3a32c3">견과류(잣, 호두, 아몬드),</span></p>
			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt"><span style="color:#3a32c3">씨앗류(호박씨,해바라기씨)</span></p>
			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt"><span style="color:#3a32c3">식물성 기름(올리브유,</span></p>
			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt"><span style="color:#3a32c3">카놀라유,들기름,포도씨유) </span></p>
			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt"><span style="color:#3a32c3">녹차,홍차,우롱차</span></p>
			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt">&#160;</p>
			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt"><span style="color:#7820b9;font-weight:bold">[조절식품]</span></p>
			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt"><span style="color:#7820b9">현미, 잡곡, 과일</span></p>
			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt">&#160;</p>
			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt"><span style="color:#ef007c;font-weight:bold">[제한식품]</span></p>
			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt"><span style="color:#ef007c">술 : 와인으로 하루1잔 </span></p>
			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt"><span style="color:#ef007c">당질 음식 : 떡, 흰밀가루빵, 케익</span></p>
			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt"><span style="color:#ef007c">면종류(국수, 라면, 자장면, 파스타 등),</span></p>
			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt"><span style="color:#ef007c">흰쌀밥</span></p>
			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt"><span style="color:#ef007c">콘푸레이크</span></p>
			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt"><span style="color:#ef007c">감자, 고구마, 옥수수</span></p>
			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt"><span style="color:#ef007c">유제품 : 우유, 요거트, 치즈</span></p>
			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt"><span style="color:#ef007c">포화지방이 많은 음식 : 삼겹살, 갈비</span></p>
			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt">&#160;</p>
			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt"><span style="color:red;font-weight:bold">[금기식품]</span></p>
			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt"><span style="color:red">설탕, 액상과당 : 설탕이 들어간 청량음료, 커피믹스, 자판기 커피, 과자, 사탕, 스낵, 도넛, 아이스크림 등</span></p>
			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt"><span style="color:red">트랜스지방 : 과자, 스낵, 라면, 도넛, 냉동피자, 전자렌지용팝콘, 감자튀김 등</span></p>
