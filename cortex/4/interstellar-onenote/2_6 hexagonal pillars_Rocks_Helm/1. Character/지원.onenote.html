			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt">이상복M이랑  오후 02:28</p>
			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt">김경우M인가</p>
			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt">이게 사무환경은 신영훈/이상복M인데</p>

			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt">ㅜㅜ</p>
			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt">김준영(June-young Kim KIM)/서부마케팅본부 서부마케팅기획팀/SKT 님의 말</p>
			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt">ㅎㅎ 고맙다 ~  오후 02:29</p>
			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt">최현경/서비스제도팀/SK 텔레콤 님의 말</p>
			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt">ㅎㅎ 김정훈 회의실관리자님께  오후 02:29</p>
			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt">문의하면 알려줄겨</p>
			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt">힘냉  오후 02:30</p>
