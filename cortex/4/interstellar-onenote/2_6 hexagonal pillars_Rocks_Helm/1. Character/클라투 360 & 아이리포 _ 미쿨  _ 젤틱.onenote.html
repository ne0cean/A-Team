			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt">클라투 <span lang="en-US">360 &amp; </span>아이리포<span lang="en-US"> &gt; </span>미쿨 <span lang="en-US"> &gt; </span>젤틱 </p>
			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt">카복시<span lang="en-US"> : </span>이산화탄소<span lang="en-US"> </span>주사<span lang="en-US"> - </span>원클리닉</p>
			<br />
			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt">명동<span lang="en-US"> </span>루비클리닉<span lang="en-US">, </span></p>
			<p lang="en-US" style="font-size:10pt;margin-top:0pt;margin-bottom:0pt">4<span lang="ko-KR">패드</span> + <span lang="ko-KR">아이리포</span> 2<span lang="ko-KR">회</span> = 40<span lang="ko-KR">만원</span></p>
			<br />
			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt"><span style="font-family:돋움;font-size:9pt">미쿨과 클라투는 모두 한국에서 만들어진 냉각지방파괴술장비인데요,</span></p>
			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt"><span style="font-family:돋움;font-size:9pt">미쿨보다는 클라투가 더 최신에 나온 장비이며,</span></p>
			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt"><span style="font-family:돋움;font-size:9pt">보다 넓은 범위를 세밀하게 관리해준다는 장점이 있답니다^^</span></p>
