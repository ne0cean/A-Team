			<p lang="en-US" style="font-family:Calibri;margin-top:0pt;margin-bottom:0pt"><span style="font-family:Malgun Gothic">식품으로는</span> <span style="font-family:Malgun Gothic">검은콩</span>(<span style="font-family:Malgun Gothic">시스테인</span>)<span style="font-family:Malgun Gothic">과</span> <span style="font-family:Malgun Gothic">검은깨</span>(<span style="font-family:Malgun Gothic">캐라틴</span>), <span style="font-family:Malgun Gothic">다시마</span> <span style="font-family:Malgun Gothic">등</span> <span style="font-family:Malgun Gothic">해조류를</span> <span style="font-family:Malgun Gothic">많이</span> <span style="font-family:Malgun Gothic">섭취하면</span> <span style="font-family:Malgun Gothic">좋습니다</span>.&#160;</p>
			<p lang="en-US" style="font-family:Calibri;margin-top:0pt;margin-bottom:0pt"><span style="font-family:Malgun Gothic">특히 하루에 김을</span> 2<span style="font-family:Malgun Gothic">장이상만 꾸준히 먹으면 요오드 부족현상을 방지할 수 있습니다</span>.&#160;</p>
		</div>
