플롯plot이 란 &#39;쓰다, 묘사하다, 점을 찍다, 놓다&#39; 등의 의미를 갖는다 
스토리의 전체적인 들이나 개요를 말하는데, 즉 브랜드 스토리의 설

야 한다.

2. 언제?=시대 
3. 어디에서?=장소 
4. 누가?=주인공 
5. 왜?=동기 
6. 무엇을 할 것인가?=목적 
7. 주인공의 적은 누구인가?=악역

9. 마지막에는 어떻게 될 것인가?=끝머리
