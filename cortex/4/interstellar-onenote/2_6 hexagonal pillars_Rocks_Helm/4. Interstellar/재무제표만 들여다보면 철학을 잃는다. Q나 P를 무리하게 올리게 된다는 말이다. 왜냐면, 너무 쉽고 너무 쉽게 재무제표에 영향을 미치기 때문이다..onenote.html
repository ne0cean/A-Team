		<div style="position:absolute;left:48px;top:139px;width:720px">
			<p style="font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt">재무제표만<span lang="en-US"> </span>들여다보면<span lang="en-US"> </span>철학을<span lang="en-US"> </span>잃는다<span lang="en-US">. Q</span>나<span lang="en-US"> P</span>를<span lang="en-US"> </span>무리하게<span lang="en-US"> </span>올리게<span lang="en-US"> </span>된다는<span lang="en-US"> </span>말이다<span lang="en-US">. </span>왜냐면<span lang="en-US">, </span>너무<span lang="en-US"> </span>쉽고<span lang="en-US"> </span>너무<span lang="en-US"> </span>쉽게<span lang="en-US"> </span>재무제표에<span lang="en-US"> </span>영향을<span lang="en-US"> </span>미치기<span lang="en-US"> </span>때문이다<span lang="en-US">.</span></p>
			<p style="font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt">기업의<span lang="en-US"> </span>철학대로<span lang="en-US"> </span>운영되고<span lang="en-US"> </span>있는지<span lang="en-US"> </span>리뷰하는<span lang="en-US"> </span>프레임웍이<span lang="en-US"> </span>필요하다<span lang="en-US">.</span></p>
			<p style="font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt">철학담당<span lang="en-US"> </span>임원<span lang="en-US">, </span>자이로<span lang="en-US"> </span>센서가<span lang="en-US"> </span>필요하다<span lang="en-US">. </span>즉<span lang="en-US"> </span>법인의<span lang="en-US"> Personality</span>를<span lang="en-US"> </span>담당하는<span lang="en-US"> </span>임원이<span lang="en-US"> </span>필요하다<span lang="en-US">.</span></p>
			<br />
			<p style="font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt">본질은 흔들지 말되 껍질은 끊임없이 바꿔야 한다.</p>
