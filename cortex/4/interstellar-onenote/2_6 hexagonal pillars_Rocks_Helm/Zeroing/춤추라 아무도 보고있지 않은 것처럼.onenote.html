	<body data-absolute-enabled="true" style="font-family:Malgun Gothic;font-size:11pt">
		<div style="position:absolute;left:48px;top:139px;width:327px">
			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt"><span style="font-family:Dotum;font-size:11pt;color:black">춤추라 아무도 보고있지 않은 것처럼</span></p>
			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt"><span style="font-family:Dotum;font-size:11pt;color:black">사랑하라 한번도 상처받지 않은 것처럼</span></p>
			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt"><span style="font-family:Dotum;font-size:11pt;color:black">노래하라 아무도 듣고있지 않은 것처럼</span></p>
			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt"><span style="font-family:Dotum;font-size:11pt;color:black">일하라 돈이 필요하지 않은 것처럼</span></p>
			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt"><span style="font-family:Dotum;font-size:11pt;color:black">살라 오늘이 삶의 마지막 날인 것처럼</span></p>
			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt"><span style="font-family:Dotum;font-size:11pt;color:black">&#160;</span></p>
			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt"><span style="font-family:Dotum;font-size:11pt;color:black">- Alfred D. Suja</span></p>
			<br />
			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt"><span style="font-family:Dotum;color:black">인생은</span><span lang="en-US" style="font-family:Calibri;color:black"> </span><span style="font-family:Dotum;color:black">한번뿐</span></p>
			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt"><span style="font-family:Dotum;color:black">후회하지마</span><span style="font-family:Calibri;color:black">요</span></p>
			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt"><span style="color:black">진짜</span><span style="font-family:Calibri;color:black">로</span><span lang="en-US" style="font-family:Calibri;color:black"> </span><span lang="en-US" style="color:black">가</span><span style="color:black">지</span><span style="font-family:Calibri;color:black">고</span></p>
			<p lang="en-US" style="font-size:10pt;margin-top:0pt;margin-bottom:0pt"><span style="font-family:Microsoft NeoGothic;color:black">싶</span><span style="font-family:Microsoft NeoGothic;color:black">은걸</span><span style="font-family:Calibri;color:black"> </span><span style="font-family:Microsoft NeoGothic;color:black">가</span><span style="font-family:Microsoft NeoGothic;color:black">져</span><span style="font-family:Calibri;color:black">요</span></p>
			<br />
			<p lang="en-US" style="font-size:10pt;margin-top:0pt;margin-bottom:0pt"><span style="font-family:Calibri;color:black"> </span></p>
			<br />
			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt"><span style="font-family:Dotum;color:black">우당</span><span lang="en-US" style="font-family:Calibri;color:black"> </span><span lang="en-US" style="font-family:Dotum;color:black">이</span><span style="font-family:Dotum;color:black">회영</span></p>
			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt"><span style="font-family:Dotum;color:black">엘론</span><span lang="en-US" style="font-family:Calibri;color:black"> </span><span lang="en-US" style="font-family:Dotum;color:black">머</span><span style="font-family:Dotum;color:black">스</span><span style="font-family:Calibri;color:black">크</span></p>
			<p style="font-size:10pt;margin-top:0pt;margin-bottom:0pt"><span style="color:black">래</span><span style="font-family:Calibri;color:black">리</span><span lang="en-US" style="font-family:Calibri;color:black"> </span><span style="color:black">페이</span><span style="font-family:Calibri;color:black">지</span><span lang="en-US" style="font-family:Calibri;color:black"> &amp;  </span></p>
