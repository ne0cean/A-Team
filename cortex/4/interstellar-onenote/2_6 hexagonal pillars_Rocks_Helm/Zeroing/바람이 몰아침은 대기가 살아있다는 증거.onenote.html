	<body data-absolute-enabled="true" style="font-family:Malgun Gothic;font-size:11pt">
		<div style="position:absolute;left:48px;top:139px;width:720px">
			<br />
			<p style="font-family:Calibri;margin-top:0pt;margin-bottom:0pt"><span style="font-family:Malgun Gothic;font-size:10pt">바람이 몰아침은 대기가 살아있다는 증거</span></p>
			<p style="font-family:Calibri;margin-top:0pt;margin-bottom:0pt"><span style="font-family:Malgun Gothic;font-size:10pt">파도가 일렁임은 바다가 살아있다는 증거</span></p>
			<p style="font-family:Calibri;margin-top:0pt;margin-bottom:0pt"><span style="font-family:Malgun Gothic;font-size:10pt">내</span></p>
			<p style="font-family:Calibri;margin-top:0pt;margin-bottom:0pt"><span style="font-family:Malgun Gothic;font-size:10pt">마음의 방황은 내가 살아있다는 증거</span></p>
			<br />
			<p style="font-family:Calibri;margin-top:0pt;margin-bottom:0pt"><span style="font-family:Malgun Gothic;font-size:10pt">모든 것은 변화하기 때문에</span></p>
			<p style="font-family:Calibri;margin-top:0pt;margin-bottom:0pt"><span style="font-family:Malgun Gothic;font-size:10pt">그러니깐, 영원한건 하나도 없기 때문에</span></p>
			<p style="font-family:Calibri;margin-top:0pt;margin-bottom:0pt"><span style="font-family:Malgun Gothic;font-size:10pt">우리의 노력이 의미를 가질 수 있는거야.</span></p>
			<br />
			<p style="font-family:Calibri;margin-top:0pt;margin-bottom:0pt"><span style="font-family:Malgun Gothic;font-size:10pt">이 세상에 영원한건 영원히 없어.</span></p>
			<br />
			<p style="font-family:Calibri;margin-top:0pt;margin-bottom:0pt"><span style="font-family:Malgun Gothic;font-size:10pt">언젠가 행복해 지기를 기다리지 않아</span></p>
			<p style="font-family:Calibri;margin-top:0pt;margin-bottom:0pt"><span style="font-family:Malgun Gothic;font-size:10pt">다만 오늘의 행복을 쌓아갈뿐</span></p>
			<br />
			<br />
			<p style="font-family:Calibri;margin-top:0pt;margin-bottom:0pt"><span style="font-family:Malgun Gothic;font-size:10pt">매력이 넘치는 세상이다. 허나 예절만한 매력은 없는 것이다.</span></p>
			<p style="font-family:Calibri;margin-top:0pt;margin-bottom:0pt"><span style="font-family:Malgun Gothic;font-size:10pt">인사 잘해라. 성공의 기본 중의 기본이다.</span></p>
			<p style="font-family:Calibri;margin-top:0pt;margin-bottom:0pt"><span style="font-family:Malgun Gothic;font-size:10pt">인사성 밝은놈중에 뭐하나 허술한놈 본적 없다.</span></p>
			<br />
		</div>
