<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Twilight Mood board</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #1e1e1e;
  color: #e0e0e0;
  font-family: 'Segoe UI', -apple-system, sans-serif;
  font-size: 15px;
  line-height: 1.6;
  padding: 20px 30px 60px;
}
a { color: #6cb0f6; text-decoration: none; }
a:hover { text-decoration: underline; }

.title-bar {
  background: #3a3a5c;
  display: inline-block;
  padding: 6px 16px;
  font-size: 22px;
  font-weight: bold;
  color: #fff;
  margin-bottom: 4px;
}
.date { color: #999; font-size: 13px; margin-bottom: 20px; }

/* Masonry default layout */
.board {
  column-count: 4;
  column-gap: 14px;
  position: relative;
}
@media (max-width: 1200px) { .board { column-count: 3; } }
@media (max-width: 800px) { .board { column-count: 2; } }
@media (max-width: 500px) { .board { column-count: 1; } }

/* Free-form mode (activated when any card is dragged) */
.board.freeform {
  column-count: unset;
  min-height: 3000px;
}
.board.freeform .card {
  position: absolute;
  break-inside: unset;
}

.card {
  background: #2a2a2a;
  border: 1px solid #3a3a3a;
  border-radius: 8px;
  padding: 12px;
  position: relative;
  break-inside: avoid;
  margin-bottom: 14px;
  cursor: grab;
  transition: box-shadow 0.2s;
}
.card:hover { box-shadow: 0 0 0 1px #58a6ff; z-index: 10; }
.card.moving { opacity: 0.7; box-shadow: 0 4px 20px rgba(0,0,0,0.5); z-index: 100; cursor: grabbing; position: fixed !important; }
.card img {
  max-width: 100%;
  border-radius: 4px;
  display: block;
  margin: 4px 0;
}
.card .text {
  outline: none;
  min-height: 20px;
  white-space: pre-wrap;
  word-break: break-word;
}
.card .text:focus { background: rgba(255,255,255,0.05); border-radius: 4px; padding: 4px; }
.card .text:empty::before { content: '텍스트 입력...'; color: #555; }
.card-actions {
  position: absolute;
  top: 4px;
  right: 4px;
  display: none;
  gap: 4px;
}
.card:hover .card-actions { display: flex; }
.card-btn {
  background: #333;
  border: 1px solid #555;
  color: #ccc;
  border-radius: 4px;
  padding: 2px 6px;
  font-size: 11px;
  cursor: pointer;
}
.card-btn:hover { background: #444; color: #fff; }

.resize-handle {
  position: absolute;
  bottom: 0; right: 0;
  width: 14px; height: 14px;
  cursor: se-resize;
  opacity: 0;
}
.card:hover .resize-handle { opacity: 0.5; }
.resize-handle::after {
  content: '';
  position: absolute;
  bottom: 3px; right: 3px;
  width: 8px; height: 8px;
  border-right: 2px solid #666;
  border-bottom: 2px solid #666;
}

.toolbar {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: #161b22;
  border-top: 1px solid #30363d;
  padding: 8px 20px;
  display: flex;
  gap: 12px;
  align-items: center;
  z-index: 100;
}
.toolbar button {
  background: #21262d;
  border: 1px solid #30363d;
  color: #e0e0e0;
  padding: 6px 14px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 13px;
}
.toolbar button:hover { background: #30363d; }
.toolbar .status { color: #8b949e; font-size: 12px; margin-left: auto; }
.toolbar .mode-indicator { color: #f0c040; font-size: 11px; }

.highlight-red { color: #ff6b6b; }
.highlight-blue { color: #6cb0f6; }
.source { color: #888; font-size: 13px; margin: 4px 0; }
</style>
</head>
<body>

<div class="title-bar" contenteditable="true">Twilight Mood board</div>
<div class="date">2024년 8월 4일 일요일 오후 4:16</div>

<div class="board" id="board"></div>

<div class="toolbar">
  <button onclick="addTextCard()">+ 텍스트</button>
  <button onclick="addImageCard()">+ 이미지</button>
  <button onclick="toggleMode()">⇄ 모드 전환</button>
  <button onclick="saveBoard()">💾 저장</button>
  <button onclick="exportBoard()">📤 내보내기</button>
  <button onclick="resetLayout()">↺ 초기화</button>
  <span class="mode-indicator" id="modeLabel">📌 Masonry</span>
  <span class="status" id="status">Ready</span>
</div>

<script>
const SAVE_KEY = 'twilight-mood-board-v2';
const IMG_BASE = '../../attachments/onenote/';

const DEFAULT_CARDS = [
  { type: 'text', content: `<a href="https://www.ytn.co.kr/_ln/0104_201704131135438931">YTN 기사</a>\n<a href="https://www.instagram.com/reel/C8Y71lZRuvF/">Move Forward</a> - Sam Altman\n<a href="https://www.instagram.com/reel/C3j55KJPA4H/">부의</a> 갓길 차선` },
  { type: 'text', content: `아무 것도 하지 않은 대가 역시 치르게 될 것이다.\n<span class="highlight-red">망해봤자 잃는 건 넷플릭스 볼 수 있었던 주말 이틀 뿐</span>\n<span class="highlight-blue">고정우 곽석영 이윤행을봐.</span> 여기서 잘 되어봤자 지역팀 팀장이야 그걸 원해?` },
  { type: 'image', src: '31ccac0100.png' },
  { type: 'image', src: '956d836bd8.png' },
  { type: 'text', content: `고통은 두개골 속에 갇혀 있는 뇌가 자기 맘대로 외쳐대는 반응일 뿐이다.\n세상의 것이 아니다.\n3인칭으로 스스로를 바라보고, 2인칭으로 도전/추동하라` },
  { type: 'image', src: '9856b73cc5.png', link: 'https://www.instagram.com/reel/C8Y71lZRuvF/' },
  { type: 'image', src: 'ecaac0c867.png' },
  { type: 'image', src: '29abc454a6.png' },
  { type: 'image', src: '32f86b5f12.png' },
  { type: 'image', src: '8f937c299c.png' },
  { type: 'image', src: '59c8db2247.png' },
  { type: 'text', content: `마이크가 꾸준함을 유지해온 방법:\n• 매일 예술 작품을 만들도록 강제하기\n• 지루함을 피하기 위해 계속해서 기술을 확장\n• 매일 포스팅하기\n• 작품을 만들수록 쉬워졌다\n\n출처: <a href="https://eopla.net/magazines/20543#">eopla.net</a>\n\n처음부터 완벽한 아이디어는 없어요. 그냥 시작하세요. 그리고 포기하지 마세요.` },
  { type: 'image', src: '14c5c1fe0f.png' },
  { type: 'image', src: '1d63007967.png' },
  { type: 'image', src: 'e912ef143a.png' },
  { type: 'image', src: 'ceb1e41a8e.png', link: 'https://www.instagram.com/reel/C-FMoYkR2yn/' },
  { type: 'image', src: '7c61a23d5c.png', link: 'https://www.instagram.com/reel/C-FMoYkR2yn/' },
  { type: 'image', src: 'f0a05cbaf9.png' },
  { type: 'image', src: 'a81c7e6f0a.png' },
  { type: 'image', src: '5250262a75.png' },
  { type: 'image', src: 'a8aaa7575d.png' },
  { type: 'image', src: '1bcd49b38d.png' },
  { type: 'text', content: `<b style="font-size:24px">Necessity is the mother of invention</b>` },
  { type: 'image', src: '7cba8813bd.png', link: 'https://www.instagram.com/reel/DGZljqeTIg8/' },
  { type: 'image', src: '5fea11746f.png' },
  { type: 'image', src: 'b8f5a8c53d.png' },
  { type: 'image', src: 'e8ed930fba.png' },
  { type: 'image', src: '0938fb48bc.png' },
  { type: 'image', src: 'ddacd7a4b5.png' },
  { type: 'text', content: `학교에 가라. 취업해라. 상처받아라. 피해자 노릇을 해라. 65세에 은퇴해라.\n\n이것은 이미 실패가 예견된, 낡은 길이다.\n\n• 남들이 정해준 알려진 길을 거부하라\n• 미지의 영역으로 과감히 뛰어들어라\n• 마음을 확장하기 위해 새롭고 더 높은 목표를 세워라\n• 혼란을 기꺼이 받아들이고 성장을 허용하라\n• 자연의 보편적인 원리를 공부하라\n• 깊이 있는 제너럴리스트가 되어라` },
  { type: 'image', src: '42e9c95c55.png' },
  { type: 'text', content: `• 만약 다음 5년 동안 아무것도 변하지 않는다면, 당신의 평범한 화요일은 어떤 모습일까?\n• 위 상황을 10년으로 확장하라. 당신은 무엇을 놓쳤는가?\n• 당신은 인생의 끝자락에 서 있다. 안전한 버전의 삶만 살았고 패턴을 한 번도 깨지 못했다. 그 대가는 무엇인가?\n• 실제로 변화하기 위해 당신이 버려야 할 정체성은 무엇인가?\n• 당신이 지금까지 변하지 못한 가장 창피한 진짜 이유는 무엇인가?\n• 만약 현재의 행동이 일종의 자기보호 수단이라면, 당신은 구체적으로 무엇을 보호하고 있는가?` },
  { type: 'text', content: `기다리지 마세요. 무엇을 할지 결정하기 위해 대학 졸업 때까지 기다리지 마세요. X라는 일을 하기 위해 반드시 X라는 직업을 가질 필요는 없습니다. 종종 스스로 어떤 형태로든 그 일을 바로 시작할 수 있습니다.` },
];

let cards = [];
let freeform = false;
let moving = null; // { idx, startX, startY, cardX, cardY }
let resizing = null;

function loadBoard() {
  const saved = localStorage.getItem(SAVE_KEY);
  if (saved) {
    const parsed = JSON.parse(saved);
    cards = parsed.cards || parsed;
    freeform = parsed.freeform || false;
  } else {
    cards = DEFAULT_CARDS.map(c => ({...c}));
    freeform = false;
  }
  updateMode();
  render();
}

function syncText() {
  document.querySelectorAll('.card').forEach(el => {
    const idx = +el.dataset.idx;
    if (cards[idx]?.type === 'text') {
      const textEl = el.querySelector('.text');
      if (textEl) cards[idx].content = textEl.innerHTML;
    }
  });
}

function saveBoard() {
  syncText();
  localStorage.setItem(SAVE_KEY, JSON.stringify({ cards, freeform }));
  document.getElementById('status').textContent = '저장됨 ' + new Date().toLocaleTimeString();
}

function updateMode() {
  const board = document.getElementById('board');
  const label = document.getElementById('modeLabel');
  if (freeform) {
    board.classList.add('freeform');
    label.textContent = '🔓 Free-form';
  } else {
    board.classList.remove('freeform');
    label.textContent = '📌 Masonry';
  }
}

function toggleMode() {
  syncText();
  freeform = !freeform;
  if (freeform) {
    // Capture current rendered positions before switching
    document.querySelectorAll('.card').forEach(el => {
      const idx = +el.dataset.idx;
      const rect = el.getBoundingClientRect();
      cards[idx].x = rect.left - 30 + window.scrollX;
      cards[idx].y = rect.top - document.getElementById('board').getBoundingClientRect().top;
      cards[idx].w = rect.width;
    });
  }
  updateMode();
  render();
  saveBoard();
}

function render() {
  const board = document.getElementById('board');
  board.innerHTML = '';

  cards.forEach((card, i) => {
    const el = document.createElement('div');
    el.className = 'card';
    el.dataset.idx = i;

    if (freeform) {
      el.style.left = (card.x || 0) + 'px';
      el.style.top = (card.y || 0) + 'px';
      if (card.w) el.style.width = card.w + 'px';
    }

    // Drag to move
    el.addEventListener('mousedown', e => {
      if (e.target.closest('.text, a, .card-btn, .resize-handle')) return;
      e.preventDefault();
      const rect = el.getBoundingClientRect();
      moving = {
        idx: i,
        startX: e.clientX,
        startY: e.clientY,
        elemX: rect.left,
        elemY: rect.top,
        w: rect.width
      };
      el.classList.add('moving');
      el.style.left = rect.left + 'px';
      el.style.top = rect.top + 'px';
      el.style.width = rect.width + 'px';
    });

    // Actions
    const actions = document.createElement('div');
    actions.className = 'card-actions';
    const delBtn = document.createElement('button');
    delBtn.className = 'card-btn';
    delBtn.textContent = '×';
    delBtn.onclick = (e) => { e.stopPropagation(); if (confirm('삭제?')) { cards.splice(i, 1); render(); saveBoard(); } };
    actions.appendChild(delBtn);
    el.appendChild(actions);

    if (card.type === 'text') {
      const text = document.createElement('div');
      text.className = 'text';
      text.contentEditable = true;
      text.innerHTML = card.content || '';
      text.addEventListener('blur', () => { card.content = text.innerHTML; saveBoard(); });
      el.appendChild(text);
    } else if (card.type === 'image') {
      const img = document.createElement('img');
      img.src = card.src.startsWith('http') || card.src.startsWith('data:') ? card.src : IMG_BASE + card.src;
      img.alt = '';
      img.loading = 'lazy';
      img.onerror = () => { img.style.display = 'none'; };
      if (card.link) {
        const a = document.createElement('a');
        a.href = card.link;
        a.target = '_blank';
        a.appendChild(img);
        el.appendChild(a);
      } else {
        el.appendChild(img);
      }
    }

    // Resize handle (freeform only)
    if (freeform) {
      const rh = document.createElement('div');
      rh.className = 'resize-handle';
      rh.addEventListener('mousedown', e => {
        e.preventDefault();
        e.stopPropagation();
        resizing = { idx: i, startX: e.clientX, startW: card.w || el.offsetWidth };
      });
      el.appendChild(rh);
    }

    board.appendChild(el);
  });
}

// Mouse move/up for drag and resize
document.addEventListener('mousemove', e => {
  if (moving) {
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`);
    if (!el) return;
    el.style.left = (moving.elemX + e.clientX - moving.startX) + 'px';
    el.style.top = (moving.elemY + e.clientY - moving.startY) + 'px';
  }
  if (resizing) {
    const card = cards[resizing.idx];
    card.w = Math.max(120, resizing.startW + e.clientX - resizing.startX);
    const el = document.querySelector(`.card[data-idx="${resizing.idx}"]`);
    if (el) el.style.width = card.w + 'px';
  }
});

document.addEventListener('mouseup', e => {
  if (moving) {
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`);
    if (el) {
      el.classList.remove('moving');
      if (!freeform) {
        // Switch to freeform and capture all positions
        freeform = true;
        document.querySelectorAll('.card').forEach(cel => {
          const ci = +cel.dataset.idx;
          if (ci === moving.idx) return;
          const rect = cel.getBoundingClientRect();
          const boardRect = document.getElementById('board').getBoundingClientRect();
          cards[ci].x = rect.left - boardRect.left;
          cards[ci].y = rect.top - boardRect.top + window.scrollY;
          cards[ci].w = rect.width;
        });
      }
      const boardRect = document.getElementById('board').getBoundingClientRect();
      cards[moving.idx].x = (moving.elemX + e.clientX - moving.startX) - boardRect.left;
      cards[moving.idx].y = (moving.elemY + e.clientY - moving.startY) - boardRect.top + window.scrollY;
      cards[moving.idx].w = moving.w;
      updateMode();
      render();
      saveBoard();
    }
    moving = null;
  }
  if (resizing) {
    resizing = null;
    saveBoard();
  }
});

function addTextCard() {
  cards.push({ type: 'text', content: '' });
  render();
  setTimeout(() => {
    const els = document.querySelectorAll('.card .text');
    els[els.length - 1]?.focus();
  }, 100);
}

function addImageCard() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = 'image/*';
  input.onchange = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      cards.push({ type: 'image', src: reader.result });
      render();
      saveBoard();
    };
    reader.readAsDataURL(file);
  };
  input.click();
}

function exportBoard() {
  syncText();
  const blob = new Blob([JSON.stringify(cards, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'twilight-mood-board.json';
  a.click();
}

function resetLayout() {
  if (!confirm('기본 배치(Masonry)로 초기화?\n커스텀 위치가 모두 사라집니다.')) return;
  localStorage.removeItem(SAVE_KEY);
  // Also clear old key
  localStorage.removeItem('twilight-mood-board');
  cards = DEFAULT_CARDS.map(c => ({...c}));
  freeform = false;
  updateMode();
  render();
}

setInterval(saveBoard, 30000);
loadBoard();
</script>
</body>
</html>
