    "html": "\r\n\t\t\t<table style=\"border:0px\">\r\n\t\t\t\t<tr>\r\n\t\t\t\t\t<td style=\"background-color:#1a1b1b;border:0px\"><p lang=\"ko\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><a href=\"https://blog.google/outreach-initiatives/entrepreneurs/effective-founders-project/\" lang=\"ko-KR\" style=\"font-family:Apple SD Gothic Neo;font-size:10pt;font-weight:bold\">가장 효과적인 창업자들을 연구해서 얻은 교훈들</a></p>\r\n\t\t\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Apple SD Gothic Neo;font-size:10pt;color:#848281\">&#160;</span><span style=\"font-family:Apple SD Gothic Neo;font-size:10pt;color:#868380\">(blog.google)</span></p>\r\n\t\t\t\t\t</td>\r\n\t\t\t\t</tr>\r\n\t\t\t\t<tr>\r\n\t\t\t\t\t<td style=\"background-color:#1a1b1b;border:0px;font-family:Calibri\"><span style=\"font-family:Apple SD Gothic Neo;font-size:10pt;color:#868380\">17P by</span><span lang=\"ko\" style=\"font-family:Apple SD Gothic Neo;font-size:10pt;color:#868380\">&#160;</span><a href=\"https://news.hada.io/user?id=xguru\" style=\"font-family:Apple SD Gothic Neo;font-size:10pt\">xguru</a><span lang=\"ko\" style=\"font-family:Apple SD Gothic Neo;font-size:10pt;color:#868380\">&#160;</span><span style=\"font-family:Apple SD Gothic Neo;font-size:10pt;color:#868380\">9시간전</span><span lang=\"ko\" style=\"font-family:Apple SD Gothic Neo;font-size:10pt;color:#868380\">&#160;</span><span style=\"font-family:Apple SD Gothic Neo;font-size:10pt;color:#868380\">|</span><span lang=\"ko\" style=\"font-family:Apple SD Gothic Neo;font-size:10pt;color:#868380\">&#160;</span><a href=\"http://javascript:fav(6792,%20%22favorite%22)\" style=\"font-family:Apple SD Gothic Neo;font-size:10pt\">favorite</a><span style=\"font-family:Apple SD Gothic Neo;font-size:10pt;color:#868380\">&#160;|</span><span lang=\"ko\" style=\"font-family:Apple SD Gothic Neo;font-size:10pt;color:#868380\">&#160;</span><a href=\"https://news.hada.io/topic?id=6792\" style=\"font-family:Apple SD Gothic Neo;font-size:10pt\">댓글 2개</a></td>\r\n\t\t\t\t</tr>\r\n\t\t\t\t<tr>\r\n\t\t\t\t\t<td style=\"background-color:#1a1b1b;border:0px\">\t\t\t\t\t<br />\r\n\t\t\t\t\t<ul>\r\n\t\t\t\t\t\t<br />\r\n\t\t\t\t\t\t<li style=\"font-family:Calibri\"><span style=\"font-family:Apple SD Gothic Neo;font-size:10pt;color:#868380\">55%의 스타트업은 사람 문제로 실패함</span></li>\r\n\t\t\t\t\t\t<li style=\"font-family:Calibri\"><span style=\"font-family:Apple SD Gothic Neo;font-size:10pt;color:#868380\">Google for Startups에서 40개국, 900명의 창업자/CEO/CTO를 조사</span><span style=\"font-family:Apple SD Gothic Neo;font-size:10pt;color:#868380\">￼</span><span style=\"font-family:Apple SD Gothic Neo;font-size:10pt;color:#868380\">→ 최고의 리더십 전략들을 정리해서 &#39;Effective Founders Project&#39; PDF(59p)로 공개</span></li>\r\n\t\t\t\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Apple SD Gothic Neo;font-size:10pt;color:#868380;font-weight:bold\">핵심 7가지</span></p>\r\n\t\t\t\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Apple SD Gothic Neo;font-size:10pt;color:#868380;font-weight:bold\">1. 사람들을 Volunteer처럼 대하세요</span></p>\r\n\t\t\t\t\t\t<li style=\"font-family:Calibri\"><span style=\"font-family:Apple SD Gothic Neo;font-size:10pt;color:#868380\">대학졸업자,경력자 부터 세계 수준의 인재까지 최고의 사람들은 의미 있는 미션을 위해 위대한 일을 하고 싶어함</span></li>\r\n\t\t\t\t\t\t<li style=\"font-family:Calibri\"><span style=\"font-family:Apple SD Gothic Neo;font-size:10pt;color:#868380\">목적을 가지고 팀에 영감을 주는 것은 최고의 인재를 고용하고 유지할 수 있는 기회를 제공함</span></li>\r\n\t\t\t\t\t\t<li style=\"font-family:Calibri\"><span style=\"font-family:Apple SD Gothic Neo;font-size:10pt;color:#868380\">예를 들어 뛰어난 엔지니어들은 시장을 몰아내는 올드한 프로젝트 보다는 독특한 도전을 원함</span></li>\r\n\t\t\t\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Apple SD Gothic Neo;font-size:10pt;color:#868380;font-weight:bold\">2. 방해요소로부터 팀을 보호하세요</span></p>\r\n\t\t\t\t\t\t<li style=\"font-family:Calibri\"><span style=\"font-family:Apple SD Gothic Neo;font-size:10pt;color:#868380\">CEO는 종종 새로운 아이디어들로 산만해 보이지만, 최고의 CEO들은 진정으로 중요한 것에 집중하게 만듦</span></li>\r\n\t\t\t\t\t\t<li style=\"font-family:Calibri\"><span style=\"font-family:Apple SD Gothic Neo;font-size:10pt;color:#868380\">하지만 이것은 어려움 : 스타트업이 길을 찾을 때는 모든 것이 기회처럼 보여서 집중하기가 힘들게 함</span></li>\r\n\t\t\t\t\t\t<li style=\"font-family:Calibri\"><span style=\"font-family:Apple SD Gothic Neo;font-size:10pt;color:#868380\">팀의 모멘텀을 만들기 위해 명확한 목표와 우선 순위를 설정할 것</span></li>\r\n\t\t\t\t\t\t<li style=\"font-family:Calibri\"><span style=\"font-family:Apple SD Gothic Neo;font-size:10pt;color:#868380\">이것들이 점차 더 좋은 성과와 사기를 이끌어 냄</span></li>\r\n\t\t\t\t\t\t<li style=\"font-family:Calibri\"><span style=\"font-family:Apple SD Gothic Neo;font-size:10pt;color:#868380\">훌륭한 아이디어를 묻어버릴 때를 위한 일종의 종료의식(Closure Ritual)을 만드는 것도 중요함</span></li>\r\n\t\t\t\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Apple SD Gothic Neo;font-size:10pt;color:#868380;font-weight:bold\">3. 불필요한 마이크로매니지먼트를 최소화 하세요</span></p>\r\n\t\t\t\t\t\t<li style=\"font-family:Calibri\"><span style=\"font-family:Apple SD Gothic Neo;font-size:10pt;color:#868380\">특정 상황에서는 도움이 되지만, 효율적인 리더들은 자신과 비즈니스를 성장시키기 위해 업무를 위임하는 것을 목표로 함</span></li>\r\n\t\t\t\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Apple SD Gothic Neo;font-size:10pt;color:#868380;font-weight:bold\">4. 의견 불일치를 권장하세요</span></p>\r\n\t\t\t\t\t\t<li style=\"font-family:Calibri\"><span style=\"font-family:Apple SD Gothic Neo;font-size:10pt;color:#868380\">창업자들은 종종 (공동창업자나 동료들은 높게 평가하는) 자신과 다른 의견을 과소 평가하는 경향이 있음</span></li>\r\n\t\t\t\t\t\t<li style=\"font-family:Calibri\"><span style=\"font-family:Apple SD Gothic Neo;font-size:10pt;color:#868380\">몇몇 연구결과에선 여러 팀간의 의견 불일치가 실제로는 더 효과적인 결과로 이어진다고 함</span></li>\r\n\t\t\t\t\t\t<li style=\"font-family:Calibri\"><span style=\"font-family:Apple SD Gothic Neo;font-size:10pt;color:#868380\">결과적으로 이는 더 혁신적이고 포괄적인 제품을 만들게 된다는 것</span></li>\r\n\t\t\t\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Apple SD Gothic Neo;font-size:10pt;color:#868380;font-weight:bold\">5. 대인 형평성을 유지하세요</span></p>\r\n\t\t\t\t\t\t<li style=\"font-family:Calibri\"><span style=\"font-family:Apple SD Gothic Neo;font-size:10pt;color:#868380\">공동창업자간 갈등의 주요 원인은 기대 위반(Viloated Expectations)</span></li>\r\n\t\t\t\t\t\t<li style=\"font-family:Calibri\"><span style=\"font-family:Apple SD Gothic Neo;font-size:10pt;color:#868380\">데이터에 의하면 많은 창업자들의 공동창업자의 의무(Duty)를 트래킹 하지만, 자신도 모르게 기대치를 최소한으로 정의함</span></li>\r\n\t\t\t\t\t\t<li style=\"font-family:Calibri\"><span style=\"font-family:Apple SD Gothic Neo;font-size:10pt;color:#868380\">가장 효과적인 공동창업자들은 공개적으로 토론하고 서로에게 기대하는 것을 문서화 하며, 우리가 &quot;대인 형평성(Interpersonal Equity)&quot;이라 부르는 것을 지속적으로 확인</span></li>\r\n\t\t\t\t\t\t<li style=\"font-family:Calibri\"><span style=\"font-family:Apple SD Gothic Neo;font-size:10pt;color:#868380\">둘 간의 기대치가 공정(fair)하다고 느끼나요? 당신이 주고 받는 것은 공동창업자와 비교했을 때 공정한가요 ?</span></li>\r\n\t\t\t\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Apple SD Gothic Neo;font-size:10pt;color:#868380;font-weight:bold\">6. 전문 지식과 보조를 맞추세요</span></p>\r\n\t\t\t\t\t\t<li style=\"font-family:Calibri\"><span style=\"font-family:Apple SD Gothic Neo;font-size:10pt;color:#868380\">모든 분야에서 전문가가 될 수는 없지만, 리더는 적합한 사람을 고용하고 팀을 성장시키기 위해 충분히 알아야 함</span></li>\r\n\t\t\t\t\t\t<li style=\"font-family:Calibri\"><span style=\"font-family:Apple SD Gothic Neo;font-size:10pt;color:#868380\">가장 효과적인 창업자의 93%는 업무를 효과적으로 관리하고, 업계에서 앞서 나갈수 있도록 시간을 할애하는 기술적 전문성을 가지고 있음</span></li>\r\n\t\t\t\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Apple SD Gothic Neo;font-size:10pt;color:#868380;font-weight:bold\">7. 낙담(discouragement)을 이겨내세요</span></p>\r\n\t\t\t\t\t\t<li style=\"font-family:Calibri\"><span style=\"font-family:Apple SD Gothic Neo;font-size:10pt;color:#868380\">많은 사람들이 자신감(self-confidence)이 시간이 지나면 성장할 것이라고 기대하지만, 데이터에 의하면 가장 효과적인 설립자도 가장 효과적이지 않은 설립자와 비슷한 정도의 자신감을 가지고 있음</span></li>\r\n\t\t\t\t\t\t<li style=\"font-family:Calibri\"><span style=\"font-family:Apple SD Gothic Neo;font-size:10pt;color:#868380\">이것은 더닝-크루거* 효과와 얼라인</span><span style=\"font-family:Apple SD Gothic Neo;font-size:10pt;color:#868380\">￼</span><span style=\"font-family:Apple SD Gothic Neo;font-size:10pt;color:#868380\">→ 인지 편향의 하나로, 능력이 없는 사람이 잘못된 판단을 내려 잘못된 결론에 도달하지만, 능력이 없기 때문에 자신의 실수를 알아차리지 못하는 현상</span></li>\r\n\t\t\t\t\t\t<li style=\"font-family:Calibri\"><span style=\"font-family:Apple SD Gothic Neo;font-size:10pt;color:#868380\">여정을 시작할때의 과신(overconfidence)은 창업자들이 시작하는데 도움이 되지만, 곧 낙담과 자기 회의(self-doubt)가 시작됨</span></li>\r\n\t\t\t\t\t\t<li style=\"font-family:Calibri\"><span style=\"font-family:Apple SD Gothic Neo;font-size:10pt;color:#868380\">이 둘은 차례로 당신이 더 멀리 가는데 필요한 내적인 도전을 줄 수 있음</span></li>\r\n\t\t\t\t\t\t<li style=\"font-family:Calibri\"><span style=\"font-family:Apple SD Gothic Neo;font-size:10pt;color:#868380\">일부에게는 자기 회의가 좌절로 다가옴</span></li>\r\n\t\t\t\t\t\t<li style=\"font-family:Calibri\"><span style=\"font-family:Apple SD Gothic Neo;font-size:10pt;color:#868380\">만약 당신이 그렇다면, 필연적인 실패가 아닌 성장의 신호일 가능성이 있다는 걸 명심할 것</span></li>\r\n\t\t\t\t\t\t<li style=\"font-family:Calibri\"><span style=\"font-family:Apple SD Gothic Neo;font-size:10pt;color:#868380\">당신을 위한 지원 시스템을 찾고, 긍정적인 것에 집중하고, 필요할 때 도움을 요청하는 방법을 알아둘 것</span></li>\r\n\t\t\t\t\t</ul>\r\n\t\t\t\t\t</td>\r\n\t\t\t\t</tr>\r\n\t\t\t</table>\r\n\t\t\t<br />\r\n\t\t\t<cite style=\"font-family:Calibri;font-size:9pt;color:#595959;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">출처</span>: &lt;<a href=\"https://news.hada.io/topic?id=6792&amp;utm_source=discord&amp;utm_medium=bot&amp;utm_campaign=280\">https://news.hada.io/topic?id=6792&amp;utm_source=discord&amp;utm_medium=bot&amp;utm_campaign=280</a>&gt; </cite>\r\n\t\t\t<br />\r\n\t\t"
  },

    "y": 139,
    "w": 600,
    "content": "창업 초기엔 대표가 제품 개발, 마케팅, 머천다이징(MD), 세일즈, 회계, 재무, 투자 유치 등을 다 해야 해요. 이 모든 부분에서 꽤 높은 수준의 전문성을 가지고 있어야 합니다. 그래야만 단기간에 크게 성장할 수 있어요. 물론 이 모든 것에 대해 대표가 전문성을 가지고 있지 않다고 회사가 성공할 수 없는 것은 아니에요. 대신 오래 걸리죠.\n예를 들어, 조직 문화를 유지하는 데 중요하게 생각하는 숫자 몇 개가 있어요. 신규 입사자, 즉, 수습 기간 중인 구성원의 비율이 10~15%를 넘지 않도록 유지하고 있고, 수습 평가를 통과한 정규직 직원의 퇴사율도 신경 써야 합니다. 법인 설립한 지 2년, 서비스 출시한 지 1년 반 정도 되었는데 5~6%를 넘지 않고 있어요. 10% 아래로 유지하려고 엄청 노력하고 있어요. ‘컬처 핏’이 맞는 사람만 뽑아야 하니까요. 1,2차로 구성된 정규직 2차 인터뷰엔 제가 무조건 들어가고 있습니다.\n그리고 30명에서 50명으로 조직이 커질 때는 위계(hierarchy)가 반드시 있어야 합니다. 그런데 많은 스타트업들이 수평적이라서, 위계가 없다고 하죠. 그럼 스케일업이 어려워요. 그 다음에 50명에서 100명으로 늘어날 때는 컬처가 무너지지 않는 것이 중요해요.“\n<<a href=\"https://book.naver.com/bookdb/book_detail.nhn?bid=11112926\" style=\"font-family:-apple-system;font-size:12pt;background-color:#191a1a\">조직의 재창조</a>>나 <<a href=\"https://book.naver.com/bookdb/book_detail.nhn?bid=6763502\" style=\"font-family:-apple-system;font-size:12pt;background-color:#191a1a\">언리더십</a>>\n출처: <<a href=\"https://camp.lemonbase.com/ceo_interview/rapportlabs?fbclid=IwAR2LNLIu8q6q7Cgs8H0q6yRr4Z3JckANsI1y27rPS4LsZTFFkSIXnCJ_lJY&utm_source=substack&utm_medium=email\">https://camp.lemonbase.com/ceo_interview/rapportlabs?fbclid=IwAR2LNLIu8q6q7Cgs8H0q6yRr4Z3JckANsI1y27rPS4LsZTFFkSIXnCJ_lJY&utm_source=substack&utm_medium=email</a>>\n샘 알트만의 성공방정식\nhttps://sonujung.com/how-to-be-successful?utm_source=substack&utm_medium=email</a>>"
  }
];
const CONTENT_HASH = '6c2798b1';

let cards = [];
let moving = null, resizing = null;
let selectedIdx = null, clipboardCard = null;
const GRID = 20, GAP = 14;
function snap(v) { return Math.round(v / GRID) * GRID; }

// ── Undo (Ctrl+Z) ────────────────────────────────────────────────────────────
const MAX_HISTORY = 50;
let history = [];
function snapshot() {
  syncText();
  history.push(JSON.stringify(cards));
  if (history.length > MAX_HISTORY) history.shift();
}
function undo() {
  if (!history.length) { showStatus('되돌릴 내용 없음'); return; }
  syncText();
  cards = JSON.parse(history.pop());
  renderCards();
  saveBoard();
  showStatus('↩ 되돌림');
}
function showStatus(msg) {
  const s = document.getElementById('status');
  s.textContent = msg;
  clearTimeout(showStatus._t);
  showStatus._t = setTimeout(() => { s.textContent = ''; }, 2000);
}
document.addEventListener('keydown', e => {
  const isText = document.activeElement?.contentEditable === 'true';
  if ((e.ctrlKey || e.metaKey) && e.key === 'z' && !e.shiftKey) {
    if (isText) return;
    e.preventDefault();
    undo();
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'c' && !e.shiftKey && !isText) {
    if (selectedIdx !== null && cards[selectedIdx]) {
      syncText();
      clipboardCard = JSON.parse(JSON.stringify(cards[selectedIdx]));
      showStatus('카드 복사됨');
      e.preventDefault();
    }
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'v' && !e.shiftKey && !isText) {
    if (clipboardCard) {
      e.preventDefault();
      snapshot();
      const nc = JSON.parse(JSON.stringify(clipboardCard));
      nc.x = (nc.x || 0) + 30; nc.y = (nc.y || 0) + 30;
      cards.push(nc);
      selectedIdx = cards.length - 1;
      renderCards(); saveBoard();
      showStatus('카드 붙여넣음');
    }
  }
  if (e.key === 'Escape') {
    document.querySelectorAll('.card.selected').forEach(c => c.classList.remove('selected'));
    selectedIdx = null;
  }
});

function pushCards(movedIdx) {
  const moved = cards[movedIdx];
  const movedEl = document.querySelector(`.card[data-idx="${movedIdx}"]`);
  if (!movedEl) return;
  const mh = movedEl.offsetHeight;
  document.querySelectorAll('.card').forEach(el => {
    const i = +el.dataset.idx;
    if (i === movedIdx) return;
    const c = cards[i], oh = el.offsetHeight;
    if (moved.x < (c.x+(c.w||200)) && (moved.x+(moved.w||200)) > c.x && moved.y < (c.y+oh) && (moved.y+mh) > c.y) {
      c.y = moved.y + mh + GAP;
      el.style.top = c.y + 'px';
    }
  });
}

function loadBoard() {
  const saved = localStorage.getItem(SAVE_KEY);
  const savedHash = localStorage.getItem(SAVE_KEY + ':hash');
  let parsed = null;
  try { parsed = saved ? JSON.parse(saved) : null; } catch(e) {}
  // reset if: no save, empty array, or content hash changed (page regenerated)
  if (!parsed || parsed.length === 0 || savedHash !== CONTENT_HASH) {
    cards = DEFAULT_CARDS.map(c => ({...c}));
    localStorage.removeItem(SAVE_KEY);
    localStorage.setItem(SAVE_KEY + ':hash', CONTENT_HASH);
    renderCards();
    const hasCoords = cards.some(c => c.x !== undefined && c.y !== undefined);
    if (!hasCoords) autoLayout();
    return;
  }
  cards = parsed;
  renderCards();
}
function resetToDefaults() { if (!confirm('저장된 보드를 지우고 원본으로 초기화합니다. 계속할까요?')) return; localStorage.removeItem(SAVE_KEY); cards = DEFAULT_CARDS.map(c => ({...c})); renderCards(); autoLayout(); }

function autoLayout() {
  const boardW = document.getElementById('board').offsetWidth;
  const cols = Math.max(1, Math.floor(boardW / 280));
  const colW = (boardW - GAP*(cols-1)) / cols;
  const colH = new Array(cols).fill(0);
  const allCards = document.querySelectorAll('.card');
  const images = document.querySelectorAll('.card img');
  let loaded = 0;
  function place() {
    allCards.forEach((el, i) => {
      const w = Math.min(cards[i].w || colW, colW);
      let minCol = 0;
      for (let c = 1; c < cols; c++) if (colH[c] < colH[minCol]) minCol = c;
      cards[i].x = minCol * (colW + GAP);
      cards[i].y = colH[minCol];
      cards[i].w = w;
      el.style.left = cards[i].x + 'px';
      el.style.top = cards[i].y + 'px';
      el.style.width = w + 'px';
      colH[minCol] = cards[i].y + el.offsetHeight + GAP;
    });
    document.getElementById('board').style.minHeight = (Math.max(...colH) + 100) + 'px';
    saveBoard();
  }
  if (!images.length) { requestAnimationFrame(place); return; }
  images.forEach(img => {
    if (img.complete) { loaded++; if (loaded >= images.length) requestAnimationFrame(place); }
    else { img.onload = img.onerror = () => { loaded++; if (loaded >= images.length) requestAnimationFrame(place); }; }
  });
}

function syncText() {
  document.querySelectorAll('.card').forEach(el => {
    const i = +el.dataset.idx;
    if (cards[i]?.type === 'text') { const t = el.querySelector('.text'); if (t) cards[i].content = t.innerHTML; }
  });
}
function saveBoard() { syncText(); localStorage.setItem(SAVE_KEY, JSON.stringify(cards)); localStorage.setItem(SAVE_KEY + ':hash', CONTENT_HASH); showStatus('저장됨 ' + new Date().toLocaleTimeString()); }

function renderCards() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  cards.forEach((card, i) => {
    const el = document.createElement('div');
    el.className = 'card'; el.dataset.idx = i;
    if (card.x !== undefined) el.style.left = card.x + 'px';
    if (card.y !== undefined) el.style.top = card.y + 'px';
    // html cards contain raw OneNote table HTML which may overflow the stated div width
    if (card.w) { if (card.type === 'html') el.style.minWidth = card.w + 'px'; else el.style.width = card.w + 'px'; }
    el.addEventListener('mousedown', e => {
      if (e.target.closest('.text, a, .card-btn, .resize-handle, td, th')) return;
      e.preventDefault();
      // Update selection
      document.querySelectorAll('.card.selected').forEach(c => c.classList.remove('selected'));
      selectedIdx = i; el.classList.add('selected');
      snapshot();
      moving = { idx: i, startX: e.clientX, startY: e.clientY, origX: card.x||0, origY: card.y||0 };
      el.classList.add('moving');
    });
    const actions = document.createElement('div'); actions.className = 'card-actions';
    const delBtn = document.createElement('button'); delBtn.className = 'card-btn'; delBtn.textContent = '×';
    delBtn.onclick = e => { e.stopPropagation(); if(confirm('삭제?')) { snapshot(); cards.splice(i,1); renderCards(); saveBoard(); } };
    actions.appendChild(delBtn); el.appendChild(actions);
    if (card.type === 'text') {
      const text = document.createElement('div'); text.className = 'text'; text.contentEditable = true;
      text.innerHTML = card.content || '';
      text.addEventListener('focus', () => { snapshot(); });
      text.addEventListener('blur', () => { card.content = text.innerHTML; saveBoard(); });
      el.appendChild(text);
    } else if (card.type === 'image') {
      const img = document.createElement('img');
      img.src = card.src.startsWith('http') || card.src.startsWith('data:') ? card.src : IMG_BASE + card.src;
      img.alt = ''; img.loading = 'lazy'; img.onerror = () => img.style.display = 'none';
      if (card.w) img.style.width = card.w + 'px';
      if (card.h) img.style.height = card.h + 'px';
      if (card.link) { const a = document.createElement('a'); a.href = card.link; a.target = '_blank'; a.appendChild(img); el.appendChild(a); }
      else { el.appendChild(img); }
      if (card.caption) { const cap = document.createElement('div'); cap.style.cssText = 'font-size:11px;color:#8b949e;margin-top:4px;word-break:break-word;padding:0 2px;'; cap.textContent = card.caption; el.appendChild(cap); }
    } else if (card.type === 'html') {
      const wrapper = document.createElement('div');
      wrapper.style.cssText = 'overflow:auto;font-size:13px;line-height:1.5;';
      wrapper.innerHTML = card.html.replace(/__ATTACHMENT__/g, IMG_BASE);
      wrapper.querySelectorAll('img').forEach(img => { img.style.maxWidth = '100%'; img.style.height = 'auto'; img.draggable = false; });
      wrapper.querySelectorAll('a').forEach(a => { a.target = '_blank'; a.style.color = '#6cb0f6'; });
      wrapper.querySelectorAll('table').forEach(t => { t.style.borderCollapse = 'collapse'; });
      wrapper.querySelectorAll('td,th').forEach(td => {
        td.style.border = '1px solid #444'; td.style.padding = '4px 6px'; td.style.verticalAlign = 'top';
        td.title = '더블클릭으로 편집';
        td.addEventListener('dblclick', function(e) {
          e.stopPropagation();
          snapshot();
          this.contentEditable = 'true';
          this.style.outline = '2px solid #388bfd';
          this.style.background = 'rgba(56,139,253,0.08)';
          this.focus();
        });
        td.addEventListener('blur', function() {
          this.contentEditable = 'false';
          this.style.outline = '';
          this.style.background = '';
          cards[i].html = wrapper.innerHTML.split(IMG_BASE).join('__ATTACHMENT__');
          saveBoard();
        });
      });
      el.appendChild(wrapper);
    } else if (card.type === 'table') {
      const rows = card.rows || [['','',''],['','',''],['','','']];
      const tbl = document.createElement('table');
      tbl.style.cssText = 'border-collapse:collapse;width:100%;font-size:13px;';
      rows.forEach((row, ri) => {
        const tr = tbl.insertRow();
        row.forEach((cell, ci) => {
          const td = document.createElement(ri === 0 ? 'th' : 'td');
          td.contentEditable = true;
          td.style.cssText = 'border:1px solid #30363d;padding:4px 8px;min-width:60px;text-align:left;' + (ri===0 ? 'background:#21262d;font-weight:600;' : '');
          td.textContent = cell;
          td.addEventListener('blur', () => { if (!cards[i].rows) cards[i].rows = rows; rows[ri][ci] = td.textContent; saveBoard(); });
          tr.appendChild(td);
        });
      });
      el.appendChild(tbl);
      const addRow = document.createElement('button');
      addRow.textContent = '+ 행'; addRow.style.cssText = 'margin-top:4px;font-size:11px;background:#21262d;border:1px solid #30363d;color:#8b949e;padding:2px 8px;border-radius:4px;cursor:pointer;';
      addRow.onclick = e => { e.stopPropagation(); snapshot(); if (!cards[i].rows) cards[i].rows = rows; cards[i].rows.push(new Array(cards[i].rows[0].length).fill('')); renderCards(); saveBoard(); };
      const addCol = document.createElement('button');
      addCol.textContent = '+ 열'; addCol.style.cssText = 'margin-top:4px;margin-left:4px;font-size:11px;background:#21262d;border:1px solid #30363d;color:#8b949e;padding:2px 8px;border-radius:4px;cursor:pointer;';
      addCol.onclick = e => { e.stopPropagation(); snapshot(); if (!cards[i].rows) cards[i].rows = rows; cards[i].rows.forEach(r => r.push('')); renderCards(); saveBoard(); };
      el.appendChild(addRow); el.appendChild(addCol);
    }
    const rh = document.createElement('div'); rh.className = 'resize-handle';
    rh.addEventListener('mousedown', e => { e.preventDefault(); e.stopPropagation(); snapshot(); resizing = { idx: i, startX: e.clientX, startW: card.w || el.offsetWidth }; });
    el.appendChild(rh);
    if (i === selectedIdx) el.classList.add('selected');
    board.appendChild(el);
  });
  requestAnimationFrame(() => {
    let maxB = 0;
    document.querySelectorAll('.card').forEach(el => { const b = (parseFloat(el.style.top)||0) + el.offsetHeight; if (b > maxB) maxB = b; });
    board.style.minHeight = (maxB + 100) + 'px';
  });
}

document.addEventListener('mousemove', e => {
  if (moving) {
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`); if (!el) return;
    let nx = moving.origX + e.clientX - moving.startX, ny = moving.origY + e.clientY - moving.startY;
    if (e.shiftKey) { nx = snap(nx); ny = snap(ny); el.style.outline = '1px dashed rgba(240,192,64,0.3)'; } else { el.style.outline = ''; }
    el.style.left = nx + 'px'; el.style.top = ny + 'px';
  }
  if (resizing) {
    let nw = resizing.startW + e.clientX - resizing.startX; if (e.shiftKey) nw = snap(nw);
    cards[resizing.idx].w = Math.max(100, nw);
    const el = document.querySelector(`.card[data-idx="${resizing.idx}"]`); if (el) el.style.width = cards[resizing.idx].w + 'px';
  }
});

document.addEventListener('mouseup', e => {
  if (moving) {
    let nx = moving.origX + e.clientX - moving.startX, ny = moving.origY + e.clientY - moving.startY;
    if (e.shiftKey) { nx = snap(nx); ny = snap(ny); }
    cards[moving.idx].x = Math.max(0, nx); cards[moving.idx].y = Math.max(0, ny);
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`); if (el) { el.classList.remove('moving'); el.style.outline = ''; }
    if (e.shiftKey) pushCards(moving.idx);
    moving = null; saveBoard();
  }
  if (resizing) { if (e.shiftKey) pushCards(resizing.idx); resizing = null; saveBoard(); }
});

function addTextCard() { snapshot(); cards.push({ type: 'text', content: '', x: 50, y: window.scrollY+100, w: 300 }); renderCards(); setTimeout(() => { const els = document.querySelectorAll('.card .text'); els[els.length-1]?.focus(); }, 100); }
function addImageCard() { const input = document.createElement('input'); input.type = 'file'; input.accept = 'image/*'; input.onchange = e => { const f = e.target.files[0]; if (!f) return; const r = new FileReader(); r.onload = () => { snapshot(); cards.push({ type: 'image', src: r.result, x: 50, y: window.scrollY+100, w: 240 }); renderCards(); saveBoard(); }; r.readAsDataURL(f); }; input.click(); }
function addImageUrl() { const url = prompt('이미지 URL'); if (!url) return; snapshot(); cards.push({ type: 'image', src: url, x: 50, y: window.scrollY+100, w: 240 }); renderCards(); saveBoard(); }
function addTableCard() {
  const colsStr = prompt('열 수 (기본 3)', '3'); const cols = Math.max(1, parseInt(colsStr)||3);
  const rowsStr = prompt('행 수 (헤더 포함, 기본 4)', '4'); const rows = Math.max(1, parseInt(rowsStr)||4);
  snapshot();
  cards.push({ type: 'table', rows: Array.from({length: rows}, (_, ri) => Array.from({length: cols}, (_, ci) => ri===0 ? `열${ci+1}` : '')), x: 50, y: window.scrollY+100, w: Math.max(240, cols*100) });
  renderCards(); saveBoard();
}
function exportBoard() { syncText(); const blob = new Blob([JSON.stringify(cards, null, 2)], { type: 'application/json' }); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = SAVE_KEY + '.json'; a.click(); }
// ── Zoom ─────────────────────────────────────────────────────────────────────
let zoom = parseFloat(localStorage.getItem('zoom-' + SAVE_KEY) || '1.0');
function applyZoom() {
  const board = document.getElementById('board');
  board.style.transform = `scale(${zoom})`;
  board.style.transformOrigin = '0 0';
  document.getElementById('zoom-level').textContent = Math.round(zoom * 100) + '%';
  localStorage.setItem('zoom-' + SAVE_KEY, zoom);
}
function zoomIn()  { zoom = Math.min(3.0, parseFloat((zoom + 0.1).toFixed(2))); applyZoom(); }
function zoomOut() { zoom = Math.max(0.2, parseFloat((zoom - 0.1).toFixed(2))); applyZoom(); }
document.addEventListener('keydown', e => {
  if (e.ctrlKey || e.metaKey) {
    if (e.key === '=' || e.key === '+') { e.preventDefault(); zoomIn(); }
    if (e.key === '-')                  { e.preventDefault(); zoomOut(); }
    if (e.key === '0')                  { e.preventDefault(); zoom = 1.0; applyZoom(); }
  }
});
document.getElementById('board').addEventListener('wheel', e => {
  if (!(e.ctrlKey || e.metaKey)) return;
  e.preventDefault();
  e.deltaY < 0 ? zoomIn() : zoomOut();
}, { passive: false });
applyZoom();
function resetLayout() { if (!confirm('자동 재배치합니다.')) return; cards.forEach(c => { delete c.x; delete c.y; }); renderCards(); autoLayout(); }
// ── Floating format toolbar ───────────────────────────────────────────────────
const fmtBar = document.getElementById('format-toolbar');
function fmt(cmd) { document.execCommand(cmd, false, null); saveBoard(); }
function fmtLink() {
  const sel = window.getSelection();
  if (!sel || sel.isCollapsed) return;
  const url = prompt('링크 URL 입력', 'https://');
  if (!url) return;
  document.execCommand('createLink', false, url);
  // make links open in new tab
  sel.anchorNode?.parentElement?.closest('a')?.setAttribute('target', '_blank');
  document.querySelectorAll('.text a').forEach(a => a.target = '_blank');
  saveBoard();
}

// prevent format buttons from blurring contenteditable
fmtBar.addEventListener('mousedown', e => e.preventDefault());

document.addEventListener('selectionchange', () => {
  const sel = window.getSelection();
  if (!sel || sel.isCollapsed || !sel.toString().trim()) { fmtBar.style.display = 'none'; return; }
  // only show if selection is inside a .text element
  const anchor = sel.anchorNode;
  if (!anchor) { fmtBar.style.display = 'none'; return; }
  const textEl = anchor.nodeType === 1 ? anchor.closest('.text') : anchor.parentElement?.closest('.text');
  if (!textEl) { fmtBar.style.display = 'none'; return; }
  // position above selection
  const range = sel.getRangeAt(0);
  const rect = range.getBoundingClientRect();
  fmtBar.style.display = 'flex';
  const tbW = fmtBar.offsetWidth || 180;
  let left = rect.left + rect.width / 2 - tbW / 2;
  left = Math.max(8, Math.min(left, window.innerWidth - tbW - 8));
  fmtBar.style.left = left + 'px';
  fmtBar.style.top = (rect.top - 44 + window.scrollY) + 'px';
});

setInterval(saveBoard, 30000);
loadBoard();
</script>
