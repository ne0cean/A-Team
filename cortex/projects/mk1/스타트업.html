<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1e1e1e; color: #e0e0e0; font-family: 'Segoe UI', -apple-system, sans-serif; font-size: 15px; line-height: 1.6; padding: 20px 30px 60px; overflow-x: hidden; }
a { color: #6cb0f6; text-decoration: none; }

.date { color: #999; font-size: 13px; margin-bottom: 20px; }
.board { position: relative; }
.card { background: #2a2a2a; border: 1px solid #3a3a3a; border-radius: 8px; padding: 12px; position: absolute; cursor: grab; transition: box-shadow 0.15s; overflow: hidden; }

.card-actions { position: absolute; top: 4px; right: 4px; display: none; gap: 4px; }
.card:hover .card-actions { display: flex; }
.card-btn { background: #333; border: 1px solid #555; color: #ccc; border-radius: 4px; padding: 2px 6px; font-size: 11px; cursor: pointer; }
.card-btn:hover { background: #444; color: #fff; }
.resize-handle { position: absolute; bottom: 0; right: 0; width: 16px; height: 16px; cursor: se-resize; opacity: 0; }
.card:hover .resize-handle { opacity: 0.6; }
.resize-handle::after { content: ''; position: absolute; bottom: 3px; right: 3px; width: 8px; height: 8px; border-right: 2px solid #666; border-bottom: 2px solid #666; }
.card.selected { box-shadow: 0 0 0 2px #58a6ff; z-index: 5; }
.highlight-red { color: #ff6b6b; }
.highlight-blue { color: #6cb0f6; }
.highlight-gold { color: #f0c040; }
.toolbar { position: fixed; bottom: 0; left: 0; right: 0; background: #161b22; border-top: 1px solid #30363d; padding: 8px 20px; display: flex; gap: 12px; align-items: center; z-index: 200; }
.toolbar button { background: #21262d; border: 1px solid #30363d; color: #e0e0e0; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; }
.toolbar button:hover { background: #30363d; }
.toolbar .status { color: #8b949e; font-size: 12px; margin-left: auto; }
#format-toolbar { position: fixed; display: none; background: #1c2128; border: 1px solid #444c56; border-radius: 8px; padding: 4px 6px; gap: 2px; align-items: center; z-index: 500; box-shadow: 0 4px 16px rgba(0,0,0,0.5); }

p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#565656\">기술의</span><span style=\"font-family:Source Sans Pro;font-size:12pt;color:#565656\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#565656\">변곡점을</span><span style=\"font-family:Source Sans Pro;font-size:12pt;color:#565656\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#565656\">살펴보라는</span><span style=\"font-family:Source Sans Pro;font-size:12pt;color:#565656\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#565656\">얘기는</span><span style=\"font-family:Source Sans Pro;font-size:12pt;color:#565656\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#565656\">사회적인</span><span style=\"font-family:Source Sans Pro;font-size:12pt;color:#565656\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#565656\">큰</span><span style=\"font-family:Source Sans Pro;font-size:12pt;color:#565656\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#565656\">변화가</span><span style=\"font-family:Source Sans Pro;font-size:12pt;color:#565656\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#565656\">생기는</span><span style=\"font-family:Source Sans Pro;font-size:12pt;color:#565656\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#565656\">부분을</span><span style=\"font-family:Source Sans Pro;font-size:12pt;color:#565656\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#565656\">바라보라는</span><span style=\"font-family:Source Sans Pro;font-size:12pt;color:#565656\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#565656\">말과도</span><span style=\"font-family:Source Sans Pro;font-size:12pt;color:#565656\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#565656\">일맥상통한다</span><span style=\"font-family:Source Sans Pro;font-size:12pt;color:#5 -family:Source Sans Pro;font-size:12pt;color:#565656\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#565656\">외국인</span><span style=\"font-family:Source Sans Pro;font-size:12pt;color:#565656\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#565656\">근로자가</span><span style=\"font-family:Source Sans Pro;font-size:12pt;color:#565656\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#565656\">증가하는</span><span style=\"font-family:Source Sans Pro;font-size:12pt;color:#565656\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#565656\">것</span><span style=\"font-family:Source Sans Pro;font-size:12pt;color:#565656\">, </span><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#565656\">소프트웨어</span><span style=\"font-family:Source Sans Pro;font-size:12pt;color:#565656\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#565656\">개발자의</span><span style=\"font-family:Source Sans Pro;font-size:12pt;color:#565656\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#565656\">몸값이</span><span style=\"font-family:Source Sans Pro;font-size:12pt;color:#565656\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#565656\">매년</span><span style=\"font-family:Source Sans Pro;font-size:12pt;color:#565656\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#565656\">급격하게</span><span style=\"font-family:Source Sans Pro;font-size:12pt;color:#565656\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#565656\">높아지는</span><span style=\"font-family:Source Sans Pro;font-size:12pt;color:#565656\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#565656\">것</span><span style=\"font-family:Source Sans Pro;font-size:12pt;color:#565656\"> </span><span style=\"font-family:Source Sans Pro;font-size:12pt;color:#565656\">—</span><span style=\"font-family:Source Sans Pro;font-size:12pt;color:#565656\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#565656\">이런</span><span style=\"font-family:Source Sans Pro;font-size:12pt;color:#565656\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#565656\">사회적</span><span style=\"font-family:Source Sans Pro;font-size:12pt;color:#565656\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#565656\">변화</span><span style=\"font-family:Source Sans Pro;font-size:12pt;color:#565656\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#565656\">속에서</span><span style=\"font-family:Source Sans Pro;font-size:12pt;color:#565656\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#565656\">이전에</span><span style=\"font-family:Source Sans Pro;font-size:12pt;color:#565656\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#565656\">없던</span><span style=\"font-family:Source Sans Pro;font-size:12pt;color:#565656\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#565656\">새로운</span><span style=\"font-family:Source Sans Pro;font-size:12pt;color:#565656\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#565656\">니즈가</span><span style=\"font-family:Source Sans Pro;font-size:12pt;color:#565656\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#565656\">발생할</span><span style=\"font-family:Source Sans Pro;font-size:12pt;color:#565656\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#565656\">수</span><span style=\"font-family:Source Sans Pro;font-size:12pt;color:#565656\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#565656\">있고</span><span style=\"font-family:Source Sans Pro;font-size:12pt;color:#565656\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#565656\">이를</span><span style=\"font-family:Source Sans Pro;font-size:12pt;color:#565656\"> </span><span style=\"font-family:Malgun Gothic;font-size:12p ans Pro;font-size:12pt;color:#565656\">:</span><span style=\"font-family:Source Sans Pro;font-size:12pt;color:#565656\">&#160;</span><a href=\"https://www.amazon.com/Innovation-Stack-Building-Unbeatable-Business/dp/0593086732\" style=\"font-family:Source Sans Pro;font-size:12pt\">Innovation Stack</a></p>\r\n\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#565656\">짐</span><span style=\"font-family:Source Sans Pro;font-size:12pt;color:#565656\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#565656\">맥켈비는</span><span style=\"font-family:Source Sans Pro;font-size:12pt;color:#565656\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#565656\">스마트폰에</span><span style=\"font-family:Source Sans Pro;font-size:12pt;color:#565656\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#565656\">연결하는</span><span style=\"font-family:Source Sans Pro;font-size:12pt;color:#565656\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#565656\">결제</span><span style=\"font-family:Source Sans Pro;font-size:12pt;color:#565656\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#565656\">단말기로</span><span style=\"font-family:Source Sans Pro;font-size:12pt;color:#565656\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#565656\">사업을</span><span style=\"font-family:Source Sans Pro;font-size:12pt;color:#565656\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#565656\">하는</span><span style=\"font-family:Source Sans Pro;font-size:12pt;color:#565656\"> Square</span><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#565656\">의</span><span style=\"font-family:Source Sans Pro;font-size:12pt;color:#565656\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#565656\">공동</span><span style=\"font-family:Source Sans Pro;font-size:12pt;color:#565656\"> </ amily:Malgun Gothic;font-size:12pt;color:#565656\">시장을</span><span style=\"font-family:Source Sans Pro;font-size:12pt;color:#565656\">&#160;</span><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#565656;font-weight:bold\">제품을</span><span style=\"font-family:Source Sans Pro;font-size:12pt;color:#565656;font-weight:bold\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#565656;font-weight:bold\">위해</span><span style=\"font-family:Source Sans Pro;font-size:12pt;color:#565656;font-weight:bold\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#565656;font-weight:bold\">지불하는</span><span style=\"font-family:Source Sans Pro;font-size:12pt;color:#565656;font-weight:bold\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#565656;font-weight:bold\">금액</span><span style=\"font-family:Source Sans Pro;font-size:12pt;color:#565656;font-weight:bold\"> X </span><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#565656;font-weight:bold\">지불하는</span><span style=\"font-family:Source Sans Pro;font-size:12pt;color:#565656;font-weight:bold\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#565656;font-weight:bold\">사람의</span><span style=\"font-family:Source Sans Pro;font-size:12pt;color:#565656;font-weight:bold\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#565656;font-weight:bold\">수</span><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#565656\">로</span><span style=\"font-family:Source Sans Pro;font-size:12pt;color:#565656\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#565656\">정의를</span><span style=\"font-family:Source Sans Pro;font-size:12pt;color:#565656\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#565656\">해</span><span style=\"font-family:Source Sans Pro;font-size:12pt;color:#565656\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#565656\">보자</span><span style=\"font-family:Source Sans Pro;font-size:12pt;color:#565656\">. </span><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#565656\">어떤</span><span style=\"font-family:Source Sans Pro;font-size:12pt;color:#565656\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#565656\">시장이든간에</span><span style=\"font-family:Source Sans Pro;font-size:12pt;color:#565656\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#565656\">현재의</span><span style=\"font-family:Source Sans Pro;font-size:12pt;color:#565656\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#565656\">시장에</span><span style=\"font-family:Source Sans Pro;font-size:12pt;color:#565656\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#565656\">참여하지</span><span style=\"font-family:Source Sans Pro;font-size:12pt;color:#565656\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#565656\">않고</span><span style=\"font-family:Source Sans Pro;font-size:12pt;color:#565656\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#565656\">있는</span><span style=\"font-family:Source Sans Pro;font-size:12pt;color:#565656\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#565656\">사람</span><span style=\"font-family:Source Sans Pro;font-size:12pt;color:#565656\">/</span><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#565656\">조직이</span><span style=\"font-family:Source Sans Pro;font-size:12pt;color:#565656\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#565656\">있다</span><span style=\"font-family:Source Sans Pro;font-size:12pt;color:#565656\">. </span><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#565656\">참여하고</span><span style=\"font-family:Source Sans Pro;font-size:12pt;color:#565656\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#565656\">있는</span><span style=\"font-family:Source Sans Pro;font-size:12pt;color:#565656\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#565656\">사람과</span><span style=\"font-family:Source Sans Pro;font-size:12pt;color:#565656\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#565656\">참여하지</span><span style=\"font-family:Source Sans Pro;font-size:12pt;color:#565656\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#565656\">않는</span><span style=\"font-family:Source Sans Pro;font-size:12pt;color:#565656\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#565656\">사람의</span><span style=\"font-family:Source Sans Pro;font-size:12pt;color:#565656\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#565656\">경계가</span><span style=\"font-family:Source Sans Pro;font-size:12pt;color:#565656\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#565656\">시장의</span><span style=\"font-family:Source Sans Pro;font-size:12pt;color:#565656\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#565656\">끝자락이</span><span style=\"font-family:Source Sans Pro;font-size:12pt;color:#565656\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#565656\">된다</span><span style=\"font-family:Source Sans Pro;font-size:12pt;color:#565656\">. </span><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#565656\">그러면</span><span style=\"font-family:Source Sans Pro;font-size:12pt;color:#565656\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#565656\">왜</span><span style=\"font-family:Source Sans Pro;font-size:12pt;color:#565656\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#565656\">참여를</span><span style=\"font-family:Source Sans Pro;font-size:12pt;color:#565656\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#565656\">하고</span><span style=\"font-family:Source Sans Pro;font-size:12pt;color:#565656\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#565656\">있지</span><span style=\"font-family:Source Sans Pro;font-size:12pt;color:#565656\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#565656\">않은지를</span><span style=\"font-family:Source Sans Pro;font-size:12pt;color:#565656\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#565656\">살펴보라고</span><span style=\"font-family:Source Sans Pro;font-size:12pt;color:#565656\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#565656\">한다</span><span style=\"font-family:Source Sans Pro;font-size:12pt;color:#565656\">. </span><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#565656\">가격이</span><span style=\"font-family:Source Sans Pro;font-size:12pt;color:#565656\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#565656\">높아서</span><span style=\"font-family:Source Sans Pro;font-size:12pt;color:#565656\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#565656\">인가</span><span style=\"font-family:Source Sans Pro;font-size:12pt;color:#565656\">, </span><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#565656\">제품이나</span><span style=\"font-family:Source Sans Pro;font-size:12pt;color:#565656\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#565656\">서비스가</span><span style=\"font-family:Source Sans Pro;font-size:12pt;color:#565656\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#565656\">그</span><span style=\"font-family:Source Sans Pro;font-size:12pt;color:#565656\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#565656\">사람들에겐</span><span style=\"font-family:Source Sans Pro;font-size:12pt;color:#565656\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#565656\">만족스럽지</span><span style=\"font-family:Source Sans Pro;font-size:12pt;color:#565656\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#565656\">않아서</span><span style=\"font-family:Source Sans Pro;font-size:12pt;color:#565656\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#565656\">인가</span><span style=\"font-family:Source Sans Pro;font-size:12pt;color:#565656\">, </span><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#565656\">아니면</span><span style=\"font-family:Source Sans Pro;font-size:12pt;color:#565656\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#565656\">다른</span><span style=\"font-family:Source Sans Pro;font-size:12pt;color:#565656\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#565656\">요소가</span><span style=\"font-family:Source Sans Pro;font-size:12pt;color:#565656\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#565656\">있는</span><span style=\"font-family:Source Sans Pro;font-size:12pt;color:#565656\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#565656\">것인가</span><span style=\"font-family:Source Sans Pro;font-size:12pt;color:#565656\">.</span></p>\r\n\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#565656\">이런</span><span style=\"font-family:Source Sans Pro;font-size:12pt;color:#565656\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#565656\">부분을</span><span style=\"font-family:Source Sans Pro;font-size:12pt;color:#565656\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#565656\">살펴보면</span><span style=\"font-family:Source Sans Pro;font-size:12pt;color:#565656\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#565656\">현재</span><span style=\"font-family:Source Sans Pro;font-size:12pt;color:#565656\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#565656\">시장에</span><span style=\"font-family:Source Sans Pro;font-size:12pt;color:#565656\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#565656\">참여하고</s <span style=\"font-family:Source Sans Pro;font-size:12pt;color:#565656\">. </span><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#565656\">하지만</span><span style=\"font-family:Source Sans Pro;font-size:12pt;color:#565656\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#565656\">그런</span><span style=\"font-family:Source Sans Pro;font-size:12pt;color:#565656\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#565656\">과정</span><span style=\"font-family:Source Sans Pro;font-size:12pt;color:#565656\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#565656\">속에서도</span><span style=\"font-family:Source Sans Pro;font-size:12pt;color:#565656\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#565656\">미리</span><span style=\"font-family:Source Sans Pro;font-size:12pt;color:#565656\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#565656\">경험한</span><span style=\"font-family:Source Sans Pro;font-size:12pt;color:#565656\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#565656\">사람들이</span><span style=\"font-family:Source Sans Pro;font-size:12pt;color:#565656\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#565656\">알려준</span><span style=\"font-family:Source Sans Pro;font-size:12pt;color:#565656\"> 5</span><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#565656\">가지</span><span style=\"font-family:Source Sans Pro;font-size:12pt;color:#565656\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#565656\">교훈은</span><span style=\"font-family:Source Sans Pro;font-size:12pt;color:#565656\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#565656\">좋은</span><span style=\"font-family:Source Sans Pro;font-size:12pt;color:#565656\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#565656\">나침반</span><span style=\"font-family:Source Sans Pro;font-size:12pt; const CONTENT_HASH = '285aae6d';

let cards = [];
let moving = null, resizing = null;
let selectedIdx = null, clipboardCard = null;
const GRID = 20, GAP = 14;
function snap(v) { return Math.round(v / GRID) * GRID; }

// ── Undo (Ctrl+Z) ────────────────────────────────────────────────────────────
const MAX_HISTORY = 50;
let history = [];
function snapshot() {
  syncText();
  history.push(JSON.stringify(cards));
  if (history.length > MAX_HISTORY) history.shift();
}
function undo() {
  if (!history.length) { showStatus('되돌릴 내용 없음'); return; }
  syncText();
  cards = JSON.parse(history.pop());
  renderCards();
  saveBoard();
  showStatus('↩ 되돌림');
}
function showStatus(msg) {
  const s = document.getElementById('status');
  s.textContent = msg;
  clearTimeout(showStatus._t);
  showStatus._t = setTimeout(() => { s.textContent = ''; }, 2000);
}
document.addEventListener('keydown', e => {
  const isText = document.activeElement?.contentEditable === 'true';
  if ((e.ctrlKey || e.metaKey) && e.key === 'z' && !e.shiftKey) {
    if (isText) return;
    e.preventDefault();
    undo();
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'c' && !e.shiftKey && !isText) {
    if (selectedIdx !== null && cards[selectedIdx]) {
      syncText();
      clipboardCard = JSON.parse(JSON.stringify(cards[selectedIdx]));
      showStatus('카드 복사됨');
      e.preventDefault();
    }
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'v' && !e.shiftKey && !isText) {
    if (clipboardCard) {
      e.preventDefault();
      snapshot();
      const nc = JSON.parse(JSON.stringify(clipboardCard));
      nc.x = (nc.x || 0) + 30; nc.y = (nc.y || 0) + 30;
      cards.push(nc);
      selectedIdx = cards.length - 1;
      renderCards(); saveBoard();
      showStatus('카드 붙여넣음');
    }
  }
  if (e.key === 'Escape') {
    document.querySelectorAll('.card.selected').forEach(c => c.classList.remove('selected'));
    selectedIdx = null;
  }
});

function pushCards(movedIdx) {
  const moved = cards[movedIdx];
  const movedEl = document.querySelector(`.card[data-idx="${movedIdx}"]`);
  if (!movedEl) return;
  const mh = movedEl.offsetHeight;
  document.querySelectorAll('.card').forEach(el => {
    const i = +el.dataset.idx;
    if (i === movedIdx) return;
    const c = cards[i], oh = el.offsetHeight;
    if (moved.x < (c.x+(c.w||200)) && (moved.x+(moved.w||200)) > c.x && moved.y < (c.y+oh) && (moved.y+mh) > c.y) {
      c.y = moved.y + mh + GAP;
      el.style.top = c.y + 'px';
    }
  });
}

function loadBoard() {
  const saved = localStorage.getItem(SAVE_KEY);
  const savedHash = localStorage.getItem(SAVE_KEY + ':hash');
  let parsed = null;
  try { parsed = saved ? JSON.parse(saved) : null; } catch(e) {}
  // reset if: no save, empty array, or content hash changed (page regenerated)
  if (!parsed || parsed.length === 0 || savedHash !== CONTENT_HASH) {
    cards = DEFAULT_CARDS.map(c => ({...c}));
    localStorage.removeItem(SAVE_KEY);
    localStorage.setItem(SAVE_KEY + ':hash', CONTENT_HASH);
    renderCards();
    const hasCoords = cards.some(c => c.x !== undefined && c.y !== undefined);
    if (!hasCoords) autoLayout();
    return;
  }
  cards = parsed;
  renderCards();
}
function resetToDefaults() { if (!confirm('저장된 보드를 지우고 원본으로 초기화합니다. 계속할까요?')) return; localStorage.removeItem(SAVE_KEY); cards = DEFAULT_CARDS.map(c => ({...c})); renderCards(); autoLayout(); }

function autoLayout() {
  const boardW = document.getElementById('board').offsetWidth;
  const cols = Math.max(1, Math.floor(boardW / 280));
  const colW = (boardW - GAP*(cols-1)) / cols;
  const colH = new Array(cols).fill(0);
  const allCards = document.querySelectorAll('.card');
  const images = document.querySelectorAll('.card img');
  let loaded = 0;
  function place() {
    allCards.forEach((el, i) => {
      const w = Math.min(cards[i].w || colW, colW);
      let minCol = 0;
      for (let c = 1; c < cols; c++) if (colH[c] < colH[minCol]) minCol = c;
      cards[i].x = minCol * (colW + GAP);
      cards[i].y = colH[minCol];
      cards[i].w = w;
      el.style.left = cards[i].x + 'px';
      el.style.top = cards[i].y + 'px';
      el.style.width = w + 'px';
      colH[minCol] = cards[i].y + el.offsetHeight + GAP;
    });
    document.getElementById('board').style.minHeight = (Math.max(...colH) + 100) + 'px';
    saveBoard();
  }
  if (!images.length) { requestAnimationFrame(place); return; }
  images.forEach(img => {
    if (img.complete) { loaded++; if (loaded >= images.length) requestAnimationFrame(place); }
    else { img.onload = img.onerror = () => { loaded++; if (loaded >= images.length) requestAnimationFrame(place); }; }
  });
}

function syncText() {
  document.querySelectorAll('.card').forEach(el => {
    const i = +el.dataset.idx;
    if (cards[i]?.type === 'text') { const t = el.querySelector('.text'); if (t) cards[i].content = t.innerHTML; }
  });
}
function saveBoard() { syncText(); localStorage.setItem(SAVE_KEY, JSON.stringify(cards)); localStorage.setItem(SAVE_KEY + ':hash', CONTENT_HASH); showStatus('저장됨 ' + new Date().toLocaleTimeString()); }

function renderCards() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  cards.forEach((card, i) => {
    const el = document.createElement('div');
    el.className = 'card'; el.dataset.idx = i;
    if (card.x !== undefined) el.style.left = card.x + 'px';
    if (card.y !== undefined) el.style.top = card.y + 'px';
    // html cards contain raw OneNote table HTML which may overflow the stated div width
    if (card.w) { if (card.type === 'html') el.style.minWidth = card.w + 'px'; else el.style.width = card.w + 'px'; }
    el.addEventListener('mousedown', e => {
      if (e.target.closest('.text, a, .card-btn, .resize-handle, td, th')) return;
      e.preventDefault();
      // Update selection
      document.querySelectorAll('.card.selected').forEach(c => c.classList.remove('selected'));
      selectedIdx = i; el.classList.add('selected');
      snapshot();
      moving = { idx: i, startX: e.clientX, startY: e.clientY, origX: card.x||0, origY: card.y||0 };
      el.classList.add('moving');
    });
    const actions = document.createElement('div'); actions.className = 'card-actions';
    const delBtn = document.createElement('button'); delBtn.className = 'card-btn'; delBtn.textContent = '×';
    delBtn.onclick = e => { e.stopPropagation(); if(confirm('삭제?')) { snapshot(); cards.splice(i,1); renderCards(); saveBoard(); } };
    actions.appendChild(delBtn); el.appendChild(actions);
    if (card.type === 'text') {
      const text = document.createElement('div'); text.className = 'text'; text.contentEditable = true;
      text.innerHTML = card.content || '';
      text.addEventListener('focus', () => { snapshot(); });
      text.addEventListener('blur', () => { card.content = text.innerHTML; saveBoard(); });
      el.appendChild(text);
    } else if (card.type === 'image') {
      const img = document.createElement('img');
      img.src = card.src.startsWith('http') || card.src.startsWith('data:') ? card.src : IMG_BASE + card.src;
      img.alt = ''; img.loading = 'lazy'; img.onerror = () => img.style.display = 'none';
      if (card.w) img.style.width = card.w + 'px';
      if (card.h) img.style.height = card.h + 'px';
      if (card.link) { const a = document.createElement('a'); a.href = card.link; a.target = '_blank'; a.appendChild(img); el.appendChild(a); }
      else { el.appendChild(img); }
      if (card.caption) { const cap = document.createElement('div'); cap.style.cssText = 'font-size:11px;color:#8b949e;margin-top:4px;word-break:break-word;padding:0 2px;'; cap.textContent = card.caption; el.appendChild(cap); }
    } else if (card.type === 'html') {
      const wrapper = document.createElement('div');
      wrapper.style.cssText = 'overflow:auto;font-size:13px;line-height:1.5;';
      wrapper.innerHTML = card.html.replace(/__ATTACHMENT__/g, IMG_BASE);
      wrapper.querySelectorAll('img').forEach(img => { img.style.maxWidth = '100%'; img.style.height = 'auto'; img.draggable = false; });
      wrapper.querySelectorAll('a').forEach(a => { a.target = '_blank'; a.style.color = '#6cb0f6'; });
      wrapper.querySelectorAll('table').forEach(t => { t.style.borderCollapse = 'collapse'; });
      wrapper.querySelectorAll('td,th').forEach(td => {
        td.style.border = '1px solid #444'; td.style.padding = '4px 6px'; td.style.verticalAlign = 'top';
        td.title = '더블클릭으로 편집';
        td.addEventListener('dblclick', function(e) {
          e.stopPropagation();
          snapshot();
          this.contentEditable = 'true';
          this.style.outline = '2px solid #388bfd';
          this.style.background = 'rgba(56,139,253,0.08)';
          this.focus();
        });
        td.addEventListener('blur', function() {
          this.contentEditable = 'false';
          this.style.outline = '';
          this.style.background = '';
          cards[i].html = wrapper.innerHTML.split(IMG_BASE).join('__ATTACHMENT__');
          saveBoard();
        });
      });
      el.appendChild(wrapper);
    } else if (card.type === 'table') {
      const rows = card.rows || [['','',''],['','',''],['','','']];
      const tbl = document.createElement('table');
      tbl.style.cssText = 'border-collapse:collapse;width:100%;font-size:13px;';
      rows.forEach((row, ri) => {
        const tr = tbl.insertRow();
        row.forEach((cell, ci) => {
          const td = document.createElement(ri === 0 ? 'th' : 'td');
          td.contentEditable = true;
          td.style.cssText = 'border:1px solid #30363d;padding:4px 8px;min-width:60px;text-align:left;' + (ri===0 ? 'background:#21262d;font-weight:600;' : '');
          td.textContent = cell;
          td.addEventListener('blur', () => { if (!cards[i].rows) cards[i].rows = rows; rows[ri][ci] = td.textContent; saveBoard(); });
          tr.appendChild(td);
        });
      });
      el.appendChild(tbl);
      const addRow = document.createElement('button');
      addRow.textContent = '+ 행'; addRow.style.cssText = 'margin-top:4px;font-size:11px;background:#21262d;border:1px solid #30363d;color:#8b949e;padding:2px 8px;border-radius:4px;cursor:pointer;';
      addRow.onclick = e => { e.stopPropagation(); snapshot(); if (!cards[i].rows) cards[i].rows = rows; cards[i].rows.push(new Array(cards[i].rows[0].length).fill('')); renderCards(); saveBoard(); };
      const addCol = document.createElement('button');
      addCol.textContent = '+ 열'; addCol.style.cssText = 'margin-top:4px;margin-left:4px;font-size:11px;background:#21262d;border:1px solid #30363d;color:#8b949e;padding:2px 8px;border-radius:4px;cursor:pointer;';
      addCol.onclick = e => { e.stopPropagation(); snapshot(); if (!cards[i].rows) cards[i].rows = rows; cards[i].rows.forEach(r => r.push('')); renderCards(); saveBoard(); };
      el.appendChild(addRow); el.appendChild(addCol);
    }
    const rh = document.createElement('div'); rh.className = 'resize-handle';
    rh.addEventListener('mousedown', e => { e.preventDefault(); e.stopPropagation(); snapshot(); resizing = { idx: i, startX: e.clientX, startW: card.w || el.offsetWidth }; });
    el.appendChild(rh);
    if (i === selectedIdx) el.classList.add('selected');
    board.appendChild(el);
  });
  requestAnimationFrame(() => {
    let maxB = 0;
    document.querySelectorAll('.card').forEach(el => { const b = (parseFloat(el.style.top)||0) + el.offsetHeight; if (b > maxB) maxB = b; });
    board.style.minHeight = (maxB + 100) + 'px';
  });
}

document.addEventListener('mousemove', e => {
  if (moving) {
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`); if (!el) return;
    let nx = moving.origX + e.clientX - moving.startX, ny = moving.origY + e.clientY - moving.startY;
    if (e.shiftKey) { nx = snap(nx); ny = snap(ny); el.style.outline = '1px dashed rgba(240,192,64,0.3)'; } else { el.style.outline = ''; }
    el.style.left = nx + 'px'; el.style.top = ny + 'px';
  }
  if (resizing) {
    let nw = resizing.startW + e.clientX - resizing.startX; if (e.shiftKey) nw = snap(nw);
    cards[resizing.idx].w = Math.max(100, nw);
    const el = document.querySelector(`.card[data-idx="${resizing.idx}"]`); if (el) el.style.width = cards[resizing.idx].w + 'px';
  }
});

document.addEventListener('mouseup', e => {
  if (moving) {
    let nx = moving.origX + e.clientX - moving.startX, ny = moving.origY + e.clientY - moving.startY;
    if (e.shiftKey) { nx = snap(nx); ny = snap(ny); }
    cards[moving.idx].x = Math.max(0, nx); cards[moving.idx].y = Math.max(0, ny);
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`); if (el) { el.classList.remove('moving'); el.style.outline = ''; }
    if (e.shiftKey) pushCards(moving.idx);
    moving = null; saveBoard();
  }
  if (resizing) { if (e.shiftKey) pushCards(resizing.idx); resizing = null; saveBoard(); }
});

function addTextCard() { snapshot(); cards.push({ type: 'text', content: '', x: 50, y: window.scrollY+100, w: 300 }); renderCards(); setTimeout(() => { const els = document.querySelectorAll('.card .text'); els[els.length-1]?.focus(); }, 100); }
function addImageCard() { const input = document.createElement('input'); input.type = 'file'; input.accept = 'image/*'; input.onchange = e => { const f = e.target.files[0]; if (!f) return; const r = new FileReader(); r.onload = () => { snapshot(); cards.push({ type: 'image', src: r.result, x: 50, y: window.scrollY+100, w: 240 }); renderCards(); saveBoard(); }; r.readAsDataURL(f); }; input.click(); }
function addImageUrl() { const url = prompt('이미지 URL'); if (!url) return; snapshot(); cards.push({ type: 'image', src: url, x: 50, y: window.scrollY+100, w: 240 }); renderCards(); saveBoard(); }
function addTableCard() {
  const colsStr = prompt('열 수 (기본 3)', '3'); const cols = Math.max(1, parseInt(colsStr)||3);
  const rowsStr = prompt('행 수 (헤더 포함, 기본 4)', '4'); const rows = Math.max(1, parseInt(rowsStr)||4);
  snapshot();
  cards.push({ type: 'table', rows: Array.from({length: rows}, (_, ri) => Array.from({length: cols}, (_, ci) => ri===0 ? `열${ci+1}` : '')), x: 50, y: window.scrollY+100, w: Math.max(240, cols*100) });
  renderCards(); saveBoard();
}
function exportBoard() { syncText(); const blob = new Blob([JSON.stringify(cards, null, 2)], { type: 'application/json' }); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = SAVE_KEY + '.json'; a.click(); }
// ── Zoom ─────────────────────────────────────────────────────────────────────
let zoom = parseFloat(localStorage.getItem('zoom-' + SAVE_KEY) || '1.0');
function applyZoom() {
  const board = document.getElementById('board');
  board.style.transform = `scale(${zoom})`;
  board.style.transformOrigin = '0 0';
  document.getElementById('zoom-level').textContent = Math.round(zoom * 100) + '%';
  localStorage.setItem('zoom-' + SAVE_KEY, zoom);
}
function zoomIn()  { zoom = Math.min(3.0, parseFloat((zoom + 0.1).toFixed(2))); applyZoom(); }
function zoomOut() { zoom = Math.max(0.2, parseFloat((zoom - 0.1).toFixed(2))); applyZoom(); }
document.addEventListener('keydown', e => {
  if (e.ctrlKey || e.metaKey) {
    if (e.key === '=' || e.key === '+') { e.preventDefault(); zoomIn(); }
    if (e.key === '-')                  { e.preventDefault(); zoomOut(); }
    if (e.key === '0')                  { e.preventDefault(); zoom = 1.0; applyZoom(); }
  }
});
document.getElementById('board').addEventListener('wheel', e => {
  if (!(e.ctrlKey || e.metaKey)) return;
  e.preventDefault();
  e.deltaY < 0 ? zoomIn() : zoomOut();
}, { passive: false });
applyZoom();
function resetLayout() { if (!confirm('자동 재배치합니다.')) return; cards.forEach(c => { delete c.x; delete c.y; }); renderCards(); autoLayout(); }
// ── Floating format toolbar ───────────────────────────────────────────────────
const fmtBar = document.getElementById('format-toolbar');
function fmt(cmd) { document.execCommand(cmd, false, null); saveBoard(); }
function fmtLink() {
  const sel = window.getSelection();
  if (!sel || sel.isCollapsed) return;
  const url = prompt('링크 URL 입력', 'https://');
  if (!url) return;
  document.execCommand('createLink', false, url);
  // make links open in new tab
  sel.anchorNode?.parentElement?.closest('a')?.setAttribute('target', '_blank');
  document.querySelectorAll('.text a').forEach(a => a.target = '_blank');
  saveBoard();
}

// prevent format buttons from blurring contenteditable
fmtBar.addEventListener('mousedown', e => e.preventDefault());

document.addEventListener('selectionchange', () => {
  const sel = window.getSelection();
  if (!sel || sel.isCollapsed || !sel.toString().trim()) { fmtBar.style.display = 'none'; return; }
  // only show if selection is inside a .text element
  const anchor = sel.anchorNode;
  if (!anchor) { fmtBar.style.display = 'none'; return; }
  const textEl = anchor.nodeType === 1 ? anchor.closest('.text') : anchor.parentElement?.closest('.text');
  if (!textEl) { fmtBar.style.display = 'none'; return; }
  // position above selection
  const range = sel.getRangeAt(0);
  const rect = range.getBoundingClientRect();
  fmtBar.style.display = 'flex';
  const tbW = fmtBar.offsetWidth || 180;
  let left = rect.left + rect.width / 2 - tbW / 2;
  left = Math.max(8, Math.min(left, window.innerWidth - tbW - 8));
  fmtBar.style.left = left + 'px';
  fmtBar.style.top = (rect.top - 44 + window.scrollY) + 'px';
});

setInterval(saveBoard, 30000);
loadBoard();
</script>
</body>
</html>
