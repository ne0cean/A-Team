<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>시장분석</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1e1e1e; color: #e0e0e0; font-family: 'Segoe UI', -apple-system, sans-serif; font-size: 15px; line-height: 1.6; padding: 20px 30px 60px; overflow-x: hidden; }
a { color: #6cb0f6; text-decoration: none; }
a:hover { text-decoration: underline; }
.title-bar { background: #3a3a5c; display: inline-block; padding: 6px 16px; font-size: 22px; font-weight: bold; color: #fff; margin-bottom: 4px; }
.date { color: #999; font-size: 13px; margin-bottom: 20px; }
.board { position: relative; }
.card { background: #2a2a2a; border: 1px solid #3a3a3a; border-radius: 8px; padding: 12px; position: absolute; cursor: grab; transition: box-shadow 0.15s; overflow: hidden; }
.card:hover { box-shadow: 0 0 0 1px #58a6ff; z-index: 10; }
.card.moving { opacity: 0.8; box-shadow: 0 4px 24px rgba(0,0,0,0.6); z-index: 100; cursor: grabbing; }
.card img { width: 100%; border-radius: 4px; display: block; }
.card .text { outline: none; min-height: 20px; white-space: pre-wrap; word-break: break-word; }
.card .text:focus { background: rgba(255,255,255,0.05); border-radius: 4px; padding: 4px; }
.card .text:empty::before { content: '텍스트 입력...'; color: #555; }
.card-actions { position: absolute; top: 4px; right: 4px; display: none; gap: 4px; }
.card:hover .card-actions { display: flex; }
.card-btn { background: #333; border: 1px solid #555; color: #ccc; border-radius: 4px; padding: 2px 6px; font-size: 11px; cursor: pointer; }
.card-btn:hover { background: #444; color: #fff; }
.resize-handle { position: absolute; bottom: 0; right: 0; width: 16px; height: 16px; cursor: se-resize; opacity: 0; }
.card:hover .resize-handle { opacity: 0.6; }
.resize-handle::after { content: ''; position: absolute; bottom: 3px; right: 3px; width: 8px; height: 8px; border-right: 2px solid #666; border-bottom: 2px solid #666; }
.card.selected { box-shadow: 0 0 0 2px #58a6ff; z-index: 5; }
.highlight-red { color: #ff6b6b; }
.highlight-blue { color: #6cb0f6; }
.highlight-gold { color: #f0c040; }
.toolbar { position: fixed; bottom: 0; left: 0; right: 0; background: #161b22; border-top: 1px solid #30363d; padding: 8px 20px; display: flex; gap: 12px; align-items: center; z-index: 200; }
.toolbar button { background: #21262d; border: 1px solid #30363d; color: #e0e0e0; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; }
.toolbar button:hover { background: #30363d; }
.toolbar .status { color: #8b949e; font-size: 12px; margin-left: auto; }
#format-toolbar { position: fixed; display: none; background: #1c2128; border: 1px solid #444c56; border-radius: 8px; padding: 4px 6px; gap: 2px; align-items: center; z-index: 500; box-shadow: 0 4px 16px rgba(0,0,0,0.5); }
#format-toolbar button { background: none; border: none; color: #cdd9e5; padding: 4px 8px; border-radius: 5px; cursor: pointer; font-size: 13px; line-height: 1; }
#format-toolbar button:hover { background: #373e47; }
#format-toolbar .sep { width: 1px; height: 16px; background: #444c56; margin: 0 2px; }
</style>
</head>
<body>
<div class="title-bar" contenteditable="true">시장분석</div>
<div class="date"></div>
<div class="board" id="board"></div>
<div id="format-toolbar">
  <button onmousedown="e=>e.preventDefault()" onclick="fmt('bold')" title="굵게"><b>B</b></button>
  <button onclick="fmt('italic')" title="기울임"><i>I</i></button>
  <button onclick="fmt('underline')" title="밑줄"><u>U</u></button>
  <div class="sep"></div>
  <button onclick="fmtLink()" title="링크 삽입">🔗</button>
  <button onclick="fmt('unlink')" title="링크 제거">✂</button>
</div>
<div class="toolbar">
  <button onclick="undo()" title="Ctrl+Z">↩ 실행취소</button>
  <button onclick="addTextCard()">+ 텍스트</button>
  <button onclick="addImageCard()">+ 이미지</button>
  <button onclick="addImageUrl()">+ 이미지 URL</button>
  <button onclick="addTableCard()">+ 표</button>
  <button onclick="saveBoard()">💾 저장</button>
  <button onclick="exportBoard()">📤 내보내기</button>
  <button onclick="resetLayout()">↺ 재배치</button>
  <button onclick="resetToDefaults()" style="color:#f85149">↺ 초기화</button>
  <div style="display:flex;align-items:center;gap:4px;margin-left:8px;border-left:1px solid #30363d;padding-left:12px;">
    <button onclick="zoomOut()" title="Ctrl+-" style="padding:6px 10px;">−</button>
    <span id="zoom-level" style="font-size:12px;color:#8b949e;min-width:36px;text-align:center;">100%</span>
    <button onclick="zoomIn()" title="Ctrl+=" style="padding:6px 10px;">+</button>
  </div>
  <span class="status" id="status">Ready</span>
</div>
<script>
const SAVE_KEY = 'board-시장분석';
const IMG_BASE = '../../attachments/';
const DEFAULT_CARDS = [
  {
    "type": "text",
    "x": 936,
    "y": 67,
    "w": 600,
    "content": "위챗, 틱톡\n커뮤니케이션 서비스에 대한 상호 의존적 수요의 원리"
  },
  {
    "type": "html",
    "x": 48,
    "y": 139,
    "w": 720,
    "html": "\r\n\t\t\t<p style=\"font-family:맑은 고딕;margin-top:0pt;margin-bottom:0pt\"><a href=\"http://www.koreanclick.com/insights/newsletter_view.html?code=topic&amp;id=570&amp;page=1&amp;utm_source=board&amp;utm_medium=board&amp;utm_campaign=topic&amp;utm_content=20200427\" style=\"font-family:Malgun Gothic\">http://www.koreanclick.com/insights/newsletter_view.html?code=topic&amp;id=570&amp;page=1&amp;utm_source=board&amp;utm_medium=board&amp;utm_campaign=topic&amp;utm_content=20200427</a></p>\r\n\t\t\t<br />\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:맑은 고딕;margin-top:0pt;margin-bottom:0pt\"><span style=\"color:#787878\">April 2020</span></p>\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<table style=\"border:0px\">\r\n\t\t\t\t<tr>\r\n\t\t\t\t\t<td style=\"border:0px\">\t\t\t\t\t<table style=\"border:0px\">\r\n\t\t\t\t\t\t<tr>\r\n\t\t\t\t\t\t\t<td style=\"border:0px;font-family:맑은 고딕\"><span style=\"color:black;font-weight:bold\">대세는</span><span lang=\"en-US\" style=\"color:black;font-weight:bold\">&#160;SNS</span><span style=\"color:black;font-weight:bold\">형 숏폼 플랫폼</span><span lang=\"en-US\" style=\"color:black;font-weight:bold\">! , TikTok SWOT&#160;</span><span style=\"color:black;font-weight:bold\">분석</span></td>\r\n\t\t\t\t\t\t</tr>\r\n\t\t\t\t\t\t<tr>\r\n\t\t\t\t\t\t\t<td style=\"border:0px;font-family:맑은 고딕\"><span lang=\"en-US\"><span style=\"color:black;font-weight:bold\">1. TikTok:&#160;</span><span lang=\"ko-KR\" style=\"color:black;font-weight:bold\">출시 이후 꾸준한 성장</span><span style=\"color:black;font-weight:bold\">, SNS</span><span lang=\"ko-KR\" style=\"color:black;font-weight:bold\">형 숏폼 플랫폼의 선두주자</span></span></td>\r\n\t\t\t\t\t\t</tr>\r\n\t\t\t\t\t\t<tr>\r\n\t\t\t\t\t\t\t<td style=\"border:0px\"><p style=\"font-family:맑은 고딕;margin-top:0pt;margin-bottom:0pt\"><span style=\"color:black\">동영상 이용이 점점 일상에서의 습관적 이용으로 변화하면서</span><span lang=\"en-US\" style=\"color:black\">,&#160;</span><span style=\"color:black\">언제 어디서든 간편하게 즐길 수 있는 숏폼</span><span lang=\"en-US\" style=\"color:black\">(short-form)&#160;</span><span style=\"color:black\">콘텐츠가 주목받고 있습니다</span><span lang=\"en-US\" style=\"color:black\">.&#160;</span><span style=\"color:black\">그 중에서도</span><span lang=\"en-US\" style=\"color:black\">&#160;1</span><span style=\"color:black\">분 이내의 짧은 영상을 이용자들이 직접 촬영하여 공유할 수 있어</span><span lang=\"en-US\" style=\"color:black\">&#160;SNS</span><span style=\"color:black\">형 숏폼 플랫폼의 성격을 지니고 있는</span><span lang=\"en-US\" style=\"color:black\">&#160;TikTok</span><span style=\"color:black\">은</span><span lang=\"en-US\" style=\"color:black\">&#160;2017</span><span style=\"color:black\">년</span><span lang=\"en-US\" style=\"color:black\">&#160;11</span><span style=\"color:black\">월 한국에 공식으로 출시된 이후 꾸준히 성장을 도모하며 숏폼 플랫폼의 선두주자로 꼽히고 있습니다</span><span lang=\"en-US\" style=\"color:black\">.</span></p>\r\n\t\t\t\t\t\t\t<br />\r\n\t\t\t\t\t\t\t<p lang=\"en-US\" style=\"font-family:맑은 고딕;margin-top:0pt;margin-bottom:0pt\"><span style=\"color:black\">TikTok</span><span lang=\"ko-KR\" style=\"color:black\">은 이용자들이 앱 내의 기능을 이용해 자체적으로 편집하여 영상을 업로드 하고 서로 공유할 수 있다는 강점을 이용하여 다양한 기업</span><span style=\"color:black\">,&#160;</span><span lang=\"ko-KR\" style=\"color:black\">연예인들과 마케팅을 진행하며 이용자 확보에 성공하였습니다</span><span style=\"color:black\">.&#160;</span><span lang=\"ko-KR\" style=\"color:black\">특히</span><span style=\"color:black\">&#160;2020</span><span lang=\"ko-KR\" style=\"color:black\">년</span><span style=\"color:black\">&#160;1</span><span lang=\"ko-KR\" style=\"color:black\">월</span><span style=\"color:black\">&#160;TikTok</span><span lang=\"ko-KR\" style=\"color:black\">에서 진행한 ‘</span><span style=\"color:black\">#</span><span lang=\"ko-KR\" style=\"color:black\">아무노래챌린지’가 큰 주목을 받아 앱의 재도약기를 맞이하여</span><span style=\"color:black\">&#160;12</span><span lang=\"ko-KR\" style=\"color:black\">월 대비</span><span style=\"color:black\">&#160;2</span><span lang=\"ko-KR\" style=\"color:black\">월의 이용자수가</span><span style=\"color:black\">&#160;11%&#160;</span><span lang=\"ko-KR\" style=\"color:black\">증가하며</span><span style=\"color:black\">&#160;OTT</span><span lang=\"ko-KR\" style=\"color:black\">앱</span><span style=\"color:black\">&#160;4</span><span lang=\"ko-KR\" style=\"color:black\">위로 성장하는 모습을 보였습니다</span><span style=\"color:black\">.&#160;</span><a href=\"http://www.koreanclick.com/insights/newsletter_view.html?code=topic&amp;id=570&amp;page=1&amp;utm_source=board&amp;utm_medium=board&amp;utm_campaign=topic&amp;utm_content=20200427\">more</a></p>\r\n\t\t\t\t\t\t\t</td>\r\n\t\t\t\t\t\t</tr>\r\n\t\t\t\t\t\t<tr>\r\n\t\t\t\t\t\t\t<td style=\"background-color:#e7e7e7;border:0px;font-family:맑은 고딕\"><span lang=\"en-US\"><span style=\"color:#2a2a2a;font-weight:bold\">TikTok&#160;</span><span lang=\"ko-KR\" style=\"color:#2a2a2a;font-weight:bold\">출시 이후 트렌드 및 전분기 대비 순위 비교</span></span></td>\r\n\t\t\t\t\t\t</tr>\r\n\t\t\t\t\t\t<tr>\r\n\t\t\t\t\t\t\t<td style=\"border:0px\"><br />\r\n\t\t\t\t\t\t\t<p lang=\"en-US\" style=\"font-family:맑은 고딕;margin-top:0pt;margin-bottom:0pt\">&#160;</p>\r\n\t\t\t\t\t\t\t</td>\r\n\t\t\t\t\t\t</tr>\r\n\t\t\t\t\t</table>\r\n\t\t\t\t\t</td>\r\n\t\t\t\t</tr>\r\n\t\t\t\t<tr>\r\n\t\t\t\t\t<td style=\"border:0px;font-family:맑은 고딕\">이번 토픽에서는 숏폼 콘텐츠 시장을 선점한<span lang=\"en-US\">&#160;SNS</span>형 숏폼 플랫폼<span lang=\"en-US\">&#160;TikTok</span>에 대해<span lang=\"en-US\">&#160;SWOT</span>분석의 틀을 기반으로 분석해보고자 합니다<span lang=\"en-US\">. SWOT</span>분석을 통해<span lang=\"en-US\">&#160;TikTok</span>앱의 내부적인 요인들에서 기인한 상대적인 강점 및 약점을 분석하고 나아가 외부적인 시장 요인으로 인한 위협요인과 기회요인을 파악해보고자 합니다<span lang=\"en-US\">.&#160;</span>이를 통해<span lang=\"en-US\">&#160;TikTok</span>을 비롯한 시장진입을 앞두고 있는 숏폼 콘텐츠 서비스들은 외부의 위협 요인을 파악하여 이를 타계할 수 있도록 강점을 극대화 및 기회요인을 활용하는 동시에 약점을 보완할 수 있는 전략이 필요할 것입니다<span lang=\"en-US\">.</span></td>\r\n\t\t\t\t</tr>\r\n\t\t\t\t<tr>\r\n\t\t\t\t\t<td style=\"border:0px\"><p lang=\"en-US\" style=\"font-family:맑은 고딕;margin-top:0pt;margin-bottom:0pt\"><span style=\"color:black;font-weight:bold\">2. TikTok&#160;</span><span lang=\"ko-KR\" style=\"color:black;font-weight:bold\">앱의 강점 및 약점 분석</span></p>\r\n\t\t\t\t\t<br />\r\n\t\t\t\t\t<p lang=\"en-US\" style=\"font-family:맑은 고딕;margin-top:0pt;margin-bottom:0pt\"><span style=\"color:black;font-weight:bold\">2-1) Strength: Z</span><span lang=\"ko-KR\" style=\"color:black;font-weight:bold\">세대</span><span style=\"color:black;font-weight:bold\">(7~18</span><span lang=\"ko-KR\" style=\"color:black;font-weight:bold\">세</span><span style=\"color:black;font-weight:bold\">)</span><span lang=\"ko-KR\" style=\"color:black;font-weight:bold\">에서의 폭발적 인기</span><span style=\"color:black;font-weight:bold\">&#160;&amp;&#160;</span><span lang=\"ko-KR\" style=\"color:black;font-weight:bold\">짧은 동영상 앱 이용 행태</span></p>\r\n\t\t\t\t\t<br />\r\n\t\t\t\t\t<p lang=\"en-US\" style=\"font-family:맑은 고딕;margin-top:0pt;margin-bottom:0pt\">Z<span lang=\"ko-KR\">세대 모바일 이용자의</span>&#160;39%<span lang=\"ko-KR\">가</span>&#160;TikTok<span lang=\"ko-KR\">을 이용한 것으로 나타났습니다</span>.&#160;<span lang=\"ko-KR\">또한 이용집중도</span>(TikTok<span lang=\"ko-KR\">이용자 중</span>&#160;10<span lang=\"ko-KR\">대의 비율을 전체</span>&#160;10<span lang=\"ko-KR\">대 이용자의 비율로 나눈 지표</span>, 100<span lang=\"ko-KR\">일 경우 동일 비율로 해석됨</span>)<span lang=\"ko-KR\">가</span>&#160;565<span lang=\"ko-KR\">으로 나타나 타 동영상 앱에 비해</span>&#160;Z<span lang=\"ko-KR\">세대의 집중적 이용이 돋보이는 앱입니다</span>.</p>\r\n\t\t\t\t\t</td>\r\n\t\t\t\t</tr>\r\n\t\t\t\t<tr>\r\n\t\t\t\t\t<td style=\"border:0px;font-family:맑은 고딕\"><span lang=\"en-US\"><span style=\"color:black;font-weight:bold\">Z</span><span lang=\"ko-KR\" style=\"color:black;font-weight:bold\">세대의</span><span style=\"color:black;font-weight:bold\">&#160;TikTok&#160;</span><span lang=\"ko-KR\" style=\"color:black;font-weight:bold\">이용 및</span><span style=\"color:black;font-weight:bold\">&#160;OTT&#160;</span><span lang=\"ko-KR\" style=\"color:black;font-weight:bold\">서비스들 실행당 평균 이용시간</span></span></td>\r\n\t\t\t\t</tr>\r\n\t\t\t\t<tr>\r\n\t\t\t\t\t<td style=\"border:0px\"><br />\r\n\t\t\t\t\t<br />\r\n\t\t\t\t\t</td>\r\n\t\t\t\t</tr>\r\n\t\t\t\t<tr>\r\n\t\t\t\t\t<td style=\"border:0px\"><p lang=\"en-US\" style=\"font-family:맑은 고딕;margin-top:0pt;margin-bottom:0pt\">Z<span lang=\"ko-KR\">세대는 디지털 네이티브로 불리며 성장시기부터 디지털</span>,&#160;<span lang=\"ko-KR\">모바일을 이용한 세대로서 향후 모바일 시장의 주력 소비자로 떠오르고 있습니다</span>. Z<span lang=\"ko-KR\">세대들은 텍스트보다는 동영상에 익숙하며</span>,&#160;<span lang=\"ko-KR\">동영상으로 소통하는 커뮤니케이션을 선호하는 특성을 보입니다</span>. TikTok<span lang=\"ko-KR\">은 이러한</span>&#160;Z<span lang=\"ko-KR\">세대의 취향을 충족시키며</span>&#160;Z<span lang=\"ko-KR\">세대를 중심으로 앱 성장을 견인한 것으로 파악됩니다</span>.</p>\r\n\t\t\t\t\t<br />\r\n\t\t\t\t\t<p style=\"font-family:맑은 고딕;margin-top:0pt;margin-bottom:0pt\">특히 기성 콘텐츠를 제공하는<span lang=\"en-US\">&#160;RMC</span>기반의<span lang=\"en-US\">&#160;OTT&#160;</span>서비스들의<span lang=\"en-US\">&#160;App&#160;</span>실행당 평균 이용시간 또한<span lang=\"en-US\">&#160;10</span>분 내외로 짧게 나타나<span lang=\"en-US\">,&#160;</span>이용자들은 평소 몰아보기와 같은 행태보다는 일과시간 동안 짧게 이용하는 스낵컬처의 행태를 보인다고 파악됩니다<span lang=\"en-US\">.&#160;</span>즉<span lang=\"en-US\">,&#160;</span>이용자들이 평소 선호하는 동영상의 길이는 짧은 시간 내에 이용 가능한 심리적 장벽을 낮추는 숏폼 콘텐츠라고 해석해볼 수 있습니다<span lang=\"en-US\">.&#160;</span>이용자들의 동영상 이용행태가 스낵컬처의 형태로 자리잡으며 향 후<span lang=\"en-US\">&#160;TikTok</span>과 같은 숏폼 콘텐츠 시장이 성장할 것으로 예상됩니다<span lang=\"en-US\">.</span></p>\r\n\t\t\t\t\t<br />\r\n\t\t\t\t\t<p lang=\"en-US\" style=\"font-family:맑은 고딕;margin-top:0pt;margin-bottom:0pt\"><span style=\"color:black;font-weight:bold\">2-2) Weakness:&#160;</span><span lang=\"ko-KR\" style=\"color:black;font-weight:bold\">이용자 연령대 확장의 미흡</span></p>\r\n\t\t\t\t\t<br />\r\n\t\t\t\t\t<p lang=\"en-US\" style=\"font-family:맑은 고딕;margin-top:0pt;margin-bottom:0pt\">TikTok<span lang=\"ko-KR\">은</span>&#160;Z<span lang=\"ko-KR\">세대의 비중이 약</span>&#160;61%<span lang=\"ko-KR\">를 차지하는</span>&#160;10<span lang=\"ko-KR\">대 위주의 앱 이용행태를 보이고 있습니다</span>. 2020<span lang=\"ko-KR\">년</span>&#160;1<span lang=\"ko-KR\">월 ‘아무노래 챌린지’로 이용자가 급성장하는 모습을 보였으나</span>,&#160;<span lang=\"ko-KR\">이를 견인한 것은</span>&#160;Z<span lang=\"ko-KR\">세대 이용자였습니다</span>.&#160;<span lang=\"ko-KR\">동영상</span>/<span lang=\"ko-KR\">방송카테고리 이용자를 연령별로 살펴보았을 때</span>&#160;10<span lang=\"ko-KR\">대의 비중이</span>&#160;11%<span lang=\"ko-KR\">에 불과하다는 것은</span>&#160;20~60<span lang=\"ko-KR\">대 등 다수의 나머지 연령층 확보를 통한 이용자 확장을 위한 전략이 필요할 것으로 판단됩니다</span>.</p>\r\n\t\t\t\t\t</td>\r\n\t\t\t\t</tr>\r\n\t\t\t\t<tr>\r\n\t\t\t\t\t<td style=\"border:0px;font-family:맑은 고딕\"><span lang=\"en-US\"><span style=\"color:black;font-weight:bold\">TikTok&#160;</span><span lang=\"ko-KR\" style=\"color:black;font-weight:bold\">이용자 및 동영상</span><span style=\"color:black;font-weight:bold\">/</span><span lang=\"ko-KR\" style=\"color:black;font-weight:bold\">방송 카테고리 연령별 비중 비교</span></span></td>\r\n\t\t\t\t</tr>\r\n\t\t\t\t<tr>\r\n\t\t\t\t\t<td style=\"border:0px\"><br />\r\n\t\t\t\t\t<br />\r\n\t\t\t\t\t</td>\r\n\t\t\t\t</tr>\r\n\t\t\t\t<tr>\r\n\t\t\t\t\t<td style=\"border:0px\"><p lang=\"en-US\" style=\"font-family:맑은 고딕;margin-top:0pt;margin-bottom:0pt\"><span style=\"color:black;font-weight:bold\">3. TikTok&#160;</span><span lang=\"ko-KR\" style=\"color:black;font-weight:bold\">앱의 외부적 기회요인 및 위협요인 분석</span></p>\r\n\t\t\t\t\t<br />\r\n\t\t\t\t\t<p lang=\"en-US\" style=\"font-family:맑은 고딕;margin-top:0pt;margin-bottom:0pt\"><span style=\"color:black;font-weight:bold\">3-1) Opportunity: SNS</span><span lang=\"ko-KR\" style=\"color:black;font-weight:bold\">와의 높은 연계 이용</span><span style=\"color:black;font-weight:bold\">, SNS&#160;</span><span lang=\"ko-KR\" style=\"color:black;font-weight:bold\">화제성과 동반성장</span></p>\r\n\t\t\t\t\t<br />\r\n\t\t\t\t\t<p lang=\"en-US\" style=\"font-family:맑은 고딕;margin-top:0pt;margin-bottom:0pt\">SNS<span lang=\"ko-KR\">들의</span>&#160;OTT<span lang=\"ko-KR\">앱 중복 이용 순위를 살펴본 결과</span>&#160;TikTok<span lang=\"ko-KR\">앱은 모든</span>&#160;SNS<span lang=\"ko-KR\">에서</span>&#160;5<span lang=\"ko-KR\">위내로 나타나</span>&#160;SNS<span lang=\"ko-KR\">와의 중복이용이 높게 나타나고 있습니다</span>.&#160;<span lang=\"ko-KR\">타</span>&#160;OTT&#160;<span lang=\"ko-KR\">앱들 중 이용자수가 높은 유튜브와 넷플릭스를 제외하고</span>&#160;SNS<span lang=\"ko-KR\">에 따라 순위 변동이 크게 나타나는 것에 반해</span>, TikTok<span lang=\"ko-KR\">은</span>&#160;SNS<span lang=\"ko-KR\">와의 고른 중복이용을 보여</span>&#160;TikTok&#160;<span lang=\"ko-KR\">영상 공유 등</span>&#160;SNS<span lang=\"ko-KR\">와의 연계 이용이 이루어진다고 해석해볼 수 있습니다</span>.&#160;<span lang=\"ko-KR\">또한</span>&#160;TikTok&#160;<span lang=\"ko-KR\">이용자들의</span>&#160;SNS&#160;<span lang=\"ko-KR\">활동성 또한 미이용자들에 비해 높게 나타나</span>&#160;TikTok&#160;<span lang=\"ko-KR\">이용자들은</span>&#160;SNS<span lang=\"ko-KR\">를 통한 소통에도 높은 이용률을 보이는 소셜 활동 집중 이용자라고 해석해 볼 수 있겠습니다</span>.</p>\r\n\t\t\t\t\t</td>\r\n\t\t\t\t</tr>\r\n\t\t\t\t<tr>\r\n\t\t\t\t\t<td style=\"border:0px;font-family:맑은 고딕\"><span lang=\"en-US\"><span style=\"color:black;font-weight:bold\">- SNS</span><span lang=\"ko-KR\" style=\"color:black;font-weight:bold\">들의</span><span style=\"color:black;font-weight:bold\">&#160;OTT</span><span lang=\"ko-KR\" style=\"color:black;font-weight:bold\">앱 중복이용 순위</span></span></td>\r\n\t\t\t\t</tr>\r\n\t\t\t\t<tr>\r\n\t\t\t\t\t<td style=\"border:0px\"><br />\r\n\t\t\t\t\t<br />\r\n\t\t\t\t\t</td>\r\n\t\t\t\t</tr>\r\n\t\t\t\t<tr>\r\n\t\t\t\t\t<td style=\"border:0px;font-family:맑은 고딕\"><span lang=\"en-US\">TikTok<span lang=\"ko-KR\">과</span>&#160;SNS<span lang=\"ko-KR\">의 연계이용에 대해 살펴보기 위해</span>&#160;SNS<span lang=\"ko-KR\">내의 화제성 추이와 이용자수 추이를 함께 살펴보았습니다</span>. SNS&#160;<span lang=\"ko-KR\">버즈량이 크게 증가하는</span>&#160;2019<span lang=\"ko-KR\">년</span>&#160;12<span lang=\"ko-KR\">월</span>, 2020<span lang=\"ko-KR\">년</span>&#160;1<span lang=\"ko-KR\">월에</span>&#160;TikTok<span lang=\"ko-KR\">의 순이용자수또한 함께 성장하는 것으로 나타났습니다</span>. SNS&#160;<span lang=\"ko-KR\">내에서 화제성을 보인 ‘</span>#<span lang=\"ko-KR\">아무노래챌린지’는 인스타그램 내에서</span>&#160;10<span lang=\"ko-KR\">만 이상의 태그를 발생시켰으며</span>,&#160;<span lang=\"ko-KR\">해당 음원은 스트리밍 서비스 내에서</span>&#160;1<span lang=\"ko-KR\">위를 차지하며</span>&#160;TikTok<span lang=\"ko-KR\">의 홍보효과를 누렸습니다</span>.&#160;<span lang=\"ko-KR\">해당 챌린지가 진행되며 타</span>&#160;SNS<span lang=\"ko-KR\">상에서</span>&#160;TikTok<span lang=\"ko-KR\">계정 공유 또한 활발히 일어나며</span>&#160;TikTok&#160;<span lang=\"ko-KR\">앱 이용을 이끌었습니다</span>.</span></td>\r\n\t\t\t\t</tr>\r\n\t\t\t\t<tr>\r\n\t\t\t\t\t<td style=\"border:0px;font-family:맑은 고딕\"><span lang=\"en-US\"><span style=\"color:black;font-weight:bold\">SNS</span><span lang=\"ko-KR\" style=\"color:black;font-weight:bold\">내</span><span style=\"color:black;font-weight:bold\">&#160;TikTok&#160;</span><span lang=\"ko-KR\" style=\"color:black;font-weight:bold\">화제성과 순이용자 수 추이 비교</span></span></td>\r\n\t\t\t\t</tr>\r\n\t\t\t\t<tr>\r\n\t\t\t\t\t<td style=\"border:0px\"><br />\r\n\t\t\t\t\t<br />\r\n\t\t\t\t\t</td>\r\n\t\t\t\t</tr>\r\n\t\t\t\t<tr>\r\n\t\t\t\t\t<td style=\"border:0px;font-family:맑은 고딕\">타<span lang=\"en-US\">&#160;SNS</span>와의 연계이용이 높으며<span lang=\"en-US\">&#160;SNS</span>에서의 활동성이 높은 이용자들을 보유한<span lang=\"en-US\">&#160;TikTok</span>은<span lang=\"en-US\">&#160;SNS</span>를 통한 공유<span lang=\"en-US\">,&#160;</span>확산을 통해 앱의 홍보효과 및 마케팅 효과의 기회 요인을 지니고 있습니다<span lang=\"en-US\">.&#160;</span>또한<span lang=\"en-US\">&#160;SNS</span>형 숏폼 플랫폼으로서 이용자가 직접 참여하여 발생시키는 화제성을 통해 광고효과를 극대화하는 모습은 숏폼 콘텐츠들에 부재한 수익모델을 보완하며<span lang=\"en-US\">,&#160;</span>기존<span lang=\"en-US\">&#160;OTT</span>와 같이 광고 시청을 대가로 영상을 무료 제공하는<span lang=\"en-US\">&#160;AVOD(Advertising VOD)</span>와 다른 형태로 구축되었다고 해석해볼 수 있습니다<span lang=\"en-US\">.</span></td>\r\n\t\t\t\t</tr>\r\n\t\t\t\t<tr>\r\n\t\t\t\t\t<td style=\"border:0px\"><p lang=\"en-US\" style=\"font-family:맑은 고딕;margin-top:0pt;margin-bottom:0pt\"><span style=\"color:black;font-weight:bold\">3-2) Threatness :&#160;</span><span lang=\"ko-KR\" style=\"color:black;font-weight:bold\">유튜브 등 타 기업들의 숏폼 콘텐츠 서비스 사업 진출로 인한 시장경쟁 심화</span></p>\r\n\t\t\t\t\t<br />\r\n\t\t\t\t\t<p style=\"font-family:맑은 고딕;margin-top:0pt;margin-bottom:0pt\">동영상 이용습관이 변화하면서 기존 동영상 서비스 사업자들 또한 숏폼 콘텐츠에 주목하고 있습니다<span lang=\"en-US\">.&#160;</span>각 서비스들은 서비스 제공 형식과 타겟팅은 다르게 구성될 것으로 예상되나<span lang=\"en-US\">,&#160;</span>국제적으로<span lang=\"en-US\">&#160;TikTok</span>의 개인정보보안 이슈가 제기되는 가운데 유튜브의 경우 올해 연말<span lang=\"en-US\">&#160;TikTok</span>을 겨냥한 ‘쇼츠<span lang=\"en-US\">(Shorts)</span>’ 서비스 출시 예정으로<span lang=\"en-US\">&#160;TikTok</span>의 경쟁자가 될 가능성이 높아보입니다<span lang=\"en-US\">.&#160;</span>유튜브 기존 영상 서비스들과 달리 짧은 영상을 제공하는 서비스로 별개의 앱이 아닌 유튜브 내에서 이용가능하며<span lang=\"en-US\">,&#160;</span>유튜브의 음악 등의 기존 서비스를 이용할 수 있다는 점에서 강점을 지니고 있습니다<span lang=\"en-US\">.</span></p>\r\n\t\t\t\t\t</td>\r\n\t\t\t\t</tr>\r\n\t\t\t\t<tr>\r\n\t\t\t\t\t<td style=\"border:0px;font-family:맑은 고딕\"><span style=\"color:black;font-weight:bold\">타 서비스 숏폼 콘텐츠 서비스 출시 전략 및</span><span lang=\"en-US\" style=\"color:black;font-weight:bold\">&#160;TikTok&#160;</span><span style=\"color:black;font-weight:bold\">이용자들의 타</span><span lang=\"en-US\" style=\"color:black;font-weight:bold\">&#160;App</span><span style=\"color:black;font-weight:bold\">이용 비교</span></td>\r\n\t\t\t\t</tr>\r\n\t\t\t\t<tr>\r\n\t\t\t\t\t<td style=\"border:0px\"><br />\r\n\t\t\t\t\t<br />\r\n\t\t\t\t\t</td>\r\n\t\t\t\t</tr>\r\n\t\t\t\t<tr>\r\n\t\t\t\t\t<td style=\"border:0px\"><p lang=\"en-US\" style=\"font-family:맑은 고딕;margin-top:0pt;margin-bottom:0pt\">TikTok<span lang=\"ko-KR\">의 이용자와 미이용자의 앱 이용행태를 살펴본 결과</span>&#160;TikTok&#160;<span lang=\"ko-KR\">이용자들은 유튜브 및</span>&#160;SNS<span lang=\"ko-KR\">위주 활동성이 미이용자에 비해 높게 나타났습니다</span>.&#160;<span lang=\"ko-KR\">특히</span>&#160;TikTok&#160;<span lang=\"ko-KR\">이용자들이 유튜브에서의 활동성 또한 높게 나타났다는 것은 추후 유튜브의 새로운 서비스가</span>&#160;TikTok<span lang=\"ko-KR\">을 위협할만한 외부 요인이 될 가능성이 높다고 해석해볼 수 있습니다</span>.</p>\r\n\t\t\t\t\t<br />\r\n\t\t\t\t\t<p style=\"font-family:맑은 고딕;margin-top:0pt;margin-bottom:0pt\">반면<span lang=\"en-US\">, TikTok</span>미이용자들은 네이버<span lang=\"en-US\">TV,&#160;</span>티빙<span lang=\"en-US\">,&#160;</span>아프리카<span lang=\"en-US\">&#160;TV, Seezn, Twitch&#160;</span>등 타<span lang=\"en-US\">&#160;OTT</span>서비스들에서의 활동성이 높게 나타났습니다<span lang=\"en-US\">.&#160;</span>이는<span lang=\"en-US\">&#160;TikTok&#160;</span>미이용자들은 기존의<span lang=\"en-US\">&#160;RMC&#160;</span>혹은 게임과 같은 특정 분야의 콘텐츠를 더 선호하는 경향을 보여 미이용자와 이용자 그룹간의 콘텐츠 선호차이를 보이는 것으로 해석될 수 있습니다<span lang=\"en-US\">.</span></p>\r\n\t\t\t\t\t<br />\r\n\t\t\t\t\t<p lang=\"en-US\" style=\"font-family:맑은 고딕;margin-top:0pt;margin-bottom:0pt\"><span style=\"color:black;font-weight:bold\">4.&#160;</span><span lang=\"ko-KR\" style=\"color:black;font-weight:bold\">맺음말</span></p>\r\n\t\t\t\t\t<br />\r\n\t\t\t\t\t<p style=\"font-family:맑은 고딕;margin-top:0pt;margin-bottom:0pt\">숏폼 콘텐츠가<span lang=\"en-US\">&#160;OTT</span>서비스 시장의 새로운 지형을 구성하며<span lang=\"en-US\">,&#160;</span>그 선두주자에 있는<span lang=\"en-US\">&#160;1</span>위 사업자<span lang=\"en-US\">&#160;TikTok</span>의<span lang=\"en-US\">&#160;SWOT</span>분석을 통해 이용자들의 특성 및 전반적인 이용행태를 살펴보았습니다<span lang=\"en-US\">.</span></p>\r\n\t\t\t\t\t<br />\r\n\t\t\t\t\t<p lang=\"en-US\" style=\"font-family:맑은 고딕;margin-top:0pt;margin-bottom:0pt\">TikTok<span lang=\"ko-KR\">은 동영상 소통을 선호하는</span>&#160;Z<span lang=\"ko-KR\">세대의 폭발적 관심으로 크게 성장한 강점을 지녔으나</span>,&#160;<span lang=\"ko-KR\">그 결과 이용자의 연령대 확장이 미흡하다는 약점을 지니고 있습니다</span>. TikTok<span lang=\"ko-KR\">은</span>&#160;SNS<span lang=\"ko-KR\">형 숏폼 플랫</span></p>\r\n\t\t\t\t\t</td>\r\n\t\t\t\t</tr>\r\n\t\t\t</table>\r\n\t\t\t<br />\r\n\t\t"
  }
];
const CONTENT_HASH = 'b90d8c7b';

let cards = [];
let moving = null, resizing = null;
let selectedIdx = null, clipboardCard = null;
const GRID = 20, GAP = 14;
function snap(v) { return Math.round(v / GRID) * GRID; }

// ── Undo (Ctrl+Z) ────────────────────────────────────────────────────────────
const MAX_HISTORY = 50;
let history = [];
function snapshot() {
  syncText();
  history.push(JSON.stringify(cards));
  if (history.length > MAX_HISTORY) history.shift();
}
function undo() {
  if (!history.length) { showStatus('되돌릴 내용 없음'); return; }
  syncText();
  cards = JSON.parse(history.pop());
  renderCards();
  saveBoard();
  showStatus('↩ 되돌림');
}
function showStatus(msg) {
  const s = document.getElementById('status');
  s.textContent = msg;
  clearTimeout(showStatus._t);
  showStatus._t = setTimeout(() => { s.textContent = ''; }, 2000);
}
document.addEventListener('keydown', e => {
  const isText = document.activeElement?.contentEditable === 'true';
  if ((e.ctrlKey || e.metaKey) && e.key === 'z' && !e.shiftKey) {
    if (isText) return;
    e.preventDefault();
    undo();
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'c' && !e.shiftKey && !isText) {
    if (selectedIdx !== null && cards[selectedIdx]) {
      syncText();
      clipboardCard = JSON.parse(JSON.stringify(cards[selectedIdx]));
      showStatus('카드 복사됨');
      e.preventDefault();
    }
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'v' && !e.shiftKey && !isText) {
    if (clipboardCard) {
      e.preventDefault();
      snapshot();
      const nc = JSON.parse(JSON.stringify(clipboardCard));
      nc.x = (nc.x || 0) + 30; nc.y = (nc.y || 0) + 30;
      cards.push(nc);
      selectedIdx = cards.length - 1;
      renderCards(); saveBoard();
      showStatus('카드 붙여넣음');
    }
  }
  if (e.key === 'Escape') {
    document.querySelectorAll('.card.selected').forEach(c => c.classList.remove('selected'));
    selectedIdx = null;
  }
});

function pushCards(movedIdx) {
  const moved = cards[movedIdx];
  const movedEl = document.querySelector(`.card[data-idx="${movedIdx}"]`);
  if (!movedEl) return;
  const mh = movedEl.offsetHeight;
  document.querySelectorAll('.card').forEach(el => {
    const i = +el.dataset.idx;
    if (i === movedIdx) return;
    const c = cards[i], oh = el.offsetHeight;
    if (moved.x < (c.x+(c.w||200)) && (moved.x+(moved.w||200)) > c.x && moved.y < (c.y+oh) && (moved.y+mh) > c.y) {
      c.y = moved.y + mh + GAP;
      el.style.top = c.y + 'px';
    }
  });
}

function loadBoard() {
  const saved = localStorage.getItem(SAVE_KEY);
  const savedHash = localStorage.getItem(SAVE_KEY + ':hash');
  let parsed = null;
  try { parsed = saved ? JSON.parse(saved) : null; } catch(e) {}
  // reset if: no save, empty array, or content hash changed (page regenerated)
  if (!parsed || parsed.length === 0 || savedHash !== CONTENT_HASH) {
    cards = DEFAULT_CARDS.map(c => ({...c}));
    localStorage.removeItem(SAVE_KEY);
    localStorage.setItem(SAVE_KEY + ':hash', CONTENT_HASH);
    renderCards();
    const hasCoords = cards.some(c => c.x !== undefined && c.y !== undefined);
    if (!hasCoords) autoLayout();
    return;
  }
  cards = parsed;
  renderCards();
}
function resetToDefaults() { if (!confirm('저장된 보드를 지우고 원본으로 초기화합니다. 계속할까요?')) return; localStorage.removeItem(SAVE_KEY); cards = DEFAULT_CARDS.map(c => ({...c})); renderCards(); autoLayout(); }

function autoLayout() {
  const boardW = document.getElementById('board').offsetWidth;
  const cols = Math.max(1, Math.floor(boardW / 280));
  const colW = (boardW - GAP*(cols-1)) / cols;
  const colH = new Array(cols).fill(0);
  const allCards = document.querySelectorAll('.card');
  const images = document.querySelectorAll('.card img');
  let loaded = 0;
  function place() {
    allCards.forEach((el, i) => {
      const w = Math.min(cards[i].w || colW, colW);
      let minCol = 0;
      for (let c = 1; c < cols; c++) if (colH[c] < colH[minCol]) minCol = c;
      cards[i].x = minCol * (colW + GAP);
      cards[i].y = colH[minCol];
      cards[i].w = w;
      el.style.left = cards[i].x + 'px';
      el.style.top = cards[i].y + 'px';
      el.style.width = w + 'px';
      colH[minCol] = cards[i].y + el.offsetHeight + GAP;
    });
    document.getElementById('board').style.minHeight = (Math.max(...colH) + 100) + 'px';
    saveBoard();
  }
  if (!images.length) { requestAnimationFrame(place); return; }
  images.forEach(img => {
    if (img.complete) { loaded++; if (loaded >= images.length) requestAnimationFrame(place); }
    else { img.onload = img.onerror = () => { loaded++; if (loaded >= images.length) requestAnimationFrame(place); }; }
  });
}

function syncText() {
  document.querySelectorAll('.card').forEach(el => {
    const i = +el.dataset.idx;
    if (cards[i]?.type === 'text') { const t = el.querySelector('.text'); if (t) cards[i].content = t.innerHTML; }
  });
}
function saveBoard() { syncText(); localStorage.setItem(SAVE_KEY, JSON.stringify(cards)); localStorage.setItem(SAVE_KEY + ':hash', CONTENT_HASH); showStatus('저장됨 ' + new Date().toLocaleTimeString()); }

function renderCards() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  cards.forEach((card, i) => {
    const el = document.createElement('div');
    el.className = 'card'; el.dataset.idx = i;
    if (card.x !== undefined) el.style.left = card.x + 'px';
    if (card.y !== undefined) el.style.top = card.y + 'px';
    // html cards contain raw OneNote table HTML which may overflow the stated div width
    if (card.w) { if (card.type === 'html') el.style.minWidth = card.w + 'px'; else el.style.width = card.w + 'px'; }
    el.addEventListener('mousedown', e => {
      if (e.target.closest('.text, a, .card-btn, .resize-handle, td, th')) return;
      e.preventDefault();
      // Update selection
      document.querySelectorAll('.card.selected').forEach(c => c.classList.remove('selected'));
      selectedIdx = i; el.classList.add('selected');
      snapshot();
      moving = { idx: i, startX: e.clientX, startY: e.clientY, origX: card.x||0, origY: card.y||0 };
      el.classList.add('moving');
    });
    const actions = document.createElement('div'); actions.className = 'card-actions';
    const delBtn = document.createElement('button'); delBtn.className = 'card-btn'; delBtn.textContent = '×';
    delBtn.onclick = e => { e.stopPropagation(); if(confirm('삭제?')) { snapshot(); cards.splice(i,1); renderCards(); saveBoard(); } };
    actions.appendChild(delBtn); el.appendChild(actions);
    if (card.type === 'text') {
      const text = document.createElement('div'); text.className = 'text'; text.contentEditable = true;
      text.innerHTML = card.content || '';
      text.addEventListener('focus', () => { snapshot(); });
      text.addEventListener('blur', () => { card.content = text.innerHTML; saveBoard(); });
      el.appendChild(text);
    } else if (card.type === 'image') {
      const img = document.createElement('img');
      img.src = card.src.startsWith('http') || card.src.startsWith('data:') ? card.src : IMG_BASE + card.src;
      img.alt = ''; img.loading = 'lazy'; img.onerror = () => img.style.display = 'none';
      if (card.w) img.style.width = card.w + 'px';
      if (card.h) img.style.height = card.h + 'px';
      if (card.link) { const a = document.createElement('a'); a.href = card.link; a.target = '_blank'; a.appendChild(img); el.appendChild(a); }
      else { el.appendChild(img); }
      if (card.caption) { const cap = document.createElement('div'); cap.style.cssText = 'font-size:11px;color:#8b949e;margin-top:4px;word-break:break-word;padding:0 2px;'; cap.textContent = card.caption; el.appendChild(cap); }
    } else if (card.type === 'html') {
      const wrapper = document.createElement('div');
      wrapper.style.cssText = 'overflow:auto;font-size:13px;line-height:1.5;';
      wrapper.innerHTML = card.html.replace(/__ATTACHMENT__/g, IMG_BASE);
      wrapper.querySelectorAll('img').forEach(img => { img.style.maxWidth = '100%'; img.style.height = 'auto'; img.draggable = false; });
      wrapper.querySelectorAll('a').forEach(a => { a.target = '_blank'; a.style.color = '#6cb0f6'; });
      wrapper.querySelectorAll('table').forEach(t => { t.style.borderCollapse = 'collapse'; });
      wrapper.querySelectorAll('td,th').forEach(td => {
        td.style.border = '1px solid #444'; td.style.padding = '4px 6px'; td.style.verticalAlign = 'top';
        td.title = '더블클릭으로 편집';
        td.addEventListener('dblclick', function(e) {
          e.stopPropagation();
          snapshot();
          this.contentEditable = 'true';
          this.style.outline = '2px solid #388bfd';
          this.style.background = 'rgba(56,139,253,0.08)';
          this.focus();
        });
        td.addEventListener('blur', function() {
          this.contentEditable = 'false';
          this.style.outline = '';
          this.style.background = '';
          cards[i].html = wrapper.innerHTML.split(IMG_BASE).join('__ATTACHMENT__');
          saveBoard();
        });
      });
      el.appendChild(wrapper);
    } else if (card.type === 'table') {
      const rows = card.rows || [['','',''],['','',''],['','','']];
      const tbl = document.createElement('table');
      tbl.style.cssText = 'border-collapse:collapse;width:100%;font-size:13px;';
      rows.forEach((row, ri) => {
        const tr = tbl.insertRow();
        row.forEach((cell, ci) => {
          const td = document.createElement(ri === 0 ? 'th' : 'td');
          td.contentEditable = true;
          td.style.cssText = 'border:1px solid #30363d;padding:4px 8px;min-width:60px;text-align:left;' + (ri===0 ? 'background:#21262d;font-weight:600;' : '');
          td.textContent = cell;
          td.addEventListener('blur', () => { if (!cards[i].rows) cards[i].rows = rows; rows[ri][ci] = td.textContent; saveBoard(); });
          tr.appendChild(td);
        });
      });
      el.appendChild(tbl);
      const addRow = document.createElement('button');
      addRow.textContent = '+ 행'; addRow.style.cssText = 'margin-top:4px;font-size:11px;background:#21262d;border:1px solid #30363d;color:#8b949e;padding:2px 8px;border-radius:4px;cursor:pointer;';
      addRow.onclick = e => { e.stopPropagation(); snapshot(); if (!cards[i].rows) cards[i].rows = rows; cards[i].rows.push(new Array(cards[i].rows[0].length).fill('')); renderCards(); saveBoard(); };
      const addCol = document.createElement('button');
      addCol.textContent = '+ 열'; addCol.style.cssText = 'margin-top:4px;margin-left:4px;font-size:11px;background:#21262d;border:1px solid #30363d;color:#8b949e;padding:2px 8px;border-radius:4px;cursor:pointer;';
      addCol.onclick = e => { e.stopPropagation(); snapshot(); if (!cards[i].rows) cards[i].rows = rows; cards[i].rows.forEach(r => r.push('')); renderCards(); saveBoard(); };
      el.appendChild(addRow); el.appendChild(addCol);
    }
    const rh = document.createElement('div'); rh.className = 'resize-handle';
    rh.addEventListener('mousedown', e => { e.preventDefault(); e.stopPropagation(); snapshot(); resizing = { idx: i, startX: e.clientX, startW: card.w || el.offsetWidth }; });
    el.appendChild(rh);
    if (i === selectedIdx) el.classList.add('selected');
    board.appendChild(el);
  });
  requestAnimationFrame(() => {
    let maxB = 0;
    document.querySelectorAll('.card').forEach(el => { const b = (parseFloat(el.style.top)||0) + el.offsetHeight; if (b > maxB) maxB = b; });
    board.style.minHeight = (maxB + 100) + 'px';
  });
}

document.addEventListener('mousemove', e => {
  if (moving) {
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`); if (!el) return;
    let nx = moving.origX + e.clientX - moving.startX, ny = moving.origY + e.clientY - moving.startY;
    if (e.shiftKey) { nx = snap(nx); ny = snap(ny); el.style.outline = '1px dashed rgba(240,192,64,0.3)'; } else { el.style.outline = ''; }
    el.style.left = nx + 'px'; el.style.top = ny + 'px';
  }
  if (resizing) {
    let nw = resizing.startW + e.clientX - resizing.startX; if (e.shiftKey) nw = snap(nw);
    cards[resizing.idx].w = Math.max(100, nw);
    const el = document.querySelector(`.card[data-idx="${resizing.idx}"]`); if (el) el.style.width = cards[resizing.idx].w + 'px';
  }
});

document.addEventListener('mouseup', e => {
  if (moving) {
    let nx = moving.origX + e.clientX - moving.startX, ny = moving.origY + e.clientY - moving.startY;
    if (e.shiftKey) { nx = snap(nx); ny = snap(ny); }
    cards[moving.idx].x = Math.max(0, nx); cards[moving.idx].y = Math.max(0, ny);
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`); if (el) { el.classList.remove('moving'); el.style.outline = ''; }
    if (e.shiftKey) pushCards(moving.idx);
    moving = null; saveBoard();
  }
  if (resizing) { if (e.shiftKey) pushCards(resizing.idx); resizing = null; saveBoard(); }
});

function addTextCard() { snapshot(); cards.push({ type: 'text', content: '', x: 50, y: window.scrollY+100, w: 300 }); renderCards(); setTimeout(() => { const els = document.querySelectorAll('.card .text'); els[els.length-1]?.focus(); }, 100); }
function addImageCard() { const input = document.createElement('input'); input.type = 'file'; input.accept = 'image/*'; input.onchange = e => { const f = e.target.files[0]; if (!f) return; const r = new FileReader(); r.onload = () => { snapshot(); cards.push({ type: 'image', src: r.result, x: 50, y: window.scrollY+100, w: 240 }); renderCards(); saveBoard(); }; r.readAsDataURL(f); }; input.click(); }
function addImageUrl() { const url = prompt('이미지 URL'); if (!url) return; snapshot(); cards.push({ type: 'image', src: url, x: 50, y: window.scrollY+100, w: 240 }); renderCards(); saveBoard(); }
function addTableCard() {
  const colsStr = prompt('열 수 (기본 3)', '3'); const cols = Math.max(1, parseInt(colsStr)||3);
  const rowsStr = prompt('행 수 (헤더 포함, 기본 4)', '4'); const rows = Math.max(1, parseInt(rowsStr)||4);
  snapshot();
  cards.push({ type: 'table', rows: Array.from({length: rows}, (_, ri) => Array.from({length: cols}, (_, ci) => ri===0 ? `열${ci+1}` : '')), x: 50, y: window.scrollY+100, w: Math.max(240, cols*100) });
  renderCards(); saveBoard();
}
function exportBoard() { syncText(); const blob = new Blob([JSON.stringify(cards, null, 2)], { type: 'application/json' }); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = SAVE_KEY + '.json'; a.click(); }
// ── Zoom ─────────────────────────────────────────────────────────────────────
let zoom = parseFloat(localStorage.getItem('zoom-' + SAVE_KEY) || '1.0');
function applyZoom() {
  const board = document.getElementById('board');
  board.style.transform = `scale(${zoom})`;
  board.style.transformOrigin = '0 0';
  document.getElementById('zoom-level').textContent = Math.round(zoom * 100) + '%';
  localStorage.setItem('zoom-' + SAVE_KEY, zoom);
}
function zoomIn()  { zoom = Math.min(3.0, parseFloat((zoom + 0.1).toFixed(2))); applyZoom(); }
function zoomOut() { zoom = Math.max(0.2, parseFloat((zoom - 0.1).toFixed(2))); applyZoom(); }
document.addEventListener('keydown', e => {
  if (e.ctrlKey || e.metaKey) {
    if (e.key === '=' || e.key === '+') { e.preventDefault(); zoomIn(); }
    if (e.key === '-')                  { e.preventDefault(); zoomOut(); }
    if (e.key === '0')                  { e.preventDefault(); zoom = 1.0; applyZoom(); }
  }
});
document.getElementById('board').addEventListener('wheel', e => {
  if (!(e.ctrlKey || e.metaKey)) return;
  e.preventDefault();
  e.deltaY < 0 ? zoomIn() : zoomOut();
}, { passive: false });
applyZoom();
function resetLayout() { if (!confirm('자동 재배치합니다.')) return; cards.forEach(c => { delete c.x; delete c.y; }); renderCards(); autoLayout(); }
// ── Floating format toolbar ───────────────────────────────────────────────────
const fmtBar = document.getElementById('format-toolbar');
function fmt(cmd) { document.execCommand(cmd, false, null); saveBoard(); }
function fmtLink() {
  const sel = window.getSelection();
  if (!sel || sel.isCollapsed) return;
  const url = prompt('링크 URL 입력', 'https://');
  if (!url) return;
  document.execCommand('createLink', false, url);
  // make links open in new tab
  sel.anchorNode?.parentElement?.closest('a')?.setAttribute('target', '_blank');
  document.querySelectorAll('.text a').forEach(a => a.target = '_blank');
  saveBoard();
}

// prevent format buttons from blurring contenteditable
fmtBar.addEventListener('mousedown', e => e.preventDefault());

document.addEventListener('selectionchange', () => {
  const sel = window.getSelection();
  if (!sel || sel.isCollapsed || !sel.toString().trim()) { fmtBar.style.display = 'none'; return; }
  // only show if selection is inside a .text element
  const anchor = sel.anchorNode;
  if (!anchor) { fmtBar.style.display = 'none'; return; }
  const textEl = anchor.nodeType === 1 ? anchor.closest('.text') : anchor.parentElement?.closest('.text');
  if (!textEl) { fmtBar.style.display = 'none'; return; }
  // position above selection
  const range = sel.getRangeAt(0);
  const rect = range.getBoundingClientRect();
  fmtBar.style.display = 'flex';
  const tbW = fmtBar.offsetWidth || 180;
  let left = rect.left + rect.width / 2 - tbW / 2;
  left = Math.max(8, Math.min(left, window.innerWidth - tbW - 8));
  fmtBar.style.left = left + 'px';
  fmtBar.style.top = (rect.top - 44 + window.scrollY) + 'px';
});

setInterval(saveBoard, 30000);
loadBoard();
</script>
</body>
</html>
