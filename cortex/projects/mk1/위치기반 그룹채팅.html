<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>위치기반 그룹채팅</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1e1e1e; color: #e0e0e0; font-family: 'Segoe UI', -apple-system, sans-serif; font-size: 15px; line-height: 1.6; padding: 20px 30px 60px; overflow-x: hidden; }
a { color: #6cb0f6; text-decoration: none; }
a:hover { text-decoration: underline; }
.title-bar { background: #3a3a5c; display: inline-block; padding: 6px 16px; font-size: 22px; font-weight: bold; color: #fff; margin-bottom: 4px; }
.date { color: #999; font-size: 13px; margin-bottom: 20px; }
.board { position: relative; }
.card { background: #2a2a2a; border: 1px solid #3a3a3a; border-radius: 8px; padding: 12px; position: absolute; cursor: grab; transition: box-shadow 0.15s; overflow: hidden; }
.card:hover { box-shadow: 0 0 0 1px #58a6ff; z-index: 10; }
.card.moving { opacity: 0.8; box-shadow: 0 4px 24px rgba(0,0,0,0.6); z-index: 100; cursor: grabbing; }
.card img { width: 100%; border-radius: 4px; display: block; }
.card .text { outline: none; min-height: 20px; white-space: pre-wrap; word-break: break-word; }
.card .text:focus { background: rgba(255,255,255,0.05); border-radius: 4px; padding: 4px; }
.card .text:empty::before { content: '텍스트 입력...'; color: #555; }
.card-actions { position: absolute; top: 4px; right: 4px; display: none; gap: 4px; }
.card:hover .card-actions { display: flex; }
.card-btn { background: #333; border: 1px solid #555; color: #ccc; border-radius: 4px; padding: 2px 6px; font-size: 11px; cursor: pointer; }
.card-btn:hover { background: #444; color: #fff; }
.resize-handle { position: absolute; bottom: 0; right: 0; width: 16px; height: 16px; cursor: se-resize; opacity: 0; }
.card:hover .resize-handle { opacity: 0.6; }
.resize-handle::after { content: ''; position: absolute; bottom: 3px; right: 3px; width: 8px; height: 8px; border-right: 2px solid #666; border-bottom: 2px solid #666; }
.card.selected { box-shadow: 0 0 0 2px #58a6ff; z-index: 5; }
.highlight-red { color: #ff6b6b; }
.highlight-blue { color: #6cb0f6; }
.highlight-gold { color: #f0c040; }
.toolbar { position: fixed; bottom: 0; left: 0; right: 0; background: #161b22; border-top: 1px solid #30363d; padding: 8px 20px; display: flex; gap: 12px; align-items: center; z-index: 200; }
.toolbar button { background: #21262d; border: 1px solid #30363d; color: #e0e0e0; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; }
.toolbar button:hover { background: #30363d; }
.toolbar .status { color: #8b949e; font-size: 12px; margin-left: auto; }
#format-toolbar { position: fixed; display: none; background: #1c2128; border: 1px solid #444c56; border-radius: 8px; padding: 4px 6px; gap: 2px; align-items: center; z-index: 500; box-shadow: 0 4px 16px rgba(0,0,0,0.5); }
#format-toolbar button { background: none; border: none; color: #cdd9e5; padding: 4px 8px; border-radius: 5px; cursor: pointer; font-size: 13px; line-height: 1; }
#format-toolbar button:hover { background: #373e47; }
#format-toolbar .sep { width: 1px; height: 16px; background: #444c56; margin: 0 2px; }
</style>
</head>
<body>
<div class="title-bar" contenteditable="true">위치기반 그룹채팅</div>
<div class="date"></div>
<div class="board" id="board"></div>
<div id="format-toolbar">
  <button onmousedown="e=>e.preventDefault()" onclick="fmt('bold')" title="굵게"><b>B</b></button>
  <button onclick="fmt('italic')" title="기울임"><i>I</i></button>
  <button onclick="fmt('underline')" title="밑줄"><u>U</u></button>
  <div class="sep"></div>
  <button onclick="fmtLink()" title="링크 삽입">🔗</button>
  <button onclick="fmt('unlink')" title="링크 제거">✂</button>
</div>
<div class="toolbar">
  <button onclick="undo()" title="Ctrl+Z">↩ 실행취소</button>
  <button onclick="addTextCard()">+ 텍스트</button>
  <button onclick="addImageCard()">+ 이미지</button>
  <button onclick="addImageUrl()">+ 이미지 URL</button>
  <button onclick="addTableCard()">+ 표</button>
  <button onclick="saveBoard()">💾 저장</button>
  <button onclick="exportBoard()">📤 내보내기</button>
  <button onclick="resetLayout()">↺ 재배치</button>
  <button onclick="resetToDefaults()" style="color:#f85149">↺ 초기화</button>
  <div style="display:flex;align-items:center;gap:4px;margin-left:8px;border-left:1px solid #30363d;padding-left:12px;">
    <button onclick="zoomOut()" title="Ctrl+-" style="padding:6px 10px;">−</button>
    <span id="zoom-level" style="font-size:12px;color:#8b949e;min-width:36px;text-align:center;">100%</span>
    <button onclick="zoomIn()" title="Ctrl+=" style="padding:6px 10px;">+</button>
  </div>
  <span class="status" id="status">Ready</span>
</div>
<script>
const SAVE_KEY = 'board-위치기반-그룹채팅';
const IMG_BASE = '../../attachments/';
const DEFAULT_CARDS = [

  },
  {

    "html": "\r\n\t\t\t<ul>\r\n\t\t\t\t<p lang=\"ko-KR\" data-tag=\"remember-for-later\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#292929;background-color:#dddddd\">어떤</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt;color:#292929;background-color:#dddddd\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#292929;background-color:#dddddd\">문제를</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt;color:#292929;background-color:#dddddd\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#292929;background-color:#dddddd\">해결하고자</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt;color:#292929;background-color:#dddddd\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#292929;background-color:#dddddd\">하는가</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt;color:#292929;background-color:#dddddd\">?</span></p>\r\n\t\t\t\t<p style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Tahoma\">(</span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">비타민이지만</span><span style=\"font-family:Malgun Gothic\"> pain killer</span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">의</span><span style=\"font-family:Malgun Gothic\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">관점에서</span><span style=\"font-family:Malgun Gothic\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">문제정의</span><span style=\"font-family:Malgun Gothic\">)</span></p>\r\n\t\t\t\t<p lang=\"ko-KR\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">특정</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">지역</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">이슈에</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">대한</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">집단</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\">-</span><span style=\"font-family:Malgun Gothic\">동시적</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">커뮤니케이션을</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">가능하게</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">한다</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\">.</span></p>\r\n\t\t\t\t<p lang=\"ko-KR\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">오프라인</span><span lang=\"en-US\" style=\"font-family:Tahoma\">/</span><span style=\"font-family:Malgun Gothic\">대면</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> Comm.</span><span style=\"font-family:Malgun Gothic\">의</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">경험을</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">모바일로</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">가져오고</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">이를</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">증강한다</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\">.</span></p>\r\n\t\t\t\t<p lang=\"ko-KR\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">고객</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">저니별</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">니즈</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\">, </span><span style=\"font-family:Malgun Gothic\">페인</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">포인트는</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\">?</span></p>\r\n\t\t\t\t<p lang=\"ko-KR\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">무슨</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">일이</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">일어나고</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">있는지</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\">, </span><span style=\"font-family:Malgun Gothic\">다른</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">사람들</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">생각은</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">어떤지</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">알고</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">싶고</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\">, </span><span style=\"font-family:Malgun Gothic\">물어보고</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">싶은</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">니즈</span></p>\r\n\t\t\t\t<p data-tag=\"remember-for-later\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">-&gt; </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">와닿지</span><span style=\"font-family:Malgun Gothic\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">않아</span><span style=\"font-family:Malgun Gothic\">, </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">실</span><span style=\"font-family:Malgun Gothic\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">사례로</span><span style=\"font-family:Malgun Gothic\">, </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">아님</span><span style=\"font-family:Malgun Gothic\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">기존</span><span style=\"font-family:Malgun Gothic\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">오픈톡방의</span><span style=\"font-family:Malgun Gothic\"> usage</span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">로</span><span style=\"font-family:Malgun Gothic\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">설명</span></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<table style=\"border:1px solid;border-collapse:collapse\">\r\n\t\t\t\t\t<tr>\r\n\t\t\t\t\t\t<td style=\"border:1px solid\"><span style=\"font-family:나눔고딕;font-size:12pt;color:#292929;background-color:#dddddd\">지오펜싱(geo-fencing) </span><span lang=\"ko-KR\" style=\"font-family:나눔고딕;font-size:12pt;color:#292929;background-color:#dddddd\">오픈톡</span></td>\r\n\t\t\t\t\t\t<td style=\"border:1px solid\"><br />\r\n\t\t\t\t\t\t</td>\r\n\t\t\t\t\t</tr>\r\n\t\t\t\t</table>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:16pt;font-weight:bold\">2. </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic;font-size:16pt;font-weight:bold\">탐색해야</span><span lang=\"ko-KR\" style=\"font-size:16pt;font-weight:bold\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic;font-size:16pt;font-weight:bold\">할</span><span lang=\"ko-KR\" style=\"font-size:16pt;font-weight:bold\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic;font-size:16pt;font-weight:bold\">새로운</span><span lang=\"ko-KR\" style=\"font-size:16pt;font-weight:bold\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic;font-size:16pt;font-weight:bold\">비즈니스</span><span lang=\"ko-KR\" style=\"font-size:16pt;font-weight:bold\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic;font-size:16pt;font-weight:bold\">기회</span></p>\r\n\t\t\t\t<ul>\r\n\t\t\t\t\t<li><span style=\"font-family:Malgun Gothic;font-weight:bold\">기존</span>: <span style=\"font-family:Malgun Gothic\">명함</span> <span style=\"font-family:Malgun Gothic\">교환</span>, <span style=\"font-family:Malgun Gothic\">컨퍼런스</span> <span style=\"font-family:Malgun Gothic\">네트워킹</span>, <span style=\"font-family:Malgun Gothic\">오프라인</span> <span style=\"font-family:Malgun Gothic\">만남</span>.</li>\r\n\t\t\t\t\t<li><p style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic;font-weight:bold\">기회</span>: <span style=\"font-family:Malgun Gothic\">기존의</span> <span style=\"font-family:Malgun Gothic\">비효율적인</span> <span style=\"font-family:Malgun Gothic\">네트워킹</span> <span style=\"font-family:Malgun Gothic\">방식을</span> <span style=\"font-family:Malgun Gothic\">디지털</span>/<span style=\"font-family:Malgun Gothic\">모바일로</span> <span style=\"font-family:Malgun Gothic\">대체</span>.</p>\r\n\t\t\t\t\t<ul>\r\n\t\t\t\t\t\t<li style=\"list-style-type:circle\"><span style=\"font-family:Malgun Gothic\">예</span>: <span style=\"font-family:Malgun Gothic\">이벤트에서</span> <span style=\"font-family:Malgun Gothic\">자동으로</span> <span style=\"font-family:Malgun Gothic\">연결되는</span> <span style=\"font-family:Malgun Gothic\">네트워크</span> <span style=\"font-family:Malgun Gothic\">앱</span>, <span style=\"font-family:Malgun Gothic\">근처</span> <span style=\"font-family:Malgun Gothic\">사람의</span> <span style=\"font-family:Malgun Gothic\" </span>하게 하고, <span style=\"font-weight:bold\">친구를 초대</span>하는 구조를 만들면 좋은 결과를 얻을 수 있을 거야.</p>\r\n\t\t\t\t<p lang=\"ko-KR\" style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\">처음에는 <span style=\"font-weight:bold\">소규모 지역 기반</span> 이벤트부터 시작해서 <span style=\"font-weight:bold\">참여자들 간의 자연스러운 연결</span>을 유도하고, 그들이 <span style=\"font-weight:bold\">다른 사람들을 초대</span>하도록 만드는 방법이 효과적일 것 같아. 이때, <span style=\"font-weight:bold\">특정 위치에서만 활성화되는 채팅방</span>이나 <span style=\"font-weight:bold\">주변 사람들과만 연결</span>되는 기능을 추가하면 사용자가 더욱 몰입할 수 있을 거야.</p>\r\n\t\t\t\t<p lang=\"ko-KR\" style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\">이 방식으로 <span style=\"font-weight:bold\">초기 사용자의 참여</span>를 끌어내고, 점차 <span style=\"font-weight:bold\">사용자층을 확장</span>해나가는 전략이 필요할 것 같아. 이에 대해 더 구체적으로 논의하고 싶은 부분이 있으면 말해줘!</p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<br />\r\n\t\t\t\t<p lang=\"ko-KR\" style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:10pt;font-weight:bold\">나의 말:</span></p>\r\n\t\t\t\t<p lang=\"ko-KR\" style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\">맞아. Atomic market(원자 시장)을 찾는게 급선무야.</p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p lang=\"ko-KR\" style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:8pt;font-weight:bold\">ChatGPT의 말:</span></p>\r\n\t\t\t\t<p lang=\"ko-KR\" style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\">ChatGPT</p>\r\n\t\t\t\t<p lang=\"ko-KR\" style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\">메모리 업데이트됨</p>\r\n\t\t\t\t<ol>\r\n\t\t\t\t\t<li style=\"font-family:Pretendard Light\"><span lang=\"ko-KR\"><span style=\"font-weight:bold\">지역 축제와 행사</span>: 사람들이 자연스럽게 모이고, 서로 상호작용하는 장소에서 시작하는 게 좋을 수 있어. 예를 들어, <span style=\"font-weight:bold\">음악 페스티벌</span>, <span style=\"font-weight:bold\">지역 마켓</span>, <span style=\"font-weight:bold\">거리 예술 공연</span> 같은 곳에서 서비스를 제공하면, 사용자들이 실시간으로 근처 사람들과 연결되고, 이벤트 관련 정보를 공유하는 데 유용할 거야.</span></li>\r\n\t\t\t\t\t<li style=\"font-family:Pretendard Light\"><span lang=\"ko-KR\"><span style=\"font-weight:bold\">대학교 캠퍼스</span>: 대학교 캠퍼스나 대학생들이 주로 활동하는 지역은 <span style=\"font-weight:bold\">위치 기반 서비스</span>에 적합한 시장이야. 학생들 사이에서 자연스럽게 소셜 네트워크가 형성될 수 있고, 특정 강의나 동아리 활동, 학교 행사에 맞춰 서비스를 활용할 수 있어.</span></li>\r\n\t\t\t\t\t<li style=\"font-family:Pretendard Light\"><span lang=\"ko-KR\"><span style=\"font-weight:bold\">스포츠 경기</span>: 경기 중에는 많은 사람들이 몰리기 때문에 <span style=\"font-weight:bold\">근처 사람들과 실시간 소통</span>하는 게 중요할 수 있어. 예를 들어, <span style=\"font-weight:bold\">대형 스포츠 경기</span>나 <span style=\"font-weight:bold\">마라톤</span>과 같은 행사에서 채팅방을 열고, 팬들 간에 실시간으로 소통하거나 정보를 나누는 형태로 서비스를 활용할 수 있어.</span></li>\r\n\t\t\t\t\t<li style=\"font-family:Pretendard Light\"><span lang=\"ko-KR\"><span style=\"font-weight:bold\">공연 예술 (버스킹, 연극)</span>: 공연 중에 관객들이 서로 소통할 수 있는 환경을 만들어 주면 좋을 거야. 특히 <span style=\"font-weight:bold\">버스킹</span> 같은 작은 거리 공연이나 <span style=\"font-weight:bold\">소규모 연극</span>에서 관객들이 주변 사람들과 상호작용하는 데 유용할 거야. 사람들이 공연을 보며 실시간으로 채팅하고, 아티스트와의 소통을 통해 더 깊은 경험을 할 수 있어.</span></li>\r\n\t\t\t\t\t<li style=\"font-family:Pretendard Light\"><span lang=\"ko-KR\"><span style=\"font-weight:bold\">문화 행사 (전시회, 마켓)</span>: 문화적 혹은 예술적 요소가 강조되는 <span style=\"font-weight:bold\">전시회</span>, <span style=\"font-weight:bold\">플리마켓</span>, <span style=\"font-weight:bold\">팝업 스토어</span> 등도 유망한 시장이야. 예술을 사랑하는 사람들이 많이 모이는 곳에서 네 서비스를 활용하면, 각자 취향에 맞는 사람들과 쉽게 연결될 수 있어.</span></li>\r\n\t\t\t\t</ol>\r\n\t\t\t\t<p lang=\"ko-KR\" style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\">이런 <span style=\"font-weight:bold\">원자 시장</span>을 하나씩 테스트하고, 어떤 시장에서 가장 빠르게 반응을 얻을 수 있는지 확인해보는 게 좋을 것 같아. 너가 생각하는 시장에 맞게 조정할 수도 있으니까, 어떤 시장이 가장 매력적으로 느껴져?</p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<br />\r\n\t\t\t\t<p lang=\"ko-KR\" style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:10pt;font-weight:bold\">나의 말:</span></p>\r\n\t\t\t\t<p lang=\"ko-KR\" style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\">모두 다 빠르게 테스트 해볼 필요가 있을거 같아.</p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p lang=\"ko-KR\" style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:8pt;font-weight:bold\">ChatGPT의 말:</span></p>\r\n\t\t\t\t<p lang=\"ko-KR\" style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\">ChatGPT</p>\r\n\t\t\t\t<p lang=\"ko-KR\" style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\">맞아, <span style=\"font-weight:bold\">다양한 원자 시장</span>을 빠르게 테스트하는 게 핵심이야. 여러 시장을 동시에 시험해 보면 어떤 시장이 <span style=\"font-weight:bold\">가장 반응이 좋은지</span>, 어떤 <span style=\"font-weight:bold\">특정 기능이나 경험</span>이 사용자들에게 <span style=\"font-weight:bold\">가장 큰 가치를 제공</span>하는지 빨리 파악할 수 있을 거야.</p>\r\n\t\t\t\t<ol>\r\n\t\t\t\t\t<li style=\"font-family:Pretendard Light\"><span lang=\"ko-KR\"><span style=\"font-weight:bold\">지역 축제와 행사</span>에서는 사람들의 <span style=\"font-weight:bold\">즉각적인 참여</span>를 유도할 수 있는 <span style=\"font-weight:bold\">단순한 UI</span>와 <span style=\"font-weight:bold\">실시간 채팅</span> 기능이 중요할 수 있어.</span></li>\r\n\t\t\t\t\t<li style=\"font-family:Pretendard Light\"><span lang=\"ko-KR\"><span style=\"font-weight:bold\">대학교 캠퍼스</span>에서는 학과별, 동아리별 채팅방이나 <span style=\"font-weight:bold\">팀 기반</span> 소셜 기능을 도입해, 사람들이 <span style=\"font-weight:bold\">자연스럽게 활동을 공유</span>하도록 유도할 수 있어.</span></li>\r\n\t\t\t\t\t<li style=\"font-family:Pretendard Light\"><span lang=\"ko-KR\"><span style=\"font-weight:bold\">스포츠 경기</span>에서는 <span style=\"font-weight:bold\">팀 팬들</span>끼리 실시간 소통할 수 있는 <span style=\"font-weight:bold\">스포츠 관련 기능</span>을 추가하고, <span style=\"font-weight:bold\">응원 메시지</span>나 <span style=\"font-weight:bold\">실시간 점수 공유</span> 같은 기능이 중요할 거야.</span></li>\r\n\t\t\t\t\t<li style=\"font-family:Pretendard Light\"><span lang=\"ko-KR\"><span style=\"font-weight:bold\">버스킹과 공연</span>에서는 사람들이 <span style=\"font-weight:bold\">작은 공간에서 소통</span>하고, 아티스트와 <span style=\"font-weight:bold\">직접적인 피드백</span>을 주고받을 수 있도록 <span style=\"font-weight:bold\">간편한 참여</span> 방식이 필요할 거야.</span></li>\r\n\t\t\t\t\t<li style=\"font-family:Pretendard Light\"><span lang=\"ko-KR\"><span style=\"font-weight:bold\">전시회와 문화 행사</span>에서는 <span style=\"font-weight:bold\">전시물에 대한 정보</span>를 실시간으로 공유하고, <span style=\"font-weight:bold\">관람객끼리 소통</span>하는 방식으로 <span style=\"font-weight:bold\">문화적 경험을 풍부하게</span> 만드는 기능을 추가할 수 있어.</span></li>\r\n\t\t\t\t</ol>\r\n\t\t\t\t<p lang=\"ko-KR\" style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\">이렇게 각각의 씬에서 어떤 기능이 중요한지 <span style=\"font-weight:bold\">우선순위를 정해</span>서 테스트하고, 그 반응을 <span style=\"font-weight:bold\">빠르게 측정</span>하면, 어떤 시장에서 가장 잘 통하는지 알 수 있을 거야. 초기에는 <span style=\"font-weight:bold\">짧은 시간</span> 안에 여러 시장을 <span style=\"font-weight:bold\">다양한 이벤트</span>로 시도해보는 게 좋겠어.</p>\r\n\t\t\t\t<p lang=\"ko-KR\" style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\">어떻게 시작하면 좋을지 구체적으로 계획해볼까?</p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<br />\r\n\t\t\t\t<p lang=\"ko-KR\" style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:10pt;font-weight:bold\">나의 말:</span></p>\r\n\t\t\t\t<p lang=\"ko-KR\" style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\">그러니까 니 의견도 위치기반 프로필 서비스를 위해 사용자를 모으려면, 위치기반 채팅이 최적의 선택지일 것 같다는거야? 다른 더 좋은 방법은 없을까?</p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p lang=\"ko-KR\" style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:8pt;font-weight:bold\">ChatGPT의 말:</span></p>\r\n\t\t\t\t<p lang=\"ko-KR\" style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\">ChatGPT</p>\r\n\t\t\t\t<p lang=\"ko-KR\" style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\">좋은 질문이야! 위치 기반 채팅은 사용자들을 빠르게 모으는 강력한 방법 중 하나지만, 꼭 <span style=\"font-weight:bold\">유일한 방법</span>은 아니야. 몇 가지 대안을 추가로 제시해볼게. 이 방법들은 네 서비스의 <span style=\"font-weight:bold\">차별화</span>와 <span style=\"font-weight:bold\">사용자 유입</span>을 동시에 고민한 결과야:</p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p lang=\"ko-KR\" style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:16pt;font-weight:bold\">1. 위치 기반 게임화 (Gamification)</span></p>\r\n\t\t\t\t<p lang=\"ko-KR\" style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\">위치를 기반으로 한 게임적 요소를 추가하면 사용자가 더 쉽게 참여할 수 있어.</p>\r\n\t\t\t\t<ul>\r\n\t\t\t\t\t<li style=\"font-family:Pretendard Light\"><span lang=\"ko-KR\">사용자가 특정 위치에 도착하면 **&quot;디지털 보상&quot;**을 받을 수 있는 미션을 제공.</span></li>\r\n\t\t\t\t\t<li style=\"font-family:Pretendard Light\"><span lang=\"ko-KR\">사용자끼리 <span style=\"font-weight:bold\">근처에서 퀘스트를 함께 수행</span>하거나, 특정 장소에서만 활성화되는 <span style=\"font-weight:bold\">스페셜 콘텐츠</span>를 제공.</span></li>\r\n\t\t\t\t</ul>\r\n\t\t\t\t<p lang=\"ko-KR\" style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\">이 방식은 특히 젊은 층이나 대학생들에게 매력적일 수 있고, 사용자 참여도를 높이는 데 효과적이야.</p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p lang=\"ko-KR\" style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:16pt;font-weight:bold\">2. 소셜 이벤트 매칭</span></p>\r\n\t\t\t\t<p lang=\"ko-KR\" style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\">근처에 있는 사람들과 공통된 관심사를 기반으로 <span style=\"font-weight:bold\">소규모 그룹을 자동 생성</span>해주는 방식도 있어.</p>\r\n\t\t\t\t<ul>\r\n\t\t\t\t\t<li style=\"font-family:Pretendard Light\"><span lang=\"ko-KR\">커피숍에서 &quot;프리랜서 네트워킹&quot; 이벤트를 자동으로 매칭.</span></li>\r\n\t\t\t\t\t<li style=\"font-family:Pretendard Light\"><span lang=\"ko-KR\">공원에서 &quot;러닝 파트너 찾기&quot;를 제안.￼이런 방식은 사람들에게 <span style=\"font-weight:bold\">목적과 가치를 제공</span>하면서 자연스럽게 연결되도록 유도할 수 있어.</span></li>\r\n\t\t\t\t</ul>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p lang=\"ko-KR\" style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:16pt;font-weight:bold\">3. 위치 기반 콘텐츠 큐레이션</span></p>\r\n\t\t\t\t<p lang=\"ko-KR\" style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\">사람들이 특정 위치에서 <span style=\"font-weight:bold\">유용한 정보를 제공</span>받을 수 있다면, 프로필을 확인할 동기가 생길 거야.</p>\r\n\t\t\t\t<ul>\r\n\t\t\t\t\t<li style=\"font-family:Pretendard Light\"><span lang=\"ko-KR\">사용자가 방문한 장소에서 추천하는 맛집 리스트, 주변 사람들이 작성한 리뷰.</span></li>\r\n\t\t\t\t\t<li style=\"font-family:Pretendard Light\"><span lang=\"ko-KR\">근처 사람들과 함께 콘텐츠를 추천/공유하는 <span style=\"font-weight:bold\">현지화된 경험</span>.￼이 방식은 사용자가 프로필 기능을 <span style=\"font-weight:bold\">간접적으로 탐색</span>하도록 만들어 줄 수 있어.</span></li>\r\n\t\t\t\t</ul>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p lang=\"ko-KR\" style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:16pt;font-weight:bold\">4. AR/VR 경험 연계</span></p>\r\n\t\t\t\t<p lang=\"ko-KR\" style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-weight:bold\">증강 현실(AR)</span> 기능을 활용해 위치 기반으로 사람들과 연결하는 것도 차별화될 수 있어.</p>\r\n\t\t\t\t<ul>\r\n\t\t\t\t\t<li style=\"font-family:Pretendard Light\"><span lang=\"ko-KR\">특정 위치에 있는 사람들만 볼 수 있는 <span style=\"font-weight:bold\">AR 프로필 카드</span>를 띄워주는 방식.</span></li>\r\n\t\t\t\t\t<li style=\"font-family:Pretendard Light\"><span lang=\"ko-KR\">AR 필터나 스티커를 사용해 사용자들이 <span style=\"font-weight:bold\">더 재미있고 몰입감 있는 경험</span>을 하게 만드는 것.</span></li>\r\n\t\t\t\t</ul>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p lang=\"ko-KR\" style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:16pt;font-weight:bold\">5. 현장 기반 즉석 네트워킹</span></p>\r\n\t\t\t\t<p lang=\"ko-KR\" style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\">사용자가 특정 장소에 머물 때, <span style=\"font-weight:bold\">현장 중심의 네트워킹 도구</span>를 제공할 수도 있어.</p>\r\n\t\t\t\t<ul>\r\n\t\t\t\t\t<li style=\"font-family:Pretendard Light\"><span lang=\"ko-KR\">&quot;이 공간에서 네트워킹 중인 사람들&quot;이라는 리스트를 제공.</span></li>\r\n\t\t\t\t\t<li style=\"font-family:Pretendard Light\"><span lang=\"ko-KR\">프로필을 직접 공개하지 않더라도, <span style=\"font-weight:bold\">익명 대화</span> 후에 관심 있을 때 프로필을 공개하는 방식.</span></li>\r\n\t\t\t\t</ul>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p lang=\"ko-KR\" style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\">이 대안들은 위치 기반 채팅보다 <span style=\"font-weight:bold\">다양한 경험과 가치</span>를 제공하면서도 사용자들을 모을 수 있는 방법들이야. 하지만 결국 중요한 건 <span style=\"font-weight:bold\">네 서비스가 어떤 가치를 사용자에게 전달할지</span> 명확히 정의하는 거야. 어떤 방식이 더 네 아이디어와 맞아 보여?</p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<br />\r\n\t\t\t\t<p lang=\"ko-KR\" style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\">실제로 타임레프트 이용자의 80%는 ‘싱글’이에요. 연인이 없는 사람들이 주로 오죠. 막스도 그걸 알았어요. 하지만 타임레프트를 ‘데이팅 앱’으로 포장하진 않았죠. 그저 “낯선 이들과 저녁 식사하세요”라고만 한 거예요. &#160;</p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p lang=\"ko-KR\" style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\">대신 데이트로 이어지기 쉽게끔 판을 깔았어요. 4~8명의 인원수를 테스트한 끝에 ‘대화하기 딱 좋은 인원’이 6명이라는 걸 발견했대요. 거기에 남녀 성비의 균형도 5:5에서 4:6 사이로 맞췄어요. 나이 차도 10살을 넘어서지 않게 설계했죠.&#160;</p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p lang=\"ko-KR\" style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\">하나 더. 타임레프트는 이용자들의 성향을 파악해 비슷한 사람끼리 만나게끔 연결했어요. 이용자들이 앱을 가입할 때 40여 개의 질문을 던져 답을 들었거든요. </p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p lang=\"ko-KR\" style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\">어떤 질문을 하냐고요? 연애 상태는 물론, 정치 성향과 외식 횟수 등을 물어요. ‘작가주의 영화와 블록버스터 영화 중 뭘 더 좋아하는지’, ‘스스로 얼마나 동기를 부여하는지’, ‘학업적 성취를 중요시하는지’도 묻죠. 즉, 나의 가치관과 삶의 패턴을 알아내는 거예요.  </p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p lang=\"ko-KR\" style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\">타임레프트는 자체적으로 개발한 알고리즘으로 사람들을 연결했어요. 그다음 “당신과 잘 맞는 사람을 매칭했어요”라는 메시지를 띄워 기대감을 높였죠. </p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<br />\r\n\t\t\t\t<p lang=\"ko-KR\" style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\">그는 “한국 커뮤니티에는 호스트host가 있어야 한다”고 강조했어요. 서양인들처럼 스몰토크small talk가 익숙하지 않기 때문이에요. 심지어 호스트 역량에 따라 모임의 분위기가 좌우될 수 있을 정도래요.&#160;</p>\r\n\t\t\t\t<p lang=\"ko-KR\" style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\">“호스트가 없으면 대화가 ‘약육강식’이 될 수 있어요. 몇몇 사람만 대화를 주도하고, 다른 사람들은 듣다가 오는 거죠. 커뮤니티 서비스는 그렇게 설계하면 안 됩니다. 사람들이 돈을 내고 왔잖아요. 모두에게 좋은 경험을 느끼게 하는 호스트의 기획&#183;운영 능력이 중요하죠.”</p>\r\n\t\t\t\t<p lang=\"ko-KR\" style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\">_박재현 로프컴퍼니 대표, 롱블랙 인터뷰에서</p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<cite lang=\"ko-KR\" style=\"font-size:9pt;color:#595959;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">출처</span>: &lt;<a href=\"https://www.longblack.co/note/1347?ticket=NT25080aa7887dc593639644dd5fee84bc0bda\">https://www.longblack.co/note/1347?ticket=NT25080aa7887dc593639644dd5fee84bc0bda</a>&gt; </cite>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p data-tag=\"to-do\" style=\"font-family:Pretendard Light;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">애초에 특파원 개념으로 소셜 미디어(영상)을 엮어서 갈까?</p>\r\n\t\t\t\t<p data-tag=\"to-do\" style=\"font-family:Pretendard Light;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">이상형 월드컵 지역기반 실시간</p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:inherit;font-size:12pt\">위치정보 없이 상대적 거리로 자동 초대하는 대안 기술</span></p>\r\n\t\t\t\t<p style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:fkGrotesk;font-size:18pt\">1.</span><span lang=\"ko-KR\" style=\"font-family:fkGrotesk;font-size:18pt\">&#160;</span><span lang=\"ko-KR\" style=\"font-family:inherit;font-size:12pt\">스마트폰 센서 활용</span></p>\r\n\t\t\t\t<li><span style=\"font-family:inherit;font-size:12pt\">블루투스 Low Energy (BLE) 비콘</span></li>\r\n\t\t\t\t<li><span style=\"font-family:fkGroteskNeue;font-size:12pt\">BLE 신호 세기를 이용해 근거리(수 m 이내) 사용자를 감지.</span></li>\r\n\t\t\t\t<li><span style=\"font-family:fkGroteskNeue;font-size:12pt\">예시: 두 사람이 같은 공간에 있으면 앱이 자동으로 서로를 인식해 그룹 초대 트리거 가능.</span></li>\r\n\t\t\t\t<li><span style=\"font-family:fkGroteskNeue;font-size:12pt\">장점: GPS 등 위치정보 불필요, 단말 간 직접 통신으로 프라이버시 보호.</span></li>\r\n\t\t\t\t<li><span style=\"font-family:fkGroteskNeue;font-size:12pt\">단점: 별도 앱 설치 필요, 메신저와의 자동 연동은 제한적.</span></li>\r\n\t\t\t\t<li><span style=\"font-family:inherit;font-size:12pt\">Wi-Fi Direct</span></li>\r\n\t\t\t\t<li><span style=\"font-family:fkGroteskNeue;font-size:12pt\">동일 Wi-Fi 네트워크 혹은 Wi-Fi Direct로 주변 기기 인식.</span></li>\r\n\t\t\t\t<li><span style=\"font-family:fkGroteskNeue;font-size:12pt\">장점: 위치정보 미수집, 실내에서도 사용 가능.</span></li>\r\n\t\t\t\t<li><span style=\"font-family:fkGroteskNeue;font-size:12pt\">단점: 네트워크 환경에 따라 인식률 변동.</span></li>\r\n\t\t\t\t<p style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:fkGrotesk;font-size:18pt\">2.</span><span lang=\"ko-KR\" style=\"font-family:fkGrotesk;font-size:18pt\">&#160;</span><span lang=\"ko-KR\" style=\"font-family:inherit;font-size:12pt\">기지국(Cell Tower) 정보 활용</span></p>\r\n\t\t\t\t<li><span style=\"font-family:inherit;font-size:12pt\">동일 기지국 접속자 매칭</span></li>\r\n\t\t\t\t<li><span style=\"font-family:fkGroteskNeue;font-size:12pt\">같은 기지국에 접속한 사용자끼리 임의의 그룹핑 가능.</span></li>\r\n\t\t\t\t<li><span style=\"font-family:fkGroteskNeue;font-size:12pt\">위치정보의 정밀도가 낮아 &#39;주변&#39;의 범위가 넓지만, 위치좌표 자체를 수집하지 않으므로 프라이버시 우수.</span></li>\r\n\t\t\t\t<li><span style=\"font-family:fkGroteskNeue;font-size:12pt\">단점: 도심 등 인구 밀집 지역에서는 정확도 저하.</span></li>\r\n\t\t\t\t<p style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:fkGrotesk;font-size:18pt\">3.</span><span lang=\"ko-KR\" style=\"font-family:fkGrotesk;font-size:18pt\">&#160;</span><span lang=\"ko-KR\" style=\"font-family:inherit;font-size:12pt\">환경 태깅 기반 매칭</span></p>\r\n\t\t\t\t<li><span style=\"font-family:fkGroteskNeue;font-size:12pt\">주변 환경 정보(예: Wi-Fi SSID, 블루투스 기기, 소음 패턴 등) 해시값 비교</span></li>\r\n\t\t\t\t<li><span style=\"font-family:fkGroteskNeue;font-size:12pt\">사용자의 위치좌표 대신 주변 환경의 특징값을 해시로 변환, 같은 환경에 있는 사람끼리 매칭</span><span lang=\"ko-KR\" style=\"font-family:fkGroteskNeue;font-size:12pt\">.</span></li>\r\n\t\t\t\t<li><span style=\"font-family:fkGroteskNeue;font-size:12pt\">장점: 위치좌표 미수집, 프라이버시 보호.</span></li>\r\n\t\t\t\t<li><span style=\"font-family:fkGroteskNeue;font-size:12pt\">단점: 환경 변화에 민감, 구현 난이도 높음.</span></li>\r\n\t\t\t\t<p style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:inherit;font-size:12pt\">법적&#183;기술적 한계 및 참고사항</span></p>\r\n\t\t\t\t<li><span style=\"font-family:inherit;font-size:12pt\">메신저 API 제한</span><span style=\"font-family:fkGroteskNeue;font-size:12pt\">: 카카오톡 등 주요 메신저는 외부 앱에서 자동으로 그룹 초대까지 실행하는 기능을 공식적으로 제공하지 않음.</span></li>\r\n\t\t\t\t<li><span style=\"font-family:inherit;font-size:12pt\">프라이버시 보호</span><span style=\"font-family:fkGroteskNeue;font-size:12pt\">: BLE, Wi-Fi, 기지국 등은 위치좌표 자체를 수집하지 않으나, 특정 상황에서는 간접적으로 위치 추정이 가능하므로 설계 시 주의 필요.</span></li>\r\n\t\t\t\t<li><span style=\"font-family:inherit;font-size:12pt\">실제 구현</span><span style=\"font-family:fkGroteskNeue;font-size:12pt\">: 별도 앱을 통해 &#39;주변 사용자 자동 인식 → 그룹 초대 링크 자동 전달&#39; 정도는 가능하나, 메신저 내부에서 완전 자동화는 어렵거나 불가.</span></li>\r\n\t\t\t\t<p style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:inherit;font-size:12pt\">결론</span></p>\r\n\t\t\t\t<li><span style=\"font-family:inherit;font-size:12pt\">QR/인증번호 없이 완전 자동화</span><span style=\"font-family:fkGroteskNeue;font-size:12pt\">: 현재 공식 메신저 앱만으로는 불가. 별도 앱과 스마트폰 센서(특히 BLE, Wi-Fi Direct)를 활용한 보조 시스템 구축이 현실적.</span></li>\r\n\t\t\t\t<li><span style=\"font-family:inherit;font-size:12pt\">위치정보 미수집</span><span style=\"font-family:fkGroteskNeue;font-size:12pt\">: BLE, Wi-Fi, 기지국 정보, 환경 태깅 등으로 상대적 거리 기반 매칭 가능. 다만, 메신저와의 연동 자동화는 기술적&#183;정책적 한계가 있음.</span></li>\r\n\t\t\t\t<li><span style=\"font-family:inherit;font-size:12pt\">추천 접근법</span><span style=\"font-family:fkGroteskNeue;font-size:12pt\">: 별도 앱에서 BLE 등으로 주변 인식 → 자동 그룹 초대 링크 생성 및 전달(최소한의 사용자 액션 필요) 방식이 현실적 대안.</span></li>\r\n\t\t\t\t<p style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:fkGroteskNeue;font-size:12pt\">이런 방식은 실제 서비스 설계 시 프라이버시, 법적 이슈, 메신저 API 정책을 반드시 검토해야 합니다</span><span lang=\"ko-KR\" style=\"font-family:fkGroteskNeue;font-size:12pt\">.</span></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"margin-top:0pt;margin-bottom:3pt\"><span style=\"font-family:inherit;font-size:12pt\">추천 접근법: 위치정보 없이 자동 단체 채팅방 초대</span></p>\r\n\t\t\t\t<p style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:fkGrotesk;font-size:18pt\">1.</span><span lang=\"ko-KR\" style=\"font-family:fkGrotesk;font-size:18pt\">&#160;</span><span lang=\"ko-KR\" style=\"font-family:inherit;font-size:12pt\">별도 앱 + 스마트폰 센서 활용 방식</span></p>\r\n\t\t\t\t<li><span style=\"font-family:inherit;font-size:12pt\">BLE(블루투스 Low Energy) 기반 인식</span></li>\r\n\t\t\t\t<li><span style=\"font-family:fkGroteskNeue;font-size:12pt\">별도의 앱을 설치해, 주변에 있는 스마트폰을 BLE 신호로 감지.</span></li>\r\n\t\t\t\t<li><span style=\"font-family:fkGroteskNeue;font-size:12pt\">감지된 사용자끼리 자동으로 그룹 초대 링크를 생성해 메신저로 전달.</span></li>\r\n\t\t\t\t<li><span style=\"font-family:fkGroteskNeue;font-size:12pt;font-style:italic\">장점</span><span style=\"font-family:fkGroteskNeue;font-size:12pt\">: GPS 등 위치좌표 미수집, 근거리(수 m 이내)에서만 작동해 프라이버시 보호.</span></li>\r\n\t\t\t\t<li><span style=\"font-family:fkGroteskNeue;font-size:12pt;font-style:italic\">단점</span><span style=\"font-family:fkGroteskNeue;font-size:12pt\">: 메신저와 완전 자동 연동은 불가, 최소한의 사용자 액션(예: 초대 수락)이 필요.</span></li>\r\n\t\t\t\t<li><span style=\"font-family:inherit;font-size:12pt\">Wi-Fi Direct/동일 네트워크 기반</span></li>\r\n\t\t\t\t<li><span style=\"font-family:fkGroteskNeue;font-size:12pt\">동일 Wi-Fi 네트워크에 접속한 기기끼리 자동 인식.</span></li>\r\n\t\t\t\t<li><span style=\"font-family:fkGroteskNeue;font-size:12pt\">BLE와 유사하게 그룹 초대 링크 자동 전달 가능.</span></li>\r\n\t\t\t\t<li><span style=\"font-family:fkGroteskNeue;font-size:12pt;font-style:italic\">장점</span><span style=\"font-family:fkGroteskNeue;font-size:12pt\">: 실내 환경에서 효과적, 위치정보 미수집.</span></li>\r\n\t\t\t\t<li><span style=\"font-family:fkGroteskNeue;font-size:12pt;font-style:italic\">단점</span><span style=\"font-family:fkGroteskNeue;font-size:12pt\">: 네트워크 환경에 따라 인식률 차이.</span></li>\r\n\t\t\t\t<p style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:fkGrotesk;font-size:18pt\">2.</span><span lang=\"ko-KR\" style=\"font-family:fkGrotesk;font-size:18pt\">&#160;</span><span lang=\"ko-KR\" style=\"font-family:inherit;font-size:12pt\">기지국(Cell Tower) 정보 활용</span></p>\r\n\t\t\t\t<li><span style=\"font-family:inherit;font-size:12pt\">동일 기지국 접속자 매칭</span></li>\r\n\t\t\t\t<li><span style=\"font-family:fkGroteskNeue;font-size:12pt\">위치좌표 없이, 같은 기지국에 접속한 사용자끼리 임의 그룹핑.</span></li>\r\n\t\t\t\t<li><span style=\"font-family:fkGroteskNeue;font-size:12pt;font-style:italic\">장점</span><span style=\"font-family:fkGroteskNeue;font-size:12pt\">: 위치정보 미수집, 프라이버시 우수.</span></li>\r\n\t\t\t\t<li><span style=\"font-family:fkGroteskNeue;font-size:12pt;font-style:italic\">단점</span><span style=\"font-family:fkGroteskNeue;font-size:12pt\">: 도심 등에서는 정확도가 낮아, &#39;주변&#39;의 범위가 넓음.</span></li>\r\n\t\t\t\t<p style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:fkGrotesk;font-size:18pt\">3.</span><span lang=\"ko-KR\" style=\"font-family:fkGrotesk;font-size:18pt\">&#160;</span><span lang=\"ko-KR\" style=\"font-family:inherit;font-size:12pt\">환경 태깅(주변 환경 해시) 방식</span></p>\r\n\t\t\t\t<li><span style=\"font-family:fkGroteskNeue;font-size:12pt\">Wi-Fi SSID, 블루투스 기기 목록, 소음 패턴 등 환경 정보 해시값 비교</span></li>\r\n\t\t\t\t<li><span style=\"font-family:fkGroteskNeue;font-size:12pt\">위치좌표 대신, 주변 환경의 특징값을 해시로 변환해 같은 환경에 있는 사용자끼리 매칭.</span></li>\r\n\t\t\t\t<li><span style=\"font-family:fkGroteskNeue;font-size:12pt;font-style:italic\">장점</span><span style=\"font-family:fkGroteskNeue;font-size:12pt\">: 위치정보 미수집, 프라이버시 보호.</span></li>\r\n\t\t\t\t<li><span style=\"font-family:fkGroteskNeue;font-size:12pt;font-style:italic\">단점</span><span style=\"font-family:fkGroteskNeue;font-size:12pt\">: 환경 변화에 민감, 구현 난이도 높음.</span></li>\r\n\t\t\t\t<p style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:inherit;font-size:12pt\">실행 가능한 현실적 조합</span></p>\r\n\t\t\t\t<li><span style=\"font-family:fkGroteskNeue;font-size:12pt\">별도 앱 설치 + BLE(블루투스) 기반 인식 → 자동 그룹 초대 링크 생성 및 전달</span></li>\r\n\t\t\t\t<li><span style=\"font-family:fkGroteskNeue;font-size:12pt\">메신저 API 정책상, 외부 앱에서 그룹 자동 초대까지 완전 자동화는 어렵지만, &#39;주변 사용자 자동 인식 → 초대 링크 자동 전달&#39; 방식은 구현 가능성이 높음.</span></li>\r\n\t\t\t\t<li><span style=\"font-family:fkGroteskNeue;font-size:12pt\">사용자는 링크를 클릭해 단체방에 참여(최소한의 액션 필요).</span></li>\r\n\t\t\t\t<li><span style=\"font-family:fkGroteskNeue;font-size:12pt\">위치정보를 수집하지 않고, 프라이버시를 최대한 보호할 수 있음.</span></li>\r\n\t\t\t\t<p style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:inherit;font-size:12pt\">법적&#183;기술적 고려사항</span></p>\r\n\t\t\t\t<li><span style=\"font-family:inherit;font-size:12pt\">메신저 API 정책</span><span style=\"font-family:fkGroteskNeue;font-size:12pt\">: 카카오톡 등 주요 메신저는 외부 앱에서 자동 그룹 초대 기능을 공식 지원하지 않음.</span></li>\r\n\t\t\t\t<li><span style=\"font-family:inherit;font-size:12pt\">프라이버시 및 법적 이슈</span><span style=\"font-family:fkGroteskNeue;font-size:12pt\">: BLE, Wi-Fi, 기지국 정보는 위치좌표를 직접 수집하지 않지만, 특정 상황에서는 간접적 위치 추정 가능성이 있으므로 설계 시 주의 필요.</span></li>\r\n\t\t\t\t<li><span style=\"font-family:inherit;font-size:12pt\">실제 구현</span><span style=\"font-family:fkGroteskNeue;font-size:12pt\">: 사용자의 명시적 동의, 앱 설치, 최소한의 수동 동작(초대 수락 등)이 필요할 수 있음.</span></li>\r\n\t\t\t\t<p style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:inherit;font-size:12pt\">요약</span></p>\r\n\t\t\t\t<li><span style=\"font-family:fkGroteskNeue;font-size:12pt\">BLE/Wi-Fi Direct 기반 별도 앱 + 자동 초대 링크 전달</span><span lang=\"ko-KR\" style=\"font-family:fkGroteskNeue;font-size:12pt\">&#160;</span><span style=\"font-family:fkGroteskNeue;font-size:12pt\">방식이 현실적 대안.</span></li>\r\n\t\t\t\t<li><span style=\"font-family:inherit;font-size:12pt\">위치정보 미수집</span><span lang=\"ko-KR\" style=\"font-family:fkGroteskNeue;font-size:12pt\">&#160;</span><span style=\"font-family:fkGroteskNeue;font-size:12pt\">및</span><span lang=\"ko-KR\" style=\"font-family:fkGroteskNeue;font-size:12pt\">&#160;프라이버시 보호</span><span style=\"font-family:fkGroteskNeue;font-size:12pt\">가 가능.</span></li>\r\n\t\t\t\t<li><span style=\"font-family:fkGroteskNeue;font-size:12pt\">**</span><span lang=\"ko-KR\" style=\"font-family:inherit;font-size:12pt\">완전 자동화</span><span style=\"font-family:fkGroteskNeue;font-size:12pt\">**는 메신저 정책상 한계가 있으나, 사용자의 최소한의 액션으로 충분히 실현 가능.</span></li>\r\n\t\t\t\t<li><br />\r\n\t\t\t\t</li>\r\n\t\t\t</ul>\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<p style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:12pt;font-weight:bold\">(1) </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic;font-size:12pt;font-weight:bold\">커뮤니케이션과</span><span lang=\"ko-KR\" style=\"font-size:12pt;font-weight:bold\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic;font-size:12pt;font-weight:bold\">네트워킹</span></p>\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<p style=\"margin-top:0pt;margin-bottom:0pt\">[<span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">정책</span>]</p>\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<iframe width=\"356\" height=\"200\" data-original-src=\"https://www.youtube.com/watch?v=XFQ7EsMcN1A&amp;t=465s\" src=\"https://www.youtube.com/embed/XFQ7EsMcN1A?start=465&feature=oembed&autoplay=true\" />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<p lang=\"ko-KR\" style=\"font-family:Pretendard Light;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-weight:bold\">Atomic market</span>을 찾는 것이 핵심적인 전략이군! 네 서비스가 시작할 때, 특정 <span style=\"font-weight:bold\">타겟 시장</span>이나 <span style=\"font-weight:bold\">특정 사용자층</span>을 정의하고 그들에게 집중하는 것이 매우 중요해. 몇 가지 가능한 <span style=\"font-weight:bold\">원자 시장</span>을 제시해볼게:</p>\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<p lang=\"ko-KR\" style=\"font-family:Pretendard Light;margin-top const CONTENT_HASH = '6ec93e24';

let cards = [];
let moving = null, resizing = null;
let selectedIdx = null, clipboardCard = null;
const GRID = 20, GAP = 14;
function snap(v) { return Math.round(v / GRID) * GRID; }

// ── Undo (Ctrl+Z) ────────────────────────────────────────────────────────────
const MAX_HISTORY = 50;
let history = [];
function snapshot() {
  syncText();
  history.push(JSON.stringify(cards));
  if (history.length > MAX_HISTORY) history.shift();
}
function undo() {
  if (!history.length) { showStatus('되돌릴 내용 없음'); return; }
  syncText();
  cards = JSON.parse(history.pop());
  renderCards();
  saveBoard();
  showStatus('↩ 되돌림');
}
function showStatus(msg) {
  const s = document.getElementById('status');
  s.textContent = msg;
  clearTimeout(showStatus._t);
  showStatus._t = setTimeout(() => { s.textContent = ''; }, 2000);
}
document.addEventListener('keydown', e => {
  const isText = document.activeElement?.contentEditable === 'true';
  if ((e.ctrlKey || e.metaKey) && e.key === 'z' && !e.shiftKey) {
    if (isText) return;
    e.preventDefault();
    undo();
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'c' && !e.shiftKey && !isText) {
    if (selectedIdx !== null && cards[selectedIdx]) {
      syncText();
      clipboardCard = JSON.parse(JSON.stringify(cards[selectedIdx]));
      showStatus('카드 복사됨');
      e.preventDefault();
    }
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'v' && !e.shiftKey && !isText) {
    if (clipboardCard) {
      e.preventDefault();
      snapshot();
      const nc = JSON.parse(JSON.stringify(clipboardCard));
      nc.x = (nc.x || 0) + 30; nc.y = (nc.y || 0) + 30;
      cards.push(nc);
      selectedIdx = cards.length - 1;
      renderCards(); saveBoard();
      showStatus('카드 붙여넣음');
    }
  }
  if (e.key === 'Escape') {
    document.querySelectorAll('.card.selected').forEach(c => c.classList.remove('selected'));
    selectedIdx = null;
  }
});

function pushCards(movedIdx) {
  const moved = cards[movedIdx];
  const movedEl = document.querySelector(`.card[data-idx="${movedIdx}"]`);
  if (!movedEl) return;
  const mh = movedEl.offsetHeight;
  document.querySelectorAll('.card').forEach(el => {
    const i = +el.dataset.idx;
    if (i === movedIdx) return;
    const c = cards[i], oh = el.offsetHeight;
    if (moved.x < (c.x+(c.w||200)) && (moved.x+(moved.w||200)) > c.x && moved.y < (c.y+oh) && (moved.y+mh) > c.y) {
      c.y = moved.y + mh + GAP;
      el.style.top = c.y + 'px';
    }
  });
}

function loadBoard() {
  const saved = localStorage.getItem(SAVE_KEY);
  const savedHash = localStorage.getItem(SAVE_KEY + ':hash');
  let parsed = null;
  try { parsed = saved ? JSON.parse(saved) : null; } catch(e) {}
  // reset if: no save, empty array, or content hash changed (page regenerated)
  if (!parsed || parsed.length === 0 || savedHash !== CONTENT_HASH) {
    cards = DEFAULT_CARDS.map(c => ({...c}));
    localStorage.removeItem(SAVE_KEY);
    localStorage.setItem(SAVE_KEY + ':hash', CONTENT_HASH);
    renderCards();
    const hasCoords = cards.some(c => c.x !== undefined && c.y !== undefined);
    if (!hasCoords) autoLayout();
    return;
  }
  cards = parsed;
  renderCards();
}
function resetToDefaults() { if (!confirm('저장된 보드를 지우고 원본으로 초기화합니다. 계속할까요?')) return; localStorage.removeItem(SAVE_KEY); cards = DEFAULT_CARDS.map(c => ({...c})); renderCards(); autoLayout(); }

function autoLayout() {
  const boardW = document.getElementById('board').offsetWidth;
  const cols = Math.max(1, Math.floor(boardW / 280));
  const colW = (boardW - GAP*(cols-1)) / cols;
  const colH = new Array(cols).fill(0);
  const allCards = document.querySelectorAll('.card');
  const images = document.querySelectorAll('.card img');
  let loaded = 0;
  function place() {
    allCards.forEach((el, i) => {
      const w = Math.min(cards[i].w || colW, colW);
      let minCol = 0;
      for (let c = 1; c < cols; c++) if (colH[c] < colH[minCol]) minCol = c;
      cards[i].x = minCol * (colW + GAP);
      cards[i].y = colH[minCol];
      cards[i].w = w;
      el.style.left = cards[i].x + 'px';
      el.style.top = cards[i].y + 'px';
      el.style.width = w + 'px';
      colH[minCol] = cards[i].y + el.offsetHeight + GAP;
    });
    document.getElementById('board').style.minHeight = (Math.max(...colH) + 100) + 'px';
    saveBoard();
  }
  if (!images.length) { requestAnimationFrame(place); return; }
  images.forEach(img => {
    if (img.complete) { loaded++; if (loaded >= images.length) requestAnimationFrame(place); }
    else { img.onload = img.onerror = () => { loaded++; if (loaded >= images.length) requestAnimationFrame(place); }; }
  });
}

function syncText() {
  document.querySelectorAll('.card').forEach(el => {
    const i = +el.dataset.idx;
    if (cards[i]?.type === 'text') { const t = el.querySelector('.text'); if (t) cards[i].content = t.innerHTML; }
  });
}
function saveBoard() { syncText(); localStorage.setItem(SAVE_KEY, JSON.stringify(cards)); localStorage.setItem(SAVE_KEY + ':hash', CONTENT_HASH); showStatus('저장됨 ' + new Date().toLocaleTimeString()); }

function renderCards() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  cards.forEach((card, i) => {
    const el = document.createElement('div');
    el.className = 'card'; el.dataset.idx = i;
    if (card.x !== undefined) el.style.left = card.x + 'px';
    if (card.y !== undefined) el.style.top = card.y + 'px';
    // html cards contain raw OneNote table HTML which may overflow the stated div width
    if (card.w) { if (card.type === 'html') el.style.minWidth = card.w + 'px'; else el.style.width = card.w + 'px'; }
    el.addEventListener('mousedown', e => {
      if (e.target.closest('.text, a, .card-btn, .resize-handle, td, th')) return;
      e.preventDefault();
      // Update selection
      document.querySelectorAll('.card.selected').forEach(c => c.classList.remove('selected'));
      selectedIdx = i; el.classList.add('selected');
      snapshot();
      moving = { idx: i, startX: e.clientX, startY: e.clientY, origX: card.x||0, origY: card.y||0 };
      el.classList.add('moving');
    });
    const actions = document.createElement('div'); actions.className = 'card-actions';
    const delBtn = document.createElement('button'); delBtn.className = 'card-btn'; delBtn.textContent = '×';
    delBtn.onclick = e => { e.stopPropagation(); if(confirm('삭제?')) { snapshot(); cards.splice(i,1); renderCards(); saveBoard(); } };
    actions.appendChild(delBtn); el.appendChild(actions);
    if (card.type === 'text') {
      const text = document.createElement('div'); text.className = 'text'; text.contentEditable = true;
      text.innerHTML = card.content || '';
      text.addEventListener('focus', () => { snapshot(); });
      text.addEventListener('blur', () => { card.content = text.innerHTML; saveBoard(); });
      el.appendChild(text);
    } else if (card.type === 'image') {
      const img = document.createElement('img');
      img.src = card.src.startsWith('http') || card.src.startsWith('data:') ? card.src : IMG_BASE + card.src;
      img.alt = ''; img.loading = 'lazy'; img.onerror = () => img.style.display = 'none';
      if (card.w) img.style.width = card.w + 'px';
      if (card.h) img.style.height = card.h + 'px';
      if (card.link) { const a = document.createElement('a'); a.href = card.link; a.target = '_blank'; a.appendChild(img); el.appendChild(a); }
      else { el.appendChild(img); }
      if (card.caption) { const cap = document.createElement('div'); cap.style.cssText = 'font-size:11px;color:#8b949e;margin-top:4px;word-break:break-word;padding:0 2px;'; cap.textContent = card.caption; el.appendChild(cap); }
    } else if (card.type === 'html') {
      const wrapper = document.createElement('div');
      wrapper.style.cssText = 'overflow:auto;font-size:13px;line-height:1.5;';
      wrapper.innerHTML = card.html.replace(/__ATTACHMENT__/g, IMG_BASE);
      wrapper.querySelectorAll('img').forEach(img => { img.style.maxWidth = '100%'; img.style.height = 'auto'; img.draggable = false; });
      wrapper.querySelectorAll('a').forEach(a => { a.target = '_blank'; a.style.color = '#6cb0f6'; });
      wrapper.querySelectorAll('table').forEach(t => { t.style.borderCollapse = 'collapse'; });
      wrapper.querySelectorAll('td,th').forEach(td => {
        td.style.border = '1px solid #444'; td.style.padding = '4px 6px'; td.style.verticalAlign = 'top';
        td.title = '더블클릭으로 편집';
        td.addEventListener('dblclick', function(e) {
          e.stopPropagation();
          snapshot();
          this.contentEditable = 'true';
          this.style.outline = '2px solid #388bfd';
          this.style.background = 'rgba(56,139,253,0.08)';
          this.focus();
        });
        td.addEventListener('blur', function() {
          this.contentEditable = 'false';
          this.style.outline = '';
          this.style.background = '';
          cards[i].html = wrapper.innerHTML.split(IMG_BASE).join('__ATTACHMENT__');
          saveBoard();
        });
      });
      el.appendChild(wrapper);
    } else if (card.type === 'table') {
      const rows = card.rows || [['','',''],['','',''],['','','']];
      const tbl = document.createElement('table');
      tbl.style.cssText = 'border-collapse:collapse;width:100%;font-size:13px;';
      rows.forEach((row, ri) => {
        const tr = tbl.insertRow();
        row.forEach((cell, ci) => {
          const td = document.createElement(ri === 0 ? 'th' : 'td');
          td.contentEditable = true;
          td.style.cssText = 'border:1px solid #30363d;padding:4px 8px;min-width:60px;text-align:left;' + (ri===0 ? 'background:#21262d;font-weight:600;' : '');
          td.textContent = cell;
          td.addEventListener('blur', () => { if (!cards[i].rows) cards[i].rows = rows; rows[ri][ci] = td.textContent; saveBoard(); });
          tr.appendChild(td);
        });
      });
      el.appendChild(tbl);
      const addRow = document.createElement('button');
      addRow.textContent = '+ 행'; addRow.style.cssText = 'margin-top:4px;font-size:11px;background:#21262d;border:1px solid #30363d;color:#8b949e;padding:2px 8px;border-radius:4px;cursor:pointer;';
      addRow.onclick = e => { e.stopPropagation(); snapshot(); if (!cards[i].rows) cards[i].rows = rows; cards[i].rows.push(new Array(cards[i].rows[0].length).fill('')); renderCards(); saveBoard(); };
      const addCol = document.createElement('button');
      addCol.textContent = '+ 열'; addCol.style.cssText = 'margin-top:4px;margin-left:4px;font-size:11px;background:#21262d;border:1px solid #30363d;color:#8b949e;padding:2px 8px;border-radius:4px;cursor:pointer;';
      addCol.onclick = e => { e.stopPropagation(); snapshot(); if (!cards[i].rows) cards[i].rows = rows; cards[i].rows.forEach(r => r.push('')); renderCards(); saveBoard(); };
      el.appendChild(addRow); el.appendChild(addCol);
    }
    const rh = document.createElement('div'); rh.className = 'resize-handle';
    rh.addEventListener('mousedown', e => { e.preventDefault(); e.stopPropagation(); snapshot(); resizing = { idx: i, startX: e.clientX, startW: card.w || el.offsetWidth }; });
    el.appendChild(rh);
    if (i === selectedIdx) el.classList.add('selected');
    board.appendChild(el);
  });
  requestAnimationFrame(() => {
    let maxB = 0;
    document.querySelectorAll('.card').forEach(el => { const b = (parseFloat(el.style.top)||0) + el.offsetHeight; if (b > maxB) maxB = b; });
    board.style.minHeight = (maxB + 100) + 'px';
  });
}

document.addEventListener('mousemove', e => {
  if (moving) {
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`); if (!el) return;
    let nx = moving.origX + e.clientX - moving.startX, ny = moving.origY + e.clientY - moving.startY;
    if (e.shiftKey) { nx = snap(nx); ny = snap(ny); el.style.outline = '1px dashed rgba(240,192,64,0.3)'; } else { el.style.outline = ''; }
    el.style.left = nx + 'px'; el.style.top = ny + 'px';
  }
  if (resizing) {
    let nw = resizing.startW + e.clientX - resizing.startX; if (e.shiftKey) nw = snap(nw);
    cards[resizing.idx].w = Math.max(100, nw);
    const el = document.querySelector(`.card[data-idx="${resizing.idx}"]`); if (el) el.style.width = cards[resizing.idx].w + 'px';
  }
});

document.addEventListener('mouseup', e => {
  if (moving) {
    let nx = moving.origX + e.clientX - moving.startX, ny = moving.origY + e.clientY - moving.startY;
    if (e.shiftKey) { nx = snap(nx); ny = snap(ny); }
    cards[moving.idx].x = Math.max(0, nx); cards[moving.idx].y = Math.max(0, ny);
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`); if (el) { el.classList.remove('moving'); el.style.outline = ''; }
    if (e.shiftKey) pushCards(moving.idx);
    moving = null; saveBoard();
  }
  if (resizing) { if (e.shiftKey) pushCards(resizing.idx); resizing = null; saveBoard(); }
});

function addTextCard() { snapshot(); cards.push({ type: 'text', content: '', x: 50, y: window.scrollY+100, w: 300 }); renderCards(); setTimeout(() => { const els = document.querySelectorAll('.card .text'); els[els.length-1]?.focus(); }, 100); }
function addImageCard() { const input = document.createElement('input'); input.type = 'file'; input.accept = 'image/*'; input.onchange = e => { const f = e.target.files[0]; if (!f) return; const r = new FileReader(); r.onload = () => { snapshot(); cards.push({ type: 'image', src: r.result, x: 50, y: window.scrollY+100, w: 240 }); renderCards(); saveBoard(); }; r.readAsDataURL(f); }; input.click(); }
function addImageUrl() { const url = prompt('이미지 URL'); if (!url) return; snapshot(); cards.push({ type: 'image', src: url, x: 50, y: window.scrollY+100, w: 240 }); renderCards(); saveBoard(); }
function addTableCard() {
  const colsStr = prompt('열 수 (기본 3)', '3'); const cols = Math.max(1, parseInt(colsStr)||3);
  const rowsStr = prompt('행 수 (헤더 포함, 기본 4)', '4'); const rows = Math.max(1, parseInt(rowsStr)||4);
  snapshot();
  cards.push({ type: 'table', rows: Array.from({length: rows}, (_, ri) => Array.from({length: cols}, (_, ci) => ri===0 ? `열${ci+1}` : '')), x: 50, y: window.scrollY+100, w: Math.max(240, cols*100) });
  renderCards(); saveBoard();
}
function exportBoard() { syncText(); const blob = new Blob([JSON.stringify(cards, null, 2)], { type: 'application/json' }); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = SAVE_KEY + '.json'; a.click(); }
// ── Zoom ─────────────────────────────────────────────────────────────────────
let zoom = parseFloat(localStorage.getItem('zoom-' + SAVE_KEY) || '1.0');
function applyZoom() {
  const board = document.getElementById('board');
  board.style.transform = `scale(${zoom})`;
  board.style.transformOrigin = '0 0';
  document.getElementById('zoom-level').textContent = Math.round(zoom * 100) + '%';
  localStorage.setItem('zoom-' + SAVE_KEY, zoom);
}
function zoomIn()  { zoom = Math.min(3.0, parseFloat((zoom + 0.1).toFixed(2))); applyZoom(); }
function zoomOut() { zoom = Math.max(0.2, parseFloat((zoom - 0.1).toFixed(2))); applyZoom(); }
document.addEventListener('keydown', e => {
  if (e.ctrlKey || e.metaKey) {
    if (e.key === '=' || e.key === '+') { e.preventDefault(); zoomIn(); }
    if (e.key === '-')                  { e.preventDefault(); zoomOut(); }
    if (e.key === '0')                  { e.preventDefault(); zoom = 1.0; applyZoom(); }
  }
});
document.getElementById('board').addEventListener('wheel', e => {
  if (!(e.ctrlKey || e.metaKey)) return;
  e.preventDefault();
  e.deltaY < 0 ? zoomIn() : zoomOut();
}, { passive: false });
applyZoom();
function resetLayout() { if (!confirm('자동 재배치합니다.')) return; cards.forEach(c => { delete c.x; delete c.y; }); renderCards(); autoLayout(); }
// ── Floating format toolbar ───────────────────────────────────────────────────
const fmtBar = document.getElementById('format-toolbar');
function fmt(cmd) { document.execCommand(cmd, false, null); saveBoard(); }
function fmtLink() {
  const sel = window.getSelection();
  if (!sel || sel.isCollapsed) return;
  const url = prompt('링크 URL 입력', 'https://');
  if (!url) return;
  document.execCommand('createLink', false, url);
  // make links open in new tab
  sel.anchorNode?.parentElement?.closest('a')?.setAttribute('target', '_blank');
  document.querySelectorAll('.text a').forEach(a => a.target = '_blank');
  saveBoard();
}

// prevent format buttons from blurring contenteditable
fmtBar.addEventListener('mousedown', e => e.preventDefault());

document.addEventListener('selectionchange', () => {
  const sel = window.getSelection();
  if (!sel || sel.isCollapsed || !sel.toString().trim()) { fmtBar.style.display = 'none'; return; }
  // only show if selection is inside a .text element
  const anchor = sel.anchorNode;
  if (!anchor) { fmtBar.style.display = 'none'; return; }
  const textEl = anchor.nodeType === 1 ? anchor.closest('.text') : anchor.parentElement?.closest('.text');
  if (!textEl) { fmtBar.style.display = 'none'; return; }
  // position above selection
  const range = sel.getRangeAt(0);
  const rect = range.getBoundingClientRect();
  fmtBar.style.display = 'flex';
  const tbW = fmtBar.offsetWidth || 180;
  let left = rect.left + rect.width / 2 - tbW / 2;
  left = Math.max(8, Math.min(left, window.innerWidth - tbW - 8));
  fmtBar.style.left = left + 'px';
  fmtBar.style.top = (rect.top - 44 + window.scrollY) + 'px';
});

setInterval(saveBoard, 30000);
loadBoard();
</script>
</body>
