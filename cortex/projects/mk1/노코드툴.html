<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>노코드툴</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1e1e1e; color: #e0e0e0; font-family: 'Segoe UI', -apple-system, sans-serif; font-size: 15px; line-height: 1.6; padding: 20px 30px 60px; overflow-x: hidden; }
a { color: #6cb0f6; text-decoration: none; }
a:hover { text-decoration: underline; }
.title-bar { background: #3a3a5c; display: inline-block; padding: 6px 16px; font-size: 22px; font-weight: bold; color: #fff; margin-bottom: 4px; }
.date { color: #999; font-size: 13px; margin-bottom: 20px; }
.board { position: relative; }
.card { background: #2a2a2a; border: 1px solid #3a3a3a; border-radius: 8px; padding: 12px; position: absolute; cursor: grab; transition: box-shadow 0.15s; overflow: hidden; }
.card:hover { box-shadow: 0 0 0 1px #58a6ff; z-index: 10; }
.card.moving { opacity: 0.8; box-shadow: 0 4px 24px rgba(0,0,0,0.6); z-index: 100; cursor: grabbing; }
.card img { width: 100%; border-radius: 4px; display: block; }
.card .text { outline: none; min-height: 20px; white-space: pre-wrap; word-break: break-word; }
.card .text:focus { background: rgba(255,255,255,0.05); border-radius: 4px; padding: 4px; }
.card .text:empty::before { content: '텍스트 입력...'; color: #555; }
.card-actions { position: absolute; top: 4px; right: 4px; display: none; gap: 4px; }
.card:hover .card-actions { display: flex; }
.card-btn { background: #333; border: 1px solid #555; color: #ccc; border-radius: 4px; padding: 2px 6px; font-size: 11px; cursor: pointer; }
.card-btn:hover { background: #444; color: #fff; }
.resize-handle { position: absolute; bottom: 0; right: 0; width: 16px; height: 16px; cursor: se-resize; opacity: 0; }
.card:hover .resize-handle { opacity: 0.6; }
.resize-handle::after { content: ''; position: absolute; bottom: 3px; right: 3px; width: 8px; height: 8px; border-right: 2px solid #666; border-bottom: 2px solid #666; }
.card.selected { box-shadow: 0 0 0 2px #58a6ff; z-index: 5; }
.highlight-red { color: #ff6b6b; }
.highlight-blue { color: #6cb0f6; }
.highlight-gold { color: #f0c040; }
.toolbar { position: fixed; bottom: 0; left: 0; right: 0; background: #161b22; border-top: 1px solid #30363d; padding: 8px 20px; display: flex; gap: 12px; align-items: center; z-index: 200; }
.toolbar button { background: #21262d; border: 1px solid #30363d; color: #e0e0e0; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; }
.toolbar button:hover { background: #30363d; }
.toolbar .status { color: #8b949e; font-size: 12px; margin-left: auto; }
#format-toolbar { position: fixed; display: none; background: #1c2128; border: 1px solid #444c56; border-radius: 8px; padding: 4px 6px; gap: 2px; align-items: center; z-index: 500; box-shadow: 0 4px 16px rgba(0,0,0,0.5); }
#format-toolbar button { background: none; border: none; color: #cdd9e5; padding: 4px 8px; border-radius: 5px; cursor: pointer; font-size: 13px; line-height: 1; }
#format-toolbar button:hover { background: #373e47; }
#format-toolbar .sep { width: 1px; height: 16px; background: #444c56; margin: 0 2px; }
</style>
</head>
<body>
<div class="title-bar" contenteditable="true">노코드툴</div>
<div class="date"></div>
<div class="board" id="board"></div>
<div id="format-toolbar">
  <button onmousedown="e=>e.preventDefault()" onclick="fmt('bold')" title="굵게"><b>B</b></button>
  <button onclick="fmt('italic')" title="기울임"><i>I</i></button>
  <button onclick="fmt('underline')" title="밑줄"><u>U</u></button>
  <div class="sep"></div>
  <button onclick="fmtLink()" title="링크 삽입">🔗</button>
  <button onclick="fmt('unlink')" title="링크 제거">✂</button>
</div>
<div class="toolbar">
  <button onclick="undo()" title="Ctrl+Z">↩ 실행취소</button>
  <button onclick="addTextCard()">+ 텍스트</button>
  <button onclick="addImageCard()">+ 이미지</button>
  <button onclick="addImageUrl()">+ 이미지 URL</button>
  <button onclick="addTableCard()">+ 표</button>
  <button onclick="saveBoard()">💾 저장</button>
  <button onclick="exportBoard()">📤 내보내기</button>
  <button onclick="resetLayout()">↺ 재배치</button>
  <button onclick="resetToDefaults()" style="color:#f85149">↺ 초기화</button>
  <div style="display:flex;align-items:center;gap:4px;margin-left:8px;border-left:1px solid #30363d;padding-left:12px;">
    <button onclick="zoomOut()" title="Ctrl+-" style="padding:6px 10px;">−</button>
    <span id="zoom-level" style="font-size:12px;color:#8b949e;min-width:36px;text-align:center;">100%</span>
    <button onclick="zoomIn()" title="Ctrl+=" style="padding:6px 10px;">+</button>
  </div>
  <span class="status" id="status">Ready</span>
</div>
<script>

const IMG_BASE = '../../attachments/';
const DEFAULT_CARDS = [

  },

  {
    "type": "html",
    "x": 48,
    "y": 139,
    "w": 655,
    "html": "\r\n\t\t\t<p style=\"font-family:맑은 고딕;margin-top:0pt;margin-bottom:0pt\">글라이드</p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:맑은 고딕;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Tahoma\">Bubble  </span><a href=\"https://saas.relate.kr/saas/bubble/r/recg3K7viUFRw525N\" lang=\"ko-KR\">https://saas.relate.kr/saas/bubble/r/recg3K7viUFRw525N</a></p>\r\n\t\t\t<p style=\"font-family:맑은 고딕;margin-top:0pt;margin-bottom:0pt\"><a href=\"https://www.youtube.com/@BubbleIO\">https://www.youtube.com/@BubbleIO</a></p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:맑은 고딕;margin-top:0pt;margin-bottom:0pt\"><a href=\"https://www.youtube.com/@user-hatchhiker\">https://www.youtube.com/@user-hatchhiker</a></p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:맑은 고딕;margin-top:0pt;margin-bottom:0pt\"><a href=\"https://www.youtube.com/watch?v=QQbr5pSbvg4&amp;ab_channel=%ED%95%B4%EC%B9%98%ED%95%98%EC%9D%B4%EC%BB%A4-%EB%85%B8%EC%BD%94%EB%93%9C%EB%A1%9C%EC%8B%9C%EC%9E%91%ED%95%98%EB%8A%94%EC%95%84%EC%9D%B4%EB%94%94%EC%96%B4%EB%A1%A0%EC%B9%AD\">버블 bubble.io 노코드 앱 개발 강의 - 1강. 데이터</a></p>\r\n\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Pretendard;font-size:13.5pt;color:#d6d4d2;background-color:#171818\">제품을 직접 만들 때가 정말 재미있었어요. 저는 개발 하나 모르는 사람인데 노코드&#160;툴을 이용해 빠르게 프리토타입을 만들었습니다. 예를 들어 웹사이트는 Webflow, 웹 개발은 Bubble.io, 앱 개발은 Flutterflow &amp;&#160;Glide, DB는 Airtable, 디자인은 Figma, 설문조사는 Tally, Mockup 은 shots.so 등으로 진행했습니다. 또한 제품을 알리기 위한 지표로서&#160;마케팅을 할 때는 Product Hunt &amp; Disquiet, 유저리서치는 Discord, 유저인터뷰는 오픈톡방, 제품 판매는 와디즈 &amp; 텀블벅을 활용했습니다.&#160;</span></p>\r\n\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Pretendard;font-size:13.5pt;color:#d6d4d2;background-color:#171818\">프리토타입을 검증할 때는 이렇듯 다양한 방법들이 존재합니다. 저희는 최대한 많은 툴을 활용해 짧은 시간 안에 지표를 만들려고 노력했습니다.</span></p>\r\n\t\t\t<br />\r\n\t\t\t<cite style=\"font-family:Calibri;font-size:9pt;color:#595959;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">출처</span>: &lt;<a href=\"https://eopla.net/magazines/4483#\">https://eopla.net/magazines/4483#</a>&gt; </cite>\r\n\t\t\t<br />\r\n\t\t\t<table style=\"border:0px\">\r\n\t\t\t\t<tr>\r\n\t\t\t\t\t<td style=\"background-color:white;border:0px\">\t\t\t\t\t<table style=\"border:1px solid;border-collapse:collapse\">\r\n\t\t\t\t\t\t<tr>\r\n\t\t\t\t\t\t\t<td style=\"border:1px solid;font-family:Tahoma;margin-top:13.5pt;margin-bottom:7.5pt;text-align:center\"><span style=\"font-family:Malgun Gothic;font-size:21pt;color:#1a1a1a;font-weight:bold\">노코드 툴을 사용해 직원 없이 혼자서 연 20억원을 버는 1인 사업가들 (feat. 마진율 90%)</span></td>\r\n\t\t\t\t\t\t</tr>\r\n\t\t\t\t\t\t<tr>\r\n\t\t\t\t\t\t\t<td style=\"border:1px solid;font-family:Tahoma;text-align:right\"><a href=\"https://maily.so/ahoy/messages/bAsLmyi7IMgfnyfrW9jIKowc7ux5vSme/click?signature=d5940c80576aa993f11d299174f41e9b8a891728&amp;url=http%3A%2F%2Fmaily.so%2Funsexybusinesskr%2Fposts%2F1f508483%3Ffrom%3Demail%26mid%3D3e7368a5\" style=\"font-family:Segoe UI Emoji;font-size:10.5pt\">&#127759;</a><span style=\"font-family:Malgun Gothic;font-size:10.5pt\"> 웹에서 보기</span></td>\r\n\t\t\t\t\t\t</tr>\r\n\t\t\t\t\t\t<tr>\r\n\t\t\t\t\t\t\t<td style=\"border:1px solid\">\t\t\t\t\t\t\t<ul>\r\n\t\t\t\t\t\t\t\t<p style=\"font-family:Tahoma;margin-top:12pt;margin-bottom:12pt\"><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#1a1a1a\">1인 사업자로 큰 매출을 만들기 위해서는 꼭 개발을 해야 한다고 생각했어요. 그런데 세상에는 선입견을 깨는 정말 다양한 비즈니스 케이스들이 많더라고요.&#160;</span><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#1a1a1a;font-weight:bold\">오늘은 노코드툴만 사용해 혼자서 연 10억원 이상을 벌고 있는 사업가 7명의 이야기를 가져왔습니다 :)</span></p>\r\n\t\t\t\t\t\t\t\t<p style=\"font-family:Tahoma;margin-top:12pt;margin-bottom:12pt\"><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#1a1a1a\">&#160;</span></p>\r\n\t\t\t\t\t\t\t\t<p style=\"font-family:Tahoma;margin-top:12pt;margin-bottom:6.8pt\"><span style=\"font-family:Malgun Gothic;font-size:22.5pt;color:#1a1a1a\">Justin Welsh (연 30억 매출, 90% 마진)</span></p>\r\n\t\t\t\t\t\t\t\t<p style=\"font-family:Tahoma;margin-top:12pt;margin-bottom:12pt\"><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#1a1a1a;font-weight:bold\">BM : 셀프 브랜딩 컨텐츠 -&gt; 뉴스레터 -&gt; 강의 판매</span></p>\r\n\t\t\t\t\t\t\t\t<br />\r\n\t\t\t\t\t\t\t\t<p style=\"font-family:Tahoma;margin-top:12pt;margin-bottom:12pt\"><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#1a1a1a\">저스틴은 30대에 영업직 임원으로 고속 승진한 직장인이었어요. 회사는 빠르게 성장했지만, 주 80시간 이상을 일하느라 공황 장애가 올 정도로 건강이 안 좋아졌습니다. 건강을 챙기면서 행복하게 살고 싶다는 생각으로 회사를 나와요.</span></p>\r\n\t\t\t\t\t\t\t\t<p style=\"font-family:Tahoma;margin-top:12pt;margin-bottom:12pt\"><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#1a1a1a\">B2B 세일즈 경험을 내세워 다른 B2B 회사들에게 컨설팅을 해주는 것으로 사업을 시작합니다. 컨설팅 비즈니스를 키우기 위해 링크드인에 자신의 영업 전략을 공유했어요. 여러개의 글을 올리면서 링크드인 팔로워 수가 조금씩 늘기 시작합니다.</span></p>\r\n\t\t\t\t\t\t\t\t<div style=\"display:inline-block;width:480px;height:200px;background:#2d333b;border-radius:4px;margin:2px;vertical-align:top;opacity:0.4\"></div>\r\n\t\t\t\t\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt;text-align:center\"><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#1e1e23\">퇴사 직후 Justin의 링크드인 게시글. 초기에는 세일즈 전문가로 포지셔닝했다.</span></p>\r\n\t\t\t\t\t\t\t\t<p style=\"font-family:Tahoma;margin-top:12pt;margin-bottom:12pt\"><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#1a1a1a\">&#160;</span></p>\r\n\t\t\t\t\t\t\t\t<p style=\"font-family:Tahoma;margin-top:12pt;margin-bottom:12pt\"><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#1a1a1a\">세일즈 전략을 배우고 싶은 사람보다 링크드인 팔로워를 늘리는 방법을 배우고 싶어하는 사람들이 더 많다는 것을 알게 되어요. 6개월 만에 자신의 정체성을 세일즈 아닌 셀프 브랜딩 전문가로 포지셔닝 합니다.&#160;</span></p>\r\n\t\t\t\t\t\t\t\t<div style=\"display:inline-block;width:480px;height:562px;background:#2d333b;border-radius:4px;margin:2px;vertical-align:top;opacity:0.4\"></div>\r\n\t\t\t\t\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt;text-align:center\"><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#1e1e23\">6개월 뒤 저스틴의 링크드인 게시글. 퍼스널 브랜딩 전문가로 피봇했다.</span></p>\r\n\t\t\t\t\t\t\t\t<p style=\"font-family:Tahoma;margin-top:12pt;margin-bottom:12pt\"><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#1a1a1a\">&#160;</span></p>\r\n\t\t\t\t\t\t\t\t<p style=\"font-family:Tahoma;margin-top:12pt;margin-bottom:12pt\"><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#1a1a1a;font-weight:bold\">[저스틴의 비즈니스 구조]</span></p>\r\n\t\t\t\t\t\t\t\t<p style=\"font-family:Tahoma;margin-top:12pt;margin-bottom:12pt\"><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#1a1a1a\">저스틴의 매출 전략은 간단합니다.</span></p>\r\n\t\t\t\t\t\t\t\t<p style=\"font-family:Tahoma;margin-top:12pt;margin-bottom:12pt\"><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#1a1a1a\">1) 링크드인과 트위터에 수많은 컨텐츠를 올리고 팔로워를 모아요.&#160;</span></p>\r\n\t\t\t\t\t\t\t\t<p style=\"font-family:Tahoma;margin-top:12pt;margin-bottom:12pt\"><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#1a1a1a\">2) 팔로워들에게는 뉴스레터를 구독하도록 유도하고요.</span></p>\r\n\t\t\t\t\t\t\t\t<p style=\"font-family:Tahoma;margin-top:12pt;margin-bottom:12pt\"><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#1a1a1a\">3) 뉴스레터 구독자들에게 팔리는 컨텐츠를 만드는 방법에 대한 강의를 판매합니다.</span></p>\r\n\t\t\t\t\t\t\t\t<p style=\"font-family:Tahoma;margin-top:12pt;margin-bottom:12pt\"><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#1a1a1a\">4) 뉴스레터 스폰서십 광고를 받아서 부가 수익을 얻기도 하고요.</span></p>\r\n\t\t\t\t\t\t\t\t<div style=\"display:inline-block;width:480px;height:200px;background:#2d333b;border-radius:4px;margin:2px;vertical-align:top;opacity:0.4\"></div>\r\n\t\t\t\t\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt;text-align:center\"><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#1e1e23\">1인 사업가를 위한 마케팅 퍼널</span></p>\r\n\t\t\t\t\t\t\t\t<p style=\"font-family:Tahoma;margin-top:12pt;margin-bottom:12pt\"><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#1a1a1a\">&#160;</span></p>\r\n\t\t\t\t\t\t\t\t<p style=\"font-family:Tahoma;margin-top:12pt;margin-bottom:12pt\"><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#1a1a1a;font-weight:bold\">저스틴은 유료 강의 판매와 뉴스레터 광고를 통해 연간 직원 없이 연간 30억원의 매출을 만들고 있어요.</span><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#1a1a1a\">&#160;마진율은 90% 이고요. 불과 4년 만에 이룬 성과이니 엄청나죠. 직원 없이 사업을 운영할 수 있는 이유는 노코드 툴을 적극적으로 사용하기 때문이에요.</span></p>\r\n\t\t\t\t\t\t\t\t<p style=\"font-family:Tahoma;margin-top:12pt;margin-bottom:12pt\"><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#1a1a1a\">&#160;</span></p>\r\n\t\t\t\t\t\t\t\t<p style=\"font-family:Tahoma;margin-top:12pt;margin-bottom:12pt\"><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#1a1a1a;font-weight:bold\">[사용하는 노코드 툴]</span></p>\r\n\t\t\t\t\t\t\t\t<li style=\"font-family:Tahoma;margin-top:6pt;margin-bottom:6pt\"><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#1a1a1a\">온라인 강의 운영을 위한 웹사이트 : Kajabi</span></li>\r\n\t\t\t\t\t\t\t\t<li style=\"font-family:Tahoma;margin-top:6pt;margin-bottom:6pt\"><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#1a1a1a\">온라인 강의 녹화 : Loom</span></li>\r\n\t\t\t\t\t\t\t\t<li style=\"font-family:Tahoma;margin-top:6pt;margin-bottom:6pt\"><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#1a1a1a\">결제 : Stripe</span></li>\r\n\t\t\t\t\t\t\t\t<li style=\"font-family:Tahoma;margin-top:6pt;margin-bottom:6pt\"><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#1a1a1a\">SNS 게시글 발행 : Hypefury</span></li>\r\n\t\t\t\t\t\t\t\t<li style=\"font-family:Tahoma;margin-top:6pt;margin-bottom:6pt\"><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#1a1a1a\">뉴스레터 템플릿 : Type Share</span></li>\r\n\t\t\t\t\t\t\t\t<li style=\"font-family:Tahoma;margin-top:6pt;margin-bottom:6pt\"><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#1a1a1a\">데이터 분석 : Fathom, Shield</span></li>\r\n\t\t\t\t\t\t\t\t<li style=\"font-family:Tahoma;margin-top:6pt;margin-bottom:6pt\"><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#1a1a1a\">사용자 후기 : Testimonial</span></li>\r\n\t\t\t\t\t\t\t\t<li style=\"font-family:Tahoma;margin-top:6pt;margin-bottom:6pt\"><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#1a1a1a\">노코드 툴 연결 : Zapier</span></li>\r\n\t\t\t\t\t\t\t\t<p style=\"font-family:Tahoma;margin-top:12pt;margin-bottom:12pt\"><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#1a1a1a\">&#160;</span></p>\r\n\t\t\t\t\t\t\t\t<p style=\"font-family:Tahoma;margin-top:12pt;margin-bottom:12pt\"><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#1a1a1a;font-weight:bold\">저스틴은 1인 비즈니스를 시작하고 싶은 사람들에게 두가지 조언을 남겼어요.</span></p>\r\n\t\t\t\t\t\t\t\t<li style=\"font-family:Tahoma;margin-top:6pt;margin-bottom:6pt\"><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#1a1a1a;font-weight:bold\">컨설팅으로 비즈니스를 시작하는 것은 괜찮은 방법이에요.</span><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#1a1a1a\">&#160;20명을 컨설팅 하다보면 공통적으로 질문하는 것들이 나오게 될 거에요. 그 질문들에 대한 답변을 모아서 강의로 제작하고 판매해 보세요.</span></li>\r\n\t\t\t\t\t\t\t\t<li style=\"font-family:Tahoma;margin-top:6pt;margin-bottom:6pt\"><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#1a1a1a;font-weight:bold\">어떤 것을 컨설팅할지 모르겠다면, 최근 2년 동안 열심히 몰두한 것들에 대해 생각해 보세요.</span><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#1a1a1a\">&#160;지금 당신이 당연하게 알고 있는 것들이 대부분의 사람들에게는 당연하지 않을 수 있습니다. 당신보다 2년 뒤쳐져 있는 사람에게 당신은 훌륭한 컨설턴트가 될 수 있어요.</span></li>\r\n\t\t\t\t\t\t\t\t<li style=\"font-family:Tahoma;margin-top:6pt;margin-bottom:6pt\"><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#1a1a1a;font-weight:bold\">사람들이 가장 해결하고 싶은 영역은 보통 세가지 안에 들어와요.</span><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#1a1a1a\">&#160;건강해지고 싶은 욕망, 부자가 되고 싶은 욕망, 사랑하는 사람을 찾고 싶은 욕망. 이 세가지 영역에서 문제를 해결하는 서비스를 만든다면 많은 사람들이 기꺼이 돈을 낼 거에요.</span></li>\r\n\t\t\t\t\t\t\t\t<p style=\"font-family:Tahoma;margin-top:12pt;margin-bottom:12pt\"><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#1a1a1a\">&#160;</span></p>\r\n\t\t\t\t\t\t\t\t<p style=\"font-family:Tahoma;margin-top:12pt;margin-bottom:6.8pt\"><span style=\"font-family:Malgun Gothic;font-size:22.5pt;color:#1a1a1a\">Miss Excel (연 20억 매출)</span></p>\r\n\t\t\t\t\t\t\t\t<p style=\"font-family:Tahoma;margin-top:12pt;margin-bottom:12pt\"><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#1a1a1a;font-weight:bold\">BM : 틱톡/인스타그램의 엑셀 영상 -&gt; 홈페이지 -&gt; 뉴스레터 구독 -&gt; 강의 판매</span></p>\r\n\t\t\t\t\t\t\t\t<br />\r\n\t\t\t\t\t\t\t\t<p style=\"font-family:Tahoma;margin-top:12pt;margin-bottom:12pt\"><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#1a1a1a\">Miss Excel은 엑셀 교육 브랜드에요. 창업자 Kat은 평범한 컨설턴트였습니다. 엑셀을 매우 잘했고요. 직장 생활에 지루함을 느낀 그녀는 호기심으로 틱톡에 엑셀 영상을 올려요. 당시 틱톡은 10대들만 보는 채널이라고 여겨졌고, 엑셀과 같은 교육 컨텐츠가 주목을 받을 거라는 생각은 아무도 하지 않았을 때였죠. 믿져야 본전이라는 생각으로 영상을 업로드 했습니다. 영상은 10만 조회수를 얻으며 폭발적으로 바이럴이 됩니다.</span></p>\r\n\t\t\t\t\t\t\t\t<div style=\"display:inline-block;width:480px;height:200px;background:#2d333b;border-radius:4px;margin:2px;vertical-align:top;opacity:0.4\"></div>\r\n\t\t\t\t\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt;text-align:center\"><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#1e1e23\">미스 엑셀의 틱톡 영상. 틱톡 특유의 유쾌한 바이브로 엑셀을 가르친다.</span></p>\r\n\t\t\t\t\t\t\t\t<p style=\"font-family:Tahoma;margin-top:12pt;margin-bottom:12pt\"><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#1a1a1a\">&#160;</span></p>\r\n\t\t\t\t\t\t\t\t<p style=\"font-family:Tahoma;margin-top:12pt;margin-bottom:12pt\"><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#1a1a1a\">그렇게 그녀의 미스 엑셀 인생이 시작되어요. 평범한 컨설턴트였던 그녀는 엑셀 강의로 연 20억원의 매출을 얻게 됩니다.</span></p>\r\n\t\t\t\t\t\t\t\t<p style=\"font-family:Tahoma;margin-top:12pt;margin-bottom:12pt\"><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#1a1a1a\">&#160;</span></p>\r\n\t\t\t\t\t\t\t\t<p style=\"font-family:Tahoma;margin-top:12pt;margin-bottom:12pt\"><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#1a1a1a;font-weight:bold\">[미스 엑셀의 비즈니스 구조]</span></p>\r\n\t\t\t\t\t\t\t\t<p style=\"font-family:Tahoma;margin-top:12pt;margin-bottom:12pt\"><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#1a1a1a\">미스 엑셀의 비즈니스 구조는 저스틴과 유사해요.</span></p>\r\n\t\t\t\t\t\t\t\t<p style=\"font-family:Tahoma;margin-top:12pt;margin-bottom:12pt\"><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#1a1a1a\">1) 틱톡과 인스타그램에서 숏폼을 통해 수많은 사람들에게 미스 액셀이라는 브랜드를 알려요.</span></p>\r\n\t\t\t\t\t\t\t\t<p style=\"font-family:Tahoma;margin-top:12pt;margin-bottom:12pt\"><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#1a1a1a\">2) 엑셀에 관심있는 분들이 무료 엑셀 팁을 다운로드 받도록 유도해요. 이때 이메일 정보를 받습니다.</span></p>\r\n\t\t\t\t\t\t\t\t<p style=\"font-family:Tahoma;margin-top:12pt;margin-bottom:12pt\"><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#1a1a1a\">3) 이메일 구독자들을 대상으로 자신이 운영하는 유료 엑셀 강의를 판매하고요.</span></p>\r\n\t\t\t\t\t\t\t\t<p style=\"font-family:Tahoma;margin-top:12pt;margin-bottom:12pt\"><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#1a1a1a\">4) 업무용 도구인 엑셀의 특성을 이용해 기업 계약도 굉장히 많이 진행합니다.</span></p>\r\n\t\t\t\t\t\t\t\t<div style=\"display:inline-block;width:480px;height:200px;background:#2d333b;border-radius:4px;margin:2px;vertical-align:top;opacity:0.4\"></div>\r\n\t\t\t\t\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt;text-align:center\"><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#1e1e23\">엑셀 팁을 얻기 위해 이메일 주소를 입력하도록 만들었다. 이후 이메일 구독자들에게 엑셀 강의를 판매하는 이메일이 보내진다.</span></p>\r\n\t\t\t\t\t\t\t\t<p style=\"font-family:Tahoma;margin-top:12pt;margin-bottom:12pt\"><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#1a1a1a\">&#160;</span></p>\r\n\t\t\t\t\t\t\t\t<p style=\"font-family:Tahoma;margin-top:12pt;margin-bottom:12pt\"><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#1a1a1a;font-weight:bold\">[미스 엑셀이 사용하는 노코드 도구]</span></p>\r\n\t\t\t\t\t\t\t\t<li style=\"font-family:Tahoma;margin-top:6pt;margin-bottom:6pt\"><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#1a1a1a\">온라인 강의 운영을 위한 웹사이트 : Thinkfic</span></li>\r\n\t\t\t\t\t\t\t\t<li style=\"font-family:Tahoma;margin-top:6pt;margin-bottom:6pt\"><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#1a1a1a\">SNS 랜딩 페이지 : Linktree</span></li>\r\n\t\t\t\t\t\t\t\t<li style=\"font-family:Tahoma;margin-top:6pt;margin-bottom:6pt\"><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#1a1a1a\">영상편집 : WeVideo</span></li>\r\n\t\t\t\t\t\t\t\t<li style=\"font-family:Tahoma;margin-top:6pt;margin-bottom:6pt\"><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#1a1a1a\">이메일 수집을 위한 랜딩페이지 : Flodesk</span></li>\r\n\t\t\t\t\t\t\t\t<p style=\"font-family:Tahoma;margin-top:12pt;margin-bottom:12pt\"><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#1a1a1a\">&#160;</span></p>\r\n\t\t\t\t\t\t\t\t<p style=\"font-family:Tahoma;margin-top:12pt;margin-bottom:6.8pt\"><span style=\"font-family:Malgun Gothic;font-size:22.5pt;color:#1a1a1a\">Design Joy (연 20억 매출)</span></p>\r\n\t\t\t\t\t\t\t\t<p style=\"font-family:Tahoma;margin-top:12pt;margin-bottom:12pt\"><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#1a1a1a;font-weight:bold\">BM1 : 콜드메일을 통한 클라이언트 유치 -&gt; 시스템 효율화로 혼자서 20명의 클라이언트 작업</span></p>\r\n\t\t\t\t\t\t\t\t<p style=\"font-family:Tahoma;margin-top:12pt;margin-bottom:12pt\"><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#1a1a1a;font-weight:bold\">BM2 : 트위터로 1인 비즈니스 성장기 공유 -&gt; 비즈니스를 시작하는 방법에 대한 강의 판매</span></p>\r\n\t\t\t\t\t\t\t\t<br />\r\n\t\t\t\t\t\t\t\t<p style=\"font-family:Tahoma;margin-top:12pt;margin-bottom:12pt\"><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#1a1a1a\">혼자서 운영하는 디자인 에이전시에요. 클라이언트와 가격 협상을 진행하는 다른 에이전시와 다르게&#160;</span><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#1a1a1a;font-weight:bold\">정찰제로 운영되는 것</span><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#1a1a1a\">이 특징입니다. 미팅도 갖지 않아요. 오직 텍스트로만 디자인을 요청할 수 있습니다. 미팅이 없는 대신 디자인 요청을 받으면 3일 안으로 결과물을 전달해요.&#160;</span><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#1a1a1a;font-weight:bold\">커뮤니케이션 비용을 줄이고, 작업 시간을 최대화하는 시스템</span><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#1a1a1a\">을 만든거죠.</span></p>\r\n\t\t\t\t\t\t\t\t<div style=\"display:inline-block;width:480px;height:200px;background:#2d333b;border-radius:4px;margin:2px;vertical-align:top;opacity:0.4\"></div>\r\n\t\t\t\t\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt;text-align:center\"><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#1e1e23\">디자인 조이 초기의 가격 페이지. 3년째 정찰제를 유지하고 있다.</span></p>\r\n\t\t\t\t\t\t\t\t<p style=\"font-family:Tahoma;margin-top:12pt;margin-bottom:12pt\"><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#1a1a1a\">&#160;</span></p>\r\n\t\t\t\t\t\t\t\t<p style=\"font-family:Tahoma;margin-top:12pt;margin-bottom:12pt\"><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#1a1a1a\">효율화된 시스템 덕분에 창업자 브렛은 20개의 클라이언트 작업을 혼자서 진행하고 있어요. 한명의 클라이언트는 최소 월 700만원을 지불하고요.</span></p>\r\n\t\t\t\t\t\t\t\t<div style=\"display:inline-block;width:480px;height:200px;background:#2d333b;border-radius:4px;margin:2px;vertical-align:top;opacity:0.4\"></div>\r\n\t\t\t\t\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt;text-align:center\"><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#1e1e23\">올해 10월 디자인 구독 서비스 누적 매출이 40억원을 돌파했다.</span></p>\r\n\t\t\t\t\t\t\t\t<p style=\"font-family:Tahoma;margin-top:12pt;margin-bottom:12pt\"><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#1a1a1a\">&#160;</span></p>\r\n\t\t\t\t\t\t\t\t<p style=\"font-family:Tahoma;margin-top:12pt;margin-bottom:12pt\"><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#1a1a1a\">최근에는 혼자서도 운영 가능한 에이전시를 만드는 방법에 대한 강의를 판매하면서 더 큰 수입을 만들고 있습니다. 굉장히 빠른 기간에 강의 수입이 에이전시 수입과 비슷해지고 있어요.</span></p>\r\n\t\t\t\t\t\t\t\t<div style=\"display:inline-block;width:480px;height:561px;background:#2d333b;border-radius:4px;margin:2px;vertical-align:top;opacity:0.4\"></div>\r\n\t\t\t\t\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt;text-align:center\"><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#1e1e23\">2023년 디자인 에이전시 사업의 매출은 12억원, 강의 매출은 9억 5천만원이 나오고 있다.</span></p>\r\n\t\t\t\t\t\t\t\t<p style=\"font-family:Tahoma;margin-top:12pt;margin-bottom:12pt\"><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#1a1a1a\">&#160;</span></p>\r\n\t\t\t\t\t\t\t\t<p style=\"font-family:Tahoma;margin-top:12pt;margin-bottom:12pt\"><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#1a1a1a;font-weight:bold\">[디자인 조이가 사용하는 노코드 도구]</span></p>\r\n\t\t\t\t\t\t\t\t<li style=\"font-family:Tahoma;margin-top:6pt;margin-bottom:6pt\"><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#1a1a1a\">홈페이지 : Webflow</span></li>\r\n\t\t\t\t\t\t\t\t<li style=\"font-family:Tahoma;margin-top:6pt;margin-bottom:6pt\"><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#1a1a1a\">회원가입, 로그인 기능 : Memberstack</span></li>\r\n\t\t\t\t\t\t\t\t<li style=\"font-family:Tahoma;margin-top:6pt;margin-bottom:6pt\"><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#1a1a1a\">CS 문의 : Intercom</span></li>\r\n\t\t\t\t\t\t\t\t<li style=\"font-family:Tahoma;margin-top:6pt;margin-bottom:6pt\"><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#1a1a1a\">클라이언트 미팅 조율 : Calendly</span></li>\r\n\t\t\t\t\t\t\t\t<li style=\"font-family:Tahoma;margin-top:6pt;margin-bottom:6pt\"><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#1a1a1a\">클라이언트의 디자인 요청 : Trello</span></li>\r\n\t\t\t\t\t\t\t\t<li style=\"font-family:Tahoma;margin-top:6pt;margin-bottom:6pt\"><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#1a1a1a\">이미지 작업을 위한 소스 : Unsplash, Shutterstock</span></li>\r\n\t\t\t\t\t\t\t\t<li style=\"font-family:Tahoma;margin-top:6pt;margin-bottom:6pt\"><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#1a1a1a\">온라인 강의 운영을 위한 웹사이트 : Circle</span></li>\r\n\t\t\t\t\t\t\t\t<div style=\"display:inline-block;width:480px;height:200px;background:#2d333b;border-radius:4px;margin:2px;vertical-align:top;opacity:0.4\"></div>\r\n\t\t\t\t\t\t\t\t<p style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt;text-align:center\"><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#1e1e23\">노코드 툴을 통해 직원 고용 없이 운영 효율을 최대화 하고 있다.</span></p>\r\n\t\t\t\t\t\t\t\t<p style=\"font-family:Tahoma;margin-top:12pt;margin-bottom:12pt\"><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#1a1a1a\">&#160;</span></p>\r\n\t\t\t\t\t\t\t\t<p style=\"font-family:Tahoma;margin-top:12pt;margin-bottom:12pt\"><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#1a1a1a;font-weight:bold\">브렛은 에이전시를 시작하는 사람들을 위한 마케팅 조언을 몇가지 남겼어요.</span></p>\r\n\t\t\t\t\t\t\t\t<li style=\"font-family:Tahoma;margin-top:6pt;margin-bottom:6pt\"><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#1a1a1a;font-weight:bold\">풀타임 디자이너 채용 공고를 올린 회사들에게 콜드 메일을 보내세요.&#160;</span><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#1a1a1a\">지금 채용이 시급한 회사만큼 디자이너 구독 상품을 판매하기 좋은 곳이 없습니다.</span></li>\r\n\t\t\t\t\t\t\t\t<li style=\"font-family:Tahoma;margin-top:6pt;margin-bottom:6pt\"><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#1a1a1a;font-weight:bold\">큰 규모의 디자인 에이전시에게 디자이너 구독 상품을 팔아보세요.</span><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#1a1a1a\">&#160;디자인 조이의 고객 중 절반은 다른 디자인 에이전시에요. 하청에 하청을 두는 거죠.</span></li>\r\n\t\t\t\t\t\t\t\t<li style=\"font-family:Tahoma;margin-top:6pt;margin-bottom:6pt\"><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#1a1a1a;font-weight:bold\">VC들에게 연락해보세요.</span><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#1a1a1a\">&#160;VC들은 자신이 투자한 회사들의 채용을 도와주고 싶어해요. 풀타임 디자이너를 정규직으로 고용하는 것보다 빠르게 결과물을 낼 수 있는 계약직 디자이너를 쉽게 구하기를 원할 거에요.</span></li>\r\n\t\t\t\t\t\t\t\t<p style=\"font-family:Tahoma;margin-top:12pt;margin-bottom:12pt\"><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#1a1a1a\">&#160;</span></p>\r\n\t\t\t\t\t\t\t\t<p style=\"font-family:Tahoma;margin-top:12pt;margin-bottom:6.8pt\"><span style=\"font-family:Malgun Gothic;font-size:22.5pt;color:#1a1a1a\">오늘 소개드린 1인 사업자들의 공통점을 정리해 보았습니다.</span></p>\r\n\t\t\t\t\t\t\t\t<br />\r\n\t\t\t\t\t\t\t\t<li style=\"font-family:Tahoma;margin-top:6pt;margin-bottom:6pt\"><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#1a1a1a;font-weight:bold\">Branding</span><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#1a1a1a\">&#160;: 개인을 강력하게 브랜딩 해서 마케팅 비용을 0원에 가깝게 낮추었어요.</span></li>\r\n\t\t\t\t\t\t\t\t<li style=\"font-family:Tahoma;margin-top:6pt;margin-bottom:6pt\"><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#1a1a1a;font-weight:bold\">Distribution</span><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#1a1a1a\">&#160;: 링크드인, 트위터, 틱톡과 같이 급부상하는 플랫폼을 이용해서 팬을 모았고요.</span></li>\r\n\t\t\t\t\t\t\t\t<li style=\"font-family:Tahoma;margin-top:6pt;margin-bottom:6pt\"><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#1a1a1a;font-weight:bold\">Pricing</span><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#1a1a1a\">&#160;: 팬의 1%에게 비싼 제품을 팔아서 큰 매출을 만들었습니다.</span></li>\r\n\t\t\t\t\t\t\t\t<li style=\"font-family:Tahoma;margin-top:6pt;margin-bottom:6pt\"><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#1a1a1a;font-weight:bold\">Low Expense</span><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#1a1a1a\">&#160;: 노코드 툴을 사용해서 많은 운영 업무를 자동화 했어요. 직원을 고용하지 않고 매월 200만원 이하의 금액으로 수천만원의 매출이 발생하는 비즈니스의 운영을 가능하게 했습니다.</span></li>\r\n\t\t\t\t\t\t\t\t<p style=\"font-family:Tahoma;margin-top:12pt;margin-bottom:12pt\"><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#1a1a1a\">&#160;</span></p>\r\n\t\t\t\t\t\t\t\ const CONTENT_HASH = '2c8345bd';

let cards = [];
let moving = null, resizing = null;
let selectedIdx = null, clipboardCard = null;
const GRID = 20, GAP = 14;
function snap(v) { return Math.round(v / GRID) * GRID; }

// ── Undo (Ctrl+Z) ────────────────────────────────────────────────────────────
const MAX_HISTORY = 50;
let history = [];
function snapshot() {
  syncText();
  history.push(JSON.stringify(cards));
  if (history.length > MAX_HISTORY) history.shift();
}
function undo() {
  if (!history.length) { showStatus('되돌릴 내용 없음'); return; }
  syncText();
  cards = JSON.parse(history.pop());
  renderCards();
  saveBoard();
  showStatus('↩ 되돌림');
}
function showStatus(msg) {
  const s = document.getElementById('status');
  s.textContent = msg;
  clearTimeout(showStatus._t);
  showStatus._t = setTimeout(() => { s.textContent = ''; }, 2000);
}
document.addEventListener('keydown', e => {
  const isText = document.activeElement?.contentEditable === 'true';
  if ((e.ctrlKey || e.metaKey) && e.key === 'z' && !e.shiftKey) {
    if (isText) return;
    e.preventDefault();
    undo();
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'c' && !e.shiftKey && !isText) {
    if (selectedIdx !== null && cards[selectedIdx]) {
      syncText();
      clipboardCard = JSON.parse(JSON.stringify(cards[selectedIdx]));
      showStatus('카드 복사됨');
      e.preventDefault();
    }
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'v' && !e.shiftKey && !isText) {
    if (clipboardCard) {
      e.preventDefault();
      snapshot();
      const nc = JSON.parse(JSON.stringify(clipboardCard));
      nc.x = (nc.x || 0) + 30; nc.y = (nc.y || 0) + 30;
      cards.push(nc);
      selectedIdx = cards.length - 1;
      renderCards(); saveBoard();
      showStatus('카드 붙여넣음');
    }
  }
  if (e.key === 'Escape') {
    document.querySelectorAll('.card.selected').forEach(c => c.classList.remove('selected'));
    selectedIdx = null;
  }
});

function pushCards(movedIdx) {
  const moved = cards[movedIdx];
  const movedEl = document.querySelector(`.card[data-idx="${movedIdx}"]`);
  if (!movedEl) return;
  const mh = movedEl.offsetHeight;
  document.querySelectorAll('.card').forEach(el => {
    const i = +el.dataset.idx;
    if (i === movedIdx) return;
    const c = cards[i], oh = el.offsetHeight;
    if (moved.x < (c.x+(c.w||200)) && (moved.x+(moved.w||200)) > c.x && moved.y < (c.y+oh) && (moved.y+mh) > c.y) {
      c.y = moved.y + mh + GAP;
      el.style.top = c.y + 'px';
    }
  });
}

function loadBoard() {
  const saved = localStorage.getItem(SAVE_KEY);
  const savedHash = localStorage.getItem(SAVE_KEY + ':hash');
  let parsed = null;
  try { parsed = saved ? JSON.parse(saved) : null; } catch(e) {}
  // reset if: no save, empty array, or content hash changed (page regenerated)
  if (!parsed || parsed.length === 0 || savedHash !== CONTENT_HASH) {
    cards = DEFAULT_CARDS.map(c => ({...c}));
    localStorage.removeItem(SAVE_KEY);
    localStorage.setItem(SAVE_KEY + ':hash', CONTENT_HASH);
    renderCards();
    const hasCoords = cards.some(c => c.x !== undefined && c.y !== undefined);
    if (!hasCoords) autoLayout();
    return;
  }
  cards = parsed;
  renderCards();
}
function resetToDefaults() { if (!confirm('저장된 보드를 지우고 원본으로 초기화합니다. 계속할까요?')) return; localStorage.removeItem(SAVE_KEY); cards = DEFAULT_CARDS.map(c => ({...c})); renderCards(); autoLayout(); }

function autoLayout() {
  const boardW = document.getElementById('board').offsetWidth;
  const cols = Math.max(1, Math.floor(boardW / 280));
  const colW = (boardW - GAP*(cols-1)) / cols;
  const colH = new Array(cols).fill(0);
  const allCards = document.querySelectorAll('.card');
  const images = document.querySelectorAll('.card img');
  let loaded = 0;
  function place() {
    allCards.forEach((el, i) => {
      const w = Math.min(cards[i].w || colW, colW);
      let minCol = 0;
      for (let c = 1; c < cols; c++) if (colH[c] < colH[minCol]) minCol = c;
      cards[i].x = minCol * (colW + GAP);
      cards[i].y = colH[minCol];
      cards[i].w = w;
      el.style.left = cards[i].x + 'px';
      el.style.top = cards[i].y + 'px';
      el.style.width = w + 'px';
      colH[minCol] = cards[i].y + el.offsetHeight + GAP;
    });
    document.getElementById('board').style.minHeight = (Math.max(...colH) + 100) + 'px';
    saveBoard();
  }
  if (!images.length) { requestAnimationFrame(place); return; }
  images.forEach(img => {
    if (img.complete) { loaded++; if (loaded >= images.length) requestAnimationFrame(place); }
    else { img.onload = img.onerror = () => { loaded++; if (loaded >= images.length) requestAnimationFrame(place); }; }
  });
}

function syncText() {
  document.querySelectorAll('.card').forEach(el => {
    const i = +el.dataset.idx;
    if (cards[i]?.type === 'text') { const t = el.querySelector('.text'); if (t) cards[i].content = t.innerHTML; }
  });
}
function saveBoard() { syncText(); localStorage.setItem(SAVE_KEY, JSON.stringify(cards)); localStorage.setItem(SAVE_KEY + ':hash', CONTENT_HASH); showStatus('저장됨 ' + new Date().toLocaleTimeString()); }

function renderCards() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  cards.forEach((card, i) => {
    const el = document.createElement('div');
    el.className = 'card'; el.dataset.idx = i;
    if (card.x !== undefined) el.style.left = card.x + 'px';
    if (card.y !== undefined) el.style.top = card.y + 'px';
    // html cards contain raw OneNote table HTML which may overflow the stated div width
    if (card.w) { if (card.type === 'html') el.style.minWidth = card.w + 'px'; else el.style.width = card.w + 'px'; }
    el.addEventListener('mousedown', e => {
      if (e.target.closest('.text, a, .card-btn, .resize-handle, td, th')) return;
      e.preventDefault();
      // Update selection
      document.querySelectorAll('.card.selected').forEach(c => c.classList.remove('selected'));
      selectedIdx = i; el.classList.add('selected');
      snapshot();
      moving = { idx: i, startX: e.clientX, startY: e.clientY, origX: card.x||0, origY: card.y||0 };
      el.classList.add('moving');
    });
    const actions = document.createElement('div'); actions.className = 'card-actions';
    const delBtn = document.createElement('button'); delBtn.className = 'card-btn'; delBtn.textContent = '×';
    delBtn.onclick = e => { e.stopPropagation(); if(confirm('삭제?')) { snapshot(); cards.splice(i,1); renderCards(); saveBoard(); } };
    actions.appendChild(delBtn); el.appendChild(actions);
    if (card.type === 'text') {
      const text = document.createElement('div'); text.className = 'text'; text.contentEditable = true;
      text.innerHTML = card.content || '';
      text.addEventListener('focus', () => { snapshot(); });
      text.addEventListener('blur', () => { card.content = text.innerHTML; saveBoard(); });
      el.appendChild(text);
    } else if (card.type === 'image') {
      const img = document.createElement('img');
      img.src = card.src.startsWith('http') || card.src.startsWith('data:') ? card.src : IMG_BASE + card.src;
      img.alt = ''; img.loading = 'lazy'; img.onerror = () => img.style.display = 'none';
      if (card.w) img.style.width = card.w + 'px';
      if (card.h) img.style.height = card.h + 'px';
      if (card.link) { const a = document.createElement('a'); a.href = card.link; a.target = '_blank'; a.appendChild(img); el.appendChild(a); }
      else { el.appendChild(img); }
      if (card.caption) { const cap = document.createElement('div'); cap.style.cssText = 'font-size:11px;color:#8b949e;margin-top:4px;word-break:break-word;padding:0 2px;'; cap.textContent = card.caption; el.appendChild(cap); }
    } else if (card.type === 'html') {
      const wrapper = document.createElement('div');
      wrapper.style.cssText = 'overflow:auto;font-size:13px;line-height:1.5;';
      wrapper.innerHTML = card.html.replace(/__ATTACHMENT__/g, IMG_BASE);
      wrapper.querySelectorAll('img').forEach(img => { img.style.maxWidth = '100%'; img.style.height = 'auto'; img.draggable = false; });
      wrapper.querySelectorAll('a').forEach(a => { a.target = '_blank'; a.style.color = '#6cb0f6'; });
      wrapper.querySelectorAll('table').forEach(t => { t.style.borderCollapse = 'collapse'; });
      wrapper.querySelectorAll('td,th').forEach(td => {
        td.style.border = '1px solid #444'; td.style.padding = '4px 6px'; td.style.verticalAlign = 'top';
        td.title = '더블클릭으로 편집';
        td.addEventListener('dblclick', function(e) {
          e.stopPropagation();
          snapshot();
          this.contentEditable = 'true';
          this.style.outline = '2px solid #388bfd';
          this.style.background = 'rgba(56,139,253,0.08)';
          this.focus();
        });
        td.addEventListener('blur', function() {
          this.contentEditable = 'false';
          this.style.outline = '';
          this.style.background = '';
          cards[i].html = wrapper.innerHTML.split(IMG_BASE).join('__ATTACHMENT__');
          saveBoard();
        });
      });
      el.appendChild(wrapper);
    } else if (card.type === 'table') {
      const rows = card.rows || [['','',''],['','',''],['','','']];
      const tbl = document.createElement('table');
      tbl.style.cssText = 'border-collapse:collapse;width:100%;font-size:13px;';
      rows.forEach((row, ri) => {
        const tr = tbl.insertRow();
        row.forEach((cell, ci) => {
          const td = document.createElement(ri === 0 ? 'th' : 'td');
          td.contentEditable = true;
          td.style.cssText = 'border:1px solid #30363d;padding:4px 8px;min-width:60px;text-align:left;' + (ri===0 ? 'background:#21262d;font-weight:600;' : '');
          td.textContent = cell;
          td.addEventListener('blur', () => { if (!cards[i].rows) cards[i].rows = rows; rows[ri][ci] = td.textContent; saveBoard(); });
          tr.appendChild(td);
        });
      });
      el.appendChild(tbl);
      const addRow = document.createElement('button');
      addRow.textContent = '+ 행'; addRow.style.cssText = 'margin-top:4px;font-size:11px;background:#21262d;border:1px solid #30363d;color:#8b949e;padding:2px 8px;border-radius:4px;cursor:pointer;';
      addRow.onclick = e => { e.stopPropagation(); snapshot(); if (!cards[i].rows) cards[i].rows = rows; cards[i].rows.push(new Array(cards[i].rows[0].length).fill('')); renderCards(); saveBoard(); };
      const addCol = document.createElement('button');
      addCol.textContent = '+ 열'; addCol.style.cssText = 'margin-top:4px;margin-left:4px;font-size:11px;background:#21262d;border:1px solid #30363d;color:#8b949e;padding:2px 8px;border-radius:4px;cursor:pointer;';
      addCol.onclick = e => { e.stopPropagation(); snapshot(); if (!cards[i].rows) cards[i].rows = rows; cards[i].rows.forEach(r => r.push('')); renderCards(); saveBoard(); };
      el.appendChild(addRow); el.appendChild(addCol);
    }
    const rh = document.createElement('div'); rh.className = 'resize-handle';
    rh.addEventListener('mousedown', e => { e.preventDefault(); e.stopPropagation(); snapshot(); resizing = { idx: i, startX: e.clientX, startW: card.w || el.offsetWidth }; });
    el.appendChild(rh);
    if (i === selectedIdx) el.classList.add('selected');
    board.appendChild(el);
  });
  requestAnimationFrame(() => {
    let maxB = 0;
    document.querySelectorAll('.card').forEach(el => { const b = (parseFloat(el.style.top)||0) + el.offsetHeight; if (b > maxB) maxB = b; });
    board.style.minHeight = (maxB + 100) + 'px';
  });
}

document.addEventListener('mousemove', e => {
  if (moving) {
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`); if (!el) return;
    let nx = moving.origX + e.clientX - moving.startX, ny = moving.origY + e.clientY - moving.startY;
    if (e.shiftKey) { nx = snap(nx); ny = snap(ny); el.style.outline = '1px dashed rgba(240,192,64,0.3)'; } else { el.style.outline = ''; }
    el.style.left = nx + 'px'; el.style.top = ny + 'px';
  }
  if (resizing) {
    let nw = resizing.startW + e.clientX - resizing.startX; if (e.shiftKey) nw = snap(nw);
    cards[resizing.idx].w = Math.max(100, nw);
    const el = document.querySelector(`.card[data-idx="${resizing.idx}"]`); if (el) el.style.width = cards[resizing.idx].w + 'px';
  }
});

document.addEventListener('mouseup', e => {
  if (moving) {
    let nx = moving.origX + e.clientX - moving.startX, ny = moving.origY + e.clientY - moving.startY;
    if (e.shiftKey) { nx = snap(nx); ny = snap(ny); }
    cards[moving.idx].x = Math.max(0, nx); cards[moving.idx].y = Math.max(0, ny);
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`); if (el) { el.classList.remove('moving'); el.style.outline = ''; }
    if (e.shiftKey) pushCards(moving.idx);
    moving = null; saveBoard();
  }
  if (resizing) { if (e.shiftKey) pushCards(resizing.idx); resizing = null; saveBoard(); }
});

function addTextCard() { snapshot(); cards.push({ type: 'text', content: '', x: 50, y: window.scrollY+100, w: 300 }); renderCards(); setTimeout(() => { const els = document.querySelectorAll('.card .text'); els[els.length-1]?.focus(); }, 100); }
function addImageCard() { const input = document.createElement('input'); input.type = 'file'; input.accept = 'image/*'; input.onchange = e => { const f = e.target.files[0]; if (!f) return; const r = new FileReader(); r.onload = () => { snapshot(); cards.push({ type: 'image', src: r.result, x: 50, y: window.scrollY+100, w: 240 }); renderCards(); saveBoard(); }; r.readAsDataURL(f); }; input.click(); }
function addImageUrl() { const url = prompt('이미지 URL'); if (!url) return; snapshot(); cards.push({ type: 'image', src: url, x: 50, y: window.scrollY+100, w: 240 }); renderCards(); saveBoard(); }
function addTableCard() {
  const colsStr = prompt('열 수 (기본 3)', '3'); const cols = Math.max(1, parseInt(colsStr)||3);
  const rowsStr = prompt('행 수 (헤더 포함, 기본 4)', '4'); const rows = Math.max(1, parseInt(rowsStr)||4);
  snapshot();
  cards.push({ type: 'table', rows: Array.from({length: rows}, (_, ri) => Array.from({length: cols}, (_, ci) => ri===0 ? `열${ci+1}` : '')), x: 50, y: window.scrollY+100, w: Math.max(240, cols*100) });
  renderCards(); saveBoard();
}
function exportBoard() { syncText(); const blob = new Blob([JSON.stringify(cards, null, 2)], { type: 'application/json' }); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = SAVE_KEY + '.json'; a.click(); }
// ── Zoom ─────────────────────────────────────────────────────────────────────
let zoom = parseFloat(localStorage.getItem('zoom-' + SAVE_KEY) || '1.0');
function applyZoom() {
  const board = document.getElementById('board');
  board.style.transform = `scale(${zoom})`;
  board.style.transformOrigin = '0 0';
  document.getElementById('zoom-level').textContent = Math.round(zoom * 100) + '%';
  localStorage.setItem('zoom-' + SAVE_KEY, zoom);
}
function zoomIn()  { zoom = Math.min(3.0, parseFloat((zoom + 0.1).toFixed(2))); applyZoom(); }
function zoomOut() { zoom = Math.max(0.2, parseFloat((zoom - 0.1).toFixed(2))); applyZoom(); }
document.addEventListener('keydown', e => {
  if (e.ctrlKey || e.metaKey) {
    if (e.key === '=' || e.key === '+') { e.preventDefault(); zoomIn(); }
    if (e.key === '-')                  { e.preventDefault(); zoomOut(); }
    if (e.key === '0')                  { e.preventDefault(); zoom = 1.0; applyZoom(); }
  }
});
document.getElementById('board').addEventListener('wheel', e => {
  if (!(e.ctrlKey || e.metaKey)) return;
  e.preventDefault();
  e.deltaY < 0 ? zoomIn() : zoomOut();
}, { passive: false });
applyZoom();
function resetLayout() { if (!confirm('자동 재배치합니다.')) return; cards.forEach(c => { delete c.x; delete c.y; }); renderCards(); autoLayout(); }
// ── Floating format toolbar ───────────────────────────────────────────────────
const fmtBar = document.getElementById('format-toolbar');
function fmt(cmd) { document.execCommand(cmd, false, null); saveBoard(); }
function fmtLink() {
  const sel = window.getSelection();
  if (!sel || sel.isCollapsed) return;
  const url = prompt('링크 URL 입력', 'https://');
  if (!url) return;
  document.execCommand('createLink', false, url);
  // make links open in new tab
  sel.anchorNode?.parentElement?.closest('a')?.setAttribute('target', '_blank');
  document.querySelectorAll('.text a').forEach(a => a.target = '_blank');
  saveBoard();
}

// prevent format buttons from blurring contenteditable
fmtBar.addEventListener('mousedown', e => e.preventDefault());

document.addEventListener('selectionchange', () => {
  const sel = window.getSelection();
  if (!sel || sel.isCollapsed || !sel.toString().trim()) { fmtBar.style.display = 'none'; return; }
  // only show if selection is inside a .text element
  const anchor = sel.anchorNode;
  if (!anchor) { fmtBar.style.display = 'none'; return; }
  const textEl = anchor.nodeType === 1 ? anchor.closest('.text') : anchor.parentElement?.closest('.text');
  if (!textEl) { fmtBar.style.display = 'none'; return; }
  // position above selection
  const range = sel.getRangeAt(0);
  const rect = range.getBoundingClientRect();
  fmtBar.style.display = 'flex';
  const tbW = fmtBar.offsetWidth || 180;
  let left = rect.left + rect.width / 2 - tbW / 2;
  left = Math.max(8, Math.min(left, window.innerWidth - tbW - 8));
  fmtBar.style.left = left + 'px';
  fmtBar.style.top = (rect.top - 44 + window.scrollY) + 'px';
});

setInterval(saveBoard, 30000);
loadBoard();
</script>
</body>
</html>
