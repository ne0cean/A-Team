const DEFAULT_CARDS = [

    "content": "<a href=\"http://www.looah.com/article/view/1953\">http://www.looah.com/article/view/1953</a> 제프 베조스\n<a href=\"http://www.itooza.com/common/iview.php?no=2010111510313179887\">http://www.itooza.com/common/iview.php?no=2010111510313179887</a>"
  },
  {
    "type": "text",
    "x": 48,
    "y": 263,
    "w": 600,
    "content": "1997 LETTER TO SHAREHOLDERS (by Jeff Bezos)\n주주들에게 보내는 공개서한 (1997년, 제프 베조스)\nTo our shareholders:\n주주 여러분께\nAmazon.com passed many milestones in 1997: by year-end, we had served more than 1.5 million customers, yielding 838% revenue growth to $147.8 million, and extended our market leadership despite aggressive competitive entry.\n1997년, 아마존닷컴은 많은 성과를 이루었습니다. 연말이면 아마존의 고객 수가 150만 명을 돌파합니다. 작년보다 838% 증가한 14억 7,800만 불의 매출을 올릴 것이며 어려운 경쟁 상황을 이겨내고 시장의 지배력을 확대해나갈 것입니다.\nBut this is Day 1 for the Internet and, if we execute well, for Amazon.com. Today, online commerce saves customers money and precious time. Tomorrow, through personalization, online commerce will accelerate the very process of discovery. Amazon.com uses the Internet to create real value for its customers and, by doing so, hopes to create an enduring franchise, even in established and large markets.\n하지만, 어쩌면 지금은 고작 첫 번째 날에 불과할는지도 모릅니다. 인터넷 세계에도 그렇고 (저희가 잘하고 있다면) 아마존에게도 말이죠. 오늘날, 온라인 커머스는 고객들의 소중한 돈과 시간을 아껴주고 있습니다. 내일이면, 개인별 맞춤 서비스를 통해 온라인 커머스는 '발견'의 과정을 더욱 빠르게 만들어 줄 수 있을 것입니다. 아마존은 고객들에게 실질적인 가치를 제공해주기 위해 인터넷을 이용합니다. 그렇게 함으로써, 판매망은 만들어지고 유지될 수 있습니다. 이는 이미 성숙한 큰 시장에서도 마찬가지이죠.\nWe have a window of opportunity as larger players marshal the resources to pursue the online opportunity and as customers, new to purchasing online, are receptive to forming new relationships. The competitive landscape has continued to evolve at a fast pace. Many large players have moved online with credible offerings and have devoted substantial energy and resources to building awareness, traffic, and sales. Our goal is to move quickly to solidify and extend our current position while we begin to pursue the online commerce opportunities in other areas. We see substantial opportunity in the large markets we are targeting. This strategy is not without risk: it requires serious investment and crisp execution against established franchise leaders.\n우리는 좋은 기회에 마주하고 있습니다. 대형 사업자들은 온라인에서의 기회를 찾기 위해 자원을 투입하고 있습니다. 소비자들은 온라인에서의 구매와 새로운 관계를 만들어나가기 시작했습니다. 이 경쟁 구도는 빠르게 진행되고 있습니다. 많은 대형 사업자들이 온라인 사업의 비중을 본격적으로 늘리고 있으며, 엄청난 에너지와 자원을 브랜드 인지도나 트래픽, 매출을 만들어내기 위해 쏟아붓고 있습니다. ￼￼우리의 목표는 보다 빨리 움직여 시장을 선점하고 현재의 위치를 더 확장하는 것과 동시에 다른 사업영역에서도 온라인 커머스의 기회를 발굴하는 것입니다. 우리가 바라보고 있는 큰 시장에는 막대한 기회가 있습니다. 리스크가 없으리라고 생각하지는 않습니다. 기존 사업자들에 대항하기 위해서는 대규모의 투자와 빠른 실행이 필요합니다.\nIt’s All About the Long Term\n모든 전략은 장기 관점입니다.\nWe believe that a fundamental measure of our success will be the shareholder value we create over the long term. This value will be a direct result of our ability to extend and solidify our current market leadership position. The stronger our market leadership, the more powerful our economic model. Market leadership can translate directly to higher revenue, higher profitability, greater capital velocity, and correspondingly stronger returns on invested capital.\n우리가 이룬 성공을 측정할 수 있는 근본적인 방법은, 우리가 추가적으로 창출해내는 장기적인 주주가치라고 믿습니다. 이 가치는 시장을 확대하고 기존 시장의 지배력을 공고히 하는 능력을 바로 나타내줄 수 있을 것입니다. 시장에서의 지배력이 강력할 수록, 우리의 비즈니스 모델은 강력할 것입니다. 시장 지배력은 높은 매출, 높은 수익성, 더 빠른 자본유통속도(capital velocity) 그리고 이에 상응한- 투자 대비한 더 높은 수익을 말해줄 것입니다.\nOur decisions have consistently reflected this focus. We first measure ourselves in terms of the metrics most indicative of our market leadership: customer and revenue growth, the degree to which our customers continue to purchase from us on a repeat basis, and the strength of our brand. We have invested and will continue to invest aggressively to expand and leverage our customer base, brand, and infrastructure as we move to establish an enduring franchise.\n우리의 결정은, 일관되게 이 곳에 집중되어 있습니다. 우리는 우리의 시장 지배력을 가장 잘 보여줄 수 있는 지표를 우선적으로 측정합니다: 고객과 매출의 성장, 우리로부터의 구매가 얼마나 반복적으로 이루어지는가, 그리고 브랜드의 가치. 우리는 영속적인 사업을 만들어나가기 위해 고객 베이스, 브랜드와 인프라의 확대에 공격적으로 투자해왔고 앞으로도 그리해 나갈 것입니다.\nBecause of our emphasis on the long term, we may make decisions and weigh tradeoffs differently than some companies. Accordingly, we want to share with you our fundamental management and decision-making approach so that you, our shareholders, may confirm that it is consistent with your investment philosophy:\n장기 관점을 강조하기 때문에, 가끔 다른 기업들과는 다른 방식의 의사결정을 하기도 할 것입니다. 따라서 우리는 기본적인 경영 방식과 의사결정의 과정을 다음과 같이 공유드립니다. 주주 여러분께서는 여러분의 투자 철학과 우리의 방식이 일치하는지 아실 수 있을 것입니다.\n• We will continue to focus relentlessly on our customers.\n- 우리는 끊임없이 치열하게 고객에게 계속해서 집중할 것입니다.\n• We will continue to make investment decisions in light of long-term market leadership considerations rather than short-term profitability considerations or short-term Wall Street reactions.\n- 우리는 단기수익성이라든지 증권가의 반응을 신경쓰기보다는, 장기적인 시장 지배력 강화의 관점에서 투자 결정을 계속할 것입니다.\n• We will continue to measure our programs and the effectiveness of our investments analytically, to jettison those that do not provide acceptable returns, and to step up our investment in those that work best. We will continue to learn from both our successes and our failures.\n- 우리의 사업 프로그램을 측정하고 투자의 효과성을 분석하고, 유의미한 수익이 나지 않는 사업을 포기하고 성과가 좋은 사업에 투자를 늘리는 일을 계속할 것입니다. 우리는 우리의 성과 그리고 실패 모두를 통해 배우는 것을 계속할 것입니다.\n• We will make bold rather than timid investment decisions where we see a sufficient probability of gaining market leadership advantages. Some of these investments will pay off, others will not, and we will have learned another valuable lesson in either case.\n- 시장 지배력으로 인한 수익성이 충분하다고 예상될 때, 우리는 안정적이기보다는 공격적으로 투자를 할 것입니다. 어떤 투자 결정은 성공적일테고 어떤 것은 그렇지 않을테죠. 하지만 우리는 어떤 경우에서라도 가치있는 학습을 얻어나갈 것입니다.\n• When forced to choose between optimizing the appearance of our GAAP accounting and maximizing the present value of future cash flows, we’ll take the cash flows.\n- 장부상 최적의 밸런스, 그리고 미래 현금흐름의 현재가치 극대화. 이 두 가지 중에 골라야 한다면 우리는 현금흐름을 택할 것입니다.\n• We will share our strategic thought processes with you when we make bold choices (to the extent competitive pressures allow), so that you may evaluate for yourselves whether we are making rational long-term leadership investments.\n- 경쟁이 치열한 어딘가로 진출한다거나 하는 무언가 큰 결정을 내려야 할 때, 우리의 전략적 사고과정을 공유하도록 하겠습니다. 장기 관점에서 우리가 투자결정을 잘 하고 있는지 여러분도 판단하실 수 있도록.\n• We will work hard to spend wisely and maintain our lean culture. We understand the importance of continually reinforcing a cost-conscious culture, particularly in a business incurring net losses.\n- 우리는 린(Lean) 문화를 위해 현명하고 치열하게 노력할 것입니다. 우리는 저비용을 지향하는 문화를 지속적으로 강조할 계획입니다. 특히 순손실이 발생할 수 있는 비즈니스에서는요.\n• We will balance our focus on growth with emphasis on long-term profitability and capital management. At this stage, we choose to prioritize growth because we believe that scale is central to achieving the potential of our business model.\n- 사업의 집중에 있어 성장을 통한 장기수익성과 현금흐름관리라는 두 가지를 균형있게 가져가려고 합니다. 단 지금은 우리의 사업모델을 성장시키는 데 규모가 중요하다고 믿고 있어서 성장에 우선순위를 두고 있습니다.\n• We will continue to focus on hiring and retaining versatile and talented employees, and continue to weight their compensation to stock options rather than cash. We know our success will be largely affected by our ability to attract and retain a motivated employee base, each of whom must think like, and therefore must actually be, an owner.\n- 다재다능하고 유능한 직원들을 채용하고 유지하는데 계속적으로 집중할 것이며 보상책의 일환으로 급여보다는 스톡옵션을 활용할 계획입니다. 우리는 우리의 성공이라는 것이 열정넘치는 직원들을 얼마나 끌어들이고 붙잡아둘 수 있느냐에 영향을 받는다고 생각합니다. 그 직원들은 반드시 주인처럼 생각, 아니 실제로 주인이어야 하겠죠.\nWe aren’t so bold as to claim that the above is the “right” investment philosophy, but it’s ours, and we would be remiss if we weren’t clear in the approach we have taken and will continue to take.\n우리는 위의 내용들이 '옳은' 투자철학이라고 주장할 만큼 무모하지는 않습니다. 하지만 우리의 철학입니다. 그리고 만약 우리가 지금까지 지켜왔고 앞으로 지켜갈 이 접근법에 대해 명확하게 알고 있지 않다면, 아무것도 아니겠지요.\nWith this foundation, we would like to turn to a review of our business focus, our progress in 1997, and our outlook for the future.\n이러한 기반 하에, 우리가 집중하고 있는 사업에 대해 한 번 돌아보고, 1997년의 성과와 미래에 대한 전망을 다뤄보고자 합니다.\nObsess Over Customers\n고객에 대한 집착\nFrom the beginning, our focus has been on offering our customers compelling value. We realized that the Web was, and still is, the World Wide Wait. Therefore, we set out to offer customers something they simply could not get any other way, and began serving them with books. We brought them much more selection than was possible in a physical store (our store would now occupy 6 football fields), and presented it in a useful, easy-to-search, and easy-to-browse format in a store open 365 days a year, 24 hours a day. We maintained a dogged focus on improving the shopping experience, and in 1997 substantially enhanced our store. We now offer customers gift certificates, 1-ClickSMshopping, and vastly more reviews, content, browsing options, and recommendation features. We dramatically lowered prices, further increasing customer value. Word of mouth remains the most powerful customer acquisition tool we have, and we are grateful for the trust our customers have placed in us. Repeat purchases and word of mouth have combined to make Amazon.com the market leader in online bookselling.\n처음부터 우리의 관심은 고객들에게 거부할 수 없을 가치를 제공해주는 것이었습니다. 우리는 웹(Web)이라는 것이 예전에도 그랬고 지금도, 월드 와이드 웨이트(World Wide Wait)라는 것을 알게되었죠. 따라서 우리는 고객들에게 아주 간단하게 무언가를 얻을 수 있는 새로운 방법을 제공하고자 했고, 책으로부터 시작했습니다. 우린 고객들에게 그 어떤 서점에서보다 더 많은 책을 고를 수 있도록 해주었고(우리 서점은 아마 6개의 축구장을 합친 규모일겁니다) 유용하고, 검색하기도 탐색하기도 쉬운 형태로 1년 365일, 하루 24시간 서비스하고 있습니다. 쇼핑 경험을 개선하기위해 치열하게 집중했고, 1997년 유의미한 개선을 이루어낼 수 있었습니다.￼￼우리는 상품권 및 한번의 클릭으로 결제를 할 수 있도록 하며, 수 많은 상품리뷰와 컨텐츠, 검색 옵션과 추천 기능을 제공하고 있습니다. 상품 가격을 말도 안되게 낮추었고, 이는 고객 가치의 증대로 이어졌습니다. 고객 간의 입소문은 여전히 우리가 신규 고객을 유치하는 가장 강력한 방법입니다. (우리에게 보내주시는 고객 여러분의 신뢰는 정말 감사하죠.) 반복구매와 구전효과가 결합되어, 아마존은 온라인서점의 지배적인 사업자가 되었습니다.\nBy many measures, Amazon.com came a long way in 1997:\n여러가지 지표로 볼 때, 아마존은 1997년 많은 성공을 이루었습니다.\n• Sales grew from $15.7 million in 1996 to $147.8 million – an 838% increase.\n- 1996년 1,570만불이었던 매출은 1억 4,780만불로 증가했습니다. - 838% 증가\n• Cumulative customer accounts grew from 180,000 to 1,510,000 – a 738% increase.\n- 누적 고객 수는 18만 명에서 151만 명으로 늘어났습니다. - 738% 증가\n• The percentage of orders from repeat customers grew from over 46% in the fourth quarter of 1996 to over 58% in the same period in 1997.\n- 재방문 고객의 구매비율 역시 1996년 4분기 46%였는데, 1997년 동기에는 58%로 증가했습니다.\n• In terms of audience reach, per Media Metrix, our Web site went from a rank of 90th to within the top 20.\n- 미디어메트릭스에 따른 사이트 접속자 통계에서, 아마존닷컴은 90위였다가 20위권으로 진입했습니다.\n• We established long-term relationships with many important strategic partners, including America Online, Yahoo!, Excite, Netscape, GeoCities, AltaVista, @Home, and Prodigy.\n- 아메리카온라인, 야후!, 익사이트, 넷스케이프, 지오시티, 알타비스타, 앳홈, 프로디지를 포함한 수 많은 전략적인 파트너들과 장기적인 관계를 구축했습니다.\nInfrastructure\n인프라\nDuring 1997, we worked hard to expand our business infrastructure to support these greatly increased traffic, sales, and service levels:\n1997년, 우리는 열심히 노력했고 증가하는 트래픽, 매출, 향상된 서비스 수준을 감당할 수 있을 만큼의 사업적 인프라를 확대했습니다.\n• Amazon.com’s employee base grew from 158 to 614, and we significantly strengthened our management team.\n- 아마존의 임직원은 158명에서 614명으로 늘었습니다. 그리고 경영진의 역량도 크게 강화되었습니다.\n• Distribution center capacity grew from 50,000 to 285,000 square feet, including a 70% expansion of our Seattle facilities and the launch of our second distribution center in Delaware in November.\n- 물류센터도 5만 평방피트에서 28만 5천 피트로 커졌습니다. 시애틀의 설비가 70% 커졌고, 두 번째 물류센터가 11월에 델라웨어에 생겼습니다.\n• Inventories rose to over 200,000 titles at year-end, enabling us to improve availability for our customers.\n- 연말까지 20만 타이틀을 보유하게 되었습니다. 고객들에게 더 많은 책을 서비스할 수 있게 되었죠.\n• Our cash and investment balances at year-end were $125 million, thanks to our initial public offering in May 1997 and our $75 million loan, affording us substantial strategic flexibility.\n- 연말 당시 현금 및 투자잔고은 1억 2,500만불이었습니다. 1997년 5월의 첫 번째 공개거래와 7,500만불의 융자 덕분에 전략적으로 충분한 유동성을 확보하고 있습니다.\nOur Employees\n직원들\nThe past year’s success is the product of a talented, smart, hard-working group, and I take great pride in being a part of this team. Setting the bar high in our approach to hiring has been, and will continue to be, the single most important element of Amazon.com’s success.\n지난 날의 성공은 유능하고 똑똑하며 열심히 일하는 팀이 만들어낸 제품이었고, 저는 그 팀의 일원임을 진심으로 자랑스럽게 생각합니다. 채용은 아마존의 성공의 가장 그리고 유일한 성공 요건이며, 그래서 채용의 기준은 지금까지 그래왔듯 앞으로도 높은 수준을 유지할 것입니다.\nIt’s not easy to work here (when I interview people I tell them, “You can work long, hard, or smart, but at Amazon.com you can’t choose two out of three”), but we are working to build something important, something that matters to our customers, something that we can all tell our grandchildren about. Such things aren’t meant to be easy. We are incredibly fortunate to have this group of dedicated employees whose sacrifices and passion build Amazon.com.\n아마존에서 일하는 것은 쉽지 않습니다. (저는 채용면접을 할 때 이렇게 말하곤 합니다. '당신은 오래 아니면 열심히 아니면 영리하게 일할 수 있겠지만 아마존에서는 셋 모두를 해야합니다') 하지만 우리는 무언가 중요한 것, 고객에게 중요한 무엇, 우리의 손자들에게 자랑스레 말할 수 있는 무엇을 만들어가고 있습니다. 그런 일들은 쉬운 일이 아니죠. 아마존을 만들기 위해 희생하고 열정을 갖는 헌신적인 이들이 모인 팀에 제가 속할 수 있다는 점은 정말 행운입니다.\nGoals for 1998\n1998년의 목표\nWe are still in the early stages of learning how to bring new value to our customers through Internet commerce and merchandising. Our goal remains to continue to solidify and extend our brand and customer base. This requires sustained investment in systems and infrastructure to support outstanding customer convenience, selection, and service while we grow. We are planning to add music to our product offering, and over time we believe that other products may be prudent investments. We also believe there are significant opportunities to better serve our customers overseas, such as reducing delivery times and better tailoring the customer experience. To be certain, a big part of the challenge for us will lie not in finding new ways to expand our business, but in prioritizing our investments.\n아직 우리는 인터넷 커머스와 머천다이징을 통해 어떻게 고객에게 새로운 가치를 제공해줄 수 있을지를 배워가는 초기 단계에 있습니다. 우리의 목표는 여전히 우리의 브랜드와 고객베이스를 늘리고 굳건히 하는데 있습니다. 우리가 성장하는 만큼 고객의 편의성과 선택권, 서비스를 제대로 전달하기 위한 체계와 인프라에 투자를 계속해야 합니다. 우리는 우리 제품군에 음악을 추가하려고 합니다. 그리고 앞으로 다른 제품군에 대한 신중한 투자가 이루어져야 할 것이라 생각합니다. 배송 기간을 줄인다거나 사용자 경험을 개선하는 등 해외의 고객들에 대한 사업에도 큰 기회가 있을 것이라 믿습니다. 단언코, 사업을 어떤 방법으로 확장할지를 찾는 것이 우리의 주요 과제는 아닐 것입니다. 우리의 투자를 전략적으로 우선순위화하는 것이겠죠.\nWe now know vastly more about online commerce than when Amazon.com was founded, but we still have so much to learn. Though we are optimistic, we must remain vigilant and maintain a sense of urgency. The challenges and hurdles we will face to make our long-term vision for Amazon.com a reality are several: aggressive, capable, well-funded competition; considerable growth challenges and execution risk; the risks of product and geographic expansion; and the need for large continuing investments to meet an expanding market opportunity. However, as we’ve long said, online bookselling, and online commerce in general, should prove to be a very large market, and it’s likely that a number of companies will see significant benefit. We feel good about what we’ve done, and even more excited about what we want to do.\n아마존이 처음 설립되었을 때보다 온라인의 커머스에 대해 훨씬 많은 것을 알게 되었습니다. 하지만 배워야 할 것은 너무나 더 많습니다. 우리는 꽤 낙관적이지만, 방심하지 않을 것이며 속도를 늦추지 않을 것입니다. 아마존의 장기적 비전을 현실로 만들기 위해 마주칠 과제나 장벽은 여럿 있을 것입니다: 공격적이고 유능하며 자금을 갖춘 경쟁; 점점 커지는 도전과제와 실행 리스크; 제품 및 지역 확장에 대한 리스크; 사업기회의 확장을 위한 크고 지속적인 투자니즈 등. ￼￼하지만, 그간 말해왔듯. 온라인의 서적 판매 그리고 온라인에서의 커머스는 아주 커다란 시장이 될 것이며 많은 회사들이 막대한 이익을 거둘 수 있을 것입니다. 지금까지 우리가 해왔던 것을 생각하면 기분이 좋습니다. 하지만 우리가 앞으로 하고자 하는 것을 생각하면 더욱 짜릿합니다.\n1997 was indeed an incredible year. We at Amazon.com are grateful to our customers for their business and trust, to each other for our hard work, and to our shareholders for their support and encouragement.\n1997년은 실로 엄청난 한 해였습니다. 고객 여러분이 보내주신 신뢰와 지지, 열심히 일해준 많은 분들, 그리고 지지해주시고 격려해주신 주주 여러분들께, 아마존은 감사의 말씀을 전합니다."

const CONTENT_HASH = 'b534edae';

let cards = [];
let moving = null, resizing = null;
let selectedIdx = null, clipboardCard = null;
const GRID = 20, GAP = 14;
function snap(v) { return Math.round(v / GRID) * GRID; }

// ── Undo (Ctrl+Z) ────────────────────────────────────────────────────────────
const MAX_HISTORY = 50;
let history = [];
function snapshot() {
  syncText();
  history.push(JSON.stringify(cards));
  if (history.length > MAX_HISTORY) history.shift();
}
function undo() {
  if (!history.length) { showStatus('되돌릴 내용 없음'); return; }
  syncText();
  cards = JSON.parse(history.pop());
  renderCards();
  saveBoard();
  showStatus('↩ 되돌림');
}
function showStatus(msg) {
  const s = document.getElementById('status');
  s.textContent = msg;
  clearTimeout(showStatus._t);
  showStatus._t = setTimeout(() => { s.textContent = ''; }, 2000);
}
document.addEventListener('keydown', e => {
  const isText = document.activeElement?.contentEditable === 'true';
  if ((e.ctrlKey || e.metaKey) && e.key === 'z' && !e.shiftKey) {
    if (isText) return;
    e.preventDefault();
    undo();
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'c' && !e.shiftKey && !isText) {
    if (selectedIdx !== null && cards[selectedIdx]) {
      syncText();
      clipboardCard = JSON.parse(JSON.stringify(cards[selectedIdx]));
      showStatus('카드 복사됨');
      e.preventDefault();
    }
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'v' && !e.shiftKey && !isText) {
    if (clipboardCard) {
      e.preventDefault();
      snapshot();
      const nc = JSON.parse(JSON.stringify(clipboardCard));
      nc.x = (nc.x || 0) + 30; nc.y = (nc.y || 0) + 30;
      cards.push(nc);
      selectedIdx = cards.length - 1;
      renderCards(); saveBoard();
      showStatus('카드 붙여넣음');
    }
  }
  if (e.key === 'Escape') {
    document.querySelectorAll('.card.selected').forEach(c => c.classList.remove('selected'));
    selectedIdx = null;
  }
});

function pushCards(movedIdx) {
  const moved = cards[movedIdx];
  const movedEl = document.querySelector(`.card[data-idx="${movedIdx}"]`);
  if (!movedEl) return;
  const mh = movedEl.offsetHeight;
  document.querySelectorAll('.card').forEach(el => {
    const i = +el.dataset.idx;
    if (i === movedIdx) return;
    const c = cards[i], oh = el.offsetHeight;
    if (moved.x < (c.x+(c.w||200)) && (moved.x+(moved.w||200)) > c.x && moved.y < (c.y+oh) && (moved.y+mh) > c.y) {
      c.y = moved.y + mh + GAP;
      el.style.top = c.y + 'px';
    }
  });
}

function loadBoard() {
  const saved = localStorage.getItem(SAVE_KEY);
  const savedHash = localStorage.getItem(SAVE_KEY + ':hash');
  let parsed = null;
  try { parsed = saved ? JSON.parse(saved) : null; } catch(e) {}
  // reset if: no save, empty array, or content hash changed (page regenerated)
  if (!parsed || parsed.length === 0 || savedHash !== CONTENT_HASH) {
    cards = DEFAULT_CARDS.map(c => ({...c}));
    localStorage.removeItem(SAVE_KEY);
    localStorage.setItem(SAVE_KEY + ':hash', CONTENT_HASH);
    renderCards();
    const hasCoords = cards.some(c => c.x !== undefined && c.y !== undefined);
    if (!hasCoords) autoLayout();
    return;
  }
  cards = parsed;
  renderCards();
}
function resetToDefaults() { if (!confirm('저장된 보드를 지우고 원본으로 초기화합니다. 계속할까요?')) return; localStorage.removeItem(SAVE_KEY); cards = DEFAULT_CARDS.map(c => ({...c})); renderCards(); autoLayout(); }

function autoLayout() {
  const boardW = document.getElementById('board').offsetWidth;
  const cols = Math.max(1, Math.floor(boardW / 280));
  const colW = (boardW - GAP*(cols-1)) / cols;
  const colH = new Array(cols).fill(0);
  const allCards = document.querySelectorAll('.card');
  const images = document.querySelectorAll('.card img');
  let loaded = 0;
  function place() {
    allCards.forEach((el, i) => {
      const w = Math.min(cards[i].w || colW, colW);
      let minCol = 0;
      for (let c = 1; c < cols; c++) if (colH[c] < colH[minCol]) minCol = c;
      cards[i].x = minCol * (colW + GAP);
      cards[i].y = colH[minCol];
      cards[i].w = w;
      el.style.left = cards[i].x + 'px';
      el.style.top = cards[i].y + 'px';
      el.style.width = w + 'px';
      colH[minCol] = cards[i].y + el.offsetHeight + GAP;
    });
    document.getElementById('board').style.minHeight = (Math.max(...colH) + 100) + 'px';
    saveBoard();
  }
  if (!images.length) { requestAnimationFrame(place); return; }
  images.forEach(img => {
    if (img.complete) { loaded++; if (loaded >= images.length) requestAnimationFrame(place); }
    else { img.onload = img.onerror = () => { loaded++; if (loaded >= images.length) requestAnimationFrame(place); }; }
  });
}

function syncText() {
  document.querySelectorAll('.card').forEach(el => {
    const i = +el.dataset.idx;
    if (cards[i]?.type === 'text') { const t = el.querySelector('.text'); if (t) cards[i].content = t.innerHTML; }
  });
}
function saveBoard() { syncText(); localStorage.setItem(SAVE_KEY, JSON.stringify(cards)); localStorage.setItem(SAVE_KEY + ':hash', CONTENT_HASH); showStatus('저장됨 ' + new Date().toLocaleTimeString()); }

function renderCards() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  cards.forEach((card, i) => {
    const el = document.createElement('div');
    el.className = 'card'; el.dataset.idx = i;
    if (card.x !== undefined) el.style.left = card.x + 'px';
    if (card.y !== undefined) el.style.top = card.y + 'px';
    // html cards contain raw OneNote table HTML which may overflow the stated div width
    if (card.w) { if (card.type === 'html') el.style.minWidth = card.w + 'px'; else el.style.width = card.w + 'px'; }
    el.addEventListener('mousedown', e => {
      if (e.target.closest('.text, a, .card-btn, .resize-handle, td, th')) return;
      e.preventDefault();
      // Update selection
      document.querySelectorAll('.card.selected').forEach(c => c.classList.remove('selected'));
      selectedIdx = i; el.classList.add('selected');
      snapshot();
      moving = { idx: i, startX: e.clientX, startY: e.clientY, origX: card.x||0, origY: card.y||0 };
      el.classList.add('moving');
    });
    const actions = document.createElement('div'); actions.className = 'card-actions';
    const delBtn = document.createElement('button'); delBtn.className = 'card-btn'; delBtn.textContent = '×';
    delBtn.onclick = e => { e.stopPropagation(); if(confirm('삭제?')) { snapshot(); cards.splice(i,1); renderCards(); saveBoard(); } };
    actions.appendChild(delBtn); el.appendChild(actions);
    if (card.type === 'text') {
      const text = document.createElement('div'); text.className = 'text'; text.contentEditable = true;
      text.innerHTML = card.content || '';
      text.addEventListener('focus', () => { snapshot(); });
      text.addEventListener('blur', () => { card.content = text.innerHTML; saveBoard(); });
      el.appendChild(text);
    } else if (card.type === 'image') {
      const img = document.createElement('img');
      img.src = card.src.startsWith('http') || card.src.startsWith('data:') ? card.src : IMG_BASE + card.src;
      img.alt = ''; img.loading = 'lazy'; img.onerror = () => img.style.display = 'none';
      if (card.w) img.style.width = card.w + 'px';
      if (card.h) img.style.height = card.h + 'px';
      if (card.link) { const a = document.createElement('a'); a.href = card.link; a.target = '_blank'; a.appendChild(img); el.appendChild(a); }
      else { el.appendChild(img); }
      if (card.caption) { const cap = document.createElement('div'); cap.style.cssText = 'font-size:11px;color:#8b949e;margin-top:4px;word-break:break-word;padding:0 2px;'; cap.textContent = card.caption; el.appendChild(cap); }
    } else if (card.type === 'html') {
      const wrapper = document.createElement('div');
      wrapper.style.cssText = 'overflow:auto;font-size:13px;line-height:1.5;';
      wrapper.innerHTML = card.html.replace(/__ATTACHMENT__/g, IMG_BASE);
      wrapper.querySelectorAll('img').forEach(img => { img.style.maxWidth = '100%'; img.style.height = 'auto'; img.draggable = false; });
      wrapper.querySelectorAll('a').forEach(a => { a.target = '_blank'; a.style.color = '#6cb0f6'; });
      wrapper.querySelectorAll('table').forEach(t => { t.style.borderCollapse = 'collapse'; });
      wrapper.querySelectorAll('td,th').forEach(td => {
        td.style.border = '1px solid #444'; td.style.padding = '4px 6px'; td.style.verticalAlign = 'top';
        td.title = '더블클릭으로 편집';
        td.addEventListener('dblclick', function(e) {
          e.stopPropagation();
          snapshot();
          this.contentEditable = 'true';
          this.style.outline = '2px solid #388bfd';
          this.style.background = 'rgba(56,139,253,0.08)';
          this.focus();
        });
        td.addEventListener('blur', function() {
          this.contentEditable = 'false';
          this.style.outline = '';
          this.style.background = '';
          cards[i].html = wrapper.innerHTML.split(IMG_BASE).join('__ATTACHMENT__');
          saveBoard();
        });
      });
      el.appendChild(wrapper);
    } else if (card.type === 'table') {
      const rows = card.rows || [['','',''],['','',''],['','','']];
      const tbl = document.createElement('table');
      tbl.style.cssText = 'border-collapse:collapse;width:100%;font-size:13px;';
      rows.forEach((row, ri) => {
        const tr = tbl.insertRow();
        row.forEach((cell, ci) => {
          const td = document.createElement(ri === 0 ? 'th' : 'td');
          td.contentEditable = true;
          td.style.cssText = 'border:1px solid #30363d;padding:4px 8px;min-width:60px;text-align:left;' + (ri===0 ? 'background:#21262d;font-weight:600;' : '');
          td.textContent = cell;
          td.addEventListener('blur', () => { if (!cards[i].rows) cards[i].rows = rows; rows[ri][ci] = td.textContent; saveBoard(); });
          tr.appendChild(td);
        });
      });
      el.appendChild(tbl);
      const addRow = document.createElement('button');
      addRow.textContent = '+ 행'; addRow.style.cssText = 'margin-top:4px;font-size:11px;background:#21262d;border:1px solid #30363d;color:#8b949e;padding:2px 8px;border-radius:4px;cursor:pointer;';
      addRow.onclick = e => { e.stopPropagation(); snapshot(); if (!cards[i].rows) cards[i].rows = rows; cards[i].rows.push(new Array(cards[i].rows[0].length).fill('')); renderCards(); saveBoard(); };
      const addCol = document.createElement('button');
      addCol.textContent = '+ 열'; addCol.style.cssText = 'margin-top:4px;margin-left:4px;font-size:11px;background:#21262d;border:1px solid #30363d;color:#8b949e;padding:2px 8px;border-radius:4px;cursor:pointer;';
      addCol.onclick = e => { e.stopPropagation(); snapshot(); if (!cards[i].rows) cards[i].rows = rows; cards[i].rows.forEach(r => r.push('')); renderCards(); saveBoard(); };
      el.appendChild(addRow); el.appendChild(addCol);
    }
    const rh = document.createElement('div'); rh.className = 'resize-handle';
    rh.addEventListener('mousedown', e => { e.preventDefault(); e.stopPropagation(); snapshot(); resizing = { idx: i, startX: e.clientX, startW: card.w || el.offsetWidth }; });
    el.appendChild(rh);
    if (i === selectedIdx) el.classList.add('selected');
    board.appendChild(el);
  });
  requestAnimationFrame(() => {
    let maxB = 0;
    document.querySelectorAll('.card').forEach(el => { const b = (parseFloat(el.style.top)||0) + el.offsetHeight; if (b > maxB) maxB = b; });
    board.style.minHeight = (maxB + 100) + 'px';
  });
}

document.addEventListener('mousemove', e => {
  if (moving) {
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`); if (!el) return;
    let nx = moving.origX + e.clientX - moving.startX, ny = moving.origY + e.clientY - moving.startY;
    if (e.shiftKey) { nx = snap(nx); ny = snap(ny); el.style.outline = '1px dashed rgba(240,192,64,0.3)'; } else { el.style.outline = ''; }
    el.style.left = nx + 'px'; el.style.top = ny + 'px';
  }
  if (resizing) {
    let nw = resizing.startW + e.clientX - resizing.startX; if (e.shiftKey) nw = snap(nw);
    cards[resizing.idx].w = Math.max(100, nw);
    const el = document.querySelector(`.card[data-idx="${resizing.idx}"]`); if (el) el.style.width = cards[resizing.idx].w + 'px';
  }
});

document.addEventListener('mouseup', e => {
  if (moving) {
    let nx = moving.origX + e.clientX - moving.startX, ny = moving.origY + e.clientY - moving.startY;
    if (e.shiftKey) { nx = snap(nx); ny = snap(ny); }
    cards[moving.idx].x = Math.max(0, nx); cards[moving.idx].y = Math.max(0, ny);
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`); if (el) { el.classList.remove('moving'); el.style.outline = ''; }
    if (e.shiftKey) pushCards(moving.idx);
    moving = null; saveBoard();
  }
  if (resizing) { if (e.shiftKey) pushCards(resizing.idx); resizing = null; saveBoard(); }
});

function addTextCard() { snapshot(); cards.push({ type: 'text', content: '', x: 50, y: window.scrollY+100, w: 300 }); renderCards(); setTimeout(() => { const els = document.querySelectorAll('.card .text'); els[els.length-1]?.focus(); }, 100); }
function addImageCard() { const input = document.createElement('input'); input.type = 'file'; input.accept = 'image/*'; input.onchange = e => { const f = e.target.files[0]; if (!f) return; const r = new FileReader(); r.onload = () => { snapshot(); cards.push({ type: 'image', src: r.result, x: 50, y: window.scrollY+100, w: 240 }); renderCards(); saveBoard(); }; r.readAsDataURL(f); }; input.click(); }
function addImageUrl() { const url = prompt('이미지 URL'); if (!url) return; snapshot(); cards.push({ type: 'image', src: url, x: 50, y: window.scrollY+100, w: 240 }); renderCards(); saveBoard(); }
function addTableCard() {
  const colsStr = prompt('열 수 (기본 3)', '3'); const cols = Math.max(1, parseInt(colsStr)||3);
  const rowsStr = prompt('행 수 (헤더 포함, 기본 4)', '4'); const rows = Math.max(1, parseInt(rowsStr)||4);
  snapshot();
  cards.push({ type: 'table', rows: Array.from({length: rows}, (_, ri) => Array.from({length: cols}, (_, ci) => ri===0 ? `열${ci+1}` : '')), x: 50, y: window.scrollY+100, w: Math.max(240, cols*100) });
  renderCards(); saveBoard();
}
function exportBoard() { syncText(); const blob = new Blob([JSON.stringify(cards, null, 2)], { type: 'application/json' }); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = SAVE_KEY + '.json'; a.click(); }
// ── Zoom ─────────────────────────────────────────────────────────────────────
let zoom = parseFloat(localStorage.getItem('zoom-' + SAVE_KEY) || '1.0');
function applyZoom() {
  const board = document.getElementById('board');
  board.style.transform = `scale(${zoom})`;
  board.style.transformOrigin = '0 0';
  document.getElementById('zoom-level').textContent = Math.round(zoom * 100) + '%';
  localStorage.setItem('zoom-' + SAVE_KEY, zoom);
}
function zoomIn()  { zoom = Math.min(3.0, parseFloat((zoom + 0.1).toFixed(2))); applyZoom(); }
function zoomOut() { zoom = Math.max(0.2, parseFloat((zoom - 0.1).toFixed(2))); applyZoom(); }
document.addEventListener('keydown', e => {
  if (e.ctrlKey || e.metaKey) {
    if (e.key === '=' || e.key === '+') { e.preventDefault(); zoomIn(); }
    if (e.key === '-')                  { e.preventDefault(); zoomOut(); }
    if (e.key === '0')                  { e.preventDefault(); zoom = 1.0; applyZoom(); }
  }
});
document.getElementById('board').addEventListener('wheel', e => {
  if (!(e.ctrlKey || e.metaKey)) return;
  e.preventDefault();
  e.deltaY < 0 ? zoomIn() : zoomOut();
}, { passive: false });
applyZoom();
function resetLayout() { if (!confirm('자동 재배치합니다.')) return; cards.forEach(c => { delete c.x; delete c.y; }); renderCards(); autoLayout(); }
// ── Floating format toolbar ───────────────────────────────────────────────────
const fmtBar = document.getElementById('format-toolbar');
function fmt(cmd) { document.execCommand(cmd, false, null); saveBoard(); }
function fmtLink() {
  const sel = window.getSelection();
  if (!sel || sel.isCollapsed) return;
  const url = prompt('링크 URL 입력', 'https://');
  if (!url) return;
  document.execCommand('createLink', false, url);
  // make links open in new tab
  sel.anchorNode?.parentElement?.closest('a')?.setAttribute('target', '_blank');
  document.querySelectorAll('.text a').forEach(a => a.target = '_blank');
  saveBoard();
}

// prevent format buttons from blurring contenteditable
fmtBar.addEventListener('mousedown', e => e.preventDefault());

document.addEventListener('selectionchange', () => {
  const sel = window.getSelection();
  if (!sel || sel.isCollapsed || !sel.toString().trim()) { fmtBar.style.display = 'none'; return; }
  // only show if selection is inside a .text element
  const anchor = sel.anchorNode;
  if (!anchor) { fmtBar.style.display = 'none'; return; }
  const textEl = anchor.nodeType === 1 ? anchor.closest('.text') : anchor.parentElement?.closest('.text');
  if (!textEl) { fmtBar.style.display = 'none'; return; }
  // position above selection
  const range = sel.getRangeAt(0);
  const rect = range.getBoundingClientRect();
  fmtBar.style.display = 'flex';
  const tbW = fmtBar.offsetWidth || 180;
  let left = rect.left + rect.width / 2 - tbW / 2;
  left = Math.max(8, Math.min(left, window.innerWidth - tbW - 8));
  fmtBar.style.left = left + 'px';
  fmtBar.style.top = (rect.top - 44 + window.scrollY) + 'px';
});

setInterval(saveBoard, 30000);
loadBoard();
</script>
</body>
