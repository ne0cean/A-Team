>\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-family:맑은 고딕;margin-top:0pt;margin-bottom:0pt\">300<span lang=\"ko-KR\">개의</span> <span lang=\"ko-KR\">아이디어를</span> ##<span lang=\"ko-KR\">까지</span> <span lang=\"ko-KR\">내고</span>, <span lang=\"ko-KR\">결정</span></p>\r\n\t\t\t\t<p style=\"font-family:맑은 고딕;margin-top:0pt;margin-bottom:0pt\">그리고<span lang=\"en-US\"> </span>유저<span lang=\"en-US\"> </span>스터디<span lang=\"en-US\">. </span>동료<span lang=\"en-US\"> </span>구하기</p>\r\n\t\t\t\t<p style=\"font-family:맑은 고딕;margin-top:0pt;margin-bottom:0pt\">나는<span lang=\"en-US\"> </span>세상이<span lang=\"en-US\"> </span>더<span lang=\"en-US\"> </span>나아지게<span lang=\"en-US\"> </span>하는<span lang=\"en-US\"> </span>방법에는<span lang=\"en-US\"> </span>두<span lang=\"en-US\"> </span>가지가<span lang=\"en-US\"> </span>있다고<span lang=\"en-US\"> </span>믿는다<span lang=\"en-US\">.</span></p>\r\n\t\t\t\t<p style=\"font-family:맑은 고딕;margin-top:0pt;margin-bottom:0pt\">하나는<span lang=\"en-US\"> </span>더<span lang=\"en-US\"> </span>많은<span lang=\"en-US\"> </span>선행이<span lang=\"en-US\"> </span>행해지는<span lang=\"en-US\"> </span>것이고<span lang=\"en-US\">,</span></p>\r\n\t\t\t\t<p style=\"font-family:맑은 고딕;margin-top:0pt;margin-bottom:0pt\">다른<span lang=\"en-US\"> </span>하나는<span lang=\"en-US\"> </span>세상이<span lang=\"en-US\"> </span>더<span lang=\"en-US\"> </span>나빠지지<span lang=\"en-US\"> </span>않도록<span lang=\"en-US\"> </span>하는데<span lang=\"en-US\"> </span>있다<span lang=\"en-US\">.</span></p>\r\n\t\t\t\t<p style=\"font-family:맑은 고딕;margin-top:0pt;margin-bottom:0pt\">세상은<span lang=\"en-US\"> </span>우리가<span lang=\"en-US\"> </span>살기<span lang=\"en-US\"> </span>좋아지도록<span lang=\"en-US\"> </span>노력하는<span lang=\"en-US\"> </span>것<span lang=\"en-US\"> </span>보다</p>\r\n\t\t\t\t<p style=\"font-family:맑은 고딕;margin-top:0pt;margin-bottom:0pt\">어쩌면<span lang=\"en-US\"> </span>더<span lang=\"en-US\"> </span>빠른<span lang=\"en-US\"> </span>속도로<span lang=\"en-US\"> </span>나빠지고<span lang=\"en-US\"> </span>있고<span lang=\"en-US\">. -US\">, </span>고객으로부터<span lang=\"en-US\"> </span>학습<span lang=\"en-US\">, </span>이<span lang=\"en-US\"> </span>순환을<span lang=\"en-US\"> </span>점차<span lang=\"en-US\"> </span>빠르게<span lang=\"en-US\"> </span>가속화<span lang=\"en-US\">.</span></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:맑은 고딕;margin-top:0pt;margin-bottom:0pt\">ㅇ<span lang=\"en-US\"> </span>플랫폼<span lang=\"en-US\"> </span>비즈<span lang=\"en-US\"> </span>시작<span lang=\"en-US\"> </span>단계에서<span lang=\"en-US\"> </span>필요한<span lang=\"en-US\"> 5</span>가지</p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-family:맑은 고딕;margin-top:0pt;margin-bottom:0pt\">1) <span lang=\"ko-KR\">대상</span> <span lang=\"ko-KR\">고객</span> 2) <span lang=\"ko-KR\">혁신</span> <span lang=\"ko-KR\">대상</span> <span lang=\"ko-KR\">경쟁자</span> 3) <span lang=\"ko-KR\">차별화</span> <span lang=\"ko-KR\">가치</span> 4) <span lang=\"ko-KR\">초기</span> <span lang=\"ko-KR\">파트너</span> 5) <span lang=\"ko-KR\">초기</span> <span lang=\"ko-KR\">자본금</span></p>\r\n\t\t\t\t<p style=\"font-family:맑은 고딕;margin-top:0pt;margin-bottom:0pt\">경쟁자가<span lang=\"en-US\"> </span>없다는<span lang=\"en-US\"> </span>것은<span lang=\"en-US\"> </span>조사를<span lang=\"en-US\"> </span>충분히<span lang=\"en-US\"> </span>하지<span lang=\"en-US\"> </span>않았거나<span lang=\"en-US\">, </span>시장<span lang=\"en-US\">(</span>받아들일<span lang=\"en-US\"> </span>고객<span lang=\"en-US\">)</span>이<span lang=\"en-US\"> </span>없다는<span lang=\"en-US\"> </span>의미일<span lang=\"en-US\"> </span>수<span lang=\"en-US\"> </span>있으니<span lang=\"en-US\"> </span>주의<span lang=\"en-US\"> </span>필요</p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:맑은 고딕;margin-top:0pt;margin-bottom:0pt\">차별화<span lang=\"en-US\"> </span>가치를<span lang=\"en-US\"> </span>제시<span lang=\"en-US\"> </span>할<span lang=\"en-US\"> </span>때에는<span lang=\"en-US\"> </span>아주<span lang=\"en-US\"> </span>간결하고<span lang=\"en-US\"> </span>명확하게<span lang=\"en-US\"> </span>표현할<span lang=\"en-US\"> </span>수<span lang=\"en-US\"> </span>있어야함<span lang=\"en-US\">.</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-family:맑은 고딕;margin-top:0pt;margin-bottom:0pt\">3<span lang=\"ko-KR\">단어로</span> 30<span lang=\"ko-KR\">초간</span> <span lang=\"ko-KR\">설명</span>, 3<span lang=\"ko-KR\">분의</span> <span lang=\"ko-KR\">추가</span> <span lang=\"ko-KR\">설명으로</span> <span lang=\"ko-KR\">사업의</span> <span lang=\"ko-KR\">본질을</span> <span lang=\"ko-KR\">간명하게</span> <span lang=\"ko-KR\">표현할</span> <span lang=\"ko-KR\">수</span> <span lang=\"ko-KR\">있어야</span> <span lang=\"ko-KR\">함</span>.</p>\r\n\t\t\t\t<p style=\"font-family:맑은 고딕;margin-top:0pt;margin-bottom:0pt\">그렇지<span lang=\"en-US\"> </span>못한<span lang=\"en-US\"> </span>다는<span lang=\"en-US\"> </span>것은<span lang=\"en-US\"> BM</span>이<span lang=\"en-US\"> </span>명쾌하지<span lang=\"en-US\"> </span>않다는<span lang=\"en-US\"> </span>의미임<span lang=\"en-US\">.</span></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:맑은 고딕;margin-top:0pt;margin-bottom:0pt\">남들이<span lang=\"en-US\"> </span>모르는<span lang=\"en-US\"> </span>것<span lang=\"en-US\"> </span>을<span lang=\"en-US\"> </span>잘<span lang=\"en-US\"> </span>알고</p>\r\n\t\t\t\t<p style=\"font-family:맑은 고딕;margin-top:0pt;margin-bottom:0pt\">남들이<span lang=\"en-US\"> </span>잘<span lang=\"en-US\"> </span>못하는<span lang=\"en-US\"> </span>것을<span lang=\"en-US\"> </span>잘하면</p>\r\n\t\t\t\t<p style=\"font-family:맑은 고딕;margin-top:0pt;margin-bottom:0pt\">그게<span lang=\"en-US\"> </span>경쟁력<span lang=\"en-US\">.</span></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:맑은 고딕;margin-top:0pt;margin-bottom:0pt\">첫째. 생계유지와 좋아하는 것을 분리하는 법이다. 먼저 먹고 사는 문제부터 해결하라. 그리고 내가 좋아하는 일을 그 외의 시간에 하는 것이다.</p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:맑은 고딕;margin-top:0pt;margin-bottom:0pt\">둘째. 좋아하는 것을 끝까지 하며 버티는 법이다. 좋아하는 것이 돈이 되는 방법이 하나 있다. 끝까지 버티는 것이다. 그래서 전문가의 경지에 오르는 순간 돈은 들어오기 시작한다.</p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<br />\r\n\t\t\t\t<br />\r\n\t\t\t\t<p data-tag=\"to-do\" style=\"font-family:맑은 고딕;margin-top:0pt;margin-bottom:0pt\">뜨레들로<span lang=\"en-US\">, </span>캡틴캔디</p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-family:맑은 고딕;margin-top:0pt;margin-bottom:0pt\">IPTV <span lang=\"ko-KR\">딜러</span> <span lang=\"ko-KR\">효율화</span>? <span lang=\"ko-KR\">혁신</span>?</p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-family:맑은 고딕;margin-top:0pt;margin-bottom:0pt\">스타트업 아이디어를 발견하는 최고의 방법은 자기 자신에게 “나는 다른 사람이 나를 위해 무엇을 만들어줬으면 좋겠는가?”를 묻는 것이다.</p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-family:맑은 고딕;margin-top:0pt;margin-bottom:0pt\">이러한 ‘문제’를 발견하기 위해, 어쩌면 당신은 스스로를 제 3자의 입장에서 바라볼 필요가 있을 것이다. 왜냐하면 당신이 이미 그 부족한 부분들에 익숙해져 그것들을 당연시 하고 있을 가능성이 높기 때문이다.</p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-family:맑은 고딕;margin-top:0pt;margin-bottom:0pt\"><a href=\"http://www.jimmyrim.com/m/160\">http://www.jimmyrim.com/m/160</a></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-family:맑은 고딕;margin-top:0pt;margin-bottom:0pt\">T<span lang=\"ko-KR\">페이로</span> <span lang=\"ko-KR\">자주타는</span> <span lang=\"ko-KR\">버스</span> <span lang=\"ko-KR\">트래킹</span> - <span lang=\"ko-KR\">그</span> <span lang=\"ko-KR\">버스가</span> <span lang=\"ko-KR\">언제오고</span>, <span lang=\"ko-KR\">지금</span> <span lang=\"ko-KR\">위치에서</span> <span lang=\"ko-KR\">언제</span> <span lang=\"ko-KR\">출발해야</span> <span lang=\"ko-KR\">하는지</span> <span lang=\"ko-KR\">알림</span> </p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:맑은 고딕;margin-top:0pt;margin-bottom:0pt\">노력과<span lang=\"en-US\"> </span>시간과<span lang=\"en-US\"> </span>나이는<span lang=\"en-US\"> </span>하나도<span lang=\"en-US\"> </span>중요하지<span lang=\"en-US\"> </span>않다<span lang=\"en-US\">. </span>중요한건<span lang=\"en-US\"> </span>운<span lang=\"en-US\">. </span>타이밍이다<span lang=\"en-US\">.</span></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:맑은 고딕;margin-top:0pt;margin-bottom:0pt\">중요한건<span lang=\"en-US\">, </span>무슨<span lang=\"en-US\"> </span>문제를<span lang=\"en-US\">. </span>얼마나<span lang=\"en-US\"> </span>큰< family:맑은 고딕;margin-top:0pt;margin-bottom:0pt\">일과 이 것을 반복한다.</p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-family:맑은 고딕;margin-top:0pt;margin-bottom:0pt\">이 것이,</p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-family:맑은 고딕;margin-top:0pt;margin-bottom:0pt\">내 삶의 끝이어야 하는 걸까?</p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-family:맑은 고딕;margin-top:0pt;margin-bottom:0pt\">이게 전부인가?</p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-family:맑은 고딕;margin-top:0pt;margin-bottom:0pt\">내가 살수 있는 삶의 한계일까?</p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:맑은 고딕;margin-top:0pt;margin-bottom:0pt\">실은<span lang=\"en-US\"> 어쩌면 이런 생각을 들</span>킬까<span lang=\"en-US\"> 가장 두려운 것은</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-family:맑은 고딕;margin-top:0pt;margin-bottom:0pt\">내일도 하루를 성실하고 치열하게 살아갈 </p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-family:맑은 고딕;margin-top:0pt;margin-bottom:0pt\">나 자신일지 모른다.</p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-family:맑은 고딕;margin-top:0pt;margin-bottom:0pt\">그래 오랜만에,</p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-family:맑은 고딕;margin-top:0pt;margin-bottom:0pt\">그래 오년만에</p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-family:맑은 고딕;margin-top:0pt;margin-bottom:0pt\">내게, 네게 다시 묻는다.</p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-family:맑은 고딕;margin-top:0pt;margin-bottom:0pt\">2015년의 너, 김준영은</p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-family:맑은 고딕;margin-top:0pt;margin-bottom:0pt\">왜, 살고 있나.</p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:맑은 고딕;margin-top:0pt;margin-bottom:0pt\">코딩을<span lang=\"en-US\"> </span>할줄아는<span lang=\"en-US\"> </span>마케터<span lang=\"en-US\"> = </span>그로스<span lang=\"en-US\"> </span>해커가<span lang=\"en-US\"> </span>되어야<span lang=\"en-US\"> </span>한다<span lang=\"en-US\">.</span></p>\r\n\t\t\t\t<p style=\"font-family:맑은 고딕;margin-top:0pt;margin-bottom:0pt\">그로서<span lang=\"en-US\"> </span>해커는<span lang=\"en-US\"> </span>마케팅을<span lang=\"en-US\"> </span>마케터ㅏ<span lang=\"en-US\"> </span>해야<span lang=\"en-US\"> </span>하는<span lang=\"en-US\"> </span>일이<span lang=\"en-US\"> </span>아니고<span lang=\"en-US\"> </span>제품<span lang=\"en-US\"> </span>자체게<span lang=\"en-US\"> </span>구축되어야<span lang=\"en-US\"> </span>하는<span lang=\"en-US\"> </span>것으로<span lang=\"en-US\"> </span>본다<span lang=\"en-US\">.</span></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:맑은 고딕;margin-top:0pt;margin-bottom:0pt\">마케터가<span lang=\"en-US\"> </span>양아치가<span lang=\"en-US\"> </span>될<span lang=\"en-US\"> </span>때가<span lang=\"en-US\"> </span>언제인지<span lang=\"en-US\"> </span>아나<span lang=\"en-US\">?</span></p>\r\n\t\t\t\t<p style=\"font-family:맑은 고딕;margin-top:0pt;margin-bottom:0pt\">그건<span lang=\"en-US\"> </span>제품이<span lang=\"en-US\"> </span>정말<span lang=\"en-US\"> </span>거지<span lang=\"en-US\"> </span>같을<span lang=\"en-US\"> </span>때<span lang=\"en-US\"> </span>이다<span lang=\"en-US\">.</span></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:맑은 고딕;margin-top:0pt;margin-bottom:0pt\">대다수<span lang=\"en-US\"> </span>아니<span lang=\"en-US\"> </span>모든<span lang=\"en-US\"> </span>마케터들이<span lang=\"en-US\"> </span></p>\r\n\t\t\t\t<p style=\"font-family:맑은 고딕;margin-top:0pt;margin-bottom:0pt\">고객들이<span lang=\"en-US\"> </span>원하는<span lang=\"en-US\"> </span>제품이<span lang=\"en-US\"> </span>아니라<span lang=\"en-US\">,</span></p>\r\n\t\t\t\t<p style=\"font-family:맑은 고딕;margin-top:0pt;margin-bottom:0pt\">자사에서<span lang=\"en-US\"> </span>만들어준<span lang=\"en-US\">, </span>가지고<span lang=\"en-US\"> </span>있는<span lang=\"en-US\"> </span>제품을<span lang=\"en-US\"> </span>들고</p>\r\n\t\t\t\t<p style=\"font-family:맑은 고딕;margin-top:0pt;margin-bottom:0pt\">시장에<span lang=\"en-US\">, </span>전선에<span lang=\"en-US\"> </span>나간다<span lang=\"en-US\">.</span></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:맑은 고딕;margin-top:0pt;margin-bottom:0pt\">쨋든<span lang=\"en-US\">, </span>팔아야<span lang=\"en-US\"> </span>하니까<span lang=\"en-US\">,</span></p>\r\n\t\t\t\t<p style const CONTENT_HASH = 'a0f7d640';

let cards = [];

const GRID = 20, GAP = 14;
function snap(v) { return Math.round(v / GRID) * GRID; }

// ── Undo (Ctrl+Z) ────────────────────────────────────────────────────────────
const MAX_HISTORY = 50;
let history = [];
function snapshot() {
  syncText();
  history.push(JSON.stringify(cards));
  if (history.length > MAX_HISTORY) history.shift();
}
function undo() {
  if (!history.length) { showStatus('되돌릴 내용 없음'); return; }
  syncText();
  cards = JSON.parse(history.pop());
  renderCards();
  saveBoard();
  showStatus('↩ 되돌림');
}
function showStatus(msg) {
  const s = document.getElementById('status');
  s.textContent = msg;
  clearTimeout(showStatus._t);
  showStatus._t = setTimeout(() => { s.textContent = ''; }, 2000);
}
document.addEventListener('keydown', e => {
  const isText = document.activeElement?.contentEditable === 'true';
  if ((e.ctrlKey || e.metaKey) && e.key === 'z' && !e.shiftKey) {
    if (isText) return;
    e.preventDefault();
    undo();
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'c' && !e.shiftKey && !isText) {
    if (selectedIdx !== null && cards[selectedIdx]) {
      syncText();
      clipboardCard = JSON.parse(JSON.stringify(cards[selectedIdx]));
      showStatus('카드 복사됨');
      e.preventDefault();
    }
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'v' && !e.shiftKey && !isText) {
    if (clipboardCard) {
      e.preventDefault();
      snapshot();
      const nc = JSON.parse(JSON.stringify(clipboardCard));
      nc.x = (nc.x || 0) + 30; nc.y = (nc.y || 0) + 30;
      cards.push(nc);
      selectedIdx = cards.length - 1;
      renderCards(); saveBoard();

    }
  }
  if (e.key === 'Escape') {
    document.querySelectorAll('.card.selected').forEach(c => c.classList.remove('selected'));
    selectedIdx = null;
  }
});

function pushCards(movedIdx) {
  const moved = cards[movedIdx];
  const movedEl = document.querySelector(`.card[data-idx="${movedIdx}"]`);
  if (!movedEl) return;
  const mh = movedEl.offsetHeight;
  document.querySelectorAll('.card').forEach(el => {
    const i = +el.dataset.idx;
    if (i === movedIdx) return;
    const c = cards[i], oh = el.offsetHeight;
    if (moved.x < (c.x+(c.w||200)) && (moved.x+(moved.w||200)) > c.x && moved.y < (c.y+oh) && (moved.y+mh) > c.y) {
      c.y = moved.y + mh + GAP;
      el.style.top = c.y + 'px';
    }
  });
}

function loadBoard() {

  const savedHash = localStorage.getItem(SAVE_KEY + ':hash');
  let parsed = null;
  try { parsed = saved ? JSON.parse(saved) : null; } catch(e) {}
  // reset if: no save, empty array, or content hash changed (page regenerated)
  if (!parsed || parsed.length === 0 || savedHash !== CONTENT_HASH) {
    cards = DEFAULT_CARDS.map(c => ({...c}));
    localStorage.removeItem(SAVE_KEY);
    localStorage.setItem(SAVE_KEY + ':hash', CONTENT_HASH);
    renderCards();
    const hasCoords = cards.some(c => c.x !== undefined && c.y !== undefined);

function autoLayout() {
  const boardW = document.getElementById('board').offsetWidth;
  const cols = Math.max(1, Math.floor(boardW / 280));
  const colW = (boardW - GAP*(cols-1)) / cols;
  const colH = new Array(cols).fill(0);
  const allCards = document.querySelectorAll('.card');
  const images = document.querySelectorAll('.card img');
  let loaded = 0;
  function place() {
    allCards.forEach((el, i) => {
      const w = Math.min(cards[i].w || colW, colW);
      let minCol = 0;
      for (let c = 1; c < cols; c++) if (colH[c] < colH[minCol]) minCol = c;
      cards[i].x = minCol * (colW + GAP);
      cards[i].y = colH[minCol];
      cards[i].w = w;
      el.style.left = cards[i].x + 'px';
      el.style.top = cards[i].y + 'px';
      el.style.width = w + 'px';
      colH[minCol] = cards[i].y + el.offsetHeight + GAP;
    });
    document.getElementById('board').style.minHeight = (Math.max(...colH) + 100) + 'px';
    saveBoard();
  }
  if (!images.length) { requestAnimationFrame(place); return; }
  images.forEach(img => {
    if (img.complete) { loaded++; if (loaded >= images.length) requestAnimationFrame(place); }
    else { img.onload = img.onerror = () => { loaded++; if (loaded >= images.length) requestAnimationFrame(place); }; }
  });
}

          td.style.cssText = 'border:1px solid #30363d;padding:4px 8px;min-width:60px;text-align:left;' + (ri===0 ? 'background:#21262d;font-weight:600;' : '');
          td.textContent = cell;
          td.addEventListener('blur', () => { if (!cards[i].rows) cards[i].rows = rows; rows[ri][ci] = td.textContent; saveBoard(); });
          tr.appendChild(td);
        });
      });
      el.appendChild(tbl);
      const addRow = document.createElement('button');
      addRow.textContent = '+ 행'; addRow.style.cssText = 'margin-top:4px;font-size:11px;background:#21262d;border:1px solid #30363d;color:#8b949e;padding:2px 8px;border-radius:4px;cursor:pointer;';
      addRow.onclick = e => { e.stopPropagation(); snapshot(); if (!cards[i].rows) cards[i].rows = rows; cards[i].rows.push(new Array(cards[i].rows[0].length).fill('')); renderCards(); saveBoard(); };
      const addCol = document.createElement('button');
      addCol.textContent = '+ 열'; addCol.style.cssText = 'margin-top:4px;margin-left:4px;font-size:11px;background:#21262d;border:1px solid #30363d;color:#8b949e;padding:2px 8px;border-radius:4px;cursor:pointer;';
      addCol.onclick = e => { e.stopPropagation(); snapshot(); if (!cards[i].rows) cards[i].rows = rows; cards[i].rows.forEach(r => r.push('')); renderCards(); saveBoard(); };
      el.appendChild(addRow); el.appendChild(addCol);
    }
    const rh = document.createElement('div'); rh.className = 'resize-handle';
    rh.addEventListener('mousedown', e => { e.preventDefault(); e.stopPropagation(); snapshot(); resizing = { idx: i, startX: e.clientX, startW: card.w || el.offsetWidth }; });
    el.appendChild(rh);
    if (i === selectedIdx) el.classList.add('selected');
    board.appendChild(el);
  });
  requestAnimationFrame(() => {
    let maxB = 0;
    document.querySelectorAll('.card').forEach(el => { const b = (parseFloat(el.style.top)||0) + el.offsetHeight; if (b > maxB) maxB = b; });
    board.style.minHeight = (maxB + 100) + 'px';
  });
}

document.addEventListener('mousemove', e => {
  if (moving) {
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`); if (!el) return;
    let nx = moving.origX + e.clientX - moving.startX, ny = moving.origY + e.clientY - moving.startY;
    if (e.shiftKey) { nx = snap(nx); ny = snap(ny); el.style.outline = '1px dashed rgba(240,192,64,0.3)'; } else { el.style.outline = ''; }
    el.style.left = nx + 'px'; el.style.top = ny + 'px';
  }
  if (resizing) {
    let nw = resizing.startW + e.clientX - resizing.startX; if (e.shiftKey) nw = snap(nw);
    cards[resizing.idx].w = Math.max(100, nw);
    const el = document.querySelector(`.card[data-idx="${resizing.idx}"]`); if (el) el.style.width = cards[resizing.idx].w + 'px';
  }
});

document.addEventListener('mouseup', e => {
  if (moving) {
    let nx = moving.origX + e.clientX - moving.startX, ny = moving.origY + e.clientY - moving.startY;
    if (e.shiftKey) { nx = snap(nx); ny = snap(ny); }
    cards[moving.idx].x = Math.max(0, nx); cards[moving.idx].y = Math.max(0, ny);
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`); if (el) { el.classList.remove('moving'); el.style.outline = ''; }
    if (e.shiftKey) pushCards(moving.idx);
    moving = null; saveBoard();
  }
  if (resizing) { if (e.shiftKey) pushCards(resizing.idx); resizing = null; saveBoard(); }
});

function addTextCard() { snapshot(); cards.push({ type: 'text', content: '', x: 50, y: window.scrollY+100, w: 300 }); renderCards(); setTimeout(() => { const els = document.querySelectorAll('.card .text'); els[els.length-1]?.focus(); }, 100); }
function addImageCard() { const input = document.createElement('input'); input.type = 'file'; input.accept = 'image/*'; input.onchange = e => { const f = e.target.files[0]; if (!f) return; const r = new FileReader(); r.onload = () => { snapshot(); cards.push({ type: 'image', src: r.result, x: 50, y: window.scrollY+100, w: 240 }); renderCards(); saveBoard(); }; r.readAsDataURL(f); }; input.click(); }
function addImageUrl() { const url = prompt('이미지 URL'); if (!url) return; snapshot(); cards.push({ type: 'image', src: url, x: 50, y: window.scrollY+100, w: 240 }); renderCards(); saveBoard(); }
function addTableCard() {
  const colsStr = prompt('열 수 (기본 3)', '3'); const cols = Math.max(1, parseInt(colsStr)||3);
  const rowsStr = prompt('행 수 (헤더 포함, 기본 4)', '4'); const rows = Math.max(1, parseInt(rowsStr)||4);
  snapshot();
  cards.push({ type: 'table', rows: Array.from({length: rows}, (_, ri) => Array.from({length: cols}, (_, ci) => ri===0 ? `열${ci+1}` : '')), x: 50, y: window.scrollY+100, w: Math.max(240, cols*100) });
  renderCards(); saveBoard();
}
function exportBoard() { syncText(); const blob = new Blob([JSON.stringify(cards, null, 2)], { type: 'application/json' }); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = SAVE_KEY + '.json'; a.click(); }
// ── Zoom ─────────────────────────────────────────────────────────────────────
let zoom = parseFloat(localStorage.getItem('zoom-' + SAVE_KEY) || '1.0');
function applyZoom() {
  const board = document.getElementById('board');
  board.style.transform = `scale(${zoom})`;
  board.style.transformOrigin = '0 0';
  document.getElementById('zoom-level').textContent = Math.round(zoom * 100) + '%';
  localStorage.setItem('zoom-' + SAVE_KEY, zoom);
}
function zoomIn()  { zoom = Math.min(3.0, parseFloat((zoom + 0.1).toFixed(2))); applyZoom(); }
function zoomOut() { zoom = Math.max(0.2, parseFloat((zoom - 0.1).toFixed(2))); applyZoom(); }
document.addEventListener('keydown', e => {
  if (e.ctrlKey || e.metaKey) {
    if (e.key === '=' || e.key === '+') { e.preventDefault(); zoomIn(); }
    if (e.key === '-')                  { e.preventDefault(); zoomOut(); }
    if (e.key === '0')                  { e.preventDefault(); zoom = 1.0; applyZoom(); }
  }
});
document.getElementById('board').addEventListener('wheel', e => {
  if (!(e.ctrlKey || e.metaKey)) return;
  e.preventDefault();
  e.deltaY < 0 ? zoomIn() : zoomOut();
}, { passive: false });
applyZoom();
function resetLayout() { if (!confirm('자동 재배치합니다.')) return; cards.forEach(c => { delete c.x; delete c.y; }); renderCards(); autoLayout(); }
// ── Floating format toolbar ───────────────────────────────────────────────────
const fmtBar = document.getElementById('format-toolbar');
function fmt(cmd) { document.execCommand(cmd, false, null); saveBoard(); }
function fmtLink() {
  const sel = window.getSelection();
  if (!sel || sel.isCollapsed) return;
  const url = prompt('링크 URL 입력', 'https://');
  if (!url) return;
  document.execCommand('createLink', false, url);
  // make links open in new tab
  sel.anchorNode?.parentElement?.closest('a')?.setAttribute('target', '_blank');
  document.querySelectorAll('.text a').forEach(a => a.target = '_blank');
  saveBoard();
}

// prevent format buttons from blurring contenteditable
fmtBar.addEventListener('mousedown', e => e.preventDefault());

document.addEventListener('selectionchange', () => {
  const sel = window.getSelection();
  if (!sel || sel.isCollapsed || !sel.toString().trim()) { fmtBar.style.display = 'none'; return; }
  // only show if selection is inside a .text element
  const anchor = sel.anchorNode;
  if (!anchor) { fmtBar.style.display = 'none'; return; }
  const textEl = anchor.nodeType === 1 ? anchor.closest('.text') : anchor.parentElement?.closest('.text');
  if (!textEl) { fmtBar.style.display = 'none'; return; }
  // position above selection
  const range = sel.getRangeAt(0);
  const rect = range.getBoundingClientRect();
  fmtBar.style.display = 'flex';
  const tbW = fmtBar.offsetWidth || 180;
  let left = rect.left + rect.width / 2 - tbW / 2;
  left = Math.max(8, Math.min(left, window.innerWidth - tbW - 8));
  fmtBar.style.left = left + 'px';
  fmtBar.style.top = (rect.top - 44 + window.scrollY) + 'px';
});

setInterval(saveBoard, 30000);
loadBoard();
</script>
</body>
</html>
