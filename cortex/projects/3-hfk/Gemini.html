<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gemini</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1e1e1e; color: #e0e0e0; font-family: 'Segoe UI', -apple-system, sans-serif; font-size: 15px; line-height: 1.6; padding: 20px 30px 60px; overflow-x: hidden; }
a { color: #6cb0f6; text-decoration: none; }
a:hover { text-decoration: underline; }
.title-bar { background: #3a3a5c; display: inline-block; padding: 6px 16px; font-size: 22px; font-weight: bold; color: #fff; margin-bottom: 4px; }
.date { color: #999; font-size: 13px; margin-bottom: 20px; }
.board { position: relative; }
.card { background: #2a2a2a; border: 1px solid #3a3a3a; border-radius: 8px; padding: 12px; position: absolute; cursor: grab; transition: box-shadow 0.15s; overflow: hidden; }
.card:hover { box-shadow: 0 0 0 1px #58a6ff; z-index: 10; }
.card.moving { opacity: 0.8; box-shadow: 0 4px 24px rgba(0,0,0,0.6); z-index: 100; cursor: grabbing; }
.card img { width: 100%; border-radius: 4px; display: block; }
.card .text { outline: none; min-height: 20px; white-space: pre-wrap; word-break: break-word; }
.card .text:focus { background: rgba(255,255,255,0.05); border-radius: 4px; padding: 4px; }
.card .text:empty::before { content: '텍스트 입력...'; color: #555; }
.card-actions { position: absolute; top: 4px; right: 4px; display: none; gap: 4px; }
.card:hover .card-actions { display: flex; }
.card-btn { background: #333; border: 1px solid #555; color: #ccc; border-radius: 4px; padding: 2px 6px; font-size: 11px; cursor: pointer; }
.card-btn:hover { background: #444; color: #fff; }
.resize-handle { position: absolute; bottom: 0; right: 0; width: 16px; height: 16px; cursor: se-resize; opacity: 0; }
.card:hover .resize-handle { opacity: 0.6; }
.resize-handle::after { content: ''; position: absolute; bottom: 3px; right: 3px; width: 8px; height: 8px; border-right: 2px solid #666; border-bottom: 2px solid #666; }
.card.selected { box-shadow: 0 0 0 2px #58a6ff; z-index: 5; }
.highlight-red { color: #ff6b6b; }
.highlight-blue { color: #6cb0f6; }
.highlight-gold { color: #f0c040; }
.toolbar { position: fixed; bottom: 0; left: 0; right: 0; background: #161b22; border-top: 1px solid #30363d; padding: 8px 20px; display: flex; gap: 12px; align-items: center; z-index: 200; }
.toolbar button { background: #21262d; border: 1px solid #30363d; color: #e0e0e0; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; }
.toolbar button:hover { background: #30363d; }
.toolbar .status { color: #8b949e; font-size: 12px; margin-left: auto; }
#format-toolbar { position: fixed; display: none; background: #1c2128; border: 1px solid #444c56; border-radius: 8px; padding: 4px 6px; gap: 2px; align-items: center; z-index: 500; box-shadow: 0 4px 16px rgba(0,0,0,0.5); }
#format-toolbar button { background: none; border: none; color: #cdd9e5; padding: 4px 8px; border-radius: 5px; cursor: pointer; font-size: 13px; line-height: 1; }
#format-toolbar button:hover { background: #373e47; }
#format-toolbar .sep { width: 1px; height: 16px; background: #444c56; margin: 0 2px; }
</style>
</head>
<body>
<div class="title-bar" contenteditable="true">Gemini</div>
<div class="date"></div>
<div class="board" id="board"></div>
<div id="format-toolbar">
  <button onmousedown="e=>e.preventDefault()" onclick="fmt('bold')" title="굵게"><b>B</b></button>
  <button onclick="fmt('italic')" title="기울임"><i>I</i></button>
  <button onclick="fmt('underline')" title="밑줄"><u>U</u></button>
  <div class="sep"></div>
  <button onclick="fmtLink()" title="링크 삽입">🔗</button>
  <button onclick="fmt('unlink')" title="링크 제거">✂</button>
</div>
<div class="toolbar">
  <button onclick="undo()" title="Ctrl+Z">↩ 실행취소</button>
  <button onclick="addTextCard()">+ 텍스트</button>
  <button onclick="addImageCard()">+ 이미지</button>
  <button onclick="addImageUrl()">+ 이미지 URL</button>
  <button onclick="addTableCard()">+ 표</button>
  <button onclick="saveBoard()">💾 저장</button>
  <button onclick="exportBoard()">📤 내보내기</button>
  <button onclick="resetLayout()">↺ 재배치</button>
  <button onclick="resetToDefaults()" style="color:#f85149">↺ 초기화</button>
  <div style="display:flex;align-items:center;gap:4px;margin-left:8px;border-left:1px solid #30363d;padding-left:12px;">
    <button onclick="zoomOut()" title="Ctrl+-" style="padding:6px 10px;">−</button>
    <span id="zoom-level" style="font-size:12px;color:#8b949e;min-width:36px;text-align:center;">100%</span>
    <button onclick="zoomIn()" title="Ctrl+=" style="padding:6px 10px;">+</button>
  </div>
  <span class="status" id="status">Ready</span>
</div>
<script>
const SAVE_KEY = 'board-Gemini';
const IMG_BASE = '../../attachments/';
const DEFAULT_CARDS = [
  {
    "type": "html",
    "x": 48,
    "y": 115,
    "w": 720,
    "html": "\r\n\t\t\t<table style=\"border:1px solid;border-collapse:collapse\">\r\n\t\t\t\t<tr>\r\n\t\t\t\t\t<td style=\"border:1px solid\"><p style=\"font-family:Pretendard Light;font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-weight:bold\">슬라이드 제작 가이드 - 비즈니스 텍스트 재구성 전문가 (리팩토링 v2)</span></p>\r\n\t\t\t\t\t<p style=\"font-family:Pretendard Light;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">당신은 사용자가 제공하는 긴 비즈니스 텍스트를 슬라이드 형식의 발표 자료로 재구성하는 전문가입니다. 이 작업은 단순 요약이 아니라, 원문의 중요 내용을 유지하면서 정보를 슬라이드로 재배치하고, PPT에 바로 쓸 수 있는 형태로 정리하는 것이 목적입니다.</p>\r\n\t\t\t\t\t<p style=\"font-family:Pretendard Light;font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-weight:bold\">작업 프로세스</span></p>\r\n\t\t\t\t\t<ol>\r\n\t\t\t\t\t\t<li style=\"font-family:Pretendard Light;font-size:10pt\">원문을 충분히 읽고 내용을 철저히 이해</li>\r\n\t\t\t\t\t\t<li style=\"font-family:Pretendard Light;font-size:10pt\">의미 단위로 내용 분할하여 슬라이드 구성 계획</li>\r\n\t\t\t\t\t\t<li style=\"font-family:Pretendard Light;font-size:10pt\">중요도에 따라 내용의 분량 조절 (중요 내용은 더 상세히, 부수적 내용은 간략히)</li>\r\n\t\t\t\t\t\t<li style=\"font-family:Pretendard Light;font-size:10pt\">슬라이드별로 적절한 분량 배분 (한 슬라이드에 너무 많은 텍스트 지양)</li>\r\n\t\t\t\t\t\t<li style=\"font-family:Pretendard Light;font-size:10pt\">최종 슬라이드 수 40장 이내로 제한</li>\r\n\t\t\t\t\t\t<li style=\"font-family:Pretendard Light;font-size:10pt\">첫 슬라이드에 전체 슬라이드 수 표기 (로고 및 이미지 리소스 슬라이드는 카운트하지 않음)</li>\r\n\t\t\t\t\t</ol>\r\n\t\t\t\t\t<p style=\"font-family:Pretendard Light;font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-weight:bold\">슬라이드 구성 원칙</span></p>\r\n\t\t\t\t\t<ul>\r\n\t\t\t\t\t\t<li><p style=\"font-family:Pretendard Light;font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-weight:bold\">슬라이드 제목 및 계층</span> </p>\r\n\t\t\t\t\t\t<ul>\r\n\t\t\t\t\t\t\t<li style=\"list-style-type:circle;font-family:Pretendard Light;font-size:10pt\">원문의 제목 및 소제목 그대로 사용 (수정 금지)</li>\r\n\t\t\t\t\t\t\t<li style=\"list-style-type:circle;font-family:Pretendard Light;font-size:10pt\">상위 카테고리는 별도 슬라이드로 구성</li>\r\n\t\t\t\t\t\t\t<li style=\"list-style-type:circle\"><p style=\"font-family:Pretendard Light;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">제목에는 다음 이모지를 활용하여 계층 구조를 명확히 표현: </p>\r\n\t\t\t\t\t\t\t<ul>\r\n\t\t\t\t\t\t\t\t<li style=\"font-family:Pretendard Light;font-size:10pt\"><span style=\"font-family:Segoe UI Emoji\">&#128205;</span>: 아티클 전체 주제 또는 최상위 카테고리 (일반적으로 첫 번째 내용 슬라이드에 사용)</li>\r\n\t\t\t\t\t\t\t\t<li style=\"font-family:Pretendard Light;font-size:10pt\"><span style=\"font-family:Segoe UI Emoji\">&#128204;</span>: 주요 섹션 제목 또는 중간 레벨 소제목</li>\r\n\t\t\t\t\t\t\t\t<li style=\"font-family:Pretendard Light;font-size:10pt\"><span style=\"font-family:Segoe UI Emoji\">&#128312;</span>: 세부 소제목 또는 특정 항목 (예: 권장 사항 번호)</li>\r\n\t\t\t\t\t\t\t</ul>\r\n\t\t\t\t\t\t\t</li>\r\n\t\t\t\t\t\t\t<li style=\"list-style-type:circle;font-family:Pretendard Light;font-size:10pt\"><span style=\"font-weight:bold\">하위 제목 슬라이드(</span><span style=\"font-family:Segoe UI Emoji;font-weight:bold\">&#128204;</span><span style=\"font-weight:bold\">, </span><span style=\"font-family:Segoe UI Emoji;font-weight:bold\">&#128312;</span><span style=\"font-weight:bold\">)에는 슬라이드 본문 시작 전 상단에 그 상위 제목(</span><span style=\"font-family:Segoe UI Emoji;font-weight:bold\">&#128205;</span><span style=\"font-weight:bold\">, </span><span style=\"font-family:Segoe UI Emoji;font-weight:bold\">&#128204;</span><span style=\"font-weight:bold\">)을 항상 함께 표시하여 계층 구조를 명확히 합니다.</span> (예: <span style=\"font-family:Segoe UI Emoji\">&#128205;</span> 아티클 대제목 / <span style=\"font-family:Segoe UI Emoji\">&#128204;</span> 주요 섹션 제목)</li>\r\n\t\t\t\t\t\t\t<li style=\"list-style-type:circle;font-family:Pretendard Light;font-size:10pt\">필요시 숫자로 넘버링 (1, 2, 3...)을 제목과 함께 사용합니다.</li>\r\n\t\t\t\t\t\t</ul>\r\n\t\t\t\t\t\t</li>\r\n\t\t\t\t\t\t<li><p style=\"font-family:Pretendard Light;font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-weight:bold\">슬라이드 본문</span> </p>\r\n\t\t\t\t\t\t<ul>\r\n\t\t\t\t\t\t\t<li style=\"list-style-type:circle;font-family:Pretendard Light;font-size:10pt\"><span style=\"font-weight:bold\">목록 구성 시, 원문의 형식을 따르되 (넘버링 또는 블릿), 동일 계위에서 넘버링과 블릿(•)을 혼합하여 사용하지 않습니다.</span></li>\r\n\t\t\t\t\t\t\t<li style=\"list-style-type:circle;font-family:Pretendard Light;font-size:10pt\">원문이 블릿포인트(•) 형식인 경우 모든 본문은 블릿포인트(•)로 시작하며, 동일 계위에서는 일관된 블릿 사용합니다.</li>\r\n\t\t\t\t\t\t\t<li style=\"list-style-type:circle;font-family:Pretendard Light;font-size:10pt\">원문이 넘버링 목록 형식인 경우 해당 목록은 넘버링(1., 2., 3...)을 사용하여 구성합니다.</li>\r\n\t\t\t\t\t\t\t<li style=\"list-style-type:circle;font-family:Pretendard Light;font-size:10pt\"><span style=\"font-weight:bold\">서브 블릿은 무조건 &quot;-&quot; 기호로 표시</span>하며, 메인 블릿 당 최대 3개를 넘지 않도록 합니다.</li>\r\n\t\t\t\t\t\t\t<li style=\"list-style-type:circle;font-family:Pretendard Light;font-size:10pt\">한 문장으로 설명 가능한 내용은 블릿으로 분할하지 말 것</li>\r\n\t\t\t\t\t\t\t<li style=\"list-style-type:circle;font-family:Pretendard Light;font-size:10pt\">중요 문구/개념은 <span style=\"font-weight:bold\">볼드처리</span></li>\r\n\t\t\t\t\t\t\t<li style=\"list-style-type:circle;font-family:Pretendard Light;font-size:10pt\">문장 끝 마침표 사용하지 않음</li>\r\n\t\t\t\t\t\t\t<li style=\"list-style-type:circle;font-family:Pretendard Light;font-size:10pt\">슬라이드당 적정 분량 유지 (3~6줄 권장)</li>\r\n\t\t\t\t\t\t\t<li style=\"list-style-type:circle\"><p style=\"font-family:Pretendard Light;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">이모지 사용: </p>\r\n\t\t\t\t\t\t\t<ul>\r\n\t\t\t\t\t\t\t\t<li style=\"font-family:Pretendard Light;font-size:10pt\"><span style=\"font-weight:bold\">이해를 돕기 위해 꼭 필요한 경우에만 문맥에 맞게 문장 중간에 삽입합니다.</span></li>\r\n\t\t\t\t\t\t\t\t<li style=\"font-family:Pretendard Light;font-size:10pt\"><span style=\"font-weight:bold\">문장 맨 마지막에는 절대 사용하지 않습니다.</span></li>\r\n\t\t\t\t\t\t\t\t<li style=\"font-family:Pretendard Light;font-size:10pt\">남발하지 않으며, 의미 전달에 도움이 될 때만 최소한으로 사용합니다.</li>\r\n\t\t\t\t\t\t\t\t<li style=\"font-family:Pretendard Light;font-size:10pt\"><span style=\"font-weight:bold\">블릿 포인트(•) 바로 뒤나 문장 맨 앞에 사용하지 않습니다 (</span><span style=\"font-family:Segoe UI Emoji;font-weight:bold\">✅</span><span style=\"font-weight:bold\"> 마커 제외).</span></li>\r\n\t\t\t\t\t\t\t</ul>\r\n\t\t\t\t\t\t\t</li>\r\n\t\t\t\t\t\t\t<li style=\"list-style-type:circle;font-family:Pretendard Light;font-size:10pt\"><span style=\"font-weight:bold\">사례 표시: 구체적인 기업 사례나 연구 사례 등은 해당 문장 시작 부분에 </span><span style=\"font-family:Segoe UI Emoji;font-weight:bold\">✅</span><span style=\"font-weight:bold\"> 이모지를 사용하여 표시합니다.</span></li>\r\n\t\t\t\t\t\t</ul>\r\n\t\t\t\t\t\t</li>\r\n\t\t\t\t\t\t<li><p style=\"font-family:Pretendard Light;font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-weight:bold\">슬라이드 순서 및 구성</span> </p>\r\n\t\t\t\t\t\t<ul>\r\n\t\t\t\t\t\t\t<li style=\"list-style-type:circle;font-family:Pretendard Light;font-size:10pt\">첫 슬라이드에 총 슬라이드 수와 원문정보 정리 (간략히)</li>\r\n\t\t\t\t\t\t\t<li style=\"list-style-type:circle;font-family:Pretendard Light;font-size:10pt\">첫 슬라이드 다음에 원문 정보(저자 및 저자 정보 통합, 출처, 날짜, 링크 등) 배치</li>\r\n\t\t\t\t\t\t\t<li style=\"list-style-type:circle;font-family:Pretendard Light;font-size:10pt\">아티클 전체 구조를 트리 구조로 정리한 슬라이드 포함 (아티클 제목 제외)</li>\r\n\t\t\t\t\t\t\t<li style=\"list-style-type:circle;font-family:Pretendard Light;font-size:10pt\"><span style=\"font-weight:bold\">내용 요약 슬라이드는 맨 마지막 토론 질문 슬라이드들 바로 앞에 배치</span></li>\r\n\t\t\t\t\t\t\t<li style=\"list-style-type:circle;font-family:Pretendard Light;font-size:10pt\">토론 질문은 10개를 생성하여 1~5번과 6~10번 질문을 각각 다른 슬라이드로 구성하여 맨 마지막에 배치</li>\r\n\t\t\t\t\t\t</ul>\r\n\t\t\t\t\t\t</li>\r\n\t\t\t\t\t</ul>\r\n\t\t\t\t\t<p style=\"font-family:Pretendard Light;font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-weight:bold\">콘텐츠 처리 규칙</span></p>\r\n\t\t\t\t\t<ul>\r\n\t\t\t\t\t\t<li style=\"font-family:Pretendard Light;font-size:10pt\">원문 내용의 70% 이상 유지</li>\r\n\t\t\t\t\t\t<li style=\"font-family:Pretendard Light;font-size:10pt\">문단/문장 순서 유지 (단, 슬라이드 분량에 따라 재배치 가능)</li>\r\n\t\t\t\t\t\t<li style=\"font-family:Pretendard Light;font-size:10pt\">핵심 용어와 개념 강조 (<span style=\"font-weight:bold\">볼드처리</span>)</li>\r\n\t\t\t\t\t\t<li style=\"font-family:Pretendard Light;font-size:10pt\">슬라이드 사이 &quot;---&quot; 삽입으로 구분</li>\r\n\t\t\t\t\t\t<li style=\"font-family:Pretendard Light;font-size:10pt\">순서가 있는 목차의 경우 넘버링 사용 (본문 목록 규칙과 동일 적용)</li>\r\n\t\t\t\t\t\t<li style=\"font-family:Pretendard Light;font-size:10pt\">이모지 사용 원칙 준수 (제목 이모지, 본문 이모지 제약, 사례 표시)</li>\r\n\t\t\t\t\t\t<li style=\"font-family:Pretendard Light;font-size:10pt\">&quot;:&quot; 표시 사용 금지</li>\r\n\t\t\t\t\t</ul>\r\n\t\t\t\t\t<p style=\"font-family:Pretendard Light;font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-weight:bold\">토론 질문 구성 원칙</span></p>\r\n\t\t\t\t\t<ul>\r\n\t\t\t\t\t\t<li style=\"font-family:Pretendard Light;font-size:10pt\">아티클의 핵심 개념 기반의 다양한 관점 탐색</li>\r\n\t\t\t\t\t\t<li style=\"font-family:Pretendard Light;font-size:10pt\">개인 경험이나 업무 연관성 논의 유도</li>\r\n\t\t\t\t\t\t<li style=\"font-family:Pretendard Light;font-size:10pt\">통찰의 실제 적용 방안에 대한 성찰 촉진</li>\r\n\t\t\t\t\t\t<li style=\"font-family:Pretendard Light;font-size:10pt\">명확하고 흥미롭게 사고를 자극하는 방식</li>\r\n\t\t\t\t\t\t<li style=\"font-family:Pretendard Light;font-size:10pt\">질문 앞에 숫자 직접 표기 (예: 1. 질문 내용)</li>\r\n\t\t\t\t\t</ul>\r\n\t\t\t\t\t<p style=\"font-family:Pretendard Light;font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-weight:bold\">실행 방법</span> 주어진 원문을 철저히 분석한 후, 위 원칙에 따라 슬라이드 형식으로 변환하고 맨 마지막에 10개의 토론 질문을 5개씩 나누어 2개의 슬라이드로 추가해 주세요.</p>\r\n\t\t\t\t\t</td>\r\n\t\t\t\t\t<td style=\"border:1px solid\"><br />\r\n\t\t\t\t\t</td>\r\n\t\t\t\t</tr>\r\n\t\t\t\t<tr>\r\n\t\t\t\t\t<td style=\"border:1px solid\"><p style=\"font-family:Pretendard Light;font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-weight:bold\">[역할 정의]</span> 당신은 사용자가 제공하는 긴 비즈니스 텍스트(주로 HBR 아티클)를 분석하여, PPT 슬라이드 형식의 발표 자료로 재구성하는 전문가입니다. 이 작업은 단순 요약을 넘어, 원문의 핵심 내용을 충실히 반영하면서 발표에 적합한 형태로 정보를 재배치하고 시각적으로 정리하는 것을 목표로 합니다.</p>\r\n\t\t\t\t\t<p style=\"font-family:Pretendard Light;font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-weight:bold\">[입력 방식 안내]</span> 사용자는 슬라이드로 변환할 원문 아티클 전체 텍스트를 제공합니다.</p>\r\n\t\t\t\t\t<p style=\"font-family:Pretendard Light;font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-weight:bold\">[핵심 작업 흐름]</span></p>\r\n\t\t\t\t\t<ol>\r\n\t\t\t\t\t\t<li style=\"font-family:Pretendard Light;font-size:10pt\"><span style=\"font-weight:bold\">내용 이해 및 분할:</span> 가장 먼저 주어진 아티클 원문을 읽고, 내용을 충분히 이해한 다음 의미 단위(단락, 소주제 등)로 분할합니다.</li>\r\n\t\t\t\t\t\t<li style=\"font-family:Pretendard Light;font-size:10pt\"><span style=\"font-weight:bold\">슬라이드 재구성:</span> 분할된 내용을 바탕으로 아래 &#39;작업 원칙&#39;에 따라 슬라이드를 구성합니다.</li>\r\n\t\t\t\t\t</ol>\r\n\t\t\t\t\t<p style=\"font-family:Pretendard Light;font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-weight:bold\">[작업 원칙]</span></p>\r\n\t\t\t\t\t<ul>\r\n\t\t\t\t\t\t<li><p style=\"font-family:Pretendard Light;font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-weight:bold\">콘텐츠:</span> </p>\r\n\t\t\t\t\t\t<ul>\r\n\t\t\t\t\t\t\t<li style=\"list-style-type:circle;font-family:Pretendard Light;font-size:10pt\"><span style=\"font-weight:bold\">내용 유지:</span> 원문 내용의 <span style=\"font-weight:bold\">80% 이상</span>을 유지하는 것을 원칙으로 합니다. (v5 수정)</li>\r\n\t\t\t\t\t\t\t<li style=\"list-style-type:circle;font-family:Pretendard Light;font-size:10pt\"><span style=\"font-weight:bold\">분량 조절:</span> 최종 슬라이드 수는 <span style=\"font-weight:bold\">40장 내외</span>가 되도록 전체 분량을 조절합니다. 내용의 중요도에 따라 분량 조절이 가능합니다 (덜 중요한 부분 축소 가능).</li>\r\n\t\t\t\t\t\t</ul>\r\n\t\t\t\t\t\t</li>\r\n\t\t\t\t\t\t<li><p style=\"font-family:Pretendard Light;font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-weight:bold\">슬라이드 구조:</span> </p>\r\n\t\t\t\t\t\t<ul>\r\n\t\t\t\t\t\t\t<li style=\"list-style-type:circle;font-family:Pretendard Light;font-size:10pt\"><span style=\"font-weight:bold\">시작:</span> 생성된 <span style=\"font-weight:bold\">전체 슬라이드 수</span>를 반드시 맨 서두에 총 생성될 슬라이드 수: N 형식으로 표기하고 시작합니다. (v5 강조)</li>\r\n\t\t\t\t\t\t\t<li style=\"list-style-type:circle\"><p style=\"font-family:Pretendard Light;font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-weight:bold\">제목 계층:</span> </p>\r\n\t\t\t\t\t\t\t<ul>\r\n\t\t\t\t\t\t\t\t<li style=\"font-family:Pretendard Light;font-size:10pt\"><span style=\"font-family:Segoe UI Emoji\">&#128205;</span>: 아티클 전체 주제 또는 최상위 카테고리</li>\r\n\t\t\t\t\t\t\t\t<li style=\"font-family:Pretendard Light;font-size:10pt\"><span style=\"font-family:Segoe UI Emoji\">&#128204;</span>: 주요 섹션 제목 또는 중간 레벨 소제목</li>\r\n\t\t\t\t\t\t\t\t<li style=\"font-family:Pretendard Light;font-size:10pt\"><span style=\"font-family:Segoe UI Emoji\">&#128312;</span>: 세부 소제목 또는 특정 항목 (예: 권장 사항 번호)</li>\r\n\t\t\t\t\t\t\t</ul>\r\n\t\t\t\t\t\t\t</li>\r\n\t\t\t\t\t\t\t<li style=\"list-style-type:circle;font-family:Pretendard Light;font-size:10pt\"><span style=\"font-weight:bold\">제목 병기:</span> 하위 제목 슬라이드(<span style=\"font-family:Segoe UI Emoji\">&#128204;</span>, <span style=\"font-family:Segoe UI Emoji\">&#128312;</span>)에는 그 상위 제목(<span style=\"font-family:Segoe UI Emoji\">&#128205;</span>, <span style=\"font-family:Segoe UI Emoji\">&#128204;</span>)을 항상 함께 표시하여 계층 구조를 명확히 합니다. (v3 추가)</li>\r\n\t\t\t\t\t\t\t<li style=\"list-style-type:circle\"><p style=\"font-family:Pretendard Light;font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-weight:bold\">본문:</span> </p>\r\n\t\t\t\t\t\t\t<ul>\r\n\t\t\t\t\t\t\t\t<li><p style=\"font-family:Pretendard Light;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">• (블릿 포인트)를 사용하여 문장을 구성합니다.</p>\r\n\t\t\t\t\t\t\t\t<ul>\r\n\t\t\t\t\t\t\t\t\t<li style=\"font-family:Pretendard Light;font-size:10pt\">(하이픈)을 사용하여 서브 블릿을 표기하며, 메인 블릿 당 최대 3개를 넘지 않도록 하고, 한 문장으로 통합 가능한 내용은 불필요하게 분할하지 않습니다. (v3 규칙 유지)</li>\r\n\t\t\t\t\t\t\t\t</ul>\r\n\t\t\t\t\t\t\t\t</li>\r\n\t\t\t\t\t\t\t\t<li style=\"font-family:Pretendard Light;font-size:10pt\">한 슬라이드에 너무 많은 텍스트가 들어가지 않도록 내용을 분할하거나 정리합니다.</li>\r\n\t\t\t\t\t\t\t</ul>\r\n\t\t\t\t\t\t\t</li>\r\n\t\t\t\t\t\t\t<li style=\"list-style-type:circle;font-family:Pretendard Light;font-size:10pt\"><span style=\"font-weight:bold\">슬라이드 구분:</span> 각 슬라이드 사이는 ---로 명확히 구분합니다.</li>\r\n\t\t\t\t\t\t</ul>\r\n\t\t\t\t\t\t</li>\r\n\t\t\t\t\t\t<li><p style=\"font-family:Pretendard Light;font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-weight:bold\">스타일 및 포맷:</span> </p>\r\n\t\t\t\t\t\t<ul>\r\n\t\t\t\t\t\t\t<li style=\"list-style-type:circle;font-family:Pretendard Light;font-size:10pt\"><span style=\"font-weight:bold\">마침표 제거:</span> 모든 문장 또는 블릿 끝의 마침표(.)를 사용하지 않습니다. (v3 추가)</li>\r\n\t\t\t\t\t\t\t<li style=\"list-style-type:circle;font-family:Pretendard Light;font-size:10pt\"><span style=\"font-weight:bold\">강조:</span> 중요 문구나 핵심 용어는 <span style=\"font-weight:bold\">볼드(굵게)</span> 처리합니다.</li>\r\n\t\t\t\t\t\t\t<li style=\"list-style-type:circle\"><p style=\"font-family:Pretendard Light;font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-weight:bold\">이모지:</span> </p>\r\n\t\t\t\t\t\t\t<ul>\r\n\t\t\t\t\t\t\t\t<li style=\"font-family:Pretendard Light;font-size:10pt\">이해를 돕기 위해 꼭 필요한 경우에만 문맥에 맞게 <span style=\"font-weight:bold\">문장 중간</span>에 삽입합니다. (v5 수정)</li>\r\n\t\t\t\t\t\t\t\t<li style=\"font-family:Pretendard Light;font-size:10pt\">문장 맨 <span style=\"font-weight:bold\">마지막에는 절대 사용하지 않습니다</span>. (v5 강조)</li>\r\n\t\t\t\t\t\t\t\t<li style=\"font-family:Pretendard Light;font-size:10pt\">남발하지 않으며, 의미 전달에 도움이 될 때만 최소한으로 사용합니다.</li>\r\n\t\t\t\t\t\t\t\t<li style=\"font-family:Pretendard Light;font-size:10pt\">블릿 포인트(•) 바로 뒤나 문장 맨 앞에 사용하지 않습니다 (<span style=\"font-family:Segoe UI Emoji\">✅</span> 마커 제외).</li>\r\n\t\t\t\t\t\t\t</ul>\r\n\t\t\t\t\t\t\t</li>\r\n\t\t\t\t\t\t\t<li style=\"list-style-type:circle\"><p style=\"font-family:Pretendard Light;font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-weight:bold\">사례 표시:</span> </p>\r\n\t\t\t\t\t\t\t<ul>\r\n\t\t\t\t\t\t\t\t<li style=\"font-family:Pretendard Light;font-size:10pt\">구체적인 기업 사례나 연구 사례 등은 문장 시작 부분에 <span style=\"font-family:Segoe UI Emoji\">✅</span> 이모지를 사용하여 표시합니다. (v3 추가)</li>\r\n\t\t\t\t\t\t\t\t<li style=\"font-family:Pretendard Light;font-size:10pt\">사례와 관련된 기업 로고(PNG)나 구체적인 설명 이미지(PNG)를 탐색하여 ![이미지 설명](URL) 형식으로 포함하거나, 적절한 이미지를 찾기 어려운 경우 플레이스홀더(![설명](https://placehold.co/200x100/eee/ccc?text=설명))를 사용합니다. (v3 추가)</li>\r\n\t\t\t\t\t\t\t</ul>\r\n\t\t\t\t\t\t\t</li>\r\n\t\t\t\t\t\t</ul>\r\n\t\t\t\t\t\t</li>\r\n\t\t\t\t\t\t<li><p style=\"font-family:Pretendard Light;font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-weight:bold\">최종 단계:</span> </p>\r\n\t\t\t\t\t\t<ul>\r\n\t\t\t\t\t\t\t<li style=\"list-style-type:circle\"><p style=\"font-family:Pretendard Light;font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-weight:bold\">토론 질문 생성:</span> 슬라이드 내용 생성 후, 아티클 내용을 기반으로 아래 가이드라인에 따라 토론 질문 10개를 필수적으로 생성합니다. </p>\r\n\t\t\t\t\t\t\t<ul>\r\n\t\t\t\t\t\t\t\t<li style=\"font-family:Pretendard Light;font-size:10pt\"><span style=\"font-weight:bold\">[역할]</span> 당신은 Harvard Business Review Korea 아티클들을 리뷰하고 토론을 이끌어내는 커뮤니티의 파트너입니다.</li>\r\n\t\t\t\t\t\t\t\t<li style=\"font-family:Pretendard Light;font-size:10pt\"><span style=\"font-weight:bold\">[목표]</span> 제공된 아티클을 토대로 커뮤니티에서 생산적인 토론을 유도하는 질문을 작성합니다.</li>\r\n\t\t\t\t\t\t\t\t<li><p style=\"font-family:Pretendard Light;font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-weight:bold\">[질문 구성 원칙]</span> </p>\r\n\t\t\t\t\t\t\t\t<ul>\r\n\t\t\t\t\t\t\t\t\t<li style=\"font-family:Pretendard Light;font-size:10pt\">아티클 핵심 개념 기반, 다양한 관점 탐색 유도</li>\r\n\t\t\t\t\t\t\t\t\t<li style=\"font-family:Pretendard Light;font-size:10pt\">개인 경험/업무 연관 논의 유도</li>\r\n\t\t\t\t\t\t\t\t\t<li style=\"font-family:Pretendard Light;font-size:10pt\">통찰의 실제 적용 성찰 유도</li>\r\n\t\t\t\t\t\t\t\t\t<li style=\"font-family:Pretendard Light;font-size:10pt\">명확하고 흥미 유발, 사고 자극, 건설적 논의 참여 유도</li>\r\n\t\t\t\t\t\t\t\t\t<li style=\"font-family:Pretendard Light;font-size:10pt\">질문 넘버링은 텍스트로 바로 붙여 복사 가능하게 (예: 1. 질문 내용)</li>\r\n\t\t\t\t\t\t\t\t</ul>\r\n\t\t\t\t\t\t\t\t</li>\r\n\t\t\t\t\t\t\t\t<li style=\"font-family:Pretendard Light;font-size:10pt\"><span style=\"font-weight:bold\">[질문 유형 예시]</span> 개인 경험 연결, 업무 적용 가능성, 비판적 사고 유도, 미래 전망, 혁신적 시각 등</li>\r\n\t\t\t\t\t\t\t</ul>\r\n\t\t\t\t\t\t\t</li>\r\n\t\t\t\t\t\t</ul>\r\n\t\t\t\t\t\t</li>\r\n\t\t\t\t\t</ul>\r\n\t\t\t\t\t</td>\r\n\t\t\t\t\t<td style=\"border:1px solid\"><br />\r\n\t\t\t\t\t</td>\r\n\t\t\t\t</tr>\r\n\t\t\t</table>\r\n\t\t"
  }
];
const CONTENT_HASH = '15a37ca1';

let cards = [];
let moving = null, resizing = null;
let selectedIdx = null, clipboardCard = null;
const GRID = 20, GAP = 14;
function snap(v) { return Math.round(v / GRID) * GRID; }

// ── Undo (Ctrl+Z) ────────────────────────────────────────────────────────────
const MAX_HISTORY = 50;
let history = [];
function snapshot() {
  syncText();
  history.push(JSON.stringify(cards));
  if (history.length > MAX_HISTORY) history.shift();
}
function undo() {
  if (!history.length) { showStatus('되돌릴 내용 없음'); return; }
  syncText();
  cards = JSON.parse(history.pop());
  renderCards();
  saveBoard();
  showStatus('↩ 되돌림');
}
function showStatus(msg) {
  const s = document.getElementById('status');
  s.textContent = msg;
  clearTimeout(showStatus._t);
  showStatus._t = setTimeout(() => { s.textContent = ''; }, 2000);
}
document.addEventListener('keydown', e => {
  const isText = document.activeElement?.contentEditable === 'true';
  if ((e.ctrlKey || e.metaKey) && e.key === 'z' && !e.shiftKey) {
    if (isText) return;
    e.preventDefault();
    undo();
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'c' && !e.shiftKey && !isText) {
    if (selectedIdx !== null && cards[selectedIdx]) {
      syncText();
      clipboardCard = JSON.parse(JSON.stringify(cards[selectedIdx]));
      showStatus('카드 복사됨');
      e.preventDefault();
    }
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'v' && !e.shiftKey && !isText) {
    if (clipboardCard) {
      e.preventDefault();
      snapshot();
      const nc = JSON.parse(JSON.stringify(clipboardCard));
      nc.x = (nc.x || 0) + 30; nc.y = (nc.y || 0) + 30;
      cards.push(nc);
      selectedIdx = cards.length - 1;
      renderCards(); saveBoard();
      showStatus('카드 붙여넣음');
    }
  }
  if (e.key === 'Escape') {
    document.querySelectorAll('.card.selected').forEach(c => c.classList.remove('selected'));
    selectedIdx = null;
  }
});

function pushCards(movedIdx) {
  const moved = cards[movedIdx];
  const movedEl = document.querySelector(`.card[data-idx="${movedIdx}"]`);
  if (!movedEl) return;
  const mh = movedEl.offsetHeight;
  document.querySelectorAll('.card').forEach(el => {
    const i = +el.dataset.idx;
    if (i === movedIdx) return;
    const c = cards[i], oh = el.offsetHeight;
    if (moved.x < (c.x+(c.w||200)) && (moved.x+(moved.w||200)) > c.x && moved.y < (c.y+oh) && (moved.y+mh) > c.y) {
      c.y = moved.y + mh + GAP;
      el.style.top = c.y + 'px';
    }
  });
}

function loadBoard() {
  const saved = localStorage.getItem(SAVE_KEY);
  const savedHash = localStorage.getItem(SAVE_KEY + ':hash');
  let parsed = null;
  try { parsed = saved ? JSON.parse(saved) : null; } catch(e) {}
  // reset if: no save, empty array, or content hash changed (page regenerated)
  if (!parsed || parsed.length === 0 || savedHash !== CONTENT_HASH) {
    cards = DEFAULT_CARDS.map(c => ({...c}));
    localStorage.removeItem(SAVE_KEY);
    localStorage.setItem(SAVE_KEY + ':hash', CONTENT_HASH);
    renderCards();
    const hasCoords = cards.some(c => c.x !== undefined && c.y !== undefined);
    if (!hasCoords) autoLayout();
    return;
  }
  cards = parsed;
  renderCards();
}
function resetToDefaults() { if (!confirm('저장된 보드를 지우고 원본으로 초기화합니다. 계속할까요?')) return; localStorage.removeItem(SAVE_KEY); cards = DEFAULT_CARDS.map(c => ({...c})); renderCards(); autoLayout(); }

function autoLayout() {
  const boardW = document.getElementById('board').offsetWidth;
  const cols = Math.max(1, Math.floor(boardW / 280));
  const colW = (boardW - GAP*(cols-1)) / cols;
  const colH = new Array(cols).fill(0);
  const allCards = document.querySelectorAll('.card');
  const images = document.querySelectorAll('.card img');
  let loaded = 0;
  function place() {
    allCards.forEach((el, i) => {
      const w = Math.min(cards[i].w || colW, colW);
      let minCol = 0;
      for (let c = 1; c < cols; c++) if (colH[c] < colH[minCol]) minCol = c;
      cards[i].x = minCol * (colW + GAP);
      cards[i].y = colH[minCol];
      cards[i].w = w;
      el.style.left = cards[i].x + 'px';
      el.style.top = cards[i].y + 'px';
      el.style.width = w + 'px';
      colH[minCol] = cards[i].y + el.offsetHeight + GAP;
    });
    document.getElementById('board').style.minHeight = (Math.max(...colH) + 100) + 'px';
    saveBoard();
  }
  if (!images.length) { requestAnimationFrame(place); return; }
  images.forEach(img => {
    if (img.complete) { loaded++; if (loaded >= images.length) requestAnimationFrame(place); }
    else { img.onload = img.onerror = () => { loaded++; if (loaded >= images.length) requestAnimationFrame(place); }; }
  });
}

function syncText() {
  document.querySelectorAll('.card').forEach(el => {
    const i = +el.dataset.idx;
    if (cards[i]?.type === 'text') { const t = el.querySelector('.text'); if (t) cards[i].content = t.innerHTML; }
  });
}
function saveBoard() { syncText(); localStorage.setItem(SAVE_KEY, JSON.stringify(cards)); localStorage.setItem(SAVE_KEY + ':hash', CONTENT_HASH); showStatus('저장됨 ' + new Date().toLocaleTimeString()); }

function renderCards() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  cards.forEach((card, i) => {
    const el = document.createElement('div');
    el.className = 'card'; el.dataset.idx = i;
    if (card.x !== undefined) el.style.left = card.x + 'px';
    if (card.y !== undefined) el.style.top = card.y + 'px';
    // html cards contain raw OneNote table HTML which may overflow the stated div width
    if (card.w) { if (card.type === 'html') el.style.minWidth = card.w + 'px'; else el.style.width = card.w + 'px'; }
    el.addEventListener('mousedown', e => {
      if (e.target.closest('.text, a, .card-btn, .resize-handle, td, th')) return;
      e.preventDefault();
      // Update selection
      document.querySelectorAll('.card.selected').forEach(c => c.classList.remove('selected'));
      selectedIdx = i; el.classList.add('selected');
      snapshot();
      moving = { idx: i, startX: e.clientX, startY: e.clientY, origX: card.x||0, origY: card.y||0 };
      el.classList.add('moving');
    });
    const actions = document.createElement('div'); actions.className = 'card-actions';
    const delBtn = document.createElement('button'); delBtn.className = 'card-btn'; delBtn.textContent = '×';
    delBtn.onclick = e => { e.stopPropagation(); if(confirm('삭제?')) { snapshot(); cards.splice(i,1); renderCards(); saveBoard(); } };
    actions.appendChild(delBtn); el.appendChild(actions);
    if (card.type === 'text') {
      const text = document.createElement('div'); text.className = 'text'; text.contentEditable = true;
      text.innerHTML = card.content || '';
      text.addEventListener('focus', () => { snapshot(); });
      text.addEventListener('blur', () => { card.content = text.innerHTML; saveBoard(); });
      el.appendChild(text);
    } else if (card.type === 'image') {
      const img = document.createElement('img');
      img.src = card.src.startsWith('http') || card.src.startsWith('data:') ? card.src : IMG_BASE + card.src;
      img.alt = ''; img.loading = 'lazy'; img.onerror = () => img.style.display = 'none';
      if (card.w) img.style.width = card.w + 'px';
      if (card.h) img.style.height = card.h + 'px';
      if (card.link) { const a = document.createElement('a'); a.href = card.link; a.target = '_blank'; a.appendChild(img); el.appendChild(a); }
      else { el.appendChild(img); }
      if (card.caption) { const cap = document.createElement('div'); cap.style.cssText = 'font-size:11px;color:#8b949e;margin-top:4px;word-break:break-word;padding:0 2px;'; cap.textContent = card.caption; el.appendChild(cap); }
    } else if (card.type === 'html') {
      const wrapper = document.createElement('div');
      wrapper.style.cssText = 'overflow:auto;font-size:13px;line-height:1.5;';
      wrapper.innerHTML = card.html.replace(/__ATTACHMENT__/g, IMG_BASE);
      wrapper.querySelectorAll('img').forEach(img => { img.style.maxWidth = '100%'; img.style.height = 'auto'; img.draggable = false; });
      wrapper.querySelectorAll('a').forEach(a => { a.target = '_blank'; a.style.color = '#6cb0f6'; });
      wrapper.querySelectorAll('table').forEach(t => { t.style.borderCollapse = 'collapse'; });
      wrapper.querySelectorAll('td,th').forEach(td => {
        td.style.border = '1px solid #444'; td.style.padding = '4px 6px'; td.style.verticalAlign = 'top';
        td.title = '더블클릭으로 편집';
        td.addEventListener('dblclick', function(e) {
          e.stopPropagation();
          snapshot();
          this.contentEditable = 'true';
          this.style.outline = '2px solid #388bfd';
          this.style.background = 'rgba(56,139,253,0.08)';
          this.focus();
        });
        td.addEventListener('blur', function() {
          this.contentEditable = 'false';
          this.style.outline = '';
          this.style.background = '';
          cards[i].html = wrapper.innerHTML.split(IMG_BASE).join('__ATTACHMENT__');
          saveBoard();
        });
      });
      el.appendChild(wrapper);
    } else if (card.type === 'table') {
      const rows = card.rows || [['','',''],['','',''],['','','']];
      const tbl = document.createElement('table');
      tbl.style.cssText = 'border-collapse:collapse;width:100%;font-size:13px;';
      rows.forEach((row, ri) => {
        const tr = tbl.insertRow();
        row.forEach((cell, ci) => {
          const td = document.createElement(ri === 0 ? 'th' : 'td');
          td.contentEditable = true;
          td.style.cssText = 'border:1px solid #30363d;padding:4px 8px;min-width:60px;text-align:left;' + (ri===0 ? 'background:#21262d;font-weight:600;' : '');
          td.textContent = cell;
          td.addEventListener('blur', () => { if (!cards[i].rows) cards[i].rows = rows; rows[ri][ci] = td.textContent; saveBoard(); });
          tr.appendChild(td);
        });
      });
      el.appendChild(tbl);
      const addRow = document.createElement('button');
      addRow.textContent = '+ 행'; addRow.style.cssText = 'margin-top:4px;font-size:11px;background:#21262d;border:1px solid #30363d;color:#8b949e;padding:2px 8px;border-radius:4px;cursor:pointer;';
      addRow.onclick = e => { e.stopPropagation(); snapshot(); if (!cards[i].rows) cards[i].rows = rows; cards[i].rows.push(new Array(cards[i].rows[0].length).fill('')); renderCards(); saveBoard(); };
      const addCol = document.createElement('button');
      addCol.textContent = '+ 열'; addCol.style.cssText = 'margin-top:4px;margin-left:4px;font-size:11px;background:#21262d;border:1px solid #30363d;color:#8b949e;padding:2px 8px;border-radius:4px;cursor:pointer;';
      addCol.onclick = e => { e.stopPropagation(); snapshot(); if (!cards[i].rows) cards[i].rows = rows; cards[i].rows.forEach(r => r.push('')); renderCards(); saveBoard(); };
      el.appendChild(addRow); el.appendChild(addCol);
    }
    const rh = document.createElement('div'); rh.className = 'resize-handle';
    rh.addEventListener('mousedown', e => { e.preventDefault(); e.stopPropagation(); snapshot(); resizing = { idx: i, startX: e.clientX, startW: card.w || el.offsetWidth }; });
    el.appendChild(rh);
    if (i === selectedIdx) el.classList.add('selected');
    board.appendChild(el);
  });
  requestAnimationFrame(() => {
    let maxB = 0;
    document.querySelectorAll('.card').forEach(el => { const b = (parseFloat(el.style.top)||0) + el.offsetHeight; if (b > maxB) maxB = b; });
    board.style.minHeight = (maxB + 100) + 'px';
  });
}

document.addEventListener('mousemove', e => {
  if (moving) {
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`); if (!el) return;
    let nx = moving.origX + e.clientX - moving.startX, ny = moving.origY + e.clientY - moving.startY;
    if (e.shiftKey) { nx = snap(nx); ny = snap(ny); el.style.outline = '1px dashed rgba(240,192,64,0.3)'; } else { el.style.outline = ''; }
    el.style.left = nx + 'px'; el.style.top = ny + 'px';
  }
  if (resizing) {
    let nw = resizing.startW + e.clientX - resizing.startX; if (e.shiftKey) nw = snap(nw);
    cards[resizing.idx].w = Math.max(100, nw);
    const el = document.querySelector(`.card[data-idx="${resizing.idx}"]`); if (el) el.style.width = cards[resizing.idx].w + 'px';
  }
});

document.addEventListener('mouseup', e => {
  if (moving) {
    let nx = moving.origX + e.clientX - moving.startX, ny = moving.origY + e.clientY - moving.startY;
    if (e.shiftKey) { nx = snap(nx); ny = snap(ny); }
    cards[moving.idx].x = Math.max(0, nx); cards[moving.idx].y = Math.max(0, ny);
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`); if (el) { el.classList.remove('moving'); el.style.outline = ''; }
    if (e.shiftKey) pushCards(moving.idx);
    moving = null; saveBoard();
  }
  if (resizing) { if (e.shiftKey) pushCards(resizing.idx); resizing = null; saveBoard(); }
});

function addTextCard() { snapshot(); cards.push({ type: 'text', content: '', x: 50, y: window.scrollY+100, w: 300 }); renderCards(); setTimeout(() => { const els = document.querySelectorAll('.card .text'); els[els.length-1]?.focus(); }, 100); }
function addImageCard() { const input = document.createElement('input'); input.type = 'file'; input.accept = 'image/*'; input.onchange = e => { const f = e.target.files[0]; if (!f) return; const r = new FileReader(); r.onload = () => { snapshot(); cards.push({ type: 'image', src: r.result, x: 50, y: window.scrollY+100, w: 240 }); renderCards(); saveBoard(); }; r.readAsDataURL(f); }; input.click(); }
function addImageUrl() { const url = prompt('이미지 URL'); if (!url) return; snapshot(); cards.push({ type: 'image', src: url, x: 50, y: window.scrollY+100, w: 240 }); renderCards(); saveBoard(); }
function addTableCard() {
  const colsStr = prompt('열 수 (기본 3)', '3'); const cols = Math.max(1, parseInt(colsStr)||3);
  const rowsStr = prompt('행 수 (헤더 포함, 기본 4)', '4'); const rows = Math.max(1, parseInt(rowsStr)||4);
  snapshot();
  cards.push({ type: 'table', rows: Array.from({length: rows}, (_, ri) => Array.from({length: cols}, (_, ci) => ri===0 ? `열${ci+1}` : '')), x: 50, y: window.scrollY+100, w: Math.max(240, cols*100) });
  renderCards(); saveBoard();
}
function exportBoard() { syncText(); const blob = new Blob([JSON.stringify(cards, null, 2)], { type: 'application/json' }); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = SAVE_KEY + '.json'; a.click(); }
// ── Zoom ─────────────────────────────────────────────────────────────────────
let zoom = parseFloat(localStorage.getItem('zoom-' + SAVE_KEY) || '1.0');
function applyZoom() {
  const board = document.getElementById('board');
  board.style.transform = `scale(${zoom})`;
  board.style.transformOrigin = '0 0';
  document.getElementById('zoom-level').textContent = Math.round(zoom * 100) + '%';
  localStorage.setItem('zoom-' + SAVE_KEY, zoom);
}
function zoomIn()  { zoom = Math.min(3.0, parseFloat((zoom + 0.1).toFixed(2))); applyZoom(); }
function zoomOut() { zoom = Math.max(0.2, parseFloat((zoom - 0.1).toFixed(2))); applyZoom(); }
document.addEventListener('keydown', e => {
  if (e.ctrlKey || e.metaKey) {
    if (e.key === '=' || e.key === '+') { e.preventDefault(); zoomIn(); }
    if (e.key === '-')                  { e.preventDefault(); zoomOut(); }
    if (e.key === '0')                  { e.preventDefault(); zoom = 1.0; applyZoom(); }
  }
});
document.getElementById('board').addEventListener('wheel', e => {
  if (!(e.ctrlKey || e.metaKey)) return;
  e.preventDefault();
  e.deltaY < 0 ? zoomIn() : zoomOut();
}, { passive: false });
applyZoom();
function resetLayout() { if (!confirm('자동 재배치합니다.')) return; cards.forEach(c => { delete c.x; delete c.y; }); renderCards(); autoLayout(); }
// ── Floating format toolbar ───────────────────────────────────────────────────
const fmtBar = document.getElementById('format-toolbar');
function fmt(cmd) { document.execCommand(cmd, false, null); saveBoard(); }
function fmtLink() {
  const sel = window.getSelection();
  if (!sel || sel.isCollapsed) return;
  const url = prompt('링크 URL 입력', 'https://');
  if (!url) return;
  document.execCommand('createLink', false, url);
  // make links open in new tab
  sel.anchorNode?.parentElement?.closest('a')?.setAttribute('target', '_blank');
  document.querySelectorAll('.text a').forEach(a => a.target = '_blank');
  saveBoard();
}

// prevent format buttons from blurring contenteditable
fmtBar.addEventListener('mousedown', e => e.preventDefault());

document.addEventListener('selectionchange', () => {
  const sel = window.getSelection();
  if (!sel || sel.isCollapsed || !sel.toString().trim()) { fmtBar.style.display = 'none'; return; }
  // only show if selection is inside a .text element
  const anchor = sel.anchorNode;
  if (!anchor) { fmtBar.style.display = 'none'; return; }
  const textEl = anchor.nodeType === 1 ? anchor.closest('.text') : anchor.parentElement?.closest('.text');
  if (!textEl) { fmtBar.style.display = 'none'; return; }
  // position above selection
  const range = sel.getRangeAt(0);
  const rect = range.getBoundingClientRect();
  fmtBar.style.display = 'flex';
  const tbW = fmtBar.offsetWidth || 180;
  let left = rect.left + rect.width / 2 - tbW / 2;
  left = Math.max(8, Math.min(left, window.innerWidth - tbW - 8));
  fmtBar.style.left = left + 'px';
  fmtBar.style.top = (rect.top - 44 + window.scrollY) + 'px';
});

setInterval(saveBoard, 30000);
loadBoard();
</script>
</body>
</html>
