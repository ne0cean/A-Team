<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Golf</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1e1e1e; color: #e0e0e0; font-family: 'Segoe UI', -apple-system, sans-serif; font-size: 15px; line-height: 1.6; padding: 20px 30px 60px; overflow-x: hidden; }
a { color: #6cb0f6; text-decoration: none; }
a:hover { text-decoration: underline; }
.title-bar { background: #3a3a5c; display: inline-block; padding: 6px 16px; font-size: 22px; font-weight: bold; color: #fff; margin-bottom: 4px; }
.date { color: #999; font-size: 13px; margin-bottom: 20px; }
.board { position: relative; }
.card { background: #2a2a2a; border: 1px solid #3a3a3a; border-radius: 8px; padding: 12px; position: absolute; cursor: grab; transition: box-shadow 0.15s; overflow: hidden; }
.card:hover { box-shadow: 0 0 0 1px #58a6ff; z-index: 10; }
.card.moving { opacity: 0.8; box-shadow: 0 4px 24px rgba(0,0,0,0.6); z-index: 100; cursor: grabbing; }
.card img { width: 100%; border-radius: 4px; display: block; }
.card .text { outline: none; min-height: 20px; white-space: pre-wrap; word-break: break-word; }
.card .text:focus { background: rgba(255,255,255,0.05); border-radius: 4px; padding: 4px; }
.card .text:empty::before { content: '텍스트 입력...'; color: #555; }
.card-actions { position: absolute; top: 4px; right: 4px; display: none; gap: 4px; }
.card:hover .card-actions { display: flex; }
.card-btn { background: #333; border: 1px solid #555; color: #ccc; border-radius: 4px; padding: 2px 6px; font-size: 11px; cursor: pointer; }
.card-btn:hover { background: #444; color: #fff; }
.resize-handle { position: absolute; bottom: 0; right: 0; width: 16px; height: 16px; cursor: se-resize; opacity: 0; }
.card:hover .resize-handle { opacity: 0.6; }
.resize-handle::after { content: ''; position: absolute; bottom: 3px; right: 3px; width: 8px; height: 8px; border-right: 2px solid #666; border-bottom: 2px solid #666; }
.card.selected { box-shadow: 0 0 0 2px #58a6ff; z-index: 5; }
.highlight-red { color: #ff6b6b; }
.highlight-blue { color: #6cb0f6; }
.highlight-gold { color: #f0c040; }
.toolbar { position: fixed; bottom: 0; left: 0; right: 0; background: #161b22; border-top: 1px solid #30363d; padding: 8px 20px; display: flex; gap: 12px; align-items: center; z-index: 200; }
.toolbar button { background: #21262d; border: 1px solid #30363d; color: #e0e0e0; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; }
.toolbar button:hover { background: #30363d; }
.toolbar .status { color: #8b949e; font-size: 12px; margin-left: auto; }
#format-toolbar { position: fixed; display: none; background: #1c2128; border: 1px solid #444c56; border-radius: 8px; padding: 4px 6px; gap: 2px; align-items: center; z-index: 500; box-shadow: 0 4px 16px rgba(0,0,0,0.5); }
#format-toolbar button { background: none; border: none; color: #cdd9e5; padding: 4px 8px; border-radius: 5px; cursor: pointer; font-size: 13px; line-height: 1; }
#format-toolbar button:hover { background: #373e47; }
#format-toolbar .sep { width: 1px; height: 16px; background: #444c56; margin: 0 2px; }
</style>
</head>
<body>
<div class="title-bar" contenteditable="true">Golf</div>
<div class="date"></div>
<div class="board" id="board"></div>
<div id="format-toolbar">
  <button onmousedown="e=>e.preventDefault()" onclick="fmt('bold')" title="굵게"><b>B</b></button>
  <button onclick="fmt('italic')" title="기울임"><i>I</i></button>
  <button onclick="fmt('underline')" title="밑줄"><u>U</u></button>
  <div class="sep"></div>
  <button onclick="fmtLink()" title="링크 삽입">🔗</button>
  <button onclick="fmt('unlink')" title="링크 제거">✂</button>
</div>
<div class="toolbar">
  <button onclick="undo()" title="Ctrl+Z">↩ 실행취소</button>
  <button onclick="addTextCard()">+ 텍스트</button>
  <button onclick="addImageCard()">+ 이미지</button>
  <button onclick="addImageUrl()">+ 이미지 URL</button>
  <button onclick="addTableCard()">+ 표</button>
  <button onclick="saveBoard()">💾 저장</button>
  <button onclick="exportBoard()">📤 내보내기</button>
  <button onclick="resetLayout()">↺ 재배치</button>
  <button onclick="resetToDefaults()" style="color:#f85149">↺ 초기화</button>
  <div style="display:flex;align-items:center;gap:4px;margin-left:8px;border-left:1px solid #30363d;padding-left:12px;">
    <button onclick="zoomOut()" title="Ctrl+-" style="padding:6px 10px;">−</button>
    <span id="zoom-level" style="font-size:12px;color:#8b949e;min-width:36px;text-align:center;">100%</span>
    <button onclick="zoomIn()" title="Ctrl+=" style="padding:6px 10px;">+</button>
  </div>
  <span class="status" id="status">Ready</span>
</div>
<script>
const SAVE_KEY = 'board-Golf';
const IMG_BASE = '../../attachments/';
const DEFAULT_CARDS = [
  {
    "type": "html",
    "x": 48,
    "y": 91,
    "w": 615,
    "html": "\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:Pretendard;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic;font-size:12pt\">A: </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic;font-size:12pt\">임규영</span><span style=\"font-family:Malgun Gothic;font-size:12pt\"> / C: </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic;font-size:12pt\">김현오</span></p>\r\n\t\t\t<br />\r\n\t\t\t<p data-tag=\"important\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic;font-size:12pt;font-weight:bold\">아이언</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt;font-weight:bold\">: </span><span style=\"font-family:Malgun Gothic;font-size:12pt;font-weight:bold\">비거리</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt;font-weight:bold\">, </span><span style=\"font-family:Malgun Gothic;font-size:12pt;font-weight:bold\">직진성</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt;font-weight:bold\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt;font-weight:bold\">강화</span></p>\r\n\t\t\t<p style=\"font-family:Pretendard Light;font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Segoe UI Emoji;font-size:12pt\">✅ </span><span style=\"font-size:12pt;font-weight:bold\">1. 어드레스 (Address)</span></p>\r\n\t\t\t<ul>\r\n\t\t\t\t<li style=\"font-family:Pretendard Light;font-size:10pt\"><span style=\"font-size:12pt\">상체</span><span lang=\"en-US\" style=\"font-size:12pt\"> </span><span style=\"font-size:12pt\">최대한 숙여서 어드레스 (왼쪽</span><span lang=\"en-US\" style=\"font-size:12pt\"> </span><span style=\"font-size:12pt\">어깨 내리는</span><span lang=\"en-US\" style=\"font-size:12pt\"> </span><span style=\"font-size:12pt\">보정동작 방지)</span></li>\r\n\t\t\t\t<li style=\"font-family:Pretendard Light;font-size:10pt\"><span style=\"font-size:12pt\">왼팔을 곧게 펴서 타점 변동 최소화</span></li>\r\n\t\t\t\t<br />\r\n\t\t\t</ul>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:Pretendard Light;font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Segoe UI Emoji;font-size:12pt\">&#128257; </span><span style=\"font-size:12pt;font-weight:bold\">2. 테이크백 (Takeaway &amp; Backswing)</span></p>\r\n\t\t\t<p style=\"font-family:Pretendard Light;font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:12pt;font-weight:bold\">체중이동과 어깨 동작</span></p>\r\n\t\t\t<ul>\r\n\t\t\t\t<li style=\"font-family:Pretendard Light;font-size:10pt\"><span style=\"font-size:12pt\">테이크백</span><span lang=\"en-US\" style=\"font-size:12pt\"> </span><span style=\"font-size:12pt\">시</span><span lang=\"en-US\" style=\"font-size:12pt\">, </span><span style=\"font-size:12pt\">상체가</span><span lang=\"en-US\" style=\"font-size:12pt\"> </span><span style=\"font-size:12pt\">들리는데</span><span lang=\"en-US\" style=\"font-size:12pt\">. </span><span style=\"font-size:12pt\">왼쪽</span><span lang=\"en-US\" style=\"font-size:12pt\"> </span><span style=\"font-size:12pt\">어깨가</span><span lang=\"en-US\" style=\"font-size:12pt\"> </span><span style=\"font-size:12pt\">턱</span><span lang=\"en-US\" style=\"font-size:12pt\"> </span><span style=\"font-size:12pt\">밑으로</span><span lang=\"en-US\" style=\"font-size:12pt\"> </span><span style=\"font-size:12pt\">들어오고</span><span lang=\"en-US\" style=\"font-size:12pt\"> </span><span style=\"font-size:12pt\">머리는</span><span lang=\"en-US\" style=\"font-size:12pt\"> </span><span style=\"font-size:12pt\">고정</span></li>\r\n\t\t\t\t<li style=\"font-family:Calibri\"><span style=\"font-family:Malgun Gothic;font-size:12pt\">오른손</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">돌리지</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">말고</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\">, </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">그대로</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">우측으로</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">쭉</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">들어서</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">오른팔꿈치를</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">이격시키기</span></li>\r\n\t\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic;font-size:12pt\">오른손은</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">명치</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">위치</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\">, </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">클럽은</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">너무</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">눕지</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">않게</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\">(</span><span style=\"font-family:Malgun Gothic;font-size:12pt\">타격</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">후</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">반대편도</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">동일하게</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\">)</span></p>\r\n\t\t\t\t<li style=\"font-family:Calibri\"><span lang=\"en-US\"><span style=\"font-family:Malgun Gothic;font-size:12pt\">명치</span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic;font-size:12pt\">가</span><span style=\"font-family:Malgun Gothic;font-size:12pt\"> 바</span><span style=\"font-family:Malgun Gothic;font-size:12pt\">닥보며 명치와 팔이 같이 회전 하면서</span><span style=\"font-family:Malgun Gothic;font-size:12pt\">, </span><span lang=\"ko-KR\" style=\"font-family:Pretendard Light;font-size:12pt\">오른편으로 살짝 체중</span><span style=\"font-family:Malgun Gothic;font-size:12pt\">/</span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic;font-size:12pt\">상체</span><span lang=\"ko-KR\" style=\"font-family:Pretendard Light;font-size:12pt\"> 이동하며 테이크백</span><span style=\"font-family:Pretendard Light;font-size:12pt\"> </span><span lang=\"ko-KR\" style=\"font-family:Pretendard Light;font-size:12pt\">시작</span></span></li>\r\n\t\t\t\t<li style=\"font-family:Pretendard Light;font-size:10pt\"><span style=\"font-size:12pt\">왼쪽 어깨가 오른쪽 허벅지 위에 들어올 정도로 무게중심 이동</span></li>\r\n\t\t\t\t<li style=\"font-family:Pretendard Light;font-size:10pt\"><span style=\"font-size:12pt\">왼쪽 어깨는 턱 아래로, 오른쪽 어깨와 수평 교대</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\">, </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">머리는</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">고정</span></li>\r\n\t\t\t\t<li style=\"font-family:Pretendard Light;font-size:10pt\"><span style=\"font-size:12pt\">왼쪽으로 명치 바닥보며 명치와 팔이 같이 회전</span></li>\r\n\t\t\t</ul>\r\n\t\t\t<p style=\"font-family:Pretendard Light;font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:12pt;font-weight:bold\">클럽 동작</span></p>\r\n\t\t\t<ul>\r\n\t\t\t\t<li style=\"font-family:Pretendard Light;font-size:10pt\"><span style=\"font-size:12pt\">팔과</span><span lang=\"en-US\" style=\"font-size:12pt\"> </span><span style=\"font-size:12pt\">클럽을</span><span lang=\"en-US\" style=\"font-size:12pt\"> </span><span style=\"font-size:12pt\">수평으로 멀리 들어올리면서 손목 코킹 (채찍처럼 위로 던지는 느낌)</span></li>\r\n\t\t\t\t<p style=\"font-family:Pretendard Light;font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:12pt\">→ </span><span style=\"font-size:12pt;font-weight:bold\">팔꿈치 각도 90도</span><span lang=\"en-US\" style=\"font-size:12pt;font-weight:bold\"> + </span><span style=\"font-size:12pt;font-weight:bold\">몸에</span><span lang=\"en-US\" style=\"font-size:12pt;font-weight:bold\"> </span><span style=\"font-size:12pt;font-weight:bold\">붙지</span><span lang=\"en-US\" style=\"font-size:12pt;font-weight:bold\"> </span><span style=\"font-size:12pt;font-weight:bold\">않게</span><span lang=\"en-US\" style=\"font-size:12pt;font-weight:bold\"> </span><span style=\"font-size:12pt;font-weight:bold\">이격</span></p>\r\n\t\t\t\t<li style=\"font-family:Pretendard Light;font-size:10pt\"><span style=\"font-size:12pt\">코킹 시 </span><span style=\"font-size:12pt;font-weight:bold\">손등은 바닥을 보고</span><span style=\"font-size:12pt\">, 측면으로</span><span lang=\"en-US\" style=\"font-size:12pt\"> 90</span><span style=\"font-size:12pt\">도로</span><span lang=\"en-US\" style=\"font-size:12pt\"> </span><span style=\"font-size:12pt\">꺽고</span><span lang=\"en-US\" style=\"font-size:12pt\">, </span><span style=\"font-size:12pt\">클럽 샤프트가 </span><span style=\"font-size:12pt;font-weight:bold\">머리 뒤쪽 위치</span><span style=\"font-size:12pt\"> (너무 눕히지 말 것)</span></li>\r\n\t\t\t\t<li style=\"font-family:Pretendard Light;font-size:10pt\"><span style=\"font-size:12pt;font-weight:bold\">직각삼각형 형태로 세우고</span><span style=\"font-size:12pt\">, 손-팔-어깨 삼각형</span><span lang=\"en-US\" style=\"font-size:12pt\"> </span><span style=\"font-size:12pt\">유지</span><span lang=\"en-US\" style=\"font-size:12pt\"> </span><span style=\"font-size:12pt\">(드라이버와 다르게)</span></li>\r\n\t\t\t\t<li style=\"font-family:Calibri\"><span style=\"font-family:Malgun Gothic;font-size:12pt\">오른</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">손바닥에</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">그립이</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">얹어지게</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\"> &amp; </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">왼</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">손등이</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">바깥쪽을</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">보도록</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">살짝</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">회전</span></li>\r\n\t\t\t\t<li style=\"font-family:Pretendard Light;font-size:10pt\"><span style=\"font-size:12pt\">탑에서 너무 뒤로 쳐지지 않게, 채 끝이 공을 향하게 세우기</span></li>\r\n\t\t\t\t<li style=\"font-family:Calibri\"><span style=\"font-family:Malgun Gothic;font-size:12pt\">뒤로</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">빼지</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">말고</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\">, </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">수평으로</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">멀리</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">들어올리면서</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">손목</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">이용</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">코킹</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">채찍처럼</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">위로</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">던지는</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">느낌으로</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">코킹</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\"> &amp; </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">레깅</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\">, </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">팔</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\"> 90</span><span style=\"font-family:Malgun Gothic;font-size:12pt\">도</span></li>\r\n\t\t\t</ul>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:Pretendard Light;font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Segoe UI Emoji;font-size:12pt\">&#128165; </span><span style=\"font-size:12pt;font-weight:bold\">3. 스윙 (Downswing &amp; Impact)</span></p>\r\n\t\t\t<p style=\"font-family:Pretendard Light;font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:12pt;font-weight:bold\">골반 주도</span></p>\r\n\t\t\t<ul>\r\n\t\t\t\t<li style=\"font-family:Pretendard Light;font-size:10pt\"><span style=\"font-size:12pt\">스윙보다 앞서서 왼쪽 골반 크게</span><span lang=\"en-US\" style=\"font-size:12pt\"> </span><span style=\"font-size:12pt\">뒤로 빼면서 골반으로 타격</span></li>\r\n\t\t\t\t<li style=\"font-family:Pretendard Light;font-size:10pt\"><span style=\"font-size:12pt\">손은 따라온다고 생각하기</span></li>\r\n\t\t\t\t<li style=\"font-family:Pretendard Light;font-size:10pt\"><span style=\"font-size:12pt\">손목이 허벅지 위로 가깝게 들어오면서 골반이 피해줘야 함</span></li>\r\n\t\t\t</ul>\r\n\t\t\t<p style=\"font-family:Pretendard Light;font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:12pt;font-weight:bold\">손과 팔 동작</span></p>\r\n\t\t\t<ul>\r\n\t\t\t\t<li style=\"font-family:Calibri\"><span style=\"font-family:Malgun Gothic;font-size:12pt\">오른손으로</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">던지듯이</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\">, </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">오른팔을</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">쭉</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">펴면서</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\">. </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">타격</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">시점에는</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">팔이</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">완전히</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">펴지도록</span></li>\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Pretendard Thin;font-size:12pt\">+ </span><span lang=\"ko-KR\" style=\"font-family:Pretendard Thin;font-size:12pt\">골반회전과</span><span style=\"font-family:Pretendard Thin;font-size:12pt\"> </span><span lang=\"ko-KR\" style=\"font-family:Pretendard Thin;font-size:12pt\">동시에</span><span style=\"font-family:Pretendard Thin;font-size:12pt\"> </span><span lang=\"ko-KR\" style=\"font-family:Pretendard Thin;font-size:12pt\">타격</span></p>\r\n\t\t\t\t<li style=\"font-family:Calibri\"><span style=\"font-family:Malgun Gothic;font-size:12pt\">상체와</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">어깨</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">떨어지지</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">않게</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\">, </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">팔만</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">스윙</span></li>\r\n\t\t\t\t<li style=\"font-family:Calibri\"><span style=\"font-family:Malgun Gothic;font-size:12pt\">코킹</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">상태에서</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\"> (</span><span style=\"font-family:Malgun Gothic;font-size:12pt\">손목</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">꺽지</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">말고</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\">) </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">그대로</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">오른쪽</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">뒷꿈치로</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">끌고</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">내려오면서</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\"> + </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">오른쪽</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">허리</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">접히면서</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\">. </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">왼쪽</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">골반</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">회전하면서</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">타격</span></li>\r\n\t\t\t\t<li style=\"font-family:Pretendard Light;font-size:10pt\"><span style=\"font-size:12pt\">왼쪽 세 손가락이 오른쪽 허벅지를 스치듯이 내려오면서 헤드가 낮아지게</span></li>\r\n\t\t\t\t<li style=\"font-family:Pretendard Light;font-size:10pt\"><span style=\"font-size:12pt\">탑에서부터</span><span lang=\"en-US\" style=\"font-size:12pt\"> </span><span style=\"font-size:12pt\">왼손을</span><span lang=\"en-US\" style=\"font-size:12pt\"> </span><span style=\"font-size:12pt\">오픈하면서 내려오고</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\">, </span><span style=\"font-size:12pt;font-weight:bold\">헤드</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt;font-weight:bold\">(</span><span style=\"font-family:Malgun Gothic;font-size:12pt;font-weight:bold\">팔과</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt;font-weight:bold\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt;font-weight:bold\">어깨</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt;font-weight:bold\">)</span><span style=\"font-size:12pt;font-weight:bold\">가</span><span lang=\"en-US\" style=\"font-size:12pt;font-weight:bold\"> </span><span style=\"font-size:12pt;font-weight:bold\">지나간</span><span lang=\"en-US\" style=\"font-size:12pt;font-weight:bold\"> </span><span style=\"font-size:12pt;font-weight:bold\">직후</span><span lang=\"en-US\" style=\"font-size:12pt;font-weight:bold\"> </span><span style=\"font-size:12pt;font-weight:bold\">상체</span><span lang=\"en-US\" style=\"font-size:12pt;font-weight:bold\"> </span><span style=\"font-size:12pt;font-weight:bold\">회전</span></li>\r\n\t\t\t\t<li style=\"font-family:Pretendard Light;font-size:10pt\"><span style=\"font-size:12pt\">왼손 리드보다는 오른손 리드로 타격</span></li>\r\n\t\t\t\t<li style=\"font-family:Calibri\"><span style=\"font-family:Malgun Gothic;font-size:12pt\">손목</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">전환</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\"> + (</span><span style=\"font-family:Malgun Gothic;font-size:12pt\">어깨</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">고정</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\">) 팔만 이</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\">용해서</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\"> 던지</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\">기</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\">, 오</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\">른손</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\"> 이</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\">용해서</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\"> 헤</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\">드가</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\"> 몸을 먼저 지</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\">나가게</span></li>\r\n\t\t\t\t<li style=\"font-family:Pretendard Light;font-size:10pt\"><span style=\"font-size:12pt\">손등이 공을 보면서 회전</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\">, </span><span style=\"font-size:12pt\">엄지손가락이 ㅗ 모양으로 우에서 좌로 회전</span></li>\r\n\t\t\t\t<li style=\"font-family:Calibri\"><span style=\"font-family:Malgun Gothic;font-size:12pt\">오른쪽</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">어깨</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">내리지</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">말고</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\">, </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">어깨와</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">손</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">분리해서</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\">, </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">손이</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">아래로</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">떨어지게</span></li>\r\n\t\t\t\t<li style=\"font-family:Pretendard Light;font-size:10pt\"><span style=\"font-size:12pt;font-weight:bold\">팔꿈치 안쪽이 하늘을 향하도록</span><span style=\"font-size:12pt\"> 하며, </span><span style=\"font-size:12pt;font-weight:bold\">치킨윙 방지</span></li>\r\n\t\t\t</ul>\r\n\t\t\t<p style=\"font-family:Pretendard Light;font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:12pt;font-weight:bold\">스윙 궤적</span></p>\r\n\t\t\t<ul>\r\n\t\t\t\t<p style=\"font-family:Pretendard Light;font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:12pt;font-weight:bold\">헤드가 낮게</span><span style=\"font-size:12pt\"> 공에 접근하고, </span><span style=\"font-size:12pt;font-weight:bold\">그립 끝이 바닥을 향하면서 채찍처럼 스윙</span></p>\r\n\t\t\t\t<li style=\"font-family:Pretendard Light;font-size:10pt\"><span style=\"font-size:12pt\">1시 방향으로 던지면서 바깥쪽으로 접기</span></li>\r\n\t\t\t\t<li style=\"font-family:Pretendard Light;font-size:10pt\"><span style=\"font-family:Malgun Gothic;font-size:12pt\">내려올</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">때</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">궤적이</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\"> 1</span><span style=\"font-family:Malgun Gothic;font-size:12pt\">시</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">방향이어야</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\">, 1</span><span style=\"font-family:Malgun Gothic;font-size:12pt\">시로</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">던져짐</span></li>\r\n\t\t\t\t<li style=\"font-family:Pretendard Light;font-size:10pt\"><span style=\"font-size:12pt\">오른쪽 어깨 내리지 말고 타겟 방향으로 바로 올라가기</span></li>\r\n\t\t\t\t<li style=\"font-family:Pretendard Light;font-size:10pt\"><span style=\"font-size:12pt\">그립</span><span lang=\"en-US\" style=\"font-size:12pt\"> </span><span style=\"font-size:12pt\">끝이</span><span lang=\"en-US\" style=\"font-size:12pt\"> </span><span style=\"font-size:12pt\">바닥</span><span lang=\"en-US\" style=\"font-size:12pt\">/</span><span style=\"font-size:12pt\">공을</span><span lang=\"en-US\" style=\"font-size:12pt\"> </span><span style=\"font-size:12pt\">보면서</span><span lang=\"en-US\" style=\"font-size:12pt\"> </span><span style=\"font-size:12pt\">코킹한 각도 그대로 내려오면서 왼손등을 멀리 밀어서 1시방향으로 던지는 느낌</span></li>\r\n\t\t\t\t<li style=\"font-family:Pretendard Light;font-size:10pt\"><span style=\"font-size:12pt\">단</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\">, </span><span style=\"font-size:12pt\">골반보다 손이 빠르게 가야 함</span></li>\r\n\t\t\t</ul>\r\n\t\t\t<p style=\"font-family:Pretendard Light;font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:12pt;font-weight:bold\">주의사항</span></p>\r\n\t\t\t<ul>\r\n\t\t\t\t<li style=\"font-family:Pretendard Light;font-size:10pt\"><span style=\"font-size:12pt\">오른손 너무 써서 덤비지 말기</span></li>\r\n\t\t\t\t<li style=\"font-family:Pretendard Light;font-size:10pt\"><span style=\"font-size:12pt\">손목을 바깥쪽으로 꺽지 말고 타겟 방향으로 던지기</span></li>\r\n\t\t\t\t<li style=\"font-family:Pretendard Light;font-size:10pt\"><span style=\"font-size:12pt\">치킨윙 방지: 팔꿈치 안쪽이 하늘 보도록 빠르게 돌려주기</span></li>\r\n\t\t\t\t<li style=\"font-family:Pretendard Light;font-size:10pt\"><span style=\"font-size:12pt\">상체는 나가지 말고 일어서지 말고 회전</span></li>\r\n\t\t\t\t<li style=\"font-family:Calibri\"><span style=\"font-family:Malgun Gothic;font-size:12pt\">오른쪽</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">어깨가</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">내려갔다</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">올라오지</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">말고</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\">, </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">타겟</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">방향으로</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">바로</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">올라가면서</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">스윙</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\">, 1</span><span style=\"font-family:Malgun Gothic;font-size:12pt\">시</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">방향</span></li>\r\n\t\t\t\t<li style=\"font-family:Calibri\"><span style=\"font-family:Malgun Gothic;font-size:12pt\">치킨윙</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">안되게</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">팔꿈치</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">안쪽이</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">하늘</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">보도록</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">빠르게</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">돌려주기</span></li>\r\n\t\t\t</ul>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:Pretendard Light;font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:12pt;font-weight:bold\">4. 임팩트 &amp; 팔로우스루</span></p>\r\n\t\t\t<p style=\"font-family:Pretendard Light;font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:12pt;font-weight:bold\">임팩트</span></p>\r\n\t\t\t<ul>\r\n\t\t\t\t<li style=\"font-family:Pretendard Light;font-size:10pt\"><span style=\"font-size:12pt;font-weight:bold\">어깨는 내리지 않고</span><span style=\"font-size:12pt\">, </span><span style=\"font-size:12pt;font-weight:bold\">손은 1시 방향으로 아래로 떨어지도록</span><span style=\"font-size:12pt\">, 클럽 헤드는 바닥에서 공 쪽으로 이동</span></li>\r\n\t\t\t\t<li style=\"font-family:Pretendard Light;font-size:10pt\"><span lang=\"en-US\"><span style=\"font-family:Malgun Gothic;font-size:12pt\">Hook</span><span lang=\"ko-KR\" style=\"font-size:12pt\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic;font-size:12pt\">날</span><span lang=\"ko-KR\" style=\"font-size:12pt\">만큼 오른팔로 왼팔 덮으면서 타격</span></span></li>\r\n\t\t\t\t<li style=\"font-family:Pretendard Light;font-size:10pt\"><span style=\"font-size:12pt\">왼쪽 벽을 느끼면서 팔만 스윙</span></li>\r\n\t\t\t\t<li style=\"font-family:Pretendard Light;font-size:10pt\"><span style=\"font-size:12pt;font-weight:bold\">골반보다 손이 먼저 나가야 함</span></li>\r\n\t\t\t</ul>\r\n\t\t\t<p style=\"font-family:Pretendard Light;font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:12pt;font-weight:bold\">팔로우스루</span></p>\r\n\t\t\t<ul>\r\n\t\t\t\t<li style=\"font-family:Pretendard Light;font-size:10pt\"><span style=\"font-size:12pt;font-weight:bold\">왼팔은</span><span lang=\"en-US\" style=\"font-size:12pt;font-weight:bold\"> 11</span><span style=\"font-size:12pt;font-weight:bold\">시</span><span lang=\"en-US\" style=\"font-size:12pt;font-weight:bold\"> </span><span style=\"font-size:12pt;font-weight:bold\">방향으로</span><span lang=\"en-US\" style=\"font-size:12pt;font-weight:bold\"> </span><span style=\"font-size:12pt;font-weight:bold\">접어올리고</span><span lang=\"en-US\" style=\"font-size:12pt;font-weight:bold\">, </span><span style=\"font-size:12pt;font-weight:bold\">오른팔은</span><span lang=\"en-US\" style=\"font-size:12pt;font-weight:bold\"> </span><span style=\"font-size:12pt;font-weight:bold\">펴기</span></li>\r\n\t\t\t\t<li style=\"font-family:Pretendard Light;font-size:10pt\"><span style=\"font-size:12pt;font-weight:bold\">왼쪽 벽(왼쪽 체중 지지선)을 유지</span><span style=\"font-size:12pt\">하면서, 오른쪽 골반 회전</span><span style=\"font-size:12pt\">￼</span><span style=\"font-size:12pt\">→ 임팩트 후 오른 엉덩이 보이도록</span></li>\r\n\t\t\t\t<li style=\"font-family:Pretendard Light;font-size:10pt\"><span style=\"font-size:12pt\">발은 자연스럽게 따라오게</span></li>\r\n\t\t\t\t<li style=\"font-family:Pretendard Light;font-size:10pt\"><span style=\"font-size:12pt\">대칭 스윙</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\">(</span><span style=\"font-family:Malgun Gothic;font-size:12pt\">공이</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">팔</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">사이에</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">껴있다고</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">생각하고</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\">)</span><span style=\"font-size:12pt\">으로 팔을 빨리 접어 올리기</span></li>\r\n\t\t\t\t<li style=\"font-family:Calibri\"><span style=\"font-family:Malgun Gothic;font-size:12pt\">손목을</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">왼쪽으로</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">돌려서</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">손등이</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">바닥을</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">보면서</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\">, </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">우측</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">대각선</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\">(1</span><span style=\"font-family:Malgun Gothic;font-size:12pt\">시</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\">) </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">방향으로</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">크게</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">던지기</span></li>\r\n\t\t\t\t<br />\r\n\t\t\t</ul>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:Pretendard Light;font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Segoe UI Emoji;font-size:12pt\">&#127744; </span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt;font-weight:bold\">5</span><span style=\"font-size:12pt;font-weight:bold\">. 피니시 (Finish)</span></p>\r\n\t\t\t<ul>\r\n\t\t\t\t<li style=\"font-family:Pretendard Light;font-size:10pt\"><span style=\"font-size:12pt\">클럽</span><span lang=\"en-US\" style=\"font-size:12pt\"> </span><span style=\"font-size:12pt\">끝이</span><span lang=\"en-US\" style=\"font-size:12pt\"> </span><span style=\"font-size:12pt\">왼쪽</span><span lang=\"en-US\" style=\"font-size:12pt\"> </span><span style=\"font-size:12pt\">벽을</span><span lang=\"en-US\" style=\"font-size:12pt\"> </span><span style=\"font-size:12pt\">찌른다는</span><span lang=\"en-US\" style=\"font-size:12pt\"> </span><span style=\"font-size:12pt\">느낌으로</span><span lang=\"en-US\" style=\"font-size:12pt\"> </span><span style=\"font-size:12pt\">왼팔을</span><span lang=\"en-US\" style=\"font-size:12pt\"> </span><span style=\"font-size:12pt\">접어</span><span lang=\"en-US\" style=\"font-size:12pt\"> </span><span style=\"font-size:12pt\">올리기</span></li>\r\n\t\t\t\t<li style=\"font-family:Pretendard Light;font-size:10pt\"><span style=\"font-size:12pt\">뒤통수에 클럽 들어오게</span></li>\r\n\t\t\t\t<li style=\"font-family:Pretendard Light;font-size:10pt\"><span style=\"font-size:12pt\">골반 완전히 회전하고 피니시 후 3초간 유지하며</span><span lang=\"en-US\" style=\"font-size:12pt\"> </span><span style=\"font-size:12pt\">균형</span><span lang=\"en-US\" style=\"font-size:12pt\"> </span><span style=\"font-size:12pt\">감각</span><span lang=\"en-US\" style=\"font-size:12pt\"> </span><span style=\"font-size:12pt\">익히기</span></li>\r\n\t\t\t\t<li style=\"font-family:Pretendard Light;font-size:10pt\"><span style=\"font-size:12pt\">힙턴 시 왼쪽으로 빠지지 말고 고정 상태에서 스윙 이후 자연스럽게 턴</span></li>\r\n\t\t\t</ul>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:Pretendard Light;font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:12pt;font-weight:bold\">6. 특수 상황 대응</span></p>\r\n\t\t\t<p style=\"font-family:Pretendard Light;font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:12pt;font-weight:bold\">탄도 조절</span></p>\r\n\t\t\t<ul>\r\n\t\t\t\t<li style=\"font-family:Pretendard Light;font-size:10pt\"><span style=\"font-size:12pt\">탄도가 너무 뜰 때는 왼쪽 어깨까지만 끊어서 스윙</span></li>\r\n\t\t\t</ul>\r\n\t\t\t<p style=\"font-family:Pretendard Light;font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:12pt;font-weight:bold\">방향성 개선</span></p>\r\n\t\t\t<ul>\r\n\t\t\t\t<li style=\"font-family:Pretendard Light;font-size:10pt\"><span style=\"font-size:12pt\">너무 앞으로 길게 밀어서 왼쪽으로 가는 경향 방지</span></li>\r\n\t\t\t\t<li style=\"font-family:Pretendard Light;font-size:10pt\"><span style=\"font-size:12pt\">샤프트가 머리 뒤에 위치하도록 끊어치기</span></li>\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-family:Pretendard Light;font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic;font-size:12pt\">-&gt; </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic;font-size:12pt\">너무</span><span style=\"font-family:Malgun Gothic;font-size:12pt\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic;font-size:12pt\">앞으로</span><span style=\"font-family:Malgun Gothic;font-size:12pt\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic;font-size:12pt\">길게</span><span style=\"font-family:Malgun Gothic;font-size:12pt\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic;font-size:12pt\">밀어서</span><span style=\"font-family:Malgun Gothic;font-size:12pt\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic;font-size:12pt\">왼쪽으로</span><span style=\"font-family:Malgun Gothic;font-size:12pt\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic;font-size:12pt\">가는</span><span style=\"font-family:Malgun Gothic;font-size:12pt\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic;font-size:12pt\">경향</span><span style=\"font-family:Malgun Gothic;font-size:12pt\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic;font-size:12pt\">발생</span><span style=\"font-family:Malgun Gothic;font-size:12pt\">.</span></p>\r\n\t\t\t</ul>\r\n\t\t\t<p style=\"font-family:Pretendard Light;font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:12pt\">핵심은 골반 주도의 스윙과 1시 방향 궤적, 그리고 각 단계별 정확한 동작 순서를 지키는 것입니다.</span></p>\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<p data-tag=\"important\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic;font-size:12pt;font-weight:bold\">드라이버</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt;font-weight:bold\">: </span><span style=\"font-family:Malgun Gothic;font-size:12pt;font-weight:bold\">살짝</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt;font-weight:bold\"> Hook </span><span style=\"font-family:Malgun Gothic;font-size:12pt;font-weight:bold\">나면서</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt;font-weight:bold\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt;font-weight:bold\">돌아</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt;font-weight:bold\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt;font-weight:bold\">들어옴</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt;font-weight:bold\">. </span><span style=\"font-family:Malgun Gothic;font-size:12pt;font-weight:bold\">탄도가</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt;font-weight:bold\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt;font-weight:bold\">너무</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt;font-weight:bold\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt;font-weight:bold\">높음</span></p>\r\n\t\t\t<p style=\"font-family:Pretendard Light;font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Segoe UI Emoji;font-size:12pt;font-weight:bold\">✅</span><span style=\"font-size:12pt;font-weight:bold\"> 어드레스 (Address)</span></p>\r\n\t\t\t<p style=\"font-family:Pretendard Light;font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:12pt;font-weight:bold\">스탠스</span></p>\r\n\t\t\t<ul>\r\n\t\t\t\t<li style=\"font-family:Pretendard Light;font-size:10pt\"><span style=\"font-size:12pt\">양 발을 살짝 대각선으로 벌리고 스탠스 취하기</span></li>\r\n\t\t\t\t<li style=\"font-family:Pretendard Light;font-size:10pt\"><span style=\"font-size:12pt\">발에 하중을 싣고 준비</span></li>\r\n\t\t\t\t<li style=\"font-family:Pretendard Light;font-size:10pt\"><span style=\"font-size:12pt\">어깨는 평형 유지, 손 위치는 왼쪽으로 너무 치우치지 않게 자연스럽게 툭 내려놓기</span></li>\r\n\t\t\t\t<br />\r\n\t\t\t</ul>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:Pretendard Light;font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:12pt;font-weight:bold\">클럽 세팅</span></p>\r\n\t\t\t<ul>\r\n\t\t\t\t<li style=\"font-family:Pretendard Light;font-size:10pt\"><span style=\"font-size:12pt\">채를 툭 내려놓고, 스퀘어보다 살짝 열린 듯한 느낌 유지</span></li>\r\n\t\t\t\t<li style=\"font-family:Pretendard Light;font-size:10pt\"><span style=\"font-size:12pt\">배꼽과 클럽 사이에 주먹 하나 정도 간격 확보</span></li>\r\n\t\t\t\t<li style=\"font-family:Pretendard Light;font-size:10pt\"><span style=\"font-size:12pt\">어깨 평형, 손 위치 툭 내려놓고 왼쪽으로 너무 치우치지 않게</span></li>\r\n\t\t\t</ul>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:Pretendard Light;font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Segoe UI Emoji;font-size:12pt;font-weight:bold\">✅</span><span style=\"font-size:12pt;font-weight:bold\"> 테이크백 (Takeback)</span></p>\r\n\t\t\t<p style=\"font-family:Pretendard Light;font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:12pt;font-weight:bold\">팔 동작</span></p>\r\n\t\t\t<ul>\r\n\t\t\t\t<li style=\"font-family:Pretendard Light;font-size:10pt\"><span style=\"font-size:12pt\">오른팔을 허리까지 든다는 생각으로 멀리 들어올리기</span></li>\r\n\t\t\t\t<li style=\"font-family:Pretendard Light;font-size:10pt\"><span style=\"font-size:12pt\">리듬감</span><span lang=\"en-US\" style=\"font-size:12pt\"> </span><span style=\"font-size:12pt\">있게</span><span lang=\"en-US\" style=\"font-size:12pt\"> </span><span style=\"font-size:12pt\">테이크백, 손목은 낮게 유지</span></li>\r\n\t\t\t\t<li style=\"font-family:Pretendard Light;font-size:10pt\"><span style=\"font-size:12pt\">오른쪽 허벅지를 스치듯 올라가며 오른팔에 래깅 감각 만들기</span></li>\r\n\t\t\t\t<li style=\"font-family:Pretendard Light;font-size:10pt\"><span style=\"font-size:12pt\">끊기지 않게 리듬감 유지하면서 테이크백</span></li>\r\n\t\t\t</ul>\r\n\t\t\t<p style=\"font-family:Pretendard Light;font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:12pt;font-weight:bold\">체중이동</span></p>\r\n\t\t\t<ul>\r\n\t\t\t\t<li style=\"font-family:Pretendard Light;font-size:10pt\"><span style=\"font-size:12pt\">테이크백 시 오른발 휘지 않게 주의</span></li>\r\n\t\t\t\t<li style=\"font-family:Pretendard Light;font-size:10pt\"><span style=\"font-size:12pt\">뒤로 헤드 누우면서 떨어지는 궤적 그리기</span></li>\r\n\t\t\t\t<li style=\"font-family:Pretendard Light;font-size:10pt\"><span style=\"font-size:12pt\">아이언과 달리 채가 길어서 드라이버는 더 누운채로 들어옴</span></li>\r\n\t\t\t</ul>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:Pretendard Light;font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Segoe UI Emoji;font-size:12pt;font-weight:bold\">✅</span><span style=\"font-size:12pt;font-weight:bold\"> 스윙 (Swing)</span><span lang=\"en-US\" style=\"font-size:12pt;font-weight:bold\"> - </span><span style=\"font-size:12pt;font-weight:bold\">다운스윙 전환</span></p>\r\n\t\t\t<p style=\"font-family:Pretendard Light;font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Segoe UI Emoji;font-size:12pt;font-weight:bold\">✔</span><span style=\"font-size:12pt;font-weight:bold\"> 전환 및 하체 리드</span></p>\r\n\t\t\t<ul>\r\n\t\t\t\t<li style=\"font-family:Pretendard Light;font-size:10pt\"><span style=\"font-size:12pt\">왼쪽 무릎을 지긋이 눌러주며 바깥으로 회전, 동시에 왼쪽 골반은 (바깥쪽 말고) 뒤로 회전</span></li>\r\n\t\t\t\t<li style=\"font-family:Pretendard Light;font-size:10pt\"><span style=\"font-size:12pt\">오른쪽 발 안쪽이 지긋이 눌리면서 왼쪽 허리에 텐션 생성</span></li>\r\n\t\t\t\t<li style=\"font-family:Pretendard Light;font-size:10pt\"><span style=\"font-family:Malgun Gothic;font-size:12pt\">왼쪽</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">무릎을</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">지긋이</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">누르면서</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">왼쪽</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">바깥으로</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">회전</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\"> + </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">동시에</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">왼쪽</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">골반은</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\"> (</span><span style=\"font-family:Malgun Gothic;font-size:12pt\">바깥쪽</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">말고</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\">) </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">뒤로</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">회전</span></li>\r\n\t\t\t\t<li style=\"font-family:Pretendard Light;font-size:10pt\"><span style=\"font-family:Malgun Gothic;font-size:12pt\">왼팔은</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">쭉</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">뻗으면서</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\">, </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">오른팔을</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">펼치면서</span></li>\r\n\t\t\t\t<p style=\"font-family:Pretendard Light;font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic;font-size:12pt\">그립</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">끝이</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">공을</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">바라보게</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">내려오면서</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">헤드를</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">던져서</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">타격</span></p>\r\n\t\t\t\t<li style=\"font-family:Pretendard Light;font-size:10pt\"><span style=\"font-family:Malgun Gothic;font-size:12pt\">오른쪽</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">허벅지를</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">스친다는</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">느낌으로</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">그립부터</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">잡아</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">내려야함</span></li>\r\n\t\t\t\t<li style=\"font-family:Calibri\"><span style=\"font-family:Malgun Gothic;font-size:12pt\">오른쪽</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">발</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">안쪽이</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">지긋이</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">눌리면서</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">왼쪽</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">허리에</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">텐션이</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">생겼을때</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\">, </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">그걸</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">가지고</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">스윙</span></li>\r\n\t\t\t\t<li style=\"font-family:Pretendard Light;font-size:10pt\"><span style=\"font-size:12pt\">허리쯤에서 오른팔</span><span lang=\"en-US\" style=\"font-size:12pt\"> </span><span style=\"font-size:12pt\">→</span><span lang=\"en-US\" style=\"font-size:12pt\"> </span><span style=\"font-size:12pt\">왼팔로 전환 + 동시에 왼쪽 골반은 뒤로 회전</span></li>\r\n\t\t\t\t<li style=\"font-family:Pretendard Light;font-size:10pt\"><span style=\"font-size:12pt\">왼쪽 어깨를 닫은</span><span lang=\"en-US\" style=\"font-size:12pt\"> </span><span style=\"font-size:12pt\">상태에서, 골반이 1cm이라도 회전하고 난 후에 왼쪽 어깨 열기</span></li>\r\n\t\t\t</ul>\r\n\t\t\t<p style=\"font-family:Pretendard Light;font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Segoe UI Emoji;font-size:12pt;font-weight:bold\">✔</span><span style=\"font-size:12pt;font-weight:bold\"> 임팩트 전후</span></p>\r\n\t\t\t<ul>\r\n\t\t\t\t<li style=\"font-family:Pretendard Light;font-size:10pt\"><span style=\"font-size:12pt\">팔로만 치지 않고 골반 회전 주도 + 상하체 분리 유지</span></li>\r\n\t\t\t\t<li style=\"font-family:Pretendard Light;font-size:10pt\"><span style=\"font-size:12pt\">왼발을 쭉 뻗어 중심 고정, 턴 시 양발이 왼쪽으로 쏠리며 왼쪽 뒷꿈치에 체중 이동</span></li>\r\n\t\t\t\t<li style=\"font-family:Pretendard Light;font-size:10pt\"><span style=\"font-size:12pt\">오른쪽 어깨가 과하게 들리지 않게 주의 + 왼쪽 어깨가 턱 밑으로 들어왔다가 빠짐</span></li>\r\n\t\t\t\t<li style=\"font-family:Calibri\"><span style=\"font-family:Malgun Gothic;font-size:12pt\">스윙은</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">공을</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">치고</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">끝내지말고</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">지나가게</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\"> + </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">치킨윙</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">안되게</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">왼쪽으로</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">확실하게</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">돌면서</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">팔</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\"> 1</span><span style=\"font-family:Malgun Gothic;font-size:12pt\">시</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">방향으로</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">멀리</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">접어올리기</span></li>\r\n\t\t\t</ul>\r\n\t\t\t<p style=\"font-family:Pretendard Light;font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Segoe UI Emoji;font-size:12pt;font-weight:bold\">✔</span><span style=\"font-size:12pt;font-weight:bold\"> 임팩트 및 피니시</span></p>\r\n\t\t\t<ul>\r\n\t\t\t\t<li style=\"font-family:Pretendard Light;font-size:10pt\"><span style=\"font-size:12pt\">타격 순간 왼손등이 공을 향하고 폴 끝은 바닥 향하도록</span></li>\r\n\t\t\t\t<li style=\"font-family:Pretendard Light;font-size:10pt\"><span style=\"font-size:12pt\">팔은 L자로 꺾여 위로 올리며, 오른발은 뒤늦게 따라오게</span></li>\r\n\t\t\t\t<li style=\"font-family:Pretendard Light;font-size:10pt\"><span style=\"font-size:12pt\">피니시는 공을 끝내는 것이 아니라 </span><span style=\"font-size:12pt;font-weight:bold\">지나가듯 스윙</span><span style=\"font-size:12pt\">하며, 팔은 1시 방향으로 멀리 접어올리기</span></li>\r\n\t\t\t\t<li style=\"font-family:Pretendard Light;font-size:10pt\"><span style=\"font-size:12pt\">치킨윙 방지: 팔을 접지 않고 멀리 던지는 듯한 느낌으로 피니시</span></li>\r\n\t\t\t</ul>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:Pretendard Light;font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Segoe UI Emoji;font-size:12pt;font-weight:bold\">✅</span><span lang=\"en-US\" style=\"font-size:12pt;font-weight:bold\"> </span><span style=\"font-size:12pt;font-weight:bold\">4. 스윙 (Swing)</span></p>\r\n\t\t\t<p style=\"font-family:Pretendard Light;font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:12pt;font-weight:bold\">상하체 분리</span></p>\r\n\t\t\t<ul>\r\n\t\t\t\t<li style=\"font-family:Pretendard Light;font-size:10pt\"><span style=\"font-size:12pt\">어깨는 고정하고 팔로만 스윙</span></li>\r\n\t\t\t\t<li style=\"font-family:Pretendard Light;font-size:10pt\"><span style=\"font-size:12pt\">골반을 돌리면서 상하체 분리, 골반과 팔만 돌아가게</span></li>\r\n\t\t\t\t<li style=\"font-family:Pretendard Light;font-size:10pt\"><span style=\"font-size:12pt\">왼발을 쭉 뻗어서 스윙</span></li>\r\n\t\t\t</ul>\r\n\t\t\t<p style=\"font-family:Pretendard Light;font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:12pt;font-weight:bold\">가속과 래깅</span></p>\r\n\t\t\t<ul>\r\n\t\t\t\t<li style=\"font-family:Pretendard Light;font-size:10pt\"><span style=\"font-size:12pt\">채찍처럼 래깅해서 오른팔을 부드럽게</span></li>\r\n\t\t\t\t<li style=\"font-family:Pretendard Light;font-size:10pt\"><span style=\"font-size:12pt\">레깅, 타격전까지 최대 가속도로</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\">, </span><span style=\"font-size:12pt\">칠 때 가장 빠르게 가속</span></li>\r\n\t\t\t</ul>\r\n\t\t\t<p style=\"font-family:Pretendard Light;font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:12pt;font-weight:bold\">손목과 팔 동작</span></p>\r\n\t\t\t<ul>\r\n\t\t\t\t<li style=\"font-family:Pretendard Light;font-size:10pt\"><span style=\"font-size:12pt\">오른쪽 허벅지 스치면서 손목 회전</span></li>\r\n\t\t\t\t<li style=\"font-family:Pretendard Light;font-size:10pt\"><span style=\"font-size:12pt\">오른쪽 허벅지를 스친다는 느낌으로 그립부터 잡아 내리기</span></li>\r\n\t\t\t\t<li style=\"font-family:Pretendard Light;font-size:10pt\"><span style=\"font-size:12pt\">타격 시 왼팔이 올라오는데 손목을 낮게 유지하면서 손목 스위칭</span></li>\r\n\t\t\t\t<li style=\"font-family:Pretendard Light;font-size:10pt\"><span style=\"font-size:12pt\">오른손목이 위로 전환 하되 너무 많이 꺽으면 훅 발생 주의</span></li>\r\n\t\t\t</ul>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:Pretendard Light;font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:12pt;font-weight:bold\">5. 임팩트 &amp; 팔로우스루</span></p>\r\n\t\t\t<p style=\"font-family:Pretendard Light;font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:12pt;font-weight:bold\">임팩트</span></p>\r\n\t\t\t<ul>\r\n\t\t\t\t<li style=\"font-family:Pretendard Light;font-size:10pt\"><span style=\"font-size:12pt\">왼쪽 손등이 공을 향하고, 폴 끝 부분이 바닥을 향하도록</span></li>\r\n\t\t\t\t<li style=\"font-family:Pretendard Light;font-size:10pt\"><span style=\"font-size:12pt\">우측 뒷꿈치에 무게 옮기며 타격</span></li>\r\n\t\t\t\t<li style=\"font-family:Pretendard Light;font-size:10pt\"><span style=\"font-size:12pt\">골반 먼저 돌면서 타격</span></li>\r\n\t\t\t</ul>\r\n\t\t\t<p style=\"font-family:Pretendard Light;font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:12pt;font-weight:bold\">팔로우스루</span></p>\r\n\t\t\t<ul>\r\n\t\t\t\t<li style=\"font-family:Pretendard Light;font-size:10pt\"><span style=\"font-size:12pt\">타격과 동시에 왼쪽에 벽이 있다고 생각하고 팔을 L자로 꺽어 올리면서 피니시까지</span></li>\r\n\t\t\t\t<li style=\"font-family:Pretendard Light;font-size:10pt\"><span style=\"font-size:12pt\">치킨윙 안되게 1시방향으로 멀리 던지기</span></li>\r\n\t\t\t\t<li style=\"font-family:Pretendard Light;font-size:10pt\"><span style=\"font-size:12pt\">스윙은 공을 치고 끝내지 말고 지나가게</span></li>\r\n\t\t\t</ul>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:Pretendard Light;font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:12pt;font-weight:bold\">6. 피니시 (Finish)</span></p>\r\n\t\t\t<p style=\"font-family:Pretendard Light;font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:12pt;font-weight:bold\">어깨와 발 동작</span></p>\r\n\t\t\t<ul>\r\n\t\t\t\t<li style=\"font-family:Pretendard Light;font-size:10pt\"><span style=\"font-size:12pt\">오른쪽 어깨가 너무 들리지 않으면서 턱밑으로 들어오게</span></li>\r\n\t\t\t\t<li style=\"font-family:Pretendard Light;font-size:10pt\"><span style=\"font-size:12pt\">오른발은 팔이 올라온 뒤, 늦게 따라오게</span></li>\r\n\t\t\t\t<li style=\"font-family:Pretendard Light;font-size:10pt\"><span style=\"font-size:12pt\">턴할 때는 골반보다는 양 발이 왼쪽으로 쏠리면서 왼쪽 뒷꿈치로 무게 이동</span></li>\r\n\t\t\t</ul>\r\n\t\t\t<p style=\"font-family:Pretendard Light;font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:12pt;font-weight:bold\">최종 자세</span></p>\r\n\t\t\t<ul>\r\n\t\t\t\t<li style=\"font-family:Pretendard Light;font-size:10pt\"><span style=\"font-size:12pt\">치킨윙 안되게 왼쪽으로 확실하게 돌면서 팔 1시 방향으로 멀리 접어올리기</span></li>\r\n\t\t\t\t<li style=\"font-family:Calibri\"><span style=\"font-family:Malgun Gothic;font-size:12pt\">오른발은</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">팔이</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">올라온</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">뒤</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\">, </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">늦게</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt\">따라오게</span></li>\r\n\t\t\t\t<li style=\"font-family:Pretendard Light;font-size:10pt\"><span style=\"font-size:12pt\">턱밑에 왼쪽 어깨 들어왔다가 떨어지면서 완료</span></li>\r\n\t\t\t</ul>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:Pretendard Light;font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Segoe UI Emoji;font-size:12pt;font-weight:bold\">✅</span><span style=\"font-size:12pt;font-weight:bold\"> 추가 보정 팁</span></p>\r\n\t\t\t<p style=\"font-family:Pretendard Light;font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:12pt;font-weight:bold\">탄도 조절</span></p>\r\n\t\t\t<ul>\r\n\t\t\t\t<li style=\"font-family:Pretendard Light;font-size:10pt\"><span style=\"font-size:12pt\">탄도 높은 거 보정: 타격 시점에 왼손</span><span lang=\"en-US\" style=\"font-size:12pt\"> </span><span style=\"font-size:12pt\">등을 바깥쪽으로 좀더 말고</span></li>\r\n\t\t\t\t<p style=\"font-family:Pretendard Light;font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:12pt\">당구(오시) 상단을 맞춘다는 생각으로 타격</span></p>\r\n\t\t\t</ul>\r\n\t\t\t<p style=\"font-family:Pretendard Light;font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:12pt;font-weight:bold\">핵심 포인트</span></p>\r\n\t\t\t<ul>\r\n\t\t\t\t<li style=\"font-family:Pretendard Light;font-size:10pt\"><span style=\"font-size:12pt\">손목 전환은 테이크백과 비슷한 리듬으로, 일정한 스피드 유지</span></li>\r\n\t\t\t\t<li style=\"font-family:Pretendard Light;font-size:10pt\"><span style=\"font-size:12pt\">드라이버는 아이언보다 더 선채로 치므로 누운채로 들어옴을 인식</span></li>\r\n\t\t\t\t<li style=\"font-family:Pretendard Light;font-size:10pt\"><span style=\"font-size:12pt\">상하체 분리와 골반 주도의 스윙이 핵심</span></li>\r\n\t\t\t</ul>\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<table style=\"border:1px solid;border-collapse:collapse\">\r\n\t\t\t\t<tr>\r\n\t\t\t\t\t<td style=\"border:1px solid;font-family:Calibri\"><span style=\"font-family:Malgun Gothic;font-size:9pt\">어프로치</span></td>\r\n\t\t\t\t\t<td style=\"border:1px solid\"><p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:9pt\">10~20m: </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic;font-size:9pt\">볼은</span><span style=\"font-size:9pt\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic;font-size:9pt\">오른발</span><span style=\"font-size:9pt\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic;font-size:9pt\">앞</span><span style=\"font-size:9pt\">, </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic;font-size:9pt\">체중의</span><span style=\"font-size:9pt\"> 70%</span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic;font-size:9pt\">를</span><span style=\"font-size:9pt\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic;font-size:9pt\">왼쪽에</span><span style=\"font-size:9pt\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic;font-size:9pt\">싣고</span><span style=\"font-size:9pt\">, </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic;font-size:9pt\">페이스</span><span style=\"font-size:9pt\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic;font-size:9pt\">살짝</span><span style=\"font-size:9pt\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic;font-size:9pt\">닫기</span></p>\r\n\t\t\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic;font-size:9pt\">테이크백을</span><span style=\"font-size:9pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:9pt\">우측</span><span style=\"font-size:9pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:9pt\">상단</span><span style=\"font-size:9pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:9pt\">대각선</span><span style=\"font-size:9pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:9pt\">방향으로</span></p>\r\n\t\t\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic;font-size:9pt\">스탠스는</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:9pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:9pt\">양발</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:9pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:9pt\">붙이고</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:9pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:9pt\">왼발을</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:9pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:9pt\">살짝</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:9pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:9pt\">열면서</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:9pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:9pt\">뒤로</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:9pt\">, </span><span style=\"font-family:Malgun Gothic;font-size:9pt\">오른쪽</span><span lang=\"en-US\" style=\"font-size:9pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:9pt\">무릎까지</span><span lang=\"en-US\" style=\"font-size:9pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:9pt\">만</span><span lang=\"en-US\" style=\"font-size:9pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:9pt\">테이크백</span><span lang=\"en-US\" style=\"font-size:9pt\">, </span><span style=\"font-family:Malgun Gothic;font-size:9pt\">팔꿈치</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:9pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:9pt\">접지</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:9pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:9pt\">말고</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:9pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:9pt\">일직선으로</span><span lang=\"en-US\" style=\"font-size:9pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:9pt\">앞으로</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:9pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:9pt\">뻗기</span></p>\r\n\t\t\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:9pt\">￼</span><span style=\"font-size:9pt\">30~40m: </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic;font-size:9pt\">볼은</span><span style=\"font-size:9pt\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic;font-size:9pt\">가운데서</span><span style=\"font-size:9pt\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic;font-size:9pt\">볼</span><span style=\"font-size:9pt\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic;font-size:9pt\">하나</span><span style=\"font-size:9pt\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic;font-size:9pt\">우측으로</span><span style=\"font-size:9pt\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic;font-size:9pt\">두고</span><span style=\"font-size:9pt\">, </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic;font-size:9pt\">체중의</span><span style=\"font-size:9pt\"> 60% </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic;font-size:9pt\">정도</span><span style=\"font-size:9pt\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic;font-size:9pt\">왼발에</span><span style=\"font-size:9pt\">, </span></p>\r\n\t\t\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic;font-size:9pt\">스탠스는</span><span lang=\"en-US\" style=\"font-size:9pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:9pt\">어깨</span><span lang=\"en-US\" style=\"font-size:9pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:9pt\">넓이보다</span><span lang=\"en-US\" style=\"font-size:9pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:9pt\">좁게</span><span lang=\"en-US\" style=\"font-size:9pt\">, </span><span style=\"font-family:Malgun Gothic;font-size:9pt\">허리</span><span lang=\"en-US\" style=\"font-size:9pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:9pt\">돌리지말고</span><span lang=\"en-US\" style=\"font-size:9pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:9pt\">팔만으로</span><span lang=\"en-US\" style=\"font-size:9pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:9pt\">테이크백</span><span lang=\"en-US\" style=\"font-size:9pt\">, </span><span style=\"font-family:Malgun Gothic;font-size:9pt\">살짝</span><span lang=\"en-US\" style=\"font-size:9pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:9pt\">코킹</span><span lang=\"en-US\" style=\"font-size:9pt\">. </span><span style=\"font-family:Malgun Gothic;font-
