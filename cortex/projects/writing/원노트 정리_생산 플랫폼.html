<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>원노트 정리/생산 플랫폼</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1e1e1e; color: #e0e0e0; font-family: 'Segoe UI', -apple-system, sans-serif; font-size: 15px; line-height: 1.6; padding: 20px 30px 60px; overflow-x: hidden; }
a { color: #6cb0f6; text-decoration: none; }
a:hover { text-decoration: underline; }
.title-bar { background: #3a3a5c; display: inline-block; padding: 6px 16px; font-size: 22px; font-weight: bold; color: #fff; margin-bottom: 4px; }
.date { color: #999; font-size: 13px; margin-bottom: 20px; }
.board { position: relative; }
.card { background: #2a2a2a; border: 1px solid #3a3a3a; border-radius: 8px; padding: 12px; position: absolute; cursor: grab; transition: box-shadow 0.15s; overflow: hidden; }
.card:hover { box-shadow: 0 0 0 1px #58a6ff; z-index: 10; }
.card.moving { opacity: 0.8; box-shadow: 0 4px 24px rgba(0,0,0,0.6); z-index: 100; cursor: grabbing; }
.card img { width: 100%; border-radius: 4px; display: block; }
.card .text { outline: none; min-height: 20px; white-space: pre-wrap; word-break: break-word; }
.card .text:focus { background: rgba(255,255,255,0.05); border-radius: 4px; padding: 4px; }
.card .text:empty::before { content: '텍스트 입력...'; color: #555; }
.card-actions { position: absolute; top: 4px; right: 4px; display: none; gap: 4px; }
.card:hover .card-actions { display: flex; }
.card-btn { background: #333; border: 1px solid #555; color: #ccc; border-radius: 4px; padding: 2px 6px; font-size: 11px; cursor: pointer; }
.card-btn:hover { background: #444; color: #fff; }
.resize-handle { position: absolute; bottom: 0; right: 0; width: 16px; height: 16px; cursor: se-resize; opacity: 0; }
.card:hover .resize-handle { opacity: 0.6; }
.resize-handle::after { content: ''; position: absolute; bottom: 3px; right: 3px; width: 8px; height: 8px; border-right: 2px solid #666; border-bottom: 2px solid #666; }
.card.selected { box-shadow: 0 0 0 2px #58a6ff; z-index: 5; }
.highlight-red { color: #ff6b6b; }
.highlight-blue { color: #6cb0f6; }
.highlight-gold { color: #f0c040; }
.toolbar { position: fixed; bottom: 0; left: 0; right: 0; background: #161b22; border-top: 1px solid #30363d; padding: 8px 20px; display: flex; gap: 12px; align-items: center; z-index: 200; }
.toolbar button { background: #21262d; border: 1px solid #30363d; color: #e0e0e0; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; }
.toolbar button:hover { background: #30363d; }
.toolbar .status { color: #8b949e; font-size: 12px; margin-left: auto; }
#format-toolbar { position: fixed; display: none; background: #1c2128; border: 1px solid #444c56; border-radius: 8px; padding: 4px 6px; gap: 2px; align-items: center; z-index: 500; box-shadow: 0 4px 16px rgba(0,0,0,0.5); }
#format-toolbar button { background: none; border: none; color: #cdd9e5; padding: 4px 8px; border-radius: 5px; cursor: pointer; font-size: 13px; line-height: 1; }
#format-toolbar button:hover { background: #373e47; }
#format-toolbar .sep { width: 1px; height: 16px; background: #444c56; margin: 0 2px; }
</style>
</head>
<body>
<div class="title-bar" contenteditable="true">원노트 정리/생산 플랫폼</div>
<div class="date"></div>
<div class="board" id="board"></div>
<div id="format-toolbar">
  <button onmousedown="e=>e.preventDefault()" onclick="fmt('bold')" title="굵게"><b>B</b></button>
  <button onclick="fmt('italic')" title="기울임"><i>I</i></button>
  <button onclick="fmt('underline')" title="밑줄"><u>U</u></button>
  <div class="sep"></div>
  <button onclick="fmtLink()" title="링크 삽입">🔗</button>
  <button onclick="fmt('unlink')" title="링크 제거">✂</button>
</div>
<div class="toolbar">
  <button onclick="undo()" title="Ctrl+Z">↩ 실행취소</button>
  <button onclick="addTextCard()">+ 텍스트</button>
  <button onclick="addImageCard()">+ 이미지</button>
  <button onclick="addImageUrl()">+ 이미지 URL</button>
  <button onclick="addTableCard()">+ 표</button>
  <button onclick="saveBoard()">💾 저장</button>
  <button onclick="exportBoard()">📤 내보내기</button>
  <button onclick="resetLayout()">↺ 재배치</button>
  <button onclick="resetToDefaults()" style="color:#f85149">↺ 초기화</button>
  <div style="display:flex;align-items:center;gap:4px;margin-left:8px;border-left:1px solid #30363d;padding-left:12px;">
    <button onclick="zoomOut()" title="Ctrl+-" style="padding:6px 10px;">−</button>
    <span id="zoom-level" style="font-size:12px;color:#8b949e;min-width:36px;text-align:center;">100%</span>
    <button onclick="zoomIn()" title="Ctrl+=" style="padding:6px 10px;">+</button>
  </div>
  <span class="status" id="status">Ready</span>
</div>
<script>
const SAVE_KEY = 'board-원노트-정리-생산-플랫폼';

  {
    "type": "html",
    "x": 48,
    "y": 139,
    "w": 576,
    "html": "\r\n\t\t\t<ul>\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-family:Pretendard;margin-top:0pt;margin-bottom:0pt\">원노트 정리</p>\r\n\t\t\t\t<p lang=\"en-US\" data-tag=\"to-do\" style=\"font-family:Pretendard;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Pretendard Light;font-size:10pt\">사진첩, 인스타, 유튜브, 텔레그램 등 모든 플렛폼 구조를 para화</span></p>\r\n\t\t\t\t<p lang=\"en-US\" data-tag=\"to-do\" style=\"font-family:Pretendard;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Pretendard Light;font-size:10pt\">Target으로 구성된, Story, Sinarios</span></p>\r\n\t\t\t\t<p lang=\"en-US\" data-tag=\"to-do\" style=\"font-family:Pretendard;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Pretendard Light;font-size:10pt\">아카이브도 6개 pilars로 구분, 6개 영역으로 글쓰기를 할까?</span></p>\r\n\t\t\t\t<p lang=\"en-US\" data-tag=\"to-do\" style=\"font-family:Pretendard;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:10pt\">PARA 기</span><span style=\"font-size:10pt\">법으로</span><span style=\"font-size:10pt\"> 노</span><span style=\"font-size:10pt\">트정리</span><span style=\"font-size:10pt\">-Project 폴더 안에 리스트를 6개 pillars로 압축</span></p>\r\n\t\t\t\t<p lang=\"en-US\" data-tag=\"to-do\" style=\"font-family:Pretendard;margin-top:0pt;margin-bottom:0pt\">장기 - 연간, 분기, 월간 목표와 due가 정해지고</p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-family:Pretendard;margin-top:0pt;margin-bottom:0pt\">그게 이 페이지에 일단위로 쪼개져서 보여져야해. <span lang=\"ko-KR\">백캐스팅backcasting</span></p>\r\n\t\t\t\t<p lang=\"en-US\" data-tag=\"to-do\" style=\"font-family:Pretendard;margin-top:0pt;margin-bottom:0pt\">Zeroing은 결국 대쉬보드에 통합되어야함.</p>\r\n\t\t\t\t<p lang=\"en-US\" data-tag=\"to-do\" style=\"font-family:Pretendard;margin-top:0pt;margin-bottom:0pt\">방향을 조정하는 Helm</p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-family:Pretendard;margin-top:0pt;margin-bottom:0pt\">steering wheel</p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-family:Pretendard;margin-top:0pt;margin-bottom:0pt\">목표를 명중시키는</p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-family:Pretendard;margin-top:0pt;margin-bottom:0pt\">Approach, Aming, Targeting, </p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<br />\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-family:Pretendard;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Pretendard Light;font-size:10pt\">글/콘텐트 생산 프레임웤</span></p>\r\n\t\t\t\t<p lang=\"en-US\" data-tag=\"to-do\" style=\"font-family:Pretendard;margin-top:0pt;margin-bottom:0pt\"><a href=\"https://chatgpt.com/\">https://chatgpt.com/</a> + 영문으로 동시 작성</p>\r\n\t\t\t\t<p lang=\"en-US\" data-tag=\"to-do\" style=\"font-family:Pretendard;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Pretendard Light;font-size:10pt\">글의 목표와 요약 앞에 작성</span></p>\r\n\t\t\t\t<p lang=\"en-US\" data-tag=\"to-do\" style=\"font-family:Pretendard;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Pretendard Light;font-size:10pt\">글과 사진이 분리되기볻, 최대한 비쥬얼라이즈된  글         </span></p>\r\n\t\t\t\t<p data-tag=\"to-do\" style=\"font-family:Pretendard;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Pretendard Light;font-size:10pt\">인스타</span><span lang=\"en-US\" style=\"font-family:Pretendard Light;font-size:10pt\">/</span><span style=\"font-family:Pretendard Light;font-size:10pt\">쇼츠</span><span lang=\"en-US\" style=\"font-family:Pretendard Light;font-size:10pt\"> </span><span style=\"font-family:Pretendard Light;font-size:10pt\">계정</span><span lang=\"en-US\" style=\"font-family:Pretendard Light;font-size:10pt\"> </span><span style=\"font-family:Pretendard Light;font-size:10pt\">어떻게</span><span lang=\"en-US\" style=\"font-family:Pretendard Light;font-size:10pt\"> </span><span style=\"font-family:Pretendard Light;font-size:10pt\">만들고</span><span lang=\"en-US\" style=\"font-family:Pretendard Light;font-size:10pt\"> </span><span style=\"font-family:Pretendard Light;font-size:10pt\">운영할지</span><span lang=\"en-US\" style=\"font-family:Pretendard Light;font-size:10pt\">, </span><span style=\"font-family:Pretendard Light;font-size:10pt\">목적</span><span lang=\"en-US\" style=\"font-family:Pretendard Light;font-size:10pt\">-</span><span style=\"font-family:Pretendard Light;font-size:10pt\">스타트업</span><span lang=\"en-US\" style=\"font-family:Pretendard Light;font-size:10pt\"> </span><span style=\"font-family:Pretendard Light;font-size:10pt\">크루</span><span lang=\"en-US\" style=\"font-family:Pretendard Light;font-size:10pt\">/</span><span style=\"font-family:Pretendard Light;font-size:10pt\">투자자</span><span lang=\"en-US\" style=\"font-family:Pretendard Light;font-size:10pt\"> </span><span style=\"font-family:Pretendard Light;font-size:10pt\">어필.</span><span lang=\"en-US\" style=\"font-family:Pretendard Light;font-size:10pt\">Notedog, paperhound</span></p>\r\n\t\t\t\t<p lang=\"en-US\" data-tag=\"to-do\" style=\"font-family:Pretendard;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:10pt\">모든걸 실시간 콘텐츠화, 만난 사람, 읽은 책, 본 유튜브 등 모든 것을 각 채널에 적합하게 업로드. 티스토리, 브런치에 미러링 한다고 생각해. 모든 콘텐츠 영어로도 작성 with AI</span></p>\r\n\t\t\t\t<p lang=\"en-US\" data-tag=\"to-do\" style=\"font-family:Pretendard;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:10pt\">글감 선정 및 최종 퇴고 기준 정리</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-family:Pretendard;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:10pt\">흥미로운가</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-family:Pretendard;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:10pt\">에고가 지나치게 투영되지 않았는가</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-family:Pretendard;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:10pt\">시니컬하지 않은가</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-family:Pretendard;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:10pt\">정말하면서도 명확한가</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-family:Pretendard;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:10pt\">문제해결을 돕는가?</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-family:Pretendard;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:10pt\">솔루션/액션을 잘려하는가?</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-family:Pretendard;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:10pt\">공유될만한 글인가?</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-family:Pretendard;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:10pt\">+좋은 글의 요건 찾아보기</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-family:Pretendard;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Pretendard Light;font-size:10pt\">앞뒤에 세줄 요약</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-family:Pretendard;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Pretendard Light;font-size:10pt\">맨 앞에 글의 목표와 타겟 독자 명시</span></p>\r\n\t\t\t\t<p data-tag=\"to-do\" style=\"font-family:Pretendard;margin-top:0pt;margin-bottom:0pt\"><a href=\"https://eopla.net/magazines/19039#\" style=\"font-family:Pretendard Light;font-size:10pt\">경브</a><span lang=\"en-US\" style=\"font-family:Pretendard Light;font-size:10pt\"> </span><span style=\"font-family:Pretendard Light;font-size:10pt\">아티클</span><span lang=\"en-US\" style=\"font-family:Pretendard Light;font-size:10pt\"> </span><span style=\"font-family:Pretendard Light;font-size:10pt\">테스트로</span><span lang=\"en-US\" style=\"font-family:Pretendard Light;font-size:10pt\"> </span><span style=\"font-family:Pretendard Light;font-size:10pt\">인스타</span><span lang=\"en-US\" style=\"font-family:Pretendard Light;font-size:10pt\">, </span><span style=\"font-family:Pretendard Light;font-size:10pt\">틱톡</span><span lang=\"en-US\" style=\"font-family:Pretendard Light;font-size:10pt\"> </span><span style=\"font-family:Pretendard Light;font-size:10pt\">업로드</span></p>\r\n\t\t\t\t<p style=\"font-family:Pretendard;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Pretendard Light;font-size:10pt\">글</span><span lang=\"en-US\" style=\"font-family:Pretendard Light;font-size:10pt\">그램 어플이나 칸바, 피그마 등 </span><a href=\"https://eopla.net/magazines/19039#\" lang=\"en-US\" style=\"font-family:Pretendard Light;font-size:10pt\">활용</a></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<br />\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-family:Pretendard;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Pretendard Light;font-size:10pt\">목표: 팬덤, 내 생각을 토대로 크루들을 레버리지</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-family:Pretendard;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Pretendard Light;font-size:10pt\">0/ 블로그 벤치마킹- 조성문, 전종현, 비즈카페, 더레이저 작가</span></p>\r\n\t\t\t\t<p lang=\"en-US\" data-tag=\"to-do\" style=\"font-family:Pretendard;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Pretendard Light;font-size:10pt\">1/ 쓰고싶은 글의 카테고리 정하기</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-family:Pretendard;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Pretendard Light;font-size:10pt\">- 업무,문서공학, 메모, 6개 필러, HBR, 10분운동, 독서, 관계, 일방혁, 컬쳐덱(NFLX같은), 좋은기분 같은책, 신입사원 온보딩을 위한 스킬들, </span><a href=\"https://publy.co/content/6899?fr=guide&amp;g_id=78&amp;id=1958\" style=\"font-family:Pretendard Light;font-size:10pt\">TIL</a></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-family:Pretendard;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Pretendard Light;font-size:10pt\">저자로서의 나의 아이덴티티 확립 - 브랜딩</span></p>\r\n\t\t\t\t<p lang=\"en-US\" data-tag=\"to-do\" style=\"font-family:Pretendard;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Pretendard Light;font-size:10pt\">2/ 일단 모든 플랫폼 순차적으로 써보기</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-family:Pretendard;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Pretendard Light;font-size:10pt\">3/ 원소스 멀티유즈 프레임웤 만들어서 생산성 극대화하기</span></p>\r\n\t\t\t\t<table style=\"border:1px solid;border-collapse:collapse\">\r\n\t\t\t\t\t<tr>\r\n\t\t\t\t\t\t<td style=\"border:1px solid;font-family:Pretendard\"><span lang=\"en-US\"><span style=\"font-family:Pretendard Light;font-size:10pt\">인스타</span></span></td>\r\n\t\t\t\t\t\t<td style=\"border:1px solid\"><br />\r\n\t\t\t\t\t\t</td>\r\n\t\t\t\t\t</tr>\r\n\t\t\t\t\t<tr>\r\n\t\t\t\t\t\t<td style=\"border:1px solid;font-family:Pretendard\"><span lang=\"en-US\"><span style=\"font-family:Pretendard Light;font-size:10pt\">스레드</span></span></td>\r\n\t\t\t\t\t\t<td style=\"border:1px solid\"><br />\r\n\t\t\t\t\t\t</td>\r\n\t\t\t\t\t</tr>\r\n\t\t\t\t\t<tr>\r\n\t\t\t\t\t\t<td style=\"border:1px solid;font-family:Pretendard\"><span lang=\"en-US\"><span style=\"font-family:Pretendard Light;font-size:10pt\">트위터</span></span></td>\r\n\t\t\t\t\t\t<td style=\"border:1px solid\"><br />\r\n\t\t\t\t\t\t</td>\r\n\t\t\t\t\t</tr>\r\n\t\t\t\t\t<tr>\r\n\t\t\t\t\t\t<td style=\"border:1px solid;font-family:Pretendard\"><span lang=\"en-US\"><span style=\"font-family:Pretendard Light;font-size:10pt\">브런치</span></span></td>\r\n\t\t\t\t\t\t<td style=\"border:1px solid\">\t\t\t\t\t\t<ul>\r\n\t\t\t\t\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:var(--font-fk-grotesk);font-size:18pt\">브런치스토리 (카카오)</span></p>\r\n\t\t\t\t\t\t\t<li style=\"font-family:Calibri\"><span lang=\"en-US\"><span style=\"font-family:__fkGroteskNeue_598ab8;font-size:12pt\">진중하고 에세이 형태의 글이 많음</span></span></li>\r\n\t\t\t\t\t\t\t<li style=\"font-family:Calibri\"><span lang=\"en-US\"><span style=\"font-family:__fkGroteskNeue_598ab8;font-size:12pt\">책 출간 및 강연 기회 제공</span></span></li>\r\n\t\t\t\t\t\t\t<li style=\"font-family:Calibri\"><span lang=\"en-US\"><span style=\"font-family:__fkGroteskNeue_598ab8;font-size:12pt\">직접적인 광고 수익은 없음</span></span></li>\r\n\t\t\t\t\t\t\t<li style=\"font-family:Calibri\"><span lang=\"en-US\"><span style=\"font-family:__fkGroteskNeue_598ab8;font-size:12pt\">작가-</span><span style=\"font-family:__fkGroteskNeue_598ab8;font-size:12pt\">독자</span><span style=\"font-family:__fkGroteskNeue_598ab8;font-size:12pt\"> </span><span style=\"font-family:__fkGroteskNeue_598ab8;font-size:12pt\">간</span><span style=\"font-family:__fkGroteskNeue_598ab8;font-size:12pt\"> </span><span style=\"font-family:__fkGroteskNeue_598ab8;font-size:12pt\">소통에</span><span style=\"font-family:__fkGroteskNeue_598ab8;font-size:12pt\"> </span><span style=\"font-family:__fkGroteskNeue_598ab8;font-size:12pt\">중점</span></span></li>\r\n\t\t\t\t\t\t\t<li style=\"font-family:Calibri\"><span lang=\"en-US\"><span style=\"font-family:Noto Sans KR;color:#85827f;background-color:#191a1a;font-weight:bold\">브런치</span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">는</span><span lang=\"ko-KR\"> &#39;</span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">글이 작품이 되는 공간</span><span lang=\"ko-KR\">&#39;</span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">이란 캐치프레이즈에 맞게 글쓰기에 방해되는 부산물을 과감히 치우고 여백의 에디터만 남겼다</span><span lang=\"ko-KR\">. </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">브런치에서 부여한 작가라는 타이틀은 여기에 기름을 붓는다</span><span lang=\"ko-KR\">. </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">무엇이든 쓸 수 있을 것 같은 욕망이 올라온다</span><span lang=\"ko-KR\">. </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">많은 블로그의 단점인 구독 시스템 부재도 독자들이 별도의 앱으로 알림을 받을 수 있도록 만들어 두었다</span><span lang=\"ko-KR\">. </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">잘만하면 책도 낼 수 있을 것 같은 생각도 든다</span><span lang=\"ko-KR\">. </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">그동안 작성했던 대부분의 글을 브런치로 옮기며 글을 쓰기 시작했다</span><span lang=\"ko-KR\">. </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">하지만 여러 장점에도 불구하고 브런치를 그만 두기로 했다</span><span lang=\"ko-KR\">. 1</span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">천 명이 넘는 구독자를 포기하면서</span><span lang=\"ko-KR\">. </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">왜 그랬을까</span><span lang=\"ko-KR\">. </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">나는 브런치의 수익 시스템이 마음에 들지 않았다</span><span lang=\"ko-KR\">.&#160;</span><span lang=\"ko-KR\" style=\"font-family:Noto Sans KR;color:#85827f;background-color:#191a1a;font-weight:bold\">나는 내 글이 무료로 소비되는 게 싫었다.</span><span lang=\"ko-KR\">&#160;&quot;</span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">너만 잘하면 돼</span><span lang=\"ko-KR\">, </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">기회는 열려있어</span><span lang=\"ko-KR\">&quot;</span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">라는 희망 역시 바닥을 드러냈다</span><span lang=\"ko-KR\">. </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">브런치는 작가들을 존중했지만 나는 내 글이 하찮게 소비된다고 생각했다</span><span lang=\"ko-KR\">. </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">더 이상 남의 시스템을 돌리는 콘텐츠 제공자가 되고 싶지 않았</span></span></li>\r\n\t\t\t\t\t\t\t<li style=\"font-family:Calibri\"><span style=\"font-family:Malgun Gothic\">다</span>. <span style=\"font-family:Malgun Gothic\">그래서 모든 글을 내리기로 결정했다</span>. <span style=\"font-family:Malgun Gothic\">그럼에도 불구하고 구독자는 매일 늘었다</span>. <span style=\"font-family:Malgun Gothic\">글이 없는데 구독자가 늘고 있다니</span>. <span style=\"font-family:Malgun Gothic\">이런 현상을 보면서 브런치에 대한 미련도 사라졌다</span>. <span style=\"font-family:Malgun Gothic\">그리고 돌아가고 싶다는 생각을 단 한 번도 하지 않았다</span>.</li>\r\n\t\t\t\t\t\t\t<li><br />\r\n\t\t\t\t\t\t\t</li>\r\n\t\t\t\t\t\t\t<li style=\"font-family:Calibri\"><span lang=\"en-US\"><span style=\"font-family:Noto Sans KR;font-size:10pt;color:#86837f;background-color:#191a1a\">장점</span></span></li>\r\n\t\t\t\t\t\t\t<li style=\"font-family:Calibri\"><span lang=\"en-US\"><span style=\"font-family:Noto Sans KR;font-size:10pt;color:#86837f;background-color:#191a1a\">한국의 미디엄(Medium)</span></span></li>\r\n\t\t\t\t\t\t\t<li style=\"font-family:Calibri\"><span lang=\"en-US\"><span style=\"font-family:Noto Sans KR;font-size:10pt;color:#86837f;background-color:#191a1a\">유려한 디자인, UI, 이쁘고 또 이쁘다.</span></span></li>\r\n\t\t\t\t\t\t\t<li style=\"font-family:Calibri\"><span lang=\"en-US\"><span style=\"font-family:Noto Sans KR;font-size:10pt;color:#86837f;background-color:#191a1a\">뛰어난 컨텐츠, 필력 좋은 작가가 많다.</span></span></li>\r\n\t\t\t\t\t\t\t<li style=\"font-family:Calibri\"><span lang=\"en-US\"><span style=\"font-family:Noto Sans KR;font-size:10pt;color:#86837f;background-color:#191a1a\">단점</span></span></li>\r\n\t\t\t\t\t\t\t<li style=\"font-family:Calibri\"><span lang=\"en-US\"><span style=\"font-family:Noto Sans KR;font-size:10pt;color:#86837f;background-color:#191a1a\">마크다운 미지원</span></span></li>\r\n\t\t\t\t\t\t\t<li style=\"font-family:Calibri\"><span lang=\"en-US\"><span style=\"font-family:Noto Sans KR;font-size:10pt;color:#86837f;background-color:#191a1a\">아직은 이쁜 것 말고 또 다른 장점을 찾기가 어렵다.</span></span></li>\r\n\t\t\t\t\t\t\t<li style=\"font-family:Calibri\"><span lang=\"en-US\"><span style=\"font-family:Noto Sans KR;font-size:10pt;color:#86837f;background-color:#191a1a\">블로그 이전 등을 위한 데이터 내보내기 기능 미지원</span></span></li>\r\n\t\t\t\t\t\t\t<li style=\"font-family:Calibri\"><span lang=\"en-US\"><span style=\"font-family:Noto Sans KR;font-size:10pt;color:#86837f;background-color:#191a1a\">구글 외 검색엔진으로부터의 유입이 상대적으로 적은 느낌</span></span></li>\r\n\t\t\t\t\t\t\t<li style=\"font-family:Calibri\"><span lang=\"en-US\"><span style=\"font-family:Noto Sans KR;font-size:10pt;color:#86837f;background-color:#191a1a\">출시 </span><span style=\"font-family:Noto Sans KR;font-size:10pt;color:#86837f;background-color:#191a1a\">당시부터</span><span style=\"font-family:Noto Sans KR;font-size:10pt;color:#86837f;background-color:#191a1a\"> </span><span style=\"font-family:Noto Sans KR;font-size:10pt;color:#86837f;background-color:#191a1a\">출판의</span><span style=\"font-family:Noto Sans KR;font-size:10pt;color:#86837f;background-color:#191a1a\"> </span><span style=\"font-family:Noto Sans KR;font-size:10pt;color:#86837f;background-color:#191a1a\">목적이</span><span style=\"font-family:Noto Sans KR;font-size:10pt;color:#86837f;background-color:#191a1a\"> </span><span style=\"font-family:Noto Sans KR;font-size:10pt;color:#86837f;background-color:#191a1a\">많은</span><span style=\"font-family:Noto Sans KR;font-size:10pt;color:#86837f;background-color:#191a1a\"> </span><span style=\"font-family:Noto Sans KR;font-size:10pt;color:#86837f;background-color:#191a1a\">작가의</span><span style=\"font-family:Noto Sans KR;font-size:10pt;color:#86837f;background-color:#191a1a\"> </span><span style=\"font-family:Noto Sans KR;font-size:10pt;color:#86837f;background-color:#191a1a\">유입과</span><span style=\"font-family:Noto Sans KR;font-size:10pt;color:#86837f;background-color:#191a1a\"> </span><span style=\"font-family:Noto Sans KR;font-size:10pt;color:#86837f;background-color:#191a1a\">방향성이</span><span style=\"font-family:Noto Sans KR;font-size:10pt;color:#86837f;background-color:#191a1a\"> </span><span style=\"font-family:Noto Sans KR;font-size:10pt;color:#86837f;background-color:#191a1a\">진입을</span><span style=\"font-family:Noto Sans KR;font-size:10pt;color:#86837f;background-color:#191a1a\"> </span><span style=\"font-family:Noto Sans KR;font-size:10pt;color:#86837f;background-color:#191a1a\">어렵게</span><span style=\"font-family:Noto Sans KR;font-size:10pt;color:#86837f;background-color:#191a1a\"> </span><span style=\"font-family:Noto Sans KR;font-size:10pt;color:#86837f;background-color:#191a1a\">하는</span><span style=\"font-family:Noto Sans KR;font-size:10pt;color:#86837f;background-color:#191a1a\"> </span><span style=\"font-family:Noto Sans KR;font-size:10pt;color:#86837f;background-color:#191a1a\">요인</span></span></li>\r\n\t\t\t\t\t\t\t<br />\r\n\t\t\t\t\t\t</ul>\r\n\t\t\t\t\t\t<br />\r\n\t\t\t\t\t\t<br />\r\n\t\t\t\t\t\t</td>\r\n\t\t\t\t\t</tr>\r\n\t\t\t\t\t<tr>\r\n\t\t\t\t\t\t<td style=\"border:1px solid;font-family:Pretendard\"><span lang=\"en-US\"><span style=\"font-family:Pretendard Light;font-size:10pt\">티스토리</span></span></td>\r\n\t\t\t\t\t\t<td style=\"border:1px solid\">\t\t\t\t\t\t<ul>\r\n\t\t\t\t\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:var(--font-fk-grotesk);font-size:18pt\">티스토리 (카카오)</span></p>\r\n\t\t\t\t\t\t\t<li style=\"font-family:Calibri\"><span lang=\"en-US\"><span style=\"font-family:__fkGroteskNeue_598ab8;font-size:12pt\">블로그 플랫폼</span></span></li>\r\n\t\t\t\t\t\t\t<li style=\"font-family:Calibri\"><span lang=\"en-US\"><span style=\"font-family:__fkGroteskNeue_598ab8;font-size:12pt\">커스터마이징 자유도가 높음</span></span></li>\r\n\t\t\t\t\t\t\t<li style=\"font-family:Calibri\"><span lang=\"en-US\"><span style=\"font-family:__fkGroteskNeue_598ab8;font-size:12pt\">광고 </span><span style=\"font-family:__fkGroteskNeue_598ab8;font-size:12pt\">수익</span><span style=\"font-family:__fkGroteskNeue_598ab8;font-size:12pt\"> </span><span style=\"font-family:__fkGroteskNeue_598ab8;font-size:12pt\">창출</span><span style=\"font-family:__fkGroteskNeue_598ab8;font-size:12pt\"> </span><span style=\"font-family:__fkGroteskNeue_598ab8;font-size:12pt\">가능</span></span></li>\r\n\t\t\t\t\t\t\t<li style=\"font-family:Calibri\"><span style=\"font-family:Malgun Gothic;font-weight:bold\">티스토리</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\">는 블로그 광고로</span>&#160;<span style=\"font-family:Malgun Gothic;font-weight:bold\">몇 백원부터 시작해 수익이 커가는 모습을 보면서 글을 써보고 싶은 경우</span>&#160;<span lang=\"en-US\" style=\"font-family:Malgun Gothic\">추천하고 싶다</span><span lang=\"en-US\">. </span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\">얼마 전까지만 해도 티스토리 에디터는 보고 있는 것만으로도 글쓰기 욕구가 사라질 정도로 최악이었지만 지금</span><span lang=\"en-US\">(2020</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\">년</span><span lang=\"en-US\"> 1</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\">월 현재</span><span lang=\"en-US\">) </span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\">완전히 바뀌었다</span><span lang=\"en-US\">. </span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\">깔끔한 브런치 에디터를 이제는 부러워하지 않아도 된다</span><span lang=\"en-US\">. HTML/CSS</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\">를 아는 사람은 원하는 모양으로 블로그를 바꿀 수 있는 장점도 있다</span><span lang=\"en-US\">. </span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\">네이버의 트래픽이 사실 상 없다고 보면 되기 때문에 열심히 쓴 글이 초반에는 조회 수가 한자리를 넘어가는 것이 어려울 수 있는 것은 단점이다</span><span lang=\"en-US\">.</span></li>\r\n\t\t\t\t\t\t\t<li style=\"font-family:Calibri\"><span lang=\"en-US\"><span style=\"font-family:Noto Sans KR;font-size:10pt;color:#86837f;background-color:#191a1a\">장점</span></span></li>\r\n\t\t\t\t\t\t\t<li style=\"font-family:Calibri\"><span lang=\"en-US\"><span style=\"font-family:Noto Sans KR;font-size:10pt;color:#86837f;background-color:#191a1a\">(이전에 사용했던 플랫폼으로 익숙하다)</span></span></li>\r\n\t\t\t\t\t\t\t<li style=\"font-family:Calibri\"><span lang=\"en-US\"><span style=\"font-family:Noto Sans KR;font-size:10pt;color:#86837f;background-color:#191a1a\">관련 모든 코드를 직접 수정할 수 있어 커스터마이징에 대한 자유도가 높다.</span></span></li>\r\n\t\t\t\t\t\t\t<li style=\"font-family:Calibri\"><span lang=\"en-US\"><span style=\"font-family:Noto Sans KR;font-size:10pt;color:#86837f;background-color:#191a1a\">테마, 플러그인 등등 지원하는 기능이 많다.</span></span></li>\r\n\t\t\t\t\t\t\t<li style=\"font-family:Calibri\"><span lang=\"en-US\"><span style=\"font-family:Noto Sans KR;font-size:10pt;color:#86837f;background-color:#191a1a\">팀 블로그로 운영할 수 있다.</span></span></li>\r\n\t\t\t\t\t\t\t<li style=\"font-family:Calibri\"><span lang=\"en-US\"><span style=\"font-family:Noto Sans KR;font-size:10pt;color:#86837f;background-color:#191a1a\">구글 애드센스 적용 가능</span></span></li>\r\n\t\t\t\t\t\t\t<li style=\"font-family:Calibri\"><span lang=\"en-US\"><span style=\"font-family:Noto Sans KR;font-size:10pt;color:#86837f;background-color:#191a1a\">마크다운 지원</span></span></li>\r\n\t\t\t\t\t\t\t<li style=\"font-family:Calibri\"><span lang=\"en-US\"><span style=\"font-family:Noto Sans KR;font-size:10pt;color:#86837f;background-color:#191a1a\">단점</span></span></li>\r\n\t\t\t\t\t\t\t<li style=\"font-family:Calibri\"><span lang=\"en-US\"><span style=\"font-family:Noto Sans KR;font-size:10pt;color:#86837f;background-color:#191a1a;text-decoration:line-through\">초대장을 받아야 한다.</span></span></li>\r\n\t\t\t\t\t\t\t<li style=\"font-family:Calibri\"><span lang=\"en-US\"><span style=\"font-family:Noto Sans KR;font-size:10pt;color:#86837f;background-color:#191a1a;text-decoration:line-through\">마크다운 미지원</span></span></li>\r\n\t\t\t\t\t\t\t<li style=\"font-family:Calibri\"><span lang=\"en-US\"><span style=\"font-family:Noto Sans KR;font-size:10pt;color:#86837f;background-color:#191a1a\">개발자가 아니면 조금 어렵고 복잡하게 느껴질 수 있다.</span></span></li>\r\n\t\t\t\t\t\t\t<li style=\"font-family:Calibri\"><span lang=\"en-US\"><span style=\"font-family:Noto Sans KR;font-size:10pt;color:#86837f;background-color:#191a1a\">너무 높은 자유도가 오히려 단점일 수 있다?</span></span></li>\r\n\t\t\t\t\t\t\t<li style=\"font-family:Calibri\"><span lang=\"en-US\"><span style=\"font-family:Noto Sans KR;font-size:10pt;color:#86837f;background-color:#191a1a\">정형화된 레이아웃과 테마, 따로 노는듯한 수많은 배너와 광고</span></span></li>\r\n\t\t\t\t\t\t\t<br />\r\n\t\t\t\t\t\t</ul>\r\n\t\t\t\t\t\t<br />\r\n\t\t\t\t\t\t</td>\r\n\t\t\t\t\t</tr>\r\n\t\t\t\t\t<tr>\r\n\t\t\t\t\t\t<td style=\"border:1px solid;font-family:Pretendard\"><span lang=\"en-US\"><span style=\"font-family:Pretendard Light;font-size:10pt\">미디엄</span></span></td>\r\n\t\t\t\t\t\t<td style=\"border:1px solid\">\t\t\t\t\t\t<ul>\r\n\t\t\t\t\t\t\t<li style=\"font-family:Calibri\"><span lang=\"en-US\"><span style=\"font-family:Noto Sans KR;font-size:10pt;color:#86837f;background-color:#191a1a\">장점</span></span></li>\r\n\t\t\t\t\t\t\t<li style=\"font-family:Calibri\"><span lang=\"en-US\"><span style=\"font-family:Noto Sans KR;font-size:10pt;color:#86837f;background-color:#191a1a\">마크다운 지원</span></span></li>\r\n\t\t\t\t\t\t\t<li style=\"font-family:Calibri\"><span lang=\"en-US\"><span style=\"font-family:Noto Sans KR;font-size:10pt;color:#86837f;background-color:#191a1a\">유려한 디자인과 UI, 역시 이쁘다.</span></span></li>\r\n\t\t\t\t\t\t\t<li style=\"font-family:Calibri\"><span lang=\"en-US\"><span style=\"font-family:Noto Sans KR;font-size:10pt;color:#86837f;background-color:#191a1a\">디지털 출판이라는 목적에 최적화</span></span></li>\r\n\t\t\t\t\t\t\t<li style=\"font-family:Calibri\"><span lang=\"en-US\"><span style=\"font-family:Noto Sans KR;font-size:10pt;color:#86837f;background-color:#191a1a\">문단에 댓글을 달 수 있는 방식이 굉장히 직관적</span></span></li>\r\n\t\t\t\t\t\t\t<li style=\"font-family:Calibri\"><span lang=\"en-US\"><span style=\"font-family:Noto Sans KR;font-size:10pt;color:#86837f;background-color:#191a1a\">다른 블로그에서 가져오기 기능 제공(?)</span></span></li>\r\n\t\t\t\t\t\t\t<li style=\"font-family:Calibri\"><span lang=\"en-US\"><span style=\"font-family:Noto Sans KR;font-size:10pt;color:#86837f;background-color:#191a1a\">단점</span></span></li>\r\n\t\t\t\t\t\t\t<li style=\"font-family:Calibri\"><span lang=\"en-US\"><span style=\"font-family:Noto Sans KR;font-size:10pt;color:#86837f;background-color:#191a1a\">국내 검색엔진에서의 접근이 어려운 것 같은 느낌</span></span></li>\r\n\t\t\t\t\t\t\t<li style=\"font-family:Calibri\"><span lang=\"en-US\"><span style=\"font-family:Noto Sans KR;font-size:10pt;color:#86837f;background-color:#191a1a\">생각보다(?) 커스터마이징에 제한적</span></span></li>\r\n\t\t\t\t\t\t\t<li style=\"font-family:Calibri\"><span lang=\"en-US\"><span style=\"font-family:Noto Sans KR;font-size:10pt;color:#86837f;background-color:#191a1a\">한글 서식이 생각보다 별로(?)</span></span></li>\r\n\t\t\t\t\t\t\t<li style=\"font-family:Calibri\"><span lang=\"en-US\"><span style=\"font-family:Noto Sans KR;font-size:10pt;color:#86837f;background-color:#191a1a\">애드센스 불가능</span></span></li>\r\n\t\t\t\t\t\t</ul>\r\n\t\t\t\t\t\t</td>\r\n\t\t\t\t\t</tr>\r\n\t\t\t\t\t<tr>\r\n\t\t\t\t\t\t<td style=\"border:1px solid;font-family:Pretendard\"><span lang=\"en-US\"><span style=\"font-family:Pretendard Light;font-size:10pt\">깃허브</span></span></td>\r\n\t\t\t\t\t\t<td style=\"border:1px solid\">\t\t\t\t\t\t<ul>\r\n\t\t\t\t\t\t\t<p lang=\"en-US\" style=\"font-family:Pretendard;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Noto Sans KR;color:#85827f;background-color:#191a1a;font-weight:bold\">깃허브</span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">는 개발자들이 코드를 공유하고 협업할 수 있는 온라인 코드 저장소인데 기본적으로 마크다운</span><span lang=\"ko-KR\">(Markdown)</span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">을 이용해 정적 페이지를 호스팅 할 수 있게 되어 있다</span><span lang=\"ko-KR\">. </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">하지만 이렇게 할 경우 지속적으로 온라인에 글을 게시하는데 불편이 있다</span><span lang=\"ko-KR\">. </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">추가로 지킬</span><span lang=\"ko-KR\">(Jekyll)</span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">이라는 서비스를 붙이면 마크다운으로 작성한 글을 호스팅 비용 없이 서비스할 수 있다</span><span lang=\"ko-KR\">. </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">구글 애드센스도 붙일 수 있기 때문에</span><span lang=\"ko-KR\">&#160;</span><span lang=\"ko-KR\" style=\"font-family:Noto Sans KR;color:#85827f;background-color:#191a1a;font-weight:bold\">개발자라면 적극적으로 고려</span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">해볼만 하다</span><span lang=\"ko-KR\">. </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">마크다운으로 작성한 다음</span><span lang=\"ko-KR\"> git add/commit/push </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">하면 터미널에서도 글을 포스팅할 수 있다</span><span lang=\"ko-KR\">. </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">이미지를 직접 호스팅 할 수 없고 글쓰기에 온전히 시간을 쓰는 것이 아니라 초기 환경을 직접 만들어야 한다는 것은 단점이다</span><span lang=\"ko-KR\">. </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">개발을 전혀 모르고 흥미가 없는 사람은 고려 대상이 아니다</span><span lang=\"ko-KR\">.</span></p>\r\n\t\t\t\t\t\t\t<br />\r\n\t\t\t\t\t\t\t<li style=\"font-family:Calibri\"><span lang=\"en-US\"><span style=\"font-family:Noto Sans KR;font-size:10pt;color:#86837f;background-color:#191a1a\">장점</span></span></li>\r\n\t\t\t\t\t\t\t<li style=\"font-family:Calibri\"><span lang=\"en-US\"><span style=\"font-family:Noto Sans KR;font-size:10pt;color:#86837f;background-color:#191a1a\">마크다운 지원</span></span></li>\r\n\t\t\t\t\t\t\t<li style=\"font-family:Calibri\"><span lang=\"en-US\"><span style=\"font-family:Noto Sans KR;font-size:10pt;color:#86837f;background-color:#191a1a\">지킬(Jekyll) 등의 정적 웹사이트 빌더 지원</span></span></li>\r\n\t\t\t\t\t\t\t<li style=\"font-family:Calibri\"><span lang=\"en-US\"><span style=\"font-family:Noto Sans KR;font-size:10pt;color:#86837f;background-color:#191a1a\">커스터마이징, 다양한 플러그인 지원</span></span></li>\r\n\t\t\t\t\t\t\t<li style=\"font-family:Calibri\"><span lang=\"en-US\"><span style=\"font-family:Noto Sans KR;font-size:10pt;color:#86837f;background-color:#191a1a\">애드센스 가능</span></span></li>\r\n\t\t\t\t\t\t\t<li style=\"font-family:Calibri\"><span lang=\"en-US\"><span style=\"font-family:Noto Sans KR;font-size:10pt;color:#86837f;background-color:#191a1a\">단점</span></span></li>\r\n\t\t\t\t\t\t\t<li style=\"font-family:Calibri\"><span lang=\"en-US\"><span style=\"font-family:Noto Sans KR;font-size:10pt;color:#86837f;background-color:#191a1a\">진입장벽이 생각보다 높음 (Git에 대한 이해 필요, 약간의 프론트엔드 관련 지식 등)</span></span></li>\r\n\t\t\t\t\t\t\t<li style=\"font-family:Calibri\"><span lang=\"en-US\"><span style=\"font-family:Noto Sans KR;font-size:10pt;color:#86837f;background-color:#191a1a\">생각보다 더 불편한 글쓰기 및 이미지 첨부</span></span></li>\r\n\t\t\t\t\t\t\t<li style=\"font-family:Calibri\"><span lang=\"en-US\"><span style=\"font-family:Noto Sans KR;font-size:10pt;color:#86837f;background-color:#191a1a\">관리자모드가 없어, 블로그의 다양한 통계정보 확인 불가능</span></span></li>\r\n\t\t\t\t\t\t\t<li style=\"font-family:Calibri\"><span lang=\"en-US\"><span style=\"font-family:Noto Sans KR;font-size:10pt;color:#86837f;background-color:#191a1a\">댓글 등의 기능도 없어, 별도의 플러그인 설치 필요</span></span></li>\r\n\t\t\t\t\t\t\t<br />\r\n\t\t\t\t\t\t</ul>\r\n\t\t\t\t\t\t<br />\r\n\t\t\t\t\t\t<br />\r\n\t\t\t\t\t\t</td>\r\n\t\t\t\t\t</tr>\r\n\t\t\t\t\t<tr>\r\n\t\t\t\t\t\t<td style=\"border:1px solid;font-family:Pretendard\"><span lang=\"en-US\"><span style=\"font-family:Pretendard Light;font-size:10pt\">틱톡</span></span></td>\r\n\t\t\t\t\t\t<td style=\"border:1px solid\"><br />\r\n\t\t\t\t\t\t</td>\r\n\t\t\t\t\t</tr>\r\n\t\t\t\t\t<tr>\r\n\t\t\t\t\t\t<td style=\"border:1px solid;font-family:Pretendard\"><span lang=\"en-US\"><span style=\"font-family:Pretendard Light;font-size:10pt\">네이버 블로그</span></span></td>\r\n\t\t\t\t\t\t<td style=\"border:1px solid\">\t\t\t\t\t\t<ul>\r\n\t\t\t\t\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:var(--font-fk-grotesk);font-size:18pt\">네이버 블로그</span></p>\r\n\t\t\t\t\t\t\t<li style=\"font-family:Calibri\"><span lang=\"en-US\"><span style=\"font-family:__fkGroteskNeue_598ab8;font-size:12pt\">국내 최대 규모의 플랫폼</span></span></li>\r\n\t\t\t\t\t\t\t<li style=\"font-family:Calibri\"><span lang=\"en-US\"><span style=\"font-family:__fkGroteskNeue_598ab8;font-size:12pt\">다양한 주제의 글 게시 가능</span></span></li>\r\n\t\t\t\t\t\t\t<li style=\"font-family:Calibri\"><span lang=\"en-US\"><span style=\"font-family:__fkGroteskNeue_598ab8;font-size:12pt\">광고 수익 창출 가능</span></span></li>\r\n\t\t\t\t\t\t\t<li style=\"font-family:Calibri\"><span lang=\"en-US\"><span style=\"font-family:__fkGroteskNeue_598ab8;font-size:12pt\">SEO에 유리</span></span></li>\r\n\t\t\t\t\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic;font-weight:bold\">글을 써서 사람들을 유입시키고 다른 목적을 달성하고 싶다면</span>&#160;<span lang=\"en-US\" style=\"font-family:Malgun Gothic\">네이버 블로그가 적당하다</span><span lang=\"en-US\">. </span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\">네이버 블로그는 과반을 차지하고 있는 네이버 검색 유입이 압도적이기 때문에 쇼핑몰에서 뭘 팔아보고 싶어 글을 쓴다던지</span><span lang=\"en-US\">, </span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\">업체를 홍보하고 싶다면 가장 높은 성능을 보여준다</span><span lang=\"en-US\">. </span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\">자체적으로 애드포스트라는 광고를 블로그에 달 수 있지만 의미 있는 수익을 기대하기는 상대적으로 어려운 편이다</span><span lang=\"en-US\">. </span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\">네이버 블로그는 서로 친구 맺어주고 소통하는 것을 좋아하고</span><span lang=\"en-US\">, </span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\">어떤 글을 써도 괜찮은 조회수를 원하는 경우 추천하고 싶다</span><span lang=\"en-US\">. </span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\">사람들의 유입을 돈으로 만들고 싶은 사람은 굳이 다른 선택지를 고민할 필요가 없다고 생각한다</span><span lang=\"en-US\">.</span>&#160;<span style=\"font-family:Malgun Gothic;color:#333333\">개인의 아이디가 블로그 주소가 되기 때문에</span><span style=\"color:#333333\">&#160;</span><span style=\"font-family:Malgun Gothic;color:#333333\">내 아이디를 아는 다른 사람이</span><span style=\"color:#333333\"> &#39;</span><a href=\"https://blog.naver.com/아이디\" style=\"color:#333333\">https://blog.naver.com/</a><span style=\"font-family:Malgun Gothic;color:#333333\">아이디</span><span style=\"color:#333333\">&#39; </span><span style=\"font-family:Malgun Gothic;color:#333333\">와 같이 접속해보면 내 블로그가 나온다</span><span style=\"color:#333333\">.&#160;</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\">이게 싫다면 새로운 네이버 아이디를 하나 더 만들어 개설하면 된다</span><span lang=\"en-US\">.</span></p>\r\n\t\t\t\t\t\t\t<br />\r\n\t\t\t\t\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\">&#160;</p>\r\n\t\t\t\t\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><a href=\"https://blog.naver.com/\" lang=\"en-US\" style=\"font-family:Malgun Gothic;font-weight:bold\">네이버</a><span lang=\"en-US\" style=\"font-weight:bold\"> </span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-weight:bold\">블로그</span></p>\r\n\t\t\t\t\t\t\t<li style=\"font-family:Calibri\"><span lang=\"en-US\"><span style=\"font-family:Noto Sans KR;font-size:10pt;color:#86837f;background-color:#191a1a\">장점</span></span></li>\r\n\t\t\t\t\t\t\t<li style=\"font-family:Calibri\"><span lang=\"en-US\"><span style=\"font-family:Noto Sans KR;font-size:10pt;color:#86837f;background-color:#191a1a\">(이전에 사용했던 플랫폼으로 익숙하다)</span></span></li>\r\n\t\t\t\t\t\t\t<li style=\"font-family:Calibri\"><span lang=\"en-US\"><span style=\"font-family:Noto Sans KR;font-size:10pt;color:#86837f;background-color:#191a1a\">한국에서 가장 대중적이며, 검색 유입량이 많다.</span></span></li>\r\n\t\t\t\t\t\t\t<li style=\"font-family:Calibri\"><span lang=\"en-US\"><span style=\"font-family:Noto Sans KR;font-size:10pt;color:#86837f;background-color:#191a1a\">UI가 편리하고 포스트 작성이 쉽다.</span></span></li>\r\n\t\t\t\t\t\t\t<li style=\"font-family:Calibri\"><span lang=\"en-US\"><span style=\"font-family:Noto Sans KR;font-size:10pt;color:#86837f;background-color:#191a1a\">단점</span></span></li>\r\n\t\t\t\t\t\t\t<li style=\"font-family:Calibri\"><span lang=\"en-US\"><span style=\"font-family:Noto Sans KR;font-size:10pt;color:#86837f;background-color:#191a1a\">마크다운 미지원</span></span></li>\r\n\t\t\t\t\t\t\t<li style=\"font-family:Calibri\"><span lang=\"en-US\"><span style=\"font-family:Noto Sans KR;font-size:10pt;color:#86837f;background-color:#191a1a\">구문강조 코드 블록 미지원</span></span></li>\r\n\t\t\t\t\t\t\t<li style=\"font-family:Calibri\"><span lang=\"en-US\"><span style=\"font-family:Noto Sans KR;font-size:10pt;color:#86837f;background-color:#191a1a\">블로그 이전 등을 위한 데이터 내보내기 기능 미지원</span></span></li>\r\n\t\t\t\t\t\t\t<li style=\"font-family:Calibri\"><span lang=\"en-US\"><span style=\"font-family:Noto Sans KR;font-size:10pt;color:#86837f;background-color:#191a1a\">제한적인 커스터마이징</span></span></li>\r\n\t\t\t\t\t\t\t<li style=\"font-family:Calibri\"><span lang=\"en-US\"><span style=\"font-family:Noto Sans KR;font-size:10pt;color:#86837f;background-color:#191a1a\">애드센스 대신 애드포스트(?)</span></span></li>\r\n\t\t\t\t\t\t\t<br />\r\n\t\t\t\t\t\t</ul>\r\n\t\t\t\t\t\t<br />\r\n\t\t\t\t\t\t<br />\r\n\t\t\t\t\t\t</td>\r\n\t\t\t\t\t</tr>\r\n\t\t\t\t\t<tr>\r\n\t\t\t\t\t\t<td style=\"border:1px solid;font-family:Pretendard\"><span lang=\"en-US\"><span style=\"font-family:Pretendard Light;font-size:10pt\">틱톡</span></span></td>\r\n\t\t\t\t\t\t<td style=\"border:1px solid\"><br />\r\n\t\t\t\t\t\t</td>\r\n\t\t\t\t\t</tr>\r\n\t\t\t\t\t<tr>\r\n\t\t\t\t\t\t<td style=\"border:1px solid;font-family:Pretendard\"><span lang=\"en-US\"><span style=\"font-family:Pretendard Light;font-size:10pt\">텔레그램</span></span></td>\r\n\t\t\t\t\t\t<td style=\"border:1px solid\"><br />\r\n\t\t\t\t\t\t</td>\r\n\t\t\t\t\t</tr>\r\n\t\t\t\t\t<tr>\r\n\t\t\t\t\t\t<td style=\"border:1px solid;font-family:Pretendard\"><span lang=\"en-US\"><span style=\"font-family:Pretendard Light;font-size:10pt\">오카방</span></span></td>\r\n\t\t\t\t\t\t<td style=\"border:1px solid\"><br />\r\n\t\t\t\t\t\t</td>\r\n\t\t\t\t\t</tr>\r\n\t\t\t\t\t<tr>\r\n\t\t\t\t\t\t<td style=\"border:1px solid;font-family:Pretendard\">링크드인</td>\r\n\t\t\t\t\t\t<td style=\"border:1px solid\"><br />\r\n\t\t\t\t\t\t</td>\r\n\t\t\t\t\t</tr>\r\n\t\t\t\t</table>\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-family:Pretendard;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">이버 오디오클립</span>, <span style=\"font-family:Malgun Gothic\">팟빵 같은 팟캐스트 플랫폼</span></p>\r\n\t\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><a href=\"https://velog.io/\" lang=\"en-US\" style=\"font-family:Malgun Gothic;font-weight:bold\">벨로그</a><span lang=\"en-US\" style=\"font-weight:bold\">(velog)</span><span style=\"font-weight:bold\">&#160;</span><span lang=\"en-US\" style=\"font-weight:bold\">- </span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-weight:bold\">추가</span></p>\r\n\t\t\t\t<li style=\"font-family:Calibri\"><span lang=\"en-US\"><span style=\"font-family:Noto Sans KR;font-size:10pt;color:#86837f;background-color:#191a1a\">장점</span></span></li>\r\n\t\t\t\t<li style=\"font-family:Calibri\"><span lang=\"en-US\"><span style=\"font-family:Noto Sans KR;font-size:10pt;color:#86837f;background-color:#191a1a\">마크다운 지원</span></span></li>\r\n\t\t\t\t<li style=\"font-family:Calibri\"><span lang=\"en-US\"><span style=\"font-family:Noto Sans KR;font-size:10pt;color:#86837f;background-color:#191a1a\">TIL (Today I Learned) 작성 용이</span></span></li>\r\n\t\t\t\t<li style=\"font-family:Calibri\"><span lang=\"en-US\"><span style=\"font-family:Noto Sans KR;font-size: eue_598ab8;font-size:12pt\">￼</span></span></li>\r\n\t\t\t\t<li style=\"font-family:Calibri\"><span style=\"font-family:__fkGroteskNeue_598ab8;font-size:12pt\">Medium</span></li>\r\n\t\t\t\t<li style=\"font-family:Calibri\"><span style=\"font-family:__fkGroteskNeue_598ab8;font-size:12pt\">Ghost</span></li>\r\n\t\t\t\t<li style=\"font-family:Calibri\"><span style=\"font-family:__fkGroteskNeue_598ab8;font-size:12pt\">TypePad</span></li>\r\n\t\t\t\t<li style=\"font-family:Calibri\"><span style=\"font-family:__fkGroteskNeue_598ab8;font-size:12pt\">LiveJournal (라이브저널)</span></li>\r\n\t\t\t\t<li style=\"font-family:Calibri\"><span lang=\"en-US\"><span style=\"font-family:__fkGroteskNeue_598ab8;font-size:12pt\">개발자, 단체 등 다양한 사용자 지원</span></span></li>\r\n\t\t\t\t<li style=\"font-family:Calibri\"><span lang=\"en-US\"><span style=\"font-family:__fkGroteskNeue_598ab8;font-size:12pt\">일본에서 인기가 높음</span><span style=\"font-family:__fkGroteskNeue_598ab8;font-size:12pt\">￼</span></span></li>\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:var(--font-fk-grotesk);font-size:18pt\">주요 특징</span></p>\r\n\t\t\t\t<li style=\"font-family:Calibri\"><span lang=\"en-US\"><span style=\"font-family:__fkGroteskNeue_598ab8;font-size:12pt\">WordPress가 압도적인 점유율로 1위를 차지</span></span></li>\r\n\t\t\t\t<li style=\"font-family:Calibri\"><span lang=\"en-US\"><span style=\"font-family:__fkGroteskNeue_598ab8;font-size:12pt\">대부분 무료 요금제와 유료 요금제를 함께 제공</span></span></li>\r\n\t\t\t\t<li style=\"font-family:Calibri\"><span lang=\"en-US\"><span style=\"font-family:__fkGroteskNeue_598ab8;font-size:12pt\">사용 편의성, 커스터마이징, SEO 최적화 등이 중요한 요소</span></span></li>\r\n\t\t\t\t<li style=\"font-family:Calibri\"><span lang=\"en-US\"><span style=\"font-family:__fkGroteskNeue_598ab8;font-size:12pt\">광고 수익화(예: Google AdSense) 지원 여부도 중요한 고려사항</span></span></li>\r\n\t\t\t</ul>\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t const CONTENT_HASH = 'deea456f';

let cards = [];
let moving = null, resizing = null;
let selectedIdx = null, clipboardCard = null;
const GRID = 20, GAP = 14;
function snap(v) { return Math.round(v / GRID) * GRID; }

// ── Undo (Ctrl+Z) ────────────────────────────────────────────────────────────
const MAX_HISTORY = 50;
let history = [];
function snapshot() {
  syncText();
  history.push(JSON.stringify(cards));
  if (history.length > MAX_HISTORY) history.shift();
}
function undo() {
  if (!history.length) { showStatus('되돌릴 내용 없음'); return; }
  syncText();
  cards = JSON.parse(history.pop());
  renderCards();
  saveBoard();
  showStatus('↩ 되돌림');
}
function showStatus(msg) {
  const s = document.getElementById('status');
  s.textContent = msg;
  clearTimeout(showStatus._t);
  showStatus._t = setTimeout(() => { s.textContent = ''; }, 2000);
}
document.addEventListener('keydown', e => {
  const isText = document.activeElement?.contentEditable === 'true';
  if ((e.ctrlKey || e.metaKey) && e.key === 'z' && !e.shiftKey) {
    if (isText) return;
    e.preventDefault();
    undo();
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'c' && !e.shiftKey && !isText) {
    if (selectedIdx !== null && cards[selectedIdx]) {
      syncText();
      clipboardCard = JSON.parse(JSON.stringify(cards[selectedIdx]));
      showStatus('카드 복사됨');
      e.preventDefault();
    }
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'v' && !e.shiftKey && !isText) {
    if (clipboardCard) {
      e.preventDefault();
      snapshot();
      const nc = JSON.parse(JSON.stringify(clipboardCard));
      nc.x = (nc.x || 0) + 30; nc.y = (nc.y || 0) + 30;
      cards.push(nc);
      selectedIdx = cards.length - 1;
      renderCards(); saveBoard();
      showStatus('카드 붙여넣음');
    }
  }
  if (e.key === 'Escape') {
    document.querySelectorAll('.card.selected').forEach(c => c.classList.remove('selected'));
    selectedIdx = null;
  }
});

function pushCards(movedIdx) {
  const moved = cards[movedIdx];
  const movedEl = document.querySelector(`.card[data-idx="${movedIdx}"]`);
  if (!movedEl) return;
  const mh = movedEl.offsetHeight;
  document.querySelectorAll('.card').forEach(el => {
    const i = +el.dataset.idx;
    if (i === movedIdx) return;
    const c = cards[i], oh = el.offsetHeight;
    if (moved.x < (c.x+(c.w||200)) && (moved.x+(moved.w||200)) > c.x && moved.y < (c.y+oh) && (moved.y+mh) > c.y) {
      c.y = moved.y + mh + GAP;
      el.style.top = c.y + 'px';
    }
  });
}

function loadBoard() {
  const saved = localStorage.getItem(SAVE_KEY);
  const savedHash = localStorage.getItem(SAVE_KEY + ':hash');
  let parsed = null;
  try { parsed = saved ? JSON.parse(saved) : null; } catch(e) {}
  // reset if: no save, empty array, or content hash changed (page regenerated)
  if (!parsed || parsed.length === 0 || savedHash !== CONTENT_HASH) {
    cards = DEFAULT_CARDS.map(c => ({...c}));
    localStorage.removeItem(SAVE_KEY);
    localStorage.setItem(SAVE_KEY + ':hash', CONTENT_HASH);
    renderCards();
    const hasCoords = cards.some(c => c.x !== undefined && c.y !== undefined);
    if (!hasCoords) autoLayout();
    return;
  }
  cards = parsed;
  renderCards();
}
function resetToDefaults() { if (!confirm('저장된 보드를 지우고 원본으로 초기화합니다. 계속할까요?')) return; localStorage.removeItem(SAVE_KEY); cards = DEFAULT_CARDS.map(c => ({...c})); renderCards(); autoLayout(); }

function autoLayout() {
  const boardW = document.getElementById('board').offsetWidth;
  const cols = Math.max(1, Math.floor(boardW / 280));
  const colW = (boardW - GAP*(cols-1)) / cols;
  const colH = new Array(cols).fill(0);
  const allCards = document.querySelectorAll('.card');
  const images = document.querySelectorAll('.card img');
  let loaded = 0;
  function place() {
    allCards.forEach((el, i) => {
      const w = Math.min(cards[i].w || colW, colW);
      let minCol = 0;
      for (let c = 1; c < cols; c++) if (colH[c] < colH[minCol]) minCol = c;
      cards[i].x = minCol * (colW + GAP);
      cards[i].y = colH[minCol];
      cards[i].w = w;
      el.style.left = cards[i].x + 'px';
      el.style.top = cards[i].y + 'px';
      el.style.width = w + 'px';
      colH[minCol] = cards[i].y + el.offsetHeight + GAP;
    });
    document.getElementById('board').style.minHeight = (Math.max(...colH) + 100) + 'px';
    saveBoard();
  }
  if (!images.length) { requestAnimationFrame(place); return; }
  images.forEach(img => {
    if (img.complete) { loaded++; if (loaded >= images.length) requestAnimationFrame(place); }
    else { img.onload = img.onerror = () => { loaded++; if (loaded >= images.length) requestAnimationFrame(place); }; }
  });
}

function syncText() {
  document.querySelectorAll('.card').forEach(el => {
    const i = +el.dataset.idx;
    if (cards[i]?.type === 'text') { const t = el.querySelector('.text'); if (t) cards[i].content = t.innerHTML; }
  });
}
function saveBoard() { syncText(); localStorage.setItem(SAVE_KEY, JSON.stringify(cards)); localStorage.setItem(SAVE_KEY + ':hash', CONTENT_HASH); showStatus('저장됨 ' + new Date().toLocaleTimeString()); }

function renderCards() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  cards.forEach((card, i) => {
    const el = document.createElement('div');
    el.className = 'card'; el.dataset.idx = i;
    if (card.x !== undefined) el.style.left = card.x + 'px';
    if (card.y !== undefined) el.style.top = card.y + 'px';
    // html cards contain raw OneNote table HTML which may overflow the stated div width
    if (card.w) { if (card.type === 'html') el.style.minWidth = card.w + 'px'; else el.style.width = card.w + 'px'; }
    el.addEventListener('mousedown', e => {
      if (e.target.closest('.text, a, .card-btn, .resize-handle, td, th')) return;
      e.preventDefault();
      // Update selection
      document.querySelectorAll('.card.selected').forEach(c => c.classList.remove('selected'));
      selectedIdx = i; el.classList.add('selected');
      snapshot();
      moving = { idx: i, startX: e.clientX, startY: e.clientY, origX: card.x||0, origY: card.y||0 };
      el.classList.add('moving');
    });
    const actions = document.createElement('div'); actions.className = 'card-actions';
    const delBtn = document.createElement('button'); delBtn.className = 'card-btn'; delBtn.textContent = '×';
    delBtn.onclick = e => { e.stopPropagation(); if(confirm('삭제?')) { snapshot(); cards.splice(i,1); renderCards(); saveBoard(); } };
    actions.appendChild(delBtn); el.appendChild(actions);
    if (card.type === 'text') {
      const text = document.createElement('div'); text.className = 'text'; text.contentEditable = true;
      text.innerHTML = card.content || '';
      text.addEventListener('focus', () => { snapshot(); });
      text.addEventListener('blur', () => { card.content = text.innerHTML; saveBoard(); });
      el.appendChild(text);
    } else if (card.type === 'image') {
      const img = document.createElement('img');
      img.src = card.src.startsWith('http') || card.src.startsWith('data:') ? card.src : IMG_BASE + card.src;
      img.alt = ''; img.loading = 'lazy'; img.onerror = () => img.style.display = 'none';
      if (card.w) img.style.width = card.w + 'px';
      if (card.h) img.style.height = card.h + 'px';
      if (card.link) { const a = document.createElement('a'); a.href = card.link; a.target = '_blank'; a.appendChild(img); el.appendChild(a); }
      else { el.appendChild(img); }
      if (card.caption) { const cap = document.createElement('div'); cap.style.cssText = 'font-size:11px;color:#8b949e;margin-top:4px;word-break:break-word;padding:0 2px;'; cap.textContent = card.caption; el.appendChild(cap); }
    } else if (card.type === 'html') {
      const wrapper = document.createElement('div');
      wrapper.style.cssText = 'overflow:auto;font-size:13px;line-height:1.5;';
      wrapper.innerHTML = card.html.replace(/__ATTACHMENT__/g, IMG_BASE);
      wrapper.querySelectorAll('img').forEach(img => { img.style.maxWidth = '100%'; img.style.height = 'auto'; img.draggable = false; });
      wrapper.querySelectorAll('a').forEach(a => { a.target = '_blank'; a.style.color = '#6cb0f6'; });
      wrapper.querySelectorAll('table').forEach(t => { t.style.borderCollapse = 'collapse'; });
      wrapper.querySelectorAll('td,th').forEach(td => {
        td.style.border = '1px solid #444'; td.style.padding = '4px 6px'; td.style.verticalAlign = 'top';
        td.title = '더블클릭으로 편집';
        td.addEventListener('dblclick', function(e) {
          e.stopPropagation();
          snapshot();
          this.contentEditable = 'true';
          this.style.outline = '2px solid #388bfd';
          this.style.background = 'rgba(56,139,253,0.08)';
          this.focus();
        });
        td.addEventListener('blur', function() {
          this.contentEditable = 'false';
          this.style.outline = '';
          this.style.background = '';
          cards[i].html = wrapper.innerHTML.split(IMG_BASE).join('__ATTACHMENT__');
          saveBoard();
        });
      });
      el.appendChild(wrapper);
    } else if (card.type === 'table') {
      const rows = card.rows || [['','',''],['','',''],['','','']];
      const tbl = document.createElement('table');
      tbl.style.cssText = 'border-collapse:collapse;width:100%;font-size:13px;';
      rows.forEach((row, ri) => {
        const tr = tbl.insertRow();
        row.forEach((cell, ci) => {
          const td = document.createElement(ri === 0 ? 'th' : 'td');
          td.contentEditable = true;
          td.style.cssText = 'border:1px solid #30363d;padding:4px 8px;min-width:60px;text-align:left;' + (ri===0 ? 'background:#21262d;font-weight:600;' : '');
          td.textContent = cell;
          td.addEventListener('blur', () => { if (!cards[i].rows) cards[i].rows = rows; rows[ri][ci] = td.textContent; saveBoard(); });
          tr.appendChild(td);
        });
      });
      el.appendChild(tbl);
      const addRow = document.createElement('button');
      addRow.textContent = '+ 행'; addRow.style.cssText = 'margin-top:4px;font-size:11px;background:#21262d;border:1px solid #30363d;color:#8b949e;padding:2px 8px;border-radius:4px;cursor:pointer;';
      addRow.onclick = e => { e.stopPropagation(); snapshot(); if (!cards[i].rows) cards[i].rows = rows; cards[i].rows.push(new Array(cards[i].rows[0].length).fill('')); renderCards(); saveBoard(); };
      const addCol = document.createElement('button');
      addCol.textContent = '+ 열'; addCol.style.cssText = 'margin-top:4px;margin-left:4px;font-size:11px;background:#21262d;border:1px solid #30363d;color:#8b949e;padding:2px 8px;border-radius:4px;cursor:pointer;';
      addCol.onclick = e => { e.stopPropagation(); snapshot(); if (!cards[i].rows) cards[i].rows = rows; cards[i].rows.forEach(r => r.push('')); renderCards(); saveBoard(); };
      el.appendChild(addRow); el.appendChild(addCol);
    }
    const rh = document.createElement('div'); rh.className = 'resize-handle';
    rh.addEventListener('mousedown', e => { e.preventDefault(); e.stopPropagation(); snapshot(); resizing = { idx: i, startX: e.clientX, startW: card.w || el.offsetWidth }; });
    el.appendChild(rh);
    if (i === selectedIdx) el.classList.add('selected');
    board.appendChild(el);
  });
  requestAnimationFrame(() => {
    let maxB = 0;
    document.querySelectorAll('.card').forEach(el => { const b = (parseFloat(el.style.top)||0) + el.offsetHeight; if (b > maxB) maxB = b; });
    board.style.minHeight = (maxB + 100) + 'px';
  });
}

document.addEventListener('mousemove', e => {
  if (moving) {
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`); if (!el) return;
    let nx = moving.origX + e.clientX - moving.startX, ny = moving.origY + e.clientY - moving.startY;
    if (e.shiftKey) { nx = snap(nx); ny = snap(ny); el.style.outline = '1px dashed rgba(240,192,64,0.3)'; } else { el.style.outline = ''; }
    el.style.left = nx + 'px'; el.style.top = ny + 'px';
  }
  if (resizing) {
    let nw = resizing.startW + e.clientX - resizing.startX; if (e.shiftKey) nw = snap(nw);
    cards[resizing.idx].w = Math.max(100, nw);
    const el = document.querySelector(`.card[data-idx="${resizing.idx}"]`); if (el) el.style.width = cards[resizing.idx].w + 'px';
  }
});

document.addEventListener('mouseup', e => {
  if (moving) {
    let nx = moving.origX + e.clientX - moving.startX, ny = moving.origY + e.clientY - moving.startY;
    if (e.shiftKey) { nx = snap(nx); ny = snap(ny); }
    cards[moving.idx].x = Math.max(0, nx); cards[moving.idx].y = Math.max(0, ny);
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`); if (el) { el.classList.remove('moving'); el.style.outline = ''; }
    if (e.shiftKey) pushCards(moving.idx);
    moving = null; saveBoard();
  }
  if (resizing) { if (e.shiftKey) pushCards(resizing.idx); resizing = null; saveBoard(); }
});

function addTextCard() { snapshot(); cards.push({ type: 'text', content: '', x: 50, y: window.scrollY+100, w: 300 }); renderCards(); setTimeout(() => { const els = document.querySelectorAll('.card .text'); els[els.length-1]?.focus(); }, 100); }
function addImageCard() { const input = document.createElement('input'); input.type = 'file'; input.accept = 'image/*'; input.onchange = e => { const f = e.target.files[0]; if (!f) return; const r = new FileReader(); r.onload = () => { snapshot(); cards.push({ type: 'image', src: r.result, x: 50, y: window.scrollY+100, w: 240 }); renderCards(); saveBoard(); }; r.readAsDataURL(f); }; input.click(); }
function addImageUrl() { const url = prompt('이미지 URL'); if (!url) return; snapshot(); cards.push({ type: 'image', src: url, x: 50, y: window.scrollY+100, w: 240 }); renderCards(); saveBoard(); }
function addTableCard() {
  const colsStr = prompt('열 수 (기본 3)', '3'); const cols = Math.max(1, parseInt(colsStr)||3);
  const rowsStr = prompt('행 수 (헤더 포함, 기본 4)', '4'); const rows = Math.max(1, parseInt(rowsStr)||4);
  snapshot();
  cards.push({ type: 'table', rows: Array.from({length: rows}, (_, ri) => Array.from({length: cols}, (_, ci) => ri===0 ? `열${ci+1}` : '')), x: 50, y: window.scrollY+100, w: Math.max(240, cols*100) });
  renderCards(); saveBoard();
}
function exportBoard() { syncText(); const blob = new Blob([JSON.stringify(cards, null, 2)], { type: 'application/json' }); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = SAVE_KEY + '.json'; a.click(); }
// ── Zoom ─────────────────────────────────────────────────────────────────────
let zoom = parseFloat(localStorage.getItem('zoom-' + SAVE_KEY) || '1.0');
function applyZoom() {
  const board = document.getElementById('board');
  board.style.transform = `scale(${zoom})`;
  board.style.transformOrigin = '0 0';
  document.getElementById('zoom-level').textContent = Math.round(zoom * 100) + '%';
  localStorage.setItem('zoom-' + SAVE_KEY, zoom);
}
function zoomIn()  { zoom = Math.min(3.0, parseFloat((zoom + 0.1).toFixed(2))); applyZoom(); }
function zoomOut() { zoom = Math.max(0.2, parseFloat((zoom - 0.1).toFixed(2))); applyZoom(); }
document.addEventListener('keydown', e => {
  if (e.ctrlKey || e.metaKey) {
    if (e.key === '=' || e.key === '+') { e.preventDefault(); zoomIn(); }
    if (e.key === '-')                  { e.preventDefault(); zoomOut(); }
    if (e.key === '0')                  { e.preventDefault(); zoom = 1.0; applyZoom(); }
  }
});
document.getElementById('board').addEventListener('wheel', e => {
  if (!(e.ctrlKey || e.metaKey)) return;
  e.preventDefault();
  e.deltaY < 0 ? zoomIn() : zoomOut();
}, { passive: false });
applyZoom();
function resetLayout() { if (!confirm('자동 재배치합니다.')) return; cards.forEach(c => { delete c.x; delete c.y; }); renderCards(); autoLayout(); }
// ── Floating format toolbar ───────────────────────────────────────────────────
const fmtBar = document.getElementById('format-toolbar');
function fmt(cmd) { document.execCommand(cmd, false, null); saveBoard(); }
function fmtLink() {
  const sel = window.getSelection();
  if (!sel || sel.isCollapsed) return;
  const url = prompt('링크 URL 입력', 'https://');
  if (!url) return;
  document.execCommand('createLink', false, url);
  // make links open in new tab
  sel.anchorNode?.parentElement?.closest('a')?.setAttribute('target', '_blank');
  document.querySelectorAll('.text a').forEach(a => a.target = '_blank');
  saveBoard();
}

// prevent format buttons from blurring contenteditable
fmtBar.addEventListener('mousedown', e => e.preventDefault());

document.addEventListener('selectionchange', () => {
  const sel = window.getSelection();
  if (!sel || sel.isCollapsed || !sel.toString().trim()) { fmtBar.style.display = 'none'; return; }
  // only show if selection is inside a .text element
  const anchor = sel.anchorNode;
  if (!anchor) { fmtBar.style.display = 'none'; return; }
  const textEl = anchor.nodeType === 1 ? anchor.closest('.text') : anchor.parentElement?.closest('.text');
  if (!textEl) { fmtBar.style.display = 'none'; return; }
  // position above selection
  const range = sel.getRangeAt(0);
  const rect = range.getBoundingClientRect();
  fmtBar.style.display = 'flex';
  const tbW = fmtBar.offsetWidth || 180;
  let left = rect.left + rect.width / 2 - tbW / 2;
  left = Math.max(8, Math.min(left, window.innerWidth - tbW - 8));
  fmtBar.style.left = left + 'px';
  fmtBar.style.top = (rect.top - 44 + window.scrollY) + 'px';
});

setInterval(saveBoard, 30000);
loadBoard();
</script>
</body>
