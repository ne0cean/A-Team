0pt\"><span style=\"font-family:Malgun Gothic\">홀로게이트</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\">, </span><span style=\"font-family:Malgun Gothic\">샌드박스</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">등</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">세계</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">유명</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> VR </span><span style=\"font-family:Malgun Gothic\">프랜차이즈</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">대부분이</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">비햅틱스의</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">햅틱</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">조끼</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">‘테크슈트’를</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">사용한다</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\">. </span><span style=\"font-family:Malgun Gothic\">비햅틱스는</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">기술을</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">한국전자통신연구원</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\">, </span><span style=\"font-family:Malgun Gothic\">기업</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">등에</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">파는</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">소프트웨어</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">사업도</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">한다</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\">.</span></p>\r\n\t\t\t\t\t<p lang=\"en-US\" style=\"font-family:맑은 고딕;font-size:8pt;margin-top:0pt;margin-bottom:0pt\"><a href=\"https://biz.chosun.com/industry/company/2021/06/17/7DI7IAJOC5B7HEN7NQX2LM5SW4/\" style=\"font-family:Malgun Gothic\">https://biz.chosun.com/industry/company/2021/06/17/7DI7IAJOC5B7HEN7NQX2LM5SW4/</a></p>\r\n\t\t\t\t\t<br />\r\n\t\t\t\t\t<p style=\"font-family:맑은 고딕;font-size:8pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">ㅇ</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> Financials</span></p>\r\n\t\t\t\t\t<p style=\"font-family:맑은 고딕;font-size:8pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">자본금</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\">: 2</span><span lang=\"ko\" style=\"font-family:Malgun Gothic\">억</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> 1,663</span><span lang=\"ko\" style=\"font-family:Malgun Gothic\">만원</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> (2020.12.31)</span></p>\r\n\t\t\t\t\t<p style=\"font-family:맑은 고딕;font-size:8pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">매출액</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\">: 16</span><span lang=\"ko\" style=\"font-family:Malgun Gothic\">억</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> 4</span><span lang=\"ko\" style=\"font-family:Malgun Gothic\">천만원</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> (2020.12.31)</span></p>\r\n\t\t\t\t\t<p style=\"font-family:맑은 고딕;font-size:8pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">지난해 매출 16억원 중 90%는 해외에서 나왔다. 미국이 50%, 유럽이 25%다. 주목되는 점은 성장 속도다. 매출이 2018년 4억원에서 2019년 10억원으로 2.5배 늘어난 데 이어 지난해 신종 코로나 바이러스 감염증(코로나19) 국면에도 60% 이상 성장</span></p>\r\n\t\t\t\t\t<br />\r\n\t\t\t\t\t<p style=\"font-family:맑은 고딕;font-size:8pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">2017년부터 본격적으로 햅틱 기기를 판매했다. 시장 성장이 기술 발전 속도를 쫓아오지 못하자 2018년 하반기부터 경쟁자가 알아서 사라졌다. 그러는 사이 비햅틱스는 2019년부터 제품 개선과 콘텐츠 파트너(게임사와 협업) 확장에 주력했다. 세계 주요 VR게임방에서 비햅틱스 테크슈트 주문량을 크게 늘리기 시작했다. 2019년까지만 해도 VR게임방 매출이 대부분이었다. 해외에서는 VR게임방이 한국에서보다 인기를 끌고 있다. 하지만 코로나19로 VR게임방이 문을 닫자 아케이드 매출 비중은 5분의 1로 줄었다. 대신 개인 고객이 크게 늘었다.</span></p>\r\n\t\t\t\t\t<br />\r\n\t\t\t\t\t<p style=\"font-family:맑은 고딕;font-size:8pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">2020년 세계 최대 정보기술</span><span lang=\"x-IV\" style=\"font-family:Cambria Math\">⋅</span><span style=\"font-family:Malgun Gothic\">가전 박람회 CES에서 좋은 반응을 얻으며 게임 업체들과의 콘텐츠 협업이 늘어난 게 촉매제 역할을 했다. 2019년에는 테크슈트가 지원하는 게임이 5개에 불과했지만, 지난해에는 47개로 급증했다. 올해 CES에서는 혁신상을 받고, 1분기까지 지원 게임이 61개로 늘었다. 닭이 먼저냐 달걀이 먼저냐인데, 적용되는 게임 수가 늘자 개인 고객이 늘었다. 게임의 현실감을 높이는 데 촉각이 필수적이기 때문이다. 가령 VR게임에서 뒤에서 누가 때리는 것은 청각과 시각으로는 표현해봐야 흔들리는 영상과 빨간 화면 정도다. 결국 VR과 메타버스를 완성하는 데 촉각, 햅틱 기술은 필수적이다. 한국과 달리 미국에서는 5가구 중 1가구는 VR 기기를 보유하고 있다. 콘텐츠가 충분하면 취미에 499달러를 쓸 만하지 않겠는가. 테크슈트는 영화를 볼 때, 음악을 들을 때도 몰입감을 높여준다.”</span></p>\r\n\t\t\t\t\t<br />\r\n\t\t\t\t\t<p style=\"font-family:맑은 고딕;font-size:8pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">부품 수급을 크게 늘리기 쉽지 않은 상황</span></p>\r\n\t\t\t\t\t<br />\r\n\t\t\t\t\t<p style=\"font-family:맑은 고딕;font-size:8pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">전 세계서 VR 콘텐츠와 협업한 햅틱 피드백을 실시간으로 주는 조끼를 판매하는 곳이 비햅틱스뿐이다. 방대한 데이터를 시청각과의 시차 없이 연동하는 게 핵심이다. 서브팩(Subpac), 우저(Woojer)는 촉감 조끼를 만들지만 소리의 주파수나 크기에 진동을 연동한다. 테슬라슈트(Teslasuit)는 전기로 자극을 준다. 비햅틱스는 게임사와 협업한 덕에 사용자가 콘텐츠를 즐길 때 보다 더 맥락에 맞게 작동</span></p>\r\n\t\t\t\t\t<br />\r\n\t\t\t\t\t<p style=\"font-family:맑은 고딕;font-size:8pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">햅틱 기술에 전기, 압력도 있는데 왜 진동을 활용했나.</span></p>\r\n\t\t\t\t\t<br />\r\n\t\t\t\t\t<p style=\"font-family:맑은 고딕;font-size:8pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">“전기는 피부와 맞닿아야 하는데, 이 경우 옷을 벗고 기기를 장착해야 하는 번거로움이 있다. 압력을 느끼게 하려면 기기가 커진다.</span></p>\r\n\t\t\t\t\t<br />\r\n\t\t\t\t\t<br />\r\n\t\t\t\t\t<p style=\"font-family:맑은 고딕;font-size:8pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">소재지</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\">: </span><span style=\"font-family:Malgun Gothic\">대덕</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\">2</span><span style=\"font-family:Malgun Gothic\">연구단지</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span lang=\"ko\" style=\"font-family:Malgun Gothic\">대전</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span lang=\"ko\" style=\"font-family:Malgun Gothic\">유성구</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span lang=\"ko\" style=\"font-family:Malgun Gothic\">유성대로</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\">1689</span><span lang=\"ko\" style=\"font-family:Malgun Gothic\">번길</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\">70, 3</span><span lang=\"ko\" style=\"font-family:Malgun Gothic\">동</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> 503</span><span lang=\"ko\" style=\"font-family:Malgun Gothic\">호</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\">￼</span><span style=\"font-family:Malgun Gothic\">설립일</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\">: 2015. 5. 1.</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\">￼</span><span style=\"font-family:Malgun Gothic\">종업원수</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\">: 11</span><span style=\"font-family:Malgun Gothic\">명</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> (As of 2021) </span><a href=\"https://www.linkedin.com/company/bhaptics/people/\" lang=\"en-US\" style=\"font-family:Malgun Gothic\">https://www.linkedin.com/company/bhaptics/people/</a><span style=\"font-family:Malgun Gothic\">￼</span><span style=\"font-family:Malgun Gothic\">투자자</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\">: 3 Vive X(HTC Exclerator)</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\">￼</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\">CEO: </span><span style=\"font-family:Malgun Gothic\">Kiuk Gwak</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> - </span><span style=\"font-family:Malgun Gothic\">Co-Founder &amp; Chief Executive Officer</span></p>\r\n\t\t\t\t\t<p style=\"font-family:맑은 고딕;font-size:8pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">Sangwon Choi</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> - </span><span style=\"font-family:Malgun Gothic\">Co-Founder &amp; Chief Technology Officer</span></p>\r\n\t\t\t\t\t<br />\r\n\t\t\t\t\t<p style=\"font-family:맑은 고딕;font-size:8pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">Investor Name\tInvestor Type\tHolding\tInvestor Since\tParticipating Rounds\tContact Info</span></p>\r\n\t\t\t\t\t<p style=\"font-family:맑은 고딕;font-size:8pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">Korea Technology Finance\tGovernment\t\t\t\t</span></p>\r\n\t\t\t\t\t<p style=\"font-family:맑은 고딕;font-size:8pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">Vive X Accelerator\tAccelerator/Incubator\tMinority\t\t\t</span></p>\r\n\t\t\t\t\t<p style=\"font-family:맑은 고딕;font-size:8pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">AJU IB Investment\tVenture Capital\tMinority</span></p>\r\n\t\t\t\t\t<br />\r\n\t\t\t\t\t<p style=\"font-family:맑은 고딕;font-size:8pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">“누적 투자는 30억원 정도다. 대만 HTC가 개발한 VR 기기 제조사 ‘바이브’, 아주IB투자, 기술보증기금 등이 주요 투자사다.”</span></p>\r\n\t\t\t\t\t<p lang=\"ko\" style=\"font-family:맑은 고딕;font-size:8pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">코오롱이</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> &#39;</span><span style=\"font-family:Malgun Gothic\">시드</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\">(</span><span style=\"font-family:Malgun Gothic\">초기자금</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\">)&#39;</span><span style=\"font-family:Malgun Gothic\">를</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">만들어줬다</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\">.</span></p>\r\n\t\t\t\t\t<p lang=\"en-US\" style=\"font-family:맑은 고딕;font-size:8pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">2017</span><span lang=\"ko\" style=\"font-family:Malgun Gothic\">년</span><span style=\"font-family:Malgun Gothic\"> KST(</span><span lang=\"ko\" style=\"font-family:Malgun Gothic\">한국과학기술지주</span><span style=\"font-family:Malgun Gothic\">)</span><span lang=\"ko\" style=\"font-family:Malgun Gothic\">에서</span><span style=\"font-family:Malgun Gothic\"> </span><span lang=\"ko\" style=\"font-family:Malgun Gothic\">프리</span><span style=\"font-family:Malgun Gothic\">A </span><span lang=\"ko\" style=\"font-family:Malgun Gothic\">규모의</span><span style=\"font-family:Malgun Gothic\"> </span><span lang=\"ko\" style=\"font-family:Malgun Gothic\">투자금을</span><span style=\"font-family:Malgun Gothic\"> </span><span lang=\"ko\" style=\"font-family:Malgun Gothic\">확보했다</span><span style=\"font-family:Malgun Gothic\">. </span><span lang=\"ko\" style=\"font-family:Malgun Gothic\">이어서</span><span style=\"font-family:Malgun Gothic\"> 2019</span><span lang=\"ko\" style=\"font-family:Malgun Gothic\">년</span><span style=\"font-family:Malgun Gothic\"> </span><span lang=\"ko\" style=\"font-family:Malgun Gothic\">아주</span><span style=\"font-family:Malgun Gothic\">IB</span><span lang=\"ko\" style=\"font-family:Malgun Gothic\">투자와</span><span style=\"font-family:Malgun Gothic\"> </span><span lang=\"ko\" style=\"font-family:Malgun Gothic\">기술보증기금</span><span style=\"font-family:Malgun Gothic\"> </span><span lang=\"ko\" style=\"font-family:Malgun Gothic\">등에서</span><span style=\"font-family:Malgun Gothic\"> 20</span><span lang=\"ko\" style=\"font-family:Malgun Gothic\">억</span><span style=\"font-family:Malgun Gothic\"> </span><span lang=\"ko\" style=\"font-family:Malgun Gothic\">규모의</span><span style=\"font-family:Malgun Gothic\"> </span><span lang=\"ko\" style=\"font-family:Malgun Gothic\">지분투자</span></p>\r\n\t\t\t\t\t<br />\r\n\t\t\t\t\t<p style=\"font-family:맑은 고딕;font-size:8pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">장기적으로는 더 많은 신체부위에서 촉감을 느낄 수 있는 콘텐츠와 햅틱 기기를 개발하는 게 목표다. 단기적으로는 코로나19 때문에 미룬 PC방 렌털 사업을 재기하고자 한다. 매년 매출을 두 배 이상 늘리는 게 목표다. 올해도 무난히 이를 달성할 것이다.”</span></p>\r\n\t\t\t\t\t<br />\r\n\t\t\t\t\t<p lang=\"ko\" style=\"font-family:맑은 고딕;font-size:8pt;margin-top:0pt;margin-bottom:0pt\">비햅틱스의 다음 목표는 PC와 콘솔 분야로 넓히는 것이다. 국내와 중국 시장을 겨냥해 PC방이나 콘솔 게임에서도 햅틱슈트를 입고 게임을 즐길 수 있도록 만든다. 또 넷플릭스, 디즈니플러스와 같은 OTT 플랫폼과 연계해 집에서도 4D 영화처럼 실감나는 영화를 즐길 수 있도록 만드는 것도 가능하다. </p>\r\n\t\t\t\t\t<br />\r\n\t\t\t\t\t<p lang=\"ko\" style=\"font-family:맑은 고딕;font-size:8pt;margin-top:0pt;margin-bottom:0pt\">&#39;메타버스&#39;가 부상하면서 함께 떠오르고 있는 VR을 활용한 소셜 네트워킹도 주력해야 할 사업 분야다. VR에서 만난 친구와 악수하거나, 대화를 할 때 촉각 기능을 넣는 것이다. 곽 대표는 &quot;미국에는 마인크래프트나 로블록스와 같은 큰 메타버스 플랫폼이 있다. 우리도 그런 메타버스 시스템 안에서 접목할 수 있는 기회를 끊임없이 찾고 있다&quot;고 포부를 밝혔다. </p>\r\n\t\t\t\t\t<br />\r\n\t\t\t\t\t<br />\r\n\t\t\t\t\t<p data-tag=\"to-do\" s     "caption": "안상희 기자가 비햅틱스 햅틱 장비를 착용한 후 개발자와 총싸움 VR게임을 체험하고 있다. 왼쪽 주황색 표시는 비햅틱스의 햅틱 관련 기기. 사진 비햅틱스"
  },
  {
    "type": "image",
    "x": 60,
    "y": 1158,
    "w": 70,
    "h": 70,
    "src": "03f55976e5.png"
  },
  {
    "type": "image",
    "x": 60,
    "y": 1236,
    "w": 70,
    "h": 70,
    "src": "bf751f3786.png"
  },
  {
    "type": "image",
    "x": 60,
    "y": 1314,
    "w": 70,
    "h": 70,
    "src": "c734a8dd92.png"
  }
];
const CONTENT_HASH = '10a45457';

let cards = [];
let moving = null, resizing = null;
let selectedIdx = null, clipboardCard = null;
const GRID = 20, GAP = 14;
function snap(v) { return Math.round(v / GRID) * GRID; }

// ── Undo (Ctrl+Z) ────────────────────────────────────────────────────────────
const MAX_HISTORY = 50;
let history = [];
function snapshot() {
  syncText();
  history.push(JSON.stringify(cards));
  if (history.length > MAX_HISTORY) history.shift();
}
function undo() {
  if (!history.length) { showStatus('되돌릴 내용 없음'); return; }
  syncText();
  cards = JSON.parse(history.pop());
  renderCards();
  saveBoard();
  showStatus('↩ 되돌림');
}
function showStatus(msg) {
  const s = document.getElementById('status');
  s.textContent = msg;
  clearTimeout(showStatus._t);
  showStatus._t = setTimeout(() => { s.textContent = ''; }, 2000);
}
document.addEventListener('keydown', e => {
  const isText = document.activeElement?.contentEditable === 'true';
  if ((e.ctrlKey || e.metaKey) && e.key === 'z' && !e.shiftKey) {
    if (isText) return;
    e.preventDefault();
    undo();
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'c' && !e.shiftKey && !isText) {
    if (selectedIdx !== null && cards[selectedIdx]) {
      syncText();
      clipboardCard = JSON.parse(JSON.stringify(cards[selectedIdx]));
      showStatus('카드 복사됨');
      e.preventDefault();
    }
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'v' && !e.shiftKey && !isText) {
    if (clipboardCard) {
      e.preventDefault();
      snapshot();
      const nc = JSON.parse(JSON.stringify(clipboardCard));
      nc.x = (nc.x || 0) + 30; nc.y = (nc.y || 0) + 30;
      cards.push(nc);
      selectedIdx = cards.length - 1;
      renderCards(); saveBoard();
      showStatus('카드 붙여넣음');
    }
  }
  if (e.key === 'Escape') {
    document.querySelectorAll('.card.selected').forEach(c => c.classList.remove('selected'));
    selectedIdx = null;
  }
});

function pushCards(movedIdx) {
  const moved = cards[movedIdx];
  const movedEl = document.querySelector(`.card[data-idx="${movedIdx}"]`);
  if (!movedEl) return;
  const mh = movedEl.offsetHeight;
  document.querySelectorAll('.card').forEach(el => {
    const i = +el.dataset.idx;
    if (i === movedIdx) return;
    const c = cards[i], oh = el.offsetHeight;
    if (moved.x < (c.x+(c.w||200)) && (moved.x+(moved.w||200)) > c.x && moved.y < (c.y+oh) && (moved.y+mh) > c.y) {
      c.y = moved.y + mh + GAP;
      el.style.top = c.y + 'px';
    }
  });
}

function loadBoard() {
  const saved = localStorage.getItem(SAVE_KEY);
  const savedHash = localStorage.getItem(SAVE_KEY + ':hash');
  let parsed = null;
  try { parsed = saved ? JSON.parse(saved) : null; } catch(e) {}
  // reset if: no save, empty array, or content hash changed (page regenerated)
  if (!parsed || parsed.length === 0 || savedHash !== CONTENT_HASH) {
    cards = DEFAULT_CARDS.map(c => ({...c}));
    localStorage.removeItem(SAVE_KEY);
    localStorage.setItem(SAVE_KEY + ':hash', CONTENT_HASH);
    renderCards();
    const hasCoords = cards.some(c => c.x !== undefined && c.y !== undefined);
    if (!hasCoords) autoLayout();
    return;
  }
  cards = parsed;
  renderCards();
}
function resetToDefaults() { if (!confirm('저장된 보드를 지우고 원본으로 초기화합니다. 계속할까요?')) return; localStorage.removeItem(SAVE_KEY); cards = DEFAULT_CARDS.map(c => ({...c})); renderCards(); autoLayout(); }

function autoLayout() {
  const boardW = document.getElementById('board').offsetWidth;
  const cols = Math.max(1, Math.floor(boardW / 280));
  const colW = (boardW - GAP*(cols-1)) / cols;
  const colH = new Array(cols).fill(0);
  const allCards = document.querySelectorAll('.card');
  const images = document.querySelectorAll('.card img');
  let loaded = 0;
  function place() {
    allCards.forEach((el, i) => {
      const w = Math.min(cards[i].w || colW, colW);
      let minCol = 0;
      for (let c = 1; c < cols; c++) if (colH[c] < colH[minCol]) minCol = c;
      cards[i].x = minCol * (colW + GAP);
      cards[i].y = colH[minCol];
      cards[i].w = w;
      el.style.left = cards[i].x + 'px';
      el.style.top = cards[i].y + 'px';
      el.style.width = w + 'px';
      colH[minCol] = cards[i].y + el.offsetHeight + GAP;
    });
    document.getElementById('board').style.minHeight = (Math.max(...colH) + 100) + 'px';
    saveBoard();
  }
  if (!images.length) { requestAnimationFrame(place); return; }
  images.forEach(img => {
    if (img.complete) { loaded++; if (loaded >= images.length) requestAnimationFrame(place); }
    else { img.onload = img.onerror = () => { loaded++; if (loaded >= images.length) requestAnimationFrame(place); }; }
  });
}

function syncText() {
  document.querySelectorAll('.card').forEach(el => {
    const i = +el.dataset.idx;
    if (cards[i]?.type === 'text') { const t = el.querySelector('.text'); if (t) cards[i].content = t.innerHTML; }
  });
}
function saveBoard() { syncText(); localStorage.setItem(SAVE_KEY, JSON.stringify(cards)); localStorage.setItem(SAVE_KEY + ':hash', CONTENT_HASH); showStatus('저장됨 ' + new Date().toLocaleTimeString()); }

function renderCards() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  cards.forEach((card, i) => {
    const el = document.createElement('div');
    el.className = 'card'; el.dataset.idx = i;
    if (card.x !== undefined) el.style.left = card.x + 'px';
    if (card.y !== undefined) el.style.top = card.y + 'px';
    // html cards contain raw OneNote table HTML which may overflow the stated div width
    if (card.w) { if (card.type === 'html') el.style.minWidth = card.w + 'px'; else el.style.width = card.w + 'px'; }
    el.addEventListener('mousedown', e => {
      if (e.target.closest('.text, a, .card-btn, .resize-handle, td, th')) return;
      e.preventDefault();
      // Update selection
      document.querySelectorAll('.card.selected').forEach(c => c.classList.remove('selected'));
      selectedIdx = i; el.classList.add('selected');
      snapshot();
      moving = { idx: i, startX: e.clientX, startY: e.clientY, origX: card.x||0, origY: card.y||0 };
      el.classList.add('moving');
    });
    const actions = document.createElement('div'); actions.className = 'card-actions';
    const delBtn = document.createElement('button'); delBtn.className = 'card-btn'; delBtn.textContent = '×';
    delBtn.onclick = e => { e.stopPropagation(); if(confirm('삭제?')) { snapshot(); cards.splice(i,1); renderCards(); saveBoard(); } };
    actions.appendChild(delBtn); el.appendChild(actions);
    if (card.type === 'text') {
      const text = document.createElement('div'); text.className = 'text'; text.contentEditable = true;
      text.innerHTML = card.content || '';
      text.addEventListener('focus', () => { snapshot(); });
      text.addEventListener('blur', () => { card.content = text.innerHTML; saveBoard(); });
      el.appendChild(text);
    } else if (card.type === 'image') {
      const img = document.createElement('img');
      img.src = card.src.startsWith('http') || card.src.startsWith('data:') ? card.src : IMG_BASE + card.src;
      img.alt = ''; img.loading = 'lazy'; img.onerror = () => img.style.display = 'none';
      if (card.w) img.style.width = card.w + 'px';
      if (card.h) img.style.height = card.h + 'px';
      if (card.link) { const a = document.createElement('a'); a.href = card.link; a.target = '_blank'; a.appendChild(img); el.appendChild(a); }
      else { el.appendChild(img); }
      if (card.caption) { const cap = document.createElement('div'); cap.style.cssText = 'font-size:11px;color:#8b949e;margin-top:4px;word-break:break-word;padding:0 2px;'; cap.textContent = card.caption; el.appendChild(cap); }
    } else if (card.type === 'html') {
      const wrapper = document.createElement('div');
      wrapper.style.cssText = 'overflow:auto;font-size:13px;line-height:1.5;';
      wrapper.innerHTML = card.html.replace(/__ATTACHMENT__/g, IMG_BASE);
      wrapper.querySelectorAll('img').forEach(img => { img.style.maxWidth = '100%'; img.style.height = 'auto'; img.draggable = false; });
      wrapper.querySelectorAll('a').forEach(a => { a.target = '_blank'; a.style.color = '#6cb0f6'; });
      wrapper.querySelectorAll('table').forEach(t => { t.style.borderCollapse = 'collapse'; });
      wrapper.querySelectorAll('td,th').forEach(td => {
        td.style.border = '1px solid #444'; td.style.padding = '4px 6px'; td.style.verticalAlign = 'top';
        td.title = '더블클릭으로 편집';
        td.addEventListener('dblclick', function(e) {
          e.stopPropagation();
          snapshot();
          this.contentEditable = 'true';
          this.style.outline = '2px solid #388bfd';
          this.style.background = 'rgba(56,139,253,0.08)';
          this.focus();
        });
        td.addEventListener('blur', function() {
          this.contentEditable = 'false';
          this.style.outline = '';
          this.style.background = '';
          cards[i].html = wrapper.innerHTML.split(IMG_BASE).join('__ATTACHMENT__');
          saveBoard();
        });
      });
      el.appendChild(wrapper);
    } else if (card.type === 'table') {
      const rows = card.rows || [['','',''],['','',''],['','','']];
      const tbl = document.createElement('table');
      tbl.style.cssText = 'border-collapse:collapse;width:100%;font-size:13px;';
      rows.forEach((row, ri) => {
        const tr = tbl.insertRow();
        row.forEach((cell, ci) => {
          const td = document.createElement(ri === 0 ? 'th' : 'td');
          td.contentEditable = true;
          td.style.cssText = 'border:1px solid #30363d;padding:4px 8px;min-width:60px;text-align:left;' + (ri===0 ? 'background:#21262d;font-weight:600;' : '');
          td.textContent = cell;
          td.addEventListener('blur', () => { if (!cards[i].rows) cards[i].rows = rows; rows[ri][ci] = td.textContent; saveBoard(); });
          tr.appendChild(td);
        });
      });
      el.appendChild(tbl);
      const addRow = document.createElement('button');
      addRow.textContent = '+ 행'; addRow.style.cssText = 'margin-top:4px;font-size:11px;background:#21262d;border:1px solid #30363d;color:#8b949e;padding:2px 8px;border-radius:4px;cursor:pointer;';
      addRow.onclick = e => { e.stopPropagation(); snapshot(); if (!cards[i].rows) cards[i].rows = rows; cards[i].rows.push(new Array(cards[i].rows[0].length).fill('')); renderCards(); saveBoard(); };
      const addCol = document.createElement('button');
      addCol.textContent = '+ 열'; addCol.style.cssText = 'margin-top:4px;margin-left:4px;font-size:11px;background:#21262d;border:1px solid #30363d;color:#8b949e;padding:2px 8px;border-radius:4px;cursor:pointer;';
      addCol.onclick = e => { e.stopPropagation(); snapshot(); if (!cards[i].rows) cards[i].rows = rows; cards[i].rows.forEach(r => r.push('')); renderCards(); saveBoard(); };
      el.appendChild(addRow); el.appendChild(addCol);
    }
    const rh = document.createElement('div'); rh.className = 'resize-handle';
    rh.addEventListener('mousedown', e => { e.preventDefault(); e.stopPropagation(); snapshot(); resizing = { idx: i, startX: e.clientX, startW: card.w || el.offsetWidth }; });
    el.appendChild(rh);
    if (i === selectedIdx) el.classList.add('selected');
    board.appendChild(el);
  });
  requestAnimationFrame(() => {
    let maxB = 0;
    document.querySelectorAll('.card').forEach(el => { const b = (parseFloat(el.style.top)||0) + el.offsetHeight; if (b > maxB) maxB = b; });
    board.style.minHeight = (maxB + 100) + 'px';
  });
}

document.addEventListener('mousemove', e => {
  if (moving) {
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`); if (!el) return;
    let nx = moving.origX + e.clientX - moving.startX, ny = moving.origY + e.clientY - moving.startY;
    if (e.shiftKey) { nx = snap(nx); ny = snap(ny); el.style.outline = '1px dashed rgba(240,192,64,0.3)'; } else { el.style.outline = ''; }
    el.style.left = nx + 'px'; el.style.top = ny + 'px';
  }
  if (resizing) {
    let nw = resizing.startW + e.clientX - resizing.startX; if (e.shiftKey) nw = snap(nw);
    cards[resizing.idx].w = Math.max(100, nw);
    const el = document.querySelector(`.card[data-idx="${resizing.idx}"]`); if (el) el.style.width = cards[resizing.idx].w + 'px';
  }
});

document.addEventListener('mouseup', e => {
  if (moving) {
    let nx = moving.origX + e.clientX - moving.startX, ny = moving.origY + e.clientY - moving.startY;
    if (e.shiftKey) { nx = snap(nx); ny = snap(ny); }
    cards[moving.idx].x = Math.max(0, nx); cards[moving.idx].y = Math.max(0, ny);
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`); if (el) { el.classList.remove('moving'); el.style.outline = ''; }
    if (e.shiftKey) pushCards(moving.idx);
    moving = null; saveBoard();
  }
  if (resizing) { if (e.shiftKey) pushCards(resizing.idx); resizing = null; saveBoard(); }
});

function addTextCard() { snapshot(); cards.push({ type: 'text', content: '', x: 50, y: window.scrollY+100, w: 300 }); renderCards(); setTimeout(() => { const els = document.querySelectorAll('.card .text'); els[els.length-1]?.focus(); }, 100); }
function addImageCard() { const input = document.createElement('input'); input.type = 'file'; input.accept = 'image/*'; input.onchange = e => { const f = e.target.files[0]; if (!f) return; const r = new FileReader(); r.onload = () => { snapshot(); cards.push({ type: 'image', src: r.result, x: 50, y: window.scrollY+100, w: 240 }); renderCards(); saveBoard(); }; r.readAsDataURL(f); }; input.click(); }
function addImageUrl() { const url = prompt('이미지 URL'); if (!url) return; snapshot(); cards.push({ type: 'image', src: url, x: 50, y: window.scrollY+100, w: 240 }); renderCards(); saveBoard(); }
function addTableCard() {
  const colsStr = prompt('열 수 (기본 3)', '3'); const cols = Math.max(1, parseInt(colsStr)||3);
  const rowsStr = prompt('행 수 (헤더 포함, 기본 4)', '4'); const rows = Math.max(1, parseInt(rowsStr)||4);
  snapshot();
  cards.push({ type: 'table', rows: Array.from({length: rows}, (_, ri) => Array.from({length: cols}, (_, ci) => ri===0 ? `열${ci+1}` : '')), x: 50, y: window.scrollY+100, w: Math.max(240, cols*100) });
  renderCards(); saveBoard();
}
function exportBoard() { syncText(); const blob = new Blob([JSON.stringify(cards, null, 2)], { type: 'application/json' }); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = SAVE_KEY + '.json'; a.click(); }
// ── Zoom ─────────────────────────────────────────────────────────────────────
let zoom = parseFloat(localStorage.getItem('zoom-' + SAVE_KEY) || '1.0');
function applyZoom() {
  const board = document.getElementById('board');
  board.style.transform = `scale(${zoom})`;
  board.style.transformOrigin = '0 0';
  document.getElementById('zoom-level').textContent = Math.round(zoom * 100) + '%';
  localStorage.setItem('zoom-' + SAVE_KEY, zoom);
}
function zoomIn()  { zoom = Math.min(3.0, parseFloat((zoom + 0.1).toFixed(2))); applyZoom(); }
function zoomOut() { zoom = Math.max(0.2, parseFloat((zoom - 0.1).toFixed(2))); applyZoom(); }
document.addEventListener('keydown', e => {
  if (e.ctrlKey || e.metaKey) {
    if (e.key === '=' || e.key === '+') { e.preventDefault(); zoomIn(); }
    if (e.key === '-')                  { e.preventDefault(); zoomOut(); }
    if (e.key === '0')                  { e.preventDefault(); zoom = 1.0; applyZoom(); }
  }
});
document.getElementById('board').addEventListener('wheel', e => {
  if (!(e.ctrlKey || e.metaKey)) return;
  e.preventDefault();
  e.deltaY < 0 ? zoomIn() : zoomOut();
}, { passive: false });
applyZoom();
function resetLayout() { if (!confirm('자동 재배치합니다.')) return; cards.forEach(c => { delete c.x; delete c.y; }); renderCards(); autoLayout(); }
// ── Floating format toolbar ───────────────────────────────────────────────────
const fmtBar = document.getElementById('format-toolbar');
function fmt(cmd) { document.execCommand(cmd, false, null); saveBoard(); }
function fmtLink() {
  const sel = window.getSelection();
  if (!sel || sel.isCollapsed) return;
  const url = prompt('링크 URL 입력', 'https://');
  if (!url) return;
  document.execCommand('createLink', false, url);
  // make links open in new tab
  sel.anchorNode?.parentElement?.closest('a')?.setAttribute('target', '_blank');
  document.querySelectorAll('.text a').forEach(a => a.target = '_blank');
  saveBoard();
}

// prevent format buttons from blurring contenteditable
fmtBar.addEventListener('mousedown', e => e.preventDefault());

document.addEventListener('selectionchange', () => {
  const sel = window.getSelection();
  if (!sel || sel.isCollapsed || !sel.toString().trim()) { fmtBar.style.display = 'none'; return; }
  // only show if selection is inside a .text element
  const anchor = sel.anchorNode;
  if (!anchor) { fmtBar.style.display = 'none'; return; }
  const textEl = anchor.nodeType === 1 ? anchor.closest('.text') : anchor.parentElement?.closest('.text');
  if (!textEl) { fmtBar.style.display = 'none'; return; }
  // position above selection
  const range = sel.getRangeAt(0);
  const rect = range.getBoundingClientRect();
  fmtBar.style.display = 'flex';
  const tbW = fmtBar.offsetWidth || 180;
  let left = rect.left + rect.width / 2 - tbW / 2;
  left = Math.max(8, Math.min(left, window.innerWidth - tbW - 8));
  fmtBar.style.left = left + 'px';
  fmtBar.style.top = (rect.top - 44 + window.scrollY) + 'px';
});

setInterval(saveBoard, 30000);
loadBoard();
</script>
