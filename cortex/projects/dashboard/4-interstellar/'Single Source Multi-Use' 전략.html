:#2f2e2e;background-color:white\">아래</span><span lang=\"ko-KR\" style=\"font-family:ui-sans-serif;font-size:12pt;color:#2f2e2e;background-color:white\">&#160;4개가 되면 이동 가능</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"margin-top:12pt;margin-bottom:3pt\"><span style=\"font-family:ui-sans-serif;font-size:13.5pt;color:#2f2e2e;background-color:white\">✅ 이동 기준 4가지</span></p>\r\n\t\t\t\t<li><span lang=\"en-US\"><span style=\"font-family:ui-sans-serif;font-size:12pt;color:#2f2e2e;background-color:white\">자막 없이 들어도</span><span lang=\"ko-KR\" style=\"font-family:ui-sans-serif;font-size:12pt;color:#2f2e2e;background-color:white\">&#160;전체 흐름이 들린다</span></span></li>\r\n\t\t\t\t<li><span lang=\"en-US\"><span style=\"font-family:ui-sans-serif;font-size:12pt;color:#2f2e2e;background-color:white\">핵심 문장 3개를</span><span lang=\"ko-KR\" style=\"font-family:ui-sans-serif;font-size:12pt;color:#2f2e2e;background-color:white\">&#160;안 보고 말할 수 있다</span></span></li>\r\n\t\t\t\t<li><span lang=\"en-US\"><span style=\"font-family:ui-sans-serif;font-size:12pt;color:#2f2e2e;background-color:white\">그 문장을</span><span lang=\"ko-KR\" style=\"font-family:ui-sans-serif;font-size:12pt;color:#2f2e2e;background-color:white\">&#160;주제 바꿔서도 말할 수 있다</span></span></li>\r\n\t\t\t\t<li><span lang=\"en-US\"><span style=\"font-family:ui-sans-serif;font-size:12pt;color:#2f2e2e;background-color:white\">30초 요약 Speaking이</span><span lang=\"ko-KR\" style=\"font-family:ui-sans-serif;font-size:12pt;color:#2f2e2e;background-color:white\">&#160;끊기지 않는다</span></span></li>\r\n\t\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:ui-sans-serif;font-size:12pt;color:#2f2e2e;background-color:white\">&#128073; 이게 보통</span><span lang=\"ko-KR\" style=\"font-family:ui-sans-serif;font-size:12pt;color:#2f2e2e;background-color:white\">&#160;2~4일&#160;</span><span style=\"font-family:ui-sans-serif;font-size:12pt;color:#2f2e2e;background-color:white\">걸린다</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:ui-sans-serif;font-size:12pt;color:#2f2e2e;background-color:white\">(사람마다 다르지만 이 범위를 크게 안 벗어남)</span></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:6pt\"><span style=\"font-family:ui-sans-serif;font-size:18pt;color:#2f2e2e;background-color:white\">그래서 정답 루틴은 이렇게 된다</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"margin-top:12pt;margin-bottom:3pt\"><span style=\"font-family:ui-sans-serif;font-size:15pt;color:#2f2e2e;background-color:white\">&#128257; 추천 운영 방식 (현실 최적)</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"margin-top:12pt;margin-bottom:3pt\"><span style=\"font-family:ui-sans-serif;font-size:13.5pt;color:#2f2e2e;background-color:white\">&#128313; 3일 = 1 영상 (TED 기준 7~10분)</span></p>\r\n\t\t\t\t<table style=\"border:1px solid;border-collapse:collapse\">\r\n\t\t\t\t\t<tr>\r\n\t\t\t\t\t\t<td style=\"border:1px solid\"><span lang=\"en-US\"><span style=\"font-size:10pt;color:#121212\">Day</span></span></td>\r\n\t\t\t\t\t\t<td style=\"border:1px solid\"><span lang=\"en-US\"><span style=\"font-family:Malgun Gothic;font-size:10pt;color:#121212\">내용</span></span></td>\r\n\t\t\t\t\t</tr>\r\n\t\t\t\t\t<tr>\r\n\t\t\t\t\t\t<td style=\"border:1px solid\"><span lang=\"en-US\"><span style=\"font-size:10pt\">Day 1</span></span></td>\r\n\t\t\t\t\t\t<td style=\"border:1px solid\"><span lang=\"en-US\"><span style=\"font-size:10pt\">Listening + </span><span style=\"font-family:Malgun Gothic;font-size:10pt\">구조</span><span style=\"font-size:10pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:10pt\">파악</span></span></td>\r\n\t\t\t\t\t</tr>\r\n\t\t\t\t\t<tr>\r\n\t\t\t\t\t\t<td style=\"border:1px solid\"><span lang=\"en-US\"><span style=\"font-size:10pt\">Day 2</span></span></td>\r\n\t\t\t\t\t\t<td style=\"border:1px solid\"><span lang=\"en-US\"><span style=\"font-family:Malgun Gothic;font-size:10pt\">문장</span><span style=\"font-size:10pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:10pt\">발췌</span><span style=\"font-size:10pt\"> + Writing + Speaking</span></span></td>\r\n\t\t\t\t\t</tr>\r\n\t\t\t\t\t<tr>\r\n\t\t\t\t\t\t<td style=\"border:1px solid\"><span lang=\"en-US\"><span style=\"font-size:10pt\">Day 3</span></span></td>\r\n\t\t\t\t\t\t<td style=\"border:1px solid\"><span lang=\"en-US\"><span style=\"font-size:10pt\">Speaking </span><span style=\"font-family:Malgun Gothic;font-size:10pt\">확장</span><span style=\"font-size:10pt\"> + Shadowing</span></span></td>\r\n\t\t\t\t\t</tr>\r\n\t\t\t\t</table>\r\n\t\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:ui-sans-serif;font-size:12pt;color:#2f2e2e;background-color:white\">➡️ Day 4에 다음 영상으로 이동</span></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:6pt\"><span style=\"font-family:ui-sans-serif;font-size:18pt;color:#2f2e2e;background-color:white\">만약 시간이 정말 적다면?</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"margin-top:12pt;margin-bottom:3pt\"><span style=\"font-family:ui-sans-serif;font-size:13.5pt;color:#2f2e2e;background-color:white\">⏱ 하루 20~30분밖에 안 된다면</span></p>\r\n\t\t\t\t<li><span lang=\"en-US\"><span style=\"font-family:ui-sans-serif;font-size:12pt;color:#2f2e2e;background-color:white\">같은 영상 4~5일</span></span></li>\r\n\t\t\t\t<li><span lang=\"en-US\"><span style=\"font-family:ui-sans-serif;font-size:12pt;color:#2f2e2e;background-color:white\">대신 Speaking을 절대 생략 ❌</span></span></li>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:6pt\"><span style=\"font-family:ui-sans-serif;font-size:18pt;color:#2f2e2e;background-color:white\">반대로 이미 익숙해졌다면?</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"margin-top:12pt;margin-bottom:3pt\"><span style=\"font-family:ui-sans-serif;font-size:13.5pt;color:#2f2e2e;background-color:white\">“이 영상 너무 쉬운데?”</span></p>\r\n\t\t\t\t<li><span lang=\"en-US\"><span style=\"font-family:ui-sans-serif;font-size:12pt;color:#2f2e2e;background-color:white\">그때부터</span><span lang=\"ko-KR\" style=\"font-family:ui-sans-serif;font-size:12pt;color:#2f2e2e;background-color:white\">&#160;새 영상</span></span></li>\r\n\t\t\t\t<li><span lang=\"en-US\"><span style=\"font-family:ui-sans-serif;font-size:12pt;color:#2f2e2e;background-color:white\">난이도는:</span></span></li>\r\n\t\t\t\t<li><span lang=\"en-US\"><span style=\"font-family:ui-sans-serif;font-size:12pt;color:#2f2e2e;background-color:white\">이해율 70~80% 수준</span></span></li>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:6pt\"><span style=\"font-family:ui-sans-serif;font-size:18pt;color:#2f2e2e;background-color:white\">한 문장 요약</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:ui-sans-serif;font-size:12pt;color:#2f2e2e;background-color:white\">영상을 바꿔야 실력이 늘 것 같지만,</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:ui-sans-serif;font-size:12pt;color:#2f2e2e;background-color:white\">실제로 실력을 만드는 건 ‘안 바꿔도 말이 나오는 순간’이다.</span></p>\r\n\t\t\t\t<br />\r\n\t\t\t</ul>\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<ul>\r\n\t\t\t\t<li style=\"list-style-type:circle\"><span lang=\"en-US\"><span style=\"font-family:Malgun Gothic\">체크한 문장들을 활용해</span> **<span style=\"font-family:Malgun Gothic\">나만의 요약문</span>(Executive Summary)**<span style=\"font-family:Malgun Gothic\">을 씁니다</span>.</span></li>\r\n\t\t\t\t<li style=\"list-style-type:circle\"><span lang=\"en-US\"><span style=\"font-weight:bold\">Paraphrasing:</span> &quot;Apple<span style=\"font-family:Malgun Gothic\">의</span> <span style=\"font-family:Malgun Gothic\">공급</span> <span style=\"font-family:Malgun Gothic\">조율이</span> <span style=\"font-family:Malgun Gothic\">필요하다</span>&quot;<span style=\"font-family:Malgun Gothic\">는</span> <span style=\"font-family:Malgun Gothic\">말을</span> <span style=\"font-family:Malgun Gothic\">여러</span> <span style=\"font-family:Malgun Gothic\">방식으로</span> <span style=\"font-family:Malgun Gothic\">변형해</span> <span style=\"font-family:Malgun Gothic\">써봅니다</span>.</span></li>\r\n\t\t\t\t<li style=\"list-style-type:circle\"><span lang=\"en-US\"><span style=\"font-weight:bold\">AI </span><span style=\"font-family:Malgun Gothic;font-weight:bold\">교정</span><span style=\"font-weight:bold\">:</span> <span style=\"font-family:Malgun Gothic\">쓴</span> <span style=\"font-family:Malgun Gothic\">글을</span> ChatGPT <span style=\"font-family:Malgun Gothic\">등에</span> <span style=\"font-family:Malgun Gothic\">넣어</span> <span style=\"font-family:Malgun Gothic\">비즈니스</span> <span style=\"font-family:Malgun Gothic\">이메일</span> <span style=\"font-family:Malgun Gothic\">톤으로</span> <span style=\"font-family:Malgun Gothic\">교정받고</span>, <span style=\"font-family:Malgun Gothic\">교정된</span> <span style=\"font-family:Malgun Gothic\">이유</span>(<span style=\"font-family:Malgun Gothic\">문법</span>, <span style=\"font-family:Malgun Gothic\">뉘앙스</span>)<span style=\"font-family:Malgun Gothic\">를</span> <span style=\"font-family:Malgun Gothic\">파악합니다</span>.</span></li>\r\n\t\t\t</ul>\r\n\t\t\t<ul>\r\n\t\t\t\t<li style=\"list-style-type:circle\"><span lang=\"en-US\"><span style=\"font-family:Malgun Gothic;font-weight:bold\">메인 소스</span><span style=\"font-weight:bold\">:</span> Apple <span style=\"font-family:Malgun Gothic\">실적 발표</span>(Earnings Call) <span style=\"font-family:Malgun Gothic\">혹은 최신</span> AI <span style=\"font-family:Malgun Gothic\">논문의 초록</span>(Abstract)</span></li>\r\n\t\t\t\t<li style=\"list-style-type:circle\"><span lang=\"en-US\"><span style=\"font-family:Malgun Gothic;font-weight:bold\">과정</span><span style=\"font-weight:bold\">:</span> <span style=\"font-family:Malgun Gothic\">전체를</span> <span style=\"font-family:Malgun Gothic\">들으며</span> <span style=\"font-family:Malgun Gothic\">맥락을</span> <span style=\"font-family:Malgun Gothic\">파악하고</span>, <span style=\"font-family:Malgun Gothic\">자막</span>(<span style=\"font-family:Malgun Gothic\">스크립트</span>)<span style=\"font-family:Malgun Gothic\">을</span> <span style=\"font-family:Malgun Gothic\">보며</span> <span style=\"font-family:Malgun Gothic\">모르는</span> <span style=\"font-family:Malgun Gothic\">표현을</span> <span style=\"font-family:Malgun Gothic\">체크합니다</span>.</span></li>\r\n\t\t\t\t<li style=\"list-style-type:circle\"><span lang=\"en-US\"><span style=\"font-family:Malgun Gothic;font-weight:bold\">연쇄</span><span style=\"font-weight:bold\"> </span><span style=\"font-family:Malgun Gothic;font-weight:bold\">효과</span><span style=\"font-weight:bold\">:</span> <span style=\"font-family:Malgun Gothic\">들으면서</span> <span style=\"font-family:Malgun Gothic\">동시에</span> <span style=\"font-family:Malgun Gothic\">읽는</span> <span style=\"font-family:Malgun Gothic\">과정</span>(Reading while listening)<span style=\"font-family:Malgun Gothic\">은</span> <span style=\"font-family:Malgun Gothic\">뇌에</span> &#39;<span style=\"font-family:Malgun Gothic\">소리</span>-<span style=\"font-family:Malgun Gothic\">문자</span>-<span style=\"font-family:Malgun Gothic\">의미</span>&#39;<span style=\"font-family:Malgun Gothic\">를</span> <span style=\"font-family:Malgun Gothic\">동시에</span> <span style=\"font-family:Malgun Gothic\">각인시켜</span>, <span style=\"font-family:Malgun Gothic\">이후</span> Writing <span style=\"font-family:Malgun Gothic\">단계에서</span> <span style=\"font-family:Malgun Gothic\">단어가</span> <span style=\"font-family:Malgun Gothic\">바로</span> <span style=\"font-family:Malgun Gothic\">떠오르게</span> <span style=\"font-family:Malgun Gothic\">합니다</span>.</span></li>\r\n\t\t\t</ul>\r\n\t\t\t<br />\r\n\t\t\t<p lang=\"en-US\" style=\"margin-top:12pt;margin-bottom:3pt\"><span style=\"font-family:ui-sans-serif;font-size:13.5pt;color:#b3b0ad;background-color:#212121\">✅ 최소 효율 구간</span></p>\r\n\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:ui-sans-serif;font-size:12pt;color:#b3b0ad;background-color:#212121\">총 30~40분</span></p>\r\n\t\t\t<table style=\"border:1px solid;border-collapse:collapse\">\r\n\t\t\t\t<tr>\r\n\t\t\t\t\t<td style=\"border:1px solid\"><span lang=\"en-US\"><span style=\"font-family:Malgun Gothic;font-size:10pt;color:#686868\">단계</span></span></td>\r\n\t\t\t\t\t<td style=\"border:1px solid\"><span lang=\"en-US\"><span style=\"font-family:Malgun Gothic;font-size:10pt;color:#686868\">시간</span></span></td>\r\n\t\t\t\t</tr>\r\n\t\t\t\t<tr>\r\n\t\t\t\t\t<td style=\"border:1px solid\"><span lang=\"en-US\"><span style=\"font-size:10pt\">Listening ONLY</span></span></td>\r\n\t\t\t\t\t<td style=\"border:1px solid\"><span lang=\"en-US\"><span style=\"font-size:10pt\">10–15</span><span style=\"font-family:Malgun Gothic;font-size:10pt\">분</span></span></td>\r\n\t\t\t\t</tr>\r\n\t\t\t\t<tr>\r\n\t\t\t\t\t<td style=\"border:1px solid\"><span lang=\"en-US\"><span style=\"font-size:10pt\">Reading ONLY</span></span></td>\r\n\t\t\t\t\t<td style=\"border:1px solid\"><br />\r\n\t\t\t\t\t</td>\r\n\t\t\t\t</tr>\r\n\t\t\t\t<tr>\r\n\t\t\t\t\t<td style=\"border:1px solid\"><span lang=\"en-US\"><span style=\"font-size:10pt\">Reading+Listening</span></span></td>\r\n\t\t\t\t\t<td style=\"border:1px solid\"><span lang=\"en-US\"><span style=\"font-size:10pt\">10–15</span><span style=\"font-family:Malgun Gothic;font-size:10pt\">분</span></span></td>\r\n\t\t\t\t</tr>\r\n\t\t\t\t<tr>\r\n\t\t\t\t\t<td style=\"border:1px solid\"><span lang=\"en-US\"><span style=\"font-size:10pt\">Writing (</span><span style=\"font-family:Malgun Gothic;font-size:10pt\">타이핑</span><span style=\"font-size:10pt\">)</span></span></td>\r\n\t\t\t\t\t<td style=\"border:1px solid\"><span lang=\"en-US\"><span style=\"font-size:10pt\">5–10</span><span style=\"font-family:Malgun Gothic;font-size:10pt\">분</span></span></td>\r\n\t\t\t\t</tr>\r\n\t\t\t\t<tr>\r\n\t\t\t\t\t<td style=\"border:1px solid\"><span lang=\"en-US\"><span style=\"font-size:10pt\">Speaking</span></span></td>\r\n\t\t\t\t\t<td style=\"border:1px solid\"><span lang=\"en-US\"><span style=\"font-size:10pt\">5–10</span><span style=\"font-family:Malgun Gothic;font-size:10pt\">분</span></span></td>\r\n\t\t\t\t</tr>\r\n\t\t\t</table>\r\n\t\t\t<br />\r\n\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:ui-sans-serif;font-size:12pt;color:#b3b0ad;background-color:#212121\">⏱ </span><span style=\"font-family:ui-sans-serif;font-size:12pt;color:#b3b0ad;background-color:#212121\">하루</span><span style=\"font-family:ui-sans-serif;font-size:12pt;color:#b3b0ad;background-color:#212121\"> 30~45</span><span style=\"font-family:ui-sans-serif;font-size:12pt;color:#b3b0ad;background-color:#212121\">분이면</span><span style=\"font-family:ui-sans-serif;font-size:12pt;color:#b3b0ad;background-color:#212121\"> </span><span style=\"font-family:ui-sans-serif;font-size:12pt;color:#b3b0ad;background-color:#212121\">충분</span><span style=\"font-size:12pt;font-weight:bold\">: &quot;</span><span style=\"font-family:Malgun Gothic;font-size:12pt;font-weight:bold\">실전 화상 회의 시뮬레이션</span><span style=\"font-size:12pt;font-weight:bold\">&quot;</span></p>\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:16pt;font-weight:bold\">2. </span><span style=\"font-family:Malgun Gothic;font-size:16pt;font-weight:bold\">폭발적</span><span style=\"font-size:16pt;font-weight:bold\"> </span><span style=\"font-family:Malgun Gothic;font-size:16pt;font-weight:bold\">성장을</span><span style=\"font-size:16pt;font-weight:bold\"> </span><span style=\"font-family:Malgun Gothic;font-size:16pt;font-weight:bold\">위한</span><span style=\"font-size:16pt;font-weight:bold\"> &#39;</span><span style=\"font-family:Malgun Gothic;font-size:16pt;font-weight:bold\">공격적</span><span style=\"font-size:16pt;font-weight:bold\"> </span><span style=\"font-family:Malgun Gothic;font-size:16pt;font-weight:bold\">팁</span><span style=\"font-size:16pt;font-weight:bold\">&#39; (Aggressive Tips)</span></p>\r\n\t\t\t<br />\r\n\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-weight:bold\">&quot;Writing</span><span style=\"font-family:Malgun Gothic;font-weight:bold\">으로</span><span style=\"font-weight:bold\"> </span><span style=\"font-family:Malgun Gothic;font-weight:bold\">출력</span><span style=\"font-weight:bold\"> </span><span style=\"font-family:Malgun Gothic;font-weight:bold\">회로를</span><span style=\"font-weight:bold\"> </span><span style=\"font-family:Malgun Gothic;font-weight:bold\">먼저</span><span style=\"font-weight:bold\"> </span><span style=\"font-family:Malgun Gothic;font-weight:bold\">설계하고</span><span style=\"font-weight:bold\">, </span><span style=\"font-family:Malgun Gothic;font-weight:bold\">이를</span><span style=\"font-weight:bold\"> Listening</span><span style=\"font-family:Malgun Gothic;font-weight:bold\">으로</span><span style=\"font-weight:bold\"> </span><span style=\"font-family:Malgun Gothic;font-weight:bold\">보강한</span><span style=\"font-weight:bold\"> </span><span style=\"font-family:Malgun Gothic;font-weight:bold\">뒤</span><span style=\"font-weight:bold\">, Speaking</span><span style=\"font-family:Malgun Gothic;font-weight:bold\">으로</span><span style=\"font-weight:bold\"> </span><span style=\"font-family:Malgun Gothic;font-weight:bold\">터뜨려야</span><span style=\"font-weight:bold\"> </span><span style=\"font-family:Malgun Gothic;font-weight:bold\">합니다</span><span style=\"font-weight:bold\">.&quot;</span></p>\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:anthropicSerif;color:#7e7e7c;background-color:#141515\">왜 먼저인가:</span></p>\r\n\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:anthropicSerif;color:#7e7e7c;background-color:#141515\">방법:</span></p>\r\n\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:16pt;font-weight:bold\">Step 1: Deep Reading &amp; Listening (</span><span style=\"font-family:Malgun Gothic;font-size:16pt;font-weight:bold\">재료</span><span style=\"font-size:16pt;font-weight:bold\"> </span><span style=\"font-family:Malgun Gothic;font-size:16pt;font-weight:bold\">확보</span><span style=\"font-size:16pt;font-weight:bold\">)</span></p>\r\n\t\t\t<br />\r\n\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:anthropicSerif;color:#7e7e7c;background-color:#141515\">왜 Speaking보다 먼저인가:</span></p>\r\n\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:anthropicSerif;color:#7e7e7c;background-color:#141515\">방법:</span></p>\r\n\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:16pt;font-weight:bold\">Step 3: Writing Task (</span><span style=\"font-family:Malgun Gothic;font-size:16pt;font-weight:bold\">논리</span><span style=\"font-size:16pt;font-weight:bold\"> </span><span style=\"font-family:Malgun Gothic;font-size:16pt;font-weight:bold\">구조화</span><span style=\"font-size:16pt;font-weight:bold\">)</span></p>\r\n\t\t\t<br />\r\n\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:anthropicSerif;color:#7e7e7c;background-color:#141515\">방법:</span></p>\r\n\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:16pt;font-weight:bold\">Step 2: Dictation &amp; Shadowing (</span><span style=\"font-family:Malgun Gothic;font-size:16pt;font-weight:bold\">소리</span><span style=\"font-size:16pt;font-weight:bold\">-</span><span style=\"font-family:Malgun Gothic;font-size:16pt;font-weight:bold\">문자</span><span style=\"font-size:16pt;font-weight:bold\"> </span><span style=\"font-family:Malgun Gothic;font-size:16pt;font-weight:bold\">결합</span><span style=\"font-size:16pt;font-weight:bold\">)</span></p>\r\n\t\t\t<br />\r\n\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:anthropicSerif;color:#7e7e7c;background-color:#141515\">이때쯤이면:</span></p>\r\n\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:anthropicSerif;color:#7e7e7c;background-color:#141515\">방법:</span></p>\r\n\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:16pt;font-weight:bold\">Step 4: Immediate Speaking (</span><span style=\"font-family:Malgun Gothic;font-size:16pt;font-weight:bold\">최종</span><span style=\"font-size:16pt;font-weight:bold\"> </span><span style=\"font-family:Malgun Gothic;font-size:16pt;font-weight:bold\">자동화</span><span style=\"font-size:16pt;font-weight:bold\">)</span></p>\r\n\t\t\t<br />\r\n\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">기존</span> <span style=\"font-family:Malgun Gothic\">앱</span> <span style=\"font-family:Malgun Gothic\">학습</span> <span style=\"font-family:Malgun Gothic\">비중을</span> 20%<span style=\"font-family:Malgun Gothic\">로</span> <span style=\"font-family:Malgun Gothic\">줄이고</span>, <span style=\"font-family:Malgun Gothic\">아래의</span> **&#39;<span style=\"font-family:Malgun Gothic\">출력</span> <span style=\"font-family:Malgun Gothic\">중심</span> <span style=\"font-family:Malgun Gothic\">사이클</span>&#39;**<span style=\"font-family:Malgun Gothic\">에</span> 80%<span style=\"font-family:Malgun Gothic\">를</span> <span style=\"font-family:Malgun Gothic\">투자하십시오</span>.</p>\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t"
  }
];
const CONTENT_HASH = '81bf283d';

let cards = [];
let moving = null, resizing = null;
let selectedIdx = null, clipboardCard = null;
const GRID = 20, GAP = 14;
function snap(v) { return Math.round(v / GRID) * GRID; }

// ── Undo (Ctrl+Z) ────────────────────────────────────────────────────────────
const MAX_HISTORY = 50;
let history = [];
function snapshot() {
  syncText();
  history.push(JSON.stringify(cards));
  if (history.length > MAX_HISTORY) history.shift();
}
function undo() {
  if (!history.length) { showStatus('되돌릴 내용 없음'); return; }
  syncText();
  cards = JSON.parse(history.pop());
  renderCards();
  saveBoard();
  showStatus('↩ 되돌림');
}
function showStatus(msg) {
  const s = document.getElementById('status');
  s.textContent = msg;
  clearTimeout(showStatus._t);
  showStatus._t = setTimeout(() => { s.textContent = ''; }, 2000);
}
document.addEventListener('keydown', e => {
  const isText = document.activeElement?.contentEditable === 'true';
  if ((e.ctrlKey || e.metaKey) && e.key === 'z' && !e.shiftKey) {
    if (isText) return;
    e.preventDefault();
    undo();
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'c' && !e.shiftKey && !isText) {
    if (selectedIdx !== null && cards[selectedIdx]) {
      syncText();
      clipboardCard = JSON.parse(JSON.stringify(cards[selectedIdx]));
      showStatus('카드 복사됨');
      e.preventDefault();
    }
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'v' && !e.shiftKey && !isText) {
    if (clipboardCard) {
      e.preventDefault();
      snapshot();
      const nc = JSON.parse(JSON.stringify(clipboardCard));
      nc.x = (nc.x || 0) + 30; nc.y = (nc.y || 0) + 30;
      cards.push(nc);
      selectedIdx = cards.length - 1;
      renderCards(); saveBoard();
      showStatus('카드 붙여넣음');
    }
  }
  if (e.key === 'Escape') {
    document.querySelectorAll('.card.selected').forEach(c => c.classList.remove('selected'));
    selectedIdx = null;
  }
});

function pushCards(movedIdx) {
  const moved = cards[movedIdx];
  const movedEl = document.querySelector(`.card[data-idx="${movedIdx}"]`);
  if (!movedEl) return;
  const mh = movedEl.offsetHeight;
  document.querySelectorAll('.card').forEach(el => {
    const i = +el.dataset.idx;
    if (i === movedIdx) return;
    const c = cards[i], oh = el.offsetHeight;
    if (moved.x < (c.x+(c.w||200)) && (moved.x+(moved.w||200)) > c.x && moved.y < (c.y+oh) && (moved.y+mh) > c.y) {
      c.y = moved.y + mh + GAP;
      el.style.top = c.y + 'px';
    }
  });
}

function loadBoard() {
  const saved = localStorage.getItem(SAVE_KEY);
  const savedHash = localStorage.getItem(SAVE_KEY + ':hash');
  let parsed = null;
  try { parsed = saved ? JSON.parse(saved) : null; } catch(e) {}
  // reset if: no save, empty array, or content hash changed (page regenerated)
  if (!parsed || parsed.length === 0 || savedHash !== CONTENT_HASH) {
    cards = DEFAULT_CARDS.map(c => ({...c}));
    localStorage.removeItem(SAVE_KEY);
    localStorage.setItem(SAVE_KEY + ':hash', CONTENT_HASH);
    renderCards();
    const hasCoords = cards.some(c => c.x !== undefined && c.y !== undefined);
    if (!hasCoords) autoLayout();
    return;
  }
  cards = parsed;
  renderCards();
}
function resetToDefaults() { if (!confirm('저장된 보드를 지우고 원본으로 초기화합니다. 계속할까요?')) return; localStorage.removeItem(SAVE_KEY); cards = DEFAULT_CARDS.map(c => ({...c})); renderCards(); autoLayout(); }

function autoLayout() {
  const boardW = document.getElementById('board').offsetWidth;
  const cols = Math.max(1, Math.floor(boardW / 280));
  const colW = (boardW - GAP*(cols-1)) / cols;
  const colH = new Array(cols).fill(0);
  const allCards = document.querySelectorAll('.card');
  const images = document.querySelectorAll('.card img');
  let loaded = 0;
  function place() {
    allCards.forEach((el, i) => {
      const w = Math.min(cards[i].w || colW, colW);
      let minCol = 0;
      for (let c = 1; c < cols; c++) if (colH[c] < colH[minCol]) minCol = c;
      cards[i].x = minCol * (colW + GAP);
      cards[i].y = colH[minCol];
      cards[i].w = w;
      el.style.left = cards[i].x + 'px';
      el.style.top = cards[i].y + 'px';
      el.style.width = w + 'px';
      colH[minCol] = cards[i].y + el.offsetHeight + GAP;
    });
    document.getElementById('board').style.minHeight = (Math.max(...colH) + 100) + 'px';
    saveBoard();
  }
  if (!images.length) { requestAnimationFrame(place); return; }
  images.forEach(img => {
    if (img.complete) { loaded++; if (loaded >= images.length) requestAnimationFrame(place); }
    else { img.onload = img.onerror = () => { loaded++; if (loaded >= images.length) requestAnimationFrame(place); }; }
  });
}

function syncText() {
  document.querySelectorAll('.card').forEach(el => {
    const i = +el.dataset.idx;
    if (cards[i]?.type === 'text') { const t = el.querySelector('.text'); if (t) cards[i].content = t.innerHTML; }
  });
}
function saveBoard() { syncText(); localStorage.setItem(SAVE_KEY, JSON.stringify(cards)); localStorage.setItem(SAVE_KEY + ':hash', CONTENT_HASH); showStatus('저장됨 ' + new Date().toLocaleTimeString()); }

function renderCards() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  cards.forEach((card, i) => {
    const el = document.createElement('div');
    el.className = 'card'; el.dataset.idx = i;
    if (card.x !== undefined) el.style.left = card.x + 'px';
    if (card.y !== undefined) el.style.top = card.y + 'px';
    // html cards contain raw OneNote table HTML which may overflow the stated div width
    if (card.w) { if (card.type === 'html') el.style.minWidth = card.w + 'px'; else el.style.width = card.w + 'px'; }
    el.addEventListener('mousedown', e => {
      if (e.target.closest('.text, a, .card-btn, .resize-handle, td, th')) return;
      e.preventDefault();
      // Update selection
      document.querySelectorAll('.card.selected').forEach(c => c.classList.remove('selected'));
      selectedIdx = i; el.classList.add('selected');
      snapshot();
      moving = { idx: i, startX: e.clientX, startY: e.clientY, origX: card.x||0, origY: card.y||0 };
      el.classList.add('moving');
    });
    const actions = document.createElement('div'); actions.className = 'card-actions';
    const delBtn = document.createElement('button'); delBtn.className = 'card-btn'; delBtn.textContent = '×';
    delBtn.onclick = e => { e.stopPropagation(); if(confirm('삭제?')) { snapshot(); cards.splice(i,1); renderCards(); saveBoard(); } };
    actions.appendChild(delBtn); el.appendChild(actions);
    if (card.type === 'text') {
      const text = document.createElement('div'); text.className = 'text'; text.contentEditable = true;
      text.innerHTML = card.content || '';
      text.addEventListener('focus', () => { snapshot(); });
      text.addEventListener('blur', () => { card.content = text.innerHTML; saveBoard(); });
      el.appendChild(text);
    } else if (card.type === 'image') {
      const img = document.createElement('img');
      img.src = card.src.startsWith('http') || card.src.startsWith('data:') ? card.src : IMG_BASE + card.src;
      img.alt = ''; img.loading = 'lazy'; img.onerror = () => img.style.display = 'none';
      if (card.w) img.style.width = card.w + 'px';
      if (card.h) img.style.height = card.h + 'px';
      if (card.link) { const a = document.createElement('a'); a.href = card.link; a.target = '_blank'; a.appendChild(img); el.appendChild(a); }
      else { el.appendChild(img); }
      if (card.caption) { const cap = document.createElement('div'); cap.style.cssText = 'font-size:11px;color:#8b949e;margin-top:4px;word-break:break-word;padding:0 2px;'; cap.textContent = card.caption; el.appendChild(cap); }
    } else if (card.type === 'html') {
      const wrapper = document.createElement('div');
      wrapper.style.cssText = 'overflow:auto;font-size:13px;line-height:1.5;';
      wrapper.innerHTML = card.html.replace(/__ATTACHMENT__/g, IMG_BASE);
      wrapper.querySelectorAll('img').forEach(img => { img.style.maxWidth = '100%'; img.style.height = 'auto'; img.draggable = false; });
      wrapper.querySelectorAll('a').forEach(a => { a.target = '_blank'; a.style.color = '#6cb0f6'; });
      wrapper.querySelectorAll('table').forEach(t => { t.style.borderCollapse = 'collapse'; });
      wrapper.querySelectorAll('td,th').forEach(td => {
        td.style.border = '1px solid #444'; td.style.padding = '4px 6px'; td.style.verticalAlign = 'top';
        td.title = '더블클릭으로 편집';
        td.addEventListener('dblclick', function(e) {
          e.stopPropagation();
          snapshot();
          this.contentEditable = 'true';
          this.style.outline = '2px solid #388bfd';
          this.style.background = 'rgba(56,139,253,0.08)';
          this.focus();
        });
        td.addEventListener('blur', function() {
          this.contentEditable = 'false';
          this.style.outline = '';
          this.style.background = '';
          cards[i].html = wrapper.innerHTML.split(IMG_BASE).join('__ATTACHMENT__');
          saveBoard();
        });
      });
      el.appendChild(wrapper);
    } else if (card.type === 'table') {
      const rows = card.rows || [['','',''],['','',''],['','','']];
      const tbl = document.createElement('table');
      tbl.style.cssText = 'border-collapse:collapse;width:100%;font-size:13px;';
      rows.forEach((row, ri) => {
        const tr = tbl.insertRow();
        row.forEach((cell, ci) => {
          const td = document.createElement(ri === 0 ? 'th' : 'td');
          td.contentEditable = true;
          td.style.cssText = 'border:1px solid #30363d;padding:4px 8px;min-width:60px;text-align:left;' + (ri===0 ? 'background:#21262d;font-weight:600;' : '');
          td.textContent = cell;
          td.addEventListener('blur', () => { if (!cards[i].rows) cards[i].rows = rows; rows[ri][ci] = td.textContent; saveBoard(); });
          tr.appendChild(td);
        });
      });
      el.appendChild(tbl);
      const addRow = document.createElement('button');
      addRow.textContent = '+ 행'; addRow.style.cssText = 'margin-top:4px;font-size:11px;background:#21262d;border:1px solid #30363d;color:#8b949e;padding:2px 8px;border-radius:4px;cursor:pointer;';
      addRow.onclick = e => { e.stopPropagation(); snapshot(); if (!cards[i].rows) cards[i].rows = rows; cards[i].rows.push(new Array(cards[i].rows[0].length).fill('')); renderCards(); saveBoard(); };
      const addCol = document.createElement('button');
      addCol.textContent = '+ 열'; addCol.style.cssText = 'margin-top:4px;margin-left:4px;font-size:11px;background:#21262d;border:1px solid #30363d;color:#8b949e;padding:2px 8px;border-radius:4px;cursor:pointer;';
      addCol.onclick = e => { e.stopPropagation(); snapshot(); if (!cards[i].rows) cards[i].rows = rows; cards[i].rows.forEach(r => r.push('')); renderCards(); saveBoard(); };
      el.appendChild(addRow); el.appendChild(addCol);
    }
    const rh = document.createElement('div'); rh.className = 'resize-handle';
    rh.addEventListener('mousedown', e => { e.preventDefault(); e.stopPropagation(); snapshot(); resizing = { idx: i, startX: e.clientX, startW: card.w || el.offsetWidth }; });
    el.appendChild(rh);
    if (i === selectedIdx) el.classList.add('selected');
    board.appendChild(el);
  });
  requestAnimationFrame(() => {
    let maxB = 0;
    document.querySelectorAll('.card').forEach(el => { const b = (parseFloat(el.style.top)||0) + el.offsetHeight; if (b > maxB) maxB = b; });
    board.style.minHeight = (maxB + 100) + 'px';
  });
}

document.addEventListener('mousemove', e => {
  if (moving) {
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`); if (!el) return;
    let nx = moving.origX + e.clientX - moving.startX, ny = moving.origY + e.clientY - moving.startY;
    if (e.shiftKey) { nx = snap(nx); ny = snap(ny); el.style.outline = '1px dashed rgba(240,192,64,0.3)'; } else { el.style.outline = ''; }
    el.style.left = nx + 'px'; el.style.top = ny + 'px';
  }
  if (resizing) {
    let nw = resizing.startW + e.clientX - resizing.startX; if (e.shiftKey) nw = snap(nw);
    cards[resizing.idx].w = Math.max(100, nw);
    const el = document.querySelector(`.card[data-idx="${resizing.idx}"]`); if (el) el.style.width = cards[resizing.idx].w + 'px';
  }
});

document.addEventListener('mouseup', e => {
  if (moving) {
    let nx = moving.origX + e.clientX - moving.startX, ny = moving.origY + e.clientY - moving.startY;
    if (e.shiftKey) { nx = snap(nx); ny = snap(ny); }
    cards[moving.idx].x = Math.max(0, nx); cards[moving.idx].y = Math.max(0, ny);
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`); if (el) { el.classList.remove('moving'); el.style.outline = ''; }
    if (e.shiftKey) pushCards(moving.idx);
    moving = null; saveBoard();
  }
  if (resizing) { if (e.shiftKey) pushCards(resizing.idx); resizing = null; saveBoard(); }
});

function addTextCard() { snapshot(); cards.push({ type: 'text', content: '', x: 50, y: window.scrollY+100, w: 300 }); renderCards(); setTimeout(() => { const els = document.querySelectorAll('.card .text'); els[els.length-1]?.focus(); }, 100); }
function addImageCard() { const input = document.createElement('input'); input.type = 'file'; input.accept = 'image/*'; input.onchange = e => { const f = e.target.files[0]; if (!f) return; const r = new FileReader(); r.onload = () => { snapshot(); cards.push({ type: 'image', src: r.result, x: 50, y: window.scrollY+100, w: 240 }); renderCards(); saveBoard(); }; r.readAsDataURL(f); }; input.click(); }
function addImageUrl() { const url = prompt('이미지 URL'); if (!url) return; snapshot(); cards.push({ type: 'image', src: url, x: 50, y: window.scrollY+100, w: 240 }); renderCards(); saveBoard(); }
function addTableCard() {
  const colsStr = prompt('열 수 (기본 3)', '3'); const cols = Math.max(1, parseInt(colsStr)||3);
  const rowsStr = prompt('행 수 (헤더 포함, 기본 4)', '4'); const rows = Math.max(1, parseInt(rowsStr)||4);
  snapshot();
  cards.push({ type: 'table', rows: Array.from({length: rows}, (_, ri) => Array.from({length: cols}, (_, ci) => ri===0 ? `열${ci+1}` : '')), x: 50, y: window.scrollY+100, w: Math.max(240, cols*100) });
  renderCards(); saveBoard();
}
function exportBoard() { syncText(); const blob = new Blob([JSON.stringify(cards, null, 2)], { type: 'application/json' }); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = SAVE_KEY + '.json'; a.click(); }
// ── Zoom ─────────────────────────────────────────────────────────────────────
let zoom = parseFloat(localStorage.getItem('zoom-' + SAVE_KEY) || '1.0');
function applyZoom() {
  const board = document.getElementById('board');
  board.style.transform = `scale(${zoom})`;
  board.style.transformOrigin = '0 0';
  document.getElementById('zoom-level').textContent = Math.round(zoom * 100) + '%';
  localStorage.setItem('zoom-' + SAVE_KEY, zoom);
}
function zoomIn()  { zoom = Math.min(3.0, parseFloat((zoom + 0.1).toFixed(2))); applyZoom(); }
function zoomOut() { zoom = Math.max(0.2, parseFloat((zoom - 0.1).toFixed(2))); applyZoom(); }
document.addEventListener('keydown', e => {
  if (e.ctrlKey || e.metaKey) {
    if (e.key === '=' || e.key === '+') { e.preventDefault(); zoomIn(); }
    if (e.key === '-')                  { e.preventDefault(); zoomOut(); }
    if (e.key === '0')                  { e.preventDefault(); zoom = 1.0; applyZoom(); }
  }
});
document.getElementById('board').addEventListener('wheel', e => {
  if (!(e.ctrlKey || e.metaKey)) return;
  e.preventDefault();
  e.deltaY < 0 ? zoomIn() : zoomOut();
}, { passive: false });
applyZoom();
function resetLayout() { if (!confirm('자동 재배치합니다.')) return; cards.forEach(c => { delete c.x; delete c.y; }); renderCards(); autoLayout(); }
// ── Floating format toolbar ───────────────────────────────────────────────────
const fmtBar = document.getElementById('format-toolbar');
function fmt(cmd) { document.execCommand(cmd, false, null); saveBoard(); }
function fmtLink() {
  const sel = window.getSelection();
  if (!sel || sel.isCollapsed) return;
  const url = prompt('링크 URL 입력', 'https://');
  if (!url) return;
  document.execCommand('createLink', false, url);
  // make links open in new tab
  sel.anchorNode?.parentElement?.closest('a')?.setAttribute('target', '_blank');
  document.querySelectorAll('.text a').forEach(a => a.target = '_blank');
  saveBoard();
}

// prevent format buttons from blurring contenteditable
fmtBar.addEventListener('mousedown', e => e.preventDefault());

document.addEventListener('selectionchange', () => {
  const sel = window.getSelection();
  if (!sel || sel.isCollapsed || !sel.toString().trim()) { fmtBar.style.display = 'none'; return; }
  // only show if selection is inside a .text element
  const anchor = sel.anchorNode;
  if (!anchor) { fmtBar.style.display = 'none'; return; }
  const textEl = anchor.nodeType === 1 ? anchor.closest('.text') : anchor.parentElement?.closest('.text');
  if (!textEl) { fmtBar.style.display = 'none'; return; }
  // position above selection
  const range = sel.getRangeAt(0);
  const rect = range.getBoundingClientRect();
  fmtBar.style.display = 'flex';
  const tbW = fmtBar.offsetWidth || 180;
  let left = rect.left + rect.width / 2 - tbW / 2;
  left = Math.max(8, Math.min(left, window.innerWidth - tbW - 8));
  fmtBar.style.left = left + 'px';
  fmtBar.style.top = (rect.top - 44 + window.scrollY) + 'px';
});

setInterval(saveBoard, 30000);
loadBoard();
</script>
</body>
</html>
