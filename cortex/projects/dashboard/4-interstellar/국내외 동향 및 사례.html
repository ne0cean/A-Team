n\t\t\t\t<p style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:12pt;font-weight:bold\">산업 로봇 분야의 진화</span><span style=\"font-size:12pt\">도 중요한 동향입니다. 전통적으로 자동차 산업을 중심으로 발전해온 산업용 로봇에 AI와 </span><span style=\"font-size:12pt;font-weight:bold\">머신비전, 자율제어</span><span style=\"font-size:12pt\"> 기술이 접목되면서, 보다 유연하고 똑똑한 로봇이 등장하고 있습니다. 예를 들어 **협동로봇(cobot)**은 사람과 함께 작업할 수 있도록 설계된 소형 로봇으로, 최근 설치 대수가 급증하여 </span><span style=\"font-size:12pt;font-weight:bold\">2022년에는 전세계 산업용 로봇 신규 설치의 10% 수준인 5.5만 대가 협동로봇으로 집계</span><span style=\"font-size:12pt\">될 정도로 성장하였습니다</span><a href=\"https://statzon.com/insights/ifr-world-robotics-2023#:~:text=Over%20recent%20years%2C%20collaborative%20robots%2C,CAGR%20from%202017%20to%202022\" style=\"font-size:12pt\">statzon.com</a><span style=\"font-size:12pt\">. 2017~2022년 기간 협동로봇의 연평균 성장률은 37.9%로 전통적 로봇보다도 높게 나타났습니다</span><a href=\"https://statzon.com/insights/ifr-world-robotics-2023#:~:text=Over%20recent%20years%2C%20collaborative%20robots%2C,CAGR%20from%202017%20to%202022\" style=\"font-size:12pt\">statzon.com</a><span style=\"font-size:12pt\">. 동시에 AI를 탑재한 로봇은 </span><span style=\"font-size:12pt;font-weight:bold\">머신비전으로 물체를 인식/픽킹</span><span style=\"font-size:12pt\">하고, </span><span style=\"font-size:12pt;font-weight:bold\">강화학습으로 작업 속도를 스스로 향상</span><span style=\"font-size:12pt\">시키는 등 (과거 1대 로봇이 8시간 걸리던 작업을 여러 대가 협업하여 1시간만에 학습 완료한 사례 등</span><a href=\"https://nvidianews.nvidia.com/news/fanuc-to-build-factory-of-the-future-using-nvidia-ai-platform#:~:text=automated%20factories%20worldwide\" style=\"font-size:12pt\">nvidianews.nvidia.com</a><span style=\"font-size:12pt\">) </span><span style=\"font-size:12pt;font-weight:bold\">생산성 혁신</span><span style=\"font-size:12pt\">을 이끌고 있습니다. 국제로봇연맹(IFR)은 </span><span style=\"font-size:12pt;font-weight:bold\">클라우드 컴퓨팅, 5G 통신, 머신비전, AI의 융합</span><span style=\"font-size:12pt\">이 차세대 스마트 로봇 발전의 핵심이라고 지목하면서, </span><span style=\"font-size:12pt;font-weight:bold\">로보틱스 분야에 클라우드 연결과 AI지능이 빠르게 확산</span><span style=\"font-size:12pt\">되고 있다고 분석했습니다</span><a href=\"https://statzon.com/insights/ifr-world-robotics-2023#:~:text=IFR%20World%20Robotics%202023%20report,performance%20and%20fully%20digital%20production\" style=\"font-size:12pt\">statzon.com</a><span style=\"font-size:12pt\">.</span></p>\r\n\t\t\t\t<p style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:12pt\">이 밖에도 </span><span style=\"font-size:12pt;font-weight:bold\">디지털 트윈</span><span style=\"font-size:12pt\"> 기술과 AI의 결합도 제조혁신의 중요 흐름입니다. 제품의 가상모델을 통해 생산 공정을 시뮬레이션하고 최적화하는 디지털 트윈이 AI의 지원으로 더욱 정교해지고 있으며</span><a href=\"https://www.fortunebusinessinsights.com/ko/artificial-intelligence-ai-in-manufacturing-market-102824#:~:text=%EC%8B%9C%EC%9E%A5%20%EB%8F%99%ED%96%A5%20%EC%A0%9C%EC%A1%B0%EC%97%90%EC%84%9C%20%EC%9D%B8%EA%B3%B5%20%EC%A7%80%EB%8A%A5\" style=\"font-size:12pt\">fortunebusinessinsights.com</a><span style=\"font-size:12pt\">, 이를 통해 </span><span style=\"font-size:12pt;font-weight:bold\">생산 라인의 효율 향상과 문제 예측/대응</span><span style=\"font-size:12pt\">이 실시간으로 가능해지고 있습니다. </span><span style=\"font-size:12pt;font-weight:bold\">대화형 AI/생성형 AI</span><span style=\"font-size:12pt\">도 2022년 이후 제조분야에 등장하여, 생산 현장의 </span><span style=\"font-size:12pt;font-weight:bold\">AI 비서</span><span style=\"font-size:12pt\">나 </span><span style=\"font-size:12pt;font-weight:bold\">코파일럿</span><span style=\"font-size:12pt\"> 역할을 시작했습니다. 예를 들어 Siemens는 2023년 Microsoft와 협력하여 </span><span style=\"font-size:12pt;font-weight:bold\">대형 언어모델(LLM)을 활용한 산업용 코파일럿</span><span style=\"font-size:12pt\">을 선보였는데, 이 솔루션은 공장 엔지니어들이 음성이나 채팅으로 설비 데이터를 질의하면 유지보수 조언을 주거나 문서를 탐색해주는 등의 기능을 현장에 제공하고 있습니다</span><a href=\"https://press.siemens.com/global/en/pressrelease/siemens-drives-ai-adoption-industrial-operations-x-and-nvidia-accelerated-industrial#:~:text=In%20addition%20to%20no,making%20and%20reduce%20machine%20downtime\" style=\"font-size:12pt\">press.siemens.com</a><span style=\"font-size:12pt\">. 현재 </span><span style=\"font-size:12pt;font-weight:bold\">대부분의 제조 소프트웨어 업체들이 자사 솔루션에 이러한 AI 코파일럿 기능</span><span style=\"font-size:12pt\">을 속속 통합하는 추세입니다</span><a href=\"https://iot-analytics.com/industrial-ai-market-insights-how-ai-is-transforming-manufacturing/#:~:text=architectures%20%20,Insights%2B%20exclusive\" style=\"font-size:12pt\">iot-analytics.com</a><span style=\"font-size:12pt\">.</span></p>\r\n\t\t\t\t<p style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:12pt;font-weight:bold\">산업별 적용 사례 동향</span></p>\r\n\t\t\t\t<p style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:12pt\">AI 도입은 </span><span style=\"font-size:12pt;font-weight:bold\">자동차, 전자, 중공업, 소비재, 제약/의료기기</span><span style=\"font-size:12pt\"> 등 여러 제조 업종에서 각기 특성에 맞게 이루어지고 있습니다. </span><span style=\"font-size:12pt;font-weight:bold\">자동차 산업</span><span style=\"font-size:12pt\">은 로봇 자동화와 예지보전 활용이 가장 앞선 분야로, 미국의 상위 자동차 제조사들 중 60% 이상이 이미 조립라인 자동화, 자율주행 테스트, 품질검사 등에 AI를 활용 중입니다</span><a href=\"https://artsmart.ai/blog/ai-in-the-manufacturing-statistics/#:~:text=%23%203.%2060,AI%20technologies%20in%20various%20capacities\" style=\"font-size:12pt\">artsmart.ai</a><span style=\"font-size:12pt\">. 앞서 언급한 르노의 사례처럼 설비 유지보수 최적화로 대규모 비용절감을 이룬 예도 있고, </span><span style=\"font-size:12pt;font-weight:bold\">토요타</span><span style=\"font-size:12pt\">의 경우 향후 차량 개발/생산에 AI와 소프트웨어를 대폭 투입하기 위해 2025년까지 </span><span style=\"font-size:12pt;font-weight:bold\">1조7천억 엔(약 106억 달러)</span><span style=\"font-size:12pt\"> 규모의 투자 계획을 발표하며 사람과 AI의 협업을 강조하고 있습니다</span><a href=\"https://iot-analytics.com/industrial-ai-market-insights-how-ai-is-transforming-manufacturing/#:~:text=FY2025%2C%20Toyota%20committed%201,worker%20safety%20and%20boost%20productivity\" style=\"font-size:12pt\">iot-analytics.com</a><span style=\"font-size:12pt\">.</span></p>\r\n\t\t\t\t<p style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:12pt;font-weight:bold\">전자/반도체 산업</span><span style=\"font-size:12pt\">에서는 제품 사이클이 짧고 품질 요구가 높아 </span><span style=\"font-size:12pt;font-weight:bold\">머신비전 기반의 결함 검사</span><span style=\"font-size:12pt\">와 </span><span style=\"font-size:12pt;font-weight:bold\">공정 최적화</span><span style=\"font-size:12pt\">에 AI를 적극 도입하고 있습니다. 대표적으로 앞서 언급한 </span><span style=\"font-size:12pt;font-weight:bold\">Pegatron</span><span style=\"font-size:12pt\"> 사례처럼, 첨단 딥러닝 비전시스템으로 미세한 결함까지 잡아내어 불량률을 낮추고 생산속도를 높이고 있습니다</span><a href=\"https://iot-analytics.com/industrial-ai-market-insights-how-ai-is-transforming-manufacturing/#:~:text=Taiwan,and%204x%20improvement%20in%20throughput\" style=\"font-size:12pt\">iot-analytics.com</a><span style=\"font-size:12pt\">. 또한 반도체 제조장비의 오류 예측, 공정 파라미터 최적화 등에도 ML이 활용되어 수율 향상에 기여하고 있습니다.</span></p>\r\n\t\t\t\t<p style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:12pt;font-weight:bold\">에너지/중공업 분야</span><span style=\"font-size:12pt\">에서는 발전 설비나 중장비의 </span><span style=\"font-size:12pt;font-weight:bold\">예측 유지보수와 운영 최적화</span><span style=\"font-size:12pt\">가 AI 적용의 핵심입니다. 예를 들어 </span><span style=\"font-size:12pt;font-weight:bold\">GE</span><span style=\"font-size:12pt\">는 가스터빈, 풍력발전기 등 자산의 센서데이터를 실시간 분석하여 **Asset Performance Management(APM)**을 수행하는 소프트웨어를 제공하고 있는데, </span><span style=\"font-size:12pt;font-weight:bold\">AI/ML 기반 디지털 트윈</span><span style=\"font-size:12pt\"> 기술을 통해 이상징후를 조기에 감지하고 있습니다</span><a href=\"https://www.gevernova.com/software/innovation/digital-twin-technology#:~:text=Digital%20Twin%20Technology%20,the%20world%27s%20foremost%20energy%20industrials\" style=\"font-size:12pt\">gevernova.com</a><span style=\"font-size:12pt\">. 이런 솔루션으로 운용사는 가동시간을 늘리고 유지비를 줄이는 효과를 보고 있습니다. 또 </span><span style=\"font-size:12pt;font-weight:bold\">제철, 화학</span><span style=\"font-size:12pt\"> 등 공정산업에서는 AI로 </span><span style=\"font-size:12pt;font-weight:bold\">공정 제어 파라미터를 최적화</span><span style=\"font-size:12pt\">하거나 이상 상황을 감지하여 </span><span style=\"font-size:12pt;font-weight:bold\">품질과 에너지 효율을 개선</span><span style=\"font-size:12pt\">하는 시도가 활발합니다.</span></p>\r\n\t\t\t\t<p style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:12pt;font-weight:bold\">의료기기 및 제약 제조</span><span style=\"font-size:12pt\">는 최근 떠오르는 분야로, 정밀한 품질 관리와 제품 설계에 AI가 큰 역할을 합니다. 실제 한 시장조사에서는 </span><span style=\"font-size:12pt;font-weight:bold\">의료기기 제조 분야가 2020년대 AI 도입으로 가장 큰 혜택을 볼 산업 중 하나로, 2024~2034년 사이 해당 분야가 제조 AI 시장에서 최대 비중을 차지할 것</span><span style=\"font-size:12pt\">으로 전망했습니다</span><a href=\"https://artsmart.ai/blog/ai-in-the-manufacturing-statistics/#:~:text=,market%20between%202024%20and%202034\" style=\"font-size:12pt\">artsmart.ai</a><span style=\"font-size:12pt\">. 이는 의료기기의 높은 정밀도 요구와 규제준수에 AI가 기여할 여지가 크기 때문이며, 예를 들어 AI로 </span><span style=\"font-size:12pt;font-weight:bold\">영상 기반 조립검사</span><span style=\"font-size:12pt\">를 수행하거나 </span><span style=\"font-size:12pt;font-weight:bold\">제조 프로세스 데이터를 분석하여 밸리데이션 자동화</span><span style=\"font-size:12pt\">를 하는 등의 활용이 늘고 있습니다.</span></p>\r\n\t\t\t\t<p style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:12pt\">이처럼 업종별로 차이는 있지만, **품질 검사(Quality Inspection)**와 **예지보전(Predictive Maintenance)**은 거의 모든 제조 분야에 공통으로 적용되는 </span><span style=\"font-size:12pt;font-weight:bold\">범용적인 AI 활용 사례</span><span style=\"font-size:12pt\">로 자리잡았습니다. 아래 표는 제조 분야 주요 AI 활용 영역과 그 예시를 정리한 것입니다:</span></p>\r\n\t\t\t\t<table style=\"border:0px\">\r\n\t\t\t\t\t<tr>\r\n\t\t\t\t\t\t<td style=\"border:0px;font-family:Pretendard Thin;font-size:10pt\"><span style=\"font-size:12pt;font-weight:bold\">주요 활용 분야</span></td>\r\n\t\t\t\t\t\t<td style=\"border:0px;font-family:Pretendard Thin;font-size:10pt\"><span style=\"font-size:12pt;font-weight:bold\">적용 내용 및 효과</span></td>\r\n\t\t\t\t\t\t<td style=\"border:0px;font-family:Pretendard Thin;font-size:10pt\"><span style=\"font-size:12pt;font-weight:bold\">사례 및 실증 결과 (출처)</span></td>\r\n\t\t\t\t\t</tr>\r\n\t\t\t\t\t<tr>\r\n\t\t\t\t\t\t<td style=\"border:0px;font-family:Pretendard Thin;font-size:10pt\"><span style=\"font-size:12pt;font-weight:bold\">시각 검사&lt;br&gt;(품질 관리)</span></td>\r\n\t\t\t\t\t\t<td style=\"border:0px\"><p style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:12pt\">카메라와 딥러닝으로 제품의 결함을 자동 식별</span></p>\r\n\t\t\t\t\t\t<p style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:12pt\">휴먼에러 감소 및 검사속도 향상</span></p>\r\n\t\t\t\t\t\t</td>\r\n\t\t\t\t\t\t<td style=\"border:0px;font-family:Pretendard Thin;font-size:10pt\"><span style=\"font-size:12pt;font-style:italic\">페가트론</span><span style=\"font-family:Batang;font-size:12pt;font-style:italic\">社</span><span style=\"font-size:12pt;font-style:italic\">:</span><span style=\"font-size:12pt\"> AI 기반 </span><span style=\"font-size:12pt;font-weight:bold\">광학검사 도구(PEGA AI)</span><span style=\"font-size:12pt\"> 도입 후 결함 검출정확도 </span><span style=\"font-size:12pt;font-weight:bold\">99.8%</span><span style=\"font-size:12pt\">, 검사처리 4배 향상</span><a href=\"https://iot-analytics.com/industrial-ai-market-insights-how-ai-is-transforming-manufacturing/#:~:text=Taiwan,and%204x%20improvement%20in%20throughput\" style=\"font-size:12pt\">iot-analytics.com</a></td>\r\n\t\t\t\t\t</tr>\r\n\t\t\t\t\t<tr>\r\n\t\t\t\t\t\t<td style=\"border:0px\"><p style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:12pt;font-weight:bold\">예지 유지보수</span></p>\r\n\t\t\t\t\t\t<p style=\"font-family:Pretendard Thin;font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:12pt\">(Predictive Maintenance)</span></p>\r\n\t\t\t\t\t\t</td>\r\n\t\t\t\t\t\t<td style=\"border:0px\"><p style=\"font-family   renderCards();
  saveBoard();
  showStatus('↩ 되돌림');
}
function showStatus(msg) {
  const s = document.getElementById('status');
  s.textContent = msg;
  clearTimeout(showStatus._t);
  showStatus._t = setTimeout(() => { s.textContent = ''; }, 2000);
}
document.addEventListener('keydown', e => {
  const isText = document.activeElement?.contentEditable === 'true';
  if ((e.ctrlKey || e.metaKey) && e.key === 'z' && !e.shiftKey) {
    if (isText) return;
    e.preventDefault();
    undo();
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'c' && !e.shiftKey && !isText) {
    if (selectedIdx !== null && cards[selectedIdx]) {
      syncText();
      clipboardCard = JSON.parse(JSON.stringify(cards[selectedIdx]));
      showStatus('카드 복사됨');
      e.preventDefault();
    }
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'v' && !e.shiftKey && !isText) {
    if (clipboardCard) {
      e.preventDefault();
      snapshot();
      const nc = JSON.parse(JSON.stringify(clipboardCard));
      nc.x = (nc.x || 0) + 30; nc.y = (nc.y || 0) + 30;
      cards.push(nc);
      selectedIdx = cards.length - 1;
      renderCards(); saveBoard();
      showStatus('카드 붙여넣음');
    }
  }
  if (e.key === 'Escape') {
    document.querySelectorAll('.card.selected').forEach(c => c.classList.remove('selected'));
    selectedIdx = null;
  }
});

function pushCards(movedIdx) {
  const moved = cards[movedIdx];
  const movedEl = document.querySelector(`.card[data-idx="${movedIdx}"]`);
  if (!movedEl) return;
  const mh = movedEl.offsetHeight;
  document.querySelectorAll('.card').forEach(el => {
    const i = +el.dataset.idx;
    if (i === movedIdx) return;
    const c = cards[i], oh = el.offsetHeight;
    if (moved.x < (c.x+(c.w||200)) && (moved.x+(moved.w||200)) > c.x && moved.y < (c.y+oh) && (moved.y+mh) > c.y) {
      c.y = moved.y + mh + GAP;
      el.style.top = c.y + 'px';
    }
  });
}

function loadBoard() {
  const saved = localStorage.getItem(SAVE_KEY);
  const savedHash = localStorage.getItem(SAVE_KEY + ':hash');
  let parsed = null;
  try { parsed = saved ? JSON.parse(saved) : null; } catch(e) {}
  // reset if: no save, empty array, or content hash changed (page regenerated)
  if (!parsed || parsed.length === 0 || savedHash !== CONTENT_HASH) {
    cards = DEFAULT_CARDS.map(c => ({...c}));
    localStorage.removeItem(SAVE_KEY);
    localStorage.setItem(SAVE_KEY + ':hash', CONTENT_HASH);
    renderCards();
    const hasCoords = cards.some(c => c.x !== undefined && c.y !== undefined);
    if (!hasCoords) autoLayout();
    return;
  }
  cards = parsed;
  renderCards();
}
function resetToDefaults() { if (!confirm('저장된 보드를 지우고 원본으로 초기화합니다. 계속할까요?')) return; localStorage.removeItem(SAVE_KEY); cards = DEFAULT_CARDS.map(c => ({...c})); renderCards(); autoLayout(); }

function autoLayout() {
  const boardW = document.getElementById('board').offsetWidth;
  const cols = Math.max(1, Math.floor(boardW / 280));
  const colW = (boardW - GAP*(cols-1)) / cols;
  const colH = new Array(cols).fill(0);
  const allCards = document.querySelectorAll('.card');
  const images = document.querySelectorAll('.card img');
  let loaded = 0;
  function place() {
    allCards.forEach((el, i) => {
      const w = Math.min(cards[i].w || colW, colW);
      let minCol = 0;
      for (let c = 1; c < cols; c++) if (colH[c] < colH[minCol]) minCol = c;
      cards[i].x = minCol * (colW + GAP);
      cards[i].y = colH[minCol];
      cards[i].w = w;
      el.style.left = cards[i].x + 'px';
      el.style.top = cards[i].y + 'px';
      el.style.width = w + 'px';
      colH[minCol] = cards[i].y + el.offsetHeight + GAP;
    });
    document.getElementById('board').style.minHeight = (Math.max(...colH) + 100) + 'px';
    saveBoard();
  }
  if (!images.length) { requestAnimationFrame(place); return; }
  images.forEach(img => {
    if (img.complete) { loaded++; if (loaded >= images.length) requestAnimationFrame(place); }
    else { img.onload = img.onerror = () => { loaded++; if (loaded >= images.length) requestAnimationFrame(place); }; }
  });
}

function syncText() {
  document.querySelectorAll('.card').forEach(el => {
    const i = +el.dataset.idx;
    if (cards[i]?.type === 'text') { const t = el.querySelector('.text'); if (t) cards[i].content = t.innerHTML; }
  });
}
function saveBoard() { syncText(); localStorage.setItem(SAVE_KEY, JSON.stringify(cards)); localStorage.setItem(SAVE_KEY + ':hash', CONTENT_HASH); showStatus('저장됨 ' + new Date().toLocaleTimeString()); }

function renderCards() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  cards.forEach((card, i) => {
    const el = document.createElement('div');
    el.className = 'card'; el.dataset.idx = i;
    if (card.x !== undefined) el.style.left = card.x + 'px';
    if (card.y !== undefined) el.style.top = card.y + 'px';
    // html cards contain raw OneNote table HTML which may overflow the stated div width
    if (card.w) { if (card.type === 'html') el.style.minWidth = card.w + 'px'; else el.style.width = card.w + 'px'; }
    el.addEventListener('mousedown', e => {
      if (e.target.closest('.text, a, .card-btn, .resize-handle, td, th')) return;
      e.preventDefault();
      // Update selection
      document.querySelectorAll('.card.selected').forEach(c => c.classList.remove('selected'));
      selectedIdx = i; el.classList.add('selected');
      snapshot();
      moving = { idx: i, startX: e.clientX, startY: e.clientY, origX: card.x||0, origY: card.y||0 };
      el.classList.add('moving');
    });
    const actions = document.createElement('div'); actions.className = 'card-actions';
    const delBtn = document.createElement('button'); delBtn.className = 'card-btn'; delBtn.textContent = '×';
    delBtn.onclick = e => { e.stopPropagation(); if(confirm('삭제?')) { snapshot(); cards.splice(i,1); renderCards(); saveBoard(); } };
    actions.appendChild(delBtn); el.appendChild(actions);
    if (card.type === 'text') {
      const text = document.createElement('div'); text.className = 'text'; text.contentEditable = true;
      text.innerHTML = card.content || '';
      text.addEventListener('focus', () => { snapshot(); });
      text.addEventListener('blur', () => { card.content = text.innerHTML; saveBoard(); });
      el.appendChild(text);
    } else if (card.type === 'image') {
      const img = document.createElement('img');
      img.src = card.src.startsWith('http') || card.src.startsWith('data:') ? card.src : IMG_BASE + card.src;
      img.alt = ''; img.loading = 'lazy'; img.onerror = () => img.style.display = 'none';
      if (card.w) img.style.width = card.w + 'px';
      if (card.h) img.style.height = card.h + 'px';
      if (card.link) { const a = document.createElement('a'); a.href = card.link; a.target = '_blank'; a.appendChild(img); el.appendChild(a); }
      else { el.appendChild(img); }
      if (card.caption) { const cap = document.createElement('div'); cap.style.cssText = 'font-size:11px;color:#8b949e;margin-top:4px;word-break:break-word;padding:0 2px;'; cap.textContent = card.caption; el.appendChild(cap); }
    } else if (card.type === 'html') {
      const wrapper = document.createElement('div');
      wrapper.style.cssText = 'overflow:auto;font-size:13px;line-height:1.5;';
      wrapper.innerHTML = card.html.replace(/__ATTACHMENT__/g, IMG_BASE);
      wrapper.querySelectorAll('img').forEach(img => { img.style.maxWidth = '100%'; img.style.height = 'auto'; img.draggable = false; });
      wrapper.querySelectorAll('a').forEach(a => { a.target = '_blank'; a.style.color = '#6cb0f6'; });
      wrapper.querySelectorAll('table').forEach(t => { t.style.borderCollapse = 'collapse'; });
      wrapper.querySelectorAll('td,th').forEach(td => {
        td.style.border = '1px solid #444'; td.style.padding = '4px 6px'; td.style.verticalAlign = 'top';
        td.title = '더블클릭으로 편집';
        td.addEventListener('dblclick', function(e) {
          e.stopPropagation();
          snapshot();
          this.contentEditable = 'true';
          this.style.outline = '2px solid #388bfd';
          this.style.background = 'rgba(56,139,253,0.08)';
          this.focus();
        });
        td.addEventListener('blur', function() {
          this.contentEditable = 'false';
          this.style.outline = '';
          this.style.background = '';
          cards[i].html = wrapper.innerHTML.split(IMG_BASE).join('__ATTACHMENT__');
          saveBoard();
        });
      });
      el.appendChild(wrapper);
    } else if (card.type === 'table') {
      const rows = card.rows || [['','',''],['','',''],['','','']];
      const tbl = document.createElement('table');
      tbl.style.cssText = 'border-collapse:collapse;width:100%;font-size:13px;';
      rows.forEach((row, ri) => {
        const tr = tbl.insertRow();
        row.forEach((cell, ci) => {
          const td = document.createElement(ri === 0 ? 'th' : 'td');
          td.contentEditable = true;
          td.style.cssText = 'border:1px solid #30363d;padding:4px 8px;min-width:60px;text-align:left;' + (ri===0 ? 'background:#21262d;font-weight:600;' : '');
          td.textContent = cell;
          td.addEventListener('blur', () => { if (!cards[i].rows) cards[i].rows = rows; rows[ri][ci] = td.textContent; saveBoard(); });
          tr.appendChild(td);
        });
      });
      el.appendChild(tbl);
      const addRow = document.createElement('button');
      addRow.textContent = '+ 행'; addRow.style.cssText = 'margin-top:4px;font-size:11px;background:#21262d;border:1px solid #30363d;color:#8b949e;padding:2px 8px;border-radius:4px;cursor:pointer;';
      addRow.onclick = e => { e.stopPropagation(); snapshot(); if (!cards[i].rows) cards[i].rows = rows; cards[i].rows.push(new Array(cards[i].rows[0].length).fill('')); renderCards(); saveBoard(); };
      const addCol = document.createElement('button');
      addCol.textContent = '+ 열'; addCol.style.cssText = 'margin-top:4px;margin-left:4px;font-size:11px;background:#21262d;border:1px solid #30363d;color:#8b949e;padding:2px 8px;border-radius:4px;cursor:pointer;';
      addCol.onclick = e => { e.stopPropagation(); snapshot(); if (!cards[i].rows) cards[i].rows = rows; cards[i].rows.forEach(r => r.push('')); renderCards(); saveBoard(); };
      el.appendChild(addRow); el.appendChild(addCol);
    }
    const rh = document.createElement('div'); rh.className = 'resize-handle';
    rh.addEventListener('mousedown', e => { e.preventDefault(); e.stopPropagation(); snapshot(); resizing = { idx: i, startX: e.clientX, startW: card.w || el.offsetWidth }; });
    el.appendChild(rh);
    if (i === selectedIdx) el.classList.add('selected');
    board.appendChild(el);
  });
  requestAnimationFrame(() => {
    let maxB = 0;
    document.querySelectorAll('.card').forEach(el => { const b = (parseFloat(el.style.top)||0) + el.offsetHeight; if (b > maxB) maxB = b; });
    board.style.minHeight = (maxB + 100) + 'px';
  });
}

document.addEventListener('mousemove', e => {
  if (moving) {
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`); if (!el) return;
    let nx = moving.origX + e.clientX - moving.startX, ny = moving.origY + e.clientY - moving.startY;
    if (e.shiftKey) { nx = snap(nx); ny = snap(ny); el.style.outline = '1px dashed rgba(240,192,64,0.3)'; } else { el.style.outline = ''; }
    el.style.left = nx + 'px'; el.style.top = ny + 'px';
  }
  if (resizing) {
    let nw = resizing.startW + e.clientX - resizing.startX; if (e.shiftKey) nw = snap(nw);
    cards[resizing.idx].w = Math.max(100, nw);
    const el = document.querySelector(`.card[data-idx="${resizing.idx}"]`); if (el) el.style.width = cards[resizing.idx].w + 'px';
  }
});

document.addEventListener('mouseup', e => {
  if (moving) {
    let nx = moving.origX + e.clientX - moving.startX, ny = moving.origY + e.clientY - moving.startY;
    if (e.shiftKey) { nx = snap(nx); ny = snap(ny); }
    cards[moving.idx].x = Math.max(0, nx); cards[moving.idx].y = Math.max(0, ny);
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`); if (el) { el.classList.remove('moving'); el.style.outline = ''; }
    if (e.shiftKey) pushCards(moving.idx);
    moving = null; saveBoard();
  }
  if (resizing) { if (e.shiftKey) pushCards(resizing.idx); resizing = null; saveBoard(); }
});

function addTextCard() { snapshot(); cards.push({ type: 'text', content: '', x: 50, y: window.scrollY+100, w: 300 }); renderCards(); setTimeout(() => { const els = document.querySelectorAll('.card .text'); els[els.length-1]?.focus(); }, 100); }
function addImageCard() { const input = document.createElement('input'); input.type = 'file'; input.accept = 'image/*'; input.onchange = e => { const f = e.target.files[0]; if (!f) return; const r = new FileReader(); r.onload = () => { snapshot(); cards.push({ type: 'image', src: r.result, x: 50, y: window.scrollY+100, w: 240 }); renderCards(); saveBoard(); }; r.readAsDataURL(f); }; input.click(); }
function addImageUrl() { const url = prompt('이미지 URL'); if (!url) return; snapshot(); cards.push({ type: 'image', src: url, x: 50, y: window.scrollY+100, w: 240 }); renderCards(); saveBoard(); }
function addTableCard() {
  const colsStr = prompt('열 수 (기본 3)', '3'); const cols = Math.max(1, parseInt(colsStr)||3);
  const rowsStr = prompt('행 수 (헤더 포함, 기본 4)', '4'); const rows = Math.max(1, parseInt(rowsStr)||4);
  snapshot();
  cards.push({ type: 'table', rows: Array.from({length: rows}, (_, ri) => Array.from({length: cols}, (_, ci) => ri===0 ? `열${ci+1}` : '')), x: 50, y: window.scrollY+100, w: Math.max(240, cols*100) });
  renderCards(); saveBoard();
}
function exportBoard() { syncText(); const blob = new Blob([JSON.stringify(cards, null, 2)], { type: 'application/json' }); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = SAVE_KEY + '.json'; a.click(); }
// ── Zoom ─────────────────────────────────────────────────────────────────────
let zoom = parseFloat(localStorage.getItem('zoom-' + SAVE_KEY) || '1.0');
function applyZoom() {
  const board = document.getElementById('board');
  board.style.transform = `scale(${zoom})`;
  board.style.transformOrigin = '0 0';
  document.getElementById('zoom-level').textContent = Math.round(zoom * 100) + '%';
  localStorage.setItem('zoom-' + SAVE_KEY, zoom);
}
function zoomIn()  { zoom = Math.min(3.0, parseFloat((zoom + 0.1).toFixed(2))); applyZoom(); }
function zoomOut() { zoom = Math.max(0.2, parseFloat((zoom - 0.1).toFixed(2))); applyZoom(); }
document.addEventListener('keydown', e => {
  if (e.ctrlKey || e.metaKey) {
    if (e.key === '=' || e.key === '+') { e.preventDefault(); zoomIn(); }
    if (e.key === '-')                  { e.preventDefault(); zoomOut(); }
    if (e.key === '0')                  { e.preventDefault(); zoom = 1.0; applyZoom(); }
  }
});
document.getElementById('board').addEventListener('wheel', e => {
  if (!(e.ctrlKey || e.metaKey)) return;
  e.preventDefault();
  e.deltaY < 0 ? zoomIn() : zoomOut();
}, { passive: false });
applyZoom();
function resetLayout() { if (!confirm('자동 재배치합니다.')) return; cards.forEach(c => { delete c.x; delete c.y; }); renderCards(); autoLayout(); }
// ── Floating format toolbar ───────────────────────────────────────────────────
const fmtBar = document.getElementById('format-toolbar');
function fmt(cmd) { document.execCommand(cmd, false, null); saveBoard(); }
function fmtLink() {
  const sel = window.getSelection();
  if (!sel || sel.isCollapsed) return;
  const url = prompt('링크 URL 입력', 'https://');
  if (!url) return;
  document.execCommand('createLink', false, url);
  // make links open in new tab
  sel.anchorNode?.parentElement?.closest('a')?.setAttribute('target', '_blank');
  document.querySelectorAll('.text a').forEach(a => a.target = '_blank');
  saveBoard();
}

// prevent format buttons from blurring contenteditable
fmtBar.addEventListener('mousedown', e => e.preventDefault());

document.addEventListener('selectionchange', () => {
  const sel = window.getSelection();
  if (!sel || sel.isCollapsed || !sel.toString().trim()) { fmtBar.style.display = 'none'; return; }
  // only show if selection is inside a .text element
  const anchor = sel.anchorNode;
  if (!anchor) { fmtBar.style.display = 'none'; return; }
  const textEl = anchor.nodeType === 1 ? anchor.closest('.text') : anchor.parentElement?.closest('.text');
  if (!textEl) { fmtBar.style.display = 'none'; return; }
  // position above selection
  const range = sel.getRangeAt(0);
  const rect = range.getBoundingClientRect();
  fmtBar.style.display = 'flex';
  const tbW = fmtBar.offsetWidth || 180;
  let left = rect.left + rect.width / 2 - tbW / 2;
  left = Math.max(8, Math.min(left, window.innerWidth - tbW - 8));
  fmtBar.style.left = left + 'px';
  fmtBar.style.top = (rect.top - 44 + window.scrollY) + 'px';
});

setInterval(saveBoard, 30000);
loadBoard();
</script>
</body>
