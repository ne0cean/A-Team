<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1e1e1e; color: #e0e0e0; font-family: 'Segoe UI', -apple-system, sans-serif; font-size: 15px; line-height: 1.6; padding: 20px 30px 60px; overflow-x: hidden; }
a { color: #6cb0f6; text-decoration: none; }
a:hover { text-decoration: underline; }
.title-bar { background: #3a3a5c; display: inline-block; padding: 6px 16px; font-size: 22px; font-weight: bold; color: #fff; margin-bottom: 4px; }
.date { color: #999; font-size: 13px; margin-bottom: 20px; }
.board { position: relative; }
.card { background: #2a2a2a; border: 1px solid #3a3a3a; border-radius: 8px; padding: 12px; position: absolute; cursor: grab; transition: box-shadow 0.15s; overflow: hidden; }
.card:hover { box-shadow: 0 0 0 1px #58a6ff; z-index: 10; }
.card.moving { opacity: 0.8; box-shadow: 0 4px 24px rgba(0,0,0,0.6); z-index: 100; cursor: grabbing; }
.card img { width: 100%; border-radius: 4px; display: block; }
.card .text { outline: none; min-height: 20px; white-space: pre-wrap; word-break: break-word; }
.card .text:focus { background: rgba(255,255,255,0.05); border-radius: 4px; padding: 4px; }
.card .text:empty::before { content: '텍스트 입력...'; color: #555; }
.card-actions { position: absolute; top: 4px; right: 4px; display: none; gap: 4px; }
.card:hover .card-actions { display: flex; }
.card-btn { background: #333; border: 1px solid #555; color: #ccc; border-radius: 4px; padding: 2px 6px; font-size: 11px; cursor: pointer; }
.card-btn:hover { background: #444; color: #fff; }
.resize-handle { position: absolute; bottom: 0; right: 0; width: 16px; height: 16px; cursor: se-resize; opacity: 0; }
.card:hover .resize-handle { opacity: 0.6; }
.resize-handle::after { content: ''; position: absolute; bottom: 3px; right: 3px; width: 8px; height: 8px; border-right: 2px solid #666; border-bottom: 2px solid #666; }
.card.selected { box-shadow: 0 0 0 2px #58a6ff; z-index: 5; }
.highlight-red { color: #ff6b6b; }
.highlight-blue { color: #6cb0f6; }
.highlight-gold { color: #f0c040; }
.toolbar { position: fixed; bottom: 0; left: 0; right: 0; background: #161b22; border-top: 1px solid #30363d; padding: 8px 20px; display: flex; gap: 12px; align-items: center; z-index: 200; }
.toolbar button { background: #21262d; border: 1px solid #30363d; color: #e0e0e0; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; }
.toolbar button:hover { background: #30363d; }
.toolbar .status { color: #8b949e; font-size: 12px; margin-left: auto; }
#format-toolbar { position: fixed; display: none; background: #1c2128; border: 1px solid #444c56; border-radius: 8px; padding: 4px 6px; gap: 2px; align-items: center; z-index: 500; box-shadow: 0 4px 16px rgba(0,0,0,0.5); }
#format-toolbar button { background: none; border: none; color: #cdd9e5; padding: 4px 8px; border-radius: 5px; cursor: pointer; font-size: 13px; line-height: 1; }
#format-toolbar button:hover { background: #373e47; }
#format-toolbar .sep { width: 1px; height: 16px; background: #444c56; margin: 0 2px; }
</style>

    "content": "전체 시황: 진입/ 매도 결정 -> 내가 이해 가능하도록 좀더 정교화 하고 지표들 추가하고 다듬기\n추가 종목발굴 스크리너 <a href=\"https://brunch.co.kr/@kk2daddy/58\">https://brunch.co.kr/@kk2daddy/58</a>\n리밸런싱 보드: 내 보유 종목들을 언제 어떤 신호에 따라 어떤 목표가에 따라 매도\n프론트엔드(화면/디자인) 수정:\n자동으로 반영되지 않습니다.\n화면을 고치셨다면, 터미널에서&#160;￼Ctrl+C￼로 껐다가 다시&#160;￼./run_remote.sh로&#160;재시작해야 수정된 디자인이 적용됩니다.\n&#128680; 5개 중 3개 발생 시 시나리오 변경:\n1. 외국인 3일 연속 -5천억 이상 순매도\n2. KOSPI 거래대금 30조 돌파 (과열)\n3. KOSPI PER 18배 돌파\n4. 미국 10년 금리 5.5% 돌파\n5. 삼성전자/SK하이닉스 동시 -5% 급락\n코스피 4,500&#183;5,000 구간은 “과열+이익 상향”이 동시에 있는 후반부 강세장 구간이라서, 단순 밸류에이션보다는&#160;이익 모멘텀과 수급의 급변 시점을 기준으로 프레임을 짜는 게 유리\n과거 사이클에서 뽑는 3가지 공통 패턴\n과거 코스피 주요 피크(예: 2007, 2011, 2018, 2021 등)에서 반복된 건 숫자보다는&#160;속도&#183;기울기&#183;수급&#183;변동성 패턴입니다.​\n공통적으로 나타난 시그널만 뽑으면:\n가격\n정점 전 3~6개월 동안 월봉 기준 급경사 상승, 직전 박스 상단 돌파 후 20~30% 추가 레벨업.​\n고점 부근에서 “고가 박스(2~4개월 횡보)” 후 상방 재돌파(슈퍼사이클) 또는 박스 하단 이탈(피크아웃).\n밸류에이션\n선행 PER이 장기 평균(약 10~11배) 대비 +2표준편차 수준(대략 13~14배 이상)에서 멈춘 뒤, 더 이상 PER 리레이팅이 안 되는 구간에서 피크아웃.​\n반대로 이익이 후행적으로 계속 상향되면, 지수는 박스권인데 PER은 자연스럽게 내려가며 “고가에서의 건전한 횡보”가 나옴.\n수급\n외국인 순매수→순중립 또는 순매도 전환 + 개인 대규모 순매수/신용잔고 급증 패턴 반복.​\n특정 섹터(현재는 반도체&#183;AI) 쏠림이 극단화되고, 후행 섹터&#183;잡주에 불이 붙었다가 끝물 신호로 작동.\n변동성/뉴스\n일간 변동성이 갑자기 커지고, 장중 2~3%씩 위아래로 흔들며 “개인에게는 천국, 기관에게는 출구” 구간.​\n언론/리포트 상단 밴드가 계속 상향 조정되며, ‘5,000 시대’, ‘장기 대세장’ 같은 헤드라인이 빈출."

\"margin-top:0pt;margin-bottom:0pt\">  measurementId: &quot;G-VJ5K6L32VG&quot;</p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\">};</p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\">// Initialize Firebase</p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\">const app = initializeApp(firebaseConfig);</p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\">const analytics = getAnalytics(app);</p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<br />\r\n\t\t\t\t<p lang=\"ko-KR\" style=\"margin-top:0pt;margin-bottom:0pt\">┌─────────────────────────┐</p>\r\n\t\t\t\t<p lang=\"ko-KR\" style=\"margin-top:0pt;margin-bottom:0pt\">                    │      <span style=\"font-family:Malgun Gothic\">시장</span> <span style=\"font-family:Malgun Gothic\">고점</span> <span style=\"font-family:Malgun Gothic\">판단</span>     │</p>\r\n\t\t\t\t<p lang=\"ko-KR\" style=\"margin-top:0pt;margin-bottom:0pt\">                    └─────────────────────────┘</p>\r\n\t\t\t\t<p lang=\"ko-KR\" style=\"margin-top:0pt;margin-bottom:0pt\">                               │</p>\r\n\t\t\t\t<p lang=\"ko-KR\" style=\"margin-top:0pt;margin-bottom:0pt\">       ┌───────────<span style=\"font-family:Malgun Gothic\">┬</span>───────────<span style=\"font-family:Malgun Gothic\">┼</span>───────────<span style=\"font-family:Malgun Gothic\">┬</span>───────────┐</p>\r\n\t\t\t\t<p lang=\"ko-KR\" style=\"margin-top:0pt;margin-bottom:0pt\">       │           │           │           │           │</p>\r\n\t\t\t\t<p lang=\"ko-KR\" style=\"margin-top:0pt;margin-bottom:0pt\">       <span style=\"font-family:Arial\">▼</span>           <span style=\"font-family:Arial\">▼</span>           <span style=\"font-family:Arial\">▼</span>           <span style=\"font-family:Arial\">▼</span>           <span style=\"font-family:Arial\">▼</span></p>\r\n\t\t\t\t<p lang=\"ko-KR\" style=\"margin-top:0pt;margin-bottom:0pt\">   ┌───────┐   ┌───────┐   ┌───────┐   ┌───────┐   ┌───────┐</p>\r\n\t\t\t\t<p lang=\"ko-KR\" style=\"margin-top:0pt;margin-bottom:0pt\">   │ <span style=\"font-family:Malgun Gothic\">인간</span>  │   │ <span style=\"font-family:Malgun Gothic\">수급</span>  │   │<span style=\"font-family:Malgun Gothic\">밸류에</span> │   │ <span style=\"font-family:Malgun Gothic\">매크로</span>│   │ <span style=\"font-family:Malgun Gothic\">기술적</span>│</p>\r\n\t\t\t\t<p lang=\"ko-KR\" style=\"margin-top:0pt;margin-bottom:0pt\">   │ <span style=\"font-family:Malgun Gothic\">행동</span>  │   │ <span style=\"font-family:Malgun Gothic\">여력</span>  │   │ <span style=\"font-family:Malgun Gothic\">이션</span>  │   │ /<span style=\"font-family:Malgun Gothic\">실적</span> │   │ <span style=\"font-family:Malgun Gothic\">신호</span>  │</p>\r\n\t\t\t\t<p lang=\"ko-KR\" style=\"margin-top:0pt;margin-bottom:0pt\">   └───────┘   └───────┘   └───────┘   └───────┘   └───────┘</p>\r\n\t\t\t\t<p lang=\"ko-KR\" style=\"margin-top:0pt;margin-bottom:0pt\">       <span style=\"font-family:Apple Color Emoji\">✅</span>          <span style=\"font-family:Apple Color Emoji\">✅</span>          <span style=\"font-family:Apple Color Emoji\">❓</span>          <span style=\"font-family:Apple Color Emoji\">❓</span>          <span style=\"font-family:Apple Color Emoji\">❓</span></p>\r\n\t\t\t\t<p lang=\"ko-KR\" style=\"margin-top:0pt;margin-bottom:0pt\">     <span style=\"font-family:Malgun Gothic\">완료</span>        <span style=\"font-family:Malgun Gothic\">완료</span>       <span style=\"font-family:Malgun Gothic\">미검토</span>      <span style=\"font-family:Malgun Gothic\">미검토</span>      <span style=\"font-family:Malgun Gothic\">미검토</span></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:ui-sans-serif;font-size:12pt;color:#b3b0ad;background-color:#212121\">만약 붕괴가 온다면 아래 순서로 충격이 온다:</span></p>\r\n\t\t\t\t<li><span lang=\"en-US\"><span style=\"font-family:ui-sans-serif;font-size:12pt;color:#b3b0ad;background-color:#212121\">미국 고용 둔화 → 금리인하 기대 붕괴</span></span></li>\r\n\t\t\t\t<li><span lang=\"en-US\"><span style=\"font-family:ui-sans-serif;font-size:12pt;color:#b3b0ad;background-color:#212121\">국채금리 급등 (10Y↑)</span></span></li>\r\n\t\t\t\t<li><span lang=\"en-US\"><span style=\"font-family:ui-sans-serif;font-size:12pt;color:#b3b0ad;background-color:#212121\">SOX → 나스닥 → 한국 반도체 → 한국 전체 시장 순으로 하락</span></span></li>\r\n\t\t\t\t<li><span lang=\"en-US\"><span style=\"font-family:ui-sans-serif;font-size:12pt;color:#b3b0ad;background-color:#212121\">거래대금 급감 → 기관&#183;연기금 매도 강화</span></span></li>\r\n\t\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:ui-sans-serif;font-size:12pt;color:#b3b0ad;background-color:#212121\">즉, “선행지표를 조기 감지 → 빠져나오는 자동화된 판단 룰”이 핵심이다.</span></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p lang=\"en-US\" style=\"margin-top:12pt;margin-bottom:3pt\"><span style=\"font-family:ui-sans-serif;font-size:15pt;color:#b3b0ad;background-color:#212121\">&#128293;&#160;네가 즉시 팔아야 할 5가지 신호</span></p>\r\n\t\t\t\t<li><span lang=\"en-US\"><span style=\"font-family:ui-sans-serif;font-size:12pt;color:#b3b0ad;background-color:#212121\">미국 10년 금리 0.25%p 급등 (5일 내)</span></span></li>\r\n\t\t\t\t<li><span lang=\"en-US\"><span style=\"font-family:ui-sans-serif;font-size:12pt;color:#b3b0ad;background-color:#212121\">SOX 지수 7% 이상 급락 + 반등 실패</span></span></li>\r\n\t\t\t\t<li><span lang=\"en-US\"><span style=\"font-family:ui-sans-serif;font-size:12pt;color:#b3b0ad;background-color:#212121\">엔비디아/AMD/TSMC 동반 -10%</span></span></li>\r\n\t\t\t\t<li><span lang=\"en-US\"><span style=\"font-family:ui-sans-serif;font-size:12pt;color:#b3b0ad;background-color:#212121\">한국 거래대금 10조 이하 2주 지속</span></span></li>\r\n\t\t\t\t<li><span lang=\"en-US\"><span style=\"font-family:ui-sans-serif;font-size:12pt;color:#b3b0ad;background-color:#212121\">KOSPI 변동성지수(VKOSPI) 20 이상 상승</span></span></li>\r\n\t\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:ui-sans-serif;font-size:12pt;color:#b3b0ad;background-color:#212121\">➡ 이 “5개 중 3개 충족 시 전액 환매”</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:ui-sans-serif;font-size:12pt;color:#b3b0ad;background-color:#212121\">이 룰이면 네 감정과 무관하게 자동으로&#160;</span><span style=\"font-family:ui-sans-serif;font-size:12pt;color:#b3b0ad;background-color:#212121;font-style:italic\">시장 꼭지에 빠져나올 확률이 매우 높아진다.</span></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:6pt\"><span style=\"font-family:ui-sans-serif;font-size:18pt;color:#b3b0ad;background-color:#212121\">✅ 3.&#160;&quot;AI 버블 붕괴” 전용 헷지 ETF를 활용한 비대칭 포지션</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:ui-sans-serif;font-size:12pt;color:#b3b0ad;background-color:#212121\">주식을 그대로 들고가면서도 손실을 크게 줄이는 “비대칭보험” 전략.</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"margin-top:12pt;margin-bottom:3pt\"><span style=\"font-family:ui-sans-serif;font-size:13.5pt;color:#b3b0ad;background-color:#212121\">&#128204; 활용 가능한 ETF</span></p>\r\n\t\t\t\t<table style=\"border:1px solid;border-collapse:collapse\">\r\n\t\t\t\t\t<tr>\r\n\t\t\t\t\t\t<td style=\"border:1px solid\"><span lang=\"en-US\"><span style=\"font-family:Malgun Gothic;font-size:10pt;color:#686868\">목적</span></span></td>\r\n\t\t\t\t\t\t<td style=\"border:1px solid\"><span lang=\"en-US\"><span style=\"font-family:Malgun Gothic;font-size:10pt;color:#686868\">미국</span><span style=\"font-size:10pt;color:#686868\"> ETF</span></span></td>\r\n\t\t\t\t\t\t<td style=\"border:1px solid\"><span lang=\"en-US\"><span style=\"font-family:Malgun Gothic;font-size:10pt;color:#686868\">한국</span><span style=\"font-size:10pt;color:#686868\"> ETF</span></span></td>\r\n\t\t\t\t\t</tr>\r\n\t\t\t\t\t<tr>\r\n\t\t\t\t\t\t<td style=\"border:1px solid\"><span lang=\"en-US\"><span style=\"font-family:Malgun Gothic;font-size:10pt\">나스닥</span><span style=\"font-size:10pt\">&#183;AI </span><span style=\"font-family:Malgun Gothic;font-size:10pt\">급락</span><span style=\"font-size:10pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:10pt\">헷지</span></span></td>\r\n\t\t\t\t\t\t<td style=\"border:1px solid\"><span lang=\"en-US\"><span style=\"font-size:10pt;color:#686868\">SQQQ (3</span><span style=\"font-family:Malgun Gothic;font-size:10pt;color:#686868\">배</span><span style=\"font-size:10pt;color:#686868\"> </span><span style=\"font-family:Malgun Gothic;font-size:10pt;color:#686868\">인버스</span><span style=\"font-size:10pt;color:#686868\">)</span></span></td>\r\n\t\t\t\t\t\t<td style=\"border:1px solid\"><span lang=\"en-US\"><span style=\"font-size:10pt;color:#686868\">KODEX </span><span style=\"font-family:Malgun Gothic;font-size:10pt;color:#686868\">인버스</span><span style=\"font-size:10pt;color:#686868\"> / </span><span style=\"font-family:Malgun Gothic;font-size:10pt;color:#686868\">곱버스</span></span></td>\r\n\t\t\t\t\t</tr>\r\n\t\t\t\t\t<tr>\r\n\t\t\t\t\t\t<td style=\"border:1px solid\"><span lang=\"en-US\"><span style=\"font-family:Malgun Gothic;font-size:10pt\">반도체</span><span style=\"font-size:10pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:10pt\">급락</span><span style=\"font-size:10pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:10pt\">헷지</span></span></td>\r\n\t\t\t\t\t\t<td style=\"border:1px solid\"><span lang=\"en-US\"><span style=\"font-size:10pt;color:#686868\">SOXS (3</span><span style=\"font-family:Malgun Gothic;font-size:10pt;color:#686868\">배</span><span style=\"font-size:10pt;color:#686868\"> </span><span style=\"font-family:Malgun Gothic;font-size:10pt;color:#686868\">인버스</span><span style=\"font-size:10pt;color:#686868\">)</span></span></td>\r\n\t\t\t\t\t\t<td style=\"border:1px solid\"><span lang=\"en-US\"><span style=\"font-family:Malgun Gothic;font-size:10pt\">타이거</span><span style=\"font-size:10pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:10pt\">반도체인버스</span></span></td>\r\n\t\t\t\t\t</tr>\r\n\t\t\t\t\t<tr>\r\n\t\t\t\t\t\t<td style=\"border:1px solid\"><span lang=\"en-US\"><span style=\"font-family:Malgun Gothic;font-size:10pt\">변동성</span><span style=\"font-size:10pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:10pt\">증가</span><span style=\"font-size:10pt\"> </span><span style=\"font-family:Malgun Gothic;font-size:10pt\">헷지</span></span></td>\r\n\t\t\t\t\t\t<td style=\"border:1px solid\"><span lang=\"en-US\"><span style=\"font-size:10pt\">VIXY</span></span></td>\r\n\t\t\t\t\t\t<td style=\"border:1px solid\"><span lang=\"en-US\"><span style=\"font-family:Malgun Gothic;font-size:10pt\">없음</span></span></td>\r\n\t\t\t\t\t</tr>\r\n\t\t\t\t</table>\r\n\t\t\t\t<p lang=\"en-US\" style=\"margin-top:12pt;margin-bottom:3pt\"><span style=\"font-family:ui-sans-serif;font-size:13.5pt;color:#b3b0ad;background-color:#212121\">&#128293; 핵심 아이디어</span></p>\r\n\t\t\t\t<li><span lang=\"en-US\"><span style=\"font-family:ui-sans-serif;font-size:12pt;color:#b3b0ad;background-color:#212121\">보유주식을 그대로 두고,</span></span></li>\r\n\t\t\t\t<li><span lang=\"en-US\"><span style=\"font-family:ui-sans-serif;font-size:12pt;color:#b3b0ad;background-color:#212121\">자산의 5~10%만 SOXS/SQQQ로 보험처럼 매수</span></span></li>\r\n\t\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:ui-sans-serif;font-size:12pt;color:#b3b0ad;background-color:#212121\">➡ 시장이 폭락하면 이 5~10%가 30~50% 급등 → 전체 손실을 크게 흡수.</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:ui-sans-serif;font-size:12pt;color:#b3b0ad;background-color:#212121\">이게 실제로 기관이 쓰는 “tail risk hedge”.</span></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Google Sans Text;font-weight:bold\">나스닥 100 지수(</span><span lang=\"ko-KR\" style=\"font-family:Google Sans Text;font-weight:bold\">$QQQ$</span>< 3,360</span><span style=\"font-family:Malgun Gothic;font-weight:bold\">만</span><span style=\"font-weight:bold\"> </span><span style=\"font-family:Malgun Gothic;font-weight:bold\">원</span></span></td>\r\n\t\t\t\t\t</tr>\r\n\t\t\t\t\t<tr>\r\n\t\t\t\t\t\t<td style=\"border:0px\"><span lang=\"en-US\"><span style=\"font-weight:bold\">SQQQ (</span><span style=\"font-family:Malgun Gothic;font-weight:bold\">나스닥</span><span style=\"font-weight:bold\"> 3</span><span style=\"font-family:Malgun Gothic;font-weight:bold\">배</span><span style=\"font-weight:bold\"> </span><span style=\"font-family:Malgun Gothic;font-weight:bold\">인버스</span><span style=\"font-weight:bold\">)</span></span></td>\r\n\t\t\t\t\t\t<td style=\"border:0px\"><span lang=\"en-US\"><span style=\"font-weight:bold\">6%</span></span></td>\r\n\t\t\t\t\t\t<td style=\"border:0px\"><span lang=\"en-US\"><span style=\"font-weight:bold\">1,680</span><span style=\"font-family:Malgun Gothic;font-weight:bold\">만</span><span style=\"font-weight:bold\"> </span><span style=\"font-family:Malgun Gothic;font-weight:bold\">원</span></span></td>\r\n\t\t\t\t\t</tr>\r\n\t\t\t\t\t<tr>\r\n\t\t\t\t\t\t<td style=\"border:0px\"><span lang=\"en-US\"><span style=\"font-family:Malgun Gothic;font-weight:bold\">합계</span></span></td>\r\n\t\t\t\t\t\t<td style=\"border:0px\"><span lang=\"en-US\"><span style=\"font-weight:bold\">18%</span></span></td>\r\n\t\t\t\t\t\t<td style=\"border:0px\"><span lang=\"en-US\"><span style=\"font-weight:bold\">5,040</span><span style=\"font-family:Malgun Gothic;font-weight:bold\">만</span><span style=\"font-weight:bold\"> </span><span style=\"font-family:Malgun Gothic;font-weight:bold\">원</span></span></td>\r\n\t\t\t\t\t</tr>\r\n\t\t\t\t</table>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:6pt\"><span style=\"font-family:ui-sans-serif;font-size:18pt;color:#b3b0ad;background-color:#212121\">&#128204; 즉시 적용 가능한 매수 규모 제안</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"margin-top:12pt;margin-bottom:3pt\"><span style=\"font-family:ui-sans-serif;font-size:15pt;color:#b3b0ad;background-color:#212121\">SOXS (필라델피아 반도체 3배 인버스)</span></p>\r\n\t\t\t\t<li><span lang=\"en-US\"><span style=\"font-family:ui-sans-serif;font-size:12pt;color:#b3b0ad;background-color:#212121\">금액:</span><span lang=\"ko-KR\" style=\"font-family:ui-sans-serif;font-size:12pt;color:#b3b0ad;background-color:#212121\">&#160;3,360만 원</span></span></li>\r\n\t\t\t\t<li><span lang=\"en-US\"><span style=\"font-family:ui-sans-serif;font-size:12pt;color:#b3b0ad;background-color:#212121\">매수 방법:</span></span></li>\r\n\t\t\t\t<li><span lang=\"en-US\"><span style=\"font-family:ui-sans-serif;font-size:12pt;color:#b3b0ad;background-color:#212121\">30% 즉시 진입</span></span></li>\r\n\t\t\t\t<li><span lang=\"en-US\"><span style=\"font-family:ui-sans-serif;font-size:12pt;color:#b3b0ad;background-color:#212121\">70%는 SOX +3% 반등 시 추가 매수</span><span lang=\"ko-KR\" style=\"font-family:ui-sans-serif;font-size:12pt;color:#b3b0ad;background-color:#212121\">&#160;</span><span style=\"font-family:ui-sans-serif;font-size:12pt;color:#b3b0ad;background-color:#212121\">(rebound hedge)</span><span style=\"font-family:ui-sans-serif;font-size:12pt;color:#b3b0ad;background-color:#212121\">￼</span><span style=\"font-family:ui-sans-serif;font-size:12pt;color:#b3b0ad;background-color:#212121\">→ 시장이 뚝 떨어진 상태에서 헷지 사는 건 덜 유리</span><span style=\"font-family:ui-sans-serif;font-size:12pt;color:#b3b0ad;background-color:#212121\">￼</span><span style=\"font-family:ui-sans-serif;font-size:12pt;color:#b3b0ad;background-color:#212121\">→ 반등 타이밍에서 매수해야 “레버리지 decay” 리스크도 줄어듦</span></span></li>\r\n\t\t\t\t<p lang=\"en-US\" style=\"margin-top:12pt;margin-bottom:3pt\"><span style=\"font-family:ui-sans-serif;font-size:15pt;color:#b3b0ad;background-color:#212121\">SQQQ (나스닥 3배 인버스)</span></p>\r\n\t\t\t\t<li><span lang=\"en-US\"><span style=\"font-family:ui-sans-serif;font-size:12pt;color:#b3b0ad;background-color:#212121\">금액:</span><span lang=\"ko-KR\" style=\"font-family:ui-sans-serif;font-size:12pt;color:#b3b0ad;background-color:#212121\">&#160;1,680만 원</span></span></li>\r\n\t\t\t\t<li><span lang=\"en-US\"><span style=\"font-family:ui-sans-serif;font-size:12pt;color:#b3b0ad;background-color:#212121\">매수 방법:</span></span></li>\r\n\t\t\t\t<li><span lang=\"en-US\"><span style=\"font-family:ui-sans-serif;font-size:12pt;color:#b3b0ad;background-color:#212121\">50% 즉시</span></span></li>\r\n\t\t\t\t<li><span lang=\"en-US\"><span style=\"font-family:ui-sans-serif;font-size:12pt;color:#b3b0ad;background-color:#212121\">50%는 엔비디아가 단기 고점 또는 고평가 지표 </span></span></li>\r\n\t\t\t\t<li><span lang=\"en-US\"><span style=\"font-family:ui-sans-serif;font-size:12pt;color:#b3b0ad;background-color:#212121\">나올 때 증액</span></span></li>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:6pt\"><span style=\"font-family:ui-sans-serif;font-size:18pt;color:#b3b0ad;background-color:#212121\">&#128197; 4) 리밸런싱 규칙 (매우 중요)</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"margin-top:12pt;margin-bottom:3pt\"><span style=\"font-family:ui-sans-serif;font-size:13.5pt;color:#b3b0ad;background-color:#212121\">▶ 시장이 안정 &amp; 금리 하락 기대가 강화될 때</span></p>\r\n\t\t\t\t<li><span lang=\"en-US\"><span style=\"font-family:ui-sans-serif;font-size:12pt;color:#b3b0ad;background-color:#212121\">SOXS 12% → 6%로 축소</span></span></li>\r\n\t\t\t\t<li><span lang=\"en-US\"><span style=\"font-family:ui-sans-serif;font-size:12pt;color:#b3b0ad;background-color:#212121\">SQQQ 6% → 3%로 축소</span></span></li>\r\n\t\t\t\t<p lang=\"en-US\" style=\"margin-top:12pt;margin-bottom:3pt\"><span style=\"font-family:ui-sans-serif;font-size:13.5pt;color:#b3b0ad;background-color:#212121\">▶ 시장이 붕괴 조짐(조기경보 5개 중 2개 이상 충족)</span></p>\r\n\t\t\t\t<li><span lang=\"en-US\"><span style=\"font-family:ui-sans-serif;font-size:12pt;color:#b3b0ad;background-color:#212121\">SOXS 12% →</span><span lang=\"ko-KR\" style=\"font-family:ui-sans-serif;font-size:12pt;color:#b3b0ad;background-color:#212121\">&#160;15–18%까지 확대 가능</span><span lang=\"ko-KR\" style=\"font-family:ui-sans-serif;font-size:12pt;color:#b3b0ad;background-color:#212121\">￼</span><span style=\"font-family:ui-sans-serif;font-size:12pt;color:#b3b0ad;background-color:#212121\">(단, 총 헷지 25% 넘으면 상승장 참여 크게 훼손)</span></span></li>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:6pt\"><span style=\"font-family:ui-sans-serif;font-size:18pt;color:#b3b0ad;background-color:#212121\">&#127919; 너에게 가장 최적인 조합 (최종 답)</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"margin-top:12pt;margin-bottom:3pt\"><span style=\"font-family:ui-sans-serif;font-size:13.5pt;color:#b3b0ad;background-color:#212121\">**SOXS 12% = 약 3,360만 원</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:ui-sans-serif;font-size:12pt;color:#b3b0ad;background-color:#212121\">SQQQ 6% = 약 1,680만 원</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:ui-sans-serif;font-size:12pt;color:#b3b0ad;background-color:#212121\">총 Tail Hedge = 18% (= 5,040만 원)**</span></p>\r\n\t\t\t\t<li><span lang=\"en-US\"><span style=\"font-family:ui-sans-serif;font-size:12pt;color:#b3b0ad;background-color:#212121\">반도체 중심 포트폴리오와 엔비디아 포지션을 직접 방어</span></span></li>\r\n\t\t\t\t<li><span lang=\"en-US\"><span style=\"font-family:ui-sans-serif;font-size:12pt;color:#b3b0ad;background-color:#212121\">-30% 상황에서도 손실 반토막 수준으로 완충</span></span></li>\r\n\t\t\t\t<li><span lang=\"en-US\"><span style=\"font-family:ui-sans-serif;font-size:12pt;color:#b3b0ad;background-color:#212121\">상승장에서는 82% 노출로 충분히 따라갈 수 있음</span></span></li>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:anthropicSerif;color:#7e7e7c;background-color:#141515\">과열 신호를 포착할 수 있는 구체적인 지표들을 정리해드리겠습니다:</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:anthropicSerif;font-size:18pt;color:#7e7e7c;background-color:#141515\">1. 밸류에이션 지표 (고평가 포착)</span></p>\r\n\t\t\t\t<ul>\r\n\t\t\t\t\t<li style=\"list-style-type:circle\"><span lang=\"en-US\"><span style=\"font-family:anthropicSerif;color:#7e7e7c;background-color:#141515\">역사적 평균(KOSPI ~12배) 대비 +2 표준편차 이상이면 과열</span></span></li>\r\n\t\t\t\t\t<li style=\"list-style-type:circle;margin-top:7pt\"><span lang=\"en-US\"><span style=\"font-family:anthropicSerif;color:#7e7e7c;background-color:#141515\">현재 수준을 20년 평균과 비교</span></span></li>\r\n\t\t\t\t</ul>\r\n\t\t\t\t<ul>\r\n\t\t\t\t\t<li style=\"list-style-type:circle\"><span lang=\"en-US\"><span style=\"font-family:anthropicSerif;color:#7e7e7c;background-color:#141515\">삼성전자, SK하이닉스의 PSR이 역사적 고점(2021년 수준) 근접 시</span></span></li>\r\n\t\t\t\t\t<li style=\"list-style-type:circle;margin-top:7pt\"><span lang=\"en-US\"><span style=\"font-family:anthropicSerif;color:#7e7e7c;background-color:#141515\">매출 성장은 둔화되는데 주가만 오르는 구간 포착</span></span></li>\r\n\t\t\t\t</ul>\r\n\t\t\t\t<ul>\r\n\t\t\t\t\t<li style=\"list-style-type:circle\"><span lang=\"en-US\"><span style=\"font-family:anthropicSerif;color:#7e7e7c;background-color:#141515\">시가총액/GDP 비율</span></span></li>\r\n\t\t\t\t\t<li style=\"list-style-type:circle;margin-top:7pt\"><span lang=\"en-US\"><span style=\"font-family:anthropicSerif;color:#7e7e7c;background-color:#141515\">역사적으로 100% 초과 시 과열, 70% 이하면 저평가</span></span></li>\r\n\t\t\t\t</ul>\r\n\t\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:anthropicSerif;font-size:18pt;color:#7e7e7c;background-color:#141515\">2. 기술적 과열 지표</span></p>\r\n\t\t\t\t<ul>\r\n\t\t\t\t\t<li style=\"list-style-type:circle\"><span lang=\"en-US\"><span style=\"font-family:anthropicSerif;color:#7e7e7c;background-color:#141515\">70 이상: 과매수, 80 이상: 극심한 과열</span></span></li>\r\n\t\t\t\t\t<li style=\"list-style-type:circle;margin-top:7pt\"><span lang=\"en-US\"><span style=\"font-family:anthropicSerif;color:#7e7e7c;background-color:#141515\">주봉/월봉 RSI가 더 신뢰도 높음</span></span></li>\r\n\t\t\t\t</ul>\r\n\t\t\t\t<ul>\r\n\t\t\t\t\t<li style=\"list-style-type:circle\"><span lang=\"en-US\"><span style=\"font-family:anthropicSerif;color:#7e7e7c;background-color:#141515\">주가가 상단 밴드 +2σ 밖에서 지속적으로 거래</span></span></li>\r\n\t\t\t\t\t<li style=\"list-style-type:circle;margin-top:7pt\"><span lang=\"en-US\"><span style=\"font-family:anthropicSerif;color:#7e7e7c;background-color:#141515\">특히 거래량 급증 동반 시 단기 고점 신호</span></span></li>\r\n\t\t\t\t</ul>\r\n\t\t\t\t<ul>\r\n\t\t\t\t\t<li style=\"list-style-type:circle\"><span lang=\"en-US\"><span style=\"font-family:anthropicSerif;color:#7e7e7c;background-color:#141515\">20일/60일/120일 이평선 대비 +20% 이상 괴리</span></span></li>\r\n\t\t\t\t\t<li style=\"list-style-type:circle;margin-top:7pt\"><span lang=\"en-US\"><span style=\"font-family:anthropicSerif;color:#7e7e7c;background-color:#141515\">급등 후 필연적으로 조정 발생</span></span></li>\r\n\t\t\t\t</ul>\r\n\t\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:anthropicSerif;font-size:18pt;color:#7e7e7c;background-color:#141515\">3. 시장 심리 지표</span></p>\r\n\t\t\t\t<ul>\r\n\t\t\t\t\t<li style=\"list-style-type:circle\"><span lang=\"en-US\"><span style=\"font-family:anthropicSerif;color:#7e7e7c;background-color:#141515\">역대 최고치 경신 시 (특히 2-3주 연속 증가)</span></span></li>\r\n\t\t\t\t\t<li style=\"list-style-type:circle;margin-top:7pt\"><span lang=\"en-US\"><span style=\"font-family:anthropicSerif;color:#7e7e7c;background-color:#141515\">개인 투자자 현금이 몰렸다 = 곧 매수 여력 소진</span></span></li>\r\n\t\t\t\t</ul>\r\n\t\t\t\t<ul>\r\n\t\t\t\t\t<li style=\"list-style-type:circle\"><span lang=\"en-US\"><span style=\"font-family:anthropicSerif;color:#7e7e7c;background-color:#141515\">급증 시 (특히 전월 대비 +20% 이상)</span></span></li>\r\n\t\t\t\t\t<li style=\"list-style-type:circle;margin-top:7pt\"><span lang=\"en-US\"><span style=\"font-family:anthropicSerif;color:#7e7e7c;background-color:#141515\">레버리지 과다 = 급락 시 강제청산 도미노</span></span></li>\r\n\t\t\t\t</ul>\r\n\t\t\t\t<ul>\r\n\t\t\t\t\t<li style=\"list-style-type:circle\"><span lang=\"en-US\"><span style=\"font-family:anthropicSerif;color:#7e7e7c;background-color:#141515\">극단적 저점 (VIX 12 이하, V-KOSPI 10 이하)</span></span></li>\r\n\t\t\t\t\t<li style=\"list-style-type:circle;margin-top:7pt\"><span lang=\"en-US\"><span style=\"font-family:anthropicSerif;color:#7e7e7c;background-color:#141515\">시장이 너무 안심하고 있다 = 곧 변동성 폭발 가능</span></span></li>\r\n\t\t\t\t</ul>\r\n\t\t\t\t<ul>\r\n\t\t\t\t\t<li style=\"list-style-type:circle\"><span lang=\"en-US\"><span style=\"font-family:anthropicSerif;color:#7e7e7c;background-color:#141515\">0.7 이하로 하락 = 풋옵션보다 콜옵션이 압도적</span></span></li>\r\n\t\t\t\t\t<li style=\"list-style-type:circle;margin-top:7pt\"><span lang=\"en-US\"><span style=\"font-family:anthropicSerif;color:#7e7e7c;background-color:#141515\">모두가 상승만 기대 = 반대 신호</span></span></li>\r\n\t\t\t\t</ul>\r\n\t\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:anthropicSerif;font-size:18pt;color:#7e7e7c;background-color:#141515\">4. 거시경제 선행지표</span></p>\r\n\t\t\t\t<ul>\r\n\t\t\t\t\t<li style=\"list-style-type:circle\"><span lang=\"en-US\"><span style=\"font-family:anthropicSerif;color:#7e7e7c;background-color:#141515\">10년물-2년물 금리차 역전 후 정상화 시점</span></span></li>\r\n\t\t\t\t\t<li style=\"list-style-type:circle;margin-top:7pt\"><span lang=\"en-US\"><span style=\"font-family:anthropicSerif;color:#7e7e7c;background-color:#141515\">역사적으로 역전 해소 후 6-18개월 내 경기침체</span></span></li>\r\n\t\t\t\t</ul>\r\n\t\t\t\t<ul>\r\n\t\t\t\t\t<li style=\"list-style-type:circle\"><span lang=\"en-US\"><span style=\"font-family:anthropicSerif;color:#7e7e7c;background-color:#141515\">6개월 연속 하락 시 경기 둔화 신호</span></span></li>\r\n\t\t\t\t\t<li style=\"list-style-type:circle;margin-top:7pt\"><span lang=\"en-US\"><span style=\"font-family:anthropicSerif;color:#7e7e7c;background-color:#141515\">AI 투자 과열인 li>\r\n\t\t\t\t\t<li><span lang=\"en-US\"><span style=\"font-family:anthropicSerif;color:#7e7e7c;background-color:#141515\">손절 -3%, 익절 +5%</span><span lang=\"ko-KR\" style=\"font-family:anthropicSerif;color:#7e7e7c;background-color:#141515\">&#160;</span><span style=\"font-family:anthropicSerif;color:#7e7e7c;background-color:#141515\">(기계적 실행)</span></span></li>\r\n\t\t\t\t</ol>\r\n\t\t\t</ol>\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:anthropicSerif;color:#7e7e7c;background-color:#141515\">KOSPI/KOSDAQ PE Ratio</span></p>\r\n\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:anthropicSerif;color:#7e7e7c;background-color:#141515\">반도체 PSR (Price-to-Sales Ratio)</span></p>\r\n\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:anthropicSerif;color:#7e7e7c;background-color:#141515\">Buffett Indicator (한국판)</span></p>\r\n\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:anthropicSerif;color:#7e7e7c;background-color:#141515\">RSI (Relative Strength Index)</span></p>\r\n\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:anthropicSerif;color:#7e7e7c;background-color:#141515\">볼린저밴드 상단 이탈</span></p>\r\n\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:anthropicSerif;color:#7e7e7c;background-color:#141515\">이동평균선 괴리율</span></p>\r\n\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:anthropicSerif;color:#7e7e7c;background-color:#141515\">투자자예탁금 (한국 특화)</span></p>\r\n\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:anthropicSerif;color:#7e7e7c;background-color:#141515\">신용융자 잔고</span></p>\r\n\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:anthropicSerif;color:#7e7e7c;background-color:#141515\">VIX (공포지수) 또는 한국 V-KOSPI</span></p>\r\n\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:anthropicSerif;color:#7e7e7c;background-color:#141515\">Put/Call Ratio</span></p>\r\n\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:anthropicSerif;color:#7e7e7c;background-color:#141515\">미국 국채 수익률 곡선</span></p>\r\n\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:anthropicSerif;color:#7e7e7c;background-color:#141515\">경기선행지수 (한국은행)</span></p>\r\n\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:anthropicSerif;color:#7e7e7c;background-color:#141515\">구리 가격 / 반도체 수출 증가율</span></p>\r\n\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:anthropicSerif;color:#7e7e7c;background-color:#141515\">달러인덱스 급등</span></p>\r\n\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:anthropicSerif;color:#7e7e7c;background-color:#141515\">반도체 메모리 가격</span></p>\r\n\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:anthropicSerif;color:#7e7e7c;background-color:#141515\">AI 관련주 동반 급등</span></p>\r\n\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:anthropicSerif;color:#7e7e7c;background-color:#141515\">원전주 급등락 반복</span></p>\r\n\t\t\t<p lang=\"en-US\" style=\"margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Apple Color Emoji;font-size:18pt;font-weight:bold\">&#128293; </span><span style=\"font-family:Malgun Gothic;font-size:18pt;font-weight:bold\">핵심 원칙</span></p>\r\n\t\t"
  }
];
const CONTENT_HASH = '242dfa45';

let cards = [];
let moving = null, resizing = null;
let selectedIdx = null, clipboardCard = null;
const GRID = 20, GAP = 14;
function snap(v) { return Math.round(v / GRID) * GRID; }

// ── Undo (Ctrl+Z) ────────────────────────────────────────────────────────────
const MAX_HISTORY = 50;
let history = [];
function snapshot() {
  syncText();
  history.push(JSON.stringify(cards));
  if (history.length > MAX_HISTORY) history.shift();
}
function undo() {
  if (!history.length) { showStatus('되돌릴 내용 없음'); return; }
  syncText();
  cards = JSON.parse(history.pop());
  renderCards();
  saveBoard();
  showStatus('↩ 되돌림');
}
function showStatus(msg) {
  const s = document.getElementById('status');
  s.textContent = msg;
  clearTimeout(showStatus._t);
  showStatus._t = setTimeout(() => { s.textContent = ''; }, 2000);
}
document.addEventListener('keydown', e => {
  const isText = document.activeElement?.contentEditable === 'true';
  if ((e.ctrlKey || e.metaKey) && e.key === 'z' && !e.shiftKey) {
    if (isText) return;
    e.preventDefault();
    undo();
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'c' && !e.shiftKey && !isText) {
    if (selectedIdx !== null && cards[selectedIdx]) {
      syncText();
      clipboardCard = JSON.parse(JSON.stringify(cards[selectedIdx]));
      showStatus('카드 복사됨');
      e.preventDefault();
    }
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'v' && !e.shiftKey && !isText) {
    if (clipboardCard) {
      e.preventDefault();
      snapshot();
      const nc = JSON.parse(JSON.stringify(clipboardCard));
      nc.x = (nc.x || 0) + 30; nc.y = (nc.y || 0) + 30;
      cards.push(nc);
      selectedIdx = cards.length - 1;
      renderCards(); saveBoard();
      showStatus('카드 붙여넣음');
    }
  }
  if (e.key === 'Escape') {
    document.querySelectorAll('.card.selected').forEach(c => c.classList.remove('selected'));
    selectedIdx = null;
  }
});

function pushCards(movedIdx) {
  const moved = cards[movedIdx];
  const movedEl = document.querySelector(`.card[data-idx="${movedIdx}"]`);
  if (!movedEl) return;
  const mh = movedEl.offsetHeight;
  document.querySelectorAll('.card').forEach(el => {
    const i = +el.dataset.idx;
    if (i === movedIdx) return;
    const c = cards[i], oh = el.offsetHeight;
    if (moved.x < (c.x+(c.w||200)) && (moved.x+(moved.w||200)) > c.x && moved.y < (c.y+oh) && (moved.y+mh) > c.y) {
      c.y = moved.y + mh + GAP;
      el.style.top = c.y + 'px';
    }
  });
}

function loadBoard() {
  const saved = localStorage.getItem(SAVE_KEY);
  const savedHash = localStorage.getItem(SAVE_KEY + ':hash');
  let parsed = null;
  try { parsed = saved ? JSON.parse(saved) : null; } catch(e) {}
  // reset if: no save, empty array, or content hash changed (page regenerated)
  if (!parsed || parsed.length === 0 || savedHash !== CONTENT_HASH) {
    cards = DEFAULT_CARDS.map(c => ({...c}));
    localStorage.removeItem(SAVE_KEY);
    localStorage.setItem(SAVE_KEY + ':hash', CONTENT_HASH);
    renderCards();
    const hasCoords = cards.some(c => c.x !== undefined && c.y !== undefined);
    if (!hasCoords) autoLayout();
    return;
  }
  cards = parsed;
  renderCards();
}
function resetToDefaults() { if (!confirm('저장된 보드를 지우고 원본으로 초기화합니다. 계속할까요?')) return; localStorage.removeItem(SAVE_KEY); cards = DEFAULT_CARDS.map(c => ({...c})); renderCards(); autoLayout(); }

function autoLayout() {
  const boardW = document.getElementById('board').offsetWidth;
  const cols = Math.max(1, Math.floor(boardW / 280));
  const colW = (boardW - GAP*(cols-1)) / cols;
  const colH = new Array(cols).fill(0);
  const allCards = document.querySelectorAll('.card');
  const images = document.querySelectorAll('.card img');
  let loaded = 0;
  function place() {
    allCards.forEach((el, i) => {
      const w = Math.min(cards[i].w || colW, colW);
      let minCol = 0;
      for (let c = 1; c < cols; c++) if (colH[c] < colH[minCol]) minCol = c;
      cards[i].x = minCol * (colW + GAP);
      cards[i].y = colH[minCol];
      cards[i].w = w;
      el.style.left = cards[i].x + 'px';
      el.style.top = cards[i].y + 'px';
      el.style.width = w + 'px';
      colH[minCol] = cards[i].y + el.offsetHeight + GAP;
    });
    document.getElementById('board').style.minHeight = (Math.max(...colH) + 100) + 'px';
    saveBoard();
  }
  if (!images.length) { requestAnimationFrame(place); return; }
  images.forEach(img => {
    if (img.complete) { loaded++; if (loaded >= images.length) requestAnimationFrame(place); }
    else { img.onload = img.onerror = () => { loaded++; if (loaded >= images.length) requestAnimationFrame(place); }; }
  });
}

function syncText() {
  document.querySelectorAll('.card').forEach(el => {
    const i = +el.dataset.idx;
    if (cards[i]?.type === 'text') { const t = el.querySelector('.text'); if (t) cards[i].content = t.innerHTML; }
  });
}
function saveBoard() { syncText(); localStorage.setItem(SAVE_KEY, JSON.stringify(cards)); localStorage.setItem(SAVE_KEY + ':hash', CONTENT_HASH); showStatus('저장됨 ' + new Date().toLocaleTimeString()); }

function renderCards() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  cards.forEach((card, i) => {
    const el = document.createElement('div');
    el.className = 'card'; el.dataset.idx = i;
    if (card.x !== undefined) el.style.left = card.x + 'px';
    if (card.y !== undefined) el.style.top = card.y + 'px';
    // html cards contain raw OneNote table HTML which may overflow the stated div width
    if (card.w) { if (card.type === 'html') el.style.minWidth = card.w + 'px'; else el.style.width = card.w + 'px'; }
    el.addEventListener('mousedown', e => {
      if (e.target.closest('.text, a, .card-btn, .resize-handle, td, th')) return;
      e.preventDefault();
      // Update selection
      document.querySelectorAll('.card.selected').forEach(c => c.classList.remove('selected'));
      selectedIdx = i; el.classList.add('selected');
      snapshot();
      moving = { idx: i, startX: e.clientX, startY: e.clientY, origX: card.x||0, origY: card.y||0 };
      el.classList.add('moving');
    });
    const actions = document.createElement('div'); actions.className = 'card-actions';
    const delBtn = document.createElement('button'); delBtn.className = 'card-btn'; delBtn.textContent = '×';
    delBtn.onclick = e => { e.stopPropagation(); if(confirm('삭제?')) { snapshot(); cards.splice(i,1); renderCards(); saveBoard(); } };
    actions.appendChild(delBtn); el.appendChild(actions);
    if (card.type === 'text') {
      const text = document.createElement('div'); text.className = 'text'; text.contentEditable = true;
      text.innerHTML = card.content || '';
      text.addEventListener('focus', () => { snapshot(); });
      text.addEventListener('blur', () => { card.content = text.innerHTML; saveBoard(); });
      el.appendChild(text);
    } else if (card.type === 'image') {
      const img = document.createElement('img');
      img.src = card.src.startsWith('http') || card.src.startsWith('data:') ? card.src : IMG_BASE + card.src;
      img.alt = ''; img.loading = 'lazy'; img.onerror = () => img.style.display = 'none';
      if (card.w) img.style.width = card.w + 'px';
      if (card.h) img.style.height = card.h + 'px';
      if (card.link) { const a = document.createElement('a'); a.href = card.link; a.target = '_blank'; a.appendChild(img); el.appendChild(a); }
      else { el.appendChild(img); }
      if (card.caption) { const cap = document.createElement('div'); cap.style.cssText = 'font-size:11px;color:#8b949e;margin-top:4px;word-break:break-word;padding:0 2px;'; cap.textContent = card.caption; el.appendChild(cap); }
    } else if (card.type === 'html') {
      const wrapper = document.createElement('div');
      wrapper.style.cssText = 'overflow:auto;font-size:13px;line-height:1.5;';
      wrapper.innerHTML = card.html.replace(/__ATTACHMENT__/g, IMG_BASE);
      wrapper.querySelectorAll('img').forEach(img => { img.style.maxWidth = '100%'; img.style.height = 'auto'; img.draggable = false; });
      wrapper.querySelectorAll('a').forEach(a => { a.target = '_blank'; a.style.color = '#6cb0f6'; });
      wrapper.querySelectorAll('table').forEach(t => { t.style.borderCollapse = 'collapse'; });
      wrapper.querySelectorAll('td,th').forEach(td => {
        td.style.border = '1px solid #444'; td.style.padding = '4px 6px'; td.style.verticalAlign = 'top';
        td.title = '더블클릭으로 편집';
        td.addEventListener('dblclick', function(e) {
          e.stopPropagation();
          snapshot();
          this.contentEditable = 'true';
          this.style.outline = '2px solid #388bfd';
          this.style.background = 'rgba(56,139,253,0.08)';
          this.focus();
        });
        td.addEventListener('blur', function() {
          this.contentEditable = 'false';
          this.style.outline = '';
          this.style.background = '';
          cards[i].html = wrapper.innerHTML.split(IMG_BASE).join('__ATTACHMENT__');
          saveBoard();
        });
      });
      el.appendChild(wrapper);
    } else if (card.type === 'table') {
      const rows = card.rows || [['','',''],['','',''],['','','']];
      const tbl = document.createElement('table');
      tbl.style.cssText = 'border-collapse:collapse;width:100%;font-size:13px;';
      rows.forEach((row, ri) => {
        const tr = tbl.insertRow();
        row.forEach((cell, ci) => {
          const td = document.createElement(ri === 0 ? 'th' : 'td');
          td.contentEditable = true;
          td.style.cssText = 'border:1px solid #30363d;padding:4px 8px;min-width:60px;text-align:left;' + (ri===0 ? 'background:#21262d;font-weight:600;' : '');
          td.textContent = cell;
          td.addEventListener('blur', () => { if (!cards[i].rows) cards[i].rows = rows; rows[ri][ci] = td.textContent; saveBoard(); });
          tr.appendChild(td);
        });
      });
      el.appendChild(tbl);
      const addRow = document.createElement('button');
      addRow.textContent = '+ 행'; addRow.style.cssText = 'margin-top:4px;font-size:11px;background:#21262d;border:1px solid #30363d;color:#8b949e;padding:2px 8px;border-radius:4px;cursor:pointer;';
      addRow.onclick = e => { e.stopPropagation(); snapshot(); if (!cards[i].rows) cards[i].rows = rows; cards[i].rows.push(new Array(cards[i].rows[0].length).fill('')); renderCards(); saveBoard(); };
      const addCol = document.createElement('button');
      addCol.textContent = '+ 열'; addCol.style.cssText = 'margin-top:4px;margin-left:4px;font-size:11px;background:#21262d;border:1px solid #30363d;color:#8b949e;padding:2px 8px;border-radius:4px;cursor:pointer;';
      addCol.onclick = e => { e.stopPropagation(); snapshot(); if (!cards[i].rows) cards[i].rows = rows; cards[i].rows.forEach(r => r.push('')); renderCards(); saveBoard(); };
      el.appendChild(addRow); el.appendChild(addCol);
    }
    const rh = document.createElement('div'); rh.className = 'resize-handle';
    rh.addEventListener('mousedown', e => { e.preventDefault(); e.stopPropagation(); snapshot(); resizing = { idx: i, startX: e.clientX, startW: card.w || el.offsetWidth }; });
    el.appendChild(rh);
    if (i === selectedIdx) el.classList.add('selected');
    board.appendChild(el);
  });
  requestAnimationFrame(() => {
    let maxB = 0;
    document.querySelectorAll('.card').forEach(el => { const b = (parseFloat(el.style.top)||0) + el.offsetHeight; if (b > maxB) maxB = b; });
    board.style.minHeight = (maxB + 100) + 'px';
  });
}

document.addEventListener('mousemove', e => {
  if (moving) {
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`); if (!el) return;
    let nx = moving.origX + e.clientX - moving.startX, ny = moving.origY + e.clientY - moving.startY;
    if (e.shiftKey) { nx = snap(nx); ny = snap(ny); el.style.outline = '1px dashed rgba(240,192,64,0.3)'; } else { el.style.outline = ''; }
    el.style.left = nx + 'px'; el.style.top = ny + 'px';
  }
  if (resizing) {
    let nw = resizing.startW + e.clientX - resizing.startX; if (e.shiftKey) nw = snap(nw);
    cards[resizing.idx].w = Math.max(100, nw);
    const el = document.querySelector(`.card[data-idx="${resizing.idx}"]`); if (el) el.style.width = cards[resizing.idx].w + 'px';
  }
});

document.addEventListener('mouseup', e => {
  if (moving) {
    let nx = moving.origX + e.clientX - moving.startX, ny = moving.origY + e.clientY - moving.startY;
    if (e.shiftKey) { nx = snap(nx); ny = snap(ny); }
    cards[moving.idx].x = Math.max(0, nx); cards[moving.idx].y = Math.max(0, ny);
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`); if (el) { el.classList.remove('moving'); el.style.outline = ''; }
    if (e.shiftKey) pushCards(moving.idx);
    moving = null; saveBoard();
  }
  if (resizing) { if (e.shiftKey) pushCards(resizing.idx); resizing = null; saveBoard(); }
});

function addTextCard() { snapshot(); cards.push({ type: 'text', content: '', x: 50, y: window.scrollY+100, w: 300 }); renderCards(); setTimeout(() => { const els = document.querySelectorAll('.card .text'); els[els.length-1]?.focus(); }, 100); }
function addImageCard() { const input = document.createElement('input'); input.type = 'file'; input.accept = 'image/*'; input.onchange = e => { const f = e.target.files[0]; if (!f) return; const r = new FileReader(); r.onload = () => { snapshot(); cards.push({ type: 'image', src: r.result, x: 50, y: window.scrollY+100, w: 240 }); renderCards(); saveBoard(); }; r.readAsDataURL(f); }; input.click(); }
function addImageUrl() { const url = prompt('이미지 URL'); if (!url) return; snapshot(); cards.push({ type: 'image', src: url, x: 50, y: window.scrollY+100, w: 240 }); renderCards(); saveBoard(); }
function addTableCard() {
  const colsStr = prompt('열 수 (기본 3)', '3'); const cols = Math.max(1, parseInt(colsStr)||3);
  const rowsStr = prompt('행 수 (헤더 포함, 기본 4)', '4'); const rows = Math.max(1, parseInt(rowsStr)||4);
  snapshot();
  cards.push({ type: 'table', rows: Array.from({length: rows}, (_, ri) => Array.from({length: cols}, (_, ci) => ri===0 ? `열${ci+1}` : '')), x: 50, y: window.scrollY+100, w: Math.max(240, cols*100) });
  renderCards(); saveBoard();
}
function exportBoard() { syncText(); const blob = new Blob([JSON.stringify(cards, null, 2)], { type: 'application/json' }); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = SAVE_KEY + '.json'; a.click(); }
// ── Zoom ─────────────────────────────────────────────────────────────────────
let zoom = parseFloat(localStorage.getItem('zoom-' + SAVE_KEY) || '1.0');
function applyZoom() {
  const board = document.getElementById('board');
  board.style.transform = `scale(${zoom})`;
  board.style.transformOrigin = '0 0';
  document.getElementById('zoom-level').textContent = Math.round(zoom * 100) + '%';
  localStorage.setItem('zoom-' + SAVE_KEY, zoom);
}
function zoomIn()  { zoom = Math.min(3.0, parseFloat((zoom + 0.1).toFixed(2))); applyZoom(); }
function zoomOut() { zoom = Math.max(0.2, parseFloat((zoom - 0.1).toFixed(2))); applyZoom(); }
document.addEventListener('keydown', e => {
  if (e.ctrlKey || e.metaKey) {
    if (e.key === '=' || e.key === '+') { e.preventDefault(); zoomIn(); }
    if (e.key === '-')                  { e.preventDefault(); zoomOut(); }
    if (e.key === '0')                  { e.preventDefault(); zoom = 1.0; applyZoom(); }
  }
});
document.getElementById('board').addEventListener('wheel', e => {
  if (!(e.ctrlKey || e.metaKey)) return;
  e.preventDefault();
  e.deltaY < 0 ? zoomIn() : zoomOut();
}, { passive: false });
applyZoom();
function resetLayout() { if (!confirm('자동 재배치합니다.')) return; cards.forEach(c => { delete c.x; delete c.y; }); renderCards(); autoLayout(); }
// ── Floating format toolbar ───────────────────────────────────────────────────
const fmtBar = document.getElementById('format-toolbar');
function fmt(cmd) { document.execCommand(cmd, false, null); saveBoard(); }
function fmtLink() {
  const sel = window.getSelection();
  if (!sel || sel.isCollapsed) return;
  const url = prompt('링크 URL 입력', 'https://');
  if (!url) return;
  document.execCommand('createLink', false, url);
  // make links open in new tab
  sel.anchorNode?.parentElement?.closest('a')?.setAttribute('target', '_blank');
  document.querySelectorAll('.text a').forEach(a => a.target = '_blank');
  saveBoard();
}

// prevent format buttons from blurring contenteditable
fmtBar.addEventListener('mousedown', e => e.preventDefault());

document.addEventListener('selectionchange', () => {
  const sel = window.getSelection();
  if (!sel || sel.isCollapsed || !sel.toString().trim()) { fmtBar.style.display = 'none'; return; }
  // only show if selection is inside a .text element
  const anchor = sel.anchorNode;
  if (!anchor) { fmtBar.style.display = 'none'; return; }
  const textEl = anchor.nodeType === 1 ? anchor.closest('.text') : anchor.parentElement?.closest('.text');
  if (!textEl) { fmtBar.style.display = 'none'; return; }
  // position above selection
  const range = sel.getRangeAt(0);
  const rect = range.getBoundingClientRect();
  fmtBar.style.display = 'flex';
  const tbW = fmtBar.offsetWidth || 180;
  let left = rect.left + rect.width / 2 - tbW / 2;
  left = Math.max(8, Math.min(left, window.innerWidth - tbW - 8));
  fmtBar.style.left = left + 'px';
  fmtBar.style.top = (rect.top - 44 + window.scrollY) + 'px';
});

setInterval(saveBoard, 30000);
loadBoard();
</script>
</body>
</html>
