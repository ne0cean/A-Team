<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>기분 리셋</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1e1e1e; color: #e0e0e0; font-family: 'Segoe UI', -apple-system, sans-serif; font-size: 15px; line-height: 1.6; padding: 20px 30px 60px; overflow-x: hidden; }
a { color: #6cb0f6; text-decoration: none; }
a:hover { text-decoration: underline; }
.title-bar { background: #3a3a5c; display: inline-block; padding: 6px 16px; font-size: 22px; font-weight: bold; color: #fff; margin-bottom: 4px; }
.date { color: #999; font-size: 13px; margin-bottom: 20px; }
.board { position: relative; }
.card { background: #2a2a2a; border: 1px solid #3a3a3a; border-radius: 8px; padding: 12px; position: absolute; cursor: grab; transition: box-shadow 0.15s; overflow: hidden; }
.card:hover { box-shadow: 0 0 0 1px #58a6ff; z-index: 10; }
.card.moving { opacity: 0.8; box-shadow: 0 4px 24px rgba(0,0,0,0.6); z-index: 100; cursor: grabbing; }
.card img { width: 100%; border-radius: 4px; display: block; }
.card .text { outline: none; min-height: 20px; white-space: pre-wrap; word-break: break-word; }
.card .text:focus { background: rgba(255,255,255,0.05); border-radius: 4px; padding: 4px; }
.card .text:empty::before { content: '텍스트 입력...'; color: #555; }
.card-actions { position: absolute; top: 4px; right: 4px; display: none; gap: 4px; }
.card:hover .card-actions { display: flex; }
.card-btn { background: #333; border: 1px solid #555; color: #ccc; border-radius: 4px; padding: 2px 6px; font-size: 11px; cursor: pointer; }
.card-btn:hover { background: #444; color: #fff; }
.resize-handle { position: absolute; bottom: 0; right: 0; width: 16px; height: 16px; cursor: se-resize; opacity: 0; }
.card:hover .resize-handle { opacity: 0.6; }
.resize-handle::after { content: ''; position: absolute; bottom: 3px; right: 3px; width: 8px; height: 8px; border-right: 2px solid #666; border-bottom: 2px solid #666; }
.card.selected { box-shadow: 0 0 0 2px #58a6ff; z-index: 5; }
.highlight-red { color: #ff6b6b; }
.highlight-blue { color: #6cb0f6; }
.highlight-gold { color: #f0c040; }
.toolbar { position: fixed; bottom: 0; left: 0; right: 0; background: #161b22; border-top: 1px solid #30363d; padding: 8px 20px; display: flex; gap: 12px; align-items: center; z-index: 200; }
.toolbar button { background: #21262d; border: 1px solid #30363d; color: #e0e0e0; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; }
.toolbar button:hover { background: #30363d; }
.toolbar .status { color: #8b949e; font-size: 12px; margin-left: auto; }
#format-toolbar { position: fixed; display: none; background: #1c2128; border: 1px solid #444c56; border-radius: 8px; padding: 4px 6px; gap: 2px; align-items: center; z-index: 500; box-shadow: 0 4px 16px rgba(0,0,0,0.5); }
#format-toolbar button { background: none; border: none; color: #cdd9e5; padding: 4px 8px; border-radius: 5px; cursor: pointer; font-size: 13px; line-height: 1; }
#format-toolbar button:hover { background: #373e47; }
#format-toolbar .sep { width: 1px; height: 16px; background: #444c56; margin: 0 2px; }
</style>
</head>
<body>
<div class="title-bar" contenteditable="true">기분 리셋</div>
<div class="date"></div>
<div class="board" id="board"></div>
<div id="format-toolbar">
  <button onmousedown="e=>e.preventDefault()" onclick="fmt('bold')" title="굵게"><b>B</b></button>
  <button onclick="fmt('italic')" title="기울임"><i>I</i></button>
  <button onclick="fmt('underline')" title="밑줄"><u>U</u></button>
  <div class="sep"></div>
  <button onclick="fmtLink()" title="링크 삽입">🔗</button>
  <button onclick="fmt('unlink')" title="링크 제거">✂</button>
</div>
<div class="toolbar">
  <button onclick="undo()" title="Ctrl+Z">↩ 실행취소</button>
  <button onclick="addTextCard()">+ 텍스트</button>
  <button onclick="addImageCard()">+ 이미지</button>
  <button onclick="addImageUrl()">+ 이미지 URL</button>
  <button onclick="addTableCard()">+ 표</button>
  <button onclick="saveBoard()">💾 저장</button>
  <button onclick="exportBoard()">📤 내보내기</button>
  <button onclick="resetLayout()">↺ 재배치</button>
  <button onclick="resetToDefaults()" style="color:#f85149">↺ 초기화</button>
  <div style="display:flex;align-items:center;gap:4px;margin-left:8px;border-left:1px solid #30363d;padding-left:12px;">
    <button onclick="zoomOut()" title="Ctrl+-" style="padding:6px 10px;">−</button>
    <span id="zoom-level" style="font-size:12px;color:#8b949e;min-width:36px;text-align:center;">100%</span>
    <button onclick="zoomIn()" title="Ctrl+=" style="padding:6px 10px;">+</button>
  </div>
  <span class="status" id="status">Ready</span>
</div>
<script>
const SAVE_KEY = 'board-기분-리셋';
const IMG_BASE = '../../../attachments/';
const DEFAULT_CARDS = [
  {
    "type": "html",
    "x": 75,

    "w": 946,
    "html": "\r\n\t\t\t<p lang=\"en-US\" data-tag=\"to-do\" style=\"font-family:Pretendard Light;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">일<span style=\"font-family:Malgun Gothic\">상의 모험</span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">하라</span><span style=\"font-family:Pretendard Thin\">. </span><span lang=\"ko-KR\" style=\"font-family:Pretendard Thin\">새로운</span><span style=\"font-family:Pretendard Thin\"> </span><span lang=\"ko-KR\" style=\"font-family:Pretendard Thin\">경로</span><span style=\"font-family:Pretendard Thin\">, </span><span lang=\"ko-KR\" style=\"font-family:Pretendard Thin\">재미</span><span style=\"font-family:Pretendard Thin\"> </span><span lang=\"ko-KR\" style=\"font-family:Pretendard Thin\">요소를</span><span style=\"font-family:Pretendard Thin\"> </span><span lang=\"ko-KR\" style=\"font-family:Pretendard Thin\">찾아서</span><span style=\"font-family:Pretendard Thin\"> </span><span lang=\"ko-KR\" style=\"font-family:Pretendard Thin\">블록을</span><span style=\"font-family:Pretendard Thin\"> </span><span lang=\"ko-KR\" style=\"font-family:Pretendard Thin\">채워라</span><span style=\"font-family:Pretendard Thin\">.</span></p>\r\n\t\t\t<p lang=\"en-US\" data-tag=\"to-do\" style=\"font-family:Pretendard Light;font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">음악</span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">을</span><span style=\"font-family:Malgun Gothic\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">들어라</span><span style=\"font-family:Malgun Gothic\">.</span></p>\r\n\t\t\t<p data-tag=\"to-do\" style=\"font-family:Pretendard Light;font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">어렵고</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">힘든일의</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">일</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\">부분에서 재미요소 찾기</span></p>\r\n\t\t\t<p lang=\"en-US\" data-tag=\"to-do\" style=\"font-family:Pretendard Light;font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">스스로</span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">를</span><span style=\"font-family:Malgun Gothic\"> 응원</span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">하라</span></p>\r\n\t\t\t<p lang=\"en-US\" data-tag=\"to-do\" style=\"font-family:Pretendard Light;font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">천재</span><span style=\"font-family:Malgun Gothic\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">모드를</span><span style=\"font-family:Malgun Gothic\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">암시하라</span><span style=\"font-family:Malgun Gothic\">.</span></p>\r\n\t\t\t<p lang=\"en-US\" data-tag=\"to-do\" style=\"font-family:Pretendard Light;font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">또</span><span style=\"font-family:Malgun Gothic\"> 다</span><span style=\"font-family:Malgun Gothic\">른</span><span style=\"font-family:Malgun Gothic\"> 슈</span><span style=\"font-family:Malgun Gothic\">퍼</span><span style=\"font-family:Malgun Gothic\"> 히</span><span style=\"font-family:Malgun Gothic\">어로</span><span style=\"font-family:Malgun Gothic\"> 자</span><span style=\"font-family:Malgun Gothic\">아</span><span style=\"font-family:Malgun Gothic\"> 모</span><span style=\"font-family:Malgun Gothic\">드를</span><span style=\"font-family:Malgun Gothic\"> 만들어</span><span style=\"font-family:Malgun Gothic\">라</span><span style=\"font-family:Malgun Gothic\">, 안경을 쓴다</span><span style=\"font-family:Malgun Gothic\">던지</span><span style=\"font-family:Malgun Gothic\"> </span></p>\r\n\t\t\t<p lang=\"en-US\" data-tag=\"to-do\" style=\"font-family:Pretendard Light;font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">간접 학습</span><span style=\"font-family:Pretendard Thin\">: </span><span style=\"font-family:Malgun Gothic\">하고자하는 것을 하는 사람들을 곁에둬라</span><span style=\"font-family:Calibri\">, </span><span style=\"font-family:Malgun Gothic\">자꾸 노출되고 봐라</span><span style=\"font-family:Malgun Gothic\">.</span></p>\r\n\t\t\t<p data-tag=\"to-do\" style=\"font-family:Pretendard Light;font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">직접학습</span><span lang=\"en-US\" style=\"font-family:Pretendard Thin\">: </span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\">하고자하는게 있으면 그걸해라</span><span lang=\"en-US\" style=\"font-family:Calibri\">.</span></p>\r\n\t\t\t<p data-tag=\"to-do\" style=\"font-family:Pretendard Light;font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">배우고자하는</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">것을</span><span lang=\"en-US\" style=\"font-family:Calibri\"> </span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\">가르쳐라</span></p>\r\n\t\t\t<p lang=\"en-US\" data-tag=\"to-do\" style=\"font-family:Pretendard Light;font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">두려움에</span><span style=\"font-family:Malgun Gothic\"> 다</span><span style=\"font-family:Malgun Gothic\">른</span><span style=\"font-family:Malgun Gothic\"> 이</span><span style=\"font-family:Malgun Gothic\">름을</span><span style=\"font-family:Malgun Gothic\"> 붙여</span><span style=\"font-family:Malgun Gothic\">라</span></p>\r\n\t\t\t<p data-tag=\"to-do\" style=\"font-family:Pretendard Light;font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">하기</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">싫다면</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\">딱</span><span lang=\"en-US\" style=\"font-family:Calibri\"> 5</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\">분만해라</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">계속하게</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">된다</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\">.</span></p>\r\n\t\t\t<p data-tag=\"to-do\" style=\"font-family:Pretendard Light;font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">추도사를</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">써보라</span></p>\r\n\t\t\t<br />\r\n\t\t\t<div style=\"display:inline-block;width:360px;height:480px;background:#2d333b;border-radius:4px;margin:2px;vertical-align:top;opacity:0.4\"></div>\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:16pt;font-weight:bold\">1. </span><span style=\"font-family:Malgun Gothic;font-size:16pt;font-weight:bold\">기분 좋은 호르몬과 취소 가설</span></p>\r\n\t\t\t<br />\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">그렇다면 이 신비한 에너지의 근원은 무엇일까</span>? <span style=\"font-family:Malgun Gothic\">한마디로 좋은 기분이다</span>. </p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">긍정적</span> <span style=\"font-family:Malgun Gothic\">감정은</span> <span style=\"font-family:Malgun Gothic\">네</span> <span style=\"font-family:Malgun Gothic\">가지</span> <span style=\"font-family:Malgun Gothic\">호르몬과</span> <span style=\"font-family:Malgun Gothic\">관련이</span> <span style=\"font-family:Malgun Gothic\">깊다</span>. <span style=\"font-family:Malgun Gothic\">바로</span> <span style=\"font-family:Malgun Gothic\">엔도르핀</span>, <span style=\"font-family:Malgun Gothic\">세로토닌</span>, <span style=\"font-family:Malgun Gothic\">도파민</span>, <span style=\"font-family:Malgun Gothic\">옥시토신으로</span> <span style=\"font-family:Malgun Gothic\">흔히</span> ‘<span style=\"font-family:Malgun Gothic\">기분</span> <span style=\"font-family:Malgun Gothic\">좋은</span> <span style=\"font-family:Malgun Gothic\">호르몬</span>’<span style=\"font-family:Malgun Gothic\">으로</span> <span style=\"font-family:Malgun Gothic\">불린다</span>. </p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">이</span> <span style=\"font-family:Malgun Gothic\">호르몬들은</span> <span style=\"font-family:Malgun Gothic\">우리가</span> <span style=\"font-family:Malgun Gothic\">더</span> <span style=\"font-family:Malgun Gothic\">많은</span> <span style=\"font-family:Malgun Gothic\">것을</span> <span style=\"font-family:Malgun Gothic\">성취하게</span> <span style=\"font-family:Malgun Gothic\">한다</span>. </p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">엔도르핀은</span> <span style=\"font-family:Malgun Gothic\">주로</span> <span style=\"font-family:Malgun Gothic\">신체</span> <span style=\"font-family:Malgun Gothic\">활동을</span> <span style=\"font-family:Malgun Gothic\">할</span> <span style=\"font-family:Malgun Gothic\">때나</span> <span style=\"font-family:Malgun Gothic\">스트레스나</span> <span style=\"font-family:Malgun Gothic\">통증을</span> <span style=\"font-family:Malgun Gothic\">느낄</span> <span style=\"font-family:Malgun Gothic\">때</span> <span style=\"font-family:Malgun Gothic\">분비되어</span> <span style=\"font-family:Malgun Gothic\">행복감을</span> <span style=\"font-family:Malgun Gothic\">유발하고</span> <span style=\"font-family:Malgun Gothic\">불편감을</span> <span style=\"font-family:Malgun Gothic\">감소시키며</span> <span style=\"font-family:Malgun Gothic\">그</span> <span style=\"font-family:Malgun Gothic\">분비량이</span> <span style=\"font-family:Malgun Gothic\">늘어나면</span> <span style=\"font-family:Malgun Gothic\">대체로</span> <span style=\"font-family:Malgun Gothic\">에너지와</span> <span style=\"font-family:Malgun Gothic\">의욕이</span> <span style=\"font-family:Malgun Gothic\">증진된다</span>. </p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">세로토닌은</span> <span style=\"font-family:Malgun Gothic\">감정</span> <span style=\"font-family:Malgun Gothic\">조절</span>, <span style=\"font-family:Malgun Gothic\">수면</span>, <span style=\"font-family:Malgun Gothic\">식욕</span>, <span style=\"font-family:Malgun Gothic\">전반적</span> <span style=\"font-family:Malgun Gothic\">안녕감과</span> <span style=\"font-family:Malgun Gothic\">연관되어</span> <span style=\"font-family:Malgun Gothic\">있다</span>. <span style=\"font-family:Malgun Gothic\">만족감을</span> <span style=\"font-family:Malgun Gothic\">일으키고</span> <span style=\"font-family:Malgun Gothic\">에너지를</span> <span style=\"font-family:Malgun Gothic\">발생시켜</span> <span style=\"font-family:Malgun Gothic\">더</span> <span style=\"font-family:Malgun Gothic\">효율적으로</span> <span style=\"font-family:Malgun Gothic\">일을</span> <span style=\"font-family:Malgun Gothic\">처리하게</span> <span style=\"font-family:Malgun Gothic\">한다</span>. <span style=\"font-family:Malgun Gothic\">일명</span> ‘<span style=\"font-family:Malgun Gothic\">보상</span>’ <span style=\"font-family:Malgun Gothic\">호르몬인</span> <span style=\"font-family:Malgun Gothic\">도파민은</span> <span style=\"font-family:Malgun Gothic\">의욕</span> <span style=\"font-family:Malgun Gothic\">및</span> <span style=\"font-family:Malgun Gothic\">쾌감과</span> <span style=\"font-family:Malgun Gothic\">관련되어</span> <span style=\"font-family:Malgun Gothic\">있고</span> <span style=\"font-family:Malgun Gothic\">도파민이</span> <span style=\"font-family:Malgun Gothic\">분비되면</span> <span style=\"font-family:Malgun Gothic\">만족감이</span> <span style=\"font-family:Malgun Gothic\">생기면서</span> <span style=\"font-family:Malgun Gothic\">집중력이</span> <span style=\"font-family:Malgun Gothic\">더</span> <span style=\"font-family:Malgun Gothic\">오래</span> <span style=\"font-family:Malgun Gothic\">지속된다</span>. ‘<span style=\"font-family:Malgun Gothic\">사랑</span>’ <span style=\"font-family:Malgun Gothic\">호르몬으로</span> <span style=\"font-family:Malgun Gothic\">알려진</span> <span style=\"font-family:Malgun Gothic\">옥시토신은</span> <span style=\"font-family:Malgun Gothic\">유대감</span>, <span style=\"font-family:Malgun Gothic\">신뢰</span>, <span style=\"font-family:Malgun Gothic\">관계</span> <span style=\"font-family:Malgun Gothic\">형성에</span> <span style=\"font-family:Malgun Gothic\">영향을</span> <span style=\"font-family:Malgun Gothic\">미친다</span>. <span style=\"font-family:Malgun Gothic\">옥시토신이</span> <span style=\"font-family:Malgun Gothic\">분비되면</span> <span style=\"font-family:Malgun Gothic\">타인과</span> <span style=\"font-family:Malgun Gothic\">친밀하게</span> <span style=\"font-family:Malgun Gothic\">소통하는</span> <span style=\"font-family:Malgun Gothic\">능력이</span> <span style=\"font-family:Malgun Gothic\">향상되고</span> <span style=\"font-family:Malgun Gothic\">기분이</span> <span style=\"font-family:Malgun Gothic\">좋아져서</span> <span style=\"font-family:Malgun Gothic\">결과적으로</span> <span style=\"font-family:Malgun Gothic\">생산성이</span> <span style=\"font-family:Malgun Gothic\">향상된다</span>.</p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">그러니까 이 기분 좋은 호르몬들이 선순환의 출발점이다</span>. <span style=\"font-family:Malgun Gothic\">기분이 좋으면 에너지가 발생하여 생산성이 향상된다</span>. <span style=\"font-family:Malgun Gothic\">그리고 생산성이 성취감으로 이어져 다시 기분이 좋아진다</span>.</p>\r\n\t\t\t<br />\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">둘째</span>, <span style=\"font-family:Malgun Gothic\">기분이 좋으면 스트레스가 감소한다</span>. <span style=\"font-family:Malgun Gothic\">확장 및 구축 이론 외에도 바버라 프레드릭슨은 심리학계에서 말하는</span> ‘<span style=\"font-family:Malgun Gothic\">취소 가설</span>(undoing hypothesis)’<span style=\"font-family:Malgun Gothic\">을 제시했다</span>. <span style=\"font-family:Malgun Gothic\">프레드릭슨과 동료들은 이미 수십 년 전부터 부정적 감정이 아드레날린과 코르티솔 같은 스트레스 호르몬을 분비시킨다고 밝혀진 데 주목했다</span>. <span style=\"font-family:Malgun Gothic\">이는 단기적으로 보면 문제가 되지 않는다</span>.</p>\r\n\t\t\t<br />\r\n\t\t\t<div style=\"display:inline-block;width:360px;height:480px;background:#2d333b;border-radius:4px;margin:2px;vertical-align:top;opacity:0.4\"></div>\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:16pt;font-weight:bold\">2. </span><span style=\"font-family:Malgun Gothic;font-size:16pt;font-weight:bold\">성공한 사람들의 이야기</span></p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">힘을 느끼고 싶은 분야에서 성공한 사람들의 이야기를 접할 때 자신감이 대폭 향상되는 것을 느낀다</span>.</p>\r\n\t\t\t<br />\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">예를 들어 병원에서 일할 때 영국 커녕 의사 협회</span>(Royal College of Physicians)<span style=\"font-family:Malgun Gothic\">에서 제작하는</span> &lt;RCP <span style=\"font-family:Malgun Gothic\">메디신</span> RCP Medicine&gt; <span style=\"font-family:Malgun Gothic\">팟캐스트를 들으면서 출근했다</span>. <span style=\"font-family:Malgun Gothic\">여러 의사가 다양한 증상을 진단하고 치료하는 이야기를 들으면 더 강한 자신감으로 내 일에 임할 수 있었다</span>.</p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">처음으로</span> <span style=\"font-family:Malgun Gothic\">온라인</span> <span style=\"font-family:Malgun Gothic\">사업을</span> <span style=\"font-family:Malgun Gothic\">시작했을</span> <span style=\"font-family:Malgun Gothic\">때에는</span> <span style=\"font-family:Malgun Gothic\">골방에서</span> 1<span style=\"font-family:Malgun Gothic\">인</span> <span style=\"font-family:Malgun Gothic\">온라인</span> <span style=\"font-family:Malgun Gothic\">사업을</span> <span style=\"font-family:Malgun Gothic\">시작해</span> <span style=\"font-family:Malgun Gothic\">엄청난</span> <span style=\"font-family:Malgun Gothic\">성공을</span> <span style=\"font-family:Malgun Gothic\">거둔</span> <span style=\"font-family:Malgun Gothic\">사람들을</span> <span style=\"font-family:Malgun Gothic\">인터뷰하는</span> &lt;<span style=\"font-family:Malgun Gothic\">인디</span> <span style=\"font-family:Malgun Gothic\">해커스</span> Indie Hackers&gt; <span style=\"font-family:Malgun Gothic\">팟캐스트를</span> <span style=\"font-family:Malgun Gothic\">많이</span> <span style=\"font-family:Malgun Gothic\">들었다</span>. <span style=\"font-family:Malgun Gothic\">출연자들이</span> <span style=\"font-family:Malgun Gothic\">어떤</span> <span style=\"font-family:Malgun Gothic\">난관을</span> <span style=\"font-family:Malgun Gothic\">어떻게</span> <span style=\"font-family:Malgun Gothic\">극복했는지</span> <span style=\"font-family:Malgun Gothic\">들으면</span> <span style=\"font-family:Malgun Gothic\">비슷한</span> <span style=\"font-family:Malgun Gothic\">난관에</span> <span style=\"font-family:Malgun Gothic\">봉착했을</span> <span style=\"font-family:Malgun Gothic\">때</span> <span style=\"font-family:Malgun Gothic\">더</span> <span style=\"font-family:Malgun Gothic\">자신</span> <span style=\"font-family:Malgun Gothic\">있게</span> <span style=\"font-family:Malgun Gothic\">대응할</span> <span style=\"font-family:Malgun Gothic\">수</span> <span style=\"font-family:Malgun Gothic\">있었다</span>.</p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">그리고</span> <span style=\"font-family:Malgun Gothic\">작가로서</span> <span style=\"font-family:Malgun Gothic\">새로운</span> <span style=\"font-family:Malgun Gothic\">삶을</span> <span style=\"font-family:Malgun Gothic\">시작한</span> <span style=\"font-family:Malgun Gothic\">지금은</span> <span style=\"font-family:Malgun Gothic\">무엇보다도</span> <span style=\"font-family:Malgun Gothic\">성공한</span> <span style=\"font-family:Malgun Gothic\">작가들의</span> <span style=\"font-family:Malgun Gothic\">이야기를</span> <span style=\"font-family:Malgun Gothic\">보고</span> <span style=\"font-family:Malgun Gothic\">듣는</span> <span style=\"font-family:Malgun Gothic\">것은</span> <span style=\"font-family:Malgun Gothic\">물론이고</span> <span style=\"font-family:Malgun Gothic\">그들을</span> <span style=\"font-family:Malgun Gothic\">직접</span> <span style=\"font-family:Malgun Gothic\">인터뷰할</span> <span style=\"font-family:Malgun Gothic\">때</span> ‘<span style=\"font-family:Malgun Gothic\">나도</span> <span style=\"font-family:Malgun Gothic\">할</span> <span style=\"font-family:Malgun Gothic\">수</span> <span style=\"font-family:Malgun Gothic\">있어</span>’<span style=\"font-family:Malgun Gothic\">라는</span> <span style=\"font-family:Malgun Gothic\">믿음이</span> <span style=\"font-family:Malgun Gothic\">가장</span> <span style=\"font-family:Malgun Gothic\">강해진다</span>.</p>\r\n\t\t\t<br />\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\">○ <span style=\"font-family:Malgun Gothic\">그들이</span> <span style=\"font-family:Malgun Gothic\">했다면</span> <span style=\"font-family:Malgun Gothic\">당신도</span> <span style=\"font-family:Malgun Gothic\">할</span> <span style=\"font-family:Malgun Gothic\">수</span> <span style=\"font-family:Malgun Gothic\">있다</span>.</p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">이는</span> <span style=\"font-family:Malgun Gothic\">누구나</span> <span style=\"font-family:Malgun Gothic\">활용할</span> <span style=\"font-family:Malgun Gothic\">수</span> <span style=\"font-family:Malgun Gothic\">있는</span> <span style=\"font-family:Malgun Gothic\">기법이다</span>. <span style=\"font-family:Malgun Gothic\">당신과</span> <span style=\"font-family:Malgun Gothic\">똑같은</span> <span style=\"font-family:Malgun Gothic\">난관을</span> <span style=\"font-family:Malgun Gothic\">헤쳐</span> <span style=\"font-family:Malgun Gothic\">나가는</span> <span style=\"font-family:Malgun Gothic\">사람을</span> <span style=\"font-family:Malgun Gothic\">찾아서</span> <span style=\"font-family:Malgun Gothic\">같이</span> <span style=\"font-family:Malgun Gothic\">시간을</span> <span style=\"font-family:Malgun Gothic\">보내자</span>. <span style=\"font-family:Malgun Gothic\">혹은</span> <span style=\"font-family:Malgun Gothic\">그런</span> <span style=\"font-family:Malgun Gothic\">사람의</span> <span style=\"font-family:Malgun Gothic\">이야기를</span> <span style=\"font-family:Malgun Gothic\">들을</span> <span style=\"font-family:Malgun Gothic\">방법을</span> <span style=\"font-family:Malgun Gothic\">찾아보자</span>. <span style=\"font-family:Malgun Gothic\">대리</span> <span style=\"font-family:Malgun Gothic\">성공에</span> <span style=\"font-family:Malgun Gothic\">몰입하면</span> <span style=\"font-family:Malgun Gothic\">마음속에</span> <span style=\"font-family:Malgun Gothic\">강력한</span> <span style=\"font-family:Malgun Gothic\">믿음이</span> <span style=\"font-family:Malgun Gothic\">생긴다</span>. <span style=\"font-family:Malgun Gothic\">그들이</span> <span style=\"font-family:Malgun Gothic\">했다면</span> <span style=\"font-family:Malgun Gothic\">당신도</span> <span style=\"font-family:Malgun Gothic\">할</span> <span style=\"font-family:Malgun Gothic\">수</span> <span style=\"font-family:Malgun Gothic\">있다</span>.</p>\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<div style=\"display:inline-block;width:360px;height:480px;background:#2d333b;border-radius:4px;margin:2px;vertical-align:top;opacity:0.4\"></div>\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:16pt;font-weight:bold\">3. </span><span style=\"font-family:Malgun Gothic;font-size:16pt;font-weight:bold\">도움을 요청하는 법</span></p>\r\n\t\t\t<br />\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">첫째</span>, <span style=\"font-family:Malgun Gothic\">부탁을</span> <span style=\"font-family:Malgun Gothic\">망설이는</span> <span style=\"font-family:Malgun Gothic\">마음을</span> <span style=\"font-family:Malgun Gothic\">극복해야</span> <span style=\"font-family:Malgun Gothic\">한다</span>. <span style=\"font-family:Malgun Gothic\">이때</span> <span style=\"font-family:Malgun Gothic\">가장</span> <span style=\"font-family:Malgun Gothic\">쉬운</span> <span style=\"font-family:Malgun Gothic\">방법은</span> <span style=\"font-family:Malgun Gothic\">사람들이</span> <span style=\"font-family:Malgun Gothic\">생각보다</span> <span style=\"font-family:Malgun Gothic\">남을</span> <span style=\"font-family:Malgun Gothic\">도우려는</span> <span style=\"font-family:Malgun Gothic\">마음이</span> <span style=\"font-family:Malgun Gothic\">강하다는</span> <span style=\"font-family:Malgun Gothic\">사실을</span> <span style=\"font-family:Malgun Gothic\">기억하는</span> <span style=\"font-family:Malgun Gothic\">것이다</span>. <span style=\"font-family:Malgun Gothic\">지금까지</span> <span style=\"font-family:Malgun Gothic\">우리는</span> <span style=\"font-family:Malgun Gothic\">남을</span> <span style=\"font-family:Malgun Gothic\">웃게</span> <span style=\"font-family:Malgun Gothic\">하고</span>, <span style=\"font-family:Malgun Gothic\">가르치고</span>, <span style=\"font-family:Malgun Gothic\">멘토링하는</span> <span style=\"font-family:Malgun Gothic\">게</span> <span style=\"font-family:Malgun Gothic\">얼마나</span> <span style=\"font-family:Malgun Gothic\">큰</span> <span style=\"font-family:Malgun Gothic\">에너지를</span> <span style=\"font-family:Malgun Gothic\">발생시키는지</span> <span style=\"font-family:Malgun Gothic\">여러</span> <span style=\"font-family:Malgun Gothic\">번</span> <span style=\"font-family:Malgun Gothic\">살펴봤다</span>. <span style=\"font-family:Malgun Gothic\">그런데도</span> <span style=\"font-family:Malgun Gothic\">남들이</span> <span style=\"font-family:Malgun Gothic\">자신을</span> <span style=\"font-family:Malgun Gothic\">돕고</span> <span style=\"font-family:Malgun Gothic\">싶어</span> <span style=\"font-family:Malgun Gothic\">하지</span> <span style=\"font-family:Malgun Gothic\">않을</span> <span style=\"font-family:Malgun Gothic\">거라고</span> <span style=\"font-family:Malgun Gothic\">착각하는</span> <span style=\"font-family:Malgun Gothic\">사람이</span> <span style=\"font-family:Malgun Gothic\">많다</span>. <span style=\"font-family:Malgun Gothic\">조직</span> <span style=\"font-family:Malgun Gothic\">행동학자</span> <span style=\"font-family:Malgun Gothic\">프랜시스</span> <span style=\"font-family:Malgun Gothic\">플린</span>(Francis Flynn)<span style=\"font-family:Malgun Gothic\">과</span> <span style=\"font-family:Malgun Gothic\">버네사</span> <span style=\"font-family:Malgun Gothic\">본스</span>(Vanessa Bohns)<span style=\"font-family:Malgun Gothic\">에</span> <span style=\"font-family:Malgun Gothic\">따르면</span> <span style=\"font-family:Malgun Gothic\">우리는</span> <span style=\"font-family:Malgun Gothic\">타인이</span> <span style=\"font-family:Malgun Gothic\">우리의</span> <span style=\"font-family:Malgun Gothic\">부탁에</span> <span style=\"font-family:Malgun Gothic\">응할</span> <span style=\"font-family:Malgun Gothic\">확률을</span> <span style=\"font-family:Malgun Gothic\">많게는</span> 50<span style=\"font-family:Malgun Gothic\">퍼센트나</span> <span style=\"font-family:Malgun Gothic\">과소평가하는</span> <span style=\"font-family:Malgun Gothic\">경향이</span> <span style=\"font-family:Malgun Gothic\">있다</span>.</p>\r\n\t\t\t<br />\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">둘째</span>, <span style=\"font-family:Malgun Gothic\">올바른</span> <span style=\"font-family:Malgun Gothic\">방식으로</span> <span style=\"font-family:Malgun Gothic\">요청해야</span> <span style=\"font-family:Malgun Gothic\">한다</span>. <span style=\"font-family:Malgun Gothic\">무엇보다</span> <span style=\"font-family:Malgun Gothic\">되도록</span> <span style=\"font-family:Malgun Gothic\">직접</span> <span style=\"font-family:Malgun Gothic\">대면으로</span> <span style=\"font-family:Malgun Gothic\">부탁해야</span> <span style=\"font-family:Malgun Gothic\">한다</span>. <span style=\"font-family:Malgun Gothic\">가상으로</span> <span style=\"font-family:Malgun Gothic\">요청하면</span> <span style=\"font-family:Malgun Gothic\">뭐든</span> <span style=\"font-family:Malgun Gothic\">더</span> <span style=\"font-family:Malgun Gothic\">어려워진다</span>. <span style=\"font-family:Malgun Gothic\">본스는</span> 2017<span style=\"font-family:Malgun Gothic\">년에</span> <span style=\"font-family:Malgun Gothic\">발표한</span> <span style=\"font-family:Malgun Gothic\">논문에서</span> “<span style=\"font-family:Malgun Gothic\">도움을</span> <span style=\"font-family:Malgun Gothic\">요청하는</span> <span style=\"font-family:Malgun Gothic\">사람들은</span> <span style=\"font-family:Malgun Gothic\">이메일로</span> <span style=\"font-family:Malgun Gothic\">요청해도</span> <span style=\"font-family:Malgun Gothic\">직접</span> <span style=\"font-family:Malgun Gothic\">요청하는</span> <span style=\"font-family:Malgun Gothic\">것과</span> <span style=\"font-family:Malgun Gothic\">효과가</span> <span style=\"font-family:Malgun Gothic\">같으리라고</span> <span style=\"font-family:Malgun Gothic\">생각했다</span>. <span style=\"font-family:Malgun Gothic\">하지만</span> <span style=\"font-family:Malgun Gothic\">실제로는</span> <span style=\"font-family:Malgun Gothic\">직접</span> <span style=\"font-family:Malgun Gothic\">도움을</span> <span style=\"font-family:Malgun Gothic\">요청하는</span> <span style=\"font-family:Malgun Gothic\">것이</span> <span style=\"font-family:Malgun Gothic\">약</span> <span style=\"font-family:Malgun Gothic\">서른네</span> <span style=\"font-family:Malgun Gothic\">배</span> <span style=\"font-family:Malgun Gothic\">효과적이었다</span>”<span style=\"font-family:Malgun Gothic\">라고</span> <span style=\"font-family:Malgun Gothic\">썼다</span>.</p>\r\n\t\t\t<br />\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">마지막으로</span>, <span style=\"font-family:Malgun Gothic\">올바른</span> <span style=\"font-family:Malgun Gothic\">표현을</span> <span style=\"font-family:Malgun Gothic\">사용해야</span> <span style=\"font-family:Malgun Gothic\">한다</span>. “<span style=\"font-family:Malgun Gothic\">이런</span> <span style=\"font-family:Malgun Gothic\">거</span> <span style=\"font-family:Malgun Gothic\">부탁해서</span> <span style=\"font-family:Malgun Gothic\">정말</span> <span style=\"font-family:Malgun Gothic\">죄송한데요</span>”<span style=\"font-family:Malgun Gothic\">처럼</span> <span style=\"font-family:Malgun Gothic\">부정적인</span> <span style=\"font-family:Malgun Gothic\">말은</span> <span style=\"font-family:Malgun Gothic\">삼가고</span> “<span style=\"font-family:Malgun Gothic\">이번에</span> <span style=\"font-family:Malgun Gothic\">도와주면</span> <span style=\"font-family:Malgun Gothic\">다음번에</span> <span style=\"font-family:Malgun Gothic\">저도</span> <span style=\"font-family:Malgun Gothic\">도와드릴게요</span>”<span style=\"font-family:Malgun Gothic\">처럼</span> <span style=\"font-family:Malgun Gothic\">거래를</span> <span style=\"font-family:Malgun Gothic\">암시하는</span> <span style=\"font-family:Malgun Gothic\">말도</span> <span style=\"font-family:Malgun Gothic\">금물이다</span>. <span style=\"font-family:Malgun Gothic\">그</span> <span style=\"font-family:Malgun Gothic\">대신</span> <span style=\"font-family:Malgun Gothic\">굳이</span> <span style=\"font-family:Malgun Gothic\">그</span> <span style=\"font-family:Malgun Gothic\">사람에게</span> <span style=\"font-family:Malgun Gothic\">도움을</span> <span style=\"font-family:Malgun Gothic\">요청하는</span> <span style=\"font-family:Malgun Gothic\">이유를</span> <span style=\"font-family:Malgun Gothic\">긍정적으로</span> <span style=\"font-family:Malgun Gothic\">말하자</span>. “<span style=\"font-family:Malgun Gothic\">당신이</span> <span style=\"font-family:Malgun Gothic\">한</span> X, Y, Z<span style=\"font-family:Malgun Gothic\">를</span> <span style=\"font-family:Malgun Gothic\">봤는데</span> <span style=\"font-family:Malgun Gothic\">정말</span> <span style=\"font-family:Malgun Gothic\">인상적이었어요</span>. <span style=\"font-family:Malgun Gothic\">당신이</span> A, B, C<span style=\"font-family:Malgun Gothic\">를</span> <span style=\"font-family:Malgun Gothic\">어떻게</span> <span style=\"font-family:Malgun Gothic\">했는지</span> <span style=\"font-family:Malgun Gothic\">들어보고</span> <span style=\"font-family:Malgun Gothic\">싶네요</span>.” <span style=\"font-family:Malgun Gothic\">이렇게</span> <span style=\"font-family:Malgun Gothic\">당신이</span> <span style=\"font-family:Malgun Gothic\">높게</span> <span style=\"font-family:Malgun Gothic\">평가하는</span> <span style=\"font-family:Malgun Gothic\">긍정적인</span> <span style=\"font-family:Malgun Gothic\">면을</span> <span style=\"font-family:Malgun Gothic\">강조하면</span> <span style=\"font-family:Malgun Gothic\">상대방은</span> <span style=\"font-family:Malgun Gothic\">당신이</span> <span style=\"font-family:Malgun Gothic\">진심으로</span> <span style=\"font-family:Malgun Gothic\">자신의</span> <span style=\"font-family:Malgun Gothic\">의견을</span> <span style=\"font-family:Malgun Gothic\">존중한다고</span> <span style=\"font-family:Malgun Gothic\">생각해</span> <span style=\"font-family:Malgun Gothic\">더욱</span> <span style=\"font-family:Malgun Gothic\">기꺼이</span> <span style=\"font-family:Malgun Gothic\">요청에</span> <span style=\"font-family:Malgun Gothic\">응할</span> <span style=\"font-family:Malgun Gothic\">것이다</span>.</p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">마지막 부분이 핵심이다</span>. <span style=\"font-family:Malgun Gothic\">적절한 언어로 도움을 요청</span></p>\r\n\t\t\t<br />\r\n\t\t\t<div style=\"display:inline-block;width:360px;height:480px;background:#2d333b;border-radius:4px;margin:2px;vertical-align:top;opacity:0.4\"></div>\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:16pt;font-weight:bold\">4. </span><span style=\"font-family:Malgun Gothic;font-size:16pt;font-weight:bold\">제거 해법</span></p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">발바닥의 연한 살이 돌멩이 때문에 다 까져도 이 악물고 달려서 마침내 친구 집에 도착한다</span>! <span style=\"font-family:Malgun Gothic\">하지만 식사는 취소다</span>. <span style=\"font-family:Malgun Gothic\">친구가 피투성이 발로 찾아온 당신을 병원에 태워줘야 하기 때문이다</span>. <span style=\"font-family:Malgun Gothic\">당신은 치료를 기다리며 속으로</span> “<span style=\"font-family:Malgun Gothic\">극기심만 있으면 못 할 게 없다</span>”<span style=\"font-family:Malgun Gothic\">라고 되뇐다</span>.</p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">나는</span> <span style=\"font-family:Malgun Gothic\">감히</span> <span style=\"font-family:Malgun Gothic\">이</span> <span style=\"font-family:Malgun Gothic\">세</span> <span style=\"font-family:Malgun Gothic\">가지</span> <span style=\"font-family:Malgun Gothic\">해법이</span> <span style=\"font-family:Malgun Gothic\">모두</span> <span style=\"font-family:Malgun Gothic\">빗나갔다고</span> <span style=\"font-family:Malgun Gothic\">말하고</span> <span style=\"font-family:Malgun Gothic\">싶다</span>. <span style=\"font-family:Malgun Gothic\">네</span> <span style=\"font-family:Malgun Gothic\">번째</span>(<span style=\"font-family:Malgun Gothic\">그리고</span> <span style=\"font-family:Malgun Gothic\">최선의</span>) <span style=\"font-family:Malgun Gothic\">해법은</span> <span style=\"font-family:Malgun Gothic\">조금</span> <span style=\"font-family:Malgun Gothic\">더</span> <span style=\"font-family:Malgun Gothic\">비판적으로</span> <span style=\"font-family:Malgun Gothic\">생각하는</span> <span style=\"font-family:Malgun Gothic\">것이다</span>. <span style=\"font-family:Malgun Gothic\">잠깐</span> <span style=\"font-family:Malgun Gothic\">멈춰서</span> ‘<span style=\"font-family:Malgun Gothic\">친구</span> <span style=\"font-family:Malgun Gothic\">집에</span> <span style=\"font-family:Malgun Gothic\">가는</span> <span style=\"font-family:Malgun Gothic\">게</span> <span style=\"font-family:Malgun Gothic\">왜</span> <span style=\"font-family:Malgun Gothic\">이리</span> <span style=\"font-family:Malgun Gothic\">힘들게</span> <span style=\"font-family:Malgun Gothic\">느껴지지</span>?’<span style=\"font-family:Malgun Gothic\">라고</span> <span style=\"font-family:Malgun Gothic\">생각해보면</span> <span style=\"font-family:Malgun Gothic\">어떨까</span>? <span style=\"font-family:Malgun Gothic\">그러면</span> <span style=\"font-family:Malgun Gothic\">신발을</span> <span style=\"font-family:Malgun Gothic\">벗고</span> <span style=\"font-family:Malgun Gothic\">돌멩이를</span> <span style=\"font-family:Malgun Gothic\">뺄</span> <span style=\"font-family:Malgun Gothic\">것이다</span>. <span style=\"font-family:Malgun Gothic\">그러고</span> <span style=\"font-family:Malgun Gothic\">나서</span> <span style=\"font-family:Malgun Gothic\">달려가면</span> <span style=\"font-family:Malgun Gothic\">된다</span>.</p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">이게</span> <span style=\"font-family:Malgun Gothic\">바로</span> <span style=\"font-family:Malgun Gothic\">앞으로</span> 4~6<span style=\"font-family:Malgun Gothic\">장에</span> <span style=\"font-family:Malgun Gothic\">걸쳐</span> <span style=\"font-family:Malgun Gothic\">이야기할</span> ‘<span style=\"font-family:Malgun Gothic\">제거</span> <span style=\"font-family:Malgun Gothic\">해법</span>’<span style=\"font-family:Malgun Gothic\">이다</span>. <span style=\"font-family:Malgun Gothic\">우리는</span> <span style=\"font-family:Malgun Gothic\">일반적으로</span> <span style=\"font-family:Malgun Gothic\">미루기가</span> <span style=\"font-family:Malgun Gothic\">부정적</span> <span style=\"font-family:Malgun Gothic\">감정에서</span> <span style=\"font-family:Malgun Gothic\">비롯된다는</span> <span style=\"font-family:Malgun Gothic\">사실을</span> <span style=\"font-family:Malgun Gothic\">배울</span> <span style=\"font-family:Malgun Gothic\">것이다</span>. <span style=\"font-family:Malgun Gothic\">부정적</span> <span style=\"font-family:Malgun Gothic\">감정은</span> 1<span style=\"font-family:Malgun Gothic\">부에서</span> <span style=\"font-family:Malgun Gothic\">이야기한</span> <span style=\"font-family:Malgun Gothic\">기분</span> <span style=\"font-family:Malgun Gothic\">좋은</span> <span style=\"font-family:Malgun Gothic\">에너지원과</span> <span style=\"font-family:Malgun Gothic\">정반대다</span>. <span style=\"font-family:Malgun Gothic\">혼란</span>, <span style=\"font-family:Malgun Gothic\">두려움</span>, <span style=\"font-family:Malgun Gothic\">관성</span> <span style=\"font-family:Malgun Gothic\">같은</span> <span style=\"font-family:Malgun Gothic\">부정적</span> <span style=\"font-family:Malgun Gothic\">감정이</span> <span style=\"font-family:Malgun Gothic\">길을</span> <span style=\"font-family:Malgun Gothic\">막으면</span> <span style=\"font-family:Malgun Gothic\">우리는</span> <span style=\"font-family:Malgun Gothic\">할</span> <span style=\"font-family:Malgun Gothic\">일을</span> <span style=\"font-family:Malgun Gothic\">미룬다</span>. <span style=\"font-family:Malgun Gothic\">그러면</span> <span style=\"font-family:Malgun Gothic\">더욱더</span> <span style=\"font-family:Malgun Gothic\">기분이</span> <span style=\"font-family:Malgun Gothic\">나빠지고</span>, <span style=\"font-family:Malgun Gothic\">그러면</span> <span style=\"font-family:Malgun Gothic\">더욱더</span> <span style=\"font-family:Malgun Gothic\">미루게</span> <span style=\"font-family:Malgun Gothic\">된다</span>. <span style=\"font-family:Malgun Gothic\">나쁜</span> <span style=\"font-family:Malgun Gothic\">기분과</span> <span style=\"font-family:Malgun Gothic\">정체</span> <span style=\"font-family:Malgun Gothic\">상태가</span> <span style=\"font-family:Malgun Gothic\">물고</span> <span style=\"font-family:Malgun Gothic\">물리는</span> <span style=\"font-family:Malgun Gothic\">악순환이다</span>.</p>\r\n\t\t\t<br />\r\n\t\t\t<div style=\"display:inline-block;width:360px;height:480px;background:#2d333b;border-radius:4px;margin:2px;vertical-align:top;opacity:0.4\"></div>\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"> </p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:16pt;font-weight:bold\">5. NICE</span><span style=\"font-family:Malgun Gothic;font-size:16pt;font-weight:bold\">한 목표</span><span style=\"font-size:16pt;font-weight:bold\">: </span><span style=\"font-family:Malgun Gothic;font-size:16pt;font-weight:bold\">단기</span><span style=\"font-size:16pt;font-weight:bold\">, </span><span style=\"font-family:Malgun Gothic;font-size:16pt;font-weight:bold\">투입 기반</span></p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">매우 구체적인 최종 목표를 달성하는 데 집착하면 가치관을 유지하는 것처럼 다른 중요한 요소를 잊을 수 있다</span>. </p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">하지만 더 큰 문제는 그런 목표가 우리의 의욕에 미치는 영향이다</span>. <span style=\"font-family:Malgun Gothic\">목표 달성에만 매달리면 일에서 오는 내적 즐거움을 놓친다</span>. </p>\r\n\t\t\t<br />\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">하버드</span>, <span style=\"font-family:Malgun Gothic\">노스웨스턴</span>, <span style=\"font-family:Malgun Gothic\">펜실베이니아</span>, <span style=\"font-family:Malgun Gothic\">애리조나</span> <span style=\"font-family:Malgun Gothic\">대학교</span> <span style=\"font-family:Malgun Gothic\">연구자들이</span> 2009<span style=\"font-family:Malgun Gothic\">년에</span> <span style=\"font-family:Malgun Gothic\">《목표의</span> <span style=\"font-family:Malgun Gothic\">배신</span>: <span style=\"font-family:Malgun Gothic\">과처방</span> <span style=\"font-family:Malgun Gothic\">목표</span> <span style=\"font-family:Malgun Gothic\">설정이</span> <span style=\"font-family:Malgun Gothic\">조직에</span> <span style=\"font-family:Malgun Gothic\">미치는</span> <span style=\"font-family:Malgun Gothic\">부작용</span> Goals gone wild: the systematic side effects of overprescribing goal setting<span style=\"font-family:Malgun Gothic\">》이라는</span> <span style=\"font-family:Malgun Gothic\">논문을</span> <span style=\"font-family:Malgun Gothic\">공동으로</span> <span style=\"font-family:Malgun Gothic\">발표했다</span>. <span style=\"font-family:Malgun Gothic\">그들은</span> <span style=\"font-family:Malgun Gothic\">목표</span> <span style=\"font-family:Malgun Gothic\">설정을</span> “<span style=\"font-family:Malgun Gothic\">의욕</span> <span style=\"font-family:Malgun Gothic\">향상을</span> <span style=\"font-family:Malgun Gothic\">위한</span> <span style=\"font-family:Malgun Gothic\">무해한</span> <span style=\"font-family:Malgun Gothic\">일반</span> <span style=\"font-family:Malgun Gothic\">의약품</span>”<span style=\"font-family:Malgun Gothic\">으로</span> <span style=\"font-family:Malgun Gothic\">오인해서는</span> <span style=\"font-family:Malgun Gothic\">안</span> <span style=\"font-family:Malgun Gothic\">되는</span> “<span style=\"font-family:Malgun Gothic\">처방전이</span> <span style=\"font-family:Malgun Gothic\">요구되는</span> <span style=\"font-family:Malgun Gothic\">전문</span> <span style=\"font-family:Malgun Gothic\">의약품</span>”<span style=\"font-family:Malgun Gothic\">이라며</span> <span style=\"font-family:Malgun Gothic\">중독성</span> <span style=\"font-family:Malgun Gothic\">있고</span> <span style=\"font-family:Malgun Gothic\">유해한</span> <span style=\"font-family:Malgun Gothic\">행위로</span> <span style=\"font-family:Malgun Gothic\">규정했다</span>.</p>\r\n\t\t\t<br />\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">그렇다고</span> <span style=\"font-family:Malgun Gothic\">목표</span> <span style=\"font-family:Malgun Gothic\">설정이</span> <span style=\"font-family:Malgun Gothic\">무조건</span> <span style=\"font-family:Malgun Gothic\">나쁘다거나</span> <span style=\"font-family:Malgun Gothic\">스마트</span> <span style=\"font-family:Malgun Gothic\">유의</span> <span style=\"font-family:Malgun Gothic\">목표가</span> <span style=\"font-family:Malgun Gothic\">쓸데없다는</span> <span style=\"font-family:Malgun Gothic\">말은</span> <span style=\"font-family:Malgun Gothic\">아니다</span>. <span style=\"font-family:Malgun Gothic\">사람이나</span> <span style=\"font-family:Malgun Gothic\">일의</span> <span style=\"font-family:Malgun Gothic\">성격에</span> <span style=\"font-family:Malgun Gothic\">따라서는</span> <span style=\"font-family:Malgun Gothic\">분명히</span> <span style=\"font-family:Malgun Gothic\">의욕을</span> <span style=\"font-family:Malgun Gothic\">고취하는</span> <span style=\"font-family:Malgun Gothic\">효과가</span> <span style=\"font-family:Malgun Gothic\">있다</span>. <span style=\"font-family:Malgun Gothic\">하지만</span> <span style=\"font-family:Malgun Gothic\">나쁜</span> <span style=\"font-family:Malgun Gothic\">부작용도</span> <span style=\"font-family:Malgun Gothic\">존재한다</span>. <span style=\"font-family:Malgun Gothic\">만일</span> <span style=\"font-family:Malgun Gothic\">미루는</span> <span style=\"font-family:Malgun Gothic\">습관</span> <span style=\"font-family:Malgun Gothic\">때문에</span> <span style=\"font-family:Malgun Gothic\">고민인</span> <span style=\"font-family:Malgun Gothic\">사람이라면</span> <span style=\"font-family:Malgun Gothic\">다른</span> <span style=\"font-family:Malgun Gothic\">방법이</span> <span style=\"font-family:Malgun Gothic\">더</span> <span style=\"font-family:Malgun Gothic\">나을</span> <span style=\"font-family:Malgun Gothic\">수</span> <span style=\"font-family:Malgun Gothic\">있다</span>.</p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">내가</span> <span style=\"font-family:Malgun Gothic\">선호하는</span> <span style=\"font-family:Malgun Gothic\">방법은</span> <span style=\"font-family:Malgun Gothic\">외적</span> <span style=\"font-family:Malgun Gothic\">결과나</span> <span style=\"font-family:Malgun Gothic\">목표점을</span> <span style=\"font-family:Malgun Gothic\">고집하지</span> <span style=\"font-family:Malgun Gothic\">않고</span> <span style=\"font-family:Malgun Gothic\">기분</span> <span style=\"font-family:Malgun Gothic\">좋은</span> <span style=\"font-family:Malgun Gothic\">여정을</span> <span style=\"font-family:Malgun Gothic\">강조한다</span>. <span style=\"font-family:Malgun Gothic\">그</span> <span style=\"font-family:Malgun Gothic\">토대는</span> <span style=\"font-family:Malgun Gothic\">내가</span> <span style=\"font-family:Malgun Gothic\">규정한</span> <span style=\"font-family:Malgun Gothic\">나이스</span>(NICE)<span style=\"font-family:Malgun Gothic\">한</span> <span style=\"font-family:Malgun Gothic\">목표다</span>.</p>\r\n\t\t\t<ul>\r\n\t\t\t\t<li style=\"font-family:Calibri\"><span lang=\"en-US\"><span style=\"font-family:Malgun Gothic;font-weight:bold\">단기</span><span style=\"font-weight:bold\"> (Near-term):</span> <span style=\"font-family:Malgun Gothic\">단기</span> <span style=\"font-family:Malgun Gothic\">목표를</span> <span style=\"font-family:Malgun Gothic\">세우면</span> <span style=\"font-family:Malgun Gothic\">우리의</span> <span style=\"font-family:Malgun Gothic\">여정에서</span> <span style=\"font-family:Malgun Gothic\">당장</span> <span style=\"font-family:Malgun Gothic\">필요한</span> <span style=\"font-family:Malgun Gothic\">단계에</span> <span style=\"font-family:Malgun Gothic\">집중하게</span> <span style=\"font-family:Malgun Gothic\">된다</span>. <span style=\"font-family:Malgun Gothic\">그러면</span> <span style=\"font-family:Malgun Gothic\">큰</span> <span style=\"font-family:Malgun Gothic\">그림</span> <span style=\"font-family:Malgun Gothic\">때문에</span> <span style=\"font-family:Malgun Gothic\">느끼는</span> <span style=\"font-family:Malgun Gothic\">중압감이</span> <span style=\"font-family:Malgun Gothic\">덜해진다</span>. <span style=\"font-family:Malgun Gothic\">내가</span> <span style=\"font-family:Malgun Gothic\">볼</span> <span style=\"font-family:Malgun Gothic\">때는</span> <span style=\"font-family:Malgun Gothic\">일간</span> <span style=\"font-family:Malgun Gothic\">목표나</span> <span style=\"font-family:Malgun Gothic\">주간</span> <span style=\"font-family:Malgun Gothic\">목표가</span> <span style=\"font-family:Malgun Gothic\">가장</span> <span style=\"font-family:Malgun Gothic\">효과적이다</span>.</span></li>\r\n\t\t\t\t<li style=\"font-family:Calibri\"><span lang=\"en-US\"><span style=\"font-family:Malgun Gothic;font-weight:bold\">투입</span><span style=\"font-weight:bold\"> </span><span style=\"font-family:Malgun Gothic;font-weight:bold\">기반</span><span style=\"font-weight:bold\"> (Input-based):</span> <span style=\"font-family:Malgun Gothic\">투입</span> <span style=\"font-family:Malgun Gothic\">기반</span> <span style=\"font-family:Malgun Gothic\">목표는</span> <span style=\"font-family:Malgun Gothic\">멀고</span> <span style=\"font-family:Malgun Gothic\">추상적인</span> <span style=\"font-family:Malgun Gothic\">최종</span> <span style=\"font-family:Malgun Gothic\">목표가</span> <span style=\"font-family:Malgun Gothic\">아니라</span> <span style=\"font-family:Malgun Gothic\">과정을</span> <span style=\"font-family:Malgun Gothic\">강조한다</span>. <span style=\"font-family:Malgun Gothic\">산출</span> <span style=\"font-family:Malgun Gothic\">기반</span> <span style=\"font-family:Malgun Gothic\">목표는</span> ‘<span style=\"font-family:Malgun Gothic\">연말까지</span> 5<span style=\"font-family:Malgun Gothic\">킬로그램</span> <span style=\"font-family:Malgun Gothic\">감량</span>’, ‘<span style=\"font-family:Malgun Gothic\">베스트셀러</span> <span style=\"font-family:Malgun Gothic\">출간</span>’ <span style=\"font-family:Malgun Gothic\">같은</span> <span style=\"font-family:Malgun Gothic\">최종</span> <span style=\"font-family:Malgun Gothic\">결과를</span> <span style=\"font-family:Malgun Gothic\">지향하지만</span> <span style=\"font-family:Malgun Gothic\">투입</span> <span style=\"font-family:Malgun Gothic\">기반</span> <span style=\"font-family:Malgun Gothic\">목표는</span> ‘<span style=\"font-family:Malgun Gothic\">매일</span> 10<span style=\"font-family:Malgun Gothic\">분씩</span> <span style=\"font-family:Malgun Gothic\">걷기</span>’, ‘<span style=\"font-family:Malgun Gothic\">매일</span> <span style=\"font-family:Malgun Gothic\">아침</span> <span style=\"font-family:Malgun Gothic\">소설</span> 100<span style=\"font-family:Malgun Gothic\">단어</span> <span style=\"font-family:Malgun Gothic\">쓰기</span>’...</span></li>\r\n\t\t\t</ul>\r\n\t\t\t<div style=\"display:inline-block;width:360px;height:480px;background:#2d333b;border-radius:4px;margin:2px;vertical-align:top;opacity:0.4\"></div>\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:16pt;font-weight:bold\">6. NICE</span><span style=\"font-family:Malgun Gothic;font-size:16pt;font-weight:bold\">한 목표</span><span style=\"font-size:16pt;font-weight:bold\">: </span><span style=\"font-family:Malgun Gothic;font-size:16pt;font-weight:bold\">통제 가능</span><span style=\"font-size:16pt;font-weight:bold\">, </span><span style=\"font-family:Malgun Gothic;font-size:16pt;font-weight:bold\">창작자</span></p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic;font-weight:bold\">나이스한 목표</span>: <span style=\"font-family:Malgun Gothic\">단기</span>/ <span style=\"font-family:Malgun Gothic\">투입 기반</span>/ <span style=\"font-family:Malgun Gothic\">통제 가능</span>/ <span style=\"font-family:Malgun Gothic\">창작자</span></p>\r\n\t\t\t<br />\r\n\t\t\t<ul>\r\n\t\t\t\t<li style=\"font-family:Calibri\"><span lang=\"en-US\"><span style=\"font-family:Malgun Gothic;font-weight:bold\">통제</span><span style=\"font-weight:bold\"> </span><span style=\"font-family:Malgun Gothic;font-weight:bold\">가능</span><span style=\"font-weight:bold\"> (Controllable):</span> <span style=\"font-family:Malgun Gothic\">우리는</span> <span style=\"font-family:Malgun Gothic\">자신의</span> <span style=\"font-family:Malgun Gothic\">통제</span> <span style=\"font-family:Malgun Gothic\">아래에</span> <span style=\"font-family:Malgun Gothic\">있는</span> <span style=\"font-family:Malgun Gothic\">목표에</span> <span style=\"font-family:Malgun Gothic\">집중하기를</span> <span style=\"font-family:Malgun Gothic\">원한다</span>. ‘<span style=\"font-family:Malgun Gothic\">매일</span> <span style=\"font-family:Malgun Gothic\">여덟</span> <span style=\"font-family:Malgun Gothic\">시간씩</span> <span style=\"font-family:Malgun Gothic\">소설</span> <span style=\"font-family:Malgun Gothic\">쓰기</span>’<span style=\"font-family:Malgun Gothic\">는</span> <span style=\"font-family:Malgun Gothic\">불가능할</span> <span style=\"font-family:Malgun Gothic\">확률이</span> <span style=\"font-family:Malgun Gothic\">높다</span>. <span style=\"font-family:Malgun Gothic\">여러</span> <span style=\"font-family:Malgun Gothic\">외적</span> <span style=\"font-family:Malgun Gothic\">요인</span> <span style=\"font-family:Malgun Gothic\">때문에</span> <span style=\"font-family:Malgun Gothic\">그</span> <span style=\"font-family:Malgun Gothic\">정도</span> <span style=\"font-family:Malgun Gothic\">노력을</span> <span style=\"font-family:Malgun Gothic\">투입하기가</span> <span style=\"font-family:Malgun Gothic\">어렵기</span> <span style=\"font-family:Malgun Gothic\">때문이다</span>. <span style=\"font-family:Malgun Gothic\">더</span> <span style=\"font-family:Malgun Gothic\">통제</span> <span style=\"font-family:Malgun Gothic\">가능한</span> <span style=\"font-family:Malgun Gothic\">목표</span>(<span style=\"font-family:Malgun Gothic\">예를</span> <span style=\"font-family:Malgun Gothic\">들면</span> <span style=\"font-family:Malgun Gothic\">매일</span> 20<span style=\"font-family:Malgun Gothic\">분씩</span> <span style=\"font-family:Malgun Gothic\">쓰기</span>)<span style=\"font-family:Malgun Gothic\">를</span> <span style=\"font-family:Malgun Gothic\">설정하는</span> <span style=\"font-family:Malgun Gothic\">편이</span> <span style=\"font-family:Malgun Gothic\">훨씬</span> <span style=\"font-family:Malgun Gothic\">더</span> <span style=\"font-family:Malgun Gothic\">현실적이다</span>.</span></li>\r\n\t\t\t\t<li style=\"font-family:Calibri\"><span lang=\"en-US\"><span style=\"font-family:Malgun Gothic;font-weight:bold\">에너지</span><span style=\"font-weight:bold\"> (Energising):</span> <span style=\"font-family:Malgun Gothic\">우리가</span> <span style=\"font-family:Malgun Gothic\">귀찮고</span> <span style=\"font-family:Malgun Gothic\">번거로운</span> <span style=\"font-family:Malgun Gothic\">일을</span> <span style=\"font-family:Malgun Gothic\">포함해</span> <span style=\"font-family:Malgun Gothic\">어떤</span> <span style=\"font-family:Malgun Gothic\">일을</span> <span style=\"font-family:Malgun Gothic\">수행할</span> <span style=\"font-family:Malgun Gothic\">때</span> <span style=\"font-family:Malgun Gothic\">더</span> <span style=\"font-family:Malgun Gothic\">큰</span> <span style=\"font-family:Malgun Gothic\">에너지를</span> <span style=\"font-family:Malgun Gothic\">발휘하기</span> <span style=\"font-family:Malgun Gothic\">위한</span> <span style=\"font-family:Malgun Gothic\">원칙과</span> <span style=\"font-family:Malgun Gothic\">전략을</span> <span style=\"font-family:Malgun Gothic\">이미</span> <span style=\"font-family:Malgun Gothic\">많이</span> <span style=\"font-family:Malgun Gothic\">알아봤다</span>. <span style=\"font-family:Malgun Gothic\">당신이</span> <span style=\"font-family:Malgun Gothic\">설정하는</span> <span style=\"font-family:Malgun Gothic\">목표에</span> <span style=\"font-family:Malgun Gothic\">놀이</span>, <span style=\"font-family:Malgun Gothic\">힘</span>, <span style=\"font-family:Malgun Gothic\">사람을</span> <span style=\"font-family:Malgun Gothic\">결부할</span> <span style=\"font-family:Malgun Gothic\">방법이</span> <span style=\"font-family:Malgun Gothic\">있을까</span>?</span></li>\r\n\t\t\t</ul>\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">필요하면</span> <span style=\"font-family:Malgun Gothic\">장기</span> <span style=\"font-family:Malgun Gothic\">목표는</span> <span style=\"font-family:Malgun Gothic\">스마트한</span> <span style=\"font-family:Malgun Gothic\">목표로</span>, <span style=\"font-family:Malgun Gothic\">지금</span> <span style=\"font-family:Malgun Gothic\">당장</span> <span style=\"font-family:Malgun Gothic\">필요한</span> <span style=\"font-family:Malgun Gothic\">목표는</span> <span style=\"font-family:Malgun Gothic\">나이스한</span> <span style=\"font-family:Malgun Gothic\">목표로</span> <span style=\"font-family:Malgun Gothic\">세워도</span> <span style=\"font-family:Malgun Gothic\">좋다</span>. <span style=\"font-family:Malgun Gothic\">몇</span> <span style=\"font-family:Malgun Gothic\">가지</span> <span style=\"font-family:Malgun Gothic\">예를</span> <span style=\"font-family:Malgun Gothic\">들면</span> 128<span style=\"font-family:Malgun Gothic\">쪽</span> <span style=\"font-family:Malgun Gothic\">표와</span> <span style=\"font-family:Malgun Gothic\">같다</span>. <span style=\"font-family:Malgun Gothic\">그리고</span> <span style=\"font-family:Malgun Gothic\">그</span> <span style=\"font-family:Malgun Gothic\">결과는</span> <span style=\"font-family:Malgun Gothic\">에너지와</span> <span style=\"font-family:Malgun Gothic\">기분</span> <span style=\"font-family:Malgun Gothic\">좋은</span> <span style=\"font-family:Malgun Gothic\">생산성을</span> <span style=\"font-family:Malgun Gothic\">증진하는</span> <span style=\"font-family:Malgun Gothic\">목표</span>, <span style=\"font-family:Malgun Gothic\">하지만</span> <span style=\"font-family:Malgun Gothic\">혹시</span> <span style=\"font-family:Malgun Gothic\">달성하지</span> <span style=\"font-family:Malgun Gothic\">못하더라도</span> <span style=\"font-family:Malgun Gothic\">인생을</span> <span style=\"font-family:Malgun Gothic\">망치진</span> <span style=\"font-family:Malgun Gothic\">않는</span> <span style=\"font-family:Malgun Gothic\">목표다</span>.</p>\r\n\t\t\t<br />\r\n\t\t\t<div style=\"display:inline-block;width:360px;height:480px;background:#2d333b;border-radius:4px;margin:2px;vertical-align:top;opacity:0.4\"></div>\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:16pt;font-weight:bold\">7. </span><span style=\"font-family:Malgun Gothic;font-size:16pt;font-weight:bold\">스마트한 목표</span><span style=\"font-size:16pt;font-weight:bold\"> vs </span><span style=\"font-family:Malgun Gothic;font-size:16pt;font-weight:bold\">나이스한 목표</span></p>\r\n\t\t\t<br />\r\n\t\t\t<table style=\"border:0px\">\r\n\t\t\t\t<tr>\r\n\t\t\t\t\t<td style=\"border:0px\"><br />\r\n\t\t\t\t\t</td>\r\n\t\t\t\t\t<td style=\"border:0px;font-family:Calibri\"><span lang=\"en-US\"><span style=\"font-family:Malgun Gothic\">스마트한</span> <span style=\"font-family:Malgun Gothic\">목표</span></span></td>\r\n\t\t\t\t\t<td style=\"border:0px;font-family:Calibri\"><span lang=\"en-US\"><span style=\"font-family:Malgun Gothic\">나이스한</span> <span style=\"font-family:Malgun Gothic\">목표</span></span></td>\r\n\t\t\t\t</tr>\r\n\t\t\t\t<tr>\r\n\t\t\t\t\t<td style=\"border:0px;font-family:Calibri\"><span style=\"font-family:Malgun Gothic;font-weight:bold\">건강</span></td>\r\n\t\t\t\t\t<td style=\"border:0px;font-family:Calibri\"><span lang=\"en-US\">3<span style=\"font-family:Malgun Gothic\">개월간</span> 10<span style=\"font-family:Malgun Gothic\">킬로그램을</span> <span style=\"font-family:Malgun Gothic\">감량한다</span>.</span></td>\r\n\t\t\t\t\t<td style=\"border:0px;font-family:Calibri\"><span lang=\"en-US\"><span style=\"font-family:Malgun Gothic\">매일</span> 30<span style=\"font-family:Malgun Gothic\">분씩</span> <span style=\"font-family:Malgun Gothic\">너무</span> <span style=\"font-family:Malgun Gothic\">어렵지</span> <span style=\"font-family:Malgun Gothic\">않고</span> <span style=\"font-family:Malgun Gothic\">재미있는</span> <span style=\"font-family:Malgun Gothic\">운동을</span> <span style=\"font-family:Malgun Gothic\">한다</span>.</span></td>\r\n\t\t\t\t</tr>\r\n\t\t\t\t<tr>\r\n\t\t\t\t\t<td style=\"border:0px;font-family:Calibri\"><span style=\"font-family:Malgun Gothic;font-weight:bold\">직업</span></td>\r\n\t\t\t\t\t<td style=\"border:0px;font-family:Calibri\"><span lang=\"en-US\">2<span style=\"font-family:Malgun Gothic\">년</span> <span style=\"font-family:Malgun Gothic\">내에</span> <span style=\"font-family:Malgun Gothic\">임원으로</span> <span style=\"font-family:Malgun Gothic\">승진한다</span>.</span></td>\r\n\t\t\t\t\t<td style=\"border:0px;font-family:Calibri\"><span lang=\"en-US\"><span style=\"font-family:Malgun Gothic\">매주</span> <span style=\"font-family:Malgun Gothic\">한</span> <span style=\"font-family:Malgun Gothic\">시간씩</span> <span style=\"font-family:Malgun Gothic\">투자해</span> <span style=\"font-family:Malgun Gothic\">중요한</span> <span style=\"font-family:Malgun Gothic\">능력을</span> <span style=\"font-family:Malgun Gothic\">계발하거나</span> <span style=\"font-family:Malgun Gothic\">업계</span> <span style=\"font-family:Malgun Gothic\">인맥을</span> <span style=\"font-family:Malgun Gothic\">다진다</span>.</span></td>\r\n\t\t\t\t</tr>\r\n\t\t\t\t<tr>\r\n\t\t\t\t\t<td style=\"border:0px;font-family:Calibri\"><span style=\"font-family:Malgun Gothic;font-weight:bold\">교육</span></td>\r\n\t\t\t\t\t<td style=\"border:0px;font-family:Calibri\"><span lang=\"en-US\">2<span style=\"font-family:Malgun Gothic\">년</span> <span style=\"font-family:Malgun Gothic\">내에</span> <span style=\"font-family:Malgun Gothic\">석사</span> <span style=\"font-family:Malgun Gothic\">학위를</span> <span style=\"font-family:Malgun Gothic\">취득한다</span>.</span></td>\r\n\t\t\t\t\t<td style=\"border:0px;font-family:Calibri\"><span lang=\"en-US\"><span style=\"font-family:Malgun Gothic\">매일</span> 30<span style=\"font-family:Malgun Gothic\">분씩</span> <span style=\"font-family:Malgun Gothic\">적당한</span> <span style=\"font-family:Malgun Gothic\">분량으로</span> <span style=\"font-family:Malgun Gothic\">교재를</span> <span style=\"font-family:Malgun Gothic\">복습하고</span> <span style=\"font-family:Malgun Gothic\">과제를</span> <span style=\"font-family:Malgun Gothic\">수행한다</span>.</span></td>\r\n\t\t\t\t</tr>\r\n\t\t\t</table>\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic;font-weight:bold\">ㅇ 실험</span><span style=\"font-weight:bold\"> 4: </span><span style=\"font-family:Malgun Gothic;font-weight:bold\">수정 구슬 기법</span></p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">나이스한</span> <span style=\"font-family:Malgun Gothic\">목표가</span> <span style=\"font-family:Malgun Gothic\">있으면</span> <span style=\"font-family:Malgun Gothic\">구체적으로</span> <span style=\"font-family:Malgun Gothic\">무엇을</span> <span style=\"font-family:Malgun Gothic\">해야</span> <span style=\"font-family:Malgun Gothic\">하는지</span> <span style=\"font-family:Malgun Gothic\">더</span> <span style=\"font-family:Malgun Gothic\">명확히</span> <span style=\"font-family:Malgun Gothic\">알</span> <span style=\"font-family:Malgun Gothic\">수</span> <span style=\"font-family:Malgun Gothic\">있다</span>. <span style=\"font-family:Malgun Gothic\">그러면</span> <span style=\"font-family:Malgun Gothic\">시작하기가</span> <span style=\"font-family:Malgun Gothic\">한결</span> <span style=\"font-family:Malgun Gothic\">수월해진다</span>. <span style=\"font-family:Malgun Gothic\">그러나</span> <span style=\"font-family:Malgun Gothic\">여정을</span> <span style=\"font-family:Malgun Gothic\">시작하기</span> <span style=\"font-family:Malgun Gothic\">전에</span> <span style=\"font-family:Malgun Gothic\">미리</span> <span style=\"font-family:Malgun Gothic\">문제를</span> <span style=\"font-family:Malgun Gothic\">좀</span> <span style=\"font-family:Malgun Gothic\">해결해두면</span> <span style=\"font-family:Malgun Gothic\">좋다</span>.</p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">지금부터</span> <span style=\"font-family:Malgun Gothic\">일주일</span> <span style=\"font-family:Malgun Gothic\">후의</span> <span style=\"font-family:Malgun Gothic\">당신을</span> <span style=\"font-family:Malgun Gothic\">상상해보자</span>. <span style=\"font-family:Malgun Gothic\">당신은</span> <span style=\"font-family:Malgun Gothic\">무엇을</span> <span style=\"font-family:Malgun Gothic\">하고</span> <span style=\"font-family:Malgun Gothic\">싶고</span> <span style=\"font-family:Malgun Gothic\">왜</span> <span style=\"font-family:Malgun Gothic\">해야</span> <span style=\"font-family:Malgun Gothic\">하는지를</span> <span style=\"font-family:Malgun Gothic\">명확히</span> <span style=\"font-family:Malgun Gothic\">파악했다</span>. <span style=\"font-family:Malgun Gothic\">그런데</span> <span style=\"font-family:Malgun Gothic\">그렇게</span> <span style=\"font-family:Malgun Gothic\">모든</span> <span style=\"font-family:Malgun Gothic\">준비를</span> <span style=\"font-family:Malgun Gothic\">마치고도</span> <span style=\"font-family:Malgun Gothic\">여태</span> <span style=\"font-family:Malgun Gothic\">시작하지</span> <span style=\"font-family:Malgun Gothic\">못했다</span>. <span style=\"font-family:Malgun Gothic\">뭐가</span> <span style=\"font-family:Malgun Gothic\">잘못됐을까</span>?</p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">나는</span> <span style=\"font-family:Malgun Gothic\">이것을</span> ‘<span style=\"font-family:Malgun Gothic\">수정</span> <span style=\"font-family:Malgun Gothic\">구슬</span> <span style=\"font-family:Malgun Gothic\">기법</span>’<span style=\"font-family:Malgun Gothic\">이라고</span> <span style=\"font-family:Malgun Gothic\">부르지만</span> ‘<span style=\"font-family:Malgun Gothic\">사전</span> <span style=\"font-family:Malgun Gothic\">부검</span>(pre-mortem)’<span style=\"font-family:Malgun Gothic\">이라고</span> <span style=\"font-family:Malgun Gothic\">하는</span> <span style=\"font-family:Malgun Gothic\">사람들도</span> <span style=\"font-family:Malgun Gothic\">있다</span>. <span style=\"font-family:Malgun Gothic\">이를</span> <span style=\"font-family:Malgun Gothic\">통해</span> <span style=\"font-family:Malgun Gothic\">계획이</span> <span style=\"font-family:Malgun Gothic\">엇나가기</span> <span style=\"font-family:Malgun Gothic\">전에</span> <span style=\"font-family:Malgun Gothic\">큰</span> <span style=\"font-family:Malgun Gothic\">장애물을</span> <span style=\"font-family:Malgun Gothic\">확인할</span> <span style=\"font-family:Malgun Gothic\">수</span> <span style=\"font-family:Malgun Gothic\">있다</span>. <span style=\"font-family:Malgun Gothic\">방법은</span> <span style=\"font-family:Malgun Gothic\">간단하다</span>.</p>\r\n\t\t\t<br />\r\n\t\t\t<div style=\"display:inline-block;width:360px;height:480px;background:#2d333b;border-radius:4px;margin:2px;vertical-align:top;opacity:0.4\"></div>\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:16pt;font-weight:bold\">8. </span><span style=\"font-family:Malgun Gothic;font-size:16pt;font-weight:bold\">두려움과 용기</span></p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\">○ <span style=\"font-family:Malgun Gothic\">당신이</span> <span style=\"font-family:Malgun Gothic\">앞으로</span> <span style=\"font-family:Malgun Gothic\">나아가지</span> <span style=\"font-family:Malgun Gothic\">못하는</span> <span style=\"font-family:Malgun Gothic\">이유는</span> <span style=\"font-family:Malgun Gothic\">재능이나</span> <span style=\"font-family:Malgun Gothic\">영감이</span> <span style=\"font-family:Malgun Gothic\">부족해서가</span> <span style=\"font-family:Malgun Gothic\">아니다</span>. <span style=\"font-family:Malgun Gothic\">주범은</span> <span style=\"font-family:Malgun Gothic\">두려움이다</span>.</p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">두려움도</span> <span style=\"font-family:Malgun Gothic\">생산성을</span> <span style=\"font-family:Malgun Gothic\">저해하는</span> <span style=\"font-family:Malgun Gothic\">부정적</span> <span style=\"font-family:Malgun Gothic\">감정이다</span>. <span style=\"font-family:Malgun Gothic\">두려움은</span> <span style=\"font-family:Malgun Gothic\">기분</span> <span style=\"font-family:Malgun Gothic\">좋은</span> <span style=\"font-family:Malgun Gothic\">호르몬을</span> <span style=\"font-family:Malgun Gothic\">차단하고</span> <span style=\"font-family:Malgun Gothic\">판단력과</span> <span style=\"font-family:Malgun Gothic\">문제</span> <span style=\"font-family:Malgun Gothic\">해결력을</span> <span style=\"font-family:Malgun Gothic\">흐려지게</span> <span style=\"font-family:Malgun Gothic\">한다</span>. <span style=\"font-family:Malgun Gothic\">두려움이</span> <span style=\"font-family:Malgun Gothic\">생기면</span> <span style=\"font-family:Malgun Gothic\">미루는</span> <span style=\"font-family:Malgun Gothic\">게</span> <span style=\"font-family:Malgun Gothic\">당연하다</span>.</p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">그렇다면</span> <span style=\"font-family:Malgun Gothic\">해결책은</span>? <span style=\"font-family:Malgun Gothic\">용기를</span> <span style=\"font-family:Malgun Gothic\">찾는</span> <span style=\"font-family:Malgun Gothic\">것이다</span>. <span style=\"font-family:Malgun Gothic\">두려움을</span> <span style=\"font-family:Malgun Gothic\">직시하고</span>, <span style=\"font-family:Malgun Gothic\">인정하고</span>, <span style=\"font-family:Malgun Gothic\">지나가야</span> <span style=\"font-family:Malgun Gothic\">한다</span>.</p>\r\n\t\t\t<br />\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">오해하지</span> <span style=\"font-family:Malgun Gothic\">말기</span> <span style=\"font-family:Malgun Gothic\">바란다</span>. <span style=\"font-family:Malgun Gothic\">이</span> <span style=\"font-family:Malgun Gothic\">장의</span> <span style=\"font-family:Malgun Gothic\">목적은</span> <span style=\"font-family:Malgun Gothic\">당신의</span> <span style=\"font-family:Malgun Gothic\">불안과</span> <span style=\"font-family:Malgun Gothic\">자기</span> <span style=\"font-family:Malgun Gothic\">의심을</span> <span style=\"font-family:Malgun Gothic\">감쪽같이</span> ‘<span style=\"font-family:Malgun Gothic\">치료</span>’<span style=\"font-family:Malgun Gothic\">하거나</span> ‘<span style=\"font-family:Malgun Gothic\">박멸</span>’<span style=\"font-family:Malgun Gothic\">하는</span> <span style=\"font-family:Malgun Gothic\">게</span> <span style=\"font-family:Malgun Gothic\">아니다</span>. <span style=\"font-family:Malgun Gothic\">앨릭스</span> <span style=\"font-family:Malgun Gothic\">호널드</span> <span style=\"font-family:Malgun Gothic\">같은</span> <span style=\"font-family:Malgun Gothic\">사람이</span> <span style=\"font-family:Malgun Gothic\">아닌</span> <span style=\"font-family:Malgun Gothic\">이상</span> <span style=\"font-family:Malgun Gothic\">두려움을</span> <span style=\"font-family:Malgun Gothic\">완전히</span> <span style=\"font-family:Malgun Gothic\">없애긴</span> <span style=\"font-family:Malgun Gothic\">어렵다</span>. <span style=\"font-family:Malgun Gothic\">하지만</span> <span style=\"font-family:Malgun Gothic\">용기를</span> <span style=\"font-family:Malgun Gothic\">길러</span> <span style=\"font-family:Malgun Gothic\">내면의</span> <span style=\"font-family:Malgun Gothic\">두려움을</span> <span style=\"font-family:Malgun Gothic\">직시하고</span> <span style=\"font-family:Malgun Gothic\">이해한다면</span> <span style=\"font-family:Malgun Gothic\">평생을</span> <span style=\"font-family:Malgun Gothic\">미루며</span> <span style=\"font-family:Malgun Gothic\">살게</span> <span style=\"font-family:Malgun Gothic\">만들지도</span> <span style=\"font-family:Malgun Gothic\">모르는</span> <span style=\"font-family:Malgun Gothic\">정서적</span> <span style=\"font-family:Malgun Gothic\">장벽을</span> <span style=\"font-family:Malgun Gothic\">넘어설</span> <span style=\"font-family:Malgun Gothic\">수</span> <span style=\"font-family:Malgun Gothic\">있다</span>. <span style=\"font-family:Malgun Gothic\">두려움이</span> <span style=\"font-family:Malgun Gothic\">우리의</span> <span style=\"font-family:Malgun Gothic\">능력에</span> <span style=\"font-family:Malgun Gothic\">자물쇠를</span> <span style=\"font-family:Malgun Gothic\">채울</span> <span style=\"font-family:Malgun Gothic\">때</span> <span style=\"font-family:Malgun Gothic\">그</span> <span style=\"font-family:Malgun Gothic\">열쇠를</span> <span style=\"font-family:Malgun Gothic\">쥔</span> <span style=\"font-family:Malgun Gothic\">것은</span> <span style=\"font-family:Malgun Gothic\">용기다</span>.</p>\r\n\t\t\t<br />\r\n\t\t\t<div style=\"display:inline-block;width:360px;height:480px;background:#2d333b;border-radius:4px;margin:2px;vertical-align:top;opacity:0.4\"></div>\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:16pt;font-weight:bold\">9. 10/10/10 </span><span style=\"font-family:Malgun Gothic;font-size:16pt;font-weight:bold\">법칙</span></p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">이게</span> 10<span style=\"font-family:Malgun Gothic\">분 후에도 중요할까</span>? / <span style=\"font-family:Malgun Gothic\">이게</span> 10<span style=\"font-family:Malgun Gothic\">주 후에도 중요할까</span>? / <span style=\"font-family:Malgun Gothic\">이게</span> 10<span style=\"font-family:Malgun Gothic\">년 후에도 중요할까</span>?</p>\r\n\t\t\t<br />\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\">10/10/10 <span style=\"font-family:Malgun Gothic\">법칙을 쓰면 자신이 스트레스를 받는 문제의 진짜 중요도를 알 수 있다</span>. </p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">보통은</span> <span style=\"font-family:Malgun Gothic\">지금</span> <span style=\"font-family:Malgun Gothic\">걱정하는</span> <span style=\"font-family:Malgun Gothic\">실패가</span> <span style=\"font-family:Malgun Gothic\">평생</span> <span style=\"font-family:Malgun Gothic\">자신을</span> <span style=\"font-family:Malgun Gothic\">규정하진</span> <span style=\"font-family:Malgun Gothic\">않을</span> <span style=\"font-family:Malgun Gothic\">것이고</span>, <span style=\"font-family:Malgun Gothic\">지금</span> <span style=\"font-family:Malgun Gothic\">느끼는</span> <span style=\"font-family:Malgun Gothic\">두려움이</span> <span style=\"font-family:Malgun Gothic\">평생</span> <span style=\"font-family:Malgun Gothic\">그렇게</span> <span style=\"font-family:Malgun Gothic\">중요하진</span> <span style=\"font-family:Malgun Gothic\">않을</span> <span style=\"font-family:Malgun Gothic\">것임을</span> <span style=\"font-family:Malgun Gothic\">알게</span> <span style=\"font-family:Malgun Gothic\">된다</span>.</p>\r\n\t\t\t<br />\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic;font-weight:bold\">실험</span><span style=\"font-weight:bold\"> 4: </span><span style=\"font-family:Malgun Gothic;font-weight:bold\">자신감</span><span style=\"font-weight:bold\"> </span><span style=\"font-family:Malgun Gothic;font-weight:bold\">방정식</span></p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">물론</span> <span style=\"font-family:Malgun Gothic\">모든</span> <span style=\"font-family:Malgun Gothic\">두려움이</span> “<span style=\"font-family:Malgun Gothic\">이제</span> <span style=\"font-family:Malgun Gothic\">내</span> <span style=\"font-family:Malgun Gothic\">인생은</span> <span style=\"font-family:Malgun Gothic\">완전히</span> <span style=\"font-family:Malgun Gothic\">망했어</span>”<span style=\"font-family:Malgun Gothic\">처럼</span> <span style=\"font-family:Malgun Gothic\">극단적인</span> <span style=\"font-family:Malgun Gothic\">형태를</span> <span style=\"font-family:Malgun Gothic\">띠진</span> <span style=\"font-family:Malgun Gothic\">않는다</span>. <span style=\"font-family:Malgun Gothic\">은근히</span> <span style=\"font-family:Malgun Gothic\">성가신</span> <span style=\"font-family:Malgun Gothic\">자기</span> <span style=\"font-family:Malgun Gothic\">의심의</span> <span style=\"font-family:Malgun Gothic\">형태로</span> <span style=\"font-famil
