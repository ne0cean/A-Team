y:Malgun Gothic\">목표</span> <span style=\"font-family:Malgun Gothic\">달성을</span> <span style=\"font-family:Malgun Gothic\">방해하는</span> <span style=\"font-family:Malgun Gothic\">두려움도</span> <span style=\"font-family:Malgun Gothic\">존재한다</span>. <span style=\"font-family:Malgun Gothic\">내가</span> <span style=\"font-family:Malgun Gothic\">아직</span> <span style=\"font-family:Malgun Gothic\">부족한</span> <span style=\"font-family:Malgun Gothic\">것</span> <span style=\"font-family:Malgun Gothic\">같다는</span> <span style=\"font-family:Malgun Gothic\">두려움이다</span>.</p>\r\n\t\t\t<br />\r\n\t\t\t<div style=\"display:inline-block;width:360px;height:480px;background:#2d333b;border-radius:4px;margin:2px;vertical-align:top;opacity:0.4\"></div>\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:16pt;font-weight:bold\">10. </span><span style=\"font-family:Malgun Gothic;font-size:16pt;font-weight:bold\">르브론 제임스와 휴식</span></p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">평균적으로는</span> NBA<span style=\"font-family:Malgun Gothic\">에서 가장 느린 선수에 속한다는 것이다</span>. 2017~2018 <span style=\"font-family:Malgun Gothic\">시즌에 르브론은 경기 중 평균 속도가 시속</span> 6.2<span style=\"font-family:Malgun Gothic\">킬로미터</span>(<span style=\"font-family:Malgun Gothic\">보행 속도와 비슷한 수준</span>)<span style=\"font-family:Malgun Gothic\">를 기록하며 경기당 출장 시간이</span> 20<span style=\"font-family:Malgun Gothic\">분 이상인 선수 중에서 하위</span> 10<span style=\"font-family:Malgun Gothic\">위권에 들었다</span>. 2017~2018 <span style=\"font-family:Malgun Gothic\">정규 시즌에 출장 시간 중 걸은 시간이</span> 74.4<span style=\"font-family:Malgun Gothic\">퍼센트로 사실상 리그 전체를 통틀어 필적할 사람이 없다시피 했다</span>.</p>\r\n\t\t\t<br />\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">나는</span> <span style=\"font-family:Malgun Gothic\">뜻밖에도</span> <span style=\"font-family:Malgun Gothic\">르브론</span> <span style=\"font-family:Malgun Gothic\">제임스에게서</span> <span style=\"font-family:Malgun Gothic\">피로감을</span> <span style=\"font-family:Malgun Gothic\">극복할</span> <span style=\"font-family:Malgun Gothic\">방법의</span> <span style=\"font-family:Malgun Gothic\">첫</span> <span style=\"font-family:Malgun Gothic\">번째</span> <span style=\"font-family:Malgun Gothic\">힌트를</span> <span style=\"font-family:Malgun Gothic\">얻었다</span>. <span style=\"font-family:Malgun Gothic\">내가</span> <span style=\"font-family:Malgun Gothic\">깨달은</span> <span style=\"font-family:Malgun Gothic\">대로</span>, <span style=\"font-family:Malgun Gothic\">과부하</span> <span style=\"font-family:Malgun Gothic\">번아웃의</span> <span style=\"font-family:Malgun Gothic\">원인은</span> <span style=\"font-family:Malgun Gothic\">너무</span> <span style=\"font-family:Malgun Gothic\">많은</span> <span style=\"font-family:Malgun Gothic\">일을</span> <span style=\"font-family:Malgun Gothic\">너무</span> <span style=\"font-family:Malgun Gothic\">빨리</span> <span style=\"font-family:Malgun Gothic\">할</span> <span style=\"font-family:Malgun Gothic\">때</span> <span style=\"font-family:Malgun Gothic\">생기는</span> <span style=\"font-family:Malgun Gothic\">부정적</span> <span style=\"font-family:Malgun Gothic\">감정이다</span>. <span style=\"font-family:Malgun Gothic\">우리는</span> <span style=\"font-family:Malgun Gothic\">감당할</span> <span style=\"font-family:Malgun Gothic\">수</span> <span style=\"font-family:Malgun Gothic\">있는</span> <span style=\"font-family:Malgun Gothic\">것</span> <span style=\"font-family:Malgun Gothic\">이상으로</span> <span style=\"font-family:Malgun Gothic\">일을</span> <span style=\"font-family:Malgun Gothic\">받고</span>, <span style=\"font-family:Malgun Gothic\">일하는</span> <span style=\"font-family:Malgun Gothic\">동안</span> <span style=\"font-family:Malgun Gothic\">필요한</span> <span style=\"font-family:Malgun Gothic\">만큼</span> <span style=\"font-family:Malgun Gothic\">휴식을</span> <span style=\"font-family:Malgun Gothic\">취하지</span> <span style=\"font-family:Malgun Gothic\">않는다</span>. <span style=\"font-family:Malgun Gothic\">그렇게</span> <span style=\"font-family:Malgun Gothic\">항상</span> <span style=\"font-family:Malgun Gothic\">달린다</span>.</p>\r\n\t\t\t<br />\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\">○ <span style=\"font-family:Malgun Gothic\">더</span> <span style=\"font-family:Malgun Gothic\">적게</span> <span style=\"font-family:Malgun Gothic\">하면</span> <span style=\"font-family:Malgun Gothic\">더</span> <span style=\"font-family:Malgun Gothic\">많은</span> <span style=\"font-family:Malgun Gothic\">것을</span> <span style=\"font-family:Malgun Gothic\">해낼</span> <span style=\"font-family:Malgun Gothic\">수</span> <span style=\"font-family:Malgun Gothic\">있다</span>.</p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">그렇다면 해결책은 무엇일까</span>? <span style=\"font-family:Malgun Gothic\">르브론을 본받으면 된다</span>. <span style=\"font-family:Malgun Gothic\">에너지를 아끼자</span>. <span style=\"font-family:Malgun Gothic\">더 적게 하면 더 많은 것을 해낼 수 있다</span>. <span style=\"font-family:Malgun Gothic;font-weight:bold\">일을 줄여라</span></p>\r\n\t\t\t<br />\r\n\t\t\t<div style=\"display:inline-block;width:360px;height:480px;background:#2d333b;border-radius:4px;margin:2px;vertical-align:top;opacity:0.4\"></div>\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:16pt;font-weight:bold\">11. </span><span style=\"font-family:Malgun Gothic;font-size:16pt;font-weight:bold\">오디세이 계획</span></p>\r\n\t\t\t<ul>\r\n\t\t\t\t<li style=\"font-family:Calibri\"><span lang=\"en-US\"><span style=\"font-family:Malgun Gothic;font-weight:bold\">현재</span><span style=\"font-weight:bold\"> </span><span style=\"font-family:Malgun Gothic;font-weight:bold\">경로</span><span style=\"font-weight:bold\">:</span> <span style=\"font-family:Malgun Gothic\">계속</span> <span style=\"font-family:Malgun Gothic\">현재</span> <span style=\"font-family:Malgun Gothic\">경로로</span> <span style=\"font-family:Malgun Gothic\">간다면</span> 5<span style=\"font-family:Malgun Gothic\">년</span> <span style=\"font-family:Malgun Gothic\">후에</span> <span style=\"font-family:Malgun Gothic\">어떤</span> <span style=\"font-family:Malgun Gothic\">인생을</span> <span style=\"font-family:Malgun Gothic\">살고</span> <span style=\"font-family:Malgun Gothic\">있을지</span> <span style=\"font-family:Malgun Gothic\">상세히</span> <span style=\"font-family:Malgun Gothic\">적자</span>.</span></li>\r\n\t\t\t\t<li style=\"font-family:Calibri\"><span lang=\"en-US\"><span style=\"font-family:Malgun Gothic;font-weight:bold\">대안</span><span style=\"font-weight:bold\"> </span><span style=\"font-family:Malgun Gothic;font-weight:bold\">경로</span><span style=\"font-weight:bold\">:</span> <span style=\"font-family:Malgun Gothic\">완전히</span> <span style=\"font-family:Malgun Gothic\">다른</span> <span style=\"font-family:Malgun Gothic\">경로로</span> <span style=\"font-family:Malgun Gothic\">간다면</span> 5<span style=\"font-family:Malgun Gothic\">년</span> <span style=\"font-family:Malgun Gothic\">후에</span> <span style=\"font-family:Malgun Gothic\">어떤</span> <span style=\"font-family:Malgun Gothic\">인생을</span> <span style=\"font-family:Malgun Gothic\">살고</span> <span style=\"font-family:Malgun Gothic\">있을지</span> <span style=\"font-family:Malgun Gothic\">상세히</span> <span style=\"font-family:Malgun Gothic\">적자</span>.</span></li>\r\n\t\t\t\t<li style=\"font-family:Calibri\"><span lang=\"en-US\"><span style=\"font-family:Malgun Gothic;font-weight:bold\">비약</span><span style=\"font-weight:bold\"> </span><span style=\"font-family:Malgun Gothic;font-weight:bold\">경로</span><span style=\"font-weight:bold\">:</span> <span style=\"font-family:Malgun Gothic\">완전히</span> <span style=\"font-family:Malgun Gothic\">다를</span> <span style=\"font-family:Malgun Gothic\">뿐만</span> <span style=\"font-family:Malgun Gothic\">아니라</span> <span style=\"font-family:Malgun Gothic\">돈</span>, <span style=\"font-family:Malgun Gothic\">사회적</span> <span style=\"font-family:Malgun Gothic\">의무</span>, <span style=\"font-family:Malgun Gothic\">타인의</span> <span style=\"font-family:Malgun Gothic\">생각이</span> <span style=\"font-family:Malgun Gothic\">중요시되지</span> <span style=\"font-family:Malgun Gothic\">않는</span> <span style=\"font-family:Malgun Gothic\">경로로</span> <span style=\"font-family:Malgun Gothic\">간다면</span> 5<span style=\"font-family:Malgun Gothic\">년</span> <span style=\"font-family:Malgun Gothic\">후</span> <span style=\"font-family:Malgun Gothic\">어떤</span> <span style=\"font-family:Malgun Gothic\">인생을</span> <span style=\"font-family:Malgun Gothic\">살고</span> <span style=\"font-family:Malgun Gothic\">있을지</span> <span style=\"font-family:Malgun Gothic\">상세히</span> <span style=\"font-family:Malgun Gothic\">적자</span>.</span></li>\r\n\t\t\t</ul>\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">오디세이</span> <span style=\"font-family:Malgun Gothic\">계획의</span> <span style=\"font-family:Malgun Gothic\">취지는</span> <span style=\"font-family:Malgun Gothic\">이</span> <span style=\"font-family:Malgun Gothic\">세</span> <span style=\"font-family:Malgun Gothic\">가지</span> <span style=\"font-family:Malgun Gothic\">미래</span> <span style=\"font-family:Malgun Gothic\">중</span> <span style=\"font-family:Malgun Gothic\">하나를</span> ‘<span style=\"font-family:Malgun Gothic\">구체적</span> <span style=\"font-family:Malgun Gothic\">계획</span>’<span style=\"font-family:Malgun Gothic\">으로</span> <span style=\"font-family:Malgun Gothic\">삼는</span> <span style=\"font-family:Malgun Gothic\">게</span> <span style=\"font-family:Malgun Gothic\">아니다</span>(<span style=\"font-family:Malgun Gothic\">애초에</span> <span style=\"font-family:Malgun Gothic\">인생을</span> <span style=\"font-family:Malgun Gothic\">계획할</span> <span style=\"font-family:Malgun Gothic\">때</span> <span style=\"font-family:Malgun Gothic\">구체성은</span> <span style=\"font-family:Malgun Gothic\">낄</span> <span style=\"font-family:Malgun Gothic\">자리가</span> <span style=\"font-family:Malgun Gothic\">없다</span>). <span style=\"font-family:Malgun Gothic\">단지</span> <span style=\"font-family:Malgun Gothic\">그처럼</span> <span style=\"font-family:Malgun Gothic\">가능성</span> <span style=\"font-family:Malgun Gothic\">있는</span> <span style=\"font-family:Malgun Gothic\">미래들에</span> <span style=\"font-family:Malgun Gothic\">눈을</span> <span style=\"font-family:Malgun Gothic\">뜨자는</span> <span style=\"font-family:Malgun Gothic\">것이다</span>.</p>\r\n\t\t\t<br />\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">어떤</span> <span style=\"font-family:Malgun Gothic\">사람에게는</span> <span style=\"font-family:Malgun Gothic\">첫</span> <span style=\"font-family:Malgun Gothic\">번째</span> <span style=\"font-family:Malgun Gothic\">경로가</span> <span style=\"font-family:Malgun Gothic\">진정으로</span>, <span style=\"font-family:Malgun Gothic\">진심으로</span> <span style=\"font-family:Malgun Gothic\">가고</span> <span style=\"font-family:Malgun Gothic\">싶은</span> <span style=\"font-family:Malgun Gothic\">길일</span> <span style=\"font-family:Malgun Gothic\">것이다</span>. <span style=\"font-family:Malgun Gothic\">만일</span> <span style=\"font-family:Malgun Gothic\">그렇다면</span> <span style=\"font-family:Malgun Gothic\">축하한다</span>. <span style=\"font-family:Malgun Gothic\">이미</span> <span style=\"font-family:Malgun Gothic\">미래의</span> <span style=\"font-family:Malgun Gothic\">자신과</span> <span style=\"font-family:Malgun Gothic\">일치된</span> <span style=\"font-family:Malgun Gothic\">삶을</span> <span style=\"font-family:Malgun Gothic\">살고</span> <span style=\"font-family:Malgun Gothic\">있다</span>. <span style=\"font-family:Malgun Gothic\">하지만</span> <span style=\"font-family:Malgun Gothic\">많은</span> <span style=\"font-family:Malgun Gothic\">사람이</span> <span style=\"font-family:Malgun Gothic\">이</span> <span style=\"font-family:Malgun Gothic\">기법을</span> <span style=\"font-family:Malgun Gothic\">통해</span> <span style=\"font-family:Malgun Gothic\">지금</span> <span style=\"font-family:Malgun Gothic\">가고</span> <span style=\"font-family:Malgun Gothic\">있는</span> <span style=\"font-family:Malgun Gothic\">경로가</span> <span style=\"font-family:Malgun Gothic\">자신이</span> <span style=\"font-family:Malgun Gothic\">진짜로</span> <span style=\"font-family:Malgun Gothic\">원하는</span> <span style=\"font-family:Malgun Gothic\">경로가</span> <span style=\"font-family:Malgun Gothic\">아님을</span> <span style=\"font-family:Malgun Gothic\">깨달을</span> <span style=\"font-family:Malgun Gothic\">것이다</span>.</p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">내 경우에는 오디세이 계획을 작성하면서 내가 살고 있던 인생</span>, <span style=\"font-family:Malgun Gothic\">그러니까 풀타임 의사의 인생이 더는 신나지 않는다는 사실을 깨달았다</span>. </p>\r\n\t\t\t<br />\r\n\t\t\t<div style=\"display:inline-block;width:360px;height:480px;background:#2d333b;border-radius:4px;margin:2px;vertical-align:top;opacity:0.4\"></div>\r\n\t\t\t<br />\r\n\t\t\t<div style=\"display:inline-block;width:360px;height:480px;background:#2d333b;border-radius:4px;margin:2px;vertical-align:top;opacity:0.4\"></div>\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:16pt;font-weight:bold\">12. </span><span style=\"font-family:Malgun Gothic;font-size:16pt;font-weight:bold\">근시적 목표의 힘</span></p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">(첫 번째 집단에게는) 매번 수학 문제집 여섯 쪽 푸는 것을 목표로 하라는 지시를 받았다</span>. <span style=\"font-family:Malgun Gothic\">두 번째 집단에게는 그냥 총</span> 7<span style=\"font-family:Malgun Gothic\">회에 걸쳐 문제집 마흔두 쪽 푸는 것을 목표로 하라고 지시했다</span>.</p>\r\n\t\t\t<br />\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">물론</span> <span style=\"font-family:Malgun Gothic\">말만</span> <span style=\"font-family:Malgun Gothic\">다를</span> <span style=\"font-family:Malgun Gothic\">뿐</span> <span style=\"font-family:Malgun Gothic\">두</span> <span style=\"font-family:Malgun Gothic\">집단의</span> <span style=\"font-family:Malgun Gothic\">목표는</span> <span style=\"font-family:Malgun Gothic\">사실상</span> <span style=\"font-family:Malgun Gothic\">동일했다</span>. <span style=\"font-family:Malgun Gothic\">두</span> <span style=\"font-family:Malgun Gothic\">집단</span> <span style=\"font-family:Malgun Gothic\">모두</span> <span style=\"font-family:Malgun Gothic\">총</span> <span style=\"font-family:Malgun Gothic\">마흔두</span> <span style=\"font-family:Malgun Gothic\">쪽을</span> <span style=\"font-family:Malgun Gothic\">풀어야</span> <span style=\"font-family:Malgun Gothic\">했다</span>. <span style=\"font-family:Malgun Gothic\">하지만</span> <span style=\"font-family:Malgun Gothic\">먼</span> <span style=\"font-family:Malgun Gothic\">목표에</span> <span style=\"font-family:Malgun Gothic\">집중했을</span> <span style=\"font-family:Malgun Gothic\">때와</span> <span style=\"font-family:Malgun Gothic\">가까운</span> <span style=\"font-family:Malgun Gothic\">목표에</span> <span style=\"font-family:Malgun Gothic\">집중했을</span> <span style=\"font-family:Malgun Gothic\">때의</span> <span style=\"font-family:Malgun Gothic\">결과가</span> <span style=\"font-family:Malgun Gothic\">놀랍게</span> <span style=\"font-family:Malgun Gothic\">차이</span> <span style=\"font-family:Malgun Gothic\">났다</span>. ‘<span style=\"font-family:Malgun Gothic\">근시적</span>’ <span style=\"font-family:Malgun Gothic\">목표를</span> <span style=\"font-family:Malgun Gothic\">설정한</span> <span style=\"font-family:Malgun Gothic\">아이들이</span> <span style=\"font-family:Malgun Gothic\">그냥</span> <span style=\"font-family:Malgun Gothic\">더</span> <span style=\"font-family:Malgun Gothic\">좋은</span> <span style=\"font-family:Malgun Gothic\">성적이</span> <span style=\"font-family:Malgun Gothic\">아니라</span> <span style=\"font-family:Malgun Gothic\">두</span> <span style=\"font-family:Malgun Gothic\">배</span> <span style=\"font-family:Malgun Gothic\">더</span> <span style=\"font-family:Malgun Gothic\">좋은</span> <span style=\"font-family:Malgun Gothic\">성적을</span> <span style=\"font-family:Malgun Gothic\">거뒀다</span>. <span style=\"font-family:Malgun Gothic\">그들은</span> <span style=\"font-family:Malgun Gothic\">정답률이</span> 80<span style=\"font-family:Malgun Gothic\">퍼센트였던</span> <span style=\"font-family:Malgun Gothic\">반면</span> <span style=\"font-family:Malgun Gothic\">다른</span> <span style=\"font-family:Malgun Gothic\">집단은</span> <span style=\"font-family:Malgun Gothic\">정답률이</span> 40<span style=\"font-family:Malgun Gothic\">퍼센트에</span> <span style=\"font-family:Malgun Gothic\">그쳤다</span>. <span style=\"font-family:Malgun Gothic\">더군다나</span> <span style=\"font-family:Malgun Gothic\">그들은</span> <span style=\"font-family:Malgun Gothic\">자신감도</span> <span style=\"font-family:Malgun Gothic\">더</span> <span style=\"font-family:Malgun Gothic\">강하게</span> <span style=\"font-family:Malgun Gothic\">느꼈다</span>. <span style=\"font-family:Malgun Gothic\">자신감은</span> <span style=\"font-family:Malgun Gothic\">좋은</span> <span style=\"font-family:Malgun Gothic\">기분을</span> <span style=\"font-family:Malgun Gothic\">만드는</span> <span style=\"font-family:Malgun Gothic\">가장</span> <span style=\"font-family:Malgun Gothic\">중요한</span> <span style=\"font-family:Malgun Gothic\">요인</span> <span style=\"font-family:Malgun Gothic\">중</span> <span style=\"font-family:Malgun Gothic\">하나다</span>. <span style=\"font-family:Malgun Gothic\">조직</span> <span style=\"font-family:Malgun Gothic\">심리학자</span> <span style=\"font-family:Malgun Gothic\">타샤</span> <span style=\"font-family:Malgun Gothic\">유리크</span>(Tasha Eurich)<span style=\"font-family:Malgun Gothic\">는</span> “<span style=\"font-family:Malgun Gothic\">근시적</span> <span style=\"font-family:Malgun Gothic\">목표가</span> <span style=\"font-family:Malgun Gothic\">이</span> <span style=\"font-family:Malgun Gothic\">아이들의</span> <span style=\"font-family:Malgun Gothic\">문제</span> <span style=\"font-family:Malgun Gothic\">해결을</span> <span style=\"font-family:Malgun Gothic\">도왔을</span> <span style=\"font-family:Malgun Gothic\">뿐</span> <span style=\"font-family:Malgun Gothic\">아니라</span> <span style=\"font-family:Malgun Gothic\">수학을</span> <span style=\"font-family:Malgun Gothic\">대하는</span> <span style=\"font-family:Malgun Gothic\">자세까지</span> <span style=\"font-family:Malgun Gothic\">바꿔놓았다</span>”<span style=\"font-family:Malgun Gothic\">라고</span> <span style=\"font-family:Malgun Gothic\">그</span> <span style=\"font-family:Malgun Gothic\">결과를</span> <span style=\"font-family:Malgun Gothic\">요약했다</span>.</p>\r\n\t\t\t<br />\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">이</span> <span style=\"font-family:Malgun Gothic\">현상이</span> <span style=\"font-family:Malgun Gothic\">가치관에</span> <span style=\"font-family:Malgun Gothic\">맞게</span> <span style=\"font-family:Malgun Gothic\">사는</span> <span style=\"font-family:Malgun Gothic\">것과</span> <span style=\"font-family:Malgun Gothic\">대체</span> <span style=\"font-family:Malgun Gothic\">무슨</span> <span style=\"font-family:Malgun Gothic\">관련이</span> <span style=\"font-family:Malgun Gothic\">있을까</span>? <span style=\"font-family:Malgun Gothic\">지금</span> <span style=\"font-family:Malgun Gothic\">우리가</span> <span style=\"font-family:Malgun Gothic\">있는</span> <span style=\"font-family:Malgun Gothic\">곳과</span> <span style=\"font-family:Malgun Gothic\">우리가</span> <span style=\"font-family:Malgun Gothic\">있고</span> <span style=\"font-family:Malgun Gothic\">싶은</span> <span style=\"font-family:Malgun Gothic\">곳의</span> <span style=\"font-family:Malgun Gothic\">간극을</span> <span style=\"font-family:Malgun Gothic\">좁히는</span> <span style=\"font-family:Malgun Gothic\">데</span> <span style=\"font-family:Malgun Gothic\">도움이</span> <span style=\"font-family:Malgun Gothic\">된다</span>.</p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\">12<span style=\"font-family:Malgun Gothic\">개월</span> <span style=\"font-family:Malgun Gothic\">축하하기가</span> <span style=\"font-family:Malgun Gothic\">조금</span> <span style=\"font-family:Malgun Gothic\">벅차게</span> <span style=\"font-family:Malgun Gothic\">느껴질</span> <span style=\"font-family:Malgun Gothic\">수</span> <span style=\"font-family:Malgun Gothic\">있다</span>. <span style=\"font-family:Malgun Gothic\">나는</span> 1<span style=\"font-family:Malgun Gothic\">년은커녕</span> <span style=\"font-family:Malgun Gothic\">단</span> <span style=\"font-family:Malgun Gothic\">하루도</span> <span style=\"font-family:Malgun Gothic\">가치관에</span> <span style=\"font-family:Malgun Gothic\">맞게</span> <span style=\"font-family:Malgun Gothic\">살기가</span> <span style=\"font-family:Malgun Gothic\">어렵게</span> <span style=\"font-family:Malgun Gothic\">느껴질</span> <span style=\"font-family:Malgun Gothic\">때가</span> <span style=\"font-family:Malgun Gothic\">많다</span>. <span style=\"font-family:Malgun Gothic\">그래서</span> <span style=\"font-family:Malgun Gothic\">이</span> <span style=\"font-family:Malgun Gothic\">어린이</span> <span style=\"font-family:Malgun Gothic\">수학자들을</span> <span style=\"font-family:Malgun Gothic\">본받아야</span> <span style=\"font-family:Malgun Gothic\">한다</span>. <span style=\"font-family:Malgun Gothic\">방법은</span> <span style=\"font-family:Malgun Gothic\">간단하다</span>. <span style=\"font-family:Malgun Gothic\">아침마다</span> 1<span style=\"font-family:Malgun Gothic\">년</span> <span style=\"font-family:Malgun Gothic\">후에</span> <span style=\"font-family:Malgun Gothic\">자신이</span> <span style=\"font-family:Malgun Gothic\">있고</span> <span style=\"font-family:Malgun Gothic\">싶은</span> <span style=\"font-family:Malgun Gothic\">곳에</span> <span style=\"font-family:Malgun Gothic\">오늘</span> <span style=\"font-family:Malgun Gothic\">딱</span> <span style=\"font-family:Malgun Gothic\">한</span> <span style=\"font-family:Malgun Gothic\">걸음</span> <span style=\"font-family:Malgun Gothic\">더</span> <span style=\"font-family:Malgun Gothic\">가까이</span> <span style=\"font-family:Malgun Gothic\">다가가게</span> <span style=\"font-family:Malgun Gothic\">해줄</span> <span style=\"font-family:Malgun Gothic\">행동을</span> <span style=\"font-family:Malgun Gothic\">세</span> <span style=\"font-family:Malgun Gothic\">가지만</span> <span style=\"font-family:Malgun Gothic\">정해서</span> <span style=\"font-family:Malgun Gothic\">하루</span> <span style=\"font-family:Malgun Gothic\">동안</span> <span style=\"font-family:Malgun Gothic\">실천하기로</span> <span style=\"font-family:Malgun Gothic\">하자</span>.</p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">나는</span> 12<span style=\"font-family:Malgun Gothic\">개월</span> <span style=\"font-family:Malgun Gothic\">축하하기</span> <span style=\"font-family:Malgun Gothic\">목록을</span> <span style=\"font-family:Malgun Gothic\">구글</span> <span style=\"font-family:Malgun Gothic\">문서로</span> <span style=\"font-family:Malgun Gothic\">저장하고</span> <span style=\"font-family:Malgun Gothic\">컴퓨터의</span> <span style=\"font-family:Malgun Gothic\">웹</span> <span style=\"font-family:Malgun Gothic\">브라우저에</span> <span style=\"font-family:Malgun Gothic\">즐겨찾기로</span> <span style=\"font-family:Malgun Gothic\">등록해놓았다</span>. <span style=\"font-family:Malgun Gothic\">그래서</span> <span style=\"font-family:Malgun Gothic\">일을</span> <span style=\"font-family:Malgun Gothic\">시작하려고</span> <span style=\"font-family:Malgun Gothic\">앉을</span> <span style=\"font-family:Malgun Gothic\">때마다</span> <span style=\"font-family:Malgun Gothic\">일단</span> <span style=\"font-family:Malgun Gothic\">그</span> <span style=\"font-family:Malgun Gothic\">구글</span> <span style=\"font-family:Malgun Gothic\">문서를</span> <span style=\"font-family:Malgun Gothic\">열고</span> 12<span style=\"font-family:Malgun Gothic\">개월</span> <span style=\"font-family:Malgun Gothic\">축하하기의</span> <span style=\"font-family:Malgun Gothic\">내용을</span> <span style=\"font-family:Malgun Gothic\">훑</span>...</p>\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t"

    "type": "image",
    "x": 87,
    "y": 4033,
    "w": 360,
    "h": 480,
    "src": "76ee9f8acf.png"
  },
  {
    "type": "image",
    "x": 87,
    "y": 4521,
    "w": 360,
    "h": 480,
    "src": "3077bcd84f.png"
  },
  {
    "type": "image",
    "x": 87,
    "y": 5009,
    "w": 360,
    "h": 480,
    "src": "e588478eca.png"
  },
  {
    "type": "image",
    "x": 87,
    "y": 5497,
    "w": 360,
    "h": 480,
    "src": "418aece124.png"
  },
  {
    "type": "image",
    "x": 87,
    "y": 5985,
    "w": 360,
    "h": 480,
    "src": "43aedde65d.png"
  }
];
const CONTENT_HASH = '1bcbf279';

let cards = [];
let moving = null, resizing = null;
let selectedIdx = null, clipboardCard = null;
const GRID = 20, GAP = 14;
function snap(v) { return Math.round(v / GRID) * GRID; }

// ── Undo (Ctrl+Z) ────────────────────────────────────────────────────────────
const MAX_HISTORY = 50;
let history = [];
function snapshot() {
  syncText();
  history.push(JSON.stringify(cards));
  if (history.length > MAX_HISTORY) history.shift();
}
function undo() {
  if (!history.length) { showStatus('되돌릴 내용 없음'); return; }
  syncText();
  cards = JSON.parse(history.pop());
  renderCards();
  saveBoard();
  showStatus('↩ 되돌림');
}
function showStatus(msg) {
  const s = document.getElementById('status');
  s.textContent = msg;
  clearTimeout(showStatus._t);
  showStatus._t = setTimeout(() => { s.textContent = ''; }, 2000);
}
document.addEventListener('keydown', e => {
  const isText = document.activeElement?.contentEditable === 'true';
  if ((e.ctrlKey || e.metaKey) && e.key === 'z' && !e.shiftKey) {
    if (isText) return;
    e.preventDefault();
    undo();
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'c' && !e.shiftKey && !isText) {
    if (selectedIdx !== null && cards[selectedIdx]) {
      syncText();
      clipboardCard = JSON.parse(JSON.stringify(cards[selectedIdx]));
      showStatus('카드 복사됨');
      e.preventDefault();
    }
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'v' && !e.shiftKey && !isText) {
    if (clipboardCard) {
      e.preventDefault();
      snapshot();
      const nc = JSON.parse(JSON.stringify(clipboardCard));
      nc.x = (nc.x || 0) + 30; nc.y = (nc.y || 0) + 30;
      cards.push(nc);
      selectedIdx = cards.length - 1;
      renderCards(); saveBoard();
      showStatus('카드 붙여넣음');
    }
  }
  if (e.key === 'Escape') {
    document.querySelectorAll('.card.selected').forEach(c => c.classList.remove('selected'));
    selectedIdx = null;
  }
});

function pushCards(movedIdx) {
  const moved = cards[movedIdx];
  const movedEl = document.querySelector(`.card[data-idx="${movedIdx}"]`);
  if (!movedEl) return;
  const mh = movedEl.offsetHeight;
  document.querySelectorAll('.card').forEach(el => {
    const i = +el.dataset.idx;
    if (i === movedIdx) return;
    const c = cards[i], oh = el.offsetHeight;
    if (moved.x < (c.x+(c.w||200)) && (moved.x+(moved.w||200)) > c.x && moved.y < (c.y+oh) && (moved.y+mh) > c.y) {
      c.y = moved.y + mh + GAP;
      el.style.top = c.y + 'px';
    }
  });
}

function loadBoard() {
  const saved = localStorage.getItem(SAVE_KEY);
  const savedHash = localStorage.getItem(SAVE_KEY + ':hash');
  let parsed = null;
  try { parsed = saved ? JSON.parse(saved) : null; } catch(e) {}
  // reset if: no save, empty array, or content hash changed (page regenerated)
  if (!parsed || parsed.length === 0 || savedHash !== CONTENT_HASH) {
    cards = DEFAULT_CARDS.map(c => ({...c}));
    localStorage.removeItem(SAVE_KEY);
    localStorage.setItem(SAVE_KEY + ':hash', CONTENT_HASH);
    renderCards();
    const hasCoords = cards.some(c => c.x !== undefined && c.y !== undefined);
    if (!hasCoords) autoLayout();
    return;
  }
  cards = parsed;
  renderCards();
}
function resetToDefaults() { if (!confirm('저장된 보드를 지우고 원본으로 초기화합니다. 계속할까요?')) return; localStorage.removeItem(SAVE_KEY); cards = DEFAULT_CARDS.map(c => ({...c})); renderCards(); autoLayout(); }

function autoLayout() {
  const boardW = document.getElementById('board').offsetWidth;
  const cols = Math.max(1, Math.floor(boardW / 280));
  const colW = (boardW - GAP*(cols-1)) / cols;
  const colH = new Array(cols).fill(0);
  const allCards = document.querySelectorAll('.card');
  const images = document.querySelectorAll('.card img');
  let loaded = 0;
  function place() {
    allCards.forEach((el, i) => {
      const w = Math.min(cards[i].w || colW, colW);
      let minCol = 0;
      for (let c = 1; c < cols; c++) if (colH[c] < colH[minCol]) minCol = c;
      cards[i].x = minCol * (colW + GAP);
      cards[i].y = colH[minCol];
      cards[i].w = w;
      el.style.left = cards[i].x + 'px';
      el.style.top = cards[i].y + 'px';
      el.style.width = w + 'px';
      colH[minCol] = cards[i].y + el.offsetHeight + GAP;
    });
    document.getElementById('board').style.minHeight = (Math.max(...colH) + 100) + 'px';
    saveBoard();
  }
  if (!images.length) { requestAnimationFrame(place); return; }
  images.forEach(img => {
    if (img.complete) { loaded++; if (loaded >= images.length) requestAnimationFrame(place); }
    else { img.onload = img.onerror = () => { loaded++; if (loaded >= images.length) requestAnimationFrame(place); }; }
  });
}

function syncText() {
  document.querySelectorAll('.card').forEach(el => {
    const i = +el.dataset.idx;
    if (cards[i]?.type === 'text') { const t = el.querySelector('.text'); if (t) cards[i].content = t.innerHTML; }
  });
}
function saveBoard() { syncText(); localStorage.setItem(SAVE_KEY, JSON.stringify(cards)); localStorage.setItem(SAVE_KEY + ':hash', CONTENT_HASH); showStatus('저장됨 ' + new Date().toLocaleTimeString()); }

function renderCards() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  cards.forEach((card, i) => {
    const el = document.createElement('div');
    el.className = 'card'; el.dataset.idx = i;
    if (card.x !== undefined) el.style.left = card.x + 'px';
    if (card.y !== undefined) el.style.top = card.y + 'px';
    // html cards contain raw OneNote table HTML which may overflow the stated div width
    if (card.w) { if (card.type === 'html') el.style.minWidth = card.w + 'px'; else el.style.width = card.w + 'px'; }
    el.addEventListener('mousedown', e => {
      if (e.target.closest('.text, a, .card-btn, .resize-handle, td, th')) return;
      e.preventDefault();
      // Update selection
      document.querySelectorAll('.card.selected').forEach(c => c.classList.remove('selected'));
      selectedIdx = i; el.classList.add('selected');
      snapshot();
      moving = { idx: i, startX: e.clientX, startY: e.clientY, origX: card.x||0, origY: card.y||0 };
      el.classList.add('moving');
    });
    const actions = document.createElement('div'); actions.className = 'card-actions';
    const delBtn = document.createElement('button'); delBtn.className = 'card-btn'; delBtn.textContent = '×';
    delBtn.onclick = e => { e.stopPropagation(); if(confirm('삭제?')) { snapshot(); cards.splice(i,1); renderCards(); saveBoard(); } };
    actions.appendChild(delBtn); el.appendChild(actions);
    if (card.type === 'text') {
      const text = document.createElement('div'); text.className = 'text'; text.contentEditable = true;
      text.innerHTML = card.content || '';
      text.addEventListener('focus', () => { snapshot(); });
      text.addEventListener('blur', () => { card.content = text.innerHTML; saveBoard(); });
      el.appendChild(text);
    } else if (card.type === 'image') {
      const img = document.createElement('img');
      img.src = card.src.startsWith('http') || card.src.startsWith('data:') ? card.src : IMG_BASE + card.src;
      img.alt = ''; img.loading = 'lazy'; img.onerror = () => img.style.display = 'none';
      if (card.w) img.style.width = card.w + 'px';
      if (card.h) img.style.height = card.h + 'px';
      if (card.link) { const a = document.createElement('a'); a.href = card.link; a.target = '_blank'; a.appendChild(img); el.appendChild(a); }
      else { el.appendChild(img); }
      if (card.caption) { const cap = document.createElement('div'); cap.style.cssText = 'font-size:11px;color:#8b949e;margin-top:4px;word-break:break-word;padding:0 2px;'; cap.textContent = card.caption; el.appendChild(cap); }
    } else if (card.type === 'html') {
      const wrapper = document.createElement('div');
      wrapper.style.cssText = 'overflow:auto;font-size:13px;line-height:1.5;';
      wrapper.innerHTML = card.html.replace(/__ATTACHMENT__/g, IMG_BASE);
      wrapper.querySelectorAll('img').forEach(img => { img.style.maxWidth = '100%'; img.style.height = 'auto'; img.draggable = false; });
      wrapper.querySelectorAll('a').forEach(a => { a.target = '_blank'; a.style.color = '#6cb0f6'; });
      wrapper.querySelectorAll('table').forEach(t => { t.style.borderCollapse = 'collapse'; });
      wrapper.querySelectorAll('td,th').forEach(td => {
        td.style.border = '1px solid #444'; td.style.padding = '4px 6px'; td.style.verticalAlign = 'top';
        td.title = '더블클릭으로 편집';
        td.addEventListener('dblclick', function(e) {
          e.stopPropagation();
          snapshot();
          this.contentEditable = 'true';
          this.style.outline = '2px solid #388bfd';
          this.style.background = 'rgba(56,139,253,0.08)';
          this.focus();
        });
        td.addEventListener('blur', function() {
          this.contentEditable = 'false';
          this.style.outline = '';
          this.style.background = '';
          cards[i].html = wrapper.innerHTML.split(IMG_BASE).join('__ATTACHMENT__');
          saveBoard();
        });
      });
      el.appendChild(wrapper);
    } else if (card.type === 'table') {
      const rows = card.rows || [['','',''],['','',''],['','','']];
      const tbl = document.createElement('table');
      tbl.style.cssText = 'border-collapse:collapse;width:100%;font-size:13px;';
      rows.forEach((row, ri) => {
        const tr = tbl.insertRow();
        row.forEach((cell, ci) => {
          const td = document.createElement(ri === 0 ? 'th' : 'td');
          td.contentEditable = true;
          td.style.cssText = 'border:1px solid #30363d;padding:4px 8px;min-width:60px;text-align:left;' + (ri===0 ? 'background:#21262d;font-weight:600;' : '');
          td.textContent = cell;
          td.addEventListener('blur', () => { if (!cards[i].rows) cards[i].rows = rows; rows[ri][ci] = td.textContent; saveBoard(); });
          tr.appendChild(td);
        });
      });
      el.appendChild(tbl);
      const addRow = document.createElement('button');
      addRow.textContent = '+ 행'; addRow.style.cssText = 'margin-top:4px;font-size:11px;background:#21262d;border:1px solid #30363d;color:#8b949e;padding:2px 8px;border-radius:4px;cursor:pointer;';
      addRow.onclick = e => { e.stopPropagation(); snapshot(); if (!cards[i].rows) cards[i].rows = rows; cards[i].rows.push(new Array(cards[i].rows[0].length).fill('')); renderCards(); saveBoard(); };
      const addCol = document.createElement('button');
      addCol.textContent = '+ 열'; addCol.style.cssText = 'margin-top:4px;margin-left:4px;font-size:11px;background:#21262d;border:1px solid #30363d;color:#8b949e;padding:2px 8px;border-radius:4px;cursor:pointer;';
      addCol.onclick = e => { e.stopPropagation(); snapshot(); if (!cards[i].rows) cards[i].rows = rows; cards[i].rows.forEach(r => r.push('')); renderCards(); saveBoard(); };
      el.appendChild(addRow); el.appendChild(addCol);
    }
    const rh = document.createElement('div'); rh.className = 'resize-handle';
    rh.addEventListener('mousedown', e => { e.preventDefault(); e.stopPropagation(); snapshot(); resizing = { idx: i, startX: e.clientX, startW: card.w || el.offsetWidth }; });
    el.appendChild(rh);
    if (i === selectedIdx) el.classList.add('selected');
    board.appendChild(el);
  });
  requestAnimationFrame(() => {
    let maxB = 0;
    document.querySelectorAll('.card').forEach(el => { const b = (parseFloat(el.style.top)||0) + el.offsetHeight; if (b > maxB) maxB = b; });
    board.style.minHeight = (maxB + 100) + 'px';
  });
}

document.addEventListener('mousemove', e => {
  if (moving) {
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`); if (!el) return;
    let nx = moving.origX + e.clientX - moving.startX, ny = moving.origY + e.clientY - moving.startY;
    if (e.shiftKey) { nx = snap(nx); ny = snap(ny); el.style.outline = '1px dashed rgba(240,192,64,0.3)'; } else { el.style.outline = ''; }
    el.style.left = nx + 'px'; el.style.top = ny + 'px';
  }
  if (resizing) {
    let nw = resizing.startW + e.clientX - resizing.startX; if (e.shiftKey) nw = snap(nw);
    cards[resizing.idx].w = Math.max(100, nw);
    const el = document.querySelector(`.card[data-idx="${resizing.idx}"]`); if (el) el.style.width = cards[resizing.idx].w + 'px';
  }
});

document.addEventListener('mouseup', e => {
  if (moving) {
    let nx = moving.origX + e.clientX - moving.startX, ny = moving.origY + e.clientY - moving.startY;
    if (e.shiftKey) { nx = snap(nx); ny = snap(ny); }
    cards[moving.idx].x = Math.max(0, nx); cards[moving.idx].y = Math.max(0, ny);
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`); if (el) { el.classList.remove('moving'); el.style.outline = ''; }
    if (e.shiftKey) pushCards(moving.idx);
    moving = null; saveBoard();
  }
  if (resizing) { if (e.shiftKey) pushCards(resizing.idx); resizing = null; saveBoard(); }
});

function addTextCard() { snapshot(); cards.push({ type: 'text', content: '', x: 50, y: window.scrollY+100, w: 300 }); renderCards(); setTimeout(() => { const els = document.querySelectorAll('.card .text'); els[els.length-1]?.focus(); }, 100); }
function addImageCard() { const input = document.createElement('input'); input.type = 'file'; input.accept = 'image/*'; input.onchange = e => { const f = e.target.files[0]; if (!f) return; const r = new FileReader(); r.onload = () => { snapshot(); cards.push({ type: 'image', src: r.result, x: 50, y: window.scrollY+100, w: 240 }); renderCards(); saveBoard(); }; r.readAsDataURL(f); }; input.click(); }
function addImageUrl() { const url = prompt('이미지 URL'); if (!url) return; snapshot(); cards.push({ type: 'image', src: url, x: 50, y: window.scrollY+100, w: 240 }); renderCards(); saveBoard(); }
function addTableCard() {
  const colsStr = prompt('열 수 (기본 3)', '3'); const cols = Math.max(1, parseInt(colsStr)||3);
  const rowsStr = prompt('행 수 (헤더 포함, 기본 4)', '4'); const rows = Math.max(1, parseInt(rowsStr)||4);
  snapshot();
  cards.push({ type: 'table', rows: Array.from({length: rows}, (_, ri) => Array.from({length: cols}, (_, ci) => ri===0 ? `열${ci+1}` : '')), x: 50, y: window.scrollY+100, w: Math.max(240, cols*100) });
  renderCards(); saveBoard();
}
function exportBoard() { syncText(); const blob = new Blob([JSON.stringify(cards, null, 2)], { type: 'application/json' }); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = SAVE_KEY + '.json'; a.click(); }
// ── Zoom ─────────────────────────────────────────────────────────────────────
let zoom = parseFloat(localStorage.getItem('zoom-' + SAVE_KEY) || '1.0');
function applyZoom() {
  const board = document.getElementById('board');
  board.style.transform = `scale(${zoom})`;
  board.style.transformOrigin = '0 0';
  document.getElementById('zoom-level').textContent = Math.round(zoom * 100) + '%';
  localStorage.setItem('zoom-' + SAVE_KEY, zoom);
}
function zoomIn()  { zoom = Math.min(3.0, parseFloat((zoom + 0.1).toFixed(2))); applyZoom(); }
function zoomOut() { zoom = Math.max(0.2, parseFloat((zoom - 0.1).toFixed(2))); applyZoom(); }
document.addEventListener('keydown', e => {
  if (e.ctrlKey || e.metaKey) {
    if (e.key === '=' || e.key === '+') { e.preventDefault(); zoomIn(); }
    if (e.key === '-')                  { e.preventDefault(); zoomOut(); }
    if (e.key === '0')                  { e.preventDefault(); zoom = 1.0; applyZoom(); }
  }
});
document.getElementById('board').addEventListener('wheel', e => {
  if (!(e.ctrlKey || e.metaKey)) return;
  e.preventDefault();
  e.deltaY < 0 ? zoomIn() : zoomOut();
}, { passive: false });
applyZoom();
function resetLayout() { if (!confirm('자동 재배치합니다.')) return; cards.forEach(c => { delete c.x; delete c.y; }); renderCards(); autoLayout(); }
// ── Floating format toolbar ───────────────────────────────────────────────────
const fmtBar = document.getElementById('format-toolbar');
function fmt(cmd) { document.execCommand(cmd, false, null); saveBoard(); }
function fmtLink() {
  const sel = window.getSelection();
  if (!sel || sel.isCollapsed) return;
  const url = prompt('링크 URL 입력', 'https://');
  if (!url) return;
  document.execCommand('createLink', false, url);
  // make links open in new tab
  sel.anchorNode?.parentElement?.closest('a')?.setAttribute('target', '_blank');
  document.querySelectorAll('.text a').forEach(a => a.target = '_blank');
  saveBoard();
}

// prevent format buttons from blurring contenteditable
fmtBar.addEventListener('mousedown', e => e.preventDefault());

document.addEventListener('selectionchange', () => {
  const sel = window.getSelection();
  if (!sel || sel.isCollapsed || !sel.toString().trim()) { fmtBar.style.display = 'none'; return; }
  // only show if selection is inside a .text element
  const anchor = sel.anchorNode;
  if (!anchor) { fmtBar.style.display = 'none'; return; }
  const textEl = anchor.nodeType === 1 ? anchor.closest('.text') : anchor.parentElement?.closest('.text');
  if (!textEl) { fmtBar.style.display = 'none'; return; }
  // position above selection
  const range = sel.getRangeAt(0);
  const rect = range.getBoundingClientRect();
  fmtBar.style.display = 'flex';
  const tbW = fmtBar.offsetWidth || 180;
  let left = rect.left + rect.width / 2 - tbW / 2;
  left = Math.max(8, Math.min(left, window.innerWidth - tbW - 8));
  fmtBar.style.left = left + 'px';
  fmtBar.style.top = (rect.top - 44 + window.scrollY) + 'px';
});

setInterval(saveBoard, 30000);
loadBoard();
</script>
