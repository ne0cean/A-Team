<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1e1e1e; color: #e0e0e0; font-family: 'Segoe UI', -apple-system, sans-serif; font-size: 15px; line-height: 1.6; padding: 20px 30px 60px; overflow-x: hidden; }
a { color: #6cb0f6; text-decoration: none; }
a:hover { text-decoration: underline; }
.title-bar { background: #3a3a5c; display: inline-block; padding: 6px 16px; font-size: 22px; font-weight: bold; color: #fff; margin-bottom: 4px; }
.date { color: #999; font-size: 13px; margin-bottom: 20px; }
.board { position: relative; }
.card { background: #2a2a2a; border: 1px solid #3a3a3a; border-radius: 8px; padding: 12px; position: absolute; cursor: grab; transition: box-shadow 0.15s; overflow: hidden; }
.card:hover { box-shadow: 0 0 0 1px #58a6ff; z-index: 10; }
.card.moving { opacity: 0.8; box-shadow: 0 4px 24px rgba(0,0,0,0.6); z-index: 100; cursor: grabbing; }
.card img { width: 100%; border-radius: 4px; display: block; }
.card .text { outline: none; min-height: 20px; white-space: pre-wrap; word-break: break-word; }
.card .text:focus { background: rgba(255,255,255,0.05); border-radius: 4px; padding: 4px; }
.card .text:empty::before { content: '텍스트 입력...'; color: #555; }
.card-actions { position: absolute; top: 4px; right: 4px; display: none; gap: 4px; }
.card:hover .card-actions { display: flex; }
.card-btn { background: #333; border: 1px solid #555; color: #ccc; border-radius: 4px; padding: 2px 6px; font-size: 11px; cursor: pointer; }
.card-btn:hover { background: #444; color: #fff; }
.resize-handle { position: absolute; bottom: 0; right: 0; width: 16px; height: 16px; cursor: se-resize; opacity: 0; }
.card:hover .resize-handle { opacity: 0.6; }
.resize-handle::after { content: ''; position: absolute; bottom: 3px; right: 3px; width: 8px; height: 8px; border-right: 2px solid #666; border-bottom: 2px solid #666; }
.card.selected { box-shadow: 0 0 0 2px #58a6ff; z-index: 5; }
.highlight-red { color: #ff6b6b; }
.highlight-blue { color: #6cb0f6; }
.highlight-gold { color: #f0c040; }
.toolbar { position: fixed; bottom: 0; left: 0; right: 0; background: #161b22; border-top: 1px solid #30363d; padding: 8px 20px; display: flex; gap: 12px; align-items: center; z-index: 200; }
.toolbar button { background: #21262d; border: 1px solid #30363d; color: #e0e0e0; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; }
.toolbar button:hover { background: #30363d; }
.toolbar .status { color: #8b949e; font-size: 12px; margin-left: auto; }
#format-toolbar { position: fixed; display: none; background: #1c2128; border: 1px solid #444c56; border-radius: 8px; padding: 4px 6px; gap: 2px; align-items: center; z-index: 500; box-shadow: 0 4px 16px rgba(0,0,0,0.5); }
#format-toolbar button { background: none; border: none; color: #cdd9e5; padding: 4px 8px; border-radius: 5px; cursor: pointer; font-size: 13px; line-height: 1; }
#format-toolbar button:hover { background: #373e47; }
#format-toolbar .sep { width: 1px; height: 16px; background: #444c56; margin: 0 2px; }
</style>
</head>

\"ko-KR\">커뮤니티</span></p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:Malgun Gothic;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">구글킵 <a href=\"http://www.itworld.co.kr/news/103179\">http://www.itworld.co.kr/news/103179</a></p>\r\n\t\t\t<p style=\"font-family:Malgun Gothic;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">아웃스탠딩 정기구독 신청</p>\r\n\t\t\t<p style=\"font-family:Malgun Gothic;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">홈스쿨링 <a href=\"http://m.news.naver.com/read.nhn?mode=LSD&amp;mid=sec&amp;sid1=102&amp;oid=145&amp;aid=0000001943\">http://m.news.naver.com/read.nhn?mode=LSD&amp;mid=sec&amp;sid1=102&amp;oid=145&amp;aid=0000001943</a></p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:Malgun Gothic;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">[<span lang=\"ko-KR\">책</span>] <span lang=\"ko-KR\">헬로</span> <span lang=\"ko-KR\">데이터</span></p>\r\n\t\t\t<p style=\"font-family:Malgun Gothic;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">소설형식으로 n포세대 메모광 책내기</p>\r\n\t\t\t<p lang=\"ko-KR\" style=\"font-family:Malgun Gothic;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">향초구입<span lang=\"en-US\">- </span>엉클캔들<span lang=\"en-US\">, SOMS</span></p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:Malgun Gothic;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">아침 영어공부</p>\r\n\t\t\t<p style=\"font-family:Malgun Gothic;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">점심 티라이브러리</p>\r\n\t\t\t<p style=\"font-family:Malgun Gothic;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">저녁 운동 및 영어 간단복습 및 코딩.독서.maker</p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:Malgun Gothic;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">라이브방송용 써드파티어플은 어때?</p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:Malgun Gothic;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">“어쩌면 지금 아이들이야말로 선생님이나 연장자로부터 배워 인생을 준비하는 게 불가능한 역사상 첫 세대가 될지도”</p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:Malgun Gothic;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">FROM DEAN 책쓰기</p>\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:Malgun Gothic;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">===========================================</p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:Malgun Gothic;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">현대 경영학의 많은 부부은 군사학에서 차용된것이다</p>\r\n\t\t\t<p style=\"font-family:Malgun Gothic;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">타겟은 고객으로 설정하고도</p>\r\n\t\t\t<p style=\"font-family:Malgun Gothic;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">고객을 적으로 상정한다는 부담때문에</p>\r\n\t\t\t<p style=\"font-family:Malgun Gothic;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">경쟁사를 적으로 상정하는 구조의 전락 프레임이 자리잡았고</p>\r\n\t\t\t<p style=\"font-family:Malgun Gothic;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">이 때문에 공략대상인 고객에서 멀어진채</p>\r\n\t\t\t<p style=\"font-family:Malgun Gothic;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">경쟁사에 초점을 맞춰 경쟁멱살을 잡게되는 상황이 벌어지는 것이다.</p>\r\n\t\t\t<p style=\"font-family:Malgun Gothic;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">이 때문에 경쟁의 프레임어 빠져버리게 된다.</p>\r\n\t\t\t<p style=\"font-family:Malgun Gothic;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">경쟁은 루저들을 위한 것이다.</p>\r\n\t\t\t<p style=\"font-family:Malgun Gothic;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">경쟁하지 않고, 싸우지 않고 이기는 것이 최상의 전략이다</p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:Malgun Gothic;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">타겟에 집중해야한다.</p>\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:Malgun Gothic;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">영어 - mock - 실행.메이킹(사업)</p>\r\n\t\t\t<p style=\"font-family:Malgun Gothic;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">다시 나도 가르치는 선순환</p>\r\n\t\t\t<p style=\"font-family:Malgun Gothic;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">드릴 다운 앤 브레이크 쓰루</p>\r\n\t\t\t<p style=\"font-family:Malgun Gothic;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">모든 룰메이커는 룰브레이커였다.</p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:Malgun Gothic;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">사무실 없는 사무직</p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:Malgun Gothic;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">컴퓨터와 수학  인지심리 신경경제학</p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:Malgun Gothic;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">순수하게 추구하되</p>\r\n\t\t\t<p style=\"font-family:Malgun Gothic;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">감히 순진치 말라.</p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:Malgun Gothic;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">스타의 캐리어같은 모선 물류창고를</p>\r\n\t\t\t<p style=\"font-family:Malgun Gothic;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">공중에 띄우고 드론부대로 배송</p>\r\n\t\t\t<p style=\"font-family:Malgun Gothic;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">단 반나절만에 제주까지 커버</p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:Malgun Gothic;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">내가 노력했다는 말의 의미는</p>\r\n\t\t\t<p style=\"font-family:Malgun Gothic;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">노오오오력이 아니다.</p>\r\n\t\t\t<p style=\"font-family:Malgun Gothic;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">열심히가 아니다.</p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:Malgun Gothic;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">같은 상황에서 다른사람들은</p>\r\n\t\t\t<p style=\"font-family:Malgun Gothic;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">하지 않았을 것 같을 시도를 해보는 것</p>\r\n\t\t\t<p style=\"font-family:Malgun Gothic;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">그것이 노력에 대한 나의 정의다.</p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:Malgun Gothic;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">기어가 제대로 안들어갔는데</p>\r\n\t\t\t<p style=\"font-family:Malgun Gothic;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">열정적인 자신의 모습에 도취되어</p>\r\n\t\t\t<p style=\"font-family:Malgun Gothic;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">RPM만 올려대는건 노력이 아니라 위로다.</p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:Malgun Gothic;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">더 이상</p>\r\n\t\t\t<p style=\"font-family:Malgun Gothic;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">인생이 별 의미가 없었다는 의미다.</p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:Malgun Gothic;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">원래 그런 것은 원래 없으며,</p>\r\n\t\t\t<p style=\"font-family:Malgun Gothic;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">절대 안되는 것은 절대 없고,</p>\r\n\t\t\t<p style=\"font-family:Malgun Gothic;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">영원한 것은 영원히 없다.</p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:Malgun Gothic;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">그냥 그런 나를 살아볼 참이다.</p>\r\n\t\t\t<p style=\"font-family:Malgun Gothic;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">어짜피 여분의 삶,</p>\r\n\t\t\t<p style=\"font-family:Malgun Gothic;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">망설이지 말 것.</p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:Malgun Gothic;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">파렛트 페이지 만들긷</p>\r\n\t\t\t<p style=\"font-family:Malgun Gothic;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">오감. 의식주. 욕구오단계</p>\r\n\t\t\t<p style=\"font-family:Malgun Gothic;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">역발상. 질문 문제 재정의</p>\r\n\t\t\t<p style=\"font-family:Malgun Gothic;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">상호연결. 블루오션캔버스</p>\r\n\t\t\t<p style=\"font-family:Malgun Gothic;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">이질적.파격적이되 공감. 달라붙을 수 있는것</p>\r\n\t\t\t<p style=\"font-family:Malgun Gothic;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">만화경 루빅큐브</p>\r\n\t\t\t<p style=\"font-family:Malgun Gothic;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">360도 사고. 나무와 숲. 줌인 줌아웃.</p>\r\n\t\t\t<p style=\"font-family:Malgun Gothic;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">원리와 동인</p>\r\n\t\t\t<p style=\"font-family:Malgun Gothic;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">향후 10년간무엇이 변하고 무엇이변하지 않을것인가</p>\r\n\t\t\t<p style=\"font-family:Malgun Gothic;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">변하지않을 가치를 변하는것을 이용해서 충족시킨다.</p>\r\n\t\t\t<p style=\"font-family:Malgun Gothic;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">고령화 1인가구의 증가 공교육의 과도기 부의 양극화</p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:Malgun Gothic;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">인간의 감각과 센싱기술</p>\r\n\t\t\t<p style=\"font-family:Malgun Gothic;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">고도, 가속도, 자이로스코프, 조도</p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:Malgun Gothic;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">인공지능 분리수거업체</p>\r\n\t\t\t<p style=\"font-family:Malgun Gothic;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">음식물만별도로해서 그냥버리면</p>\r\n\t\t\t<p style=\"font-family:Malgun Gothic;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">분리수거해주는 일종의 고물상</p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:Malgun Gothic;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">2017년 죽어도 할것</p>\r\n\t\t\t<p style=\"font-family:Malgun Gothic;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">영어 토플</p>\r\n\t\t\t<p style=\"font-family:Malgun Gothic;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">수학</p>\r\n\t\t\t<p style=\"font-family:Malgun Gothic;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">볼펜글씨</p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:Malgun Gothic;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">내 스승은 동으로는 한비사</p>\r\n\t\t\t<p style=\"font-family:Malgun Gothic;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">서로는 마키아밸리</p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:Malgun Gothic;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">가장 존경하는 적은 괴벨스다.</p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:Malgun Gothic;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">회의의 목적은</p>\r\n\t\t\t<p style=\"font-family:Malgun Gothic;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">타인의 관점을 탐험하는데 있다.</p>\r\n\t\t\t<p style=\"font-family:Malgun Gothic;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">이것은 경청에 관한 호혜적 태도가 아니라</p>\r\n\t\t\t<p style=\"font-family:Malgun Gothic;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">내겐 없는 것을 얻어내겠다는 능동적 태세다.</p>\r\n\t\t\t<p style=\"font-family:Malgun Gothic;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">배려가 아닌 이기다.</p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:Malgun Gothic;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">모여서 생각하는 것이 아닌,</p>\r\n\t\t\t<p style=\"font-family:Malgun Gothic;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">생각들이 모여야 한다. </p>\r\n\t\t\t<p style=\"font-family:Malgun Gothic;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">필기구가 아닌 생각을 가지고 들어와야 한다..</p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:Malgun Gothic;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">인공지능</p>\r\n\t\t\t<p style=\"font-family:Malgun Gothic;font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><a href=\"http://m.news.naver.com/read.nhn?mode=LSD&amp;sid1=001&amp;oid=020&amp;aid=0003037965\">http://m.news.naver.com/read.nhn?mode=LSD&amp;sid1=001&amp;oid=020&amp;aid=0003037965</a></p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:Malgun Gothic;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">기술적인 측면을 차치</p>\r\n\t\t\t<p style=\"font-family:Malgun Gothic;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">비즈니스 로드맵을 가지고 있느냐의 여부다.</p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:Malgun Gothic;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">아마존은 유통이라는 본업</p>\r\n\t\t\t<p style=\"font-family:Malgun Gothic;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">구글은 검색과 광고라는 본질</p>\r\n\t\t\t<p style=\"font-family:Malgun Gothic;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">AI는 거들뿐</p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:Malgun Gothic;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">딜리버리하려는 가치는 부재한데</p>\r\n\t\t\t<p style=\"font-family:Malgun Gothic;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">아무리 똑똑한들 결국 퀘스천의 위치를 벗어나지 못 할것이다.</p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:Malgun Gothic;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">연수원에 보급할</p>\r\n\t\t\t<p style=\"font-family:Malgun Gothic;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">구리코팅 박스와 주머니</p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:Malgun Gothic;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">책</p>\r\n\t\t\t<p style=\"font-family:Malgun Gothic;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">마지막 질문</p>\r\n\t\t\t<p style=\"font-family:Malgun Gothic;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">엔트로피</p>\r\n\t\t\t<p style=\"font-family:Malgun Gothic;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">심스틸러</p>\r\n\t\t\t<p style=\"font-family:Malgun Gothic;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">최진기 책</p>\r\n\t\t\t<p style=\"font-family:Malgun Gothic;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">블랙스완</p>\r\n\t\t\t<p lang=\"ko-KR\" style=\"font-family:Malgun Gothic;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">인간실패</p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:Malgun Gothic;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">이슈는 삼등분</p>\r\n\t\t\t<p style=\"font-family:Malgun Gothic;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">사실 문제 결과</p>\r\n\t\t\t<p style=\"font-family:Malgun Gothic;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">사실 - 통제불가변인. 환경. 비가역적 사건</p>\r\n\t\t\t<p style=\"font-family:Malgun Gothic;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">문제 - 결과의 직접적 원인</p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:Malgun Gothic;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">우정이라는 것이 산길과 같아서</p>\r\n\t\t\t<p style=\"font-family:Malgun Gothic;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">자주 오가지 않으면 수풀이 우거져</p>\r\n\t\t\t<p style=\"font-family:Malgun Gothic;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">길이 없어진다는데,</p>\r\n\t\t\t<p style=\"font-family:Malgun Gothic;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">어짜피 어린날 우리가 만난곳도 사막이었고</p>\r\n\t\t\t<p style=\"font-family:Malgun Gothic;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">걸어온 길도 사막이었으니 길 잃을 일 없이</p>\r\n\t\t\t<p style=\"font-family:Malgun Gothic;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">오랜 공백이 무색하다.</p>\r\n\t\t\t<p style=\"font-family:Malgun Gothic;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">앞으로도 헤쳐나갈 수풀하나 없는 사막일지 모르겠다만</p>\r\n\t\t\t<p style=\"font-family:Malgun Gothic;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">삶의 갈증이 극심하고</p>\r\n\t\t\t<p style=\"font-family:Malgun Gothic;font-size:10pt;margin-top:0pt;margin-bottom:0pt\">언제고 나라는 선인장의 밑둥을 파보라.</p>\r\n\t\t"

</p>\r\n\t\t\t<br />\r\n\t\t"

const CONTENT_HASH = 'dc12bd2b';

let cards = [];
let moving = null, resizing = null;
let selectedIdx = null, clipboardCard = null;
const GRID = 20, GAP = 14;
function snap(v) { return Math.round(v / GRID) * GRID; }

// ── Undo (Ctrl+Z) ────────────────────────────────────────────────────────────
const MAX_HISTORY = 50;
let history = [];
function snapshot() {
  syncText();
  history.push(JSON.stringify(cards));
  if (history.length > MAX_HISTORY) history.shift();
}
function undo() {
  if (!history.length) { showStatus('되돌릴 내용 없음'); return; }
  syncText();
  cards = JSON.parse(history.pop());
  renderCards();
  saveBoard();
  showStatus('↩ 되돌림');
}
function showStatus(msg) {
  const s = document.getElementById('status');
  s.textContent = msg;
  clearTimeout(showStatus._t);
  showStatus._t = setTimeout(() => { s.textContent = ''; }, 2000);
}
document.addEventListener('keydown', e => {
  const isText = document.activeElement?.contentEditable === 'true';
  if ((e.ctrlKey || e.metaKey) && e.key === 'z' && !e.shiftKey) {
    if (isText) return;
    e.preventDefault();
    undo();
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'c' && !e.shiftKey && !isText) {
    if (selectedIdx !== null && cards[selectedIdx]) {
      syncText();
      clipboardCard = JSON.parse(JSON.stringify(cards[selectedIdx]));
      showStatus('카드 복사됨');
      e.preventDefault();
    }
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'v' && !e.shiftKey && !isText) {
    if (clipboardCard) {
      e.preventDefault();
      snapshot();
      const nc = JSON.parse(JSON.stringify(clipboardCard));
      nc.x = (nc.x || 0) + 30; nc.y = (nc.y || 0) + 30;
      cards.push(nc);
      selectedIdx = cards.length - 1;
      renderCards(); saveBoard();
      showStatus('카드 붙여넣음');
    }
  }
  if (e.key === 'Escape') {
    document.querySelectorAll('.card.selected').forEach(c => c.classList.remove('selected'));
    selectedIdx = null;
  }
});

function pushCards(movedIdx) {
  const moved = cards[movedIdx];
  const movedEl = document.querySelector(`.card[data-idx="${movedIdx}"]`);
  if (!movedEl) return;
  const mh = movedEl.offsetHeight;
  document.querySelectorAll('.card').forEach(el => {
    const i = +el.dataset.idx;
    if (i === movedIdx) return;
    const c = cards[i], oh = el.offsetHeight;
    if (moved.x < (c.x+(c.w||200)) && (moved.x+(moved.w||200)) > c.x && moved.y < (c.y+oh) && (moved.y+mh) > c.y) {
      c.y = moved.y + mh + GAP;
      el.style.top = c.y + 'px';
    }
  });
}

function loadBoard() {
  const saved = localStorage.getItem(SAVE_KEY);
  const savedHash = localStorage.getItem(SAVE_KEY + ':hash');
  let parsed = null;
  try { parsed = saved ? JSON.parse(saved) : null; } catch(e) {}
  // reset if: no save, empty array, or content hash changed (page regenerated)
  if (!parsed || parsed.length === 0 || savedHash !== CONTENT_HASH) {
    cards = DEFAULT_CARDS.map(c => ({...c}));
    localStorage.removeItem(SAVE_KEY);
    localStorage.setItem(SAVE_KEY + ':hash', CONTENT_HASH);
    renderCards();
    const hasCoords = cards.some(c => c.x !== undefined && c.y !== undefined);
    if (!hasCoords) autoLayout();
    return;
  }
  cards = parsed;
  renderCards();
}
function resetToDefaults() { if (!confirm('저장된 보드를 지우고 원본으로 초기화합니다. 계속할까요?')) return; localStorage.removeItem(SAVE_KEY); cards = DEFAULT_CARDS.map(c => ({...c})); renderCards(); autoLayout(); }

function autoLayout() {
  const boardW = document.getElementById('board').offsetWidth;
  const cols = Math.max(1, Math.floor(boardW / 280));
  const colW = (boardW - GAP*(cols-1)) / cols;
  const colH = new Array(cols).fill(0);
  const allCards = document.querySelectorAll('.card');
  const images = document.querySelectorAll('.card img');
  let loaded = 0;
  function place() {
    allCards.forEach((el, i) => {
      const w = Math.min(cards[i].w || colW, colW);
      let minCol = 0;
      for (let c = 1; c < cols; c++) if (colH[c] < colH[minCol]) minCol = c;
      cards[i].x = minCol * (colW + GAP);
      cards[i].y = colH[minCol];
      cards[i].w = w;
      el.style.left = cards[i].x + 'px';
      el.style.top = cards[i].y + 'px';
      el.style.width = w + 'px';
      colH[minCol] = cards[i].y + el.offsetHeight + GAP;
    });
    document.getElementById('board').style.minHeight = (Math.max(...colH) + 100) + 'px';
    saveBoard();
  }
  if (!images.length) { requestAnimationFrame(place); return; }
  images.forEach(img => {
    if (img.complete) { loaded++; if (loaded >= images.length) requestAnimationFrame(place); }
    else { img.onload = img.onerror = () => { loaded++; if (loaded >= images.length) requestAnimationFrame(place); }; }
  });
}

function syncText() {
  document.querySelectorAll('.card').forEach(el => {
    const i = +el.dataset.idx;
    if (cards[i]?.type === 'text') { const t = el.querySelector('.text'); if (t) cards[i].content = t.innerHTML; }
  });
}
function saveBoard() { syncText(); localStorage.setItem(SAVE_KEY, JSON.stringify(cards)); localStorage.setItem(SAVE_KEY + ':hash', CONTENT_HASH); showStatus('저장됨 ' + new Date().toLocaleTimeString()); }

function renderCards() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  cards.forEach((card, i) => {
    const el = document.createElement('div');
    el.className = 'card'; el.dataset.idx = i;
    if (card.x !== undefined) el.style.left = card.x + 'px';
    if (card.y !== undefined) el.style.top = card.y + 'px';
    // html cards contain raw OneNote table HTML which may overflow the stated div width
    if (card.w) { if (card.type === 'html') el.style.minWidth = card.w + 'px'; else el.style.width = card.w + 'px'; }
    el.addEventListener('mousedown', e => {
      if (e.target.closest('.text, a, .card-btn, .resize-handle, td, th')) return;
      e.preventDefault();
      // Update selection
      document.querySelectorAll('.card.selected').forEach(c => c.classList.remove('selected'));
      selectedIdx = i; el.classList.add('selected');
      snapshot();
      moving = { idx: i, startX: e.clientX, startY: e.clientY, origX: card.x||0, origY: card.y||0 };
      el.classList.add('moving');
    });
    const actions = document.createElement('div'); actions.className = 'card-actions';
    const delBtn = document.createElement('button'); delBtn.className = 'card-btn'; delBtn.textContent = '×';
    delBtn.onclick = e => { e.stopPropagation(); if(confirm('삭제?')) { snapshot(); cards.splice(i,1); renderCards(); saveBoard(); } };
    actions.appendChild(delBtn); el.appendChild(actions);
    if (card.type === 'text') {
      const text = document.createElement('div'); text.className = 'text'; text.contentEditable = true;
      text.innerHTML = card.content || '';
      text.addEventListener('focus', () => { snapshot(); });
      text.addEventListener('blur', () => { card.content = text.innerHTML; saveBoard(); });
      el.appendChild(text);
    } else if (card.type === 'image') {
      const img = document.createElement('img');
      img.src = card.src.startsWith('http') || card.src.startsWith('data:') ? card.src : IMG_BASE + card.src;
      img.alt = ''; img.loading = 'lazy'; img.onerror = () => img.style.display = 'none';
      if (card.w) img.style.width = card.w + 'px';
      if (card.h) img.style.height = card.h + 'px';
      if (card.link) { const a = document.createElement('a'); a.href = card.link; a.target = '_blank'; a.appendChild(img); el.appendChild(a); }
      else { el.appendChild(img); }
      if (card.caption) { const cap = document.createElement('div'); cap.style.cssText = 'font-size:11px;color:#8b949e;margin-top:4px;word-break:break-word;padding:0 2px;'; cap.textContent = card.caption; el.appendChild(cap); }
    } else if (card.type === 'html') {
      const wrapper = document.createElement('div');
      wrapper.style.cssText = 'overflow:auto;font-size:13px;line-height:1.5;';
      wrapper.innerHTML = card.html.replace(/__ATTACHMENT__/g, IMG_BASE);
      wrapper.querySelectorAll('img').forEach(img => { img.style.maxWidth = '100%'; img.style.height = 'auto'; img.draggable = false; });
      wrapper.querySelectorAll('a').forEach(a => { a.target = '_blank'; a.style.color = '#6cb0f6'; });
      wrapper.querySelectorAll('table').forEach(t => { t.style.borderCollapse = 'collapse'; });
      wrapper.querySelectorAll('td,th').forEach(td => {
        td.style.border = '1px solid #444'; td.style.padding = '4px 6px'; td.style.verticalAlign = 'top';
        td.title = '더블클릭으로 편집';
        td.addEventListener('dblclick', function(e) {
          e.stopPropagation();
          snapshot();
          this.contentEditable = 'true';
          this.style.outline = '2px solid #388bfd';
          this.style.background = 'rgba(56,139,253,0.08)';
          this.focus();
        });
        td.addEventListener('blur', function() {
          this.contentEditable = 'false';
          this.style.outline = '';
          this.style.background = '';
          cards[i].html = wrapper.innerHTML.split(IMG_BASE).join('__ATTACHMENT__');
          saveBoard();
        });
      });
      el.appendChild(wrapper);
    } else if (card.type === 'table') {
      const rows = card.rows || [['','',''],['','',''],['','','']];
      const tbl = document.createElement('table');
      tbl.style.cssText = 'border-collapse:collapse;width:100%;font-size:13px;';
      rows.forEach((row, ri) => {
        const tr = tbl.insertRow();
        row.forEach((cell, ci) => {
          const td = document.createElement(ri === 0 ? 'th' : 'td');
          td.contentEditable = true;
          td.style.cssText = 'border:1px solid #30363d;padding:4px 8px;min-width:60px;text-align:left;' + (ri===0 ? 'background:#21262d;font-weight:600;' : '');
          td.textContent = cell;
          td.addEventListener('blur', () => { if (!cards[i].rows) cards[i].rows = rows; rows[ri][ci] = td.textContent; saveBoard(); });
          tr.appendChild(td);
        });
      });
      el.appendChild(tbl);
      const addRow = document.createElement('button');
      addRow.textContent = '+ 행'; addRow.style.cssText = 'margin-top:4px;font-size:11px;background:#21262d;border:1px solid #30363d;color:#8b949e;padding:2px 8px;border-radius:4px;cursor:pointer;';
      addRow.onclick = e => { e.stopPropagation(); snapshot(); if (!cards[i].rows) cards[i].rows = rows; cards[i].rows.push(new Array(cards[i].rows[0].length).fill('')); renderCards(); saveBoard(); };
      const addCol = document.createElement('button');
      addCol.textContent = '+ 열'; addCol.style.cssText = 'margin-top:4px;margin-left:4px;font-size:11px;background:#21262d;border:1px solid #30363d;color:#8b949e;padding:2px 8px;border-radius:4px;cursor:pointer;';
      addCol.onclick = e => { e.stopPropagation(); snapshot(); if (!cards[i].rows) cards[i].rows = rows; cards[i].rows.forEach(r => r.push('')); renderCards(); saveBoard(); };
      el.appendChild(addRow); el.appendChild(addCol);
    }
    const rh = document.createElement('div'); rh.className = 'resize-handle';
    rh.addEventListener('mousedown', e => { e.preventDefault(); e.stopPropagation(); snapshot(); resizing = { idx: i, startX: e.clientX, startW: card.w || el.offsetWidth }; });
    el.appendChild(rh);
    if (i === selectedIdx) el.classList.add('selected');
    board.appendChild(el);
  });
  requestAnimationFrame(() => {
    let maxB = 0;
    document.querySelectorAll('.card').forEach(el => { const b = (parseFloat(el.style.top)||0) + el.offsetHeight; if (b > maxB) maxB = b; });
    board.style.minHeight = (maxB + 100) + 'px';
  });
}

document.addEventListener('mousemove', e => {
  if (moving) {
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`); if (!el) return;
    let nx = moving.origX + e.clientX - moving.startX, ny = moving.origY + e.clientY - moving.startY;
    if (e.shiftKey) { nx = snap(nx); ny = snap(ny); el.style.outline = '1px dashed rgba(240,192,64,0.3)'; } else { el.style.outline = ''; }
    el.style.left = nx + 'px'; el.style.top = ny + 'px';
  }
  if (resizing) {
    let nw = resizing.startW + e.clientX - resizing.startX; if (e.shiftKey) nw = snap(nw);
    cards[resizing.idx].w = Math.max(100, nw);
    const el = document.querySelector(`.card[data-idx="${resizing.idx}"]`); if (el) el.style.width = cards[resizing.idx].w + 'px';
  }
});

document.addEventListener('mouseup', e => {
  if (moving) {
    let nx = moving.origX + e.clientX - moving.startX, ny = moving.origY + e.clientY - moving.startY;
    if (e.shiftKey) { nx = snap(nx); ny = snap(ny); }
    cards[moving.idx].x = Math.max(0, nx); cards[moving.idx].y = Math.max(0, ny);
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`); if (el) { el.classList.remove('moving'); el.style.outline = ''; }
    if (e.shiftKey) pushCards(moving.idx);
    moving = null; saveBoard();
  }
  if (resizing) { if (e.shiftKey) pushCards(resizing.idx); resizing = null; saveBoard(); }
});

function addTextCard() { snapshot(); cards.push({ type: 'text', content: '', x: 50, y: window.scrollY+100, w: 300 }); renderCards(); setTimeout(() => { const els = document.querySelectorAll('.card .text'); els[els.length-1]?.focus(); }, 100); }
function addImageCard() { const input = document.createElement('input'); input.type = 'file'; input.accept = 'image/*'; input.onchange = e => { const f = e.target.files[0]; if (!f) return; const r = new FileReader(); r.onload = () => { snapshot(); cards.push({ type: 'image', src: r.result, x: 50, y: window.scrollY+100, w: 240 }); renderCards(); saveBoard(); }; r.readAsDataURL(f); }; input.click(); }
function addImageUrl() { const url = prompt('이미지 URL'); if (!url) return; snapshot(); cards.push({ type: 'image', src: url, x: 50, y: window.scrollY+100, w: 240 }); renderCards(); saveBoard(); }
function addTableCard() {
  const colsStr = prompt('열 수 (기본 3)', '3'); const cols = Math.max(1, parseInt(colsStr)||3);
  const rowsStr = prompt('행 수 (헤더 포함, 기본 4)', '4'); const rows = Math.max(1, parseInt(rowsStr)||4);
  snapshot();
  cards.push({ type: 'table', rows: Array.from({length: rows}, (_, ri) => Array.from({length: cols}, (_, ci) => ri===0 ? `열${ci+1}` : '')), x: 50, y: window.scrollY+100, w: Math.max(240, cols*100) });
  renderCards(); saveBoard();
}
function exportBoard() { syncText(); const blob = new Blob([JSON.stringify(cards, null, 2)], { type: 'application/json' }); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = SAVE_KEY + '.json'; a.click(); }
// ── Zoom ─────────────────────────────────────────────────────────────────────
let zoom = parseFloat(localStorage.getItem('zoom-' + SAVE_KEY) || '1.0');
function applyZoom() {
  const board = document.getElementById('board');
  board.style.transform = `scale(${zoom})`;
  board.style.transformOrigin = '0 0';
  document.getElementById('zoom-level').textContent = Math.round(zoom * 100) + '%';
  localStorage.setItem('zoom-' + SAVE_KEY, zoom);
}
function zoomIn()  { zoom = Math.min(3.0, parseFloat((zoom + 0.1).toFixed(2))); applyZoom(); }
function zoomOut() { zoom = Math.max(0.2, parseFloat((zoom - 0.1).toFixed(2))); applyZoom(); }
document.addEventListener('keydown', e => {
  if (e.ctrlKey || e.metaKey) {
    if (e.key === '=' || e.key === '+') { e.preventDefault(); zoomIn(); }
    if (e.key === '-')                  { e.preventDefault(); zoomOut(); }
    if (e.key === '0')                  { e.preventDefault(); zoom = 1.0; applyZoom(); }
  }
});
document.getElementById('board').addEventListener('wheel', e => {
  if (!(e.ctrlKey || e.metaKey)) return;
  e.preventDefault();
  e.deltaY < 0 ? zoomIn() : zoomOut();
}, { passive: false });
applyZoom();
function resetLayout() { if (!confirm('자동 재배치합니다.')) return; cards.forEach(c => { delete c.x; delete c.y; }); renderCards(); autoLayout(); }
// ── Floating format toolbar ───────────────────────────────────────────────────
const fmtBar = document.getElementById('format-toolbar');
function fmt(cmd) { document.execCommand(cmd, false, null); saveBoard(); }
function fmtLink() {
  const sel = window.getSelection();
  if (!sel || sel.isCollapsed) return;
  const url = prompt('링크 URL 입력', 'https://');
  if (!url) return;
  document.execCommand('createLink', false, url);
  // make links open in new tab
  sel.anchorNode?.parentElement?.closest('a')?.setAttribute('target', '_blank');
  document.querySelectorAll('.text a').forEach(a => a.target = '_blank');
  saveBoard();
}

// prevent format buttons from blurring contenteditable
fmtBar.addEventListener('mousedown', e => e.preventDefault());

document.addEventListener('selectionchange', () => {
  const sel = window.getSelection();
  if (!sel || sel.isCollapsed || !sel.toString().trim()) { fmtBar.style.display = 'none'; return; }
  // only show if selection is inside a .text element
  const anchor = sel.anchorNode;
  if (!anchor) { fmtBar.style.display = 'none'; return; }
  const textEl = anchor.nodeType === 1 ? anchor.closest('.text') : anchor.parentElement?.closest('.text');
  if (!textEl) { fmtBar.style.display = 'none'; return; }
  // position above selection
  const range = sel.getRangeAt(0);
  const rect = range.getBoundingClientRect();
  fmtBar.style.display = 'flex';
  const tbW = fmtBar.offsetWidth || 180;
  let left = rect.left + rect.width / 2 - tbW / 2;
  left = Math.max(8, Math.min(left, window.innerWidth - tbW - 8));
  fmtBar.style.left = left + 'px';
  fmtBar.style.top = (rect.top - 44 + window.scrollY) + 'px';
});

setInterval(saveBoard, 30000);
loadBoard();
</script>
</body>
