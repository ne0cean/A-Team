    "content": "ㅇ 목표 :\n1년 내) 각종 비즈니스 아티클을 자유롭게 읽을 수 있어야 한다.\n2년 내) 미국에서 비즈니스를 할 수 있어야 한다.\n어떤 분야의 영어 전문가가 될 것인가?\n1. VOCA - 매일 문장과 함께\n2. 문법 -\n리딩 - 테크 관련 기사들, 영한대역 책 구입, 아동용 도서\n듣기 - 어플, 미드 보기 한영 자막, 영어 노래 듣기\n쓰기 - 하루에 한 바닥 필사하기\n말하기 - 회화책 1분기당 1개씩 암기\n<a href=\"https://www.youtube.com/watch?feature=player_embedded&v=d0yGdNEWdn0\">https://www.youtube.com/watch?feature=player_embedded&v=d0yGdNEWdn0</a>\n실리콘 밸리의 한국인: <a href=\"https://search.naver.com/search.naver?where=nexearch&ie=utf8&query=%EC%8B%A4%EB%A6%AC%EC%BD%98%EB%B0%B8%EB%A6%AC%EC%9D%98+%ED%95%9C%EA%B5%AD%EC%9D%B8&sm=tab_stc\">https://search.naver.com/search.naver?where=nexearch&ie=utf8&query=%EC%8B%A4%EB%A6%AC%EC%BD%98%EB%B0%B8%EB%A6%AC%EC%9D%98+%ED%95%9C%EA%B5%AD%EC%9D%B8&sm=tab_stc</a>\n말할 수 있어야 들리고,\n쓸 수 있어야\n<a href=\"http://economyplus.chosun.com/special/special_view_past.php?boardName=C03&t_num=9100&img_ho=\">http://economyplus.chosun.com/special/special_view_past.php?boardName=C03&t_num=9100&img_ho=</a>\n<a href=\"http://ppss.kr/archives/89151\">http://ppss.kr/archives/89151</a>\n영어 공부법\n<a href=\"https://cse.google.co.kr/cse?cx=partner-pub-4647520150708391:6159801067&ie=UTF-8&q=%EC%98%81%EC%96%B4#gsc.tab=0&gsc.q=%EC%98%81%EC%96%B4&gsc.page=1\">https://cse.google.co.kr/cse?cx=partner-pub-4647520150708391:6159801067&ie=UTF-8&q=%EC%98%81%EC%96%B4#gsc.tab=0&gsc.q=%EC%98%81%EC%96%B4&gsc.page=1</a>\n<a href=\"http://www.venturesquare.net/518929\">http://www.venturesquare.net/518929</a>\n롤모델 - 실리콘밸리 진출 한국인들. 조성문\n첫째, 역시 발음이 중요했습니다.\n둘째, 일을 하면서 영어를 썼기 때문입니다.\n셋째, 퍼블릭 스피킹(public speaking)을 통해 훈련을 했습니다.\n<a href=\"http://www.toastmasters.org/members/memberexperience/meetingroles/toastmaster.aspx\" style=\"font-size:10.5pt\">토스트</a> 마스터(toast master)라고, 일주일에 한 번씩 모여 연설을 연습하고 다른 사람들로부터 피드백을 받는 프로그램이 있었는데, 일단 여기에 참석하면서 도움이 많이 되었습니다. 참석한 사람들이 ‘아..’, ‘음..’, ‘You know..’ 와 같은 안좋은 습관들을 사람들이 찾아서 지적해주고, 문법상 오류도 지적해줍니다. 종종 주제를 하나 주고 즉흥적으로 3분짜리 이야기를 하는 연습도 하는데, 그것도 큰 도움이 되었습니다.\n저에게 더 직접적인 도움을 주었던 것은 회사에서 했던 ‘퍼블릭 스피킹(public speaking)’ 수업이었습니다. 영어가 모국어가 아닌 동료들과 함께 했는데, 구성이 참 좋았습니다. 세션마다 간단한 주제를 놓고 돌아가면서 발표를 합니다. 그리고 발표한 모든 내용은 강사가 비디오로 녹화했다가 그 다음 수업 전에 한 시간동안 만나서 비디오를 같이 보며 분석을 합니다. 사람들 앞에서 연설할 때 표정은 어떻게 하는지, 목소리 톤은 어떤지, 발음은 자연스러운지, 손 동작이 너무 부족하거나 많지는 않은지 등을 비디오를 통해 정확히 볼 수 있고, 강사가 옆에서 지적해주면 그 자리에서 고쳐서 연습하고 그 다음 수업에서 발표할 때 사용해보곤 했습니다. 특히, 저는 수업 전에 강사에게 ‘발음을 교정해 달라’고 부탁했는데, 제가 습관적으로 잘못 발음하던 것을 많이 고쳐주어 정말 큰 도움이 되었습니다.\n넷째, 사람들과 많이 어울렸습니다.\n당연한 이야기이지만, ‘놀면서 배워야’ 확실하고 빨리 늡니다. 다양한 소셜 이벤트(social event)에 참여해서 사람들과 어울렸고, 그 덕분에 좋은 사람들을 많이 알게 되었고, 같이 어울리며 영어 발음과 실력도 많이 좋아졌습니다. 새로운 사람을 만나는 경우엔 영어 실력을 검증하는 기회도 되지요.\n다섯째, 직접 비즈니스를 해보았습니다.\n<a href=\"https://sungmooncho.com/2011/04/04/how-i-learned-english/\">https://sungmooncho.com/2011/04/04/how-i-learned-english/</a>\n영단어 쉽게 암기하는법 <a href=\"http://bookwormkr.tistory.com/m/290\">http://bookwormkr.tistory.com/m/290</a>\n첫 번째 영어 공부법. 5 / 2\n매일 단어 5개를 ‘읽는다’. 매일 문장 2개를 ‘본다’. ‘영어를 잘해야지. 올해는 영어 기초를 마스터 해야지’라고 다들 생각은 하겠지만 정작 실상은 일 년 내내 영어를 ‘하나도’ 하지 않는 경우가 많다. 나 역시 마찬가지였다. 매일 영어단어 10개를 외우자, CNN 영어 청취를 매일 30분 하자는 각오는 3일 전후로 백지가 되었다.\n그래서 결국 안착한 영어 방법이 바로 이 ‘5 / 2’이다. 출근하자마자 인터넷에 접속해서 모르는 단어가 나오면 5개까지 뜻을 찾아보고, 선택한 사이트에 들어가서 문장 2개를 말 그대로 ‘눈으로 본다’. 출근해서 여유가 없으면 점심시간에 하거나 하루 일과가 다 끝나고 남아서 하고 퇴근했다."

    "w": 492,
    "content": "3. 업무 시간 외, 혹은 주말에 영어실력 높이기\n1) 언어교환(Langauge Exchange) 모임에 참석한다.\nLanguage Exchange Cafe는 강남 / 홍대 등에서 매주 주중 저녁 혹은 주말 오후 시간에 열린다. 파티도 하고 있으며, 일정은 <a href=\"http://friendsinkorea.com/events/category/all-events/\">사이트</a>에서 확인할 수 있다.\n혼자 참석하는 사람들이 의외로 많고, 때로는 외국인이 부족하여 테이블에 한국인끼리 앉게 되기도 하지만, 영어뿐만 아니라 중국어 / 일본어 등 다른 언어도 사용할 수 있고, 같은 언어에 관심이 있는 한국인 친구뿐만 아니라, 외국인 친구도 사귈 수 있다. 내가 참석했던 모임은 참가비가 1만 원 정도로 3시간 동안 음료를 무제한으로 마실 수 있었다.\n\nMeetup : <a href=\"http://www.meetup.com/Language-Exchange-Cafe/\">http://www.meetup.com/Language-Exchange-Cafe/</a>\n네이버 카페 : http://cafe.naver.com/theenglishparty</a>\n\n요즘은 <a href=\"http://www.zipbob.net/\">집밥</a>이나 <a href=\"http://onoffmix.com/\">온오프믹스</a>에도 언어 교환이나 영어회화 스터디 모임이 자주 올라온다.\n2) 영어학원(주말반 혹은 주중 새벽/저녁반)에 다닌다.\n가장 흔하면서 가장 돈이 많이 들면서도 의외로 가장 효과를 못 얻기도 하는 방법이다.\nYBM과 월스트리트잉글리쉬를 수강하고 느낀 점은 잘 알아듣지 못하는 경우에는 모든 수업을 네이티브 선생님과 진행하기보다, 반은 네이티브가 반은 한국인 선생님이 진행하는 걸 듣는 게 더 효율적인 거 같았다. 어느 정도 알아들을 수 있게 된 후에 모든 수업을 네이티브 선생님과 같이 하면 더 빨리 는다.\n나의 경우 YBM에서 비즈니스 회화 수업을 들었는데, 2~3달 간격으로 수업 내용이 반복되었고, 그럼에도 유창한 프리토킹까지는 어려워서 학원을 옮겼다.\n<a href=\"http://ppss.kr/wp-content/uploads/2015/10/10460213_10202078196983655_1993175691769953338_n.jpg\">"

    "x": 48,
    "y": 5080,
    "w": 492,
    "content": "외국어를 못하는 게 문제가 아니다, 활용할 곳이 없는 게 문제다\n결국은 시간이다, 이를 버티려면 좋아하는 분야의 콘텐츠로 익히는 게 좋다\n외국어는 머리가 아닌 몸으로 익히는 것이다. 마치 운동선수나 숙련공처럼 몸에 본능적으로 익히는 무언가다. 사실 한국어를 머리 싸매고 배웠나? 그냥 엄마 아빠가 눈 마주치고 입모양 보여주면서 무수하게 소통해주면서 저절로 익혀진 것이다. 본능적으로!\n물론 본능에만 의존해서는 안 된다. 중요한 것은 절대적인 노출시간이다. 아무리 IQ가 떨어져도 외국어는 몸에 젖어들게 마련이다. 문제는 그 긴 시간을 재미 없는 내용으로 가득 채우면 그걸 어떻게 소화하겠는가? 그래서 외국어는 자신의 관심사를 증폭시켜줄 재미있는 내용으로 익혀야 한다. 공부가 아니라 “익히다”라는 단어를 씀에 주목하자.\n전문영역을 외국어로 익힐 때, 두 마리 토끼를 잡을 수 있다\n외국어를 익힐 때 문법, 어휘, 발음 이런 체계적인 학습계획을 세우지 말자. 그렇게 “학문”적으로, “공부”로 받아들일 때, 외국어 마스터의 시기는 점점 멀어진다. 오히려 흥미로운 주제를 정하고 관련된 콘텐츠를 확보하자. 그리고 그 콘텐츠를 난이도로 분류하고 쉬운 내용부터 하나씩 보고, 읽어 나가자. 그러면 귀도 열리고, 눈도 띄인다.\n더 중요한 것이 있다. 그 흥미로운 분야에서 자신의 전문성이 점점 강화된다. 왜? 전문영역에 긴 시간을 들였으니, 어느새 외국어가 아닌 외국 전문 소식을 받아들이는, 소수의 전문인력 한 사람이 되기 때문이다. 언어만 잘하는 게 아니라, 특정 전문 분야의 전문가가 되니 일석이조다.\n결국 외국어를 익히기 전에 우선 외국어를 통해서 어떤 분야의 전문가가 되고 싶은가? 이걸 먼저 정하는 게 좋다. 지금 외국어 콤플렉스를 느끼고 있다면, 그 외국어를 통해서 무엇을 이루고 싶은지 영역을 정하는 게 좋다. 그리고 서점을 가지 말고, 유튜브에서 유익한 영상들을 청취하고, 구글에서 좋은 문서를 찾아보자. 훨씬 더 효율적으로 외국어를 익힐 수 있을 테니.\n<a href=\"http://ppss.kr/archives/10747\" style=\"font-size:27pt;font-weight:bold\">유용한 영어 학습 관련 링크 20개</a>\n2013년 8월 8일 by 김성우</a>\n[유용한 영어 학습 관련 링크 소개] 지난 학기 영어교육과 교육공학 시간에 학생들이 간단한 설명과 함께 추천해 준 사이트를 모아서 정리해 보았습니다. 주석을 달아 주어서 찾아 볼 때 유용한 것 같습니다.\n1. <a href=\"http://tv.blinkx.com/\">블링스 닷컴</a>: 공짜로 네이티브 티비를 즐길수 있습니다\n2. <a href=\"http://www.phrasebank.manchester.ac.uk/\">English Phrase Bank</a>: 글, 특히 공식적인 에세이 류의 글을 쓰시는 경우, 그에 적합한 표현이나 단어 선택이 어려울 때 도움을 받을 수 있는 사이트입니다. 논리 전개에 단계에 맞는 예문이나 구문이 잘 분류되어 있습니다.\n3. <a href=\"http://www.acapela-group.com/text-to-speech-interactive-demo.html\">Acapela</a> (Text to Speech): 위의 주소를 따라 가시면 영어를 비롯해 다양한 언어의 텍스트를 발음으로 변환할 수 있습니다. 영어 중에서도 영국 영어 혹은 미국 영어 등의 억양을 설정하고, 텍스트 박스에 발음을 듣고 싶은 문장을 입력하면 그 억양으로 발음을 해줍니다.\n4. <a href=\"http://www.speakcare.com/zone/speak_four.php\">Speakcare</a>: 원래는 유명 인사들의 연설을 찾다가 들어가게 된 사이트인데 이 사이트에서는 유명 인사의 연설을 들으면서 마이크로 이를 따라 하는 것을 녹음할 수 있게 도와줍니다. 녹음한 것을 듣고 비교해보면서 발음 훈련을 하는 사이트고요, 굳이 녹음하고 연습하지 않아도 연설 자료가 풍부해서 들어가볼 만한 사이트라고 생각합니다.\n5. <a href=\"http://www.spartacus.schoolnet.co.uk/\">Spartacus Educational</a>: 이 웹사이트에서는 역사 백과사전을 무료로 제공합니다. 각 항목에는 이야기와 그림, 일차 자료 등이 포함되어 있습니다. 역사적 인물이나 사건에 대해 매우 자세히 알아볼 수 있어요.\n6. <a href=\"http://quizlet.com/\">Quizlet</a>: 최근에 제가 이용하는 사이트입니다. 새로운 언어를 배울때 재밌게 단어를 배울수있어서 좋은것 같습니다.\n7. <a href=\"http://www.sparknotes.com/\">Sparksnote</a>: 저는 주로 옛 영어로 쓰여 있는 소설이나 글을 이해 하지 못할 때 이 사이트를 사용합니다. 옛 영어가 아니여도 영문학 책들에 대한 분석과 요약도 있어 많은 도움을 줍니다. 특히 셰익스피어의 작품을 읽었을 때 엄청난 큰 도움을 주었고 (아예 “no fear Shakespeare”이란 섹션도 있습니다) 고등학교 때 거의 매일 방문했던 사이트입니다.\n8. <a href=\"http://www.cliffsnotes.com/\">Cliffsnotes</a> & <a href=\"http://www.pinkmonkey.com/\">Pinkmonkey</a>: Sparknotes 처럼 책 읽다가 모르는 부분이나 좀 더 깊게 알고 싶을때 사용하는 사이트입니다. 영어교육과 전공필수인 ‘영어영문학의 이해’ 들을때 엄청 도움 됐습니다. 책의 요약이나 주제, 캐릭터 분석 등등 많은 정보가 있으니 한번 사용해보세요!\n9. <a href=\"http://www.phrases.org.uk/\">Phrase Finder</a>: ‘영어 구절’의 뜻을 풀이해 둔 사이트입니다. ‘구절’은 숙어/속담과 비슷하긴 한데 약간 다릅니다. 문화적, 역사적 배경이 많이 필요하기 때문에 타문화 사람들이 이해하기 어려운 경우가 많은데요. 위 사이트에서는 그 유래까지 설명해주고 있어 참 좋습니다. 영미권 드라마 볼 때, 자막 제작할 때 많은 도움을 받을 수 있습니다.\n10. <a href=\"http://www.addic7ed.com/\">Addic7ed</a>: 드라마/영화/뮤지컬 등 각종 영상물의 영어 자막을 구할 수 있는 사이트입니다. 개인이 만든 것이 아닌 방송사에서 배포한 자막들이라 정확성이 꽤 높습니다.\n11. <a href=\"http://www.easybib.com/\">EasyBib</a>: Bib는 Bibliography의 약자로 영문 에세이를 쓸 때 참고문헌을 자동으로 빠르게 제작해주는 사이트입니다.\n12. <a href=\"http://rpo.library.utoronto.ca/\">RPO</a>: 작가, 제목, 시대, 비평 등 다양한 기준으로 영시를 검색할 수 있는 토론토 대학의 온라인 웹사이트입니다.\n13. <a href=\"https://www.facebook.com/kr.arts.britishcouncil\">British Council Arts</a>: 영국 예술과 관련된 다양한 소식과 자료를 접할 수 있는 페이스북 페이지입니다.\n14. <a href=\"http://www.how-to-learn-any-language.com/\">How to learn any language</a>: 언어를 배우기 좋아하는 사람들이 이룬 네트워크. 다양한 언어에 대한 정보부터 공부하는 것 자체에 대한 팁을 볼수 있습니다!\n15. <a href=\"http://ppss.kr/archives/www.gradesaver.com\">Grade Saver</a>: 특히 학교에서 시나 문학작품을 다룰때 요약과 분석을 자주 보는 편입니다. 이뿐만 아니라 다양한 에세이도 많아 작품에 대해 쉽게 이해할 수 있도록 도움이 되며 직접 에세이를 쓰는 데도 아주 큰 도움이 됨니다. 마지막으로 퀴즈가 있어 작품을 잘 이해했는지 자가진단도 할 수 있어 좋습니다.\n16. <a href=\"http://dictionary.reference.com/\">Dictionary.com</a>: 단어의 의미나, 비슷한 의미를 가진 영어 동의어/반대 의미를 가진 영어 반의어 등을 찾을 때 유용하고, 그 외 여러 가지 서비스도 제공하고 있습니다. (덧붙여 스마트폰 앱으로도 있기 때문에 스마트폰에서 이용할 수도 있어, 편리합니다)\n17. <a href=\"http://www.urbandictionary.com/\">Urban Dictionary</a>: 일종의 영영사전인데요. 사전적 의미가 아닌 실제 미국인들이 쓰는 생활속 영어가 많아요. 영어로 주고 받는 편지나 대화에 유용할 것 같아서 찾았습니다.\n18. <a href=\"http://www.etymonline.com\">Online Etymology Dictionary</a>: 영어 단어의 어원을 찾을 때 사용할 수 있는 사전입니다.\n19. <a href=\"http://www.watchseries-online.eu/2009/10/recent-episodes.html\">Watchseries Online</a>: 영국 드라마와 미국 드라마를 회원가입없이 무료로 볼 수 있습니다. 미국드라마의 경우 미국에서 방영되고 하루 만에 또는 몇 시간 만에라도 그 에피소드가 업데이트 되는 장점이 있군요.\n20. <a href=\"http://englishpod.com/\">English Pod</a>: 영어 팟캐스트. 초심자 등급부터 고급 등급까지 다양한 레벨이 설정되어 있습니다. 어려운 단어나 일상에서 유용한 표현들을 배울 수 있는 섹션도 따로 마련되어 있고요.\n나는 어른이 된 뒤에도 몇 개의 외국어를 더 익혔습니다. 특히 프랑스어는 아래의 방법을 이용해 17일 만에 어느 정도 말할 수 있게 되었지요. 물론 나는 영어를 모국어로 가지고 있으며 스페인어를 외국어로 이미 익혔다는 사실을 염두에 두시길 바랍니다.\n2005년, 나는 프랑스 보졸레 지방의 작은 마을에서 프랑스 친구와 머물렀습니다. 그 마을에는 영어를 말할 수 있는 사람이 한 명도 없었죠. 내 친구 역시 프랑스어를 익히겠다는 나의 목표를 알았기에 내게 영어를 쓰지 않았습니다.\n나는 매일 같은 일을 반복할 수 있도록 일정을 짰습니다. 오전에는 일어나자마자 한 시간 반에서 두 시간을 규칙동사와 불규칙 동사를 손으로 썼습니다. 나는 2주 동안 연습장 한 권을 다 채웠지요. 나는 지금도 손으로 쓰는 것이 무언가를 외울 때 가장 효율적인 방법이라고 생각합니다.\n동사를 쓰는 동안 나는 마이클 토마스의 ‘불어학습.mp3’를 들었습니다. 이는 영어 사용자에게 불어를 가르치는 내용입니다. 특히 마치 수업을 들을 때처럼, 다른 학생들이 저지르는 실수를 듣는 것이 많은 도움이 되었습니다. 2주 동안 나는 기초, 중급, 고급 코스를 모두 2번씩 들을 수 있었습니다.\n나는 점심을 먹기 전에 45분에서 60분 정도를 프랑스 노래를 들으며 달렸습니다. 노래는 그 언어의 억양을 익힐 수 있는 좋은 방법이며, 노래를 따라 부르면서 그 언어에 맞는 얼굴 근육을 훈련할 수 있습니다.\n점심은 내 친구와 그녀의 다른 프랑스 친구들과 같이 먹었습니다. 그들은 나를 특별히 배려해주지 않았기 때문에 굶지 않으려면 그들의 말을 알아들을 수밖에 없었습니다.\n오후에는 프랑스 친구들과 다트를 하거나 불즈(Boules, 볼링과 비슷한 놀이)를 했고, 그렇지 않으면 프랑스어로 된 <찰리와 초콜릿 공장>을 읽었습니다. 새로운 언어를 배울 때 아동용 책을 읽는 것은 도움이 됩니다. 우선 문장들이 간단하고, 그리고 이미 줄거리를 알고 있기 때문에 새로운 단어의 뜻을 사전 없이도 쉽게 추측할 수 있습니다. 놀라운 점은 외국어로 아이들 책을 읽으면 더 재미있다는 겁니다.\n나는 하루에 한 시간 이상 프랑스어로 된 간단한 글을 썼고 내 친구는 틀린 점을 고쳐주었습니다. 외국에 나가면 당신은 같은 질문을 받게 됩니다. “어디에서 왔나요?”, “직업이 뭔가요?”, “프랑스를 좋아하나요?”. 이런 질문들에 대한 답을 글로 쓰면서 연습하게 되면 당신은 외국인과 더 당당하게 이야기할 수 있게 됩니다.\n또다른 비법은 “음~”, “그러니까~”와 같은 메움말을 익히는 것입니다. 프랑스어에는 “alors, en fait” 등이 있습니다. 이 말은 아무 뜻 없이 그저 문장 중간에 하는 말입니다. 이 말을 하면서 대화 중에 시간을 벌 수 있습니다.\n17일 뒤 나는 그 마을을 떠나 파리로 갔습니다. 나는 커피 숍에서 한 소녀를 만나 이야기를 시작했지요. 몇 분 뒤, 그녀는 내게 프랑스에 얼마나 오래 살았냐고 묻더군요. 나는 17일이라고 말했고, 그녀는 내가 분명이 1년 이상 살았을 것이라고 확신하더군요.\n어떤 분야의 영어 전문가가 될 것인가?\n1. VOCA - 매일 문장과 함께\n2. 문법 -\n리딩 - 테크 관련 기사들, 영한대역 책 구입, 아동용 도서\n듣기 - 어플, 미드 보기 한영 자막, 영어 노래 듣기\n쓰기 - 하루에 한 바닥 필사하기\n말하기 - ????\n<a href=\"https://www.youtube.com/watch?feature=player_embedded&v=d0yGdNEWdn0\">https://www.youtube.com/watch?feature=player_embedded&v=d0yGdNEWdn0</a>\n종로 토플 1:1 랩스 어학원 http://thelabs.kr/lms_board/index.php?code=2_1</a>\n영어공부 방법 TED\n<a href=\"https://www.vingle.net/posts/843107?m=fklmi#/posts/843107\">https://www.vingle.net/posts/843107?m=fklmi#/posts/843107</a>\n해외연수 없이 한국에서 영어실력 높이기\n<a href=\"http://ppss.kr/archives/58236\">http://ppss.kr/archives/58236</a>\n워싱턴 특파원이 되기까지\n<a href=\"http://officen.kr/mobile/officetalk/viewtalk.do;jsessionid=1277882599CFFC9F8C93FEA6CBC55FC0?articleSeq=597&boardSeq=17&curPage=1&subcategory=0&finish=0\">http://officen.kr/mobile/officetalk/viewtalk.do;jsessionid=1277882599CFFC9F8C93FEA6CBC55FC0?articleSeq=597&boardSeq=17&curPage=1&subcategory=0&finish=0</a>\nhttp://kimjongwook.com/2014/03/02/reading/\n<a href=\"http://ppss.kr/archives/65521\">http://ppss.kr/archives/65521</a>\n내가 관심을 가지는 주제는 경영, 인수합병, 기술의 변화 등이다. 그래서 내게 영어가 절실히 필요한 이유는 스티브 잡스와 앨론 머스크의 연설을 직접 육성으로 알아듣기 위해서이다. 중국어가 필요한 이유는 텐센트의 마화텅, 샤오미의 레이쥔 회장의 연설을 직접 듣기 위해서다.\n결국 외국어를 익히기 전에 우선 외국어를 통해서 어떤 분야의 전문가가 되고 싶은가? 이걸 먼저 정하는 게 좋다.&#160;지금 외국어 콤플렉스를 느끼고 있다면,&#160;그 외국어를 통해서 무엇을 이루고 싶은지 영역을 정하는 게 좋다.&#160;그리고 서점을 가지 말고, 유튜브에서 유익한 영상들을 청취하고, 구글에서 좋은 문서를 찾아보자. 훨씬 더 효율적으로 외국어를 익힐 수 있을 테니.\nhttp://ppss.kr/archives/65521"
  }

const CONTENT_HASH = '3816d384';

let cards = [];
let moving = null, resizing = null;
let selectedIdx = null, clipboardCard = null;
const GRID = 20, GAP = 14;
function snap(v) { return Math.round(v / GRID) * GRID; }

// ── Undo (Ctrl+Z) ────────────────────────────────────────────────────────────
const MAX_HISTORY = 50;
let history = [];
function snapshot() {
  syncText();
  history.push(JSON.stringify(cards));
  if (history.length > MAX_HISTORY) history.shift();
}
function undo() {
  if (!history.length) { showStatus('되돌릴 내용 없음'); return; }
  syncText();
  cards = JSON.parse(history.pop());
  renderCards();
  saveBoard();
  showStatus('↩ 되돌림');
}
function showStatus(msg) {
  const s = document.getElementById('status');
  s.textContent = msg;
  clearTimeout(showStatus._t);
  showStatus._t = setTimeout(() => { s.textContent = ''; }, 2000);
}
document.addEventListener('keydown', e => {
  const isText = document.activeElement?.contentEditable === 'true';
  if ((e.ctrlKey || e.metaKey) && e.key === 'z' && !e.shiftKey) {
    if (isText) return;
    e.preventDefault();
    undo();
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'c' && !e.shiftKey && !isText) {
    if (selectedIdx !== null && cards[selectedIdx]) {
      syncText();
      clipboardCard = JSON.parse(JSON.stringify(cards[selectedIdx]));
      showStatus('카드 복사됨');
      e.preventDefault();
    }
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'v' && !e.shiftKey && !isText) {
    if (clipboardCard) {
      e.preventDefault();
      snapshot();
      const nc = JSON.parse(JSON.stringify(clipboardCard));
      nc.x = (nc.x || 0) + 30; nc.y = (nc.y || 0) + 30;
      cards.push(nc);
      selectedIdx = cards.length - 1;
      renderCards(); saveBoard();
      showStatus('카드 붙여넣음');
    }
  }
  if (e.key === 'Escape') {
    document.querySelectorAll('.card.selected').forEach(c => c.classList.remove('selected'));
    selectedIdx = null;
  }
});

function pushCards(movedIdx) {
  const moved = cards[movedIdx];
  const movedEl = document.querySelector(`.card[data-idx="${movedIdx}"]`);
  if (!movedEl) return;
  const mh = movedEl.offsetHeight;
  document.querySelectorAll('.card').forEach(el => {
    const i = +el.dataset.idx;
    if (i === movedIdx) return;
    const c = cards[i], oh = el.offsetHeight;
    if (moved.x < (c.x+(c.w||200)) && (moved.x+(moved.w||200)) > c.x && moved.y < (c.y+oh) && (moved.y+mh) > c.y) {
      c.y = moved.y + mh + GAP;
      el.style.top = c.y + 'px';
    }
  });
}

function loadBoard() {
  const saved = localStorage.getItem(SAVE_KEY);
  const savedHash = localStorage.getItem(SAVE_KEY + ':hash');
  let parsed = null;
  try { parsed = saved ? JSON.parse(saved) : null; } catch(e) {}
  // reset if: no save, empty array, or content hash changed (page regenerated)
  if (!parsed || parsed.length === 0 || savedHash !== CONTENT_HASH) {
    cards = DEFAULT_CARDS.map(c => ({...c}));
    localStorage.removeItem(SAVE_KEY);
    localStorage.setItem(SAVE_KEY + ':hash', CONTENT_HASH);
    renderCards();
    const hasCoords = cards.some(c => c.x !== undefined && c.y !== undefined);
    if (!hasCoords) autoLayout();
    return;
  }
  cards = parsed;
  renderCards();
}
function resetToDefaults() { if (!confirm('저장된 보드를 지우고 원본으로 초기화합니다. 계속할까요?')) return; localStorage.removeItem(SAVE_KEY); cards = DEFAULT_CARDS.map(c => ({...c})); renderCards(); autoLayout(); }

function autoLayout() {
  const boardW = document.getElementById('board').offsetWidth;
  const cols = Math.max(1, Math.floor(boardW / 280));
  const colW = (boardW - GAP*(cols-1)) / cols;
  const colH = new Array(cols).fill(0);
  const allCards = document.querySelectorAll('.card');
  const images = document.querySelectorAll('.card img');
  let loaded = 0;
  function place() {
    allCards.forEach((el, i) => {
      const w = Math.min(cards[i].w || colW, colW);
      let minCol = 0;
      for (let c = 1; c < cols; c++) if (colH[c] < colH[minCol]) minCol = c;
      cards[i].x = minCol * (colW + GAP);
      cards[i].y = colH[minCol];
      cards[i].w = w;
      el.style.left = cards[i].x + 'px';
      el.style.top = cards[i].y + 'px';
      el.style.width = w + 'px';
      colH[minCol] = cards[i].y + el.offsetHeight + GAP;
    });
    document.getElementById('board').style.minHeight = (Math.max(...colH) + 100) + 'px';
    saveBoard();
  }
  if (!images.length) { requestAnimationFrame(place); return; }
  images.forEach(img => {
    if (img.complete) { loaded++; if (loaded >= images.length) requestAnimationFrame(place); }
    else { img.onload = img.onerror = () => { loaded++; if (loaded >= images.length) requestAnimationFrame(place); }; }
  });
}

function syncText() {
  document.querySelectorAll('.card').forEach(el => {
    const i = +el.dataset.idx;
    if (cards[i]?.type === 'text') { const t = el.querySelector('.text'); if (t) cards[i].content = t.innerHTML; }
  });
}
function saveBoard() { syncText(); localStorage.setItem(SAVE_KEY, JSON.stringify(cards)); localStorage.setItem(SAVE_KEY + ':hash', CONTENT_HASH); showStatus('저장됨 ' + new Date().toLocaleTimeString()); }

function renderCards() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  cards.forEach((card, i) => {
    const el = document.createElement('div');
    el.className = 'card'; el.dataset.idx = i;
    if (card.x !== undefined) el.style.left = card.x + 'px';
    if (card.y !== undefined) el.style.top = card.y + 'px';
    // html cards contain raw OneNote table HTML which may overflow the stated div width
    if (card.w) { if (card.type === 'html') el.style.minWidth = card.w + 'px'; else el.style.width = card.w + 'px'; }
    el.addEventListener('mousedown', e => {
      if (e.target.closest('.text, a, .card-btn, .resize-handle, td, th')) return;
      e.preventDefault();
      // Update selection
      document.querySelectorAll('.card.selected').forEach(c => c.classList.remove('selected'));
      selectedIdx = i; el.classList.add('selected');
      snapshot();
      moving = { idx: i, startX: e.clientX, startY: e.clientY, origX: card.x||0, origY: card.y||0 };
      el.classList.add('moving');
    });
    const actions = document.createElement('div'); actions.className = 'card-actions';
    const delBtn = document.createElement('button'); delBtn.className = 'card-btn'; delBtn.textContent = '×';
    delBtn.onclick = e => { e.stopPropagation(); if(confirm('삭제?')) { snapshot(); cards.splice(i,1); renderCards(); saveBoard(); } };
    actions.appendChild(delBtn); el.appendChild(actions);
    if (card.type === 'text') {
      const text = document.createElement('div'); text.className = 'text'; text.contentEditable = true;
      text.innerHTML = card.content || '';
      text.addEventListener('focus', () => { snapshot(); });
      text.addEventListener('blur', () => { card.content = text.innerHTML; saveBoard(); });
      el.appendChild(text);
    } else if (card.type === 'image') {
      const img = document.createElement('img');
      img.src = card.src.startsWith('http') || card.src.startsWith('data:') ? card.src : IMG_BASE + card.src;
      img.alt = ''; img.loading = 'lazy'; img.onerror = () => img.style.display = 'none';
      if (card.w) img.style.width = card.w + 'px';
      if (card.h) img.style.height = card.h + 'px';
      if (card.link) { const a = document.createElement('a'); a.href = card.link; a.target = '_blank'; a.appendChild(img); el.appendChild(a); }
      else { el.appendChild(img); }
      if (card.caption) { const cap = document.createElement('div'); cap.style.cssText = 'font-size:11px;color:#8b949e;margin-top:4px;word-break:break-word;padding:0 2px;'; cap.textContent = card.caption; el.appendChild(cap); }
    } else if (card.type === 'html') {
      const wrapper = document.createElement('div');
      wrapper.style.cssText = 'overflow:auto;font-size:13px;line-height:1.5;';
      wrapper.innerHTML = card.html.replace(/__ATTACHMENT__/g, IMG_BASE);
      wrapper.querySelectorAll('img').forEach(img => { img.style.maxWidth = '100%'; img.style.height = 'auto'; img.draggable = false; });
      wrapper.querySelectorAll('a').forEach(a => { a.target = '_blank'; a.style.color = '#6cb0f6'; });
      wrapper.querySelectorAll('table').forEach(t => { t.style.borderCollapse = 'collapse'; });
      wrapper.querySelectorAll('td,th').forEach(td => {
        td.style.border = '1px solid #444'; td.style.padding = '4px 6px'; td.style.verticalAlign = 'top';
        td.title = '더블클릭으로 편집';
        td.addEventListener('dblclick', function(e) {
          e.stopPropagation();
          snapshot();
          this.contentEditable = 'true';
          this.style.outline = '2px solid #388bfd';
          this.style.background = 'rgba(56,139,253,0.08)';
          this.focus();
        });
        td.addEventListener('blur', function() {
          this.contentEditable = 'false';
          this.style.outline = '';
          this.style.background = '';
          cards[i].html = wrapper.innerHTML.split(IMG_BASE).join('__ATTACHMENT__');
          saveBoard();
        });
      });
      el.appendChild(wrapper);
    } else if (card.type === 'table') {
      const rows = card.rows || [['','',''],['','',''],['','','']];
      const tbl = document.createElement('table');
      tbl.style.cssText = 'border-collapse:collapse;width:100%;font-size:13px;';
      rows.forEach((row, ri) => {
        const tr = tbl.insertRow();
        row.forEach((cell, ci) => {
          const td = document.createElement(ri === 0 ? 'th' : 'td');
          td.contentEditable = true;
          td.style.cssText = 'border:1px solid #30363d;padding:4px 8px;min-width:60px;text-align:left;' + (ri===0 ? 'background:#21262d;font-weight:600;' : '');
          td.textContent = cell;
          td.addEventListener('blur', () => { if (!cards[i].rows) cards[i].rows = rows; rows[ri][ci] = td.textContent; saveBoard(); });
          tr.appendChild(td);
        });
      });
      el.appendChild(tbl);
      const addRow = document.createElement('button');
      addRow.textContent = '+ 행'; addRow.style.cssText = 'margin-top:4px;font-size:11px;background:#21262d;border:1px solid #30363d;color:#8b949e;padding:2px 8px;border-radius:4px;cursor:pointer;';
      addRow.onclick = e => { e.stopPropagation(); snapshot(); if (!cards[i].rows) cards[i].rows = rows; cards[i].rows.push(new Array(cards[i].rows[0].length).fill('')); renderCards(); saveBoard(); };
      const addCol = document.createElement('button');
      addCol.textContent = '+ 열'; addCol.style.cssText = 'margin-top:4px;margin-left:4px;font-size:11px;background:#21262d;border:1px solid #30363d;color:#8b949e;padding:2px 8px;border-radius:4px;cursor:pointer;';
      addCol.onclick = e => { e.stopPropagation(); snapshot(); if (!cards[i].rows) cards[i].rows = rows; cards[i].rows.forEach(r => r.push('')); renderCards(); saveBoard(); };
      el.appendChild(addRow); el.appendChild(addCol);
    }
    const rh = document.createElement('div'); rh.className = 'resize-handle';
    rh.addEventListener('mousedown', e => { e.preventDefault(); e.stopPropagation(); snapshot(); resizing = { idx: i, startX: e.clientX, startW: card.w || el.offsetWidth }; });
    el.appendChild(rh);
    if (i === selectedIdx) el.classList.add('selected');
    board.appendChild(el);
  });
  requestAnimationFrame(() => {
    let maxB = 0;
    document.querySelectorAll('.card').forEach(el => { const b = (parseFloat(el.style.top)||0) + el.offsetHeight; if (b > maxB) maxB = b; });
    board.style.minHeight = (maxB + 100) + 'px';
  });
}

document.addEventListener('mousemove', e => {
  if (moving) {
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`); if (!el) return;
    let nx = moving.origX + e.clientX - moving.startX, ny = moving.origY + e.clientY - moving.startY;
    if (e.shiftKey) { nx = snap(nx); ny = snap(ny); el.style.outline = '1px dashed rgba(240,192,64,0.3)'; } else { el.style.outline = ''; }
    el.style.left = nx + 'px'; el.style.top = ny + 'px';
  }
  if (resizing) {
    let nw = resizing.startW + e.clientX - resizing.startX; if (e.shiftKey) nw = snap(nw);
    cards[resizing.idx].w = Math.max(100, nw);
    const el = document.querySelector(`.card[data-idx="${resizing.idx}"]`); if (el) el.style.width = cards[resizing.idx].w + 'px';
  }
});

document.addEventListener('mouseup', e => {
  if (moving) {
    let nx = moving.origX + e.clientX - moving.startX, ny = moving.origY + e.clientY - moving.startY;
    if (e.shiftKey) { nx = snap(nx); ny = snap(ny); }
    cards[moving.idx].x = Math.max(0, nx); cards[moving.idx].y = Math.max(0, ny);
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`); if (el) { el.classList.remove('moving'); el.style.outline = ''; }
    if (e.shiftKey) pushCards(moving.idx);
    moving = null; saveBoard();
  }
  if (resizing) { if (e.shiftKey) pushCards(resizing.idx); resizing = null; saveBoard(); }
});

function addTextCard() { snapshot(); cards.push({ type: 'text', content: '', x: 50, y: window.scrollY+100, w: 300 }); renderCards(); setTimeout(() => { const els = document.querySelectorAll('.card .text'); els[els.length-1]?.focus(); }, 100); }
function addImageCard() { const input = document.createElement('input'); input.type = 'file'; input.accept = 'image/*'; input.onchange = e => { const f = e.target.files[0]; if (!f) return; const r = new FileReader(); r.onload = () => { snapshot(); cards.push({ type: 'image', src: r.result, x: 50, y: window.scrollY+100, w: 240 }); renderCards(); saveBoard(); }; r.readAsDataURL(f); }; input.click(); }
function addImageUrl() { const url = prompt('이미지 URL'); if (!url) return; snapshot(); cards.push({ type: 'image', src: url, x: 50, y: window.scrollY+100, w: 240 }); renderCards(); saveBoard(); }
function addTableCard() {
  const colsStr = prompt('열 수 (기본 3)', '3'); const cols = Math.max(1, parseInt(colsStr)||3);
  const rowsStr = prompt('행 수 (헤더 포함, 기본 4)', '4'); const rows = Math.max(1, parseInt(rowsStr)||4);
  snapshot();
  cards.push({ type: 'table', rows: Array.from({length: rows}, (_, ri) => Array.from({length: cols}, (_, ci) => ri===0 ? `열${ci+1}` : '')), x: 50, y: window.scrollY+100, w: Math.max(240, cols*100) });
  renderCards(); saveBoard();
}
function exportBoard() { syncText(); const blob = new Blob([JSON.stringify(cards, null, 2)], { type: 'application/json' }); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = SAVE_KEY + '.json'; a.click(); }
// ── Zoom ─────────────────────────────────────────────────────────────────────
let zoom = parseFloat(localStorage.getItem('zoom-' + SAVE_KEY) || '1.0');
function applyZoom() {
  const board = document.getElementById('board');
  board.style.transform = `scale(${zoom})`;
  board.style.transformOrigin = '0 0';
  document.getElementById('zoom-level').textContent = Math.round(zoom * 100) + '%';
  localStorage.setItem('zoom-' + SAVE_KEY, zoom);
}
function zoomIn()  { zoom = Math.min(3.0, parseFloat((zoom + 0.1).toFixed(2))); applyZoom(); }
function zoomOut() { zoom = Math.max(0.2, parseFloat((zoom - 0.1).toFixed(2))); applyZoom(); }
document.addEventListener('keydown', e => {
  if (e.ctrlKey || e.metaKey) {
    if (e.key === '=' || e.key === '+') { e.preventDefault(); zoomIn(); }
    if (e.key === '-')                  { e.preventDefault(); zoomOut(); }
    if (e.key === '0')                  { e.preventDefault(); zoom = 1.0; applyZoom(); }
  }
});
document.getElementById('board').addEventListener('wheel', e => {
  if (!(e.ctrlKey || e.metaKey)) return;
  e.preventDefault();
  e.deltaY < 0 ? zoomIn() : zoomOut();
}, { passive: false });
applyZoom();
function resetLayout() { if (!confirm('자동 재배치합니다.')) return; cards.forEach(c => { delete c.x; delete c.y; }); renderCards(); autoLayout(); }
// ── Floating format toolbar ───────────────────────────────────────────────────
const fmtBar = document.getElementById('format-toolbar');
function fmt(cmd) { document.execCommand(cmd, false, null); saveBoard(); }
function fmtLink() {
  const sel = window.getSelection();
  if (!sel || sel.isCollapsed) return;
  const url = prompt('링크 URL 입력', 'https://');
  if (!url) return;
  document.execCommand('createLink', false, url);
  // make links open in new tab
  sel.anchorNode?.parentElement?.closest('a')?.setAttribute('target', '_blank');
  document.querySelectorAll('.text a').forEach(a => a.target = '_blank');
  saveBoard();
}

// prevent format buttons from blurring contenteditable
fmtBar.addEventListener('mousedown', e => e.preventDefault());

document.addEventListener('selectionchange', () => {
  const sel = window.getSelection();
  if (!sel || sel.isCollapsed || !sel.toString().trim()) { fmtBar.style.display = 'none'; return; }
  // only show if selection is inside a .text element
  const anchor = sel.anchorNode;
  if (!anchor) { fmtBar.style.display = 'none'; return; }
  const textEl = anchor.nodeType === 1 ? anchor.closest('.text') : anchor.parentElement?.closest('.text');
  if (!textEl) { fmtBar.style.display = 'none'; return; }
  // position above selection
  const range = sel.getRangeAt(0);
  const rect = range.getBoundingClientRect();
  fmtBar.style.display = 'flex';
  const tbW = fmtBar.offsetWidth || 180;
  let left = rect.left + rect.width / 2 - tbW / 2;
  left = Math.max(8, Math.min(left, window.innerWidth - tbW - 8));
  fmtBar.style.left = left + 'px';
  fmtBar.style.top = (rect.top - 44 + window.scrollY) + 'px';
});

setInterval(saveBoard, 30000);
loadBoard();
</script>
</body>
</html>
