an style=\"font-family:se-nanumgothic\">비타민 B12는 채식을 하니 따로 챙겨먹는 것으로 보입니다.</span> </p>\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><a href=\"https://blog.naver.com/ecotogether/222999194247\" style=\"font-family:Malgun Gothic\">비타민</a> <span style=\"font-family:Malgun Gothic\">화성인</span>, <span style=\"font-family:Malgun Gothic\">에코투게더</span> : <span style=\"font-family:Malgun Gothic\">네이버</span> <span style=\"font-family:Malgun Gothic\">블로그</span> (naver.com)</p>\r\n\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><a href=\"https://blog.naver.com/PostView.naver?blogId=ecotogether&amp;logNo=223000997866&amp;parentCategoryNo=9&amp;categoryNo=&amp;viewDate=&amp;isShowPopularPosts=true&amp;from=search\" style=\"font-family:Malgun Gothic\">회춘에</a> <span style=\"font-family:Malgun Gothic\">매년</span> 25<span style=\"font-family:Malgun Gothic\">억</span> <span style=\"font-family:Malgun Gothic\">쏟아붓는</span> <span style=\"font-family:Malgun Gothic\">남자의</span> <span style=\"font-family:Malgun Gothic\">영양제</span> <span style=\"font-family:Malgun Gothic\">리스트</span>(2<span style=\"font-family:Malgun Gothic\">편</span>) : <span style=\"font-family:Malgun Gothic\">네이버</span> <span style=\"font-family:Malgun Gothic\">블로그</span> (naver.com)</p>\r\n\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><a href=\"https://blog.naver.com/ecotogether/223005172415\">https://blog.naver.com/ecotogether/223005172415</a></p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\">=================================</p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">서른</span> <span style=\"font-family:Malgun Gothic\">넘어가면서</span> <span style=\"font-family:Malgun Gothic\">꼭</span> <span style=\"font-family:Malgun Gothic\">챙겨야</span> <span style=\"font-family:Malgun Gothic\">하는</span> 3<span style=\"font-family:Malgun Gothic\">가지</span></p>\r\n\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"> </p>\r\n\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">오메가</span>3</p>\r\n\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">만성염증과</span> <span style=\"font-family:Malgun Gothic\">미세</span> <span style=\"font-family:Malgun Gothic\">염증을</span> <span style=\"font-family:Malgun Gothic\">낮춰주는</span> <span style=\"font-family:Malgun Gothic\">안전한</span> <span style=\"font-family:Malgun Gothic\">영양제입니다</span>. <span style=\"font-family:Malgun Gothic\">부담스럽지</span> <span style=\"font-family:Malgun Gothic\">않은</span> <span style=\"font-family:Malgun Gothic\">가격이지만</span> <span style=\"font-family:Malgun Gothic\">효과가</span> <span style=\"font-family:Malgun Gothic\">정말</span> <span style=\"font-family:Malgun Gothic\">좋은</span> <span style=\"font-family:Malgun Gothic\">영양제입니다</span>. <span style=\"font-family:Malgun Gothic\">피쉬</span> <span style=\"font-family:Malgun Gothic\">오일이라고도</span> <span style=\"font-family:Malgun Gothic\">불리니</span> <span style=\"font-family:Malgun Gothic\">참고해주세요</span>.</p>\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">마그네슘</span><span lang=\"en-US\">: </span><span style=\"font-family:Malgun Gothic\">저녁</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">식사</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">이후</span></p>\r\n\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">스트레스를</span> <span style=\"font-family:Malgun Gothic\">낮춰줄</span> <span style=\"font-family:Malgun Gothic\">수</span> <span style=\"font-family:Malgun Gothic\">있습니다</span>. <span style=\"font-family:Malgun Gothic\">아주</span> <span style=\"font-family:Malgun Gothic\">안전하게</span> <span style=\"font-family:Malgun Gothic\">스트레스를</span> <span style=\"font-family:Malgun Gothic\">낮춰주며</span>, <span style=\"font-family:Malgun Gothic\">피로를</span> <span style=\"font-family:Malgun Gothic\">풀어주는데</span> <span style=\"font-family:Malgun Gothic\">도움을</span> <span style=\"font-family:Malgun Gothic\">줍니다</span>. <span style=\"font-family:Malgun Gothic\">특히</span>, <span style=\"font-family:Malgun Gothic\">섭취</span> <span style=\"font-family:Malgun Gothic\">후에</span> <span style=\"font-family:Malgun Gothic\">빠른</span> <span style=\"font-family:Malgun Gothic\">효과를</span> <span style=\"font-family:Malgun Gothic\">보여줍니다</span>. <span style=\"font-family:Malgun Gothic\">마그네슘은</span> <span style=\"font-family:Malgun Gothic\">신체와</span> <span style=\"font-family:Malgun Gothic\">정신을</span> <span style=\"font-family:Malgun Gothic\">릴랙스</span> <span style=\"font-family:Malgun Gothic\">하게</span> <span style=\"font-family:Malgun Gothic\">해</span> <span style=\"font-family:Malgun Gothic\">준다고</span> <span style=\"font-family:Malgun Gothic\">생각하시면</span> <span style=\"font-family:Malgun Gothic\">쉽습니다</span>.</p>\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">비타민</span>B</p>\r\n\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">피곤함의</span> <span style=\"font-family:Malgun Gothic\">핵심</span> <span style=\"font-family:Malgun Gothic\">원인이</span> <span style=\"font-family:Malgun Gothic\">비타민</span>B<span style=\"font-family:Malgun Gothic\">입니다</span>. <span style=\"font-family:Malgun Gothic\">섭취를</span> <span style=\"font-family:Malgun Gothic\">하면</span> <span style=\"font-family:Malgun Gothic\">강장효과를</span> <span style=\"font-family:Malgun Gothic\">내고</span>, <span style=\"font-family:Malgun Gothic\">혈관</span> <span style=\"font-family:Malgun Gothic\">독소를</span> <span style=\"font-family:Malgun Gothic\">제거하는데</span> <span style=\"font-family:Malgun Gothic\">도움을</span> <span style=\"font-family:Malgun Gothic\">줍니다</span>. <span style=\"font-family:Malgun Gothic\">신경재생에</span> <span style=\"font-family:Malgun Gothic\">꼭</span> <span style=\"font-family:Malgun Gothic\">필요한</span> <span style=\"font-family:Malgun Gothic\">비타민이고</span>, <span style=\"font-family:Malgun Gothic\">그래서</span> <span style=\"font-family:Malgun Gothic\">뇌</span> <span style=\"font-family:Malgun Gothic\">건강에도</span> <span style=\"font-family:Malgun Gothic\">좋습니다</span>. <span style=\"font-family:Malgun Gothic\">타우린</span> <span style=\"font-family:Malgun Gothic\">성분이</span> <span style=\"font-family:Malgun Gothic\">많이</span> <span style=\"font-family:Malgun Gothic\">들어있는</span> <span style=\"font-family:Malgun Gothic\">에너지</span> <span style=\"font-family:Malgun Gothic\">드링크를</span> <span style=\"font-family:Malgun Gothic\">드시기</span> <span style=\"font-family:Malgun Gothic\">전에</span>, <span style=\"font-family:Malgun Gothic\">우선</span> <span style=\"font-family:Malgun Gothic\">비타민</span>B<span style=\"font-family:Malgun Gothic\">부터</span> <span style=\"font-family:Malgun Gothic\">꼭</span> <span style=\"font-family:Malgun Gothic\">챙기세요</span>.</p>\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">한국인에게</span> <span style=\"font-family:Malgun Gothic\">필수적으로</span> <span style=\"font-family:Malgun Gothic\">필요한</span> 6<span style=\"font-family:Malgun Gothic\">가지</span> <span style=\"font-family:Malgun Gothic\">영양제로</span> <span style=\"font-family:Malgun Gothic\">종합비타민제</span>, <span style=\"font-family:Malgun Gothic\">비타민</span> D, <span style=\"font-family:Malgun Gothic\">오메가</span>-3, <span style=\"font-family:Malgun Gothic\">칼슘과</span> <span style=\"font-family:Malgun Gothic\">마그네슘</span> <span style=\"font-family:Malgun Gothic\">복합제제</span>, <span style=\"font-family:Malgun Gothic\">프로바이오틱스</span>, <span style=\"font-family:Malgun Gothic\">비타민</span> C<span style=\"font-family:Malgun Gothic\">를</span> <span style=\"font-family:Malgun Gothic\">꼽으셨습니다</span>. <span style=\"font-family:Malgun Gothic\">이걸</span> <span style=\"font-family:Malgun Gothic\">전부</span> <span style=\"font-family:Malgun Gothic\">복용하면</span> <span style=\"font-family:Malgun Gothic\">위에</span> <span style=\"font-family:Malgun Gothic\">부담이</span> <span style=\"font-family:Malgun Gothic\">가지</span> <span style=\"font-family:Malgun Gothic\">않을까요</span>?</p>\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">괜찮습니다</span>. <span style=\"font-family:Malgun Gothic\">저와</span> <span style=\"font-family:Malgun Gothic\">남편은</span> <span style=\"font-family:Malgun Gothic\">매일</span> <span style=\"font-family:Malgun Gothic\">스물</span> <span style=\"font-family:Malgun Gothic\">몇</span> <span style=\"font-family:Malgun Gothic\">알의</span> <span style=\"font-family:Malgun Gothic\">서로</span> <span style=\"font-family:Malgun Gothic\">다른</span> <span style=\"font-family:Malgun Gothic\">캡슐과</span> <span style=\"font-family:Malgun Gothic\">태블릿</span>(tablet)<span style=\"font-family:Malgun Gothic\">을</span> <span style=\"font-family:Malgun Gothic\">먹어요</span>. <span style=\"font-family:Malgun Gothic\">그렇게</span> <span style=\"font-family:Malgun Gothic\">먹어도</span> <span style=\"font-family:Malgun Gothic\">위나</span> <span style=\"font-family:Malgun Gothic\">간에</span> <span style=\"font-family:Malgun Gothic\">무리가</span> <span style=\"font-family:Malgun Gothic\">되지</span> <span style=\"font-family:Malgun Gothic\">않게</span> <span style=\"font-family:Malgun Gothic\">되어</span> <span style=\"font-family:Malgun Gothic\">있어요</span>. <span style=\"font-family:Malgun Gothic\">예를</span> <span style=\"font-family:Malgun Gothic\">들면</span> <span style=\"font-family:Malgun Gothic\">종합비타민제를</span> <span style=\"font-family:Malgun Gothic\">먹는데</span> <span style=\"font-family:Malgun Gothic\">항산화제인</span> <span style=\"font-family:Malgun Gothic\">비타민</span> A<span style=\"font-family:Malgun Gothic\">를</span> <span style=\"font-family:Malgun Gothic\">또</span> <span style=\"font-family:Malgun Gothic\">먹으면</span> <span style=\"font-family:Malgun Gothic\">문제가</span> <span style=\"font-family:Malgun Gothic\">돼요</span>. <span style=\"font-family:Malgun Gothic\">그런</span> <span style=\"font-family:Malgun Gothic\">경우가</span> <span style=\"font-family:Malgun Gothic\">아니라면</span> <span style=\"font-family:Malgun Gothic\">종합비타민제</span>, <span style=\"font-family:Malgun Gothic\">비타민</span>D, <span style=\"font-family:Malgun Gothic\">오메가</span>-3, <span style=\"font-family:Malgun Gothic\">유산균</span>(<span style=\"font-family:Malgun Gothic\">프로바이오틱스</span>), <span style=\"font-family:Malgun Gothic\">비타민</span> C<span style=\"font-family:Malgun Gothic\">는</span> <span style=\"font-family:Malgun Gothic\">서로</span> <span style=\"font-family:Malgun Gothic\">다른</span> <span style=\"font-family:Malgun Gothic\">성분이기</span> <span style=\"font-family:Malgun Gothic\">때문에</span> <span style=\"font-family:Malgun Gothic\">함께</span> <span style=\"font-family:Malgun Gothic\">먹어도</span> <span style=\"font-family:Malgun Gothic\">괜찮아요</span>.</p>\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Apple SD Gothic Neo;font-size:13.5pt;color:#848280;background-color:#191a1a;font-weight:bold\">2 피부에 가장 좋은 영양제는?</span></p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">비타민 C와 B군이다. 비타민 C는 피부 멜라닌 색소의 합성을 억제하는 미백 효과가 있어 고용량으로 장기간 복용하면 기미나 주근깨를 없애고, 피부 내 새로운 콜라겐을 생성해 피부를 팽팽하게 만들어준다.</span></p>\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">비타민 B군은 피지 분해를 활성화하고 비타민 C를 도와 콜라겐 생성을 돕는 작용을 하므로 비타민 C와 같이 섭취하면 좋다.</span></p>\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Apple SD Gothic Neo;font-size:13.5pt;color:#848280;background-color:#191a1a;font-weight:bold\">3 나이대별 꼭 필요한 피부 영양제가 있다면?</span></p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">20대는 콜라겐 생성에 변화가 생기므로 콜라겐 합성에 도움을 주는 비타민 C가 필수. 피부 미백과 탄력, 철분 흡수를 촉진해 빈혈에 좋고 독소도 배출시킨다.</span></p>\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">스트레스가 많은 30대 직장인이라면 비타민 B군을 추천. 피부 점막과 피부 대사를 원활하게 해서 거칠고 푸석거리는 피부를 회복시킨다. 칼슘, 마그네슘, 철분도 30대에게 꼭 필요한 서플리먼트다.</span></p>\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">40대는 강력한 항산화 작용을 하는 비타민 E로 노화를 예방하라. 피부의 세포 재생 효과를 높여 탄력과 주름을 관리할 수 있다. 또 건조함, 기미 등은 미네랄 함량이 높은 아연이나 오메가-3 지방산이 도움이 된다.</span></p>\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Apple SD Gothic Neo;font-size:13.5pt;color:#848280;background-color:#191a1a;font-weight:bold\">4 마시는 콜라겐이나 비타민 워터도 피부 미용에 도움이 되나요?</span></p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">콜라겐을 먹거나 바르는 데 있어 가장 핵심은 흡수율이다. 그냥 콜라겐은 고분자 형태로 아무리 많이 섭취해도 90% 이상이 체외로 배출된다. 더구나 시판되는 미용 음료는 맛을 내기 위해 당분이 많이 들어 있고 실제 콜라겐이나 비타민은 소량 들어 있는 경우가 대부분.</span></p>\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">최근에 저분자화한 콜라겐펩타이드를 넣은 콜라겐 음료가 출시되기도 했는데, 체내 아미노산의 농도가 증가되어 콜라겐 합성이 촉진되었다는 연구 결과도 있지만, 손톱이나 모발이 건강해지는 효과까지만 증명된 상태로 피부에 직접적인 영향을 기대하기는 어렵다.</span></p>\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Apple SD Gothic Neo;font-size:13.5pt;color:#848280;background-color:#191a1a;font-weight:bold\">5 영양제를 제대로 고르는 요령과 올바른 복용법을 알려주세요.</span></p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">비타민이나 미네랄을 구입할 때는 원산지와 제형을 따져봐야 한다. 특징에 맞춰 흡수율을 높일 수 있는 방법으로 섭취해야 하기 때문. 예를 들어 비타민 A나 E 같은 지용성 비타민은 오일 성분과 함께 흡수시켜야 하기 때문에 연질 캡슐인 것이 좋고, 비타민 C는 물에 녹여 먹을 때가 알약 형태보다 1시간 정도 빨리 흡수된다.</span></p>\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">원산지의 경우도 영국산 비타민 C는 5번의 공정 과정을 거치지만 중국산은 3번의 공정 과정만 거치기 때문에 유럽이나 미국 등에서 좋은 원료를 가지고 만든 것을 추천한다.</span></p>\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">또 천연 원료 비타민의 경우 실제는 1% 미만의 극소량만 포함되어 있는 경우도 있으니 성분을 꼼꼼히 확인해야 한다.</span></p>\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Apple SD Gothic Neo;font-size:13.5pt;color:#848280;background-color:#191a1a;font-weight:bold\">피부 컨디션에 맞게 골라 먹는 뷰티 비타민</span></p>\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<!-- Processing ImageNode failed -->\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Apple SD Gothic Neo;font-size:13.5pt;color:#848280;background-color:#191a1a;font-weight:bold\">1</span><span style=\"font-family:Malgun Gothic\">&#160;피부 면역력을 높이고 싶다면&#160;</span><span style=\"font-family:Apple SD Gothic Neo;font-size:13.5pt;color:#848280;background-color:#191a1a;font-weight:bold\">GNC 츄어블 비타민 C 500&amp;E</span></p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">비타민 C 500mg과 베타카로틴, 비타민 E가 들어 있는 영양제로 물 없이 씹어 먹는 제형이라 남녀노소 누구나 손쉽게 섭취할 수 있다. 철분 흡수를 도우면서 유해산소로부터 세포를 보호하는 효과가 탁월해 항산화 영양소가 필요한 30대 직장인들이 간편하게 챙겨 먹기 좋다.&#160;</span><span style=\"font-family:Apple SD Gothic Neo;font-size:13.5pt;color:#848280;background-color:#191a1a;font-weight:bold\">90정 3만8천원</span><span style=\"font-family:Malgun Gothic\">.</span></p>\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Apple SD Gothic Neo;font-size:13.5pt;color:#848280;background-color:#191a1a;font-weight:bold\">문의</span><span style=\"font-family:Malgun Gothic\">&#160;080-700-0277</span></p>\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Apple SD Gothic Neo;font-size:13.5pt;color:#848280;background-color:#191a1a;font-weight:bold\">2</span><span style=\"font-family:Malgun Gothic\">&#160;화이트닝 케어가 시급하다면&#160;</span><span style=\"font-family:Apple SD Gothic Neo;font-size:13.5pt;color:#848280;background-color:#191a1a;font-weight:bold\">오르비스 화이트 스텝 비타민 C</span></p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">미백 효과가 탁월한 비타민 C는 화이트닝 화장품의 단골 성분. 특히 자외선 노출이 잦거나 기미나 주근깨 때문에 고민이라면 더블 비타민 C를 지속적으로 섭취해 화이트닝 케어를 해볼 것.&#160;</span><span style=\"font-family:Apple SD Gothic Neo;font-size:13.5pt;color:#848280;background-color:#191a1a;font-weight:bold\">180정 3만6천원</span><span style=\"font-family:Malgun Gothic\">.</span></p>\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Apple SD Gothic Neo;font-size:13.5pt;color:#848280;background-color:#191a1a;font-weight:bold\">문의</span><span style=\"font-family:Malgun Gothic\">&#160;080-301-5050</span></p>\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Apple SD Gothic Neo;font-size:13.5pt;color:#848280;background-color:#191a1a;font-weight:bold\">3</span><span style=\"font-family:Malgun Gothic\">&#160;탱탱한 피부 탄력을 원할 때&#160;</span><span style=\"font-family:Apple SD Gothic Neo;font-size:13.5pt;color:#848280;background-color:#191a1a;font-weight:bold\">세노비스 츄어블 비타민 C</span></p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">한 알에 고함량 비타민 C 500mg이 들어 있어 간편하게 하루 권장량을 섭취할 수 있다. 탱탱한 피부를 위한 콜라겐 합성을 돕고 뇌, 혈관, 피부 등 활성산소에 손상받는 신체 세포를 보호한다.&#160;</span><span style=\"font-family:Apple SD Gothic Neo;font-size:13.5pt;color:#848280;background-color:#191a1a;font-weight:bold\">60정 2만5천원</span><span style=\"font-family:Malgun Gothic\">.</span></p>\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Apple SD Gothic Neo;font-size:13.5pt;color:#848280;background-color:#191a1a;font-weight:bold\">문의</span><span style=\"font-family:Malgun Gothic\">&#160;080-050-3535</span></p>\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Apple SD Gothic Neo;font-size:13.5pt;color:#848280;background-color:#191a1a;font-weight:bold\">4</span><span style=\"font-family:Malgun Gothic\">&#160;건조한 사무실에서 피부 수분 충전&#160;</span><span style=\"font-family:Apple SD Gothic Neo;font-size:13.5pt;color:#848280;background-color:#191a1a;font-weight:bold\">뷰티인 아쿠아 플러스</span></p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">100% 고순도 국내산 히알루론산을 담은 보습 영양제. 히알루론산 생성에 도움을 주는 N-아세틸글루코사민과 피부 세포의 재생을 촉진하는 식용 달팽이 추출물, 콜라겐의 합성을 돕는 석류 추출물이 피부 속 수분을 증가시킨다.&#160;</span><span style=\"font-family:Apple SD Gothic Neo;font-size:13.5pt;color:#848280;background-color:#191a1a;font-weight:bold\">60정 4만8천원</span><span style=\"font-family:Malgun Gothic\">.</span></p>\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Apple SD Gothic Neo;font-size:13.5pt;color:#848280;background-color:#191a1a;font-weight:bold\">문의</span><span style=\"font-family:Malgun Gothic\">&#160;02&#183;828-0181</span></p>\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Apple SD Gothic Neo;font-size:13.5pt;color:#848280;background-color:#191a1a;font-weight:bold\">5</span><span style=\"font-family:Malgun Gothic\">&#160;불규칙한 생활과 스트레스가 오래 지속될 때&#160;</span><span style=\"font-family:Apple SD Gothic Neo;font-size:13.5pt;color:#848280;background-color:#191a1a;font-weight:bold\">네이처스플러스 식물성 비타민 슈퍼 C-1000</span></p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">한 알에 고함량의 비타민 C 1000mg과 식물성 영양소라 불리는 로즈힙 추출 분말 100mg이 들어있다. 활성산소로부터 피부 세포 손상을 막는 항산화 영양소로, 평소 과일이나 채소보다는 육류를 즐겨 먹는 사람들에게 추천한다.&#160;</span><span style=\"font-family:Apple SD Gothic Neo;font-size:13.5pt;color:#848280;background-color:#191a1a;font-weight:bold\">60정 4만5천원</span><span style=\"font-family:Malgun Gothic\">.</span></p>\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Apple SD Gothic Neo;font-size:13.5pt;color:#848280;background-color:#191a1a;font-weight:bold\">문의</span><span style=\"font-family:Malgun Gothic\">&#160;031&#183;726-9250</span></p>\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Apple SD Gothic Neo;font-size:13.5pt;color:#848280;background-color:#191a1a;font-weight:bold\">6</span><span style=\"font-family:Malgun Gothic\">&#160;피부가 푸석하고 보습이 필요할 때&#160;</span><span style=\"font-family:Apple SD Gothic Neo;font-size:13.5pt;color:#848280;background-color:#191a1a;font-weight:bold\">CJ제일제당 미니 서플리 스킨라인 No.1</span></p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">가방 속에 넣고 다니며 언제 어디서든 하루에 한 번 챙겨 먹을 수 있다. 피부 보습에 도움을 주는 글루코실세라마이드와 피부 점막을 형성하고 기능을 유지시키는 비타민 A가 들어 있다.&#160;</span><span style=\"font-family:Apple SD Gothic Neo;font-size:13.5pt;color:#848280;background-color:#191a1a;font-weight:bold\">6정 3천8백원</span><span style=\"font-family:Malgun Gothic\">.</span></p>\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Apple SD Gothic Neo;font-size:13.5pt;color:#848280;background-color:#191a1a;font-weight:bold\">문의</span><span style=\"font-family:Malgun Gothic\">&#160;02&#183;788-7300</span></p>\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Apple SD Gothic Neo;font-size:13.5pt;color:#848280;background-color:#191a1a;font-weight:bold\">피부 좋아지는 영양제 성분사전</span></p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Apple SD Gothic Neo;font-size:13.5pt;color:#848280;background-color:#191a1a;font-weight:bold\">RNA&#183;DNA 복합체</span></p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">새로운 세포의 생성을 촉진하며 피부를 매끄럽게 만든다. 활성산소 제거 효소와 야생얌 피부 조직의 성장과 재생을 돕고 탄력을 준다(기준량 300mg). 베타카로틴 활성산소로부터 피부를 보호한다(기준량 10000IU).</span></p>\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Apple SD Gothic Neo;font-size:13.5pt;color:#848280;background-color:#191a1a;font-weight:bold\">비타민 C</span></p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">상처와 타박상을 입은 피부를 빠르게 치유한다(기준량 500mg).</span></p>\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Apple SD Gothic Neo;font-size:13.5pt;color:#848280;background-color:#191a1a;font-weight:bold\">비타민 E</span></p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">얼굴의 미세한 모세혈관의 혈액순환을 돕고, 피부 재생 효과가 있다(기준량 400~800IU).</span></p>\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Apple SD Gothic Neo;font-size:13.5pt;color:#848280;background-color:#191a1a;font-weight:bold\">비타민 B 복합체(판토텐산 함유)</span></p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">세포의 생성과 상처 치유에 탁월하다(기준량 50mg).</span></p>\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Apple SD Gothic Neo;font-size:13.5pt;color:#848280;background-color:#191a1a;font-weight:bold\">유기유황</span></p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">피부 재생을 돕는 콜라겐 생성을 촉진한다(기준량 1000mg).</span></p>\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Apple SD Gothic Neo;font-size:13.5pt;color:#848280;background-color:#191a1a;font-weight:bold\">필수지방산</span></p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">아마씨유에는 피부가 촉촉해지는 오메가-3 지방산이 풍부하다(기준량 1000mg).</span></p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Apple SD Gothic Neo;font-size:13.5pt;color:#848280;background-color:#191a1a;font-weight:bold\">RNA&#183;DNA 복합체</span></p>\r\n\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Apple SD Gothic Neo;font-size:13.5pt;color:#848280;background-color:#191a1a;font-weight:bold\">L-시스테인</span></p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">피부가 젊고 부드러워진다. 매일 식사 사이의 공복에 먹을 것(기준량 100mg).</span></p>\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Apple SD Gothic Neo;font-size:13.5pt;color:#848280;background-color:#191a1a;font-weight:bold\">RNA&#183;DNA 복합체</span></p>\r\n\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Apple SD Gothic Neo;font-size:13.5pt;color:#848280;backgrou     "w": 600,
    "content": "바코파 몬니에리. 기억력 향상. 카바. 과유사. 니코틴껌."
  },
  {
    "type": "image",
    "x": 1272,
    "y": 11412,
    "w": 480,
    "src": "93e99024b1.png",
    "h": 425,
    "caption": "시스템 생성 대체 텍스트: 문 #326864997 주문 일 2023 년 7월 12 일 제품 준비 중 배송 예정일 7월 15일 - 20일 종합: ₩118419 Linc 00盈0#5 Best BioPerine 함유 고 = 百수 COQ10. 100mg. 소- 수량: 1 재구매하기 Carlson, 아연. 15mg, 250정 수량: 1 재구매하기 Natrol, 아사이베리. 500 mg, 베지 &#39;결슐 75정 트질 120정 수량: 2 재구매하기 Califomia G이d Nutrition G이d C USP 수량: 1 재구매하기 등급 비타민C 1.000mg. 베지 &#39;절슐 240정 - 250정 Solgar, 전연 원료 비 타민E. 268mg(40이U). 소므- 수량: 1 재구매하기"
  }
];
const CONTENT_HASH = 'e0fc11ba';

let cards = [];
let moving = null, resizing = null;
let selectedIdx = null, clipboardCard = null;
const GRID = 20, GAP = 14;
function snap(v) { return Math.round(v / GRID) * GRID; }

// ── Undo (Ctrl+Z) ────────────────────────────────────────────────────────────
const MAX_HISTORY = 50;
let history = [];
function snapshot() {
  syncText();
  history.push(JSON.stringify(cards));
  if (history.length > MAX_HISTORY) history.shift();
}
function undo() {
  if (!history.length) { showStatus('되돌릴 내용 없음'); return; }
  syncText();
  cards = JSON.parse(history.pop());
  renderCards();
  saveBoard();
  showStatus('↩ 되돌림');
}
function showStatus(msg) {
  const s = document.getElementById('status');
  s.textContent = msg;
  clearTimeout(showStatus._t);
  showStatus._t = setTimeout(() => { s.textContent = ''; }, 2000);
}
document.addEventListener('keydown', e => {
  const isText = document.activeElement?.contentEditable === 'true';
  if ((e.ctrlKey || e.metaKey) && e.key === 'z' && !e.shiftKey) {
    if (isText) return;
    e.preventDefault();
    undo();
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'c' && !e.shiftKey && !isText) {
    if (selectedIdx !== null && cards[selectedIdx]) {
      syncText();
      clipboardCard = JSON.parse(JSON.stringify(cards[selectedIdx]));
      showStatus('카드 복사됨');
      e.preventDefault();
    }
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'v' && !e.shiftKey && !isText) {
    if (clipboardCard) {
      e.preventDefault();
      snapshot();
      const nc = JSON.parse(JSON.stringify(clipboardCard));
      nc.x = (nc.x || 0) + 30; nc.y = (nc.y || 0) + 30;
      cards.push(nc);
      selectedIdx = cards.length - 1;
      renderCards(); saveBoard();
      showStatus('카드 붙여넣음');
    }
  }
  if (e.key === 'Escape') {
    document.querySelectorAll('.card.selected').forEach(c => c.classList.remove('selected'));
    selectedIdx = null;
  }
});

function pushCards(movedIdx) {
  const moved = cards[movedIdx];
  const movedEl = document.querySelector(`.card[data-idx="${movedIdx}"]`);
  if (!movedEl) return;
  const mh = movedEl.offsetHeight;
  document.querySelectorAll('.card').forEach(el => {
    const i = +el.dataset.idx;
    if (i === movedIdx) return;
    const c = cards[i], oh = el.offsetHeight;
    if (moved.x < (c.x+(c.w||200)) && (moved.x+(moved.w||200)) > c.x && moved.y < (c.y+oh) && (moved.y+mh) > c.y) {
      c.y = moved.y + mh + GAP;
      el.style.top = c.y + 'px';
    }
  });
}

function loadBoard() {
  const saved = localStorage.getItem(SAVE_KEY);
  const savedHash = localStorage.getItem(SAVE_KEY + ':hash');
  let parsed = null;
  try { parsed = saved ? JSON.parse(saved) : null; } catch(e) {}
  // reset if: no save, empty array, or content hash changed (page regenerated)
  if (!parsed || parsed.length === 0 || savedHash !== CONTENT_HASH) {
    cards = DEFAULT_CARDS.map(c => ({...c}));
    localStorage.removeItem(SAVE_KEY);
    localStorage.setItem(SAVE_KEY + ':hash', CONTENT_HASH);
    renderCards();
    const hasCoords = cards.some(c => c.x !== undefined && c.y !== undefined);
    if (!hasCoords) autoLayout();
    return;
  }
  cards = parsed;
  renderCards();
}
function resetToDefaults() { if (!confirm('저장된 보드를 지우고 원본으로 초기화합니다. 계속할까요?')) return; localStorage.removeItem(SAVE_KEY); cards = DEFAULT_CARDS.map(c => ({...c})); renderCards(); autoLayout(); }

function autoLayout() {
  const boardW = document.getElementById('board').offsetWidth;
  const cols = Math.max(1, Math.floor(boardW / 280));
  const colW = (boardW - GAP*(cols-1)) / cols;
  const colH = new Array(cols).fill(0);
  const allCards = document.querySelectorAll('.card');
  const images = document.querySelectorAll('.card img');
  let loaded = 0;
  function place() {
    allCards.forEach((el, i) => {
      const w = Math.min(cards[i].w || colW, colW);
      let minCol = 0;
      for (let c = 1; c < cols; c++) if (colH[c] < colH[minCol]) minCol = c;
      cards[i].x = minCol * (colW + GAP);
      cards[i].y = colH[minCol];
      cards[i].w = w;
      el.style.left = cards[i].x + 'px';
      el.style.top = cards[i].y + 'px';
      el.style.width = w + 'px';
      colH[minCol] = cards[i].y + el.offsetHeight + GAP;
    });
    document.getElementById('board').style.minHeight = (Math.max(...colH) + 100) + 'px';
    saveBoard();
  }
  if (!images.length) { requestAnimationFrame(place); return; }
  images.forEach(img => {
    if (img.complete) { loaded++; if (loaded >= images.length) requestAnimationFrame(place); }
    else { img.onload = img.onerror = () => { loaded++; if (loaded >= images.length) requestAnimationFrame(place); }; }
  });
}

function syncText() {
  document.querySelectorAll('.card').forEach(el => {
    const i = +el.dataset.idx;
    if (cards[i]?.type === 'text') { const t = el.querySelector('.text'); if (t) cards[i].content = t.innerHTML; }
  });
}
function saveBoard() { syncText(); localStorage.setItem(SAVE_KEY, JSON.stringify(cards)); localStorage.setItem(SAVE_KEY + ':hash', CONTENT_HASH); showStatus('저장됨 ' + new Date().toLocaleTimeString()); }

function renderCards() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  cards.forEach((card, i) => {
    const el = document.createElement('div');
    el.className = 'card'; el.dataset.idx = i;
    if (card.x !== undefined) el.style.left = card.x + 'px';
    if (card.y !== undefined) el.style.top = card.y + 'px';
    // html cards contain raw OneNote table HTML which may overflow the stated div width
    if (card.w) { if (card.type === 'html') el.style.minWidth = card.w + 'px'; else el.style.width = card.w + 'px'; }
    el.addEventListener('mousedown', e => {
      if (e.target.closest('.text, a, .card-btn, .resize-handle, td, th')) return;
      e.preventDefault();
      // Update selection
      document.querySelectorAll('.card.selected').forEach(c => c.classList.remove('selected'));
      selectedIdx = i; el.classList.add('selected');
      snapshot();
      moving = { idx: i, startX: e.clientX, startY: e.clientY, origX: card.x||0, origY: card.y||0 };
      el.classList.add('moving');
    });
    const actions = document.createElement('div'); actions.className = 'card-actions';
    const delBtn = document.createElement('button'); delBtn.className = 'card-btn'; delBtn.textContent = '×';
    delBtn.onclick = e => { e.stopPropagation(); if(confirm('삭제?')) { snapshot(); cards.splice(i,1); renderCards(); saveBoard(); } };
    actions.appendChild(delBtn); el.appendChild(actions);
    if (card.type === 'text') {
      const text = document.createElement('div'); text.className = 'text'; text.contentEditable = true;
      text.innerHTML = card.content || '';
      text.addEventListener('focus', () => { snapshot(); });
      text.addEventListener('blur', () => { card.content = text.innerHTML; saveBoard(); });
      el.appendChild(text);
    } else if (card.type === 'image') {
      const img = document.createElement('img');
      img.src = card.src.startsWith('http') || card.src.startsWith('data:') ? card.src : IMG_BASE + card.src;
      img.alt = ''; img.loading = 'lazy'; img.onerror = () => img.style.display = 'none';
      if (card.w) img.style.width = card.w + 'px';
      if (card.h) img.style.height = card.h + 'px';
      if (card.link) { const a = document.createElement('a'); a.href = card.link; a.target = '_blank'; a.appendChild(img); el.appendChild(a); }
      else { el.appendChild(img); }
      if (card.caption) { const cap = document.createElement('div'); cap.style.cssText = 'font-size:11px;color:#8b949e;margin-top:4px;word-break:break-word;padding:0 2px;'; cap.textContent = card.caption; el.appendChild(cap); }
    } else if (card.type === 'html') {
      const wrapper = document.createElement('div');
      wrapper.style.cssText = 'overflow:auto;font-size:13px;line-height:1.5;';
      wrapper.innerHTML = card.html.replace(/__ATTACHMENT__/g, IMG_BASE);
      wrapper.querySelectorAll('img').forEach(img => { img.style.maxWidth = '100%'; img.style.height = 'auto'; img.draggable = false; });
      wrapper.querySelectorAll('a').forEach(a => { a.target = '_blank'; a.style.color = '#6cb0f6'; });
      wrapper.querySelectorAll('table').forEach(t => { t.style.borderCollapse = 'collapse'; });
      wrapper.querySelectorAll('td,th').forEach(td => {
        td.style.border = '1px solid #444'; td.style.padding = '4px 6px'; td.style.verticalAlign = 'top';
        td.title = '더블클릭으로 편집';
        td.addEventListener('dblclick', function(e) {
          e.stopPropagation();
          snapshot();
          this.contentEditable = 'true';
          this.style.outline = '2px solid #388bfd';
          this.style.background = 'rgba(56,139,253,0.08)';
          this.focus();
        });
        td.addEventListener('blur', function() {
          this.contentEditable = 'false';
          this.style.outline = '';
          this.style.background = '';
          cards[i].html = wrapper.innerHTML.split(IMG_BASE).join('__ATTACHMENT__');
          saveBoard();
        });
      });
      el.appendChild(wrapper);
    } else if (card.type === 'table') {
      const rows = card.rows || [['','',''],['','',''],['','','']];
      const tbl = document.createElement('table');
      tbl.style.cssText = 'border-collapse:collapse;width:100%;font-size:13px;';
      rows.forEach((row, ri) => {
        const tr = tbl.insertRow();
        row.forEach((cell, ci) => {
          const td = document.createElement(ri === 0 ? 'th' : 'td');
          td.contentEditable = true;
          td.style.cssText = 'border:1px solid #30363d;padding:4px 8px;min-width:60px;text-align:left;' + (ri===0 ? 'background:#21262d;font-weight:600;' : '');
          td.textContent = cell;
          td.addEventListener('blur', () => { if (!cards[i].rows) cards[i].rows = rows; rows[ri][ci] = td.textContent; saveBoard(); });
          tr.appendChild(td);
        });
      });
      el.appendChild(tbl);
      const addRow = document.createElement('button');
      addRow.textContent = '+ 행'; addRow.style.cssText = 'margin-top:4px;font-size:11px;background:#21262d;border:1px solid #30363d;color:#8b949e;padding:2px 8px;border-radius:4px;cursor:pointer;';
      addRow.onclick = e => { e.stopPropagation(); snapshot(); if (!cards[i].rows) cards[i].rows = rows; cards[i].rows.push(new Array(cards[i].rows[0].length).fill('')); renderCards(); saveBoard(); };
      const addCol = document.createElement('button');
      addCol.textContent = '+ 열'; addCol.style.cssText = 'margin-top:4px;margin-left:4px;font-size:11px;background:#21262d;border:1px solid #30363d;color:#8b949e;padding:2px 8px;border-radius:4px;cursor:pointer;';
      addCol.onclick = e => { e.stopPropagation(); snapshot(); if (!cards[i].rows) cards[i].rows = rows; cards[i].rows.forEach(r => r.push('')); renderCards(); saveBoard(); };
      el.appendChild(addRow); el.appendChild(addCol);
    }
    const rh = document.createElement('div'); rh.className = 'resize-handle';
    rh.addEventListener('mousedown', e => { e.preventDefault(); e.stopPropagation(); snapshot(); resizing = { idx: i, startX: e.clientX, startW: card.w || el.offsetWidth }; });
    el.appendChild(rh);
    if (i === selectedIdx) el.classList.add('selected');
    board.appendChild(el);
  });
  requestAnimationFrame(() => {
    let maxB = 0;
    document.querySelectorAll('.card').forEach(el => { const b = (parseFloat(el.style.top)||0) + el.offsetHeight; if (b > maxB) maxB = b; });
    board.style.minHeight = (maxB + 100) + 'px';
  });
}

document.addEventListener('mousemove', e => {
  if (moving) {
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`); if (!el) return;
    let nx = moving.origX + e.clientX - moving.startX, ny = moving.origY + e.clientY - moving.startY;
    if (e.shiftKey) { nx = snap(nx); ny = snap(ny); el.style.outline = '1px dashed rgba(240,192,64,0.3)'; } else { el.style.outline = ''; }
    el.style.left = nx + 'px'; el.style.top = ny + 'px';
  }
  if (resizing) {
    let nw = resizing.startW + e.clientX - resizing.startX; if (e.shiftKey) nw = snap(nw);
    cards[resizing.idx].w = Math.max(100, nw);
    const el = document.querySelector(`.card[data-idx="${resizing.idx}"]`); if (el) el.style.width = cards[resizing.idx].w + 'px';
  }
});

document.addEventListener('mouseup', e => {
  if (moving) {
    let nx = moving.origX + e.clientX - moving.startX, ny = moving.origY + e.clientY - moving.startY;
    if (e.shiftKey) { nx = snap(nx); ny = snap(ny); }
    cards[moving.idx].x = Math.max(0, nx); cards[moving.idx].y = Math.max(0, ny);
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`); if (el) { el.classList.remove('moving'); el.style.outline = ''; }
    if (e.shiftKey) pushCards(moving.idx);
    moving = null; saveBoard();
  }
  if (resizing) { if (e.shiftKey) pushCards(resizing.idx); resizing = null; saveBoard(); }
});

function addTextCard() { snapshot(); cards.push({ type: 'text', content: '', x: 50, y: window.scrollY+100, w: 300 }); renderCards(); setTimeout(() => { const els = document.querySelectorAll('.card .text'); els[els.length-1]?.focus(); }, 100); }
function addImageCard() { const input = document.createElement('input'); input.type = 'file'; input.accept = 'image/*'; input.onchange = e => { const f = e.target.files[0]; if (!f) return; const r = new FileReader(); r.onload = () => { snapshot(); cards.push({ type: 'image', src: r.result, x: 50, y: window.scrollY+100, w: 240 }); renderCards(); saveBoard(); }; r.readAsDataURL(f); }; input.click(); }
function addImageUrl() { const url = prompt('이미지 URL'); if (!url) return; snapshot(); cards.push({ type: 'image', src: url, x: 50, y: window.scrollY+100, w: 240 }); renderCards(); saveBoard(); }
function addTableCard() {
  const colsStr = prompt('열 수 (기본 3)', '3'); const cols = Math.max(1, parseInt(colsStr)||3);
  const rowsStr = prompt('행 수 (헤더 포함, 기본 4)', '4'); const rows = Math.max(1, parseInt(rowsStr)||4);
  snapshot();
  cards.push({ type: 'table', rows: Array.from({length: rows}, (_, ri) => Array.from({length: cols}, (_, ci) => ri===0 ? `열${ci+1}` : '')), x: 50, y: window.scrollY+100, w: Math.max(240, cols*100) });
  renderCards(); saveBoard();
}
function exportBoard() { syncText(); const blob = new Blob([JSON.stringify(cards, null, 2)], { type: 'application/json' }); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = SAVE_KEY + '.json'; a.click(); }
// ── Zoom ─────────────────────────────────────────────────────────────────────
let zoom = parseFloat(localStorage.getItem('zoom-' + SAVE_KEY) || '1.0');
function applyZoom() {
  const board = document.getElementById('board');
  board.style.transform = `scale(${zoom})`;
  board.style.transformOrigin = '0 0';
  document.getElementById('zoom-level').textContent = Math.round(zoom * 100) + '%';
  localStorage.setItem('zoom-' + SAVE_KEY, zoom);
}
function zoomIn()  { zoom = Math.min(3.0, parseFloat((zoom + 0.1).toFixed(2))); applyZoom(); }
function zoomOut() { zoom = Math.max(0.2, parseFloat((zoom - 0.1).toFixed(2))); applyZoom(); }
document.addEventListener('keydown', e => {
  if (e.ctrlKey || e.metaKey) {
    if (e.key === '=' || e.key === '+') { e.preventDefault(); zoomIn(); }
    if (e.key === '-')                  { e.preventDefault(); zoomOut(); }
    if (e.key === '0')                  { e.preventDefault(); zoom = 1.0; applyZoom(); }
  }
});
document.getElementById('board').addEventListener('wheel', e => {
  if (!(e.ctrlKey || e.metaKey)) return;
  e.preventDefault();
  e.deltaY < 0 ? zoomIn() : zoomOut();
}, { passive: false });
applyZoom();
function resetLayout() { if (!confirm('자동 재배치합니다.')) return; cards.forEach(c => { delete c.x; delete c.y; }); renderCards(); autoLayout(); }
// ── Floating format toolbar ───────────────────────────────────────────────────
const fmtBar = document.getElementById('format-toolbar');
function fmt(cmd) { document.execCommand(cmd, false, null); saveBoard(); }
function fmtLink() {
  const sel = window.getSelection();
  if (!sel || sel.isCollapsed) return;
  const url = prompt('링크 URL 입력', 'https://');
  if (!url) return;
  document.execCommand('createLink', false, url);
  // make links open in new tab
  sel.anchorNode?.parentElement?.closest('a')?.setAttribute('target', '_blank');
  document.querySelectorAll('.text a').forEach(a => a.target = '_blank');
  saveBoard();
}

// prevent format buttons from blurring contenteditable
fmtBar.addEventListener('mousedown', e => e.preventDefault());

document.addEventListener('selectionchange', () => {
  const sel = window.getSelection();
  if (!sel || sel.isCollapsed || !sel.toString().trim()) { fmtBar.style.display = 'none'; return; }
  // only show if selection is inside a .text element
  const anchor = sel.anchorNode;
  if (!anchor) { fmtBar.style.display = 'none'; return; }
  const textEl = anchor.nodeType === 1 ? anchor.closest('.text') : anchor.parentElement?.closest('.text');
  if (!textEl) { fmtBar.style.display = 'none'; return; }
  // position above selection
  const range = sel.getRangeAt(0);
  const rect = range.getBoundingClientRect();
  fmtBar.style.display = 'flex';
  const tbW = fmtBar.offsetWidth || 180;
  let left = rect.left + rect.width / 2 - tbW / 2;
  left = Math.max(8, Math.min(left, window.innerWidth - tbW - 8));
  fmtBar.style.left = left + 'px';
  fmtBar.style.top = (rect.top - 44 + window.scrollY) + 'px';
});

setInterval(saveBoard, 30000);
loadBoard();
</script>
