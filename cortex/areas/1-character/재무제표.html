<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>재무제표</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1e1e1e; color: #e0e0e0; font-family: 'Segoe UI', -apple-system, sans-serif; font-size: 15px; line-height: 1.6; padding: 20px 30px 60px; overflow-x: hidden; }
a { color: #6cb0f6; text-decoration: none; }
a:hover { text-decoration: underline; }
.title-bar { background: #3a3a5c; display: inline-block; padding: 6px 16px; font-size: 22px; font-weight: bold; color: #fff; margin-bottom: 4px; }
.date { color: #999; font-size: 13px; margin-bottom: 20px; }
.board { position: relative; }
.card { background: #2a2a2a; border: 1px solid #3a3a3a; border-radius: 8px; padding: 12px; position: absolute; cursor: grab; transition: box-shadow 0.15s; overflow: hidden; }
.card:hover { box-shadow: 0 0 0 1px #58a6ff; z-index: 10; }
.card.moving { opacity: 0.8; box-shadow: 0 4px 24px rgba(0,0,0,0.6); z-index: 100; cursor: grabbing; }
.card img { width: 100%; border-radius: 4px; display: block; }
.card .text { outline: none; min-height: 20px; white-space: pre-wrap; word-break: break-word; }
.card .text:focus { background: rgba(255,255,255,0.05); border-radius: 4px; padding: 4px; }
.card .text:empty::before { content: '텍스트 입력...'; color: #555; }
.card-actions { position: absolute; top: 4px; right: 4px; display: none; gap: 4px; }
.card:hover .card-actions { display: flex; }
.card-btn { background: #333; border: 1px solid #555; color: #ccc; border-radius: 4px; padding: 2px 6px; font-size: 11px; cursor: pointer; }
.card-btn:hover { background: #444; color: #fff; }
.resize-handle { position: absolute; bottom: 0; right: 0; width: 16px; height: 16px; cursor: se-resize; opacity: 0; }
.card:hover .resize-handle { opacity: 0.6; }
.resize-handle::after { content: ''; position: absolute; bottom: 3px; right: 3px; width: 8px; height: 8px; border-right: 2px solid #666; border-bottom: 2px solid #666; }
.card.selected { box-shadow: 0 0 0 2px #58a6ff; z-index: 5; }
.highlight-red { color: #ff6b6b; }
.highlight-blue { color: #6cb0f6; }
.highlight-gold { color: #f0c040; }
.toolbar { position: fixed; bottom: 0; left: 0; right: 0; background: #161b22; border-top: 1px solid #30363d; padding: 8px 20px; display: flex; gap: 12px; align-items: center; z-index: 200; }
.toolbar button { background: #21262d; border: 1px solid #30363d; color: #e0e0e0; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; }
.toolbar button:hover { background: #30363d; }
.toolbar .status { color: #8b949e; font-size: 12px; margin-left: auto; }
#format-toolbar { position: fixed; display: none; background: #1c2128; border: 1px solid #444c56; border-radius: 8px; padding: 4px 6px; gap: 2px; align-items: center; z-index: 500; box-shadow: 0 4px 16px rgba(0,0,0,0.5); }
#format-toolbar button { background: none; border: none; color: #cdd9e5; padding: 4px 8px; border-radius: 5px; cursor: pointer; font-size: 13px; line-height: 1; }
#format-toolbar button:hover { background: #373e47; }
#format-toolbar .sep { width: 1px; height: 16px; background: #444c56; margin: 0 2px; }
</style>
</head>
<body>
<div class="title-bar" contenteditable="true">재무제표</div>
<div class="date"></div>
<div class="board" id="board"></div>
<div id="format-toolbar">
  <button onmousedown="e=>e.preventDefault()" onclick="fmt('bold')" title="굵게"><b>B</b></button>
  <button onclick="fmt('italic')" title="기울임"><i>I</i></button>
  <button onclick="fmt('underline')" title="밑줄"><u>U</u></button>
  <div class="sep"></div>
  <button onclick="fmtLink()" title="링크 삽입">🔗</button>
  <button onclick="fmt('unlink')" title="링크 제거">✂</button>
</div>
<div class="toolbar">
  <button onclick="undo()" title="Ctrl+Z">↩ 실행취소</button>
  <button onclick="addTextCard()">+ 텍스트</button>
  <button onclick="addImageCard()">+ 이미지</button>
  <button onclick="addImageUrl()">+ 이미지 URL</button>
  <button onclick="addTableCard()">+ 표</button>
  <button onclick="saveBoard()">💾 저장</button>
  <button onclick="exportBoard()">📤 내보내기</button>
  <button onclick="resetLayout()">↺ 재배치</button>
  <button onclick="resetToDefaults()" style="color:#f85149">↺ 초기화</button>
  <div style="display:flex;align-items:center;gap:4px;margin-left:8px;border-left:1px solid #30363d;padding-left:12px;">
    <button onclick="zoomOut()" title="Ctrl+-" style="padding:6px 10px;">−</button>
    <span id="zoom-level" style="font-size:12px;color:#8b949e;min-width:36px;text-align:center;">100%</span>
    <button onclick="zoomIn()" title="Ctrl+=" style="padding:6px 10px;">+</button>
  </div>
  <span class="status" id="status">Ready</span>
</div>
<script>
const SAVE_KEY = 'board-재무제표';
const IMG_BASE = '../../attachments/';
const DEFAULT_CARDS = [
  {
    "type": "html",
    "x": 48,
    "y": 139,
    "w": 635,
    "html": "\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<div style=\"display:inline-block;width:480px;height:200px;background:#2d333b;border-radius:4px;margin:2px;vertical-align:top;opacity:0.4\"></div>\r\n\t\t\t<br />\r\n\t\t\t<div style=\"display:inline-block;width:480px;height:600px;background:#2d333b;border-radius:4px;margin:2px;vertical-align:top;opacity:0.4\"></div>\r\n\t\t\t<div style=\"display:inline-block;width:480px;height:200px;background:#2d333b;border-radius:4px;margin:2px;vertical-align:top;opacity:0.4\"></div>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">재무<span lang=\"\">제</span>표</p>\r\n\t\t\t<ol>\r\n\t\t\t\t<li style=\"font-size:10pt\">포괄손익계산서</li>\r\n\t\t\t\t<li style=\"font-size:10pt\">재무상태표</li>\r\n\t\t\t\t<li style=\"font-size:10pt\">자산변동표</li>\r\n\t\t\t\t<li style=\"font-size:10pt\">현금흐름표</li>\r\n\t\t\t\t<li style=\"font-size:10pt\">주석</li>\r\n\t\t\t\t<br />\r\n\t\t\t</ol>\r\n\t\t\t<br />\r\n\t\t\t<p data-tag=\"remember-for-later\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:13pt;font-weight:bold\">제</span><span lang=\"en-US\" style=\"font-size:13pt;font-weight:bold\"> 1</span><span style=\"font-size:13pt;font-weight:bold\">장</span><span lang=\"en-US\" style=\"font-size:13pt;font-weight:bold\"> </span><span style=\"font-size:13pt;font-weight:bold\">재무</span></p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">■<span lang=\"en-US\"> </span>기업가치<span lang=\"en-US\"> </span>측정</p>\r\n\t\t\t<ol>\r\n\t\t\t\t<li style=\"font-size:10pt\"><span lang=\"en-US\">Valuation - <span lang=\"ko-KR\">기업의</span> <span lang=\"ko-KR\">가격</span> <span lang=\"ko-KR\">책정</span></span></li>\r\n\t\t\t\t<li style=\"font-size:10pt\"><span lang=\"en-US\">EVA(Economic Value Added) - <span lang=\"ko-KR\">기업의</span> <span lang=\"ko-KR\">성과</span> <span lang=\"ko-KR\">측정</span></span></li>\r\n\t\t\t\t<li style=\"font-size:10pt\">주식의<span lang=\"en-US\"> </span>이전<span lang=\"en-US\">, </span>기업의<span lang=\"en-US\"> </span>양도<span lang=\"en-US\">(</span>매매<span lang=\"en-US\">), </span>상속<span lang=\"en-US\">/</span>증여를<span lang=\"en-US\"> </span>위한<span lang=\"en-US\"> </span>유가증권<span lang=\"en-US\"> </span>평가</li>\r\n\t\t\t</ol>\r\n\t\t\t<br />\r\n\t\t\t<ol>\r\n\t\t\t\t<li style=\"font-size:10pt\"><span lang=\"en-US\">Valuation</span></li>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">ㅇ<span lang=\"en-US\"> </span>시장가치<span lang=\"en-US\"> </span>접근법</p>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">상장주식<span lang=\"en-US\">: </span>평가<span lang=\"en-US\"> </span>기준일<span lang=\"en-US\"> </span>종가<span lang=\"en-US\"> X </span>주식<span lang=\"en-US\"> </span>수</p>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">비상장주식<span lang=\"en-US\">:</span></p>\r\n\t\t\t\t<li style=\"font-size:10pt\">일반<span lang=\"en-US\"> </span>법인<span lang=\"en-US\">: </span></li>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">순손익가치<span lang=\"en-US\"> X 60% + </span>순자산가치<span lang=\"en-US\"> X 40%</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">= (<span lang=\"ko-KR\">순손익가치</span> X 3 + <span lang=\"ko-KR\">순자산가치</span> X 2) / 5</p>\r\n\t\t\t\t<li style=\"font-size:10pt\">부동산과다법인<span lang=\"en-US\">(</span>부동산<span lang=\"en-US\"> 50%</span>초과<span lang=\"en-US\">): </span>순손익가치<span lang=\"en-US\"> X 40% + </span>순자산가치<span lang=\"en-US\"> 60%</span></li>\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"> = (<span lang=\"ko-KR\">순손익가치</span> X 2 + <span lang=\"ko-KR\">순자산가치</span> X 3) / 5</p>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">순손익가치<span lang=\"en-US\"> = </span>평가기준일<span lang=\"en-US\"> </span>직전사업년도<span lang=\"en-US\"> </span>말<span lang=\"en-US\"> (</span>총자산<span lang=\"en-US\"> - </span>부채<span lang=\"en-US\"> + </span>영업권<span lang=\"en-US\">) / </span>발생주식총수</p>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">순자산가치<span lang=\"en-US\"> = </span>평가기준일이<span lang=\"en-US\"> </span>속하는<span lang=\"en-US\"> </span>연도의<span lang=\"en-US\"> </span>직전사업년도<span lang=\"en-US\"> (</span>순손익액<span lang=\"en-US\">/10%) / </span>발생주식총수</p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">*<span lang=\"ko-KR\">상장</span>/<span lang=\"ko-KR\">비상장여부</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"> <span lang=\"ko-KR\">경영상태</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"> <span lang=\"ko-KR\">부동산</span> <span lang=\"ko-KR\">과다법인</span> <span lang=\"ko-KR\">여부</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"> <span lang=\"ko-KR\">최대주주의</span> <span lang=\"ko-KR\">과점주주</span> <span lang=\"ko-KR\">여부</span></p>\r\n\t\t\t\t<br />\r\n\t\t\t</ol>\r\n\t\t\t<br />\r\n\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">ROI(Return On Investment)<span lang=\"ko-KR\">투자수익률</span>: NI(Net Income)<span lang=\"ko-KR\">당기순이익</span> / Assets(<span lang=\"ko-KR\">총자산</span>)</p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">= <span lang=\"ko-KR\">매출액</span> <span lang=\"ko-KR\">당기순이익률</span> X <span lang=\"ko-KR\">총자산</span> <span lang=\"ko-KR\">회전율</span></p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">= (NI / <span lang=\"ko-KR\">매출액</span>) X (<span lang=\"ko-KR\">매출액</span> / Assets<span lang=\"ko-KR\">총자산</span>)</p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">ROA(Return On Assets)<span lang=\"ko-KR\">총자산수익률</span>: OP(Operation Profit)<span lang=\"ko-KR\">영업이익</span> / Assets(<span lang=\"ko-KR\">총자산</span>)</p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">= <span lang=\"ko-KR\">매출액</span> <span lang=\"ko-KR\">영업이익률</span> X <span lang=\"ko-KR\">총자산</span> <span lang=\"ko-KR\">회전율</span></p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">= (OP / <span lang=\"ko-KR\">매출액</span>) X (<span lang=\"ko-KR\">매출액</span> / Assets<span lang=\"ko-KR\">총자산</span>)</p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">ROE(Return On Equity)<span lang=\"ko-KR\">순자산수익률</span>: NI(Net Income)<span lang=\"ko-KR\">당기순이익</span> / OE(Owner&#39;s Equity)<span lang=\"ko-KR\">자기자본</span>.<span lang=\"ko-KR\">순자산</span></p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">= <span lang=\"ko-KR\">매출액</span> <span lang=\"ko-KR\">당기순이익률</span> X <span lang=\"ko-KR\">총자산</span> <span lang=\"ko-KR\">회전률</span> X <span lang=\"ko-KR\">재무</span> <span lang=\"ko-KR\">레버리지</span></p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">= (NI / <span lang=\"ko-KR\">매출액</span>) X (<span lang=\"ko-KR\">매출액</span> / Assets) X (Assets / OE<span lang=\"ko-KR\">자기자본</span>)</p>\r\n\t\t\t<br />\r\n\t\t\t<ul>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">ㅇ<span lang=\"en-US\"> (</span>비상장사<span lang=\"en-US\">) PER/PBR </span>시가순자산법과<span lang=\"en-US\"> </span>순이익법</p>\r\n\t\t\t\t<li style=\"font-size:10pt\">자산가치<span lang=\"en-US\">: BPS(Book-value Per Share)</span>주당순자산가치<span lang=\"en-US\"> X </span>동종업계<span lang=\"en-US\"> PBR(Price on Book-value Ratio)</span>주당총자산비율<span lang=\"en-US\"> X </span>주식<span lang=\"en-US\"> </span>수</li>\r\n\t\t\t\t<li style=\"font-size:10pt\">수익가치<span lang=\"en-US\">: EPS(Equity Per Share)</span>주당순이익<span lang=\"en-US\"> X </span>동종업계<span lang=\"en-US\"> PER(Price Equity Ratio)</span>주당순이익비율<span lang=\"en-US\"> X </span>주식<span lang=\"en-US\"> </span>수</li>\r\n\t\t\t</ul>\r\n\t\t\t<br />\r\n\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">EPS(Equity Per Share)<span lang=\"ko-KR\">주당순이익</span> = NI / <span lang=\"ko-KR\">주식</span> <span lang=\"ko-KR\">수</span></p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">PER(Price Equity Ratio)<span lang=\"ko-KR\">주당</span>/<span lang=\"ko-KR\">주가순이익비율</span> = <span lang=\"ko-KR\">시장주가</span> / EPS = <span lang=\"ko-KR\">시가총액</span> / NI</p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">BPS(Book-value Per Share)<span lang=\"ko-KR\">주당순자산가치</span> = OE<span lang=\"ko-KR\">순자산</span>.<span lang=\"ko-KR\">총자본</span> / <span lang=\"ko-KR\">주식</span> <span lang=\"ko-KR\">수</span></p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">PBR(Price on Book-value Ratio)<span lang=\"ko-KR\">주당</span>/<span lang=\"ko-KR\">주가순자산비율</span> = <span lang=\"ko-KR\">시장주가</span> / BPS = <span lang=\"ko-KR\">시가총액</span> / Assets</p>\r\n\t\t\t<br />\r\n\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">*PBR<span lang=\"ko-KR\">가</span> 1<span lang=\"ko-KR\">이라고</span> <span lang=\"ko-KR\">가정</span> <span lang=\"ko-KR\">할</span> <span lang=\"ko-KR\">경우</span>, <span lang=\"ko-KR\">시가총액</span> = OE<span lang=\"ko-KR\">순자산</span></p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"> ROE = NI / OE <span lang=\"ko-KR\">는</span> PER = <span lang=\"ko-KR\">시가총액</span>(=OE) / NI<span lang=\"ko-KR\">의</span> <span lang=\"ko-KR\">역수</span></p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"> <span lang=\"ko-KR\">즉</span>, <span lang=\"ko-KR\">동종업체의</span> PER<span lang=\"ko-KR\">가</span> 18<span lang=\"ko-KR\">인</span> <span lang=\"ko-KR\">경우</span> <span lang=\"ko-KR\">이의</span> <span lang=\"ko-KR\">역수인</span> 1/18(5.6%)<span lang=\"ko-KR\">가</span> <span lang=\"ko-KR\">해당</span> <span lang=\"ko-KR\">업체의</span> ROE</p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"> <span lang=\"ko-KR\">회사의</span> ROE<span lang=\"ko-KR\">가</span> <span lang=\"ko-KR\">이를</span> <span lang=\"ko-KR\">상회할</span> <span lang=\"ko-KR\">경우</span> <span lang=\"ko-KR\">경영성과가</span> <span lang=\"ko-KR\">높다고</span> <span lang=\"ko-KR\">판단</span> <span lang=\"ko-KR\">가능</span></p>\r\n\t\t\t<br />\r\n\t\t\t<ol>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">ㅇ<span lang=\"en-US\"> DCF(Discounted Cash Flow)</span>현금흐름할인법</p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<li value=\"2\" style=\"font-size:10pt\"><span lang=\"en-US\">EVA<span lang=\"ko-KR\">경제적부가가치</span></span></li>\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">= OP<span lang=\"ko-KR\">영업이익</span> - (<span lang=\"ko-KR\">가중평균자본비용</span> X <span lang=\"ko-KR\">영업자산투자금액</span>)</p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">= (*ROIC<span lang=\"ko-KR\">투하자본</span> <span lang=\"ko-KR\">수익률</span> - <span lang=\"ko-KR\">가중평균자본</span> <span lang=\"ko-KR\">비용</span>) X <span lang=\"ko-KR\">투하자본</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">= {(<span lang=\"ko-KR\">세후</span> <span lang=\"ko-KR\">이익</span> / <span lang=\"ko-KR\">투하</span> <span lang=\"ko-KR\">자본</span>) - <span lang=\"ko-KR\">가중평균자본</span> <span lang=\"ko-KR\">비용</span>)} X <span lang=\"ko-KR\">투하자본</span></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">IC<span lang=\"ko-KR\">영업투하자본</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">*ROIC<span lang=\"ko-KR\">투하자본</span> <span lang=\"ko-KR\">이익률</span> </p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">= <span lang=\"ko-KR\">세후</span> <span lang=\"ko-KR\">영업이익</span> / <span lang=\"ko-KR\">투하자본</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">= <span lang=\"ko-KR\">매출액</span> <span lang=\"ko-KR\">영업이익률</span> X <span lang=\"ko-KR\">투하자본</span> <span lang=\"ko-KR\">회전률</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">= (<span lang=\"ko-KR\">세후</span> <span lang=\"ko-KR\">영업이익</span> / <span lang=\"ko-KR\">매출액</span>) X (<span lang=\"ko-KR\">매출액</span> / <span lang=\"ko-KR\">투하자본</span>)</p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<li style=\"font-size:10pt\">주식이전과<span lang=\"en-US\"> </span>기업상속의<span lang=\"en-US\"> </span>목적</li>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">ㅇ<span lang=\"en-US\"> </span>소득세법상<span lang=\"en-US\"> </span>유가증권<span lang=\"en-US\"> </span>평가</p>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">ㅇ<span lang=\"en-US\"> </span>상속세<span lang=\"en-US\"> </span>및<span lang=\"en-US\"> </span>증여세법상<span lang=\"en-US\"> </span>유가증권<span lang=\"en-US\"> </span>평가</p>\r\n\t\t\t\t<br />\r\n\t\t\t</ol>\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">■<span lang=\"en-US\"> </span>투자<span lang=\"en-US\"> </span>의사결정과<span lang=\"en-US\"> </span>기업가치</p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">NPV(Net Presents Value)<span lang=\"ko-KR\">순</span> <span lang=\"ko-KR\">현재</span> <span lang=\"ko-KR\">가치법</span></p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">IRR(Internal Rate of Return)<span lang=\"ko-KR\">내부수익률법</span></p>\r\n\t\t\t<div style=\"display:inline-block;width:468px;height:600px;background:#2d333b;border-radius:4px;margin:2px;vertical-align:top;opacity:0.4\"></div>\r\n\t\t\t<br />\r\n\t\t\t<div style=\"display:inline-block;width:468px;height:600px;background:#2d333b;border-radius:4px;margin:2px;vertical-align:top;opacity:0.4\"></div>\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<p data-tag=\"remember-for-later\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:13pt;font-weight:bold\">제</span><span lang=\"en-US\" style=\"font-size:13pt;font-weight:bold\"> 2</span><span style=\"font-size:13pt;font-weight:bold\">장</span><span lang=\"en-US\" style=\"font-size:13pt;font-weight:bold\"> </span><span style=\"font-size:13pt;font-weight:bold\">원가</span></p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">관리회계<span lang=\"en-US\">: </span>원가<span lang=\"en-US\">/</span>가격<span lang=\"en-US\"> </span>책정<span lang=\"en-US\"> </span>등의<span lang=\"en-US\"> </span>의사결정을<span lang=\"en-US\"> </span>지원</p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">ㅇ<span lang=\"en-US\"> CVP(Cost-Volume-Profit) </span>분석</p>\r\n\t\t\t<ul>\r\n\t\t\t\t<li style=\"font-size:10pt\">원가<span lang=\"en-US\">-</span>조업도<span lang=\"en-US\">-</span>이익의<span lang=\"en-US\"> </span>변화가<span lang=\"en-US\"> </span>이익에<span lang=\"en-US\"> </span>미치는<span lang=\"en-US\"> </span>영향<span lang=\"en-US\"> </span>분석</li>\r\n\t\t\t</ul>\r\n\t\t\t<div style=\"display:inline-block;width:468px;height:600px;background:#2d333b;border-radius:4px;margin:2px;vertical-align:top;opacity:0.4\"></div>\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<div style=\"display:inline-block;width:468px;height:600px;background:#2d333b;border-radius:4px;margin:2px;vertical-align:top;opacity:0.4\"></div>\r\n\t\t\t<br />\r\n\t\t\t<div style=\"display:inline-block;width:468px;height:600px;background:#2d333b;border-radius:4px;margin:2px;vertical-align:top;opacity:0.4\"></div>\r\n\t\t\t<br />\r\n\t\t\t<div style=\"display:inline-block;width:468px;height:600px;background:#2d333b;border-radius:4px;margin:2px;vertical-align:top;opacity:0.4\"></div>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">ㅇ<span lang=\"en-US\"> ABS(Activity-Based Costing) </span>활동기준<span lang=\"en-US\"> </span>원가</p>\r\n\t\t\t<ul>\r\n\t\t\t\t<li style=\"font-size:10pt\">간접비의<span lang=\"en-US\"> </span>합리적<span lang=\"en-US\"> </span>반영을<span lang=\"en-US\"> </span>위해<span lang=\"en-US\"> </span>활동을<span lang=\"en-US\"> </span>원가의<span lang=\"en-US\"> </span>집계<span lang=\"en-US\"> </span>단위로<span lang=\"en-US\"> </span>활용</li>\r\n\t\t\t</ul>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">ㅇ<span lang=\"en-US\"> </span>고정비<span lang=\"en-US\">: </span>조업도와<span lang=\"en-US\"> </span>매출에<span lang=\"en-US\"> </span>무관하게<span lang=\"en-US\"> </span>지속적으로<span lang=\"en-US\"> </span>발생하는<span lang=\"en-US\"> </span>비용<span lang=\"en-US\"> - </span>구조조정이라는<span lang=\"en-US\"> </span>전략적<span lang=\"en-US\"> </span>대상</p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">ㅇ<span lang=\"en-US\"> </span>변동비<span lang=\"en-US\">: </span>제품을<span lang=\"en-US\"> </span>구성하는<span lang=\"en-US\"> </span>재료비<span lang=\"en-US\">, </span>노무비<span lang=\"en-US\">, </span>경비와<span lang=\"en-US\"> </span>판매비로<span lang=\"en-US\"> </span>구성<span lang=\"en-US\"> - </span>원가절감의<span lang=\"en-US\"> </span>대상</p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">ㅇ<span lang=\"en-US\"> </span>공헌이익<span lang=\"en-US\">/</span>한계이익<span lang=\"en-US\">(Contribution margin): </span>매출<span lang=\"en-US\">-</span>변동비<span lang=\"en-US\">(</span>가격<span lang=\"en-US\">-</span>개당변동비<span lang=\"en-US\">): </span>제품<span lang=\"en-US\"> </span>단위당<span lang=\"en-US\"> </span>판매가격에서<span lang=\"en-US\"> </span>단위당<span lang=\"en-US\"> </span>변동비<span lang=\"en-US\"> </span>차감한<span lang=\"en-US\"> </span>이익<span lang=\"en-US\">. </span>즉<span lang=\"en-US\">, </span>한<span lang=\"en-US\"> </span>개를<span lang=\"en-US\"> </span>팔<span lang=\"en-US\"> </span>때<span lang=\"en-US\"> </span>마다<span lang=\"en-US\"> </span>투입되는<span lang=\"en-US\"> </span>노력의<span lang=\"en-US\"> </span>대가<span lang=\"en-US\">.</span></p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">제품<span lang=\"en-US\"> </span>가격을<span lang=\"en-US\"> </span>상향하거나<span lang=\"en-US\"> </span>제품<span lang=\"en-US\"> </span>단위당<span lang=\"en-US\"> </span>변동비를<span lang=\"en-US\"> </span>절감해야<span lang=\"en-US\"> </span>함<span lang=\"en-US\">.</span></p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">ㅇ<span lang=\"en-US\"> </span>손익분기점<span lang=\"en-US\"> BEP(Break Even Point)</span></p>\r\n\t\t\t<ul>\r\n\t\t\t\t<li style=\"font-size:10pt\">고정비<span lang=\"en-US\">+</span>변동비를<span lang=\"en-US\"> </span>매출액이<span lang=\"en-US\"> </span>커버하여<span lang=\"en-US\"> </span>손익이<span lang=\"en-US\"> </span>제로에<span lang=\"en-US\"> </span>수렴하는<span lang=\"en-US\"> </span>지점</li>\r\n\t\t\t</ul>\r\n\t\t\t<br />\r\n\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">P X Q = F + V X Q</p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">매출액<span lang=\"en-US\">(</span>가격<span lang=\"en-US\"> X </span>수량<span lang=\"en-US\">) = </span>고정비<span lang=\"en-US\"> + </span>개당<span lang=\"en-US\"> </span>변동비<span lang=\"en-US\"> X </span>수량</p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">P X Q - V X Q = F</p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">(P - V) X Q = F</p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">Q = F / (P - V), <span lang=\"ko-KR\">양변에</span> P<span lang=\"ko-KR\">를</span> <span lang=\"ko-KR\">곱하면</span></p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">P X Q = F / (1 - V/P)</p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">즉<span lang=\"en-US\">, BEP </span>매출액<span lang=\"en-US\"> = </span>고정비<span lang=\"en-US\"> / (1-</span>변동비율<span lang=\"en-US\">) *(1-</span>변동비율<span lang=\"en-US\">)=</span>공헌이익률</p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font     "type": "text",
    "x": 768,
    "y": 1027,

    "content": "재무상태표는 영어로 Balance sheet\n손익계산서는 영어로 P&L : profit & loss statement (혹은 IS : income statement)\nBS는 특정시점의 재산(Stock)을 표시하고\nPL은 기간동안의 재산의 증가감소(Flow)\n* 재무상태표란 현재의 재산상태를 표시하는 문서이며 크게 (자산/부채/자본)으로 나누어 집니다.\n* 손익계산서는 일정기간동안의 매출 및 비용을 표시합니다. (매출액/매출원가/판매비와관리비\n(=판관비), 급여 임차료, 영업외수익(이자수익, 자산처분이익, 잡이익), 영업외비용(이자비용, 자산처분손실, 잡손실)등으로 구분할 수 있습니다.\nㅇ 기업내부 의사결정자인 경영자의 경영 의사결정 정보를 관리회계\n기업외부 의사결정자(주주, 채권자, 노동자, 국세청 등 경영자 외의 모두)의 의사결정 정보를 제공하는 것을 재무회계\nㅇ 회계공준(회계의 기본가정)\n기업실체 가정, 계속기업 가정, 기간성 , 화폐가치안정 가정으로 보통 4가지를 회계공준(기본가정)\nㅇ 대차평균의 원리 - 복식부기의 핵심\n현대의 회계는 복식부기 회계라고 부릅니다. 반대되는 말로는 단식부기가 있습니다.\n복식부기는 차변 대변으로 나누어서 거래를 기록하는 방식이고\n단식부기는 우리가 어렸을 때 썼던 용돈기입장 - 일반인들이 생각하는 수입/지출내역서"

const CONTENT_HASH = 'f7a11640';

let cards = [];
let moving = null, resizing = null;
let selectedIdx = null, clipboardCard = null;
const GRID = 20, GAP = 14;
function snap(v) { return Math.round(v / GRID) * GRID; }

// ── Undo (Ctrl+Z) ────────────────────────────────────────────────────────────
const MAX_HISTORY = 50;
let history = [];
function snapshot() {
  syncText();
  history.push(JSON.stringify(cards));
  if (history.length > MAX_HISTORY) history.shift();
}
function undo() {
  if (!history.length) { showStatus('되돌릴 내용 없음'); return; }
  syncText();
  cards = JSON.parse(history.pop());
  renderCards();
  saveBoard();
  showStatus('↩ 되돌림');
}
function showStatus(msg) {
  const s = document.getElementById('status');
  s.textContent = msg;
  clearTimeout(showStatus._t);
  showStatus._t = setTimeout(() => { s.textContent = ''; }, 2000);
}
document.addEventListener('keydown', e => {
  const isText = document.activeElement?.contentEditable === 'true';
  if ((e.ctrlKey || e.metaKey) && e.key === 'z' && !e.shiftKey) {
    if (isText) return;
    e.preventDefault();
    undo();
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'c' && !e.shiftKey && !isText) {
    if (selectedIdx !== null && cards[selectedIdx]) {
      syncText();
      clipboardCard = JSON.parse(JSON.stringify(cards[selectedIdx]));
      showStatus('카드 복사됨');
      e.preventDefault();
    }
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'v' && !e.shiftKey && !isText) {
    if (clipboardCard) {
      e.preventDefault();
      snapshot();
      const nc = JSON.parse(JSON.stringify(clipboardCard));
      nc.x = (nc.x || 0) + 30; nc.y = (nc.y || 0) + 30;
      cards.push(nc);
      selectedIdx = cards.length - 1;
      renderCards(); saveBoard();
      showStatus('카드 붙여넣음');
    }
  }
  if (e.key === 'Escape') {
    document.querySelectorAll('.card.selected').forEach(c => c.classList.remove('selected'));
    selectedIdx = null;
  }
});

function pushCards(movedIdx) {
  const moved = cards[movedIdx];
  const movedEl = document.querySelector(`.card[data-idx="${movedIdx}"]`);
  if (!movedEl) return;
  const mh = movedEl.offsetHeight;
  document.querySelectorAll('.card').forEach(el => {
    const i = +el.dataset.idx;
    if (i === movedIdx) return;
    const c = cards[i], oh = el.offsetHeight;
    if (moved.x < (c.x+(c.w||200)) && (moved.x+(moved.w||200)) > c.x && moved.y < (c.y+oh) && (moved.y+mh) > c.y) {
      c.y = moved.y + mh + GAP;
      el.style.top = c.y + 'px';
    }
  });
}

function loadBoard() {
  const saved = localStorage.getItem(SAVE_KEY);
  const savedHash = localStorage.getItem(SAVE_KEY + ':hash');
  let parsed = null;
  try { parsed = saved ? JSON.parse(saved) : null; } catch(e) {}
  // reset if: no save, empty array, or content hash changed (page regenerated)
  if (!parsed || parsed.length === 0 || savedHash !== CONTENT_HASH) {
    cards = DEFAULT_CARDS.map(c => ({...c}));
    localStorage.removeItem(SAVE_KEY);
    localStorage.setItem(SAVE_KEY + ':hash', CONTENT_HASH);
    renderCards();
    const hasCoords = cards.some(c => c.x !== undefined && c.y !== undefined);
    if (!hasCoords) autoLayout();
    return;
  }
  cards = parsed;
  renderCards();
}
function resetToDefaults() { if (!confirm('저장된 보드를 지우고 원본으로 초기화합니다. 계속할까요?')) return; localStorage.removeItem(SAVE_KEY); cards = DEFAULT_CARDS.map(c => ({...c})); renderCards(); autoLayout(); }

function autoLayout() {
  const boardW = document.getElementById('board').offsetWidth;
  const cols = Math.max(1, Math.floor(boardW / 280));
  const colW = (boardW - GAP*(cols-1)) / cols;
  const colH = new Array(cols).fill(0);
  const allCards = document.querySelectorAll('.card');
  const images = document.querySelectorAll('.card img');
  let loaded = 0;
  function place() {
    allCards.forEach((el, i) => {
      const w = Math.min(cards[i].w || colW, colW);
      let minCol = 0;
      for (let c = 1; c < cols; c++) if (colH[c] < colH[minCol]) minCol = c;
      cards[i].x = minCol * (colW + GAP);
      cards[i].y = colH[minCol];
      cards[i].w = w;
      el.style.left = cards[i].x + 'px';
      el.style.top = cards[i].y + 'px';
      el.style.width = w + 'px';
      colH[minCol] = cards[i].y + el.offsetHeight + GAP;
    });
    document.getElementById('board').style.minHeight = (Math.max(...colH) + 100) + 'px';
    saveBoard();
  }
  if (!images.length) { requestAnimationFrame(place); return; }
  images.forEach(img => {
    if (img.complete) { loaded++; if (loaded >= images.length) requestAnimationFrame(place); }
    else { img.onload = img.onerror = () => { loaded++; if (loaded >= images.length) requestAnimationFrame(place); }; }
  });
}

function syncText() {
  document.querySelectorAll('.card').forEach(el => {
    const i = +el.dataset.idx;
    if (cards[i]?.type === 'text') { const t = el.querySelector('.text'); if (t) cards[i].content = t.innerHTML; }
  });
}
function saveBoard() { syncText(); localStorage.setItem(SAVE_KEY, JSON.stringify(cards)); localStorage.setItem(SAVE_KEY + ':hash', CONTENT_HASH); showStatus('저장됨 ' + new Date().toLocaleTimeString()); }

function renderCards() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  cards.forEach((card, i) => {
    const el = document.createElement('div');
    el.className = 'card'; el.dataset.idx = i;
    if (card.x !== undefined) el.style.left = card.x + 'px';
    if (card.y !== undefined) el.style.top = card.y + 'px';
    // html cards contain raw OneNote table HTML which may overflow the stated div width
    if (card.w) { if (card.type === 'html') el.style.minWidth = card.w + 'px'; else el.style.width = card.w + 'px'; }
    el.addEventListener('mousedown', e => {
      if (e.target.closest('.text, a, .card-btn, .resize-handle, td, th')) return;
      e.preventDefault();
      // Update selection
      document.querySelectorAll('.card.selected').forEach(c => c.classList.remove('selected'));
      selectedIdx = i; el.classList.add('selected');
      snapshot();
      moving = { idx: i, startX: e.clientX, startY: e.clientY, origX: card.x||0, origY: card.y||0 };
      el.classList.add('moving');
    });
    const actions = document.createElement('div'); actions.className = 'card-actions';
    const delBtn = document.createElement('button'); delBtn.className = 'card-btn'; delBtn.textContent = '×';
    delBtn.onclick = e => { e.stopPropagation(); if(confirm('삭제?')) { snapshot(); cards.splice(i,1); renderCards(); saveBoard(); } };
    actions.appendChild(delBtn); el.appendChild(actions);
    if (card.type === 'text') {
      const text = document.createElement('div'); text.className = 'text'; text.contentEditable = true;
      text.innerHTML = card.content || '';
      text.addEventListener('focus', () => { snapshot(); });
      text.addEventListener('blur', () => { card.content = text.innerHTML; saveBoard(); });
      el.appendChild(text);
    } else if (card.type === 'image') {
      const img = document.createElement('img');
      img.src = card.src.startsWith('http') || card.src.startsWith('data:') ? card.src : IMG_BASE + card.src;
      img.alt = ''; img.loading = 'lazy'; img.onerror = () => img.style.display = 'none';
      if (card.w) img.style.width = card.w + 'px';
      if (card.h) img.style.height = card.h + 'px';
      if (card.link) { const a = document.createElement('a'); a.href = card.link; a.target = '_blank'; a.appendChild(img); el.appendChild(a); }
      else { el.appendChild(img); }
      if (card.caption) { const cap = document.createElement('div'); cap.style.cssText = 'font-size:11px;color:#8b949e;margin-top:4px;word-break:break-word;padding:0 2px;'; cap.textContent = card.caption; el.appendChild(cap); }
    } else if (card.type === 'html') {
      const wrapper = document.createElement('div');
      wrapper.style.cssText = 'overflow:auto;font-size:13px;line-height:1.5;';
      wrapper.innerHTML = card.html.replace(/__ATTACHMENT__/g, IMG_BASE);
      wrapper.querySelectorAll('img').forEach(img => { img.style.maxWidth = '100%'; img.style.height = 'auto'; img.draggable = false; });
      wrapper.querySelectorAll('a').forEach(a => { a.target = '_blank'; a.style.color = '#6cb0f6'; });
      wrapper.querySelectorAll('table').forEach(t => { t.style.borderCollapse = 'collapse'; });
      wrapper.querySelectorAll('td,th').forEach(td => {
        td.style.border = '1px solid #444'; td.style.padding = '4px 6px'; td.style.verticalAlign = 'top';
        td.title = '더블클릭으로 편집';
        td.addEventListener('dblclick', function(e) {
          e.stopPropagation();
          snapshot();
          this.contentEditable = 'true';
          this.style.outline = '2px solid #388bfd';
          this.style.background = 'rgba(56,139,253,0.08)';
          this.focus();
        });
        td.addEventListener('blur', function() {
          this.contentEditable = 'false';
          this.style.outline = '';
          this.style.background = '';
          cards[i].html = wrapper.innerHTML.split(IMG_BASE).join('__ATTACHMENT__');
          saveBoard();
        });
      });
      el.appendChild(wrapper);
    } else if (card.type === 'table') {
      const rows = card.rows || [['','',''],['','',''],['','','']];
      const tbl = document.createElement('table');
      tbl.style.cssText = 'border-collapse:collapse;width:100%;font-size:13px;';
      rows.forEach((row, ri) => {
        const tr = tbl.insertRow();
        row.forEach((cell, ci) => {
          const td = document.createElement(ri === 0 ? 'th' : 'td');
          td.contentEditable = true;
          td.style.cssText = 'border:1px solid #30363d;padding:4px 8px;min-width:60px;text-align:left;' + (ri===0 ? 'background:#21262d;font-weight:600;' : '');
          td.textContent = cell;
          td.addEventListener('blur', () => { if (!cards[i].rows) cards[i].rows = rows; rows[ri][ci] = td.textContent; saveBoard(); });
          tr.appendChild(td);
        });
      });
      el.appendChild(tbl);
      const addRow = document.createElement('button');
      addRow.textContent = '+ 행'; addRow.style.cssText = 'margin-top:4px;font-size:11px;background:#21262d;border:1px solid #30363d;color:#8b949e;padding:2px 8px;border-radius:4px;cursor:pointer;';
      addRow.onclick = e => { e.stopPropagation(); snapshot(); if (!cards[i].rows) cards[i].rows = rows; cards[i].rows.push(new Array(cards[i].rows[0].length).fill('')); renderCards(); saveBoard(); };
      const addCol = document.createElement('button');
      addCol.textContent = '+ 열'; addCol.style.cssText = 'margin-top:4px;margin-left:4px;font-size:11px;background:#21262d;border:1px solid #30363d;color:#8b949e;padding:2px 8px;border-radius:4px;cursor:pointer;';
      addCol.onclick = e => { e.stopPropagation(); snapshot(); if (!cards[i].rows) cards[i].rows = rows; cards[i].rows.forEach(r => r.push('')); renderCards(); saveBoard(); };
      el.appendChild(addRow); el.appendChild(addCol);
    }
    const rh = document.createElement('div'); rh.className = 'resize-handle';
    rh.addEventListener('mousedown', e => { e.preventDefault(); e.stopPropagation(); snapshot(); resizing = { idx: i, startX: e.clientX, startW: card.w || el.offsetWidth }; });
    el.appendChild(rh);
    if (i === selectedIdx) el.classList.add('selected');
    board.appendChild(el);
  });
  requestAnimationFrame(() => {
    let maxB = 0;
    document.querySelectorAll('.card').forEach(el => { const b = (parseFloat(el.style.top)||0) + el.offsetHeight; if (b > maxB) maxB = b; });
    board.style.minHeight = (maxB + 100) + 'px';
  });
}

document.addEventListener('mousemove', e => {
  if (moving) {
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`); if (!el) return;
    let nx = moving.origX + e.clientX - moving.startX, ny = moving.origY + e.clientY - moving.startY;
    if (e.shiftKey) { nx = snap(nx); ny = snap(ny); el.style.outline = '1px dashed rgba(240,192,64,0.3)'; } else { el.style.outline = ''; }
    el.style.left = nx + 'px'; el.style.top = ny + 'px';
  }
  if (resizing) {
    let nw = resizing.startW + e.clientX - resizing.startX; if (e.shiftKey) nw = snap(nw);
    cards[resizing.idx].w = Math.max(100, nw);
    const el = document.querySelector(`.card[data-idx="${resizing.idx}"]`); if (el) el.style.width = cards[resizing.idx].w + 'px';
  }
});

document.addEventListener('mouseup', e => {
  if (moving) {
    let nx = moving.origX + e.clientX - moving.startX, ny = moving.origY + e.clientY - moving.startY;
    if (e.shiftKey) { nx = snap(nx); ny = snap(ny); }
    cards[moving.idx].x = Math.max(0, nx); cards[moving.idx].y = Math.max(0, ny);
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`); if (el) { el.classList.remove('moving'); el.style.outline = ''; }
    if (e.shiftKey) pushCards(moving.idx);
    moving = null; saveBoard();
  }
  if (resizing) { if (e.shiftKey) pushCards(resizing.idx); resizing = null; saveBoard(); }
});

function addTextCard() { snapshot(); cards.push({ type: 'text', content: '', x: 50, y: window.scrollY+100, w: 300 }); renderCards(); setTimeout(() => { const els = document.querySelectorAll('.card .text'); els[els.length-1]?.focus(); }, 100); }
function addImageCard() { const input = document.createElement('input'); input.type = 'file'; input.accept = 'image/*'; input.onchange = e => { const f = e.target.files[0]; if (!f) return; const r = new FileReader(); r.onload = () => { snapshot(); cards.push({ type: 'image', src: r.result, x: 50, y: window.scrollY+100, w: 240 }); renderCards(); saveBoard(); }; r.readAsDataURL(f); }; input.click(); }
function addImageUrl() { const url = prompt('이미지 URL'); if (!url) return; snapshot(); cards.push({ type: 'image', src: url, x: 50, y: window.scrollY+100, w: 240 }); renderCards(); saveBoard(); }
function addTableCard() {
  const colsStr = prompt('열 수 (기본 3)', '3'); const cols = Math.max(1, parseInt(colsStr)||3);
  const rowsStr = prompt('행 수 (헤더 포함, 기본 4)', '4'); const rows = Math.max(1, parseInt(rowsStr)||4);
  snapshot();
  cards.push({ type: 'table', rows: Array.from({length: rows}, (_, ri) => Array.from({length: cols}, (_, ci) => ri===0 ? `열${ci+1}` : '')), x: 50, y: window.scrollY+100, w: Math.max(240, cols*100) });
  renderCards(); saveBoard();
}
function exportBoard() { syncText(); const blob = new Blob([JSON.stringify(cards, null, 2)], { type: 'application/json' }); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = SAVE_KEY + '.json'; a.click(); }
// ── Zoom ─────────────────────────────────────────────────────────────────────
let zoom = parseFloat(localStorage.getItem('zoom-' + SAVE_KEY) || '1.0');
function applyZoom() {
  const board = document.getElementById('board');
  board.style.transform = `scale(${zoom})`;
  board.style.transformOrigin = '0 0';
  document.getElementById('zoom-level').textContent = Math.round(zoom * 100) + '%';
  localStorage.setItem('zoom-' + SAVE_KEY, zoom);
}
function zoomIn()  { zoom = Math.min(3.0, parseFloat((zoom + 0.1).toFixed(2))); applyZoom(); }
function zoomOut() { zoom = Math.max(0.2, parseFloat((zoom - 0.1).toFixed(2))); applyZoom(); }
document.addEventListener('keydown', e => {
  if (e.ctrlKey || e.metaKey) {
    if (e.key === '=' || e.key === '+') { e.preventDefault(); zoomIn(); }
    if (e.key === '-')                  { e.preventDefault(); zoomOut(); }
    if (e.key === '0')                  { e.preventDefault(); zoom = 1.0; applyZoom(); }
  }
});
document.getElementById('board').addEventListener('wheel', e => {
  if (!(e.ctrlKey || e.metaKey)) return;
  e.preventDefault();
  e.deltaY < 0 ? zoomIn() : zoomOut();
}, { passive: false });
applyZoom();
function resetLayout() { if (!confirm('자동 재배치합니다.')) return; cards.forEach(c => { delete c.x; delete c.y; }); renderCards(); autoLayout(); }

const fmtBar = document.getElementById('format-toolbar');
function fmt(cmd) { document.execCommand(cmd, false, null); saveBoard(); }
function fmtLink() {
  const sel = window.getSelection();
  if (!sel || sel.isCollapsed) return;
  const url = prompt('링크 URL 입력', 'https://');
  if (!url) return;

  // make links open in new tab
  sel.anchorNode?.parentElement?.closest('a')?.setAttribute('target', '_blank');
  document.querySelectorAll('.text a').forEach(a => a.target = '_blank');
  saveBoard();
}

// prevent format buttons from blurring contenteditable
fmtBar.addEventListener('mousedown', e => e.preventDefault());

document.addEventListener('selectionchange', () => {
  const sel = window.getSelection();
  if (!sel || sel.isCollapsed || !sel.toString().trim()) { fmtBar.style.display = 'none'; return; }
  // only show if selection is inside a .text element
  const anchor = sel.anchorNode;
  if (!anchor) { fmtBar.style.display = 'none'; return; }
  const textEl = anchor.nodeType === 1 ? anchor.closest('.text') : anchor.parentElement?.closest('.text');
  if (!textEl) { fmtBar.style.display = 'none'; return; }
  // position above selection
  const range = sel.getRangeAt(0);
  const rect = range.getBoundingClientRect();
  fmtBar.style.display = 'flex';
  const tbW = fmtBar.offsetWidth || 180;
  let left = rect.left + rect.width / 2 - tbW / 2;
  left = Math.max(8, Math.min(left, window.innerWidth - tbW - 8));
  fmtBar.style.left = left + 'px';
  fmtBar.style.top = (rect.top - 44 + window.scrollY) + 'px';
});

setInterval(saveBoard, 30000);
loadBoard();
</script>
</body>
</html>
