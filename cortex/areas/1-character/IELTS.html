<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IELTS</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1e1e1e; color: #e0e0e0; font-family: 'Segoe UI', -apple-system, sans-serif; font-size: 15px; line-height: 1.6; padding: 20px 30px 60px; overflow-x: hidden; }
a { color: #6cb0f6; text-decoration: none; }
a:hover { text-decoration: underline; }
.title-bar { background: #3a3a5c; display: inline-block; padding: 6px 16px; font-size: 22px; font-weight: bold; color: #fff; margin-bottom: 4px; }
.date { color: #999; font-size: 13px; margin-bottom: 20px; }
.board { position: relative; }
.card { background: #2a2a2a; border: 1px solid #3a3a3a; border-radius: 8px; padding: 12px; position: absolute; cursor: grab; transition: box-shadow 0.15s; overflow: hidden; }
.card:hover { box-shadow: 0 0 0 1px #58a6ff; z-index: 10; }
.card.moving { opacity: 0.8; box-shadow: 0 4px 24px rgba(0,0,0,0.6); z-index: 100; cursor: grabbing; }
.card img { width: 100%; border-radius: 4px; display: block; }
.card .text { outline: none; min-height: 20px; white-space: pre-wrap; word-break: break-word; }
.card .text:focus { background: rgba(255,255,255,0.05); border-radius: 4px; padding: 4px; }
.card .text:empty::before { content: '텍스트 입력...'; color: #555; }
.card-actions { position: absolute; top: 4px; right: 4px; display: none; gap: 4px; }
.card:hover .card-actions { display: flex; }
.card-btn { background: #333; border: 1px solid #555; color: #ccc; border-radius: 4px; padding: 2px 6px; font-size: 11px; cursor: pointer; }
.card-btn:hover { background: #444; color: #fff; }
.resize-handle { position: absolute; bottom: 0; right: 0; width: 16px; height: 16px; cursor: se-resize; opacity: 0; }
.card:hover .resize-handle { opacity: 0.6; }
.resize-handle::after { content: ''; position: absolute; bottom: 3px; right: 3px; width: 8px; height: 8px; border-right: 2px solid #666; border-bottom: 2px solid #666; }
.card.selected { box-shadow: 0 0 0 2px #58a6ff; z-index: 5; }
.highlight-red { color: #ff6b6b; }
.highlight-blue { color: #6cb0f6; }
.highlight-gold { color: #f0c040; }
.toolbar { position: fixed; bottom: 0; left: 0; right: 0; background: #161b22; border-top: 1px solid #30363d; padding: 8px 20px; display: flex; gap: 12px; align-items: center; z-index: 200; }
.toolbar button { background: #21262d; border: 1px solid #30363d; color: #e0e0e0; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; }
.toolbar button:hover { background: #30363d; }
.toolbar .status { color: #8b949e; font-size: 12px; margin-left: auto; }
#format-toolbar { position: fixed; display: none; background: #1c2128; border: 1px solid #444c56; border-radius: 8px; padding: 4px 6px; gap: 2px; align-items: center; z-index: 500; box-shadow: 0 4px 16px rgba(0,0,0,0.5); }
#format-toolbar button { background: none; border: none; color: #cdd9e5; padding: 4px 8px; border-radius: 5px; cursor: pointer; font-size: 13px; line-height: 1; }
#format-toolbar button:hover { background: #373e47; }
#format-toolbar .sep { width: 1px; height: 16px; background: #444c56; margin: 0 2px; }
</style>
</head>
<body>
<div class="title-bar" contenteditable="true">IELTS</div>
<div class="date"></div>
<div class="board" id="board"></div>
<div id="format-toolbar">
  <button onmousedown="e=>e.preventDefault()" onclick="fmt('bold')" title="굵게"><b>B</b></button>
  <button onclick="fmt('italic')" title="기울임"><i>I</i></button>
  <button onclick="fmt('underline')" title="밑줄"><u>U</u></button>
  <div class="sep"></div>
  <button onclick="fmtLink()" title="링크 삽입">🔗</button>
  <button onclick="fmt('unlink')" title="링크 제거">✂</button>
</div>
<div class="toolbar">
  <button onclick="undo()" title="Ctrl+Z">↩ 실행취소</button>
  <button onclick="addTextCard()">+ 텍스트</button>
  <button onclick="addImageCard()">+ 이미지</button>
  <button onclick="addImageUrl()">+ 이미지 URL</button>
  <button onclick="addTableCard()">+ 표</button>
  <button onclick="saveBoard()">💾 저장</button>
  <button onclick="exportBoard()">📤 내보내기</button>
  <button onclick="resetLayout()">↺ 재배치</button>
  <button onclick="resetToDefaults()" style="color:#f85149">↺ 초기화</button>
  <div style="display:flex;align-items:center;gap:4px;margin-left:8px;border-left:1px solid #30363d;padding-left:12px;">
    <button onclick="zoomOut()" title="Ctrl+-" style="padding:6px 10px;">−</button>
    <span id="zoom-level" style="font-size:12px;color:#8b949e;min-width:36px;text-align:center;">100%</span>
    <button onclick="zoomIn()" title="Ctrl+=" style="padding:6px 10px;">+</button>
  </div>
  <span class="status" id="status">Ready</span>
</div>
<script>

const IMG_BASE = '../../attachments/';
const DEFAULT_CARDS = [
  {

    "w": 773,
    "html": "\r\n\t\t\t<table style=\"border:1px solid;border-collapse:collapse\">\r\n\t\t\t\t<tr>\r\n\t\t\t\t\t<td style=\"background-color:#f9f9f9;border:1px solid;font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;text-align:center\"><span style=\"font-size:12pt\">시험과목</span></td>\r\n\t\t\t\t\t<td style=\"background-color:#f9f9f9;border:1px solid;font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;text-align:center\"><span style=\"font-size:12pt\">시험시간</span></td>\r\n\t\t\t\t\t<td style=\"background-color:#f9f9f9;border:1px solid;font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;text-align:center\"><span style=\"font-size:12pt\">구성</span></td>\r\n\t\t\t\t\t<td style=\"background-color:#f9f9f9;border:1px solid;font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;text-align:center\"><span style=\"font-size:12pt\">문제수</span></td>\r\n\t\t\t\t\t<td style=\"background-color:#f9f9f9;border:1px solid;font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;text-align:center\"><span style=\"font-size:12pt\">내용</span></td>\r\n\t\t\t\t\t<td style=\"background-color:#f9f9f9;border:1px solid\"><br />\r\n\t\t\t\t\t</td>\r\n\t\t\t\t\t<td style=\"background-color:#f9f9f9;border:1px solid\"><br />\r\n\t\t\t\t\t</td>\r\n\t\t\t\t</tr>\r\n\t\t\t\t<tr>\r\n\t\t\t\t\t<td style=\"border:1px solid;font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f\"><span style=\"font-size:9pt\">Listening</span></td>\r\n\t\t\t\t\t<td style=\"border:1px solid\"><p style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:9pt\">30분 + 10분</span></p>\r\n\t\t\t\t\t<p style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:9pt\">(답 옮겨 적는 시간)</span></p>\r\n\t\t\t\t\t</td>\r\n\t\t\t\t\t<td style=\"border:1px solid;font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f\"><span style=\"font-size:9pt\">4 Sections</span></td>\r\n\t\t\t\t\t<td style=\"border:1px solid;font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f\"><span style=\"font-size:9pt\">40문제</span></td>\r\n\t\t\t\t\t<td style=\"border:1px solid\"><p style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:9pt\">Section 1,3 - 대화</span></p>\r\n\t\t\t\t\t<p style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:9pt\">Section 2,3 - 독백</span></p>\r\n\t\t\t\t\t</td>\r\n\t\t\t\t\t<td style=\"border:1px solid\"><br />\r\n\t\t\t\t\t</td>\r\n\t\t\t\t\t<td style=\"border:1px solid;font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f\"><span style=\"font-family:Malgun Gothic;font-size:9pt\">딕테이션</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:9pt\">?</span></td>\r\n\t\t\t\t</tr>\r\n\t\t\t\t<tr>\r\n\t\t\t\t\t<td style=\"border:1px solid;font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f\"><span style=\"font-size:9pt\">Reading</span></td>\r\n\t\t\t\t\t<td style=\"border:1px solid;font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f\"><span style=\"font-size:9pt\">60분</span></td>\r\n\t\t\t\t\t<td style=\"border:1px solid;font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f\"><span style=\"font-size:9pt\">3 passages</span></td>\r\n\t\t\t\t\t<td style=\"border:1px solid;font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f\"><span style=\"font-size:9pt\">40문제</span></td>\r\n\t\t\t\t\t<td style=\"border:1px solid;font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f\"><span style=\"font-size:9pt\">셋 중 하나는 좀 더 어려울 수도 있음.</span></td>\r\n\t\t\t\t\t<td style=\"border:1px solid\"><p style=\"font-family:맑은 고딕;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:9pt;color:#6c6966\">&#160;리딩은 연습하실때 첫번째 지문에서 15분, 두번째 지문에서 18분, 세번째 지문에서 18분 꼭 시간분배 해놓고 문제풀었습니다.</span></p>\r\n\t\t\t\t\t<p style=\"font-family:맑은 고딕;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:9pt;color:#6c6966\">&#160; 되도록이면 첫번째 지문에서 15분만에 다 풀 생각으로&#160;했고,&#160; 답안 체크시간 제외&#160;5분정도 여유시간을 어려운 지문에 추가로 사용할</span></p>\r\n\t\t\t\t\t<p style=\"font-family:맑은 고딕;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:9pt;color:#6c6966\">&#160;&#160;수 있었습니다. (지문 두개 풀면 답안 먼저 작성해놓고 세번째 지문 풀었습니다)</span></p>\r\n\t\t\t\t\t</td>\r\n\t\t\t\t\t<td style=\"border:1px solid\"><br />\r\n\t\t\t\t\t</td>\r\n\t\t\t\t</tr>\r\n\t\t\t\t<tr>\r\n\t\t\t\t\t<td style=\"border:1px solid;font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f\"><span style=\"font-size:9pt\">Writing</span></td>\r\n\t\t\t\t\t<td style=\"border:1px solid;font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f\"><span style=\"font-size:9pt\">60분</span></td>\r\n\t\t\t\t\t<td style=\"border:1px solid;font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f\"><span style=\"font-size:9pt\">2 tasks</span></td>\r\n\t\t\t\t\t<td style=\"border:1px solid;font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f\"><span style=\"font-size:9pt\">2개의 토픽</span></td>\r\n\t\t\t\t\t<td style=\"border:1px solid\"><p style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:9pt\">Task1 - report(150자)</span></p>\r\n\t\t\t\t\t<p style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:9pt\">Task2 - essay(250자)</span></p>\r\n\t\t\t\t\t</td>\r\n\t\t\t\t\t<td style=\"border:1px solid\"><p style=\"font-family:맑은 고딕;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:9pt;color:#6c6966\">문법적 오류를 최대한 줄이고, 주어진 주제와 얼마나 연관성 있게 논리적으로 써내느냐가</span></p>\r\n\t\t\t\t\t<p style=\"font-family:맑은 고딕;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:9pt;color:#6c6966\">&#160; 관건</span></p>\r\n\t\t\t\t\t<p style=\"font-family:맑은 고딕;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:9pt;color:#6c6966\">시간이</span><span lang=\"en-US\" style=\"font-size:9pt;color:#6c6966\"> </span><span style=\"font-size:9pt;color:#6c6966\">되시면</span><span lang=\"en-US\" style=\"font-size:9pt;color:#6c6966\"> </span><span style=\"font-size:9pt;color:#6c6966\">학원을</span><span lang=\"en-US\" style=\"font-size:9pt;color:#6c6966\"> </span><span style=\"font-size:9pt;color:#6c6966\">다녀서</span><span lang=\"en-US\" style=\"font-size:9pt;color:#6c6966\"> </span><span style=\"font-size:9pt;color:#6c6966\">개인적으로</span><span lang=\"en-US\" style=\"font-size:9pt;color:#6c6966\"> </span><span style=\"font-size:9pt;color:#6c6966\">자주하는</span><span lang=\"en-US\" style=\"font-size:9pt;color:#6c6966\"> </span><span style=\"font-size:9pt;color:#6c6966\">오류를</span><span lang=\"en-US\" style=\"font-size:9pt;color:#6c6966\"> </span><span style=\"font-size:9pt;color:#6c6966\">찾아내는게</span><span lang=\"en-US\" style=\"font-size:9pt;color:#6c6966\"> </span><span style=\"font-size:9pt;color:#6c6966\">중요</span></p>\r\n\t\t\t\t\t</td>\r\n\t\t\t\t\t<td style=\"border:1px solid\"><br />\r\n\t\t\t\t\t</td>\r\n\t\t\t\t</tr>\r\n\t\t\t\t<tr>\r\n\t\t\t\t\t<td style=\"border:1px solid;font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f\"><span style=\"font-size:9pt\">Speaking</span></td>\r\n\t\t\t\t\t<td style=\"border:1px solid;font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f\"><span style=\"font-size:9pt\">11분 ~ 14분</span></td>\r\n\t\t\t\t\t<td style=\"border:1px solid;font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f\"><span style=\"font-size:9pt\">3 parts</span></td>\r\n\t\t\t\t\t<td style=\"border:1px solid;font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f\"><span style=\"font-size:9pt\">다양</span></td>\r\n\t\t\t\t\t<td style=\"border:1px solid\"><p style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:9pt\">Part 1 - 개인적인 질문 주고 받기(문제개수가 가장많음)</span></p>\r\n\t\t\t\t\t<p style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:9pt\">Part 2 - 카드에 질문보고 1분 생각한 다음, 1~2분 스피치, follow up 질문</span></p>\r\n\t\t\t\t\t<p style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:9pt\">Part 3 - part2의 주제에 대한 추상적 질문</span></p>\r\n\t\t\t\t\t</td>\r\n\ ily:Noto Sans Demilight\">이 사이트에서 매일 1세트를 20분 내에 풀려고 했다.</span></p>\r\n\t\t\t<p lang=\"ko\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">캠브릿지에 나와있는 모범답안은 실제 시험장에서? 수험생이 쓴 글을 보여주는데 이게 7.0+ 이상이 아니고 6.0 score 답안지를 보여주는데..내 목표는 6.0 맞는게 아니였어서 좀 헷갈렸고 실제로 이 모범답안에서 틀린표현도 있을텐데 어디가 정확히 잘못되었는지를 알기 힘들었다.</span></p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Noto Sans Demilight\">유튜브</span></p>\r\n\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">&#160;</span></p>\r\n\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Noto Sans Demilight\">아이엘츠 라이팅에 아짜도 모르던 초기에 백지에 글을 어떻게 써야되나? 라는 막막함을 그나마 해소해준 유튜브 강의</span></p>\r\n\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">&#160;</span></p>\r\n\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Noto Sans Demilight\">Task 1 그래프</span></p>\r\n\t\t\t<p lang=\"ko\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><a href=\"https://www.youtube.com/watch?v=O5eb1uWsLrU\" style=\"font-family:Noto Sans Demilight\">https://www.youtube.com/watch?v=O5eb1uWsLrU</a></p>\r\n\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">출처: </span><a href=\"https://12chn03.tistory.com/136\" lang=\"ko\" style=\"font-family:Malgun Gothic\">https://12chn03.tistory.com/136</a><span style=\"font-family:Malgun Gothic\"> [안나스 기억저장함:티스토리]</span></p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Noto Sans Demilight\">Task 2 에세이</span></p>\r\n\t\t\t<p lang=\"ko\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><a href=\"https://www.youtube.com/watch?v=Md6qCsl3Yds&amp; /ielts_writing&amp;keywd=gohac_middle+contents_ielts_essay+editing&amp;logger_kw=gohac_middle+contents_ielts_essay+editing&amp;source=logger_kw</a></p>\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<p lang=\"ko\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:18pt\"><span style=\"font-family:Noto Sans Demilight;font-size:10pt;color:#86837f;background-color:#191a1a;font-weight:bold\">스피킹</span></p>\r\n\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:18pt\"><span style=\"font-family:Noto Sans KR;font-size:10pt;color:#86837f;background-color:#191a1a\">&#160;</span></p>\r\n\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:18pt\"><span style=\"font-family:Noto Sans Demilight;font-size:10pt;color:#86837f;background-color:#191a1a\">1) 아이엘츠 브로</span></p>\r\n\t\t\t<br />\r\n\t\t\t<cite style=\"font-family:Calibri;font-size:9pt;color:#595959;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">출처</span>: &lt;<a href=\"https://12chn03.tistory.com/136\">https://12chn03.tistory.com/136</a>&gt; </cite>\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Noto Sans Demilight\">스코어 팩토리</span></p>\r\n\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">&#160;</span></p>\r\n\t\t\t<p lang=\"ko\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><a href=\"https://scorefactory.io/factory2ielts\" style=\"font-family:Noto Sans Demilight\">https://scorefactory.io/factory2ielts</a></p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Noto Sans Demilight\">&#160;</span></p>\r\n\t\t\t<p lang=\"ko\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><a href=\"https://scorefactory.io/factory2ielts\" lang=\"ko-KR\" style=\"font-family:Noto Sans Demilight\">리얼프랙티스: IELTS 스피킹 - 스코어팩토리</a></p>\r\n\t\t\t<p lang=\"ko\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><a href=\"https://scorefactory.io/factory2ielts\" lang=\"ko-KR\" style=\"font-family:Noto Sans Demilight\">스코어팩토리 리얼프랙티스 아이엘츠 스피킹. 실제 시험과 같이 말하고 녹음하고 모범답안 까지 찾아보세요.</a></p>\r\n\t\t\t<p lang=\"ko\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><a href=\"https://scorefactory.io/factory2ielts\" lang=\"ko-KR\" style=\"font-family:Noto Sans Demilight\">scorefactory.io</a></p>\r\n\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">&#160;</span></p>\r\n\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Noto Sans Demilight\">여기도 마찬가지로 모답이 올라와있는데 아이엘츠 브로에서 찾을수 없는 주제는 여기서 찾아서 모답을 들을 수 있다. 근데 느낌상 잘짜여진 스크립트를 기계음이 읽어주는거라.. 확실히 표현을 습득하기엔 사람이 말한거 보다는 좀 덜 효과적인 느낌이었다.</span></p>\r\n\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">출처: </span><a href=\"https://12chn03.tistory.com/136\" lang=\"ko\" style=\"font-family:Malgun Gothic\">https://12chn03.tistory.com/136</a><span style=\"font-family:Malgun Gothic\"> [안나스 기억저장함:티스토리]</span></p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">리스닝</span></p>\r\n\t\t\t<p lang=\"ko\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:inherit;font-size:9.5pt;color:#828281;background-color:#191a1a;font-weight:bold;text-decoration:underline\">&gt;&gt; 추천 웹사이트&#160;</span></p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Helvetica Neue;font-size:9.5pt;color:#828281;background-color:#191a1a\">&#160; &#160; ** All Ears English</span></p>\r\n\t\t\t<br />\r\n\t\t\t<cite style=\"font-family:Calibri;font-size:9pt;color:#595959;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">출처</span>: &lt;<a href=\"https://m.blog.naver.com/sumishere4u/221149352323\">https://m.blog.naver.com/sumishere4u/221149352323</a>&gt; </cite>\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic;font-weight:bold\">Reading/Listeing</span></p>\r\n\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">- The Best Preparation for IELTS for Reading, Listening 교재들을 한 달 동안 두 번씩 푼다.</span></p>\r\n\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">출처: </span><a href=\"https://prohannah.tistory.com/46\" lang=\"ko\" style=\"font-family:Malgun Gothic\">https://prohannah.tistory.com/46</a><span style=\"font-family:Malgun Gothic\"> [Hello, Hannah!:티스토리]</span></p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic;font-weight:bold\">Speaking</span></p>\r\n\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">- The Best Preparation for IELTS for Speaking 입문 교재 활용</span></p>\r\n\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">- 주제별로 나누어져 있고 파트 1~3으로 모법 답안으로 구성되어 있는 책들이 있는데,</span></p>\r\n\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic;color:red\">나만의 생각</span><span style=\"font-family:Malgun Gothic\">으로 답변을 만들어놓고 달달 외우기.</span></p>\r\n\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">출처: </span><a href=\"https://prohannah.tistory.com/46\" lang=\"ko\" style=\"font-family:Malgun Gothic\">https://prohannah.tistory.com/46</a><span style=\"font-family:Malgun Gothic\"> [Hello, Hannah!:티스토리]</span></p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic;font-weight:bold\">Writing</span></p>\r\n\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">- task 1 : 그래프/표해석 150자 - 20분 소요</span></p>\r\n\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">-&#160;task 2 : 논술 250자 - 40분 소요</span></p>\r\n\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">- The Best Preparation for IELTS for Writing 내 </span><span lang=\"ko\" style=\"font-family:Malgun Gothic;color:red\">task1, task2에 나오는 모든 유형을 익히기</span></p>\r\n\t\t\t<p lang=\"ko\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic;color:black\">- 문법, 논리적으로 전개, 아이디어 순서로 중요하다.</span></p>\r\n\t\t\t<p lang=\"ko\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic;color:black\">- 글의 구조는 서론-본론-결론 구성이 나도록 연습한다.</span></p>\r\n\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">출처: </span><a href=\"https://prohannah.tistory.com/46\" lang=\"ko\" style=\"font-family:Malgun Gothic\">https://prohannah.tistory.com/46</a><span style=\"font-family:Malgun Gothic\"> [Hello, Hannah!:티스토리]</span></p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">아이엘츠</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">파일</span></p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><a href=\"https://mega.nz/folder/vGA2ASQK#nHRm6ZOxmYXSpUDHaW1w2w\">https://mega.nz/folder/vGA2ASQK#nHRm6ZOxmYXSpUDHaW1w2w</a></p>\r\n\t\t\t<br />\r\n\t\t\t<p lang=\"ko\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic;font-weight:bold\">* IELTS 독학 자료의 정석으로 알려진 Simon</span><span style=\"font-family:Malgun Gothic\">￼</span></p>\r\n\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">&#160;</span></p>\r\n\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">해외에서도 해당 사이트를 많이 이용한다고 한다.</span></p>\r\n\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">각 파트별&#160;시험에 대한&#160;팁들과 공부하기 위한&#160;샘플과 자료들을 얻을 수 있다.</span></p>\r\n\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">유투브에서 강의도 한다고 하심!</span></p>\r\n\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><a href=\"http://ielts-simon.com/\" style=\"font-family:Malgun Gothic\">http://ielts-simon.com/</a></p>\r\n\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">출처: </span><a href=\"https://prohannah.tistory.com/46\" lang=\"ko\" style=\"font-family:Malgun Gothic\">https://prohannah.tistory.com/46</a><span style=\"font-family:Malgun Gothic\"> [Hello, Hannah!:티스토리]</span></p>\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<p lang=\"ko\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic;font-weight:bold\">* IELTS 온라인 가상 시험</span><span style=\"font-family:Malgun Gothic\">￼</span></p>\r\n\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">&#160;</span></p>\r\n\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">문제를 풀면&#160;점수도 알려주어 어느 정도의 밴드 점수가 나올 지 예상해볼 수 있다.</span></p>\r\n\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><a href=\"https://ieltsonlinetests.com/\" style=\"font-family:Malgun Gothic\">https://ieltsonlinetests.com/</a></p>\r\n\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">출처: </span><a href=\"https://prohannah.tistory.com/46\" lang=\"ko\" style=\"font-family:Malgun Gothic\">https://prohannah.tistory.com/46</a><span style=\"font-family:Malgun Gothic\"> [Hello, Hannah!:티스토리]</span></p>\r\n\t\t\t<br />\r\n\t\t"

const CONTENT_HASH = 'f601e8eb';

let cards = [];
let moving = null, resizing = null;
let selectedIdx = null, clipboardCard = null;
const GRID = 20, GAP = 14;
function snap(v) { return Math.round(v / GRID) * GRID; }

// ── Undo (Ctrl+Z) ────────────────────────────────────────────────────────────
const MAX_HISTORY = 50;
let history = [];
function snapshot() {
  syncText();
  history.push(JSON.stringify(cards));
  if (history.length > MAX_HISTORY) history.shift();
}
function undo() {
  if (!history.length) { showStatus('되돌릴 내용 없음'); return; }
  syncText();
  cards = JSON.parse(history.pop());
  renderCards();
  saveBoard();
  showStatus('↩ 되돌림');
}
function showStatus(msg) {
  const s = document.getElementById('status');
  s.textContent = msg;
  clearTimeout(showStatus._t);
  showStatus._t = setTimeout(() => { s.textContent = ''; }, 2000);
}
document.addEventListener('keydown', e => {
  const isText = document.activeElement?.contentEditable === 'true';
  if ((e.ctrlKey || e.metaKey) && e.key === 'z' && !e.shiftKey) {
    if (isText) return;
    e.preventDefault();
    undo();
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'c' && !e.shiftKey && !isText) {
    if (selectedIdx !== null && cards[selectedIdx]) {
      syncText();
      clipboardCard = JSON.parse(JSON.stringify(cards[selectedIdx]));
      showStatus('카드 복사됨');
      e.preventDefault();
    }
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'v' && !e.shiftKey && !isText) {
    if (clipboardCard) {
      e.preventDefault();
      snapshot();
      const nc = JSON.parse(JSON.stringify(clipboardCard));
      nc.x = (nc.x || 0) + 30; nc.y = (nc.y || 0) + 30;
      cards.push(nc);
      selectedIdx = cards.length - 1;
      renderCards(); saveBoard();
      showStatus('카드 붙여넣음');
    }
  }
  if (e.key === 'Escape') {
    document.querySelectorAll('.card.selected').forEach(c => c.classList.remove('selected'));
    selectedIdx = null;
  }
});

function pushCards(movedIdx) {
  const moved = cards[movedIdx];
  const movedEl = document.querySelector(`.card[data-idx="${movedIdx}"]`);
  if (!movedEl) return;
  const mh = movedEl.offsetHeight;
  document.querySelectorAll('.card').forEach(el => {
    const i = +el.dataset.idx;
    if (i === movedIdx) return;
    const c = cards[i], oh = el.offsetHeight;
    if (moved.x < (c.x+(c.w||200)) && (moved.x+(moved.w||200)) > c.x && moved.y < (c.y+oh) && (moved.y+mh) > c.y) {
      c.y = moved.y + mh + GAP;
      el.style.top = c.y + 'px';
    }
  });
}

function loadBoard() {
  const saved = localStorage.getItem(SAVE_KEY);
  const savedHash = localStorage.getItem(SAVE_KEY + ':hash');
  let parsed = null;
  try { parsed = saved ? JSON.parse(saved) : null; } catch(e) {}
  // reset if: no save, empty array, or content hash changed (page regenerated)
  if (!parsed || parsed.length === 0 || savedHash !== CONTENT_HASH) {
    cards = DEFAULT_CARDS.map(c => ({...c}));
    localStorage.removeItem(SAVE_KEY);
    localStorage.setItem(SAVE_KEY + ':hash', CONTENT_HASH);
    renderCards();
    const hasCoords = cards.some(c => c.x !== undefined && c.y !== undefined);
    if (!hasCoords) autoLayout();
    return;
  }
  cards = parsed;
  renderCards();
}
function resetToDefaults() { if (!confirm('저장된 보드를 지우고 원본으로 초기화합니다. 계속할까요?')) return; localStorage.removeItem(SAVE_KEY); cards = DEFAULT_CARDS.map(c => ({...c})); renderCards(); autoLayout(); }

function autoLayout() {
  const boardW = document.getElementById('board').offsetWidth;
  const cols = Math.max(1, Math.floor(boardW / 280));
  const colW = (boardW - GAP*(cols-1)) / cols;
  const colH = new Array(cols).fill(0);
  const allCards = document.querySelectorAll('.card');
  const images = document.querySelectorAll('.card img');
  let loaded = 0;
  function place() {
    allCards.forEach((el, i) => {
      const w = Math.min(cards[i].w || colW, colW);
      let minCol = 0;
      for (let c = 1; c < cols; c++) if (colH[c] < colH[minCol]) minCol = c;
      cards[i].x = minCol * (colW + GAP);
      cards[i].y = colH[minCol];
      cards[i].w = w;
      el.style.left = cards[i].x + 'px';
      el.style.top = cards[i].y + 'px';
      el.style.width = w + 'px';
      colH[minCol] = cards[i].y + el.offsetHeight + GAP;
    });
    document.getElementById('board').style.minHeight = (Math.max(...colH) + 100) + 'px';
    saveBoard();
  }
  if (!images.length) { requestAnimationFrame(place); return; }
  images.forEach(img => {
    if (img.complete) { loaded++; if (loaded >= images.length) requestAnimationFrame(place); }
    else { img.onload = img.onerror = () => { loaded++; if (loaded >= images.length) requestAnimationFrame(place); }; }
  });
}

function syncText() {
  document.querySelectorAll('.card').forEach(el => {
    const i = +el.dataset.idx;
    if (cards[i]?.type === 'text') { const t = el.querySelector('.text'); if (t) cards[i].content = t.innerHTML; }
  });
}
function saveBoard() { syncText(); localStorage.setItem(SAVE_KEY, JSON.stringify(cards)); localStorage.setItem(SAVE_KEY + ':hash', CONTENT_HASH); showStatus('저장됨 ' + new Date().toLocaleTimeString()); }

function renderCards() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  cards.forEach((card, i) => {
    const el = document.createElement('div');
    el.className = 'card'; el.dataset.idx = i;
    if (card.x !== undefined) el.style.left = card.x + 'px';
    if (card.y !== undefined) el.style.top = card.y + 'px';
    // html cards contain raw OneNote table HTML which may overflow the stated div width
    if (card.w) { if (card.type === 'html') el.style.minWidth = card.w + 'px'; else el.style.width = card.w + 'px'; }
    el.addEventListener('mousedown', e => {
      if (e.target.closest('.text, a, .card-btn, .resize-handle, td, th')) return;
      e.preventDefault();
      // Update selection
      document.querySelectorAll('.card.selected').forEach(c => c.classList.remove('selected'));
      selectedIdx = i; el.classList.add('selected');
      snapshot();
      moving = { idx: i, startX: e.clientX, startY: e.clientY, origX: card.x||0, origY: card.y||0 };
      el.classList.add('moving');
    });
    const actions = document.createElement('div'); actions.className = 'card-actions';
    const delBtn = document.createElement('button'); delBtn.className = 'card-btn'; delBtn.textContent = '×';
    delBtn.onclick = e => { e.stopPropagation(); if(confirm('삭제?')) { snapshot(); cards.splice(i,1); renderCards(); saveBoard(); } };
    actions.appendChild(delBtn); el.appendChild(actions);
    if (card.type === 'text') {
      const text = document.createElement('div'); text.className = 'text'; text.contentEditable = true;
      text.innerHTML = card.content || '';
      text.addEventListener('focus', () => { snapshot(); });
      text.addEventListener('blur', () => { card.content = text.innerHTML; saveBoard(); });
      el.appendChild(text);
    } else if (card.type === 'image') {
      const img = document.createElement('img');
      img.src = card.src.startsWith('http') || card.src.startsWith('data:') ? card.src : IMG_BASE + card.src;
      img.alt = ''; img.loading = 'lazy'; img.onerror = () => img.style.display = 'none';
      if (card.w) img.style.width = card.w + 'px';
      if (card.h) img.style.height = card.h + 'px';
      if (card.link) { const a = document.createElement('a'); a.href = card.link; a.target = '_blank'; a.appendChild(img); el.appendChild(a); }
      else { el.appendChild(img); }
      if (card.caption) { const cap = document.createElement('div'); cap.style.cssText = 'font-size:11px;color:#8b949e;margin-top:4px;word-break:break-word;padding:0 2px;'; cap.textContent = card.caption; el.appendChild(cap); }
    } else if (card.type === 'html') {
      const wrapper = document.createElement('div');
      wrapper.style.cssText = 'overflow:auto;font-size:13px;line-height:1.5;';
      wrapper.innerHTML = card.html.replace(/__ATTACHMENT__/g, IMG_BASE);
      wrapper.querySelectorAll('img').forEach(img => { img.style.maxWidth = '100%'; img.style.height = 'auto'; img.draggable = false; });
      wrapper.querySelectorAll('a').forEach(a => { a.target = '_blank'; a.style.color = '#6cb0f6'; });
      wrapper.querySelectorAll('table').forEach(t => { t.style.borderCollapse = 'collapse'; });
      wrapper.querySelectorAll('td,th').forEach(td => {
        td.style.border = '1px solid #444'; td.style.padding = '4px 6px'; td.style.verticalAlign = 'top';
        td.title = '더블클릭으로 편집';
        td.addEventListener('dblclick', function(e) {
          e.stopPropagation();
          snapshot();
          this.contentEditable = 'true';
          this.style.outline = '2px solid #388bfd';
          this.style.background = 'rgba(56,139,253,0.08)';
          this.focus();
        });
        td.addEventListener('blur', function() {
          this.contentEditable = 'false';
          this.style.outline = '';
          this.style.background = '';
          cards[i].html = wrapper.innerHTML.split(IMG_BASE).join('__ATTACHMENT__');
          saveBoard();
        });
      });
      el.appendChild(wrapper);
    } else if (card.type === 'table') {
      const rows = card.rows || [['','',''],['','',''],['','','']];
      const tbl = document.createElement('table');
      tbl.style.cssText = 'border-collapse:collapse;width:100%;font-size:13px;';
      rows.forEach((row, ri) => {
        const tr = tbl.insertRow();
        row.forEach((cell, ci) => {
          const td = document.createElement(ri === 0 ? 'th' : 'td');
          td.contentEditable = true;
          td.style.cssText = 'border:1px solid #30363d;padding:4px 8px;min-width:60px;text-align:left;' + (ri===0 ? 'background:#21262d;font-weight:600;' : '');
          td.textContent = cell;
          td.addEventListener('blur', () => { if (!cards[i].rows) cards[i].rows = rows; rows[ri][ci] = td.textContent; saveBoard(); });
          tr.appendChild(td);
        });
      });
      el.appendChild(tbl);
      const addRow = document.createElement('button');
      addRow.textContent = '+ 행'; addRow.style.cssText = 'margin-top:4px;font-size:11px;background:#21262d;border:1px solid #30363d;color:#8b949e;padding:2px 8px;border-radius:4px;cursor:pointer;';
      addRow.onclick = e => { e.stopPropagation(); snapshot(); if (!cards[i].rows) cards[i].rows = rows; cards[i].rows.push(new Array(cards[i].rows[0].length).fill('')); renderCards(); saveBoard(); };
      const addCol = document.createElement('button');
      addCol.textContent = '+ 열'; addCol.style.cssText = 'margin-top:4px;margin-left:4px;font-size:11px;background:#21262d;border:1px solid #30363d;color:#8b949e;padding:2px 8px;border-radius:4px;cursor:pointer;';
      addCol.onclick = e => { e.stopPropagation(); snapshot(); if (!cards[i].rows) cards[i].rows = rows; cards[i].rows.forEach(r => r.push('')); renderCards(); saveBoard(); };
      el.appendChild(addRow); el.appendChild(addCol);
    }
    const rh = document.createElement('div'); rh.className = 'resize-handle';
    rh.addEventListener('mousedown', e => { e.preventDefault(); e.stopPropagation(); snapshot(); resizing = { idx: i, startX: e.clientX, startW: card.w || el.offsetWidth }; });
    el.appendChild(rh);
    if (i === selectedIdx) el.classList.add('selected');
    board.appendChild(el);
  });
  requestAnimationFrame(() => {
    let maxB = 0;
    document.querySelectorAll('.card').forEach(el => { const b = (parseFloat(el.style.top)||0) + el.offsetHeight; if (b > maxB) maxB = b; });
    board.style.minHeight = (maxB + 100) + 'px';
  });
}

document.addEventListener('mousemove', e => {
  if (moving) {
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`); if (!el) return;
    let nx = moving.origX + e.clientX - moving.startX, ny = moving.origY + e.clientY - moving.startY;
    if (e.shiftKey) { nx = snap(nx); ny = snap(ny); el.style.outline = '1px dashed rgba(240,192,64,0.3)'; } else { el.style.outline = ''; }
    el.style.left = nx + 'px'; el.style.top = ny + 'px';
  }
  if (resizing) {
    let nw = resizing.startW + e.clientX - resizing.startX; if (e.shiftKey) nw = snap(nw);
    cards[resizing.idx].w = Math.max(100, nw);
    const el = document.querySelector(`.card[data-idx="${resizing.idx}"]`); if (el) el.style.width = cards[resizing.idx].w + 'px';
  }
});

document.addEventListener('mouseup', e => {
  if (moving) {
    let nx = moving.origX + e.clientX - moving.startX, ny = moving.origY + e.clientY - moving.startY;
    if (e.shiftKey) { nx = snap(nx); ny = snap(ny); }
    cards[moving.idx].x = Math.max(0, nx); cards[moving.idx].y = Math.max(0, ny);
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`); if (el) { el.classList.remove('moving'); el.style.outline = ''; }
    if (e.shiftKey) pushCards(moving.idx);
    moving = null; saveBoard();
  }
  if (resizing) { if (e.shiftKey) pushCards(resizing.idx); resizing = null; saveBoard(); }
});

function addTextCard() { snapshot(); cards.push({ type: 'text', content: '', x: 50, y: window.scrollY+100, w: 300 }); renderCards(); setTimeout(() => { const els = document.querySelectorAll('.card .text'); els[els.length-1]?.focus(); }, 100); }
function addImageCard() { const input = document.createElement('input'); input.type = 'file'; input.accept = 'image/*'; input.onchange = e => { const f = e.target.files[0]; if (!f) return; const r = new FileReader(); r.onload = () => { snapshot(); cards.push({ type: 'image', src: r.result, x: 50, y: window.scrollY+100, w: 240 }); renderCards(); saveBoard(); }; r.readAsDataURL(f); }; input.click(); }
function addImageUrl() { const url = prompt('이미지 URL'); if (!url) return; snapshot(); cards.push({ type: 'image', src: url, x: 50, y: window.scrollY+100, w: 240 }); renderCards(); saveBoard(); }
function addTableCard() {
  const colsStr = prompt('열 수 (기본 3)', '3'); const cols = Math.max(1, parseInt(colsStr)||3);
  const rowsStr = prompt('행 수 (헤더 포함, 기본 4)', '4'); const rows = Math.max(1, parseInt(rowsStr)||4);
  snapshot();
  cards.push({ type: 'table', rows: Array.from({length: rows}, (_, ri) => Array.from({length: cols}, (_, ci) => ri===0 ? `열${ci+1}` : '')), x: 50, y: window.scrollY+100, w: Math.max(240, cols*100) });
  renderCards(); saveBoard();
}
function exportBoard() { syncText(); const blob = new Blob([JSON.stringify(cards, null, 2)], { type: 'application/json' }); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = SAVE_KEY + '.json'; a.click(); }
// ── Zoom ─────────────────────────────────────────────────────────────────────
let zoom = parseFloat(localStorage.getItem('zoom-' + SAVE_KEY) || '1.0');
function applyZoom() {
  const board = document.getElementById('board');
  board.style.transform = `scale(${zoom})`;
  board.style.transformOrigin = '0 0';
  document.getElementById('zoom-level').textContent = Math.round(zoom * 100) + '%';
  localStorage.setItem('zoom-' + SAVE_KEY, zoom);
}
function zoomIn()  { zoom = Math.min(3.0, parseFloat((zoom + 0.1).toFixed(2))); applyZoom(); }
function zoomOut() { zoom = Math.max(0.2, parseFloat((zoom - 0.1).toFixed(2))); applyZoom(); }
document.addEventListener('keydown', e => {
  if (e.ctrlKey || e.metaKey) {
    if (e.key === '=' || e.key === '+') { e.preventDefault(); zoomIn(); }
    if (e.key === '-')                  { e.preventDefault(); zoomOut(); }
    if (e.key === '0')                  { e.preventDefault(); zoom = 1.0; applyZoom(); }
  }
});
document.getElementById('board').addEventListener('wheel', e => {
  if (!(e.ctrlKey || e.metaKey)) return;
  e.preventDefault();
  e.deltaY < 0 ? zoomIn() : zoomOut();
}, { passive: false });
applyZoom();
function resetLayout() { if (!confirm('자동 재배치합니다.')) return; cards.forEach(c => { delete c.x; delete c.y; }); renderCards(); autoLayout(); }
// ── Floating format toolbar ───────────────────────────────────────────────────
const fmtBar = document.getElementById('format-toolbar');
function fmt(cmd) { document.execCommand(cmd, false, null); saveBoard(); }
function fmtLink() {
  const sel = window.getSelection();
  if (!sel || sel.isCollapsed) return;
  const url = prompt('링크 URL 입력', 'https://');
  if (!url) return;
  document.execCommand('createLink', false, url);
  // make links open in new tab
  sel.anchorNode?.parentElement?.closest('a')?.setAttribute('target', '_blank');
  document.querySelectorAll('.text a').forEach(a => a.target = '_blank');
  saveBoard();
}

// prevent format buttons from blurring contenteditable
fmtBar.addEventListener('mousedown', e => e.preventDefault());

document.addEventListener('selectionchange', () => {
  const sel = window.getSelection();
  if (!sel || sel.isCollapsed || !sel.toString().trim()) { fmtBar.style.display = 'none'; return; }
  // only show if selection is inside a .text element
  const anchor = sel.anchorNode;
  if (!anchor) { fmtBar.style.display = 'none'; return; }
  const textEl = anchor.nodeType === 1 ? anchor.closest('.text') : anchor.parentElement?.closest('.text');
  if (!textEl) { fmtBar.style.display = 'none'; return; }
  // position above selection
  const range = sel.getRangeAt(0);
  const rect = range.getBoundingClientRect();
  fmtBar.style.display = 'flex';
  const tbW = fmtBar.offsetWidth || 180;
  let left = rect.left + rect.width / 2 - tbW / 2;
  left = Math.max(8, Math.min(left, window.innerWidth - tbW - 8));
  fmtBar.style.left = left + 'px';
  fmtBar.style.top = (rect.top - 44 + window.scrollY) + 'px';
});

setInterval(saveBoard, 30000);
loadBoard();
</script>
</body>
</html>
