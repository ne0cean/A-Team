    "html": "\r\n\t\t\t<p style=\"font-family:맑은 고딕;font-size:9pt;color:#262626;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Arial;font-size:15pt;color:black;font-weight:bold\">500</span><span style=\"font-family:Malgun Gothic;font-size:15pt;color:black;font-weight:bold\">일의</span><span style=\"font-family:Arial;font-size:15pt;color:black;font-weight:bold\"> </span><span style=\"font-family:Malgun Gothic;font-size:15pt;color:black;font-weight:bold\">썸머</span></p>\r\n\t\t\t<table style=\"border:0px\">\r\n\t\t\t\t<tr>\r\n\t\t\t\t\t<td style=\"border:0px;font-family:맑은 고딕;font-size:9pt;color:#262626\"><span style=\"font-family:Arial\">(whistling)</span></td>\r\n\t\t\t\t\t<td style=\"border:0px;font-family:맑은 고딕;font-size:9pt;color:#262626\"><span style=\"font-family:Arial\">&quot;</span><span style=\"font-family:Malgun Gothic\">나쁜</span><span style=\"font-family:Arial\"> </span><span style=\"font-family:Malgun Gothic\">년</span><span style=\"font-family:Arial\">&quot; &quot;500</span><span style=\"font-family:Malgun Gothic\">일의</span><span style=\"font-family:Arial\"> </span><span style=\"font-family:Malgun Gothic\">썸머</span><span style=\"font-family:Arial\">&quot;</span></td>\r\n\t\t\t\t</tr>\r\n\t\t\t\t<tr>\r\n\t\t\t\t\t<td style=\"border:0px;font-family:맑은 고딕;font-size:9pt;color:#262626\"><span style=\"font-family:Arial\">(pencil scribbling rapidly)</span></td>\r\n\t\t\t\t\t<td style=\"border:0px;font-family:맑은 고딕;font-size:9pt;color:#262626\"><span style=\"font-family:Arial\">&quot;500</span><span style=\"font-family:Malgun Gothic\">일의</span><span style=\"font-family:Arial\"> </span><span style=\"font-family:Malgun Gothic\">썸머</span><span style=\"font-family:Arial\">&quot;</span></td>\r\n\t\t\t\t</tr>\r\n\t\t\t\t<tr>\r\n\t\t\t\t\t<td style=\"border:0px;font-family:맑은 고딕;font-size:9pt;color:#262626\"><span style=\"font-family:Arial\">(MAN narrating): This is a story of boy meets girl.</span></td>\r\n\t\t\t\t\t<td style=\"border:0px;font-family:맑은 고딕;font-size:9pt;color:#262626\"><span style=\"font-family:Malgun Gothic\">이</span><span style=\"font-family:Arial\"> </span><span style=\"font-family:Malgun Gothic\">영화는</span><span style=\"font-family:Arial\"> </span><span style=\"font-family:Malgun Gothic\">한</span><span style=\"font-family:Arial\"> </span><span style=\"font-family:Malgun Gothic\">남자와</span><span style=\"font-family:Arial\"> </span><span style=\"font-family:Malgun Gothic\">여자의</span><span style=\"font-family:Arial\"> </span><span style=\"font-family:Malgun Gothic\">이야기이다</span></td>\r\n\t\t\t\t</tr>\r\n\t\t\t\t<tr>\r\n\t\t\t\t\t<td style=\"border:0px;font-family:맑은 고딕;font-size:9pt;color:#262626\"><span style=\"font-family:Arial\">The boy, Tom Hansen of Margate, New Jersey,</span></td>\r\n\t\t\t\t\t<td style=\"border:0px;font-family:맑은 고딕;font-size:9pt;color:#262626\"><span style=\"font-family:Arial\">&quot;1</span><span style=\"font-family:Malgun Gothic\">일째</span><span style=\"font-family:Arial\">&quot; </span><span style=\"font-family:Malgun Gothic\">뉴저지주에서</span><span style=\"font-family:Arial\"> </span><span style=\"font-family:Malgun Gothic\">자란</span><span style=\"font-family:Arial\"> </span><span style=\"font-family:Malgun Gothic\">톰</span><span style=\"font-family:Arial\"> </span><span style=\"font-family:Malgun Gothic\">한센이라는</span><span style=\"font-family:Arial\"> </span><span style=\"font-family:Malgun Gothic\">소년은</span><span style=\"font-family:Arial\"> </span><span style=\"font-family:Malgun Gothic\">진정한</span><span style=\"font-family:Arial\"> </span><span style=\"font-family:Malgun Gothic\">사랑을</span><span style=\"font-family:Arial\"> </span><span style=\"font-family:Malgun Gothic\">찾기</span><span style=\"font-family:Arial\"> </span><span style=\"font-family:Malgun Gothic\">전까진</span><span style=\"font-family:Arial\"> </span><span style=\"font-family:Malgun Gothic\">행복할</span><span style=\"font-family:Arial\"> </span><span style=\"font-family:Malgun Gothic\">수</span><span style=\"font-family:Arial\"> </span><span style=\"font-family:Malgun Gothic\">없다고</span><span style=\"font-family:Arial\"> </span><span style=\"font-family:Malgun Gothic\">믿었다</span></td>\r\n\t\t\t\t</tr>\r\n\t\t\t\t<tr>\r\n\t\t\t\t\t<td style=\"border:0px;font-family:맑은 고딕;font-size:9pt;color:#262626\"><span style=\"font-family:Arial\">grew up believing that he&#39;d never truly be happy... until the day he met &quot;the one.&quot;</span></td>\r\n\t\t\t\t\t<td style=\"border:0px;font-family:맑은 고딕;font-size:9pt;color:#262626\"><span style=\"font-family:Malgun Gothic\">진정한</span><span style=\"font-family:Arial\"> </span><span style=\"font-family:Malgun Gothic\">사랑을</span><span style=\"font-family:Arial\"> </span><span style=\"font-family:Malgun Gothic\">찾기</span><span style=\"font-family:Arial\"> </span><span style=\"font-family:Malgun Gothic\">전까진</span><span style=\"font-family:Arial\"> </span><span style=\"font-family:Malgun Gothic\">행복할</span><span style=\"font-family:Arial\"> </span><span style=\"font-family:Malgun Gothic\">수</span><span style=\"font-family:Arial\"> </span><span style=\"font-family:Malgun Gothic\">없다고</span><span style=\"font-family:Arial\"> </span><span style=\"font-family:Malgun Gothic\">믿었다</span></td>\r\n\t\t\t\t</tr>\r\n\t\t\t\t<tr>\r\n\t\t\t\t\t<td style=\"border:0px;font-family:맑은 고딕;font-size:9pt;color:#262626\"><span style=\"font-family:Arial\">This belief stemmed from early exposure to sad British pop music...</span></td>\r\n\t\t\t\t\t<td style=\"border:0px;font-family:맑은 고딕;font-size:9pt;color:#262626\"><span style=\"font-family:Malgun Gothic\">어릴</span><span style=\"font-family:Arial\"> </span><span style=\"font-family:Malgun Gothic\">때부터</span><span style=\"font-family:Arial\"> </span><span style=\"font-family:Malgun Gothic\">우울한</span><span style=\"font-family:Arial\"> </span><span style=\"font-family:Malgun Gothic\">영국</span><span style=\"font-family:Arial\"> </span><span style=\"font-family:Malgun Gothic\">음악에</span><span style=\"font-family:Arial\"> </span><span style=\"font-family:Malgun Gothic\">빠졌고</span><span style=\"font-family:Arial\"> </span><span style=\"font-family:Malgun Gothic\">영화</span><span style=\"font-family:Arial\"> &#39;</span><span style=\"font-family:Malgun Gothic\">졸업</span><span style=\"font-family:Arial\">&#39;</span><span style=\"font-family:Malgun Gothic\">을</span><span style=\"font-family:Arial\"> </span><span style=\"font-family:Malgun Gothic\">잘못</span><span style=\"font-family:Arial\"> </span><span style=\"font-family:Malgun Gothic\">이해했던</span><span style=\"font-family:Arial\"> </span><span style=\"font-family:Malgun Gothic\">탓이다</span></td>\r\n\t\t\t\t</tr>\r\n\t\t\t\t<tr>\r\n\t\t\t\t\t<td style=\"border:0px;font-family:맑은 고딕;font-size:9pt;color:#262626\"><span style=\"font-family:Arial\">and a total misreading of the movie The Graduate.</span></td>\r\n\t\t\t\t\t<td style=\"border:0px;font-family:맑은 고딕;font-size:9pt;color:#262626\"><span style=\"font-family:Malgun Gothic\">영화</span><span style=\"font-family:Arial\"> &#39;</span><span style=\"font-family:Malgun Gothic\">졸업</span><span style=\"font-family:Arial\">&#39;</span><span style=\"font-family:Malgun Gothic\">을</span><span style=\"font-family:Arial\"> </span><span style=\"font-family:Malgun Gothic\">잘못</span><span style=\"font-family:Arial\"> </span><span style=\"font-family:Malgun Gothic\">이해했던</span><span style=\"font-family:Arial\"> </span><span style=\"font-family:Malgun Gothic\">탓이다</span><span style=\"font-family:Arial\"> </span><span style=\"font-family:Malgun Gothic\">일레인</span><span style=\"font-family:Arial\">!</span></td>\r\n\t\t\t\t</tr>\r\n\t\t\t\t<tr>\r\n\t\t\t\t\t<td style=\"border:0px;font-family:맑은 고딕;font-size:9pt;color:#262626\"><span style=\"font-family:Arial\">(DUSTIN HOFFMAN on TV) Elaine! Elaine!</span></td>\r\n\t\t\t\t\t<td style=\"border:0px;font-family:맑은 고딕;font-size:9pt;color:#262626\"><span style=\"font-family:Malgun Gothic\">일레인</span><span style=\"font-family:Arial\">! </span><span style=\"font-family:Malgun Gothic\">미시간주에서</span><span style=\"font-family:Arial\"> </span><span style=\"font-family:Malgun Gothic\">자란</span><span style=\"font-family:Arial\"> </span><span style=\"font-family:Malgun Gothic\">썸머</span><span style=\"font-family:Arial\"> </span><span style=\"font-family:Malgun Gothic\">핀이란</span><span style=\"font-family:Arial\"> </span><span style=\"font-family:Malgun Gothic\">소녀는</span></td>\r\n\t\t\t\t</tr>\r\n\t\t\t\t<tr>\r\n\t\t\t\t\t<td style=\"border:0px;font-family:맑은 고딕;font-size:9pt;color:#262626\"><span style=\"font-family:Arial\">NARRATOR: The girl, Summer Finn of Shinnecock, Michigan,</span></td>\r\n\t\t\t\t\t<td style=\"border:0px;font-family:맑은 고딕;font-size:9pt;color:#262626\"><span style=\"font-family:Malgun Gothic\">미시간주에서</span><span style=\"font-family:Arial\"> </span><span style=\"font-family:Malgun Gothic\">자란</span><span style=\"font-family:Arial\"> </span><span style=\"font-family:Malgun Gothic\">썸머</span><span style=\"font-family:Arial\"> </span><span style=\"font-family:Malgun Gothic\">핀이란</span><span style=\"font-family:Arial\"> </span><span style=\"font-family:Malgun Gothic\">소녀는</span></td>\r\n\t\t\t\t</tr>\r\n\t\t\t\t<tr>\r\n\t\t\t\t\t<td style=\"border:0px;font-family:맑은 고딕;font-size:9pt;color:#262626\"><span style=\"font-family:Arial\">did not share this belief.</span></td>\r\n\t\t\t\t\t<td style=\"border:0px;font-family:맑은 고딕;font-size:9pt;color:#262626\"><span style=\"font-family:Malgun Gothic\">그와</span><span style=\"font-family:Arial\"> </span><span style=\"font-family:Malgun Gothic\">달랐다</span></td>\r\n\t\t\t\t</tr>\r\n\t\t\t\t<tr>\r\n\t\t\t\t\t<td style=\"border:0px;font-family:맑은 고딕;font-size:9pt;color:#262626\"><span style=\"font-family:Arial\">Since the disintegration of her parents&#39; marriage,</span></td>\r\n\t\t\t\t\t<td style=\"border:0px;font-family:맑은 고딕;font-size:9pt;color:#262626\"><span style=\"font-family:Malgun Gothic\">부모님이</span><span style=\"font-family:Arial\"> </span><span style document.addEventListener('keydown', e => {

  const colW = (boardW - GAP*(cols-1)) / cols;
  const colH = new Array(cols).fill(0);
  const allCards = document.querySelectorAll('.card');
  const images = document.querySelectorAll('.card img');
  let loaded = 0;
  function place() {
    allCards.forEach((el, i) => {
      const w = Math.min(cards[i].w || colW, colW);
      let minCol = 0;
      for (let c = 1; c < cols; c++) if (colH[c] < colH[minCol]) minCol = c;
      cards[i].x = minCol * (colW + GAP);
      cards[i].y = colH[minCol];
      cards[i].w = w;
      el.style.left = cards[i].x + 'px';
      el.style.top = cards[i].y + 'px';
      el.style.width = w + 'px';
      colH[minCol] = cards[i].y + el.offsetHeight + GAP;
    });
    document.getElementById('board').style.minHeight = (Math.max(...colH) + 100) + 'px';
    saveBoard();
  }
  if (!images.length) { requestAnimationFrame(place); return; }
  images.forEach(img => {
    if (img.complete) { loaded++; if (loaded >= images.length) requestAnimationFrame(place); }
    else { img.onload = img.onerror = () => { loaded++; if (loaded >= images.length) requestAnimationFrame(place); }; }
  });
}

function syncText() {
  document.querySelectorAll('.card').forEach(el => {
    const i = +el.dataset.idx;
    if (cards[i]?.type === 'text') { const t = el.querySelector('.text'); if (t) cards[i].content = t.innerHTML; }
  });
}
function saveBoard() { syncText(); localStorage.setItem(SAVE_KEY, JSON.stringify(cards)); localStorage.setItem(SAVE_KEY + ':hash', CONTENT_HASH); showStatus('저장됨 ' + new Date().toLocaleTimeString()); }

function renderCards() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  cards.forEach((card, i) => {
    const el = document.createElement('div');
    el.className = 'card'; el.dataset.idx = i;
    if (card.x !== undefined) el.style.left = card.x + 'px';
    if (card.y !== undefined) el.style.top = card.y + 'px';
    // html cards contain raw OneNote table HTML which may overflow the stated div width
    if (card.w) { if (card.type === 'html') el.style.minWidth = card.w + 'px'; else el.style.width = card.w + 'px'; }
    el.addEventListener('mousedown', e => {
      if (e.target.closest('.text, a, .card-btn, .resize-handle, td, th')) return;
      e.preventDefault();
      // Update selection
      document.querySelectorAll('.card.selected').forEach(c => c.classList.remove('selected'));
      selectedIdx = i; el.classList.add('selected');
      snapshot();
      moving = { idx: i, startX: e.clientX, startY: e.clientY, origX: card.x||0, origY: card.y||0 };
      el.classList.add('moving');
    });
    const actions = document.createElement('div'); actions.className = 'card-actions';
    const delBtn = document.createElement('button'); delBtn.className = 'card-btn'; delBtn.textContent = '×';
    delBtn.onclick = e => { e.stopPropagation(); if(confirm('삭제?')) { snapshot(); cards.splice(i,1); renderCards(); saveBoard(); } };
    actions.appendChild(delBtn); el.appendChild(actions);
    if (card.type === 'text') {
      const text = document.createElement('div'); text.className = 'text'; text.contentEditable = true;
      text.innerHTML = card.content || '';
      text.addEventListener('focus', () => { snapshot(); });
      text.addEventListener('blur', () => { card.content = text.innerHTML; saveBoard(); });
      el.appendChild(text);
    } else if (card.type === 'image') {
      const img = document.createElement('img');
      img.src = card.src.startsWith('http') || card.src.startsWith('data:') ? card.src : IMG_BASE + card.src;
      img.alt = ''; img.loading = 'lazy'; img.onerror = () => img.style.display = 'none';
      if (card.w) img.style.width = card.w + 'px';
      if (card.h) img.style.height = card.h + 'px';
      if (card.link) { const a = document.createElement('a'); a.href = card.link; a.target = '_blank'; a.appendChild(img); el.appendChild(a); }
      else { el.appendChild(img); }
      if (card.caption) { const cap = document.createElement('div'); cap.style.cssText = 'font-size:11px;color:#8b949e;margin-top:4px;word-break:break-word;padding:0 2px;'; cap.textContent = card.caption; el.appendChild(cap); }
    } else if (card.type === 'html') {
      const wrapper = document.createElement('div');
      wrapper.style.cssText = 'overflow:auto;font-size:13px;line-height:1.5;';
      wrapper.innerHTML = card.html.replace(/__ATTACHMENT__/g, IMG_BASE);
      wrapper.querySelectorAll('img').forEach(img => { img.style.maxWidth = '100%'; img.style.height = 'auto'; img.draggable = false; });
      wrapper.querySelectorAll('a').forEach(a => { a.target = '_blank'; a.style.color = '#6cb0f6'; });
      wrapper.querySelectorAll('table').forEach(t => { t.style.borderCollapse = 'collapse'; });
      wrapper.querySelectorAll('td,th').forEach(td => {
        td.style.border = '1px solid #444'; td.style.padding = '4px 6px'; td.style.verticalAlign = 'top';
        td.title = '더블클릭으로 편집';
        td.addEventListener('dblclick', function(e) {
          e.stopPropagation();
          snapshot();
          this.contentEditable = 'true';
          this.style.outline = '2px solid #388bfd';
          this.style.background = 'rgba(56,139,253,0.08)';
          this.focus();
        });
        td.addEventListener('blur', function() {
          this.contentEditable = 'false';
          this.style.outline = '';
          this.style.background = '';
          cards[i].html = wrapper.innerHTML.split(IMG_BASE).join('__ATTACHMENT__');
          saveBoard();
        });
      });
      el.appendChild(wrapper);
    } else if (card.type === 'table') {
      const rows = card.rows || [['','',''],['','',''],['','','']];
      const tbl = document.createElement('table');
      tbl.style.cssText = 'border-collapse:collapse;width:100%;font-size:13px;';
      rows.forEach((row, ri) => {
        const tr = tbl.insertRow();
        row.forEach((cell, ci) => {
          const td = document.createElement(ri === 0 ? 'th' : 'td');
          td.contentEditable = true;
          td.style.cssText = 'border:1px solid #30363d;padding:4px 8px;min-width:60px;text-align:left;' + (ri===0 ? 'background:#21262d;font-weight:600;' : '');
          td.textContent = cell;
          td.addEventListener('blur', () => { if (!cards[i].rows) cards[i].rows = rows; rows[ri][ci] = td.textContent; saveBoard(); });
          tr.appendChild(td);
        });
      });
      el.appendChild(tbl);
      const addRow = document.createElement('button');
      addRow.textContent = '+ 행'; addRow.style.cssText = 'margin-top:4px;font-size:11px;background:#21262d;border:1px solid #30363d;color:#8b949e;padding:2px 8px;border-radius:4px;cursor:pointer;';
      addRow.onclick = e => { e.stopPropagation(); snapshot(); if (!cards[i].rows) cards[i].rows = rows; cards[i].rows.push(new Array(cards[i].rows[0].length).fill('')); renderCards(); saveBoard(); };
      const addCol = document.createElement('button');
      addCol.textContent = '+ 열'; addCol.style.cssText = 'margin-top:4px;margin-left:4px;font-size:11px;background:#21262d;border:1px solid #30363d;color:#8b949e;padding:2px 8px;border-radius:4px;cursor:pointer;';
      addCol.onclick = e => { e.stopPropagation(); snapshot(); if (!cards[i].rows) cards[i].rows = rows; cards[i].rows.forEach(r => r.push('')); renderCards(); saveBoard(); };
      el.appendChild(addRow); el.appendChild(addCol);
    }
    const rh = document.createElement('div'); rh.className = 'resize-handle';
    rh.addEventListener('mousedown', e => { e.preventDefault(); e.stopPropagation(); snapshot(); resizing = { idx: i, startX: e.clientX, startW: card.w || el.offsetWidth }; });
    el.appendChild(rh);
    if (i === selectedIdx) el.classList.add('selected');
    board.appendChild(el);
  });
  requestAnimationFrame(() => {
    let maxB = 0;
    document.querySelectorAll('.card').forEach(el => { const b = (parseFloat(el.style.top)||0) + el.offsetHeight; if (b > maxB) maxB = b; });
    board.style.minHeight = (maxB + 100) + 'px';
  });
}

document.addEventListener('mousemove', e => {
  if (moving) {
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`); if (!el) return;
    let nx = moving.origX + e.clientX - moving.startX, ny = moving.origY + e.clientY - moving.startY;
    if (e.shiftKey) { nx = snap(nx); ny = snap(ny); el.style.outline = '1px dashed rgba(240,192,64,0.3)'; } else { el.style.outline = ''; }
    el.style.left = nx + 'px'; el.style.top = ny + 'px';
  }
  if (resizing) {
    let nw = resizing.startW + e.clientX - resizing.startX; if (e.shiftKey) nw = snap(nw);
    cards[resizing.idx].w = Math.max(100, nw);
    const el = document.querySelector(`.card[data-idx="${resizing.idx}"]`); if (el) el.style.width = cards[resizing.idx].w + 'px';
  }
});

document.addEventListener('mouseup', e => {
  if (moving) {
    let nx = moving.origX + e.clientX - moving.startX, ny = moving.origY + e.clientY - moving.startY;
    if (e.shiftKey) { nx = snap(nx); ny = snap(ny); }
    cards[moving.idx].x = Math.max(0, nx); cards[moving.idx].y = Math.max(0, ny);
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`); if (el) { el.classList.remove('moving'); el.style.outline = ''; }
    if (e.shiftKey) pushCards(moving.idx);
    moving = null; saveBoard();
  }
  if (resizing) { if (e.shiftKey) pushCards(resizing.idx); resizing = null; saveBoard(); }
});

function addTextCard() { snapshot(); cards.push({ type: 'text', content: '', x: 50, y: window.scrollY+100, w: 300 }); renderCards(); setTimeout(() => { const els = document.querySelectorAll('.card .text'); els[els.length-1]?.focus(); }, 100); }
function addImageCard() { const input = document.createElement('input'); input.type = 'file'; input.accept = 'image/*'; input.onchange = e => { const f = e.target.files[0]; if (!f) return; const r = new FileReader(); r.onload = () => { snapshot(); cards.push({ type: 'image', src: r.result, x: 50, y: window.scrollY+100, w: 240 }); renderCards(); saveBoard(); }; r.readAsDataURL(f); }; input.click(); }
function addImageUrl() { const url = prompt('이미지 URL'); if (!url) return; snapshot(); cards.push({ type: 'image', src: url, x: 50, y: window.scrollY+100, w: 240 }); renderCards(); saveBoard(); }
function addTableCard() {
  const colsStr = prompt('열 수 (기본 3)', '3'); const cols = Math.max(1, parseInt(colsStr)||3);
  const rowsStr = prompt('행 수 (헤더 포함, 기본 4)', '4'); const rows = Math.max(1, parseInt(rowsStr)||4);
  snapshot();
  cards.push({ type: 'table', rows: Array.from({length: rows}, (_, ri) => Array.from({length: cols}, (_, ci) => ri===0 ? `열${ci+1}` : '')), x: 50, y: window.scrollY+100, w: Math.max(240, cols*100) });
  renderCards(); saveBoard();
}
function exportBoard() { syncText(); const blob = new Blob([JSON.stringify(cards, null, 2)], { type: 'application/json' }); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = SAVE_KEY + '.json'; a.click(); }
// ── Zoom ─────────────────────────────────────────────────────────────────────
let zoom = parseFloat(localStorage.getItem('zoom-' + SAVE_KEY) || '1.0');
function applyZoom() {
  const board = document.getElementById('board');
  board.style.transform = `scale(${zoom})`;
  board.style.transformOrigin = '0 0';
  document.getElementById('zoom-level').textContent = Math.round(zoom * 100) + '%';
  localStorage.setItem('zoom-' + SAVE_KEY, zoom);
}
function zoomIn()  { zoom = Math.min(3.0, parseFloat((zoom + 0.1).toFixed(2))); applyZoom(); }
function zoomOut() { zoom = Math.max(0.2, parseFloat((zoom - 0.1).toFixed(2))); applyZoom(); }
document.addEventListener('keydown', e => {
  if (e.ctrlKey || e.metaKey) {
    if (e.key === '=' || e.key === '+') { e.preventDefault(); zoomIn(); }
    if (e.key === '-')                  { e.preventDefault(); zoomOut(); }
    if (e.key === '0')                  { e.preventDefault(); zoom = 1.0; applyZoom(); }
  }
});
document.getElementById('board').addEventListener('wheel', e => {
  if (!(e.ctrlKey || e.metaKey)) return;
  e.preventDefault();
  e.deltaY < 0 ? zoomIn() : zoomOut();
}, { passive: false });
applyZoom();
function resetLayout() { if (!confirm('자동 재배치합니다.')) return; cards.forEach(c => { delete c.x; delete c.y; }); renderCards(); autoLayout(); }
// ── Floating format toolbar ───────────────────────────────────────────────────
const fmtBar = document.getElementById('format-toolbar');
function fmt(cmd) { document.execCommand(cmd, false, null); saveBoard(); }
function fmtLink() {
  const sel = window.getSelection();
  if (!sel || sel.isCollapsed) return;
  const url = prompt('링크 URL 입력', 'https://');
  if (!url) return;
  document.execCommand('createLink', false, url);
  // make links open in new tab
  sel.anchorNode?.parentElement?.closest('a')?.setAttribute('target', '_blank');
  document.querySelectorAll('.text a').forEach(a => a.target = '_blank');
  saveBoard();
}

// prevent format buttons from blurring contenteditable
fmtBar.addEventListener('mousedown', e => e.preventDefault());

document.addEventListener('selectionchange', () => {
  const sel = window.getSelection();
  if (!sel || sel.isCollapsed || !sel.toString().trim()) { fmtBar.style.display = 'none'; return; }
  // only show if selection is inside a .text element
  const anchor = sel.anchorNode;
  if (!anchor) { fmtBar.style.display = 'none'; return; }
  const textEl = anchor.nodeType === 1 ? anchor.closest('.text') : anchor.parentElement?.closest('.text');
  if (!textEl) { fmtBar.style.display = 'none'; return; }
  // position above selection
  const range = sel.getRangeAt(0);
  const rect = range.getBoundingClientRect();
  fmtBar.style.display = 'flex';
  const tbW = fmtBar.offsetWidth || 180;
  let left = rect.left + rect.width / 2 - tbW / 2;
  left = Math.max(8, Math.min(left, window.innerWidth - tbW - 8));
  fmtBar.style.left = left + 'px';
  fmtBar.style.top = (rect.top - 44 + window.scrollY) + 'px';
});

setInterval(saveBoard, 30000);
loadBoard();
</script>
