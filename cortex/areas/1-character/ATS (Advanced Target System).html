    "html": "\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:맑은 고딕;font-size:12pt;color:black;background-color:white\">Dash-board상에서 직접 MNO/통화이력/app이용정보/DSC에서 머신러닝 기반 몇</span><span lang=\"en-US\" style=\"font-size:12pt;color:black;background-color:white\"> </span><span style=\"font-family:맑은 고딕;font-size:12pt;color:black;background-color:white\">가지 가능성(부가서비스 가입가능성/2nd device 가입 가능성 등) 추정한 Dimension을 조합하여 대상자를 추출 하실 수 있습니다. </span></p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:맑은 고딕;font-size:12pt;color:black;background-color:white\">시간도 서비스관리번호 기준 15분 내로 추출가능합니다. </span></p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:맑은 고딕;font-size:12pt;color:black;background-color:white\">기존 IT 요청으로 캠페인 대상자 추출보다 훨씬 편리하게 구성되어 있습니다.</span></p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:맑은 고딕;font-size:12pt;color:black;background-color:white\">단, MNO Dimension값들은 DBM DB를 그대로 가져와서 매우 유용한데…</span></p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:맑은 고딕;font-size:12pt;color:black;background-color:white\">아직 app 이용정보는 트래킹 app 및 사용 여부를 특정짓는 방법론에서 한계가 있어 </span></p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:맑은 고딕;font-size:12pt;color:black;background-color:white\">신뢰도가 조금 떨어지긴 합니다.</span></p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><a href=\"http://150.6.13.107:8080/login\" style=\"font-family:맑은 고딕;font-size:12pt;background-color:white\">http://150.6.13.107:8080/login</a></p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><a href=\"http://ops.sktelecom.com:8080/\">http://ops.sktelecom.com:8080/</a></p>\r\n\t\t\t<br />\r\n\t\t\t<table style=\"border:0px\">\r\n\t\t\t\t<tr>\r\n\t\t\t\t\t<td style=\"border:0px;font-size:10pt\"><a href=\"http://portal.sktelecom.com/TnetBoard/TnetBoardView.aspx?BoardID=a4713f47f8784af293997afb6dd3c823&amp;OrderBy=&amp;CategoryFilter=&amp;SearchType=ALL&amp;SearchValue=&amp;CurrentPage=2&amp;ListType=List&amp;ContentID=19968&amp;IsDlg=1#\">타겟 마케팅 지원 및 고객 분석 서비스 (ATS) 확대 오픈 공지</a></td>\r\n\t\t\t\t</tr>\r\n\t\t\t\t<tr>\r\n\t\t\t\t\t<td style=\"border:0px\">\t\t\t\t\t<ul>\r\n\t\t\t\t\t\t<li style=\"font-size:10pt\">김찬호/Data서비스팀</li>\r\n\t\t\t\t\t\t<li style=\"font-size:10pt\">2017-04-05 오전 09:40:05</li>\r\n\t\t\t\t\t\t<li style=\"font-size:10pt\">조회수262</li>\r\n\t\t\t\t\t\t<li style=\"font-size:10pt\">협력직원 열람￼불가능</li>\r\n\t\t\t\t\t</ul>\r\n\t\t\t\t\t</td>\r\n\t\t\t\t</tr>\r\n\t\t\t</table>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-size:10pt;margin-top:3.8pt;margin-bottom:1.5pt\"><span style=\"font-family:나눔고딕;color:black\">사내에 데이터는 많다고 하는데 어떤 데이터가 있는지</span><span lang=\"en-US\" style=\"font-family:나눔고딕;color:black\">, </span><span style=\"font-family:나눔고딕;color:black\">어떻게</span><span lang=\"en-US\" style=\"font-family:나눔고딕;color:black\"> </span><span style=\"font-family:나눔고딕;color:black\">활용해야</span><span lang=\"en-US\" style=\"font-family:나눔고딕;color:black\"> </span><span style=\"font-family:나눔고딕;color:black\">할</span><span lang=\"en-US\" style=\"font-family:나눔고딕;color:black\"> </span><span style=\"font-family:나눔고딕;color:black\">지</span><span lang=\"en-US\" style=\"font-family:나눔고딕;color:black\"> </span><span style=\"font-family:나눔고딕;color:black\">방법을</span><span lang=\"en-US\" style=\"font-family:나눔고딕;color:black\"> </span><span style=\"font-family:나눔고딕;color:black\">모르고</span><span lang=\"en-US\" style=\"font-family:나눔고딕;color:black\"> </span><span style=\"font-family:나눔고딕;color:black\">계신가요</span><span lang=\"en-US\" style=\"font-family:나눔고딕;color:black\">? </span></p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:나눔고딕;color:black\">데이터 분석 전문가의 도움 없이도 쉽고 빠르게 고객의 특성을 살펴보고 타겟 마케팅을 하고 싶으신가요</span><span lang=\"en-US\" style=\"font-family:나눔고딕;color:black\">? </span></p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:나눔고딕;color:black;font-weight:bold\">DS추진단 Data Science Center에서 이런 니즈 해결에 도움이 되고자 Advanced Targeting System(ATS)를 직접 개발하여 전사 확대 오픈합니다. </span></p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:나눔고딕;color:black\">DSC는 재작년과 작년 수 백 건 이상의 데이터 분석에 의한 타겟 마케팅 업무를 지원해드리면서 이런 부분을 자동화할 수 없을까 고민하였고,</span></p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:나눔고딕;color:black\">작년</span><span lang=\"en-US\" style=\"font-family:나눔고딕;color:black\"> 8</span><span style=\"font-family:나눔고딕;color:black\">월부터</span><span lang=\"en-US\" style=\"font-family:나눔고딕;color:black\"> B2C </span><span style=\"font-family:나눔고딕;color:black\">타겟</span><span lang=\"en-US\" style=\"font-family:나눔고딕;color:black\"> </span><span style=\"font-family:나눔고딕;color:black\">마케팅</span><span lang=\"en-US\" style=\"font-family:나눔고딕;color:black\"> </span><span style=\"font-family:나눔고딕;color:black\">업무를</span><span lang=\"en-US\" style=\"font-family:나눔고딕;color:black\"> </span><span style=\"font-family:나눔고딕;color:black\">하시는</span><span lang=\"en-US\" style=\"font-family:나눔고딕;color:black\"> </span><span style=\"font-family:나눔고딕;color:black\">현업</span><span lang=\"en-US\" style=\"font-family:나눔고딕;color:black\"> </span><span style=\"font-family:나눔고딕;color:black\">부서</span><span lang=\"en-US\" style=\"font-family:나눔고딕;color:black\"> </span><span style=\"font-family:나눔고딕;color:black\">담당자</span><span lang=\"en-US\" style=\"font-family:나눔고딕;color:black\"> </span><span style=\"font-family:나눔고딕;color:black\">중심으로</span><span lang=\"en-US\" style=\"font-family:나눔고딕;color:black\"> Closed Beta </span><span style=\"font-family:나눔고딕;color:black\">서비스를</span><span lang=\"en-US\" style=\"font-family:나눔고딕;color:black\"> </span><span style=\"font-family:나눔고딕;color:black\">제공해왔습니다</span><span lang=\"en-US\" style=\"font-family:나눔고딕;color:black\">. </span></p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:나눔고딕;color:black\">그 동안</span><span lang=\"en-US\" style=\"font-family:나눔고딕;color:black\"> ATS</span><span style=\"font-family:나눔고딕;color:black\">의</span><span lang=\"en-US\" style=\"font-family:나눔고딕;color:black\"> </span><span style=\"font-family:나눔고딕;color:black\">소문을</span><span lang=\"en-US\" style=\"font-family:나눔고딕;color:black\"> </span><span style=\"font-family:나눔고딕;color:black\">듣고</span><span lang=\"en-US\" style=\"font-family:나눔고딕;color:black\"> </span><span style=\"font-family:나눔고딕;color:black\">많은</span><span lang=\"en-US\" style=\"font-family:나눔고딕;color:black\"> </span><span style=\"font-family:나눔고딕;color:black\">분들이</span><span lang=\"en-US\" style=\"font-family:나눔고딕;color:black\"> </span><span style=\"font-family:나눔고딕;color:black\">사용</span><span lang=\"en-US\" style=\"font-family:나눔고딕;color:black\"> </span><span style=\"font-family:나눔고딕;color:black\">요청을</span><span lang=\"en-US\" style=\"font-family:나눔고딕;color:black\"> </span><span style=\"font-family:나눔고딕;color:black\">해주셨지만</span><span lang=\"en-US\" style=\"font-family:나눔고딕;color:black\"> ATS</span><span style=\"font-family:나눔고딕;color:black\">를</span><span lang=\"en-US\" style=\"font-family:나눔고딕;color:black\"> </span><span style=\"font-family:나눔고딕;color:black\">어떤</span><span lang=\"en-US\" style=\"font-family:나눔고딕;color:black\"> </span><span style=\"font-family:나눔고딕;color:black\">범위까지</span><span lang=\"en-US\" style=\"font-family:나눔고딕;color:black\"> </span><span style=\"font-family:나눔고딕;color:black\">오픈할</span><span lang=\"en-US\" style=\"font-family:나눔고딕;color:black\"> </span><span style=\"font-family:나눔고딕;color:black\">것인지에</span><span lang=\"en-US\" style=\"font-family:나눔고딕;color:black\"> </span><span style=\"font-family:나눔고딕;color:black\">대한</span><span lang=\"en-US\" style=\"font-family:나눔고딕;color:black\"> </span><span style=\"font-family:나눔고딕;color:black\">유관</span><span lang=\"en-US\" style=\"font-family:나눔고딕;color:black\"> </span><span style=\"font-family:나눔고딕;color:black\">부서간의</span><span lang=\"en-US\" style=\"font-family:나눔고딕;color:black\"> </span><span style=\"font-family:나눔고딕;color:black\">논의가</span><span lang=\"en-US\" style=\"font-family:나눔고딕;color:black\"> </span><span style=\"font-family:나눔고딕;color:black\">필요하여</span><span lang=\"en-US\" style=\"font-family:나눔고딕;color:black\"> </span><span style=\"font-family:나눔고딕;color:black\">전사적</span><span lang=\"en-US\" style=\"font-family:나눔고딕;color:black\"> </span><span style=\"font-family:나눔고딕;color:black\">차원으로는</span><span lang=\"en-US\" style=\"font-family:나눔고딕;color:black\"> </span><span style=\"font-family:나눔고딕;color:black\">오픈하여</span><span lang=\"en-US\" style=\"font-family:나눔고딕;color:black\"> </span><span style=\"font-family:나눔고딕;color:black\">드리지</span><span lang=\"en-US\" style=\"font-family:나눔고딕;color:black\"> </span><span style=\"font-family:나눔고딕;color:black\">못하였는데</span><span lang=\"en-US\" style=\"font-family:나눔고딕;color:black\">, </span><span style=\"font-family:나눔고딕;color:black\">이번에</span><span lang=\"en-US\" style=\"font-family:나눔고딕;color:black\"> </span><span style=\"font-family:나눔고딕;color:black\">드디어</span><span lang=\"en-US\" style=\"font-family:나눔고딕;color:black\"> </span><span style=\"font-family:나눔고딕;color:black\">이러한</span><span lang=\"en-US\" style=\"font-family:나눔고딕;color:black\"> </span><span style=\"font-family:나눔고딕;color:black\">논의가</span><span lang=\"en-US\" style=\"font-family:나눔고딕;color:black\"> </span><span style=\"font-family:나눔고딕;color:black\">완료되어</span><span lang=\"en-US\" style=\"font-family:나눔고딕;color:black\"> </span><span style=\"font-family:나눔고딕;color:black\">수요</span><span lang=\"en-US\" style=\"font-family:나눔고딕;color:black\"> </span><span style=\"font-family:나눔고딕;color:black\">부서</span><span lang=\"en-US\" style=\"font-family:나눔고딕;color:black\"> </span><span style=\"font-family:나눔고딕;color:black\">대상으로</span><span lang=\"en-US\" style=\"font-family:나눔고딕;color:black\"> </span><span style=\"font-family:나눔고딕;color:black\">확대</span><span lang=\"en-US\" style=\"font-family:나눔고딕;color:black\"> </span><span style=\"font-family:나눔고딕;color:black\">오픈을</span><span lang=\"en-US\" style=\"font-family:나눔고딕;color:black\"> </span><span style=\"font-family:나눔고딕;color:black\">진행하게</span><span lang=\"en-US\" style=\"font-family:나눔고딕;color:black\"> </span><span style=\"font-family:나눔고딕;color:black\">되었습니다</span><span lang=\"en-US\" style=\"font-family:나눔고딕;color:black\">. </span></p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:나눔고딕;color:black\">ATS에서는 성별, 연령, 단말, 요금제 등 기본적인 정보를 비롯하여, Web/App 등 모바일 데이터 사용 특징, 통화 카테고리별 특징, 위치/이동 관련 특성 등에 대해 쉽고 간편하게 조합하여 타겟군의 모수를 실시간으로 파악할 수 있고 추출된 타겟군의 리스트를 안전하게 다운할 수 있습니다. </span></p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:나눔고딕;color:black\">또한</span><span lang=\"en-US\" style=\"font-family:나눔고딕;color:black\">, </span><span style=\"font-family:나눔고딕;color:black\">이렇게</span><span lang=\"en-US\" style=\"font-family:나눔고딕;color:black\"> </span><span style=\"font-family:나눔고딕;color:black\">추출된</span><span lang=\"en-US\" style=\"font-family:나눔고딕;color:black\"> </span><span style=\"font-family:나눔고딕;color:black\">타겟군과</span><span lang=\"en-US\" style=\"font-family:나눔고딕;color:black\"> SKT </span><span style=\"font-family:나눔고딕;color:black\">전체</span><span lang=\"en-US\" style=\"font-family:나눔고딕;color:black\"> </span><span style=\"font-family:나눔고딕;color:black\">고객간의</span><span lang=\"en-US\" style=\"font-family:나눔고딕;color:black\"> </span><span style=\"font-family:나눔고딕;color:black\">특징을</span><span lang=\"en-US\" style=\"font-family:나눔고딕;color:black\"> </span><span style=\"font-family:나눔고딕;color:black\">비교할</span><span lang=\"en-US\" style=\"font-family:나눔고딕;color:black\"> </span><span style=\"font-family:나눔고딕;color:black\">수</span><span lang=\"en-US\" style=\"font-family:나눔고딕;color:black\"> </span><span style=\"font-family:나눔고딕;color:black\">있는</span><span lang=\"en-US\" style=\"font-family:나눔고딕;color:black\"> </span><span style=\"font-family:나눔고딕;color:black\">간단한</span><span lang=\"en-US\" style=\"font-family:나눔고딕;color:black\"> </span><span style=\"font-family:나눔고딕;color:black\">분석기능도</span><span lang=\"en-US\" style=\"font-family:나눔고딕;color:black\"> </span><span style=\"font-family:나눔고딕;color:black\">제공합니다</span><span lang=\"en-US\" style=\"font-family:나눔고딕;color:black\"> </span></p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:나눔고딕;color:black\">(이러한 타겟 마케팅을 통한 성과 향상은 그간 DSC와 협업하여 캠페인 업무를 진행하신 현업 담당자들과 이미 ATS를 사용하고 계신 구성원들을 통해 데이터로 입증이 되었습니다)</span></p>\r\n\t\t\t<br />\r\n\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:나눔고딕;font-weight:bold\">* 접속 및 계정 신청 방법</span></p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:나눔고딕\">O 접속방법</span><span style=\"font-family:맑은 고딕\"> </span></p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:맑은 고딕\">- </span><a href=\"http://ats.sktelecom.com:8080/\" style=\"font-family:나눔고딕\">http://ats.sktelecom.com:8080</a><span style=\"font-family:나눔고딕\"> 직접 접속</span></p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:나눔고딕\">- Data Portal 내 우상단 ATS 메뉴를 통해 진입</span></p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:나눔고딕\">- 웹표준 기술들을 이용하여 개발되어, 모든 기능을 원활하게 이용하시기 위해서는 크롬 브라우저 사용을 권장 드립니다. (</span><a href=\"http://ats.sktelecom.com:8080/webapps/download_chrome/ChromeStandaloneSetup64.exe\" style=\"font-family:나눔고딕\">크롬 다운로드</a><span style=\"font-family:나눔고딕\">) </span></p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:나눔고딕\">(</span><span lang=\"ko-KR\" style=\"font-family:나눔고딕\">향후</span><span style=\"font-family:나눔고딕\"> IE 11으로 사내 표준브라우저가 대체되는 시점에는 IE 11을 기준으로 지원될 예정입니다.)</span></p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:나눔고딕\">O 계정</span></p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:나눔고딕\">- T net SSO가 적용되어 있어 사번으로 로그인 하시어 계정 신청 버튼을 누르시어 신청하시면 됩니다. 2~3일 내 승인 이후 서비스 이용이 가능합니다. </span></p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:나눔고딕\">- 계정 발급 대상은 타겟 마케팅과 데이터 분석과 관련한 Needs가 있는 사내 구성원 모두입니다만, ATS에서 분석되는 Data/Insights의 보안 특성 상, 요청사유에 대해서는 명확하게 기재해 주시기 바랍니다.</span></p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:나눔고딕;font-weight:bold\">* 사용 사례</span></p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:나눔고딕\">O 타겟팅을 위한 필터 조건 편집 예</span></p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:나눔고딕\">- 서울시에 거주하는 것으로 추정되는 20~35세 사이 고객 중, 지난 한달간 배달앱 (배달의 민족, 요기요)를 한번 이상 이용한 그룹</span></p>\r\n\t\t\t<img width=\"547\" height=\"221\" src=\"https://graph.microsoft.com/v1.0/users('realpage@naver.com')/onenote/resources/0-3161a1cf4c776ecb9a08aaef62cbeb7f!1-733661839CC53BA5!7914/$value\" data-src-type=\"image/png\" data-fullres-src=\"https://graph.microsoft.com/v1.0/users('realpage@naver.com')/onenote/resources/0-3161a1cf4c776ecb9a08aaef62cbeb7f!1-733661839CC53BA5!7914/$value\" data-fullres-src-type=\"image/png\" />\r\n\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:나눔고딕\">O 평균적인 SKT 가입자 대비 타겟군의 특징 비교</span></p>\r\n\t\t\t<img width=\"712\" height=\"465\" src=\"https://graph.microsoft.com/v1.0/users('realpage@naver.com')/onenote/resources/0-d59988066d9b600fa8d909de7c674adc!1-733661839CC53BA5!7914/$value\" data-src-type=\"image/png\" data-fullres-src=\"https://graph.microsoft.com/v1.0/users('realpage@naver.com')/onenote/resources/0-d59988066d9b600fa8d909de7c674adc!1-733661839CC53BA5!7914/$value\" data-fullres-src-type=\"image/png\" />\r\n\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:나눔고딕\">O 연관카테고리 탐색</span></p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:나눔고딕\">- ‘치킨’ 업종에 전화를 한 사람들이 함께 전화를 많이 한 카테고리는?</span></p>\r\n\t\t\t<img width=\"735\" height=\"353\" src=\"https://graph.microsoft.com/v1.0/users('realpage@naver.com')/onenote/resources/0-1f205cae046d6bb1927c1752b78e48db!1-733661839CC53BA5!7914/$value\" data-src-type=\"image/png\" data-fullres-src=\"https://graph.microsoft.com/v1.0/users('realpage@naver.com')/onenote/resources/0-1f205cae046d6bb1927c1752b78e48db!1-733661839CC53BA5!7914/$value\" data-fullres-src-type=\"image/png\" />\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:나눔고딕\">기타 문의 사항은 </span><a href=\"mailto:dsc_ats@sk.com\" lang=\"en-US\" style=\"font-family:나눔고딕\">dsc_ats@sk.com</a><span lang=\"en-US\" style=\"font-family:나눔고딕\"> </span><span style=\"font-family:나눔고딕\">으로</span><span lang=\"en-US\" style=\"font-family:나눔고딕\"> </span><span style=\"font-family:나눔고딕\">보내주시기</span><span lang=\"en-US\" style=\"font-family:나눔고딕\"> </span><span style=\"font-family:나눔고딕\">바랍니다</span><span lang=\"en-US\" style=\"font-family:나눔고딕\">. </span></p>\r\n\t\t\t<br />\r\n\t\t"
  }
];
const CONTENT_HASH = 'ca42d3c2';

let cards = [];
let moving = null, resizing = null;
let selectedIdx = null, clipboardCard = null;
const GRID = 20, GAP = 14;
function snap(v) { return Math.round(v / GRID) * GRID; }

// ── Undo (Ctrl+Z) ────────────────────────────────────────────────────────────
const MAX_HISTORY = 50;
let history = [];
function snapshot() {
  syncText();
  history.push(JSON.stringify(cards));
  if (history.length > MAX_HISTORY) history.shift();
}
function undo() {
  if (!history.length) { showStatus('되돌릴 내용 없음'); return; }
  syncText();
  cards = JSON.parse(history.pop());
  renderCards();
  saveBoard();
  showStatus('↩ 되돌림');
}
function showStatus(msg) {
  const s = document.getElementById('status');
  s.textContent = msg;
  clearTimeout(showStatus._t);
  showStatus._t = setTimeout(() => { s.textContent = ''; }, 2000);
}
document.addEventListener('keydown', e => {
  const isText = document.activeElement?.contentEditable === 'true';
  if ((e.ctrlKey || e.metaKey) && e.key === 'z' && !e.shiftKey) {
    if (isText) return;
    e.preventDefault();
    undo();
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'c' && !e.shiftKey && !isText) {
    if (selectedIdx !== null && cards[selectedIdx]) {
      syncText();
      clipboardCard = JSON.parse(JSON.stringify(cards[selectedIdx]));
      showStatus('카드 복사됨');
      e.preventDefault();
    }
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'v' && !e.shiftKey && !isText) {
    if (clipboardCard) {
      e.preventDefault();
      snapshot();
      const nc = JSON.parse(JSON.stringify(clipboardCard));
      nc.x = (nc.x || 0) + 30; nc.y = (nc.y || 0) + 30;
      cards.push(nc);
      selectedIdx = cards.length - 1;
      renderCards(); saveBoard();
      showStatus('카드 붙여넣음');
    }
  }
  if (e.key === 'Escape') {
    document.querySelectorAll('.card.selected').forEach(c => c.classList.remove('selected'));
    selectedIdx = null;
  }
});

function pushCards(movedIdx) {
  const moved = cards[movedIdx];
  const movedEl = document.querySelector(`.card[data-idx="${movedIdx}"]`);
  if (!movedEl) return;
  const mh = movedEl.offsetHeight;
  document.querySelectorAll('.card').forEach(el => {
    const i = +el.dataset.idx;
    if (i === movedIdx) return;
    const c = cards[i], oh = el.offsetHeight;
    if (moved.x < (c.x+(c.w||200)) && (moved.x+(moved.w||200)) > c.x && moved.y < (c.y+oh) && (moved.y+mh) > c.y) {
      c.y = moved.y + mh + GAP;
      el.style.top = c.y + 'px';
    }
  });
}

function loadBoard() {
  const saved = localStorage.getItem(SAVE_KEY);
  const savedHash = localStorage.getItem(SAVE_KEY + ':hash');
  let parsed = null;
  try { parsed = saved ? JSON.parse(saved) : null; } catch(e) {}
  // reset if: no save, empty array, or content hash changed (page regenerated)
  if (!parsed || parsed.length === 0 || savedHash !== CONTENT_HASH) {
    cards = DEFAULT_CARDS.map(c => ({...c}));
    localStorage.removeItem(SAVE_KEY);
    localStorage.setItem(SAVE_KEY + ':hash', CONTENT_HASH);
    renderCards();
    const hasCoords = cards.some(c => c.x !== undefined && c.y !== undefined);
    if (!hasCoords) autoLayout();
    return;
  }
  cards = parsed;
  renderCards();
}
function resetToDefaults() { if (!confirm('저장된 보드를 지우고 원본으로 초기화합니다. 계속할까요?')) return; localStorage.removeItem(SAVE_KEY); cards = DEFAULT_CARDS.map(c => ({...c})); renderCards(); autoLayout(); }

function autoLayout() {
  const boardW = document.getElementById('board').offsetWidth;
  const cols = Math.max(1, Math.floor(boardW / 280));
  const colW = (boardW - GAP*(cols-1)) / cols;
  const colH = new Array(cols).fill(0);
  const allCards = document.querySelectorAll('.card');
  const images = document.querySelectorAll('.card img');
  let loaded = 0;
  function place() {
    allCards.forEach((el, i) => {
      const w = Math.min(cards[i].w || colW, colW);
      let minCol = 0;
      for (let c = 1; c < cols; c++) if (colH[c] < colH[minCol]) minCol = c;
      cards[i].x = minCol * (colW + GAP);
      cards[i].y = colH[minCol];
      cards[i].w = w;
      el.style.left = cards[i].x + 'px';
      el.style.top = cards[i].y + 'px';
      el.style.width = w + 'px';
      colH[minCol] = cards[i].y + el.offsetHeight + GAP;
    });
    document.getElementById('board').style.minHeight = (Math.max(...colH) + 100) + 'px';
    saveBoard();
  }
  if (!images.length) { requestAnimationFrame(place); return; }
  images.forEach(img => {
    if (img.complete) { loaded++; if (loaded >= images.length) requestAnimationFrame(place); }
    else { img.onload = img.onerror = () => { loaded++; if (loaded >= images.length) requestAnimationFrame(place); }; }
  });
}

function syncText() {
  document.querySelectorAll('.card').forEach(el => {
    const i = +el.dataset.idx;
    if (cards[i]?.type === 'text') { const t = el.querySelector('.text'); if (t) cards[i].content = t.innerHTML; }
  });
}
function saveBoard() { syncText(); localStorage.setItem(SAVE_KEY, JSON.stringify(cards)); localStorage.setItem(SAVE_KEY + ':hash', CONTENT_HASH); showStatus('저장됨 ' + new Date().toLocaleTimeString()); }

function renderCards() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  cards.forEach((card, i) => {
    const el = document.createElement('div');
    el.className = 'card'; el.dataset.idx = i;
    if (card.x !== undefined) el.style.left = card.x + 'px';
    if (card.y !== undefined) el.style.top = card.y + 'px';
    // html cards contain raw OneNote table HTML which may overflow the stated div width
    if (card.w) { if (card.type === 'html') el.style.minWidth = card.w + 'px'; else el.style.width = card.w + 'px'; }
    el.addEventListener('mousedown', e => {
      if (e.target.closest('.text, a, .card-btn, .resize-handle, td, th')) return;
      e.preventDefault();
      // Update selection
      document.querySelectorAll('.card.selected').forEach(c => c.classList.remove('selected'));
      selectedIdx = i; el.classList.add('selected');
      snapshot();
      moving = { idx: i, startX: e.clientX, startY: e.clientY, origX: card.x||0, origY: card.y||0 };
      el.classList.add('moving');
    });
    const actions = document.createElement('div'); actions.className = 'card-actions';
    const delBtn = document.createElement('button'); delBtn.className = 'card-btn'; delBtn.textContent = '×';
    delBtn.onclick = e => { e.stopPropagation(); if(confirm('삭제?')) { snapshot(); cards.splice(i,1); renderCards(); saveBoard(); } };
    actions.appendChild(delBtn); el.appendChild(actions);
    if (card.type === 'text') {
      const text = document.createElement('div'); text.className = 'text'; text.contentEditable = true;
      text.innerHTML = card.content || '';
      text.addEventListener('focus', () => { snapshot(); });
      text.addEventListener('blur', () => { card.content = text.innerHTML; saveBoard(); });
      el.appendChild(text);
    } else if (card.type === 'image') {
      const img = document.createElement('img');
      img.src = card.src.startsWith('http') || card.src.startsWith('data:') ? card.src : IMG_BASE + card.src;
      img.alt = ''; img.loading = 'lazy'; img.onerror = () => img.style.display = 'none';
      if (card.w) img.style.width = card.w + 'px';
      if (card.h) img.style.height = card.h + 'px';
      if (card.link) { const a = document.createElement('a'); a.href = card.link; a.target = '_blank'; a.appendChild(img); el.appendChild(a); }
      else { el.appendChild(img); }
      if (card.caption) { const cap = document.createElement('div'); cap.style.cssText = 'font-size:11px;color:#8b949e;margin-top:4px;word-break:break-word;padding:0 2px;'; cap.textContent = card.caption; el.appendChild(cap); }
    } else if (card.type === 'html') {
      const wrapper = document.createElement('div');
      wrapper.style.cssText = 'overflow:auto;font-size:13px;line-height:1.5;';
      wrapper.innerHTML = card.html.replace(/__ATTACHMENT__/g, IMG_BASE);
      wrapper.querySelectorAll('img').forEach(img => { img.style.maxWidth = '100%'; img.style.height = 'auto'; img.draggable = false; });
      wrapper.querySelectorAll('a').forEach(a => { a.target = '_blank'; a.style.color = '#6cb0f6'; });
      wrapper.querySelectorAll('table').forEach(t => { t.style.borderCollapse = 'collapse'; });
      wrapper.querySelectorAll('td,th').forEach(td => {
        td.style.border = '1px solid #444'; td.style.padding = '4px 6px'; td.style.verticalAlign = 'top';
        td.title = '더블클릭으로 편집';
        td.addEventListener('dblclick', function(e) {
          e.stopPropagation();
          snapshot();
          this.contentEditable = 'true';
          this.style.outline = '2px solid #388bfd';
          this.style.background = 'rgba(56,139,253,0.08)';
          this.focus();
        });
        td.addEventListener('blur', function() {
          this.contentEditable = 'false';
          this.style.outline = '';
          this.style.background = '';
          cards[i].html = wrapper.innerHTML.split(IMG_BASE).join('__ATTACHMENT__');
          saveBoard();
        });
      });
      el.appendChild(wrapper);
    } else if (card.type === 'table') {
      const rows = card.rows || [['','',''],['','',''],['','','']];
      const tbl = document.createElement('table');
      tbl.style.cssText = 'border-collapse:collapse;width:100%;font-size:13px;';
      rows.forEach((row, ri) => {
        const tr = tbl.insertRow();
        row.forEach((cell, ci) => {
          const td = document.createElement(ri === 0 ? 'th' : 'td');
          td.contentEditable = true;
          td.style.cssText = 'border:1px solid #30363d;padding:4px 8px;min-width:60px;text-align:left;' + (ri===0 ? 'background:#21262d;font-weight:600;' : '');
          td.textContent = cell;
          td.addEventListener('blur', () => { if (!cards[i].rows) cards[i].rows = rows; rows[ri][ci] = td.textContent; saveBoard(); });
          tr.appendChild(td);
        });
      });
      el.appendChild(tbl);
      const addRow = document.createElement('button');
      addRow.textContent = '+ 행'; addRow.style.cssText = 'margin-top:4px;font-size:11px;background:#21262d;border:1px solid #30363d;color:#8b949e;padding:2px 8px;border-radius:4px;cursor:pointer;';
      addRow.onclick = e => { e.stopPropagation(); snapshot(); if (!cards[i].rows) cards[i].rows = rows; cards[i].rows.push(new Array(cards[i].rows[0].length).fill('')); renderCards(); saveBoard(); };
      const addCol = document.createElement('button');
      addCol.textContent = '+ 열'; addCol.style.cssText = 'margin-top:4px;margin-left:4px;font-size:11px;background:#21262d;border:1px solid #30363d;color:#8b949e;padding:2px 8px;border-radius:4px;cursor:pointer;';
      addCol.onclick = e => { e.stopPropagation(); snapshot(); if (!cards[i].rows) cards[i].rows = rows; cards[i].rows.forEach(r => r.push('')); renderCards(); saveBoard(); };
      el.appendChild(addRow); el.appendChild(addCol);
    }
    const rh = document.createElement('div'); rh.className = 'resize-handle';
    rh.addEventListener('mousedown', e => { e.preventDefault(); e.stopPropagation(); snapshot(); resizing = { idx: i, startX: e.clientX, startW: card.w || el.offsetWidth }; });
    el.appendChild(rh);
    if (i === selectedIdx) el.classList.add('selected');
    board.appendChild(el);
  });
  requestAnimationFrame(() => {
    let maxB = 0;
    document.querySelectorAll('.card').forEach(el => { const b = (parseFloat(el.style.top)||0) + el.offsetHeight; if (b > maxB) maxB = b; });
    board.style.minHeight = (maxB + 100) + 'px';
  });
}

document.addEventListener('mousemove', e => {
  if (moving) {
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`); if (!el) return;
    let nx = moving.origX + e.clientX - moving.startX, ny = moving.origY + e.clientY - moving.startY;
    if (e.shiftKey) { nx = snap(nx); ny = snap(ny); el.style.outline = '1px dashed rgba(240,192,64,0.3)'; } else { el.style.outline = ''; }
    el.style.left = nx + 'px'; el.style.top = ny + 'px';
  }
  if (resizing) {
    let nw = resizing.startW + e.clientX - resizing.startX; if (e.shiftKey) nw = snap(nw);
    cards[resizing.idx].w = Math.max(100, nw);
    const el = document.querySelector(`.card[data-idx="${resizing.idx}"]`); if (el) el.style.width = cards[resizing.idx].w + 'px';
  }
});

document.addEventListener('mouseup', e => {
  if (moving) {
    let nx = moving.origX + e.clientX - moving.startX, ny = moving.origY + e.clientY - moving.startY;
    if (e.shiftKey) { nx = snap(nx); ny = snap(ny); }
    cards[moving.idx].x = Math.max(0, nx); cards[moving.idx].y = Math.max(0, ny);
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`); if (el) { el.classList.remove('moving'); el.style.outline = ''; }
    if (e.shiftKey) pushCards(moving.idx);
    moving = null; saveBoard();
  }
  if (resizing) { if (e.shiftKey) pushCards(resizing.idx); resizing = null; saveBoard(); }
});

function addTextCard() { snapshot(); cards.push({ type: 'text', content: '', x: 50, y: window.scrollY+100, w: 300 }); renderCards(); setTimeout(() => { const els = document.querySelectorAll('.card .text'); els[els.length-1]?.focus(); }, 100); }
function addImageCard() { const input = document.createElement('input'); input.type = 'file'; input.accept = 'image/*'; input.onchange = e => { const f = e.target.files[0]; if (!f) return; const r = new FileReader(); r.onload = () => { snapshot(); cards.push({ type: 'image', src: r.result, x: 50, y: window.scrollY+100, w: 240 }); renderCards(); saveBoard(); }; r.readAsDataURL(f); }; input.click(); }
function addImageUrl() { const url = prompt('이미지 URL'); if (!url) return; snapshot(); cards.push({ type: 'image', src: url, x: 50, y: window.scrollY+100, w: 240 }); renderCards(); saveBoard(); }
function addTableCard() {
  const colsStr = prompt('열 수 (기본 3)', '3'); const cols = Math.max(1, parseInt(colsStr)||3);
  const rowsStr = prompt('행 수 (헤더 포함, 기본 4)', '4'); const rows = Math.max(1, parseInt(rowsStr)||4);
  snapshot();
  cards.push({ type: 'table', rows: Array.from({length: rows}, (_, ri) => Array.from({length: cols}, (_, ci) => ri===0 ? `열${ci+1}` : '')), x: 50, y: window.scrollY+100, w: Math.max(240, cols*100) });
  renderCards(); saveBoard();
}
function exportBoard() { syncText(); const blob = new Blob([JSON.stringify(cards, null, 2)], { type: 'application/json' }); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = SAVE_KEY + '.json'; a.click(); }
// ── Zoom ─────────────────────────────────────────────────────────────────────
let zoom = parseFloat(localStorage.getItem('zoom-' + SAVE_KEY) || '1.0');
function applyZoom() {
  const board = document.getElementById('board');
  board.style.transform = `scale(${zoom})`;
  board.style.transformOrigin = '0 0';
  document.getElementById('zoom-level').textContent = Math.round(zoom * 100) + '%';
  localStorage.setItem('zoom-' + SAVE_KEY, zoom);
}
function zoomIn()  { zoom = Math.min(3.0, parseFloat((zoom + 0.1).toFixed(2))); applyZoom(); }
function zoomOut() { zoom = Math.max(0.2, parseFloat((zoom - 0.1).toFixed(2))); applyZoom(); }
document.addEventListener('keydown', e => {
  if (e.ctrlKey || e.metaKey) {
    if (e.key === '=' || e.key === '+') { e.preventDefault(); zoomIn(); }
    if (e.key === '-')                  { e.preventDefault(); zoomOut(); }
    if (e.key === '0')                  { e.preventDefault(); zoom = 1.0; applyZoom(); }
  }
});
document.getElementById('board').addEventListener('wheel', e => {
  if (!(e.ctrlKey || e.metaKey)) return;
  e.preventDefault();
  e.deltaY < 0 ? zoomIn() : zoomOut();
}, { passive: false });
applyZoom();
function resetLayout() { if (!confirm('자동 재배치합니다.')) return; cards.forEach(c => { delete c.x; delete c.y; }); renderCards(); autoLayout(); }
// ── Floating format toolbar ───────────────────────────────────────────────────
const fmtBar = document.getElementById('format-toolbar');
function fmt(cmd) { document.execCommand(cmd, false, null); saveBoard(); }
function fmtLink() {
  const sel = window.getSelection();
  if (!sel || sel.isCollapsed) return;
  const url = prompt('링크 URL 입력', 'https://');
  if (!url) return;
  document.execCommand('createLink', false, url);
  // make links open in new tab
  sel.anchorNode?.parentElement?.closest('a')?.setAttribute('target', '_blank');
  document.querySelectorAll('.text a').forEach(a => a.target = '_blank');
  saveBoard();
}

// prevent format buttons from blurring contenteditable
fmtBar.addEventListener('mousedown', e => e.preventDefault());

document.addEventListener('selectionchange', () => {
  const sel = window.getSelection();
  if (!sel || sel.isCollapsed || !sel.toString().trim()) { fmtBar.style.display = 'none'; return; }
  // only show if selection is inside a .text element
  const anchor = sel.anchorNode;
  if (!anchor) { fmtBar.style.display = 'none'; return; }
  const textEl = anchor.nodeType === 1 ? anchor.closest('.text') : anchor.parentElement?.closest('.text');
  if (!textEl) { fmtBar.style.display = 'none'; return; }
  // position above selection
  const range = sel.getRangeAt(0);
  const rect = range.getBoundingClientRect();
  fmtBar.style.display = 'flex';
  const tbW = fmtBar.offsetWidth || 180;
  let left = rect.left + rect.width / 2 - tbW / 2;
  left = Math.max(8, Math.min(left, window.innerWidth - tbW - 8));
  fmtBar.style.left = left + 'px';
  fmtBar.style.top = (rect.top - 44 + window.scrollY) + 'px';
});

setInterval(saveBoard, 30000);
loadBoard();
</script>
