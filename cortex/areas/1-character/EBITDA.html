<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EBITDA</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1e1e1e; color: #e0e0e0; font-family: 'Segoe UI', -apple-system, sans-serif; font-size: 15px; line-height: 1.6; padding: 20px 30px 60px; overflow-x: hidden; }
a { color: #6cb0f6; text-decoration: none; }
a:hover { text-decoration: underline; }
.title-bar { background: #3a3a5c; display: inline-block; padding: 6px 16px; font-size: 22px; font-weight: bold; color: #fff; margin-bottom: 4px; }
.date { color: #999; font-size: 13px; margin-bottom: 20px; }
.board { position: relative; }
.card { background: #2a2a2a; border: 1px solid #3a3a3a; border-radius: 8px; padding: 12px; position: absolute; cursor: grab; transition: box-shadow 0.15s; overflow: hidden; }
.card:hover { box-shadow: 0 0 0 1px #58a6ff; z-index: 10; }
.card.moving { opacity: 0.8; box-shadow: 0 4px 24px rgba(0,0,0,0.6); z-index: 100; cursor: grabbing; }
.card img { width: 100%; border-radius: 4px; display: block; }
.card .text { outline: none; min-height: 20px; white-space: pre-wrap; word-break: break-word; }
.card .text:focus { background: rgba(255,255,255,0.05); border-radius: 4px; padding: 4px; }
.card .text:empty::before { content: '텍스트 입력...'; color: #555; }
.card-actions { position: absolute; top: 4px; right: 4px; display: none; gap: 4px; }
.card:hover .card-actions { display: flex; }
.card-btn { background: #333; border: 1px solid #555; color: #ccc; border-radius: 4px; padding: 2px 6px; font-size: 11px; cursor: pointer; }
.card-btn:hover { background: #444; color: #fff; }
.resize-handle { position: absolute; bottom: 0; right: 0; width: 16px; height: 16px; cursor: se-resize; opacity: 0; }
.card:hover .resize-handle { opacity: 0.6; }
.resize-handle::after { content: ''; position: absolute; bottom: 3px; right: 3px; width: 8px; height: 8px; border-right: 2px solid #666; border-bottom: 2px solid #666; }
.card.selected { box-shadow: 0 0 0 2px #58a6ff; z-index: 5; }
.highlight-red { color: #ff6b6b; }
.highlight-blue { color: #6cb0f6; }
.highlight-gold { color: #f0c040; }
.toolbar { position: fixed; bottom: 0; left: 0; right: 0; background: #161b22; border-top: 1px solid #30363d; padding: 8px 20px; display: flex; gap: 12px; align-items: center; z-index: 200; }
.toolbar button { background: #21262d; border: 1px solid #30363d; color: #e0e0e0; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; }
.toolbar button:hover { background: #30363d; }
.toolbar .status { color: #8b949e; font-size: 12px; margin-left: auto; }
#format-toolbar { position: fixed; display: none; background: #1c2128; border: 1px solid #444c56; border-radius: 8px; padding: 4px 6px; gap: 2px; align-items: center; z-index: 500; box-shadow: 0 4px 16px rgba(0,0,0,0.5); }
#format-toolbar button { background: none; border: none; color: #cdd9e5; padding: 4px 8px; border-radius: 5px; cursor: pointer; font-size: 13px; line-height: 1; }
#format-toolbar button:hover { background: #373e47; }
#format-toolbar .sep { width: 1px; height: 16px; background: #444c56; margin: 0 2px; }
</style>
</head>
<body>
<div class="title-bar" contenteditable="true">EBITDA</div>
<div class="date"></div>
<div class="board" id="board"></div>
<div id="format-toolbar">
  <button onmousedown="e=>e.preventDefault()" onclick="fmt('bold')" title="굵게"><b>B</b></button>
  <button onclick="fmt('italic')" title="기울임"><i>I</i></button>
  <button onclick="fmt('underline')" title="밑줄"><u>U</u></button>
  <div class="sep"></div>
  <button onclick="fmtLink()" title="링크 삽입">🔗</button>
  <button onclick="fmt('unlink')" title="링크 제거">✂</button>
</div>
<div class="toolbar">
  <button onclick="undo()" title="Ctrl+Z">↩ 실행취소</button>
  <button onclick="addTextCard()">+ 텍스트</button>
  <button onclick="addImageCard()">+ 이미지</button>
  <button onclick="addImageUrl()">+ 이미지 URL</button>
  <button onclick="addTableCard()">+ 표</button>
  <button onclick="saveBoard()">💾 저장</button>
  <button onclick="exportBoard()">📤 내보내기</button>
  <button onclick="resetLayout()">↺ 재배치</button>
  <button onclick="resetToDefaults()" style="color:#f85149">↺ 초기화</button>
  <div style="display:flex;align-items:center;gap:4px;margin-left:8px;border-left:1px solid #30363d;padding-left:12px;">
    <button onclick="zoomOut()" title="Ctrl+-" style="padding:6px 10px;">−</button>
    <span id="zoom-level" style="font-size:12px;color:#8b949e;min-width:36px;text-align:center;">100%</span>
    <button onclick="zoomIn()" title="Ctrl+=" style="padding:6px 10px;">+</button>
  </div>
  <span class="status" id="status">Ready</span>
</div>
<script>
const SAVE_KEY = 'board-EBITDA';
const IMG_BASE = '../../attachments/';
const DEFAULT_CARDS = [
  {
    "type": "html",
    "x": 48,
    "y": 139,
    "w": 624,
    "html": "\r\n\t\t\t<p style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:바탕;font-size:10pt;color:#999692\">최근 기업의 경영성과 측정이나 가치평가에</span><span lang=\"en-US\" style=\"font-family:바탕;font-size:10pt;color:#999692\">&#160;EBITDA</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">가 자주 사용된다</span><span lang=\"en-US\" style=\"font-family:바탕;font-size:10pt;color:#999692\">.&#160;</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">회계 정보에 대한 지식이 많지 않은 일반인들이 읽는 신문의 경제 기사에도&#160;</span><span lang=\"en-US\" style=\"font-family:바탕;font-size:10pt;color:#999692\">EBITDA</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">가 심심치 않게 눈에 띈다</span><span lang=\"en-US\" style=\"font-family:바탕;font-size:10pt;color:#999692\">. EBITDA</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">의 사용이 빈번해짐에 따라&#160;</span><span lang=\"en-US\" style=\"font-family:바탕;font-size:10pt;color:#999692\">EBITDA</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">의 한계점을 지적하면서 무분별한 사용을 비판적으로 바라보는 시각도 존재한다</span><span lang=\"en-US\" style=\"font-family:바탕;font-size:10pt;color:#999692\">. EBITDA</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">에 대한 정확한 이해를 바탕으로 기업의 경영성과</span><span lang=\"en-US\" style=\"font-family:바탕;font-size:10pt;color:#999692\">,&#160;</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">내재가치</span><span lang=\"en-US\" style=\"font-family:바탕;font-size:10pt;color:#999692\">,&#160;</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">재무건전성 등을 분석하고 해석하는 도구로 활용한다면</span><span lang=\"en-US\" style=\"font-family:바탕;font-size:10pt;color:#999692\">&#160;EBITDA</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">는 상당히 유용한 지표이다</span><span lang=\"en-US\" style=\"font-family:바탕;font-size:10pt;color:#999692\">.&#160;</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">그렇지만</span><span lang=\"en-US\" style=\"font-family:바탕;font-size:10pt;color:#999692\">&#160;EBITDA</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">에는 여러 가지 한계점이 내포되어 있기 때문에</span><span lang=\"en-US\" style=\"font-family:바탕;font-size:10pt;color:#999692\">&#160;EBITDA&#160;</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">사용에는 주의가 필요하다</span><span lang=\"en-US\" style=\"font-family:바탕;font-size:10pt;color:#999692\">. EBITDA</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">의 의미와 유용성</span><span lang=\"en-US\" style=\"font-family:바탕;font-size:10pt;color:#999692\">,&#160;</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">한계점 등을 정리한다</span><span lang=\"en-US\" style=\"font-family:바탕;font-size:10pt;color:#999692\">.</span></p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:바탕;font-size:10pt;color:#999692\">&#160;</span></p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:바탕;font-size:10pt;color:#999692;font-weight:bold\">1. EBITDA</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692;font-weight:bold\">의 의미</span></p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:바탕;font-size:10pt;color:#999692\">&#160;</span></p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:바탕;font-size:10pt;color:#999692\">EBITDA</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">는</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">&#160;Earnings Before Interest, Taxes, Depreciation and Amortization</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">의 머리글자</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">(acronym)</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">로서 이자</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">,&#160;</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">세금</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">,&#160;</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">감가상각비 차감 전 영업이익을 말한다</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">.&#160;</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">이자와 세금은 채권자와 정부에 내는 비용이다</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">.&#160;</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">감가상각비는 영업이익 계산에서 비용으로 차감되지만</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">,&#160;</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">차감되는 회계연도에는 실제 현금유출이 발생하지 않은 비용이다</span><a href=\"http://blog.naver.com/lib/smarteditor2/10507/smart_editor2_inputarea_ie8.html#_ftn1\" style=\"font-family:바탕;font-size:8pt\">[1]</a><span style=\"font-family:바탕;font-size:10pt;color:#999692\">.&#160;이자와 세금을 지급하지 않고 감가상각비(무형자산 상각비 포함)도 없다고 가정했을 때에 영업이익이나 순이익 규모를 측정하는 성과지표가&#160;EBITDA이다.</span></p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:바탕;font-size:10pt;color:#999692\">EBITDA</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">는 이자와 세금 차감 전 이익에 현금유출이 없는 비용을 더하였기 때문에 영업활동에서 발생하는 현금흐름과 유사한 의미를 갖는 지표이다</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">.&#160;</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">따라서</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">&#160;EBITDA</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">는 기업이 영업활동을 통해 벌어들인 현금창출 규모나 능력을 측정하는 성과지표로 흔히 이용된다</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">. EBITDA</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">를 통해 외부자금 조달 없이 이자지급과 원금 상환</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">,&#160;</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">투자지출 등에 사용할 수 있는 금액이 어느 정도인지를 가늠해 볼 수 있다</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">.</span><a href=\"http://blog.naver.com/lib/smarteditor2/10507/smart_editor2_inputarea_ie8.html#_ftn2\" style=\"font-family:바탕;font-size:8pt\">[2]</a><span style=\"font-family:바탕;font-size:10pt;color:#999692\">&#160;&#160;</span></p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:바탕;font-size:10pt;color:#999692\">EBITDA</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">는 이자와 세금이 차감되지 않은 이익 규모를 나타내기 때문에 재무구조</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">,&#160;</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">세제나 세율 등의 차이가 실적에 미치는 영향을 제거하고 기업간 실적을 비교할 때에 주로 사용된다</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">. EBITDA</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">의 유용성을 옹호하는 사람들은 기업의 본질적인 영업활동의 경영성과를 알지 못하게 만드는 여러 가지 비용들의 영향을 제거한 영업활동만의 성과를 정확하게 나타내는 지표가</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">&#160;EBITDA</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">라고 주장한다</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">.</span></p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:바탕;font-size:10pt;color:#999692\">&#160;</span></p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:바탕;font-size:10pt;color:#999692;font-weight:bold\">2. EBITDA</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692;font-weight:bold\">의 계산</span></p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:바탕;font-size:10pt;color:#999692\">&#160;</span></p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:바탕;font-size:10pt;color:#999692\">EBITDA&#160;</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">계산에는 통상적으로</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">&#160;2</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">가지 방법이 이용된다</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">.&#160;</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">첫째</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">,&#160;</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">당기순이익에 이자</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">,&#160;</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">세금</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">,&#160;</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">유형자산 감가상가비</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">,&#160;</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">무형자산 상각비 등을 더하여 계산하는 방법이다</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">(</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">당기순이익 기준</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">&#160;EBITDA).&#160;</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">둘째</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">,&#160;</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">좀더 간편하게 유형자산 감가상가비와 무형자산 상각비를 더하여 계산하는 방법이다</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">(</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">영업이익 기준</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">&#160;EBNITDA).</span></p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:바탕;font-size:10pt;color:#999692\">&#160;</span></p>\r\n\t\t\t<table style=\"border:1px solid;border-collapse:collapse\">\r\n\t\t\t\t<tr>\r\n\t\t\t\t\t<td style=\"background-color:#f3f3f3;border:1px solid\"><p lang=\"en-US\" style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Arial;font-size:10pt;font-weight:bold\">EBITDA(</span><span style=\"font-family:돋움체;font-size:10pt;font-weight:bold\">당기순이익</span><span style=\"font-family:Arial;font-size:10pt;font-weight:bold\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt;font-weight:bold\">기준</span><span style=\"font-family:Arial;font-size:10pt;font-weight:bold\">) =&#160;</span><span style=\"font-family:돋움체;font-size:10pt;font-weight:bold\">당기순이익</span><span style=\"font-family:Arial;font-size:10pt;font-weight:bold\">&#160;+&#160;</span><span style=\"font-family:돋움체;font-size:10pt;font-weight:bold\">이자</span><span style=\"font-family:Arial;font-size:10pt;font-weight:bold\">&#160;+&#160;</span><span style=\"font-family:돋움체;font-size:10pt;font-weight:bold\">세금</span><span style=\"font-family:Arial;font-size:10pt;font-weight:bold\">&#160;+&#160;</span><span style=\"font-family:돋움체;font-size:10pt;font-weight:bold\">유형자산</span><span style=\"font-family:Arial;font-size:10pt;font-weight:bold\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt;font-weight:bold\">감가상각비</span></p>\r\n\t\t\t\t\t<p lang=\"en-US\" style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Arial;font-size:10pt;font-weight:bold\">+&#160;</span><span style=\"font-family:돋움체;font-size:10pt;font-weight:bold\">무형자산</span><span style=\"font-family:Arial;font-size:10pt;font-weight:bold\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt;font-weight:bold\">상각비</span></p>\r\n\t\t\t\t\t<p lang=\"en-US\" style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Arial;font-size:10pt;font-weight:bold\">&#160;</span></p>\r\n\t\t\t\t\t<p lang=\"en-US\" style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Arial;font-size:10pt;font-weight:bold\">EBITDA(</span><span style=\"font-family:돋움체;font-size:10pt;font-weight:bold\">영업이익</span><span style=\"font-family:Arial;font-size:10pt;font-weight:bold\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt;font-weight:bold\">기준</span><span style=\"font-family:Arial;font-size:10pt;font-weight:bold\">) =&#160;</span><span style=\"font-family:돋움체;font-size:10pt;font-weight:bold\">영업이익</span><span style=\"font-family:Arial;font-size:10pt;font-weight:bold\">&#160;+&#160;</span><span style=\"font-family:돋움체;font-size:10pt;font-weight:bold\">유형자산</span><span style=\"font-family:Arial;font-size:10pt;font-weight:bold\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt;font-weight:bold\">감가상각비</span><span style=\"font-family:Arial;font-size:10pt;font-weight:bold\">&#160;+&#160;</span><span style=\"font-family:돋움체;font-size:10pt;font-weight:bold\">무형자산</span><span style=\"font-family:Arial;font-size:10pt;font-weight:bold\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt;font-weight:bold\">상각비</span></p>\r\n\t\t\t\t\t</td>\r\n\t\t\t\t</tr>\r\n\t\t\t</table>\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:바탕;font-size:10pt;color:#999692\">&#160;</span></p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:바탕;font-size:10pt;color:#999692\">2</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">가지 계산 방법은 유사하지만 각각 계산된</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">&#160;EBITDA</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">에 담긴 의미에는 상당한 차이가 있다</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">.&#160;</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">당기순이익에는 이자비용과 같은 재무활동의 결과와 자산매각이익 등과 같은 일시적인 활동의 경영성과가 반영된다</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">.&#160;</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">영업이익에는 주로 반복적으로 발생하는 정상적인 영업활동의 성과가 포함된다</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">.&#160;</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">첫째 방법으로 계산한 당기순이익 기준</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">&#160;EBITDA</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">에는 영업활동 이외의 성과가 포함되는 반면 둘째 방법으로 계산한 영업이익 기준</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">&#160;EBITDA</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">에는 비경상적인 활동의 성과는 제외되고 영업활동의 성과가 주로 반영된다</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">.&#160;</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">따라서 경상적인 영업활동의 경영성과를 측정하기 위해서는 두 번째 방법이 좀더 적합하다</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">.&#160;&#160;</span></p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:바탕;font-size:10pt;color:#999692\">&#160;</span></p>\r\n\t\t\t<table style=\"border:1px solid;border-collapse:collapse\">\r\n\t\t\t\t<tr>\r\n\t\t\t\t\t<td style=\"background-color:#f3f3f3;border:1px solid\"><p style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:돋움체;font-size:10pt;font-weight:bold\">당기순이익</span><span lang=\"en-US\" style=\"font-family:Arial;font-size:10pt;font-weight:bold\">&#160;=&#160;</span><span style=\"font-family:돋움체;font-size:10pt;font-weight:bold\">영업이익</span><span style=\"font-family:Arial;font-size:10pt;font-weight:bold\">&#160;</span><span lang=\"en-US\" style=\"font-family:Arial;font-size:10pt;font-weight:bold\">–&#160;</span><span style=\"font-family:돋움체;font-size:10pt;font-weight:bold\">이자</span><span style=\"font-family:Arial;font-size:10pt;font-weight:bold\">&#160;</span><span lang=\"en-US\" style=\"font-family:Arial;font-size:10pt;font-weight:bold\">–&#160;</span><span style=\"font-family:돋움체;font-size:10pt;font-weight:bold\">기타</span><span style=\"font-family:Arial;font-size:10pt;font-weight:bold\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt;font-weight:bold\">영업외손익</span><span style=\"font-family:Arial;font-size:10pt;font-weight:bold\">&#160;</span><span lang=\"en-US\" style=\"font-family:Arial;font-size:10pt;font-weight:bold\">–&#160;</span><span style=\"font-family:돋움체;font-size:10pt;font-weight:bold\">세금</span></p>\r\n\t\t\t\t\t<p style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:돋움체;font-size:10pt;font-weight:bold\">영업이익</span><span lang=\"en-US\" style=\"font-family:Arial;font-size:10pt;font-weight:bold\">&#160;=&#160;</span><span style=\"font-family:돋움체;font-size:10pt;font-weight:bold\">당기순이익</span><span lang=\"en-US\" style=\"font-family:Arial;font-size:10pt;font-weight:bold\">&#160;+&#160;</span><span style=\"font-family:돋움체;font-size:10pt;font-weight:bold\">이자</span><span lang=\"en-US\" style=\"font-family:Arial;font-size:10pt;font-weight:bold\">&#160;+&#160;</span><span style=\"font-family:돋움체;font-size:10pt;font-weight:bold\">기타</span><span style=\"font-family:Arial;font-size:10pt;font-weight:bold\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt;font-weight:bold\">영업외손익</span><span lang=\"en-US\" style=\"font-family:Arial;font-size:10pt;font-weight:bold\">&#160;+&#160;</span><span style=\"font-family:돋움체;font-size:10pt;font-weight:bold\">세금</span></p>\r\n\t\t\t\t\t</td>\r\n\t\t\t\t</tr>\r\n\t\t\t</table>\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:바탕;font-size:10pt;color:#999692\">&#160;</span></p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:바탕;font-size:10pt;color:#999692\">EBITDA</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">는 영업이익</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">,&#160;</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">당기순이익과 같이 기업이 반드시 지켜야 하는 일반적으로 인정된 회계원칙</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">(Generally Accepted Accounting Principle: GAAP)</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">에 의해 규정되고 공시가 요구되는 정보가 아니다</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">.&#160;</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">관행적으로 사용되어 왔던 것이다</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">.&#160;</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">기업들은</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">&#160;EBITDA</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">를 계산할 때에 자신들에게 유리하거나 편리한 방법을 적용하여 계산하고 공표할 가능성이 있다</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">.&#160;</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">실제로 닷컴버블이 심했을 때에 실적이 부진했던 일부 기업들은</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">&#160;EBITDA&#160;</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">또는 부풀려진 예측실적을 재무보고서를 통해 공시하고 강조했지만</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">,&#160;</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">좋지 않은 성과에 대해서는 제대로 설명하지 않았다</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">. EBITDA</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">는 경영성과에 중대한 영향을 미치는 이자나 감가상각비</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">,&#160;</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">일시적 상각이나 자산 손실</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">,&#160;</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">비경상적인 것으로 간주되는 비용 등을 포함하지 않기 때문에 회계에 대한 지식이 부족한 일반인이</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">&#160;EBITDA</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">만을 보게 되면 실적이 좋은 것처럼 착각할 수 있다</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">.</span></p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:바탕;font-size:10pt;color:#999692\">&#160;</span></p>\r\n\t\t\t<table style=\"border:1px solid;border-collapse:collapse\">\r\n\t\t\t\t<tr>\r\n\t\t\t\t\t<td style=\"background-color:#f3f3f3;border:1px solid;font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f\"><span lang=\"en-US\"><span style=\"font-family:Arial;font-size:10pt;font-weight:bold\">EBITDA</span><span style=\"font-family:돋움체;font-size:10pt;font-weight:bold\">의</span><span style=\"font-family:Arial;font-size:10pt;font-weight:bold\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt;font-weight:bold\">계산</span><span style=\"font-family:Arial;font-size:10pt;font-weight:bold\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt;font-weight:bold\">및</span><span style=\"font-family:Arial;font-size:10pt;font-weight:bold\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt;font-weight:bold\">공시에</span><span style=\"font-family:Arial;font-size:10pt;font-weight:bold\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt;font-weight:bold\">대한</span><span style=\"font-family:Arial;font-size:10pt;font-weight:bold\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt;font-weight:bold\">미국</span><span style=\"font-family:Arial;font-size:10pt;font-weight:bold\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt;font-weight:bold\">증권거래위원회</span><span style=\"font-family:Arial;font-size:10pt;font-weight:bold\">(SEC)</span><span style=\"font-family:돋움체;font-size:10pt;font-weight:bold\">의</span><span style=\"font-family:Arial;font-size:10pt;font-weight:bold\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt;font-weight:bold\">규정</span></span></td>\r\n\t\t\t\t</tr>\r\n\t\t\t\t<tr>\r\n\t\t\t\t\t<td style=\"border:1px solid;font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f\"><span style=\"font-family:돋움체;font-size:10pt\">기업들이</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">공시하는</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">보고서에서는</span><span lang=\"en-US\" style=\"font-family:Arial;font-size:10pt\">&#160;GAAP</span><span style=\"font-family:돋움체;font-size:10pt\">에</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">의해</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">작성된</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">성과평가</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">지표만이</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">포함되는</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">것이</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">원칙이다</span><span lang=\"en-US\" style=\"font-family:Arial;font-size:10pt\">.&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">하지만</span><span lang=\"en-US\" style=\"font-family:Arial;font-size:10pt\">&#160;EBITDA</span><span style=\"font-family:돋움체;font-size:10pt\">가</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">성과평가</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">지표로</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">광범위하게</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">사용됨에</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">따라</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">미국</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">증권거래위원회</span><span lang=\"en-US\" style=\"font-family:Arial;font-size:10pt\">(SEC)</span><span style=\"font-family:돋움체;font-size:10pt\">는</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">재무</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">보고서에</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">정해진</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">방법으로</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">계산된</span><span lang=\"en-US\" style=\"font-family:Arial;font-size:10pt\">&#160;EBITDA</span><span style=\"font-family:돋움체;font-size:10pt\">를</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">공시하는</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">것을</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">허용했다</span><span lang=\"en-US\" style=\"font-family:Arial;font-size:10pt\">. SEC</span><span style=\"font-family:돋움체;font-size:10pt\">는</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">투자자들을</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">오도하는</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">것을</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">방지하기</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">위해</span><span lang=\"en-US\" style=\"font-family:Arial;font-size:10pt\">&#160;SEC</span><span style=\"font-family:돋움체;font-size:10pt\">에</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">등록된</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">기업들에</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">대해</span><span lang=\"en-US\" style=\"font-family:Arial;font-size:10pt\">&#160;EBITDA</span><span style=\"font-family:돋움체;font-size:10pt\">를</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">정기</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">보고서에</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">공시할</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">때에는</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">순이익</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">기준</span><span lang=\"en-US\" style=\"font-family:Arial;font-size:10pt\">&#160;EBITDA</span><span style=\"font-family:돋움체;font-size:10pt\">를</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">사용하도록</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">규정했다</span><span lang=\"en-US\" style=\"font-family:Arial;font-size:10pt\">.</span><a href=\"http://blog.naver.com/lib/smarteditor2/10507/smart_editor2_inputarea_ie8.html#_ftn3\" lang=\"en-US\" style=\"font-family:Arial;font-size:8pt\">[3]</a><span lang=\"en-US\" style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">그리고</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">보고서에</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">공시되는</span><span lang=\"en-US\" style=\"font-family:Arial;font-size:10pt\">&#160;EBITDA</span><span style=\"font-family:돋움체;font-size:10pt\">는</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span lang=\"en-US\" style=\"font-family:Arial;font-size:10pt\">GAAP</span><span style=\"font-family:돋움체;font-size:10pt\">에</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">의해</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">작성된</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">손익계산서</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">항목을</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">사용하여</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">계산해야</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">한다</span><span lang=\"en-US\" style=\"font-family:Arial;font-size:10pt\">.&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">영업이익이나</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">다른</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">기준으로</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">계산한</span><span lang=\"en-US\" style=\"font-family:Arial;font-size:10pt\">&#160;EBITDA</span><span style=\"font-family:돋움체;font-size:10pt\">도</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">보고서에</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">포함하는</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">것을</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">허용하되</span><span lang=\"en-US\" style=\"font-family:Arial;font-size:10pt\">,&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">이와</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">같이</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">계산한</span><span lang=\"en-US\" style=\"font-family:Arial;font-size:10pt\">&#160;EBITDA</span><span style=\"font-family:돋움체;font-size:10pt\">는</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">순이익</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">기준</span><span lang=\"en-US\" style=\"font-family:Arial;font-size:10pt\">&#160;EBITDA</span><span style=\"font-family:돋움체;font-size:10pt\">와</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">다르다는</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">것을</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">인식할</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">수</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">있도록</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span lang=\"en-US\" style=\"font-family:Arial;font-size:10pt\">‘</span><span style=\"font-family:돋움체;font-size:10pt\">조정된</span><span lang=\"en-US\" style=\"font-family:Arial;font-size:10pt\">&#160;EBITDA(adjusted EBITDA)’</span><span style=\"font-family:돋움체;font-size:10pt\">와</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">같이</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">명칭을</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">다르게</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">표시해야</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">한다</span><span lang=\"en-US\" style=\"font-family:Arial;font-size:10pt\">.</span><a href=\"http://blog.naver.com/lib/smarteditor2/10507/smart_editor2_inputarea_ie8.html#_ftn4\" lang=\"en-US\" style=\"font-family:Arial;font-size:8pt\">[4]</a><span lang=\"en-US\" style=\"font-family:Arial;font-size:10pt\">&#160;EBITDA</span><span style=\"font-family:돋움체;font-size:10pt\">가</span><span lang=\"en-US\" style=\"font-family:Arial;font-size:10pt\">&#160;GAAP</span><span style=\"font-family:돋움체;font-size:10pt\">에</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">의해</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">성과</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">측정치는</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">아니지만</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">계산과</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">공시</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">방법을</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">통일하여</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">회계원칙을</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">지키는</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">효과를</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">얻고</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">기업간</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">비교가</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">가능하도록</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">하기</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">위한</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">취지로</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">보인다</span><span lang=\"en-US\" style=\"font-family:Arial;font-size:10pt\">.</span></td>\r\n\t\t\t\t</tr>\r\n\t\t\t</table>\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:바탕;font-size:10pt;color:#999692\">&#160;</span></p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:바탕;font-size:10pt;color:#999692;font-weight:bold\">3. EBITDA</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692;font-weight:bold\">의 역사</span><a href=\"http://blog.naver.com/lib/smarteditor2/10507/smart_editor2_inputarea_ie8.html#_ftn5\" style=\"font-family:바탕;font-size:8pt\">[5]</a></p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:바탕;font-size:10pt;color:#999692\">&#160;</span></p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:바탕;font-size:10pt;color:#999692\">EBITDA</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">는</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">&#160;LBO(leveraged buyout)</span><a href=\"http://blog.naver.com/lib/smarteditor2/10507/smart_editor2_inputarea_ie8.html#_ftn6\" style=\"font-family:바탕;font-size:8pt\">[6]</a><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">가 유행하던</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">&#160;1980</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">년대 중반 인수 후보 기업의 투자 매력도를 평가하기 위해 사용되기 시작하면서 널리 알려졌다</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">. LBO&#160;</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">투자는 인수자금을 차입하기 때문에 인수대상 회사의 재무구조가 급격하게 나빠진다</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">. LBO</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">는 재무적으로 어려움을 겪고 있는 기업을 인수한 이후 구조조정을 통해 회생시키고 기업가치를 높여 다시 매각하기 위한 목적으로 주로 사용되었다</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">.&#160;</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">따라서</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">&#160;LBO&#160;</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">투자 타당성 평가의 핵심적인 요인은 지출을 가능한 억제하면서 기업을 구입하기 위해 빌린 자금을 상환하는데 사용할 수 있는 현금흐름을 창출할 수 있는 능력이다</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">. LBO</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">는 인수 이후 기업의 이익이나 자산매각 등을 통해 유입되는 현금으로 차입금을 상환하기 때문에 인수한 기업의 이자 및 부채 상환능력 파악이 중요한 것이다</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">.</span></p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:바탕;font-size:10pt;color:#999692\">LBO</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">에 참여한 투자자들은 인수기업의 부채상환능력을 빠르게 파악하기 위한 간편한 방법으로</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">&#160;EBITDA</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">를 사용했다</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">.&#160;</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">인수한 기업이 벌어들이는 현금흐름을 설비투자 등에 사용하지 않고 부채 상환에만 사용할 경우 상환 기간이 얼마인지를 계산하는 기준으로</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">&#160;EBITDA</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">를 사용했다</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">.&#160;</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">개념적으로 감가상각비는 기업이 설비투자에 필요한 자금을 비용으로 인식하고 이익에서 차감하여 미래 투자에 필요한 자금을 매년 적립해 놓는 기금으로 볼 수 있다</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">.&#160;</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">따라서 감가상각비가 차감된</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">&#160;EBITDA</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">를 사용하여 부채상환능력을 평가하는 것은 설비투자에 현금흐름을 사용하지 않는다는 것을 전제로 하는 것으로 해석할 수 있다</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">.&#160;</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">기업의 장기적인 핵심역량 강화에 필요한 투자를 하지 않고 단기적인 현금흐름의 측면에서만 부채상환능력을 파악하는 방법이다</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">.&#160;</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">부채상환능력이 과대평가될 가능성이 있다</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">.</span></p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:바탕;font-size:10pt;color:#999692\">EBITDA</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">는 기업이 설비투자 등에 현금흐름을 사용하지 않고 이자나 원금을 상환하거나 배당을 지급하는데 사용할 수 있는 현금흐름을 나타내는 측정치로 사용되었다</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">.&#160;</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">기업의</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">&#160;EBITDA&#160;</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">기준 이자보상배율</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">(EBITDA/</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">이자비용</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">)</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">을 살펴보면 이자를 상환할 수 있는 능력을 복잡한 계산을 하지 않고도 빠르게 파악할 수 있다</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">.&#160;</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">예를 들면</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">&#160;EBITDA</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">가</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">&#160;2</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">억 원이고 이자비용이</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">&#160;1</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">억 원</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">(EBITDA&#160;</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">기준 이자보상배율</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">&#160;2</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">배</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">)</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">이면 이자비용을 지급한 이후 부채를 상환할 수 있는 여력이 있음을 나타낸다</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">.&#160;</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">이와 같이 기업의 부채상환능력을 빠르게 파악할 수 있는 간편하고 유용한 지표로 인식되면서</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">&#160;EBITDA&#160;</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">사용이 빠르게 퍼져 나갔다</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">.</span></p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:바탕;font-size:10pt;color:#999692\">EBITDA</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">는 기업간 성과평가와 가치평가 등의 다른 분야로의 적용도 확산되었다</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">.&#160;</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">처음에 단기간의 부채상환능력에 주로 초점이 맞추어졌던</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">&#160;EBITDA</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">가 나중에는 장기간에 걸쳐 감가상각이 이루어지는 대규모 설비투자가 필요한 통신이나 전력 등의 산업에서도 성과평가를 위한 지표로도 인기를 얻었고 많이 사용되었다</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">.&#160;</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">기업가치</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">/EBITDA&#160;</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">배율을 적용한 기업가치 평가에도 흔히 사용되었다</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">.</span></p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:바탕;font-size:10pt;color:#999692\">&#160;</span></p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:바탕;font-size:10pt;color:#999692;font-weight:bold\">4. EBITDA</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692;font-weight:bold\">의 유용성</span></p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:바탕;font-size:10pt;color:#999692\">&#160;</span></p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Wingdings;font-size:10pt;color:#999692;font-weight:bold\">q</span><span style=\"font-family:바탕;font-size:10pt;color:#999692;font-weight:bold\">&#160;재무구조나 자산구조의 영향을 제거한 기업간 성과 비교</span></p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:바탕;font-size:10pt;color:#999692\">&#160;</span></p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:바탕;font-size:10pt;color:#999692\">EBITDA</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">는 외부자금조달 및 설비투자에 따르는 이자비용과 감가상각비</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">,&#160;</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">인수합병이나 무형자산 투자로 인해 발생하는 무형자산 상각비 등을 차감하여 계산한다</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">. EBITDA</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">를 사용하여 기업간 경영성과를 비교하게 되면 재무구조나 자산구조가 경영성과에 미치는 영향이 제거되는 효과를 얻는다</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">. EBITDA</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">는 영업활동의 경영성과를 동일한 잣대로 비교하는데 적합한 성과 측정치라고 할 수 있다</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">.</span></p>\r\n\t\t\t<p style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:바탕;font-size:10pt;color:#999692\">영업이익이나 순이익은 영업활동 이외에 경영자의 투자의사결정 결과인 인수합병이나 자산의 매입 가격</span><span lang=\"en-US\" style=\"font-family:바탕;font-size:10pt;color:#999692\">,&#160;</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">감가상각 방법 등에 의해 영향을 받는다</span><span lang=\"en-US\" style=\"font-family:바탕;font-size:10pt;color:#999692\">. EBITDA</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">에는 이러한 경영자의 주관적인 판단과 자의적인 선택 등이 경영성과에 미치는 영향이 상당 부분 제거된다</span><span lang=\"en-US\" style=\"font-family:바탕;font-size:10pt;color:#999692\">.&#160;</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">이에 따라</span><span lang=\"en-US\" style=\"font-family:바탕;font-size:10pt;color:#999692\">&#160;EBITDA</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">는 서로 다른 자본구조</span><span lang=\"en-US\" style=\"font-family:바탕;font-size:10pt;color:#999692\">,&#160;</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">자산구조</span><span lang=\"en-US\" style=\"font-family:바탕;font-size:10pt;color:#999692\">,&#160;</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">세율 등을 가진 기업이나 사업의 경영성과를 비교하는데 다른 성과지표에 비해 더 적합한 것이다</span><span lang=\"en-US\" style=\"font-family:바탕;font-size:10pt;color:#999692\">.</span></p>\r\n\t\t\t<p style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:바탕;font-size:10pt;color:#999692\">기업의 경영성과는 재무구조에 따라 달라진다</span><span lang=\"en-US\" style=\"font-family:바탕;font-size:10pt;color:#999692\">.&#160;</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">동일한 영업이익이 발생했어도 외부자금 의존도가 높은 기업의 순이익은 자기자본 의존도가 높은 기업에 비해 작다</span><span lang=\"en-US\" style=\"font-family:바탕;font-size:10pt;color:#999692\">.&#160;</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">예를 들어 영업이익이</span><span lang=\"en-US\" style=\"font-family:바탕;font-size:10pt;color:#999692\">&#160;100</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">원이라도 차입금 이자가</span><span lang=\"en-US\" style=\"font-family:바탕;font-size:10pt;color:#999692\">&#160;50</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">원 발생했으면 순이익은</span><span lang=\"en-US\" style=\"font-family:바탕;font-size:10pt;color:#999692\">&#160;50</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">원이 되지만 전부 자기자금으로 조달해서 금융비용이 없으면 순이익은</span><span lang=\"en-US\" style=\"font-family:바탕;font-size:10pt;color:#999692\">&#160;100</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">원이 된다</span><span lang=\"en-US\" style=\"font-family:바탕;font-size:10pt;color:#999692\">.</span></p>\r\n\t\t\t<p style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:바탕;font-size:10pt;color:#999692\">설비투자 규모나 감가상각 방법의 차이도 회계적 경영성과에 차이를 만든다</span><span lang=\"en-US\" style=\"font-family:바탕;font-size:10pt;color:#999692\">.&#160;</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">설비투자가 많아 감가상각비가 많이 발생하는</span><span lang=\"en-US\" style=\"font-family:바탕;font-size:10pt;color:#999692\">&#160;IT</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">와 통신 등의 장치산업들은 영업이익에서 차감되는 감가상각비 규모도 크다</span><span lang=\"en-US\" style=\"font-family:바탕;font-size:10pt;color:#999692\">.&#160;</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">반면 설비투자가 많이 필요하지 않은 유통업 등은 감가상각비가 많이 발생하지 않는다</span><span lang=\"en-US\" style=\"font-family:바탕;font-size:10pt;color:#999692\">.&#160;</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">감가상각 방법의 차이도 영업이익에 영향을 미친다</span><span lang=\"en-US\" style=\"font-family:바탕;font-size:10pt;color:#999692\">.&#160;</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">동일한 금액과 내용연수를 가진 설비투자라면 전체 기간 동안의 감가상각비는 동일하지만 감각상각 방법이 달라지면 기간별로 차이가 나게 된다</span><span lang=\"en-US\" style=\"font-family:바탕;font-size:10pt;color:#999692\">.&#160;</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">설비투자 초기에 상대적으로 감가상각을 많이 하는 기업은 초기에 영업이익이 적지만 나중에는 상대적인 영업이익이 커진다</span><span lang=\"en-US\" style=\"font-family:바탕;font-size:10pt;color:#999692\">.&#160;&#160;&#160;</span></p>\r\n\t\t\t<p style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:바탕;font-size:10pt;color:#999692\">이와 같이</span><span lang=\"en-US\" style=\"font-family:바탕;font-size:10pt;color:#999692\">&#160;EBITDA</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">를 사용하면 자본구조나 영업레버리지</span><span lang=\"en-US\" style=\"font-family:바탕;font-size:10pt;color:#999692\">(operating leverage)</span><a href=\"http://blog.naver.com/lib/smarteditor2/10507/smart_editor2_inputarea_ie8.html#_ftn7\" lang=\"en-US\" style=\"font-family:바탕;font-size:8pt\">[7]</a><span style=\"font-family:바탕;font-size:10pt;color:#999692\">가 경영성과에 미치는 영향을 제거한 성과 비교가 가능하기 때문에 영업활동의 성과를 좀더 정확하게 비교할 수 있다</span><span lang=\"en-US\" style=\"font-family:바탕;font-size:10pt;color:#999692\">. EBITDA</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">는 동일한 기준</span><a href=\"http://blog.naver.com/lib/smarteditor2/10507/smart_editor2_inputarea_ie8.html#_ftn8\" lang=\"en-US\" style=\"font-family:바탕;font-size:8pt\">[8]</a><span style=\"font-family:바탕;font-size:10pt;color:#999692\">을 적용한&#160;</span><span lang=\"en-US\" style=\"font-family:Times New Roman;font-size:10pt;color:#999692\">“</span><span lang=\"en-US\" style=\"font-family:바탕;font-size:10pt;color:#999692\">Apple-to-Apple</span><span lang=\"en-US\" style=\"font-family:Times New Roman;font-size:10pt;color:#999692\">”</span><span lang=\"en-US\" style=\"font-family:바탕;font-size:10pt;color:#999692\">&#160;</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">비교의 측면에서 유용한 성과지표라고 할 수 있다</span><span lang=\"en-US\" style=\"font-family:바탕;font-size:10pt;color:#999692\">.&#160;</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">기업간 비교뿐만 아니라 산업간 또는 한 기업 내에서의 사업부별 성과비교에도 사용될 수 있다</span><span lang=\"en-US\" style=\"font-family:바탕;font-size:10pt;color:#999692\">.</span></p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:바탕;font-size:10pt;color:#999692\">&#160;</span></p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Wingdings;font-size:10pt;color:#999692;font-weight:bold\">q</span><span style=\"font-family:바탕;font-size:10pt;color:#999692;font-weight:bold\">&#160;핵심이익 측정</span></p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:바탕;font-size:10pt;color:#999692\">&#160;</span></p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:바탕;font-size:10pt;color:#999692\">EBITDA</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">는 핵심적인 영업활동</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">(core operation activity)</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">의 경영성과를 측정하는데 유용한 성과지표이다</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">.&#160;</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">투자자들은 기업의 본질적인 영업활동에서 얻는 경영성과를 알고 싶을 때가 많다</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">.&#160;</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">비록 전체적인 경영성과가 좋지 못하더라도 핵심적인 영업활동의 경영성과가 높다는 것은 핵심역량을 보유하고 있고 앞으로 실적이 좋아질 가능성이 높다는 것을 의미한다</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">.</span></p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:바탕;font-size:10pt;color:#999692\">EBITDA</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">는 경영자의 자본조달이나 투자 의사결정이 영업이익에 미치는 영향을 제거한 비교적 순수한 영업활동만의 경영성과이다</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">. EBITDA</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">가 높다면 영업활동 자체의 성과는 양호하다는 것을 의미한다</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">.&#160;</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">영업이익이나 순이익은 다른 기업에 비해 좋지 못하지만</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">&#160;EBITD</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">가 크다면 수익성이 낮은 자산을 매각하여 차입금을 상환하는 등 재무 및 자산 구조조정을 실시한다면 경영성과가 개선될 여지가 높다</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">.&#160;</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">과거</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">&#160;LBO</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">가 유행할 때에</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">&#160;EBITDA&#160;</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">사용이 널리 퍼진 이유가 여기에 있다</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">.</span></p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:바탕;font-size:10pt;color:#999692\">EBITDA</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">에는 핵심적이고 경상적인 영업활동의 성과가 주로 반영된다</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">.&#160;</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">현금흐름표에 제공되는 영업현금흐름은 영업활동에서 발생하는 현금흐름을 정확하게 측정한 것이지만</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">,&#160;</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">비경상적인 경영활동의 성과가 포함되어 있다</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">.&#160;</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">따라서</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">&#160;EBITDA</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">는 간편하게 장기적인 수익성을 측정하는데 유용한 수단이라고 할 수 있을 것이다</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">.</span></p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:바탕;font-size:10pt;color:#999692\">&#160;</span></p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Wingdings;font-size:10pt;color:#999692;font-weight:bold\">q</span><span style=\"font-family:바탕;font-size:10pt;color:#999692;font-weight:bold\">&#160;간편하게 계산할 수 있는 현금흐름의 대용치</span></p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:바탕;font-size:10pt;color:#999692\">&#160;</span></p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:바탕;font-size:10pt;color:#999692\">EBITDA</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">의 장점은 간편성에 있다</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">.&#160;</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">회계에 대한 깊은 지식이 없더라도 기업이 제공하는 재무제표에서 몇 가지 항목을 가지고 쉽게</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">&#160;EBITDA</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">를 계산할 수 있다</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">. EBITDA</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">는 엄밀한 의미에서 영업활동에서 발생하는 현금흐름</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">(</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">영업현금흐름</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">)</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">은 아니지만</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">,</span><a href=\"http://blog.naver.com/lib/smarteditor2/10507/smart_editor2_inputarea_ie8.html#_ftn9\" style=\"font-family:바탕;font-size:8pt\">[9]</a><span style=\"font-family:바탕;font-size:10pt;color:#999692\">&#160;</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">경상적인 영업활동의 영업현금흐름과 유사한 성격을 갖는다</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">.</span></p>\r\n\t\t\t<p style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:바탕;font-size:10pt;color:#999692\">영업현금흐름에 대한 정확한 정보는 현금흐름표를 보면 알 수 있다</span><span lang=\"en-US\" style=\"font-family:바탕;font-size:10pt;color:#999692\">.&#160;</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">그렇지만 회계에 대한 지식이 부족한 일반인이 비경상적인 실적이나 재무활동 등의 결과가 포함되어 있는 영업현금흐름에서 핵심적인 영업활동에서 발생하는 경상적인 영업현금흐름만을 따로 분리해서 파악하기는 쉽지 않다</span><span lang=\"en-US\" style=\"font-family:바탕;font-size:10pt;color:#999692\">.</span></p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:바탕;font-size:10pt;color:#999692\">EBITDA</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">는 경상적인 영업활동의 현금흐름을 짧은 시간에 대략적으로 측정할 수 있는 유용한 수단이다</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">.&#160;</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">영업활동을 기준으로 계산한</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">&#160;EBITDA(</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">영업이익</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">+</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">감가상각비</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">)</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">는 경상적인 영업활동의 현금흐름으로 보아도 커다란 무리는 없다</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">.&#160;</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">채권자의 입장에서</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">&#160;EBITDA</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">는 이자 및 차입금 상환에 이용할 수 있는 현금흐름의 간편한 측정치이다</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">.</span></p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:바탕;font-size:10pt;color:#999692\">&#160;</span></p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Wingdings;font-size:10pt;color:#999692;font-weight:bold\">q</span><span style=\"font-family:바탕;font-size:10pt;color:#999692;font-weight:bold\">&#160;부채상환능력 측정의 도구</span></p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:바탕;font-size:10pt;color:#999692\">&#160;</span></p>\r\n\t\t\t<p style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:바탕;font-size:10pt;color:#999692\">앞서</span><span lang=\"en-US\" style=\"font-family:바탕;font-size:10pt;color:#999692\">&#160;EBITDA</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">의 역사에서 살펴본 것처럼 설비자산에 전혀 투자를 하지 않을 경우에</span><span lang=\"en-US\" style=\"font-family:바탕;font-size:10pt;color:#999692\">&#160;EBITDA</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">는 이자 지급과 원금 상환</span><span lang=\"en-US\" style=\"font-family:바탕;font-size:10pt;color:#999692\">,&#160;</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">그리고 배당으로 지급할 수 있는 현금흐름을 가늠하는 측정치로 사용할 수 있다</span><span lang=\"en-US\" style=\"font-family:바탕;font-size:10pt;color:#999692\">. EBITDA</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">는 이자 지급과 차입금 원금 상환에 사용할 수 있는 현금 이익으로 사용된다</span><span lang=\"en-US\" style=\"font-family:바탕;font-size:10pt;color:#999692\">. EBITDA</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">에서 설비투자를 차감하면 잉여현금흐름</span><span lang=\"en-US\" style=\"font-family:바탕;font-size:10pt;color:#999692\">(free cash flow)</span><a href=\"http://blog.naver.com/lib/smarteditor2/10507/smart_editor2_inputarea_ie8.html#_ftn10\" lang=\"en-US\" style=\"font-family:바탕;font-size:8pt\">[10]</a><span style=\"font-family:바탕;font-size:10pt;color:#999692\">과 유사한 측정치가 된다</span><span lang=\"en-US\" style=\"font-family:바탕;font-size:10pt;color:#999692\">.</span></p>\r\n\t\t\t<p style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:바탕;font-size:10pt;color:#999692\">대규모 차입에서</span><span lang=\"en-US\" style=\"font-family:바탕;font-size:10pt;color:#999692\">&#160;EBITDA</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">는 부채상환능력을 평가하는 핵심적인 조건이 되기도 한다</span><span lang=\"en-US\" style=\"font-family:바탕;font-size:10pt;color:#999692\">.&#160;</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">채권자들은 부채상환능력을 유지하도록 일정한</span><span lang=\"en-US\" style=\"font-family:바탕;font-size:10pt;color:#999692\">&#160;EBITDA</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">를 유지하는 조건으로 기업과 자금공급 계약을 맺기도 한다</span><span lang=\"en-US\" style=\"font-family:바탕;font-size:10pt;color:#999692\">.&#160;</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">이러한 조건을 충족하지 못하면 자금을 상환하거나 재무건전성 강화를 위해 추가로 자기자본을 조달해서 차입 조건을 유지해야 한다</span><span lang=\"en-US\" style=\"font-family:바탕;font-size:10pt;color:#999692\">. EBITDA</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">는 추가적인 외부자금조달 없이 기업이 얼마 기간 동안 차입금을 상환하면서 영업활동을 지속할 수 있는지를 측정하여 투자의 위험도를 평가하는 수단으로도 사용된다</span><span lang=\"en-US\" style=\"font-family:바탕;font-size:10pt;color:#999692\">.</span></p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:바탕;font-size:10pt;color:#999692\">&#160;</span></p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:바탕;font-size:10pt;color:#999692\">&#160;</span></p>\r\n\t\t\t<table style=\"border:1px solid;border-collapse:collapse\">\r\n\t\t\t\t<tr>\r\n\t\t\t\t\t<td style=\"background-color:#f3f3f3;border:1px solid;font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f\"><span style=\"font-family:돋움체;font-size:10pt;font-weight:bold\">차입금</span><span lang=\"en-US\" style=\"font-family:Arial;font-size:10pt;font-weight:bold\">/EBITDA&#160;</span><span style=\"font-family:돋움체;font-size:10pt;font-weight:bold\">비율을</span><span style=\"font-family:Arial;font-size:10pt;font-weight:bold\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt;font-weight:bold\">약정으로</span><span style=\"font-family:Arial;font-size:10pt;font-weight:bold\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt;font-weight:bold\">자금을</span><span style=\"font-family:Arial;font-size:10pt;font-weight:bold\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt;font-weight:bold\">차입한</span><span style=\"font-family:Arial;font-size:10pt;font-weight:bold\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt;font-weight:bold\">두산의</span><span style=\"font-family:Arial;font-size:10pt;font-weight:bold\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt;font-weight:bold\">밥캣</span><span style=\"font-family:Arial;font-size:10pt;font-weight:bold\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt;font-weight:bold\">인수</span><span style=\"font-family:Arial;font-size:10pt;font-weight:bold\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt;font-weight:bold\">사례</span></td>\r\n\t\t\t\t</tr>\r\n\t\t\t\t<tr>\r\n\t\t\t\t\t<td style=\"border:1px solid\"><p lang=\"en-US\" style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Arial;font-size:10pt\">2007</span><span style=\"font-family:돋움체;font-size:10pt\">년</span><span style=\"font-family:Arial;font-size:10pt\">&#160;11</span><span style=\"font-family:돋움체;font-size:10pt\">월</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">두산그룹은</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">해외</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">사업을</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">확장할</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">목적으로</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">계열사인</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">두산인프라코어를</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">중심으로</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">미국</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">잉거솔랜드</span><span style=\"font-family:Arial;font-size:10pt\">(Ingersol Rand)</span><span style=\"font-family:돋움체;font-size:10pt\">의</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">소형건설장비</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">부문</span><span style=\"font-family:Arial;font-size:10pt\">(</span><span style=\"font-family:돋움체;font-size:10pt\">밥캣</span><span style=\"font-family:Arial;font-size:10pt\">)</span><span style=\"font-family:돋움체;font-size:10pt\">을</span><span style=\"font-family:Arial;font-size:10pt\">&#160;49</span><span style=\"font-family:돋움체;font-size:10pt\">억</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">달러</span><span style=\"font-family:Arial;font-size:10pt\">(</span><span style=\"font-family:돋움체;font-size:10pt\">운영자금</span><span style=\"font-family:Arial;font-size:10pt\">&#160;2</span><span style=\"font-family:돋움체;font-size:10pt\">억</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">달러를</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">포함하면</span><span style=\"font-family:Arial;font-size:10pt\">&#160;51</span><span style=\"font-family:돋움체;font-size:10pt\">억</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">달러</span><span style=\"font-family:Arial;font-size:10pt\">)</span><span style=\"font-family:돋움체;font-size:10pt\">에</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">인수했다</span><span style=\"font-family:Arial;font-size:10pt\">.&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">밥캣</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">인수를</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">위해</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">두산인프라코어</span><span style=\"font-family:Arial;font-size:10pt\">,&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">두산엔진</span><span style=\"font-family:Arial;font-size:10pt\">,&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">두산</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">등의</span><span style=\"font-family:Arial;font-size:10pt\">&#160;3</span><span style=\"font-family:돋움체;font-size:10pt\">개</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">계열사가</span><span style=\"font-family:Arial;font-size:10pt\">&#160;14</span><span style=\"font-family:돋움체;font-size:10pt\">억</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">달러를</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">출자하여</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">페이퍼컴퍼니</span><span style=\"font-family:Arial;font-size:10pt\">(DII</span><span style=\"font-family:돋움체;font-size:10pt\">와</span><sp
