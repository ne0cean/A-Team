an style=\"font-family:Arial;font-size:10pt\">&#160;DHEL)</span><span style=\"font-family:돋움체;font-size:10pt\">를</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">설립했고</span><span style=\"font-family:Arial;font-size:10pt\">,&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">재무적</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">투자자에게</span><span style=\"font-family:Arial;font-size:10pt\">&#160;8</span><span style=\"font-family:돋움체;font-size:10pt\">억</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">달러</span><span style=\"font-family:Arial;font-size:10pt\">,&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">산업은행과</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">수출입은행</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">등</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">채권단에서</span><span style=\"font-family:Arial;font-size:10pt\">&#160;29</span><span style=\"font-family:돋움체;font-size:10pt\">억</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">달러</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">등을</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">차입하였다</span><span style=\"font-family:Arial;font-size:10pt\">.</span></p>\r\n\t\t\t\t\t<p style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:돋움체;font-size:10pt\">두산은</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">밥캣</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">인수</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">당시</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">채권단과</span><span lang=\"en-US\" style=\"font-family:Arial;font-size:10pt\">&#160;DII</span><span style=\"font-family:돋움체;font-size:10pt\">과</span><span lang=\"en-US\" style=\"font-family:Arial;font-size:10pt\">&#160;DHEL</span><span style=\"font-family:돋움체;font-size:10pt\">의</span><span lang=\"en-US\" style=\"font-family:Arial;font-size:10pt\">&#160;`</span><span style=\"font-family:돋움체;font-size:10pt\">차입금</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">대비</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">현금영업이익</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">비율</span><span lang=\"en-US\" style=\"font-family:Arial;font-size:10pt\">(Debt-to-EBITDA)`</span><span style=\"font-family:돋움체;font-size:10pt\">을</span><span lang=\"en-US\" style=\"font-family:Arial;font-size:10pt\">&#160;2009</span><span style=\"font-family:돋움체;font-size:10pt\">년까지</span><span lang=\"en-US\" style=\"font-family:Arial;font-size:10pt\">&#160;7</span><span style=\"font-family:돋움체;font-size:10pt\">배</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">이하</span><span lang=\"en-US\" style=\"font-family:Arial;font-size:10pt\">(2010</span><span style=\"font-family:돋움체;font-size:10pt\">년</span><span lang=\"en-US\" style=\"font-family:Arial;font-size:10pt\">~2011</span><span style=\"font-family:돋움체;font-size:10pt\">년</span><span lang=\"en-US\" style=\"font-family:Arial;font-size:10pt\">&#16 "font-family:Arial;font-size:9pt\">&#160;</span><span style=\"font-family:돋움체;font-size:9pt\">수</span><span style=\"font-family:Arial;font-size:9pt\">&#160;</span><span style=\"font-family:돋움체;font-size:9pt\">있음</span><span lang=\"en-US\" style=\"font-family:Arial;font-size:9pt\">.</span></p>\r\n\t\t\t\t\t</td>\r\n\t\t\t\t</tr>\r\n\t\t\t</table>\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:바탕;font-size:10pt;color:#999692\">&#160;</span></p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:바탕;font-size:10pt;color:#999692\">&#160;</span></p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:바탕;font-size:10pt;color:#999692;font-weight:bold\">5. EBITDA</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692;font-weight:bold\">의 한계</span></p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:바탕;font-size:10pt;color:#999692\">&#160;</span></p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Wingdings;font-size:10pt;color:#999692;font-weight:bold\">q</span><span style=\"font-family:바탕;font-size:10pt;color:#999692;font-weight:bold\">&#160;실제 현금흐름과 차이</span></p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:바탕;font-size:10pt;color:#999692\">&#160;</span></p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:바탕;font-size:10pt;color:#999692\">EBITDA</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">는 영업현금흐름의 대용치로 사용될 수는 있지만 영업현금흐름과 동일한 의미로 사용하지는 못한다</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">.&#160;</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">영업현금흐름은 기업이 영업활동을 위해 필요한 재고자산이나 외상매출과 외상매입 등과 같은 운전자산 투자에 필요한 현금흐름도 포함하여 계산한다</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">. EBITDA</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">는 측정이 간편하지만 외상매출</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">,&#160;</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">재고자산 구입 등과 같은 영업활동에 필요한 운전자산</span><a href=\"http://blog.naver.com/lib/smarteditor2/10507/smart_editor2_inputarea_ie8.html#_ftn11\" style=\"font-family:바탕;font-size:8pt\">[11]</a><span style=\"font-family:바탕;font-size:10pt;color:#999692\">에 대한 현금 유입과 유출 등이 반영되지 않는다.&#160;영업이익은 감가상각비와 같이 현금흐름이 지출되지 않는 비용을 차감하여 계산하기 때문에 영업현금흐름과 일치하지 않는다.</span></p>\r\n\t\t\t<p style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:바탕;font-size:10pt;color:#999692\">운전자산 변화가 거의 없고 비경상적 활동에서 발생하는 현금흐름이 크지 않다면</span><span lang=\"en-US\" style=\"font-family:바탕;font-size:10pt;color:#999692\">&#160;EBITDA</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">는 영업현금흐름과 거의 같아질 것이다</span><span lang=\"en-US\" style=\"font-family:바탕;font-size:10pt;color:#999692\">.&#160;</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">그렇지만 운전자산에 대한 투자가 크게 증가하거나 감소한다면</span><span lang=\"en-US\" style=\"font-family:바탕;font-size:10pt;color:#999692\">&#160;EBITDA</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">는 영업현금흐름과 상당한 차이가 나게 된다</span><span lang=\"en-US\" style=\"font-family:바탕;font-size:10pt;color:#999692\">. EBITDA</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">를 영업현금흐름과 동일한 의미로 받아들여 기업가치를 평가하거나 투자의사결정을 하는 것은 위험하다</span><span lang=\"en-US\" style=\"font-family:바탕;font-size:10pt;color:#999692\">. EBITDA</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">는 수익성을 평가할 수 있는 좋은 지표이지만 영업현금흐름은 아니다</span><span lang=\"en-US\" style=\"font-family:바탕;font-size:10pt;color:#999692\">.</span></p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:바탕;font-size:10pt;color:#999692\">&#160;</span></p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Wingdings;font-size:10pt;color:#999692;font-weight:bold\">q</span><span style=\"font-family:바탕;font-size:10pt;color:#999692;font-weight:bold\">&#160;실적이 좋은 것으로 인식하도록 투자자 착시 유발 가능성</span></p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:바탕;font-size:10pt;color:#999692\">&#160;</span></p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:바탕;font-size:10pt;color:#999692\">EBITDA</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">가 인기를 얻을 수 있었던 중요한 이유 중의 하나는 영업이익보다 규모가 크기 때문이다</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">. EBITDA</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">는 영업이익에 이자와 세금</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">,&#160;</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">감가상각비를 더하여 계산한다</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">.&#160;</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">이자와 세금</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">,&#160;</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">감가상각비 등의 합계액은 최소한</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">&#160;0</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">보다 크기 때문에</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">&#160;EBITDA</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">는 영업이익에 비해 훨씬 큰 수치가 나온다</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">.&#160;</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">영업이익이 대규모 적자가 아니라면</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">,&#160;</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">영업이익이 적자라도</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">&#160;EBITDA</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">는 흑자인 경우가 대부분이다</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">. EBITDA</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">는 실적을 좋게 보이도록 만드는 회계적 수단으로 오용되기도 했다</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">. EBITDA</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">를 비판하는 사람들은</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">&#160;EBITDA</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">를 실적이 좋게 보이도록 만들어 투자자들로 하여금 기업의 성과나 가치를 과대평가하도록 만드는 수법이라고 말한다</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">.&#160;&#160;</span></p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:바탕;font-size:10pt;color:#999692\">2000</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">년대 초반</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">&#160;IT&#160;</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">버블이 발생했을 때에 영업이익이 적자인 기업들이</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">&#160;EBITDA</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">를 영업실적으로 내세웠고</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">,&#160;</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">투자자들은</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">&#160;EBITDA</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">를 사용하여 기업의 가치를 평가했다</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">. EBITDA</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">를 내세워 재무적으로 좀더 매력적인 기업인 것처럼 보이도록 만들었다</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">.&#160;</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">적자인 영업이익이나 순이익을 사용하여 주가배수를 계산하고 기업가치를 평가하는 것은 의미가 없기 때문에 그나마 흑자인</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">&#160;EBITDA</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">를 사용해 주가배수를 계산하고 기업가치를 평가해 버블이 끼여 있는 높은 주가 수준을 합리화하였다</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">.&#160;</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">하지만 이러한 기업들의 대부분은 얼마 가지 못해 파산하거나 다른 기업에 인수되는 운명을 맞았다</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">.</span></p>\r\n\t\t\t<p style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:바탕;font-size:10pt;color:#999692\">이자와 세금은 기업의 영업활동에서 불가피하게 발생하는 비용이고</span><span lang=\"en-US\" style=\"font-family:바탕;font-size:10pt;color:#999692\">,&#160;</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">감가상각비는 투자에 필요한 자금을 적립하여 놓는 것과 같은 의미이다</span><span lang=\"en-US\" style=\"font-family:바탕;font-size:10pt;color:#999692\">.&#160;</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">이러한 비용은 의사결정을 하는데 있어서 매우 중요한 요인임에도 불구하고</span><span lang=\"en-US\" style=\"font-family:바탕;font-size:10pt;color:#999692\">&#160;EBITDA&#160;</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">계산에서는 무시된다</span><span lang=\"en-US\" style=\"font-family:바탕;font-size:10pt;color:#999692\">. EBITDA</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">를 기초로 한 의사결정은 장기적으로 기업활동에서 반드시 발생하는 중요한 비용을 고려하지 않는 결과를 낳을 수 있는 것이다</span><span lang=\"en-US\" style=\"font-family:바탕;font-size:10pt;color:#999692\">.</span></p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:바탕;font-size:10pt;color:#999692\">EBITDA</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">는 영업성과를 과대평가하고 실적이 좋은 것으로 인식하도록 착각 현상을 유발하여 투자자를 오도하도록 만들 가능성이 있다</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">. EBITDA</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">를 통해 부채상환능력을 평가할 때에도 실제에 비해 지급능력을 과대평가할 수 있고</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">,&#160;</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">수익성이 없음에도 불구하고 재무적으로 건전하게 보이도록 할 수도 있다</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">.&#160;</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">기업의 가치를 평가하고 실적을 비교할 때에는 여러 가지 성과평가 지표들을 종합적으로 고려해야 한다</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">.</span></p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:바탕;font-size:10pt;color:#999692\">&#160;</span></p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Wingdings;font-size:10pt;color:#999692;font-weight:bold\">q</span><span style=\"font-family:바탕;font-size:10pt;color:#999692;font-weight:bold\">&#160;조작의 가능성에서 완전히 자유롭지 못한 성과 측정치</span></p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:바탕;font-size:10pt;color:#999692\">&#160;</span></p>\r\n\t\t\t<p style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:바탕;font-size:10pt;color:#999692\">영업이익은 순이익에 비해 상대적으로 이익 규모를 조작</span><span lang=\"en-US\" style=\"font-family:바탕;font-size:10pt;color:#999692\">(accounting manipulation)</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">하기가 어렵다</span><span lang=\"en-US\" style=\"font-family:바탕;font-size:10pt;color:#999692\">.&#160;</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">하지만 이익 조작의 여지가 전혀 없는 것은 아니다</span><span lang=\"en-US\" style=\"font-family:바탕;font-size:10pt;color:#999692\">.&#160;</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">영업이익이나 순이익을 기초로 계산되는</span><span lang=\"en-US\" style=\"font-family:바탕;font-size:10pt;color:#999692\">&#160;EBITDA</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">도 마찬가지이다</span><span lang=\"en-US\" style=\"font-family:바탕;font-size:10pt;color:#999692\">.&#160;</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">특히 감가상각은 경영자의 자의적인 판단으로 방법을 변경할 수 있다</span><span lang=\"en-US\" style=\"font-family:바탕;font-size:10pt;color:#999692\">.&#160;</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">감가상각 방법을 변경하면 감가상각비의 규모가 변하고&#160;</span><span lang=\"en-US\" style=\"font-family:바탕;font-size:10pt;color:#999692\">EBITDA</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">도 달라지게 된다</span><span lang=\"en-US\" style=\"font-family:바탕;font-size:10pt;color:#999692\">.&#160;</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">경영자의 회계처리 선택에 따라</span><span lang=\"en-US\" style=\"font-family:바탕;font-size:10pt;color:#999692\">&#160;EBITDA&#160;</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">규모도 달라질 수 있는 것이다</span><span lang=\"en-US\" style=\"font-family:바탕;font-size:10pt;color:#999692\">.</span></p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:바탕;font-size:10pt;color:#999692\">EBITDA</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">를 이용하여 경영자에 대한 성과를 평가하고 보너스를 결정한다면 경영자들은 가능한 단기적으로</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">&#160;EBITDA</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">를 크게 보이도록 만들고 싶은 유혹에 빠질 수 있다</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">.&#160;</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">일반적으로 인정된 회계원칙에서도 회계처리 방법의 변경은 인정된다</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">.&#160;</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">결국</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">&#160;EBITDA</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">도 회계정보를 이용한 다른 성과평가 지표와 마찬가지로 이익 조작에서 완전히 자유롭지 못하다</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">.</span></p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:바탕;font-size:10pt;color:#999692\">EBITDA</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">는 재무구조나 세제</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">,&#160;</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">영업레버리지와 관계 없이 기업간 경영성과를 비교하는데 유용하지만</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">,&#160;</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">회계처리 방법의 차이 등에 영향을 받는다</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">.&#160;</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">동일한 경제적 현상에 대해 기업 간에 회계처리 방법이 다르다면 회계적 이익도 달라진다</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">.&#160;</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">특정 기업의 추세적인 영업실적의 비교나 기업 간의 성과비교에 있어서도 완전하게 동일한 기준을 적용한 비교는 현실적으로 상당히 어렵다</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">.</span></p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:바탕;font-size:10pt;color:#999692\">&#160;</span></p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Wingdings;font-size:10pt;color:#999692;font-weight:bold\">q</span><span style=\"font-family:바탕;font-size:10pt;color:#999692;font-weight:bold\">&#160;이익의 질(earnings quality)을 파악하기 어려움</span></p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:바탕;font-size:10pt;color:#999692\">&#160;</span></p>\r\n\t\t\t<p style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:바탕;font-size:10pt;color:#999692\">이익의 질은 현재 이익의 지속 가능성이 높거나 현재 이익에 담겨 있는 정보를 이용하여 향후 정보에 대한 예측 가능성이 높은 성질을 의미한다</span><span lang=\"en-US\" style=\"font-family:바탕;font-size:10pt;color:#999692\">.&#160;</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">기업의 가치를 정확하게 평가할 수 있는 성질도 이익의 질적인 측면에서 중요한 속성이다</span><span lang=\"en-US\" style=\"font-family:바탕;font-size:10pt;color:#999692\">. EBITDA</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">는 이익의 질적인 속성을 파악하기가 쉽지 않다는 단점을 가진다</span><span lang=\"en-US\" style=\"font-family:바탕;font-size:10pt;color:#999692\">.</span></p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:바탕;font-size:10pt;color:#999692\">EBITDA</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">는 이익의 지속 가능성을 파악하는 데에 취약성이 있다</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">.&#160;</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">특히 순이익을 사용하여</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">&#160;EBITDA</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">를 계산하면</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">&#160;EBITDA</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">에는 지속성이 거의 없는 일시적 손익이 포함된다</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">.&#160;</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">이 경우</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">&#160;EBITDA</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">를 사용하여 이익의 지속 가능성을 평가하기는 어렵다</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">. EBITDA</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">를 사용하여 기업의 가치를 평가하는 데에도 문제가 있다</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">.&#160;</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">앞에서 말한 것처럼</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">&#160;EBITDA</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">는 경제적 비용을 제대로 반영하지 않아 기업의 실적을 좋게 보이도록 만들어 기업가치를 과대평가할 가능성이 높기 때문이다</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">. EBITDA</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">는 유용한 평가지표인 것은 분명하지만</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">&#160;EBITDA</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">를 통해 이익의 질에 대한 정보를 파악하기는 쉽지 않다</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">.</span></p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:바탕;font-size:10pt;color:#999692\">&#160;</span></p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Wingdings;font-size:10pt;color:#999692;font-weight:bold\">q</span><span style=\"font-family:바탕;font-size:10pt;color:#999692;font-weight:bold\">&#160;수익성이 낮고 효율적이지 못한 과잉투자 유발 가능성</span></p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:바탕;font-size:10pt;color:#999692\">&#160;</span></p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:바탕;font-size:10pt;color:#999692\">EBITDA</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">에는 감가상각비가 비용으로 차감되지 않는다</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">.&#160;</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">따라서 설비투자가 많고 감가상각비가 클수록</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">&#160;EBITDA</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">도 커지게 된다</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">.&#160;</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">이는 투자의사결정의 결과가 경영성과에 반영되지 못함을 의미한다</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">.&#160;</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">차입을 통해 투자를 많이 할수록 기업의 재무적 위험은 높아지지만 단기적으로</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">&#160;EBITDA</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">는 커질 가능성이 크다</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">.</span></p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:바탕;font-size:10pt;color:#999692\">EBITDA</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">는 사용하여 경영성과를 평가하면 투자를 통제하지 못해 단기적으로 효율적이지 못한 과잉투자가 유발될 수 있다</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">.&#160;</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">경영자의 임기가 짧은 상황에서 장기적인 관점에서 위험이 높음에도 불구하고 대규모 투자를 통해 감가상각비를 많이 반영하면 단기적인</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">&#160;EBITDA</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">는 증가한다</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">.&#160;</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">하지만 장기적인 투자성과가 좋지 못해 몇 년이 지난 후에 실적이 악화되어도 책임은 후임 경영자에게 돌아간다</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">.&#160;</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">감가상각비가 비용으로 차감되는 영업이익이나 순이익 등을 성과평가 기준으로 사용한다면</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">,&#160;</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">이와 같은 현상은 줄어들 것이다</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">.</span></p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:바탕;font-size:10pt;color:#999692\">&#160;</span></p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Wingdings;font-size:10pt;color:#999692;font-weight:bold\">q</span><span style=\"font-family:바탕;font-size:10pt;color:#999692;font-weight:bold\">&#160;경제적 이익을 측정하지 못함</span></p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:바탕;font-size:10pt;color:#999692\">&#160;</span></p>\r\n\t\t\t<p style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:바탕;font-size:10pt;color:#999692\">기업의 경제적 이익에는 자본제공에 대한 대가와 장기간 사용되는 설비투자에서 발생하는 비용</span><span lang=\"en-US\" style=\"font-family:바탕;font-size:10pt;color:#999692\">(</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">설비자산의 경제적 가치 하락</span><span lang=\"en-US\" style=\"font-family:바탕;font-size:10pt;color:#999692\">)</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">이 반영되어야 한다</span><span lang=\"en-US\" style=\"font-family:바탕;font-size:10pt;color:#999692\">.&#160;</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">즉</span><span lang=\"en-US\" style=\"font-family:바탕;font-size:10pt;color:#999692\">,&#160;</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">경제적 이익에는 자본비용과 설비자산의 가치하락이 반드시 반영되어야 한다</span><span lang=\"en-US\" style=\"font-family:바탕;font-size:10pt;color:#999692\">.&#160;</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">그렇지만</span><span lang=\"en-US\" style=\"font-family:바탕;font-size:10pt;color:#999692\">&#160;EBITDA</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">는 자본제공의 대가인 이자비용</span><span lang=\"en-US\" style=\"font-family:바탕;font-size:10pt;color:#999692\">(</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">자기자본에 대한 자본비용도 포함</span><span lang=\"en-US\" style=\"font-family:바탕;font-size:10pt;color:#999692\">)</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">을 차감하지 않고</span><span lang=\"en-US\" style=\"font-family:바탕;font-size:10pt;color:#999692\">,&#160;</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">설비투자 기능의 저하에 따르는 경제적 가치 하락도 반영되지 않는다</span><span lang=\"en-US\" style=\"font-family:바탕;font-size:10pt;color:#999692\">.&#160;</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">이자비용과 감가상각비를 제외한</span><span lang=\"en-US\" style=\"font-family:바탕;font-size:10pt;color:#999692\">&#160;EBITDA</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">는 경제적 이익에 대한 정보를 거의 제공하지 못한다</span><span lang=\"en-US\" style=\"font-family:바탕;font-size:10pt;color:#999692\">.</span></p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:바탕;font-size:10pt;color:#999692\">EBITDA</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">에서 무시한 비용들이 실제로는 장기적으로 회사의 현금흐름에 상당한 영향을 미친다</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">.&#160;</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">규모가 상당히 크고 설비자산에 대한 반복적인 투자가 필요한 기업의 경우 매년 감가상각비 정도의 일정한 현금이 지속적으로 유출된다</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">.&#160;</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">따라서</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">&#160;EBITDA</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">로 성과를 측정할 경우 투자에 소요되는 일정한 현금흐름 유출을 고려하지 못하는 결과를 초래한다</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">.&#160;</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">워렌 버핏</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">(Warren Buffett)</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">은 기업의 경영성과를 측정하는데 감가상각비가 매우 중요한 요인이라는 점을 지적하면</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">&#160;EBITDA</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">를 기업의 성과 측정치로 사용하는 것에 대한 강한 비판적인 입장을 취했다</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">.&#160;</span></p>\r\n\t\t\t<p style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:바탕;font-size:10pt;color:#999692\">다른 대부분의 회계적 성과 측정치와 마찬가지로</span><span lang=\"en-US\" style=\"font-family:바탕;font-size:10pt;color:#999692\">&#160;EBITDA</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">도 주주에게 귀속되는 가치의 측정에는 상당한 문제점을 가진 성과 측정치이다</span><span lang=\"en-US\" style=\"font-family:바탕;font-size:10pt;color:#999692\">.&#160;</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">주주에게 돌아가는 경제적 이익을 측정하기 위해서는 이자와 세금</span><span lang=\"en-US\" style=\"font-family:바탕;font-size:10pt;color:#999692\">,&#160;</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">그리고 감가상각비뿐만 아니라 자기자본에 대한 기회비용까지 감안하여야 한다</span><span lang=\"en-US\" style=\"font-family:바탕;font-size:10pt;color:#999692\">.</span></p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:바탕;font-size:10pt;color:#999692\">&#160;</span></p>\r\n\t\t\t<table style=\"border:1px solid;border-collapse:collapse\">\r\n\t\t\t\t<tr>\r\n\t\t\t\t\t<td style=\"background-color:#f3f3f3;border:1px solid;font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f\"><span lang=\"en-US\"><span style=\"font-family:Arial;font-size:10pt;font-weight:bold\">EBITDA</span><span style=\"font-family:돋움체;font-size:10pt;font-weight:bold\">에</span><span style=\"font-family:Arial;font-size:10pt;font-weight:bold\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt;font-weight:bold\">대한</span><span style=\"font-family:Arial;font-size:10pt;font-weight:bold\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt;font-weight:bold\">워렌</span><span style=\"font-family:Arial;font-size:10pt;font-weight:bold\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt;font-weight:bold\">버핏의</span><span style=\"font-family:Arial;font-size:10pt;font-weight:bold\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt;font-weight:bold\">비판적</span><span style=\"font-family:Arial;font-size:10pt;font-weight:bold\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt;font-weight:bold\">시각</span></span></td>\r\n\t\t\t\t</tr>\r\n\t\t\t\t<tr>\r\n\t\t\t\t\t<td style=\"border:1px solid;font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f\"><span style=\"font-family:돋움체;font-size:10pt\">워렌</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">버핏은</span><span lang=\"en-US\" style=\"font-family:Arial;font-size:10pt\">&#160;EBITDA</span><span style=\"font-family:돋움체;font-size:10pt\">에</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">대해</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">상당히</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">부정적인</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">입장을</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">취했다</span><span lang=\"en-US\" style=\"font-family:Arial;font-size:10pt\">. 2000</span><span style=\"font-family:돋움체;font-size:10pt\">년</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">워렌</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">버핏은</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">주주에게</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">보내는</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">편지에서</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">다음과</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">같은</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">유명한</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">질문을</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">던졌다</span><span lang=\"en-US\" style=\"font-family:Arial;font-size:10pt\">. “</span><span style=\"font-family:돋움체;font-size:10pt\">경영자들은</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">이의</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">요정</span><span lang=\"en-US\" style=\"font-family:Arial;font-size:10pt\">(</span><span style=\"font-family:돋움체;font-size:10pt\">밤에</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">어린</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">아이의</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">침대</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">머리맡에</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">빠진</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">이를</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">놓아두면</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">이것을</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">가져가고</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">그</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">대신에</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">동전을</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">놓아둔다는</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">상상</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">속의</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">존재</span><span lang=\"en-US\" style=\"font-family:Arial;font-size:10pt\">)</span><span style=\"font-family:돋움체;font-size:10pt\">이</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">자본지출에</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">필요한</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">자금을</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">대신</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">지급해</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">줄</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">것이라고</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체; ont-family:돋움체;font-size:10pt\">빼는</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">것은</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">감가상각비가</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">비현금비용</span><span lang=\"en-US\" style=\"font-family:Arial;font-size:10pt\">(non-cash charge)</span><span style=\"font-family:돋움체;font-size:10pt\">으로</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">실제로</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">비용이</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">아니라는</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">것을</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">의미하는데</span><span lang=\"en-US\" style=\"font-family:Arial;font-size:10pt\">,&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">그것은</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">난센스다</span><span lang=\"en-US\" style=\"font-family:Arial;font-size:10pt\">”</span><span style=\"font-family:돋움체;font-size:10pt\">라고</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">말했다</span><span lang=\"en-US\" style=\"font-family:Arial;font-size:10pt\">.</span><a href=\"http://blog.naver.com/lib/smarteditor2/10507/smart_editor2_inputarea_ie8.html#_ftn13\" lang=\"en-US\" style=\"font-family:Arial;font-size:8pt\">[13]</a><span lang=\"en-US\" style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt "font-family:돋움체;font-size:10pt\">수</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">있다</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">감가상각비는</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">재료비와</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">인건비</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">등과</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">같이</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">실제</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">비용이고</span><span lang=\"en-US\" style=\"font-family:Arial;font-size:10pt\">,&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">감가상가비의</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">중요성을</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">간과한</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">영업이익이나</span><span lang=\"en-US\" style=\"font-family:Arial;font-size:10pt\">&#160;EBITDA</span><span style=\"font-family:돋움체;font-size:10pt\">를</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">사용하는</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">것은</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">잘못된</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">관행이라는</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">것이</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">워렌</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">버핏의</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">생각인</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">것으로</span><span style=\"font-family:Arial;font-size:10pt\">&#160;</span><span style=\"font-family:돋움체;font-size:10pt\">보인다</span><span lang=\"en-US\" style=\"font-family:Arial;font-size:10pt\">.</span></td>\r\n\t\t\t\t</tr>\r\n\t\t\t</table>\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:바탕;font-size:10pt;color:#999692\">&#160;</span></p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:바탕;font-size:10pt;color:#999692;font-weight:bold\">6.&#160;</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692;font-weight:bold\">결론</span></p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:바탕;font-size:10pt;color:#999692\">&#160;</span></p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:바탕;font-size:10pt;color:#999692\">EBITDA</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">는 영업활동의 성과와 현금흐름에 대한 유용한 측정치로 널리 받아들여지고 있지만 한계점을 이해하고 사용하는 것이 필요하다</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">.&#160;</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">유사한 영업을 하고 있는 동일 업종 기업이나 산업 간 경영성과의 비교에</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">&#160;EBITDA</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">가 유용하게 사용할 수 있다</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">.&#160;</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">그렇지만 실적을 과대포장하고 영업현금흐름을 정확하게 보여주는 못하는 등의 한계점이 있다</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">.&#160;</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">특히</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">&#160;EBITDA</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">은 기업의 이익을 좋게 보이도록 하는 회계적 방법으로 사용될 수 있어서 다른 성과평가지표에도 관심을 가지고 동시에 분석을 해야 한다</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">.</span></p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:바탕;font-size:10pt;color:#999692\">EBITDA</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">는 원래 수익성이 있는 기업을 대상으로 성과를 비교하고 기업가치를 평가하는데 유용한 지표이다</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">.&#160;</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">그런데 영업이익보다 규모가 크다는 이유로 관행적으로 수익성이 없고 현금흐름이 취약한 기업을 좋게 보이도록 만들면서 기업을 비교하고 평가하는데 오용되어 왔다</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">.&#160;</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">이것은</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">&#160;EBITDA&#160;</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">자체의 문제가 아니라 사람들이 잘못 사용해 왔던 것에 근본적인 문제가 있는 것이다</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">.&#160;</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">한계점을 이해하고 사용한다면</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">&#160;EBITDA</span><span lang=\"ko-KR\" style=\"font-family:바탕;font-size:10pt;color:#999692\">는 간편하게 기업의 경영성과 분석에 사용할 수 있는 상당히 유용한 도구로 활용할 수 있을 것이다</span><span style=\"font-family:바탕;font-size:10pt;color:#999692\">.</span></p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\"><a href=\"http://blog.naver.com/lib/smarteditor2/10507/smart_editor2_inputarea_ie8.html#_ftnref1\" lang=\"en-US\" style=\"font-family:바탕;font-size:9pt\">[1]</a><span lang=\"en-US\" style=\"font-family:바탕;font-size:9pt;color:#999692\">&#160;감가상각비는 생산설비나 건물 등을 구입하기 위해 지출한 취득원가를 설비나 건물을 사용하는 기간 동안에 배분하는 과정에서 발생하는 회계적 의미의 비용이다.&#160;현금이 실제 지출될 때는 설비나 건물을 구입하는 시점이고,&#160;취득 이후 취득원가를 내용연수(사용기간)&#160;동안에 걸쳐 비용으로 인식한다.&#160;따라서 비용으로 인식하는 기간에는 실제 현금이 지출되지 않는다.&#160;&#160;&#160;</span></p>\r\n\t\t\t<p style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\"><a href=\"http://blog.naver.com/lib/smarteditor2/10507/smart_editor2_inputarea_ie8.html#_ftnref2\" lang=\"en-US\" style=\"font-family:바탕;font-size:9pt\">[2]</a><span lang=\"en-US\" style=\"font-family:바탕;font-size:9pt;color:#999692\">&#160;EBITDA는 수익성을 측정하는 지표이지만 현금흐름과는 차이가 있다. EBITDA는 간편한 방식으로 현금흐름 규모를 가늠해 볼 수 있는 대용치는 될 수 있지만 정확한 의미의 현금흐름과는 상당한 차이가 있다.&#160;자세한 내용은 아래의&#160;EBITDA의 한계 참조</span></p>\r\n\t\t\t<p style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\"><a href=\"http://blog.naver.com/lib/smarteditor2/10507/smart_editor2_inputarea_ie8.html#_ftnref3\" lang=\"en-US\" style=\"font-family:바탕;font-size:9pt\">[3]</a><span lang=\"en-US\" style=\"font-family:바탕;font-size:9pt;color:#999692\">&#160;</span><a href=\"http://en.wikipedia.org/wiki/Earnings_before_interest,_taxes,_depreciation_and_amortization\" lang=\"en-US\" style=\"font-family:바탕;font-size:9pt\">http://en.wikipedia.org/wiki/Earnings_before_interest,_taxes,_depreciation_and_amortization</a></p>\r\n\t\t\t<p style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\"><a href=\"http://blog.naver.com/lib/smarteditor2/10507/smart_editor2_inputarea_ie8.html#_ftnref4\" lang=\"en-US\" style=\"font-family:바탕;font-size:9pt\">[4]</a><span lang=\"en-US\" style=\"font-family:바탕;font-size:9pt;color:#999692\">&#160;SEC, Non-GAAP Financial Measures,&#160;</span><a href=\"http://www.sec.gov/divisions/corpfin/guidance/nongaapinterp.htm\" lang=\"en-US\" style=\"font-family:바탕;font-size:9pt\">www.sec.gov/divisions/corpfin/guidance/nongaapinterp.htm</a></p>\r\n\t\t\t<p style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\"><a href=\"http://blog.naver.com/lib/smarteditor2/10507/smart_editor2_inputarea_ie8.html#_ftnref5\" lang=\"en-US\" style=\"font-family:바탕;font-size:9pt\">[5]</a><span lang=\"en-US\" style=\"font-family:바탕;font-size:9pt;color:#999692\">&#160;EBITDA의 역사에 대한 부분은&#160;최종학,&#160;</span><span lang=\"en-US\" style=\"font-family:Times New Roman;font-size:9pt;color:#999692\">‘</span><span lang=\"en-US\" style=\"font-family:바탕;font-size:9pt;color:#999692\">현금흐름지표가 놓친 것들을 들여다보자</span><span lang=\"en-US\" style=\"font-family:Times New Roman;font-size:9pt;color:#999692\">”</span><span lang=\"en-US\" style=\"font-family:바탕;font-size:9pt;color:#999692\">,&#160;동아비즈니스리뷰&#160;2011. 7, Ben McClure,&#160;</span><span lang=\"en-US\" style=\"font-family:Times New Roman;font-size:9pt;color:#999692\">“</span><span lang=\"en-US\" style=\"font-family:바탕;font-size:9pt;color:#999692\">A Clear Look At EBITDA</span><span lang=\"en-US\" style=\"font-family:Times New Roman;font-size:9pt;color:#999692\">”</span><span lang=\"en-US\" style=\"font-family:바탕;font-size:9pt;color:#999692\">,&#160;</span><a href=\"http://www.investopedia.com/articles/06/ebitda.asp\" lang=\"en-US\" style=\"font-family:바탕;font-size:9pt\">www.investopedia.com/articles/06/ebitda.asp</a><span lang=\"en-US\" style=\"font-family:바탕;font-size:9pt;color:#999692\">&#160;등을 참조하여 작성</span></p>\r\n\t\t\t<p style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\"><a href=\"http://blog.naver.com/lib/smarteditor2/10507/smart_editor2_inputarea_ie8.html#_ftnref6\" lang=\"en-US\" style=\"font-family:바탕;font-size:9pt\">[6]</a><span lang=\"en-US\" style=\"font-family:바탕;font-size:9pt;color:#999692\">&#160;기업이 다른 기업을 인수합병(M&amp;A)할 때에 인수하는 기업의 자산을 담보로 인수자금을 빌려서 인수하는&#160;M&amp;A&#160;방법으로 적은 자기자본으로 다른 기업을 인수할 때에 사용된다.</span></p>\r\n\t\t\t<p style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\"><a href=\"http://blog.naver.com/lib/smarteditor2/10507/smart_editor2_inputarea_ie8.html#_ftnref7\" lang=\"en-US\" style=\"font-family:바탕;font-size:9pt\">[7]</a><span lang=\"en-US\" style=\"font-family:바탕;font-size:9pt;color:#999692\">&#160;영업레버리지는 영업비용 중에서 고정영업비용을 부담하는 정도를 의미한다.&#160;영업레버리지가 높으면(고정영업비용이 많으면)&#160;매출 변화에 비해 영업이익의 변화가 커진다.&#160;고정영업비용은 매출 변화에 관계 없이 특정 기간 동안에 일정한 금액이 고정적으로 발생하는 비용이다.&#160;고정영업비용의 대표적인 예로는 감가상각비,&#160;임대료,&#160;임원급여 등이 있다.</span></p>\r\n\t\t\t<p style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\"><a href=\"http://blog.naver.com/lib/smarteditor2/10507/smart_editor2_inputarea_ie8.html#_ftnref8\" lang=\"en-US\" style=\"font-family:바탕;font-size:9pt\">[8]</a><span lang=\"en-US\" style=\"font-family:바탕;font-size:9pt;color:#999692\">&#160;엄밀하게 말하자면 동일한 기준이라고 하기는 어렵고 유사한 기준으로 기업간 영업활동의 경영성과를 비교한다고 보는 것이 적절하다.&#160;뒤에서 살펴보겠지만&#160;EBITDA의 경우에도 회계처리 방법의 차이에 따라 기업별로 계산방식에 상당한 차이가 발생할 수 있다.&#160;그리고 앞에서 언급한 바와 같이 계산 기준에 따라 영업활동 이외의 성과가 반영될 여지가 많다.&#160;영업이익을 기준으로 계산했으면 주로 영업활동의 성과가 반영되지만,&#160;순이익을 기준으로 계산했으면 영업활동 이외의 경영성과가 반영될 가능성이 높다. SEC의 기준으로 계산된&#160;EBITDA는 영업활동 이외의 성과도 반영될 것이다.</span></p>\r\n\t\t\t<p style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\"><a href=\"http://blog.naver.com/lib/smarteditor2/10507/smart_editor2_inputarea_ie8.html#_ftnref9\" lang=\"en-US\" style=\"font-family:바탕;font-size:9pt\">[9]</a><span lang=\"en-US\" style=\"font-family:바탕;font-size:9pt;color:#999692\">&#160;영업이익이나&#160;EBITDA는 모두 영업활동에서 발생한 현금흐름을 정확하게 측정하지 못하는 단점이 있다.&#160;기업의 현금흐름을 파악하기 위해서는 현금흐름표를 이용한다.&#160;현금흐름표는 기업의 영업과 투자,&#160;재무 활동의 현금흐름에 대한 정보를 종합적으로 제공한다.&#160;현금흐름표 가장 상단의 ‘영업활동으로 인한 현금흐름’은 영업활동에서 발생한 현금흐름의 가장 정확한 측정치이다.</span></p>\r\n\t\t\t<p style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\"><a href=\"http://blog.naver.com/lib/smarteditor2/10507/smart_editor2_inputarea_ie8.html#_ftnref10\" lang=\"en-US\" style=\"font-family:바탕;font-size:9pt\">[10]</a><span lang=\"en-US\" style=\"font-family:바탕;font-size:9pt;color:#999692\">&#160;영업현금흐름에서 설비투자에 지출한 현금흐름을 차감한 것이 잉여현금흐름이다.&#160;잉여현금흐름은 주주에게 돌아가는 최종적인 현금흐름이다.&#160;잉여현금흐름이 적자이면 영업활동에서 벌어 들인 현금흐름보다 더 많이 투자해서 외부에서 자금을 차입해야 함을 의미한다.</span></p>\r\n\t\t\t<p style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\"><a href=\"http://blog.naver.com/lib/smarteditor2/10507/smart_editor2_inputarea_ie8.html#_ftnref11\" lang=\"en-US\" style=\"font-family:바탕;font-size:9pt\">[11]</a><span lang=\"en-US\" style=\"font-family:바탕;font-size:9pt;color:#999692\">&#160;운전자산은 영업활동에서 불가피하게 보유하게 되는 외상매출이나 재고자산 등을 의미한다.&#160;이러한 자산을 보유하는 것도 현금이 유출되는 투자로 볼 수 있다.&#160;흔히 운전자본(working capital)로 호칭되는데 개념적으로 자산의 성격을 갖는다.&#160;외상매입은 일시적으로 현금 지출을 미룬 것이기 때문에 영업활동에서 자금을 차입하는 것과 동일한 의미를 갖는다.&#160;일반적으로 유동자산(현금 제외)에서 유동부채를 차감한 것을 순운전자본(net working capital)이라고 한다.&#160;</span></p>\r\n\t\t\t<p style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\"><a href=\"http://blog.naver.com/lib/smarteditor2/10507/smart_editor2_inputarea_ie8.html#_ftnref12\" lang=\"en-US\" style=\"font-family:바탕;font-size:9pt\">[12]</a><span lang=\"en-US\" style=\"font-family:바탕;font-size:9pt;color:#999692\">&#160;Warren Buffett&#39;s Letters to Berkshire Shareholders 2000&#160;참조,&#160;</span><span lang=\"en-US\" style=\"font-family:Times New Roman;font-size:9pt;color:#999692\">“</span><span lang=\"en-US\" style=\"font-family:바탕;font-size:9pt;color:#999692\">References to EBITDA make us shudder - does management think the tooth fairy pays for capital expenditures? We</span><span lang=\"en-US\" style=\"font-family:Times New Roman;font-size:9pt;color:#999692\">’</span><span lang=\"en-US\" style=\"font-family:바탕;font-size:9pt;color:#999692\">re very suspicious of accounting methodology that is vague or unclear, since too often that means management wishes to hide something. And we don’t want to read messages that a public relations department or consultant has turned out. Instead, we expect a company</span><span lang=\"en-US\" style=\"font-family:Times New Roman;font-size:9pt;color:#999692\">’</span><span lang=\"en-US\" style=\"font-family:바탕;font-size:9pt;color:#999692\">s CEO to explain in his or her own words what</span><span lang=\"en-US\" style=\"font-family:Times New Roman;font-size:9pt;color:#999692\">’</span><span lang=\"en-US\" style=\"font-family:바탕;font-size:9pt;color:#999692\">s happening.</span><span lang=\"en-US\" style=\"font-family:Times New Roman;font-size:9pt;color:#999692\">”</span><span lang=\"en-US\" style=\"font-family:바탕;font-size:9pt;color:#999692\">(</span><a href=\"http://www.berkshirehathaway.com/letters/letters.html\" lang=\"en-US\" style=\"font-family:바탕;font-size:9pt\">www.berkshirehathaway.com/letters/letters.html</a><span lang=\"en-US\" style=\"font-family:바탕;font-size:9pt;color:#999692\">)</span></p>\r\n\t\t\t<p style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\"><a href=\"http://blog.naver.com/lib/smarteditor2/10507/smart_editor2_inputarea_ie8.html#_ftnref13\" lang=\"en-US\" style=\"font-family:바탕;font-size:9pt\">[13]</a><span lang=\"en-US\" style=\"font-family:바탕;font-size:9pt;color:#999692\">&#160;Warren Buffett&#39;s Letters to Berkshire Shareholders 2002&#160;참조,&#160;</span><span lang=\"en-US\" style=\"font-family:Times New Roman;font-size:9pt;color:#999692\">“</span><span lang=\"en-US\" style=\"font-family:바탕;font-size:9pt;color:#999692\">Trumpeting EBITDA (earnings before interest, taxes, depreciation and amortization) is a particularly pernicious practice. Doing so implies that depreciation is not truly an expense, given that it is a&#160;</span><span lang=\"en-US\" style=\"font-family:Times New Roman;font-size:9pt;color:#999692\">“</span><span lang=\"en-US\" style=\"font-family:바탕;font-size:9pt;color:#999692\">non-cash</span><span lang=\"en-US\" style=\"font-family:Times New Roman;font-size:9pt;color:#999692\">”</span><span lang=\"en-US\" style=\"font-family:바탕;font-size:9pt;color:#999692\">&#160;charge. That</span><span lang=\"en-US\" style=\"font-family:Times New Roman;font-size:9pt;color:#999692\">’</span><span lang=\"en-US\" style=\"font-family:바탕;font-size:9pt;color:#999692\">s nonsense. In truth, depreciation is a particularly unattractive expense because the cash outlay it represents is paid up front, before the asset acquired has delivered any benefits to the business. Imagine, if you will, that at the beginning of this year a company paid all of its employees for the next ten years of their service (in the way they would lay out cash for a fixed asset to be useful for ten years). In the following nine years, compensation would be a&#160;</span><span lang=\"en-US\" style=\"font-family:Times New Roman;font-size:9pt;color:#999692\">“</span><span lang=\"en-US\" style=\"font-family:바탕;font-size:9pt;color:#999692\">non-cash</span><span lang=\"en-US\" style=\"font-family:Times New Roman;font-size:9pt;color:#999692\">”</span><span lang=\"en-US\" style=\"font-family:바탕;font-size:9pt;color:#999692\">&#160;expense&#160;</span><span lang=\"en-US\" style=\"font-family:Times New Roman;font-size:9pt;color:#999692\">–</span><span lang=\"en-US\" style=\"font-family:바탕;font-size:9pt;color:#999692\">&#160;a reduction of a prepaid compensation asset established this year. Would anyone care to argue that the recording of the expense in years two through ten would be simply a bookkeeping formality?</span></p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:8.2pt;margin-bottom:5.2pt\"><span style=\"font-family:Dotum;font-size:9pt;color:#999692;font-weight:bold\">[출처]</span><span style=\"font-family:Dotum;font-size:9pt;color:#999692\">&#160;</span><a href=\"https://blog.naver.com/wonderhama66/120201200829\" style=\"font-family:Dotum;font-size:9pt\">EBITDA의 의미와 유용성, 그리고 한계점</a><span style=\"font-family:Dotum;font-size:9pt;color:#999692\">|</span><span style=\"font-family:Dotum;font-size:9pt;color:#999692;font-weight:bold\">작성자</span><span style=\"font-family:Dotum;font-size:9pt;color:#999692\">&#160;</span><a href=\"https://blog.naver.com/wonderhama66\" style=\"font-family:Dotum;font-size:9pt\">원더풀</a></p>\r\n\t\t\t<br />\r\n\t\t\t<cite style=\"font-family:Calibri;font-size:9pt;color:#595959;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">출처</span>: &lt;<a href=\"https://blog.naver.com/PostView.nhn?blogId=wonderhama66&amp;logNo=120201200829&amp;redirect=Dlog&amp;widgetTypeCall=true&amp;topReferer=https%3A%2F%2Fwww.google.com%2F&amp;directAccess=false\">https://blog.naver.com/PostView.nhn?blogId=wonderhama66&amp;logNo=120201200829&amp;redirect=Dlog&amp;widgetTypeCall=true&amp;topReferer=https%3A%2F%2Fwww.google.com%2F&amp;directAccess=false</a>&gt; </cite>\r\n\t\t\t<br />\r\n\t\t"
  }
];
const CONTENT_HASH = 'cd4e17d4';

let cards = [];
let moving = null, resizing = null;
let selectedIdx = null, clipboardCard = null;
const GRID = 20, GAP = 14;
function snap(v) { return Math.round(v / GRID) * GRID; }

// ── Undo (Ctrl+Z) ────────────────────────────────────────────────────────────
const MAX_HISTORY = 50;
let history = [];
function snapshot() {
  syncText();
  history.push(JSON.stringify(cards));
  if (history.length > MAX_HISTORY) history.shift();
}
function undo() {
  if (!history.length) { showStatus('되돌릴 내용 없음'); return; }
  syncText();
  cards = JSON.parse(history.pop());
  renderCards();
  saveBoard();
  showStatus('↩ 되돌림');
}
function showStatus(msg) {
  const s = document.getElementById('status');
  s.textContent = msg;
  clearTimeout(showStatus._t);
  showStatus._t = setTimeout(() => { s.textContent = ''; }, 2000);
}
document.addEventListener('keydown', e => {
  const isText = document.activeElement?.contentEditable === 'true';
  if ((e.ctrlKey || e.metaKey) && e.key === 'z' && !e.shiftKey) {
    if (isText) return;
    e.preventDefault();
    undo();
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'c' && !e.shiftKey && !isText) {
    if (selectedIdx !== null && cards[selectedIdx]) {
      syncText();
      clipboardCard = JSON.parse(JSON.stringify(cards[selectedIdx]));
      showStatus('카드 복사됨');
      e.preventDefault();
    }
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'v' && !e.shiftKey && !isText) {
    if (clipboardCard) {
      e.preventDefault();
      snapshot();
      const nc = JSON.parse(JSON.stringify(clipboardCard));
      nc.x = (nc.x || 0) + 30; nc.y = (nc.y || 0) + 30;
      cards.push(nc);
      selectedIdx = cards.length - 1;
      renderCards(); saveBoard();
      showStatus('카드 붙여넣음');
    }
  }
  if (e.key === 'Escape') {
    document.querySelectorAll('.card.selected').forEach(c => c.classList.remove('selected'));
    selectedIdx = null;
  }
});

function pushCards(movedIdx) {
  const moved = cards[movedIdx];
  const movedEl = document.querySelector(`.card[data-idx="${movedIdx}"]`);
  if (!movedEl) return;
  const mh = movedEl.offsetHeight;
  document.querySelectorAll('.card').forEach(el => {
    const i = +el.dataset.idx;
    if (i === movedIdx) return;
    const c = cards[i], oh = el.offsetHeight;
    if (moved.x < (c.x+(c.w||200)) && (moved.x+(moved.w||200)) > c.x && moved.y < (c.y+oh) && (moved.y+mh) > c.y) {
      c.y = moved.y + mh + GAP;
      el.style.top = c.y + 'px';
    }
  });
}

function loadBoard() {
  const saved = localStorage.getItem(SAVE_KEY);
  const savedHash = localStorage.getItem(SAVE_KEY + ':hash');
  let parsed = null;
  try { parsed = saved ? JSON.parse(saved) : null; } catch(e) {}
  // reset if: no save, empty array, or content hash changed (page regenerated)
  if (!parsed || parsed.length === 0 || savedHash !== CONTENT_HASH) {
    cards = DEFAULT_CARDS.map(c => ({...c}));
    localStorage.removeItem(SAVE_KEY);
    localStorage.setItem(SAVE_KEY + ':hash', CONTENT_HASH);
    renderCards();
    const hasCoords = cards.some(c => c.x !== undefined && c.y !== undefined);
    if (!hasCoords) autoLayout();
    return;
  }
  cards = parsed;
  renderCards();
}
function resetToDefaults() { if (!confirm('저장된 보드를 지우고 원본으로 초기화합니다. 계속할까요?')) return; localStorage.removeItem(SAVE_KEY); cards = DEFAULT_CARDS.map(c => ({...c})); renderCards(); autoLayout(); }

function autoLayout() {
  const boardW = document.getElementById('board').offsetWidth;
  const cols = Math.max(1, Math.floor(boardW / 280));
  const colW = (boardW - GAP*(cols-1)) / cols;
  const colH = new Array(cols).fill(0);
  const allCards = document.querySelectorAll('.card');
  const images = document.querySelectorAll('.card img');
  let loaded = 0;
  function place() {
    allCards.forEach((el, i) => {
      const w = Math.min(cards[i].w || colW, colW);
      let minCol = 0;
      for (let c = 1; c < cols; c++) if (colH[c] < colH[minCol]) minCol = c;
      cards[i].x = minCol * (colW + GAP);
      cards[i].y = colH[minCol];
      cards[i].w = w;
      el.style.left = cards[i].x + 'px';
      el.style.top = cards[i].y + 'px';
      el.style.width = w + 'px';
      colH[minCol] = cards[i].y + el.offsetHeight + GAP;
    });
    document.getElementById('board').style.minHeight = (Math.max(...colH) + 100) + 'px';
    saveBoard();
  }
  if (!images.length) { requestAnimationFrame(place); return; }
  images.forEach(img => {
    if (img.complete) { loaded++; if (loaded >= images.length) requestAnimationFrame(place); }
    else { img.onload = img.onerror = () => { loaded++; if (loaded >= images.length) requestAnimationFrame(place); }; }
  });
}

function syncText() {
  document.querySelectorAll('.card').forEach(el => {
    const i = +el.dataset.idx;
    if (cards[i]?.type === 'text') { const t = el.querySelector('.text'); if (t) cards[i].content = t.innerHTML; }
  });
}
function saveBoard() { syncText(); localStorage.setItem(SAVE_KEY, JSON.stringify(cards)); localStorage.setItem(SAVE_KEY + ':hash', CONTENT_HASH); showStatus('저장됨 ' + new Date().toLocaleTimeString()); }

function renderCards() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  cards.forEach((card, i) => {
    const el = document.createElement('div');
    el.className = 'card'; el.dataset.idx = i;
    if (card.x !== undefined) el.style.left = card.x + 'px';
    if (card.y !== undefined) el.style.top = card.y + 'px';
    // html cards contain raw OneNote table HTML which may overflow the stated div width
    if (card.w) { if (card.type === 'html') el.style.minWidth = card.w + 'px'; else el.style.width = card.w + 'px'; }
    el.addEventListener('mousedown', e => {
      if (e.target.closest('.text, a, .card-btn, .resize-handle, td, th')) return;
      e.preventDefault();
      // Update selection
      document.querySelectorAll('.card.selected').forEach(c => c.classList.remove('selected'));
      selectedIdx = i; el.classList.add('selected');
      snapshot();
      moving = { idx: i, startX: e.clientX, startY: e.clientY, origX: card.x||0, origY: card.y||0 };
      el.classList.add('moving');
    });
    const actions = document.createElement('div'); actions.className = 'card-actions';
    const delBtn = document.createElement('button'); delBtn.className = 'card-btn'; delBtn.textContent = '×';
    delBtn.onclick = e => { e.stopPropagation(); if(confirm('삭제?')) { snapshot(); cards.splice(i,1); renderCards(); saveBoard(); } };
    actions.appendChild(delBtn); el.appendChild(actions);
    if (card.type === 'text') {
      const text = document.createElement('div'); text.className = 'text'; text.contentEditable = true;
      text.innerHTML = card.content || '';
      text.addEventListener('focus', () => { snapshot(); });
      text.addEventListener('blur', () => { card.content = text.innerHTML; saveBoard(); });
      el.appendChild(text);
    } else if (card.type === 'image') {
      const img = document.createElement('img');
      img.src = card.src.startsWith('http') || card.src.startsWith('data:') ? card.src : IMG_BASE + card.src;
      img.alt = ''; img.loading = 'lazy'; img.onerror = () => img.style.display = 'none';
      if (card.w) img.style.width = card.w + 'px';
      if (card.h) img.style.height = card.h + 'px';
      if (card.link) { const a = document.createElement('a'); a.href = card.link; a.target = '_blank'; a.appendChild(img); el.appendChild(a); }
      else { el.appendChild(img); }
      if (card.caption) { const cap = document.createElement('div'); cap.style.cssText = 'font-size:11px;color:#8b949e;margin-top:4px;word-break:break-word;padding:0 2px;'; cap.textContent = card.caption; el.appendChild(cap); }
    } else if (card.type === 'html') {
      const wrapper = document.createElement('div');
      wrapper.style.cssText = 'overflow:auto;font-size:13px;line-height:1.5;';
      wrapper.innerHTML = card.html.replace(/__ATTACHMENT__/g, IMG_BASE);
      wrapper.querySelectorAll('img').forEach(img => { img.style.maxWidth = '100%'; img.style.height = 'auto'; img.draggable = false; });
      wrapper.querySelectorAll('a').forEach(a => { a.target = '_blank'; a.style.color = '#6cb0f6'; });
      wrapper.querySelectorAll('table').forEach(t => { t.style.borderCollapse = 'collapse'; });
      wrapper.querySelectorAll('td,th').forEach(td => {
        td.style.border = '1px solid #444'; td.style.padding = '4px 6px'; td.style.verticalAlign = 'top';
        td.title = '더블클릭으로 편집';
        td.addEventListener('dblclick', function(e) {
          e.stopPropagation();
          snapshot();
          this.contentEditable = 'true';
          this.style.outline = '2px solid #388bfd';
          this.style.background = 'rgba(56,139,253,0.08)';
          this.focus();
        });
        td.addEventListener('blur', function() {
          this.contentEditable = 'false';
          this.style.outline = '';
          this.style.background = '';
          cards[i].html = wrapper.innerHTML.split(IMG_BASE).join('__ATTACHMENT__');
          saveBoard();
        });
      });
      el.appendChild(wrapper);
    } else if (card.type === 'table') {
      const rows = card.rows || [['','',''],['','',''],['','','']];
      const tbl = document.createElement('table');
      tbl.style.cssText = 'border-collapse:collapse;width:100%;font-size:13px;';
      rows.forEach((row, ri) => {
        const tr = tbl.insertRow();
        row.forEach((cell, ci) => {
          const td = document.createElement(ri === 0 ? 'th' : 'td');
          td.contentEditable = true;
          td.style.cssText = 'border:1px solid #30363d;padding:4px 8px;min-width:60px;text-align:left;' + (ri===0 ? 'background:#21262d;font-weight:600;' : '');
          td.textContent = cell;
          td.addEventListener('blur', () => { if (!cards[i].rows) cards[i].rows = rows; rows[ri][ci] = td.textContent; saveBoard(); });
          tr.appendChild(td);
        });
      });
      el.appendChild(tbl);
      const addRow = document.createElement('button');
      addRow.textContent = '+ 행'; addRow.style.cssText = 'margin-top:4px;font-size:11px;background:#21262d;border:1px solid #30363d;color:#8b949e;padding:2px 8px;border-radius:4px;cursor:pointer;';
      addRow.onclick = e => { e.stopPropagation(); snapshot(); if (!cards[i].rows) cards[i].rows = rows; cards[i].rows.push(new Array(cards[i].rows[0].length).fill('')); renderCards(); saveBoard(); };
      const addCol = document.createElement('button');
      addCol.textContent = '+ 열'; addCol.style.cssText = 'margin-top:4px;margin-left:4px;font-size:11px;background:#21262d;border:1px solid #30363d;color:#8b949e;padding:2px 8px;border-radius:4px;cursor:pointer;';
      addCol.onclick = e => { e.stopPropagation(); snapshot(); if (!cards[i].rows) cards[i].rows = rows; cards[i].rows.forEach(r => r.push('')); renderCards(); saveBoard(); };
      el.appendChild(addRow); el.appendChild(addCol);
    }
    const rh = document.createElement('div'); rh.className = 'resize-handle';
    rh.addEventListener('mousedown', e => { e.preventDefault(); e.stopPropagation(); snapshot(); resizing = { idx: i, startX: e.clientX, startW: card.w || el.offsetWidth }; });
    el.appendChild(rh);
    if (i === selectedIdx) el.classList.add('selected');
    board.appendChild(el);
  });
  requestAnimationFrame(() => {
    let maxB = 0;
    document.querySelectorAll('.card').forEach(el => { const b = (parseFloat(el.style.top)||0) + el.offsetHeight; if (b > maxB) maxB = b; });
    board.style.minHeight = (maxB + 100) + 'px';
  });
}

document.addEventListener('mousemove', e => {
  if (moving) {
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`); if (!el) return;
    let nx = moving.origX + e.clientX - moving.startX, ny = moving.origY + e.clientY - moving.startY;
    if (e.shiftKey) { nx = snap(nx); ny = snap(ny); el.style.outline = '1px dashed rgba(240,192,64,0.3)'; } else { el.style.outline = ''; }
    el.style.left = nx + 'px'; el.style.top = ny + 'px';
  }
  if (resizing) {
    let nw = resizing.startW + e.clientX - resizing.startX; if (e.shiftKey) nw = snap(nw);
    cards[resizing.idx].w = Math.max(100, nw);
    const el = document.querySelector(`.card[data-idx="${resizing.idx}"]`); if (el) el.style.width = cards[resizing.idx].w + 'px';
  }
});

document.addEventListener('mouseup', e => {
  if (moving) {
    let nx = moving.origX + e.clientX - moving.startX, ny = moving.origY + e.clientY - moving.startY;
    if (e.shiftKey) { nx = snap(nx); ny = snap(ny); }
    cards[moving.idx].x = Math.max(0, nx); cards[moving.idx].y = Math.max(0, ny);
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`); if (el) { el.classList.remove('moving'); el.style.outline = ''; }
    if (e.shiftKey) pushCards(moving.idx);
    moving = null; saveBoard();
  }
  if (resizing) { if (e.shiftKey) pushCards(resizing.idx); resizing = null; saveBoard(); }
});

function addTextCard() { snapshot(); cards.push({ type: 'text', content: '', x: 50, y: window.scrollY+100, w: 300 }); renderCards(); setTimeout(() => { const els = document.querySelectorAll('.card .text'); els[els.length-1]?.focus(); }, 100); }
function addImageCard() { const input = document.createElement('input'); input.type = 'file'; input.accept = 'image/*'; input.onchange = e => { const f = e.target.files[0]; if (!f) return; const r = new FileReader(); r.onload = () => { snapshot(); cards.push({ type: 'image', src: r.result, x: 50, y: window.scrollY+100, w: 240 }); renderCards(); saveBoard(); }; r.readAsDataURL(f); }; input.click(); }
function addImageUrl() { const url = prompt('이미지 URL'); if (!url) return; snapshot(); cards.push({ type: 'image', src: url, x: 50, y: window.scrollY+100, w: 240 }); renderCards(); saveBoard(); }
function addTableCard() {
  const colsStr = prompt('열 수 (기본 3)', '3'); const cols = Math.max(1, parseInt(colsStr)||3);
  const rowsStr = prompt('행 수 (헤더 포함, 기본 4)', '4'); const rows = Math.max(1, parseInt(rowsStr)||4);
  snapshot();
  cards.push({ type: 'table', rows: Array.from({length: rows}, (_, ri) => Array.from({length: cols}, (_, ci) => ri===0 ? `열${ci+1}` : '')), x: 50, y: window.scrollY+100, w: Math.max(240, cols*100) });
  renderCards(); saveBoard();
}
function exportBoard() { syncText(); const blob = new Blob([JSON.stringify(cards, null, 2)], { type: 'application/json' }); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = SAVE_KEY + '.json'; a.click(); }
// ── Zoom ─────────────────────────────────────────────────────────────────────
let zoom = parseFloat(localStorage.getItem('zoom-' + SAVE_KEY) || '1.0');
function applyZoom() {
  const board = document.getElementById('board');
  board.style.transform = `scale(${zoom})`;
  board.style.transformOrigin = '0 0';
  document.getElementById('zoom-level').textContent = Math.round(zoom * 100) + '%';
  localStorage.setItem('zoom-' + SAVE_KEY, zoom);
}
function zoomIn()  { zoom = Math.min(3.0, parseFloat((zoom + 0.1).toFixed(2))); applyZoom(); }
function zoomOut() { zoom = Math.max(0.2, parseFloat((zoom - 0.1).toFixed(2))); applyZoom(); }
document.addEventListener('keydown', e => {
  if (e.ctrlKey || e.metaKey) {
    if (e.key === '=' || e.key === '+') { e.preventDefault(); zoomIn(); }
    if (e.key === '-')                  { e.preventDefault(); zoomOut(); }
    if (e.key === '0')                  { e.preventDefault(); zoom = 1.0; applyZoom(); }
  }
});
document.getElementById('board').addEventListener('wheel', e => {
  if (!(e.ctrlKey || e.metaKey)) return;
  e.preventDefault();
  e.deltaY < 0 ? zoomIn() : zoomOut();
}, { passive: false });
applyZoom();
function resetLayout() { if (!confirm('자동 재배치합니다.')) return; cards.forEach(c => { delete c.x; delete c.y; }); renderCards(); autoLayout(); }
// ── Floating format toolbar ───────────────────────────────────────────────────
const fmtBar = document.getElementById('format-toolbar');
function fmt(cmd) { document.execCommand(cmd, false, null); saveBoard(); }
function fmtLink() {
  const sel = window.getSelection();
  if (!sel || sel.isCollapsed) return;
  const url = prompt('링크 URL 입력', 'https://');
  if (!url) return;
  document.execCommand('createLink', false, url);
  // make links open in new tab
  sel.anchorNode?.parentElement?.closest('a')?.setAttribute('target', '_blank');
  document.querySelectorAll('.text a').forEach(a => a.target = '_blank');
  saveBoard();
}

// prevent format buttons from blurring contenteditable
fmtBar.addEventListener('mousedown', e => e.preventDefault());

document.addEventListener('selectionchange', () => {
  const sel = window.getSelection();
  if (!sel || sel.isCollapsed || !sel.toString().trim()) { fmtBar.style.display = 'none'; return; }
  // only show if selection is inside a .text element
  const anchor = sel.anchorNode;
  if (!anchor) { fmtBar.style.display = 'none'; return; }
  const textEl = anchor.nodeType === 1 ? anchor.closest('.text') : anchor.parentElement?.closest('.text');
  if (!textEl) { fmtBar.style.display = 'none'; return; }
  // position above selection
  const range = sel.getRangeAt(0);
  const rect = range.getBoundingClientRect();
  fmtBar.style.display = 'flex';
  const tbW = fmtBar.offsetWidth || 180;
  let left = rect.left + rect.width / 2 - tbW / 2;
  left = Math.max(8, Math.min(left, window.innerWidth - tbW - 8));
  fmtBar.style.left = left + 'px';
  fmtBar.style.top = (rect.top - 44 + window.scrollY) + 'px';
});

setInterval(saveBoard, 30000);
loadBoard();
</script>
</body>
</html>
