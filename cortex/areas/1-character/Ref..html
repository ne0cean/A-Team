<!DOCTYPE html>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1e1e1e; color: #e0e0e0; font-family: 'Segoe UI', -apple-system, sans-serif; font-size: 15px; line-height: 1.6; padding: 20px 30px 60px; overflow-x: hidden; }
a { color: #6cb0f6; text-decoration: none; }
a:hover { text-decoration: underline; }
.title-bar { background: #3a3a5c; display: inline-block; padding: 6px 16px; font-size: 22px; font-weight: bold; color: #fff; margin-bottom: 4px; }
.date { color: #999; font-size: 13px; margin-bottom: 20px; }
.board { position: relative; }
.card { background: #2a2a2a; border: 1px solid #3a3a3a; border-radius: 8px; padding: 12px; position: absolute; cursor: grab; transition: box-shadow 0.15s; overflow: hidden; }
.card:hover { box-shadow: 0 0 0 1px #58a6ff; z-index: 10; }
.card.moving { opacity: 0.8; box-shadow: 0 4px 24px rgba(0,0,0,0.6); z-index: 100; cursor: grabbing; }
.card img { width: 100%; border-radius: 4px; display: block; }
.card .text { outline: none; min-height: 20px; white-space: pre-wrap; word-break: break-word; }
.card .text:focus { background: rgba(255,255,255,0.05); border-radius: 4px; padding: 4px; }
.card .text:empty::before { content: '텍스트 입력...'; color: #555; }
.card-actions { position: absolute; top: 4px; right: 4px; display: none; gap: 4px; }
.card:hover .card-actions { display: flex; }
.card-btn { background: #333; border: 1px solid #555; color: #ccc; border-radius: 4px; padding: 2px 6px; font-size: 11px; cursor: pointer; }
.card-btn:hover { background: #444; color: #fff; }
.resize-handle { position: absolute; bottom: 0; right: 0; width: 16px; height: 16px; cursor: se-resize; opacity: 0; }
.card:hover .resize-handle { opacity: 0.6; }
.resize-handle::after { content: ''; position: absolute; bottom: 3px; right: 3px; width: 8px; height: 8px; border-right: 2px solid #666; border-bottom: 2px solid #666; }
.card.selected { box-shadow: 0 0 0 2px #58a6ff; z-index: 5; }
.highlight-red { color: #ff6b6b; }
.highlight-blue { color: #6cb0f6; }
.highlight-gold { color: #f0c040; }
.toolbar { position: fixed; bottom: 0; left: 0; right: 0; background: #161b22; border-top: 1px solid #30363d; padding: 8px 20px; display: flex; gap: 12px; align-items: center; z-index: 200; }
.toolbar button { background: #21262d; border: 1px solid #30363d; color: #e0e0e0; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; }
.toolbar button:hover { background: #30363d; }
.toolbar .status { color: #8b949e; font-size: 12px; margin-left: auto; }
#format-toolbar { position: fixed; display: none; background: #1c2128; border: 1px solid #444c56; border-radius: 8px; padding: 4px 6px; gap: 2px; align-items: center; z-index: 500; box-shadow: 0 4px 16px rgba(0,0,0,0.5); }
#format-toolbar button { background: none; border: none; color: #cdd9e5; padding: 4px 8px; border-radius: 5px; cursor: pointer; font-size: 13px; line-height: 1; }
#format-toolbar button:hover { background: #373e47; }
#format-toolbar .sep { width: 1px; height: 16px; background: #444c56; margin: 0 2px; }
</style>

<div class="title-bar" contenteditable="true">Ref.</div>

</div>

  <button onclick="addTextCard()">+ 텍스트</button>
  <button onclick="addImageCard()">+ 이미지</button>
  <button onclick="addImageUrl()">+ 이미지 URL</button>

  <button onclick="saveBoard()">💾 저장</button>

    <button onclick="zoomOut()" title="Ctrl+-" style="padding:6px 10px;">−</button>
    <span id="zoom-level" style="font-size:12px;color:#8b949e;min-width:36px;text-align:center;">100%</span>
    <button onclick="zoomIn()" title="Ctrl+=" style="padding:6px 10px;">+</button>

<script>
const SAVE_KEY = 'board-Ref-';
const IMG_BASE = '../../attachments/';
const DEFAULT_CARDS = [
  {
    "type": "text",
    "x": 48,
    "y": 139,
    "w": 600,
    "content": "관심과 흥미가 이런 것이었다.\n[파는 마케터가 아닌, 만드는 마케터]\n입사 전부터 마케팅 영역에 관심을 가지고 공부 해오는 과정에서 \"궁극의 마케팅은 결국, 궁극의 제품력에서 나온다\"는 신념을 가지게 되었습니다.\n판매하는 마케터보다 만드는 마케터 즉, 상품기획자로써 성장하는 것을 목표로 갖게 되었습니다. 입사 전 2010년 월드컵 당시 ireds라는 응원 어플리케이션을 기획하고, 홍보하여 이를 활용한 응원전을 펼치면서 Apple app 스토어 31위에 랭크되기도 하였습니다. 이러한 경험을 거치면서, 하나의 서비스를 기획하고 그것이 working하게 만드는 과정 자체에에 큰 흥미를 갖게 되었습니다.\n입사 이전부터 상품을 기획단계에서 부터 출시하게 되는 과정 자체에 큰 흥미\n입사 이후 Data 중심의 biz transformation에 대한 내부 니즈로 출범하게 된 상품기획본부의 R&R을 알게 된 이후 목표로 하게됨.\nt-base ball 참여\n입사전부터… 를 목표하고….. 입사 이후 상품기획본부를 희망함\n마케팅 분야\n상품기획 역량을 위해서 이런 것들을 준비함\n\n상품 시나리오 및 개발요건 정의 역량\n상품 개발 일정 및 BP관리 역량\n상품성 검증 역량\n상품 기능 개선점 파악 역량\n상품 PROTOTYPING 역량\nRCS를 런칭한 현 상황에 상품기획본부에서 함께 고민하고 배우며….\n\n상품에 대한 시나리오 및 구체적 개발요건 정의로부터 상품 개발 LHC, 상품성 검증 및 출시, 출시 후 기능 개선 및 고도화\n\n상품 시나리오 및 개발 요건 정의\n상품 개발 계획 수립 및 개발 관리\n상품성 검증 및 출시\n상품 기능 개선 및 고도화\n개인적으로는 …..로 성장할 것이고 회사에 이런 것들을 선사할 것이다.\nMarket sensing과 Tech Intelligence를 겸비한, 서비스 플랫폼 기획자로 성장하고자 하는 열망이 있음.\n현재 가장 관심을 가지고 있는 영역은 RCS이며, 단순 Comm. 서비스를 넘어서 하나의 eco-system을 가진 플랫폼으로써\n발전 가능성에 주목하고 있음.\nService Platform을 창출/확산 시킬 것임\n기획역량을 가진 Expert\n엔지니어들과 Comm.이 가능한\nUI/UX에 대한 이해\n이를 통한 …..Expert 상품기획에 필요한… 역량을 두루갖춘 스페셜 리스트로 성장\nTelco Biz 전반과 N/W과 마케팅에 대한 폭넓은 이해를 키워나갈 것임.\n지원하신 본부/Function에서 하고 싶은, 혹은 이루고 싶은 일에 대해 구체적인 계획(목표) 작성해주시기 바랍니다. (직무/TASK 기재 요망) (800자 초과)\n\n궁극적인 목표는 …. 이다.(개인적으로는 뭐고 회사측면에서는 ...이다.)\n이를 달성하기 위해서… 상품기획2팀에 합류해서…. 쪽 업무를 담당하고…..\n구체적인 Job은 이런 것들을 해나갈 것이다.\n이런 것들을 배우고 이런 것들을 만들 것이다.\n개인 역량이 아닌 엔지니어들과의 팀워크와 시너지 측면에서 가장 강점을 가지는 상품기획자이자 마케터로 성장\n개발업무도 하다보니&#160;IT 기술자들과 comm.이 잦아져서 각종 프로그래밍 관련 요소를&#160;(Comm. 목적으로) 학습하고 있습니다.&#160;&#160;&#160;\nSQL, jQuery,&#160;HTML5, Hybrid App, Java, Android 등을 수박 겉핡기지만..\n그 밖에 통신사업 관련해서도 기술적 지식이 있으면 유리합니다.&#160;즉, Access망은 어떻게 구성되어 있고&#160;외부인이 모르는 어떤 가치가 있으며\nCore망 구성이 어떻게 구성 되어 있고 일반 인터넷 사업자와는 (사업방식/과금/구성요소 등이)&#160;어떻게/왜 다른지 등등&#160;\n(저도 거의 몰라서 바닥을 기고 있지만), 최근 경험으로 보어 어떤 이슈가 생기면 위의 지식/정보/인적채널을 가지고 있는 사람이 무조건 유리합니다.\n몇 년 이내에… 사내에 이런 것들이 이슈가 될텐데 이런 것들 중에서도… 이걸 담당해서\n상품기획본부는 LTE로의 N/W진화에 따른 Data 중심 Biz Transformation 전략을 반영하여,\nMNO 상품/서비스 기획 및 개발을 중점적으로 수행하는 것을 목표로 2012년 1월 출범.\n지난 상반기에 Comm.상품, Smart N/W 상품, 제휴상품, Home 상품 등 4개 상품화 기외형역을\n정의하고, 해당 영역별 ideation을 통해 상품 portfolio를 구성하였습니다.\n최근 이슈인 RCS, HD Voice 등 Comm. 상품 개발부터 Smart N/W Mgmt. 기술의 상품화,\n다양한 게임제휴상품 출시 등을 추진해옴\n카톡등의 OTT서비스가 흉내낼 수 없는 상품력 강화 및 활성화.\n폰 주소록에 상대방의 실시간 상태 정보가 표시되고, SMS를 포함하여 1:1 또는 그룹 간 실시간\n채팅과 파일전송 등이 가능\n최종적으로 그리는 그림은, 빌링하는 고객을 B2C/B2C로 국한하지 않고 궁극적으로 B2B2C로 확장할 수 있는\n모델을 설계해 내는 것이다.\n\n직무/Task : 상품기획본부 - 상품기획2팀 - 직무/TASK : Comm. 영역 상품 기획(기획/출시/운영)\n'12년도 개인 비전은 \"사내에서 가장 기술적 이해도가 높은 junior marketer\"였음.\n기술자들과 원활한 Comm.을 위해 HTML5 등에 대한 학습 / 상품성 검증 / Biz modeling기법들을 심도있게 학습 및 활용\nRCS가 최적화 및 활성화 방안…. 향후 시장에 안착 후  Biz RCS\n금번 기회가 아니더라도, 향후 꾸준히 역량을 축적하여 상품기획본부에서 000로서 일하고자하는 의지와 열망이 있음.\n개인적인 비전은 : 기존 당사의 정책중심 마케팅이 아닌, 상품 영역의 마케팅적 인사이트를 가진 기획자로 성장.\nMarket sensing과 Tech intelligence의 밸런스를 가진 기획자로 성장하는 것.\nProduct Manager로\n중장기 비전 : RCS 2.0 출시/운영/개선 및 RCS 2.0의 Biz platform화를 통한 New BM 창출\n장기적인 비전은 N/W Service 기획 Expert로써 000를 창\n상품 기획/개발 직무정의 - 상품에 대한 시나리오 및 구체적 개발요건 정의로부터 상품 개발 LHC, 상품성 검증 및 출시, 출시 후 기능 개선 및 고도화\n상품기획 2팀 TASK\n상품 시나리오 및 개발 요건 정의\n상품 개발 계획 수립 및 개발 관리\n상품성 검증 및 출시\n상품 기능 개선 및 고도화\n이전 직무 경험\n상품 기획, 개발 , 상용화 또는 운영 경험\n네트워크 분야 수행경험 (전략/운용/개발/R&D 등)\n마케팅 분야 수행 경험 (상품 / 서비스 기획 등)\n요구 역량\n상품 시나리오 및 개발요건 정의 역량\n상품 개발 일정 및 BP관리 역량\n상품성 검증 역량\n상품 기능 개선점 파악 역량\n상품 PROTOTYPING 역량\n상품기획본부는 LTE로의 N/W진화에 따른 Data 중심 Biz Transformation 전략을 반영하여,\nMNO 상품/서비스 기획 및 개발을 중점적으로 수행하는 것을 목표로 2012년 1월 출범.\n지난 상반기에 Comm.상품, Smart N/W 상품, 제휴상품, Home 상품 등 4개 상품화 기외형역을\n정의하고, 해당 영역별 ideation을 통해 상품 portfolio를 구성하였습니다.\n최근 이슈인 RCS, HD Voice 등 Comm. 상품 개발부터 Smart N/W Mgmt. 기술의 상품화,\n다양한 게임제휴상품 출시 등을 추진해옴\n카톡등의 OTT서비스가 흉내낼 수 없는 상품력 강화 및 활성화.\n폰 주소록에 상대방의 실시간 상태 정보가 표시되고, SMS를 포함하여 1:1 또는 그룹 간 실시간\n채팅과 파일전송 등이 가능\nRCS 에서 이모티콘을 만들고, RCS를 이용한만큼 그게 비례해서 이모티콘을 제공하거나 포인트 제공하고 구매할 수 있게 하는 방안\n(보안/안정성) 원격 폰북 삭제 기능\nOTT의\n[전공 : 경영학 - 마케팅]\n학부에서 배울 수 있는 마케팅 지식은 물론, 7개월간 휴학 하고 각 기업 마케팅 실무진과 함께 마케팅 Case 프로젝트를 수행하며 공부한 경험이 있습니다. 이는 이론적 지식에 국한되는 것입니다. 하지만, 광고/ 프로모션/ SNS마케팅/ PR/ 브랜딩에 이르는 마케팅 전반에 대한 학제적 감각을 길러왔다는 것에 의의가 있습니다. 또한, 현재까지도 '마케팅공화국' 등의 마케팅 커뮤니티에서 활동하며 이종 산업에 종사하는 마케터들과 교류를 통해 새로운 시야를 얻고 있습니다.\n[입사 전 직무경험 : CRM 컨설팅社에 근무 _ 내부 마케팅 역량]\nCRM 컨설팅社에 근무하며, 고객 Data 기반의 마케팅 경험을 쌓았습니다. CRM의 특성 상 이종 산업간 연계나 Agency/외주업체와의 Co-work을 통한 마케팅 Campaign planning 및 운영 업무가 많았습니다. 이 과정에서 개발자/디자이너와 잦은 Comm.과 협업이 필수적이었습니다. 이러한 경험을 통해 다양한 이해관계자의 입장을 잘 이해하게 되었으며, 다양한 BP와의 협업에 불편함이 없다는 강점을 갖추게 되었습니다.\n마케터로서 가장 중요한 능력 중 하나는, 내부 마케팅 역량이라고 생각합니다. 데이터로 의사결정권자를 설득하여 컨펌 받고, 동료들과 BP로부터 지지를 얻어, '아이디어'에 그치지 않고 '일이 되게 만드는' 것이 정말 중요하다는 것을 경험으로 알고 있습니다. 모두가 외부와 고객에 집중할 때, 내부로부터 '실행력'을 담보해 낼 수 있는 '내부 마케팅' 능력이 저의 강점입니다. 일례로, 올해 본부 유선담당을 수행하며 유선 판매의 당위성에 대한 자료를 제작하여 지역 마케팅팀 구성원들과 유통망을 설득하여 큰 호응과 공감을 이끌어낸 바 있습니다. (두 번째 첨부 파일 참고 부탁드립니다.)\n[입사 후 직무경험 : 현장 마케팅 3대 조직 근무경험 _ 유통망 리더십]\nㅇ 지역 마케팅본부의 3대 조직을 두루 경험\n- 2개의 스탭조직(CV추진팀, 마케팅기획팀)과 2년간의 마케팅팀(전주마케팅팀) 경험\n[1] CV추진팀(現 채널기획팀) 유통모듈에서에서 1년간 유통(대리점 계약 체결, 상생복지P/G, 상권분석, 소매 점당 판매력 제고, 단골고객 관리, SI) 업무 경험\n[2] 전주마케팅팀에서 2년간 이동전화 정책 담당\n[3] 현재, 서부마케팅기획팀에서 본부 유선(도매)정책 & 매출지표 담당\n위와 같이 현장 마케팅본부를 구성하는 3가지 조직과 직무(유통/ 이동전화/ 유선/ 매출)를 두루 경험하였습니다. 본사-본부-팀 단위의 갖가지 정책/ 컨테스트/ 프로모션을 활용하여 유통망을 L.H.C하고, 이를 직접 입안하는 것을 주 업무로 해왔습니다. 이 덕분에, 대리점의 수익구조는 물론 대리점 구성원들의 판매 동인을 잘 파악하고 있습니다.\nㅇ 유통망 리더십\n고객 이전에, 유통망이 있고 그들을 움직이게 할 수 있어야 그들이 고객을 움직이고, 판매가 이루어지는 현장을 몸소 경험해왔습니다. 마케터-대리점사장-중간관리자-소매매장 직원 or 판매점/딜러에 이르기까지 유통경로를 아우르는 모든 이해관계자가 있고 그들을 설득하는 작업이 그간 제 업무의 대부분을 차지하였습니다. 특히, 마케팅팀에서 2년간 이동전화 정책을 담당하며 쌓아온 유통망과의 유대와 경험을 바탕으로 유통망 반응 타진, 판매 방식 구성 등에 공헌 할 수 있을 것입니다.\n원활한 소통\nBP/유통망과의 긴밀한 Co-work 및 원활한 Comm. 가능\n유효한 마케팅 Campaign 기획\n사내 마케팅 프로세스에 대한 이해를 바탕으로, 실행력 높은 마케팅 Campaign 기획\n유통망과 대상의 프로모션이나 컨테스트 등 Motivation 정책 수립\n마케팅 P/G Feasibility 검증 및 현장 Voice 청취\n유통망과의 인적 네트워크를 바탕으로 즉각적인 유통망 반응 타진 및 현장 의견 청취 가능\n프로모션 혹은 컨테스트 기획 시 최적 접점선정 및 접근 방식 구상\n+ 마케팅 부문 구성원들과의 시너지\n마케팅 부문에서 근무하며 쌓은 선배들과의 긴밀한 Network을 통해 유통, 상품마케팅, 정책기획 등 마케팅 본부를 위시한 MNO 곳곳에 있는 구성원들과의 교류를 통한 신속한 정보 탐색과 실행력 또한 업무 수행의 윤활유가 될 것입니다.\n[기초 업무 능력 및 체력]\n입사 후 저의 롤모델은 국가대표 축구선수 손흥민 이었습니다. 오늘날 손흥민의 폭발적인 퍼포먼스의 근간에는 혹독하게 다져온 기본기가 있다는 것은 이미 잘 알려진 사실입니다. 입사 후, 직장인의 기본기가 무엇일까, ① 가장 활용빈도가 높고, ② 항구적으로 Performance에 영향을 미치는 것 그리고 ③ 주니어 시기에 반드시 일정 수준 이상의 능력을 갖춰야 할 것이 무엇인지를 고민했고, '업무용 Tool 활용능력과, 지속적 자가 학습능력'으로 정의 하였습니다. 이러한 기본기를 다져온 결과 하기와 같은 기초 업무능력을 확보하게 되었습니다.\nㅇ Paper work (문서 저작 Tool 숙련도)\n- PPT/Word : 문서 작성에 어려움이 없으며, 기초적인 인포그래픽 제작 가능\n- Excel : 매크로와 기본적인 VBA 활용 가능\n- MS Project : 체계적 프로젝트 스케쥴 관리 가능\nㅇ Data managemnet (사내 DBMS 숙련도)\n- U.key, DBM, OLAP, SID를 활용한 다야한 Data 산출 가능\nㅇ ICT 산업에 대한 꾸준한 학습\n- 매일 News clip을 읽는 것으로 일과를 시작하여, 틈틈히 T-infornet & 주간동향 등 최신 ICT 보고서를 탐독함\n*Study 결과를 토대로 New BM 및 개선사항 Input-Supex 제안 (2014년 개인 누적 제안 수 31개)\nㅇ 기초 체력\n- 매일 아침 30분 이상의 러닝으로 하루를 시작하며, 마라톤 풀코스 3회 완주 경험이 있습니다.\n이를 통해 고강도의 업무를 견딜 수 있는 체력과 근성, 집중력을 길러 왔습니다.\n[왜 Smart Home 사업에 지원하는가? - 조직과 나의 성장의 현장]\n정체된 MNO, 방황하는 플랫폼. 정작 '되어야만 하는 사업'은 Smart Home입니다. 장기적으로는 Home의 문턱을 넘어 Smart Car에 이르기까지 Seamless하게 연결해나갈 베이스캠프이자 전진기지라고 생각합니다. 자사의 막강한 유통망, 회선판매 경험, 기술적 기반 등을 종합적으로 고려했을 때, 우리가 잘 할 수 있는 일이고 잘해야만 하는 일이라고 믿습니다. 이렇듯 Home영역이 가능성을 지닌 무대라고 느끼고 있습니다.\n입사 전 부터, '막연한 미래'라고 생각했던 것들을 직접 그려나가는 현장에서 일하고 싶다는 열망이 있었습니다. 월급쟁이가 조직에서 급여 이외에 바랄 수 있는 것이 딱 하나 있다면, '성장의 기회'라고 생각합니다. 구성원 입장에서 조직에서 쓰는 대로 쓰여지는 것이 맞는 것인지도 모르겠습니다만, 이왕이면 원하고 또 잘 할 수 있는(혹은 그렇게 믿는) job에 대한 욕심이 있습니다. 궁극적으로는, 외부에서 영입된 인력이 아닌 Telco Backgroud를 가진 인재로 성장하여 자사의 상품을 총괄하는 Product Manager가 되는 것이 중장기 Career 목표 입니다.\n이상적인 조직은, 개인의 비전과 개인의 비전이 가능한 합치된 조직이라고 생각합니다. MNO Biz를 경험하고, Telco내에서 자생적으로 성장한 Smart Home의 전문가로 성장하고자 하는, 저 개인의 확고한 목표가 팀과 조직에 유익한 에너지로 작용할 것임을 확신합니다.\n[왜 마케팅/PR 직무를 지원하는가? - 만들 수 있는 것을 만드는가, 팔리는 것을 만드는가]\n하나의 상품을 탄생시키고 그것의 life cycle에 따라 Fadeout시키는 전 과정을 관장하는 Product manager가 되기 위해서는, 고객이 원하지만 그것을 원하고 있다는 사실조차 인지하지 못하고 있는 '숨은 Needs'를 포착해낼 수 있어야 할 것입니다. 그러한 직관과 고객 인사이트를 기르기 위해서 마케팅을 전공했습니다.\n대학시절에는 7개월간 휴학하고 마케팅 실무진들로부터 직접 마케팅의 다양한 영역을 배우기도 하였고, 국내 최대의 마케터 커뮤니티인 '마케팅공화국'에서 현재까지도 사무관으로 활동하며 이종산업 마케터들과 교류를 통해 배움을 얻고 있습니다. 이렇듯 마케팅은 제게 있어 '항상 잘 하고 싶었고, 현재로써는 가장 잘 할 수 있는 일'입니다.\n[무엇을, 어떻게 기여할 것인가? - 멀티 사이드 마케팅]\n네트워크 효과가 강하게 작용하는 서비스 플랫폼의 특성상 초기에 플랫폼 참여자 ─ 제휴사와 최종소비자 ─ 양자를 최대한 서비스에 끌어들이는 것이 중요하다고 생각합니다. 즉, 최종소비자(B2C)와 플랫폼 참여기업(B2B) 두 영역에서의 홍보와 마케팅이 동시에 이루어져야 한다는 의미이고, 결국 제휴사 제품이 많이 팔려야 우리의 스마트홈 Biz의 외연도 확장되는 상생과 공생의 장이라고 생각합니다.\n최종 고객들에게는 만성적으로 겪어와서 불편으로 인지하고 있지조차 못한 생활 속 불편들을 발굴하고, 그러한 '보편타당한 불편'을 스마트홈 기술을 통해 해소해나갈 수 있다는 것을 지속적으로 알리는 작업이 필요할 것입니다. 이를 통해 스마트홈 Biz의 파이를 키움과 동시에, '스마트홈 서비스 = SKT'라는 인식을 선점하여 타 스마트홈 서비스에 대한 인지적 진입장벽을 만들어 내는 작업이 선행되어야 할 것입니다.\n잠재적 제휴사들을 대상으로는 SK텔레콤 스마트홈 연합에 참여함으로써 얻는 베네핏, 고객접점 확대 및 자사의 유통망을 통한 각종 프로모션 기회 획득, 막대한 가입자 기반 활용 등의 매력적인 동인들을 알리고, 이를 통해 보다 많은 제휴사를 확보 할 수 있는 인지적 기반(브랜딩)을 구축해 나가야 하겠습니다.\n상기 목표를 달성하기 위해 제가 생각하고 있는 스마트홈 마케팅/PR의 미션은 아래와 같습니다.\n\n[1] 네트워크 효과 극대화를 통한 초기 플랫폼  참여자 기반 확대\n[2] SKT 스마트홈 Alliance 소속社간 Co-marketing 중계 : 제휴사 상품 판매 제고\n[3] 스마트홈 체험 접점 확대\n이를 달성하기 위해 아래와 같은 아이디어를 검토할 수 있습니다.\nㅇ SKT 스마트홈 서비스 제품 인증제 운영\n- 제휴사 협의체를 통한 인증 기준 마련\n- 인증 마크 제작 및 인증 제품 고시 사이트 구축\n- 인증제도 및 인증제품에 대한 홍보활동\n\n영화/TV PPL\n제휴사와의 Co-AD : 옴니버스 광고\n\nSKT스마트홈 체험 House 운영\n신축아파트 모델하우스에 제품 협찬\nCoffee 브랜드와의 제휴를 통한 스마트홈 Caf&#233; 운영\n\n자체 유통망을 보유한 제휴사의 매장 VMD 및 판매방식 코칭\n각 제휴사 제품카달로그 및 홈페이지에 SKT 스마트홈을 포함하여 제작\n물론, 위에 열거한 아이디어들은 저만의 단견이므로 Feasibility를 검증해야 마땅합니다. 하지만 이러한 시도들을 통해, 궁극적으로는 삼성전자, LG전자 등 유력 가전업체들 까지 자사의 스마트홈 플랫폼과 우리 SK텔레콤의 스마트홈 플랫폼을 동시에 가져갈 정도의 파급력을 가지는 것이 목표가 되어야 한다고 생각합니다.\n[줄탁동시(啐啄同時)]\n물론, 지금 제가 가지고 있는 역량만으로는 녹록치 않을 것입니다. 다만, 저에게 주어질 '기회'와 '성장에 대한 열망'이 만날 때, 우리의 Smart Home 사업에 건설적 에너지를 보탤 수 있음을 믿습니다.\n감사합니다.\nSK텔레콤은 ▲가정 내 가전제품 및 홈기기 원격제어를 통한 '편리한 홈' ▲도어락 상태확인 및 가스 원격 제어를 통한 '안전한 홈' ▲음악, TV와 연계된 엔터테인먼트를 통한 '즐거운 홈'을 스마트홈의 3대 추구가치로 설정했다. 이를 통해 고객의 삶의 질을 획기적으로 향상시키겠다는 계획이다.\n______________________________________________________________________________________________________________________\nSK텔레콤의 역할은 원격제어나 모니터링과 다양한 추가 기능을 제공하는 것이다. DB관리를 위한 서비스 플랫폼을 개발&#183;운영하며, 참여 제조사들은 스마트 제품 개발&#183;생산, 고객 요구사항을 반영한 서비스 개선을 담당하게 된다. 각 가전업체들이 자사 제품의 고객 가치를 높이는데 SK텔레콤의 스마트홈 플랫폼을 이용하는 컨셉이다.&#160;\n회사 측은,\n△편리한 홈 (가정 내 가전제품 및 홈기기 원격제어)\n△안전한 홈 (도어락 상태확인 및 가스 원격 제어 등)\n△즐거운 홈 (음악, TV와 연계된 Entertainment)을 스마트홈의 3대 추구가치로 설정하고,\n이를 통해 고객의 삶의 질을 획기적으로 향상시키겠다는 포부를 밝혔다.\n가슴을 쳐야 팔린다.\n본 자료는, 2013년 1~2년차 대상 Jump-up과제 발표 자료로 작성한 것입니다.\n현재 당사의 스마트홈 플랫폼에 대한 Approach는 '개방형 IoT 플랫폼 생태계 구축'으로 전환되었으나, 당시에는 IPTV STB만을 Hub로 삼은 한 폐쇄형 플랫폼 전략을 선택지 중의 하나로 보고, 그를 위한 포석으로써 STB 전략에 접근 한 결과물입니다.\nIPTV STB가 추후 Smart Home의 Hub로 활용될 가능성을 상정하고, 'STB의 개선'이 아닌 '매력도 높은 Device의 STB화'를 목표하였습니다. '먼지 쌓인 채 방치된 검은 박스'를 구매욕을 자극하는 하나의 'Smart Device'로 재포지셔닝 한다는 것이 제안의 핵심입니다.\n당시 제안한 3가지 컨셉 STB중 메인 제안인 'Audio형 STB'는 LGU+ 'tvG 우퍼'와 동일한\nScheme으로, 현재 LGU+에서 출시되어 인기리에 판매 중에 있습니다.\n자료 작성과 발표를 맡은 저의 Smart home에 대한 관심과 관점을 참고하실 수 있도록 첨부하였습니다.\n본 자료는, 올해 초 서부마케팅본부 본부 유선담당 업무를 담당하며 작성한 자료입니다.\n현장 마케터 및 유통망을 대상으로 유선상품, 그 중에서도 IPTV를 판매해야 하는 당위성을 거시적인 관점에서 설명하기 위해 작성한 자료입니다.\n\"나무보다 숲을 보라\"는 말이 있습니다. 하지만, 숲에는 방향이 담겨 있고, 나무에는 현상에 대한 디테일이 있습니다. 우리가 하는 일은, 숲과 나무를 번갈아 조망할 수 있는 시각이 중요하다고 생각합니다. 현장에 근무하면서도 지속적으로 스마트홈 사업에 대해 저의 지속적 관심과 관점에 대한 참고자료가 될 것으로 판단되어 첨부하였습니다.\n현장근무 후에 본사에 올라간 선배들을 몇 해 동안 보면,\n당연한 것이기도 하지만 희망하는 자리로만 가는 것은 아니더라구요.\n회사원인지라 조직에서 쓰는 대로 쓰여지는 것이 맞는 것인지도 모르겠습니다만,\n이왕이면 원하고 또 잘 할 수 있는(혹은 그렇게 믿는) job에 대한 욕심이 있습니다.\n요구 역량\n상품기획 2팀 TASK\n실제로 저는 내년부터 가장 문제가 되는 부분이 상품본부에 마케팅 전문가가 없는 것일 거라고 생각하고\n내년에 만들어서 팔려고 보고, IT적인 어프로치가 필요한데..\n그냥 기존 마전이나 영업 조직에 맡기기엔 그들이 IT 시장상황 그리고 그에 걸맞는 \"마케팅\" skill과 프로세스를 갖추었다고 보기 어렵습니다.\n이건 능력의 문제가 아니라 개인/조직의 습관/관성의 문제거든요.&#160;\n&#160;\n마지막으로,&#160;현재 당사가 처한 위기상황을 이해하고, 상품 관점에서 나름의 방식을 고민해 보기길 권합니다.\n상품이 중요하다는 건 누구가 인정하는 바이지만, 마케팅 중심인 당사에서 현재 어떤 가치/수준를&#160;가지고 있고\n향후 생존과&#160;성장을 위해 어떤 가치/수준을 \"추구\"해야 하는지에 대한 철학같은게 있으면..\n언젠가 기회가 되서 '본부장'님 등 책임자와&#160;comm.&#160;기회가 왔을때 그 기회를 잘 활용할수 있을 것입니다.\n중이 절이 싫으면 절을 이적하면 되고,\n전쟁에서 이길 수 없다면 전장을 바꾸면 된다.\n늘 그래왔듯, 내 클래스는 세상이 정해주겠지만,\n적어도 내 리그는 내가 정한다.\n1. PDF 사내 공모\n&#160;\n&#160;&#160;&#160;가. 시행 배경\n&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;- 다양한 Killer Service 발굴을 통해 Service Platform을 창출/확산하기 위하여\n&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;상품 기획 역량이 뛰어나고, Venture Spirit 이 우수한 구성원의 역량 필요\n&#160;\n&#160;&#160;&#160;나. 주요 수행 업무\n&#160;&#160;&#160;&#160;&#160;1) PIC\n&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;- 다양한 방법을 통해 아이디어를 수집하여 Hit할 수 있는 상품 concept을 도출하고\n&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;PDF 심의위원회에 신규 상품을 제안(시장 경쟁 분석, BM화 검토,차별화/경쟁력 확보 방안 등)\n&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;- 심의위원회에서 승인된 상품에 대하여 Project Owner 또는 Project Fellower가 되어\n&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;상세 서비스 기획을 수행(상세 시나리오 작성 및 서비스 품질 기준 정립)\n&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;- 상품 출시 전/후 마케팅 및 운영: 출시 전/후 상품홍보 및 마케팅 계획 수립/실행 및 일정기간 서비스 운영&#160;&#160;&#160;&#160;&#160;&#160;&#160;\n&#160;&#160;&#160;&#160;\n&#160;&#160;&#160;&#160;&#160;&#160;2) PDC\n&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;- &#160;PIC에서 상품기획담당자가 도출한 상품 Ideation에 대하여 기술 Feasibility 및 투입 Resource 검토\n&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;- 상품 상세 기획 단계에 기술/UI 지원: 개발계획 수립 및 사내외 협력체계 확보\n&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;- 개발 Project 관리 (디자인 및 기술 구현, 품질 관리 및 시스템 운영계획 수립)\n&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;- 검증 및 상품/서비스 출시\n&#160;\n&#160;&#160;&#160;다. 공모 내용\n&#160;&#160;&#160;&#160;&#160;&#160;1) 모집인원 : 8명 (PIC 6명, PDC 2명)\n&#160;&#160;&#160;&#160;&#160;&#160;2) 자격요건 (세부 요건은 System 참조)\n&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;○ PIC(Product Innovation Center)\n&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;- 상품/서비스 기획/발굴하는 역량이 있고 열정이 있는 구성원\n&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;- Venture Spirit(Enterpreneurship) 보유한 구성원\n&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;- 스마트폰 및 플랫폼 관련 서비스 관련 분야 Insight 보유자\n&#160;\n&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;○ PDC(Product Delivery Center)\n&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;- Service Platform 및 Infra 관련 Project Management 역량을 보유한 구성원\n&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;- 단말 Application/Platform에 대한 기술적인 이해도가 높은 구성원\n&#160;&#160;&#160;\n&#160;\n2. 지원 방법\n&#160;&#160;&#160;&#160;&#160;&#160;&#160;○ 'Click e-HR > 평가/이동>&#160;이동/사내공모 > 공모 게시판 조회/신청'을 통해 지원\n&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;※ PIC 지원자는 상품제안서 작성 및 이를 기반으로 선발/검토 (상품 제안서는 첨부 참조)\n&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;PIC 지원자는 상품 제안서를 작성하여 인력팀 이지은 Manager에게 사내 메일로 제출 요망\n&#160;\n&#160;&#160;&#160;&#160;&#160;&#160;&#160;○ 지원 기간 : '10년 10월 27일(水) ~ 11월 8일(月)\n&#160;\n&#160;&#160;&#160;&#160;&#160;&#160;&#160;○ 지원자에 대한 선발은 전사 Resource 관리 방향을 기반으로 Corporate HR과 PDF 간 협의 진행.\n&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;※ 금번 PIC/PDC 로의 사내공모로 충원시, 정기 이동 기간중 &#160;PIC/PDC 의 추가적인 충원은 제한될 수 있음. &#160;끝.\n&#160;\n3. 문의처 : 인력팀 이지은 Manager (6100-3238).끝.\n&#160;바. 선발 Process\n&#160;&#160;&#160;&#160; 1) 자격 요건 (역량 적합성, 이동유자격) 보유 검토 (HR실과 사내공모 요청부서)\n&#160;&#160;&#160;&#160; 2) 이동 대상 구성원 선정 (사내공모 요청 부서)\n&#160;&#160;&#160;&#160;&#160;3) 해당 구성원/조직에 대한 이동 안내 (HR실)\n&#160;&#160;&#160;&#160; 4) 이동 발령 (HR 실)\n상품기획본부는 LTE로의 N/W진화에 따른 Data 중심 Biz Transformation 전략을 반영하여,\nMNO 상품/서비스 기획 및 개발을 중점적으로 수행하는 것을 목표로 2012년 1월 출범.\n지난 상반기에 Comm.상품, Smart N/W 상품, 제휴상품, Home 상품 등 4개 상품화 기회영역을\n정의하고, 해당 영역별 ideation을 통해 상품 portfolio를 구성하였습니다.\n최근 이슈인 RCS, HD Voice 등 Comm. 상품 개발부터 Smart N/W Mgmt. 기술의 상품화,\n다양한 게임제휴상품 출시 등을 추진해옴\n카톡등의 OTT서비스가 흉내낼 수 없는 상품력 강화 및 활성화.\n폰 주소록에 상대방의 실시간 상태 정보가 표시되고, SMS를 포함하여 1:1 또는 그룹 간 실시간\n채팅과 파일전송 등이 가능\n\n실시간 상태 피드백\n위치 정보 공유\nDual Comm.(통화 중 컨텐츠 공유)\nUniversal Standard(단말, 통신사, 유/무선, 지역 구애 없음)\n\n각 요소별 결합을 통한 시너지와 밸류 창출\n컨퍼런스 콜, 실시간 강좌 강의\n[상품기획]\n소비자의 요구에 맞는 상품을 가장 좋은 품질로 가장 싸게 만들게 하는 것으로\n경쟁사 등에서 쉽게 따라오지 못하도록 차별적 우위를 확보하도록 해야함.\n이러한 저의 경험은 아래와 같은 측면에서 활용될 수 있습니다.\nㅇ 스마트홈 서비스 사용상황 및 Usage 홍보\nㅇ 스마트홈 서비스 고객체험 접점 확보\nㅇ 스마트홈 서비스 Sales/홍보 기법 코칭\n#첨부파일 설명"
  }
];
const CONTENT_HASH = 'ae5ed176';

let cards = [];
let moving = null, resizing = null;
let selectedIdx = null, clipboardCard = null;
const GRID = 20, GAP = 14;
function snap(v) { return Math.round(v / GRID) * GRID; }

// ── Undo (Ctrl+Z) ────────────────────────────────────────────────────────────
const MAX_HISTORY = 50;
let history = [];
function snapshot() {
  syncText();
  history.push(JSON.stringify(cards));
  if (history.length > MAX_HISTORY) history.shift();
}
function undo() {
  if (!history.length) { showStatus('되돌릴 내용 없음'); return; }
  syncText();
  cards = JSON.parse(history.pop());
  renderCards();
  saveBoard();
  showStatus('↩ 되돌림');
}
function showStatus(msg) {
  const s = document.getElementById('status');
  s.textContent = msg;
  clearTimeout(showStatus._t);
  showStatus._t = setTimeout(() => { s.textContent = ''; }, 2000);
}
document.addEventListener('keydown', e => {
  const isText = document.activeElement?.contentEditable === 'true';
  if ((e.ctrlKey || e.metaKey) && e.key === 'z' && !e.shiftKey) {
    if (isText) return;
    e.preventDefault();
    undo();
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'c' && !e.shiftKey && !isText) {
    if (selectedIdx !== null && cards[selectedIdx]) {
      syncText();
      clipboardCard = JSON.parse(JSON.stringify(cards[selectedIdx]));
      showStatus('카드 복사됨');
      e.preventDefault();
    }
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'v' && !e.shiftKey && !isText) {
    if (clipboardCard) {
      e.preventDefault();
      snapshot();
      const nc = JSON.parse(JSON.stringify(clipboardCard));
      nc.x = (nc.x || 0) + 30; nc.y = (nc.y || 0) + 30;
      cards.push(nc);
      selectedIdx = cards.length - 1;
      renderCards(); saveBoard();
      showStatus('카드 붙여넣음');
    }
  }
  if (e.key === 'Escape') {
    document.querySelectorAll('.card.selected').forEach(c => c.classList.remove('selected'));
    selectedIdx = null;
  }
});

function pushCards(movedIdx) {
  const moved = cards[movedIdx];
  const movedEl = document.querySelector(`.card[data-idx="${movedIdx}"]`);
  if (!movedEl) return;
  const mh = movedEl.offsetHeight;
  document.querySelectorAll('.card').forEach(el => {
    const i = +el.dataset.idx;
    if (i === movedIdx) return;
    const c = cards[i], oh = el.offsetHeight;
    if (moved.x < (c.x+(c.w||200)) && (moved.x+(moved.w||200)) > c.x && moved.y < (c.y+oh) && (moved.y+mh) > c.y) {
      c.y = moved.y + mh + GAP;
      el.style.top = c.y + 'px';
    }
  });
}

function loadBoard() {
  const saved = localStorage.getItem(SAVE_KEY);
  const savedHash = localStorage.getItem(SAVE_KEY + ':hash');
  let parsed = null;
  try { parsed = saved ? JSON.parse(saved) : null; } catch(e) {}
  // reset if: no save, empty array, or content hash changed (page regenerated)
  if (!parsed || parsed.length === 0 || savedHash !== CONTENT_HASH) {
    cards = DEFAULT_CARDS.map(c => ({...c}));
    localStorage.removeItem(SAVE_KEY);
    localStorage.setItem(SAVE_KEY + ':hash', CONTENT_HASH);
    renderCards();
    const hasCoords = cards.some(c => c.x !== undefined && c.y !== undefined);
    if (!hasCoords) autoLayout();
    return;
  }
  cards = parsed;
  renderCards();
}
function resetToDefaults() { if (!confirm('저장된 보드를 지우고 원본으로 초기화합니다. 계속할까요?')) return; localStorage.removeItem(SAVE_KEY); cards = DEFAULT_CARDS.map(c => ({...c})); renderCards(); autoLayout(); }

function autoLayout() {
  const boardW = document.getElementById('board').offsetWidth;
  const cols = Math.max(1, Math.floor(boardW / 280));
  const colW = (boardW - GAP*(cols-1)) / cols;
  const colH = new Array(cols).fill(0);
  const allCards = document.querySelectorAll('.card');
  const images = document.querySelectorAll('.card img');
  let loaded = 0;
  function place() {
    allCards.forEach((el, i) => {
      const w = Math.min(cards[i].w || colW, colW);
      let minCol = 0;
      for (let c = 1; c < cols; c++) if (colH[c] < colH[minCol]) minCol = c;
      cards[i].x = minCol * (colW + GAP);
      cards[i].y = colH[minCol];
      cards[i].w = w;
      el.style.left = cards[i].x + 'px';
      el.style.top = cards[i].y + 'px';
      el.style.width = w + 'px';
      colH[minCol] = cards[i].y + el.offsetHeight + GAP;
    });
    document.getElementById('board').style.minHeight = (Math.max(...colH) + 100) + 'px';
    saveBoard();
  }
  if (!images.length) { requestAnimationFrame(place); return; }
  images.forEach(img => {
    if (img.complete) { loaded++; if (loaded >= images.length) requestAnimationFrame(place); }
    else { img.onload = img.onerror = () => { loaded++; if (loaded >= images.length) requestAnimationFrame(place); }; }
  });
}

function syncText() {
  document.querySelectorAll('.card').forEach(el => {
    const i = +el.dataset.idx;
    if (cards[i]?.type === 'text') { const t = el.querySelector('.text'); if (t) cards[i].content = t.innerHTML; }
  });
}
function saveBoard() { syncText(); localStorage.setItem(SAVE_KEY, JSON.stringify(cards)); localStorage.setItem(SAVE_KEY + ':hash', CONTENT_HASH); showStatus('저장됨 ' + new Date().toLocaleTimeString()); }

function renderCards() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  cards.forEach((card, i) => {
    const el = document.createElement('div');
    el.className = 'card'; el.dataset.idx = i;
    if (card.x !== undefined) el.style.left = card.x + 'px';
    if (card.y !== undefined) el.style.top = card.y + 'px';
    // html cards contain raw OneNote table HTML which may overflow the stated div width
    if (card.w) { if (card.type === 'html') el.style.minWidth = card.w + 'px'; else el.style.width = card.w + 'px'; }
    el.addEventListener('mousedown', e => {
      if (e.target.closest('.text, a, .card-btn, .resize-handle, td, th')) return;
      e.preventDefault();
      // Update selection
      document.querySelectorAll('.card.selected').forEach(c => c.classList.remove('selected'));
      selectedIdx = i; el.classList.add('selected');
      snapshot();
      moving = { idx: i, startX: e.clientX, startY: e.clientY, origX: card.x||0, origY: card.y||0 };
      el.classList.add('moving');
    });
    const actions = document.createElement('div'); actions.className = 'card-actions';
    const delBtn = document.createElement('button'); delBtn.className = 'card-btn'; delBtn.textContent = '×';
    delBtn.onclick = e => { e.stopPropagation(); if(confirm('삭제?')) { snapshot(); cards.splice(i,1); renderCards(); saveBoard(); } };
    actions.appendChild(delBtn); el.appendChild(actions);
    if (card.type === 'text') {
      const text = document.createElement('div'); text.className = 'text'; text.contentEditable = true;
      text.innerHTML = card.content || '';
      text.addEventListener('focus', () => { snapshot(); });
      text.addEventListener('blur', () => { card.content = text.innerHTML; saveBoard(); });
      el.appendChild(text);
    } else if (card.type === 'image') {
      const img = document.createElement('img');
      img.src = card.src.startsWith('http') || card.src.startsWith('data:') ? card.src : IMG_BASE + card.src;
      img.alt = ''; img.loading = 'lazy'; img.onerror = () => img.style.display = 'none';
      if (card.w) img.style.width = card.w + 'px';
      if (card.h) img.style.height = card.h + 'px';
      if (card.link) { const a = document.createElement('a'); a.href = card.link; a.target = '_blank'; a.appendChild(img); el.appendChild(a); }
      else { el.appendChild(img); }
      if (card.caption) { const cap = document.createElement('div'); cap.style.cssText = 'font-size:11px;color:#8b949e;margin-top:4px;word-break:break-word;padding:0 2px;'; cap.textContent = card.caption; el.appendChild(cap); }
    } else if (card.type === 'html') {
      const wrapper = document.createElement('div');
      wrapper.style.cssText = 'overflow:auto;font-size:13px;line-height:1.5;';
      wrapper.innerHTML = card.html.replace(/__ATTACHMENT__/g, IMG_BASE);
      wrapper.querySelectorAll('img').forEach(img => { img.style.maxWidth = '100%'; img.style.height = 'auto'; img.draggable = false; });
      wrapper.querySelectorAll('a').forEach(a => { a.target = '_blank'; a.style.color = '#6cb0f6'; });
      wrapper.querySelectorAll('table').forEach(t => { t.style.borderCollapse = 'collapse'; });
      wrapper.querySelectorAll('td,th').forEach(td => {
        td.style.border = '1px solid #444'; td.style.padding = '4px 6px'; td.style.verticalAlign = 'top';
        td.title = '더블클릭으로 편집';
        td.addEventListener('dblclick', function(e) {
          e.stopPropagation();
          snapshot();
          this.contentEditable = 'true';
          this.style.outline = '2px solid #388bfd';
          this.style.background = 'rgba(56,139,253,0.08)';
          this.focus();
        });
        td.addEventListener('blur', function() {
          this.contentEditable = 'false';
          this.style.outline = '';
          this.style.background = '';
          cards[i].html = wrapper.innerHTML.split(IMG_BASE).join('__ATTACHMENT__');
          saveBoard();
        });
      });
      el.appendChild(wrapper);
    } else if (card.type === 'table') {
      const rows = card.rows || [['','',''],['','',''],['','','']];
      const tbl = document.createElement('table');
      tbl.style.cssText = 'border-collapse:collapse;width:100%;font-size:13px;';
      rows.forEach((row, ri) => {
        const tr = tbl.insertRow();
        row.forEach((cell, ci) => {
          const td = document.createElement(ri === 0 ? 'th' : 'td');
          td.contentEditable = true;
          td.style.cssText = 'border:1px solid #30363d;padding:4px 8px;min-width:60px;text-align:left;' + (ri===0 ? 'background:#21262d;font-weight:600;' : '');
          td.textContent = cell;
          td.addEventListener('blur', () => { if (!cards[i].rows) cards[i].rows = rows; rows[ri][ci] = td.textContent; saveBoard(); });
          tr.appendChild(td);
        });
      });
      el.appendChild(tbl);
      const addRow = document.createElement('button');
      addRow.textContent = '+ 행'; addRow.style.cssText = 'margin-top:4px;font-size:11px;background:#21262d;border:1px solid #30363d;color:#8b949e;padding:2px 8px;border-radius:4px;cursor:pointer;';
      addRow.onclick = e => { e.stopPropagation(); snapshot(); if (!cards[i].rows) cards[i].rows = rows; cards[i].rows.push(new Array(cards[i].rows[0].length).fill('')); renderCards(); saveBoard(); };
      const addCol = document.createElement('button');
      addCol.textContent = '+ 열'; addCol.style.cssText = 'margin-top:4px;margin-left:4px;font-size:11px;background:#21262d;border:1px solid #30363d;color:#8b949e;padding:2px 8px;border-radius:4px;cursor:pointer;';
      addCol.onclick = e => { e.stopPropagation(); snapshot(); if (!cards[i].rows) cards[i].rows = rows; cards[i].rows.forEach(r => r.push('')); renderCards(); saveBoard(); };
      el.appendChild(addRow); el.appendChild(addCol);
    }
    const rh = document.createElement('div'); rh.className = 'resize-handle';
    rh.addEventListener('mousedown', e => { e.preventDefault(); e.stopPropagation(); snapshot(); resizing = { idx: i, startX: e.clientX, startW: card.w || el.offsetWidth }; });
    el.appendChild(rh);
    if (i === selectedIdx) el.classList.add('selected');
    board.appendChild(el);
  });
  requestAnimationFrame(() => {
    let maxB = 0;
    document.querySelectorAll('.card').forEach(el => { const b = (parseFloat(el.style.top)||0) + el.offsetHeight; if (b > maxB) maxB = b; });
    board.style.minHeight = (maxB + 100) + 'px';
  });
}

document.addEventListener('mousemove', e => {
  if (moving) {
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`); if (!el) return;
    let nx = moving.origX + e.clientX - moving.startX, ny = moving.origY + e.clientY - moving.startY;
    if (e.shiftKey) { nx = snap(nx); ny = snap(ny); el.style.outline = '1px dashed rgba(240,192,64,0.3)'; } else { el.style.outline = ''; }
    el.style.left = nx + 'px'; el.style.top = ny + 'px';
  }
  if (resizing) {
    let nw = resizing.startW + e.clientX - resizing.startX; if (e.shiftKey) nw = snap(nw);
    cards[resizing.idx].w = Math.max(100, nw);
    const el = document.querySelector(`.card[data-idx="${resizing.idx}"]`); if (el) el.style.width = cards[resizing.idx].w + 'px';
  }
});

document.addEventListener('mouseup', e => {
  if (moving) {
    let nx = moving.origX + e.clientX - moving.startX, ny = moving.origY + e.clientY - moving.startY;
    if (e.shiftKey) { nx = snap(nx); ny = snap(ny); }
    cards[moving.idx].x = Math.max(0, nx); cards[moving.idx].y = Math.max(0, ny);
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`); if (el) { el.classList.remove('moving'); el.style.outline = ''; }
    if (e.shiftKey) pushCards(moving.idx);
    moving = null; saveBoard();
  }
  if (resizing) { if (e.shiftKey) pushCards(resizing.idx); resizing = null; saveBoard(); }
});

function addTextCard() { snapshot(); cards.push({ type: 'text', content: '', x: 50, y: window.scrollY+100, w: 300 }); renderCards(); setTimeout(() => { const els = document.querySelectorAll('.card .text'); els[els.length-1]?.focus(); }, 100); }
function addImageCard() { const input = document.createElement('input'); input.type = 'file'; input.accept = 'image/*'; input.onchange = e => { const f = e.target.files[0]; if (!f) return; const r = new FileReader(); r.onload = () => { snapshot(); cards.push({ type: 'image', src: r.result, x: 50, y: window.scrollY+100, w: 240 }); renderCards(); saveBoard(); }; r.readAsDataURL(f); }; input.click(); }
function addImageUrl() { const url = prompt('이미지 URL'); if (!url) return; snapshot(); cards.push({ type: 'image', src: url, x: 50, y: window.scrollY+100, w: 240 }); renderCards(); saveBoard(); }
function addTableCard() {
  const colsStr = prompt('열 수 (기본 3)', '3'); const cols = Math.max(1, parseInt(colsStr)||3);
  const rowsStr = prompt('행 수 (헤더 포함, 기본 4)', '4'); const rows = Math.max(1, parseInt(rowsStr)||4);
  snapshot();
  cards.push({ type: 'table', rows: Array.from({length: rows}, (_, ri) => Array.from({length: cols}, (_, ci) => ri===0 ? `열${ci+1}` : '')), x: 50, y: window.scrollY+100, w: Math.max(240, cols*100) });
  renderCards(); saveBoard();
}
function exportBoard() { syncText(); const blob = new Blob([JSON.stringify(cards, null, 2)], { type: 'application/json' }); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = SAVE_KEY + '.json'; a.click(); }
// ── Zoom ─────────────────────────────────────────────────────────────────────
let zoom = parseFloat(localStorage.getItem('zoom-' + SAVE_KEY) || '1.0');
function applyZoom() {
  const board = document.getElementById('board');
  board.style.transform = `scale(${zoom})`;
  board.style.transformOrigin = '0 0';
  document.getElementById('zoom-level').textContent = Math.round(zoom * 100) + '%';
  localStorage.setItem('zoom-' + SAVE_KEY, zoom);
}
function zoomIn()  { zoom = Math.min(3.0, parseFloat((zoom + 0.1).toFixed(2))); applyZoom(); }
function zoomOut() { zoom = Math.max(0.2, parseFloat((zoom - 0.1).toFixed(2))); applyZoom(); }
document.addEventListener('keydown', e => {
  if (e.ctrlKey || e.metaKey) {
    if (e.key === '=' || e.key === '+') { e.preventDefault(); zoomIn(); }
    if (e.key === '-')                  { e.preventDefault(); zoomOut(); }
    if (e.key === '0')                  { e.preventDefault(); zoom = 1.0; applyZoom(); }
  }
});
document.getElementById('board').addEventListener('wheel', e => {
  if (!(e.ctrlKey || e.metaKey)) return;
  e.preventDefault();
  e.deltaY < 0 ? zoomIn() : zoomOut();
}, { passive: false });
applyZoom();
function resetLayout() { if (!confirm('자동 재배치합니다.')) return; cards.forEach(c => { delete c.x; delete c.y; }); renderCards(); autoLayout(); }
// ── Floating format toolbar ───────────────────────────────────────────────────
const fmtBar = document.getElementById('format-toolbar');
function fmt(cmd) { document.execCommand(cmd, false, null); saveBoard(); }
function fmtLink() {
  const sel = window.getSelection();
  if (!sel || sel.isCollapsed) return;
  const url = prompt('링크 URL 입력', 'https://');
  if (!url) return;
  document.execCommand('createLink', false, url);
  // make links open in new tab
  sel.anchorNode?.parentElement?.closest('a')?.setAttribute('target', '_blank');
  document.querySelectorAll('.text a').forEach(a => a.target = '_blank');
  saveBoard();
}

// prevent format buttons from blurring contenteditable
fmtBar.addEventListener('mousedown', e => e.preventDefault());

document.addEventListener('selectionchange', () => {
  const sel = window.getSelection();
  if (!sel || sel.isCollapsed || !sel.toString().trim()) { fmtBar.style.display = 'none'; return; }
  // only show if selection is inside a .text element
  const anchor = sel.anchorNode;
  if (!anchor) { fmtBar.style.display = 'none'; return; }
  const textEl = anchor.nodeType === 1 ? anchor.closest('.text') : anchor.parentElement?.closest('.text');
  if (!textEl) { fmtBar.style.display = 'none'; return; }
  // position above selection
  const range = sel.getRangeAt(0);
  const rect = range.getBoundingClientRect();
  fmtBar.style.display = 'flex';
  const tbW = fmtBar.offsetWidth || 180;
  let left = rect.left + rect.width / 2 - tbW / 2;
  left = Math.max(8, Math.min(left, window.innerWidth - tbW - 8));
  fmtBar.style.left = left + 'px';
  fmtBar.style.top = (rect.top - 44 + window.scrollY) + 'px';
});

setInterval(saveBoard, 30000);
loadBoard();
</script>
</body>
</html>
