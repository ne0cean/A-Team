<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CFA</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1e1e1e; color: #e0e0e0; font-family: 'Segoe UI', -apple-system, sans-serif; font-size: 15px; line-height: 1.6; padding: 20px 30px 60px; overflow-x: hidden; }
a { color: #6cb0f6; text-decoration: none; }
a:hover { text-decoration: underline; }
.title-bar { background: #3a3a5c; display: inline-block; padding: 6px 16px; font-size: 22px; font-weight: bold; color: #fff; margin-bottom: 4px; }
.date { color: #999; font-size: 13px; margin-bottom: 20px; }
.board { position: relative; }
.card { background: #2a2a2a; border: 1px solid #3a3a3a; border-radius: 8px; padding: 12px; position: absolute; cursor: grab; transition: box-shadow 0.15s; overflow: hidden; }
.card:hover { box-shadow: 0 0 0 1px #58a6ff; z-index: 10; }
.card.moving { opacity: 0.8; box-shadow: 0 4px 24px rgba(0,0,0,0.6); z-index: 100; cursor: grabbing; }
.card img { width: 100%; border-radius: 4px; display: block; }
.card .text { outline: none; min-height: 20px; white-space: pre-wrap; word-break: break-word; }
.card .text:focus { background: rgba(255,255,255,0.05); border-radius: 4px; padding: 4px; }
.card .text:empty::before { content: '텍스트 입력...'; color: #555; }
.card-actions { position: absolute; top: 4px; right: 4px; display: none; gap: 4px; }
.card:hover .card-actions { display: flex; }
.card-btn { background: #333; border: 1px solid #555; color: #ccc; border-radius: 4px; padding: 2px 6px; font-size: 11px; cursor: pointer; }
.card-btn:hover { background: #444; color: #fff; }
.resize-handle { position: absolute; bottom: 0; right: 0; width: 16px; height: 16px; cursor: se-resize; opacity: 0; }
.card:hover .resize-handle { opacity: 0.6; }
.resize-handle::after { content: ''; position: absolute; bottom: 3px; right: 3px; width: 8px; height: 8px; border-right: 2px solid #666; border-bottom: 2px solid #666; }
.card.selected { box-shadow: 0 0 0 2px #58a6ff; z-index: 5; }
.highlight-red { color: #ff6b6b; }
.highlight-blue { color: #6cb0f6; }
.highlight-gold { color: #f0c040; }
.toolbar { position: fixed; bottom: 0; left: 0; right: 0; background: #161b22; border-top: 1px solid #30363d; padding: 8px 20px; display: flex; gap: 12px; align-items: center; z-index: 200; }
.toolbar button { background: #21262d; border: 1px solid #30363d; color: #e0e0e0; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; }
.toolbar button:hover { background: #30363d; }
.toolbar .status { color: #8b949e; font-size: 12px; margin-left: auto; }
#format-toolbar { position: fixed; display: none; background: #1c2128; border: 1px solid #444c56; border-radius: 8px; padding: 4px 6px; gap: 2px; align-items: center; z-index: 500; box-shadow: 0 4px 16px rgba(0,0,0,0.5); }
#format-toolbar button { background: none; border: none; color: #cdd9e5; padding: 4px 8px; border-radius: 5px; cursor: pointer; font-size: 13px; line-height: 1; }
#format-toolbar button:hover { background: #373e47; }
#format-toolbar .sep { width: 1px; height: 16px; background: #444c56; margin: 0 2px; }
</style>
</head>
<body>
<div class="title-bar" contenteditable="true">CFA</div>
<div class="date">2019년 1월 6일 일요일</div>
<div class="board" id="board"></div>
<div id="format-toolbar">
  <button onmousedown="e=>e.preventDefault()" onclick="fmt('bold')" title="굵게"><b>B</b></button>
  <button onclick="fmt('italic')" title="기울임"><i>I</i></button>
  <button onclick="fmt('underline')" title="밑줄"><u>U</u></button>
  <div class="sep"></div>
  <button onclick="fmtLink()" title="링크 삽입">🔗</button>
  <button onclick="fmt('unlink')" title="링크 제거">✂</button>
</div>
<div class="toolbar">
  <button onclick="undo()" title="Ctrl+Z">↩ 실행취소</button>
  <button onclick="addTextCard()">+ 텍스트</button>
  <button onclick="addImageCard()">+ 이미지</button>
  <button onclick="addImageUrl()">+ 이미지 URL</button>
  <button onclick="addTableCard()">+ 표</button>
  <button onclick="saveBoard()">💾 저장</button>
  <button onclick="exportBoard()">📤 내보내기</button>
  <button onclick="resetLayout()">↺ 재배치</button>
  <button onclick="resetToDefaults()" style="color:#f85149">↺ 초기화</button>
  <div style="display:flex;align-items:center;gap:4px;margin-left:8px;border-left:1px solid #30363d;padding-left:12px;">
    <button onclick="zoomOut()" title="Ctrl+-" style="padding:6px 10px;">−</button>
    <span id="zoom-level" style="font-size:12px;color:#8b949e;min-width:36px;text-align:center;">100%</span>
    <button onclick="zoomIn()" title="Ctrl+=" style="padding:6px 10px;">+</button>
  </div>
  <span class="status" id="status">Ready</span>
</div>
<script>
const SAVE_KEY = 'board-CFA';
const IMG_BASE = '../../attachments/';
const DEFAULT_CARDS = [
  {
    "type": "html",
    "x": 48,
    "y": 115,
    "w": 715,
    "html": "\r\n\t\t\t<ul>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">ㅇ<span lang=\"en-US\"> </span>Chartered Financial Analyst<span lang=\"en-US\"> </span><a href=\"https://www.cfainstitute.org/\">국제 공인 재무분석사</a></p>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">ㅇ<span lang=\"en-US\"> </span><a href=\"https://namu.wiki/w/FRM\" style=\"font-size:10.5pt;background-color:white\">FRM</a>&#160;(국제FRM),&#160;<a href=\"https://namu.wiki/w/CMA\" style=\"font-size:10.5pt;background-color:white\">CMA</a>, AICPA 등과 함께&#160;<span style=\"font-size:10.5pt;color:#373a3c;background-color:white;font-weight:bold\">국가 공인 민간 자격증</span></p>\r\n\t\t\t\t<ul>\r\n\t\t\t\t\t<li style=\"font-size:10pt\">대한민국 자본시장법에 따라 적격투자자로 인정받으며, 각종 투자 한도가 확장되고 투자실적 기준 등이 완화된다. 크라우딩 펀드성공 기업들은 KSM 전매제한이 사라지는 혜택</li>\r\n\t\t\t\t\t<li style=\"font-size:10pt\">명함의 이름 옆에 CFA라고 쓸 수 있다<span lang=\"en-US\">.</span></li>\r\n\t\t\t\t</ul>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">ㅇ<span lang=\"en-US\"> </span>3개의 Level로<span lang=\"en-US\"> </span>이루어진<span lang=\"en-US\"> </span>시험<span lang=\"en-US\"> </span>통과<span lang=\"en-US\"> + 48</span>개월의<span lang=\"en-US\"> </span>실무경력<span lang=\"en-US\"> </span>필요</p>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">ㅇ<span lang=\"en-US\"> </span>경력이 쌓인 이후에 다른 CFA Charterholder 2인의 추천을 받아야 정식으로 자격증을 획득할 수 있다. ￼<span lang=\"en-US\">    </span>다만 회사의 보증 하에 자신의 직장 상사의 추천을 받아도 무방</p>\r\n\t\t\t\t<ul>\r\n\t\t\t\t\t<li style=\"font-size:10pt\"><span lang=\"en-US\">Le<span lang=\"ko-KR\">vel 1 의 경우는 매년 6월 첫번째주 토요일, 매년 12월 첫번째주 토요일 두 번</span></span></li>\r\n\t\t\t\t\t<li style=\"font-size:10pt\">최단 기간<span lang=\"en-US\"> </span>1년 6개월 소요 (1차 시험은 12월, 2차는 다음 해 6월, 3차는 그 다음 해 6월)</li>\r\n\t\t\t\t</ul>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">ㅇ<span lang=\"en-US\"> </span>응시<span lang=\"en-US\"> </span>비용<span lang=\"en-US\"> : </span>최소 750만원 , 인강 100만+ 응시료 150만 3회</p>\r\n\t\t\t\t<ul>\r\n\t\t\t\t\t<li style=\"font-size:10pt\">오전 9시부터 12시까지가 오전 시간</li>\r\n\t\t\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">(<span lang=\"ko-KR\">2시간의 점심 시간</span>)<span lang=\"ko-KR\"> </span></p>\r\n\t\t\t\t\t<li style=\"font-size:10pt\">오후 2시부터 5시까지가 오후 시간</li>\r\n\t\t\t\t</ul>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">ㅇ<span lang=\"en-US\"> Level</span>별<span lang=\"en-US\"> </span>유형</p>\r\n\t\t\t\t<ul>\r\n\t\t\t\t\t<li style=\"font-size:10pt\">삼지선다 객관식</li>\r\n\t\t\t\t\t<li style=\"font-size:10pt\"><span lang=\"en-US\">Le<span lang=\"ko-KR\">vel 1은 오전, 오후 모두 120문제</span></span></li>\r\n\t\t\t\t\t<li style=\"font-size:10pt\"><span lang=\"en-US\">Le<span lang=\"ko-KR\">vel 2는 오전, 오후 모두 60문제</span></span></li>\r\n\t\t\t\t\t<li style=\"font-size:10pt\"><span lang=\"en-US\">Le<span lang=\"ko-KR\">vel 2는 Level 1과 범위는 거의 같지만, 난이도가 갑자기 급상승</span></span></li>\r\n\t\t\t\t</ul>\r\n\t\t\t\t<ul>\r\n\t\t\t\t\t<li style=\"font-size:10pt\">오전 시간&#160;주관식 서술형<span lang=\"en-US\"> </span>Essay&#160;타입</li>\r\n\t\t\t\t\t<li style=\"font-size:10pt\">오후 시간은 삼지선다 객관식 60문제</li>\r\n\t\t\t\t\t<li style=\"font-size:10pt\">Level 3 커리큘럼의 가장 큰 기본인 IPS (Investment Policy Statement)의 작성법만 제대로 숙지하면 Level 2 보다는 수월</li>\r\n\t\t\t\t</ul>\r\n\t\t\t\t<ul>\r\n\t\t\t\t\t<li style=\"font-size:10pt\">상위 1%에 해당하는 응시자의 평균 점수의 70%가 그 시험의 커트라인</li>\r\n\t\t\t\t\t<li style=\"font-size:10pt\">시험의 난이도와 상관없이 70점만 넘으면 합격</li>\r\n\t\t\t\t</ul>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:15pt;font-weight:bold\">Level 1</span>은 Financial Market과 투자 상품에 대한 기본 지식을 습득하는 것이 목표이다.</p>\r\n\t\t\t\t<li style=\"font-size:10pt\"><span style=\"font-size:10.5pt;color:#373a3c;background-color:white;font-weight:bold\">Ethical and Professional Standards</span><span style=\"font-size:10.5pt;color:#373a3c;background-color:white\">&#160;: CFA Charterholder </span><span style=\"font-size:10.5pt;color:#373a3c;background-color:white\">및 시험 응시생이 지켜야 할 윤리 규정. 그러나 사실 업계의 복잡한 사정이 얽혀 윤리규정 자체가 귀에 걸면 귀걸이 코에 걸면 코걸이(...)</span><sup><a href=\"https://namu.wiki/w/CFA#fn-6\" style=\"background-color:white\">[6]</a></sup><span style=\"font-size:10.5pt;color:#373a3c;background-color:white\">&#160;</span><sup><a href=\"https://namu.wiki/w/CFA#fn-7\" style=\"background-color:white\">[7]</a></sup><span style=\"font-size:10.5pt;color:#373a3c;background-color:white\">인 상태이기 때문에 응시생들에게 가장 짜증나는 과목으로 통한다. 어지간했으면 CFA 응시생들 사이에서 &quot;윤리는 그냥 상식적으로 고르고 운에 맡기는 것&quot; 이라는 말까지 있을 정도. 일반적으로 윤리 과목은 레벨 1~3에서 모두 약 10-15% 정도의 비중을 지니고 있다. 상대적으로 영어에 익숙한 서구권 학생들에게도 윤리는 어려운 과목으로 인식되고 있다.</span></li>\r\n\t\t\t\t<li style=\"font-size:10pt\"><span style=\"font-size:10.5pt;color:#373a3c;background-color:white;font-weight:bold\">Economics</span><span style=\"font-size:10.5pt;color:#373a3c;background-color:white\">&#160;:&#160;</span><a href=\"https://namu.wiki/w/%EA%B2%BD%EC%A0%9C%ED%95%99\" style=\"font-size:10.5pt;background-color:white\">경제학</a><span style=\"font-size:10.5pt;color:#373a3c;background-color:white\">.</span><span style=\"font-size:10.5pt;color:#373a3c;background-color:white\">&#160;</span><a href=\"https://namu.wiki/w/%EA%B1%B0%EC%8B%9C%EA%B2%BD%EC%A0%9C%ED%95%99\" style=\"font-size:10.5pt;background-color:white\">거시경제학</a><span style=\"font-size:10.5pt;color:#373a3c;background-color:white\">은 금융자산의 가격변동에 중요한 요인이 되고,</span><span style=\"font-size:10.5pt;color:#373a3c;background-color:white\">&#160;</span><a href=\"https://namu.wiki/w/%EB%AF%B8%EC%8B%9C%EA%B2%BD%EC%A0%9C%ED%95%99\" style=\"font-size:10.5pt;background-color:white\">미시경제학</a><span style=\"font-size:10.5pt;color:#373a3c;background-color:white\">에서 배우는 효용곡선의 경우 각 개별자산의 투자 성향에 중요한 영향을 미치기 때문이다. 비중은 작지만 실제로 문제를 풀어 보면 생각보다 어렵다는 것이 중론. 2012년부터는 IS/LM 곡선이 추가되어 범위가 더 늘어났다.</span></li>\r\n\t\t\t\t<li style=\"font-size:10pt\"><span style=\"font-size:10.5pt;color:#373a3c;background-color:white;font-weight:bold\">Quantitative Methods</span><span style=\"font-size:10.5pt;color:#373a3c;background-color:white\">&#160;: </span><span style=\"font-size:10.5pt;color:#373a3c;background-color:white\">속칭 &#39;퀀트&#39;. 재무계산기 사용법과 일반적인</span><span style=\"font-size:10.5pt;color:#373a3c;background-color:white\">&#160;</span><a href=\"https://namu.wiki/w/%EA%B8%88%EC%9C%B5%EA%B3%B5%ED%95%99\" style=\"font-size:10.5pt;background-color:white\">금융공학</a><span style=\"font-size:10.5pt;color:#373a3c;background-color:white\">&#160;</span><span style=\"font-size:10.5pt;color:#373a3c;background-color:white\">관련 수학 계산에 익숙해지는 과목이라고 생각하면 된다. 현금흐름을 유효이자율로 할인하는 DCF부터 확률분포까지의 과정을 배우게 된다. 퀀트 역시 실제 시험장에 들어갔을 시 생각보다 어렵다는 평을 받는다.</span></li>\r\n\t\t\t\t<li style=\"font-size:10pt\"><span style=\"font-size:10.5pt;color:#373a3c;background-color:white;font-weight:bold\">Financial Reporting and Analysis</span><span style=\"font-size:10.5pt;color:#373a3c;background-color:white\">&#160;(FRA) :&#160;</span><a href=\"https://namu.wiki/w/%ED%9A%8C%EA%B3%84%ED%95%99\" style=\"font-size:10.5pt;background-color:white\">회계학</a><span style=\"font-size:10.5pt;color:#373a3c;background-color:white\">&#160;</span><span style=\"font-size:10.5pt;color:#373a3c;background-color:white\">과목이다. CFA Level 1에서 가장 큰 비중을 차지하고 있어 사실상 Level 1 응시자들에게는 가장 중요한 과목. 회계를 망치면 Level 1 은 통과가 어렵다. 과목의 순서는 우선 회계와</span><span style=\"font-size:10.5pt;color:#373a3c;background-color:white\">&#160;</span><a href=\"https://namu.wiki/w/%EC%9E%AC%EB%AC%B4%EC%A0%9C%ED%91%9C\" style=\"font-size:10.5pt;background-color:white\">재무제표</a><span style=\"font-size:10.5pt;color:#373a3c;background-color:white\">&#160;</span><span style=\"font-size:10.5pt;color:#373a3c;background-color:white\">전반에 대한 내용을 학습한 뒤 재무상태표, 손익계산서, 현금흐름표 등의 각론을 배우고, 거기서 더 들어가 고정자산, 법인세, 장기부채, 재고자산과 관련된 회계처리의 방법을 배우게 된다.</span><span style=\"font-size:10.5pt;color:#373a3c;background-color:white\">&#160;</span><span style=\"font-size:10.5pt;color:#373a3c;background-color:white\">￼</span><span style=\"font-size:10.5pt;color:#373a3c;background-color:white\">FRA에서 가장 어려운 부분은 IFRS(국제회계기준)과 US-GAAP(미국회계원칙)간의 차이점을 세세하게 알아야 한다는 것이다. 그 이유는 미국이 아직까지 IFRS를 따르지 않고 있기 때문인데</span><sup><a href=\"https://namu.wiki/w/CFA#fn-8\" style=\"background-color:white\">[8]</a></sup><span style=\"font-size:10.5pt;color:#373a3c;background-color:white\">,</span><span style=\"font-size:10.5pt;color:#373a3c;background-color:white\">&#160;</span><span style=\"font-size:10.5pt;color:gray;background-color:white\">천조국의 기상</span><span style=\"font-size:10.5pt;color:#373a3c;background-color:white\">&#160;</span><span style=\"font-size:10.5pt;color:#373a3c;background-color:white\">미국도 IFRS와 자국 회계기준간의 통합을 진행하고 있으므로 향후에 시험을 치를 수험생들은 조금 더 나아질 것이다.</span></li>\r\n\t\t\t\t<li style=\"font-size:10pt\"><span style=\"font-size:10.5pt;color:#373a3c;background-color:white;font-weight:bold\">Corporate Finance</span><span style=\"font-size:10.5pt;color:#373a3c;background-color:white\">&#160;: </span><span style=\"font-size:10.5pt;color:#373a3c;background-color:white\">기업재무, Level 1에서 가장 쉬운 과목이라 일컬어진다.</span><span style=\"font-size:10.5pt;color:#373a3c;background-color:white\">&#160;</span><a href=\"https://namu.wiki/w/%EA%B2%BD%EC%98%81%ED%95%99%EA%B3%BC\" style=\"font-size:10.5pt;background-color:white\">경영학과</a><span style=\"font-size:10.5pt;color:#373a3c;background-color:white\">에서 배우는</span><span style=\"font-size:10.5pt;color:#373a3c;background-color:white\">&#160;</span><a href=\"https://namu.wiki/w/%EC%9E%AC%EB%AC%B4%EA%B4%80%EB%A6%AC\" style=\"font-size:10.5pt;background-color:white\">기업재무</a><span style=\"font-size:10.5pt;color:#373a3c;background-color:white\">와 같이 자금조달 등에 대한 기업의 경제적 의사결정에 대해 공부하게 된다. 만약 FRA를 열심히 공부하였다면 기업재무는 매우 쉽다. 90% 이상 맞고 들어가야 하는 과목.</span></li>\r\n\t\t\t\t<li style=\"font-size:10pt\"><span style=\"font-size:10.5pt;color:#373a3c;background-color:white;font-weight:bold\">Portfolio Management</span><span style=\"font-size:10.5pt;color:#373a3c;background-color:white\">&#160;: </span><span style=\"font-size:10.5pt;color:#373a3c;background-color:white\">투자론이라고 볼 수 있다. 마르코비치 포트폴리오 모델을 기준으로 CML, CAL,</span><span style=\"font-size:10.5pt;color:#373a3c;background-color:white\">&#160;</span><a href=\"https://namu.wiki/w/CAPM\" style=\"font-size:10.5pt;background-color:white\">CAPM</a><span style=\"font-size:10.5pt;color:#373a3c;background-color:white\">&#160;</span><span style=\"font-size:10.5pt;color:#373a3c;background-color:white\">등 포트폴리오 투자 시의 효율적인 자산 배분에 대해 배우게 된다. 또한 펀드에 대한 간접투자시 일반적으로 알아야 하는 상식도 숙지해야 하는 과목. 원래대로라면</span><span style=\"font-size:10.5pt;color:#373a3c;background-color:white\">&#160;</span><a href=\"https://namu.wiki/w/%EB%AF%B8%EC%A0%81%EB%B6%84%ED%95%99\" style=\"font-size:10.5pt;background-color:white\">미적분학</a><span style=\"font-size:10.5pt;color:#373a3c;background-color:white\">을 어느 정도 숙지하여야 하는 과목이지만 Level 1 에서는 기초적인 개념만 파악하고 있으면 충분하다.</span></li>\r\n\t\t\t\t<li style=\"font-size:10pt\"><span style=\"font-size:10.5pt;color:#373a3c;background-color:white;font-weight:bold\">Equity</span><span style=\"font-size:10.5pt;color:#373a3c;background-color:white\">&#160;: </span><span style=\"font-size:10.5pt;color:#373a3c;background-color:white\">말 그대로 &#39;주식&#39;에 관하여 배운다. 다만 주식의 Valuation에 관련된 내용은 적은 편이고</span><sup><a href=\"https://namu.wiki/w/CFA#fn-9\" style=\"background-color:white\">[9]</a></sup><span style=\"font-size:10.5pt;color:#373a3c;background-color:white\">&#160;</span><span style=\"font-size:10.5pt;color:#373a3c;background-color:white\">역시 개념적인 부분이 대부분, Level 1에서는 배당성장모형 등 학부 재무관리 수준에서 할 수 있는 계산들만을 숙지할 것을 요구한다. 회계, 채권과 함께 Level 1에서 가장 큰 비중을 차지하고 있는 과목 중 하나이다.</span></li>\r\n\t\t\t\t<li style=\"font-size:10pt\"><span style=\"font-size:10.5pt;color:#373a3c;background-color:white;font-weight:bold\">Fixed Income</span><span style=\"font-size:10.5pt;color:#373a3c;background-color:white\">&#160;: </span><span style=\"font-size:10.5pt;color:#373a3c;background-color:white\">채권에 관련된 내용이다. 우선 채권의 종류부터 시작하여 채권의 간단한 Valuation에 대해 배우게 된다. Level 1에서는 채권의 종류와 개념, 일반적인 현금흐름 할인법을 사용한 채권의 가격측정 및 듀레이션을 활용한 채권의 가격변동 측정을 숙지할 것을 요구하고 있다. 주식, 회계와 함께 Level 1에서 가장 큰 비중을 차지하고 있기 때문에 열심히 공부해야 하는 과목 중 하나.</span></li>\r\n\t\t\t\t<li style=\"font-size:10pt\"><span style=\"font-size:10.5pt;color:#373a3c;background-color:white;font-weight:bold\">Derivative Investments</span><span style=\"font-size:10.5pt;color:#373a3c;background-color:white\">&#160;: </span><span style=\"font-size:10.5pt;color:#373a3c;background-color:white\">파생상품 관련 내용이다. 이 과목을 공부하다 보면 우리가 모르는 파생상품이 세상에 굉장히 많다는 것을 알게 된다(...) 하지만 누누이 강조하였듯이 Level 1은 &#39;개념&#39;이 중요하므로, 복잡한 계산을 요구하지는 않는다.</span><span style=\"font-size:10.5pt;color:#373a3c;background-color:white\">&#160;</span><span style=\"font-size:10.5pt;color:gray;background-color:white\">하지만 Level 2로 가는 순간 우리를 피토하게 하는 블랙-숄즈 형님이 등장하신다</span></li>\r\n\t\t\t\t<li style=\"font-size:10pt\"><span style=\"font-size:10.5pt;color:#373a3c;background-color:white;font-weight:bold\">Alternative Investments</span><span style=\"font-size:10.5pt;color:#373a3c;background-color:white\">&#160;: </span><span style=\"font-size:10.5pt;color:#373a3c;background-color:white\">대안투자/대체투자. 부동산, 상품 투자,</span><span style=\"font-size:10.5pt;color:#373a3c;background-color:white\">&#160;</span><a href=\"https://namu.wiki/w/%EB%B2%A4%EC%B2%98%EC%BA%90%ED%94%BC%ED%83%88\" style=\"font-size:10.5pt;background-color:white\">벤처캐피탈</a><span style=\"font-size:10.5pt;color:#373a3c;background-color:white\">&#160;</span><span style=\"font-size:10.5pt;color:#373a3c;background-color:white\">등에 관련된 내용이다.</span></li>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">CFA시험에서 필수 아이템이 계산기인데, 별 것 아닌것 같지만 아주 중요하다. 먼저 아무 계산기나 들고갈 수 없다. 계산기는&#160;<a href=\"https://namu.wiki/w/Texas%20Instruments\" style=\"font-size:10.5pt;background-color:white\">Texas Instruments</a>,&#160;<a href=\"https://namu.wiki/w/HP\" style=\"font-size:10.5pt;background-color:white\">HP</a>에서 만든 계산기, 그것도 모델까지 지정해 준 계산기 중 하나만 들고 시험장에 입실할 수 있다. 그 외의 계산기는 지참할 수 없다. 또한 AM세션이 끝나고 PM세션이 시작되기 전 모든 계산기를 Reset하여 초기상태로 되돌려버린다. 지정 계산기는 보통 미국에서 수입해서 들어오기 때문에 시험을 등록한 즉시 구매를 하고, 공부 도중에 틈틈히 사용방법을 익혀야 시험장에서 실수하지 않는다.</p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<cite style=\"font-size:8pt;color:#595959;margin-top:0pt;margin-bottom:0pt\"><a href=\"https://namu.wiki/w/CFA\">https://namu.wiki/w/CFA</a><span lang=\"en-US\"> </span>에서<span lang=\"en-US\"> </span>계속</cite>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">_________<span style=\"font-weight:bold\">[</span><span lang=\"ko-KR\" style=\"font-weight:bold\">써니</span><span style=\"font-weight:bold\">]</span>____________________________________</p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"color:black;background-color:white;font-weight:bold\">Subject:</span><span style=\"color:black;background-color:white\">&#160;RE: CFA 레벨1 자료.zip</span></p>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Gulim;color:black;background-color:white\">아래에 대용량 다운로드 링크 있습니다.</span></p>\r\n\t\t\t\t<table style=\"border:1px solid;border-collapse:collapse\">\r\n\t\t\t\t\t<tr>\r\n\t\t\t\t\t\t<td style=\"border:1px solid\">\t\t\t\t\t\t<table style=\"border:1px solid\">\r\n\t\t\t\t\t\t\t<tr>\r\n\t\t\t\t\t\t\t\t<td style=\"border:1px solid\"><br />\r\n\t\t\t\t\t\t\t\t</td>\r\n\t\t\t\t\t\t\t\t<td style=\"border:1px solid\"><a href=\"https://cloud.naver.com/saveFile.nhn?service=mail&amp;resource=%7B%22size%22%3A337169993%2C%22name%22%3A%22CFA+%EB%A0%88%EB%B2%A81+%EC%9E%90%EB%A3%8C.zip%22%2C%22downloadUrl%22%3A%22bigfile.mail.naver.com%2Fbigfileupload%2Fdownload%3Ffid%3DKrn9p6lG1HKZHqujKAuqKqUwFxUwHqUmKxvmKxgZKouqKqtqHqu9FAvmKqKwaxvjKzFCaAErKo0CpoICFAUqMoCvMrioKzErF6i4pxKrpAb%3D%22%2C%22key%22%3A%22%22%7D&amp;filekey=Krn9p6lG1HKZHqujKAuqKqUwFxUwHqUmKxvmKxgZKouqKqtqHqu9FAvmKqKwaxvjKzFCaAErKo0CpoICFAUqMoCvMrioK </span></p>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Gulim;color:black\">&#160;</span></p>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Gulim;color:black\">파일중에 2019년 2018년 자료 섞여 있는데 우선 2019년자료 위주로 보면 되고요.</span></p>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Gulim;color:black\">저중에 사실 Schweser 교재만 정독 하면서 중간중간 문제풀이하고, 그담에 question bank랑 practice exam만 계속 문제풀이 하면 되요.</span></p>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Gulim;color:black\">파일중에 RAR 압충된것도 있어서, winrar 같은 프로그램 다운로드 필수</span></p>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Gulim;color:black\">&#160;</span></p>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Gulim;color:black\">이패스 인강 이미 신청하신건지 모르겠는데, 레벨1은 슈웨이져 교재만 가지고 공부해도 충분하다고 하더라고요. 사실 자료를 뭘 쓰냐보단, 시간투입을 얼마나 하느냐가 중요해서.</span></p>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Gulim;color:black\">굳이 이패스 인강이 필요 없을수도 있지만..... 회사 IDP가 지원이 되다보니...</span></p>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Gulim;color:black\">시험 비용을 IDP로 신청할 경우에는 시험 떨어지면 뱉어내야한다는 말이 있어서...</span></p>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Gulim;color:black\">그래서 차라리 이패스를 결재하고 (대략 90만원?), IDP로 지원금 받고,.... 그리고 인강 공유할 사람 찾아서,.... 강의비 반띵으로 회수하면..... 그나마 시험 비용 조금 회수 가능하지 않을까 합니다.</span></p>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Gulim;color:black\">그래서 저도&#160;어제</span><span lang=\"en-US\" style=\"font-family:Gulim;color:black\"> 3</span><span style=\"font-family:Gulim;color:black\">차</span><span lang=\"en-US\" style=\"font-family:Gulim;color:black\"> </span><span style=\"font-family:Gulim;color:black\">시험</span><span lang=\"en-US\" style=\"font-family:Gulim;color:black\"> </span><span style=\"font-family:Gulim;color:black\">이패스</span><span lang=\"en-US\" style=\"font-family:Gulim;color:black\"> </span><span style=\"font-family:Gulim;color:black\">신청을</span><span lang=\"en-US\" style=\"font-family:Gulim;color:black\"> </span><span style=\"font-family:Gulim;color:black\">했네요</span><span lang=\"en-US\" style=\"font-family:Gulim;color:black\"> </span><span style=\"font-family:Gulim;color:black\">ㅋㅋㅋ</span></p>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Gulim;color:black\">&#160;</span></p>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Gulim;color:black\">그건 알아서 판단하세요.</span></p>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Gulim;color:black\">여튼 자료 보내준거만 한번씩만 봐도 아마 합격하는데는 문제 없을꺼에요!</span></p>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Gulim;color:black\">&#160;</span></p>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Gulim;color:black\">계산기는 얼른 구매해서 익히는법 배우시고요...</span></p>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Gulim;color:black\">시험 1주일 전은 통으로 휴가내서, 문제풀이 1주일 내내 하시는거 권장.&#160;</span></p>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Gulim;color:black\">&#160;&#160;</span></p>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Gulim;color:black\">아 그리고고 슈웨이져 책자는 제본해서 보는게 아마 편할거에요. 아날로그가 편해서 저는....</span></p>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Gulim;color:black\">제가 옛날에 온라인에서 저렴한 업체 찾아서 인쇄+제본 했을때 5권해서 3만원 들었떤거 같아요</span></p>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Gulim;color:black\">하지만 회사에서 인쇄가 가능하니.... 회사에서 인쇄하고 킨코스가서 제본만 해달라고 하는 방법도 있겠네요.</span></p>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Gulim;color:black\">&#160;</span></p>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Gulim;color:black\">단점은...e-book 교재이다보니, 페이지 번호가 없습니다 ..^^;;; 전부 Reading 번호로 참고해야할꺼에요.</span></p>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Gulim;color:black\">저도 아직 3차 공부 시작도 안했는데.... 우선 내일 인쇄부터 해야겠네요 ㅋㅋㅋ</span></p>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Gulim;color:black\">&#160;</span></p>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Gulim;color:black\">열심히 공부하시고 시험장에서 뵈요! ㅋㅋㅋ</span></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<br />\r\n\t\t\t</ul>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">ㅇ<span lang=\"en-US\"> </span>CFA 보유자는 </p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">ㅇ<span lang=\"en-US\"> </span>Level당 시험은 매년 6월 첫번째주 토요일, 즉 일년에 한번</p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">ㅇ<span lang=\"en-US\"> </span>시험 시간은 총 8시간</p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">[<span lang=\"ko-KR\">Level 1</span>/2] </p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">[<span lang=\"ko-KR\">Level 3</span>]</p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">ㅇ<span lang=\"en-US\"> </span>채점 기준<span lang=\"en-US\"> : </span>절대평가과 상대평가<span lang=\"en-US\"> </span>혼합</p>\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<cite style=\"font-size:8pt;color:#595959;margin-top:0pt;margin-bottom:0pt\"><a href=\"https://namu.wiki/w const CONTENT_HASH = '02ed4d88';

let cards = [];
let moving = null, resizing = null;
let selectedIdx = null, clipboardCard = null;
const GRID = 20, GAP = 14;
function snap(v) { return Math.round(v / GRID) * GRID; }

// ── Undo (Ctrl+Z) ────────────────────────────────────────────────────────────
const MAX_HISTORY = 50;
let history = [];
function snapshot() {
  syncText();
  history.push(JSON.stringify(cards));
  if (history.length > MAX_HISTORY) history.shift();
}
function undo() {
  if (!history.length) { showStatus('되돌릴 내용 없음'); return; }
  syncText();
  cards = JSON.parse(history.pop());
  renderCards();
  saveBoard();
  showStatus('↩ 되돌림');
}
function showStatus(msg) {
  const s = document.getElementById('status');
  s.textContent = msg;
  clearTimeout(showStatus._t);
  showStatus._t = setTimeout(() => { s.textContent = ''; }, 2000);
}
document.addEventListener('keydown', e => {
  const isText = document.activeElement?.contentEditable === 'true';
  if ((e.ctrlKey || e.metaKey) && e.key === 'z' && !e.shiftKey) {
    if (isText) return;
    e.preventDefault();
    undo();
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'c' && !e.shiftKey && !isText) {
    if (selectedIdx !== null && cards[selectedIdx]) {
      syncText();
      clipboardCard = JSON.parse(JSON.stringify(cards[selectedIdx]));
      showStatus('카드 복사됨');
      e.preventDefault();
    }
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'v' && !e.shiftKey && !isText) {
    if (clipboardCard) {
      e.preventDefault();
      snapshot();
      const nc = JSON.parse(JSON.stringify(clipboardCard));
      nc.x = (nc.x || 0) + 30; nc.y = (nc.y || 0) + 30;
      cards.push(nc);
      selectedIdx = cards.length - 1;
      renderCards(); saveBoard();
      showStatus('카드 붙여넣음');
    }
  }
  if (e.key === 'Escape') {
    document.querySelectorAll('.card.selected').forEach(c => c.classList.remove('selected'));
    selectedIdx = null;
  }
});

function pushCards(movedIdx) {
  const moved = cards[movedIdx];
  const movedEl = document.querySelector(`.card[data-idx="${movedIdx}"]`);
  if (!movedEl) return;
  const mh = movedEl.offsetHeight;
  document.querySelectorAll('.card').forEach(el => {
    const i = +el.dataset.idx;
    if (i === movedIdx) return;
    const c = cards[i], oh = el.offsetHeight;
    if (moved.x < (c.x+(c.w||200)) && (moved.x+(moved.w||200)) > c.x && moved.y < (c.y+oh) && (moved.y+mh) > c.y) {
      c.y = moved.y + mh + GAP;
      el.style.top = c.y + 'px';
    }
  });
}

function loadBoard() {
  const saved = localStorage.getItem(SAVE_KEY);
  const savedHash = localStorage.getItem(SAVE_KEY + ':hash');
  let parsed = null;
  try { parsed = saved ? JSON.parse(saved) : null; } catch(e) {}
  // reset if: no save, empty array, or content hash changed (page regenerated)
  if (!parsed || parsed.length === 0 || savedHash !== CONTENT_HASH) {
    cards = DEFAULT_CARDS.map(c => ({...c}));
    localStorage.removeItem(SAVE_KEY);
    localStorage.setItem(SAVE_KEY + ':hash', CONTENT_HASH);
    renderCards();
    const hasCoords = cards.some(c => c.x !== undefined && c.y !== undefined);
    if (!hasCoords) autoLayout();
    return;
  }
  cards = parsed;
  renderCards();
}
function resetToDefaults() { if (!confirm('저장된 보드를 지우고 원본으로 초기화합니다. 계속할까요?')) return; localStorage.removeItem(SAVE_KEY); cards = DEFAULT_CARDS.map(c => ({...c})); renderCards(); autoLayout(); }

function autoLayout() {
  const boardW = document.getElementById('board').offsetWidth;
  const cols = Math.max(1, Math.floor(boardW / 280));
  const colW = (boardW - GAP*(cols-1)) / cols;
  const colH = new Array(cols).fill(0);
  const allCards = document.querySelectorAll('.card');
  const images = document.querySelectorAll('.card img');
  let loaded = 0;
  function place() {
    allCards.forEach((el, i) => {
      const w = Math.min(cards[i].w || colW, colW);
      let minCol = 0;
      for (let c = 1; c < cols; c++) if (colH[c] < colH[minCol]) minCol = c;
      cards[i].x = minCol * (colW + GAP);
      cards[i].y = colH[minCol];
      cards[i].w = w;
      el.style.left = cards[i].x + 'px';
      el.style.top = cards[i].y + 'px';
      el.style.width = w + 'px';
      colH[minCol] = cards[i].y + el.offsetHeight + GAP;
    });
    document.getElementById('board').style.minHeight = (Math.max(...colH) + 100) + 'px';
    saveBoard();
  }
  if (!images.length) { requestAnimationFrame(place); return; }
  images.forEach(img => {
    if (img.complete) { loaded++; if (loaded >= images.length) requestAnimationFrame(place); }
    else { img.onload = img.onerror = () => { loaded++; if (loaded >= images.length) requestAnimationFrame(place); }; }
  });
}

function syncText() {
  document.querySelectorAll('.card').forEach(el => {
    const i = +el.dataset.idx;
    if (cards[i]?.type === 'text') { const t = el.querySelector('.text'); if (t) cards[i].content = t.innerHTML; }
  });
}
function saveBoard() { syncText(); localStorage.setItem(SAVE_KEY, JSON.stringify(cards)); localStorage.setItem(SAVE_KEY + ':hash', CONTENT_HASH); showStatus('저장됨 ' + new Date().toLocaleTimeString()); }

function renderCards() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  cards.forEach((card, i) => {
    const el = document.createElement('div');
    el.className = 'card'; el.dataset.idx = i;
    if (card.x !== undefined) el.style.left = card.x + 'px';
    if (card.y !== undefined) el.style.top = card.y + 'px';
    // html cards contain raw OneNote table HTML which may overflow the stated div width
    if (card.w) { if (card.type === 'html') el.style.minWidth = card.w + 'px'; else el.style.width = card.w + 'px'; }
    el.addEventListener('mousedown', e => {
      if (e.target.closest('.text, a, .card-btn, .resize-handle, td, th')) return;
      e.preventDefault();
      // Update selection
      document.querySelectorAll('.card.selected').forEach(c => c.classList.remove('selected'));
      selectedIdx = i; el.classList.add('selected');
      snapshot();
      moving = { idx: i, startX: e.clientX, startY: e.clientY, origX: card.x||0, origY: card.y||0 };
      el.classList.add('moving');
    });
    const actions = document.createElement('div'); actions.className = 'card-actions';
    const delBtn = document.createElement('button'); delBtn.className = 'card-btn'; delBtn.textContent = '×';
    delBtn.onclick = e => { e.stopPropagation(); if(confirm('삭제?')) { snapshot(); cards.splice(i,1); renderCards(); saveBoard(); } };
    actions.appendChild(delBtn); el.appendChild(actions);
    if (card.type === 'text') {
      const text = document.createElement('div'); text.className = 'text'; text.contentEditable = true;
      text.innerHTML = card.content || '';
      text.addEventListener('focus', () => { snapshot(); });
      text.addEventListener('blur', () => { card.content = text.innerHTML; saveBoard(); });
      el.appendChild(text);
    } else if (card.type === 'image') {
      const img = document.createElement('img');
      img.src = card.src.startsWith('http') || card.src.startsWith('data:') ? card.src : IMG_BASE + card.src;
      img.alt = ''; img.loading = 'lazy'; img.onerror = () => img.style.display = 'none';
      if (card.w) img.style.width = card.w + 'px';
      if (card.h) img.style.height = card.h + 'px';
      if (card.link) { const a = document.createElement('a'); a.href = card.link; a.target = '_blank'; a.appendChild(img); el.appendChild(a); }
      else { el.appendChild(img); }
      if (card.caption) { const cap = document.createElement('div'); cap.style.cssText = 'font-size:11px;color:#8b949e;margin-top:4px;word-break:break-word;padding:0 2px;'; cap.textContent = card.caption; el.appendChild(cap); }
    } else if (card.type === 'html') {
      const wrapper = document.createElement('div');
      wrapper.style.cssText = 'overflow:auto;font-size:13px;line-height:1.5;';
      wrapper.innerHTML = card.html.replace(/__ATTACHMENT__/g, IMG_BASE);
      wrapper.querySelectorAll('img').forEach(img => { img.style.maxWidth = '100%'; img.style.height = 'auto'; img.draggable = false; });
      wrapper.querySelectorAll('a').forEach(a => { a.target = '_blank'; a.style.color = '#6cb0f6'; });
      wrapper.querySelectorAll('table').forEach(t => { t.style.borderCollapse = 'collapse'; });
      wrapper.querySelectorAll('td,th').forEach(td => {
        td.style.border = '1px solid #444'; td.style.padding = '4px 6px'; td.style.verticalAlign = 'top';
        td.title = '더블클릭으로 편집';
        td.addEventListener('dblclick', function(e) {
          e.stopPropagation();
          snapshot();
          this.contentEditable = 'true';
          this.style.outline = '2px solid #388bfd';
          this.style.background = 'rgba(56,139,253,0.08)';
          this.focus();
        });
        td.addEventListener('blur', function() {
          this.contentEditable = 'false';
          this.style.outline = '';
          this.style.background = '';
          cards[i].html = wrapper.innerHTML.split(IMG_BASE).join('__ATTACHMENT__');
          saveBoard();
        });
      });
      el.appendChild(wrapper);
    } else if (card.type === 'table') {
      const rows = card.rows || [['','',''],['','',''],['','','']];
      const tbl = document.createElement('table');
      tbl.style.cssText = 'border-collapse:collapse;width:100%;font-size:13px;';
      rows.forEach((row, ri) => {
        const tr = tbl.insertRow();
        row.forEach((cell, ci) => {
          const td = document.createElement(ri === 0 ? 'th' : 'td');
          td.contentEditable = true;
          td.style.cssText = 'border:1px solid #30363d;padding:4px 8px;min-width:60px;text-align:left;' + (ri===0 ? 'background:#21262d;font-weight:600;' : '');
          td.textContent = cell;
          td.addEventListener('blur', () => { if (!cards[i].rows) cards[i].rows = rows; rows[ri][ci] = td.textContent; saveBoard(); });
          tr.appendChild(td);
        });
      });
      el.appendChild(tbl);
      const addRow = document.createElement('button');
      addRow.textContent = '+ 행'; addRow.style.cssText = 'margin-top:4px;font-size:11px;background:#21262d;border:1px solid #30363d;color:#8b949e;padding:2px 8px;border-radius:4px;cursor:pointer;';
      addRow.onclick = e => { e.stopPropagation(); snapshot(); if (!cards[i].rows) cards[i].rows = rows; cards[i].rows.push(new Array(cards[i].rows[0].length).fill('')); renderCards(); saveBoard(); };
      const addCol = document.createElement('button');
      addCol.textContent = '+ 열'; addCol.style.cssText = 'margin-top:4px;margin-left:4px;font-size:11px;background:#21262d;border:1px solid #30363d;color:#8b949e;padding:2px 8px;border-radius:4px;cursor:pointer;';
      addCol.onclick = e => { e.stopPropagation(); snapshot(); if (!cards[i].rows) cards[i].rows = rows; cards[i].rows.forEach(r => r.push('')); renderCards(); saveBoard(); };
      el.appendChild(addRow); el.appendChild(addCol);
    }
    const rh = document.createElement('div'); rh.className = 'resize-handle';
    rh.addEventListener('mousedown', e => { e.preventDefault(); e.stopPropagation(); snapshot(); resizing = { idx: i, startX: e.clientX, startW: card.w || el.offsetWidth }; });
    el.appendChild(rh);
    if (i === selectedIdx) el.classList.add('selected');
    board.appendChild(el);
  });
  requestAnimationFrame(() => {
    let maxB = 0;
    document.querySelectorAll('.card').forEach(el => { const b = (parseFloat(el.style.top)||0) + el.offsetHeight; if (b > maxB) maxB = b; });
    board.style.minHeight = (maxB + 100) + 'px';
  });
}

document.addEventListener('mousemove', e => {
  if (moving) {
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`); if (!el) return;
    let nx = moving.origX + e.clientX - moving.startX, ny = moving.origY + e.clientY - moving.startY;
    if (e.shiftKey) { nx = snap(nx); ny = snap(ny); el.style.outline = '1px dashed rgba(240,192,64,0.3)'; } else { el.style.outline = ''; }
    el.style.left = nx + 'px'; el.style.top = ny + 'px';
  }
  if (resizing) {
    let nw = resizing.startW + e.clientX - resizing.startX; if (e.shiftKey) nw = snap(nw);
    cards[resizing.idx].w = Math.max(100, nw);
    const el = document.querySelector(`.card[data-idx="${resizing.idx}"]`); if (el) el.style.width = cards[resizing.idx].w + 'px';
  }
});

document.addEventListener('mouseup', e => {
  if (moving) {
    let nx = moving.origX + e.clientX - moving.startX, ny = moving.origY + e.clientY - moving.startY;
    if (e.shiftKey) { nx = snap(nx); ny = snap(ny); }
    cards[moving.idx].x = Math.max(0, nx); cards[moving.idx].y = Math.max(0, ny);
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`); if (el) { el.classList.remove('moving'); el.style.outline = ''; }
    if (e.shiftKey) pushCards(moving.idx);
    moving = null; saveBoard();
  }
  if (resizing) { if (e.shiftKey) pushCards(resizing.idx); resizing = null; saveBoard(); }
});

function addTextCard() { snapshot(); cards.push({ type: 'text', content: '', x: 50, y: window.scrollY+100, w: 300 }); renderCards(); setTimeout(() => { const els = document.querySelectorAll('.card .text'); els[els.length-1]?.focus(); }, 100); }
function addImageCard() { const input = document.createElement('input'); input.type = 'file'; input.accept = 'image/*'; input.onchange = e => { const f = e.target.files[0]; if (!f) return; const r = new FileReader(); r.onload = () => { snapshot(); cards.push({ type: 'image', src: r.result, x: 50, y: window.scrollY+100, w: 240 }); renderCards(); saveBoard(); }; r.readAsDataURL(f); }; input.click(); }
function addImageUrl() { const url = prompt('이미지 URL'); if (!url) return; snapshot(); cards.push({ type: 'image', src: url, x: 50, y: window.scrollY+100, w: 240 }); renderCards(); saveBoard(); }
function addTableCard() {
  const colsStr = prompt('열 수 (기본 3)', '3'); const cols = Math.max(1, parseInt(colsStr)||3);
  const rowsStr = prompt('행 수 (헤더 포함, 기본 4)', '4'); const rows = Math.max(1, parseInt(rowsStr)||4);
  snapshot();
  cards.push({ type: 'table', rows: Array.from({length: rows}, (_, ri) => Array.from({length: cols}, (_, ci) => ri===0 ? `열${ci+1}` : '')), x: 50, y: window.scrollY+100, w: Math.max(240, cols*100) });
  renderCards(); saveBoard();
}
function exportBoard() { syncText(); const blob = new Blob([JSON.stringify(cards, null, 2)], { type: 'application/json' }); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = SAVE_KEY + '.json'; a.click(); }
// ── Zoom ─────────────────────────────────────────────────────────────────────
let zoom = parseFloat(localStorage.getItem('zoom-' + SAVE_KEY) || '1.0');
function applyZoom() {
  const board = document.getElementById('board');
  board.style.transform = `scale(${zoom})`;
  board.style.transformOrigin = '0 0';
  document.getElementById('zoom-level').textContent = Math.round(zoom * 100) + '%';
  localStorage.setItem('zoom-' + SAVE_KEY, zoom);
}
function zoomIn()  { zoom = Math.min(3.0, parseFloat((zoom + 0.1).toFixed(2))); applyZoom(); }
function zoomOut() { zoom = Math.max(0.2, parseFloat((zoom - 0.1).toFixed(2))); applyZoom(); }
document.addEventListener('keydown', e => {
  if (e.ctrlKey || e.metaKey) {
    if (e.key === '=' || e.key === '+') { e.preventDefault(); zoomIn(); }
    if (e.key === '-')                  { e.preventDefault(); zoomOut(); }
    if (e.key === '0')                  { e.preventDefault(); zoom = 1.0; applyZoom(); }
  }
});
document.getElementById('board').addEventListener('wheel', e => {
  if (!(e.ctrlKey || e.metaKey)) return;
  e.preventDefault();
  e.deltaY < 0 ? zoomIn() : zoomOut();
}, { passive: false });
applyZoom();
function resetLayout() { if (!confirm('자동 재배치합니다.')) return; cards.forEach(c => { delete c.x; delete c.y; }); renderCards(); autoLayout(); }
// ── Floating format toolbar ───────────────────────────────────────────────────
const fmtBar = document.getElementById('format-toolbar');
function fmt(cmd) { document.execCommand(cmd, false, null); saveBoard(); }
function fmtLink() {
  const sel = window.getSelection();
  if (!sel || sel.isCollapsed) return;
  const url = prompt('링크 URL 입력', 'https://');
  if (!url) return;
  document.execCommand('createLink', false, url);
  // make links open in new tab
  sel.anchorNode?.parentElement?.closest('a')?.setAttribute('target', '_blank');
  document.querySelectorAll('.text a').forEach(a => a.target = '_blank');
  saveBoard();
}

// prevent format buttons from blurring contenteditable
fmtBar.addEventListener('mousedown', e => e.preventDefault());

document.addEventListener('selectionchange', () => {
  const sel = window.getSelection();
  if (!sel || sel.isCollapsed || !sel.toString().trim()) { fmtBar.style.display = 'none'; return; }
  // only show if selection is inside a .text element
  const anchor = sel.anchorNode;
  if (!anchor) { fmtBar.style.display = 'none'; return; }
  const textEl = anchor.nodeType === 1 ? anchor.closest('.text') : anchor.parentElement?.closest('.text');
  if (!textEl) { fmtBar.style.display = 'none'; return; }
  // position above selection
  const range = sel.getRangeAt(0);
  const rect = range.getBoundingClientRect();
  fmtBar.style.display = 'flex';
  const tbW = fmtBar.offsetWidth || 180;
  let left = rect.left + rect.width / 2 - tbW / 2;
  left = Math.max(8, Math.min(left, window.innerWidth - tbW - 8));
  fmtBar.style.left = left + 'px';
  fmtBar.style.top = (rect.top - 44 + window.scrollY) + 'px';
});

setInterval(saveBoard, 30000);
loadBoard();
</script>
</body>
</html>
