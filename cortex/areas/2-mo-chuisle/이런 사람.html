<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>이런 사람</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1e1e1e; color: #e0e0e0; font-family: 'Segoe UI', -apple-system, sans-serif; font-size: 15px; line-height: 1.6; padding: 20px 30px 60px; overflow-x: hidden; }
a { color: #6cb0f6; text-decoration: none; }
a:hover { text-decoration: underline; }
.title-bar { background: #3a3a5c; display: inline-block; padding: 6px 16px; font-size: 22px; font-weight: bold; color: #fff; margin-bottom: 4px; }
.date { color: #999; font-size: 13px; margin-bottom: 20px; }
.board { position: relative; }
.card { background: #2a2a2a; border: 1px solid #3a3a3a; border-radius: 8px; padding: 12px; position: absolute; cursor: grab; transition: box-shadow 0.15s; overflow: hidden; }
.card:hover { box-shadow: 0 0 0 1px #58a6ff; z-index: 10; }
.card.moving { opacity: 0.8; box-shadow: 0 4px 24px rgba(0,0,0,0.6); z-index: 100; cursor: grabbing; }
.card img { width: 100%; border-radius: 4px; display: block; }
.card .text { outline: none; min-height: 20px; white-space: pre-wrap; word-break: break-word; }
.card .text:focus { background: rgba(255,255,255,0.05); border-radius: 4px; padding: 4px; }
.card .text:empty::before { content: '텍스트 입력...'; color: #555; }
.card-actions { position: absolute; top: 4px; right: 4px; display: none; gap: 4px; }
.card:hover .card-actions { display: flex; }
.card-btn { background: #333; border: 1px solid #555; color: #ccc; border-radius: 4px; padding: 2px 6px; font-size: 11px; cursor: pointer; }
.card-btn:hover { background: #444; color: #fff; }
.resize-handle { position: absolute; bottom: 0; right: 0; width: 16px; height: 16px; cursor: se-resize; opacity: 0; }
.card:hover .resize-handle { opacity: 0.6; }
.resize-handle::after { content: ''; position: absolute; bottom: 3px; right: 3px; width: 8px; height: 8px; border-right: 2px solid #666; border-bottom: 2px solid #666; }
.card.selected { box-shadow: 0 0 0 2px #58a6ff; z-index: 5; }
.highlight-red { color: #ff6b6b; }
.highlight-blue { color: #6cb0f6; }
.highlight-gold { color: #f0c040; }
.toolbar { position: fixed; bottom: 0; left: 0; right: 0; background: #161b22; border-top: 1px solid #30363d; padding: 8px 20px; display: flex; gap: 12px; align-items: center; z-index: 200; }
.toolbar button { background: #21262d; border: 1px solid #30363d; color: #e0e0e0; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; }
.toolbar button:hover { background: #30363d; }
.toolbar .status { color: #8b949e; font-size: 12px; margin-left: auto; }
#format-toolbar { position: fixed; display: none; background: #1c2128; border: 1px solid #444c56; border-radius: 8px; padding: 4px 6px; gap: 2px; align-items: center; z-index: 500; box-shadow: 0 4px 16px rgba(0,0,0,0.5); }
#format-toolbar button { background: none; border: none; color: #cdd9e5; padding: 4px 8px; border-radius: 5px; cursor: pointer; font-size: 13px; line-height: 1; }
#format-toolbar button:hover { background: #373e47; }
#format-toolbar .sep { width: 1px; height: 16px; background: #444c56; margin: 0 2px; }
</style>
</head>
<body>
<div class="title-bar" contenteditable="true">이런 사람</div>
<div class="date">2017년 4월 11일 화요일</div>
<div class="board" id="board"></div>
<div id="format-toolbar">
  <button onmousedown="e=>e.preventDefault()" onclick="fmt('bold')" title="굵게"><b>B</b></button>
  <button onclick="fmt('italic')" title="기울임"><i>I</i></button>
  <button onclick="fmt('underline')" title="밑줄"><u>U</u></button>
  <div class="sep"></div>
  <button onclick="fmtLink()" title="링크 삽입">🔗</button>
  <button onclick="fmt('unlink')" title="링크 제거">✂</button>
</div>
<div class="toolbar">
  <button onclick="undo()" title="Ctrl+Z">↩ 실행취소</button>
  <button onclick="addTextCard()">+ 텍스트</button>
  <button onclick="addImageCard()">+ 이미지</button>
  <button onclick="addImageUrl()">+ 이미지 URL</button>
  <button onclick="addTableCard()">+ 표</button>
  <button onclick="saveBoard()">💾 저장</button>
  <button onclick="exportBoard()">📤 내보내기</button>
  <button onclick="resetLayout()">↺ 재배치</button>
  <button onclick="resetToDefaults()" style="color:#f85149">↺ 초기화</button>
  <div style="display:flex;align-items:center;gap:4px;margin-left:8px;border-left:1px solid #30363d;padding-left:12px;">
    <button onclick="zoomOut()" title="Ctrl+-" style="padding:6px 10px;">−</button>
    <span id="zoom-level" style="font-size:12px;color:#8b949e;min-width:36px;text-align:center;">100%</span>
    <button onclick="zoomIn()" title="Ctrl+=" style="padding:6px 10px;">+</button>
  </div>
  <span class="status" id="status">Ready</span>
</div>
<script>
const SAVE_KEY = 'board-이런-사람';
const IMG_BASE = '../../attachments/';
const DEFAULT_CARDS = [
  {
    "type": "text",
    "x": 48,
    "y": 139,
    "w": 600,
    "content": "#NOmance\n[블러핑]\n나이가 찬 여자가, 가치관의 영역에서\n남자의 성향이나 관점에 컨센서스를 맞춰\n대화를 드리블하는 건 정말 1도 아니다.\n[쇼윈도]\n자기도 모르는 자신을 서로에게 설명하는 일이\n얼마나 큰 간극을 자아내는 일이겠나.\n심지어 보여주고 싶은 면만을 노출하는데.\n[\"사람이 온다는 것은 실로 어마어마한 일이다\"]\n사람은 가도 여운이 남고, 연애가 끝나도 레슨은 남는다.\n[덫]\n허세는 허영의\n좋은 먹잇감이다.\n[호기심]\n서로에 대해 잘 알게 되었다고 생각한 순간부터\n서로에 대해 잘 모르기 시작한다.\n호기심이 끝나면 관계도 끝난다.\n오늘은 무슨일이 있었는지,\n밥, 하루에 무려 세 번이나 먹는.\n그 밥이란 것을 먹었는지조차 궁금한것.\n그런 관심.\n[밀당]\n성격은 배울 수 있는게 아니더라\n있는 마음껏 당길테고\n밀면 그냥 밀려나갈 밖에\n[영역]\n나의 세계에 누군가 방문하는 것은 기쁜일이나,\n그 누군가가 내 세계의 끝이자\n관계가 새장이 되어선 안된다.\n신비와 비밀은 미덕은 아니나, 필요한 여백이다.\n[무소식]\n남자가 연락을 안하는 이유는\n그냥 지금은 연락을 안하고 싶으니까.\n옥중, 상중, (한시적)아웃오브안중.\n그게 의무가 된다고, 달라질건 없다.\n그 남자가 남자들의 남자이길 바란다면,\n늑대가 무리안에 있을 때는 놓아두자.\n[결단]\n함께 지난온 시간과 추억 때문에\n뻔한 파국을 확인할 필요는 없다.\n우리가 매몰비용으로 여기는\n그 시간보다 중요한 것은 기회비용이다.\n[인스타그램]\n그 사람을 좀 더 알고 싶다면,\n인터넷 즐겨찾기, 스마트폰 어플리케이션을 봐라\n무엇에 관심이 있고, 어떤 곳에 시간과 돈을 쏟는지 참고할 수 있다.\n특히 인스타그램을 봐라\n그곳에 가득한 것이 여행 풍경이든,\n화장품이든, 음식이든, 얼굴이든\n그게 무엇으로 도배 되어있건 간에 앞으로 네 돈이 투입될 것들이니 잘 보아두어라.\n셀카가 많다고? 미모는 공짜가 아니다.\n[자신감]\n어릴 때는 잘 나가는 형들이 예쁜 여자친구 자랑하면 '트로피 와이프'처럼 치부했다. 그러나 이제 좀 이해가 된다. 자기가 경제력이 있는 남자는 되려 본능에 충실해진다. 그래도 되니까. 여자의 경제력이나 스펙 등 '도구적/기능적 특성'보단 이성으로써의 매력에 더 가중치를 둘 수 있다.\n[건강]\n아직 우린 건강하니 거의 고려하지 못하는 요소인데, 건강은 정말로 중요하다. 짜증\n[직업]\n직업은 경제적인 안정과 정서적 안정 두 측면에서 봐야 한다. 서비스 직군은 대체로 빼어난 미모와 자부심을 자랑하는 직군이지만, 대인 서비스는 본질적으로 감정노동이다. 그 스트레스를 네가 함께 감내할 수 있을지 냉정히 봐야한다. 차라리 고정적으로 꼰대 한두명에게 스트레스받는 회사원이 나을 수 있다.\n[뒷담화]\n그 여자가 자신의 주변에 대해 이야기하는 걸 잘 들어봐라, 그 주어가 너의 주변인이나 가족으로 치환되어도 위화감이 없는지 생각해봐라.\n[집안]\n잘살고 잘나가는 여자. 마다할 이유가 없다. 단, 부모가 잘 사는거랑, 내가 잘 사는건 다른문제다. 그걸 분간치 못하거나, 부모가 살면서 달아준 보조바퀴를 인지하지 못하는 여자라면, 생각해봐라. 니가 감당할 수 있을지.\n[자존감]\n남과 비교하거나 주변의 시선을 너무 의식하는 사람은 걸러라. 너 말고 네 가족도 그 비교의 대상이 된다. 그리고 네 아이도 다른 아이와의 비교의 대상이 될거라는게 가장 끔찍한거다. 네 아이에게 그런 엄마를 준건 네 잘못이다.\n그 여자의 부모가 서로를 대하는 것을 보라. 그게 너와 그녀의 관계가 될 가능성이 높다. 부모는 결혼생활에 있어선 우리의 거의 유일무이한 스승이자 롤모델이다.\n사치. 스스로의 경제력을 넘어서는 소비가 사치다. 패리스힐튼이 한달에 차 한대씩 산다고 그게 사치라고 생각하면 네가 고지식한거다. 다만, 돈걱정 한번 해본적 없는 여자가 돈 없이도 행복하게 사네 어쩌네 한다면, 그건 좀 생각해봐야한다. 가난, 그녀는 모르는 것. 경험한적 없는 것에 대해 단정하고 있는 것이다. 자신과 네가 감내할 수 없을지도 모를 것을 선택할 수 있다고 말하는거니까.\n과거 꼰대세대들은 고학력 여성 비율이 지금보다 상대적으로 낮았으니 그 시절부터 '머리빈 남자' 이야긴 몰라도 '머리빈 여자'이야기를 하는 아해들이 있었고. 그럴 혐오적 발언은 관용어구가되어 지금까지 계승되고 있다. 흔히 예쁜여자에게 버림받은 아해들의 정신승리를 위한 방어기제에 활용된다.\n암튼, 여자가 별로 생각이 없어보인다면. 그건 여자가 멍청한게 아니라, 네가 멍청한걸 수도 있다. 능력이나, 상대의 지적 깊이는 네가 가진 깊이를 기준으로 밖에는 헤아릴 수 없는거니까. 상대로부터 충분한 지적 대화를 이끌어내는 능력이 네게 결핍되어 있을 수 있단 말이다.\n아님 그냥 너한테 관심이 없거나.\n사람은 안바뀐다.\n너도 그렇고 그녀도 그렇다.\n그러니 나아질거라 희망말고, 나중에는 감내할 수 있게될거라 착각말자. 사람이 사람에게 희망을 갖는건 훌륭한 일이다. 하지만, 사람이 사람을 바꿀 수 있을거라고 자신하는건 오만이다.\n결단.\n나는 별다는 싸움 없이 그녀와 헤어졌다. \"너를 정말 사랑하지만 너와 결혼을 하지는 않을거야\". 총알처럼 정제된 간명한 문장과 총성이 울린뒤의 적막으로 몇 년간의 인연을 마감했다.\n둘 중 하나가 결혼을 원하고, 둘의 생각이 같지 않다면\n착해지고 싶은 욕심은 꾸욱 참고 방아쇠를 당겨라. 몇 십년 후에 지금의 너를 증오하고 싶지 않다면.\n사람은 동물이다.\n그 여자가 아무리 좋은 조건과 스펙을 갖추었더라도, 본능적인 끌림이 없다면. 어렵다. 눈딱한번 감으라고? 파국을 예비치 말라. ㅋㅋㅋㅋ\n여성들의 학벌과 경제력이 상향되면서, 여자들도 남자의 외모에 대한 가중치가 높아졌다. 가꿔라. 네가 과거에 성취한 것들에 매몰되지 말고.\n눈이 높다고?\n이런말 조심해야된다.\n자신의 처지에 비해 눈이 높다는 건데, 이건 아무리 좋게 해석해도 유쾌한 뜻은 아니다.\n되물어라, 아니 내 인생이고, 내가 사랑할 사람 만나는건데. 눈좀 높으면 안됨?! ㅋㅋㅋㅋ\n그리고 어짜피 눈 안낮춰진다 ㅋㅋㅋㅋ\n네 아이의 엄마.\n네 평생의 가장친한 벗.\n그래서 평생을 통틀어 가장 중요한 의사결정.\n번식 측면에서 고려 요소는\n우수 유전체, 번식 가능성 크게 두 가지 일 것이다.\n모두 같은 여자를 좋아해야겠지.\n번식 확률을 높이는 쪽으로\n눈 높이를 보정한다.\n즉, 경쟁을 회피하는 선택을 하는 경우도 많다는 의미다.\n이글은 최규호 변호사라는 분이 적은 글인데요... (불합격을 피하는 법이라는 책을 지은... 고시 수험생들을 아실랑가 모르겠네요)\n여기 남녀 비율이 어떻게 되는지는 모르겠지만...\n제 나름대로는 공감가고 그런 내용이 많아서 올려 봅니다.\n변호사님이 고시출신이라 말이 좀 딱딱하고 직설적인 면 이해하시고 읽어주세요.\n남자가 여자를 선택할 때라기 보단... 배우자를 선택하는데 조언이라 생각드네요.\n연애랑 결혼이 다르다는 기본 전제도 깔려 있구요.\n요전에 제가 여쭈웠던 분도 따뜻함, 자존심, 이해 부분에서 브레이크를 자주 밟아서 결국엔 멈춰버렸군요.\n여자가 남자를 선택할 때라는 제목의 글이 있으면 어떨런지도 생각해봅니다.\n머니머니해도해도하겠죠? 쩝... 그리고 밑의 기준들은 기본 아니 꼭 가져야할 것이라 기준이라고\n조차 생각하지 못할런지도...\n.\n여러분의 의견들 듣고 싶습니다.\n. 서\n제목이 약간 이상하긴(?) 하지만 배우자를 고를 때 주의할 것을 적었습니다.\n이하는 남자가 배우자를 고를 때 생각해야 하는 것들에 대해 제 생각을 적었습니다. 제가 남자라서 아무래도 남자 입장에서 글 쓰는 것이 더 편하더군요. 여자 입장에서 남자를 고를 때 주의할 점은 추후 쓰겠습니다. 연애를 하면서 한눈에 반해서 아무 생각없이 결혼하는 경우도 있지만, 머리가 큰 다음에 이것저것 가려가며 결혼을 하는 경우도 있습니다. 결혼 상대를 고르는 것은 일생 일대를 좌우하는 매우 중차대한 일입니다. 대학교 입학보다 더 중요한 일입니다. 따라서 이에 대해서 고려할 것들을 적어봤습니다.\n&#160;\n1. 따뜻함\n여자는 모름지기 따뜻해야 합니다. 당연한 말 같지만 가끔가다가 따뜻하지 않은 여자들이 있으니 주의해야 하고, 사실은, 많이 따뜻한 사람은 많지 않은 것 같습니다.\n&#160;\n따뜻함이란, 타인에 대한 정, 애정, 보살핌, 걱정, 자신을 아끼듯 타인도 아끼는 마음, 특히 배우자에 대한 모성애의 발휘 등등입니다. 이런 감정은 어렸을 때부터 형성되어 어린 나이이면 이미 그런 성격인지 아닌지 판가름 나는 것 같습니다. 동생이 있는데, 동생을 애정으로 잘 돌보는 사람, 동물도 따뜻하게 아껴주고 보살펴 주는 사람이라면 따뜻하다고 할 수 있습니다.\n&#160;\n기본적으로 가정은 따뜻해야 합니다. 남자에게 가정은 엄마의 자궁과 같다는 말이 있습니다만, 가정에서 아주 편안한 휴식을 취해야 합니다. (그래서 집은 인테리어도 매우 따뜻하게, 포근하게 할 필요가 있습니다.) 집안 분위기는 아내, 엄마에 의해 좌우됩니다. 엄마가 냉정하고 차가우면 집안 분위기도 차가워집니다. 엄마가 사무적이라면 집안 분위기도 그렇습니다. 여러분이 집에 들어갔을 때(일을 하게되면 집에 들어갈 때는 매우 지쳐있는 상태이고 집에서 피로를 회복해야 몸과 마음이 회복이 됩니다. 그것이 회복되지 않고 쌓일 때 큰 병이 생기고 암에 걸리거나 쓰러지는 것입니다) 따뜻한 기운으로 편안한 기분을 느낄 수 있어야 합니다.\n&#160;\n따뜻한지 안그런지 아는 방법은 그 사람이 가족들이나 형제들과 지내는 생활을 들어보는 것입니다. 또는 나에 대한 걱정을 얼마나 하는지, 내 건강이나 기타 몸과 마음에 대해서 어떤 식으로 관심을 내비치고 걱정하는지를 눈여겨보십시오. 내가 밥을 먹는지 굶는지, 밤을 새서 일을 하는지 혹은 힘든 일을 어렵게 마무리 했는지에 대해서 전혀 혹은 거의 관심을 보이지 않는다면 이는 문제가 있는 사람이고 피해야 하는 사람입니다. 또 걱정만 할 것이 아니라 적극적으로 나의 몸과 마음의 건강을 위해서 행동도 취하는 사람이어야 합니다. 말로만 걱정하는 사람들도 있기 때문입니다. 내가 몸이 아파 식사를 못하면(혼자사는 경우에요) 와서 식사를 챙겨주는 사람이어야 합니다.\n&#160;\n2. 자존심\n너무 자존심이 센 사람은 피해야 합니다. 이혼 하는 많은 경우가 자존심이 센 경우입니다. 물론 남자들도 자존심이 세서는 안됩니다. 내적으로는 자존심이 세도 되지만, 상대방에 대해서 자존심을 굽히지 않는 것은 문제가 됩니다. 자존심이 센 사람은 배우려 들지 않습니다. 스스로 잘났다고 생각하기 때문에 배우는 것이 별로 없습니다. 당연히 사회 생활하는 법이나 양보하는 법, 매너 지키는 법, 상대방 기분 안상하게 하는 법, 자신의 잘못을 인정하는 법 등등에 대해서 잘 모릅니다. 배우지 않기 때문입니다. 그러면서도 자신은 옳다고 생각을 하고, 하던 그대로 계속 행동을 합니다. 그런 행동들이 주위 사람들, 특히 가족이나 배우자에게 얼마나 큰 고통을 주는지 느끼지 못하면서요.\n&#160;\n부부가 싸우게 되면 어느 한쪽이 일방적으로 잘못한 경우도 있지만 양방이 잘못한 경우도 많습니다. 현명한 사람, 철든 사람이라면 자기의 잘못도 생각해서 어느 정도 싸우다가 맙니다. 그런데 자존심이 센 사람은 자신의 잘못이 느껴져도 인정하지 못하고 우깁니다. 싸움이 극한으로 갈 수 있지요. 부부 사이에서는 자존심을 세워서는 안됩니다. 부부 사이에서 자존심을 세울 필요가 없고, 그런 것은 우습습니다. 그런데 자존심이 센 사람들은 부부사이에서도 자존심을 굽히지 않습니다. 자존심은 독선과 매우 유사합니다. 자존심이 센 사람은 독선에 가깝다고 보면 됩니다. 사람은 다 부족한 존재들입니다. 너무나 부족한 존재들입니다. 자기가 알아봐야 얼마나 알겠습니까. 그런데 자존심 센 사람들은 그것을 인정하지 않고, 자신이 마치 최고의 현자인 것 처럼 행동합니다.\n&#160;\n3. 이해\n이해는 매우 중요합니다. 내가 어떤 행동을 했을 때 그 행동의 이유를 파악하는 것이 이해입니다. 그 이유를 잘못 파악해서 기분이 상하면 싸움이 될 수 있고, 금이 갈 수 있습니다. 다른 사람의 행동의 동기 내지 내면 의사를 파악하는 것이 매우 중요한 데 그것이 바로 이해의 정도라고 할 수 있겠습니다. 나는 좋은 뜻을 갖고 행동을 했는데 그것을 나쁜, 반대의 뜻으로 오해해서 싸움이 되는 경우가 생기게 되는 것입니다. 예를 들어 아침에 내가 신문을 보고나서 처가 보도록 그것을 버리지 않고 테이블 위에 그대로 두었다 합시다. 그럴 때 ''''그것을 버리지 않고 왜 거기에 두었느냐!''''라고 생각할 수도 있고, ''''아 내가 보라고 둔 것이구나''''라고 생각할 수도 있는 것입니다. 이것은 사소한 예이지만, 첨예한 오해를 부르는 경우도 많겠지요. 이런 이해심은 많은 사회 경험에서 비롯됩니다. 많은 경험을 해봐야 하고, 성숙해야 합니다. 그렇지 못한 사람들은 이해를 잘못합니다.\n&#160;\n4. 직장\n직장은 다녀본 사람이 좋습니다. 직장은 학교와 달라서 매우 치열하고 거친 곳입니다. 모가 난 사람은 적응하기 힘들고, 그 모난 부분이 많이 깎여 나갈 수 밖에 없는 곳입니다. 따라서 직장 생활을 몇 년(최소 2년 이상 ) 무난히 하고 있다면 모난 부분이 많이 깎였다고 생각하면 맞을 것 같습니다. 물론 직장을 다닌다고 모든 사람이, 그리고 모든 성격이 다듬어지는 것은 아닙니다. 다만, 아주 이상한 성격, 아주 철없는 사람이라면 직장생활이 힘들 것이고, 직장생활을 무난하게 하고 있다면 그런 성격은 아닐 가능성이 높다는 것을 의미합니다. 만약 직장에 다니다가 얼마못다니가 힘들다고 그만두거나 왕따를 당하거나 동료 직원들로부터 좋지 않은 평가를 받는 사람이라면 멀리하는 것이 좋습니다. 직장을 전혀 안다니고 학교만 다닌 사람들은 좀 불안합니다. 직장에서 매우 많은 것들을 배우는 데 그것을 배울 기회를 얻지 못했으니 결혼 한 후 내가 직접 다 가르쳐야 합니다. 매우 힘듭니다. 또 모난 부분을 내가 다듬어야 하는데, 부부사이에서 그런 일을 하기란 매우 어렵습니다. 직장을 안다니면 이해의 정도, 사회 생활에서 지켜야 할 예의나 매너의 습득 등이 부족해지는 경우가 많습니다. 물론 어떤 사람들은 전혀 직장 안다녀도 원래부터 그런 것들을 잘 아는 사람들도 종종 있지만요. 학창시절 그렇게 터득하지 못한 사람들은 직장을 거치지 않고 바로 결혼을 해서 남편에게 그러한 많은 단점을 노출하게 되고 그것은 남편에게는 더 할 수 없는 고통이 됩니다.\n&#160;\n5. 조건\n조건은 보는 것이 좋습니다. 조건에는 집안, 학벌, 직업, 재력, 건강, 외모를 보지요. 다 중요합니다. 속물이라고 비난할 수도 있지만, 이러한 것들은 결혼생활을 하고 2세를 출산하고 교육하는데 있어 매우 중요합니다. 집안을 보는 것은 그 사람의 유전자를 보는 것입니다. 좋은 집안에서 자랐다면 좋은 유전자를 가진 것입니다. 좋은 머리를 가졌을 확률이 높고, 건강할 확률이 높으며, 똑똑할 확률이 높으며(부모가 똑똑할 테니까요) 나중에 내가 일을 할 때도 처가쪽 인맥을 활용할 수도 있습니다. 내 아이 역시 그런 유전자를 갖게된다는 뜻입니다.\n&#160;\n학벌은 그 사람이 얼마나 성실하게 살아왔는지를 판별합니다. 공부를 잘 못했다면 학창시절 불성실했다고 볼 수 있습니다. 끈기있게 책상에 앉아 공부를 해왔다는 것은 내 자식들도 따라서 그렇게 할 개연성이 높다는 것을 의미합니다. 엄마가 끈기가 없다면 아이들도 끈기가 없는 경우가 많습니다. 아이들은 엄마를 따라갑니다.\n&#160;\n직업이 좋은 것은 돈을 많이 버는 직업이요, 몸과 마음을 피곤하지 않게 하는 직업입니다. 아무래도 여러분은 직장을 가진 사람과 결혼할 확률이 높습니다. 그런데 그 직업이 매우 피곤한 직업이라면 거기에서 쌓인 스트레스를 여러분에게 풀 가능성이 있습니다. 여러분도 힘든데 와이프의 스트레스까지 감당해주고 받아주기에는 벅찰 수 있고, 그것이 부부사이를 악화시킬 수 있습니다. 뭐든지 힘들지 않은 것이 좋습니다. 또 돈을 많이 버는 직업은 매우 좋습니다. 당연한 말이지요. 여러분이 혼자 일을 한다면 70까지 일을 해야 노후를 준비할 수 있다면, 부인이 수입이 좋다면 그것을 50세 이전에 노후준비를 끝마칠 수 있습니다. 처가의 재력 역시 마찬가지 맥락입니다. 나중에 처가에서 많이 도와줄 수 있으면 좋지요.\n&#160;\n처의 외모는 섹시함을 추구하지는 마십시오. 외모와 건강은 한 부분으로 묶어서 보십시오. 건강하게 보이는 외모를 선택하십시오. 처의 건강은 매우 중요합니다. 건강하지 못하면 짜증을 많이 부리고 성격이 매우 나쁩니다. 당연합니다. 건강하면 기운과 에너지가 충만하고 항상 기분좋고 긍정적으로 생활합니다. 목표를 향해 전진해나가는 즐거움을 압니다. 체력이 약하면 그런 것을 알기 힘듭니다. 내 몸이 피곤하면 짜증이 잘 나는 법입니다. 내 몸이 일단 편하지가 않은데 남을 배려하고 아껴주는 마음이 나오기가 어렵습니다. 또 2세를 낳지 못하는 경우도 있습니다. 엄마가 건강해야 아기를 낳을 수 있으며 건강한 아기가 나옵니다. 엄마는 무조건 건강해야 합니다. 어렸을 적에 건강했는지를 보세요. 어렸을 적에 병약했다면 나이 들어서도 병약할 가능성이 높습니다. 공부를 잘 했다면 건강할 확률이 높습니다. 병약하고 체력이 약해서는 공부를 잘하기 힘드니까요. 섹시함은 거의 의미가 없습니다. 처녀때 섹시하게 보이고자 꾸미는 여자는 결혼 이후에 남자를 피곤하게 할 수 있으며, 자신의 섹시함을 무기로 삼아 사회 생활에서 이로움을 얻고자 하는 여자는 가치관이 그릇된 사람입니다. 그런 사람과는 장래를 논의하지 않는 것이 좋습니다.\n&#160;\n6. 장모\n여자는 자신의 어머니를 따라갑니다. 어머니가 하던 대로 하는 경향이 강합니다. 어머니가 가정적이라면 딸도 가정적일 확률이 높습니다. 어머니가 활동적이고 밖으로 도는 경향이 있다면 딸도 그럴 가능성이 높습니다. 어머니는 딸의 역할 모델이기 때문입니다. 어머니는 딸의 감독이자 코치이며, 딸을 만드는 것이 어머니입니다. 아버지와는 별 관련이 없는 것 같습니다. 내가 만나는 여자가 결혼 이후에 가정적이냐 밖으로 도느냐의 기준은 그 어머니를 보고 판단하면 될것 같습니다. 연애하면서 어머니에 대해 딸이 하는 얘기를 주의깊게 들어보십시오. 그래서 그 어머니가 어떤 스타일인지 보시면 그 딸도 나중에 그렇게 될 가능성이 높을 것입니다. 가끔 어머니는 현모양처인데 딸은 반대인 경우도 나오지요. 항상 원칙대로 되는 것은 아니기 때문입니다.\n&#160;\n7. 교제기간\n오래될 수록 좋습니다. 최소 1년 정도 진하게 사귄 후에 결혼하는 것이 좋습니다. 그래야 그 성격을 제대로 알 수 있습니다. 1주일에 한 번 몇시간씩 데이트를 해서는 1년을 만나도 상대를 잘 모릅니다. 깊게 사귀어야 본성이 나옵니다. 그래서 싸워도 보고 성격을 맞출수 있는지도 판가름해 보십시오. 저는 동거를 해보고 결혼하는 것이 필요하다는 생각을 갖습니다. 동거를 해본다면 짧계(한 달 혹은 단 하루라도) 교제해도 그 사람을 제대로 판단할 수 있습니다. 부부들이 신혼여행가서 대판 싸우고 바로 이혼을 하는 경우가 바로 그것입니다. 하루만 같이 살아봐도 수개월 교제를 하면서 안나왔던 성격이 드러나기 때문입니다.\n(출처 - 다음 카페 ''''최규호 변호사의 불합격을 피하는 법'''')\n&#160;\n다 갖춘 사람을 찾자고 하면 힘들겠지만 어느정도 생각을 해 볼 수 있는거라 생각하시고...\n참고해주시라는 의미에서~...\n자존심 세고, 이해 못해는 여자 정말 힘들더라구요.\n&#160;\n이제 저도 헤어진 지 3달 째 접어드는데요...\n마음은 조금 편해졌지만... 문득문득 아침에 그리워지는 감정과 혼자일때 저려오는 외로움은 어쩔 수 없네요. 제가 생각하는 그 사람은 이제 예전의 그사람과 동일성이 상실되었다는 진실은...\n참 씁슬하게 하네요... 일요일 저녁 홀로 있는 사무실에서...\n감사합니다 긴 글 읽어주셔서~~~..\n답글 : # 선배로서 충고 (꼭 읽어주길 바라네) #\n(나이도 나보다 어리기 때문에 존칭어를 생략하겠습니다.)\n빅3라니 어딘지 모르겠지만 Y 계열일까 생각되어\n후배같아 글 남긴네. 언제 이 글을 읽어볼지 모르겠지만\n읽어 보고 조금이라고 도움이 되기를 바라는 뜻에서\n시간을 할애하여 글 쓰네.\n글이좀 기네\n나는 6만 6천번대 이지만 결혼을 늦게 해서 3년전에 결혼했고,\n(의사 면허번호입니다 지금 10만번대가 넘어갔으니 보통 면허번호 대면\n나이를 대충 가늠할수있는지라..)\n아이 하나 있네.\n결혼할때, 처녀냐 아니냐, 나이가 많으냐 안 많으냐가\n중요한게 아니네.\n외모??\n어느정도 이상만 되면 대부분 합격으로 처리하게.\n외모에서 볼것은 따로 있거든.\n무엇보다도..\n일단 서로 깊이 신뢰를 해야 한다는게 가장 중요하지.\n결혼은 일단 사랑으로 시작되지만, 유지되는 것은 사랑보다는\n서로간의 믿음과 신뢰라고 생각하네.\n나는 결혼전에 여러군데 결혼정보회사에도 가입했었고\n선으로 들어온 많은 여자들을 만나보았지.\n그런데 대부분 아버지의 돈 믿고 거들먹거리는 여자도 많고,\n손에 물 한 번 묻히지 않았던 여자들도 많았어.\n가장 중요한건 그러한 여자들에게는 세상 경험이 없다는 거지.\n세상 경험(사회생활을 포함한 포괄적인 개념으로 받아들이게)\n이라는게 참으로 중요해.\n세상경험을 하고 난 뒤 생긴 인격과 성격은 주로 항구적인 경우가 많지만,\n세상경험없이 자라난 여성은 나중에\n(더럽고 치사한 세상경험을 충분히 하고 난뒤에는)\n성격이 (안 좋은 쪽으로) 바뀔 가능성이 있지.\n게다가 세상경험이 많지 않다면, 대인관계에서\n서로의 대립과 반목을 조율할줄도 모르지.\n(이런것은 시댁과의 갈등에서 매우 중요하네)\n=> 시댁과의 갈등에서 이러한 것이 왜 중요한지 설명해주지.\n많은 세상 경험, 특히 직장생활이나 혹은 특정단체에 속해서\n많은 사람을 만나며 사회적인 경험을 한 여자의 경우에는 직장내 인간관계 속에서 많은 것을 배우게 되네.\n더이상 자신은 어린아기가 아니라\n때로는 상대방을 이해해주어야 하기도 하고,\n때로는 불합리한 것을 참아야 하기도 하며,\n때로는 불공평한 것에 대해서 이야기도 못하고\n다른 사람이 다치는 것을 막기 위해 어쩔수 없이\n인내해야 하는 상황을 겪기도 하네.\n이러한 것으로 인해, 결국 그 여자는 대인관계에서\n서로의 대립과 반목을 조율하는 법을 터득하게 되네.\n때로는 참아야만 할때도 있다는 것도 깨닫게 되지. (이러한 것들은 부모가 딸에게 가르처줄 수 없는 것들이라네.)\n이러한 여자와 살게 되면 집안이 푸근하여 남자가 지친 몸을\n이끌고 집에 와도 쉴 수가 있네.\n하지만, 대인관계에서 현명하게 처신할 줄 모르는 여자는\n정말 남자를 힘들게 할 수 있네.\n난생 처음 겪어보는 시어머니의 비수같은 한마디에\n하루 종일 울고, 시어머니 무서워서 말도 못하고 하루 종일\n벙어리 냉가슴 앓다가, 남편이 하루종일 일하고 파김치가 되어서\n집에 들어오면, 밥은 커녕 부인이 달려와 남편 가슴에 안겨 2시간씩 울면서 푸념하는 거 받아주어야 하네.\n직장에서 파김치 되어 집에 들어와 다시 부인 안아주고 다독거려주느라 떡이 되는거지. 바로 집이라는게\n푸근한 쉴 공간이 아닌 제2의 직장이 되어 버리는거야.\n분명한 건, 집에서 재충전이 되지 않는다면\n남자는 힘든 사회생활에서 결코 성공할 수가 없네.\n아무리 힘들도 어렵고 고통스런 길이라 해도 집안에서\n토끼같은 부인과 자식들이 위로해 주고 지지해 주고,\n편안하게 쉴 공간을 마련해주면서 재충전시켜준다면,\n남자는 그 어떠한 고난과 역경도 이겨낼 수가 있네\n문제는 이것 만으로 그치는 게 아니라네.\n나중에 이러한 갈등이 언젠가는 표면화 하게 되어 있고\n결국 그것을 조율하고 양쪽(시어머니, 마누라)을 모두\n달래야 하는 것도 남편의 몫이고 부인은 하소연 할 데가 없으니\n남편에게만 사건 터질 때 마다 울며 불며 저녁에 2시간씩 다 쏟아내고, 시어머니는 자기 아들이니 전화로 1시간씩\n다 쏟아내게 되지.\n그로인해 남편의 몸과 마음은 파김치가 되는데\n회사일을 제대로 할수 있을까?\n현명한 여자라면, 남편이 직장생활에 충실하고\n원만한 사회생활만 할수 있도록 집안내 문제라든지,\n고부간의 갈등같은것은 모두 자기손에서 해결하지.\n남편의 가장 큰 임무는 가계의 생계유지를 위해,\n세상이라는 전쟁터에서 싸워 돈 벌어\n집안의 생계를 책임지는게 첫번째 임무라네.\n결코 집안의 반목, 대립을 조율하는 해결사 역할까지\n1인 2역을 기대한다면 피곤한 삶이 될걸쎄.\n남자에게 이것까지 요구하게 되면 사회생활도 제대로 할수 없지.\n남들이 이러한 상황을 듣게 되면 뭐라 하는 줄 아나??\n서로 싸우는 부인과 시어머니는 모두 잘못이 없고,\n남자의 역할이 중요하다며, 사회생활하며 매일 돈벌기도?\n바쁜 남자 탓을 한다네.\n솔직히 둘이 싸우는데 (단초를 제공하지 않았다면)\n남자가 무슨죄가 있나??\n인생을 살면 백이면 백 좋은 시절만 있는게 아니네.\n자네의 미래가 보장된 것 처럼 보여서 많은 여자들이\n달려들 수는 있지만 자네가 한번 살아보게나..\n세상은 그렇게 호락호락하지 않네.\n여자를 선택할 때에는 좋은 시절이 아니라\n어렵고 힘든 시절을 함께 보낼 수 있을 지를 먼저 생각하게.\n좋은시절을 함께 즐겁게 보내는 것은 세상 어떤 여자라도\n함께 할수 있다네.\n풍족하고 편안한 삶 속에서 인상 찌푸리고 짜증내는 여자는\n이세상에 없다네. 하지만 세상에 늘 좋은 시절만 있는 게 아니네.\n인생이란, 높은 봉우리가 있다면 골짜기가 존재하는 것 처럼, 반드시 반드시 굴곡이 있게 마련이네. 이건 의사든 판사든,\n심지어 재벌이라해도 마찬가지네.\n그래서 여자를 선택할 때에는 고난과 역경,\n즉 어려운 시절이 닥처도 그 어려움을 함께 이겨 나갈 수 있는 인품,\n인격을 지닌 여자를 선택하여야만 한다네\n물론 사회 생활의 첫 출발점에서 보면, 자네가 유리한 입장에\n서 있다는 것은 부인할수는 없지만, 세상살이라는게 늘 변수가\n많고 예상치 못 한것들이 많아서 언제 나락으로 떨어질지 모르거든.\n인생을 사는데 중요한 건, 나락으로 떨어지느냐 안 떨어지느냐가?\n중요한게 아니라 어느 상황에서든 그 상황을 이겨낼수 있는\n의지와 신념, 그리고 끊임없는 노력이 중요하네.\n남자에게 있어서 가족과 집이란, 모든 것을 다 실패한 후에도 돌아갈 수 있는 따뜻한 어머니의 품과 같은 것이라네.\n자네가 지금 선택하려고하는 여자 역시..\n지금은 자네의 부인으로서, 자네가 번 돈으로 생활하고 살림하고,\n자네가 거느린 가족 구성원으로 생각하게 될 지 모르겠지만.\n결국 시간이 흐르고 나면...?\n결국 부인의 존재라는 것도 인생의 하나의 동반자라는 것일세.\n시간이 더 흘러 중년이 지나게 되면 부인이라는 것이,\n나에게 편안한 안식처를 제공해주는 그러한 (마치 고향같은)\n존재가 되어버리지.\n설사 자네에게 큰 일이 터지더라도 그것을 보듬어주고\n자네편에서서 끝없이 지지해주는, 그러한 것이 바로 부인이며 가족이며 집이라네.\n지금 그 여자를 보게, 과연 그런 여자의 기품이 보이는가??\n아니 그러한 것이 보이지는 않더라도 나중에라도 그러한 것을\n기대할수는 있을까 한 번 생각해 보게나.\n많은 남성들이 착한 여자를 선호하는데..\n착한 여자에 대해 몇가지만 써보겠네.\n착한 여자는 크게 3 가지로 나뉘지.\n(이건 여자뿐만 아니라 남자에게도 해당될 수도 있지)\n첫 번째는 세상 경험을 많이 해서 인생의 달고 쓴 맛을 다 알고,\n인격이 성숙되고 인품이 훌륭해서, 고난과 역경에서도\n늘 웃음을 잃지 않고 그 와중에서도 상대를 배려하면서\n어려움을 이겨내는 여자..\n드라마에서 많이 나오고,\n현실에서는 100명중 2-3명 정도로 찾기 어렵지.\n두 번째는 아무 경험이 없어서 착한 여자,\n세상 경험이 없고 직장 다녀본 경험이 없어서 세상물정 모르고,\n밝고 좋은 것만 보고 자라서 성격이 좋지.\n이러한 여자는 대부분 나이가 어리거나 사회적인 생활,\n혹은 사회적 접촉이 제한된 경우가 많지.\n(엄한 아버지때문에 여행도 못 가고 귀가시간도 정해져 있고)\n이러한 여자는 나중에 2가지로 바뀌지.\n수년간 힘든 직장생활에 노출되면,\n98%는 더 독한 여자가 되고, 나머지 2%는 위 첫번째 예에 나온 훌륭한 인품을 가진 여자가 되지..\n자네는 어느쪽에 베팅을 할 것인가??\n2%에 베팅을 할 것인가? 98%에 할 텐가?\n세 번째 여자는 겉으로만 착한여자.\n착한것 처럼 보이지만 실제로는 그리 착하지 않지.\n착하게 보이는 것 자체를 컨셉으로 스스로를 미화하고\n합리화 하지. 하지만 2-3달 사귀어 보거나 같이 지내다 보면,\n일반인과 똑같지.\n다만 외형적으로 착하게 보이려고 하는 것 뿐이지.\n꼭 착한 여자랑 결혼할 필요는 없네.\n결혼은 가장 믿을 수 있는 여자랑 하는 것이 현명하지.\n나는...많은 여자를 만나보았네..\n다 합치면 10년간 100명은 될것이고..\n결혼을 전제로 사귀는 단계까지 간것도 3-4명은 족히 될 것일세.\n선을 본것만 해도 3-4년간 60-70번은 되고..\n(결론적으로 원래 예전부터 알던, 돈없고 빽없는 5살 어린 여자랑 결혼했다네..\n내 와이프를 선택하게 된 결정적인 원인은 바로 장모님 때문이라네, 뒤에후술하겠네)\n내 경험에서 미루어 몇자 적어보겠네.\n결혼 정보회사에서 소개받은, 아버지를 잘 둔 갑부집 딸은,\n위 예에서 대부분 두 번째나 세 번째에 해당되지.\n두 번째 여자가 세상 경험을 하고 아이도 낳고\n그러면서 독하고 못된 여자가 될 지\n아니면 더 훌륭한 첫 번째 여자처럼 될 지는 아무도 모르지.\n하지만, 약간 고집스럽고 억지스러울 수 있는 시댁과의?\n관계속에서 인간관계를 조율하면서 서로 원만하게 지내는 정도의\n스킬을 기대하기는 어렵지. 그리고 그러한 스트레스 속에서\n사회생활속에서 응당 배워 왔어야 할 경험이 없으니\n대인관계가 망가지게 되는 것이지\n그러나 어렸을 적 아버지의 교육방침,\n그리고 평소에 가지고있는 신념. 집안 교육 등을 보고 미루어\n짐작해보면, 지금은 세상물정 몰라서 착한것 처럼 보이지만\n나중에 어렵고 힘든 과정속에서는 어떻게 변질될 지\n어느정도 예측이 가능하지.\n입사때 순진하고 원리 원칙만 생각했던 신입사원이,\n늘 독종같은 자기 상사를 욕하면서 결국 4-5년 뒤 정신차려보면,\n이미 그 신입사원은, 자기가 늘 욕하던 독종같은 상사보다\n더 독한 사람이 되어있다는 점을 깨닫게 되지.\n물론 그렇게 되지 못 한 사람들은 다 퇴사하거나\n승진에서 누락될테고 말야.. 독종인 상사보다 더 승진하려면\n내가 더 더럽고 치사하고 냉혈한 독종이 되어야만하네.\n그게 바로 사회생활의 원칙이지\n부잣집 딸들은 대부분, 험난한 세상을 헤처 나가는데\n전혀 도움 안되는 바이올린, 무용, 등을 전공하는 경우가 많지.\n이러한 여자들은 되도록 만나지 말게.\n왜냐하면 그 부류의 사람들이 대부분 자기만 알고\n이기적인 경우가 많기도 하고 또 막상 그렇지 않다 하더라도\n현실감각이 많이 떨어지는 경우가 많거든.\n또한 자네가 개업 후 망한다 하더라도, 막상 팔 걷어 부치고\n생업에 뛰어들만한 용기와 의지가 거의 없는 경우가 대다수일세.\n(세상일은 모르는 것 일세)\n부인이 결혼할때 몇억 가지고 올지도 모른다고??\n인생을 길게 보면 그러한 돈이 큰 건 아닐쎄.\n물론 수십억을 주는 경우도 있지만 그런 건\n매우 드무니까 논외로 하겠네.\n남자가 사회생활을 하면서 돈을 벌기 위해\n자존심을 굽히고 살 수는 있지만, 집에 와서는 반드시\n휴식을 취하고 맘 편하게 지내야 하네.\n집에서 조차 자존심을 굽히고 마음이 편하지 않다면,\n- 아무리돈을 많이 받아도 -\n그것은 생지옥일 수 있다네. 이 말을 명심하게나.\n또한 돈을 가지고 온 부인은 이유없이 당당하고\n자존심이 쎄고 남편이 굽히기를 원하기도 하고\n장인 장모 얼굴을 볼 때도, 긴 인생을 봤을 때에는\n크지 않은 그 1-2억 때문에 참으로 평생동안 껄끄럽게 느껴진다네.\n(나의 다른 선배의 증언일세)\n그렇다고 오해하지는 말게,\n부잣집 딸들이 모두다 그렇다는 건 아니야. 90%정도만 그렇지\n여자를 고를때에는 외모가 가장 중요하지\n이쁘냐 안 이쁘냐를 말하는 게 아니야.\n바로 인상을 보라는 이야기지.\n관상학에 대해서 지식이 없더라도,\n여자를 처음 보면 느껴지는 게 있을 거야.\n왠지 호감이가는 얼굴.?\n뛰어나게 이쁘지는 않지만 정말 정이가는 얼굴이 있는가 하면\n정말 이쁘긴 하지만, 찬바람만 불 것 같고 독살 스러운 여자도 있지.\n내가 느끼는 것은 남도 느끼는 거라네\n평생 보고 살 얼굴인데, 독살스럽게 이쁜 것 보다는,\n아주 이쁘지는 않지만 호감이 가는 얼굴이 좋지.\n이러한 얼굴은 아이의 얼굴에도 반영되고 또 나중에\n사회생활이나 시집과의 인간관계에서도 좋은 영향을 끼칠 수 있어.\n또 하나 중요한건, 체형인데\n미니스커트와 하이힐에 현혹되지 말게.\n아주 심하게 못난 여자가 아니라면, 미니스커트와 하이힐로,\n어느 정도 자신의 신체약점을 커버할 수가 있지.\n좀 친해지면 수영장을 같이 가서 실제 몸매를 보던가\n그게 어려우면 바닷가를 놀러 가던가,\n그게 시간상 여의치 않다면 시외곽에 있는 자연휴양림에 가면\n하이힐을 못 신을 테니 그때 다리길이와 엉덩이 크기 그리고\n어깨 체형등을 유심히 살펴보게나.\n자네도 알다시피, 아들 딸에게 유전되는 근골격계는\n세포질에서 유전되는 것이라서 결국 난자에서 오는 것이라네.\n물론 100%는 아니네. 어느 정도 유전자가 섞이기 때문이지.\n그러나 70-80% 이상이 어머니의 영향을 받을 가능성이 크네.\n어머니가 체형이 좋고 키가 크다면 아들 딸이\n모두 키가 클 확률이 70-80%은 되지. 물론 아닐수도 있다네.\n아참 오해하지말게.\n여자를 무슨 상품 고르듯이 얼굴 인상과 체형을\n보라는 이야기가 아니야. 몸매가 정말 엉망인 여라 하더라도,\n그 약점을 커버할 정도로 얼굴의 인상이 좋아.\n늘 사람이 붙고 재물이 붙을 얼굴이고\n후덕하다는 이야기가 아니네, 갸름해도 매력이 있고\n인상이 좋아서 사람을 끌어들이는 외모가 있다네\n성격또한 늘 긍정적 마인드와 남편을 무한 신뢰해 주는\n그러한 여자라면, 뒤도 안 보고 바로 결혼하게나.\n또 하나 가장 중요하게 보아야 할 것이 바로 장모님 되실 분이라네.\n수 많은 여자들이 이렇게 외친다네.\n\"나는 엄마처럼 바보같이 살지 않을 꺼야\" 이렇게 말이네.\n하지만 그 사람들을 유심히 지켜보면,\n자기도 모르게 결국 자기 엄마의 삶을 살아가고 있다네.\n남자의 경우는 좀 다르네.\n남자는 아버지를 닮을 가능성이 여자보다는 좀 낮은 듯 싶네.\n남자는 직업적인 영향도 크고,\n어떤 사회생활을 하느냐에 따라 많이 바뀔 여지가 충분하다네.\n하지만 여자는 좀 다르다네.\n기본적으로 여자에게는 모성본능이 있어서 자식을 키우는..\n즉 아이 양육을 담당하는 경우가 99%인데, 여자 아이는\n자기도 모르게 자신의 어머니의 행동을 답습하고\n그것이 머리속에 각인되어 하나의 규범화가 될 가능성이 높다네.\n자네도 정신과를 배워서 알겠지만, 폭력적 가정에서 큰 아이가\n커서 다시 폭력을 행사할 가능성이 더 높고,.\n또 술에 쩔어사는 아버지 밑에서 자란 아이가,\n아버지를 혐오하면서도 결국 자신도 술꾼이 될 가능성이\n- 일반인에 비해 - 현저하게 높다네.\n물론 증명된 것은 아니지만,\n여자의 경우는 더 가능성이 높다고 생각이 드네.\n정말 바보같이 남편만 바라보고 평생을 남편과 자식을 위해\n헌신하며 살아온 여자가 있다면 그 여자가 낳은 딸이\n\"나는 엄마처럼 바보같이 살지 않을꺼야\" 라고 외치지만\n다시 현모양처가 되어서 남편과 자식을 위해\n훌륭한 어머니가 될 가능성이 매우 높다네.\n즉..\n지금 자네가 바라보는 예비 장모의 모습과 행동들이,결국 자네가\n30년후 데리고 살고 있는 부인의 모습이라고 보면 되네.\n100%는 아니지만 80%는 적중할거라 생각하네.\n나같으면 80%에 베팅하겠네.\n지금 유명 탈렌트인 C양을 보게,\n어머니가 남의 집 첩 출신 아닌가??\n결국 그 딸도 유명한 텔런트가 되었지만 결국 이혼했지..\n역사적으로 훌륭한 인물에게는 반드시 훌륭한 어머니가 존재하네.\n그건 남자나 여자나 모두 마찬가지라네.\n훌륭한 어머니에게는 반드시 그 어머니를 낳고\n바르게 교육시킨 훌륭한 어머니의 어머니가 존재한다네.\n지금 그 여자를 보게.\n자네에게 접근하기 위해서 그러한 거짓말을 사용했다고??\n그리고 그러한 거짓말이 자네를 너무 사랑하기 때문에 그랬다고?\n사랑이라는 것, 호감이라는 것은 여러가지로 이루어지는 것일세.\n자네가 그전에 그 여자와 교류를 하지 않은 상태에서,\n자네에게 호감을 느꼈다는 것은, 자네라는 하나의 인간에서 느끼는 감정보다는 자네가 가진 여러가지 조건에서 보이는\n메리트를 포함한 그러한 것에 대해 호감을 느꼈다는 거지.\n그렇다면??\n나중에 두가지 가능성을 생각해 볼 수 있겠지.\n지금, 본인이 원하는 것을 얻기 위해 그렇게 거짓말을 했다면,\n나중에 본인이 원하는 것이 바뀌었을 때,\n즉 자네가 아닌 다른 남자가 좋아졌거나 혹은 자네가 아닌\n자네가 벌어준 돈이 너무 좋아 미치겠다면,\n수단과 방법을 가리지 않고\n지금처럼 자네에게 똑같이 또 거짓말을 해서\n결국 자기가 원하는 것을 쟁취할 가능성이 높다네.\n한 번 거짓말한 사람은 두 번 거짓말 할 가능성이 높다네.\n또 하나는?\n지금 자네랑 사귀기 전부터 자네가 좋았다고 하는 것은\n자네의 면허증을 좋아한다는 소리인데 만약 자네가 실수로\n의료사고를 내서 의사면허가 박탈당한다면, 그 여자가 과연\n생계를 꾸려가면서 자네가 재기할수 있도록 발판을 마련해줄까\n아니면 바로 미련없이 자네를 버리게 될까??\n깨끗한 바다가 보고 싶어서 보라카이로 놀러 가는 건데\n보라카이가 오염되어서 더러운 바다만 존재한다면\n보라카이에는 아무도 가지 않을 걸세.\n마찬가지로, 자네가 면허증이 있어 자네를 좋아하는 거지.\n자네에게 면허가 박탈된다면 더이상 그 여자가 자네에게 남아있을 이유가 없다네.\n그렇다고 바보같이 지금 그 여자에게\n\"내가 의사가 아니라도 좋아?\" 라고 물어 보시지 말게나.\n당연히 좋다고 말하면서 의사면허가 박탈당해도 끝까지\n옆에 있겠다고 사탕발림의 말을 할 걸세.\n굳이 일어날 가능성이 낮은 일에 대해서 진심을 말해서\n지금부터 미운털이 박힐 필요는 없지.\n그리고 지금 그렇게 말한다고 해서 나중에 그 말에 대해 법적책임을 지는 것도 아닐테고 말야.\n마지막으로\n지금 그 여자는 31살일세. 자네는 32살일세.\n남자로서는 이제 결혼을 하기에 무리없는 나이지만,\n여자로서는 조금 급해진 나이일세.\n그 여자는 속으로 자네에게 마지막 희망을 걸고 싶을 걸세.\n아마 속으로는, 여태까지 찌질하게 살아온 내 인생의\n마지막 선물로서 자세를 생각할 지도 모르겠네.\n여자나이로 31살이면 -요즘 시대로서는 - 아주 늙은건 아니지만\n렇다고 25살 여자처럼 새로운 풋풋한 사랑을 시작하기에는\n부담스런 나이지.\n지금 새로운 사랑을 시작한다고 해도 32살에 결혼,\n아이 낳게 된다면 33-34세가 된다네.\n그 여자는 지금 매우 급박한 심정일 것일세.\n자네를 놓치지 않으려고 애를 쓸 것이야.\n그러한 심리를 이용하여 그 여자의 몸을 탐하지 말게.\n그렇게 한다면 자네는 진짜 나쁜 사람이 되는 것은 물론,\n건너지 말아야 할 강을 반쯤 건너게 될 지도 모르네.\n또한, 혈기왕성한 남자는, 자기와 몸을 섞게되는 여자에게\n이상하게 무한한 신뢰와 사랑을 주게 되어있네.\n원래 남자라는 동물이 여자의 음부가 코 앞에 있으면\n정신을 못 차리고 이성을 잃게 되게 되어 있다네\n그리고 여자의 몸을 탐하게 되면,\n그 여자에 대해 냉정한 평가를 할수가 없다네.\n객관적으로 이상하고 못된 성격이나 잘못조차도\n그순간에 이상하게 다 이해하게 되는 것이지.\n(하지만 수년이 지나고나면 피눈물을 흘릴 수도 있다네)\n이상한 여자때문에 인생 종친 선배 후배를\n너무 많이 나는 봐왔네.\n지금 내가 하는 말은, 그 여자가 이상하다고\n자네글로서만 단정짓고 확신하는게 아니네.\n다만 인생 쪽박차게 되는 건 순간이고,\n그 결정권은 지금 자네손에 있다는 사실을 알고\n좀 더 신중하게 행동하기를 바라네.\n32살이면 이제 대충 세상 돌아가는 것 알만큼 알 나이가 아닌가??\n다시 한 번 말하지만\n결혼은 사랑과 호감을 시작하지만\n결혼생활이 지속되는 것은 서로에 대한 무한한 신뢰라네. (자네도 나중에 결혼해서 3년 정도 살면 이 말이 이해가 갈 것이네)\n이미 자네에게 거짓말을 한 것부터가\n신뢰 차원에서 본다면 첫 단추부터 삐끗한 것일세.\n그녀가 그것을 극복하기 위해서는 다른 여자보다 장점이\n10배는 더 많아야 하고 그 무너진 신뢰를 회복하기 위해서는\n더 많은 믿음을 자네게 심어주어야 하네.\n그래야만 그것을 뛰어넘을 수가 있지.\n신뢰는 한 번 깨지면 복구하는데 3배 아니 10배의 노력이 든다네.\n그 여자가 그러한 것을 기꺼이 감수한다면 좋겠지만 거짓말을\n한 이유를 둘러대는 것을 보니 전혀 그럴 것 같지 않구먼.\n바닥이 튼튼하고 물이 잘 스며들도록 토양이 좋은 땅 위에,\n곧게 잘 자라고 잇는 묘목이 있다면, 이러한 묘목에다가\n신뢰라는 물을 주는 것이네.\n그렇게 되면 그 묘목은 30년후 아주 훌륭하고 곧바르고\n아름나운 나무가 되어 있을 것이네.\n바닥이 돌과 자갈에다가 흙이 잘 흘러내리는 경사진 곳에\n삐뚜루 자라고 있는 묘목이 있다면, 비록 지금 이 순간...\n그 잎이 아름답다고는 해도, 그것에 현혹되어서는 안 되네.\n이러한 묘목에 무한한 신뢰라는 물을 (아무리) 끝없이 준다한들, 결국 그 척박한 바위와 자갈위에서 삐뚜루 박혀있는 그 묘목은\n제대로 자랄수 없으며,\n자네가 준 엄청난 양의 신뢰라는 물들은 제대로 그 나무에 흡수되지 못해서 옆으로 흘러내려가 없어질 것이네.\n그 나무는 돌을 가르고 뿌리를 내리기 위해\n일반 나무보다 10배는 더 힘들것이고, 그렇게 하다가도\n결국 돌아 갈라져 경사 아래쪽으로 나무와 돌덩이가\n다 굴러 떨어질 수 밖에 없네.\n선택은 자네의 몫이네, 그리고 그로 인한\n나머지 인생 60 평생에 대한 책임도 자네의 몫이고\n연애는 새하얀 눈길을 함께 걷는 낭만의 시간이다. 그리고 결혼은 눈이 녹은 거리를 걷는 일이다. 질척이는 발걸음, 눈에 덮혀있던 쓰레기와 오물, 토사물. 전단지... 그럼에도 그럼에도 불구하고 함께 걸을 수 있거나. 그게 문제되지 않아야한다.\n생활의 영역이다. 습관, 생활습관을 봐라. 그래서 동거를 해보란 이야기가 있는거다."
  }

const CONTENT_HASH = '5b8ffb41';

let cards = [];
let moving = null, resizing = null;
let selectedIdx = null, clipboardCard = null;
const GRID = 20, GAP = 14;
function snap(v) { return Math.round(v / GRID) * GRID; }

// ── Undo (Ctrl+Z) ────────────────────────────────────────────────────────────
const MAX_HISTORY = 50;
let history = [];
function snapshot() {
  syncText();
  history.push(JSON.stringify(cards));
  if (history.length > MAX_HISTORY) history.shift();
}
function undo() {
  if (!history.length) { showStatus('되돌릴 내용 없음'); return; }
  syncText();
  cards = JSON.parse(history.pop());
  renderCards();
  saveBoard();
  showStatus('↩ 되돌림');
}
function showStatus(msg) {
  const s = document.getElementById('status');
  s.textContent = msg;
  clearTimeout(showStatus._t);
  showStatus._t = setTimeout(() => { s.textContent = ''; }, 2000);
}
document.addEventListener('keydown', e => {
  const isText = document.activeElement?.contentEditable === 'true';
  if ((e.ctrlKey || e.metaKey) && e.key === 'z' && !e.shiftKey) {
    if (isText) return;
    e.preventDefault();
    undo();
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'c' && !e.shiftKey && !isText) {
    if (selectedIdx !== null && cards[selectedIdx]) {
      syncText();
      clipboardCard = JSON.parse(JSON.stringify(cards[selectedIdx]));
      showStatus('카드 복사됨');
      e.preventDefault();
    }
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'v' && !e.shiftKey && !isText) {
    if (clipboardCard) {
      e.preventDefault();
      snapshot();
      const nc = JSON.parse(JSON.stringify(clipboardCard));
      nc.x = (nc.x || 0) + 30; nc.y = (nc.y || 0) + 30;
      cards.push(nc);
      selectedIdx = cards.length - 1;
      renderCards(); saveBoard();
      showStatus('카드 붙여넣음');
    }
  }
  if (e.key === 'Escape') {
    document.querySelectorAll('.card.selected').forEach(c => c.classList.remove('selected'));
    selectedIdx = null;
  }
});

function pushCards(movedIdx) {
  const moved = cards[movedIdx];
  const movedEl = document.querySelector(`.card[data-idx="${movedIdx}"]`);
  if (!movedEl) return;
  const mh = movedEl.offsetHeight;
  document.querySelectorAll('.card').forEach(el => {
    const i = +el.dataset.idx;
    if (i === movedIdx) return;
    const c = cards[i], oh = el.offsetHeight;
    if (moved.x < (c.x+(c.w||200)) && (moved.x+(moved.w||200)) > c.x && moved.y < (c.y+oh) && (moved.y+mh) > c.y) {
      c.y = moved.y + mh + GAP;
      el.style.top = c.y + 'px';
    }
  });
}

function loadBoard() {
  const saved = localStorage.getItem(SAVE_KEY);
  const savedHash = localStorage.getItem(SAVE_KEY + ':hash');
  let parsed = null;
  try { parsed = saved ? JSON.parse(saved) : null; } catch(e) {}
  // reset if: no save, empty array, or content hash changed (page regenerated)
  if (!parsed || parsed.length === 0 || savedHash !== CONTENT_HASH) {
    cards = DEFAULT_CARDS.map(c => ({...c}));
    localStorage.removeItem(SAVE_KEY);
    localStorage.setItem(SAVE_KEY + ':hash', CONTENT_HASH);
    renderCards();
    const hasCoords = cards.some(c => c.x !== undefined && c.y !== undefined);
    if (!hasCoords) autoLayout();
    return;
  }
  cards = parsed;
  renderCards();
}
function resetToDefaults() { if (!confirm('저장된 보드를 지우고 원본으로 초기화합니다. 계속할까요?')) return; localStorage.removeItem(SAVE_KEY); cards = DEFAULT_CARDS.map(c => ({...c})); renderCards(); autoLayout(); }

function autoLayout() {
  const boardW = document.getElementById('board').offsetWidth;
  const cols = Math.max(1, Math.floor(boardW / 280));
  const colW = (boardW - GAP*(cols-1)) / cols;
  const colH = new Array(cols).fill(0);
  const allCards = document.querySelectorAll('.card');
  const images = document.querySelectorAll('.card img');
  let loaded = 0;
  function place() {
    allCards.forEach((el, i) => {
      const w = Math.min(cards[i].w || colW, colW);
      let minCol = 0;
      for (let c = 1; c < cols; c++) if (colH[c] < colH[minCol]) minCol = c;
      cards[i].x = minCol * (colW + GAP);
      cards[i].y = colH[minCol];
      cards[i].w = w;
      el.style.left = cards[i].x + 'px';
      el.style.top = cards[i].y + 'px';
      el.style.width = w + 'px';
      colH[minCol] = cards[i].y + el.offsetHeight + GAP;
    });
    document.getElementById('board').style.minHeight = (Math.max(...colH) + 100) + 'px';
    saveBoard();
  }
  if (!images.length) { requestAnimationFrame(place); return; }
  images.forEach(img => {
    if (img.complete) { loaded++; if (loaded >= images.length) requestAnimationFrame(place); }
    else { img.onload = img.onerror = () => { loaded++; if (loaded >= images.length) requestAnimationFrame(place); }; }
  });
}

function syncText() {
  document.querySelectorAll('.card').forEach(el => {
    const i = +el.dataset.idx;
    if (cards[i]?.type === 'text') { const t = el.querySelector('.text'); if (t) cards[i].content = t.innerHTML; }
  });
}
function saveBoard() { syncText(); localStorage.setItem(SAVE_KEY, JSON.stringify(cards)); localStorage.setItem(SAVE_KEY + ':hash', CONTENT_HASH); showStatus('저장됨 ' + new Date().toLocaleTimeString()); }

function renderCards() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  cards.forEach((card, i) => {
    const el = document.createElement('div');
    el.className = 'card'; el.dataset.idx = i;
    if (card.x !== undefined) el.style.left = card.x + 'px';
    if (card.y !== undefined) el.style.top = card.y + 'px';
    // html cards contain raw OneNote table HTML which may overflow the stated div width
    if (card.w) { if (card.type === 'html') el.style.minWidth = card.w + 'px'; else el.style.width = card.w + 'px'; }
    el.addEventListener('mousedown', e => {
      if (e.target.closest('.text, a, .card-btn, .resize-handle, td, th')) return;
      e.preventDefault();
      // Update selection
      document.querySelectorAll('.card.selected').forEach(c => c.classList.remove('selected'));
      selectedIdx = i; el.classList.add('selected');
      snapshot();
      moving = { idx: i, startX: e.clientX, startY: e.clientY, origX: card.x||0, origY: card.y||0 };
      el.classList.add('moving');
    });
    const actions = document.createElement('div'); actions.className = 'card-actions';
    const delBtn = document.createElement('button'); delBtn.className = 'card-btn'; delBtn.textContent = '×';
    delBtn.onclick = e => { e.stopPropagation(); if(confirm('삭제?')) { snapshot(); cards.splice(i,1); renderCards(); saveBoard(); } };
    actions.appendChild(delBtn); el.appendChild(actions);
    if (card.type === 'text') {
      const text = document.createElement('div'); text.className = 'text'; text.contentEditable = true;
      text.innerHTML = card.content || '';
      text.addEventListener('focus', () => { snapshot(); });
      text.addEventListener('blur', () => { card.content = text.innerHTML; saveBoard(); });
      el.appendChild(text);
    } else if (card.type === 'image') {
      const img = document.createElement('img');
      img.src = card.src.startsWith('http') || card.src.startsWith('data:') ? card.src : IMG_BASE + card.src;
      img.alt = ''; img.loading = 'lazy'; img.onerror = () => img.style.display = 'none';
      if (card.w) img.style.width = card.w + 'px';
      if (card.h) img.style.height = card.h + 'px';
      if (card.link) { const a = document.createElement('a'); a.href = card.link; a.target = '_blank'; a.appendChild(img); el.appendChild(a); }
      else { el.appendChild(img); }
      if (card.caption) { const cap = document.createElement('div'); cap.style.cssText = 'font-size:11px;color:#8b949e;margin-top:4px;word-break:break-word;padding:0 2px;'; cap.textContent = card.caption; el.appendChild(cap); }
    } else if (card.type === 'html') {
      const wrapper = document.createElement('div');
      wrapper.style.cssText = 'overflow:auto;font-size:13px;line-height:1.5;';
      wrapper.innerHTML = card.html.replace(/__ATTACHMENT__/g, IMG_BASE);
      wrapper.querySelectorAll('img').forEach(img => { img.style.maxWidth = '100%'; img.style.height = 'auto'; img.draggable = false; });
      wrapper.querySelectorAll('a').forEach(a => { a.target = '_blank'; a.style.color = '#6cb0f6'; });
      wrapper.querySelectorAll('table').forEach(t => { t.style.borderCollapse = 'collapse'; });
      wrapper.querySelectorAll('td,th').forEach(td => {
        td.style.border = '1px solid #444'; td.style.padding = '4px 6px'; td.style.verticalAlign = 'top';
        td.title = '더블클릭으로 편집';
        td.addEventListener('dblclick', function(e) {
          e.stopPropagation();
          snapshot();
          this.contentEditable = 'true';
          this.style.outline = '2px solid #388bfd';
          this.style.background = 'rgba(56,139,253,0.08)';
          this.focus();
        });
        td.addEventListener('blur', function() {
          this.contentEditable = 'false';
          this.style.outline = '';
          this.style.background = '';
          cards[i].html = wrapper.innerHTML.split(IMG_BASE).join('__ATTACHMENT__');
          saveBoard();
        });
      });
      el.appendChild(wrapper);
    } else if (card.type === 'table') {
      const rows = card.rows || [['','',''],['','',''],['','','']];
      const tbl = document.createElement('table');
      tbl.style.cssText = 'border-collapse:collapse;width:100%;font-size:13px;';
      rows.forEach((row, ri) => {
        const tr = tbl.insertRow();
        row.forEach((cell, ci) => {
          const td = document.createElement(ri === 0 ? 'th' : 'td');
          td.contentEditable = true;
          td.style.cssText = 'border:1px solid #30363d;padding:4px 8px;min-width:60px;text-align:left;' + (ri===0 ? 'background:#21262d;font-weight:600;' : '');
          td.textContent = cell;
          td.addEventListener('blur', () => { if (!cards[i].rows) cards[i].rows = rows; rows[ri][ci] = td.textContent; saveBoard(); });
          tr.appendChild(td);
        });
      });
      el.appendChild(tbl);
      const addRow = document.createElement('button');
      addRow.textContent = '+ 행'; addRow.style.cssText = 'margin-top:4px;font-size:11px;background:#21262d;border:1px solid #30363d;color:#8b949e;padding:2px 8px;border-radius:4px;cursor:pointer;';
      addRow.onclick = e => { e.stopPropagation(); snapshot(); if (!cards[i].rows) cards[i].rows = rows; cards[i].rows.push(new Array(cards[i].rows[0].length).fill('')); renderCards(); saveBoard(); };
      const addCol = document.createElement('button');
      addCol.textContent = '+ 열'; addCol.style.cssText = 'margin-top:4px;margin-left:4px;font-size:11px;background:#21262d;border:1px solid #30363d;color:#8b949e;padding:2px 8px;border-radius:4px;cursor:pointer;';
      addCol.onclick = e => { e.stopPropagation(); snapshot(); if (!cards[i].rows) cards[i].rows = rows; cards[i].rows.forEach(r => r.push('')); renderCards(); saveBoard(); };
      el.appendChild(addRow); el.appendChild(addCol);
    }
    const rh = document.createElement('div'); rh.className = 'resize-handle';
    rh.addEventListener('mousedown', e => { e.preventDefault(); e.stopPropagation(); snapshot(); resizing = { idx: i, startX: e.clientX, startW: card.w || el.offsetWidth }; });
    el.appendChild(rh);
    if (i === selectedIdx) el.classList.add('selected');
    board.appendChild(el);
  });
  requestAnimationFrame(() => {
    let maxB = 0;
    document.querySelectorAll('.card').forEach(el => { const b = (parseFloat(el.style.top)||0) + el.offsetHeight; if (b > maxB) maxB = b; });
    board.style.minHeight = (maxB + 100) + 'px';
  });
}

document.addEventListener('mousemove', e => {
  if (moving) {
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`); if (!el) return;
    let nx = moving.origX + e.clientX - moving.startX, ny = moving.origY + e.clientY - moving.startY;
    if (e.shiftKey) { nx = snap(nx); ny = snap(ny); el.style.outline = '1px dashed rgba(240,192,64,0.3)'; } else { el.style.outline = ''; }
    el.style.left = nx + 'px'; el.style.top = ny + 'px';
  }
  if (resizing) {
    let nw = resizing.startW + e.clientX - resizing.startX; if (e.shiftKey) nw = snap(nw);
    cards[resizing.idx].w = Math.max(100, nw);
    const el = document.querySelector(`.card[data-idx="${resizing.idx}"]`); if (el) el.style.width = cards[resizing.idx].w + 'px';
  }
});

document.addEventListener('mouseup', e => {
  if (moving) {
    let nx = moving.origX + e.clientX - moving.startX, ny = moving.origY + e.clientY - moving.startY;
    if (e.shiftKey) { nx = snap(nx); ny = snap(ny); }
    cards[moving.idx].x = Math.max(0, nx); cards[moving.idx].y = Math.max(0, ny);
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`); if (el) { el.classList.remove('moving'); el.style.outline = ''; }
    if (e.shiftKey) pushCards(moving.idx);
    moving = null; saveBoard();
  }
  if (resizing) { if (e.shiftKey) pushCards(resizing.idx); resizing = null; saveBoard(); }
});

function addTextCard() { snapshot(); cards.push({ type: 'text', content: '', x: 50, y: window.scrollY+100, w: 300 }); renderCards(); setTimeout(() => { const els = document.querySelectorAll('.card .text'); els[els.length-1]?.focus(); }, 100); }
function addImageCard() { const input = document.createElement('input'); input.type = 'file'; input.accept = 'image/*'; input.onchange = e => { const f = e.target.files[0]; if (!f) return; const r = new FileReader(); r.onload = () => { snapshot(); cards.push({ type: 'image', src: r.result, x: 50, y: window.scrollY+100, w: 240 }); renderCards(); saveBoard(); }; r.readAsDataURL(f); }; input.click(); }
function addImageUrl() { const url = prompt('이미지 URL'); if (!url) return; snapshot(); cards.push({ type: 'image', src: url, x: 50, y: window.scrollY+100, w: 240 }); renderCards(); saveBoard(); }
function addTableCard() {
  const colsStr = prompt('열 수 (기본 3)', '3'); const cols = Math.max(1, parseInt(colsStr)||3);
  const rowsStr = prompt('행 수 (헤더 포함, 기본 4)', '4'); const rows = Math.max(1, parseInt(rowsStr)||4);
  snapshot();
  cards.push({ type: 'table', rows: Array.from({length: rows}, (_, ri) => Array.from({length: cols}, (_, ci) => ri===0 ? `열${ci+1}` : '')), x: 50, y: window.scrollY+100, w: Math.max(240, cols*100) });
  renderCards(); saveBoard();
}
function exportBoard() { syncText(); const blob = new Blob([JSON.stringify(cards, null, 2)], { type: 'application/json' }); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = SAVE_KEY + '.json'; a.click(); }
// ── Zoom ─────────────────────────────────────────────────────────────────────
let zoom = parseFloat(localStorage.getItem('zoom-' + SAVE_KEY) || '1.0');
function applyZoom() {
  const board = document.getElementById('board');
  board.style.transform = `scale(${zoom})`;
  board.style.transformOrigin = '0 0';
  document.getElementById('zoom-level').textContent = Math.round(zoom * 100) + '%';
  localStorage.setItem('zoom-' + SAVE_KEY, zoom);
}
function zoomIn()  { zoom = Math.min(3.0, parseFloat((zoom + 0.1).toFixed(2))); applyZoom(); }
function zoomOut() { zoom = Math.max(0.2, parseFloat((zoom - 0.1).toFixed(2))); applyZoom(); }
document.addEventListener('keydown', e => {
  if (e.ctrlKey || e.metaKey) {
    if (e.key === '=' || e.key === '+') { e.preventDefault(); zoomIn(); }
    if (e.key === '-')                  { e.preventDefault(); zoomOut(); }
    if (e.key === '0')                  { e.preventDefault(); zoom = 1.0; applyZoom(); }
  }
});
document.getElementById('board').addEventListener('wheel', e => {
  if (!(e.ctrlKey || e.metaKey)) return;
  e.preventDefault();
  e.deltaY < 0 ? zoomIn() : zoomOut();
}, { passive: false });
applyZoom();
function resetLayout() { if (!confirm('자동 재배치합니다.')) return; cards.forEach(c => { delete c.x; delete c.y; }); renderCards(); autoLayout(); }
// ── Floating format toolbar ───────────────────────────────────────────────────
const fmtBar = document.getElementById('format-toolbar');
function fmt(cmd) { document.execCommand(cmd, false, null); saveBoard(); }
function fmtLink() {
  const sel = window.getSelection();
  if (!sel || sel.isCollapsed) return;
  const url = prompt('링크 URL 입력', 'https://');
  if (!url) return;
  document.execCommand('createLink', false, url);
  // make links open in new tab
  sel.anchorNode?.parentElement?.closest('a')?.setAttribute('target', '_blank');
  document.querySelectorAll('.text a').forEach(a => a.target = '_blank');
  saveBoard();
}

// prevent format buttons from blurring contenteditable
fmtBar.addEventListener('mousedown', e => e.preventDefault());

document.addEventListener('selectionchange', () => {
  const sel = window.getSelection();
  if (!sel || sel.isCollapsed || !sel.toString().trim()) { fmtBar.style.display = 'none'; return; }
  // only show if selection is inside a .text element
  const anchor = sel.anchorNode;
  if (!anchor) { fmtBar.style.display = 'none'; return; }
  const textEl = anchor.nodeType === 1 ? anchor.closest('.text') : anchor.parentElement?.closest('.text');
  if (!textEl) { fmtBar.style.display = 'none'; return; }
  // position above selection
  const range = sel.getRangeAt(0);
  const rect = range.getBoundingClientRect();
  fmtBar.style.display = 'flex';
  const tbW = fmtBar.offsetWidth || 180;
  let left = rect.left + rect.width / 2 - tbW / 2;
  left = Math.max(8, Math.min(left, window.innerWidth - tbW - 8));
  fmtBar.style.left = left + 'px';
  fmtBar.style.top = (rect.top - 44 + window.scrollY) + 'px';
});

setInterval(saveBoard, 30000);
loadBoard();
</script>
