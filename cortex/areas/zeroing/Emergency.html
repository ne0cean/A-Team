ic;font-size:12pt;color:#b3b0ad;background-color:#212121\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#b3b0ad;background-color:#212121\">전달</span></p>\r\n\t\t\t\t\t<br />\r\n\t\t\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#b3b0ad;background-color:#212121\">수동</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt;color:#b3b0ad;background-color:#212121\"> </span><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#b3b0ad;background-color:#212121\">수합</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt;color:#b3b0ad;background-color:#212121\">(</span><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#b3b0ad;background-color:#212121\">한번에</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt;color:#b3b0ad;background-color:#212121\">) -&gt; </span><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#b3b0ad;background-color:#212121\">다시</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt;color:#b3b0ad;background-color:#212121\"> gpt </span><span style=\"font-family:Malgun Gothic;font-size:12pt;color:#b3b0ad;background-color:#212121\">전달</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-size:12pt;color:#b3b0ad;background-color:#212121\"> </span>“<span style=\"font-family:Malgun Gothic\">이</span> 5<span style=\"font-family:Malgun Gothic\">명의</span> <span style=\"font-family:Malgun Gothic\">답변을</span> <span style=\"font-family:Malgun Gothic\">종합해서</span> Dean’s Temporal Board <span style=\"font-family:Malgun Gothic\">리포트를</span> <span style=\"font-family:Malgun Gothic\">작성해줘</span>.”</p>\r\n\t\t\t\t\t<br />\r\n\t\t\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">원노트에</span><span lang=\"en-US\"> </span><span style=\"font-family:Malgun Gothic\">결과</span><span lang=\"en-US\"> </span><span style=\"font-family:Malgun Gothic\">저장</span><span lang=\"en-US\"> </span><span style=\"font-family:Malgun Gothic\">후</span><span lang=\"en-US\">, </span><span style=\"font-family:Malgun Gothic\">이후</span><span lang=\"en-US\"> </span><span style=\"font-family:Malgun Gothic\">재논의</span><span lang=\"en-US\"> </span><span style=\"font-family:Malgun Gothic\">시</span><span lang=\"en-US\"> </span><span style=\"font-family:Malgun Gothic\">붙여넣기</span><span lang=\"en-US\">.</span></p>\r\n\t\t\t\t\t</td>\r\n\t\t\t\t</tr>\r\n\t\t\t</table>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:Pretendard;margin-top:0pt;margin-bottom:0pt\">한비자<span lang=\"en-US\">, </span>마키아벨리</p>\r\n\t\t\t<p style=\"font-family:Pretendard;margin-top:0pt;margin-bottom:0pt\">빌<span lang=\"en-US\"> </span>게이츠<span lang=\"en-US\">, </span>일론<span lang=\"en-US\"> </span>머스크<span lang=\"en-US\">, </span>스티브잡스</p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:Pretendard;margin-top:0pt;margin-bottom:0pt\">GPTs<span lang=\"ko-KR\">에</span> <span lang=\"ko-KR\">물어보면</span> <span lang=\"ko-KR\">되겠네</span></p>\r\n\t\t\t<br />\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:Pretendard;margin-top:0pt;margin-bottom:0pt\">Zoom-out, <span lang=\"ko-KR\">지금</span> <span lang=\"ko-KR\">이</span> <span lang=\"ko-KR\">순간은</span> <span lang=\"ko-KR\">인생</span> <span lang=\"ko-KR\">전체로</span> <span lang=\"ko-KR\">놓고</span> <span lang=\"ko-KR\">보면</span> <span lang=\"ko-KR\">선위에</span> <span lang=\"ko-KR\">분간조차</span> <span lang=\"ko-KR\">되지</span> <span lang=\"ko-KR\">않을</span> <span lang=\"ko-KR\">점이다</span>.</p>\r\n\t\t\t<p style=\"font-family:Pretendard;margin-top:0pt;margin-bottom:0pt\">아<span lang=\"en-US\">, </span>변곡점일<span lang=\"en-US\"> </span>수도<span lang=\"en-US\"> </span>있지<span lang=\"en-US\">. </span>그리고<span lang=\"en-US\"> </span>그건<span lang=\"en-US\">, </span>지금<span lang=\"en-US\"> </span>내가<span lang=\"en-US\"> </span>어떤<span lang=\"en-US\"> </span>감정을<span lang=\"en-US\"> </span>느끼는지가<span lang=\"en-US\"> </span>아니라</p>\r\n\t\t\t<p style=\"font-family:Pretendard;margin-top:0pt;margin-bottom:0pt\">어떤<span lang=\"en-US\"> </span>대응을<span lang=\"en-US\"> </span>할<span lang=\"en-US\"> </span>것인가에<span lang=\"en-US\"> </span>달려<span lang=\"en-US\"> </span>있어<span lang=\"en-US\">. </span>그러니<span lang=\"en-US\">, </span>다<span lang=\"en-US\"> </span>울었으면<span lang=\"en-US\">, </span>할<span lang=\"en-US\"> </span>일을<span lang=\"en-US\"> </span>해야지<span lang=\"en-US\">.</span></p>\r\n\t\t\t<br />\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:16pt;font-weight:bold\">1. </span><span style=\"font-family:Malgun Gothic;font-size:16pt;font-weight:bold\">아미노산</span><span style=\"font-size:16pt;font-weight:bold\"> </span><span style=\"font-family:Malgun Gothic;font-size:16pt;font-weight:bold\">및</span><span style=\"font-size:16pt;font-weight:bold\"> </span><span style=\"font-family:Malgun Gothic;font-size:16pt;font-weight:bold\">관련</span><span style=\"font-size:16pt;font-weight:bold\"> </span><span style=\"font-family:Malgun Gothic;font-size:16pt;font-weight:bold\">보충제</span></p>\r\n\t\t\t<ul>\r\n\t\t\t\t<li style=\"font-family:Calibri\"><span lang=\"en-US\"><span style=\"font-weight:bold\">L-</span><span style=\"font-family:Malgun Gothic;font-weight:bold\">티로신</span><span style=\"font-weight:bold\"> (L-Tyrosine)</span><span style=\"font-weight:bold\">￼</span><span style=\"font-family:Malgun Gothic\">스트레스</span> <span style=\"font-family:Malgun Gothic\">상황에서</span> <span style=\"font-family:Malgun Gothic\">집중력을</span> <span style=\"font-family:Malgun Gothic\">유지하고</span> <span style=\"font-family:Malgun Gothic\">기분</span> <span style=\"font-family:Malgun Gothic\">조절에</span> <span style=\"font-family:Malgun Gothic\">도움을</span> <span style=\"font-family:Malgun Gothic\">줄</span> <span style=\"font-family:Malgun Gothic\">수</span> <span style=\"font-family:Malgun Gothic\">있는</span> <span style=\"font-family:Malgun Gothic\">것으로</span> <span style=\"font-family:Malgun Gothic\">알려져</span> <span style=\"font-family:Malgun Gothic\">있습니다</span>. <span style=\"font-family:Malgun Gothic\">도파민</span>, <span style=\"font-family:Malgun Gothic\">노르에피네프린</span> <span style=\"font-family:Malgun Gothic\">같은</span> <span style=\"font-family:Malgun Gothic\">신경전달물질의</span> <span style=\"font-family:Malgun Gothic\">전구체입니다</span>.</span></li>\r\n\t\t\t\t<li style=\"font-family:Calibri\"><span lang=\"en-US\"><span style=\"font-weight:bold\">5-HTP (5-Hydroxytryptophan)</span><span style=\"font-weight:bold\">￼</span><span style=\"font-family:Malgun Gothic\">세로토닌의</span> <span style=\"font-family:Malgun Gothic\">전구체로</span>, <span style=\"font-family:Malgun Gothic\">우울증과</span> <span style=\"font-family:Malgun Gothic\">불안</span> <span style=\"font-family:Malgun Gothic\">감소에</span> <span style=\"font-family:Malgun Gothic\">도움을</span> <span style=\"font-family:Malgun Gothic\">줄</span> <span style=\"font-family:Malgun Gothic\">수</span> <span style=\"font-family:Malgun Gothic\">있습니다</span>.</span></li>\r\n\t\t\t\t<li style=\"font-family:Calibri\"><span lang=\"en-US\"><span style=\"font-weight:bold\">L-</span><span style=\"font-family:Malgun Gothic;font-weight:bold\">테아닌</span><span style=\"font-weight:bold\"> (L-Theanine)</span><span style=\"font-weight:bold\">￼</span><span style=\"font-family:Malgun Gothic\">주로</span> <span style=\"font-family:Malgun Gothic\">녹차에서</span> <span style=\"font-family:Malgun Gothic\">발견되며</span>, <span style=\"font-family:Malgun Gothic\">스트레스</span> <span style=\"font-family:Malgun Gothic\">완화와</span> <span style=\"font-family:Malgun Gothic\">편안함</span> <span style=\"font-family:Malgun Gothic\">증진에</span> <span style=\"font-family:Malgun Gothic\">기여합니다</span>.</span></li>\r\n\t\t\t</ul>\r\n\t\t\t<br />\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:16pt;font-weight:bold\">2. </span><span style=\"font-family:Malgun Gothic;font-size:16pt;font-weight:bold\">비타민</span><span style=\"font-size:16pt;font-weight:bold\"> </span><span style=\"font-family:Malgun Gothic;font-size:16pt;font-weight:bold\">및</span><span style=\"font-size:16pt;font-weight:bold\"> </span><span style=\"font-family:Malgun Gothic;font-size:16pt;font-weight:bold\">미네랄</span></p>\r\n\t\t\t<ul>\r\n\t\t\t\t<li style=\"font-family:Calibri\"><span lang=\"en-US\"><span style=\"font-family:Malgun Gothic;font-weight:bold\">비타민</span><span style=\"font-weight:bold\"> D</span><span style=\"font-weight:bold\">￼</span><span style=\"font-family:Malgun Gothic\">부족할</span> <span style=\"font-family:Malgun Gothic\">경우</span> <span style=\"font-family:Malgun Gothic\">우울증과</span> <span style=\"font-family:Malgun Gothic\">연관될</span> <span style=\"font-family:Malgun Gothic\">수</span> <span style=\"font-family:Malgun Gothic\">있으므로</span>, <span style=\"font-family:Malgun Gothic\">적정</span> <span style=\"font-family:Malgun Gothic\">수준을</span> <span style=\"font-family:Malgun Gothic\">유지하는</span> <span style=\"font-family:Malgun Gothic\">것이</span> <span style=\"font-family:Malgun Gothic\">중요합니다</span>.</span></li>\r\n\t\t\t\t<li style=\"font-family:Calibri\"><span lang=\"en-US\"><span style=\"font-family:Malgun Gothic;font-weight:bold\">비타민</span><span style=\"font-weight:bold\"> B </span><span style=\"font-family:Malgun Gothic;font-weight:bold\">복합군</span><span style=\"font-weight:bold\"> (</span><span style=\"font-family:Malgun Gothic;font-weight:bold\">특히</span><span style=\"font-weight:bold\"> B6, B9, B12)</span><span style=\"font-weight:bold\">￼</span><span style=\"font-family:Malgun Gothic\">신경계</span> <span style=\"font-family:Malgun Gothic\">건강과</span> <span style=\"font-family:Malgun Gothic\">세로토닌</span> <span style=\"font-family:Malgun Gothic\">생성에</span> <span style=\"font-family:Malgun Gothic\">기여합니다</span>.</span></li>\r\n\t\t\t\t<li style=\"font-family:Calibri\"><span lang=\"en-US\"><span style=\"font-family:Malgun Gothic;font-weight:bold\">마그네슘</span><span style=\"font-weight:bold\">￼</span><span style=\"font-family:Malgun Gothic\">스트레스와</span> <span style=\"font-family:Malgun Gothic\">우울증을</span> <span style=\"font-family:Malgun Gothic\">완화하는</span> <span style=\"font-family:Malgun Gothic\">데</span> <span style=\"font-family:Malgun Gothic\">도움이</span> <span style=\"font-family:Malgun Gothic\">될</span> <span style=\"font-family:Malgun Gothic\">수</span> <span style=\"font-family:Malgun Gothic\">있습니다</span>.</span></li>\r\n\t\t\t\t<li style=\"font-family:Calibri\"><span lang=\"en-US\"><span style=\"font-family:Malgun Gothic;font-weight:bold\">아연</span><span style=\"font-weight:bold\"> (Zinc)</span><span style=\"font-weight:bold\">￼</span><span style=\"font-family:Malgun Gothic\">우울증과</span> <span style=\"font-family:Malgun Gothic\">관련된</span> <span style=\"font-family:Malgun Gothic\">염증</span> <span style=\"font-family:Malgun Gothic\">감소</span> <span style=\"font-family:Malgun Gothic\">및</span> <span style=\"font-family:Malgun Gothic\">면역</span> <span style=\"font-family:Malgun Gothic\">체계</span> <span style=\"font-family:Malgun Gothic\">개선에</span> <span style=\"font-family:Malgun Gothic\">기여할</span> <span style=\"font-family:Malgun Gothic\">수</span> <span style=\"font-family:Malgun Gothic\">있습니다</span>.</span></li>\r\n\t\t\t</ul>\r\n\t\t\t<br />\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:16pt;font-weight:bold\">3. </span><span style=\"font-family:Malgun Gothic;font-size:16pt;font-weight:bold\">허브</span><span style=\"font-size:16pt;font-weight:bold\"> </span><span style=\"font-family:Malgun Gothic;font-size:16pt;font-weight:bold\">및</span><span style=\"font-size:16pt;font-weight:bold\"> </span><span style=\"font-family:Malgun Gothic;font-size:16pt;font-weight:bold\">천연</span><span style=\"font-size:16pt;font-weight:bold\"> </span><span style=\"font-family:Malgun Gothic;font-size:16pt;font-weight:bold\">보충제</span></p>\r\n\t\t\t<ul>\r\n\t\t\t\t<li style=\"font-family:Calibri\"><span lang=\"en-US\"><span style=\"font-family:Malgun Gothic;font-weight:bold\">아슈와간다</span><span style=\"font-weight:bold\"> (Ashwagandha)</span><span style=\"font-weight:bold\">￼</span><span style=\"font-family:Malgun Gothic\">스트레스를</span> <span style=\"font-family:Malgun Gothic\">줄이고</span> <span style=\"font-family:Malgun Gothic\">코티솔</span> <span style=\"font-family:Malgun Gothic\">수치를</span> <span style=\"font-family:Malgun Gothic\">조절하는</span> <span style=\"font-family:Malgun Gothic\">데</span> <span style=\"font-family:Malgun Gothic\">도움을</span> <span style=\"font-family:Malgun Gothic\">줄</span> <span style=\"font-family:Malgun Gothic\">수</span> <span style=\"font-family:Malgun Gothic\">있는</span> <span style=\"font-family:Malgun Gothic\">아답토젠</span> <span style=\"font-family:Malgun Gothic\">허브입니다</span>.</span></li>\r\n\t\t\t\t<li style=\"font-family:Calibri\"><span lang=\"en-US\"><span style=\"font-family:Malgun Gothic;font-weight:bold\">로디올라</span><span style=\"font-weight:bold\"> </span><span style=\"font-family:Malgun Gothic;font-weight:bold\">로세아</span><span style=\"font-weight:bold\"> (Rhodiola Rosea)</span><span style=\"font-weight:bold\">￼</span><span style=\"font-family:Malgun Gothic\">피로와</span> <span style=\"font-family:Malgun Gothic\">스트레스</span> <span style=\"font-family:Malgun Gothic\">감소</span>, <span style=\"font-family:Malgun Gothic\">기분</span> <span style=\"font-family:Malgun Gothic\">개선에</span> <span style=\"font-family:Malgun Gothic\">효과가</span> <span style=\"font-family:Malgun Gothic\">있다고</span> <span style=\"font-family:Malgun Gothic\">보고되었습니다</span>.</span></li>\r\n\t\t\t\t<li style=\"font-family:Calibri\"><span lang=\"en-US\"><span style=\"font-family:Malgun Gothic;font-weight:bold\">세인트존스워트</span><span style=\"font-weight:bold\"> (St. John&#39;s Wort)</span><span style=\"font-weight:bold\">￼</span><span style=\"font-family:Malgun Gothic\">경증에서</span> <span style=\"font-family:Malgun Gothic\">중등도의</span> <span style=\"font-family:Malgun Gothic\">우울증</span> <span style=\"font-family:Malgun Gothic\">완화에</span> <span style=\"font-family:Malgun Gothic\">도움을</span> <span style=\"font-family:Malgun Gothic\">줄</span> <span style=\"font-family:Malgun Gothic\">수</span> <span style=\"font-family:Malgun Gothic\">있지만</span>, <span style=\"font-family:Malgun Gothic\">다른</span> <span style=\"font-family:Malgun Gothic\">약물과</span> <span style=\"font-family:Malgun Gothic\">상호작용이</span> <span style=\"font-family:Malgun Gothic\">있을</span> <span style=\"font-family:Malgun Gothic\">수</span> <span style=\"font-family:Malgun Gothic\">있으니</span> <span style=\"font-family:Malgun Gothic\">주의해야</span> <span style=\"font-family:Malgun Gothic\">합니다</span>.</span></li>\r\n\t\t\t</ul>\r\n\t\t\t<br />\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:16pt;font-weight:bold\">4. </span><span style=\"font-family:Malgun Gothic;font-size:16pt;font-weight:bold\">오메가</span><span style=\"font-size:16pt;font-weight:bold\">-3 </span><span style=\"font-family:Malgun Gothic;font-size:16pt;font-weight:bold\">지방산</span></p>\r\n\t\t\t<ul>\r\n\t\t\t\t<li style=\"font-family:Calibri\"><span lang=\"en-US\"><span style=\"font-weight:bold\">EPA </span><span style=\"font-family:Malgun Gothic;font-weight:bold\">및</span><span style=\"font-weight:bold\"> DHA</span><span style=\"font-weight:bold\">￼</span><span style=\"font-family:Malgun Gothic\">항염증</span> <span style=\"font-family:Malgun Gothic\">효과가</span> <span style=\"font-family:Malgun Gothic\">있으며</span>, <span style=\"font-family:Malgun Gothic\">우울증과</span> <span style=\"font-family:Malgun Gothic\">관련된</span> <span style=\"font-family:Malgun Gothic\">증상</span> <span style=\"font-family:Malgun Gothic\">완화에</span> <span style=\"font-family:Malgun Gothic\">도움을</span> <span style=\"font-family:Malgun Gothic\">줄</span> <span style=\"font-family:Malgun Gothic\">수</span> <span style=\"font-family:Malgun Gothic\">있습니다</span>. <span style=\"font-family:Malgun Gothic\">주로</span> <span style=\"font-family:Malgun Gothic\">생선기름</span> <span style=\"font-family:Malgun Gothic\">보충제를</span> <span style=\"font-family:Malgun Gothic\">통해</span> <span style=\"font-family:Malgun Gothic\">섭취할</span> <span style=\"font-family:Malgun Gothic\">수</span> <span style=\"font-family:Malgun Gothic\">있습니다</span>.</span></li>\r\n\t\t\t</ul>\r\n\t\t\t<br />\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:16pt;font-weight:bold\">5. </span><span style=\"font-family:Malgun Gothic;font-size:16pt;font-weight:bold\">프로바이오틱스</span></p>\r\n\t\t\t<ul>\r\n\t\t\t\t<li style=\"font-family:Calibri\"><span lang=\"en-US\"><span style=\"font-family:Malgun Gothic;font-weight:bold\">장</span><span style=\"font-weight:bold\">-</span><span style=\"font-family:Malgun Gothic;font-weight:bold\">뇌</span><span style=\"font-weight:bold\"> </span><span style=\"font-family:Malgun Gothic;font-weight:bold\">축</span><span style=\"font-weight:bold\"> </span><span style=\"font-family:Malgun Gothic;font-weight:bold\">연결</span><span style=\"font-weight:bold\"> (Gut-Brain Axis)</span><span style=\"font-weight:bold\">￼</span><span style=\"font-family:Malgun Gothic\">장내</span> <span style=\"font-family:Malgun Gothic\">미생물</span> <span style=\"font-family:Malgun Gothic\">군집을</span> <span style=\"font-family:Malgun Gothic\">개선함으로써</span> <span style=\"font-family:Malgun Gothic\">우울증</span> <span style=\"font-family:Malgun Gothic\">및</span> <span style=\"font-family:Malgun Gothic\">스트레스</span> <span style=\"font-family:Malgun Gothic\">조절에</span> <span style=\"font-family:Malgun Gothic\">도움을</span> <span style=\"font-family:Malgun Gothic\">줄</span> <span style=\"font-family:Malgun Gothic\">수</span> <span style=\"font-family:Malgun Gothic\">있습니다</span>.</span></li>\r\n\t\t\t</ul>\r\n\t\t\t<br />\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:16pt;font-weight:bold\">6. </span><span style=\"font-family:Malgun Gothic;font-size:16pt;font-weight:bold\">약물</span><span style=\"font-size:16pt;font-weight:bold\"> (</span><span style=\"font-family:Malgun Gothic;font-size:16pt;font-weight:bold\">의사의</span><span style=\"font-size:16pt;font-weight:bold\"> </span><span style=\"font-family:Malgun Gothic;font-size:16pt;font-weight:bold\">처방</span><span style=\"font-size:16pt;font-weight:bold\"> </span><span style=\"font-family:Malgun Gothic;font-size:16pt;font-weight:bold\">필요</span><span style=\"font-size:16pt;font-weight:bold\">)</span></p>\r\n\t\t\t<ul>\r\n\t\t\t\t<li style=\"font-family:Calibri\"><span lang=\"en-US\"><span style=\"font-family:Malgun Gothic;font-weight:bold\">항우울제</span><span style=\"font-weight:bold\"> (SSRIs, SNRIs, Tricyclic Antidepressants </span><span style=\"font-family:Malgun Gothic;font-weight:bold\">등</span><span style=\"font-weight:bold\">)</span><span style=\"font-weight:bold\">￼</span><span style=\"font-family:Malgun Gothic\">심한</span> <span style=\"font-family:Malgun Gothic\">우울증의</span> <span style=\"font-family:Malgun Gothic\">경우</span> <span style=\"font-family:Malgun Gothic\">의사의</span> <span style=\"font-family:Malgun Gothic\">처방을</span> <span style=\"font-family:Malgun Gothic\">받아</span> <span style=\"font-family:Malgun Gothic\">적절한</span> <span style=\"font-family:Malgun Gothic\">항우울제를</span> <span style=\"font-family:Malgun Gothic\">사용하는</span> <span style=\"font-family:Malgun Gothic\">것이</span> <span style=\"font-family:Malgun Gothic\">중요합니다</span>.</span></li>\r\n\t\t\t\t<li style=\"font-family:Calibri\"><span lang=\"en-US\"><span style=\"font-family:Malgun Gothic;font-weight:bold\">항불안제</span><span style=\"font-weight:bold\"> (Benzodiazepines </span><span style=\"font-family:Malgun Gothic;font-weight:bold\">등</span><span style=\"font-weight:bold\">)</span><span style=\"font-weight:bold\">￼</span><span style=\"font-family:Malgun Gothic\">스트레스와</span> <span style=\"font-family:Malgun Gothic\">불안</span> <span style=\"font-family:Malgun Gothic\">증상을</span> <span style=\"font-family:Malgun Gothic\">단기적으로</span> <span style=\"font-family:Malgun Gothic\">완화할</span> <span style=\"font-family:Malgun Gothic\">수</span> <span style=\"font-family:Malgun Gothic\">있습니다</span>.</span></li>\r\n\t\t\t</ul>\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">1/ <span lang=\"ko-KR\">기분과</span> <span lang=\"ko-KR\">체력을</span> <span lang=\"ko-KR\">분간해라</span></p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">일단<span lang=\"en-US\"> </span>뭔가를<span lang=\"en-US\"> </span>먹고<span lang=\"en-US\">, </span>산책하면서<span lang=\"en-US\"> </span>공기를<span lang=\"en-US\"> </span>마시고<span lang=\"en-US\">, </span>잠을<span lang=\"en-US\"> </span>청하면서<span lang=\"en-US\"> </span>본원적인<span lang=\"en-US\"> </span>체력과<span lang=\"en-US\"> </span>몸의<span lang=\"en-US\"> </span>컨디션을<span lang=\"en-US\"> </span>회복해라<span lang=\"en-US\">.</span></p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">그리고<span lang=\"en-US\"> </span>나서<span lang=\"en-US\"> </span>생각해<span lang=\"en-US\">.</span></p>\r\n\t\t\t<br />\r\n\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">좋은 기분을 유지해￼<span lang=\"ko-KR\">생각하지마</span>. <span lang=\"ko-KR\">그냥해</span>. <span lang=\"ko-KR\">느끼지도마</span> <span lang=\"ko-KR\">그냥</span> <span lang=\"ko-KR\">해</span>.</p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-weight:bold\">뭐든</span><span lang=\"en-US\" style=\"font-weight:bold\"> </span><span style=\"font-weight:bold\">할</span><span lang=\"en-US\" style=\"font-weight:bold\"> </span><span style=\"font-weight:bold\">수</span><span lang=\"en-US\" style=\"font-weight:bold\"> </span><span style=\"font-weight:bold\">있고</span><span lang=\"en-US\" style=\"font-weight:bold\">, </span><span style=\"font-weight:bold\">뭐든</span><span lang=\"en-US\" style=\"font-weight:bold\"> </span><span style=\"font-weight:bold\">해도</span><span lang=\"en-US\" style=\"font-weight:bold\"> </span><span style=\"font-weight:bold\">돼</span><span lang=\"en-US\" style=\"font-weight:bold\">. </span><span style=\"font-weight:bold\">죽이는거</span><span lang=\"en-US\" style=\"font-weight:bold\"> </span><span style=\"font-weight:bold\">죽는</span><span lang=\"en-US\" style=\"font-weight:bold\"> </span><span style=\"font-weight:bold\">것</span><span lang=\"en-US\" style=\"font-weight:bold\"> </span><span style=\"font-weight:bold\">빼고</span><span lang=\"en-US\" style=\"font-weight:bold\">.</span></p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-weight:bold\">각오해</span><span lang=\"en-US\" style=\"font-weight:bold\">, </span><span style=\"font-weight:bold\">거절과</span><span lang=\"en-US\" style=\"font-weight:bold\"> </span><span style=\"font-weight:bold\">거절사이의</span><span lang=\"en-US\" style=\"font-weight:bold\"> </span><span style=\"font-weight:bold\">수</span><span lang=\"en-US\" style=\"font-weight:bold\"> </span><span style=\"font-weight:bold\">많은</span><span lang=\"en-US\" style=\"font-weight:bold\"> </span><span style=\"font-weight:bold\">거절이</span></p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-weight:bold\">네가</span><span lang=\"en-US\" style=\"font-weight:bold\"> </span><span style=\"font-weight:bold\">맞닥드릴</span><span lang=\"en-US\" style=\"font-weight:bold\"> </span><span style=\"font-weight:bold\">관계야</span><span lang=\"en-US\" style=\"font-weight:bold\">.</span></p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">나는<span lang=\"en-US\"> </span>나야<span lang=\"en-US\">, </span>순대국밥<span lang=\"en-US\"> </span>잘하는<span lang=\"en-US\"> </span>이탈리안<span lang=\"en-US\"> </span>맛집에<span lang=\"en-US\"> </span>될<span lang=\"en-US\"> </span>수<span lang=\"en-US\"> </span>없어<span lang=\"en-US\">.</span></p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">내<span lang=\"en-US\"> </span>최고의<span lang=\"en-US\"> </span>것으로<span lang=\"en-US\"> </span>승부를<span lang=\"en-US\"> </span>봐야해<span lang=\"en-US\">. </span>유머감각<span lang=\"en-US\">, </span>지적능력<span lang=\"en-US\">, </span>배려<span lang=\"en-US\">. </span>지치지<span lang=\"en-US\"> </span>않는<span lang=\"en-US\"> </span>마음<span lang=\"en-US\">.</span></p>\r\n\t\t\t<br />\r\n\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">&quot;<span lang=\"ko-KR\">니가</span> <span lang=\"ko-KR\">뭐가</span> <span lang=\"ko-KR\">모자라서</span> <span lang=\"ko-KR\">그런</span> <span lang=\"ko-KR\">힘든</span> <span lang=\"ko-KR\">연애를하려고</span> <span lang=\"ko-KR\">해</span>&quot;</p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">너 나름 괜찮아. <span lang=\"ko-KR\">자신감</span> <span lang=\"ko-KR\">가져도</span> <span lang=\"ko-KR\">돼</span>. <span lang=\"ko-KR\">어린</span> <span lang=\"ko-KR\">여자만나서</span> <span lang=\"ko-KR\">애</span> <span lang=\"ko-KR\">낳을</span> <span lang=\"ko-KR\">수도</span> <span lang=\"ko-KR\">있지</span>.</p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">뭐 아쉬울 건 없잖아, 컨<span lang=\"ko-KR\">틴</span>시란걸 <span lang=\"ko-KR\">잊지마</span>. 니가 생각한 그 사람이 아닐 수 있어.</p>\r\n\t\t\t<br />\r\n\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">미칠걸 찾아 _ 중장기 목표, 사람들 인맥 복구.수다 떨어 카톡으로</p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">담배.술. 절대. 더 악화됨</p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">내가 유예했다고 믿었던 것들은 그 시간과 함께 사라졌어,</p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">없다고. 그걸 인정해.</p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">받아들여 쫓아다녀야해 운명이야 <a href=\"https://www.couple.net/kr/archive/singles-advice-view-1499926L.html\">https://www.couple.net/kr/archive/singles-advice-view-1499926L.html</a></p>\r\n\t\t\t<br />\r\n\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">바빠야해</p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">문제<span lang=\"en-US\">: </span>술<span lang=\"en-US\"> </span>말고는<span lang=\"en-US\"> </span>삶을<span lang=\"en-US\"> </span>지탱할<span lang=\"en-US\"> </span>낙이<span lang=\"en-US\"> </span>없어<span lang=\"en-US\">.</span></p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">내가<span lang=\"en-US\"> </span>가진<span lang=\"en-US\"> </span>서사는<span lang=\"en-US\"> </span>이게<span lang=\"en-US\"> </span>다인가<span lang=\"en-US\">? 기대감. 이게 없어 지금은. </span>벌써<span lang=\"en-US\"> </span>이게<span lang=\"en-US\"> 5</span>년째<span lang=\"en-US\">. </span></p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">내가 내 삶에 간절히 원하는게 결혼뿐인 노총각이 되어버리다니.</p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">난 사냥개야 뭔가 쫓을게 없으면 스스로를 먹어치우지. 음식이나.</p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">미칠게 없으면 미치는 사람이야. 집중할걸 찾아 <span lang=\"ko-KR\">식음을</span> <span lang=\"ko-KR\">전폐하고</span> <span lang=\"ko-KR\">몰입할</span> <span lang=\"ko-KR\">무언가</span>.</p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">넌 상어, 바람, 광기와 집착만이 널 살게해. 그걸 못찾으면 넌 반드시 죽어.</p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">삶에 대한 이야기는 궁금해하는게 아니야, 만들어가는거지. 근데 난 궁금해하고 기대하기만했어 뭔가 다가오기를, 일어나기를.</p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">SOMETHING GREAT. </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">감히</span><span style=\"font-family:Malgun Gothic\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">상상도</span><span style=\"font-family:Malgun Gothic\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">못할</span><span style=\"font-family:Malgun Gothic\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">것</span><span style=\"font-family:Malgun Gothic\">. </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">아주</span><span style=\"font-family:Malgun Gothic\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">평범하지만</span><span style=\"font-family:Malgun Gothic\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">나라면</span><span style=\"font-family:Malgun Gothic\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">지극히</span><span style=\"font-family:Malgun Gothic\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">위대하게</span><span style=\"font-family:Malgun Gothic\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">만들</span><span style=\"font-family:Malgun Gothic\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">수</span><span style=\"font-family:Malgun Gothic\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">있는</span><span style=\"font-family:Malgun Gothic\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">것</span><span style=\"font-family:Malgun Gothic\">.</span></p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">--&gt; </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">그런건</span><span style=\"font-family:Malgun Gothic\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">없어</span><span style=\"font-family:Malgun Gothic\">, </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">아주</span><span style=\"font-family:Malgun Gothic\">, </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">지극히</span><span style=\"font-family:Malgun Gothic\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">평범한</span><span style=\"font-family:Malgun Gothic\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">것의</span><span style=\"font-family:Malgun Gothic\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">위대한</span><span style=\"font-family:Malgun Gothic\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">반복만이</span><span style=\"font-family:Malgun Gothic\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">존재할</span><span style=\"font-family:Malgun Gothic\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">뿐</span><span style=\"font-family:Malgun Gothic\">.</span></p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">일이었으면<span lang=\"en-US\"> </span>좋겠고<span lang=\"en-US\">, </span>그<span lang=\"en-US\"> </span>과정에서<span lang=\"en-US\"> </span>배우고<span lang=\"en-US\"> </span>성장하는<span lang=\"en-US\"> </span>것이면<span lang=\"en-US\"> </span>더<span lang=\"en-US\"> </span>좋아<span lang=\"en-US\">.</span></p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">지금 내게 없는거, 결핍. 그걸 매일 환기시켜야해. 스스로를 화나게해.</p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">만드는<span lang=\"en-US\"> </span>법을<span lang=\"en-US\"> </span>배워<span lang=\"en-US\">, </span>음악만드는<span lang=\"en-US\"> </span>법<span lang=\"en-US\">, </span>문서만드는법<span lang=\"en-US\">, </span>사업만드는법<span lang=\"en-US\">, </span>게임만드는<span lang=\"en-US\"> </span>법<span lang=\"en-US\">, </span>오감을<span lang=\"en-US\"> </span>만드는법<span lang=\"en-US\">, </span>요리하는<span lang=\"en-US\"> </span>법<span lang=\"en-US\">,</span>시간을<span lang=\"en-US\"> </span>넣어</p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">집중력을<span lang=\"en-US\"> </span>높이는법<span lang=\"en-US\">, </span></p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">1/ <span lang=\"ko-KR\">일의</span> <span lang=\"ko-KR\">난이도가</span> <span lang=\"ko-KR\">낮아서</span> <span lang=\"ko-KR\">집중이</span> <span lang=\"ko-KR\">안되는</span> <span lang=\"ko-KR\">경우</span> -&gt; <span lang=\"ko-KR\">속도를</span> <span lang=\"ko-KR\">빠르게</span>. </p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">2/ <span lang=\"ko-KR\">일의</span> <span lang=\"ko-KR\">난이도가</span> <span lang=\"ko-KR\">높은</span> <span lang=\"ko-KR\">경우</span> -&gt; <span lang=\"ko-KR\">완성도를</span> <span lang=\"ko-KR\">높게</span>.</p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">3/ <span lang=\"ko-KR\">컨디션이</span> <span lang=\"ko-KR\">안좋은</span> <span lang=\"ko-KR\">경우</span> -&gt; <span lang=\"ko-KR\">휴식을</span> <span lang=\"ko-KR\">취해야</span> <span lang=\"ko-KR\">할</span> <span lang=\"ko-KR\">정도로</span> <span lang=\"ko-KR\">피로도를</span> <span lang=\"ko-KR\">높인다</span>. -&gt; <span lang=\"ko-KR\">쉰다</span> -&gt; <span lang=\"ko-KR\">집중한다</span>.</p>\r\n\t\t\t<br />\r\n\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">Growth/Learning roof <span lang=\"ko-KR\">설계</span></p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">Goal - Strategy - practice - feedback/Teaching </p>\r\n\t\t\t<br />\r\n\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">Pact: <span lang=\"ko-KR\">새로운</span> <span lang=\"ko-KR\">스킬을</span> <span lang=\"ko-KR\">사람들에게</span> <span lang=\"ko-KR\">공개</span></p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">Act: <span lang=\"ko-KR\">지속적으로</span> <span lang=\"ko-KR\">공부하고</span> <span lang=\"ko-KR\">연마하고</span>, <span lang=\"ko-KR\">이</span> <span lang=\"ko-KR\">과정을</span> <span lang=\"ko-KR\">공유하라</span></p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">Re <span lang=\"ko-KR\">확인</span>: <span lang=\"ko-KR\">프로젝트를</span> <span lang=\"ko-KR\">만들어</span> <span lang=\"ko-KR\">실제</span> <span lang=\"ko-KR\">성과로</span> <span lang=\"ko-KR\">산출물을</span> <span lang=\"ko-KR\">낸다</span></p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">In <span lang=\"ko-KR\">영향력</span>: <span lang=\"ko-KR\">기술이</span> <span lang=\"ko-KR\">숙달되면</span> <span lang=\"ko-KR\">좀</span> <span lang=\"ko-KR\">더의미있는</span> <span lang=\"ko-KR\">일을</span> <span lang=\"ko-KR\">하라</span>.</p>\r\n\t\t\t<br />\r\n\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">VC<span lang=\"ko-KR\">심사역</span> <span lang=\"ko-KR\">혹은</span> Startup <span lang=\"ko-KR\">멤버로써</span> <span lang=\"ko-KR\">필요한</span> Skill set: <span lang=\"ko-KR\">코딩</span>/ <span lang=\"ko-KR\">기획</span>/ <span lang=\"ko-KR\" style=\"font-weight:bold\">마케팅</span>/ </p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">링크드인<span lang=\"en-US\"> </span>글래스도어에서<span lang=\"en-US\"> </span>찾아보자<span lang=\"en-US\">.</span></p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">어떤<span lang=\"en-US\"> </span>분야의<span lang=\"en-US\"> </span>심사역이<span lang=\"en-US\"> </span>되고<span lang=\"en-US\"> </span>싶어<span lang=\"en-US\">? </span>어떤<span lang=\"en-US\"> </span>분야를<span lang=\"en-US\"> </span>창업하고<span lang=\"en-US\"> </span>싶어<span lang=\"en-US\">?</span></p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">원노트<span lang=\"en-US\">MVP </span>책<span lang=\"en-US\">?</span></p>\r\n\t\t\t<p data-tag=\"to-do\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">원노트<span lang=\"en-US\"> </span>인스타그램<span lang=\"en-US\"> </span>운영</p>\r\n\t\t\t<p data-tag=\"to-do\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">블로그<span lang=\"en-US\"> </span>운영</p>\r\n\t\t\t<p data-tag=\"to-do\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">주식<span lang=\"en-US\">/</span>부동산<span lang=\"en-US\"> </span>공부</p>\r\n\t\t\t<p data-tag=\"to-do\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">내가<span lang=\"en-US\"> </span>미쳤던<span lang=\"en-US\"> </span>것들<span lang=\"en-US\"> - PPT </span>제안서<span lang=\"en-US\">. </span>엑셀작업<span lang=\"en-US\">.</span></p>\r\n\t\t\t<p lang=\"en-US\" data-tag=\"to-do\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">Valuation DCF</p>\r\n\t\t\t<p lang=\"en-US\" data-tag=\"to-do\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">Shadowing</p>\r\n\t\t\t<p data-tag=\"to-do\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">영문<span lang=\"en-US\"> </span>필사<span lang=\"en-US\">, </span>계약서<span lang=\"en-US\"> </span>필사</p>\r\n\t\t\t<p data-tag=\"to-do\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">벤이<span lang=\"en-US\"> </span>했던<span lang=\"en-US\"> </span>모든<span lang=\"en-US\"> </span>문서<span lang=\"en-US\"> </span>읽어보기</p>\r\n\t\t\t<p lang=\"en-US\" data-tag=\"to-do\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">책 읽기</p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">취업시즌에<span lang=\"en-US\"> </span>나<span lang=\"en-US\"> </span>진짜<span lang=\"en-US\"> </span>멋지게<span lang=\"en-US\"> </span>살았잖아<span lang=\"en-US\">. </span>그렇게<span lang=\"en-US\"> </span>해<span lang=\"en-US\">. </span>딱<span lang=\"en-US\"> 3</span>개월만<span lang=\"en-US\"> </span>해보자<span lang=\"en-US\">. </span>지원님은<span lang=\"en-US\"> </span>잊고<span lang=\"en-US\">.</span></p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">아침에<span lang=\"en-US\"> </span>뭔가<span lang=\"en-US\"> </span>운동을<span lang=\"en-US\"> </span>하고<span lang=\"en-US\"> </span>출근해<span lang=\"en-US\">.</span></p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">되도록 회사에서 많안 것을 읽고, 연습해</p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">한정거장<span lang=\"en-US\"> </span>전에<span lang=\"en-US\"> </span>내려서<span lang=\"en-US\"> </span>걸어가</p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">한정거장<span lang=\"en-US\"> </span>전에<span lang=\"en-US\"> </span>내려서<span lang=\"en-US\"> </span>걸어오고</p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">이동하는<span lang=\"en-US\"> </span>동안<span lang=\"en-US\"> </span>영어로된<span lang=\"en-US\"> </span>뭔가를<span lang=\"en-US\"> </span>들어</p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">집에와서는<span lang=\"en-US\"> </span>집중해서<span lang=\"en-US\"> </span>영어<span lang=\"en-US\"> 4</span>시간<span lang=\"en-US\">, </span>재무공부<span lang=\"en-US\"> 2</span>시간<span lang=\"en-US\"> </span>하고<span lang=\"en-US\"> 12</span>시에<span lang=\"en-US\"> </span>딱<span lang=\"en-US\"> </span>잠에<span lang=\"en-US\"> </span>드는거야<span lang=\"en-US\">. </span>절대<span lang=\"en-US\"> </span>술<span lang=\"en-US\"> </span>먹지<span lang=\"en-US\"> </span>말고<span lang=\"en-US\">.</span></p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">날 위한 보상은? 먹는건 안돼. 넷플릭스는 다큐만. 인스타에 글스기? 음악. 영상제작. 그림. 피아노</p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">드럼. 스케치 배우기. 체스, 기타연주, 소재공학, 암산하는법</p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">일단 엑셀 포메팅을 마스터하자</p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">원인<span lang=\"en-US\">: </span>인생에<span lang=\"en-US\"> </span>의미가<span lang=\"en-US\"> </span>없다는<span lang=\"en-US\"> </span>것은<span lang=\"en-US\"> </span>깨달았는데<span lang=\"en-US\">,</span></p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">내<span lang=\"en-US\"> </span>인생의<span lang=\"en-US\"> </span>의미를<span lang=\"en-US\"> </span>어떻게<span lang=\"en-US\"> </span>부여할지에<span lang=\"en-US\"> </span>대한<span lang=\"en-US\"> </span>생각<span lang=\"en-US\"> </span>없이</p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">시간<span lang=\"en-US\">/ </span>공간<s let cards = [];

const GRID = 20, GAP = 14;
function snap(v) { return Math.round(v / GRID) * GRID; }

// ── Undo (Ctrl+Z) ────────────────────────────────────────────────────────────
const MAX_HISTORY = 50;
let history = [];
function snapshot() {
  syncText();
  history.push(JSON.stringify(cards));
  if (history.length > MAX_HISTORY) history.shift();
}
function undo() {
  if (!history.length) { showStatus('되돌릴 내용 없음'); return; }
  syncText();
  cards = JSON.parse(history.pop());
  renderCards();
  saveBoard();
  showStatus('↩ 되돌림');
}
function showStatus(msg) {
  const s = document.getElementById('status');
  s.textContent = msg;
  clearTimeout(showStatus._t);
  showStatus._t = setTimeout(() => { s.textContent = ''; }, 2000);
}
document.addEventListener('keydown', e => {
  const isText = document.activeElement?.contentEditable === 'true';
  if ((e.ctrlKey || e.metaKey) && e.key === 'z' && !e.shiftKey) {
    if (isText) return;
    e.preventDefault();
    undo();
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'c' && !e.shiftKey && !isText) {
    if (selectedIdx !== null && cards[selectedIdx]) {
      syncText();
      clipboardCard = JSON.parse(JSON.stringify(cards[selectedIdx]));
      showStatus('카드 복사됨');
      e.preventDefault();
    }
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'v' && !e.shiftKey && !isText) {
    if (clipboardCard) {
      e.preventDefault();
      snapshot();
      const nc = JSON.parse(JSON.stringify(clipboardCard));
      nc.x = (nc.x || 0) + 30; nc.y = (nc.y || 0) + 30;
      cards.push(nc);

  }

    document.querySelectorAll('.card.selected').forEach(c => c.classList.remove('selected'));
    selectedIdx = null;
  }
});

function pushCards(movedIdx) {
  const moved = cards[movedIdx];
  const movedEl = document.querySelector(`.card[data-idx="${movedIdx}"]`);
  if (!movedEl) return;
  const mh = movedEl.offsetHeight;
  document.querySelectorAll('.card').forEach(el => {
    const i = +el.dataset.idx;
    if (i === movedIdx) return;
    const c = cards[i], oh = el.offsetHeight;
    if (moved.x < (c.x+(c.w||200)) && (moved.x+(moved.w||200)) > c.x && moved.y < (c.y+oh) && (moved.y+mh) > c.y) {
      c.y = moved.y + mh + GAP;
      el.style.top = c.y + 'px';
    }
  });
}

function loadBoard() {

  const savedHash = localStorage.getItem(SAVE_KEY + ':hash');
  let parsed = null;
  try { parsed = saved ? JSON.parse(saved) : null; } catch(e) {}

  if (!parsed || parsed.length === 0 || savedHash !== CONTENT_HASH) {
    cards = DEFAULT_CARDS.map(c => ({...c}));
    localStorage.removeItem(SAVE_KEY);
    localStorage.setItem(SAVE_KEY + ':hash', CONTENT_HASH);
    renderCards();
    const hasCoords = cards.some(c => c.x !== undefined && c.y !== undefined);
    if (!hasCoords) autoLayout();
    return;
  }
  cards = parsed;

}
function resetToDefaults() { if (!confirm('저장된 보드를 지우고 원본으로 초기화합니다. 계속할까요?')) return; localStorage.removeItem(SAVE_KEY); cards = DEFAULT_CARDS.map(c => ({...c})); renderCards(); autoLayout(); }

function autoLayout() {
  const boardW = document.getElementById('board').offsetWidth;
  const cols = Math.max(1, Math.floor(boardW / 280));
  const colW = (boardW - GAP*(cols-1)) / cols;
  const colH = new Array(cols).fill(0);
  const allCards = document.querySelectorAll('.card');
  const images = document.querySelectorAll('.card img');
  let loaded = 0;
  function place() {
    allCards.forEach((el, i) => {
      const w = Math.min(cards[i].w || colW, colW);
      let minCol = 0;
      for (let c = 1; c < cols; c++) if (colH[c] < colH[minCol]) minCol = c;
      cards[i].x = minCol * (colW + GAP);
      cards[i].y = colH[minCol];
      cards[i].w = w;
      el.style.left = cards[i].x + 'px';
      el.style.top = cards[i].y + 'px';
      el.style.width = w + 'px';
      colH[minCol] = cards[i].y + el.offsetHeight + GAP;
    });
    document.getElementById('board').style.minHeight = (Math.max(...colH) + 100) + 'px';
    saveBoard();
  }
  if (!images.length) { requestAnimationFrame(place); return; }
  images.forEach(img => {
    if (img.complete) { loaded++; if (loaded >= images.length) requestAnimationFrame(place); }
    else { img.onload = img.onerror = () => { loaded++; if (loaded >= images.length) requestAnimationFrame(place); }; }
  });
}

function syncText() {
  document.querySelectorAll('.card').forEach(el => {
    const i = +el.dataset.idx;
    if (cards[i]?.type === 'text') { const t = el.querySelector('.text'); if (t) cards[i].content = t.innerHTML; }
  });
}

document.addEventListener('mousemove', e => {

let zoom = parseFloat(localStorage.getItem('zoom-' + SAVE_KEY) || '1.0');

  const board = document.getElementById('board');
  board.style.transform = `scale(${zoom})`;
  board.style.transformOrigin = '0 0';
  document.getElementById('zoom-level').textContent = Math.round(zoom * 100) + '%';
  localStorage.setItem('zoom-' + SAVE_KEY, zoom);
}
function zoomIn()  { zoom = Math.min(3.0, parseFloat((zoom + 0.1).toFixed(2))); applyZoom(); }
function zoomOut() { zoom = Math.max(0.2, parseFloat((zoom - 0.1).toFixed(2))); applyZoom(); }
document.addEventListener('keydown', e => {
  if (e.ctrlKey || e.metaKey) {
    if (e.key === '=' || e.key === '+') { e.preventDefault(); zoomIn(); }
    if (e.key === '-')                  { e.preventDefault(); zoomOut(); }
    if (e.key === '0')                  { e.preventDefault(); zoom = 1.0; applyZoom(); }
  }
});
document.getElementById('board').addEventListener('wheel', e => {

  e.preventDefault();

}, { passive: false });
applyZoom();
function resetLayout() { if (!confirm('자동 재배치합니다.')) return; cards.forEach(c => { delete c.x; delete c.y; }); renderCards(); autoLayout(); }
// ── Floating format toolbar ───────────────────────────────────────────────────
const fmtBar = document.getElementById('format-toolbar');
function fmt(cmd) { document.execCommand(cmd, false, null); saveBoard(); }
function fmtLink() {
  const sel = window.getSelection();
  if (!sel || sel.isCollapsed) return;
  const url = prompt('링크 URL 입력', 'https://');
  if (!url) return;
  document.execCommand('createLink', false, url);
  // make links open in new tab
  sel.anchorNode?.parentElement?.closest('a')?.setAttribute('target', '_blank');
  document.querySelectorAll('.text a').forEach(a => a.target = '_blank');
  saveBoard();
}

// prevent format buttons from blurring contenteditable
fmtBar.addEventListener('mousedown', e => e.preventDefault());

document.addEventListener('selectionchange', () => {
  const sel = window.getSelection();
  if (!sel || sel.isCollapsed || !sel.toString().trim()) { fmtBar.style.display = 'none'; return; }
  // only show if selection is inside a .text element
  const anchor = sel.anchorNode;
  if (!anchor) { fmtBar.style.display = 'none'; return; }
  const textEl = anchor.nodeType === 1 ? anchor.closest('.text') : anchor.parentElement?.closest('.text');
  if (!textEl) { fmtBar.style.display = 'none'; return; }
  // position above selection
  const range = sel.getRangeAt(0);
  const rect = range.getBoundingClientRect();
  fmtBar.style.display = 'flex';
  const tbW = fmtBar.offsetWidth || 180;
  let left = rect.left + rect.width / 2 - tbW / 2;
  left = Math.max(8, Math.min(left, window.innerWidth - tbW - 8));
  fmtBar.style.left = left + 'px';
  fmtBar.style.top = (rect.top - 44 + window.scrollY) + 'px';
});

setInterval(saveBoard, 30000);
loadBoard();
</script>
</body>
</html>
