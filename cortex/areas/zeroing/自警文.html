<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>自警文</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1e1e1e; color: #e0e0e0; font-family: 'Segoe UI', -apple-system, sans-serif; font-size: 15px; line-height: 1.6; padding: 20px 30px 60px; overflow-x: hidden; }
a { color: #6cb0f6; text-decoration: none; }
a:hover { text-decoration: underline; }
.title-bar { background: #3a3a5c; display: inline-block; padding: 6px 16px; font-size: 22px; font-weight: bold; color: #fff; margin-bottom: 4px; }
.date { color: #999; font-size: 13px; margin-bottom: 20px; }
.board { position: relative; }
.card { background: #2a2a2a; border: 1px solid #3a3a3a; border-radius: 8px; padding: 12px; position: absolute; cursor: grab; transition: box-shadow 0.15s; overflow: hidden; }
.card:hover { box-shadow: 0 0 0 1px #58a6ff; z-index: 10; }
.card.moving { opacity: 0.8; box-shadow: 0 4px 24px rgba(0,0,0,0.6); z-index: 100; cursor: grabbing; }
.card img { width: 100%; border-radius: 4px; display: block; }
.card .text { outline: none; min-height: 20px; white-space: pre-wrap; word-break: break-word; }
.card .text:focus { background: rgba(255,255,255,0.05); border-radius: 4px; padding: 4px; }
.card .text:empty::before { content: '텍스트 입력...'; color: #555; }
.card-actions { position: absolute; top: 4px; right: 4px; display: none; gap: 4px; }
.card:hover .card-actions { display: flex; }
.card-btn { background: #333; border: 1px solid #555; color: #ccc; border-radius: 4px; padding: 2px 6px; font-size: 11px; cursor: pointer; }
.card-btn:hover { background: #444; color: #fff; }
.resize-handle { position: absolute; bottom: 0; right: 0; width: 16px; height: 16px; cursor: se-resize; opacity: 0; }
.card:hover .resize-handle { opacity: 0.6; }
.resize-handle::after { content: ''; position: absolute; bottom: 3px; right: 3px; width: 8px; height: 8px; border-right: 2px solid #666; border-bottom: 2px solid #666; }
.card.selected { box-shadow: 0 0 0 2px #58a6ff; z-index: 5; }
.highlight-red { color: #ff6b6b; }
.highlight-blue { color: #6cb0f6; }
.highlight-gold { color: #f0c040; }
.toolbar { position: fixed; bottom: 0; left: 0; right: 0; background: #161b22; border-top: 1px solid #30363d; padding: 8px 20px; display: flex; gap: 12px; align-items: center; z-index: 200; }
.toolbar button { background: #21262d; border: 1px solid #30363d; color: #e0e0e0; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; }
.toolbar button:hover { background: #30363d; }
.toolbar .status { color: #8b949e; font-size: 12px; margin-left: auto; }
#format-toolbar { position: fixed; display: none; background: #1c2128; border: 1px solid #444c56; border-radius: 8px; padding: 4px 6px; gap: 2px; align-items: center; z-index: 500; box-shadow: 0 4px 16px rgba(0,0,0,0.5); }
#format-toolbar button { background: none; border: none; color: #cdd9e5; padding: 4px 8px; border-radius: 5px; cursor: pointer; font-size: 13px; line-height: 1; }
#format-toolbar button:hover { background: #373e47; }
#format-toolbar .sep { width: 1px; height: 16px; background: #444c56; margin: 0 2px; }
</style>
</head>
<body>
<div class="title-bar" contenteditable="true">自警文</div>
<div class="date">2012년 4월 1일 일요일</div>
<div class="board" id="board"></div>
<div id="format-toolbar">
  <button onmousedown="e=>e.preventDefault()" onclick="fmt('bold')" title="굵게"><b>B</b></button>
  <button onclick="fmt('italic')" title="기울임"><i>I</i></button>
  <button onclick="fmt('underline')" title="밑줄"><u>U</u></button>

  <div style="display:flex;align-items:center;gap:4px;margin-left:8px;border-left:1px solid #30363d;padding-left:12px;">

    <button onclick="zoomIn()" title="Ctrl+=" style="padding:6px 10px;">+</button>
  </div>

</div>

  {
    "type": "html",
    "x": 72,
    "y": 115,
    "w": 574,
    "html": "\r\n\t\t\t<ul>\r\n\t\t\t\t<p lang=\"en-US\" data-tag=\"to-do\" style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Calibri\">No limitation </span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">너 하고싶은대로 하고 살아.</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-family:Tahoma;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">모든 스탠스를 다 바꿔</span></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><a href=\"https://www.youtube.com/watch?v=46chKtDaAvE&amp;ab_channel=%EC%97%A0%EB%B9%85%EB%89%B4%EC%8A%A4\">아직 살만한 세상..어느 접촉사고 현장의 아름다운 포옹</a></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:맑은 고딕\">Remember, Raise. Not Race</span>. <span lang=\"ko-KR\">경쟁은</span> <span lang=\"ko-KR\">루저들을</span> <span lang=\"ko-KR\">위한</span> <span lang=\"ko-KR\">것이다</span>.</p>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">퍼포먼스와<span lang=\"en-US\"> </span>삶의<span lang=\"en-US\" style=\"font-family:맑은 고딕\"> 80%</span><span style=\"font-family:맑은 고딕\">를</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\"> </span><span style=\"font-family:맑은 고딕\">결정짓는</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\"> </span><span style=\"font-family:맑은 고딕\">요소에</span><span lang=\"en-US\">, </span><span style=\"font-family:맑은 고딕\">깨어있는</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\"> </span><span style=\"font-family:맑은 고딕\">시간의</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\"> 20%</span><span style=\"font-family:맑은 고딕\">를</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\"> </span><span style=\"font-family:맑은 고딕\">투자한다</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\">.</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">R&amp;D<span lang=\"ko-KR\">에는</span> <span lang=\"ko-KR\">시간과</span> <span lang=\"ko-KR\">자본이</span> <span lang=\"ko-KR\">투입된다</span>. <span lang=\"ko-KR\">수입과</span> <span lang=\"ko-KR\">시간의</span> 20%<span lang=\"ko-KR\">를</span> <span lang=\"ko-KR\">확보하라</span>.</p>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:맑은 고딕\">목표와</span><span lang=\"en-US\"> </span>무관한<span lang=\"en-US\"> </span>모든<span lang=\"en-US\"> </span>것을<span lang=\"en-US\">, </span>포기하라<span lang=\"en-US\">.</span><span lang=\"en-US\">￼</span><span lang=\"en-US\">H</span>ope the best Plan for the worst<span lang=\"en-US\">.</span></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<li style=\"font-size:10pt\"><span lang=\"en-US\">지워낼수는 없더라, 살아온 시간들을. 다만 갚아나갈뿐</span></li>\r\n\t\t\t\t<li style=\"font-size:10pt\"><span lang=\"en-US\">호기심은 비싸다. 하지만 그만한 가치가 있지</span></li>\r\n\t\t\t\t<li style=\"font-size:10pt\">최선을<span lang=\"en-US\"> 희망하되, 최악을 상정하라. Plan B는 현실의 Action A다</span></li>\r\n\t\t\t\t<li style=\"font-size:10pt\"><span lang=\"en-US\">기회는<span style=\"font-family:Calibri\"> </span>남이<span style=\"font-family:Calibri\"> </span>줄<span style=\"font-family:Calibri\"> </span>수<span style=\"font-family:Calibri\"> </span>있지만<span style=\"font-family:Calibri\">, </span>증명은<span style=\"font-family:Calibri\"> </span>내가<span style=\"font-family:Calibri\"> </span>해야<span style=\"font-family:Calibri\"> </span>한다<span style=\"font-family:Calibri\">.</span></span></li>\r\n\t\t\t\t<li style=\"font-size:10pt\"><span lang=\"en-US\"><span style=\"font-family:Microsoft NeoGothic\">&quot;태양아래 새로운 것은 없다.&quot;</span></span></li>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">새로운<span lang=\"en-US\"> </span>것은<span lang=\"en-US\"> </span>없다<span lang=\"en-US\">.</span></p>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">새로운<span lang=\"en-US\"> </span>실행만이<span lang=\"en-US\"> </span>있을<span lang=\"en-US\"> </span>뿐<span lang=\"en-US\">.</span></p>\r\n\t\t\t\t<li style=\"font-size:10pt\"><span lang=\"en-US\"><span style=\"font-family:Calibri\">Game</span><span style=\"font-family:Calibri;font-size:9pt\"> On World</span></span></li>\r\n\t\t\t\t<li style=\"font-size:10pt\"><span lang=\"en-US\"><span style=\"font-family:맑은 고딕\">&quot;</span><span lang=\"ko-KR\" style=\"font-family:맑은 고딕\">의미가</span><span style=\"font-family:맑은 고딕\"> </span><span lang=\"ko-KR\" style=\"font-family:맑은 고딕\">없다면</span><span style=\"font-family:맑은 고딕\">, </span><span lang=\"ko-KR\" style=\"font-family:맑은 고딕\">몰입도</span><span style=\"font-family:맑은 고딕\"> </span><span lang=\"ko-KR\" style=\"font-family:맑은 고딕\">없다</span><span style=\"font-family:맑은 고딕\">.&quot;</span></span></li>\r\n\t\t\t\t<li style=\"font-size:10pt\"><span lang=\"en-US\"><span style=\"font-family:맑은 고딕\">현란한</span><span style=\"font-family:Calibri\"> </span><span style=\"font-family:맑은 고딕\">개</span><span style=\"font-family:맑은 고딕\">인기</span><span style=\"font-family:Calibri\">(</span><span style=\"font-family:맑은 고딕\">응</span><span style=\"font-family:맑은 고딕\">용기</span><span style=\"font-family:Calibri\">)</span><span style=\"font-family:맑은 고딕\">는</span><span style=\"font-family:Calibri\"> </span><span style=\"font-family:맑은 고딕\">결</span><span style=\"font-family:맑은 고딕\">국</span></span></li>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:맑은 고딕\">탄탄한</span><span lang=\"en-US\" style=\"font-family:Calibri\"> </span><span lang=\"en-US\" style=\"font-family:맑은 고딕\">기</span><span style=\"font-family:맑은 고딕\">본기로부</span><span style=\"font-family:Calibri\">터</span><span lang=\"en-US\" style=\"font-family:Calibri\"> </span><span lang=\"en-US\" style=\"font-family:맑은 고딕\">나</span><span style=\"font-family:맑은 고딕\">온다</span><span lang=\"en-US\" style=\"font-family:Calibri\">.</span></p>\r\n\t\t\t\t<li style=\"font-size:10pt\"><span lang=\"en-US\"><span style=\"font-family:Microsoft NeoGothic\">자</span><span style=\"font-family:Microsoft NeoGothic\">유란</span><span style=\"font-family:Calibri\">, </span><span style=\"font-family:Microsoft NeoGothic\">나</span><span style=\"font-family:Calibri\"> </span><span style=\"font-family:Microsoft NeoGothic\">말</span><span style=\"font-family:Microsoft NeoGothic\">고는</span><span style=\"font-family:Calibri\"> </span><span style=\"font-family:Microsoft NeoGothic\">누</span><span style=\"font-family:Microsoft NeoGothic\">구</span><span style=\"font-family:Calibri\">도</span><span style=\"font-family:Calibri\"> </span><span style=\"font-family:Microsoft NeoGothic\">만</span><span style=\"font-family:Microsoft NeoGothic\">족시키</span><span style=\"font-family:Calibri\">지</span><span style=\"font-family:Calibri\"> 않</span><span style=\"font-family:Microsoft NeoGothic\">아</span><span style=\"font-family:Calibri\">도</span><span style=\"font-family:Calibri\"> </span><span style=\"font-family:Microsoft NeoGothic\">되</span><span style=\"font-family:Microsoft NeoGothic\">는</span><span style=\"font-family:Calibri\"> </span><span style=\"font-family:Microsoft NeoGothic\">상</span><span style=\"font-family:Microsoft NeoGothic\">태</span></span></li>\r\n\t\t\t\t<li style=\"font-size:10pt\">성공은<span lang=\"en-US\" style=\"font-family:Calibri\"> </span><span lang=\"en-US\">성</span>공에<span lang=\"en-US\" style=\"font-family:Calibri\"> </span><span lang=\"en-US\">대</span>한<span lang=\"en-US\" style=\"font-family:Calibri\"> </span><span lang=\"en-US\">강</span>박으<span style=\"font-family:Calibri\">로</span><span lang=\"en-US\" style=\"font-family:Calibri\"> </span><span lang=\"en-US\">부</span><span style=\"font-family:Calibri\">터</span><span lang=\"en-US\" style=\"font-family:Calibri\"> </span><span lang=\"en-US\">벗</span>어난<span lang=\"en-US\" style=\"font-family:Calibri\"> </span><span lang=\"en-US\">것</span>이다<span lang=\"en-US\" style=\"font-family:Calibri\">.</span></li>\r\n\t\t\t\t<li style=\"font-size:10pt\"><span lang=\"en-US\"><span style=\"font-family:M ">위험하지 않음 꿈은 꿀 가치가 없습니다</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\"> - </span><span style=\"font-family:맑은 고딕\">홍정욱</span></li>\r\n\t\t\t\t<li style=\"font-size:10pt\"><span style=\"font-family:맑은 고딕\">가자 위로</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\">, </span><span style=\"font-family:굴림\">知</span><span style=\"font-family:맑은 고딕\">의 심연으로</span></li>\r\n\t\t\t\t<li style=\"font-size:10pt\"><span style=\"font-family:맑은 고딕\">눈뜨면 없어라</span></li>\r\n\t\t\t\t<li style=\"font-size:10pt\"><span style=\"font-family:맑은 고딕\">나의 실력에 투자하는 것이 가장 확실한 재테크다</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\"> - </span><span style=\"font-family:맑은 고딕\">아프니까</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\"> </span><span style=\"font-family:맑은 고딕\">청춘이다</span></li>\r\n\t\t\t\t<li style=\"font-size:10pt\"><span style=\"font-family:맑은 고딕\">꾸준한 연습보다 뛰어난 재능은 없다</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\">.</span></li>\r\n\t\t\t\t<li style=\"font-size:10pt\"><span style=\"font-family:맑은 고딕\">숙련은 힘보다 강하다</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\"> - W.G </span><span style=\"font-family:맑은 고딕\">배넘 </span></li>\r\n\t\t\t\t<li style=\"font-size:10pt\"><span style=\"font-family:맑은 고딕\">꿈을 크게 가지기보다</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\">, </span><span style=\"font-family:맑은 고딕\">나를</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\"> </span><span style=\"font-family:맑은 고딕\">크게</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\"> </span><span style=\"font-family:맑은 고딕\">가지자</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\">.</span></li>\r\n\t\t\t\t<li style=\"font-size:10pt\"><span style=\"font-family:맑은 고딕\">어떤 새도 자신의 둥지에서 생을 마감하지 않는다</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\">.</span></li>\r\n\t\t\t\t<li style=\"font-size:10pt\"><span style=\"font-family:맑은 고딕\">날개도 없는 주제에 하늘을 사랑하고</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\">,</span></li>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:맑은 고딕\">걸어둘 벽도 없으면서 행복을 그린다</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\">.</span></p>\r\n\t\t\t\t<li style=\"font-size:10pt\"><span style=\"font-family:맑은 고딕\">바람은 방랑을 멈추는 순간 소멸한다</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\">.</span></li>\r\n\t\t\t\t<li style=\"font-size:10pt\"><span lang=\"en-US\"><span style=\"font-family:맑은 고딕\">Think</span><span style=\"font-family:Calibri\"> Bravely</span></span></li>\r\n\t\t\t\t<li style=\"font-size:10pt\"><span style=\"font-family:맑은 고딕\">지금 이 시절이 스스로에게 기회를 줄 수 있는 마지막 유예다</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\">.</span></li>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:맑은 고딕\">누가 무엇을 가져다 준다고 해도</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\">, </span><span style=\"font-family:맑은 고딕\">이</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\"> </span><span style=\"font-family:맑은 고딕\">시절의</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\"> </span><span style=\"font-family:맑은 고딕\">나와</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\"> </span><span style=\"font-family:맑은 고딕\">바꾸고</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\"> </span><span style=\"font-family:맑은 고딕\">싶지</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\"> </span><span style=\"font-family:맑은 고딕\">않다</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\">.</span></p>\r\n\t\t\t\t<li style=\"font-size:10pt\"><span style=\"font-family:맑은 고딕\">적이 없다는 말은</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\">, </span><span style=\"font-family:맑은 고딕\">잘</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\"> </span><span style=\"font-family:맑은 고딕\">싸워서라기</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\"> </span><span style=\"font-family:맑은 고딕\">보다</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\">. </span><span style=\"font-family:맑은 고딕\">적을</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\"> </span><span style=\"font-family:맑은 고딕\">만들지</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\"> </span><span style=\"font-family:맑은 고딕\">않는</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\"> </span><span style=\"font-family:맑은 고딕\">사람에게</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\"> </span><span style=\"font-family:맑은 고딕\">주어진</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\"> </span><span style=\"font-family:맑은 고딕\">영예다</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\">.</span></li>\r\n\t\t\t\t<li style=\"font-size:10pt\"><span lang=\"en-US\"><span style=\"font-family:맑은 고딕\">F1(</span><span lang=\"ko-KR\" style=\"font-family:맑은 고딕\">타이어교체</span><span style=\"font-family:맑은 고딕\"> </span><span lang=\"ko-KR\" style=\"font-family:맑은 고딕\">사진</span><span style=\"font-family:맑은 고딕\">), </span><span lang=\"ko-KR\" style=\"font-family:맑은 고딕\">혼자</span><span style=\"font-family:맑은 고딕\"> </span><span lang=\"ko-KR\" style=\"font-family:맑은 고딕\">타지만</span><span style=\"font-family:맑은 고딕\">, </span><span lang=\"ko-KR\" style=\"font-family:맑은 고딕\">홀로</span><span style=\"font-family:맑은 고딕\"> </span><span lang=\"ko-KR\" style=\"font-family:맑은 고딕\">달리지</span><span style=\"font-family:맑은 고딕\"> </span><span lang=\"ko-KR\" style=\"font-family:맑은 고딕\">아니한다</span><span style=\"font-family:맑은 고딕\">. Teamwork.</span></span></li>\r\n\t\t\t\t<li style=\"font-size:10pt\"><span style=\"font-family:맑은 고딕\">진심</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\">, </span><span style=\"font-family:맑은 고딕\">시간이 지나면 거짓이 되고야 마는 진심</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\">. </span><span style=\"font-family:맑은 고딕\">사랑</span></li>\r\n\t\t\t\t<li style=\"font-size:10pt\"><span style=\"font-family:맑은 고딕\">처절한 나의 부족함을 느껴보는 것</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\">, </span></li>\r\n\t\t\t\t<li style=\"font-size:10pt\"><span style=\"font-family:맑은 고딕\">매일 밑천을 드러내는 삶을 살자</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\">,</span></li>\r\n\t\t\t\t<li style=\"font-size:10pt\"><span style=\"font-family:맑은 고딕\">불우 할 수도 있었겠지</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\">, </span><span style=\"font-family:맑은 고딕\">내</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\"> </span><span style=\"font-family:맑은 고딕\">청춘은</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\">. </span><span style=\"font-family:맑은 고딕\">그럴</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\"> </span><span style=\"font-family:맑은 고딕\">수</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\"> </span><span style=\"font-family:맑은 고딕\">있었어</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\">.</span></li>\r\n\t\t\t\t<li style=\"font-size:10pt\"><span style=\"font-family:맑은 고딕\">사랑하고</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\">, </span><span style=\"font-family:맑은 고딕\">하고 싶은 일을 하라</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\">. </span><span style=\"font-family:맑은 고딕\">그리고</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\"> </span><span style=\"font-family:맑은 고딕\">삶을</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\"> </span><span style=\"font-family:맑은 고딕\">두려워하지</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\"> </span><span style=\"font-family:맑은 고딕\">말라</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\">.</span></li>\r\n\t\t\t\t<li style=\"font-size:10pt\"><span style=\"font-family:맑은 고딕\">죽는 날까지</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\">, </span><span style=\"font-family:맑은 고딕\">솔잎만 먹으며 희망을 희망 할텐가</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\">.</span></li>\r\n\t\t\t\t<li style=\"font-size:10pt\"><span style=\"font-family:맑은 고딕\">혼자 잘 먹고 잘 사는 일은</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\">, </span><span style=\"font-family:맑은 고딕\">성공하는</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\"> </span><span style=\"font-family:맑은 고딕\">일은</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\"> </span><span style=\"font-family:맑은 고딕\">그리</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\"> </span><span style=\"font-family:맑은 고딕\">어렵지</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\"> </span><span style=\"font-family:맑은 고딕\">않아요</span></li>\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-family:Gulim;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:맑은 고딕\">    하지만, 그것을 혼자 누리는 것처럼 고역은 없을테</span><span lang=\"ko-KR\" style=\"font-family:맑은 고딕\">죠</span></p>\r\n\t\t\t\t<li style=\"font-size:10pt\"><span style=\"font-family:맑은 고딕\">끝내주게 잼있을거야</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\">!</span></li>\r\n\t\t\t\t<li style=\"font-size:10pt\"><span lang=\"en-US\"><span lang=\"ko-KR\" style=\"font-family:맑은 고딕\">매일 아침</span><span style=\"font-family:맑은 고딕\">, </span><span lang=\"ko-KR\" style=\"font-family:맑은 고딕\">가장 따뜻한 미소를 줄게</span></span></li>\r\n\t\t\t\t<li style=\"font-size:10pt\"><span style=\"font-family:맑은 고딕\">솔잎만 먹다가</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\">, </span><span style=\"font-family:맑은 고딕\">우물</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\"> </span><span style=\"font-family:맑은 고딕\">안에서</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\"> </span><span style=\"font-family:맑은 고딕\">숨지지는</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\"> </span><span style=\"font-family:맑은 고딕\">않으리</span></li>\r\n\t\t\t\t<li style=\"font-size:10pt\"><span style=\"font-family:맑은 고딕\">불운하다고 불행 하라는 법은 없고</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\">,</span></li>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">불우하더라도 불가능하지는 않습니다<span lang=\"en-US\" style=\"font-family:맑은 고딕\">.</span></p>\r\n\t\t\t\t<li style=\"font-size:10pt\"><span style=\"font-family:맑은 고딕\">가난은 죄가 아니지만</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\">, </span><span style=\"font-family:맑은 고딕\">용서받지는</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\"> </span><span style=\"font-family:맑은 고딕\">못한다</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\">.</span></li>\r\n\t\t\t\t<li style=\"font-size:10pt\"><span style=\"font-family:맑은 고딕\">아직 배팅할 청춘이 두둑하고</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\">, </span><span style=\"font-family:맑은 고딕\">샴페인을</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\"> </span><span style=\"font-family:맑은 고딕\">터뜨리기에는</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\"> </span><span style=\"font-family:맑은 고딕\">날이</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\"> </span><span style=\"font-family:맑은 고딕\">너무</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\"> </span><span style=\"font-family:맑은 고딕\">밝구나</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\">.</span></li>\r\n\t\t\t\t<li style=\"font-size:10pt\"><span style=\"font-family:맑은 고딕\">철들었다는 말은 누구나 할 수 있는 생각을 하게 되었다는 뜻이다</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\">.</span></li>\r\n\t\t\t\t<li style=\"font-size:10pt\">여자말고는 피 끓는 것이 없는 너도<span lang=\"en-US\" style=\"font-family:맑은 고딕\">, </span>사내냐<span lang=\"en-US\" style=\"font-family:맑은 고딕\">.</span></li>\r\n\t\t\t\t<li style=\"font-size:10pt\"><span style=\"font-family:맑은 고딕\">제도는 지키는 쪽보다 만드는 쪽이 언제나 우위를 점하고</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\">,</span></li>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:맑은 고딕\">게임의 룰을 정하는 건 언제나 승자다</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\">. </span><span style=\"font-family:맑은 고딕\">우리는</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\"> </span><span style=\"font-family:맑은 고딕\">그</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\"> </span><span style=\"font-family:맑은 고딕\">룰을</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\"> </span><span style=\"font-family:맑은 고딕\">교육</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\"> </span><span style=\"font-family:맑은 고딕\">받아왔다</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\">.</span></p>\r\n\t\t\t\t<li style=\"font-size:10pt\">보편<span lang=\"en-US\"> </span>타당한<span lang=\"en-US\"> </span>불편과<span lang=\"en-US\"> </span>문제들을<span lang=\"en-US\"> ICT</span>기술을<span lang=\"en-US\"> </span>활용해<span lang=\"en-US\"> </span>해결해나가는<span lang=\"en-US\"> </span>것이<span lang=\"en-US\"> </span>나의<span lang=\"en-US\"> </span>일이다<span lang=\"en-US\">.</span></li>\r\n\t\t\t\t<li style=\"font-size:10pt\"><span style=\"font-family:맑은 고딕\">서기</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\"> 2011</span><span style=\"font-family:맑은 고딕\">년 그는 보다 실증적인 댄싱 연구를 위해 살사구시의 정신으로 뮤뱅에 입성하였다</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\">.</span></li>\r\n\t\t\t\t<li style=\"font-size:10pt\"><span style=\"font-family:맑은 고딕\">최초는 곧 최고가 되고</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\">, </span><span style=\"font-family:맑은 고딕\">나다움은</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\"> </span><span style=\"font-family:맑은 고딕\">곧</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\"> </span><span style=\"font-family:맑은 고딕\">유일함이다</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\">.</span></li>\r\n\t\t\t\t<li style=\"font-size:10pt\"><span style=\"font-family:맑은 고딕\">세상탓 하지마라</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\">, </span><span style=\"font-family:맑은 고딕\">세상이</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\"> </span><span style=\"font-family:맑은 고딕\">나빠진</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\"> </span><span style=\"font-family:맑은 고딕\">만큼</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\"> </span><span style=\"font-family:맑은 고딕\">그</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\"> </span><span style=\"font-family:맑은 고딕\">세상을</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\"> </span><span style=\"font-family:맑은 고딕\">탓하는</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\"> </span><span style=\"font-family:맑은 고딕\">네가 </span></li>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:맑은 고딕\">선해지는 것은 아닐텐데</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\">, </span><span style=\"font-family:맑은 고딕\">오늘도 말뿐인 말이 넘치는구나</span></p>\r\n\t\t\t\t<li style=\"font-size:10pt\"><span style=\"font-family:맑은 고딕\">달콤함 인생</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\">,</span></li>\r\n\t\t\t\t<li style=\"font-size:10pt\"><span style=\"font-family:맑은 고딕\">직장은</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\"> </span><span style=\"font-family:맑은 고딕\">마지막</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\"> </span><span style=\"font-family:맑은 고딕\">학교일</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\"> </span><span style=\"font-family:맑은 고딕\">뿐이다</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\">.</span></li>\r\n\t\t\t\t<li style=\"font-size:10pt\"><span style=\"font-family:맑은 고딕\">결국 마케터가 무능할수록</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\">, </span><span style=\"font-family:맑은 고딕\">구라를</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\"> </span><span style=\"font-family:맑은 고딕\">많이쳐야</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\"> </span><span style=\"font-family:맑은 고딕\">한다</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\">.</span></li>\r\n\t\t\t\t<li style=\"font-size:10pt\"><span style=\"font-family:맑은 고딕\">힘 없이는 평화도 없다</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\">.</span></li>\r\n\t\t\t\t<li style=\"font-size:10pt\"><span style=\"font-family:맑은 고딕\">적어도 내 필드에서는</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\">, </span><span style=\"font-family:맑은 고딕\">모두를</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\"> </span><span style=\"font-family:맑은 고딕\">먹이로</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\"> </span><span style=\"font-family:맑은 고딕\">만들어버릴</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\"> </span><span style=\"font-family:맑은 고딕\">야성을</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\"> </span><span style=\"font-family:맑은 고딕\">갖춰야</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\"> </span><span style=\"font-family:맑은 고딕\">한다</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\">.</span></li>\r\n\t\t\t\t<li style=\"font-size:10pt\"><span style=\"font-family:맑은 고딕\">안전하고</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\">, </span><span style=\"font-family:맑은 고딕\">무모하지도 않은걸 누가 도전이라고 하던가</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\">.</span></li>\r\n\t\t\t\t<li style=\"font-size:10pt\"><span style=\"font-family:맑은 고딕\">김준영</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\">, </span><span style=\"font-family:맑은 고딕\">최고</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\">.</span></li>\r\n\t\t\t\t<li style=\"font-size:10pt\"><span style=\"font-family:맑은 고딕\">찻잔과 온실 속의 도전 밖에는 하지 못하는 네가</span></li>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:맑은 고딕\">정말로 남의 실패를 비웃을 자격이 있다고 생각 하는 거야</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\">? </span><span style=\"font-family:맑은 고딕\">ㅎ</span></p>\r\n\t\t\t\t<li style=\"font-size:10pt\"><span style=\"font-family:맑은 고딕\">이젠</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\">, </span><span style=\"font-family:맑은 고딕\">사랑이 아니라</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\">. </span><span style=\"font-family:맑은 고딕\">이별이</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\"> </span><span style=\"font-family:맑은 고딕\">어떤</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\"> </span><span style=\"font-family:맑은 고딕\">느낌이었는지</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\"> </span><span style=\"font-family:맑은 고딕\">조차도</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\"> </span><span style=\"font-family:맑은 고딕\">가물가물해</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\">.</span></li>\r\n\t\t\t\t<li style=\"font-size:10pt\"><span style=\"font-family:맑은 고딕\">행복한 양아치</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\">,</span></li>\r\n\t\t\t\t<li style=\"font-size:10pt\"><span style=\"font-family:맑은 고딕\">재기발랄 양아치</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\">, </span><span style=\"font-family:맑은 고딕\">발랄한</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\"> </span><span style=\"font-family:맑은 고딕\">글을</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\"> </span><span style=\"font-family:맑은 고딕\">쓰자</span></li>\r\n\t\t\t\t<li style=\"font-size:10pt\"><span lang=\"en-US\"><span style=\"font-family:맑은 고딕\">2011, </span><span lang=\"ko-KR\" style=\"font-family:맑은 고딕\">기본기</span></span></li>\r\n\t\t\t\t<li style=\"font-size:10pt\"><span lang=\"en-US\"><span style=\"font-family:맑은 고딕\">No more. </span><span lang=\"ko-KR\" style=\"font-family:맑은 고딕\">가난은</span><span style=\"font-family:맑은 고딕\"> </span><span lang=\"ko-KR\" style=\"font-family:맑은 고딕\">죄가</span><span style=\"font-family:맑은 고딕\"> </span><span lang=\"ko-KR\" style=\"font-family:맑은 고딕\">아니나</span><span style=\"font-family:맑은 고딕\">, </span><span lang=\"ko-KR\" style=\"font-family:맑은 고딕\">용서받지는</span><span style=\"font-family:맑은 고딕\"> </span><span lang=\"ko-KR\" style=\"font-family:맑은 고딕\">못한다</span><span style=\"font-family:맑은 고딕\">. </span><span lang=\"ko-KR\" style=\"font-family:맑은 고딕\">열심히 살자</span><span style=\"font-family:맑은 고딕\">.</span></span></li>\r\n\t\t\t\t<li style=\"font-size:10pt\"><span style=\"font-family:맑은 고딕\">기본 없는 창의는 오만이고</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\">, </span><span style=\"font-family:맑은 고딕\">공감</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\"> </span><span style=\"font-family:맑은 고딕\">없는</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\"> </span><span style=\"font-family:맑은 고딕\">창의는</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\"> </span><span style=\"font-family:맑은 고딕\">폭력이다</span></li>\r\n\t\t\t\t<li style=\"font-size:10pt\"><span style=\"font-family:맑은 고딕\">내가 가진 희망이라고는</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\">, </span><span style=\"font-family:맑은 고딕\">너</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\"> </span><span style=\"font-family:맑은 고딕\">밖엔</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\"> </span><span style=\"font-family:맑은 고딕\">없는데</span></li>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:맑은 고딕\">네가 날 실망시켜서는 안된다</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\">. </span><span style=\"font-family:맑은 고딕\">김준영</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\">.</span></p>\r\n\t\t\t\t<li style=\"font-size:10pt\"><span style=\"font-family:맑은 고딕\">진짜 멍청한이들의 특징은</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\">, </span><span style=\"font-family:맑은 고딕\">당최</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\"> </span><span style=\"font-family:맑은 고딕\">자기가</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\"> </span><span style=\"font-family:맑은 고딕\">뭘</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\"> </span><span style=\"font-family:맑은 고딕\">모르는지</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\"> </span><span style=\"font-family:맑은 고딕\">모르고</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\">,</span></li>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:맑은 고딕\">그래서 모르는 것을 인정하질 못하고</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\">, </span><span style=\"font-family:맑은 고딕\">물어보질</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\"> </span><span style=\"font-family:맑은 고딕\">못하고</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\">,</span></p>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:맑은 고딕\">그렇게 계속해서 단단하 무지만 쌓아간다는 것이다</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\">.</span></p>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:맑은 고딕\">그러고 나이로 누르려 애를 쓴다</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\">. </span><span style=\"font-family:맑은 고딕\">나이만</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\"> </span><span style=\"font-family:맑은 고딕\">먹은</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\"> </span><span style=\"font-family:맑은 고딕\">멍청이</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\">.</span></p>\r\n\t\t\t\t<li style=\"font-size:10pt\"><span style=\"font-family:맑은 고딕\">끈내주게 신난닥</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\">!</span><span style=\"font-family:맑은 고딕\">ㅋ 죠타</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\">! </span><span style=\"font-family:맑은 고딕\">사는게</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\"> </span><span style=\"font-family:맑은 고딕\">잼있따</span></li>\r\n\t\t\t\t<li style=\"font-size:10pt\"><span style=\"font-family:맑은 고딕\">인생은 원래</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\">, </span><span style=\"font-family:맑은 고딕\">재미있다</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\">.</span><span style=\"font-family:맑은 고딕\">어제의 나는 최고였다</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\">.</span></li>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:맑은 고딕\">그리고 오늘은</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\">, </span><span style=\"font-family:맑은 고딕\">더 나아졌다</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\">.</span></p>\r\n\t\t\t\t<li style=\"font-size:10pt\"><span style=\"font-family:맑은 고딕\">숫컷</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\">&amp;</span><span style=\"font-family:맑은 고딕\">숫트</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\">,</span></li>\r\n\t\t\t\t<li style=\"font-size:10pt\"><span style=\"font-family:맑은 고딕\">그리고</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\">, </span><span style=\"font-family:맑은 고딕\">중요하지 않은 것은 무시할 수 있어야 한다</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\">.</span></li>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:맑은 고딕\">삶 가운데 살아있다는 것보다 중요한 것은</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\"> </span><span style=\"font-family:맑은 고딕\">하나도</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\"> </span><span style=\"font-family:맑은 고딕\">없고</span><span lang=\"en-US\">,</span></p>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">그<span lang=\"en-US\"> </span>어떤<span lang=\"en-US\"> </span>일이라도<span lang=\"en-US\"> </span>죽는<span lang=\"en-US\"> </span>것<span lang=\"en-US\"> </span>이상으로<span lang=\"en-US\"> </span>나쁜<span lang=\"en-US\"> </span>일은<span lang=\"en-US\"> </span>일어나지<span lang=\"en-US\"> </span>않는다<span lang=\"en-US\">.</span></p>\r\n\t\t\t\t<li style=\"font-size:10pt\"><span style=\"font-family:맑은 고딕\">기업의 성장은</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\">, </span><span style=\"font-family:맑은 고딕\">증식적</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\"> </span><span style=\"font-family:맑은 고딕\">확장으로</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\"> </span><span style=\"font-family:맑은 고딕\">인한</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\"> </span><span style=\"font-family:맑은 고딕\">규모의</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\"> </span><span style=\"font-family:맑은 고딕\">비대함이</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\"> </span><span style=\"font-family:맑은 고딕\">아니라</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\">,</span></li>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:맑은 고딕\">구성원의 성장과 상승효과에 따른 조직의 진화여야 한다</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\">.</span></p>\r\n\t\t\t\t<li style=\"font-size:10pt\"><span style=\"font-family:맑은 고딕\">삶을 망치는 가장 큰 원인이 뭔줄 알아</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\">?</span></li>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:맑은 고딕\">그건 삶에 대한 결벽과 강박</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\">, </span><span style=\"font-family:맑은 고딕\">완벽주의야</span></p>\r\n\t\t\t\t<li style=\"font-size:10pt\"><span style=\"font-family:맑은 고딕\">될 놈은</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\">, </span><span style=\"font-family:맑은 고딕\">넘어져도 돈을 주워 일어난다</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\">.</span></li>\r\n\t\t\t\t<li style=\"font-size:10pt\"><span style=\"font-family:맑은 고딕\">목마른</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\"> </span><span style=\"font-family:맑은 고딕\">것은</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\"> </span><span style=\"font-family:맑은 고딕\">오직</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\">, arete</span></li>\r\n\t\t\t\t<li style=\"font-size:10pt\"><span style=\"font-family:맑은 고딕\">완벽도</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\"> </span><span style=\"font-family:맑은 고딕\">부족해</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\">,</span></li>\r\n\t\t\t\t<li style=\"font-family:Calibri\"><span style=\"font-family:Malgun Gothic;font-size:10pt\">벙어리처럼 침묵하고 왕처럼 말하라.</span></li>\r\n\t\t\t\t<li style=\"font-family:Calibri\"><span style=\"font-family:Malgun Gothic;font-size:10pt\">사람의 마음속에 들어가서 일을 해라</span></li>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"color:#951015\">&lt;자경문&gt; - 율곡 이이</span></p>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"color:#951015\">제 1조: 뜻을 크게 가져 성인이 되도록 끝까지 노력한다.</span></p>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"color:#951015\">제 2조: 마음을 차분히 가라앉히고 말을 적게 한다.</span></p>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"color:#951015\">제 3조: 마음을 놓지 않고, 안으로 거두어 잘 정리한다. 마음을 잃어버린 사람은 주인 없는 집과 같다.</span></p>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"color:#951015\">제 4조: 혼자 있을 때 행동을 더욱 조심한다. 남이 보지 않을 때 행실을 삼가지 않으면 악한 일이 저절로 생기는 법이다.</span></p>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"color:#951015\">제 5조: 항상 해야 할 일을 정하고, 그것을 행동으로 옮기기 전에 깊이 생각한다. 행동에 옮기지 않는 독서는 필요가 없다.</span></p>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"color:#951015\">제 6조: 재산이나 명예에 마음을 두어서는 안 된다.</span></p>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"color:#951015\">제 7조: 꼭 해야 할 일은 싫어하거나 게으름을 피우지 말고 정성껏 한다.</span></p>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"color:#951015\">제 8조: 온 세상을 전부 준다고 해도, 죄 없는 사람을 한명이라도 괴롭히거나 의롭지 않는 행동을 해서는 안 된다.</span></p>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"color:#951015\">제 9조: 나를 해치는 사람이 있을 때는 스스로를 뉘우치고, 참된 마음으로 상대방의 마음을 돌린다.</span></p>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"color:#951015\">제 10조: 함부로 눕지 않고, 기대지도 않으며, 필요 없는 잠을 자지 않는다.</span></p>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"color:#951015\">제 11조: 서두르지 말고, 쉬지도 말며, 꾸준히 몸과 학문을 닦는다.</span></p>\r\n\t\t\t\t<br />\r\n\t\t\t</ul>\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<iframe width=\"356\" height=\"200\" data-original-src=\"https://www.youtube.com/watch?v=46chKtDaAvE&amp;ab_channel=%EC%97%A0%EB%B9%85%EB%89%B4%EC%8A%A4\" src=\"https://www.youtube.com/embed/46chKtDaAvE?feature=oembed&autoplay=true\" />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t"

const CONTENT_HASH = 'b3a7961c';

let cards = [];
let moving = null, resizing = null;
let selectedIdx = null, clipboardCard = null;
const GRID = 20, GAP = 14;
function snap(v) { return Math.round(v / GRID) * GRID; }

// ── Undo (Ctrl+Z) ────────────────────────────────────────────────────────────
const MAX_HISTORY = 50;
let history = [];
function snapshot() {
  syncText();
  history.push(JSON.stringify(cards));
  if (history.length > MAX_HISTORY) history.shift();
}
function undo() {
  if (!history.length) { showStatus('되돌릴 내용 없음'); return; }
  syncText();
  cards = JSON.parse(history.pop());
  renderCards();
  saveBoard();
  showStatus('↩ 되돌림');
}
function showStatus(msg) {
  const s = document.getElementById('status');
  s.textContent = msg;
  clearTimeout(showStatus._t);
  showStatus._t = setTimeout(() => { s.textContent = ''; }, 2000);
}
document.addEventListener('keydown', e => {
  const isText = document.activeElement?.contentEditable === 'true';
  if ((e.ctrlKey || e.metaKey) && e.key === 'z' && !e.shiftKey) {
    if (isText) return;
    e.preventDefault();
    undo();
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'c' && !e.shiftKey && !isText) {
    if (selectedIdx !== null && cards[selectedIdx]) {
      syncText();
      clipboardCard = JSON.parse(JSON.stringify(cards[selectedIdx]));
      showStatus('카드 복사됨');
      e.preventDefault();
    }
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'v' && !e.shiftKey && !isText) {
    if (clipboardCard) {
      e.preventDefault();
      snapshot();
      const nc = JSON.parse(JSON.stringify(clipboardCard));
      nc.x = (nc.x || 0) + 30; nc.y = (nc.y || 0) + 30;
      cards.push(nc);
      selectedIdx = cards.length - 1;
      renderCards(); saveBoard();
      showStatus('카드 붙여넣음');
    }
  }
  if (e.key === 'Escape') {
    document.querySelectorAll('.card.selected').forEach(c => c.classList.remove('selected'));
    selectedIdx = null;
  }
});

    const i = +el.dataset.idx;
    if (i === movedIdx) return;
    const c = cards[i], oh = el.offsetHeight;
    if (moved.x < (c.x+(c.w||200)) && (moved.x+(moved.w||200)) > c.x && moved.y < (c.y+oh) && (moved.y+mh) > c.y) {
      c.y = moved.y + mh + GAP;
      el.style.top = c.y + 'px';
    }
  });
}

function loadBoard() {
  const saved = localStorage.getItem(SAVE_KEY);
  const savedHash = localStorage.getItem(SAVE_KEY + ':hash');
  let parsed = null;
  try { parsed = saved ? JSON.parse(saved) : null; } catch(e) {}
  // reset if: no save, empty array, or content hash changed (page regenerated)
  if (!parsed || parsed.length === 0 || savedHash !== CONTENT_HASH) {
    cards = DEFAULT_CARDS.map(c => ({...c}));
    localStorage.removeItem(SAVE_KEY);
    localStorage.setItem(SAVE_KEY + ':hash', CONTENT_HASH);
    renderCards();
    const hasCoords = cards.some(c => c.x !== undefined && c.y !== undefined);
    if (!hasCoords) autoLayout();
    return;
  }
  cards = parsed;
  renderCards();
}
function resetToDefaults() { if (!confirm('저장된 보드를 지우고 원본으로 초기화합니다. 계속할까요?')) return; localStorage.removeItem(SAVE_KEY); cards = DEFAULT_CARDS.map(c => ({...c})); renderCards(); autoLayout(); }

function autoLayout() {
  const boardW = document.getElementById('board').offsetWidth;
  const cols = Math.max(1, Math.floor(boardW / 280));
  const colW = (boardW - GAP*(cols-1)) / cols;
  const colH = new Array(cols).fill(0);
  const allCards = document.querySelectorAll('.card');
  const images = document.querySelectorAll('.card img');
  let loaded = 0;
  function place() {
    allCards.forEach((el, i) => {
      const w = Math.min(cards[i].w || colW, colW);
      let minCol = 0;
      for (let c = 1; c < cols; c++) if (colH[c] < colH[minCol]) minCol = c;
      cards[i].x = minCol * (colW + GAP);
      cards[i].y = colH[minCol];
      cards[i].w = w;
      el.style.left = cards[i].x + 'px';
      el.style.top = cards[i].y + 'px';
      el.style.width = w + 'px';
      colH[minCol] = cards[i].y + el.offsetHeight + GAP;
    });
    document.getElementById('board').style.minHeight = (Math.max(...colH) + 100) + 'px';
    saveBoard();
  }
  if (!images.length) { requestAnimationFrame(place); return; }
  images.forEach(img => {
    if (img.complete) { loaded++; if (loaded >= images.length) requestAnimationFrame(place); }
    else { img.onload = img.onerror = () => { loaded++; if (loaded >= images.length) requestAnimationFrame(place); }; }
  });
}

function syncText() {
  document.querySelectorAll('.card').forEach(el => {
    const i = +el.dataset.idx;
    if (cards[i]?.type === 'text') { const t = el.querySelector('.text'); if (t) cards[i].content = t.innerHTML; }
  });
}
function saveBoard() { syncText(); localStorage.setItem(SAVE_KEY, JSON.stringify(cards)); localStorage.setItem(SAVE_KEY + ':hash', CONTENT_HASH); showStatus('저장됨 ' + new Date().toLocaleTimeString()); }

function renderCards() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  cards.forEach((card, i) => {
    const el = document.createElement('div');
    el.className = 'card'; el.dataset.idx = i;
    if (card.x !== undefined) el.style.left = card.x + 'px';
    if (card.y !== undefined) el.style.top = card.y + 'px';
    // html cards contain raw OneNote table HTML which may overflow the stated div width
    if (card.w) { if (card.type === 'html') el.style.minWidth = card.w + 'px'; else el.style.width = card.w + 'px'; }
    el.addEventListener('mousedown', e => {
      if (e.target.closest('.text, a, .card-btn, .resize-handle, td, th')) return;
      e.preventDefault();
      // Update selection
      document.querySelectorAll('.card.selected').forEach(c => c.classList.remove('selected'));
      selectedIdx = i; el.classList.add('selected');
      snapshot();
      moving = { idx: i, startX: e.clientX, startY: e.clientY, origX: card.x||0, origY: card.y||0 };
      el.classList.add('moving');
    });
    const actions = document.createElement('div'); actions.className = 'card-actions';
    const delBtn = document.createElement('button'); delBtn.className = 'card-btn'; delBtn.textContent = '×';
    delBtn.onclick = e => { e.stopPropagation(); if(confirm('삭제?')) { snapshot(); cards.splice(i,1); renderCards(); saveBoard(); } };
    actions.appendChild(delBtn); el.appendChild(actions);
    if (card.type === 'text') {
      const text = document.createElement('div'); text.className = 'text'; text.contentEditable = true;
      text.innerHTML = card.content || '';
      text.addEventListener('focus', () => { snapshot(); });
      text.addEventListener('blur', () => { card.content = text.innerHTML; saveBoard(); });
      el.appendChild(text);
    } else if (card.type === 'image') {
      const img = document.createElement('img');
      img.src = card.src.startsWith('http') || card.src.startsWith('data:') ? card.src : IMG_BASE + card.src;
      img.alt = ''; img.loading = 'lazy'; img.onerror = () => img.style.display = 'none';
      if (card.w) img.style.width = card.w + 'px';
      if (card.h) img.style.height = card.h + 'px';
      if (card.link) { const a = document.createElement('a'); a.href = card.link; a.target = '_blank'; a.appendChild(img); el.appendChild(a); }
      else { el.appendChild(img); }
      if (card.caption) { const cap = document.createElement('div'); cap.style.cssText = 'font-size:11px;color:#8b949e;margin-top:4px;word-break:break-word;padding:0 2px;'; cap.textContent = card.caption; el.appendChild(cap); }
    } else if (card.type === 'html') {
      const wrapper = document.createElement('div');
      wrapper.style.cssText = 'overflow:auto;font-size:13px;line-height:1.5;';
      wrapper.innerHTML = card.html.replace(/__ATTACHMENT__/g, IMG_BASE);
      wrapper.querySelectorAll('img').forEach(img => { img.style.maxWidth = '100%'; img.style.height = 'auto'; img.draggable = false; });
      wrapper.querySelectorAll('a').forEach(a => { a.target = '_blank'; a.style.color = '#6cb0f6'; });
      wrapper.querySelectorAll('table').forEach(t => { t.style.borderCollapse = 'collapse'; });
      wrapper.querySelectorAll('td,th').forEach(td => {
        td.style.border = '1px solid #444'; td.style.padding = '4px 6px'; td.style.verticalAlign = 'top';
        td.title = '더블클릭으로 편집';
        td.addEventListener('dblclick', function(e) {
          e.stopPropagation();
          snapshot();
          this.contentEditable = 'true';
          this.style.outline = '2px solid #388bfd';
          this.style.background = 'rgba(56,139,253,0.08)';
          this.focus();
        });
        td.addEventListener('blur', function() {
          this.contentEditable = 'false';
          this.style.outline = '';
          this.style.background = '';
          cards[i].html = wrapper.innerHTML.split(IMG_BASE).join('__ATTACHMENT__');
          saveBoard();
        });
      });
      el.appendChild(wrapper);
    } else if (card.type === 'table') {
      const rows = card.rows || [['','',''],['','',''],['','','']];
      const tbl = document.createElement('table');
      tbl.style.cssText = 'border-collapse:collapse;width:100%;font-size:13px;';
      rows.forEach((row, ri) => {
        const tr = tbl.insertRow();
        row.forEach((cell, ci) => {
          const td = document.createElement(ri === 0 ? 'th' : 'td');
          td.contentEditable = true;
          td.style.cssText = 'border:1px solid #30363d;padding:4px 8px;min-width:60px;text-align:left;' + (ri===0 ? 'background:#21262d;font-weight:600;' : '');
          td.textContent = cell;
          td.addEventListener('blur', () => { if (!cards[i].rows) cards[i].rows = rows; rows[ri][ci] = td.textContent; saveBoard(); });
          tr.appendChild(td);
        });
      });
      el.appendChild(tbl);
      const addRow = document.createElement('button');
      addRow.textContent = '+ 행'; addRow.style.cssText = 'margin-top:4px;font-size:11px;background:#21262d;border:1px solid #30363d;color:#8b949e;padding:2px 8px;border-radius:4px;cursor:pointer;';
      addRow.onclick = e => { e.stopPropagation(); snapshot(); if (!cards[i].rows) cards[i].rows = rows; cards[i].rows.push(new Array(cards[i].rows[0].length).fill('')); renderCards(); saveBoard(); };
      const addCol = document.createElement('button');
      addCol.textContent = '+ 열'; addCol.style.cssText = 'margin-top:4px;margin-left:4px;font-size:11px;background:#21262d;border:1px solid #30363d;color:#8b949e;padding:2px 8px;border-radius:4px;cursor:pointer;';
      addCol.onclick = e => { e.stopPropagation(); snapshot(); if (!cards[i].rows) cards[i].rows = rows; cards[i].rows.forEach(r => r.push('')); renderCards(); saveBoard(); };
      el.appendChild(addRow); el.appendChild(addCol);
    }
    const rh = document.createElement('div'); rh.className = 'resize-handle';
    rh.addEventListener('mousedown', e => { e.preventDefault(); e.stopPropagation(); snapshot(); resizing = { idx: i, startX: e.clientX, startW: card.w || el.offsetWidth }; });
    el.appendChild(rh);
    if (i === selectedIdx) el.classList.add('selected');
    board.appendChild(el);
  });
  requestAnimationFrame(() => {
    let maxB = 0;
    document.querySelectorAll('.card').forEach(el => { const b = (parseFloat(el.style.top)||0) + el.offsetHeight; if (b > maxB) maxB = b; });
    board.style.minHeight = (maxB + 100) + 'px';
  });
}

document.addEventListener('mousemove', e => {
  if (moving) {
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`); if (!el) return;
    let nx = moving.origX + e.clientX - moving.startX, ny = moving.origY + e.clientY - moving.startY;
    if (e.shiftKey) { nx = snap(nx); ny = snap(ny); el.style.outline = '1px dashed rgba(240,192,64,0.3)'; } else { el.style.outline = ''; }
    el.style.left = nx + 'px'; el.style.top = ny + 'px';
  }
  if (resizing) {
    let nw = resizing.startW + e.clientX - resizing.startX; if (e.shiftKey) nw = snap(nw);
    cards[resizing.idx].w = Math.max(100, nw);
    const el = document.querySelector(`.card[data-idx="${resizing.idx}"]`); if (el) el.style.width = cards[resizing.idx].w + 'px';
  }
});

document.addEventListener('mouseup', e => {
  if (moving) {
    let nx = moving.origX + e.clientX - moving.startX, ny = moving.origY + e.clientY - moving.startY;
    if (e.shiftKey) { nx = snap(nx); ny = snap(ny); }
    cards[moving.idx].x = Math.max(0, nx); cards[moving.idx].y = Math.max(0, ny);
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`); if (el) { el.classList.remove('moving'); el.style.outline = ''; }
    if (e.shiftKey) pushCards(moving.idx);
    moving = null; saveBoard();
  }
  if (resizing) { if (e.shiftKey) pushCards(resizing.idx); resizing = null; saveBoard(); }
});

function addTextCard() { snapshot(); cards.push({ type: 'text', content: '', x: 50, y: window.scrollY+100, w: 300 }); renderCards(); setTimeout(() => { const els = document.querySelectorAll('.card .text'); els[els.length-1]?.focus(); }, 100); }
function addImageCard() { const input = document.createElement('input'); input.type = 'file'; input.accept = 'image/*'; input.onchange = e => { const f = e.target.files[0]; if (!f) return; const r = new FileReader(); r.onload = () => { snapshot(); cards.push({ type: 'image', src: r.result, x: 50, y: window.scrollY+100, w: 240 }); renderCards(); saveBoard(); }; r.readAsDataURL(f); }; input.click(); }
function addImageUrl() { const url = prompt('이미지 URL'); if (!url) return; snapshot(); cards.push({ type: 'image', src: url, x: 50, y: window.scrollY+100, w: 240 }); renderCards(); saveBoard(); }
function addTableCard() {
  const colsStr = prompt('열 수 (기본 3)', '3'); const cols = Math.max(1, parseInt(colsStr)||3);
  const rowsStr = prompt('행 수 (헤더 포함, 기본 4)', '4'); const rows = Math.max(1, parseInt(rowsStr)||4);
  snapshot();
  cards.push({ type: 'table', rows: Array.from({length: rows}, (_, ri) => Array.from({length: cols}, (_, ci) => ri===0 ? `열${ci+1}` : '')), x: 50, y: window.scrollY+100, w: Math.max(240, cols*100) });
  renderCards(); saveBoard();
}
function exportBoard() { syncText(); const blob = new Blob([JSON.stringify(cards, null, 2)], { type: 'application/json' }); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = SAVE_KEY + '.json'; a.click(); }
// ── Zoom ─────────────────────────────────────────────────────────────────────
let zoom = parseFloat(localStorage.getItem('zoom-' + SAVE_KEY) || '1.0');
function applyZoom() {
  const board = document.getElementById('board');
  board.style.transform = `scale(${zoom})`;
  board.style.transformOrigin = '0 0';
  document.getElementById('zoom-level').textContent = Math.round(zoom * 100) + '%';
  localStorage.setItem('zoom-' + SAVE_KEY, zoom);
}
function zoomIn()  { zoom = Math.min(3.0, parseFloat((zoom + 0.1).toFixed(2))); applyZoom(); }
function zoomOut() { zoom = Math.max(0.2, parseFloat((zoom - 0.1).toFixed(2))); applyZoom(); }
document.addEventListener('keydown', e => {
  if (e.ctrlKey || e.metaKey) {
    if (e.key === '=' || e.key === '+') { e.preventDefault(); zoomIn(); }
    if (e.key === '-')                  { e.preventDefault(); zoomOut(); }
    if (e.key === '0')                  { e.preventDefault(); zoom = 1.0; applyZoom(); }
  }
});
document.getElementById('board').addEventListener('wheel', e => {
  if (!(e.ctrlKey || e.metaKey)) return;
  e.preventDefault();
  e.deltaY < 0 ? zoomIn() : zoomOut();
}, { passive: false });
applyZoom();
function resetLayout() { if (!confirm('자동 재배치합니다.')) return; cards.forEach(c => { delete c.x; delete c.y; }); renderCards(); autoLayout(); }
// ── Floating format toolbar ───────────────────────────────────────────────────
const fmtBar = document.getElementById('format-toolbar');
function fmt(cmd) { document.execCommand(cmd, false, null); saveBoard(); }
function fmtLink() {
  const sel = window.getSelection();
  if (!sel || sel.isCollapsed) return;
  const url = prompt('링크 URL 입력', 'https://');
  if (!url) return;
  document.execCommand('createLink', false, url);
  // make links open in new tab
  sel.anchorNode?.parentElement?.closest('a')?.setAttribute('target', '_blank');
  document.querySelectorAll('.text a').forEach(a => a.target = '_blank');
  saveBoard();
}

// prevent format buttons from blurring contenteditable
fmtBar.addEventListener('mousedown', e => e.preventDefault());

document.addEventListener('selectionchange', () => {
  const sel = window.getSelection();
  if (!sel || sel.isCollapsed || !sel.toString().trim()) { fmtBar.style.display = 'none'; return; }
  // only show if selection is inside a .text element
  const anchor = sel.anchorNode;
  if (!anchor) { fmtBar.style.display = 'none'; return; }
  const textEl = anchor.nodeType === 1 ? anchor.closest('.text') : anchor.parentElement?.closest('.text');
  if (!textEl) { fmtBar.style.display = 'none'; return; }
  // position above selection
  const range = sel.getRangeAt(0);
  const rect = range.getBoundingClientRect();
  fmtBar.style.display = 'flex';
  const tbW = fmtBar.offsetWidth || 180;
  let left = rect.left + rect.width / 2 - tbW / 2;
  left = Math.max(8, Math.min(left, window.innerWidth - tbW - 8));
  fmtBar.style.left = left + 'px';
  fmtBar.style.top = (rect.top - 44 + window.scrollY) + 'px';
});

setInterval(saveBoard, 30000);
loadBoard();
</script>
</body>
