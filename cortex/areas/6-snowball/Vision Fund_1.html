    "html": "\r\n\t\t\t<p style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">최근</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> WeWork </span><span style=\"font-family:Malgun Gothic\">주주로부터</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">소송을</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">당하는</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">등</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">우울한</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">나날들을</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">지나고</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">있는</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> Softbank Vision Fund(</span><span style=\"font-family:Malgun Gothic\">이하</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> SVF)</span><span style=\"font-family:Malgun Gothic\">에</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">대해</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">정리해본다</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\">.</span></p>\r\n\t\t\t<br />\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">SVF</span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">는</span><span style=\"font-family:Malgun Gothic\"> 2016</span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">년</span><span style=\"font-family:Malgun Gothic\"> 10</span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">월에</span><span style=\"font-family:Malgun Gothic\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">결성된</span><span style=\"font-family:Malgun Gothic\"> 1</span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">호</span><span style=\"font-family:Malgun Gothic\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">펀드</span><span style=\"font-family:Malgun Gothic\">(</span><span lang=\"ko-KR\">SoftBank Vision Fund L.P.</span><span style=\"font-family:Malgun Gothic\">)</span><span lang=\"ko-KR\">와</span> 2019<span lang=\"ko-KR\">년</span> 6<span lang=\"ko-KR\">월에</span> <span lang=\"ko-KR\">결성된</span> </p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">2</span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">호</span><span style=\"font-family:Malgun Gothic\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">펀드</span><span style=\"font-family:Malgun Gothic\">(</span><span lang=\"ko-KR\">SoftBank Vision Fund 2</span><span style=\"font-family:Malgun Gothic\">)</span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">가</span><span style=\"font-family:Malgun Gothic\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">있다</span><span style=\"font-family:Malgun Gothic\">. 100</span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">조</span><span style=\"font-family:Malgun Gothic\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">라는</span><span style=\"font-family:Malgun Gothic\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">막대한</span><span style=\"font-family:Malgun Gothic\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">규모로</span><span style=\"font-family:Malgun Gothic\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">유명한</span><span style=\"font-family:Malgun Gothic\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">두</span><span style=\"font-family:Malgun Gothic\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">펀드는</span><span style=\"font-family:Malgun Gothic\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">영국</span><span style=\"font-family:Malgun Gothic\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">소재의</span><span style=\"font-family:Malgun Gothic\"> </span><span lang=\"ko-KR\">SoftBank Investment Advisers (UK) Limited</span><span style=\"font-family:Malgun Gothic\">(</span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">이하</span><span style=\"font-family:Malgun Gothic\"> SBIA UK)</span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">가</span><span style=\"font-family:Malgun Gothic\"> GP</span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">를</span><span style=\"font-family:Malgun Gothic\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">담당하고</span><span style=\"font-family:Malgun Gothic\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">있다</span><span style=\"font-family:Malgun Gothic\">. SBIA UK</span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">는</span><span style=\"font-family:Malgun Gothic\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">Vision Fund 1,2호를 포함 3개 펀드를</span><span style=\"font-family:Malgun Gothic\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">운영중이며</span><span style=\"font-family:Malgun Gothic\"> AUM</span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">은 총 $ 210B에</span><span style=\"font-family:Malgun Gothic\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">이른다</span><span style=\"font-family:Malgun Gothic\">.</span></p>\r\n\t\t\t<br />\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">SVF</span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">는</span><span style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Tahoma;font-size:11pt;color:black\">Softbank Group Corp.</span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic;font-size:11pt;color:black\">의</span><span style=\"font-family:Malgun Gothic;font-size:11pt;color:black\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic;font-size:11pt;color:black\">최대주주인</span><span style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Tahoma;font-size:11pt;color:black\">Masayoshi</span><span lang=\"ko-KR\" style=\"font-family:Tahoma;font-size:11pt;color:black\"> </span><span style=\"font-family:Tahoma;font-size:11pt;color:black\">Son(</span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">손정의</span><span style=\"font-family:Malgun Gothic\">)</span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">의</span><span style=\"font-family:Malgun Gothic\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">간접적인</span><span style=\"font-family:Malgun Gothic\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">영향력</span><span style=\"font-family:Malgun Gothic\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">하에</span><span style=\"font-family:Malgun Gothic\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">있다</span><span style=\"font-family:Malgun Gothic\">. </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">실제 투자 집행 시 Investment Committee 통해 의견 개진하는</span><span style=\"font-family:Malgun Gothic\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">것으로</span><span style=\"font-family:Malgun Gothic\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">알려져</span><span style=\"font-family:Malgun Gothic\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">있으며</span><span style=\"font-family:Malgun Gothic\">, </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">대내외적인</span><span style=\"font-family:Malgun Gothic\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">영향력이</span><span style=\"font-family:Malgun Gothic\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">지대하여</span><span style=\"font-family:Malgun Gothic\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">실질적인</span><span style=\"font-family:Malgun Gothic\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">지배력을</span><span style=\"font-family:Malgun Gothic\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">행사하고</span><span style=\"font-family:Malgun Gothic\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">있다고</span><span style=\"font-family:Malgun Gothic\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">해도</span><span style=\"font-family:Malgun Gothic\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">무방하다</span><span style=\"font-family:Malgun Gothic\">.</span></p>\r\n\t\t\t<br />\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">SVF</span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">의</span><span style=\"font-family:Malgun Gothic\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">구조는</span><span style=\"font-family:Malgun Gothic\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">아래와</span><span style=\"font-family:Malgun Gothic\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">같다</span><span style=\"font-family:Malgun Gothic\">.</span></p>\r\n\t\t\t<br />\r\n\t\t\t<div style=\"display:inline-block;width:480px;height:335px;background:#2d333b;border-radius:4px;margin:2px;vertical-align:top;opacity:0.4\"></div>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">언뜻</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">복잡해</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">보이지만</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">단순화</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">해보자면</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\">, SBIA</span><span style=\"font-family:Malgun Gothic\">가</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> GP</span><span style=\"font-family:Malgun Gothic\">를</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">담당하고</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\">, SBG(</span><span style=\"font-family:Malgun Gothic\">소프트뱅크</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">그룹</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\">)</span><span style=\"font-family:Malgun Gothic\">과</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">기타</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> LP</span><span style=\"font-family:Malgun Gothic\">가</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">펀드에</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">자금을</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">출자하는</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">구조이다</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\">.</span></p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic;font-weight:bold\">독특한</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-weight:bold\"> </span><span style=\"font-family:Malgun Gothic;font-weight:bold\">자금조달</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic;font-weight:bold\"> </span><span style=\"font-family:Malgun Gothic;font-weight:bold\">구조</span></p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">SVF</span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">의</span><span style=\"font-family:Malgun Gothic\"> LP </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">구성과</span><span style=\"font-family:Malgun Gothic\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">자금조달</span><span style=\"font-family:Malgun Gothic\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">구조는</span><span style=\"font-family:Malgun Gothic\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">다음과</span><span style=\"font-family:Malgun Gothic\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">같다</span><span style=\"font-family:Malgun Gothic\">. </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">독특한</span><span style=\"font-family:Malgun Gothic\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">점은</span><span style=\"font-family:Malgun Gothic\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">부채를</span><span style=\"font-family:Malgun Gothic\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">활용하고</span><span style=\"font-family:Malgun Gothic\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">있다는</span><span style=\"font-family:Malgun Gothic\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">점이다</span><span style=\"font-family:Malgun Gothic\">. </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">통상적으로</span><span style=\"font-family:Malgun Gothic\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">전통적인</span><span style=\"font-family:Malgun Gothic\"> PEF</span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">형태의</span><span style=\"font-family:Malgun Gothic\"> VC</span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">에</span><span style=\"font-family:Malgun Gothic\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">참여하는</span><span style=\"font-family:Malgun Gothic\"> LP</span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">들은</span><span style=\"font-family:Malgun Gothic\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">주식으로</span><span style=\"font-family:Malgun Gothic\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">펀드에</span><span style=\"font-family:Malgun Gothic\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">출자하게</span><span style=\"font-family:Malgun Gothic\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">되는데</span><span style=\"font-family:Malgun Gothic\">, SVF</span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">의</span><span style=\"font-family:Malgun Gothic\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">경우</span><span style=\"font-family:Malgun Gothic\"> LP</span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">들에게</span><span style=\"font-family:Malgun Gothic\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">회사채를</span><span style=\"font-family:Malgun Gothic\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">발행하는</span><span style=\"font-family:Malgun Gothic\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">방식도</span><span style=\"font-family:Malgun Gothic\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">함께</span><span style=\"font-family:Malgun Gothic\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">활용하고</span><span style=\"font-family:Malgun Gothic\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">있어</span><span style=\"font-family:Malgun Gothic\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">자본과</span><span style=\"font-family:Malgun Gothic\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">부채가</span><span style=\"font-family:Malgun Gothic\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">혼합된</span><span style=\"font-family:Malgun Gothic\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">형태이다</span><span style=\"font-family:Malgun Gothic\">. </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">펀드의</span><span style=\"font-family:Malgun Gothic\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">약</span><span style=\"font-family:Malgun Gothic\"> 62%</span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">가</span><span style=\"font-family:Malgun Gothic\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">부채로</span><span style=\"font-family:Malgun Gothic\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">구성되어</span><span style=\"font-family:Malgun Gothic\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">있으며</span><span style=\"font-family:Malgun Gothic\">, LP</span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">중</span><span style=\"font-family:Malgun Gothic\"> SBG</span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">만</span><span style=\"font-family:Malgun Gothic\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">주식으로</span><span style=\"font-family:Malgun Gothic\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">출자하고</span><span style=\"font-family:Malgun Gothic\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">있다</span><span style=\"font-family:Malgun Gothic\">.</span></p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">이러한</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">구조가</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">주는</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">이점으로는</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\">,</span></p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">1/ </span><span lang=\"ko-KR\">LP 입장에서는 투자금 회수 기간이 길고 투자 위험도가 높은 벤처펀드임에도 안정적인 수익을 보장받을 수 있으며</span></p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">2/</span><span lang=\"ko-KR\"> GP 입장에서는 대규모</span> <span lang=\"ko-KR\">자금을 보다 수월하게 조달 할</span> <span lang=\"ko-KR\">수</span> <span lang=\"ko-KR\">있다.</span></p>\r\n\t\t\t<br />\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">100</span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">조에</span><span style=\"font-family:Malgun Gothic\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">달하는</span><span style=\"font-family:Malgun Gothic\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">기념비적인</span><span style=\"font-family:Malgun Gothic\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">규모의</span><span style=\"font-family:Malgun Gothic\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">펀드조성을</span><span style=\"font-family:Malgun Gothic\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">위해</span><span style=\"font-family:Malgun Gothic\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">최적화</span><span style=\"font-family:Malgun Gothic\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">되어</span><span style=\"font-family:Malgun Gothic\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">있다고</span><span style=\"font-family:Malgun Gothic\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">볼</span><span style=\"font-family:Malgun Gothic\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">수</span><span style=\"font-family:Malgun Gothic\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">있다</span><span style=\"font-family:Malgun Gothic\">.</span></p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-weight:bold\">비전펀드의</span><span lang=\"en-US\" style=\"font-weight:bold\"> </span><span style=\"font-weight:bold\">비즈니스</span><span lang=\"en-US\" style=\"font-weight:bold\"> </span><span style=\"font-weight:bold\">모델</span>도<span lang=\"en-US\"> </span>독특한데<span lang=\"en-US\">,</span></p>\r\n\t\t\t<p style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\">LP들은 투자 성과와 무관하게 <span lang=\"en-US\" style=\"font-family:Malgun Gothic\">SVF</span><span style=\"font-family:Malgun Gothic\">가</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">운영되는</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span>12년 간 7%의 고정된 쿠폰금리로 연 2회 이자를 지급받게 된다. 또 추가 수익이 나면 출자 비중에 따라 이익을 배분받는다.<span lang=\"en-US\"> </span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\">GP</span><span style=\"font-family:Malgun Gothic\">인</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span>소프트뱅크는 이자를 지급하고 남은 수익의 20%를 가져갈<span lang=\"en-US\"> </span>수<span lang=\"en-US\"> </span>있고<span lang=\"en-US\">, </span>출자된<span lang=\"en-US\"> </span>자금에<span lang=\"en-US\"> </span>대해 해마다 0.7~1.3% 수수료를 받는다. 이는<span lang=\"en-US\">, SBG</span>가 펀드의 리스크를 거의 모두 짊어지고, 나머지<span lang=\"en-US\"> LP</span>들은 상대적으로 안전하게 투자할 수 있다는 뜻이다. 물론 <span lang=\"en-US\">Upside</span>도<span lang=\"en-US\"> </span>가장<span lang=\"en-US\"> </span>많이<span lang=\"en-US\"> </span>가져갈<span lang=\"en-US\"> </span>수<span lang=\"en-US\"> </span>있는<span lang=\"en-US\"> </span>것도<span lang=\"en-US\"> </span>사실이다<span lang=\"en-US\">. </span>이런<span lang=\"en-US\"> </span>대담한<span lang=\"en-US\"> </span>구조에<span lang=\"en-US\"> </span>대해<span lang=\"en-US\"> </span>FT는 소프트뱅크의 재무제표에 영향을 주지 않고 투자하기 위한 것이라고 분석했다.</p>\r\n\t\t\t<br />\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic;font-weight:bold\">SVF</span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic;font-weight:bold\">의</span><span style=\"font-family:Malgun Gothic;font-weight:bold\"> Portfolio</span></p>\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<div style=\"display:inline-block;width:265px;height:252px;background:#2d333b;border-radius:4px;margin:2px;vertical-align:top;opacity:0.4\"></div>\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">누적</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">투자</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">건수는</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> 98</span><span style=\"font-family:Malgun Gothic\">건에</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">이르며</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\">, </span><span style=\"font-family:Malgun Gothic\">그중</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> SBG</span><span style=\"font-family:Malgun Gothic\">와</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">공동으로</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">투자한</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">건이</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> 10</span><span style=\"font-family:Malgun Gothic\">건이다</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\">.</span></p>\r\n\t\t\t<p style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\">비전 펀드의 투자요건에 부합할 경우 소뱅 투자건을 양도 가능하도록<span lang=\"en-US\"> </span>해두었다<span lang=\"en-US\">. </span>특히<span lang=\"en-US\"> WeWork</span>에<span lang=\"en-US\"> </span>공동투자하며<span lang=\"en-US\"> </span>막대한<span lang=\"en-US\"> </span>자금을<span lang=\"en-US\"> </span>투하하며<span lang=\"en-US\"> </span>손정의<span lang=\"en-US\"> </span>회장의<span lang=\"en-US\"> WeWork</span>에<span lang=\"en-US\"> </span>대한<span lang=\"en-US\"> </span>큰<span lang=\"en-US\"> </span>기대감을<span lang=\"en-US\"> </span>보여줬는데<span lang=\"en-US\">,</span></p>\r\n\t\t\t<br />\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">2019</span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">년</span><span style=\"font-family:Malgun Gothic\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">말</span><span style=\"font-family:Malgun Gothic\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">기준</span><span style=\"font-family:Malgun Gothic\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">실적</span></p>\r\n\t\t\t<div style=\"display:inline-block;width:480px;height:488px;background:#2d333b;border-radius:4px;margin:2px;vertical-align:top;opacity:0.4\"></div>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-weight:bold\">비전펀드 자금조달 구조 및 비즈니스 모델 </span></p>\r\n\t\t\t<p style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\">비전펀드는 독특한 조달구조를 지니고 있다. 통상 LP들은 주식으로서 벤처펀드 혹은 PEF에 출자하는데, 비전펀드의 경우 LP들에게 회사채를 발행하는 방식도 함께 활용하고 있다. 즉, 비전펀드 자금에는 자본과 부채가 혼합되어 있다. 특히 LP의 주축이 되는 사우디아라비아, 아부다비 국부펀드의 출자금을 포함하여 비전펀드의 약 62% 가량이 부채로 조달되며, LP 중에서 소프트뱅크 그룹이 유일하게 주식으로만 출자 중이다. 이처럼 주식과 채권을 혼합하여 벤처펀드를 구성하는 경우는 흔하지 않아 투자자들의 주목을 받았다. 일부 우려에도 불구, 이러한 조달구조는 1) 부채로 출자한 LP 입장에서는 투자금 회수 기간이 길고(평균 7~8년) 투자 위험도가 높은 벤처펀드에서 안정적인 수익을 보장받을 수 있으며, 2) GP 입장에서는 큰 규모의 금액을 보다 수월하게 조달 받을 수 있다는 장점이 있다. 이와 같은 조달구조에 따라 비전펀드의 비즈니스 모델 역시 독특한 편인데, 먼저 비전펀드에 부채로 출자한 LP들은 투자 성과와 무관하게 12년 간 7%의 고정된 쿠폰금리로 연 2회 이자를 지급받게 된다. 그리고 투자 결과에 따른 성과는 나머지 LP 및 GP에게 배분된다.</p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\"><span style=\"color:#666666;font-weight:bold\">전통적 PEF 자본구성과 달리 자산의 44% 부채로 조달 계획</span><span lang=\"en-US\" style=\"color:#666666;font-weight:bold\">, </span><span style=\"color:#666666;font-weight:bold\">소프트뱅크만 100% 자본 출자</span></p>\r\n\t\t\t<p style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\"><span style=\"color:#666666;font-weight:bold\">재무부담 없이 통큰 투자 의도</span></p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">전통적인 사모펀드(PEF) 형태의 벤처캐피털은 대부분 100% 자본으로 구성돼 있다. 투자 대상 기업의 지분을 사들일 때 취득하려는 자산을 담보로 대출을 일으켜서 자금을 추가 조달하는 것이 자금력을 극대화하기에 유리하기 때문이다. 반면 비전펀드는 자산의 44%를 부채(회사채 발행)로 조달할 계획이다.</span></p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\">목표액 1000억달러 가운데 930억달러 투자를 확약받은 비전펀드의 구조를 살펴보면 소프트뱅크만이 280억달러를 100% 자본으로 출자한다. 소프트뱅크는 앞서 사들인 영국 반도체 설계회사 ARM과 엔비디아 지분 등을 현물출자하기로 했다. 나머지 외부 투자자들은 출자와 회사채 투자(대출)를 병행한다.</p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\">예컨대 최대 투자자인 사우디아라비아 공공투자펀드(PIF)는 비전펀드에 170억달러를 출자하고, 280억달러는 회사채 투자로 댄다. 나머지도 비중은 다르지만 모두 유사한 ‘하이브리드’ 투자구조다.</p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\">1000억달러 자금 조달이 완료됐다고 가정했을 때 비전펀드 자산의 28%는 소프트뱅크 지분, 28%는 외부 투자자 지분, 44%는 부채로 구성될 예정이다. 펀드 조성에 관여한 한 인물은 FT에 비전펀드가 현금흐름이 나오지 않는 IT 스타트업(신생 벤처기업)에 투자하려 하기 때문에 처음부터 부채를 포함해 자금을 조달하는 것이라고 설명했다.</p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\">외부 투자자들은 비전펀드가 운영되는 12년 동안 대출분에 대해 연 7%씩 이자를 받게 된다. 또 추가 수익이 나면 출자 비중에 따라 이익을 배분받는다. 소프트뱅크는 펀드매니저로서 이자를 지급하고 남은 수익의 20%를 가져갈 수 있다. 또 출자된 자금에 대해 해마다 0.7~1.3% 수수료를 받아갈 예정이다. 소프트뱅크가 이 펀드의 리스크를 거의 모두 짊어지고, 나머지 투자자들은 상대적으로 안전하게 투자할 수 있다는 뜻이다. 물론 대박이 나면 그 수익도 소프트뱅크에 가장 많이 돌아간다.</p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\">손 사장이 이 같은 구조를 짠 데 대해 FT는 소프트뱅크의 재무제표에 영향을 주지 않고 투자하기 위한 것이라고 분석했다. 쓰루오 미쓰노부 씨티그룹 애널리스트는 “이 구조는 손 사장의 자신감과 욕심을 동시에 반영하는 것”이라고 평가했다.</p>\r\n\t\t\t<br />\r\n\t\t\t<div style=\"display:inline-block;width:480px;height:509px;background:#2d333b;border-radius:4px;margin:2px;vertical-align:top;opacity:0.4\"></div>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">비전펀드</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">법인</span><span lang=\"en-U const CONTENT_HASH = '3cd6d5ae';

let cards = [];
let moving = null, resizing = null;
let selectedIdx = null, clipboardCard = null;
const GRID = 20, GAP = 14;
function snap(v) { return Math.round(v / GRID) * GRID; }

// ── Undo (Ctrl+Z) ────────────────────────────────────────────────────────────
const MAX_HISTORY = 50;
let history = [];
function snapshot() {
  syncText();
  history.push(JSON.stringify(cards));
  if (history.length > MAX_HISTORY) history.shift();
}
function undo() {
  if (!history.length) { showStatus('되돌릴 내용 없음'); return; }
  syncText();
  cards = JSON.parse(history.pop());
  renderCards();
  saveBoard();
  showStatus('↩ 되돌림');
}
function showStatus(msg) {
  const s = document.getElementById('status');
  s.textContent = msg;
  clearTimeout(showStatus._t);
  showStatus._t = setTimeout(() => { s.textContent = ''; }, 2000);
}
document.addEventListener('keydown', e => {
  const isText = document.activeElement?.contentEditable === 'true';
  if ((e.ctrlKey || e.metaKey) && e.key === 'z' && !e.shiftKey) {
    if (isText) return;
    e.preventDefault();
    undo();
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'c' && !e.shiftKey && !isText) {
    if (selectedIdx !== null && cards[selectedIdx]) {
      syncText();
      clipboardCard = JSON.parse(JSON.stringify(cards[selectedIdx]));
      showStatus('카드 복사됨');
      e.preventDefault();
    }
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'v' && !e.shiftKey && !isText) {
    if (clipboardCard) {
      e.preventDefault();
      snapshot();
      const nc = JSON.parse(JSON.stringify(clipboardCard));
      nc.x = (nc.x || 0) + 30; nc.y = (nc.y || 0) + 30;
      cards.push(nc);
      selectedIdx = cards.length - 1;
      renderCards(); saveBoard();
      showStatus('카드 붙여넣음');
    }
  }
  if (e.key === 'Escape') {
    document.querySelectorAll('.card.selected').forEach(c => c.classList.remove('selected'));
    selectedIdx = null;
  }
});

function pushCards(movedIdx) {
  const moved = cards[movedIdx];
  const movedEl = document.querySelector(`.card[data-idx="${movedIdx}"]`);
  if (!movedEl) return;
  const mh = movedEl.offsetHeight;
  document.querySelectorAll('.card').forEach(el => {
    const i = +el.dataset.idx;
    if (i === movedIdx) return;
    const c = cards[i], oh = el.offsetHeight;
    if (moved.x < (c.x+(c.w||200)) && (moved.x+(moved.w||200)) > c.x && moved.y < (c.y+oh) && (moved.y+mh) > c.y) {
      c.y = moved.y + mh + GAP;
      el.style.top = c.y + 'px';
    }
  });
}

function loadBoard() {
  const saved = localStorage.getItem(SAVE_KEY);
  const savedHash = localStorage.getItem(SAVE_KEY + ':hash');
  let parsed = null;
  try { parsed = saved ? JSON.parse(saved) : null; } catch(e) {}
  // reset if: no save, empty array, or content hash changed (page regenerated)
  if (!parsed || parsed.length === 0 || savedHash !== CONTENT_HASH) {
    cards = DEFAULT_CARDS.map(c => ({...c}));
    localStorage.removeItem(SAVE_KEY);
    localStorage.setItem(SAVE_KEY + ':hash', CONTENT_HASH);
    renderCards();
    const hasCoords = cards.some(c => c.x !== undefined && c.y !== undefined);
    if (!hasCoords) autoLayout();
    return;
  }
  cards = parsed;
  renderCards();
}
function resetToDefaults() { if (!confirm('저장된 보드를 지우고 원본으로 초기화합니다. 계속할까요?')) return; localStorage.removeItem(SAVE_KEY); cards = DEFAULT_CARDS.map(c => ({...c})); renderCards(); autoLayout(); }

function autoLayout() {
  const boardW = document.getElementById('board').offsetWidth;
  const cols = Math.max(1, Math.floor(boardW / 280));
  const colW = (boardW - GAP*(cols-1)) / cols;
  const colH = new Array(cols).fill(0);
  const allCards = document.querySelectorAll('.card');
  const images = document.querySelectorAll('.card img');
  let loaded = 0;
  function place() {
    allCards.forEach((el, i) => {
      const w = Math.min(cards[i].w || colW, colW);
      let minCol = 0;
      for (let c = 1; c < cols; c++) if (colH[c] < colH[minCol]) minCol = c;
      cards[i].x = minCol * (colW + GAP);
      cards[i].y = colH[minCol];
      cards[i].w = w;
      el.style.left = cards[i].x + 'px';
      el.style.top = cards[i].y + 'px';
      el.style.width = w + 'px';
      colH[minCol] = cards[i].y + el.offsetHeight + GAP;
    });
    document.getElementById('board').style.minHeight = (Math.max(...colH) + 100) + 'px';
    saveBoard();
  }
  if (!images.length) { requestAnimationFrame(place); return; }
  images.forEach(img => {
    if (img.complete) { loaded++; if (loaded >= images.length) requestAnimationFrame(place); }
    else { img.onload = img.onerror = () => { loaded++; if (loaded >= images.length) requestAnimationFrame(place); }; }
  });
}

function syncText() {
  document.querySelectorAll('.card').forEach(el => {
    const i = +el.dataset.idx;
    if (cards[i]?.type === 'text') { const t = el.querySelector('.text'); if (t) cards[i].content = t.innerHTML; }
  });
}
function saveBoard() { syncText(); localStorage.setItem(SAVE_KEY, JSON.stringify(cards)); localStorage.setItem(SAVE_KEY + ':hash', CONTENT_HASH); showStatus('저장됨 ' + new Date().toLocaleTimeString()); }

function renderCards() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  cards.forEach((card, i) => {
    const el = document.createElement('div');
    el.className = 'card'; el.dataset.idx = i;
    if (card.x !== undefined) el.style.left = card.x + 'px';
    if (card.y !== undefined) el.style.top = card.y + 'px';
    // html cards contain raw OneNote table HTML which may overflow the stated div width
    if (card.w) { if (card.type === 'html') el.style.minWidth = card.w + 'px'; else el.style.width = card.w + 'px'; }
    el.addEventListener('mousedown', e => {
      if (e.target.closest('.text, a, .card-btn, .resize-handle, td, th')) return;
      e.preventDefault();
      // Update selection
      document.querySelectorAll('.card.selected').forEach(c => c.classList.remove('selected'));
      selectedIdx = i; el.classList.add('selected');
      snapshot();
      moving = { idx: i, startX: e.clientX, startY: e.clientY, origX: card.x||0, origY: card.y||0 };
      el.classList.add('moving');
    });
    const actions = document.createElement('div'); actions.className = 'card-actions';
    const delBtn = document.createElement('button'); delBtn.className = 'card-btn'; delBtn.textContent = '×';
    delBtn.onclick = e => { e.stopPropagation(); if(confirm('삭제?')) { snapshot(); cards.splice(i,1); renderCards(); saveBoard(); } };
    actions.appendChild(delBtn); el.appendChild(actions);
    if (card.type === 'text') {
      const text = document.createElement('div'); text.className = 'text'; text.contentEditable = true;
      text.innerHTML = card.content || '';
      text.addEventListener('focus', () => { snapshot(); });
      text.addEventListener('blur', () => { card.content = text.innerHTML; saveBoard(); });
      el.appendChild(text);
    } else if (card.type === 'image') {
      const img = document.createElement('img');
      img.src = card.src.startsWith('http') || card.src.startsWith('data:') ? card.src : IMG_BASE + card.src;
      img.alt = ''; img.loading = 'lazy'; img.onerror = () => img.style.display = 'none';
      if (card.w) img.style.width = card.w + 'px';
      if (card.h) img.style.height = card.h + 'px';
      if (card.link) { const a = document.createElement('a'); a.href = card.link; a.target = '_blank'; a.appendChild(img); el.appendChild(a); }
      else { el.appendChild(img); }
      if (card.caption) { const cap = document.createElement('div'); cap.style.cssText = 'font-size:11px;color:#8b949e;margin-top:4px;word-break:break-word;padding:0 2px;'; cap.textContent = card.caption; el.appendChild(cap); }
    } else if (card.type === 'html') {
      const wrapper = document.createElement('div');
      wrapper.style.cssText = 'overflow:auto;font-size:13px;line-height:1.5;';
      wrapper.innerHTML = card.html.replace(/__ATTACHMENT__/g, IMG_BASE);
      wrapper.querySelectorAll('img').forEach(img => { img.style.maxWidth = '100%'; img.style.height = 'auto'; img.draggable = false; });
      wrapper.querySelectorAll('a').forEach(a => { a.target = '_blank'; a.style.color = '#6cb0f6'; });
      wrapper.querySelectorAll('table').forEach(t => { t.style.borderCollapse = 'collapse'; });
      wrapper.querySelectorAll('td,th').forEach(td => {
        td.style.border = '1px solid #444'; td.style.padding = '4px 6px'; td.style.verticalAlign = 'top';
        td.title = '더블클릭으로 편집';
        td.addEventListener('dblclick', function(e) {
          e.stopPropagation();
          snapshot();
          this.contentEditable = 'true';
          this.style.outline = '2px solid #388bfd';
          this.style.background = 'rgba(56,139,253,0.08)';
          this.focus();
        });
        td.addEventListener('blur', function() {
          this.contentEditable = 'false';
          this.style.outline = '';
          this.style.background = '';
          cards[i].html = wrapper.innerHTML.split(IMG_BASE).join('__ATTACHMENT__');
          saveBoard();
        });
      });
      el.appendChild(wrapper);
    } else if (card.type === 'table') {
      const rows = card.rows || [['','',''],['','',''],['','','']];
      const tbl = document.createElement('table');
      tbl.style.cssText = 'border-collapse:collapse;width:100%;font-size:13px;';
      rows.forEach((row, ri) => {
        const tr = tbl.insertRow();
        row.forEach((cell, ci) => {
          const td = document.createElement(ri === 0 ? 'th' : 'td');
          td.contentEditable = true;
          td.style.cssText = 'border:1px solid #30363d;padding:4px 8px;min-width:60px;text-align:left;' + (ri===0 ? 'background:#21262d;font-weight:600;' : '');
          td.textContent = cell;
          td.addEventListener('blur', () => { if (!cards[i].rows) cards[i].rows = rows; rows[ri][ci] = td.textContent; saveBoard(); });
          tr.appendChild(td);
        });
      });
      el.appendChild(tbl);
      const addRow = document.createElement('button');
      addRow.textContent = '+ 행'; addRow.style.cssText = 'margin-top:4px;font-size:11px;background:#21262d;border:1px solid #30363d;color:#8b949e;padding:2px 8px;border-radius:4px;cursor:pointer;';
      addRow.onclick = e => { e.stopPropagation(); snapshot(); if (!cards[i].rows) cards[i].rows = rows; cards[i].rows.push(new Array(cards[i].rows[0].length).fill('')); renderCards(); saveBoard(); };
      const addCol = document.createElement('button');
      addCol.textContent = '+ 열'; addCol.style.cssText = 'margin-top:4px;margin-left:4px;font-size:11px;background:#21262d;border:1px solid #30363d;color:#8b949e;padding:2px 8px;border-radius:4px;cursor:pointer;';
      addCol.onclick = e => { e.stopPropagation(); snapshot(); if (!cards[i].rows) cards[i].rows = rows; cards[i].rows.forEach(r => r.push('')); renderCards(); saveBoard(); };
      el.appendChild(addRow); el.appendChild(addCol);
    }
    const rh = document.createElement('div'); rh.className = 'resize-handle';
    rh.addEventListener('mousedown', e => { e.preventDefault(); e.stopPropagation(); snapshot(); resizing = { idx: i, startX: e.clientX, startW: card.w || el.offsetWidth }; });
    el.appendChild(rh);
    if (i === selectedIdx) el.classList.add('selected');
    board.appendChild(el);
  });
  requestAnimationFrame(() => {
    let maxB = 0;
    document.querySelectorAll('.card').forEach(el => { const b = (parseFloat(el.style.top)||0) + el.offsetHeight; if (b > maxB) maxB = b; });
    board.style.minHeight = (maxB + 100) + 'px';
  });
}

document.addEventListener('mousemove', e => {
  if (moving) {
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`); if (!el) return;
    let nx = moving.origX + e.clientX - moving.startX, ny = moving.origY + e.clientY - moving.startY;
    if (e.shiftKey) { nx = snap(nx); ny = snap(ny); el.style.outline = '1px dashed rgba(240,192,64,0.3)'; } else { el.style.outline = ''; }
    el.style.left = nx + 'px'; el.style.top = ny + 'px';
  }
  if (resizing) {
    let nw = resizing.startW + e.clientX - resizing.startX; if (e.shiftKey) nw = snap(nw);
    cards[resizing.idx].w = Math.max(100, nw);
    const el = document.querySelector(`.card[data-idx="${resizing.idx}"]`); if (el) el.style.width = cards[resizing.idx].w + 'px';
  }
});

document.addEventListener('mouseup', e => {
  if (moving) {
    let nx = moving.origX + e.clientX - moving.startX, ny = moving.origY + e.clientY - moving.startY;
    if (e.shiftKey) { nx = snap(nx); ny = snap(ny); }
    cards[moving.idx].x = Math.max(0, nx); cards[moving.idx].y = Math.max(0, ny);
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`); if (el) { el.classList.remove('moving'); el.style.outline = ''; }
    if (e.shiftKey) pushCards(moving.idx);
    moving = null; saveBoard();
  }
  if (resizing) { if (e.shiftKey) pushCards(resizing.idx); resizing = null; saveBoard(); }
});

function addTextCard() { snapshot(); cards.push({ type: 'text', content: '', x: 50, y: window.scrollY+100, w: 300 }); renderCards(); setTimeout(() => { const els = document.querySelectorAll('.card .text'); els[els.length-1]?.focus(); }, 100); }
function addImageCard() { const input = document.createElement('input'); input.type = 'file'; input.accept = 'image/*'; input.onchange = e => { const f = e.target.files[0]; if (!f) return; const r = new FileReader(); r.onload = () => { snapshot(); cards.push({ type: 'image', src: r.result, x: 50, y: window.scrollY+100, w: 240 }); renderCards(); saveBoard(); }; r.readAsDataURL(f); }; input.click(); }
function addImageUrl() { const url = prompt('이미지 URL'); if (!url) return; snapshot(); cards.push({ type: 'image', src: url, x: 50, y: window.scrollY+100, w: 240 }); renderCards(); saveBoard(); }
function addTableCard() {
  const colsStr = prompt('열 수 (기본 3)', '3'); const cols = Math.max(1, parseInt(colsStr)||3);
  const rowsStr = prompt('행 수 (헤더 포함, 기본 4)', '4'); const rows = Math.max(1, parseInt(rowsStr)||4);
  snapshot();
  cards.push({ type: 'table', rows: Array.from({length: rows}, (_, ri) => Array.from({length: cols}, (_, ci) => ri===0 ? `열${ci+1}` : '')), x: 50, y: window.scrollY+100, w: Math.max(240, cols*100) });
  renderCards(); saveBoard();
}
function exportBoard() { syncText(); const blob = new Blob([JSON.stringify(cards, null, 2)], { type: 'application/json' }); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = SAVE_KEY + '.json'; a.click(); }
// ── Zoom ─────────────────────────────────────────────────────────────────────
let zoom = parseFloat(localStorage.getItem('zoom-' + SAVE_KEY) || '1.0');
function applyZoom() {
  const board = document.getElementById('board');
  board.style.transform = `scale(${zoom})`;
  board.style.transformOrigin = '0 0';
  document.getElementById('zoom-level').textContent = Math.round(zoom * 100) + '%';
  localStorage.setItem('zoom-' + SAVE_KEY, zoom);
}
function zoomIn()  { zoom = Math.min(3.0, parseFloat((zoom + 0.1).toFixed(2))); applyZoom(); }
function zoomOut() { zoom = Math.max(0.2, parseFloat((zoom - 0.1).toFixed(2))); applyZoom(); }
document.addEventListener('keydown', e => {
  if (e.ctrlKey || e.metaKey) {
    if (e.key === '=' || e.key === '+') { e.preventDefault(); zoomIn(); }
    if (e.key === '-')                  { e.preventDefault(); zoomOut(); }
    if (e.key === '0')                  { e.preventDefault(); zoom = 1.0; applyZoom(); }
  }
});
document.getElementById('board').addEventListener('wheel', e => {
  if (!(e.ctrlKey || e.metaKey)) return;
  e.preventDefault();
  e.deltaY < 0 ? zoomIn() : zoomOut();
}, { passive: false });
applyZoom();
function resetLayout() { if (!confirm('자동 재배치합니다.')) return; cards.forEach(c => { delete c.x; delete c.y; }); renderCards(); autoLayout(); }
// ── Floating format toolbar ───────────────────────────────────────────────────
const fmtBar = document.getElementById('format-toolbar');
function fmt(cmd) { document.execCommand(cmd, false, null); saveBoard(); }
function fmtLink() {
  const sel = window.getSelection();
  if (!sel || sel.isCollapsed) return;
  const url = prompt('링크 URL 입력', 'https://');
  if (!url) return;
  document.execCommand('createLink', false, url);
  // make links open in new tab
  sel.anchorNode?.parentElement?.closest('a')?.setAttribute('target', '_blank');
  document.querySelectorAll('.text a').forEach(a => a.target = '_blank');
  saveBoard();
}

// prevent format buttons from blurring contenteditable
fmtBar.addEventListener('mousedown', e => e.preventDefault());

document.addEventListener('selectionchange', () => {
  const sel = window.getSelection();
  if (!sel || sel.isCollapsed || !sel.toString().trim()) { fmtBar.style.display = 'none'; return; }
  // only show if selection is inside a .text element
  const anchor = sel.anchorNode;
  if (!anchor) { fmtBar.style.display = 'none'; return; }
  const textEl = anchor.nodeType === 1 ? anchor.closest('.text') : anchor.parentElement?.closest('.text');
  if (!textEl) { fmtBar.style.display = 'none'; return; }
  // position above selection
  const range = sel.getRangeAt(0);
  const rect = range.getBoundingClientRect();
  fmtBar.style.display = 'flex';
  const tbW = fmtBar.offsetWidth || 180;
  let left = rect.left + rect.width / 2 - tbW / 2;
  left = Math.max(8, Math.min(left, window.innerWidth - tbW - 8));
  fmtBar.style.left = left + 'px';
  fmtBar.style.top = (rect.top - 44 + window.scrollY) + 'px';
});

setInterval(saveBoard, 30000);
loadBoard();
</script>
</body>
</html>
