<title>Titan</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1e1e1e; color: #e0e0e0; font-family: 'Segoe UI', -apple-system, sans-serif; font-size: 15px; line-height: 1.6; padding: 20px 30px 60px; overflow-x: hidden; }
a { color: #6cb0f6; text-decoration: none; }
a:hover { text-decoration: underline; }
.title-bar { background: #3a3a5c; display: inline-block; padding: 6px 16px; font-size: 22px; font-weight: bold; color: #fff; margin-bottom: 4px; }
.date { color: #999; font-size: 13px; margin-bottom: 20px; }
.board { position: relative; }
.card { background: #2a2a2a; border: 1px solid #3a3a3a; border-radius: 8px; padding: 12px; position: absolute; cursor: grab; transition: box-shadow 0.15s; overflow: hidden; }
.card:hover { box-shadow: 0 0 0 1px #58a6ff; z-index: 10; }
.card.moving { opacity: 0.8; box-shadow: 0 4px 24px rgba(0,0,0,0.6); z-index: 100; cursor: grabbing; }
.card img { width: 100%; border-radius: 4px; display: block; }
.card .text { outline: none; min-height: 20px; white-space: pre-wrap; word-break: break-word; }
.card .text:focus { background: rgba(255,255,255,0.05); border-radius: 4px; padding: 4px; }
.card .text:empty::before { content: '텍스트 입력...'; color: #555; }
.card-actions { position: absolute; top: 4px; right: 4px; display: none; gap: 4px; }
.card:hover .card-actions { display: flex; }
.card-btn { background: #333; border: 1px solid #555; color: #ccc; border-radius: 4px; padding: 2px 6px; font-size: 11px; cursor: pointer; }
.card-btn:hover { background: #444; color: #fff; }
.resize-handle { position: absolute; bottom: 0; right: 0; width: 16px; height: 16px; cursor: se-resize; opacity: 0; }
.card:hover .resize-handle { opacity: 0.6; }
.resize-handle::after { content: ''; position: absolute; bottom: 3px; right: 3px; width: 8px; height: 8px; border-right: 2px solid #666; border-bottom: 2px solid #666; }
.card.selected { box-shadow: 0 0 0 2px #58a6ff; z-index: 5; }
.highlight-red { color: #ff6b6b; }
.highlight-blue { color: #6cb0f6; }
.highlight-gold { color: #f0c040; }
.toolbar { position: fixed; bottom: 0; left: 0; right: 0; background: #161b22; border-top: 1px solid #30363d; padding: 8px 20px; display: flex; gap: 12px; align-items: center; z-index: 200; }
.toolbar button { background: #21262d; border: 1px solid #30363d; color: #e0e0e0; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; }
.toolbar button:hover { background: #30363d; }
.toolbar .status { color: #8b949e; font-size: 12px; margin-left: auto; }
#format-toolbar { position: fixed; display: none; background: #1c2128; border: 1px solid #444c56; border-radius: 8px; padding: 4px 6px; gap: 2px; align-items: center; z-index: 500; box-shadow: 0 4px 16px rgba(0,0,0,0.5); }
#format-toolbar button { background: none; border: none; color: #cdd9e5; padding: 4px 8px; border-radius: 5px; cursor: pointer; font-size: 13px; line-height: 1; }
#format-toolbar button:hover { background: #373e47; }
#format-toolbar .sep { width: 1px; height: 16px; background: #444c56; margin: 0 2px; }
</style>

    "html": "\r\n\t\t\t<div style=\"display:inline-block;width:480px;height:273px;background:#2d333b;border-radius:4px;margin:2px;vertical-align:top;opacity:0.4\"></div>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\">도시바 메모리 코퍼레이션 (Kioxia)<span lang=\"en-US\">: </span>Kioxia Holdings Corporation</p>\r\n\t\t\t<table style=\"border:1px solid;border-collapse:collapse\">\r\n\t\t\t\t<tr>\r\n\t\t\t\t\t<td style=\"background-color:#f8f9fa;border:1px solid\">\t\t\t\t\t<ul>\r\n\t\t\t\t\t\t<li style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f\"><a href=\"https://en.wikipedia.org/wiki/Bain_Capital\" style=\"font-size:9pt\">BCPE 판게아 케이맨</a><span style=\"font-size:9pt;color:black\">&#160;(49.9 %)&#160;</span><sup><a href=\"https://en.wikipedia.org/wiki/Kioxia#cite_note-1\" style=\"font-size:7.5pt\">[1]</a></sup></li>\r\n\t\t\t\t\t\t<li style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f\"><a href=\"https://en.wikipedia.org/wiki/Toshiba\" style=\"font-size:9pt\">도시바</a><span style=\"font-size:9pt;color:black\">&#160;(40.2 %)</span></li>\r\n\t\t\t\t\t\t<li style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f\"><a href=\"https://en.wikipedia.org/wiki/Hoya_Corporation\" style=\"font-size:9pt\">호야 코퍼레이션</a><span style=\"font-size:9pt;color:black\">&#160;(9.9 %)&#160;</span><sup><a href=\"https://en.wikipedia.org/wiki/Kioxia#cite_note-:0-2\" style=\"font-size:7.5pt\">[2]</a></sup></li>\r\n\t\t\t\t\t</ul>\r\n\t\t\t\t\t</td>\r\n\t\t\t\t</tr>\r\n\t\t\t</table>\r\n\t\t\t<ul>\r\n\t\t\t\t<li style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f\"><span style=\"font-family:Malgun Gothic\">2018 년 3 분기에이 회사는 NAND 플래시 솔리드 스테이트 드라이브 의 전 세계 매출 점유율의 19 %를 차지</span></li>\r\n\t\t\t\t<li style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f\"><span style=\"font-family:Malgun Gothic\">Kioxia Corporation 의 모회사</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\">(</span>Kioxia Corporation은 Kioxia Systems Company, Kioxia Advanced Package Corporation, Kioxia America 및 Kioxia Europe을 비롯한 여러 회사의 모회사<span lang=\"en-US\" style=\"font-family:Malgun Gothic\">)</span></li>\r\n\t\t\t\t<li style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f\"><span style=\"font-family:Malgun Gothic\">2019 년 10 월 1 일 Toshiba Memory Holdings Corporation은 Kioxia Holdings Corporation으로, Toshiba Memory Corporation은 Koixia Corporation으로 이름이 변경</span></li>\r\n\t\t\t</ul>\r\n\t\t\t<div style=\"display:inline-block;width:480px;height:600px;background:#2d333b;border-radius:4px;margin:2px;vertical-align:top;opacity:0.4\"></div>\r\n\t\t"

    "w": 850,
    "html": "\r\n\t\t\t<p style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\">구조는 다음과 같습니다</p>\r\n\t\t\t<p style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\">&gt; 하이닉스가 현재 $4bil 투자해서 Kioxia (구 토시바) 를 인수했습니다<span lang=\"en-US\" style=\"font-family:Malgun Gothic\">.</span></p>\r\n\t\t\t<p style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\">&gt; 해외에 예를 들어 $10 bil 펀드를 만들어서 하이닉스 지분을 인수하고 하이닉스는 펀드에 40% 지분을 갖게 됩니다</p>\r\n\t\t\t<p style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\">&gt; 이때 펀드를 manage 하는 GP를 1) JP 개인 or 2) TMT USA or 3) combination of both 로 만들어야 합니다</p>\r\n\t\t\t<p style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\">&gt; 펀드는 앞으로 반도체쪽 M&amp;A 를 계속할것이고 그 target 이 Western Digital, Intel Nand 등 입니다</p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\">1) Softbank/ Vision Fund</p>\r\n\t\t\t<p style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\">2) Western Digital </p>\r\n\t\t\t<p style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\">3) Intel Nand 사업부</p>\r\n\t\t\t<p style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\">research 부탁드립니다</p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\">Softbank/ Vision Fund 를 잘보면 Vision Fund 는 소위 leverage fund 입니다.  Softbank 가 Fund 에 equity 로 투자하고 나머지는 debt like instrument 라는거죠.  따라서 우리 Titan Fund 도 1) equity fund or 2) leverage fund 가 될수 있습니다</p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\"> <a href=\"http://naver.me/5PRzIWGk\" lang=\"ko-KR\">http://naver.me/5PRzIWGk</a></p>\r\n\t\t\t<p style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\">네 그렇죠.  우리도 이렇게 만들수 있기는 합니다</p>\r\n\t\t\t<p style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\">이렇게 만들면 하이닉스 자회사라고 생각해야 하구요 (하이닉스가 책임져야 하는거고) all equity 로 하면 하이닉스는 LP 일 뿐입니다</p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\">그런데 레버리지 펀드로 만들어야 JP 가 하이닉스 부회장하시고 펀드 CEO 하셔도 그림이 나오겠네요</p>\r\n\t\t\t<p style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\">하이닉스가 LP로 들어가면 independence issue 가 생길테니까요</p>\r\n\t\t\t<p style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\">softbank case study<span style=\"font-family:Malgun Gothic\">에</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">포함해주세요</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\">.</span></p>\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\">허석준님/컨텐츠투자담당, [12.04.20 11:13]</p>\r\n\t\t\t<p style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\">일단 오늘-내일 키옥시아 지분을 옮길수 있을지는 법무 검토가 필요한데.. 법무에 물어보기 좀 애매하니 할수 있다는 가정하에 움직이는 겁니다</p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\">허석준님/컨텐츠투자담당, [12.04.20 11:16]</p>\r\n\t\t\t<p style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\">Lazard 자료는 꼭 읽어 보세요</p>\r\n\t\t\t<p style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\">그리고 Fundraiser 는 이렇게 나뉩니다</p>\r\n\t\t\t<p style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\">1. 1st Tier ($1-10 bil)  당연히 big 4 IB - 그중 CS가 가장잘하구요</p>\r\n\t\t\t<p style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\">2. 2nd Tier ($500-2 bil) Lazard, Evercore 등등 </p>\r\n\t\t\t<p style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\">3. Niche $500 below </p>\r\n\t\t\t<p style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\">이렇게 있는데 반드시 1st tier 가 좋다는건 아니고 다 장단점이 있습니다.  그런데 이 경우는 CS가 가장 좋겠죠</p>\r\n\t\t\t<br />\r\n\t\t\t<p data-tag=\"remember-for-later\" style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\">그리고<span lang=\"en-US\"> </span>전무님<span lang=\"en-US\"> </span>말씀에<span lang=\"en-US\"> </span>따르면<span lang=\"en-US\">,</span></p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">1/ </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">레버리지</span><span style=\"font-family:Malgun Gothic\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">펀드일</span><span style=\"font-family:Malgun Gothic\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">경우에는</span><span style=\"font-family:Malgun Gothic\"> JP</span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">가</span><span style=\"font-family:Malgun Gothic\"> GP CEO</span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">와</span><span style=\"font-family:Malgun Gothic\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">하이닉스</span><span style=\"font-family:Malgun Gothic\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">부회장을</span><span style=\"font-family:Malgun Gothic\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">겸직할</span><span style=\"font-family:Malgun Gothic\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">수</span><span style=\"font-family:Malgun Gothic\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">있다</span><span style=\"font-family:Malgun Gothic\">.</span></p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">2/ </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">하이닉스가</span><span style=\"font-family:Malgun Gothic\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">단순</span><span style=\"font-family:Malgun Gothic\"> LP</span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">로</span><span style=\"font-family:Malgun Gothic\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">참여하는</span><span style=\"font-family:Malgun Gothic\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">일반</span><span style=\"font-family:Malgun Gothic\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">펀드</span><span style=\"font-family:Malgun Gothic\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">구조에서는</span><span style=\"font-family:Malgun Gothic\"> Independence issue</span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">가</span><span style=\"font-family:Malgun Gothic\"> </span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">있다</span><span style=\"font-family:Malgun Gothic\">.</span></p>\r\n\t\t\t<p style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">이게</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">차입을</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">하고</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">안하고에</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">따른</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">차이인가요</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\">? </span><span style=\"font-family:Malgun Gothic\">잘</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">이해가</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">안됙어서요</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\">.</span></p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\">[Forwarded from 장봉근]</p>\r\n\t\t\t<p style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\">비전펀드 관련 리서치는,</p>\r\n\t\t\t<p style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\">- 비전펀드(gp)의 주주 및 이사회, 임원 현황, 채무/ 채권자 현황</p>\r\n\t\t\t<p style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\">- 비전펀드의 투자 파이프라인 현황 :  펀드spc현황(타겟, 투자규모, 지분율, 주주(lp), 채권자(loan)), 공동투자자</p>\r\n\t\t\t<p style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\">- 모기업(소뱅그룹)과의 이해관계: 소뱅그룹이 펀드spc의 lp또는 채권자로 참여하거나, 동일 건에 공동투자를 하거나, 비전펀드(gp)에 주주, 채권자로 들어 있거나. 자금을 댔거나 투자건을 쉐어했거나</p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\">장봉근, [11.04.20 17:17]</p>\r\n\t\t\t<p style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\">비전펀드 법인과 비전펀드가 만든 펀드법인을 구분하셔야합니다.</p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\">장봉근, [11.04.20 17:18]</p>\r\n\t\t\t<p style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\">비전펀드가 펀드인거고, 비전펀드를 운용하는 gp법인이 따로 있는건지는 저도 잘 모르겠네요. 알아봐주시죠</p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\">비전펀드 관련 리서치는,</p>\r\n\t\t\t<p data-tag=\"to-do\" style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\">- 비전펀드(gp)의 주주 및 이사회, 임원 현황, 채무/ 채권자 현황</p>\r\n\t\t\t<p style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\">- 비전펀드의 투자 파이프라인 현황 :  펀드spc현황(타겟, 투자규모, 지분율, 주주(lp), 채권자(loan)), 공동투자자</p>\r\n\t\t\t<p style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\">- 모기업(소뱅그룹)과의 이해관계: 소뱅그룹이 펀드spc의 lp또는 채권자로 참여하거나, 동일 건에 공동투자를 하거나, 비전펀드(gp)에 주주, 채권자로 들어 있거나. 자금을 댔거나 투자건을 쉐어했거나</p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\">위에 벤이 제안한 3가지에 대해서 서로 찾으시는대로 공유해주시구요..딘, 헨리, 보구 카일 서로 역할 나눌 수 있으면 좋겠네요..전체적으로 정리는 보구가 해주고</p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Roboto;font-size:18pt;font-weight:bold\">Board Members and Advisors</span></p>\r\n\t\t\t<p data-tag=\"to-do\" style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\">비전펀드<span lang=\"en-US\">(GP) </span>주주<span lang=\"en-US\"> </span>및<span lang=\"en-US\"> </span>이사회<span lang=\"en-US\"> &gt; </span><a href=\"https://visionfund.com/team\">https://visionfund.com/team</a></p>\r\n\t\t\t<p lang=\"en-US\" style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">3</span><span lang=\"ko-KR\" style=\"font-family:Malgun Gothic\">명의</span><span style=\"font-family:Malgun Gothic\"> Advisor </span><a href=\"https://www.crunchbase.com/person/oliver-heartmont\" lang=\"ko-KR\" style=\"font-family:Roboto\">Oliver Heartmont</a><span style=\"font-family:Malgun Gothic\">/ </span><a href=\"https://www.crunchbase.com/person/nizar-al-bassam\" lang=\"ko-KR\" style=\"font-family:Roboto\">Nizar Al-Bassam</a> / <a href=\"https://www.crunchbase.com/person/dalinc-ariburnu\" lang=\"ko-KR\" style=\"font-family:Roboto\">Dalinc Ariburnu</a></p>\r\n\t\t\t<p data-tag=\"to-do\" style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\">임원<span lang=\"en-US\"> </span>현황<span lang=\"en-US\"> &gt; Professionals</span></p>\r\n\t\t\t<p data-tag=\"to-do\" style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\">채무<span lang=\"en-US\" style=\"font-family:Malgun Gothic\">/</span><span style=\"font-family:Malgun Gothic\">채권자</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">현황</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> &gt; LP</span></p>\r\n\t\t\t<br />\r\n\t\t\t<div style=\"display:inline-block;width:480px;height:335px;background:#2d333b;border-radius:4px;margin:2px;vertical-align:top;opacity:0.4\"></div>\r\n\t\t\t<br />\r\n\t\t\t<div style=\"display:inline-block;width:265px;height:252px;background:#2d333b;border-radius:4px;margin:2px;vertical-align:top;opacity:0.4\"></div>\r\n\t\t\t<br />\r\n\t\t\t<div style=\"display:inline-block;width:374px;height:353px;background:#2d333b;border-radius:4px;margin:2px;vertical-align:top;opacity:0.4\"></div>\r\n\t\t\t<div style=\"display:inline-block;width:480px;height:200px;background:#2d333b;border-radius:4px;margin:2px;vertical-align:top;opacity:0.4\"></div>\r\n\t\t\t<p style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-weight:bold\">비전펀드 자금조달 구조 및 비즈니스 모델 </span></p>\r\n\t\t\t<p style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\">비전펀드는 독특한 조달구조를 지니고 있다. 통상 LP들은 주식으로서 벤처펀드 혹은 PEF에 출자하는데, 비전펀드의 경우 LP들에게 회사채를 발행하는 방식도 함께 활용하고 있다. 즉, 비전펀드 자금에는 자본과 부채가 혼합되어 있다. 특히 LP의 주축이 되는 사우디아라비아, 아부다비 국부펀드의 출자금을 포함하여 비전펀드의 약 62% 가량이 부채로 조달되며, LP 중에서 소프트뱅크 그룹이 유일하게 주식으로만 출자 중이다. 이처럼 주식과 채권을 혼합하여 벤처펀드를 구성하는 경우는 흔하지 않아 투자자들의 주목을 받았다. 일부 우려에도 불구, 이러한 조달구조는 1) 부채로 출자한 LP 입장에서는 투자금 회수 기간이 길고(평균 7~8년) 투자 위험도가 높은 벤처펀드에서 안정적인 수익을 보장받을 수 있으며, 2) GP 입장에서는 큰 규모의 금액을 보다 수월하게 조달 받을 수 있다는 장점이 있다. 이와 같은 조달구조에 따라 비전펀드의 비즈니스 모델 역시 독특한 편인데, 먼저 비전펀드에 부채로 출자한 LP들은 투자 성과와 무관하게 12년 간 7%의 고정된 쿠폰금리로 연 2회 이자를 지급받게 된다. 그리고 투자 결과에 따른 성과는 나머지 LP 및 GP에게 배분된다.</p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\"><span style=\"color:#666666;font-weight:bold\">전통적 PEF 자본구성과 달리 자산의 44% 부채로 조달 계획</span><span lang=\"en-US\" style=\"color:#666666;font-weight:bold\">, </span><span style=\"color:#666666;font-weight:bold\">소프트뱅크만 100% 자본 출자</span></p>\r\n\t\t\t<p style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\"><span style=\"color:#666666;font-weight:bold\">재무부담 없이 통큰 투자 의도</span></p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">전통적인 사모펀드(PEF) 형태의 벤처캐피털은 대부분 100% 자본으로 구성돼 있다. 투자 대상 기업의 지분을 사들일 때 취득하려는 자산을 담보로 대출을 일으켜서 자금을 추가 조달하는 것이 자금력을 극대화하기에 유리하기 때문이다. 반면 비전펀드는 자산의 44%를 부채(회사채 발행)로 조달할 계획이다.</span></p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\">목표액 1000억달러 가운데 930억달러 투자를 확약받은 비전펀드의 구조를 살펴보면 소프트뱅크만이 280억달러를 100% 자본으로 출자한다. 소프트뱅크는 앞서 사들인 영국 반도체 설계회사 ARM과 엔비디아 지분 등을 현물출자하기로 했다. 나머지 외부 투자자들은 출자와 회사채 투자(대출)를 병행한다.</p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\">예컨대 최대 투자자인 사우디아라비아 공공투자펀드(PIF)는 비전펀드에 170억달러를 출자하고, 280억달러는 회사채 투자로 댄다. 나머지도 비중은 다르지만 모두 유사한 ‘하이브리드’ 투자구조다.</p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\">1000억달러 자금 조달이 완료됐다고 가정했을 때 비전펀드 자산의 28%는 소프트뱅크 지분, 28%는 외부 투자자 지분, 44%는 부채로 구성될 예정이다. 펀드 조성에 관여한 한 인물은 FT에 비전펀드가 현금흐름이 나오지 않는 IT 스타트업(신생 벤처기업)에 투자하려 하기 때문에 처음부터 부채를 포함해 자금을 조달하는 것이라고 설명했다.</p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\">외부 투자자들은 비전펀드가 운영되는 12년 동안 대출분에 대해 연 7%씩 이자를 받게 된다. 또 추가 수익이 나면 출자 비중에 따라 이익을 배분받는다. 소프트뱅크는 펀드매니저로서 이자를 지급하고 남은 수익의 20%를 가져갈 수 있다. 또 출자된 자금에 대해 해마다 0.7~1.3% 수수료를 받아갈 예정이다. 소프트뱅크가 이 펀드의 리스크를 거의 모두 짊어지고, 나머지 투자자들은 상대적으로 안전하게 투자할 수 있다는 뜻이다. 물론 대박이 나면 그 수익도 소프트뱅크에 가장 많이 돌아간다.</p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\">손 사장이 이 같은 구조를 짠 데 대해 FT는 소프트뱅크의 재무제표에 영향을 주지 않고 투자하기 위한 것이라고 분석했다. 쓰루오 미쓰노부 씨티그룹 애널리스트는 “이 구조는 손 사장의 자신감과 욕심을 동시에 반영하는 것”이라고 평가했다.</p>\r\n\t\t\t<br />\r\n\t\t\t<div style=\"display:inline-block;width:480px;height:509px;background:#2d333b;border-radius:4px;margin:2px;vertical-align:top;opacity:0.4\"></div>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">비전펀드</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">법인</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\">: </span><span style=\"font-family:Malgun Gothic\">SoftBank Investment Advisers (UK) Limited</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><a href=\"http://softbank-ia.com/\" style=\"font-family:Verdana;font-size:10pt\">softbank-ia.com</a><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> (</span><span style=\"font-family:Malgun Gothic\">Majority Investor: SoftBank Group Corp.</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\"> </span><span style=\"font-family:Malgun Gothic\">(100.00%)</span><span lang=\"en-US\" style=\"font-family:Malgun Gothic\">)</span></p>\r\n\t\t\t<p style=\"font-family:맑은 고딕;font-size:10.5pt;color:#3f3f3f;margin-top:0pt;margin-bottom:0pt\">비전펀드<span lang=\"en-US\">: </span><a href=\"https://www.capitaliq.com/CIQDotNet/company.aspx?companyid=605958294\" style=\"font-family:Verdana;font-size:10pt;back const CONTENT_HASH = '7d06da82';

let cards = [];
let moving = null, resizing = null;
let selectedIdx = null, clipboardCard = null;
const GRID = 20, GAP = 14;
function snap(v) { return Math.round(v / GRID) * GRID; }

// ── Undo (Ctrl+Z) ────────────────────────────────────────────────────────────
const MAX_HISTORY = 50;
let history = [];
function snapshot() {
  syncText();
  history.push(JSON.stringify(cards));
  if (history.length > MAX_HISTORY) history.shift();
}
function undo() {
  if (!history.length) { showStatus('되돌릴 내용 없음'); return; }
  syncText();
  cards = JSON.parse(history.pop());
  renderCards();
  saveBoard();
  showStatus('↩ 되돌림');
}
function showStatus(msg) {
  const s = document.getElementById('status');
  s.textContent = msg;
  clearTimeout(showStatus._t);
  showStatus._t = setTimeout(() => { s.textContent = ''; }, 2000);
}
document.addEventListener('keydown', e => {
  const isText = document.activeElement?.contentEditable === 'true';
  if ((e.ctrlKey || e.metaKey) && e.key === 'z' && !e.shiftKey) {
    if (isText) return;
    e.preventDefault();
    undo();
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'c' && !e.shiftKey && !isText) {
    if (selectedIdx !== null && cards[selectedIdx]) {
      syncText();
      clipboardCard = JSON.parse(JSON.stringify(cards[selectedIdx]));
      showStatus('카드 복사됨');
      e.preventDefault();
    }
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'v' && !e.shiftKey && !isText) {
    if (clipboardCard) {
      e.preventDefault();
      snapshot();
      const nc = JSON.parse(JSON.stringify(clipboardCard));
      nc.x = (nc.x || 0) + 30; nc.y = (nc.y || 0) + 30;
      cards.push(nc);
      selectedIdx = cards.length - 1;
      renderCards(); saveBoard();
      showStatus('카드 붙여넣음');
    }
  }
  if (e.key === 'Escape') {
    document.querySelectorAll('.card.selected').forEach(c => c.classList.remove('selected'));
    selectedIdx = null;
  }
});

function pushCards(movedIdx) {
  const moved = cards[movedIdx];
  const movedEl = document.querySelector(`.card[data-idx="${movedIdx}"]`);
  if (!movedEl) return;
  const mh = movedEl.offsetHeight;
  document.querySelectorAll('.card').forEach(el => {
    const i = +el.dataset.idx;
    if (i === movedIdx) return;
    const c = cards[i], oh = el.offsetHeight;
    if (moved.x < (c.x+(c.w||200)) && (moved.x+(moved.w||200)) > c.x && moved.y < (c.y+oh) && (moved.y+mh) > c.y) {
      c.y = moved.y + mh + GAP;
      el.style.top = c.y + 'px';
    }
  });
}

function loadBoard() {
  const saved = localStorage.getItem(SAVE_KEY);
  const savedHash = localStorage.getItem(SAVE_KEY + ':hash');
  let parsed = null;
  try { parsed = saved ? JSON.parse(saved) : null; } catch(e) {}
  // reset if: no save, empty array, or content hash changed (page regenerated)
  if (!parsed || parsed.length === 0 || savedHash !== CONTENT_HASH) {
    cards = DEFAULT_CARDS.map(c => ({...c}));
    localStorage.removeItem(SAVE_KEY);
    localStorage.setItem(SAVE_KEY + ':hash', CONTENT_HASH);
    renderCards();
    const hasCoords = cards.some(c => c.x !== undefined && c.y !== undefined);
    if (!hasCoords) autoLayout();
    return;
  }
  cards = parsed;
  renderCards();
}
function resetToDefaults() { if (!confirm('저장된 보드를 지우고 원본으로 초기화합니다. 계속할까요?')) return; localStorage.removeItem(SAVE_KEY); cards = DEFAULT_CARDS.map(c => ({...c})); renderCards(); autoLayout(); }

function autoLayout() {
  const boardW = document.getElementById('board').offsetWidth;
  const cols = Math.max(1, Math.floor(boardW / 280));
  const colW = (boardW - GAP*(cols-1)) / cols;
  const colH = new Array(cols).fill(0);
  const allCards = document.querySelectorAll('.card');
  const images = document.querySelectorAll('.card img');
  let loaded = 0;
  function place() {
    allCards.forEach((el, i) => {
      const w = Math.min(cards[i].w || colW, colW);
      let minCol = 0;
      for (let c = 1; c < cols; c++) if (colH[c] < colH[minCol]) minCol = c;
      cards[i].x = minCol * (colW + GAP);
      cards[i].y = colH[minCol];
      cards[i].w = w;
      el.style.left = cards[i].x + 'px';
      el.style.top = cards[i].y + 'px';
      el.style.width = w + 'px';
      colH[minCol] = cards[i].y + el.offsetHeight + GAP;
    });
    document.getElementById('board').style.minHeight = (Math.max(...colH) + 100) + 'px';
    saveBoard();
  }
  if (!images.length) { requestAnimationFrame(place); return; }
  images.forEach(img => {
    if (img.complete) { loaded++; if (loaded >= images.length) requestAnimationFrame(place); }
    else { img.onload = img.onerror = () => { loaded++; if (loaded >= images.length) requestAnimationFrame(place); }; }
  });
}

function syncText() {
  document.querySelectorAll('.card').forEach(el => {
    const i = +el.dataset.idx;
    if (cards[i]?.type === 'text') { const t = el.querySelector('.text'); if (t) cards[i].content = t.innerHTML; }
  });
}
function saveBoard() { syncText(); localStorage.setItem(SAVE_KEY, JSON.stringify(cards)); localStorage.setItem(SAVE_KEY + ':hash', CONTENT_HASH); showStatus('저장됨 ' + new Date().toLocaleTimeString()); }

function renderCards() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  cards.forEach((card, i) => {
    const el = document.createElement('div');
    el.className = 'card'; el.dataset.idx = i;
    if (card.x !== undefined) el.style.left = card.x + 'px';
    if (card.y !== undefined) el.style.top = card.y + 'px';
    // html cards contain raw OneNote table HTML which may overflow the stated div width
    if (card.w) { if (card.type === 'html') el.style.minWidth = card.w + 'px'; else el.style.width = card.w + 'px'; }
    el.addEventListener('mousedown', e => {
      if (e.target.closest('.text, a, .card-btn, .resize-handle, td, th')) return;
      e.preventDefault();
      // Update selection
      document.querySelectorAll('.card.selected').forEach(c => c.classList.remove('selected'));
      selectedIdx = i; el.classList.add('selected');
      snapshot();
      moving = { idx: i, startX: e.clientX, startY: e.clientY, origX: card.x||0, origY: card.y||0 };
      el.classList.add('moving');
    });
    const actions = document.createElement('div'); actions.className = 'card-actions';
    const delBtn = document.createElement('button'); delBtn.className = 'card-btn'; delBtn.textContent = '×';
    delBtn.onclick = e => { e.stopPropagation(); if(confirm('삭제?')) { snapshot(); cards.splice(i,1); renderCards(); saveBoard(); } };
    actions.appendChild(delBtn); el.appendChild(actions);
    if (card.type === 'text') {
      const text = document.createElement('div'); text.className = 'text'; text.contentEditable = true;
      text.innerHTML = card.content || '';
      text.addEventListener('focus', () => { snapshot(); });
      text.addEventListener('blur', () => { card.content = text.innerHTML; saveBoard(); });
      el.appendChild(text);
    } else if (card.type === 'image') {
      const img = document.createElement('img');
      img.src = card.src.startsWith('http') || card.src.startsWith('data:') ? card.src : IMG_BASE + card.src;
      img.alt = ''; img.loading = 'lazy'; img.onerror = () => img.style.display = 'none';
      if (card.w) img.style.width = card.w + 'px';
      if (card.h) img.style.height = card.h + 'px';
      if (card.link) { const a = document.createElement('a'); a.href = card.link; a.target = '_blank'; a.appendChild(img); el.appendChild(a); }
      else { el.appendChild(img); }
      if (card.caption) { const cap = document.createElement('div'); cap.style.cssText = 'font-size:11px;color:#8b949e;margin-top:4px;word-break:break-word;padding:0 2px;'; cap.textContent = card.caption; el.appendChild(cap); }
    } else if (card.type === 'html') {
      const wrapper = document.createElement('div');
      wrapper.style.cssText = 'overflow:auto;font-size:13px;line-height:1.5;';
      wrapper.innerHTML = card.html.replace(/__ATTACHMENT__/g, IMG_BASE);
      wrapper.querySelectorAll('img').forEach(img => { img.style.maxWidth = '100%'; img.style.height = 'auto'; img.draggable = false; });
      wrapper.querySelectorAll('a').forEach(a => { a.target = '_blank'; a.style.color = '#6cb0f6'; });
      wrapper.querySelectorAll('table').forEach(t => { t.style.borderCollapse = 'collapse'; });
      wrapper.querySelectorAll('td,th').forEach(td => {
        td.style.border = '1px solid #444'; td.style.padding = '4px 6px'; td.style.verticalAlign = 'top';
        td.title = '더블클릭으로 편집';
        td.addEventListener('dblclick', function(e) {
          e.stopPropagation();
          snapshot();
          this.contentEditable = 'true';
          this.style.outline = '2px solid #388bfd';
          this.style.background = 'rgba(56,139,253,0.08)';
          this.focus();
        });
        td.addEventListener('blur', function() {
          this.contentEditable = 'false';
          this.style.outline = '';
          this.style.background = '';
          cards[i].html = wrapper.innerHTML.split(IMG_BASE).join('__ATTACHMENT__');
          saveBoard();
        });
      });
      el.appendChild(wrapper);
    } else if (card.type === 'table') {
      const rows = card.rows || [['','',''],['','',''],['','','']];
      const tbl = document.createElement('table');
      tbl.style.cssText = 'border-collapse:collapse;width:100%;font-size:13px;';
      rows.forEach((row, ri) => {
        const tr = tbl.insertRow();
        row.forEach((cell, ci) => {
          const td = document.createElement(ri === 0 ? 'th' : 'td');
          td.contentEditable = true;
          td.style.cssText = 'border:1px solid #30363d;padding:4px 8px;min-width:60px;text-align:left;' + (ri===0 ? 'background:#21262d;font-weight:600;' : '');
          td.textContent = cell;
          td.addEventListener('blur', () => { if (!cards[i].rows) cards[i].rows = rows; rows[ri][ci] = td.textContent; saveBoard(); });
          tr.appendChild(td);
        });
      });
      el.appendChild(tbl);
      const addRow = document.createElement('button');
      addRow.textContent = '+ 행'; addRow.style.cssText = 'margin-top:4px;font-size:11px;background:#21262d;border:1px solid #30363d;color:#8b949e;padding:2px 8px;border-radius:4px;cursor:pointer;';
      addRow.onclick = e => { e.stopPropagation(); snapshot(); if (!cards[i].rows) cards[i].rows = rows; cards[i].rows.push(new Array(cards[i].rows[0].length).fill('')); renderCards(); saveBoard(); };
      const addCol = document.createElement('button');
      addCol.textContent = '+ 열'; addCol.style.cssText = 'margin-top:4px;margin-left:4px;font-size:11px;background:#21262d;border:1px solid #30363d;color:#8b949e;padding:2px 8px;border-radius:4px;cursor:pointer;';
      addCol.onclick = e => { e.stopPropagation(); snapshot(); if (!cards[i].rows) cards[i].rows = rows; cards[i].rows.forEach(r => r.push('')); renderCards(); saveBoard(); };
      el.appendChild(addRow); el.appendChild(addCol);
    }
    const rh = document.createElement('div'); rh.className = 'resize-handle';
    rh.addEventListener('mousedown', e => { e.preventDefault(); e.stopPropagation(); snapshot(); resizing = { idx: i, startX: e.clientX, startW: card.w || el.offsetWidth }; });
    el.appendChild(rh);
    if (i === selectedIdx) el.classList.add('selected');
    board.appendChild(el);
  });
  requestAnimationFrame(() => {
    let maxB = 0;
    document.querySelectorAll('.card').forEach(el => { const b = (parseFloat(el.style.top)||0) + el.offsetHeight; if (b > maxB) maxB = b; });
    board.style.minHeight = (maxB + 100) + 'px';
  });
}

document.addEventListener('mousemove', e => {
  if (moving) {
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`); if (!el) return;
    let nx = moving.origX + e.clientX - moving.startX, ny = moving.origY + e.clientY - moving.startY;
    if (e.shiftKey) { nx = snap(nx); ny = snap(ny); el.style.outline = '1px dashed rgba(240,192,64,0.3)'; } else { el.style.outline = ''; }
    el.style.left = nx + 'px'; el.style.top = ny + 'px';
  }
  if (resizing) {
    let nw = resizing.startW + e.clientX - resizing.startX; if (e.shiftKey) nw = snap(nw);
    cards[resizing.idx].w = Math.max(100, nw);
    const el = document.querySelector(`.card[data-idx="${resizing.idx}"]`); if (el) el.style.width = cards[resizing.idx].w + 'px';
  }
});

document.addEventListener('mouseup', e => {
  if (moving) {
    let nx = moving.origX + e.clientX - moving.startX, ny = moving.origY + e.clientY - moving.startY;
    if (e.shiftKey) { nx = snap(nx); ny = snap(ny); }
    cards[moving.idx].x = Math.max(0, nx); cards[moving.idx].y = Math.max(0, ny);
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`); if (el) { el.classList.remove('moving'); el.style.outline = ''; }
    if (e.shiftKey) pushCards(moving.idx);
    moving = null; saveBoard();
  }
  if (resizing) { if (e.shiftKey) pushCards(resizing.idx); resizing = null; saveBoard(); }
});

function addTextCard() { snapshot(); cards.push({ type: 'text', content: '', x: 50, y: window.scrollY+100, w: 300 }); renderCards(); setTimeout(() => { const els = document.querySelectorAll('.card .text'); els[els.length-1]?.focus(); }, 100); }
function addImageCard() { const input = document.createElement('input'); input.type = 'file'; input.accept = 'image/*'; input.onchange = e => { const f = e.target.files[0]; if (!f) return; const r = new FileReader(); r.onload = () => { snapshot(); cards.push({ type: 'image', src: r.result, x: 50, y: window.scrollY+100, w: 240 }); renderCards(); saveBoard(); }; r.readAsDataURL(f); }; input.click(); }
function addImageUrl() { const url = prompt('이미지 URL'); if (!url) return; snapshot(); cards.push({ type: 'image', src: url, x: 50, y: window.scrollY+100, w: 240 }); renderCards(); saveBoard(); }
function addTableCard() {
  const colsStr = prompt('열 수 (기본 3)', '3'); const cols = Math.max(1, parseInt(colsStr)||3);
  const rowsStr = prompt('행 수 (헤더 포함, 기본 4)', '4'); const rows = Math.max(1, parseInt(rowsStr)||4);
  snapshot();
  cards.push({ type: 'table', rows: Array.from({length: rows}, (_, ri) => Array.from({length: cols}, (_, ci) => ri===0 ? `열${ci+1}` : '')), x: 50, y: window.scrollY+100, w: Math.max(240, cols*100) });
  renderCards(); saveBoard();
}
function exportBoard() { syncText(); const blob = new Blob([JSON.stringify(cards, null, 2)], { type: 'application/json' }); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = SAVE_KEY + '.json'; a.click(); }
// ── Zoom ─────────────────────────────────────────────────────────────────────
let zoom = parseFloat(localStorage.getItem('zoom-' + SAVE_KEY) || '1.0');
function applyZoom() {
  const board = document.getElementById('board');
  board.style.transform = `scale(${zoom})`;
  board.style.transformOrigin = '0 0';
  document.getElementById('zoom-level').textContent = Math.round(zoom * 100) + '%';
  localStorage.setItem('zoom-' + SAVE_KEY, zoom);
}
function zoomIn()  { zoom = Math.min(3.0, parseFloat((zoom + 0.1).toFixed(2))); applyZoom(); }
function zoomOut() { zoom = Math.max(0.2, parseFloat((zoom - 0.1).toFixed(2))); applyZoom(); }
document.addEventListener('keydown', e => {
  if (e.ctrlKey || e.metaKey) {
    if (e.key === '=' || e.key === '+') { e.preventDefault(); zoomIn(); }
    if (e.key === '-')                  { e.preventDefault(); zoomOut(); }
    if (e.key === '0')                  { e.preventDefault(); zoom = 1.0; applyZoom(); }
  }
});
document.getElementById('board').addEventListener('wheel', e => {
  if (!(e.ctrlKey || e.metaKey)) return;
  e.preventDefault();
  e.deltaY < 0 ? zoomIn() : zoomOut();
}, { passive: false });
applyZoom();
function resetLayout() { if (!confirm('자동 재배치합니다.')) return; cards.forEach(c => { delete c.x; delete c.y; }); renderCards(); autoLayout(); }
// ── Floating format toolbar ───────────────────────────────────────────────────
const fmtBar = document.getElementById('format-toolbar');
function fmt(cmd) { document.execCommand(cmd, false, null); saveBoard(); }
function fmtLink() {
  const sel = window.getSelection();
  if (!sel || sel.isCollapsed) return;
  const url = prompt('링크 URL 입력', 'https://');
  if (!url) return;
  document.execCommand('createLink', false, url);
  // make links open in new tab
  sel.anchorNode?.parentElement?.closest('a')?.setAttribute('target', '_blank');
  document.querySelectorAll('.text a').forEach(a => a.target = '_blank');
  saveBoard();
}

// prevent format buttons from blurring contenteditable
fmtBar.addEventListener('mousedown', e => e.preventDefault());

document.addEventListener('selectionchange', () => {
  const sel = window.getSelection();
  if (!sel || sel.isCollapsed || !sel.toString().trim()) { fmtBar.style.display = 'none'; return; }
  // only show if selection is inside a .text element
  const anchor = sel.anchorNode;
  if (!anchor) { fmtBar.style.display = 'none'; return; }
  const textEl = anchor.nodeType === 1 ? anchor.closest('.text') : anchor.parentElement?.closest('.text');
  if (!textEl) { fmtBar.style.display = 'none'; return; }
  // position above selection
  const range = sel.getRangeAt(0);
  const rect = range.getBoundingClientRect();
  fmtBar.style.display = 'flex';
  const tbW = fmtBar.offsetWidth || 180;
  let left = rect.left + rect.width / 2 - tbW / 2;
  left = Math.max(8, Math.min(left, window.innerWidth - tbW - 8));
  fmtBar.style.left = left + 'px';
  fmtBar.style.top = (rect.top - 44 + window.scrollY) + 'px';
});

setInterval(saveBoard, 30000);
loadBoard();
