<title>메모</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1e1e1e; color: #e0e0e0; font-family: 'Segoe UI', -apple-system, sans-serif; font-size: 15px; line-height: 1.6; padding: 20px 30px 60px; overflow-x: hidden; }
a { color: #6cb0f6; text-decoration: none; }
a:hover { text-decoration: underline; }
.title-bar { background: #3a3a5c; display: inline-block; padding: 6px 16px; font-size: 22px; font-weight: bold; color: #fff; margin-bottom: 4px; }
.date { color: #999; font-size: 13px; margin-bottom: 20px; }
.board { position: relative; }
.card { background: #2a2a2a; border: 1px solid #3a3a3a; border-radius: 8px; padding: 12px; position: absolute; cursor: grab; transition: box-shadow 0.15s; overflow: hidden; }
.card:hover { box-shadow: 0 0 0 1px #58a6ff; z-index: 10; }
.card.moving { opacity: 0.8; box-shadow: 0 4px 24px rgba(0,0,0,0.6); z-index: 100; cursor: grabbing; }
.card img { width: 100%; border-radius: 4px; display: block; }
.card .text { outline: none; min-height: 20px; white-space: pre-wrap; word-break: break-word; }
.card .text:focus { background: rgba(255,255,255,0.05); border-radius: 4px; padding: 4px; }
.card .text:empty::before { content: '텍스트 입력...'; color: #555; }
.card-actions { position: absolute; top: 4px; right: 4px; display: none; gap: 4px; }
.card:hover .card-actions { display: flex; }
.card-btn { background: #333; border: 1px solid #555; color: #ccc; border-radius: 4px; padding: 2px 6px; font-size: 11px; cursor: pointer; }
.card-btn:hover { background: #444; color: #fff; }
.resize-handle { position: absolute; bottom: 0; right: 0; width: 16px; height: 16px; cursor: se-resize; opacity: 0; }
.card:hover .resize-handle { opacity: 0.6; }
.resize-handle::after { content: ''; position: absolute; bottom: 3px; right: 3px; width: 8px; height: 8px; border-right: 2px solid #666; border-bottom: 2px solid #666; }
.card.selected { box-shadow: 0 0 0 2px #58a6ff; z-index: 5; }
.highlight-red { color: #ff6b6b; }
.highlight-blue { color: #6cb0f6; }
.highlight-gold { color: #f0c040; }
.toolbar { position: fixed; bottom: 0; left: 0; right: 0; background: #161b22; border-top: 1px solid #30363d; padding: 8px 20px; display: flex; gap: 12px; align-items: center; z-index: 200; }
.toolbar button { background: #21262d; border: 1px solid #30363d; color: #e0e0e0; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; }
.toolbar button:hover { background: #30363d; }
.toolbar .status { color: #8b949e; font-size: 12px; margin-left: auto; }
#format-toolbar { position: fixed; display: none; background: #1c2128; border: 1px solid #444c56; border-radius: 8px; padding: 4px 6px; gap: 2px; align-items: center; z-index: 500; box-shadow: 0 4px 16px rgba(0,0,0,0.5); }
#format-toolbar button { background: none; border: none; color: #cdd9e5; padding: 4px 8px; border-radius: 5px; cursor: pointer; font-size: 13px; line-height: 1; }
#format-toolbar button:hover { background: #373e47; }
#format-toolbar .sep { width: 1px; height: 16px; background: #444c56; margin: 0 2px; }
</style>

    "content": "메모 - 잊지 않도록 요점을 간략히 적어두는 일, 또는 그렇게 적은 글\n상사의 지시를 수첩에 기록, 전화 통화한 내용을 메모ㄴ지에 적거나\n강의 내용을 노트에 기록하는 것등을 포괄한다.\n인간의 기억력, 망각 메모의 이유\n메모력을 정의 한다면, 기록하는 능력이라기보다는 순식간에 듣거나 논의하거나 생각한 것 중에\n취할 것은 취하고, 버릴 것은 버린 후 그것을 순간적으로 축약해 적어내는 것이다.\n즉, 순간적인 판단력이 길러지게 마련이다.\n외부저장매체 외부기록장치\n중요한 일을 잊지 않고, 실수를 줄이도록한다.\n무엇보다 중요한 것은 메모는 잊을 수 있게 해준다.\n메모가 없다면 매 순간 우리는 잊지 않기 위해 엄청낸 에너지와 시간을 소비해야 할 것이다.\n잊기 위해서, 그러나 잃지는 않기 위해서 우리는 메모하는 것이다.\n분기, 월, 일별, 분류하고 가르는 복잡다단한 스케쥴과 메모는\n어떠한 성취감이나 만족감을 준다.\n하지만, 그것은 자위 행위에 불과하다. 메모라는 행위가 기억을 보조하고 생활의 효율성을 위한 것이라면\n\n최대한 심플하고 2. 정리에 소요되는 시간을 최소화 할 수 있어야 한다.\n\n투비리스트/ 성취하기 위한 투두리스트/ Due date\n여대생들의 휘황찬란한 다이어리\n아저씨들의 다이어리 - 프랭클린 플래너(꼰대들의 다이어리)\n형형색색의 볼펜과 형광펜, 스티커와 포스트잇으로 점철된 노트. 그래 멋져보인다.\n그래서 뭐, 그게 퍼포먼스와 무슨 상관이란 말인가. 자기만족일 뿐이다.\n어떠한 금석같은 계획도. 계획에서 머무르면 종이 쪼가리일 뿐이지 않은가.\n실행력이 담보되려면 최대한 심플해야하고, 다양하게 분류되기보다\n나의 타임라인상에 우선순위에 따라 정리되어야 한다."

    "content": "메멘토 - 우리의 장기기억이 온전하다고 망각이 없는 것은 아니다. 메멘토의 주인공 ''보다 망각의 주기가 조금 더 긴 것 뿐이다.\n우리가 더 나아지지 못하는 이유는, 더 배우지 않아서가 아니라, 이미 배운 것을 너무도 쉽게 잃기 때문이다.\n잊는 것은 자연스러운 것이다. 그러나 그것을 잃도록 놓아두는 것이 문제다. 그래서 기록하는 것이다.\n아이디어 노트\n축적 없이는 혁신도 없다, 하루 하루 쌓이는 메모, 일력 하나는 얇디 얇을 것이나.\n매일 매일 언뜻 떠오르는 것을 붙잡아 기록해둘 수 있다면,\n반드시 쓰여질 것이다.\n점을 찍는다. 정글짐. 세렌디피티, 통섭, 창발\n그냥 단순한 아이디어라도 좋다. 점을 찍어 두는 것이다.\n뇌의 시냅스들이 연결되는 것처럼 어느 순간. 그 점과 점이 연결되어 선이되고 선들이 모여\n하나의 면을 드러낼 것이다.\n항해도, 지도, 설계도\n통제할 수 없는 영역이 있다. 통제할 수 있는 영역을 최대한 컨트롤 할 수 있다면, 내 통제권 밖의 일과 변수들에\n보다 유연하게 대처할 수 있으며, 운신의 폭이 넓어진다.\n비전보드 - 사명문\n나는 평생 동안\n1. 목표를 종이에 적고\n2. 하루 두 번 (기상 후, 취침 전) 종이에 쓴 목표를\n큰 소리로 외친다는 두 가지 원칙을 실천했다.\n그 결과, 1주일에 1달러 20센트를 받던 면화공장 노동자에서\n개인 재산만 4억 달러 넘게 소유한 거부로 성장하게 되었다.\n- 강철왕, 앤드류 카네기\n\"생각하는 대로 살지 않으면, 사는 대로 생각하게 된다.\"\n포기할 것들의 리스트를 적는다.\n인간은 욕망의 …..이다. 포기할 것으 확실히 해두지 않으면,\n자연스럽게 다시 눈과 손이가게 마련이고, 그런 것들에 시간을 빼앗기면\n결국 타임 스케쥴과 목표 자체가 늦어지거나 무너지고 만다.\n어느  것도 포기할 수 없다라는것은\n열정이 아니라, 어느 것도 간절한것은 없다는 것이다.\n옹기쟁이, 옹기들을 깨는\n뇌 연구 - 글로 씌여진 목표는 시각화 훈련과 같은 효과\n여섯개의 공, 육각형 다섯개의공(http://blog.daum.net/sualchi/13720047) 더글라스 대프트\n<a href=\"http://cafe.naver.com/storyofhistory/1543\">http://cafe.naver.com/storyofhistory/1543</a>\n직무, 건강, 사회, 교양, 정신, 가정, 경제\nERRC 캔버스\n항아리와 자갈, 모레\n<a href=\"http://blog.daum.net/mukhongum70/804224\">http://blog.daum.net/mukhongum70/804224</a>\n<a href=\"http://blog.daum.net/philologia/5731083\">http://blog.daum.net/philologia/5731083</a>\n미국의 유명한 경영 대학원에서 어떤 교수님이 시간 쓰는 법에 대해 강연을 하였습니다.\n교수님은 항아리 하나를 탁자위에 올려 놓고 주먹 만한 돌들을 집어 넣기 시작했습니다.\n항아리 위까지 돌이 차자 교수님이 물었습니다.\n\"이 항아리가 가득 찼습니까?\" [네] 학생들이 대답했습니다.\n교수님이 이번엔 자갈을 항아리에 담기 시작했습니다.\n항아리를 흔들어 가며 채우니 자갈이 계속 들어갔습니다.\n항아리 위까지 차자 교수님이 물었습니다.\n\"이제 항아리가 가득 찼습니까?\" 학생들은 다시 [네]하고 대답했습니다.\n교수님이 이번엔 모래를 붓기 시작했습니다.\n항아리 위까지 차자 다시 물었습니다. \"이제는 가득 찼지요?\" [네]\n교수님은 다시 물을 항아리에 가득 부었습니다. 그리고 나서 교수님은 물었습니다.\n\"지금 제가 여러분에게 보여드린것은 무엇을 의미할까요?\"\n학생하나가 \"아무리 스케줄이 꽉찼더라도 언제든지 짜투리 시간을 이용하여 더 많은\n일을 할 수 있다는 것을 의미합니다.\"라고 대답하였습니다.\n\"아닙니다. 자갈이나 모래를 먼저 집어 넣으면 큰 돌은 결코 집어 넣을 수 없다는 것입니다.\n여러분 삶속의 큰 돌, 즉 가장 소중한 것이 무엇인지 생각하십시오.\n그리고 그것을 우선적으로 여러분의 마음의 항아리에 집어 넣으십시오\"라고&#160;\n교수님은 말하셨습니다.\n\"우리들 삶의 큰돌은 무엇일까요?\n사랑하는 가족이 우리의 큰돌이라는 것을 우리는 잘 알고 있습니다.\n그러나, 우리는 마음의 항아리에 그 큰돌을 먼저 넣지 않는 경우가 많습니다.\n남을 위해 시간을 쓰고, 남에게는 친절히 대하지만,&#160;\n오리려 가족에게는 시간을 아끼고 함부로 무시하기도 합니다.\n사랑하기때문에 기다리라고 강요합니다.&#160;\n자갈 모래 등을 먼저 넣다가 항아리가 가득 차버려 큰돌은 넣지 못 할 텐데도 말입니다.\n우리 삶에서 가장 큰 돌, 우리 마음의 항아리에 제일 큰 자리를 차지 해야 할 큰 돌은 무엇입니까?&#160;\n이 이야기는 본래, 삶에 있어서 중요한 것들을 놓치지 말라는 교훈을 담고 있다.\n이 이야기의 교훈은 ‘만약 큰 돌을 먼저 넣지 않았다면 영원히 큰 돌을 넣지 못할 것이다’라는 것이다.\n허나 우리의 업무측면에서 매우 중요한 시사점을 가지고 있다.\n우리의 일상은 바쁘고, 실상 성과에는 큰 도움이 되지 않는 그런 모레같은 일들로 가득차 있다.\n20% 일이 80% 성과를 좌우한다. 우리도 안다. 하지만 쏟아지는 모래를 담아 내느라, 우리의 하루에\n자갈을 채우지 못하는 것이다. 바쁘고 터프한 하루의 끝에 성과에는 별 영향이 없는 일을 했다는 이야기를 스스로에게 고백하기는 너무 아프니까.\nThe one thing 인용하기\n큰 것을 그려라, 과도한 목표를 말하는 것이 아니다.\n계획과 시간이 가용할 수 있는 한 최대한 스트레치드된 목표를 말하는 것이다.\n코이 물고기, 발목이 묶인 코끼리, 어항 가운데 칸막이,  관성에 관한 것.\n직장인은 회사에 시간을 저당잡힌 존재다.\n그 반대급부로 돈을 받는다.\n소중한 시간을 아껴써야 하지 않겠는가.\n부자와 서민의 차이는 외견상의 부의 부의 액면차이가 아니다.\n내가 직접일을 하지 않아도 돈이 들어오는 '구조' '시스템'을 가진자가 부자.\n그렇지 않은 사람들은 조금 잘 살거나 서민이다.\n묘비명\n웨스터 민스터\n<a href=\"http://blog.naver.com/cool2237/40009424277\">http://blog.naver.com/cool2237/40009424277</a>\n수기치인 - 자기가 쓰는 자기계발서\n성공\n행복\n나를 행복하게 하는 것들\n이러한 키워드를 적어두고 때때로 떠오르는 나만의 정의를 적는다.\n그룹 연수중에 \"오빠, 야근은 무능이라고 생각해요\"\n그 친구도 지금쯤 어디선가 무능을 발휘하고 있으리라 믿는다.\n퇴근을 일찍하기 위해서 업무 효율성을 높이자는게 아니다.\n모래같은 일들을 쳐내기 위해서 스마트 워크가 필요한 것이다.\n꿈이 아니다. 목표라 해야 옳다.\n꿈에는 낭만이 수반될 뿐이지만,\n목표에는 계획과 실행이 따른다.\n누군가가 달콤한 낭만에 젖어있을 때,\n우리는 움직여야 한다.\n꿈이라는 단어는 정말 로맨틱한 개소리다.\n'착한' '힐링' 등과 함께 우리 마케터들이 더럽혀 놓은\n상업정인 단어중의 하나일 뿐이다.\n매일 노트를 토대로 생활하는 것 자체로, 방향을 잃지 않게 된다.\n매너리즘이나 슬럼프에 빠질 때도 도움이 된다.\n원노트가 에버노르를 위시한 여타의 스마트 노트들과 대별되는 가장 강력한 기능은\n바로 카테고라이징이다.\nKnow-where, 노트와의 시냅스, 너무나 중요한 기능이다.\n잊기 위해서 메모한다지만, 그것이 어디에 적혀있는지는 기억해야 한다.\n메모를 잘 하는 것과, 자신의 메모를 활용하는 능력은 전혀 별개의 것 이다.\n예수님의 말씀을 받아 적었다고 하더라도, 그것을 찾지 못하면 아무런 의미가 없다.\n노트한 것을 찾기 위해서 기억력을 동원해야만 한다면, 노트의 의미가 없다.\n여행노트\nㅇ 일정, 준비물, 교통, 스케쥴, 동선, 영상기록은 물론\n블로그/출판\n원노트를 그대로 퍼블리싱 가능\n웹을 그대로 긁어올 수도\n누구나 노트를 한다. 학생은 물론 선생님 교수, CEO, 운동선수들도 노트를 한다.\n하지만 어릴적부터 관성적으로 노를 해온 탓에 노트에서의 혁신이나,\n노트를 활용해서 생산성을 높이는 경우는 드물다.\n성인의 노트는 기록 이상의 의미가 있어야 한다.\n인생에 정답이 없는 것과 같은 연유로 오답 또한 없다.\n때문에 인생의 오답노트란 존재 할 수 없는 것이다.\n허나, 우리는 실수와 실패로 스스로를 가르쳐야만 한다.\n나를 아프게하고 나를 성장시킨 성장통의 기록들을 경험칙 들을 허투루 흘려보내선 안된다.\n우리가 더 성장하지/똑똑해지지/천재가 되지 못하는 이유는,\n많이 배우지 못해서가 아니다. 배운 것을 잊고 새로운 배움만을 좇기 때문이다.\n나를 아프게하고, 나를 좌절케 했던 혹은 성공했으면 성공한 이유를 규명하여 기록해두어야 한다.\n그 아카이브의 크기가 나의 그릇이 된다.\n원노트는 나의 경험지의 아카이브가 되고\n이것은 나의 스마트 GAM 데이터 베이스가 된다.\n플랜 두 씨. 그러나 이 선순환의 가장 약한 고리는\nCheck 점검한 이후 얻은 시사점이 Plan에 반영되는 시점이다.\n특정 프로젝트나 업무, 혹은 태스크가 끝났으면 개선점을 찾고 \"기록\"해서\n후에 더 나아짐이 있도록 해야만 한다.\n모든 일은 노트와 메모에서 출발한다.\n파워포인트, 엑셀, 워드 이런 Tool이 업무력의 기초라고 생각했던적이 있었다.\n사실 그 모든 것의 출발점에는 메모와 노트가 있었다.\n손정의 회장이 트위터를 처음 사용하고 남긴 트윗은 이러했다.\n\"제 2의 뇌가 생긴 느낌이다.\"\n베네치아 게임처럼 쏟아지는 일들 속에서\n우리는 멀티태스커가 되어야만 한다.\n멀티태스킹의 핵심은 동시다발적으로 일을 처리 하는 것이 아니라,\n일을 접수하면 기존의 태스크들과 비교하여 즉각적으로 우선순위를 배정하여야 한다.\n그리고 다시 돌아와 눈앞의 일을 끝내고 다음 고지로 갈 수 있어야 한다.\n현재의 일에 집중하기 위해, 기록해두고 잊어야 한다.\n#우선순위의 함정\n80%의 성과를 결정하는 20%의 일이 있다.\n자기계발서의 원전이라 할만한 스티븐 코비의 성공하는 사람들의 7가지 습관에는 4분면을 제시한다. 그 4분면에서 가장 중요한 영역이 어디인가? 가장 시급하고 중요한일이 아니다. 덜 중요하면서 시급성은 떨어지는 일이다.\n모레 같은 일들을 쳐내다가 결국 중요한 자갈을 넣지 못하면, 부실 공사가 되고 만다.\n집중력의 호홉을 짧게 가져갈 수 있는 것이 중요하다.\n대부분의 메모광이 이렇게 말한다. \"잊기 위해 메모한다.\"고\n한 가지 일에 몰두할 수 없게 만드는 조직의 일하는 시스템과 구조를 문제 삼기보다 그 환경에 나를 적응 시키는 것이 더 현실적인 대안이다.\n기록해두고 잊지 않으면, CPU에 오버클럭이 발생하는 것과 동일한 상황이 발생한다.\n해야할 업무가 산재해 있다는 심리적 압박감만으로도 피로도가 상승한다.\n우선순위를 배정해두면 스스로 일을 장악할 수 있다.\n독서노트로 원노트가 가장 잠재력은 실로 엄청나다.\n원하는 페이지를 사진으로 스크랩해두고 코멘트를 달거나 사진 위에 직접 펜으로 표기가 가능하다.\n동서 고금의 많은 성공한 이들은 메모광이었다. (자료 찾아보기)\n메모는 약식 노트와 같은 기능을 한다.\n모든 메모는 노트로 수렴되어야 한다.\n모든 것이 기록\n성인이 되고 나서 가장 중요한 역량은\n스스로를 가르칠 수 있는 역량이다.\nEvolution to revolution.\n노트의 진화는 곧 나의 진화를 의미한다.\n스마트워크에 대한 논의는 인프라 중심을 이뤄지고 있다.\n인당 생산성 향상에는 두 가지 방법이 있다.\n첫째, 일인당 근무 시간을 늘리는 방법\n둘째, 근무 시간당 효율성을 높이는 방법\n작금의 스마트 워크의 초점은 언제 어디서든 일 할 수 있도록 하는 환경을 구축하는데 초점\n절대적인 업무 시간의 총량을 늘리고 있다.\n(매트릭스 욕조)\n개인은 편리하게 일 할 수 있게 되었다고 생각 할 것이 아니라,\n나의 여가와 자투리 시간마저 잠식당 할 수 있다는 위기의식을 가져야 한다.\n그렇다면 스마트 워크 시대의 개인을 어떠한 준비를 해야 하는가?\n어짜피 기업이 목표하는 아웃풋이 정해져 있다라고 한다면,\n내가 업무효율성을 늘리거나 단위 시간당 생산성을 향상시키지 못한다면\n같은 급여를 받고도 나의 소중한 시간을 회사에 내주어야만 한다.\n착각해서 안 된다. 회사, 조직이란 단어는 개념어일 뿐 그것엔 실체가 없다.\n한국의 정서상 에둘러 표현할 뿐이다. 회사에서 나에게 영향을 미치는 모든 일은\n나와 술잔을 부딪히던 동료나 선배, 적어도 나와 악수를 나누거나 대화를 주고받았던 사람들에 의해 결정된 일이다.\n나에게 일어난 모든 일은 좋은 일이든 나뿐 일이든, 그 사람들이 내게 준 것이다.\n운동을 해야 한다.\n좋은 체력은 단순히 격무를 견딜 수 있다는 의미 그 이상이다.\n남보다 오랜 시간을 업무에 수행 할 수 있다는 것 그 이상이다.\n남보다 더 시간 동안 집중력을 가지고 일 할 수 있다는 것 그 이상이다.\n결국, 체력이 퍼포먼스를 좌우한다.\n내 조직과 내 선배와 내 리더가 내 건강에 책임을 져야만 한다.\n내 조직과 내 선배와 내 리더가 내 커리어를 책임 져야만 한다.\n위 명제가 옳은가?\n아니다. 절대 그렇지 않다.\n우리가 업무 스트레스나 회사에서 비워낸 술잔들 탓에 질병에 걸린대도\n그들은 책임질 이유가 없다.\n내가 원하는 일을 할 수 있는 기회가 그들에 의해 지연된다고 해도,\n심지어 내가 회사로부터 버려진다고 해도 그들이 책임져야 할 이유도\n그럴 수 있는 방법도 없다.\n그런데, 왜\n당신을 마치 그들이 책임질 것 처럼 헌신하는가.\n회사가 내게 요구한 것 이상의 헌신도 그들 입장에서는 부담이다.\n원망을 예비하지 말고,\n운동하고, 공부하며 그렇게 스스로를 구원하라.\n살아남자, 아프지 말고… 아프지 말고...\n선배들의\n파편화된 기록 방법은 기술적 한계로 인한 불가피한 방법이다.\n그러나 지금 당신의 곁에 있는 단하나의 디바이스가 그 모든 것을 통합적으로 가능케한다.\n무엇인가? 그렇다 스마트폰.\n선배들이야 갖가지 형태의 녹음기와, 피처폰, PDA, 노트와, 포스트잇, 노트북을 휴대하는 것을 비즈니스맨의 상징과 영광으로 생각했을지 모르나\n우리는 다른 세대다. 우리는 다음 세대다.\n아날로그 노트는 종이책과 같은 지위를 유지할 것이다.\n메모는 아날로그가 디지털보다 낫다는 말은 스마트폰 보급 이후에 완전히 고어, 옛말이 되어버렸다.\n세대의 구분이 생긴 것이다. 요즘에는 디지털 이란 말조차 좀처럼 쓰지 않는다.\n심지어 요즘 스마트폰은 방수기능을 지원하므로 목욕탕에 가지고 가서 음성메모나 직접 타이핑하는 것도가능하다.\n최초에 가장 빠른 수단으로 메모나 노트를 하는 것이 효율적이기 때문에 이들이 분산되어 있는 것은 당연하다. 하지만, 이것들이 분산된 채로 있어서는 어느 부분에서건 누락이 발생할 수 밖에 없다. 메모와 노트는 가능한 빠른 시간 내에 한가지 매체로 수렴 및 통합되어야 한다. 정확히는 나의 스케쥴, 타임라인에 Taks단위로 변환되어 들어와야만 한다.\n노트와 메모를 위해 각종 필기구와 노트를 구비하는 것은, 어릴적 신학기가 되면 새 노트와 새 필기구를 사며 설레여하는 어린 아이같은 감성을 충족시켜줄 수 있을지는 모르나. 경제적, 효율적 측면에서 하등 도움이되질 않는다.\n분류가 많아지면 체계화된 것처럼 보이는 착시효과 때문에 만족감을 높아질지 모르나,\n기억하고 통제할 수 있는 범위 이상으로 카테고리를 나누게 되면 오히려 그 효율성이 떨어지기 시작한다.\n그래프 삽입. 효율 반감 보아뱀형 그래프\n어떤 주제와 테마의 일이든 타임라인으로 수렴되어야 한다.  나의 시간안에 내가 해야 할 일이기 때문이다.\n이를테면, \"딸기잼 구입\", \"팀장 Workshop 자료 송부\"처럼 이질 것인 task가 혼재되어도 상관 없다.\n어짜피 그것을 행하는 주체는 나이기 때문이다.\n일원화가 가능하다라는 점 그것이 선배들 세대와 우리 세대의 노트가 가지는 가장 큰 차이점이다.\n그들은 파편화 된 기록 매체들 사이를 동분서주 하며 그러한 자신의 모습에 일면 도취되었을지 모른다.\n우리는 다르다, 포켓에서 꺼낸 스마트폰 하나로 모든 것을 통합 관리하고 모든 인풋과 아웃풋이 가능하다.\n그들 중 대다수는 폰에서 엑셀 함수를 수정하는 모습을 보면 까무라칠지 모른다.\n스케쥴관리, 독서노트, 인맥관리, 유용한 정보원과 링크들 보관\n인터스텔라, 우리는 답을 찾을 것이다. 늘 그랬듯이.\n꼰대들의 방식으로는 꼰대들을 이길 수 없다.\n원노트의 강점\n\n원하는 노트포맷을 자유롭게 고를 수 있다.\n문장기호나 줄 맞춤이 용이\n저장이 필요없다.\n자동 백업\n유비쿼터스\n가로, 세로 공간의 제약이 없다.\n단어? 단락단위로 언제 노트했는지 시간을 알 수 있다.\n심지어 엑셀시트를 불러올 수 있다.\n오디오는 기본, 비디오를 붙여넣을 수 있는 몰스킨이 세상에 존재하는가?\n후 인덱스가 아니라, 애초에 특정 분류에 메모를 해야 하므로 근본적으로 체계적인 노트가 가능하다.\n펜의 두께, 색상까지 선택할 수 있다. 몰스킨을 화려하게 꾸미기 위해 도대체 몇 개의 펜을 구입하고 또 휴대해야 하는가?\n일반 노트에 시계열순으로 노트해나가다보면 특정 건에 대해 업데이트가 발생했을 때, 포스트잍을 위에 덧붙이지 않고서야 추가적으로 노트할 공간을 확보할 수 없다.\n아날로그 노트가 휴대성이 좋다는 것은 이제 옛말이 되어버렸다. 휴대폰, 이보다 휴대성이 좋은 기록매체가 있는가? 심지어 실시간 백업과 동기화가 가능한 휴대용 기록매체 말이다\n아날로그 노트는 사실 종이에 문신을 새기는 것이다. 즉, 반영구적이지만 가변성이 지극히 떨어진다.\n하지만 원노트는 아무곳에나 노트해두고 자유롭게 끌어다 수정이 가능하다. 에버노트도 이건 안된다.\n안티 프랭클린, 안녕(굿바이) 프랭클린\n\n프랭클린 노트가 현대인에가 맞지 않는 이유는 너무 많다.\n첫째, 바이오 리듬\n둘째, 변수를 고려할 수 없다. 융통성이 없다.\n셋째, CEO처럼 모든 시간을 통제할 수 있고 외부변인이 적은 사람들에게나 유효한 시간관리 방식이다.\n넷째, 시간관리나 스케쥴 작성에 그렇게나 많은 시간을 들일 수 있는 시간부자들에게나 유효한 방식이다.\n다섯째, 보라 남북전쟁 시대에 나온 스케쥴 관리법이다. 오늘\nㅇ  운전중이나 기록하기 곤란한 상황에 불현듯 떠오른 아이디어가 휘발된탓에 괴로웠던 적이 있지 않은가?\n이제 원노트 원터치마으로 오디오 메모가 가능하다.\n더욱 놀라운 점은 오디오를 텍스트로 변환해준다는 것이다.\n아이디어가 떠오를 때 메모를 할 수 없다면, 그것을 기억하기 위해 애를쓰는 동안 추가적인 아이데이션의 기회와 추가 아이디어를 생각해낼 기회가 상쇄된다. 이래서 언제 어디서나 메모가 가능해야만 하는 것이다.\n그러므로 떠오른 아이디어를 적어두고 다음으로 향할 수 있도록, 잊기 위해서 그러나 잃지는 않기 위해서 우리는 노트해야 한다.\n단기기억 용량을 점유하고 있는 것을 비워내고, 사고력을 다른 곳으로 전환하기 위해서 기억의 외부 보조매체인 노트와 메모를 사용하는 것이다.\n지식을 묵혀두면 지혜가 된다.\n지와 지가 연결되고 새로운 것이 축적되어 비로소 새로운 지식 혹은 지혜로 나타난다.\n이 과정에서 필수적인 것이 노트 아니겠는가.\n\"들으면 잊는다.\n보면 기억한다.\n행동하면 이해한다.\"\n원토트를 위시한 스마트 노트들의 위젯을 활용하면\n그 기동성은 아날로그 노트들에 비할바가 아니다.\n메모의 1단계 - 휘발성, 단편적 아이디어들을 임시로 메모해둔다.\n단편적인 착상/착안이나 러프한 아이디어들을 빠르게 담는다.\n이동간에는 음성메모를 활용한다.\n분류, 핵심내용, 마감기한 세 가지가 반드시 기재되어야 한다.\n메모의 2단계 - 파편화된 각 아이디어들을 분류하고 재정리한다.\n메모의 3단계 -\n*각 단계별 명칭이 필요함.\nTask란 - 실행에 옮길 수 있는 일의 단위\n선배들이 쓰는 메모방식의 치명적 단점 그러나, 당대에는 보편타당한 불편이었고 현재에는 아날로그적 향수로 여기고 있을 것들을 정리해보자.\n\n방대한 메모 사이사이 인덱스가 아니면 특정 키워드를 검출해낼 수 없다.\n메모 타입이 제한적이다. - 즉 입출력 속도가 늦다.\n백업이 없다 - 메모나 노트한 매체를 분실하는 것을 아카이브 자체가 분실된다는 의미이다\n노트의 구성과 내용의 편집에 한계가 명확하다.\n필기도구를 위한 비용이 소요된다.\n<-> MS 오피스가 설치되어있다면 추가적인 비용이 Zero이다.\n몰스킨 3개?를 사면 ms 오피스 패키지를 구입할 수 있는 돈이다.\n여기에 고급 필기구와 잉크까지라면…..\n메모의 내용은 그대로 두고도, 자유롭게 바인더 노트나 포스트 잇처럼 정보를 자유자재로 편집 가능하다.\n물리적 실체가 없기에 가능한 일이다.\n한마디로, 선배들의 일하는 방\nGam 기법. - 그렇다 감.\n생체적 데이터 베이스라고 할 수 있다.\n체계적 수리적 분석은 아니더라도 경험칙에 의한 직관적 결론을 얻어내는 것을 감이라고 한다.\n아무리 우리가 스마트하게 일한다 하더라도 결고 그 세월 속에 단단히 축적된 지층을 관통하기는 어렵다.\n그렇기에 보다 체계적인 방식으로 우리만의 GAM 시스템을 업데이트 해나갈 필요가 있는 것이다.\n프랭클린이 누구였는가?\n귀족이었다. 자신의 스케쥴이 자신 말고의 변수나 가변적인 요소가 없는 사람들. 요즘으로 치면 사장이나 CEO, 고위 관료 혹은 루틴에 따라 움직이지 않는 자영업자나 연예인, 프리랜서 쯤 되어야만 이 다세대아파트 같이 빽빽한 공간에 가둬진 계획들을 계획대로 실행할 수 있다는 의미이다.\n가변적인 요소나 변수가 생겼을 때, 이 촘촘한 노트는 이를 포용할 수 없고, 포용하게 되면 전체적인 타임라인이 깨져버린다.\n다윗에게는 몽둥이가 아니라 돌팔매가 필요하다.\n그리고 우리는 그것을 전략이라 한다.\n복잡다단한 분류와 낭자한 선들에 오르가즘을 느껴선 곤란하다.\n절대적으로 심플해야만 한다. 우리 자신도 우리가 가진 시간도 하나 뿐인데\n이것을 복수의 스케쥴러와 노트에 분산시키는 것은 엄청난 비효율이다.\n본말전도다.\n그럼에도 기억하라,\n행복은 효율에 관한 문제가 아니다.\n우리가 삶의 통제 가능한 부분을 가능한 압축적으로 살아낼 수록 그 여백을 즐길 수 있는 것이다.\n스위치같은 온오프는 불가하더라도, 삶의 긴장과 이완 이 두 상태를 왕복할 수 있어야 한다.\n그리고 반드시 스케쥴에 가변적인 요소를 포용하 수 있는 여백을 두라.\n무엇이 변했는가,\n#1. 스토리 텔링 형식으로 두 가지 비교\n회의가 끝나면 형형색색의 마커로 난자당한 화이트 보드의 정보들을 노트북을 가져오거나 자신의 노트에 받아적고\n이를 회의록으로 작성해서 공유하는 것이 선배들의 방식이었다면, 우리는 1. 폰을 꺼낸다. 2. 화이트 보드를 찍는다. 3. 팀원들과 카톡으로 공유한다. 끝.\n#2.\n바인더 노트를 쓰는 메모광 00선배는 컴퓨터로 웹에 인쇄해서 정성스럽게 펀치로 뚫고, 이걸 바인더에 끼워넣으며 미소 짓는다.\n원노트를 쓰는 철강팀 김대리는 마우스로 노트를 끌어다 옮기고, 필요한 화면을 원노트의 캡쳐기능으로 단번에 캡쳐했다. 하단에는 자동으로 해당 웹의 링크가 달린다. 끝.\n태블릿의 확신 이후 바야흐로 페이퍼리스 시대다.\n출력 페이지에 접속해서 출력 옵션을 설정하고 출력물을 프린터로 가지러 가서 출력물을 자르고 이에 풀울 발라서 노트에 붙여 넣는 일은 분명 만족감을 준다. 그러나 이는 지극히 비효율적이다. 과거의 최선이 현대에서는 비효율인 것이다. 하지만 많은 선배들이 관성적으로 이러한 노트를 고수하고 있다.\n원토느는 스마트 노트의 몰스킨이라 할 수 있다.\n현존하는 모든 기록매체 중에서 툴에 특성이나 내장된 포맷으로 인한 한계가 거의 없다는 측면에서 최고다.\n몰스킨처럼 페이지의 어느 곳에나 어떤 방식으로든 기록할 수 있다.\n대한민국 기업의 ##%이상에서 사용하는 MS제품군과의 자유로운 호환은 화룡점정이라 하겠다.\n선배들은 고급 프랭클린 다이어리나, 몰스킨을 휴대하고 만년필을 포켓에 꽂는 것으로 자기만족과 과시욕을 충족했다.\n우리 세대는 그런 세대가 아니다. 무인양품 SPA세대. 과도한 브랜드 로고나 비싼 물건을 소비하거나 걸치는 것이 자신의 모습은 아니라는 것을 아는 세대다. 우리 세대는 합리성과 효율이 중요하다.\n\n[메모력] 오쿠노 노브유키/21세이 북스\n\n정보를 한 곳에 모으기\n시간 순서대로 적기' 를 강조하고 있다.\n수납노트\n\n여권 정보, 티켓 등 어딘가에 물리적으로 보관해야만 했던 것들을 사진찍어 노트해두기만 하면 된다.\n여행시 지도 등을 스크랩해두면 편리\n회의가 시작되기 전에는,\n무엇을 결정해야 하는지를 가지고, 즉 회의의 목표를 모두가 이해하고 시작해야 하며\n회의 가 끝나면,\n누가 무엇을 언제까지 해야 하는가가 결정되어야 한다.\n덧붙여 회의 시작 전에 4등분한 노트에 나의 의견과 계획을 적는다.\n내 생각과 계획이 없이 회의에 \"긍정적으로 경청하겠다.\"는 이상적인 생각으로 참석하면,\n타인에게 휘둘리게 되고 장악 당하게 된다. 떠념겨진 일이 있다해도 쳐낼 수 없는 것은 당연하다.\n(타인이나 세상과의 싸움이 아닌,)\n자신과의 싸움에서 이기는 사람은\n강함을 키워온 쪽 보다는\n자신의 약함을 잘 길들인 쪽일 것이다.\n스마트 회의록 작성\nㅇ 회의 참석자들의 배치도에 따라 메모한다.\nㅇ 각 구성원들의 의견을 요약하여 하단에 적는다.\n- R&R과 마감기한도 함께\nㅇ 노트를 3개 영역으로 나눈다 - 참석자/ 아젠다/ 결론(누가, 언제까지, 무엇을) + 의제(제목), 다음회의 일정 및 장소, 참석자\nㅇ 코넬 노트법\n<a href=\"http://blog.naver.com/bliss0215?Redirect=Log&logNo=10148145074\">http://blog.naver.com/bliss0215?Redirect=Log&logNo=10148145074</a>\n<a href=\"http://search.naver.com/search.naver?sm=tab_hty.top&where=nexearch&ie=utf8&query=%EC%BD%94%EB%84%AC+%EB%85%B8%ED%8A%B8%EB%B2%95\">http://search.naver.com/search.naver?sm=tab_hty.top&where=nexearch&ie=utf8&query=%EC%BD%94%EB%84%AC+%EB%85%B8%ED%8A%B8%EB%B2%95</a>\nㅇ 회의 때 사용한 화이트 보드나, 화상회의라면 화상자료를 폰으로 찍어서 노트에 첨부하고 하단에 코멘틀르 적으면 된다.\n하루에 손으로 쓰는 글씨보다 키보드와 폰의 쿼티자판으로 작성하는 텍스트가 몇 십~몇 백배 많은 우리 세대에게는,\n손글씨가 타자보다 빠르다는 건 옛말이다.\n자주 사용하는 웹페이지의 하이퍼 링크를 노트 곳곳에 두고, 터치 한번으로 웹으로 넘어갈 수 있다.\n인터넷 익스플로러의 즐겨찾기보다 각 노트의 성격에 맞게 적재적소에 배치되어있는 링크를 타고 Simless하게\n웹고 노트를 넘나들 수 있고, 북마크해두고 싶은 웹은 복사 후에 다시 노트에 붙여넣으면 그만이다.\nㅇ 스케쥴 노트\n스케쥴 노트라고 하면 흔히 사람들은 이미 구획이 나뉘어 있는 정형화된 노트를 연상하고 실제로 많이 사용한다.\n하지만 막상 자신의 환경에 맞게 사용하려면 불편함을 느낄 수 밖에 없다.\n이것이 몰스킨의 우수한 점이자 같은 DNA를 가진 원노트의 강점이다 Tab 한번이면 자유롭게 표를 생성해나갈 수 있고,\n워드처럼 표를 만들어서 삽입할 수도 있다. 즉 얼마든지 나에게 맞게 커스터마이징이 가능하다.\nㅇ 당신이 원노트를 사용해야만하는 ##가지 이유\n\n웹과 자유롭게 연동\nMs제품군과의 호환성\n노트간 하이퍼링크를 통해 유관한 내용을 가진 페이지를 자유롭게 이동할 수 있다.\n현대 모든 커뮤니케이션은 사내 메신저나 메일을 이용한다. 이것을 아날로그 노트로 옮기려면 받아 적거나 출력해서 붙여넣는 방법밖에는 없다. 만약 당신이 아웃룩을 사용한다면 단 한번의 클릭으로 메일을 원노트에 붙여넣으면 된다. 그게 아니라면 복사해서 붙여넣으면 그만이다.\n업무의 전반에 걸쳐있는 가장 중요한 활동은 단연 커뮤니케이션이다.\nFormat이 구두, 보고서, 메신저, 카카오톡, SMS로 파편화 되어있을 뿐이지\n그 모든 것은 인간 기억용량의 한계로 인해 필연적으로, 종이에 그리고 컴퓨터에 기록된다.\n최초에 이것은 메모나 노트라 불리우고, 최종적으로 회의록, 보고서로 완성된다.\n누구나 노트와 메모를 하지만, 그것이 기록 이상의 의미와 가치를 지니게 하는 것은 아니다.\n직장인이면 누구나 \"하이퍼포머\"를 향해 나아간다. 그리고\n그 기저에 기본중의 기본인 노트와 메모. 커뮤니케이션의 매개이자 ……\n노트의 활용이 모든 것을 좌우한다는 것을 인지하고 있지 못하다.\nㅇ 스케쥴 노트 - 일정 그리고 버퍼\n지구상의 수많은 스케쥴러와 각종 APP들\n구글 스케쥴러, PDA 등 이런 것들을 지속적으로 사용하기 힘든 이유는\n당신의 의지 박약이 아니다. 기본적으로 당신에게 최적화 되어있지 않은 툴이기 때문이다.\n스케쥴러를 작성하고 이것을 수정하고 편집하는데 많은 에너지를 소모해야 한다면 이 또한 아이러니다.\n스마트하다라고 주장하는 각종 툴에 속박되어서 자신의 의지박약을 자책하지 말아야 한다.\n그저 자신에게 맞는 툴을, 그것도 지속적으로 진화시켜 나갈 수 있는 툴을 만들어야 한다.\n세미나, 콘서트 등을 예약하기 위해서는 티켓 오픈 일자에 티켓 구매링크를 스케쥴표에 넣는다.\n어찌보면 역설적이지만,\n모든 예외는 기존의 원칙을 지키기 위해 존재한다. 예외를 위해서 존재하는 예외는 없다.\n빡빡한 스케쥴은 오히려 항구적으로 스케쥴표를 운영하는데 어려움을 준다.\n가변성이 담보되어야 한다. 언제 어떤 변수와 업무가 우리에게 떨어질지 모르고,\n그 하나의 변수로 인해서 스케쥴이 엉크러져 버리는 것을 방지하기 위해서 우리는 버퍼를 감안해서\n하루의 TDL를 잡아야 한다. 여유가 있다면 추가 Task를 집어 넣으면 될일이다.\n그런 유연성을 발휘하기 위해서 우선순위가 중요한 것이다.\n버퍼는 본래 계획한 일들의 퀄리티가, 돌발적 변수나 위에서 하달된 명령 때문에 떨어지지 않도록 지켜주는 것이다.\n갑자기 떨어진 다른 일들에 짖눌려 본래 계획한 일이 망가지지 않도록 지켜주는 완충재 역할을 하는 것이다.\n누구나 열심히 일한다, 밀도 높게, 밤 늦게까지. 그러나 하이퍼포머와 하위퍼포머의 차이는 결국 성과를 좌우하는 20%일에 80%의 시간을 할애할 수 있는 배포에서 나온다. 모래같은 일들 때문에 결국 굵직한 자갈같은 일들을 할 시간이 없게된다. 버퍼는 반드시 확보해야 한다.\n스케쥴에 공란을 허하라.\n스케쥴을 작성할 때 우선순위에 둬야 할 업무는, 팀/조직 단위로 함께 해야만 하는 업무다.\n그 시간은 개인의 일정에 맞춰 바꿀 수 있을 가능성이 적기 때문에 가장 먼저 기입하고 그 시간을 피해서 나의 일정을 구성해야 한다.\n그 다음 내가 가장 집중력을 가지고 일할 수 있는 골든타임에 대한 안배다. 올빼미형인 사람도 있고, 사람마다 바이오리듬과 성향은 다르다. 하지만 하루 중 내가 가장 최적을 퍼포먼스를 낼 수 있는 시간을 인지하고 이를 확보해야만 한다.\n사람들이 가장 좋다고 하는 것이 아닌,\n나에게 가장 맞는 것이 가장 좋은 것이다.\n그러므로 백지에서 시작한다.\n스케쥴 - 외출일정은 한데 모아서 동선을 최적화 한다.\n방문지에 따라 점검해야 할 일들을 빠뜨리지 않도록 방문지별 방문목적과 기대하는 결과를 명확히 한다.\n오로지 원노트만 사용하라는 것이 아니다. 당신이 무슨 매체로 노트하고 메모하였든, 그것이 원노트로 수렴되어야만 한다는 것이다. 노트는 제 2의 두뇌이고, 망각이 없는 노트를 나 대신에 학습 시키는 것이다.\nKnow-where, 그리고 당신은 그것이 어디에 있는지만 기억하면 된다. 이것이 노트와의 시냅스\n이동 시에 상대방과 중요한 통화를 하면서 제대로 청취하고 기억하기 힘든 경우가 있다면 녹음하면 그만, 그리고 이것을 원노트로 공유하고 사무실에 들어와 PC에서 확인하면서 노트에 바로 중요 내용을 타이핑한다.\n웹페이지를 통째로 긁어오고 싶은가?\n메일 내용을 바로 아웃룩으로 보내기 가능\n운동 중 이라던지, 샤워중이라던지\n아이디어가 너무 잘 떠오르는 상황임에도 얄굿게도 노트하기 힘든 경우가 있다.\n이 때를 위한 기억법을 소개한다. 인간이 가장 잘 기억하는 것은 시각적 이미지다.\n관념이나 개념 혹은 특정 단어를 시각적 이미지로 변환하여 기억하는 기법이다.\n기억의 궁전\n<a href=\"http://blog.naver.com/zerg1231415?Redirect=Log&logNo=120150794998\">http://blog.naver.com/zerg1231415?Redirect=Log&logNo=120150794998</a>\n<a href=\"http://search.naver.com/search.naver?sm=tab_hty.top&where=nexearch&ie=utf8&query=%EA%B8%B0%EC%96%B5+%EA%B6%81%EC%A0%84\">http://search.naver.com/search.naver?sm=tab_hty.top&where=nexearch&ie=utf8&query=%EA%B8%B0%EC%96%B5+%EA%B6%81%EC%A0%84</a>\n스마트워크\n<a href=\"http://navercast.naver.com/contents.nhn?rid=122&contents_id=41953\">http://navercast.naver.com/contents.nhn?rid=122&contents_id=41953</a>\nhttp://terms.naver.com/entry.nhn?docId=2275472&cid=42251&categoryId=51157http://terms.naver.com/entry.nhn?docId=931715&cid=43667&categoryId=43667</a>\nhttp://terms.naver.com/entry.nhn?docId=931715&cid=43667&categoryId=43667</a>\n스마트 워크에 대한 논의과 개념은, 생산성 향상을 위한 인프라 구축에 초점이 맞춰져 있다.\n회사와 계약한 개인으로써, 1인 기업으로써 개인은 이에 어떻게 대응해야 하는가?\n프로젝트라는 것은 성취목표, 예상결과, 마감기한이 존재하는 것이다.\nTask란 - 실행에 옮길 수 있는 일의 단위/ 소요시간이 배정\nㅇ 자기가 쓰는 자기계발서, 자기계발 노트\n여섯개의 공, 육각 기둥,\n항상 여섯개의 기둥을 심중에 두고 있으므로, 관련 정보나 지식은 피뢰침으로 흘러들어오는 번개처럼\n내 6가지의 노트에 분류되어 축적된다. 그리고 진화한다.\n내가 어떠한 활동을 할때 스트레스가 해소되고,\n내가 어떠한 상태일 때 퍼포먼스를 위한 최상의 상태가 되는지를 지속적으로 기록하고 이 생태를 리스트화해서 점검하라\n맨 상단에 성취목표와 달성 기한을 정해둔다.\n공부할 내용을 노트에 기록해두면, 이동간, 혹은 회사에서 자투리 시간에 폰으로 복습이 가능하다.\n업무와 공부를 분리하지 않아야 한다. 둘은 상보적이어야 한다.\n업무와 유관하고 직업인으로써 혹은 장래의 자신이 그려나갈 커리어에 도움이 되는 쪽이어야 한다.\n이를 테면 기타 배우기라는 것은 자기계발이 아니다. 이건 취미다. 그렇지만, 퇴사 후에 기타 학원을 설립할 것이 목표라면 이는 자기계발이 된다. 모든 것은 목표를 기점으로 갈린다.\nㅇ 독서노트\n좋은 문구는 기록하거나 사진으로 찍어서 독서노트를 만든다.\n\"노트 3권의 비밀\"의 저자 마사키 에이치로는 책을 오려서 스크랩하는 방식을 사용한다.\n이는 개인이 소장하는 책에 해당된다. 우리나라 출판시장은 베스트 셀러 편향이 심하다.\n장르와 ㅇㅇ 의 편향이 심해서 내가 보고싶은 책은 왠만한 도서관이나 회사 서고에 50% 이상의 확률로 존재한다.\n굳이 책을 사볼 필요가 없다는 의미이다. 책을 사는데 투자를 아끼지 않는 것은 좋지만, 1회 이상 읽지 않을 책을 1년에 30권만 구매한다고 하더라도, 몇 달치 난방비에 준하는 금액이다.\n고 김수환 추기경이, 법정 스님의 \"무소유\" 서평에 이렇게 쓰셨다. \"이 책만큼은 소유하고 싶다.\"\n\"캬!\"라는 감탄사로 서평에 대한 감상평을 대신하련다. 허나, 나는 법정스님에게 마음이 기운다, \"책은 읽지 아니하면, 소유하고 있어도 나의 소유가 아닌 독특한 재화다.\" 빌려 읽고, 책을 훼손치 말고 책의 내용을 원노트에 캡쳐하고, 노트에 메모하라.\nㅇ 책쓰기\n내가 3개월만에 초고를 책을 쓸 수 있었던 원동력은 원노트 때문이다. 책으로 엮은 시간은 3개월 이지만, 그 컨텐츠들은 내가 원노트를 처음 사용해온 시점부터 수년간 축적되어온 것이다.\nㅇ 인맥관리 노트\n마인드맵과 엑셀로 정보기록\n명함을 찍어서 업로드 해둔다.\n만난 사람에 대한 정보를 업데이트 해두면 다음번에 보다 원활한 커뮤니케이션이 가능하다.\n관찰노트라고 할 수 있을 정도로 상대방에 대해 호기심을 가지고 메모해둔다.\n나의 평생 멘토링 그룹, 평생 친구그룹 등 인생의 피드백 그룹을 만들어라.\nㅇ 아날로그에스 스마트로\n오랜 세월 노트를 해온 선배들이 흔히 겪는 어려움은, 축적된 노트의 양이 너무 많거나 기억이 가물가물할 정도로 오래된 기록이면, 언제 어떤  노트에 적었는지를 찾기 쉽지 않다. 이것은 아날로그 노트의 너무도 극명한 한계다. 기록은 했으나 그 기록을 활용하지 못하는 안타까운 상황이 발생하는 것이다.\n노트에서 중요한 것중의 하나는\n더 이상 불필요한 정보에 대한 욕심을 버리는 것이다.\n소거, 삭제해나가야 정보 활용의 효율성이 높아진다.\n둘째, 유연성이다. 우리는 예지자가 아니다. 완전체도 아니다.\n변화를 얼마나 수용하고 기존의 나를 발전시켜나갈 수 있는가가 중요하다.\n어제보다 더 나은 내가 되기 위해서는 노트 자체의 지속적인 변화 나아가서는 진화가 필요하다.\n레볼루션 투 에볼루션\nㅇ 선배들의 아날로그 노트를 스마트 노트로 전환하는 방법\n노트가 많고 모든 내용이 여전히 활용되어야 하는 경우, 모든내용을 스캔해서 원노트로 옮기는 것을 고려해볼 수 있다.\n이후에 해야할 작업들은, 시간을 정해서 꾸준히 노트를 스캐닝하면서 불필요해진 내용을 소거하고, 필요한 내용의 하단에는 키워드를 달아서 원노트의 검색기능으로 해당 노트를 찾을 수 있도록 하는 것이다.\n수 많은 메모와 노트 기법을 다룬 책들이 있지만 그 책들이 놓치고 있는 것은\n메모는 입력보다 출력이 중요한 활동, 즉 활용도가 지극히 중요한 활동이다.\n극단적으로 심플하게 입력하고 필요한 즉시 활용될 수 있어야 한다.\n촘촘하게 그어진 선 속에 숨막힐만한 일정을 빼곡히 적어놓거나, 스티커와 형형색색펜으로 정성스레 꾸민 노트와 스케쥴표. 그런 '노트를 위한 노트'는 선배들의 세대, 선배들의 속도에서나 가능한 낭만이었다. 우리 세대의 노트는 달라야 한다. 빨라야 한다.\n우선순위가 없는 To do list는 마음을 재촉하고 혼란을 가중시킬 뿐이다.\n우리 세대 이전의 메모광 선배들은,\nPDF, 디지털카메라, 노트북, 메모장, 다이어리, 대학노트 등으로 중무장 하며 비즈니스맨으로써의 긍지를 느껴왔다.\n우리는? 주머니에서 꺼낸 스마트폰 하나가 그 모든 것을 대신한다. 아직까지 주력은 사무실 책상위의 컴퓨터이지만, 폰과 컴퓨터 양자간의 상호 완벽한 컴비네이션이 있어야 시너지를 발휘한다는 특성이 있다.\n선배들의 매체가 상호 보완적이었다고하면 스마트폰과 컴퓨터는 상호 의존적이라고 보는 것이 옳다.\n기억은 제한적이지만 기록은 반영구적이다. - 지시받거나 교육 받은 내용을 잃지 않으므로, 업무의 누락이 없다.\n잊지않는것이 아니다. 잃지 않는 것이다. 나는 잊어도 노트가 기억하고 내게 알려주는 것이다.\n잊어버리고 나서 다시 되묻게되면, 커뮤니케이션 중복으로 인한 비효율.\n반영구적으로 지식이 축적된다.\n신입사원의 경우 특히, 태도라쓰고 퍼포먼스라 읽는다. 좋은 태도는 곧 좋은 성과로 인정받게 된다.\nCase와 업무에서 배우거나 깨달은 점을 정리해두면 자신의 경험지 아카이브가 확장된다.\n그것이 직업인으로써 나의 그릇이 된다.\n나의 기억이 온전해도 상대방의 기억이 왜곡된 경우, 나의 노트 내용을 바탕으로 오해를 방지할 수 있다.\n쓰는 것이 귀찮으면, 타이핑을, 타이핑도 귀찮으면 녹음이나 녹화를, 그것도 아니라면 사진을 찍을 수 있다.\n이것이 우리 세대의 노트의 기술이다.\n기억하는데 소요되는 노력을 다른 일에 돌리면 아이데이션이나 업무효율이 크게 향상된다.\n생각은 꼬리의 꼬리를 물고 연쇄적으로 이어지는 두뇌활동이다. 그런데 이미 생각한 것을 계속 기억하면서 또 다른 생각하는데는 상당한 부담이 따른다. 이를 위해서 기록을 통해 cash메모리를 비우고, 생각을 지속해나갈 수 있도록 하는 것이다.\n일을 잘 한다는 것은 뭘까?\n지시를 신속하게 이행하는 사람? 평판이 좋은 사람? 신중하게 일을 처리하는 사람? 영업실적이 좋은 사람? 아마 그것은 직급과 자신의 직무에 따라 천차만별일 것이다. 허나 그 이전에 일을 잘 한다는 것, 일의 퀄리티를 따지기 위해서는 Task를 수행해야만 한다. 일을 해야만 그 한 일에대해 평가를 할 수 있지 않겠는가. 주의력이 부족하거나, 깜빡 잊어서 상사의 지시한 업무를 누락하거나, 마감 기한을 넘기는 경우가 빈번한 사람이라면, 일의 퀄리티를 따지는 것은 어불성설이다. \"아 맞다~\", 아 깜박 했네요, 이런 말을 자주 뱉는 사람이라면 필경 일을 잘한다는 평가와는 거리가 멀 것이 자명하다.\n업무상에서 한번 발생한 일은 다시 발생할 확률이 높다. 즉, 한번 처리 프로세스와 개선점을 기록해두면 훗날 반드시 쓰일날이 온다. 그리고 그 때에는 보다 나은 방식으로 그 문제나 업무를 처리 할 수 있다. 당시에는 기록 여부의 차이일지 모르나, 결국 노하우를 축적하고 이를 공유할 수 있는지로 귀결된다.\nㅇ 조직경영\n각 구성원들의 역량과 가정형편등 퍼포먼스에 영향을 미칠 여지가 있는 모든 것을 기록하고 관리한다.\n어짜피 경영은 리소스를 적재 적소에 배분하는 작업이다. 부하의 현재 업무로드와 capacity, 역량을 고려하지 않고\n자신의 오더만을 우겨넣는다면, 부하직원도 불만이 생기고, 그 직원이 해온 일의 퀄리티도 나를 만족시킬 수 없을 것이다.  업무지시는 '던지는'것이 아니라 '설계된' 것이어야 한다. 미리 노트를 통해\n세 가지는 무조건 포함되어야 한다. 일의 목적, 마감기한, 가용할 수 있는 인력이나 리소스. 단, 그 목적을 달성하는 방법만은 실무자의 몫으로 돌려줄 수 있어야 한다. 리더는 \"리스크를 더 가져가는 사람이다.\" 결정하는 사람이다. 리더가 모든 실무를 파악하고 있는다는 것과, 모든 실무에 간섭하는 것은 완전히 다른 문제다. 실무에 대한 세세한 간섭이 시작되면, 당신은 당신이 리더로 존재할 이유를 잃고, 실무자는 성장의 기회를 잃는다.\n부하직원의 업무성향, 성격, 취향에 대해 기록해두어야 한다.\n상사 앞에서 메모하는 습관은, 좋은 에티튜드를 보여주기도 하지만 방패가 되기도 한다.\n부하직원이 세세하게 메모하는 가운데, 리더가 말을 함부로 하거나 지킬 수 없는 약속을 하기는 쉽지 않을 것이기 때문이다. 특히 말이 금새 바뀌는 상사의 경우 즉석에서 메모한 후 내보이며 이렇게 진행해도 될 것인지를 확인 받는 방법이 유효하다.\nㅇ 일년에 한번이라도 쓰여질 것이라면 메모하라.\n\n전사 모든 팀의 팀 구호\n노래방 노래 목록\n건배사\nㅇ 원노트가 제공하는 문장기호와 강조색을 단출키로 자유자재로 활용하자.\n아날로그보다 스마트가 나은점 3가지\n악필같은건 아무래도 좋다. - 보기 편하다. 심지어 즉석에서 폰트를 키워서 볼수도 있다.\n수정과 편집이 자유롭다.\n검색이 가능하다. 키워드만으로 메모를 검색해낼 수 있다.\n기록된 내용을 자유롭게 활용 가능하다. - 우리에게는 마법의 단축키인 Ctrl+C, V가 있다.\n다시 옮겨서 타이핑하지 않고도 바로 해당 내용을 활용한 보고서 작성에 돌입할 수 있다."

    "content": "네트웍에 물어보면 뭐 있지 않을까?\n업무별로 반드시 숙지해야 할 사항, 기본적인 수치등 업무와 관련해서 기억해야 할 모든 것을 기록한다.\n<a href=\"http://150.23.15.39/frms_core/index.asp\" style=\"font-family:Gulim;font-size:9.5pt\">http://150.23.15.39/frms_core/index.asp</a>\n1109445/cups851585\n이벤트 및 고장관리 -> 고장보고서\n신문 스크랩을 하는 사람을 주변에서 본적이 있는가?\n드물다 정말 드물다, 유용하지 않아서가 아니다. 번거롭기 때문이다.\n정보의 수집 및 활용은 최대한 심플하고 편리해야 한다. 가위로 오리고 붙이는 과정은 예전에 불가피한 방식이었기 때문에 취했던 것이다. 이제 우리 세대는 '완전체 메모'가 가능하다.\n각종 신문기사 검색(카인즈, <a href=\"http://www.kinds.or.kr/\" style=\"font-family:굴림;font-size:9pt\">www.kinds.or.kr</a>)"

    "content": "스케쥴이 변경되었을 때에는, 변경이력과 사유를 같이 남겨놓는다.\n노트에 계획을 적고, 그것을 달성하는 것은 스스로에 대한 신뢰를 높인다. 그리고 이러한 작은 성공 경험들이 쌓여 큰 목표를 설정할 수 있는 원동력이 된다. 그것을 달성하기 위한 계획에 다시 노트가 함께한다.\n나를 성장 시킬 수 있는 유일한 시간이다.\n주말에만 할 수 있는 것을 해라.\n널, 행복하게 해라.\n네가 안주하는 오늘의 안정이,\n네 미래의 안정을 좀먹을 것이다.\n주말에는 노트를 최적화하고 삭제할 것을 삭제하는 등.\n일주일간의 메모와 목표 스케쥴을 정리하고 방향을 점검해야…\n회의 시간에는 정서상 노트북을 켜고 타이핑하는 것이 결례이므로,\n종이 노트를 가지고 가서 필기한 후 자리에 복귀하여 원노트에 옮긴다.\n회의 내용이 기억에서 휘발될 우려가 있으므로, 가능한 즉시 옮긴다."

    "content": "뭔가를 기록한다는 관념이 아니다. 노트와 대화하는 것이다.\n끊임없이 쓰고, 또 지우며 그렇게 업데이트해나가는 것이다.\n노트의 업데이트는 나의 진화를 의미한다.\n멘토리스트 1. 어떤 사람이고 2. 어떤점으 동경하고 3. 왜 동경하는가 4. 그와 나의 차별점은\n포기리스트. 확실히 포기해두어야 한다.\n포기한 것의 무게와 가치를 인지하는 것만큼\n기회비용을 정확히 제감할 수 있는 것은 없다.\n이는 집중을 가능하게 할 뿐더러. 집중력도 높아진다.\n모든 인생의 최종 목적지는, 단 하나 있다면 그것은 죽음뿐이다.\n인생에 목표와 꿈이 단 하나 이어야 하는가? 직업?\n화려하게 은퇴한 스포츠 선수는 꿈이 없는가? 제 2의 삶이 있는 것이다.\n인생에 꿈이 하나일 수 없다. 그 나이, 그 시기에 맞는 꿈이 있게 마련이다.\n지금 이뤄야만하고 지금 이루고 싶고, 지금 이룰 수 있는 것을 이뤄야한다.\n6가지 영역에 있어서 평생의 목표와 각 시기별 목표를 세워야 한다.\n유세윤의 말처럼\n되고 싶다는 것은 목표가 아니다. 그것이 되어서 무엇을 하고 싶은지.\n명사가 아니라 동사가 되어야 한다.\n노트는 대화다\n중요한 것은 기본적인 질문에 대한 답을 얻는것이다.\n나는 왜 살아가는가?\n무엇을 원하며 무엇을 이룰것인가?\n내가 소중히 여기는 것은?\n어떤 모습으로 어느 때 죽음을 맞길 원하는가?\n<a href=\"http://ppss.kr/archives/37779\">http://ppss.kr/archives/37779</a>\n순간적으로 정보를 취사선택하고 가공하여 요점을 적는다. 중요한건 활용성. 어디에 메모했는지가 중요"

    "type": "text",
    "x": 48,
    "y": 14819,
    "w": 600,
    "content": "보라, 우리는 이미지로 메모하고\n이모티콘으로 백마디 말을 대신 할 수 있는 세대다.\n성공했다면 왜 성공했는지를 알아야한다.\n성공이 자신감 그리고 자만으로 변하면,\n지난번 성공을 열어준 것과 같은 열쇠로\n전혀 다른 문을 열려는 시도 끝에 실패할 가능성이 높다.\n간단하다. 다른문에는 다른 열쇠가 필요하다.\n성공방식의 일반화는 지나친 자신감에서 나오게 마련이다. 중요한건 성공한 원리를 이해하는 것이다.\n테슬라의 쎄오도 원리를 중요시한다.\n내가 내 하루의 원칙을 세우지 않으면\n반드시 남과 무리와 비슷해져간다\n세사람만 허공을 바라봐도\n부화뇌동. 실패의 동기화\n심지어 그것이 현명하지 못한 선택일지라도\n다수에 휩쓸려가는 자신의 모습에 안도하는 것이 인간이다\n목표하지 않은 기적은 없다.\n바란적 없는데 어떻게 감동이 되나\n구체적으로 목표하고 원해야\n충족감도 크다\n원노트나 에버노트와 같은 App노트로 인해,\n메모와 노트의 활용율 자체가 극대화 되었다.\n바로 서버 저장(동기화)와 검색이 기존 아날로그 메모와 원천적으로 다른점이다.\n스마트폰 메모의 장점은, 술자리든 어느 자리든\n대화 상대방에게 큰 위화감을 주지 않고 (사람들은 자신의 말을 받아적으면 경직되게 마련이니까)\n주요 내용을 메모하거나 녹음할 수 있다는 것이다.\n메모를 다시 읽는 순간, 계단 하나를 딛고 올라서듯 성장하는 것이다.\n\"숙련은 힘보다 더 강하다.\"\n외부의 저장장치(=메모)가 필요하다. 메모하는 것 자체로 머리에 한번 더 상기하는 효과가 있음은 물론이다. 단, 메모 내용 자체보다는 메모의 분류와 카테고리만 기억하는 것으로도 충분하다.\n환경을 만드는 것, 원리(Principle)에 따라 습관을 구축하는 것이 중요하다.\n사람들은 매일 아침 일찍 일어나지 못하는 자신의 의지를 탓한다.\n그런 이들에게 묻는다. 몇 시에 잠에 드냐고.\n당연한 이치다. 일찍 일어나고 싶으면 일찍 잠에 들어야 한다.\n일찍 일어날 수 있는 상태와 환경을 조성해야 한다.\n셀프 디렉션\n여러 개의 기록매체나 수첩을 여러 개 사용하게 되면, 다른 수첩에 기록한 내용을 즉각적으로 확인할 수 없고, 어디에 기록했는지 깜박해서 허둥지둥 대는 경우도 많다.\n프로 메모의 요건,\nㅇ 핵심 내용/ 마감 기한/ 정확한 분류\n원노트를 통한 메모는 거의 무한대로 변형 및 확장이 가능하기에, 아무런 부담없이 의식의 흐름을 담아 놓기에 제격이다.\n이 6개의 축은 호기심과 관심의 촉수, 돌기, 안테나, 피뢰침과 같은 역할을 한다.\n관련된 정보가 있으면 의식/무의식적으로 흡수하고 이를 다시 노트에 업데이트 하며\n목표와 꿈에 한발짝 더 다가설 수 있게되는 것이다. VIVIDREAM에서 NOTEDREAM\n그림메모, 사진메모\n사진의 경우에는 최단시간에 캡쳐해낼 수 있어 가장 활용도가 높다. 어쩌면 스마트폰 시대의 노트법과 그 이전 시대의 노트법을 대별하는 가장 매력적인 도구가 아닐까 한다.\n기록은 기록 그 자체만으로는 유물 이상의 의미가 없다.\n언제든 다시 활용할 수 있도록 분류되고 체계적으로 보관하는 시스템이 수반되어야만 한다.\n즉시 메모한다.\n모든 기록은 즉시 디지털화\n가족, 직장, 자기계발로 구분해 기록한다.\n상황별 체크리스트를 만들고 지속적으로 업데이트. 해외출장 등\n원노트는 업무지시에도 활용 가능, 아웃룩을 열어두지 않고 원노트에 짬짬히 메모하다가 이를 바로 아웃룩으로 전송.\n캘린더, 포켓수첩, 다이어리 등 복수의 매체에 복수의 기록을 남긴느 것,\n예전에는 필요했다. 물리적인 실체가 있는 것들이기에 분실이나 손실될 위험이 있었으니 말이다.\n하지만 원노트, 에버노트는 이에서 자유롭다. 분실의 위험이 없고, 한 곳에쓰면 다른곳에 동시에 씌여지는(동기화) 기적을 경험할 지어다. 동시대의 모든 메모광을 모든 비효율에서 해방하고자 한다.\n메모와 데이터, 그 파편화된 조각조각의 기록은 하나의 Data에 지나지 않을지 모르나, 그것이 서로 결합되고 융합되어 지식이되고 지혜가 된다.\n…..카메라, 수첩을 별도로 들고다니지 않아도…\n원노트는 그 자체로 좋은 스크랩북이 된다. 강력한 캡쳐기능 + 이미지 글 복사\n내가 소설가라면 원노트를 쓰지 않을 이유가 없다. 취재한 내용을 적고, 녹음하고, 스케치하고 원하는 것은 바로 사진으로 찍어 그 자체로 시계열적 기록과 스토리가 된다.\n지식과 정보의 양은 기하급수적으로 팽창해가고 있지만, 인간의 기억용량은 그에 따라가지 못하고 있다. 오히려 점점 더 많은 정보를 기억해야 하는가? 메모는 하이퍼링크다. 어디에 그 정보와 지식이 있는지 색인역할을 할 수 있다면 그 모든 것을 기억하지 않고도 활용할 수 있다. 현 시대의 정보관리란 곧 정보가 어디에 있는지를 관리하는 것을 의미하며, 이는 메모/노트관리와 일맥상통한다. 메모는 방대한 정보의 인덱스다.\n웹 친화적- 하이퍼링크 활용 가능 : 이전 시대의 노트와 본질적으로 다른점이다. 외부의 정보와 즉각적으로 '링크'된다는 것. 인터넷이라는 방대한 지의 접점과 연결되어 있다는 것.\n포스트잇은 물리적인 팝업과 같은 역할을 한다. 어플리케이션의 빨간 동그라미 알림과 같은 기능.\n아날로그 노트를 활용할 때는 회의시간 뿐이다. 정서상 회의시간에 폰을 만지작거리는 것이 어렵고….\n모든 메모와 노트의 서두에는 메모와 일의 목적, 배경, 시간을 기록한다. 반드시.\n그것이 회의록이든, 독서노트는 분명한 목표의식. 깃발을 꽂아놓고 시작하는 것이다.\n목적을 상기하지 않은 채, 일을 시작한느 것은 그린의 방향도 보지 않은채 드라이버샷을 치는 것과 같다.\n노트 자체의 가장 큰 목적은, 평생학습과 끊임없는 가이젠이다. 해서, 노트의 진화는 곧 나의 진화를 의미한다.\n메모는 그 자체로 목적이자, 수단이다. 코치이고 컨설턴트이자 집사다.\n형식과 매체에 구애받지 않고 일단 메모한다. 그리고 그것을 정리하는 과정에서 더 풍성하게 다듬는다.\n원노트를 사용하면 PC, 스마트폰, 태블릿 등을 통해 일살 속 크고 작은 일들을 손쉽게 기록할 수 있다. 기록할 수 있는 타입도 텍스트, 오디오, 비디오, 이미지, 손글씨, 링크 등 거의 제한이 없다. 또한 실시간으로  웹 서버와 동기화 백업 되기 때문에 다양한 컴퓨팅 환경에서 자료를 수집하고 활용할 수 있다는 것이 원노트의 강력한 점이다. 스마트폰의 보급과 원노트같은 App의 발달로 메모/노트 정보 수집과 컨텐츠 작성에 있어 이전 시대와는 차원을 달리 할 수 있게된 것이다.\n기존 메모/노트의 모든 기능을 포괄함은 물론 그 이상의 기능, 오디오, 비디오, 사진 캡쳐까지 지원하고 있으니 이 얼마나 매력적인가. 심지어는 파일 자체를 노트에 붙여놓을 수 있다. 아날로그 노트 사용자들은 상상이나 해 보았겠는가 말이다.\n현대에 들어 많은 메모광들은 종이에 메모한 내용을 다시 디지털화 하는 작업을 해왔다. 이는 종이 메모 자체는 분실과 손실의 염려가 있고, 이 곳저곳, 여러 노트나 메모에 파편화된 메모나 노트들은 그 활용성이 떨어진다는 것을 경험적으로 알게되었기 때문이다. 하지만 이제 그러지 않아도 된다. 메모 자체를 모바일 컴퓨팅 환경에서 가능하니까 말이다.\n원노트의 기능적 장점 이외에 사용상의 장점은, 원노트를 이용한 메모들은 그 활용성이 극대화 된다는 것이다. 잊기 위해 기억하는 것일진대 그 기억의 기록을 활용하지 못한다면, 결국 망각 밖에는 남지 않게 되는 것이다. 그러나 원노트는 강력한 검색기능과 카테고라이징 기능으로 그 메모의 활용성을 극대화 해준다. 손쉽게 내가 저장한 정보들에 접근할 수 있으니까.\n아날로그 수첩이나 바인더는 용지를 매달 바꾸거나, 오래된 기록을 찾는데 너무 많은 시간이 소요되며, 이러한 불편을 해소하기 위해 인덱스 페이지를 따로 만든다해도 그 자체에 너무 많은 시간이 소요된다. 분실 위험 등 즉, '관리가 어렵다.'는 단점이 있다.\n우리가 흔히 아이디어가 떠오르는 '창발'의 순간은, 화장실, 지하철, 걷고 있을 때, 누군가와의 대화 할 때 등 때와 장소를 가리지 않는다. 그러한 생각들을 '캡쳐' 해낼 수 있으려면 메모의 즉시성이 그 무엇보다 중요하다 하겠다. 원노트는 이를 완벽하게 백업할 수 있다. 텍스트도 녹록치 않으면 녹음하면 되고, 아니면 사진으로 찍으면 그만이다.\n정보의 통합관리 - 한 곳 모여야 그 활용성이 극대화 된다.\n여러권의 수첩이나 노트, 포스트잇 등을 사용하다보면 나중에 메모한 내용을 찾으려고 할 때 많은 시간과 노력이 소요된다. 스마트 노트를 활용하면, 쉽게 검색할 수 있을 뿐더러 유관 메모까지도 함께 찾을 수 있다. 게다가 검색 이전에, 내가 메모를 어느 곳에 했는지 쉽게 기억할 수 있다.\n원노트의 특징\n유료??\n노트를 펼치면 어느 곳에나 바로 쓸 수 있어야 한다.\n그런데 에버노트는? 프랭클린 플래너는?\n메모의 기술\n<a href=\"http://navercast.naver.com/magazine_contents.nhn?rid=1094&contents_id=37208\">http://navercast.naver.com/magazine_contents.nhn?rid=1094&contents_id=37208</a>\n습관은 삶의 생활의 구조를 뜻한다.\n구조가 아닌 일시적으로 버뀐\n다시 돌아간다\n<a href=\"http://www.itworld.co.kr/news/91980\">http://www.itworld.co.kr/news/91980</a>\n<a href=\"http://www.ttimes.co.kr/index.html?no=2015042015277769857\">http://www.ttimes.co.kr/index.html?no=2015042015277769857</a>\nhttp://social.lge.co.kr/view/the_bloger/lifehack/</a>\n<a href=\"http://m.news.naver.com/read.nhn?mode=LSD&sid1=001&oid=008&aid=0003464663\">http://m.news.naver.com/read.nhn?mode=LSD&sid1=001&oid=008&aid=0003464663</a>"

    "content": "어짜피 한생 게임일 뿐이다.\n너무 감정이입하지 말자.\n그러나,\n어떤 게임은 꼭 이겨야 한다.\n왜냐하면 그 게임을 이겨야만,\n다음 게임을 계속 할 수 있기 때문이다."

const CONTENT_HASH = '0a4f6151';

let cards = [];
let moving = null, resizing = null;
let selectedIdx = null, clipboardCard = null;
const GRID = 20, GAP = 14;
function snap(v) { return Math.round(v / GRID) * GRID; }

// ── Undo (Ctrl+Z) ────────────────────────────────────────────────────────────
const MAX_HISTORY = 50;
let history = [];
function snapshot() {
  syncText();
  history.push(JSON.stringify(cards));
  if (history.length > MAX_HISTORY) history.shift();
}
function undo() {
  if (!history.length) { showStatus('되돌릴 내용 없음'); return; }
  syncText();
  cards = JSON.parse(history.pop());
  renderCards();
  saveBoard();
  showStatus('↩ 되돌림');
}
function showStatus(msg) {
  const s = document.getElementById('status');
  s.textContent = msg;
  clearTimeout(showStatus._t);
  showStatus._t = setTimeout(() => { s.textContent = ''; }, 2000);
}
document.addEventListener('keydown', e => {
  const isText = document.activeElement?.contentEditable === 'true';
  if ((e.ctrlKey || e.metaKey) && e.key === 'z' && !e.shiftKey) {
    if (isText) return;
    e.preventDefault();
    undo();
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'c' && !e.shiftKey && !isText) {
    if (selectedIdx !== null && cards[selectedIdx]) {
      syncText();
      clipboardCard = JSON.parse(JSON.stringify(cards[selectedIdx]));
      showStatus('카드 복사됨');
      e.preventDefault();
    }
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'v' && !e.shiftKey && !isText) {
    if (clipboardCard) {
      e.preventDefault();
      snapshot();
      const nc = JSON.parse(JSON.stringify(clipboardCard));
      nc.x = (nc.x || 0) + 30; nc.y = (nc.y || 0) + 30;
      cards.push(nc);
      selectedIdx = cards.length - 1;
      renderCards(); saveBoard();
      showStatus('카드 붙여넣음');
    }
  }
  if (e.key === 'Escape') {
    document.querySelectorAll('.card.selected').forEach(c => c.classList.remove('selected'));
    selectedIdx = null;
  }
});

function pushCards(movedIdx) {
  const moved = cards[movedIdx];
  const movedEl = document.querySelector(`.card[data-idx="${movedIdx}"]`);
  if (!movedEl) return;
  const mh = movedEl.offsetHeight;
  document.querySelectorAll('.card').forEach(el => {
    const i = +el.dataset.idx;
    if (i === movedIdx) return;
    const c = cards[i], oh = el.offsetHeight;
    if (moved.x < (c.x+(c.w||200)) && (moved.x+(moved.w||200)) > c.x && moved.y < (c.y+oh) && (moved.y+mh) > c.y) {
      c.y = moved.y + mh + GAP;
      el.style.top = c.y + 'px';
    }
  });
}

function loadBoard() {
  const saved = localStorage.getItem(SAVE_KEY);
  const savedHash = localStorage.getItem(SAVE_KEY + ':hash');
  let parsed = null;
  try { parsed = saved ? JSON.parse(saved) : null; } catch(e) {}
  // reset if: no save, empty array, or content hash changed (page regenerated)
  if (!parsed || parsed.length === 0 || savedHash !== CONTENT_HASH) {
    cards = DEFAULT_CARDS.map(c => ({...c}));
    localStorage.removeItem(SAVE_KEY);
    localStorage.setItem(SAVE_KEY + ':hash', CONTENT_HASH);
    renderCards();
    const hasCoords = cards.some(c => c.x !== undefined && c.y !== undefined);
    if (!hasCoords) autoLayout();
    return;
  }
  cards = parsed;
  renderCards();
}
function resetToDefaults() { if (!confirm('저장된 보드를 지우고 원본으로 초기화합니다. 계속할까요?')) return; localStorage.removeItem(SAVE_KEY); cards = DEFAULT_CARDS.map(c => ({...c})); renderCards(); autoLayout(); }

function autoLayout() {
  const boardW = document.getElementById('board').offsetWidth;
  const cols = Math.max(1, Math.floor(boardW / 280));
  const colW = (boardW - GAP*(cols-1)) / cols;
  const colH = new Array(cols).fill(0);
  const allCards = document.querySelectorAll('.card');
  const images = document.querySelectorAll('.card img');
  let loaded = 0;
  function place() {
    allCards.forEach((el, i) => {
      const w = Math.min(cards[i].w || colW, colW);
      let minCol = 0;
      for (let c = 1; c < cols; c++) if (colH[c] < colH[minCol]) minCol = c;
      cards[i].x = minCol * (colW + GAP);
      cards[i].y = colH[minCol];
      cards[i].w = w;
      el.style.left = cards[i].x + 'px';
      el.style.top = cards[i].y + 'px';
      el.style.width = w + 'px';
      colH[minCol] = cards[i].y + el.offsetHeight + GAP;
    });
    document.getElementById('board').style.minHeight = (Math.max(...colH) + 100) + 'px';
    saveBoard();
  }
  if (!images.length) { requestAnimationFrame(place); return; }
  images.forEach(img => {
    if (img.complete) { loaded++; if (loaded >= images.length) requestAnimationFrame(place); }
    else { img.onload = img.onerror = () => { loaded++; if (loaded >= images.length) requestAnimationFrame(place); }; }
  });
}

function syncText() {
  document.querySelectorAll('.card').forEach(el => {
    const i = +el.dataset.idx;
    if (cards[i]?.type === 'text') { const t = el.querySelector('.text'); if (t) cards[i].content = t.innerHTML; }
  });
}
function saveBoard() { syncText(); localStorage.setItem(SAVE_KEY, JSON.stringify(cards)); localStorage.setItem(SAVE_KEY + ':hash', CONTENT_HASH); showStatus('저장됨 ' + new Date().toLocaleTimeString()); }

function renderCards() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  cards.forEach((card, i) => {
    const el = document.createElement('div');
    el.className = 'card'; el.dataset.idx = i;
    if (card.x !== undefined) el.style.left = card.x + 'px';
    if (card.y !== undefined) el.style.top = card.y + 'px';
    // html cards contain raw OneNote table HTML which may overflow the stated div width
    if (card.w) { if (card.type === 'html') el.style.minWidth = card.w + 'px'; else el.style.width = card.w + 'px'; }
    el.addEventListener('mousedown', e => {
      if (e.target.closest('.text, a, .card-btn, .resize-handle, td, th')) return;
      e.preventDefault();
      // Update selection
      document.querySelectorAll('.card.selected').forEach(c => c.classList.remove('selected'));
      selectedIdx = i; el.classList.add('selected');
      snapshot();
      moving = { idx: i, startX: e.clientX, startY: e.clientY, origX: card.x||0, origY: card.y||0 };
      el.classList.add('moving');
    });
    const actions = document.createElement('div'); actions.className = 'card-actions';
    const delBtn = document.createElement('button'); delBtn.className = 'card-btn'; delBtn.textContent = '×';
    delBtn.onclick = e => { e.stopPropagation(); if(confirm('삭제?')) { snapshot(); cards.splice(i,1); renderCards(); saveBoard(); } };
    actions.appendChild(delBtn); el.appendChild(actions);
    if (card.type === 'text') {
      const text = document.createElement('div'); text.className = 'text'; text.contentEditable = true;
      text.innerHTML = card.content || '';
      text.addEventListener('focus', () => { snapshot(); });
      text.addEventListener('blur', () => { card.content = text.innerHTML; saveBoard(); });
      el.appendChild(text);
    } else if (card.type === 'image') {
      const img = document.createElement('img');
      img.src = card.src.startsWith('http') || card.src.startsWith('data:') ? card.src : IMG_BASE + card.src;
      img.alt = ''; img.loading = 'lazy'; img.onerror = () => img.style.display = 'none';
      if (card.w) img.style.width = card.w + 'px';
      if (card.h) img.style.height = card.h + 'px';
      if (card.link) { const a = document.createElement('a'); a.href = card.link; a.target = '_blank'; a.appendChild(img); el.appendChild(a); }
      else { el.appendChild(img); }
      if (card.caption) { const cap = document.createElement('div'); cap.style.cssText = 'font-size:11px;color:#8b949e;margin-top:4px;word-break:break-word;padding:0 2px;'; cap.textContent = card.caption; el.appendChild(cap); }
    } else if (card.type === 'html') {
      const wrapper = document.createElement('div');
      wrapper.style.cssText = 'overflow:auto;font-size:13px;line-height:1.5;';
      wrapper.innerHTML = card.html.replace(/__ATTACHMENT__/g, IMG_BASE);
      wrapper.querySelectorAll('img').forEach(img => { img.style.maxWidth = '100%'; img.style.height = 'auto'; img.draggable = false; });
      wrapper.querySelectorAll('a').forEach(a => { a.target = '_blank'; a.style.color = '#6cb0f6'; });
      wrapper.querySelectorAll('table').forEach(t => { t.style.borderCollapse = 'collapse'; });
      wrapper.querySelectorAll('td,th').forEach(td => {
        td.style.border = '1px solid #444'; td.style.padding = '4px 6px'; td.style.verticalAlign = 'top';
        td.title = '더블클릭으로 편집';
        td.addEventListener('dblclick', function(e) {
          e.stopPropagation();
          snapshot();
          this.contentEditable = 'true';
          this.style.outline = '2px solid #388bfd';
          this.style.background = 'rgba(56,139,253,0.08)';
          this.focus();
        });
        td.addEventListener('blur', function() {
          this.contentEditable = 'false';
          this.style.outline = '';
          this.style.background = '';
          cards[i].html = wrapper.innerHTML.split(IMG_BASE).join('__ATTACHMENT__');
          saveBoard();
        });
      });
      el.appendChild(wrapper);
    } else if (card.type === 'table') {
      const rows = card.rows || [['','',''],['','',''],['','','']];
      const tbl = document.createElement('table');
      tbl.style.cssText = 'border-collapse:collapse;width:100%;font-size:13px;';
      rows.forEach((row, ri) => {
        const tr = tbl.insertRow();
        row.forEach((cell, ci) => {
          const td = document.createElement(ri === 0 ? 'th' : 'td');
          td.contentEditable = true;
          td.style.cssText = 'border:1px solid #30363d;padding:4px 8px;min-width:60px;text-align:left;' + (ri===0 ? 'background:#21262d;font-weight:600;' : '');
          td.textContent = cell;
          td.addEventListener('blur', () => { if (!cards[i].rows) cards[i].rows = rows; rows[ri][ci] = td.textContent; saveBoard(); });
          tr.appendChild(td);
        });
      });
      el.appendChild(tbl);
      const addRow = document.createElement('button');
      addRow.textContent = '+ 행'; addRow.style.cssText = 'margin-top:4px;font-size:11px;background:#21262d;border:1px solid #30363d;color:#8b949e;padding:2px 8px;border-radius:4px;cursor:pointer;';
      addRow.onclick = e => { e.stopPropagation(); snapshot(); if (!cards[i].rows) cards[i].rows = rows; cards[i].rows.push(new Array(cards[i].rows[0].length).fill('')); renderCards(); saveBoard(); };
      const addCol = document.createElement('button');
      addCol.textContent = '+ 열'; addCol.style.cssText = 'margin-top:4px;margin-left:4px;font-size:11px;background:#21262d;border:1px solid #30363d;color:#8b949e;padding:2px 8px;border-radius:4px;cursor:pointer;';
      addCol.onclick = e => { e.stopPropagation(); snapshot(); if (!cards[i].rows) cards[i].rows = rows; cards[i].rows.forEach(r => r.push('')); renderCards(); saveBoard(); };
      el.appendChild(addRow); el.appendChild(addCol);
    }
    const rh = document.createElement('div'); rh.className = 'resize-handle';
    rh.addEventListener('mousedown', e => { e.preventDefault(); e.stopPropagation(); snapshot(); resizing = { idx: i, startX: e.clientX, startW: card.w || el.offsetWidth }; });
    el.appendChild(rh);
    if (i === selectedIdx) el.classList.add('selected');
    board.appendChild(el);
  });
  requestAnimationFrame(() => {
    let maxB = 0;
    document.querySelectorAll('.card').forEach(el => { const b = (parseFloat(el.style.top)||0) + el.offsetHeight; if (b > maxB) maxB = b; });
    board.style.minHeight = (maxB + 100) + 'px';
  });
}

document.addEventListener('mousemove', e => {
  if (moving) {
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`); if (!el) return;
    let nx = moving.origX + e.clientX - moving.startX, ny = moving.origY + e.clientY - moving.startY;
    if (e.shiftKey) { nx = snap(nx); ny = snap(ny); el.style.outline = '1px dashed rgba(240,192,64,0.3)'; } else { el.style.outline = ''; }
    el.style.left = nx + 'px'; el.style.top = ny + 'px';
  }
  if (resizing) {
    let nw = resizing.startW + e.clientX - resizing.startX; if (e.shiftKey) nw = snap(nw);
    cards[resizing.idx].w = Math.max(100, nw);
    const el = document.querySelector(`.card[data-idx="${resizing.idx}"]`); if (el) el.style.width = cards[resizing.idx].w + 'px';
  }
});

document.addEventListener('mouseup', e => {
  if (moving) {
    let nx = moving.origX + e.clientX - moving.startX, ny = moving.origY + e.clientY - moving.startY;
    if (e.shiftKey) { nx = snap(nx); ny = snap(ny); }
    cards[moving.idx].x = Math.max(0, nx); cards[moving.idx].y = Math.max(0, ny);
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`); if (el) { el.classList.remove('moving'); el.style.outline = ''; }
    if (e.shiftKey) pushCards(moving.idx);
    moving = null; saveBoard();
  }
  if (resizing) { if (e.shiftKey) pushCards(resizing.idx); resizing = null; saveBoard(); }
});

function addTextCard() { snapshot(); cards.push({ type: 'text', content: '', x: 50, y: window.scrollY+100, w: 300 }); renderCards(); setTimeout(() => { const els = document.querySelectorAll('.card .text'); els[els.length-1]?.focus(); }, 100); }
function addImageCard() { const input = document.createElement('input'); input.type = 'file'; input.accept = 'image/*'; input.onchange = e => { const f = e.target.files[0]; if (!f) return; const r = new FileReader(); r.onload = () => { snapshot(); cards.push({ type: 'image', src: r.result, x: 50, y: window.scrollY+100, w: 240 }); renderCards(); saveBoard(); }; r.readAsDataURL(f); }; input.click(); }
function addImageUrl() { const url = prompt('이미지 URL'); if (!url) return; snapshot(); cards.push({ type: 'image', src: url, x: 50, y: window.scrollY+100, w: 240 }); renderCards(); saveBoard(); }
function addTableCard() {
  const colsStr = prompt('열 수 (기본 3)', '3'); const cols = Math.max(1, parseInt(colsStr)||3);
  const rowsStr = prompt('행 수 (헤더 포함, 기본 4)', '4'); const rows = Math.max(1, parseInt(rowsStr)||4);
  snapshot();
  cards.push({ type: 'table', rows: Array.from({length: rows}, (_, ri) => Array.from({length: cols}, (_, ci) => ri===0 ? `열${ci+1}` : '')), x: 50, y: window.scrollY+100, w: Math.max(240, cols*100) });
  renderCards(); saveBoard();
}
function exportBoard() { syncText(); const blob = new Blob([JSON.stringify(cards, null, 2)], { type: 'application/json' }); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = SAVE_KEY + '.json'; a.click(); }
// ── Zoom ─────────────────────────────────────────────────────────────────────
let zoom = parseFloat(localStorage.getItem('zoom-' + SAVE_KEY) || '1.0');
function applyZoom() {
  const board = document.getElementById('board');
  board.style.transform = `scale(${zoom})`;
  board.style.transformOrigin = '0 0';
  document.getElementById('zoom-level').textContent = Math.round(zoom * 100) + '%';
  localStorage.setItem('zoom-' + SAVE_KEY, zoom);
}
function zoomIn()  { zoom = Math.min(3.0, parseFloat((zoom + 0.1).toFixed(2))); applyZoom(); }
function zoomOut() { zoom = Math.max(0.2, parseFloat((zoom - 0.1).toFixed(2))); applyZoom(); }
document.addEventListener('keydown', e => {
  if (e.ctrlKey || e.metaKey) {
    if (e.key === '=' || e.key === '+') { e.preventDefault(); zoomIn(); }
    if (e.key === '-')                  { e.preventDefault(); zoomOut(); }
    if (e.key === '0')                  { e.preventDefault(); zoom = 1.0; applyZoom(); }
  }
});
document.getElementById('board').addEventListener('wheel', e => {
  if (!(e.ctrlKey || e.metaKey)) return;
  e.preventDefault();
  e.deltaY < 0 ? zoomIn() : zoomOut();
}, { passive: false });
applyZoom();
function resetLayout() { if (!confirm('자동 재배치합니다.')) return; cards.forEach(c => { delete c.x; delete c.y; }); renderCards(); autoLayout(); }
// ── Floating format toolbar ───────────────────────────────────────────────────
const fmtBar = document.getElementById('format-toolbar');
function fmt(cmd) { document.execCommand(cmd, false, null); saveBoard(); }
function fmtLink() {
  const sel = window.getSelection();
  if (!sel || sel.isCollapsed) return;
  const url = prompt('링크 URL 입력', 'https://');
  if (!url) return;
  document.execCommand('createLink', false, url);
  // make links open in new tab
  sel.anchorNode?.parentElement?.closest('a')?.setAttribute('target', '_blank');
  document.querySelectorAll('.text a').forEach(a => a.target = '_blank');
  saveBoard();
}

// prevent format buttons from blurring contenteditable
fmtBar.addEventListener('mousedown', e => e.preventDefault());

document.addEventListener('selectionchange', () => {
  const sel = window.getSelection();
  if (!sel || sel.isCollapsed || !sel.toString().trim()) { fmtBar.style.display = 'none'; return; }
  // only show if selection is inside a .text element
  const anchor = sel.anchorNode;
  if (!anchor) { fmtBar.style.display = 'none'; return; }
  const textEl = anchor.nodeType === 1 ? anchor.closest('.text') : anchor.parentElement?.closest('.text');
  if (!textEl) { fmtBar.style.display = 'none'; return; }
  // position above selection
  const range = sel.getRangeAt(0);
  const rect = range.getBoundingClientRect();
  fmtBar.style.display = 'flex';
  const tbW = fmtBar.offsetWidth || 180;
  let left = rect.left + rect.width / 2 - tbW / 2;
  left = Math.max(8, Math.min(left, window.innerWidth - tbW - 8));
  fmtBar.style.left = left + 'px';
  fmtBar.style.top = (rect.top - 44 + window.scrollY) + 'px';
});

setInterval(saveBoard, 30000);
loadBoard();
</script>
