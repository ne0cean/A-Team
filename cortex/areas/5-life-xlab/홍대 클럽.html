.card.selected { box-shadow: 0 0 0 2px #58a6ff; z-index: 5; }
.highlight-red { color: #ff6b6b; }
.highlight-blue { color: #6cb0f6; }
.highlight-gold { color: #f0c040; }

.toolbar button { background: #21262d; border: 1px solid #30363d; color: #e0e0e0; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; }
.toolbar button:hover { background: #30363d; }
.toolbar .status { color: #8b949e; font-size: 12px; margin-left: auto; }
#format-toolbar { position: fixed; display: none; background: #1c2128; border: 1px solid #444c56; border-radius: 8px; padding: 4px 6px; gap: 2px; align-items: center; z-index: 500; box-shadow: 0 4px 16px rgba(0,0,0,0.5); }

<img width=\"25\" height=\"25\" src=\"https://graph.microsoft.com/v1.0/users('realpage@naver.com')/onenote/resources/0-35047012cfd94e6388367c73ca099a3c!1-733661839CC53BA5!7918/$value\" data-src-type=\"image/png\" data-fullres-src=\"https://graph.microsoft.com/v1.0/users('realpage@naver.com')/onenote/resources/0-35047012cfd94e6388367c73ca099a3c!1-733661839CC53BA5!7918/$value\" data-fullres-src-type=\"image/png\" /></a></li>\r\n\t\t\t\t<br />\r\n\t\t\t\t<li><a href=\"https://story.kakao.com/ch/wikitree\"><img width=\"25\" height=\"25\" src=\"https://graph.microsoft.com/v1.0/users('realpage@naver.com')/onenote/resources/0-5d149c0a3b47470cb04c4b656d6208dc!1-733661839CC53BA5!7918/$value\" data-src-type=\"image/png\" data-fullres-src=\"https://graph.microsoft.com/v1.0/users('realpage@naver.com')/onenote/resources/0-5d149c0a3b47470cb04c4b656d6208dc!1-733661839CC53BA5!7918/$value\" data-fullres-src-type=\"image/png\" /></a></li>\r\n\t\t\t\t<br />\r\n\t\t\t\t<li><a href=\"http://www.band.us/plugin/share?body=20%EC%82%B4%20%EC%83%88%EB%82%B4%EA%B8%B0%EB%A5%BC%20%EC%9C%84%ED%95%9C%20%27%ED%99%8D%EB%8C%80%20%ED%81%B4%EB%9F%BD%27%20%EB%B6%84%EC%84%9D%0Ahttp%3A%2F%2Fwww.wikitree.co.kr%2Fmain%2Fnews_view.php%3Fid%3D250042%0A%EA%B0%80%EC%8A%B4%20%EB%9C%A8%EA%B1%B0%EC%9A%B4%20%EB%89%B4%EC%8A%A4%20%EC%8A%A4%ED%86%A0%EB%A6%AC%20%27%EC%9C%84%ED%82%A4%ED%8A%B8%EB%A6%AC%27&amp;route=wikitree.co.kr\"><img width=\"25\" height=\"25\" src=\"https://graph.microsoft.com/v1.0/users('realpage@naver.com')/onenote/resources/0-ef533e34b52644c6b1aaef08d69eab4a!1-733661839CC53BA5!7918/$value\" data-src-type=\"image/png\" data-fullres-src=\"https://graph.microsoft.com/v1.0/users('realpage@naver.com')/onenote/resources/0-ef533e34b52644c6b1aaef08d69eab4a!1-733661839CC53BA5!7918/$value\" data-fullres-src-type=\"image/png\" /></a></li>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0.8pt;margin-bottom:0pt\"><span style=\"font-family:맑은 고딕;font-size:7.5pt;color:#333333;background-color:#f7f7f7;font-weight:bold\">첫마디</span></p>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:1.5pt;margin-bottom:0pt\"><a href=\"http://www.wikitree.co.kr/main/ann_ring.php?id=250042&amp;alid=298586\" style=\"font-family:맑은 고딕;font-size:9pt\">20살 뉴비들을 위한 &#39;홍대 클럽&#39; 분석</a></p>\r\n\t\t\t\t<img src=\"https://graph.microsoft.com/v1.0/users('realpage@naver.com')/onenote/resources/0-acb97fe142f94f43a720bb0cb9792aa7!1-733661839CC53BA5!7918/$value\" data-src-type=\"image/jpeg\" data-fullres-src=\"https://graph.microsoft.com/v1.0/users('realpage@naver.com')/onenote/resources/0-acb97fe142f94f43a720bb0cb9792aa7!1-733661839CC53BA5!7918/$value\" data-fullres-src-type=\"image/jpeg\" />\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\">클럽 M2 / 홍대문화관광협회 제공</span></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\">20살 새내기에게 ‘클럽’은 새로운 문화를 접할 수 있는 신기루 같은 곳이다.</span></p>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\">&#160;</span></p>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\">그중에서도 서울 마포구 2호선 홍대입구역을 중심으로 운영되고 있는 홍대 클럽은 20대 젊음을 보여준다.&#160;홍대 클럽들은 지난 2001년 문화 행사인 클럽 데이가 흥행하면서 대한민국 ‘클럽’을 상징하는 곳으로 자리매김했다.</span></p>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\">&#160;</span></p>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\">강남, 이태원 등에 있는 클럽과 달리 ‘홍대 클럽’은 20대만이 가진 자유로움을 표출하고 있다는 평가를 받고 있다.&#160;</span></p>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\">지난해 12월 기준 홍대에는 크고 작은 클럽 약 300곳이 운영 중이다.&#160;</span></p>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\">이제 막 클럽에 호기심을 가지게 된 20살 뉴비(한 분야에서 활동하거나 접한 지 얼마 되지 않는 사람)들을 위해 홍대 클럽 중 공연을 중심으로 운영되는 클럽이 아닌, 춤을 추며 음악을 즐기는 클럽을 중점적으로 분석해봤다.</span></p>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\">&#160;&#160;</span></p>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:gulim;font-size:8pt;color:#7d7d7d;background-color:white\">giphy</span></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:맑은 고딕;font-size:13.5pt;color:#333333;font-weight:bold\">1. 일렉트로닉 VS 힙합</span></p>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\">&#160;</span></p>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\">홍대 클럽은 ‘힙합’이 대세다.&#160;</span></p>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\">홍대에는 대표적인 일렉 클럽으로 ‘M2&#39;, ‘베라’ 등이 있다.&#160;힙합 클럽에는 ‘NB&#39;, &#39;매드홀릭’, ‘브랜누’, ‘시크릿 소사이어티’, ‘브라운’, ‘부다’, &#39;인투딥&#39; 등이 있다.&#160;홍대에는 일렉 클럽보다 힙합 클럽이 월등히 많다.</span></p>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\">&#160;</span></p>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\">한국 힙합은 홍대와 떼놓을 수 없는 관계를 맺고 있다. 힙합 장르가 인기를 얻기 전, 1세대 래퍼들은 홍대 클럽에서 공연했다. 래퍼들이 홍대에서 믹스 테이프를 만들고, 팬층을 확대해 나가면서 힙합이라는 장르가 한국에서 기반을 잡았다.</span></p>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\">&#160;&#160;</span></p>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\">아래는 온라인 커뮤니티에서 가장 많이 입에 오르내리는 홍대 클럽들이다.</span></p>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\">&#160;</span></p>\r\n\t\t\t\t<img src=\"https://graph.microsoft.com/v1.0/users('realpage@naver.com')/onenote/resources/0-45ba0cd1ae6b4662b9e4b7eff4b7ee54!1-733661839CC53BA5!7918/$value\" data-src-type=\"image/jpeg\" data-fullres-src=\"https://graph.microsoft.com/v1.0/users('realpage@naver.com')/onenote/resources/0-45ba0cd1ae6b4662b9e4b7eff4b7ee54!1-733661839CC53BA5!7918/$value\" data-fullres-src-type=\"image/jpeg\" />\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\">클럽 코쿤, 베라, 매드홀릭(왼쪽부터) / 위키트리</span></p>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\">&#160;</span></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<br />\r\n\t\t\t\t<table style=\"border:1px solid;border-collapse:collapse\">\r\n\t\t\t\t\t<tr>\r\n\t\t\t\t\t\t<td style=\"background-color:#ffe8e8;border:1px solid\"><p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:맑은 고딕\">&#160;</span></p>\r\n\t\t\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:맑은 고딕\">▶&#160;</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\">M2: </span><span style=\"font-family:맑은 고딕\">지난</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\"> 2004</span><span style=\"font-family:맑은 고딕\">년</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\"> </span><span style=\"font-family:맑은 고딕\">생긴</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\"> </span><span style=\"font-family:맑은 고딕\">일렉트로</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\"> </span><span style=\"font-family:맑은 고딕\">하우스</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\"> </span><span style=\"font-family:맑은 고딕\">클럽이다</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\">. (</span><span style=\"font-family:맑은 고딕\">서울특별시</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\"> </span><span style=\"font-family:맑은 고딕\">마포구</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\"> </span><span style=\"font-family:맑은 고딕\">잔다리로</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\"> 20-5 OHOO</span><span style=\"font-family:맑은 고딕\">빌딩</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\"> B1)</span></p>\r\n\t\t\t\t\t\t<br />\r\n\t\t\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:맑은 고딕;font-size:12pt\">▶&#160;</span><span style=\"font-family:맑은 고딕\">코쿤: 모든 장르의 음악을 트는 클럽이다. (서울특별시 마포구 와우산로21길 31 지하 1층)</span></p>\r\n\t\t\t\t\t\t<br />\r\n\t\t\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:맑은 고딕;font-size:12pt\">▶&#160;</span><span style=\"font-family:맑은 고딕\">베라: 하이브리드 클럽이다. 트랜스, 일렉트로 하우스 등을 트는 곳이다. (서울특별시 마포구 홍익로 25)</span></p>\r\n\t\t\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:맑은 고딕\">&#160;</span></p>\r\n\t\t\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:맑은 고딕;font-size:12pt\">▶&#160;</span><span style=\"font-family:맑은 고딕\">NB: NB1과 2가 있다. 홍대에서 상징적인 의미가 있는 힙합 클럽이다. (서울특별시 마포구 와우산로 79)</span></p>\r\n\t\t\t\t\t\t<br />\r\n\t\t\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:맑은 고딕;font-size:12pt\">▶&#160;</span><span style=\"font-family:맑은 고딕\">매드홀릭: 지하에는 유행하는 힙합 음악이 나오고 지상 1층에는 올드 스쿨, 클래식 힙합이 나온다. (서울시 마포구 잔다리로 19-6)</span></p>\r\n\t\t\t\t\t\t<br />\r\n\t\t\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:맑은 고딕;font-size:12pt\">▶&#160;</span><span style=\"font-family:맑은 고딕\">브랜누: 외국인들이 자주 오는 힙합 클럽이다. 다양한 종류의 힙합 음악을 들을 수 있는 곳이다. (서울특별시 마포구 와우산로17길 14)</span></p>\r\n\t\t\t\t\t\t<br />\r\n\t\t\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:맑은 고딕;font-size:12pt\">▶&#160;</span><span style=\"font-family:맑은 고딕\">헨즈:&#160;</span><span style=\"font-family:맑은 고딕;font-size:12pt\">전 세계적으로 유행하고 있는 음악을 우리나라에서 가장 빠르게 알리는 역할을 하는 클럽 중 하나다. 모든 장르의 음악을 트는 클럽으로 음악 트렌드에 민감하다는 평을 받고 있다.&#160;(서울시 마포구 와우산로 64)</span></p>\r\n\t\t\t\t\t\t<br />\r\n\t\t\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:맑은 고딕;font-size:12pt\">▶&#160;</span><span style=\"font-family:맑은 고딕\">시크릿 소사이어티: 래퍼 바스코가 운영하는 힙합 클럽이다. 자판기 모양을 가진 특이한 출입구가 인상적이다. (서울특별시 마포구 잔다리로 10)</span></p>\r\n\t\t\t\t\t\t</td>\r\n\t\t\t\t\t</tr>\r\n\t\t\t\t</table>\r\n\t\t\t\t<br />\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\">&#160;</span></p>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:맑은 고딕;font-size:13.5pt;color:#333333;font-weight:bold\">2. 홍대 클럽 &#39;패션 코드&#39;</span></p>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\">&#160;</span></p>\r\n\t\t\t\t<img src=\"https://graph.microsoft.com/v1.0/users('realpage@naver.com')/onenote/resources/0-dfd09675570b4d69b7ae68df312b337d!1-733661839CC53BA5!7918/$value\" data-src-type=\"image/jpeg\" data-fullres-src=\"https://graph.microsoft.com/v1.0/users('realpage@naver.com')/onenote/resources/0-dfd09675570b4d69b7ae68df312b337d!1-733661839CC53BA5!7918/$value\" data-fullres-src-type=\"image/jpeg\" />\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\">티나쉬(Tinashe) 인스타그램</span></p>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\">&#160;</span></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\">홍대 클럽은 강남 클럽보다 복장이 자유롭다는 평이 많다.&#160;</span></p>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\">홍대 클럽에서는 엄격한 복장 규정을 두고 있지는 않지만, 슬리퍼 등 춤을 추다 상처를 입을 가능성이 있는 복장을 한 경우에는 입장을 금지하고 있다.</span></p>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\">&#160;</span></p>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\">최근 홍대 클럽 패션 추세는 ‘힙합’이다. 모자를 뒤집어쓰고 스타디움 점퍼를 입고, 팀버랜드를 신은 남성들을 쉽게 볼 수 있다. 클럽을 찾는 많은 여성도&#160;해외</span><span lang=\"en-US\" style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\"> </span><span style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\">힙합</span><span lang=\"en-US\" style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\"> </span><span style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\">가수들</span><span lang=\"en-US\" style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\"> </span><span style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\">스타일을</span><span lang=\"en-US\" style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\"> </span><span style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\">따라</span><span lang=\"en-US\" style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\"> </span><span style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\">입는다</span><span lang=\"en-US\" style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\">.</span><span style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\">&#160;</span></p>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\">지난 12일 클럽 매드홀릭 앞에서 만난 대학생 박수지(여&#183;</span><span lang=\"en-US\" style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\">22) </span><span style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\">씨는</span><span lang=\"en-US\" style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\"> &quot;</span><span style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\">노출이</span><span lang=\"en-US\" style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\"> </span><span style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\">있는</span><span lang=\"en-US\" style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\"> </span><span style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\">옷을</span><span lang=\"en-US\" style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\"> </span><span style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\">입는</span><span lang=\"en-US\" style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\"> </span><span style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\">여성들이</span><span lang=\"en-US\" style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\"> </span><span style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\">줄고</span><span lang=\"en-US\" style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\"> </span><span style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\">있다</span><span lang=\"en-US\" style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\">. </span><span style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\">최근에는</span><span lang=\"en-US\" style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\"> </span><span style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\">엠넷</span><span lang=\"en-US\" style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\"> &#39;</span><span style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\">쇼미더머니</span><span lang=\"en-US\" style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\">&#39; </span><span style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\">등</span><span lang=\"en-US\" style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\"> </span><span style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\">힙합</span><span lang=\"en-US\" style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\"> </span><span style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\">프로그램이</span><span lang=\"en-US\" style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\"> </span><span style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\">인기를</span><span lang=\"en-US\" style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\"> </span><span style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\">끌면서</span><span lang=\"en-US\" style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\"> </span><span style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\">힙합</span><span lang=\"en-US\" style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\"> </span><span style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\">패션을</span><span lang=\"en-US\" style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\"> </span><span style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\">즐기는</span><span lang=\"en-US\" style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\"> </span><span style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\">여성들이</span><span lang=\"en-US\" style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\"> </span><span style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\">많아졌다</span><span lang=\"en-US\" style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\">&quot;</span><span style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\">고</span><span lang=\"en-US\" style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\"> </span><span style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\">했다</span><span lang=\"en-US\" style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\">.</span></p>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\">&#160;</span></p>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\">&#160;</span></p>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:맑은 고딕;font-size:13.5pt;color:#333333;font-weight:bold\">3. 클럽 투어와 특별 파티를 찾아 다니자</span></p>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\">&#160;</span></p>\r\n\t\t\t\t<img src=\"https://graph.microsoft.com/v1.0/users('realpage@naver.com')/onenote/resources/0-cea9a3fdd4864822b46051ba2d372368!1-733661839CC53BA5!7918/$value\" data-src-type=\"image/jpeg\" data-fullres-src=\"https://graph.microsoft.com/v1.0/users('realpage@naver.com')/onenote/resources/0-cea9a3fdd4864822b46051ba2d372368!1-733661839CC53BA5!7918/$value\" data-fullres-src-type=\"image/jpeg\" />\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\">홍대 클럽으로 검색했을 때 나오는 클럽들 / 다음 지도 캡처</span></p>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\">&#160;</span></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\">홍대 클럽은 여러 곳에 입장표를 끊어놓고 돌아다니기 좋다. 클럽들은 5분에서 10분 거리에 있다.&#160;클럽을 처음 가보는 사람이라면 자신이 어떤 분위기를 가진 클럽을 좋아하는지 모를 수도 있는데,&#160;여러 클럽을 돌아다니다 보면 자연스럽게 자신이 좋아하는 음악이 흘러나오는 클럽을 찾을 수 있다.&#160;</span></p>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\">지난 2011년 클럽 데이가 잠정 중단됐다가 지난해 8월 클럽 투어로 이름을 바꾸고 부활했다.</span></p>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\">클럽 투어를 이용하면 저렴한 가격에 여러 클럽을 경험해 볼 수 있다. 클럽 투어는 2만 5000원을 주고 쿠폰을 사면 15곳 클럽을 저녁 10시부터 다음날 오전 5시까지 자유롭게 돌아다니며 놀 수 있는 홍대 문화 행사를 말한다.(</span><a href=\"http://www.theclubtour.org/\" style=\"font-family:맑은 고딕;font-size:12pt\">☞바로가기</a><span style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\">)&#160;</span></p>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\">유튜브, CLUB TOUR</span></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\">클럽 투어가 열리는 날에 홍대 클럽을 자주 이용한다는 대학생 이근주(남&#183;</span><span lang=\"en-US\" style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\">25) </span><span style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\">씨는</span><span lang=\"en-US\" style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\"> &quot;</span><span style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\">처음</span><span lang=\"en-US\" style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\"> </span><span style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\">클럽을</span><span lang=\"en-US\" style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\"> </span><span style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\">입문하는</span><span lang=\"en-US\" style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\"> </span><span style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\">하는</span><span lang=\"en-US\" style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\"> </span><span style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\">사람이라면</span><span lang=\"en-US\" style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\"> </span><span style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\">클럽</span><span lang=\"en-US\" style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\"> </span><span style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\">투어를</span><span lang=\"en-US\" style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\"> </span><span style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\">적극적으로</span><span lang=\"en-US\" style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\"> </span><span style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\">활용해야</span><span lang=\"en-US\" style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\"> </span><span style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\">한다</span><span lang=\"en-US\" style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\">. </span><span style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\">클럽마다</span><span lang=\"en-US\" style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\"> </span><span style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\">특징이</span><span lang=\"en-US\" style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\"> </span><span style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\">다르다</span><span lang=\"en-US\" style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\">. </span><span style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\">클럽</span><span lang=\"en-US\" style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\"> </span><span style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\">투어가</span><span lang=\"en-US\" style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\"> </span><span style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\">열릴</span><span lang=\"en-US\" style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\"> </span><span style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\">때</span><span lang=\"en-US\" style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\"> </span><span style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\">이곳</span><span lang=\"en-US\" style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\"> </span><span style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\">저곳</span><span lang=\"en-US\" style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\"> </span><span style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\">가보면</span><span lang=\"en-US\" style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\"> </span><span style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\">자신에게</span><span lang=\"en-US\" style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\"> </span><span style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\">맞는</span><span lang=\"en-US\" style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\"> </span><span style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\">클럽을</span><span lang=\"en-US\" style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\"> </span><span style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\">찾을</span><span lang=\"en-US\" style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\"> </span><span style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\">수</span><span lang=\"en-US\" style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\"> </span><span style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\">있다</span><span lang=\"en-US\" style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\">&quot;</span><span style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\">고</span><span lang=\"en-US\" style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\"> </span><span style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\">조언했다</span><span lang=\"en-US\" style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\">.</span></p>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\">&#160;</span></p>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:맑은 고딕;font-size:12pt;color:#333333;font-weight:bold\">파티를 놓치지 말자</span></p>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\">홍대 클럽 중에서 특별한 파티를 여는 곳이 많다. 클럽 모티는 지난해 오픈 행사에서 래퍼 지코, 박재범 등 인기 있는 가수들을 불러 공연했다.</span></p>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\">클럽 헨즈에서는 지난해 12월 세계적인 스타 스크릴렉스(Skrillex)가 깜짝 게릴라 파티를 열었다. 파티에 대한 정보들은 각 클럽들이 운영하는 페이스북, 인스타그램 등에서 확인할 수 있다.</span></p>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\">때에 따라서는 음악 전문 사이트인 힙합LE, 힙합 플레이야에 공연 정보가 올라오기도 한다.</span></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:맑은 고딕;font-size:13.5pt;color:#333333;font-weight:bold\">4. 어느 시간, 어느 요일이 더 재밌나?</span></p>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\">&#160;</span></p>\r\n\t\t\t\t<img src=\"https://graph.microsoft.com/v1.0/users('realpage@naver.com')/onenote/resources/0-3ac2c374c3a44901bdd77d0ebbd76178!1-733661839CC53BA5!7918/$value\" data-src-type=\"image/jpeg\" data-fullres-src=\"https://graph.microsoft.com/v1.0/users('realpage@naver.com')/onenote/resources/0-3ac2c374c3a44901bdd77d0ebbd76178!1-733661839CC53BA5!7918/$value\" data-fullres-src-type=\"image/jpeg\" />\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:맑은 고딕;font-size:8pt;color:#7d7d7d\">클럽 코쿤</span></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\">돈이 없는 20살들은 일명 ‘무입(무료입장)’에 흥미를 느낀다. 무입을 하려면 시간을 잘 지켜야 한다. 대부분 홍대 클럽들은 밤 10시에서 12시 사이에 무료로 입장하게 해준다.&#160;</span></p>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\">&#160;</span></p>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\">단, 무료로 입장했을 때는 특정 시간까지 밖에 나올 수 없다. 클럽에서 정한 시간 전에 밖으로 나갔다가 다시 들어오려면 입장료(1만 원에서 1만 5000원)를 내야 한다.</span></p>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\">&#160;</span></p>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\">많은 이들이 클럽에 가기 가장 좋은 시간대를 밤 12시에서 새벽 1시로 꼽고 있다. 메인 DJ들이 나오고 가장 많은 사람이 몰리는 시간대이다. 또,&#160;대부분 금요일과 토요일 자정에 클럽을 찾는다.&#160;</span></p>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\">특정 요일에 한 클럽에서 노는 사람들도 있다. 이런 사람들을 두고 &#39;수코쿤(수요일과 클럽 코쿤을 합친 말) 폐인&#39;이라는 말도 생겨났다.</span></p>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\">&#160;</span></p>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:맑은 고딕;font-size:13.5pt;color:#333333;font-weight:bold\">5. 홍대 클럽 정보를 얻을 수 있는 앱, 사이트</span></p>\r\n\t\t\t\t<img src=\"https://graph.microsoft.com/v1.0/users('realpage@naver.com')/onenote/resources/0-1047b1588b6c4b7ba730a568d4f4c21d!1-733661839CC53BA5!7918/$value\" data-src-type=\"image/jpeg\" data-fullres-src=\"https://graph.microsoft.com/v1.0/users('realpage@naver.com')/onenote/resources/0-1047b1588b6c4b7ba730a568d4f4c21d!1-733661839CC53BA5!7918/$value\" data-fullres-src-type=\"image/jpeg\" />\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\">클럽 매니아 어플리케이션 / 구글플레이 캡처</span></p>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\">&#160;</span></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\">클럽에 대한 정보를 얻을 수 있는 앱과 카페로는 &#39;클럽 매니아&#39;가 가장 유명하다. 이 앱을 이용하면 공짜로 클럽에 들어가거나 파티 정보를 얻을 수 있다.</span></p>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\">이 앱을 만든 네이버 카페 &#39;클럽매니아&#39;에서는 클럽에 함께 갈 친구를 구할 수 있다.&#160;회원수 35만 7821명인 이 카페에는 클럽에 대한 정보와 직접 다녀온 사람들이 쓴 체험담도 있다. (</span><a href=\"http://cafe.naver.com/sdhpro\" style=\"font-family:맑은 고딕;font-size:12pt\">☞바로가기</a><span style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\">)</span></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:맑은 고딕;font-size:13.5pt;color:#333333;font-weight:bold\">6. 부비부비와 멀어지고 있는 홍대 클럽 문화</span></p>\r\n\t\t\t\t<img src=\"https://graph.microsoft.com/v1.0/users('realpage@naver.com')/onenote/resources/0-b074b41b4ff949b98a5f3d1307a4894d!1-733661839CC53BA5!7918/$value\" data-src-type=\"image/jpeg\" data-fullres-src=\"https://graph.microsoft.com/v1.0/users('realpage@naver.com')/onenote/resources/0-b074b41b4ff949b98a5f3d1307a4894d!1-733661839CC53BA5!7918/$value\" data-fullres-src-type=\"image/jpeg\" />\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\">클럽 매드홀릭에서 DJ들이 디제잉을 하고 있다. / 홍대문화관광협회 제공</span></p>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\">&#160;</span></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\">홍대 클럽을 지칭하는 또 다른 말은 &#39;부비부비&#39;다. 부비부비는 클럽 내에서 여성과 남성이 신체를 밀착해 춤을 추는 행위를 말한다.</span></p>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\">이를 두고 홍대 클럽 문화가 퇴폐적이라는 비판을 받기도 했다.</span></p>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\">홍대 문화관광협회 김정현(43) 협회장은 &quot;홍대 클럽에서 &#39;부비부비&#39;가 많이 사라지고 있다. 요즘은 세대가 변해서 불쾌감을 느끼면 성추행으로 바로 신고한다&quot;고 했다.</span></p>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:맑은 고딕;font-size:12pt;color:#333333\">김 협회장은 &quot;강남 클럽처럼 향락의 문화가 아니라 음악과 문화를 즐길 수 있는 클럽을 만들려고 많은 사람이 노력하고 있다&quot;고 덧붙였다.</span></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<cite style=\"font-size:8pt;color:#595959;margin-top:0pt;margin-bottom:0pt\">출처: &lt;<a href=\"http://www.wikitree.co.kr/main/news_view.php?id=250042&amp;fb=1&amp;resend=201610161229250042\">http://www.wikitree.co.kr/main/news_view.php?id=250042&amp;fb=1&amp;resend=201610161229250042</a>&gt; </cite>\r\n\t\t\t\t<br />\r\n\t\t\t</ul>\r\n\t\t\t<a href=\"http://www.wikitree.co.kr/main/news_view.php?id=250042&amp;fb=1&amp;resend=201610161229250042#\">\t\t\t\t<img width=\"25\" height=\"25\" src=\"https://graph.microsoft.com/v1.0/users('realpage@naver.com')/onenote/resources/0-7e8a118e96f34122b7c369c69283b816!1-733661839CC53BA5!7918/$value\" data-src-type=\"image/png\" data-fullres-src=\"https://graph.microsoft.com/v1.0/users('realpage@naver.com')/onenote/resources/0-7e8a118e96f34122b7c369c69283b816!1-733661839CC53BA5!7918/$value\" data-fullres-src-type=\"image/png\" />\t\t\t</a>\t\t\t<br />\r\n\t\t\t<a href=\"http://www.wikitree.co.kr/main/news_view.php?id=250042&amp;fb=1&amp;resend=201610161229250042#\">\t\t\t\t<img width=\"25\" height=\"25\" src=\"https://graph.microsoft.com/v1.0/users('realpage@naver.com')/onenote/resources/0-492c3d708918434da2972c1fab4e5693!1-733661839CC53BA5!7918/$value\" data-src-type=\"image/png\" data-fullres-src=\"https://graph.microsoft.com/v1.0/users('realpage@naver.com')/onenote/resources/0-492c3d708918434da2972c1fab4e5693!1-733661839CC53BA5!7918/$value\" data-fullres-src-type=\"image/png\" />\t\t\t</a>\t\t\t<br />\r\n\t\t\t<a href=\"http://www.wikitree.co.kr/main/news_view.php?id=250042&amp;fb=1&amp;resend=201610161229250042#\">\t\t\t\t<img width=\"25\" height=\"25\" src=\"https://graph.microsoft.com/v1.0/users('realpage@naver.com')/onenote/resources/0-6dfae6458b134d119fb55cd9a926f147!1-733661839CC53BA5!7918/$value\" data-src-type=\"image/png\" data-fullres-src=\"https://graph.micro crosoft.com/v1.0/users('realpage@naver.com')/onenote/resources/0-5d149c0a3b47470cb04c4b656d6208dc!1-733661839CC53BA5!7918/$value\" data-src-type=\"image/png\" data-fullres-src=\"https://graph.microsoft.com/v1.0/users('realpage@naver.com')/onenote/resources/0-5d149c0a3b47470cb04c4b656d6208dc!1-733661839CC53BA5!7918/$value\" data-fullres-src-type=\"image/png\" />\t\t\t</a>\t\t\t<br />\r\n\t\t\t<a href=\"http://www.band.us/plugin/share?body=20%EC%82%B4%20%EC%83%88%EB%82%B4%EA%B8%B0%EB%A5%BC%20%EC%9C%84%ED%95%9C%20%27%ED%99%8D%EB%8C%80%20%ED%81%B4%EB%9F%BD%27%20%EB%B6%84%EC%84%9D%0Ahttp%3A%2F%2Fwww.wikitree.co.kr%2Fmain%2Fnews_view.php%3Fid%3D250042%0A%EA%B0%80%EC%8A%B4%20%EB%9C%A8%EA%B1%B0%EC%9A%B4%20%EB%89%B4%EC%8A%A4%20%EC%8A%A4%ED%86%A0%EB%A6%AC%20%27%EC%9C%84%ED%82%A4%ED%8A%B8%EB%A6%AC%27&amp;route=wikitree.co.kr\">\t\t\t\t<img width=\"25\" height=\"25\" src=\"https://graph.microsoft.com/v1.0/users('realpage@naver.com')/onenote/resources/0-ef533e34b52644c6b1aaef08d69eab4a!1-733661839CC53BA5!7918/$value\" data-src-type=\"image/png\" data-fullres-src=\"https://graph.microsoft.com/v1.0/users('realpage@naver.com')/onenote/resources/0-ef533e34b52644c6b1aaef08d69eab4a!1-733661839CC53BA5!7918/$value\" data-fullres-src-type=\"image/png\" />\t\t\t</a>\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<cite style=\"font-size:8pt;color:#595959;margin-top:0pt;margin-bottom:0pt\">출처: &lt;<a href=\"http://www.wikitree.co.kr/main/news_view.php?id=250042&amp;fb=1&amp;resend=201610161229250042\">http://www.wikitree.co.kr/main/news_view.php?id=250042&amp;fb=1&amp;resend=201610161229250042</a>&gt; </cite>\r\n\t\t\t<br />\r\n\t\t"

const CONTENT_HASH = 'dc89cee4';

let cards = [];
let moving = null, resizing = null;
let selectedIdx = null, clipboardCard = null;
const GRID = 20, GAP = 14;
function snap(v) { return Math.round(v / GRID) * GRID; }

// ── Undo (Ctrl+Z) ────────────────────────────────────────────────────────────
const MAX_HISTORY = 50;
let history = [];
function snapshot() {
  syncText();
  history.push(JSON.stringify(cards));
  if (history.length > MAX_HISTORY) history.shift();
}
function undo() {
  if (!history.length) { showStatus('되돌릴 내용 없음'); return; }
  syncText();
  cards = JSON.parse(history.pop());
  renderCards();
  saveBoard();
  showStatus('↩ 되돌림');
}
function showStatus(msg) {
  const s = document.getElementById('status');
  s.textContent = msg;
  clearTimeout(showStatus._t);
  showStatus._t = setTimeout(() => { s.textContent = ''; }, 2000);
}
document.addEventListener('keydown', e => {
  const isText = document.activeElement?.contentEditable === 'true';
  if ((e.ctrlKey || e.metaKey) && e.key === 'z' && !e.shiftKey) {
    if (isText) return;
    e.preventDefault();
    undo();
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'c' && !e.shiftKey && !isText) {
    if (selectedIdx !== null && cards[selectedIdx]) {
      syncText();
      clipboardCard = JSON.parse(JSON.stringify(cards[selectedIdx]));
      showStatus('카드 복사됨');
      e.preventDefault();
    }
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'v' && !e.shiftKey && !isText) {
    if (clipboardCard) {
      e.preventDefault();
      snapshot();
      const nc = JSON.parse(JSON.stringify(clipboardCard));
      nc.x = (nc.x || 0) + 30; nc.y = (nc.y || 0) + 30;
      cards.push(nc);
      selectedIdx = cards.length - 1;
      renderCards(); saveBoard();
      showStatus('카드 붙여넣음');
    }
  }
  if (e.key === 'Escape') {
    document.querySelectorAll('.card.selected').forEach(c => c.classList.remove('selected'));
    selectedIdx = null;
  }
});

function pushCards(movedIdx) {
  const moved = cards[movedIdx];
  const movedEl = document.querySelector(`.card[data-idx="${movedIdx}"]`);
  if (!movedEl) return;
  const mh = movedEl.offsetHeight;
  document.querySelectorAll('.card').forEach(el => {
    const i = +el.dataset.idx;
    if (i === movedIdx) return;
    const c = cards[i], oh = el.offsetHeight;
    if (moved.x < (c.x+(c.w||200)) && (moved.x+(moved.w||200)) > c.x && moved.y < (c.y+oh) && (moved.y+mh) > c.y) {
      c.y = moved.y + mh + GAP;
      el.style.top = c.y + 'px';
    }
  });
}

function loadBoard() {
  const saved = localStorage.getItem(SAVE_KEY);
  const savedHash = localStorage.getItem(SAVE_KEY + ':hash');
  let parsed = null;
  try { parsed = saved ? JSON.parse(saved) : null; } catch(e) {}
  // reset if: no save, empty array, or content hash changed (page regenerated)
  if (!parsed || parsed.length === 0 || savedHash !== CONTENT_HASH) {
    cards = DEFAULT_CARDS.map(c => ({...c}));
    localStorage.removeItem(SAVE_KEY);
    localStorage.setItem(SAVE_KEY + ':hash', CONTENT_HASH);
    renderCards();
    const hasCoords = cards.some(c => c.x !== undefined && c.y !== undefined);
    if (!hasCoords) autoLayout();
    return;
  }
  cards = parsed;
  renderCards();
}
function resetToDefaults() { if (!confirm('저장된 보드를 지우고 원본으로 초기화합니다. 계속할까요?')) return; localStorage.removeItem(SAVE_KEY); cards = DEFAULT_CARDS.map(c => ({...c})); renderCards(); autoLayout(); }

function autoLayout() {
  const boardW = document.getElementById('board').offsetWidth;
  const cols = Math.max(1, Math.floor(boardW / 280));
  const colW = (boardW - GAP*(cols-1)) / cols;
  const colH = new Array(cols).fill(0);
  const allCards = document.querySelectorAll('.card');
  const images = document.querySelectorAll('.card img');
  let loaded = 0;
  function place() {
    allCards.forEach((el, i) => {
      const w = Math.min(cards[i].w || colW, colW);
      let minCol = 0;
      for (let c = 1; c < cols; c++) if (colH[c] < colH[minCol]) minCol = c;
      cards[i].x = minCol * (colW + GAP);
      cards[i].y = colH[minCol];
      cards[i].w = w;
      el.style.left = cards[i].x + 'px';
      el.style.top = cards[i].y + 'px';
      el.style.width = w + 'px';
      colH[minCol] = cards[i].y + el.offsetHeight + GAP;
    });
    document.getElementById('board').style.minHeight = (Math.max(...colH) + 100) + 'px';
    saveBoard();
  }
  if (!images.length) { requestAnimationFrame(place); return; }
  images.forEach(img => {
    if (img.complete) { loaded++; if (loaded >= images.length) requestAnimationFrame(place); }
    else { img.onload = img.onerror = () => { loaded++; if (loaded >= images.length) requestAnimationFrame(place); }; }
  });
}

function syncText() {
  document.querySelectorAll('.card').forEach(el => {
    const i = +el.dataset.idx;
    if (cards[i]?.type === 'text') { const t = el.querySelector('.text'); if (t) cards[i].content = t.innerHTML; }
  });
}
function saveBoard() { syncText(); localStorage.setItem(SAVE_KEY, JSON.stringify(cards)); localStorage.setItem(SAVE_KEY + ':hash', CONTENT_HASH); showStatus('저장됨 ' + new Date().toLocaleTimeString()); }

function renderCards() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  cards.forEach((card, i) => {
    const el = document.createElement('div');
    el.className = 'card'; el.dataset.idx = i;
    if (card.x !== undefined) el.style.left = card.x + 'px';
    if (card.y !== undefined) el.style.top = card.y + 'px';
    // html cards contain raw OneNote table HTML which may overflow the stated div width
    if (card.w) { if (card.type === 'html') el.style.minWidth = card.w + 'px'; else el.style.width = card.w + 'px'; }
    el.addEventListener('mousedown', e => {
      if (e.target.closest('.text, a, .card-btn, .resize-handle, td, th')) return;
      e.preventDefault();
      // Update selection
      document.querySelectorAll('.card.selected').forEach(c => c.classList.remove('selected'));
      selectedIdx = i; el.classList.add('selected');
      snapshot();
      moving = { idx: i, startX: e.clientX, startY: e.clientY, origX: card.x||0, origY: card.y||0 };
      el.classList.add('moving');
    });
    const actions = document.createElement('div'); actions.className = 'card-actions';
    const delBtn = document.createElement('button'); delBtn.className = 'card-btn'; delBtn.textContent = '×';
    delBtn.onclick = e => { e.stopPropagation(); if(confirm('삭제?')) { snapshot(); cards.splice(i,1); renderCards(); saveBoard(); } };
    actions.appendChild(delBtn); el.appendChild(actions);
    if (card.type === 'text') {
      const text = document.createElement('div'); text.className = 'text'; text.contentEditable = true;
      text.innerHTML = card.content || '';
      text.addEventListener('focus', () => { snapshot(); });
      text.addEventListener('blur', () => { card.content = text.innerHTML; saveBoard(); });
      el.appendChild(text);
    } else if (card.type === 'image') {
      const img = document.createElement('img');
      img.src = card.src.startsWith('http') || card.src.startsWith('data:') ? card.src : IMG_BASE + card.src;
      img.alt = ''; img.loading = 'lazy'; img.onerror = () => img.style.display = 'none';
      if (card.w) img.style.width = card.w + 'px';
      if (card.h) img.style.height = card.h + 'px';
      if (card.link) { const a = document.createElement('a'); a.href = card.link; a.target = '_blank'; a.appendChild(img); el.appendChild(a); }
      else { el.appendChild(img); }
      if (card.caption) { const cap = document.createElement('div'); cap.style.cssText = 'font-size:11px;color:#8b949e;margin-top:4px;word-break:break-word;padding:0 2px;'; cap.textContent = card.caption; el.appendChild(cap); }
    } else if (card.type === 'html') {
      const wrapper = document.createElement('div');
      wrapper.style.cssText = 'overflow:auto;font-size:13px;line-height:1.5;';
      wrapper.innerHTML = card.html.replace(/__ATTACHMENT__/g, IMG_BASE);
      wrapper.querySelectorAll('img').forEach(img => { img.style.maxWidth = '100%'; img.style.height = 'auto'; img.draggable = false; });
      wrapper.querySelectorAll('a').forEach(a => { a.target = '_blank'; a.style.color = '#6cb0f6'; });
      wrapper.querySelectorAll('table').forEach(t => { t.style.borderCollapse = 'collapse'; });
      wrapper.querySelectorAll('td,th').forEach(td => {
        td.style.border = '1px solid #444'; td.style.padding = '4px 6px'; td.style.verticalAlign = 'top';
        td.title = '더블클릭으로 편집';
        td.addEventListener('dblclick', function(e) {
          e.stopPropagation();
          snapshot();
          this.contentEditable = 'true';
          this.style.outline = '2px solid #388bfd';
          this.style.background = 'rgba(56,139,253,0.08)';
          this.focus();
        });
        td.addEventListener('blur', function() {
          this.contentEditable = 'false';
          this.style.outline = '';
          this.style.background = '';
          cards[i].html = wrapper.innerHTML.split(IMG_BASE).join('__ATTACHMENT__');
          saveBoard();
        });
      });
      el.appendChild(wrapper);
    } else if (card.type === 'table') {
      const rows = card.rows || [['','',''],['','',''],['','','']];
      const tbl = document.createElement('table');
      tbl.style.cssText = 'border-collapse:collapse;width:100%;font-size:13px;';
      rows.forEach((row, ri) => {
        const tr = tbl.insertRow();
        row.forEach((cell, ci) => {
          const td = document.createElement(ri === 0 ? 'th' : 'td');
          td.contentEditable = true;
          td.style.cssText = 'border:1px solid #30363d;padding:4px 8px;min-width:60px;text-align:left;' + (ri===0 ? 'background:#21262d;font-weight:600;' : '');
          td.textContent = cell;
          td.addEventListener('blur', () => { if (!cards[i].rows) cards[i].rows = rows; rows[ri][ci] = td.textContent; saveBoard(); });
          tr.appendChild(td);
        });
      });
      el.appendChild(tbl);
      const addRow = document.createElement('button');
      addRow.textContent = '+ 행'; addRow.style.cssText = 'margin-top:4px;font-size:11px;background:#21262d;border:1px solid #30363d;color:#8b949e;padding:2px 8px;border-radius:4px;cursor:pointer;';
      addRow.onclick = e => { e.stopPropagation(); snapshot(); if (!cards[i].rows) cards[i].rows = rows; cards[i].rows.push(new Array(cards[i].rows[0].length).fill('')); renderCards(); saveBoard(); };
      const addCol = document.createElement('button');
      addCol.textContent = '+ 열'; addCol.style.cssText = 'margin-top:4px;margin-left:4px;font-size:11px;background:#21262d;border:1px solid #30363d;color:#8b949e;padding:2px 8px;border-radius:4px;cursor:pointer;';
      addCol.onclick = e => { e.stopPropagation(); snapshot(); if (!cards[i].rows) cards[i].rows = rows; cards[i].rows.forEach(r => r.push('')); renderCards(); saveBoard(); };
      el.appendChild(addRow); el.appendChild(addCol);
    }
    const rh = document.createElement('div'); rh.className = 'resize-handle';
    rh.addEventListener('mousedown', e => { e.preventDefault(); e.stopPropagation(); snapshot(); resizing = { idx: i, startX: e.clientX, startW: card.w || el.offsetWidth }; });
    el.appendChild(rh);
    if (i === selectedIdx) el.classList.add('selected');
    board.appendChild(el);
  });
  requestAnimationFrame(() => {
    let maxB = 0;
    document.querySelectorAll('.card').forEach(el => { const b = (parseFloat(el.style.top)||0) + el.offsetHeight; if (b > maxB) maxB = b; });
    board.style.minHeight = (maxB + 100) + 'px';
  });
}

document.addEventListener('mousemove', e => {
  if (moving) {
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`); if (!el) return;
    let nx = moving.origX + e.clientX - moving.startX, ny = moving.origY + e.clientY - moving.startY;
    if (e.shiftKey) { nx = snap(nx); ny = snap(ny); el.style.outline = '1px dashed rgba(240,192,64,0.3)'; } else { el.style.outline = ''; }
    el.style.left = nx + 'px'; el.style.top = ny + 'px';
  }
  if (resizing) {
    let nw = resizing.startW + e.clientX - resizing.startX; if (e.shiftKey) nw = snap(nw);
    cards[resizing.idx].w = Math.max(100, nw);
    const el = document.querySelector(`.card[data-idx="${resizing.idx}"]`); if (el) el.style.width = cards[resizing.idx].w + 'px';
  }
});

document.addEventListener('mouseup', e => {
  if (moving) {
    let nx = moving.origX + e.clientX - moving.startX, ny = moving.origY + e.clientY - moving.startY;
    if (e.shiftKey) { nx = snap(nx); ny = snap(ny); }
    cards[moving.idx].x = Math.max(0, nx); cards[moving.idx].y = Math.max(0, ny);
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`); if (el) { el.classList.remove('moving'); el.style.outline = ''; }
    if (e.shiftKey) pushCards(moving.idx);
    moving = null; saveBoard();
  }
  if (resizing) { if (e.shiftKey) pushCards(resizing.idx); resizing = null; saveBoard(); }
});

function addTextCard() { snapshot(); cards.push({ type: 'text', content: '', x: 50, y: window.scrollY+100, w: 300 }); renderCards(); setTimeout(() => { const els = document.querySelectorAll('.card .text'); els[els.length-1]?.focus(); }, 100); }
function addImageCard() { const input = document.createElement('input'); input.type = 'file'; input.accept = 'image/*'; input.onchange = e => { const f = e.target.files[0]; if (!f) return; const r = new FileReader(); r.onload = () => { snapshot(); cards.push({ type: 'image', src: r.result, x: 50, y: window.scrollY+100, w: 240 }); renderCards(); saveBoard(); }; r.readAsDataURL(f); }; input.click(); }
function addImageUrl() { const url = prompt('이미지 URL'); if (!url) return; snapshot(); cards.push({ type: 'image', src: url, x: 50, y: window.scrollY+100, w: 240 }); renderCards(); saveBoard(); }
function addTableCard() {
  const colsStr = prompt('열 수 (기본 3)', '3'); const cols = Math.max(1, parseInt(colsStr)||3);
  const rowsStr = prompt('행 수 (헤더 포함, 기본 4)', '4'); const rows = Math.max(1, parseInt(rowsStr)||4);
  snapshot();
  cards.push({ type: 'table', rows: Array.from({length: rows}, (_, ri) => Array.from({length: cols}, (_, ci) => ri===0 ? `열${ci+1}` : '')), x: 50, y: window.scrollY+100, w: Math.max(240, cols*100) });
  renderCards(); saveBoard();
}
function exportBoard() { syncText(); const blob = new Blob([JSON.stringify(cards, null, 2)], { type: 'application/json' }); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = SAVE_KEY + '.json'; a.click(); }
// ── Zoom ─────────────────────────────────────────────────────────────────────
let zoom = parseFloat(localStorage.getItem('zoom-' + SAVE_KEY) || '1.0');
function applyZoom() {
  const board = document.getElementById('board');
  board.style.transform = `scale(${zoom})`;
  board.style.transformOrigin = '0 0';
  document.getElementById('zoom-level').textContent = Math.round(zoom * 100) + '%';
  localStorage.setItem('zoom-' + SAVE_KEY, zoom);
}
function zoomIn()  { zoom = Math.min(3.0, parseFloat((zoom + 0.1).toFixed(2))); applyZoom(); }
function zoomOut() { zoom = Math.max(0.2, parseFloat((zoom - 0.1).toFixed(2))); applyZoom(); }
document.addEventListener('keydown', e => {
  if (e.ctrlKey || e.metaKey) {
    if (e.key === '=' || e.key === '+') { e.preventDefault(); zoomIn(); }
    if (e.key === '-')                  { e.preventDefault(); zoomOut(); }
    if (e.key === '0')                  { e.preventDefault(); zoom = 1.0; applyZoom(); }
  }
});
document.getElementById('board').addEventListener('wheel', e => {
  if (!(e.ctrlKey || e.metaKey)) return;
  e.preventDefault();
  e.deltaY < 0 ? zoomIn() : zoomOut();
}, { passive: false });
applyZoom();
function resetLayout() { if (!confirm('자동 재배치합니다.')) return; cards.forEach(c => { delete c.x; delete c.y; }); renderCards(); autoLayout(); }
// ── Floating format toolbar ───────────────────────────────────────────────────
const fmtBar = document.getElementById('format-toolbar');
function fmt(cmd) { document.execCommand(cmd, false, null); saveBoard(); }
function fmtLink() {
  const sel = window.getSelection();
  if (!sel || sel.isCollapsed) return;
  const url = prompt('링크 URL 입력', 'https://');
  if (!url) return;
  document.execCommand('createLink', false, url);
  // make links open in new tab
  sel.anchorNode?.parentElement?.closest('a')?.setAttribute('target', '_blank');
  document.querySelectorAll('.text a').forEach(a => a.target = '_blank');
  saveBoard();
}

// prevent format buttons from blurring contenteditable
fmtBar.addEventListener('mousedown', e => e.preventDefault());

document.addEventListener('selectionchange', () => {
  const sel = window.getSelection();
  if (!sel || sel.isCollapsed || !sel.toString().trim()) { fmtBar.style.display = 'none'; return; }
  // only show if selection is inside a .text element
  const anchor = sel.anchorNode;
  if (!anchor) { fmtBar.style.display = 'none'; return; }
  const textEl = anchor.nodeType === 1 ? anchor.closest('.text') : anchor.parentElement?.closest('.text');
  if (!textEl) { fmtBar.style.display = 'none'; return; }
  // position above selection
  const range = sel.getRangeAt(0);
  const rect = range.getBoundingClientRect();
  fmtBar.style.display = 'flex';
  const tbW = fmtBar.offsetWidth || 180;
  let left = rect.left + rect.width / 2 - tbW / 2;
  left = Math.max(8, Math.min(left, window.innerWidth - tbW - 8));
  fmtBar.style.left = left + 'px';
  fmtBar.style.top = (rect.top - 44 + window.scrollY) + 'px';
});

setInterval(saveBoard, 30000);
loadBoard();
</script>
