<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1e1e1e; color: #e0e0e0; font-family: 'Segoe UI', -apple-system, sans-serif; font-size: 15px; line-height: 1.6; padding: 20px 30px 60px; overflow-x: hidden; }
a { color: #6cb0f6; text-decoration: none; }
a:hover { text-decoration: underline; }
.title-bar { background: #3a3a5c; display: inline-block; padding: 6px 16px; font-size: 22px; font-weight: bold; color: #fff; margin-bottom: 4px; }
.date { color: #999; font-size: 13px; margin-bottom: 20px; }
.board { position: relative; }
.card { background: #2a2a2a; border: 1px solid #3a3a3a; border-radius: 8px; padding: 12px; position: absolute; cursor: grab; transition: box-shadow 0.15s; overflow: hidden; }
.card:hover { box-shadow: 0 0 0 1px #58a6ff; z-index: 10; }
.card.moving { opacity: 0.8; box-shadow: 0 4px 24px rgba(0,0,0,0.6); z-index: 100; cursor: grabbing; }
.card img { width: 100%; border-radius: 4px; display: block; }
.card .text { outline: none; min-height: 20px; white-space: pre-wrap; word-break: break-word; }
.card .text:focus { background: rgba(255,255,255,0.05); border-radius: 4px; padding: 4px; }
.card .text:empty::before { content: '텍스트 입력...'; color: #555; }
.card-actions { position: absolute; top: 4px; right: 4px; display: none; gap: 4px; }
.card:hover .card-actions { display: flex; }
.card-btn { background: #333; border: 1px solid #555; color: #ccc; border-radius: 4px; padding: 2px 6px; font-size: 11px; cursor: pointer; }
.card-btn:hover { background: #444; color: #fff; }
.resize-handle { position: absolute; bottom: 0; right: 0; width: 16px; height: 16px; cursor: se-resize; opacity: 0; }
.card:hover .resize-handle { opacity: 0.6; }
.resize-handle::after { content: ''; position: absolute; bottom: 3px; right: 3px; width: 8px; height: 8px; border-right: 2px solid #666; border-bottom: 2px solid #666; }
.card.selected { box-shadow: 0 0 0 2px #58a6ff; z-index: 5; }
.highlight-red { color: #ff6b6b; }
.highlight-blue { color: #6cb0f6; }
.highlight-gold { color: #f0c040; }
.toolbar { position: fixed; bottom: 0; left: 0; right: 0; background: #161b22; border-top: 1px solid #30363d; padding: 8px 20px; display: flex; gap: 12px; align-items: center; z-index: 200; }
.toolbar button { background: #21262d; border: 1px solid #30363d; color: #e0e0e0; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; }
.toolbar button:hover { background: #30363d; }
.toolbar .status { color: #8b949e; font-size: 12px; margin-left: auto; }
#format-toolbar { position: fixed; display: none; background: #1c2128; border: 1px solid #444c56; border-radius: 8px; padding: 4px 6px; gap: 2px; align-items: center; z-index: 500; box-shadow: 0 4px 16px rgba(0,0,0,0.5); }
#format-toolbar button { background: none; border: none; color: #cdd9e5; padding: 4px 8px; border-radius: 5px; cursor: pointer; font-size: 13px; line-height: 1; }
#format-toolbar button:hover { background: #373e47; }
#format-toolbar .sep { width: 1px; height: 16px; background: #444c56; margin: 0 2px; }
</style>
</head>
<body>

  {

    "x": 65,

    "html": "\r\n\t\t\t<br />\r\n\t\t\t<ol>\r\n\t\t\t\t<br />\r\n\t\t\t\t<br />\r\n\t\t\t\t<br />\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-weight:bold\">_________________________________________________________________________</span></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">당신이<span lang=\"en-US\"> </span>회사원이라면<span lang=\"en-US\">,</span></p>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">당신도<span lang=\"en-US\"> </span>노비이고<span lang=\"en-US\">, </span>나도<span lang=\"en-US\"> </span>노비이니</p>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">우리<span lang=\"en-US\"> </span>로열티<span lang=\"en-US\"> </span>같은<span lang=\"en-US\"> </span>감정적인<span lang=\"en-US\"> </span>변수는<span lang=\"en-US\"> </span>내려<span lang=\"en-US\"> </span>놓고</p>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">노비가<span lang=\"en-US\"> </span>노비를<span lang=\"en-US\"> </span>엿먹이는<span lang=\"en-US\"> </span>상황에<span lang=\"en-US\"> </span>대해</p>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">계약관계에<span lang=\"en-US\"> </span>입각해서<span lang=\"en-US\"> </span>솔직히<span lang=\"en-US\"> </span>말해보자<span lang=\"en-US\">.</span></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">조태오<span lang=\"en-US\"> </span>사진<span lang=\"en-US\"> </span>삽입</p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">우리가<span lang=\"en-US\"> </span>회사랑<span lang=\"en-US\"> </span>고용계약이란<span lang=\"en-US\"> </span>걸<span lang=\"en-US\"> </span>맺어요<span lang=\"en-US\">.</span></p>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">그런데<span lang=\"en-US\">, </span>자신의<span lang=\"en-US\"> </span>능력이나<span lang=\"en-US\"> </span>의지에<span lang=\"en-US\"> </span>따라서</p>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">돈을<span lang=\"en-US\"> </span>받은<span lang=\"en-US\"> </span>만큼의<span lang=\"en-US\"> </span>일을<span lang=\"en-US\"> </span>해내지<span lang=\"en-US\"> </span>못하거나<span lang=\"en-US\">,</span></p>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">혹은<span lang=\"en-US\">,</span></p>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">받은<span lang=\"en-US\"> </span>돈의<span lang=\"en-US\"> </span>값어치를<span lang=\"en-US\"> </span>하지<span lang=\"en-US\"> </span>않는<span lang=\"en-US\"> </span>사람들이<span lang=\"en-US\"> </span>있죠<span lang=\"en-US\">.</span></p>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">지급받은<span lang=\"en-US\"> </span>돈에<span lang=\"en-US\"> </span>상응하는<span lang=\"en-US\"> </span>용역을<span lang=\"en-US\"> </span>제공하지<span lang=\"en-US\"> </span>않는다<span lang=\"en-US\">.</span></p>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">이건<span lang=\"en-US\"> </span>도둑질이죠<span lang=\"en-US\">, </span>이런걸<span lang=\"en-US\"> &quot;</span>횡령<span lang=\"en-US\">&quot;</span>이라고<span lang=\"en-US\"> </span>해요<span lang=\"en-US\">.</span></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">그리고<span lang=\"en-US\">, </span>성과를<span lang=\"en-US\"> </span>내야<span lang=\"en-US\"> </span>계속<span lang=\"en-US\"> </span>월급을<span lang=\"en-US\"> </span>받으니까<span lang=\"en-US\">.</span></p>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">아니<span lang=\"en-US\"> </span>정확히는<span lang=\"en-US\"> </span>성과를<span lang=\"en-US\"> </span>낼<span lang=\"en-US\"> </span>것처럼<span lang=\"en-US\"> </span>보여야<span lang=\"en-US\"> </span>월급을<span lang=\"en-US\"> </span>계속<span lang=\"en-US\"> </span>받으니까<span lang=\"en-US\">.</span></p>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">되지<span lang=\"en-US\"> </span>않을<span lang=\"en-US\"> </span>일<span lang=\"en-US\">. </span>성과는<span lang=\"en-US\"> </span>못<span lang=\"en-US\"> </span>내고<span lang=\"en-US\"> resource</span>만<span lang=\"en-US\"> </span>잡아먹을<span lang=\"en-US\"> </span>일인줄<span lang=\"en-US\"> </span>알면서도<span lang=\"en-US\">,</span></p>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">보고서를<span lang=\"en-US\"> </span>써요<span lang=\"en-US\">. </span>실무자인<span lang=\"en-US\"> </span>자기가<span lang=\"en-US\"> </span>가장<span lang=\"en-US\"> </span>잘<span lang=\"en-US\"> </span>알죠<span lang=\"en-US\"> </span>사실<span lang=\"en-US\">. </span>이게<span lang=\"en-US\"> </span>안될거란걸<span lang=\"en-US\">.</span></p>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">근데<span lang=\"en-US\">, </span>그걸<span lang=\"en-US\"> </span>보고를<span lang=\"en-US\"> </span>해요<span lang=\"en-US\">. </span>컨펌을<span lang=\"en-US\"> </span>받고<span lang=\"en-US\">, </span>예산을<span lang=\"en-US\"> </span>탑니다<span lang=\"en-US\">.</span></p>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">그리고<span lang=\"en-US\"> </span>그걸<span lang=\"en-US\"> </span>말아먹고<span lang=\"en-US\">, </span>접어요<span lang=\"en-US\">. </span>다시<span lang=\"en-US\"> </span>또<span lang=\"en-US\"> </span>다른<span lang=\"en-US\"> </span>기획을<span lang=\"en-US\"> </span>하죠<span lang=\"en-US\">.</span></p>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">같은<span lang=\"en-US\"> </span>실수를<span lang=\"en-US\"> </span>반복합니다<span lang=\"en-US\">. </span>안될거<span lang=\"en-US\"> </span>알면서<span lang=\"en-US\">, </span>끝까지<span lang=\"en-US\"> </span>밀어붙일거<span lang=\"en-US\"> </span>아니면서<span lang=\"en-US\">.</span></p>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">이걸<span lang=\"en-US\"> </span>회사에서는<span lang=\"en-US\"> &quot;</span>배임<span lang=\"en-US\">&quot;</span>이라고<span lang=\"en-US\"> </span>해요<span lang=\"en-US\">. </span>배임<span lang=\"en-US\">.</span></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">그냥<span lang=\"en-US\"> </span>그<span lang=\"en-US\"> </span>사업만<span lang=\"en-US\"> </span>말아먹고<span lang=\"en-US\"> </span>마는건<span lang=\"en-US\"> </span>사실<span lang=\"en-US\"> </span>큰<span lang=\"en-US\"> </span>문제가<span lang=\"en-US\"> </span>아닙니다<span lang=\"en-US\">.</span></p>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">실패를<span lang=\"en-US\"> </span>통한<span lang=\"en-US\"> </span>레슨이<span lang=\"en-US\"> </span>있기<span lang=\"en-US\"> </span>때문이죠<span lang=\"en-US\">.</span></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">그런데<span lang=\"en-US\">, </span>정말<span lang=\"en-US\"> </span>나쁜<span lang=\"en-US\"> </span>실패는<span lang=\"en-US\"> </span>뭐냐면<span lang=\"en-US\">, </span>그냥<span lang=\"en-US\"> </span>접고<span lang=\"en-US\"> </span>마는거에요</p>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">그럼<span lang=\"en-US\"> </span>조직의<span lang=\"en-US\"> </span>다른<span lang=\"en-US\"> </span>부분에서는<span lang=\"en-US\"> </span>실패가<span lang=\"en-US\"> </span>아니라<span lang=\"en-US\"> &quot;</span>패배<span lang=\"en-US\">&#39;</span>를<span lang=\"en-US\"> </span>학습하게<span lang=\"en-US\"> </span>됩니다<span lang=\"en-US\">.</span></p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">&quot;<span lang=\"ko-KR\">아…</span>. <span lang=\"ko-KR\">우리회사는</span> <span lang=\"ko-KR\">저런거</span> <span lang=\"ko-KR\">하면</span> <span lang=\"ko-KR\">안되는구나</span>&quot; &quot;<span lang=\"ko-KR\">이번에도</span> <span lang=\"ko-KR\">말아먹겠지</span>&quot;</p>\r\n\t\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">&quot;<span lang=\"ko-KR\">그렇게</span> <span lang=\"ko-KR\">말아먹어도</span> <span lang=\"ko-KR\">월급</span> <span lang=\"ko-KR\">따박따박</span> <span lang=\"ko-KR\">타먹고</span> <span lang=\"ko-KR\">사는데</span> <span lang=\"ko-KR\">지장</span> <span lang=\"ko-KR\">없구나</span>&quot;</p> r>\r\n\t\t\t\t\t\t\t\t<td style=\"border:1px solid;font-size:10pt\"><span style=\"font-size:9pt\">그녀를 찾아주세요</span></td>\r\n\t\t\t\t\t\t\t</tr>\r\n\t\t\t\t\t\t</table>\r\n\t\t\t\t\t\t</td>\r\n\t\t\t\t\t</tr>\r\n\t\t\t\t</table>\r\n\t\t\t\t<br />\r\n\t\t\t\t<cite style=\"font-size:8pt;color:#595959;margin-top:0pt;margin-bottom:0pt\">출처: &lt;<a href=\"http://blog.naver.com/PostList.nhn?blogId=realpage&amp;from=postList&amp;categoryNo=18\">http://blog.naver.com/PostList.nhn?blogId=realpage&amp;from=postList&amp;categoryNo=18</a>&gt; </cite>\r\n\t\t\t\t<br />\r\n\t\t\t\t<br />\r\n\t\t\t\t<table style=\"border:1px solid;border-collapse:collapse\">\r\n\t\t\t\t\t<tr>\r\n\t\t\t\t\t\t<td style=\"border:1px solid\"><p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:9pt\">그녀가 잘 지내는 건 아주 당연한 일 이라고 생각해요. </span></p>\r\n\t\t\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:9pt\">누구에게나 사랑 받을 사람이니까. </span></p>\r\n\t\t\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:9pt\">다행이에요, 진짜로. </span></p>\r\n\t\t\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:9pt\">좋은사람 만나서. 자기 좋아해주는 사람 만나서. </span></p>\r\n\t\t\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:9pt\">잘 사랑할 줄 아는 사람을 만나서. </span></p>\r\n\t\t\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:9pt\">&#160;</span></p>\r\n\t\t\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:9pt\">물론, 나도 많이 좋아했었죠. </span></p>\r\n\t\t\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:9pt\">그리고 열심히 사랑했었죠, 과도하게. </span></p>\r\n\t\t\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:9pt\">그녀를 만나는 동안은 친구도 없었어요. 친구가 뭐야, 가족도 없었죠. </span></p>\r\n\t\t\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:9pt\">걔 하나가 다였어요.</span></p>\r\n\t\t\t\t\t\t<br />\r\n\t\t\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:9pt\">누가 나한테 &#39;잠깐 얼굴이나 볼까&#39; 그렇게 말해도 선뜻 대답을 못했어요. </span></p>\r\n\t\t\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:9pt\">그렇게 말하는 사람을 내가 꼭 만나야하는 상황이라도 </span></p>\r\n\t\t\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:9pt\">&#39;글쌔&#39; 그렇게만 대답하면서 머릿속에서 막 생각을 돌렸죠. </span></p>\r\n\t\t\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:9pt\">&#39;걔가 어제 나한테 시간되면 얼굴 보자고 했었는데..&#39;&#160; </span></p>\r\n\t\t\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:9pt\">&#39;전화할지도 모르는데..&#39;</span></p>\r\n\t\t\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:9pt\">&#160;</span></p>\r\n\t\t\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:9pt\">나는 항상 대기 상태였어요. </span></p>\r\n\t\t\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:9pt\">언제든 &#39;응, 10분만 기다려&#39; 말하고 뛰어 나갈 준비. </span></p>\r\n\t\t\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:9pt\">&#39;너무 멀리 있으니&#160;</span><span lang=\"en-US\" style=\"font-size:9pt\"> </span><span style=\"font-size:9pt\">다음에</span><span lang=\"en-US\" style=\"font-size:9pt\"> </span><span style=\"font-size:9pt\">보자</span><span lang=\"en-US\" style=\"font-size:9pt\">&#39;</span><span style=\"font-size:9pt\">는</span><span lang=\"en-US\" style=\"font-size:9pt\"> </span><span style=\"font-size:9pt\">말이</span><span lang=\"en-US\" style=\"font-size:9pt\"> </span><span style=\"font-size:9pt\">나오지</span><span lang=\"en-US\" style=\"font-size:9pt\"> </span><span style=\"font-size:9pt\">않도록</span><span lang=\"en-US\" style=\"font-size:9pt\"> </span><span style=\"font-size:9pt\">바로</span><span lang=\"en-US\" style=\"font-size:9pt\"> </span><span style=\"font-size:9pt\">신발을</span><span lang=\"en-US\" style=\"font-size:9pt\"> </span><span style=\"font-size:9pt\">꿰어</span><span lang=\"en-US\" style=\"font-size:9pt\"> </span><span style=\"font-size:9pt\">신고</span><span lang=\"en-US\" style=\"font-size:9pt\"> </span><span style=\"font-size:9pt\">뛰어</span><span lang=\"en-US\" style=\"font-size:9pt\"> </span><span style=\"font-size:9pt\">나갈</span><span lang=\"en-US\" style=\"font-size:9pt\"> </span><span style=\"font-size:9pt\">준비</span><span lang=\"en-US\" style=\"font-size:9pt\">. </span></p>\r\n\t\t\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:9pt\">길이 막히면 지하철을, 막히지 않으면 택시를 타야지. </span></p>\r\n\t\t\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:9pt\">주머니 속엔 택시비가 항상 넉넉히 들어 있어야 하고 </span></p>\r\n\t\t\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:9pt\">언제나 벗어줄 옷 하나 더 챙겨야지.&#160; </span></p>\r\n\t\t\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:9pt\">머릿속은 늘 그런 생각. </span></p>\r\n\t\t\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:9pt\">다른 사람을 만나는데 쓸 신경이 남아나질 않았죠.</span></p>\r\n\t\t\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:9pt\">&#160;</span></p>\r\n\t\t\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:9pt\">그녀는 그래서 자주 이유없는 원망을 들어야 했어요. </span></p>\r\n\t\t\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:9pt\">그녀는 한번도 내게 &#39;언제나 나를 기다리고 있어줘&#39; 말하지도 않았고, </span></p>\r\n\t\t\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:9pt\">&#39;내가 전화하면 바로 달려와&#39; 부탁한 적도 없었고 </span></p>\r\n\t\t\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:9pt\">&#39;내가 내일 꼭 전화할께&#39; 약속한 적도 없었는데 나한테 늘 원망을 받아야 했죠. </span></p>\r\n\t\t\t\t\t\t<br />\r\n\t\t\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:9pt\">나는 이렇게 준비하고 있는데 왜 너는 나를 부르지 않을까. </span></p>\r\n\t\t\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:9pt\">물론 대놓고 말한적은 없었지만, 그렇다고 모를 수는 없었을 꺼에요. </span></p>\r\n\t\t\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:9pt\">&#160;</span></p>\r\n\t\t\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:9pt\">하루종일 자기만 따라 다니는 안테나 같은 내 귀.</span></p>\r\n\t\t\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:9pt\">카메라 같은 내 눈빛. </span></p>\r\n\t\t\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:9pt\">내가 얼마나 부담스러웠을까.</span></p>\r\n\t\t\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:9pt\">&#160;</span></p>\r\n\t\t\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:9pt\">그리고 나는, </span></p>\r\n\t\t\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:9pt\">왜 하필 그때 그녀를 만났을까.</span></p>\r\n\t\t\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:9pt\">&#160;</span></p>\r\n\t\t\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:9pt\">살면서 바보같은 짓, 바보같은 사랑 </span></p>\r\n\t\t\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:9pt\">한번씩 해야 한다면 차라리 다른 사람 먼저 만났으면 좋았을텐데. </span></p>\r\n\t\t\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:9pt\">그런 바보짓은 다른 사람에게 다 연습해 보고, </span></p>\r\n\t\t\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:9pt\">지금쯤 그녀를 만났다면.. </span></p>\r\n\t\t\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:9pt\">&#160;</span></p>\r\n\t\t\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:9pt\">멋대로 커져 버린 내 사랑이 그대를 짓눌렀던 그 때 </span></p>\r\n\t\t\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:9pt\">&#39;행복하게 살자&#39;라는 말 보다 </span></p>\r\n\t\t\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:9pt\">&#39;사랑하다 죽어버려라&#39; 그 말이 더 멋지게 들렸던 그 때. </span></p>\r\n\t\t\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:9pt\">&#39;혼자있고 싶어&#39; 그 말로 그대가 나를 떠나 갔던 그 때.</span></p>\r\n\t\t\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:9pt\">&#160;</span></p>\r\n\t\t\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:9pt\">그대에겐 힘든 기억 이었지만, </span></p>\r\n\t\t\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:9pt\">그게.. 내 딴에는 사랑 이었음을 말하고 싶습니다.</span></p>\r\n\t\t\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:9pt\">&#160;</span></p>\r\n\t\t\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:9pt\">그대는 이젠 궁금하지도 않을, 지난 사랑을 말하다.</span></p>\r\n\t\t\t\t\t\t<br />\r\n\t\t\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:9pt\">&#160;</span></p>\r\n\t\t\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:9pt\">- 푸른 밤, 그리고 성시경입니다 中 &#39;사랑을 말하다&#39; -</span></p>\r\n\t\t\t\t\t\t</td>\r\n\t\t\t\t\t</tr>\r\n\t\t\t\t</table>\r\n\t\t\t\t<br />\r\n\t\t\t\t<cite style=\"font-size:8pt;color:#595959;margin-top:0pt;margin-bottom:0pt\">출처: &lt;<a href     "content": "프로필이랑 배경 일치시키기\n<a href=\"http://blog.naver.com/jjin2385?Redirect=Log&logNo=130165527820\">http://blog.naver.com/jjin2385?Redirect=Log&logNo=130165527820</a>\n<a href=\"http://blog.naver.com/goremeet?Redirect=Log&logNo=20152916823\">http://blog.naver.com/goremeet?Redirect=Log&logNo=20152916823</a>\n이벤트\n\n다른 기업/관공서 계정과 컬라버레이션\n점자명함 컬라버레이숀\n\n커뮤니케이션의 발칙한 혁명 - 만지는 명함 Touch name card\n\n지역 상점과 연계 이벤트\n\n맛집, 커피숍 등\n흔히들 잃을게 없는 사람이 잃을 것이 많은사람보다\n도전이라는 단어앞에 정시적으로 무장될거라 생각한다\n하지만, 잃을것이 없는 사람이 무언가를 잃었을 때\n그것은 결코 잃어서는 안될 그 무언가일 때가 많다.\n존엄, 윤리, 죄의식, 건강, 자아...\n컨텐츠\n\n공유하고 싶은 컨텐츠일 것.\n로컬 기반의 사진이나 컨텐츠일 것.\n모바일 / IT 와 관련된 컨텐츠 일 것.\n네트웍 부문에서 하는 일을 균형있게 보여줄 것.\n단순 정보제공인 아닌, 고객 혜택 지향적일 것."

    "w": 258,
    "content": "스톡데일 모순\n‘낙관주의 편향(optimism bias)\n유약한 낙관과\n긍정과 자위적 희망으로\n스스로를 위로하지마라\n패배주의적 자기위무\n현실을 직시해라.\n초점을 맞추지 않고서는\n명중 시킬 수 없는 법이다.\n위안적인 긍정과 낙관은\n패망의 지름길이다.\n현실을 직시해라.\n그리고 긍정을 집어들 것이 아니라.\n대안을 가져라.\n우리에게 필요한 긍정은\n비관적 상황에 대한 낙관적 방임 혹은\n자기 위안적 합리화가 아니다.\n쓰레기를 쓰레기가 아니라고 하는 건\n'긍정'이 아니다.\n쓰레기를 쓰레기로 인정하고,\n쓰레기통에 가져다 버리는 것\n그것이 우리의 긍정이어야 한다.\n올바른 해법을 제시할 수 있는 힘은\n낙관이 아니다. '객관'에서 나온다.\n그것이 더 나아질 수 있는\n기회를 유기해버린다.\n빛과, 또 어둠이 있다.\n나는 다만\n이 모두를 균형있게 보기를 원하는 것 뿐이다.\n빛만 바라며 빛만 다루며 사는 사람보다.\n어둠도 보고 어둠도 다룰 수 있게되길 원한다.\n내가 어떤 삶을 살아니내든 그것이 투명하길 원한다.\n어짜피 세상을 바꾸는건 언제나\n불만쟁이들의 행동이었다.\n회의실에서 모두가 A나 A'를 이야기 할 때,\nB나 C,\n대부분의 긍정과 낙관은,\n무언가가 더 나아질 수 있는\n혹은 무언가를 바로잡을 수 있는\n기회를 유기해버린다.\n쓰레기를,\n쓰레기가 아니라고 하는 건\n긍정도 낙관도 아니다.\n쓰레기를 쓰레기로 인정하고,\n치워버리는 것\n그것이 긍정이다.\n우리에게 필요한 긍정은\n낙관적 방임이나\n자기위무적 합리화가 아니다.\n올바른 해법을 제시할 수 있는 힘은\n낙관이 아니라 객관에서 나온다.\n#Stokdale_Paradox #optimism_bias"

const CONTENT_HASH = '9ac572f2';

let cards = [];
let moving = null, resizing = null;
let selectedIdx = null, clipboardCard = null;
const GRID = 20, GAP = 14;
function snap(v) { return Math.round(v / GRID) * GRID; }

// ── Undo (Ctrl+Z) ────────────────────────────────────────────────────────────
const MAX_HISTORY = 50;
let history = [];
function snapshot() {
  syncText();
  history.push(JSON.stringify(cards));
  if (history.length > MAX_HISTORY) history.shift();
}
function undo() {
  if (!history.length) { showStatus('되돌릴 내용 없음'); return; }
  syncText();
  cards = JSON.parse(history.pop());
  renderCards();
  saveBoard();
  showStatus('↩ 되돌림');
}
function showStatus(msg) {
  const s = document.getElementById('status');
  s.textContent = msg;
  clearTimeout(showStatus._t);
  showStatus._t = setTimeout(() => { s.textContent = ''; }, 2000);
}
document.addEventListener('keydown', e => {
  const isText = document.activeElement?.contentEditable === 'true';
  if ((e.ctrlKey || e.metaKey) && e.key === 'z' && !e.shiftKey) {
    if (isText) return;
    e.preventDefault();
    undo();
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'c' && !e.shiftKey && !isText) {
    if (selectedIdx !== null && cards[selectedIdx]) {
      syncText();
      clipboardCard = JSON.parse(JSON.stringify(cards[selectedIdx]));
      showStatus('카드 복사됨');
      e.preventDefault();
    }
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'v' && !e.shiftKey && !isText) {
    if (clipboardCard) {
      e.preventDefault();
      snapshot();
      const nc = JSON.parse(JSON.stringify(clipboardCard));
      nc.x = (nc.x || 0) + 30; nc.y = (nc.y || 0) + 30;
      cards.push(nc);
      selectedIdx = cards.length - 1;
      renderCards(); saveBoard();
      showStatus('카드 붙여넣음');
    }
  }
  if (e.key === 'Escape') {
    document.querySelectorAll('.card.selected').forEach(c => c.classList.remove('selected'));
    selectedIdx = null;
  }
});

function pushCards(movedIdx) {
  const moved = cards[movedIdx];
  const movedEl = document.querySelector(`.card[data-idx="${movedIdx}"]`);
  if (!movedEl) return;
  const mh = movedEl.offsetHeight;
  document.querySelectorAll('.card').forEach(el => {
    const i = +el.dataset.idx;
    if (i === movedIdx) return;
    const c = cards[i], oh = el.offsetHeight;
    if (moved.x < (c.x+(c.w||200)) && (moved.x+(moved.w||200)) > c.x && moved.y < (c.y+oh) && (moved.y+mh) > c.y) {
      c.y = moved.y + mh + GAP;
      el.style.top = c.y + 'px';
    }
  });
}

function loadBoard() {
  const saved = localStorage.getItem(SAVE_KEY);
  const savedHash = localStorage.getItem(SAVE_KEY + ':hash');
  let parsed = null;
  try { parsed = saved ? JSON.parse(saved) : null; } catch(e) {}
  // reset if: no save, empty array, or content hash changed (page regenerated)
  if (!parsed || parsed.length === 0 || savedHash !== CONTENT_HASH) {
    cards = DEFAULT_CARDS.map(c => ({...c}));
    localStorage.removeItem(SAVE_KEY);
    localStorage.setItem(SAVE_KEY + ':hash', CONTENT_HASH);
    renderCards();
    const hasCoords = cards.some(c => c.x !== undefined && c.y !== undefined);
    if (!hasCoords) autoLayout();
    return;
  }
  cards = parsed;
  renderCards();
}
function resetToDefaults() { if (!confirm('저장된 보드를 지우고 원본으로 초기화합니다. 계속할까요?')) return; localStorage.removeItem(SAVE_KEY); cards = DEFAULT_CARDS.map(c => ({...c})); renderCards(); autoLayout(); }

function autoLayout() {
  const boardW = document.getElementById('board').offsetWidth;
  const cols = Math.max(1, Math.floor(boardW / 280));
  const colW = (boardW - GAP*(cols-1)) / cols;
  const colH = new Array(cols).fill(0);
  const allCards = document.querySelectorAll('.card');
  const images = document.querySelectorAll('.card img');
  let loaded = 0;
  function place() {
    allCards.forEach((el, i) => {
      const w = Math.min(cards[i].w || colW, colW);
      let minCol = 0;
      for (let c = 1; c < cols; c++) if (colH[c] < colH[minCol]) minCol = c;
      cards[i].x = minCol * (colW + GAP);
      cards[i].y = colH[minCol];
      cards[i].w = w;
      el.style.left = cards[i].x + 'px';
      el.style.top = cards[i].y + 'px';
      el.style.width = w + 'px';
      colH[minCol] = cards[i].y + el.offsetHeight + GAP;
    });
    document.getElementById('board').style.minHeight = (Math.max(...colH) + 100) + 'px';
    saveBoard();
  }
  if (!images.length) { requestAnimationFrame(place); return; }
  images.forEach(img => {
    if (img.complete) { loaded++; if (loaded >= images.length) requestAnimationFrame(place); }
    else { img.onload = img.onerror = () => { loaded++; if (loaded >= images.length) requestAnimationFrame(place); }; }
  });
}

function syncText() {
  document.querySelectorAll('.card').forEach(el => {
    const i = +el.dataset.idx;
    if (cards[i]?.type === 'text') { const t = el.querySelector('.text'); if (t) cards[i].content = t.innerHTML; }
  });
}
function saveBoard() { syncText(); localStorage.setItem(SAVE_KEY, JSON.stringify(cards)); localStorage.setItem(SAVE_KEY + ':hash', CONTENT_HASH); showStatus('저장됨 ' + new Date().toLocaleTimeString()); }

function renderCards() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  cards.forEach((card, i) => {
    const el = document.createElement('div');
    el.className = 'card'; el.dataset.idx = i;
    if (card.x !== undefined) el.style.left = card.x + 'px';
    if (card.y !== undefined) el.style.top = card.y + 'px';
    // html cards contain raw OneNote table HTML which may overflow the stated div width
    if (card.w) { if (card.type === 'html') el.style.minWidth = card.w + 'px'; else el.style.width = card.w + 'px'; }
    el.addEventListener('mousedown', e => {
      if (e.target.closest('.text, a, .card-btn, .resize-handle, td, th')) return;
      e.preventDefault();
      // Update selection
      document.querySelectorAll('.card.selected').forEach(c => c.classList.remove('selected'));
      selectedIdx = i; el.classList.add('selected');
      snapshot();
      moving = { idx: i, startX: e.clientX, startY: e.clientY, origX: card.x||0, origY: card.y||0 };
      el.classList.add('moving');
    });
    const actions = document.createElement('div'); actions.className = 'card-actions';
    const delBtn = document.createElement('button'); delBtn.className = 'card-btn'; delBtn.textContent = '×';
    delBtn.onclick = e => { e.stopPropagation(); if(confirm('삭제?')) { snapshot(); cards.splice(i,1); renderCards(); saveBoard(); } };
    actions.appendChild(delBtn); el.appendChild(actions);
    if (card.type === 'text') {
      const text = document.createElement('div'); text.className = 'text'; text.contentEditable = true;
      text.innerHTML = card.content || '';
      text.addEventListener('focus', () => { snapshot(); });
      text.addEventListener('blur', () => { card.content = text.innerHTML; saveBoard(); });
      el.appendChild(text);
    } else if (card.type === 'image') {
      const img = document.createElement('img');
      img.src = card.src.startsWith('http') || card.src.startsWith('data:') ? card.src : IMG_BASE + card.src;
      img.alt = ''; img.loading = 'lazy'; img.onerror = () => img.style.display = 'none';
      if (card.w) img.style.width = card.w + 'px';
      if (card.h) img.style.height = card.h + 'px';
      if (card.link) { const a = document.createElement('a'); a.href = card.link; a.target = '_blank'; a.appendChild(img); el.appendChild(a); }
      else { el.appendChild(img); }
      if (card.caption) { const cap = document.createElement('div'); cap.style.cssText = 'font-size:11px;color:#8b949e;margin-top:4px;word-break:break-word;padding:0 2px;'; cap.textContent = card.caption; el.appendChild(cap); }
    } else if (card.type === 'html') {
      const wrapper = document.createElement('div');
      wrapper.style.cssText = 'overflow:auto;font-size:13px;line-height:1.5;';
      wrapper.innerHTML = card.html.replace(/__ATTACHMENT__/g, IMG_BASE);
      wrapper.querySelectorAll('img').forEach(img => { img.style.maxWidth = '100%'; img.style.height = 'auto'; img.draggable = false; });
      wrapper.querySelectorAll('a').forEach(a => { a.target = '_blank'; a.style.color = '#6cb0f6'; });
      wrapper.querySelectorAll('table').forEach(t => { t.style.borderCollapse = 'collapse'; });
      wrapper.querySelectorAll('td,th').forEach(td => {
        td.style.border = '1px solid #444'; td.style.padding = '4px 6px'; td.style.verticalAlign = 'top';
        td.title = '더블클릭으로 편집';
        td.addEventListener('dblclick', function(e) {
          e.stopPropagation();
          snapshot();
          this.contentEditable = 'true';
          this.style.outline = '2px solid #388bfd';
          this.style.background = 'rgba(56,139,253,0.08)';
          this.focus();
        });
        td.addEventListener('blur', function() {
          this.contentEditable = 'false';
          this.style.outline = '';
          this.style.background = '';
          cards[i].html = wrapper.innerHTML.split(IMG_BASE).join('__ATTACHMENT__');
          saveBoard();
        });
      });
      el.appendChild(wrapper);
    } else if (card.type === 'table') {
      const rows = card.rows || [['','',''],['','',''],['','','']];
      const tbl = document.createElement('table');
      tbl.style.cssText = 'border-collapse:collapse;width:100%;font-size:13px;';
      rows.forEach((row, ri) => {
        const tr = tbl.insertRow();
        row.forEach((cell, ci) => {
          const td = document.createElement(ri === 0 ? 'th' : 'td');
          td.contentEditable = true;
          td.style.cssText = 'border:1px solid #30363d;padding:4px 8px;min-width:60px;text-align:left;' + (ri===0 ? 'background:#21262d;font-weight:600;' : '');
          td.textContent = cell;
          td.addEventListener('blur', () => { if (!cards[i].rows) cards[i].rows = rows; rows[ri][ci] = td.textContent; saveBoard(); });
          tr.appendChild(td);
        });
      });
      el.appendChild(tbl);
      const addRow = document.createElement('button');
      addRow.textContent = '+ 행'; addRow.style.cssText = 'margin-top:4px;font-size:11px;background:#21262d;border:1px solid #30363d;color:#8b949e;padding:2px 8px;border-radius:4px;cursor:pointer;';
      addRow.onclick = e => { e.stopPropagation(); snapshot(); if (!cards[i].rows) cards[i].rows = rows; cards[i].rows.push(new Array(cards[i].rows[0].length).fill('')); renderCards(); saveBoard(); };
      const addCol = document.createElement('button');
      addCol.textContent = '+ 열'; addCol.style.cssText = 'margin-top:4px;margin-left:4px;font-size:11px;background:#21262d;border:1px solid #30363d;color:#8b949e;padding:2px 8px;border-radius:4px;cursor:pointer;';
      addCol.onclick = e => { e.stopPropagation(); snapshot(); if (!cards[i].rows) cards[i].rows = rows; cards[i].rows.forEach(r => r.push('')); renderCards(); saveBoard(); };
      el.appendChild(addRow); el.appendChild(addCol);
    }
    const rh = document.createElement('div'); rh.className = 'resize-handle';
    rh.addEventListener('mousedown', e => { e.preventDefault(); e.stopPropagation(); snapshot(); resizing = { idx: i, startX: e.clientX, startW: card.w || el.offsetWidth }; });
    el.appendChild(rh);
    if (i === selectedIdx) el.classList.add('selected');
    board.appendChild(el);
  });
  requestAnimationFrame(() => {
    let maxB = 0;
    document.querySelectorAll('.card').forEach(el => { const b = (parseFloat(el.style.top)||0) + el.offsetHeight; if (b > maxB) maxB = b; });
    board.style.minHeight = (maxB + 100) + 'px';
  });
}

document.addEventListener('mousemove', e => {
  if (moving) {
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`); if (!el) return;
    let nx = moving.origX + e.clientX - moving.startX, ny = moving.origY + e.clientY - moving.startY;
    if (e.shiftKey) { nx = snap(nx); ny = snap(ny); el.style.outline = '1px dashed rgba(240,192,64,0.3)'; } else { el.style.outline = ''; }
    el.style.left = nx + 'px'; el.style.top = ny + 'px';
  }
  if (resizing) {
    let nw = resizing.startW + e.clientX - resizing.startX; if (e.shiftKey) nw = snap(nw);
    cards[resizing.idx].w = Math.max(100, nw);
    const el = document.querySelector(`.card[data-idx="${resizing.idx}"]`); if (el) el.style.width = cards[resizing.idx].w + 'px';
  }
});

document.addEventListener('mouseup', e => {
  if (moving) {
    let nx = moving.origX + e.clientX - moving.startX, ny = moving.origY + e.clientY - moving.startY;
    if (e.shiftKey) { nx = snap(nx); ny = snap(ny); }
    cards[moving.idx].x = Math.max(0, nx); cards[moving.idx].y = Math.max(0, ny);
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`); if (el) { el.classList.remove('moving'); el.style.outline = ''; }
    if (e.shiftKey) pushCards(moving.idx);
    moving = null; saveBoard();
  }
  if (resizing) { if (e.shiftKey) pushCards(resizing.idx); resizing = null; saveBoard(); }
});

function addTextCard() { snapshot(); cards.push({ type: 'text', content: '', x: 50, y: window.scrollY+100, w: 300 }); renderCards(); setTimeout(() => { const els = document.querySelectorAll('.card .text'); els[els.length-1]?.focus(); }, 100); }
function addImageCard() { const input = document.createElement('input'); input.type = 'file'; input.accept = 'image/*'; input.onchange = e => { const f = e.target.files[0]; if (!f) return; const r = new FileReader(); r.onload = () => { snapshot(); cards.push({ type: 'image', src: r.result, x: 50, y: window.scrollY+100, w: 240 }); renderCards(); saveBoard(); }; r.readAsDataURL(f); }; input.click(); }
function addImageUrl() { const url = prompt('이미지 URL'); if (!url) return; snapshot(); cards.push({ type: 'image', src: url, x: 50, y: window.scrollY+100, w: 240 }); renderCards(); saveBoard(); }
function addTableCard() {
  const colsStr = prompt('열 수 (기본 3)', '3'); const cols = Math.max(1, parseInt(colsStr)||3);
  const rowsStr = prompt('행 수 (헤더 포함, 기본 4)', '4'); const rows = Math.max(1, parseInt(rowsStr)||4);
  snapshot();
  cards.push({ type: 'table', rows: Array.from({length: rows}, (_, ri) => Array.from({length: cols}, (_, ci) => ri===0 ? `열${ci+1}` : '')), x: 50, y: window.scrollY+100, w: Math.max(240, cols*100) });
  renderCards(); saveBoard();
}
function exportBoard() { syncText(); const blob = new Blob([JSON.stringify(cards, null, 2)], { type: 'application/json' }); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = SAVE_KEY + '.json'; a.click(); }
// ── Zoom ─────────────────────────────────────────────────────────────────────
let zoom = parseFloat(localStorage.getItem('zoom-' + SAVE_KEY) || '1.0');
function applyZoom() {
  const board = document.getElementById('board');
  board.style.transform = `scale(${zoom})`;
  board.style.transformOrigin = '0 0';
  document.getElementById('zoom-level').textContent = Math.round(zoom * 100) + '%';
  localStorage.setItem('zoom-' + SAVE_KEY, zoom);
}
function zoomIn()  { zoom = Math.min(3.0, parseFloat((zoom + 0.1).toFixed(2))); applyZoom(); }
function zoomOut() { zoom = Math.max(0.2, parseFloat((zoom - 0.1).toFixed(2))); applyZoom(); }
document.addEventListener('keydown', e => {
  if (e.ctrlKey || e.metaKey) {
    if (e.key === '=' || e.key === '+') { e.preventDefault(); zoomIn(); }
    if (e.key === '-')                  { e.preventDefault(); zoomOut(); }
    if (e.key === '0')                  { e.preventDefault(); zoom = 1.0; applyZoom(); }
  }
});
document.getElementById('board').addEventListener('wheel', e => {
  if (!(e.ctrlKey || e.metaKey)) return;
  e.preventDefault();
  e.deltaY < 0 ? zoomIn() : zoomOut();
}, { passive: false });
applyZoom();
function resetLayout() { if (!confirm('자동 재배치합니다.')) return; cards.forEach(c => { delete c.x; delete c.y; }); renderCards(); autoLayout(); }
// ── Floating format toolbar ───────────────────────────────────────────────────
const fmtBar = document.getElementById('format-toolbar');
function fmt(cmd) { document.execCommand(cmd, false, null); saveBoard(); }
function fmtLink() {
  const sel = window.getSelection();
  if (!sel || sel.isCollapsed) return;
  const url = prompt('링크 URL 입력', 'https://');
  if (!url) return;
  document.execCommand('createLink', false, url);
  // make links open in new tab
  sel.anchorNode?.parentElement?.closest('a')?.setAttribute('target', '_blank');
  document.querySelectorAll('.text a').forEach(a => a.target = '_blank');
  saveBoard();
}

// prevent format buttons from blurring contenteditable
fmtBar.addEventListener('mousedown', e => e.preventDefault());

document.addEventListener('selectionchange', () => {
  const sel = window.getSelection();
  if (!sel || sel.isCollapsed || !sel.toString().trim()) { fmtBar.style.display = 'none'; return; }
  // only show if selection is inside a .text element
  const anchor = sel.anchorNode;
  if (!anchor) { fmtBar.style.display = 'none'; return; }
  const textEl = anchor.nodeType === 1 ? anchor.closest('.text') : anchor.parentElement?.closest('.text');
  if (!textEl) { fmtBar.style.display = 'none'; return; }
  // position above selection
  const range = sel.getRangeAt(0);
  const rect = range.getBoundingClientRect();
  fmtBar.style.display = 'flex';
  const tbW = fmtBar.offsetWidth || 180;
  let left = rect.left + rect.width / 2 - tbW / 2;
  left = Math.max(8, Math.min(left, window.innerWidth - tbW - 8));
  fmtBar.style.left = left + 'px';
  fmtBar.style.top = (rect.top - 44 + window.scrollY) + 'px';
});

setInterval(saveBoard, 30000);
loadBoard();
</script>
</body>
</html>
