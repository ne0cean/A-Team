차</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">상암동</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">엠넷</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">방송국을</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">향하는</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">길에</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">조금</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">늦겠다는</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> PD</span><span style=\"font-size:10.5pt;color:black\">의</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">문자메시지를</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">받았다</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\">. </span><span style=\"font-size:10.5pt;color:black\">막연히</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">공원을</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">산책하자니</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">여름</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">뙤약볕이</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">두렵고</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\">, </span><span style=\"font-size:10.5pt;color:black\">방송국과</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">맞닿은</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">프랜차이즈</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">커피숍에</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">들어서려니</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">비스트와</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">인피니트를</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">연호하는</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">소녀들로</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">야단법석일</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">게</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">뻔했다</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\">. </span><span style=\"font-size:10.5pt;color:black\">디지털미디어시티역</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> 2</span><span style=\"font-size:10.5pt;color:black\">번</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">출구로</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">나와</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">그늘을</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">따라</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">주변</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">골목</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">탐색에</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">나섰다가</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">발견한</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">곳이</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">북카페</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">‘북바이북’</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\">. </span><span style=\"font-size:10.5pt;color:black\">처음엔</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">작은</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">동네</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">서점인</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">줄</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">알았다</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\">. </span><span style=\"font-size:10.5pt;color:black\">여닫이문을</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">당기자</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">삐뚜름한</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">목재</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">책장</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\">(</span><span style=\"font-size:10.5pt;color:black\">이것은</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">컨셉</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\">!)</span><span style=\"font-size:10.5pt;color:black\">과</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">함께</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">맞은편에</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">가지런히</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">놓인</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">귀여운</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">차탁과</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">스툴이</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">시선을</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">붙들었다</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\">. </span><span style=\"font-size:10.5pt;color:black\">책장을</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">문학</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">소설로만</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">채운</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">것이</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">특징인데</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\">, </span><span style=\"font-size:10.5pt;color:black\">다분히</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> 30</span><span style=\"font-size:10.5pt;color:black\">대</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">자매</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">사장의</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">독보적</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">취향이</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">반영된</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">컬렉션이었다</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\">. </span></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:10.5pt;color:black\">일본</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">북카페를</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">섭렵하며</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">특색</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">있는</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">공간을</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">꾸리고자</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">했다는</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">그녀들은</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">트렌디한</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">에이블커피그룹의</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">원두를</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">공급받아</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">맛에서도</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">소외되지</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">않는</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">카페를</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">꾸려가고</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">있었다</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\">. </span><span style=\"font-size:10.5pt;color:black\">맛없는</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">커피로</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">악명</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">높은</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">삼청동과</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">가로수길</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">유명</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">북카페에서</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span an style=\"font-size:10.5pt;color:black\">최근</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">청담동에</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">문을</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">열고</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">트렌드세터들을</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">불러</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">모은</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">‘현대카드</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">트래블</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">라이브러리’</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> 1</span><span style=\"font-size:10.5pt;color:black\">층을</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">꿰차고</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">있는</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">북카페</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">역시</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">성인을</ font-family:Helvetica;font-size:10.5pt;color:black\">, </span><span style=\"font-size:10.5pt;color:black\">자연광이</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">스며드는</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">쾌적한</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">북카페에서</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">보드카를</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">넣은</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">앱솔루트</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">커피와</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">뉴캐슬</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">브라운</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">에일</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">맥주를</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">홀짝이며</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">여행책</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">몇</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">권을</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">넘기다</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">보면</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">“어른이</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">돼도</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">술집</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">말곤</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">갈</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">데가</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">없다”고</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">투덜댔던</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">과거가</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">미안해질</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">지경이다</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\">. </span></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:10.5pt;color:black\">‘여행</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">도서관’의</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">부설</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">카페답게</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">몇몇</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">커피는</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">스노우피크</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">브랜드의</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">캠핑용</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">잔에</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">담겨</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">나오는</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">센스도</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">이곳만의</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">특징</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\">. </span><span style=\"font-size:10.5pt;color:black\">탐나는</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">세계지도와</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">여행</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">아이템을</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">판매하는</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">트래블숍과</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> 2</span><span style=\"font-size:10.5pt;color:black\">층부터</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">본격적으로</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">시작되는</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">여행</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">도서관의</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">놀라운</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">셀렉션까지</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">훑어보다</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">보면</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\">, </span><span style=\"font-size:10.5pt;color:black\">북카페가</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">미지의</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">세계로</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">안내하는</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">플랫폼처럼</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">느껴질</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">것이다</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\">.</span></p>\r\n\t\t\t\t<img width=\"420\" height=\"567\" src=\"https://graph.microsoft.com/v1.0/users('realpage@naver.com')/onenote/resources/0-59a99efbb0aa473d9cecf5f9e115a072!1-733661839CC53BA5!7918/$value\" data-src-type=\"image/jpeg\" data-fullres-src=\"https://graph.microsoft.com/v1.0/users('realpage@naver.com')/onenote/resources/0-59a99efbb0aa473d9cecf5f9e115a072!1-733661839CC53BA5!7918/$value\" data-fullres-src-type=\"image/jpeg\" />\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><a href=\"http://m.navercast.naver.com/mobile_magazine_contents.nhn?rid=1098&amp;contents_id=61208&amp;isHorizontal=Y#\" style=\"font-size:10.5pt\">확대보기</a></p>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\">a moi</span></p>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:10.5pt;color:black\">이태원처럼</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">소란한</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">거리에서도</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">북카페는</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">거의</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">유일하게</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">한갓진</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">여유를</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">안겨주는</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">장소다</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\">. </span><span style=\"font-size:10.5pt;color:black\">떠들썩한</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">분위기를</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">각오한</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">채</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">길을</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">나서도</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">스타벅스조차</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">빈자리가</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">없다는</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">사실을</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">목격하면</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">미간이</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">찌푸려지게</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">마련이다</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\">. </span><span style=\"font-size:10.5pt;color:black\">이럴</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">땐</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">앤티크</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">가구</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">거리</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">사이</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\">, </span><span style=\"font-size:10.5pt;color:black\">청화아파트</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">상가</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> 2</span><span style=\"font-size:10.5pt;color:black\">층에</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">자리한</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">북카페</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">‘아무아</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\">(A Moi)’</span><span style=\"font-size:10.5pt;color:black\">를</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">찾으면</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">된다</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\">. </span></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:10.5pt;color:black\">아무아는</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">불어로</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">“도와주세요”라는</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">뜻</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">이기도</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">하다</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\">. </span><span style=\"font-size:10.5pt;color:black\">제법</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">외딴곳에</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">위치한데다</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">공간도</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">널찍한</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">탓에</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">한가로운</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">여유가</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">느껴진다</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\">. </span><span style=\"font-size:10.5pt;color:black\">앤티크</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">탁자와</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">가죽</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">소파로</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">제법</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">멋을</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">냈고</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\">, </span><span style=\"font-size:10.5pt;color:black\">한</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">병에</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> 2</span><span style=\"font-size:10.5pt;color:black\">만원</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">하는</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">비교적</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">저렴한</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">와인까지</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">구비하고</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">있다</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\">. </span><span style=\"font-size:10.5pt;color:black\">덕분에</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">오픈한</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">지</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> 6</span><span style=\"font-size:10.5pt;color:black\">개월</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">만에</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">동네</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">젊은</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">아티스트들의</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">사랑방이</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">되었다</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\">. </span><span style=\"font-size:10.5pt;color:black\">보기</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">드문</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">해외</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">리빙</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">서적과</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">디자인</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">도서를</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">욕심껏</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">펼쳐볼</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">수</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">있으며</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\">, </span><span style=\"font-size:10.5pt;color:black\">당연히</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">책을</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">구입</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">할</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">수도</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">있다</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\">.</span></p>\r\n\t\t\t\t<img width=\"450\" height=\"296\" src=\"https://graph.microsoft.com/v1.0/users('realpage@naver.com')/onenote/resources/0-ec2590229f304bf4af3ca14713550b74!1-733661839CC53BA5!7918/$value\" data-src-type=\"image/jpeg\" data-fullres-src=\"https://graph.microsoft.com/v1.0/users('realpage@naver.com')/onenote/resources/0-ec2590229f304bf4af3ca14713550b74!1-733661839CC53BA5!7918/$value\" data-fullres-src-type=\"image/jpeg\" />\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><a href=\"http://m.navercast.naver.com/mobile_magazine_contents.nhn?rid=1098&amp;contents_id=61208&amp;isHorizontal=Y#\" style=\"font-size:10.5pt\">확대보기</a></p>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\">thanks books</span></p>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:10.5pt;color:black\">중국인</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">관광객까지</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">들끓는</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">홍대는</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\">? </span><span style=\"font-size:10.5pt;color:black\">디자인</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">아이덴티티를</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">갖춘</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">동네</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">서점으로</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">지지를</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">얻고</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">있는</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">서교동</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">‘땡스북스’가</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">있다</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\">. </span><span style=\"font-size:10.5pt;color:black\">최신</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">인디</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">잡지부터</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">갓</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">출간된</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">인문학</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">서적까지</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">각별한</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">선택이</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">돋보이는</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">책들을</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">눈치</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">없이</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">읽을</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">수</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">있다</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\">. </span><span style=\"font-size:10.5pt;color:black\">커피</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">맛으로</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">소문난</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">북카페는</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">아니지만</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\">, </span><span style=\"font-size:10.5pt;color:black\">이곳만큼</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">유유자적하게</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">지적</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">허영심을</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">충족시켜주는</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">공간도</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">이</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">동네에선</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">드물다</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\">. </span></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:10.5pt;color:black\">인기에</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">힘입어</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">가로수길과</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">삼청동에</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">분점까지</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">열었다</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\">. </span><span style=\"font-size:10.5pt;color:black\">사실</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">연남동부터</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">합정동까지</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">소위</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">‘홍대</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">앞’으로</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">일괄</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">표기되는</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">동네는</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">출판사가</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">직접</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">운영하는</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">북카페의</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">격전지기도</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">하다</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\">. </span><span style=\"font-size:10.5pt;color:black\">출판사만큼이나</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">덩치</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">큰</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">서가로</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">유명한</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">문학동네의</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">‘카페</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">꼼마’부터</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">작가와의</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">만남이</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">활발히</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">이뤄지는</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">창작과비평사의</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">‘인문</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">카페</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">창비’</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\">, </span><span style=\"font-size:10.5pt;color:black\">시인</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">백석의</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">시</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">제목을</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">간판으로</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">내건</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">다산북스의</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">‘나와</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">나타샤와</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">흰</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">당나귀’</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\">, </span><span style=\"font-size:10.5pt;color:black\">자음과모음</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">출판사</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> 1</span><span style=\"font-size:10.5pt;color:black\">층에서</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">중고책</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">벼룩시장을</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">펼치곤</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">하는</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">‘카페</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">자음과모음’</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\">, </span><span style=\"font-size:10.5pt;color:black\">매월</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">첫</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">주</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">금요일과</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">토요일</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">오픈마켓을</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">여는</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">디자인북</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">출판사의</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">‘북카페</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">정글’</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">등이</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">대표적이다</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\">. </span></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:10.5pt;color:black\">이들</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">북카페는</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">자사</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">출판물을</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">중심으로</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> 10~50% </span><span style=\"font-size:10.5pt;color:black\">할인해주고</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\">, </span><span style=\"font-size:10.5pt;color:black\">그</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">어떤</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">카페보다</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">적극적으로</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">손님들이</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">노트북과</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">휴대폰을</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">연결할</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">수</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">있도록</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">콘센트를</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">제공한다는</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">학구적</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">공통점을</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">가졌다</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\">.</span></p>\r\n\t\t\t\t<img width=\"450\" height=\"296\" src=\"https://graph.microsoft.com/v1.0/users('realpage@naver.com')/onenote/resources/0-19bab47abb294c07b8148c2d9fbd2be6!1-733661839CC53BA5!7918/$value\" data-src-type=\"image/jpeg\" data-fullres-src=\"https://graph.microsoft.com/v1.0/users('realpage@naver.com')/onenote/resources/0-19bab47abb294c07b8148c2d9fbd2be6!1-733661839CC53BA5!7918/$value\" data-fullres-src-type=\"image/jpeg\" />\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><a href=\"http://m.navercast.naver.com/mobile_magazine_contents.nhn?rid=1098&amp;contents_id=61208&amp;isHorizontal=Y#\" style=\"font-size:10.5pt\">확대보기</a></p>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\">jinsun book cafe</span></p>\r\n\t\t\t\t<table style=\"border:0px\">\r\n\t\t\t\t\t<tr>\r\n\t\t\t\t\t\t<td style=\"border:0px\"><div style=\"display:inline-block;width:323px;height:200px;background:#2d333b;border-radius:4px;margin:2px;vertical-align:top;opacity:0.4\"></div>\r\n\t\t\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><a href=\"http://m.navercast.naver.com/mobile_magazine_contents.nhn?rid=1098&amp;contents_id=61208&amp;isHorizontal=Y#\">확대보기</a></p>\r\n\t\t\t\t\t\t</td>\r\n\t\t\t\t\t</tr>\r\n\t\t\t\t\t<tr>\r\n\t\t\t\t\t\t<td style=\"border:0px\"><div style=\"display:inline-block;width:323px;height:200px;background:#2d333b;border-radius:4px;margin:2px;vertical-align:top;opacity:0.4\"></div>\r\n\t\t\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><a href=\"http://m.navercast.naver.com/mobile_magazine_contents.nhn?rid=1098&amp;contents_id=61208&amp;isHorizontal=Y#\">확대보기</a></p>\r\n\t\t\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Helvetica\">pure arena</span></p>\r\n\t\t\t\t\t\t</td>\r\n\t\t\t\t\t</tr>\r\n\t\t\t\t</table>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:10.5pt;color:black\">무더운</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">여름</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\">, </span><span style=\"font-size:10.5pt;color:black\">잠시</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">쉬어갈</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">곳을</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">찾는다면</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">우리</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">동네</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">북카페는</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">어떨까</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\">? </span><span style=\"font-size:10.5pt;color:black\">얼마</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">전</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">리뉴얼해</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">다시</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">문을</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">연</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">삼청동의</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">터줏대감</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">‘진선북카페’나</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">남다른</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">핫</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">스폿으로</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">자리매김한</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">광화문의</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">‘퓨어아레나’</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\">, </span><span style=\"font-size:10.5pt;color:black\">대학로의</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">대표</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">북카페</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">‘타셴’처럼</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">동네마다</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">자리한</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">북카페</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">하나쯤</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">저장해둔다면</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">나의</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">일상이</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\">, </span><span style=\"font-size:10.5pt;color:black\">당신의</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">서울</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">나들이가</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">한</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">뼘쯤</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">느긋해질</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">수</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">있을</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">테니</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">말이다</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\">. </span><span style=\"font-size:10.5pt;color:black\">적어도</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">모양을</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">내기</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">위해</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">책꽂이를</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">채웠거나</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">서가의</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">특징을</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">도무지</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">눈치챌</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">수</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">없는</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">‘카페베네’나</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">‘민들레영토’</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">같은</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">북카페</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">스타일의</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">프랜차이즈와는</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">엄연히</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">다르다</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\">. </span><span style=\"font-size:10.5pt;color:black\">새로운</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">우리</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">동네</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">아지트에서</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">우리는</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">책과</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">함께</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">제법</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">어른스러운</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">휴식을</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">경험하게</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">될</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\"> </span><span style=\"font-size:10.5pt;color:black\">것이다</span><span style=\"font-family:Helvetica;font-size:10.5pt;color:black\">.</span></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<br />\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:9pt;color:#333333\">사랑하는데 있어서,</span></p>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:9pt;color:#333333\">&quot;...내가 너를 이만큼 사랑하니까</span></p>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:9pt;color:#333333\">너도 나를 이정도는 사랑해 줘야해...&quot;</span></p>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:9pt;color:#333333\">라는 식의 어리석은 생각이</span></p>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:9pt;color:#333333\">서로의 마음을 밀쳐내게 만들어,</span></p>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Tahoma;font-size:9pt;color:#333333\">&#160;</span></p>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:9pt;color:#333333\">계산</span><span lang=\"en-US\" style=\"font-size:9pt;color:#333333\"> </span><span style=\"font-size:9pt;color:#333333\">없이 사랑할</span><span lang=\"en-US\" style=\"font-size:9pt;color:#333333\"> </span><span style=\"font-size:9pt;color:#333333\">때 마주잡은</span><span style=\"font-size:9pt;color:#333333\">&#160;</span><span style=\"font-size:9pt;color:#333333\">두</span><span lang=\"en-US\" style=\"font-size:9pt;color:#333333\"> </span><span style=\"font-size:9pt;color:#333333\">손은 견고해지고,</span></p>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:9pt;color:#333333\">아낌없이 사랑할</span><span lang=\"en-US\" style=\"font-size:9pt;color:#333333\"> </span><span style=\"font-size:9pt;color:#333333\">때 두</span><span lang=\"en-US\" style=\"font-size:9pt;color:#333333\"> </span><span style=\"font-size:9pt;color:#333333\">마음의 공명은 더욱 커질터</span></p>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:9pt;color:#333333\">&#160;</span></p>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:9pt;color:#333333\">사랑할 수 밖에 없어서 사랑하는거지,</span></p>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:9pt;color:#333333\">사랑</span><span lang=\"en-US\" style=\"font-size:9pt;color:#333333\"> </span><span style=\"font-size:9pt;color:#333333\">받기 위해서 사랑하지는 않았어</span></p>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:9pt;color:#333333\">밀고 당기기? 그딴거</span><span style=\"font-size:9pt;color:#333333\">&#160;</span><span style=\"font-size:9pt;color:#333333\">우린 몰라</span></p>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:9pt;color:#333333\">&#160;</span></p>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:9pt;color:#333333\">연애에는 주도권이 있을지 모르나</span></p>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:9pt;color:#333333\">사랑에는 그조차 무의미해</span></p>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:9pt;color:#333333\">다만,</span></p>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:9pt;color:#333333\">더 많이 사랑하는 사람이 더 많이 행복한 거지</span></p>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:9pt;color:#333333\">&#160;</span></p>\r\n\t\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-size:9pt;color:#333333\">...집착은, 사랑이 아니래♪…</span></p>\r\n\t\t\t\t<br />\r\n\t\t\t\t<br />\r\n\t\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\">• <span style=\"font-family:Malgun Gothic\">남산</span> <span style=\"font-family:Malgun Gothic\">도서관</span>: 4<span style=\"font-family:Malgun Gothic\">층</span> <span style=\"font-family:Malgun Gothic\">자연과학실</span>. <span style=\"font-family:Malgun Gothic\">남산과</span> <span style=\"font-family:Malgun Gothic\">남산타워를</span> <span style=\"font-family:Malgun Gothic\">바라보며</span> <span style=\"font-family:Malgun Gothic\">계절의</span> <span style=\"font-family:Malgun Gothic\">변화를</span> <span style=\"font-family:Malgun Gothic\">느낄</span> <span style=\"font-family:Malgun Gothic\">수</span> <span style=\"font-family:Malgun Gothic\">있다</span>. <span style=\"font-family:Malgun Gothic\">중간에</span> <span style=\"font-family:Malgun Gothic\">산책겸</span> <span style=\"font-family:Malgun Gothic\">남산</span> <span style=\"font-family:Malgun Gothic\">하늘숲길</span> <span style=\"font-family:Malgun Gothic\">가면</span> <span style=\"font-family:Malgun Gothic\">매우</span> <span style=\"font-family:Malgun Gothic\">행복</span>.</p>\r\n\t\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\">• <span style=\"font-family:Malgun Gothic\">종로</span> <span style=\"font-family:Malgun Gothic\">도서관</span>: 1<span style=\"font-family:Malgun Gothic\">층</span> <span style=\"font-family:Malgun Gothic\">어문학실</span>. <span style=\"font-family:Malgun Gothic\">창가</span> <span style=\"font-family:Malgun Gothic\">앞이라</span> <span style=\"font-family:Malgun Gothic\">겨울에는</span> <span style=\"font-family:Malgun Gothic\">조금</span> <span style=\"font-family:Malgun Gothic\">춥지만</span> <span style=\"font-family:Malgun Gothic\">집중하기</span> <span style=\"font-family:Malgun Gothic\">좋다</span>. <span style=\"font-family:Malgun Gothic\">옥상에</span> <span style=\"font-family:Malgun Gothic\">가서</span> <span style=\"font-family:Malgun Gothic\">바라보는</span> <span style=\"font-family:Malgun Gothic\">인왕산</span> <span style=\"font-family:Malgun Gothic\">뷰도</span> <span style=\"font-family:Malgun Gothic\">추천</span>. <span style=\"font-family:Malgun Gothic\">서촌</span> <span style=\"font-family:Malgun Gothic\">옆이라</span> <span style=\"font-family:Malgun Gothic\">식사도</span>, <span style=\"font-family:Malgun Gothic\">카페도</span> <span style=\"font-family:Malgun Gothic\">가득</span>.</p>\r\n\t\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\">• <span style=\"font-family:Malgun Gothic\">마포중앙도서관</span>: <span style=\"font-family:Malgun Gothic\">오픈</span> <span style=\"font-family:Malgun Gothic\">때가면</span> <span style=\"font-family:Malgun Gothic\">확</span> <span style=\"font-family:Malgun Gothic\">트인</span> <span style=\"font-family:Malgun Gothic\">자
