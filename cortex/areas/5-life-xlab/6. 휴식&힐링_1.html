    "html": "\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">호기심으로<span lang=\"en-US\"> </span>방향을<span lang=\"en-US\"> </span>찾고<span lang=\"en-US\">, </span>행복해지는<span lang=\"en-US\"> </span>것들로<span lang=\"en-US\"> </span>채우며<span lang=\"en-US\">, </span>가능한<span lang=\"en-US\"> </span>채워야<span lang=\"en-US\"> </span>할<span lang=\"en-US\"> </span>것들로<span lang=\"en-US\"> </span>행복하라<span lang=\"en-US\">.</span></p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">과정과<span lang=\"en-US\"> </span>결과가<span lang=\"en-US\"> </span>나뉘어<span lang=\"en-US\"> </span>있다는<span lang=\"en-US\"> </span>환상을<span lang=\"en-US\"> </span>버려라<span lang=\"en-US\">, </span>매<span lang=\"en-US\"> </span>순간이<span lang=\"en-US\"> </span>곧<span lang=\"en-US\"> </span>결과임을<span lang=\"en-US\"> </span>이해하고<span lang=\"en-US\"> </span>받아들여라<span lang=\"en-US\">.</span></p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">결국<span lang=\"en-US\"> </span>매<span lang=\"en-US\"> </span>순간에서<span lang=\"en-US\"> </span>즐기고<span lang=\"en-US\"> </span>몰입할<span lang=\"en-US\"> </span>요소를<span lang=\"en-US\"> </span>발견해내는<span lang=\"en-US\"> </span>훈련을<span lang=\"en-US\"> </span>하라<span lang=\"en-US\">. </span>삶은<span lang=\"en-US\"> </span>효율이나<span lang=\"en-US\"> </span>효과에<span lang=\"en-US\"> </span>관한<span lang=\"en-US\"> </span>것이<span lang=\"en-US\"> </span>아니다<span lang=\"en-US\">.</span></p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">깊은<span lang=\"en-US\"> </span>심호홉<span lang=\"en-US\">, </span>노을<span lang=\"en-US\"> </span>보기<span lang=\"en-US\" style=\"font-family:Calibri\">, </span>졸릴<span lang=\"en-US\"> </span>때<span lang=\"en-US\"> </span>자는거<span lang=\"en-US\">, </span>따뜻한<span lang=\"en-US\"> </span>차<span lang=\"en-US\">, </span>적당히<span lang=\"en-US\"> </span>취할만큼<span lang=\"en-US\"> </span>마시기<span lang=\"en-US\">, </span></p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:맑은 고딕\">노래 흥얼거리기</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\">, </span><span style=\"font-family:맑은 고딕\">따뜻한</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\"> </span><span style=\"font-family:맑은 고딕\">샤워</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\">, </span><span style=\"font-family:맑은 고딕\">커피</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\">, </span><span style=\"font-family:맑은 고딕\">콧노래</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\">, </span><span style=\"font-family:맑은 고딕\">따스하거나 부드러운 커피</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\">, </span><span style=\"font-family:맑은 고딕\">설거지</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\">, </span><span style=\"font-family:맑은 고딕\">조깅</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\">, </span><span style=\"font-family:맑은 고딕\">노래</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\">, </span><span style=\"font-family:맑은 고딕\">전화</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\">, </span><span style=\"font-family:맑은 고딕\">독서</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\">, </span><span style=\"font-family:맑은 고딕\">자전거</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\">, </span><span style=\"font-family:맑은 고딕\">산책</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\">, </span><span style=\"font-family:맑은 고딕\">포옹</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\">, </span><span style=\"font-family:맑은 고딕\">생각멈추기</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\">, </span><span style=\"font-family:맑은 고딕\">몰입</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\">, </span><span style=\"font-family:맑은 고딕\">막춤</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\">, </span><span style=\"font-family:맑은 고딕\">조깅</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\">, </span><span style=\"font-family:맑은 고딕\">신나는</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\"> </span><span style=\"font-family:맑은 고딕\">음악</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\">, </span><span style=\"font-family:맑은 고딕\">글쓰기</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\">, </span><span style=\"font-family:맑은 고딕\">햇살</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\">,</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\"> </span><span style=\"font-family:맑은 고딕\">치맥</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\">, </span><span style=\"font-family:맑은 고딕\">농담농담만담</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\">, </span><span style=\"font-family:맑은 고딕\">공감</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\">, </span><span style=\"font-family:맑은 고딕\">후련한</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\"> </span><span style=\"font-family:맑은 고딕\">울음</span></p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">자전거</span></p>\r\n\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic\">글쓰기</span></p>\r\n\t\t\t<table style=\"border:1px solid;border-collapse:collapse\">\r\n\t\t\t\t<tr>\r\n\t\t\t\t\t<td style=\"border:1px solid;font-family:Calibri\"><span style=\"font-family:Malgun Gothic\">시각</span></td>\r\n\t\t\t\t\t<td style=\"border:1px solid;font-family:Calibri\"><span style=\"font-family:Malgun Gothic\">만화</span></td>\r\n\t\t\t\t</tr>\r\n\t\t\t\t<tr>\r\n\t\t\t\t\t<td style=\"border:1px solid;font-family:Calibri\"><span style=\"font-family:Malgun Gothic\">미각</span></td>\r\n\t\t\t\t\t<td style=\"border:1px solid;font-family:Calibri\"><span style=\"font-family:Malgun Gothic\">사케</span></td>\r\n\t\t\t\t</tr>\r\n\t\t\t</table>\r\n\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\">코난<span lang=\"en-US\"> </span><span lang=\"en-US\">오</span>브라이안<span lang=\"en-US\"> </span><span lang=\"en-US\">쇼</span></p>\r\n\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\">글쓰기</p>\r\n\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\">노을<span lang=\"en-US\">. </span><span lang=\"en-US\">일</span>출</p>\r\n\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\">새로운<span lang=\"en-US\"> </span><span lang=\"en-US\">장</span>소와<span lang=\"en-US\"> </span><span lang=\"en-US\">건</span>축물</p>\r\n\t\t\t<p style=\"font-family:Calibri;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Malgun Gothic;font-size:10pt\">샌들</span></p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">각탕<span lang=\"en-US\"> + </span>따뜻한<span lang=\"en-US\"> </span>차<span lang=\"en-US\"> + </span>독서</p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">오감</p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">시각<span lang=\"en-US\">: </span>노을<span lang=\"en-US\">, </span>눈<span lang=\"en-US\"> </span>내리는거<span lang=\"en-US\">, </span>야경<span lang=\"en-US\">, </span>탁<span lang=\"en-US\"> </span>트인<span lang=\"en-US\"> </span>하늘<span lang=\"en-US\">, </span>건축물</p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">촉각<span lang=\"en-US\" style=\"font-family:Calibri\">: </span>육덕</p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">후각<span lang=\"en-US\" style=\"font-family:Calibri\">: </span>향수<span lang=\"en-US\" style=\"font-family:Calibri\">, </span>아로마</p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">미각<span lang=\"en-US\" style=\"font-family:Calibri\">: </span>다<span lang=\"en-US\"> </span>ㅋㅋㅋㅋ</p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\">청각<span lang=\"en-US\" style=\"font-family:Calibri\">:  </span>이적<span lang=\"en-US\" style=\"font-family:Calibri\">, </span>성시경<span lang=\"en-US\"> </span><a href=\"https://www.youtube.com/watch?v=6RQ-bBdASvk\" lang=\"en-US\">[4K][Killing Voice] </a>성시경<span lang=\"en-US\">(Sungsikyung)</span>의<span lang=\"en-US\"> </span>킬링보이스<span lang=\"en-US\"> </span>- 너의 모든 순간, 좋을텐데, 넌 감동이었어, 희재, 두사람, 미소천사, 거리에서, 태양계ㅣ딩고뮤직</p>\r\n\t\t\t<br />\r\n\t\t\t<br />\r\n\t\t\t<iframe width=\"356\" height=\"200\" data-original-src=\"https://www.youtube.com/watch?v=6RQ-bBdASvk\" src=\"https://www.youtube.com/embed/6RQ-bBdASvk?feature=oembed&autoplay=true\" />\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:맑은 고딕\">가족</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\">/</span><span style=\"font-family:맑은 고딕\">친구와의</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\"> </span><span style=\"font-family:맑은 고딕\">통화</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\">, </span><span style=\"font-family:맑은 고딕\">노래 흥얼거리기</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\">, </span><span style=\"font-family:맑은 고딕\">따뜻한</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\"> </span><span style=\"font-family:맑은 고딕\">샤워</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\">, </span><span style=\"font-family:맑은 고딕\">잠</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\">, </span><span style=\"font-family:맑은 고딕\">커피</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\">, </span><span style=\"font-family:맑은 고딕\">콧노래</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\">, </span><span style=\"font-family:맑은 고딕\">노을</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\">, </span><span style=\"font-family:맑은 고딕\">따스하거나 부드러운 커피</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\">, </span><span style=\"font-family:맑은 고딕\">설거지</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\">, </span><span style=\"font-family:맑은 고딕\">조깅</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\">, </span><span style=\"font-family:맑은 고딕\">노래</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\">, </span><span style=\"font-family:맑은 고딕\">전화</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\">, </span><span style=\"font-family:맑은 고딕\">독서</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\">, </span><span style=\"font-family:맑은 고딕\">자전거</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\">, </span><span style=\"font-family:맑은 고딕\">산책</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\">, </span><span style=\"font-family:맑은 고딕\">포옹</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\">, </span><span style=\"font-family:맑은 고딕\">생각멈추기</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\">, </span><span style=\"font-family:맑은 고딕\">몰입</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\">, </span><span style=\"font-family:맑은 고딕\">막춤</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\">, </span><span style=\"font-family:맑은 고딕\">클러빙</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\">, </span><span style=\"font-family:맑은 고딕\">조깅</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\">, </span><span style=\"font-family:맑은 고딕\">신나는</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\"> </span><span style=\"font-family:맑은 고딕\">음악</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\">, </span><span style=\"font-family:맑은 고딕\">글쓰기</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\">, </span><span style=\"font-family:맑은 고딕\">햇살</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\">, </span><span style=\"font-family:맑은 고딕\">치맥</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\">, </span><span style=\"font-family:맑은 고딕\">농담농담만담</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\">, </span><span style=\"font-family:맑은 고딕\">공감</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\">, </span><span style=\"font-family:맑은 고딕\">후련한</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\"> </span><span style=\"font-family:맑은 고딕\">울음</span><span lang=\"en-US\" style=\"font-family:맑은 고딕\">, </span><span style=\"font-family:맑은 고딕\">글쓰기</span></p>\r\n\t\t\t<br />\r\n\t\t\t<p lang=\"en-US\" style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Microsoft NeoGothic\">코</span><span style=\"font-family:Microsoft NeoGothic\">난</span><span style=\"font-family:Calibri\"> </span><span style=\"font-family:Microsoft NeoGothic\">오</span><span style=\"font-family:Microsoft NeoGothic\">브라이언</span><span style=\"font-family:Calibri\"> </span><span style=\"font-family:Microsoft NeoGothic\">영</span><span style=\"font-family:Microsoft NeoGothic\">상</span></p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"color:#222222;font-weight:bold\">스트레스를 해소하는 100가지 방법</span></p>\r\n\t\t\t<br />\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"color:#222222;font-weight:bold\">1. 걱정거리를 노트에 직접 적어보라.</span></p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"color:#222222;font-weight:bold\">2. 오렌지 껍질을 벗겨보라. 시트러스 향은 스트레스를 줄이는 데 도움된다.</span></p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"color:#222222;font-weight:bold\">3. 약</span><span style=\"font-weight:bold\"> </span><a href=\"http://www.telegraph.co.uk/health/healthnews/5070874/Reading-can-help-reduce-stress.html\" style=\"font-weight:bold\">6분간 책</a><span style=\"color:#222222;font-weight:bold\">을 읽어라.</span></p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"color:#222222;font-weight:bold\">4. 아보카도를 먹자. 슈퍼푸드인 아보카도에는 </span><a href=\"http://www.marieclaire.com/health-fitness/advice/reduce-stress-foods\" style=\"font-weight:bold\">혈압을 낮추는 불포화 지방산과 칼륨</a><span style=\"color:#222222;font-weight:bold\">이 풍부하다.</span></p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"color:#222222;font-weight:bold\">5. 공원이나 초록색을 볼 수 있는 곳에서 산책하라. </span></p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"color:#222222;font-weight:bold\">6. 친한 친구와 외출하라.</span></p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"color:#222222;font-weight:bold\">7. 자신의 숨소리에 잠시 귀 기울여보라.</span></p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"color:#222222;font-weight:bold\">8. 짧은 시간이라도</span><span style=\"font-weight:bold\"> </span><a href=\"http://www.marieclaire.com/health-fitness/advice/reduce-stress-foods\" style=\"font-weight:bold\">낮잠</a><span style=\"color:#222222;font-weight:bold\">을 자며 휴식을 취하라.</span></p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"color:#222222;font-weight:bold\">9. 애완견을 일하는 공간으로 데려가라. 실제 애완견을 사무실에 데려갔더니 스트레스 지수가 낮아졌다는 연구 결과가 있다.</span></p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"color:#222222;font-weight:bold\">10. 모차르트의 음악을 감상하라.</span></p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"color:#222222;font-weight:bold\">11. 아로마 향을 맡는다. 2009년 사춘기 학생들에게</span><span style=\"font-weight:bold\"> </span><a href=\"http://www.ncbi.nlm.nih.gov/pubmed/19571632\" style=\"font-weight:bold\">실험</a><span style=\"color:#222222;font-weight:bold\">해 본 결과 스트레스를 줄이는 효과적인 방법이었다.</span></p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"color:#222222;font-weight:bold\">12. 크게 웃어라.</span></p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"color:#222222;font-weight:bold\">13. 마사지를 받아라.</span></p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"color:#222222;font-weight:bold\">14. 다른 이를 포옹하라.</span></p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"color:#222222;font-weight:bold\">15. 노래방에서 신나게 노래를 부른다.</span></p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"color:#222222;font-weight:bold\">16. 혹은 교회의 성가대에서 찬송가를 부른다.</span></p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"color:#222222;font-weight:bold\">17. 수공예 작업에 도전한다.</span></p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"color:#222222;font-weight:bold\">18. 뜨개질한다. 뜨개질하면 생각이 정리되고 두뇌 회전에 도움된다는</span><span style=\"font-weight:bold\"> </span><a href=\"http://www.ncbi.nlm.nih.gov/pubmed/19571632\" style=\"font-weight:bold\">연구 결과</a><span style=\"color:#222222;font-weight:bold\">도 있다.</span></p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"color:#222222;font-weight:bold\">19. 마음을 가다듬는 명상을 잠깐씩이라도 하라.</span></p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"color:#222222;font-weight:bold\">20. 섹스한다.</span></p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"color:#222222;font-weight:bold\">21. 쓸데없은 이메일을 </span><a href=\"http://scopeblog.stanford.edu/2014/10/01/what-email-does-to-your-brain/\" style=\"font-weight:bold\">수신 거부</a><span style=\"color:#222222;font-weight:bold\">한다.</span></p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"color:#222222;font-weight:bold\">22. 사랑하는 이와 키스를 해라.</span></p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"color:#222222;font-weight:bold\">23. 엄마와 통화를 한다.</span></p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"color:#222222;font-weight:bold\">24. 스트레칭한다.</span></p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"color:#222222;font-weight:bold\">25. </span><a href=\"http://www.psychologytoday.com/blog/mindfulness-in-frantic-world/201109/the-chocolate-meditation\" style=\"font-weight:bold\">초콜릿 명상</a><span style=\"color:#222222;font-weight:bold\">에 도전해보라. 초콜릿 상자를 열고 향을 음미한다. 예쁜 초콜릿 조각을 하나하나 감상한다. 초콜릿을 입에 넣고 맛을 천천히 음미한다. 초콜릿은 300가지 이상의 다양한 맛이 들어 있다. </span></p>\r\n\t\t\t<a href=\"http://www.pinterest.com/pin/create/button/?url=http%3A%2F%2Fwww.huffingtonpost.kr%2F2014%2F11%2F06%2Fstory_n_6112032.html%3Fncid%3Dfcbklnkkrhpmg00000001&amp;media=http://i.huffpost.com/gen/2249502/thumbs/o-CHOCOLATE-BOX-900.jpg&amp;description=스트레스를%20해소하는%20100가지%20방법\">\t\t\t\t<div style=\"display:inline-block;width:360px;height:200px;background:#2d333b;border-radius:4px;margin:2px;vertical-align:top;opacity:0.4\"></div>\t\t\t</a>\t\t\t<br />\r\n\t\t\t<div style=\"display:inline-block;width:360px;height:200px;background:#2d333b;border-radius:4px;margin:2px;vertical-align:top;opacity:0.4\"></div>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"color:#222222;font-weight:bold\">26. 이메일을 잠시 중단하라.</span></p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"color:#222222;font-weight:bold\">27. 당신에게 실수한 누군가를 용서해보라.</span></p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"color:#222222;font-weight:bold\">28. 감사할 일을 찾아보라.</span></p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"color:#222222;font-weight:bold\">29. 운동하라. 운동하면 스트레스를 해소하는 힘이 상승한다는 연구 결과도 있다.</span></p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"color:#222222;font-weight:bold\">30. 성질 내고 화낸 후에 얼마나 후회스러울지 생각해보라. </span></p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"color:#222222;font-weight:bold\">31. 홍차를 마셔라.</span></p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"color:#222222;font-weight:bold\">32. 스마트폰 사용을 잠시 중단하라.</span></p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"color:#222222;font-weight:bold\">33. </span><a href=\"http://nymag.com/scienceofus/2014/10/walk-like-a-happy-person-be-a-happier-person.html?utm_source=cheetah&amp;utm_medium=email&amp;om_rid=AAEMg8&amp;om_mid=_BUR-73B89GTJzJ\" style=\"font-weight:bold\">실제 행동으로 보여줘라.</a></p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"color:#222222;font-weight:bold\">34. 오렌지 주스를 마신다.</span></p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"color:#222222;font-weight:bold\">35. 껌을 씹는다.</span></p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"color:#222222;font-weight:bold\">36. 살면서 가장 중요한 것이 무엇인지 상기한다.</span></p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"color:#222222;font-weight:bold\">37. 오메가 3 가 풍부한 음식을 먹는다.</span></p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"color:#222222;font-weight:bold\">38. 종교가 있다면 신앙에 의존한다.</span></p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"color:#222222;font-weight:bold\">39. 스트레스가 적은 직업을 한번 찾아본다.</span></p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"color:#222222;font-weight:bold\">40. 솔트레이크(Salt Lake)를 방문하면 어떨까? 솔트레이크는 </span><a href=\"http://money.cnn.com/gallery/pf/2014/06/25/least-stressed-out-cities/\" style=\"font-weight:bold\">2014년 가장 스트레스 없이 살 수 있는 도시</a><span style=\"color:#222222;font-weight:bold\">로 선정됐다.</span></p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"color:#222222;font-weight:bold\">41. 도보 혹은 자전거로 출근한다.</span></p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"color:#222222;font-weight:bold\">42. 자연의 소리를 듣는다.</span></p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"color:#222222;font-weight:bold\">43. 오트밀을 먹는다.</span></p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"color:#222222;font-weight:bold\">44. 침을 맞는다. </span></p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"color:#222222;font-weight:bold\">45. 다른 이에게 미소를 지어라.</span></p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"color:#222222;font-weight:bold\">46. 차분하게 </span><a href=\"http://www.huffingtonpost.com/2013/09/09/stress-relief-that-works_n_3842511.html\" style=\"font-weight:bold\">이미지 트레이닝(거울 운동)</a><span style=\"color:#222222;font-weight:bold\">을 해보라.</span></p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"color:#222222;font-weight:bold\">47. 사무실과 집에 식물을 키워라.</span></p>\r\n\t\t\t<a href=\"http://www.pinterest.com/pin/create/button/?url=http%3A%2F%2Fwww.huffingtonpost.kr%2F2014%2F11%2F06%2Fstory_n_6112032.html%3Fncid%3Dfcbklnkkrhpmg00000001&amp;media=http://i.huffpost.com/gen/2249512/thumbs/o-PLANT-900.jpg&amp;description=스트레스를%20해소하는%20100가지%20방법\">\t\t\t\t<img src=\"__ATTACHMENT__df92e94b9e.png\" data-src-type=\"image/png\" data-fullres-src=\"__ATTACHMENT__df92e94b9e.png\" data-fullres-src-type=\"image/png\" />\t\t\t</a>\t\t\t<br />\r\n\t\t\t<div style=\"display:inline-block;width:360px;height:200px;background:#2d333b;border-radius:4px;margin:2px;vertical-align:top;opacity:0.4\"></div>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"color:#222222;font-weight:bold\">48. 필요하다면</span><span style=\"font-weight:bold\"> </span><a href=\"http://www.academia.edu/457235/When_is_crying_cathartic_An_international_study\" style=\"font-weight:bold\">울어라</a><span style=\"color:#222222;font-weight:bold\">.</span></p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"color:#222222;font-weight:bold\">49. 다크초콜릿을 먹어라.</span></p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"color:#222222;font-weight:bold\">50. 분노를 해소하는</span><span style=\"font-weight:bold\"> </span><a href=\"http://www.huffingtonpost.kr/2014/09/04/story_n_5763566.html\" style=\"font-weight:bold\">요가 자세</a><span style=\"color:#222222;font-weight:bold\">를 따라 해보라. </span></p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"color:#222222;font-weight:bold\">51. 필요한 경우 &quot;노(No)&quot;라고 말한다.</span></p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"color:#222222;font-weight:bold\">52. 오르가즘을 느끼는 것도 중요하다.</span></p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"color:#222222;font-weight:bold\">53. </span><a href=\"http://www.ncbi.nlm.nih.gov/pubmed/22894892\" style=\"font-weight:bold\">웃는 요가</a><span style=\"color:#222222;font-weight:bold\"> 수업에 참가한다.</span></p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"color:#222222;font-weight:bold\">54. 긍정적인 생각을 떠올린다.</span></p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"color:#222222;font-weight:bold\">55. 신 나게 춤을 추라.</span></p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"color:#222222;font-weight:bold\">56. 따듯한 물에 몸을 담그라.</span></p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"color:#222222;font-weight:bold\">57. 소나무 숲을 걷는다.</span></p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"color:#222222;font-weight:bold\">58. 또는 </span><a href=\"http://www.huffingtonpost.kr/2014/05/01/story_n_5245055.html\" style=\"font-weight:bold\">바닐라 향</a><span style=\"color:#222222;font-weight:bold\">을 맡는다.</span></p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"color:#222222;font-weight:bold\">59. 수영장 수면 위에 떠 있기.</span></p>\r\n\t\t\t<div style=\"display:inline-block;width:360px;height:200px;background:#2d333b;border-radius:4px;margin:2px;vertical-align:top;opacity:0.4\"></div>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"color:#222222;font-weight:bold\">60. 숙면을 취한다. 행복한 하루는 잠으로 좌우된다.</span></p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"color:#222222;font-weight:bold\">61. 책상과 집안을 정리해보라.</span></p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"color:#222222;font-weight:bold\">62. 아침에 일찍 일어나보라.</span></p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"color:#222222;font-weight:bold\">63. 말을 탄다.</span></p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"color:#222222;font-weight:bold\">64. 한 번에 한 가지 일만 한다. </span></p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"color:#222222;font-weight:bold\">65. 당신의 주변에 집중하라.</span></p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"color:#222222;font-weight:bold\">66. 애연가라면 담배를 끊어보라.</span></p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"color:#222222;font-weight:bold\">67. </span><a href=\"http://news.illinois.edu/news/14/1021nature_WilliamSullivan_BinJiang.html\" style=\"font-weight:bold\">3-D 동영상</a><span style=\"color:#222222;font-weight:bold\">으로 숲 속의 정경을 감상해 보라.</span></p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"color:#222222;font-weight:bold\">68. 해변으로 가라.</span></p>\r\n\t\t\t<a href=\"http://www.pinterest.com/pin/create/button/?url=http%3A%2F%2Fwww.huffingtonpost.kr%2F2014%2F11%2F06%2Fstory_n_6112032.html%3Fncid%3Dfcbklnkkrhpmg00000001&amp;media=http://i.huffpost.com/gen/2249520/thumbs/o-BEACH-900.jpg&amp;description=스트레스를%20해소하는%20100가지%20방법\">\t\t\t\t<img src=\"__ATTACHMENT__df92e94b9e.png\" data-src-type=\"image/png\" data-fullres-src=\"__ATTACHMENT__df92e94b9e.png\" data-fullres-src-type=\"image/png\" />\t\t\t</a>\t\t\t<br />\r\n\t\t\t<div style=\"display:inline-block;width:360px;height:200px;background:#2d333b;border-radius:4px;margin:2px;vertical-align:top;opacity:0.4\"></div>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"color:#222222;font-weight:bold\">69. 스트레스의 원인이 되는 사람이 있다면 잠시 거리를 두라.</span></p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"color:#222222;font-weight:bold\">70. 긍정적인 생각을 스스로 되새긴다.</span></p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"color:#222222;font-weight:bold\">71. 줄에 서서 기다리는 짓은 하지 마라.</span></p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"color:#222222;font-weight:bold\">72. 사랑하는 사람과 시간을 보낸다.</span></p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"color:#222222;font-weight:bold\">73. 녹차를 마셔라.</span></p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"color:#222222;font-weight:bold\">74. 휴가 중이라면 상사에게 연락이 와도 신경을 쓰지 마라.</span></p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"color:#222222;font-weight:bold\">75. </span><a href=\"http://www.huffingtonpost.kr/2014/03/27/story_n_5033022.html\" style=\"font-weight:bold\">나이 들어가는 것</a><span style=\"color:#222222;font-weight:bold\">을 자연스럽게 받아들여라.</span></p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"color:#222222;font-weight:bold\">76. &#39;무드 모니터링(Mood Monitoring)&#39;을 시도해 보라. 자신을 괴롭히는 스트레스 원인을 종이에 적고 2분 후 다시 적으면서 감정적인 부분을 정제하는 훈련이다.</span></p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"color:#222222;font-weight:bold\">77. SNS를 잠시 중단한다.</span></p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"color:#222222;font-weight:bold\">78. 가벼운 욕을 한다. (회사에서는 제외)</span></p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"color:#222222;font-weight:bold\">79. 친구와 음식을 만들어 먹는다.</span></p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"color:#222222;font-weight:bold\">80. 숨을 깊게 내쉰다.</span></p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"color:#222222;font-weight:bold\">81. 아님 소리라도 지른다.</span></p>\r\n\t\t\t<a href=\"http://www.pinterest.com/pin/create/button/?url=http%3A%2F%2Fwww.huffingtonpost.kr%2F2014%2F11%2F06%2Fstory_n_6112032.html%3Fncid%3Dfcbklnkkrhpmg00000001&amp;media=http://i.huffpost.com/gen/2249526/thumbs/o-SCREAMING-900.jpg&amp;description=스트레스를%20해소하는%20100가지%20방법\">\t\t\t\t<img src=\"__ATTACHMENT__df92e94b9e.png\" data-src-type=\"image/png\" data-fullres-src=\"__ATTACHMENT__df92e94b9e.png\" data-fullres-src-type=\"image/png\" />\t\t\t</a>\t\t\t<br />\r\n\t\t\t<div style=\"display:inline-block;width:360px;height:200px;background:#2d333b;border-radius:4px;margin:2px;vertical-align:top;opacity:0.4\"></div>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"color:#222222;font-weight:bold\">82. 웃기는 표정을 짓는다.</span></p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"color:#222222;font-weight:bold\">83. 잠시 눈을 감고 휴식을 취한다.</span></p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"color:#222222;font-weight:bold\">84. 머리를 빗는다.</span></p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"color:#222222;font-weight:bold\">85. 다른 이에게 선행을 베푼다. 남에게 좋을 일을 하면 자신에게 돌아오게 마련이다.</span></p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"color:#222222;font-weight:bold\">86. 가끔 침묵을 즐긴다.</span></p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"color:#222222;font-weight:bold\">87. 종이에 솔직한 심정을 적고 구겨서 버린다.</span></p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"color:#222222;font-weight:bold\">88. </span><a href=\"http://www.sciencedaily.com/releases/2012/10/121022112847.htm\" style=\"font-weight:bold\">파란색</a><span style=\"color:#222222;font-weight:bold\"> 물건을 바라본다.</span></p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"color:#222222;font-weight:bold\">89. 옛날 사진을 본다.</span></p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"color:#222222;font-weight:bold\">90. 스스로 스트레스받는 요소를 정리해본다. 스트레스의 원인이 생길 것 같으면 미리 피한다.</span></p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"color:#222222;font-weight:bold\">91. 밖에 나가 달린다.</span></p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"color:#222222;font-weight:bold\">92. 색칠 공부를 한다. 이것이 아이들한테만 유익한 것은 아니다.</span></p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"color:#222222;font-weight:bold\">93. 고양이나 강아지를 키워라.</span></p>\r\n\t\t\t<a href=\"http://www.pinterest.com/pin/create/button/?url=http%3A%2F%2Fwww.huffingtonpost.kr%2F2014%2F11%2F06%2Fstory_n_6112032.html%3Fncid%3Dfcbklnkkrhpmg00000001&amp;media=http://i.huffpost.com/gen/2249544/thumbs/o-KITTEN-900.jpg&amp;description=스트레스를%20해소하는%20100가지%20방법\">\t\t\t\t<img src=\"__ATTACHMENT__df92e94b9e.png\" data-src-type=\"image/png\" data-fullres-src=\"__ATTACHMENT__df92e94b9e.png\" data-fullres-src-type=\"image/png\" />\t\t\t</a>\t\t\t<br />\r\n\t\t\t<div style=\"display:inline-block;width:360px;height:200px;background:#2d333b;border-radius:4px;margin:2px;vertical-align:top;opacity:0.4\"></div>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"color:#222222;font-weight:bold\">94. 창밖을 바라보라.</span></p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"color:#222222;font-weight:bold\">95. 스트레스를 줄이는 전문 </span><a href=\"http://www.huffingtonpost.com/2013/11/02/wellness-apps_n_4192236.html\" style=\"font-weight:bold\">앱</a><span style=\"color:#222222;font-weight:bold\">이나 </span><a href=\"https://itunes.apple.com/us/app/gps-for-the-soul/id586099254?mt=8\" style=\"font-weight:bold\">프로그램</a><span style=\"color:#222222;font-weight:bold\">을 활용하라.</span></p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"color:#222222;font-weight:bold\">96. 상상하라. 마치 영화 속 주인공이 된 듯한 상상을 펼쳐보라.</span></p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"color:#222222;font-weight:bold\">97. 1부터 10까지 세라. 그리고 다시 거꾸로 세보라.</span></p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"color:#222222;font-weight:bold\">98. 햇빛을 만끽하라. 단, 선 블록 크림은 바르고 외출하라.</span></p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"color:#222222;font-weight:bold\">99. 점심시간을 충분히 활용하라.</span></p>\r\n\t\t\t<p style=\"font-size:10pt;margin-top:0pt;margin-bottom:0pt\"><span style=\"color:#222222;font-weight:bold\">100. 스트레스가 심하다고 느끼면 전문 상담가를 반드시 만나보길 권한다. </span></p>\r\n\t\t\t<br />\r\n\t\t"

const CONTENT_HASH = '081003f7';

let cards = [];
let moving = null, resizing = null;
let selectedIdx = null, clipboardCard = null;
const GRID = 20, GAP = 14;
function snap(v) { return Math.round(v / GRID) * GRID; }

// ── Undo (Ctrl+Z) ────────────────────────────────────────────────────────────
const MAX_HISTORY = 50;
let history = [];
function snapshot() {
  syncText();
  history.push(JSON.stringify(cards));
  if (history.length > MAX_HISTORY) history.shift();
}
function undo() {
  if (!history.length) { showStatus('되돌릴 내용 없음'); return; }
  syncText();
  cards = JSON.parse(history.pop());
  renderCards();
  saveBoard();
  showStatus('↩ 되돌림');
}
function showStatus(msg) {
  const s = document.getElementById('status');
  s.textContent = msg;
  clearTimeout(showStatus._t);
  showStatus._t = setTimeout(() => { s.textContent = ''; }, 2000);
}
document.addEventListener('keydown', e => {
  const isText = document.activeElement?.contentEditable === 'true';
  if ((e.ctrlKey || e.metaKey) && e.key === 'z' && !e.shiftKey) {
    if (isText) return;
    e.preventDefault();
    undo();
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'c' && !e.shiftKey && !isText) {
    if (selectedIdx !== null && cards[selectedIdx]) {
      syncText();
      clipboardCard = JSON.parse(JSON.stringify(cards[selectedIdx]));
      showStatus('카드 복사됨');
      e.preventDefault();
    }
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'v' && !e.shiftKey && !isText) {
    if (clipboardCard) {
      e.preventDefault();
      snapshot();
      const nc = JSON.parse(JSON.stringify(clipboardCard));
      nc.x = (nc.x || 0) + 30; nc.y = (nc.y || 0) + 30;
      cards.push(nc);
      selectedIdx = cards.length - 1;
      renderCards(); saveBoard();
      showStatus('카드 붙여넣음');
    }
  }
  if (e.key === 'Escape') {
    document.querySelectorAll('.card.selected').forEach(c => c.classList.remove('selected'));
    selectedIdx = null;
  }
});

function pushCards(movedIdx) {
  const moved = cards[movedIdx];
  const movedEl = document.querySelector(`.card[data-idx="${movedIdx}"]`);
  if (!movedEl) return;
  const mh = movedEl.offsetHeight;
  document.querySelectorAll('.card').forEach(el => {
    const i = +el.dataset.idx;
    if (i === movedIdx) return;
    const c = cards[i], oh = el.offsetHeight;
    if (moved.x < (c.x+(c.w||200)) && (moved.x+(moved.w||200)) > c.x && moved.y < (c.y+oh) && (moved.y+mh) > c.y) {
      c.y = moved.y + mh + GAP;
      el.style.top = c.y + 'px';
    }
  });
}

function loadBoard() {
  const saved = localStorage.getItem(SAVE_KEY);
  const savedHash = localStorage.getItem(SAVE_KEY + ':hash');
  let parsed = null;
  try { parsed = saved ? JSON.parse(saved) : null; } catch(e) {}
  // reset if: no save, empty array, or content hash changed (page regenerated)
  if (!parsed || parsed.length === 0 || savedHash !== CONTENT_HASH) {
    cards = DEFAULT_CARDS.map(c => ({...c}));
    localStorage.removeItem(SAVE_KEY);
    localStorage.setItem(SAVE_KEY + ':hash', CONTENT_HASH);
    renderCards();
    const hasCoords = cards.some(c => c.x !== undefined && c.y !== undefined);
    if (!hasCoords) autoLayout();
    return;
  }
  cards = parsed;
  renderCards();
}
function resetToDefaults() { if (!confirm('저장된 보드를 지우고 원본으로 초기화합니다. 계속할까요?')) return; localStorage.removeItem(SAVE_KEY); cards = DEFAULT_CARDS.map(c => ({...c})); renderCards(); autoLayout(); }

function autoLayout() {
  const boardW = document.getElementById('board').offsetWidth;
  const cols = Math.max(1, Math.floor(boardW / 280));
  const colW = (boardW - GAP*(cols-1)) / cols;
  const colH = new Array(cols).fill(0);
  const allCards = document.querySelectorAll('.card');
  const images = document.querySelectorAll('.card img');
  let loaded = 0;
  function place() {
    allCards.forEach((el, i) => {
      const w = Math.min(cards[i].w || colW, colW);
      let minCol = 0;
      for (let c = 1; c < cols; c++) if (colH[c] < colH[minCol]) minCol = c;
      cards[i].x = minCol * (colW + GAP);
      cards[i].y = colH[minCol];
      cards[i].w = w;
      el.style.left = cards[i].x + 'px';
      el.style.top = cards[i].y + 'px';
      el.style.width = w + 'px';
      colH[minCol] = cards[i].y + el.offsetHeight + GAP;
    });
    document.getElementById('board').style.minHeight = (Math.max(...colH) + 100) + 'px';
    saveBoard();
  }
  if (!images.length) { requestAnimationFrame(place); return; }
  images.forEach(img => {
    if (img.complete) { loaded++; if (loaded >= images.length) requestAnimationFrame(place); }
    else { img.onload = img.onerror = () => { loaded++; if (loaded >= images.length) requestAnimationFrame(place); }; }
  });
}

function syncText() {
  document.querySelectorAll('.card').forEach(el => {
    const i = +el.dataset.idx;
    if (cards[i]?.type === 'text') { const t = el.querySelector('.text'); if (t) cards[i].content = t.innerHTML; }
  });
}
function saveBoard() { syncText(); localStorage.setItem(SAVE_KEY, JSON.stringify(cards)); localStorage.setItem(SAVE_KEY + ':hash', CONTENT_HASH); showStatus('저장됨 ' + new Date().toLocaleTimeString()); }

function renderCards() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  cards.forEach((card, i) => {
    const el = document.createElement('div');
    el.className = 'card'; el.dataset.idx = i;
    if (card.x !== undefined) el.style.left = card.x + 'px';
    if (card.y !== undefined) el.style.top = card.y + 'px';
    // html cards contain raw OneNote table HTML which may overflow the stated div width
    if (card.w) { if (card.type === 'html') el.style.minWidth = card.w + 'px'; else el.style.width = card.w + 'px'; }
    el.addEventListener('mousedown', e => {
      if (e.target.closest('.text, a, .card-btn, .resize-handle, td, th')) return;
      e.preventDefault();
      // Update selection
      document.querySelectorAll('.card.selected').forEach(c => c.classList.remove('selected'));
      selectedIdx = i; el.classList.add('selected');
      snapshot();
      moving = { idx: i, startX: e.clientX, startY: e.clientY, origX: card.x||0, origY: card.y||0 };
      el.classList.add('moving');
    });
    const actions = document.createElement('div'); actions.className = 'card-actions';
    const delBtn = document.createElement('button'); delBtn.className = 'card-btn'; delBtn.textContent = '×';
    delBtn.onclick = e => { e.stopPropagation(); if(confirm('삭제?')) { snapshot(); cards.splice(i,1); renderCards(); saveBoard(); } };
    actions.appendChild(delBtn); el.appendChild(actions);
    if (card.type === 'text') {
      const text = document.createElement('div'); text.className = 'text'; text.contentEditable = true;
      text.innerHTML = card.content || '';
      text.addEventListener('focus', () => { snapshot(); });
      text.addEventListener('blur', () => { card.content = text.innerHTML; saveBoard(); });
      el.appendChild(text);
    } else if (card.type === 'image') {
      const img = document.createElement('img');
      img.src = card.src.startsWith('http') || card.src.startsWith('data:') ? card.src : IMG_BASE + card.src;
      img.alt = ''; img.loading = 'lazy'; img.onerror = () => img.style.display = 'none';
      if (card.w) img.style.width = card.w + 'px';
      if (card.h) img.style.height = card.h + 'px';
      if (card.link) { const a = document.createElement('a'); a.href = card.link; a.target = '_blank'; a.appendChild(img); el.appendChild(a); }
      else { el.appendChild(img); }
      if (card.caption) { const cap = document.createElement('div'); cap.style.cssText = 'font-size:11px;color:#8b949e;margin-top:4px;word-break:break-word;padding:0 2px;'; cap.textContent = card.caption; el.appendChild(cap); }
    } else if (card.type === 'html') {
      const wrapper = document.createElement('div');
      wrapper.style.cssText = 'overflow:auto;font-size:13px;line-height:1.5;';
      wrapper.innerHTML = card.html.replace(/__ATTACHMENT__/g, IMG_BASE);
      wrapper.querySelectorAll('img').forEach(img => { img.style.maxWidth = '100%'; img.style.height = 'auto'; img.draggable = false; });
      wrapper.querySelectorAll('a').forEach(a => { a.target = '_blank'; a.style.color = '#6cb0f6'; });
      wrapper.querySelectorAll('table').forEach(t => { t.style.borderCollapse = 'collapse'; });
      wrapper.querySelectorAll('td,th').forEach(td => {
        td.style.border = '1px solid #444'; td.style.padding = '4px 6px'; td.style.verticalAlign = 'top';
        td.title = '더블클릭으로 편집';
        td.addEventListener('dblclick', function(e) {
          e.stopPropagation();
          snapshot();
          this.contentEditable = 'true';
          this.style.outline = '2px solid #388bfd';
          this.style.background = 'rgba(56,139,253,0.08)';
          this.focus();
        });
        td.addEventListener('blur', function() {
          this.contentEditable = 'false';
          this.style.outline = '';
          this.style.background = '';
          cards[i].html = wrapper.innerHTML.split(IMG_BASE).join('__ATTACHMENT__');
          saveBoard();
        });
      });
      el.appendChild(wrapper);
    } else if (card.type === 'table') {
      const rows = card.rows || [['','',''],['','',''],['','','']];
      const tbl = document.createElement('table');
      tbl.style.cssText = 'border-collapse:collapse;width:100%;font-size:13px;';
      rows.forEach((row, ri) => {
        const tr = tbl.insertRow();
        row.forEach((cell, ci) => {
          const td = document.createElement(ri === 0 ? 'th' : 'td');
          td.contentEditable = true;
          td.style.cssText = 'border:1px solid #30363d;padding:4px 8px;min-width:60px;text-align:left;' + (ri===0 ? 'background:#21262d;font-weight:600;' : '');
          td.textContent = cell;
          td.addEventListener('blur', () => { if (!cards[i].rows) cards[i].rows = rows; rows[ri][ci] = td.textContent; saveBoard(); });
          tr.appendChild(td);
        });
      });
      el.appendChild(tbl);
      const addRow = document.createElement('button');
      addRow.textContent = '+ 행'; addRow.style.cssText = 'margin-top:4px;font-size:11px;background:#21262d;border:1px solid #30363d;color:#8b949e;padding:2px 8px;border-radius:4px;cursor:pointer;';
      addRow.onclick = e => { e.stopPropagation(); snapshot(); if (!cards[i].rows) cards[i].rows = rows; cards[i].rows.push(new Array(cards[i].rows[0].length).fill('')); renderCards(); saveBoard(); };
      const addCol = document.createElement('button');
      addCol.textContent = '+ 열'; addCol.style.cssText = 'margin-top:4px;margin-left:4px;font-size:11px;background:#21262d;border:1px solid #30363d;color:#8b949e;padding:2px 8px;border-radius:4px;cursor:pointer;';
      addCol.onclick = e => { e.stopPropagation(); snapshot(); if (!cards[i].rows) cards[i].rows = rows; cards[i].rows.forEach(r => r.push('')); renderCards(); saveBoard(); };
      el.appendChild(addRow); el.appendChild(addCol);
    }
    const rh = document.createElement('div'); rh.className = 'resize-handle';
    rh.addEventListener('mousedown', e => { e.preventDefault(); e.stopPropagation(); snapshot(); resizing = { idx: i, startX: e.clientX, startW: card.w || el.offsetWidth }; });
    el.appendChild(rh);
    if (i === selectedIdx) el.classList.add('selected');
    board.appendChild(el);
  });
  requestAnimationFrame(() => {
    let maxB = 0;
    document.querySelectorAll('.card').forEach(el => { const b = (parseFloat(el.style.top)||0) + el.offsetHeight; if (b > maxB) maxB = b; });
    board.style.minHeight = (maxB + 100) + 'px';
  });
}

document.addEventListener('mousemove', e => {
  if (moving) {
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`); if (!el) return;
    let nx = moving.origX + e.clientX - moving.startX, ny = moving.origY + e.clientY - moving.startY;
    if (e.shiftKey) { nx = snap(nx); ny = snap(ny); el.style.outline = '1px dashed rgba(240,192,64,0.3)'; } else { el.style.outline = ''; }
    el.style.left = nx + 'px'; el.style.top = ny + 'px';
  }
  if (resizing) {
    let nw = resizing.startW + e.clientX - resizing.startX; if (e.shiftKey) nw = snap(nw);
    cards[resizing.idx].w = Math.max(100, nw);
    const el = document.querySelector(`.card[data-idx="${resizing.idx}"]`); if (el) el.style.width = cards[resizing.idx].w + 'px';
  }
});

document.addEventListener('mouseup', e => {
  if (moving) {
    let nx = moving.origX + e.clientX - moving.startX, ny = moving.origY + e.clientY - moving.startY;
    if (e.shiftKey) { nx = snap(nx); ny = snap(ny); }
    cards[moving.idx].x = Math.max(0, nx); cards[moving.idx].y = Math.max(0, ny);
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`); if (el) { el.classList.remove('moving'); el.style.outline = ''; }
    if (e.shiftKey) pushCards(moving.idx);
    moving = null; saveBoard();
  }
  if (resizing) { if (e.shiftKey) pushCards(resizing.idx); resizing = null; saveBoard(); }
});

function addTextCard() { snapshot(); cards.push({ type: 'text', content: '', x: 50, y: window.scrollY+100, w: 300 }); renderCards(); setTimeout(() => { const els = document.querySelectorAll('.card .text'); els[els.length-1]?.focus(); }, 100); }
function addImageCard() { const input = document.createElement('input'); input.type = 'file'; input.accept = 'image/*'; input.onchange = e => { const f = e.target.files[0]; if (!f) return; const r = new FileReader(); r.onload = () => { snapshot(); cards.push({ type: 'image', src: r.result, x: 50, y: window.scrollY+100, w: 240 }); renderCards(); saveBoard(); }; r.readAsDataURL(f); }; input.click(); }
function addImageUrl() { const url = prompt('이미지 URL'); if (!url) return; snapshot(); cards.push({ type: 'image', src: url, x: 50, y: window.scrollY+100, w: 240 }); renderCards(); saveBoard(); }
function addTableCard() {
  const colsStr = prompt('열 수 (기본 3)', '3'); const cols = Math.max(1, parseInt(colsStr)||3);
  const rowsStr = prompt('행 수 (헤더 포함, 기본 4)', '4'); const rows = Math.max(1, parseInt(rowsStr)||4);
  snapshot();
  cards.push({ type: 'table', rows: Array.from({length: rows}, (_, ri) => Array.from({length: cols}, (_, ci) => ri===0 ? `열${ci+1}` : '')), x: 50, y: window.scrollY+100, w: Math.max(240, cols*100) });
  renderCards(); saveBoard();
}
function exportBoard() { syncText(); const blob = new Blob([JSON.stringify(cards, null, 2)], { type: 'application/json' }); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = SAVE_KEY + '.json'; a.click(); }
// ── Zoom ─────────────────────────────────────────────────────────────────────
let zoom = parseFloat(localStorage.getItem('zoom-' + SAVE_KEY) || '1.0');
function applyZoom() {
  const board = document.getElementById('board');
  board.style.transform = `scale(${zoom})`;
  board.style.transformOrigin = '0 0';
  document.getElementById('zoom-level').textContent = Math.round(zoom * 100) + '%';
  localStorage.setItem('zoom-' + SAVE_KEY, zoom);
}
function zoomIn()  { zoom = Math.min(3.0, parseFloat((zoom + 0.1).toFixed(2))); applyZoom(); }
function zoomOut() { zoom = Math.max(0.2, parseFloat((zoom - 0.1).toFixed(2))); applyZoom(); }
document.addEventListener('keydown', e => {
  if (e.ctrlKey || e.metaKey) {
    if (e.key === '=' || e.key === '+') { e.preventDefault(); zoomIn(); }
    if (e.key === '-')                  { e.preventDefault(); zoomOut(); }
    if (e.key === '0')                  { e.preventDefault(); zoom = 1.0; applyZoom(); }
  }
});
document.getElementById('board').addEventListener('wheel', e => {
  if (!(e.ctrlKey || e.metaKey)) return;
  e.preventDefault();
  e.deltaY < 0 ? zoomIn() : zoomOut();
}, { passive: false });
applyZoom();
function resetLayout() { if (!confirm('자동 재배치합니다.')) return; cards.forEach(c => { delete c.x; delete c.y; }); renderCards(); autoLayout(); }
// ── Floating format toolbar ───────────────────────────────────────────────────
const fmtBar = document.getElementById('format-toolbar');
function fmt(cmd) { document.execCommand(cmd, false, null); saveBoard(); }
function fmtLink() {
  const sel = window.getSelection();
  if (!sel || sel.isCollapsed) return;
  const url = prompt('링크 URL 입력', 'https://');
  if (!url) return;
  document.execCommand('createLink', false, url);
  // make links open in new tab
  sel.anchorNode?.parentElement?.closest('a')?.setAttribute('target', '_blank');
  document.querySelectorAll('.text a').forEach(a => a.target = '_blank');
  saveBoard();
}

// prevent format buttons from blurring contenteditable
fmtBar.addEventListener('mousedown', e => e.preventDefault());

document.addEventListener('selectionchange', () => {
  const sel = window.getSelection();
  if (!sel || sel.isCollapsed || !sel.toString().trim()) { fmtBar.style.display = 'none'; return; }
  // only show if selection is inside a .text element
  const anchor = sel.anchorNode;
  if (!anchor) { fmtBar.style.display = 'none'; return; }
  const textEl = anchor.nodeType === 1 ? anchor.closest('.text') : anchor.parentElement?.closest('.text');
  if (!textEl) { fmtBar.style.display = 'none'; return; }
  // position above selection
  const range = sel.getRangeAt(0);
  const rect = range.getBoundingClientRect();
  fmtBar.style.display = 'flex';
  const tbW = fmtBar.offsetWidth || 180;
  let left = rect.left + rect.width / 2 - tbW / 2;
  left = Math.max(8, Math.min(left, window.innerWidth - tbW - 8));
  fmtBar.style.left = left + 'px';
  fmtBar.style.top = (rect.top - 44 + window.scrollY) + 'px';
});

setInterval(saveBoard, 30000);
loadBoard();
</script>
</body>
</html>
