<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">

<title>싸이백업</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1e1e1e; color: #e0e0e0; font-family: 'Segoe UI', -apple-system, sans-serif; font-size: 15px; line-height: 1.6; padding: 20px 30px 60px; overflow-x: hidden; }
a { color: #6cb0f6; text-decoration: none; }
a:hover { text-decoration: underline; }
.title-bar { background: #3a3a5c; display: inline-block; padding: 6px 16px; font-size: 22px; font-weight: bold; color: #fff; margin-bottom: 4px; }
.date { color: #999; font-size: 13px; margin-bottom: 20px; }
.board { position: relative; }
.card { background: #2a2a2a; border: 1px solid #3a3a3a; border-radius: 8px; padding: 12px; position: absolute; cursor: grab; transition: box-shadow 0.15s; overflow: hidden; }
.card:hover { box-shadow: 0 0 0 1px #58a6ff; z-index: 10; }
.card.moving { opacity: 0.8; box-shadow: 0 4px 24px rgba(0,0,0,0.6); z-index: 100; cursor: grabbing; }
.card img { width: 100%; border-radius: 4px; display: block; }
.card .text { outline: none; min-height: 20px; white-space: pre-wrap; word-break: break-word; }
.card .text:focus { background: rgba(255,255,255,0.05); border-radius: 4px; padding: 4px; }
.card .text:empty::before { content: '텍스트 입력...'; color: #555; }
.card-actions { position: absolute; top: 4px; right: 4px; display: none; gap: 4px; }
.card:hover .card-actions { display: flex; }
.card-btn { background: #333; border: 1px solid #555; color: #ccc; border-radius: 4px; padding: 2px 6px; font-size: 11px; cursor: pointer; }
.card-btn:hover { background: #444; color: #fff; }
.resize-handle { position: absolute; bottom: 0; right: 0; width: 16px; height: 16px; cursor: se-resize; opacity: 0; }
.card:hover .resize-handle { opacity: 0.6; }
.resize-handle::after { content: ''; position: absolute; bottom: 3px; right: 3px; width: 8px; height: 8px; border-right: 2px solid #666; border-bottom: 2px solid #666; }
.card.selected { box-shadow: 0 0 0 2px #58a6ff; z-index: 5; }
.highlight-red { color: #ff6b6b; }
.highlight-blue { color: #6cb0f6; }
.highlight-gold { color: #f0c040; }
.toolbar { position: fixed; bottom: 0; left: 0; right: 0; background: #161b22; border-top: 1px solid #30363d; padding: 8px 20px; display: flex; gap: 12px; align-items: center; z-index: 200; }
.toolbar button { background: #21262d; border: 1px solid #30363d; color: #e0e0e0; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; }
.toolbar button:hover { background: #30363d; }
.toolbar .status { color: #8b949e; font-size: 12px; margin-left: auto; }
#format-toolbar { position: fixed; display: none; background: #1c2128; border: 1px solid #444c56; border-radius: 8px; padding: 4px 6px; gap: 2px; align-items: center; z-index: 500; box-shadow: 0 4px 16px rgba(0,0,0,0.5); }
#format-toolbar button { background: none; border: none; color: #cdd9e5; padding: 4px 8px; border-radius: 5px; cursor: pointer; font-size: 13px; line-height: 1; }
#format-toolbar button:hover { background: #373e47; }
#format-toolbar .sep { width: 1px; height: 16px; background: #444c56; margin: 0 2px; }
</style>
</head>
<body>
<div class="title-bar" contenteditable="true">싸이백업</div>
<div class="date">2015년 2월 13일 금요일</div>
<div class="board" id="board"></div>
<div id="format-toolbar">
  <button onmousedown="e=>e.preventDefault()" onclick="fmt('bold')" title="굵게"><b>B</b></button>
  <button onclick="fmt('italic')" title="기울임"><i>I</i></button>
  <button onclick="fmt('underline')" title="밑줄"><u>U</u></button>
  <div class="sep"></div>
  <button onclick="fmtLink()" title="링크 삽입">🔗</button>
  <button onclick="fmt('unlink')" title="링크 제거">✂</button>
</div>
<div class="toolbar">
  <button onclick="undo()" title="Ctrl+Z">↩ 실행취소</button>
  <button onclick="addTextCard()">+ 텍스트</button>
  <button onclick="addImageCard()">+ 이미지</button>
  <button onclick="addImageUrl()">+ 이미지 URL</button>
  <button onclick="addTableCard()">+ 표</button>
  <button onclick="saveBoard()">💾 저장</button>
  <button onclick="exportBoard()">📤 내보내기</button>
  <button onclick="resetLayout()">↺ 재배치</button>
  <button onclick="resetToDefaults()" style="color:#f85149">↺ 초기화</button>
  <div style="display:flex;align-items:center;gap:4px;margin-left:8px;border-left:1px solid #30363d;padding-left:12px;">
    <button onclick="zoomOut()" title="Ctrl+-" style="padding:6px 10px;">−</button>
    <span id="zoom-level" style="font-size:12px;color:#8b949e;min-width:36px;text-align:center;">100%</span>
    <button onclick="zoomIn()" title="Ctrl+=" style="padding:6px 10px;">+</button>
  </div>
  <span class="status" id="status">Ready</span>
</div>

    "html": "\r\n\t\t\t<table style=\"border:1px solid;border-collapse:collapse\">\r\n\t\t\t\t<tr>\r\n\t\t\t\t\t<td style=\"border:1px solid\">\t\t\t\t\t<ul>\r\n\t\t\t\t\t\t<li style=\"font-size:10pt\"><span style=\"color:#272727;font-weight:bold\">pure0cean@nate.com</span></li>\r\n\t\t\t\t\t</ul>\r\n\t\t\t\t\t</td>\r\n\t\t\t\t</tr>\r\n\t\t\t</table>\r\n\t\t\t<br />\r\n\t\t\t<cite style=\"font-size:8pt;color:#595959;margin-top:0pt;margin-bottom:0pt\">출처: &lt;<a href=\"https://cymember.cyworld.com/helpdesk/findIDByIpin.sk\">https://cymember.cyworld.com/helpdesk/findIDByIpin.sk</a>&gt; </cite>\r\n\t\t"

  {
    "type": "text",
    "x": 48,
    "y": 139,
    "w": 600,
    "content": "병 없이 신음하는 글을 짓지 말라\n출처: <<a href=\"http://q.cyworld.com/26745421/_index/home/?from=home\">http://q.cyworld.com/26745421/_index/home/?from=home</a>>\n&#160;\n\"봄이 속삭인다. 꽃 피라. 희망하라. 사랑하라.\n삶을 두려워하지 말라.\"\n&#160;\n&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160; &#160; _광화문에서 읽다 거닐다 느끼다\n출처: <<a href=\"http://q.cyworld.com/26745421/_index/home/?from=home\">http://q.cyworld.com/26745421/_index/home/?from=home</a>>\n성공에 대한 나름의 기준 없이\n성공을 좇으니, 걸어도 걸어도\n날은 어두워가고&#160;길은 멀기만 한&#160;것.\n&#160;\n\"돈을 벌기 위해서, 일하지 않는다.\"\n\"오늘 로또에 당첨되더라도, 내일 출근한다.\"\n&#160;\n어떤식으로 해석하든,\n이 두가지 명제가&#160;내 성공의 기준.\n즐기거나 혹은&#160;구애받지 않아도 좋거나.ㅎ\n&#160;\n어짜피 내가 하는 일들은,\n앞으로 해나갈 일들은,\n분명 즐거운 일은 아니지만,\n충분히 재미있는 일들이니까.\n출처: <<a href=\"http://q.cyworld.com/26745421/_index/home/?from=home\">http://q.cyworld.com/26745421/_index/home/?from=home</a>>\n내가 사랑하는,\n구름 본지 오래다.\n&#160;\n어쩌자고 그것을\n이 생활과 맞바꿔 버린 건지. ㅎ\n&#160;\n어른이 된다는 건\n참 억울한 일이야.\n그렇지 않아?\n&#160;\n불과 몇 년 전만 해도,\n철 없이,\n철이 없어서,\n만땅 행복했었잖아.\n&#160;\n어른들은 그래서들 그렇게\n우리를 질투하고 나무랐나 봐 ㅎ\n&#160;\n평생,\n그리운 님 얼굴보다\n컴퓨터 화면 바라볼 시간이 더 많은 팔자였는데,\n꼬맹이 땐 어찌나 콤퓨타 사달라고\n아부지를 달달 볶았었던지…\n&#160;\n평생 나잇값, 밥값 하려고\n아등바등할 팔자였는데,\n뭐 그리 조숙하려 애를 썼는지...\n&#160;\n지금,\n지금 밖엔 없ㅇㅓ.\n지금이 허락되는 때는.\n놀 수 있다면, 그래서 즐거울 수 있다면,\n좀더 놀아둬.\n&#160;\n산다는게 참 별 볼일이 없어서,\n참, 별일 없이 사는 일이\n제일 큰 일이어서,\n어른들은 그렇게들 호들갑을 떠는 거야.\n대소사 분간 없이,\n작은 일도 크게, 큰일은 더 크게 말이야.\n애달프지 ㅎ\n출처: <<a href=\"http://q.cyworld.com/26745421/_index/home/?from=home\">http://q.cyworld.com/26745421/_index/home/?from=home</a>>\n좋은 사람,\n그딴거 되고 싶지 않다.\n'좋은'이라는 것.\n어디까지나 타인의 관점,\n남에게 인정받고 귀여움 받으려는 심리가\n근저에 있음을 부정할 수 없다.\n애정결핍,ㅎ\n&#160;\n나쁜 사람이 되고 싶은 것도 아니다.\n내가 좋은놈이건 나쁜놈이건 그건\n남이 정의해준 나,\n너에게 나쁜 나일 뿐이다.\n&#160;\n그러니 그따위 기대는,\n애완동물에게나 하는거다.\n&#160;\n친구가 친구인 이유는\n함께한 좋은 시간 때문이지,\n착한놈이기 때문이라거나,\n철들고 지혜로워서가 아니다.\n친구는 악세서리가 아니니까.\n&#160;\n더불어, 철들었다는 말.\n몹시 기분나쁜 말이다.\n철이 들었다는건,\n어른들의 기대에 맞춰 살아갈 준비가 되었다는 것,\n타인의 기대에 싱크로되었다는걸 뜻할 뿐이다.\n그건, 지리한 삶에대한 모욕이다.\n&#160;\n우리는,\n'타인이 욕망하는 나'를 욕망하는 것으로\n자아를 지워가고 있다.\n변태같이.\n&#160;\n꼭, 좋은 사람으로 살아야할 이유가 있는가\n철든척 해야 할 필요가 있는가\n너는 대체 언제까지 다른 사람을 위해 사는척 하면서\n스스로를 피곤하게 할건데.\n&#160;\n내가 아닌 세상의 기대에 맞춰 사는 것에\n염증을 느껴.\n&#160;\n나는 나,\n내가 살아가기에 좋은 나이면 족하다.\n내가 사랑하기에 좋은 나이면 족하다.\n&#160;\n사람들이 나를 사랑한다면\n혹은 미워한다면,\n그건 만들어진 내가 아니라\n진짜 나여야만 한다.\n진짜 너여야만 한다.\n출처: <<a href=\"http://q.cyworld.com/26745421/_index/home/?from=home\">http://q.cyworld.com/26745421/_index/home/?from=home</a>>\n고향은,&#160;\n내겐 수면제와도 같다.\n수면제 반 알을 쪼개 먹고 잠든 후\n다음 날 오전 내내 느끼는 그 몽롱함.\n&#160;\n행복하고 포근하지만,\n거기에 머물러 버릴 것만 같아 두려운,\n자꾸만 잠들고 싶게 만드는\n따뜻한 이불 속 같은 느낌.\n&#160;\n서울에서의 나는\n다른 사람인양\n다른 사람들과 같은 양\n부와 커리어, 생경한 경험과 풍경들\n그리고 새로운 관계의 즐거움에 취해\n그저 쿨하게 산다.\n&#160;\n고향에 내려갔다 올 때마다.\n근본에서부터,\n삶의 근본에서부터 나를 다시 생각하게 한다.\n&#160;\n이 삶이,\n이 길이,\n진실로 내가 원하는 삶인가.\n왜, 이렇게 살아야만 하는가.\n끊임 없는 자문과 자답.\n&#160;\n그렇게,\n그렇게 살 수도 있는 것이었다.\n그렇게 평범하게 살아도 좋은 것이었다.\n&#160;\n열심히 준비해서,\n여러 군데 대기업에 원서를 내고,\n시골에서도 다 알만한\n부모와 친척, 친구들에게 부끄럽지 않은\n500대 기업의 고향 지점에서 근무하며,\n퇴근하면 익숙한 친구들과,\n익숙한 곳에서 맥주를 마시고\n때가 되면 좋은 여자 만나,\n우여 곡절 끝에 결혼하고,\n아이도 낳고,\n그렇게 흘러흘러 늙어갈 수도 있는 것이다.\n&#160;\n삶이 허무해질 때는\n이룬 것이 별로 없을 때가 아니라,\n정작 이룬다고 이뤄놓은 것들이\n사실 내가&#160;원하는 것이 아니었다는 것을\n깨달았을 때라고 한다.\n&#160;\n나는 그저 묻는 것이다.\n매일을 같은 것을 내게 묻는 것이다.\n이 것이 내가 원하는 삶인가.\n내 선택은 자유로운가.\n&#160;\n나는 인생은 선택의 연속이라기 보다\n포기의 연속이라고 생각해왔다.\n하나의 선택으로 인해 포기해야 할 것들이 더 많고,\n그 숱한 포기들 덕분에\n머무르고 있는 이 순간이 비로소 의미를 지니는 것이기에.\n&#160;\n그리고 나는,\n이번 연휴를 보내고 돌아오면서\n포기해서는 안될 그 무언가를\n포기하려고 하는 것은 아닌지\n다시 고민하게 되었다.\n&#160;\n삶에 있어서 가장 중요한 그 것.\n행복,\n그리고 행복을 위한 필요충분 조건.\n삶에 대한 낙관, 내가 좋아하는 일, 누릴 수 있는 마음의 여백,\n타인과 비교치 않는 자존감, 그리고 내게 잘 맞는 짝.\n그것이 미루거나 축적할 수 있는 것이 아님을 잘 알면서도\n나는 행복을 유보하고 있는 것인지도 모른다.\n&#160;\n다만 나는\n내게 다시 한번 기회가 있을 것이라고 믿는 것이다.\n그리고 그 단 한번의 기회를 지키기 위해서는\n내게 힘이 있어야 함을 잊지 않는 것이다.\n무언가를 시도할 때에는,\n그것의 가능성을 점치며 불안해 할 것이 아니라\n어떻게 하면 그것을 이룰 수 있을지에\n모든 역량을 모아야만 한다.\n&#160;\n내가 무언가를 하려고 할 때,\n팔짱 끼고서 그것의 성패를 예단하는 사람은\n내 벗을 가장한 적일 뿐이다.\n시기와 질투를 삶에 끌어들일&#160;필요는 없다.&#160;\n현실이라는 단어를,\n'벽'이라는 의미로 내게 사용한다면,\n철없는 나의 친구가 될 수 없다.\n&#160;\n삶은 책과도 같다.\n누군가에게는 이미 씌여진, 읽어야 할 책이고,\n다른 누군가에게는 매일 설레임으로 써나가는 책.\n&#160;\n여튼,\n올해 내가 저지르고 있는,\n또 저지를 몇 가지의 일들이\n적어도 서른 중반까지의\n내 커리어와 부를, 그리고 행복을&#160;결정지을 것이다.\n올해 안으로 내 청춘을 쇼부 볼 것이다.\n이것은 내가 시작한 싸움이지만,\n우리가 끝내야 할 싸움이다.\n나는 내 등을 바라봐주는 이들을 잊지 않는다.\n나는 대안적 삶을 보여주는 것으로\n그들에게 답할 것이다.\n심지어 내게 아무런 기대를 하지 않는 이들에게 까지도.\n내가 좀 이상하다는걸 진작에 눈치채고 있었다면,\n내 결론도 해법도 좀 이상할 거라는 걸 알아주라.\n부디, 응원해주라!\n출처: <<a href=\"http://q.cyworld.com/26745421/_index/home/?from=home\">http://q.cyworld.com/26745421/_index/home/?from=home</a>>\n나르시스트 처럼 보일지라도\n오만할 정도의 자신감을 잃지 말자.\n조금 미친 것 같아 보여도 좋다.\n지극히 발랄하게 살자.\n&#160;\n조금 더,\n내가 가꿔온 호기심과, 본능을 믿어주자.\n&#160;\n패자부활전,\n겨우 승기를 잡았고. 이제 시작이다.\n&#160;\n다른 리그이고,\n다른 나여야 한다.\n원래의 나여야 한다.\n&#160;\n마음의 목소리에 귀기울여, 망설임 없어야 한다.\n본능을 믿자.\n출처: <<a href=\"http://q.cyworld.com/26745421/_index/home/?from=home\">http://q.cyworld.com/26745421/_index/home/?from=home</a>>\n만일 네가 모든 걸 잃었고 모두가 너를 비난할 때\n너 자신이 머리를 똑바로 쳐들 수 있다면,\n만일 모든 사람이 너를 의심할 때\n너 자신은 스스로를 신뢰할 수 있다면,\n만일 네가 기다릴 수 있고\n또한 기다림에 지치지 않을 수 있다면,\n거짓이 들리더라도 거짓과 타협하지 않으며\n미움을 받더라도 그 미움에 지지 않을 수 있다면,\n그러면서도 너무 선한 체하지 않고\n너무 지혜로운 말들을 늘어놓지 않을 수 있다면,\n만일 네가 꿈을 갖더라도\n그 꿈의 노예가 되지 않을 수 있다면,\n또한 네가 어떤 생각을 갖더라도\n그 생각이 유일한 목표가 되지 않게 할 수 있다면,\n그리고 만일 인생의 길에서 성공과 실패를 만나더라도\n그 두 가지를 똑같은 것으로 받아들일 수 있다면,\n네가 말한 진실이 왜곡되어 바보들이 너를 욕하더라도\n너 자신은 그것을 참고 들을 수 있다면,\n그리고 만일 너의 전생애를 바친 일이 무너지더라도\n몸을 굽히고서 그걸 다시 일으켜 세울 수 있다면,\n한번쯤은 네가 쌓아 올린 모든 걸 걸고\n내기를 할 수 있다면\n그래서 다 잃더라도 처음부터 다시 시작할 수 있다면,\n그러면서도 네가 잃은 것에 대해 침묵할 수 있고\n다 잃은 뒤에도 변함없이\n네 가슴과 어깨와 머리가 널 위해 일할 수 있다면\n설령 너에게 아무것도 남아 있지 않는다 해도\n강한 의지로 그것들을 움직일 수 있다면\n만일 군중과 이야기하면서도 너 자신의 덕을 지킬 수 있고\n왕과 함께 걸으면서도 상식을 잃지 않을 수 있다면\n적이든 친구든 너를 해치지 않게 할 수 있다면\n모두가 너에게 도움을 청하되\n그들로 하여금\n너에게 너무 의존하지 않게 만들 수 있다면\n그리고 만일 네가 도저히 용서할 수 없는 1분간을\n거리를 두고 바라보는 60초로 대신할 수 있다면\n그렇다면 세상은 너의 것이며\n너는 비로소\n한 사람의 어른이 되는 것이다\n/루디야드 키플링\n&#160;\n____________________________________\n&#160;\n다만 나는 또다시,\n내게 묻는 것이다.\n&#160;\n나는 왜,\n살아가고 있는 것인가.\n&#160;\n내가 좇던 것은 꿈이었나, 목표였나, 자긍이었나, 명예였나,\n그것도 아니면 과거의 나에대한 동경인가.\n&#160;\n고향을 등진 이후로, 이유로...\n모든 것을 버렸고, 모든 것을 잃었다.\n이제 나는 어찌 살아도 좋은 것이다.\n&#160;\n집착할 것 없는, 자유.\n10년 후의 내게 부끄럽지 않을 선택을 하자.\n출처: <<a href=\"http://q.cyworld.com/26745421/_index/home/?from=home\">http://q.cyworld.com/26745421/_index/home/?from=home</a>>\n스물 일곱,\n꿈을 말하면, 정신차리라는 말이 되돌아 오는 나이.\n&#160;\n내가 학교를 떠났던건,\n그 열패감과 그것을 서로에게 학습시키는 바보들...\n니가 안되는 거지 '우리'가 안되는건 아니다.\n&#160;\n난 다 이루고 살았다.\n이십대.\n미치도록 원했던 것들 중에 구하지 못하였던 것은 없다.\n&#160;\n결국 모든 오늘은,\n내 오래된 공책 속의 기록된 미래.\n&#160;\n하여, 나는 다시&#160;쓴다.\n&#160;\n올해는\nProduct Manager, 그리고 BM\n7년 전 그렸던 내 Dream Job을 이룰 수 있는 회사에 가겠다.&#160;\n&#160;\n올해는\n뉴욕에서 한달을 머물거고\n&#160;\n올 크리스마스에는\n죄스러울만치&#160;내 심장 뛰게했던 너를&#160;만나고 싶다.\n&#160;\n긴 휴가와 연휴,\n보고 싶은 사람만 만났다.\n먼지같은 그리움 쓸어내니 고향은 모처럼 천국이 되어주었다.\n&#160;\n그 중에서도,\n나 때문에 웃던 네 모습 본 것이 가장 기쁘다.\n기쁘다.\n출처: <<a href=\"http://q.cyworld.com/26745421/_index/home/?from=home\">http://q.cyworld.com/26745421/_index/home/?from=home</a>>\n◆기적의 나라 한국=미슐랭은 한국을 “한국전쟁 이후 38년 만에 1인당 국민소득이 243배 증가한 기적의 나라”라고 소개했다. 특히 2009년 한국의 아랍에미리트 원전 수주 사실을 크게 다뤘다.\n고도 경제성장의 그늘에 대해서도 지적했다. 미슐랭은 한국을 “경제협력개발기구(OECD) 국가 중에서 자살률이 가장 높은 동시에 출산율은 가장 낮은 나라”라고 설명했다. 경제활동 인구의 수면시간(하루 평균 7시간49분), 주말 자유시간(1인 평균 6시간27분)도 OECD 국가 중에서 가장 적다고 공개했다.\n출처: <<a href=\"http://q.cyworld.com/26745421/_index/home/?from=home\">http://q.cyworld.com/26745421/_index/home/?from=home</a>>\n기성세대의 가치관으로부터 우리의 행복을 지켜야한다.\n인간에게,\n믿음보다 강한 구속력은 없다.\n&#160;\n믿어라,\n그리 되리라.\n&#160;\n믿어 주어라,\n그리 되리라.\n출처: <<a href=\"http://q.cyworld.com/26745421/_index/home/?from=home\">http://q.cyworld.com/26745421/_index/home/?from=home</a>>\n꼭 이루기 위해서, 반드시 이루기 위해서\n나는 꿈을 글로쓰고, 사람들에게 말해요.\n말에는, 주술적인 힘이 있다고 나는 믿거든요.\n&#160;\n저는요 자본주의의 나팔수, 마케터에요.\n&#160;\n마케터라고 하면 다들 있어보인다고 하고 우쭐우쭐할때도\n있지만요, 사람의 인식 레벨에서 벌이는 전쟁인 마케팅.\n기업의 압도적 자원을 좌지우지 하는 마케팅,\n사람이 보고, 듣고,&#160;사고하는 방식에&#160;지대한&#160;영향을 미치는 마케팅,\n이 칼을 잘못 휘두르게되면, 사람들의 삶을 얼마나 크게 다치게 할 수 있는 작업인지를 이해하고, 그에 대해서 책임감을 느껴요.\n사실 그래서 저는 마케팅을 배워요, 공부해요.\n&#160;\n저열한 마케팅을 부수고, 대안을 제시할 수 있는 마케터.\n자존감을 갉아먹는 마케팅에 대한 대안을 줄 수 있는 마케터.\n실천 가능한&#160;대안이 되고 싶어요.\n&#160;\n넘치는 불만과 비판만으로는 실천없는 희망만으로는\n세상을 바꿀 수 없는 거니까요.\n&#160;\n그리고,\n저&#160;혼자서는 못해요.\n&#160;\n오늘은 제 스물 일곱번째 생일이에요.\n약속하는 거에요. 늘 연습장에 끄적거리던 미래의 한 자락에\n도착한 나를 대견하게 여기고, 또 동시에 다음 퀘스트를\n끄적거려 보는 거에요.\n&#160;\n그리고 이건 사실 굉장히 이기적인 동기에서 나온 꿈이에요.\n어짜피 우리가 target이라 부르는건 내 동생, 내 아버지, 어머니,\n친구, 누나, 형님이니까... 그냥 그런거에요. 자존감을 지키며,\n분수에 어울리는 소비를 하고, 없어도 재미나고 행복하게\n살자.\n출처: <<a href=\"http://q.cyworld.com/26745421/_index/home/?from=home\">http://q.cyworld.com/26745421/_index/home/?from=home</a>>\n나 자신을&#160;용서하기 위해 시작한 여정,\n이제 겨우 문턱에 다다랐네 ㅎ\n&#160;\n나는, 내가 입학했을 때.\n내가 지방대 출신이라고 해서\n학벌이 장애가 될수는 있지만,\n학력이 장애가 되어서는 안된다고 생각했었어.\n&#160;\n단 한순간도, 지방대 학벌을 가졌다고해서\n지방대 학력을 가져야 한다고 생각해본적 없었어.\n그게 내 자신감의 근간이었지.\n&#160;\n하지만,\n3년전 조서환님의 모티베이터를 읽었던 그날 새벽.\n&#160;\n아직도 '지방대 치고 이정도면...'이라고\n스스로의 한계를 못 박고 있었던 내 자신과 대면했고.\n한심해서, 내가 너무 한심하고 내가 품은 꿈에 미안해서\n펑펑 울었어.\n&#160;\n한 팔을 잃고도 아내와 가족을 지키기 위해 그렇게 삶을 태우는데,\n나는 내가 과연 마케터가 될 수 있을지에 대해서도\n스스로를 의심하고 있었고, 사랑하는 사람을 지킬 수 있을지,\n결혼은 할 수 있을지. 불확실한 미래에 대한 두려움을 떨치려\n이것저것 붙잡고 읽고, 뛰고, 듣고, 스펙 쌓고...\n나 자신이 아니라, 내 생활을 꾸미는게 고작이었지.\n어찌되었든 나는 파산한 집안의 장남이었으니까.\n성공이아니라, 행복만이라도 지킬 수 있길 바랬던거지.\n&#160;\n할 수 있다!라고 외치는 것이 두려움의 발로라는 것을\n그 때, 깨달았어.\n&#160;\n사실, 그냥 하면 되는 건데말야.\n그냥 믿어버리면 되는건데 말야. ㅎ\n&#160;\n우습게도, 나는 내가 그 때 가지고 있던 것들을\n지키기 위해서 내가 가지고 있던 것들을 떠났어.\n&#160;\n미래에도 그것들을 내가 누릴 수 있을지,\n이렇게 나약한 나로 미래에도 그녀를 지켜낼 수 있을지,\n스스로를 믿지 못했으니까.\n&#160;\n그리고 모든 것을 다시 시작했지, 모든걸.\n그렇게 인도로 떠난건 내 생애 가장 위대한 실수였어.\n&#160;\n그리고 드디어 나는, 스스로를 용서할 수 있게된 것 같아.\n나는 내가 걷고 있는 길, 그리고 나 자신이 꽤 맘에들거든.\n&#160;\n많은 돈을 벌지 못한다거나 많은 사람을 친구로 두지 못하는 것보다 훨씬 두려운건, 내가 되고 싶은 나 자신이 되지 못한채, 죽음을 맞는 일이야.\n&#160;\n\"궁극의 나\"에 대한 호기심.\n&#160;\n왜 사냐는 물음에 대한 나의 대답이야.\n&#160;\n살고 싶은 삶이 있는데,\n한계에 대한 의심이나 두려움, 주변의 시선 때문에\n그걸 외면하는 건.\n삶에 저지를 수 있는 최고의 죄악이야.\n출처: <<a href=\"http://q.cyworld.com/26745421/_index/home/?from=home\">http://q.cyworld.com/26745421/_index/home/?from=home</a>>\n갈망하였으나,\n할 수 있을지, 이룰 수 있을지 두려워하던 것들을\n이뤄내고, 하고 있다는 것이\n삶에 있어서 얼마나 큰 기적이고 기쁨인가.\n&#160;\n과연, 살아볼만 하지 않은가.\n&#160;\n삶속에서 위대한 즐거움은,\n할 수 없을 거라&#160;여겼던 일들을 하고 있는 것이다.\n&#160;\n내게 학벌이 장애가 될지는 모르나,\n학력이 장애가 되도록 둘 수는 없었다.\n&#160;\n다만, 스스로를 가르치는 것을 멈추지 않는 것이다.\n&#160;\n감사,\n출처: <<a href=\"http://q.cyworld.com/26745421/_index/home/?from=home\">http://q.cyworld.com/26745421/_index/home/?from=home</a>>\n찻잔이 흔들려 물 몇 방울을 쏟는 것에 일희일비 하지 말자.\n현상과 상황이 뒤틀리는 것이 문제가 아니라,\n그것을 오역하고 감정을 쏟는 가벼움이 상황을 악화시킨다.\n&#160;\n이는&#160;바람에&#160;흔들리는&#160;가지 끝 나뭇잎처럼,\n상황은 단지 유동적일 뿐 결정적이지 않다.\n바람은 언제나 불어오기 마련이고,\n낙엽이 되기 전까지는 끝난 것이 아니다.\n&#160;\n삶이라는 문장의 접속사가\n'그래서'인 적은 별로 없었다.\n'그럼에도 불구하고' 살아 내는 것이다.\n&#160;\n열정이라 쓰고 인내라 읽어야 한다.\n기다리고 또 기다린 후에라야,\n한번을 더 기다릴 수 있는 기회를 얻는다.\n&#160;\n어짜피 한 생,\n한판의 게임이고\n나는 말일 뿐이다.\n끊임없는 가설검증과 스릴을 허락하자.\n출처: <<a href=\"http://q.cyworld.com/26745421/_index/home/?from=home\">http://q.cyworld.com/26745421/_index/home/?from=home</a>>\n언제까지,\n이길 수도 있는 게임에만 뛰어들건가.\n\"싸움에서 이길 수 없다면, 전장을 바꿔라.\"\n&#160;\n게임의 룰은 누가 만드는가,\n그건 언제나 승자다.\n전장의 룰은 누가 만드는가,\n그자가 바로 승자다.\n&#160;\n학벌로 부술 수 없는 천장이라면\n다른게 필요한거 아냐?\n&#160;\n왜, 되지도 않는 싸움에 인생을 허비하는거야.\n&#160;\n누군가 나보다 앞서 달려 나갔다면,\n열심히 달려 나가는 걸로는 절대 못이겨.\n세상은 토끼와 거북이의 싸움이 아니라.\n멈춰서지 않는 토끼들간의 싸움이니까.\n&#160;\n차를 타든, 다른 길로 돌아가든.\n다른 방법이 필요한데,\n왜 자꾸 그들의 룰대로 움직이면서,\n패배했다고 자조하고 낙망하는가.\n&#160;\n이길 수 있는 곳에서\n이길 수 있는 방법으로 싸워야만 한다.\n&#160;\n누가 거미줄 위에서 거미를 잡아 삼키겠나...\n승자가 만든 룰안에서는 운신의 폭이 좁을 수 밖에.\n&#160;\n게임의 룰을 바꾸려면,\n내가 승자가 되어야만 하기에.\n이지랄 하고 있는 것뿐.\n&#160;\n미국을 압도할만한 포텐셜을 가진 중국이\n고전하는건 왜 일까?\n판은 미국이 이미 짜놓은 자본주의 판이니까.\n&#160;\n그 틈바구니에서, 미국 따라가는 우리나라가\n진짜 강대국이\n출처: <<a href=\"http://q.cyworld.com/26745421/_index/home/?from=home\">http://q.cyworld.com/26745421/_index/home/?from=home</a>>\n\"사자는 사자로 태어나서가 아닌,\n사자로 길러졌기 때문에 사자가 된다.\"\n&#160;\n단 한순간도\n같은 학벌을 가졌다고해서\n같은 학력을 가져야만 한다고,\n생각해 본 적 없다.\n&#160;\n이제,\n이빨을 드러낼 때다.\n출처: <<a href=\"http://q.cyworld.com/26745421/_index/home/?from=home\">http://q.cyworld.com/26745421/_index/home/?from=home</a>>\n내겐 깊은 병이 있었다. 이젠 가난이 싫다. 가끔 집에 내려갈때마다 만져본다. 10년전에 온 집안 가구에 붙었던 그 빨간 딱지들, 그럼에도, 내 형편에, 내 분수에 맞지 않게 이기적으로 살았던 대학생활. 나는 그 선택이 대견하다. 돈이야 아끼고 벌 수도 있는거고, 있다가도 없고, 없다가도 있을 수 있는거지만, 그 시절은 일생에 한번 뿐이었으니까. 반짝반짝, 그래 나는 행복했었다. 정말로. 분에 넘치게 행복했다. 알고 있었다.\n&#160;\n파산한 집안의 장남으로 남몰래 비틀거렸지만, 알바와 공부와 성공과 부를 담보해줄 것 같은&#160; 갖가지 일에 내 가장 빛나는 날들을 쏟아버릴 수 있었지만, 나를 그럴 용기가 없었다. 그 시간에 내가 낼 수 있는 가장 밝은 빛으로 그 시간을 채우고 싶었다. 그 시간에만 할 수 있는 일들로, 그 시간을 채워야 함을 알고 있었다. 그건 굉장히 이기적인 선택이었지만, 나는 그게 부끄럽지 않다.\n&#160;\n파란만장하게 살아왔다&#160; 하는 놈들은 철도 일찍들고, 건실하게 사는 모양새를 보이곤 하지만, 속으로는 모난 구석이 많다. 애정결핍에 피해의식도 곁들여진 경우가 많다. 자신이 상처 받았으니 자신이 타인에게 주는 상처쯤은&#160;얼마쯤 용인될 수 있는거라 믿는다. 내가 그렇게 살았어야 하는가. 아니다. 후회는 없다.\n&#160;\n축제가 막을 내릴 때쯤 이제는 인정해야만 했다. 취업 결혼 대학원... 내가 앞에 놓여진 갖가지 이벤트를 이제 온전히 내 힘으로 해내야 한다는거. 보통 돈을 벌어서는 내 옆에 그 사람, 지킬 수 없을 것 같았고, 그렇다고 곁을 지킨다고 언제까지고 지켜지지는 않을터. 그렇게 나약하고 어리던 나는 불안감을 못이긴채, 또 꿈이라는 한단어에 미쳐서는...&#160;내 꿈의 절반을 날려버린채 떠나왔다. 그땐 그게 최선이었으니까, 내 그리던 미래의 반쪽은 점점 모양새를 갖춰가고, 성공의 기준이야 고민해볼 일이지마는 그것이 그리 멀어보이지 않는다. 그 선택들이 최선이었음을 믿는다. 그래서 후회할 수가 없다.\n&#160;\n내, 한번도 말한 적 없으니, 알아주지 못한 네 녀석들이 야속하다 할맘도 없었다. 그래도 가끔은 위로받고 싶다. 단순히 지나간 누군가에대한 집착 정도였다면, 내 이 긴 시간을 앓고 또 앓지는 않았을거다. 그 여자는 스무 한 살,&#160;나의 꿈이었다.\n&#160;\n누군가를 그리워 해본 네가,\n내게 그래서는 안되는거였다.\n아직도 누군가와 함께한 시간을&#160;종일 그릴 때가 있는 사람이라면,\n내게 그런 말을 해서는 안되는거였다.\n&#160;\n그리움도 외로움도 아니다.\n다만, 내 몫이 아님을 인정하기에 더 아프고, 납득하기에 더 슬픈.\n안타까움에 대한 이야기다.\n출처: <<a href=\"http://q.cyworld.com/26745421/_index/home/?from=home\">http://q.cyworld.com/26745421/_index/home/?from=home</a>>\n그러케 나이스하게 보일 필욘 없는거,\n기냥 내가 좋아할 수 있는 나이면 족한거,\n출처: <<a href=\"http://q.cyworld.com/26745421/_index/home/?from=home\">http://q.cyworld.com/26745421/_index/home/?from=home</a>>\n힘들고 고되게 사는 오늘을,\n엿바꿔 먹듯이\n미래의 행복과 바꿀 수 있다는&#160;\n무척 행복한 착각들.\n열정이라는 이름으로 자위해봐도\n현재를 미래에 저당잡힌채 살아왔다는걸\n깨달았을 땐 이미 돌이킬 수 없는 시간들을 마주해.\n그곳이 아니라면 당장 박차고 나와,\n네 삶에, 네 자신에게 미안하지 않냐고 나는 묻고 있는거야.\n너무 늦었다는 변명은 스스로에게 할 수 있는&#160;\n가장 비겁한 말이야.\n한순간 만이라도\n나를 위해 살자.\n치열한 삶이 행복을 보장해주는 것은,\n몰입 그 자체로 행복할때, 뿐이야.\n\"삶에 있어서 중요한 것은\n속도가 아닌 방향이다.\"\n내 늘상 말하듯,\n우리는 소비하기 위해서,\n오늘도 소비되어지고 있을 뿐.\n다음달에 지를 것들 덕분에 행복한 너와,\n사무실 칸막이 틈새에서 절망하는 너.\n출처: <<a href=\"http://q.cyworld.com/26745421/_index/home/?from=home\">http://q.cyworld.com/26745421/_index/home/?from=home</a>>\n대부분의 사람은,\n생존을 위해 취업전선에 뛰어든다.\n그리고 그 다음엔,\n생존 이상을 보장하는 돈을 만지게되고,\n그간 가지지 못했던 것들에 관심을 돌린다.\n월급이 마약이라는,\n소비를 위해 소비되어지는 자신.\n자신이 가지고 싶었던 가지고 싶어지는 것들을 가지기 위해,\n자기 자신이 가져야 하는 것과,\n자기 자신마저 갖지 못하게 된다.\n회사가 더러워서가 아니라,\n떠나갈 목표가 있기에 사표를 쓰는 사람들은\n내가 만난 그 사람들은\n그런면에서 정말 반짝거렸다.\n아름다웠다.\n언젠가 나아지겠거니 하는 헛된 희망이 아닌,\n꿈을 잊지 않는 사람,&#160;\n너무 사랑스러운 사람들이다.\n출처: <<a href=\"http://q.cyworld.com/26745421/_index/home/?from=home\">http://q.cyworld.com/26745421/_index/home/?from=home</a>>\n인생은 한번뿐,&#160;\n후회하지마요\n진짜로,&#160;\n가지고 싶은걸 가져요.\n정말 가지고 싶은 것\n정말 하고 싶은 일\n제일 좋은 그 하나면 되는거!\n가끔 잊고산다\n난 그래도 꽤,\n행복하다는걸\n출처: <<a href=\"http://q.cyworld.com/26745421/_index/home/?from=home\">http://q.cyworld.com/26745421/_index/home/?from=home</a>>\n뭔가 주어지면 누구보다 열심히 하겠다는건 정말 딱한 말이야,\n열정이 없는게 문제가 아냐, 목표가 없는게 문제지.\n&#160;\n\"삶에 있어 중요한 것은 속도가 아닌 방향이다.\"\n출처: <<a href=\"http://q.cyworld.com/26745421/_index/home/?from=home\">http://q.cyworld.com/26745421/_index/home/?from=home</a>>\n누군가를 몹시 탓하고 싶었는데,\n그 누군가가 실은 나라는 걸 깨달았을 때.\n&#160;\n나를 온전히 위로해줄 수 있는 것은\n나 자신 뿐이라는 것을 깨달았을 때.\n&#160;\n난 더이상은 어리광 피울 수 없는,\n어른이 되어버렸다는 것을\n인정해야만 했다.\n출처: <<a href=\"http://q.cyworld.com/26745421/_index/home/?from=home\">http://q.cyworld.com/26745421/_index/home/?from=home</a>>\n진심으로,\n그리고 전심으로,\n내 인생을 걸고 원하는 것이라면.\n남들이 뭐라 말하든,\n한번 더 내게 기회를 줘도 좋지 않은가.\n검증 받아야 하는 것,\n그리고 남들이 인정해줘야만 하는 것은\n신념이 아니다.\n신념은, 그것을 믿는 나 자신을 믿어주는 일이다.\n그리고 신념의 목소리를 배반하는 것은,\n행복을 저버리는 일이기도 하다.\n아침에 눈을 떳을 때, 설레여 본적이 언제인가.\n참, 좋다.\n출처: <<a href=\"http://q.cyworld.com/26745421/_index/home/?from=home\">http://q.cyworld.com/26745421/_index/home/?from=home</a>>\n그 어떤 새도\n자신이 깨고 나온 껍질,\n그리고 그 둥지&#160;속에서&#160;\n살다가, 삶을 마치진 않아.\n그때, 내가 그 포근함에 취해있었다면,\n내 그릇은 내 꿈은 절망했겠지.\n어쩌면 나는,\n지금 이 시간을 위해\n지난 나날들을 그렇게\n살아왔던건지도 몰라.^^\n출처: <<a href=\"http://q.cyworld.com/26745421/_index/home/?from=home\">http://q.cyworld.com/26745421/_index/home/?from=home</a>>\n이 나라의 고목들이\n자라나던 우리에게 남긴 것은\n그네들이 해왔던대로\n아니 되도록 더 치열하게\n노력해서 성공하고 인정받으며\n죽어버리는 것 뿐이더냐\n매 순간이 결과이고\n따라서 매순간을 느껴야 함을 모르고\n미래 어느날에 못 박힌 영광만을 좇아\n젊음을 태우고 나선, 다시 젊을 좇아\n남은 생과 재산을 소진한다\n행복은 가르치는 법이 없었다\n늘 생존과 존귀해 넘치는 명예만을 가리켰을 뿐\n진짜, 어르신은 정말 몇 없다\n철든척 어른놀이 하는 비겁자들\n출처: <<a href=\"http://q.cyworld.com/26745421/_index/home/?from=home\">http://q.cyworld.com/26745421/_index/home/?from=home</a>>\n\"세상을 바꾸기 위한 싸움은 절대선인 사람들과 절대악인\n사람들 사이에서 일어나는 게 아니라 자기성찰이 가능한 사람들과 자기성찰이 부족한 사람들 사이에서 일어나는 것이다.\"\n&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;\n&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160; _ 김규항 <B급 좌파> 中\n'나'라는 우주 조차 헤아리지 못하면서,\n섣불리 서로를 말하고,\n세상을 말한다.\n출처: <<a href=\"http://q.cyworld.com/26745421/_index/home/?from=home\">http://q.cyworld.com/26745421/_index/home/?from=home</a>>\n돈은 개처럼 아껴쓰자\n하지만&#160;\n사람에게 쓰는 돈은 아끼지 말자&#160;\n낭비가 없을 것이고, 반드시 돌아온다\n그리고 돈이 없어질지라도,&#160;사람이 남는다\n출처: <<a href=\"http://q.cyworld.com/26745421/_index/home/?from=home\">http://q.cyworld.com/26745421/_index/home/?from=home</a>>\n마케팅을 미화할 생각은 없다.\n어짜피 마케팅은 도구, 마케터는&#160;술자.\n마케팅은 어짜피 Make More Money.\n회사에 가면 더러운 일도 내 손으로 해야할지 모른다.\n그것을 정당화 하려고 노력할 수도,\n그런 현실에서 달아나려 할수도\n그 아닌 다른 대안을 찾아낼 수도 있겠지만...\n여튼, 마케터는 백정이나 다름 없다.\n시기하고, 질투하고 남보다 더 나은 내가 되기위해\n이것을 사야한다고 속삭인다.\n물론, 바른 마케팅을 하고 있는 훌륭한 기업과 마케터도 있긴 하다.\n하지만 인간의 말초적 욕망을 자극하는 것이\n가장 직관적이고 효과적이기 때문에, 그러한 행태를 보이는 것이다.&#160;\n얼마나 많은 광고들이 여자를 침대까지 데려가기 위해\n우리차를 사야하고, 우리 빤쮸를 입어야하며, 우리 제품을 사야만\n한다고 말하고 있는가. 그것이 광고쟁이들만의 허물인가.\n백정을 업으로 삼았다고,&#160;\n그의 영혼이 백정인 것은&#160;아닐터,&#160;\n하지만 백정 취급을 받는다.\n고고한 척, 깨끗한 일만 하고 살겠다는 것은&#160;정말로 철없는 소리.\n내 이상에 이르기도 전에, 세속적인 삶의 늪에 빠져버릴 것이 겁나.\n먹고 산다는게 그런거라고, 선배들은 늘 말하잖아.\n마케팅을 배우기 위해 취업하려는 거지,\n취업 때문에 마케팅을 배우는건 아냐.\n내가 이루고자 하는 일에 마케팅이 필요하다고 판단했을 뿐,\n마케팅이 궁극적 목표는 아냐.\n우리는 오늘도 소비하기위해 소비되어지고 있어,\n그걸 느껴?\n출처: <<a href=\"http://q.cyworld.com/26745421/_index/home/?from=home\">http://q.cyworld.com/26745421/_index/home/?from=home</a>>\n나는 내게 용서 받고 싶었다.\n섣불리 스스로를 폄하하고, 날개를 접었던 내 나약함에\n내 작은 그릇안에서 울부짓던 나를 외면하던 내게&#160;\n용서받고 싶었다.\n___________________________________________________\n마케터라는 꿈을 가지게 된건 한 이년 전쯤이었던 것 같아.\n폼나잖아, 그럴싸하고...전략 짜고, 프레젠테이션 멋드러지게 해주고..\n어린마음에 동경을 품기 좋은 대상이었지.\n그래서 이리저리 각을 재봤지만, 결론은 힘들다였지,&#160;\n그리고 그땐, 힘들다는 걸, 안된다는 말로 스스로에게&#160;\n납득 시켰어.\n남들처럼, 고향에 있는 대기업 어느 지점에 들어가서 지지고 볶으며\n평탄하게 사는 것도 나쁘지 않을거라 생각했어.\n왜냐면, 그때는 음... 행복했으니까. 그 나날들이.\n하지만 점점 불안감은 커졌지, 이대로는 미래의 행복을\n지킬 수 없을거란 불안감. 남자는 다 그렇잖아...\n강해져야, 능력있어야, 자신의 행복을 지킬 수 있을거라는\n나약한 그렇지만 꽤 현실적인 믿음.\n그래서 남자는 배, 여자는 항구....뭐 그런거지.\n그렇게 한 해가지난 어느 겨울밤, 책 한권을 한 삼일정도에\n읽는 편인데... 유독 그 날밤 단숨에 읽어버릴 수 밖에 없던\n책이 있었지. 모티베이터라고.... 지금은&#160;\n팔하나를 잃고도 자기를 믿어주는 아내를 위해 악착같이 살았고,\n팔하나가 없이도, 스스로를 믿고 스스로를 일으켰어.\n너무 부끄럽고 수치스럽고, 내가 불쌍해서 울어버렸어...\n고작, 고작 이 현실에 쉬이 꿈을 넣어버렸던 내가\n한심하고, 너무 부끄러웠어. 난 핑계만 대고 있었던 거야.\n뭐부터 해야 할까 알아봤어, 영어를 잘 해야 겠더라구.\n토익말고 영어를, 내가 인서울 못했던 유일한 이유이자,\n번번히 걸림돌이던 영어가 내 생활이 되어야 했던 거야.\n그렇게 떠났지. 떠나.버렸지.\n인도, 뉴질랜드.... 8개월동안 내가 떠돈 곳은 외국이었지만,\n목도한 것은 이국의 멋진 풍광보다는 그네들의 삶, 라이프 스타일...\n도리어 고개돌려 내가 목도한 것은 우리 대한민국의 비참한 현실\n이었어.\n증명되어야만, 우수해야만, 남보다 뛰어나야만, 자랑스러운 대한민국, 세계에서 가장 경쟁지향적이고 스트레스가 극심한 변태같은 나라.\n침략받고 지배받던 울분을 아직도 다 쏟아내지 못해\n야구에서 일등하고 축구에서 일등하고, 피겨&#160;\n야만 증명되어야만 비로소 만족하는 우리의 현실이 측은했던 거야.\n그 과정에서 우리들이 감내 해야만 했던 스트레스와, 경쟁의 폐해,\n우리 어머니가 이민가고 싶다고 말씀하셨을 때,\n목이 메였어.....&#160;\n나도 거기에서 나름 분투하고 있었지만, 그런 삶이 과연 옳은가?\n왜?에 대한 질문은 한번도 해본적이 없었던거야.&#160;\n그리고 모든 삶의 근원적 지향점. 행복에 대한 정의를&#160;찾는데 스스로 몰두했어. 왜?라는 질문은 다른 군더더기를 다 씻어내주더군\n그리고 어떻게라는 질문에 들어섰을 때. 우연치 않게도 마케팅이 그 해답이 될 수 있다는걸 깨달았어. 어설프게 겉만 핥았던 학부 시절이지만, 마케팅은 인식 레벨의 싸움이라는 걸... 알았으니깐.\n결자해지였던 거야.\n그동안 우리가 해왔던 판매, 광고, 마케팅의 소구 방식은\n턱없이 폭력적이었어. 남을 즈려밟고 일어서기위해,\n너 자신을 부정하고 남보다 더 나은 네가 되기 위해\n우리 상품이 필요하다는식이었지....\n나는 이런 현실에 광고쟁이, 기업가.... 우리 마케터들이&#160;\n책임을 져야 한다고 생각해.\n엄마 친구 아들과 비교되지 않아도 되는 세상에,\n내 아들이 살게 할 거야.\n행복은 누가 줄 수 있는 게, 누군가보다 나을 때 얻어지는 것이\n아니라는 걸 내 나라 사람들이 깨닫게 할거야.\n이게 몇년에 걸쳐 내가 스스로에게 캐물어 얻어낸\n내 비전이고 이상이야.\n내 나라에서 내 사람들과 행복하게 사는 것.\n이게 내 나름의 해법이야. 내가 할 수 있는.\n이 바벨탑을 부숴버리기 위해서, 성문으로 쳐들어가는 방법\n다른 사람들이 노력중이고.\n나는 이 바벨의 꼭대기 까지 올라가서 이걸 헐어버릴거야.\n그걸 위해서 누구보다도 세속적으로 살아가겠지,\n마케터의 적이될 수도 있는거고....\n___________________________________________\n그리고 이제 그녀에게 용서 받고 싶다.\n어린 내가 그 긴 시간동안 그녀에게 준건\n독한 기다림과, 철없는 어리광 뿐이었으니까.....\n나는 정말 나 밖엔 몰랐다.\n하지만, 아직도 아닌거겠지...\n치열함과 뜨거움으로 내 후회를 태우자.\n출처: <<a href=\"http://q.cyworld.com/26745421/_index/home/?from=home\">http://q.cyworld.com/26745421/_index/home/?from=home</a>>\n어짜피 살아간다는 것, 존재라는 것은, 나를 세상에 강요하는 것. 모든 존재는 그 자체로 이기적이야. ￼재댓글 ￼수정 ￼삭제\n출처: <<a href=\"http://q.cyworld.com/26745421/_index/home/?from=home\">http://q.cyworld.com/26745421/_index/home/?from=home</a>>\n나는 내가 옳다고 말하려는게 아냐,\n나는 단지 이게 나라고 말하는 거야.\n&#160;\n자기부정으로 너를 다치게하는 그런 싸움은\n이제 그만둬, 이미 넌&#160;참 예쁘고 훌륭한 아이니까.\n출처: <<a href=\"http://q.cyworld.com/26745421/_index/home/?from=home\">http://q.cyworld.com/26745421/_index/home/?from=home</a>>\n효율적인 입장에서 보면\n저는 우리나라에서 가장 비효율적인 사람이죠\n&#160;\n효율적인 인생이 성공이라고 한다면\n저같은 사람의 인생은 실패라고 봐야하거든요\n&#160;\n그래서 인생이 효율성이 다가 아닌 것 같거든요\n&#160;\n그래서 자기가 정말로 맞는 분야를 찾기 위해 쓰는 시간은\n저는 값진 시간같아요\n&#160;\n어쩌면 자기 자신에게 줄 수 있는 가장 큰 선물은\n자기에게 기회를 주는 거에요\n&#160;\n자기가 도대체 어떤 사람인가\n자기가 어떤 일을 정말로 잘 할 수 있고\n어떤 일을 하면 정말 재미있는 사람인지\n그 기회를 자기에게 주는 게 가장 큰 선물이고 기회인거죠\n&#160;\n&#160;\n&#160;\n나 스스로에게 기회를 주기 위해\n내가 져버려야만 했었던 것들을 기리기 위해서\n오늘도 나는,\n치열해야 마땅하다\n&#160;\n건투를 빈다!\n결국,\n나 자신과의,\n나 자신만의 싸움\n&#160;\n내가 내 인생에 무슨 짓을 저질렀는지 잘 몰랐었지만,\n이젠 알것 같다. 무의식은 날 여기로 이끌었고,\n이게 바로 내 의지였다, 그리고 후회는... 태운다.\n&#160;\n\"삶에 있어 가장 중요한 것은 속도가 아니라, 방향이다.\"\n&#160;\n가보자 ㅎ\n출처: <<a href=\"http://q.cyworld.com/26745421/_index/home/?from=home\">http://q.cyworld.com/26745421/_index/home/?from=home</a>>\n사람들은 때때로, 아니 자주\n지금 하고 있는 일이 나와는 맞지 않아서\n성과가 높지 않거나, 잘 할 수 없는 것이라고 불평한다.\n하지만, 그런일 하나도 제대로 해내지 못한다면\n다른 무슨일이 주어진다고 해도 달라질 건 없다\n&#160;\n가슴 뛰는 일을 찾아 떠나겠다는 말은\n꽤 낭만적으로 들리긴 하지만,\n너무나 철없는 발상이다.\n&#160;\n우리가 무슨일을 하는지보다 더 중요한 건,\n그 일을 어떻게 하느냐인 것.\n&#160;\n평범한 일상을 비범하게 살아내는 사람들,\n그들을 천재라고 부른다.\n그리고 천재는\n모든 일을 다 잘하는 사람이 아니라\n단 한가지에서 타의 추종을 불허하는\n독보적인 열정과 몰입력을 가진 사람들,\n그들 공통의 닉네임이다.\n&#160;\n초등학교 때 했던 아이큐 테스트 따위는\n기억에서 찢어내버리자\n&#160;\n내가 하는 일에 심장을 만들어 넣겠다.\n목숨을 걸겠다.\n이런 각오. 그 몰입의 행복을 찾아보자.\n행복은 지금 여기에 있다. 우리가 항상 외면해왔을 뿐.\n&#160;\n&#160;\n&#160;\n&#160;\n그리고, 지금 그 일이 정말&#160;나의 일이 아니라면\n왜,\n던져버리질 못하고 있는가?\n대답할 수 없다면, 버리자. 떠나자.\n출처: <<a href=\"http://q.cyworld.com/26745421/_index/home/?from=home\">http://q.cyworld.com/26745421/_index/home/?from=home</a>>\n\"난 비록 죽으면 쉽게 잊혀질 평범한 사람일지라도,\n내 영혼을 바쳐 평생 한 여자를 사랑했으니 내 인생은 성공한\n인생입니다.\"\n- 노트북 노아의 대사 중\n출처: <<a href=\"http://q.cyworld.com/26745421/_index/home/?from=home\">http://q.cyworld.com/26745421/_index/home/?from=home</a>>\n꽃이 피고지고피고지어 다시 또 피어나도\n내 그리던 봄은 아니 오더라.\n&#160;\n아이처럼 가볍게 살고 싶었는데,\n나는 더 깊어져 버렸다.\n&#160;\n너를 지나쳐\n내가 살아온\n모든 날들이\n거짓말이 되어버릴 것 같아서, 그래서.\n&#160;\n어딘가에 못 박혀 있는 나를\n억지로 끌고 여기까지 온거야.\n&#160;\n항상 무언가를 놓치고 있다는 느낌이 들었는데,\n그게 너였어.\n출처: <<a href=\"http://q.cyworld.com/26745421/_index/home/?from=home\">http://q.cyworld.com/26745421/_index/home/?from=home</a>>\n중요한건,\n남이 뭐라고 하든간에\n자기의 사는꼴에&#160;긍지를 가지고 있는가\n그것 뿐 아닌가?\n&#160;\n나는&#160;자존심이 아니라,\n자존감에 대해 말하고 있는거야.\n&#160;\n스스로도 행복하게 만들지 못하면서\n남에게 무슨 감동을 주고 무슨 사랑을 줄 수 있을까?\n&#160;\n행복은 만족의 문제가 아냐.\n&#160;\n각자가 가지고 있는 행복의 함의는 다르겠지만,\n내가 아는 한&#160;타인과의 비교에서, 남의 시선을 의식한데서\n비롯된&#160;모든&#160;것은 절대, 절대 행복이 아냐.\n어짜피 행복감은 내 가슴에서부터 피어나는 것.\n&#160;\n남이 너를 바라봐주기 원하는 그 시선으로,\n스스로를 바라봐.\n&#160;\n내가 되어라.\n나 자신이 되어라.&#160;\n&#160;\n출처: <<a href=\"http://q.cyworld.com/26745421/_index/home/?from=home\">http://q.cyworld.com/26745421/_index/home/?from=home</a>>\n제법 길었던 여행이 끝났고, 여장을 풀어보자. ㅋ\n&#160;\n&#160;\n인생을 포괄하는 여덟 가지\n지나간 것과 새 것, 얻음과 잃음, 슬픔과 즐거움, 삶과 죽음,\n올 한해 내 머리속에서 이리저리 짜맞춰 보던 장난감들\n&#160;\n삶에 있어 가장 치명적인 매너리즘은 두려움인 것 같아\n가지고 있는 것을 잃는 것에 대한\n자신의 관점 부정하고 다른 시각으로 세상을 보는 것에 대한\n스스로의 삶에 대해 조금의 가책이라도 있다면,\n박약한 자아에 대한 연민이 남아있다면,\n한번쯤 내가 배우지 않은 방식으로,\n내가 두려워하던 방식으로 삶에 대해 숙고해봐해\n소유와 성공이 주는 포만감 말고, 행복에 대한 정의를 갖자\n긴 인생중 단 십분만이라도 행복에 대한 신념을 재정립해보자\n어디까지나 나름의 정의, 세상의 동의를 구하려는 개버릇은 버리자\n&#160;\n다른이로부터 인정받는 것은 좋아,\n하지만 스스로를 인정해주지 않는다면 그건 정말 쓰레기같아\n좋은 차에 올라탄, 좋은 옷을 입은, 예쁜 여자친구를 가진,\n그런 내가 아니면 인정 받지 못하는 현실은 퍽이나 두렵겠지\n사실은 그렇게 벌벌떠는 내가 더 두려우건데 말야\n&#160;\n항상 내 자신보다 세상의 목소리에 귀기울여 왔어\n무엇을 가진 내가 맘에드냐고,\n어떤 재롱을 떨어야 날 사랑해 줄거냐고\n&#160;\n내가 자라온 세상은 너무 작아서 크고 넓은 세상을 봐야 한다고\n언젠가 여행을 떠나야 한다고 어른들은 말했어\n학교를 떠나서 어른들이 씌워준 안경을 벗고보니\n내가 사는 세상이 작은 것이 아니었어\n그것을 바라보는 시각과 시야가 문제였지\n세상이 맞춰준 안경은 퍽 매끈한 삶을 보여주지만\n그건 꽤 심하게 왜곡되어 있었어\n&#160;\n이기적인게 왜 나빠?\n&#160;\n그렇게 배웠으니까\n그 이유까지도 의심없이 주입 받았으니까\n남에게 피해주는 것이 왜 나쁘냐고 물어볼만큼\n멍청한 용기를 가진 새나라의 어린이는 없었어\n입바른 소리하는 천사표를 양산하는 것이 전인 교육의 목표였지\n&#160;\n그렇게 배운 것으로부터 벗어날 수 없어\n그 사고의 틀에 갖혀있다는 사실조차 자각하지 못하기에\n벗어날 시도를 하지 못하지\n교실에서 검은 칠판위에 하얀 글씨로만 세상을 읽고\n부모님이 입혀준 교복안에 살다가\n도서관 칸막이에서 사무실 칸막이로 배경만 바뀐채\n다시 참새는 짹짹, 고양이는 야옹, 바둑이는 멍멍\n&#160;\n&#160;\n&#160;\n삶과 사랑, 그리고 죽음까지 온 생애를\n온전히 내 것으로 만들자\n이 것이 내 삶이다\n더러웠다거나, 치졸했다거나, 아팠다고해서\n내 어제를 져버리지는 말자\n&#160;\n세상에 나를 증명하려 발악할 필요 없다\n내 존재를 매 순간 스스로 느낄 수 있는 일을 하자\n남부럽지 않은 삶은 필요없어\n남에게 보여주기 위한 삶은 그래, 개나 줘버리자\n내가 여기에 살아숨쉰다는 것을 스스로에게 보이자\nLet Go,\n&#160;\n가슴 뛰는 일을 찾겠다는 망상과 수동성은 버리자\n내가 하는 일에 숨을 불어 넣자\n내 심장 뿐만 아니라, 사람들의 심장도 함께 박동하리라\n무엇을 하는가보다 어떻게 하느냐다\n함께 여행을 떠나도 누군가는 땅만 바라보며 걷고,\n누군가는 콧노래를 부르며 걷는다\n&#160;\n무언가를 가져야만, 무언가 받아야만,\n무언가 이루어야만 행복할 수 있다면,\n그것이 없다면 난 뭐란 말인가\n그래 말마따나 자기개발은 자위행위에 불과해\n&#160;\n사실, 삶 자체 보다는 삶에 대한 네 관점이 더 퍽퍽해\n최신 트렌드에 오차 없이 발맞춰 가더라도,\n세상을 쫓는데 바쁜 네 사상만큼은 정말 구식이야\n뭐가 그리 힘겨워, 그런게 아니더라도 넌 충분히 빛나는데\n서로의 시선 앞에 노예가 되는 것은 그만 두자\n세상이 사랑해주는 너만이 너는 아니라구,\n어른스럽게 각잡고 있는 네가 너무 측은해 보여\n그런 너는 이제 개나 줘버려\n너는 사랑하기에 이미&#160;너무 매력적이야!\n&#160;\n내가 어느 날 문득 무언가를 고작 조금 더 깨치게 되었다고해서\n내 사랑하는 이들에게 까지 그러한 삶을 강요할 순 없어\n나는 존재 자체로 그들에게 영향을 미칠 수 밖에 없으니\n일단 살아가겠다 주어진 미래라라도 신나게 살아보겠다\n&#160;\n나는 군대도 다녀왔고 어느 덧 스물 다섯이지만\n아직도 나를 돌봐주시는 부모님이 있고, 그것에 행복을 느껴\n어느날 갑자기 어른이 되어버린척 하면서\n부모님에게서 나를 앗아가진 않을꺼야\n내가 돈을 벌든, 누군가를 엄마 아빠보다 더 사랑하하게 되든,\n아무리 나이를 먹든 나는 엄마 아빠 앞에서는 아가니까\n그런 시건방은 떨지 않을래\n&#160;\n&#160;\n&#160;\n길을 잃는 것은 두렵지 않다\n다만 다시는\n나를 잃지 않겠다\n&#160;\n길 위에서\n다시는 나를 잃지 않겠다\n&#160;\n사람이 늙기 시작하는 것은 성장을 멈춘 그 때부터\n나를 깨치게 할지면 개 앞에서라도 바짝 엎드리자\n출처: <<a href=\"http://q.cyworld.com/26745421/_index/home/?from=home\">http://q.cyworld.com/26745421/_index/home/?from=home</a>>\n\"사랑은 단어다.\n중요한 것은 그 의미다.\"\n&#160;\n누군가와 좋은 인연을 시작했고,\n진지한 마음이라면, 적당한 시간이 흘렀을 때\n한번쯤 물어라,\n\"내가 왜 좋냐고\"\n\"그냥\"이라는 대답에 소녀처럼 마냥&#160;기뻐할 수도 있겠지만,\n그냥 좋은 것은, 언젠가 그냥 싫어져 버릴 수도 있음을 알아라.\n&#160;\n그 과묵해서 멋있는 그놈은, 네게 정말 할말이 없어서, 과묵한 것일 수도 있다.\n하지만, 그렇다고 재촉하지 말아라. 그냥 멋있다고 생각하고 말아라. 어짜피 남자랑 여자는 다르다.&#160;함께라는 것이 같다라는 의미는 아니다.&#160;\n&#160;\n그리고 또 한번쯤 나눠라,\n\"사랑\"이 무엇이라고 생각하는지,\n신기하게도 사랑에 대한 정의와 느낌, 정서적 기억은\n마주보고 있는 두사람일지라도 다르다.\n함께 있기에, 사랑하고 있기에 그런것이 불필요하게 느껴지고\n어쩌면 생각조차 나지 않겠지만,\n노력해서 지켜가고픈 인연이라면,\n그 주파수를&#160;조절할 필요가 있다.&#160;\n&#160;\n누군가에겐 정도 사랑이지만,\n또 누군가에겐 설레임만이 사랑이기도 하기 때문이다.\n&#160;\n\"하고 싶은 일을 하고 싶을 때 하는 것_자유\"\n출처: <<a href=\"http://q.cyworld.com/26745421/_index/home/?from=home\">http://q.cyworld.com/26745421/_index/home/?from=home</a>>\n\"우린 필요도 없는 고급차나 비싼 옷을 사겠다고 개처럼 일한다.\"\n\"당신이 소유하려는 물건들이 결국은 당신을 소유할 것이다\"\n&#160;\n우리는 잘 짜여진 시스템 속에서&#160;\n미디어에 나오는&#160;멋쟁이처럼 되려고,&#160;\n개처럼 일하다 가끔 로또를 산다.\n차를 모실거고, 거르지 않고 기름을 대접하기 위해\n회사의 갈굼을\n나를 춤추게 하려는 칭찬으로 받아들이며\n고난과 역경을 극복해내는 스스로를 기특하게 여긴다.\n사표를 던지고 싶어도 담달에 질러야할 것들과\n적금통장이 발목을 잡는다.\n맹목적 긍정 일색인 자기계발서를 맹종하고,&#160;\n부단한 자기부정만이 존재를 보장하는&#160;현실을&#160;\n타이레놀 몇 알과 함께 곱씹어보지도 않은채 삼킨다.\n그것이 열정이라 불리우기에 마냥 아름다운 것이고,\n고급 레스토랑에서 와인에 밥말아먹는 법을 배운 자신은\n이미 어엿한 사회인.\n제도권의 말단에 겨우 편입된 것을 안도하며, 꿈을 논한다.\n쇼핑과 골프, 데이트와 섹스와 해외여행으로 넋을 달래겠지만,\n그것을 감히 삶이라 부를 엄두가 나지 않기에,\n인생에 대해 숙고하는 것을 피하게 될 것이다.\n좋은게 좋은 것이라 배웠기에 나는&#160;다시 웃을 것이고,\n스스로를 참 긍정적인 사람이라는 자긍을 갖는다.\n&#160;\n내 앞에 펼쳐진 디스토피아를 잘도 헤집고 나갈 거면서,\n이딴 생각 하는 내가 가끔은 좀 미친거 같아.\n이런 생각을 하면서, 잘도 마케터, 그래&#160;\n시장 창출의 나팔수가 되겠다는 나의 포부가 좀 웃겨.\n양립 불가, 초콜렛맛 짬뽕을 내오라는 내 주문을\n나도 어떻게 처리해야 할지 아직 모르겠어.\n꼬리에 꼬리를 무는 의문들과 괴리,&#160;\n길고 지리한 사춘기는 언제 끝나는건데...\n&#160;\n누가 행복한 걸까,\n도데체 누가 남에게 보여주기 위한 삶 말고,\n지 멋대로, 자길 위해서 살고 있는걸까.\n그런 롤모델은 어디 없는거냐고,\n돌아가면 나, 또 달려야 하겠지. 개처럼\n여긴 아직 여름인데, 상상만으로도 허파가득 들어차는\n그 차가운 공허를 벌써부터 어찌할바를 모르겠어.\n아직 나는 좀 정리가 덜된거 같은데, 음.\n하긴, 준비가 다 되고나서야 시작할 수 있는건 하나도 없었어,\n내가 준비되었다고 느꼈을 때엔, 이미 모든 것은 지나가버린 후였지.\n마땅히 깨어지고 부숴짐이 젊음이라,&#160;\n가자, 가보자.\n출처: <<a href=\"http://q.cyworld.com/26745421/_index/home/?from=home\">http://q.cyworld.com/26745421/_index/home/?from=home</a>>\n고백한다.\n&#160;\n지난 5년 동안 나는 분명 많이 성장했지만,\n그건 부단한 자기 부정의 연장일 뿐이었다.\n&#160;\n남에게 사랑받는 나, 인정받는 나, 더 많이 가진 나만이\n나였고, 타인에게 사랑받지 못하는 내 모습은 버려야만 했다.\n&#160;\n푸른 들판을 제쳐두고서, 몇 줄 되지도 않는 레인 위에서\n타인과&#160;경쟁하며 달리는 것, 이왕이면 빠르게 달리는 것이\n미덕이고 열정이며 삶의 목적이라 생각했다.\n&#160;\n만족과 행복을 분간치 못했으며, 성취의 희열,\n가지고, 삼키고, 내 것으로 두는 것만이 승리라고 생각했다.\n&#160;\n누구로부터 승리해야 하는지, 왜 비교해야 하는지조차\n숙고한적이 없었다. 그저, 내가 아니기 위해 바둥거리고,\n사랑 잃을까봐 허겁지겁&#160;나를 감췄고,\n사랑했으나 나로써 사랑하지 못했다.\n&#160;\n나를 부정하는 것만이 나를 행복하게 만든다는 역설 속에서\n보여주고 싶은 내 모습만을 세상에 건네려 안간힘을 써왔다.\n그렇게, 나 스스로를 아껴준 적이 없었다.\n&#160;\n&#160;\n&#160;\n올 한해에 내가 큰 의미를 두는 이유는\n나 자신을 되찾았다는 것, 그리고\n그간의 내 사고하는 방식, 생각의 기반을\n스스로 뒤엎을 수 있었다는 것,\n&#160;\n이것은 화해이기도, 용서이기도 하다.\n내 자신과의, 내 스스로에대한.\n&#160;\n내게 주어진 내 하루를 내 삶으로써 살아보이겠다.\n내 삶의 이유는, 내&#160;삶의 위로는&#160;\n나 자신 이어야만 한다.\n&#160;\n&#160;\n나,\n&#160;\n'척'하며 살아가야 할 정도로 보잘 것 없지 않아. 더이상,\n&#160;\n세상 어디, 누구 앞에서든 온전한 내 자신을 건내고 싶어,\n나로써 행동하고, 나로써 말하며, 나로써 사랑하고\n내게 주어진 내 하루를 내 삶으로써 살아내 보일께.\n&#160;\n또 다시 세파에 섞여 흐르다보면, 나 자신을 잃고\n누군가에게 보여주기 위해서,&#160;사랑받기 위해서, 인정받기 위해서, 나 자신을 놓아버린채 다른 이를 위해 살아갈 때가 오겠지.\n&#160;\n하지만 그 때마다 나를 흔들어 깨워줄 당신들이 있다는 것도 알아.\n그니깐, 약속해줘. 언제나 독한말 한마디 해줄 선배, 친구, 동생\n되어주겠다고. 나도 그래왔잖아 ㅎ\n&#160;\n모난 돌이 정을 맞고,\n그렇게 다듬어진 돌만이 작품이 되는 것처럼.\n가끔은 너무 투박하고 예리한\n내 진솔함이 내 성장의 기반이라고, 나는 생각해&#160;\n&#160;\n나는 지금 홀로 완전함을 느끼고, 그래서 진정 행복해\n아니, 홀로 행복함을 느끼기 때문에 완전한 걸지도 몰라\n&#160;\n무엇도 나를 두렵게 만들지 않고, 때문에 망설임이 없어\n진정, 자유로워 _ !\n&#160;\n스스로를&#160;사랑한다는 것의 진의를&#160;정말로&#160;느끼고 있는 나날이라구,\n&#160;\n나는 아직도 위대한 내가 될 것을 꿈꿔.\n출처: <<a href=\"http://q.cyworld.com/26745421/_index/home/?from=home\">http://q.cyworld.com/26745421/_index/home/?from=home</a>>\n정의 되지 않는 분방함과\n낙망치 않는 기백으로\n처음으로 돌아가 다시 묻는다.\n스무 살,&#160;마냥 궁금했던 인생사,\n&#160;\n다시 쌓아간다.\n출처: <<a href=\"http://q.cyworld.com/26745421/_index/home/?from=home\">http://q.cyworld.com/26745421/_index/home/?from=home</a>>\n인사 잘 해라,\n매력이 넘치는 세상이다만,\n예의범절만한 매력이 없는 것이다.\n출처: <<a href=\"http://q.cyworld.com/26745421/_index/home/?from=home\">http://q.cyworld.com/26745421/_index/home/?from=home</a>>\n나이를 먹는 다는 것이 반드시 사상의 진보를 보장하진 않더라.\n출처: <<a href=\"http://q.cyworld.com/26745421/_index/home/?from=home\">http://q.cyworld.com/26745421/_index/home/?from=home</a>>\n앗ㅆㅏ 가오리, 나도 이제 어여한 어른이야.\n나 돈좀 벌어, 차도 살꺼야, 근사한 레스토랑에서\n와인에 밥말아 먹기도 하겠지.\n&#160;\n그렇게 설레이는 맘으로 제도권에 편입되어 버리겠지.\n매트릭스 속 욕조하나 꿰차고, 어릴적&#160;아버지 양복 입어보며\n꿈꾸던 생활을 적당히 즐길때쯤엔,\n두통과 함께&#160;눈뜬 아침엔&#160;날 여보라 부르는 누군가가\n함께 이겠지,\n좋든 싫든 이미 그것이&#160;생활이라 부르는 현실일테고\n생각할 시간도 없이 거리로 몸을 내몰겠지.\n가끔 갖게되는 휴일과 보너스에 길들여진 나에게\n사회생활이 어떤 거냐고 후배가 물어온다면\n난 내 선배들이 했던 말과 똑같은 말로\n또 한벌의 마네킹을 양산하겠지.\n&#160;\n왜 당신들이 못했다고해서 나도 그렇게 살아아된다고\n말하는거야, 젠쟝.\n난 좀더&#160;터무니없고 이상적이고, 만화책같은\n그런 대답이라도 해주길 바랬어요, 넋두리와 한숨말고.&#160;\n쉬운 삶에 대해 말하는 것도 아냐,\n마냥 행복에 겨운 삶을 말하는 것도 아냐,\n단지 내가 하고 싶은 일에 대해서 가고 싶은 길에 대해 말하는거야\n&#160;\n&#160;\n그건 내게 아직 기회가 있을 때 충분히 숙고하지 않은\n내 탓인걸,\n&#160;\n하지만 철들기 때부터, 아니 아직 철 안들었으니깐.\n그래, 일기장 첫 머리를 \"오늘 나는..\"으로 시작하지\n않았을 때 무렵부터, 내 꿈은 기업가였으니깐,\n일단 회사에 들어갈거야.\n출처: <<a href=\"http://q.cyworld.com/26745421/_index/home/?from=home\">http://q.cyworld.com/26745421/_index/home/?from=home</a>>\n혼자야,\n그것이 반드시 외로움을 동반하는 것은 아니야.\n외로워,\n그것이 반드시 누군가를 필요로 한다는 것은 아니야.\n&#160;\n사랑하면 ㄷ ㅏ&#160;연애하고,\n연애하면 ㄷ ㅏ 사랑하냐 ㅈ ㅣ랄 ㅁ ㅏ.\n&#160;\n힘내라, 동생아.\n매번 혼내고 욕하고 지독하게 상처만 주는 나라 미안하다만,\n불행인지 다행인지, 네 못난 형은 가시같은 혀를 지녀\n말 한마디로도 타인의 맘을 할퀴는데는 일찍이 재능이 있었다.\n&#160;\n하지만, 설령 내가 너보다 못하더라도,\n니가 아무리 나이를 먹더라도, 니가 내 동생으로 사는 이상\n나는 너를 혼내줄거야.\n&#160;\n세상 모든이가 네게 웃는 낯만을 보이고,\n너를 칭송하는 날에도, 네게 칭찬만 주지는 않을거다.\n&#160;\n너도 그럴 것이라 의심치 않는다.\n논리적으로 설명하지 않아도 되는,\n이성적으로 설명하지 않아도 되는,\n믿는다고 말로 안심시키지 않아도 되는,\n절대적인 인연이다.\n&#160;\n형도 방법을 고쳐볼게.\n&#160;\n네가\n이제와 말이지만, 네가 내 동생이기에\n나는 형일 수 있는거다.\n네가 동생이기에 내가 형스러워 질 수 있는거다.\n나는 네가 쫓아올 때마다 더욱 긴장하고 달려 나간다.\n너보다 못난 형이기에 더욱 노력해야 한다.\n&#160;\n머지 않은 미래에 네가 나를 제치고 나아가는 것,\n그것만이 진정 내가 바라는 바, 또한 두려워하는 바이다.\n출처: <<a href=\"http://q.cyworld.com/26745421/_index/home/?from=home\">http://q.cyworld.com/26745421/_index/home/?from=home</a>>\n예쁜여자에겐 시선이 머물고\n가끔 몸도 머물지만,\n지혜롭고 사려깊은 여자에겐\n마음이 머문다.\n출처: <<a href=\"http://q.cyworld.com/26745421/_index/home/?from=home\">http://q.cyworld.com/26745421/_index/home/?from=home</a>>\n미래를 위해 현재를 허물고\n내일을 위해 오늘을 지우는 것이\n내게 무엇을 가져다 주는가,\n&#160;\n끊임 없는 자기 부정이 발전이라 믿는다.\n&#160;\n조금 역한 긍정과 보장된 미래라는 포장\n끊임 없이 자기 혐오를 학습한다.\n&#160;\n&#160;\n역겹다. 역겨운 나라다.\n경쟁을 위한 경쟁, 칭찬에 인색하다.\n일렬로 서는 법 밖에는 모르는 것이다.\n&#160;\n그렇다고 내 나라를 떠나는 비겁을 범하지는 않겠다.\n&#160;\n이 성의 끝까지 올라가서 이 탑을 부숴버리겠다.\n&#160;\n때로, 무엇을 아니 정확히\n&#160;\n누구를 위해 이렇게 살고 있는지\n&#160;\n자문하는 것을 잊지말라.\n&#160;\n무엇을 완성이라 여기기에 그리도\n자신에게 불만이 가득한다.\n그리하여 죽음이 인간에게 주어준\n최후의 자유라 불리우는 것이다.\n&#160;\n이것 또한 지나가리라.\n그렇게 슬픈말을 긍정이랍시고 하는거냐, 당최.\n&#160;\n남들 하는 것도 못하는 건 분명 병신이지만,\n남들 하는 대로 밖에 못하는 것도 분명 병신짓이다.\n출처: <<a href=\"http://q.cyworld.com/26745421/_index/home/?from=home\">http://q.cyworld.com/26745421/_index/home/?from=home</a>>\n이프&#160;아이&#160;돈트 빌리브 마이셀프,\n&#160;\n아이&#160;윌 네버&#160;씨 애니 미라클 올 마이 라이프.\n&#160;\n하우 컴 유&#160;돈트 트러스트 유어 포시빌리티?\n&#160;\n하우 컴 유&#160;돈트 러브 유어셀프?\n&#160;\n유 아 더 온리 펄슨 후 캔&#160;디렉트 유어&#160;라이프.\n&#160;\n드로우 유어 오운 마스터피스 위드 더 브러쉬 오브 빌리프,&#160;\n&#160;\n프레이즈&#160;유어 에브리 모멘트\n&#160;\n라이트 나우!\n출처: <<a href=\"http://q.cyworld.com/26745421/_index/home/?from=home\">http://q.cyworld.com/26745421/_index/home/?from=home</a>>\n나이를 먹는다는 것이,\n반드시 더 나은 나를 보장해주는 것은 아니다.\n&#160;\n시간의 흐름이 반드시 진보를 의미하지는 않는다.\n어떤 것은 후퇴하고, 쇠락해버리는 것이다.\n&#160;\n다시 예전으로 돌아가\n스무살 초반의 마냥 철없고, 뜨겁고,\n오기로 가득차 있던 나에게 다시 배운다.\n&#160;\n적어도 그 때의 나에게는\n무모하고 당당해서 더욱 빛나는\n긍정이 있었다.\n&#160;\n무지하고 당돌하고 싸가지까지 없어서\n순진하게\n출처: <<a href=\"http://q.cyworld.com/26745421/_index/home/?from=home\">http://q.cyworld.com/26745421/_index/home/?from=home</a>>\n영원한 것은 영원히 없다는 진리,\n슬프게 들릴지 모르지만,\n늘 변하고, 흔들리고, 뒤틀리고, 진보하고, 후퇴하기 때문에\n우리가 살아나간다는게,\n너와 내가 이렇게 바둥거리고 있는,,, 삶이라는게\n우리의 오늘이,\n의미를 가질 수 있는거잖아.\n감사하자, 정말로 감사하자,\n무엇도 쉽게 약속할 수 없고,\n모든걸 말할 순 없다는걸 배웠다.\n그치만, 내가 그리를 미래를, 내가, 가져올 수 있을 것 같아.\n믿어,\n&#160;\n출처: <<a href=\"http://q.cyworld.com/26745421/_index/home/?from=home\">http://q.cyworld.com/26745421/_index/home/?from=home</a>>\n다른 사람만 사랑했지, 나를 사랑해준 날은,,\n출처: <<a href=\"http://q.cyworld.com/26745421/_index/home/?from=home\">http://q.cyworld.com/26745421/_index/home/?from=home</a>>\n같잖은 진지함은 나를 해친다.\n출처: <<a href=\"http://q.cyworld.com/26745421/_index/home/?from=home\">http://q.cyworld.com/26745421/_index/home/?from=home</a>>\n어떤 사람에 대해서 이제는 많이 알게되었노라고\n생각해버리는 그 순간부터,\n나는 또 그 사람에 대해서 모르게 되는거.\n&#160;\n호기심과 관심,&#160;여정에 앞서 꼭 챙겨둘 것.&#160;\n출처: <<a href=\"http://q.cyworld.com/26745421/_index/home/?from=home\">http://q.cyworld.com/26745421/_index/home/?from=home</a>>\n아무 것도 저지르지 않는 것이야 말로, 실로 젊음의 말로.\n출처: <<a href=\"http://q.cyworld.com/26745421/_index/home/?from=home\">http://q.cyworld.com/26745421/_index/home/?from=home</a>>\n외로움, 유대에서 기인하는 것\n애초에 가졌었기에 결국 잃게 되고,\n처음부터 홀로라면 고독이 끼어들 틈은 없는 거잖아\n&#160;\n곁을 비워두고서&#160;애써 그리고 부르기에,\n외롭고, 춥고, 가난해지는 마음들\n&#160;\n적잖은 날들을 외로움을 느끼는 나의 감수성에 도취되어 있었다만\n때때로 그것이 너무 역하게 느껴져, 너무 지치고 힘들게해, 나를&#160;\n&#160;\n그래서, 그 근원이 되는 나를 둘러싼&#160;모든 유대를 지울 수 있는가?\n벌써 반년째 머리속을 맴도는 터무니 없이 사치스런&#160;자문,\n&#160;\n두려운 무언가에서 달아나는 것보다 더 두려운 것이 또 있을까,\n하지만 모든 유대에서 달아나고 싶어. 다시, 외로워질까봐.\n&#160;\n나약한나,\n절대, 쿨하지 못해 나.\n언젠가 죽을 걸 알면서도 살아가고,\n언젠가 잃을 걸 알면서도 가지려고하고,\n언젠가 놓치게 될 걸 알면서도 또, 손내밀 거잖아.\n병신같이,\n&#160;\n외로움, 내 가장 고질적인 약점.\n출처: <<a href=\"http://q.cyworld.com/26745421/_index/home/?from=home\">http://q.cyworld.com/26745421/_index/home/?from=home</a>>\n이제부터&#160;내 삶은&#160;아버지,\n내 가장 오랜 친구\n당신에&#160;대한 오마주\n대부분의 사람은,\n&#160;\n스물즈음을 넘어서면서 생을 구성하는 많은 면에서\n자신만의 관을 형성하고 그것에 발디뎌\n나머지 생을 살아가게 된다.\n&#160;\n큰 이변이나, 깨달음이 없는 한\n그 관은 고착되기 마련이고,\n그것을 어른이 되었다라거나\n철이 들었다고 말하기도 한다.\n&#160;\n자신 안에 이미 딱딱하게 굳어진\n나름의 가치가, 거센 풍파도 견뎌낼 수 있는\n고목의 뿌리가 되어주기도 하지만,\n여튼, 고목은 오래되고 죽음에 가까워진 나무라는 뜻.\n&#160;\n관의 정체또한 성장하지 않음,\n사상의 죽음에 가까워짐을 뜻한다.\n&#160;\n역치를 넘어서지 않는 고난에는 끄떡하지 않지만,\n그 임계점을 넘어서는 순간,\n하늘만을 우러르던 가지와 줄기는 꺽이고 부저려\n땅바닥에 쳐박히고야 만다.\n&#160;\n유연함을 잃는다는 것,\n그래서 두려운 일\n&#160;\n뼈아픈 경험을 딛고 나서야\n성장 할 수 있다는 것은,\n우주의 섭리중 가장 잔혹한 것이 아닌가 한다만\n&#160;\n그래도 순리대로\n오늘도 나는 그 정반합의 굴레에서 뒹굴며\n내안에 세웠던 뜻과 가치가&#160;산산히 부숴지고\n다시&#160;회복하며 거듭나는, 변태를 반길거다.\n&#160;\n그래, 예전같진 않을 거야.\n나를 좋아해준 사람들이 아껴준 나의 모습들이 있겠지만,\n그마저도 버릴 각오. 아니, 이미 놓쳐버렸다. 나를,\n&#160;\n이곳에 오고나서,\n치열하게 자아와 싸우던 사춘기 시절마냥\n아에 몰입할 기회를 얻었고,&#160;끝내 무언가를 인정하고\n내려놓은 후의 평온을 얻었다.\n언젠가&#160;이마저도&#160;스러져갈테지만,\n&#160;\n물이 증발하여 대기로 흩어져간들\n물이&#160;차가워져 단단히 뭉쳐진들\n본래 물이 아닌가_ 나는 나.\n출처: <<a href=\"http://q.cyworld.com/26745421/_index/home/?from=home\">http://q.cyworld.com/26745421/_index/home/?from=home</a>>\n\"내가 더 많은 돈을 가졌더라면...\"\n\"내가 조금 더 능력 있었더라면...\"\n\"내가 그렇게 어리석지 않았더라면...\"\n&#160;\n한숨 섞인 비탄이 서로의 입에서\n&#160;\n깊게 흘러 나와 두텁게 쌓일때면\n&#160;\n오직 손에 쥔,\n&#160;\n달달한 커피를 쓰게&#160;삼키고선\n&#160;\n종이컵을 힘껏 구겨본다.\n&#160;\n&#160;\n그리곤, 다시금 숨을 크게 들이쉬며\n&#160;\n출처: <<a href=\"http://q.cyworld.com/26745421/_index/home/?from=home\">http://q.cyworld.com/26745421/_index/home/?from=home</a>>\n그치만,\n다른 이들에게 사랑받으려고만 했었지,\n정작 내가 나를 사랑해준날은 얼마나 될까\n출처: <<a href=\"http://q.cyworld.com/26745421/_index/home/?from=home\">http://q.cyworld.com/26745421/_index/home/?from=home</a>>\n나중에 하면 더 잘 할 수 있을지 모르지만,\n&#160;\n지금 하지 않으면&#160;앞으로도&#160;할 수 없는일을\n&#160;\n'기회'라고 한다.\n출처: <<a href=\"http://q.cyworld.com/26745421/_index/home/?from=home\">http://q.cyworld.com/26745421/_index/home/?from=home</a>>\n사랑하는데 있어서,\n&#160;\n내가 널 이만큼 사랑하니까\n&#160;\n너도 날 이정도는 사랑해 줘야해\n&#160;\n라는 식의 어리석은 생각이\n&#160;\n서로의 가슴에 손을 얹고 밀쳐내게 만들어.\n&#160;\n아낌없이 사랑할때,\n&#160;\n마주잡은 두손은 더욱 견고해져\n출처: <<a href=\"http://q.cyworld.com/26745421/_index/home/?from=home\">http://q.cyworld.com/26745421/_index/home/?from=home</a>>\n출처: <<a href=\"http://q.cyworld.com/26745421/_index/home/?from=home\">http://q.cyworld.com/26745421/_index/home/?from=home</a>>\n출처: <<a href=\"http://q.cyworld.com/26745421/_index/home/?from=home\">http://q.cyworld.com/26745421/_index/home/?from=home</a>>\n출처: <<a href=\"h     if (i === movedIdx) return;
    const c = cards[i], oh = el.offsetHeight;
    if (moved.x < (c.x+(c.w||200)) && (moved.x+(moved.w||200)) > c.x && moved.y < (c.y+oh) && (moved.y+mh) > c.y) {
      c.y = moved.y + mh + GAP;
      el.style.top = c.y + 'px';
    }
  });
}

function loadBoard() {
  const saved = localStorage.getItem(SAVE_KEY);
  const savedHash = localStorage.getItem(SAVE_KEY + ':hash');
  let parsed = null;
  try { parsed = saved ? JSON.parse(saved) : null; } catch(e) {}
  // reset if: no save, empty array, or content hash changed (page regenerated)
  if (!parsed || parsed.length === 0 || savedHash !== CONTENT_HASH) {
    cards = DEFAULT_CARDS.map(c => ({...c}));
    localStorage.removeItem(SAVE_KEY);
    localStorage.setItem(SAVE_KEY + ':hash', CONTENT_HASH);
    renderCards();
    const hasCoords = cards.some(c => c.x !== undefined && c.y !== undefined);
    if (!hasCoords) autoLayout();
    return;
  }
  cards = parsed;
  renderCards();
}
function resetToDefaults() { if (!confirm('저장된 보드를 지우고 원본으로 초기화합니다. 계속할까요?')) return; localStorage.removeItem(SAVE_KEY); cards = DEFAULT_CARDS.map(c => ({...c})); renderCards(); autoLayout(); }

function autoLayout() {
  const boardW = document.getElementById('board').offsetWidth;
  const cols = Math.max(1, Math.floor(boardW / 280));
  const colW = (boardW - GAP*(cols-1)) / cols;
  const colH = new Array(cols).fill(0);
  const allCards = document.querySelectorAll('.card');
  const images = document.querySelectorAll('.card img');
  let loaded = 0;
  function place() {
    allCards.forEach((el, i) => {
      const w = Math.min(cards[i].w || colW, colW);
      let minCol = 0;
      for (let c = 1; c < cols; c++) if (colH[c] < colH[minCol]) minCol = c;
      cards[i].x = minCol * (colW + GAP);
      cards[i].y = colH[minCol];
      cards[i].w = w;
      el.style.left = cards[i].x + 'px';
      el.style.top = cards[i].y + 'px';
      el.style.width = w + 'px';
      colH[minCol] = cards[i].y + el.offsetHeight + GAP;
    });
    document.getElementById('board').style.minHeight = (Math.max(...colH) + 100) + 'px';
    saveBoard();
  }
  if (!images.length) { requestAnimationFrame(place); return; }
  images.forEach(img => {
    if (img.complete) { loaded++; if (loaded >= images.length) requestAnimationFrame(place); }
    else { img.onload = img.onerror = () => { loaded++; if (loaded >= images.length) requestAnimationFrame(place); }; }
  });
}

function syncText() {
  document.querySelectorAll('.card').forEach(el => {
    const i = +el.dataset.idx;
    if (cards[i]?.type === 'text') { const t = el.querySelector('.text'); if (t) cards[i].content = t.innerHTML; }
  });
}
function saveBoard() { syncText(); localStorage.setItem(SAVE_KEY, JSON.stringify(cards)); localStorage.setItem(SAVE_KEY + ':hash', CONTENT_HASH); showStatus('저장됨 ' + new Date().toLocaleTimeString()); }

function renderCards() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  cards.forEach((card, i) => {
    const el = document.createElement('div');
    el.className = 'card'; el.dataset.idx = i;
    if (card.x !== undefined) el.style.left = card.x + 'px';
    if (card.y !== undefined) el.style.top = card.y + 'px';
    // html cards contain raw OneNote table HTML which may overflow the stated div width
    if (card.w) { if (card.type === 'html') el.style.minWidth = card.w + 'px'; else el.style.width = card.w + 'px'; }
    el.addEventListener('mousedown', e => {
      if (e.target.closest('.text, a, .card-btn, .resize-handle, td, th')) return;
      e.preventDefault();
      // Update selection
      document.querySelectorAll('.card.selected').forEach(c => c.classList.remove('selected'));
      selectedIdx = i; el.classList.add('selected');
      snapshot();
      moving = { idx: i, startX: e.clientX, startY: e.clientY, origX: card.x||0, origY: card.y||0 };
      el.classList.add('moving');
    });
    const actions = document.createElement('div'); actions.className = 'card-actions';
    const delBtn = document.createElement('button'); delBtn.className = 'card-btn'; delBtn.textContent = '×';
    delBtn.onclick = e => { e.stopPropagation(); if(confirm('삭제?')) { snapshot(); cards.splice(i,1); renderCards(); saveBoard(); } };
    actions.appendChild(delBtn); el.appendChild(actions);
    if (card.type === 'text') {
      const text = document.createElement('div'); text.className = 'text'; text.contentEditable = true;
      text.innerHTML = card.content || '';
      text.addEventListener('focus', () => { snapshot(); });
      text.addEventListener('blur', () => { card.content = text.innerHTML; saveBoard(); });
      el.appendChild(text);
    } else if (card.type === 'image') {
      const img = document.createElement('img');
      img.src = card.src.startsWith('http') || card.src.startsWith('data:') ? card.src : IMG_BASE + card.src;
      img.alt = ''; img.loading = 'lazy'; img.onerror = () => img.style.display = 'none';
      if (card.w) img.style.width = card.w + 'px';
      if (card.h) img.style.height = card.h + 'px';
      if (card.link) { const a = document.createElement('a'); a.href = card.link; a.target = '_blank'; a.appendChild(img); el.appendChild(a); }
      else { el.appendChild(img); }
      if (card.caption) { const cap = document.createElement('div'); cap.style.cssText = 'font-size:11px;color:#8b949e;margin-top:4px;word-break:break-word;padding:0 2px;'; cap.textContent = card.caption; el.appendChild(cap); }
    } else if (card.type === 'html') {
      const wrapper = document.createElement('div');
      wrapper.style.cssText = 'overflow:auto;font-size:13px;line-height:1.5;';
      wrapper.innerHTML = card.html.replace(/__ATTACHMENT__/g, IMG_BASE);
      wrapper.querySelectorAll('img').forEach(img => { img.style.maxWidth = '100%'; img.style.height = 'auto'; img.draggable = false; });
      wrapper.querySelectorAll('a').forEach(a => { a.target = '_blank'; a.style.color = '#6cb0f6'; });
      wrapper.querySelectorAll('table').forEach(t => { t.style.borderCollapse = 'collapse'; });
      wrapper.querySelectorAll('td,th').forEach(td => {
        td.style.border = '1px solid #444'; td.style.padding = '4px 6px'; td.style.verticalAlign = 'top';
        td.title = '더블클릭으로 편집';
        td.addEventListener('dblclick', function(e) {
          e.stopPropagation();
          snapshot();
          this.contentEditable = 'true';
          this.style.outline = '2px solid #388bfd';
          this.style.background = 'rgba(56,139,253,0.08)';
          this.focus();
        });
        td.addEventListener('blur', function() {
          this.contentEditable = 'false';
          this.style.outline = '';
          this.style.background = '';
          cards[i].html = wrapper.innerHTML.split(IMG_BASE).join('__ATTACHMENT__');
          saveBoard();
        });
      });
      el.appendChild(wrapper);
    } else if (card.type === 'table') {
      const rows = card.rows || [['','',''],['','',''],['','','']];
      const tbl = document.createElement('table');
      tbl.style.cssText = 'border-collapse:collapse;width:100%;font-size:13px;';
      rows.forEach((row, ri) => {
        const tr = tbl.insertRow();
        row.forEach((cell, ci) => {
          const td = document.createElement(ri === 0 ? 'th' : 'td');
          td.contentEditable = true;
          td.style.cssText = 'border:1px solid #30363d;padding:4px 8px;min-width:60px;text-align:left;' + (ri===0 ? 'background:#21262d;font-weight:600;' : '');
          td.textContent = cell;
          td.addEventListener('blur', () => { if (!cards[i].rows) cards[i].rows = rows; rows[ri][ci] = td.textContent; saveBoard(); });
          tr.appendChild(td);
        });
      });
      el.appendChild(tbl);
      const addRow = document.createElement('button');
      addRow.textContent = '+ 행'; addRow.style.cssText = 'margin-top:4px;font-size:11px;background:#21262d;border:1px solid #30363d;color:#8b949e;padding:2px 8px;border-radius:4px;cursor:pointer;';
      addRow.onclick = e => { e.stopPropagation(); snapshot(); if (!cards[i].rows) cards[i].rows = rows; cards[i].rows.push(new Array(cards[i].rows[0].length).fill('')); renderCards(); saveBoard(); };
      const addCol = document.createElement('button');
      addCol.textContent = '+ 열'; addCol.style.cssText = 'margin-top:4px;margin-left:4px;font-size:11px;background:#21262d;border:1px solid #30363d;color:#8b949e;padding:2px 8px;border-radius:4px;cursor:pointer;';
      addCol.onclick = e => { e.stopPropagation(); snapshot(); if (!cards[i].rows) cards[i].rows = rows; cards[i].rows.forEach(r => r.push('')); renderCards(); saveBoard(); };
      el.appendChild(addRow); el.appendChild(addCol);
    }
    const rh = document.createElement('div'); rh.className = 'resize-handle';
    rh.addEventListener('mousedown', e => { e.preventDefault(); e.stopPropagation(); snapshot(); resizing = { idx: i, startX: e.clientX, startW: card.w || el.offsetWidth }; });
    el.appendChild(rh);
    if (i === selectedIdx) el.classList.add('selected');
    board.appendChild(el);
  });
  requestAnimationFrame(() => {
    let maxB = 0;
    document.querySelectorAll('.card').forEach(el => { const b = (parseFloat(el.style.top)||0) + el.offsetHeight; if (b > maxB) maxB = b; });
    board.style.minHeight = (maxB + 100) + 'px';
  });
}

document.addEventListener('mousemove', e => {
  if (moving) {
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`); if (!el) return;
    let nx = moving.origX + e.clientX - moving.startX, ny = moving.origY + e.clientY - moving.startY;
    if (e.shiftKey) { nx = snap(nx); ny = snap(ny); el.style.outline = '1px dashed rgba(240,192,64,0.3)'; } else { el.style.outline = ''; }
    el.style.left = nx + 'px'; el.style.top = ny + 'px';
  }
  if (resizing) {
    let nw = resizing.startW + e.clientX - resizing.startX; if (e.shiftKey) nw = snap(nw);
    cards[resizing.idx].w = Math.max(100, nw);
    const el = document.querySelector(`.card[data-idx="${resizing.idx}"]`); if (el) el.style.width = cards[resizing.idx].w + 'px';
  }
});

document.addEventListener('mouseup', e => {
  if (moving) {
    let nx = moving.origX + e.clientX - moving.startX, ny = moving.origY + e.clientY - moving.startY;
    if (e.shiftKey) { nx = snap(nx); ny = snap(ny); }
    cards[moving.idx].x = Math.max(0, nx); cards[moving.idx].y = Math.max(0, ny);
    const el = document.querySelector(`.card[data-idx="${moving.idx}"]`); if (el) { el.classList.remove('moving'); el.style.outline = ''; }
    if (e.shiftKey) pushCards(moving.idx);
    moving = null; saveBoard();
  }
  if (resizing) { if (e.shiftKey) pushCards(resizing.idx); resizing = null; saveBoard(); }
});

function addTextCard() { snapshot(); cards.push({ type: 'text', content: '', x: 50, y: window.scrollY+100, w: 300 }); renderCards(); setTimeout(() => { const els = document.querySelectorAll('.card .text'); els[els.length-1]?.focus(); }, 100); }
function addImageCard() { const input = document.createElement('input'); input.type = 'file'; input.accept = 'image/*'; input.onchange = e => { const f = e.target.files[0]; if (!f) return; const r = new FileReader(); r.onload = () => { snapshot(); cards.push({ type: 'image', src: r.result, x: 50, y: window.scrollY+100, w: 240 }); renderCards(); saveBoard(); }; r.readAsDataURL(f); }; input.click(); }
function addImageUrl() { const url = prompt('이미지 URL'); if (!url) return; snapshot(); cards.push({ type: 'image', src: url, x: 50, y: window.scrollY+100, w: 240 }); renderCards(); saveBoard(); }
function addTableCard() {
  const colsStr = prompt('열 수 (기본 3)', '3'); const cols = Math.max(1, parseInt(colsStr)||3);
  const rowsStr = prompt('행 수 (헤더 포함, 기본 4)', '4'); const rows = Math.max(1, parseInt(rowsStr)||4);
  snapshot();
  cards.push({ type: 'table', rows: Array.from({length: rows}, (_, ri) => Array.from({length: cols}, (_, ci) => ri===0 ? `열${ci+1}` : '')), x: 50, y: window.scrollY+100, w: Math.max(240, cols*100) });
  renderCards(); saveBoard();
}
function exportBoard() { syncText(); const blob = new Blob([JSON.stringify(cards, null, 2)], { type: 'application/json' }); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = SAVE_KEY + '.json'; a.click(); }
// ── Zoom ─────────────────────────────────────────────────────────────────────
let zoom = parseFloat(localStorage.getItem('zoom-' + SAVE_KEY) || '1.0');
function applyZoom() {
  const board = document.getElementById('board');
  board.style.transform = `scale(${zoom})`;
  board.style.transformOrigin = '0 0';
  document.getElementById('zoom-level').textContent = Math.round(zoom * 100) + '%';
  localStorage.setItem('zoom-' + SAVE_KEY, zoom);
}
function zoomIn()  { zoom = Math.min(3.0, parseFloat((zoom + 0.1).toFixed(2))); applyZoom(); }
function zoomOut() { zoom = Math.max(0.2, parseFloat((zoom - 0.1).toFixed(2))); applyZoom(); }
document.addEventListener('keydown', e => {
  if (e.ctrlKey || e.metaKey) {
    if (e.key === '=' || e.key === '+') { e.preventDefault(); zoomIn(); }
    if (e.key === '-')                  { e.preventDefault(); zoomOut(); }
    if (e.key === '0')                  { e.preventDefault(); zoom = 1.0; applyZoom(); }
  }
});
document.getElementById('board').addEventListener('wheel', e => {
  if (!(e.ctrlKey || e.metaKey)) return;
  e.preventDefault();
  e.deltaY < 0 ? zoomIn() : zoomOut();
}, { passive: false });
applyZoom();
function resetLayout() { if (!confirm('자동 재배치합니다.')) return; cards.forEach(c => { delete c.x; delete c.y; }); renderCards(); autoLayout(); }
// ── Floating format toolbar ───────────────────────────────────────────────────
const fmtBar = document.getElementById('format-toolbar');
function fmt(cmd) { document.execCommand(cmd, false, null); saveBoard(); }
function fmtLink() {
  const sel = window.getSelection();
  if (!sel || sel.isCollapsed) return;
  const url = prompt('링크 URL 입력', 'https://');
  if (!url) return;
  document.execCommand('createLink', false, url);
  // make links open in new tab
  sel.anchorNode?.parentElement?.closest('a')?.setAttribute('target', '_blank');
  document.querySelectorAll('.text a').forEach(a => a.target = '_blank');
  saveBoard();
}

// prevent format buttons from blurring contenteditable
fmtBar.addEventListener('mousedown', e => e.preventDefault());

document.addEventListener('selectionchange', () => {
  const sel = window.getSelection();
  if (!sel || sel.isCollapsed || !sel.toString().trim()) { fmtBar.style.display = 'none'; return; }
  // only show if selection is inside a .text element
  const anchor = sel.anchorNode;
  if (!anchor) { fmtBar.style.display = 'none'; return; }
  const textEl = anchor.nodeType === 1 ? anchor.closest('.text') : anchor.parentElement?.closest('.text');
  if (!textEl) { fmtBar.style.display = 'none'; return; }
  // position above selection
  const range = sel.getRangeAt(0);
  const rect = range.getBoundingClientRect();
  fmtBar.style.display = 'flex';
  const tbW = fmtBar.offsetWidth || 180;
  let left = rect.left + rect.width / 2 - tbW / 2;
  left = Math.max(8, Math.min(left, window.innerWidth - tbW - 8));
  fmtBar.style.left = left + 'px';
  fmtBar.style.top = (rect.top - 44 + window.scrollY) + 'px';
});

setInterval(saveBoard, 30000);
loadBoard();
</script>
</body>
