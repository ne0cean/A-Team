<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080, height=1350">
  <title>Card News Slide {{SLIDE_NUMBER}}</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

    html, body {
      width: 1080px;
      height: 1350px;
      overflow: hidden;
    }
    body {
      font-family: 'Pretendard', 'Inter', -apple-system, sans-serif;
      background: {{BACKGROUND_COLOR}};
      color: {{TEXT_COLOR}};
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 80px;
    }

    .slide { width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; }

    /* Hook Slide */
    .slide-hook { text-align: center; }
    .slide-hook .title { font-size: 72px; font-weight: 800; line-height: 1.2; margin-bottom: 32px; }
    .slide-hook .subtitle { font-size: 32px; font-weight: 500; opacity: 0.8; }

    /* Content Slide */
    .slide-content .number { font-size: 120px; font-weight: 800; color: {{ACCENT_COLOR}}; opacity: 0.3; }
    .slide-content .heading { font-size: 56px; font-weight: 700; line-height: 1.3; margin-bottom: 32px; }
    .slide-content .body { font-size: 36px; line-height: 1.6; opacity: 0.85; }

    /* CTA Slide */
    .slide-cta { text-align: center; }
    .slide-cta .message { font-size: 48px; font-weight: 700; margin-bottom: 48px; }
    .slide-cta .action { background: {{ACCENT_COLOR}}; color: {{BACKGROUND_COLOR}}; padding: 20px 40px; border-radius: 50px; font-size: 28px; font-weight: 600; display: inline-block; }

    .accent { color: {{ACCENT_COLOR}}; }
    .slide-number { position: absolute; bottom: 40px; right: 60px; font-size: 24px; opacity: 0.4; }
    .brand { position: absolute; top: 40px; left: 60px; font-size: 24px; font-weight: 700; }
  </style>
</head>
<body>
  <div class="brand">{{BRAND_NAME}}</div>
  {{SLIDE_CONTENT}}
  <div class="slide-number">{{SLIDE_NUMBER}} / 8</div>
</body>
</html>
