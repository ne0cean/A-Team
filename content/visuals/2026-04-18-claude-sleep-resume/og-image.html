<!DOCTYPE html>
<!--
  OG Image — Claude Code Sleep Mode
  Resolution: 1200×630 (Twitter/LinkedIn/Facebook standard)
  Generation: 브라우저 열어서 screenshot 또는 Puppeteer:
    npx playwright screenshot --viewport-size=1200,630 og-image.html og-image.png
-->
<html lang="ko">
<head>
  <meta charset="utf-8">
  <title>Claude Code Sleep Mode — A-Team</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0F0F12;
      --text: #F5F5F0;
      --dim: #6B6B6B;
      --accent: #FFB800;
      --highlight: #00D9FF;
      --rule: #2A2A30;
    }

    html, body {
      width: 1200px;
      height: 630px;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, sans-serif;
      font-feature-settings: 'cv11';
    }

    .frame {
      width: 100%;
      height: 100%;
      padding: 56px 64px;
      display: grid;
      grid-template-columns: 1.1fr 1fr;
      gap: 48px;
      position: relative;
    }

    .left {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .pretitle {
      font-family: 'IBM Plex Mono', 'SF Mono', monospace;
      font-size: 13px;
      color: var(--dim);
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .title {
      font-size: 52px;
      line-height: 1.05;
      letter-spacing: -0.02em;
      font-weight: 600;
      margin-top: 16px;
    }

    .title em {
      font-style: normal;
      color: var(--accent);
    }

    .subtitle {
      margin-top: 20px;
      font-size: 18px;
      line-height: 1.5;
      color: var(--dim);
      max-width: 480px;
    }

    .meta {
      font-family: 'IBM Plex Mono', 'SF Mono', monospace;
      font-size: 12px;
      color: var(--dim);
      display: flex;
      gap: 16px;
      align-items: center;
    }

    .meta strong {
      color: var(--text);
      font-weight: 500;
    }

    .right {
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .layers {
      font-family: 'IBM Plex Mono', 'SF Mono', monospace;
      font-size: 14px;
      line-height: 1.8;
      border: 1px solid var(--rule);
      padding: 24px 28px;
      background: rgba(255,255,255,0.02);
    }

    .layer-row {
      display: grid;
      grid-template-columns: 32px 1fr auto;
      gap: 12px;
      align-items: baseline;
      padding: 4px 0;
    }

    .layer-num {
      color: var(--highlight);
      font-weight: 500;
    }

    .layer-name {
      color: var(--text);
    }

    .layer-tag {
      color: var(--dim);
      font-size: 11px;
    }

    .divider {
      border-top: 1px dashed var(--rule);
      margin: 8px 0;
    }

    .footer-meta {
      margin-top: 16px;
      font-family: 'IBM Plex Mono', 'SF Mono', monospace;
      font-size: 11px;
      color: var(--dim);
      display: flex;
      gap: 12px;
    }

    .footer-meta strong {
      color: var(--accent);
    }
  </style>
</head>
<body>
  <div class="frame">
    <div class="left">
      <div>
        <div class="pretitle">// claude code · sleep mode</div>
        <h1 class="title">잠든 6시간을<br><em>코드</em>로.</h1>
        <p class="subtitle">5시간 리밋 후 자동 재개. 5-Layer 안전장치로 비용 폭주 없이 잠든 시간을 코드 작성 시간으로 전환.</p>
      </div>
      <div class="meta">
        <span><strong>github.com/ne0cean/A-Team</strong></span>
        <span>·</span>
        <span>6주 실측 · $73/월</span>
      </div>
    </div>
    <div class="right">
      <div class="layers">
        <div class="layer-row">
          <span class="layer-num">L1</span>
          <span class="layer-name">Probe backoff</span>
          <span class="layer-tag">5s→25s→125s</span>
        </div>
        <div class="layer-row">
          <span class="layer-num">L2</span>
          <span class="layer-name">launchd polling</span>
          <span class="layer-tag">매 2분</span>
        </div>
        <div class="layer-row">
          <span class="layer-num">L3</span>
          <span class="layer-name">Hourly cap</span>
          <span class="layer-tag">$3.00</span>
        </div>
        <div class="layer-row">
          <span class="layer-num">L4</span>
          <span class="layer-name">PID lock</span>
          <span class="layer-tag">overlap 차단</span>
        </div>
        <div class="layer-row">
          <span class="layer-num">L5</span>
          <span class="layer-name">Quality gate</span>
          <span class="layer-tag">4-stage</span>
        </div>
        <div class="divider"></div>
        <div class="footer-meta">
          <span>성공률 <strong>78%</strong></span>
          <span>·</span>
          <span>cycle/밤 <strong>2-3</strong></span>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
