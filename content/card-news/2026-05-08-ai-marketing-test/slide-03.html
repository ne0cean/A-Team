<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080, height=1350">
  <title>Card News Slide 3</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
    html, body { width: 1080px; height: 1350px; overflow: hidden; }
    body {
      font-family: 'Pretendard', 'Inter', -apple-system, sans-serif;
      background: #1a1a2e;
      color: #ffffff;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 80px;
    }
    .slide { width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; }
    .slide-content .number { font-size: 120px; font-weight: 800; color: #4361ee; opacity: 0.3; }
    .slide-content .heading { font-size: 56px; font-weight: 700; line-height: 1.3; margin-bottom: 32px; }
    .slide-content .body { font-size: 36px; line-height: 1.6; opacity: 0.85; }
    .accent { color: #4361ee; }
    .slide-number { position: absolute; bottom: 40px; right: 60px; font-size: 24px; opacity: 0.4; }
    .brand { position: absolute; top: 40px; left: 60px; font-size: 24px; font-weight: 700; }
  </style>
</head>
<body>
  <div class="brand">A-Team</div>
  <div class="slide slide-content">
    <div class="number">02</div>
    <div class="heading">마케터 채용하면 월 500만원</div>
    <div class="body">1인 창업자에게 마케팅 팀은<br>사치라고 생각했다.</div>
  </div>
  <div class="slide-number">3 / 8</div>
</body>
</html>
