<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080, height=1350">
  <title>Card News Slide 1</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
    html, body { width: 1080px; height: 1350px; overflow: hidden; }
    body {
      font-family: 'Pretendard', 'Inter', -apple-system, sans-serif;
      background: #1a1a2e;
      color: #ffffff;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 80px;
    }
    .slide { width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; }
    .slide-hook { text-align: center; }
    .slide-hook .title { font-size: 72px; font-weight: 800; line-height: 1.2; margin-bottom: 32px; }
    .slide-hook .subtitle { font-size: 32px; font-weight: 500; opacity: 0.8; }
    .accent { color: #4361ee; }
    .slide-number { position: absolute; bottom: 40px; right: 60px; font-size: 24px; opacity: 0.4; }
    .brand { position: absolute; top: 40px; left: 60px; font-size: 24px; font-weight: 700; }
  </style>
</head>
<body>
  <div class="brand">A-Team</div>
  <div class="slide slide-hook">
    <div class="title">혼자서 <span class="accent">마케팅 팀</span> 만들기</div>
    <div class="subtitle">AI로 콘텐츠 40개/월 자동 생산하는 방법</div>
  </div>
  <div class="slide-number">1 / 8</div>
</body>
</html>
