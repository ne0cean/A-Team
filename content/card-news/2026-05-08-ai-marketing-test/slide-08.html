<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080, height=1350">
  <title>Card News Slide 8</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
    html, body { width: 1080px; height: 1350px; overflow: hidden; }
    body {
      font-family: 'Pretendard', 'Inter', -apple-system, sans-serif;
      background: #1a1a2e;
      color: #ffffff;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 80px;
    }
    .slide { width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; }
    .slide-cta { text-align: center; }
    .slide-cta .message { font-size: 48px; font-weight: 700; margin-bottom: 48px; }
    .slide-cta .action { background: #4361ee; color: #1a1a2e; padding: 20px 40px; border-radius: 50px; font-size: 28px; font-weight: 600; display: inline-block; }
    .accent { color: #4361ee; }
    .slide-number { position: absolute; bottom: 40px; right: 60px; font-size: 24px; opacity: 0.4; }
    .brand { position: absolute; top: 40px; left: 60px; font-size: 24px; font-weight: 700; }
  </style>
</head>
<body>
  <div class="brand">A-Team</div>
  <div class="slide slide-cta">
    <div class="message">나만의 AI 마케팅 팀을<br>만들고 싶다면?</div>
    <div class="action">팔로우하고 더 많은 팁 받기</div>
  </div>
  <div class="slide-number">8 / 8</div>
</body>
</html>
